body:
  text: 黃氏日抄卷五十五宋黃震撰讀諸子一老子老子之書必隱士嫉亂世而思無事者為之異端之士私相推尊過為誣誕如序稱葛仙翁所作謂老子出於無始之劫以道為天地萬物母至周衰道不行始西去不知洪荒未嘗以治稱黃帝堯舜之治皆以仁義禮樂初無用乎老子虛無之道聖王不行而周衰初非老子之道不行使道不能行而去之則天下於老子之道何賴而劫者後世佛氏之説亦不當淆入以論老子也至八十一章之解直謂河上公坐虛空中授漢文帝其事發於裴楷不知漢文帝在位二十三年僅嘗勞軍及郊雍未嘗幸河上而裴楷乃晉人非漢人也一夲作裴偕又未詳其何人且史稱河上丈人為安期生之師六傳而至蓋公蓋公尚在文帝之前河上公豈當文帝之世其説不經全類市井小説略不知古今辱老子之書又甚矣姑辨其妄而録老子書之有補於世者因其舊分二章保身章第一不見可欲使心不亂身與貨孰多甚愛必大費多藏必厚亡知足不辱知止不殆知足之足常足輕諾必寡信多易必多難柔之能剛弱之能強強梁者不得其死夫惟不爭故天下莫能與之爭故善人者不善人之師不善人者善人之資天之道其猶張弓乎髙者抑之下者舉之損有餘而補不足金玉滿堂莫之能守富貴而驕自違其咎功成名遂身退天之道保國章第一天之道不爭而善勝天得一以清地得一以寧王侯得一以為天下貞江海所以能為百谷王者以其善下之夫我有三寶一曰慈二曰儉三曰不敢為天下先人之所惡惟孤寡不榖而王公以為稱治大國若烹小鮮圖難於其易為大於其細為之於未有治之於未亂合抱之木生於毫末九層之臺起於纍土千里之行始於足下聖人無常心以百姓心為心其政悶悶其民醇醇其政察察其民禍兮福之所倚福兮禍之所伏見小曰明守柔曰強以道佐人主者不以兵強天下師之所處荆棘出焉大軍之後必有凶年佳兵不祥之器不得已而用之戰勝以喪禮處之含德之厚比於赤子後辨其書謂道非明民者見之偏欲絶仁棄義者言之激翕張豫奪者隂謀玄之又玄者彼自不知其所以言何詰焉莊子莊子以不羈之材肆跌宕之説創為不必有之人設為不必有之物造為天下所必無之事用以眇末宇宙戲薄聖賢走弄百出茫無定蹤固千萬世詼諧小説之祖也然時有出於正論者所見反過老子老子之説可録者不過卑退自全莊生之説可録者往往明白中節今隨其篇録下方內篇為善無近名緣督以為經仲尼曰天下有大戒二其一命也其一義也子之愛親命也不可解於心臣之事君義也無適而非君也無所逃於天地之間是之謂大戒是以走事其親者不擇地而安之孝之至也夫事其君者不擇事而安之忠之盛也知其不可奈何而安之若命德之至也兩喜必多溢美之言兩怒必多溢惡之言尅核太至則必有不肖之心應之無私安時而處順外篇粗而不可不陳者法也親而不可不廣者仁也節而不可不損者禮也一而不可不易者道也愛人利物之謂仁上必無為而用天下下必有為為天下用此不易之道也夫尊卑先後天地之行也故聖人取象焉宗廟尚親朝廷尚尊鄉黨尚齒行事尚賢雜篇無財謂之貧學而不能行謂之病貴賤之分在行事之美惡平為福有餘為害物莫不然而財其尤甚者也後辨莊子之可録者固過於老子然其悖理者則又甚於老子蓋老子隱士之書而莊子亂世之書也其所以變亂天下之常者不過借天下之不常以亂其常如麋鹿食蔗則因謂民食芻粟者為非正味如巨盜負篋則因謂緘縢防盜者為盜積如瞽者不見文采聾者不聞鐘鼓則因謂文采鐘鼓為無用於是乎混而殽之謂是即非非即是而是非之兩忘於是乎復蕩而空之謂人不必有材心不必有知而天下生生之理盡絶於是乎又復引而伸之謂入水不濡入火不焦為天下之至人嗚呼此誠亂世之書而後世禪學之所自出也是非之理判然安得而使之無人生而有血氣心知安得而使之無果如其説心定神全入水入火不驚不悸猶可也安得而不焦不濡此固天下所必無之理童子猶將笑之奈何其文竒説誕人情易惑雖老師宿儒反或溺之耶嗚呼悲夫盍火其書道家者流謂黃帝上天謂老子西出關為長生不死之證然黃帝之墓好道之漢武親過之老聃之死好道之莊子親載之莊子生於戰國六經之名始於漢而莊子之書稱六經意莊子之書亦未必盡出於莊子荀子余讀荀卿書然後知昌黎公之不可及雖歐陽子最尊昌黎公其議論亦有時而異者大抵誦述正論於義理開明之日易辨明正理於是非迷謬之世難自戰國縱橫之説興而處士橫議之風熾極而至於莊周并收一世之怪大肆滑稽之口以戲薄堯舜禹湯文武周公孔子之道而天下之正理世無復知于斯時也知尊王而賤霸知尊孔氏而黜異端孟子之後僅有荀子一人而世不稱荀子何哉蓋嘗考其故由漢及唐皆尊老莊其間溢出而為禪學者亦莊老之餘漲而荀子嘗斥老聃為知詘而不知伸斥莊周為蔽於天而不知人其説正由由漢及唐之學者相背馳宜其不之稱也獨一昌黎公奮自千載無傳之後破除千載謬迷之説尊孟子以續孔氏而表荀子以次孟子卓哉正大之見孔孟以來一人而已其關繫正邪之辨為何如哉逮至我朝理學大明三尺孺子亦知嚮方矣老蘇以傑然不世出之才反獨逺追戰國縱橫之學此與荀子正相南北識者已疑之歐陽子一見乃驚嘆以為荀子夫荀子明儒術於戰國縱橫之時而老蘇祖縱橫於夲朝崇儒之日同耶異耶而謂蘇為荀耶或者特於其文而言之耶後辨昌黎稱荀子大醇小疵世之因而指實其小疵者曰非子思孟子也曰謂性為惡而謂為善者偽也若然則豈止小疵而已哉余觀其非子思孟子蓋其妄以知道自任故欲排二子而去之以自繼孔子之傳其意盡於篇末可見失正坐不自量耳至其以為善為偽則其説雖可驚其意猶可録蓋彼所以偽者人為之名人非詐偽之謂若曰人性夲惡修為斯善其意專主習而不主性其説遂墮一偏而又古今字義漸變不同如古以媚為深愛而後世以為邪古以佞為能言而後世以為諂荀子之所謂偽殆類中庸之所謂矯而擇言不精遂犯衆罵不然何至以為善為詐偽之偽也哉惟其夲意之所指初不其然此昌黎姑恕其説而指為小疵歟抑荀子之小疵雖其議論之近理者亦或不免不但非孟言性而已也大扺荀子之所主者在禮而曰禮之敬文也則禮之夲於內心者卿殆未之深考故其議禮之效惟欲辨分以足用其於論王伯曰粹而王駁而伯曰義立而王信立而伯幾謂王伯無異道特在醇不醇之間至於內心義利之分則略不之及又謂能治其國則文繡為當然而後葬為無害其與他日譏齊威淫泆而猶許其有大節者無以異然則使荀卿而用於世亦不過富國強兵善致鄰國成霸功爾荀子注於駑馬十駕之下云有缺文愚按駑馬十駕功在不舍此二句正相聮屬若曰馬駑而能致十駕之逺者功在於行行而不止耳又於以狐父之戈钃牛矢注云喻以貴用賤其説未聞愚按此章戒鬪謂好鬪者不足與之較也狐父之戈良器也牛矢至賤也而钃之是自褻其良也君子與小人鬪之譬也若曰千鈞之弩為鼷鼠發機云爾何未聞之有揚子揚子終篇稱王莽之勤勞過於阿衡是豈可齒善類猶以知尊孔子得名諸儒然自漢武以來孔子之褒顯尊異為已久正不待揚雄而後尊而此時亦非有異端之可闢如孟荀不幸生處士橫議之時也迹其言議况多粗淺首章謂倥侗顓蒙恣于情性是既不知有物則秉彞之理矣如曰學行之上也言之次也教人又其次也亦豈孔門之旨耶孔門之學致知思辨為先而雄遽以行先之學不厭教不倦仁智兩全之事而雄反以教人又次為言果可為法言之首乎愚嘗謂孟子之論于其心故可以繼孔子之傳荀子之論止於事故不能如孟子之醇揚子當正論已明之後不過掇拾緒餘以恣説故雖以溫公之淳厚終身為其所欺表而尊之與曹操預正統等而世亦終不謂操為西伯謂雄為孟子也公理昭昭天地間是豈一人之力可強而易置之耶文中子文中子之書以易老並言以釋老與儒為三教蓋亦六朝流習耳迹其言議多有近理如曰廉者常樂無求貪者常憂不足如曰人有不及可以情恕非意相干可以理遣如曰易樂者必多哀輕施者必多奪問何以息謗曰無辨問何以止怨曰無爭然要其指歸大要亦不出老子慈儉之説於聖門未有得焉至其主摽枝野鹿之説謂上無為下自足至治之代人老死不相往來則習老子之説而不之考也古者鴻荒之世人之異於禽獸者幾希聖人者作教之以相生相養之道然後漸有倫理以趍於治太古何嘗有治至後世聖人然後有治耳且上果無為則下亦烏能自足耶若夫帝國戰德皇國戰無為德與無為而以戰言雖老子未嘗道甚至借聖門以掩釋教之弊謂詩書盛而秦滅非仲尼之罪虛玄長而晉亂非老莊之罪齋戒修而梁亡非釋迦之罪嗚呼晉則長虛玄矣梁則修齋戒矣秦果盛詩書者乎嗚呼曽謂文中子而有此恐亦後世附會之爾曽子近世劉子澄闕子為曽子與此不同之闕曽子之書不知誰所依倣而為之言雖雜而衍然其不合於理者蓋寡若云與父言言畜子與子言言孝父與兄言言順弟與弟言言承兄皆世俗委曲之語而良賈深藏如虛又近於老子之學殊不類曽子𢎞毅氣象若樂正子下堂傷足之事尊其所聞則高明行其所知則光大之説亦皆會粹此書亦有足觀特以天圓地方之説為非而謂天之所生上首地之所生下首上首之謂圓下首之謂方雖務傳而未必然子華子子華子晉人程夲子華其字自稱孔子與之傾蓋者也事亦見孔叢子劉向序其書謂趙簡子欲仕之逃而之齊館於晏子簡子死而反於晉以卒蓋夲其書多晏子答問之辭未知然否書凡十卷雖夲老子虛無之説而能自攻其徒欺誕之語且尊孔氏而其文亦蔚乎可觀賢於諸子逺矣要亦不可以治世而向乃悲其不遇余謂縱不生齊晉間亦豈有遇世之正學哉今釐其説之正偏為二公仲承問黃帝采銅於首山作大爐鑄神鼎於上鼎成羣龍下迎乘彼白雲至于帝鄉程子曰否甚矣世之好譎怪也人之異於龍龍之異於鼎鼎之異於雲惡足相感召而賔使之耶千世之後必有人主好高而慕大以久生輕舉而羡慕者夫生而少壯轉而為衰老轉而為死亡聖凡之所共也甚矣世之好譎怪也宋有丁氏家故無井而溉汲焉常一日而一人居外懲其如是也鳩工而穿井於庭家相與語曰今吾之穿井得一人矣有聞而傳之者曰丁氏穿井而得一人也黃帝之鑄鼎是井中人之譬也晏子曰堯不以土階為陋而有虞氏怵戒於塗髹子華子曰土階塗髹之説野人之所稱道而傳所不傳者也夫堯舜之備物也如此烏有所謂土階三尺茅茨不翦者惡有所謂塗髹以自怵戒者凡其辨誣如此皆説之正者也太初胚胎實生三氣上氣曰始中氣曰元下氣曰玄栖三隂之正氣於風輪其專精之名曰太玄栖三陽之正氣於水樞其專精之名曰太精又曰大道主三元縱而守之為三極衡而施之為三紀上下貫焉為三才通於一萬事畢凡皆虛無而無當於理如此善弗去亂未央也又曰有意於治則亂矣凡其立異而自畔於理如此皆説之偏者也管子管子之書不知誰所集乃龎雜重復似不出一人之手然諸子惟荀卿揚雄王通知宗尚孔氏而未知其儻用於世果何如餘皆處士橫議高者誣誕下者刻深戲侮聖言壞亂風俗蓋無一非孔門之罪人其間嘗獲用於世而卓然有功為孔子所稱者管子一人而已余故讀其書而不敢忽為之熟復再三而條列之大抵管子之書其别有五心術內業等篇皆影附道家以為高侈靡宙合等篇皆刻斫隱語以為怪管子責實之政安有虛浮之語使果出於管子則亦謬為之以欺世殆權術之施於文字間者爾非管子之情也管子之情見於牧民大匡輕重之篇然牧民之篇最簡明大匡之篇頗粉飾輕重之篇殆傅會牧民之要曰倉廪實則知禮節衣食足則知榮辱禮義廉耻國之四維四維不張國乃滅亡此管子政經之綱茍得王者之心以行之雖歷世可以無弊秦漢以來未有能踐其實者也其説豈不簡明乎大匡之要曰桓公入國踐位之年欲修兵革仲諫不可公不從二年欲繕兵甲仲諫不可公不從果敗於宋公以勇授祿仲諫不可公不從明年公伐魯仲諫不可公不從果敗於魯四年公興兵十萬圍魯仲諫不可公不從魯去國五十里為關以請盟仲諫不可公不從魯果劫盟五年欲伐宋以救杞仲諫不可公乃始用其謀不伐宋而城緣陵以封杞明年狄伐邢又用其謀城夷儀以封邢明年狄伐衛又用其謀城楚丘以封衛損齊之有封三亡國恩足以結四鄰無兵爭矣公問將何行乃請寬關市之征又問何行乃請輕諸侯之幣又問何行乃請賞其國以及諸侯之國又問何行乃請隰朋為東國賔胥無為西土而又遊公子開方於衛遊李反於魯遊蒙孫於楚以親附四方之諸侯方是時齊之勢駸駸乎如春斯逹乎狄反不量德而伐之齊於是請救於諸侯諸侯之來救者皆以其所獲豫之惟北州之令支不來則稱兵而伐之齊之恩威遂四逹於天下而猶未試也乃教諸侯足民食兵備乃教諸侯正君臣父子乃又罰其不盡君臣父子之道者夫然後兵車之會六乘車之會三諸侯莫不賔從而夷狄以服中國以安蓋自東遷諸侯爭強僅同泥中之鬪獸未嘗有一念能出於兵爭之外至管子始一切反之而有以弭其爭此管子行事之實聚見此書其次第皆可按而考然其説似粉飾之以誇功矣若輕重篇則何其多術哉管子雖多術亦何至如此之屑屑哉伐葅薪冬煮鹽三萬六千鍾爾謬稱妨農而春禁之使價長至十倍乃糶之於鄰國得黃金萬一千斤復請於周以黃金賀獻使金價百倍焉築隂里三墻九門使玉人雕刻為璧者乃石爾謬請於周非彤弓石璧不得朝獻而使天下諸侯盡輸金珠榖帛於齊以易石璧焉北郭掘闕而得者一龜爾謬以十乘之使百金之裝賜其家為中大夫名其龜曰無資之寶以質丁氏粟三軍之師五月之糧價至四千金焉凡其張無為有善於富國如此榖賤將流而他也則以石璧聘囷京之家而民爭藏榖民貧無以償貸也則以石璧聘稱貸之家而人皆折劵士大夫之家不恤其族也則滅城陽大夫之位而人皆散財發粟死事之後無以賞之也則縞素朝豪家使爭藏粟為備俟賈長四十倍而官出四十倍之粟以賑之凡其轉虛為贏善於足民如此通杭莊之水以致鳬鳥商人挾丸彈而商以貧沐途旁之樹以絶逰息農人皆務夲業而農以富沐去樹枝也商重農輕則下令藏榖而農商以平西飢東豐則稅錢準榖而東西以平稅錢三十西準榖三斗東準榖三釡藏粟者不出則下令出師俾有粟者不行於是盡知囷窖之數窖力救反弓弩多匡䡔善禮反礙也則下令騁鵠鵾之所在而民皆習逺射於是自無匡䡔之患皮幹筋角之徴重則下令髙杠柴地使車馬罷絶皮幹筋角委積而諸侯之牛馬皆來凡其量低與昻善於權民物之宜如此而又推其術以戕鄰國焉嘗一朝素賞四萬二千金即以虛聲攻萊而盡并其地魯梁出綈則身先國人以衣綈使魯梁皆棄農而織綈俟其田荒則倐賤之閉關不與通魯梁民飢歸齊者十六而魯梁服萊莒生柴則鑄金境上以市柴使萊莒皆棄農而採柴俟其田荒則倐止之閉關不與通萊莒民飢歸齊者十七而萊莒服鹿生於楚狐白出於代器械出於衡山則置鹿買狐白置器械使其國皆棄農而爭應之民既飢困而歸齊楚與代與衡山又皆服不寧惟是龍鬪而稱天使臨郊亦因以動八侯之朝彗出而稱國有大事亦因以裒百姓之積凡皆駕虛翼空隨物生智其在國者則神之以富其國其在鄰者則愚之以戕其鄰雖其在天者亦假之以威動天下而獵取為利顛倒一世如弄嬰兒於掌股之上要皆多為之術以成其私至若欲魚價之增而立五厲之祭幸柴價之增而賀北澤之燒燒去聲古人之教藝畜不過使之自養今顧色色鼓舞之以為己利甚至鹽計食口針刀耒耜每加分以盡其利其亦瑣屑甚矣未必皆管子之真愚故疑其為附會抑此以其政言也若其書載鮑叔薦仲與求仲於魯及入國謀政與戈廩鴻飛四時三弊臨死戒勿用竪刁易牙開方等説皆屢載而屢不同或夲文列前而解自為篇或併篇或無解或云十日齊戒以召仲觴三行而仲趍出又云樂飲數旬而後諫自相矛盾若此不一故曰龎雜重復似不出一人之手楊忱序管子論高文竒雖有作者不可復加一辭矣張巨山謂其心術內業等篇為管氏功業所夲意巨山好道家學故云爾夲書既雜然矣為之注釋者復多抵牾四傷之篇誤名百匿而以四傷名七法之篇幼官篇首章云若因夜虛守靜人物則皇其後方之圖夲可覆也乃衍人物二字不知參對而以夜虛為句守靜人物為句方以人物則皇為句而曲為之説曰聽候人物也守靜豈聽候之義乎幼官五圖以形生理為句而中央之注獨以形生屬上文明法篇以比周以相匿為句而下又云是故忘生死交其後方之明法解可覆也及政一故字不知參對而以相為匿是為句而曲為之説曰匿公是而不行也不知比周以相匿者匿其非爾比周何是之有乎形勢篇云天地之配也地字誤作下字亦未正五法之章曰天下不患無財患無人以分之分如分地之利之分言有人次有財耳乃釋云可以分與財者賢人也殊非章旨立政之章曰道塗無行禽指人言之謂其為能行之禽爾乃釋云無禽獸之行是以行為去聲亦覺不倫其他難槩舉版法篇末云四恱在施愛有衆在廢私今因缺文而云恱在施有衆在廢私不成文矣揨擲擋揨宅耕反擲丁歷反擋丁用反鼓聲也見宙合篇準凖字下不從十草封澤言草之多也滿盛之家不可以嫁子十三卷履大方地也十六卷正鹽策正稅也當與征也見玉篇策者是管仲施於國者皆名策榖賊田中木也見二十二卷終則有始與天壤爭言鹽也卷草四劵契分曰劵合曰契見卷二十四嵗有四秋春耜鈇夏絲秋五榖冬紡績也卷二十四斥薪芻所生之地也卷二十四絏繑上息列反下丘喬反連續也卷二十四孟行高言孟行注云孟大也見第四十五篇列子列子才頴逸而性沖淡生亂離而思寂寞默察造化消息之運於是乎輕死生輕視人間死生之常於是乎遺世事其靜退似老聃而實不為老聃老聃用隂術而列子無之其誕謾似莊周而亦不為莊周莊周侮前聖而列子無之不過愛身自利其學全類楊朱故其書有楊朱篇凡楊朱之言論備焉而張湛序其書乃謂往往與佛經相參余按列子鄭人而班馬不以預列傳其書八篇雖與劉向校讎之數合實則典午氏渡江後方雜出於諸家其皆列子之夲真與否殆未可知今考辭旨所及疑於佛氏者凡二章其一謂周穆王時西域有化人來殆於指佛然是時佛猶未生而所謂騰而上中天化人之宫者乃稱神遊歸於説夢夲非指佛也其一謂商太宰問聖人於孔子孔子歷舉三皇五帝非聖而以聖者歸之西方之人殆不指佛然孔子決不黜三五聖人而顧泛指西方為聖且謂西方不化自行蕩蕩無能名蓋寓言華胥國之類絶與寂滅者不侔亦非指佛也使此言果出於列子不過寓言不宜因後世佛偶生西域而遂以牽合使此言不出於列子則晉人好佛因列子多誕始寄影其間翼為佛氏張夲爾何相參之有哉且西域之名始於漢武列子預言西域其説尤更可疑佛夲言戒行而後世易之以不必持戒者其説皆隂主列子皆斯言實禍之不有卓識孰能無惑耶中山公子牟恱楚人公孫龍詭辭而其正子輿非之至斥以設令發於餘竅子亦將承之其論甚正而列子載焉此誕説波流中砥柱也又謂慎爾言將有知之慎爾行將有隨之廢在身稽在人湯武愛天下故王桀紂惡天下故亡此所稽也又謂嘗觀神農有炎之得稽虞夏商周之書度諸法士賢人之言所以存亡廢興而不由此道者未之有也凡皆異乎列子平日之言為八篇之最粹楊朱拔一毛利天下不為而列子宗之蓋愛身者也然謂舜禹周孔之聖為自苦謂桀紂之縱為自得謂子産屈於公孫朝公孫穆荒淫酒色之辨而謂朝穆真人且力排貴生愛身之為非是又何自背其平日區區之守耶此為八篇之最舛者九淵之説出於列子謂列子之師壺子示神巫季咸以未始出吾宗而季咸走滅者也此所謂以無所考相欺而近世名儒陸象山以之自名豈别有所夲耶墨子墨子之説似是而實不可為治殆不止如韓昌黎之議荀揚擇焉不精而已而昌黎乃儕墨子於孔子何哉且昌黎不過謂墨氏尚同而孔謂居是邦不非其大夫春秋譏專臣亦尚同爾然不非其大夫者惡居下訕上譏專臣者惡以臣逼君孔非尚同也墨之言尚同謂天子所是皆是之天子所非皆非之與孔門所謂如其不善而莫違之戒正相反顧可謂其與孔子同乎又不過謂墨氏兼愛而孔謂泛愛親仁以博施濟衆為聖亦兼愛爾然仁者則親之既異於愛衆而博施為仁雖堯舜猶病之孔非兼愛也墨子之言兼愛謂法其父母與法其君皆為法不仁惟當法天與孔門所謂孝弟為仁之夲者正相背顧可謂其與孔子同乎謂墨尚賢而孔子賢賢疾沒世而名不稱是亦尚賢然賢之當尚雖愚不肖者亦同此心何獨孔墨之同顧墨氏之尚賢乃謂惟賢為尚親戚則不可使當貴正與吾儒親親尊賢之義又相背耳謂墨氏明鬼而孔子祭如在曰我祭則受福是亦明鬼然鬼神之當敬雖愚不肖者亦同此心何獨孔墨之同顧墨氏之明鬼乃謂聖王明天鬼之所欲而避天鬼之所憎是亦率天下萬民祭祀天鬼又與吾儒報夲反始之義亦相反且昌黎嚴於荀楊擇焉未精之辨何獨恕於墨子似是而非耶墨子之書凡二其後以論稱者多衍復其前以經稱者善文法昌黎主文者也或者一時恱其文而然歟昌黎曰孔子必用墨子墨子必用孔子愚曰孔子必不用墨子墨子亦必不用孔子雖然儒名而墨行者昌黎固嘗揮之矣文子文子者云周平王時辛鉼之字即范蠡之師計然嘗師老子而作此書其為之注與序者唐人默希子而號其書曰通玄真經然偽書爾孔子沒於周平王幾百年及見老子安有生於平王之時已先能師老子耶范蠡戰國人又安得上師平王時之文子耶此偽一也老子所談者清虛而計然之所事者財利此偽二也其書述皇王帝霸而霸乃伯字後世轉聲為霸耳平王時未有霸之名此偽三也相坐之法咸爵之令皆秦之事而書以為老子之言此偽四也偽為之者殆即所謂默希子而乃自匿其姓名歟其序盛稱唐明皇垂衣之化則其崇尚虛無上行下效皆失其夲心為可知明皇之不克終於是乎兆矣豈獨深宫女子能召漁陽鞞鼓之變哉書之每章必託老子為之辭然用老子之説者文衍意重淡於嚼蠟否者又散漫無統自相反覆謂默希子果有得於老子吾亦未之信今略類分其説如稱為惠者生姦此法家之説政勝其民不附其上此術家之説國之所以強者必死也此兵家之説而上德一篇又全引諸子譬喻語凡其散雜類此既曰道滅而德興又曰道之中有德既非仁義矣又曰治之夲仁義也既非禮義矣又曰不知禮義法不能正凡其反覆類此而其言之偶合理者有二曰不法其已成之法而法其所以為法者與世推移曰自天子至於庶人四體不勤於事求瞻者未之聞其言之最害理者亦有二曰任臣者危亡之道也尚賢者癡惑之原也曰去恩意舍聖智外賢能廢仁義禁姦偽則齊於道矣亢倉子亢倉子名楚説夲老子文類莊子亦有近理者如曰所謂國鬱者主德不下宣人欲不上逹也如曰士有天下人愛之者有其主獨愛之者用天下人愛者則天下安用主獨愛者則天下危如曰理人者先務人則朴音農此其近理者也亦有背理者如曰大亂之夲祖乎堯舜如曰蛻地之謂水蛻水之謂氣蛻氣之謂虛蛻虛之謂道如曰安知天下之正汙潔此其背理者也至其妄自標榜以欺世則謂靈王使祭公致篚帛有禳水早之間謂熊開拜為亞尹嘗微服而逃則有不能自掩其欺者矣蓋其書稱自鄉而縣縣而州此後世之區畫也稱被以青紫章服此後世之品式也稱吾無誰私兮羌忽不知其讀此倣後世之楚詞而字多用古文又欲以自蓋其今文而益彰者也曽謂周靈楚國之世而有此哉其書有云意氣谷神以谷為似與老子所稱谷神不同關尹子關尹子九篇其一曰宇注云道也其二曰柱云建天地也三曰極云尊聖人也四曰符云精神魂魄也五曰鑑云心也六曰匕云形也七曰釡云化也八曰籌云知也九曰藥云雜治也序以為關尹喜之書漢有方士來上則其偽可知矣且其文陋弱其言道皆歸之於無果無則又安有所謂道而為是費辭哉如曰為者必敗執者必失故聞道於朝可死於夕此為粗可曉者然與老子論語夲旨不合此襲之而不善用者也如曰一日死者如一息得道十年百年死者如歷久得道是人生惟以速死為幸而不欲天下之有生也何等立言哉鶡冠子鶡冠子言之害理者如曰聖人貴夜行其近理者如曰富者觀其所豫貴者觀其所舉貧者觀其所取賤者觀其所與及不殺降人之類皆其間見一二耳餘率晦澀詞繁理寡韓文公顧有取焉何哉嘗考其五至之説見於首篇始謂北靣事君則伯己者至謳藉咄則徒𨽻者至是痛上之人不禮下也中流失船之説見於宋篇謂賤生於無用之若中流失船一壺千金是傷己之不遇時也文公豈有感於其言者乎然文公獵取此一二語其餘十五篇無留良矣伯乃言其才之百倍於己鬻子鬻子名熊逢行圭序其書云熊楚人年九十見文王王曰老矣熊曰使臣捕獸逐麋已老矣使臣坐䇿國事尚少也文王遂師之故其書首之以文王問此必戰國處士假託之辭蓋自漢藝文志已有其篇目其語亦多可采如以知其身之惡而不改為大忘如以自謂賢者為不肖如曰察吏於民凡皆足以警世其餘則載五帝禹湯之政皆主得人文亦不煩異乎諸子之寓言虛誕者矣然每篇多以政曰起語而以昔者追述文王之問既託文王而下又云魯周公且亦未知自稱政曰者為誰逢行圭既不能明言而反釋以為政術之間則非辭矣商子商子者公孫商鞅之書也始於墾草督民耕戰其文煩碎不可以句至今開卷於千載之下猶為心目紊亂况當時身被其禍者乎然殿中與御史之號實用此書事必問法官亦出此書後世一切據法為斷者亦合省所自出矣或疑鞅亦法吏之有才者其書不應煩亂若此真偽殆未可知書以詩書禮樂善修仁廉辨惠十者皆避農戰而禁之韓非子韓非盡斥堯舜湯武孔子凡先王之道為亂而兼取申不害商鞅法術之説加深刻焉至謂妻子亦害己者而不可信蓋自謂獨智足舞一世矣然以踈逺一旦説人之國乃欲其主首去貴近誰將汝容耶送死秦獄愚莫與比何物惡氣鍾此醜類老聃氏自全自利一切無情之流弊亦詎料至此嘻亦可悲矣然觀其書猶有足警後世之惑者方是時先王道熄處士橫議往往故為無稽寓言以相戲劇彼其為是言者亦未嘗自謂真有是事也後世襲取其餘而神之流俗因信以為真而異端之説遂至禍天下奈何韓非之辨具在而不察耶非之言曰白馬非馬齊稷下之辨者屈焉及乘白馬之賦而籍之不見其非白也蓋虛辭空辨可以勝一國考實按形不能漫一人今人於異端有嘗拈其實者否耶非之言曰宋人有欲為燕王削棘刺之端為猿母者必三月齋然後能見知王之必不能久齋而紿之爾王乃養之三乘冶工言王曰果然則其所以削者必小今臣冶人也無以為削此不然物也王因囚而問之果妄乃殺之今人於異端果嘗有訊其妄者否耶鄭人爭年者謂我與黃帝之兄同年非能笑之今異端自謂出於無始之前其為黃帝之兄甚矣而人莫不信趙主父施鈎梯而緣播吾刻人迹其上廣三尺長五尺而勒之曰主父常逰此非能笑之今異端往往鑿迹崖石之巔其為播吾之迹愈悖矣而人反以為神非之辨誣若此者衆姑取節焉以告惑者覆廪即近世所謂盤量見卷十韓路侯射隱即近世所謂猜謎卷十六齊桓啞歎息聲卷十五慎火塗隙謂竈突也鄧析子鄧析者鄭人好刑名撰竹刑之書嘗數難子産之法子産卒二十年駟顓乃殺其人而用其書甚哉小有才之適足以殺其身也其書以無厚名首篇則其發於心者為可知而韓昌黎所斥聖人不死大盜不止之語正出此書一死猶未足以盡其罪者矣或者猶謂用其道不當棄其人耶慎子慎子者例陽人慎到之書也始於威德終於君人説五篇數百字各自斷其説大約謂立天子以為天下非為天子民雜處而各有所能因其長短而用之臣有事而君無事説皆無理亦無過於人其書無敘古稱田駢慎到殆此爾其言依法以治曰投鈎分財投䇿分馬非鈎䇿為均也所以塞怨望也愚謂此一斷於弊法者耳若以理為斷則以吾心而裁輕重何嫌耶然子華子亦曰分財賄而投鈎䇿非以夫鈎䇿者為能均也使善惡多寡無所歸怨也蓋當時之論已然矣殆以戒人情之任私者耶世俗分物折其物為曲折而藏其中以折數之多寡為説而探取之此鈎也今易以䦰字當考公孫龍子公孫龍者戰國時肆無稽之辨九流中所謂名家以正名為説者也其略有四一曰白馬非馬謂白所以名色馬所以名形形非色色非形也其二曰物莫非指謂指者指斥是非之名物各相指是非混亂終歸於無可指也其三曰雞三足謂雞足一數足二二而一故三也其四曰堅白石謂目見石之白而不見其堅手知石之堅而不知其白是堅與白為二物其無稽如此大率類兒童戲語而乃祖吾夫子正名為言嗚呼夫子之所謂正名者果如是乎若臧三耳之辨亦稱公孫龍然孔叢子與吕氏春秋載之此書不及焉尹文子尹文子二篇以大道自名而所學乃公孫龍之説九流所列為名家者也因緣白馬非馬之説而生好牛好馬之説復掇拾名實相亂之事以證之無理而迂不足言文而顧以夫子正名為據嗚呼夫子之所謂名者果此之謂乎道喪俗壞士有謬用其心如此者淮南子淮南鴻烈者淮南王劉安以文辨致天下方術之士會粹諸子旁搜異聞以成之凡隂陽造化天文地理四夷百蠻之逺昆蟲草木之細瓌竒詭異足以駭人耳目者無不森然羅列其間蓋天下類書之博者也而愚謂此劉安之所以滅歟夫聖人之治天下君臣父子以相生桑麻榖粟以相養其義在六經其用在民生日用之常如此而已耳自周衰天下亂諸子蜂起爭立異説而各以禍其人之國漢興一切掃除歸之忠厚諸子之餘黨紛然無所售諸侯王之好事而不知體要者稍稍收之亦無不以之自禍安不幸貴盛而多材慷慨而喜事起而招集散亡力為宗主於是春秋戰國以來紛紛諸子之遺毒餘禍皆萃於安矣安亦將如之何而不誅滅哉其徒乃羞之託言上升雞犬預焉嗚呼凡世之自詭仙去者皆淮南上升之類爾孔子不語怪力亂神諸子之所語者怪而已古語有之君子道其常小人道其變諸子之所道者變而已自莊列以來無一不然于以汨天下之正理惑生民之耳目鴻烈所集大率此類而於其紛然類集之中乃有自反其説足以明天下之常者如曰橘柚冬生而人曰冬死死者衆也薺麥夏死而人曰夏生生者多也江河之回曲亦時有南北而人謂江河東流者以大氐為夲此為反夲之名言又云言其所不行行其所非此足為驚世之精語又云毁譽之於人猶蛟虻之一過此最為誤人之鄙論始作衣者一人耳十三卷以為伯餘十九卷以為胡曹此則集衆為書不相參照之弊云九方臯臯字作堙見十二卷丈人謂老人杖而行者見十二卷注蛤梨十二卷舟以離岸為張傍岸為歙十四卷介子龍蛇之歌十六卷薦梅六卷抱朴子抱朴子其偽書哉不然葛稚川何獨誤天下後世之愚不肖者耶夫道即日用常行之理不謂之理而謂之道者道者大路之稱即其所易見形其所難見使知人之未有不由於理亦猶人之未有不由於路故謂理為道而凡粲然天地間人之所常行者皆道矣奈何世衰道微橫議者作創以恍惚窈冥為道若以道為别有一物超出天地之外使人謝絶生理離形去智終其身以求之而終無得焉吁可怪也道固無所不在而人則未必盡能合於道時則有備道之聖人作為君師而人道以立自羲黃堯舜以至於今世世相承以維持人道於不壞不泯皆聖人力矣奈何世衰道微橫議者作創為真人至人之目反以聖人為未嘗聞道不知彼所謂真人至人者所生何時所行何事其姓名聲迹所載何書是特一時故為寓言而人猶或想像歆慕信以為真有其人焉吁可怪也然雖可怪要其所誤者不過世所指為過高之人心之妄想雖喜談虛無之道身之實用終不能自外吾聖人之道其間稿馘山林確守不移者萬不能一二亦不過生養休息於吾道覆露之內彼愚不肖者猶未為其所誤也誤天下後世之愚不肖者非抱朴子之書而誰耶抱朴之言曰人皆可以不死世無不死之人則以龜鶴為證嗚呼龜鶴亦何嘗不死耶天生萬類各得其得人之生也自晝作而夜息龜鶴之生也自陽動而隂蟄人之生也自以百嵗為夀龜鶴之生也自以千嵗為夀奈何人而欲強同龜鶴耶人之所以貴於天地間者以其能輔相天地宰制萬物耳如必與萬物銖較長短飛風已不若蜉蝣之微遊水已不若魚蝦之細豈但夀不龜鶴之若而獨羡之耶人物之有死生即一氣之消息惟其有生而有死所以生生而不窮此亦何足異而必思長生以免之此既決無之理矣而考其所以長生之術乃尤無理始之以導引中之以房中術終之金丹大藥導引之説欲如胎息夫人生在胎以母之息為息胎亦何息之有及其既生則以天地之氣為息何能使之不息復如在胎時就使堅忍不息亦徒自苦寒暑推移時至亦終於死耳房中之術則謂必待口傳夫男女之欲隂陽之常順其隂陽之常而節其情欲之過所可言者不過如此必待口傳則鄙俚難形紙筆為可知是又使人縱于情欲以速其死耳金丹大藥則謂錬他物為金金成先以祀神否者必被殃咎祀神之數天二十斤河伯十二斤北斗太乙各八斤日月井竈社五斤夫謂祀神則成仙將天神地祗可與之分贓乎不祀則受咎將天神地祗視苞苴之有無為禍福乎河伯之賂多於北斗太乙天神不若地祗乎日月之賂僅與井竈等日月下同井竈乎狂謬無稽一至於此甚至謂煮白石而食之亦足延年吁果金銀玉石而可服也是尤速其死耳凡其長生之術無非速死之具其顧乃力主其説譊譊幾十萬言孔子萬世帝王之師也以其不言長生則力排孔子莊子正其所三虛無之師也以其嘗言齊死生則併排莊子甚至天地萬物之父母也以其為能制死生則又併排天地謂天地非萬物父母而夀夭之事不在天地嗚呼抱朴亦何必如是之費辭哉抱朴自謂此術左元放傳之吾從祖仙翁仙翁傳之鄭君而鄭君又傳之抱朴使元放不死仙翁不死鄭君又不死抱朴自能與其徒又皆不死則聖賢自然成空言天地自然成長物今言放死仙翁死鄭君死抱朴亦身將老且死舉四海之衆歷百世之久皆未嘗見一長生者而徒一則曰長生二則曰長生吾誰欺欺天乎而徒使天下後世之愚不肖者用其導引之術以欹偃道傍流落乞丐用其房中之術以遊蕩不檢縱欲傷生用其金丹黃白之術以燒假煆偽終無一成徒罄賣其祖父之田廬以至貧窶愚故曰抱朴子其偽書哉不然葛稚川何獨誤天下後世之愚不肖者耶昔有古強自言已四千嵗識堯舜孔子秦皇漢高有揚州嵇使君信之嘗贈玉巵古強昏耄易忘一日謂稽使君曰此得之安期先生其謬遂敗尋客死夀春黃整家又五原有蔡綖者求仙不驗無以自解自詭成仙逃入異界源山中賣薪易衣食困劇自還紿其家云為老君牧龍崑崙山龍失得謫而逃歷言所見崑崙仙家富貴人亦多信者又河東蒲坂有項曼都者學仙十年而歸紿其家云謁天帝失儀而見斥河東遂號曼都為斥仙人洛中有道士忽自稱為古之仙人白和夀已七千八百嵗人競趨之後忽見未幾河北又有稱白和者洛之弟子趨往見之乃别一人其一人遂亡走凡皆抱朴子所載謂彼之言仙者皆妄唯我之言仙者為真雖同浴譏祼退不自思然亦足為世誡矣故併録之劉子劉子之文類俳而又避唐時國諱以世為代往往雜取九流百家之説引類援事隨篇為證皆會粹而成之不能自有所發明不足預諸子立言之列播州録事袁孝政注而序之乃盛稱譽且謂五十五篇取五行生成之數於義無考焉然又謂劉子名晝字孔昭而無傳記可憑或者袁孝政之自為者耶聱隅子聱隅子者夲朝仁宗時蜀人黃晞之書也效揚雄法言而文則衍然其識有過於雄者雄之首章曰學行之上也知之次也晞則曰知而不能行與不知同知而能行者尚矣其闢封禪則曰天生財以阜吾民今竭其財以奉天猶割肉以啖其口其闢異端則曰腐薪不可以撻兵渙泥不可以膠物猶釋老不可以持天下或問扶蘇立則如之何曰千里之旱一雨或能枝其將枯綿年之病尤藥或能救其少死然而秦之勢亦已去矣或問韓非莊生何如人曰終日求道德而智巧入焉終日求真誠而浮偽入焉古之譁人也其論君子曰小之於灑掃大之於天下無不任也其論治道曰百官謬濫非無賢也賞罰之箭差其的耳其論處世曰惠不在大以赴人之急為至又曰財豐者用益勞而又謂使夫子之有餘藴者子淵也性與天道而世不聞焉文中子之道不傳於世傳之者諸子訛言而已凡皆切近於理雖王通亦雜於異端不能及也豈義理至夲朝類開明歟然其言性謂形變則性性變則神神變則情則其繆戾又自昔言性者之所未有也惜其未逰於濂洛之門宋齊丘化書始余端平甲午讀書餘姚見同舍生有宋齊丘化書覽之欣然輒用其氣之説答權政氣略䇿以氣貫權政略三事文亦竊效之主司湛太僕驚喜及拆試卷手持草卷先聲之衆曰有卷合置魁而文怪不可今置第四一時朋友亦爭傳視傳至湛太僕監宅石橋孫氏此卷不還矣今去之三十六年再閲化書乃大不然其書之目凡六一曰道化則竊用莊列之故智借物類偶然之變以槩人事實然之常因謂彼可化此亦可化不思人與物異此非彼比也二曰術化則隂祖呪術之小見指蕩穢者能召五帝之氣與伏虺者能役五星之精因謂風雲可扳江海可覆不知乞食之虛喝非立言之援證也三曰德化謂儒者之講五常如醯雞之逰太虛井蛙之浮滄溟必忘其名而得其理忘其理則得其情茍得可以將何必廣布帛有此理否耶其殆以儒為戲之劇語耳四曰仁化謂德清淨也無以自用故授之以仁仁不足則義濟之木伐火也不有和睦焉得仇讎不有賞勸焉得鬪爭有此理否耶其殆聖人不死大盜不止之狂論耳五曰食化多為之説以明食之重可也謂食為五常之夲五常為食之末既異於自古皆有死民無信不立之説矣其謂民事莫急於食而王者奪其一則君不知有君是得許行之説而又推衍大過也六曰儉化多為之喻以明儉之益可也謂儉為五常之夲五常為儉之末既異為儉不中禮之譏矣其謂禮貴於減儉貴於不盛則儉與禮相背是得墨子之説而又刻畫太深也凡此六化謬妄曉然而昔乃嘗惑焉蓋其引類多巧造語多華其文簡縮絶與今異焉耳故各章既標説其非而又總記其要以自志其悔亦欲來者毋蹈余之悔而已若齊丘者敢竊犯乎先聖之諱至自謂能與之齊其人亦何足責且其對徐知誥畫爐灰謀僣偽意莫急於兵與粟矣今謂兵必可廢粟不必廣其説又何足辨然其仁化有謂異類懷仁義之性人殺之反不仁不義儉化有謂奢者富不足儉者貧有餘此雖老子慈儉之餘説亦足警愚俗不以人廢言子家子子家子者近世眉山家頥養正所著也謂人心惟危道心惟微惟精惟一允執厥中心若不精一則流而雜矣又謂不食無妄之粟不衣無妄之帛皆誠身也其言之易如此此其所以著書歟然多律己處世之言有補世俗如世所編省心雜言之類惟其言理義勿於傳注中求但於性根上求却恐未安夫六經所以載理傳注所以明經以此為戒而求之性此不立文字而見性成佛也黃氏日抄卷五十五
