body:
  text: 黄氏日抄卷九十一宋黄震撰題跋陳少陽諌藁䟦諌藁刋鎮江府學伯夷叩馬之諌諌雖不偶而首陽髙風千古大閑范孟慱慨然澄清猶易事惟甘戮如飴别家人恬若平時最不可强今觀少陽藁及其臨死帖當與伯夷同功與孟博同傳晦庵書上方字䟦甘露山主僧道堅新其居得晦庵所書上方扁云此晦庵鄉僧義雲住山時所得余按圖經稱今山麓之寺為下方東坡過廣陵嘗有詩别上方擇老僧仲殊詠此寺亦稱雲幡擁上方則寺固有上方之名舊矣然吾晦翁書而僧私之乎劉斯立題甘露上方有滄江萬景對朱欄之句今所見惟寺之多景樓為然此扁若以扁此樓豈不竒僧曰不然物以罕得為竒吾僧室而有晦翁書此為竒余曰然爾僧人而知敬晦翁書尤竒其千萬年永為大寳鎮書劉拙逸詩後漫塘姪一太極之妙流行發見於萬物而人得其至精以為心其機一觸森然胥㑹發於聲音自然而然其名曰詩後世之為詩者雖不必皆然亦未有不㴠泳古今沉潛義理以養其所自出近有所謂江湖詩者曲心苦思既與造化逈隔朝推暮吟又未有以溉其本根而詩於是始卑劉直孺家傳義理之學略出緒餘兩捧鄉書而况於所謂詩者乎然寂寥簡短不過數首盖不求為詩而不能不為詩此其所以為詩也為江湖詩者可以觀矣張太尉家傳䟦孫君子文示余以其妻家張太尉傳曰太尉手所刃讐盗亦孫姓也今孫與張婚願一言以解其疑余謂君樞密威敏公賢子孫誰敢謂君水中解耶張太尉名藏英國初人書桂芝堂記後古括俞君先世皆奮科級近忽其佳城三嵗産三桂君亦三得男森森三秀適與桂符祥有開而必先運無徃而不復亦竒矣然材非天不生非人不成灌溉而培殖之使異日馨香滿天下以無負造物所鍾意君尚勉之哉君之子亦尚皆勉之哉丹陽志媿䟦葯房史君以西州竒男子腹載五車書來從事淮東餉幕無敢煩之以吏事君不以自喜反作丹陽志媿之説三意若曰無事而食媿吾親媿吾長媿吾友矣余曰不然總餉非南渡後得己之事也况事乆日覈雖有材者不得騁學道愛人之士或攢眉捉筆於其間子獨退食委蛇得以専意古學不累初心矣幸其可以慰吾親不摭細故矣幸其可以稱吾長不負宿昔期待矣幸其可以答吾友幸之多若此槩之以媿可乎否昔孔門髙弟有告夫子以出仕三失者子賤反其説為三得夫子韙之余亦請以子之三媿為三幸云䟦黄緫幹家傳褒忠録余去嵗官京口初識宗人淮東緫幹兄有大每見其議論英發意氣慨然頗不類内地習軟人物輒自喜吾宗有人亦竊意其必有自求者而未悉也中呉再㑹䝉袖示家傳一編及其先大夫死節諸公所以贊頌其褒贈者大軸俾余亦題其後余乃作而歎曰此非其所自來者耶然自江黄入楚而黄以國為姓子孫至今滿東南譜牒烏能詳若以其初皆一人之身也而篤恩意則有不待譜牒而親顧大丈夫生天地間立身揚名増光前文人如兄先大夫以郢州一推官當守将棄城後獨守節巷戰以死至今名耀青史氣干斗牛其為黄氏之榮何如哉事雖不必盡如郢人雖不必盡遇變而義理隨事萬折皆在所當隨所處而得其正而今而徃凡遇一事以上知有國而不知有身此即先大夫郢州東門巷戰之心也豈必死而後見其節或臨利害未毫髪許己私竊為身謀此即先大夫罪人也雖生猶死耳節於何有哉吾徒為人子孫尚皆勉之嵗晩相逢重閱此編當萬萬無媿色書鄭稻田册後仁者以天地萬物為心􅀶施濟衆特其一事庚子嵗中呉大祲郡太守節齋趙公賑救之里人鄭君希舜為之左右此又窮而未遇仁心僅僅發見於此者吾知鄭君必慊然自謂未足而士大夫贊頌乃至大册重重果出鄭君之心否耶雖然亦足以勸來者䟦汪文卿畵梅樂府墨戱皆技耳徃徃一筆一語及於梅輒使人之意也消然梅亦豈易知彼各以技自慊故或借梅以為清描摸詠思未必得髣髴吾見梅之有功於技未見技之有功於梅也汪文卿吾黨士之騷者也嗜梅特甚品别異態手自圖之復手自為之詞使人披展注視一唱三歎灑然神化猶将身與梅一况文卿胷中之自得者乎因嘗詰之一元磅礴不欎不發窮崖沍寒踈英摘索此太極流行之端而乾元之仁之初軒豁也其為茂叔之窻前草也大矣亦可以墨蹟言語求否耶文卿大笑謂此正吾不可形容之妙䟦李荘簡帖建炎四年五月戚方乘國難為冦荘簡李公誓以死守宣城壮矣然國之大事豈繋一宣城哉方是時其行在所相席乆虚御史不薦人望而請决以𣺌茫之夢卜公聞之慨然城圍甫解亟走書屬傅子駿力爭則事已無及向使公不在宣而在朝李伯紀當執大柄中原吾青氊矣事機一失偏安至今非公千古遺恨夫吁䟦洪提幹母夫人墓誌天下當為之事不極不容止凡安於小成而中止者皆志卑氣弱之人也古今自號大丈夫而愧此者多矣孰謂婦人而能之乎嚴陵洪君國梁之母姚夫人篤志教子夫喪服除髽不冠曰兒官母乃冠國梁以是益感厲力學俄魁鄉書親里讙曰兒且官矣母冝冠夫人毅不從國梁再薦又薦凡四捧鄉書親里每輒讙以請皆不從已而國梁之子又以妙齡入太學請者曰不特皃且官孫亦且官二為一殆勝已官者母祖母奈何不冠夫人謂非初誓猶不從嵗已未國梁果擢上第以歸夫人乃不待請而雍容舒徐冠以受藍袖之拜若夫人非所謂不極不止者乎三釜之養方榮風木之悲已及國梁為余言未嘗不涕泣也余謂國梁必欲報而母豈在涕泣間亦如而母不極不止之志而已今而後事君必極其忠治民必極其仁隨其所至惟力是視而死生禍福不問焉國梁以此為今日居官之志即前日太夫人待此以冠之志國梁果能此則夫人為不死何乃同常母悲之而徒涕泣為國梁收淚謝命記之夫人墓銘後鄭資政遺事䟦士大夫同事而不同心始合者終必離惟其離然後賢者之心事白如明道於介甫新法類多矣而余猶於鄭公資政使蜀事有感焉方紹興間秦檜主和議公在蜀與北使於陵贊模爭秦鳯得之蜀頼以有襟喉世莫不以此為公之功而不知此正非公之心也盖公當和議已成猶必拳拳於爭地界者為中國計為恢復計如檜直為金人計耳心之不同如此故檜卒貶公封州以死非所謂始合者終必離而賢者之心始白耶嗚呼禍福非公之所計也天若祚宋公得大柄决不止以保蜀為功此則公遺恨爾䟦金壇李提幹先世誥西岡李君大唐神明胄也示余廣川王以下五世誥寳藏之宻筆澤如新因得考古今之異制有二誥字皆士人楷法而今世則吏筆行書執政吏部官皆大字書名而今世則小書下更加押字於此知前軰請以士易吏及謂押字即古人之書名不必重復者可證矣若夫子孫六百年能世其傳而躡世科登顯仕彬彬然方将與宋無極則武徳正觀濟世之功甚深是又盛徳必百世祀之證也嗚呼盛哉䟦雷侍郎廣州上已泛海詩人心與造化相流通於春為甚浴沂詠歸嘗露端倪矣惜未及施之用爾晉人尚虚無齊死生己與造化之機隔蘭亭之㑹又於死生者戚戚焉不知仰觀俯察所得謂何而乃若是唐曲江最重上已至天子以其節燕公卿於祭酒之堂視永和若倍蓰者然鴻筆大書亦不過以一書生之琴為言流俗誰起而治道得與造化參耶广巖雷公去嵗持節廣南上巳日嘗領客泛海飲酒賦詩相與激昻功名之㑹今年春適來京為祭酒侍鸞輿辟雍講中庸首章大聲渢渢振起六合昔人所謂浴沂詠歸用之則有虞廷氣象倘遂見於此乎果然則此詩其符兆當亦千載重矣書擇軒集後天台李實父以擇名軒余同年進士閬風舒君舉中庸言擇者三章發明其說以為之記始欲其知所擇以自貴於物終欲知其所擇以自異於衆人且再三歎息乎可不畏哉之語所以警切實父之自擇者至矣余復何言然嘗念之古者風俗淳厚能行者未必能言徃徃或暗合於道而不自知近世道學大明性與天道之妙敏如子貢所親灸夫子而不得聞者今童子亦類能誦習其辭而不差然議論日工躬行日慊夫乃徒知擇之云爾而已乎故中庸之言擇善必言固執言擇乎中庸必以不能期月守為戒言擇乎中庸得一善必以拳拳服膺而弗失為勸盖擇之者致察於人心道心危㣲之間書所稱惟精者也既擇矣執之守之而弗失使道心常為之主而人心聴命書所謂惟一者也精矣一矣始於能擇終於無可擇傳不云乎口無擇言身無擇行書所謂執中者也學問之道達乎上下一也要在實用吾心而已夫茍致知之説雖精而力行之心不實則所擇者終非我有吾恐終身不知所決擇也此豈不真可畏也哉實父朝夕此軒而有味乎其辭吾知其必有不能自己於既擇之後者敢誦所聞翊吾同年舒君之説為實父勉張史院詩䟦詩本情情本性性本天後之為詩者始鑿之以人焉然陶淵明無志於世其寄於詩也悠然而澹杜子美負志不偶於世其發於詩也慨然以感雖未知其所學視古人果何如而詩皆出於情性之正未可例謂刪後無詩也東嘉張君魁然開爽士也生逢盛世方将決科發身而髙情逸韻時亦冩之於詩豈以鬢欲蒼而身猶未遇乎余謂遇之遲速命也吾亦求為可遇者而已全體大用本之吾心之天達之天下而凖者聖賢講明炳炳方册尚請君求之詩外題長洲縣學記後長洲大邑也以附城素無學官西州豪士宋君始撤廢佛寺為之壮矣昔靜江郴雷皆撤廢寺為學崇安縣學亦括五廢寺之田以廪士朱張二先生嘗言而特書之方今聖世崇儒士大夫以儒發身吾知上作下應用夏變夷斷斷自吾宋君始豈但一長洲廬其居而鄒魯之耶一日宋君秩滿來京挾所得縣學記禮堂記見示二記皆能於吾道有𤼵明益為宋君喜然縣學記以心為説愚按孔子未嘗單出而言心惟於行已應物實事上見之孟子當人心放僻之時始單出而言求放心不幸爾後異端亦指心為説世之能别是非者殆少禮堂記以明道三代威儀盡在僧飯為説愚按僧皆鰥寡孤獨無養之人聚於一區嗷嗷待哺勢不得不歛縮片時以救飢且因以欺俗眼徐察其情未必知吾儒盤盂衽席之安且無偽程子殆一時有激之言否則門人記述之過不然程子不應譽虜如此區區此心尚期同志有得於二記之外因書其末以諗宋君而還之題琴溪記詠天地間扶輿清淑之氣徃徃鍾為山川之秀猶有勃欎而不能盡者又徃徃鍾之於物雖蟲魚之㣲亦精美殊絶有他地所不能産者此即其證騐人見其非他地之所能産也則從而神其説如江之有膾餘魚越之有秦皇酒甕魚皆謂飲食殘餘之所變而非造化氣類之所成要之亦豈有是理哉宣之琴髙臺下有魚小而極珍世傳以為琴髙昇僊時所棄藥滓故其魚以琴髙滓或以藥滓名此其事之有無不必問而其山川之清淑天地之鍾秀豈不因是可想萬分一余每思濯纓此水之上以致其瀟然物外之思塵鞭尼之未能也一日有寄余以玉塘程君琴溪詠之集者知君方斬蒿洗石搜刓唐宋以來諸賢懸巖之刻挿桞移竹日徜徉其間胷中浩然之存有非可以涯涘者余於是知山川之清淑天地之鍾秀非物之所能盡又一大聚之英矣異日琴溪之名天下豈止如今日記詠之所見而已哉撫卷歆動敬書其末䟦天臺劉養源家藏二駿圖二駿離立潤澤閑雅雖有追風逐電之才若無有然夫子所謂稱其徳者非耶雖然必其不辱於奴𨽻人之手者也䟦赤壁後賦圖東坡再游赤壁霜露既降時也盈虚消息之妙至此嶄然畢露坡之逆順兩忘浩然與造物者游蓋契之矣觀此圖者盍於其水落木脫為李純父題袁蒙齋遺訓䝉齋先生正人也其言多有足服膺者紹父勉焉足矣謹勿更求他人保明恐世俗好䛕適以怠純父之心非䝉齋所望也䟦三山林貢元立武三山林貢士余開慶冬伏闕書時所謂存亡危急之秋也其言之哀痛切至猶人情然也若其畿甸之民瘼事機江淮之兵防要害厯厯如指諸掌非其平日志存當世深思力討亦安能一旦𤼵言動中肯綮如此徃事雖幸再安而良藥不容少廢於病瘳之餘也䟦景行録琴溪程氏之族之盛之乆甲其鄉見於諸公貴人銘誌者甚悉獨其先廣平府君奮自中㣲植深培厚反未有為發其潛徳之光者聞孫玉塘君一旦得其遺事於故箧并裒羣從之銘誌逺以寄示余聞本之壯者枝葉茂觀其欎乎相扶者如此廣平雖未銘愚謂此即其銘矣䟦李參政三峰樓詩一川花栁擁雕欄濃緑浮空四面山便欲移家來此住不將名姓落人間右莊簡李公登桐州三峰樓詩至今傳四方為美談如見桐川圖畵而邦之人亦以之矜喜自負如獲九鼎大吕哆然獨視為邦社之珍是豈徒文墨之妙而能爾哉公早以雄才直節受知我光堯皇帝嘗參大政銳圗恢復雖厄於奸檜志不獲伸而公之名益以是彰明顯大天下凛凛生氣常若其在斗牛間此其為世欽慕雖杖屨所經覊愁所寓一草一木猶將預有華美况公之來此邦實自宣城殄劇㓂戚方琱戈凱回咫尺行京山川效靈日月増耀於斯時也淋浪妙墨絢采流輝固國家休運之闗而三軍喜氣之發也雖被之絃歌登之金匱侈為我朝盛事疇不謂冝而又豈惟増重此邦哉然考是時實當紹興之二年公方克清内冦諸將亦方克清邊患鑾輿連年之巡幸遂方駐蹕臨安功名之㑹如春斯逹而此詩已有不將名姓落人間之語公豈忘世之遽者方公在宣朝廷適嘗擇相御史不以人望薦李伯紀而請求之𣺌茫之夢卜公亟自宣貽書傅子駿使之力爭不勝而恢復之期遂至今日味公此語豈其有感於幾㣲而發耶震以咸淳己巳冬攜客登樓相與誦公之詩三嘆遺跡之莫覩俄有報塵壤間朽木者視之公親筆詩板也字之可辨尚十七八黙計甲子已百三十有八年不有神物呵䕶幾何其不至供斧薪乃亟模而重刻之與舊板對掲樓上既又念舊板得再出已幸重刻板又烏保其乆不壊耶先賢之嘗仕桐川者自范文正公而下新列而祠之郡西震方為立石記其事因亦併模詩入石對立祠記之賔階蓋公先賢之嘗客此邦者也與仕此邦者對賔主亦冝䟦宗忠簡行實嗚呼余讀公行實不能不為天地之綱常哭之慟也方金兵圍京城不下而以和紿我也四方勤王之師坐視不得進公獨曰既曰通和請亟退師設有詭謀吾兵已在城下遂發兵大名至東平至濟州至衛南直入重地據韋城而徙南華轉戰無前矣斯時也使趙野范訥恊其謀則二聖可以不北狩而野也納也其不然方金人擁吾二聖而北天下尚皆我有也四方之勤王而不得遂者紛紛無所向公既尹京尋兼留守如王善趙再隆丁進孔彦舟馬臯趙海楊進王大節之流以兵附者百八十萬契丹九州日附中國且議遣辨士西使夏東使髙麗以滅金已二十五表䟽請回鑾京師矣斯時也使黄潛善汪伯彦不從中沮其謀則中原固金甌無缺之天下而潛善也伯彦也又不其然攷論至此則二聖本不至北狩而終不免北狩者公之謀不遂也中原本未嘗淪没而終不免淪没者公之請不行也嗚呼惜哉自時厥後雖有英雄百戰皆不過救敗扶傷况偏安日乆乎故我宋中興與否係公用舎間他尚何言雖然非公守磁我髙宗已先入敵國雖江南誰與保公雖身不及用尚能為我宋得一岳飛闕孔明圖漢鼎於既失忠簡保天下於尚存故公呼吸變化之功殆過孔明百倍然孔明晚遇族屬疎逺之昭烈尚能堂堂出陣公遇我光堯視一時將相最早反一語之不見酬天耶人耶洪邁吳柔勝序公行事乃皆以祖士稚為比嗚呼彼亦見其不得志而死其迹偶同耳䟦孝義劉氏譜叙劉氏聚族踰十世我神宗皇帝旌表之郡太守清獻趙公記述之方是時特上之人借劉氏以表厲斯世劉氏固不預知也劉氏子孫善風本無恙而乃時出其編以示諸人此固將以發揚前文人之美然亦豈以時異事殊聖朝之所旌表而郡縣之所促迫歟先賢之所記述而俗吏之所忽視歟儻其然豈不重可為世道惜因僭書之庻幾上之人一知䟦李氏記先夫人孫氏藏書訓語李慶元人今居餘姚孫夫人捐奩具置一監書自元祐至今踰二百年寳藏猶新豈惟夫人之賢子孫之賢為何如蓋有夫人之賢則冝其子孫之多賢也然賢婦人起家豈特置書使子孫讀凡其積徳措心為子孫憑藉必有稱是者此書固當寳之不忘此意尤當寳之勿失歇後鄭五歇後者以工詩見稱之名也鄭五者中原風俗止稱姓第不於官稱也且歇後鄭五者其自稱之辭非他人輕訕語也其人厯官多治行見於詩者多憂世語唐因欲相之綮自知時已不可為而不當為賢於人多矣江南風俗以斥大姓第為輕薄語習聞其名望而輕之甚至舉以此類訕笑而不考其實豈不誤哉姑為之辯歇後鄭五作宰相搔頭不敢當自知蓋審也使人人如鄭五則居其官者皆其人豈有欺君誤國復忍貪權固寵之患愚故三嘆三詠於五而贊之曰自知其必能相而相者古今一伊尹也自知其必不能相而不相者古今一鄭五也人皆曰必不能相己獨曰必能相而汲汲於相者滔滔皆鄭五罪人也嗚呼伊尹吾不得而見之之矣得見鄭五者斯可矣䟦臨川張清伯求志齋記孔門稱隱居以求其志非徒曰歸㓗其身之謂也大丈夫生天地間當為天下國家用故窮居隱約日夜講求無非求其所以致君澤民者此孔門求志之事也臨川張清伯負邁徃不羣之氣厯覽江淮險要結交當世名公貴人此其有志當世為何如晩嵗結茅嚴陵自號求志齋且自述其所以求志者甚悉辭㫖慷慨讀者膽張清伯之志可謂乆而益壯者矣然志在我命在天而用不用在時窮則獨善其身逹則兼善天下一唯安其所遇斯可耳夫子曰志於道孟子言士尚志亦惟仁義焉是求愚願清伯惟求其在我以聽之方氏考訂家禮䟦家禮自司馬文正公而下嘗攷訂者五家節目尚或互異士固未能盡見諸家之全或盡見之不參校於平時一旦欲用將安取中平湖方氏始㑹五家手自編校隱然寓折衷之意余雖迫行役未暇遍觀不敢輕易贊一辭然即其用意豈俗學之士可望哉抑禮有本有文因其度數威儀之間而反其躬行踐履之實此則余之所拳拳而願學於方君者也古不云乎禮儀三百威儀三千待其人而後行五家温公晦庵東萊慈湖髙氏題盧計議先世東坡竹金華盧君曽大父從蘇文忠公於黄州得其親題畫竹忠簡宗公又為親題其後夫二公遺墨流落人間富貴家千金􅀶易僅僅一二尚誇竒寳况萃見盈尺間而又皆為盧君家世作者哉咸淳辛未七月題盧計議先父孝行傳世多疑刲股事三代未之聞似與不敢毁傷相反不常開元間陳藏器撰本草拾遺言人肉治羸疾故刲股事始見於唐古謂戰陣不勇非孝而以殺身為成仁方父母危急如其可贖孝子仁人雖九殞不恤也曽謂刲股救父母而可議其非孝乎盧君之尊翁穴腦以救母其事視刲股為尤難先朝以宣付史館且旌表之冝哉䟦濮陽衍慶集本朝由掄魁至宰輔勲銘彛鼎與宋無極者惟吕文穆與李文定二人翠華南來世臣與俱其治行著聞代不乏人者亦惟此二人之後數年以來文定子孫稍稍寂寥余每慮文獻之無所考一日遇其雲孫提幹相於山隂江之上出示鉅編自文定以來片言隻字凡散見諸書莫不裒類所以篤念已徃垂詔方來者未嘗不三致其意碩果不食喬木尚存他日有文獻故家熖熖復起自東南者豈惟東萊先生一吕氏而已哉因喜而書其後題白鹿晏洞賔濟美録臨川先哲最多名世然求其實行乆而不磨者惟元獻公咸淳六年夏余假守此來方将拜公遺像以致髙山景行之思一日其聞孫出所謂濟美録取而伏讀之乃公之後尚書公紹興奏藁及尚書之後太學生嘉定伏駐書力爭和議不可信稟稟有生氣與公康定議兵前後一脉信矣實行之不可磨者其傳愈乆而不可量不然清苦緦俗自詭堯舜其君嘗鼔一世而從之者當時聲艶視公非不尤熖熖也今其後為何如松栢根深千嵗扶踈榮華飄風過眼而散余於是乎有感尚祈公之後益致勉於公之實者云䟦晏司法族人舊學二字我仁宗皇帝取商髙宗舊學二字親洒宸翰以賜先正丞相元獻晏公公之六世孫夢聖復立屋祠堂之側求尚書矩山徐公大書其扁以掲之而需震為之䟦顧晩末何能頌萬分然嘗妄謂髙宗於甘盤學焉未竟即服勞於外其後髙宗赫然中興者傅説之功居多孰若仁宗之於元獻學焉而復相之四十二年之治光明俊偉卓絶古今是又合甘盤傅說一人而反過之耶舊學之扁特不過逺借三代遺芳爾殆未足以盡我朝盛事若夫追蹤前人使舊者常益新則尚惟後之人題李縣尉闕所作石門尉李君其先盖世登晦庵先生之門以儒科顕固名家子也一日䄂詩一編屬余為之辭詩非余所習其何敢僭然晦庵亦少攻於詩顧晦庵之所以為晦庵者不在詩耳姑舎是而言其要者可乎孔子之道中行而已漢唐溺於訓詁於斯為下故伊洛始以性理之說拯其溺時不幸異端談空謂見性成佛即心是道與性理之説大相反而適相亂於是學於伊洛者徃徃反隂為其所移而不自知天生晦庵又出而救其過髙之偏極辯力詆使學者用工平實以合乎孔子之中行余自幼至老所學者此而已雖生慈湖先生之里而慈湖以覺為超悟與孟子言先覺覺後覺主於開曉後進之覺不同以道心為道即在心與帝典人心惟危道心惟㣲理欲對言之道心不同故惟敬其人而未嘗究其學今李君來書謂余道本慈湖未知君所得家庭之學本於晦庵者果何如而援取及此豈以慈湖之學出象山余居慈湖之里而君居象山之里姑為是附豫者乎義理之公不得以鄉曲而私精㣲之辯不得以依違而混君誠反而求之則詩有不待言者矣䟦新豊饒省元伋義貸倉朱文公社倉之法善矣然天下無乆而不弊之法變而通之則存乎人昔孝宗皇帝頒其法於天下已戒官府無得與今行之以官者果或倚之以虐民文公記社倉已預防其流弊今行之以私者果或借之以豐已是豈立社倉之本皆然哉臨川新豐之饒氏獨變通其法名曰義貸以一家之力自為之而無闗於官以一分八釐之息裁酌之而收僅五釐盖他人慕其名故其傳愈乆而愈弊饒君祖其實故其法愈約而愈精利害之相反特在名與實之間嗚呼明乎饒氏義貸之説者可以善學文公矣此所䟦操若在舍則無本無形何可拘執無時節莫知鄉本無所何可測識姑指曰此此即所也不必拘執不必測識養之自長長而不設勿妄勿助至於純熟無此無非此無所無非所予欲無言天何言哉景定甲子嘉平月書右包宏齋文江貴益䄂示宏齋包公所書此所二字及為此所之説數十言屬余發明之余驟見莫之曉也辭不獲再三為之玩味亦再三見其字畫則真率議論則髙虚殆自得其得者乎要亦終莫之曉也莫之曉其何以塞命始亦采宏齋之説而意之宏齋之説曰操若在舍則無本無形何可拘余竊意其述孟子之言心爾抑孟子言操則存存非若在而已也言舎則亡亡者不存則失之耳非本無也操存舎亡孟子正欲人操而不舎以求放心若曰何可拘又幾謂心為不可操冝任其舎之也何其與孟子之本㫖異乎将别有所指者乎或自得之得果非它人之所能曉者乎貴益必有得於宏齋之面授者敢諗書曹氏作鳴鶴錢氏還珠頌後蚕方浴而桑生兒方産而乳生果孰使之然者天之生斯物必有以養此物理固然爾然世之利而忘義者徃徃為子孫計不知或父祖富而子孫貧或父祖貧而子孫富分量各殊雖父不能以子其子聞有以貪而禍其後者矣未聞貪而能使其後人世守者也奈何不為義是思而甘心為錢氏罪人者滔滔耶書鳴鶴方孝子贊後方孝子刲股救母小山曺君有贊太學童君亦屬和有集何物庸妄犬尾其續率反其説主孝經不敢毁傷一語為孝子疵吁不敢毁傷聖人為不孝其親者戒豈為孝其親者戒耶古之孝其親者期全以歸之不敢一毫不謹以自䧟於刑辟甚至登髙臨深有戒曽子啓手足示無毁傷是也若孝子之刲股救母其類䧟刑辟不可啓手足者否耶其心果出於孝抑一朝之忿而忘其孝耶父母死生之判僅毫髪隔如其可贖百身不惜此時此意孝子雖九殞甘之况割父母遺體之萬分一可以再活父母全身倉荒一念它不暇恤人謂其孝不知人謂其不孝亦不知而小人平居無戚輙􅉫弄輕薄口訾其不孝果誰為不孝耶且使聖人復生為天下萬世立中訓謂君子之過過於厚篤孝可念可也直謂其非孝聖人忍乎否耶刲股救母為非孝則成湯之剪爪禱雨為不仁太宗之剪鬚和藥為不義曺文叔妻夏侯之割耳王凝妻季氏之斷臂非貞烈而凡捐軀報君者非忠耶古稱戰陣不勇非孝謂死得其所為孝也死之視毁傷孰輕重耶刲股救可活之母為非孝溺身尋不可再活之父不孝當愈甚而曹娥獨以孝稱萬世何耶世俗漓矣美事勸之未必效不肖者戒之未必懲刲股救母曠世一二見彼豈慮效之者衆而訾之以戒之耶削髪者幾人文身者幾人繋囹圄鞭皮膚甚至身首異處而亡者幾人行身䧟不義以為父母辱其為毁傷滋大也彼皆不之訾而獨刲股者訾之耶豈孝經隱奥世莫之聞而彼獨聞之出以告未知者耶殺身成仁與全身者同歸道並行而不相悖粗有識者知之不意有物庸妄若此其甚敢以毁傷疵孝子也且刲股非毁傷也余少時東鄰張五為樂工母病刲心肝食之即愈先君子問状備言横束剃刀於梯深夜焚香禱佛袒胷燭之肝即出無痛一二日瘡即合無瘢㾗若然果毁傷以為親憂耶毁傷得其所猶不當以毁傷言况實不毁傷耶彼忍於訾孝子以敗天下為善之心者真無人心也真不孝之尤者也不毁傷其髪膚而毁傷其義理真毁傷者也作孝子毁傷辨開元間陳藏器撰本草拾遺云人肉治羸疾自此閭閻相效刲股世乃疑古聖人無之蓋弗考也樸齋史景臯以樸名齋世率嘉其以富貴而能儒素樸必儒素而後能者歟士君子修身見於世道合則從否則去如司馬公輩雖位至宰相何樸如之不然摇唇弄筆萌心鑽刺雖家蓬蓽而身韋布太樸之散乆矣景臯王之孫公之子朝廷待以異等畀陞擢差遣不就而就幕府從事此真可與言樸者盍指其本而告之曰斯世文弊瀾倒雖講學亦日競於虚文子弗幸少年能文章善筆札皆漓其樸之具也其必一切反是惟孜孜躬行循是以復公侯之舊亦惟以行道救世為心不容一毫安排計較心庻幾樸之全者哉寧國程新恩易圖易出於河圖故學易者徃徃為之圖然於易未必皆有補邵子畵先天圖自震至乾陽長而三自巽至坤隂長而三圓其外以象天之動乾始於西北坤極於東南方其内以象地之靜於以推測伏羲畫卦之本體與説卦八卦相錯之説合其學始見尊信於天下然亦未有能整圓轉方稜角為圖以應甲子節氣變而合文王後天之用者宣城程君自古庠擢第将歸别余于官宅留示其兄玉塘君爻象承乘之圖以乾位乎正南以坤位乎正北而包六子其内自坤而東轉一陽為復二陽為臨至三陽為泰則位正東大壮之四陽夬之五陽又自東極於乾焉而西轉一隂為姤二隂為遯至三隂為否則位正西觀之四隂剥之五隂又自西而北極於坤焉坤再為復生生無窮伏羲先天之體遂有合於文王後天之用易道隱賾雖非余晩學之所能知然使玉塘君非真有精深之力超特之見亦安能變通先天之妙如此哉仰聞邵子以圖數言易雖二程與之同時亦未嘗過而問繼此兼明其説者惟一朱子朱子嘗謂先天圖八卦為一節不論月氣先後今玉塘君變先天而順月氣其分其合果何居耶異日朱子又謂震一陽離兊二陽乾三陽為圖之左屬陽又以巽一陰坎艮二隂坤三隂為圖之右屬隂夫既以三而分屬左右自三而各重之即為十有二矣又謂先天圖一日有一日道理一月有一月道理且以自坤而震象月之初生乾以象月之望坤以象月之晦天自日而月可配之弦望晦朔則自月而年亦可配之十二月氣矣玉塘君得無以朱子之學善學邵子不泥其論月氣之説則亦不泥其方圓之圖耶先聖作易以前民用邵子先天本之華山陳氏亦以氣數占來使民知吉㓙避就之所在玉塘君之圖之辭曰以之經世尚奚難哉其用心探討思濟斯世為如何然邵子本以經言常以世言變常變相生推演以至元㑹而世者三十年一小變云耳玉塘君将移其説以治世豈無自得之妙乎面質未能姑逺貽其説以諗之䟦壺溪程君晝簾藁後余與壺溪程君舊相與聫事於浙西之臬司知其為義理之學踐履之士也閱數年辱其寄以巨編來撫州乃文從字順辭達理明有平生從事於翰墨者所不及然則士能先立其大者亦何施而不可哉咸淳辛未十月臨川李君逹齋説臨川李君闕以達名齋而求説於余余謂達之義有二有逹官之達有達人之逹吾徒亦求為逹人而已達人之義亦有二有遺落世事放詩酒而齊死生以為達有致知力行脫凡近而遊髙明以為達吾徒亦求為致知力行脫凡近遊髙明而已然學如顔子猶未逹一間達豈易言哉余故盡列其所聞使李君擇焉而勉之者夫在家必達在邦必達則惟修其在我而無求於人鼓鐘於宫聲聞於外有不期而達者亦有求達之心所謂是聞也非達也尤不容不謹其辯䟦俞奉使北轅録庭椿奉使俞公身入京洛厯覽山川訪問故老歸而録之慷慨英發意在言外而中原之故老皆我宋之遺黎一一能為奉使公吐情實亦足見忠義人心之所同覽之不覺流涕或者因以忠信行蠻貊褒之是置中原於度外弃赤子為龍蛇也嗚呼豈奉使公作録本心哉䟦葉美叔瞽談余至撫之明年有龎眉白髪之儒授書一卷以示則乃翁葉君英叔之作丞相周益公所嘗訂正而嘉歎者也因敬取而讀之其文徃徃温平而暢逹其論經㫖多發明其論史事皆的確其大要一本於義理而無毫髪揣摩之私推是也以徃足斷天下事矣然君終於不遇今君之子又不遇而且老矣聞君先世多顯宦而子孫獨抱遺經非學校無以為養前之所積如此今之所守如此終當有推此以斷天下事者在益免之而已䟦姜山黄借庵集吾宗借庵先生文章光明發越無一不本於理如駈蚊一篇雖似出戱作而聲其不仁之罪凡四且謂虎猶可徳感鰐猶可文駈蚊最不靈乃為血肉一飽不滅其身不止其借以垂世戒亦辭嚴義正矣使先生得志當世其好賢惡不肖豈不明白大丈夫也哉然慈湖楊先生鄉之儒先領䄂也嘗作夜蚊詩以蚊之傍耳皆雅奏其觸面皆深機諄諄誨人而頑錮莫曉又若謂為蚊為最靈然豈别有見歟咸淳八年九月侯子立夀康説宜黄侯子立去嵗求余書夀康字今年省母又求余為夀康之説余觀夀而康本魯人頌僖公語而僖公有夀母焉子立之意不在兹乎然必有為之本者夫子曰仁者夀又曰仁者靜靜亦安康之意也仁者天地所以温然而生物人得之以生而主於心此人之所以為人故曰仁者人也子立於斯而致力焉則可以夀而康而所以俾其母之夀而康者於斯在矣若夫昌黎詠李愿之夀而康是特肥遯者之事不足為子立道䟦江玉汝文集理學大明於本朝文字之不根於理者固非所問主於明理而發者亦豈今世之所少特慮文之盛實之衰爾玉汝先生江公邦直逺究濓洛之學而近師晦庵先生嘗為進賢令極力賑荒寛租下戸及宰永興以去就爭寃獄其在廣西又爭不當増綱馬廐置雖有朝㫖不暇恤此濓溪提㸃廣西刑獄之心此程明道出宰上元之心此朱文公守南康持節浙東之心而大學之正心本之格物致知而逹之治國平天下者也其實知此其發越為文所謂仁義之言藹如豈不休哉余故竊誌其編末使學者無徒求其文云䟦雷道士詩臨川道士雷齊賢示余詩一編筆力老蒼渾然成章軒轅彌明苦澁語避三舎矣盖彌明道士也齊賢非道士也儒生之窮有所託而逃焉者也觀己酉科舉後詩令人三嘆雖然安知無築舘雞籠山起君講授如君家故事者耶䟦樂全先生歸鴈詩樂全先生歸鴈詩辭語老蒼筆畫精健前輩泰山巖巖彈壓浮薄氣象猶可想見䟦張北海手澤建炎戊申正月十八日知濰州北海縣張侯巷戰死國難一室殱焉獨其子将仕君先是以宣和癸卯嵗生外家趙氏外家携之逃入蜀不與難亦不相聞知自是展轉訪求者三十有二年始聞其事於族之南落臨川者将仕驚慟追服痛無所寄復又得族之南落金壇者授之以侯舊所予太夫人書及侯之父朝奉公所予宗忠簡書見之如見祖父蓋凡世之阡隴松楸家廟遺像凡可追孝前人者将仕望絶天涯一不可復得惟此二書之存故将仕傳之子子傳之孫距今一百四十五年寳此書以寄此痛者厯三世一念如新侯之忠何如哉侯之子孫之孝又何如哉夫何将仕雖該恤典貧終其身不得仕今其孫三領鄉薦書阨於命又未得仕天之報施善人固如是耶嗚呼忠孝者萬世之綱常實國家之與立窮達者一時之氣數非士君子之所暇計余行天下凡見以先世書求䟦語者徃徃軸大如牛腰所求必盡當世之貴人張君此書平生不以示人而獨以示余盖他人文墨之事侈大之心也張君忠孝之事哀痛之心也余故太息而為之書且以誌無力援手之媿爾雖然皇天佑宋忠孝之門其有不興也哉䟦耘溪慙藁文所以建理理者文之本法度則其枝條詞藻則其華實無非自然而然初無定形要歸於陽和暢逹自近世以刻楮為工而知意味者絶少去嵗越上始見同官東嘉宋飲氷及來臨川又始識耘溪危君皆前軰之所謂文而無刻楮之弊者也君驪塘諸孫嘗受業呉荆溪之門固宜出於流俗也書李侍郎墓誌後士大夫揚名後世本非有所待而傳茍有待而得所附矣則又無俟乎他人之誦述張法曺唐小官以昌黎銘垂後世得所附也世豈復有助昌黎為之語故吏部侍郎李公我孝廟朝名法從其傳也豈有待况得南軒先生誌其墓而又得晦庵先生為之書其為昌黎之銘也不其多乎其曽孫新賀州司戸乃出刻本求余語過闕惟一先生真蹟屬他位子孫藏守今已為有力者所得此則司戸君遺恨有不容不記者然為人子孫追蹤先烈以益顯其祖亦何儒先真蹟之待哉䟦臨川王氏繋辭解之佐字國材易示吉㓙所以吉所以㓙則有理存焉自晉人以老易並言遂矯誣聖經以證虚無之學至吾伊川始言理以究其精㣲晦庵始言吉凶以復其本義繼此言易者紛紛匪贅則鑿否則淪於虚無者有以臨川鄒氏解六十四卦其有王氏繼之解繋辭始明白守正不襲用二先生之説而理自然相符其學識之正何如哉然其書猶未顯於世雖其後人出以見示猶自謙謙謂不過平説爾余嘗考二氏與陸象山同以明經薦于鄉名聲實相上下象山以解經為非至今名聲振天下二氏帖帖正理於自解經没世而名不稱出竒者爭傳守正者無聞天下事每如此既録其副因三太息書元本而還之䟦勉齋集某淳祐丙午春得勉齋文集於山隂施侯徳􅅷衡陽本也後二十七年來撫州推官李君龍金衡陽人復以其本見遺則字之磨滅不存者已十二三因思飜刋於江西倉司而丙午所得本留故山欲借别本證磨滅不存字闔郡咸無之方以書不復全為憂未幾臨汝書堂江君克明招臨江董君雲章偕來其家收勉齋文最備謂初得衡陽本十卷次得巖溪趙氏所刋本二十四卷次得雙峯饒氏録本書問一卷次得徽庵程氏録本書問一卷次得北山何氏録本答問十卷近又得三山黄氏友進刋本四十卷凡衡陽巖溪雙峯徽庵本皆在焉而又多三之一獨無答問某因舘致董君盡求其書屬幹辦常平司公事趙君必􅱸相與裒類為勉齋大全集董君云衡陽本㝡初刋有妨時有不盡刋故為㝡略巖溪所刋雖略増其板已燬於火三山所刋分類多未嘗聞亦頗散失此集真成大全矣并記其説如此勉齋嘗宰臨川倉司既祠晦翁并祠勉齋勉齋祠堂記峨峰黄氏所作能𤼵明晦翁勉齋相傳之正併刻附卷末咸淳九年二月修撫州六經䟦六經官板舊惟江西撫州興國軍稱善本已未金人偷渡興國板已燬於火獨撫州板尚存咸淳七年某叨恩假守取而讀之漫滅已甚因用國子本參對整之凡換新板再刋者一百一十二計字五萬六千一十八因舊板整刋者九百六十二計字一十一萬五千七百五十二舊本雖善中更修繕任事者不盡心字反因之而多訛今為正其訛七百六十九字又舊板惟六經三傳今用監本添刋論語孟子孝經以足九經之數任其事者友人将仕郎餘姚髙夢璞咸淳九年二月修撫州儀禮䟦儀禮為禮經漢儒所集禮記其傳爾自禮記列六經而儀禮世反罕讀遂成天下難見之書撫州舊有刋板某以咸淳七年來撫板已漫滅不全聞淳祐九年本州初建臨汝書院時嘗模印入書閣取而正之則此時書板已多不可辯盖此書之不全乆矣因徧於寓公尋借得蜀本參對而足之凡重刻者六十五板計字三萬四千三百八十五補刻者百六十九板計字二萬三千五百六十七幸今再為全書云咸淳九年二月䟦張侍御戒顔魯公祠堂記待御張公不附和議終身不復肯仕中興豪傑士也嘗作麻姑山魯公祠堂記言死生有命世不當以魯公罹兇人之禍為戒且厯舉兇人之自罹於禍者尤慘于以堅天下萬世忠臣義士抱道不屈之心詞議精絶讀之神竦其有補世教何如也碑乆不存幾至湮没其四世孫孝友携舊刻示余余因為再刻之祠中咸淳九年六月䟦尹和靖家傳本朝之治逺追唐虞以理學為之根柢也義理之學獨盛本朝以程先生為之宗師也中更新經之説世道遂至於不忍言中天以來程門之學惟和靖尹先生巋然獨存而得程門之傳者亦惟和靖為冣正碩果不食此陽剛之所以來復歟余仕呉門得拜和靖遺象而訪其後人無之及來臨川得見州學正姓尹問之正和靖猶子之孫和靖我朝之碩果學正又和靖家之碩果矣學正出示家傳因太息而書其後盖所感不特在尹氏云和靖每謂語録不可信至晦庵集程録反有疑於和靖而學者多從晦庵余嘗謂晦翁裒集之功固大和靖親見之事尤的今程録中門人竄入禪語者頗多和靖之説其可廢也哉此説己見别書咸淳癸酉閏六月書侯水監行状都水監侯公閔東南六路轉輸之苦引礬水溉畿内瘠鹵成淤田四十萬頃以給京師又築王供掃之决浚運河之淺闢大湖立新堤開直河者凡二千餘里盡瘁勤民至終其身先朝之乆任士大夫士大夫之専心實政乃如此不知掇拾塲屋之緒餘躐取朝廷之美官其風始何時耶侯名獻字景仁其後人子立出示其家藏之編因太息而書其後咸淳癸酉閏六月黄氏日抄卷九十一
