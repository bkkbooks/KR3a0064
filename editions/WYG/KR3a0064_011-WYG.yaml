body:
  text: 黄氏日抄卷十一宋黄震撰讀春秋五成公名黒肱宣公子母穆姜諡法安民立政曰成元年春王正月公即位行即位禮也二月辛酉葬我君宣公五月而葬無冰岷隱於桓公十四年春無氷講義云詩三之日納氷今正月也四之日獻羔祭韭而出氷今二月也左氏所謂西陸朝覿而出之者今三月也大要十二月取氷且取且藏至正月而畢二月出氷至三月而用春秋書春無氷者去年十二月時燠無氷今年之春無氷可出春秋於是時而書之也三月作丘甲周制九夫為井四井為邑四邑為丘四丘為甸一甸六十四井五百七十六夫共出車一乘甲士三人今作丘甲是一丘出一甲一甸出四甲矣變法増賦故書夏臧孫許及晉侯盟于赤棘臧孫許魯大夫臧文仲之子號宣叔赤棘晉地去嵗公孫歸父如晉謀去三桓未返而公薨臧孫許為三桓去歸父之族而歸父奔齊今三桓懼其見討故作邱甲以謀伐齊盟赤棘以止晉兵皆三桓為已計而主之者行父也秋王師敗績于茅戎傳載晉侯平戎于王劉康公邀戎而伐之遂敗于徐吾氏書曰王師敗績于茅戎若曰王師自敗云爾茅公穀並作貿冬十月備四時之首二年春齊侯伐我北鄙岷隱曰宣公在位十八年與齊為好至親且宻成公即位首與齊為仇斷道赤棘之盟將謀伐齊齊安得不伐我愚按斷道之盟晉本徵㑹于齊而適有齟齬耳赤棘之盟則歸父謀去三桓不遂而奔齊三桓怨歸父故謀伐齊齊侯輕躁故先伐魯觀鞌之敗可知齊侯之為人矣夏四月丙戌衛孫良夫師師及齊師戰于新築衛師敗績傳載衛使孫良夫石稷侵齊與齊師遇石稷欲還良夫不可故敗按新築衛地恐齊亦來伐衛而與之遇於新築也六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉郤克衛孫良夫曹公子首及齊侯戰于鞌齊師敗績季孫叔孫怨歸父欲去已不遂而奔齊力謀伐齊晉郤克怨齊婦人笑其跛乆欲伐齊衛孫良夫新敗於齊遂㑹師以伐齊若曹公子則役於大國者也故行父得以四國七大夫之師伐齊齊頃驕蹇自恣臨戰有滅此朝食之語故及於敗曹公子首公穀作手秋七月齊侯使國佐如師己酉及國佐盟于袁婁晉欲質齊侯之母及使齊盡東其畆國佐請背城借一乃得盟自鞌至袁婁近奔五百里袁婁穀梁作爰婁八月壬午宋公鮑卒庚寅衛侯速卒宋文公立二十二年卒傳載其始厚葬衛穆公立十一年卒取汶陽田此本魯地也今晉使齊人歸之冬楚師鄭師侵衛楚以魯衛受盟於晉而伐齊故救齊而先與鄭侵衛木訥曰時楚共新立未能和諸侯晉不於此時反陳鄭於旣夷和齊魯以抗楚乃修一朝之忿助魯衛以敗齊則楚鄭之侵衛實晉致之也晉失此機而楚得盟諸侯於蜀矣十有一月公會楚公子嬰齊于蜀丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀楚侵衛則兵將及魯故公懼而潜服于楚以逆弭楚兵左氏謂之匱盟言畏晉而竊與楚盟也然昔之盟于晉者今皆盟于楚矣可不悲夫蘇氏曰蜀之盟諸侯從楚者十一國晉不敢争其後四十三年晉趙武楚屈建合諸侯于宋然後晉楚之從得交相見又八年楚靈王求諸侯于晉晉人許之然後諸侯始從楚皆蜀之盟啓之也蜀魯地是㑹也魯倡之楚主之三年春王正月公㑹晉侯宋公衛侯曹伯伐鄭宣十二年鄭從楚伐晉敗晉于邲故今晉伐之傳載復為鄭所敗獻㨗于楚木訥曰諸侯冬從楚而春從晉冬盟鄭而春伐鄭何諸侯之不自安不自信也覇主之不作也鄭之從楚乆矣使晉有志於抗楚而服鄭曷若移鞌之役於今日乎移七大夫之勢以廹楚楚必怖移七百乘之兵以伐鄭鄭必服今兵力既盡於齊諸侯旣属於楚而區區摟諸侯於從楚之餘以伐鄭宜其不得鄭也辛亥葬衛穆公及六月而葬二月公至自伐鄭從晉伐鄭而歸也甲子新宫災三日哭新宫宣公之廟也崔氏曰稱新宫者當時之辭也三年喪畢始廟祭矣哀痛之故三日哭也乙亥葬宋文公八月而葬夏公如晉傳云拜汶陽之田也鄭公子去疾帥師伐許岷隱曰左氏載許恃楚而不事鄭鄭子良伐許甚矣鄭之不度德也鄭方得罪中國晉帥諸侯伐之鄭當恐懼謝罪顧以許不事已遽至興師至冬復伐許木訥曰楚越許而後至鄭許弱不能抗楚折而歸之今鄭無謀亦折而從之又連年伐許是自撤藩籬以開楚冦也公至自晉謝得汶陽田而歸秋叔孫僑如帥師圍棘棘汶陽之邑齊以歸魯而棘不服故圍之先儒謂本魯故邑而今不肯歸者畏稅畆丘甲之苛政也大雩禱雨之祭大者僣也晉郤克衛孫良夫伐廧咎如廧在良反咎古刀反晉滅赤狄其餘民散入廧咎如故伐之廧穀梁作牆公羊作將冬十有一月晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟二大夫同時而聘魯方畏晉待其大夫不敢與列國齒故丙午盟晉丁未盟衛鄭伐許程氏曰鄭附於楚一年而再伐許四年春宋公使華元來聘傳曰通嗣君也葢宋共公初立三月壬申鄭伯堅卒鄭襄公立十八年卒杞伯來朝將黜叔姬先來言其故夏四月甲寅臧孫許卒宣叔也臧文仲之子公如晉傳載晉侯見公不敬公欲叛晉季文子不可曰晉侯必不免張氏曰晉景公勝齊而驕故魯欲叛之也葬鄭襄公三月卒夏而葬速秋公至自晉夏如晉而今歸也冬城鄆岷隱曰鄆有二東鄆莒邑魯所爭也西鄆魯邑今新城也定公時齊歸鄆讙龜陰之田杜氏謂此三邑者汶陽之田也魯既得汶陽故城鄆以為固左氏謂欲叛晉而城鄆者非也木訥曰西鄆近齊以為懼齊之復見奪則然矣左氏以為備晉則鄆去晉逺矣鄆公羊作運鄭伯伐許鄭於是三伐許矣况今悼公居喪未逾年親自伐許石氏曰父伐人䘮子以喪伐人五年春王正月杞叔姬來歸内女見出曰來歸仲孫蔑如宋蔑孟獻子也如宋報前年華元之聘也夏叔孫僑如會晉荀首于穀左氏曰晉荀首如齊逆女故宣伯餫諸穀注穀齊地也岷隱曰魯畏晉故其大夫逆女而僑如饋之首公羊作秀梁山崩梁山韓地晉滅韓故属晉左氏傳晉召伯宗伯宗以重人之言告以山崩川竭君為之不舉秋大水書災冬十有一月己酉天王崩周定王立二十一年崩十有二月己丑公會晉侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢左氏載許靈公愬鄭於楚鄭悼公如楚訟不勝故請成于晉岷隱曰鄭之貳晉久矣一旦請成于晉晉所甚喜故會諸侯以同盟以侈鄭人之服晉景公於是有驕泰之心矣蟲牢鄭地六年春王正月公至自會去冬同盟蟲牢而今歸也二月辛巳立武宫岷隱曰按左氏云季文子以鞌之功立武宫非禮也聽於人以救其難不可以立武如左氏所言則武宫者猶邲之戰潘黨請楚子欲築武庫之類也公羊之說則不然以武宫為武公之宫按明堂位曰魯公之廟文世室武公之廟武世室也岷隱蓋兩存其說木訥曰魯祀周公為太祖伯禽為太室記禮者出於春秋之後見魯立武宫遂有武世室之語蓋不經矣鄭夾漈曰武宫講武之宫自鞌之役四卿出而大得志故立武宫備戎事也是不以為廟也然愚按武公名敖伯禽九世孫成公十一世祖若果世室不應中毁木訥夾漈之說似矣然昭公十五年有事于武宫注云武公廟成公復立則謂武宫非廟不可也或者季孫行父以伐齊為功故立武宫以誇如前二義皆兼之歟取鄟音專左氏傳注鄟附庸國也公羊以為邾邑未知孰是然諸家多從左說衛孫良夫帥師侵宋左氏載晉帥鄭衛侵宋晉師過衛欲襲衛伯宗止之師還衛人登陴葉石林曰與經絶不相類且晉衛侵宋而反欲襲衛亦首尾自相戾愚按此止當依經文衛師侵宋夏六月邾子來朝邾久不朝今朝以修好公孫嬰齊如晉嬰齊者叔肹之子子叔聲伯也髙閌集注曰晉召之欲使魯伐宋也蓋本左氏說壬申鄭伯費卒鄭悼公立二年卒秋仲孫蔑叔孫僑如帥師侵宋左氏謂受晉之命而伐之也然去年蔑方報華元之聘今遽為人役而伐之又二子各私其軍潜師侵掠且宋一辭㑹晉旣命衛伐之又命魯伐之皆非也楚公子嬰齊帥師伐鄭討其從晉且鄭新喪而伐之此其為楚也冬季孫行父如晉傳謂晉遷新田而賀之也晉欒書帥師救鄭左氏載欒書出而楚還趙同趙括欲戰欒書力遏之亦還岷隱曰晉無亡矢遺鏃之費而卒収救鄭之功主將善御下也救公羊作侵七年春王正月鼷䑕食郊牛角改卜牛鼷䑕又食其角乃免牛孫炎曰鼷䑕如䑕狼鄭夾漈曰草䑕而㣲黄愚聞之師曰甘口䑕也噬人畜不知痛木訥曰改卜牛而又食其角天示譴也說者以為養牲不謹非也天豈享僣哉吳伐郯吳今平江府郯今淮陽軍下邳縣相去本隔江淮二水而伐之者吳始大也於是季文子有中國不振旅蠻夷入伐之憂初吳本受盟於楚自楚之申公巫臣沮子重所請之賞田挾子反所欲之夏姬逃於晉而子重子反殺其族巫臣自晉適吳通吳於晉教之射御戰陳以叛楚蠻夷之属於楚者吳盡取之至是而又陵中國矣楚之患漸定而吳之擾方始岷隱曰荆之始見也入蔡吳之始見也伐郯中國莫之問故駸駸焉交亂中國夏五月曹伯來朝曹無魯好者再世矣今宣公來朝修舊好也不郊猶三望不容郊天而猶祀地此襲用僖公之繆舉也三望之義已見僖三十二年秋楚公子嬰齊帥師伐鄭公會晉侯齊侯宋公衛侯曹伯莒子邾子杞伯救鄭八月戊辰同盟于馬陵公至自會岷隱曰楚再伐鄭晉再救鄭晉侯為之大會諸侯亦能囚楚之鄖公鍾儀以獻於晉其勢可以有為矣伊川曰同盟于馬陵者諸侯同心病楚也時莒初服莒舊服于齊今齊來而莒亦隨之也吳入州來州來今壽州下蔡縣故蠻也楚人取之為邑而吳今入之吳楚之争自入州來始蓋入州來則宋近楚冬大雩穀梁曰冬無為雩也或者雩本旱祭魯末俗用為他祀與衛孫林父出奔晉孫良夫專兵而林父世卿故定公惡之而奔七年而晉侯强反之於晉終以戚叛則定公惡之是矣八年春晉侯使韓穿來言汶陽之田歸之于齊二年行父從晉伐齊取汶陽田齊既敗而事晉故晉又使魯歸之於齊七年之間一予一奪皆制於晉行父私於韓穿曰汶陽敝邑之舊也然不敢争晉欒書帥師侵蔡蔡廹於楚自翟泉與盟之後未嘗從中國盟㑹文十五年晉郤缺伐之不能反前年晉欒書救鄭因而伐蔡楚師救之不戰而還晉未得志故再侵蔡遂侵楚獲申驪公孫嬰齊如莒左氏謂聲伯因聘而逆婦宋公使華元來聘夏宋公使公孫壽來納幣來聘者聘共姬也宋公使來納幣者宋公自主之也共姬魯成公姊妹為宋共公夫人晉殺其大夫趙同趙括葉石林曰趙朔晉侯之壻朔死而同括之弟嬰亂其室同括不請於君而放之齊於是朔之室譛於晉侯使欒氏郤氏證同括將為亂而殺之愚按同括嬰皆盾之弟朔盾之子武又朔之子隨朔之室畜於公宫祈奚韓厥言於晉侯曰成季之勲宣孟之忠而無後為善者懼矣乃立武為趙氏後是無程嬰杵臼之事也安有晉侯外孫畜於公宫而待外人抱匿之者哉况殺趙氏正朔之室之謀非欲殺朔之子也秋七月天子使召伯來賜公命岷隱曰魯十二公獨文成二君身受王命文公拜命之後猶能遣叔孫得臣如京師成公無是也後四年因㑹伐秦道過京師息汗馬之勞爾愚按魯不請命天子反賜命而魯又不往拜之春秋之世倒置一至於此賜公穀作錫義則同天王天子王者之通稱亦非有異義泰山孫氏云冬十月癸卯杞叔姬卒左氏曰來歸自杞故書晉侯使士燮來聘叔孫僑如㑹晉士燮齊人邾人伐郯士燮來聘者以郯成於吳而請伐郯也魯於郯為親賂使緩兵士燮脅之行父懼而使宣伯㑹伐郯士燮曰郯蕞爾小邦何足以煩二國之謀而重勤四國之師哉非難於郯難於吳也薛氏曰吳伐郯不能救郯服吳則伐之諸侯無所措手足矣衛人來媵諸侯娶一國則二同姓之國往媵之國三人凡九女伯姬將嫁故衛來媵伊川謂伯姬賢故書九年春王正月杞伯來逆叔姬之喪以歸孫覺經解曰叔姬者杞伯之出妻也杞伯生絶其妻死歸其䘮春秋以其非禮書之趙氏曰叔姬絶於杞而卒於魯則宜葬於魯公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子杞伯同盟于蒲公至自㑹傳謂歸汶陽之田故諸侯貳于晉晉人懼而㑹于蒲張氏曰自此執鄭盟魯紛紛甚矣蒲衛地今屬開封二月伯姬歸于宋夏季孫行父如宋致女晉人來媵岷隱曰伯姬之賢魯人尊之故既歸宋復使上卿致女以撫問其已至晉人來媵亦媵伯姬也秋七月丙子齊侯無野卒齊頃公立十七年卒晉人執鄭伯晉欒書帥師伐鄭鄭自邲之戰從楚者十年自蟲牢馬陵之㑹楚方備吳未暇争鄭鄭在晉者亦五年今年蒲之㑹鄭方從晉楚以重賂求鄭鄭復會楚于鄧故晉執而伐之然非禮甚矣適以激鄭之貳冬十有一月葬齊頃公五月而葬楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆莒今宻州在吳魯之東楚越吳魯而伐之國小而潰鄆者莒魯所爭之邑楚又乘勝入鄆秦人白狄伐晉傳曰諸侯貳故也趙氏曰宣八年晉成以白狄伐秦今秦桓亦以白狄伐晉狄介秦晉之間惟强者用之鄭人圍許時鄭伯方執於晉而鄭反圍許傳謂此公孫申之謀示不急君也岷隱曰豈有君見執外示不急之意反興師以伐人有如激晉侯之怒其不重為君累者鮮矣按明年鄭伯歸殺申以鄭用其謀改立君也城中城注中城東海邑木訥曰楚伐莒入鄆逼近魯故城中城以備不虞或曰魯之内城十年春衛侯之弟黒背帥師侵鄭左氏曰晉命也夏四月五卜郊不從乃不郊天之不享僣禮如此五月公㑹晉侯齊侯宋公衛侯曹伯伐鄭鄭用公孫申之謀置其被執之君不問立子繻見殺乂立髠頑晉欒成子曰鄭人立君我執一人焉何益不如伐鄭而歸其君以求成焉趙氏曰晉景公欲歸其君而鄭不求欲殺其君而鄭不服故靦顔以合諸侯伐鄭而歸之齊人來媵媵伯姬也異姓來媵非禮也丙午晉侯獳卒獳乃侯反晉景公立十九年卒許氏曰當景之世楚莊入陳圍鄭圍宋敗晉于邲中國大絀徒從事赤狄潞氏迨楚莊没始得為鞌之役以服齊僅不失覇岷隐曰晉景嗣覇數勤諸侯相與同盟一曰斷道二曰蟲牢三曰馬陵四曰蒲蒲之盟以歸汶陽之故諸侯貳晉爾木訥曰晉自蟲牢始得諸侯宋公一言不順即命魯衛伐之旣而晉以齊厚於已反前日所取於齊以予魯之田復以予齊故諸侯貳晉秋七月公如晉公如晉奔喪傳云晉止公送葬諸侯無在者先儒謂奔喪㑹葬臣子之事也公自取辱葢晉以反魯汶陽之田而疑公故辱之冬十月書備四時公羊傳無此三字十有一年春王三月公至自晉公留晉凡九月始歸晉侯使郤犫來聘己丑及郤犫盟夏季孫行父如晉犫尺由反公自汶陽之田歸齊欲貳晉而不果然嫌隙已開晉因公之朝而止之數月左氏謂公請受盟而後使歸郤犫來聘且涖盟季文子報聘亦涖盟也秋叔孫僑如如齊傳云宣伯聘齊以修前好張氏謂廹於晉之辱而不得已者也岷隱曰晉使我歸田于齊齊未嘗遣使至魯是德晉而怨魯也今僑如修好未幾而求昬齊卒無報聘則魯為齊弱久矣冬十月書備四時十有二年春周公出奔晉傳載周公楚惡惠襄二族之逼又與卿士伯與争政怒而出奔王使劉子復之三日復出奔晉是自絶于周也夏公㑹晉侯衛侯于𤨏澤傳載晉使楚囚鍾儀歸求成於楚宋華元因是合晉楚之成鄭伯如晉聽成㑹于𤨏澤成故也木訥曰晉厲初立而求諸侯於是為𤨏澤之㑹然所㑹者魯衛而已左氏載宋合晉楚之成鄭人聽成考之於經無一毫合不知何年之事而左氏誤附也愚謂止慿經文足矣𤨏澤公羊作沙澤秋晉人敗狄于交剛傳載狄侵晉晉敗之于交剛岷隱曰春秋時狄患最重齊覇之初狄方為患威公不能治也晉覇之衰狄人㣲弱晉乃能屢勝之春秋於晉敗狄之事纎悉備書幸中國之猶能自强也冬十月書備四時十有三年春晉侯使郤錡來乞師二月公如京師夏五月公自京師遂㑹晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦曹伯盧卒于師秋七月公至自伐秦傳載秦桓公旣與晉厲公為令狐之盟又召狄與楚欲道以伐晉故晉使吕相絶秦而帥諸侯之師及秦師戰于麻隧秦師敗績張氏曰晉以私怨報秦其義不足以令諸侯故卑辭以乞師諸侯已絶迹於京師一百餘年今因伐秦過周因講朝禮故書如京師而不書朝以見諸侯之行止為伐秦而不為朝王也戴氏曰公無朝王之心道過京師不得已而行朝王之禮書公自京師書公至自伐秦見初心之所存而終事之不可掩也曹伯盧卒于師傳曰閔之也蓋曹宣公立十七年為晉役而死于行不得其所也冬葬曹宣公傳載子臧逆宣公之喪公子負芻居守乃殺其太子而自立旣葬宣公子臧將亡國人皆將從之負芻懼告罪且請焉子臧乃反而致其邑子臧賢公子季札所慕而效者也負芻是為成公十有四年春王正月莒子朱卒張氏曰莒季佗也夏衛孫林父自晉歸于衛林父奔晉已七年衛侯如晉晉侯强見林父定公不可旣歸而晉使郤犫送之衛獻之出奔禍根在此衛自元咺以臣抗君皆晉為之矣秋叔孫僑如如齊逆女張氏曰逆公夫人也鄭公子喜帥師伐許傳載鄭子罕伐許鄭伯復伐許許人平以申叔之封明年遷于葉避鄭以依楚蓋鄭自成三年再伐許四年伐許九年圍許今又伐之晉不能救也九月僑如以夫人婦姜氏至自齊僑如稱名不稱氏者一事再見因上文也稱婦有姑也于時穆姜尚存冬十月庚寅衛侯臧卒衛定公立十二年卒秦伯卒髙閌集註曰秦桓公也立二十八年卒史失其名十有五年春王二月葬衛定公五月而葬三月乙巳仲嬰齊卒初東門氏公子遂立宣公有寵其子歸父繼世專政謀去三桓未遂而宣公薨三桓逐東門氏歸父奔齊魯立嬰齊以後東門氏杜氏注曰立為襄仲子歸父之弟襄仲即公子遂之字以字為氏故曰仲嬰齊癸丑公㑹晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚晉侯執曹伯歸于京師公至自㑹傳云會于戚討曹伯負芻也愚按負芻殺世子自立是可討也然與之㑹然後執之若紿而致之非討之義張氏曰先執曹伯以令諸侯然後盟之乃盡善也夏六月宋公固卒宋共公立十三年卒楚子伐鄭木訥曰前年鄭公子喜無故而伐許許楚之與也鄭昔嘗伐許而楚不問以鄭亦在楚耳今鄭從晉而伐楚之與國楚能不惡鄭乎故楚子伐鄭為許也鄭有以招之也秋八月庚辰葬宋共公宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚左氏曰葬宋共公於是蕩澤弱公室殺公子肥蘇氏曰華元將討之而力不能故出奔奔而國人許之討然後歸故其討之也族人莫救劉氏曰元自晉歸使國人攻桓氏殺蕩山黜魚石國然後定蓋說者謂山即蕩澤之名而魚氏與蕩氏皆桓族也木訥曰左氏載元之奔也魚石止元于河上而經實書奔晉又載魚石請討山既討山則魚石何用奔楚考其言無一合於經蓋山與魚石均宋之亂臣故山見殺而魚石奔復倚楚而入愚按傳與經異但當信經凡依傳而生說以釋經者不必也冬十有一月叔孫僑如㑹晉士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾人㑹吳于鍾離傳始通吳也注鍾離楚邑淮南縣吳始來通晉帥諸侯之大夫㑹之故殊㑹趙氏曰先㑹晉而後㑹吳殊㑹也髙氏曰吳實夷狄反安坐于鍾離以待中國之㑹葉氏曰成公之末楚浸衰而吳驟强天下所恃者晉而已反率諸侯而從之一㑹而合七國再㑹而合十三國三㑹而合十二國天下無不聽於吳焉鍾離楚邑今濠州許遷于葉避鄭依楚也傳云楚遷之葉今汝州葉縣十有六年春王正月雨木氷范寗曰雨著木成氷夏四月辛未滕子卒左氏傳滕文公卒鄭公子喜帥師侵宋公子喜穆公子子罕也侵宋伐喪也鄭叛晉從楚故為楚侵宋自攻其類也六月丙寅朔日有食之書災晉侯使欒黶來乞師甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績楚殺其大夫公子側鄢陵鄭地也是役也晉吕錡射楚共王中目楚師宵遁晉入楚軍三日穀公子側鄢陵之敗帥也楚故殺之自晉敗于邲楚師横行中原今厲公一戰而勝之洗中國二十餘年之恥岷隱曰鄢陵之戰與城濮同功然厲公所以異於文公者一勝之後無以居之觀沙隨之不見公季孫行父之見執厲公之志驕矣愚觀晉旣敗楚范文子立於馬前曰何以及此君其戒之蓋知厲公非保功之君也果難作鄢陵鄭地今開封秋公㑹晉侯齊侯衛侯宋華元邾人于沙隨不見公公至自㑹謀欲伐鄭鄭未服也魯叔孫僑如與君母穆姜謀作難公至後期故晉不見公沙隨宋地公㑹尹子晉侯齊國佐邾人伐鄭注曰尹子王卿士也木訥曰晉侯敗楚鄭之師于鄢陵鄭不反今又以王命伐之曹伯歸自京師曹伯負芻殺太子而自立晉侯執而歸之京師欲改立賢公子子臧子臧不肯盡致其邑與卿而不出故負芻復得歸曹木訥曰曹成殺世子而自立幸晉有尊周之心不自裁處而歸曹伯于京師王苟因是而用其威福之柄天下孰不震懾今乃置而姑息之諸侯判然知王法不復行其何忌而不為亂臣賊子哉吾於此重為周王惜之愚按曹伯復歸而不書名諸家說各不同竊意突忽争立故出入必書名以為别曹成之位已定三年不待書名為别耳恐無他義九月晉人執季孫行父舍之于苕邱冬十月乙亥叔孫僑如出奔齊十有二月乙丑季孫行父及晉郤犫盟于扈公至自㑹乙酉刺公子偃叔孫僑如與穆姜謀去季孟而取其室使晉因季孫在晉殺之而已殺孟獻子於魯故晉執季孫而舍之苕丘苕丘晉地也公使子叔聲伯請季孫於晉故晉與季孫盟而還之叔孫僑如謀不遂而出奔公歸而刺公子偃偃者公之庶弟穆姜謀亂嘗怒公而指偃可代公故也僑如既奔齊魯立豹以後叔孫氏苕公羊作紹十有七年春衛北宫括帥師侵鄭左氏以為衛救晉也木訥曰使晉被鄭兵而衛救之則有援覇主之功何得不書而書侵耶愚謂此經文之所無但據經文謂衛侵鄭足矣夏公㑹尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭六月乙酉同盟于柯陵秋公至自㑹葉石林曰單子王之中大夫也王大夫前未有二人臨諸侯者此言尹子單子鄭恃楚不服晉復請於王而益之也王命而行一人可矣命而不行雖益何補趙木訥曰以七國之衆加以王師而鄭未反故遂與柯陵之盟戴岷隱曰前此諸侯屈天子之卿為㑹者有之未有屈二卿者屈天子之卿為盟者有之未有同盟者厲公之志驕僣甚矣齊髙無咎出奔莒左氏載慶克通于靈公母聲孟子蒙婦人衣乘輦而入鮑牽見而告國武子武子召慶克而謂之克以告夫人怒及國子相靈公㑹而歸孟子譖髙鮑將不納君而立公子角且譖國子亦知其謀故公刖鮑牽而逐髙無咎無咎奔莒弟髙弱奔盧九月辛丑用郊木訥曰魯之卜郊自成公始而用郊自成公始蓋前此雖以史遜請之平王得用郊猶疑其僣而卜之未遽用也成公七年卜之不從乃免牛十年又嘗卜之五卜不從遂不郊今成公懼卜而不從則終不得郊故不復卜而直用之聖人書曰用郊蓋前此未嘗用也至定哀之郊則不復書用蓋責不在定哀其用之始於成公用與用田賦用致夫人同謬者求其說而不得遂以為用人其支離一至是哉晉侯使荀罃來乞師冬公㑹單子晉侯宋公衛侯曹伯齊人邾人伐鄭十有一月公至自伐鄭傳載諸侯伐鄭楚救鄭諸侯還晉至此再假王命三合諸侯以伐之而不能服壬申公孫嬰齊卒于貍脤貍力之反脤市軫反公孫嬰齊叔肹之子子叔聲伯嘗請行父於晉者也與前仲嬰齊同名耳卒于貍脤者從公伐鄭還而道卒脤公羊作軫穀梁作蜃十有二月丁巳朔日有食之書災邾子貜且卒貜且立四十年卒晉殺其大夫郤錡郤犫郤至左氏載晉厲公侈多外嬖反自鄢陵欲盡去羣大夫而立其左右胥童嬖而怨郤氏請必先三郤遂殺之皆尸諸朝又以甲刼欒書中行偃於朝穀梁曰禍於是起楚人滅舒庸任氏曰舒庸東夷偃姓之國左氏曰舒庸以楚師之敗道吳人圍巢故楚滅之十有八年春王正月晉殺其大夫胥童庚申晉弑其君州蒲傳載欒書中行偃殺胥童又使程滑弑厲公而迎立周子年十四是為悼公蓋胥童實道厲公殺三郤又親刼欒書中行偃故二人殺胥童繼弑厲公近世張洽受春秋於朱文公者也其集註謂聞之師曰稱國以弑者衆弑其君之辭也曷為不言二臣弑之孟子論貴戚之卿君有大過則諌反覆之而不聽則易位厲公之過大矣昵用小人殺戮無辜舉朝諸卿不保首領書偃晉之世臣以社稷為心尚可行易位之權而遽弑之夫二人嘗以君事之矣故稱國以弑分其惡於衆也悼公逐不臣者七人而不誅書偃非里克甯喜之比故也木訥趙氏曰厲公之興哆然修文襄之業敗狄伐秦既如其志當吳楚並興欲抗吳則畏楚欲抗楚則慮吳遂合諸侯以㑹吳于鍾離蓋疑吳楚合則中國無以抗之也吳旣我附明年遂興鄢陵之師大敗楚鄭謀亦深矣然晉雖得志而鄭不反是時不退而修德乃遷怒魯之後至沙隨之㑹不見公既而上屈王師下連諸侯三疾于鄭鄭不能得忿無所洩内疾卿佐立其朝者儳然如不終日故中行欒氏之逆成嗚呼剛暴之君可不監哉愚按張氏詳其一時取禍之患趙氏詳其平日紹覇之勤故并録以備參考齊殺其大夫國佐慶克通乎君母君母怒國子之謫克也譖國子既而慶克以君命圍髙弱於盧國子往殺慶克于盧師以穀叛齊侯與盟于徐關而復之既叛而復仕其朝故齊侯殺之于内朝之宫然齊侯使慶克之子慶封為大夫則又稔禍矣公如晉晉悼公嗣位而朝之也夏楚子鄭伯伐宋宋魚石復入于彭城宋華元討桓族而魚石奔楚故魚石借楚之力伐宋而復入彭城彭城宋邑也公至自晉晉侯使士匄來聘公方朝晉晉隨使范宣子來謝其朝晉悼公交鄰有道如此秋杞伯來朝八月邾子來朝傳稱杞桓公來朝勞公且問晉故邾宣公初即位而來見築鹿囿杜氏注築墻為鹿苑己丑公薨于路寢正也冬楚人鄭人侵宋晉侯使士魴來乞師十有二月仲孫蔑㑹晉侯宋公衛侯邾子齊崔杼同盟于虛朾魴音房朾他丁反晉謀救宋也諸侯師至而楚鄭之師已退晉侯新立因為同盟丁未葬我君成公五月而葬成公立以正薨以正世適承嗣國家無事魯自春秋以來惟成公一人而已然作丘甲始用郊其失不少又内制於行父掃四大夫之師以報歸父謀去三桓之怨外制於强晉得汶陽之田而復見奪弔景公之喪而輒見止如沙隨之㑹而不得見亦惴惴度日爾襄公名午成公之子母定姒諡法因事有功曰襄元年春王正月公即位於是襄公年四嵗仲孫蔑㑹晉欒黶宋華元衛甯殖曹人莒人邾人滕人薛人圍宋彭城魚石自宋逃楚楚伐宋而納魚石於宋之彭城此去年之夏也至冬又復侵宋蓋既已納魚石據宋一邑因為荐食之謀未已也時晉悼公以十四嵗新立即㑹諸侯之師以救之師至而楚師還宋因辭諸侯而請其師圍彭城至是晉大夫帥諸大夫共圍之彭城降晉晉以魚石之族五大夫在彭城者歸而寘諸瓠邱於是彭城復為宋有木訥曰伐叛討逆覇主事也悼公之興首合諸侯之大夫為宋圍彭城討魚石得其職矣宜列國和㑹而願奉其職也夏晉韓厥帥師伐鄭仲孫蔑㑹齊崔杼曹人邾人杞人次于鄫秋楚公子壬夫帥師侵宋鄭從楚伐宋者也晉旣救宋矣故以次伐鄭諸侯之師次于鄫者為之援也鄫鄭地也楚之侵宋者攻晉之所救也胡氏曰楚人釋君助臣事已悖矣晉降彭城以魚石歸遂伐鄭而以諸侯次鄫援之放義而行者也戴氏曰韓厥身自伐鄭而諸侯不與焉亦見晉悼公圖覇之初使大夫身親其勞不敢勤諸侯之師若此宜其能成覇也趙氏曰中國伐鄭屢矣必連諸侯之師今悼公之圖鄭亦可謂有謀矣以韓厥獨攻其前以五國之兵援其後楚兵不出則一韓厥足以敵鄭而有餘楚兵出則五國之師足以鬭楚而不懾此皆所以謹用諸侯而不忍輕鬭其民也許氏曰楚人侵宋攻晉所救而諸侯之師卒不為動則有以量楚力之所至矣韓厥公羊作韓屈鄫公羊作合九月辛酉天王崩簡王在位十四年崩邾子來朝冬衛侯使公孫剽來聘晉侯使荀罃來聘岷隱曰厯考十二公即位之初朝聘鄰國者有矣鄰國未有先來聘者獨襄公為然意晉悼初立屈已交諸侯當次鄫之役晉侯衛侯實次于戚以為之援故謀而聘魯然愚按先儒皆以天王崩不奔䘮而朝聘於魯為非此又正本之論而春秋時習俗之所不識者也若邾之來朝則髙氏謂公方四嵗安能以禮相接然則此殆禮之贅又非來聘者比也二年春王正月葬簡王五月而葬速天子七月而葬鄭師伐宋左氏曰楚令也木訥曰鄭成公為人固而不知機彼鄭文鄭襄不幸無覇主楚兵脅之姑從楚以紓國患而已成公之初堅附中華一折而從楚則至死不變晉厲敗楚師三以諸侯伐鄭鄭可歸矣反受役於楚以戕中國愚謂晉厲猶以力服之也今楚納宋之叛臣晉悼公伐其叛臣而取之義聲震夷夏逆順曉然矣何為尚為楚而伐宋耶夏五月庚寅夫人姜氏薨成公夫人齊姜也六月庚辰鄭伯睔卒睔古困反成公立十四年卒左傳載其臨死不忍背楚之言髙氏曰不言葬者以成公背中國諸侯不㑹其葬也許氏曰夫鄭豈以中國為終可畔既蒙楚之德遂不可反是以君子貴謀始也晉師宋師衛甯殖侵鄭木訥曰侵淺事也合三國之師於鄭郊而侵之要其服而已非志於伐也説者以為鄭方在䘮伐喪為不義吾以為鄭成終身䧟於左衽而不反以楚之誘之也今新君即位茍一朝乎楚為楚所化則亦未易歸也故以兵侵之要其速從中國而已非伐喪也愚聞之先師亦曰三國成師以出不以伐而以侵者正避鄭之喪也晉悼公豈伐喪者哉秋七月仲孫蔑㑹晉荀罃宋華元衛孫林父曹人邾人于戚左傳載㑹于戚謀鄭也孟獻子請城虎牢以逼鄭知武子曰善齊崔子今不來矣滕薛小邾之不至皆齊故也將復於寡君而請於齊於是今年冬戚之㑹齊滕薛小邾皆至遂城虎牢木訥曰合六國之大夫而不加侵伐謀所以服之之術而已晉所以皇皇然速於得鄭者蓋鄭僖初立倘一為楚所覊則未可以文告致是機㑹之不容失者不然一嵗之間三合兵車何諸侯之不憚煩哉己丑葬我小君齊姜杜氏曰齊諡也三月而葬速叔孫豹如宋左氏曰通嗣君也杜氏曰豹僑如之弟也木訥曰叔孫氏自公孫兹叔孫得臣再世為卿至叔孫僑如其横滋甚反譖成公及季孫行父於晉事敗奔齊叔孫之黨沮矣今襄公即位㓜未能君盟㑹征伐專於仲孫蔑蔑者孟獻子而季孫行父為正卿則耄矣故叔孫復出而任聘問之事豹得臣之次子也冬仲孫蔑㑹晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢齊滕薛小邾聞知武子之言故皆來㑹既城虎牢鄭人乃成吕氏曰城虎牢所以服鄭而拒楚鄭服則楚自逺荀罃城之是也非取其地而有之也故不繫之鄭陸淳曰城虎牢可以安中國息征伐故聖人許其取而不繫之鄭張氏洽曰虎牢所以不繫鄭者鄭背華即夷黨楚以為中國患悼公動天下之諸侯以討之而負固自若故從孟獻子之謀城其巖邑以制之以伯主討不服之國地非鄭之所可私此春秋明王制以示予奪之正也木訥趙氏曰安一國之功小安天下之功大晉悼初圍宋彭城為宋治叛臣爾其利不及天下此一國之功也晉楚争鄭五十年乍叛乍服惟强是從鄭成一叛入楚而終身不復反以一鄭不服天下諸侯為之不寧兵車之㑹無日而置今晉悼謀制鄭之䇿而城虎牢虎牢古虢國鄭得之為制邑至是為虎牢在漢為成臯今為孟州汜水縣巖險聞於天下楚鄭倚之以抗中國今晉率十國之大夫取而城之虎牢既非鄭有鄭何恃以抗中國哉故雞澤之盟鄭不伐而自至八國之君同涖是盟而天下無兵車者六年則虎牢之城誠有功於天下此天下之功也愚按此役諸儒多責鄭不能自守其險而反為晉取然使鄭能守此險則為楚以戕中國今晉取此險則可拒楚以安中國諸儒之為此説者豈不知夷夏之辨耶何不責鄭之不從晉反責鄭之不守險也楚殺其大夫公子申左傳載公子申為令尹多受小國之賂以逼子重子辛故楚人殺之三年春楚公子嬰齊帥師伐吳傳載楚子重伐吳克鳩兹至于衡山而吳取其駕獲鄧廖駕良邑廖亦楚之良所獲不如所亡木訥曰夷狄相攻中國之福稽其故則自晉厲公㑹吳於鍾離實有謀焉鍾離一㑹而吳無仇晉之心楚有患吳之意故楚之伐吳以吳不與已而與中國也楚之兵力既分於吳而不能專向中國此諸侯之患得以少紓吳既受楚兵則亦不能無求於中國故五年戚之㑹吳不召而自至自是天下之勢遂成鼎足晉吳楚是也吳既附中國則楚實孤終春秋之世楚無一日安枕者吳掎其東也公如晉夏四月壬戌公及晉侯盟于長樗公至自晉如晉者朝覇主也公時方六嵗相其行者孟獻子也蘇氏曰晉侯修禮於諸侯故去其國都與公盟于長樗張氏曰長樗近晉之地也六月公㑹單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤陳侯使袁僑如㑹戊寅叔孫豹及諸侯之大夫及陳袁僑盟秋公至自㑹木訥曰悼公晉之賢君也其所以覇諸侯之效在得陳得鄭而已陳鄭即楚久矣今興虎牢之役隻矢不遺而鄭來陳見鄭來而恥獨為夷亦遣袁僑如㑹然鄭以君㑹而陳以臣至雞澤之盟以諸侯盟鄭之君戊寅之盟以大夫盟陳之臣蓋鄭伯之來既與盟矣袁僑至而無以質之則懷附之心不固茍復自與之盟則袁僑實抗而覇權不尊故以大夫盟之則晉無屈已之辱僑無抗君之罪禮甚安而分甚明此吾所以見悼公之賢也論者乃謂諸侯在而大夫盟為大夫之專不知大夫奉君命而盟袁僑何得為專愚按此役說者又責其不當盟單子竊意齊桓始假王人為重故首止葵丘㑹王人而不敢同盟世變日降晉厲之世王人之同盟屢矣乆而自同於列國今不待請而自至習俗旣成雖以悼公之賢不知革其非此可為世變歎爾冬晉荀罃帥師伐許許自新城以來不預中國盟㑹四十餘年矣今晉以陳鄭旣服而伐許木訥曰許為鄭虐遷于葉以避葉逼楚倚楚為重必不能近叛楚而逺事晉晉必能興召陵之師以服楚則許可得不然徒伐之無益矣四年春王正月己酉陳侯午卒陳成公立三十年卒木訥曰陳成歸而卒於中夏諸侯㑹葬之賢於鄭成逺矣髙氏集註曰元經有言日月之逝改于尸尚未晚也陳成公既為雞澤之盟而卒則是國已變於夏矣曾子曰吾何求哉夏叔孫豹如晉左氏曰穆叔如晉報知武子之聘也秋七月戊子夫人姒氏薨姒杞姓襄公妾母也姒公羊作弋注莒女也葬陳成公五月而葬八月辛亥葬我小君定姒杜氏曰定諡也踰月而葬速許氏曰傳載季文子不欲以夫人之禮葬定姒志復古也不得已於人言而卒夫人之觀此踰月而葬蓋禮略也鄭夾漈曰旣君則母同正矣然適母薨而後可得伸其尊也姒公羊作弋冬公如晉左氏載請晉以鄫屬魯也時公方七嵗蓋代其言者孟獻子也陳人圍頓頓小國也傳載楚使頓間陳而侵伐之故陳人圍頓木訥曰頓楚之與也陳初從中國而遽圍頓故明年楚伐陳五年春公至自晉去年冬如晉求鄫今始歸魯夏鄭伯使公子發來聘公子發者子國也子産之父鄭僖新立使來通好叔孫豹鄫世子巫如晉去年冬魯求鄫於晉故今穆叔率鄫世子同如晉以成屬鄫此左氏説也公羊則謂鄫廹於莒故魯率之通晉愚恐兩說俱有之仲孫蔑衛孫林父㑹吳于善道左氏載吳使壽越如晉請聽諸侯之好故魯衛俱受晉命往㑹之善道公穀皆作善稻云吳地也木訥曰吳晉將為戚之㑹而魯衛實鄰於吳故晉命以通好焉許氏曰晉楚争衡權之在吳故晉急吳如此秋大雩旱祭之僣者也楚殺其大夫公子壬夫楚忿陳之復歸于晉也咎令尹子辛之侵欲於陳故殺之公㑹晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚公至自㑹左氏曰㑹吳且命戍陳也木訥曰鍾離之㑹書㑹以㑹晉率諸侯往㑹吳也戚之㑹不殊㑹吳晉兩欲而為是㑹也陳鄭歸晉楚方内憤殺公子壬夫將有疆場之事此晉所以願求於吳也吳旣與晉楚公子嬰齊嘗帥師伐吳此吳所以願交於晉也吳晉同欲故十四國之君歡然相濟冬戍陳知楚將伐陳故諸侯以兵戍楚公子貞帥師伐陳公㑹晉侯宋公衛侯鄭伯曹伯齊世子光救陳十有二月公至自救陳諸侯雖戍陳而楚猶伐之故諸侯又親救之楚殺其令尹而出兵晉范宣子預有失陳之憂諸侯以兵戍陳已非上䇿戍又不足以禦則事亦極矣辛未季孫行父卒行父相三君其卒也無衣帛之妾無食粟之馬無藏金玉無重噐備左氏稱其忠於公室然行父怨歸父之謀去三家至掃四大夫之兵以攻齊方公子遂弑君立宣行父實再為之如齊納賂又帥師城莒之諸鄆二邑以自封植其為妾馬金玉也多矣柄及其子益專且叛然則小亷者乃其大不忠之飾歟向使淫侈如齊慶封適足以殺其身烏能成其私也哉六年春王三月壬午杞伯姑容卒髙氏集註曰自僖公二十三年杞子卒後杞桓公繼立凡七十有一年吕東萊曰杞入春秋至此始名邾滕杞㣲國其卒或名或不名國㣲不備禮乎夏宋華弱來奔左氏載華弱與子蕩少相狎長相優又相謗子蕩以弓梏華弱于朝平公見而逐之亦逐子蕩秋葬杞桓公杞始書葬始能通也滕子來朝左氏謂滕成公始朝公也莒人滅鄫鄫間於魯莒之間前此邾莒伐鄫魯救之有狐駘之敗前年魯請於晉以鄫屬魯叔孫豹嘗以鄫世子同如晉矣去年秋復以屬鄫為不利而辭之蓋以力不能及鄫也至今莒遂滅鄫吕氏曰莒鄫小國自相滅亡晉悼公為時盟主亦莫之䘏蓋是時禮義衰絶滅國弑君皆目見之熟不以為甚異故雖晉悼號為賢君亦莫能正也愚按莒之滅鄫春秋具有本末穀梁乃以鄫立莒之子為子謂神不歆異姓之祀為滅雖胡安國獨宗其說而劉氏孫氏戴氏皆嘗辨其非劉曰若鄫取莒為後罪在鄫子不當但責莒人孫曰立異姓而遂書滅不惟於義不明亦何以為訓此蓋莒人因鄫不順其立異姓而滅之爾戴曰鄫請屬于魯則鄫之勢廹矣莒既滅鄫季孫宿如晉見魯之不能救鄫也莒人滅鄫勢所必至冬叔孫豹如邾左氏曰穆叔如邾聘且修平謂平四年狐駘之戰季孫宿如晉宿季孫行父之子也左氏謂莒滅鄫故來討宿遂如晉然魯雖嘗請屬鄫既而辭之矣滅鄫者莒也晉不問莒而反問魯何耶木訥曰宿父䘮未朞而執使命知世卿以固位而已襄公㓜弱蓋非公意宿自為之愚聞之師亦謂宿嗣執政往見以植私交十有二月齊侯滅萊齊圖萊久矣自宣七年伐萊至是遂滅之萊姜姓例稱滅同姓書名今齊滅萊不名則例之說不通矣七年春郯子來朝郯自出伯姬不通於魯成公嘗㑹晉伐之今始來朝公夏四月三卜郊不從乃免牲孟獻子歸咎於旣耕而卜蓋不知天之不歆其僣也小邾子來朝此小邾穆公也其先郳黎來顓頊之後王命為小邾至是三朝魯城費音袐季武子城其私邑以自强定公十二年所欲墮之而不可得者也費今沂州費縣秋季孫宿如衛傳以為報子叔之聘然子叔之聘七年矣宿初執政疑自締私交也八月螽蝗也書災冬十月衛侯使孫林父來聘壬戌及孫林父盟左氏謂報季孫宿之聘且尋孫良夫之盟楚公子貞帥師圍陳十有二月公㑹晉侯宋公陳侯衛侯曹伯莒子邾子于鄬鄭伯髠頑如㑹未見諸侯丙戌卒于鄵陳侯逃歸鄬于軌切鄵七報反楚圍陳諸侯謀救之陳侯畏楚而逃故不成救鄭伯卒于行三傳皆以為見弑然且當以經為正此鄭僖公也立五年卒頑公穀作原鄵作操八年春王正月公如晉傳云公如晉朝且聽朝聘之數夏葬鄭僖公五月而葬王氏曰傳載子駟弑公然諸侯方㑹其郊子駟其敢然乎觀九年與晉争盟詞不少屈而晉人不以為討其不為不義可見矣蓋子駟為政多殺羣公子疾之者衆因公卒于外而誣之黎氏曰若君實被弑以疾赴遂從而書之則弑君豈有以實告者乎趙氏曰若實弑而書卒是春秋庇逆賊也鄭人侵蔡獲蔡公子燮僖公方葬鄭乃侵楚之與國以挑釁此子産所以獨憂而不旋踵致楚之師燮穀梁作濕季孫宿㑹晉侯鄭伯齊人宋人衛人邾人于邢邱公至自晉趙氏曰晉旣失陳而為是㑹以觀諸侯諸侯皆以大夫聽命晉之覇業隳矣孫氏曰邢邱之㑹公在晉晉侯不與公㑹而與季孫宿㑹襄公㣲弱政在季氏也莒人伐我東鄙左氏曰莒人伐我東鄙以疆鄫田蓋鄫在魯東其田接於魯而經界不明故伐我以正之魯旣無鄫世有莒患矣愚按此莒人以兵滅鄫明矣孰謂以其子繼鄫為滅鄫耶秋九月大雩為旱禱也大則僣矣冬楚公子貞帥師伐鄭討其侵蔡也自是鄭又與楚平玉帛待于二竟惟强者是從晉侯使士匄來聘左氏曰晋范宣子來聘且拜公之辱告將用師于鄭九年春宋災天火曰災夏季孫宿如晉報范宣子之聘也五月辛酉夫人姜氏薨秋八月癸未葬我小君穆姜成公之母襄公祖母也冬公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十有二月己亥同盟于戱楚子伐鄭戱許宜反左氏載諸侯伐鄭將修噐備盛餱糧歸老㓜居疾于虎牢鄭人恐乃行成然子駟争盟欲惟有禮與强者是從既盟而楚伐鄭鄭又與楚平蓋玉帛待二竟此鄭之素謀子駟尤力主從楚之說也先師嘗謂其無夷夏之辯趙木訥則謂晉欲得鄭當先制楚制楚當先結吳以掎楚楚忌吳之斷其後必不敢長驅鄭郊愚謂鄭處晉楚之間亦難矣晉不幸而遇楚之强謀所以安中國亦難矣十年春公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光㑹吳于柤夏五月甲午遂滅偪陽公至自㑹柤莊加反柤楚地吳子壽夢在柤晉悼公㑹諸侯以往㑹之先師謂晉方患楚欲通吳而吳道多阻今㑹於彭城之柤所以道吳之來路趙氏謂㑹吳所以掎楚掎楚所以争鄭柤之㑹吳既向晉楚恐吳之議其後故晉兩合諸侯以伐鄭鄭果如蕭魚之㑹石氏曰蕭魚之後楚專事吳不復争鄭矣偪陽妘姓小國左氏載晉取之欲以封宋之向戍向戍辭而以歸之宋許氏曰渉楚㑹吳而因道以滅人之國中國之禮義盡矣何以昭格荒服楚公子貞鄭公孫輒帥師伐宋晉師伐秦木訥曰楚既得鄭則兵及於宋勢也楚鄭伐宋晉不救宋而伐秦以報私怨非所以霸也先師則曰楚取彭城欲以梗晉晉滅偪陽則楚不得而問彭城偪陽歸宋故楚連鄭師以伐宋去年秋秦嘗乞楚兵以侵晉而楚為之援今晉師伐秦亦悼公制楚之規模也覺此說尤長秋莒人伐我東鄙鄫為莒得故莒再伐我東鄙公㑹晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯杞伯小邾子伐鄭鄭黨楚伐宋故晉侯率諸侯伐鄭鄭不服故再戌虎牢齊世子光人臣也而今位滕薛之上以其先至而躋之也非禮矣冬盜殺鄭公子騑公子發公孫輒盜一日而殺三大夫鄭無政刑矣左氏載子駟侵司氏堵氏侯氏子師氏田故五族聚羣不逞之人而殺之子駟騑之字也趙氏謂子駟當國鄭受兵無虚嵗宜其禍生肘腋張氏謂鄭之從楚以勞中國皆公子騑之罪公子發公孫輒惟騑是從惡積而不可掩鄭不能討而盜得殺之所謂上慢下暴而致冦至孔子以為盜之招也所以不稱殺其大夫騑公穀作斐戍鄭虎牢楚公子貞帥師救鄭公至自伐鄭左氏載諸侯之師城虎牢而戍之鄭及晉平楚子囊救鄭晉荀罃曰我實不能禦楚鄭何罪不如還也楚人亦還前城虎牢不言鄭此戍虎牢而繫之於鄭者黎氏云城則取而城之故經有城楚丘城縁陵皆不繫之國戍者以兵守衛之故經有戍衛戍陳皆繫之國先師王氏云城虎牢不繫之鄭者時鄭從楚中國取其虎牢而城之為中國守險以制鄭非為鄭而城之也戍虎牢而繫之鄭者時鄭已從晉中國恐楚伐鄭故置兵守衛以拒楚是為鄭而戍之也此說尤明白十有一年春王正月作三軍此季氏欺襄公幼弱始三分公室而三家各有其一也然周禮有大國三軍之說諸儒多謂三軍乃魯之舊而今以為作劉氏意林曰至襄而作三軍明襄之前未有三軍也及其舍之也又曰舍三軍明二軍猶在也孫復發㣲曰大國三軍次國二軍魯以次國而作三軍亂聖王之制也此一說也謂魯舊止二軍今始分而三之也葉石林曰僖公之詩曰公徒三萬此三軍之數也至成公而季孫行父臧孫許叔孫僑如公孫嬰齊以四卿見於鞌之戰則有加於三軍也鄭夾漈曰宣成以來魯有五卿卿專一軍及季氏逐東門氏而立嬰齊又將逐臧孫紇而立臧為東門與臧氏二家弱而不能軍其民故三家分為三軍而專之此又一說也謂魯舊不止三軍今始并而三之也二說未知孰是然前一說以周之舊制言後一說以魯之强僣言恐春秋時無復守周制若强而僣者則魯卿大夫之實也在來者考焉夏四月四卜郊不從乃不郊崔氏曰郊之用辛也卜上辛不吉則卜中辛又不吉則卜下辛三卜不從則已矣四卜過也然崔氏之說以郊之常禮言而魯之卜不從乃天之不歆其僣也鄭公孫舍之帥師侵宋公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭秋七月己未同盟于亳城北公至自伐鄭楚子鄭伯伐宋公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭㑹于蕭魚公至自㑹楚人執鄭行人良霄按左氏所載鄭之侵宋者鄭子展謀欲從晉故伐宋以致諸侯之師而後與之也諸侯伐鄭而同盟于亳城北者時鄭方行成故盟諸侯使毋貳也楚子鄭伯又伐宋者楚未知鄭之陰已附晉尚率鄭以伐宋而鄭姑從之也晉又㑹諸侯伐鄭而㑹于蕭魚者鄭於是始決於從晉也楚執鄭行人良霄者鄭已從晉使告于楚楚無以制之而姑執其行人以泄憤也夫鄭自公子騑公子發公孫輒三人決於從楚故鄭嵗嵗受晉楚迭至之兵三子旣為盜所殺子展當國改謀從晉知所向背矣然不即安於晉必伐宋致師待晉師再伐已而後藉以絶楚恐非謀國之要䇿若晉悼極力求鄭卒成蕭魚之㑹則霸功之盛也趙氏曰蕭魚之役楚疲於外鄭服於内寸兵不折隻牲不㰱悼公所以制楚服鄭之功豈下於威文耶戴氏曰蕭魚之㑹晉赦鄭囚納斥堠禁侵掠是舉也可為春秋盛德事比於召陵有光焉書楚執良霄於蕭魚之下見鄭人之心已服楚人之力不競晉悼之功為不争也程氏曰鄭不可信晉悼公推至誠以待人信之不疑自此鄭不背晉者二十四年師氏曰諸侯之無時暫寧者皆鄭之由也至悼公用魏絳之謀和戎以収五利之功息民以致三駕之勝遂能再合十二國之師以肆伐而鄭之君臣始無二志振諸夏之威奪强夷之勢是可嘉矣按去年秋㑹諸侯伐鄭者晉悼公之初駕也今伐鄭而盟于亳城北者晉悼公之再駕也伐鄭而㑹于蕭魚者晉悼公之三駕左氏曰晉侯謀所以息民三駕而楚不能與争者此也亳公穀作京冬秦人伐晉報去年之役且秦景公之妹為楚共王夫人故為楚伐晉然楚旣無以争鄭秦亦安能黨楚左傳書晉敗績而經不書者無傷晉之大體也十有二年春王三月莒人伐我東鄙圍台季孫宿帥師救台遂入鄆莒五年之間三伐魯魯未暇治之今又圍魯邑故季氏既救吾邑遂入莒邑以報之也自穀梁稱受命而救台不受命而入鄆諸家自此争攻季孫之生事夫季孫固可責也然魯皆季孫為之也入鄆固不受命救台亦果受命者乎放飯流歠而問無齒決穀梁之謂矣莒小夷也滅鄫而遂伐魯嵗嵗不已季孫之施報方略與相當此事莒可罪而於季孫固未暇議也夏晉侯使士魴來聘鄭人既服遣使以謝伐鄭之師此晉悼公待諸侯有禮也秋九月吳子乘卒吳壽夢立二十五年卒吳至壽夢始大楚畏吳之議其後始不敢肆擾中國冬楚公子貞帥師侵宋鄭不可得而楚姑泄憤於宋楚於是無能為矣公如晉拜士魴之聘此事霸之禮也十有三年春公至自晉去冬如晉報聘而今始歸也夏取邿音詩邿附庸小國也左氏稱邿亂分為三魯師救邿遂取之先師謂季氏柄國兼地自廣也許氏曰晉始息民是以楚侵宋不報魯取邿不討取無大亂而已邿公羊作詩秋九月庚辰楚子審卒楚共王立三十一年卒自以嘗敗于鄢欲諡以靈若厲冬城防髙氏集註曰防臧氏之邑也厥後齊髙厚伐我北鄙圍防則城防者畏齊也木訥趙氏曰魯有二防一近宋隱十年伐宋取防是也一近齊隱九年公㑹齊侯于防是也魯既事晉而外齊懼有齊師故城防以備之明年齊卒有圍成之役用是知城防以備齊也十有四年春王正月季孫宿叔老㑹晉士匄齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人㑹吳于向時吳壽夢已卒所㑹者吳新君諸樊也左氏載吳敗於楚告于晉向之㑹為吳謀楚也范宣子數吳之不德也以退吳人任氏曰晉侯始汲汲㑹吳將以謀楚也鄭國既服楚隙亦解故諸侯不㑹但使大夫自是之後厯襄昭之世不復與吳㑹然則㑹吳非晉所欲也趙氏曰悼公賢君豈安於事夷狄哉方内有所賴勢不得已也二月乙未朔日有食之書災夏四月叔孫豹㑹晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人杞人小邾人伐秦左氏曰諸侯之大夫從晉侯伐秦以報櫟之役也木訥曰用諸侯之兵以報己怨非也然自是一伐秦終春秋之世秦不敢復侵晉己未衛侯出奔齊傳載衛獻公戒孫林父甯殖食而弗食二子作亂立公孫剽出奔莒人侵我東鄙注曰報入鄆也木訥曰季孫宿入鄆非兵首也而莒猶以為憾侵我東鄙報入鄆之役焉彼小國逞忿安辯曲直之理至十六年魯訴於晉溴梁之㑹晉人執而釋之然後少悛故二十年為向之盟而魯始無東鄙之患矣秋楚公子貞帥師伐吳石林曰經書楚伐吳而已傳稱吳敗楚師于臯舟不足據木訥曰楚康即位修先君之怨謂楚不得志於中國者吳實為之梗故置宋鄭不問而首伐吳其謀尤出共王之上矣冬季孫宿㑹晉士匄宋華閱衛孫林父鄭公孫蠆莒人邾人于戚左氏載衛孫林父逐衛獻公衎而立剽晉侯以問荀偃對曰不如因而定之衛有君矣故㑹于戚以定剽戚衛地也林父之邑也木訥曰釋賊不誅反定剽位何賴於霸主哉愚按荀偃本亦弑賊故為逆賊林父謀而成其亂於林父之私邑凡今年春列國之㑹于向者大半不至亦可見人心之公而晉悼坐荀偃之誤不少矣自是至剽弑而衎歸衛有二君者十年皆晉實為之也以悼公之賢而有此惜哉蓋公怠矣明年遂薨十有五年春宋公使向戍來聘二月己亥及向戍盟于劉傳稱向戍來聘且尋盟許氏曰不盟于國而盟于劉崇向戍也公弱甚矣張氏曰劉魯地劉夏逆王后于齊注劉夏天子之士也傳逆王后卿不行非禮也夏齊侯伐我北鄙圍成公救成至遇季孫宿叔孫豹帥師城成郛成孟氏邑也崔氏曰公救成北至遇齊侯或已解圍而去故公不進傳謂畏齊不敢進似誤矣若實畏齊不敢進當書次不書至也戴氏曰齊圍成而公親救既而二卿城成郛用見孟氏之强公不敢不出而二卿合比以弱公室也葉氏曰前圍而公救之固過矣今二氏復各以其軍為之城著三家之自為政也先師嘗言三家私相封殖城費則叔仲以媚季氏城成郛則季叔以私孟氏愚按魯自作三軍魯國已盡為三家之有而成又孟氏私邑諸家反責襄公不能救成致郛壞而非時以城者殆腐儒之談不能尚論其世者也郛外城也孟氏蓋因是益固其守至定公十二年公圍成而不可隳秋八月丁巳日有食之書災邾人伐我南鄙邾黨於莒而附齊故齊伐我北鄙邾伐我南鄙魯告晉晉將為㑹以討邾莒晉侯有疾乃止許氏曰魯自文襄失政齊與邾莒交伐其國由民分於三桓故也冬十有一月癸亥晉侯周卒晉悼公生十四年而立立十五年而卒壽甫三十其經營楚鄭時年方二十四五功視桓文而德則過之嗚乎盛哉木訥趙氏曰晉室中僨三郤誅厲公弑悼公以公族自外入繼即位之初慨然思復文公之業一為宋圍彭城而得諸侯再奪鄭虎牢而得陳鄭外抗强楚内連東吳蕭魚之㑹不戰不盟楚不敢争鄭不忍叛雖召陵之役不是過也其功業直將俎豆文公於百載之上襄成靈厲有慙德矣以傳觀之悼公之所以成霸業者抑亦内外兩治者歟其為國也施舍己責逮鰥寡振廢滯康乏困救災患禁滛慝薄賦斂宥罪戾舉不失職官不易方爵不踰德師不陵正旅不偪官民無謗言所以復霸若傳果無溢美則悼公直出威文之上十有六年春王正月葬晉悼公三月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于溴梁戊寅大夫盟晉人執莒子邾子以歸齊侯伐我北鄙夏公至自㑹溴古閴反晉悼公將為魯討邾莒未果而卒晉平公初立即速葬其父㑹諸侯于溴梁執邾子莒子以歸自謂討有罪能繼父志矣然因欲速反使其父悼公以中夏霸主下從大夫三月而葬之禮又身方居喪而速㑹諸侯以諸侯晏行歌詩之事諸侯咸在而反使大夫專盟邾莒皆諸侯而反使大夫得執之以歸故髙厚逃歸而齊怒滋甚又侵我北鄙矣晉平之不克繼如此五月甲子地震記災異叔老㑹鄭伯晉荀偃衛甯殖宋人伐許戴岷隱曰許侯欲遷于晉許大夫不從許之勢甚迫許之請可念也晉人歸諸侯而獨使大夫伐許猶未甚怒也獨許鄭有宿怨鄭伯身從諸侯甘心於許故以鄭序晉上為鄭主乎是師也趙木訥曰許為鄭虐遷於葉以依楚中國失許實鄭之由今晉不察復聽鄭伐許故十八年楚公子午伐鄭許故也悼公在位十五年置許不問以得許無益而徒犯楚怨為宋鄭之患也今平公聽鄭伐許無得而失則多矣秋齊侯伐我北鄙圍郕邾莒皆齊之黨相與伐我者齊貳晉執邾莒以齊故也故齊益伐我至於圍郕大雩旱而禱也大則僣也冬叔孫豹如晉以齊伐我故也齊自恃霸餘自柯陵之㑹遂不復出使大夫聽命使世子抗禮以魯服晉而伐之伐魯所以貳晉也故今穆叔往晉告急曰敝邑之急朝不及夕引領西望曰庶幾乎十有七年春王二月庚午邾子牼卒邾宣公立十八年卒牼公穀並作瞷宋人伐陳髙氏集註曰七年鄬之㑹陳哀逃歸自是十年不與諸侯㑹而楚鄭連年侵宋宋於是請於晉而伐之夏衛石買帥師伐曹孫林父之子孫蒯田于曹而見詬故石買為之伐之曹人愬于晉故明年晉執衛行人石買秋齊侯伐我北鄙圍桃髙厚帥師伐我北鄙圍防齊素貳晉以虐魯晉平公又一旦執其相與伐我之邾莒所以重齊之怒而甚魯之禍嘗三伐北鄙再圍成今君臣又分攻其二邑蓋楚方不撓中國而齊以中國反自撓中國矣九月大雩旱祭而僣者也宋華臣出奔陳傳載華閱卒閱之弟華臣虐閱之子臯比賊殺其宰華吳宋公已因向戍之言而舍之矣國人逐瘈狗入其室華臣懼而奔陳木訥曰華臣奔而乃奔其君之讎君可疾乎冬邾人伐我南鄙邾宣伐我已為晉執邾悼新立又復修怨此叛晉也此與齊也此祝柯之㑹所以復見執也十有八年春白狄來公羊曰不言朝不能乎朝也夏晉人執衛行人石買為石買無故伐曹而執之也然不當因其為行人而執之也秋齊師伐我北鄙冬十月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊齊魯婚姻之國今怒晉而泄之於魯三年而五加兵宜諸侯之所共怒也故同圍齊岷隠曰春秋未有書同圍者而此獨書見齊之得罪者多而諸侯之同心者衆也曹伯負芻卒于師曹成公弑立二十三年而卒于師楚公子午帥師伐鄭石氏曰楚自蕭魚之㑹師不出者已七年今鄭子孔欲去諸大夫而專政召之來也故明年鄭討子孔十有九年春王正月諸侯盟于祝柯晉人執邾子公至自伐齊取邾田自漷水季孫宿如晉盟于祝柯之諸侯即同圍齊之諸侯也故不再叙晉執邾子者以邾之為齊伐魯也公至自伐齊者圍齊後復歸魯也取邾田自漷水者晉怒邾之伐魯不已故取邾之田以予魯自漷水為界也季孫宿如晉者拜其為魯伐齊且取邾田以予魯也然晉救魯可也動天下之兵以執邾子而取邾田不可也未足以服齊也柯公羊作阿葬曹成公計亦五月而葬夏衛孫林父帥師伐齊秋七月辛卯齊侯環卒晉士匄帥師侵齊至穀聞齊侯卒乃還齊未服而再伐之齊侯卒而還不伐喪也齊靈公立二十八年卒八月丙辰仲孫蔑卒蔑者孟文伯之子孟獻子孟子稱其有友五人者齊殺其大夫髙厚齊之權臣崔與髙也齊靈公死崔杼立世子光髙厚傅公子牙光立執牙故杼殺髙厚木訥曰髙旣以罪誅齊之權在崔而已故不旋踵而有崔杼之逆髙之殺崔之幸齊之禍也鄭殺其大夫公子嘉傳載子孔之為政也專國人患之子展子西帥國人伐之殺子孔而分其室其所以伐之之辭曰盜殺鄭三大夫時子孔知而不言也前年楚師至純門子孔召之也然此其辭也專殺而又分其室者私也子孔死子産於是始為卿嘉公羊作喜冬葬齊靈公秋七月卒至冬葬計亦五月城西郛左氏曰懼齊也齊嘗伐北莒伐東邾伐南矣故今備西叔孫豹㑹士匄于柯城武城齊伐魯魯恃晉今齊以晉不伐喪而與晉平故穆叔聘晉且城武城為備二十年春王正月辛亥仲孫速㑹莒人盟于向仲孫速孟獻子名蔑之子孟莊子也莒自五年鄫屬魯而明年莒滅鄫其後八年十年十二年十四年嘗伐魯魯愬于晉晉嘗執莒子前年諸侯盟督揚以和解之故今孟莊子始與之結盟迄二十年莒魯不交兵夏六月庚申公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵秋公至自㑹澶市然反左曰齊成故也木訥曰齊靈公卒晉士匄聞䘮不伐振旅而還齊人德之求成于晉晉合十三國㰱血于澶淵小大協和天下賴之愚按圍齊之役十二諸侯環其郛靈公至欲遷避而終不服今因感其不伐喪而求服甚矣禮之可以服人也仲孫速帥師伐邾傳稱邾屢伐魯魯以有諸侯之事弗能報今孟莊子報之然晉已為魯伐邾取田畀魯澶淵之㑹魯又方與邾同盟矣不宜更伐之也孟莊子父喪方新而盟莒伐邾專横如此急於擅魯爾蔡殺其大夫公子燮蔡公子履出奔楚陳侯之弟黄出奔楚傳載蔡文公欲改事晉畏楚不果而卒公子燮求從先君以利蔡蔡人殺之燮之弟履遂奔楚陳之慶虎慶寅專政誣公子黄與燮同謀黄亦呼於國而奔楚愚按澶淵之㑹獨陳蔡不與必諸大夫志在楚也叔老如齊齊魯既同澶淵之盟於是釋怨而修好冬十月丙辰朔日有食之書災季孫宿如宋傳曰報向戍之聘也宋人重賄之二十有一年春王正月公如晉魯連嵗困於齊邾莒今晉為平齊而執邾莒故往謝之也邾庶其以漆閭丘來奔庶其邾大夫也漆與閭丘邾之二邑庶其盜之以奔魯也左氏載季氏妻庶其以公之姑姊其從者皆有賜臧武仲謂之賞盜岷隱曰昔莒僕以寳玉來奔季文子使出諸境甚矣季武子之有愧於其祖也木訥曰今一受庶其之叛其後莒牟夷邾黒肱接踵而至曲阜之地匯為賊淵愚按此所謂春秋三叛臣者也然魯之受之皆非君命襄公如晉而庶其以漆閭丘來昭公如晉而牟夷以牟婁防茲來昭公在乾侯而黒肱以濫來然則實為賊淵者惟季氏歟夏公至自晉如晉拜師踰時方返秋晉欒盈出奔楚左氏載欒盈之母欒祈與其老州賔通懼欒盈之討也愬於欒祈之父范宣子誣欒盈將為亂宣子信之使盈城境而逐之盈遂奔楚木訥謂盈將倚楚以入叛也按欒書弑厲公而免於討欒黶汰而以内亂亡其家盈奔雖非其罪而積惡有自來矣九月庚戌朔日有食之冬十月庚辰朔日有食之襄陵許氏曰比年食今又比月食蓋自是八年之間而日七食禍變重矣徂徠石氏曰此年九月十月日食二十四年七月八月日食三年之内連月而食者再諸儒以為厯無此法或傳冩之誤然漢髙二年十月十一月亦頻食天道逺按交㑹之度而求之亦難矣曹伯來朝曹武公即位既除喪而始來朝也公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任音壬左氏曰錮欒氏也木訥曰一大夫出奔動天下諸侯以錮之盈亦何能為哉蓋懼其脅楚以入爾岷隱曰欒盈實奔楚非晉所得錮也商任之㑹非徒無益而又害之髙氏集註曰范鞅欲使盈無所容於世故盈發憤卒興大亂此以私敗公足為戒也公羊穀梁皆於是年附十有一月庚子孔子生二十有二年春王正月公至自㑹㑹于商任而歸也夏四月秋七月辛酉叔老卒注子叔齊之子也蓋叔肹之孫聲伯之子其子弓嗣是曰子叔敬子冬公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨公至自㑹時欒盈自楚如齊范鞅知之故復為沙隨之㑹以錮之師氏曰欒盈非有犯上之罪徒以范氏私怨再㑹諸侯以錮之是直起其惡心而有曲沃之事夾漈曰齊侯陽㑹晉而陰納欒氏故齊晉之仇復興楚殺其大夫公子追舒追舒者令尹子南也傳載觀起有寵於子南未益禄而有馬數十乘遂殺子南於朝轘觀起於四竟蘇氏謂罪不至死也二十有三年春王二月癸酉朔日有食之書災三月己巳杞伯匄卒匄古害反杞孝公立十七年卒夏邾畀我來奔畀我者邾庶其之黨也旣納其叛邑乂納其叛人葬杞孝公晉平公之母舅故魯㑹其葬而書杞始此也陳殺其大夫慶虎及慶寅陳侯之弟黄自楚歸于陳傳載二慶專陳公子黄奔楚陳侯如楚楚用黄之愬使慶樂往殺之而黄得歸楚木訥曰黄以君之弟而見逐陳哀侯僅免為衛衎魯昭幸矣今能殺二慶黄之謀楚之力也晉欒盈復入于晉入于曲沃欒盈自楚如齊齊因媵晉嫁女竊載盈入于盈之舊邑曲沃盈帥曲沃之甲因魏獻子以晝入絳兵敗奔曲沃晉人圍之按傳所載先入沃後入晉其次第與經不同或者疑之孫氏曰此欒盈以曲沃之甲入晉敗而後奔入曲沃也秋齊侯伐衛遂伐晉八月叔孫豹帥師救晉次于雍榆雍於用反齊自恃霸餘素不從晉晉靈之世衛嘗為晉伐齊齊故伐衛以報其役志實在伐晉也豹救之而次于雍榆者孫氏謂不救則懼晉之討往救則畏齊之强也木訥曰齊莊即位德士匄之不伐喪姑與晉平及其幸晉有欒氏之亂復伐晉以報平陰之役然不修澶淵之好而修平陰之怨莊公亦好亂樂禍者宜其不善終也己卯仲孫速卒此孟獻子之子孟莊子也莊子無適嗣公鉏長而愛其幼子名紇故臧武仲為之立紇是為悼子冬十月乙亥臧孫紇出奔邾紇下沒反臧武仲阿季氏意為之廢長立少其長公鉏既見廢亦為孟氏廢其長秩而立其少羯以激怨孟氏蓋孟氏素惡臧氏者也孟氏遂告季氏謂臧氏將為亂臧武仲斬關出奔孟椒盟之曰無或如臧孫紇干國之紀犯門斬關武仲如防請後魯立臧為而臧紇致防奔齊孔子謂其要君者也晉人殺欒盈傳載晉人克欒盈于曲沃盡殺欒氏之族不書殺其大夫者黎氏謂前書出奔已非晉大夫次書入晉則晉之冦此書殺欒盈則討賊之辭也齊侯襲莒傳載齊侯還自晉而襲之也趙子曰掩其不備曰襲黎氏曰春秋用兵雖多無書襲者此獨曰襲盖譏諸侯行賊盜之事臧武仲於其伐晉亦云聞晉亂而後作抑君似䑕䑕晝伏夜動二十有四年春叔孫豹如晉仲孫羯帥師侵齊豹如晉賀克欒氏也羯侵齊為晉故也木訥曰豹如晉以雍榆之次為功晉照其偽而有言焉故羯侵齊以悦之魯若移其侵齊之役於雍榆之次則豹不必往羯不必侵也岷隱曰豹之如晉賀克欒氏羯之侵齊為晉復怨夫當事而救不能致力既事而聘何益於晉當齊伐晉不能擊齊既退而侵何損於齊君子是以知其為文具也夏楚子伐吳左傳載楚為舟師伐吳不為軍政無功而還木訥謂楚怨吳之與晉今雖吳與晉不交者已十年至是凡三伐吳秋七月甲子朔日有食之旣食之旣災之甚也齊崔杼帥師伐莒木訥曰齊以盜竊之計襲莒實無得焉故崔杼因復伐莒成君之惡而已得行其姦岷隱曰君子是以知崔杼有異志助其君為虐矣大水書災也許氏曰夷儀之㑹以水不克伐齊則知水之所被者廣非特魯之災也八月癸巳朔日有食之食之旣矣而又連食尤其災也公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀冬楚子蔡侯陳侯許男伐鄭公至自㑹左氏謂謀將伐齊以水不克岷隱曰㑹于夷儀欲伐齊不克乃使楚人伐鄭以牽制中國木訥曰楚未嘗一日忘鄭特觀中國之釁而已今晉不能和諸侯以制楚而乃摟諸侯以伐齊且勝齊孰愈於制楚哉夷儀之㑹無損於齊徒為鄭招冦也陳鍼宜咎出奔楚傳謂陳復討慶氏之黨故鍼宜咎出奔楚叔孫豹如京師傳載齊城王城之郟穆叔如周賀城許氏曰自宣九年仲孫蔑如京師其後五十餘年始有叔孫豹如京師以罕書也自是不復聘王矣大饑木訥曰宣十年秋大水而冬饑今秋大水而冬大饑無先具也二十有五年春齊崔杼帥師伐我北鄙夏五月乙亥齊崔杼弑其君光公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀傳載崔杼見棠姜美而取之莊公通焉杼欲弑莊公故伐魯將致晉師弑君以說于晉而不獲遂歸而弑之夷儀之㑹將伐齊以討崔杼之弑齊賂之而還木訥曰諸侯不能討逆反冕弁端委以乞賂於盜為辱大矣齊莊公立凡五年六月壬子鄭公孫舍之帥師入陳左氏載初陳侯㑹楚子伐鄭當陳隧者井堙木刋鄭人怨之故今入陳秋八月己巳諸侯同盟于重丘公至自㑹傳曰齊成也按晉此行欲報齊莊朝歌之師也岷隱曰舍崔氏之大罪復莊公之小怨况又納賂焉何以宗諸侯愚按重丘之盟列弑君之齊不惟不克伐齊適以成其亂爾衛侯入于夷儀自剽簒立而衛獻公衎出奔今入于夷儀夷儀衛之邑也及甯喜弑剽始復歸于衛之都楚屈建帥師滅舒鳩傳載舒鳩叛楚吳救之大敗故楚滅舒鳩木訥曰羣舒近楚為楚蠶食至是盡矣成十七年滅舒庸宣八年滅舒蓼及是滅舒鳩其先本與楚俱張荆舒是懲是也而今皆併於楚冬鄭公孫夏帥師伐陳傳載子西復伐陳陳及鄭平按鄭之再伐甚矣以子產獻捷于晉子産辭辨而晉受之故恃此而再伐也十有二月吳子遏伐楚門于巢卒傳載諸樊伐楚以報舟師之役門于巢巢牛臣隱于短墻而射之卒吳諸樊立凡十三年二十有六年春王二月辛卯衛甯喜弑其君剽衛孫林父入于戚以叛甲午衛侯衎復歸于衛傳載衛孫林父甯殖逐衛獻公而立剽甯殖後悔之埀沒屬其子喜復獻公喜許諾至是獻公自夷儀與甯喜言於是甯喜弑剽孫林父元逐獻公而立剽者也故入于戚以叛蓋戚其私邑也剽弑林父出而獻公復歸愚按剽本簒立而書甯喜弑其君者喜嘗事之為君十年也衛侯歸而書名者剽弑衎歸衛有二君書名以别也夏晉侯使荀吳來聘公㑹晉人鄭良霄宋人曹人于澶淵澶市延反傳載晉黨衛之孫林父召公同㑹澶淵取衛懿氏六邑以與孫氏愚按孫林父衛之叛賊也晉平公反為之封殖如此鄭良霄獨書名者胡氏謂鄭伯為衛侯故如晉知其不助孫氏也時趙武主㑹止書晉人秋宋公殺其世子痤才禾反傳載痤美而狠向戍惡之寺人伊戾事痤無寵誣痤與楚客盟將為亂向戍曰固聞之痤求其弟佐為請向戍聒而與佐語故使佐失期痤無救乃縊已而公知其寃烹伊戾愚謂此向戍之罪也晉人執衛甯喜傳載晉人執喜詰之曰曷為納君而伐孫氏則是為叛賊之異已而執之非以其有弑君之罪而執之也八月壬午許男甯卒于楚冬楚子蔡侯陳侯伐鄭葬許靈公傳載許靈乞師于楚以死為期楚故為之伐鄭而後葬也按靈公立四十五年為讎鄭而死蠻荆二十有七年春齊侯使慶封來聘齊景公初即位慶封得政欲善於諸侯於是來聘夏叔孫豹㑹晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋左氏載宋向戍善於晉趙文子又善於楚令尹子木於是合晉楚于宋欲弭諸侯之兵以為名衛殺其大夫甯喜衛侯之弟鱄出奔晉寗喜旣弑剽迎復獻公而專公患之公孫免餘為公殺之初喜之謀復獻公也謂公不信欲得其弟鱄之言以為信喜以鱄之言而返公今公殺喜故鱄出奔終身不仕秋七月辛巳豹及諸侯之大夫盟于宋向戍㑹十四國盟以弭兵上文惟序九國者注云齊秦不交見邾滕為私屬皆不與盟宋為地主與盟不待序也是役也楚衷甲争盟晉讓楚先㰱書先晉者貴信也鄭夾漈曰宋之㑹大成也未有合晉楚之成而大夫專之者也然自宋之盟四十年九國不仇兵戴岷隱曰弭兵之功小大夫專盟之罪大大夫固嘗盟于溴梁矣當是時諸侯皆在㑹憚於一盟遣大夫以為盟是諸侯之怠非大夫之專也大夫專盟未有如宋者也春秋書宋之盟特言諸侯者明君臣之義特先晉人者正夷夏之分孫泰山曰自宋之㑹天下皆大夫專之冬十有二月乙亥朔日有食之書災也左氏謂再失閏劉氏權衡辨其不然二十有八年春無氷三之日納于凌陰今正月也去年常燠故今無氷夏衛石惡出奔晉傳載討甯氏之黨故惡出奔邾子來朝邾悼公舊每伐魯自魯愬之晉而執之取其田納其叛邑邾冝無以自立今其來朝蓋屈服也秋八月大雩旱祭之僣仲孫羯如晉傳為宋之盟告將如楚也冬齊慶封來奔傳載慶封好田而嗜酒與其子慶舍政以其内實遷于盧蒲嫳氏國遷朝焉慶舍為盧蒲癸所殺慶封伐之弗克遂來奔齊人來讓奔吳吳與之朱方富於其舊十有一月公如楚秋既使羯告於晉今乃如楚傳載公及宋公陳侯鄭伯如楚岷隱曰率天下朝楚明告于晉晉不得而辭也尚得以宋之盟為晉趙之功乎夾漈曰為宋之盟故從楚之諸侯皆朝于晉從晉之諸侯皆朝于楚謂之交好魯君之如晉屢矣自周公以來於今始朝楚十有二月甲寅天王崩周靈王立二十七年崩乙未楚子昭卒楚康王立十五年卒二十有九年春王正月公在楚夏五月公至自楚岷隱曰當正月之吉身在夷狄之國左氏以為釋不朝正于廟公羊以為存君穀梁以為閔公皆得之矣木訥曰成十年襄四年昭十五年公皆如晉皆踰年而反不書公之所在惟昭公見逐於季氏三年之間皆書正月公在乾侯今公如楚權在季孫宿觀左氏載季氏取卞公謂公冶曰吾可入乎則事亦危矣此所以書公之所在也其書公至自楚蓋楚止公以送楚之葬凡七月乃得歸穀梁謂殆其往而喜其返也庚午衛侯衎卒獻公立通前三十三年嘗為孫林父所逐者十年閽弑吳子餘祭側戒反左氏傳載吳伐越獲俘焉以為閽使守舟餘祭觀舟閽以刀弑之仲孫羯㑹晉荀盈齊髙止宋華定衛世叔儀鄭公孫段曹人莒人滕人薛人小邾人城杞晉侯使士鞅來聘杞子來盟杞晉平公母家也故合諸國城之士鞅杞子之來皆謝城杞也吳子使札來聘公羊盛言札之賢而進之劉氏質夫曰札不稱公子以辭國而生亂者札為之也張氏曰季子為其父之所立其兄之所屬違父兄之命徒以㓗身而去為髙觀宗國之危亂僚與光之相殘若秦人視越人之肥瘠况身為貴戚自古聖賢未有視社稷安危若是恝者夫子所謂果哉末之難矣其復位而待之言曰非我生亂君子殆未之信也劉質夫之傳得聖人之旨矣趙氏鵬飛曰彼其來聘豈情也哉窺中國而已愚按春秋書吳札之來聘與書楚椒秦術之來聘同而史載其後闔閭弑僚札為之使東諸侯其窺中國可知矣公羊言札終身不入吳國者亦妄也苟不義其為如曹子臧猶可也胡為而為之來聘為之來聘而云不入其國可乎公羊因其逃國而髙之故過為之辭凡前諸儒之說皆正也秋九月葬衛獻公五月而葬齊髙止出奔北燕髙止髙厚之子北燕召公之後今始見於經髙止好以事自為功且專公孫蠆公孫竈放之而奔木訥曰自髙止奔之而燕以亂燕伯奔齊齊侯伐燕皆基於髙止然愚恐亦意之爾冬仲孫羯如晉羯居謁反左氏謂此年士鞅來聘而報之也三十年春王正月楚子使薳罷來聘罷音皮髙氏集註曰公踰年在楚楚郟敖新即位故使薳罷以報之夏四月蔡世子般弑其君固以閨門之惡也固者景公也立四十九年五月甲午宋災宋伯姬卒伯姬以傅母不在宵不下堂逮乎火而死蓋寧死而不失其節天王殺其弟佞夫王子瑕奔晉周景王初立儋括謀亂欲立佞夫佞夫不知而王殺之子瑕佞夫之與也故奔秋七月叔弓如宋葬宋共姬叔弓者叔老之子使之共葬賢伯姬也諡共從夫正也鄭良霄出奔許自許入于鄭鄭人殺良霄左氏載良霄者伯有也强子晢使楚而嗜飲不戒子晢攻之伯有醉奔許許者鄭仇也伯有復還以其甲入駟帶帥國人伐之伯有死於羊肆良霄不稱大夫者戴氏謂其出奔已絶於鄭冬十月葬蔡景公四月見弑十月方葬晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人㑹于澶淵宋災故澶市延反公羊曰卿不憂諸侯崔氏曰直為宋災之故而為㑹其無補於宋明矣三十有一年春王正月夏六月辛巳公薨于楚宫如楚七月不知恥又歸而效之作楚宫薨于是宫非正也秋九月癸巳子野卒立而卒傳以為毁也己亥仲孫羯卒慶父之後孟孝伯也冬十月滕子來㑹葬癸酉葬我君襄公諸侯之喪士弔大夫送葬滕成公來㑹葬非禮也十有一月莒人弑其君宻州傳稱公子展輿弑其君自立而經書莒人當以經為正襄公四嵗即位權在仲孫蔑叔孫豹季孫行父及其子季武子作三軍以分公室然自即位至十五年皆晉悼公再伯之十五年國以無事悼公旣沒困於齊邾莒連年之師晉平公為之平齊而執邾莒稍吐氣矣及平公與楚盟於宋與楚弭兵楚遂横行中國公兩事晉楚見辱於楚得脫而歸不自痛憤反效夷言作楚宫卒没於楚宫是豈能自立者哉黄氏日抄卷十一
