body:
  text: 黃氏日抄卷四十宋黃震撰讀本朝諸儒理學書八東萊先生文集詩送丘宗卿守嘉禾詩簿書高沒人迎筆風摧枯自許豈不豪歲晏終何如此戒乘快無惻怛之心也表代張嚴州謝免丁錢表自昔邦家惟欲編氓之繁阜於今閭里反憂孫子之衆多狀為張嚴州作免丁錢奏狀嚴州即南軒也本州承平時每丁官給鹽一斗計五斤每斤計三十一文二分省共計一百五十六文納絹一丈二尺八寸內一半折錢一百六十文又折帛錢如其數兩項共三百二十文以鹽價百五十六文比折外貼納百六十四文亦未見其害也蔡京變鹽法賣客鈔又復給丁鹽徒令納絹絹價復長舊每匹一貫今二貫以故貧民規脫丁口不敢褁頭生子亦往往不舉旋奏減得請有先生為南軒謝免丁表劄乾道輪對劄第一論聖學謂希進之人妄變典章第二論恢復大事不可輕信迎合淳熙輪對劄謂獨運之說不可不察者五事又對劄謂國朝寬大忠厚禮遜節義逺過前代當愛護勿替進篇次文海劄子文海元係書坊刋行先生乞就裁損斷自中興以前凡六十一門百五十卷館職策謂賈誼先外後內治原殆未深講姚崇不能格心而務力邀君埒之誼非匹矣詞鋒橫出讀之起人意先生時年三十五記台州修城記州歷慶厯之水宣和之盜乾道之火趙公汝愚為守新其城撫州浮橋記橋作於乾道初郡守陳森淳熙二年水趙景明復新之秀州陸宣公祠堂記城東橋以宣公名相傳公生之地學故有祠郡守吕正已復新之泰州修桑子河記范文正作捍海堰起海陵屬鹽城衡百餘里淳熙初潮大上圯者半旋築之獨桑子河以南徑如臯繚許氏莊後文正規略所未及歷陽魏欽緒併為之堰云白鹿洞書院記唐李渤所隱居我太宗驛置九經俾諸生肄業與嵩陽嶽麓睢陽為四書院晦翁淳熙六年為守得廢址乃興今書院云重修釣臺記謂使先生微有意於傲世立名一再傳之後且將為西晉之清虛矣至於節義之弊過於亢激特時無皇極之君均調消息非造端者之過也祠之前羊裘軒其東客星閣招隱堂序戴衍字序以衍在中之義字在伯洪無競字序洪名裒然更名無競而字求仲蓋不欲為科目是羡而求人所不求之坦途也文意燁然李仲南集古録序堙罍沉鼎頽趺仆碣布濩於莾蒼之濵餘欵墜刻流落人間財以侑几案娛賔客而止耳歐陽公始輯之李丙仲著録千卷文字陽豫而陰抑之以觀物者必於其㑹為說尤精竒大事記序周敬王三十九年以下歷代史書薛畏翁詩後元祐諸公以簡靜無求為家法書趙路分行實後無所歆羡而為善無所創艾而不為惡此天下實德君子路分當是福王之父代宰臣謝御書崔實政論推明不可過嚴之意題通鑑本末後謂袁機仲躬其難而道學者以易學者毋徒樂其易而深思其所以難則幾矣題近思録謂首卷陰陽性命之說特使之知有所嚮望而已餘卷講學之方具有科級若躐等陵節流於虛空則豈所謂近思者耶書許吏部詩後吏部去國極意探討前輩源委以敷殖經世久大之業非獨以一時與秦丞相異同為諒也題紫微翁與曾信道手簡後謂吾家全盛時與江西諸賢特厚其歷叙曲折處極可觀有關世變書所定古周易費氏易在漢最近古最見排擯而今獨存自康成輔嗣合彖象文言於經學者遂不見古本近世嵩山朝氏編古周易或以為未安今一以古為斷祭文祭曾文清與祭南軒文委折可觀行狀待制王居正行狀其先仕蜀後徙維揚公不用三經義字說流落不偶餘十年其後登朝著三經辨學力排王氏嘗論省費謂於一二日少駐蹕之頃以數路數十州土地之所出欲盡為向者一百七十三年之事不忍暫有所廢革嘗知婺州力請免貢羅及辦供御炭用胡桃鵓鴿文之說初善秦丞相後排之屏居羡陽而終亦嘗排坐講之議云志銘朝散潘好古墓志紹興丙辰歲侵公既發廪復致他郡粟下其直之三以貸之秋稔民勸趣償視初貸復詘其一甲子水舟人獨載公公諭舟人先載餘人婺田恃陂塘公有塘曰葉亞聽民取之斥田以廣瀦蓄子景憲景愈知名義烏徐君志言擇地失葬之弊祔韓氏志先生兩娶韓元吉之女薛常州墓志銘公名季宣字士龍其父徽言從胡文定學終起居舍人公少孤妻父荆帥孫汝翼迎袁溉為之師溉及登程夫子之門公少為武昌令金亮叛盟公說汪徹令成閔乘得蔡破竹之勢下潁昌徑陳汝趨汴都敵內顧且驚潰不能用而陳蔡新附諸城接踵復為敵矣江淮仕者大扺無固志公獨留家不遣念除盜莫如聨保甲疆陲有事惟素整者可不亂所以整教者甚悉訖敵退人心不搖嘗部餫信陽隊五次舍悉倣行軍役罷死者才一人虞丞相允文白遣公行淮西安流民授田墾築具有法入覲言外事無足道而深憂近侍陰擠正士出守湖州禁祠傷神者死獄大減初陳亨伯割諸道留州錢輸大農號經制翁彥國復總制至是戶部令提刑司以厯付場務一錢以上皆分𨽻經總公獨言於朝曰自經總制立額州郡鑿空取盈若復𨽻額外征掇其强半郡調度顧安所取殆復為他謬巧民何以勝戶部鐫譙愈㥯公爭愈强遂收前令不布改知常州未上卒於家年四十公之學博覽精思於經無不合於事無不可行言兵變化若神詩書春秋中庸大學論語皆有義訓九州圖志之屬藁方立而未究云金華王氏志言氏族反為婚姻病由卑援高者厥咎僭厥罰常辱厥妖婦乘夫由高耦卑者厥咎貪厥罰常驕厥妖夫虐婦金華汪君志言義役嚴陵方君志唐末處士方干居白雲原至今一原數百家衣冠人物為盛銘云雲來四世愚恐雲來在四世之外金華曹將仕志司録而下三傳曰隨曰傳曰介五傳曰韶六傳而得公余謂此叙世系省文法也公嘗升辟雍蓋三舍法之制永康王君志太學生王頥之父名恬自少至老以畏謹持門戶有奪攘者曰吾豈以尺寸地敗宗姻恩意哉時德輔志德輔名汝翼先墓蕪廢次第經緝自始祖而下十餘處春秋帥其族灑掃邢邦用志既舉進士得官盡棄故學遍從先生長者游汲汲求踐其所聞自任者厚朝散潘好謙志娶陳少陽女得官靖厚淳質陸九淵為之碣銘陸先生志銘先生名九齡陸出媯姓陳敬仲適齊别其氏為田田氏有國宣王封少子通於陸鄉又别為陸唐乾寧宰相希聲之後居撫之金溪有居士賀者以學行為里人所宗有子六人先生居第五秦檜當國無道程氏學者先生獨委心焉為太學録先之以身正之以漸行之以無事惟跌宕見鐫譙者退亦心服登乾道四年進士第教授興國軍以家難去官調全州未上以疾終先生和順不違物而非意自不能干簡直不狥人而與居久益有味方其勇於求道憤悱直前蓋有不由階序者矣然其所志者大所據者實公聽並觀却立四顧弗造於至平至粹之地弗措也所謂仁以為己任者於此見之金華時母陳志母囑毋循葬師先生因而歷序古禮及後世卜葬之弊家傳東萊公家傳國朝知泗州吕龜圖生蒙正相太宗真宗龜圖弟龜祥知壽州生大理丞蒙亨蒙亨生夷簡三相仁宗夷簡生公著相哲宗公著生希哲為滎陽公希哲生好問是為東萊公好問生子本中而下五人孫大器而下九人曾孫祖謙而下十六人祖謙東萊先生也自滎陽公以道學為世宗東萊公早得其傳黨論起嘗厄困者二十年欽宗立驟用之圍城中備嘗艱難力勸張邦昌復辟而嘗受邦昌僞命論者及之逮三世而後先生為之傳蓋白其本心云集録入越集陰暗變化凡一草一木接於見聞者無不模寫其生意如曰老梧離立道旁茂灌如青玉幹如曰雲稻風葉皆鮮鮮有生意如曰秋水平岸菰蒲青蒼㑹稽秦望雲門諸山互相映發城堞樓觀跨空入雲耳目應接不暇凡皆其游樂之趣也謂蘭亭曲水必非流觴之舊謂禹穴乃大石中斷成鏬殆非司馬子長所探此為考古謂大能仁寺閣宏壯光麗然益知民力之困也此為警語謂目五雲門重堤隱然達曹娥五六十里為省塘異時有意復湖者第修省塘則盜湖之田不待廢而自為陂濼矣此為有益世道蓋可補南豐鑑湖記之所未及也入閩録訪晦翁於五夫而録不全日記庚子辛丑日記蓋病中編詩記大事記也晦翁跋其後云氣候之暄凉草木之榮悴亦必謹焉宗法集大傳曾子問及橫渠記解為之謂上治祖禰尊尊也下治子孫親親也旁治昆弟治整齊也五世袒免六世親屬竭但同姓而已欲約小宗之法異宫同財又為宗法條目以家廟為主日與朔望時祭皆約為定式云葬儀古禮稱哀子不稱孤子非有親服不致奠凡讀祝吉禮出左東向凶禮出右西向卒哭後用吉禮古者但設奠具漢以來設酒食自唐藩鎮競侈靡始縛祭帷至高數丈廣數十步作鳥獸花木輿馬侍從衣以繒綺靈輀過則焚之國朝令勑不得於街衢致祭右先生在嚴陵為潘叔度將儀禮開元禮書儀參定各有條目云廟制士一廟且於所居之左蓋祠堂一間兩厦祭用分至取氣之中時之均學規乾道四年規約以孝弟忠信為本五年規約以明理躬行為本官針以覔舉求庇獻書為苐一戒以下條目甚詳事涉權貴平心看理又舍人官針尤詳云當官先以暴怒為戒擇善先生舊所編書名也録左傳以下諸史謙厚之事如薛宣密封楊湛姦贓狀使自圖進退如卓茂舉善而教訴亭長受米肉者云遺之而受何故言如史弼答鈎黨云它郡自有平原自無其它甚多一一可觀省為法尺牘與南軒晦庵講義理者極可玩味而與晦庵者尤多其與南軒多自反之說若曰於要的處或鹵莾領略於凝滯處或遮護覆藏為學不進咎實由此又曰積蓄未厚而發用太遽涵泳未足而談說有餘其與晦庵多相規之說如曰頗乏廣大溫潤氣象如曰最當於矯揉氣質上做工夫如曰齟齬頗多皆誠意未孚之咎如曰吾徒講學政須於日用間就事上商量如曰禀賦偏處須融化得盡方可若其它論理說經處往往多質難之辭愚按先生與南軒嚴陵同寅朝列同巷平居最相得於晦庵則彼此訪求以求真是晦庵以千載道統為己任排斥異說毫髮不恕禍福是非一切以之有泰山巖巖氣象先生并包融㑹以和為主故常規警晦庵然道不直不見啓一時紛紛之辨者晦翁也垂萬世昭昭之訓者亦晦翁也顧後學於諸老自當參觀耳若其與他人書則極為晦庵回護與周丞相子充諸書其勸勉丞相謂從容調娛禆益元氣非若匹士以潔身為諒又謂實有禆益則不必蹟之外見事有次第則不必人之遽孚又謂消長安危所繫當念兹在兹其自謂則曰讀書視舊頗不鹵莾又曰至五十以後乃稍趨約其言晦翁則曰度不能俯仰謂沈叔晦直諒確實謂陸務觀疏與陳君舉書所見少差流弊無窮者往往皆高明之士與陳同甫書云留建寧凡兩月餘復同朱元晦往鵝湖與二陸及劉子澄諸公相聚切磋甚覺有益元晦英邁剛明而工夫就實入細殊未易量子靜亦堅實有力但缺開闊耳又嘗與邢邦用書云與朱元晦相聚四十餘日復同出至鵝湖二陸及子澄諸兄皆集甚有講論之益近嘗與子靜詳言之講貫誦繹乃百代為學通法學者緣此支離泛濫自是人病非是法病見此而欲盡廢之正是因噎廢食己丑課程趙良曰五羖大夫相秦六七年三置晉君注云納晉惠在僖九年納晉文在二十四年相距十九年樂毅伐齊曰若不遂乘之待彼改過恤下則難慮注云推此言則世之論毅者其然乎春秋講義亦少年之作但不至如慱議之太刻耳左傳手記視講義稍不衍文讀史綱目以紀綱體統機括為說辨史記十篇有録無書謂非皆無書余嘗附其略於古今紀要讀史漢手筆所記及賊莽之奸欺豈以示有國家之警戒耶然愚嘗謂君尊如天地道無成凡天下之功皆人君之有人臣固無預也漢末名為諸儒者以苟順成風頌莽功德置君何地末流之弊勢有必至者雖莽初心不至是也此亦不可不揭之為萬世戒謂文帝於胸奴來則禦之未嘗窮追正嚴尤所謂中策而尤獨遺文帝何哉愚謂文帝三代所以待夷狄者也謂陸賈使其子析居分財敗俗傷化愚謂賈不忍仕于吕氏分財兒曹東西遊息此寓之飲食燕樂而誅吕安劉之功藏焉者也觀豪傑自不當責其細晦庵言太極中庸處東萊皆質難但出於平心講求耳答朱子問仁謂愛指其用公指其理覺指其端孟子曰仁人心也此仁之體程子以為性者特仁屬性爾答南軒語孟疑簡明可玩味答學者所問其說多可觀惟云陳平之事雖使未濟而死獲謗後世君子不憾也此說却須契勘蓋吕氏自東萊公失節於張邦昌故先生於議論古今出處名節處率多陰為回護使不相形迹緣此習熟之久亦每覺弱了一兩分下茟時亦覺放寬一兩分此意熟味自見然用之於處世接物極為和平若論事到極處則當觀晦庵南軒之說陳平何人斯而乃謂世之譏其阿意王諸吕者為謗耶不寧惟是吕許公名相也而不免權術吕原明名儒也而不免佛學故先生於文字議論間未嘗譏權術排佛老雖其德性之寬和必亦陰有所礙學者所當諒其心䇿問一問晉之北伐二唐之方鎮三晉之人物四立政之官周官所無及詩春秋官稱亦與周官不合皆稽其顛末而詰以意所可疑問淮之水利夫差城䢴溝自南通北今射陽湖末口廣陵韓江皆不可不稽魏文自譙循渦自北通南今精湖廣陵故城皆不可不察曹之芍陂孫之濡須齊垣崇祖之守壽陽而堰淝水梁武帝之堰淮水以灌壽陽他如雞鳴召伯西陵柳浦若海陵之堰皆淮之水當考周之天官舍其鄉士大夫獨計府史胥徒三千六百有竒以一例六殆踰數萬千里之入何以贍之至於賔客之費歲以三百子男國計之為斛者六十四萬有竒為束者八十一萬上之為公侯伯加之為飱饔餼費益不可勝計漢自佐史至丞相九十二萬二百八十五員月廪踰百斛他費尤行闕可計而貫朽粟腐復大可疑宏詞進卷建隆編勑序五代為一切之法以求勝民千機萬穽罔民而納之死我藝祖以四卷之簡而馭億萬生齒之繁昔之法多而犯亦少果在此不在彼也拾遺佚老庵記勸富人惠鄰里為人作論旱劄子云困厄迫之狀十僅達其三四自朝廷觀之則似過甚自旱荒之邦觀之則猶恨其有所未盡也附録年譜紹興七年丁巳公外祖文清公曾幾轉運廣西公之父倉部侍游三月十七日公生於桂林甥館年十二歲以祖駕部致仕恩補將仕郎十九歲從三山林少頴游二十歲魁福建漕薦明年中銓授嶽祠二十四歲從藉溪胡原仲名憲及汪公應辰二十六歲薦於淅漕明年中禮部苐六名賜及第又中宏詞科授睦宗院教授三十一歲講授於昭明寺明年作慱議三十三嵗添教嚴州三十四嵗除太學博士兼國史編修三十五歲改宣教郎試館職明年考省試以病歸明年習講尚書又明年編讀詩記三十九歲訪晦翁輯近思録同㑹諸儒於信州鵝湖四十歲再㑹晦翁於三衢復編詩記除祕書郎四十一歲校正文海四十三嵗考殿試除著作佐郎尋遷禮部郎凡除皆兼史如舊明年以病歸復修讀詩記四十歲初作大事記四十五歲當淳熙八年辛丑七月二十九日終弟祖儉志其壙祭文晦翁發明盡之一時諸儒或各主所見辛稼軒本以吏能稱其言獨曰厥今上承伊洛逺泝洙泗朱張東萊屹鼎立於一世陸象山則曰鵝湖之集適後一歲輒復妄發宛爾故態公雖未言意已獨至又曰更嘗頗多觀省加細追惟曩昔粗心浮氣徒致參辰豈足酬議於此亦足以占象山所與鵝湖㑹議時不同而世之承襲者尚祖初說自外正論亦弗思矣善乎陳謙之祭有曰諸老異同兼包并容於是知當時東萊平心調護之功居多而後之學者所當遐想云賜諡婺州丘壽舊申請接朱張為此孔煒諡議亦謂朱張與公互相劘切其曰有自負其能高視一世壁立倚天者及見公降心屏氣斂鍔藏鋒脫去故習若未嘗有挾者焉此言公調娛象山最為切覆議丁端祖則曰得晦庵朱氏南軒張氏東萊吕氏續濂溪二程之傳而大道以明人心以正諡法開物濟務曰成通達强立曰成諡之以成夫何慊此萬世公論異端自高者退聽矣實嘉定八年指揮易說諸卦皆備殆類全多是發明義理可以玩味然特出於門人集録非先生親筆亦間有語未瑩處如天在山中大畜云山安能畜天以方寸能留藏八荒則亦有此理愚恐經文只是山中見天耳非必包天於山如洞天之云也如大過獨立不懼云常人數百年所不見必大驚駭無一人以我為是非大力量何以當之愚恐經文只說自守之堅耳若人大驚駭而我獨不懼王金陵執拗可監也如君子以虛受人云聖人無邪無正皆受之語亦微過於寬邪正恐難兼受學者所當斟酌至若首句云讀易當觀其生生不窮處極後解繫辭生生之謂易云生是新鮮變動之意此先生看易之大綱學者當隨事意㑹詩說首句云詩者人之性情而已只以平易觀之此深得說詩之法然皆其門人所録語亦有未瑩如漢廣秣其馬秣其駒此正思以禮而云欲念數起如柏舟不能奮飛此正其鬱悶而云非不能奮飛特不忍去如還詩刺荒而云田獵中自有精神不知精神正是荒處也如碩鼠詩誰之永號而云它處無復號泣不知其預言去後無永號於此者乃惻怛戀舊之心非言他處也其他别生意義皆平易之反先生本說未必如此至將仲子一詩謂莊公待其弟之惡稔此却是先生以春秋說詩用法太深處竊意莊公當其母偏愛叔假事極難處隱忍順從乃其真情事變至極豈能預料後世徒見其後來之克假遂逆料其初心之殺假不知莊公不幸遭母子兄弟之變當人心天理未變之初其情有可念者讀將仲子之詩可見也周禮說言比閭族黨州鄉為成周疆理天下之法言大司徒荒政十有二如散利須更考太府天府等掌錢之官薄征考九賦九貢緩刑考司冦士師言土均所均即大司徒所掌之士而斟酌損益之又言師氏詔以德教國子大司樂掌成均之法以樂德教國子甚詳禮記說多說曲禮學記等進修之法於幼子常示毋誑一章責孟母買肉啖子一誑成兩誑最是入小人之徑路其論精矣然孟母當時買肉以實其戲言乃是悔過而善處之所謂仁術之類入君子之徑路也其解五帝憲三王乞言一章極精確有味云憲者瞻儀容觀起居不待乞言三王則從容欵曲忠敬誠慤其說學記七者之教云九分是動容周旋灑掃應對一分在誦說今全在誦說了無涵畜工夫皆反本之論訓學者最為深切論語說愚嘗謂聖人言語極分曉所待訓釋者字義耳又天下之義理無窮前賢天資高則領㑹又别故書之以詔後世耳若此外衍說則不必也朱張論語說皆有成書惟東萊數條僅出於門人集録然猶賴此可與朱張參考互發獨其說始吾於人今吾於人與先進於禮樂後進於禮樂深則厲淺則揭於本文明白之中别生新意恐集録者之誤又鄉原德之賊不過以鄉黨中謹願之人見善非明用心非剛而柔善為衆所恱或者因以為然則反為德之賊今直謂鄉原之心要牢籠盡天下人不獨鄉原之本心不如此竊意夫子譏鄉原之意亦未必如此前輩各為辨說雖皆義理所在各足以警世而後學因之為新說至近世尤甚謹書以自防孟子說見梁惠一章云以仁義為天下何利之足言說王天下自是正理太王事狄一假云人事盡然後可以付之天子路人告以有過云子路之心專是求益孟子致為臣而歸一假云方其未出使人君欲見不可得及言不用道不行使人君欲留不可得如是然後可任道之輕重保社稷之安危自古人君本未嘗輕士自是士自輕他如謂匡章能有悔心而獨處自省謂易之消息盈虛春秋之褒貶是非為時中之義謂孔子不與陽貨辨而與少正卯辨孟子不與申韓辨而與楊墨辨為深明乎疑似之際皆警切簡明他不勝記但謂樂正子一為餔啜已入陷穽則似未安蓋樂正子孟氏高弟孟子所望救世行道者也從子敖來而不能有益於子敖故孟子甚言以警之曰徒餔啜徒者止於如此而他無所補之辭如飲食而已素餐之謂也今世俗輕薄借以譏嘲誤以徒然之徒為圖求之圖而集録亦意其貧乏依附以干祿為比幾何而不實世俗之誤耶善乎先生之諸子喬年題其卷曰聽者之深淺記者之工拙則覽者當自得蓋必有窺門人之誤者矣然一仍其舊不敢竄易尤足以見先生家法之厚而吕氏之代有人先生又載陳瑩中說使王氏之門有負恩之士則漢之宗社不至於亡謂了翁蔡卞所薦其後每事力爭又云漢闕下之士皆以莽為周公再生而讀漢史手筆亦終始載新莽事獨詳焉先生豈以士風浸弱頗類西漢因以寓其憂患之心者乎集録史記云溫公通鑑正欲續左氏編年左傳之終云知伯貪而愎故韓魏反而喪之左氏終於此故通鑑始於此又云溫公論才德自分明愚謂尚有當推廣者未可見其分明而不察也蓋才德皆天所賦之善以其有用則謂之才如所謂天之降才元凱謂之才子而吾夫子歎才難是也以其自得則謂之德如謂有諸已無待於外之謂德顔閔謂之德行而吾夫子欲崇德是也才德可分賢否哉智巧小人於德謂之凶德則於才謂之不才如四凶稱不才子是也今溫公以智伯為才而以才專屬之小人以智伯無德而以德專歸之君子此恐指後世誤認不才為才者言之耳况謂德勝為君子才勝為小人則是君子亦有小人之才小人亦有君子之德特以分數多寡為君子小人之分而才不才之辨吉德凶德之異殆不暇察此又公因智伯之聰察一時立論云爾且以才德兼全為聖人聖人為君子之魁又為小人之魁乎世之賢者固多兼有才德而分量尚有差等豈得盡之聖人而愚人亦何至才德之兼亡耶農工之業一有濟於用皆才之類而家庭之事一有合於理皆德之屬區區之見如此尚得俟明師而請之論李克對魏文侯問相云不在朝廷而論朝廷事正可泛論大體對闕言亦然左原為郡學生犯法見斥郭林宗慰之謂蘧顔不能無過先生云所以開其善心華歆少與衆避亂有獨行者願俱歆獨曰無故受人不知其義及其人墜井歆又獨曰已與俱矣棄之不義先生云歆少年處事仔細然其輔操傾漢有資質無學問也邴原至遼東清議以格物管寧恐其招禍密遣西還此善處朋友劉巴輕張飛為武人孔明戒之先生云文武只一道自東京末高自標榜故劉巴猶有餘風宜見棄於劉備孔明死蔣琬代琬死董允代允死費禕代先生云後之為相者身在尚不能無失而亮死後猶足以維持二十年緣當初收得人才在王昶戒子願其效徐偉長毋效郭伯益略如馬援先生云教子本不欲其言人過而已反自言孫權疾張溫名盛而駱統表理之裴秋以為揚膏熾燎先生云田蚡正怒灌夫竇嬰乃言夫勇冠三軍宣帝正怒蓋寬饒鄭昌乃言猛虎在山藜藿不採此不善解人者霍光怒田千秋擅召中二千石杜延年歷數其罪然後言丞相故用事不可遂棄鍾期言不中以琴撞秦始皇始皇怒或曰悍人也又曰幸遇明君如遇桀紂則不免禍此善解人者後魏源懷巡北邊與故人元尼須為鎮將者飲酒明日檢其罪與蘇章同先生謂不覆護哀矜見其刻薄楊椿戒子孫有忠厚遺風後魏楊氏纍世孝友雜說左右廂起於唐本李靖兵法自府兵變為彍騎謂之禁兵諸道變為長鎮謂之鎮兵昭宗之亡禁旅盡矣朱全忠以鎮兵得國京師始分四廂諸軍分兩廂自周丗宗於方鎮寄招禁軍由是州郡始有禁軍太祖專治禁軍而廂浸廢為卒矣孔子告顔子仲弓問仁先生謂亦不是孔子自說出於左氏愚意左氏似後於孔子安知非引孔子之言耶王湛年三十宗族皆以為癡王述年三十未知名人或謂之癡先生稱其質厚韜晦君臣之間不是不可說話此皆士大夫愛身太重量主太淺殺百萬生靈亡數百年社稷皆生於士大夫患失王韶初下西邊魚行水面彼人不食故也國是二字乃不祥之語錢荒當以力農愛粟帛救之管仲才高只是辨不得個不做本朝大綱目如不殺如恤力役如賑凶荒如納諫諍如幸大臣第其中仁厚寬恤處皆是至熙寧王氏用事掃去盡矣闕楊炎併租庸調為二稅二稅外不許誅求一錢它却不知保不得後來大凡治財最不可壞舊法最不可併省名目不愧屋漏凡口然而心不然念慮間有萌動皆是辭受之際不須與人商量若受却商量人二三年讀聖人書一旦遇事便與閭巷人無異或有一聽老成人之語便能終身服行豈老成之言過於六經哉只緣讀書不作有用看故也或問為學多為事廢曰事未到時心先忙事已過後心不定所以占時節多張荆州教人以聖賢語言見之行事因行事復求聖賢之語言為學須是一鼓作氣間斷便非學所謂再而衰也用工夫人才做便覺得不是覺得不是便是良心人有干求可不可便說處兩不足之間凡應和語須對兩人皆可說聽人語不中節者擇其略可應一語推說應之權職便當以正官自處但不可妄有支用南軒曰心在焉謂之敬處家固不可不正且肅然不可不放一分先生以理學朱張鼎立為世師其精辭奧義豈後學所能窺其萬分一然嘗觀之晦翁與先生同心者先生辨詰之不少恕象山與晦翁異論者先生容下之不少忤鵝湖之㑹先生謂元晦英邁剛明而工夫就實入細殊未易量謂子靜亦堅實有力但缺開闊其後象山祭先生文亦自悔鵝湖之㑹集粗心浮氣然則先生忠厚之至一時調娛其間有功於斯道何如耶若其講學之要尤有切於今日者學者不可不亟自思也蓋理雖歷萬世而無變講之者每隨世變而輒易要當常以孔子為凖的耳孔子教人以孝弟忠信躬行為本至子思則言誠至孟子則言性已漸發其祕視孔子之說為已深至濓溪則言太極至橫渠則言太虛又盡發其祕視子思孟子之說為益深一議論出一士習變至晦庵先生出始㑹萃濓洛之說以上逹洙泗之傳取本朝諸儒議論之切於後學者為近思録矣然猶以無極太極隂陽造化冠之篇首則亦以本朝之議論為本也東萊先生乾道四年規約以孝弟忠信為本明年規約以明理躬行為本至其題近思録卷首則謂隂陽性命特使之知所嚮講學具有科級若躐等陵節流於虛空豈所謂近思嗚呼學者可以觀矣然人情好高誰守科級先生之垂訓雖嚴而學者之談虛滋甚嗚呼此吾孔子之所以不輕泄其祕與抑諸儒亦豈得已而泄其祕歟嗚呼士乎奈之何不近思象山天資超悟才辨雄絶眼空萬古無可人而獨靡然於東萊德性和平之感召亦其識象山文於數千稠衆中擢之上第稔習之機有漸而邁往之氣為消東萊因得而調娛之斯道之賴為多嗚呼非天歟勉齊先生文集書與李敬子博文易而約禮難後來學者專務其所易而常憚其所難人藏其心不可測度欲一窮之舍禮何以詞氣容止之間應事接物之際察其中理不中理十得七八矣愚按此本為琢磨朋友而發然後學可用以自治故録之復葉味道語録所載與四書不同者便徑削去則朱先生所集程先生語録胡為兩說不同而亦皆采之耶朱先生不敢自安而學者乃率然如此耶朱先生一部論語直解到死今亦有未安處不亦君子乎是第一段幾番改今觀程子云不見是而無悶乃謂君子是不愠然後君子也朱先生云故惟成德者能之則是君子然後不愠如敏於事而慎於言朱先生云敏者勉其所不足慎者不敢盡其所有餘用中庸有餘不敢盡之語然慎字本無不敢盡之意事難行故當勉言易肆故當謹耳志道據德依仁不當作次第說若作次第則游藝有所不通此一假乃近見一朋友語録中所載又可以其與四書不合而刪之乎與李制帥招軍不若使自結為保伍其頭目人命之以官且使守護鄉井有急則調發應援敵中所謂千戶想亦如此世宗取兩淮所遣策應軍以數萬計者不知其幾今兵弱如此可不早圖之乎又悉起諸郡配𨽻之人自為一軍復楊志仁謂形容此身只是形氣神理四字形則一定氣能呼吸能冷暖神則有知覺能運用理則知覺運用上許多道理有形斯有氣有氣斯有神有神斯有理只是一物又書道生一一生二二生三三生萬物老氏之所謂道非吾儒之所謂道天下之物無獨必有對若生一是獨也一隂一陽之謂道道何嘗在一之先易有太極是生兩儀易即陰陽何嘗生一而後生二一動一靜生死呼吸無往非二二各有本末終始故二分為四而五行立矣又書教官無鑒别不來極善此間朋友留戀碗飯有乞人所不屑者甚可鄙也復甘吉父五行有生數有行數某嘗疑其只是一樣天得竒為水故曰一生水一之極而為三故曰三生木地得偶而為火故曰二生火二之極而為四故曰四生金水者初生之陽木者極感之陽火者初生之陰金者極感之陰水木火金土五行之序也水火木金土分其竒耦初終而言也去私兄以為火能克金不應生金何故夏之後便為秋耶借曰中央有戊巳土不知何月日屬戊巳耶土旺四季何物非土所生豈特金耶金本土也以秋燥熱而生金謂之火生金惟其能生所以能尅又何疑焉某欲作三句論之曰論得數奇耦多寡則曰水火木金土論始生之序則曰水木火金土論相生之序則曰木火土金水如此其庶幾乎若謂先有水火後有木金則不成道理亦不成造化矣愚按勉齊此說與其師晦庵不同然晦庵論生之序似推測造化之初開闢而言謂天地尚混水始生而蕩滌其間是為天開其極則降而為山川水極生火而炎爍其間是為地闢其極則升而為日星於是陰陽又相摩蕩其間而五行􅊀人物生矣今勉齊則主天地間造化運行而言意恐各在也復李公晦綱目舊本威烈前諸國征伐至殺十數萬人者皆不載嘗以禀先生入得數假後欲重修而未暇如此大部帙其間豈無疏漏然其大法則正大的確非前輩諸儒所能及復胡叔器進道之要固多端且刋落世間許多利欲外慕見得榮辱是非得失利害皆不足道只有直截此心無懼見之動靜語默皆是道理與潘謙之天地之間無獨必有對以天言之則貧對富貴對賤窮對通泰對否以人言之則出對處進對退隱對見仕對止古之人惟義所在未嘗有所擇比年士大夫只揀一邊好底於已則利矣如義何此風一長望其舍生取義殺身成仁决無此理復陳監酒犒賞諸軍乃楊存中所私置不過遣小小卒伍之長居之後雖歸之朝廷亦視為至賤之職記安慶府廟學記嘉定癸酉蜀人張嗣古所建安慶舊舒州也文翁興蜀學正舒之人今以蜀之人興學於舒用此為結其前用晦庵教人之說而中叙事南康修白鹿書院記淳熙八年朱文公得洞學舊基而興之後三十有八年當嘉定十年公之子再守南康而增修之招從公之學而通其說者講授焉吉州永新縣學記嘉定元年盜發荆潭禍連數州越數年始定永新當往來之衝縣焚蕩無存者事定而縣尉范君建學因叙慶元開禧排士之修學者為僞輕啓兵端東南困竭州縣方且括民財事苞苴此盜之所由起則弭盜安民舍學何以哉袁州韓文公廟碑記歷叙堯舜相傳至孟子而臯陶伊尹萊朱之倫亦與知道者列自周襄至韓文公始以道自任天之所命之謂性公則曰所以為性者五曰仁義禮智信率性而行之之謂道公則曰由仁義而之焉之謂道修道以導民之謂教公則曰其法禮樂刑政其位君臣父子觀公之所見則公之以道自任可知矣世之稱公者既不足以知公之深甚者則指公為文人而又以文為道愚按知公之深論公之的至此記無以復加矣東坡所作潮州廟碑其文人之文哉漢陽五先生祠記成均之法擇有道德者使教焉沒則祭於瞽宗謂之先聖先師國無人則取諸其鄰與其鄉鄰而嘗仕於其國者二程生於黃陂為漢陽鄰壤門人游氏嘗守是邦而原其學之所自傳周先生實倡其始朱先生實成其終鄂州四賢祠記四賢濂溪二程晦翁也此記極陳道原之自出以及道統之由傳可以成誦和靖祠記謂其歷險難而不變處貴顯而不動抱仁履義終其身而不悔為程門退然如愚之顔子徽州朱文公祠記文公禀高明之姿奮强毅之學潛心密察篤信力行精粗不遺毫釐必辨至其德盛仁熟理明義精歷代相傳之道粲然昭著李貫之祠記貫之蜀人李道傳也以不及執經朱先生之門為恨凡從先生游者皆詘首與之交篤信力行卓然可敬仰止堂記丞相正獻陳公招晦翁館其家其子大府丞虙嘗摳衣焉思之而作此堂敬義堂記為長溪楊吳老作劉正之遂初堂記言子弟不淫於富貴之義可讀鄭次山怡閣記明兄弟之義重齊記為家抑作言以宏毅任重無欲齊記為家作發性靜無欲之義甚明毋自欺齊記為蜀李德進作以精一為知行意甚明潔樂斯庵記劉草堂舊居之旁章貢曾堅伯所築瑞蓮堂記蓮花之君子也蓮而瑞君子道長之祥也龍門庵記講學以充其所禀之氣庶博碩宏偉無負兹土之勝挈矩堂記為萍鄉社倉作戒殺記若省食肉亦覺志氣清明用度自少免分外過求不可以其說類釋氏而不思也序輔仁録序朋友列於人倫又所以綱紀人倫者也鄉飲酒儀序鄉飲教親睦也今之羣飲者教侈也誨淫也恣欲也無非所以敗人心故為明其義按此序叙儀物甚詳㑹表兄弟序以正月十日六月二十日酒肴相㑹世俗俚下之詞閨闥米鹽之賤謹勿出諸口送陳元平宰邵武序叙其氣豪而幸有志於學願以闕志帥氣則氣足以贊吾自治之决且屬其式尚書黃公之閭其必有所感夫春江渺瀰兩涘之間不辨牛馬而霜降水涸蛟龍蟄藏者乃天下之全功君尚勉之按此序極可玩味方明父歸嶽陽序尊晦庵之學蜀有李貫之後得家本仲今又得明父而明父又言番易曾師魯之為人因告曽孟以剛毅而傳書襲夢錫編晦庵語録言之於口不若㑹之於心者其㫖深玩之於書不若體之於身者其理實嘉定癸酉七月書於臨川雜著厯銘上動下靜象天地前推一蕩象六子晝夜運行命不已祖精紛綸物資始君子省身盍顧諟無小無大本一理醉牀銘責酒清易責人清難智者於酒可以反觀陶器銘一線之漏足以敗酒一念之差得無敗所守乎安慶勸諭榜周世宗攻兩淮淮人結集保伍截紙為甲號曰甲軍大敗周師蓋淮人忠實勇健若能固習雖有强敵莫能為患又唐咸通間浙東賊裘甫掠諸州惟明州之人相與謀曰賊若入城妻子皆為葅醢况貨財能保之乎相帥出財募勇士治器械立柵浚溝斷橋固守賊不敢犯况我淮民臨川勸諭榜謂工於訟者自絶天地毁辱父母破蕩家業殃及後代言具精到可為世戒晦庵先生行狀自延平李先生學於豫章羅先生云云至是殆天所以相斯文篤生哲人以大斯道之傳也共八板當别録成誦墓志銘知果州李道傳志銘隆州井研人逆見脅君抗節不撓進官二等為太常博士請以周邵程張五人從祀知真州築城又築城外兩名埧浚二濠决州之東北陳公塘以水為阻築倉儲糴補忠勇軍按閲弩手民兵請六合戍兵取拓拔魏大武土木偶殺江中為江東提舉行屬部劾貪吏十餘黥逐胥吏百餘人釋狴獄二百餘人逮繫池陽戍將之杖統制官者分賑宣池歙三郡除兵部辭得果州以郊歸卒年四十八愚按君蓋蜀人尊信文公道學之倡也兄心傳以史學顯弟性傳後仕至執政有為心傳後名獻可者其子董叔重番昜人名銖晦庵高第方僞學之禁嚴學者多變節逃散叔重正色諭之翕然以定晚年登第仕止金華尉乾淳之盛晦庵南軒東萊稱三先生獨晦庵先生得年最高講學最久尤為集大成晦庵既沒門人如閩中則潘謙之楊志仁林正卿林子武李守約李公晦江西則甘吉父黃去私張元德江東則李敬子胡伯量蔡元思浙中則葉味道潘子善黃子洪皆號高弟又獨勉齊先生强毅自立足任負荷如輔漢卿疑惡亦不可不謂性如李公晦疑喜怒哀樂由聲色臭味者為人心由仁義禮智者為道心如林正卿疑大易本為垂教而伏羲文王特借之以卜筮如真公刋近思後語先近思而後四書先生皆一一辨明不少恕甚至晦庵謂春秋止是直書勉齊則謂其間亦有曉然若出於微意者晦庵論近思先太極說勉齊則謂名近思反若逺思者晦庵解人不知而不愠惟成德者能之勉齊提云是君子然後能不愠非不愠然後為君子晦庵解敏於事而慎於言以慎為不敢盡其所有餘勉齊提慎字本無不敢盡之意特以言易肆故當謹耳凡其於晦庵殁後講學精審不苟如此豈惟確守其師之說而已哉若其見之行事則如宰臨川新淦推行實政守安慶漢陽慷慨事功又皆卓卓在人耳目然則晦庵於門人弟子中獨授之屋妻之女奏之官親倚獨切夫豈無見而然哉勉齊之文宏肆暢達髣佛晦翁晦翁不為講義而勉齊講義三十二章皆足發明斯道其誨學者嘗曰人不知理義則無以自别於物周旋斯出自少至老不過情欲利害之間甚至三綱淪九法斁亦將何所不至其言哀痛至此其為天下後世慮也亦逺矣勉齊之生雖在諸儒後故以居乾淳三先生之次明晦庵之傳在焉黃氏日抄卷四十
