body:
  text: 黃氏日抄卷三十二讀孔氏書闕南宫韜以智自將獨三復白圭子貢稱其居思仁公析哀不仕大夫家孔子歎賞之曽㸃疾時禮教不行顔由回之父商瞿傳易漆雕開習書仕不樂公良孺賢而勇孔子周行常以家車五乘從將戰出夫子於蒲秦商父堇父與孔子父俱以力聞顔刻為孔子業適衛司馬犂耕性躁好言憂兄桓魋司馬施問夫子何以知將雨梁鱣無子欲出妻以商瞿之言而止琴牢欲弔宗魯孔子弗許冉孺伯䖍公孫龍曹恤陳亢叔仲㑹少孔子五十歲與孔闕為二孺子秦祖奚蒧公祖兹廉潔公西與宰父黑公西減穰駟赤冉季薛邦石處懸亶左郢狄黑髙澤任不齊榮祈顔噲原桃公肩秦非漆雕從燕級公夏守句井疆步叔乘石作蜀邽選施之常申績樂欣顔之僕孔弗子蔑所孔子兄之子仕而忘者三孔子不恱漆雕侈懸成顔相右弟子宰我問聞諸榮伊黃帝三百年黃帝人也抑非人也何以能至三百年乎孔子答以民賴其利百年而死民畏其神百年而亡民用其教百年而移故曰黃帝三百年審如是則世傳彭祖夀八百者妄耳黃帝上古神聖且無三百之夀而彭祖商周之諸侯夀乃八百乎黃帝之年誤傳三百孔門以為怪彭祖去孔子時耳目相接夀八百反不以為怪而逺問黃帝乎然則妄傳彭祖之夀又出於後世好事者耳或曰彭祖之先得國自商至周國亡歷祀凡八百年謲雷鼓曰謲入廟孔子曰入廟如右登自阼階君子君子者成人之名百姓與名謂之君子則成其親為君而為其子也見人婚解褐毛布也發幣聘禮贈及大夫之名國語亦有砮箭鏃見石砮注喪家之狗有喪之家不見飯食故狗儽然見困誓篇衮職成王冠頌曰去王幼志心衮職喪欲速貧喪失位也合去聲孔叢子孔叢子者孔子八世孫鮒字子魚之所集殆家語之後繼其文雖類諸子而守論堅確更戰國秦漢流俗無所浸淫真足言孔氏之書矣其一記孔子之言於詩書為詳無一語及於髙逺其二記子思之言謂夫子嘗告以心之精神是謂聖按近世學者或執此一語以為識心即為聖人然子思之問本以審事物真僞夫子之答又繼以推數究理而聖人亦難之則所以發揮此心之用甚明正與異端識心之說相反其三記子上之言謂子思告以先訓學必由聖而雜說不與焉其四記子髙之言以理勝於辭終屈公孫龍白馬非馬與臧三耳無稽之辨其五記子順之言對魏王華山道士長生不死之問曰謂若聞之傳聞者妄也若聞之不死者今安在折學者稱孔子少孤不知其父之說謂由虛造謗言以誣聖人是未自潔而益其垢子順相魏九月說趙之間合韓之隙歸齊之尸陳大計不用知天下必并於秦致其事寢於家進退無愧矣其六則子魚詰墨之言子魚避秦禍而藏書陳耳薦之陳涉迎為太師諫涉用周章西入關知其必敗仕六旬先卒陳誼亦無辱焉凡皆所謂歷戰國秦漢流俗而無所浸淫者也然其所能守正非自任之重𢎞毅強立亦何能不浸淫也哉而原其所以自任之勇大抵皆原於子思謂其父析薪其子不克負荷謂之不肖者則子思所自任以繼夫子者也謂錦繢紛華所服不過溫體三牲太牢所食不過充腹而以無欲惟能成其志則子思所以訓子上使之自任者也謂堯舜文武之道可以力致而夜思晝行滋滋浸汲則子思所以傳孟子使之自任者也觀其却老萊舌柔不弊之說却其友樽酒束修之餽其所以堅強自立為何如故其能𢎞道如此其後子髙却鄒文季節之泣别子順却枚産匱財求富之說淵源固有自來矣孔叢子之後有連叢焉又子順弟三子之後孔臧之書臧為武帝大常與安國同集古義臧子琳琳次子茂茂傳子卭卭生仲歡歡生子立子立生子元子元生子建皆世其業而建不仕莾歸闕里生子仁子仁生子豐子豐能屈鮑彥淮南子之學子豐生和章帝幸其居為臨晉令而終其子季彥遂家華隂云䕫一而足第一卷胡盧大笑第四卷一祖龍始屠商也身修八尺鬚髯如㦸而人不敬第四乂手弟五卷外舅姑弟六䙝器名虎子連叢注闕里譜系孔子周靈王二十年己酉當魯襄公二十一年十月庚子生年三十三適周明年魯亂適齊年四十三自齊返魯年五十二當定公十九年為中都宰遷司空遷大司寇明年㑹夾谷二十二年隳三都二十四年攝行相事誅少正卯齊人歸女樂季桓子受之三日不朝孔子行遂適衛年五十七明年過宋適鄭遂至陳居三嵗去陳適衛衛不用將西見趙簡子臨河不濟自衛復如陳時魯定公二十七年也哀公四年孔子自陳遷蔡明年如葉又還蔡六年有陳蔡之厄楚昭王迎之得免昭王卒孔子自楚反衛年六十四哀公十一年魯以幣召孔子歸而刪詩定書繫易年六十九哀公十四年魯西狩獲麟乃因史記修春秋至獲麟而止哀公十六年孔子卒年七十四其先宋人也周成王封微子啓於宋以奉湯祀啓弟微仲衍生宋公稽稽生丁公申申生愍公共共生弗父何自何而下世為宋大夫何生宋父周周生世父勝勝生正考父正考父生孔父嘉其後奔魯遂為魯人嘉生木金父木金父生睪夷父睪夷父生孔防叔防叔生伯夏伯夏生紇字叔梁為陬邑大夫娶顔氏女徵在禱於尼丘生孔子因名丘字仲尼二代鯉字伯魚學通儒術魯哀公以幣召之稱疾不行年五十先孔子卒忠孔子兄之子在七十子之列三代伋字子思對孔子以其父析薪其子弗克負荷是謂不肖孔子欣然曰其克昌乎對魯穆公以除非法之事行周公伯禽之政化不能用乃適衛嘗言當吾先君周制雖衰君臣國位上下相時若一體然夫欲行其道不執禮以求之則不能入也今諸侯力爭競招英雄以自輔翼伋於此時不自髙人將下吾不自貴人將賤吾時移世異各有宜也於是在衛緼袍無表二旬九食著書四十七篇曰中庸教授弟子孟軻之徒數百人年六十二四代白字子上嘗請所習於子思子思曰先人有訓焉學必由聖故夫子之教必始於詩書而終於禮樂雜說不與焉白通習羣書又善兵法齊威王召白為國相年四十七五代求字子家通習儒道有遁世之志楚召不仕年四十五六代箕字子京為魏相年四十六七代罙字子髙博學沈靜有遁世志楚魏趙皆召之不仕嘗折公孫龍白馬非馬之辨著儒家之語十二篇名讕言讕音粲年五十一八代順字子慎魏安釐迎以為相改嬖寵之官以事賢才奪無任之祿以賜有功諸失職者謗之九月致仕曰不出十年天下其盡為秦乎秦莊王召之不行魏以孔子後嗣封魯文信君年五十七三子鮒騰樹九代鮒字子魚該覽六藝秦并天下召為魯國文通君拜少傅秦焚書乃歸藏書屋壁自隱嵩山陳涉起聘為博士遷太傅仕六旬言不用退卒於陳年五十七著孔叢子騰字子襄長九尺六寸漢髙帝祠孔子封為奉嗣君亦嘗為惠帝博士遷長沙太傅年五十七樹字子文鮒幼弟十代忠字子貞該習有髙志為博士年五十七生武及安國家語以為子襄生季中季中生武及安國隨字元路鮒之子聚字子産樹之子以將軍破楚陔下封蓼侯年五十三諡夷十一代武字子威為武帝博士至臨淮太守早卒安國字子國孝武博士至太守訓注經籍臧聚之子嗣蓼侯歷位九卿遷御史大夫辭乞為太常典臣家業十二代延年博覽羣書武帝時為博士轉太傅遷大將軍年七十一卭安國之子傳家學特善詩禮琳臧之子嗣蓼侯亦傳家學十三代霸字次孺幼有竒才昭帝時為博士宣帝時為大中大夫選任皇太子經遷詹事為密相元帝即位拜太師拜爵關內侯號褒成侯奉夫子祀年七十二歡卭之子為博士善春秋三傳黃琳之子坐事失侯茂黃之弟大司徒光以其祖有功德而邑土廢絶封關內侯十四代福襲封關內侯奉孔子祀年六十二捷福之弟列校尉諸曹喜捷之弟列校尉諸曹光喜之弟字子夏經學尤明歷輔成哀平三世王莾盛憂懼辭位年七十宣聚之𤣥孫長安公士詔復家立歡之子善詩書教授數百人吉鮒五代孫以殷後封殷紹嘉公十五代房襲封關內侯永光兄之子封寧鄉侯放光之子歷侍郎嗣博山元立之子為校書郎與楊雄友善何齊吉之子封宋公十六代均字長平好學有大才襲封關內侯平帝更封魯公褒成侯追諡夫子為褒成宣尼公王莽篡位拜太尉辭疾還鄉年八十一奮捷之孫通左氏春秋後漢行武都太守竒奮之弟著左氏義詁子建元之子不仕王莽闕里荆棘自除尚霸之曽孫巨鹿太守十七代志光武拜大司馬上幸魯祠孔子封褒成侯嘉奮之子城門校尉作左氏說仁子建之子潛後漢太子少傅避地㑹稽遂為郡人孟從王肅學闕二十三代嶷襲封奉聖亭侯啓衍之子廬陵太守竺潛之子吳南昌太守二十四代撫晉舉孝亷辟太尉掾襲封奉聖亭侯為豫章太守恬竺長子吳侍中選部尚書晉湘東太守冲竺次子丹陽太守奕竺少子全椒令有惠化二十五代懿東晉襲封奉聖亭侯愈恬長子晉左僕射餘不亭侯侃冲子大司農倫奕長子黃門郎注儀禮一卷羣奕少子少知名晉御史中丞二十六代鮮恢廓有大度好學善誘誨宋文帝以為奉聖亭侯後改封崇聖侯誾愈之子建安太守汪愈之子廣州刺史安國愈之子晉左僕射舊譜避漢武博士諱安國但云名國祗愈之子晉郡功曹史坦侃之子晉𣪚騎常侍有集五卷嚴倫之子領尚書有集五卷二十七代乘博學有才俊魏舉孝亷封崇聖大夫晉誾之長子尚書令靜誾次子宋侍中俟汪之子江夏太守混坦之子嗣當考道民嚴之子宣城內史靜民嚴之子散騎侍郎福民嚴之子太子洗馬道隆山隂人位至侍中況羣之孫丞相掾二十八代靈珍後魏封崇聖侯祐晉之子有至行靈符靜之子㑹稽太守靈運靜之子著作郎幼俟之子靈産道隆子光祿大夫廞沉之子廷尉光祿大夫景偉安國孫齊散騎常侍二十九代文泰襲封崇聖侯年五十八道徽祐之子守志業不仕圭靈産子為齊髙帝掌詞筆終散騎常侍湛之靈符子深之靈符子宋比部郎琇之靈運子宋江夏內史有吏能琳之廞之子以草書擅名宋侍中御史中丞有集十卷璩之廞之子揚州從事滔景僖子梁海鹽令遙之冲五世孫宋尚書左丞靈龜揚七世孫後魏國子博士三十代渠襲封崇聖侯北齊文宣帝改封恭聖侯後周宣帝進封孔子為鄒國公立後因改封鄒國公臻琇之子尚書三公郎珮遙之子齊通直郎曄遙之子中書侍郎士邈琳之子揚州中從從事總道徽兄之子有操行除竟陵王侍郎不至代滔之子歷清要碩靈龜之子後魏南臺丞三十一代長孫襲封鄒國公年六十四休源珮之子梁都官尚書有集十五幼孫臻之子梁無錫令䖍孫覬宋御史中丞尋陽王右軍長史行㑹稽郡事道存士邈之子南海太守長名嘗監修祖廟範岱之子博涉書史得仁範從祖弟安齊碩之子青州法曹三十二代嗣哲隋文帝時應制登科襲封鄒國公煬帝改封紹聖侯雲童休源長子東揚州别駕宗範休源少子陳中書黃門侍郎奐幼孫之子陳中書令有集十五卷長公覬之子微長公從父弟頴達八歲日記千餘言大業中舉明經髙第仕至司業祭酒常侍撰五經孝經正義有集五卷年七十五三十三代德倫唐太宗封褒聖侯伯魚宗範子陳散騎常侍紹安奐第五子唐中書舍人有集五十卷紹新奐之子以文學知名紹忠奐之子鄱陽東曹掾志𤣥頴達長子唐國子司業志約頴達少子禮部郎中思政德仁孫端州刺史三十四代崇基武后時襲封褒聖侯德紹伯魚子隋祕書省正字稱紹安長子禎紹安次子絳州刺史髙宗御名紹安少子贈蒲州刺史惠元志𤣥子自頴達後三世為司業琮志約子洪州都督圭志亮子三十五代璲之明皇時襲封褒聖侯開元二十七年八月追諡孔子為文宣王亦改璲之為文宣公昌寓德紹子正觀中對䇿髙第為膳部郎中季詡楨之子登制科終左補闕若思稱長子禮部侍郎仲思若思弟給事中立言惠元子祠部郎中闕言惠元子黃州刺史務本頴達族孫滄州東光令三十六代萱襲封文宣公舜昌寓子監察御史至若思子著作郎明氏族學如圭務本子海州司户三十七代齊卿德宗中襲封文宣公齊參舜之子寶鼎令岑父如圭子著作佐郎巢父岑父弟仕至御史大夫陜華招討使三十八代惟時元和十三年兵解襲封文宣公惟昉兖州參軍充符齊參長子事親至孝隱嵩山克讓齊參子述睿齊參子德宗召拜諫議大夫載岑父長子貞元二十七年及第戣岑父子舉進士仕至禮部尚書年七十四韓愈銘其墓威岑父子及第掌澤潞書記知盧從史必敗謝病歸戢岑父子舉明經仕至京兆尹御史大夫戳岑父幼子三十九代䇿明經及第襲封文宣公敏行述睿子仕至集賢學士溫資太子少保溫質戣長子四門博士溫孺戣之子明經溫憲戣之子明經溫裕戣第四子舉進士天平軍節度使溫業戢長子第二人及第為吏部侍郎溫諒戢之子四十代振懿宗咸通四年狀元及第仕至刑部員外郎襲封文宣公年七十四拯振之弟中和二年狀元及第歷侍郎郁拯之弟絢溫質子及第綸溫質子及第歷殿院纁溫質子狀元及第緯溫孺子狀元及第相僖宗昭宗緣明經及第照及第織戣之孫􅀈戣之孫緒溫裕子曲阜令績溫諒子四十一代昭儉襲封文宣公述郁之子昌明照之子第七人及第昌庶照之子及第為虞部郎中昌廣織之子昌弼緯之子及第仕至散騎常侍昌序緯之子及第仕至散騎常侍昌鵬織之子邈第五人及第仕至諫議大夫遘織之子乾符令四十二代光嗣泗水縣令陵廟主莊昌庶子晉太常少卿四十三代仁玉長七尺善六藝襲封文宣公後周髙祖謁祠廟令兼監察御史承恭莊之子將作監四十四代宜幼聰悟本朝乾德四年拜章闕下叙家門故事授曲阜縣主簿太宗命為皇子宰襲封文宣公憲仁玉次子及第工部侍郎致仕朂仁玉少子朂長子道輔知鄉郡在具慶下侍立年八十九四十五代延世魁梧大度真宗朝襲封文宣公延澤宜次子及第贈諫議大夫延渥宜幼子知集州清化縣延之道輔朂長子及第仁宗朝以剛毅直亮聞天下知諫院為御史中丞請明肅皇太后歸政天子郭后廢伏閣爭得罪後復召為御史中丞出知鄆州道病卒良輔朂次子慷慨長於吏才官至大理寺丞彥輔朂少子幼聰悟性至孝官至國子博士四十六代聖祐襲封文宣公無嗣以堂弟宗願承襲與聖祐共為一代宗願者延澤之子博涉魁岸孝睦嘉祐中祖擇之言前代封孔子後者在漢魏曰褒成曰宗聖在晉宋曰奉聖後魏曰崇聖北齊曰恭聖後周及隋封鄒國唐初曰褒聖開元中諡孔子為文宣王遂封其後為文宣公是以祖諡而加後嗣也乃改封宗願為衍聖公舜亮道輔長子左中散大夫致仕著粹藉宗翰道輔次子刑部侍郎與兄皆鎖㕔及第宗夀良輔長子承議郎宗質良輔次子仙源丞漢英彥輔長子幼慧博覽宗慤彥輔次子四十七代若䝉襲封衍聖公元祐元年改封奉聖公若䝉坐事廢以弟若虛襲封若愚宗願子若拙宗願子及第若升舜亮長子贈朝奉大夫若谷舜亮次子朝散郎致仕傳舜亮少子舊名若古博極羣書操行介潔建炎中興拜疏闕下叙家門舊典始寓居三衢於是孔氏有因仕而家於霅川新安臨川鄂渚者皆自衢而分傳知邠峽撫三州有政績自號杉溪所著白氏六帖文樞要紀書及東家雜記杉溪集官至中散大夫年七十五恢朝散大夫惇朝散大夫忱文林郎恂奏議郎右宗翰四子若涉若陟若訥若水若晦若時右宗夀六子若采迪功郎先是崇寧三年詔孔子後與親屬一名判司簿尉孔宗哲承之宗哲死若采繼之若惠右宗一二子若璞若盤漢英二子若鑑若初及第若師若冲若符若鼎若缺凡宗彀七子四十八代端友襲封衍聖公端操端廉皆端友弟端本端裕端民皆若虛子端弼端雅端禀端立皆若愚子端中端申皆若拙子端節朝散大夫端夫端義端臣端智端直端慤皆若升子端朝若升子為若谷後宣和四年始以幸學賜第仕至一臨江軍端問仕至奉新丞著沂川集端守端己侍杉溪渡江歷官五十年介潔不阿年八十一端位常德府録參端植武康丞端隱江陵察推皆傳之子松恢之子宣義郎淵將仕郎與潛皆惇之子塤忱之子承議端言端行端缺字皆若訥子四十九代􅀈紹興二年襲封衍聖公􅀈瑋玫皆端操子行可璨皆端己子俱以學行稱皆奉祠夀俱八十璋端位子奉祠夀九十瑑玲瑞瑢璿端植之五子五十代搢襲封衍聖公圭瓌瑀瓚知和州珹瑨琇􅛁蘭溪簿璪左藏庫瓅迪功迪功石埭簿尉琯從事郎璹漳州闕珉迪功珦華夫迪功浙東帥參抆持天富場闕仕揆將仕拂􅀈攬掖哲擇掞搏抑攄迪功撝闕掾括龍好學從真西山遊進書充柯山精舍上長從隆聖時總㨀援扔拱篤學有文集搏復之摙揮五十一代文逺襲封衍聖公歷吉州隆興府通判文述文􅂒防護鄉井補官文逸文達博學文迥文邁文適文􅐂文郁文恭文遜文志文撜應選應發同請鄉舉出官文兹文通文達應得元龍之子淳祐元年臨雍賜第今為台州有德政應符應禧應祥文模登寶祐元年第知湘潭縣文進文遹文振文敏鄉舉文質文彬五十二代萬春襲封衍聖公萬齡肇慶府推官萬鈞萬鎰萬鍾皆文遂子萬程萬里萬頃皆文􅂒子萬榮萬崇文逸子萬善萬古萬嚞文迥子德祖嗣祖文邁子和孫監請文志子萬佑萬全隆孫萬石萬裕萬中庭詠謨言詔諤煟萬憲萬東萬同萬有孔子嫡𣲖許赴國子監試始於淳祐十二年七月蔡察院奏請五十三代洙襲封衍聖公嘗添差通判平江府泗萬齡子沂萬程子演瀾淵津言之四子右闕里譜系元豐八年四十六代孫宗翰始以舊譜鋟板紹興二年四十八代孫端朝逃虜難南奔生生所資皆失之獨此譜山中人得之轉以見歸因為序録紹興五年洪興祖守廣德軍刋于郡齊景定三年五十一代孫應得今台州太守時差添廣德軍通判又附入紹興五年以後至景定三年云先聖諡號魯哀公十六年夏四月誄曰尼父漢元始元年六月追諡為褒成宣尼公後魏太和十六年二月丁未改諡為文宣尼父後周太象二年三月丁亥追封為鄒國公唐貞觀十一年詔尊為宣尼父髙宗乾封元年追贈為太師天授元年追封為隆道公開元二十七年八月追諡為文宣王國朝真宗皇帝大中祥符元年十一月四日辛酉詔加諡為𤣥聖文宣王五年十二月壬申以𤣥字犯聖祖名改諡為至聖文宣王四位配享封爵顔子唐總章元年二月一日詔贈太子少師太極元年二月贈太子太師配享孔子廟開元二十七年八月贈兖公國朝大中祥符二年五月乙卯朔封兖國公曽子唐總章元年二月一日詔贈太子少保太極元年二月贈太子太保配享孔子廟開元二十七年八月贈郕伯國朝大中祥符二年五月乙卯朔封瑕丘侯政和元年以丘字犯先聖名改封武成侯淳熙編類增封成侯朱文公申明云不審是何年月增封乞撿㑹咸淳三年二月升封郕國公配食大成殿子思國朝崇寧元年封沂水侯咸淳三年二月升封沂國公配食大成殿孟子國朝元豐七年五月追封鄒國公配享先聖位次兖國公下往歲顔孟配享並列先聖左近升曾子子思又並列先聖左而虛其右不以相向震嘗聞大學博士陸隴升云初制顔孟配享左顔而右孟熙豐新經盛行以王安石為聖人沒而躋之配享位顔子下故左則顔子及安石右則孟子未幾安石女壻蔡卞當國謂安石不當在孟子下遷安石於右與顔子對而移孟子位第三次顔子之下遂左列顔孟而右列安石又未幾蔡卞再欲升安石壓顔子漸次而升為代先聖張本優人有以藝諫於殿下者設一大言之士戲薄先聖顔子出爭之不勝子貢出爭之不勝子路出而盛氣爭之又不勝然後設為公冶長有擊其首而叱之曰汝何不出一爭汝且看他人家女壻蓋蔡卞安石壻而公冶長先聖壻也蔡卞聞之遂不敢進安石於顔子上顔孟左而安石右遂為定制南渡後安石罷配享宜遷孟子以對顔子如舊制議者失於討論故安石既去其右遂虛而顔孟並列於左嶽珂嘗記其事近歲增曾子子思又並列於左亦未有討論者虛右至今震謹書十哲從祀封爵原無書樣闕學議論之偏有不容不審者故僭為之書諸弟子從祀封爵唐開元二十七年八月詔贈曾參郕伯今升配享顓孫師陳伯今升十哲淡臺滅明江伯一宓子賤單伯二原憲憲伯三公冶長莒伯四南宫子容郯伯五公晳哀郳伯六曽㸃宿伯七顔路杞伯八商瞿䝉伯九髙柴共伯十漆雕開滕伯十一公伯寮任伯十二司馬牛向伯十三樊遲樊伯十四有若卞伯十五公西赤郜伯十六巫馬期鄭伯十七梁鱣梁伯十八顔柳蕭伯十九冉孺紀伯二十曹恤曹伯二十一伯䖍鄹伯二十二公孫龍黃伯二十三冉季産東平伯二十四秦子南少梁伯二十五漆雕斂武城伯二十六顔子驕琅琊伯二十七漆雕徒父須句伯二十八壤駟赤北徵伯二十九商澤睢陽伯三十石作蜀郡邑伯三十一任不齊任城伯三十二公夏首亢父伯三十三公良孺東牟伯三十四后處營丘伯三十五秦開彭衙伯三十六奚容蒧下邳伯三十七公肩定新田伯三十八顔襄臨沂伯三十九鄡單銅鞮伯四十句井疆淇陽伯四十一罕父黑乘丘伯四十二秦商上洛伯四十三申黨召陵伯四十四公祖子之期思伯四十五榮子期雩婁伯四十六縣成巨野伯四十七左人郢臨淄伯四十八燕汲漁陽伯四十九鄭子徒滎陽伯五十顔之僕東武伯五十一原亢籍萊蕪伯五十二樂咳昌平伯五十三廉潔莒父伯五十四顔何開陽伯五十五叔仲㑹瑕丘伯五十六秋黑臨濟伯五十七邽巽平陸伯五十八孔忠汝陽伯五十九公西輿如重丘伯六十公西蒧祝阿伯六十一蘧瑗衛伯六十二施常乘氏伯六十三林放清河伯六十四秦非汧陽伯六十五陳亢頴伯六十六申棖魯伯六十七琴張南陵伯六十八顔噲朱虛伯六十九步叔乘淳于伯七十唐㑹要止於公西蒧其蘧瑗林放陳亢申棖琴張五人以杜佑通典附入國朝大中祥符二年五月乙卯朔詔封郕伯曽參瑕丘侯陳伯顓孫師宛丘侯江伯淡臺滅明金卿侯一單伯宓不齊單父侯二原伯原憲任城侯三莒伯公冶長髙密侯四郯伯南宫縚龔丘侯五郳伯公晳哀北海侯六宿伯曽㸃萊蕪侯七杞伯顔無繇曲阜侯八䝉伯商瞿須昌侯九共伯髙柴共城侯十滕伯漆雕開平輿侯十一任伯公伯寮夀張侯十二向伯司馬牛楚丘侯十三樊伯樊須益都侯十四卞伯有若平隂侯十五郜伯公西赤巨野侯十六鄫伯巫馬施東阿侯十七梁伯梁鱣千乘侯十八蕭伯顔辛陽榖侯十九紀伯冉孺臨沂侯二十曹伯曹恤上蔡侯二十一鄹伯伯䖍沐陽侯二十二黃伯公孫龍枝江侯二十三武城伯漆雕哆濮陽侯二十六琅琊伯顔子驕雷澤侯二十七須向伯漆雕徒父髙宛侯二十八北徵伯壤駟赤上邽侯二十九睢陽伯商澤鄒平侯三十郈邑伯石作蜀成紀侯三十一任城伯任不齊當陽侯三十二東平伯冉季諸城侯三十四東牟伯公良孺牟平侯三十五彭衙伯秦冉新息侯三十六下邳伯奚容蒧濟陽侯三十七淇陽伯句井疆滏陽侯四十一少梁伯秦商鄄城侯四十三召陵伯申黨淄川侯四十四期思伯公祖句兹即墨侯四十五雩婁伯榮旗厭次侯四十六巨野伯縣成武城侯四十七臨淄伯左人郢南華侯四十八漁陽伯燕伋汧源侯四十九滎陽伯鄭伯朐山侯五十東武伯顔之僕宛句侯五十一開陽伯顔何堂邑侯五十五瑕丘伯叔仲㑹博平侯五十六臨濟伯狄黑林慮侯五十七平陸伯邽巽髙堂侯五十八汶陽伯孔忠鄆城侯五十九重丘伯公西輿如臨胊侯六十祝阿伯公西蒧徐城侯六十一衛伯蘧瑗內黃侯六十二乘氏伯施常臨濮侯六十三清河伯林放長山侯六十四汧陽伯秦非華亭侯六十五頴伯陳亢南頓侯六十六魯伯申棖文登侯六十七南陵伯琴牢頓丘侯六十八朱虛伯顔噲濟隂侯六十九淳于伯步叔乘博昌侯七十崇寧元年封孔鯉為泗水侯七十一大觀四年九月十二日詔封公夏首巨平侯三十三后處膠東侯三十八公肩定梁父侯三十九顔祖富陽侯四十鄡單聊城侯四十二罕父黑祈鄉侯秦相馮翊侯􅀈亢樂平侯樂劾建城侯亷潔胙城侯政和元年改封邑犯先聖名者瑕丘侯曽參改武城侯宛丘侯顓孫師改潁川侯龔丘侯南宫縚改汶陽侯楚丘侯司馬耕改睢陽侯頓丘侯琴張改平陽侯諸儒從祀封爵大中祥符三年七月戊寅詔封魯史左丘明瑕丘伯七十二政和改中都伯齊人公羊髙臨淄伯七十四魯人榖梁赤龔丘伯七十三政和改睢陽伯秦博士伏勝乘氏伯七十六漢博士髙堂生萊蕪伯七十七九江太守戴聖楚丘伯七十八改考城伯河間博士毛萇樂夀伯七十九淮南太守孔安國曲阜伯八十中壘校尉劉向彭城伯八十一後漢大司農鄭衆中牟伯八十三河南杜子春絃氏伯八十五南郡太守馬融扶風伯八十六北中郎將盧植良鄉伯八十七大司農鄭康成髙密伯八十八九江太守服䖍滎陽伯八十九侍中賈逵岐陽伯八十四諫議大夫何休任城伯九十魏衛將軍太常蘭陵亭侯王肅贈司空九十一尚書郎王弼偃師伯九十二晉鎮南大將軍開府儀同三司當陽侯杜預贈司徒九十三豫章太守范寧新野伯九十四元豐七年五月詔荀况封蘭陵伯七十三揚雄封成都伯八十三韓愈封昌黎伯九十五寶慶三年正月追贈太師朱熹為信國公紹定二年九月改封徽國公百單二淳祐元年封周頥汝南伯九十六張載郿伯一百程皓河南伯九十七程頥伊陽伯九十八並列從祀景定二年正月封張栻華陽伯百單三吕祖謙開封伯百單四並列從祀咸淳三年正月封邵雍新安伯九十九司馬光已封溫國公百單一並列從祀先儒賜諡國朝嘉定元年十月十八日有㫖朱熹特賜諡明年博士章􅝘諡曰文忠考功劉彌正覆諡曰文嘉定七年八月知潭州衛涇請為南軒先生張栻賜諡博士孔煒考功楊汝明定諡曰宣嘉定八年知婺川丘夀隽請為東萊先生吕祖謙賜諡博士孔煒考功丁端祖定諡曰成嘉定九年潼川運判魏了翁請為濓溪先生周頥賜諡太常丞臧格考功樓觀定諡曰元嘉定九年禮部侍郎任希夷請為二程立諡太常丞臧格考功樓觀定諡明道先生程皓曰純伊川先生程頥曰正嘉定十四年知潼川府魏了翁又為橫渠先生張載請諡博士陳公益請諡達禮部侍郎請諡或明或誠了翁入為太常少卿定諡曰明右先聖諡號及從祀及本朝先儒封爵皆邵武軍建寧知縣三山陳照裒類咸淳九年癸酉九月九日刋于建寧縣學黃氏日抄卷三十二
