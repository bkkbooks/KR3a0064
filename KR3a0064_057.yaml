body:
  text: 黄氏日抄卷五十七宋黄震撰讀諸子三論衡王充嘗師班彪博學有獨見旣仕不偶退而作論衡二十餘萬言蔡邕王朗嘗得其書皆秘之以爲己助盖充亦傑然以文學稱者惜其初心發於怨憤持論至於過激失理之平正與自名論衡之意相背耳如謂窮逹皆出於命逹者未必賢窮者未必不肖可矣乃推而衍之至以治和非堯舜之功敗亡非桀紂之罪亦歸之時命焉可乎甚至譏孔孟而尊老子抑殷周而誇大漢謂龍無靈謂雷無威謂天地无生育之恩而譬之人身之生蟣蝨欲以盡廢天地百神之祀雖人生之父母骨肉亦以人死無知不能爲鬼而忽蔑之凡皆發於一念之怨憤故不自知其輕重夫平如此至其隨事各主一說彼此自相背馳如以十五說主土龍必能致雨矣他日又曰仲舒言土龍難曉如以千餘言力辨虎狼食人非部吏之過矣他日又曰虎狼之來應政失也凡皆以不平之念盡欲更時俗之說而時俗之說之通行者終不可廢矯枉過正亦不自覺其衡决至此也惟其辨訛正謬有禆後學見聞者則取節以列下方辨三代姓世稱禹以含薏苡而生故夏姓姒卨以含燕子而生故啇姓子稷以母履迹而生故姓姬薏苡草也燕子鳥也大人迹土也皆非氣安能生且帝王之妃何爲適草野何爲浴於水或禹卨后稷之母適欲懐妊偶吞薏苡燕子履大人迹世好竒恠因以爲姓三卷辨胥濤浙江山隂江上虞江皆有濤盖水發海中漾馳而已入江淺狹水激沸起故騰爲濤猶廣陵曲江有濤文人賦之稱大江浩洋曲江有濤亦以隘狹也溪之深者安洋淺者激揚爲瀨夫濤瀬一也謂子胥爲濤誰居溪谷爲瀬乎按濤入三江江岸沸踴中央无聲必以子胥爲濤子胥之身聚岸漼也濤之起也隨月盛衰如子胥爲濤子胥之怒以月爲節也三江時風揚疾之波亦溺殺人子胥之神復爲風也始皇渡湘遭風問湘祠堯女舜妻怒斬其樹夫謂子胥之神爲濤猶謂二女之神爲風耳辨齊桓公桓公妻姑姊妹七人此因如夫人者六人而誤耳又謂其負婦人以朝諸侯或婦人立於後耳桓公千歳一出之主也葵丘稍驕畔者九國况於禽獸之行無禮而可留諸侯哉辨星退舍宋景公一坐有三善言星徙三舍如有十善言星徙十舍乎善言延壽二十一歳堯舜獲壽千歳乎太卜欺齊景公以能動地晏子謂鉤星在房心之間地自當動子韋之言星徙猶太卜之言地動宋無晏子之智臣故子韋售其欺耳四巻辨射日射不過百歩日之行天去人以萬里數堯上射之安能得日日火也雖中安能滅之世稱桀紂之惡射天毆地高宗之德政消桑榖今堯不能以德滅十日而必射之是德不若高宗惡與桀紂同也辨武王瞋怒風止武王誅紂是乎天當安静以祐之如誅紂非乎而天風者怒也武王瞋目重天怒也風何止或時風偶自止耳辨魯襄與韓戰麾戈日返三舍一麾安能返日日一日行一度退三度是日却三日也或戰時日正卯戰迷謂之暮轉而轉左曲道日若卻耳辨燕丹燕丹誓天使日再中乃得脫秦何湯困夏臺文王拘囚羑里孔子厄陳蔡天不能祐辨杞梁妻哭而城崩鄒衍仰歎而霜隕師曠鼓琴而晉旱皆適然耳師曠初學時非直一再奏風雨當至久矣辨天雨榖榖生草野成熟委地疾風暴起與之俱飛風衰榖集謂之雨榖天施地生凡有葉實可食者皆地所生非天所爲也辨梁山崩壅河伯宗以輦者之言令景公縞哭乃流實則山初崩土積水未盛三日之後水盛土散竟流東去耳五卷辨黄帝葬衣冠衣不離形如仙去衣冠不宜遺黄帝實仙不死而升天臣子乃葬不死者之衣冠與實死者無異非臣子實事之必别生於死之意也七卷辨稱孔子干七十國增之也至不能十國八卷辨太公殺隠士狂譎華士云堯不誅許由唐民不皆樔處武王不誅伯夷周民不皆隠餓愚謂太公安有殺隠士之理太公始亦隠士耳謂其殺隠士必欲人皆致命於國者韓非等妄言以售私說耳此不待辨十卷辨謂􅛋脯扇凉蓂莢數日屈軼指佞觟􅚞觸罪倉光水獸覆舟皆妄附雜録孟子以眸子觀人正否眸子稟於天不同與性善之說自異微子曰我舊云孩子王子不出謂識紂惡於孩子之時按今本作刻子禮曰刻尊爲雷之形一出一入一屈一伸爲相校軫則鳴盛夏太陽用事隂氣乘之隂陽交爭則相校軫如以十水灌冶鑄之火氣激烈若雷之音矣六卷宋有御馬者不進剄而棄之溝又駕一馬又不進又剄而棄之溝若是者三以此威馬至矣然非王良法也十卷禹鑄鼎象物使不逢不若盖使人識而避之耳論衡辨其不能辟除神姦非也樹檀以五月生葉後於春榮之木其材強勁車以爲軸不崇朝輙成賈者菜果之物也陽溫隂寒歴月乃至災變之氣一朝成恠天旦風巢居之䖝動旦雨穴處之物擾夜及半而鶴唳晨將旦而鷄鳴物應夫氣之驗也雨自有時非雩祭可得也慈父之於子孝子之於親知病之必不可治終不肯安坐待絶猶卜筮求禱召醫和藥者惻痛殷勤冀有驗也雩祭者之用心慈父孝子之心也十五卷鱉三足曰能龜三足曰賁十七卷子雲作太𤣥法言張伯松不肯一觀十八卷又蜀富人賫錢千願載於書子雲不聽十九卷襲舊六爲七十九卷忽其父而稱異人之翁天晏腸者星辰曉爛人性竒者掌文藻炳又曰察掌理者左右不觀左文明也鬼神隂陽之名也隂氣逆物而歸故謂之鬼陽氣導物而生故謂之神神伸也伸復無已終而復始人未生在元氣之中旣死復歸元氣尹齊死怨家欲燒其尸亡去歸葬或時吏知怨家之謀竊舉持亡愚按漢注謂鬼有知而亡去毎疑棺尸無亡去之理今論衡之說近之矣二十一卷甲乙日病者生死之期常在庚辛世間所謂妖祥所謂鬼神者皆太陽之氣爲之也夫人之所以生者隂陽氣也隂氣主爲骨肉陽氣主爲精神人之生也隂陽氣具故骨肉堅精神強骨肉精神合錯相持故能常見而不滅亡太陽之氣孤而無隂故徒能爲象不能爲形無骨肉有精神故一見恍惚輙復滅亡也二十二卷夫毒太陽之熱氣也鴆蛇冶葛巴豆皆生南方熱氣所鍾也太陽火氣常爲毒也五行二曰火五事二曰言言與火直故南越之人祝禁輙效口舌爲毒也謂諱西益宅者尊長在西尊無二上故不可益諱刑徒不上丘墓者爲媿見祖父皆義理之諱非㐫惡之忌世諱作豆醬惡聞雷不欲積家踰至春也二十三卷漢俗觧除之祭先爲設膳食已驅以刃杖衰世好信鬼愚人好求福漢俗觧土爲土偶像鬼令巫祝之䜟書謂孔子預知秦皇上我之堂按始皇實不至魯詹何知牛介葛盧知牛楊翁仲知馬𦕈皆古射事之類也謂三易皆六十四卦文王周公因彖十八章䆒六爻非演爲六十四也謂六典不與今禮相應按今禮經不見六典謂論語之篇但八寸尺不二尺四寸者懐持便也漢自武帝得之孔壁皆名之曰傳至孔安國以教晉人扶卿始曰論語彈雀則失鷃射鵲則失鴈方員畫不俱成左右視不並見玉屑滿篋不成爲寳二十八卷墨家薄葬右鬼厚其精而薄其屍自相乖反左傳出孔壁國語左氏之外傳公孫龍鄒衍書虗誇與管商書相反而太史兼紀三代世表言帝王皆黄帝子孫而殷周不紀謂𤣥鳥大人之精氣亦兼紀孔子失馬於野野人閉不與子貢妙稱而怒馬圄諧說而喜曉俗而以鴻文猶和神仙之藥以治齀欬制貂狐之裘以取薪菜也故斷决知辜不必臯陶調和葵韭不俟狄牙閭巷之樂不俟韶武里母之祀不待大牢牛刀割雞舒㦸采葵鈇鉞裁箸盆盎酌巵大小失宜善之者希見三十卷終兒生啼聲鴻朗高暢者壽人壽以百歲爲止人形以一丈爲止故名男子爲丈夫尊公嫗爲丈人一卷歴陽之沉長平之坑同命俱死者國命勝人命水潦降不獻魚鱉以蟲蛇新化魚鱉物多變人獨不變者稟得正也形不可變則壽不可増牛壽半馬馬壽半人陽燧取火五月丙午日中鍊五石鑄器磨礪生光仰以向日則火来至今以刀劔之鉤月摩拭向日亦得火伊尹母夢謂臼出水疾東走旦如其言顧其鄕皆水矣一卷古公曰我世當有興者其在昌乎太伯知而避之文王受命已在生時書稱天乃大命文王者與天合同若天使之周人世碩作養書謂人性有善有惡在所養焉董仲舒因孟荀言性不同作情性之說謂性生於陽情生於隂曰性善者見其陽謂惡者見其隂劉子政反之以性在身爲隂以情形於外爲陽三卷五月之時書十一分夜五分六月晝十分夜六分從六月至十一月减一分歳日行天十六道日月行遲天行疾故日月實東行而反西旋若蟻行磑上天不動氣不施氣不施物不生日月星辰之行皆施氣十一卷頓牟掇芥礠石引針漢制立春東耕立土象人男女各二射布名侯示射無道諸侯也凡蟲爲風之字取氣於風故八日而化神農藏種方煑馬屎以汁漬種令禾不䖝虞舜重瞳王莾亦重瞳又晉文駢脅張儀亦駢脅少正卯在魯與孔子並孔門三盈三虗十六卷神荒忽無形出入無門故謂之神今作形像與禮相違失神之實歆者内氣也漢祭靈星卽古雩祭春求雨秋求實一歳再祀漢春雩之禮廢秋雩之禮存又或訛爲祭明星又曰歳星實龍星也龍星三月見則雩祈榖雨龍星八月將入則秋雩祈榖實愚謂論衡釋靈星之名似矣實則古之雩祭止因龍見而雩此祭之候也未必祭其星也牒截竹爲筒破以爲牒加筆墨乃成文字牘㫁木爲槧㭊之爲板加刮乃成奏牘並見十二卷菴十三卷云桃李梅杏菴丘蔽野以此見菴之爲義止取掩故耳布施越境而布施矣見二十七卷孟年建初孟年瓦屋桀之瓦屋並見二十九卷申鑒申鑒五篇東漢荀悦書也自言道本仁義備在典籍前鑒旣明後復申之謂之申鑒然大抵辭繁理寡體亦不一政體第一時事第二多舉凡目頗用汲冢周書之體俗嫌第三雜言第四第五多用或問頗效揚雄法言之體其言之合於理者如曰人主有公賦無私求有公用無私費有公役無私使有公賜無私惠有公怒無私怨如曰求己之所有餘奪下之所不足捨己之所易責人之所難怨之本也如孺子之驅雞也而見御民之術迫則飛踈則放志志安則循路而入門或問卜筮曰吉而濟㐫而救之謂益吉而恃㐫而怠之謂損或問避疾厄曰可避非身可逃非神孺子掩目巨夫之掖而曰逃可乎或問神仙之術曰終始運也短長數也運數非人力之爲也體宜調而矯之神宜平而抑之必有失和者矣又謂人臣之義不曰吾君能矣不我須也言無補也而不盡忠不曰吾君不能矣不我識也言無益也而不盡忠進忠有三術先其未然發而止之謂之救行而責之謂之戒凡其言之合於理者如此如曰善治民者治其性故跖可使與伯夷同功則喜於立論之過論性情者屡章而當於理者殊少文亦頗卑弱與其所著漢紀頗不類未知果悦之真否此本淳熈九年尤袤刻江西漕司乾坤鑿度鑿度不知誰所作矯黄帝而爲之言云庖犧氏之古文黄帝演古籕文而蒼頡修爲上下篇上篇乾鑿度鑿開也度路也聖人鑿開天路顯彰化源也其說謂有太易而有太初而有太始而有太素乃及古帝者之代興乃及乾坤巽艮之四門乃及坎離震兊之四正至若配身取象取物制度等說支離矣下篇坤鑿度也謂太古變乾之後次鑿坤度謂坤元十性謂坤有八色曰蕩配曰凌配支離益甚矣乾坤鑿度之言大率詞澁而理寡又有周易乾鑿度周易坤鑿度二篇又皆矯孔子而爲之言竊取繫辭餘自太極兩儀八卦而生六十四卦而至爻象復歸太易太初太始太素之説謂太易未見氣也太初氣之始也太始形之始也太素質之始也較之乾坤鑿度文頗明直是出一人之手而僞爲古今華質之不同以互相發明者歟然以日之十干辰之十二支星之二十八宿指爲大衍之數五十於易未必合而以易之三百六十析當朞之日是京房卦氣之法此書正爲此作而前冒大易爲重耳若其謂入戊午部二十九年伐崇侯作靈臺改正朔布王號天下受籙應河圖又謂消息卦純者爲帝不純者爲王恐皆非君子之言而謂帝乙以生日爲名亦非殷以卽位之年太歲爲號考厯者已得之矣易緯稽覽圖緯雖非正書然出漢世此書言至今大唐上元二年乙亥卦起中孚不知何人作也書有推天元甲子之術推易天地人之元術皆墮小數不足留情其曰癸巳元年一百九十萬八千八百五十三歳乃加太初元年殆誣誕耳惟其謂六日八十分之七注云一卦七分此爲京房卦法則明至毎候言災異之應恐亦未必然易通卦驗卦驗有於七經於河洛之目於理無所考而亦矯孔子爲之辭首云太皇之先與耀合元精五帝期以序七神此不過爲無所考以相欺大率爲卦氣發然僻書耳周易參同契參同契者本漢世上虞人魏伯陽所造其說出於神仙傳不足慿爲之注釋者五代末彭曉則此書必出於五代之前也參雜也同通也契合也此方士煉丹之書謂與諸丹經理通而義合也然必冒周易爲稱者煉丹取子午時爲火候是爲坎離因用乾坤坎離四正卦於橐籥之外其次言屯蒙六十卦以見一日用功之早晚又次言納甲六卦以見一月用功之進退又次言十二辟卦以分納甲六卦而兩之要皆附㑹周易以張大粉飾之其實煉丹無符於易易本無預於煉丹而今世言火候者因以三百八十四爻爲一周天以一爻直一日而爻多日少終不相合其妄可知近世蔡季通學博而不免於雜嘗留意此書而晦翁與之㳺因爲挍正其書頗行然求其義則終无之嗚呼煉丹之說盛於唐而唐世人主若士大夫凡惑然者无不速其死此書又可尚乎道書魏伯陽傳言伯陽將三弟子一白犬入山作金丹丹成與犬犬死伯陽自服自死弟子繼服又死二弟子不服而出山爲伯陽求棺歛至則伯陽已活矣其鄙如此且或有之人生奈何以一死試丹而伯陽之再活者今安在壽幾何耶古三墳書孔安國作書序明言孔子去三墳而斷自唐虞二典爲書今信安毛漸正仲乃稱元豐七年奉使京西得古三墳書於唐州比陽道民間爲僞固不待辨而知特其所以爲僞有不容不辨者夫三墳雖不可復知槩以今之二典則載事之書後世所謂史册之類也今其書乃以山墳爲第一而指爲天皇伏羲氏連山之易以氣墳次之而指爲人皇神農氏歸藏之易以形墳又次之而指爲地皇軒轅氏坤乾之易愚按伏羲畫八卦歴文王孔子而成今之易三才之道備焉此外無餘蘊周禮六典晚出於王莾劉歆始有連山歸藏周易三者之名意謂夏商之世各自有易於義無稽而好異者喜言之自謂博古已成空談况於竊取其名爲三墳之書然乎否耶山墳言君臣民物隂陽兵象氣墳言歸藏生動長育止殺形墳言天地日月山川雲氣一字各釋爲一事實皆無理山墳綴以姓紀之篇氣墳綴以皇策之篇形墳綴以政典之篇亦皆無理毛漸乃云𦙍征嘗引政典指爲證據不知政典夏氏國法非三墳書也此書不必辨因以記周黄氏日抄卷五十七
