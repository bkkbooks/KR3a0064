body:
  text: 黃氏日抄卷十五宋黃震撰讀禮記二檀弓上第三公儀仲子之喪檀弓免焉仲子舍其孫而立其子檀弓曰何居我未之前聞也趨而就子服伯子於門右曰仲子舍其孫而立其子何也伯子曰仲子亦猶行古之道也昔者文王舍伯邑考而立武王微子舍其孫腯而立衍也夫仲子亦猶行古之道也子游問諸孔子孔子曰否立孫免音問舍音捨居音姬陸如字免五世親之服以布廣一寸從項中而前交於額上又卻向後繞於髻居齊魯間語助子服伯子魯仲孫蔑之𤣥孫子服景伯古者死他邦無親則朋友為之袒免仲子舍嫡孫立庶子檀弓譏其父兄不能正猶無親也故為之服以示其親而問焉伯子為其親隱故謂行古道以武王微子為證然文王立武王權也微子適子死立其弟衍殷禮也孔子曰立孫據周禮用鄭氏馬氏說事親有隱而無犯左右就養無方服勤至死致喪三年事君有犯而無隱左右就養有方服勤至死方喪三年事師無犯無隱左右就養無方服勤至死心喪三年養以尚反隱謂不言其過犯謂犯顔而諫方猶所致喪盡其至也方喪比方於父也於親致喪恩厚而服重也於君方喪資於事父而敬同也於師心喪如父喪而無服也於養言左右則養無所不至矣於勤言至死則勤無時或已矣民生於三事之如一事親幾諌事君直諌父師之養無方隨其所至君之養有方以事之者非一人不可侵官此則各稱其情而不同本鄭氏陳氏方氏補季武子成寢杜氏之葬在西階之下請合葬焉許之入官而不敢哭武子曰合葬非古也自周公以來未之有改也吾許其大而不許其細何居命之哭武子魯公子季友之曾孫季孫夙許其大謂聽其葬階下許其細謂命之哭季武子夷人冢墓以為宅及杜氏欲合葬則文過謂合葬非古我成寢之時以此冢墓不須合葬故平之以為寢今合葬則許之許其葬矣亦許其哭本鄭氏孔氏說子上之母死而不喪門人問諸子思曰昔者子之先君子喪出母乎曰然子之不使白也喪之何也子思曰昔者吾先君子無所失道道隆則從而隆道汙則從而汙伋則安能為伋也妻者是為白也母不為伋也妻者是不為白也母故孔氏之不喪出母自子思始也子上名白孔子曽孫子思名伋之子汙猶下禮為出母期為父後者不服孔子許伯魚喪出母子思不許子上喪出母聖人則處情子思則守禮子思答門人之問自諉於道有隆汙不能及聖人鄭氏橫渠孔子曰拜而后稽顙頽乎其順也稽顙而后拜頎乎其至也三年之喪吾從其至者頎音懇又音畿稽顙頭觸地無容拜而后稽顙先致敬也稽顙而後拜先致哀也三年之喪當先稽顙田陳氏說孔子既得合葬於防白吾聞之古也墓而不墳今丘也東西南北之人也不可以弗識也於是封之崇四尺孔子先反門人後雨甚至孔子問焉曰爾來何遲也曰防墓崩孔子不應三孔子泫然流涕曰吾聞之古不修墓泫胡犬反土髙曰墳聚土曰封先反修虞祭也孔子以不常在鄉慮久而還不知葬處故封之髙四尺以記偶雨而崩故傷之而流涕用孔氏說孔子哭子路於中庭有人弔者而夫子拜之既哭進使者而問故使者曰醢之矣遂命覆醢衛出公輒之變子路死之事見左傳哀公十五年有弔者而拜之孔子為之主也聞子路醢而命覆醢不忍食也鄭氏曾子曰朋友之墓有宿草而不哭焉宿草陳根謂經年生物既變慕心可已為師心喪三年為朋友期也方氏鄭氏子思曰喪三日而殯凡附於身者必誠必信勿之有悔焉耳矣三月而葬凡附於棺者必誠必信勿之有悔焉耳矣喪三年以為極亡則弗之忘矣故君子有終身之憂而無一朝之患故忌日不樂三日殯三月葬送終之具無不備盡喪三年而極而死者之形雖亡生者之心終其身弗忘故忌日不樂無一朝之患謂毁不滅性鄭氏方氏孔子少孤不知其墓殯於五父之衢人之見之者皆以為葬也其慎也蓋殯也問於郰曼父之母然後得合葬於防父音甫慎古作羊刃反山隂陸氏讀如字郰側留反又作鄒鄭氏讀慎為引謂葬時引柩飾棺以栁翣殯引以輤孔子父叔梁紇與顔氏女徴在野合而生孔子徴在恥焉不告以父之墓處孔子殯於衢如葬而引則用殯之引使人怪而問之以得其父之墓處愚按家語明載顔父擇壻而妻叔梁紇叔梁紇魯賢大夫豈有野合之事史明言禱於尼丘山生孔子豈有野合而禱神求子之事此篇亦眀言問於郰曼父之母亦豈有外人反怪而問孔子之事況徴在不恥為叔梁紇之妻反恥言叔梁紇之墓豈人情乎竊意古者墓而不墳與山俱平孔子少孤莫識其父墓之所在故母死先殯之問鄰母得墓所在而後合葬之陸農師以慎讀如字訓誠張橫渠亦謂其殯周密如葬皆得之矣鄭氏改慎為引蓋惑於野史鄙說不知孔子決無飾僞為鈎巨之術以不言餂人反揚父母之過也補鄰有喪舂不相里有殯不巷歌喪冠不緌相去聲緌又作綏耳佳反相以聲相助緌冠纓所謂蟬有緌亦作綏不相不歌助哀不緌去飾鄭氏有虞氏瓦棺夏后氏堲周殷人棺椁周人牆置翣周人以殷人之棺椁葬長殤以夏后氏之堲周葬中殤下殤以有虞氏之瓦棺葬無服之殤堲子栗反椁音郭翣所甲反長丁丈反火熟曰堲堲周謂燒土冶以周於棺以木為椁周於棺如城之有郭牆栁衣也牆以帷柩而周圍如牆翣羽扇也翣以飾棺而翼蔽如羽蚤死者十六至十九為長殤十二至十五為中殤八嵗至十一為下殤七嵗以下為無服之殤易繫辭云古之葬者厚衣之以薪有虞氏始用瓦棺至夏后氏乃以堲周殷人尚梓始以木為棺椁周人又飾之以牆置翣為美觀蓋世愈久而禮愈備長殤而下死者愈少則禮愈殺鄭氏孔氏馬氏方氏夏后氏尚黑大事斂用昏戎事乘驪牲用𤣥殷人尚白大事斂用日中戎事乘翰牲用白周人尚赤大事斂用日出戎事乘騵牲用騂斂力驗反驪力知反翰胡旦反騂息營反大事謂喪翰白色馬三代所尚色不同夏尚黑殷尚白周尚赤喪與戎祀皆大事色各如之用孔氏補穆公之母卒使人問於曾子曰如之何對曰申也聞諸申之父曰哭泣之哀齊斬之情饘粥之食自天子達布幕衛也縿幕魯也齊音咨饘之然反縿音綃與消同音穆公魯哀公曽孫曽子名申曽參之子有聲曰哭無聲曰泣為母齊為父斬厚曰饘希曰粥幕覆棺縿縑也父母之喪貴賤不殊所以自天子逹若布幕用布而已縿幕則有斿以參之者兼言魯衛欲其以文質自參酌而用之也方氏晉獻公將殺其世子申生公子重耳謂之曰子蓋言子之志於公乎世子曰不可君安驪姬是我傷公之心也曰然則蓋行乎世子曰不可君謂我欲弒君也天下豈有無父之國哉吾何行如之使人辭於狐突曰申生有罪不念伯氏之言也以至於死申生不敢愛其死雖然吾君老矣子少國家多難伯氏不出而圖吾君伯氏茍出而圖吾君申生受賜而死再拜稽首乃卒是以為共世子也驪力知反重直龍反蓋音盍少詩召反難乃旦反共音恭驪姬獻公所獲驪戎女申生母蚤卒驪姬嬖焉重耳申生異母弟後立為晉文公狐突申生之傅舅犯之父子少謂驪姬之子奚齊不出謂狐突自伐臯落氏反後懼而稱疾驪姬欲立其子奚齊故譖世子申生將殺之重耳勸其自辨又勸其行皆不肯而縊諡曰恭諡法敬順事上曰恭申生於親可言而不言懼傷公之心於義可逃而不逃謂天下豈有無父之國以至忘其躬之不閲而且恤其國之多難可謂恭矣然不免陷父於不義故未得為孝陳氏魯人有朝祥而莫歌者子路笑之夫子曰由爾責於人終無己夫三年之喪亦已久矣夫子路出夫子曰又多乎哉踰月則其善也莫音慕夫音扶祥謂喪二十五月大祥夫語助辭朝祥莫歌子路笑其太速時人行三年喪者希故孔子抑子路以善彼人然恐學者致惑待子路出後更以正禮言之云所爭月日又非多但踰後月禫而後歌即善惜其不少俟也集鄭氏孔氏說魯莊公及宋人戰于乘丘縣賁父御卜國為右馬驚敗績公隊佐車授綏公曰未之卜也縣賁父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誄之士之有誄自此始也乘繩證反縣音𤣥賁音奔父音甫隊直類反誄力軌反乘丘之戰在魯莊公十年縣卜皆氏右車右勇力者為之此時公敗宋師公非敗績此云馬驚敗績者止是馬驚敗不預軍之勝負釋文作馬驚敗無績字佐車乘公之二車者公馬驚敗佐車授公以綏而别載之未之猶言微哉責御者卜國之無勇也故御與車右皆赴敵而死白肉馬之股裏肉也圉人浴馬見流矢在白肉知馬中矢而驚非二人之罪誄其赴敵之功而諡之敗績非二子之辜死敵實二子之勇豈以士之賤而廢其善之實莊公以義起而諡之非過後世因之不改則非故記其始方氏曽子寢疾病樂正子春坐於牀下曽元曽申坐於足童子隅坐而執燭童子曰華而皖大夫之簀與子春曰止曽子聞之瞿然曰呼曰華而皖大夫之簀與曽子曰然斯季孫之賜也我未之能易也元起易簀曽元曰夫子之病革矣不可以變幸而至於旦請敬易之曽子曰爾之愛我也不如彼君子之愛人也以德細人之愛人也以姑息吾何求哉吾得正而斃焉斯已矣舉扶而易之反席未安而沒皖華版反簀音責瞿紀具反呼音虗革紀力反病謂疾困子春曽參弟子元申曽參之子華畫也皖謂刮削節目使皖然好簀古謂床笫橫渠謂必簟席之類以其可易華而皖必陳之在上顯露也呼虛憊吹氣聲革急也姑息茍容取安也童子以其非禮而發問事師以義也曽元見其疾革而不忍易事父以恩也曽子必易簀而即沒雖死猶勤於禮也瞿然而呼者意曽子聞童子之言而吹氣有嘆而然之之意再曰華而皖大夫之簀與童子又言之以答曽子曽子即命曽元起易之也用陳氏補始死充充如有窮既殯瞿瞿如有求而弗得既葬皇皇如有望而弗至練而慨然祥而廓然廓苦郭反親始死呌地號天無所逮及故曰如有窮既殯尸柩不可復見冀其聲容之髣佛不可得忽焉失之矣故如有求而弗得殯猶在宫既葬於野則逺矣入門弗見也上堂弗見也入室又弗見也皇皇無所依託故如有望而弗至朞年而練慨然追想再朞而祥廓然寥寞凡記孝子容節用馬氏補邾婁復之以矢蓋自戰於升陘始也魯婦人之髽而弔也自敗於臺鮐始也婁力俱反陘音形髽側瓜反臺音胡鮐音臺邾婁邾子之國復招死者魂戰於升陘魯僖二十二年髽凶事去纚而露紒纚所買反用黑繒韜髮廣終幅長六尺紒音計敗於臺駘魯襄四年臺當為壺春秋傳作狐鮐復本以衣今戰死無衣故復以矢弔本用衰今家各有喪故髽而弔古者戰陳以禮殺有所止殺人之多自升陘臺駘始不特記禮之變也用方氏補南宫縚之妻之姑之喪夫子誨之髽曰爾毋從從爾爾毋扈扈爾蓋榛以為笄長尺而總八寸從音總長直亮反南宫縚孟僖子之子南宫閲也字子容其妻孔子兄之女從從髙貌扈扈大貌上爾字汝也下爾字語助蓋者未定辭笄所以簮紒或用櫛或用榛故稱蓋長者度長短曰長總者束髮之布垂為飾夫子以其兄之女而誨以髽之法毋太髙廣又誨以笄總之法吉笄尺二寸齊衰之笄一尺斬衰之總六寸齊衰之總八寸皆以二寸為差孟獻子禫縣而不樂比御而不入夫子曰獻子加於人一等矣禫大感反比必利反孟獻子魯大夫仲孫蔑比及也既禫可作樂而寢於內獻子禫祭設縣而不作樂比可御內而不入寢故夫子稱其加於人一等所謂賢者過之也本孔氏說孔子既祥五日彈琴而不成聲十日而成笙歌祥之日鼓素琴故孔子五日而彈琴不成聲哀未忘也徙月樂故孔子十日而笙歌成者哀已殺也用方氏鄭氏說有子蓋既祥而絲屨組纓屨音句組音祖以絲為屨之絇以組為冠之纓服之吉者也有子服之於既祥失之早也有子孔門髙弟疑或不然記者或得於傳聞故曰蓋焉獻子過有子不及記者舉孔子於中以眀祥禮之中制方氏季氏死而不弔者三畏厭溺厭于甲反畏懼而死厭於巖牆而死溺水而死三者皆非正命故不弔子路有姊之喪可以除之矣而弗除也孔子曰何弗除也子路曰吾寡兄弟而弗忍也孔子曰先王制禮行道之人皆弗忍也子路聞之遂除之行道謂道路之人言除喪有期雖行道之人亦弗忍除聖人設為中制賢者當抑情而就之用方氏補太公封於營丘比及五世皆反葬於周君子曰樂樂其所自生禮不忘其本古之人有言曰狐死正丘首仁也樂樂下樂字音洛首手又反比及也丘狐窟冗也首以首向之也禮樂皆重本五世反葬重本也故引禮樂為證又引古人遺言謂狐死亦正向丘窟而枕其首是亦不忘本而古人舉此以眀仁也用孔氏說伯魚之母死期而猶哭夫子聞之曰誰與哭者門人曰鯉也夫子曰嘻其甚也伯魚聞之遂除之期音基與音餘伯魚孔子之子名鯉除除其服舜葬於蒼梧之野蓋三妃未之從也季武子曰周公蓋祔音父蒼梧南越地祔合葬也舜葬蒼梧三妃未從未袝之葬也謂袝葬自周公始然舜卒於鳴條蒼梧時在要荒之外事未必然堯妻舜二女三妃亦無所考用胡氏說曽子之喪浴於㸑室㸑室妻之室於此視饎㸑禮死浴於適室於㸑室則䙝蓋曽元之禮大功廢業或曰大功誦可也業學業誦口習廢業恐營思忘哀也誦其已熟者而稍可也孔氏說子張病召申祥而語之曰君子曰終小人曰死吾今日其庶幾乎申祥子張之子終以道之克盡言死以形之澌盡言子張自幸其得終庶幾君子之道故以語其子亦猶曽子吾知免夫之意平生學力於斯見矣用黃氏馬氏說補曽子曰始死之奠其餘閣也與平聲人老及病飲食不離寢近置室裏閣上人之始死以禮則未暇從其新以情則未忍易其舊故就以閣上所餘脯醢為奠合孔氏方氏說曽子曰小功不為位也者是委巷之禮也子思之哭嫂也為位婦人倡踊申祥之哭言思也亦然位以親疏叙列而哭委巷委曲之巷猶言陋巷也言思子游之子嫂叔無服娣姒小功故子思之哭嫂其妻倡踊而已隨之申祥哭妻之昆弟言思亦然言無服之喪猶且為位以眀小功之不為位者非也然哭妻之昆弟禮以子為主非以妻倡踊合孔氏方氏馬氏說古者冠縮縫今也衡縫故喪冠之反吉非古也衡音橫縮從也衡橫也古尚質冠之吉凶相似而惟縮縫之同今尚文冠之吉凶相反而有衡縫之異言衡縫而繼以喪冠非古知衡縫之為喪冠方氏曾子謂子思曰伋吾執親之喪也水漿不入於口者七日子思曰先王之制禮也過之者俯而就之不至焉者跂而及之故君子之執親之喪也水漿不入於口者三日枤而後能起曽子言已執喪以疾時人之不然子思以曽子為難繼故以禮抑之孔子曰三日而食教民無以死傷生鄭氏方氏曽子曰小功不稅則是逺兄弟終無服也而可乎稅他外反小功五月服最輕者日月已過始聞喪而追服曰稅逺兄弟謂相離逺者小功日月不多逺兄弟聞喪常晚小功不稅服最輕也曽子篤厚疑聞喪晚而不追服是小功終於無服為不可按禮聞逺兄弟之喪既除喪而後聞之則免袒哭之成踊斯為中制然小功雖不必稅而稅之者亦禮所不禁韓子嘗作小功不稅書亦曽子之意從厚也用劉氏馬氏補伯髙之喪孔氏之使者未至冉子攝束帛乘馬而將之孔子曰異哉徒使我不誠於伯髙使色吏反乘繩證反冉子見孔子使人未至先代以束帛乘馬而行禮以冉氏之物而欲將孔氏之誠故孔子謂徒使我不誠於伯髙夫禮所以副忠信也合孔氏方氏鄭氏說伯髙死於衛赴於孔子孔子曰吾惡乎哭諸兄弟吾哭諸廟父之友吾哭諸廟門之外師吾哭諸寢朋友吾哭諸寢門之外所知吾哭諸野於野則已疏於寢則已重夫由賜也見我吾哭諸賜氏遂命子貢為之主曰為爾哭也來者拜之知伯髙而來者勿拜也惡音烏夫音扶為爾之為去聲赴告也夫主伯髙言之也由因也廟祖父所在兄弟父祖之遺體故哭於廟父之同志於廟門外由父推之也寢我所安師成我者故哭於寢朋友於寢門外由師推之也所知者泛交故哭於野伯髙親非兄弟分非師友情又不止於所知原其由子貢而來見故以義起而哭於子貢之家使子貢為之主且教以為爾而哭者拜之為伯髙而哭者勿拜異於喪之正主也用方氏陳氏馬氏說曽子曰喪有疾食肉飲酒必有草木之滋焉以為薑桂之謂也滋謂香味薑者草之滋桂者木之滋以為薑桂之謂記者釋曽子之言居喪有疾得食美味慮其不勝喪也孔氏方氏子夏喪其子而喪其明曽子弔之曰吾聞之也朋友喪明則哭之曽子哭子夏亦哭曰天乎豫之無罪也曽子怒曰商女何無罪也吾與女事夫子於洙泗之間退而老於西河之上使西河之民疑女於夫子爾罪一也喪爾親使民未有聞焉爾罪二也喪爾子喪爾明爾罪三也而曰女何無罪與子夏投其枤而拜曰吾過矣吾過矣吾離羣而索居亦已久矣喪明之喪息浪反女音汝與音餘離音詈索悉各反喪明之喪失也明目精也索散也洙泗魯二水名西河龍門至華隂之地道莫尊於師恩莫隆於親子夏退老使民疑於夫子是不尊於師而尊於己也喪親未有聞而喪子喪其眀是不隆於親而隆於子也曽子數子夏三罪稱其名女其人若父師焉曽子不以為嫌子夏安受其責至於謝過服罪此所以為交道之盛方氏游氏夫晝居於內問其疾可也夜居於外弔之可也是故君子非有大故不宿於外非致齊也非疾也不晝夜居於內齊側皆反大故謂父母之喪晝陽夜隂陽動隂靜故晝必居外夜必居內惟居喪廬中門之外晝夜在外惟致齊不接外物與寢疾晝夜居內用孔氏方氏說髙子臯之執親之喪也泣血三年未嘗見齒君子以為難見賢遍反子臯孔子弟子名柴泣血言泣無聲涕如血出未嘗見齒言不笑君子以為難言人不能然本鄭氏衰與其不當物也寧無衰齊衰不以邊坐大功不以服勤衰七雷反當丁浪反衰喪服也物指布之精粗若周書所謂朝服八十物七十物當猶應也謂人服衰而心貌無哀戚之實與衰服之物不相應邉偏也不邊坐有喪者專席而坐大功雖輕亦不可著衰服而服勤勞之事謂䙝喪服也合鄭孔黃陸張氏孔子之衛遇舊館人之喪入而哭之哀出使子貢說驂而賻之子貢曰於門人之喪未有所說驂說驂於舊館無乃已重乎夫子曰豫鄉者入而哭之遇於一哀而出涕豫惡夫涕之無從也小子行之說他活反驂七南反鄉許亮反涕音體惡烏路反舊館人前日置館舍於己者驂車之騑馬在服馬之旁者賻助喪用涕出淚脫驂之禮疑於重是時客行無他物孔子欲副此涕淚之實遂行鄭氏馬氏孔子在衛有送葬者而夫子觀之曰善哉為喪乎足以為法矣小子識之子貢曰夫子何善爾也曰其往也如慕其反也如疑子貢曰豈若速反而虞乎子曰小子識之我未之能行也識式志反慕如嬰兒之慕疑謂傍徨不進哀親之在外不知神之來否子貢意葬畢豈如速反虞祭以安神靈夫子善其哀慕虞祭雖遲不害曰我未之能行抑己以實彼之可法也用孔氏胡氏補顔淵之喪饋祥肉孔子出受之入彈琴而后食之饋遺也祥肉祥祭之肉彈琴散哀本鄭氏孔子與門人立拱而尚右二三子亦皆尚右孔子曰二三子之嗜學也我則有姊之喪故也二三子皆尚左拱義手尚右以右手在上喪尚右左隂也孔子以姊之喪尚右二三子不知而效之以孔子之言而復正用鄭氏橫渠孔子蚤作負手曵枤消搖於門歌曰泰山其頽乎梁木其壞乎哲人其萎乎既歌而入當户而坐子貢聞之曰泰山其頽則吾將安仰梁木其壞哲人其萎則吾將安放夫子殆將病也遂趨而入夫子曰賜爾來何遲也夏后氏殯於東階之上則猶在阼也殷人殯於兩楹之間則與賔主夾之也周人殯於西階之上則猶賓之也而丘也殷人也豫疇昔之夜夢坐奠於兩楹之間夫明王不興而天下其孰能宗豫豫殆將死也蓋寢疾七日而沒放方兩反負手曵枤反手卻后以曵其枤消搖消釋搖曵也曵枤消搖蓋既病閒適之德容放猶依也疇發聲也孰能宗豫言無人尊己之道注謂尊為人君失之孔子以三王之禮占己夢世漸文殯死之所逾逺殷殯兩楹之間孔子殷人夢坐奠兩楹既無宗師其道知其將死而殯也本黃氏胡氏方氏說孔子之喪門人疑所服子貢曰昔者夫子之喪顔淵若喪子而無服喪子路亦然請喪夫子若喪父而無服無服師之禮故疑所服子貢以夫子施於門人者還以報之定為心喪三年以鄭氏方氏補孔子之喪公西赤為志焉飾棺牆置翣設披周也設崇殷也綢練設旐夏也披彼義反綢吐刀反公西赤字子華志為書記其禮牆障柩之栁衣翣以布衣木髙二尺四寸廣三尺方兩角髙白布畫雲氣柄長五尺如扇置車旁披柩行夾引棺者凡皆周之制崇謂所建旌旗刻繒為崇牙之飾此殷之制綢練旌之杠旌之旒緇飾廣充幅長尋曰旐旌載於柩車此夏之制門人尊夫子兼用之或云用三代大夫之禮耳鄭氏孔氏胡氏子張之喪公明儀為志焉禇幕丹質蟻結于四隅殷士也公明儀子張弟子禇覆棺以幄蟻結畫文如蟻行往來交錯以丹質布為禇不牆不翣畫禇之四角為蟻結此殷士葬之飾子張學於孔子效殷禮鄭氏孔氏子夏問於孔子曰居父母之仇如之何夫子曰寢苫枕干不仕弗與共天下也遇諸市朝不反兵而鬭曰請問居昆弟之仇如之何曰仕弗與共國銜君命而使雖遇之不鬬曰請問居從父昆弟之仇如之何曰不為魁主人能則執兵而陪其後枕之鳩反銜音咸才用反苫草干盾不反兵而鬬者身常帶兵魁猶首父母之仇常若居喪誓不俱生無所往不執兵昆弟之仇銜君命則不鬭從父昆弟之仇則陪從其主人情有重輕也然意此亂世之事記者傳聞之言欲知孔門言行當主論語用鄭氏方氏補孔子之喪二三子皆絰而出羣居則絰出則否絰喪之首服出謂適外雖出外亦首絰門人於孔子然也若常禮惟羣居則絰出外則否舉常禮以眀聖門之加厚也用橫渠說易墓非古也易以䜴反陸說如字後世不用昭穆族葬而别葬親於他所用陸氏說古注易芟治草木子路曰吾聞諸夫子喪禮與其哀不足而禮有餘也不若禮不足而哀有餘也祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也喪主哀祭主敬鄭氏曽子弔於負夏主人既祖填池推柩而反之降婦人而后行禮從者曰禮與曽子曰夫祖者且也且胡為其不可以反宿也從者又問諸子游曰禮與子游曰飯於牖下小斂於户內大斂於阼殯於客位祖於庭葬於墓所以即逺也故喪事有進而無退曽子聞之曰多矣乎豫出祖者填池並如字推昌佳反從才用反與音餘飯煩晚反斂力驗反負夏衛地祖謂遷柩車向外為行始而設祖奠以俟明日行填池者池以竹為之衣以青布喪行之飾填謂懸銅魚行則魚動而躍填塞於池飯者始死之含以用米故謂之飯多者委曲之意豫者親之之辭出祖者指負夏主人而言負夏之喪已出祖將行榮曽子之來弔再推柩返內而受其弔禮既祖而婦人降蓋柩車南出階間既空婦人得降立階間今因返柩婦人避之復升堂從堂更降而后行禮故從者怪而問之曽子為主人諱言祖者且也且則何為不可返從者又問子游子游告以自始死至葬皆即逺以明無返之禮曽子聞之又言多矣乎豫負夏主人之出祖者蓋謂其委曲之過終不欲明指其失忠厚之至也合孔氏應氏說補之曽子襲裘而弔子游裼裘而弔曽子指子游而示人曰夫夫也為習於禮者如之何其裼裘而弔也主人既小斂袒括髮子游趨而出襲裘帶絰而入曽子曰我過矣我過矣夫夫是也夫夫上音扶下如字掩而襲衣謂之襲裘露以裼衣謂之裼裘夫夫上助語之辭下丈夫之夫猶言此丈夫也弔禮主人未變服弔用吉服主人既變服始加絰於武又掩其上服若友朋又加帶曽子惟知臨喪無飾一以襲行之子游於主人變乃變故曽子始疑而終服善用鄭氏孔氏說子夏既除喪而見豫之琴和之而不和彈之而不成聲作而曰哀未忘也先王制禮而弗敢過也子張既除喪而見豫之琴和之而和彈之而成聲作而曰先王制禮不敢不至焉豫羊汝反和之音禾或胡卧反見謂見於孔子二者雖情異善同俱順禮商也不敢過師不敢不至蓋學之之力也然家語詩傳皆言子夏喪畢夫子與瑟援琴而弦衎衎而樂閔子騫喪畢夫子與琴援琴而弦切切而哀與此不同陸氏司冦惠子之喪子游為之麻衰牡麻絰文子辭曰子辱與彌牟之弟游又辱為之服敢辭子游曰禮也文子退反哭子游趨而就諸臣之位文子又辭曰子辱與彌牟之弟游又辱為之服又辱臨其喪敢辭子游固以請文子退扶適子南靣而立曰子辱與彌牟之弟游又辱為之服又辱臨其喪虎也敢不復位子游趨而就客位為之之為于僞反適丁厯反司寇惠子衛將軍文子之弟也麻衰以吉服之布為衰牡麻即雄麻牡麻絞絰與齊衰絰同彌牟者惠子之兄惠叔蘭也虎者彌牟之適子惠子廢適立庶子游故為重服以感之惠子不悟而辭又趨臣位以深感之惠子始悟而扶適子復位子游乃趨而復客位用鄭氏說將軍文子之喪既除喪而后越人來弔主人深衣練冠待於廟垂涕洟子游觀之曰將軍文氏之子其庶幾乎亡於禮者之禮也其動也中丁仲反越人逺國之人主人指將軍文子之子簡子瑕即下文將軍文氏之子也深衣謂既祥之麻衣緣以布曰麻衣緣以采曰深衣其制一也練冠未祥之冠自目曰涕自鼻曰洟亡猶無也中謂當於禮之變節既除喪而弔者來文子之子深衣練冠用凶服之變待於廟受弔而不迎賔本無此禮以義起而為之禮中於禮之變合鄭氏孔氏說幼名冠字五十以伯仲死諡周道也絰也者實也掘中霤而浴毁竈以綴足及葬毁宗躐行出于大門殷道也學者行之綴丁劣反霤室中也古者復冗而居開其上以取眀而雨霤焉故後世名其室宗廟也行者行神之位也殷人殯於廟葬則毁廟門西邊墻而出於大門故曰毁宗行神之位在廟門西邊告畢躐其壇而出故曰躐行幼名所以訓其實冠字所以尊其名伯仲又所以敬其字死諡則又以易其名凡皆周道也周人浴死用盆故不掘中霤綴足用燕几故不毁竈殯於正寢至葬朝廟出正門故不毁宗躐行掘霤而使浴水入坎毁竈取甓以綴其足使溫毁廟墻告行神躐其壇而出此皆殷禮孔子殷之後學於孔子者皆行之合方氏孔氏說子桞之母死子碩請具子桞曰何以哉子碩曰請粥庶弟之母子桞曰如之何其粥人之母以葬其母也不可既葬子碩欲以賻布之餘具祭器子桞曰不可吾聞之也君子不家於喪請班諸兄弟之貧者粥音育子桞魯叔仲皮之子子碩其兄具謂葬之器用粥賣也賻布賻喪之泉布即錢也古謂錢為泉布取其流通不粥人之母葬其親不以賻布之餘具祭器皆子桞貧而守義能以兄弟為念本方氏說君子曰謀人之軍師敗則死之謀人之邦邑危則亡之謀軍師敗則死之否則陷衆而死而獨全身不可也謀邦邑而危則亡去之危者尚可安避賢使之圖安也用方氏說補公叔文子升於瑕丘蘧伯玉從文子曰樂哉斯丘也死則我欲葬焉蘧伯玉曰吾子樂之則瑗請前樂音洛瑗于卷反公叔文子名拔衛獻公子孫瑗蘧伯玉名二人皆衛大夫文子樂瑕丘而欲葬其地伯玉以其妨人之田故以請前譏之本鄭氏說辨人有其母死而孺子泣者孔子曰哀則哀矣而難為繼也夫禮為可傳也為可繼也故哭踊有節孺子泣言無節傳主在已言繼主在人言過哀難繼故聖人制為哭踊之節然雜記言哭無常聲如嬰兒失母此亦言襲斂之後可以禮制孔氏叔孫武叔之母死既小斂舉者出尸出户袒且投其冠括髮子游曰知禮武叔公子牙六世孫名州仇嘗毁孔子者括髮在小斂之後出戶夷于堂之前袒括為欲奉尸也武叔奉尸後出户而始袒括不知禮也子游謂其知禮蓋反言以譏之本孔氏說扶君卜人師扶右射人師扶左君薨以是舉卜注音僕本又如字卜古注云當為僕師長也指太僕也按周禮射人大喪與僕人遷尸應氏謂王前巫後史卜筮皆在左右似不必改方氏謂師衆也扶舉非二人所能勝故以師言之師非長也卜人右射人左皆切近之職病以是扶死以是舉男子不死於婦人之手也合應氏游氏說從母之夫舅之妻二夫人相為服君子未之言也或曰同㸑緦從才用反夫人之夫音扶為于僞反從母母之姊妹舅之妻母之嫂也此據外甥稱之二夫人猶言此二人時適此二人同居死相為服此禮古未眀言或謂二人既同㸑服緦亦可本正義說喪事欲其縱縱爾吉事欲其折折爾故喪事雖遽不淩節吉事雖止不怠故騷騷爾則野鼎鼎爾則小人君子蓋猶猶爾從古音之折古大兮反方氏陸氏並讀如字縱縱戒其遽而放之舒也折折懲其緩而約之疾也鄭氏以折音提證以詩之好人提提似改字矣恐非也凌躐也止容止之止詳緩之意也騷騷太疾鼎鼎太舒猶猶疾舒之中喪事易失之遽放之使縱縱故雖遽而不至凌節否則太疾騷騷爾而野矣吉事易失之緩約之以折折故雖止而不至於怠否則太舒鼎鼎爾而小人矣惟猶猶爾為得疾舒之中用方氏說補喪具君子恥具一日二日而可為也者君子弗為也不忍死其親故恥具非倉卒可為者不得已而具一二日可為者弗預為之具用方氏補喪服兄弟之子猶子也蓋引而進之也嫂叔之無服也蓋推而逺之也姑姊妹之薄也蓋有受我而厚之者也逺于萬反兄弟之子期姑姊妹出適大功或引或推重親逺别姑姊妹嫁後薄欲一其心於厚之者唐通典載魏徴議請嫂叔小功五月報制可程氏曰今之有服亦是豈有同居之親而無服者食於有喪者之側未嘗飽也助哀戚也鄭氏曽子與客立於門側其徒趨而出曽子曰爾將何之曰吾父死將出哭於巷曰反哭於爾次曽子北靣而弔焉徒謂客之旅次舍也北靣弔同國之禮客之徒不敢發喪於人館曽子使反哭於館而弔之者禮館人使專之如已有然用鄭氏說孔子曰之死而致死之不仁而不可為也之死而致生之不知而不可為也是故竹不成用瓦不成味木不成斫琴瑟張而不平竽笙備而不和有鐘磬而無簨簴其曰明器神明之也知音智味音沫簨息允反簴音巨之往也謂送死也竹籩簋之屬古注味當作沫沫靧也謂洗靣蓋謂瓦盆不可洗靣也愚按瓦陶器也不成味不可盛飲食也恐不必改字無簨簴不縣也橫曰簨植曰簴忍於死之而不設器為不仁真以為不死而必備可用之器為不智故明器雖設而不同於生人之用神眀待之仁智之盡也補有子問於曽子曰問喪於夫子乎曰聞之矣喪欲速貧死欲速朽有子曰是非君子之言也曽子曰參也聞諸夫子也有子又曰是非君子之言也曽子曰參也與子游聞之有子曰然然則夫子有為言之也曽子以斯言告於子游子游曰甚哉有子之言似夫子也昔者夫子居於宋見桓司馬自為石椁三年而不成夫子曰若是其靡也死不如速朽之愈也死之欲速朽為桓司馬言之也南宫敬叔反必載寶而朝夫子曰若是其貨也喪不如速貧之愈也喪之欲速貧為敬叔言之也曽子以子游之言告於有子有子曰然吾固曰非夫子之言也曽子曰子何以知之有子曰夫子制於中都四寸之棺五寸之椁以斯知不欲速朽也昔者夫子失魯司冦將之荆蓋先之以子夏又申之以冉有以斯知不欲速貧也喪息浪反為于僞反喪失位也桓司馬宋向戍之孫名魋靡侈也敬叔魯孟僖之子仲孫閲嘗失位去魯而得反中都魯邑名孔子嘗為中都宰為民作制司冦者諸侯三卿司空兼司冦三卿之下五大夫司空之下立小司冦小司空魯有臧氏為司冦夫子為司冦乃小司冦貧朽非人情所欲孔子之言特為二子而發爾有子乃能以中都與荆之事驗之可謂知言矣方氏陳莊子死赴於魯魯人欲勿哭繆公召縣子而問焉縣子曰古之大夫束修之問不出竟雖欲哭之安得而哭之今之大夫交政於中國雖欲勿哭焉得而勿哭且臣聞之哭有二道有愛而哭之有畏而哭之公曰然然則如之何而可縣子曰請哭諸異姓之廟於是與哭諸縣氏繆音木竟音境焉於䖍反陳莊子齊大夫陳恆之孫名伯束修一束之修為通問之禮禮之薄者也安得哭之以大夫無外交也生既畏之而不敢不與之交則死亦畏之而不敢不為之哭哭其非所當哭之人故哭於非所當哭之廟必哭諸縣氏以其禮之所由起此禮變也鄭氏方氏仲憲言於曾子曰夏后氏用明器示民無知也殷人用祭器示民有知也周人兼用之示民疑也曽子曰其不然乎其不然乎夫眀器鬼器也祭器人器也夫古之人胡為而死其親乎仲憲原憲也明器祭器各用亦三代之所兼用非獨周兼用之也故曾子重言其不然示民無知之語尤非所以訓故又專言古之人胡為而死其親補公叔木有同母異父之昆弟死問於子游子游曰其大功乎狄儀有同母異父之昆弟死問於子夏子夏曰我未之前聞也魯人則為之齊衰狄儀行齊衰今之齊衰狄儀之問也木式樹切又音朱同父母既服期同母宜降等服大功或謂大功已過子游曰其大功乎疑所服也而况於齊衰其非禮眀矣鄭氏孔氏橫渠補子思之母死於衛桞若謂子思曰子聖人之後也四方於子乎觀禮子蓋慎諸子思曰吾何慎哉吾聞之有其禮無其財君子弗行也有其禮有其財無其時君子弗行也吾何慎哉子思母嫁衛桞若衛人此言為嫁母服也嫁母之服期然以此言觀子思蓋有行之而不備者矣尊統於父故父在為母期以厭降於父母出嫁而其禮之行有所不備以為母絶於父財所以備禮無其時謂勢不可行孟子言不得不可以為恱者也游氏方氏縣子瑣曰吾聞之古者不降上下各以其親滕伯文為孟虎齊衰其叔父也為孟皮齊衰其叔父也瑣縣子名降者降服周禮已貴則降賤者之服古謂殷時上謂旁親族曽祖從祖及伯叔之班下謂從子從孫之流滕伯文殷時滕君名文滕伯文為諸侯而服其叔父皆齊衰殷不降服也方氏后木曰喪吾聞諸縣子曰夫喪不可不深長思也買棺外內易我死則亦然易以䜴反后木魯孝公子惠伯鞏之後外內易謂斫削外內使之平易此后木述縣子之言以屬其子也鄭氏孔氏曽子曰尸未設飾故帷堂小斂而徹帷仲梁子曰夫婦方亂故帷堂小斂而徹帷仲梁子魯人人死斯惡之矣未設飾而帷堂防人之惡也記者併存仲梁子之說以傳疑方氏胡氏小斂之奠子游曰於東方曾子曰於西方斂斯席矣小斂之奠在西方魯禮之末失也士喪禮小斂之奠設於尸東以萬物生於東未忍死其親也變而在西方魯末世失禮也大斂奠於堂乃有席始死之奠未暇備禮曽子以為斂斯席亦非方氏縣子曰綌衰繐裳非古也繐音嵗綌粗葛繐布之細而疏者五服一以麻各有升數若以綌為衰以繐為裳則取其輕凉而已故曰非古子蒲卒哭者呼滅子臯曰若是野哉哭者改之滅者子蒲名或疑非名但以死有滅絶之義呼而哭之子臯髙柴也哭呼名非禮子臯非之乃改杜橋之母之喪宫中無相以為沽也相息亮反沽音古相贊禮者也沽略也方氏謂即沽酒之沽以非自致故訓略也孝子悲迷禮須贊相杜橋居母喪無之故謂其於禮為略孔氏說夫子曰始死羔裘𤣥冠者易之而已羔裘𤣥冠夫子不以弔始死即易去吉服不特喪者易之弔者亦所不服方氏子游問喪具夫子曰稱家之有亡子游曰有無惡乎齊夫子曰有毋過禮茍亡矣斂首足形還葬縣棺而封人豈有非之者哉稱尺證反亡音無齊才細反又如字還音旋縣音𤣥封古音窆王如字稱猶隨也齊言多寡之齊還便也言已斂即葬縣棺謂不設碑繂手縣而下之封者復土以閉瘞之名不必改為窆字富而有者毋得過禮貧而亡者斂其首足不令露見即葬之此有無之齊也補司士賁告於子游曰請襲於牀子游曰諾縣子聞之曰汰哉叔氏專以禮許人賁音奔士賁人名襲謂斂死者以衣汰自矜也子游之言合禮而縣子譏其汰者以其不稱先王而尊輒許諾如禮出於已本孔氏說宋襄公葬其夫人醯醢百甕曾子曰既曰眀器矣而又實之神明之器當虛孔氏孟獻子之喪司徒旅歸四布夫子曰可也獻子魯大夫仲孫蔑司徒其家臣旅下士布泉布賻布有餘使下士歸還於四方賢於家夫喪者未若班諸兄弟之貧者為善故聖人止以為可方氏讀賵曽子曰非古也是再告也以利冒死曰賵古者奠而不讀周則既奠又讀焉故曽子非之以為再告古禮祖而讀賵方氏成子髙寢疾慶遺入請曰子之病革矣如至乎大病則如之何子髙曰吾聞之也生有益於人死不害於人吾雖生無益於人吾可以死害於人乎哉我死則擇不食之地葬我焉革紀力反遺于季反成子髙齊大夫國成伯髙父也慶遺者慶封之族不食之地謂不可耕墾者死且不忍妨人則生之愛人可知方氏子夏問諸夫子曰居君之母與妻之喪居處言語飲食衎爾衎苦旱反衎爾自得貌喪雖輕惻隱不至則有之未有居之而樂者子夏失問夫子是以不答山隂陸氏賓客至無所館夫子曰生於我乎館死於我乎殯生於我館死於我殯朋友始終之義方氏國子髙曰葬者藏也藏也者欲人之弗得見也是故衣足以飾身棺周於衣椁周於棺土周於椁反壤樹之哉壤封土為墳樹種木為表子髙言葬期人之不得見豈可反封樹以表之然周官以爵等為丘封之度為其樹數此言古始非周禮也鄭氏馬氏孔子之喪有自燕來觀者舍於子夏氏子夏曰聖人之葬人與人之葬聖人也子何觀焉與合平聲屬上合讀言若聖人葬人庶有異聞若人之葬聖人與常人何異而子觀之王氏昔者夫子言之曰吾見封之若堂者矣見若坊者矣見若覆夏屋者矣見若斧者矣從若斧者焉馬鬛封之謂也今一日而三斬板而已封尚行夫子之志乎哉若堂形四方而髙若坊形旁殺而長坊堤也若覆夏屋形旁廣而卑覆謂茨瓦夏屋謂門廡也若斧形旁殺刃上而長俗名又謂之馬鬛封功愈易而虧愈難矣三斬板作墳法也安板兩邊用繩約板令直納土板中築土令與板平斬所約板繩更置其上而再築一日之功如此者三而墳之封築已成此子夏既告燕以人之葬聖人子何觀復述聖人言葬之說以告之見事惟從簡而門人不過從夫子之志此亦答其來觀之意也補婦人不葛帶葬後卒哭變麻易葛帶婦人質所重在要帶故不易用葛帶至期竟除之禮氏有薦新如朔奠薦時物之新如月朔之奠重之也用禮氏既葬各以其服除禮三月而葬若三月之服應除者不待主人卒哭用孔氏池視重霤池者桞車之池重霤者屋之承霤以木為之承屋霤入木中又從木中霤於地故名重霤生時既屋有重霤以行水死時桞車亦象之於車覆鱉甲之下􅀈帷之上織竹如籠衣以青布承鱉甲名池天子四靣諸侯三大夫前後二士唯前一各視生時之重霤孔氏君即位而為椑嵗一漆之藏焉椑蒲厯反椑櫬也親尸者嵗一漆示如未成藏焉惡人見孔氏方氏復楔齒綴足飯設飾帷堂並作父兄命赴者楔悉節反綴竹劣反復招魂也楔齒用角柶柱其齒使含時不閉綴足用几綴其足使著屨時得直飯含也設飾襲斂也五者並作於帷堂之時已而父兄使人往赴告於人合鄭氏陸氏說君復於小寢大寢小祖大祖庫門四郊復始死而招其魂也小寢髙祖以下之寢大寢始祖大祖之寢小祖髙祖以下之廟大祖始祖大祖之廟復必於寢廟人死必反本故也庫門生時所出入也四郊魂氣無所不之也人君禮備故復處多皆他日所嘗有事之地也鄭氏孔氏方氏喪不剝奠也與祭肉也與音餘剝猶倮喪祭必巾覆之不倮露者謂祭肉易受塵垢脯醯則否孔氏方氏既殯旬而布材與明器既殯旬殯後十日也布班也班布椁材與明器之類為葬備用孔氏說朝奠日出夕奠逮日朝奠象朝時之食夕奠象夕時之食逮日者及日未沒方氏父母之喪哭無時使必知其反也使古說謂出使而告反馬氏謂哭者聲也聲為陽所以能使魂氣之反方氏謂哭者所以求其反哭之無時欲使死者必知其反而已未知孰是然古說於經文不甚協練練衣黃裏縓緣葛要絰繩屨無絇角瑱鹿裘衡長袪袪裼之可也縓元絹反緣說絹反要一遙反絢其俱反瑱吐練反衡依注作橫華彭反袪起魚反練小祥也練衣者正服不可變練其中衣以承衰也黃裏者中衣以黃色為夾裏也縓緣者縓淺絳色緣謂衣領及褎緣以淺絳色為領袖緣也葛要絰者小祥男子去首絰唯餘要葛也繩屨者始死菅屨至小祥用繩麻屨也絇屨頭之飾吉有而喪無絇也角瑱者瑱以玉充耳初喪去之至小祥微飾以角為之也鹿裘者冬時吉凶衣裏皆用大鹿皮為之也衡長袪者袪謂袖緣袂口小祥前裘狹而短袂又無飾小祥後更為之裘既橫廣之又長之且為袪加此三法也裼謂裘上又加衣所以表裘有袪而裼之以見鹿裘之美備飾也袒而有衣曰裼此明小祥後外仍用衰衰內有練中衣練中衣內有裼衣裼內有鹿裘鹿裘內自有常著襦衣孔氏有殯聞逺兄弟之喪雖緦必往非兄弟雖鄰不往所識其兄弟不同居者皆弔家有殯則於弔喪不輕往緦最輕也兄弟雖緦必往親骨肉也鄰最近也非兄弟雖鄰不往疏無親也所識謂非兄弟又非疏外乃平生識知往來之人今若身死者兄弟雖不同居亦就往弔之成其死者之恩舊也鄭氏孔氏天子之棺四重水兕革棺被之其厚三寸杝棺一梓棺二四者皆周杝羊支反四重者水牛兕牛之革以為棺被革各厚三寸共六寸此為一重杝棺者椑棺也為一重屬棺大棺皆梓為之屬一重大棺一重凡四重皆周匝鄭氏棺束縮二衡三衽每束一柏椁以端長六尺棺束者古無釘用皮束合之為固也縮二者縮縱也縱束者二行也衡三者衡橫也橫束者三行也衽每束一者衽小要也兩頭廣中央小謂鑿棺邊及兩頭合處作坎形以小要連之令固也柏椁以端者積柏材作椁並葺端頭從下壘上木頭相向作四阿也長六尺者其木每段長六尺也孔氏天子之哭諸侯也爵辨絰䊷衣或曰使有司哭之為之不以樂食䊷則其反爵辨即韋辨其色如爵絰衍字也天子至尊服麻不加於采䊷衣即緇衣此言諸侯薨於國天子遙哭之為之食不舉樂胡氏孔氏天子之殯也菆塗龍輴以椁加斧於椁上畢塗屋天子之禮也菆才官反輴勑倫反菆叢也菆塗用木叢棺而四靣塗之也輴喪車也龍輴者畫龍於輴車之轅也以椁者題湊叢木而象椁之形也斧謂繡覆棺之衣為斧文也先菆四靣為椁上與棺齊而上猶開以棺衣從椁上入覆於棺故云加斧於椁上斧覆既竟又四注為屋覆上而下四靣盡塗之天子之殯如此孔氏唯天子之喪有别姓而哭别彼列切同姓異姓庶姓各相從為位鄭氏魯哀公誄孔丘曰天不遺耆老莫相豫位焉嗚呼哀哉尼父左傳所録有屏余一人之語今記修之如此陸氏國亡大縣邑公卿大夫士皆厭冠哭於大廟三日君不舉或曰君舉而哭於后土厭于業反厭冠喪冠舉舉樂師敗失地以喪禮處之鄭氏孔子惡野哭者惡烏路反哭非其地謂之野孔氏未仕者不敢稅人如稅人則以父兄之命稅人謂以物遺人釋文士備入而後朝夕踊祥而縞是月禫徙月樂士卑最後入言諸臣畢入乃俱踊大祥而縞冠是月禫祭踰月樂作孔氏說君於士有賜帟帟小幕以承塵士惟恩賜乃得有鄭氏檀弓下第四君之適長殤車三乘公之庶長殤車一乘大夫之適長殤車一乘適丁歷反長丁丈反皆下於成人也車謂遣車載遣奠祭牲送亡者鄭氏孔氏公之喪諸達官之長杖長下丈反達謂得自通於君者晦菴君於大夫將葬弔於宫及出命引之三步則止如是者三君退朝亦如之哀次亦如之宫殯宫朝謂柩朝廟而將廢之時次待賓客次舍君於大夫將葬而弔孝子攀號君命引其柩使行奪孝子之情使出葬也如是者三而君退或弔於朝廟之時及弔於次舍皆然用孔氏補五十無車者不越疆而弔人五十始衰不徒行逺弔鄭氏孔氏季武子寢疾蟜固不說齊衰而入見曰斯道也將亡矣士唯公門說齊衰武子曰不亦善乎君子表微及其喪也曾㸃倚其門而歌蟜居表反說他活反季武子魯大夫季孫夙强僭如君時人畏之入其門者皆說衰蟜固不脫衰而問其疾且謂著衰入大夫之門此道將亡武子不得巳徉善之表明也謂斯道之微君子能表明之季孫夙之疾蟜固不說齊衰而入見示之以凶而欲其死也季孫夙之死曾㸃倚其門而歌示之以吉而樂其死也季孫强僭二賢疾之如此不畏强也陳氏大夫弔當事而至則辭焉大夫弔於士士當殯斂之事則辭以告弔於人是日不樂婦人不越疆而弔人行弔之日不飲酒食肉焉哀樂不同日婦人無外事鄭氏弔於葬者必執引若從柩及壙皆執紼車索曰引柩索曰紼引唯在路用之下壙執紼方氏喪公弔之必有拜者雖朋友州里舍人可也弔曰寡君承事主人曰臨公弔臣喪須往拜謝若無主後友朋同州里及喪家典舍之人皆可往拜弔者曰助執事謝者曰辱降臨孔氏君遇柩於路必使人弔之遇凡民之喪於路亦弔之君於民有父母恩也鄭氏大夫之喪庶子不受弔避嫡也孔氏妻之昆弟為父後者死哭之適室子為主袒免哭踊夫入門右使人立於門外告來者狎則入哭父在哭於妻之室非為父後者哭諸異室適室正寢也來者來弔者也妻之兄弟子之舅也子於舅服緦麻故使為主夫即其子之父對妻而言故曰夫其入門右者以辟為主之處示無二主也哭則鄰里聞者來弔故使人立門外告以哭之由若狎熟者來則使入與俱哭父在哭於妻之室不以私喪干尊也非為父後哭於别室别於適也鄭氏孔氏有殯聞逺兄弟之喪哭於側室無側室哭於門內之右同國則往哭之逺兄弟謂異國而居者也哭於側室逺殯宫也哭於門內之右不居主位示為之變也凡皆不得而往哭故也若同國則往哭用方氏說子張死曾子有母之喪齊衰而往哭之或曰齊衰不以弔曾子曰我弔也與哉與音餘或人以曾子於子張無服而非之曾子答以我非弔乃以朋友哀痛而哭之耳愚按齊衰者曾子為母服非為弔子張而服也往哭者友朋哀痛之情特就因其服而往非特以此服行弔禮也諸家乃以曾子之言為文過夫曾子乃以魯稱於禮文之末未必盡合然曾子於子張之死也乃用情於或人之答也乃言情曾子豈文過者哉補有若之喪悼公弔焉子游擯由左悼公魯哀公之子擯相禮者在主曰擯在客曰介吉事尚左凶事尚右主居右而擯相者由左子游如左是知禮也孔氏方氏說齊榖王姬之喪魯莊公為之大功或曰由魯嫁故為之服姊妹之服或曰外祖母也故為之服榖音告古毒反按古注云當作告聲誤也王姬周女齊襄公夫人榖即告告者以喪告也莊公齊襄公女弟文姜之子天子女下嫁諸侯必以同姓諸侯為主此王姬所以由魯而嫁以其嘗為之主故喪則必告告則必為之服而或以為外祖母故服故兼録之傳疑也用方氏補晉獻公之喪秦穆公使人弔公子重耳且曰寡人聞之亡國恆於斯得國恆於斯雖吾子儼然在憂服之中喪亦不可久也時亦不可失也孺子其圖之以告舅犯舅犯曰孺子其辭焉喪人無寶仁親以為寶父死之謂何又因以為利而天下其孰能說之孺子其辭焉公子重耳對客曰君惠弔亡臣重耳身喪父死不得與於哭泣之哀以為君憂父死之謂何或敢有他志以辱君義稽顙而不拜哭而起起而不私子顯以致命於穆公穆公曰仁夫公子重耳夫稽顙而不拜則未為後也故不成拜哭而起則愛父也起而不私則逺利也喪亦息浪反後同與於音餘顯呼遍反喪謂失位舅犯重耳舅狐偃也晉獻公殺世子申生重耳避難在翟獻公死秦穆公使人就弔之欲納之重耳問於舅犯而辭焉不因父喪而利其國故終能復國而霸補帷殯非古也自敬姜之哭穆伯始也穆伯魯大夫季悼子之子敬姜其妻也禮朝夕哭不帷敬姜逺嫌始帷本孔氏說喪禮哀戚之至也節哀順變也君子念始之者也始猶生也始而生之者親也哀之至喪之正也節哀者念父母生已不敢以死傷生也本鄭氏說復盡愛之道也有禱祠之心焉望反諸幽求諸鬼神之道也北面求諸幽之義也復者招始死之魂有禱祠之心冀其復也復者北面而呼北為隂幽求諸鬼神之義冀其復從幽而還也用鄭說補拜稽顙哀戚之至隱也稽顙隱之甚也稽音啓稽顙首觸地無容隱痛也鄭氏飯用米貝弗忍虛也不以食道用美焉耳飯扶挽反死者飯之不忍虛其口不用飯食之道而用米與貝用其美者也孔氏說銘明旌也以死者為不可别已故以其旗識之愛之斯録之矣敬之斯盡其道焉耳重主道也殷主綴重焉周主重徹焉奠以素器以生者有哀素之心也别彼列反識式至反綴丁劣反又丁衛反凡銘所以為名明旌謂之銘以死者書名焉死者無形貌可以識别故書之於旗以表之旗即銘旗愛之故録其名敬之故無所不盡其道也重亦木為之如木主重設於始死之時有柩而又設之重故謂之重主立於既虞之後有廟而必立之主故謂之主殷既作主猶聨綴其重以縣於廟不忍棄也周既作主即徹重而埋於門外之道左不敢瀆也奠祭悉用素器以表哀素之心本方氏說唯祭祀之禮主人自盡焉爾豈知神之所饗亦以主人有齊敬之心也此言祭祀未必神之來饗惟當盡齊敬之心然愚恐非所以訓孔子曰祭如在補辟踊哀之至也有算為之節文也袒括髮變也愠哀之變也去飾去美也袒括髮去飾之甚也有所袒有所襲哀之節也辟婢亦反愠紆粉反撫心為辟跳足為踊男踊女辟哀痛之至也一踊三跳士則三踊此有算數為之節文恐其毁滅性也袒去其衣括髮投其冠變其常也愠悶而至辟踊又哀之變也去華飾變其常也去飾而至於袒括髮又去飾之甚也袒而復襲又以節哀也合孔氏方氏說辨絰葛而葬與神交之道也有敬心焉周人辨而葬殷人冔而葬冔况甫反厭冠麻絰居喪之禮也至於葬則以辨易厭冠以葛易麻絰者喪致哀親之也葬則有敬心焉喪事逺以神明待之也周之辨猶殷之冔皆象祭冠以易喪冠而葬也合方氏陸氏說啜主人主婦室老為其病也君命食之也啜昌悅反食音嗣啜啜粥也主人亡者之子主婦亡者之妻室老家之長相三者皆大夫之家貴為其哀劇而病也故親喪三日之後君命食之食之者使之啜粥也本方氏說補反哭升堂反諸其所作也主婦入於室反諸其所養也反哭之弔也哀之至也反而亡焉失之矣於是為甚殷既封而弔周反哭而弔孔子曰殷已慤吾從周養羊尚反封古音窆此言既葬而反哭也主人升堂求諸其舊所行禮之處主婦入室求諸其舊所饋食之處反而不復見其親其痛於是為甚於是乎弔之殷甫葬而即弔於壙則已質慤周待其反哭而後弔於家孔子從之用方氏補葬於北方北首三代之達禮也之幽之故也北方國北北首嚮北三代皆然北幽故也上之字訓往下之字語助用古注補既封主人贈而祝宿虞尸既反哭主人與有司視虞牲有司以几筵舍奠於墓左反日中而虞葬日虞弗忍一日離也是日也以虞易奠舍音釋離力智反贈以幣送死於壙也宿猶戒也以事戒之曰戒以期戒之曰宿几以依神筵坐神席也舍釋也奠置也既窆而贈則虞祭有期矣故祝先反而宿戒虞尸主人既反哭而省視虞牲留有司别祭墓以禮其神而主人即於葬之日歸虞祭於家以代未葬時朝夕之奠用方氏孔氏補卒哭曰成事是日也以吉祭易喪祭明日袝於祖父其變而之吉祭也比至於袝必於是日也接不忍一日末有所歸也殷練而袝周卒哭而袝孔子善殷比必利反既虞之後卒哭而祭成事者成祭事也祭以吉為成祔於祖父告廟也孔子善殷期而後神之人情也古人之祔非遂徹几筵故有日祭猶定省之禮如親之存既除喪而後主遷於新廟鄭氏程氏朱氏吕氏君臨臣喪以巫祝桃茢執戈惡之也所以異於生也喪有死之道焉先王之所難言也桃辟惡茢苕帚也掃不祥戈所以刺故君臨臣喪巫執桃祝執茢小臣執戈以先喪有死之道而惡之也然臣死君親哭之所以致忠愛而乃惡之非禮也周之末造也合孔氏劉氏說喪之朝也順死者之孝心也其哀離其室也故至於祖考之廟而後行殷朝而殯於祖周朝而遂葬離力智反朝謂將葬以柩朝廟人子出必告死將葬亦朝廟順其生時之孝心也又死者神靈悲哀棄離其室故至祖考之廟辭而後行殷朝而就殯於廟周殯於賔階將葬方朝朝而遂葬孔氏方氏孔子謂為明器者知喪道矣備物而不可用也哀哉死者而用生者之器也不殆於用殉乎哉其曰明器神明之也塗車芻靈自古有之明器道也孔子謂為芻靈者善謂為俑者不仁不殆於用人乎哉殆幾也塗車以塗為之而不可運芻靈束芻草略似人形俑者木偶類生人之形者也明器備而不可用芻靈似而不為人後世明器改而用生者之器芻靈改而用木偶之人故流而至於用生人殉死者之葬孔子推其漸而哀之用此說補穆公問於子思曰為舊君反服古與子思曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若將加諸膝退人若將隊諸淵毋為戎首不亦善乎又何反服之禮之有為于僞反與音餘隊音墜戎首謂為他國主兵來攻伐子思對魯穆公與孟子告齊宣王略相類蓋世衰道微君多虐其臣彼此之情渙散不屬故警其君以上下相為感應之理若其所以自處不容如是之薄也應氏悼公之喪季昭子問於孟敬子曰為君何食敬子曰食粥天下之達禮也吾三臣者之不能居公室也四方莫不聞矣勉而為瘠則吾能毋乃使人疑夫不以情居瘠者乎哉我則食食疑夫音扶食食上如字下音嗣悼公魯哀公之子昭子季康子之曾孫名强敬子孟武伯之子名捷三臣孟孫叔孫季孫不能居公室不能以臣禮事君也無事食食以養生居喪食粥以為瘠季昭子久矣無君居君喪不食粥舍曰不能而為之詞用方氏陸氏說衛司徒敬子死子夏弔焉主人未小斂絰而往子游弔焉主人既小斂子游出絰反哭子夏曰聞之也與曰聞諸夫子主人未改服則不絰敬子公子許之後弔必候主人改服乃絰鄭氏曾子曰晏子可謂知禮也已恭敬之有焉有若曰晏子一狐裘三十年遣車一乘及墓而反國君七個遣車七乘大夫五個遣車五乘晏子焉知禮曾子曰國無道君子恥盈禮焉國奢則示之以儉國儉則示之以禮遣棄戰反焉於䖍反個謂所包遣奠牲體之數七個五個謂以牲體折為七段五段遣車七乘五乘以牲段折而分載之一個一乘也晏子一裘三十年儉於巳可也大夫遣車五乘晏子之父晏桓子大夫也葬之遣車止一乘儉於其親不可也曾子以晏子恭敬為知禮則是以晏子之儉為知禮則非宜乎為有若之所難合陳氏方氏說國昭子之母死問於子張曰葬及墓男子婦人安位子張曰司徒敬子之喪夫子相男子西鄉婦人東鄉曰噫毋曰我喪也斯沾爾專之賔為賔焉主為主焉婦人從男子皆西鄉相息亮反鄉許亮反斯沾古皆去聲今如字國昭子齊大夫子孔子噫不寤聲毋禁止辭斯沾古以斯為斯盡之斯以沾為覘視之覘云齊之大家有事人盡視之不獨兩字皆改經文而且上文之毋曰與下文之專之義不相貫竊意皆合如字斯此也沾爾者沾沾然之類率爾而專輒為之也國昭子不聽子張西鄉東鄉之說而自主皆西鄉之說故先之曰毋謂我之喪而率然自專之也禮分賔主而男女皆西鄉者賔主之禮也禮重男女之别雖在喪紀莫不各正其位司徒敬子之喪夫子為相固嘗行之而國昭子徒為賔主之辨曾無男女之别失禮不亦甚乎方氏穆伯之喪敬姜晝哭文伯之喪晝夜哭孔子曰知禮矣穆伯於敬姜夫也喪止晝哭文伯於敬姜子也喪晝夜哭孔子以為知禮方氏文伯之喪敬姜據其牀而不哭曰昔者吾有斯子也吾以將為賢人也吾未嘗以就公室今及其死也朋友諸臣未有出涕者而內人皆行哭失聲斯子也必多曠於禮矣夫音扶未嘗就公室言未嘗到公室觀其行內人妻妾行哭行哭泣之禮朋友諸臣不出涕而內人皆哭失聲則平日所好可見故其母敬姜不哭上云晝夜哭此不哭者暫時也方氏鄭氏季康子之母死陳䙝衣敬姜曰婦人不飾不敢見舅姑將有四方之賔來䙝衣何為陳於斯命徹之敬姜者康子從祖母以康子失禮命徹之方氏有子與子游立見孺子慕者有子謂子游曰豫一不知夫喪之踊也豫欲去之久矣情在於斯其是也夫子游曰禮有微情者有以故興物者有直情而徑行者戎狄之道也禮道則不然人喜則斯陶陶斯咏咏斯猶猶斯舞舞斯愠愠斯戚戚斯嘆嘆斯辟辟斯踊矣品節斯斯之謂禮猶古音搖今如字微情者微殺也謂節哭踊以故興物者興起也謂立衰絰之制直情徑行謂哭踊無節衣服無制猶今讀如字若君子蓋猶猶爾之猶有子欲去踊節直若孺子慕者子游謂其直情徑行非禮道也然此章言人情之喜極而至辟踊辟踊豈生於喜者哉清江劉氏謂此有缺文喜至舞蹈是一節愠至辟斯踊矣是一節蓋以其憂喜各有次第而極也今誤以舞斯蹈為舞斯愠似得之補人死斯惡之矣無能也斯倍之矣是故制絞衾設蔞翣為使人勿惡也始死脯醢之奠將行遣而行之既葬而食之未有見其饗之者也自上世以來未之有舍也為使人勿倍也故子之所刺於禮者亦非禮之訾也惡烏路反倍與背同絞尸交反蔞音桞食音嗣舍音捨訾似斯反絞衾尸之飾蔞翣棺之飾子指有子而言刺譏也謂有子譏踊節訾病也人死為人所惡見其死而無所復能則為人所倍喪之有飾使人勿惡祭之如生使人勿倍子之所譏非禮之病也然孝子之於喪祭非特為人惡之倍之而設此特一端爾補吳侵陳斬祀殺厲師還出竟陳大宰嚭使於師夫差謂行人儀曰是夫也多言盍嘗問焉師必有名人之稱斯師也者則謂之何大宰嚭曰古之侵伐者不斬祀不殺厲不獲二毛今斯師也殺厲與其不謂之殺厲之師與曰反爾地歸爾子則謂之何曰君王討敝邑之罪又矜而赦之師與有無名乎還音旋竟音境嚭普被反夫差上音扶下初佳反與音餘吳侵陳以魯哀元年斬祀謂斬其神祀之木厲疾厲也殺厲古謂以致死為勇竊意雖神祀亦蕩除之於民物可知也大宰嚭本吳臣此云陳大宰嚭孔氏曰此大宰嚭與吳大宰嚭名號同而人異鄱陽洪氏曰大宰嚭乃吳夫差之宰陳遣使者正用行人則行人儀乃陳臣也記禮者簡策差互故更錯其名當云陳行人儀使於師夫差使大宰嚭問之乃善吳既斬祀殺厲於陳陳使至吳吳問其師謂何陳使者以殺厲事微諷之吳許以反地歸其子陳使者即誦其師之有名使終其善意用方氏說補顏丁善居喪始死皇皇焉如有求而弗得及殯望望焉如有從而弗及既葬慨焉如不及其反而息顏丁魯人慨憊貌息謂心與形俱息此論孝子哀殺有漸孔氏子張問曰書云髙宗三年不言言乃歡有諸仲尼曰胡為其不然也古者天子崩王世子聽於冢宰三年時君無行三年喪者故子張疑而問方氏知悼子卒未葬平公飲酒師曠李調侍鼓鐘杜蕢自外來聞鐘聲曰安在曰在寢杜蕢入寢厯階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北靣坐飲之降趨而出平公呼而進之曰蕢曩者爾心或開豫是以不與爾言爾飲曠何也曰子卯不樂知悼子在堂斯其為子卯也大矣曠也大師也不以詔是以飲之也爾飲調何也曰調也君之䙝臣也為一飲一食忘君之疾是以飲之也爾飲何也曰蕢也宰夫也非刀匕是供又敢與知防是以飲之也平公曰寡人亦有過焉酌而飲寡人杜蕢洗而揚觶公謂侍者曰如我死則必毋廢斯爵也至於今既畢獻斯揚觶謂之杜舉知音智蕢音蒯飲去聲樂如字觶之豉反知悼子晉大夫荀盈魯昭九年卒平公晉侯彪侍與君飲也鼓鐘樂作也杜蕢三酌皆罰也曩者爾心或開豫謂向意爾必開發我我固不問今汝趨出而不言故問之也子卯不樂者紂以甲子日死桀以乙卯日亡王者謂之疾日不舉樂䙝嬖也忘君之疾疾憂也與知防謂以宰夫而與知禁防之事侵官宜自罰也觶酒器揚觶舉爵於君也謂之杜舉表此爵杜蕢所舉也知悼子在殯而晉平公作樂故杜蕢罰飲其侍者且以越職自罰平公服善亦自罰且名其罰爵以詔後世也補公叔文子卒其子戍請諡於君曰日月有時將葬矣請所以易其名者君曰昔者衛國凶饑夫子為粥與國之餓者是不亦惠乎昔者衛國有難夫子以其死衛寡人不亦貞乎夫子聽衛國之政修其班制以與四鄰交衛國之社稷不辱不亦文乎故謂夫子貞惠文子文子衛獻公之孫名拔諡者誄其行以易名君謂衛靈公難謂魯昭二十年盜殺衛侯之兄摯也時齊豹作亂公如死鳥班言上下之次制言多寡之節石駘仲卒無適子有庶子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玉石祈子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉石祈子兆衛人以龜為有知也駘大來反適丁厯反駘仲衛大夫石蠟之族六人莫適立故卜為後者沐浴佩玉則兆言齊戒則得吉兆石祈子六人之一獨以居喪不忍為之而反獨得吉兆故衛人謂龜為有知也鄭氏方氏陳子車死於衛其妻與其家大夫謀以殉葬定而后陳子亢至以告曰夫子疾莫養於下請以殉葬子亢曰以殉葬非禮也雖然則彼疾當養者孰若妻與宰得已則吾欲已不得已則吾以二子者之為之也於是弗果用亢音剛養去聲子車陳大夫子亢子車之弟孔子弟子下謂地下宰即家大夫子亢度非可以口舌爭故使二人身自為殉二人懼而自止西門豹止嫁河伯事略類此人能以人之痛癢反而切諸身則害人之事息矣補子路曰傷哉貧也生無以為養死無以為禮也孔子曰啜菽飲水盡其歡斯之為孝斂手足形還葬而無椁稱其財斯之謂禮還音旋稱尺證反啜菽菽大豆以菽為粥而啜之也飲水更無餘物也還速也以其所以養養之至以其所以葬葬之至補衛獻公出奔反於衛及郊將班邑於從者而後入栁莊曰如皆守社稷則孰執羈靮而從如皆從則孰守社稷君反其國而有私也毋乃不可乎弗果班從才用反靮丁厯反獻公名衎以魯襄公十四年奔齊二十六年復歸羈以絡馬靮以控馬以其從奔故言執羈靮居者從者皆不可無獻公出奔而歸將獨私從者栁莊諫而止補衛有太史曰栁莊寢疾公曰若疾革雖當祭必告公再拜稽首請於尸曰有臣栁莊也者非寡人之臣社稷之臣也聞之死請往不釋服而往遂以禭之與之邑裘氏與縣潘氏書而納諸棺曰世世萬子孫毋變也革居力反禭音遂縣去聲革急也禭贈也以衣贈死者遂而不反故謂之禭裘縣潘皆邑名當祭而告疾亟則失之遽不釋服而往襚則近乎䙝獻公為之君子不以為非者恕其有尊賢之心也方氏陳乾昔寢疾屬其兄弟而命其子尊己曰如我死則必大為我棺使吾二婢子夾我陳乾昔死其子曰以殉葬非禮也况又同棺乎弗果殺乾音干屬之玉反陳乾昔之子不從父之亂命不陷父於不義記者善之陳氏鄭氏仲遂卒於垂壬午猶繹萬入去籥仲尼曰非禮也卿卒不繹仲遂魯莊公之子東門襄仲其卒在魯宣八年繹者正祭之明日又祭如繹絲續而不絶故名繹萬干舞無聲籥籥舞有聲卿卒不當繹今猶繹而但去其樂之有聲者故曰非禮用鄭氏季康子之母死公輸若方小斂般請以機封將從之公肩假曰不可夫魯有初公室視豐碑三家視桓楹般爾以人之母嘗巧則豈不得以其母以嘗巧者乎則病者乎噫弗果從般音班封音窆其母之母音無方說如字今從之公輸若匠師方小者其年尚幼斂謂下棺於椁般者公輸若之族多技巧者見若掌斂事而尚幼欲代之而設機關以下窆公肩假止而不作謂魯自有始初舊制豐碑者斫大木如碑形植於椁之四角穿木中間如轆轤下棺以縴繞此天子制也時諸侯僭天子禮而公室視之桓楹者楹者亭郵之表柱四植謂之桓斫木大如桓楹下於天子之豐碑此諸侯制也時三家僭諸侯禮而三家視之此魯始初之制公輸般奈何欲以人之母嘗試已之巧亦豈不得已乎巳作以古字通用也其母以人母嘗巧則於汝病者乎言不得嘗巧豈於汝有病公肩假更噫以傷嘆於是衆人遂止凡皆鄭氏孔氏之說以豈不得以絶句方氏云般欲以人之母嘗巧何不以已之母嘗巧則病矣此說不於以字絶句又不改以字為已字且上云以人之母下云以其母文意相叶今從之右用三家之說補戰於郎公叔禺人遇負杖入保者息曰使之雖病也任之雖重也君子不能為謀也士弗能死也不可我則既言矣與其鄰重汪踦往皆死焉魯人欲勿殤重汪踦問於仲尼仲尼曰能執干戈以衛社稷雖欲勿殤也不亦可乎禺音遇為于僞反重作童踦魚綺反郎魯近邑戰於郎謂哀十一年齊國書帥師伐我禺人魯昭公之子春秋傳作公叔務人負杖入保者兩手負杖於頸走入城保以避齊師之人也息者因而止息也使謂徭役任謂賦稅君子指卿大夫鄰重汪踦重作童鄰之童姓汪名踦郎之戰公叔禺人遇避冦而入保者因言徭役使人病困賦稅責人煩重卿大夫不能為謀士又不能致死是自全其身於理不可既言之遂與鄰童汪踦赴齊師而死於理童子為殤魯人見其死敵欲勿殤而以成人之喪治之問於仲尼仲尼言其可用孔氏說子路去魯謂顏淵曰何以贈我曰吾聞之也去國則哭於墓而后行反其國不哭展墓而入謂子路曰何以處我子路曰吾聞之過墓則式過祀則下展謂省視祀謂神位有屋樹者子路問去之禮顏淵告以去則哭墓反則省墓顏淵就問以居之禮子路告以過墓式車過祀下車子路行者顏淵居者去主哀居主敬互相問交相輔如此補工尹商陽與陳棄疾追吳師及之陳棄疾謂工尹商陽曰王事也子手弓而可手弓子射諸射之斃一人韔弓又及謂之又斃二人每斃一人掩其目止其御曰朝不坐燕不與殺三人亦足以反命矣孔子曰殺人之中又有禮焉射食亦反工尹楚官名陳棄疾楚公子棄疾後立為平王初楚縣陳而封之故曰陳棄疾商陽不忍傷人棄疾命之弓始弓命之射始射既斃一人而韔弓每斃一人而掩目及斃三人而自謂士之賤不與朝燕已足反命而不復射故孔子謂其於殺人之中尚有禮補諸侯伐秦曹桓公卒於㑹諸侯請含使之襲含胡暗反春秋魯成公十三年曹伯廬卒於師此云㑹廬諡宣此云桓恐皆誤請含朋友有相食之道也使之襲則非襲賤者之事也本鄭氏胡氏說襄公朝於荆康王卒荆人曰必請襲魯人曰非禮也荆人强之巫先拂柩荆人悔之荆楚也康王楚子昭僭號王也魯襄公二十八年朝楚楚强之襲本以人臣之事待襄公襄公以桃茢拂除而臨之反以人君之禮臨楚故楚悔之用陳氏說補滕成公之喪使子叔敬叔弔進書子服惠伯為介及郊為懿伯之忌不入惠伯曰政也不可以叔父之私不將公事遂入滕成公喪在魯昭三年子叔敬叔魯宣公弟叔肸之曾孫子者男子之通稱叔者其氏故冠以子叔進書者奉君之弔書惠伯慶父𤣥孫之子名椒介副也懿伯者惠伯之叔父忌者怨也敬叔嘗殺惠伯之叔父名懿伯故舊有怨忌常為防備今敬叔使於滕惠伯為介既及滕郊是由滕之主人平日防備不復在已故忌其報仇見殺而不敢入惠伯遂開釋之謂今奉君命政令不報叔父私讎敬叔乃敢入此一節明不以私廢公孔氏說哀公使人弔蕢尚遇諸塗辟於路畫宫而受弔焉曾子曰蕢尚不如杞梁之妻之知禮也齊莊公襲莒于奪杞梁死焉其妻迎其柩於路而哭之哀莊公使人弔之對曰君之臣不免於罪則將肆諸市朝而妻妾執君之臣免於罪則有先人之敝廬在君無所辱命蕢苦怪反辟音避畫音獲奪徒外反與兊同奪隧也春秋傳魯襄二十三年齊襲莒杞殖華還載甲夜入且于之隧隧與奪聲相近即隧也杞殖即杞梁也魯哀公使人弔蕢尚遇於路蕢尚畫地為宫象而受之齊莊公使人弔杞梁之喪於路杞梁之妻辭之禮不弔於路故曾子因蕢尚失禮而證以杞梁之妻知禮補孺子􅀈之喪哀公欲設撥問於有若有若曰其可也君之三臣猶設之顏栁曰天子龍輴而椁幬諸侯輴而設幬為榆沈故設撥三臣者廢輴而設撥竊禮之不中者也而君何學焉􅀈吐孫反輴敕倫反沈昌審反中丁仲反䵍魯哀公之少子撥以撥發榆汁灑於道使輴車滑而易行者也三臣魯三家孟孫叔孫季孫輴殯車天子畫龍於轅為龍輴諸侯不畫龍止稱輴幬覆也天子之殯以菆木為椁而幬之諸侯無椁設幬而已榆沈者榆木名沈即瀋蓋汁也水澆榆白皮汁哀公欲設撥有若以三家之設為比顏栁以三家之設為非蓋天子諸侯之殯以輴車之重也故為榆沈以滑之欲榆沈之散也故設撥以發之無輴則無用沈無沈則無用發三臣既知輴之可廢而不知撥之不可設是竊取禮之不中者故顏栁戒哀公之勿學也方氏悼公之母死哀公為之齊衰有若曰為妾齊衰禮與公曰吾得已乎哉魯人以妻我為于僞反與音餘悼公之母哀公之妾也惟大夫貴妾緦諸侯於妾無服哀公服齊衰非禮有若譏而問之哀公文過謂魯人以我無夫人皆以為我妻不得不服也鄭氏孔氏季子臯葬其妻犯人之禾申祥以告曰請庚之子臯曰孟氏不以是罪豫朋友不以是棄豫以吾為邑長於斯也買道而葬後難繼也長丁丈反子臯孔子弟子髙柴字子臯論語作子羔申祥子張之子庚償也申祥請償民之禾是也子臯恃為邑長而謂犯民之禾無傷非也葬妻私也公事猶不可妨民而况私乎且謂孟氏不我罪朋友不我棄而肆焉夫為長惟當恤民豈為人之罪我棄我而後為之哉謂後來為難繼尤順非而澤者也子臯未必然或記者傳聞爾補仕而未有祿者君有饋焉曰獻使焉曰寡君違而君薨弗為服也違去也仕未受祿未純為臣故君饋不曰賜而曰獻使命不曰君而曰寡君違而去之之他邦君薨不為之服方氏虞而立尸有几筵卒哭而諱生事畢而鬼事始巳既卒哭宰夫執木鐸以命於宫曰舍故而諱新自寢門至於庫門舍音捨已語辭古注始已為句舍故謂髙祖之父當遷庫門宮之外門百官及宗廟之次咸使知之二名不偏諱夫子之母名徴在言在不稱徴言徴不稱在夫子曰不在顓臾而在蕭牆之內此言在不稱徴又曰夏禮吾能言之杞不足徴此言徴不稱在方氏軍有憂則素服哭於庫門之外赴車不載櫜韔櫜音羔韔敕亮反憂謂軍敗庫門外門櫜甲衣韔弓衣車曰赴車若告喪也哭於庫門外以喪禮處之而志在外不忘敵也赴車不載櫜韔示兵不戢不忘報也有焚其先人之室則三日哭故曰新宫火亦三日哭新宫火魯成公三年新宫宣公之廟也孔子過泰山側有婦人哭於墓者而哀夫子式而聽之使子路問之曰子之哭也一似重有憂者而曰然昔者吾舅死於虎吾夫又死焉今吾子又死焉夫子曰何為不去也曰無苛政夫子曰小子識之苛政猛於虎也重直用反識申吉反而猶乃也夫之父曰舅泰山婦人寧遭虎之纍傷不忍捨政之無苛揚雄論酷吏曰虎哉虎哉角而翼者也與此同意方氏魯人有周豐也者哀公執摯請見之而曰不可公曰我其己夫使人問焉曰有虞氏未施信於民而民信之夏后氏未施敬於民而民敬之何施而得斯於民也對曰墟墓之間未施哀於民而民哀社稷宗廟之中未施敬於民而民敬殷人作誓而民始畔周人作㑹而民始疑茍無禮義忠信誠慤之心以涖之雖固結之民其不解乎夫音符解佳買反而曰不可者周豐辭哀公之摯見而不敢當也我其已夫者哀公疑其不可遽已於是又使人問焉也周豐舉墟墓宗廟起人哀敬者以明人心自然不待告詔故君之臨民當以忠信誠慤為本民心亦將自然而感也然禹嘗誓師誓非始於殷禹㑹塗山㑹非始於周周豐言此特舉世變之後徒為盟誓而信不由中者謂始於殷周之衰爾補喪不慮居毁不危身喪不慮居為無廟也毁不危身為無後也不慮居謂以廟為慮不以居室為慮不危身謂恐親之無後不敢以死傷生毁不滅性也用方氏補延陵季子適齊於其反也其長子死葬於贏博之間孔子曰延陵季子吳之習於禮者也往而觀其葬焉其坎深不至於泉其斂以時服既葬而封廣輪掩坎其髙可隱也既封左袒右還其封且號者三曰骨肉歸復於土命也若魂氣則無不之也無不之也而遂行孔子曰延陵季子之於禮也其合矣乎廣古曠反隱於創反延陵季子吳公子名札居延陵贏博齊地深古去聲讀謂掘土使深也不至泉言掘不甚深也時服古謂時行之制竊意用當時所著之服如夏用夏之服不更增以冬衣為斂也廣輪古注輪從也方氏謂廣言其擴猶户之東西輪言其從謂車以直行為順竊意古注廣作去聲是廣為度其廣狹之稱廣輪掩坎者言量度其廣濶僅及一車輪之地而掩其坎其封窆之地不濶大也隱古注據也蓋猶孟子隱几之隱謂髙四尺而手可據也左袒者吉事左袒季子達死生變吉以自寬適左袒訖乃右行圍繞其封三匝且號且言而遂行不少留也坎深不至於泉則不至於太深斂以時服則不至於太厚廣輪掩坎則不至於太大其髙可隱則不至於太髙左為陽故袒之以變吉右為隂故還焉以示凶骨肉為隂則降而聚故言復歸於土魂氣為陽則升而散故言無不之夫骨肉之復歸於土魂氣之無不之是人情之所哀者然季子號之止於三號訖遂行不少遼緩則臨喪之哀為不足矣禮為長子三年喪其服如此之重則哀戚不可不稱孔子曰喪事不敢不勉又曰喪不若禮不足而哀有餘也今謂其葬於禮為合所以譏其哀不足也曰其合矣乎又疑辭也亦未必於禮盡合也夫延陵之言蓋老莊之徒也合方氏王氏說邾婁考公之喪徐君使容居來弔含曰寡君使容居坐含進侯玉其使容居以含有司曰諸侯之來辱敝邑者易則易于則于易于雜者未之有也容居對曰容居聞之事君不敢忘其君亦不敢遺其祖昔我先君駒王西討濟於河無所不用斯言也容居魯人也不敢忘其祖婁力俱反含胡暗反易以䜴反邾婁邾國也考公者邾隱公益之曾孫考或為定徐君徐國僭王號者也容居徐君之臣也坐含者坐而親實含玉於亡人之口進侯玉者徐自比天子謂邾君為已之諸侯言進侯氏以玉也上句寡君使者徐君使來含下句其使者令邾國使已得將命而含也易謂臣禮易簡易也于謂君禮于舒大也韓文于于然而來駒王徐先君僣號濟渡也西討渡河魯魯鈍也自明不妄含不使賤者君行則親含大夫但致命以含玉授主人徐君僣王其臣容居欲親含邾考公故邾之有司拒之謂臣行臣禮君行君禮未聞雜之者容居執迷猶自守其先世僣王之說用鄭氏孔氏說補子思之母死於衛赴於子思子思哭於廟門人至曰庶氏之母死何為哭於孔氏之廟乎子思曰吾過矣吾過矣遂哭於他室子思之母嫁母也庶氏所嫁之家也嫁母與廟絶子思初哭於廟非也聞過而改哭於他室是也補天子崩三日祝先服五日官長服七日國中男女服三月天下服虞人致百祀之木可以為棺椁者斬之不至者廢其祀刎其人祝佐含斂力勞而先病故先服言祝則子可知此主人臣言之耳官長大夫士也國中男女王國之內庶人也天下諸侯之國也自三月而至七月不特恩有重輕服有先後亦以地有逺近則聞訃有早晚也虞主山澤故斬百祀之木以供棺椁之用必取祀木者神祀處多樹木常時所不斬天子崩則幽明之所共哀故斬取之也然亦姑言其制云爾天子棺椁未必待逺取諸百祀不至而廢其祀刎其人亦恐記者言之過木茍不至豈神之罪而廢其祀雖人之罪亦何至於死茍其行此民將不勝擾豈所謂死無害於人者耶補齊大饑黔敖為食於路以待餓者而食之有餓者䝉袂輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視之曰豫唯不食嗟來之食以至於斯也從而謝焉終不食而死曾子聞之曰微與其嗟也可去其謝也可食黔其亷反而食奉食音嗣奉芳勇反與音餘䝉袂以袂掩面不欲見人也輯屨輯斂其屨力憊不能屨也貿貿困病而目不明之貌嗟來食雖閔而呼之非敬辭微與者微猶無蓋止其狂狷之辭言無得如此也䝉袂則顔之厚輯屨則行之艱貿貿然來困餓濵死較一言之失至於自傷其生非中道也曾子所以嘆其微其折𠂻之以嗟可去謝可食也然嗟而不去不謝而食世之有愧於餓者多矣身雖一死操存千古使施小惠者不敢挾之以自矜傲竊幸茍生之人脅肩諂笑之輩聞其餘風心寒股栗豈不盛哉茍從曾子之言謝而復食其餘能幾合張氏黃氏補邾婁定公之時有弒其父者有司以告公瞿然失席曰是寡人之罪也曰寡人嘗學斷斯獄矣臣弒君凡在官者殺無赦子弒父凡在官者殺無赦殺其人壞其室汙其宫而豬焉蓋君踰月而後舉爵瞿紀具反壞音怪定公名貜且魯文十四年即位弒父下在官字孔氏作在宮凡在官者殺無赦謂官府亦坐豬猶瀦言汙其宮而瀦水春秋時唯邾無弒逆之事故定公聞其事而驚既自引咎教化之不至又極言大逆無道之罪宜盡除其迹也補晉獻文子成室晉大夫發焉張老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國族於斯文子曰武也得歌於斯哭於斯聚國族於斯是全要領以從先大夫於九京也北面再拜稽首君子謂之善頌善禱奐音換要一遙反京音原文子趙武也曰獻文子者恐趙武諡獻文也發謂以禮落成之也發與落皆有始意輪言廣大奐言煥爛九京九原也晉卿大夫墓在九原善頌謂張老之言善禱謂文子之言張老見文子宫室飾麗故佯美之使終始永足如此勿復更造文子亦覺而順述其言若得保此善終得從先大夫於地下幸矣乃拜以謝本孔氏說仲尼之畜狗死使子貢埋之曰吾聞之也敝帷不棄為埋馬也敝蓋不棄為埋狗也丘也貧無蓋於其封也亦豫之席毋使其首陷焉路馬死埋之以帷畜許六反封彼劒反敝帷蓋埋犬馬各隨其小大無蓋用席以義起補季孫之母死哀公弔焉曾子與子貢弔焉閽人謂君在弗內也曾子與子貢入於其廄而修容焉子貢先入閽人曰鄉者已告矣曾子後入閽人辟之涉內霤卿大夫皆辟位公降一等而揖之君子言之曰盡飾之道斯其行者逺矣內音納卿許亮反辟音避霤力又反修容更莊飾也始為閽人所拒及既修容不惟閽人下之避之卿大夫避位君亦降等而揖此明禮容之不可不飾補陽門之介夫死司城子罕入而哭之哀晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民說殆不可伐也孔子聞之曰善哉覘國乎詩云凡民有喪扶服救之雖微晉而已天下其孰能當之陽宋國門名介夫衣甲之衛士子罕戴公子樂甫術之後樂喜扶服猶匍匐手行也微猶非而已助語辭子罕宋之卿相介夫至賤子罕一哭之哀而民咸悅之晉國覘之不敢伐孔子謂雖非晉國之强天下亦孰能當之此明為國以得人心為本孔氏葉氏魯莊公之喪既葬而絰不入庫門士大夫既卒哭麻不入絰君之葛絰也不入庫門葬畢即除之也麻羣臣之麻絰也不入亦不入庫門也言魯君臣忘哀之速皆不行三年喪也方氏胡氏說孔子之故人曰原壤其母死夫子助之沐椁原壤登木曰久矣豫之不託於音也歌曰貍首之斑然執女手之卷然夫子為弗聞也者而過之從者曰子未可以已乎夫子曰丘聞之親者毋失其為親也故者毋失其為故也貍力知反女如字卷音權從才用反沐治也所以修潔之也木椁材也登木履椁木材之上也託寄也叩木以作音謂遭喪以來久不得託之音聲也貍首之斑然言木之美女手之卷然言功之巧為弗聞也而過之佯不知也原壤在喪而歌從者見其無禮止夫子母為治椁夫子若不聞以全故舊之恩孔氏葉氏趙文子與叔譽觀乎九原文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎文子曰行并植於晉國不沒其身其知不足稱也其舅犯乎文子曰見利不顧其君其仁不足稱也我則隨武子乎利其君不忘其身謀其身不遺其友晉人謂文子知人文子其中退然如不勝衣其言呐呐然如不出諸其口所舉於晉國管庫之士七十有餘家生不交利死不屬其子焉父音甫行下孟反并以正反植直吏反知音智呐如悅反屬音燭趙文子晉大夫趙武也叔譽即叔向晉羊舌大夫之孫名肹羊舌者邑名也陽處父晉襄公之太傅事見魯文公六年并猶専也植者剛直而自立者也不沒其身者陽處父剛而専已為狐射姑所殺不能以理終沒其身是知不足也舅犯者晉文公之舅名犯事見魯僖二十四年見利不顧其君者舅犯隨文公辟難至反國及河而詐請亡要君以利是仁不足也趙武子者士會也食邑於隨利其君不忘其身者襄二十七年左𫝊云夫子之家事治言於晉國無隱情無隱情利君也家事治不忘其身也謀其身不遺其友者文七年士㑹與先蔑俱迎公子雍於秦在秦三年不見先蔑及還亦不見懼其同罪而禍及故不見之也謂文子知人者見其所善於前知其所舉於後也管鍵也庫物所藏管庫之士守藏之吏也生不與之交利死不以其子為屬凡皆主其舉士而言薦賢為國非為交利非為子孫計也叔譽以陽處父與舅犯為可與歸文子謂處父不足於智舅犯不足於仁不若隨武子之愈武子既有利君之仁又有不忘身之智異於處父之智不足稱矣既有謀身之智又有不遺友之仁異於舅犯之仁不足稱矣文子身退然如不勝衣其言呐呐然如不出諸口而其所舉足以盡衆賢蓋管庫之士賤而難知七十有餘家衆而難辨文子所舉雖賤不遺雖衆不繆是亦合於智與仁宜其以武子為與歸也陳氏方氏叔仲皮學子栁叔仲皮死其妻魯人也衣衰而繆絰叔仲衍以告請繐衰而環絰曰昔者吾喪姑姊妹亦如斯末吾禁也退使其妻繐衰而環絰學户教反衣音咨繆音樛陸並如字叔仲皮魯叔孫氏之族叔仲其氏皮其名也學教也子栁叔仲皮之子也叔仲衍者叔仲皮之弟子栁之叔也其妻子栁之妻魯人魯鈍人也衣古讀為齊衣衰者齊衰也繆古讀如樛木之樛然方氏謂兩服相交調繆故名繆絰則當音綢繆之繆此服之重者也繐衰之布細環絰則一股回環而不相綢繆此服之輕者也子栁之妻魯鈍為其舅叔仲皮服重服是也子栁惑於叔仲衍之言反使其妻改輕服非也是子栁雖受教於其父曾不若愚婦人之所為也此鄭氏以來之舊說而諸家從之者也惟陸氏云據文子栁乃叔仲皮之師其妻乃皮之妻妻為其夫叔仲皮衣斬衰而繆絰而叔仲衍以告子栁請以其妻為兄繐衰而環絰且言其妻嘗為吾姊妹亦服繐衰小功之服然禮於夫之姑姊妹有服於夫之兄弟無服仲衍之請非也省室賈氏以陸說為長愚按若如陸說則學字不必改為斆衣字不必改為衰繆字不必改為樛集成人有其兄死而不為衰者聞子臯將為成宰遂為衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子臯為之衰成邑名孟氏食采之地子臯孔子弟子性至孝親喪泣血三年范蜂也蟬蜩也成邑人有不為兄服衰者聞子臯至孝將為邑宰始為其兄服衰故成之人譏之曰絲必盛之以匡蠶績絲作繭而無匡蟹背殼似匡是蟹反為之匡冠必飾之以緌蜂頭上有物似冠而無緌蟬喙長似緌是蟬反為之緌兄死宜為之衰而不為衰反因子臯而為之衰用鄭氏說樂正子春之母死五日而不食曰吾悔之自吾母而不得吾情吾惡乎用吾情惡音烏子春曾子弟子情真情言實也惡乎猶於何也禮親喪三日不食子春勉强至五日以非真情而悔之不欺也曾子水漿不入於口者七日而不悔者非勉强故也孔氏陸氏嵗旱穆公召縣子而問然曰天久不雨吾欲暴尪而奚若曰天則不雨而暴人之疾子虐母乃不可乎然則吾欲暴巫而奚若曰天則不雨而望之愚婦人於以求之毋乃已疏乎徙市則奚若曰天子崩巷市七日諸侯薨巷市三日為之徙市不亦可乎縣音懸暴步卜反雨去聲問然之然古注然焉也陸氏曰問其所以然尫者面仰天巫者主接神暴之於日覬天哀而雨之也巷市者哀而罷市有急須之物於里巷之內市之也求雨而暴巫尫皆虐而不可為惟徙市以致哀戚之意為可耳補孔子曰衛人之祔也離之魯人之祔也合之善夫祔謂合葬離之者有以間其椁合之者兩棺并置於椁善夫者善魯人也祔葬當合鄭氏孔氏黃氏日抄卷十五
