body:
  text: 黄氏日抄卷二十五宋黄震撰讀禮記十二中庸第三十一中庸按家語子思所作實得聖門之親傳非漢儒所集其他記禮比也然至唐李翺始為之説至本朝周濓溪始得其要至二程先生張横渠吕氏游氏楊氏侯氏謝氏尹氏始各推衍其義自是為集觧者凡三家㑹稽石􅗐初集濓溪以下十人之説晦菴先生因其集觧删成輯畧别為章句以緫其歸又為或問以明其所以去取之意已無餘藴矣吳郡衛湜再為集觧乃増入石氏元本及附入石氏元所不集與晦菴以後諸皆取之晦菴章句雖亦參錯其間意若反有未滿於晦菴者天台賈䝉乆為集觧雜列諸家晦菴章句之説又特間見一二而已晦菴以命世特出之才任萬世道統之託平生用力盡在四書四書歸宿萃於中庸其該貫精備何可當也而二家之所見如此哉至若中庸章句序道學淵源盡在此書尤不容不朝夕吟誦今自序及章句皆錄於篇所謂至當歸一精義無二所謂江漢以濯之秋陽以暴之皜皜乎其不可尚也近亦有尊崇晦菴章句者復晦菴餘説是為趙氏中庸章句纂䟽是為盧氏四書中庸集義亦不暇多録學者自當各以其本書參考若衛氏賈氏所集晦菴章句後晚出諸説間亦竊附一二以示義理無窮非敢偏主一説以示來者考焉中庸章句序中庸何為而作也子思子憂道學之失其傳而作也盖自上古聖神繼天立極而道統之傳有自來矣其見於經則允執厥中者堯之所以授舜也人心惟危道心惟㣲惟精惟一允執厥中者舜之所以授禹也堯之一言至矣盡矣而舜復益之以三言者則所以明夫堯之一言必如是而後可庶幾也盖嘗論之心之虚靈知覺一而已矣而以為有人心道心之異者則以其或生於形氣之私或原於性命之正而所以為知覺者不同是以或危殆而不安或㣲妙而難見耳然人莫不有是形故雖上智不能無人心亦莫不有是性故雖下愚不能無道心二者雜於方寸之間而不知所以治之則危者愈危㣲者愈㣲而天理之公卒無以勝夫人欲之私矣精則察夫二者之間而不雜也一則守其本心之正而不離也從事於斯無少間斷必使道心常為一身之主而人心每聽命焉則危者安㣲者著而動靜云為自無過不及之差矣夫堯舜禹天下之大聖也以天下相𫝊天下之大事也以天下之大聖行天下之大事而其授受之際丁寧告戒不過如此則天下之理豈有以加於此哉自是以來聖聖相承若成湯文武之為君臯陶伊傅周召之為臣既皆以此而接夫道統之𫝊若吾夫子則雖不得其位而所以繼往聖開來學其功反有賢於堯舜者然當是時見而知之者惟顔氏曾氏之𫝊得其宗及曾氏之再𫝊而復得夫子之孫子思則去聖逺而異端起矣子思懼夫愈乆而愈失其真也於是推本堯舜以來相𫝊之意質以平日所聞父師之言更互演繹作為此書以詔後之學者盖其憂之也深故其言之也切其慮之也逺故其説之也詳其曰天命率性則道心之謂也其曰擇善固執則精一之謂也其曰君子時中則執中之謂也世之相後千有餘年而其言之不異如合符節歴選前聖之書所以提挈綱維開示藴奥未有若是其明且盡者也自是而又再𫝊以得孟氏為能推明是書以承先聖之統及其没而遂失其𫝊焉則吾道之所寄不越乎言語文字之間而異端之説日新月盛以至於老佛之徒出則彌近理而大亂真矣然而尚幸此書之不冺故程夫子兄弟者出得有所考以續夫千載不傳之緒得有所據以斥夫二家似是之非盖子思之功於是為大而㣲程夫子則亦莫能因其語而得其心也惜乎其所以為説者不𫝊而凡石氏之所輯録僅出於其門人之所記是以大義雖明而㣲言未析至其門人所自為説則雖頗詳盡而多所發明然倍其師説而淫於老彿者亦有之矣熹自早歳即嘗受讀而竊疑之沈潜反復盖亦有年一旦恍然似有以得其要領者然後乃敢會衆説而折其中既為定著章句一篇以竢後之君子而一二同志復取石氏書刪其煩亂名以輯畧且記所嘗論辯取舎之意别為或問以附其後然後此書之㫖枝分節觧脉絡貫通詳略相因巨細畢舉而凡諸説之同異得失亦得以曲暢旁通而各極其趣雖於道統之𫝊不敢妄議然初學之士或有取焉則亦庶乎行逺升髙之一助云爾淳熈己酉春三月戊申新安朱熹序中庸中者不偏不倚無過不及之名庸平常也朱熹章句子程子曰不偏之謂中不易之謂庸中者天下之正道庸者天下之定理此篇乃孔門𫝊授心法子思恐其乆而差也故筆之於書以授孟子其書始言一理中散為萬事末復合為一理放之則彌六合卷之則退藏於宻其味無窮皆實學也善讀者玩索而有得焉則終身用之有不能盡者矣天命之謂性率性之謂道脩道之謂教命猶令也性即理也天以隂陽五行化生萬物氣以成形而理亦賦焉猶命令也於是人物之生因各得其所賦之理以為健順五常之徳所謂性也率循也道猶路也人物各循其性之自然則其日用事物之間莫不各有當行之路是則所謂道也脩品節之也性道雖同而氣禀或異故不能無過不及之差聖人因人物之所當行者而品節之以為法於天下則謂之教若禮樂刑政之屬是也盖人之所以為人道之所以為道聖人之所以為教原其所自無一不本於天而備於我學者知之則於其所學知所用力而自不能已矣故子思於此首發明之讀者宜深體而黙識也性即理也一語近世間有疑之者愚意訓義不得不有所託以明之耳天命本言賦予之自然然不得不假人為之命令為喻故曰命猶令也性本指人物之所禀賦然不得不推所賦之實理為説故曰性即理也陳氏曰理是汎言天地間公共之理性是言在我之理只此一理受於天而為我所有故謂之性此語足以觧或者之疑矣又據賈氏集觧載晦菴之説曰天命即天道也以其化育流行賦與萬物故謂之命萬物禀而受則謂之性盖無一理之不具而一毫人欲之私未有與焉語其大目則仁義禮智是也率循也循其性之自然而不雜乎人欲之私是之謂道若君臣父子夫婦兄弟朋友之倫與凡事物當然之理是也脩品節之也聖人脩道以教天下使之遏人欲存天理是所謂教禮樂刑政皆其具也此説比章句尤易見而纂䟽集義未之收因附此道也者不可須臾離也可離非道也是故君子戒慎乎其所不睹恐懼乎其所不聞離去聲道者日用事物當行之理皆性之徳而具於心無物不有無時不然所以不可須臾離也若其可離則為外物而非道矣是以君子之心常存敬畏雖不見不聞亦不敢忽所以存天理之本然而不使離於須臾之頃也莫見乎隠莫顯乎㣲故君子慎其獨也見音現隠暗處也㣲細事也獨者人所不知而已所獨知之地言幽暗之中細㣲之事跡雖未形而幾則已動人雖不知而己獨知之則是天下之事無有著見明顯而過於此者是以君子既常戒懼而於此尤加謹焉所以遏人欲於將萌而不使其滋長於隠㣲之中以至離道之逺也或問諸家之説皆以戒慎不睹恐懼不聞即為謹獨之意予乃分之曰既言道不可離則是無適而不在矣又言莫見乎隠莫顯乎㣲則是要切之處尤在於隠㣲也既言戒謹不睹恐懼不聞則是無處而不謹矣又言謹獨則是其謹者尤在於獨也又嘗答門人吕燾云是謹上更加謹喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之逹道也樂音洛中節之中去聲喜怒哀樂情也其未發則性也無所偏倚故謂之中發皆中節情之正也無所乖戾故謂之和大本者天命之性天下之理皆由此出道之體也逹道者循性之謂天下古今之所共由道之用也此言性情之徳以明道不可離之意致中和天地位焉萬物育焉致推而極之也位者安其所也育者遂其生也自戒懼而約之以至於至靜之中無少偏倚而其守不失則極其中而天地位矣自謹獨而精之以至於應物之處無少差謬而無適不然則極其和而萬物育矣盖天地萬物本吾一體吾之心正則天地之心亦正矣吾之氣順則天地之氣亦順矣故其效驗至於如此東萊吕氏云自其天地之位而以中言之自其萬物之育而以和言之朱氏如此區别固未見有害也深觀其所從來則天地之所以位萬物之所以育盖有不可析者子思曰致中和天地位焉萬物育焉龜山曰中故天地位焉和故萬物育焉參觀二者之論則氣象自可見右第一章子思述所𫝊之意以立言首明道之本原出於天而不可易其實體備於巳而不可離次言存飬省察之要終言聖神功化之極盖欲學者於此反求諸身而自得之以去夫外誘之私而充其本然之善楊氏所謂一篇之體要是也其下十章盖子思引夫子之言以終此章之義仲尼曰君子中庸小人反中庸中庸者不偏不倚無過不及而平常之理乃天命所當然精㣲之極致也惟君子為能體之小人反是君子之中庸也君子而時中小人之中庸也小人而無忌憚也王肅本作小人之反中庸也程子亦以為然今從之君子之所以為中庸者以其有君子之徳而又能隨時以處中也小人之所以反中庸者以其有小人之心而又無所忌憚也盖中無定體隨時而在是乃平常之理也君子知其在我故能戒謹不睹恐懼不聞而無時不中小人不知有此則肆欲妄行而無忌憚矣右第二章此下十章皆論中庸以釋首章之義文雖不屬而意則相承也變和言庸者游氏曰以性情言之則曰中和以徳行言之則曰中庸是也然中庸之中實兼中和之義子曰中庸其至矣乎民鮮能乆矣鮮上聲下同過則失中不及則未至故惟中庸之徳為至然亦人所同得初無難事但世教衰民不興行故鮮能之今已乆矣論語無能字右第三章子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也知者之知去聲道者天理之當然中而已矣知愚賢不肖之過不及則生禀之異而失其中也知者知之過既以道為不足行愚者不及知又不知所以行此道之所以常不行也賢者行之過既以道為不足知不肖者不及行又不求所以知此道之所以常不明也人莫不飲食也鮮能知味也道不離人人自不察是以有過不及之弊右第四章晏氏曰知愚之過不及宜曰道之不明賢不肖之過不及宜曰道之不行今乃反言何哉盖知者專於明道或怠於行道賢者専於行道或忽於明道陳氏曰人莫不飲食是日用不可闕處但人鮮能知其味譬如道乃我之所固有惟是人不自求知之所以行矣而不著習矣而不察子曰道其不行矣夫夫音扶由不明故不行右第五章此章承上章而舉其不行之端以起下章之意子曰舜其大知也與舜好問而好察邇言隠惡而揚善執其兩端用其中於民其斯以為舜乎知去聲與平聲好去聲舜之所以為大知者以其不自用而取諸人也邇言者淺近之言猶必察焉其無遺善可知然於其言之未善者則隠而不宣其善者則播而不匿其廣大光明又如此則人孰不樂告以善哉兩端謂衆論不同之極致盖凡物皆有兩端如小大厚薄之類於善之中又執其兩端而量度以取中然後用之則其擇之審而行之至矣然非在我之權度精切不差何以與此此知之所以無過不及而道之所以行也右第六章語録問取極厚極薄之二説而中摺之則此為中矣曰不然或極厚者説得是則用極厚之説極薄之説是則用極薄之説厚薄之中者説得是則用厚薄之中者之説至於輕重小大莫不皆然惟其説之是者用之不是棄兩頭不用而但取兩頭之中者用之也子曰人皆曰予知驅而納諸罟擭䧟阱之中而莫之知辟也人皆曰予知擇乎中庸而不能期月守也予知之知去聲罟音古擭胡化反阱才性反辟避同期居之反罟網也擭機檻也䧟阱坑坎也皆所以揜取禽獸者也擇乎中庸辨别衆理以求所謂中庸即上章好問用中之事也期月匝一月也言知禍而不知辟以况能擇而不能守皆不得為知也右第七章承上章大知而言又舉不明之端以起下章也罟擭䧟阱趙格菴謂此形容禍機之所伏子曰囬之為人也擇乎中庸得一善則拳拳服膺而弗失之矣囬孔子弟子顔淵名拳拳奉持之貌服猶著也膺胷也奉持而著之心胷之間言能守也顔子盖真知之故能擇能守如此此行之所以無過不及而道之所以明也右第八章子曰天下國家可均也爵禄可辭也白刃可蹈也中庸不可能也均平治也三者亦知仁勇之事天下之至難也然不必其合於中庸則質之近似者皆能以力為之若中庸則雖不必皆如三者之難然非義精仁熟而無一毫人欲之私者不能及也三者難而易中庸易而難此民之所以鮮能也右第九章亦承上章以起下章子路問强子路孔子弟子仲由也子路好勇故問强子曰南方之强與北方之强與抑而强與與平聲抑語辭而汝也寛柔以教不報無道南方之强也君子居之寛柔以教謂含容巽順以誨人之不及也不報無道謂横逆之來直受之而不報也南方風氣柔弱故以含忍之力勝人為强君子之道也衽金革死而不厭北方之强也而强者居之衽席也金戈兵之屬革甲胄之屬北方風氣剛勁故以果敢之力勝人為强强者之事也霅川倪氏曰衽衣衿也金鐡也革皮也以皮聨鐡為衣甲被之於身如衣衿然故曰衽故君子和而不流强哉矯中立而不倚强哉矯國有道不變塞焉强哉矯國無道至死不變强哉矯此四者汝之所當强也矯强貌詩曰矯矯虎臣是也倚偏著也塞未逹也國有道不變未逹之所守國無道不變平生之所守也此則所謂中庸之不可能者非有以自勝其人欲之私不能擇而守也君子之强孰大於是夫子以是告子路者所以抑其血氣之剛而進之以徳義之勇也右第十章或問謂强者力有以勝人之名也凡人和而無節則必至於流中立而無依則必至於倚國有道而富貴或不能不改其平素國無道而貧賤或不能乆處乎窮約非持守之力有以勝人者其孰能及之故此四者汝子路之所當强也南方之强不及强者也北方之强過乎强者也四者之强强之中也子路好勇故聖人之言所以長其善者而救其失者類如此語録曰國有道則有逹之理故不變其未逹之所守若國無道則有不幸而死之理故不變其平生之所守不變其未逹之守易不變其平生之守難又語録曰强哉矯贊歎之辭子曰素隠行怪後世有述焉吾弗為之矣素按漢書當作索盖字之誤也索隠行怪言深求隠僻之理而過為詭異之行也然以其足以欺世而盗名故後世或有稱述之者此知之過而不擇乎善行之過而不用其中不當强而强者也聖人豈為之哉君子遵道而行半塗而廢吾弗能已矣遵道而行則能擇乎善矣半塗而廢則力之不足也此其知雖足以及之而行有不逮當强而不强者也已止也聖人於此非勉焉而不敢廢盖至誠無息自有所不容止也君子依乎中庸遯世不見知而不悔惟聖者能之不為索隠行怪則依乎中庸而已不能半塗而廢是以遯世不見知而不悔也此中庸之成徳知之盡仁之至不頼勇而裕如者正吾夫子之事而猶不自居也故曰唯聖者能之而已右第十一章子思所引夫子之言以明首章之義者止此盖此篇大㫖以知仁勇三逹徳為入道之門故於篇首即以大舜顔淵子路之事明之舜知也顔淵仁也子路勇也三者廢其一則無以造道而成徳矣餘見第二十章愚按上三條一曰吾弗為之者致知之事二曰吾弗能已者力行之事夫子皆以自任三曰惟聖能之者大成獨立不返之事夫子不敢以自居而始終之皆為謙辭則一也或問索隠之説謂漢書藝文志劉歆論神仙家流引此而以素為索顔氏又釋之以為求索隠暗之事則二字之義既明與下文行怪二字語勢亦相類君子之道費而隠費符味反費用之廣也隠體之㣲也夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉天地之大也人猶有所憾故君子語大天下莫能載焉語小天下莫能破焉與去聲君子之道近自夫婦居室之間逺而至於聖人天地之所不能盡其大無外其小無内可謂費矣然其理之所以然則隠而莫之見也盖可知可能者道中之一事及其至而聖人不知不能則舉全體而言聖人固有所不能盡也侯氏曰聖人所不知如孔子問禮問官之類所不能如孔子不得位堯舜病博施之類愚謂人所憾於天地如覆載生成之偏及寒暑災祥之不得其正者詩云鳶飛戾天魚躍于淵言其上下察也鳶余専反詩大雅旱麓之篇鳶䲭類戾至也察著也子思引此詩以明化育流行上下昭著莫非此理之用所謂費也然其所以然者則非見聞所及所謂隠也君子之道造端乎夫婦及其至也察乎天地結上文右第十二章子思之言盖以申明首章道不可離之意也其下八章雜引孔子之言以明之或問十二章之説曰道之用廣而其體則㣲宻而不可見所謂費而隠也即其近而言之男女居室人道之常雖愚不肖亦能知而行之極其逺而言之則天下之大事物之多聖人亦容有不盡知盡能者也然非獨聖人有所不知不能也天能生覆而不能形載地能形載而不能生覆至於氣化流行則隂陽寒暑吉凶災祥不能盡得其正者尤多此所以雖以天地之大而人猶有憾也夫自夫婦之愚不肖所能知能行至於聖人天地之所不能盡道盖無所不在也故君子之語道也其大至於天地聖人之所不能盡而道無不包則天下莫能載矣其小至於愚夫愚婦之所能知能行而道無不體則天下莫能破矣道之在天下其用之廣如此可謂費矣而其所用之體則不離乎此而有非視聼之所及者此所以為費而隠也子思之言至此極矣猶以為不足以盡其意也故又引詩以明之曰鳶飛戾天魚躍于淵所以言道之體用上下昭著而無所不在也造端乎夫婦極其近小而言也察乎天地極其逺大而言也愚意造端乎夫婦即指夫婦之愚不肖能知能行者而言非指閨門正始而言察乎天地即指造化流行上下各適其適顯然可見者而言非指髙逺深妙者而言語録云天下莫能破謂如物有至小而可破作兩者是其中猶著得一物在若其小無内則是至小更不容破了愚按莫大於華岳而地能載之今云語大天下莫能載則所語之大者大包天地矣莫小於芥子而針能破之今云語小莫能破則所語之小者細入無倫矣子曰道不逺人人之為道而逺人不可以為道道者率性而已固衆人之所能知能行者也故常不逺於人若為道者厭其卑近以為不足為而反務為髙逺難行之事則非所以為道矣詩云伐柯伐柯其則不逺執柯以伐柯睨而視之猶以為逺故君子以人治人改而止睨研計反詩豳風伐柯之篇柯斧柄則法也睨邪視也言人執柯伐木以為柯者彼柯長短之法在此柯耳然猶有彼此之别故伐者視之猶以為逺也若以人治人則所以為人之道各在當人之身初無彼此之别故君子之治人也即以其人之道還治其人之身其人能改即止不治盖責之以其所能知能行非欲其逺人以為道也張子所謂以衆人望人則易從是也忠恕違道不逺施諸己而不願亦勿施於人盡己之心為忠推己及人為恕違去也如春秋𫝊齊師違榖七里之違言自此至彼相去不逺非背而去之之謂也道即其不逺人者是也施諸己而不願亦勿施於人忠恕之事也以己之心度人之心未嘗不同則道之不逺於人者可見故己之所不欲則勿以施之於人亦不逺人以為道之事張子所謂以愛己之心愛人則盡仁是也君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也庸徳之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言君子胡不慥慥爾子臣弟友四字絶句求猶責也道不逺人凡己之所以責人者皆道之所當然也故反之以自責而自修焉庸平常也行者踐其實謹者擇其可徳不足而勉則行益力言有餘而訒則謹益至謹之至則言顧行矣行之力則行顧言矣慥慥篤實貌言君子之言行如此豈不慥慥乎贊美之也凡此皆不逺人以為道之事張子所謂以責人之心責己則盡道是也右第十三章道不逺人者夫婦所能丘未能一者聖人所不能皆費也而其所以然者則至隠存焉下章放此愚按丘未能一者皆事父從兄之事特聖人之謙詞君子素其位而行不願乎其外素猶見在也言君子但因見在所居之位而為其所當為無慕乎其外之心也素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難君子無入而不自得焉難去聲此言素其位而行也在上位不陵下在下位不援上正己而不求於人則無怨上不怨天下不尤人援平聲此言不願乎其外也故君子居易以俟命小人行險以徼幸易去聲易平地也居易素位而行也俟命不願乎外也徼求也幸謂所不當得而得者子曰射有似乎君子失諸正鵠反求諸其身正音征鵠工毒反畫布曰正棲皮曰鵠皆侯之中射之的也子思引此孔子之言以結上文之意右第十四章子思之言也凡章首無子曰者放此君子之道辟如行逺必自邇辟如登髙必自卑辟譬同詩曰妻子好合如鼓瑟琴兄弟既翕和樂且耽宜爾室家樂爾妻帑好去聲耽詩作湛亦音耽樂音洛詩小雅棠棣之篇鼓瑟琴和也翕亦合也耽亦樂也帑子孫也子曰父母其順矣乎夫子誦此詩而贊之曰人能和於妻子宜於兄弟如此則父母其安樂之矣子思引詩及此語以明行逺自邇登髙自卑之意右第十五章或問十五章之説曰章首二句承上章而言道雖無所不在而其進之則有序也其下引詩與夫子之言乃指一事以明之非以二句之義為止於此也子曰鬼神之為徳其盛矣乎程子曰鬼神天地之功用而造化之迹也張子曰鬼神者二氣之良能也愚謂以二氣言則鬼者隂之靈也神者陽之靈也以一氣言則至而伸者為神反而歸者為鬼其實一物而已為徳猶言性情功效視之而弗見聼之而弗聞體物而不可遺鬼神無形與聲然物之終始莫非隂陽合散之所為是其為物之體而物所不能遺也其言體物猶易所謂幹事使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右齊側皆反齊之為言齊也所以齊不齊而致其齊也明猶潔也洋洋流動充滿之意能使人畏敬奉承而發見昭著如此乃其體物而不可遺之騐也孔子曰其氣發揚於上為昭明焄蒿悽愴此百物之精也神之著也正謂此爾詩曰神之格思不可度思矧可射思度待洛反射音亦詩作斁詩大雅抑之篇格來也矧况也射厭也言厭怠而不敬也思語辭夫㣲之顯誠之不可揜如此夫夫音扶誠者真實無妄之謂隂陽合散無非實者故其發見之不可揜如此右第十六章不見不聞隠也體物如在則亦費矣此前三章以其費之小者而言此後三章以其費之大者而言此一章兼費隠包小大而言或問鬼神之説曰鬼神之義孔子所以告宰予者見於祭義之篇其説已詳而鄭氏釋之亦已明矣其以口鼻之嘘吸者為魂耳目之精明者為魄盖指血氣之類以明之程子張子更以隂陽造化為説則其意又廣而天地萬物之屈伸徃來皆在其中矣盖陽魂為神隂魄為鬼是以其在人也隂陽合則魄凝魂聚而有生隂陽判則魂升為神魄降為鬼易大傳所謂精氣為物遊魂為變故知鬼神之情狀者正以明此而書所謂徂落者亦以其升降為言耳若又以其往來者言之則來者方伸而為神往者既屈而為鬼盖二氣之分實一氣之運故陽主伸隂主屈而錯綜以言亦各得其義焉學者熟玩而精祭之語録問性情莫便是二氣之良能否功用莫便是天地之功用否曰鬼神視之而不見聼之而不聞須是於良能功用上認取其徳又門人黄氏曰性情功用只是造化之迹日月自有日月之性情功效風雷自有風雷之性情功效右言鬼神之為徳文集曰天地之升降日月之盈縮萬物之消息變化無一非鬼神之所為者是以鬼神雖無形聲而徧體乎萬物之中物莫能遺語録曰體物是與物為體猶幹事是與物為幹右言體物蔡氏曰凡物之體無非鬼神體之故曰體物而不可遺此體字虚非若形體之體盖體其體之謂也右亦言體物與晦菴㣲不同當考陳氏曰齊是齊其念慮之不同明是明潔其心洋洋是此理昭然流動充滿於上下左右間此是鬼神隂陽之發見昭著處盖體物而不遺之驗也右言齊明承祀海陵胡氏曰鬼神以形言之則天地以氣言之則隂陽以主宰言之則鬼神鬼神無形故視之弗見無聲故聼之弗聞無體故物為體視其所以生所以成莫非鬼神之功故天下之人不可遺忘以神無聲無形故其來也不可億度人當敬事之不暇况可厭射之乎右言鬼神之徳至神之格思文集曰鬼神只是氣之屈伸其徳則天命之實理所謂誠也陳氏曰此理雖隠㣲而甚顯以隂陽之往來屈伸皆是真實而無妄所以發見之不可揜如此右言㣲之顯誠之不可揜子曰舜其大孝也與徳為聖人尊為天子富有四海之内宗廟饗之子孫保之子孫謂虞思陳胡公之屬故大徳必得其位必得其禄必得其名必得其壽舜年百有十歳故天之生物必因其材而篤焉故栽者培之傾者覆之材質也篤厚也栽植也氣至而滋息為培氣反而遊散則覆詩曰嘉樂君子憲憲令徳宜民宜人受禄于天保佑命之自天申之詩大雅假樂之篇假當依此作嘉憲當依詩作顯申重也故大徳者必受命受命者受天命為天子也右第十七章此由庸行之常推之以極其至見道之用廣也而其所以然者則為體㣲矣後二章亦此意子曰無憂者其惟文王乎以王季為父以武王為子父作之子述之此言文王之事書言王季其勤王家盖其所作亦積功累仁之事也武王纉大王王季文王之緒壹戎衣而有天下身不失天下之顯名尊為天子富有四海之内宗廟饗之子孫保之大音泰下同此言武王之事纉繼也大王王季之父也書云大王肇基王迹詩云至于大王實始翦商緒業也戎衣甲胄之屬壹戎衣武成文言一著戎衣以伐紂也愚意謂不待再也武王末受命周公成文武之徳追王大王王季上祀先公以天子之禮斯禮也逹乎諸侯大夫及士庶人父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫期之喪逹乎大夫三年之喪逹乎天子父母之喪無貴賤一也追王之王去聲此言周公之事末猶老也追王盖推文武之意以及乎王迹之所起也先公組紺以上至后稷也上祀先公以天子之禮又推大王王季之意以及於無窮也制為禮法以及天下使葬用死者之爵祭用生者之禄喪服自期以下諸侯絶大夫降而父母之喪上下同之推己以及人也愚意末受命謂末年方受天命故事不及竟而有待於周公以成之也組紺者太王之父右第十八章子曰武王周公其逹孝矣乎逹通也承上章而言武王周公之孝乃天下之人通謂之孝猶孟子之言逹尊也夫孝者善繼人之志善述人之事者也上章言武王纉大王王季文王之緒以有天下而周公成文武之徳以追崇其先祖此繼志述事之大者也下文又以其所制祭祀之禮通於上下者言之春秋脩其祖廟陳其宗器設其裳衣薦其時食祖廟天子七諸侯五大夫三適士二官師一宗器先世所藏之重器若周之赤刀大訓天球河圖之屬也裳衣先祖之遺衣服祭則設之以授尸也時食四時之食各有其物如春行羔豚膳膏香之類是也宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也旅酬下為上所以逮賤也燕毛所以序齒也昭如字為去聲宗廟之次左為昭右為穆而子孫亦以為序有事於天廟則子姓兄弟羣昭羣穆咸在而不失其倫焉爵公侯卿大夫也事宗祝有司之職事也旅衆也酬導飲也旅酬之禮賔弟子兄弟之子各舉觶於其長而衆相酬盖宗廟之中以有事為榮故逮及賤者使亦得以申其敬也燕毛祭畢而燕則以毛髪之色别長㓜為坐次也齒年數也踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也踐猶履也其指先王也所尊所親先王之祖考子孫臣庶也始死謂之死既葬則曰反而亡焉皆指先王也此結上文兩節皆繼志述事之意也郊社之禮所以事上帝也宗廟之禮所以祀乎其先也明乎郊社之禮禘嘗之義治國其如示諸掌乎郊祭天社祭地不言后土者省文也禘天子宗廟之大祭追祭太祖之所自出於太廟而以太祖配之也嘗秋祭也四時皆祭舉其一耳禮必有義對舉之互文也示與視同視諸掌言易見也此與論語文意大同小異記有詳畧耳愚意以示為指示之示亦通論語指其掌亦示之義右第十九章或問謂太祖東向羣廟左者南向取其向明故謂之昭右者北向取其深逺故謂之穆趙氏注左昭右穆者死者之昭穆也羣昭羣穆者生者之昭穆也序昭穆序生者之昭穆右序昭穆鄭氏曰事謂薦羞辨賢謂以其事别所能也右辨賢語録曰主人酌以獻賔賔報主人曰酢主又自飲而復飲賔曰酬其主人又自飲者是導賔使飲也賔受之不飲奠於席前至旅時亦不舉又自别舉爵又曰旅酬者以其家臣或鄉吏之屬大夫則有鄉吏一人先舉觶獻賔賔飲畢即以觶授於執事者執事者則以獻於其長逓逓相承獻及於沃盥者而止焉沃盥謂執沃盥之事至賤者也孔氏曰旅酬之時使卑者二人各舉觶於其長者卑下者先飲晦菴語類曰導飲者為上先飲也右下為上哀公問政哀公魯君名蔣子曰文武之政布在方策其人存則其政舉其人亡則其政息方版也策簡也息猶滅也有是君有是臣則有是政矣人道敏政地道敏樹夫政也者蒲盧也夫音扶敏速也蒲盧沈括以為蒲葦是也以人立政猶以地種樹其成速矣而蒲葦又易生之物其成尤速也言人存政舉其易如此故為政在人取人以身修身以道修道以仁此承上文人道敏政而言也為政在人家語作為政在於得人語意尤備人謂賢臣身指君身道者天下之逹道仁者天地生物之心而人得以生者所謂元者善之長也言人君為政在於得人而取人之則又在修身能仁其身則有君有臣而政無不舉矣仁者人也親親為大義者宜也尊賢為大親親之殺尊賢之等禮所生也殺去聲人指人身而言具此生理自然便有惻怛慈愛之意深體味之可見宜者分别事理各有所宜也禮則節文斯二者而已在下位不獲乎上民不可得而治矣鄭氏曰此句在下誤重在此故君子不可以不修身思修身不可以不事親思事親不可以不知人思知人不可以不知天為政在人取人以身故不可以不修身修身以道修道以仁故思修身不可以不事親欲盡親親之仁必由尊賢之義故又當知人親親之殺尊賢之等皆天理也故又當知天愚意欲知人之賢否湏明乎天理之精㣲天下之逹道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之逹道也知仁勇三者天下之逹徳也所以行之者一也知去聲逹道者天下古今所共由之路即書所謂五典孟子所謂父子有親君臣有義夫婦有别長㓜有序朋友有信是也知所以知此也仁所以體此也勇所以强此也謂之逹徳者天下古今所同得之理也一則誠而已矣逹道雖人所共由然無是三徳則無以行之逹徳雖人所同得然一有不誠則人欲間之而徳非其徳矣程子曰所謂誠者止是誠實此三者三者之外更别無誠或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉强而行之及其成功一也强上聲知者之所知行者之所行謂逹道也以其分而言則所以知者知也所以行者仁也所以至於知之成功而一者勇也以其等而言則生知安行者知也學知利行者仁也困知勉行者勇也盖人性雖無不善而氣禀有不同者故聞道有蚤莫行道有難易然能自强不息則其至一也吕氏曰所入之塗雖異而所至之域則同此所以為中庸若乃企生知安行之資為不可幾及輕困知勉行謂不能有成此道之所以不明不行也子曰好學近乎知力行近乎仁知恥近乎勇好近乎知之知並去聲子曰二字衍文此言未及乎逹徳而求以入徳之事通上文三知為知三行為仁則此三近者勇之次也吕氏曰愚者自是而不求自私者徇人欲而忘反懦者甘為人下而不辭故好學非知然足以破愚力行非仁然足以忘私知恥非勇然足以起懦知斯三者則知所以修身知所以修身則知所以治人知所以治人則知所以治天下國家矣斯三者指三近而言人者對己之稱天下國家則盡乎人矣言此以結上文修身之意起下文九經之端也凡為天下國家有九經曰修身也尊賢也親親也敬大臣也體羣臣也子庶民也來百工也柔逺人也懐諸侯也經常也體謂設以身處其地而察其心也子如父母之愛其子也柔逺人所謂無忘賔旅者也此列九經之目也吕氏曰天下國家之本在身故修身為九經之本然必親師友然後修身之道進故尊賢次之道之所進莫先於家故親親次之由家以及朝廷故敬大臣體羣臣次之由朝廷以及其國故子庶民來百工次之由其國以及天下故柔逺人懐諸侯次之此九經之序也視羣臣猶吾四體視百姓猶吾子此視臣視民之别也修身則道立尊賢則不惑親親則諸父昆弟不怨敬大臣則不眩體羣臣則士之報禮重子庶民則百姓勸來百工則財用足柔逺人則四方歸之懐諸侯則天下畏之此言九經之效也道立謂道成於己而可為民表所謂建其有極是也不惑謂不疑於理不眩謂不迷於事敬大臣則信任專而小臣不得以間之故臨事而不眩也來百工則通工易事農末相資故財用足柔逺人則天下之旅皆悦而願出於其塗故四方歸懐諸侯則徳之所施者博而威之所制者廣矣故曰天下畏之齊明盛服非禮不動所以修身也去讒逺色賤貨而貴徳所以勸賢也尊其位重其禄同其好惡所以勸親親也官盛任使所以勸大臣也忠信重禄所以勸士也時使薄歛所以勸百姓也日省月試既禀稱事所以勸百工也送徃迎來嘉善而矜不能所以柔逺人也繼絶世舉廢國治亂持危朝聘以時厚徃而薄來所以懐諸侯也齊側皆反去上聲逺好惡歛並去聲既許氣反禀彼錦力錦二反稱去聲朝音潮此言九經之事也官盛任使謂官屬衆盛足任使令也盖大臣不當親細事故所以優之者如此忠信重禄謂待之誠而飬之厚盖以身體之而知其所頼乎上者如此也既讀曰餼餼禀稍食也稱事如周禮稾人職曰考其弓弩以上下其食是也徃則為之授節以送之來則豈其委積以迎之朝謂諸侯見於天子聘謂諸侯使大夫來獻王制比年一小聘三年一大聘五年一朝厚徃薄來謂燕賜厚而納貢薄凡為天下國家有九經所以行之者一也一者誠也一有不誠則九者皆為虚文矣此九經之實也凡事豫則立不豫則廢言前定則不跲事前定則不困行前定則不疚道前定則不窮跲其刼反行去聲凡事指逹道逹徳九經之屬豫素定也跲躓也疚病也此承上文言凡事皆欲先立乎誠如下文所推是也在下位不獲乎上民不可得而治矣獲乎上有道不信乎朋友不獲乎上矣信乎朋友有道不順乎親不信乎朋友矣順乎親有道反諸身不誠不順乎親矣誠身有道不明乎善不誠乎身矣此又以在下位者推言素定之意反諸身不誠謂反求諸身而所存所發未能真實而無妄也不明乎善謂未能察於人心天命之本然而真知至善之所在也誠者天之道也誠之者人之道也誠者不勉而中不思而得從容中道聖人也誠之者擇善而固執之者也中並去聲從七容反此承上文誠身而言誠者真實無妄之謂天理之本然也誠之者未能真實無妄而欲其真實無妄之謂人事之當然也聖人之徳渾然天理真實無妄不待思勉而從容中道則亦天之道也未至於聖則不能無人欲之私而其為徳不能皆實故未能不思而得則必擇善然後可以明善未能不勉而中則必固執然後可以誠身此則所謂人之道也不思而得生知也不勉而中安行也擇善學知以下之事固執利行以下之事也博學之審問之慎思之明辨之篤行之此誠之之目也學問思辨所以擇善而為知學而知也篤行所以固執而為仁利而行也程子曰五者廢其一非學也有弗學學之弗能弗措也有弗問問之弗知弗措也有弗思思之弗得弗措也有弗辨辨之弗明弗措也有弗行行之弗篤弗措也人一能之已百之人十能之已千之君子之學不為則已為則必要其成故常百倍其功此困而知勉而行者也勇之事也果能此道矣雖愚必明雖柔必强明者擇善之功强者固執之效吕氏曰君子所以學者為能變化氣質而已徳勝氣質則愚者可進於明柔者可進於强不能勝者則雖有志於學亦愚不能明柔不能立而已矣盖均善而無惡者性也人所同也昬明强弱之禀不齊者才也人所異也誠之者所以反其同而變其異也夫以不美之質求變而美非百倍其功不足以致之今以鹵莾滅裂之學或作或輟以變其不美之質及不能變則曰天資不美非學所能變是果於自棄其為不仁甚矣右第二十章此引孔子之言以繼大舜文武周公之緒明其所𫝊之一致舉而措之亦猶是耳盖包費隠兼小大以終十二章之意章内語誠始詳而所謂誠者實此篇之樞紐也又按孔子家語亦載此章而其文尤詳成功一也之下有公曰子之言美矣至矣寡人實固不足以成之也故其下復以子曰起答辭今無此問詞而猶有子曰二字盖子思刪其繁文以附於篇而所刪有不盡者今當為衍文也博學之以下家語無之意彼有闕文抑此或子思所補也歟自誠明謂之性自明誠謂之教誠則明矣明則誠矣自由也徳無不實而明無不照者聖人之徳所性而有者也天道也先明乎善而後能實其善者賢人之學由教而入者也人道也誠則無不明矣明則可以至於誠矣右第二十一章子思承上章夫子天道人道之意而立言也自此以下十二章皆子思之言以反覆推明此章之意惟天下至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育可以贊天地之化育則可以與天地參矣天下至誠謂聖人之徳之實天下莫能加也盡其性者徳無不實故無人欲之私而天命之在我者察之由之巨細精粗無毫髮之不盡也人物之性亦我之性但以所賦形氣不同而有異耳能盡之者謂知之無不明而處之無不當也贊猶助也與天地參謂與天地並立為三也此自誠而明者之事也右第二十二章言天道也其次致曲曲能有誠誠則形形則著著則明明則動動則變變則化唯天下至誠為能化其次通大賢以下凡誠有未至者而言也致推致也曲一偏也形者積中而發外著則又加顯矣明則又有光輝發越之盛也動者誠能動物變者物從而變化則有不知其所以然者盖人之性無不同而氣則有異故惟聖人能舉其性之全體而盡之其次則必自其善端發見之偏而悉推致之以各造其極也曲無不致則徳無不實而形著動變之功自不能已積而至於能化則其至誠之妙亦不異於聖人矣右第二十三章言人道也温陵陳氏曰曲如揚雄謂塗雖曲而通諸夏川雖曲而通諸海委蛇致曲而入乎道也髙安譚氏曰致其委曲非直造徑造之謂也永康陳氏曰一室皆闇必有容明之所從其容明之所而闢之此致曲之法也建安真氏曰曲猶曲禮之曲纎悉委曲而用其功即博學審問慎思明辨篤行之意顔子之四勿曾子之三省皆致曲之事也至誠之道可以前知國家將興必有禎祥國家將亡必有妖孽見乎蓍龜動乎四體禍福將至善必先知之不善必先知之故至誠如神見音現禎祥者福之兆妖孽者禍之萌蓍所以筮龜所以卜四體謂動作威儀之間如執玉髙卑其容俯仰之類凡此皆理之先見者也然惟誠之至極而無一毫私偽留於心目之間者乃能有以察其幾焉右第二十四章言天道也誠者自成也而道自道也道也之道音導言誠者物之所以自成而道者人之所當自行也誠以心言本也道以理言用也誠者物之終始不誠無物是故君子誠之為貴天下之物皆實理之所為故必得是理然後有是物所得之理既盡則是物亦盡而無有矣故人之心一有不實則雖有所為亦如無有而君子必以誠為貴也盖人之心能無不實乃為有以自成而道在我者亦無不行矣誠者非自成已而已也所以成物也成己仁也成物知也性之徳也合外内之道也故時措之宜也知去聲誠雖所以成已然既有以自成則自然及物而道亦行於彼矣仁者體之存知者用之發是皆吾性之固有而無内外之殊既得於己則見於事者以時措之而皆得其宜也右第二十五章言人道也或問二十五章之説曰自成自道如程子説乃與下文相應按程子曰誠者自成如至誠事親則成人子至誠事君則成人臣游揚皆以無待而然論之其説雖髙然於此為無所當且又老莊之遺意也愚按上文言誠者自成也下文即言非自成己而已也是自成即指成己而言安得以為無所待而自成耶誠者物之終始不誠無物者以理言之則天地之理至實而無一息之妄故自古至今無一物之不實而一物之中自始至終皆實理之所為也以心言之則聖人之心亦至實而無一息之妄故從生至死無一事之不實而一事之中自始至終皆實心之所為也此所謂誠者物之終始者然也茍未至於聖人而其本心之實者猶未免於間斷則自其實有此心之初以至未有間斷之前所為無不實者及其間斷則自其間斷之後以至未相接續之前凡所云為皆無實之可言雖有其事亦無以異於無有矣愚按雖有其事亦無以異於無有此説於不誠無物極為明切盖物即事也故饗祀而誠則有祖先心一不誠豈能如聞太息之聲矣如誦讀而誠則見義理心一不誠豈能復知詩書之味矣心在此則事在此心在此者誠也事在此者即其心也祭如在執事敬皆誠者物之所以終始也否而心不在焉雖視而不見聼而不聞飲食而不知其味是皆不誠故無物也故至誠無息既無虚假自無間斷不息則久久則徵久常於中也徴驗於外也徴則悠逺悠逺則博厚博厚則髙明此皆以其驗於外者言之鄭氏所謂至誠之徳著於四方者是也存諸中者既久則驗於外者益悠逺而無窮矣悠逺故其積也廣博而深厚博厚故其發也髙大而光明博厚所以載物也髙明所以覆物也悠久所以成物也悠久即悠逺兼内外而言之也本以悠逺致髙厚而髙厚又悠久也此言聖人與天地同用潘氏日久是久於内悠是久於外故云兼内外博厚配地髙明配天悠久無疆此言聖人與天地同體如此者不見而章不動而變無為而成見音現見猶示也不見而章以配地而言也不動而變以配天而言也無為而成以無疆而言也天地之道可一言而盡也其為物不貳則其生物不測此以下復以天地明至誠之功用天地之道可一言而盡不過曰誠而已不貳所以誠也誠故不息而生物之多有莫知其所以然者天地之道博也厚也髙也明也悠也久也言天地之道誠一不貳故能各極其盛而有下文生物之功今夫天斯昭昭之多及其無窮也日月星辰繋焉萬物覆焉今夫地一撮土之多及其廣厚載華嶽而不重振河海而不洩萬物載焉今夫山一卷石之多及其廣大草木生之禽獸居之寳藏興焉今夫水一勺之多及其不測黿鼉蛟龍魚鼈生焉貨財殖焉夫音扶華藏並去聲卷平聲勺市若反昭昭猶耿耿小明也此指其一處而言之及其無窮猶十二章及其至也之意盖舉全體而言也振收也卷區也此四條皆以發明由其不貳不息以致盛大而能生物之意然天地山川實非由積累而後大讀者不以辭害意可也愚按卷古注平聲訓區范作去聲亦訓區然未明言區果何義禮韻平聲去聲皆訓曲如有卷者阿之卷言卷曲也當參考意者區乃小石成塊之稱如土之言撮歟詩云維天之命於穆不已盖曰天之所以為天也於乎不顯文王之徳之純盖曰文王之所以為文也純亦不已於音烏乎音呼詩周頌維天之命篇於歎辭穆深逺也不顯猶言豈不顯也純純一不雜也引此以明至誠無息之意程子曰天道不已文王純於天道亦不已純則無二無雜不已則無間斷先後右第二十六章言天道也語録曰管中所見之天也是天恁地大底只是天愚意昭昭撮土卷石一勺皆舉其一端而言猶於人而舉其一息一事為言也及其猶言至於也所謂昭昭者即於無窮中指其昭昭所謂撮土者即於廣厚中指其撮土卷石一勺類此山惟不止於卷石之多水惟不止於一勺之多故能廣大無窮而覆載生育聖人自一息之實至無一息之不實自一事之實至無一事之不實緝熈廣大至與天地相似此文王之純亦猶天之不已也經旨本無積小至大之意讀者或以及其之語為疑故晦菴辯之如此大哉聖人之道包下文兩節而言洋洋乎發育萬物峻極于天峻髙大也此言道之極於至大而無外也優優大哉禮儀三百威儀三千優優充足有餘之意禮儀經禮也威儀曲禮也此言道之入於至小而無間也趙氏䟽禮儀謂冠昏喪祭朝覲㑹同之類威儀謂進退升降俯仰揖遜之類待其人而後行緫結上兩節故曰茍不至徳至道不凝焉至徳謂其人至道指上兩節而言也凝聚也成也故君子尊徳性而道問學致廣大而盡精㣲極髙明而道中庸温故而知新敦厚以崇禮尊者㳟敬奉持之意徳性者吾所受於天之正理道由也温猶燖温之温謂故學之矣而復時習之也趙氏纂䟽云燖者宿火熟物也敦加厚也尊徳性所以存心而極乎道體之大也道問學所以致知而盡乎道體之細也二者修徳凝道之大端也不以一毫私意自蔽不以一豪私欲自累涵泳乎其所已知敦篤乎其所已能此皆存心之屬也析理則不使有毫釐之差處事則不使有過不及之謬理義則日知其所未知節文則日謹其所未謹此皆致知之屬也盖非存心無以致知而存心者又不可以不致知故此五句大小相資首尾相應聖賢所示人入徳之方莫詳於此學者宜盡心焉是故居上不驕為下不倍國有道其言足以興國無道其黙足以容詩曰既明且哲以保其身其此之謂與倍與背同與平聲興謂興起在位也詩大雅烝民之篇愚按孔氏云興謂足以興起其國愚意興謂言之興行亦通然章句謂興起在位盖以身之顯晦為言興者顯也容者晦也與引詩保身相叶也吕氏曰眀哲之人知行知藏所以卒保其身東萊詩記日明者哲之發哲者明之實晦菴詩𫝊曰保身盖順理以守身非趨利避害偷生全軀之謂也右第二十七章言人道也或問二十七章之説曰此章承章首道體大小而言一句之内皆具大小二意如徳性也廣大也髙明也故也厚也道之大也問學也精㣲也中庸也新也禮也道之小也尊之道之致之盡之極之道之温之知之敦之崇之所以修是徳而凝是道也以其於道之大小無所不體故居上居下在治在亂無所不宜此又一章之通旨也子曰愚而好自用賤而好自專生乎今之世反古之道如此者烖及其身者也好去聲烖古災字以上孔子之言子思引之反復也非天子不議禮不制度不考文此以下子思之言禮親踈貴賤相接之體也度品制文書名愚意制者制作之制度者法度之度制度者言制為之度也與制度二字並言者不同今天下車同軌書同文行同倫行去聲今子思自謂當時也軌轍迹之度倫次序之體三者皆同言天下一統也雖有其位茍無其徳不敢作禮樂焉雖有其徳茍無其位亦不敢作禮樂焉鄭氏曰言作禮樂者必聖人在天子之位子曰吾説夏禮杞不足徴也吾學殷禮有宋存焉吾學周禮今用之吾從周此又引孔子之言杞夏之後徴證也宋殷之後三代之禮孔子皆嘗學之而能言其意但夏禮既不可考證殷禮雖存又非當世之法惟周禮乃時王之制今日所用孔子既不得位則從周而已右第二十八章承上章為下不倍而言亦人道也或問載周人尚輿輿廣六尺六寸故其轍迹之在地者相距之間廣狹如一凡為車者必合乎此然後行乎方内而無不通文者書之㸃畫形象王天下有三重焉其寡過矣乎王去聲吕氏曰三重謂議禮制度考文惟天子得以行之則國不異政家不殊俗而人得寡過矣上焉者雖善無徴無徴不信不信民弗從下焉者雖善不尊不尊不信不信民弗從上焉者謂時王以前如夏商之禮雖善而皆不可考下焉者謂聖人在下如孔子雖善於禮而不在尊位也故君子之道本諸身徴諸庶民考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑此君子指王天下者而言其道即議禮制度考文之事也本諸身有其徳也徴諸庶民驗其所信從也建立也立於此而參於彼也天地者道也鬼神者造化之迹也百世以俟聖人而不惑所謂聖人復起不易吾言者也質諸鬼神而無疑知天也百世以俟聖人而不惑知人也知天知人知其理也是故君子動而世為天下道行而世為天下法言而世為天下則逺之則有望近之則不厭動兼言行而言道兼法則而言法法度也則準則也詩曰在彼無惡在此無射庶幾夙夜以永終譽君子未有不如此而蚤有譽於天下者也惡去聲射音妬詩作斁詩周頌振鷺之篇射厭也所謂此者指本諸身以下六事而言愚按詩彼者周王本指㣲子在國而言此者周王自指在我而言右第二十九章承上章居上不驕而言亦人道也晉陵錢氏曰三重謂於三者重難之不敢輕也愚意以三者皆重事仲尼祖述堯舜憲章文武上律天時下襲水土祖述者逺宗其道憲章者近守其法律天時者法其自然之運襲水土者因其一定之理皆兼内外該本末而言也辟如天地之無不持載無不覆幬辟如四時之錯行如日月之代明辟音譬幬徒報反錯猶迭也此言聖人之徳萬物並育而不相害道並行而不相悖小徳川流大徳敦化此天地之所以為大也悖猶背也天覆地載萬物並育於其間而不相害四時日月錯行代明而不相悖所以不害不悖者小徳之川流所以並育並行者大徳之敦化小徳者全體之分大徳者萬殊之本川流者如川之流脉絡分明而往不息也敦化者敦厚其化根本盛大而出無窮也此言天地之道以見上文取辟之意也右第三十章言天道也或問小徳大徳之説曰以天地言之則髙下散殊者小徳之川流於穆不已者大徳之敦化以聖人言之則物各付物者小徳之川流純亦不已者大徳之敦化曰子所謂兼内外該本末而言何也曰是不可以一事盡也姑以夫子已行之迹言之則由其書之有得夏時贊周易也由其行之有不時不食也迅雷風烈必變也以至於仕止久速之皆當其可也而其所以律天時之意可見矣由其書之有序禹貢述職方也由其行之有居魯而逄掖也居宋而章甫也以至於用舎行藏之所遇而安也而其襲水土之意可見矣若因是而推之則古先聖王之所以迎日推筴頒朔授民而其大至於禪授放伐各以其時者皆律天時之事也其所以體國經野方設居方而其廣至於昆蟲草木各遂其性者皆襲水土之事也使夫子而得邦家也則亦何慊於是哉語録曰兼本末内外精粗而言是言聖人功夫永嘉陳氏曰祖述者道而法在其中憲章者法而道在其中律天時者大則顯晦屈伸襲水土者小則採山釣水細底道理為本為内麄底為末為外惟天下至聖為能聰明睿知足以有臨也寛裕温柔足以有容也發强剛毅足以有執也齊莊中正足以有敬也文理宻察足以有别也知去聲齊側皆反别彼列反聰明睿知生知之質臨謂居上而臨下也其下四者乃仁義禮知之徳文文章也理條理也宻詳細也察明辨也溥博淵泉而時出之溥博周徧而廣闊也淵泉靜深而有本也出發見也言五者之徳充積於中而以時發見於外也漙博如天淵泉如淵見而民莫不敬言而民莫不信行而民莫不説見音現説音恱言其充積極其盛而發見當其可也是以聲名洋溢乎中國施及蠻貊舟車所至人力所通天之所覆地之所載日月所照霜露所隊凡有血氣者莫不尊親故曰配天施去聲隊音墜舟車所至以下盖極言之配天言其徳之所及廣大如天也右第三十一章承上章而言小徳之川流亦天道也唯天下至誠為能經綸天下之大經立天下之大本知天地之化育夫焉有所倚夫音扶焉於䖍反經綸皆治絲之事經者理其緒而分之綸者比其類而合之也經常也大經者五品之人倫大本者所性之全體也惟聖人之徳極誠無妄故於人倫各盡其當然之實而皆可以為天下後世法所謂經綸之也其於所性之全體無一毫人欲之偽以雜之而天下之道千變萬化皆由此出所謂立之也其於天地之化育則亦其極誠無妄者有黙契焉非但聞見之知而已此皆至誠無妄自然之功用夫豈有所倚著於物而後能哉肫肫其仁淵淵其淵浩浩其天肫之純反肫肫懇至貌以經綸而言也淵淵靜深貌以立本而言也浩浩廣大貌以知化而言也其淵其天則非特如之而已茍不固聰明聖知逹天徳者其孰能知之聖知之知去聲固實也鄭氏曰唯聖人能知聖人也右第三十二章承上章而言大徳之敦化亦天道也前章言至聖之徳此章言至誠之道然至誠之道非至聖不能知至聖之徳非至誠不能為則亦非二物矣此篇言聖人天道之極致至此而無以加矣或問至聖至誠之説曰聰明睿知者生知安行而首出庶物之姿也容執敬别則仁義禮智之事也詩曰衣錦尚絅惡其文之著也故君子之道闇然而日章小人之道的然而日亡君子之道淡而不厭簡而文温而理知逺之近知風之自知㣲之顯可與入徳矣衣去聲絅口逈反惡去聲闇於感反前章言聖人之徳極其盛矣此復自下學立心之始言之而下文又推之以至其極也詩國風衛碩人鄭之丰皆作衣錦褧衣褧絅同襌衣也尚加也古之學者為已故其立心如此尚絅故闇然衣錦故有日章之實淡簡温絅之襲於外也不厭而文且理焉錦之美在中也小人反是則暴於外而無實以繼之是以的然而日亡也逺之近見於彼者由於此也風之自著乎外者本乎内也㣲之顯有諸内者形諸外也有為己之心而又知此三者則知所謹而可入徳矣故下文引詩言謹獨之事詩云潛雖伏矣亦孔之昭故君子内省不疚無惡於志君子之所不可及者其唯人之所不見乎惡去聲詩小雅正月之篇承上文言莫見乎隠莫顯乎㣲也疚病也無惡於志猶言無愧於心此君子謹獨之事也詩云相在爾室尚不愧于屋漏故君子不動而敬不言而信相去聲詩大雅抑之篇相視也屋漏室西北隅也承上文又言君子之戒謹恐懼無時不然不待言動而後敬信則其為己之功益加宻矣故下文引詩并言其效詩曰奏假無言時靡有爭是故君子不賞而民勸不怒而民威於鈇鉞假格同鈇音夫詩商頌烈祖之篇奏進也承上文而遂及其效言進而感格於神明之際極其誠敬無有言説而人自化之也威畏也鈇莝斫刀也鉞斧也詩曰不顯惟徳百辟其刑之是故君子篤㳟而天下平詩周頌烈文之篇不顯説見二十六章此借引以為幽深𤣥逺之意承上文言天子有不顯之徳而諸侯法之則其徳愈深而效愈逺矣篤厚也篤㳟言不顯其敬也篤㳟而天下平乃聖人至徳淵㣲自然之應中庸之極功也詩云予懐明徳不大聲以色子曰聲色之於以化民末也詩曰徳輶如毛毛猶有倫上天之載無聲無臭至矣輶由酉二音詩大雅皇矣之篇引之以明上文所謂不顯之徳者正以其不大聲與色也又引孔子之言以為聲色乃化民之末務今但言不大之而已則猶有聲色者存是未足以形容不顯之妙不若烝民之詩所言徳輶如毛則庶乎可以形容矣而又自以為謂之毛則猶有可比者是亦未盡其妙不若文王之詩所言上天之載無聲無臭然後乃為不顯之至耳盖聲臭有氣無形在物最為㣲妙而猶曰無之故唯此可以形容不顯篤㳟之妙非此徳之外又别有是三等然後為至也右第三十三章子思因前章極致之言反求其本復自下學為己謹獨之事推而言之以馴致乎篤㳟而天下平之盛又贊其妙至於無聲無臭而後己焉盖舉一篇之要而約言之其反覆丁寜示人之意至深切矣學者其可不盡心乎或問卒章之説曰承上三章既言聖人之徳而極其盛矣子思懼夫學者求之於髙逺𤣥妙之域輕自大而反失之也故反於其至近者而言之以示入徳之方欲學者先知用心於内不求人知然後可以謹獨誠身而馴致乎其極也君子篤㳟而天下平而其所以平者無聲臭之可尋此至誠盛徳自然之效而中庸之極功也故以是而終篇焉盖以一篇而論之則天命之性率性之道修道之教與夫天地之所以位萬物之所以育者於此可見其實徳以此章論之則所謂淡而不厭簡而文温而理知逺之近知風之自知㣲之顯者於此可見其成功皆非空言也然其所以入乎此者則無他焉亦曰反身以謹獨而已矣故首章已發其意此章又申明而極言之其㫖深哉此章凡八引詩自衣錦尚絅以至不顯惟徳凡五條始學成徳踈宻淺深之序自不大聲色至無聲無臭凡三條皆所以贊夫不顯之徳語録曰古人室在東南隅開門東北隅為突西北隅為屋漏西南為奥人始進先見東北隅却到西北隅然後始到西南隅此是至深宻之地又文集曰曽子問謂之當室之白孫炎曰當室日光所漏入也右釋屋漏愚按西北隅為屋漏者盖古屋室之制其南東户西牖相連其東之北則當户處日光直入故云當室之白其西之北當牖處日光穿入故云屋漏黄氏日抄卷二十五
