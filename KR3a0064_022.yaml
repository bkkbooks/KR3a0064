body:
  text: 黃氏日抄卷二十二宋黃震撰讀禮記九雜記上第二十諸侯行而死於館則其復如於其國如於道則升其乘車之左轂以其綏復其輤有裧緇布裳帷素錦以為屋而行至於廟門不毁牆遂入適所殯唯輤為說於廟門外輤千見反裧昌占反說吐奪反館王國所致館舍復招還其魂魄綏鄭改為緌廬陵胡氏謂即所執升車之綏輤載柩將殯之車飾裧鱉甲邉緣緇布裳帷者謂輤下棺外用緇色之布以為裳帷素錦屋者謂於裳帷之中又用素錦為小帷如屋形以覆棺也廟所殯宫牆指裳帷諸侯死於館舍則其招魂如在其國升屋東榮用衣而號如死於道則升車左轂以象升屋東榮用所執之綏象所服之衣整車飾而歸殯將入殯宫惟脫柩上之輤不脫柩旁之帷裳上者髙而妨入廟門旁者留之不露柩也補大夫士死於道則升其乘車之左轂以其綏復如於館死則其復如於家大夫以布為輤而行至於家而說輤載以輲車入自門至於阼階下而說車舉自阼階升適所殯士輤葦席以為屋蒲席以為帷裳輲市專反輲車凡車有輻曰輪無輻曰輇輲車以輪為輪迫地而行輪卑有似於蜃又曰蜃車殯皆用之大夫禮降於諸侯士降於大夫補凡訃於其君曰君之臣某死父母妻長子曰君之臣某之某死君訃於他國之君曰寡君不祿敢告於執事夫人曰寡小君不祿大子之喪曰寡君之適子某死大夫訃於同國適者曰某不祿訃於士亦曰某不祿訃於他國之君曰君之外臣寡大夫某死訃於適者曰吾子之外私寡大夫不祿使某實訃於士亦曰吾子之外私寡大夫某不祿使某實士訃於同國大夫曰某死訃於士亦曰某死訃於他國之君曰君之外臣某死訃於大夫曰吾子之外私某死訃於士亦曰吾子之外私某死適子之適音的適者之適音適訃死而赴告也士曰不祿今君與大夫亦同士稱者告於他國謙辭也告於他國之君故曰外臣以他國之臣與死者有恩私故曰外私適者謂敵體之人使某實謂以實告方氏大夫次於公館以終喪士練而歸士次於公館大夫居廬士居堊室次謂服君喪而為之哀次也公館公宫官舍也大夫於公館終喪則三年而後歸士練而歸則朞年而已降殺之辨也繼又言士次於公館者即指練而歸之士蓋大夫以其序皆次且朝夕存焉士則謂不盡次又未必朝夕存焉故既曰練而歸又曰次於公館者謂不盡次故以次為復也鄭氏分士為二等有邑宰朝廷之殊疑未然廬者倚木於室外為廬堊室者白其室中為堊倚廬之制重堊室之制輕親者貴者居倚廬疏者賤者居堊室合方氏應氏說大夫為其父母兄弟之未為大夫者之喪服如士服士為其父母兄弟之為大夫者之喪服如士服為于僞反喪服以粗者為重大夫之喪重於士故生者貴而死者賤則其服從死者嫌若臨之也生者賤而死者貴則其服從生者嫌若僣之也用方氏補大夫之適子服大夫之服大夫之庶子為大夫則為其父母服大夫服其位與未為大夫者齒士之子為大夫則其父母弗能主也使其子主之無子則為之置後適丁歷反大夫之適子雖為士得服大夫之服尊適故也至於庶子必身為大夫然後敢服其服其位猶與諸子未為大夫者齒宗適故也父為士子為大夫子死而父母不得主其喪者士不得攝大夫也其子得主之者以其為適得服大夫之服也為之置後即亦為大夫之適子也用方氏修大夫卜宅與葬日有司麻衣布衰布帶因喪屨緇布冠不蕤占者皮辨如筮則史練冠長衣以筮占者朝服卜用龜宅謂葬地有司羣吏執事者麻衣白布深衣衰指喪服之當心者蕤者冠之飾即緌緇布冠古不蕤後代有蕤此以凶事故特云不蕤筮用蓍史即筮人長衣深衣之純素者皮辨朝服皆吉服卜筮者以凶事求神服不敢純吉占者求吉則服純吉補大夫之喪既薦馬薦馬者哭踊出乃包奠而讀書薦進也馬牽車者薦馬則喪車將行故哭踊古說謂孝子哭踊然本文言薦馬者哭踊當是執事之臣子也喪車將行矣乃取遣奠牲下體包裹為送又讀所書送物之名補大夫之喪大宗人相小宗人命龜卜人作龜大宗大宗伯相相其禮小宗小宗伯命龜謂告以所問事卜人掌龜者作龜謂揚火灼之以出兆集鄭孔氏內子以鞠衣褒衣素紗下大夫以䄠衣其餘如士復諸侯以褒衣冕服爵辨服夫人稅衣揄狄狄稅素沙復西上鞠九六反䄠張戰反稅他喚反揄音遙內子卿之適妻下大夫謂下大夫之妻鞠衣卿妻之衣褒衣始為命婦見加賜之衣素紗若令紗縠所以裏衣者也其餘如士謂鞠衣䄠衣之外其餘禒衣則如士妻之服也復謂初死時呼之兾招復其魂魄也褒衣亦謂諸侯始加賜衣服褒之言進也冕服則上公五侯伯四子男三爵辨則爵色之辨也夫人稅衣揄狄者言用稅衣上至揄狄蓋侯伯夫人自揄狄而下子男夫人自闕狄而下卿妻自鞠衣而下大夫妻䄠衣而下士妻稅衣而已五者之服惟夫人得備狄稅素沙者言上自揄狄下至稅衣皆用素紗白縠為裏復必西上者北靣而西上西北皆隂求諸幽故也復欲其生氣之來復故皆用其生時之上衣多少則各隨其命數陸氏大夫不揄絞屬於池下絞户交反屬音燭揄揄翟也絞者采青黃之間曰絞屬猶繫也此言大夫葬時車飾也凡喪車之飾曰栁栁之外有如承水霤者名池人君之桞其池繫絞繒於下而畫翟雉焉名曰振容又有銅魚在其間大夫去振容士去魚故大夫不得畫揄絞屬於池下容池上有之用鄭孔陸氏修大夫附於士士不附於大夫附於大夫之昆弟無昆弟則從其昭穆雖王父母在亦然婦附於其夫之所附之妃無妃則亦從其昭穆之妃妾附於妾祖姑無妾祖姑則亦從其昭穆之妾男子附於王父則配女子附於王母則不配公子附於公子昭舊直遙反晋人避司馬昭之諱也今如字附即袝謂後死者附先死者而祭王母祖父母也夫所附之妃謂祖母於婦則祖姑女子謂在室及嫁未三月而死者大夫附於士不敢以己之貴自殊於其祖也士不附於大夫自卑而别於尊也大夫之昆弟謂為士者茍無昆弟則從其昭穆中以上附髙祖之為士者下言從其昭穆之妃從其昭穆之妾則亦謂祔於髙祖之妃與妾也雖王父母在亦然者以孫宜祔於祖祖在無可祔亦祔於髙祖也男子附於王父則配者孫附於祖曰以其配若女附於祖母惟祭饌如一而祝辭不云以某配公子附於公子不敢戚君集君薨大子號稱子待猶君也君薨未踰年太子雖猶稱子而人待之則猶君鄭氏說有三年之練冠則以大功之麻易之唯杖屨不易斬衰既練其要絰與大功初死要絰粗細同麻謂要絰也唯杖屨不易者言其餘皆易杖不易者以大功無杖屨不易者以俱用繩也有父母之喪尚功衰而附兄弟之殤則練冠附於殤稱陽童某甫不名神也父母喪既練皆受以大功之衰故謂之功衰以此時而祔大功親以下之殤則練冠陽童謂稱庶殤子若宗子則稱隂童字以某甫而不名者神事之也鄭氏凡異居始聞兄弟之喪唯以哭對可也其始麻散帶絰未服麻而奔喪及主人之未成絰也疏者與主人皆成之親者終其麻帶絰之日數以哭對者哀痛不以言辭為禮也始麻散帶絰者其初聞喪始服麻之時散垂要之帶絰若小功以下服輕者則糾垂不散也未服麻而奔喪者謂道路既近聞而即奔至在主人未成絰時謂未小斂之前也疏者謂小功以下值主人未成服則隨主人成之親者謂大功以上雖值主人成服未即與之成必終自己麻帶絰禮日數而後成服也鄭氏孔氏主妾之喪則自祔至於練祥皆使其子主之其殯祭不於正室君不撫僕妾祔自主之者以其祭於祖廟祭不於正室者以其非適不撫僕妾略於賤鄭氏方氏女君死則妾為女君之黨服攝女君則不為先女君之黨服女君雖死猶為女君之黨服己攝女君則否補聞兄弟之喪大功以上見喪者之鄊而哭適兄弟之送葬者弗及遇主人於道則遂之於墓凡主兄弟之喪雖疏亦虞之見喪者之鄉而哭奔喪節也遂之於墓言骨肉之親不待主人也疏亦虞之以喪事虞祔乃畢安其神為重也鄭氏凡喪服未畢有弔者則為位而哭拜踊弔雖後時然喪猶未畢不可以殺禮待新弔之客方氏孔氏大夫之哭大夫辨絰大夫與殯亦辨絰大夫有私喪之葛則於其兄弟之輕喪則辨絰辨絰者如爵辨而加環絰乃大夫錫衰相弔之首服私喪之葛謂妻子之喪卒哭以葛代麻兄弟之輕喪謂緦麻大夫之相弔必辨絰不以妻子私喪之末服臨兄弟補為長子杖則其子不以杖即位為妻父母在不杖不稽顙母在不稽顙稽顙者其贈也拜父為長子杖則長子之子不杖辟尊者也父母在則為妻不杖不稽顙為尊者厭也母在父沒為妻惟不稽顙至拜贈則亦稽顙母之尊殺於父也用鄭氏方氏修違諸侯之大夫不反服違大夫之諸侯不反服違去也之往也反服為舊君服也去諸侯仕大夫是自尊適卑不可反服於前之尊君以形新君之卑去大夫仕諸侯是自卑適尊不可反服於前之卑君以辱新君之尊用孔氏修喪冠條屬以别吉凶三年之練冠亦條屬右縫小功以下左緦冠繅纓大功以上散帶繅音澡今讀如字條屬者謂喪冠通屈一條繩為武垂下為纓屬之冠吉冠則纓武異材故曰條屬以别吉凶三年練冠小祥之冠也亦條屬而右縫喪冠之縫向右右為隂隂者喪所尚也小功以下輕故縫向左同於吉緦冠繅纓者繅讀如蠶繅之繅繅纓散絲纓也大功以上散帶者小斂後小功以下皆絞之大功以上不忍即成之故散垂此帶至成服乃絞孔氏及陸氏說朝服十五升去其半而緦加灰錫也升者麻縷之數八十縷為升十五升千二百縷去其半為緦加灰治之為錫用孔氏說諸侯相襚以後路與冕服先路與褎衣不以襚音遂贈死曰襚後路二車冕服次冕贈死者不以己之正所服用遣車視牢具疏布輤四靣有章置于四隅章或作鄣去聲讀遣車送葬載牲體之車牢具遣奠所包牲牢之體貴賤各有數一個為一具取一車載之故云視牢具疏布輤乃其車之上蓋四靣皆有章蔽以隱翳牢肉入壙則置于槨之四隅合鄭氏孔氏說載粻有子曰非禮也喪奠脯醢而已粻陟良反粻米糧也遣奠之饌無黍稷鄭氏孔氏祭稱孝子孝孫喪稱哀子哀孫祭所以追養故稱孝喪所以哭亡故稱哀方氏端衰喪車皆無等端正也吉時元端服身與𬒮同以二尺二寸為正而喪衣亦如之以其綴六寸之衰於心前故曰端衰喪車惡車等等差也喪之衣衰及車天子至士制度同孔氏大白冠緇布之冠皆不蕤委武𤣥縞而后蕤大白冠白布為之太古之冠緇布冠黑布為之始冠之冠皆質而無飾委武皆冠卷苦圓反委言內所恃以為質武言外所覿以為文𤣥𤣥冠也縞縞冠也𤣥縞二冠既先有别卷乃可蕤故云而后蕤鄭氏孔氏大夫冕而祭於公辨而祭於己士辨而祭於公冠而祭於己士辨而親迎然則士辨而祭於己可也迎魚敬反辨爵辨冠𤣥冠鄭氏暢臼以掬杵以梧枇以桑長三尺或曰五尺畢用桑長三尺刋其柄與末臼其䆒反掬弓六反枇音匕長直亮反暢欎鬯也臼所以搗之者也掬柏也梧桐也枇即匕牲體從鑊以枇升入於鼎從鼎以枇載之于爼畢所以助主人之舉肉者曲而長象畢星故名畢刋猶削也孔氏率帶諸侯大夫皆五采士二采率音律率繂也謂襲尸之大帶大夫以上飾以五采士以朱緑鄭氏醴者稻醴也甕甒筲衡實見間而后折入甒音武衡户剛反甕盛醯醢甒盛酒醴筲盛黍稷衡以大木為桁以庋甕甒筲者皆送葬所藏之物也見者棺之衣所謂帷荒以尸藏于內而飾見於外故謂之見折者承席也形如牀無足曲折為之故曰折實見間者以甕甒等實于見與槨之間而后折入者實物於槨內既畢而后入此承席加於槨之上焉孔氏方氏重既虞而埋之凡婦人從其夫之爵位重者初喪時所立之主以既有柩又有主故名重既葬而虞祭立主矣則埋之小斂大斂啓皆辨拜朝夕哭不帷無柩者不帷辨音遍啓謂啓攢辨拜謂遍拜以謝賔君若載而后弔之則主人東靣而拜門右北靣而踊出待反而后奠載謂將出葬已載柩於車也主人在柩車西故東靣而拜門右謂廟門內西邉拜踊於賔位不敢迫近君也待君既弔而出然後行遣奠之禮用鄭氏說子羔之襲也繭衣裳與稅衣纁袡為一素端一皮辨一爵辨一𤣥冕一曽子曰不襲婦服稅他喚反袡而占反繭衣裳謂衣裳相連而綿纊之者也表之以稅衣纁為之緣與袡為一稱稅謂黑衣纁絳色袡婦人蔽膝也素端以素為衣裳此第二稱皮辨第三稱爵辨第四稱元冕第五稱纁袡婦人服而子羔襲用之故曽子譏之孔氏為君使而死公館復私館不復公館者公宫與公所為也私館者自卿大夫以下之家也私館妨其私家故不復補公七踊大夫五踊婦人居間士三踊婦人皆居間七者始死一明日襲一襲之明朝一又明日小斂一及小斂日再踊一小斂之明日一并大斂一凡七五者始死一明日襲一又明日小斂一同日再小斂一明日大斂一凡五三者始死一小斂一大斂一凡三居間者謂主人踊婦人踊賓乃踊婦人居賔主之間孔氏公襲卷衣一𤣥端一朝服一素積一纁裳一爵辨二𤣥冕一褎衣一朱緑帶申加大帶於上卷音衮卷者衮衣𤣥端者燕居𤣥端朱裳朝服者緇衣素裳自視朝之服素積者皮辨視朔之服纁裳冕服之裳爵辨二者𤣥衣纁裳此始命之服重本故二通也褎衣最上華君賜也孔氏小斂環絰公大夫士一也環絰一股纒絰鄭氏公視大斂公升商祝鋪席乃斂君臨臣喪雖已鋪席商祝更鋪乃斂榮君來為新之也孔氏魯人之贈也三𤣥二纁廣尺長終幅廣長並去聲贈謂以物送亡人廣尺長終幅失禮禮丈八尺孔氏弔者即位于門西東靣其介在其東南北靣西上西於門主孤西面相者受命曰孤某使某請事客曰寡君使某如何不淑相者入告出曰孤某須矣弔者入主人升堂西靣弔者升自西階東靣致命曰寡君聞君之喪寡君使某如何不淑子拜稽顙弔者降反位此記諸侯相弔之禮子孤子也鄭孔氏含者執璧將命曰寡君使某含相者入告出曰孤某須矣含者入升堂致命子拜稽顙含者坐委于殯東南有葦席既葬蒲席降出反位宰夫朝服即喪屨升自西階西靣坐取璧降自西階以東含胡暗反此記相含之禮以東藏於內也鄭孔氏襚者曰寡君使某襚相者入告出曰孤某須矣襚者執冕服左執領右執要入升堂致命曰寡君使某襚子拜稽顙委衣于殯東襚者降受爵辨服於門內霤將命子拜稽顙如初受皮辨服於中庭自西階受朝服自堂受𤣥端將命子拜稽顙皆如初襚者降出反位宰夫五人舉以東降自西階其舉亦西靣此記相襚之禮上介賵執圭將命曰寡君使某賵相者入告反命曰孤某須矣陳乘黃大路於中庭北輈執圭將命客使自下由路西子拜稽顙坐委于殯東南隅宰舉以東賵芳鳳反輈竹由反此記相賵之禮輈轅也客使謂使客之從者客之所使故曰客使下謂馬也馬在路之下路即大路之車孔氏凡將命鄉殯將命子拜稽顙西靣而坐委之宰舉璧與圭宰夫舉襚升自西階西靣坐取之降自西階賵者出反位于門外此揔記將命授受之禮上客臨曰寡君有宗廟之事不得承事使一介老某相執綍相者反命曰孤某須矣臨者入門右介者皆從之立于其左東上宗人納賔升受命于君降曰孤敢辭吾子之辱請吾子之復位客對曰寡君命某毋敢視賔客敢辭宗人反命曰孤敢固辭吾子之辱請吾子之復位客對曰寡君命某毋敢視賔客敢固辭宗人反命曰孤敢固辭吾子之辱請吾子之復位客對曰寡君使臣某毋敢視賔客是以敢固辭固辭不獲命敢不敬從客立于門西介立于其左東上孤降自阼階拜之升哭與客拾踊三客出送于門外拜稽顙臨如字又力鴆反拾其劫反此記臨哭相辭讓之禮臨喪而哭故謂之臨弔含襚賻禮畢故上客行臨之禮拾踊者客與主更踊其國有君喪不敢受弔有君喪則親喪不敢受弔外宗房中南靣小臣鋪席商祝鋪絞襟衾士盥于盤北舉遷尸于斂上卒斂宰告子馮之踊夫人東靣坐馮之興踊士喪有與天子同者三其終夜燎及乘人專道而行乘人謂使人執引專道謂使人辟路鄭氏雜記下第二十一有父之喪如未沒喪而母死其除父之喪也服其除服卒事反喪服雖諸父昆弟之喪如當父母之喪其除諸父昆弟之喪也皆服其除喪之服卒事反喪服沒猶終也除服謂祥祭之服服前喪之除服而反後喪之喪服不特於父母之重喪雖當父母喪而遭諸父昆弟之喪亦然示於前喪有終後喪亦不為前喪之除而奪也補如三年之喪則既顈其練祥皆行顈口逈反顈草名無葛之鄉去麻則用顈蓋代葛者三年之喪既虞卒哭而變麻以顈矣則前喪之練祭乃得行蓋後喪未卒哭以前不可行前喪之練祭以麻絰純凶而練祭從吉也補王父死未練祥而孫又死猶是附於王父也王父雖未練祥而孫得袝者昭穆同也禮孫死袝祖方氏孔氏有殯聞外喪哭之他室入奠卒奠出改服即位如始即位之禮有殯謂父母喪未葬柩在殯宫者也外喪謂兄弟喪在逺者也若聞外喪而哭於殯宫嫌是哭殯今於他室明所哭者為新喪也入奠謂朝入奠於殯宫既乃更即位就他室如始哭時此謂哭新喪之明日再哭也孔氏鄭氏大夫士將與祭於公既視濯而父母死則猶是與祭也次於異宫既祭釋服出公門外哭而歸其他如奔喪之禮如未視濯則使人告告者反而后哭如諸父昆弟姑姊妹之喪則既宿則與祭卒事出公門釋服而后歸其他如奔喪之禮如同宫則次於異宫告謂告君既宿謂祭前三日將致齊受宿戒將與祭聞父母喪猶卒祭謂君命嚴而祭事重也然人子之情當何如雖堅忍其痛而不哭果能一其將事之誠否耶漢儒傳聞古說幸於今無用闕疑可也補曽子問曰卿大夫將為尸於公受宿矣而有齊衰內喪則如之何孔子曰出舍乎公宫以待事禮也受宿受齊宿之戒齊衰內喪謂諸父昆弟姑姊妹之服孔氏孔子曰尸辨冕而出卿大夫士皆下之尸必式必有前驅已見曽子問父母之喪將祭而昆弟死既殯而祭如同宫則雖臣妾葬而后祭祭主人之升降散等執事者亦散等雖虞附亦然父母之喪將祭謂練祥也散等謂不涉級聚足新喪略威儀也兄弟死必殯後方行父母練祭若同宫雖臣妾死亦葬後方行父母練祭以練祭從吉不可以凶事雜之也喪祭散等蓋不暇為威儀補自諸侯逹諸士小祥之祭主人之酢也嚌之衆賔兄弟則皆啐之大祥主人啐之衆賔兄弟皆飲之可也嚌至齒啐入口鄭氏凡侍祭喪者告賔祭薦而不食侍祭喪謂相禮者薦謂脯醢祭薦謂祭以脯醢也凡吉祭則告賔祭薦既祭而食之喪祭不主飲食故相者告賔但祭其薦而不食此天台賈䝉集古說也然恐薦非指脯醢之物謂薦用脯醢則可謂薦為脯醢則不可蓋此章合以告賔祭為句薦而不食為句薦於神人而已不食之也與上文嚌之啐之意相續補子貢問喪子曰敬為上哀次之瘠為下顔色稱其情戚容稱其服請問兄弟之喪子曰兄弟之喪則存乎書䇿矣君子不奪人之喪亦不可奪喪也喪尚哀至祭則尚敬耳此章疑有為之言又親喪亦未嘗不存於書䇿補孔子曰少連大連善居喪三日不怠三月不解期悲哀三年憂東夷之子也言其生於夷狄而知禮鄭氏三年之喪言而不語對而不問廬堊室之中不與人坐焉在堊室之中非時見乎母也不入門疏衰皆居堊室不廬廬嚴者也言自言己事語為人說也言而不語對而不問居憂有所不暇也廬堊室之中不與人坐示憂之所獨也廬謂倚木居於室外之西北角堊室於室中塗之使白也以時事見乎母乃入門則居廬時無為皆不入門也以廬為嚴者以父母喪乃居之非䙝易之地比也用孔氏方氏修妻視叔父母姑姊妹視兄弟長中下殤視成人視猶言比也此言輕重雖稍異而哀戚略同也鄭氏方氏親喪外除兄弟之喪內除外除者服已除而內之哀未忘內除者服未除而內之哀已殺然愚按服之隆殺已各稱其情於服之殺者亦非情不至而姑外為之服也合詳之補視君之母與妻比之兄弟發諸顔色者亦不飲食也服君之母妻比己之兄弟凡酒食能使人醉飽而發見於顔色者亦不敢飲食之免喪之外行於道路見似目瞿聞名心瞿弔死而問疾顔色戚容必有以異於人也如此而后可以服三年之喪其餘則直道而行之是也瞿九遇反似謂貌似父母名謂名同父母瞿惻隱貌問弔而哀戚故必有異於人發於中心者如此然後服三年之喪能情文相稱其餘直道而行謂喪之輕者不必若是其委折也然三年之喪發於中心之實然亦直道也雖喪之輕者其文亦未嘗無委折於其間用方氏修祥主人之除也於夕為期朝服祥因其故服祥謂祥祭主人除服之節於祥祭前夕預告明日祥祭之期此時主人著朝服謂緇衣素裳縞冠明旦祥之時主人因著其前夕故朝服孔氏子游曰既祥雖不當縞者必縞然後反服縞祥祭之服此言親喪雖既除猶有他喪未除令以祥故無所不用縞然後反他喪之服陸氏當袒大夫至雖當踊絶踊而拜之反改成踊乃襲於士既事成踊襲而后拜之不改成踊此謂士有喪當袒踊而大夫來弔則絶踊而拜之士來弔則成踊而後拜本賈氏說上大夫之虞也少牢卒哭成事附皆大牢下大夫之虞也犆牲卒哭成事附皆少牢卒哭謂之成事成吉事也附祔廟也禮皆重於虞祭孔氏祝稱卜葬虞子孫曰哀夫曰乃兄弟曰某卜葬其兄弟曰伯子某卜葬卜虞祝稱主人之辭子孫於父祖稱哀子哀孫夫於妻稱乃夫補古者貴賤皆杖叔孫武叔朝見輪人以其杖關轂而輠輪者於是有爵而后杖也輠胡罪反叔孫武叔魯大夫叔孫州仇輪人作車輪之人關穿也輠回也叔孫武叔見輪人以扶病之杖關穿車轂中回轉其輪謂其用之鄙䙝而禁之必有爵而后得用杖孔氏賈氏鑿巾以飯公羊賈為之也飯扶晚反飯含也恐親為人所惡故設巾覆尸面而當口鑿穿之令含入口自公羊賈始集冒者何也所以掩形也自襲以至小斂不設冒則形是以襲而后設冒也恐死者為人所惡故自襲至斂皆冒之補或問於曽子曰夫既遣而包其餘猶既食而裹其餘與君子既食則裹其餘乎曽子曰吾子不見大饗乎夫大饗既饗卷三性之爼歸于賔館父母而賔客之所以為哀也子不見大饗乎與音餘父母永别遂同賔客之疏孝子所以悲哀而包奠送之也曽子以解或人包奠之疑孔氏說非為人喪問與賜與三年之喪以其喪拜非三年之喪以吉拜三年之喪如或遺之酒肉則受之必三辭主人衰絰而受之如君命則不敢辭受而薦之喪者不遺人人遺之雖酒肉受也從父昆弟以下既卒哭遺人可也與音餘豫敵體曰問上豫下曰賜記者設辭謂豈非為人之喪而問之賜之歟下乃應問賜有喪者之禮縣子曰三年之喪如斬期之喪如剡期之喪十一月而練十三月而祥十五月而禫三年之喪雖功衰不弔自諸侯逹諸士如有服而將往哭之則服其服而往練則弔如斬如剡言哀痛淺深之别功衰謂既練之服小祥後衰與大功同故曰功衰練謂大祥始除衰杖而練孔氏既葬大功弔哭而退不聽事焉期之喪未葬弔於鄉人哭而退不聽事焉功衰弔待事不執事小功緦執事不與於禮事謂襲斂之屬禮謂饋奠相趨也出宫而退相揖也哀次而退相問也既封而退相見也反哭而退朋友虞附而退封彼驗反又如字相趨謂本不相識聞名而來㑹喪者喪出殯宫門即退相揖謂在他處嘗相識者喪至大門外哀次而退相問嘗相問遺者待封窆而退相見謂嘗執贄相往來者待其反哭於家而後退朋友則待其虞祭祔廟而後退此論送喪以恩厚薄為去遲速之節孔氏方氏弔非從主人也四十者執綍鄊人五十者從反哭四十者待盈坎弔者非徒從主人之行而已年四十而未衰者皆執紼若同鄉而近五十者從主人反哭於家年四十者留待掩壙本孔氏說喪食雖惡必充飢飢而廢事非禮也飽而忘哀亦非禮也視不明聽不聰行不正不知哀君子病之故有疾飲酒食肉五十不致毁六十不毁七十飲酒食肉皆為疑死有服人召之食不往大功以下既葬適人人食之其黨也食之非其黨弗食也功衰食菜果飲水醬無鹽酪不能食食鹽酪可也孔子曰身有瘍則浴首有創則沐病則飲酒食肉毁瘠為病君子弗為也毁而死君子謂之無子人食之食音嗣此論居喪飲食之節非從柩與反哭無免于堩堩古鄧反免當音問免所以代冠者也堩道路也言喪服出入非從柩與反哭不得免於道路必以冠本鄭氏孔氏凡喪小功以上非虞附練祥無沐浴居喪惟喪祭乃沐浴補疏衰之喪既葬人請見之則見不請見人小功請見人可也大功不在以執摯唯父母之喪不辟涕泣而見人辟音避不辟涕泣言至哀無飾鄭氏三年之喪祥而從政期之喪卒哭而從政九月之喪既葬而從政小功緦之喪既殯而從政大夫士三年之喪期不從政正禮也金革之事無辟權禮也孔氏曽申問於曽子曰哭父母有常聲乎曰中路嬰兒失其母焉何常聲之有哭不偯卒哭而諱王父母兄弟世父叔父姑姊妹子與父同諱母之諱宫中諱妻之諱不舉諸其側與從祖昆弟同名則諱子與父同諱者父為諱而子從之也母之諱謂母家之私諱補以喪冠者雖三年之喪可也既冠於次入哭踊三者三乃出以喪冠謂因喪而冠雖者明齊衰以下皆可鄭氏大功之末可以冠子可以嫁子父小功之末可以冠子可以嫁子可以取婦己雖小功既卒哭可以冠取妻下殤之小功則不可取此遇反又如字末謂卒哭之後大功據身而言小功據父而言孔氏謂互相偹必身與父俱是大功之末方可冠子嫁子父與身俱是小功之末方可冠子嫁子與取婦取婦獨於小功之末言之者取婦有酒食之㑹涉於歡樂也然小功之末雖可冠子嫁子取婦若下殤之小功則不可者下殤之小功本齊衰重服以下殤而降在小功服降而情不降也范氏謂五服之制各有月數月數之內自無吉事故曰接辨冕也左氏傳晉侯有小姜之喪小姜貴妾緦耳叔向尚以衰絰辭齊昏是雖喪猶無昏姻之道此書或為男女失時或繼嗣未立者非通例也集凡辨絰其衰侈袂弔服首著辨絰身著錫衰緦衰疑衰此三衰大作其袂袂二尺二寸大者半而益之則侈袂三尺三寸鄭氏孔氏父有服宫中子不與於樂母有服聲聞焉不舉樂妻有服不舉樂於其側大功將至辟琴瑟小功至不絶樂此記已雖無服己之親有服亦體其心而不樂惟小功輕服則否補姑姊妹其夫死而夫黨無兄弟使夫之族人主喪妻之黨雖親弗主夫若無族矣則前後家東西家無有則里尹主之或曰主之而附於夫之黨里尹閭胥里宰之屬周禮二十五家為里里置一宰下士也如此極言妻黨不得與夫家之事死而無主寧使鄰與里尹主之又云或曰主之而附於夫之黨鄭氏謂夫之黨其祖姑方氏謂此言或者之說非也晦庵曰古法既廢從宜而祀之别室亦可集麻者不紳執玊不麻麻不加於采麻者絰也紳大帶也喪以要絰代大帶執玉行禮者不服麻采謂𤣥纁辨絰之麻不加於𤣥衣纁裳之采此言吉凶不相干鄭氏孔氏國禁哭則止朝夕之奠即位自因也童子哭不偯不踊不杖不菲不廬禁哭謂大祭祀時雖不哭猶朝夕奠其即位自仍舊童子則不備禮菲謂菲屨廬謂倚廬鄭孔子曰伯母叔母疏衰踊不絶地姑姊妹之大功踊絶於地如知此者由文矣哉由文矣哉伯母叔母義也姑姊妹骨肉也疏衰大功文也踊絶不絶情也伯叔母之喪文至而情不至姑姊妹之喪文不至而情至也由此而推則禮由於內矣故曰如知此者由文矣哉再言而嘆詠之言喪禮當以情為重也用鄭氏陸氏修子桞之母死相者由左泄桞死其徒由右相由右相泄桞之徒為之也由右相雖非古亦在可以然之域凡言自某始者記失禮之始凡言為之者君子亦有取焉如鑿巾以飯公羊賈為之也由右相泄桞之徒為之也七月而禘獻子為之也陸氏天子飯九貝諸侯七大夫五士三飯九貝即檀弓所謂飯用米貝也以九以七以五以三降殺以兩士喪禮具三實于笄此士三之證方氏陸氏士三月而葬是月也卒哭大夫三月而葬五月而卒哭諸侯五月而葬七月而卒哭士三虞大夫五諸侯七葬有遲速㑹葬者有逺近也卒哭亦與之遲速以未葬有朝夕奠也然葬後又二月方卒哭豈三年之喪既同而卒哭之期獨異耶諸侯使人弔其次含襚賵臨皆同日而畢事者也其次如此也言五者相次同時鄭氏卿大夫疾君問之無算士一問之君於卿大夫比葬不食肉比卒哭不舉樂為士比殯不舉樂君於臣盡恩禮如此補升正柩諸侯執綍五百人四綍皆銜枚司馬執鐸左八人右八人匠人執羽葆御柩大夫之喪其升正柩也執引者三百人執鐸者左右各四人御柩以茅綍紼同引去聲升正柩者謂將葬朝于祖正棺於廟也廟中曰綍在塗曰引互言之御柩者居前道正之以鳥羽注於柄頭如蓋謂之羽葆茅取其色白宜於凶禮鄭氏孔氏孔子曰管仲鏤簋而朱紘旅樹而反坫山節而藻梲賢大夫也而難為上也晏平仲祀其先人豚肩不掩豆賢大夫也而難為下也君子上不僣上下不逼下鏤簋刻為蟲獸冠有笄者為紘紘在纓處兩端上屬下不結祭義云天子冕而朱紘旅道也樹立也旅樹者當門道而立之屏反坫鄭氏以為反爵之坫汲冡周書注以為向外室未知孰是山節刻山於屋栱藻梲畫藻於短柱管仲奢而僣上晏子儉而逼下方氏婦人非三年之喪不踰封而弔如三年之喪則君夫人歸夫人其歸也以諸侯之弔禮其待之也若待諸侯然夫人至入自闈門升自側階君在阼其他如奔喪禮然嫂不撫叔叔不撫嫂踰封越竟也君夫人歸謂奔父母喪也闈門宫中之門此明諸侯夫人奔父母喪之禮已嫁為父母期云三年者以本親言也嫂叔逺别孔氏君子有三患未之聞患弗得聞也既聞之患弗得學也既學之患弗能行也君子有五恥居其位無其言君子恥之有其言無其行君子恥之既得之而又失之君子恥之地有餘而民不足君子恥之衆寡均而倍焉君子恥之既得又失謂進退不能以禮義倍謂他人之功倍已方氏孔子曰凶年則乘駑馬祀以下牲自貶損亦取易供鄭氏恤由之喪哀公使孺悲之孔子學士喪禮士喪禮於是乎書士喪禮見儀禮陸氏子貢觀於蠟孔子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也子曰百日之蠟一日之澤非爾所知也張而不弛文武弗能也弛而不張文武弗為也一張一弛文武之道也蠟仕嫁反蠟索也歲十二月合聚萬物而索饗之祭名也國索祭黨正屬民飲食于序於是民無不醉如狂百日言勞之久一日言澤之均張弛以弓喻張喻勞民弛喻息民張之為武弛之為文鄭孔氏及賈家說孟獻子曰正月日至可以有事於上帝七月日至可以有事於祖七月而禘獻子為之也鄭氏曰記魯失禮所由也孟獻子魯大夫仲孫蔑也獻子欲尊其祖以郊天之月對而禘之非也魯之宗廟猶以夏時之孟月爾明堂位曰季夏六月以禘禮祀周公於太廟孔氏曰獻子以二至相當以天對祖乖失禮意春秋宣九年獻子始見經僖八年未有獻子而七月禘者以僖公八年公㑹王人于洮六月應禘以在㑹未還故至七月乃禘魯時暫行之此不云自獻子始是不恆行也集夫人之不命於天子自魯昭公始也周制同姓百世昏姻不通昭公取於吳為同姓故不告於天子此亦記魯失禮所由始鄭氏外宗為君夫人猶內宗也外宗異姓親內宗同姓親為君皆服斬衰為夫人皆齊衰方氏廄焚孔子拜鄉人為火來者拜之士一大夫再亦相弔之道也拜之者為其來弔已鄭氏孔子曰管仲遇盜取二人焉上以為公臣曰其所與逰辟也可人也管仲死桓公使為之服官於大夫者之為之服也自管仲始也有君命焉爾也辟匹亦管仲自盜中簡取二人薦上以為桓公之臣謂此二人所與遊者是邪辟之人故為盜其人實可與之人也故管仲死桓公使二人者為之服孔氏過而舉君之諱則起與君之諱同則稱字過猶誤也舉猶言也起者失言而變自新也鄭氏孔氏內亂不與焉外患弗辟也內亂謂同僚為亂而力不能制之者門內之事恩掩義內亂不與者所以重恩門外之事義斷恩外患弗辟者所以重義公羊傳曰辟內難而不辟外難方氏贊大行曰圭公九寸侯伯七寸子男五寸博三寸厚半寸剡上左右各寸半玉也藻三采六等大行人掌五等諸侯之禮記者贊助其言故曰贊行人藻薦玉者也三采朱白蒼六等六行也每色為二行方氏孔氏哀公問子羔曰子之食奚當對曰文公之下執事也問其先人始食祿當何代對以文公之下執事是始於魯文也方氏說成廟則釁之其禮祝宗人宰夫雍人皆爵辨純衣雍人拭羊宗人視之宰夫北靣于碑南東上雍人舉羊升屋自中中屋南靣刲羊血流于前乃降門夾室皆用雞先門而後夾室其衈皆於屋下割雞門當門夾室中室有司皆鄉室而立門則有司當門北靣既事宗人告事畢乃皆退反命于君曰釁某廟事畢反命于寢君南鄉于門內朝服既反命乃退路寢成則考之而不釁釁屋者交神明之道也凡宗廟之器其名者成則釁之以豭豚純衣謂絲衣則𤣥衣纁裳也湯謂將刲牲先滅耳旁毛薦之耳聽聲者告神欲其聽之也廟成而釁釁者以血血隂也寢成而考考者飲酒酒陽也方氏諸侯出夫人夫人比至于其國以夫人之禮行至以夫人入使者將命曰寡君不敏不能從而事社稷宗廟使使臣某敢告於執事主人對曰寡君固前辭不教矣寡君敢不敬須以俟命有司官陳器皿主人有司亦官受之諸侯出夫人謂諸侯棄妻器皿其元所賫者補妻出夫使人致之曰某不敏不能從而共粢盛使某也敢告於侍者主人對曰某之子不肖不敢辟誅敢不敬須以俟命使者退主人拜送之如舅在則稱舅舅沒則稱兄無兄則稱夫主人之辭曰某之子不肖如姑姊妹亦皆稱之此又妻棄夫之禮嗚乎此亦有禮乎補孔子曰吾食於少施氏而飽少施氏食我以禮吾祭作而辭曰疏食不足祭也吾飱作而辭曰疏食也不敢以傷吾子少施氏魯惠公子施父之後飱者食後更强飯以答主人之意鄭氏孔氏納幣一束束五兩兩五尋婦見舅姑兄弟姑姊妹皆立于堂下西面北上是見已見諸父各就其寢女雖未許嫁年二十而笄禮之婦人執其禮燕則鬈首鬈音權納幣謂昏禮尋八尺婦來為供養也其見主於尊者故兄弟以下在位是為己見不復特見雖未許嫁年二十已為成人禮之酌以成之言婦人執其禮明非許嫁之笄燕則鬈首謂既笄之後去之分髮為鬌紒既未許嫁猶以少者處之也鄭氏孔氏韠長三尺下廣二尺上廣一尺會去上五寸紕以爵韋六寸不至下五寸純以素紃以五采長廣並去聲㑹古外反紕婢支反純以閏反紃音巡韠紱也㑹謂上領縫也在上曰紕在下曰純六寸者表裏各三寸紃施諸縫中若今時絛喪大記第二十二疾病外內皆掃君大夫徹縣士去琴瑟寢東首於北牖下廢牀徹䙝衣加新衣體一人男女改服屬纊以俟絶氣男子不死於婦人之手婦人不死於男子之手掃去聲縣平聲首去聲屬音燭疾困曰病外內皆掃為賔客將來問病縣者所以垂樂器徹縣去琴瑟以聲音動人病者欲靜也東首者將使歸魂于陽於北牖下者將使反魄于隂廢牀者人始生在地去牀庶其生氣反徹䙝衣加以新衣體一人者四體各一人持之為其不能自屈伸也纊新綿輕而氣易動屬者置口鼻之上以候其氣之絶男不死女手女不死男手以别終也此言靜以待盡而不亂補君夫人卒於路寢大夫世婦卒於適寢內子未命則死於下室遷尸于寢士之妻皆死于寢適丁歷反路寢猶路車之路以大言也適寢猶適子之適以正言也內子卿之妻下室其燕處言寢者即正寢卿死者必皆於其正處鄭氏復有林麓則虞人設階無林麓則狄人設階小臣復復者朝服君以卷夫人以屈狄大夫以𤣥赬世婦以䄠衣士以爵辨士妻以稅衣皆升自東榮中屋履危北靣三號捲衣投于前司服受之降自西北榮其為賔則公館復私館不復其在野則升其乘車之左轂而復卷作衮屈音闕赬𠡠貞反䄠知彥反稅他亂反復者招新死之魂兾復還也虞人主林麓之官狄人樂吏之賤者階梯也所乘以升屋設階用虞人者以階之材出林麓無林麓者用狄人以樂人有簨虡亦階梯之類也復用小臣以君之所親近卷者衮衣屈狄即闕狄赬赤也榮屋翼危棟上復用死者之祭服求神之道也初復求生故升自東榮陽也求不得而還降自西北榮隂也本鄭氏孔氏說復衣不以衣尸不以斂婦人復不以袡凡復男子稱名婦人稱字唯哭先復復而後行死事袡而亷反復衣求生者故不用於死袡者嫁時上服非事鬼神之衣鄭氏始卒主人啼兄弟哭婦人哭踊啼如嬰兒失母哭有聲踊動容此言悲哀有深淺用鄭氏孔氏修既正尸子坐于東方卿大夫父兄子姓立于東方有司庶士哭于堂下北靣夫人坐于西方內命婦姑姊妹子姓立于西方外命婦率外宗哭于堂上北靣子姓謂衆子孫外宗姑姊妹之女世子夫人為主故坐男東女西各以其屬分立用鄭氏孔氏修大夫之喪主人坐于東方主婦坐于西方其有命夫命婦則坐無則皆立士之喪主人父兄子姓皆坐于東方主婦姑姊妹子姓皆坐于西方大夫變子言主人下於君也大夫之喪尊者坐卑者立士賤故尊卑皆坐陸氏方氏凡哭尸于室者主人二手承衾而哭承死者之衾而哭若欲攀援然方氏君之喪未小斂為寄公國賔出大夫之喪未小斂為君命出士之喪於大夫不當斂則出寄公謂失國之君來寄寓者國賔謂鄰國大夫來聘者出謂出而迎賔新喪悲哀非為所尊不出鄭氏凡主人之出也徒跣扱袵拊心降自西階君拜寄公國賔于位大夫於君命迎於寢門外使者升堂致命主人拜于下士於大夫親弔則與之哭不逆於門外扱初洽反此更明拜迎委曲之儀降自西階不忍當主位孔氏夫人為寄公夫人出命婦為夫人之命出士妻不當斂則為命婦出婦人亦各為其所尊出出謂出房補小斂主人即位于户內主婦東靣乃斂卒斂主人馮之踊主婦亦如之主人袒說髦括髮以麻婦人髽帶麻于房中馮皮氷反說他活反髽側瓜反髦者幼時剪髮為之至年長則垂著兩邉明事親常有孺子之義至親死乃脫之父喪脫左母喪脫右帶麻謂婦人要絰方氏徹帷男女奉尸夷于堂降拜君拜寄公國賔大夫士拜卿大夫於位於士旁三拜夫人亦拜寄公夫人於堂上大夫內子士妻特拜命婦汜拜衆賔於堂上奉芳勇反汜芳劒反此言小斂訖拜賔也於士旁三拜者拜卿大夫既於正位士故於旁士有三等不人人拜每一靣三拜孔氏主人即位襲帶絰踊母之喪即位而免乃奠弔者襲裘加武帶絰與主人拾踊免音問拾其劫反父喪小斂拜賔訖即位阼階之下襲衣要帶首絰而踊母喪拜賔訖即位時不復括髮以免代之免以襲絰至大斂乃成服所以異於父也武吉冠之卷音圈弔者加武明不改冠亦不免拾踊拾更也主人先踊婦人踊弔者踊三者皆是與主人更踊孔氏君喪虞人出木角狄人出壺雍人出鼎司馬縣之乃官代哭大夫官代哭不縣壺士代哭不以官君堂上二燭下二燭大夫堂上一燭下二燭士堂上一燭下一燭木給㸑角為㪺音俱水斗壺漏水器冬漏以火㸑鼎沸而沃之此挈壺氏所掌屬司馬故司馬臨縣其器凡未殯者哭不絶聲故小斂後縣漏分時均其官屬更代為哭息其罷倦燭所以照饌滅燎而設燭鄭氏孔氏賔出徹帷哭尸于堂上主人在東方由外來者在西方諸婦南鄉許亮反此小斂後尸出在堂時婦人迎客送客不下堂下堂不哭男子出寢門見人不哭其無女主則男主拜女賔于寢門內其無男主則女主拜男賔于阼階下子幼則以衰抱之人為之拜為後者不在則有爵者辭無爵者人為之拜在竟內則俟之在竟外則殯葬可也喪有無後無無主衰七雷反此明小斂後喪主人拜賔送賔之禮為後者不在則有爵者辭謂主有官爵出行不在家而家有喪則攝主為之辭於賔不敢當尊者禮若無爵者則人代之拜主人在竟內則俟其歸在竟外則攝主代之殯葬亦可也凡喪雖無後者必立之主故曰有無後無無主鄭氏孔氏君之喪三日子夫人杖五日既殯授大夫世婦杖子大夫寢門之外杖寢門之內輯之夫人世婦在其次則杖即位則使人執之子有王命則去杖國君之命則輯杖聽卜有事於尸則去杖大夫於君所則輯杖於大夫所則杖凡記杖之節也輯斂也杖所以自扶故於出門杖在寢則輯之於所尊輯之又尊者則去之補大夫之喪三日之朝既殯主人主婦室老皆杖大夫有君命則去杖大夫之命則輯杖內子為夫人之命去杖為世婦之命授人杖此明大夫喪之杖節授人杖亦使人執之也鄭氏士之喪二日而殯三日之朝主人杖婦人皆杖於君命夫人之命如大夫於大夫世婦之命如大夫此明士喪杖之節三日殯之明日也於君命夫人之命如大夫者言士之子於君命其妻於夫人之命皆如於大夫禮去杖也於大夫世婦之命如大夫者言士之子於大夫之命其妻於大夫妻之命如大夫之禮輯杖於世婦授人杖孔氏子皆杖不以即位庶子不以杖即位避適也正義大夫士哭殯則杖哭柩則輯杖棄杖者斷而棄之於隱者斷丁管反始殯子於父父也其尊近故哭殯杖將葬啓殯而見柩子於父父也君也其尊逺故哭柩不敢杖大祥斷杖棄幽隱處使不汙穢也合鄭氏孔氏說君設大盤造氷焉大夫設夷盤造氷焉士併瓦盤無氷設牀䄠第有枕含一牀襲一牀遷尸于堂又一牀皆有枕席君大夫士一也造七報反併步頂反䄠之善反第側里反含胡暗反造猶內也謂內氷盤中夷盤者小於大盤士無氷以瓦為盤併以盛水耳禮自仲春之後尸既小斂置氷於盤設牀其上去席䄠單也露第簀以通寒氣秋凉而止含也襲也遷尸也各一牀本鄭氏孔氏說始死遷尸于牀幠用斂衾去死衣小臣楔齒用角柶綴足用燕几君大夫士一也幠好胡反楔桑結反柶音四綴丁劣反幠覆也遷尸在牀用斂時之衾覆之楔拄也柶以角為之長六寸兩頭屈曲將含恐口閉急故使小臣以柶柱尸齒令開綴者拘足兩邉令直以便著屨本鄭氏孔氏說管人汲不說繘屈之盡階不升堂授御者御者入浴小臣四人抗衾御者二人浴浴水用盆沃水用枓浴用絺巾挋用浴衣如他日小臣爪足浴餘水棄于坎其母之喪則內御者抗衾而浴說吐活反繘均必反枓音主音斗挋音震此明浴之禮也管人主館舍者井竈其所主故主汲繘井索不脫繘屈之謂縈屈手中抗衾者蔽土形挋拭也爪足斷足爪也鄭氏孔氏管人汲授御者御者差沐于堂上君沐粱大夫沐稷士沐粱甸人為垼于西牆下陶人出重鬲管人受沐乃煮之甸人取所徹廟之西北厞薪用㸑之管人授御者沐乃沐沐用瓦盤挋用巾如他日小臣爪手翦須濡濯棄于坎差七何反垼音役重平聲鬲音歷厞扶味反此明沐之禮也差淅也淅飯米取其潘以為沐也沐粱者用粱米之潘也粱美而稷次士亦沐粱士賤去君逺無嫌也然士喪禮沐稻垼塹竈重鬲瓦瓶厞簷下隱陋處凡以煮沐也煮熟而授御者沐之濡謂煩撋其髮濯謂不淨之汁所濡濯汁棄坎中鄭氏孔氏賈氏君之喪子大夫公子衆士皆三日不食子大夫公子食粥納財朝一溢米莫一溢米食之無算士疏食水飲食之無算夫人世婦諸妻皆疏食水飲食之無算財謂穀即所食之米也溢二十兩為米一升二十四分升之一每日納所用之米朝莫各一溢居喪不能頓食隨須則食故云無算孔氏大夫之喪主人室老子姓皆食粥衆士疏食水飲妻妾疏食水飲士亦如之室老貴臣衆士衆臣子姓孫鄭氏孔氏既葬主人疏食水飲不食菜果婦人亦如之君大夫士一也練而食菜果祥而食肉既葬至練祥飲食之節孔氏食粥於盛不盥食於纂者盥食菜以醯醬始食肉者先食乾肉始飲酒者先飲醴酒纂悉緩反盛謂杯杅纂竹筥啜粥者不盥手飯者盥始食肉飲酒謂祥後孔氏期之喪三不食食疏食水飲不食菜果三月既葬食肉飲酒期終喪不食肉不飲酒父在為母為妻九月之喪食飲猶期之喪也食肉飲酒不與人樂之期之喪謂大夫士旁期之喪三不食謂三次當食而不食若期之正服則二日不食也食疏食水飲不食菜果者三月既葬則食肉飲酒此皆謂旁期之喪也繼曰期終喪不食肉不飲酒則謂期之正服者也父在而為母為妻及九月之喪食飲猶期之喪者亦謂厭於父而抑情故食飲猶旁期之喪也然雖食肉飲酒而不忍與人樂之補五月三月之喪一不食再不食可也比葬食肉飲酒不與人樂之叔母世母故主宗子食肉飲酒不能食粥羮之以菜可也有疾食肉飲酒可也五十不成喪七十唯衰麻在身世母伯母故主舊君叔母以下義服恩輕故食肉飲酒其不能食粥羮之以菜謂性不能食粥者可食飯菜羮鄭氏既葬若君食之則食之大夫父之友食之則食之矣不辟粱肉若有酒醴則辭順尊者之命可以食美變於顔色亦不可鄭氏小斂於户內大斂於阼君以簟席大夫以蒲席士以葦席簟細蒲次之葦粗補小斂布絞縮者一橫者三君錦衾大夫縞衾士緇衾皆一衣十有九稱君陳衣于序東大夫士陳衣于房中皆西領北上絞襟不在列絞户交反稱尺證反襟其鳩反絞既斂所以束堅者縮從也鄭氏大斂布絞縮者三橫者五布襟二衾君大夫士一也君陳衣于庭百稱北領西上大夫陳衣于序東五十稱西領南上士陳衣于序東三十稱西領南上絞襟如朝服絞一幅為三不辟襟五幅無紞辟補麥反紞丁覽反三衾或覆之或薦之如朝服謂布精粗朝服十五升一幅為三析之也不辟不擘之斷也紞以組類為之綴之領側若今被識生時禪被有識死去之異於生也鄭氏小斂之衣祭服不倒君無襚大夫士畢主人之祭服親戚之衣受之不以即陳小斂君大夫士皆用復衣復衾大斂君大夫士祭服無算君褶衣褶衾大夫士猶小斂也復音福褶音牒祭服指死者所用衣多不盡著有倒者惟祭服尊其領不倒君無襚者悉用己衣臣雖有襚者不用也畢主人之祭服凡祭服盡用之也褶夾古洽反也孔氏袍必有表不襌衣必有裳謂之一稱禪音單稱去聲袍必有表內外相稱衣必有裳上下相稱賈氏凡陳衣者實之篋取衣者亦以篋升降者自西階凡陳衣不詘非列采不入絺綌紵不入不詘謂舒而不卷列采謂五方正色襲尸冬夏用袍故絺綌紵不入孔氏鄭氏凡斂者袒遷尸者襲君之喪大胥是斂衆胥佐之大夫之喪大胥侍之衆胥是斂士之喪胥為侍士是斂斂者勞故袒遷者舉之而已故襲胥樂官君尊故大胥斂大夫降於君故衆胥斂士則朋友助之而已補小斂大斂祭服不倒皆左袵結絞不紐左袵袵向左反生時也袵衣襟也死則不復解故絞束畢結之不為紐女九反斂者既斂必哭士與其執事則斂斂焉則為之一不食凡斂者六人斂者必使所與執事之人不使他人䙝之鄭氏君錦冒黼殺綴旁七大夫𤣥冒黼殺綴旁五士緇冒赬殺綴旁三凡冒質長與手齊殺三尺自小斂以往用夷衾夷衾質殺之裁猶冒也殺色戒反裁才再反冒者既襲所用韜尸殺者冒之下裙所用韜足旁綴者其旁不縫用帶結之冒之質從頭韜下長與手齊殺從足韜上長三尺斂後衣多故用夷衾覆之夷衾質殺之裁猶冒也裁猶制也鄭氏孔氏君將大斂子辨絰即位于序端卿大夫即位于堂廉楹西北靣東上父兄堂下北靣夫人命婦尸西東靣外宗房中南靣小臣鋪席商祝鋪絞襟衾衣士盥于盤上士舉遷尸于斂上卒斂宰告子馮之踊夫人東靣亦如之記君大斂之禮商祝祝習商禮者孔氏大夫之喪將大斂既鋪絞襟衾衣君至主人迎先入門右巫止于門外君釋菜祝先入升堂君即位于序端卿大夫即位于堂亷楹西北靣東上主人房外南靣主婦尸西東靣遷尸卒斂宰告主人降北靣于堂下君撫之主人拜稽顙君降升主人馮之命主婦馮之巫主辟凶邪釋菜禮門神鄭氏士之喪將大斂君不在其餘禮猶大夫也君不在謂士卑君不視斂其餘鋪衣列位男女之儀悉如大夫孔氏鋪絞襟踊鋪衾踊鋪衣踊遷尸踊斂衣踊斂衾踊斂絞襟踊凡皆孝子踊之節君撫大夫撫內命婦大夫撫室老撫姪娣君大夫馮父母妻長子不馮庶子士馮父母妻長子庶子庶子有子則父母不馮其尸凡馮尸者父母先妻子後君於臣撫之父母於子執之子於父母馮之婦於舅姑奉之舅姑於婦撫之妻於夫拘之夫於妻於昆弟執之馮尸不當君所凡馮尸興必踊奉芳䝉反撫謂以手按之執當心上衣拘微引心上衣不當君所不敢與尊者所馮同處鄭氏孔氏父母之喪居倚廬不塗寢苫枕凷非喪事不言君為廬宫之大夫士䄠之既葬拄楣塗廬不於顯者君大夫士皆宫之凡非適子者自未葬以於隱者為廬凷與塊同䄠章善反宫謂圍障之䄠謂袒露之未葬不塗既葬塗之不於顯者不塗見靣於隱者為廬不欲人屬目廬蓋於東南角既葬與人立君言王事不言國事大夫士言公事不言家事未葬不與人並立既葬亦不言私君既葬王政入於國既卒哭而服王事大夫士既葬公政入於家既卒哭辨絰帶金革之事無辟也此權禮辨絰帶者變喪服而弔服輕可以即事也鄭氏既練居堊室不與人居君謀國政大夫士謀家事既祥黝堊祥而外無哭者禫而內無哭者樂作矣故也堊白也新塗堊牆壁令白也黝黑也黝堊者堊室之飾平治其地令黑也孔氏禫而從御吉祭而復寢期居廬終喪不御於內者父在為母為妻齊衰期者大功布衰九月者皆三月不御於內婦人不居廬不寢苫喪父母既練而歸期九月者既葬而歸從御御婦人復寢不復宿殯宫歸謂歸夫家鄭氏公之喪大夫俟練士卒哭而歸大夫士守君喪於公所之節大夫士父母之喪既練而歸月朔忌日則歸哭于宗室諸父兄弟之喪既卒哭而歸父不次於子兄不次於弟歸謂歸其宫也不次謂不居殯宫鄭氏君於大夫世婦大斂焉為之賜則小斂焉於外命婦既加蓋而君至於士既殯而往為之賜大斂焉夫人於世婦大斂焉為之賜小斂焉於諸妻為之賜大斂焉於大夫外命婦既殯而往恩輕者殯而後往恩重者大斂而往異恩者小斂即往為之賜言異恩也補大夫士既殯而君往焉使人戒之主人具殷奠之禮俟于門外見馬首先入門右巫止于門外祝代之先君釋菜于門內祝先升自阼階負墉南靣君即位于阼小臣二人執戈立于前二人立于後擯者進主人拜稽顙君稱言視祝而踊主人踊殷大也月朔之奠名殷奠大於朝夕之奠也稱言舉所以來之意也視祝而踊祝相君之禮故視之為節也鄭氏大夫則奠可也士則出俟於門外命之反奠乃反奠卒奠主人俟于門外君退主人送于門外拜稽顙君於大夫疾三問之在殯三往焉士疾一問之在殯一往焉君弔則復殯服明君來弔士與大夫禮不同夫人弔於大夫士主人出迎于門外見馬首先入門右夫人入升堂即位主婦降自西階拜稽顙于下夫人視世子而踊奠如君至之禮夫人退主婦送于門內拜稽顙主人送于大門之外不拜婦人迎送不出門故門內拜喪無二主故主人送于門外不拜此大夫士之妻送迎夫人之禮孔氏大夫君不迎于門外入即位于堂下主人北面衆主人南靣婦人即位于房中若有君命命夫命婦之命四鄰賔客其君後主人而拜四鄰賔客謂昔經使鄰國令卿大夫遣使來弔其君後主人而拜者君代主人拜喪禮以後為尊主人無二也孔氏賈氏君弔見尸柩而后踊大夫士若君不戒而往不具殷奠君退必奠君來不先戒當時雖不及具殷奠君去後必設奠以榮君之來孔氏君大棺八寸屬六寸椑四寸上大夫大棺八寸屬六寸下大夫棺六寸屬四寸士棺六寸屬音燭椑步歷反此明君大夫士棺重數厚薄之制大棺以其包於外故曰大屬則連屬於大棺故曰屬椑則親身而逼近故曰椑大棺及屬用梓椑用杝以支反凡二重合厚二尺一寸上大夫列國之卿也二重士一重天子則四重制見檀弓庶人棺四寸用孔氏賈氏修君裏棺用朱緑用雜金鐟大夫裏棺用𤣥緑用牛骨鐟士不緑鐟子南反裏棺謂以繒貼棺裏朱貼四方緑貼四角鐟釘也所以琢朱緑繒著裏士惟用𤣥鄭氏孔氏君蓋用漆三袵三束大夫蓋用漆二袵二束士蓋不用漆二袵二束蓋棺之上蓋也用漆者塗其合縫處袵謂燕尾合棺縫際也棺兩邉各三袵每當袵上輒以牛皮束之故三袵三束大夫士則殺其一孔氏君大夫鬊爪實于緑中士埋之鬊音舜爪側巧反鬊死者亂髮也併爪實緑中謂棺四角所貼之緑繒士棺四角不緑故埋之用孔氏修君殯用輴櫕至于上畢塗屋大夫殯以幬櫕置于西序塗不暨于棺士殯見袵塗上帷之輴勑倫反見賢遍反輴車所以載棺用輴謂置棺於輴之內櫕則聚木以周其外至於棺上四注如屋櫕畢則盡塗其屋幬覆也大夫棺不輴以棺衣覆幬之西序者屋堂西頭壁就牆櫕其三靣上不為屋塗不及其棺祍謂棺外祍束之祍也士不櫕掘地下棺見露其祍亦以木覆塗其上而帷之帷者鬼神尚幽暗也凡塗之為火偹也用孔氏賈氏修熬君四種八筐大夫三種六筐士二種四筐加魚臘焉熬者煎榖使香將塗則設于棺旁所以惑蚍蜉使不至棺君四種黍稷稻粱各二筐為八筐大夫去稻士去粱四筐者手足處各一餘設於左右魚臘亦惑蜉蚍用孔氏修飾棺君龍帷三池振容黼荒火三列黼三列素錦禇加僞荒纁紐六齊五采五貝黼翣二黻翣二畫翣二皆戴圭魚躍拂池君纁戴六纁披六大夫畫帷二池不振容畫荒火三列黻三列素錦禇纁紐二𤣥紐二齊三采三貝黻翣二畫翣二皆戴綏魚躍拂池大夫戴前纁後𤣥披亦如之士布帷布荒一池揄絞纁紐二緇紐二齊三采一貝畫翣二皆戴綏士戴前纁後緇二披用纁僞讀為帷齊才細切又如字披彼義反揄音遙飾棺以華道路不欲衆惡其親也帷者栁車邉障龍帷者王侯畫龍三池者織竹為籠衣以青布挂於荒之爪端以象平生宫室之有承霤名曰池天子四靣諸侯缺其後故三池振容者振動也容飾也以絞繒為之長丈餘如幡畫其上為雉縣於池下為容飾車行則動黼荒火三列黻三列者荒謂栁車之上覆緣荒之邉為黑白黼文中央又畫火火形如半環凡三列又畫黻黻形兩己字相背亦三列也素錦禇者禇屋也於荒下用白錦為屋在路象宫室也加僞荒者鄭氏讀僞為帷上蓋曰荒邉牆曰帷加帷荒於素錦屋之上也纁紐六者上蓋與邉牆相離故以纁繒為紐以連之旁各三凡六也齊五采五貝者齊象車蓋其鱉甲上當中形圓髙三尺徑二尺餘四靣有垂下象車蓋之蕤上下縫合五采繒行列相次又列貝為五行交絡齊上也黼翣二黻翣二畫翣二皆戴圭者翣形如扇以木為筐廣三尺髙二尺四寸以障柩車而行二畫黼二畫黻二畫雲氣兩角髙皆戴圭玉也魚躍拂池者縣銅魚於振容間車行則魚跳躍上拂池也君纁戴六纁披六者棺橫束有三每束兩邉屈皮為紐共六紐用纁帛戴索連繫於紐與外畔栁材相當故有六戴又用纁帛將一頭結此戴出一頭於帷外人牽之故有六披也大夫之數降於君戴綏者翣角不圭用五采羽作綏也士又降於大夫池揄絞者士惟一池在前亦畫揄雉於絞在池上鄭氏孔氏君葬用輴四綍二碑御棺用羽葆大夫葬用輴二綍二碑御棺用茅士葬用國車二綍無碑比出宫御棺用功布輴即殯時載柩之車也國車者豈士不為輴車止因常用之車歟綍即紼蓋引車者碑各一孔立於壙之前後以穿綍下柩於壙者羽葆以鳥羽注於柄末如蓋而御者執之為車行之節度士無碑手縣下之功布大功之布羽葆功布等其象皆如麾比出宫者既出宫後不用用孔氏修凡封用綍去碑負引君封以衡大夫士以咸君命毋譁以鼓封大夫命毋哭士哭者相止也封讀作窆咸讀作緘封周禮作窆下棺也衡平也咸緘也棺束為緘人君以木橫貫緘耳居旁持而平之大夫士旁牽緘而已鼓者擊鼓為縱舍之節鄭氏君松椁大夫柏椁士雜木松用松心孔氏棺椁之間君容柷大夫容壺士容甒音武間可藏物因以為度柷方二尺四寸壺大一石甒五斗鄭氏方氏君裏椁虞筐大夫不裏椁士不虞筐鄭氏曰裏椁之物虞筐之文未聞也陸氏曰裏椁裏其內虞筐虞其外黃氏日抄卷二十二
