body:
  text: 黄氏日抄卷八十二宋黃震撰講義撫州辛未冬至講義六經義理渾融本不易説諸儒講説精備亦何待説況某庸晩失學每讀先儒經解惟有拳拳敬信愧未能行得一句何敢更衍浮辭二廣文先生與前廡衆職事先輩乃誤以某為嘗有志於此者借之講席俾誦所聞某辭以今日之所少者不在講説而在躬行此真悃也乃辭至再而不獲亦惟始述區區之素見謂終不若反而相勉於躬行耳便祈指教子曰弟子入則孝出則弟謹而信汎愛衆而親仁行有餘力則以學文此章敎人為學以躬行為本躬行以孝弟為先文則行有餘力而後學之所謂文者又禮樂射御書數之謂非言語文字之末今之學者乃或反是豈因講造化性命之髙逺反忘孝弟謹信之切近乎然嘗思之二者本無異㫖也造化流行賦予萬物是之謂性而人得其至粹善性發見始於事親是之謂孝而推之為百行是孝也者其體源於造化流行之粹其用達為天下國家之仁本末一貫皆此物也故論語一書首章先言學次章即言孝弟至於性與天道則未嘗輕發其祕豈非孝弟實行正從性與天道中來聖門之學惟欲約之使歸於實行哉自夫性近習逺利欲易昏孟子不得已始敎人知性知天周子不得已又始曉人以太極陰陽五行無非指示此性之所從來使人知心之所具者即性性之所禀者即天虛靈瑩徹超然物表塵視軒冕芥視珠玉則見於事父從兄推之躬行踐履自然無玷無缺純是本然天性凡言性天之妙者正為孝弟之實也二程先生講眀周子之説以達於孔孟之説由性命而歸之躬行其説未嘗不兼舉後有學者宜已不待他求不幸有佛氏為吾儒之異端莊列之戲誕遁入禪學又為異端之異端雖其無父無君䘮失本心正與孝弟相反奈何程門言心彼亦於此時指虛空而言心程門言性彼亦於此時指處空而言性不惟大相反而適相亂彼之空虛反以髙廣而易入此之切實反以平常而易厭故二程既沒門人弟子多潜移於禪學而不自知雖晦翁朱先生初年亦㡬陷焉後始一切反而歸之平實平生用功多於論語平生説論語多主孝弟忠信至其言太極性命等説乃因一時行輩儒先相與講論而發亦本非其得已文公既沒其學雖盛行學者乃不於其切實而獨於其髙逺講學捨論語不言而必先大易説論語捨孝弟忠信不言而獨講一貫凡皆文公平日之所深戒學者乃自偏徇而莫知返入耳出口無闗躬行竊嘗譬之酌水者必浚其源浚其源為酌水計也反舍其水而不酌何義也食實者必溉其根溉其根為食實地也反棄其實而不食何見也正躬行者必精性理精性理為正躬行設也反置躬行於不問何為也漢唐老師宿儒泥於訓詁多不精義理近世三尺童子承襲緒餘皆能言義理然能言而不能行反出漢唐諸儒下是不痛省而速反之流弊當何如也竊意儒先講貫已精之餘正學者敬信服行之日由儒先之發眀以反求乎孔子之大㫖知性命之從來以歸宿於孝弟之實行守之以謹行之以信愛衆以推廣乎此親仁以増益乎此其本既立其用斯溥他日推之天下國家特舉而措之爾故曰人人親其親長其長而天下平恐必如此斯為實學又可更求多於言語間哉子曰君子欲訥於言而敏於行又曰古者言之不出恥躬之不逮也孔子之教人拳拳於躬行者如此此晦庵先生所以終身常讀論語某嘗竊謂人之初生知有父母而已及其少長逰戲徴逐往往至於忘返與父母漸疎終身慕父母者古今一大舜而已人之初學知有論語而已及其既長博習討論往往至於忘返遂與論語日疎終身讀論語者古今一晦庵而已學者常能以孔子之教為主以論語之説為正庶㡬不為時尚所移盖孔子之説萬世無弊自孟子而下之説皆隨時救弊者也吾徒尚當謹之哉臨汝書堂癸酉歳旦講義子曰參乎吾道一以貫之曾子曰唯子出門人問曰何謂也曾子曰夫子之道忠恕而已矣謹按聖門之指示要領在此一章異端之竊證空談亦在此一章故學者讀此章最不可不審夫萬事莫不有理學者當貫通之以理故夫子謂之一以貫然必先以學問之功而後能至於貫通之地故曾子釋之以忠與恕盖理固無所不在而人之未能以貫通者己私間之也盡己之謂忠推己及人之謂恕忠恕既盡己私乃克此理所在斯能貫通故忠恕者所能一以貫之者也夫子他日又嘗以告子貢曰汝以予為多學而識之者與非也予一以貫之此謂多學正所以求為貫通不可止於務多而已也顔子得此意故曰博我以文約我以禮約以禮則一以貫矣然非出於博文之外也孟子得此意故曰博學而詳説之將以反説約也反説約則一以貫矣然皆自博學詳説中來也聖賢之學首尾該貫昭然甚眀初未嘗單出而為一貫之説奈何異端之學既興蕩空之説肆行盡論語二十篇無一可借為蕩空之證者始節畧忠恕之説單摘一貫之語矯誣聖言自證已説以為天下之理自成一貫初無事於他求是不從事於博文而徑欲約禮也不從事於博學詳説而徑欲反説約也已非聖賢教人本㫖矣甚至挑剔新説謂不必言貫此道不必貫而本一嗚呼此有物混成之説也而可以亂聖言哉愚嘗攷其故其端盖自春秋戰國來矣夫道即理也粲然於天地間者皆理也不謂之理而謂之道者道者大路之名人之無有不由於理亦猶人之無有不由於路謂理為道者正以人所常行欲人之曉然易見而非超出於人事之外他有所謂髙深之道也唐虞三代之隆上之所行者皆此道下之所見者亦皆此道士之已達者以此道見之設施士之未達者以此道見之講眀大之為三綱五常細之為萬事萬物無非此道而何有異説周室既衰學校既廢上無與主張下無與講習士始分裂而四出得志於當世者外此道而為功名則為管晏之功利則為蘇張之從衡則為申韓之法術不得志於當世者外此道而為横議則為老聃之清虛則為莊列之寓言則為騶衍之誣誕凡皆道之不眀故也然得志於當世者其禍雖烈而禍猶止於一時不得志於當世者其説雖髙而禍乃及於萬世凡今之削髪緇衣喝佛罵祖者自以為深於禪學而不知皆戰國之士不得志於當世者戲劇之餘談也凡今之流於髙虚求異一世者自以為善談聖經而不知此即禪學亦戰國之士不得志於當世者展轉之流毒也天生夫子不於他時而獨於春秋之世正使於衆説淆亂之際立大中至正之極眀日用常行之道為天下萬世之師論語二十篇拳拳訓告惟以學問躬行惟以孝弟忠信獨於曾子之𢎞毅而告以一以貫之之説又獨於子貢之敏悟而啟以一以貫之之機以一而貫之是於功深力到之餘更求提綱挈領之要夫子教人意盖出此後世學者於曾子子貢平日之功尚未必一日用其力反欲盡畧論語二十篇而獨取一以貫之之章又於此章節畧忠恕之語而徑為一貫之説且貫者串物之名也而繩者所以串物者也必有物之可貫也然後得以繩而貫之必有積學之功講眀之素也然後得以理而貫之故曰一以貫之以云者用此以貫之之名也今直曰一貫并與以之一辭而去之是自成一貫他無講求已大不可況可併去貫字單出言一論語本文何嘗如此而天下亦安有此理哉愚所謂讀論語此章最不可不審者以此故也惟吾徒其深省而懋眀之餘姚縣學講義徳祐元年乙亥囘司紹興餘姚縣學震之所舊逰學舍諸長上皆震之所嘗承教今兹承乏鄉部誤蒙諸長上聮璧之翰謂文公朱先生亦嘗持此常平之節此邑又其所嘗經從之地以震曾讀文公之書俾誦所學其為謙徳甚至而其為説亦切矣然震竊謂講書正非文公之所以教也文公講學五十年未嘗為講義惟過玉山嘗有講義亦不過錄問答數語雖過餘姚之學而無餘姚縣學講書之事震何人而敢僣越況近世講書講者非所問聽者非所疑正文公疇昔之所戒耶辭至再三不獲已姑道區區鄙見以謂言之不若行之耳未知諸長上以為如何更乞賜教為幸子曰古者言之不出恥躬之不逮也古者舉古之人以警今之人也恥者謂言或過其行則古之人以為深恥也夫子此意正欲學者訥於言而敏於行耳盖理有自然本不待言四時行百物生天不待言而有自然之運化大之為三綱五常微之為薄物細故人亦不待言而各有自然之凖則此夫子所以歎天何言哉而謂予欲無言其有不得已而見於問答者亦皆正為學者躬行而發凡今見於論語二十篇者往往不過片言而止言之非艱行之惟艱聖門何嘗以能言為事自楊氏為我墨氏兼愛不力辯之則行之者差矣孟子始不得已而詳於言老氏清浄佛氏寂滅不力辯之則行之者差矣韓子始不得已而詳於言髙者論空虛卑者溺功利不力辯之則行之者差矣周子程子始又不得已而詳於言周程既沒學者談虛借周程之説售佛老之私向也以異端而談禪世猶知禪學自為禪學及其以儒者而談禪世因誤認儒學自為禪學以偽易真是非貿亂此而不闢其誤天下後世之躬行將又有大於楊墨以來之患者文公朱先生於是力主知行之説必使先眀義理别白是非然後見之躬行可免陷入異端之弊此其捄世之心甚切析理之説甚精學者因其言之已眀正其身之所行為聖為賢何所不可顧乃掇拾緒餘増衍浮説徒有終身之議論竟無一日之躬行甚至借以文奸轉以欺世風俗大壊甚不忍言文公所以講眀之初意夫豈若是然則今日其將何以捄此亦在眀吾夫子之訓而深以言之輕出為恥其形於言也常恐行有不類惕然愧恥而不敢輕於言其見於行也常恐不副所言惕然愧恥而不敢不勉於行則言日以精行日以脩庶㡬君子之歸而不至駸駸陷入虛誕欺罔之域則可無負於文公知行並進之訓矣君子小人之分決於言行之相顧與否言行之相顧不相顧又決於此心之知恥與否吾徒其可不日加警省而徒以多言為能哉黄氏日抄卷八十二
