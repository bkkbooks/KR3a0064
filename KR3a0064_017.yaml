body:
  text: 黃氏日抄卷十七宋黃震撰讀禮記四曾子問第七此篇多著處凶禮之變曾子所問三十七子游一子夏二故以曾子問名篇文類檀弓不知誰所集曾子問曰君薨而世子生如之何孔子曰卿大夫士從攝主北面於西階南大祝裨冕執束帛升自西階盡等不升堂命毋哭祝聲三告曰某之子生敢告升奠幣于殯東几上哭降衆主人卿大夫士房中皆哭不踊盡一哀反位遂朝奠小宰升舉幣大音泰禆婢支反三息暫反下同攝主謂上卿代君聽國政者禆服者天子六服大裘為上其餘為禆言禆者取其繢繡大祝禆衣而冠冕接神則吉服也祝聲三者以警神也几筵于殯東眀繼體也反位反朝夕之哭位也舉幣者舉而下埋之階間也此論君薨後世子生而告殯之禮禆冕吉服以告既告而後衆哭反位補三日衆主人卿大夫士如初位北面大宰大宗大祝皆禆冕少師奉子以衰祝先子從宰宗人從入門哭者止子升自西階殯前北面祝立于殯東南隅祝聲三曰某之子某從執事敢見子拜稽顙哭祝宰宗人衆主人卿大夫士哭踊三者三降東反位皆袒子踊房中亦踊三者三襲衰杖奠出大宰命祝史以名遍告于五祀山川奉芳勇反衰七雷反從才用反見賢遍反三日世子生之三日也如初如告生之時也大宰主教令之官大宗主宗廟之官少師主養子之官哭踊三者三每踊三度為一節如此者三故曰三者三此世子既生三日之後以名見于殯之禮宰宗人皆贊君事者子拜稽顙奉子者拜哭也踊襲衰杖成子禮也言北面著子雖幼莫不臣也言師著不可一日無師傅也鄭氏陸氏曽子問曰如已葬而世子生則如之何孔子曰大宰大宗從大祝而告于禰三月乃名于禰以名遍告及社稷宗廟山川君已葬而世子始生則告于禰禰父之主也父在三月而見始名故亦三月而名于禰補孔子曰諸侯適天子必告于祖奠于禰冕而出視朝命祝史告于社稷宗廟山川乃命國家五官而後行道而出告者五日而遍過是非禮也凡告用牲幣反亦如之五官五大夫典事者道而出祖道而出出必告于祖奠于禰反亦如之事死如事生也又及于社稷山川者推事親之道以事神也諸侯受命于天子為宗廟社稷山川之主將暫違去以適天子之國禮宜洞達周遍若此用方氏補諸侯相見必告于禰朝服而出視朝命祝史告于五廟所過山川亦命國家五官道而出反必親告于祖禰乃命祝史告至于前所告者而後聽朝而入五廟太祖與二昭二穆五官五大夫此言諸侯適異國見諸侯告行告至之禮視適天子之禮為殺補曾子問曰並有喪如之何何先何後孔子曰葬先輕而後重其奠也先重而後輕禮也自啓至葬不奠行葬不哀次反葬奠而後辭于殯遂修葬事其虞先重而後輕禮也殯古音賔並有喪謂父母若親同者同月死葬是奪情故先輕者奠是奉養故先重者次者大門外之右平生待賔之次凡柩車出葬至次則孝子哭盡哀今為先葬輕者故自啓殯及葬皆不更新奠行至次亦不哀以重者尚在殯于其輕而先葬者殺禮也反葬奠而後辭于殯遂修葬事此謂先葬輕者而反然後奠禮而告于未葬者之殯遂修後葬之事鄭氏改殯為賔謂告語于賔諸家皆從之蓋以反葬不復可言殯也不思葬以輕重分先後此正輕喪先葬畢然後再舉重喪而告于重者之殯不必改殯為賔補孔子曰宗子雖七十無無主婦非宗子雖無主婦可也宗子大宗子雖老無有無主婦者謂承祭祀也故雖七十猶娶然此謂無子孫者若有子孫則老而𫝊孔氏曾子問曰將冠子冠者至揖讓而入聞齊衰大功之喪如之何孔子曰內喪則廢外喪則冠而不醴撤饌而掃即位而哭如冠者未至則廢如將冠子而未及期日而有齊衰大功小功之喪則因喪服而冠除喪不改冠乎孔子曰天子賜諸侯大夫冕辨服于大廟歸設奠服賜服于斯有冠醮無冠醴父沒而冠則已冠掃地而祭于禰已祭而見伯父叔父而後饗冠者冠者謂賔贊冠禮醴重醮輕三加冠每一加一醮醴則三加後總一醴醴是古之酒故重酒是後代之法故輕若因喪而加喪冠則服除不復行冠禮不改冠乎曾子再問也天子賜辨冕歸設奠而服更不改冠夫子引類言之也父沒而冠之禮併言及之也用孔氏補曽子問曰祭如之何則不行旅酬之事矣孔子曰聞之小祥者主人練祭而不旅奠酬于賔賔弗舉禮也昔者魯昭公練而舉酬行旅非禮也孝公大祥奠酬弗舉亦非禮也旅酬者尸止爵之後主婦致爵于主人次主人致爵于主婦尸致爵于主人主婦主人酬賔及獻長兄弟衆兄弟內兄弟于房中賔酬長兄弟長兄弟酬衆賔衆賔酬衆兄弟此所謂旅酬見于特牲者也小祥不旅酬謂奠酬于主人主人酬于賔賔不舉主人所酬之觶至大祥則旅酬矣昭公小祥而旅酬孝公大祥而不旅酬過與不及皆非禮孔氏方氏曾子問曰大功之喪可以與于饋奠之事乎孔子曰豈大功耳自斬衰以下皆可禮也曾子曰不以輕服而重相為乎孔子曰非此之謂也天子諸侯之喪斬衰者奠大夫齊衰者奠士則朋友奠不足則取于大功以下者不足則反之曾子問曰小功可以與于祭乎孔子曰何必小功耳自斬衰以下與祭禮也曾子曰不以輕喪而重祭乎孔子曰天子諸侯之喪祭也不斬衰者不與祭大夫齊衰者與祭士祭不足則取于兄弟大功以下者饋奠謂在殯時與謂執事不足謂月朔殷奠有牲牢黍稷用人多朋友加麻故士奠用朋友天子諸侯斬衰者奠以服重者與祭所以重其喪也大夫服斬衰者不與避正君也士齊衰者不與避大夫也曾子疑身重服而與執事為輕喪重祭故夫子答之如此鄭氏方氏曽子問曰相識有喪服可以與于祭乎孔子曰緦不祭又何助于人前所謂喪服者與祭蓋喪祭也此所謂祭蓋吉祭也故雖緦麻之輕亦不與也用方氏補曽子曰廢喪服可以與于饋奠之事乎孔子曰說衰與奠非禮也以擯相可也廢猶除也已方除喪而復與他人之喪祭不可擯相非行事之正于禮或可用方氏孔氏補曾子問曰昏禮既納幣有吉日女之父母死則如之何孔子曰壻使人弔如壻之父母死則女之家亦使人弔父喪稱父母喪稱母父母不在則稱伯父世母壻已葬壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟使某致命女氏許諾而弗敢嫁禮也壻免喪女之父母使人請壻弗取而後嫁之禮也女之父母死壻亦如之父喪稱父以弔母喪稱母以弔各以其敵也世母即伯母無父母則稱伯父母以弔不得嗣為兄弟言遭喪不得成昏為夫婦有兄弟之義未成昏故託兄弟為辭遭喪之餘無望生全故以此辭于女女不敢嫁而待之服除而後成昏壻之于女氏父母死亦然補曽子問曰親迎女在塗而壻之父母死如之何孔子曰女改服布深衣縞總以趨喪女在塗而女之父母死則女反布深衣深衣之粗者縞白絹總束髮長八寸縞總以縞為總女嫁在塗聞壻之父母死即變服而往聞己之父母死即反而奔喪補如壻親迎女未至而有齊衰大功之喪則如之何孔子曰男不入改服于外次女入改服于內次然後即位而哭曾子問曰除喪則不復昏禮乎孔子曰祭過時不祭禮也又何反于初迎魚敬反曾子疑初昏遭喪不成禮喪除更為昏禮孔子謂祭禮奉祖先尚不追償昏禮飲生人不復可知孔說孔子曰嫁女之家三夜不息燭思相離也取婦之家三日不舉樂思嗣親也三月而廟見稱來婦也擇日而祭于禰成婦之義也離力智反不息燭將逺父母兄弟也不舉樂親之代謝感世變也廟見謂舅姑沒者稱來婦始來歸也祭于禰以婦有共養之禮用鄭說補曾子問曰女未廟見而死則如之何孔子曰不遷于祖不祔于皇姑壻不杖不菲不次歸葬于女氏之黨示未成婦也見賢遍反遷朝廟也皇大也皇祖姑壻之祖母同昭穆者菲草屨歸葬女氏以未廟見不得婦姑之命鄭氏禮氏曽子問曰取女而有吉日而女死如之何孔子曰壻齊衰而弔既葬而除之夫死亦如之以嘗請期故齊衰而弔然未成婦故葬而除服方氏曾子問曰喪有二孤廟有二主禮與孔子曰天無二日土無二王嘗禘郊社尊無二上未知其為禮也昔者齊桓公亟舉兵作僞主以行及反藏諸祖廟廟有二主自桓公始也喪之二孤則昔者衛靈公適魯遭季桓子之喪衛君請弔哀公辭不得命公為主客入弔康子立于門右北靣公揖讓升自東階西鄉客升自西階弔公拜興哭康子拜稽顙于位有司弗辨也今之二孤自季康子之過也與音餘亟起吏反鄉許亮反僞猶假也用兵以遷廟主行無則以主之命行齊桓公假為主以行歸而置于廟遂為二主哀公答衛公拜康子亦拜是為二孤之始鄭氏說曾子問曰古者師行必以遷廟主行乎孔子曰天子巡守以遷廟主行載于齊車言必有尊也今也取七廟之主以行則失之矣當七廟五廟無虛主虛主者惟天子崩諸侯薨與去其國與祫祭于祖為無主耳吾聞諸老聃曰天子崩國君薨則祝取羣廟之主而藏諸祖廟禮也卒哭成事而後主各反其廟君去其國大宰取羣廟之主以從禮也祫祭于祖則祝迎四廟之主主出廟入廟必蹕老聃云齊側皆反齊車金路示有齊敬之心天子崩諸侯薨則藏諸主于祖廟象有凶事而聚也君去國以廟主從鬼神依人而行者也主木主天子尺二寸諸侯一尺祝迎主祝接神者也蹕止行者老聃陳國苦縣賴鄉曲仁里人為周柱下史或為守藏吏鄭氏孔氏曾子問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯將出必以幣帛皮圭告于祖禰遂奉以出載于齊車以行每舍奠焉而後就舍反必告設奠卒斂幣玉藏諸兩階之間乃出蓋貴命也主命受命于主主在廟而受其命以行不以主行也補子游問曰喪慈母如母禮與孔子曰非禮也古者男子外有傅內有慈母君命所使教子也何服之有昔者魯昭少喪其母有慈母良及其死也公弗忍也欲喪之有司以聞曰古之禮慈母無服今也君為之服是逆古之禮而亂國法也若終行之則有司將書之以遺後世無乃不可乎公曰古者天子練冠以燕居公弗忍也遂練冠以喪慈母喪慈母自魯昭公始也昭公年三十乃喪齊歸猶無戚容又安能不忍于慈母天子練冠以燕居蓋謂庶子王為其母其言又非也家語云孝公有慈母良鄭氏孔氏曽子問曰諸侯旅見天子入門不得終禮廢者幾孔子曰四請問之曰大廟火日食后之喪雨霑衣失容則廢如諸侯皆在而日食則從天子救日各以其方色與其兵大廟火則從天子救火不以方色與兵曽子問曰諸侯相見揖讓入門不得終禮廢者幾孔子曰六請問之曰天子崩大廟火日食后夫人之喪雨霑衣失容則廢諸侯之廢禮增天子崩與夫人喪并天子之廢禮四為六補曽子問曰天子嘗禘郊社五祀之祭簠簋既陳天子崩后之喪如之何孔子曰廢曽子問曰當祭而日食大廟火其祭也如之何孔子曰接祭而已矣如牲至未殺則廢接祭謂接續行事遇變而遽不暇舒徐也本方氏說天子崩未殯五祀之祭不行既殯而祭其祭也尸入三飯不侑酳不酢而已矣自啓至于反哭五祀之祭不行已葬而祭祝畢獻而已飯扶晚反酳音𦙍三飯者尸三飯告飽則止若常禮則祝侑尸再飯天子之禮至十五飯今殺禮故三也酳者以酒滌口飯畢主人酌酒酳尸今殺禮故不酳也酢者主人酳尸尸酬主人今殺禮亦不酢也畢獻者攝主酳尸尸酢攝主攝主又獻祝而畢無獻佐食以下之禮也天子初崩哀戚未遑祭祀既殯而後祭不得純如吉禮既葬則祭禰從吉用孔氏補曽子問曰諸侯之祭社稷爼豆既陳聞天子崩后之喪君薨夫人之喪如之何孔子曰廢自薨比至于殯自啓至于反哭奉帥天子帥循也諸侯待既葬而祭亦如前章天子之殺禮補曽子問曰大夫之祭鼎爼既陳籩豆既設不得成禮廢者幾孔子曰九請問之曰天子崩后之喪君薨夫人之喪君之大廟火日食三年之喪齊衰大功皆廢外喪自齊衰以下行也其齊衰之祭也尸入三飯不侑酳不酢而已矣大功酢而已矣小功緦室中之事而已矣士之所以異者緦不祭所祭于死者無服則祭室中之事謂獻尸祝佐食耳大夫以喪廢祭者九士併緦不祭則小功亦不祭所廢凡十一于死者無服謂舅與舅之子及從母昆弟凡皆己之母親于已則服緦于已所祭之祖禰則無服位尊則以事而廢禮者少位卑則以事而廢禮者多重輕之别也方氏曽子問曰三年之喪弔乎孔子曰三年之喪練不羣立不旅行君子禮以飾情三年之喪而弔哭不亦虛乎不羣立旅行恐與人茍語而忘哀也已有喪而弔人之喪若為彼哀則忘己之親若為親哀則哭彼為虛本鄭氏說曽子問曰大夫士有私喪可以除之矣而有君服焉其除之也如之何孔子曰有君喪服于身不敢私服又何除焉于是乎有過時而弗除也君之喪服除而後殷祭禮也私喪私家之喪殷祭二祥之祭殷者其禮盛也初為君服不敢為親私除若君服除後乃可為親行二祥祭以伸孝心孔氏曽子問曰父母之喪弗除可乎孔子曰先王制禮過時弗舉禮也非弗能勿除也患其過于制也故君子過時不祭禮也曽子承前章問私喪可除遇有君服而弗除及君喪既除則于私喪但行殷祭而不再行除喪之禮是父母之喪弗除可乎孔子答謂時已過而不再舉因及祭不追補之事為證補曽子問曰君薨既殯而臣有父母之喪則如之何孔子曰歸居于家有殷事則之君所朝夕否殷事朔望薦新之奠君喪既殯而無事父母新喪而有事故常在家惟朔望奠則往君所補曰君既啓而臣有父母之喪則如之何孔子曰歸哭而反送君曰君未殯而臣有父母之喪則如之何孔子曰歸殯反于君所有殷事則歸朝夕否君已啓殯而遭私喪歸哭而返送君君未殯而遭私喪歸殯而反君所補大夫室老行事士則子孫行事大夫內子有殷事亦之君所朝夕否大夫卿之總稱內子大夫之適妻此承上文在君所時其家使人攝祭大夫妻于君之喪亦之君所朝夕否者君所朝夕之奠大夫有私喪者不與補賤不誄貴幼不誄長禮也唯天子稱天以誄之諸侯相誄非禮也誄力水反誄纍也纍列生時行迹讀之以作諡幼賤不誄貴長嫌諛也天子稱天以誄明非欺也諸侯不相誄防私也禮當誄于天子補曽子問曰君出疆以三年之戒以椑從君薨其入如之何孔子曰共殯服則子麻辨絰疏衰菲杖入自闕升自西階如小斂則子免而從柩入自門升自阼階君大夫士一節也椑薄厯反共音恭免音問戒猶備也椑周身小棺也共殯服謂君已大斂殯服謂布深衣苴絰散帶共之以待其至子嗣君也其子麻辨絰衰杖者棺柩未安不忍成服于外也闕觀闕也喪歸殯客位故入自闕升自西階此言已大斂于外而歸殯者也如方小斂歸而後大斂則其子惟加免于首亦未麻辨入自門升自阼階使如生還集補曽子問曰君之喪既引聞父母之喪如之何孔子曰遂既封而歸不俟子封古音窆胡如字既引謂喪在塗封封土于墳子謂嗣君君喪在塗而聞父母喪遂送君喪封墳即先反不待其嗣君鄭氏胡氏曽子問曰父母之喪既引及塗聞君薨如之何孔子曰遂既封改服而往葬時著免聞君喪則待葬畢改袒括髮而往鄭氏孔氏說曽子問曰宗子為士庶子為大夫其祭也如之何孔子曰以上牲祭于宗子之家祝曰孝子某為介子某薦其常事為于僞反上牲大夫少牢介副也有助義牲從貴祭從長補若宗子有罪居于他國庶子為大夫其祭也祝曰孝子某使介子某執其常事庶子之貴者攝祭仍用宗子主名補攝主不厭祭不旅不假不綏祭不配厭於艷反假讀為嘏厭謂飫神旅謂旅酬嘏謂受福綏祭謂既祭而藏其減毁之墮配謂祝辭以某妃配某氏庶子為攝主不敢備禮孔氏布奠于賔賔奠而不舉布奠謂主人酬賔布此奠爵于賔薦之北賔奠謂賔取薦北之爵奠于薦南而不舉此方酬之始而即不舉謂止而不行旅酬之事也亦承上文攝主不備禮而言所以釋不旅之義用鄭氏孔氏補不歸肉其辭于賔曰宗兄宗弟宗子在他國使某辭攝主不敢如常禮歸助祭者肉故辭以宗子在他國不得備禮也此亦承上文補曽子問曰宗子去在他國庶子無爵而居者可以祭乎孔子曰祭哉請問其祭如之何孔子曰望墓而為壇以時祭若宗子死告于墓而後祭于家宗子死稱名不言孝身沒而已子游之徒有庶子祭者以此若義也今之祭者不首其義故誣于祭也哉者以無正文疑而度量之辭身沒而已者以宗子死而代之祭終身不敢稱孝以自同于宗子至身沒而子繼則子可稱孝矣若順也首本也誣猶妄也宗子在他國而庶子無爵者攝之祭不敢祭于家避宗子也宗子死而代之祭雖祭于家而不敢稱孝亦避宗子也子游之徒有庶子祭者用之順于義也今之祭者不本于義妄而已也補曽子問曰祭必有尸乎若厭祭亦可乎孔子曰祭成喪者必有尸尸必以孫孫幼則使人抱之無孫則取于同姓可也祭殤必厭蓋弗成也祭成喪而無尸是殤之也孔子曰有隂厭有陽厭祭成人必有尸尸以象神蓋侑食而使之飫者也殤未成人祭之無尸直設饌食以厭飫其神故謂之厭也適殤隂厭祭于奧而其地暗也庶殤陽厭西北隅向户而其地明也曽子疑立尸以人代神遂問若厭祭不用尸亦可乎孔子謂祭成人而無尸是殤之也不可補曽子曰殤不祔祭何謂隂厭陽厭祭成人亦有隂厭陽厭今孔子于殤亦言有隂厭陽厭故曽子疑而問之然成人之祭迎尸之前祝酌奠奠之且饗是名隂厭尸起之後徹爼敦設西北隅是名陽厭隂厭陽厭蓋兼用之也祭殤者適則隂厭庶則陽厭禮不兼用名同而禮則異也孔子復條析之如後補孔子曰宗子為殤而死庶子弗為後也其吉祭特牲祭殤不舉無肵爼無𤣥酒不告利成是為隂厭凡殤與無後者祭于宗子之家當室之白尊于東房是謂陽厭肵音其吉祭者從卒哭後之祭也用特牲者尊宗子從成人也不舉者不舉肺也肵爼者尸所食歸餘之爼也𤣥酒者元酒用水也利成者利謂養而其禮成也凡隂厭者皆無此禮也當室之白謂西北隅得户眀處此謂陽厭而其禮又殺也曽子問曰葬引至于堩日有食之則有變乎且不乎孔子曰昔者吾從老聃助葬于巷黨及堩日有食之老聃曰丘止柩就道右止哭以聽變既明反而後行曰禮也反葬而丘問之曰夫柩不可以反者也日有食之不知其已之遲數則豈如行哉老聃曰諸侯朝天子見日而行逮日而舍奠大夫使見日而行逮日而舍夫柩不蚤出不莫宿見星而行者唯罪人與奔父母之喪者乎日有食之安知其不見星也且君子行禮不以人之親痁患吾聞諸老聃云堩古鄧反從才用反數音速使色吏反莫音暮痁始占反堩道塗也巷黨黨名也就道右者停柩在道東北嚮以對南嚮而行來之人使之相左凡吉事交相左凶事交相右柩處右而使行來者相左也已止也數讀為速舍奠每將舍奠行主也痁病也柩行不見星懼姦慝也日食未知還明之時安知其不見星若冒行是以人之親病于危亡之患故老子戒其止不行而孔子述其言補曽子問曰為君使而卒于舍禮曰公館復私館不復凡所使之國有司所授舍則公館已何謂私館不復也孔子曰善乎問之也自卿大夫士之家曰私館公館與公所為曰公館公館復此之謂也復者始死招魂曽子疑使者所舍皆公館安有私館不復之禮孔子謂士大夫自相停舍為私館公家所造之館與公家所為使之停舍者為公館公館情伸可復私館妨其主人情屈不可復補曽子問曰下殤土周葬于園遂輿機而往塗邇故也今墓逺則其葬也如之何孔子曰吾聞諸老聃曰昔者史佚有子而死下殤也墓逺召公謂之曰何以不棺斂于宫中史佚曰吾敢乎哉召公言于周公周公曰豈不可史佚行之下殤用棺衣棺自史佚始也倌古患反土周者堲周夏之瓦棺也園者墓園有草木處不逺葬于墓也輿機機者尸之牀輿謂抗舉之以繩輿舉其牀以適于園就移入土周不斂于室也史佚者周成王時賢史下殤不斂于宫中以葬于園路近也曽子問若路逺當如何孔子述老子之言謂昔史佚下殤路逺召公勸斂于宫中不敢謀之周公以為可而行之矣用棺衣棺謂宫中用棺早斂至墓又衣以棺也集曽子問曰卿大夫將為尸于公受宿矣而有齊衰內喪則如之何孔子曰出舍于公館以待事禮也孔子曰尸辨冕而出卿大夫士皆下之尸必式必有前驅受宿謂受宿齊戒也既受宿而有齊衰之喪出舍公館待祭事畢然後歸哭孔子因併言尸出之禮孔氏子夏問曰三年之喪卒哭金革之事無辟也者禮與初有司與孔子曰夏后氏三年之喪既殯而致事殷人既葬而致事記曰君子不奪人之親亦不可奪親也此之謂乎子夏曰金革之事無辟也者非與孔子曰吾聞諸老聃曰昔者魯公伯禽有為為之也今以三年之喪從其利者吾弗知也與音餘子夏問居喪而事金革禮歟始于有司之命歟孔子告以古禮居喪則致其事子夏因又問然則居喪而事金革者非歟孔子又述老子之言謂伯禽居喪而伐徐戎者國事之急有為為之也今貪人土地利而為之者吾不知其可也補黃氏日抄卷十七
