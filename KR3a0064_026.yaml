body:
  text: 黄氏日抄卷二十六宋黄震撰讀禮記十三表記第三十二子言之歸乎君子隠而顯不矜而莊不厲而威不言而信歸乎者孔子歴聘不遇將歸老於魯如在陳曰歸與歸與者也下四者皆言盛徳自然之形著用孔氏補子曰君子不失足於人不失色於人不失口於人是故君子貌足畏也色足憚也言足信也甫刑曰敬忌而罔有擇言在躬不失於人謂交際之間敬謹也惟不失足於人故其貌足畏惟不失色於人故其色足憚惟不失口於人故其言足信甫刑書篇名忌戒也惟敬戒故無可擇之言在躬盖舉一端為證躬書作身補子曰裼襲之不相因也欲民之毋相瀆也裼袒衣也襲不袒也盖裘䙝服也不可以敬事故有衣以覆之袒而見美曰裼不袒而充美曰襲禮盛者不文則以襲為敬如大裘不裼賔襲執圭是也禮不盛者尚文則以裼為敬如君在則裼無事則裼受饗之時賔裼奉束帛加璧是也不相因者恐一時或有異事必易服從事各存其敬不以襲衣而因為裼不以裼衣而因為襲盖節文既辨而又不憚其勞則無相䙝之患子曰祭極敬不繼之以樂朝極辨不繼之以倦極敬者誠意至也茍至於樂則敬弛極辨者節文明也茍至於倦則入於茍簡子曰君子慎以辟禍篤以不揜恭以逺恥君子經徳不回所以正行則其戒謹篤恭皆非有為而為之也豈區區於避禍患防揜恥乎記禮之垂是言亦以曉人知避困辱之道耳子曰君子莊敬日强安肆日偷君子不以一日使其躬儳焉如不終日儳者參錯不齊之貌心無所檢束而紛紜雜亂遂至儳焉錯出外既散亂而不整則内亦拘迫而不安故不能終日也若主一以直内而心廣體胖何至於如不終日乎子曰齊戒以事鬼神擇日月以見君恐民之不敬也幽明之交上下之際尤其所當敬者故並言之子曰狎侮死焉而不畏也猥侮至於死而不畏者蔽其所䙝也子曰無辭不相接也無禮不相見也欲民之毋相䙝也易曰初筮告再三瀆瀆則不告辭者相接之言所以通情也禮者相見之贄所以將敬也䙝瀆也引易䝉卦辭證無相䙝瀆之義用吕氏方氏補自君子隠而顯至此為一章大指皆言敬天台賈氏子言之仁者天下之表也義者天下之制也報者天下之利也子曰以徳報徳則民有所勸以怨報怨則民有所懲詩曰無言不讎無徳不報太甲曰民非后無能胥以寜后非民無以辟四方子曰以徳報怨則寛身之仁也以怨報徳則刑戮之民也讎猶荅也仁以表率天下義以制抑天下報謂禮也禮以品節於仁義之間故以徳報徳者仁也民有所勸是即為天下之表以怨報怨者義也民有所懲是即為天下之制有所勸矣民知徳而不䧟乎惡有所懲矣民知法而不䧟乎罪是禮之報為天下之利然所能為天下之利者政以徳怨之報皆出於天下之公而已有徳於民者民欲報之以官有功於民者民欲報之以賞因民所欲而官之賞之所謂以徳報徳而民知所勸也傷人者民欲報之以刑賊人者民欲報之以殺因民所欲而刑之殺之所謂以怨報怨而民知所懲也若夫民之私徳豈無相報哉惟不可使懐私恩者廢公議復私讎者亂國法此報之所以為法也詩曰無言不讎無徳不報則言與徳無不報也太甲曰民非后無能胥以寜后非民無以辟四方則上與下亦有相報也若以徳報怨雖過乎寛而本於厚未害其為仁也以怨報徳則反易天常天下之亂民法所當誅者也君子欲蹈乎中庸則莫如孔子所謂以直報怨以徳報徳也延平黄氏藍田吕氏子曰無欲而好仁者無畏而惡不仁者天下一人而已矣是故君子議道自已而置法以民子曰仁有三與仁同功而異情與仁同功其仁未可知也與仁同過然後其仁可知也仁者安仁知者利仁畏罪者强仁强其兩反無欲而好仁無畏而惡不仁安仁者也一人而已喻少也有欲而好仁利仁者也其次也有畏而惡不仁强仁者也又其次也議道以己仁所同也置法以民有欲有畏者不同也仁有三即指安仁好仁强仁言之也與仁同功以三者之情雖異及其成功則一而未知其孰為安者利者强者故曰其仁未可知也與仁同過則或安而行之或利而行之或强而行之皆可得而見所謂人之過也各於其黨觀過斯知仁矣故曰然後其仁可知也同功言其終之至於仁一也異情言無欲有欲無惡有惡其始之行仁各不同也用吕氏補仁者右也道者左也仁者人也道者義也厚於仁者薄於義親而不尊厚於義者薄於仁尊而不親道有至有義有考至道以王義道以霸考道以為無失右者人所有事左者居於不用之地而助右之所不及者也仁者人之體也將有為有行非仁不可故曰仁者右也又曰仁者人也道者天之理也仁至於不可行不可以無節則理有所不得已而助人之所不及者義也故曰道者左也又曰道者義也仁莫隆於父子父子之道親親也義莫重於君臣君臣之道尊尊也厚於此則薄於彼厚於彼則薄於此惟知其所以為左右則尊尊親親並行而不悖無厚薄之間矣至道者至於道之極不可以有加也故以王義道者揆道而裁之者也故以霸考道者稽考於道而事不輕舉者也故亦可以無失凡皆藍田吕氏之説程氏云本不可如此分别集自仁者天下之表至此一章皆泛論仁義天台賈氏子言之仁有數義有長短小大中心憯怛愛人之仁也率法而强之資仁者也詩云豐水有芑武王豈不仕詒厥孫謀以燕翼子武王烝哉數世之仁也國風曰我今不閱皇恤我後終身之仁也􅉃七感反數世之數所五反仁有數言不一也所以然者以義之所處長短小大各不同也中心惻怛之仁大者也率法而强之仁小者也數世之仁長者也終身之仁短者也補子曰仁之為器重其為道逺舉者莫能勝也行者莫能致也取數多者仁也夫勉於仁者不亦難乎是故君子以義度人則難為人以人望人則賢者可知已矣子曰中心安仁者天下一人而已矣大雅曰徳輶如毛民鮮克舉之我儀圖之惟仲山甫舉之愛莫助之器重道逺與論語任重道逺同義取數多者言計天下之道仁居其多也以義度人言以義理而擬度人則人之能中其度者少當以時人相比方耳詩大雅烝民篇引此以明舉仁者少用鄭氏補小雅曰髙山仰止景行行止子曰詩之好仁如此鄉道而行中道而廢忘身之老也不知年數之不足也俛焉日有孳孳斃而后已子曰仁之難成久矣人人失其所好故仁者之過易辭也行平聲好去聲郷音嚮小雅車舝之篇景行大道也中道而廢言力罷而始休於中道非中道而畫之廢也人人失其所好言不知好仁也仁者之過易辭謂人皆不知好仁苟有好仁者雖或不免於過而其情本善亦易為辭説以明為仁者人不可得而疵而人當勇於仁也補子曰㳟近禮儉近仁信近情敬讓以行此雖有過其不甚矣夫恭寡過情可信儉易容也以此失之者不亦鮮乎詩云温温恭人惟徳之基禮主於敬故恭近禮儉不費用無害於物故近仁言語信實故近情儉易容者儉則寡求故易容也詩大雅抑之篇引之以結上文恭近禮孔氏子曰仁之難成久矣唯君子能之是故君子不以其所能者病人不以人之所不能者愧人是故聖人之制行也不制以已使民有所勸勉愧恥以行其言禮以節之信以結之容貌以文之衣服以移之朋友以極之欲民之有壹也小雅曰不愧于人不畏于天不制以己以中人為制使天下皆可效法能者勸勉不能者愧恥各得以行其言朋友以極之謂相勉勵以極致於道也欲民之有壹謂示民以中制使皆得歸於一也鄭氏孔氏是故君子服其服則文以君子之容有其容則文以君子之辭遂其辭則實以君子之徳是故君子恥服其服而無其容恥有其容而無其辭恥有其辭而無其徳恥有其徳而無其行是故君子衰絰則有哀色端冕則有敬色甲胄則有不可辱之色詩云惟鵜在梁不濡其翼彼記之子不稱其服遂猶成也無其行謂不行其徳詩曹國風候人之篇梁魚梁鵜食魚者鵜之求食不之澤而之梁無濡翼之勞而坐得食如人無功而受顯服也記詩作其鄭氏吕氏此章自仁有數至此言仁之難成惟君子勉之有道則不難成賈氏子言之君子之所謂義者貴賤皆有事於天下天子親耕粢盛秬鬯以事上帝故諸侯勤以輔事於天子天子事上帝諸侯事天子講義子曰下之事上也雖有庇民之大徳不敢有君民之心仁之厚也是故君子恭險以求役仁信讓以求役禮不自尚其事不自尊其身儉於位而寡於欲讓於賢卑己而尊人小心而畏義求以事君得之自是不得自是以聴天命詩云莫莫葛藟施于條枚凱弟君子求福不回其舜禹文王周公之謂與有君民之大徳有事君之小心詩云惟此文王小心翼翼昭事上帝聿懐多福厥徳不回以受方國役為也又行也此言下事上之義名分一定而上下之禮不可易故雖有君民之大徳不敢忘事君之小心馬氏子曰先王諡以尊名節以壹惠恥名之浮於行也是故君子不自大其事不自尚其功以求處情過行弗率以求處厚彰人之善而美人之功以求下賢是故君子雖自卑而民敬尊之節以壹惠謂死者雖身兼數善諡者獨取一善而名以節孝子慈孫惠愛無窮之心寜使行有餘而名不足毋寜使名之浮於行也以求處情謂不欲虚為矯飾情者實也行過弗率謂有過即改不復循行率者循也人之過也多過於薄有過而改故曰以求處厚用方氏補子曰后稷天下之為烈也豈一手一足哉惟欲行之浮於名也故自謂便人自謂便人言不自以為天下之烈而止自以為便於稼穡之人盖謙辭也補此章言事君之義雖有大功不敢自居補子言之君子之所謂仁者其難乎詩曰凱弟君子民之父母凱以强教之弟以說安之樂而毋荒有禮而親威莊而安孝慈而敬使民有父之尊有母之親如此而后可以為民父母矣非至徳其孰能如此乎强其良反又其兩反説音悦詩大雅泂酌之篇凱樂也此以為强教者和樂之中又有强盛之狀凱風長養之風也凱樂戰勝之樂也八凱性和而有才者也皆有强盛意吕氏今父之親子也親賢而下無能母之親子也賢則親之無能則憐之母親而不尊父尊而不親水之於民也親而不尊火尊而不親土之於民也親而不尊天尊而不親命之於民也親而不尊鬼尊而不親命謂政令鬼謂祭祀子曰夏道尊命事鬼敬神而逺之近人而忠焉先禄而後威先賞而後罰親而不尊其民之敝憃而愚喬而野朴而不文殷人尊神率民以事神先鬼而後禮先罰而後賞尊而不親其民之敝蕩而不靜勝而無恥周人尊禮尚施事鬼敬神而逺之近人而忠焉其賞罰用爵列親而不尊其民之敝利而巧文而不慙賊而蔽逺于萬反近去聲喬音驕又如字命命令也喬謂自髙大不必音為驕吕氏子曰夏道未瀆辭不求備不大望於民民未厭其親殷人未瀆禮而求備於民周人强民未瀆神而賞爵刑罰窮矣厭於豔反强其兩反瀆辭謂再三告之瀆禮謂煩文民未厭其親謂待民以寛民亦未厭其上下相親之心也强民謂承殷難變之敝故强之也不求備不大望謂寛易求備則細矣賞罰窮謂極於此矣鄭孔方補子曰虞夏之道寡怨於民殷周之道不勝其敝子曰虞夏之質殷周之文至矣虞夏之文不勝其質殷周之質不勝其文此章明四代質文之異虞夏政寛殷周文煩而敝也孔氏子言之曰後世雖有作者虞帝弗可及也已矣君天下生無私死不厚其子子民如父母有㦧怛之愛有忠利之教親而尊安而敬威而愛富而有禮惠而能散其君子尊仁畏義恥費輕實忠而不犯義而順文而靜寛而有辨甫刑曰徳威惟威徳明惟明非虞帝其孰能如此乎􅉃七感反忠利之教謂其教之也非以罔之將以忠之也非以害之將以利之也恥費謂奉己有節輕實謂予人無吝實謂財貨也所引甫刑今書以明堯徳記者引以結舜徳陸氏孔氏鄭氏方氏自君子之所謂仁者其難乎至此言君子之仁兼乎尊親然後可以為民父母因歴言四代之道賈氏子言之事君先資其言拜自獻其身以成其信是故君有責於其臣臣有死於其言故其受禄不誣其受罪益寡子曰事君大言入則望大利小言入則望小利故君子不以小言受大禄不以大言受小禄易曰不家食吉拜自獻其身謂君既先資其言乃親進為君言也大言大利小言小利横渠謂利非歸己之利大言入則吾道可大行是大利也愚謂此病漢儒之說太卑故陳髙誼以張之耳按本文所謂大利明指大禄而言未嘗及於行道特以小言者不敢望大利為安分義各有在也補子曰事君不下逹不尚辭非其人弗自小雅曰靖共爾位正直是與神之聼之式榖以女子曰事君逺而諫則讇也近而不諫則尸利也子曰邇臣守和宰正百官大臣慮四方子曰事君欲諫不欲陳詩云心乎愛矣瑕不謂矣中心藏之何日忘之不下逹不自通於君不尚辭不以飾辭而進弗自之自如論語奚自之自非其人弗自茍非其人不主之以進身也逺而諫則讇謂諫諍自有近臣在逺而諌則有求進之嫌也若身為近臣而反不諫則是尸利尸利謂不事其事而徒享其利也邇臣守和和謂和平不徇其君之喜怒也宰正百官宰謂冡宰正百官其職也欲諫不欲陳諫謂入諌於君陳謂陳其君之過於外也詩小雅隰桑之篇瑕胡也補子曰事君難進而易退則位有序易進而難退則亂也故君子三揖而進一辭而退以逺亂也子曰事君三違而不出竟則利禄也人雖曰不要吾弗信也子曰事君慎始而敬終子曰事君可貴可賤可富可貧可生可殺而不可使為亂逺于萬反進以禮故難退以義故易亂謂無序也違謂道不合不可使為亂言守節不變也補子曰事君軍旅不辟難朝廷不辭賤處其位而不履其事則亂也故君使其臣得志則慎慮而從之否則孰慮而從之終事而退臣之厚也易曰不事王侯髙尚其事辟避同履猶行也君使其臣謂使之聘問師役之屬也得志謂事之當行與己之志合也慎慮而從欲其必有成也否謂事之難行非己之所欲也孰慮而從盖必不得已而從之終事而退非己志者事成則去之也易蠱卦上九爻辭此言事君之義而引髙尚之說者盖承終事而退之意或曰惟不事王侯乃可髙尚以反證事君當盡職之義亦通用鄭氏補子曰惟天子受命於天士受命於君故君命順則臣有順命君命逆則臣有逆命詩曰鵲之姜姜鶉之賁賁人之無良我以為君賁音奔此重述事君不可使為亂之義言君命有不順則臣弗從之矣盖以明君之出命不可不謹也詩鄘國風鶉之奔奔篇姜姜賁賁爭鬭惡貌此詩刺衛君無徳國人恥以為君盖君逆天命而臣子亦逆君命之證鄭氏孔氏吕氏自事君先資其言至此皆論事君之義賈氏子曰君子不以辭盡人故天下有道則行有枝葉天下無道則辭有枝葉是故君子於有喪者之側不能賻焉則不問其所費於有病者之側不能饋焉則不問其所欲有客不能館則不問其所舎故君子之接如水小人之接如醴君子淡以成小人甘以壊小雅曰盗言孔甘亂是用餤音談不敢以辭盡人謂當有其實如下文不敢問所費問所欲問所舎皆不敢以辭盡人也詩巧言篇證甘以壊之義子曰君子不以口譽人則民作忠故君子問人之寒則衣之問人之飢則食之稱人之美則爵之國風曰心之憂矣於我歸說子曰口惠而實不至怨菑及其身是故君子與其有諾責也寜有己怨國風曰言笑晏晏信誓旦旦不思其反反是不思亦已焉哉子曰君子不以色親人情䟽而貌親在小人則穿窬之盗也與子曰情欲信辭欲巧譽音餘衣食並去聲説音帨又始悦反與平聲諾責謂諾而不予為人責償也已怨謂絶而不許為人所怨也諾而不予者虚言絶而不許者直情故寜有此勿有彼也辭欲巧謂善其辭然先曰情欲信而後曰辭欲巧故與巧言令色之巧不同補自君子不以辭盡人至此皆言接人之義賈氏子言之昔三代明王皆事天地之神明無非卜筮之用不敢以其私䙝事上帝是故不犯日月不違卜筮卜筮不相襲也大事有時日小事無時日有筮外事用剛日内事用柔日不違龜筮不犯日月謂大事有時日如冬至祭天夏至祭地之類守其日月之常不敢犯而越之也不違卜筮謂小事無時日而有筮外事用剛日内事用柔日卜筮而吉即遵而用之也不相襲卜則不再筮也吕氏方氏子曰牲牷禮樂齊盛是以無害乎鬼神無怨乎百姓子曰后稷之祀易富也其辭恭其欲儉其禄及子孫詩曰后稷兆祀庶無罪悔以迄于今齊音咨牲牷禮樂齊盛有常故幽則無害乎鬼神言不廢祀也明則無怨乎百姓言皆正供也易富謂易備惟恭儉而有常是以易備也引詩生民篇自后稷兆祀迄今無罪悔以證易備而可久無害於鬼神無怨乎百姓之意所謂禄及子孫盖指迄于今而言補子曰大人之器威敬天子無筮諸侯有守筮天子道以筮諸侯非其國不以筮卜宅寢室天子不卜處太廟大人之器謂龜也威敬謂不敢䙝用於小事也天子無筮者天子體尊在國中有事皆用龜卜而不以筮至於廵守征伐在道則以筮盖以龜當敬而不可䙝也諸侯有守筮者筮櫝不以出國惟天子所在為家雖在道亦以筮諸侯出竟則使人守筮於其國盖不敢問吉凶於他人之國且辟天子也卜宅寢室者立宅必卜寢室之吉也天子不卜處太廟者為宫室之法寢室宅其中宗廟處其左卜者卜其中而已中定則左右可知故但卜寢室之所宅不卜宗廟之所處雖天子之廟無卜也一説諸侯適他國無他卜惟卜寢室若天子則不待卜惟以處諸侯之祖廟為常未知孰是孔氏吕氏江陵項氏横渠張氏子曰君子敬則用祭器是以不廢日月不違龜筮以敬事其君長是以上不瀆於民下不䙝於上長丁丈反敬則用祭器謂朝聘待賔客崇敬不敢用燕器也不廢日月如一嵗之朝覲一日之朝夕不違龜筮者欲見其君長及其所貢獻皆卜筮而後進也君子之事其君長與其事天地鬼神其敬一也鄭氏吕氏此章自昔三代明王至此言事天事君至敬而不敢䙝故有卜筮因言卜筮之用賈氏黄氏日抄卷二十六
