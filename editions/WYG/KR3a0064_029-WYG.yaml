body:
  text: 黄氏日抄卷二十九宋黄震撰讀禮記十六冠義第四十三凡人之所以為人者禮義也禮義之始在於正容體齊顔色順辭令容體正顔巴齊辭令順而后禮義備以正君臣親父子和長㓜君臣正父子親長㓜和而后禮義立故冠而后服備服備而后容體正顔色齊辭令順故曰冠者禮之始也是故古者聖王重冠古者冠禮筮日筮賔所以敬冠事敬冠事所以重禮重禮所以為國本也故冠於阼以著代也醮於客位三加彌尊加有成也已冠而字之成人之道也見於母母拜之見於兄弟兄弟拜之成人而與為禮也𤣥冠𤣥端奠摯於君遂以摯見於鄉大夫鄉先生以成人見也長丁丈反冠古亂反見賢遍反摯音至國本國以禮為本也酌而無酬酢曰醮户西為客位三加者始加緇布冠次加皮弁次加爵弁𤣥冠𤣥端上士則𤣥裳中士則黄裳下士則雜裳以其初成人故着𤣥端異於朝服也鄭氏孔氏成人之者將責成人禮焉也責成人禮焉者將責為人子為人弟為人臣為人少者之禮行焉將責四者之行於人其禮可不重與故孝弟忠順之行立而后可以為人可以為人而后可以治人也故聖王重禮故曰冠者禮之始也嘉事之重者也是故古者重冠重冠故行之於廟行之於廟者所以尊重事尊重事而不敢擅重事不敢擅重事所以自卑而尊先祖也與音餘嘉事嘉禮也冠屬嘉禮不敢擅謂行於廟鄭氏孔氏昏義第四十四昏禮者將合二姓之好上以事宗廟而下以繼後世也故君子重之是以昏禮納采問名納吉納徴請期皆主人筵几於廟而拜迎於門外入揖譲而升聽命於廟所以敬慎重正昏禮也此言婚禮之始娶妻以昏為期故曰昏禮納采者始納采擇之禮問名者問其母姓名儀禮疏以為問其女始生時日月之名晦庵以為未詳孰是納吉者男家得吉卜以告女氏也納徴者納聘財也請期者請成昏禮之期也與親迎凡六禮命謂壻家之命主人聽之於廟孔氏父親醮子而命之迎男先於女也子承命以迎主人筵几於廟而拜迎于門外壻執鴈入揖譲升堂再拜奠鴈蓋親受之於父母也降出御婦車而壻授綏御輪三周先俟于門外婦至壻揖婦以入共牢而食合卺而酳所以合體同尊卑以親之也迎魚敬反卺音謹酳音􅉙此言親迎之禮父以酒醮子而命之親迎女之父筵几於廟以敵禮待之奠鴈禮畢親受婦於其父母婦升車之時壻授婦以綏御婦車之輪三匝御者代之壻自乘其車先𨗳之歸共牢而食者共一牲牢而食不使尊卑有殊也合􅈟而酳以一瓠分為兩瓢謂之卺壻與婦各執其一以酳酳者食畢飲酒演安其氣也孔氏敬慎重正而后親之禮之大體而所以成男女之别而立夫婦之義也男女有别而后夫婦有義夫婦有義而后父子有親父子有親而后君臣有正故曰昏禮者禮之本也夫禮始於冠本於昏重於䘮祭尊於朝聘和於鄉射此禮之大體也别彼列反此言成昏之禮因明昏禮為諸禮之本孔氏夙興婦沐浴以俟見質明賛見婦於舅姑婦執笲棗栗叚脩以見賛醴婦婦祭脯醢祭醴成婦禮也舅姑入室婦以特豚饋明婦順也厥明舅姑共饗婦以一獻之禮奠酬舅姑先降自西階婦降自阼階以著代也笲音煩又皮彦反叚丁亂反賛相禮者也笲器名以葦若竹為之奠酬者舅姑與婦相為酬酢也成婦禮明婦順又申之以著代所以重責婦順焉也婦順者順於舅姑和於室人而后當於夫以成絲麻布帛之事以審守委積蓋藏是故婦順備而后内和理内和理而后家可長久也故聖王重之當丁浪反委於偽反積子賜反藏才浪反當猶稱也鄭氏是以古者婦人先嫁三月祖廟未毁教于公宫祖廟既毁教于宗室教以婦德婦言婦容婦功教成祭之牲用魚芼之以蘋藻所以成婦順也祖女所出之祖公君宗室宗子之家孔氏古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聽天下之内治以明章婦順故天下内和而家理天子立六官三公九卿二十七大夫八十一元士以聽天下之外治以明章天下之男教故外和而國治故曰天子聽男教后聽女順天子理陽道后治隂徳天子聽外治后聽内職教順成俗外内和順國家理治此之謂盛徳是故男教不修陽事不得適見於天日為之食婦順不修隂事不得適見於天月為之食是故日食則天子素服而脩六官之職蕩天下之陽事月食則后素服而脩六宮之職蕩天下之隂事故天子之與后猶日之與月隂之與陽相須而后成者也天子脩男教父道也后脩女順母道也故曰天子之與后猶父之與母也故為天王服斬衰服父之義也為后服資衰服母之義也適直革反見賢遍反蕩徒浪反資音咨與齊同適責也食者見道有虧傷也蕩蕩滌去穢惡也鄭氏鄉飲酒義第四十五鄉飲酒之義主人拜迎賔于庠門之外入三揖而后至階三讓而后升所以致尊讓也盥洗揚觶所以致絜也拜至拜洗拜受拜送拜既所以致敬也尊譲絜敬也者君子之所以相接也君子尊讓則不爭絜敬則不慢不慢不爭則遠於鬬辨矣不鬭辨則無暴亂之禍矣斯君子之所以免於人禍也故聖人制之以道盥音管觶之豉反庠鄉學也揚舉也觶酒角也盥洗揚觶者盥手洗爵揮揚其觶以致絜而酬賔也拜至者升堂之後主人拜賔之至也拜洗者賔拜主人之洗爵也拜受者賔於西階上拜受爵也拜既者飲酒既盡賔主皆拜也鄭氏孔氏吕氏鄉人士君子尊於房户之間賔主共之也尊有𤣥酒貴其質也羞出自東房主人共之也洗當東榮主人之所以自絜而以事賔也上共如字下共音恭鄉人鄉大夫也士州長黨正也君子謂卿大夫也鄉大夫士飲國中賢者亦用此禮也設酒尊於東房之西室户之東在賔主間酒雖主人所設賔亦以酢主人故示賔主共有此尊也𤣥酒水也水北方為𤣥以黒黍和於水而為之故曰𤣥酒羞出自東房主人致味以養賔也榮屋翼也即今之摶風洗者承盥洗之器洗當東榮主人致絜以事賔也鄭氏吕氏賔主象天地也介僎象隂陽也三賔象三光也譲之三也象月之三日而成魄也四面之坐象四時也天地嚴凝之氣始於西南而盛於西北此天地之尊嚴氣也此天地之義氣也天地温厚之氣始於東北而盛於東南此天地之盛徳氣也此天地之仁氣也主人者尊賔故坐賔於西北而坐介於西南以輔賔賔者接人以義者也故坐於西北主人者接人以仁以徳厚者也故坐於東南而坐僎音遵於東北以輔主人也仁義接賔主有事爼豆有數曰聖聖立而將之以敬曰禮禮以體長㓜曰徳徳也者得於身也故曰古之學術道者將以得身也是故聖人務焉介輔賔僎輔主三賔賔介與衆賔之長四面之坐即賔主介僎聖通也術藝也得身得之於身也孔氏祭薦祭酒敬禮也嚌肺甞禮也啐酒成禮也於席末言是席之正非專為飲食也為行禮也此所以貴禮而賤財也卒觶致實於西階上言是席之上非專為飲食也此先禮而後財之義也先禮而後財則民作敬讓而不爭矣啐七内反祭者必祭其先而後飲食之也祭薦者賔祭主人所薦脯醢也祭酒者既祭薦又祭酒也嚌肺者取爼上之肺嚌齒之所以甞主人之味也啐酒者飲主人酒而啐之入口成主人之禮也案鄉飲酒禮祭薦祭酒嚌肺皆在席之中唯啐酒在席末卒觶致實謂致盡其觶中所實之酒啐纔始入口故猶在席末卒觶則盡爵故遠在西階上啐酒獻賔之觴也卒觶酬賔之時也禮謂敬也財謂食也啐於席末不於席之正者明是席之正在於行禮不可以飲食瀆也是貴敬而賤食卒爵於西階上不於席之上者明是席之上可以成飲食之禮不可以卒飲食之事是先敬而後食孔氏吕氏方氏鄉飲酒之禮六十者坐五十者立侍以聽政役所以明尊長也六十者三豆七十者四豆八十者五豆九十者六豆所以明養老也民知尊長養老而后乃能入孝弟民入孝弟出尊長養老而后成教成教而後國可安也君子之所謂孝者非家至而日見之也合諸鄉射教之鄉飲酒之禮而孝弟之行立矣尊長尊敬長上也孔子曰吾觀於鄉而知王道之易易也主人親速賔及介而衆賔自從之至于門外主人拜賔及介而衆賔自入貴賤之義别矣三揖至于階三讓以賔升拜至獻酬辭譲之節繁及介省矣至于衆賔升受坐祭立飲不酢而降隆殺之義辨矣别彼列反省所幸反殺色戒反鄉鄉飲酒也易易謂教化之本尊賢尚齒而已其事甚易也速召也省者速賔之禮繁及速介則省也殺者衆賔之禮比之介又殺也升而受爵坐而祭立而飲不酢而即降其殺如此蓋賔衆恐禮而煩則亂也用鄭氏補工入升歌三終主人獻之笙入三終主人獻之間歌三終合樂三終工告樂備遂出一人揚觶乃立司正焉知其能和樂而不流也工樂正也升歌三終謂升堂而歌鹿鳴四牡皇皇者華每一篇而一終也主人獻之獻工也笙入三終者吹笙人入於堂下奏南陔白華華黍每一篇一終也主人獻之獻笙人也間歌三終者間代也謂笙歌已竟而堂上與堂下更代而作也堂上歌魚麗則堂下笙由庚此為一終堂上歌南有嘉魚則堂下笙崇丘此為二終堂上歌南山有臺則堂下笙由儀此為三終合樂三終者謂堂上下歌瑟及笙並作也若工歌闗雎則笙吹鵲巢合之若工歌葛覃則笙吹采蘩合之若工歌卷耳則笙吹采蘋合之故鄉飲酒云乃合樂周南闗睢葛覃卷耳召南鵲巢采蘩采蘋是也工告樂備遂出者樂正自此不復升堂也一人揚觶者一人謂主人之吏舉觶示將行旅酬也乃立司正者將留賔旅酬恐有懈怠故相禮者一人為司正以監之也今按鹿鳴即今日燕飲之事所以𨗳逹主人之誠意而美嘉賔之徳也四牡言其去家而仕於朝辭親而從王事於此乎始也皇皇者華言其將為君使而賦政於外也學記曰宵雅肄三官其始也正謂此也蓋此三詩先王所制以為燕飲之樂用之鄉人用之邦國各取其象而歌之也合樂者歌樂俱作三終者二南各三終詩曰以雅以南即謂此也孔氏晦庵程氏賔酬主人主人酬介介酬衆賔少長以齒終於沃洗者焉知其能弟長而無遺矣降說屨升坐脩爵無數飲酒之節朝不廢朝莫不廢夕賔出主人拜送節文終遂焉知其能安燕而不亂也貴賤明隆殺辯和樂而不流弟長而無遺安燕而不亂此五行者足以正身安國矣彼國安而天下安故曰吾觀於鄉而知王道之易易也説猶脱廢朝之朝直遥反莫音暮旅酬至於以水沃盥洗爵之人是弟長無遺也降說屨升坐者此謂無筭爵之初以前皆立而行禮至此徹爼之後乃脫屨升堂而坐也脩爵無數謂無筭爵也脩舉也朝不廢朝莫不廢夕既朝乃飲先夕而罷也節文終遂者自始至終皆有節文也孔氏方氏馬氏鄉飲酒之義立賔以象天立主以象地設介僎以象日月立三賔以象三光古之制禮也經之以天地紀之以日月參之以三光致教之本也亨狗於東方祖陽氣之發於東方也洗之在阼其水在洗東祖天地之左海也尊有𤣥酒教民不忘本也亨普萌反此皆記者覆說上文亨狗於東方覆說羞出自東房也洗之在阼水在洗西覆説洗當東榮也尊有𤣥酒亦覆上文也孔氏賔必南鄉東方者春春之為言蠢也産萬物者聖也南方者夏夏之為言假也養之長之假之仁也西方者秋秋之為言愁也愁之以時察守義者也北方者冬冬之為言中也中者藏也是以天子之立也左聖鄉仁右義偕藏也介必東鄉介賔主也主人必居東方東方者春春之為言蠢也産萬物者也主人者造之産萬物者也月者三日則成魄三月則成時是以禮有三譲建國必立三卿三賔者政教之本禮之大參也愁讀為揫聖之言生也假大也愁讀為揫揫歛也介間也介賔主之間所以間之也此章緫明坐位所在并明三揖三譲每事皆三之義孔氏射義第四十六古者諸侯之射也必先行燕禮卿大夫士之射也必先行鄉飲酒之禮故燕禮者所以明君臣之義也鄉飲酒之禮者所以明長㓜之序也諸侯之射必先行燕禮者大射也卿大夫士之射必先行鄉飲酒之禮者鄉射也射者男子之事必飾之以禮樂者所以養人之徳使之周旋中禮也故有大射鄉射以明君臣長㓜吕氏故射者進退周還必中禮内志正外體直然後持弓矢審固持弓矢審固然後可以言中此可以觀徳行矣内正外直習於禮樂有徳行者也故賔射之的謂之正欲明射者内志須正大射之質謂之鵠鵠者直也欲使射者外體之直其節天子以騶虞為節諸侯以貍首為節卿大夫以采蘋為節士以采蘩為節騶虞者樂官備也貍首者樂會時也采蘋者樂循法也采蘩者樂不失職也是故天子以備官為節諸侯以時會天子為節卿大夫以循法為節士以不失職為節故明乎其節之志以不失其事則功成而徳行立徳行立則無暴亂之禍矣功成則國安故曰射者所以觀盛徳也節者射以樂歌為節所謂節比於樂也騶虞采蘋采蘩今詩篇名貍首逸詩下文云曽孫侯氏者也清江劉氏謂原壌所歌貍首之班然者是其章首或曰篆文貍似鵲首似巢即鵲巢也未知然否騶廐官養六畜虞山澤之官阜蕃鳥獸草木故云官備孔氏馬氏吕氏是故古者天子以射選諸侯卿大夫士射者男子之事也因而飾之以禮樂也故事之盡禮樂而可數為以立徳行者莫若射故聖王務焉是故古者天子之制諸侯歲獻貢士於天子天子試之於射宫其容體比於禮其節比於樂而中多者得與於祭其容體不比於禮其節不比於樂而中少者不得與於祭數與於祭而君有慶數不與於祭而君有譲數有慶而益地數有譲而削地故曰射者射為諸侯也是以諸侯君臣盡志於射以習禮樂夫君臣習禮樂而以流亡者未之有也數色角反比昆志反中丁仲反與音預孔氏曰既為諸侯卿大夫更以射辨其才藝髙下非謂直以射選補始用之也方氏曰射者士也貢士者諸侯也或中或否雖在士而有慶有譲則在諸侯焉故曰射者射為諸侯也呂氏曰古之選士必以射者非專事於射也諸侯歳貢士於天子固以徳進言揚選也天子又試于射宫而進退之將以考諸侯所選之中否而從之有賞罰也射者男子之事也男子之事必有志於四方禦侮扞難則其任也故桑弧蓬矢設於始生士不能射則辭以疾葢不能射則幾於非男子也及其禮射則容體欲比於禮節欲比於樂而中欲多非其志專一則不能也非動容閑習則不能也非心夷氣平強有力而不憚煩則不能也由此觀之射雖一藝而可以觀人之徳行則先王選士之㫖微矣集故詩曰曾孫侯氏四正具舉大夫君子凡以庶士小大莫處御于君所以燕以射則燕則譽言君臣相與盡志於射以習禮樂則安則譽也是以天子制之而諸侯務焉此天子之所以養諸侯而兵不用諸侯自為正之具也詩貍首之詩也曾孫謂世為諸侯侯氏謂旁出於天子故以氏言也四正蓋天子諸侯卿大夫士之正正亦鳥名齊魯之間名題肩為正所謂正鵠之正也用孔氏方氏陸氏集鄭以四正為正爵四行獻賔獻公獻卿獻大夫將射先燕飲也孔子射於矍相之圃蓋觀者如堵牆射至於司馬使子路執弓矢出延射曰賁軍之將亡國之大夫與為人後者不入其餘皆入葢去者半入者半又使公罔之裘序㸃揚觶而語公罔之裘揚觶而語曰㓜壯孝弟耆耋好禮不從流俗脩身以俟死者不在此位也蓋去者半處者半序㸃又揚觶而語曰好學不倦好禮不變旄期稱道不亂者不在此位也蓋勤有存者矍俱縳反相息亮反賁音奮旄與耄同勤與僅同矍相地名樹菜蔬曰圃觀者如堵牆言其衆射至於司馬謂射至於使司正為司馬之時蓋方燕之時名司正及射之時名司馬也賁僨也猶敗覆也公罔姓也裘名也之發聲也序姓㸃名也陸徳明以者不為句嚴陵方氏用之云有如此者否盖問詞也鄭氏以者字屬上句以不在此位為句藍田呂氏釋之曰不在此位也者疑詞也盖言在此位也衆所會聚簡别賢不肖人所難言也故以疑詞示之蓋不在此位云者問之之辭也山隂陸氏曰揚觶將以飲不勝者鄉射云不勝者進北面坐取豐上之觶立卒觶是也唯賢者發而不失正鵠故曰不在此位位指不勝而飲觶之位也聞公罔之裘之言而去者蓋不能保其必勝而先去也故曰發而不失正鵠者唯賢者乎若夫不肖之人則彼將安能中公罔之裘揚觶蓋以待初射之用序㸃又揚觶蓋以待再射之用鄉射曰設豐實觶如施之此當序㸃所揚之觶也夫禮必再射以備幸中故序㸃所言又進於公罔之裘一等愚按此章惟不在此位一句難曉蓋射以序賢今反謂賢者不在此位故謹備録三說如右然惟山隂陸氏之說於本文為順觀者如堵牆以孔子之射故來者如是之多方其來而未入故先使子路延以弓矢而誓之賁軍之將非勇亡國之大夫非忠捨其親而為人後者非孝聞其誓而不敢入者去已半賔既入又使公罔之裘預揚未用之罰爵反其詞以善諷之曰㓜壯孝弟耆耋好禮不從流俗脩身以俟死其立徳有如此者不在此飲罰爵之位也於是自揣無其徳而不能保其必勝者去者又半然公罔裘之言猶畧而處於圃者猶多也序㸃繼又揚觶而諷之曰好學不倦好禮不變旄期稱道不亂其成徳有如此者不在此飲罰爵之位也如是自揣徳不稱而不能保其必勝者盡去其存而預於射者僅有耳方其始來觀者如堵牆慕徳者衆無遠不至也其後預射者乃僅存畏威之深有言必信也未入延以弓矢本示以將射之禮反直其辭以拒不賢者使不得入既入語以揚觶本示以射不勝之罰反善其辭以諷賢而未至者使不敢留先後緩急之宜呼吸變化之妙雖一射之頃而所以綏來動和者可占矣補射之為言者繹也或曰舎也繹者各繹己之志也故心平體正持弓矢審固持弓矢審固則射中矣故曰為人父者以為父鵠為人子者以為子鵠為人君者以為君鵠為人臣者以為臣鵠故射者各射己之鵠故天子之大射謂之射侯射侯者射為諸侯也射中則得為諸侯射不中則不得為諸侯射食亦反孔氏曰以為父鵠者謂射時身為人父者則念之云所射之鵠是為人父之鵠中則任為人父故為人之父者以為父鵠為人子及君臣皆然晦庵曰射中則為諸侯不中則不得為諸侯此皆難信書謂庶頑讒說侯以明之然若有羿之能又何以别恐畧以射審定非專以此去取也集天子將祭必先習射於澤澤者所以擇士也已射於澤而后射於射宫射中者得與於祭不中者不得與於祭不得與於祭者有譲削以地得與於祭者有慶益以地進爵絀地是也澤在野取其寛閒謂澤為擇記者之言耳他多類此補故男子生桑弧蓬矢六以射天地四方天地四方者男子之所有事也故必先有志於其所有事然後敢用穀也飯食之謂也男子生設弧門左三日負之人為之射射罷而後用榖以食其子鄭氏孔氏射者仁之道也射求正諸己己正而后發發而不中則不怨勝己者求反諸己而已矣孔子曰君子無所爭必也射乎揖讓而升下而飲其爭也君子吕氏曰仁者之道不怨天不尤人行有不至反求諸己而己射者有似於此故曰仁之道晦庵曰君子恭譲不與人爭唯於射而後有爭然其爭也雍容揖遜乃如此則其爭也君子而非若小人之爭矣集孔子曰射者何以射何以聽循聲而發發而不失正鵠者其唯賢者乎若夫不肖之人則彼將安能以中詩云發彼有的以祈爾爵祈求也求中以辭爵也酒者所以養老也所以養病也求中以辭爵者辭養也聲謂樂節也何以射謂何以能使射中與樂節相應也何以聽謂何以能聽此樂與射中相合也射中樂節兩相應會至難矣循聲而發不失正鵠射中與樂節相會惟賢者乃能是難也孔氏燕義第四十七古者周天子之官有庶子官庶子官職諸侯卿大夫士之庶子之卒掌其戒令與其教治别其等正其位國有大事則率國子而致於大子唯所用之若有甲兵之事則授之以車甲合其卒伍置其有司以軍法治之司馬弗正凡國之政事國子存游卒使之脩徳學道春合諸學秋合諸射以考其藝而進退之卒七對反惟卒伍之卒如字正音征卒讀為倅副也謂諸子副代其父者也司馬弗正謂屬庶子官司馬弗征賦之也游卒游逸而為副貳庶子之未仕者也孔氏諸侯燕禮之義君立阼階之東南南鄉爾卿大夫皆少進定位也君席阼階之上居主位也君獨升立席上西面特立莫敢適之義也設賔主飲酒之禮也使宰夫為獻主臣莫敢與君亢禮也不以公卿為賔而以大夫為賔為疑也明嫌之義也賔入中庭君降一等而揖之禮之也鄉許亮反適音敵定位定羣臣之位也莫敢適莫敢與君為敵也宰夫主饍食之官天子使宰夫為主以代獻賔也不以公卿為賔而以大夫為賔謂公卿尊矣復以為賔則尊與君太廹近故以大夫為賔大夫位卑無嫌也鄭氏孔氏君舉旅於賔及君所賜爵皆降再拜稽首升成拜明臣禮也君答拜之禮無不答明君上之禮也臣下竭力盡能以立功於國君必報之以爵祿故臣下皆務竭力盡能以立功是以國安而君寧禮無不答言上之不虗取於下也上必明正道以道民民道之而有功然後取其什一故上用足而下不匱也是以上下和親而不相怨也和寧禮之用也此君臣上下之大義也故曰燕禮者所以明君臣之義也道音導此明君臣上下相報之義孔説席小卿次上卿大夫次小卿士庶子以次就位於下獻君君舉旅行酬而后獻卿卿舉旅行酬而后獻大夫大夫舉旅行酬而后獻士士舉旅行酬而后獻庶子爼豆牲體薦羞皆有等差所以明貴賤也差初佳反小卿下卿也獻君君舉旅行酬者案燕禮宰夫為主人酌以獻賔賔飲畢酌以酢主人主人飲畢酌以獻君君飲畢酌以酢主人更爵以受酢于阼階下飲卒爵主人又洗觚酬主人先飲卒爵酌以酬賔賔受觚坐奠于薦東訖小臣請媵爵者二人媵爵阼階下皆北面媵爵于公媵爵者先自飲畢媵爵者洗象觶酌奠于公席之前公坐取所媵之觶以酬賔賔於時下再拜稽首公命小臣辭賔升成拜公立卒觶賔乃受公虛爵酌之酬大夫于西階上衆大夫相酬畢奠虛觶于篚自此凢旅酬皆以徧而止孔氏聘義第四十八聘禮上公七介侯伯五介子男三介所以明貴賤也介紹而𫝊命君子於其所尊弗敢質敬之至也三譲而后傳命三譲而后入廟門三揖而后至階三譲而后升所以致尊譲也君使士迎於竟大夫郊勞君親拜迎于大門之内而廟受北面拜貺拜君命之辱所以致敬也敬譲也者君子之所以相接也故諸侯相接以敬讓則不相侵陵竟音境勞去聲介所以傳逹賔主之命爵有貴賤則介有多寡故曰以明貴賤介有三等末介傳中介中介傳上介以相繼而傳之故曰介紹而傳命質者對也與之正相當也使臣不敢與主君亢禮故曰弗敢質一說父子之間以質為敬君臣之間以文為敬故曰於其所尊弗敢質敬之至也廟受者受使者所䘖之命也𫝊命入門皆三譲三揖至階三譲而升賔所以敬主也士迎于竟大夫勞于郊君親拜迎而廟受主人所以敬賔也賔主之交相敬譲如此此鄰國所以不相侵陵而兵不興也孔氏吕氏方氏陸氏卿為上擯大夫為承擯士為紹擯君親禮賔賔私面私覿致饔餼還圭璋賄贈饗食燕所以明賔客君臣之義也擯者主國之君所使接賔者也主之有擯猶賔之有介也卿為上擯迎接賔客大夫為承擯承副上擯士為紹擯繼續承擯君親禮賔親執醴以禮之也賔私面私覿者私以己禮面見主國之卿大夫為私面私以己禮覿主國之君為私覿也牲殺曰饔生曰餼半圭曰璋賄以貨言贈以送言饗以酒為主食以食為主燕則兼酒食而燕樂之也君親禮賔賔私面私覿以至饗食燕所以明賔客之義還圭璋致饔餼賄贈則使人致之所以明君臣之義孔氏吕氏方氏故天子制諸侯比年小聘三年大聘相厲以禮使者聘而誤主君弗親饗食也所以愧厲之也諸侯相厲以禮則外不相侵内不相陵此天子之所以養諸侯兵不用而諸侯自為正之具也比必履反聘而誤謂使者行聘之時禮有錯誤孔氏以圭璋聘重禮也已聘而還圭璋此輕財而重禮之義也諸侯相厲以輕財重禮則民作讓矣君子以玉比徳故聘禮執圭璋致命以逹其君之信聘君以圭聘夫人以璋半圭曰璋取法於隂陽之義也其圭璋則典瑞所謂瑑圭璋璧琮以頫聘者也行聘禮之後饗君用璧饗夫人用琮皆加於束帛既饗之後以圭璋禮之重也故以本物還之以璧琮饗幣財之輕也故受之而更以他物贈之所謂輕財而重禮吕氏孔氏主國待客出入三積餼客於舎五牢之具陳於内米三十車禾三十車芻薪倍禾皆陳於外乘禽日五雙羣介皆有餼牢壹食再饗燕與時賜無數所以厚重禮也古之用財者不能均如此然而用財如此其厚者言盡之於禮也盡之於禮則内君臣不相陵而外不相侵故天子制之而諸侯務焉爾乘䋲證反積猶委積之積三積皆有牢禮米禾芻薪五牢謂飪一牢腥二牢餼二牢每牢具牛羊豕也乘禽謂乗行羣匹之禽鴈鶩之屬聘卿則日致五雙也羣介皆有餼牢則無飪腥矣殺於使臣故也燕盛於饗饗盛於食於食惟一於饗至再於燕與時賜無數厚重禮也不能均者均猶皆也言常時用財豐殺隨時不能皆如此其厚獨於聘禮則厚也用孔氏吕氏方氏補聘射之禮至大禮也質明而始行事日幾中而后禮成非強有力者弗能行也故強有力者將以行禮也酒清人渴而不敢飲也肉乾人飢而不敢食也日莫人倦齊莊正齊而不敢解惰以成禮節以正君臣以親父子以和長幼此衆人之所難而君子行之故謂之有行有行之謂有義有義之謂勇敢故所貴於勇敢者貴其能以立義也所貴於立義者貴其有行也所貴於有行者貴其行禮也故所貴於勇敢者貴其敢行禮義也故勇敢強有力者天下無事則用之於禮義天下有事則用之於戰勝用之於戰勝則無敵用之於禮義則順治外無敵内順治此之謂盛徳故聖王之貴勇敢強有力如此也勇敢強有力而不用之於禮義戰勝而用之於爭闘則謂之亂人刑罰行於國所誅者亂人也如此則民順治而國安也乾音干此因聘義而兼射義以推演其說補子貢問於孔子曰敢問君子貴玉而賤碈者何也為玉之寡而碈之多與孔子曰非為碈之多故賤之也玉之寡故貴之也夫昔者君子比徳於玉焉温潤而澤仁也縝宻以栗知也亷而不劌義也垂之如墜禮也叩之其聲清越以長其終詘然樂也瑕不掩瑜瑜不揜瑕忠也孚尹旁逹信也氣如白虹天也精神見于山川地也圭璋特逹徳也天下莫不貴者道也詩云言念君子温其如玉故君子貴之也碈武巾反知音智劌九衛反詘其勿反碈石似玉或作玟縝緻也栗堅貎亷稜也劌利傷也越猶揚也詘絶止貎凡金聲始洪終殺玉聲始終若一其終詘然謂其無衰殺之漸所謂玉振終條理也瑕玉病瑜玉中美也孚尹旁逹未詳鄭氏以孚讀為浮尹讀為筠云浮筠者玉之采色義既無據恐未必然山隂陸氏云孚信也尹正也孚尹猶言信正言玉堅貞之徳外信逹也此於字義近之特逹者謂璧琮必有幣以將之圭璋特逹而已不用藉幣如君子之徳無待乎外也詩秦風小戎之篇鄭氏孔氏吕氏陸氏䘮服四制第四十九凡禮之大體體天地法四時則隂陽順人情故謂之禮訾之者是不知禮之所由生也夫禮吉凶異道不得相干取之隂陽也䘮有四制變而從宜取之四時也有恩有理有節有權取之人情也恩者仁也理者義也節者禮也權者知也仁義禮知人道具矣訾音紫毁也四制謂䘮服之中有以恩制義制節制權制四者之别賈氏其恩厚者其服重故為父斬衰三年以恩制者也門内之治恩揜義門外之治義斷恩資於事父以事君而敬同貴貴尊尊義之大者也故為君亦斬衰三年以義制者也斷丁亂反此明恩制義制三日而食三月而沐期而練毁不滅性不以死傷生也䘮不過三年苴衰不補墳墓不培祥之日鼓素琴告民有終也以節制者也苴七餘反此明節制資於事父以事母而愛同天無二日土無二王國無二君家無二尊以一治之也故父在為母齊衰期者見無二尊也杖者何也爵也三日授子杖五日授大夫杖七日授士杖或曰擔主或曰輔病婦人童子不杖不能病也百官備百物具不言而事行者扶而起言而后事行者杖而起身自執事而后行者面垢而已秃者不髽傴者不袒跛者不踊老病不止酒肉凡此八者以權制者也擔徒豔反今又如字袒徒旱反此明權制父在為母一也有杖乃扶而起二也杖而起三也面垢四也秃者五也傴者六也跛者七也老病八也杖本扶病而曰爵者以爵者有徳其恩必深為之服者病必重故曰爵也言為爵者設也三日授子杖者子恩深病速故授杖早其餘以次而遲也擔鄭云假也尊其為主假之以杖者也吕氏云恐止音擔謂負荷所主之䘮故授之以杖也杖以輔病未成人之婦人㓜少之男子雖居䘮未能至於病故不杖也三日五日七日授杖不同者為君䘮而服之者衆也不言而事行者謂天子諸侯扶而起者以病而貴重故杖而又扶之以人也言而后事行謂大夫士杖而起者病也身自執事而后行謂庶民面垢而已者居䘮而又勞苦不敢至病恐以毁滅性也秃者無髪故不髽傴者露膞可憎故不袒跛者脚蹇難躍故不踊老病者須有養故不止酒肉子於父母貴賤情同情難直遂其為禮之不同如此故曰權制或以父在為母屬上文而以授杖不同為權制之一用鄭氏孔氏補始死三日不怠三月不解期悲哀三年憂恩之殺也聖人因殺以制節此䘮之所以三年賢者不得過不肖者不得不及此䘮之中庸也王者之所常行也書曰髙宗諒闇三年不言善之也王者莫不行此禮何以獨善之者曰髙宗者武丁武丁者殷之賢王也繼世即位而慈良於䘮當此之時殷衰而復興禮廢而復起故善之善之故載之書中而髙之故謂之髙宗三年之䘮君不言書云髙宗諒闇三年不言此之謂也然而曰言不文者謂臣下也禮斬衰之䘮唯而不對齊衰之䘮對而不言大功之䘮言而不議緦小功之䘮議而不及樂父母之䘮衰冠繩纓菅屨三日而食粥三月而沐期十三月而練冠三年而祥比終兹三節者仁者可以觀其愛焉知者可以觀其理焉強者可以觀其志焉禮以治之義以正之孝子弟弟貞婦皆可得而察焉諒闇謂信黙也此覆明前四制之中節制之義也三節者初䘮至三月一也練二也祥三也黄氏日抄卷二十九
