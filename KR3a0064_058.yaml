body:
  text: 黃氏日抄卷五十八宋黃震撰讀諸子四孫子兵書一孫子言兵首謂兵者國之大事死生之地存亡之道而切切欲道民使之與上同意欲不戰而屈人兵欲先為不可勝以待敵之可勝欲無恃其不來恃吾有以待之至論將則謂進不求名退不避罪惟民是保而利於主蓋終始未嘗言殺而以久於兵為戒所異於先王之訓者惟詭道一語然特自指其用兵變化而言非俗情所事姦詐之比且古人詭即言詭皆其真情非後世實詐而反謬言誠者比也若孫子之書豈特兵家之祖亦庶幾乎立言之君子矣諸子自荀揚外其餘浮辭橫議者莫與比􅠇豆稈蟻附分數分部曲數什伍率然常山蛇名風起之日箕畢翼軫吳子兵書二吳子言兵先以得士心為本名曰父子兵此吮疽之術也審敵可否未嘗言殺機權議論亦足為孫子之亞矣嘗勸魏文侯饗賞有功行之三年士不得令而奮繫起曰人有短長氣有盛衰乃發無功而不與饗者五萬破秦者五十萬天竈大谷之口龍頭大山之端司馬法兵書三司馬法者齊司馬穰苴之書也謂國雖大好戰必亡天下雖安忘戰必危而首叙搜兵命將之禮軍容國容之義三代兵車旗章之别蓋述典刑之舊爾至其言兵則細矣非孫吳比矣至謂夏賞而不罰殷罰而不賞周德衰而賞罰兼之則背理之言也蘇子古史去穰苴傳唐太宗李衛公問對兵書四兵自黃帝立丘井法井字形開方為九五為陳法四為間地所謂數起於五也虗其中大將居之環其四靣諸部連繞所謂數終於八也形圓而勢不散所謂散而成八復而為一也太公實繕其法至管仲復修太公法五家為軌故五人為伍十軌為理故五十人為小戎四里為連故二百人為卒十連為鄉故二千人為旅五鄉一帥故萬人為軍皆本司馬法也陳數有九大將握竒零其中四頭八尾觸處為首諸葛亮以布八陳圖李靖本之大陳包小陳大營包小營隅落鉤連曲折相對外畫之方內環之方以成六花名六花陳故靖言兵專本乎正自謂西討突厥越險數千里此制未嘗敢易至於竒正相生如環無端靖謂惟孫武能之吳起而下莫可及焉謂舅韓擒虎但以竒為竒以正為正爾蓋兵家之立言無出於孫武而兵家之講明亦無過於李靖矣靖言愛士太宗以威克厥愛詰之靖必對以威克者一時誓師之言愛結者平時養士之素可也顧乃謂愛設於先威設於後尚書所以謹戒其終非所以作謀於始則非書之㫖矣古者齊廟授鉞蓋必不得已而用兵故告之宗廟且示謹重也靖乃曰假成於神則不知古人惻怛之心矣孫子首篇其一曰道而繼以道者令民與上同意至曹公注釋亦云導之敬令是訓導之導非道德之道也靖乃曰道之說至微至深易所謂聰明睿智則亦非孫子立言之本㫖矣太公謂步兵與車騎戰必依丘墓孫子謂天隙之地丘墓故城兵不可處太宗問二說不同而靖專主太公竊意太公言戰當有所依孫子言屯當審所寓二說自並行而不相背靖言張良學太公六韜三略此殆因圯上老人授書而言竊意韜略乃後世附㑹未必太公之書若其論高祖不善將將殆靖欲太宗保全功臣耳亦未得為確論將將自是御之於方用之初保功臣自是全之於己用之後天地風雲龍虎鳥蛇天地旗號風雲幡名龍虎鳥蛇隊伍之列三門太公謀太公言太公兵四種權謀形勢隂陽技術僕射漢魏之間軍制五車置僕射一人尉繚子兵書五尉繚子謂對梁惠王而言其說欲絶拘忌嚴法令務耕織使三軍一心畏將而不畏敵而譬之於水謂水至柔弱者也然所觸丘陵必為之摧者無異也性專而觸誠也嗚呼此殆孟子所指我能為君戰必克者歟雖欲審囚决獄不殺無罪兵不血刃而天下親然立為什伍相揭之法專務殺其士卒使之畏已而以殺卒之半為善用兵孫吳談兵已不如此况仁人乎然其言曰亡國富倉府上滿下漏患無所救此足警有國者云拗拗矢折矛守法城一丈十人守甲胄之士不拜竭人之力不責禮將主旗鼓一劒之任非將事金鼓鈴旗鼓進金止鈴傳令旗麾也低旗則趍金鼓俱繫則坐鼓節一步一鼓步鼓也十步一鼓趍鼓也音不絶騖鼓也黃石公三略六韜兵書六七韜略世謂出太公雖李衛公亦云以愚觀之僞書爾春秋荀吳始嘗舍車而步漢以後始有騎將今其書以車騎步分三太公時有之乎春秋後始霸三代雖有伯不以霸稱也今其書歷叙皇帝王霸太公時有之乎春秋霸主始有結連與國深入人境者今其書稱必得大國之與鄰國之助又云行數百里人馬倦休太公時有之乎又謂取天下者若逐野獸天下皆有分肉之心此襲用秦失其鹿天下共逐之語而贅壻者秦始有之其書亦稱贅壻且自謂三略為衰世作則不能自掩其為後世之僞明矣况其為書類多掇拾三略大率以柔弱不貪為主此老子之說也六韜言猶豫狐疑之戒乃吳子之所已言也言山兵者即吳子之谷戰言澤兵者即吳子之水戰十四變即吳子之十三繫十一卒即吳子之五練鋭教戰即其士先教戒之說分險即其過敵溪谷之說雨不張蓋等語出尉繚子書火戰等說亦備孫子書而㳙涓不絶等語又遍集古書者也要其前後本無主說三略既不見上中下可分之的六韜亦不見文武龍虎豹犬之義大抵書之不切於兵者居半切於兵者多死法敵而木偶人也則可耳其最無理者文伐十二節皆隂刻陷人之語豈文伐之義乎股肱羽翼七十二人輕重夫次泛其無紀豈股肱羽翼之義乎文王聖人也太公聞風興起動盍歸乎來之思武王以聖繼聖順天應人而太公興鷹揚之師今顧以孩提視文武謂其求教太公雖帝堯之聖亦文王所未聞待傾聽而始知焉此皆根於卜獵得師一語故附㑹至此耳然按六韜謂太公坐茅而漁尉繚子又謂太公屠牛朝歌賣食盟津餘七年主不聽而遇文王是則卜獵之說尚未定也况韜略可信其為太公之書乎其書之播詠人口者曰香餌之下必有懸魚重賞之下必有死夫曰千里饋糧士有飢色樵蘇後㸑師不宿飽而先之以軍䜟曰則是引古語也曰務廣地者荒務廣德者強能有其有者安貪人之有者殘然先之以故曰則亦用古語也曰以義誅不義若决江河而溉熖火臨不測而擠欲墜其克必矣所以優游恬淡而不進者重傷人物也此語足以發明仁人用兵之本心曰天下非一人之天下乃天下之天下亦至今為名言隂符凡八等士將緩急遣使用之天潢天船一物也以飛江濟海贅壻人敵欲掩亦揚名者聚為一卒此條列於貧賤快志之下胥靡免罪之上古之賤贅壻如此隂符經經以符言既異矣符以隂言愈異矣首云觀天之道執天之行盡矣天之道固可觀天之行其可執耶謂五行為五賊謂三才為三盜五行豈可言賊三才豈可言盜又曰天有五賊見之者昌三盜既宜三才既安賊豈所以為昌盜豈所以為安即若謂人知其神而神不知不神所以神此本老聃可道非道之說後世有僞為道書者曰常清淨經有僞為佛書者曰般若經千變萬化皆不出反常一語初非異事乃雷同語耳言用兵而不能明其所以用兵言修煉而不能明其所以修煉言鬼神而不能明其所以鬼神蓋異端之士掇拾異說而本無所定見者豈此其所以為隂符歟然則人生安用此書為也唐永徽五年嘗敕禇遂良寫一百二十卷不知果然否近世大儒亦加品題則事之不可曉者黃氏日抄卷五十八
