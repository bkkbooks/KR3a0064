body:
  text: 黃氏日抄卷五十三宋黃震撰讀雜史三春秋世紀用竹湖李參政韶所編抄其要王世紀自平王迄敬十三王書於經者凡十二事前此未言天王法天之號自春秋始前此未書京師衆大之名自春秋始凡皆致意於本原欲因其不正以反其正齊威公黜其義而録其功王禁明而王臣不下聘者六十年盟會同而諸侯無私爭者三十年序績召陵而荆帖陳旅聶北而狄退獻捷過魯而戎弭貫澤而下葵丘以前衣裳不歃血兵車無大戰仲尼稱其一匡孟子與其為盛此凡威公定霸之目九國叛而萌振矜管仲死而放繩墨城杞貶於城邢救徐怠於救許伐黃則外憂啓滅項則衆志離會下則家法隳霸功亦以不終矣宋襄公宋襄伐喪以立威則非仁致夷以謀闕無功而又階亂晉文公晉自武公并吞専立春秋黜晉不書文公復國無所稟承勤王特為求諸侯之計春秋亦沒其行事為國五年當僖公二十八年晉楚之爭乃關夷夏之盛衰非止一國之得失方六挈晉侯以書之抑楚之深故與晉之亟也然以晉視齊城濮之功雖多於召陵溫之事雖敏於葵丘三會諸侯莫有不至雖盛於威公而威公得江黃不同於伐楚而文公則譎非致秦不可與楚爭楚抑而秦興矣威公會不邇三州盟不加王人文公會畿內盟子虎矣威公寧不得鄭不納子華懼其奬臣抑君文公則為元咺執衛侯矣此夫子所以有正譎之辨晉襄公襄之繼伯由殽之功而春秋不書君將獨言晉人以喪不興戎義不可也方文公之沒敵國並興襄公夏戰殽以却秦秋敗箕以剪狄冬伐許而離楚一年之間三敵悉退可謂有霸者之略外患既息舉動即異伐衛則損威會公孫敖則毁烈士縠主盟則權散陽處父救江則謀怠其規模又淺於文公甚矣晉靈成景厲悼公晉靈公政墮柄分楚人之言曰晉君少不在諸侯比方可圖也成公黑壤與扈二會僅能合列國而楚人三歲三伐鄭不能興攘却之師景公蟲牢馬陵及蒲之盟雖得諸侯竟莫駕楚屬公交剛敗狄會京師伐秦戰鄢陵勝楚會鍾離成吳四鄰而釁而諸侯反二蕭牆反危惟悼公年十四即位入國之明日逐不臣者七人即位之一月取六官於民譽能服諸侯得鄭而駕楚然能駕楚而不能蓋誘吳之非平公繼之五盟六會而溴梁之會授權於大夫宋之盟授權於夷狄昭公一會一盟坐視諸侯之去而不之顧晉日卑矣頃定之世私門強諸侯二吳楚強然終乎黃池聖人猶以霸繫晉晉文未霸以前别紀晉自鄂侯後入春秋皆為曲沃殺奪武公始并晉國春秋皆削而不書魯謂春秋多內魯之文尊魯之至者責魯以備也家法不設君柄不收故多變故蔡蔡自宣訖成十二君以宗盟之長汙於事楚而不知變惟文公嘗謀事晉畏楚而不得行昭公遭拘郢之辱絶楚事晉晉人求貨而辭蔡蔡乃假手於吳雖釋憾一時終為楚所并曹曹在春秋十五君事夏盟最謹與諸侯敢睦惟逼而無禮不能自立病於戎困於晉亡於宋當哀八年衛衛在春秋十一君兵爭最少人才特多與魯俱稱望國而適庶亂兄弟乖父子暌變故繁興云鄭鄭近王畿而介齊晉楚之間蓋春秋要領之國其初周鄭交惡為王室之罪人其中堅於從楚為霸者之罪人其後輒隳於七穆之手有罪不討又為諸侯之罪人滕滕之可考者才五君其與諸侯睦其事霸主謹惟逼而無禮故逼於宋畏於齊楚無以自立邢邢滅於衛衛文之罪著矣而邢不度德不量力不親親與狄伐衛以速其亡其罪尤大郕郕之書於經者四既降齊七十一年而奔魯是其不得免焉必未有罪聖人以伯書明周公大封同姓之意左氏以為太子朱儒必不然矣凡皆姚姓微國世紀虞虢焦滑之屬皆同姓自尋斧於本支陳陳舜之後國於荆河邇強楚而逺齊晉堅於事楚非得已故聖人不忍貶絶而十二公悉著册杞杞夏之後而用夷禮聖人不忍絶也故書子二侯三人五百二十八因其善惡而著之宋宋湯之後春秋二百四十二年常書公以列於諸侯之上反覆十三君行事非有可稱而聖人拳拳焉特以著三統之相承明王澤之當續爾庶爵世紀齊齊自僖公入春秋參盟胥命諸侯以稍稍宗嚮之矣威公霸業雖隳乎孝公猶世為諸侯之雄景公授政強家陳氏得售燠休之惠於民而齊國微矣許許初從齊猶未病也齊霸既衰一意從楚而終為鄭所併莒莒近齊逼於齊最甚而又怙其強暴首入人之國取人之地春秋夷之略見於經薛薛諸任之國自奚仲為夏車正而遷于邳仲虺為湯左相而居於薛然自入春秋以來役於宋逼於齊臨之以齊晉微弱無以為國矣邾邾小國也交鄰睦事霸謹君臣多賢庶幾守禮義者故能介數大國之間與春秋始終迄戰國而未亡小邾小邾亦曹姓之國介在海濵畏齊事魯而逼於宋乃能以禮通諸侯與春秋始終焉叔孫昭子於其賦菁莪有曰不有禮國其能久乎鄫鄫微乎微者也立所出以為後春秋書曰莒人滅鄫紀紀齊同姓紀為齊弱而挾魯鄭以戰齊三邑既遷于紀季入齊紀侯去國矣微國微國如魯入極鄭取戴齊人降鄣之類聚以紀之以見周禮之衰夷國世紀楚楚在春秋始曰荆繼曰楚始曰人繼曰子蓋當時夷狄之為中國患未有若楚人之暴且久有方城以為城有漢水以為池有申吕之田以禦外有申息之門以備內有成莊其平康昭為之君有子文孫叔子庚子木子蕩為之臣所能世抗齊晉與春秋始終至靈康以後雖専令諸侯喪敗相尋矣然春秋書法之嚴則又以其私竊名號而夷之爾吳吳姬姓之長春秋以其假竊名號而夷之其始也晉方患楚未暇憂吳其後吳甚有意於駕晉又其後吳所爭不在晉而在楚又其最後楚亦不能強而吳之所患者在越矣秦秦自穆公以貪伐喪為殽之戰遂有彭衙之戰令狐之戰河曲之戰暴兩國之衆興數十年報復之師更四君而未已秦之為狄其始於殽之戰歟越越少康之後入春秋百九十餘年始見經常不過以國稱僻陋甚矣獨句踐與吳之事可以勵臣子之節蓋越自楚靈之強嘗從之伐吳而闔廬之立遂因以仇越是以夫差敗於檇李而懷必報之忿及句踐困於夫椒而遂成不釋之讎仇吳之念隱於柔服之初豢吳之計蓄於卧薪嘗膽之時而沼吳之志卒逞於生聚教訓之後二十年間所欲盡從興事造業者可以略觀之矣戎戎之類有六曰山戎北戎薑戎雒戎茅戎陸渾之戎東遷以來恣㫿莫甚齊威大振治戎之旅而戎始戢及晉惠之反誘戎遷於伊晉襄之霸挾戎戰於殽其勢不得不至於陸梁異時徐吾之役既平茅戎於周而復敗王師是齊有攘戎之功晉有致戎之罪狄狄比戎患尤甚春秋書狄者三十六有長狄赤狄白狄而潞氏甲氏留吁又赤狄之種惟獨名者最強齊威畢力治楚置狄不問無損霸業之盛晉自景公諸侯盡離而閉南關以北尋治狄之忿雖剪除之功居多捨內事外霸業衰矣夷夷之微國如介如徐如舒如庸莊僖以後纍纍而書巴以人稱甲潞以氏稱鮮虞牆咎如以號稱皆聖人預為中國慮齊威之霸能帖荆於召陵而不能止江黃之伐晉文之霸能致秦敗楚於城濮而不能保鄀六之不亡小國尚安所恃而不奔走於夷狄故崇屬於秦郯屬於吳沈徐胡頓屬於楚勢不免焉爾春秋臣傳因蜀人王常元編而以所見為評魯臧氏盛哉臧氏之代不乏人也僖伯諌觀魚哀伯諌取郜鼎至臧孫辰復能以言立後之卿大夫皆宗之方東門襄仲之子歸父欲去三桓季孫行父欲追怨逮其後獨臧宣能斥以後之人何罪皆可謂賢也已臧武仲以智稱乃阿季武子之私廢長立庶卒見惡孟氏而奔齊臧氏遂衰豈所惡於智者為其鑿之類耶季孫魯桓公生莊公復生慶父叔牙季友莊公薨叔牙欲立慶父季友殺叔牙而立閔公及慶父弒閔公季友復殺慶父而立僖公季友雖於次最幼而殺二兄立二君勢最強叔牙之後為叔孫氏慶父之後為孟氏與季氏為三桓而季孫遂為稱首季孫行父相二君妾不衣帛馬不食粟最號賢者然強私家弱公室小廉適足為濟私之具東門歸父謀去三桓及宣公之死行父宣言於朝欲修怨焉曽謂賢者而有是乎莒僕弒逆以寶來奔公命與之邑曰今日必授行父命出諸境曰今日必逹公固失之矣然行父人臣盍以逆順造諸君以君命出諸境乃可耳君命而已反之何其自専且自謂有舜大功二十之一亦豈臣子之所宜言乎一傳而季武子遂四分公室而専其二再傳而平子遂逐其君使死於乾侯習於惡既熟不復知惡之為惡而勢亦駸駸難返矣故至季桓子之世雖以夫子子路不能盡墮三都桓子生不用孔子而死囑康子康子舍孔子而召冉子是皆習於惡之既熟膠於勢之難返雖有良心亦陽為空言而止爾叔孫莊公薨無適嗣叔孫欲以次立其兄慶父不果為弟季友為鴆莊叔嗣封傳子穆叔視三桓子孫為最賢季氏三分公室穆叔獨不可固請而後盟之猶使其乘之人獨盡為臣季氏瀆盟伐莒穆叔使晉被執臨危守節不以貨免既歸出見季氏指楹曰雖惡是其可去乎是亦異於季孟之心矣雖以妖夢溺於竪此二子殱焉此私門之禍不足以掩其公室之義昭子以庶獲繼不以竪牛立己為勞而殺之日食不伐鼓知季平子有異志平子出昭公昭子實從于齊謀納公不果而祈死其志為可哀亦足匹穆叔之賢矣叔孫雖不賢子路之謀墮三都也尚能順之墮郈孟孫慶父以逆誅公孫敖以淫逐而子孫乃多賢敖之二子文伯惠叔兄弟相及其奔於莒己氏所生之二子亦恥以惡聲聞文伯之子蔑是為孟獻子孔子稱其加人一等孟子稱其有友五人其後僖子亦恥不間於禮聞正考甫鼎銘而囑懿子學禮於孔子斯皆可謂賢矣然郈氏伐季氏而共執郈昭伯殺之使季氏得逐公於齊者正懿子也仲由謀墮三都叔孫氏已墮郈季氏已墮費而孟氏獨不墮成使孔子不得成相魯之功者亦懿子也豈僖子囑使之學禮者特威儀之為禮而已耶端木賜子貢欲免齊伐魯耳乃一出而亂齊破吳強晉霸越率天下而兵其禍豈止壑鄰國哉且田常欲為亂而反教之以孤主制齊可乎謂賜而為之何足為賜謂非賜所為其辨説之辭雖儀秦不之及何物史臣能偽為此是當闕疑子家羈子家羈聞昭公將伐季子之謀而不泄既伐季氏季氏請以五乘亡勸公許之不聼公孫于外子家羈從亡偹嘗艱難公薨于乾侯季氏欲仕之而逃持心堅正義不忘君進退審處動與理合魯之羣臣未有賢於子家羈者也齊管仲商周之初伊吕皆得聖君而輔之而又諸侯皆未強大故有德易以興其後諸侯爭強其勢不歸於并滅不止而生民之禍烈矣管仲起其間先以法制富國強兵為威制張本然後教其君不背曹沫之盟以示信命燕君復納貢於周以示義伐楚不服則責以包茅不貢而楚服鄭伯逃歸不盟則亦却其太子華之讒而鄭伯請盟力既足以勝然後假仁義以行之故能不以兵革而一匡天下其有功生民豈細哉然自開闢以來功利實自此始後世皆隂用其術而陽諱其名功不及之而禍反滋焉此君子所以不貴幸成之功雖當世賴之而識者譏之歟晉六卿范氏韓氏中行氏趙氏智氏魏氏晉稱六卿雖下陵上替之積子孫至於分晉名教誅之然其初興皆才智有過人者君子取節焉未可盡以下體廢也抑亦以才智而能守正者其范氏之士夑中行氏之荀吳知氏之荀罃趙氏之趙衰趙武魏氏之魏絳乎士蒍教獻公盡殺遊氏之族又以術驕虢而滅之此小人之才耳士會得政晉盜奔秦其才為可知將老而戒其子燮以從二三子惟敬庶知本原者然會晉人也在秦即侵晉仁者為之乎惟燮也不矜功不受賂謂外寧必有內憂而不事爭強視其時為獨能守正若丐也以愛其子鞅之故盡殺欒氏召亂以覆宗雖才何稱焉此范氏惟燮為可稱也荀林父將伐晉伐齊而皆取其賂先縠違節制敗於楚僅以滅潞為功抑末矣如庚如偃才皆碌碌惟吳也不受鼓之叛者鼓力竭而後取鼓再叛猶豫之田而使其忠臣相之視其時亦為守正至寅即與范吉射攻趙氏而覆宗矣此中行氏惟吳為可稱也知氏之有荀罃迎立悼公修政施德再避楚師兩聼鄭平皆不責人而求之已功烈於晉為中興而未嘗有一毫茍以成之之意非守正而能爾乎趙衰審所可從而獨從重耳視荀息里克等溝瀆愚見天壤不侔勤王定霸未嘗不告君以正趙武承其餘烈幾漸復興薄幣諸侯歸邑齊魯以信自將不虞楚之詐厥功茂焉趙簡子殺趙午納陽虎慙德非少獨以受周舍之直諌晉人懷之子孫勃興殆亦趙衰趙武之遺休爾魏犫尚力不足以訓而絳事悼公戮公弟楊干之僕遭值明主超將新軍三駕而諸侯平九合諸侯而尚勉君以思其終殆皆於其正焉基之此趙之趙欒趙武魏之魏絳皆可以守正稱也若魏舒舉十縣大夫謂非賢於人不可也然滅公族而縣之舒實預焉縣大夫得人正其植私之計左氏以為孔子賢之吾斯之未能信韓氏之可稱者韓宣子也然反戚田於衛致閻田於周正矣易縣於宋求玉於鄭何不能推其類乎善乎蜀人王當之言曰豈禮義可為於顯而棄於幽耶否則國可弱而家不可以強也狐偃諸臣附狐偃重耳外祖而傅申生驪姬之難教申生逃不果卒杜門不仕其子舅犯從重耳於秦偃雖死不敢教之二犯遂佐晉安天下功光前人其積有自來矣狐夜姑乃不量己怨陽處父之易其位擅殺以逃復返於狄豈夷之不可華也哉荀息從君於惡強立非所當立之奚齊卓子皆陷之死里克傅當立之申生顧受驪姬之間持兩可不救逮禍成事極奚齊卓子已立為君乃犯大不韙以殺之之二人者之死曽自經溝瀆者不若也好忠而不好學其弊乃爾亦可悲矣慶成一諌惠公之背秦而不聼卒誤其君而陷之敗此凶人耳瑕吕飴甥辨於秦以歸惠公其辭粲然足全國體於晉亦有一時之功冀芮教夷吾賂秦求入視舅犯之教重耳天淵不足以喻髙卑矣文公既立尚執迷不悟而謀作亂宜一絶矣冀缺乃以敬得嗣興執晉國柄郤克不忍一婦人之笑而伐齊修怨郤至本無大過反以才辨自務與錡犫同稱三惡竟覆其宗禍福無不自己豈繫其世也哉先軫以晚出之英超將中軍城濮之戰䇿勳第一乃以忠憤不顧而唾卒於自討識者悲之使其幸遇明君豈至是哉伯宗事君以忠用兵以義卒為三郤所害豈亦不能善用其剛者歟州犂奔楚曲為逆圍之謀忝厥父矣司馬女齊不瘠魯肥杞而能勸晉逰楚言必本理叔向所相與始焉終焉者可謂賢矣祈奚外舉不避讎內舉不避親至公一忱可詔千載士伯瑕多知天道其子彌牟常勸王而責宋之不共亦足名家陽處父輕易夜姑之位而見殺幾於自取苖賁皇雖有功於晉終不免楚人狙詐之習此無足云惟叔向淹博多文能以禮信為國超然一時乃違母命以女禍覆宗悲夫介推有功名之士有淡泊之士介推雖從亡特淡泊而沽激之人耳出無共濟艱難之謀甫入而文公遭變祿未暇及推即憤怨而去雖推不去亦豈若趙衰舅犯輩能佐其君以興晉哉推反譏二三子為貪天功過矣宋公子目夷向戍樂喜華元公子目夷不受襄公之讓國賢以襄公失德而屢諌不足以遏之其所能者在己其所不能者在人目夷亦奈何哉向戍辭逼陽之邑以歸諸公乃自詭弭兵而求公賞邑為善不根於實心有時而必敗耳樂喜責向戍之弭兵謂無威則驕亂生則滅凛然憂國之盛心雖一介夫之死猶哭之哀良以不貪為寶力辭獻玉其心純乎公故也華元殺楚使而致兵未為善量勢者蕩澤之亂國賴以安衛石碏祁子孔逹悝孫良夫林父寧莊子武子殖喜北宫文子蘧伯玉石碏大義滅親此不幸處人道之變非所忍言石祁子執親喪不忍以嗣位故佩玉卜兆是不足以見人心本然之天乎孔逹不量強弱挑晉取禍自經溝瀆曰利社稷恐善謀國者不為也孔悝以舅甥之親出輒而立蒯聵自衛而言父子之名雖順自悝而言君臣之分則乖夫亦當感輒以人心天理之正不可則去之耳孫良夫違衆犯齊既敗則又依晉以敗齊専而生事國何賴焉其子林父逐其君獻公以戚叛歸晉晉反為臣而執其君何哉其為盟主也寧莊子扶立文公衛以再造寧武子輔成公雖再出而不至失國調護於艱危之中庶幾世濟忠力者奈何寧殖既逐獻公寧喜欲納獻公反弒殤公為惡滋甚善惡固不繫其世耶北宫文子善覘人之國蘧伯玉於獻公之去國復國也皆避而不與善處亂世殆東漢郭有道之徒歟然有道未嘗居其位鄭七穆穆公之子十一人子然士子孔先卒子孔専而見殺子羽不為卿存而顯者稱七穆子罕子駟子良子國子遊子卭子豐是也然多骨肉相殘惟子國之子子産賢又惟子罕之孫子皮知其賢而授之政子産沒後賢而有禮者子太叔吳季札季札生蠻夷中以禮義智識聞天下聞樂而知古人之治亂歷聘而知列國之興衰燭照龜卜莫喻其明矣然吳至其父夀夢始大夀夢賢而欲立之不可其兄諸樊讓之不可其兄餘祭餘昧以次相傳必欲致位於季又不可餘昧之子王僚嗣立而諸樊之子闔閭弒之曰致季可也否則我當立吳之暴亂遂自此始楚令尹子文孫叔敖沈諸梁楚介在逺夷而雄於中國夫豈偶然之故哉令尹子文為相四十年家無一日之積孫叔敖身已貴而意益下位已髙而心益恭國有人焉若此國欲無興得乎沈諸梁當白公勝之亂國人望之如父母一舉而定之功成不居亦賢矣哉秦孟明百里奚蹇叔孟明不知鄭之不當襲又師出而輕雖王孫滿尚幼猶知其必敗雖再敗之餘鼓勇焚舟不過晉不與爭而已豈嘗有功於秦者哉秦之能霸穆公之賢而秦固強耳世乃以其焚舟之勇傳誦為美談不知秦晉報復暴兵千里更四君而不休皆孟明啓之外誤其君內違其父不才孰甚耶其父百里奚間關險阻浮沉亂世一為穆公所禮致即薦蹇叔二老隨事略言應輒如響惜穆公用不盡其才而反用其子爾黃氏日抄卷五十三
