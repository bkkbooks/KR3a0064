body:
  text: 黃氏日抄卷二十七宋黃震撰讀禮記十四緇衣第三十三子言之曰為上易事也為下易知也則刑不煩矣易以豉反君不苛虐臣無姦心則刑可以措鄭氏子曰好賢如緇衣惡惡如巷伯則爵不瀆而民作願刑不試而民咸服大雅曰儀刑文王萬國作孚好與上惡字並去聲緇衣巷伯皆詩篇名緇衣美鄭武公既欲敝豫又改又欲還豫授粲好賢之切也巷伯刺讒既欲投畀豺虎又欲投畀有北惡惡之甚也好惡明則民將自勸大雅文王篇記者又引以證民心之自孚也用鄭氏補子曰夫民教之以德齊之以禮則民有格心教之以政齊之以刑則民有遁心故君民者子以愛之則民親之信以結之則民不倍恭以涖之則民有孫心甫刑曰苗民匪用命制以刑惟作五虐之刑曰法是以民有惡德而遂絶其世也倍音佩孫音遜此章明教民以德不以刑也五虐之刑謂殺及劓刵椓黥高辛氏之末侯國有三苖者民不用上之命君無德以教之惟作五虐之刑以為法民愈為惡德三苖由是絶世鄭氏吕氏子曰下之事上也不從其所令從其所行上好是物下必有甚者矣故上之所好惡不可不慎也是民之表也好惡並去聲表者所立以候日影之器影之曲直由表之邪正此以喻民之好惡由上吕氏子曰禹立三年百姓以仁遂焉豈必盡仁詩云赫赫師尹民具爾瞻甫刑曰一人有慶兆民賴之大雅曰成王之孚下土之式以仁遂謂無一之不歸於仁遂者終獲有成之名也豈必百姓之盡仁皆由於禹一人之化耳連引詩書三章以證下之無不從上補子曰上好仁則下之為仁爭先人故長民者章志貞教尊仁以子愛百姓民致行已以說其上矣詩云有梏德行四國順之長上聲說音恱梏音角上好仁則下皆爭先為仁為君者當章明己志為貞正之教尊敬仁道以子愛百姓則民盡心於行己以說樂其上矣詩大雅抑之篇引以證上有德下所從梏詩作覺孔氏子曰王言如絲其出如綸王言如綸其出如綍故大人不倡游言可言也不可行君子弗言也可行也不可言君子弗行也則民言不危行而行不危言矣詩云淑慎爾止不愆于儀綍音弗愆起䖍反綸繩也大於絲綍索也又大於綸言正言一出下所視效其端雖微其末漸大故大人不可倡為浮游無用之言言之必可行行之必可言也則民亦效之言不髙於行行不髙於言而言行相應矣危謂髙也止容止用鄭氏孔氏補子曰君子道人以言而禁人以行故言必慮其所終而行必稽其所敝則民謹於言而慎於行詩云慎爾出話敬爾威儀大雅曰穆穆文王於緝熙敬止道行並去聲於音烏道人以言謂開明義理使民知所向也禁人以行謂躬行身率使民不敢為非也蓋空言不可以禁人惟實行乃足以禁人也言以道人故當發言之始己慮其所終行以禁人故方制行之新己稽其所敝上之謹審如此則下亦化之不茍於言行矣引詩二章皆謹言行之證陳氏馬氏真氏子曰長民者衣服不二從容有常以齊其民則民德一詩云彼都人士狐裘黃黃其容不改出言有章行歸于周萬民所望長丁丈反從七容反詩都人士之篇忠信為周周猶備也無缺失可指補子曰為上可望而知也為下可述而志也則君不疑於其臣而臣不惑於其君矣尹吉曰惟尹躬及湯咸有一德詩云淑人君子其儀不忒吉音作告可望而知謂表裏如一可述而志謂先後如一皆謂德歸於一而無二三也尹吉當作告蓋伊尹告太甲即今咸有一德之書引詩言不差忒亦證一德之義陸氏吕氏鄭氏子曰有國者章義􅓠惡以示民厚則民情不二詩云靖共爾位好是正直子曰上人疑則百姓惑下難知則君長勞故君民者章好以示民俗慎惡以御民之淫則民不惑矣臣儀行不重辭不援其所不及不煩其所不知則君不勞矣詩云上帝板板下民卒􅓠小雅曰匪其止共惟王之卭􅓠丁但反儀音義近讀如字援音袁共音恭卭其恭反章明也􅓠病也難知有姦心也淫貪侈也儀行鄭注作義行吕氏謂非禮不行故曰儀行方氏謂臣有可儀之行皆讀如字不重辭不尚言辭也上帝喻君板板猶反反共恭也卭窮也此章言人君當明其好惡使上下皆歸一德上懷疑則民惑於好惡下不易知則君勞於聽察援其所不及煩其所不知皆勞其君聽察之事也引詩板篇以證上人疑則百姓惑引小雅巧言篇以證下難知則君長勞補子曰政之不行也教之不成也爵祿不足勸也刑罰不足恥也故上不可以䙝刑而輕爵康誥曰敬明乃罰甫刑曰播刑之不迪有政教而後賞罰足以勸懲播刑之不迪謂䙝刑不迪不循其道也補子曰大臣不親百姓不寧則忠敬不足而富貴已過也大臣不治而邇臣比矣故大臣不可不敬也是民之表也邇臣不可不慎也是民之道也君毋以小謀大毋以逺言近毋以內圖外則大臣不怨邇臣不疾而逺臣不蔽矣葉公之顧命曰毋以小謀敗大作毋以嬖御人疾莊后毋以嬖御士疾莊士大夫卿士比毗志反葉舒涉反比私相親也民之表民所望也民之道民所從也葉公楚葉縣宰公子髙也臨終遺書曰顧命小謀小臣之謀大作大臣所為莊士大夫卿士謂齊莊之士為卿大夫士者也此章明臣無大小皆須恭敬而所任在大臣大臣不信而小臣之比國之大患也君毋以小臣而謀大臣之事毋以逺臣而言近臣之事毋以內臣而圖外臣之事則小大得所內外情通大臣不怨恨於君近臣不為人所非逺臣不為近所蔽記者又引葉公之顧命以證之毋以小臣之謀敗大臣之作所謂毋以小謀大也毋以嬖御之人而疾端莊之后毋以嬖御之士而疾端莊之士大夫所謂毋以內圖外也孔氏吕氏陸氏子曰大人不親其所賢而信其所賤民是以親失而教是以煩詩云彼求我則如不我得執我仇仇亦不我力君陳曰未見聖若已弗克見既見聖亦不克由聖大人以位言指在上之人也在上不親任其所賢有德之人而信用其所賤無德者則民效其上亦失所當親雖教之祗以為煩而已引詩正月篇書君陳篇皆以證不能親賢孔氏子曰小人溺於水君子溺於口大臣溺於民皆在其所䙝也夫水近於人而溺人德易狎而難親也易以溺人口費而煩易出難悔易以溺人夫民閉於人而有鄙心可敬不可慢易以溺人故君子不可以不慎也大甲曰毋越厥命以自覆也若虞機張往省括于厥度則釋兊命曰惟口起羞惟甲胄起兵惟衣裳在笥惟干戈省厥躬大甲曰天作孽可違也自作孽不可以逭尹吉曰惟尹躬天見于西邑夏自周有終相亦惟終兊作說吉作告天作先小人謂民君子謂士大夫大人謂王公德易狎而難親謂水之德也水之性有剛柔之德外隂而能柔故易狎內陽而能剛故難親狎而親之則溺死矣民閉於人而有鄙心謂情隔不能自通於上茍內懷鄙倍之心上亦不得而知虞虞人也機弩牙也括羽括也度謂所擬射也釋發矢也虞人之射禽也機已張從機間視括與射相直乃釋弦發矢喻為政亦當以己心參羣臣及萬民乃可施也衣裳在笥言藏之而不輕以豫人也干戈省厥躬言揆之於身而不可輕以加人也違避也逭逃也尹告即伊尹所告吉告字也天見今書作先見周謂忠信相助也謂臣也伊尹言見夏之先王以忠信自終其臣亦與之有終皆君所自致也此言人所以沒溺於患禍而不能自出者皆因易而䙝之也故以小民之易於水而溺以喻士大夫之易其言王公之易其民皆取溺之道也引書四章皆證不敢易之意補子曰民以君為心君以民為體心莊則體舒心肅則容敬心好之身必安之君好之民必欲之心以體全亦以體傷君以民存亦以民亡詩云昔吾有先正其言明且清國家以寧都邑以成庶民以生誰能秉國成不自為正卒勞百姓君雅曰夏日暑雨小民惟曰怨資冬祁寒小民亦惟曰怨雅讀作牙心者體之主體則從心者也故以心體為君民相須之喻所引詩今無之餘見節南山說者謂上句逸詩因而併引之也此言君不正百姓所以勞也引君牙言天之寒暑小民且怨况君之政教乎用吕氏補子曰下之事上也身不正言不信則義不一行無類也子曰言有物而行有格也是以生則不可奪志死則不可奪名故君子多聞質而守之多志質而親之精知略而行之君陳曰出入自爾師虞庶言同詩云淑人君子其儀一也行去聲身不正故義不一不一謂不能專於其身也言不信故行無類無類謂無以副於其言也言有物謂無失實之言行有格謂無踰矩之行生乎由是死乎由是故志也言也皆不可得而奪也多聞所聞欲博也多志多見而識之者也質正也不敢信己質衆人之所同然後用之者也守之者服膺勿失親之者問學不厭由知多聞多而得之又當精思以求其至約而行之故曰精知略而行之略約其所同引詩言善人君子威儀齊一凡以證言行皆當歸一師衆也虞度也吕氏子曰唯君子能好其正小人毒其正故君子之朋友有鄉其惡有方是故邇者不惑而逺者不疑也詩云君子好仇正謂正人君子取友必端故好其正小人黨邪醜正故毒其正君子友其正者惡其不正者逺近曉然知其心引詩明君子之仇匹皆好補子曰輕絶貧賤而重絶富貴則好賢不堅而惡惡不著也人雖曰不利吾不信也詩云朋友攸攝攝以威儀好與上惡並去聲可犮者以其賢可絶者以其惡然賢者不必富貴惡者不必貧賤茍輕絶貧賤而重絶富貴則勢利之友而已引詩以證取友以攝威儀而非以利方氏子曰私惠不歸德君子不自留焉詩云人之好我示我周行私惠謂私以小物相問遺不歸德謂不合於理不自留不留意於此人蓋德者天下之公惠者人情之私苟以私惠於我而無德以將之則恭敬而無實君子不可虛拘引詩鹿鳴篇明好我在忠信之可德不在小惠馬氏孔氏子曰茍有車必見其軾茍有衣必見其敝人茍或言之必聞其聲茍或行之必見其成葛覃曰服之無射敝婢世反射音亦此章言有是物必有是事不可虛也君子之學自夲至末無非其實故可久而無窮也登車而有所禮則式式慿式也有車則有式無車將何所慿而式之乎衣之久必敝無衣則何敝之有乎言必有聲行必有成亦猶是也蓋誠者物之終始不誠無物服之無射亦言實有是服乃可久服而無厭也吕氏子曰言從而行之則言不可飾也行從而言之則行不可飾也故君子寡言而行以成其信則民不得大其美而小其惡詩云白圭之玷尚可磨也斯言之玷不可為也小雅曰允也君子展也大成君奭曰昔在上帝周田觀文王之德其集大命于厥躬周田觀文四字鄭注依尚書作割申勸寧言在前而行隨之則言須實行在前而言隨之則行須實言行相顧皆不可虛飾也言行相副則人於美惡大小不得增减皆驗於行引詩書皆證言當信周田觀文王之德今書作割申勸寧王之德申重也勸免也云在昔上帝降割于殷申勸文王之德而集大命於其身也割誤作周申之為田勸之為觀則字畫尤相近而易誤寧王即指文王言之補一用孔子曰南人有言曰人而無恆不可以為卜筮古之遺言與龜筮猶不能知也而况於人乎詩云我龜既厭不我告猶兊命曰爵無及惡德民立而正事純而祭祀是為不敬事煩則亂事神則難易曰不恆其德或承之羞恆其德貞婦人吉夫子凶恆常也不可為卜筮言無恆者不足以感格鬼神鬼神至虛而善應龜筮皆神物猶或不能知之而况於人可以不恆之德而求之乎我龜既厭不我告猶猶謀也所謂瀆則不告也民立而正事純而祭祀是為不敬未詳何義鄭氏曰純猶皆也言爵與惡德之人民將立以為正而放效之疾事皆如是而以祭祀是不敬鬼神也孔氏曰言惡德之人主掌祭祀其事則煩事煩則致亂也吕氏曰此篇所引與書不同當以書為正黷于祭祀時謂弗欽禮煩則亂事神則難言煩瀆非事神之道也又引恆卦九三六五爻辭謂不恆其德或承之羞是當恆者也然婦人從一而終故恆其德吉若夫子制義不可以無變從婦則凶也補集奔喪第三十四奔喪之禮始聞親喪以哭答使者盡哀問故又哭盡哀遂行日行百里不以夜行唯父母之喪見星而行見星而舍若未得行則成服而后行過國至竟哭盡哀而止哭辟市朝望其國竟哭使色吏反辟音避行百里者吉行五十里今以凶變倍之也此猶為五服之喪也若父母喪見星而行見星而舍則侵晨侵昏皆行又不止百里而已若未得行者為有君命辟市朝不哭者為驚衆也補至於家入門左升自西階殯東西面坐哭盡哀括髮袒降堂東即位西鄉哭成踊襲絰于序東絞帶反位拜賓成踊送賓反位有賓後至者則拜之成踊送賓皆如初衆主人兄弟皆出門出門哭止闔門相者告就次於又哭括髮袒成踊於三哭猶括髮袒成踊三日成服拜賓送賓皆如初鄉相並去聲入門左與客入門而左之左同升自西階未能踐阼階為主也括髮袒者去飾也又哭者明日之朝三哭又其明日之朝三日成服則三哭之明日也鄭氏方氏奔喪者非主人則主人為之拜賓送賓奔喪者自齊衰以下入門左中庭北面哭盡哀免麻于序東即位袒與主人哭成踊於又哭三哭皆免袒有賔則主人拜賓送賓丈夫婦人之待之也皆如朝夕哭位無變也齊音咨免音問不升堂者統於主人也麻亦絰帶也鄭氏奔母之喪西面哭盡哀括髮袒降堂東即位西鄉哭成踊襲免絰于序東拜賓送賓皆如奔父之禮於又哭不括髮鄉去聲免音問殺於父也鄭氏婦人奔喪升自東階殯東西面坐哭盡哀東髽即位與主人拾踊拾其劫反升自東階者婦人入自闈門闈門謂東邉之門也東髽謂髽於東序不髽於房變於在室者也髽露髻也拾更也主人與之更踊於賓客之間也鄭氏孔氏奔喪者不及殯先之墓北面坐哭盡哀主人之待之也即位於墓左婦人墓右成踊盡哀括髮東即主人位絰絞帶哭成踊拜賓反位成踊相者告事畢遂冠歸入門左北面哭盡哀括髮袒成踊東即位拜賓成踊賓出主人拜送有賓後至者則拜之成踊送賓如初衆主人兄弟皆出門出門哭止相者告就次於又哭括髮成踊於三哭猶括髮成踊三日成服於五哭相者告事畢為母所以異於父者一括髮其餘免以終事他如奔父之禮絞乎交反相去聲鄭氏曰主人之待之謂在家者也即位於墓左既葬則於墓為位如未葬者於殯宫也男子左婦人右隂陽之義也於母一括髮於父則不一焉隆殺之别也五哭者奔喪象始死為一哭明日象小斂為二哭又明日象大斂為三哭又明日成服之日為四哭成服明日之朝為五哭皆數朝哭不數夕哭凡五哭也鄭氏方氏孔氏齊衰以下不及殯先之墓西面哭盡哀免麻于東方即位與主人哭成踊襲有賔則主人拜賓送賓賓有後至者拜之如初相者告事畢遂冠歸入門左北面哭盡哀免袒成踊東即位拜賓成踊賓出主人拜送於又哭免袒成踊於三哭猶免袒成踊三日成服於五哭相者告事畢相去聲免音問此既葬後奔齊衰以下喪禮孔氏聞喪不得奔喪哭盡哀問故又哭盡哀乃為位括髮袒成踊襲絰絞帶即位拜賓反位成踊賔出主人拜送于門外反位若有賓後至者拜之成踊送賓如初於又哭括髮袒成踊於三哭猶括髮袒成踊三日成服於五哭拜賓送賓如初此聞父母喪君命有事不得奔即於聞喪處發喪成服之禮鄭氏孔氏若除喪而后歸則之墓哭成踊東括髮袒絰拜賓成踊送賓反位又哭盡哀遂除於家不哭主人之待之也無變於服與之哭不踊自齊衰以下所以異者免麻此除喪後方歸哭之禮遂除即於墓除服而歸無變於服主人自服已除之服自齊衰以下除服後奔喪唯著免麻哭罷即除鄭氏孔氏凡為位非親喪齊衰以下皆即位哭盡哀而東免絰即位袒成踊襲拜賓反位哭成踊送賓反位相者告就次三日五哭卒主人出送賓衆主人兄弟皆出門哭止相者告事畢成服拜賓若所為位家逺則成服而往此齊衰以下不得往奔即於聞喪處成服之禮云非親戚者因明聞父母喪哭之不離聞喪之處惟齊衰以下則為位而哭也三日五哭者併朝夕哭而言為急奔喪己私事當早畢故三日五哭而止也鄭氏孔氏齊衰望鄉而哭大功望門而哭小功至門而哭緦麻即位而哭服有輕重之别故哭有逺近之差言齊衰望鄉而哭則斬衰不待望鄉而已哭可知方氏哭父之黨於廟母妻之黨於寢師於廟門外朋友於寢門外所識於野張帷凡為位不奠哭天子九諸侯七大夫五士三大夫哭諸侯不敢拜賓諸臣在他國為位而哭不敢拜賓與諸侯為兄弟亦為位而哭凡為位者一袒哭父之黨以下謂無服之親聞喪所哭之處也不奠者奠則當久設神位在他處則難為久設也哭天子九至士三此謂臣聞君喪而未奔為位而哭尊卑日數之差也張氏鄭氏所識者弔先哭于家而後之墓皆為之成踊從主人北面而踊所識者先之家而後之墓異於親也親則先之墓矣主人先踊而後賓踊故曰從自外而來故北面用鄭氏孔氏補凡喪父在父為主父沒兄弟同居各主其喪親同長者主之不同親者主之此論同居主喪之禮聞逺兄弟之喪既除喪而後聞喪免袒成踊拜賓則尚左手小功緦麻既除喪不追服惟免袒尚左手者吉拜鄭氏無服而為位者唯嫂叔及婦人降而無服者麻婦人降而無服族姑姊妹嫁者也麻謂緦之絰弔服也鄭氏孔氏凡奔喪有大夫至袒拜之成踊而后襲於士襲而后拜之袒拜成踊而后襲以大夫尊先拜之而後成己禮也襲而后拜以士卑先成己禮而後拜之也本孔氏說問喪第三十五親始死雞斯徒跣扱上衽交手哭惻怛之心痛疾之意傷腎乾肝焦肺水漿不入口三日不舉火故鄰里為之糜粥以飲食之雞斯讀為笄纚纚色買反雞斯當為笄纚聲之誤也笄謂骨笄纚謂縚髮之繒親始死去冠惟留笄纚小斂乃括髮併去笄纚也交手哭謂兩手拊心而哭也扱上衽者扱深衣前祍於帶為其妨號踊也糜薄粥厚鄰里為之以飲食孝子不自顧其生也鄭氏孔氏夫悲哀在中故形變於外也痛疾在心故口不甘味身不安美也三日而斂在床曰尸在棺曰柩動尸舉柩哭踊無數惻怛之心痛疾之意悲哀志悶氣盛故袒而踊之所以動體安心下氣也婦人不宜袒故發胸擊心爵踊殷殷田田如壞牆然悲哀痛疾之至也故曰辟踊哭泣哀以送之送形而往迎精而反也其往送也望望然汲汲然如有追而弗及也其反哭也皇皇然若有求而弗得也故其往送也如慕其反也如疑求而無所得之也入門而弗見也上堂又弗見也入室又弗見也亡矣喪矣不可復見已矣故哭位辟踊盡哀而止矣心悵焉愴焉惚焉愾焉心絶志悲而已矣祭之宗廟以鬼饗之徼幸復反也成壙而歸不敢入處室居於倚廬哀親之在外也寢苫枕塊哀親之在土也故哭泣無時服勤三年思慕之心孝子之志也人情之實也殷音隱壞音怪爵踊如爵之跳足不絶地辟拊心也如壞墻言將欲崩倒不可枝梧也孔氏鄭氏方氏或問曰死三日而後斂者何也曰孝子親死悲哀志悶故匍匐而哭之若將復生然安可得奪而斂之也故曰三日而后斂者以俟其生也三日而不生亦不生矣孝子之心亦益衰矣家室之計衣服之具亦可以成矣親戚之逺者亦可以至矣是故聖人為之斷決以三日為之禮制也此假設問以明三日而斂之義孔氏或問曰冠者不肉袒何也曰冠至尊也不居肉袒之體也故為之免以代之也然則秃者不免傴者不袒跛者不踊非不悲也身有錮疾不可以備禮也故曰喪禮唯哀為主矣女子哭泣悲哀擊胸傷心男子哭泣悲哀稽顙觸地無容哀之至也免音問跛補禍反肉袒者不冠為冠尊服不敢䙝之於肉袒之體故著免以代冠免狀似冠而廣一寸郊特牲君袒而割牲蓋袒衣而非肉袒肉袒者露肉用鄭氏孔氏修或問曰免者以何為也曰不冠者之所服也禮曰童子不緦唯當室緦緦者其免也當室則免而杖矣免音問當室謂無父兄而主家者也童子不緦不緦則不免不免則不杖今以孤子當室次於成人既為族人服緦則亦免而杖矣鄭氏孔氏方氏或問曰杖者何也曰竹桐一也故為父苴杖苴杖竹也為母削杖削杖桐也或問曰杖者以何為也曰孝子喪親哭泣無數服勤三年身病體羸以杖扶病也則父在不敢杖矣尊者在故也堂上不杖辟尊者之處也堂上不趨示不遽也此孝子之志也人情之實也禮義之經也非從天降也非從地出也人情而已矣苴七餘反辟音避苴者不加削也父尊極故用苴杖母屈於父故用削杖苴用竹削用桐或云竹節在外外陽之象故為父桐節在內內隂之類故為母愚竊意竹虛桐輕皆易於擕持竹直不待削故苴而用之父其次用木則木莫輕於桐故削而用之母耳父在不杖謂母喪也尊者指父言也趨者疾行也事莫遽於喪而堂上不趨者示父以閒暇不欲以喪容戚之也用鄭氏孔氏方氏修服問第三十六傳曰有從輕而重公子之妻為其皇姑有從重而輕為妻之父母有從無服而有服公子之妻為公子之外兄弟有從有服而無服公子為其妻之父母為于僞反此皆從服非正服而可變易者也從輕而重從無而有以人情無所嫌而伸之也從重而輕從有而無以人情有所嫌而屈之也馬氏傳曰母出則為繼母之黨服母死則為其母之黨服為其母之黨服則不為繼母之黨服雖外親亦無二統鄭氏三年之喪既練矣有期之喪既葬矣則帶其故葛帶絰期之絰服其功衰有大功之喪亦如之小功無變也三年喪既練期喪既葬二者適相值帶用故葛帶絰用期之葛絰服用功衰謂期喪既葬男子葛帶與三年之葛帶粗細正同以父葛為重故帶其舊葛帶也三年練後男子已除麻絰故絰期之葛絰也功衰者七升布三年練後與期喪葬後皆用之也有大功之喪亦如之者謂於斯時也有大功之喪帶絰服亦如之蓋大功之初喪如期喪之既葬也小功之喪不變不以輕服减重服也孔氏麻之有本者變三年之葛既練遇麻斷本者於免絰之既免去絰每可以絰必絰既絰則去之免音問麻之有本者謂大功以上麻帶皆留根也三年之葛謂三年之喪既練去麻用葛者也變三年之葛謂三年之喪雖已去麻用葛若遇大功以上之喪再得變葛用麻也麻斷本者謂小功以下之帶澡麻而去其根者也若三年之喪既練而遇小功以下之喪當其成服加免之時則絰之既免則去其絰凡首絰可絰則絰既即去之本孔氏說小功不易喪之練冠如免則絰其緦小功之絰因其初葛帶緦之麻不變小功之葛小功之麻不變大功之葛以有本為稅凡皆不以輕服變重服也稅變易也麻以有本者為重故得變易而稅焉用方氏補殤長中變三年之葛終殤之月算而反三年之葛是非重麻為其無卒哭之稅下殤則否長丁丈反是非重麻者言服長殤中殤之麻不改是非重此麻也以殤服初死服麻已後無卒哭稅麻服葛之法不容不為之服麻也本孔氏說君為天子三年夫人為外宗之為君也世子不為天子服外宗君外親之婦也如外宗之為君期服也世子不為天子服以有世襲逺嫌也鄭氏孔氏君所主夫人妻大子適婦大夫之適子為君夫人大子如士服君之母非夫人則羣臣無服唯近臣及僕驂乘從服唯君所服服也適丁歷反夫人大子適婦三者國之所重故君特為之主喪夫人即妻又曰妻者以見大夫以下亦然也大夫之適子為君夫人大子有服者諸侯之子世襲故逺嫌不敢為天子服大夫之子不世襲無嫌故可為諸侯服也如士服期服也君母非夫人其臣不為之服惟僕御從之服適庶之辨也賈氏公為卿大夫錫衰以居出亦如之當事則辨絰大夫相為亦然為其妻往則服之出則否當事謂有事于喪所辨絰如爵辨而素加絰也鄭氏孔氏凡見人無免絰雖朝於君無免絰唯公門有稅齊衰傳曰君子不奪人之喪亦不可奪喪也傳曰罪多而刑五喪多而服五上附下附列也免音勉無免絰絰重不可去也稅猶免也唯至公門已有不杖齊衰則脫去其衰而絰猶不去也鄭氏孔氏間傳第三十七斬衰何以服苴苴惡貌也所以首其內而見諸外也斬衰貌若苴齊衰貌若枲大功貌若止小功緦麻容貌可也此哀之發於容體者也斬衰之哭若往而不反齊衰之哭若往而反大功之哭三曲而偯小功緦麻哀容可也此哀之發於聲音者也偯於起反苴子麻也此麻尤粗枲牡麻也則稍精焉若者其服用此貌亦如之也首其內而見諸外謂縫其端於內而露其苴於外也斬衰不縫齊衰略縫功者布之精緻緦者布之細也往而不反氣欲絶而不能生也止平停不動三曲舉聲而三折偯聲餘從容也用方氏補斬衰唯而不對齊衰對而不言大功言而不議小功緦麻議而不及樂此哀之發於言語者也斬衰三日不食齊衰二日不食大功三不食小功緦麻再不食士與斂焉則一不食故父母之喪既殯食粥朝一溢米莫一溢米齊衰之喪疏食水飲不食菜果大功之喪不食醯醬小功緦麻不食醴酒此哀之發於飲食者也一溢米重二十兩與鎰金之鎰同義孔氏父母之喪既虞卒哭疏食水飲不食菜果期而小祥食菜果又期而大祥有醯醬中月而禫禫而飲醴酒始飲酒者先飲醴酒始食肉者先食乾肉疏食音嗣此父母終喪以來飲食之節父母之喪居倚廬寢苫枕塊不說絰帶齊衰之喪居堊室苄翦不納大功之喪寢有席小功緦麻牀可也此哀之發於居處者也父母之喪既虞卒哭柱楣翦屏苄翦不納期而小祥居堊室寢有席又期而大祥居復寢中月而􅎭禫而牀斬衰三升齊衰四升五升六升大功七升八升九升小功十升十一升十二升緦麻十五升去其半有事其縷無事其布曰緦此哀之發於衣服者也說吐活反苄戶嫁反苄今蒲蘋也苄翦不納者謂以蒲蘋為席翦頭為之不編納其頭而藏於內也柱廬間之楣以為之固故曰柱楣翦廬傍屏蔽之草以為飾故曰翦屏八十一縷曰升緦麻十五升去其半者七升半也有事其縷謂未織時煆治其縷無事其布謂既織後不煆治其布是曰緦也孔氏斬衰三升既虞卒哭受以成布六升冠七升為母疏衰四升受以成布七升冠八升去麻服葛葛帶三重期而小祥練冠縓緣要絰不除男子除乎首婦人除乎帶男子何為除乎首也婦人何為除乎帶也男子重首婦人重帶除服者先重者易服者易輕者又期而大祥素縞麻衣中月而禫禫而纎無所不佩去起吕反重直龍反縓七戀反緣音椽成布謂三升以上之布粗疏至六升其縷漸細故稱成布葛帶三重者謂作四股糾之四股則積而三重也縓緣者以縓色為領緣縓今淺絳色婦人重帶者帶下體之上以辟男子之重首絰也黑經白緯曰纎鄭氏孔氏易服者何為易輕者也斬衰之喪既虞卒哭遭齊衰之喪輕者包重者特既練遭大功之喪麻葛重輕者謂男子之要帶婦人之首絰重者謂男子之首絰婦人之要帶以其輕則兩施之故曰包以其重則獨留焉故曰特既練以下則言大功可易斬衰之節也斬衰已練男子除絰而帶獨存婦人除帶而絰獨存謂之單單獨也遭大功之喪男子有麻絰婦人有麻帶又皆易其輕者以麻謂之重麻既虞卒哭男子帶其故葛帶絰期之葛絰婦人絰其故葛絰帶期之葛帶謂之重葛方氏鄭氏齊衰之喪既虞卒哭遭大功之喪麻葛兼服之齊衰既虞卒哭遭大功之喪換易輕者男子則大功麻帶易齊衰之葛帶其首猶服齊衰之葛絰是首有葛要有麻故云麻葛兼服之兼云者既有葛又有麻也孔氏斬衰之葛與齊衰之麻同齊衰之葛與大功之麻同大功之葛與小功之麻同小功之葛與緦之麻同麻同則兼服之兼服之服重者則易輕者也此明五服葛之與麻粗細相同則得服後麻兼服前葛重者則易輕者男子易於要婦人易於首俱得易輕者也孔氏三年問第三十八三年之喪何也曰稱情而立文因以飾羣别親疏貴賤之節而弗可損益也故曰無易之道也創巨者其日久痛甚者其愈遲三年者稱情而立文所以為至痛極也斬衰苴杖居倚廬食粥寢苫枕塊所以為至痛飾也三年之喪二十五月而畢哀痛未盡思慕未忘然而服以是斷之者豈不送死有已復生有節也哉别彼列反創音瘡斷丁亂反羣謂五服之親因三年之喪差降各表其親黨孔氏凡生天地之間者有血氣之屬必有知有知之屬莫不知愛其類今是大鳥獸則失其羣匹越月踰時焉則必反巡過其故鄉翔回焉鳴號焉蹢躅焉踟蹰焉然後乃能去之小者至於燕雀猶有啁噍之頃焉然後乃能去之故有血氣之屬者莫知於人故人於其親也至死不窮蹢直亦反躅直録反啁張留反噍子流反鳥獸小大各思其類况在于人何有窮己孔氏將由夫患邪淫之人與則彼朝死而夕忘之然而從之則是曽鳥獸之不若也夫焉能相與羣居而不亂乎將由乎修飾之君子與則三年之喪二十五月而畢若駟之過隙然而遂之則是無窮也故先王焉為之立中制節一使足以成文理則釋之矣與音餘邪淫之人薄於恩者也患云者患其恩之薄也駟之過隙駟馬駿疾空隙狹小過之速甚也遂之謂不時除之釋猶除也此言小人薄於恩君子厚於恩先王為之立中制補然則何以至期也曰至親以期斷是何也曰天地則已易矣四時則已變矣其在天地之中者莫不有更始焉以是象之也期音基此設問以明期之義孔氏然則何以三年也曰加隆焉爾也焉使倍之故再期也由九月以下何也曰焉使弗及也故三年以為隆緦小功以為殺期九月以為間上取象於天下取法於地中取則於人人之所以羣居和一之理盡矣焉猶然也鄭氏故三年之喪人道之至文者也夫是之謂至隆是百王之所同古今之所一也未有知其所由來者也孔子曰子生三年然後免於父母之懷夫三年之喪天下之逹喪也未有知其所由來明行之已久鄭氏深衣第三十九古者深衣蓋有制度以應規矩繩權衡短毋見膚長毋被土續衽鉤邉要縫半下見賢遍反被彼義反鉤古侯反深衣者古上衣下裳此衣裳相連為一被體深邃故謂之深衣也規圓矩方繩直權衡平袂在前應規夾在中應矩縫在後應繩齊在下應權衡也短毋見膚長毋被土與身長短適相稱也衽今之襟亦曰袂衣之衽與裳相續故曰續衽衣邉本分四袴今鉤連為一故曰鉤邉要中之縫尺寸闊狹半於下畔之闊蓋深衣裳十二幅皆寬頭在下狹頭在上下共闊一丈四尺四寸要縫半之則七尺二寸故曰要縫半下一說深衣入要半寸其縫齊音咨摺一寸謂之半下此專以縫言也集慈湖及文公家禮附注袼之髙下可以運肘袂之長短反詘之及肘帶下毋厭髀上毋厭脅當無骨者袼音各厭於甲反髀步啓反袼謂衣袂當臂處髙下宜稍寬使可運動其肘袂袖也肘臂節也當臂之半袂言長短而不言尺寸者經以臂之長短布幅闊狹皆無常準故但云屈之及肘謂袖之短長但取其長一臂有半使反詘其半適及臂半之肘此即衣袂長短之度蓋視肘以為袂也帶下不厭髀上不厭脅適當無骨之處謂腹間也用晦翁及趙侍郎汝梅說制有十二幅以應十有二月袂圜以應規曲夾如矩以應方負繩及踝以應直下齊如權衡以應平夾音劫齊音咨十有二幅者謂裳六幅每幅交解為二分為上下之殺闊處皆在下狹處皆在上共成十二幅也袂袖也自袖口至腋下裁令其勢圓故應規夾交領也領交㑹處自然成方故應矩後漢儒林傳注曰方領直領也或云夾與領非一物别有夾方折之加於領上未知然否然近世朱晦庵定論為直領矣負繩謂衣之背縫及裳之背縫上下相當如繩之直而負之於背故應直下齊者衣裾之緝謂之齊如權衡相等故應平用鄭氏孔氏司馬公慈湖石林修故規者行舉手以為容負繩抱方者以直其政方其義也故易曰坤六二之動直以方也下齊如權衡者以安志而平心也所以袂圓中規者欲使行者舉手揖讓以為容儀如規也負繩背之縫也抱方領之方也政或作正以直其正解負繩以方其義解抱方記者既明直方之義故引坤卦六二直方以證之裳下之齊如權之衡低仰平也孔氏五法已施故聖人服之故規矩取其無私繩取其直權衡取其平故先王貴之故可以為文可以為武可以擯相可以治軍旅完且弗費善衣之次也完且弗費謂其完牢且易有也善衣謂朝祭之服鄭氏孔氏具父母大父母衣純以繢具父母衣純以青如孤子衣純以素純袂緣純邉廣各寸半純之允反繢胡對反大父母祖父母也純謂緣之也繢畫文㑹五采也袂緣謂袖口也尊者存則以多飾為孝鄭氏孔氏投壺第四十投壺之禮主人奉矢司射奉中使人執壺奉音捧投壺者主人與客燕飲講論才藝之禮蓋射禮之細也矢者所投之籌中者受算之器中或以鹿或以兕或以虎或以閭或以皮樹皆刻木以象其形鑿其背以盛算孔氏主人請曰某有枉矢哨壺請以樂賓賓曰子有旨酒嘉肴某既賜矣又重以樂敢辭哨七笑反重直用反枉謂曲而不直哨謂哨峻不正謙辭也主人曰枉矢哨壺不足辭也敢固以請賓曰某既賜矣又重以樂敢固辭主人曰枉矢哨壺不足辭也敢固以請賓曰某固辭不得命敢不敬從賓再拜受主人般還曰辟主人阼階上拜送賓般還曰辟辟音避賓既許主人投壺賓乃於西階上北面再拜遙受矢主人見賓拜乃般曲析還謂賓曰今辟而不敢受言此者欲止賓之拜也於是賓及主人皆來兩楹之間相就俱南面主人在東接矢與賓主人復歸阼階上北面拜送矢賓亦歸西階上般還而告主人曰今辟而不敢受此言亦以止主人之拜也孔氏已拜受矢進即兩楹間退反位揖賓就筵司射進度壺間以二矢半反位設中東面執八算興壺去坐二矢半算以記籌數八算賓主各四矢也鄭氏方氏請賓曰順投為入比投不釋勝飲不勝者正爵既行請為勝者立馬一馬從二馬三馬既立請慶多馬請主人亦如之此司射執八算起而告賓黨為投壺之法也順投為入者以矢本順入於壺乃名為入射者入一矢則司射者釋一算以記其射中之數比投不釋者其法賓主更迭而投若勝者恃勝而連投則雖入亦不為之釋算也正爵謂罰爵以其正禮故稱正爵也既行謂己行正爵也立馬謂取算以為馬表勝數也一馬從二馬者每一勝立一馬以三馬為成若專三馬則為一成若勝者止得其二則徹取劣偶之一以足勝偶之二成三故云一馬從二馬也三馬既立請慶多馬者其勝已成又酌酒慶賀多馬之偶也請主人亦如之謂亦如上文請賓之辭命弦者曰請奏貍首間若一大師曰諾此明司射命工作樂節投壺之儀也弦鼓瑟者也貍首逸詩篇射義所云曾孫侯氏檀弓所云貍首之班然者也間若一者間者樂之節欲其終始相協如一或云若者預設之辭蓋謂或間亦或一非以為節也未知孰是大師即弦者諾承領之辭鄭氏孔氏吕氏陸氏左右告矢具請拾投有入者則司射坐而釋一算焉賓黨於右主黨於左拾其劫反此明投壺中者釋算之儀左謂主人右謂賓客司射者偏告主賓以矢具也拾更也告矢以具請更投之也若矢有入壺者則司射乃坐釋一算於地以記之賓者於右主者於左鄭氏孔氏卒投司射執算曰左右卒投請數二算為純一純以取一算為竒遂以竒算告曰某賢於某若干純竒則曰竒鈞則曰左右鈞數色主反純音全竒紀宜反卒已也一純以取者二算成一純則取以實於左手至十純則縮而委之每委異之有餘則橫諸純下一算為竒竒則縮諸純下故曰遂以竒數賢謂勝鈞猶等也等則左右手各執一算以告鄭氏命酌曰請行觴酌者曰諾當飲者皆跪奉觴曰賜灌勝者跪曰敬養奉觴曰賜灌謂當飲者謝曰䝉賜灌也灌謂飲也勝者跪執之曰敬以養氣體之不足也孔氏正爵既行請立馬馬各直其算一馬從二馬以慶慶禮曰三馬既備請慶多馬賓主皆曰諾正爵既行請徹馬飲不勝者畢司射又請為勝者立馬也直當也一馬從二馬以慶謂一黨不必三勝其一勝者併其馬於再勝者以慶之惟一勝者不得慶也鄭氏孔氏算多少視其坐籌室中五扶堂上七扶庭中九扶算長尺二寸壺頸修七寸腹修五寸口徑二寸半容斗五壺中實小豆焉為其矢之躍而出也壺去席二矢半矢以柘若棘毋去其皮扶方于反去上聲視其坐視其所坐之人以計多少也籌矢也鋪四指曰扶一指按寸即春秋傳三十一年公羊傳膚寸而合之扶五扶則二尺也室中最狹故五扶堂上差寬故七扶庭中彌寬故九扶鄭氏孔氏魯令弟子辭曰毋憮毋敖毋偝立毋踰言偝立踰言有常爵薛令弟子辭曰毋憮毋敖毋偝立毋踰言若是者浮憮好吾切魯與薛有時投壺號令其弟子之辭也憮大也敖慢也偝立不正鄉而立也踰言或踰位而言也有常爵罰以爵也浮滿爵也用鄭氏補山隂陸氏謂魯同姓之親薛異姓之親記魯令著所以待同姓之禮記薛令著所以待異姓之禮鼓半魯鼓半薛鼓取半以下為投壺禮盡用之為射禮司射庭長及冠士立者皆屬賓黨樂人及使者童子皆屬主黨魯鼓半薛鼓半音圓為鼓口鄭呼此魯薛擊鼓之節每一圜㸃則一擊鼙每一方㸃則一擊鼓庭長司正也冠士謂外人來觀投壺之成人也樂人國人之能為樂者鄭氏儒行第四十一魯哀公問於孔子曰夫子之服其儒服與孔子對曰丘少居魯衣逢掖之衣長居宋冠章甫之冠丘聞之也君子之學也博其服也鄉丘不知儒服與音餘逢大也掖袂也章甫殷冠名補哀公曰敢問儒行孔子對曰遽數之不能終其物悉數之乃留更僕未可終也行去聲數色主反更平聲物猶事也更僕謂其說久長僕侍疲倦雖更代之未可終也更僕猶詩云緝御用孔氏修哀公命席孔子侍曰儒有席上之珍以待聘夙夜強學以待問懷忠信以待舉力行以待取其自立有如此者席上之珍吕氏謂儒者講學從容乎席上知所自貴以待天下之用晏氏謂君子比德於玉故稱珍焉方其藏器於身則玉韞於匱中及其待時而動則珍陳於席上故曰席上之珍以待聘集儒有衣冠中動作慎其大讓如慢小讓如僞大則如威小則如愧其難進而易退也粥粥若無能也其容貌有如此者粥章六反中動作慎言衣冠不自異於常人孔氏動疑謂衣冠中度作謹慎儒有居處齊難其坐起恭敬言必先信行必中正道塗不爭險易之利冬夏不爭隂陽之和愛其死以有待也養其身以有為也其備豫有如此者齊側皆反難乃旦反齊者齊莊難者恭慎不爭隂陽之和謂寒襖不自擇已便而妨人也用橫渠補儒有不寶金玉而忠信以為寶不祈土地立義以為土地不祈多積多文以為富難得而易祿也易祿而難畜也非時不見不亦難得乎非義不合不亦難畜乎先勞而後祿不亦易祿乎其近人有如此者祈求也鄭氏儒有委之以貨財淹之以樂好見利不虧其義劫之以衆沮之以兵見死不更其守鷙蟲攫摶不程勇者引重鼎不程其力往者不悔來者不豫過言不再流言不極不斷其威不習其謀其特立有如此者摶猛引重不量其勇力之堪與否當之則往喻儒者見艱難之事遇則行之不豫度量也往者不悔事過即化也來者不豫事至乃應也過言不再改之速也流言不極止之力也威不斷而立謀不習而成用鄭氏孔氏方氏補儒有可親而不可劫也可近而不可迫也可殺而不可辱也其居處不淫其飲食不溽其過失可微辨而不可面數也其剛毅有如此者溽濃厚也過失不可面數疑好勝尚氣之言所貴於儒者以聞過而改也吕氏儒有忠信以為甲胄禮義以為干櫓戴仁而行抱義而處雖有暴政不更其所其自立有如此者甲鎧胄兜鍪干櫓小盾大盾儒有一畝之宫環堵之室蓽門圭窬蓬戶甕牖易衣而出并日而食上答之不敢以疑上不答不敢以諂其仕有如此者窬音豆窬門旁窬穿牆為之上剡如圭鄭氏儒有今人與居古人與稽今世行之後世以為楷適弗逢世上弗援下弗推讒諂之民有比黨而危之者身可危也而志不可奪也雖危起居竟信其志猶將不忘百姓之病也其憂思有如此者推昌錐反比毗志反稽古說合也胡氏云考也上弗援謂上無援引之者下弗推謂下無推進之者危謂毁害之也上下皆不得其應而讒諂之民反有危害之者然雖能危吾之居處而終得以伸吾之志願猶將不忘百姓之病所謂思飢猶巳飢之者於此而後足以見憂思故曰其憂思有如此者集鄭氏方氏說儒有博學而不窮篤行而不倦幽居而不淫上通而不困禮之以和為貴忠信之美優遊之法慕賢而容衆毁方而瓦合其寬裕有如此者幽居窮也上通逹也不淫言節有守而不至於過不困言才有餘而不至於乏忠信之美以忠信為美也優遊之法以和柔為法也毁方毁去其圭角瓦合委曲相合如瓦之覆屋也儒有內稱不辟親外舉不避怨程功積事推賢而進達之不望其報君得其志茍利國家不求富貴其舉賢援能有如此者辟音避稱即舉也君得其志謂君欲有為所舉之賢能成之使君得遂其所欲為之志也茍利國家不求富貴薦賢為國不徼賞也本鄭氏方氏說儒有聞善以相告也見善以相示也爵位相先也患難相死也久相待也逺相致也其任舉有如此者相先猶相讓也久相待謂雖久而不忘逺相致謂雖逺而不遺任舉謂保任薦舉天下之士也鄭氏孔氏儒有澡身而浴德陳言而伏靜而正之上弗知也粗而翹之又不急為也不臨深而為髙不加少而為多世治不輕世亂不沮同弗與異弗非也其特立獨行有如此者澡浴皆喻致潔陳言而伏既言而退伏也靜而正之惟欲正君而不求名也上弗知者雖用心如此而上不見知也粗而翹之以事之粗者微發其端而不急於為之也不臨深而為髙不加少而為多據其實有而不增飾表襮也世治不輕世亂不沮不以治而輕為不以亂而沮撓也補儒有上不臣天子下不事諸侯慎靜而尚寬強毅以與人博學以知服近文章砥厲廉隅雖分國如錙銖不臣不仕其規為有如此者博學以知博學而多知也服近文章服習親近於文章之事如威儀之中度語言之當理皆是也砥厲廉隅謂堅節行砥以平之厲以峻之廉謂稜隅謂角皆方正刻削而分毫不可紊者也分國如錙銖其義未詳鄭氏謂雖分國以祿之視之輕如錙銖錙者八兩銖者權分十黍之重又鄭氏以後諸家皆以博學以知服五字為句惟吕氏陸氏以博學以知為句今從之補髮竊謂分國如錙銖謂雖毫必與之共亦不輕受也儒有合志同方營道同術並立則樂相下不厭久不相見聞流言不信其行本方立義同而進不同而退其交友有如此者樂音洛下戶嫁反厭於豔反方嚮也同志嚮也營道者經營道藝同術者同學術也並立則樂謂無忌心相下不厭謂有遜志久不相見聞流言不信謂相信之篤不為讒言所動本方本於方正用方氏修溫良者仁之本也敬慎者仁之地也寬裕者仁之作也孫接者仁之能也禮節者仁之貌也言談者仁之文也歌樂者仁之和也分散者仁之施也儒皆兼此而有之猶且不敢言仁也其尊讓有如此者仁之本者可與為仁仁之地者可與行仁其規模寬裕則稱仁之動作其與人遜接則習仁之能事吕氏儒有不隕穫於貧賤不充詘於富貴不慁君王不纍長上不閔有司故曰儒今衆人之命儒也妄常以儒相詬病孔子至舍哀公館之聞此言也言加信行加義終沒吾世不敢以儒為戲妄音亡以妄常為句今如字以妄字為句隕穫困迫失志之貌充詘喜溢失節之貌慁猶辱纍猶係閔猶病言不取辱於君上不纍及於長上下不被明刑而見閔於有司此故謂之儒今之名為儒者非真儒故常為人所詬病鄭氏晏氏黃氏日抄卷二十七
