body:
  text: 黃氏日抄儒家類提要臣等謹案黃氏日抄九十四卷宋黃震撰震有古今紀要已著録是書本九十七卷凡讀經者三十卷讀三傳及孔氏書者各一卷讀諸儒書者十三卷讀史者五卷讀雜史讀諸子者各四卷讀文集者十卷計六十八卷皆論古人其六十九卷以下凡奏劄申明公移講義策問書記序跋啓祝文祭文行狀墓志著録者計二十九卷皆所自作之文其中八十一卷八十九卷九十二卷原本並缺其存者實九十四卷也震與楊簡同鄉里簡為陸氏學震則自為朱氏學不相附和是編以所讀諸書隨筆劄記而斷以己意有僅摘切要數語者有不摘一語而但存標目者併有不存標目而采録一兩字者大旨於學問則力排佛老由陸九淵張九成以上溯楊時謝良佐皆議其雜禪雖朱子校正隂符經參同契亦不能無疑于治術則排功利詆王安石甚力雖朱子謂周禮可致太平亦不敢遽信其他解説經義或引諸家以翼朱子或舍朱子而取諸家亦不堅持門户之見蓋震之學朱一如朱之學程反復發明務求其是非中無所得而徒假借聲價者也乾隆四十五年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4a1be6819fd22e0d44e54c0fdae2e09538b49981611a67e46c904f89c82e70c1
