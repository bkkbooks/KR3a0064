body:
  text: 黄氏日抄巻三十五宋黄震撰讀本朝諸儒理學書三晦庵先生文集二雜著尚書堯典注安安古說有以爲安民之當安者今定爲無所勉強之貌蓋此節上下文皆言聖徳未及安民事也百姓古說有以爲百官之族姓者今指爲畿内庶民與下文萬邦相恊謂民爲百姓亦便也朔方朔字蘇也萬物至此死而復蘇堯冬至日在虚昬中昴今日在斗昬中壁盖天有三百六十五度四分度之一歳有三百六十五日四分日之一天度四分之一而有餘歳日四分之一而不足故天度常平運而舒日運常内轉而縮天漸差而西歳漸差而東東晋虞喜始立差法約五十年退一度何承天以爲太過倍其年又反不及隋劉焯折𠂻爲七十五年閠法以周天三百六十五度四分度之一天體圓健繞地左旋一日一周而過一度日少遲繞地一周而不及天一度月尤遲一日常不及天十三度十九分度之七歳以三百六十日常数計之日行多三日九百四十分日之二百三十五爲氣盈月行少五日九十四分之五百九十二爲朔虛合氣盈朔虛而閏生焉嬪于虞之下欽哉字說以爲戒二女之辭於文意極順前無此說舜典以至于岱宗柴望為句按書有三月庚戌柴望詩有廵狩告祭柴望則柴望二字相連爲文甚明前此以柴字絶句者真不仔細耳卒乃復古說謂五噐受訖則還諸侯今說謂事畢則不復東而西向䕫曰於余擊石拊石謂此益稷之誤簡方九官相遜不應自夸璿璣璿者羙珠飾璣以象星言天三家宣夜無師說周髀謂天似覆盆而斗極居中中髙而四邉下日月旁行繞之日近而見爲晝日逺而不見爲夜蔡邕以爲考騐多失渾天以為天包地天居地上有一百八十二度半強地下亦然北極出地三十六度南極入地亦三十六度而嵩髙正當天之中極南北極特其兩端其天與日月星宿斜而廽轉耿夀昌始鑄銅爲象轉而望之知日月星辰所在即璿璣遺法蔡邕以爲近得天體之實本朝因之爲儀三重外曰六合儀平置單環面定四方側立黒雙環刻去極度数半出入地上下其一結於子午爲天經其一結於卯酉爲天緯天經環南北二極皆爲圓軸虛中而内向以挈在内三辰四遊之環上下四方於是可考次内曰三辰儀亦爲雙黒環刻去極度数外貫天經之軸内挈黄赤二道赤道爲赤單環外依天緯亦刻宿度而結於外環之卯酉黄道爲黄雙環亦刻宿度而又斜倚於赤道之腹而交結於卯酉而半入其内爲春分後之日軌半出其外爲秋分後之日軌下設機輪以水激之使日夜隨天東西運轉日月星辰於是可考其最在内曰四遊儀亦爲雙黒環如三辰儀之制以貫天經之軸環内兩面各施直距外距指兩軸要中之内又爲小窽受玉衡要中之小軸使衡隨環東西運轉又可南北低昻以待占候者仰窺焉東西南北於是無不周遍愚按周髀謂日月遶斗極以見不見爲晝夜即道家日月繞崑崙山相隠避爲光明之說然道家之所指者山也山在地而髙人或爲其所隔則容有不見者雖無其事尚或可說周髀之所指者斗也斗極髙懸日月縱環繞於其上人亦安有因其逺而不見者哉幾於襲用之而愈舛矣日月星辰隨天斜轉東浮西沉人人共見則渾天之說爲可信而本朝之占騐愈宻矣大禹謨金縢召誥洛誥等說及武成日月譜孝經刋誤自開宗明義至庶人章去其所引諸書合爲一章曰正經餘章刋其雜引左傳等文而存其與諸經相關者爲傳初衡山胡侍郎論語說疑孝經引詩非經本文沙隨程可久亦言玉山汪端明以爲此書多出後人傅㑹先生因而廣之爲刋誤讀管氏弟子職始於學則次蚤作次受業對客次饌饋次乃食次灑掃次執燭次請衽次退習凡九篇皆叶韻而文質澁先生爲之注釋古者小學灑掃應對進退之節於斯乎有考矣始於學則謂人莫先於學凡其后所叙皆學也蚤作次之受業又次之晨必先長者而起給事之後即讀誦也請衽又次之而退習終之夜必後長者而寐給事之后復讀誦也此其大畧也致知躬行工夫交進此其爲大學基本云記嵩山晁氏卦爻彖象說古易上下經及十翼凡十二篇費直以彖象文言雜入卦中古十二篇之易遂亡王弼因之又分爻之象辭各附當爻惟乾之小象不繋於爻辭此記晁氏說也先生注按詩䟽漢初傳訓皆與經别行及馬融爲周禮注欲省學者兩讀故就經爲注髙貴鄉公謂彖象不連經文者十二卷之古經傳也然則先生本義之作盖復其舊云蓍卦考誤揲蓍之法五十䇿去其一以四十九䇿分置左右手所謂分二以象兩又取一䇿懸於左手小指之間所謂卦一以象三揲者数之也先置右手策而以右手四四数左手之䇿又置左手䇿而以左手四四数右手之䇿所謂揲之以四以象四時四四之後必有零数左手者歸之於第四第三指之間右手者歸於第三第二指之間以勒之所謂歸竒於扐以象閏一掛兩揲兩扐爲五嵗之象故曰五嵗再閠故再扐而後掛及后掛則又置前掛扐之䇿復以見存分二掛一爲第二變矣每變分二掛一揲四歸竒凡四營初一變兩揲之餘掛扐者不五則九第二變不四則八第三變亦不四則八緫三變之間若一五兩四而三皆少稱老陽以掛扐之餘存者三十六以四計之則九揲而九陽数也或兩多一少則存者二十八以四数之則七揲七爲少陽若一九兩八而三皆多稱老隂以掛扐之餘存者二十四以四計之則六揲而六隂数也或兩少一多則存者三十二以四数之則八揲八爲少隂老陽則乾也少陽在初爲震中爲坎末爲艮老隂則坤也少隂在初爲巽中爲離末爲兊故三變成一爻十八變成一卦此其大略也諸說之誤者先生各條列以辨琴律說謂琴之有徽所以分五聲之位而配以當位之律布徽之法則當隨其聲後之多少律管之長短而三分損益上下相生以定其位今人但以四折取中又謂初絃黄鍾之宫次絃大簇之商三絃中吕之角四絃林鍾之徵五絃南吕之羽六絃黄清之少宫七絃太清之少商而一絃之中又各有五聲十二律者凡一二焉皆起於龍齦終於臨岳長四尺五寸不待抑按而爲本律自然之散聲又謂七徽之左爲聲律之初氣厚身長聲和節緩故琴之取聲多在於此七徽則爲正聲正律初氣之餘承徵羽既盡之後而黄鍾之宫復有應於此者且其下六絃之爲聲律亦皆承其已應之次以復其初而得其齊焉氣已消而復息聲已散而復圓是以雖不及始初之全盛而君子猶有取焉過此則氣愈散地愈迫聲愈髙節愈促此六徽之後所以用之少又謂七絃既有散聲所取五聲之位又有按徽所取五聲之位散聲陽也通體之全聲也無所受命而受命於天者也七徽隂也全律之半聲也受命於人而人之所貴者也今人不察反以中徽爲重而不知散聲之爲尊又謂調絃古人所以破去三分損益隔八相生者乃廹於聲律自然之變舜典象刑說雖𤼵明帝舜之欽恤實譏後世之輕刑且謂少正卯之事獨荀况言之必齊魯陋儒憤聖人之失職故爲此說以夸其權耳樂記動静說辨性情字義詳甚已𤼵未𤼵說再詳程氏遺書而推見中間一叚日用本領工夫其說曰未𤼵之中本體自然不湏窮索但當此之時敬以持之使此氣象常存而不失則自此而𤼵者其必中節矣愚謂此叚不特有功於程氏亦有功於子思所以指示後學用力處甚的若程氏止說中和兩節而有云赤子之心可以謂之中者尚合審訂盖赤子之心恐不過無偽而已及其𤼵也恐未必中節而和太極說静者性之所以立也動者命之所以行也實則静亦動之息爾故一動一静皆命之行而行乎動静者乃性之真也明道論性說按明道論性多非後學可遽曉而先生一一與之辨析觀心說辨佛氏以心觀心之說之繆而聖賢所謂精一操存盡心存心者皆心自爲之主與佛氏言心迹相似而實不同仁說謂天地以生物爲心而人得之以爲心曰仁則温然愛人利物之心也程子謂愛不可爲仁者但以愛之𤼵不可以名仁其徒有以萬物與我爲一爲仁之體者可以見仁之無不愛非仁所以爲體之真又有以心有知覺釋仁之名者可以言仁之包乎智非仁所以得名之實王氏續經說謂二帝三王之治詩書六藝之文後世莫能及之非功效語言之不類乃本心事實之不侔也王氏一見隋文而陳十二䇿既不自量其力之不足爲伊周又不知其君之不可爲湯武及不遇而歸復捃拾兩漢以来文字言語之陋依倣六經次第采輯既不自知其學之不足爲周孔又不知兩漢之不足爲三王養生說謂莊子稱爲善無近名爲惡無近刑縁督以爲經督者中也爲善則畏其名之累已而不敢爲惡則擇其不至犯刑者而竊爲之乃欲以其依違茍且之兩間而循其中之所在不論義理專計利害乃賊徳之尤者觀列子偶書其言精神入其門骨骸友其根我尚何有者即佛書四大各離今者妄身當在何處之所由出此類甚衆聊記剽掠之端跪坐拜說兩膝着地以尻著蹠而稍安者爲坐伸腰及股而勢危者爲跪因跪而益致其恭以頭着地爲拜周禮九􅉔辨一曰稽首手引頭至地稽留多時爲稽首臣拜君之拜也最重二曰頓首頭叩地即舉不停留爲頓首平敵拜也三曰空首頭至手不至地爲空首君答臣之拜也三者正拜也四曰振拜戰栗變動之拜五曰吉拜拜而後稽顙謂齊衰不杖以下者六曰㓙拜稽顙而後拜謂三年服者七曰竒拜謂一拜答臣下八曰褒拜謂再拜神與尸九曰肅拜但俯下手軍中拜及婦人拜也最輕壺說壺容斗五升注乃以二斗釋之借方形虚加整数以定之也然知借而不知還先生規而圓之去四角虛数四分之一外圍二尺四寸一分五釐腹髙五寸受斗五升如經之云深衣制度衣二幅不裁裳六幅各裁爲二以狹頭向上每裳三幅上屬於衣一幅圓𬒮口徑一尺二寸方領者兩襟相掩則自方衣裳皆縁寸半帶廣四寸垂其餘爲紳殿屋厦室說及明堂說儀禮釋宫宫必南鄉廟在寢東屋必五架通乎上下特廣狹隆殺異爾中脊爲棟前一架爲楣前接簷爲後楣以北爲室與室相連者爲房房無北壁故得北堂之名室南其户户東而牖西户室爲中霤西南隅爲奥當牖之後東西隅爲窔當户之後西北隅爲屋漏日光所漏入也户牖之間爲依堂東西之中爲兩楹間南北之中曰中堂東西爲序序即墻也堂上名序室房與夾名墉堂下曰壁曰墻其實一也堂序之外爲夾室夾室之前曰廂相翔待事之處也亦名東西堂堂角有坫以土爲之堂之側爲亷堂堂基亷稜之上也堂東階曰阼階阼酬也所以酢賔堂下至門爲庭其塗爲陳門限爲闕夾門之堂爲塾塾有四東西各又分南北鄉也屋之四垂爲宇檐之東西起者爲榮爲翼答社壇說壇髙四尺四面各廣二丈五尺四出陛社以石爲主如鍾髙二尺五寸壝十五丈坎在壇北壬地木隨土宜井田類說集荀恱論及班志禘祫議王制天子七廟三昭三穆與太祖之廟而七漢諸帝之廟各在一處不容合爲都宫以序昭穆明帝遺詔無復起寢廟至今遂爲同堂異室之制獨原廟外爲都宫而各爲寢廟爲近古而禮本不經故李清臣謂略於七廟之室而爲祠於佛老之側楊時謂舍二帝三王之正禮而從一繆妄之叔孫通然不知所以致此由廟制不立而人心有所不安也遷毁之序昭常爲昭穆常爲穆而陸佃非之不知昭穆本以廟之居東居西主之向南向北而得名初不爲父子之號禮所謂昭與昭齒穆與穆齒傳所謂太王之昭王季之穆文之昭武之穆是也如佃之說以爲父子之號則穆之子安得復爲昭哉五峯胡仁仲論短䘮失不在文帝而在景帝愚徃歳讀漢書亦嘗及此不料前軰所已言也廟議圖說先生嘗請復祀僖祖而趙汝愚丞相不以爲然給舍楼鑰陳傳良附其說徑不行君臣服議淳熈丁未歲髙宗上僊禮部令用布四脚直領布襴衫麻絰州縣莫曉其制先生謂四脚幞頭周武帝所製之常冠用布一方幅前兩角綴兩大帶後兩角綴兩小帶覆頂四垂因以前邉抹額而繫大帶於腦後復収後角而繫小帶於髻前以代古冠亦名折上巾其後乃以漆沙爲之而專謂之幞頭其實夲一物也至於直領布襴衫上領不盤之說則直領者古禮也上有衣而下有裳者也上領有襴者今禮也今之公服上衣下裳相屬者也公服隋文廵遊令百官戎服從駕亦非當時朝祭之正服也如用直領則兼服布裙而加冠於首如用布襴衫則首加幞頭今但見公服之上領而有襴遂解直領為上領不盤而増襴字於衫字之上誤也凡禮君之喪諸達官之長杖學校貢舉私議欲均解額立徳行科罷詞賦分諸經子史時務之年學校則選有道徳之人專教導裁減解額舍選繆濫之恩以絶利誘讀吕氏詩記說桑中篇謂二南正風房中之樂鄉樂也二雅之正朝廷樂也商周之頌宗廟樂也變雅固已無施於事變風又特閭巷之謡古者採詩以觀民風固不問羙惡而悉存以訓今乃引滛放之鄙詞而文以風刺之羙說讀唐志謂孟氏没士背本趨末不求知道養徳以充其内而徒以文章爲事業韓愈氏出始覺甚陋猶未免裂道與文爲二物又復衰歇迨數百年而後歐陽子出恐亦未免於韓氏之病而其徒推尊之既曰今之韓愈又必引文不在兹者以張其說文王孔子之文與韓歐果若是其班乎讀大紀爲宇宙之間一理流行未嘗有頃刻或停釋氏乃欲求所謂空虛寂滅之地而逃焉讀兩陳諫議遺墨謂熈寜日録王安石爲一世禍敗之原者其隠微深切皆聚此書而起熈豐訖宣靖六十年間誦說推明按爲國是有識之士飲氣吞聲莫敢指議獨兩陳公出死力以排之終未免有所回互惟龜山指其離内外判心迹使道常無用於天下而經世之務皆私智之鑿者最爲近之及其請罷廟學配食又不能如平日之言以正其罪讀蘇氏紀年謂道者天而已天大無外聖人與天同徳無一物之不知無一理之不當故曰吾道一以貫之而蘇黄門指五鼓振衣何思何慮者爲妙道之極自謂悟夫子一以貫之之㫖記程門同異及記疑二篇皆指雜異端之似以亂吾真者記和靖五事迎天竺觀音曰彼亦賢者也誠敬而拜之日誦金剛經曰是母所訓語及蘇氏使民戰栗解艴然曰訓經而欲新竒無所不至矣記孫覿事在敵營爲某文貶損媚敵且以順天自誇記林黄中辨易謂以六畫之卦爲太極若論太極一畫亦未有林又闢西銘大君爲父母又降爲宗子是錯讀了記濓溪謂借得洪景盧所作國史濓溪傳載太極圖說乃云自無極而爲太極旌儒廟碑隂儒即秦所坑儒也杜佑謂其自取禍及引漢黨錮爲戒先生謂佑之識趣如此所以䧟於伾文之黨偶讀謾記吳執中及其子岩夫皆附蔡京時夀皇以中原事問何蓑衣有胡孫拖白不終場等語以敵儲允恭孫襲位爲胡孫之騐閩人李復有潏水集論孟子養氣云動必由理故仰不媿俯不怍無憂無懼此書信州有本蜀人馮當可有縉雲集封事乞移蹕建康云此興事造業之根本洪範所謂皇建其有極者也與先生皇極辨暗合㑹稽官書有子華子云程孔傾盖之程子所作先生謂多取佛老醫卜之言多用左傳班史中字好事者偽造嵊縣有弋過二姓即少康所滅羿促之黨疫疾傳染誣之以無染而不必避不若告之以雖有染而不當避抑染與不染似亦繋乎人心之邪正氣體之虚實不可一槩論笱者寡婦之器但笱易成寡婦亦能置之它人則取魚之器尚多不專用笱耳谷風小弁詩皆曰無𤼵我笱豈寡婦之作也哉附子熟則已疾生則殺人漢淳于衍毒許后生用也先生嘗中烏喙毒正如許后證偶記漢質帝語得水尚可活多汲新水連飲嘔洩而解讀雜書偶記記親祠以學士爲執綏官甚詳先生云余按曲禮少儀等書綏安也升車者執之以爲安故執綏乃乗車者之事君車已駕則僕者負良綏取貳綏以先升既升然後以良綏授君君正立執之以升立於左僕執轡立車中以御勇士立右以備非常故開元開寳政和禮書皆以太僕卿爲御千牛將軍爲右盖倣周禮而國史記國初奚嶼攝太僕卿備顧問猶未有執綏之名記尚書三義棐本木名漢書注棐古匪字通用天畏匪忱猶曰天難忱爾孔傳訓作輔字殊無義理記李復潏水集云龍門禹廟像豕首而冕服舊傳鯀入羽淵化爲黄熊而廟乃稱禹非也先生謂其不考漢書說啟母石處注中言禹亦嘗變熊記山海經浙江出三天子都在其東廬江出三天子都入江彭澤西記三苖今溪蠻四種曰獠曰犵曰狑而最輕㨗者曰猫豈三苖之遺民乎考韓文公與大顛書東坡謂妄撰而先生載其全書以爲真今愚平心讀其書真見其與韓文不同蘇公學佛猶辨其爲偽先生闢佛而反指其為真所不可曉况據韓文韓公止因祭神至海上曽與大顛語今請之者四書又亟以道爲望安有平日謂道其所道非吾之所謂道而一旦求之亟如此使其既與習熟而少變舊說尚近人情今未之曽見而先欲聞其道尤不可曉也考歐陽公事蹟其要者三事其一云學道三十年所得者平心無怨惡爾其二保州軍變富公出爲宣撫欲殺其已招安不殺者二千餘人公力争且云某至鎮州必不受命二千人頼以免其三妖尼喚二牛皆能稱前世姓名公言聰明聖智皆不能自知其前世而有罪爲牛者乃知之乎又晩年守青州日論執青苖一事更六人越百年惟洪景廬作四朝史傳乃盡言之士之制行不茍合於當時而有待於後世者豈不難哉故公之言曰後世茍不公至全無聖賢北辰辨云帝座惟在紫微者据七十二度常見不隠之中常居其所爲天之樞餘星無不動者今謂在紫微者皆不動未然聲律辨五聲宫最大而沉濁角居四者之中論中聲者不以角而以宫者以宫在五行爲土五常爲信五事爲思正當衆聲和與未和用與未用隂陽際㑹之中所以爲盛又注子時初四刻屬前日正四刻屬後日開阡陌辨南北爲陌陌之言百也遂間百畆洫間百夫徑塗皆從謂之陌東西爲阡阡之言千也溝間千畒洫間千夫徑塗皆横謂之阡此其水陸占地不得爲田者頗多而正經界止侵奪時畜洩有不得不然者商君急刻但見田爲阡陌所束而耕者限於百畆人力不盡而地利有遺是以一旦奮然不顧盡開阡陌悉除禁限以盡人力以盡地利說者乃誤以開爲創置之名九江彭蠡辨謂禹貢稱漢水南入於江東匯澤爲彭蠡東爲北江入於海彭蠡初非仰江漢之匯而後成江漢混流何以識其爲昔日之漢水而今分之以北何以識其爲昔日之江水而今分之以居中若以今江州爲九江則漢九江郡夲在江北而今江州實武昌郡之柴桑縣後以江北之尋陽并柴桑立郡又因尋陽改爲江州實非古九江地國初胡祕監旦近世晁詹事之說皆以九江與洞庭接證皆精慱盖洪水之患河爲甚禹乃親涖其他分屬視之亦可也洞庭彭蠡之間乃三苖所居官屬未必深入是以但見彭蠡之爲澤不知其源甚逺而尚多但見洞庭下流之已爲江不知其中流之嘗爲澤而甚廣也皇極辨皇者君之稱極者至極之義自孔氏訓皇極爲大中諸儒祖其說因復誤認中字爲含糊茍且不分善惡之意其弊將使人君墮於漢元之優游唐代宗之姑息卒至是非顛倒而禍敗隨之作皇極辨尹和靖手筆辨和靖專闢語録謂伊川嘗曰某在何必㸔此書先生云是則先生不在時語録固不可廢和靖又謂易傳所自作語錄他人所作先生云孔門專治春秋而廢論語可乎雜學辨蘇氏易解謂性命之理甚明蘇氏每爲不可言不可見之說務爲閃倐滉漾不可捕捉足以眩夫未嘗學問之庸人故爲之辨蘇謂古之君子慮性之難見故以可見者言性皆性之似先生謂古之君子盡其心則知其性未嘗患其難見非但言其似而已且性又豈有一物似之而可取此以况彼耶愚患蘇之辭遁先生之辭直不待深辨人知所擇矣蘇謂君子日修其善以消其不善不善者日消有不可得而消者焉小人日修其不善以消其善善者日消有不可得而消者焉先生謂其言不善日消有不可得而消者疑若謂本然之至善言善日消有不可得而消者疑若謂良心之萌蘖而蘇氏初不知性之所自来特假浮屠非幻不滅得無所還者爲是說而幸其或中愚竊意蘇言君子修善以消不善可言小人修不善以消其善不可夫小人特䧟於不善而不自知不善者日長則善者日消亦不自知耳不善者何可言修善者亦何嘗有心於消之蘇言善者日消有不可得而消者可言不善者日消有不可得而消者不可夫天理無澌盡善者固有不得而盡消天理渾全則人欲消盡特患夫人不能自盡其力何不善者之不可得而消嗚呼此蘇氏之所以不知性也蘇謂孟子之於善見其繼者而已先生謂孟子道性善盖探其本而言之與易之㫖無毫髪異愚謹按先生平日論易與孟子之言善本分兩截繼之者善言太極分隂陽繼此而生人物者皆此善是主造化而言孟子道性善言人性所得於隂陽造化而生之理渾然純粹是主人性而言人性之善正由本隂陽繼之者善故無不喜蘇子誤認繼之者善爲人物既生以後之事故先生不復如平日分兩截徑探其本言之學者更當參其平日之言蘇黄門老子解蘇侍郎晩為是書合吾儒於老子爲未足又并釋氏而彌縫之可謂舛矣然其自許甚髙至謂當世無一人可語此而其兄東坡亦以爲不意晩年見此竒特其可謂無忌憚者歟因爲之辨蘇謂孔子以仁義禮樂治天下皆噐也而晦其道老子絶而棄之以明形而上之道先生謂示人以噐則道在其中蘇氏離噐而言不知指何物名道道者仁義禮樂之總名今曰絶仁義棄禮樂以明道是舍二五而求十也豈不悖哉蘇又謂因老子之言以逹道者不少而求之於孔子者常苦其無從先生謂因老子之言逹道者何人何如其逹而所逹何道孔子循循善誘誨人不倦入徳之途坦然明白而曰常苦其無從乃自狀其不知道而妄言耳蘇又謂中者佛性之異名而和者六度萬行之總目也先生謂和者天下之逹道也六度萬行吾不知其所謂然毁君臣絶父子以人道爲大禁逹道固如是耶張無垢中庸解張公始學於龜山逃儒以歸於釋而其釋之師又教以改頭換面故凡張氏所論著皆陽儒隂釋盖不特莊周出於子夏李斯原於荀卿而已因覧中庸說掇其尤甚者著於篇天命之謂性言性之所以名乃天之所賦人之所受義理之本原今無垢謂賛性之可貴耳未見人収之爲己物則是天之生人未以此與之而置之他所人自起而収之而後得爲己物不知未得此性之前其人孰使之呼吸食息於天地間以収此性性又豈塊然一物可博而寘之軀殻中耶張又云變者此誠忽然而有倐然而無又云吾誠一徃則耳目口鼻皆壊又云誠未足貴凡其語怪不倫處先生一一爲之辨吕氏大學解吕氏之先與二程遊家學最爲近正然未能不惑於浮屠老子之說末流不能無弊今論一二以補其闕先生又自注其下云正獻公神道碑載公進讀上語及釋老公曰堯舜雖知此乃以知人安民爲急此其所差之端本原如此則其流弊可勝道哉吕解致知格物云與堯舜同者忽然自見先生謂此釋氏一聞千悟一超直入之虚說也吕氏又云草木之微噐用之别皆物之理也求其所以爲理則爲格物忽然識之此爲物格先生謂此釋氏聞聲悟道見色明心之說也吕氏又云聞見未徹正當以悟爲則所謂致知格物正此事先生謂以悟爲則乃釋氏之法而吾儒所無也古史餘論蘇子曰古之帝王皆聖人也其道以無爲宗萬物莫能嬰之先生謂此特以老子浮屠之意論聖人非能知聖人之所以聖也至謂孔子知之至而未嘗言孟子知其一二而人不信是以夫子之言爲有隠而孟子之知爲未盡也又黄帝紀云其言與老子相出入以無爲宗其設於世者與時俯仰皆其見於外者也先生謂是以聖人之内外心迹判然兩途而文章事業之見於世者皆不出於中心之實然也又舜紀云舜禹避朱均而天下歸之足以致天下之逆益避啟而天下歸啟爲不度而無恥先生謂避之而彼不吾釋則不獲已而受之何病於逆避之而幸其見舍則固得本心之所欲又何耻焉惟不避而強受之乃爲逆偃然當之而彼不吾歸乃可耻耳夏紀以與賢爲好異以與子爲不敢與賢以爲異周紀謂民生之初父子無禮君臣無義先生各辨其失云讀余隠之尊孟辨隠之建安人名允文其一温公疑孟謂夷惠之行與夫子同非隘與不恭也先生云夫子時乎清而清時乎和而和夷惠一於清和故孟子又立言以捄其末流之弊又謂陳仲子亦狷者有所不爲也孟子過之甚先生云正使母兄不慈不友亦無逃去之理又謂孟子以齒德之尊自居先生云逹尊三者不相值則各伸其尊一或相值則通視其重之所在而致隆焉又謂孟子不告齊以止其伐燕先生云明鏡止水照其面我者而已不能探其背而逆照之沈同以私而問燕故燕之可伐孟子之所宜知也不以公而問齊故齊之不可伐孟子之所不宜對也又謂父子不責善是父不教子不諫隠之辨云教以義方豈自教哉觀過庭事可見先生云觀内則論語則其諫也以微又謂孟子論性無有不善爲失言指朱均爲證隠之辨云犧生犂胎龍寄蛇腹豈常也哉又謂貴戚之卿諫不聽則易位爲亂之資辨云孟子得春秋之遺意又謂孟子爲禮貎飲食而仕又謂仁者皇帝王伯皆用也又謂舜竊負而逃爲里巷之言先生皆一一明其說而竊負特設辭耳其二李泰伯常語專闢孟子勸時君行王至以爲五伯之罪人先生云李氏不知時措之宜詆孟子而甚畏齊王尊管仲至以文王太公比之良由不識聖賢本心李氏又謂無孟子可也不可無六經無王道可也不可無天子先生云有孟子而後六經之用明有王道而後天子之位定其三鄭公藝圃折衷謂孟氏挾仲尼以欺天下賣仁義者也意齊王不知價遂愚齊王求極所索而後售覺齊王之稍覺也抱而之他三宿出晝冀齊王呼已而還直又謂秦漢欲無夷狄韓愈欲無釋老孟子欲無楊墨甚哉未之思隠之亦皆爲之辨而先生斷之愚嘗妄意孔子葢在下之堯舜而孟子則湯武救世之心也時也然亦不過勸時君以行仁義而已耳温公以恪實執一之見而疑之此可與權之所以爲難也泰伯亦邁往之士而尚縱横之學固宜詆孟子如云可無王道等語何其自背於理以自貽後世之譏未足攻孟適以自攻矣嘗記葉紹翁四朝聞見録力辨泰伯諸書無一詆孟子而常語獨詆之以爲偽書且考世所傳泰伯不試四科優劣論之年此年泰伯實不預試恐泰伯未嘗詆孟子或如紹翁之云也特所學正與孟子相反則攻之亦其情耳若鄭氏折𠂻特病風䘮心信口叫號之言亦何足辨且凡世之惑於異端而自叛聖門者不敢明詆孔子必借孟子爲之詞愚所聞見往往而然使孔子而可明詆論語一書亦安知其不求疵耶善乎韓文公之言曰觀聖道必自孟子始此韓子灼然有見於斯道之傳而非他人所可及歟較之濓洛特未至精微耳然其廓清之功豈細乎哉胡子知言疑義盖先生與張吕講辨其疑者知言曰天理人欲同體而異用同行而異情先生云胡子欲人於天理中揀别得人欲又於人欲中便見得天理其意甚切然本體只一天理更無人欲去却人欲便是天理聖人未嘗教人識天理於人欲汨没之中也愚謂胡子之言本自難曉先生既爲以意逆志而明之又爲析微直指以斷之有功後學何如哉知言曰心無不在本天道變化爲世俗應酬又曰放而不知求耳聞目見爲己蔽父子夫婦爲己累衣裘飲食爲己欲先生云疑世俗字有病猶釋子謂父母家爲俗家也愚謂己蔽己累己欲皆民彛天倫人事之不可廢者今一切病之亦恐染於釋子之說知言曰性者天地鬼神之奥或問心曰無生死先生云兩章似皆有病又知言曰欲爲仁先識仁之體先生云此語大可疑又曰動則心矣先生云心字作情字如何更同安縣學齋名如彚征之名乃學優而仕之事非學者所宜先乃更以志道據徳依仁游藝目之同安諭學者學如不及猶恐失之此君子所以孜孜愛日今或未及日中而散教不素明也不欲舉有司之法姑以文告知古人之所以爲學則將有欲罷不能者諭諸生學者相與嬉其間其傑然者乃知以干祿蹈利爲事至於語聖賢之餘㫖究學問之本原則罔乎莫知然理義所以養心者固在諸君顧不察耳諭職事學校之政不患法制之不立而患理義不足以養其心補試牓諭君子學以誠其身近世假手程文以欺有司今勸父兄之愛子弟者爲求師友習孝弟馴謹之行以誠其身何必因人成事幸一朝之得而貽終已之羞哉策試牓諭凡朝廷之事非草茅所宜言而師生相與之誠意亦不當数見於文字之間策問大抵皆以修學事略啟其端而叩之謂賢良方正科特以疑文隠義困於所不知如此則賢且良矣至以愽學宏詞自命而試於禮部者則又可笑愚按博學宏詞之科設而賢良方正之科廢則士不於其行而於其文已可笑近世狹天下爲無人去宏博之稱以小詞科名之士亦就焉又可笑近年小詞科例抑而不取士猶就之愈可笑嗚呼試科舉者猶曰草茅借此仕進也試詞學者皆已仕進之人也不讀書明理以修己治民而猶窮日夜綴緝以自取薄賤豈惟可笑亦可悲哉謂州縣雖有學獨城闕之子得以家居廪食出入以嬉白鹿書堂策問問孔孟後荀卿揚王韓本朝歐王蘇胡程氏之學記解經凡解釋文字不可令注脚成文讀書之要循序而漸進熟讀而精思論語課㑹說古者潛心六藝考諸日用疑焉則問後世之所講有不待問而弟子之聽於師又非所疑具一時之文耳講禮記序說禮者履也謂昔之誦而說者至是可踐而履也禮以極卑爲事愈卑愈約玉山講義程珙問孔子言仁孟子兼言仁義又問三代以前只說中與極先生與之敷析甚詳愚按此疑而問問而答者也横經講授近世無過於先生者矣以此爲訓奈何猶有攜經就講所在謀衣食或延人設講求盖俗吏之名者豈所謂猶勝别留心者耶雖然不若務其實者滄洲精舍諭學者老蘇學爲文兀坐終日讀書者七八年今人要學道未能用旬月熟讀一卷書不曽舉得一兩行經傳成文不曽記得一兩處首尾相照不如歸家杜門依老蘇法將大學論語孟子中庸及詩書禮記程張諸書讀之有箇入處方好求師所謂就有道而正又諭學者唯志不立直是無着力處増損吕氏鄉約徳業相勵過失相規禮俗相交患難相䘏禆正書唐陳昌晦所撰先生在同安時訪先賢事傳而得之序家藏石刻序歐陽集錄一千卷時玩之泉南又得東武趙氏金石錄数倍之乃集家藏数十種追配之上蔡語錄序以最後得胡文定家寫本上下篇爲正而去吳中板本増多至百餘章又得其遺語三十餘章别爲一篇凡共著三篇論語纂訓序先生外兄丘子野所纂凡十四家論語要義序魏何晏集漢魏諸儒之說爲注本朝邢昺修皇甫偘之疏爲正義王安石父子嘗盡廢之二程獨得孟子以来不傳之學於遺經先生始徧求古今諸說而編之刪爲要義論語訓蒙口義序刪録要義以成之本之注䟽以通其訓詁參之釋文以正其音讀然後㑹之諸先生之說以發其精微又以平生聞於師友得於心思者附見戊午讜議序太上中興恢復之勢已八九成秦檜歸自敵庭力主和議當時人倫尚明人心尚正天下交口以爲不可而檜以梓宫長樂藉口和議遂不可破自是以来士大夫狃於積衰之俗以忘讎忍辱爲當然癸未之議曰不可和者尚書張公闡左史胡公銓而已秦檜之罪使人倫不明人心不正而末流之弊至於如此之極因讀魏元履所次戊午讜議而發明其意如此送張仲隆序聖賢言治必以仁義爲先而不以功利爲急不知出此而茍有一切之計是申商吳李之徒所以亡人之國而自滅其身者國雖富其民必貧兵雖強其國必病利雖近其爲害也必逺顧弗察而已程氏遺書序二程門人各自爲書散出並行傳者頗以已意竄易先生有家藏数篇皆著當時紀録主名未更後人之手後益以類訪求得凡二十五篇遺書附録序明道行状之属凡八篇伊川之祭文奏状各一篇又伊川行事本末取實錄文集凡他書可證者次爲年譜語孟集義序蒐輯條流二程之說又取張横渠范氏二吕氏謝氏游氏侯氏尹氏凡九家之說附之名曰精義後改名集義云通鑑綱目序温公編通鑑既成别爲目錄三十卷上之晩病本書太詳目録太簡更著舉要厯八十卷未成也胡文定公復修舉要補遺先生因兩公四書别爲義例表嵗以首年而因年以著統大書以提要而分注以備言名綱目云言行錄序先生病文集及記事書所載名臣言行散出無統又汨於虛浮詭誕之說掇聚爲此録中和舊說序先生自叙㓜從李延平求喜怒哀樂未𤼵之㫖未逹聞張敬夫得衡山胡氏學徃問之亦未省退而沉思謂人自嬰兒至老死莫非已𤼵特其未發者爲未嘗發爾後忽自疑復取程氏書虛心平氣而徐讀之未及数行凍解冰釋然後知情性之本然聖賢之微㫖其平正明白乃如此尹和靖言行録序程夫子有言涵養必以敬進學則在致知若尹公其學於夫子而有得於敬之云乎先生微意盖有未滿於其致知者程氏外書序十二篇名外書者以取之之雜視前書尤當精擇中庸集解序唐李翺始爲之說然所謂滅情以復性者又雜乎佛老至濓溪始得其要以著於篇二程於此既皆無書門人惟吕氏游氏楊氏侯氏有成書若横渠若謝氏尹氏亦或記其語别自爲編㑹稽石子重始集而次之詩集傳序本之二南以求其端參之列國以盡其變正之於雅以大其規和之於頌以要其止再定太極通書序太極圗說一篇通書四十一章世傳舊本遺文九篇遺事十五條事狀一篇皆先生所集次周子之學莫備於太極一圗而諸本皆附於通書之後長沙本胡氏所定通書章次頗有移易又刋去章目惟建安本特據潘誌置圗篇端而書之次序名章亦復其舊後得臨汀楊方本盡正其舛陋云吕氏詩記序唐初諸儒䟽義不出毛鄭之區域本朝劉侍讀歐陽公王丞相蘇黄門河南程氏横渠張氏始用己意發明及其久而說者愈多學者無所適從吕氏家塾始兼總衆說而㑹通之李丞相奏議序謂天之愛人甚矣廹於氣数而或至於亂也亦預出弭亂之人以擬其後若故丞相隴西公所謂能弭亂之人非耶政宣之際都城大水猝至公獨知其必有戎狄兵戎之禍上䟽極言不幸謫去不七年敵薄都城公以眇然放逐之蹤出負天下山嶽萬鈎之重遂却強敵復以逺謫建炎再造首登廟堂慨然以修政攘夷爲己任又遭以去其在紹興因事獻言深以議和退避爲非䇿反覆之終其身使公之言用於宣和之初則都城必無圍迫之憂用於靖康則宗國必無顛覆之禍用於建炎則中原必不至於淪䧟用於紹興則復祖宗之宇而報不共戴天之讎乆矣顧乃使之数困於庸夫孺子之口不得卒就其志嗚呼痛哉然今天子方總羣策以圗恢復是書也得備清閒之燕而幸有以當上心者則有志之士將不恨其不用於前日而知天之所以生公者真非偶然矣愚按先生此序感慨世變令人於邑盖不特爲李公發也後學所當成誦通鑑舉要厯序清源郡舊刻舉要厯八十卷謝公克家記其篇首甚悉朝命以其板付學省航海而没焉温公之曽孫伋来領郡再出家藏本刻焉先生謂温公愛君忠國稽古陳謨之意再三而不能已者尤於此書見之視其書之顕晦而考其所以關於時運者則公所爲再三不能自已之心可爲太息而流涕南軒文集序孟子没而義利之說不明董仲舒諸葛武侯二程先生屢𤼵明之而世莫信國家南渡張魏公唱明大義以斷國論胡文定公誦說遺經以開聖學敬夫魏公嗣子而講學於胡公季子五峯先生之門故其見於議論措諸事業無一毫功利之雜既没其弟定叟裒其故藁先生謂其平生之言不止此也其心亦未嘗一日以是而自足也乃益爲訪求斷以敬夫晩嵗之意定其書爲四十四卷復取經筵口義一章附於表奏之後使敬夫所以堯舜吾君而不愧其父師之傳者讀者有以識其端向薌林文集序大略云張子房爲韓報仇雖不遂然卒藉漢滅秦然後棄人間事使千載下聞風歎息可謂壯哉陶元亮自以晋世宰輔子孫耻復屈身後代雖事業不槩見而髙情逸想播之聲詩者後世皆自以爲莫及也盖古之君子大者既立而後節槩之髙語言之妙乃有可得而言不然則紀逡唐林之節非不苦王維儲光羲之詩非不清一失身於新莾祿山則所辛勤而僅得傳世者適足爲嗤笑資余以是觀古騐今而於薌林居士向公有感也公自文簡公左右真宗欽聖憲肅母儀天下慶流宗支不可勝数然逮公之仕則國家之變極矣絶僣叛守孤城危於九死而不奪及紹興争和議至病死不忘豈不凛乎子房元亮之心哉然二子皆爲之於不可爲之後不及有益人之國公乃竭股肱之力宗社再安勞烈所就視二子又有光焉是以中年乞身一觴一詠豈徒以發興吐辭之工盖必有其本矣謝監嶽文集序謝綽中建之政和人晦翁先君子尉政和行田間聞讀書聲入而視之儀禮也以時方專治王氏學而獨能爾異之即與俱歸勉其所未至遂中紹興三年進士第主邵武之泰寜簿自以不能俯仰歸領祠官以卒其子東卿以遺文過武夷精舍先生相與太息流涕而序之金華潘公文集序中書舍人潘公宣和初爲博士獨斥大臣蒙蔽爲館職不遊蔡京父子門使淮南不肯與中官同燕席靖康召對論時宰何㮚唐恪不可用建炎初召爲右司諫首論亂臣逆黨紹興入為都司又忤時相以歸秦檜擅朝公遂廢不復起前後出入三朝在官不過八百六十餘日所居謹庇風雨郭外無尺寸之地先生許以孔子所未見之剛因其兄子畤之請而爲之序大學章句序自伏羲神農黄帝堯舜而司徒典樂之官已設三代之隆其法浸備孔子取其法誦而傳之孟子没其傳冺焉程夫子出而有以接乎孟氏之傳顧其爲書猶頗放失是以采而輯之中庸章句序中庸者堯舜禹所以相傳也天下之理豈有加此吾夫子雖不得其位而所以繼徃聖開来學其功反有賢於堯舜者子思推本堯舜以来相傳之意質於平日父師之言作爲此書而程夫子所以爲說者不傳故爲定著章句復取石氏書刪爲此書雲龕李公文集序參政文敏李公扈蹕臨安適遭己酉三月五日之變挺身赴難神采毅然逆折兇渠諭以大義退而隂賛宰府爲離貳逆黨尊復明辟之計是其所以立豈獨以其文而已哉豐清敏遺事序法家拂士低囬遷就詭辭以幸濟者公獨正色誦言以至流放以没愚按公四明人東都事略亦云此序以爲縉雲盖其先自栝徙鄞耳武夷圖序武夷君著自漢世祭以乾魚不知果何如今崇安縣南餘二十里武夷山相傳即神所宅清溪九曲人迹不到處往往有枯查揷石庋舟舡棺柩柩中遺骸外列陶噐尚皆未壊頗疑前世道阻未通川壅未决時夷落所居而漢祀者即其君長今山之羣峯最髙其大者猶以大王爲號半頂有小丘焉豈即君之居耶羽人髙文舉更定圗本爲題其首韓文考異序歐陽公言韓文印本初未必誤多爲校讎者妄改如羅池碑改歩爲渉田氏廟改天明爲王明之類耳公自言兒童時得蜀夲於隨州李氏嵗月當在天禧中其書已故弊則摹印與祥符杭本未知孰先孰後而嘉祐蜀本又其子孫明矣然猶三十年間聞善本必求而改正之固未嘗必以舊本爲是至祕閣本則亦民間所獻是正之者豈盡劉向揚雄之徒哉近世本多不同惟南安軍方氏校定本號精善别有舉正十卷論所以去取之意又他本所無然其去取以祥符杭本嘉祐蜀本及李謝所據祕閣本爲定而尤尊祕閣本雖有繆誤往往曲從今更悉考諸本之異同茍其是雖民間近出小本不敢違有所未安雖官本古本石本不敢信各詳著其所以然爲考異十卷黄子厚詩序子厚名銖少先生一嵗同事屏山劉病翁所工詩文琴書以窮死其徒三山許閲裒其所作先生極言其變化開闔恍惚微妙其形容委折變態處三嘆有遺音矣宜玩味之楚詞序自屈原賦離騷而南國宗之通號楚詞而離騷深逺矣然自原至漢未久說者已失其趣如太史公未能免而劉安班固賈逵之言世復不傳隋唐間訓解者尚五六家又有僧道騫者能爲楚聲之讀亦漫不復存獨東京王逸章句與近世洪興祖補注並行而王書之所取舍洪氏皆不能有所是正於是稍加櫽括定爲集注八卷又因晁氏續變二書補著五十二篇所取必其凄凉怨慕者為得其餘韻而以無心而𡨕㑹者得闕黄氏日抄卷三十五
