body:
  text: 黃氏日抄卷四十四宋黃震撰讀本朝諸儒書十一下温公迃書自序畧曰譬之種木收愈逺利愈大使狹道以求容利止其身豈能及後世哉釋迂愚恐更當參以不計功之説天地不易日月無變道何為獨變哉厭常而喜新求愈勤而愈逺辨庸譬之鐘鼔不扣自鳴孰不謂恠言戒天雨道濘蹊狹而髙車不量力久妨衆進能無覆乎飯車童子至驩爭凡芥而相傷天下之利大於凡芥者多矣恃其驩而不知戒能無傷乎拾樵去惡而從善捨非而從是在我而已何難囬心受恩而不負者為子必孝為臣必忠負㤙厭其所有羡其所不可得羡厭治心以正保躬以靜進退有義得失有命守道在已成功在天夫復何為莫非自然無為贊貽邢和叔文勝而道不至猶朽屋而塗丹雘眢井而幕綺羅烏喙而漬飴糖也斥莊果餌刻鏤是以目食官失温公之書德人之言也擇其尤切於後學者著此元城語元城先生劉安世字噐之大觀間謫亳州寓永城縣之囬車院年已六十餘維陽馬永卿赴永城縣主簿其舅髙郵張桐属使求教既至見先生雄偉闓爽談論踰時體無欹側肩背聳直身不少動手足亦不移自是從之學後二十六年當紹興五年追錄其語為元城語三卷漢大臣於人主前說人短長各以其實如匡衡謂朱雲好勇數犯法亡命受易頗有師道是也攻金陵者謂其為林甫盧杞王莾故人主不信此進言者之大戒五帝之法尚不同金陵乃以成周之法行於今我朝祖宗所以不多為法令者正恐官吏緣此擾民也金陵欲行新法恐州縣慢易故擢用新進少年至於特㫖御前處分金字牌子一時指揮之類紛紛而出其柄必為姦臣所竊天下欲不亂得乎金陵三不足之説謂天變不足懼祖宗不足法人言不足䘏此三句為萬世禍趙清獻欲絶欲挂父母像於臥床王羲之欲不仕自誓於父母墳前且士大夫不為則止耳何必爾温公戒金陵用小人介甫曰法行即逐之公曰誤矣小人得路豈可去也他日將悔之哲宗初銳意於學一日講畢㑹茶上起折柳一枝有諫以方春萬物生榮不可無故摧折上擲之色不平温公聞之不悦曰使人主不欲親近儒生者正此等人也祖宗以仁慈治天下至嘉祐末似乎舒緩不振故神廟必欲變法金陵揣知上意以一身當之又有虛名實行强辨堅志不可動反復詰難使人主伏弱乃已及元豐初主德已成天容毅然正君臣之分非熈寧初比矣明皇即位初焚錦繡珠玉於前殿已不好之則不用何至焚之焚之必於前殿此好名也故有末年之敝若仁廟則不然非大臣問疾則無由見其黃絁被漆唾壺人主之去宰相必積怒非一日奸臣必交結佞倖纔覺怒必急急收救故不至積怒而去李林甫所以作相二十年正緣得髙力士安祿山陳希烈等内外賛助太祖即位造薰籠數日不至而怒左右對以事下尚書省尚書省下本部本部下本局覆奏得㫖復依方製造太祖怒曰誰做條貫曰可問宰相普至對曰此自來條貫不為陛下設為陛下子孫設後代若非禮製造奢侈之物經諸處行遣必有臺諫理㑹此條貫深意也上大喜曰此條貫極妙無薫籠是小事其後法壊自御前直下後苑作更不經由朝廷至今為例河東折氏靈武李氏自五代世守両蕃畏之太祖故令世襲其後移李氏為陜西两鎭遂失靈夏至今為患太祖未嘗文談蓋欲激厲將士之氣太宗未平晉已為平晉詩賦未平燕山已為平燕山詩賦羣臣属和將士歆艶而於武事不競故有潘美之敗澶淵之役渡河橋至半髙瓊曰此處好喚丞相吟两首詩蓋平日憾之有此語左傳襄十二年同宗於祖廟注始封之廟同族於禰廟注父廟然則宗逺而族近也政和中大臣不學以郡主為宗姬以縣主為族姬又姬周姓也自漢初取為嬪嬙之號已可笑今乃以嬪嬙之號名其女尤可笑語上熈寧仞温公諫用兵不留藁大畧以富人與貧人鄰居為喻此錄中載其語意漢藩王入繼必親信本國之臣霍光立宣帝正以其無黨國初錢王入朝晉王趙丞相以下皆欲留之上曰我平生不曾欺善怕惡金陵以兩府㗖温公不可臺諫黨金陵者遂誣之如霍光事神宗曰司馬某豈有此事元祐遂獲其用皆神宗保養成就之力謂啖助作怪以左氏非邱明乃論語孔子所引前世人如老彭伯夷等類然愚按前世諸儒考究多與啖助之説同元城最考古而非之如此何也左丘明姓左丘仁宗時蕃商没官眞珠入禁中張貴妃乞私買得之一日賞牡丹貴妃以為首飾誇同輩上以䄂掩面曰滿頭白紛紛地更没些忌諱貴妃慚赧起易之乃大恱命人各簮牡丹自是宫中不戴珠珠價大減公孫雖詐以卜式輸財助邊非人情以睚眦殺人郭解不知甚於解知此𢎞長處曹操遺令至分香賣履無不處置無一語及禪代之事是實以天下遺子孫而身享漢臣之名温公偶窺破有喜色元城謂操平生事無不如此夜枕圓枕噉野葛至尺許飲酖酒至一盃本朝名相惟李氏沆人上利害一切不行而日奏四方盗賊水旱在漢惟魏相能然後之為相者則喜變祖宗法度惡聞天下災異温公創獨樂園自傷不得與衆同也洛俗春月放園園子得茶湯錢與主人平分一日園子吕直納公錢十千公令持去再三欲留公怒乃持去囬顧曰只端明不愛錢後十餘日吕直創一井亭問之乃用前日不受十千也昔髙辛氏遷閼伯於商丘主辰今為應天府實我宋受命之地遷實沈於大夏主參今為太原府實河東劉氏舊地參商不相能物莫能兩大故國初但謂河東并州不加府號本朝初收河東在戊寅年重午日乃火土旺日參水神所忌故尅之時宋興已十九年盛則後服衰則先䧟靖康元年丙午嵗重九日太原䧟其属本朝纔一百四十九年丙午為天水故火最大忌九為陽數之極故太原以重九日䧟又淵聖為第九世而即位之年正一百六十六年此漢書所謂陽九之厄百六之㑹卜世卜年蓋王孫滿當楚問鼎假天命神告之事以拒之故史記云王使王孫滿應設以辭元城初求教温公曰誠思之三日問從何而入曰不妄語又韓瓘譚錄載此事云力行七年而後成自此言行一致表裏相應遇事坦然又瓘乞言元城曰惟在力行古人云説得一丈不如行得一尺説得一尺不如行得一寸故以行為貴漢四家詩各有長短酷吏傳班氏不入杜張蓋張湯之後至後漢猶盛故班氏以張純之故不入酷吏傳而併貸杜周此子産立公孫洩之義漢武用兵勝負皆以實聞不為左右欺㒺子産相鄭晉悼已薨楚亦衰子産又能得晉楚大夫之心許其更相朝晉楚亦値其時也繒慈陵切與餳相近而不同音語中漢元封五年初置刺史部十三州秋分行郡國秩六百石而縣令萬户以上秩反千石至六百石然刺史權極重按察六條一謂强宗豪右五條皆謂二千石不法秩卑則其人激昂權重則能行志至成帝綏和元年更名牧秩二千石其法隳矣唐制諸道帥司兼觀察之權故藩鎭擅權無人糾舉本朝官制多循唐舊獨前宰執侍從為帥監司得糾之故不敢為非原乃天子之邑不欲属晉文公伐原乃不美之事而左氏反稱之蓋宗周鎬京地方八百里八八六十四為方百里者六十四雒邑成周地方六百里六六三十六為方百里者三十六合二都言之是為邦畿千里至幽王時宗周滅方八百里者失之平王東遷僅六百里爾襄王以河内賜文侯又為諸侯所侵故其地至小矣熈寧殿試改用䇿謂比詩賦有用不知士人計較得失豈敢極言時政自取黜落是初入仕已教之謟也况登科之初未見人材及後仕宦則材智聲名君子小人貴賤分矣不必須殿試䇿以别人材人主燕閒時於其等輩廣訪備問然後博記而審察之天下無遺材矣魯襄三年晉祈奚請老而舉解狐祈午襄二十一年叔向見囚曰救我者必祈大夫於是祈奚老矣聞之見宣子而免之不若史記晉世家止載舉解狐祈午左氏載請老非也愚按襄二十一年既曰於是祈奚老矣則是請老在前恐無可疑新唐書好簡畧事多欝而不明其進表云其事則增於前其文則省於舊其病正在此仄以為工何哉漢所傳六經與今不同如今尚書云無教逸欲有邦王嘉奏封事云亡敖佚欲有國恐敖字轉冩作教字蕭望之傅元帝八九年當深知元帝為人及帝即位乃欲逐恭顯為其譛下獄帝至不省其為下獄不知八九年間輔之者何事太宗嘗飛白題翰林學士院曰玉堂之廬此四字出李尋傳玉堂者殿名也而待詔者有直廬在其側李尋時待詔黃門故曰久汙玉堂之廬至英廟嗣位乃撤去及元豐中有學士上言乞摘去二字使榜院門以為光寵詔可是以殿名名其院也不遜甚矣師古曰玉堂在未央宫又翼奉言文帝恭儉未央宫無髙門武臺麒麟鳳凰玉堂金華之殿獨有前殿曲臺漸臺宣室承明耳則玉堂殿乃武帝所造蕭何治未央宫髙帝都長安之心方定何之意深矣後生未可遽立議論以褒貶古今蓋見聞未廣渉世淺也孔子年六十三嵗乃始刪詩定書繫周易作春秋文言未必皆孔子之作孔子生於襄二十二年而襄三年穆姜言元體之長也至正固足以幹事時孔子未生又左氏以解隨卦周易以解乾卦東坡下御史獄張安道上書遣子恕救之恕愚懦不敢投後東坡見之吐舌色動蓋安道書云其實天下之竒材也豈不激人主之怒元城曰但當言本朝未嘗殺士大夫富鄭公使敵說以用兵則國家受其害人臣享其利老蘇謂二子曰古人有此意否東坡對曰嚴安亦有此意但不如此明白老蘇笑以為然蓋取嚴安諫用兵曰此人臣之利非天下之長䇿也前輩讀書必見於用鄭公之言其源出此秦用顓帝厯十月為嵗首遇閏即謂之後九月蓋取左氏歸餘於終之意漢初因而不改秦二世二年後九月應建酉漢二年後九月建已五年九月建寅髙后八年閏月己酉代王即皇帝位元年十月辛亥皇帝見髙廟己酉辛亥相去三月是閏月亦后九月也愚按徐廣注建酉建已止合云閏八月四月不當言酉言已蓋閏月無建斗指兩辰之間魏徵卒停昬仆碑其家衰矣鄭公之德何頼於碑而停叔玉婚乃天以佑魏氏也房元齡之子尚主始敗其家法終滅其族鄭公四子叔玉叔瑜叔琬叔珪而叔瑜生華華生商商生明明生馮馮生謩其家再振楊綰為相纔一百八日故名望如此絳縣老人云四百有四十五甲子矣其季於今三之一也史趙曰亥有二首六身下二如身是其日數士文伯曰然則二萬六千六百有六旬也亥字二畫在上其下六畫如筭子三箇六數也如者往也移下亥上二畫往亥時身仄則當如移冩其左竪二畫乃二萬也其右六畫乃三箇筭子六數則六千六百六旬也季末也今今日也已得四百四十四全甲子其末一甲子六十日今纔得二十日故曰其季於今三之一也易取諸益取諸暌之類非謂當時已有此卦也伏羲造書契取夬之義也今繫辭漢名大傳見司馬遷傳爻謂繫辭以繫於一卦之下易曰繫辭焉以斷吉㓙故謂之爻吉凶生大業蓋謂有興有廢湯武秦漢之事是也歐公非繫辭韓魏公與同政府甚久無事不言獨不與言繫辭語中元城譚錄具茨韓瓘官二浙往來必維舟河梁侍元城譚誨錄其繫邪正得失者二十一條名劉先生譚錄元城先翁與温公同年故遣元城從温公學元城終身未嘗草字書尺未嘗使人代元城作待制道遇丞相吕微仲去蓆帽凉衫斂馬於浚溝廟下微仲問法吏無两制避丞相之法然終不樂范相由元城章䟽而出已而復拜微仲遂擬元城眞定宣仁曰如此正人且宜留朝廷韓魏公鎭北門朝臣令决守把兵士不伏以解府公問汝罵長官信否曰實有曰汝為禁兵既差在彼便有階級判市曹處斬畧不變色潞公鎭北門有外鎭解一卒如前者公震怒問之亦判處斬而擲筆潞公氣禀雄傑而非傲物魏公和平畧無崖岸遇事迎刄而解至疑慮難處者研墨運思從容之間已了於胷中便下筆天資明敏絶人逺甚元豐末京東劇㓂欲取剖尅吏吳居厚投鑄冶中居厚覺蚤遁去劉道原之子羲仲每有書譯數四不能曉王鞏定國多識前言往行乃服林靈素丹藥暴得疾苦楚死王介甫求去潞公謂後人如何可為元城對曰相公當之去所害興所利反掌間耳元城曰陳瑩中某嘗薦自代而未嘗識面瑩中多失之過如尊堯集先評荆公為伊吕聖人之耦而後納諸僣叛不軌之域此學術不粹也王安石薦李定時陳襄彈之未行已擢監察御史裏行宋次道封還詞頭辭職罷之次直李大臨再封還之最後付宋子容又封還之更奏復下至於七八子容與大臨俱落職奉朝請名譽赫然此乃祖宗德澤百餘年間養成風俗與齊太史見殺三人而執筆如初者何異其後攝官修起居注章衡行之賢不肖於此可見元城竄嶺南一日使厚士類泣告以聞朝廷遣使入郡將不利於公請早自裁公從容留飯卒不為動而使者乃過旁郡元城道䕶錄道䕶錄者珵所集不著姓氏珵以宣和六年春介楊龜山書謁元城於南都而錄其説元城初除諫官以母老辭母勉使為之乃供職論胡宗愈二十四章又論章子厚十九章子厚欲殺之春循梅新髙㢘雷化八州歴其七元祐黨人只七十八人後來附益者不是龜山有除命聞是蔡攸所引不知肯來否李光好官員可惜為蔡攸所引此人撥着便省後來罷去若象數可廢則無易矣若不説義理又非通論兩者兼通始得學者所守要道只一勤字勤則邪僻無自而生纔有間斷便不可謂勤獄貴初情每一行若干人即時分牢異處親往遍問私置一簿隨所語記之其後結正無能出初語者致曲者至誠之道無處不在着一事上便是曲致曲以通之也元城劉先生初事司馬温公五年而後教之以誠思之三日不知所從入而後教之以不妄語力行七年而後言行相應故能不動如山當宣和大觀間巋然獨為善類宗主至今誦其遺言無不篤實重厚使人鄙吝之心為消嗚呼豈不誠大丈夫哉獨因篤信之深而佛氏之説先入為主至謂儒釋道神其心皆一又謂法華經臨刑刀壊之説為説性而證以楞嚴經云使衆生六根銷復臨刑刀如割水且併以其師温公詆佛為非若自程門講明聖人之學觀之雖温公之詆佛猶未免於譽敵而元城併以為未然何哉或者知終終之之勇卓冠一世而知至至之之智尚差毫釐耶此中庸之言誠必貴於自明而誠也雖然先生他日亦言釋老之道皆未免入邪則其本心固未嘗不明也學者宜審焉黃氏日抄卷四十四
