body:
  text: 黄氏日抄卷五十一宋黄震撰讀雜史一蘇子古史蘇子既為古史而又自序之曰古之帝王其道以無為為宗故其推之以治天下者有不可得而知孔子知之至矣而未嘗言孟子知其一二時以告人而天下亦莫能信太史公始記五帝三王以來然其為人淺近而不學踈略而輕信故其記堯舜三代之事皆不得聖人之意余竊悲之因遷之舊追録聖賢之遺意以明示後世愚謂蘇子之志則大矣而蘇子之説則尚有可疑者且道以無為為宗此戰國處士好髙無實之言聖人未嘗以是言道姑勿論也既曰推之以治天下則其迹顯然安有不可得而知孔子正以此道詔天下萬世何嘗不言孟子明王道而黜伯功正提其綱要以示人所知何止一二而可厚誣哉且既謂不可得而知又欲以明示後世其説亦自背馳矣惟其謂史遷不得聖人之意而自謂追録聖賢之遺意則非參攷不可見故即古史與大史公所記參而録之下方五帝紀太史公黄帝紀記載頗詳古史節略者大半反増入醫家之說謂其師岐伯既鄙矣又増入道家之說謂黄帝之書與老子相出入以無為為宗其設施於世者皆其見於外者也然則蘇子正惟不以聖人之施於治者為道而必欲他求其道於荒忽無形之中不以太史公載聖人之治為足而必自指其荒忽無形者為得聖賢之遺意此古史之所以作歟史記曰諸侯咸尊軒轅為天子代神農氏是為黄帝古史曰諸侯咸尊軒轅代神農氏為黄帝以文法言之為天子三字與是為之是字恐皆不可去史記曰官名皆以雲命為雲師古史曰為雲師而雲名文雖本左傳反不若史記尤明白其他類此甚衆以是知文不可以省字為工文而可省太史公省之乆矣堯紀太史公不載茅茨土階之說而古史増之愚意茅茨土階殆墨氏借以言儉而形容浮實之言恐非盛帝垂衣裳氣象史記於堯舜全述二典而間易古為今如以疇咨若時為誰可順此事已非二典之比古史勦而裁之似又非史記比矣史記載堯妻舜之後瞽叟尚欲殺舜古史本尚書瞽亦允若堯聞其賢然後妻之於理為長合從古史夏本紀史記謂禹名文命古史刪之按諱名而用諡法始於周以堯舜禹皆為謚而反用尚書所謂放勲重華文命為三聖之名盖漢儒之未攷古史刪之為是史記又以鯀為顓頊之孫古史以其世太促而祖班固律厯志以禹父鯀為顓頊五世孫亦當從古史史記載禹全用禹貢等編而古史刪之或者史遷之世書未盡出故須兼載至古史之作則事在尚書不必重述也兩皆無害史記載太康失國太康崩弟仲康立古史載羿逐太康而立其弟仲康按薛常州士龍説書謂仲康乃在五子之數徯于洛汭不在禹河北舊都非羿所立愚意若果逐太康而立仲康則不待太康之既崩太康崩而後仲康立蓋傷宗國之墜祀而兄弟在外者自以次續之於義為順於經亦合當從史記史記止載仲康崩子帝相立帝相崩子少康立古史載羿既放太康羿又為寒浞所奪浞滅帝相相后逃歸有仍生少康少康既長誘殺浞二子而後中興愚按二史詳略不同豈史遷之世未有寒浞滅夏之説耶抑未備耶古史可以補遺殷本紀史記稱契封商古史作封殷按初封本商也古史不必改為殷史記載伊尹以負鼎説湯古史去之史記不載禱雨事古史増之皆當從古史武丁學于丼盤既乃遯于荒野史記不載而古史載之舊説遯于荒野者為甘盤而古史指為武丁曰欲以習知民事與無逸書及近世朱文公書説合此其於義為精西伯隂修徳古史止云修徳足明聖人之心斬紂之事古史不載其亦為賢者諱耶周本紀史記載堯命棄為農師舜封棄於邰號曰后稷古史改云堯舉以為后稷封之於邰佐禹治水愚按禹言暨稷播奏乃治水後種榖未聞佐禹治水之事封邰亦在播奏艱食有功之後非封邰而後播奏未詳古史何見而改然於經不合史記載公劉復修后稷之業自漆沮度渭取材行者有資居者有畜積古史改云用兵征伐斥大豳土然猶處於復穴無宫室之美愚按詩詠公劉遷豳有曰弓矢斯張乃遷豳時衛儀有曰其軍三單乃遷豳後生聚公劉初無征伐之事又陶復陶宂乃太王事非公劉事公劉既卒子孫中微故詩人形容太王復興之初艱難如此安有公劉遷豳止基迺理國家方興而身處復穴之間者未詳古史何見而改然於經不合蘇子謂史記踈略而作古史而乃如此何也戰國䇿載齊求九鼎之説謂顔率稱周伐殷得九鼎凡一鼎九萬人輓九九八十一萬人齊王乃止此游士飾虗之言殆類小説史記不載而古史増入又何取乎秦本紀古史於史記載昭襄十一年六國攻秦之事即其未書之年衰為據改為齊韓魏三國攻秦雖世逺難知其詳然即史記攻史記史遷若在亦自無辭又其賛論謂戰國茍能自修而不争如商周先君庶可服之且以魏文侯齊君王后為證是可垂訓兼足輔孟子仁義之説秦始皇紀史記載始皇正月生於邯鄲及生名為政古史作正月旦生於邯鄲因名政語簡而意益明特未知増旦之一字何所據豈因其名而意之歟其餘多襲史記之舊無以議為惟太史公賛論全載賈生之語宏肆駿逸而蘇子去之乃特為李斯雪不師古始使秦孤立之譏謂秦已削平諸侯雖建子弟君民不親如措舟滄海之上大風一作漂卷而去愚謂秦刼天下而帝之自無可乆之理耳向使不至於甚失天下心則安有天子為民置君而民不親者乃謂已削諸侯難建子弟耶且其謂秦若能與民休息可與三代並隆此又史遷責子嬰之遺論漢明帝嘗闢其不然者也秦之得天下何如而可以三代望之哉吳太伯世家史記載太伯仲雍知太王欲立王季乃奔荆蠻文身斷髪示不可用以避季古史據左傳謂太伯端委而治至仲雍而後文身斷髪愚按古史之駁史記多以左傳為據然去古既逺安知左傳者必為是而史記者必為非耶若據論衡之言則曰太伯知太王欲立王季入吳来藥斷髪文身以隨吳俗太王薨太伯還王季辟主太伯再讓王季不聼三讓曰吾之吳越吳越之俗斷髪文身吾刑餘之人不可以為宗廟社稷主王季始知其不可而受之此其所載頗詳且與吾夫子三以天下讓之説合恐必有自來况太伯兄弟逺入吳若不容不從俗則太伯即斷髪文身矣若我可以易俗則太伯既嘗端委以治仲雍亦將端委以繼之不應於國家既立君臣既定之後復入斷髪文身自同於民庶也大率古史之作實祖索隐索隐不敢輕議史遷而特以異同者隨事䟽其下俟來者擇使蘇子亦如之則盡善矣夫差二十一年史記惟繼上文句踐伐吳之語書曰遂圍吳古史則増公子慶忌驟諌於王曰不改必亡遂適楚聞越將代吳請歸平越遂歸欲除不忠者以説于越吳人殺之按公子慶忌者王僚之子吳越春秋載闔閭二年已刺殺之今方於夫差二十一年稱越人殺之而史記不載未詳孰是若夫差之死史記以為自剄吳越春秋以為伏劒伏劒亦自剄也古史改曰縊亦未知何據夫差與晉㑹黄池越乘虗伐之也史記載曰夫差惡其聞也或泄其語吳王怒斬七人於幕下古史易之曰王惡其聞也自剄七人於幕下雖本左傳不若元文明白此類極衆齊太公世家史記載太公以漁釣干西伯古史去之而載聞西伯善養老往歸之善矣然下文即綴以隐於漁者西伯因獵得之乃與上文往歸之説正相反何自背馳之速耶史記於太公歸周之後復兼述或者數説以存疑規模宏衍非古史可望矣吕伋為周虎賁古史據經増入為是史記載桓公之入先表以桓公元年而後追叙其事古史連叙桓公之立於公子無知見殺之下桓公遂無元年法殆未然文亦不及史記載雍林人殺無知古史改為雍廪此亦據左氏以改史記實則當兩存以攷異耳餘多類此魯周公世家史記首載周公輔翼武王耳古史載其迨文王世任以國事邑之於周凡周之内治始於室家而至於國人者屬之周公凡周之外治所以交接四鄰至於江漢之國者屬之召公故詩有周南召南此不惟周公之始事瞭然其所以發明二南之義甚明太史公未之及也獨其以既獲仁人為指周召則未必然耳周召何俟於獲也哉史記以成王出郊為改𦵏周公而古史易之此其授經而得之者也史記不載僖公治兵牧馬修泮宫閟宫而古史増之此則信經而未之詳者也詩乃歌頌之詞豈必有其事果有之春秋書之乆矣何俟古史燕召公世家古史比史記頗多増修其考訂史記之誤蘇子自注本文之下其論燕吳皆起於僻陋之中而奮於諸侯之上非如商周先王以徳服人故皆為禍其說亦當蔡曹世家古史視史記微有損益然皆於大誼無闗惟古史論賛謂聖人雖與世同處而其中浩然彼其食粟衣帛蓋有不得已耳此却異乎所聞蓋食粟衣帛人事之常聖人豈有異於人蘇子平生服氣求真想自視以為不得已耳而以誣聖人乎陳杞世家古史據左傳改史記者二處史記以佗為蔡出蔡為佗殺五父子太子免而立佗左傳謂佗即五父非蔡出蔡出者乃躍也佗殺太子免自立蔡為殺佗而立躍是為厲公史記載靈公死太子午奔晉徴舒自立為陳侯左傳靈公死明年陳侯盟辰是太子未嘗奔晉而徴舒未嘗為君衛世家古史比史記増入衛武公年九十五猶箴儆於國之事及衛文公大布衣大帛冠之事皆是也惟増入滅邢得雨似不足為訓討有罪可也滅人之國不可也雨特偶然耳豈以興師殺滅之故哉宋世家史記先載微子數諌紂不聼欲死之未决謀及太師少師而後叙太師箕子以及少師比干又然後再合其事於微子舒徐明盡萬世如見古史乃裁節而緫言之首曰微子紂之庶兄也其父師曰箕子少師曰比干文意不白幾若以箕子為微子之父師餘亦文窒而意不全其不迨史記逺矣乃自䟽其説以為史記所載徒見三人各以其意行而未見其所處之義不知所行即其義之所在也事具而義見尚何事他求哉惟太史公賛宋襄公泓之師為禮讓蘇子辨之謂襄公凌虐小國至使邾人用􅤂子于社雖桀紂有不為乃欲以不鼓不成列不禽二毛求為文王不亦過甚矣哉此其剖析瞭然太史公不及也晉世家平王命晉文侯為諸侯伯史記不載古史據尚書増入是也餘多以左傳之文而黜史記之文則是非相半焉如史記載獻公私謂驪姬欲廢太子立奚齊驪姬泣曰太子之立諸侯皆已知之而數將兵百姓附之柰何以賤妾之故廢適立庶君必行之妾自殺也驪姬佯譽太子而隂令人譛惡太子此事正足以見驪姬之奸而古史據左傳以刪之又史記載驪姬謂太子祭齊姜歸釐於君獻公時出獵驪姬使人置毒藥胙中居三日公還欲饗之驪姬從旁止之曰胙所從來逺宜試之然後及祭地地墳等語方有理脉今古史直曰公至毒而獻之公祭之地地墳文雖省而失事情矣晉悼公之立史記載誓衆之語極有理而文古史所易亦淺薄少味他多類此惟太史公論晉之衰由御下失道而推其原於忘介子推似未得晉事之要領古史論晉文公靖以待其自集悼公二合諸侯未嘗一與楚戰子孫長乆終必頼之其説殆過史遷夫晉以諸侯伯天下則晉之卿以私門強公室其勢則然而介推特從亡中一碌碌者祿未及而忿然自絶狷僻如此其人亦可知矣據左氏傳注謂推為文公微臣此亦何至傷晉文大體而遽謂晉之御臣失道始此耶然以文論則史遷之賛山峭水㓗不可尚也矣楚世家古史比史記多用左傳國語増入如史記以楚之先為重黎古史謂重黎為二人重少昊之後為南正司天以屬神黎髙陽之後為火正司地以屬民楚之先實黎而非重至帝嚳之世始以黎兼重是史記稱重黎本無害古史辨釋之則明矣古史以左傳為據改楚文王十三年為十五年堵敖五年為三年二書不同固未詳其孰是史記載簡王八年周以韓趙魏為諸侯古史據世家年表而改入靈王之五年史記載懐王二十年合齊古史據年表而改入二十二年此史記一書而自為牴牾合從攷異之例若史記以懐王十一年六國攻秦為蘇秦而古史刪之則此時蘇秦已為齊人所殺也史記以考烈王六年為遣景陽救趙而古史改稱春申君則春申平原傳與年表皆言春申也此可改之而無疑鄭世家鄭桓公友者周宣王庶弟宣王立二十二年而友封鄭封三十三年百姓愛之而幽王以為司徒周民説之為司徒一歳幽王以褒氏故諸侯畔之而桓公謀於太史伯始言於王遷民雒東史記之所載如此古史皆節略之止曰宣王二十三年封鄭幽王八年為周司徒幾於没桓公之賢矣又鄭人欲立靈公弟去疾去疾讓曰必以賢則去疾不肖必以順則公子堅長堅者靈公庶弟去疾之兄也於是乃立子堅是為襄公史記之所載如此古史亦節略之止曰諸大夫欲立公子去疾去疾辭曰公子堅長乃立堅長此長字衍為襄公又幾於没公子去疾之賢矣其他類此甚衆不可枚舉大抵史記古史二書單㸔古史自成一家參看史記即古史如草茅自用之士立乎風流藴藉貴公子之側矣太史公何可當也蘇子輕以踈略目之哉古史賛曰鄭桓武之後惟莊公為賢然叔叚之亂明足以制之釋而不問俟其惡成加以大戮此非不忍忍之至也孔子深探其心書曰克叚于鄢而丘明謂之鄭志愚按莊公叛周射王中肩何賢之有封叚乃迫於母命叚之罪未形莊公不敢輕動蓋亦母子之間有難處者固非不忍亦豈可言忍之至書克叚者克者勝之名兄弟之惡自見孔子書其實非探其心而為春秋傳者又非丘明之左氏也近世吕東萊祖此説為博議蓋東萊最年少時所作亦未暇平心而深考越世家句踐其先禹之苗裔少康封於㑹稽以奉禹祀古史改以奉禹祀之語為謂之越子殊非本㫖豈以奉祀非支庶事耶記句踐射傷闔閭於欈李史記止數句而語潔意明古史雖増多不迨逺甚句踐平吳誅太宰嚭史記吳越兩世家所載同古史據左傳而盡刪之是亦主一而廢一史記賛句踐范蠡臣主之盛而古史反以立國東南為不可有為至下取六朝蔡謨之説夫事變無常成敗在人烏可以六朝為監而槩謂東南不可立國且以逺證事哉趙世家造父御穆王見西王母史記載而古史刪之按此列子寓言也刪之為是程嬰杵臼脱趙孤史記載而古史刪之按屠岸賈何人敢搜及公宫之姬殆俗傳也刪之亦是簡子夢遊帝所未寤而扁鵲能預知史記載於世家而古史止存其載扁鵲傳者按此妄誕無理殆好事者為之古史姑以備伎術之異聞亦庶幾乎是史記載張孟談為張孟同此避父史談之名也古史改之曰談皆是魏世家史記以畢為周同姓古史據左氏以為文王之子又據尚書増入畢公相康王及保釐成周足補史記之缺古史謂魏文侯可比漢文帝却恐不同韓世家史記載聶政刺俠累在烈王三年韓嚴弑哀侯又後二十六年本是兩事不同時也古史據戰國䇿嚴遂使聶政刺俠累并中哀侯一語而盡反之且自謂嚴遂是時去韓已乆而今書嚴遂弒哀侯者亦春秋書趙盾弑君之義愚按聶政刺俠累於相府非刺於君所也何縁并中哀侯弒哀侯者韓嚴也何以知即誘使聶政之嚴遂史記載事之書而戰國策乃游士之誇辭類多架虗非載事書也何所攷而可主彼以廢此且史記正義紀年亦載韓山堅賊其君哀侯而立韓若山大事記謂韓山堅即韓嚴是權臣弒一而立一非刺其相而及其君也蘇子去之千載之下輙書曰嚴遂弑哀侯及相韓傀亦太果矣又自謂用春秋書趙盾之法果合乎否耶然史記韓世家載烈侯三年聶政殺俠累而刺客傳乃載嚴仲子事哀侯與俠累有隙使聶政刺之亦自牴牾此則東萊大事記嘗攷之以刺客傳為誤太史公賛謂韓以存趙而興固未必然蘇子又以為后稷濟飢之報尤覺遼邈大抵有徳則興否則亡豈可専指一事以求合報應之説哉齊世家太史公紀載之法非蘇子所可改既明矣田氏齊之賊也而又每事輙為之辨如史記書田乞樹黨於諸侯則為刪去之而為之辨曰非樹黨史記書陳成子弑簡公懼諸侯誅巳盡歸之侵地則亦刪去之而為之辨曰本非成子自完之計史記書成子通賔客出入生子七十餘人則又刪去之而為之辨曰成子必不為此失行嗚呼何其黨賊至此耶伯夷傳太史公載伯夷采薇首陽之歌為之反覆嗟傷遺音餘韻拱挹莫盡君子謂此太史公託以自傷其不遇故其情到而辭切然非伯夷怨是用希之心也故後世髙其文而非其㫖今蘇子易之錄其讓國叩馬二事謂夫子言其不怨以讓國言言其不辱以去周言雖夫子發言之意未必盡然而㫖義則過史遷矣管晏傳管仲傳先叙管鮑之交語精意婉讀之令人三嘆蘇子全祖史遷而不敢易是矣然史遷本祖列子之文而節其後語若參以列子全文則史遷所述尚有未盡者蘇子雖併増入之可也史記叙仲之行事歸之因禍為福轉敗為功盖指仲以權術成伯業而蘇子易之謂其來之以禮服之以義不以力勝幾於過其實惟其闢管仲之書為戰國諸子之所増益多申韓之言非管子之正足為管子辨誣真公論也晏子傳増入晏子處崔杼之變知陳氏之奸諌煩刑諌誅祝史與言梁邱據同而非和數事亦足補遺柳下恵曹子臧吳季札范文子叔向子産諸傳於史記無之皆蘇子據左氏傳増立始末備具不以年隔殆左氏類書之要者可觀也惟其於季札賛有曰所以養心者至矣雖祿之天下將有所不受愚謂此異端之所謂養心非吾儒之所謂養心於子産賛有曰孟子言子産恵而不知為政非子産之實愚謂此世俗之所以謂政非吾儒之所以論政孔子傳太史公作孔子世家以次三代諸侯之列若曰古昔聖王之後以位顯者如彼以徳顯者如此故本所自來而表異之也孔子雖不待此而尊而太史公之知尊孔氏為可知蘇子乃降之為列傳以居叔向子産之後則異乎太史公之心矣太史公之於孔子自少至老歴叙其出處之詳必各記之曰時孔子年若干歳至其卒也則又叙其𦵏地叙其弟子之哀痛叙其魯人之從冡而聚居叙其世世相傳之祠祭叙髙皇帝過魯之祠以至諸侯卿大夫先謁然後從政若曰夫子生而闗世道之盛衰没而為萬世之典刑故其反覆惻怛若此孔子雖不待此而尊而太史公之知尊孔子為可知蘇子乃略之止斷以欲居夷浮海非其誠言亦異乎太史公之心矣太史公之賛謂髙山仰止景行行止雖不能至然心嚮往之余讀孔子書想見其為人適魯觀夫子廟堂低囬留之不能去天下君王至賢人衆矣當時則榮没則已焉惟夫子常無窮可謂至聖矣若曰自開闢以來惟孔子一人故其尊慕稱誦如此孔子雖不待此而尊而太史公之知尊孔子為可知蘇子乃反之獨以其求用於世而不已為孔子之所獨又異乎太史公之心矣嗚呼夫子天地也若之何形容夫子日月也若之何繪畫若叙其出處以傳後世則太史公為庶幾獨其信齊東野人之語謂夫子由野合而生為可鄙耳蘇子不能本家語顔氏擇婿之事以易之而徒紛紛亂其不可易者蓋蘇子雖假夫子之説以發身而實則老子之學故其失若此孔子弟子傳蘇子辨宰我無從叛之事辨子貢無亂齊之事皆有功聖門至其賛子夏則曰異哉今世之教者聞道不明而急於夸世非性命道徳不出於口教者未必知而學者未必信務為大言以相欺天下之偽由是而起此則隂詆程氏之學而後來偽學之禁殆本此也若夫傳首舉孔子四科之説而斷之曰其賢者凡十人而已此語亦未然其傳有若也常斥太史公載有若貎類孔子而弟子師事之説至採商瞿四十而生五子之説以為此卜祝之事而鄙儒以論孔子其説正矣及其傳梁鱣也正載夫子言商瞿過四十當有五丈夫其事乃太史公之所未嘗載者何其自相矛盾耶老子申韓傳太史公作老莊傳辭簡意足曲盡老莊之本㫖而又即以申韓附之若曰清浄無為其勢必不足以治及其不治其勢必不得不以法䋲之而老子之無為常欲自利其藏於心者已有隂術莊子之寓言破壊尋常其矢於口者已無忌憚以隂術之心行肆無忌憚之説而處不得不以法䋲之勢慘刻不道尚復何疑此申韓之出於老莊而惟太史公能窮極源委而言之嗚呼可謂卓識已蘇子於其傳多所増損已不知太史公之本㫖而又於老子之賛曰孔子之為人也周故示人以器而晦其道老子之自為也深故示人以道而略其器三代之後釋氏與孔老並行其所以異者體道愈逺而立於世之表其説又老氏之眇也嗚呼異哉是何言歟於列子之賛曰今觀穆王與化人游若清都紫微鈞天廣樂帝之所居而夏革所言四海之外天地之表無極無盡此固後世仙佛之常言理之當然而漢之儒者未聞焉耳嗚呼異哉是何言歟班孟堅譏太史公先黄老而後六經愚謂太史公本未有此失也蘇子古史則不惟有此失而又甚焉孟子荀卿傳太史公略叙孟子游説不遇退而著書即開説當時餘子之紛紛然後結以荀卿之尊孔氏明王道及其名傳獨以孟荀而餘子不及焉其布置之髙㫖意之深文辭之㓗卓乎不可尚矣蘇子取而焚之已不知其用心之所在至其論賛獨以仁義為可化強暴又於孟子之言仁義獨取不嗜殺人一語殆所謂窺豹一斑者耶若其謂孟子學於子思得其説而漸失之反稱譽田駢慎到之徒而又謂其為佛家所謂鈍根聲聞者且謂曰駢之徒既死而後荀卿得為祭酒何哉蘇子之立言也伍貟傳史記載伍貟事詳而古史裁之蘇子不及史遷史記賛伍貟棄小義雪大恥而古史罪之史遷不及蘇子孫武吳起傳蘇子於孫吳傳全祖史遷惟據左傳無燕晉伐齊之事而刪穰苴傳范蠡大夫種傳太史公屈范蠡於貨殖傳而功名則附之越世家蘇子擷之世家參之吳越春秋作種蠡傳補史遷之不及矣葉公傳葉公史記無傳蘇子采左傳而増立之葉公有存國之功而不享存國之利是不可以不傳商君傳古史傳商君皆本史記惟賛文易其舊然視史記費辭矣蘇秦傳蘇秦傳亦本史記而賛不及其髙古張儀傳張儀陳軫公孫衍同傳文皆因史記然以二史之賛參之文章之髙下瞭然矣樗里子丼茂傳古史視史記多省文史記曰母韓女也樗里子滑稽多智古史曰母韓女也滑稽多智似其母為滑稽矣然則樗里子之文其可省乎史記曰甘茂者下蔡人也事下蔡史舉學百家之説古史曰下蔡史舉學百家之説似史舉自學百家矣然則事之一字其可省乎省其文而増入戰國䇿按史記戰國䇿兩各成書雖不混為一亦可若蘇子此賛特借以譏人視史記賛之雅㓗又逺矣穰侯傳古史視史記微有損益然不必損益亦可也史記賛蓋有所託以歎君臣始終之難古史賛責范睢則正論然甚矣滿盈之不可不戒也白起王翦傳古史多因史記盖其紀攻戰之事工矣史記賛謂二人各有所短古史賛二人持論之不妄然其殺戮之慘開闢以來所未有尚忍言之而惜其死耶孟嘗君傳孟嘗君自滅其家自削其國太史公謂其閭里多暴桀蓋譏之矣而古史誇其與韓魏伐秦為壯平原君傳古史不改史記平原君傳賛亦推衍其説皆是而改同傳之虞卿以附魯仲連尤善區别公子無忌傳古史傳無忌文皆因史記而論斷尤精白無忌之名發於侯生而全於毛薛侯生之竒毛薛之正廢一不可而正之所全者多矣春申君傳古史此傳亦因史記而賛不同然亦因史記并言吕不韋亂秦之微意而發之耳范睢蔡澤傳古史於范睢蔡澤傳不敢易史記之舊惟於范睢憂懼事増入戰國䇿所載睢亡封邑欺昭王謂不憂而為䝉驁探得其情一事耳然昭王之踈睢本由睢殺白起而用鄭安平王稽敗事昭王憂及楚患睢計無所出遂為蔡澤乗間昭王亦以語言之不慎遽踈母舅也史記載睢之亡入秦也謂秦謁者王稽問魏有賢人可與俱西游者乎古史節之曰魏有賢人可與俱遊者乎去一西字失其本意矣史記載睢之所見逐也謂昭王欲以激勵應侯應侯懼不知所出古史節之曰欲以激勵睢懼不知所出省一睢字無所分句矣他多類此太史公頗稱二子覊旅遭遇而古史罪其自為身謀於秦無益其説過史遷然范睢逺交近攻之説雖發於間穰侯之取無竒實於秦之兼并最為要術未可盡謂無益於秦若蔡澤真以口舌攘攫富貴又豈可與范睢同日語顧其以此而得以此而失則螳螂黄雀之勢啓之者范睢樂毅傳古史樂毅傳多遵史記時節略一二字似不必也毅一舉而下齊七十城齊為無道毅乗諸侯共怒之心也毅五嵗而不能下莒即墨二城毅自為無道適以堅齊人必死之心也二史乃皆譽毅廉頗藺相如傳太史公作廉頗藺相如傳而附之趙奢李牧趙之興亡著焉一時烈丈夫英風偉槩令人千載興起而史筆之妙開合變化又足以曲盡形容真竒事哉古史因之不敢易一字亦宜矣田單傳古史用史記田單傳而増入戰國䇿所載田單三事惟魯仲連教之攻翟一事可垂訓後世為將者屈原傳太史公先叙屈原以䜛見䟽於懐王作離騷而發明其所以作離騷之意復叙屈原勸懐王殺張儀不從諌懐王毋入秦不從而又發明其惓惓宗國以及人君知人之難然後叙其見放作漁父問與懐沙賦而終之以自投汨羅此必有得於屈原行事次第之實而文亦宛轉有餘味矣古史謂作離騷當在懐王末年故以其見䜛及勸殺張儀諌勿入秦三事連叙方述太史公形容作離騷之説至其形容屈原惓惓宗國與人君知人之難者則刪之太史公文章之妙破碎不全矣虞卿傳太史公先叙虞卿謀趙事而後及其棄趙相印赴魏齊之急困於大梁作虞氏春秋以終焉古史反之謂先困大梁而後謀趙是虞卿相趙既棄去後窮而復歸相趙似非虞卿烈丈夫之氣且太史公嘉其謀趙之工責其以匹夫窮交而一旦棄趙當矣蘇子反賛其為義俠亦各有見歟魯仲連傳古史魯仲連傳襲用史記間刪其字耳太史公謂魯連指意雖不合大義蘇子謂戰國一人而已愚按魯連不肯帝秦最合大義射聊城則聊城人實由之而死二史之賛可以參攷若以其無一毫利心其間則信乎戰國之士無與並者吕不韋傳吕不韋大賈也以君之子為竒貨而居之竊寵利既多禍敗乃宜太史公以為此孔子之所謂聞者誤矣蘇子斷以嬴氏先亡盖亦一説而傳則全用史記李斯傳史記責李斯不能輔君否則且與周邵列殆於失言古史謂國破家滅非其不幸此為近之趙髙雖熏腐之餘實包藏逆謀方其殺扶蘇立胡亥巳為身計至殿欲壊者三然後以歸子嬰耳李斯不知其心而與之争見殺不亦宜乎斯教秦殺奪餘二十年以一天下髙之殺斯又司造者假手耳尚何足論云傳依史記舊文䝉恬傳䝉氏於秦世以凶徳參㑹誅死已晚矣太史公責以人臣之常理似非所宜施而古史亦費辭扁鵲傳古史謂於趙世家刪所記簡子妖夢而歸之扁鵲傳然史記於扁鵲傳固自兼載其事古史特去一而存一耳刺客傳太史公傳刺客五人稱其立意較然名垂後世蘇子非之謂考之春秋無曹沫劫盟之事而四人者亦皆非賢於春秋法皆當書盗而不名嗚呼偉哉惜不併四人者刪之耳彼凶愚小人狂惑輕生何足垂世而以傳為雖曰豫讓志在報君然所事智伯者何人其執迷至死晏子有言君為社稷死則死之滑稽傳太史公傳滑稽者三人皆伎工優戲耳西門豹古之良吏東方朔亦漢之名臣禇氏例取而附之優戲之列何哉禇氏不足責也蘇子明言西門豹非滑稽而不與分置列傳然則何以改作古史為附抄初縣秦武公十年伐邽冀戎初縣之納粟秦始皇初立三年蝗百姓納粟千石拜爵一級私學秦始皇三十四年李斯言私學相與非法殺人追刺衛武公作抑追刺厲王焚尸衛出公之亂掘禇師定子之墓而焚之韈而登席禇師比有足疾韈而登席公怒欲斷其足立子立弟宋世家涇口謂殷人立弟周人立子立弟者太子死則立太子之弟立子者太子死則立太子之子近世誤以為立時君之子弟臧孫謂御説有恤民之心御説者宋桓公也嘗大水對魯之弔故云及立未嘗冇恤民之事疾日晉師曠云辰在子卯謂之疾日君撒宴鄭突與祖同名索隐謂鄭掘突厲公名突豈有與祖同名者愚恐二名不偏諱時質或然耳中山中山無世家散見史記者三處趙獻侯十年云中山武公初立魏文侯十七年去伐中山使子擊守之樂毅傳云樂羊取中山其後中山復國至趙武靈王時復㓕中山魏恵王二十八年又云中山君相魏一戰國䇿又云犀首立五王齊王羞與中山並王秀才趙公子成諌武靈王胡服書云俗辟者民易則是吳越無秀才也陘陘者山絶之名見趙世家徐廣注刑棄灰李斯傳堯舜三代之事可為萬世法者孔子於定書備矣東遷而後之事可為萬世戒者乆約之而作春秋矣太史公取孔子已棄而不載者復為史記殆不過博聞於義理似無責然太史公生長於黄老荒唐謾語中乃能推尊孔子黜黄帝乗龍上天之事不載而極老莊流弊使與申韓同傳可不謂豪傑之士哉蘇子悲其不得聖人之意為改作古史意其果有得於聖人者及今參攷乃不過於帝紀増入道家者説謂黄帝以無為為宗其書與老子書相出入耳於老子傳附以佛家者説謂釋氏視老子體道愈逺而立於世之表耳太史言申不害學本黄老蘇子則諱而改之曰縁飾以黄老太史公言諱非其歸本於黄老蘇子則諱而改之曰借老子為説凡其論賛之間又往往顯斥孟子而隂詆正學嗚呼以是為得聖人之意古史不若不作之愈也此儒者之學必先於致知歟咸淳六年庚午八月二十二日後學慈溪黄震敬書於紹興府貢闈黄氏日抄卷五十一
