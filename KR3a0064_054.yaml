body:
  text: 黃氏日抄卷五十四宋黃震撰讀雜史四東萊大事記始於周敬王三十九年首書魯人獲麟孔子作春秋又别為大事記之解題首載伊川春秋傳序蓋記以上續春秋解題以上續左氏傳而載伊川傳序所以明春秋之義而寓所以繼之之心也溫公作通鑑始於威烈王二十三年後於獲麟七十八年始於三晉大夫封諸侯特以繼左氏末年載智伯事蓋自處以史而已大事記既以繼獲麟之絶筆而入通鑑以後又皆搜通鑑之所不載豈其意未以通鑑為足哉然朱文公作通鑑綱目亦惟始於三晉大夫其事惟史雖不以大事為名而綱即所以繼春秋目即所以繼三傳剪裁出入首尾貫通視大事記又不同矣顧大事記多取戰國䇿而以史記汲冢書考究異同其於名義地理為詳學者亦不容不考周赧王四十一年四月書孔子卒是為魯哀公十有六年孔子生於魯襄公二十二年至是年七十三田恆滅齊族之強者解題云欒郤胥原不微則三家必不能分晉國髙鮑晏不滅則田氏不能篡齊越侵楚解題曰以誤吳也吳伐楚解題曰為越所驕也得其情矣周貞定王元年魯哀公及越后庸盟于平陽解題云時三子皆從康子病之杜預曰恥從蠻夷盟愚意康子恐其君借勢於越以去已故病之與越將妻公康子納賂太宰嚭而止同一私心豈以盟蠻夷為恥哉張孟談既為趙襄子滅智氏而去之耕於負親之丘愚謂與范蠡泛五湖同風貞定王二十八年崩哀王立三月弟思王弒之思王立五月弟考王又弒之考王既立遂封其弟揭於河南為河南桓公修周公之職其後遂為西周而東周於是又有東西周之分矣初周之方興所謂西周者豐鎬也所謂東周者東都也東都之地有二其一在河南即郟鄏郟者山名鄏者地邑周公卜澗水東者也是為東都之王城惟天子時㑹諸侯則居之否則虗其一在洛陽即成周成周本并河南之總名而遷殷頑民於成周實在此洛陽周公卜瀍水東者也是為東都之下都則保釐大臣如君陳畢公治事者居之幽王既失豐鎬平王遂遷東都之王城王子朝之亂敬王又遷東都之下都至是考王以王城故地封其弟惟曰河南桓公東西之名未分也桓公卒威公立威公卒惠公立秉政三世益専惠公别封少子班於鞏以奉王號東周豈惠公獨擅河南而不復奉王歟東都者指威烈王所居之洛陽而鞏者班之采邑是班秉政於洛陽而食采於鞏班亦稱惠公是為東周惠公焉至顯王二年韓與趙分周為二東西周始名為列國不復相關顯王在東周特建空名於其上而韓趙分周之師意者為西周而舉歟後五十三年顯王之孫赧王立又自東周徙都西周特主其祭耳土地人民政事皆西周惠公之子武公者専之赧王十五年東周與西周戰韓救西周未幾韓又徴甲與粟於東周蓋東周時服於韓二十五年東周君朝秦五十九年赧王與諸侯欲伐秦秦使將軍鏐伐之赧王入秦盡獻其邑三十六又七年東周君復與諸侯謀伐秦秦使吕不韋滅之河南洛陽東西周之地盡以封吕不韋自周武王至此合八百六十七年凡東西周之詳東萊隨年考之而今總録於此赧王之父慎靚王二年魏惠王命諸侯于臼里將復尊天子不克東萊曰按韓非子魏惠王為臼里之盟將復天子彭喜謂鄭君曰君勿聼大國惡有天子小國利之君與大國不聼魏焉能與小國立之所謂將復立天子者是時七國既稱王不以周為天子也或者猶咎孟子勸諸侯行王道何哉周威烈王四年秦作上下畤先是秦襄公既侯居西垂自謂主少皥之神作西畤祭白帝後十六年秦文公作鄜畤祭白帝後八十四年秦宣公作密畤於渭南祭青帝後二百五十年秦靈公作上下畤於吳陽上畤祭黃帝下畤祭炎帝太史公續秦紀至秦襄公作西畤曰僣端見矣威烈王八年越滅郯郯今海州方春秋時太皥之後有任宿須句顓臾四國少皥之後有莒郯二國至於戰國獨任國僅見於孟子威烈王九年秦初君甥妻何用諸河以求福也戎狄之俗也鄴為河伯娶婦西門豹禁止之魏與秦鄰染其俗歟索隱君甥作君主謂取他女為君主猶公主也威烈王十二年中山武公初立先是魯昭公十二年晉假道於鮮虞以滅虢杜預曰鮮虞白狄别種在中山新市縣中山名見於傳始此及定公四年晉合諸侯伐楚荀寅曰諸侯方二中山不服是中山是時勢已漸強至是武公初立意如備侯之制與諸夏抗歟威烈王十八年魏文侯克中山後三十八年其子武侯之世又與中山戰于房子其時蓋已復國後七年中山築長城以備趙又後二十六年魏以中山君為相則此時中山服屬於魏又二十年韓燕中山皆稱王則中山益強又十八年趙武靈王攻中山中山獻四邑以和又五年趙再攻中山又四年當赧王十九年趙遂滅中山戰國惟中山世系不明愚故總録於此威烈王十三年晉河岸崩壅龍門至于底柱解題云春秋後河患始於此漢待詔賈讓曰齊與韓魏以河為境各去河二十五里為隄水時至而去則填淤肥美民耕田之或久無患遂成衆落時至漂沒則湛溺自其宜也愚按此年乃岸崩壅水賈讓所言乃河溢決堤事本不同而賈讓於河患極見本末程尚書大昌作禹貢辨其說出此秦初令吏帶劒又百姓帶劒解題曰佩玉三代也佩劒秦也威烈王十九年魏李悝著法經六篇以政莫急於盜賊故始於盜律賊律盜須劾捕故著囚捕二篇其輕狡越城博戲假借不廉淫侈踰制為雜律一篇終以具律具其加減猶今之名例律也凡六篇商君受之以相秦遂變法又置法官解題曰法始於伏羲而備於周雖其間有詳有略要之皆本於伏羲也法變於秦而極於五代雖其間有因有革要之不能大異於秦也愚意揚雄稱法始於伏羲成於堯者殆指典章法度而言今李悝所著商鞅所用乃刻核戕民之具非法度之法也自蚩尤作五虐之刑曰法至春秋如鑄刑書之類惟戮是聞及李悝撰次諸國之法而加刻焉秦遂緣之立為法官愈傳愈密而民無所措手足秦之所變豈變伏羲以來之所謂法而可並言哉威烈王二十三年通鑑所始之年也通鑑始於三晉大夫為諸侯大事記始於九鼎震云三晉篡盜之應周安王四年書列禦冦為李耳之舉楊朱亦師耳與墨翟春秋後各以其舉行天下解題曰列子多引黃帝書蓋古之微言傳久而差孔子定書始堯典其有以哉愚按列子之言類楊朱而後世以黃老並言者恐亦借古聖人為重如神仙則言黃帝儉則言堯許行並耕則言神農皆起於後世耳古豈有此哉安王十八年秦止從死秦自武公以人從死獻公即位始止之愚謂初政如此所以能徙治櫟陽修穆公之政而興其國歟顯王五年秦敗魏趙韓斬首六萬級以萬計級自此石門之戰始顯王八年秦孝公下令求能出竒計強秦者公孫鞅自魏入秦用之變法秦自此強東萊謂法之始行民亦苦之及其既久能攻戰能告訐能損下益上者皆得志宜孝公以為百姓果便之彼貧弱者日以失職怨氣滿腹而不敢吐孝公安得而知之哉顯王十九年秦壞井田開阡陌解題曰阡陌田間之道也蔡澤稱商君之功亦曰决裂阡陌决裂云者井田之制分畫堅明封表深固非大用力以决裂之不能掃滅其迹也東萊此語明矣又繼之曰變井田為阡陌為之字義又與决裂相反當以朱文公阡陌辨為正秦令民父子同室內息者為禁解題曰內者納也息者子也子弟納妻而生子則不許同居也商君初令有二男以上不分異者倍其賦及是雖止有一男納妻生子亦分異矣商君嘗謂趙良曰始秦戎翟之俗父子無别同室而居今我更制其教為男女之别禮不下庶人命士以上父子始異宫今商君制禮乃過先王豈其情歟愚謂命士以上父子異宫者屋室廣而侍者衆故於所居各為便非分離而各居也商君欲增户口而使父子分離各從征役耳非使男女有别也緣古說以欺人也東萊猶以正禮責之何待之厚耶顯王二十年秦初置有秩史解題曰井田既廢比閭之制亦壞故置有秩史以董之漢百官表載縣萬户以上為令秩千石至六百石不滿萬户為長秩五百石至三百石皆有丞尉秩二百石是為長吏百石以下有斗食佐史之秩是為少吏大率十里為亭亭有長亭長持三尺板以劾賊亭停也蓋行旅宿㑹之所館一亭一鄉鄉有三老以德齒表率其鄉有秩掌一鄉人有嗇夫鄉小者不置有秩則置嗇夫職聼訟收賦稅又有遊徼循禁賊盜皆秦制也顯王三十年楚聘莊周為相愚按史無此事而列禦冦子華子凡方外橫議之士多自誇時君聘我為相而逃之其為寓言未可知又時君尚攻戰權術未必有禮聘岩穴之事雖孟子之於梁齊亦聞其好士而往說之非聘也縱其聘之何至預名為相而聘之就使欲聘為相何關世道而乃以所未必有之事著之信史耶封禪書載九鼎沒于泗水彭城下時在楚興師求九鼎之後東坡曰此周人毁鼎以緩禍而假之神妖以為說也封禪書又曰秦滅周九鼎入秦東萊曰使鼎果入秦則秦皇過彭城何為齊戒禱祠使千人沒泗水求九鼎哉顯王三十四年趙起夀陵解題曰古者凶事不豫夀陵之名始此墓之稱陵古無貴賤之别國語管仲曰定民之居成民之事陵為之終是民之墓亦稱陵也秦記載諸君之葬至惠文王以後始稱陵顯王四十一年魏納上郡十五縣于秦解題曰春秋時郡屬於縣趙簡子誓衆謂上大夫受縣下大夫受郡是也杜預注曰周書作雒篇千里百縣縣有四郡戰國時縣屬於郡此云上郡十五縣是也秦孝公并小鄉為大縣未有郡之稱魏納上郡後十餘年始置漢中郡或者山東諸侯先變古制而秦效之歟顯王四十五年秦惠王後元年解題曰本紀書更為元年蓋於竹書紀年魏惠王復改元愼靚王三年韓趙燕齊帥胸奴攻秦胸奴始見於此赧王二年屈原作離騷愚按史之所書者國事也前此書孔伋作中庸此已不待史而傳屈原作離騷又非子思作中庸比也不知止書楚放屈原而疏作離騷於下何如赧王六年秦初置丞相解題曰丞相之名始此赧王八年秦立芊八子為太后聼政解題曰芊楚姓也八子婦官視千石後世婦人預政始此其異父弟魏冉為將軍用事後世外戚預政始此赧王十四年秦蜀郡守李陽氷鑿離􅕞避沫水之害穿二江成都中解題謂江水出岷山東南過氏道縣又歷都安縣又徑臨卭縣江源縣又東北徑郫縣又東徑成都縣又東南過犍為武陽縣沫水從東南來合而注沫水一自䝉山至南安而溷崖水脉漂疾害舟李冰鑿平溷崖通正水路溷崖即離􅕞也赧王十九年趙主父滅中山酺五日周禮族師祭酺注曰酺者為人物烖害之神也漢律三人以上無故羣飲酒罰金四兩橫賜得令羣飲者謂之酺東萊據此謂羣飲之禁逺自周公賜酺之制亦必非始於趙也愚按周禮出於漢末謂酺為祭神恐未可知而破羣飲之禁以賜酺則始見於此爾赧王三十二年燕昭王使方士入海求三神山解題曰此後世人主求仙之始也自齊威宣燕昭使人入海求蓬萊方丈瀛洲世主莫不甘心焉赧王三十六年秦趙㑹澠池趙以藺相如為上卿解題載龜山楊氏之言曰古有以皮幣珠玉而不得免者况一璧乎雖與之可也全璧歸趙何益哉至於澠池之㑹相如智勇不足重趙乃欲以頸血濺之所謂暴虎馮河死而無悔者歟愚按戰國䇿或謂韓王曰秦之欲并天下而王之也不與古同事之雖如子之事父猶將亡之也行雖如伯夷猶將亡之也雖善事之無益也可謂得秦之情矣趙之危急非周太王方興比也秦之強暴非狄之西陲荒忽可遷避比也奪之璧脅之兵彼尚知趙有人而少紓其侵暴豫之璧為之擊缶而不敢較彼且臣妾我而禍又速矣藺相如烈士也處萬死一生之地安若無事何可當也龜山之論雖揆正誼我輩書生平居坐談但有愧嘆耳秦昭王五十二年是歲秦既滅周以秦年統諸國然始皇二十六年以前秦固未嘗敢稱天子莊襄王元年大赦解題曰秦漢以後初即位肆赦始此始皇四年蝗疫令百姓納粟千石拜爵一級解題曰入粟拜爵始此魏公子無忌卒初周赧王五十年魏破齊楚兵賴秦救而定欲親秦而伐韓無忌曰秦有虎狼之心非盡亡天下之國不休願王速受楚趙之約而挾韓之質以存韓安魏當是時范雎為秦謀主以破韓為首務所以親魏者特欲孤韓之黨耳信陵君之言深識天下之大勢使魏王能用其計糾率楚趙竭力助韓則韓不至於失上黨趙不至於敗長平六國亦不至為秦所吞以謀既不用又以矯殺晉鄙流落於外秦已滅周六國垂亡魏始再用之猶能收合諸侯折強秦之鋒向若用之於上黨長平未敗之前雌雄之勢殆未可量也其收合諸侯以折強秦也實當秦莊襄王三年敗秦軍於河外走䝉驁乘勝逐秦軍至函谷關秦兵不敢出公子威震天下明年公子即以毁廢蓋安釐王始畏公子賢能不敢任以國政魏趙唇齒國也秦圍邯鄲公子數請賔客辨士說王萬端豈獨為其身計哉及奪晉鄙軍以存趙則遂為魏王所深讎雖迫於危亡不得已而再用之然魏王之猜且暗猶夫人也故秦間得行公子既廢日夜飲酒四歲病卒秦聞公子死䝉驁始攻魏拔二十城置東郡其後稍蠶食魏十八歲而滅之公子之存亡關魏之存亡如此故漢髙祖自少時聞公子賢及即天子位每過大梁常祠公子十二年擊黥布還為公子置守冢五家世世歲以四時奉祠愚按四公子惟無忌有功當世前史以矯殺晉鄙事短之東萊獨發明其韓趙魏存亡相依之情以白其心凡書公子事必再三致其意故總録於公子既卒之下始皇六年楚徙都夀春命曰郢解題曰楚都所至命曰郢晉都所至命曰絳始皇九年毒嫪作亂夷三族解題載嫪矯發兵縣卒及衛卒及官騎及戎翟君公及舍人蓋秦之兵制見此凡五也王攻毒嫪戰咸陽斬首數百皆拜爵宦者在戰中亦拜一級亦者秦之宦者本無拜爵之法也始皇十年用茅焦諌迎太后于雍解題曰本紀載茅焦言大王有遷母之名恐諸侯由此倍秦又戰國䇿載頓弱面詆始皇不孝始皇怒弱告以山東戰國之威不掩於山東而掩於母乃霽怒然則始皇所重者獨兼并諸侯耳茅焦特以諸侯倍秦恐之非以母子天性感悟之也以尉繚為國尉解題曰大梁人尉繚說秦曰恐諸侯合從願賂其豪臣以亂其謀不過亡三十萬金諸侯可盡卒用其䇿大略與李斯同不過以金啖之前此范睢之散合從後此陳平之間項羽同出一術蓋亂世風俗貪鄙故此術每用每中始皇二十六年滅齊初併天下置三十六郡內史為首所治秦之三輔及𢎞農郡其後併南越閩越置桂林南海象郡閩中合四十郡秦初三年一郊收大半之賦貧民耕豪民田以十五輸本田主愚按田主得其半若官又收大半於其田主將何從出耶亦可疑始皇三十一年使黔首自實田解題曰為此阡陌之弊愚按阡陌乃井田之阡陌秦開而去之非為之也東萊於孝公之下自載秦人之說以為决壞阡陌今其自說乃以為開創恐不相合此事朱文公考之甚詳大事記以義帝紀年恐别有見耳義帝本楚懷王之孫流落牧竪項羽以人心為楚不平借之以從衆望所謂辨髦耳豈真天下之共主哉張良教太子致四皓髙祖不敢廢太子伊川易傳用為納約自牗之證溫公以其為脅君而刪之二說不同而大事記載易傳愚謂兩說自可並存蓋髙帝懼太子羽翼有人廢之必有後患而止非喜太子之能用賢可付託天下而不廢也為史者但存其事是非自見似亦不必刪髙帝既崩吕氏欲盡誅將相而後發喪賴酈商說其所私審食其者乃獲免其後諸吕欲為亂又賴酈商之子酈寄說吕祿解將印之國導之出遊獵而太尉得入北軍以誅諸吕酈氏父子有大功於劉氏宗社矣張良智髙一世佐漢開基其子辟疆乃教陳平啓吕氏王諸吕以保身幾滅劉氏一於機智茍濟目前不復顧大體之所在其弊乃如此雖謂良之不才子可矣解題謂髙后欲王諸吕故諸劉之望皆見厚則天欲帝武氏故諸李之望皆見屠愚按吕氏以朱虗侯劉章為材武而結之妻以吕祿之女其後知諸吕之遂謀者正此女而手殺諸吕者皆劉章此殆天意耳若吕氏之欲誅滅劉氏其心豈可測哉賈誼服賦稱單閼之歲蓋丁卯也時絳侯已就國灌嬰已死則絳灌無由譛誼大事記移之甲子歲然當缺疑耳且絳灌漢初醇厚賈生年少好議論絳灌非之亦老成者之常情縱有之不可言譛謂賈誼政事疏引君當道者獨缺焉論漢用人必先曰長者舉事必先曰大體各引其證甚詳可讀見文帝十年除田租解題曰見錯鬻爵之䇿積粟既多故除田之租稅除戍役令用朝錯募民戍邊之策應募者衆不必勞民更戍漢景二年申屠嘉死漢相之威權遂奪中四年作德陽宫此景帝廟也諱不言廟故言宫孝武元光二年立太乙祠解題曰太乙之名古無有也古之醫者觀八風之虗實邪正以治病因有太乙九宫之說其說具於針經今繆忌新奏太乙方曰天神貴者太乙太乙佐曰五帝古者天子以春秋祭太乙東南郊用太牢七日為壇開八通之鬼道是果安所從救哉元鼎五年甘泉太乙祠壇而五帝祠壇圜其下又以太乙為尊於天帝矣元封四年夏大旱關東流民二百萬口解題曰公孫卿謂乾封三年今四年而旱益甚不正其欺罔之罪而行誅何哉愚謂縱非四年而旱益甚國家亦何利於三年之旱而必封禪以求之封禪豈為祈天降災而設哉封禪二字已為欺罔不待四年旱而後為欺也元封五年初置刺史部十三州解題曰漢丞相遣使分刺州不常置武帝初置部刺史掌奉詔條察州司𨽻校尉部豫州部冀州部兖州部徐州部青州部荆州部揚州部益州部凉州部并州部幽州部交州部凡十三巫蠱按武帝好方士而女巫往來宫中教美人度厄每屋埋木人祭祀之因妬忌盡言更相告訐以為呪詛其禍遂至殺兩公主殺太子殺丞相公孫賀殺衛皇后之親黨武帝好神仙之效如此而道家所謂度厄亦略可觀矣吳人棲句踐之地南至句無今諸暨地北禦兒今嘉興地東至鄞今慶元地西至姑蔑今衢州地琅琊今沂州俆州即舒州見史記正義又䣄亦音舒南鄭鄭桓死於犬戎其民南奔故以南名即漢巾地今興元府新鄭鄭在宗周畿內幽王時遷於河南臨晉秦築髙壘以臨晉國故名毋丘毋音貫即古貫字在今濟隂縣南扞關周安王二十五楚為扞關以拒蜀蘇秦云趙之扞關陸道之關也楚之扞關水道之關也張儀妤楚曰舠船載卒不十日而距扞關李熊說公孫述曰東守四郡拒扞關之口史記正義謂在峽州巴山縣黃池吳王夫差晉定公㑹處在開封府東平丘縣見顯王十二年咸陽在渭水之北九嵕諸山之南皆陽也故名咸陽舊亦别名長安漢髙六年遂改曰長安商於商洛縣在商州東本周之商國也於林在鄧州古於邑也汨羅史記正義云在淇饒等州楚之東境三川河洛伊也漢分為河南河內河東號三河龍兊兊音奪趙地名遼東秦漢皆為郡漢末公孫度據司馬懿滅之西晉慕容廆據後魏滅之其地尋入髙麗唐李績平之置安東上都護府至德后廢荆楚也秦避莊襄王諱改云荆鴻溝浚儀縣西北渠水東經大梁城南又北屈分為二渠其一東南流為鴻溝其一東經陽武縣為官渡汜水冇二一在成臯城東者音祀一在濟隂髙帝即位處音敷劒反京索京故城在鄭州滎陽東京縣有大索城索索城蜀始見於牧誓周元王元年蜀始聘秦三郡髙帝定天下分三秦為三郡渭南即景帝右內史武帝京兆尹之地河上即景帝右內史武帝左馮翊之地中地即景帝右內史武帝右扶風之地蓋秦內史掌治京師項羽分其地為雍塞二國髙帝分三郡復𨽻內史而景武之世更其名楚有三自淮比沛陳汝南南郡為西楚彭城以東東海吳廣陵為東楚衡山九江方南豫章長沙為南楚出漢食貨志北河秦築長城並河以東屬之隂山因河為塞又云運芻粟北河蓋河自西域注于蒲昌海隱淪不見復出於積石山屈而東北流徑於析支東北徑歷燉煌酒泉張掖南又東過隴西金城天水又東北過安定朔方又屈而北流為北河秦之轉輸率三十鍾致一石方與趙縣名音房豫山東秦漢皆稱山北山南山東山西皆主太行在漢屬河內在今屬懷州在天下之中故指北山以表地勢見髙祖十一年解題羌道凡縣有蠻夷稱道右地理關內侯有侯號而居畿內無國邑見顯王十七年秦二十爵注羌飛秦時少府有注戎漢武帝改為佽飛郎括蒼鮑氏曰郎與廊同戰國䇿云至郎門而反郎秦官也掌守門户中郎侍郎郎中為三郎中丞相趙髙宦者故名中丞相三老秦法也漢置縣鄉三老民年五十以上有修行能率衆為善者為三老鄉一人又擇鄉三老一人為縣三老九賔周謂公侯伯子男孤卿大夫士漢謂王侯公卿二千石六百石下及郎史胸奴侍子臚句傳上傳語告下為臚下告上為句見髙帝七年注五百朝錯言四理一連連有假五百東萊注云五百之名始此翁主諸王女為翁主言其父自主之右官稱北關未央宫雖南嚮以此闕為正門名𤣥武門又有東闕東門名蒼龍門而西南兩向無門缺蓋肖厭勝之術冀闕冀記也記教令於此門索隱云顧成廟制度卑狹若顧望而成罘罳連闕曲閣也其形若罘罳桶周顯王二十一年秦平斗桶權衡丈尺鄭𤣥云桶音勇今之斛也屬車周末諸侯有二車九乘秦滅九國廣其車服故屬車八十一乘幘秦滅趙以其君之冠賜近臣名惠文冠所謂貂蟬也秦雄諸侯乃加其武將首為絳表其貴賤其後稍稍作顧題謂之作幘貂蟬同上袀音鈞皂也秦尚水德郊社服用皆以袀𤣥黃屋左纛車以黃繒為蓋又以毛為幢置車衡左方上為纛此戰國以來稱王者之儀漢遂為定制行髙七年本紀行如雒陽秦漢謂乘輿為行如始皇紀行所幸有言其處者死即阼文帝即阼曲禮曰踐阼臨祭祀阼東階也主人所升降士冠禮注曰阼猶酢也所以答酬賔客褚竹吕反以綿裝衣曰禇見文帝遺胸奴書比余漢遺胸奴之物辮髮之飾也漢書作比踈犀毗胡帶之飾亦曰鮮卑張晏曰鮮卑瑞獸名銅虎符竹使符銅虎符第一至第五文帝始以銅為之竹使符皆以竹箭凡五枚長五寸鐫刻篆書第一至第五符以代古之圭璋各分其半右留京師左以豫郡國郡用銅虎符之守國用竹使符之相國家當發兵遣使合符符合乃聼受之尺籍伍符尺籍所以書軍令伍符五五相保之符信朱兩轓轓音反車耳反出為蔽也二千石朱兩轓千石至六百石朱左轓右宫闕器物龜貝右以玉為瑞龜為寶貝為貨戰國以後尚金錢而龜貝委之泥沙不用矣錢髙帝十一年定郡國之獻人歲六十三錢又漢爵一級直錢二千又漢律人出一算百二十錢又民賦四十又景帝詔訾算十以上乃得官今訾四得官注云訾萬錢算百二十七十算十萬也赤側以赤銅為錢之郭緵祖工反八十緌也租挈溝洫志今內史稻田租挈重與郡同挈苦計反取田租之約令也然則今之租契綺今之細綾罽織也右錢幣藺石鐵蒺梨也渠答城上雷石也墨子曰城上二步一渠二步一答虎落若今竹虎以竹篾相連遮落之穹廬旃帳也其形穹窿故曰穹廬祓灞上柭音廢三月上巳鄭㑹溱洧祓除不祥漢祓灞上魏以後不用勸駕髙帝十一年求賢詔云必身勸為之駕縱橫連關中之謂橫合關東之謂縱上計秦制北郡以春行縣勸農桑振乏絶秋冬遣無害吏問因歲盡上計見秦昭五十一年注法酒以禮飲也髙七年注來置酒始皇十年齊王趙王來置酒解題曰凡諸侯相朝至國設燕饗以禮之未有賔客反置酒者蓋齊趙畏秦而然愚謂此近世移厨之始頭㑹箕斂服䖍云吏到其家以人頭數出榖以箕斂端月秦楚之際月避始皇嫌名改正為端耐音而輕罪不至髠完其耐鬢陸海秦豳之地以其膏腴號稱陸海倍稱朝錯書謂舉一償二稱舉也今謂舉錢舅父母之兄弟為舅父齊王舅父駟鈞詳見文帝三年注蔪讀芟同泰階六符三台也每二星上階為天子中為諸侯卿大夫下為庶人星皆明則太平故曰符酺周赧王十九年中山膚施大赦酺按周禮族師各掌其族之戎令政事春秋祭酺亦如之注謂酺者為人物除害之神因祭酺而與其民以長馬疏謂祭酺而民相獻酬幼獻酺必合錢為之故禮記曽子曰周禮其猶醵與東萊云漢三人無故羣飲罰金四兩詔橫賜得令羣飲謂三酺羣飲之禁逺自周公賜酺之制亦必非始於趙也右雜類東萊先生吕氏作大事記將以上續春秋下訖五代天不假之年修至漢武帝征和三年而絶筆矣大要括類史記漢書之事凡散見表志而不載本記及其餘記傳涉秦漢事者總為大事記及參訂諸書異同使之歸一或與易置其先後及考究地理制度名物纎悉者别為解題又始於書序詩序及論語孟子及時事者與太史公自序胡五峯假陸賈對而終之以董仲舒䇿再為通釋其書凡三其用工甚至其考訂甚詳晦庵嘗見其書於身後答書於其子弟而稱之他日答沈叔晦書亦言東萊文惟大事記有益此其大約也黃氏日抄卷五十四
