body:
  text: 黃氏日抄卷二十一宋黃震撰讀禮記八學記第十八發慮憲求善良足以謏聞不足以動衆就賢體遠足以動衆未足以化民君子如欲化民成俗其必由學乎謏思了反聞音問慮謂志念憲謂取法謏小也聞聲聞就謂屈己躬下之體謂以心體之逺謂賢之在逺方者發于思慮欲取憲法者在於求善良之士足以小有聲聞矣未足以聳動衆聽也屈己就賢以心體逺足以聳動衆聽矣未足以感化民心也如欲化民以成風俗之美其必由學蓋有慕善之心不若有資賢之實有資賢之實又不若力學以成德於己德成於己而後民自化此段次第言之以眀為學之功大補玉不琢不成器人不學不知道是故古之王者建國君民教學為先兊命曰念終始典于學其此之謂乎雖有嘉肴弗食不知其旨也雖有至道弗學不知其善也是故學然後知不足教然後知困知不足然後能自反也知困然後能自強也故曰教學相長也兊命曰學學半其此之謂乎兊命書作説命學學半書作斆學半此章眀人不學不知道因及學然後知不足教然後知困以眀斆學相長之義知不足如顔子末由也已知困如屋廬子不能答此皆益以進學之機學之説始于説命故援以為言補古之教者家有孰黨有庠術有序國有學術音遂門側之室為孰五百家為黨萬二千五百家為遂遂即術黨屬鄉鄉之外為遂城中曰學庠序皆學鄭氏孔氏比年入學中年考校一年視離經辨志三年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知類通達強立而不反謂之大成夫然後足以化民易俗近者説服而遠者懷之此大學之道也記曰蛾子時術之其此之謂乎比毗志反中丁仲反樂音洛古注五孝反又音嶽蛾魚起反比年連年也中年間一年即下文一年三年五年七年之類考校者未入大學則鄉遂大夫考校已入大學則自國家考校視者視其所以即指考校言之離經謂分章析句辨志謂分别志向為善為利為君子為小人敬業者專心致志以事其業樂羣者樂于取益以輔其仁博習者積纍精専次第而遍親師者道同德合愛敬兼盡論學者知言而能論學之是非取友者知人而能識人之賢否知類通達聞一知十能觸類而貫通也強立不反知止有定而物不能移也凡皆學校之法學必至此然後足以化民成俗近説逺懷蓋大學之道然也蛾蚍蜉即大蛾也術者述也蚍蜉之子微蟲爾時時述蚍蜉之所為銜土而能成大垤可以人而不如之乎此舊記之言而記者引之孔氏晦菴大學始教皮辨祭菜示敬道也宵雅肄三官其始也入學鼓篋孫其業也夏楚二物收其威也未卜禘不視學遊其志也時觀而弗語存其心也幼者聽而弗問學不躐等也此七者教之大倫也記曰凡學官先事士先志其此之謂乎宵音消肄以二反篋古協反孫音遜夏古雅反宵小也肄習也三謂鹿鳴四牡皇皇者華小雅三詩也鼓篋謂鼓發其書篋出所業也夏山楸楚荆也威威儀禘蓋五年之祭中年考校再考校則禘乃當小成之年五年視學再視學則禘乃當大成之年禘必視學祭而擇士應氏謂禘者春祭之名此謂比年之學自正嵗始和之後即講祭菜鼓篋之儀非待五年亦通祭以禮先聖先師故云示敬肄小雅將以用之鄉飲燕禮故云官其始始入學發篋出所業以求教于人故云孫其業夏楚之撻失儀者使之收斂故云收其威必待卜禘之年然後其君親視學以擇士未卜皆優遊以養之故云遊其志時時觀示以所學之端緒而不輕于告語則學者用工于內故云存其心幼者未可輕發惟使謙退聽講説而未容其如長者問答故云不躐等此七者教之大倫倫有次序之稱也觀古注如觀瞻之觀是主學者而言非教之謂矣今從晦菴作觀示之觀于理為長官先事已仕者先職事士先志未仕者先志向此古記者言學之概如此補大學之教也時教必有正業退息必有居學時教之正業如春夏禮樂秋冬詩書之類居學謂居其所學如易之言居業鄭注孔疏讀時字居字為句而學字自為一句今以也字學字為句晦菴不學操縵不能安弦不學博依不能安詩不學雜服不能安禮不興其藝不能樂學縵末旦反依于豈反操縵調弦雜弄依如聲依永之依博依者先學歌詩依于聲律者清濁髙下不一而足也雜服謂冕服皮辨之屬凡禮服亦不一而足也橫渠指為灑掃應對投壺沃盥細碎亦通先學操縵而後能安于弦先學博依而後能安于詩先學雜服而後能安于禮安者習熟無辛苦之意藝指操縵博依雜服而言學指弦與詩禮而言凡學必自小者起義興于藝而後樂于學此總結上三事以眀正業之積漸用孔氏輔氏補故君子之于學也藏焉修焉息焉遊焉夫然故安其學而親其師樂其友而信其道是以雖離師輔而不反也兊命曰敬孫務時敏厥修乃來其此之謂乎師輔猶師友也學使從容自得而不苦其難則雖離去師友可保不變敬孫則心有所守而無欲速時敏則進修及時而無敢怠循循而進此所以厥修乃來敬孫書作遜志補今之教者呻其占畢多其訊言及于數進而不顧其安使人不由其誠教人不盡其材其施之也悖其求之也佛夫然故隱其學而疾其師苦其難而不知其益也雖終其業其去之必速教之不刑其此之由乎呻音申占勑占反數色住反悖布內反佛扶弗反呻吟也占視也畢簡也占畢謂所視簡册之文也訊詰問也數謂形名度數及于數謂此學者從事繁末而非求其本也安謂習熟而安如上文安詩安禮之安也佛戾也隱其學謂以其學為幽隱而難知如以我為隱之意或云痛也內隱于心不以其學為然刑猶成也今之教者但吟其簡册多其訊問言及度數之末而不于其本強之使進而不顧其心之所安人未喻之又告之人未安之又進之使之而不由其誠實教之而不盡其材性悖矣若此學者無親師樂業之意雖終其業而叛去之必速教終于無成此舉不善教者以反眀上文善教之意補大學之法禁於未發之謂豫當其可之謂時不陵節而施之謂孫相觀而善之謂摩此四者教之所由興也孫順也摩切磋也禁于未發謂預為之防其事不一不必謂十五情欲未生當其可適當其可告之時亦不當以年為斷不陵節學不躐等以順而施為孫觀人之善而為已有益如以兩物相摩各得其助晦菴發然後禁則扞格而不勝時過然後學則勤苦而難成雜施而不孫則壞亂而不修獨學而無友則孤陋而寡聞燕朋逆其師燕辟廢其學此六者教之所由廢也扞胡半反格胡客反勝音升又去聲壞音怪辟音譬扞格堅拒不相入辟譬喻燕朋私褻之友燕辟私褻之談燕朋則志有所溺故逆其師之教燕辟則心有所分故廢其學之業此六者教之廢所以反眀前四者教之興獨學燕朋燕辟三者皆反言相觀而善一事用晦菴輔氏補君子既知教之所由興又知教之所由廢然後可以為人師也故君子之教喻也道而弗牽強而弗抑開而弗逹道而弗牽則和強而弗抑則易開而弗逹則思和易以思可謂善喻矣道音導強其兩反喻者曉譬以義理即教也道之使有所向而弗牽挽之使必從故學之者和強之使有所勉而弗逼抑之使必進故學之者易開之使有所從入而不豁逹之一旦盡示其所難知故學之者退而深思和易以思人將自得善喻者如此用方氏補學者有四失教者必知之人之學也或失則多或失則寡或失則易或失則止此四者心之莫同也知其心然後能救其失也教也者長善而救其失者也長丁丈反或失則多才有餘者或失則寡才不足者或失則易俊快者或失則止鈍滯者東萊善歌者使人繼其聲善教者使人繼其志其言也約而逹微而臧罕譬而喻可謂繼志矣此托善歌以比喻善教繼聲繼志者皆謂微發其端而不究其説使人有所玩索而自得之也言雖寡約而其理顯逹言雖微眇而其理精善其取譬雖罕少而聽者曉然意喻三者皆不務多言而使人自得之此謂繼志本晦菴説君子知至學之難易而知其美惡然後能博喻能博喻然後能為師能為師然後能為長能為長然後能為君故師也者所以學為君也是故擇師不可不慎也記曰三王四代唯其師此之謂乎長丁丈反人之至於學順理則易逆理則難習是則美習非則惡知學者至於學之難易及知其人資質趨向之美惡則能教人能為師以教人則能為君以治人此學之為王者事橫渠晦菴凡學之道嚴師為難師嚴然後道尊道尊然後民知敬學是故君之所不臣於其臣者二當其為尸則弗臣也當其為師則弗臣也大學之禮雖詔於天子無北面所以尊師也嚴尊敬也尸祭主代神者也詔告也雖天子不敢臣其師補善學者師逸而功倍又從而庸之不善學者師勤而功半又從而怨之庸功也善學歸功於師不善反歸怨於師補善問者如攻堅木先其易者後其節目及其久也相説以解不善問者反此善待問者如撞鐘叩之以小者則小鳴叩之以大者則大鳴待其從容然後盡其聲不善答問者反此此皆進學之道也從音舂説當讀如脫治木易者既去堅者亦可相脫而解從容謂鐘聲之餘韻答問答人之問相脫用輔氏説從容用晦菴説記問之學不足以為人師必也其聽語乎力不能問然後語之語之而不知雖舍之可也語魚據反舍音捨記問如前呻其占畢多其訊言及于數是也不足以為人師以其所學者外也所謂師者何也理也義也若以記問則學者求諸簡編可也聽語謂聽其所問然後告語之也此言講求理義有問而後語之則學者得以開發其所疑力不能問而師自語之已為次矣語之而又不曉教者無所施其力矣故雖舍之可也用輔氏戴氏伊川補良冶之子必學為裘良弓之子必學為箕始駕馬者反之車在馬前君子察於此三者可以有志於學矣裘橫渠謂字當為毬沙土之範模也或疑裘指冶家鼓風之槖籥若注疏謂良冶鎔金補器其子亦緝皮補裘恐其業不同非肖似習學之意當俟知者箕則屈木為曲幹其形如弓也始駕馬者新調習馬駒也駕馬之法馬在車前引車以行今馬駒始學駕車繫隨車後而行使駒日日見車之行慣習而後駕之裘近於冶良冶之子幼而戲弄已學為裘箕似於弓良弓之子幼而戲弄已學為箕不特弓冶之子為然雖馬之有子亦幼而習學駕車矣然則為士大夫之子宜何所用心哉故曰君子察此三者可以有志於學使觸類而內省也補古之學者比物醜類鼓無當於五聲五聲弗得不和水無當於五色五色弗得不章學無當於五官五官弗得不治師無當於五服五服弗得不親當丁浪反比方也物事也醜猶齊也類事之同類也五聲宫商角徴羽五色青黃赤白黑五官金木水火土之官五服斬衰齊衰大功小功緦麻鼓不在五聲之數五聲必待鼓參之而後和水不在五色之數五色必待水澤之而後章學不在五官之數五官必待學講之而後治師不在五服親戚之數五服必待師教訓之而後能相親鼓也水也以喻學與師之不可闕也所謂比物醜類也補君子曰大德不官大道不器大信不約大時不齊察於此四者可以有志於本矣三王之祭川也皆先河而後海或源也或委也此之謂務本委於偽反大德不但能專一官之事大道不但拘一器之用大信上古結繩而治之信所以不約大時如堯舜揖遜湯武征伐之時所以不齊凡皆深造本源不纍細微故謂察此四者可以有志於其本川總河海而言也河雖小源也水所出也海雖大委也水所聚也源者本也三王之祭川先河而後海先其本也此為務本之證用晦菴岷隱而補其餘樂記第十九孔氏疏謂此書有樂本有樂論有樂施有樂言有樂禮有樂情有樂化有樂象有賓牟賈有師乙有魏文侯蓋十一篇合為一篇且謂漢武帝時河間獻王與諸生共采周官及諸子所作愚按此書間多精語如曰人生而靜天之性也感於物而動性之欲也如曰好惡無節於內知誘於外不能反躬天理滅矣皆近世理學所據以為淵源如曰天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉又晦菴先生所深嘉而屢歎者也凡音之起由人心生也人心之動物使之然也感於物而動故形於聲聲相應故生變變成方謂之音比音而樂之及十戚羽旄謂之樂樂者音之所由生也其本在人心之感於物也是故其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以亷其愛心感者其聲和以柔六者非性也感於物而后動是故先王慎所以感之者故禮以道其志樂以和其聲政以一其行刑以防其姦禮樂刑政其極一也所以同民心而出治道也比毗志反噍子遙反殺色界反嘽昌善反散思旦反道音導行下孟反變謂清濁髙下不同方猶文章謂音之節干盾戚斧皆武舞所執羽翟羽旄牛尾皆文舞所執噍踧也嘽寬綽粗粗厲猛謹其所以感之者指禮樂刑政此章言樂由感物而動人君當謹其所以感之者補凡音者生人心者也情動於中故形於聲聲成文謂之音是故治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困聲音之道與政通矣宫為君商為臣角為民徴為事羽為物五者不亂則無怗懘之音矣宫亂則荒其君驕商亂則陂其臣壞角亂則憂其民怨徴亂則哀其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢如此則國之滅亡無日矣鄭衛之音亂世之音也比於慢矣桑間濮上之音亡國之音也其政散其民流誣上行私而不可止也徴張里反怗昌亷反懘昌制反陂彼義反比毗志反怗懘敝敗不和貌五音還相為宫而不相亂則無敝敗不和之音君臣民物事五者有一亂則其音應五者皆亂其音迭相陵犯則國亡鄭衛之音與桑間濮上其證也此章言樂由情動而形故聲音之道與政通補凡音者生於人心者也樂者通倫理者也是故知聲而不知音者禽獸是也知音而不知樂者衆庶是也唯君子為能知樂是故審聲以知音審音以知樂審樂以知政而治道備矣是故不知聲者不可與言音不知音者不可與言樂知樂則幾於禮矣禮樂皆得謂之有德德者得也是故樂之隆非極音也食饗之禮非致味也清廟之瑟朱弦而疏越一倡而三嘆有遺音者矣大饗之禮尚玄酒而爼腥魚大羮不和有遺味者矣是故先王之制禮樂也非以極口腹耳目之欲也將以教民平好惡而反人道之正也越音活好呼報反惡烏洛反倫類也理分也幾近也朱弦練朱絲為弦練則聲濁越瑟底孔也畫疏之使聲遲倡發歌句三嘆三人從和之大饗謂祫祭腥生也此章承上文審樂知政以及於禮遂言禮樂之盛不在聲音爼豆而在教民以復人道之正補人生而靜天之性也感於物而動性之欲也物至知知然後好惡形焉好惡無節於內知誘於外不能反躬天理滅矣夫物之感人無窮而人之好惡無節則是物至而人化物也人化物也者滅天理而窮人欲者也於是有悖逆詐偽之心有淫泆作亂之事是故強者脅弱衆者暴寡知者詐愚勇者苦怯疾病不養老幼孤獨不得其所此大亂之道也是故先王之制禮樂人為之節衰麻哭泣所以節喪紀也鐘鼓干戚所以和安樂也昏姻冠笄所以别男女也射鄉食饗所以正交接也禮節民心樂和民聲政以行之刑以防之禮樂刑政四達而不悖則王道備矣樂者為同禮者為異同則相親異則相敬樂勝則流禮勝則離合情飾貌者禮樂之事也禮義立則貴賤等矣樂文同則上下和矣好惡著則賢不肖别矣刑禁暴爵舉賢則政均矣仁以愛之義以正之如此則民治行矣悖布內反知音智衰七雷反别彼别反人生而靜天之性也指性之本體未感物者言之也感於物而動性之欲也此所謂情也物至知知然後好惡形焉所以眀感於物而動之機也物即指上文感於物之物知者指血氣心知之知物至其前而知能知之合其性之欲則好違其性之欲則惡此好惡所以形也好惡無節於內知誘於外不能反躬天理滅矣此言情之所以流而性之所以失也天理即指性而言變性言理理者天之所賦而具於性者也知者我之知而曰誘於外者我之心知誘於外物非知在外也於斯時也人能反躬而求則人生而靜者卓然而可見外誘無得而惑焉故特言不能反躬而後天理滅所以警切之意深矣人化物謂人為物所化也人為之節言人人皆為之節也樂同為協好惡禮異為别貴賤樂勝謂和而無以禮節之故流禮勝謂異而無以樂協之故離合情言樂飾貌言禮禮義立言禮之義樂文同言樂之文此章言人由感物而動好惡無節極而至大亂之道故先王制為禮樂使歸於治補樂由中出禮自外作樂由中出故靜禮自外作故文大樂必易大禮必簡樂至則無怨禮至則不爭揖讓而治天下者禮樂之謂也暴民不作諸侯賔服兵革不試五刑不用百姓無患天子不怒如此則樂達矣合父子之親眀長幼之序以敬四海之內天子如此則禮行矣大樂與天地同和大禮與天地同節和故百物不失節故祀天祭地眀則有禮樂幽則有鬼神如此則四海之內合敬同愛矣禮者殊事合敬者也樂者異文合愛者也禮樂之情同故眀王以相沿也故事與時並名與功偕故鐘鼓管磬羽籥干戚樂之器也屈伸俯仰綴兆舒疾樂之文也簠簋爼豆制度文章禮之器也升降上下周還禓襲禮之文也故知禮樂之情者能作識禮樂之文者能述作者之謂聖述者之謂眀眀聖者述作之謂也綴丁劣反又丁謂反還音旋裼思歷反樂由中出指和之發於心者言故云靜禮自外作指敬之形於貌者言故云文和未嘗不逹於外敬未始不根於中也大樂必易如朱弦疏越是也大禮必簡如玄酒腥魚是也樂至和之極也禮至順之極也下文樂行禮行皆言其效也同和言樂順天地之氣同節言禮順天地之數和故能生物而贊化節故能成物而報功眀之禮樂即幽之鬼神此眀禮樂之與天地同也與天地同則四海之內無一不歸於禮樂矣以敬四海之內言能使之知敬遍於四海故禮之尊卑異等其事雖殊而合敬之情則同也樂之宫商異調其文雖異而合愛之情則同也惟其情同故眀王得相沿襲禮變而從時此事與時並禮之相沿者也樂所以象功此名與功偕樂之相沿者也綴謂舞位相連兆謂位外營域裼者袒上衣襲者掩上衣禮盛而尚質者襲禮不盛而尚文者裼情者文之本故知其情者能作禮樂而聖之事文者情之飾故識其文者能述禮樂而眀之事此章自樂由中出禮自外作而下皆言禮樂之情自鐘鼓管磬簠簋爼豆而下皆言禮樂之文知其情而作者為聖識其文而述者為眀此眀禮樂以情為本而文其情之飾也補樂者天地之和也禮者天地之序也和故百物皆化序故羣物皆别樂由天作禮以地制過制則亂過作則暴眀於天地然後能興禮樂也論倫無患樂之情也欣喜歡愛樂之官也中正無邪禮之質也莊敬恭順禮之制也若夫禮樂之施於金石越於聲音用於宗廟社稷事乎山川鬼神則此所與民同也亂失其序也暴失其和也過者違也制作本於天地則和且序茍違此理則亂且暴也論論説也倫理也論倫無患言條理順序也官猶事也越發越也金石聲音主樂言宗廟社稷山川鬼神主禮言此章申眀禮樂從天地而來王者眀於天地然後能興禮樂樂之情與官禮之質與制皆其所尊若夫發於聲音用於祭祀則文物之末所與民同者也補王者功成作樂治定制禮其功大者其樂備其治辨者其禮具干戚之舞非備樂也孰亨而祀非逹禮也五帝殊時不相沿樂三王異世不相襲禮樂極則憂禮粗則偏矣及夫敦樂而無憂禮備而不偏者其惟大聖乎辨音遍亨普衡反粗倉都反偏音篇辨遍也功之大者兼備文武之樂干戚武舞耳故非備樂治之遍者兼備古今之體孰亨今禮耳故非備禮若羽籥則文舞也若血腥則古禮也惟功之大治之遍者得兼之五帝之不相沿樂以樂久而不變將極而失其和則憂也三王之不相襲禮以禮久而不修將粗而失其中則偏也厚重於樂知節而不至於憂修備其禮參酌而不至於偏其惟大聖能之指五帝之不相沿三王之不相襲者也此章眀聖人之制禮樂本於治定功成而隨時變通補天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉春作夏長仁也秋斂冬藏義也仁近於樂義近於禮樂者敦和率神而從天禮者别宜居鬼而從地故聖人作樂以應天制禮以配地禮樂眀備天地官矣敦音純本又作惇天髙地下尊卑有自然之序萬物散殊小大有自然之别不待人為而天髙地下萬物散殊之際禮制已行於其間矣天地運化流行而不息隂陽合同萬物自然而化生不待人為而流而不息合同而化之際樂亦自然而興矣春作夏長元亨之仁也仁主合愛樂主和同故仁近於樂秋斂冬藏利貞之義也義主斷制禮主限節故義近於禮和者沖和樂能敦之而使厚神者陽之類而天者陽之所積率者引而上之之名曰率神而從天則樂者崇之道也宜者物宜禮能别之使辨鬼者隂之類而地者隂之所積居者俯而就之之名曰居鬼而從地則禮者卑之道也作樂以應天制禮以配地謂禮樂非聖人之私蓋因天地之理禮樂眀備而天地官謂天地之間各有司存因禮眀樂備以贊相協和之故雖天地之大亦無不各得其職中庸所謂致中和而天地位者也此章申言禮樂配於天地禮樂備具而天地各得其宜孔氏天尊地卑君臣定矣卑髙以陳貴賤位矣動靜有常小大殊矣方以類聚物以羣分則性命不同矣在天成象在地成形如此則禮者天地之别也地氣上齊天氣下降隂陽相摩天地相蕩鼓之以雷霆奮之以風雨動之以四時暖之以日月而百化興焉如此則樂者天地之和也化不時則不生男女無辨則亂升天地之情也及夫禮樂之極乎天而蟠乎地行乎隂陽而通乎鬼神窮髙極逺而測深厚樂著大始而禮居成物著不息者天也著不動者地也一動一靜者天地之間也故聖人曰禮樂云上齊上時掌反齊音躋暖許袁反又况逺反樂著直略反性者人物之所得以生相近而不能盡同者也命者生而長短夀夭隨所賦而不同者也化不時則不生此承上文樂者天地之和而言以反眀樂之所以和者以百化之興以時也男女無辨則亂升升之言成此承上文禮者天地之别而言以反眀禮之所以别者以男女之有辨也樂以法天化得其時則物生否則不生此天之情也禮以法地男女有别則治興否則亂成此地之情也及其極天蟠地則禮樂無所不之樂以著乾之大始禮以處坤之成物樂以著眀不息之天禮以著明不動之地一動一靜者天地闔闢之兩間故聖人言禮樂云此章眀禮樂之功包天地之德孔氏昔者舜作五弦之琴以歌南風夔始制樂以賞諸侯故天子之為樂也以賞諸侯之有德者也德盛而教尊五穀時熟然後賞之以樂故其治民勞者其舞行綴遠其治民逸者其舞行綴短故觀其舞知其德聞其諡知其行也舞行之行戶剛反五弦惟宫商等五弦無文武二弦也南風之歌見家語云南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮夔舜典樂之官賞諸侯謂作樂而燕賞之也諸侯德盛而教尊五穀時熟然後天子賞之以樂者以其人事修於下天時應於上然後可以樂其樂也勞於治民者舞之行綴則逺由德薄而舞者少舞處寬也逸於治民者舞之行綴則短由德盛而舞者多舞處狹也勞者盡心力之名逸者不盡心力之名以治之勞逸占德之厚薄視德之厚薄制舞之多少故觀其舞知其德及諸侯之沒以其行之美惡賜以諡之善否故又聞其諡而知其行皆言天子之於諸侯然也此章眀聖人制樂以賞諸侯其功大者其樂備孔氏指為樂記第三章名樂施謂樂之布施於天下孔氏大章章之也咸池備矣韶繼也夏大也殷周之樂盡矣大章堯樂名言堯德章眀咸池黃帝樂名言能感物而潤澤之韶舜樂名言能紹堯夏禹樂名夏大也言禹能成治水之大功殷樂名濩周樂名武五帝之樂莫著於黃帝至堯修而用之然後一代之樂備故曰大章章之也咸池備矣樂備於堯而舜紹之至三王無復餘藴故曰韶繼也夏大也殷周之樂盡矣長樂陳氏天地之道寒暑不時則疾風雨不節則飢教者民之寒暑也教不時則傷世事者民之風雨也事不節則無功然則先王之為樂也以法治也善則行象德矣以法治以樂之法為治也行象德民之行效象君之德也此以天之寒暑風雨喻君之施教行事不可不時不節故先王之為樂正以法而為治其冶善而民法象君德矣補夫豢豕為酒非以為禍也而獄訟益繁則酒之流生禍也是故先王因為酒禮一獻之禮賓主百拜終日飲酒而不得醉焉此先王之所以備酒禍也故酒食者所以合歡也樂者所以象德也禮者所以綴淫也綴知劣反豢者以穀食犬豕一獻士飲酒禮百拜喻多綴猶止也鄭氏備酒禍備猶防也補是故先王有大事必有禮以哀之有大福必有禮以樂之哀樂之分皆以禮終樂也者聖人之所樂也而可以善民心其感人深其移風易俗故先王著其教焉分扶問反著知慮反大事凶事之大者哀之謂喪禮大福吉事之大者樂之謂嘉禮皆以禮終謂哀樂各中其節著猶立也馬氏鄭氏夫民有血氣心知之性而無哀樂喜怒之常應感起物而動然後心術形焉是故志微噍殺之音作而民思憂嘽諧慢易繁文簡節之音作而民康樂粗厲猛起奮末廣賁之音作而民剛毅亷直徑正莊誠之音作而民肅敬寬裕肉好順成和動之音作而民慈愛流辟邪散狄成滌濫之音作而民淫亂是故先王本之情性稽之度數制之禮義合生氣之和道五常之行使之陽而不散隂而不密剛氣不怒柔氣不懾四暢交於中而發作於外皆安其位而不相奪也然後立之學等廣其節奏省其文采以繩德厚律小大之稱比終始之序以象事行使親踈貴賤長幼男女之理皆形見於樂故曰樂觀其深矣嘽昌善反賁扶粉反辟匹亦反狄他歷反道音導省西頂反比毗志反見賢遍反志微意細也如季札謂其細已甚嘽寬也繁文簡節文雖繁而莭則簡也奮末動使四肢也廣賁謂樂聲廣大憤氣充滿肉好猶璧之有肉好璧外謂之肉實也內謂之好虗也狄成言強而成滌濫言滌蕩而泛濫四暢隂陽剛柔四者通暢於身也學等依其才藝等級而教學之也省察也以繩德厚謂樂之教人以繩正人固有之德使不失其厚也大小之稱謂大不過乎宫細不過乎羽始終之序謂始作翕然成於繹如先王律而比之以象夫事之行焉樂觀深矣謂觀乎樂其感發人者深矣此章眀人心不同隨樂而變先王莭人情性使之和其律吕親疏有序男女不亂乃成為樂孔氏土敝則草木不長水煩則魚鱉不大氣衰則生物不遂世亂則禮慝而樂淫是故其聲哀而不莊樂而不安慢易以犯莭流湎以忘本廣則容姦狹則思欲感條蕩之氣而滅平和之德是以君子賤之也此言世亂而樂之不美者凡姦聲感人而逆氣應之逆氣成象而淫樂興焉正聲感人而順氣應之順氣成象而和樂興焉倡和有應回邪曲直各歸其分而萬物之理各以類相動也分扶問反此言聲之邪正所感不同承結上文樂之不美以開下章君子之樂之美者補是故君子反情以和其志比類以成其行姦聲亂色不留聰眀淫樂慝禮不接心術惰慢邪辟之氣不設於身體使耳目鼻口心知百體皆由順正以行其義然後發以聲音而文以琴瑟動以干戚飾以羽旄從以簫管奮至德之光動四氣之和以著萬物之理是故清眀象天廣大象地終始象四時周還象風雨五色成文而不亂八風從律而不姦百度得數而有常小大相成終始相生倡和清濁迭相為經故樂行而倫清耳目聰眀血氣和平移風易俗天下皆寧故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂是故君子反情以和其志廣樂以成其教樂行而民鄉方可以觀德矣行下孟反鄉許亮反八風八方之風從律應莭而至百度者大而日月星辰之度小而百工器物之度各有數焉不止晝夜百刻之度也倫清謂人倫之道清也民鄉方謂民知鄉道此言君子正其情性形而為樂者其美如此補德者性之端也樂者德之華也金石絲竹樂之器也詩言其志也歌味其聲也舞動其容也三者本於心然後樂器從之是故情深而文明氣盛而化神和順積中而英華發外唯樂不可以為偽德在內故曰性之端樂所以發揚其德故曰德之華樂器指詩歌舞三者情形於言而為詩則情深而文明者詩不可以為偽愾歎不足而為歌則氣盛而化神者歌不可以為偽內樂而外應之為舞則和順積中而英華發外者舞不可以為偽孔氏陳氏樂者心之動也聲者樂之象也文采節奏聲之飾也君子動其本樂其象然後治其飾是故先鼓以警戒三步以見方再始以著往復亂以飭歸奮疾而不拔極幽而不隱獨樂其志不厭其道備舉其道不私其欲是故情見而義立樂終而德尊君子以好善小人以聽過故曰生民之道樂為大焉樂也者施也禮也者報也樂樂其所自生而禮反其所自始樂章德禮報情反始也著直慮反拔步葛反樂動於心發於聲飾於文采節奏文采謂威儀節謂樂止奏謂樂作也先鼓謂先擊鼓以警衆三步謂將舞必先三舉足以為舞之漸再始以著往者謂武王再舉伐紂武舞再更始以明伐時再往也復亂以飭歸者亂治也謂舞終復其行位而整治象伐紂既畢整飭師旅而還歸也奮疾而不拔者謂發揚蹈厲之巳蚤可謂奮疾而不失之暴舒徐和緩之象也極幽而不隱者謂遲之遲而又久可謂極幽矣而不失之隱明白洞逹之心也獨樂其志不厭其道備舉其道不私其欲此武王所以能伐商而救民於水火之中也情見而義立象武王伐紂之情見而天下之公義以立樂終而德尊言及樂之終而武王之德愈尊君子以好善謂君子因武王以至仁伐不仁觀其樂而好善小人以聽過謂小人因武王誅紂見紂以暴亂取亡觀其樂而改過樂象功以宣播於天下故曰施禮念功而追崇於古昔故曰報惟施故樂其所自生惟報故反其所自始此章廣樂舞之義而引武王之樂舞以眀之所謂大輅者天子之車也龍旗九旒天子之旌也青黑緣者天子之寶龜也從之以牛羊之羣則所以贈諸侯也緣恱絹反大輅金輅賜同姓諸侯者九旒據上公言之寶龜之中並以青黑為緣天子既與諸侯以己之大輅龍旗及寶龜占兆又從以牛羊非一故稱羣孔氏樂也者情之不可變者也禮也者理之不可易者也樂統同禮辨異禮樂之説管乎人情矣窮本知變樂之情也著誠去偽禮之經也禮樂偩天地之情通神眀之德降興上下之神而凝是精粗之體領父子君臣之莭是故大人舉禮樂則天地將為昭焉天地欣合隂陽相得煦嫗覆育萬物然後草木茂區萌逹羽翼奮角觡生蟄蟲昭蘇羽者嫗伏毛者孕鬻胎生者不殰而卵生者不殈則樂之道歸焉耳樂者非謂黃鐘大吕弦歌干揚也樂之末節也故童者舞之鋪筵席陳尊爼列籩豆以升降為禮者禮之末節也故有司掌之樂師辨乎聲詩故北面而弦宗祝辨乎宗廟之禮故後尸商祝辨乎喪禮故後主人是故德成而上藝成而下行成而先事成而後是故先王有上有下有先有後然後可以有制於天下也偩音負欣音熹又如字煦許具反嫗於具反區古侯反觡古伯反伏扶又反孕以證反殰音獨殈呼閴反樂出於人心之自然故曰情之不可變孔氏謂此章舊名樂情者也禮則尊卑上下之理截然而不可易樂主和合故云統同禮别尊卑故云辨異此禮樂所能管攝人情而人情皆不能外焉者也窮其本於人心而知其變之感物樂之情也著其本心之誠而去其人為之偽禮之經也偩猶依也凝猶定也精粗謂萬物小大樂由天作禮自地出故能依天地之情而通神明之德禮樂用以祭祀故能興其神之在下者降其神之在上者使皆來格又能凝定萬物之形體使各得其所統領父子君臣之等節使各安其分夫惟禮樂之功用若此故大人舉禮樂天地亦將為之昭眀自天地欣合以至於不殰不殈皆言天地協和萬物生長其效昭然可見者也欣欣也和之至也煦則生之以氣嫗則成之以形物始生曰萌生而岐别曰區萬物之生萌一而區二無䚡曰觡䚡息才反羽翼飛之屬角觡走之屬蟄藏之蟲一旦昭蘇如暗而遇曉如死而更息羽卵生者嫗則體伏而生子毛胎生者孕則字鬻而繁息胎生無內敗之殰卵生無外裂之殈樂之至和所感羣物受之復會聚而凝結是樂之歸也故曰樂之道歸焉耳若聲音之物皆禮樂之末節有司掌之故樂師辨聲詩北面而弦宗祝辨祭祀後於尸商祝辨喪禮後主人皆以知禮樂末節位處卑賤有司之事也藝成而下事成而後者也此章言先王之於樂蓋以至和參天地贊化育而末莭則有司存補魏文侯問於子夏曰吾端冕而聽古樂則惟恐卧聽鄭衛之音則不知倦敢問古樂之如彼何也新樂之如此何也子夏對曰今夫古樂進旅退旅和正以廣弦匏笙簧會守拊鼓始奏以文復亂以武治亂以相訊疾以雅君子於是語於是道古修身齊家平均天下此古樂之發也今夫新樂進俯退俯姦聲以濫溺而不止及優侏儒獶雜子女不知父子樂終不可以語不可以道古此新樂之發也今君之所問者樂也所好者音也夫樂者與音相近而不同文侯曰敢問何如子夏對曰夫古者天地順而四時當民有德而五穀昌疾疢不作而無妖祥此之謂大當然後聖人作為父子君臣以為紀綱紀綱既正天下大定天下大定然後正六律和五聲弦歌詩頌此之謂德音德音之謂樂詩云莫其德音其德克眀克眀克類克長克君王此大邦克順克俾俾于文王其德靡悔既受帝祉施于孫子此之謂也今君之所好者其溺音乎文侯曰敢問溺音何從出也子夏對曰鄭音好濫淫志宋音燕女溺志衛音趨數煩志齊音傲辟喬志此四者皆淫於色而害於德是以祭祀弗用也詩云肅雍和鳴先祖是聽夫肅肅敬也雍雍和也夫敬以和何事不行為人君者謹其所好惡而已矣君好之則臣為之上行之則民從之詩云誘民孔易此之謂也然後聖人作為鞉鼓椌楬塤箎此六者德音之音也然後鐘磬竽瑟以和之干戚旄狄以舞之此所以祭先王之廟也所以獻酬酳酢也所以官序貴賤各得其宜也所以示後世有尊卑長幼之序也鐘聲鏗鏗以立號號以立橫橫以立武君子聽鐘聲則思武臣石聲磬磬以立辨辨以致死君子聽磬聲則思死封疆之臣絲聲哀哀以立亷亷以立志君子聽琴瑟之聲則思志義之臣竹聲濫濫以立會會以聚衆君子聽竽笙簫管之聲則思畜聚之臣鼓鼙之聲歡歡以立動動以進衆君子聽鼓鼙之聲則思將帥之臣君子之聽音非聽其鏗鏘而已也彼亦有所合之也獶乃刀反莫亡伯反俾音比數音速喬音驕椌苦江反楬苦瞎反酳音胤號胡到反橫古曠反濫力敢反魏文侯晉大夫畢萬之後始僣為諸侯旅猶俱言進退齊一會守拊鼓言衆樂會合皆待擊鼓乃作奏以文謂鼓亂以武謂金相樂器名以韋為表裝之以粳相亦名拊以節樂者訊疾以雅言舞者訊疾以雅器節之凡古樂也俯猶曲言進退不齊侏儒短小之人獶獼猴也言舞者如獼猴戲凡今樂也當謂正而不失其所溺音謂溺沒於邪淫之音燕安也趨數促速也煩勞也喬驕也凡皆溺音如此鞉如小鼓搖之兩耳還以自擊椌楬謂柷敔也柷如漆桶中有椎敔如伏虎背上有二十四齟齬塤六孔燒土為之箎七空竹為之播鞉而鼓從之中聲以發焉擊椌而楬止之中聲以莭焉吹塤而箎應之中聲以和焉六者為本以其聲質故云德音之音狄羽也自作為鞉鼓至所以示後世凡皆言德音如此號號令警衆橫謂氣充滿石聲磬之磬當作罄辨謂分眀於莭義也亷謂亷隅濫猶攬會猶聚此章載子夏答魏文侯以古樂為德音今樂為溺音人君聽樂音各有所合隨其所感思國家人材非為一己淫樂補賔牟賈侍坐於孔子孔子與之言及樂曰夫武之備戒之已久何也對曰病不得其衆也咏嘆之淫液之何也對曰恐不逮事也發揚蹈厲之已蚤何也對曰及時事也武坐致右憲左何也對曰非武坐也聲淫及商何也對曰非武音也子曰若非武音則何音也對曰有司失其傳也若非有司失其傳則武王之志荒矣子曰唯丘之聞諸萇𢎞亦若吾子之言是也憲音軒賔牟姓賈名武謂周舞備戒謂擊鼓警衆病猶憂也咏歎淫液歌遲之也逮及也事戎事也武坐武舞跪坐也致右致右膝於地憲左軒起左膝憲即軒也聲淫及商者淫貪也謂有貪取商室之聲此章五問五答孔子問武舞擊鼓警衆之良久何也賔牟賈答以憂不得衆而待之故久也孔子又問欲舞之前其歌聲嘆咏淫液不絶吟思何也賈答以恐諸侯不至不及戰事也孔子又問初舞而手足發揚蹈地而猛厲之早何也賈答以及時伐紂行戰事也孔子又問武舞之跪坐右膝致地而軒起其左何也賈答以此非武人之坐以武法無坐也孔子又問樂聲貪而及商何也賈答以武王非有貪商之心此非武音也孔子因問若非貪商之聲則何聲也賈遂答謂此有司失其傳而孔子證以萇𢎞之説亦然用孔氏説賔牟賈起免席而請曰夫武之備戒之已久則既聞命矣敢問遲之遲而又久何也子曰居吾語女夫樂者象成者也揔干而山立武王之事也發揚蹈厲太公之志也武亂皆坐周召之治也且夫武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子夾振之而駟伐盛威於中國也分夾而進事蚤濟也久立於綴以待諸侯之至也且女獨未聞牧野之語乎武王克殷反商未及下車而封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於杞投殷之後於宋封王子比干之墓釋箕子之囚使之行商容而復其位庶民弛政庶士倍祿濟河而西馬散之華山之陽而弗復乘牛散之桃林之野而弗復服車甲釁而藏之府庫而弗復用倒載干戈包之以虎皮將帥之士使為諸侯名曰建櫜然後天下知武王之不復用兵也散軍而郊射左射貍首右射騶虞而貫革之射息也禆冕搢笏而虎賁之士説劔也祀乎眀堂而民知孝朝覲然後諸侯知所以臣耕籍然後諸侯知所以敬五者天下之大教也食三老五更於太學天子袒而割牲執醬而饋執爵而酳冕而總干所以教諸侯之弟也若此則周道四達禮樂交通則夫武之遲久不亦宜乎遲之遲並直詩反方氏上遲音稚綴丁劣反又丁衛反分夾扶問反薊音計復扶又反釁許靳反倒丁老反建音鍵射入聲禆婢支反説吐活反賔牟賈既聞夫子然其説於是免席徙立更端請問而夫子又詳答之遲之遲謂久立於綴方氏謂上遲字音稚待也待諸侯之至也下遲字如本音謂遲而又久則遲之至也於義亦通象成者象其成功武亂皆坐凡譁亂使坐則定北出者紂都在北武始而北以象觀政商郊成者樂以奏曲一終為一成再成以象克紂三成象既克紂而南返四成以象有南國之土五成以象周召之分治六成復綴以崇者復綴謂復歸舞位崇猶充謂六成以象武功之成也而武王之德充滿天下也天子夾振之而駟伐者舞列分為左右揔干者在中央二人振鐸夾舞而進象武王與大將伐紂之時駟古説作四陳氏以為駟騵之駟伐謂以戈伐地也古説以復綴以崇為句天子夾振之為句故其説如此長樂陳氏嚴陵方氏皆以以崇天子為句云兵始出於天子樂舞既成復歸綴位以歸尊天子援家語亦曰以崇其天子此説比舊説稍明白在學者擇焉克殷反商謂既勝殷而反商政投殷之後於宋投者舉徙之辭行猶視也商容商禮樂官使箕子視之而復其位弛政者去紂苛政倍祿者倍增舊祿釁以血塗物為釁也倒載者反其本末而載示不復用也建鍵也鍵鑰牡牝者兵甲之衣建櫜言閉藏兵甲也郊射為射宫於郊也左謂左學右謂右學貍首騶虞所歌以為射節貫革射穿甲皮也説劔脫而解之也此章謂夫子因賈之問備言武王治定功成而一變天下於文教所謂武舞不當徒以武觀也君子曰禮樂不可斯須去身致樂以治心則易直子諒之心油然生矣易直子諒之心生則樂樂則安安則久久則天天則神天則不言而信神則不怒而威致樂以治心者也致禮以治躬則莊敬莊敬則嚴威心中斯須不和不樂而鄙詐之心入之矣外貌斯須不莊不敬而易慢之心入之矣故樂也者動於內者也禮也者動於外者也樂極和禮極順內和而外順則民瞻其顔色而弗與爭也望其容貌而民不生易慢焉故德輝動於內而民莫不承聽理發諸外而民莫不承順故曰致禮樂之道舉而錯之天下無難矣樂也者動於內者也禮也者動於外者也故禮主其減樂主其盈禮減而進以進為文樂盈而反以反為文禮減而不進則銷樂盈而不反則放故禮有報而樂有反禮得其報則樂樂得其反則安禮之報樂之反其義一也報古注音褒近世方氏輔氏並如字致猶深審易謂和易直謂正直子謂子愛諒謂誠信油然新生好貌德輝顔色潤澤也理發於外言容貌之進止也禮者威儀繁多人易厭倦故主減禮既減損當自勉強樂者洋洋盈耳不知休止故主盈樂既盈滿當自抑損故禮之減以進為文如饗必至於百拜儀必至於三千皆以進為文也樂之盈以反為文如合樂必止三終奏韶必止九成皆以反為文也禮減而不勉強自進則銷衰矣樂盈而不抑損自止則流散矣故禮之減者報之而使進樂之盈者反之而使止使禮樂皆得其中焉故曰其義一也此章言樂以治心禮以治身禮易厭當自勉樂易縱當自抑補夫樂者樂也人情之所不能免也樂必發於聲音形於動靜人之道也聲音動靜性術之變盡於此矣故人不耐無樂樂不耐無形形而不為道不耐無亂先王恥其亂故制雅頌之聲以道之使其聲足樂而不流使其文足論而不息使其曲直繁瘠亷肉莭奏足以感動人之善心而已矣不使放心邪氣得接焉是先王立樂之方也是故樂在宗廟之中君臣上下同聽之則莫不和敬在族長鄉里之中長幼同聽之則莫不和順在閨門之內父子兄弟同聽之則莫不和親故樂者審一以定和比物以飾節節奏合以成文所以合和父子君臣附親萬民也是先王立樂之方也故聽其雅頌之聲志意得廣焉執其干戚習其俯仰詘伸容貌得莊焉行其綴兆要其節奏行列得正焉進退得齊焉故樂者天地之命中和之紀人情之所不能免也夫樂者先王之所以飾喜也軍旅鈇鉞者先王之所以飾怒也故先王之喜怒皆得其儕焉喜則天下和之怒則暴亂者畏之先王之道禮樂可謂盛矣耐古能字肉古如又反孔訓肥滿則如字讀比毗志反鈇方夫反又音甫聲音謂嗟嘆咏歌動靜謂手舞足蹈性術謂出於性術猶道路也盡於此者言過此則不可過則流放也耐古能字能則古之三台字文謂樂之篇章文足論而不息者言足以眀義理而無息也曲直者歌之曲折繁瘠亷肉者聲之鴻殺曲謂聲音回曲直謂聲音放直繁謂繁多瘠謂省約亷謂亷稜肉謂肥滿莭謂美之止奏謂樂之作聲音之宜或須繁多肉滿而鴻大或須瘠約廉稜而細少或莭或奏各得其宜使足以感動人之善心故放心邪氣不得接於性情矣審一以定和者詳審其聲以定調和之曲比物以飾莭者比八音之物以飾音曲之節命教也紀總要之名也儕猶輩類也此言樂出於人情故先王禮樂以感動人之善心以合和父子君臣而親附萬民故習其聲容者無不志意開廣而容貌莊嚴此樂者先王所以飾喜而天下和之先王之言禮樂可謂盛矣子贛見師乙而問焉曰賜聞聲歌各有宜也如賜者宜何歌也師乙曰乙賤工也何足以問所宜請誦其所聞而吾子自執焉愛者宜歌商溫良而能斷者宜歌齊夫歌者直已而陳德也動已而天地應焉四時和焉星辰理焉萬物育焉故商者五帝之遺聲也寬而靜柔而正者宜歌頌廣大而靜疏逹而信者宜歌大雅恭儉而好禮者宜歌小雅正直而靜亷而謙者宜歌風肆直而慈愛商之遺聲也商人識之故謂之商齊者三代之遺聲也齊人識之故謂之齊眀乎商之音者臨事而屢斷眀乎齊之音者見利而讓臨事而屢斷勇也見利而讓義也有勇有義非歌孰能保此故歌者上如抗下如隊曲如折止如稿木倨中矩句中鉤纍纍乎端如貫珠故歌之為言也長言之也説之故言之言之不足故長言之長言之不足故嗟歎之嗟歎之不足故不知手之舞之足之蹈之也子貢問樂贛音貢斷丁亂反上時掌反隊直愧反折之設反稿古老反倨音據句紀具反鉤古侯反説音恱師樂官乙其名也愛者宜歌商鄭氏謂肆直而慈愛者宜歌商今因錯簡將肆直而慈愛置於宜歌風之下反無所屬而此句愛者宜歌商亦闕其上文歌聲各隨人性所宜頌者形容其成功德澤𢎞厚故性之寬柔靜正者宜歌之大雅政之大者也故廣大疏逹者宜歌之小雅政之小者也故恭儉好禮者宜歌之風者動化一國繫一人之本故正直而守之以靜亷而守之以謙者宜歌之肆直而慈愛者宜歌商商蓋五帝之遺聲而商人識之奮決而眀厲商治之規模故眀乎其音則有決而不亂溫良而能斷者宜歌齊齊蓋三代之遺聲而齊人識之舒遲而嘽緩者齊俗之氣象故眀乎其音則見利而能讓其上如抗言其聲之發揚其下如隊言其聲之重濁其曲如折言其聲之回轉其止如稿木言其聲之止靜倨者居而不動有方之體故中矩句者屈而不直有曲之體故中鉤纍纍乎端正而連屬不絶故如貫珠既論歌之形狀復論歌之始終始於説而形於言終於不知手舞而足蹈子貢問樂蓋結上文而題其事此章載子貢問己所宜歌而師乙備陳頌雅國風與商聲齊聲之異以聽其自擇且極其形狀始終而言之師乙樂工而講肄之精若此蓋師摯之流而足以占先王之澤也補鄭氏移置錯簡從吾子自執焉以下請誦所聞而吾子自執焉寬而靜柔而正者宜歌頌廣大而靜疏逹而信者宜歌大雅恭儉而好禮者宜歌小雅正直而靜廉而謙者宜歌風肆直而慈愛者宜歌商溫良而能斷者宜歌齊夫歌者直已而陳德也動已而天地應焉四時和焉星辰理焉萬物育焉故商者五帝之遺聲也商人識之故謂之商元文愛字及商之遺聲也五字皆為衍文黃氏日抄卷二十一
