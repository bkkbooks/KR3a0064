body:
  text: 黃氏日抄卷十四宋黃震撰讀禮記一吳郡衛湜集禮記解自鄭康成而下得一百四十六家惟方氏馬氏陸氏有全書其餘僅解篇章凡講義論説嘗及之者皆取之以足其數其書浩瀚惟嚴陵郡有官本嶽公珂集解亦然皆未易遍觀天台賈蒙繼之始選取二十六家視衛嶽為要而其采取亦互有不同其書又惟儀真郡學有録本世罕得其傳今因并合各家所集而類抄之昔吕氏讀詩記簡要而文為姓氏所隔髙氏春秋集注文成一家而不知元注之姓氏為誰僣竊參用其法使諸家注文為一而各出姓氏於下方間亦節録或附己意然所謂存十一於千百不過老眼便於觀省後生志學之士自當求之各家全書云曲禮上第一曲禮曰毋不敬儼若思安定辭安民哉曲禮禮之細也所謂曲禮三千者也毋禁止辭主一之謂敬儼矜莊貌人之坐思貌必儼然安定審也哉歎美辭毋不敬正其心也儼若思正其貌也安定辭正其言也安民哉正己而物正也毋不敬總言主宰處儼若思敬之貌安定辭敬之言安民哉敬之效右本吕氏及晦庵説敖不可長欲不可從志不可滿樂不可極敖五報反樂音洛矜已凌物為敖逐物縱己為欲志指其虛大而言樂指其逸樂而言四者敖尤凶德敖不可長欲消而絶之也欲不可從欲窒而止之也志不可滿欲損而抑之也樂不可極欲約而歸於禮也四者皆克己之事克己始能復禮右本馬氏及戴氏説賢者狎而敬之畏而愛之愛而知其惡憎而知其善積而能散安安而能遷近而習之曰狎心服曰畏積謂蓄積散謂賙救安安謂己今安此之安遷謂圖後有患則不敢安今之安狎而敬之則交可久畏而愛之則情可親愛憎私情也善惡公義也不以一己之愛憎易天下之善惡故是是非非兩不相奪積而能散者以財發身安安而能遷者義之與比舊説謂君子之於賢者如此晦庵謂此正主賢者而言六句皆蒙賢者二字為文言唯賢者能之耳舊注非是臨財毋茍得臨難毋茍免很毋求勝分毋求多疑事毋質直而勿有難乃旦反分扶問反狠忿爭分所分之物初與人共者質謂臆決而果言之直謂理在我毋禁詞勿戒詞毋茍得見得思義也毋茍免見危授命也毋求勝懲忿毋求多平施疑事毋質闕疑也直而勿有者理雖在我一有恃直之心是亦好已勝故戒之也右本論語及胡氏説而補其餘若夫坐如尸立如齊禮從宜使從俗若夫發語辭尸謂祭祀之尸齊謂祭前之齊宜謂酌時之中以義起使謂使於他邦俗謂風俗不同坐如尸立如齊盡其敬也禮從宜使從俗適其時也古之君子律已甚嚴而酬酢萬物不為崖異之行右集吕氏戴氏説夫禮者所以定親疏決嫌疑别同異明是非也葉氏曰親疏位也嫌疑情也同異事也是非理也陳氏曰兩物相似為疑以此兼彼為嫌禮主乎辨參差而不齊疑似而難明可否而莫之定者皆取證於禮禮者理也右集戴氏費氏説禮不妄説人不辭費禮不踰節不侵侮不好狎説音悅妄説謂佞媚辭費如躁人之辭多節謂理之則不可過侵陵也侮慢也狎親褻也不妄説人説之以道不辭費辭達而已所以養其正大簡易不踰節不狎侮於人所以致其謹審莊敬右本毛氏葉氏應氏説修身踐言謂之善行行修言道禮之質也踐履也言道言合於道質猶本也言無不善身未必能行能修身以踐其言則善行矣行修而言合乎道言行相顧是為禮之質茍徒禮文外焉而已禮聞取於人不聞取人禮聞來學不聞往教取七樹反下如字取於人謂就師求道取人謂屈人從己禮聞取於人不聞取人主學者言禮聞來學不聞往教主教者言學者當屈己從人教者不當枉己就人右本吕氏説道德仁義非禮不成教訓正俗非禮不備分爭辨訟非禮不決君臣上下父子兄弟非禮不定宦學事師非禮不親班朝治軍涖官行法非禮威嚴不行禱祠祭祀供給鬼神非禮不誠不莊是以君子恭敬撙節退讓以明禮成謂節文以成之宦謂學為仕學謂學道藝求福曰禱求得曰祠撙有自抑之意此七者皆有待於禮恭敬明禮之實撙節明禮之文退讓明禮之用七者之禮必備此三者然後可明右吕氏説鸚鵡能言不離飛鳥猩猩能言不離禽獸今人而無禮雖能言不亦禽獸之心乎夫唯禽獸無禮故父子聚麀是故聖人作為禮以教人使人以有禮知自别於禽獸此章言人而無禮與禽獸無異所以甚言禮之不可無也聚麀父子之配無别補太上貴德其次務施報往而不來非禮也來而不往亦非禮也此章言世非太古人之交際不可無禮人有禮則安無禮則危故曰禮者不可不學也夫禮者自卑而尊人雖負販者必有尊也而况富貴乎富貴而知好禮則不驕不淫貧賤而知好禮則志不懾此章言有禮者能自立而以自卑為本負販者必有尊古者斑白不負戴於道路老者先而少者後老者輕而壯者重是負販者必有尊也况富貴之人乎人生十年曰幼學二十曰弱冠三十曰壯有室四十曰強而仕五十曰艾服官政六十曰耆指使七十曰老而傳八十九十曰耄七年曰悼悼與耄雖有罪不加刑焉百年曰期頥幼學陸農師點幼字為讀幼言時學言事也其餘弱壯強艾耆期字倣此艾髮蒼白色如艾也耆稽久之稱稽久而將入于老也指使指事使人也耄昏忘悼憐愛期者人生以百年為期頥養也晦庵曰期當音居宜反與期字同周匝之義也此章備舉自幼至老每十年一變之節每十年必異其名至其時必異其事自始至終未沒之前皆行道之日壯者服其勞老者安其逸未用者無躁進之心當退者無不知足之戒耄者敬而安之悼者矜而懷之孝弟之風形天下右吕氏方氏毛氏戴氏説大夫七十而致事若不得謝則必賜之几杖行役以婦人適四方乘安車自稱曰老夫於其國則稱名越國而問焉必告之以其制致事老而致其職事還於君几坐所慿杖行所扶安車坐乘小車越國而問謂有事越在他國他國問之也制法度此專為在官者言人君優老尚賢不許其謝事以几杖婦人安車安養其氣體在國及出皆得用之本鄭氏孔氏説謀於長者必操几杖以從之長者問不辭讓而對非禮也長丁丈反從就操執持長者處未必無几杖操以從之敬之至也少當問長今長者反問之不辭讓而對則非禮曽子曰參不敏辭讓也右吕氏説凡為人子之禮冬溫而夏凊昏定而晨省在醜夷不爭凊七性反醜衆也夷猶儕也人子事親之禮冬則溫之以禦其寒夏則凊之以辟其暑昏則定之以奠其居晨則省之以問其安此心常存雖在醜夷所以不爭蓋貴賤相臨則有畏憚等夷最易起爭而爭者危父母之事惟孝子頃刻不敢忘親雖易爭之地亦不爭也本方氏吕氏注夫為人子者三賜不及車馬故州閭鄉黨稱其孝也兄弟親戚稱其慈也僚友稱其弟也執友稱其仁也交遊稱其信也見父之執不謂之進不敢進不謂之退不敢退不問不敢對此孝子之行也三賜鄭氏按周禮一命受爵再命受服三命受車馬石林謂君賜無不受之理此蓋謂父之未為大夫者不受車馬不敢受大夫之位也叔孫婼叔孫豹之子也豹已死其四從兄季平子未三命而婼先之叔仲子曰婼三命踰父兄非禮也晦庵謂叔孫豹王賜之路豹以上卿無路而不敢乘疑此不及車馬亦受之而不敢用耳不敢受重賜者仁心也而五者備有焉五者之稱不同各以其所見言之也州閭鄉黨見其敬親故稱孝兄弟親戚尤切近見其愛故稱慈僚友與同處見其氣象和順故稱弟執友與同心知其孝心之本原故稱仁交遊泛交故見其信父執者父之同心見之進退問答不敢專焉况於父乎廣孝也右呂氏説夫為人子者出必告反必面所遊必有常所習必有業恆言不稱老為人親者無一念而忘其子故有倚門倚閭之望為人子者無一念而忘其親故有出告反面之禮有常有業緣親之意欲知之不敢自老恐傷親心也用戴氏説補年長以倍則父事之十年以長則兄事之五年以長則肩隨之羣居五人則長者必異席長以倍與吾父之年相若所以父事長十年與吾兄之年相若所以兄事肩隨者與之行而差退不敢與先生並行也出不可與並行居可與同席乎故羣居五人必推其長者異席以敬之古者地敷橫席容四人若五人會則推長者異席張氏馬氏孔氏為人子者居不主奧坐不中席行不中道立不中門食饗不為槩祭祀不為尸奧室之西南隅槩量也裁食饗之饌具尸祭祀代神居尊位奧中席皆尊者所居中道中門皆尊者所由為槩為尸皆尊者之事人子皆不敢當蓋無往不寓敬親之意邵氏應氏聽於無聲視於無形不登髙不臨深不茍訾不茍笑視聽於無聲形常若親之有教使然專心致志也登髙臨深危道也茍訾茍笑辱道也孝子常以父母為心故每事謹戒如此本鄭氏孔氏孝子不服暗不登危懼辱親也父母存不許友以死不有私財服事於暗冥之中為卒有非常許友以死雖父母不在亦不可蓋記禮者漢人雜取後世豪俠之言人子膚髮以上皆親之有豈敢私其財取鄭氏吕氏戴氏而補其餘為人子者父母存冠衣不純素孤子當室冠衣不純采純諸允反純緣也孤子謂年未三十雖除喪不忘哀鄭氏幼子常視母誑童子不衣裘裳立必正方不傾聽視今之示字常視無誑自幼習之正也童子體熱不宜著裘又應給役不便著裳故惟緇布襦袴未成人故服亦未備也立必正嚮一方不傾聽左右習之正其容也鄭氏孔氏吕氏長者與之提攜則兩手奉長者之手負劍辟咡詔之則掩口而對奉芳勇反辟匹亦反咡如志反鄭曰負謂置之於背劍謂挾之於旁辟咡詔之謂傾頭與語口旁曰咡吕曰負劍即佩劍或旁挾之如負劍然掩口避口氣就而攜之則捧其手近而詔之則掩口而對皆事長之禮馬氏從於先生不越路而與人言遭先生於道趨而進正立拱手先生與之言則對不與之言則趨而退從才用反先生齒長而有德之稱從之而不越路與人言一其敬也遭之而趨進拱立恐其有教令也與之言則對不與言則趨而退進退應答不敢專也馬氏吕氏從長者而上丘陵則必鄉長者所視登城不指城上不呼向長者所視敬長且備或有問也不指不呼為惑人本鄭氏戴氏説將適舍求毋固將上堂聲必揚户外有二屨言聞則入言不聞則不入將入户視必下入戶奉扄視瞻毋回户開亦開户闔亦闔有後入者闔而勿遂毋踐履毋踖席摳衣趨隅必慎唯諾聞音問踖在亦反唯于癸反舍主人家固固必之固單下曰履聞聲聞于外扄關户之木一云門扇上環鈕戴曰入户而扄墜則慢心實為之陸曰奉扄謂小啓之以兩手奉戶置扃處也踐踏踖躐隅角也唯應諾許也適舍求毋固隨主人有無上堂聲必揚警內言聞入視必下不干掩人之私奉扄敬也亦開亦闔不以後來變先闔而勿遂止作闔勢示不拒後入後入者不得踏先入者履不踖席者從下而升摳提前裳趨席下角慎唯諾者不先舉見問乃應鄭氏孔氏及黃氏説大夫士出入君門由闑右不踐閾闑門橛閾門限臣統於君故由闑右不敢為賔也不踐閾不敢履髙也孔子之於事君也立不中門行不履閾鄭氏馬氏凡與客入者每門讓於客客至於寢門則主人請入為席然後出迎客客固辭主人肅客而入主人入門而右客入門而左為席敷席也肅客俯手以揖之也及門而遜入及階而遜登交相辭遜退辟不皇於此乎可以觀禮矣主人就東階客就西階客若降等則就主人之階主人固辭然後客復就西階降等卑客也不敢亢禮故就主人階復就西階復其正鄭氏孔氏主人與客讓登主人先登客從之拾級聚足連步以上上於東階則先右足上於西階則先左足鄭曰拾當為涉聲之誤也吕曰拾更也拾級者左右足更上也射者拾發投壺者拾投哭踊者拾踊皆更為之也拾級聚足此等事但敬事自至如此非著心安排先右先左以相鄉為敬也橫渠及鄭氏説帷薄之外不趨堂上不趨執玉不趨堂上接武堂下布武室中不翔並坐不橫肱授立不跪授坐不立帷幔也薄簾也行而張足曰趨武迹也文上武下足在體下故曰武綏在冠下亦曰武接武謂迹相躡行而張拱曰翔凡見尊者以趨為敬帷薄之外不見尊者故不趨堂上迫近故不趨執玉虞失跌故不趨接武者行遲堂上不趨故接武布武者行速堂下必趨故布武室中不翔亦以迫也授立不跪為煩其俯本吕氏戴氏凡為長者糞之禮必加帚於箕上以袂拘而退其塵不及長者以箕自鄉而扱之為于偽反拘古侯反扱許急反除物之棄曰糞本作􅠜袂袖也扱斂取也鄭氏讀曰吸藍田吕氏曰扱謂箕扱於糞中以糞也讀如口扱以柶祭羊鉶之扱謂箕扱於糞如柶扱於鉶也加帚於箕得兩手捧箕謂初執往將糞時也以袂擁帚之前且掃且遷使塵不及長者謂糞時也以箕自向不以棄穢鄉長者謂收糞時也皆恭也人有血氣未有安於事人者古之童子未冠為長者役而安焉所以存其良心折其傲慢之氣然後可與進德矣鄭氏孔氏吕氏奉席如橋衡請席何鄉請衽何趾席南鄉北鄉以西方為上東鄉西鄉以南方為上橋居廟反鄉音向橋古之井上桔橰胡氏應氏謂即橋梁而衡即橫席坐席也衽卧席也鄉面也趾足也上謂席端也奉席如橋之衡左昻右低請席請衽順尊者所安坐問鄉坐為陽面亦陽也卧問趾卧為隂足亦隂也布席無常四方異鄉蓋堂室之面勢或不同故隨時之設張亦不一所以酌地宜也凡坐隨隂陽坐在陽則貴左坐在隂則貴右南坐是陽其左在西北坐是隂其右亦在西故南向北向皆以西為上東坐是陽其左在南西坐是隂其右亦在南故東向西向皆以南為上本鄭氏孔氏及應氏説若非飲食之客則布席席間函丈主人跪正席客跪撫席而辭客徹重席主人固辭客踐席乃坐函胡南反函容也文王世子云逺近間三席席三尺三寸三分之一則三席是一丈撫謂以手按止之再辭曰固辭席間函丈地寬足以揖遜回旋講授亦足以指書惟飲食之客欲便於勸酬而促近耳主人為客正席而客辭客徹主人所為客設之重席而主人辭客坐主人乃坐賔主之相敬如此合鄭氏孔氏應氏説而補其餘主人不問客不先舉將即席容毋怍兩手摳衣去齊尺衣毋撥足毋蹶齊音咨撥半末反蹶居衛反怍愧赧不安失之野也摳提挈齊謂裳下緝撥發揚貌蹶行遽貌客自外來主人宜先問客初就席顔色宜莊將就席時以兩手挈裳使起令裳下緝去地一尺恐衣長而躡履之也衣毋撥者收斂不使旁有觸也足毋蹶者不匆遽使之躓也本鄭氏孔氏呂氏説先生書䇿琴瑟在前坐而遷之戒勿越虛坐盡後食坐盡前坐必安執爾顔長者不及毋儳言正爾容聽必恭毋勦説毋雷同必則古昔稱先王盡津忍反儳仕鑒反勦初交反儳儳互不齊蓋雜之也勦攬取也則法也先生書䇿琴瑟或當已前跪坐而遷移之戒勿踰越虛坐必就其後之盡處欲其寬廣且不敢近前謙也食坐必就其前之盡處欲其親近且免濺汙席也坐毋動搖執守其顔長者言未及不得乘其未及而雜之惟正容而謹聽毋攬取其説毋雷同其説必法則古昔稱述先王勦説徇已雷同徇人惟古與稽可也取孔氏應氏説而補其餘侍坐於先生先生問焉終則對請業則起請益則起父召無諾先生召無諾唯而起諾者應之緩唯者應之速諾者許而未行唯恭於諾終則對不敢錯亂尊者之言也請業請益則起尊師重道也父召先生召皆無諾事師如事父也唯而起聞召即往也本鄭氏吕氏説侍坐於所尊敬毋餘席見同等不起燭至起食至起上客起燭不見跋尊客之前不叱狗讓食不唾見賢遍反跋半末反跋趾也毋餘席必盡其所近尊者之端見同等不起無二尊也燭至起未卜夜也食至起為盛饌變也上客起不敢專其席也五者于客侍所尊而言也燭不見跋將至跋而更示不厭倦也不叱狗嫌若風去之也不唾嫌有穢惡也三者于主人侍客而言也用鄭氏孔氏方氏説而補其餘侍坐於君子君子欠伸撰杖屨視日蚤莫侍坐者請出矣侍坐於君子君子問更端則起而對侍坐於君子若有告者曰少間願有復也則左右屏而待欠一斂反撰仕轉反莫音暮間音間志疲則欠體疲則伸撰持也間舊音間吕氏謂間隙也屏者退而自隱之謂欠伸撰杖屨瞻視庭影皆尊者倦而欲起故請出不敢勤君子也問更端起而對因事有所變而起其敬也人俟間而有復則屏以待不敢干其私也鄭氏孔氏呂氏毋側聽毋噭應毋淫視毋怠荒遊毋倨立毋跛坐毋箕寢毋伏斂髮毋髢冠毋免勞毋袒暑毋褰裳噭古弔反跛彼義反髢徒細反噭聲髙急也淫視睇盼也怠荒放散身體也跛謂挈舉一足一足踏地箕謂舒展兩足狀如箕舌髢髲也以纚韜之不使垂餘如髲也毋側聽頭容直毋噭應聲容靜毋淫視目容端毋怠荒氣容肅遊毋倨足容重立毋跛立如齊坐毋箕坐如尸斂髮毋髢冠毋免勞毋袒暑毋褰裳正其衣冠也人患徇其意之所安此於視聽遊行坐立卧起衣冠之際而自克蓋禮者筋骸之束也本呂氏遊氏説侍坐於長者屨不上於堂解屨不敢當階就屨跪而舉之屏於側向長者而屨跪而遷屨俯而納屨屨云解屨有繫也就猶著也解屨必屏於側取屨必隱辟納屨而向長者遷之必跪納之必俯則屨之脫納皆有儀矣陳氏離坐離立毋往參焉離立者不出中間兩相麗之謂離三相成之謂參併坐併立恐密有所論故戒往參預當已行路則避之不干人之私也男女不雜坐不同椸枷不同巾櫛不親授嫂叔不通問諸母不漱裳外言不入於梱內言不出於梱女子許嫁纓非有大故不入其門姑姊妹女子子已嫁而反兄弟弗與同席而坐弗與同器而食椸羊支反枷音嫁本又作架梱苦本反本又作閫椸可以枷衣者諸母謂父之諸妾有子者梱門限也纓女子許嫁繫纓以五采為之姑尊行姊妹同行女子子卑行已嫁而反不過是三等故舉以為言女子子重言子者鄭云别於男子胡氏謂云女子已别男子重云子者衍文也愚意重云子者豈又云女子之子乎若然則姑也姊妹也女子也女子之子也通四世廣言之矣凡皆逺别也父子不同席男女非有行媒不相知名非受幣不交不親故日月以告君齊戒以告鬼神為酒食以召鄉黨僚友以厚其别也取妻不取同姓故買妾不知其姓則卜之寡婦之子非有見焉弗與為友取七住反見賢遍反父子不同席尊卑異行而前後各席也男女有行媒至召鄉黨僚友重婚姻也取必問姓妾不知姓則卜重宗也寡婦之子非卓有著見弗友避嫌也賀娶妻者曰某子使某聞子有客使某羞羞進也昏禮有嗣代之序故不賀作記者因俗之名稱賀舍曰昏禮而謂之有客則所以羞者佐其具之費以待鄉黨僚友而已非賀也孔氏呂氏貧者不以貨財為禮老者不以筋力為禮不責人之所不能備不貴人之所不能行鄭氏名子者不以國不以日月不以隱疾不以山川為後人之難諱也男女異長男子二十冠而字父前子名君前臣名女子許嫁笄而字冠古亂反異長亦示别也字尊名卑男冠女笄皆成人而字惟君父之前則名凡進食之禮左殽右胾食居人之左羮居人之右膾炙處外醯醬處內蔥泄處末酒漿處右以脯修置者左朐右末胾則吏反炙章夜反泄以制反朐其俱反殽骨體也胾切肉也食飯屬也外內殽胾之外內也泄蒸蔥也屈中曰朐以中屈處置左以末邊處置右取右手便擘食也左右內外之設皆便手食因以寓隂陽之義骨是陽故在左肉是隂故在右飯燥為陽故在左羮濕是隂故居右呂氏孔氏客若降等執食興辭主人興辭於客然後客坐主人延客祭祭食祭所先進殽之序遍祭之三飯主人延客食胾然後辨殽主人未辨客不虛口飯符晚反辨音遍祭祭先食也食惟祭所先進殽則以次第皆祭之也客敵已者先祭降等則主人延之祭也三飯三食也禮三餐而告飽主人延客食胾然後辨殽也辨匝也虛口古謂食竟蕩口使清潔以水曰潄以酒曰酳酳音胤訓演廬陵胡氏謂主人食殽未遍客不空口爾非酳也此據卑客食至則必興辭以祭則不敢先舉以胾則不敢先嘗殽之遍則不敢先飽然客之謙惟恐先乎主人主人之厚於客惟恐有所不足雍容揖遜愛敬有餘孰得而少之哉用王氏侍食於長者主人親饋則拜而食主人不親饋則不拜而食凡稱侍者少賤之於其長毋敢視賔客親饋之則拜呂氏共食不飽共飯不澤手毋摶飯毋放飯毋流啜毋吒食毋齧骨毋反魚肉毋投與狗骨毋固獲毋揚飯飯黍毋以箸毋嚃羮毋絮羮毋刺齒毋啜醢客絮羮主人辭不能亨客啜醢主人辭以窶濡肉齒決乾肉不齒決毋嘬炙摶徒端反啜川悅反吒陟嫁反飯黍之飯扶晚反箸直慮反嚃他答反絮尺慮反刺七亦反嘬初怪反澤手捼莎也禮飯以手共飯而摩手人將惡之也放飯謂去其黏手餘飯拂放本器中也流啜謂開口大啜汁入口如水流貪肆而無容也吒食謂嫌薄之以口舌作聲也齧骨謂有聲且似嫌其食之無肉也反魚肉謂已厯口反還器中人所穢也投骨謂其賤飲食以人食而食獸也固獲謂與人共食專固而必得之也揚飯不待冷而揚去熱氣貪快也飯黍當以匕箸非所當用也嚃不嚼菜而啜吞之欲速而多又有聲也絮猶調謂就食器調足鹽梅呂氏謂讀如漂絮之絮玩之而不食必調飪失節故主人辭不能亨也刺齒取齒間之餘也醯味厚非可啜而啜之故主人辭以窶窶貧也言貧而不能備厚味也濡肉濕軟可齒決乾肉臘屬齒決則費力而失容也嘬謂一舉臠炙肉濡當嚌之反于俎若嘬則為貪食甚也凡與人共者必先人而後己厚人而薄己則不爭矣否則貪也犯人之所惡也薄主人之飲食也聲容之不敬也終食之間而小人之情狀畢見故君子於觴酒豆肉之間未嘗不致謙而養廉集呂氏遊氏馬氏説卒食客自前跪徹飯齊以授相者主人興辭於客然後客坐卒子恤反相息亮反齊將兮反卒食食己也齊醬菹通名相者主人贊饌之人興辭不聽其親徹侍飲於長者酒進則起拜受於尊所長者辭少者反席而飲長者舉未釂少者不敢飲釂子妙反尊所謂尊之所飲盡爵曰釂古之飲酒少者無不及故此侍飲者亦長者親酌授之然必長者卒爵然後飲呂氏長者賜少者賤者不敢辭此明凡受賜禮所謂不敢辭者義所可受不敢以辭之也禮有一辭再辭各稱其事孔氏呂氏賜果於君前其有核者懷其核御食於君所君賜餘器之溉者不寫其餘皆寫御食侍御也溉者謂陶梓之器寫謂傾於别器懷核嫌於棄尊者物也器之不可溉者傳己器中乃食之重汙君之器也其可溉滌者就器食訖滌以還君鄭氏孔氏呂氏餕餘不祭父不祭子夫不祭妻餕子閏反餕者食餘故不以祭先雖妻子至卑父與夫亦不以祭之也晦庵御同於長者雖二不辭偶坐不辭御侍也二重殽膳也侍食於長者而盛饌與同及因彼有賔而與之偶坐懼妨尊容皆不敢辭蓋本不為己設也用孔氏呂氏黃氏説羮之有菜者用挾其無菜者不用挾古協反梜箸也有菜謂鉶羮無菜謂大羮湆也直啜之而已鄭氏為天子削瓜者副之巾以絺為國君者華之巾以綌為大夫纍之士疐之庶人齕之為于為反副普逼反華古瓜反纍力果反疐音帝齕恨沒反副四析之既削又四析之而巾覆焉華中裂之不四析纍倮也謂去其皮不巾覆疐謂脫華處去其疐而已齕以口此削瓜等級亦以辨上下也微之不敢忽所以為大之必謹也呂氏戴氏父母有疾冠者不櫛行不翔言不惰琴瑟不御食肉不至變味飲酒不至變貌笑不至矧怒不至詈疾止復故食肉多則變味齒本曰矧大笑則見孝子之事親也病則致其憂不櫛不翔憂不為容也不惰憂而知謹也不御憂不在樂也不變味變貌憂不在飲食也不矧不詈憂常在心而動有節也疾止則憂散皆如故矣用鄭氏説有憂者側席而坐有喪者專席而坐側席坐不安也專席不與人共坐也吕氏水潦降不獻魚鱉獻鳥者佛其首畜鳥者則勿佛也獻車馬者執䇿綏獻甲者執胄獻杖者執末獻民虜者執右袂獻粟者執右契獻米者操量鼓獻孰食者操醬齊獻田宅者操書致畜許六反操七刀反量音亮齊子兮反佛戾也為小竹籠以冒之使喙不害人畜養也畜鳥馴故勿佛執與操皆謂手所舉以告䇿馬杖綏登車之繩車馬不上於堂䇿綏易呈呈之則知有車馬也甲鎧也名甲者言如龜鱉之有甲也胄兜鍪也甲大胄小小者易舉故執以呈杖之末者地有坌汙故自執之且便於受獻者之執民虜謂征伐所獲右袂右邊袖也左手操其右袂右手以防其異心粟稻粱之屬未為米者右契契合同之物以右為上左契無用所以老子云執左契以涖天下故獻人以右契量斗斛之數量鼓器名容十二斛米可即食為急故獻者執量粟可久儲為緩故獻者執契醬與齊所用以食書致謂圖書於板丈尺委曲書之而致於尊者獻田宅者然也水潦降魚鱉易得不必獻則獻魚鱉必視其時也獻鳥者佛其首畜者勿佛則獻鳥必視其性也獻車馬獻甲獻粟獻米獻食獻田宅此六者皆不可手執則執一物以舉其要也集吕氏陳氏説凡遺人弓者張弓尚筋弛弓尚角右手執簫左手承弣尊卑垂帨若主人拜則客還辟辟拜主人自受由客之左接下承弣鄉與客並然後受遺于貴反弣音撫辟之辟扶亦反辟拜之辟音避敵體相贈曰遺弓張之時向內筋在上弓身曲向下弛之時反張向外筋在曲內角在曲外弓身亦曲向下弓有弛張遺人者皆令其下曲隤然順簫弓頭頭稍剡差邪似簫故謂簫又謂鞘簫鞘聲相近右執簫客覆右手執弓下頭也弣弓把把音霸以左手承中央之把使受者便於執也帨佩巾垂帨至地授受之儀尊卑皆稍罄折故皆垂帨也還辟猶逡巡退卻也辟拜不答執弓不得拜也受由客之左尚右以尊賔也接下承弣下就客所承之弣敬受之也鄉並客然後受敵體相遺皆南鄉也射以觀德故弓之授受必謹為禮者親其勞而不以勞施於人躬其辱而不以辱及於人受賤受惡而以貴者善者委於人以不安者自與而以安者與人惟其如此則可事上事長事君親事師友可以羣居可以行世邵氏遊氏進劒者左首進戈者前其鐏後其刃進矛戟者前其鐓進几杖者拂之效馬效羊者右牽之效犬者左牽之執禽者左首飾羔鴈者以繢受珠玉者以掬受弓劍者以袂飲玉爵者弗揮凡以弓劍苞苴簞笥問人者操以受命如使之容鐏在困反鐓其對反繢胡對反苴子于反進者以物供尊上之用效者呈見於尊上之前而非進也問者問安否因有物遺之以表其意首謂劒鐶客在右主人在左劍以首為尊以尊處進之也戈鉤子戟也刃當頭而利故不以向人鐏在前而鈍向人為敬矛如鋋而三廉戟兩邊皆安橫刃鐓矛戟柄尾以平向人敬也鋭底曰鐏平底曰鐓拂者去其塵馬羊多力人右手亦有力故用右手牽制之犬吠囓故左牽而右手防禦之大曰犬未成毫為狗禽首陽也故左其首謂橫捧之主人在左而以鳥首授之飾覆也繢畫也畫布為雲氣以覆羔鴈為飾掬手中受珠玉以掬恐墜落也受弓劒者不露首取之承以衣袂玉爵玉杯也揮振去餘酒弗揮為其寶而脆苞以草苞裹魚肉苴以草藉器而貯物簞盛食笥盛衣裳皆竹器使受命而往將操以遺人先習其威儀進退如使之容進兵者後其刃敬也效物者細别其宜一物必有一宜也自飾羔鴈至飲玉爵又敘其飾物之文也終而總之曰凡以弓劒苞苴簞笥問人舉其凡以該上文所列之目也集呂氏應氏説凡為君使者已受命君言不宿於家君言至則主人出拜君言之辱使者歸則必拜送于門外若使人於君所則必朝服而命之使者反則必下堂而受命受君命而不宿於家主將君命者而言君言至而拜受拜送主被君命者而言使人於君所而拜送拜受主臣下使人於君所者而言三者不同而敬君命之心一也補博聞強識而讓敦善行而不怠謂之君子君子不盡人之歡不竭人之忠以全交也多能而守之以謙篤行而繼之以勤君子之成德如此故能不盡人之歡不竭人之忠以全其交反已常若不足則與人常能有餘也補禮曰君子抱孫不抱子此言孫可以為王父尸子不可以為父尸為君尸者大夫士見之則下之君知所以為尸者則自下之尸必式乘必以几齊者不樂不弔乘繩證反禮曰述舊禮語也此言作記者釋舊禮之言也王父祖也尸祭時代神者也神主之位東向尸在神主之北下下車也式車中俯首處也車箱長四尺四寸而三分之前一後二橫一木下去車牀三尺三寸謂之式於式上二尺二寸橫一木謂之較較去車牀五尺五寸乘車者立則慿較有所敬則俯而慿式几者所慿以養安尸之乘車則用之齊者祭之前散齋七日致齋三日齊一其心以交神明也孫與祖同昭穆昭與穆間一世祖昭則孫亦昭祖穆則孫亦穆故孫為祖之尸孫幼亦抱之為尸尸在車則君與大夫士皆下之尸在車以式為敬几為安齊者不樂不弔不以憂樂動其齊之志也本孔氏吕氏説居喪之禮毁瘠不形視聽不衰升降不由阼階出入不當門隧居喪之禮頭有創則沐身有瘍則浴有疾則飲酒食肉疾止復初不勝喪乃比於不慈不孝五十不致毁六十不毁七十惟衰麻在身飲酒食肉處於內隧音遂創初良反瘍音羊勝音升衰七雷反形謂毁瘠而骨見隧道也致極也不形不衰毁不滅性也升階出入常若親存沐浴飲酒食肉皆以權制否而不勝喪則比於不慈不孝矣不致毁以下皆所以養老人人五十始衰也集鄭氏呂氏説補其餘生與來日死與往日與猶數也一曰許也猶期也生與來日三日成服以死之來日為始生者之事也死與往日如三日而殯以死之日為始死者之事也孔氏吕氏知生者弔知死者傷知生而不知死弔而不傷知死而不知生傷而不弔人恩各施其所知也鄭氏弔喪弗能賻不問其所費問疾弗能遺不問其所欲見人弗能館不問其所舍惡口惠而實不至也王氏賜人者不曰來取與人者不問其所欲非所以惠人之道也吕氏適墓不登壟助葬必執紼臨喪不笑揖人必違其位望柩不歌入臨不翔當食不歎鄰有喪舂不相里有殯不巷歌適墓不歌哭日不歌送喪不由徑送葬不辟塗潦臨喪則必有哀色執紼不笑臨樂不歎介胄則有不可犯之色故君子戒慎不失色於人紼音弗臨力鴆反相息亮反辟音避壟冢紼引棺索相送杵聲介甲雜記吉凶舉動威儀之事各有攸當鄭氏馬氏國君撫式大夫下之大夫撫式士下之撫猶據也乘車而俯慿式者示敬也下下車也下車之敬重於慿式所敬遞降一等用呂氏説禮不下庶人刑不上大夫刑人不在君側庶人愚且賤不可以待君子之事責之大夫賢且貴不可以待小人之法辱之故制禮自士始而大夫有罪則議以八法刑人而在君側輕身之道也呂氏兵車不式武車綏旌德車結旌建戈刃曰兵車取威猛曰武車皆謂革路德車謂玉路金路象路木路旌車上旗幡綏垂舒之結收斂之兵車不式猶介胄不拜尚威也發揚者武之事故旌之垂曳象之斂藏者德之事故旌之收結象之遊氏吕氏史載筆士載言前有水則載青旌前有塵埃則載鳴鳶前有車騎則載飛鴻前有士師則載虎皮前有摯獸則載貔貅載音戴史國史筆書具士史之有司有司藏書故載言以備討論師行宜警衛人衆難傳道前有變異則為物色旌旗之上舉類示之使為之戒載謂建之於車孔氏呂氏方氏行前朱雀而後玄武左青龍而右白虎招搖在上急繕其怒進退有度左右有局各司其局繕古音徑行師行也朱雀玄武青龍白虎四方宿名以是四物畫之于旗立于軍之左右前後以象天體之周旋招搖北斗第七星指四方之宿不差者軍中舉之以指正四方旗本並作七星而獨云招搖者舉指者為主也急繕其怒者作而致其怒進止有法部分不亂孔氏呂氏父之仇弗與共戴天兄弟之仇不反兵交遊之仇不同國不反兵謂常執殺之備不待反家取兵此論親疏復仇之法謂無故而殺人者君誅之君誅之不得則子報之子報之不得則兄弟報之兄弟報之不得交遊報之報兄弟之仇則殺於父報交遊之仇又殺於兄弟各稱其情義也遊氏呂氏四郊多壘此卿大夫之辱也地廣大荒而不治此亦士之辱也壘軍壁此明食其祿所宜任其事孔氏臨祭不惰祭服敝則焚之祭器敝則埋之龜策敝則埋之牲死則埋之凡祭於公者必自徹其俎祭主敬故不惰祭器祭服以其嘗用於鬼神不敢褻用故埋焚之祭服人所御故焚器惟鬼神所用故埋祭於公者助君祭自徹俎者不敢勤君之職事張氏呂氏卒哭乃諱禮不諱嫌名二名不偏諱逮事父母則諱王父母不逮事父母則不諱王父母諱辟也卒哭乃諱敬鬼神之名也嫌名聲相近死而不諱則安忍而忘親二名而均諱則易犯而難辟卒哭而諱所以盡愛敬之心不諱嫌不偏諱所以適言語之便父之所諱子亦諱之故逮事父母則諱王父母本陳氏呂氏説君所無私諱大夫之所有公諱詩書不諱臨文不諱廟中不諱夫人之諱雖質君之前臣不諱也婦諱不出門大功小功不諱入竟而問禁入國而問俗入門而問諱竟音境質猶對也無私諱有公諱尊歸於君也詩書臨文不諱為其失事正也廟中有事於髙祖則不諱曽祖呂氏謂君前臣名父前子名也婦諱不出門故夫人之諱雖對君之前亦不諱也大功小功之親不諱恩殺也問禁問俗問諱皆為敬主人也集鄭氏呂氏外事以剛日內事以柔日凡卜筮日旬之外曰逺某日旬之內曰近某日喪事先逺日吉事先近日外事郊外之事內事郊內之事剛日甲丙戊庚壬陽日也柔日乙丁己辛癸隂日也卜用龜筮用蓍吉事人情之所欲故先近日喪事人事之所不忍故先逺日集孔氏馬氏曰為日假爾泰龜有常假爾泰筮有常卜筮不過三卜筮不相襲龜為卜策為筮卜筮者先聖王之所以使民信時日敬鬼神畏法令也所以使民決嫌疑定猶與也故曰疑而筮之則弗非也日而行事則必踐之踐古作善今如字曰為日而下命龜筮辭假因也爾指蓍龜也泰大中之大也褒美龜筮為泰也有常言吉凶不僭也不過三不敢瀆鬼神也不相襲不敢疑鬼神也猶與皆獸名二獸進退多疑人之多疑者似之故謂之猶與弗非無非之者日而行事則必踐之者卜日而行事則必踐用其日集鄭氏陳氏呂氏説君車將駕則僕執䇿立於馬前已駕僕展軨效駕奮衣由右上取二綏跪乘執策分轡驅之五步而立君出就車則僕并轡授綏左右攘辟車驅而騶至于大門君撫僕之手而顧命車右就車門閭溝渠必步軨力丁反乘繩證反并必政反辟扶亦反騶仕救反僕御車者也執䇿立馬前監駕車也展省視也軨轄頭轊也效白於君也二綏者僕登車授綏有二正綏君所執以登車二綏則御與車右所執以登車也跪乘者僕試車時君未出未敢依常而立故跪也執策分轡者御者六轡在手今以一手執馬杖以三轡置空手中以三轡置杖手中也驅之五步調試之也并轡授綏者并六轡置一手中以一手取正綏授君使登車也左右攘辟君登車而使左右從者避之也車驅而騶者君已登車而行左右疾趨從之也至大門而君撫止御者令車右登車車右勇力之士立車之右以衛君備非常者也門閭必步防衝突溝渠必步防傾仆步者古謂車右至此下車而步新安王氏謂馬緩行為步僕御君車其節有五將駕車執策立馬前一也已駕展軨效駕二也先上車執䇿分轡驅之五步三也君出就車并轡授綏四也車至大門君撫僕手顧命車右就車五也呂氏凡僕人之禮必授人綏若僕者降等則受不然則否若僕者降等則撫僕之手不然則自下拘之拘古侯反僕人為人御車也故授登車者以綏然必御者降等乃受若敵體則主人宜謙而不敢受其綏又御者雖降等亦必撫其手少止之示若不敢受以示謙若敵體不受而御者必以授則當卻手從御者手下自拘取之示終不敢受也用孔氏説客車不入大門婦人不立乘犬馬不上於堂大門最外之正門客車不入大門敬主人也婦人不立乘從安也犬馬不上於堂賤畜也呂氏故君子式黃髮下卿位入國不馳入里必式式黃髮敬老也下卿位尊賢也入國不馳馳則人不得而辟也入里必式先人之居在焉也合鄭氏呂氏説君命召雖賤人大夫士必自御之奉君命而召雖所召者賤使者當親御之橫渠介者不拜為其拜而蓌拜蓌子卧反蓌猶言有所枝拄謂著甲而拜不利屈伸也晦庵祥車曠左乘君之乘車不敢曠左左必式祥車葬之乘車曠左空神位也乘君之車者王者五輅君乘其一餘四輅皆臣下乘之不敢曠左君存惡空其位也左必式不敢安君之位也集孔氏呂氏馬氏説僕御婦人則進左手後右手御國君則進右手後左手而俯進左後右使形微相背逺嫌也進右後左以相向而俯以敬也合鄭氏孔氏説國君不乘竒車車上不廣咳不妄指立視五巂式視馬尾顧不過轂國中以䇿彗恤勿驅塵不出軌竒居宜反巂惠圭反彗音遂勿音沒竒車竒邪不正之車廣咳髙聲大咳驕矜驚衆巂規也車輪轉一周為巂策彗策取竹帚帶葉者晦庵云疑謂策之彗若今時鞭末韋帶耳今從其説蓋未必國中别易一策之帶竹葉者也恤勿搔摩狀謂以策微近馬體不欲令疾軌車轍也不廣咳為驕矜不妄指為惑衆立視五巂不至於逾逺式視馬尾不至於逼下顧不過轂不掩後人之私驅車恤勿不使塵飛示國中以氣象間暇也集孔氏方氏而補其餘國君下齊牛式宗廟大夫士下公門式路馬乘路馬必朝服載鞭策不敢授綏左必式步路馬必中道以足蹙路馬芻有誅齒路馬有誅齊側皆反齊牛祭牲也路馬君之馬也步路馬習之也齒謂量其年誅罰也君敬宗廟臣敬君乘路馬步路馬教敬蹙其芻誅齒其年誅預逺不敬補曲禮下第二凡奉者當心提者當帶奉芳勇反奉者承以二手提者挈以一手奉必仰手當心提必屈臂當帶執天子之器則上衡國君則平衡大夫則綏之士則提之綏音妥衡謂與心平上衡則髙於心彌敬綏之謂下於心提之又在綏之下人愈貴則執其器愈恭方氏凡執主器執輕如不克執主器操幣圭璧則尚左手行不舉足車輪曳踵立則罄折垂佩主佩倚則臣佩垂主佩垂則臣佩委主器君之器也尚左手以為容以右手在下防失墜也車輪曳踵不舉足而如車輪之曳地而行也罄折身曲折如磬也倚謂佩附於身小俯則垂大俯則委於地此明持奉手足之儀及授受時禮臣常愈恭於君也本鄭氏孔氏執玉其有藉者則裼無藉者則襲左袒曰裼掩而不開曰襲玉之用雖殊其有藉則一禮言有藉則裼無藉則襲何也玉有以繅為藉有以束帛為藉繅藉所以飾之束帛藉所以將之此説特施於束帛之藉裼者尚文與有藉相稱襲者尚質與無藉相稱用馬氏説補國君不名卿老世婦大夫不名世臣姪娣士不名家相長妾卿老上卿也世婦謂兩媵次於夫人貴於諸妾世臣父時老臣姪妻之兄女娣妻之妹皆從妻來為妾者家相助知家事者長妾士有二妾長妾當為娣臣妾之長者不名别貴賤也蓋以禮敬之而不敢慢呂氏君大夫之子不敢自稱曰豫小子大夫士之子不敢自稱曰嗣子某不敢與世子同名國君與大夫之子不敢稱豫小子避嗣天子之稱也大夫與士之子不敢稱嗣子避嗣諸侯之稱也不與諸侯之世子同名避僭倣也王氏呂氏鄭氏君使士射不能則辭以疾言曰某有負薪之憂射男子之事古者人人能之偶不能則以疾辭不敢以不能辭負薪賤者事士云者謙辭言疾而憂無力負薪用呂氏范氏補侍於君子不顧望而對非禮也顧望坐中不敢率爾先對孔氏君子行禮不求變俗祭祀之禮居喪之服哭泣之位皆如其國之故謹修其法而審行之因其俗之故常而行禮則不煩而易為力所謂國之故者言其故之所自來皆有祖述特在乎謹修其法而審行之使不失其故爾遊氏去國三世爵祿有列於朝出入有詔於國若兄弟宗族猶存則反告於宗後去國三世爵祿無列於朝出入無詔於國唯興之日從新國之法有列於朝謂已雖去國已久而君不絶其祖祀復立其後也詔猶告謂與卿大夫凶吉往來猶赴告也宗後大宗之後有事反告于後不忘親也興謂起為卿大夫若本國已無列無詔亦必仕於新國而後從新國之制厚之至也皆所以重其本也用鄭氏孔氏説君子已孤不更名已孤暴貴不為父作諡名父所命已孤更之不忍也諡者列平生德行作美號暴貴不為父諡者子事父無貴賤忽為父諡似鄙父賤非所以敬親也合鄭氏孔氏呂氏説居喪未葬讀喪禮既葬讀祭禮喪復常讀樂章居喪不言樂祭事不言凶公庭不言婦女各於其時鄭氏振書端書於君前有誅倒策側龜於君前有誅振去塵也端正也策有本末故曰倒龜有背面故曰側皆謂甫省視之臣不豫事皆宜誅責孔氏龜策几杖席蓋重素袗絺綌不入公門苞屨扱衽厭冠不入公門書方衰凶器不以告不入公門苞白表反扱初洽反厭於涉反衰七雷反龜策嫌問國家吉凶几杖嫌自長老席所以坐蓋所以禦日與雨皆燕安之具重素衣裳皆素袗單也袗絺綌肉露見為不敬故不入公門苞藨也扱上衽孝子未成服之飾厭猶伏也吉冠有纚有梁而喪冠無之曰厭冠皆喪具也故不入公門書謂條録送死之物用方板書之曰書方衰謂喪服凶器謂棺凡謂臣妾有死於宮者不告於君則不以入公門公事不私議公事公言補君子將營宫室宗廟為先廏庫為次居室為後凡家造祭器為先犧賦為次養器為後無田祿者不設祭器有田祿者先為祭服君子雖貧不粥祭器雖寒不衣祭服為宮室不斬於丘木養羊尚反粥音育衣於既反家造大夫始造家事也犧賦古注謂以稅出牲胡氏謂總言牲爾竊意養犧牲所賦用之器具故總於家造次於祭器歟粥賣也丘冢也言禮者必以祭祀為先營宫室者必以宗廟為先造器者必以祭器為先始有田祿者必以祭服為先此言富貴首念祖先不粥祭器不衣祭服不斬丘木此言雖貧亦堅忍而不敢違祖先用呂氏説補大夫士去國祭器不踰竟大夫寓祭器於大夫士寓祭器於士覬已復還鄭氏大夫士去國踰竟為壇位鄉國而哭素衣素裳素冠徹緣鞮屨素簚乘髦馬不蚤鬋不祭食不説人以無罪婦人不當御三月而復服緣悅絹反鞮都兮反簚莫厯反髦音毛蚤音爪鬋子淺反鞮屨無絇之菲絇求俱反絇之言拘用繪一寸屈之著屨為行戒也素簚以白狗皮為覆笭也髦馬不鬄落也蚤讀為爪治手足爪也鬋剔治鬚髮也大夫士失位去國無祿以祭故以喪禮處之為壇位而哭衣冠裳以素輿馬不飾食不祭內不御心喪之禮也以己無罪而説於人則君有罪矣君子不忍為厚之至也呂氏大夫士見於國君君若勞之則還辟再拜稽首君若迎拜則還辟不敢答拜辟婢亦反還辟逡巡也嫌與君亢賔主之禮鄭氏大夫士相見雖貴賤不敵主人敬客則先拜客客敬主人則先拜主人相見貴於相下相下貴於相先馬氏凡非弔喪非見國君無不答拜者大夫見於國君國君拜其辱士見於大夫大夫拜其辱同國始相見主人拜其辱君於士不答拜也非其臣則答拜之大夫於其臣雖賤必答拜之男女相答拜也非弔喪及見國君凡拜皆答又惟非其臣及男女則相答拜國君春田不圍澤大夫不掩羣士不取麛卵麛鹿子此明貴賤田獵不同皆禁盡物位愈卑者禁愈嚴春方字乳之時尤在所禁孔氏方氏歲凶年穀不登君膳不祭肺馬不食穀馳道不除祭事不縣大夫不食粱士飲酒不樂縣音玄膳美食名盛食必祭周人重肺故先祭肺馳道如今御路除謂除治草萊也縣樂器鐘磬之屬縣之而擊者也粱加食也大夫食黍稷以粱為加不祭肺不殺也不食穀芻秣而已也不除道為妨民示簡省也祭不縣食不加粱雖飲酒而不用樂凡謂君大夫士皆為嵗凶自貶損憂民也合鄭氏孔氏説君無故玉不去身大夫無故不徹縣士無故不徹琴瑟玉謂佩縣謂樂故謂災患喪病憂樂不相干鄭氏士有獻於國君他日君問之曰安取彼再拜稽首而后對大夫私行出疆必請反必有獻士私行出疆必請反必告君勞之則拜問其行拜而后對私行謂以己事問其行謂道中無恙及所經過雖士有獻皆所以達臣子共養君親之誠必請必告猶子於親出必告反必面止言告者不必有獻也君勞問必拜亦起敬也吕氏陳氏鄭氏國君去其國止之曰奈何去社稷也大夫曰奈何去宗廟也士曰奈何去墳墓也國君死社稷大夫死衆士死制衆謂軍帥制謂君教令所使為之臣民各止其君使勿去忠厚之至也以社稷宗廟墳墓為言者皆指其所本也君之有社稷受命於天子大夫之衆士之制受命於君故皆以死守之吕氏君天下曰天子朝諸侯分職授政任功曰豫一人踐阼臨祭祀內事曰孝王某外事曰嗣王某臨諸侯畛於鬼神曰天王某甫畛之忍反畛古注致也吕氏曰畛於鬼神猶畦畛之相接然言交際也方氏畛蓋田間道祭於畛謂之畛猶祭於郊謂之郊蓋若巡守望秩山川也君天下曰天子言天無所不覆也朝見諸侯分人以職授人以政任人以功曰豫一人謙抑自卑猶言孤與寡人也內事宗廟故云孝外事郊社故云嗣某為天子名鬼神在諸侯竟內天子不親祀曰天王某甫者有司不敢名君也吕氏孔氏崩曰天王崩復曰天子復矣告喪曰天子登假措之廟立之主曰帝假音遐復始死時招魂辭遐逺也吕曰假至也猶詩謂來假莊子亦云登假於道先儒以假為遐音恐未然也立主曰帝同之天神鄭氏吕氏天子未除喪曰豫小子生名之死亦名之適嗣於初喪未忍即受天王之稱生死皆名之曰小子王孔氏吕氏天子有后有夫人有世婦有嬪有妻有妾后後也廣後嗣也后以配天子夫扶也扶持於君也夫人視三公故名與諸侯之妃同婦服也服事君子也世婦視大夫故名與大夫妻同妻齊也進御有齊同之義也御妻視元士故名與士之妻同嬪婦人美稱九嬪於昏義視九卿位在世婦上此在世婦下者異代之制也妾接也得接見於君子也孔氏吕氏天子建天官先六大曰大宰大宗大史大祝大士大卜典司六典天子之五官曰司徒司馬司空司士司冦典司五衆天子之六府曰司土司木司水司草司器司貨典司六職天子之六工曰土工金工石工木工獸工草工典制六材五官致貢曰享此殷制也殷人尚神大宗以下皆事鬼神奉天時之官總謂之天官大宰代天工者也大宗掌事鬼神者也大史掌正歲年者也大祝所以接神大士即周之司巫所以降神大卜主問龜所以求神者也又置地官以象地之五行司徒之衆六鄉六遂也司馬之衆六軍也司空之衆百工也司冦之衆士師司𨽻也司士於周為夏官之屬此别出司士為一官以掌羣臣之版及卿大夫庶子之數所統亦衆也而承之以六府六工則變化養吾民者莫不備矣六府與藏六者之入六工飭六者之材以為器貢功也享獻也嵗終則司徒以下五官各致其功以獻於王故謂之享然則六府六工皆屬於五官者也用鄭氏吕氏劉氏之説補五官之長曰伯是職方其擯於天子也曰天子之吏天子同姓謂之伯父異姓謂之伯舅自稱於諸侯曰天子之老於外曰公於其國曰君伯長也二伯為內外官之長雖主治諸侯而處於內是職方者言二伯於是職主當方之事如周公左召公右各主治其方也二伯即唐虞之四嶽此云五官之長曰伯是職方者乃殷人之制猶周官立三公三孤於六卿之上者也擯者傳辭於天子之人吏者治事之稱謙辭也天子謂之伯父伯舅尊辭也老者年長之稱亦謙辭也公以爵稱君以位稱內外之辨也用孔氏方氏吕氏而補其餘九州之長入天子之國曰牧天子同姓謂之叔父異姓謂之叔舅於外曰侯於其國曰君每一州之中天子選諸侯之賢者以為之牧牧養也言能養一州之人實一州之長也內之長五官者統為之長外之長九州者各為之長稱曰叔父叔舅次於內之伯也侯其本爵君其臨本國之稱集鄭氏孔氏方氏之説其在東夷北狄西戎南蠻雖大曰子於內自稱曰不穀於外自稱曰王老此謂九州之外之長也故雖疆域之大爵不過子自稱不穀者謙辭穀猶長也不稱寡人辟中國諸侯也自稱王老榮中國之命以鎮乎四夷也鄭氏呂氏劉氏庶方小侯入天子之國曰某人於外曰子自稱曰孤亦九州之外也以其非長故曰庶方以其非大故曰小侯於外曰子者稱之以爵出外則伸故也自與其臣民言曰孤孤者特立無德能之稱謙辭也用方氏孔氏説葉氏以為附庸恐非恐附庸不自達於天子亦無子男之爵天子當依而立諸侯北面而見天子曰覲天子當寧而立諸公東面諸侯西面曰朝依於豈反見賢遍反寧珍呂反依狀如屏風以絳為質髙八尺東西當户牖之間繡為斧文亦曰斧依依即扆也寧者正門內兩孰間曰寧於門外寧立以待諸侯之至故曰寧寧即著也當依而立秋覲也秋主揫斂故入而當依諸侯一於北面不布散也當寧而立春朝也春主發散故出而當寧公侯分於東西布散兩處也公位尊故立於西以賔禮待也侯位卑立於東臣統於君也孔氏陳氏方氏虙氏諸侯未及期相見曰遇相見於郤地曰會諸侯使大夫問於諸侯曰聘約信曰誓涖牲曰盟郤丘逆反郤謂竟上間郤之地會於此不以病主國之人也遇不期而會其禮略會期而會其禮詳久無事則聘聘問也誓約之淺盟約之深盟非治世事也凡皆諸侯交鄰之禮以言春秋之世本孔氏呂氏方氏説諸侯見天子曰臣某侯某其與民言自稱曰寡人臣君前之稱上某指國言下某指名言臣某侯某如曰臣齊侯小白也寡人寡德之人謙辭用孔氏呂氏説其在凶服曰適子孤臨祭祀內事曰孝子某侯某外事曰曽孫某侯某適音的適子明其嗣孤明在喪外事謂社稷山川曽孫謂是父祖重孫孔氏呂氏死曰薨復曰某甫復矣既葬見天子曰類見言諡曰類復曰某甫呼其字以招魂冀復生也既葬見天子與請諡皆曰類以非朝聘之常故謂之類如祀天而非郊者曰類于上帝之類故古注以類為象本陳氏説諸侯使人使於諸侯使者自稱曰寡君之老使於使者並色吏反老以年長稱比於家臣之長亦謙詞本呂氏説天子穆穆諸侯皇皇大夫濟濟士蹌蹌庶人僬僬濟子禮反蹌七良反僬子妙反穆穆雍容深厚貌濟濟修飾齊一貌蹌蹌翔舉舒揚貌僬僬卑盡而不為容止之貌凡行容尊者重且舒卑者輕且遽呂氏天子之妃曰后諸侯曰夫人大夫曰孺人士曰婦人庶人曰妻妃芳非反妃配也諸侯以下通有配義故以妃字冠之后有君道夫人有為小君而人事之義孺言屬婦言服妻言齊合孔氏方氏説公侯有夫人有世婦有妻有妾夫人自稱於天子曰老婦自稱於諸侯曰寡小君自稱於其君曰小童自世婦以下自稱曰婢子子於父母則自名也公侯貶於天子無后與嬪去上中降殺以兩自稱於天子謂畿內諸侯之夫人助祭若時事見自稱於諸侯謂饗來朝之時小童若云未成人婢之言卑於父母自名似亦主婦人而言名自幼名父母所名故不敢有他稱用鄭氏呂氏説補列國之大夫入天子之國曰某士自稱曰陪臣某於外曰子於其國曰寡君之老使者自稱曰某陪重也天子臣諸侯諸侯臣大夫故諸侯之大夫於天子曰陪臣某士之某國名也某士如云晉士起也外謂他國使者自稱曰某以其為陪臣之使故所稱如此孔氏陳氏呂氏方氏天子不言出諸侯不生名君子不親惡諸侯失地名滅同姓名此春秋傳凡例之説而漢儒祖之於春秋經不盡合補愚按趙鵬飛春秋僖公二十五年衛侯燬滅邢解云春秋滅同姓者有矣未嘗名楚子虔蔡侯殺之此非同姓何以反名春秋書名自有褒貶非謂滅同姓也且書滅其惡自著而同姓非同姓後世自辨不在書名而後知此傳授之誤而後世沿之曲禮遂曰諸侯失地名滅同姓名蓋小戴禮多漢儒雜説其書出於三傳之後有援春秋三傳而立文者如王制稱東夷北狄西戎南蠻雖大曰子彼見吳楚之強春秋皆書子爾而北燕在北狄秦本西戎何以書伯此附春秋以立文而不合者一也曲禮稱諸侯失地名彼見穀伯綏來朝鄧侯吾離來朝傳曰失地之君也而郕伯來奔郜子來朝傳亦曰失地之君何以不名此附三傳以立文而不合者二也又稱天子不言出彼見天子居于狄泉不書出而天王出居于鄭何以書出此附春秋以立文而不合者三也又曰諸侯不生名彼見蔡侯考父鄭伯寤生之類皆卒而稱名而衛侯朔鄭伯突何以未死而書名此附春秋而不合者四也又曰諸侯未及期相見曰遇彼見傳釋書遇之説曰遇者不期也而公會衛侯于桃丘弗遇亦可謂未及期乎又曰相見於郤地曰會彼春秋之會無常地因曰郤地而會于齊于宋亦郤地乎况春秋會遇非治世之禮非周禮所謂因朝而會遇者也特侯度不謹時出以謀其私而豈可以春秋諸侯會遇為法哉此附春秋而不合者五也其他固不殫舉今衛燬滅邢而曲禮舉以為典訓又誤之大者為人臣之禮不顯諫三諫而不聽則逃之子之事親也三諫而不聽則號泣而隨之君臣義合不可則去父子天合不可逃號泣而隨以冀改悟鄭氏孔氏君有疾飲藥臣先嘗之親有疾飲藥子先嘗之醫不三世不服其藥慎疾也擬人必於其倫擬魚起反擬猶比倫猶類不以其類則褻鄭氏問天子之年對曰聞之始服衣若干尺矣問國君之年長曰能從宗廟社稷之事矣幼曰未能從宗廟社稷之事也問大夫之子長曰能御矣幼曰未能御也問士之子長曰能典謁矣幼曰未能典謁也問庶人之子長曰能負薪矣幼曰未能負薪也若干數未定之辭孔氏謂若如也干求也言事不定常如此求之也方氏謂干猶數也數其多少故曰干方約其數故曰若御射御之御古注以為主其事典謁典主請謁天子不可斥言故言衣之長短則知其年之長幼國君以下皆言其能凡皆謂幼小新立逺人未知而有問者設本鄭氏呂氏孔氏問國君之富數地以對山澤之所出問大夫之富曰有宰食力祭器衣服不假問士之富以車數對問庶人之富數畜以對數色主反畜許六反有宰謂有采邑之宰食力謂食民之賦稅數地以對山澤所出蓋國君制賦有常惟山澤所産無常故數其所出以對曰有宰見其不親猥務曰食力見其不爭民利曰祭器衣服不假見其不侈於奉己而厚於奉先士以車數見命賜之厚庶人數畜見畜牧之勤君子不茍於求富問對之間有深意寓焉應氏天子祭天地祭四方祭山川祭五祀歲遍諸侯方祀祭山川祭五祀歲遍大夫祭五祀歲遍士祭其先四方句芒在東祝融后土在南蓐收在西玄冥在北方祀各祀其方五祀春祭户夏祭竈季夏祭中霤秋祭門冬祭行凡祭有其廢之莫敢舉也有其舉之莫敢廢也非其所祭而祭之名曰淫祀淫祀無福謹常祀而毋瀆禮陳氏天子以犧牛諸侯以肥牛大夫以索牛士以羊豕索於白反犧純毛肥養於滌索求得而用之以肥則不必犧索取具而已又不必肥以羊豕者或以羊或以豕鄭氏方氏説補滌養牲官也支子不祭祭必告于宗子所以嚴宗廟合族屬呂氏凡祭宗廟之禮牛曰一元大武豕曰剛鬛豚曰腯肥羊曰柔毛雞曰翰音犬曰羮獻雉曰疏趾曰明視脯曰尹祭稿魚曰商祭鮮魚曰脡祭水曰清滌酒曰清酌黍曰薌合粱曰薌萁稷曰明粢稻曰嘉蔬韭曰豐本鹽曰鹹鹺玉曰嘉玉幣曰量幣腯徒忽反翰戶旦反脡他頂反量音亮元頭也武迹也腯充貌也翰音飛鳴也羮獻者犬下牲其形聲不足言羮之而獻則犬之肥也疏趾者雉肥則兩足疏開也明視者肥則目開而視明也自牛至八物皆取其肥尹祭者脯裁截方正而用之尹正也商祭者乾魚商度燥濕得中而用之稿乾也脡祭者鮮魚煮熟直陳之也合言氣萁言幹粢言實蔬言苗大鹹曰鹺量者度量禽獸之獻以肥腯為美魚臘鮮稿以得宜為美水與酒以清潔為美黍稷稻粱以馨香明潔為美韭以苗之盛為美鹽以味之厚為美玉以不瑕為美幣以可制為美祝辭皆舉其美而言言於物不敢不盡呂氏天子死曰崩諸侯曰薨大夫曰卒士曰不祿庶人曰死在牀曰尸在棺曰柩音舊崩者若天形墜下之名薨者崩之餘聲卒終也全而歸之之義不祿傷其不幸之辭死之言澌精神澌盡死本尊卑之所同尊者嫌褻而異其名至庶人窮矣不可有異名而直曰死尸陳也柩究也合鄭氏孔氏呂氏説羽鳥曰降四足曰漬死冦曰兵降落也鳥飛物死則降落漬謂相染漬而死兵者死於冦難之稱祭王父曰皇祖考王母曰皇祖妣父曰皇考母曰皇妣夫曰皇辟婢亦反王父祖父也王母祖母也皇君也尊之有君道考成也言德行之成也妣比於考辟法夫者妻所取法也生曰父曰母曰妻死曰考曰妣曰嬪壽考曰卒短折曰不祿折市設反嬪婦人有法度者之稱蚤死曰短中絶曰折生主親死主敬老而死則盡也少而死不幸用陳氏補天子視不上於夾不下於帶國君綏視大夫衡視士視五步凡視上於面則敖下於帶則憂傾則姦夾音劫綏音妥夾交領也綏視下於面上於夾衡視平面視以下為柔天子至尊故臣視之目不過夾國君則上於夾大夫平視士則可旁視五步凡視仰則敖俯則憂傾則心不正鄭氏禮氏君命大夫與士肄在官言官在府言府在庫言庫在朝言朝肄以二反肄習也言議也官公家府凡府庫武庫朝朝廷肄習所行之事各有其處志無所分政無不舉鄭氏陳氏呂氏朝言不及犬馬輟朝而顧不有異事必有異慮故輟朝而顧君子謂之固在朝言禮問禮對以禮朝者人臣早見君之稱受朝之所必有廷故謂之朝廷固謂野陋朝言惟在政朝事惟敬在君朝言無所不用禮本呂氏鄭氏説大饗不問卜不饒富大饗冬至日祀天夏至日祭地日月素定故不問卜掃地而祭陶匏桔席故不饒富用呂氏説方氏謂饗賔客葉氏謂饗明堂凡摯天子鬯諸侯圭卿羔大夫鴈士雉庶人之摯匹童子委摯而退野外軍中無摯以纓拾矢可也婦人之摯椇榛脯修棗栗摯音至匹依注音鶩鴨也椇俱羽反摯至也以物告至也鬯釀黑黍為酒芬芳調暢也圭者玉有圭有璧圭鋭以象天之用璧圓以象天之體諸侯惟公侯伯用圭不言璧該之也纓馬纓拾射韝矢箭也椇白石李脯曝肉修肉加薑桂乾之天子無客禮惟用鬯於鬼神以告至諸侯執圭朝王及相朝聘以表至羔羊羣而不黨卿執之鴈飛翔有列大夫執之雉以死守士執之匹為鶩鶩不能飛騰庶人執之童子之摯束修委而退不與成人為禮也野外軍中或纓或拾或矢隨所有婦人惟初嫁有摯以見舅姑椇榛取其循法度脯修取其治己齊家棗栗取其夙夜在公而謹肅禮云無辭不相接也無禮不相見也欲民之無相瀆也故貴至於邦君賤至於庶人以至婦人童子相見不依贄不足以為禮贄而不稱德不足以為義鄭氏呂氏禮氏孔氏納女於天子曰備百姓於國君曰備酒漿於大夫曰備掃灑掃悉報反灑所買反姓之言生也天子皇后以下百二十人廣子姓也不敢以伉儷自期願備媵妾之數謙辭也於諸侯惟酒食是議於大夫願為箕帚妾愈降愈自卑備者備其乏凡皆致女於人之辭鄭氏孔氏呂氏方氏黃氏日抄卷十四
