body:
  text: 黄氏日抄卷二十八宋黄震撰讀禮記十五大學第四十二程氏謂大學乃孔子遺書初學入徳之門無如大學者至晦庵先生表章四書遂以大學為稱首然其詮次皆與記禮元書不同明道以康誥曰以後釋明字新字止字者聨於首章明徳新民止至善三語之下然後及古之欲明明徳一章又然後以所謂誠意以後節節釋之伊川移古之欲明明徳一章於前然後及康誥曰一章至晦庵先生定為大學章句亦與程氏微不同自脩身一章以後程氏無移易者今悉仍舊而今舉世之所誦習者惟章句也謹先鈔記禮本文以存古昔然後抄章句於其後以便誦習云大學之道在明明徳在親民在止於至善知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得物有本末事有終始知所先後則近道矣古之欲明明徳於天下者先治其國欲治其國者先齊其家欲齊其家者先脩其身欲脩其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物物格而后知至知至而后意誠意誠而后心正心正而后身脩身脩而后家齊家齊而后國治國治而后天下平自天子以至於庶人壹是皆以脩身為本其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也此謂知本此謂知之至也所謂誠其意者毋自欺也如惡惡臭如好好色此之謂自謙故君子必慎其獨也小人閒居為不善無所不至見君子而後厭然揜其不善而著其善人之視己如見其肺肝然則何益矣此謂誠於中形於外故君子必慎其獨也曾子曰十目所視十手所指其嚴乎富潤屋徳潤身心廣體胖故君子必誠其意詩云瞻彼淇澳菉竹猗猗有斐君子如切如磋如琢如磨瑟兮僩兮赫兮喧兮有斐君子終不可諠兮如切如磋者道學也如琢如磨者自脩也瑟兮僩兮者恂慄也赫兮喧兮者威儀也有斐君子終不可諠兮者道盛徳至善民之不能忘也詩云於戱前王不忘君子賢其賢而親其親小人樂其樂而利其利此以沒世不忘也康誥曰克明徳大甲曰顧諟天之明命帝典曰克明峻徳皆自明也湯之盤銘曰茍日新日日新又日新康誥曰作新民詩曰周雖舊邦其命惟新是故君子無所不用其極詩云邦畿千里惟民所止詩云緡蠻黄鳥止于丘隅子曰於止知其所止可以人而不如鳥乎詩云穆穆文王於緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知本所謂脩身在正其心者身有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正心不在焉視而不見聽而不聞食而不知其味此謂脩身在正其心所謂齊其家在脩其身者人之其所親愛而辟焉之其所賤惡而辟焉之其所畏敬而辟焉之其所哀矜而辟焉之其所敖惰而辟焉故好而知其惡惡而知其美者天下鮮矣故諺有之曰人莫知其子之惡莫知其苖之碩此謂身不脩不可以齊其家所謂治國必先齊其家者其家不可教而能教人者無之故君子不出家而成教於國孝者所以事君也弟者所以事長也慈者所以使衆也康誥曰如保赤子心誠求之雖不中不逺矣未有學養子而后嫁者也一家仁一國興仁一家讓一國興讓一人貪戾一國作亂其機如此此謂一言僨事一人定國堯舜率天下以仁而民從之桀紂率天下以暴而民從之其所令反其所好而民不從是故君子有諸己而后求諸人無諸己而后非諸人所蔵乎身不恕而能喻諸人者未之有也故治國在齊其家詩云桃之夭夭其葉蓁蓁之子于歸宜其家人宜其家人而後可以教國人詩云宜兄宜弟宜兄宜弟而後可以教國人詩云其儀不忒正是四國其為父子兄弟足法而後民法之也此謂治國在齊其家所謂平天下在治其國者上老老而民興孝上長長而民興弟上恤孤而民不倍是以君子有絜矩之道也所惡於上毋以使下所惡於下毋以事上所惡於前毋以先後所惡於後毋以從前所惡於右毋以交於左所惡於左毋以交於右此之謂絜矩之道詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父母詩云節彼南山維石巖巖赫赫師尹民具爾瞻有國者不可以不慎辟則為天下僇矣詩云殷之未喪師克配上帝儀監于殷峻命不易道得衆則得國失衆則失國是故君子先慎乎徳有徳此有人有人此有土有土此有財有財此有用徳者本也財者末也外本内末争民施奪是故財聚則民散財散則民聚是故言悖而出者亦悖而入貨悖而入者亦悖而出康誥曰惟命不于常道善則得之不善則失之矣楚書曰楚國無以為寳惟善以為寳舅犯曰亡人無以為寳仁親以為寳秦誓曰若有一介臣斷斷兮無他技其心休休焉其如有容焉人之有技若已有之人之彦聖其心好之不啻若自其口出寔能容之以能保我子孫黎民尚亦有利哉人之有技媢嫉以惡之人之彦聖而違之俾不通寔不能容以不能保我子孫黎民亦曰殆哉唯仁人放流之迸諸四夷不與同中國此謂唯仁人為能愛人能惡人見賢而不能舉舉而不能先命也見不善而不能退退而不能逺過也好人之所惡惡人之所好是謂拂人之性菑必逮夫身是故君子有大道必忠信以得之驕泰以失之生財有大道生之者衆食之者寡為之者疾用之者舒則財恒足矣仁者以財發身不仁者以身發財未有上好仁而下不好義者也未有好義其事不終者也未有府庫財非其財者也孟獻子曰畜馬乗不察於雞豚伐氷之家不畜牛羊百乗之家不畜聚歛之臣與其有聚歛之臣寧有盗臣此謂國不以利為利以義為利也長國家而務財用者必自小人矣彼為善之小人之使為國家菑害並至雖有善者亦無如之何矣此謂國不以利為利以義為利也右禮記元本大學章句序大學之書古之大學所以教人之法也盖自天降生民則既莫不與之以仁義禮智之性然其氣質之禀或不能齊是以不能皆有以知其性之所有而全之也一有聰明睿智能盡其性者出於其間則天必命之以為億兆之君師使之治而教之以復其性此伏羲神農黄帝堯舜所以繼天立極而司徒之職典樂之官所由設也三代之隆其法寖備然後王宫國都以及閭巷莫不有學人生八嵗則自王公以下至於庶人之子弟皆入小學而教之以灑掃應對進退之節禮樂射御書數之文及其十有五年則自天子之元子衆子以至公卿大夫元士之適子與凡民之俊秀皆入大學而教之以窮理正心脩己治人之道此又學校之教大小之節所以分也夫以學校之設其廣如此教之之術其次第節目之詳又如此而其所以為教則又皆本之人君躬行心得之餘不待求之民生日用彛倫之外是以當世之人無不學其學焉者無不有以知其性分之所固有職分之所當為而各俛焉以盡其力凡古昔盛世所以治隆於上俗美於下而非後世之所能及也及周之衰賢聖之君不作學校之政不脩教化陵夷風俗頽敗時則有若孔子之聖而不得君師之位以行其政教於是獨取先王之法誦而傳之以詔後世若曲禮少儀内則弟子職諸篇固小學之支流餘裔而此篇者則因小學之成功以著大學之明法外有以極其規模之大而内有以盡其節目之詳者也三千之徒盖莫不聞其說而曽氏之傳獨得其宗於是作為傳義以發其意及孟子沒而其傳泯焉則其書雖存而知者鮮矣自是以来俗儒記誦詞章之習其功倍於小學而無用異端虚無寂滅之教其髙過於大學而無實其他權謀術數一切以就功名之說與夫百家衆技之流所以惑世誣民充塞仁義者又紛然雜出於其間使其君子不幸而不得聞大道之要其小人不幸而不得蒙至治之澤晦盲否塞反覆沉痼以及五季之衰而壊亂極矣天運循環無往不復宋徳隆盛治教休明於是河南程氏兩夫子出而有以接乎孟氏之傳實始尊信此篇而表章之既又為之次其簡編發其歸趣然後古者大學教人之法聖經賢傳之指粲然復明於世雖以熹之不敏亦幸私淑而與有聞焉顧其為書猶頗放失是以忘其固陋采而輯之間亦竊附己意補其闕畧以俟後之君子極知僣踰無所逃罪然於國家化民成俗之意學者脩己治人之方則未必無小補云淳熈己酉二月甲子新安朱熹序大學大舊音泰今讀如字朱熹章句子程子曰大學孔氏之遺書而初學入徳之門也於今可見古人為學次第者獨賴此萹之存而論孟次之學者必由是而學焉則庶乎其不差矣大學之道在明明徳在親民在止於至善程子曰親當作新大學者大人之學也明明之也明徳者人之所得乎天而虚靈不昧以具衆理而應萬事者也但為氣禀所拘人欲所蔽則有時而昬然其本體之明則有未甞息者故學者當因其所發而遂明之以復其初也新者革其舊之謂也言既自明其明徳又當推以及人使之亦有以去其舊染之汚也止者必至於是而不遷之意至善則事理當然之極也言明明徳新民皆當至於至善之地而不遷盖必其有以盡夫天理之極而無一毫人欲之私也此三者大學之綱領也或問在明明徳在親民在止於至善曰天道流行發育萬物其所以為造化者隂陽五行而已而所謂隂陽五行者又必有是理而後有是氣及其生物則又必因是氣之聚而後有是形故人物之生必得是理然後有以為徤順仁義禮智之性必得是氣然後有以為魂魄五蔵百骸之身周子所謂無極之真二五之精妙合而凝者正謂是也然以其理而言之則萬物一原固無人物貴賤之殊以其氣而言之則得其正且通者為人得其偏且塞者為物是以或貴或賤而不能齊也彼賤而為物者既梏於形氣之偏塞而無以充其本體之全矣唯人之生乃得其氣之正且通者而其性為最貴故其方寸之間虚靈洞徹萬理咸備盖其所以異於禽獸者正在於此而其所以可為堯舜而能參天地以賛化育者亦不外焉是則所謂明徳者也然其通也或不能無清濁之異其正也或不能無美惡之殊故其所賦之質清者智而濁者愚美者賢而惡者不肖又有不能同者必其上智大賢之資乃能全其本體而無少不明其有不及乎此則其所謂明徳者已不能無蔽而失其全矣况乎又以氣質有蔽之心接乎事物無窮之變則其目之欲色耳之欲聲口之欲味鼻之欲臭四肢之欲安佚所以害乎其徳者又豈可勝言也哉二者相因反覆深固是以此徳之明日益昏昧而此心之靈其所知者不過情欲利害之私而已是則雖曰有人之形而實何以逺於禽獸雖曰可以為堯舜而參天地而亦不能有以自充矣然而本明之體得之於天終有不可得而昧者是以雖其昏蔽之極而介然之頃一有覺焉則即此空隙之中而其本體已洞然矣是以聖人施教既已養之於小學之中而後開之以大學之道其必先之以格物致知之說者所以使之即其所養之中而因其所發以唘其明之之端也繼之以誠意正心脩身之目者則又所以使之因其已明之端而反之於身以致其明之之實也夫既有以唘其明之之端而又有以致其明之之實則吾之所得於天而未甞不明者豈不超然無有氣質物欲之累而復得其本體之全哉是則所謂明明徳者而非有所作為於性分之外也然其所謂明徳者則又人之所同得而非有我之得私也向也俱為物欲之所蔽則其賢愚之分固無以大相逺者今吾既幸有以自明矣則視彼衆人之同得乎此而不能自明者方且甘心迷惑沒溺於卑汚茍賤之中而不自知也豈不為之惻然而思有以救之哉故必推吾所自明者以及之始於齊家中於治國而終及於平天下使彼有是明徳而不能自明者亦皆有以自明而去其舊染之汚焉是則所謂新民者而亦非有所付畀増益之也然徳之在已而當明與其在民而當新者則又皆非人力之所為而吾之所以明而新之者又非可以私意茍且而為也是其所以得之於天而見於日用之間者固已莫不各有本然一定之則程子所謂以其義理精微之極有不可得而名者故姑以至善目之而傳所謂君之仁臣之敬子之孝父之慈與人交之信乃其目之大者也衆人之心固莫不有是而或不能知學者雖或知之而亦鮮能必至於是而不去此為大學之教者所以慮其禮雖粗復而有不純已雖粗克而有不盡且將無以盡夫脩己治人之道故必指是而言以為明徳新民之標的也欲明徳而新民者誠能求必至是而不容其少有過不及之差焉則其所以去人欲而復天理者無毫髮之遺恨矣大抵大學一篇之指總而言之不出乎八事而八事之要總而言之又不出乎此三者此愚所以斷然以為大學之綱領而無疑也知止而后有定定而后能静静而后能安安而后能慮慮而后能得后與後同後放此止者所當止之地即至善之所在也知之則志有定向静謂心不妄動安謂所處而安慮謂處事精詳得謂得其所止或問此章曰此推本上文之意言明徳新民所以止於至善之由也盖明徳新民固皆欲其止於至善然非先有以知夫至善之所在則不能有以得其所當止者而止之如射者固欲其中夫正鵠然不先有以知其正鵠之所在則不能有以得其所當中者而中之也知止者物格知至而於天下之事皆有以知其至善之所在是則吾所當止之地也能知所止則方寸之間事事物物皆有定理矣理既有定則無以動其心而能静矣心既能静則無所擇於地而能安矣能安則日用之間從容間暇事至物来有以揆之而能慮矣能慮則随事觀理極深研㡬無不各得其所止之地而止之矣其間四節盖亦推言其所以然之故有此四者非實有等級之相懸為終身經歴之次序也物有本末事有終始知所先後則近道矣明徳為本新民為末知止為始能得為終本始所先末終所後此結上文兩節之意古之欲明明徳於天下者先治其國欲治其國者先齊其家欲齊其家者先脩其身欲脩其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物治平聲後倣此明明徳於天下者使天下之人皆有以明其明徳也心者身之所主也誠實也意者心之所發也實其心之所發欲其一於善而無自欺也致推極也知猶識也推極吾之知識欲其所知無不盡也格至也物猶事也窮至事物之理欲其極處無不到也此八者大學之條目也或問此章曰此言大學之序其詳如此盖綱領之條目也格物致知誠意正心脩身者明明徳之事也齊家治國平天下者新民之事也格物致知所以求知至善之所在自誠意以至於平天下所以求得夫至善而止之也所謂明明徳於天下者自明其明徳而推以新民使天下之人皆有以明其明徳也人皆有以明其明徳則各誠其意各正其心各脩其身各親其親各長其長而天下無不平矣然天下之本在國故欲平天下者必先有以治其國國之本在家故欲治國者必先有以齊其家家之本在身故欲齊家者必先有以脩其身至於身之主則心也一有不得其本然之正則身無所主雖欲勉强以脩之亦不可得而脩矣故欲脩身者必先有以正其心而心之所發則意也一有私欲雜乎其中而為善去惡或有未實則心為所累雖欲勉强以正之亦不可得而正矣故欲正心者必先有以誠其意若夫知則心之神明妙衆理而宰萬物者也人莫不有而或不能使其表裏洞然無所不盡則隠微之間真妄錯雜雖欲勉强以誠之亦不可得而誠矣故欲誠意者必先有以致其知致者推致之謂如喪致乎哀之致言推之而至於盡也至於天下之物則必各有所以然之故與其所當然之則所謂理也人莫不知而或不能使其精粗隠顯究極無餘則理所未窮知必有蔽雖欲勉强以致之亦不可得而致矣故致知之道在乎即事觀理以格夫物格者極至之謂如格于文祖之格言窮之而至其極也此大學之條目聖賢相傳所以教人為學之次第至為纎悉物格而后知至知至而后意誠意誠而后心正心正而后身脩身脩而后家齊家齊而后國治國治而后天下平治去聲後倣此物格者物理之極處無不到也知至者吾心之所知無不盡也知既盡則意可得而實矣意既實則心可得而正矣脩身以上明明徳之事也齊家以下新民之事也物格知至則知所止矣意誠以下則皆得所止之序也或問此章曰此覆說上文之意也物格者事物之理各有以詣其極而無餘之謂也理之在物者既詣其極而無餘則知之在我者亦随所詣而無不盡矣知無不盡則心之所發能一於理而無自欺矣意不自欺則心之本體物不能動而無不正矣心得其正則身之所處不至陷於所偏而無不脩矣身無不脩則推之天下國家亦舉而措之耳豈外此而求之智謀功利之末哉愚按晦庵之說既行異端之辯交起皆所不問惟以格物為格去外物其説本於大賢温公或者宗之以格闘為證後學不能無疑愚謂格之義皆至也格于皇天上至於天也格汝舜舜来至於前也七旬有苗格有苖至于中國也惟先格王先王有極至之徳也若格闘云者亦正以兩人親手而闘彼此擊刺皆至其身非有間隔其間故謂之格安得以格闘為格去外物之證哉若曰格去外物當用間隔不當用感格之格武夷胡氏既以格為格式廬陵胡氏又以格有三義謹按格式之格亦以法制於是而極所謂規矩方圓之至也一以論語有恥且格為證不思格乃感格與吾無間隔是亦至也自天子以至於庶人壹是皆以脩身為本壹是一切也正心以上皆所以脩身也齊家以下則舉此而錯之耳其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也本謂身也所厚謂家也此兩節結上文兩節之意右經一章葢孔子之言而曽子述之凡二百五字其傳十章則曽子之意而門人記之也舊本頗有錯簡今因程子所定更考經文别為序次如左凡千五百四十六字凡傳文雜引經傳若無統紀然文理接續血脉貫通深淺始終至為精密熟讀詳味久當見之今不盡釋也康誥曰克明徳康誥周書克能也大甲曰顧諟天之明命大讀作泰諟古是字大甲商書顧謂常目在之也諟猶此也或曰審也天之明命即天之所以與我而我之所以為徳者也常目在之則無時不明矣帝典曰克明峻徳峻書作俊帝典堯典虞書峻大也皆自明也結所引書皆言自明己徳之意右傳之首章釋明明徳此通下三章至止於信舊本誤在没世不忘之下湯之盤銘曰茍日新日日新又日新盤沐浴之盤也銘名其器以自警之辭也茍誠也湯以人之洗濯其心以去惡如沐浴其身以去垢故銘其盤言誠能一日有以滌其舊染之汚而自新則當因其已新者而日日新之又日新之不可畧有間斷也康誥曰作新民鼓之舞之之謂作言振起其自新之民也詩曰周雖舊邦其命惟新詩大雅文王之篇言周國雖舊至文王能新其徳以及於民而始受天命也語録曰新民之極和天命也新是故君子無所不用其極自新新民皆欲止於至善也右傳之二章釋新民或問謂盤銘言自新也康誥言新民也文王之詩自新新民之極也極即至善之云也詩云邦畿千里惟民所止詩商頌𤣥鳥之篇邦畿王者之都也止居也言物各有當止之處也詩云緡蠻黄鳥止于丘隅子曰於止知其所止可以人而不如鳥乎緡詩作綿詩小雅綿蠻之篇緡蠻鳥聲丘隅岑蔚之處子曰以下孔子說詩之辭言人當知所當止之處也詩云穆穆文王於緝熈敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信於緝之於音烏詩文王之篇穆穆深逺之意於歎美辭緝繼續也熈光明也敬止言其無不敬而安所止也引此而言聖人之止無非至善五者乃其目之大者也學者於此究其精微之藴而又推類以盡其餘則於天下之事皆有以知其所止而無疑矣詩云瞻彼淇澳菉竹猗猗有斐君子如切如磋如琢如磨瑟兮僴兮赫兮喧兮有斐君子終不可諠兮如切如磋者道學也如琢如磨者自脩也瑟兮僴兮者恂慄也赫兮喧兮者威儀也有斐君子終不可諠兮者道盛徳至善民之不能忘也澳於六反菉詩作緑猗叶韻音阿僴下版反喧詩作咺諠詩作諼並况晩反恂鄭氏讀作峻詩衛風淇澳之篇淇水名澳隈也猗猗美盛貌興也斐文貌切以刀鋸琢以椎鑿皆裁物使成形質也磋以鑢鐋磨以沙石皆治物使其滑澤也治骨角者既切而復磋之治石玉者既琢而復磨之皆言其治之有緒而益致其精也瑟嚴密之貌僴武毅之貌赫喧宣著盛大之貌諠忘也道言也學謂講習討論之事自脩者省察克治之功恂慄戰懼也威可畏也儀可象也引詩而釋之以明明明徳者之止於至善道學自脩言其所以得之之由恂慄威儀言其徳容表裏之盛卒乃指其實而歎美之也詩云於戱前王不忘君子賢其賢而親其親小人樂其樂而利其利此以沒世不忘也於戱音烏呼樂音洛詩周頌烈文之篇於戯歎辭前王謂文武也君子謂其後賢後王小人謂後民也此言前王所以新民者止於至善能使天下後世無一物不得其所所以既沒世而人思慕之愈久而不忘也此兩節咏歎滛泆其味深長當熟玩之右傳之三章釋止於止善此章内自引淇澳詩以下舊本誤在誠意章下子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知本猶人不異於人也情實也引夫子之言聖人能使無實之人不敢盡其虚誕之辭盖我之明徳既明自然有以畏服民之心志故訟不待聽而自無也觀於此言可以知本末之先後矣右傳之四章釋本末此章舊本誤在止於信下或問謂此章之下有闕文焉此謂知本程子曰衍文也此謂知之至也此句之上别有闕文此特其結語耳右傳之五章盖釋格物致知之義而今亡矣此章舊本通下章誤在經文之下間嘗竊取程子之意以補之曰所謂致知在格物者言欲致吾之知在即物而窮其理也盖人心之靈莫不有知而天下之物莫不有理惟於理有未窮故其知有不盡也是以大學始教必使學者即凡天下之物莫不因其已知之理而益窮之以求至乎其極至於用力之久而一旦豁然貫通焉則衆物之表裏精粗無不到而吾心之全體大用無不明矣此謂物格此謂知之至也愚按大學自二程先生更定至晦庵先生章句益精矣獨所謂傳之四章自聽訟吾猶人以下釋本末云下有闕文傳之五章釋致知云上有闕文是以功夫次第大備之間猶有文字闕失未滿之恨也辛酉嵗見董丞相槐行實載此章謂經本無闕文此特錯簡之釐正未盡者矣首章明徳新民至善三句綱領之下即繼以欲明明徳以下條目八事之詳此經也自知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得物有本末事有終始知所先後則近道矣此謂知本子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知本此謂知之至也右正係釋致知在格物不待别補今錯在首章三句之下耳所謂誠其意者毋自欺也如惡惡臭如好好色此之謂自謙故君子必慎其獨也好惡上字皆去聲謙讀為慊苦刼反誠其意者自脩之首也毋者禁止之辭自欺云者知為善以去惡而心之所發有未實也慊快也足也獨者人所不知而已所獨知之地也言欲自脩者知為善以去其惡則當實用其力而禁止其自欺使其惡惡則如惡惡臭好善則如好好色皆務决去而求必得之以自快足於己不可徒茍且以徇外而為人也然其實與不實盖有他人所不及知而已獨知之者故必謹之於此以審其㡬焉小人閒居為不善無所不至見君子而后厭然揜其不善而著其善人之視己如見其肺肝然則何益矣此謂誠於中形於外故君子必慎其獨也閒音閑厭鄭讀為黶閒居獨處也厭然銷沮閉蔵之貌此言小人隂為不善而陽欲揜之則是非不知善之當為與惡之當去也但不能實用其力以至此耳然欲揜其惡而卒不可揜欲詐為善而卒不可詐則亦何益之有哉此君子重以為戒而必謹其獨也曾子曰十目所視十手所指其嚴乎引此以明上文之意言雖幽獨之中而其善惡之不可揜如此可畏之甚也趙氏纂䟽曰語録曰此承上文人之視己如見其肺肝然意不可謂人不知人曉然若見如此富潤屋徳潤身心廣體胖故君子必誠其意胖歩丹反胖安舒也言富則能潤屋矣徳則能潤身矣故心無愧怍則廣大寛平而體常舒泰徳之潤身者然也盖善之實於中而形於外者如此故又言此以結之右傳之六章釋誠意經曰欲誠其意先致其知又曰知至而后意誠盖心體之明有所未盡則其所發必有不能實用其力而茍焉以自欺者然或已明而不謹乎此則其所明又非已有而無以為進徳之基故此章之指必承上章而通考之然後有以見其用力之始終其序不可亂而功不可闕如此云或問六章之指其詳猶有可得而言者耶曰天下之道二善與惡而已矣然揆厥所元而循其次第則善者天命所賦之本然惡者物欲所生之邪穢也是以人之常性莫不有善而無惡其本心莫不好善而惡惡然既有是形體之累而又為氣禀之拘是以物欲之私得以蔽之而天命之本然者不得而著其於事物之理固有懵然不知其善惡之所在者亦有僅識其粗而不能真知其可好可惡之極者夫不知善之真可好則其好善也雖曰好之而未能無不好者以拒之於内不知惡之真可惡則其惡惡也雖曰惡之而未能無不惡者以挽之於中是以不免於茍焉以自欺而意之所發有不誠者夫好善而不誠則非唯不足以為善而反有以賊乎其善惡惡而不誠則非唯不足以去惡而適所以長乎其惡是則其為害也徒有甚焉而何益之有哉聖人於此盖有憂之故為大學之教而必首之以格物致知之目以開明其心術使既有以識夫善惡之所在與其可好可惡之必然矣至此而復進之以必誠其意之說焉則又欲其謹之於幽獨隠微之奥以禁止其茍且自欺之萌而凡其心之所發如曰好善則必由中及外無一毫之不好也如曰惡惡則必由中及外無一毫之不惡也夫好善而中無不好則是其好之也如好好色之真欲以快乎己之目初非為人而好之也惡惡而中無不惡則其惡之也如惡惡臭之真欲以足乎己之鼻初非為人而惡之也所發之實既如此矣而湏㬰之頃纎芥之微念念相承又無敢有少間斷焉則庶乎内外昭融表裏澄徹而心無不正身無不脩矣若彼小人幽隠之間實為不善而猶欲外託於善以自盖則亦不可謂其全然不知善惡之所在但以不知其真可好惡而又不能謹之於獨以禁止其茍且自欺之萌是以淪陷至於如此而不自知耳此章之說其詳如此是固宜為自脩之先務矣所謂脩身在正其心者身有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正忿弗粉反懥勑值反好樂並去聲程子曰身有之身當作心忿懥怒也盖是四者皆心之用而人所不能無者然一有之而不能察則欲動情勝而其用之所行或不能不失其正矣心不在焉視而不見聽而不聞食而不知其味心有不存則無以檢其身是以君子必察乎此而敬以直之然後此心常存而身無不脩也此謂脩身在正其心右傳之七章釋正心脩身此亦承上章以起下章盖意誠則真無惡而實有善矣所以能存是心以檢其身然或但知誠意而不能密察此心之存否則又無以直内而脩身也自此以下並以舊文為正所謂齊其家在脩其身者人之其所親愛而辟焉之其所賤惡而辟焉之其所畏敬而辟焉之其所哀矜而辟焉之其所敖惰而辟焉故好而知其惡惡而知其美者天下鮮矣辟讀為僻惡而之惡敖好並去聲鮮上聲人謂衆人之猶於也辟猶偏也五者在人本有當然之則然常人之情唯其所向而不加審焉則必陷於一偏而身不脩矣故諺有之曰人莫知其子之惡莫知其苖之碩諺音彦碩叶韻時若反諺俗語也溺愛者不明貪得者無厭是則偏之為害而家之所以不齊也此謂身不脩不可以齊其家右傳之八章釋脩身齊家所謂治國必先齊其家者其家不可教而能教人者無之故君子不出家而成教於國孝者所以事君也弟者所以事長也慈者所以使衆也弟去聲長上聲身脩則家可教矣孝弟慈所以脩身而教於家者也然而國之所以事君事長使衆之道不外乎此所以家齊於上而教成於下也康誥曰如保赤子心誠求之雖不中不逺矣未有學養子而后嫁者也中去聲此引書以釋之又明立教之本不假强為在識其端而推廣之耳一家仁一國興仁一家讓一國興讓一人貪戾一國作亂其機如此此謂一言僨事一人定國僨音奮一人謂君也機發動所由也僨覆敗也此言教成於國之效堯舜帥天下以仁而民從之桀紂帥天下以暴而民從之其所令反其所好而民不從是故君子有諸己而后求諸人無諸己而后非諸人所蔵乎身不恕而能喻諸人者未之有也好去聲此又承上文一人定國而言有善於己然後可以責人之善無惡於己然後可以正人之惡皆推己以及人所謂恕也不如是則所令反其所好而民不從矣喻曉也故治國在齊其家通結上文詩云桃之夭夭其葉蓁蓁之子于歸宜其家人宜其家人而后可以教國人夭平聲蓁音臻詩周南桃夭之篇夭夭少好貌蓁蓁美盛貌興也之子猶言是子此指女子之嫁者而言也婦人謂嫁曰歸宜猶善也纂䟽曰詩傳曰宜者和順之意詩云宜兄宜弟宜兄宜弟而后可以教國人詩小雅蓼蕭篇詩云其儀不忒正是四國其為父子兄弟足法而后民法之也詩曹風鳲鳩篇忒差也此謂治國在齊其家此三引詩皆以咏歎上文之事而又結之如此其味深長最宜潜玩右傳之九章釋齊家治國所謂平天下在治其國者上老老而民興孝上長長而民興弟上恤孤而民不倍是以君子有絜矩之道也長上聲弟去聲倍與背同絜胡結反老老謂老吾老也興謂有所感發而興起也孤者幼而無父之稱絜度也矩所以為方也言此三者上行下效㨗於影響所謂家齊而國治也亦可以見人心之所同而不可使有一夫之不獲矣是以君子必當因其所同推以度物使彼我之間各得分願則上下四旁均齊方正而天下平矣所惡於上毋以使下所惡於下毋以事上所惡於前毋以先後所惡於後毋以從前所惡於右毋以交於左所惡於左毋以交於右此之謂絜矩之道先並去聲此覆解上文絜矩二字之義如不欲上之無禮於我則必以此度下之心而亦不敢以此無禮使之不欲下之不忠於我則必以此度上之心而亦不敢以此不忠事之至於前後左右無不皆然則身之所處上下四旁長短廣狭彼此如一而無不方矣彼同有是心而興起焉者又豈有一夫之不獲哉所操者約而所及者廣此平天下之要道也故章内之意皆自此而推之詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父母樂音洛只音紙好惡並去聲下並同詩小雅南山有臺之篇只語助辭言能絜矩而以民心為己心則是愛民如子而民愛之如父母矣詩云節彼南山維石巖巖赫赫師尹民具爾瞻有國者不可以不慎辟則為天下僇矣節讀為截辟讀為僻僇與戮同詩小雅節南山之篇節截然髙大貌師尹周太師尹氏也具俱也辟偏也言在上者人所瞻仰不可不謹若不能絜矩而好惡徇於一己之偏則身弑國亡為天下之大戮矣詩云殷之未喪師克配上帝儀監于殷峻命不易道得衆則得國失衆則失國喪去聲儀詩作宜峻詩作駿易去聲詩文王篇師衆也配對也配上帝言其為天下君而對乎上帝也監視也峻大也不易言難保也道言也引詩而言此以結上文兩節之意有天下者能存此心而不失則其所以絜矩而與民同欲者自不能已矣是故君子先慎乎徳有徳此有人有人此有土有土此有財有財此有用先慎乎徳承上文不可不謹而言徳即謂明徳有人謂得衆有土謂得國有國則不患無財用矣徳者本也財者末也本上文而言外本内末争民施奪人君以徳為外以財為内則是争鬭其民而施之以刦奪之教也盖財者人之所同欲不能絜矩而欲専之則民亦起而争奪矣是故財聚則民散財散則民聚外本内末故財聚争民施奪故民散反是則有徳而有人矣是故言悖而出者亦悖而入貨悖而入者亦悖而出悖布内反悖逆也此以言之出入明貨之出入也自先慎乎徳以下至此又因財貨以明能絜矩與不能者之得失也康誥曰惟命不于常道善則得之不善則失之矣道言也因上文引文王詩之意而申言之其丁寧反覆之意益深切矣楚書曰楚國無以為寳惟善以為寳楚書楚語言不寳金玉而寳善人也舅犯曰亡人無以為寳仁親以為寳舅犯晉文公舅孤偃字子犯亡人文公時為公子出亡在外也仁愛也事見檀弓此兩節又明不外本而内末之意秦誓曰若有一个臣斷斷兮無他技其心休休焉其如有容焉人之有技若已有之人之彦聖其心好之不啻若自其口出寔能容之以能保我子孫黎民尚亦有利哉人之有技媢嫉以惡之人之彦聖而違之俾不通寔不能容以不能保我子孫黎民亦曰殆哉个古賀反書作介斷丁亂反媢音冒秦誓周書斷斷誠一之貌彦美士也聖通明也尚庶㡬也媢忌也違拂戾也殆危也唯仁人放流之迸諸四夷不與同中國此謂唯仁人為能愛人能惡人迸讀為屏古字通用迸猶逐也言有此媢嫉之人妨賢而病國則仁人必深惡而痛絶之以其至公無私故能得好惡之正如此也見賢而不能舉舉而不能先命也見不善而不能退退而不能逺過也逺去聲命鄭氏云當作慢程子云當作怠未詳孰是若此者知所愛惡矣而未能盡愛惡之道盖君子而未仁者也好人之所惡惡人之所好是謂拂人之性菑必逮夫身菑古灾字夫音扶拂逆也好善而惡惡人之性也至於拂人之性則不仁之甚者也自秦誓至此又皆以申言好惡公私之極以明上文所引南山有臺節南山之意是故君子有大道必忠信以得之驕泰以失之君子以位言之道謂居其位而脩己治人之術發己自盡為忠循物無違謂信驕者矜髙泰者侈肆此因上所引文王康誥之意而言章内三言得失而語益加切盖至此而天理存亡之㡬决矣生財有大道生之者衆食之者寡為之者疾用之者舒則財恒足矣恒胡登反吕氏曰國無逰民則生者衆矣朝無幸位則食者寡矣不奪農時則為之疾矣量入為出則用之舒矣愚按此因有土有財而言以明足國之道在乎務本而節用非必外本内末而後財可聚也自此以至終篇皆一意也仁者以財發身不仁者以身發財發猶起也仁者散財以得民不仁者亡身以殖貨未有上好仁而下不好義者也未有好義其事不終者也未有府庫財非其財者也上好仁以愛其下則下好義以忠其上所以事必有終而府庫之財無悖出之患也孟獻子曰畜馬乗不察於雞豚伐氷之家不畜牛羊百乗之家不畜聚斂之臣與其有聚斂之臣寧有盗臣此謂國不以利為利以義為利也孟獻子魯之賢大夫仲孫蔑也畜馬乗士初試為大夫者也伐氷之家卿大夫以上喪祭用氷者也百乗之家有采地者也君子寧亡己之財而不忍傷民之力故寧有盗臣而不畜聚歛之臣此謂以下釋獻子之言也長國家而務財用者必自小人矣彼為善之小人之使為國家菑害並至雖有善者亦無如之何矣此謂國不以利為利以義為利也彼為善之此句上下疑有闕文誤字自由也言由小人導之也此一節深明以利為利之害而重言以結之其丁寧之意切矣右傳之十章釋治國平天下此章之義務在與民同好惡而不專其利皆推廣絜矩之意也能如是則親賢樂利各得其所而天下平矣凡傳十章前四章統論綱領指趣後六章細論條目功夫其第五章乃明善之要第六章乃誠身之本在初學尤為當務之急讀者不可以其近而忽之也或問何以言絜矩為度也曰此荘子所謂絜之百圍語録曰荘子注云絜圍束也是将一物圍束以為之則也賈子所謂度長絜大者也真氏曰度謂以尺之長短絜謂以帶之小大量物之小大如今人之圍木也前此諸儒盖莫之省而强訓以挈殊無意謂先友太史范公乃獨推此以言之而後其理可得而通也盖絜度也矩所以為方也以己之心度人之心知人之所惡者不異乎已則不敢以己之所惡者施之於人使吾之身一處乎此則上下四方物我之際各得其分不相侵越而各就其中校其所占之地則其廣狭長短又皆平均如一截然正方而無有餘不足之處是則所謂絜矩者也愚按此章惟絜矩之說與先儒不同而其義方精故備録如此趙氏纂䟽曰真氏曰矩曲尺也又按彼為善之疑有闕文愚意彼指用小人者言之也善之謂利為有益善其說而行之也文意似亦自全右皆晦庵章句也晦庵甞云大學章句次序皆明白易曉不必或問但致知格物與誠意較難理㑹不得不明辨之耳又云或問乃注脚亦不必深理㑹今愚所抄故全以章句至或問則斟酌其說而間附之然詳說将以反約也由或問而反之章句由章句而反之正文此晦庵本心也晦庵嘗令學者且去熟讀大學正文又言大學最是兩章相接處好看凡今所抄章句雖分一經十傳而逐句逐節之下各有注釋惟初讀時各於其下詳之既已熟讀之後合浄寫正文惟於兩章相接處分之以便玩味凡皆全祖晦庵先生説也致知一章則參用董丞相之說移置本經元文以足之以試觀其合與否爾大學之道在明明徳在親民親當作新在止於至善此三者大學之綱領古之欲明明徳於天下者先治其國欲治其國者先齊其家欲齊其家者先脩其身欲脩其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物此八者大學之條目物格而后知至知至而后意誠意誠而后心正心正而后身脩身脩而后家齊家齊而后國治國治而后天下平此覆說上文自天子以至於庶人壹是皆以脩身為本其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也此結上文兩莭之意右經一章康誥曰克明徳大甲曰顧諟天之明命帝典曰克明峻徳皆自明也右傳之首章釋在明明徳湯之盤銘曰茍日新日日新又日新康誥曰作新民詩曰周雖舊邦其命惟新是故君子無所不用其極右傳之二章釋在新民詩云邦畿千里惟民所止詩云緡蠻黄鳥止于丘隅子曰於止知其所止可以人而不如鳥乎詩云穆穆文王於緝熈敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信詩云瞻彼淇澳菉竹猗猗有斐君子如切如磋如琢如磨瑟兮僩兮赫兮喧兮有斐君子終不可諠兮如切如磋者道學也如琢如磨者自脩也瑟兮僴兮者恂慄也赫兮諠兮者威儀也有斐君子終不可諠兮者道盛徳至善民之不能忘也詩云於戱前王不忘君子賢其賢而親其親小人樂其樂而利其利此以沒世不忘也右傳之三章釋在止於至善知止而后有定定而後能静静而后能安安而后能慮慮而后能得物有本末事有終始知所先後則近道矣此謂知本子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知本此謂知之至也右傳之五章釋致知格物此用近世董丞相就經文易置所謂誠其意者毋自欺也如惡惡臭如好好色此之謂自謙故君子必慎其獨也小人間居為不善無所不至見君子而后厭然揜其不善而著其善人之視己如見其肺肝然則何益矣此謂誠於中形於外故君子必慎其獨也曾子曰十目所視十手所指其嚴乎富潤屋徳潤身心廣體胖故君子必誠其意右傳之六章釋誠意所謂脩身在正其心者身有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正心不在焉視而不見聽而不聞食而不知其味此謂脩身在正其心右傳之七章釋正心脩身所謂齊其家在脩其身者人之其所親愛而辟焉之其所賤惡而辟焉之其所畏敬而辟焉之其所哀矜而辟焉之其所敖惰而辟焉故好而知其惡惡而知其美者天下鮮矣故諺有之曰人莫知其子之惡莫知其苖之碩此謂身不脩不可以齊其家右傳之八章釋脩身齊家所謂治國必先齊其家者其家不可教而能教人者無之故君子不出家而成教於國孝者所以事君也弟者所以事長也慈者所以使衆也康誥曰如保赤子心誠求之雖不中不逺矣未有學養子而后嫁者也一家仁一國興仁一家讓一國興讓一人貪戾一國作亂其機如此此謂一言僨事一人定國堯舜帥天下以仁而民從之桀紂帥天下以暴而民從之其所令反其所好而民不從是故君子有諸己而后求諸人無諸己而后非諸人所蔵乎身不恕而能喻諸人者未之有也故治國在齊其家詩云桃之夭夭其葉蓁蓁之子于歸宜其家人宜其家人而后可以教國人詩云宜兄宜弟宜兄宜弟而后可以教國人詩云其儀不忒正是四國其為父子兄弟足法而后民法之也此謂治國在齊其家右傳之九章釋齊家治國所謂平天下在治其國者上老老而民興孝上長長而民興弟上恤孤而民不倍是以君子有絜矩之道也所惡於上毋以使下所惡於下毋以事上所惡於前毋以先後所惡於後毋以從前所惡於右毋以交於左所惡於左毋以交於右此之謂絜矩之道詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父母詩云節彼南山維石巖巖赫赫師尹民具爾瞻有國者不可以不慎辟則為天下僇矣詩云殷之未喪師克配上帝儀監于殷峻命不易道得衆則得國失衆則失國是故君子先慎乎徳有徳此有人有人此有土有土此有財有財此有用徳者本也財者末也外本内末争民施奪是故財聚則民散財散則民聚是故言悖而出者亦悖而入貨悖而入者亦悖而出康誥曰惟命不于常道善則得之不善則失之矣楚書曰楚國無以為寳惟善以為寳舅犯曰亡人無以為寳仁親以為寳秦誓曰若有一个臣斷斷兮無他技其心休休焉其如有容焉人之有技若己有之人之彦聖其心好之不啻若自其口出寔能容之以能保我子孫黎民尚亦有利哉人之有技媢嫉以惡之人之彦聖而違之俾不通寔不能容以不能保我子孫黎民亦曰殆哉唯仁人放流之迸諸四夷不與同中國此謂唯仁人為能愛人能惡人見賢而不能舉舉而不能先命也見不善而不能退退而不能逺過也好人之所惡惡人之所好是謂拂人之性菑必逮夫身是故君子有大道必忠信以得之驕泰以失之生財有大道生之者衆食之者寡為之者疾用之者舒則財恒足矣仁者以財發身不仁者以身發財未有上好仁而下不好義者也未有好義其事不終者也未有府庫財非其財者也孟獻子曰畜馬乗不察於雞豚伐氷之家不畜牛羊百乗之家不畜聚歛之臣與其有聚歛之臣寧有盗臣此謂國不以利為利以義為利也長國家而務財用者必自小人矣彼為善之小人之使為國家菑害並至雖有善者亦無如之何矣此謂國不以利為利以義為利也右傳之十章釋治國平天下黄氏日抄卷二十八
