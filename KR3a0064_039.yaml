body:
  text: 黃氏日抄卷三十九宋黃震撰讀本朝諸儒理學書七南軒先生文集詞賦詩風雩亭詞末章云希蹤兮奈何盍務勉乎敬恭其布置歸宿大率與晦庵白鹿洞賦相表裏而可以救近世揣摩氣象流入空虛者之弊唐帝廟詞亦類晦翁舜帝廟詞竹林迎神章惟感慨而不及冦公身事最得體遂初賦為發明復之意方以羲文之復明收而末句僅以一語及孫興公此理之所在亦文法也續杞菊賦云天壤之間孰為正味厚或臘毒淡乃其至送鮮于大任入幕詩莫邪雖云利寧作囊錐露又安國晚酌分韻驅車萬里道中塗可停輔其厲志如此道旁見穫者詩姑寬目前飢詎有卒嵗樂其憂民如此蓋同一所見之逺也南軒詩大率主義理而語自工律詩人立千峯秋色裏月生滄海暮雲邊又萬里煙雲歸老眼千年形勢接中州皆先生胸次所寄也其壽定叟絶句云駟馬安車遵大路正須緩轡不須忙正大之情如此有用之則行氣象表嚴州江陵到任等表皆平叙民情國事文從字順德人之言也經筵講義講葛覃一詩大略謂人心易動貴驕易溺使為國者每念乎稼穡之勞而其后妃又不忘乎織紝之事則心不存焉者寡矣口奏又謂或云要得立事擾人不奈何臣以為此等議論乃壞國家元氣毒藥又進曰家法之美無如我宋光獻曹太后方英宗之初有功社稷宣仁高太后致元祐之治號為女中堯舜欽聖向太后建中靖國之初有功社稷欽慈孟太后靖康建炎間社稷之功又冠前古實子孫萬世無窮之法愚按此晦翁取而附此以為敬夫所以堯舜吾君而不愧其父師之傳者所宜三復而深思答周漕啓雖故嵗之幸稔尚前歉之未償仁哉言乎富人之窘宿逋貪官之督零稅者豈復念及此乎世有歲幸一稔小民反以為苦者多矣記學記九篇皆言人倫孝弟惟雷州記明善與利云自學校之教不明為士者亦習於利而已靜江郴雷三學皆撤廢寺為之嶽麓書院記開寶中郡守朱洞創始李允則言於朝乞書時山長周式以行義召拜國子主簿使歸教授詔以嶽麓書院名增賜中祕書時祥符八年也紹興辛亥兵火乾道改元劉侯復其舊堯山灕江二壇記山川之所以為神靈者以其氣之所蒸能出雲潤澤羣物後世固亦有山川之祠而人其形宇其地則其失也久矣楚望記江陵山雖去郡逺然聨絡以屬於當陽巫峽之間其浸則如蜀江瀰亘千里爰築二壇扁曰楚望道永韶南康軍濓溪四祠堂記發明道學之原最詳石鼓山諸葛武侯祠昭烈牧荆州時侯以軍師中郎將駐臨蒸臨蒸今衡陽縣也有天地則有三綱若汨於利害之中而忘夫天理之正則雖有天下不能一朝居此侯所以討賊至死不悔瀏陽楊龜山畫像記靖康為諫議追奪王金陵王爵罷去配饗昭州鄒侍郎祠堂記元符中為右正言直諫貶新州建中初入從崇寧二年又貶昭州四年歸沒於常州人臣不以犯顔敢諌為難而忠誠篤志之為貴士君子不以一時名節為至而以進德終身之可慕公再位於朝憂國彌切重斥炎荒凛不少沮建寧游胡祠記游公二程高弟元符三年冬為監察御史有中庸語孟說埀於世胡公與游謝楊游而講程說所自得在春秋執經入侍靜江題名記靜江經略領郡二十五其外則羈縻之州七十二又其外則諸小蕃羅殿白杞特磨白衣之屬環之又其外則交趾大理等國屬焉敬齊記二篇為崔子霖作者尤起發人意拙齊記前論士病於不拙人所易到後論病學者之不拙此意極有益於人仰止堂記云人生天地之中而與天地同體出乎萬世之下而與聖人同心其惟仁乎古之人起居寢食之間精察主一不知有外物之可慕他事之可為不知有富貴之可喜憂患之可戚蓋其中心汲汲於求仁而已一樂堂記上饒徐衡仲名安國為龔氏後既第感正本明宗之義言於朝歸徐姓父母俱存合百五十有六嵗伯仲季氏亦皆無故以一樂名其堂記略云民生莫不有父母之親兄弟之愛此性之所具而天之所為也苟惟强離其所繫而合於其所不可合是豈性也哉是故神不歆非祀民不祀非族聖人書莒人滅鄫豈不深切著明哉潔白堂記天地其父母乎父母其天地乎不以事天之道事親者不得為孝子不以事親之道事天不得為仁人名軒室記軒名時習室名不二游東山記先生游永之山東置酒僧寺之西軒零陵張紆公飾預焉嘆曰此范忠宣公故居也公居此時某始年十三四先人辱為公客故某亦得侍公公目疾手執寸許玉摩按某視之旁有兒曰此石也公愕然曰非也此之謂玉公存誠至於不欺孺子又諸孫與僧戲僧至詬罵語微及公公漠然若不聞永之士有問范某於丞相為何親蓋斥文正公之名公蹙頞久而曰先公也又一日問郡士登科者某人獨未歸耶或曰試學官也公愀然曰吏事近民精心於此學之要也始登科顧徒求便安耶序南嶽唱酬序乾道丁亥十一月先生與晦翁游衡嶽三山林擇之與焉甲戌宿草衣岩山林川壑之觀已覺勝絶乙亥抵嶽丁丑渡興樂江宿霧盡捲諸峯玉立由馬跡橋登山暮抵方廣氣象深窈八峯環立所謂蓮花峯也戊寅穿小徑入高臺寺門外萬竹森然雪厚幾數尺望石廪如素錦屏出西嶺過天柱下福嚴歷馬祖庵過大明寺猶縈迂數里乃至上封山高草木堅瘦雲氣噓吸其間望祝融絶頂褰裳徑往羣峯錯立逺近異態其外四峯渺然不知所極如大瀛環海中真竒觀也湘水環帶山下五折乃北去蒼莽中洞庭在焉己卯同游仙人橋再上絶頂過南嶺庚辰游前嶺以下凡七日經行數百里景物之美不可殫叙更迭唱和倒囊得百四十九篇方己卯之夕中夜凜然念吾三人數日間亦荒於詩矣始定約束翌日當止是後雖有可歌者亦不復見於詩矣送張荆州安國告之以講學送曾裘父序云天資秀美之士往往為他岐所陷溺送方耕道序云當觀氣質變化之淺深而知學力之進否送鍾尉云氣質雖美而有限天理至微而難明靜江諭俗文一歸罪墳墓不吉掘棺寄寺名出祖一齊筵侈靡不能辦者停喪一婚姻幃帳華靡以至男女失時一生子多不舉一病不服藥妄聽淫祀一誘他人妻販賣謂之捲伴亦緣細民興販不返妻室無依史論漢楚爭戰聽三老董公之說三軍縞素於是五十六萬之師不謀而來從使斯時高帝不入彭城置酒高㑹率諸侯兵窮引所至而誅之天下即定蕭曹蕭何守關中薦韓信曹參雖不逮然以摧鋒陷陳之氣施之治民能盡斂芒角亦寬裕有識矣至不知吕氏之禍已著當逆為之處惠帝憂不知所出但為淫樂而不能引義以強其君心為可罪也張子房有儒者氣象五世相韓篤春秋復讎之義始終以之愚謂復讎固其義也以其人則智謀之士也儒者氣象恐又别先生之言蓋自有為而發王陵陳平周勃處吕后事何如人臣之義當以王陵為正二子者乃唯然從之吕氏欲篡漢二子實助之也二子方對吕氏時特畏死耳未有安漢之謀也抑二子安劉氏之計亦踈矣使酈寄不可劫北軍不可入吕嬃之謀行則亦殆矣忠於人國者顧如是哉文帝入踐大統知為漢社稷非為巳請建太子則先示慱求賢聖請王諸子則先推諸兄無後者施惠於民皆有誠意其待夷狄一以實情惜大臣不過絳灌申屠嘉之徒獨賈誼為英俊而又多所可恨卒亦不見用故以帝之賢僅為小康如淮南薄昭之事未免陷於刑名至於怠肆而新垣平邪說入之然終以天資高旋即悟其終詔有曰惟年之久長懼于不終可見帝之能察乎此矣賈董賈生英俊之才然未免有激發暴露之氣天人之對雖若緩而不切然反覆誦味淵源純粹以武帝好大喜功多欲之心使聽仲舒則天下䝉福矣武帝奢侈窮黷然不至亂亡者有四事高帝文景流澤滲漉一也表章六經聘召儒生二也輪臺之詔三也審所付託四也雜霸王道如精金美玉豈容雜雜之則是亦霸而已自高帝取天下固以天下為己利文帝亦雜黃老刑名設施動皆有術至宣帝則威文之罪人也西京之亡自宣帝始丙魏魏相假許史為重進不以正為相奏異聞諫伐丐奴書有可取者丙吉德厚可稱至韓延壽楊惲之死莫能救才識不逮相逺矣蕭望之劉向元帝初外有史高總朝廷之事內有恭顯制樞機之權二子處其間可謂危矣而二子用人惟其附巳以鄭朋之傾邪使之待詔至華龍之汚穢亦欲入其黨不嚴如是欲不敗其可得乎史稱袁安任隗素行高梁冀未有以害之斯言誠有味也漢儒名節之稱起於衰世衰世實亦有賴乎此漢自叔孫通固以利祿為事至公孫𢎞取相印學士皆歆慕之其流至夏侯勝之剛果猶有明經取青紫之語宜乎王莽篡竊貢符獻瑞一朝成羣能自潔者班班僅見也光武力矯斯弊桓靈之後亦君子維持之力然則名節之稱在君子則為未盡而於國家何負哉元成以後大臣漢末大臣有正論者王嘉何武師丹耳然若不循其本而姑因一人一事而指陳無益也故哀帝之末董賢雖去王氏即起遂亡漢矣漢自高帝外諸將漢將以趙充國為最凡將之病患於勇而不詳謹充國馳至金城而西戎坐消此不特為賢將殆可相也光武比高祖高祖洪模大略非光武所及光武之善守復非高祖所及光武不任功臣冦鄧賈復識明而行修量洪而器逺以光武所用大臣論之三子過之逺甚顧乃執一槩之嫌廢大公之義是反為私意而已抑光武所責於大臣特為吏事故不知用大臣之道李固杜喬李固方舉於朝即就梁商之辟此其失之於前方質帝之弒也固為首相固獨推究侍醫等此其失之於後杜喬在九卿若懷是見必贊固為之矣及繼固為相已制命於冀相與就死李杜二公精忠徑節但恨節目間處之未盡耳東京黨錮時不我用既昧處困之道進而居位又失亨屯之法使在聖門當入仲由之科陳太丘送宦者之葬以此免禍君子亦不貴也郭有道足為當世人物之領䄂然收斂之功猶未之盡黃叔度氣象溫厚圭角渾然使在聖門作成之當居顔子之科矣竇武陳蕃宦者盤據其勢已成而武等但欲速决舉動草草使之人人自疑觀朱瑀所謂中宫放縱者自可誅我曹何罪使蕃武施之有道則此曹亦心服矣况武於靈帝踐阼之初一門三侯妄自封殖故王甫後來亦得以藉口蕃辭爵而不能力止武之封是亦潔身之為耳任天下之重顧止如此哉兩漢選舉左雄之奏尤為責實當時雖以限年為嗤然是舉所得乃陳蕃李膺陳球輩為一代名臣晉元帝元帝初以懷帝之命來臨江左懷帝卒以蒙塵迄不聞勤王之舉愍帝再蒙塵懼天下之議己則陽為出師之勢終歸罪於運餉稽緩斬一無辜令史赤眚之異亦深切矣夫受君父之委而覬幸以自利三綱淪矣謝安淝水之功𤣥有謀慮善使人而牢之勇鋭出衆使𤣥將重兵於後使牢之將精兵迎敵於前秦兵既近洛澗牢之直搏而勝之奪其心矣淝水之戰其勝算已在目中故安靜而不撓其矯情鎮物豈固為是哉至於却上流之兵又其一竒也得之不足以助益而適足以銷薄聲勢動搖人心桓冲是舉亦無謀矣若安者其在東晉人物中傑出者哉溫嶠太真少時嘗以孝友篤至稱一旦奉劉琨之檄將命江左母崔固止之不可至於絶裾而就行使太真能佐晉室剋復神州勳烈如浮雲之過太虛耳豈足以塞其天性之傷仁說人之性仁義禮智四德具焉其愛之體則仁也是乃天地生物之心而人所由生者也故仁為四德之長也人惟巳私蔽之以失其性之理是以為仁莫要乎克已己私既克愛之理無所蔽則與天地萬物血脉貫通而其用亦無不周記甘露李文饒事曾畋所總丹陽類集載熙寧中僧應夫治故殿基得李文饒手記云寶厯間創甘露剎以資穆皇之冥福文饒有祭言禪師文云因甘露之降瑞立仁祠於高標與此記合則文饒豈真知惡異教者哉愚按李文饒平生毁僧寺而獨創一甘露寺恐無此理或僧徒故為此事以汙之如僞撰韓文公作大顛書之類耳黃鶴樓記武昌黃鶴樓以山得名而唐圖經為怪說謂費文禕仙去駕鶴憩此閻伯誤記中乃實其事或者又引梁任昉所記謂駕鶴之賓乃荀叔偉非文禕也此皆因黃鶴之名而妄為之說樓旁有石照亭不知何妄男子題詩窗間遽相傳曰此吕洞賓所書而蘇子瞻亦載馮當世之說有羽衣著屐之詩嗚呼寧有是理哉書與劉共父近世再臨舊鎮者聲望率减於前或曰上下玩習之故某以為不然殆由在我者有忽之之心耳某效職於此佩心誠求之之訓味哀矜勿喜之言怵惕黽勉諸變一以信義待之如買馬一事舊弊革去凡數十事最苦是鹽銀輒虧其輕重帥司先利出剩銀之得其下官吏率從而減剋乾沒今先去出剩銀招馬官先以此意出塞喻蠻落舊來馬至二月末方有來者而羅殿又四年不來今方中冬雍州已申羅殿將馬千七百匹近塞矣益知忠信之可行而在我者誠當自檢也與湖守薛士龍聞欲招陳君舉來學中此固善但闕欲因程文而誘之讀書則義未正今日一種士子將先覺言語耳剽口誦用為進取之資轉趨於薄此極害事與吳晦叔仁右道左之說右為陽而用之所行左為陰而體之所存也黃老翕張取與之意竊弄造化之機故其流為刑名與朱元晦七十三篇蓋南軒生平所資而期於明道救世者晦翁一人而已其規切晦翁之語如曰聞兄在鄉里因嵗歉請於官得米儲之春秋償所取之息不過備耗或者妄有散青苖之譏兄聞之作而言曰介甫獨有散青苖一事是耳奮然欲作社倉記以述此意某以為此則過矣是乃意之所加不自知其偏者也又來者多云㑹聚之間酒酣氣散悲歌慷慨如此等類恐皆平時血氣之習未能消磨不可作小病看又慮元晦學行為人所尊敬眼前多出已下平時只是針規他人見他人不是覺已是處多他人亦憚元晦辨論之徑排闢之嚴縱有所疑不敢以請深恐諛言多而拂論少異日流弊不可免念世間相知孰踰於元晦切磋之義其敢後於他人其論晦翁著述云論語章句精確簡嚴足詔後學中庸大學章句極涵蓄有味太極圖解析理精詳西銘之論甚精克齊銘敬齊針皆當書之座右也其自以所著述資晦翁者云語說洊待指論極為開警奉教以禮書中不當去冠禮事甚當其言所與同時諸儒云伯恭近來儘好說話於蘇氏父子亦甚知其非又云伯恭愛弊精神於閒文字中徒自損何益如編文海何補於治道何補於後學徒使精力困於翻閲亦可憐耳承當編比文字非亦所以承君德又云陸子壽兄弟如何肯相聽否澧州教授傳夢泉乃是陸子靜一流其人亦剛介有立但所談學多類揚眉瞬目之機子靜此病曾磨切人物又云劉共父今日達官似皆不能過之又云今日所謂正人端士固有之惟是不知學不可望以向上事業耳其自言廣右之政謂自靜江之外諸郡匱缺願與憲漕通融均濟之偶兩臺闕官時暫兼攝遂乞增撥諸州一分鹽息錢及增邊州米錢又請以見在三十萬緡專備借諸州搬鹽本此乃一路性命所繫幾為小人盡刮以獻又云本路鹽法正緣諸州荒寒全仰漕司撥鹽息往年行客鈔賣數極不多却有折米錢甚重民深病之改為官般而罷折米廣東不便而爭之再行客鈔然所賣數多鈔大積壓於是復行官般但漕司撥得息少則抑賣增價之事生故論奏增給大抵此路窮薄祖宗時全仰外路應副今每嵗反應副外路鄂渚大軍錢靖州嵗計錢及買馬錢合二十一萬緡此路盜賊之多緣配隸之人萃焉比嚴首捕之科收其强壯為效用故少戢其自言江陵之政謂今軍事在都統司財賦屬總司帥司所當以固結民心為本帥司兵但有神徑馬步合千人荆鄂大軍屯營在此者亦萬五千餘人務以信義待之號令則不可少犯此間闕之否其於胡氏之學則曰知言疑義開發甚多不是指摘前輩也又云胡氏春秋傳多有合商量處又云讀史管見病敗不言可看來多是為檜設言天下之理而特為譏刺一夫不亦隘且陋乎因晦翁論武后事既立長子難誅其母則云中宗雖是武后所廢然嘗欲傳位與后父是得罪宗廟不可負荷五王若能正大義於唐家見存子孫中公選一人以承天序告於宗廟誅此老媪則義正理順唐有泰山之安矣其論當世闕我玩味之久自識别之答陳擇之異端自謂直指人心而初未嘗識心也使果識心則君臣父子兄弟夫婦是乃人道之經而本心之所存也其忍斷棄之乎答陳平甫言自己工夫答沙市孫監領楚乃伍員之宗國豈有假手於讎覆其宗國快心於其君耶狄梁公乃與大禹太伯一例存之前輩嘗謂梁公偶未之思耳今勑額在吳以慰吳人之思可也在楚則不可以施樂祀典有功德於民則祀員於此地何止無功德而已哉答陸子壽講學不可以不精也元晦卓然特立真金石之友也答李賢良盛名之下難居而問學之方無窮責人者易為言而克已者難為功答胡直夫世固有不取異端之說者然不知其說乃自陷於異端而不知又云君子亦豈無欲乎而莫非天命之流行不可以人欲言常人亦豈無一事之善哉然其所謂善者未必非人欲也愚謂二者皆本原上精明之語答俞秀才論飢食渴飲晝作夜息是義云孟子只闕乃吳蜀腰領自襄陽至此僅六百里要當以死守之往年劉信叔號名將張安國素豪俊然為帥時聞少警便要為移治江北之計此乃大謬又云義勇民兵是為荆渚之衛近來振激之使受縣宰節度共父與免役極害事今亦修正之辰沅等五郡刀弩手北列上為久逺計堤岸繫一方之命近城十數里最所恃者今為久逺之計不敢草也其泛及民事云見李壽翁侍郎申明乞依舊法義米各積榖在逐鄉都分中户部固已沮之矣望兄試為畫項見教與吕伯恭衣冠不整舉止或草草此恐不可作小病看外之不肅而謂能於外可乎以不當憂責為幸此意殊不厚存心既爾若一旦臨事豈復更自力乎大抵老兄平日似於果斷未足雖是過於厚傷於慈為君子之過然在他人觀我則觀過可以知仁在我自檢㸃則終是偏處仁義之道常相須若於義不足則所謂仁者亦失其正矣去年聞從學者甚衆某殊謂未然若是為舉業而來先懷利心豈有就利上誘得就義之理今巳謝遣甚幸答胡季隨元晦所編遺書皆存元本其間真僞在闕云若專指夫婦間人所不睹不聞者却似未穩愚意南軒之說是矣經㫖夫婦之愚對聖人而言特指匹夫匹婦之愚者耳答胡廣仲主謝上蔡心有所覺為仁之說云知覺是知覺此又豈可遂以知覺為仁哉答陳平甫主晝作夜息為天理云異教中亦拈此孟子只拈出愛親敬長之端最為親切答其欲經紀明道橫渠之後云此有位者之責不當竊取而任之若與之相識則或周之助之可也答宋伯潛問舜明於庶物之物云道外無物愚恐太寬答周允升問王通謂夫子與太極合德云天可言配指形體也太極不可言合太極性也答吕子約問敬鬼神而逺之云遺書中亦未說到深逺處且大綱說敬愚謂鬼神事夫子此一語盡之矣又本㫖在務民之義若說到深逺處恐便與夫子不同答俞秀才云周公欲代武王死是渾全誠意其謂金縢策祝之詞不無妄傳則似不必疑也跋跋孫子西漢藝文志載武所著兵法八十二篇圖九卷杜牧謂武書數十萬言曹操削之為十三篇跋王介甫帖例多匆匆草草丞相平生何有許忙迫時耶少傅劉子墓志公初侍其父忠顯公韐守越守真定及京城不守忠顯死之公義不與共戴天佐張忠獻誅范瓊陜西之失用吳玠守大散關公知興元遷守三泉為壁潭毒山上卒全蜀張公罷公貶白州起知泉州又坐張公貶漳州起知鎮江秦檜罷之歸子珙克世其家初朱松以家事托公教其子闕盍與己子均是為晦翁吏侍李公浩建昌人不見年魁秦熺其後論者爭言檜時事公言蚩尤五兵李斯篆隸苟便於世不以人廢知台州破豪民鄭憲之家為其訟寃賴劉珙免知靜江浚靈渠爭買馬市象事工書廖公剛順昌人居鄉喻盜使反業堂名世綵章惇之追貶封還章傑章僅補外之詔在臺多所論列自公之去言事者多承望而縉紳竄逐相繼矣同諌王公縉其先自嚴家於明知英州盜過其墳無犯朱勝非當國故鄉監官至都堂亦使趨庭自列公不肯入堂言多採用公之存子孫悉從吏部選無詣堂者祕閣詹公至嚴州人初為河州士曹薄寨主王淵之罪後淵顯張浚韓世忠皆其舊部曲其言為諸將所信故張忠獻任之凡軍事非文檄所能傳者必公往諭意嘗佐世忠解濟州之圍行至熙河請駐山陽世忠不從而敗劉光世解兵柄料吕祉涖之必敗教授劉靖之述其撤近嵗太守部使者之祠而祠濂溪以訓學者義理其文甚悉吳監廟述其望得官而不露魏元履名掞之舉遺逸任太學録請去王安石父子而進爵程氏又白太學豈當專以浮言取人臨終戒用僧凡五招晦庵以終事為託鮮于廣少母安人常氏廣襁褓時去其家既冠而知之則常氏沒矣廣追念哀疚屬南軒為哀詞勸農文首告以勤吾力既盡至豐歉則天焉而亦由於人事此則太守與官屬之責而亦有繫於百姓者焉文字宛轉周於事情祭文祭虞雍公云論有異同正惟公義之報漢丞相諸葛忠武侯傳傳後云或謂侯勸昭烈取荆州為不義不知劉琮既已迎降於操則荆州固魏之荆州矣于以取之豈不正乎惜昭烈之失此機也又或謂魏延之策惜侯不用不知夫天將昌漢以侯之舉措掃禽亂賊直餘事耳行險僥幸非侯志也嗚呼秦漢以來士狃於戰國之餘習張子房為拔出者而猶未免乎雜以伯術若侯真豪傑之士無文王猶興者耶然使侯得游於洙泗之門講學以終之則其所至又非豫所知也又曰朱元晦以豫不當不載以管樂自許事謂侯為後主寫申韓管子六韜之書及勸昭烈取荆益可見其所學未免駁雜然方曹氏篡竊之際侯以身從帝室之胄允執大剛終始不渝使侯當齊侯時其肯自富其國而忘天下之大訓乎使侯當燕昭時其肯志在土地珍寶而自以為功莫大乎故不欲書以惑觀拔本塞源之意也豫讀出師表所以告後主一出於正殊非刻核陰謀之語故於手寫申韓等書之事疑則可闕也侯在草廬一見昭烈遂定取荆益之計蓋以興復漢室為己任則諸侯內懷他圖者得以正名而討之然昭烈小不忍而妨大計故劉琮降操荆益可取而不取是侯之策昭烈未能盡從也及狼狽而遁藉吳敗操又迫於吳而入蜀以譎計取之豫知侯有不得已者非草廬所以告昭烈之本意也然侯於學未足故昭烈譎取劉璋終為有愧若夫開國建后大事也而奉冊所立者乃亡國之宗婦以日易月後世之大失也而昭烈之喪冡宰所贊者乃固繆之禮然則當斷之曰若侯者體正大而學未至者也謹按先生講學專主涵養持敬謀國專主致君讎敵居官專主恤民練軍乾淳諸儒議論與晦翁相表裏者先生一人而已晦翁之言精到開拓足集諸儒之大成先生之文和平含蓄庶幾程氏之遺風晦翁精究聖賢之傳排闢異說所力任者在萬世之道統先生將命君父之間誓誅讎敵所力任者在萬世之綱常元氣胥㑹二儒並出其更相切磨友誼卓然又足使千載興起嗚呼此其所以為乾淳之盛歟南軒先生語録論語類謂學而時習不特效人之善如觀天行健則自强不息之類皆是也愚謂此於學字上推廣若本㫖又重在時習上射不主皮與為力而射者不同科愚意似不必添與字只作為其力之不同亦自明白論敬鬼神而逺之因言橫渠挂夫子像見而不拜又不可遂捲起夢見周公五峯謂必曾於畫像中見之所以夢見愚謂世之不識其人而夢之者甚多但夢中以為其人耳如子孫之於祖先亦然此何足怪而轉生畫像之說耶大抵夢境所見與青天白日識認人面目不同夢見周公何可議論論夫子與上大夫下大夫言云最是更端處難蓋以為一時之間既與上言又與下言也愚意隨應而不同亦未必同是一時論鄉原自以為是便休是以終身為原人愚謂此說極平又有益於後學龜山云惠及窮困之人是為天祿之終愚謂此雖一說恐改了經文耳猶之與人訓猶為若愚恐之字無著處且合依古注訓俱中庸類君子居易以俟命非專俟其通易蠱之上九不事王侯只是不立其朝爾人却言天子不得臣諸侯不得友是無人倫詩類振鷺取其潔亦謂其翔而後集愚按詩本喻有客之容餘皆推廣爾禮類曾子易簀季孫以人情賜之曾子以人情受之若以此終則不可冠禮見於母母拜之只不坐受其禮皆謂之拜今小兒便穿秉是以名器為戲玩既冠可也喪祭既不用浮屠蚤晚臨之類不可不備神主神所依主字無出處但恐古者貴賤有少别爾春秋德夀問長勺之戰對曰曹劌所論特血氣之勇所以易竭若報父兄之怨雖百鼓不竭愚按劌所言是臨陳一時之事先生乃借以言胸中忠赤之藴孟子氣次焉次焉者繼之謂也無是餒也不可使此餒也道學或逞利欲不知天地不只生爾一箇何不將此身在天地間公共看恐利害倉卒之間錯了路岐延對須直言蓋士人初見君父此時可欺則無往而非欺附麗匪人如黥如劓雖欲湔洗而痕跡尚在夫人得而指之不復為完人矣遭人謗謗得是固當改謗得不是必思何以致此性理良心豈無發見之時引而伸之涵養而擴充之天理自明人欲自消因循怠惰此人欲所以肆也吳晦叔說惻隱曰有所惻然隱於吾心東萊曰此正如說隱著腳相似本朝諸子濂溪學問如此而舉世不知為南安掾程太中始知可見無分毫矜夸方是朴實下工夫人溫公自陜歸洛以俸餘賈布洛布賈高即以陜賈買之先生曰不如伊川塌麥有來問麥賈者曰依市賈欲損之不答先生曰若減賈便是近名康節云君子贏得做君子小人枉了做小人先生言嬴得是有利心不若改云君子本分做君子愚謂詞義於此乎益精矣然欲警切人心使其鋭於為善恐仍不若本語之精神孔門云惠而不費亦不以計較為嫌也康節與韓魏公游龍門憩櫟林見墜枝而知其將伐磨而不磷涅而不緇須還孔子吾人只當學子路龜山晚年一出自處地位高大龜山見明道歸再與總老語總老曰必曽遇異人來更不敢與爭辨南軒初見五峯五峯辭以疾以其家學佛再見乃授業焉文海事伯恭錯承受昔溫公作通鑑似不為無益前輩猶謂其枉用心陸子靜謂不當編程氏遺書晦叔曰若如其言六經可燒先生曰是古君臣霍光天資重厚如朝謁進止常不差尺寸似乎知學者唐太宗政要中載孔明語云吾心如稱不能為人作輕重一士大夫不畏死常風浪中過鄱陽湖晦庵聞之曰當時入湖中當得甚高節先生曰元晦說極是若舍生只得死何用琴張欲弔宗魯孔子曰齊豹之盜孟縶之賊女何弔焉琴張只見宗魯死便以為難事不知其不義也子路為孔悝死始初不知所擇雖謂之不得其死也可自古不曾見聖人被役人有靜而死不亂者有赴死如歸而死不亂者有信其死去之西天而死不亂者武昭儀稱制禇遂良諫不聽孰若高宗初幸尼寺取才人入宫之時大臣一言可去與楊妃事同維州事李德裕初固不當受牛僧孺後所處亦非彼悉怛謀乃慕義而來當先與吐蕃約以金帛贖其罪然後歸之致堂讀史論維州本中國地德裕受之是陸宣公奏議善開明人主及為相却與為詞臣不同當奏白而行之不從則去不應復抗疏纍千言若宣公只是詞臣無宰相才本朝人物范文正公本朝第一等人寄元均帖云此去南陽亦且讀書涉道貴深退即自樂非升沉之可搖也忠宣公豈能及觀其救蔡確謂逆曾參反爾之言違老氏好還之戒又語同列以不當開此路是論一己利害平生心術見於此矣司馬溫公改新法或勸其防後患曰天若祚宋必無此事更不論一己利害君相不當惡士大夫之好名惟朋友相切磋則不當好名耳鄒道卿貶昭州氣終不衰胡淡庵大節極好趙忠簡人品甚高黨籍至忠簡始除江聖錫不妄假人以詞色得大臣體李巽巖議論如雪中檜柏治道莫易於宰相形便勢利有人可以任事莫難於宰相少有私意便隔絶矣施設不過舉其大綱先使官闕得其人君子聚於朝中人皆可化而為善小人得用中人皆被引去大農盡知州郡之財盡數括取而不恤州郡之有無官兵俸給於何取之祖宗朝置江南六路發運與錢六十萬貫為糴本如某路某州熟則依時價糴之某路某州旱潦則發幾千萬石減價糴之故京師不告勞而江南終無水旱飢荒之厄前此茶鹽皆無鈔只是某州綱船到則發鹽載回某州賣本錢歸發運司利則潤州郡自胡師文為發運以本錢為羡餘獻之其後却就諸州再括六十萬為糴本而法始弊屯田用軍中子弟分之田畝假之農具更一說可募百姓當今天下之勢擇一人帥建康兼兩淮制置一人帥興元兼四川制置一人帥荆南兼襄漢制使自選屬治兵積榖劉共父在建康甚好更得元晦發脫得必又顯煥伯恭可佐之因又及治內汪聖錫可參政元晦可御史中丞兼侍讀伯恭可諫議大夫兼侍講敵人聞之必喪膽太平可期矣東漢無數君子其亡尤速立朝先生每登對必自盟曰切不可見上喜便隨順張說除簽書先生極論其不可又責宰相虞允文曰宦官執政自京黼始近習執政自相公始允文謂同僚難論列先生曰張九齡論牛仙客陸贄論裴延齡非同僚耶允文不能答曾覿除某官中書舍人趙雄當制在假先生戲其為樊須雄由是深怨與允文表裏譛先生於上謂其目獻壽為胡舞欲竄之上於是出先生知袁州政事戒約州縣以誠相待或言武人難駕御先生曰不如開懷待之訓門人不為吳晦叔志墓云依妻家答鄭自明書云工於論人者察已常疏狃於能直者所發多弊文章作詩不可直說破須婉而成章退之聖德頌先斷腰膂處子由非之先生曰退之筆力高欲藩鎮聞之耳異端宗果問先生如何是一以貫之時先生年甚少曰某今未敢便與爾說一以貫之且道如何是忠恕宗果歎服不接僧道曰公㕔豈見異教之所雜類弓調然後求徑馬服然後求良士必誠慤然後求智能傅夢泉對先生云門人門生乃學者所稱愚按周曰士秦漢曰生皆指學者漢書載學於其門者為門下生唐世採譽望而取士凡投文字而獲選者因稱門生今世獲薦舉者亦循其例稱門生雖理所不必要之生亦士之通稱也近或不明其義以生為卑謙之名靡然為諂者則必稱門生介然自立者則羞稱門生達為貴官者則又嫌人之稱其官而欲其稱先生不知生即士之稱先生即老士人之稱此何異事而舉世視此為輕重僭因南軒之說而及之讀南軒議論當觀其天性忠孝以義理發為政事處黃氏日抄卷三十九
