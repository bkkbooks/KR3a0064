body:
  text: 黄氏日抄卷七十七宋黄震撰申明入浙東提舉團結申省照㑹狀照對近凖省劄今措置團結亭丁事當此時難未寧團結為急領命之後即日夕究心實緣亭户積年不得本錢逃亡已多今春饑困之極相挻作過所在騷動被殺傷者數多及官府捕斬與逃竄山谷者亦多沿海亭場委是大叚狼狽本司首行招集繼即撫諭令其親到本司當靣散還舊欠本錢六十一萬三千五百五十八貫二百五十文十八界官㑹方得亭户漸次回家雖人丁稀少頓非前比而流離歸復漸成生聚方此作急團結非常時止将見在人户便可團結者比也所合先申朝省照㑹俟候團結了畢即便以實具申某雖庸懦非才而承準管幹不敢不以其實申省寛鹽課狀三月十七日恭凖省劄今某置司慶元專一團結亭丁者照得沿海亭民積年被官吏推剝並不曽有本錢到亭戸之手反日事鞭撻倍數取鹽以此亭民不勝其苦流亡大半徒有季侍郎虚復祖額空見文移今嵗饑荒無所謀食官吏酷虐如故於是萌等死之心所在相挻為盗殺傷死亡者十居二三及官兵追捕迯竄與官司施行不存者又十居其二三見今雖一靣招喚作急團結諸場委是敗壊殘零見存無幾區區欲望朝廷特寛鹽課期限兩月免行督責容某一靣多方招集流亡散還前此未散本錢再新整頓鹽課候見端緒别具申聞必先有於此寛恤流亡者再歸方得團結就緒四月十一日凖省剳照得浙東黄提舉以團結亭丁乞特寛鹽課兩月合議行下剳付本司特與寛展鹽課壹月仍於向後䟎補凖此申免茶鹽分司狀照對本朝常平茶鹽一路置一提舉官各州置一主管官脉絡相闗事無不辦本路近因晚剏慶元府分司為分司者皆是小官赫然自振監司之體吏卒數百牌匣專人紛然四出亭户田廬剝賣既盡無以應其誅求則又預将鹽倉所管亭户將来合得本錢先自私借分擘名曰文慿錢本錢既充文慿鹽課惟事刼取以致流亡大半課額頓虧至今年春遂群起為盗矣分司吏卒不惟刻害亭户尤更荼毒百姓凡編户稍有衣食之家無不括類姓名預入網羅待有私鹽徧行通法獄子承勾錢動以萬計况於案吏抑又可知以致被害之家不至於淪洗罄盡不止年復一年田里蕩柝至今春而貧民亦四起相挻為盗矣近者恭覩朝省将茶鹽法盡復祖宗舊制斯民欣若更生某以一介䟱庸適當其時偶然承乏充提舉官遂即布宣徳意将分司吏卒汰而遣之訪求所謂文慿錢等諸色之弊革而絶之凡亭户本錢及綱梢水脚錢等皆散而與之應有行移盡照祖宗舊制付之主管官慶元府通判㕔亭户之伶仃僅存者近幸漸漸復業編民之被苦無訴者亦無不感戴聖恩惟是省罷分司明文至今未凖行下分司羣小磨牙揺毒以伺覆出竊照世道不古官吏之害民者固多矣所在害民惟分司為甚盖縣之官吏害民民戸可以訴之州州之官吏害民民户可以訴之監司監司之官吏害民䑓諫可以覺察惟分司庇身於監司之下而肆志於州縣之上不特人户赴愬之無所抑亦朝廷覺察之不及古語所謂雖佛出也救不得惟自朝廷明賜省罷盡與掃除尚可少甦民瘼以救根本區區欲望鈞慈痛念時艱深體國脉特賜檢今年三月一日寛䘏指揮盡還祖宗舊制速将慶元府分司省罷劄本司照應使人户曉然知分司不復再置庶幾羣小退聽而百姓安心不勝公私之幸申已斷亭戸徐二百九等照對某三月十七日凖尚書省劄子置司慶元府専一團結諸場塩丁出時塩丁飢困挻亂千里驚擾某即時布宣徳意盡還亭户舊錢遍榜撫諭招集又得沿海制司到處捕斬戮其首而赦其餘及制使陳尚書觧任之後某又據鳴鶴鄉羅㑹龍舉訴鳴鶴鹽丁為首未追之人某即追到為首徐二百九次為首葉三千四兩各各行斷配永鎻水軍寨大榜撫定其餘應随從借粮之徒各仰安心着業更無追擾訖即此一畨擾亂亭戸死於制司之捕斬及死於編民之讐殺及見行拘鎻諸寨者已不下二百餘人其餘趕逐墜水顛踣道途飢餓而死者又不可勝計亦非小變矣近来諸場塩丁忽又喧傳䑓部受豪富詞状行下制司欲差大軍追捕謂官司元行為不信人懐等死出語無状事之虛實雖不可知萬一有之則亂者再起實於某先来團結撫定之事兩不相干在某亦安能再行招集前言不信撫諭無策所合先具申聞伏望鈞慈軫念時艱之定亂與承平官司之受詞事體不同特賜劄下所属申乞免塲官責罰狀照對某近者選辟場官多不肯就因考其所以然乃知諸場所趂者見額朝省所課者祖額額不及祖罰有科條祖額無可足之期鹽場無不罰之官或數年不得批書或屢郊方可叙復人多愛身故不就辟某謂此作法之弊求益反損而祖額所以愈虧也失今不救弊且愈極敢僣陳之夫所謂祖額者乾淳時亭户情願就賣之鹽數也方是時吏道清明風俗醇厚柴薪工食之費皆賤而七百七十足陌見錢買鹽之價甚髙編民一歲方有登熟之時亭戸無一日非其登熟之時天下生産作業未有樂於亭户者也故人人願為亭戸日日常有納鹽輻輳而至自然充溢朝省何嘗元有此數而求其足額也哉夫所謂見額者近年来官司敷派亭戸抑納之鹽數也盖自貪官成習風俗大變柴薪工食之價十倍疇昔折閱低减名曰買鹽之㑹百陌不曽入手編民或祖孫屢世不識官司亭户無一日不受官司杖責天下有生之類未有苦於亭户者也故逃亡已過大半存者饑困為盗苦楚而得日就虧少朝省雖嵗嵗坐下祖額何嘗一歲能强其稍就髣髴也哉以某今来親考其實雖其見額尚是近歲俗吏揑合之虚名而况祖額豈可每歲坐定監官之實罰盖鹽額之虧久已狼狽季侍郎劉侍郎諸人為提舉官自詭興利以媚時宰差刻薄少年行推排虐政掩逃亡而不言抑見在以増數甚至餘姚局章支鹽行石堰西場以上岸山地水田推排鹻地鹽袋亭戸賣上岸之産以買納虚増之鹽産業既盡鹽無可買有如地名洋浦楊大卿諸族衣巾藍縷日来泣告者比比皆然以此雖近嵗之見額亦無一嵗曽及額矣况祖額乎事若不求其本而求其末何可望其有得哉某嘗觀先正楊龜山上書云臣嘗任蕭山縣令有錢清鹽場亭户多逃亡至追捕拘繫之盖鹽之入官一觔不過四五錢計其工力之費十不償其二三若以龜山此時虧折之奏安得再有乾淳盛時登羡之額正縁南渡以後護養根本民生樂業鹽額所以再登今當敗壊之極乃不思根本之計徒責今日以乾淳之課白䧟場官以無辜之罰使銓選注授之官望望不敢嚮而江湖乞丐之靡往往充權攝此曹得志如以虎牧羊亭户日益消則鹽課日益虧矣某所謂作法之弊求益反損而塩課愈虧者此也區區欲望鈞慈矜念空罰監官之無益徒虧鹽課之有害當此時艱盡除苛嬈見催不及元額者原情免問監臨自行侵盗者以實定罪乞丐之徒退聴正任之官盡職庶㡬平明之理且亦更化之助乞祠申狀照對本司十餘年来皆附紹興府兼管正以自季侍郎置皂冊獻羡餘之後不可自為司存今春鹽丁擾亂蒙被省劄置司慶元府團結鹽丁鹽丁既定團結既辦申乞將提舉司仍附紹興府兼管將某仍舊予祠未蒙從申念某見今病瘁兼旬飲食不進實已不可支持不免具狀控申欲望公朝特賜敷奏將某姑與祠祿以便將理下情不勝皇懼俯伏俟命之至辭免回司乞祠狀六月二十八日準六月二十二日尚書省剳子以某團結了畢令回司紹興府事某昨凖行下團結至五月十六日慶元紹興二十場團結帳冊先辦雖曽申乞回司繼因契勘本司自季提舉大更革之後不可自立司存撥附紹興府兼管已一十餘年縦是回司委難存立遂於六月初四日因台州瑞安府六場帳冊團結齊足申乞照季提舉更革以後定例仍附紹興府兼管将某仍舊予祠繼又於六月二十日再具状申乞分明今来忽凖前件指勘合日行下令某回司竊照某身備使令敢不惟命但提舉司附紹興府乃季提舉更革後一定難復之乆到提舉司再置専司乃今春因鹽丁擾亂一時暫令團結之將委今團結已畢若便回司将以何為司存某非不願遵禀委是無緣可以遵禀某疊凟鈞聴除已席藁待罪外欲望鈞慈洞案司存無可立之資檢㑹兼附有乆定之例特賜矜從某屢申将提舉司仍附紹興府兼管某今亦無復敢望祠祿惟有拱俟誅斥施行辭免除直寶章閣兼紹興府長史申狀七月初二日酉時恭凖六月二十八日尚書省劄子除某直寳章閣依舊浙東提舉兼紹興府長史某叨恩非分聞命震驚命出公朝所當遵禀有闗係合下行申明盖我宋所以立國者其紀綱有二在内以䑓諫為紀綱自宰相以下皆得劾之在外以鹽司為紀綱自宰輔出為藩府以下皆得劾之外之監司雖不可比内之䑓諫而闗係朝廷之紀綱則一也某人雖庸陋無比職則和預監司今若使兼紹興府長史是以監司而反為藩府之幕屬公朝合思所以為紀綱之計矣况自賈平章當國每以禮數之辭免黙覘人心之向背遂以彈撃大臣之地反為勸留大臣之首䑓諫紀綱幾於大壊幸而更化紀綱復存又自賈平章初為制閫収拾中朝斥絶之人假以淮甸監司之稱日入揚州之僉幕閫自同兼僉之簿尉監司紀綱遂至大壊目今閫事所不忍言某今日所承乏者内地之監司也紀綱幸而獨未壊者也若更壊之如紀綱何雖曰以宗王而出鎮異於尋常之藩府然監司之設原於前漢以六百石吏每秋分察郡國郡則今之太守也國則漢世親王之封建者也豈以親王出鎮而獨不在監司按察之數兼照宗王仁心大度世莫與比獨因貴重人莫得見地之奸豪展轉影旁以擾害吾民者宗王皆不得而知如填塞陂湖如豪奪民産皆本司所當究治正以時艱未遑檢舉今若與之為属其誰與理此又如民寃何且某若身在班底或見為他郡使某為紹興長史不敢辭也今見任浙東提舉而使某兼紹興府長史則决所不敢受也家都承前日自班行被命於紀綱無闗不當辭而反辭某見為提舉官於紀綱有闗若當辭而反不辭是使内地之監司紀綱又壞實自某始又如㢘耻何欲望鈞慈上念朝廷之紀綱下念小吏之㢘耻竟自選差見不為本路監司之官以任紹興府長史之職委為允當某既不為紹興府長史其直寳章閣恩命實亦不敢祗受所有省劄一道見寄留慶元府軍資庫外苐二申照對某七月二十三日凖尚書省劄子催某回司紹興府併供兼職某竊照此係兩事回司乃某始初申請兼見今置司湖亭止有水中亭子三間風雨飄揺不可居止移司人從口糧垂竭日夕焦熬豈不願早早回司實緣續凖兼紹興府長史之命某既係見任浙東提舉不當兼任紹興府幕属之職雖已詳具紀綱闗係之說申龥控辭未蒙行下所以雖欲回司而不可得有乞祠得罪而已今来再凖催促自當擇日回司但兼職决不敢受念某平生戇直必不可受而後敢辭徃歲曽差某充兩浙鹽事幹官又曽差某鎮江等三郡公田分司幹官某恐成害民力辭不受時相務在必行以威相臨尚蒙矜亮免差况今更化中外皆許直言敢望鈞慈念聖朝待士大夫以禮而匹夫不可奪志明賜劄下免令兼職不勝萬幸苐三申照對某三月初九日準二月二十九日省劄除某浙東提舉置司慶元府團結鹽丁巳於四月初一日據住司發到牌印管幹訖至七月初二日準六月二十八日省劄除某直寳章閣仍舊浙東提舉兼紹興府長史某以提舉忝預監司若為藩府寮属於朝廷紀綱有妨即將省劄一道寄畱慶元府具申朝省控辭未準回降間至七月二十三日又準尚書省劄子契勘催某回司紹興府兼供紹興府長史職事某即具申乞免兼長史即當擇日回司未準回降間又準省劄備坐勘㑹國家多事擇地避事不即到官如更違戾從御史䑓覺察令某疾速前去交割某竊照提舉官係浙東監司之列紹興府係浙東属郡長史又係紹興府属官某以紀綱有係所以雖欲黽勉拜命而不可得今蒙指揮以為違戾某委因有妨國家紀綱不敢供職分明士大夫可殺而不可辱匹夫不可奪志古以大夫之招招虞人虞人死不敢徃某實亦不敢徃分明若得免兼長史則朝聞命而夕回司矣即不敢擇地避事區區螻蟻之忱無以上格乾坤之聽甘俟御史䑓覺察申省乞免諸司委送照對某昨準省劄備奉聖旨指揮令某置司慶元府專一團結亭丁盖以亭丁挻亂急行招諭自此朝夕措置未有寸暇今来乃蒙省部諸司符牒紛来責令催督諸處州縣財賦竊照此事有不敢奉命者五盖諸處官司皆属省部應干公移皆可直達省部之尊正不待反借外司而後可行徒添轉摺有擾無益一也究其本源盖因舊来承平日乆間有各處期限不應以本司近在紹興間亦委令催其違限今本司見留慶元道途隔渉愈見稽違二也承平之弊每遇一事徧牒諸司互為程督繼又轉生枝節反牒帖添差通判聴等處追督諸司責其違慢自此諸司各以符移而歸之州州則合諸司之符移而歸之縣縣則盡以諸司本州之符移而歸之民極而至於民則無復可以轉行推托之地家破人亡亂階由此今為何時尚循故習三也近年文移太繁物極則反當此時艱人思報復只如紹興府管下縣道見有将帥司専人聚衆趕殺幸而不至於死者及有将催利部吏聚衆毆打至於狼狽幾死者方今行事所宜審重四也時事尚艱民饑無食一縷元氣在此數州急急保養猶懼不及乃有不干本司之符牒日下本司者紛如平時恬不知變則其他可知使人寒心五也載惟官雖有大小體時憂國之心則同職雖有内外奉公守法之心則一知而不言某為負國是用不避誅斥謹瀝血忱百拜控申欲望鈞慈念時艱之未寧思民岩之可畏自今痛革承平繁文之弊追復祖宗忠厚之澤應干各處文移止行下各處正行干繫官司乞賜劄下戸部農寺提領財賦所属照應文書簡約民瘼再甦不勝國脉之幸所有某狂妄僣言之罪乞早賜罷斥施行某不勝俯伏俟罪之至都省除已劄下户部司農寺封樁安邉所各從所申事理施行外劄付本司照應申免驅磨慶元府財賦狀準尚書省劄子備朝奉郎監察御史孫嶸叟奏黄五月十四日三省同奉聖旨節文陳存更鐫一官下浙東倉司理筭制司財賦錢米畢日勒回安吉州居住王安中汪大有錢牧劉嗣文各降一官資並放罷内大有罷新任遇赦未許放行注授仍下浙東倉司拘留委清強官驅磨團結省米上供苖米濟民倉米濟糶局米折變侵欺開具着落申取朝廷監索施行劄付本司某照得陳尚書四月二十九日已行離任訖汪制幹預於四月二十八日先已随司觧任曽到本司辭去訖此外除劉司理本司先曽按劾申乞且留在任已準省劄從申外今準省劄行下五貟數内所指拘留財賦官王通判錢僉判牒慶元府遵照省劄指揮施行但本職雖承乏暫為浙東提舉其見今置司慶元府實係本鄉既在本鄉實不敢驅磨本鄉郡太守帳目古稱居是邦不非其大夫而况邦侯此惟䑓諫可以論奏惟給舎可以繳駁若身居此邦見任此邦而任責驅磨此邦財賦之利病不渉私庇之嫌則犯苛刻之譏将何靣目立搢紳間正恐縱是驅磨人亦不信具申朝省欲望鈞慈矜察特賜鈞判改差無干礙監司不係本郡之官徑自驅磨施行以昭聖朝行法之公以全小吏㢘恥之節仍牒本府照應苐二申今月初十日準尚書省劄子入朱紅銀字牌筒珠字記内引到令某照已行驅磨慶元府折苖錢米及交承錢銀器帳目具申事某竊照此事緣慶元府實係鄉郡見今時暫置司慶元府又係見仕于鄉郡以鄉郡之人鄉邦之官而驅磨鄉邦太守之帳目人其謂何昨已瀝控真忱申乞改委欲望鈞慈檢照元申改委無干礙監司不係本土之官從公驅磨以昭聖朝公平之治以養國家忠厚之脉以全小吏知耻守分之節公私幸甚湏至供申苐三申今月十七日申時準尚書省劄子入潜字號綠漆牌筒潜字記内引為本司申乞將慶元府吏黄浩改送無干礙監司驅磨本府折苖等及交承錢銀器等并根勘黄浩隠寄情節等事竊照某縁慶元府土人於驅磨慶元府財賦委有妨嫌其黄浩等家財已準省劄備後省所申以本司有私改委轉運司訖决不敢再有干預兼運司所行一則曰追都承吏二則曰追都承吏若本司果曽侵移一物一件則某當削籍投荒以為貪吏之戒若無侵移則今日在運司猶前日在本司秦晉匹也何以卑我而動以追吏相脅今為何時有此曖昧不决之事欲望公朝明賜施行須至供申黄氏日抄卷七十七
