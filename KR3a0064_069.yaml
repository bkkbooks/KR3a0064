body:
  text: 黃氏日抄卷六十九宋黃震撰奏劄戊辰輪對劄子咸淳四年七月二十一日臣一介底僚獲當輪對此正祖宗立法使微臣皆得盡言為聖子神孫慱盡下情之地臣雖至愚何敢不思報稱顧臣朴陋語言不知決擇惟陛下深念祖宗立法之意視此其事甘以臣言為不識忌諱特加垂聽焉臣聞人主當常存天下萬世之慮不當徒徇目前一時之安如以目前一時而論則陛下之所值何其可喜之多也如以天下萬世而論則陛下之所值何其可憂之甚也臣愚不敢泛引姑以至近之事為證先皇帝在御四十一年以言天灾則旱火薦臻江濤震撼國都幾無以奠枕以言人情則殿旅澒洞郡卒相挺赤子所在而弄兵以言狄患則殘金之虛喝未已降冦之反噬已至韃復以自古所無之暴飄忽南下極而至於投鞭斷江凡其變故幾無寧歲玉食不甘兢兢度日至今思之猶使人髮立神竦而自陛下踐阼于今五年天時常順人心粗定三邉亦無大警陛下自視孰與先皇帝乃幸而所值若此此所謂可喜之多者也然此正不可以為喜者也千金之子繼有世業猶當深思盛衰之變以力圖保守之䇿陛下今日所值之時果何如時也太祖太宗普天所覆之天下至南渡僅有其半髙宗南渡之天下至端平以後所能實有而籍焉者又幾止於半之半而又緣此民日以窮兵日以弱財日以匱士大夫日以無耻民窮之極至於浙右內地亦多私相殺奪一旦潰裂何以救藥兵弱之極至於所在尺籍多是閒民冒請脫有緩急何所倚仗匱乏之極至於州縣皆已焦竭大農猶苦乏支駸駸至於壞爛不可收拾至若士大夫又多狃於流俗漸變初心既欲享好官之實又欲保好人之名兼跨彼此之兩間自以和平為得計而不知幾成西漢之風矣蘇軾有言平居既無犯顔敢諫之士臨難必無捐軀狥義之人風俗至此最為可悲其餘貪叨小夫則又在所不足論者也夫以境土日蹙如此而凡所維持之具又日壞如此陛下試思如此不已患將安極此所謂可憂之甚者也向使陛下踐阼之初即如先皇帝早厯艱難則思其難以圖其易正自未必非福奈何承甚可憂之勢乃有適可喜之幸踐阼五年以來無一動容變色之慮居則惟見湖山歌舞之已久宫居服食之便安而凡京襄淮蜀之荒殘中原河北之狐兔未必關於念慮也出則惟見儀衛法物之塞途簾幃粉飾之夾道而凡驅逐出巷之啼號窮僻在野之愁歎皆不接於見聞也臣恐陛下真以目前一時為可安遂至於忘天下萬世之慮矣陛下聖性髙明聖學日新前古興亡洞在心目臣亦何敢遽謂陛下因其安而忘其慮蓋亦竊有所疑也自昔人主之能保天下者其要有四上祇天命下畏民碞外憂敵國而首以人言為脉絡凡其實有祗畏憂虞之心未有不驗於屈已受言之際先皇帝備經艱難而終保治安者亦以當時之人言動及危亡不惟不以為忤又能惻怛而聽信之爾頃者一再言官之出臺本末必非遷除之常也而或者已妄意其論諌不合一二輪對官之敷奏本末見有嬰拂之迹也而或者已相戒其無及時事夫事之有無既非臣之所得知言之臆度亦豈臣之所敢信及宗陽宫之建本一細事耳言者固未為知體陛下乃果一切不之聽陛下獨不思之宫之建否其事小而言路之通塞其事大耶使國家之事或有大於此者亦將侵尋自用付人言於不足恤而可耶國家唯以公議為元氣人主唯以納諫為盛德陛下春秋方富外間早有難於受諫之疑關係異日夫豈小故使陛下而真有祇畏憂虞之心當不若此此臣竊意因目前一時之安遂至於忘天下萬世之慮者也且臣轉觀近事已非昨比雖目前亦未可遽以為安而甚矣幸之不可以常得也陛下所幸者天時之常順而近者霖潦連月江浙多浸既雖開霽終不調適則歲事可憂矣所幸者人心之粗定而近者京城咫尺羣愚嘯聚既雖捕戮不過威勝則民情難保矣所幸者三邊之無大警而近者重慶為西蜀一線之脉既燬于火光州金剛臺為淮西襟要之口又燬于火况其造舟運糧忽又聞於諸閫之探報則邊情愈不可測矣夫此三者豈容併見設不幸年穀果荒饑民羣擾而又外冦乘之國將何以為國而今則皆有其兆矣陛下及此安得不超然覽聳然懼自畏目前之安而深為天下萬世之慮耶陛下而真為天下萬世之慮亦豈他有甚髙難行之說不過於民之窮兵之弱財之匱士大夫之無恥四者亟加之意而已民之窮雖已極陛下真以天下萬世為慮而亟救之則民可使立蘇何也民困於椎剝爾陛下斷斷自今視內藏封樁左帑為一家那朝廷之財補大農之闕而凡積缺虛數無藝煎迫之苦一洗之乃擇賢守令再整州縣則困於椎剝者立蘇矣否則大農不得已迫州縣以應宣限州縣亦不得已刻百姓以辨綱解雖日頒寬恤之詔秖屬空談誰能為陛下真恤民者陛下之民益窮而天下日趨於壞矣如之何而不早自慮也兵之弱雖已極陛下真以天下萬世為慮而亟治之則兵可使立强何也兵惰於閒散爾陛下斷斷自今飭內外軍將訓練無虛日所養必所用所用必所養而凡邸第占破市井買名之弊盡絶之仍詔臺諌官常切覺察則惰於閒散者立强矣否則管軍者惟事驅役營運而帶甲軍貧不聊生典郡者惟事刺賣名糧而廂禁軍大半游手雖特出招募之令反增虛費誰能為陛下練其兵者陛下之兵益弱而天下日趨於壞矣如之何而不早自慮也財之匱已極陛下真以天下萬世為慮而亟撙節之則財可使立裕何也財耗於冗費爾陛下斷斷自今內而宫掖近而宦寺燕飲非時之犒賜佛老無益之禱祠軍員占借之貼支吏祿寄名之預請人人而核之事事而節之極而至如養軍最為國家巨費又能不于其多而于其精乃總一歲之入酌為一歲之用則耗於冗費者亦且立裕矣否則取之盡錙銖用之如泥沙其入愈多其出愈不資縱他求理財之䇿不過適以自戕其根本誰復為陛下憂及後患者陛下之財益匱而天下日趨於壞矣如之何而不早自慮也民之日窮兵之日弱財之日匱三者臣皆察察言之已有所不忍士大夫者皆天民之秀天之所生以遺陛下臣亦何忍敢以無恥為言誠以國之所與立者以士大夫士大夫所能為國之與立者以氣節使氣節消靡而為和平則賢者幾成無益於人國此乃世道命脉之所繫社稷安危之所關非但如貪叨小夫可殺可辱不過一時一事之失而已也臣首願陛下恢張聖聽表屬直言以洗濯其晶明之質以養成其剛大之氣使視人間之富貴如浮雲而以天下之利害為切已社稷靈長終必賴此次願陛下精擇剛方有識之士專任銓曹甄别之權以博采當今之譽望以破去吏文之纒繞使廉能得以吐氣而貪鄙無所容奸功庸顯著將必由此又願陛下預於三歲科舉之前申嚴祖宗科舉之法以明白區處燈後之納卷以剛决痛戢游手之撓羣使真才不困從容達旦而兼人富民不以雷同假手而幸得則仕進各于其正又必權輿於此他若京學生歲補太學不過十一人又不過分取三歲一補之元額顧乃盡率天下而路使太半陷為流落不肖之歸漢人有言士修於家壞於天子之庭今世之士未及修於家而陛下之法先已壞之矣此亦士習根本之所繫也人才雖有次第先後之殊陛下皆當致其涵養作成之力否則士大夫之風俗既壞天下事豈不愈趨於壞而甚可慮也哉臣所以告陛下毋以目前一時為安而深以天下萬世為慮其所當慮而行之者雖不止此大要恐亦不出於此陛下於此行之果力使民之窮者立蘇兵之弱者立强財之匱者立裕士大夫亦一變而復其本然之天以為陛下懇懇切切相與維持則天時之已順者斯可望其常順人心之粗定者斯可保其愈定三邉之無大警者斯可捍禦使不至於有警蓋其所可慮者知所慮則於所可安者斯真可安爾臣狂慮輒發罪當萬死惟陛下矜察其至意明詔二三大臣擇其可行者亟慮而圖之臣雖獲罪萬萬無悔取進止第二劄臣嘗竊謂理學至本朝而後大明至先皇帝而後心契先儒朱熹大中至正之說至皇帝陛下而後力究先皇帝心傳面命之㫖凡陰陽造化之源性命心情之别儒生學士皓首窮經而未能得其要者陛下一一剖析曲當領會無遺真足以上繼堯舜禹湯文武之傳矣然此其講明也非其施行也自昔帝王之學始於格物致知者正將推而極之於治國平天下爾陛下上繼堯舜禹湯文武之學而未能逺復堯舜禹湯文武之治者獨何歟其世變之難遽返歟抑亦有害之者而然歟夫天下之說有真有僞有正有邪邪者未能洞照則正者非實得僞者未能盡絶則真者未精粹臣請為陛下别白而言之夫自有天地而凡流行於其間者無非實理自聖人出而輔贊天地而凡推行於其間者無非實用天地所賦之性我有之人亦有之我是以順而導之以能化草木鹿豕之羣為仁義禮樂之懿是之謂教天地所生之物我資之人亦資之我是以財而成之以能變茹毛飲血之俗為宫居衣食之安是之謂政二帝三王躬踐其精粹以淑天下其見之紀載者是之謂書先聖孔子條列其本末以詔後世其見之傳授者是之謂大學先皇帝之所面命者面命乎此陛下之所力求者力求乎此皆不待臣言而知惟願陛下靜思深考其間果嘗有一事之詭異否果嘗有一字之空言否人生果能外此而一日以有立否此其所謂正者也此其所謂真者也自昔聖人幾千年相續而得以成此亦已盛矣亦已盛矣豈復有毫釐之未盡尚待於他求哉夫何世變如輪無暫停息成之極即壞之漸治之餘即亂之初時則有飽食暖衣無所用心而不知衣食之所自來者遂至於忘吾聖人之恩出而肆其胸臆創為邪僞其初不過戲劇其後信為事實其發僅類訛言其末卒至流禍身被聖人之教而得其安乃曰不必教也身賴聖人之政而得其食乃曰不必政也心者人之所能與天地參二帝三王之治天下先聖孔子述二帝三王之治以詔後世皆本此心而彼乃曰心不可有當禁滅之如死灰而謂二帝三王之治先聖孔子之說皆皇降而帝之後衰末之事也彼其所以力排正大之說不過欲自售其邪僞之說而不知初無此事亦無此理也老子本一隱士死於中國秦失嘗往而弔之其事載於莊周之書甚明也邪僞者乃誣老子度關西去留道德五千言陛下試觀嘗有此事否也甚至黃帝本上古聖人葬於橋山漢武帝嘗過而祭之其事載於司馬遷之史可覆也邪僞者併誣黃帝乘龍上天名之為道家始祖陛下試觀嘗有此事否也其源不過如此其後附之為神怪者益不足辨是天下本無所謂道教也邪僞者架空也佛本西域國主之子厭世俗而求寂滅刻苦深山老病以死本無他異也中國邪僞之流乃緣之而謬為譯書誣佛為有丈六金身備極豪侈至謂能使盜賊小人之囑我者皆可轉而生天陛下試思果有此理否也下至達摩本佛氏破戒之徒憚檢律而肆無籍嘗入中國不遇故去亦無他說也中國邪僞之流又緣之而謬稱教列别傳誣達摩為能三蘆東渡隻履西歸而肆為幻妄壞佛本說至謂淫坊酒肆無非道場陛下試思果有此理否也其源不過如此其後假之而肆兼并者益不足道是天下本無所謂佛教也邪僞者架空也惟其本無是教而皆邪僞者為之也故其傳雖厯千載之久而其說終無一毫之驗如漢武帝之未嘗長生如梁武帝之莫能延祚滔滔皆是不勝舉也人惟生長習熟於其中信服既深致逺成泥愈不驗信愈篤如禱晴而益雨禱雨而益晴則諱之而不言及晴久而自雨雨久而自晴即貪之以為功大凡天人之感通止由至誠之一念豈有他術哉此其事之至顯而易見者猶且甘於自欺若此其餘乞福眇茫祈祐將來者益無可證是天下真未嘗有道教道亦初未嘗立教真未嘗有佛教佛亦初未嘗立教皆起於邪僞者架空而訛以傳訛愈降愈下竟不計源始之何如也厥今流弊之極棄父母而為之者半天下竭膏血而奉之者遍天下有家者弊於此而不可以為家有國者弊於此而不可以為國舉世為此紛紛不知正因何事陛下試又於此靜思深考其間果有一事之非詭異否果有一字之非空言否人生或如其說不婚不嫁不田不蠶人之類滅已久果能一日以有立否此其所謂邪者也此其所謂僞者也陛下究心於先皇帝心傳面命之學以上繼堯舜禹湯文武相傳之統必了然於彼邪者僞者之架空而後能粹然於此正者真者之切實於其正與真者快如沃心則去其邪與僞者易於反掌而致知格物之學真可達之治國平天下之效且又惟今之時則易然也何也前代之未能遽絶乎此者以愚民自入陷誘而流俗未易禁止也今民間不敢擅為僧道必待朝廷度牒此一機也前代以來之所未有也本朝前此之未能住賣度牒者以和糴於焉助本而楮幣賴之相資也今免糴既省造楮度牒亦可住賣此一機也又本朝前此之所未有也住賣不過三十年其徒皆已老死免其指脫下可以富百姓收其莊産上可以富軍國鼓鑄其銅像銅器又可使貨泉流布天下然此猶以近效言也鰥寡孤獨之類少而姦盜之罪省使人人得正其綱常凶愚吞併之根絶而寃訐之獄稀使人人得安於耕鑿無懴罪之說以誤民而閭里之所好皆真善無花鼓之戲以誨淫而喪葬之所行皆正禮千有餘年邪僞架空蔓延天下不可勝言之禍不動聲色銷磨就盡而使民俗得盡復唐虞三代之舊如四塞之雲霧净掃而再覩青天如積年之蛆穢盡除而重添活水開闢以來之竒事未有如此之大快者是陛下繼堯舜禹湯文武之學真能使天下復見堯舜禹湯文武之治而恢闢之功反更視之有光也豈不愈盛哉豈不愈盛哉惟陛下果斷而力行之取進止黃氏日抄卷六十九
