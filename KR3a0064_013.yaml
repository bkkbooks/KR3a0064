body:
  text: 黃氏日抄卷十三宋黃震撰讀春秋七定公名宋襄公子昭公弟諡法安民大慮曰定元年春王獨不書正者昭公去年十二月薨于乾侯定公今年六月方立時無國君正朔無所承也三月晉人執宋仲幾于京師傳載諸侯城成周宋不受功也先儒謂執人於天子之側罪反大於不受功者矣夏六月癸亥公之喪至自乾侯戊辰公即位秋七月癸巳葬我君昭公木訥曰昭公死於乾侯凡六月而後喪至喪至六日而後定公立存沒之命皆制於季氏定公襄之子昭之弟季氏廢昭公之世子衍及務人而立之宜其久而不決也昭公八月而葬其故可知矣愚按左氏載季氏葬昭公於墓道南孔子為司冦始溝而合諸墓九月大雩立煬宫岷隱曰甚矣小人之誣也昭公之出也以宋公之薨叔孫之卒歸之天及昭公之薨也季氏大雩以為媚立煬宫以為報蓋昔者昭公之逐季氏兩嘗大雩而不克濟季氏嘗致禱于煬公故小人得藉口以求媚而致報焉愚按岷隱之説雩雖祈雨古禮春秋世變往往非時而雩或者轉而為祈福之祀與若今季氏之雩又類淫祀神之所吐名雖雩而實則非矣木訥曰小人為惡內有不安則諂鬼神以要福季氏逐君天地所不容何有於煬公煬公伯禽之子自煬至昭二十二世矣神靈何在季氏疑得罪於周公伯禽故為之祀其子所謂媚竈者也宗廟有常制魯之廟已異矣成公立武宫固已違制今又立煬宫是魯祀八世也天子七廟而魯之廟八其可訓乎愚意季氏果以私禱而立煬宫未必增附羣公昭穆之廟或者武宫煬宫皆非禮創立亦同淫祀耳名雖煬而實亦非矣冬十月隕霜殺菽記災二年春王正月夏五月壬辰雉門及兩觀災注雉門公宫之南門兩觀者闕也門其主闕其飾皆天子之制而魯僭之天火曰災秋楚人伐吳傳載吳誘楚致師而敗之克巢冬十月新作雉門及兩觀魯習而不知其僭也天既災之又新作之三年春王正月公如晉至河乃復伊川曰晉以季氏上不告天子下不告方伯而私立公故辭其朝愚恐待晉之過厚也不獨晉無此意當世亦未嘗有此説也夾漈曰晉以昭公之子已長而定公不應立且朝事有稽故辭公愚謂此以其事而度之也岷隱曰晉之不仁甚矣昭公屢如晉不得入故有季氏之難定公新立至河而復不得入使定何以自立於魯乎愚謂此以其義而責之也木訥曰晉以魯權在季氏得公之朝不若得大夫之聘故寧屢却昭公定公即位非不知之徒以三年一朝之禮不可不講晉果却公故終定公之世不復如晉者懲此之辱也定公之為人知恥於昭公逺矣愚謂此以其情而察之也合此三説其理乃備而伊川之陳理尤高亦所當知二月辛卯邾子穿卒夏四月秋葬邾莊公傳載其好潔以夷射姑旋于廷命執之不得怒而墮爐炭死蓋立三十有三年以好潔而褊急自殞注云六月而葬緩冬仲孫何忌及邾子盟于拔皮八反左氏謂修舊好也先儒謂邾隱新立居喪而出盟非也四年春王二月癸巳陳侯吳卒陳惠公得國於已滅之餘幸晉楚交病立二十二年無事而卒三月公會劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之五月公及諸侯盟于皋鼬由又反左氏載楚子常求蔡昭侯一佩不得拘之三年既獻佩得歸如晉請伐楚故晉為是會以侵楚沈者楚之與國既滅而復封蔡憾楚故滅而殺之蓋遷怒也盟于皋鼬即會于召陵之諸侯前目後凡故不再序戴岷隱曰自鄢陵之後晉楚不復有大戰一旦有召陵之役六七十年間無此舉也天子之老元戎啓行中國諸侯大抵皆在未有若此其盛者僅侵楚而退自相盟於皋鼬當是時楚有可亡之勢失此機會使吳人乘其後而收入郢之功傾天下之勢折而入於吳中國之霸於是絶矣悲夫趙木訥曰威文以還會盟侵伐未有如此之衆且盛者晉定公非健主也一會而十有八國從之楚昭昏庸四鄰不親諸侯叛之於內吳議之於外故晉定一揮而諸侯雲合一舉而清南服誠反掌矣然晉政已移於六卿晉定公直一偶人六卿懼公勝楚而歸功冠五伯而權不及已故乞賂以離蔡假旄以賤鄭用散諸侯之心以隳其君之功而固其私至以十八國之衆才侵楚而已齊威以八國伐楚而楚來盟晉文以四國戰楚而楚大敗今三倍於威五倍於文才一侵而退定公蓋制於六卿而不能進也卒之救蔡敗楚之功乃歸於吳終春秋之世諸侯不振吳越爭長其機實失於此胡康侯曰所惡於前無以先後蔡侯視楚猶沈視蔡也沈雖不會召陵未有大罪惡也而恃強殺之甚矣木訥又曰昭公庸懦權出季氏未嘗得一會諸侯今皋鼬之盟定公得預聖人特書公及諸侯幸魯侯之復得及盟也杞伯成卒于會杞悼公立十二年卒六月葬陳惠公陳懷公以劉文公之命衰絰從戎反役而後葬許遷于容城高氏集注曰至是四遷微弱可知秋七月公至自會至自召陵之會劉卷卒注即劉蚡蓋文公也獻公之子定敬王伐楚不竟而卒蓋公忠者也葬杞悼公卒於行役以喪歸葬楚人圍蔡為其滅沈而報之也晉士鞅衛孔圉帥師伐鮮虞木訥曰晉伐楚諸侯之利而六卿之害故忌其成功晉伐鮮虞晉之害而六卿之利故荀氏士氏趙氏交伐以顯其績注鮮虞中山也葬劉文公集注謂魯往葬之而書冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績楚囊瓦出奔鄭庚辰吳入郢晉合十八國不能救蔡蔡求於吳而吳救之大敗囊瓦之師而囊瓦奔囊瓦即子常也已而入郢鞭平王之尸無禮備至蓋又子胥用於吳為父伍奢報私仇也申包胥初與子胥言子能復之我必能興之至是乞師於秦七晝夜哭不絶聲秦師乃出岷隱曰楚陵犯中國二百年中國不能制假手於吳國幾亡然去楚而吳繼之此聖人之所傷也五年春王三月辛亥朔日有食之公羊作正月集注曰正月亦辛亥朔夏歸粟于蔡杜氏注蔡為楚所圍飢乏故魯歸之粟趙氏曰歸粟于蔡懼吳也十八國諸侯不能救蔡而吳救之蔡圍既解魯南逼於吳以徐為障昭三十年吳已滅徐蔡若有言於吳吳兵一出直指魯郊此魯不得不賑蔡以悅於吳也不然蔡無一日之好於魯魯何乃踰宋陳二國輸粟以餽之高氏集注曰魯非濟其難而賙其無也蔡與吳為援而敗楚故魯畏而賂之也於越入吳杜氏注於發聲也范寧注於越夷言也劉氏曰於越其自稱也高郵孫氏曰越見於經凡六其三在昭公時皆稱越其二在定公時其一在哀公時皆稱於越蓋越有數種有東越南越閩越甌越木訥趙氏曰於越從其國之稱如於餘丘之類是也先師嘗以於為發語聲者為是蓋前説雖知越有數種不知孰為於越也先是昭三十年吳嘗伐越以賈怨故今吳入楚而越亦乘虛入吳六月丙申季孫意如卒此季平子逐昭公者也凡例之説以書卒為盛事因謂定公以上卿葬之書卒以罪定公愚謂死則書卒魯諸卿皆然意如之惡於逐君自見未必於書卒有褒貶且自昔君有明昏未嘗不書崩書薨士大夫有賢不肖未嘗不書卒此乃其常爾秋七月壬子叔孫不敢卒叔孫婼之子叔孫成子也冬晉士鞅帥師圍鮮虞木訥曰士鞅前日伐鮮虞今復圍之鞅欲立功鮮虞何罪六年春王正月癸亥鄭遊速帥師滅許以許男斯歸隱十一年鄭莊公嘗滅許其後得復凡四遷以避鄭常依楚自存今鄭獻公復乘楚之亂而滅之甚矣鄭之不仁也哀公元年許復從楚圍蔡則楚又復之與二月公侵鄭公至自侵鄭左氏載周儋翩率王子朝之徒因鄭人作亂鄭伐周六邑晉於是戍周公之侵鄭為晉討也止齋曰自宣公季年凡伐不言公魯無君將者八十年至是書公侵鄭則以公山不狃侯犯陽虎之專與木訥曰魯自舍中軍之後三軍皆隸三家公無一旅之衆今意如死定公粗有立復自將而一侵鄭其後侵齊會晉圍成皆以師行收兵之原蓋始於此愚合二説觀之則魯君之無兵三家之專也魯君之再有兵陪臣又強而三家不得專也其暫復兵權正其下陵上替魯之變愈降爾夏季孫斯仲孫何忌如晉斯者季孫意如之子桓子也何忌者孟孫貜之子懿子也傳稱斯之如晉為獻鄭俘何忌之如晉為陽虎強之往報夫人之幣也岷隱謂季孟不相下同倫相介意林謂二子為陽虎脅請於霸國秋晉人執宋行人樂祈犂傳載祈犂賂趙簡子楊楯六十范獻子忌而執之冬城中城木訥曰魯既侵鄭聘晉而不與齊懼有齊警故城中城備齊也中城在海州海州齊境季孫斯仲孫何忌帥師圍鄆齊取魯鄆以處昭公今魯圍鄆欲取之齊也七年春王正月夏四月秋齊侯鄭伯盟于鹹齊人執衛行人北宫結以侵衛齊侯衛侯盟于沙齊景乘鄭之怨晉而摟鄭與盟又乘衛欲叛晉偽執其行人侵衛假求平之迹而竊與衛盟時景公即位幾五十年厯晉平晉昭晉頃未嘗敢出爭諸侯今見晉定庸弱六卿擅政而耄年妄作凡再盟而得二國適開禍端爾止齋曰此相盟也諸侯無主盟矣故石門始相盟志諸侯之合鹹再相盟志諸侯之判蓋石門之後鹹之前皆有盟主非參盟則同盟無兩君相盟者也大雩旱祭齊國夏帥師伐我西鄙蘇氏曰魯事晉而齊叛之故伐我許氏曰東夏諸侯惟魯事晉故齊伐之然則齊不自量欲諸侯前日之事晉者皆事齊以繼伯業也九月大雩一時而再雩趙氏以為瀆冬十月書備四時八年春王正月公侵齊公至自侵齊二月公侵齊三月公至自侵齊注曰報前年侵我西鄙未得志再侵木訥曰非茍報西鄙之伐亦以鄆之在齊也然今日侵齊明日侵齊何益哉深其怨而已曹伯露卒高氏集注曰此曹靖公也自曹悼公卒其弟聲公野立五年而其弟通弒聲公代立隱公立四年而弟露又弒隱公代立是為靖公幸保首領餘皆略不書靖公子陽立遂為宋所滅夏齊國夏帥師伐我西鄙公會晉師于瓦公至自瓦齊報公之再侵晉師救我而公會之也秋七月戊辰陳侯柳卒陳懷公立四年卒此陳再復國之第二世也能聽逢滑之諫不從吳子之召晉士鞅帥師侵鄭遂侵衛鄭衛叛晉從齊故也木訥曰皋鼬一盟之後晉不能一出而主諸侯及齊乘隙盟鄭與衛晉方以兵爭故雖受兵而叛晉益堅冬又為曲濮之盟不事晉也葬曹靖公九月葬陳懷公曹五月而葬陳三月葬速季孫斯仲孫何忌帥師侵衛冬衛侯鄭伯盟于曲濮魯事晉為晉侵衛衛鄭叛晉益堅事齊之盟然齊未必能為謀主特諸侯散而私相歃耳從祀先公公榖及左傳注皆曰從者順也謂文公躋僖公於閔公之上為逆祀至陽虎為政改而順之諸儒多從其説惟馮山曰昭公至是始得從祀於太廟蓋季氏逐昭公公薨於乾侯及歸葬又絶其兆域不得同於先君而在墓道之南則其主雖久未得從昭穆祔祭宜矣及季孫意如卒陽虎專季氏將殺季孫斯始以昭公之主從祀太廟蓋欲著季氏之罪以取媚於國人此惟胡康侯趙木訥從其説二説未知孰是然馮山之説不必改從為順公榖之説不獨改字於事情亦逺若杜注特述公榖者耳盜竊寶玉大弓左氏載陽虎將殺季孫不克説甲如公宫取寶玉大弓入歡陽關以叛榖梁謂寶玉者封圭也大弓者武王之戎弓周公受賜藏之魯者也非其所取而取之謂之盜杜預注盜謂陽虎家臣賤故曰盜寶玉夏后之璜大弓封父之繁弱九年春王正月夏四月戊申鄭伯蠆卒鄭獻公立十三年卒嘗黨儋翩以伐周邑罪人也得寶玉大弓公羊曰國寶也喪之書得之書崔氏曰不索而獲曰得陽虎竊之無所用故復歸之也六月葬鄭獻公三月而葬秋齊侯衛侯次于五氏五氏晉地欲伐晉而次者自疑也或曰謀魯也張氏曰晉實大國未可輕伐始盟于沙中次于五氏又次于垂葭至哀公元年而後伐趙氏曰景公欲脅區區之衛以干大國亦見其非所以謀霸妄圖而已秦伯卒冬葬秦哀公秦哀立三十六年救楚吳厯晉三霸不犯中國十年春王三月及齊平夏公會齊侯于夾谷公至自夾谷平者平其前日侵伐之怨也既平而會以禮相與也左氏載是會也孔子相却萊夷辭野享齊人謝過歸其侵疆晉趙鞅帥師圍衛以其前日與齊師次于五氏而圍之也晉得其勇士涉他執之以求成於衛衛人不許晉殺涉他衛之從齊於是愈堅齊人來歸鄆歡龜陰田鄆齊所取以居昭公者也歡陽虎所挾以入齊者也龜陰則龜山之陰也三田皆魯之有而齊所侵齊既與魯平而歸之也左氏謂孔子却萊夷所致葉石林云夾谷之事匹夫之勇智者所不為而謂孔子為之乎晦庵先生亦嘗力辨此事為附會叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈音后郈叔孫氏邑也州仇叔孫武叔也何忌孟懿子也傳載叔孫成子欲立武叔公若藐嘗固諌公若為郈宰武叔既立遂使郈馬正侯犯殺公若既殺之侯犯以郈叛武叔懿子圍郈不克秋復圍郈不克賴郈工師駟赤以計紿侯犯以地易於齊侯犯奔齊齊乃致郈愚按郈叔孫邑費季氏邑成孟氏邑皆自封植於魯而其邑皆叛之昭十三年費叛至是郈叛明年成叛出乎爾者反乎爾也宋樂大心出奔曹宋公子地出奔陳傳載宋公使大心往盟晉而逆樂祈之喪偽辭以疾樂祈之子譖其將亂而見逐宋公入奪公子地之馬以豫向魋地抶魋而奪之公弟辰使地出竟以為君禮於是皆奔冬齊侯衛侯鄭遊速會于安甫集注曰三國皆叛晉而會此蓋結謀也叔孫州仇如齊州仇叔孫武叔也侯犯以其郈邑奔齊而齊歸之故往致謝宋公之弟辰暨仲他石彄出奔陳彄古侯反宋公嬖魋奪公子地與公弟辰先使公子地出境而辰為之請公弗止地乃奔辰曰是我廷吾兄也乃及其二大夫亦出奔宋景以一向魋而失二弟二大夫十有一年春宋公之弟辰及仲他石彄公子地自陳入于蕭以叛夏四月秋宋樂大心自曹入于蕭左氏曰宋公母弟辰暨仲他石彄公子地入于蕭以叛秋樂大心從之大為宋患寵向魋故也冬及鄭平叔還如鄭涖盟崔氏曰平六年伐鄭之怨既平然後涖盟趙氏曰昔魯親晉而鄭附齊故為晉侵鄭今魯與齊平而鄭睦於齊故為齊平鄭魯雖反覆齊晉之間然能塞怨窒忿平齊平鄭以成鄰國之好蓋亦休焉注叔還詣曾孫十有二年春薛伯定卒夏葬薛襄公薛襄公立十三年卒叔孫州仇帥師墮郈左傳載仲由為季氏宰將墮三都於是叔孫氏墮郈衛公孟彄帥師伐曹彄古侯反高氏集注曰諸侯叛晉而齊不能一之故衛伐曹木訥曰霸主不作小國相侵曹與衛何憾二年之間凡再伐曹其後宋出而乘之哀八年宋人入曹以曹伯歸衛實啓之也季孫斯仲孫何忌帥師墮費左氏載季氏將墮費公山不狃叔孫輒帥費人以襲魯公與三子入于季氏之宫登武子之臺費人攻之弗克入及公側仲尼命申句須樂頎下伐之費人北國人追之敗諸姑蔑二子奔齊遂墮費秋大雩旱祭之僭者也冬十月癸亥公會齊侯盟于黃杜氏注盟結叛晉黃齊地十有一月丙寅朔日有食之記災公至自黃與齊侯會畢而歸十有二月公圍成公至自圍成左氏載將墮成公斂處父謂孟孫墮成齊人必至于北門且成孟氏之保障也無成是無孟氏也子偽不知我將不墮冬十二月公圍成不克張氏洽曰墮三都毁其所恃以為固者所以制陪臣抑私家而復強幹弱枝之勢也仲由之舉此議蓋因南蒯侯犯之叛而為三家忠謀使強臣不敢恃強以叛君陪臣不敢負固以跋扈而上下皆順然侯犯南蒯皆以叛為季氏叔氏之害故郈費皆墮獨公斂處父方恃強以敗陽虎而孟孫用之故二邑雖墮而成獨不服雖定公圍之而卒不克也聖人雖用於魯而季氏三月之餘受女樂而違孔子孟孫惑於偽不知之説陰與公斂處父比成既方命而聖人去魯豈非天哉戴氏溪曰公羊謂孔子行乎季氏三月不違於是墮郈墮費學者承舛皆言夫子欲墮三都嗟夫使聖人而欲墮三都也成卒不墮費幾生變則聖人之謀疏矣綏來動和之功果安在乎左氏言仲由為季氏宰將墮三都是果出於仲由之謀無可疑也由勇而無謀率意所為不顧其難也故幾於亂當費人攻公及于臺下微夫子命申句須樂頎下伐之豈不甚危哉説者猶以墮三都為聖人之謀過矣趙氏鵬飛曰三都之叛三家患之則墮三都固三家之利也是以季路一言而叔孫墮郈季氏墮費而説者乃以為孔子為之噫聖人豈如是之謬哉公山不擾以費叛召子欲往蓋將教公山氏臣於季氏教季氏臣於公教公朝於天子以魯先之天下皆然是東周之從而興也豈茍為季氏墮費而滋季氏之勢乎此好勇不顧之謀蓋出於季路審矣故夫墮三都者為三家除患爾何益於魯三家病則魯之利三家之患除則勢復張墮郈墮費謂之忠於二家則可謂之忠於魯則不可至於圍成則失計大矣得之未必歸公失之實損於魯郈費之墮説者以為孔子此豈亦孔子為之與愚按叔孫邑郈季孫邑費孟孫邑成此三家植私以弱公室也侯犯以郈叛公山弗狃以費叛此又家隸效尤以背三家出乎爾者反乎爾也仲由乘其機建議墮三都故叔孫季孫樂於墮郈墮費不幸成之公斂處父私於孟孫孟孫亦中覺而不受其墮墮三都之事於是乎不及竟三都若盡墮豈惟三家除跋扈之臣公室亦除三家之窟所謂惟禮可以已之若善行之公室可復張也郈費之墮非公之能也叔孫季孫憤家臣之叛已而自欲除之也成之不果墮非公之不能也家臣與孟孫比而孟孫自不欲墮之也墮三都固子路之謀三都果墮亦孔子之願不幸事不竟世因以責子路譏定公而力言非孔子之心皆以成敗論也十有三年春齊侯衛侯次于垂葭注二君將使師伐晉次垂葭為援木訥曰九年次五氏今又次垂葭晉實大國齊不敢犯而必為是次何益哉夏築蛇淵囿許氏曰圍成弗克歸而力此何振之有趙氏曰成公築鹿囿昭公築郎囿定公築蛇淵囿一國而為囿者三且築而虞之芻蕘雉兔者何為哉大搜于比蒲比音毗三家分軍搜閲軍實以自固詳見昭公八年衛公孟彄帥師伐曹集注曰衛比伐曹以其不叛晉故也靈公志在軍旅不知以禮為國故亟戰如此詳見十二年秋晉趙鞅入于晉陽以叛左氏載趙鞅以求貢不獲殺邯鄲午午荀寅之甥寅范吉射之姻也故二氏伐趙氏而鞅奔晉陽木訥曰晉至定公六卿益橫勢醜力齊互相併吞趙鞅與荀氏士氏交惡而相攻懼不敵入私邑據甲以抗之據邑取甲是乃為叛聖人書叛傳者乃以為非叛吾所不曉冬晉荀寅士吉射入于朝歌以叛高氏集注曰二子因攻趙氏幾亂公室鞅既奔晉陽荀躒言於晉侯請皆逐之二子反以兵攻公不勝遂入朝歌以叛晉趙鞅歸于晉荀士者鞅之仇也二子既叛鞅遂以歸木訥謂鞅之歸非善也機也按韓魏為請而鞅歸三晉兆矣薛弒其君比薛襄之後比立不二年見弒必有得罪於國者十有四年春衛公叔戍來奔衛趙陽出奔宋傳載公叔戍以富見惡於靈公戍又將去夫人之黨夫人誣其將為亂故衛侯逐戍與其黨戍奔魯而趙陽奔宋二月辛巳楚公子結陳公孫他人帥師滅頓以頓子牂歸頓世役於楚定四年晉乘楚亂合諸侯頓亦背楚而從之故今楚滅頓夏北宫結來奔公叔戍之黨也木訥謂于時諸大夫紛擾三五而奔三五而叛宋華亥向寧華定奔陳復相率而叛邾庶其畀我及黑肱相踵來奔或竊邑以來樂大心一出四子從之其叛也五子為旅趙鞅一叛而三大夫角立其歸也二子出叛今衛之亂叔戍趙陽岐途而奔繼而北宫結奔魯公孟彄奔鄭是豈一一得罪於君相扼不勝魚貫而出又風俗之一變也五月於越敗吳于檇李吳子光卒檇李吳地吳伐越為越所敗傳載吳王闔閭傷將指而卒其子夫差使人立於庭出入必謂己曰而忘越王之殺而父乎哀公元年吳遂入越棲越於會稽公會齊侯衛侯于牽公至自會秋齊侯宋公會于洮張氏曰齊景公欲求霸合謀以救晉之叛臣范中行氏趙氏曰欲伐晉則不敢欲因荀士以攻晉則畏諸侯之譏首鼠不前徒會而返許氏曰齊宋魯衛崇奬亂逆大義亡矣天王使石尚來歸脤市軫反公羊曰熟曰膰生曰脤劉氏曰膰脤以親兄弟之國受脤禮也歸脤非禮也蓋魯不助祭而天王反逺使人歸脤王室益微矣衛世子蒯聵出奔宋蒯聵靈公之子也以靈公之妻南子辱國欲使戲陽速殺之不果而奔此左氏所載也劉氏權衡謂夫人惡其斥已之淫則啼而走言太子將殺余耳宋者南子之家也使真有其事蒯聵何敢奔宋常山劉氏曰靈公聽南子之譖致其出奔張氏洽曰自古讒婦之誣其子多矣考二劉之言知左氏所記乃南子之讒言非當時之實録也木訥曰不幸而為蒯聵亦難矣其奔也雖違父之命而不遺父之惡衛公孟彄出奔鄭蒯聵奔宋衛盡逐其黨故公孟彄亦奔宋公之弟辰自蕭來奔辰及四子皆入蕭以叛亂謀不遂是以來奔大搜于比蒲邾子來會公凡魯之搜皆三家自數軍實郈費既墮今搜而邾來會知公在行也城莒父及霄集注曰公叛晉而反助范中行氏故懼而城此二邑木訥曰一時而城二邑勞民甚矣不書冬缺文十有五年春王正月邾子來朝此邾隱公即去冬會公于比蒲者或謂欲來朝正故先會或云以會為未盡敬故來朝然此皆不可知鼷鼠食郊牛牛死改卜牛高氏集注曰魯不當郊郊牛死傷廢牛可也而改卜牛是違天也戴岷隱曰魯之僭郊自僖公始其説蓋可信僖公之前春秋未嘗書郊此其證也觀季孫行父請命于周而史克作頌則知請郊于天子亦如其作頌也然而魯之先公猶畏天災故因災而不郊者間有之若定之終哀之始連年鼷鼠食郊牛宜可以不郊矣而卒不免郊蓋玩習既久雖天災亦不知所畏矣張氏曰唐趙伯循言上元二年因避地旅於會稽時牛災小鼠噬牛才傷皮膚輒死二月辛丑楚子滅胡以胡子豹歸左氏載楚之入吳胡子盡俘楚之近胡者楚既定豹又不事楚曰存亡有命故楚滅胡高氏集注曰昭二十四年胡為楚伐吳吳敗其師殺胡子髠於是豹立而背楚楚之入郢也胡又俘楚邑楚人以是滅之而以其君歸先師亦嘗謂以小事大謂之畏天胡以小犯大而反諉存亡於命是紂謂我生不有命在天也紂且不免况胡乎夏五月辛亥郊木訥曰五月非郊之時以改卜牛也帝牛在滌三月至是養牲始成故五月而郊壬申公薨于高寢高寢宫名非正寢也路寢則正寢也木訥曰定公承昭公之後政在季氏粗能攬國柄親盟親會親兵魯民粗知有君賢於昭公逺矣一用孔子相夾谷之會齊人沮屈來歸侵疆惜乎用之不久抑亦天未欲平治天下乎孔子既行三家復張蓋權移於下已奕奕四世定公安能一旦而取之然比襄昭之世已十得三四不為無益於魯也鄭罕達帥師伐宋齊侯衛侯次于渠蒢直居反左氏曰鄭罕達敗宋師于老丘齊衛次渠蒢謀救宋也許氏曰宋大國也資王霸之遺業至於景公而鄭能困之則桓魋之為也齊衛救之而次渠蒢不誠於救也木訥曰宋鄭未嘗有隙今鄭伐宋左氏以為宋之公子地在鄭故鄭為公子地伐之也然地果叛宋而奔鄭宋不伐鄭幸矣鄭反醜正黨惡而伐宋乎終春秋之世宋鄭交兵自罕達之師始也齊衛欲救之而不前蓋齊景初求諸侯鄭先附之既而得衛得魯皆鄭媒之最後宋亦附齊前年洮之盟是也今鄭伐宋則失久好之鄭欲勿救則失新附之宋故觀望二國之間待其勝負而隨為之媚此齊侯之姦謀也不然渠蒢之次勿救不伐欲何為哉聖人惡其佞也故書次不書救不豫其無實而求名也邾子來奔喪木訥曰諸侯奔天子之喪子奔父之喪邾奔魯喪過矣然邾自昭公之世為魯所虐定公為拔之盟終其世不犯邾邾人德之故來會來朝又來奔喪禮雖過而情則真也大之比小春秋鮮能定公行之而邾子奔喪滕侯會葬推此以達之天下文王之事也説者皆責邾子之非吾於此見定公之仁也秋七月壬申姒氏卒木訥曰定公之妾哀公之母也母以子貴哀未踰年未成君故母不稱夫人不以小君禮治之故葬不稱小君八月庚辰朔日有食之記災九月滕子來會葬使大夫會葬禮也諸侯親會之非禮也是以事天子之禮事鄰國也丁巳葬我君定公雨不克葬戊午日下昃乃克葬高氏集注曰葬不為雨止而不克葬者無備也宣八年雨不克葬日中葬今日下昃乃葬則僅葬而失虞之時也禮以葬日虞辛巳葬定姒子未成君母不稱小君冬城漆漆蓋邾邑庶其以來奔者也今城之疑其二於邾也定公當昭公失國之後親征伐親會盟用孔子以相夾谷用子路以墮三都三桓為之稍戢公薨而哀公立三桓復橫然則定公其十二公之自立者與哀公名蔣定公子母定姒諡法恭仁短折曰哀元年春王正月公即位繼正行即位禮楚子陳侯隨侯許男圍蔡柏舉之役蔡以吳師伐楚入郢今楚圍蔡報之也隨自楚武王見伐之後不復見者一百四十餘年柏舉之敗楚王逃隨而隨芘之故楚今復列之諸侯定六年許已為鄭所滅此復見者亦楚封之也鼷鼠食郊牛改卜牛夏四月辛巳郊神不歆其僭而魯強用之也秋齊侯衛侯伐晉齊景晚年挾衛欲抑晉以代興次五氏次垂葭會于牽又次于渠蒢皆不敢伐晉今助晉之叛臣范氏而伐之圖回數年而行之又不以正可羞也許氏曰晉受衆伐霸統亡矣春秋之變至是而窮冬仲孫何忌帥師伐邾木訥曰定公之世撫邾甚厚邾亦事魯甚勤邾魯之好實出定公諸大夫不欲也故公未瞑目而城漆哀公即位席未溫而何忌伐邾明年三大夫並出而取其田以邾近於魯利其土地也二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田癸巳叔孫州仇仲孫何忌及邾子盟于句繹上古侯反下音亦斯季桓子也州仇叔孫武叔也何忌孟懿子也木訥曰哀公懦庸三家復張季孫將上軍叔仲佐之取邾漷沂之田田既入魯疑邾告於大國以加討故復要以盟之三卿將兵而盟止二卿者季氏強不屑與邾盟惟叔仲與盟也夏四月丙子衛侯元卒衛靈公立四十二年卒滕子來朝公新立故也晉趙鞅帥師納衛世子蒯聵于戚衛世子蒯聵以南子之譖出奔宋靈公卒南子欲立公子郢郢辭立蒯聵之子輒趙鞅納蒯聵于戚而不得入衛者輒以子拒父也孔子必欲正名者此也秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐵鄭師敗績鄭既叛晉從齊故轉粟以餉范氏以抗晉晉趙鞅者范之仇也遇鄭于鐵敗之獲齊粟千車書鄭師敗績者晉本世伯藉文襄悼公之遺烈喜其勝也冬十月葬衛靈公七月而葬父子爭國故緩十有一月蔡遷于州來蔡殺其大夫公子駟元年蔡以楚之圍請遷于吳中悔吳因聘將襲之蔡故殺公子駟以説言不時遷者駟之為也許氏曰蔡自殺駟上下危疑遂以禍敗三年春齊國夏衛石曼姑帥師圍戚衛輒以子拒父而又圍其邑大逆也此衛事也而先齊人罪齊人之主之也木訥曰晉為盟主而納蒯聵齊為盟主反助子輒以圍戚逆順判矣夏四月甲午地震記災五月辛卯桓宫僖宫災木訥曰自桓至定十世自僖至定七世諸侯二昭二穆與太祖凡五廟則僖桓當祧久矣久而不祧三家之意也季仲叔皆桓公之子而季友實相僖公叔仲之後皆僖公立之故三家尊桓而德僖宜毁而不毁而天譴以災非譴桓僖也譴三家也季孫斯叔孫州仇帥師城啓陽高氏集注曰魯懼晉故城啓陽自是連年四城木訥曰晉越齊衛而後至魯魯何虞而備晉蓋地在今沂州地近邾元年伐邾取邾田疑邾之伐我故帥師城邑以脅之此備邾也非備晉也宋樂髠帥師伐曹曹介於宋衛之間前年衛兩伐曹而不能克宋虞其卒併之也故亦伐曹其後宋再伐而圍之卒入其國執其君秋七月丙子季孫斯卒季桓子也庶子肥嗣是為康子蔡人放其大夫公孫獵于吳以其為公子駟之黨而放之也木訥曰蔡能保其止於吳乎保吳之為蔡拘獵乎不保也冬十月癸卯秦伯卒秦惠公立九年卒國無諸侯之事叔孫州仇仲孫何忌帥師圍邾前年伐其國奪其地盟其君今又圍之虐邾甚矣四年春王二月庚戌盜殺蔡侯申蔡公孫辰出奔吳左氏載蔡昭侯將如吳諸大夫恐其又遷也公孫翩逐而射之文之鍇後至射翩殺之逐公孫辰而殺公孫姓公孫旴或疑蔡殺公子駟放公孫獵翩必駟獵之黨也殺駟放獵諸大夫又恐其再遷則左右前後皆盜也木訥曰宣十七年書蔡侯申卒葬蔡文公至是方五世不宜與五世祖同名恐傳者誤也葬秦惠公五月而葬宋人執小邾子宋景公乘齊晉之衰陰有求諸侯之志故伐曹執邾夏蔡殺其大夫公孫姓公孫霍公孫辰之黨也晉人執戎蠻子赤歸于楚岷隱曰中國之不競未有如是甚者也執夷狄之君而歸之楚是京師楚也是晉為楚役也是率中國而聽命於夷狄也城西郛注備晉也木訥曰備邾也義見三年六月辛丑亳社災范氏注亳即殷也殷都于亳武王克殷班其社於諸侯以為亡國之戒記曰喪國之社屋之不受天陽然則惟其屋所以有災也孫覺曰諸侯建國皆立兩社其一國社其一亡國之社故左氏曰間于兩社為周室輔秋八月甲寅滕子結卒滕頃公立二十三年卒冬十有二月葬蔡昭公葬滕頃公蔡亂故葬緩滕五月葬五年春城毗注曰備晉也木訥曰備邾也義見前蓋晉未嘗伐魯夏齊侯伐宋先師嘗言宋景伐曹執小邾欲圖伯也齊景伐宋欲抑宋而代晉為伯也然齊景耄矣妄圖何能為晉趙鞅帥師伐衛集注曰衛不受蒯聵且助范中行氏故也秋九月癸酉齊侯杵臼卒齊景公立五十八年晚年因晉楚之衰勞於圖伯然助范中行氏則以臣而制君偕衛圍戚則以子而制父悖理甚矣世子蚤死及疾屬陳乞立其少子荼致羣公子皆出奔家亦不理矣此景公問政於孔子孔子對以君君臣臣父父子子與木訥曰齊景之世崔氏田氏高氏國氏皆橫而田氏尤專景公之為景公特魯昭爾景公得一晏子而任之故能忍昭公有一子家子而不能用故以忿而失國張氏曰景公身死國亂未十年陳氏移其社稷冬叔還如齊閏月葬齊景公叔還會葬也自九月併理閏月為五月而葬木訥曰喪以年計者言期不言閏以月計者閏亦月也六年春城邾瑕邾瑕者邾之瑕邑而魯城之也木訥曰魯城邾邑奪其險以要其服如城鄭虎牢之類也今城邾瑕而冬伐邾明年又伐邾以邾子來邾失其險無以抗魯也晉趙鞅帥師伐鮮虞高氏集注曰鮮虞納荀寅于柏人故趙鞅伐之治范中行之亂也木訥曰晉之伐鮮虞者五未見鮮虞之病晉也鮮虞逼於晉晉利其土地耳然五伐而卒不得則鮮虞亦非弱國也吳伐陳左氏載吳之入楚也嘗召陳陳以逢滑之言不從及夫差克越嘗修舊怨而侵之今又伐之以其在楚也故楚救之于城父趙氏曰吳固仇楚未嘗伐中國雞父之敗敗楚也今伐陳與楚爭陳也夏齊國夏及高張來奔蘇氏曰齊景無適子使國夏及高張立茶公卒陳乞將立陽生乃與諸大夫謀先逐國高許氏曰必奔國高而後陳乞弒君之謀得肆高氏集注曰國高從先君之亂命廢長立幼既又不能全其嗣君張氏亦曰力不足衛委君而出奔叔還會吳于柤趙氏曰吳既伐陳魯懼兵之及我也故往會之按叔還聘吳吳伐陳還至柤叔還遂致命于柤也許氏曰以魯政之不修而與吳親君子知魯之將有吳患矣秋七月庚寅楚子軫卒楚昭王立二十七年卒其初委政囊瓦寵費無極使賢人誅戮諸侯怨畔入郢之禍宫汙冡發賴申包胥之忠鬭辛由于之力迄得返國社稷再安及其死也不移疾股肱不越望祭河且兄弟多賢不以國為利命公子申為王不可則命公子結亦不可則命公子啓五辭而後許蓋其初子西先讓國於昭王故今昭王復讓國於三弟然公子啓亦終不取與申結立昭之子是為惠王亦盛事也齊陽生入于齊齊陳乞弒其君荼陽生雖長而荼少然荼已受景公之命為君矣陳乞乃召陽生立之而弒荼伊川謂此景公廢長立少以啓亂也陳乞即陳僖子陽生則齊悼公也冬仲孫何忌帥師伐邾元年伐邾三年圍邾今又伐邾三家同利邾而何忌為甚蓋何忌雖受其父僖子之命學禮於孔子彼其所志在威儀進退所謂此儀也非禮也初志已非雖親聖人而無益宋向巢帥師伐曹三年宋先以樂髠伐之未服故今又伐之曹在宋衛之間衛先伐曹宋乘齊晉之衰又妄意霸圖恐曹為衛所得故再伐曹以逞後竟入其國七年春宋皇瑗帥師侵鄭瑗于眷反鄭罕達侵宋七年矣齊次渠蒢不伐不救宋知齊之不我救為厚於鄭也故不敢報今齊景既沒宋妄意霸圖故既伐曹而又侵鄭報罕達之師且求諸侯也晉魏曼多帥師侵衛晉納蒯聵于戚衛輒以子而拒之今六年矣晉不能正其名納之而徒以兵侵非伯略也夏公會吳于鄫傳載公會吳吳徵百牢豫之蓋邾吳之與也魯將伐邾而會之然自是吳伐我矣秋公伐邾八月己酉入邾以邾子益來傳載入邾晝夜掠以邾子獻于亳社囚諸負瑕邾茅夷鴻請救於吳吳伐我齊亦取歡及闡木訥曰失歡失闡岌岌乎懼齊兵之臨其城也而亟歸之則不若初不滅邾之無是辱也宋人圍曹冬鄭駟𢎞帥師救曹木訥曰宋伐曹者再今復圍之利其土地也鄭於曹無隻介之好今遽救之報宋侵鄭之役也然則宋固為利鄭亦非為義也八年春王正月宋公入曹以曹伯陽歸左氏曰曹伯陽好田弋曹鄙人公孫強獻白鴈言田弋之説説之言政大説之使為司城言霸説從之乃背晉而姦宋宋伐之晉不救宋將還曹人詬之反滅曹蘇氏曰此滅曹也其不書滅言自滅也猶虞之滅言晉人執虞公而不言滅也止齋曰檜亡東周之始也曹亡春秋之終也夫子刪詩也係曹檜於國風之後於檜之卒篇曰思周道也傷天下之無王也於曹之卒篇曰思治也傷天下之無伯也吳伐我左氏曰吳為邾故伐我景伯造萊門吳人盟而還孫氏曰直曰我者兵加於都城也胡氏曰盟于城下也使有華元國佐之臣則不至此矣夏齊人取歡及闡齊之取歡闡及歸歡闡左氏皆以為季姬適齊悼公之故公榖以為因伐邾之故諸儒多從公榖胡氏曰邾子益齊出也魯以邾子益來則齊人取歡及闡及歸邾子益于邾則齊人歸歡及闡葉石林嘗辨左氏説非人情而公榖為近實歸邾子益于邾魯取邾吳既伐之齊又取其二邑魯得不償失故復歸邾子于邾秋七月冬十有二月癸亥杞伯過卒杞僖公立十九年卒齊人歸歡及闡齊為邾故而取魯邑魯既歸邾子齊亦歸其邑九年春王二月葬杞僖公三月而葬速宋皇瑗帥師取鄭師于雍丘雍於勇反傳載鄭罕達嬖許瑕欲外取邑以與之圍宋雍丘宋皇瑗圍鄭師每日遷舍壘合鄭師哭鄭罕達救之又大敗故宋取鄭師趙子曰凡悉俘之曰取劉氏曰覆而敗之不遺一人之辭也岷隱曰隱公時三國之師伐戴鄭莊伐取之左氏以為取三師公榖以為取戴由春秋書法觀之取戴為是入春秋以來書取師者獨於哀公兩見之蓋春秋用師微有節制故不至大敗及其末年用師無法彼此得以襲取愈變愈下矣夏楚人伐陳左氏曰陳即吳故也蓋時吳與楚爭陳頃吳伐陳楚嘗救之楚子卒陳無所依而即吳楚又伐之也秋宋公伐鄭鄭圍宋雍丘宋已取其師今又伐之甚矣冬十月書首月備四時也十年春王二月邾子益來奔傳載邾子益無道吳人討而囚之使大夫奉太子革為政益遂來奔益齊甥也故遂奔齊公會吳伐齊高氏集注曰吳欲求霸怒齊不服故伐之公會夷狄伐親鄰之國是助吳為虐而致齊之亂也先師王宗諭嘗言魯為吳伐盟于城下今又會吳伐齊是不能令而受命也僖與宣嘗用楚伐齊今哀又會吳伐齊用楚伐齊猶借之以釋憾今會吳伐齊直為吳之役而已助夷賊夏魯周公伯禽之風於是掃地三月戊戌齊侯陽生卒齊悼公立四年卒子壬立是為簡公悼公之卒左傳以為齊人弒之孫覺葉石林趙木訥皆不信其説蓋既謂吳伐齊齊人弒悼公以説于吳則吳子安得三日哭無此理也凡經傳不同者但當信經夏宋人伐鄭宋取鄭師又再伐鄭不義愈甚晉趙鞅帥師侵齊趙鞅以齊嘗黨范中行氏故侵之然伐喪甚矣五月公至自伐齊會吳伐齊而歸也葬齊悼公不及五月而葬國有兵冦而簡也衛公孟彄自齊歸于衛公孟彄以蒯聵之黨見逐晉納蒯聵于戚十年未得歸衛而公孟彄反先自齊歸衛木訥疑其叛黨事仇先師嘗言彄歸則蒯聵歸之漸也薛伯夷卒秋葬薛惠公薛惠公立十二年卒冬楚公子結帥師伐陳吳救陳陳間於吳楚爭陳故楚再伐陳而吳救之傳載吳之救陳者季札也札謂楚子期曰民何罪我請退以為子名乃還杜氏注札者壽夢少子壽夢以襄十二年卒已七十七年札此時能讓國至今當九十餘矣劉敞曰推驗其年札僅百歲以彼清高寧肯將亂國之兵耶似異時事傳附著為説耶十有一年春齊國書帥師伐我齊報去年春魯伐齊之役也傳載冉有用矛故能入齊師及孟之反奔而殿皆在焉夏陳轅頗出奔鄭頗破可反傳載轅頗賦封田以嫁公女有餘以為已大器國人逐之故出注大器鐘鼎也五月公會吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書傳載國書師敗身亡及公孫夏閭丘明陳書東郭書皆亡子胥諫吳王得齊猶石田而越之乘吳亦基於此木訥曰魯再會吳伐齊招夷以戕中國為惡大矣然公與會而不與戰吳強魯弱也秋七月辛酉滕子虞母卒冬十有一月葬滕隱公滕隱公立六年卒衛世叔齊出奔宋世叔齊傳謂之太叔疾云疾娶而嬖其娣孔文子使疾出其妻而妻之疾又誘其初妻之娣置於犂如二妻文子怒遂奪其妻將攻之訪於仲尼仲尼退而行曰鳥則擇木木豈能擇鳥然則文子攻太叔使出奔已甚也初使出其妻而妻之既又奪之曲皆在文子也高氏集注曰時政在大夫各欲自專故相攻相逐十有二年春用田賦左氏載季孫欲以田賦使冉有訪諸仲尼三發不對而私於冉有曰君子之行也度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣若不度於禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲茍而行又何訪焉弗聽葉石林曰賦不以田用田而賦舉丘之賦而加之田非正也陳止齋曰以丘賦一乘為未足又以田賦之也故曰斂從其薄以丘亦足矣田賦之者家一人也家一人管子內政之法也諸侯之益兵自齊始晉次之事在僖十五年襄陵許氏曰先王之法九夫為井四井為邑井邑未有賦也四邑為丘丘十六井乃有牛馬之賦今以丘賦為不足於是更用田賦籍井而取之不待及丘此非禮也蓋古者田有稅丘有賦稅以足食賦以足兵愚按經書田賦而三傳不言其詳諸家之説甚多惟前三説與左氏所載仲尼稱以丘亦足以田將又不足之説合故録之泰山孫氏謂賦者斂其財木訥趙氏謂賦以斂泉貨當馬牛車甲之入東萊吕氏謂哀公之用田賦又改法而重賦甚於稅畝丘甲之為凡此三説亦可與前三説參考何休注謂田謂一井之田賦者斂取其財物若今漢家斂民錢以田為率不言井者城郭里巷亦有井嫌悉賦之禮稅民公田不過什一軍賦十井不過一乘哀公外慕強吳空盡國儲故復用田賦過什一愚按此三説可與前三説參考蓋賦本車甲而左氏載仲尼之言云若貪冒無厭是于財貨而言不于車甲而言或者一井不能自備車甲馬牛之類而計田以率其泉貨與西疇崔氏曰賦與稅異稅以田為差賦以人為等卿大夫謂國中自七尺以及七十野自六尺以及六十有五皆征之鄭康成亦謂賦者口率出泉若漢之算民泉是以人為差也哀公用田賦以見古之不以田為賦而今以田為賦也此説與前大略亦通併録之以俟來者考焉東萊吕氏曰自宣公初稅畝井田之法由此而壞故言初至成公作丘甲丘甸之賦益以改作而民病甚矣至哀公用田賦又改法而重賦重於稅畝丘甲之為也此又通言魯加賦之始末夏五月甲辰孟子卒子者宋之姓昭公娶於吳同姬姓故諱而謂之子崔氏曰不稱夫人而曰孟子者當時之辭也春秋從而書之以見其實焉公會吳于槖皋秋公會衛侯宋皇瑗于鄖槖章夜反高氏集注曰會于槖皋尋鄫之會也會于鄖亦為吳故也木訥趙氏曰吳夫差躬敗齊師于艾陵魯故也魯以為惠故會吳于槖皋修鄫之好也鄖在今泰州吳地公既睦於吳而吳將圖伯故為之會宋衛于鄖合宋衛以從吳也齊固晉之仇今魯宋衛亦折而從吳晉其殆哉故明年為黃池之會晉好於吳非爭霸也紓吳患也然晉之屈吳之雄諸侯東嚮事吳者皆魯為之也四書公會吳繼書公會宋衛明年公會晉侯及吳子于黃池則魯之罪著矣宋向巢帥師伐鄭傳載宋鄭之間有隙地曰嵒戈錫子産與宋人為成曰勿有是及宋平元之族自蕭奔鄭鄭人為之城嵒戈錫以處之九月宋向巢伐鄭取錫殺元公之孫遂圍嵒十二月鄭罕達救嵒圍宋師木訥曰宋鄭之怨於是十有三歲矣雖其兵端啓於鄭罕達然六年之間宋四伐鄭明年鄭罕達遂取宋師于嵒逞兵不戢亦可戒哉冬十有二月螽木訥曰春秋書螽十有八皆在夏秋之交獨哀公之世書螽者二皆在閉蟄之後禮仲秋行夏令則蟄蟲不藏孟冬行夏令則方冬不寒蟄蟲復出此常燠之證也燠而螽生災異兩興也十有三年春鄭罕達帥師取宋師于嵒傳載宋桓魋救其師罕達徇曰得魋者賞魋逃歸遂取宋師于嵒泰山孫氏曰報雍丘之師也二國覆師以相償報其惡如此石林葉氏曰鄭取宋師獲其二大夫以六邑為虛則宋之免者無幾矣夏許男成卒許元公立二十二年卒公會晉侯及吳子于黃池黃池之會左氏曰先晉國語曰先吳公羊曰吳主會先言晉侯不與夷狄之主中國也胡康侯吕東萊皆曰言及者會兩霸之辭也陳止齋曰書公會晉侯及吳子雖兩霸之辭不書吳晉之盟終不以吳晉同主盟也愚按晉自定四年召陵之會合十七國不能救蔡不見經者已二十四年吳自是年冬救蔡入楚既而救陳伐齊得志中國亦已二十四年是時晉弱吳強固也然吳方在會而於越入吳之報倐至吳子倉荒刎其報者七人則內惕而不復固爭其先晉人恐誠有如左氏之言春秋所書之次第乃其實也不必求之春秋之外也木訥趙氏曰晉侯􅑱然在會諸侯無一介從之而吳亦才得魯而已何以霸為晉之所以會吳者非以為霸也忌吳之強也吳之所以會晉者亦非為霸也交中國也黃池之會固中國之辱然會以交華夷之歡弭兵革之苦是亦無患焉故內外皆以爵書無貶辭也愚按趙氏之説是也春秋不列敘諸侯不書盟此特晉吳二大國結好而魯預焉耳非霸也黃池晉地地譜東京開封縣有黃池楚公子申帥師伐陳楚嘗以子期伐陳而吳救之故陳與楚絶而楚畏吳強無如之何今乘吳之出會又使子西伐焉於越入吳吳出會黃池越乘其國之無備而入之也是年冬雖及越平二十年圍吳二十二年滅吳矣吳自棲越於會稽越日夜思報子胥勸吳伐越弗聽而反殺之故及也胡康侯曰吳嘗破越遂有輕楚之心及既破楚又有驕齊之志既勝齊師復與晉人爭長自謂莫之敵也而越已入其國都矣吳侵中國而越滅之越又不監而楚滅之楚又不監而秦滅之秦又不監而漢滅之曾子曰戒之戒之出乎爾者反乎爾老子曰佳兵不祥之器其事好還豈欺也哉秋公至自會至自黃池之會也晉魏曼帥師侵衛高氏集注曰蒯聵在戚十二年矣晉不能致討以納乃以范中行故而數侵之襄陵許氏曰師雖數出能侵而已益玩而頓矣此王霸道盡之時葬許元公卒於夏葬於秋不書月日略也或史缺也九月螽書災冬十有一月有星孛于東方泰山孫氏曰光芒四出曰孛不言所在之次者見于旦也文十四年有星孛入于北斗昭十七年有星孛入于大辰此不言所在之次者見于旦可知也盜殺陳夏區夫區烏侯反高氏集注曰夏區夫者徵舒之後也凡書盜者以人皆可得而執之也盜殺蔡侯申盜殺陳區夫當春秋之季世變之甚至於盜興而專殺國君卿大夫則亂已極矣區夫公羊作彄夫十有二月螽高氏集注曰去歲十有二月螽今年九月螽十二月又螽為災甚矣愚按左氏傳凡十二月螽皆以為司厯之過若以此月為蟲猶未蟄則以秋為冬差一時也民時亂而農功失矣司厯之過一至此乎天下寧有此理哉况螽乃災異非候蟲之常以時而蟄者也螽即蝗也蝗蝻在地冬雪乃深入今冬燠而有螽將蔓延為來嵗之災尤災之甚者也十有四年春西狩獲麟左氏載西狩于大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之杜氏注大野在魯西故曰西狩麟者仁獸聖王之嘉瑞時無明王出而遇獲仲尼傷周道之不興感嘉瑞之無應故因魯春秋而修中興之教絶筆於獲麟之一句所感而作固所以為終也張氏曰麒麟之於走獸猶聖人之於人出類拔萃為人物之法則者也故聖人之生必以四靈為畜包犧畫卦而龍馬出大舜作樂而鳳凰儀周公告召公曰耇造德不降我則鳴鳥不聞孔子曰鳳鳥不至河不出圖吾已矣夫然則夫子生於周末而麟出於大野以仁聖之君子天錫仁獸之應乃理之當然無足疑者韓愈氏曰麟為聖人出也聖人必知麟是以西狩之獲必夫子觀之而知為麟也然氣數之不偶固異於堯舜之盛而王霸之道方窮亦非文王麟趾之時是以麟雖為夫子出然獲於鉏商而謂為不祥以賜虞人然後取之其與明王不興而天下不能宗夫子何以異哉鄭夾漈曰麟獸之異者麕身犍尾狼題馬蹄五采黃腹一角肉腮春秋何以終獲麟適終也仲尼以哀公十一年自衛反魯而後述成舊章猶有詩書禮樂之事春秋其後及者也於是魯史之記適至獲麟爾仲尼取而述之踰一年而卒故於獲麟之後不及他事焉右哀公十有四年經終十六年仲尼卒二十有七年哀公薨杜氏注春秋止於獲麟故小邾射以句繹來奔不在三叛人之數自此以下至十六年皆魯史記之文弟子欲存孔子卒故併録以續孔子所修之經蘇氏曰自隱以來諸侯始專而五霸之形成獲麟之歲田常弒簡公專齊後二十八年韓趙魏滅智伯分晉而戰國之形成左氏傳春秋止於智伯之亡東萊吕氏云左傳終此溫公通鑑始此通鑑繼左氏傳而作也程子曰春秋因魯國之史而天地四時之無窮所以察其變遷而紀其差忒者無一略也中國夷狄之廣莫所以紀其交際而别其典禮者無一遺也以區區一魯史兼紀周齊晉宋諸國之事其尊卑小大統屬之序秩然無毫髮之不順盡書治忽失得陵替賊亂之變森然一循乎條理而無一之非法故曰非聖人誰能修之也蘇氏曰春秋始於隱終於哀何也自周之衰天下三變而春秋舉其中焉爾始也雖幽厲失道而禮樂征伐猶出於天子諸侯猶不敢肆春秋將何施焉其中也平王東遷而周不競諸侯國自為政陵夷至隱之世習以成俗矣然而文武成康之德在人心未忘也故齊晉相繼而起秉大義以尊周室會盟征伐以王命為首世雖無王法猶在也故夫子作春秋以繩之及其終也定哀以來齊晉既衰政出於大夫繼之以吳越橫行中國天下靡然日入於戰國是以春秋終焉由此觀之春秋作於五霸之始止於戰國之初隱哀適其時耳右先儒論春秋之大指也朱文公嘗謂十二公各不同隱桓時王室新遷號令不行天下皆無所主莊僖時伯政自諸侯出天下始有統一宣公時楚莊盛強夷狄主盟成公時晉悼公出楚始退聽繼而吳楚又入爭霸定哀時政自大夫出終春秋之世無如之何愚按此言十二國之時世變也若十二公之交於世者隱公初與宋伐鄭後因齊之求反受鄭賂而伐宋此反覆以摟諸侯之始也桓公成宋督之弒亂助鄭突之篡奪又不自量六求宋以平鄭宋卒不許復轉而仇宋其所交於當世者顛倒滋甚矣莊公忘父事讎以求昏於齊致哀薑復踵文薑之惡身死國亂二子殱焉固無足道閔公八歲而為慶父所立再歲而為慶父所弒真可閔而無可議者也僖公遭值齊桓晉文之霸會盟征伐一惟霸主是從文公昏怠凡霸主之會鄰國之好皆委之大夫魯於是始衰宣公以公孫遂賂齊立己之私恩終身事齊絶不與諸侯交成公以行父有歸父謀去三桓之私怨大舉伐齊盡反前人之事齊者以事晉襄公困於齊與邾莒之師晉悼公為之伐齊執邾莒晉平公與楚弭兵魯又兩事晉楚昭公伐季氏不克如齊如晉皆莫之救卒死乾侯定公用孔子會夾谷用子路墮三都盟伐皆親之差強人意惜其事之不克終哀公時楚衰吳強魯又始改事吳凡十二公之交於世者如此而其強弱始終之變亦可考焉黃氏日抄卷十三
