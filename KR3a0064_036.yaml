body:
  text: 黄氏日抄卷三十六宋黄震撰讀本朝諸儒理學書四晦庵先生文集三記髙士軒記取漢世髙士不肯爲主簿者名同安簿㕔之軒云士非有意於自髙然其所以超然獨立於萬物之表者亦非有待於外而後髙官書記先生爲同安縣學請於都督府方公得書九百八十五卷射圃記紹興二十五年同安縣有警先生與監稅曹沆備西北隅因作射圃蘇丞相祠記蘇公熈寕中辭王安石引㧞其後與李才元宋次道稱三舍人先生謂學者所宜師也爲之立祠漳州教授㕔記敎授之職難矣以爲易者則茍道也牧齋記孔子曰貧而樂又曰古之學者爲己豈以飢寒者動其心豈以挾策讀書者謂之學哉歸樂堂記爲朱彦實作也大略云或者怵廹勢利而不能歸或歸矣厭苦淡泊顧慕疇昔不能忘情豈知歸之爲樂或知之矣顧前日仕宦之所爲有不能無愧悔於心者於其所樂雖欲安之不能也然則仕而能歸歸而能樂者亦豈不難哉游御史祠記游酢字定夫建陽人明道知扶溝縣召公来職學事得其微言於是盡棄其學而學焉方其在徽廟初爲御史未幾爲郡江淮間退而閒居以卒楊龜山誌其墓所著書有中庸義易說詩二南義論孟雜解既卒四十一年當癸未嵗延平陳公爲郡始祠之學通鑑室記張仲隆有志與才新一室列通鑑其中日盡数卷求所以處事之方屬先生爲記而先生以仁之說進之愚觀先生嘗作序送仲隆謂聖賢言治以仁義爲先而不以功利爲急得非有見於其心術之偏而逆折其萌者乎南嶽游山後記先生與張南軒諸公共游將别破約賦詩又言詩本言志其流乃幾至於䘮志記其說爲戒轉運司蠲塩錢記福建塩息嵗入緡錢十萬以其一予漕司佐州縣用度且市貢金其二爲鈔法商人嵗輸京師錢六萬六千有竒其後鈔法中㢮因以委漕司而増其額它用之取具於塩者亦且数倍州縣至不能供孝廟臨御之五年詔免州縣逋負塩錢九十七萬又詔嵗入鈔錢三十二萬者罷之鈔額復祖宗之舊逋負捐累歳之積使州縣吏無所旁縁以漁獵其民遂爲記上蔡語録後記頃校定上蔡語録削去板本五十餘章後胡藉溪於吕祖謙得江表民辨道録則凡向所削五十餘章然後知爲江公所著云崇安縣學二公祠記清獻趙公嘗爲之宰胡文定其邑里人知縣温陵諸葛侯乾道四年合而爲之祠克齋記大略云性情之徳無所不備而一言足以盡其妙曰仁求仁盖亦多術而一言足以舉其要曰克已復禮克之克之而又克之以至於一旦豁然欲盡而理純則其胷中之所存者豈不粹然天地生物之心而藹然其若春陽之温哉此記爲㑹稽石子重作最明白當讀味道堂記爲何鎬叔京作也叔京之父少受中庸於東平馬先生取知味之說故名劉氏墨莊記劉清之子澄五世祖工部事太宗没無餘貲獨有圗書数千卷夫人陳氏指以語諸子曰此乃父所謂墨莊也其後子孫世以文章爲聞人而子澄尤篤志義理之學先生謂耕道而熟仁者將於是在盡心堂記范伯崇爲廬陵録事取王制語謂刑一成而不可變故君子盡心焉者以名堂先生記之云以風曉當世五夫社倉記乾道戊子先生與劉君如愚勸分以振其鄉崇安縣之荒俄而盗𤼵浦城乃請於郡太守徐公嚞得粟六百斛予鄉之人無復從盗王公淮繼之守是年冬民以粟償官命留里中而正其籍明年先生請嵗一斂散俾願貸者出息十二小饑則施半息大侵則盡蠲之王公報皆施行如章沈公度繼之又請倣古法爲社倉以儲貯云雲谷記地在建陽縣西北七十里蘆山之顛其入徑在安將院東牓曰南澗循澗北上里餘俛入薈翳多竒石懸瀑又北捨澗循山折而東行数百歩得石壁瀑布當中而下視諸懸水爲最長徑當其委跣掲而度北入雲谷谷口爲闋以限内外西循小山而上歴石池山楹藥圃井泉東寮折旋南入竹中草堂三間是爲晦庵東起層嶂右起小山而南峯出其背孤秀莫擬俯仰其間不自知身之髙地之逈直可旁日月而臨風雨也堂後結草爲廬稍上山頂北望俯見武夷諸峯作石臺名懐仙小山之東南出西下隠隠見山前村落作臺曰揮手南循岡脊其上小平曰雲社其徑之東曰西寮行東峯至絶頂平處俯而四瞰面各数百里連峯有無逺近環合彩翠雲濤昬旦萬狀非世人所嘗見也絶頂北下則爲北澗矣盖此山脊爲崇安建陽南北之境環数百里之山未有髙焉者耕山鈞水養性讀書彈琴鼓缶以詠先生之風亦足以樂而忘死矣名堂室記紫陽山在徽州先君子故家婺源往遊而樂之既来閩中思之不置以紫陽書堂刻其印章敬以所刻牓所居之聽事又其尉尤溪日自病卞急取佩韋之義名聽事東偏則取以掲之於寢晦堂者燕居之所也盖取屏山所嘗字而祝之說曰木晦於根春容曄敷人晦於身神明内腴示不敢忘先生之教堂旁兩夾室左曰敬齋右曰義齋盖讀易得其兩言曰敬以直内義以方外未知用力之方及讀中庸見所論戒慎恐懼得持敬之本讀大學見所論格物致知得明義之端而二者之功一動一静又有合乎周子太極之論也建康府明道先生祠記淳熈三年資政建安劉公守建康以屬邑上元明道先生少日宦游處也均田塞堤及民之政爲多脯龍折竿教民之意亦備而兵革變故風聲無復傳者奉祠致意而請先生記之先生謂上元之政於明道先生懼未足稱揚也然其言曰一命之士茍存心於愛物於人必有所濟則其中之所存又烏可以小大而議之哉婺源縣學蔵書閣記道之在天下固未有飽食安坐無所猷爲而忽然知之兀然得之者也故傅說之告髙宗曰學於古訓乃有獲而孔子之教人亦曰好古敏以求之江山縣學記邑有儒先曰徐公誠叟受業程氏之門人講道於家弟子常以百数拙齋記趙侯景明守臨川更造所謂秋聲齋者曰非予之拙則孰宜居之哉先生亦曰非予之拙則亦孰宜記之哉抑君子之學以其一而固也是以近於拙極其言則正其誼不謀其利明其道不計其功是亦拙而已矣趙侯之學盖將進此若予之拙乃其材之不足而何足以語此袁州濓溪祠堂記河圗出而八卦畫洛書呈而九疇叙而孔子於斯文之興䘮亦未嘗不推之於天若濓溪先生其天之所畀而得乎斯道之傳者歟不由師傳黙契道體建圗屬書根極領要而周公孔子孟氏之傳煥然𤼵明於斯世非天之所畀其孰能與於此静江府學記學立於唐觀察使李昌䕫其後廢爲浮屠之室者三南軒始斥而一新之袁州三先生祠記三先生濓溪二程也紹興初胡文定嘗欲加程氏以爵使列從祀其後建安魏掞之爲太學官又以其事白宰相且請廢王安石父子勿祠近嵗乃詔罷所謂臨川伯雱者議臣有能條奏前二議推之以及濓溪則三先生詞徧天下愚按嘉定間祠三先生罷安石皆已如先生之願望矣所謂事乆論定正理不可磨滅者非耶建陽縣學蔵書記讀聖賢之言而不通於心不有於身者猶不免爲書肆况其所讀又非聖賢之書哉建陽四賢祠記九江蕭之敏敏中宰建陽問邑之先賢得三御史而祠之曰陳洙師道曰陳師錫伯修曰游酢定夫敏中去不数年亦爲御史㑹稽姚寅耆宰邑復以蕭配之更榜曰四賢隆興府濓溪祠記謂先生之言其髙極乎無極太極之妙而其實不離乎日用之間其幽探乎隂陽五行造化之賾而其實不離乎仁義禮智剛柔善惡之際其體用之一源顯微之無間秦漢以下誠未有臻斯理者而其實則不外乎六經論語中庸大學七篇之所傳也江陵府曲江楼記張敬夫守荆州直學門之南鑿門臨白河爲楼其上大江重湖一目千里而西陵諸山亦隠見於雲空煙水之外曰此非曲江公所謂江陵郡城南楼者耶扁曰曲江先生爲發明曠百世而相感之意卧龍庵記庵在廬山五乳峯下劉君嘗隠居辟糓先生守南康屬崔嘉彦因其舊縳屋又縁名潭之義畫諸葛公象堂中既而又爲嘉彦記西原庵嘉彦嘗以耕戰之策干趙忠簡云婺源縣三先生祠記云既得日見先生之貎象而瞻仰之曷若遂讀其書求其指以反諸身而行之乎江西運司養濟院記尤公袤及趙公芮捐四方聘幣不以入於家合之爲錢三百七十萬買田千一百十一畆得佛舍廢址増屋并得故僧田六頃爲之韶州濓溪祠記自孟子既没歴選諸儒以論興復開創汛掃平一之功信未有髙焉者也鄂州社稷壇記社者山林川澤丘陵墳衍原隰五土之祗勾龍氏其配稷則止爲原隰之祇能生五榖者后稷其配風師箕雨師畢雷神則唐制所與雨師同壇而祀五者二氣之良能天地之功用流行於覆載間以育萬物而民生頼焉者崇安縣學田記三代士各受田而其入學也有時故自食其食至漢元成間乃謂孔子布衣養徒三千而増學官弟子員不復限以貟数其後無以給之而至於罷若崇安此田則藉浮屠之絶者五寺歸之學石鼓書院記書院在衡州唐人李寛所爲國初嘗賜勑額其後稍徙而東爲州學淳熈十二年潘畤復於舊基興書院漳州東溪先生髙公祠記髙公名登字彦先靖康游太學與陳少陽伏闕紹興初又與秦檜議不合去爲静江古縣被檄試進士潮州䇿閩浙水沴之所由檜聞大怒奪官徙容州屬疾自作埋銘奮髯張目而逝後三十年田澹爲郡愽士始祠於學新安道院記道院休寕宰祝汝玉所爲也道之得名正以人所共由之路而非無事之謂顧其名此乃若專取乎無事無乃出於浮屠老子之謂而汝玉未之思耶玉山劉氏義學記士大夫或徒歩至三公能毋爲州里災害則足矣上蔡祠記以生意論仁以實理論誠以常惺論敬以求是論窮理而直指窮理居敬爲入徳之門冰玉堂記曽致虛訪劉凝之舊居爲之繪劉凝之劉道原父子以陳忠肅嘗館於是也繪而侑之鄂州稽古閣記取足於心者佛老空虛之邪見邵州濓溪祠記祠舊以張九成侑潘侯燾始特祀濓溪信州大成殿記士子習熟見聞知有科舉而不知有學問跋䟦胡五峯詩初先生不出仕有浮雲一任閒舒卷萬古青山只麽青之句五峯譏其有體無用爲詩箴之有山中出雲雨太虛一洗塵埃山更好之句五年而先生聞之則五峯已死矣因爲之䟦愚按體立則用存體用未嘗相離士君子修身求爲可用於世此體之立也先生隠居讀書則用已在其中世之汲汲於利祿者體之不立用於何有五峯有體無用之說似合斟酌此先生䟦語有恨不及卒請其目之說歟䟦劉元城言行錄謂公授學於司馬公得不妄語之一言拳拳服膺終身不失故其進而議於朝者無隠情退而語於家者無愧詞愚按先生𤼵明元城不妄語極有補世教今世士大夫之議於朝者果皆由中之語否耶書潜虛圗後温公晩著此書及易說皆非全書今其全者先生謂贗本也今敵入洛傳令軍中無得驚動司馬太師家書麻衣心易後先生指其謂雷自天下而𤼵山自天下而墜皆無理之妄談謂一陽生於子月而應在卯月乃術家之小数謂破體煉之乃成全體乃爐火之末技謂人間萬事悉是假合又佛者之幻語盖湘隂簿戴師愈所著而托名麻衣䟦李少膺脞說三代正朔雖不改時與月而春秋紀春無冰則固以周正紀事也石林葉氏又考左傳所記蔡足取麥榖鄧来朝三事以爲經傳所記有例差兩月者是經用周正而傳取國史有自用夏正者失於更改也詩中月数多用夏正書金縢秋大熟亦是夏時此爲不改時月之驗甚明但孟子所謂七八月乃五六月所謂十一月十二月乃九月十月爲不可曉䟦黄本仲友朋說謂人倫有五而其理則一而友朋又所藉以維持是理䟦歐公帖歐陽公作字如其爲文外若優游中實剛勁䟦白鹿洞講義陸子静来自金谿先生率僚友諸生請爲之講而跋之云切中學者隠微深錮之病愚按象山此時講君子喻於義小人喻於利分别明白至今讀之令人竦動冝晦翁之嘆賞也象山之来游晦翁之請講友誼藹然豈復有前日鵝湖之氣象哉使象山更加之夀則極髙明而道中庸未必不與晦翁一也跋鄭景元簡六經於死生之際無述焉盖以是爲常事也獨論語檀弓記曽子寢疾事爲詳其言不過保身謹禮與語學者以持守之方於是見聖賢之學所貴重乃在此非若浮屠氏之不察於理而徒以坐亡立脫爲竒也書曽子後世傳曽子書獨取大戴禮十篇充之劉清之子澄集其言行雜見語孟他書者爲曽子七篇題法書今人不及古人豈獨此一事推是以往庶乎其能自強矣跋朱喻二公法帖書學莫盛於唐然人各以所長自見而漢魏之楷法遂廢本朝名勝亦不過以唐人爲法至於黄米而欹傾側媚狂怪怒張之勢極矣近嵗朱鴻臚喻工部者出乃能超然逺覧追迹元常於千載之上跋蔣邕州墓銘嗚呼世固未嘗無材也惟其生於窮荒下邑既無以自振而又知自貴重不肯希世取寵遂以陸沉下僚跋周元翁法帖楊者明州僧讀書至老不輟持論甚正常云農家有百錢斗粟之贏必謹蔵之與僧乃已民安得不貧故其住山不營土木不遣其徒出勾䟽曰吾不忍助民蠹也跋黄山谷詩杜子羙詩序有言虎搪突䕫人藩籬者䕫人正謂䕫州人耳而山谷詩乃有虎䕫藩之句今此頌又用躨躅字按躨跜見靈光殿賦且爲蚪龍動貎元無觸義不知山谷何所㩀也書楚辭恊韻後大招怊遽同韻王岐公亦用遽與昭同韻跋朱奉使狀金人䧟㑹稽李鄴以城降衛士唐某怒甚懐磚石狙擊不中被執至死罵不絶口越人義而祠之跋徐来叔歸師堂詩孟子之言正爲不知反求諸身者設非上智生知豈能不藉師友而獨得之哉跋吕舍人清溪類藁饒節者一旦毁削膚髪殄絶天倫諸公環視無一能救或乃從旁嗟嘆以爲不可及跋余岩起集謂前輩當官立事以強毅果㫁爲得近年風俗一變專以醖藉襲蔵圎熟軟羙爲尚跋曽仲恭文謂前輩文字議論雄偉故宣和之後建紹繼起危亂雖極而士氣不衰近嵗例以容冶調笑爲工無復丈夫之氣識者盖深憂之愚按先生當乾淳盛際所感歎已如此讀而深悲之併記以自厲跋辨志録伯恭作此書章責李和卿所次略不同跋卨侯行實天下事有其實足矣又使他人餙虚詞以賛之雖累千百言亦何所加於其實也哉跋程子禘說祭法言有虞氏宗堯非也茍非其子雖授舜以天下之重不可謂之父跋郭長陽醫書寸關尺之法郭公備載難經語而取丁徳用宻排三指之法以釋之竊意指有肥瘠臂有長短或未得爲定論經之所以分寸尺者皆自關而前却以距乎魚際尺澤今諸書皆無的論惟千金以爲寸口處其骨自髙關尺皆由是却取若與經文不合俗傳脉訣韻語直指髙骨爲關而分其前後爲尺寸隂陽之位似得難經本指然世之髙醫以其贗也棄而羞言之跋道士陳景元詩元祐間王仲至嘗薦景元使校中祕道書范醇夫極論其不可且引王韶章厚開邉時引僧自隨有經略察訪大師之誚今日豈可使館閣有編校大師耶跋向伯元遺戒自佛教入中國治䘮者一用其法在唐惟姚文獻在本朝則司馬公程張諸君子近世張忠獻始斥不用向伯元少受學於胡文定及啟手足親書戒子孫勿爲世俗所謂道場者書河圗洛書後明堂篇有二九四七五三六一八之語而鄭注云法龜文也則漢人固以九数者爲洛書矣跋呉道子畫所謂天龍八部者亦不免爲焦頭爛額之客跋韓魏公帖王荆公書皆如大忙中寫韓公未嘗一筆作行草勢書札於徳性相關如此跋沙隨帖離騷九章之欸與范増撞玉斗之唉聲皆近哀訓譍也亦作上聲故元次山有欸乃曲栁詩亦用此二字音靄襖近世乃有倒讀之者又或寫欸爲欵誤益甚矣書釣臺范公記文後人不容復措手中間江子我一記獨書嵗月最得體近乃有作記力辨嚴公非素隠者康節和明道詩云安知不是打乖人此言有味也跋集注杜詩注非蘇公作乃閩中鄭昻尚明偽爲之不養出母議嫁母非出也不可無服養之則築室於外銘贊講座銘四齋銘鼓銘皆先生弱冠主同安簿時之爲也後學可以自勵矣學古齋銘爲周嗣恭作敬恕齋銘爲陳師中作求放心齋銘爲程正思作皆切巳工夫之語亦隨其人之資而告之敬齋箴則先生自警者作聖工夫於斯爲至易五贊曰原象曰述㫖曰明筮曰稽類曰警學皆明古易之所以然復卦贊則君子體易之要道也六先生賛於濓溪賛其啟道之秘於明道賛其㑹道之全於伊川賛其守道之正於横渠賛其求道之勇於康節賛其窮隂陽造化之妙而微不滿於其忘物於涑水賛其極堅實博大之功而微不滿於其致知然則於斯六者學者宜何先曰以横渠之勇審伊川之正其餘可以次第通南軒賛許其王佐事業東莱賛稱其温恭君子聚星亭賛先生晩年道不行姑取陳太丘寔訪荀朗陵淑浮沉閭里粹然盛徳之事圗之賛之以自適然寔之孫曰陳羣淑之孫曰荀彧時皆隨侍擁寘膝前後皆背漢從操先生所以寓户門之戒世道之憂亦微矣表啟祝文謝表通啟皆和平直叙世之掇拾古語牽對爲工者可觀矣祝文皆以誠通神明不爲文祭文祭南軒云兄宜以是行之當時我盍以是傳之來裔其彼此相期如此祭陸子夀略云念昔鵝湖實初識面度兄不可遽以辨屈知兄必將返而深觀逮予辭官兄乃枉教相與極論道合志同碑銘行狀劉子羽忠顕公劉鞈之長子佐忠顕公守越破方臘守真定却敵與張魏公宻謀誅叛將范瓊魏公使川陜以爲上賔富平之戰争之不得果敗魏公退保興州子羽單騎出秦州用吳玠守和尚原卒全蜀境以蔽上流其後魏公入相大議北討使公察虛實公還言敵未可圗已而淮西軍果亂及論和戎非久計秦檜罷之歸遂薨龍學吳明可少客臨安一日聞士女傾都南下皆行哭失聲云宗留守死矣公爲嗚咽爲詩哭之語甚悲壯即日傳播郵亭傳舍處處題冩名以此顕觀文劉珙子羽之子也爲禮官時秦檜以符䜟議進諡其父不時徃其爲中書時繳還左降御史杜莘老之詔及力止楊存中爲江淮宣撫其帥湖南時平盗在政府時除福建鈔塩嵗額二萬萬罷江西和糴及廣西折塩米錢又蠲諸路積逋金榖巨億計知建康奏閣夏税六千萬萬蠲秋米十六萬六千餘斛臨薨戒不得用浮屠治䘮張南軒神道碑首言聖學不傳言理者歸佛老論事者騖管商近得吾敬夫而天下士乃知理未始不該於事而事未始不根於理次言公明復讎大義次言公歴仕爲嚴州奏蠲丁塩錢絹爲吏部奏罷發運均輸爲廣西經略奏以塩息什三予諸郡出漕司緡錢四十萬以半爲諸倉買塩之本半爲諸州運塩之費邕管斗入羣蠻中則爲之簡補兵備究買馬横山之弊奏革之爲江陵府捕姦民之舍盗者斬之簡閲兵籍以請得祠終年四十八直秘閣范如圭神道碑如圭字伯逹爲武安推官白其帥將斬人之誤曰柰何重易一字而輕数人之命爲秘書正字却敵使之館簿且手書抵檜曰公不䘮心不病狂柰何一且爲此若不改圗必且遺臭萬世通判荆南府不爲户部催積逋白後帥奏蠲之知泉州蠲屬縣負課十三四黄中羙不受張邦昌偽命移檄而去當時不約而去此者亦四十人旌忠愍節廟碑靖康時故簽書張忠文公叔夜以南道之師千里赴難事不就絶食死其後敵窺闗陜知同州鄭威愍公驤嬰孤城以死守二公衣冠皆𦵏信州之境紹興二年守臣永嘉王自中爲奏立廟請額云煥章王公神道碑公名師愈婺州人父䘮貧不得窆族欲火𦵏公號泣不食者屡日分教臨江郡守延僧杲說法獨不往聴繼南軒守嚴州乞免丁絹錢而止輸本色除金部使督諸郡積通緡錢七百萬公曰此錢徒有名耳督之未必有得而文移一下所擾者不知幾人持其事不下遂出知饒州郡嵗輸米十二萬石於建康後爲總所移他處道里之費無所取公力請無得改撥爲福建漕蠲汀州宿逋而下其塩直且損合解緡錢五萬留州以寛之義靈廟碑方臘之亂台守趙資道其丞李景淵謀遁去户曹滕公膺奮義死守卒全其城後又保南都守陳蔡云劉屏山墓表忠顯公劉鞈之子名子翬字彦冲嘗通判興化軍退居屏山下盡棄人間事自號病翁者十七年而終年四十七晦翁少從之游告以不逺復者吾三字符劉龜年放之後宰武陵部使者以治行聞於朝秩滿止詣銓注官而歸不一見丞相臨終召諸子告之曰觀星厯書吾殆止此汝曹勉旃毋爲門户羞令人羅氏常所服禮衣横帔如民間法安人王氏其夫范㴶閲具獄從旁曰毋憚淹晷之勞使彼負没世之寃也白水劉致中名勉之㓜入太學時蔡京方禁挾元祐書致中隂求竊讀棄録牒見元城龜山請業南渡後特詔詣闕秦檜不使見上止令試策後省遂謝病歸是爲晦翁婦翁且少師事之云魏元履名掞之嘗客衢守章傑家㑹趙忠簡公薨海上葬常山傑怨趙公又希秦檜意逮繋其家元履以書噍傑徑歸後以遺逸詔守太學錄異時學官不與諸生接元履日進而教誨之請廢安石父子勿祀而祀二程数以政事質責宰相罷歸特奏李君云臨事無隂據利便之心端明黄中字通老其先有名膺者自光州固始入居邵武至公十二世矣公初受族叔祖潜善奏䕃後舉進士第二名使敵回言敵治汴湯思退以沈介不言而公言之大怒三年而完亮入嘗對財賦半入内帑請悉以歸左藏有詔更以内藏激賞爲左藏南庫六和塔城宰相命逹官書四十二章經獨公不預翁蒙之爲常山尉郡守使搜趙忠簡家往来書䟽蒙之宻令焚之而後搜其後張晋彦以子孝祥魁天下忤秦檜逮繋獨罄家貲得白金百兩遺之此事合考孝祥本檜之客以罵道學而得魁郭份從事湖南運司有羡緡錢十萬欲獻之朝公曰此非可繼也督運常徳阻山溪輕装淺舟水陸俱進慈溪王庭秀女嫁任賢臣賢臣攝武昌有俸饋如真太守告其夫曰異時貧甚宜不聊生亦且至今日矣今幸粗足何以是自汚哉其孫爲任希夷石子重爲同安丞縣以旱請蠲租太守怒檄君杖主吏君移書太守曰杖吏細事耳所繋則大民今皇皇無以爲命縱不能救忍復箝其口乎知武進郡守欲爲寓第属役於縣君不可曰吾爲天子牧民豈爲若人治第者耶篤行趙彦逺名善應汝愚丞相父也生朝必哭於廟有欲爲禮者號泣向之其配李氏嘗刲股以愈姑之疾江介爲進賢令曰民飢而令食之猶子飢而母乳之也敢幸賞乎㑹詔蠲半租白部使者程大昌曰但減其半則整畸就盈全户輸一升者名減五合猶輸一升若自全户三升以下悉蠲之則貧民被實惠矣有㫖新沿道廐置君言廣西馬嵗不過三十綱綱不過五十疋新圗乃度爲容二百四十疋者亦何爲不察兵吏之盗其廪而必病民以豐其屋劉平甫名玶病翁先生之子補官餘三十年亦未嘗一日仕州縣世濟隠徳云黄洧清臣爲廣東運判罷官估除市籍蠲口賦十五萬蜑之役州縣者悉免之改使湖南凡非法取民如茶租如甲札如户帖如乳香如茶引一禁絶之黄瑀宰永春縣士子上謁者接之於學一毫之私不敢及平生非其義雖寒且饑不可得而衣食閩俗多火𦵏哀號不肯在臺與杜莘老相好其子名幹是爲勉齋先生括蒼潘景憲與東莱爲同年進士年髙於東莱而師事之子自覺登第曰此足以代我矣遂致其事左司張維南劔人每謂符離之役失於輕舉而人心終不以爲非四郡之棄急於休息而人心終不以爲是其治静江平易近民治軍甚嚴禱祠不于佛老將漕江東爲營屋二萬三千間先爲一間於治舍用是計徒庸爲左司曰都司助調鼎實幾微所關若是貼擬即渉筆書不問可否安用我輩耶宋若淵初有欲移公漕臺者公曰欺君誣祖吾不忍也嘗監永康軍衛江稅或勸獻其贏曰獨不爲後人計耶知神泉縣幅紙書負租民無敢後邑産黄雀嵗供諸司以百萬計公請罷之嘗因輪對請損宗戚嵗時賜予貴臣給使宣借百司吏禄之費金華潘畤自其叔父中書公良貴起家而命之官嘗知興化女官道士求勑額挾簽樞張說屬公上其事公不可興築洋城陳覇二斗門及木蘭陂以溉田嵗饑募客舟予錢傳糴而寛其期使私得一再往返入對乞蠲州縣民間舊逋而内出禁錢以補上供之缺常使户部支計有餘則州縣寛而民力裕矣廣南大奚山斗入海中以魚塩爲命時置都塩使者禁之公曰争小利起大盗將誰使任其責耶拒不行公娶李莊簡女而女嫁史彌逺以賢稱公常謂㩁茶鹽非古法不忍盡以律令從事李閣學名椿父升進士起家官至朝奉敵難以救父被傷卒公奉母南走年十五五十二方改秩以初任衡山尉繼爲衡州判官遂家於衡嘗見胡文定公退與其諸子言曰椿願天下人無不唯是之求張魏公知之遂辟以爲屬委以經畫淮甸張公嘆實材之難得公曰豈可厚誣惟不惡逆耳而甘遜志則庶其肯来矣張公再相公勸之去不忍决果罷公知鄂州墾荒田移廣西提刑罷所復昭州金坑移湖南運判賑糶損配数行部罷諸常從者所至州取吏卒使令除檢詳沮簽書張說所主買馬舍邕就宜及招軍殿最之說遷左司言三衙兵有用當益諸州兵無用當銷銷之之術死亡勿補它時一以御前兵分屯出爲湖南運副减桂陽月樁錢嵗萬二千緡而損民税折銀之直免户部配鬻乳香衡嶽廟火公言天實厭其非制請無復屋而築壇以望不報除農卿言朝廷户部自分彼此告借索還有同市道願革而正之兼臨安府奏巨璫及没入僧私宇三月解去知婺州㑹詔市牛筋五千斤公奏一牛筋纔四兩是欲屠二萬牛也上爲収前詔爲吏部侍郎與吏約所予奪悉䟽著令既行而未允重坐吏嘗奏保淮則楚州盱眙昭信濠梁渦口花靨正陽光州皆不可不守保江則髙郵六合瓦梁濡須巢湖北峽亦要地知太平州言和州惟利商筭輙穿支港以内舟首尾皆屬之江此自隳天險上亟命塞港六十九致仕再帥湖南賑荒撫軍力請應配者秪坐加役流髠鉗三年免毋黥湼使得自新免竄逸免逓送廣至恩召和氣議者笑其迂不行歸老衡之横塘居官儉而法官燭不入中門家人不用公家供帳方曽覿位使相竟不往謁有言太尉不奈李某何者曰誠無奈其不顧官職何生正夫正夫生大謙近尹京名芾者乃其曽孫婺源縢洙子璘初預薦以所得勸駕禮贖士族女之落倡家者范如圭伯逹胡文定甥在館論事與時相不合請奉祠十年張魏公行狀公諱浚字徳逺唐相九齡弟節使九臯十四世孫祖紘慶厯中舉茂材異等陳禦戎䇿欲以陜西河北河東割兵屬將父咸元祐舉賢良方正其後章惇因之罷其科更置宏詞公當二聖北狩馳赴壽聖於南京在維揚言敵且至汪黄不之信既渡江留吳門禦賊唱義兵誅苖傳劉正彦撫定淮盗蔣慶兵数萬請撫闗陜與劉子羽誅范瓊而行富平既敗用二吳保蜀朝廷遣王似貳公公奏似不可用辛丙劾罷公㑹敵入㓂復起公視師敵聞公用宵遁遂拜平章事撫沿江兵平湖㓂薦韓岳可倚大事劉豫入冦公排衆議却之徽廟㐫問至奏𤼵䘮興師酈瓊叛去公乞去而秦檜主和貶公永州公自永力奏和不可恃起知福州敵敗盟公部將劉錡成順昌之捷檜召錡還貶公連州居四年移永州檜誣公與李光胡寅等謀大逆凡賢士五十三人皆預獄上而檜死公因星變應詔言事檜之黨沈該万俟卨湯思退等復謫公於永又四年歸潭完亮兵至起公知建康用張子盖破海州之圍規取山東孝宗立欲用公而史浩沮之公力爭上用公都督公命李顯忠出濠州趨靈壁邵宏淵出泗州趨虹縣戚方將舟師出淮陽中原震動歸附日至顕忠聞敵大至引兵夜歸敵初無一騎過宿者素主和者因而抵巇湯思退令尹穡論罷公敵索四郡上復大拜公兼都督然猶用湯思退尹穡詆公愈力公再罷至死而王業終偏安祖宗百世之讎至今未之能復矣丞相陳俊卿莆人爲御史奏將不知有威士不知有恩劾湯思退楊存中罷之乞用張忠獻請減大禮浮費及冗官妄用隆興初參賛張公都督既歸㑹錢端禮起戚里駸駸入相公弗附端禮建國是之說公力詆其非端禮卒不相公參大政㑹洪邁述淵覿言鄭聞當除右史遂質於上出淵覿與同列劾奏洪邁姦佞斥之乾道四年大拜薦虞允文爲右相允文建請朝陵寢公議不合求去允文遂遣使竟不得要領而曽覿亦召還歴使相躋保傅士大夫莫敢有言者籍溪先生胡憲字原仲入大學與白水劉致中竊誦伊洛書揖諸生歸隠以特召入言敵必敗盟元臣宿將惟張浚劉錡在䟽入即求去先生父吏部公行狀諱松字喬年既脱場屋放意詩文既而用力於河洛之學以胡世將謝克家之薦得召試論中興事㑹張相去國時議欲撤兩淮之戍公力爭及秦檜主和公又力爭檜使言者罷公迄自請祠屏居建溪討尋舊學以終延平李先生諱侗字愿中劔浦人聞郡人羅仲素得河洛之學於楊龜山而從之游謝絶世故餘四十年㑹閩帥玉山汪公以書禮来迎卒於府治年七十一二子友直信甫登進士第羅愽文生嵗始用晬盤一無所顧獨前取性理書展玩乆之陳良翰請核兵籍以豊財用省堂選以抑奔競論湯思退姦邪誤國張浚精忠老謀及張罷而湯主和議敵大入幾不可支太學諸生数百人請召用公及胡銓王十朋等而斬思退王之望尹穡洪适謂之四姦思退等雖敗然邉備遂不復張天下至今恨之奉使朱弁先生族祖也靖康應募使敵與後使者洪皓誓守節凡十六年紹興癸亥約和公乃與皓及歴陽張邵同歸爲檜所抑卒於臨安府白龜池寓舍厝智果院後張定叟爲之遷葬積善峯下而先生狀之有聘游集公移南康公移諭民言寛恤之方教民修孝弟之行訪録先賢興修洞學注孝經庶人章使民持誦掲律文别籍條禁兄弟争財勸農纎悉於稼穡之事救災先切於流徙之戒納苖減市例減斗斛約束禁差夫抑打酒及社倉之條畫具焉浙東客次榜刺舉不敢狥情不許投書獻啟除永嘉秦檜祠移文略云究其設心何止誤國天不誅檜誰其弱秦尚使有祠無乃未講雖捐田以示濡沫恐出市恩然設像以厠英賢何以爲訓州縣牒州案已判須經通判職官方得行遣縣官逐日聚廳公共簽押然後施行愚謂必得其人可也否則事愈滯而廳吏各求賂矣漳州榜爭競些少結成仇讎細民如此已足嗟傷間有士人亦不免此何忍一切以柱後惠文爲事而不深求所以感發其善心者哉請自惟所訴或渉虛偽或無大利害仰早悔悟降心相從曉諭居䘮持服勸諭女道還俗及勸諭事目戒龍岩縣拒捕潭州諭詞訴條目必經書鋪必守限日諸廂収領不許隔宿街市作閙監納先下拳錢訴上户占據田業不拘入務南嶽寺觀山不許斫伐晦庵先生續集書答黄直卿書誤舉偽學人許令首正又書舉狀說不係偽學鄭明州欲薦潘恭叔對以必於章中刋去此語然後敢受鄭亦從之楊敬仲大不以爲然又書云前此學徒真偽難辨今得煆煉一畨夾雜者無所逃矣陸子静謂游夏不能盡棄其學以從夫子惟琴張曽晢牧皮真有得於夫子又書陳君舉門人曹噐逺来不免極言其學之非儀禮䟽義家鄉邦國四類已付明州人編入不應舉之說終所未曉試固未必得一試亦未害又書云今嵗欲便不應舉何其勇也然親闈責望此事恐未得自專二孫鉅鈞久煩教誨做得依本分舉業秀才足矣答蔡季通講論徒爲虚語臨事只是舊習某實懼焉廟議今廟不成廟即且依程夫子說自髙祖而下亦未爲僭極星福州只廿四度福州至此已差四度自此至岳臺只差八度豈非天旋地轉閩浙却是天地之中耶諸友相聚一日之間須着一兩時辰作科舉外工夫龜山語錄諸疑皆中其病然二先生語中亦皆有如此處必記者之失致曲者非致夫曲乃因曲而加功觀過者非觀夫過乃因過而觀理如何見得上下察是隠處當時便合引上天之載無聲無臭以明至隠之義不應却引鳶飛魚躍至顯之事爲言見得說不行此無可疑也八音金石爲綱領絲竹匏土包括於中革木無當於聲律但爲樂之節王朴不知變律之法自中吕再生黄鍾則因不得不爲黄鍾之半以爲清聲矣但今變半等律亦生於極其本則十三弦者皆黄鍾耳又前書云王朴以一爲正以一爲變未知變律之說故以其半爲清韓詩挈提陬維上文角根爲辰卯則此當爲寅位孟陬東北之維白鹿若無人主張讀書即有田亦無益耳擔子輕重他人不覺惟擔不起者自知之耳法噐都未見都昌一二人好資質念得蘇文熟了壊了見識又書法噐固不敢望着實讀書者亦少與蔡伯静天經孰若一大圎象鑚穴爲星而虛其常隠之規以爲甕口乃設短軸於北極之外以綴而運之又設短柱於南極之北以承甕口遂自甕口設四柱小梯以入其中而於梯末架空北入以爲地平使可仰窺而不失渾體史記厯書大餘之数第二年即差小餘之数第三年即差答劉晦伯浙東學者修潔可喜者多楊敬仲孫季和皆已薦之諸葛誠之兄弟亦時来相聚但我見太重小兒不知作文能入律否又書云欲招一人教諸孫須得兼通經義聲律不得已只能經義亦可韓文因方李申尊信閣本及舊本反將諸家校定者妄改考異一書專爲此發答劉韜仲督賦正是索千金於乞丐之夫亦無下手脚處不恤則得罪於民不辨則得罪於上官答趙都運今所謂理財豈復有義正是豪奪耳與田子真謂是者還是非者還非方是自然之平不别是非而但欲其平此元祐之調停元符之建中所以敗也答尤尚書袤龜山靖康論事頗多汪文編時楊家子弟避禍請刪去李侍郎不見故長編不載和靖論講和亦不可不載禹貢論得之開豁甚多歎服無已恨未見畫圖答江隠君辨精義入神云義者宜而已精猶察之云爾神則於事物所宜毫釐委曲無所不悉有不可容言之妙與鄭景實云仙遊故相葉公之爲縣月計所須令民以漸輸送故縣帑無餘積而月解無餘欠正當法此稍寛縣道愚往嵗見今端明陳公昉知慶元量月用以均之縣晏然無事其用此法耶抑暗合耶答劉徳修參同契絶無善本近校得一通令人刋行與方耕道謂幕客正要蚤晩從容宻罄忠益又云官吏縱弛亦當以漸整頓豈容一旦遽行商君之令乎答盧提幹力行其所已知而勉求其所未至則循循有序日有可見之效矣往坡帖與儲行之云過事有可尊主澤民者便忘軀爲之禍福得䘮付與造物陶通明乃陶隠居别號獨樂園詩作淵明字誤也吾黨例多困窮只得存活得過便是十分亨泰矣與方伯謨偶記楊敬仲答人書云恭惟某官讀聖人書既飽而嬉甚可笑然亦多着題也與陳彦忠易自伏羲始畫八卦文王重爲六十四作繋卦彖辭周公作繫辭爻辭孔子作彖象文言繫辭說卦序卦雜卦而彖象繫辭分上下是爲十翼舊說如此承問及之答李伯諫書云欽夫言仁及太極解屡勸其収起印板語孟解雖無鄉時過髙之失而寛縱草率絶難㸃檢通監綱目漢末接三國託其修南北朝屬張允善分修與長子受之云只勤謹二字循之而上有無限好事又云大凡禮数務要恭謹詳緩此係遣從吕東莱特跋跋魏丞相使敵國夫夀皇屈已和戎豈其獲已然非丞相夀春公之深謀壯節猶幾不足以成之豈興事造功之果爲不易耶答問答劉韜仲問栁下惠自信其直道而行不以三黜爲辱批云得之答李孝述問大學既知復慮而後得批定静安是未有事時胷次洒然慮是正與事接處又問一物未格便覺此一物之理與吾不相入既格之後便覺彼物之理便爲吾心素有之理批云極是玉山人浦城劉尉觀光出先世所得帖淳祐庚戍附刋建安與劉徳華允迪蒙喻義學記不欲但以勢榮禄利爲言故不復叙植桂之名餘篇皆南康詢荒政六經之文皆道秦漢以後之文鮮復關於道甚者害道韓文公始復古文而猶未必盡純於道我朝諸儒始明古道而又未嘗盡發於文至晦庵先生表章四書開示後學復作易本義作詩傳靣授作書傳分授作禮經䟽義且謂春秋本魯史舊文於是明聖人正大本心以破後世穿鑿凡例謂周禮周公未必盡行於是教學者非所宜先於身事一句無預提挈綱維䟽别緩急無一不使復還古初六經之道頼之而昭昭乎如掲中天之日月其爲文也孰大於是宜不必復以文集爲矣然其天才卓絶學力宏肆落筆成章殆於天造其剖析性理之精㣲則日精月明其窮詰邪說之隠遁則神搜霆擊其感慨忠義發明離騷則苦雨凄風之變態其泛應人事遊戱翰墨則行雲流水之自然究而言之皆此道之流行猶化工之妙造也程夫子有言觀萬物而後盡化工之妙愚故一一伏讀之而抄記如右孔子元氣也孟子泰山岩岩氣象也故孟子於議論排闢之間亦有隨時而異者而晦庵先生似之如荆公誤國東坡忠讜先生平日盖所屡言及汪玉山主張蘇學太過先生則又寜以荆公爲賢故讀先生之書者其别有三如語類則門人之所記也如書翰則一時之所發也如論著則平生之所審定也語類之所記或遺其本㫖則有書翰之詳說在書翰之所說或異於平日則有著述之定說在然議論固至著述而定若其欲復肉刑恐亦不可不審盖天下之義理無窮先生未嘗自足學者所當參考而謹思咸淳八年五月十一日後學黄震再書於臨川郡齋黄氏日抄卷三十六
