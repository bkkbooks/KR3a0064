body:
  text: 黄氏日抄卷七十宋黄震撰申明一初任吳縣尉本職事由縣乞放寄收人状開慶元年己未十一月今月十八日恭承府判東㕔到司疎決本司即無關束見監名件具申府判使㕔訖忽訪聞前官任内本縣曾将嚴七七浮留在弓手趙青家趙青見充本縣獄子寄留人元準本縣稱於本司無預某謂趙青既是本司弓手弓手家留人豈得言本司無預遂即喚上嚴七七取問因依據稱住居九都有田七畝盡典在李奉使邊已據李奉使邊稱欠租将上項典業作賣契折還即無升合少欠可以監還止因荘幹趙杞欺詐不滿今年五月初七日追解在縣七月半間移寄尉司經今八箇月不見天日元初同監三名内詹百三凌七五兩名皆已凍餓身死某驚惶哀痛因詢問本司老卒稱從來監租在尉司者即無生還為之泣下葢若監租合歸本保凡脱下尉司皆强幹以隂謀殺之耳是尉司乃鬼門關也清平世界臺府鼎立豈冝有此良可恠歎今嚴七七幸而遷延殘命得至今日合在踈決之數以元係本縣寄下前日門子人吏等不敢作本司監留人申聞踈决官未䝉决遣今謹将嚴七七一名回解本縣欲望台慈施照所申因依将嚴七七速賜區處疎放俾於兩人俱死之後獨得生還感戴使縣再生之恩無有窮已申縣解回續收人状今月二十二日伏準帖命押下陸五二監還章運使宅私租照得前政陳迪功任内本縣曽差本司弓手沈信監留李奉使佃户詹百二凌七五近皆相繼身死亦因監索人户私租遂至瘐死二人性命本合将沈信解提刑使臺依條斷治正以事關縣道方從輕就本司将沈信斷罪勒逐訖今來陸五二事體正與前件事體一同本司於理索法無干預屬今隆冬上司見差官踈決於法於理陸五二在本司皆不當祗領况兼引上本人見其尫羸凍餓行亦就死為幹者不䘏為吏者不䘏為官者豈敢不䘏謹具状将本人解回欲乞台慈施照所申将陸五二當㕔引上相視矜察别作區處施行申府乞免躬親擾民及理索状己未十二月洪𤼵運任内照對某不才試尉亦既踰月愧無毫末可益百姓而尉司循習舊弊反為第一非法害民之具為之毛髪洒析乆念申明稍從更革而人微位下言之未必見從積乆弊深怨者必将四起以故趦趄囁嚅不敢輕發既而重念時事方艱朝廷妙東賢監司力行寛大以救根本某若隱情惜已終不以告不惟負大府是亦負國今何時也忍不一言而坐視流弊之毒民無已哉某聞尉取慰安之義職在除姦以安良民頃自承平日乆姦豪玩法睚眦微隙必囑縣吏差縣尉捕所怨之家以快其私謂之躬親縣吏之利在尉躬親尉吏之利在尉躬親凡弓手人從之利無一不在尉躬親甚至為尉亦有自利躬親耆獨耆保日以擾閭閻日以困國家元氣坐是日以耗利在彼則害在此竊嘗譬之姦民猾吏漁獵者也假尉為鷹大網罟以魚兎其民而山澤焚竭矣可不惜哉法嚴弓手下鄉之禁慮其擾民也今縣催人户私租率差弓手是反授之以下鄉擾民之柄人户理索固官司所當與之主盟然非尉職也祖宗立法催官租止責耆保今以一人户訴催私租反差巡尉倒置甚矣况如府第强幹刻覈已甚民怨入骨豈堪尉司更助紂為虐動以捕賊者捕其民民亦如之何不胥而為賊獨不見德清縣頃歳降斗之事乎今非昔比尤當謹微又有一等不仁之幹復将已斷佃户就監元捕尉司情願不取其餘租而囚之至死以懼來者不知愚民無知惟利目前官府刑人於市或梟首以狥犯者尚且接踵安有隂謀瘐死其人而人不再犯者以故死者之肉未寒而筒者之項相望自昔至今不知其幾無一生還村民血屬類不忍其親之以尺檢惟有責状一紙即付浮屠家荼毗一聚煙而寃魂終萬古莫雪矣某到官旬餘即廉知其事始甚訝前此厯幾任官無一施援手者既而思良心易泯俗慮難除意者始見孰無惻隱之心未幾虞上司之督過咎死者之自取諉死坐之有定良心漸消俗慮為主乆則熟視而不之䘏矣此孟子見赤子匍匐入井之心有取於乍也某昨於乍見之頃即申明本縣未死者解回續至者不納已荷本縣一一領畧去訖推所自來亦皆弓手理索流弊遂至此極區區欲望台慈矜察今後除尉司本職公事及上司差委外自餘縣尉不許躬親弓手不許下鄉官民户催私租不許經由尉司遍牒所屬照會備牓本司遵守使尉司不為姦民猾吏日夜驅役以害百姓其於國家存䘏畿甸根本實非小補申提刑司乞免一路巡尉理索状庚申七月孫憲任内照對本司職在巡警及催綱運於人户理索法無相干某自到官承凖諸司及州縣送下人户理索私租帖牒日不下數四一帖牒動追數十家甚至百五六十家自二月入務及今六七月間理索帖牒送下不已某謂平心而論上户既不可欠朝廷之官賦小民亦豈可欠上户之私租頑頼成風固官司所當與之追理但理索自有司存若改之以屬尉司則過矣遂嘗條上十不可之説申明使司大畧謂祖宗立法催官租止責耆保今私租反差廵尉輕重倒置紊亂國法一也尉司所以捕盜租户自係良民今動以捕盜者捕其民民亦如之何不胥而為盗幾微當謹二也府第荘幹多取贏餘上謾主家下虐租户刻覈太甚民怨入骨往往結集拒捕頃歳德清縣降斗之事嘗煩官兵今非昔比尤當預戒三也强者既已拒捕所捕不過至貧至弱之民强幹不予解縣常例錢陰囑弓手筒鎖其家非獄之獄寃苦無訴四也弓手不許下鄉朝省屢有指揮正慮其擾民爾今乃差催人户私租是反借之以下鄉擾民之柄五也沿江制司新近行下抽回差出弓手盡行閱習為兵况可差令理索萬一覺察咎當誰執六也應人户理索不直曰欠租必曰占田或誣以搶截墓木買軍需布衲被奪與凡刼盗之類視官府所留意隨時影借為名脱送尉司紿令追捕迨其入手方理欠租驚惶惑衆今何時也而可有此七也尉之為義本取慰安良民今反為强幹猾吏嗾使毒民之具使人髮立汗下八也朝廷属時多事痛念畿甸前此被苛刻之苦妙東監司帥守力行寛大以救根本獨尉司理索一事遍擾鄉井紛然如昨使上之恩澤不下流小民怨嗟關係甚重九也尉司所防風火不測今弓手四出盡為人役萬一有本職不測事尉衙徒立緩急誰仗十也以上十説皆係的切之害未䝉施行間續又親見一項關繫民命重事今併由述以聞葢有一等㐫毒之幹復将已斷佃户仍押下元捕尉司託名監租而情愿不取其餘租囚鎖至死借之立威以懼來者不知愚民短見惟計目前名藩大閫刑人於市或梟首以狥犯者尚且接踵安有陰謀瘐死其人而人不再犯者以故死者之肉未寒而筒者之類相望自昔至今不知其幾無一生還村民血屬類不忍其骨肉之檢驗唯有責状一紙即付浮屠家荼毗一聚煙而寃魂終萬古莫雪矣豈不哀哉此事若非㧞本塞源将理索一事歸還司存使尉司不得毫髮干預則尉司之為强幹鷹犬為愚民䧟穽地乆天長寃痛何極區區欲望台慈矜察備給板榜下本司釘掛永不許干預理索以致囚死人命遍牒諸司及本府本縣照會或訪聞别處尉司亦有似此等乆弊併乞一體施行再申提刑司因理索囚死人命状壬戍六月余憲新到照對某開慶元年十一月到任首因根究本司循習乆弊受富室私囑擅自囚死人命事申明本縣隨時明白斷遣經今已兩年七箇月並無關留千百年坑䧟人命之地幸而一旦夷塞近因某被差往江陰軍催和糴米六月十五日方回司忽聞有顧四十等八名係本縣吏人樂松沈世等因富室顧宅訴鄰近盜米干繫事乘間關在本司弓手家已過一月一一飢餓垂死遂行根問只不曽經權尉取討交管又八名稱是一項盜米而前後兩状姓名月日並不參對欲行喚上各人面問則病已狼狽不可攙扶入衙門矣某痛念人命至大即時急急雇船權行載去著家聽候併将關留弓手重决軍杖五十訖某竊照朝廷張官置吏正為百姓理斷曲直前項顧四十等既被訴到官即合根究情實或斷或鎖或無罪者疎放皆可也縣吏樂松乃私以八人性命囚之一月至於垂死是直以陰謀殺之耳聖朝欽恤清臺起之小人略無忌憚一至於此又縣吏樂松繼将顧萬六押至本司拘管稱係以刃傷人斷杖六十若果以刃傷人罪何止杖六十若罪止杖六十何至再行拘管拘管者是又前日陰囚之故智也此項除已押回外所合備録開慶元年到任初𤼵覺從前囚死人命文状併申使臺乞賜矜覧嚴行備榜永永禁戢其於宣布聖恩鋤剔吏姦救活人命實非小補再申提刑司乞将理索歸本縣状同前照對理索事屬縣道法也二月入務後不許理索法也尉司不預理索弓手不許下鄉亦法也惟此邦風俗則全然無法某始嘗申聞使臺所冀風俗稍革近因差出回司乃知流弊復甚今者幸遇攬轡自天澄清伊始所合繳録元申使臺文状再述因依以聞始某到官聞此境百姓所在持仗拒捕及入僉㕔見所在申到殺傷公事多因拒捕甚切恠訝百姓之無知既而逐一詢究乃知激而成其拒捕者皆理索之强幹本非平江百姓之得已也在法十月初一日已後正月三十日已前皆知縣受理田主詞訴取索佃户欠租之日近年縣道並不曾喚上兩詞對定監還却聽强幹脱差尉司用乆例傍官行刼人名猊猲之船盛載軍器率五七十人為羣以追之每一户被追則一保被刼生生之計悉為一空既捕到解縣則斷訖再押下尉司託名監租强幹遂陰囑承監弓手飢餓殺之以立威鄉落以故鄉落之被追者但見百人往不見一人還其所以羣起而拒捕者非拒捕也為必死之性命争也追愈急則拒愈甚拒愈甚則追愈暴不獨田主租户交相敵讎而官司人户亦交相敵讎善良怵而為姦邪田里化而為盜賊風俗大壞關繫非小惟有復還祖宗舊制使縣道依舊任責催理則百姓可以復生病根可以預絶柰何為人之幹者㐫愚無知但欲多破主家費用方且越經上司張皇詞説大肆追擾以趣之此某所以日夕憂念為尉則力請上司以理索之職還縣道權華亭長洲等縣則自任理索一一喚上人户如期監還不敢諉其責於尉司而此境習俗既乆終不快意情願有田而不取其租反又情願陪錢以賊害其人此殆未可以旦夕悟今某六月歸自江陰有幹人王份者理索舊租凡十數引差本司弓手遍擾鄉落此何時也尚有此事無法甚矣所合具申乞賜台慈行下本縣収回元牒自行依條區處不許再下尉司仍牒主管轉運司照應今後應有理索徑自行下所屬縣道不勝世道之幸申轉運司乞免行酒庫受誣告害民状辛酉七月照對尉之為義本取除姦以安民今之為尉反或滋姦以害民葢其去民最近追逮必經其手而弓手百十輩又皆無頼小人非真能持弓挾矢防䕶境邑如朝廷始初置立之意不過紛紛烏合傍官生事以謀衣食故凡姦豪之欲快意於所怨者必借之以為毒如某於本司所見其最甚者有三其一曰强幹理索就監租户於尉司而陰殺之以立威村落其二曰兩詞互訴必屬差尉司躬親追捕以規破壞其家産其三曰閭里睚眦細故必誣告私沽買囑酒庫脫申上司牒尉司寄追以鑿空張大其事凡皆害民之甚者某到官驟見為之髪立汗下自念職在除姦反為姦豪嗾使毒民之具何以容身天地間於是首以理索利害申提刑司䝉遍行一路尉司不許理索復以躬親利害申本府又䝉矜察自此詞訟追呼不復差躬親獨酒庫寄追一事上關轉運使臺官卑路逺至今未得以利害聞雖今福星照臨姦豪屏息脱申之事比前頓少而病根未除朝夕在慮何幸明監司在上言之必荷除根敢因捧檄參臺之便百拜代一邑之民以告夫官各有司尉司有弓手所以戢盜賊酒庫有酒巡所以戢私沽兩不相及也果有私沽酒巡自足捕之私沽非强盜比正不待弓兵而後可捕也惟是吳門鄉落姦詐成風或富强吞併貧弱而不遂或破落欺詐善良而不從或甲家與乙家訟而借途假兵或東鄰與西鄰惡而設詞求釁去州縣既逺涉而證對又難獨私沽事乃以官而治民酒坊官又比近而易達因而誣告習以為常上司但見其公申而不知其被誣主管司但知有奉行而不暇於辨問及計置曹案脱差尉司則巡船猊猲义槍森列洋洋然視為利源誰暇復為之聲寃也哀哉斯民何辜罹此今年二月内有横金酒庫官馬提幹申馬千十一私沽行下本司追捕甚急及行追問所謂馬提幹即係土人馬千十二所追馬千十一即係馬千十二同祖親堂兄兄弟爭分見訟在縣故妄申私沽借威上司以助䦧牆由此觀之酒庫官尚身自誣人況脫訴於酒庫以誣人者可勝計哉兄弟間尚以私沽相誣況寃仇之誣告者又可勝計哉故凡實有私沽者皆酒巡自捕凡申上司差尉司捕者皆非私沽蕩閭閻之生聚壞鄉鄰之風俗戕國家之元氣弊莫此甚所宜痛革敢望台慈備榜本司併牒帖主管司酒庫官遵守使當此水災百姓不至重罹横擾且絶乆患永蘇民瘼國脉幸甚獨此申魏克愚不行申判府程丞相乞免再起化人亭状辛酉六月照對本司乆例有行香寺曰通濟在城外西南隅可一里本寺乆為焚人空亭約十間以網利邪説謬見乆溺人心合城愚民悉為所誘親死肉未寒即舉而付之烈熖权棒碎拆以燔以炙餘骸不化則又舉而投之深淵哀哉斯人何辜而遭此身後之大戮耶某乆切痛心每念革絶人㣲位下趦趄未發乃五月六日之夜風雷驟至獨盡撤所謂焚人之亭而去之其挾勢罔俗自詭視延聖壽之佛殿則固巋然無恙也意者此亭穢氣彰聞寃魂共訴皇天震怒為絶此根越明日據寺僧發覺陳乞為之備申大使府盖亦幸此亭之壞耳案吏何人敢受寺僧之囑欲為影傍抄注張本節節不住行下本司勒令監造急於星火某竊謂此亭為焚人之親設也人之焚其親不孝之大者也此亭其可再也哉敢以焚人不可之事百拜為大使府告某謹案古者小歛大歛以至殯葬皆擗踊謂遷其親之尸而慟之也況可得而火之耶舉其尸而舁之火天下慘虐之極無復人道雖蚩尤作五虐之法商紂作炮烙之刑皆戮之於生前未至戮之於身後也展禽謂夏父弗忌必有殃既葬焚煙徹于上或者天實災之未可知然謂之殃則㐫可知也司馬子期欲焚麋之師子西戒不可雖敵人之屍猶有所不忍也伍貟以父之讎嘗掘荆王之墓而鞭其尸貟之倒行逆施極矣然雖鞭之猶未至焚之也衛人掘禇師定子焚之平荘之上殆開闢以來所未有之恠事田單守即墨之孤邑當燕将下齊七十城之後積五年思萬死一生之計以激其民之奮死則襲用其毒誤燕人掘齊墓燒死人齊人望之涕泣怒十倍而齊滅燕矣然則焚其人之尸為人子孫者所痛憤而不自愛其身故田單思之五年出此詭計以誤敵也人子以此奉其親何耶尉佗在漢聞漢掘燒其先人冢故叛陸賈明其不然乃服與之要約亦曰反則掘燒王先人冡耳舉至不可聞之事以相恐非忍為之也酷吏尹齊為淮陽都尉所誅甚多及死仇家欲燒其尸尸亡去歸葬説者謂其尸飛去夫欲燒其尸仇之極也欲燒之而尸亡是死而有靈猶知燒之可畏也廣川王劉去淫虐不天其姬昭信共殺幸姬王昭平王地餘及從婢三人後昭信病夢昭平等乃掘出尸皆燒為灰無道之極去與昭信旋亦誅死王莽作焚如之刑焚陳良等莽亦旋誅滅董卓毒亂天下既誅燃其腹為炬不待盡燒人已醜之矣東海王越亂晉胡羯石勒剖越棺焚其尸曰亂天下者此人也吾為天下報之故焚其骨以告天地夫越之惡固宜至此亦夷狄之酷而忍為此也其餘誰忍為之王敦叛逆有司出其尸於瘞焚其衣冠斬之所焚猶衣冠耳惟蘇峻以反誅焚其骨楊𤣥感反隋亦掘其父楊素冢而焚其骸骨慘虐之門既開因以施之極惡之人然非治世法也隋為仁壽宫役夫死道楊素焚之上聞之不悦夫淫刑如隋文且不忍焚人則痛莫甚於焚人者矣蔣𤣥暉瀆亂宫闈朱全忠既殺而焚之一死不足以盡其罪也然殺之者常刑焚之者非法非法之虐且不可施之誅死之罪人况可施之父母骨肉乎世之施此於父母骨肉者復往往拾其遺燼而棄之水則宋誅太子劭逆黨王鸚鵡嚴道育既焚而揚灰於河之故智也慘益甚矣而或乃以焚人為佛法然聞佛之説戒火自焚也今之焚者戒火耶烈熖以為火耶自焚耶子孫焚之耶佛者夷狄之法今吾所處中國耶夷狄耶滔滔流俗誰與易之有識者為之痛惋乆矣今通濟寺僧焚人之親以網人之利傷風敗俗莫此為甚天幸廢之何可興之欲望鈞慈矜生民之無知念死者之何辜備榜通濟寺風雷已壞之焚人亭今後不許再行起置其於存念死生轉移風俗實非小補申提刑司乞省免西尉状壬戍汪提刑任内照對本縣部缺惟有一尉初無東西尉之分昨因本府無以應副江湖丐謁之士私立西尉稱呼使白帖慿空權攝白帖者又展轉張大其私白佔一兩間民屋私名曰官衙結集十輩破落私名曰弓手擅開木朱記一顆日夜生事擾民私名曰文引去天咫尺有此恠事使本縣人户一半不見天日哀哉何辜淳祐七年七月曽䝉本府禁絶且申朝省照會不一二年又為丐謁者經營囑託踵襲舊弊擾民如前某去年十二月内遂申前任判府王尚書已䝉散遣其徒将本縣所管界分照部缺盡令某正官一員管幹訖今王尚書既已解任某亦替去有日紛紛江湖實繁有徒将來必又有持闊匾稱西尉以毒吾百姓者㧞本塞源必得明監司申白公朝乞給省劄勒之堅珉庶州縣得以杜丐謁而百姓永永絶後災再申判府朱大參乞免再差權攝西尉状壬戌照對擾民之事莫大於白帖權攝權攝之弊莫甚於無缺剏員葢無正缺而差權官則白帖奸人永同正任此其為患無有窮已況巡尉之職尤異他官事無小大必經其手若以無請受之假縣尉用無庸錢之假弓手相與害民弊當何若本縣照部缺自國初至本朝有一尉二十年來本府無以應副江湖丐謁之徒私自剏名西尉慿空白差權攝公然與本司盡境並立使本縣管下百姓一半不見天日淳祐七年七月日䝉本府禁戢亦曽申朝省照㑹不一二年踵舊弊以擾民者如昨知縣不敢言曰恐妨本府人情也本司不肯言曰幸其分盜賊不測干繫也身為親民之官縁情便私坐視百姓之荼毒不為一言是誠何心哉去冬當飢荒之極百姓被擾尤為可念十二月十三日某遂申前政判府王尚書即䝉散遣其徒将本縣界分照部缺盡令本司正官管幹訖未幾王尚書解任某亦自念替去有日深慮将來又有以見缺為名脱漏書劄經營權攝者遂於今年三月内再行申明提刑司已䝉備申朝省訖今遇大參相公開藩之始除弊䘏民罔不在初所合具申照會黄氏日抄卷七十
