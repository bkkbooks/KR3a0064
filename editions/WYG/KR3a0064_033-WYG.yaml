body:
  text: 黄氏日抄卷三十三宋黄震撰讀本朝諸儒理學書周子太極通書太極圗説無極而太極以下詳太極之理此圗之訓釋也惟人也得其秀以下言人極之所以立此所以書圗之本意也盖周子之圗太極本以推人極之原而周子之言無極又以指太極之理辨析其精㣲正将以歸宿於其人而豈談空之謂哉象山陸氏嘗以無極之字大易所未有而老荘嘗有之遂疑其非周子之真今觀圗之第二圏隂陽互根之中有圏而虚者即易有太極之體也其上之一圏即挈取第二圏中之圎而虚者表而出之以明太極之不雜乎隂陽单言太極之本體也单出本體於其上初無形質故曰無極而太極所謂無極者實即隂陽互根中之太極未嘗扵太極之上别為一圗名無極也恐不必以他書偶有無極二字而疑之惟洞見太極之理以自求無愧於人極之立此則周子所望於學者耳晦庵講明無極此二字雖老子之所有而人皆知非老子之學象山辯駁無極雖斥其為荘老而人反譏其頴悟類禪學而禪學即源流於老荘此固非晩學敢議其寔老子之言無極指茫無際極而言周子之言無極指理無形體而言象山髙明豈不曉此一時氣不相下始為此言異時蔡東萊自悔鵝湖之㑹輙復妄發則象山之本心偏可知太極之理至精而太極之圗難状得晦翁剖析分明今三尺童子皆可曉遂獲聞性命之源以為脫去凡近之基本即盍反而實修其在我者矣或乃因其餘説或演或辯漫成風俗不事躬行惟言太極嗚呼周子亦不得已言之孔子惟教人躬行耳通書誠上章主天而言故曰誠者聖人之本言天之誠即人之所得以為聖者也誠下章主人而言故曰聖誠而已矣言人之聖即所得於天之誠也誠㡬徳章居第三者言誠之得於天者皆自然而幾有善惡要當察其幾之動以全其誠為我之徳也聖章居第四者言由誠而達於㡬為聖人其妙用尤在於感而遂通之神盖誠者不動㡬者動之初神以感而遂通則幾之動也純於善此其為聖也誠一而已人之不能皆聖者係於幾之動故慎動為第五動而得其正為道故道為第六得正為道不淪於性質之偏者能之而主之者師也故師為第七人必有恥則可教而以聞過為幸故幸次之聞於人必思於已故思又次之師以問之矣思以思之矣在力行而已故志學又次之凡此十章上窮性命之源必以體天為學問之本所以修己之功既廣大而詳宻矣推以治人則順化為上與天同功也治為次純心用賢也禮樂又其次治定而後禮樂可興也繼此為務實章愛敬章又所以斟酌人品而休休然與之為善盖聖賢繼天立極之道僃矣餘章皆反覆此意以丁戒人心使自知道徳性命之貴而無䧟辭章利禄之習開示聖藴終以主静庻幾復其不善之動以歸於誠而人皆可為聖賢焉嗚呼周子之為人心計也至矣諸子之書與凢文集之行扵世者或累千百言而僅一二合於理或一意而敷繹至千百言獨周子文約理精言有盡而理無窮盖易詩書語孟之流孔孟以來一人而已若其闡性命之根源多聖賢之未發尤有功於孔孟較之聖帝明王之事業所謂掲中天之日月者哉本朝理學闡幽於周子集成於晦翁太極之圗易通之書㣲晦翁萬世莫之能明也肅襟荘誦之為快何啻蝉脫塵涴而鵬運青冥哉謹按通書慎動一章周子曰動而正曰道晦翁釋之曰動之所以正以其合乎衆所共由之道也愚竊意慎動常有謹審之意動而合乎正是即為道周子本意恐亦止此若謂合乎道此動之所以正是乃動而合乎道曰正與動而正曰道又成一意恐因此而發明者耳又務實一章周子曰君子日休小人日憂晦翁釋之曰實修而無名勝之恥故休名勝而無實修之善故憂愚竊恐小人未必知以無實為憂果能憂其無實是即君子之用心矣何名小人或者小人飾偽無實之心自宜﨑嶇而多憂書曰作徳心逸日休作偽心勞日拙周子之所謂憂恐類書之所謂勞者耳姑併誌之以俟知者云通書稱禮先而樂後又云古者聖王制禮法修教化三綱正九疇敘百姓太和萬物咸若乃作樂以宣八風之氣以平天下之情愚謂此與虞廷命官終以典樂之意合自魯生有積徳百年然後禮樂可興之説儒家者流遂挾禮樂之文物制度為希世盛事以傲一世謂非我莫能致如王通氏是也至柳子厚又矯其弊稱樂不能移風易俗較之周子之書彼皆所謂野人議壁者哉周子後録遺事十五條濓溪為南安獄椽程太中一見知非常人二子年方十五六聞其論道即厭科舉業此元氣胥會之一機譬之世道則風雲際㑹之象也天寔為之豈伊人力也哉其相與授受之要在尋顏子樂處與所樂何事顏子之樂則周子於通書固嘗言之曰見其大而忘其小焉爾大者性命之源道徳之至尊至貴小則所謂芥視軒冕塵視金玉者也夫然故唫風弄月自然不勝其樂如吾與㸃也之意亦正由浴沂舞雩脫然自有真樂不見大國足民小國為相區區必於有行之為滯累耳周程之相與領㑹其大若此而其剖示於通書者又顯著若此後世有能篤信而自得之其樂豈有異乎哉若其極論天地所安之處以至於六合之外則周子髙明而博學窮極造化自然超詣學者未宜過而問也顏子所樂之處實吾心固有天地所安之處於人事無關遺文闕賦闕便風俗源之意大林寺詩云天風拂巾袂縹緲覺身輕有蕭然出塵之意養心亭説充廣孟子之説以極於聖釋菜祝詞推明聖徳之乆以同乎天愛蓮説又所以使人知天下至富至貴可愛可求者無加於道徳而芥視軒冕塵視珠玉者也事實一編晦翁盖集潘誌蒲碣為之其間取舍皆有意而復取黄太史之説終之以其最善形容有道者氣象也義理雖僃於太極通書而世或莫之能曉二程雖因之以發明道學而未嘗表章其書晦翁於湮墜混淆之餘極討論决擇之力故其於事實不過兼取二氏以存證而辯正尤詳於跋語然皆為周子後錄設也已復更端錄二程之語四章而後提通書以終其説或者晦翁衛道之意於斯乎在矣大抵二程本學乎周子而當世猶未皆知周子之道通書本發明太極而或者反又誤攻太極之非故錄程語者所以證通書證通書者所以證太極圗晦翁拳拳衛道之意儻在於斯乎若曰推一理二氣五行之分合以紀綱道體之精㣲决道義文辭祿利之取舍以振起俗學之卑陋竊意該括通書莫此為要而所以警悟人心者至是益簡切著明矣後録補遺遺文凡二十二皆蜀人度正徧求於故家遺俗之傳梯訪於髙崖危嶝之刻亦可謂忠厚之至者矣公之文不特詩文書帖見録而賀傳耆之名刺亦見錄公之文所及不特親黨交㳺見錄而守墳之周興全家姓第皆見錄然則片言隻字餘音遺跡使後世皆寳愛之而不忘此其所本固自有在而世之富貴人借儒求名自為巨編以供人醬瓿之用者亦何愚哉濓溪年表先生生於真宗天禧元年丁巳終於神宗熈寜六年癸丑年五十七㓜孤依舅氏鄭向奏補厯官分寕簿南安軍司理郴令桂陽令知南昌縣合州判官通判䖍州永州攝邵州事廣東運判擢提㸃刑獄以病乞知南康改葬其母乃上印分司南京二子壽燾後皆登第壽官至司封燾至待制先生之學傳二程四傳而至晦庵南軒始注釋太極圗通書以推大先生之學晦庵之門人度正又訪舊聞以此表附載孔文仲蘇文忠黄太史之稱咏而辯或者謂圗出於陳摶説本於老子學傳於鶴林壽涯者皆非且備錄魏了翁請諡臧格定諡樓觀復覆諡之文所以發明先生推闡理學有功萬世者甚悉諡之曰元盖嘉定十三年六月云魏鶴山請諡二書可以成誦臧格發明諡元之意其用工於先生之學甚深非世俗文人可及特恐末後稱潘興嗣何人敢誌其墓頗覺抑揚之過耳昔孔子歴聘天下從逰三千然非後世子思孟子則不能發明其盛盖陽之暢也暮春日之顯也中天天下事未有不待乎乆者周子之學雖傳於二程寔顯於晦翁凡今世之能言周子者皆晦翁緒餘也而可責潘興嗣之知周子不能如今日乎且潘不特誌先生之墓也先生母夫人之墓寔先生請其誌竊計先生平日之所敬寔無以加於潘如蒲宗孟雖一時聞人而其為先生之墓碣晦翁不之取而取此竊計晦庵所取以證先生之圖説者亦無以加於潘自古有道之士湮沒無聞於世者多矣豈可以潘之功業不見於世而輕加詆訾且不特圗也濓溪在當時亦何嘗如今日之顯顯其曰善談名理此亦正言先生之實太極二氣五行之説此正名理之深者亦不可以名理二字晉人嘗有之而例以為非且其言曰作太極圖易説易通數十篇作之一字鑿鑿然可知此圗之創出於先生潘乃先生平日交㳺之舊所載無非寔錄近世誤攻太極圖者惡潘誌之害巳也故鄙潘今尊信太極圗者亦從而鄙潘耶藉曰以誌属潘為出於先生子弟以母夫人誌属潘者寔出於先生又果何説耶定諡之文知先生者也惟斥潘一語乃與晦翁相反愚故不容不言之若覆議援王通太極合徳為言且曰夫子生於晩周果何與乎太極此與周子之説不同則不必言可也附録潘誌語平意宻蒲碣若視先生為物外人所載稱羙熈寜新政之家書當是先生望治之寔意蒲非敢誣也前軰疑之盖見新法既壊為賢者諱耳邵州復學静江祠堂廣東憲司祠堂皆南軒為記晦翁記先生江州書堂以天所畀為説曰不繇師傳黙契道體建圗屬書根極要領嗚呼大哉言乎其記韶州祠堂之說曰有以闡夫太極隂陽五行之奥而天下之為中正仁義者得以知其所自來其記隆興祠堂之説曰所謂太極云者合天地萬物之理而一名之耳以其無器與形天地萬物之理無不在是故曰無極而太極以其具天地萬物之理而無器與形故曰太極本無極其記邵州祠堂則舊以張九成侑祠而更闢以特祀其記袁州祠堂則以胡文定魏掞嘗請祀二程而未及先生其記婺源祠堂則欲人讀其書求其指以反諸身而力行之南軒之為記多言其𤼵端之功西山真氏之為記多言其講明性道教之功鶴山魏公之為記多考訂古義以詆其師為非古且痛惜學者徒尚虚文而不能行若夫先生之譜系鄉井祠堂本末則龔維藩之記為詳凡集此者皆度正云程氏遺書卷一盖李籲字端伯所錄而伊川嘗謂得其意者二初吕與叔從張横渠張死而入洛所謂東見錄也附東見錄亦與叔所記三謝顯道記憶平日語四㳺定夫所錄五六七八九皆不知姓氏十洛陽議論蘇昞錄十一劉絢質夫錄明道語十二劉質夫録明道語十三十四皆劉質夫錄明道語十五關中學者錄伊川語十六己巳冬所聞不知何人所記十七亦不知何人所記或云周行已或劉安節皆永嘉人程氏𤼵明孔孟正學於千四百年無傳之後㣲言奥㫖特散見於門人之集録頼朱子起而搜逸訪遺始克成編其尤切於日用者巳類而為近思錄矣然朱子之錄近思必丁寕學者更求之全書及考其所編全書乃稱伊川自謂惟李籲得其意故以為首篇且反覆詳論謂失之毫釐則其繆将有不可勝言者然則學者之讀遺書全編其又可不謹乎自今觀之孔子夢周公一也張繹所録則謂晩年不遇不復夢見鮑若若所録則謂若曾夢見大叚害事夢周公何害事之有殆惑扵異端真人無夢之説耳是鮑之錄不若張之近人情賜不受命一也㳺定夫所録則謂不受天命不知姓氏所錄則謂不受爵命子貢盖嘗結駟鄰國矣何嘗不受人之爵命是或者之録不如㳺之得事實乾坤六子之説一以為乾坤退處而用六子一以為六子之用即乾坤是甲之録不若乙之通飬生延年之説一以為人力可勝造化一以為天命不可損益是前之錄不若後之確善惡之判曉然也錄者謂惡亦不可不謂性又謂天下善惡皆天理此雖窮極底藴之辭然恐不若直言擇善之為經鬼神之事難眀也錄者謂風肅然起於人心之怖畏又謂雷擊人起於惡氣之相觸此雖曉諭世俗之辭然恐不若冺於忘言之為得謂以心知天為未然而謂心即是天固於知天之上加通徹矣若夫謂道不可離為未然而謂道豈有可離不可離何其蕩無䋲墨也此暢潜夫之錄朱子注其多非先生語歟以至誠贊天地為未足而云同此一誠何助之有固於天地聖人之誠加混合矣若夫謂謹禮者不透可讀荘子何其矯枉過正也此劉元承之錄朱子又注其為别本所增歟洒掃應對與佛家黙然處合此殆言工夫之始耳程子平日之言本斥佛學之無用而謂吾儒自洒掃以上便是聖人事也敬其心不接視聼此殆指收歛之極耳程子平日之言本主視聼之以禮而斥禪學之絶耳聞目見為喪天真也大抵孔孟之學大中至正之極而二程之學正以發明孔孟之言不幸世之黠者借佛氏之名售荘列之説蕩以髙虚舉世生長習熟於其間而不自知聞程子之説稍不加審則動必䧟入於彼今欲辨程錄之真偽無他亦觀其於孔孟之説相合或於荘列之言相似與否耳程門髙弟才莫過於謝顯道何其所錄程説之可疑亦莫多於謝顯道耶第一條所錄以鳶飛魚躍為活潑潑活潑潑何等語求之孔門惟見其云君子之道造端夫婦耳第二條言切脉第三條言觀雞雛而皆指以為仁切脉觀雞殆扵機觸神悟求之孔子惟曰居處恭執事敬而孟子亦以惻隐為仁之端耳謂堯舜之事如太虚中一㸃浮雲過目何其與四海困窮天祿永終之戒異也謂與善人處壊了人何其與毋友不如己者之意殊也謂荘生形容道體之語為儘好謂老氏谷神不死一章為最佳此殆其本心之形見而記憶其師平日之言亦粉澤於其所學自成一家之後矣揚子雲有言適堯舜文王為正道非堯舜文王為他道愚亦謂合於孔孟者程錄之真異扵孔孟者程錄之誤道與徳為虚位老子貴道徳而賤仁義吾儒即仁義而為道徳此毫芒疑似之間韓子将辭而闢之亦難乎其言矣故曰道有君子有小人徳有凶有吉而道徳為虚位若曰道徳之名一也而寔不同儒者以仁義而居之則道為君子之道而徳為吉徳老子舍仁義而欲居之則道乃小人之道而徳乃凶徳耳其立辭之精措意之工剖析是非之要切似未有過於虚位之説也程錄非之豈亦門人之誤與合俟知者而請焉周亞夫軍夜驚軍夜驚而亞夫不動善矣程先生以為軍猶驚何耶亦未得為盡善愚謂小人羣睡偶有驚魘而衆随之此類多有乃出不測亞夫能使身之不動安能使人之不驚若行軍而有驚擾則可責主帥之未善耳古人倉卒處變難能之事後世平居暇日加求全之毁若此類甚衆如程先生特借此以眀事理之極耳後學未易輕言也遺書附録明道先生行状髙祖羽少師曾祖希振虞部祖遹贈開府父珦太中先生生而秀異未能言能指金釵墜處十嵗能詩賦彭思永許妻以女中進士第主鄠縣簿南山石佛嵗傳其首放光先生戒其僧俟復現當取其首就觀之自是不復有光再調上元均田税塞潰提云一命之士茍存心愛物於人必有所濟見人黏飛鳥取其竿折之移普城令教以孝弟忠信為監察御史裏行與荆公議不合求補外差京西提刑辭改鎮寕軍判官屢平反重獄塞曺村河决監京西竹木務知扶溝事除焚舟之賊朝廷除田税獲除者皆頑民先生為約前料獲免者今必如期而足於是惠澤始均争王中括牧地曰民徒知今日不加賦不知後日增租奪田則失業矣監汝州酒税哲宗嗣位召為宗正丞未行以疾終先生少從周茂叔辨異端似是之非開百代未明之惑謂孟子沒而聖學不傳以興起斯文為己任子端慤端本明道之歿伊川状其行求銘於韓持國而文潞公題其墓伊川歿洛人畏黨祸送䘮惟四人曰張繹范域孟厚尹焞又薄暮出城乙夜方至者為邵溥迨晦庵朱先生始訪其事為年譜云程氏外書朱公掞錄拾遺大率言詩多於字上求意物上求義其於一之日二之日不謂變月言日云猶今之道如何又如何此説亦異於衆陳氏本拾遺多説論語其合錄者已見晦翁集註李參錄拾遺以望道未見為望治道太平恐於本文有增馮本拾遺云王輔嗣韓康伯只以荘老解易又云論孟只熟讀便自意足愚謂此皆切當之語與他錄有疑似者不同羅氏本拾遺云文意雖解錯而通理者不害胡氏本拾遺温公欲盡去元豐間人程子謂侯仲良曰若宰相用之為君子孰不為君子此等事教他門自做未必不勝如吾曹尹子親注云此段可疑盖意其非程子語也然邵氏聞見錄亦載伯淳與韓宗師語云當與元豐大臣同若先分黨與他日可憂則胡氏本所載未可以為疑也豈程氏自有此論尹子鑒後來調停之祸而疑之耶然自古亦未有君子小人共事而可成功者第惟伯淳自足以服熈寕諸人之心必又有所以處之之道耳侯師聖以明道先太中而卒故立廟自伊川始以伊川子端參主祭㳺氏本拾遺王者天下之義主也孟子所以勸齊之可以王春秋錄拾遺謂書母弟為害義禽獸則知母而不知父人豈論同母與不同母乎謂蒯聵委於所可立使不失先君之社稷而身去則義矣大全集拾遺謂周禮不全是周公之理法天下寕無魏公之忠亮而不可無君臣之義余謂此極論也然忠字合作鯁字先生未嘗乗轎云分明以人代畜愚謂此佛氏之戒為佛者皆犯之吾國之貴者老者恐不可免餘當以先生為法謂釋氏之説其歸欺詐始以世界為幻妄而謂有天宫後亦以天為幻而卒歸之無佛有髪而僧復毁形佛有妻子舍之而僧絶其類至如夜食後睡要敗陽氣其意尤不羙直如此奈何不下愚謂以此責異端皆事實彼亦心服時氏本拾遺或問劉蕡曰尺蠖之屈以求伸也踈逖小臣一旦欲以新間舊難矣教人者養其善心而惡自消治民者導之敬譲而争自息按此卷可疑者在首章謂老子言天地不仁以萬物為芻狗之説為是傳聞雜記明道嘗曰天理二字却是自家體貼出來愚按樂記已有滅天理而窮人欲之語至明道先生始𤼵越大眀於天下伊川謂鑄銅錢寕􅃜本則盗鑄息賣官鹽寕减價則鹽課增又謂温公變法未可動役法動即三五年不定其後無一不驗伊川歸自涪見學者多從佛學嘆曰惟有楊謝二君長進嗚呼亦豈料其他學者之從佛未足以惑世而他日之從佛能動人者正今日之楊謝耶伊川嘗言今日之祸亦是元祐做成愚謂理亦有此但諸賢一時為天下救急有不奈何恐不可赦小人而反責君子耳豈責僃果春秋意耶然無元祐諸賢恐不待靖康而後南渡雖南渡又未必人心之戴宋如此伊川與韓持國友善見即乆留因子弟進以黄金楪二十兩詰朝遂歸謂孟厚不治一室學不在此洒掃㓗净莫更快人仁宗以折米六分太甚止令折五分及供進偶臟腑曰習使然也仍令如舊又進飯有砂石含以示嬪御令勿語人此死罪也生荔枝供盡近侍欲買之云買之來嵗必增上供之數流祸百姓無窮又一日夜飢思燒羊頭近侍乞宣取曰取之後必常僃日殺三羊暴殄無窮竟夕不食凡皆眀道云然嗚呼仁哉伊川云若熟看語錄亦自得愚謂此當與伊川稱某在安用語錄之説參考伊川與堯夫同里巷三十年世間事無所不論未嘗一字及數學愚謂卓哉人豪乎為士大夫而欲攻伎術者可以觀矣程氏經說書解史所謂大道説有羲皇之書乃許行謂神農之言隂陽醫方謂黄帝之説此聖人所以去之常道亦去其三盖為治有迹有史官以志自堯始耳事之最大在推測天道以授人時既巳迎日推測之復考中星以正四時其法明而易凖其它庻事緫云允釐百工謂鯀之惡公議隔而人心離納大麓為緫錄庻政愚意恐合依文公說詩解摘篇全解𤼵眀義理為多惟託興上求義處恐太寔耳赤芾三百言其多爾曺國之小安得有三百之多左傳乘軒者三百人因此詩也朋酒朋聚以饗鉦人擊鉦者伐鼓擊鼓者箴如鍼砭之刺病文王侵廣土疆自阮始至于岐隴髙山皆有之愚謂皇矣詩人紀寔之言伊川平心之説也近世形容文王無此事是待之過髙而曲為之辭其源𤼵於歐公之泰誓論春秋傳序原鴻荒至漢唐世變辭約義精善言春秋者孟子之後惟先生一人而已傳至桓公九年餘以先生平日議論嘗及者附足之謂周正月非春也建子言春者假天時以立義耳愚按此亦舊説必程先生不欲輕改然有可疑者盖若謂冬為春則人事與天時皆不合或者建寅為正正月為春古今所不可易所謂改正朔云者不過各於其所稱嵗首月朝聘祭饗以示更新如商之建丑十二月也書稱惟元祀十有二月未嘗改十二月為正月漢初建亥十月也漢史亦書冬十月未嘗改十月為正月以此而推春秋之春正月恐即自古及今之春正月安得以十一月為正月而又就以十一月為春耶且詩作於周如四月維夏六月徂暑七月流火九月授衣無非夏正月令一書作於周末十二月之間中星候蟲亦無一不用夏正惟孟子稱七八月之間旱世指為夏正之五六月然禾稼早晚所至不同今江浙間十月穫稻而七八月間苦旱者甚多如十一月徒杠成十二月輿梁成殆亦冬寒而濟渉耳惟小戴禮之雜記有曰正月日至可以有事於上帝若可疑者然此書出扵漢儒恐因周以建子為嵗首遂追稱正月未可知漢改正朔兒寛等議曰帝王必改正朔至不相復推傳序文則今夏時也此其證矣姑舍是而春秋言之春秋書秋八月大閲時也今因以八月為六月遂曰盛夏大閲妨農害人書冬十月雨雪亦時也今因以十月為八月遂曰建酉之月未霜而雪此類安知非經文本用夏正不過據寔而書耶至若當時書法亦豈後世之所能盡知先生亦因自昔凡例之説而載之耳若書王於桓之元年曰以其弑立故正以王法於二年曰以宋督弑立故正以王法於三年不書王則曰以桓無君故不書恐亦随事意之耳夫弑立尤無君之大者也向使元年二年不書王則併為其無君而不書亦豈不可乎如書即位於隠荘曰不正其始不書於閔僖亦曰不正其始不書於桓宣定之書即位則以為弑君而自立故書恐亦随事意之耳若以不正其始者不書即位則三君尤為不正始之大者又反可書乎桓之有年宣之大有年恐皆慶事之不容不書爾若曰桓宣不應有而有之故書其異将治世永無水旱而亂世常必飢歉乎有年既以異而書則水螟無禾麥之類當為春秋之常何為而亦書之他若侵伐必曰責常在彼侵伐者書入亦曰責在受其入者其説以為上不能告之天子下不能告之方伯而私與之戰也然古之天下難以後世兼制天下之事逆之也彼諸侯者非郡縣比各土其土各民其民有王者作不過以禮相與王室一衰即勢不行周既東遷自保不暇豈能復命方伯以討不軌使小國見侵於鄰不與之戰而待上告天子下告方伯則茫如訴之鬼神國已奄忽為墟宗社之祀絶矣且世有倉卒被㓂者救禦惟恐不亟乃責其不以聞官府而私自逐㓂揆之人情恐亦未必然嘗謂春秋大義如尊王賤霸崇仁義而賤功利尊中國而外夷狄此先生所謂炳如日星者盖天下萬世綱常之所頼其餘微辭奥義豈易推測自昔春秋家凡例之説豈易一一為之辭惟平心易氣随其事而讀之善惡自見而勸戒存矣論語自學而止子罕麻冕章皆先生所作論語説辭約義精多晦翁集註所取為據者自後乃其平日議論所及孟子止盡信書一章亦議論云禮記明道改正大學以康誥曰以後釋眀字新字止字者聨首章明徳新民止至善之下然後及古之欲明明徳一章以所謂誠意以後節節釋之伊川改正大學則移古之欲明明徳一章於康誥曰之前程氏文集眀道表䟽眀道事神宗初疏乞定君志用正人次乞修學校尊師儒次論王霸皆根本之論其要尤纎悉於養士養賢之節目意者亦念人情之不古伊欲變化士習非徒法之所能行故先以君志而後及之歟有曰禁衞之外不漸歸之於農則将貽深慮竊謂譬之於疾此尤劇証人主所宜力救者也其乞留張載免徃明州推勘苖振公事云朝廷以儒術進人而以獄吏之事試之則抱道修業之士益難自進矣其諌新法二疏云與其遂一失而廢百為孰若沛大恩而新衆志又云設令僥倖小成而興利之臣日進尤非朝廷之福其議論得大體如此答横渠定性書略云所謂定者動亦定静亦定天地之常以其心普萬物而無心聖人之常以其情順萬物而無情故君子之學莫若擴然而大公事至而順應夫人之情易𤼵而難制者惟怒為甚苐能於怒時遽忘其怒而觀理之是非亦足見外誘之不足惡而於道亦思過半矣試䇿問春秋專主唐陸淳得啖氏之説曰紀師無曲直之辭一之也不一則禍亂之門闢矣謂禘為王者之祭非周公之志餘若書鄭伯之克謂克下之辭眀君臣之義書次於郎言非有俟而次則已将為賊爾眀道詩皆造化生意之妙較之堯夫擊壤集則堯夫為自私其樂者矣户部侍郎彭公思永行状先生外舅也公八九嵗得金釵伺訪者還之海水敗台州公以睦州倅徃撫之築城為永利為湖北漕黜守令各一人而八州知畏至蜀治二盗而人畏法初為御史論濫恩後拜中丞助蒋之竒言大臣隂私罷程郎中璠通判和州刑蔡之妖尼惠普移温州置神恠李洞元者於法㓜女澶娘病豆瘡以藥利之死邵堯夫先生墓誌銘先生始學於百源堅苦刻厲冬不爐夏不扇夜不就席者數年復走呉適楚過齊魯客梁晉乆之而歸曰道其在是矣及其益老玩心髙眀觀於天地之運化隂陽之消長達乎萬物之變然後頽然其順浩然其歸其與人言必依扵孝弟忠信樂道人之善而未嘗及其惡華隂侯先生誌銘先生名可以氣節自喜從孫威敏公征儂智髙得官熈河未開為韓魏公馳諭渭源酋豪開地八千頃秦州舊苦蕃酋反覆縶其親愛先生謀佚而歸之戎人感服二程其甥云伊川十八上仁宗書謂應時而出自比諸葛及後應聘為哲宗講官則自講讀之外無他説不特其時至慮易而然盖時與位既不同而哲宗尚㓜惟以培養為急耳其他論濮議論薄葬代吕公著上神宗書無不深切著明然則天下事非得其位當其可則固未易輕言也若三學㸔詳反為禮部所駁則本朝文宻之弊固難與俗吏言乆矣顏子所好何學論謂其學以至聖人之道養魚記盖因物感人飲禊詩序謂以好賢方逐樂之心禮義為踈曠之比道藝當筆札之工誠不愧矣論賑濟令宿戒晨入午與食申出之日得一食則不死力能自營一食者不来當活數倍羸弱者稀粥分給氣定然後一給飯粥湏親嘗恐入石灰蒋堂守蜀衆所不樂者三事减遨樂毁滛祠伐江瀆廟木修府所謂衆不善者乃可謂最善者也視聽言動箴在由中應外制外養中两語伊川為家君請宇文中允典漢州學書謂講明聖人之道開道後進使其教益廣其傳益廣故雖身隠而道光跡雖處而教行出處雖異推己及人之心則一也答横渠書有苦心極力之象無寛裕温厚之氣更願完養思慮㴠泳義理他日自當條暢代富公奏謂昭陵壙中為鐡罩重且萬斤以木為骨大止數寸不過二三十年决須摧毁願奉太后合祔因得徹去鐡罩答朱長文書勸勿多作詩文上韓持國求為明道誌述云相知者雖多能知其道則鮮有文者亦衆文足以𤼵則鮮能言者非少足以取信則鮮答楊時書朝廷設教官盖欲教人修身齊家治國平天下之道婚禮六納采者謂壻為女氏所采問名者問所娶女子之名納吉者謂卜得吉兆以告納徴者用皮帛以證成娶婦之禮請期者實告婚期成婚者告迎於廟葬法决疑堪輿經黄帝對天老乃有五姓之言且黄帝時只有姬姜二三姓所謂五姓者宫商角徴羽以同韻相求至以柳姓為宫趙姓為角又非四聲相管亦有一姓分属宫商􅃨姓數字徴角不辨夫姓之於人因邑因官若用祖姓則數經更易若用今姓則皆後代所受是吉凶随時變易也葬者逄日食則舍於道左而葬書用乾艮二時皆是夜半又曰己亥日葬凶今按春秋此日葬者二十餘人皆無其應先太中嘗知龔鳯磁漢四州歴官十二任享祿六十年亷謹寛和孜孜夙夜年七十致仕自為墓誌壽八十五子孫就其缺處加所遷官爵晚生諸孫及終葬月日云太中家傳太中弱冠寓黄陂奉養諸母教撫弟妹以口衆不能偕行不赴調文簡公為請於朝就注黄陂尉至長弟與從弟皆得官娶婦二妹既嫁乃赴調後知龔州投歐希范之神於河知沛縣遇水募布豆水中水未盡涸而甲巳露遂不艱食有自稱僧伽弟者杖而出諸境知磁州氷凘成花卉之状郡官請以上聞公曰石晉之末嘗有此知漢州吏白殺青而文見公不應衆呼佛光見公不動新法行抗議移疾五得任子以均諸父子孫上谷郡君家傳好讀書史博知古今不喜笞朴奴婢視小臧獲如兒女諸子或加呵責必戒之曰貴賤雖殊人則一也汝如此大時能為此事否聚族甚衆人皆有不欲之色乃别糴以食之嘗大寒有負炭而􅠎者家人欲呼之夫人曰慎勿為此勝則貧者困矣先公有所怒必為之寛觧惟諸兒有過則不掩常曰子之所以不肖者由母蔽其過而父不知也行而或踣曰汝若徐行寧至踣乎嘗絮羮曰㓜求稱欲長當如何與人争忿雖直不右曰患其不能屈不患其不能伸在廬陵公宇多怪家人告曰物弄扇夫人曰熱爾又曰物擊鼓夫人曰有椎乎可與之後家人不復言怪亦不復有頥兄弟㓜時夫人勉之讀書並書一行前曰殿前及第程延壽次曰處士知之童穉中矣自孔孟歿異端紛擾者千四百年中間惟董仲舒正􅁩眀道二語與韓文公原道一篇為得議論之之正迨二程得周子之傳然後有以窮極性命之根柢𤼵揮義理之精微議者謂比漢唐諸儒説得向上一層愚謂豈特視漢唐為然風氣日開議論日精濓洛之言雖孔孟亦所未𤼵特推其㫖要不越於孔孟云耳然孔子於性理舉其端而不盡言或言之必要之踐履之寔固可垂萬世而無弊自心性天等説一詳於孟子至濓洛窮思力索極而至性以上不可説處其意固将指義理之所從來以歸之講學之寔用適不幸與禪學之遁辭言識心而見性者雖所出異源而同湍激之衝故二程甫歿門人髙弟多䧟溺焉不有晦翁孰與救止嗚呼危哉故二程固大有功於聖門而晦翁尤大有功於程子伊川至論伊川至論者紹興六年四月建陽施孫碩所序而麻沙鎮刻本也余為兒童時見先君子手書伊川先生常語六字於帙面而口授大指於余余時未能盡曉也近嵗宦學四方盡收伊洛諸書日加㸃勘乃無伊川至論之目因逺取於家山之萬松庵而參校之其書凡十二卷其一曰語錄首以性静可與為學之一條今於晦翁所編程氏外書朱公掞拾遺一卷見之其二亦曰語録首以綏之斯来動之斯和一章今於晦翁所編程氏遺書第十一卷之中至十二十三十四卷見之其三亦曰語錄自第六條鳶飛魚躍之語於遺書第三卷謝顯道所錄見之四卷至六卷則散見今遺書中而第七卷載周子通書綴以太極圗圗與通書合而為一足證晦翁之說而觧陸氏之疑但通書中眀通公漙作明通行傳云静虚則眀明則通動直則行行則傳又太極圗初圏象無極而太極者其下注隂静字第二圏象隂陽交互者其下注陽動字太極説之起處亦缺四字如太極動而生陽太極字止用之字静而生隂静字亦用之字恐太極字連綴上文之太極静字亦連綴上文之静元本用二畫連綴而二畫之二字與之字相近故傳者誤作之耳第八卷載漁樵問答盖世傳以為康節書者不知何為亦勦入其中兼近世昭徳先生晁氏讀書記以此書為邵伯温偽作今觀其書惟天地自相依附數語為先儒所取餘多鄙俗其伯温得家庭之説而私附益之明矣第九第十皆曰河南語錄與今遺書第十一卷劉質夫所集師訓多同十一十二皆曰入關語錄與今遺書第十五卷入關語錄亦同若其第一第二卷説詩說易亦於外書拾遺中間見余按程氏之書晦翁搜括大備拾遺之外又錄傳聞雜記者二十家今至論一書集於晦翁之前而刻梓亦出於晦翁之寓里晦翁安得反獨不見亦安得見而反獨不言是未可知也竊意晦翁未集遺書以前此書殆為程門大備之書兼施孫碩之序此書有曰孟氏之後獨伊川以孔孟為師以正心誠意為本體之足以修身事親推之足以致君澤民學者能深求其旨而篤信之亦趋聖域之徑路所論若此又豈近世談虚空與事文墨之士可望其髣髴故記其與遺書畧異者以俟知者問焉横渠正䝉氣坱然太虚升降飛揚未嘗止息鬼神者二氣之良能太和篇地純隂凝聚於中天浮陽轉旋於外日月五星逆天而行天并包乎地地在氣中雖順天左旋其所繫辰象随之稍遲則反移徙而右月隂精反乎陽故右行最速日陽精質本隂故右行雖緩亦不純繫乎天金水附日進退而行存乎物感鎮星地類然根本五行雖行最緩亦不純繫乎地火比日而微故其遲倍日木乃嵗一盛衰故嵗歴一辰地有升降日有脩短此一嵗寒暑之候至於一晝夜之盈虚升降則以海水潮汐騐之月於人為近日逺在外故月受日光常在於外参两篇愚按造化難測横渠思索最精辰象随天而遲反成逆行此理於雲運月駛可驗動物本天以呼吸為聚散之漸植物本地以隂陽升降為聚散之漸物之初生氣日至而滋息物生既盈氣日反而㳺散賢才出國将昌子孫才族将大動物篇愚按賢才出子孫才亦氣日至而滋息之類也性者萬物之一源非有我之得私大人能盡其道故立必俱立知必周知愛必兼愛成不獨成形而后有氣質之性善反之則天地之性存焉故氣質之性君子有弗性焉陽明勝則徳性用隂濁勝則物欲行並誠明篇愚按論性之廣大無如萬物一源之語論性之精切無如氣質弗性之語陽明隂濁分剔尤净不得已而後為不得為而止斯智矣夫中正篇愚按此卷有大心篇語雖驚人本旨欲以心體萬物則於小心之義自並行而不相背至謂夫子惜顏囬未得所止未知經意果如何恐亦是進而不息之義耳言有教動有法書有為宵有得息有養瞬有存聚百順以事君親不慤而多能譬之豺狼不可近有徳篇右六卷七卷中精語也六卷説論語八卷説易九卷説詩説禮間與近世諸儒之説未合似有思之太逺者浮屠説熾傳中國使英才間氣生則溺耳目恬習之事長則師世儒宗尚之言遂㝠然被驅因謂聖人可不修而至大道可不學而知上無禮以防其偽下無學以稽其弊自古詖滛邪遁之詞翕然並興一出於佛氏之門者千五百年自非獨立不懼精一自信有大過人之才何以正立其間右乾稱篇愚按乾稱篇始於西銘終於東銘至若闢邪説則此章極為痛哉然學者至今無一以為然良由不學不思耳悲夫流俗之䧟人如此哉横渠理窟周禮盟詛之屬必非周公之意周禮篇愚按周禮豈獨盟非周公之意哉盟詛出於後世則周禮恐未必盡作於周公横渠好古之切故為委曲囬䕶如此而又以詩書次周禮焉宗子之法廢則朝廷無世臣今日大臣之家且可行宗子法朝廷有制曾任两府則宅舍不許分宗法篇愚按此意厚矣然古者諸侯卿大夫以世襲故其法易行且以防僣奪故其法最當嚴耳學者先須去客氣先湏温柔此皆變化氣質之道宜矯輕警惰常㳺心義理之間氣質篇愚按理窟一書惟氣質篇最於學者有益心茍不求益雖與仲尼處何益氣質篇心不在焉雖學無成學須深沉非淺易輕浮之可得義理篇讀書則此心常在義理篇今世學不講男女從㓜便驕惰壊了長益㐫很只生來未嘗為子弟之事某書多使氣後來殊减更期一年庻幾無之如太和中容萬物任其自然學大原愚按以上皆示學者𦂳切處心清時常少清時即視明聼聰四體不待覊束而自然恭謹心不可勞當存其大者心洪放如天地易簡然後能應物皆平正學大原愚按此皆先生養心用工處無静坐把捉之苦最可法舍此而言心則易入禪學衆人皆合安得不合天下大患只畏人非笑不養車馬食粗衣惡居貧賤皆恐人非笑不知當生則生當死則死今日萬鍾明日棄之今日富貴明日饑餓亦不䘏惟義所在自道愚按安得不合和也不畏人非笑自立乃如此横渠語録為天地立心為生民立極為徃聖繼絶學為萬世開太平學禮則除去世俗一副當習熟纒繞便自然脱灑横渠先生精思力踐毅然以聖人之事為己任凡所議論率多超卓至於變化氣質謂形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性焉此尤自昔聖賢之所未發警教後學最為切至者也學者宜何如其遵體哉若夫篤信周官謂可舉行於今日則未知先生見用果何如似恐世變推移自昔聖人亦不過随時立制而治要亦不在制度之細爾至若測隂陽造化談清虚一大初學未當過而問不敢盡抄類云黄氏日抄卷三十三
