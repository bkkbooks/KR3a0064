body:
  text: 黃氏日抄卷三十五宋黃震撰讀本朝諸儒理學書三晦庵先生文集二雜著尚書堯典注安安古說有以為安民之當安者今定為無所勉強之貌蓋此節上下文皆言聖德未及安民事也百姓古說有以為百官之族姓者今指為畿內庶民與下文萬邦相協謂民為百姓亦便也朔方朔字蘇也萬物至此死而復蘇堯冬至日在虛昏中昴今日在斗昏中壁蓋天有三百六十五度四分度之一歲有三百六十五日四分日之一天度四分之一而有餘歲日四分之一而不足故天度常平運而舒日運常內轉而縮天漸差而西歲漸差而東東晋虞喜始立差法約五十年退一度何承天以為太過倍其年又反不及隋劉焯折𠂻為七十五年閠法以周天三百六十五度四分度之一天體圓健繞地左旋一日一周而過一度日少遲繞地一周而不及天一度月尤遲一日常不及天十三度十九分度之七歲以三百六十日常數計之日行多三日九百四十分日之二百三十五為氣盈月行少五日九十四分之五百九十二為朔虛合氣盈朔虛而閏生焉嬪于虞之下欽哉字說以為戒二女之辭於文意極順前無此說舜典以至于岱宗柴望為句按書有三月庚戌柴望詩有巡狩告祭柴望則柴望二字相連為文甚明前此以柴字絶句者真不仔細耳卒乃復古說謂五器受訖則還諸侯今說謂事畢則不復東而西向䕫曰於余擊石拊石謂此益稷之誤簡方九官相遜不應自夸璿璣璿者美珠飾璣以象星言天三家宣夜無師說周髀謂天似覆盆而斗極居中中髙而四邉下日月旁行繞之日近而見為晝日逺而不見為夜蔡雍以為考驗多失渾天以為天包地天居地上有一百八十二度半強地下亦然北極出地三十六度南極入地亦三十六度而嵩髙正當天之中極南北極特其兩端其天與日月星宿斜而廽轉耿夀昌始鑄銅為象轉而望之知日月星辰所在即璿璣遺法蔡雍以為近得天體之實本朝因之為儀三重外曰六合儀平置單環面定四方側立黑雙環刻去極度數半出入地上下其一結於子午為天經其一結於卯酉為天緯天經環南北二極皆為圓軸虛中而內向以挈在內三辰四遊之環上下四方於是可考次內曰三辰儀亦為雙黑環刻去極度數外貫天經之軸內挈黃赤二道赤道為赤單環外依天緯亦刻宿度而結於外環之卯酉黃道為黃雙環亦刻宿度而又斜倚於赤道之腹而交結於卯酉而半入其內為春分後之日軌半出其外為秋分後之日軌下設機輪以水激之使日夜隨天東西運轉日月星辰於是可考其最在內曰四遊儀亦為雙黑環如三辰儀之制以貫天經之軸環內兩面各施直距外距指兩軸要中之內又為小窽受玉衡要中之小軸使衡隨環東西運轉又可南北低昻以待占候者仰窺焉東西南北於是無不周遍愚按周髀謂日月繞斗極以見不見為晝夜即道家日月繞崑崙山相隱避為光明之說然道家之所指者山也山在地而髙人或為其所隔則容有不見者雖無其事尚或可說周髀之所指者斗也斗極髙懸日月縱環繞於其上人亦安有因其逺而不見者哉幾於襲用之而愈舛矣日月星辰隨天斜轉東浮西沉人人共見則渾天之說為可信而本朝之占驗愈密矣大禹謨金縢召誥洛誥等說及武成日月譜孝經刋誤自開宗明義至庶人章去其所引諸書合為一章曰正經餘章刋其雜引左傳等文而存其與諸經相關者為傳初衡山胡侍郎論語說疑孝經引詩非經本文沙隨程可久亦言玉山汪端明以為此書多出後人傅㑹先生因而廣之為刋誤讀管氏弟子職始於學則次蚤作次受業對客次饌饋次乃食次灑掃次執燭次請衽次退習凡九篇皆叶韻而文質澀先生為之注釋古者小學灑掃應對進退之節於斯乎有考矣始於學則謂人莫先於學凡其后所叙皆學也蚤作次之受業又次之晨必先長者而起給事之後即讀誦也請衽又次之而退習終之夜必後長者而寐給事之后復讀誦也此其大略也致知躬行工夫交進此其為大學基本云記嵩山朝氏卦爻彖象說古易上下經及十翼凡十二篇費直以彖象文言雜入卦中古十二篇之易遂亡王弼因之又分爻之象辭各附當爻惟乾之小象不繫於爻辭此記朝氏說也先生注按詩疏漢初傳訓皆與經别行及馬融為周禮注欲省學者兩讀故就經為注髙貴鄉公謂彖象不連經文者十二卷之古經傳也然則先生本義之作蓋復其舊云蓍卦考誤揲蓍之法五十䇿去其一以四十九䇿分置左右手所謂分二以象兩又取一䇿懸於左手小指之間所謂卦一以象三揲者數之也先置右手策而以右手四四數左手之䇿又置左手䇿而以左手四四數右手之䇿所謂揲之以四以象四時四四之後必有零數左手者歸之於第四第三指之間右手者歸於第三第二指之間以勒之所謂歸竒於扐以象閏一掛兩揲兩扐為五嵗之象故曰五嵗再閠故再扐而後掛及后掛則又置前掛扐之䇿復以見存分二掛一為第二變矣每變分二掛一揲四歸竒凡四營初一變兩揲之餘掛扐者不五則九第二變不四則八第三變亦不四則八總三變之間若一五兩四而三皆少稱老陽以掛扐之餘存者三十六以四計之則九揲而九陽數也或兩多一少則存者二十八以四數之則七揲七為少陽若一九兩八而三皆多稱老隂以掛扐之餘存者二十四以四計之則六揲而六隂數也或兩少一多則存者三十二以四數之則八揲八為少隂老陽則乾也少陽在初為震中為坎末為艮老隂則坤也少隂在初為巽中為離末為兊故三變成一爻十八變成一卦此其大略也諸說之誤者先生各條列以辨琴律說謂琴之有徽所以分五聲之位而配以當位之律布徽之法則當隨其聲後之多少律管之長短而三分損益上下相生以定其位今人但以四折取中又謂初絃黃鍾之宫次絃大簇之商三絃中吕之角四絃林鍾之徵五絃南吕之羽六絃黃清之少宫七絃太清之少商而一絃之中又各有五聲十二律者凡一二焉皆起於龍齦終於臨嶽長四尺五寸不待抑按而為本律自然之散聲又謂七徽之左為聲律之初氣厚身長聲和節緩故琴之取聲多在於此七徽則為正聲正律初氣之餘承徵羽既盡之後而黃鍾之宫復有應於此者且其下六絃之為聲律亦皆承其已應之次以復其初而得其齊焉氣已消而復息聲已散而復圓是以雖不及始初之全盛而君子猶有取焉過此則氣愈散地愈迫聲愈髙節愈促此六徽之後所以用之少又謂七絃既有散聲所取五聲之位又有按徽所取五聲之位散聲陽也通體之全聲也無所受命而受命於天者也七徽隂也全律之半聲也受命於人而人之所貴者也今人不察反以中徽為重而不知散聲之為尊又謂調絃古人所以破去三分損益隔八相生者乃迫於聲律自然之變舜典象刑說雖發明帝舜之欽恤實譏後世之輕刑且謂少正卯之事獨荀况言之必齊魯陋儒憤聖人之失職故為此說以夸其權耳樂記動靜說辨性情字義詳甚已發未發說再詳程氏遺書而推見中間一假日用本領工夫其說曰未發之中本體自然不須窮索但當此之時敬以持之使此氣象常存而不失則自此而發者其必中節矣愚謂此假不特有功於程氏亦有功於子思所以指示後學用力處甚的若程氏止說中和兩節而有云赤子之心可以謂之中者尚合審訂蓋赤子之心恐不過無僞而已及其發也恐未必中節而和太極說靜者性之所以立也動者命之所以行也實則靜亦動之息爾故一動一靜皆命之行而行乎動靜者乃性之真也明道論性說按明道論性多非後學可遽曉而先生一一與之辨析觀心說辨佛氏以心觀心之說之繆而聖賢所謂精一操存盡心存心者皆心自為之主與佛氏言心迹相似而實不同仁說謂天地以生物為心而人得之以為心曰仁則溫然愛人利物之心也程子謂愛不可為仁者但以愛之發不可以名仁其徒有以萬物與我為一為仁之體者可以見仁之無不愛非仁所以為體之真又有以心有知覺釋仁之名者可以言仁之包乎智非仁所以得名之實王氏續經說謂二帝三王之治詩書六藝之文後世莫能及之非功效語言之不類乃本心事實之不侔也王氏一見隋文而陳十二䇿既不自量其力之不足為伊周又不知其君之不可為湯武及不遇而歸復捃拾兩漢以來文字言語之陋依倣六經次第采輯既不自知其學之不足為周孔又不知兩漢之不足為三王養生說謂莊子稱為善無近名為惡無近刑緣督以為經督者中也為善則畏其名之纍已而不敢為惡則擇其不至犯刑者而竊為之乃欲以其依違茍且之兩間而循其中之所在不論義理專計利害乃賊德之尤者觀列子偶書其言精神入其門骨骸友其根我尚何有者即佛書四大各離今者妄身當在何處之所由出此類甚衆聊記剽掠之端跪坐拜說兩膝著地以尻著跖而稍安者為坐伸腰及股而勢危者為跪因跪而益致其恭以頭著地為拜周禮九􅉔辨一曰稽首手引頭至地稽留多時為稽首臣拜君之拜也最重二曰頓首頭叩地即舉不停留為頓首平敵拜也三曰空首頭至手不至地為空首君答臣之拜也三者正拜也四曰振拜戰栗變動之拜五曰吉拜拜而後稽顙謂齊衰不杖以下者六曰凶拜稽顙而後拜謂三年服者七曰竒拜謂一拜答臣下八曰褒拜謂再拜神與尸九曰肅拜但俯下手軍中拜及婦人拜也最輕壺說壺容斗五升注乃以二斗釋之借方形虛加整數以定之也然知借而不知還先生規而圓之去四角虛數四分之一外圍二尺四寸一分五釐腹髙五寸受斗五升如經之云深衣制度衣二幅不裁裳六幅各裁為二以狹頭向上每裳三幅上屬於衣一幅圓𬒮口徑一尺二寸方領者兩襟相掩則自方衣裳皆緣寸半帶廣四寸垂其餘為紳殿屋厦室說及明堂說儀禮釋宫宫必南鄉廟在寢東屋必五架通乎上下特廣狹隆殺異爾中脊為棟前一架為楣前接簷為後楣以北為室與室相連者為房房無北壁故得北堂之名室南其户户東而牖西户室為中霤西南隅為奧當牖之後東西隅為窔當户之後西北隅為屋漏日光所漏入也户牖之間為依堂東西之中為兩楹間南北之中曰中堂東西為序序即墻也堂上名序室房與夾名墉堂下曰壁曰墻其實一也堂序之外為夾室夾室之前曰廂相翔待事之處也亦名東西堂堂角有坫以土為之堂之側為亷堂堂基亷稜之上也堂東階曰阼階阼酬也所以酢賔堂下至門為庭其塗為陳門限為闕夾門之堂為孰孰有四東西各又分南北鄉也屋之四垂為宇檐之東西起者為榮為翼答社壇說壇髙四尺四面各廣二丈五尺四出陛社以石為主如鍾髙二尺五寸壝十五丈坎在壇北壬地木隨土宜井田類說集荀恱論及班志禘祫議王制天子七廟三昭三穆與太祖之廟而七漢諸帝之廟各在一處不容合為都宫以序昭穆明帝遺詔無復起寢廟至今遂為同堂異室之制獨原廟外為都宫而各為寢廟為近古而禮本不經故李清臣謂略於七廟之室而為祠於佛老之側楊時謂舍二帝三王之正禮而從一繆妄之叔孫通然不知所以致此由廟制不立而人心有所不安也遷毁之序昭常為昭穆常為穆而陸佃非之不知昭穆本以廟之居東居西主之向南向北而得名初不為父子之號禮所謂昭與昭齒穆與穆齒傳所謂太王之昭王季之穆文之昭武之穆是也如佃之說以為父子之號則穆之子安得復為昭哉五峯胡仁仲論短喪失不在文帝而在景帝愚往歲讀漢書亦嘗及此不料前輩所已言也廟議圖說先生嘗請復祀僖祖而趙汝愚丞相不以為然給舍樓鑰陳傳良附其說徑不行君臣服議淳熙丁未歲髙宗上仙禮部令用布四腳直領布襴衫麻絰州縣莫曉其制先生謂四腳幞頭周武帝所製之常冠用布一方幅前兩角綴兩大帶後兩角綴兩小帶覆頂四垂因以前邉抹額而繫大帶於腦後復收後角而繫小帶於髻前以代古冠亦名折上巾其後乃以漆沙為之而專謂之幞頭其實夲一物也至於直領布襴衫上領不盤之說則直領者古禮也上有衣而下有裳者也上領有襴者今禮也今之公服上衣下裳相屬者也公服隋文巡遊令百官戎服從駕亦非當時朝祭之正服也如用直領則兼服布裙而加冠於首如用布襴衫則首加幞頭今但見公服之上領而有襴遂解直領為上領不盤而增襴字於衫字之上誤也凡禮君之喪諸達官之長杖學校貢舉私議欲均解額立德行科罷詞賦分諸經子史時務之年學校則選有道德之人專教導裁減解額舍選繆濫之恩以絶利誘讀吕氏詩記說桑中篇謂二南正風房中之樂鄉樂也二雅之正朝廷樂也商周之頌宗廟樂也變雅固已無施於事變風又特閭巷之謡古者採詩以觀民風固不問美惡而悉存以訓今乃引淫放之鄙詞而文以風刺之美說讀唐志謂孟氏沒士背本趨末不求知道養德以充其內而徒以文章為事業韓愈氏出始覺甚陋猶未免裂道與文為二物又復衰歇逮數百年而後歐陽子出恐亦未免於韓氏之病而其徒推尊之既曰今之韓愈又必引文不在兹者以張其說文王孔子之文與韓歐果若是其班乎讀大紀為宇宙之間一理流行未嘗有頃刻或停釋氏乃欲求所謂空虛寂滅之地而逃焉讀兩陳諫議遺墨謂熙寧日録王安石為一世禍敗之原者其隱微深切皆聚此書而起熙豐訖宣靖六十年間誦說推明按為國是有識之士飲氣吞聲莫敢指議獨兩陳公出死力以排之終未免有所回互惟龜山指其離內外判心迹使道常無用於天下而經世之務皆私智之鑿者最為近之及其請罷廟學配食又不能如平日之言以正其罪讀蘇氏紀年謂道者天而已天大無外聖人與天同德無一物之不知無一理之不當故曰吾道一以貫之而蘇黃門指五鼓振衣何思何慮者為妙道之極自謂悟夫子一以貫之之㫖記程門同異及記疑二篇皆指雜異端之似以亂吾真者記和靖五事迎天竺觀音曰彼亦賢者也誠敬而拜之日誦金剛經曰是母所訓語及蘇氏使民戰栗解艴然曰訓經而欲新竒無所不至矣記孫覿事在敵營為某文貶損媚敵且以順天自誇記林黃中辨易謂以六畫之卦為太極若論太極一畫亦未有林又闢西銘大君為父母又降為宗子是錯讀了記濓溪謂借得洪景盧所作國史濓溪傳載太極圖說乃云自無極而為太極旌儒廟碑隂儒即秦所坑儒也杜佑謂其自取禍及引漢黨錮為戒先生謂佑之識趣如此所以陷於伾文之黨偶讀謾記吳執中及其子岩夫皆附蔡京時夀皇以中原事問何蓑衣有胡孫拖白不終場等語以敵儲允恭孫襲位為胡孫之驗閩人李復有潏水集論孟子養氣云動必由理故仰不愧俯不怍無憂無懼此書信州有本蜀人馮當可有縉雲集封事乞移蹕建康云此興事造業之根本洪範所謂皇建其有極者也與先生皇極辨暗合㑹稽官書有子華子云程孔傾蓋之程子所作先生謂多取佛老醫卜之言多用左傳班史中字好事者僞造嵊縣有弋過二姓即少康所滅羿促之黨疫疾傳染誣之以無染而不必避不若告之以雖有染而不當避抑染與不染似亦繫乎人心之邪正氣體之虛實不可一槩論笱者寡婦之器但笱易成寡婦亦能置之它人則取魚之器尚多不專用笱耳谷風小辨詩皆曰無發我笱豈寡婦之作也哉附子熟則已疾生則殺人漢淳于衍毒許后生用也先生嘗中烏喙毒正如許后證偶記漢質帝語得水尚可活多汲新水連飲嘔泄而解讀雜書偶記記親祠以學士為執綏官甚詳先生云余按曲禮少儀等書綏安也升車者執之以為安故執綏乃乘車者之事君車已駕則僕者負良綏取二綏以先升既升然後以良綏授君君正立執之以升立於左僕執轡立車中以御勇士立右以備非常故開元開寶政和禮書皆以太僕卿為御千牛將軍為右蓋倣周禮而國史記國初奚嶼攝太僕卿備顧問猶未有執綏之名記尚書三義棐本木名漢書注棐古匪字通用天畏匪忱猶曰天難忱爾孔傳訓作輔字殊無義理記李復潏水集云龍門禹廟像豕首而冕服舊傳鯀入羽淵化為黃熊而廟乃稱禹非也先生謂其不考漢書說啓母石處注中言禹亦嘗變熊記山海經浙江出三天子都在其東廬江出三天子都入江彭澤西記三苖今溪蠻四種曰獠曰犵曰狑而最輕捷者曰猫豈三苖之遺民乎考韓文公與大顛書東坡謂妄撰而先生載其全書以為真今愚平心讀其書真見其與韓文不同蘇公學佛猶辨其為僞先生闢佛而反指其為真所不可曉况據韓文韓公止因祭神至海上曽與大顛語今請之者四書又亟以道為望安有平日謂道其所道非吾之所謂道而一旦求之亟如此使其既與習熟而少變舊說尚近人情今未之曽見而先欲聞其道尤不可曉也考歐陽公事蹟其要者三事其一云學道三十年所得者平心無怨惡爾其二保州軍變富公出為宣撫欲殺其已招安不殺者二千餘人公力爭且云某至鎮州必不受命二千人賴以免其三妖尼喚二牛皆能稱前世姓名公言聰明聖智皆不能自知其前世而有罪為牛者乃知之乎又晚年守青州日論執青苖一事更六人越百年惟洪景廬作四朝史傳乃盡言之士之制行不茍合於當時而有待於後世者豈不難哉故公之言曰後世茍不公至全無聖賢北辰辨云帝座惟在紫微者据七十二度常見不隱之中常居其所為天之樞餘星無不動者今謂在紫微者皆不動未然聲律辨五聲宫最大而沉濁角居四者之中論中聲者不以角而以宫者以宫在五行為土五常為信五事為思正當衆聲和與未和用與未用隂陽際㑹之中所以為盛又注子時初四刻屬前日正四刻屬後日開阡陌辨南北為陌陌之言百也遂間百畝洫間百夫徑塗皆從謂之陌東西為阡阡之言千也溝間千畒洫間千夫徑塗皆橫謂之阡此其水陸占地不得為田者頗多而正經界止侵奪時畜泄有不得不然者商君急刻但見田為阡陌所束而耕者限於百畝人力不盡而地利有遺是以一旦奮然不顧盡開阡陌悉除禁限以盡人力以盡地利說者乃誤以開為創置之名九江彭蠡辨謂禹貢稱漢水南入於江東匯澤為彭蠡東為北江入於海彭蠡初非仰江漢之匯而後成江漢混流何以識其為昔日之漢水而今分之以北何以識其為昔日之江水而今分之以居中若以今江州為九江則漢九江郡夲在江北而今江州實武昌郡之柴桑縣後以江北之尋陽并柴桑立郡又因尋陽改為江州實非古九江地國初胡祕監旦近世朝詹事之說皆以九江與洞庭接證皆精慱蓋洪水之患河為甚禹乃親涖其他分屬視之亦可也洞庭彭蠡之間乃三苖所居官屬未必深入是以但見彭蠡之為澤不知其源甚逺而尚多但見洞庭下流之已為江不知其中流之嘗為澤而甚廣也皇極辨皇者君之稱極者至極之義自孔氏訓皇極為大中諸儒祖其說因復誤認中字為含糊茍且不分善惡之意其弊將使人君墮於漢元之優游唐代宗之姑息卒至是非顛倒而禍敗隨之作皇極辨尹和靖手筆辨和靖專闢語録謂伊川嘗曰某在何必看此書先生云是則先生不在時語録固不可廢和靖又謂易傳所自作語録他人所作先生云孔門專治春秋而廢論語可乎雜學辨蘇氏易解謂性命之理甚明蘇氏每為不可言不可見之說務為閃倐滉漾不可捕捉足以眩夫未嘗學問之庸人故為之辨蘇謂古之君子慮性之難見故以可見者言性皆性之似先生謂古之君子盡其心則知其性未嘗患其難見非但言其似而已且性又豈有一物似之而可取此以况彼耶愚患蘇之辭遁先生之辭直不待深辨人知所擇矣蘇謂君子日修其善以消其不善不善者日消有不可得而消者焉小人日修其不善以消其善善者日消有不可得而消者焉先生謂其言不善日消有不可得而消者疑若謂本然之至善言善日消有不可得而消者疑若謂良心之萌蘖而蘇氏初不知性之所自來特假浮屠非幻不滅得無所還者為是說而幸其或中愚竊意蘇言君子修善以消不善可言小人修不善以消其善不可夫小人特陷於不善而不自知不善者日長則善者日消亦不自知耳不善者何可言修善者亦何嘗有心於消之蘇言善者日消有不可得而消者可言不善者日消有不可得而消者不可夫天理無澌盡善者固有不得而盡消天理渾全則人欲消盡特患夫人不能自盡其力何不善者之不可得而消嗚呼此蘇氏之所以不知性也蘇謂孟子之於善見其繼者而已先生謂孟子道性善蓋探其本而言之與易之㫖無毫髮異愚謹按先生平日論易與孟子之言善本分兩截繼之者善言太極分隂陽繼此而生人物者皆此善是主造化而言孟子道性善言人性所得於隂陽造化而生之理渾然純粹是主人性而言人性之善正由本隂陽繼之者善故無不喜蘇子誤認繼之者善為人物既生以後之事故先生不復如平日分兩截徑探其本言之學者更當參其平日之言蘇黃門老子解蘇侍郎晚為是書合吾儒於老子為未足又并釋氏而彌縫之可謂舛矣然其自許甚髙至謂當世無一人可語此而其兄東坡亦以為不意晚年見此竒特其可謂無忌憚者歟因為之辨蘇謂孔子以仁義禮樂治天下皆器也而晦其道老子絶而棄之以明形而上之道先生謂示人以器則道在其中蘇氏離器而言不知指何物名道道者仁義禮樂之總名今曰絶仁義棄禮樂以明道是舍二五而求十也豈不悖哉蘇又謂因老子之言以逹道者不少而求之於孔子者常苦其無從先生謂因老子之言逹道者何人何如其逹而所逹何道孔子循循善誘誨人不倦入德之途坦然明白而曰常苦其無從乃自狀其不知道而妄言耳蘇又謂中者佛性之異名而和者六度萬行之總目也先生謂和者天下之逹道也六度萬行吾不知其所謂然毁君臣絶父子以人道為大禁逹道固如是耶張無垢中庸解張公始學於龜山逃儒以歸於釋而其釋之師又教以改頭換面故凡張氏所論著皆陽儒隂釋蓋不特莊周出於子夏李斯原於荀卿而已因覽中庸說掇其尤甚者著於篇天命之謂性言性之所以名乃天之所賦人之所受義理之本原今無垢謂贊性之可貴耳未見人收之為己物則是天之生人未以此與之而置之他所人自起而收之而後得為己物不知未得此性之前其人孰使之呼吸食息於天地間以收此性性又豈塊然一物可博而置之軀殼中耶張又云變者此誠忽然而有倐然而無又云吾誠一往則耳目口鼻皆壞又云誠未足貴凡其語怪不倫處先生一一為之辨吕氏大學解吕氏之先與二程遊家學最為近正然未能不惑於浮屠老子之說末流不能無弊今論一二以補其闕先生又自注其下云正獻公神道碑載公進讀上語及釋老公曰堯舜雖知此乃以知人安民為急此其所差之端本原如此則其流弊可勝道哉吕解致知格物云與堯舜同者忽然自見先生謂此釋氏一聞千悟一超直入之虛說也吕氏又云草木之微器用之别皆物之理也求其所以為理則為格物忽然識之此為物格先生謂此釋氏聞聲悟道見色明心之說也吕氏又云聞見未徹正當以悟為則所謂致知格物正此事先生謂以悟為則乃釋氏之法而吾儒所無也古史餘論蘇子曰古之帝王皆聖人也其道以無為宗萬物莫能嬰之先生謂此特以老子浮屠之意論聖人非能知聖人之所以聖也至謂孔子知之至而未嘗言孟子知其一二而人不信是以夫子之言為有隱而孟子之知為未盡也又黃帝紀云其言與老子相出入以無為宗其設於世者與時俯仰皆其見於外者也先生謂是以聖人之內外心迹判然兩途而文章事業之見於世者皆不出於中心之實然也又舜紀云舜禹避朱均而天下歸之足以致天下之逆益避啓而天下歸啓為不度而無恥先生謂避之而彼不吾釋則不獲已而受之何病於逆避之而幸其見舍則固得本心之所欲又何耻焉惟不避而強受之乃為逆偃然當之而彼不吾歸乃可耻耳夏紀以與賢為好異以與子為不敢與賢以為異周紀謂民生之初父子無禮君臣無義先生各辨其失云讀余隱之尊孟辨隱之建安人名允文其一溫公疑孟謂夷惠之行與夫子同非隘與不恭也先生云夫子時乎清而清時乎和而和夷惠一於清和故孟子又立言以救其末流之弊又謂陳仲子亦狷者有所不為也孟子過之甚先生云正使母兄不慈不友亦無逃去之理又謂孟子以齒德之尊自居先生云逹尊三者不相值則各伸其尊一或相值則通視其重之所在而致隆焉又謂孟子不告齊以止其伐燕先生云明鏡止水照其面我者而已不能探其背而逆照之沈同以私而問燕故燕之可伐孟子之所宜知也不以公而問齊故齊之不可伐孟子之所不宜對也又謂父子不責善是父不教子不諫隱之辨云教以義方豈自教哉觀過庭事可見先生云觀內則論語則其諫也以微又謂孟子論性無有不善為失言指朱均為證隱之辨云犧生犂胎龍寄蛇腹豈常也哉又謂貴戚之卿諫不聽則易位為亂之資辨云孟子得春秋之遺意又謂孟子為禮貌飲食而仕又謂仁者皇帝王伯皆用也又謂舜竊負而逃為里巷之言先生皆一一明其說而竊負特設辭耳其二李泰伯常語專闢孟子勸時君行王至以為五伯之罪人先生云李氏不知時措之宜詆孟子而甚畏齊王尊管仲至以文王太公比之良由不識聖賢本心李氏又謂無孟子可也不可無六經無王道可也不可無天子先生云有孟子而後六經之用明有王道而後天子之位定其三鄭公藝圃折衷謂孟氏挾仲尼以欺天下賣仁義者也意齊王不知價遂愚齊王求極所索而後售覺齊王之稍覺也抱而之他三宿出晝冀齊王呼已而還直又謂秦漢欲無夷狄韓愈欲無釋老孟子欲無楊墨甚哉未之思隱之亦皆為之辨而先生斷之愚嘗妄意孔子蓋在下之堯舜而孟子則湯武救世之心也時也然亦不過勸時君以行仁義而已耳溫公以恪實執一之見而疑之此可與權之所以為難也泰伯亦邁往之士而尚縱橫之學固宜詆孟子如云可無王道等語何其自背於理以自貽後世之譏未足攻孟適以自攻矣嘗記葉紹翁四朝聞見録力辨泰伯諸書無一詆孟子而常語獨詆之以為僞書且考世所傳泰伯不試四科優劣論之年此年泰伯實不預試恐泰伯未嘗詆孟子或如紹翁之云也特所學正與孟子相反則攻之亦其情耳若鄭氏折𠂻特病風喪心信口叫號之言亦何足辨且凡世之惑於異端而自叛聖門者不敢明詆孔子必借孟子為之詞愚所聞見往往而然使孔子而可明詆論語一書亦安知其不求疵耶善乎韓文公之言曰觀聖道必自孟子始此韓子灼然有見於斯道之傳而非他人所可及歟較之濓洛特未至精微耳然其廓清之功豈細乎哉胡子知言疑義蓋先生與張吕講辨其疑者知言曰天理人欲同體而異用同行而異情先生云胡子欲人於天理中揀别得人欲又於人欲中便見得天理其意甚切然本體只一天理更無人欲去却人欲便是天理聖人未嘗教人識天理於人欲汨沒之中也愚謂胡子之言本自難曉先生既為以意逆志而明之又為析微直指以斷之有功後學何如哉知言曰心無不在本天道變化為世俗應酬又曰放而不知求耳聞目見為己蔽父子夫婦為己纍衣裘飲食為己欲先生云疑世俗字有病猶釋子謂父母家為俗家也愚謂己蔽己纍己欲皆民彛天倫人事之不可廢者今一切病之亦恐染於釋子之說知言曰性者天地鬼神之奧或問心曰無生死先生云兩章似皆有病又知言曰欲為仁先識仁之體先生云此語大可疑又曰動則心矣先生云心字作情字如何更同安縣學齊名如彚征之名乃學優而仕之事非學者所宜先乃更以志道據德依仁游藝目之同安諭學者學如不及猶恐失之此君子所以孜孜愛日今或未及日中而散教不素明也不欲舉有司之法姑以文告知古人之所以為學則將有欲罷不能者諭諸生學者相與嬉其間其傑然者乃知以干祿蹈利為事至於語聖賢之餘㫖究學問之本原則罔乎莫知然理義所以養心者固在諸君顧不察耳諭職事學校之政不患法制之不立而患理義不足以養其心補試榜諭君子學以誠其身近世假手程文以欺有司今勸父兄之愛子弟者為求師友習孝弟馴謹之行以誠其身何必因人成事幸一朝之得而貽終已之羞哉策試榜諭凡朝廷之事非草茅所宜言而師生相與之誠意亦不當數見於文字之間策問大抵皆以修學事略啓其端而叩之謂賢良方正科特以疑文隱義困於所不知如此則賢且良矣至以博學宏詞自命而試於禮部者則又可笑愚按博學宏詞之科設而賢良方正之科廢則士不於其行而於其文已可笑近世狹天下為無人去宏博之稱以小詞科名之士亦就焉又可笑近年小詞科例抑而不取士猶就之愈可笑嗚呼試科舉者猶曰草茅借此仕進也試詞學者皆已仕進之人也不讀書明理以修己治民而猶窮日夜綴緝以自取薄賤豈惟可笑亦可悲哉謂州縣雖有學獨城闕之子得以家居廪食出入以嬉白鹿書堂策問問孔孟後荀卿揚王韓本朝歐王蘇胡程氏之學記解經凡解釋文字不可令注腳成文讀書之要循序而漸進熟讀而精思論語課㑹說古者潛心六藝考諸日用疑焉則問後世之所講有不待問而弟子之聽於師又非所疑具一時之文耳講禮記序說禮者履也謂昔之誦而說者至是可踐而履也禮以極卑為事愈卑愈約玉山講義程珙問孔子言仁孟子兼言仁義又問三代以前只說中與極先生與之敷析甚詳愚按此疑而問問而答者也橫經講授近世無過於先生者矣以此為訓奈何猶有攜經就講所在謀衣食或延人設講求蓋俗吏之名者豈所謂猶勝别留心者耶雖然不若務其實者滄洲精舍諭學者老蘇學為文兀坐終日讀書者七八年今人要學道未能用旬月熟讀一卷書不曽舉得一兩行經傳成文不曽記得一兩處首尾相照不如歸家杜門依老蘇法將大學論語孟子中庸及詩書禮記程張諸書讀之有箇入處方好求師所謂就有道而正又諭學者唯志不立直是無著力處增損吕氏鄉約德業相勵過失相規禮俗相交患難相恤禆正書唐陳昌晦所撰先生在同安時訪先賢事傳而得之序家藏石刻序歐陽集録一千卷時玩之泉南又得東武趙氏金石録數倍之乃集家藏數十種追配之上蔡語録序以最後得胡文定家寫本上下篇為正而去吳中板本增多至百餘章又得其遺語三十餘章别為一篇凡共著三篇論語纂訓序先生外兄丘子野所纂凡十四家論語要義序魏何晏集漢魏諸儒之說為注本朝邢昺修皇甫侃之疏為正義王安石父子嘗盡廢之二程獨得孟子以來不傳之學於遺經先生始遍求古今諸說而編之刪為要義論語訓蒙口義序刪録要義以成之本之注疏以通其訓詁參之釋文以正其音讀然後㑹之諸先生之說以發其精微又以平生聞於師友得於心思者附見戊午讜議序太上中興恢復之勢已八九成秦檜歸自敵庭力主和議當時人倫尚明人心尚正天下交口以為不可而檜以梓宫長樂藉口和議遂不可破自是以來士大夫狃於積衰之俗以忘讎忍辱為當然癸未之議曰不可和者尚書張公闡左史胡公銓而已秦檜之罪使人倫不明人心不正而末流之弊至於如此之極因讀魏元履所次戊午讜議而發明其意如此送張仲隆序聖賢言治必以仁義為先而不以功利為急不知出此而茍有一切之計是申商吳李之徒所以亡人之國而自滅其身者國雖富其民必貧兵雖強其國必病利雖近其為害也必逺顧弗察而已程氏遺書序二程門人各自為書散出並行傳者頗以已意竄易先生有家藏數篇皆著當時紀録主名未更後人之手後益以類訪求得凡二十五篇遺書附録序明道行狀之屬凡八篇伊川之祭文奏狀各一篇又伊川行事本末取實録文集凡他書可證者次為年譜語孟集義序搜輯條流二程之說又取張橫渠范氏二吕氏謝氏游氏侯氏尹氏凡九家之說附之名曰精義後改名集義云通鑑綱目序溫公編通鑑既成别為目録三十卷上之晚病本書太詳目録太簡更著舉要厯八十卷未成也胡文定公復修舉要補遺先生因兩公四書别為義例表嵗以首年而因年以著統大書以提要而分注以備言名綱目云言行録序先生病文集及記事書所載名臣言行散出無統又汨於虛浮詭誕之說掇聚為此録中和舊說序先生自叙幼從李延平求喜怒哀樂未發之㫖未逹聞張敬夫得衡山胡氏學往問之亦未省退而沉思謂人自嬰兒至老死莫非已發特其未發者為未嘗發爾後忽自疑復取程氏書虛心平氣而徐讀之未及數行凍解冰釋然後知情性之本然聖賢之微㫖其平正明白乃如此尹和靖言行録序程夫子有言涵養必以敬進學則在致知若尹公其學於夫子而有得於敬之云乎先生微意蓋有未滿於其致知者程氏外書序十二篇名外書者以取之之雜視前書尤當精擇中庸集解序唐李翺始為之說然所謂滅情以復性者又雜乎佛老至濓溪始得其要以著於篇二程於此既皆無書門人惟吕氏游氏楊氏侯氏有成書若橫渠若謝氏尹氏亦或記其語别自為編㑹稽石子重始集而次之詩集傳序本之二南以求其端參之列國以盡其變正之於雅以大其規和之於頌以要其止再定太極通書序太極圗說一篇通書四十一章世傳舊本遺文九篇遺事十五條事狀一篇皆先生所集次周子之學莫備於太極一圗而諸本皆附於通書之後長沙本胡氏所定通書章次頗有移易又刋去章目惟建安本特據潘志置圗篇端而書之次序名章亦復其舊後得臨汀楊方本盡正其舛陋云吕氏詩記序唐初諸儒疏義不出毛鄭之區域本朝劉侍讀歐陽公王丞相蘇黃門河南程氏橫渠張氏始用己意發明及其久而說者愈多學者無所適從吕氏家孰始兼總衆說而㑹通之李丞相奏議序謂天之愛人甚矣迫於氣數而或至於亂也亦預出弭亂之人以擬其後若故丞相隴西公所謂能弭亂之人非耶政宣之際都城大水猝至公獨知其必有戎狄兵戎之禍上疏極言不幸謫去不七年敵薄都城公以眇然放逐之蹤出負天下山嶽萬鈎之重遂却強敵復以逺謫建炎再造首登廟堂慨然以修政攘夷為己任又遭以去其在紹興因事獻言深以議和退避為非䇿反覆之終其身使公之言用於宣和之初則都城必無圍迫之憂用於靖康則宗國必無顛覆之禍用於建炎則中原必不至於淪陷用於紹興則復祖宗之宇而報不共戴天之讎久矣顧乃使之數困於庸夫孺子之口不得卒就其志嗚呼痛哉然今天子方總羣策以圗恢復是書也得備清閒之燕而幸有以當上心者則有志之士將不恨其不用於前日而知天之所以生公者真非偶然矣愚按先生此序感慨世變令人於邑蓋不特為李公發也後學所當成誦通鑑舉要厯序清源郡舊刻舉要厯八十卷謝公克家記其篇首甚悉朝命以其板付學省航海而沒焉溫公之曽孫伋來領郡再出家藏本刻焉先生謂溫公愛君忠國稽古陳謨之意再三而不能已者尤於此書見之視其書之顯晦而考其所以關於時運者則公所為再三不能自已之心可為太息而流涕南軒文集序孟子沒而義利之說不明董仲舒諸葛武侯二程先生屢發明之而世莫信國家南渡張魏公唱明大義以斷國論胡文定公誦說遺經以開聖學敬夫魏公嗣子而講學於胡公季子五峯先生之門故其見於議論措諸事業無一毫功利之雜既沒其弟定叟裒其故藁先生謂其平生之言不止此也其心亦未嘗一日以是而自足也乃益為訪求斷以敬夫晚嵗之意定其書為四十四卷復取經筵口義一章附於表奏之後使敬夫所以堯舜吾君而不愧其父師之傳者讀者有以識其端向薌林文集序大略云張子房為韓報仇雖不遂然卒藉漢滅秦然後棄人間事使千載下聞風歎息可謂壯哉陶元亮自以晋世宰輔子孫耻復屈身後代雖事業不槩見而髙情逸想播之聲詩者後世皆自以為莫及也蓋古之君子大者既立而後節槩之髙語言之妙乃有可得而言不然則紀逡唐林之節非不苦王維儲光羲之詩非不清一失身於新莾祿山則所辛勤而僅得傳世者適足為嗤笑資余以是觀古驗今而於薌林居士向公有感也公自文簡公左右真宗欽聖憲肅母儀天下慶流宗支不可勝數然逮公之仕則國家之變極矣絶僣叛守孤城危於九死而不奪及紹興爭和議至病死不忘豈不凛乎子房元亮之心哉然二子皆為之於不可為之後不及有益人之國公乃竭股肱之力宗社再安勞烈所就視二子又有光焉是以中年乞身一觴一詠豈徒以發興吐辭之工蓋必有其本矣謝監嶽文集序謝綽中建之政和人晦翁先君子尉政和行田間聞讀書聲入而視之儀禮也以時方專治王氏學而獨能爾異之即與俱歸勉其所未至遂中紹興三年進士第主邵武之泰寧簿自以不能俯仰歸領祠官以卒其子東卿以遺文過武夷精舍先生相與太息流涕而序之金華潘公文集序中書舍人潘公宣和初為博士獨斥大臣蒙蔽為館職不遊蔡京父子門使淮南不肯與中官同燕席靖康召對論時宰何㮚唐恪不可用建炎初召為右司諫首論亂臣逆黨紹興入為都司又忤時相以歸秦檜擅朝公遂廢不復起前後出入三朝在官不過八百六十餘日所居謹庇風雨郭外無尺寸之地先生許以孔子所未見之剛因其兄子畤之請而為之序大學章句序自伏羲神農黃帝堯舜而司徒典樂之官已設三代之隆其法浸備孔子取其法誦而傳之孟子沒其傳泯焉程夫子出而有以接乎孟氏之傳顧其為書猶頗放失是以采而輯之中庸章句序中庸者堯舜禹所以相傳也天下之理豈有加此吾夫子雖不得其位而所以繼往聖開來學其功反有賢於堯舜者子思推本堯舜以來相傳之意質於平日父師之言作為此書而程夫子所以為說者不傳故為定著章句復取石氏書刪為此書雲龕李公文集序參政文敏李公扈蹕臨安適遭己酉三月五日之變挺身赴難神采毅然逆折凶渠諭以大義退而隂贊宰府為離二逆黨尊復明辟之計是其所以立豈獨以其文而已哉豐清敏遺事序法家拂士低回遷就詭辭以幸濟者公獨正色誦言以至流放以沒愚按公四明人東都事略亦云此序以為縉雲蓋其先自栝徙鄞耳武夷圖序武夷君著自漢世祭以乾魚不知果何如今崇安縣南餘二十里武夷山相傳即神所宅清溪九曲人迹不到處往往有枯查插石庋舟船棺柩柩中遺骸外列陶器尚皆未壞頗疑前世道阻未通川壅未决時夷落所居而漢祀者即其君長今山之羣峯最髙其大者猶以大王為號半頂有小丘焉豈即君之居耶羽人髙文舉更定圗本為題其首韓文考異序歐陽公言韓文印本初未必誤多為校讎者妄改如羅池碑改步為涉田氏廟改天明為王明之類耳公自言兒童時得蜀夲於隨州李氏嵗月當在天禧中其書已故弊則摹印與祥符杭本未知孰先孰後而嘉祐蜀本又其子孫明矣然猶三十年間聞善本必求而改正之固未嘗必以舊本為是至祕閣本則亦民間所獻是正之者豈盡劉向揚雄之徒哉近世本多不同惟南安軍方氏校定本號精善别有舉正十卷論所以去取之意又他本所無然其去取以祥符杭本嘉祐蜀本及李謝所據祕閣本為定而尤尊祕閣本雖有繆誤往往曲從今更悉考諸本之異同茍其是雖民間近出小本不敢違有所未安雖官本古本石本不敢信各詳著其所以然為考異十卷黃子厚詩序子厚名銖少先生一嵗同事屏山劉病翁所工詩文琴書以窮死其徒三山許閲裒其所作先生極言其變化開闔恍惚微妙其形容委折變態處三嘆有遺音矣宜玩味之楚詞序自屈原賦離騷而南國宗之通號楚詞而離騷深逺矣然自原至漢未久說者已失其趣如太史公未能免而劉安班固賈逵之言世復不傳隋唐間訓解者尚五六家又有僧道騫者能為楚聲之讀亦漫不復存獨東京王逸章句與近世洪興祖補注並行而王書之所取舍洪氏皆不能有所是正於是稍加櫽括定為集注八卷又因朝氏續變二書補著五十二篇所取必其凄凉怨慕者為得其餘韻而以無心而𡨕㑹者得闕黃氏日抄卷三十五
