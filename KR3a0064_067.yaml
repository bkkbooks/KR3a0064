body:
  text: 黃氏日抄卷六十七宋黃震撰讀文集九范石湖文詞賦雜詩館娃宫賦謂吳王未聞大道宜其志荒問天醫賦謂不敢以人勝天望海亭賦設客辭以誇之亂曰有是哉吾將觀焉桂林中秋賦感九得秋而九徙楚詞四首幽誓愍遊交難將歸古律詩河豚嘆百年三寸咽水陸富肴蔌一物不登俎未負將軍腹荆公墓六言本意治功徙木何心黨禍揚塵報讎豈教行劫作俑翻成不仁姑惡詩東坡云姑惡姑惡姑不惡妾命薄石湖謂此句可以泣鬼為作後姑惡詩首云姑惡婦所云恐是婦偏辭斷曰姑不惡婦不死舟行驟雨云圓漪暈雨點濺滴走波面後催租行賣衣得錢都納却病骨雖寒聊免縳去年衣盡到家口大女臨岐兩分首今年次女已行媒亦復驅將換升斗室中更有第三女明年不怕催租苦石湖初為新安掾謂歙溪為浙江之源正可言江述黃君謨州學記云瀕江地卑自徽至嚴二百灘以乳灘為最險徽之黃山三十六峯以天都峯為最髙有溫泉在黃山之朱沙峯下次韻胡邦衡人窮名滿世天定客還家贈倪文舉朱門不炙釣竿手萬卷難供折腰具會散夜步詩貪看雪樣滿街月不上籃輿步砌歸自注云步砌吳語也第十三卷律詩使邊道中作云汴河自泗州以北皆涸草木生之土人謂本朝駕回即開西瓜本燕北種石湖謂今河南皆種之黃河將決處伏流先出名漸水滑州為河淪在積水中韓魏公墳無恙曹操七十二疑冢詩聞説羣胡為封土世間隨事有知音安肅軍北門外為出塞路十五里至白溝亦名巨馬本朝與遼人分界處渡江即與太行俱北至燕猶未斷涿北燕南之間有灰洞兩旁皆高岡蹲鴟巾館伴所裹燕宫宏侈過汴京亮所作也龍津橋以玉石為之第十四卷遊辨山石林故居已廢矣餘詩皆浮湘入廣時所作題浯溪謂元結寓譏為非遊愚溪注鈷鉧尉斗也潭形似之蠻茶出修江治頭風老酒留數年南人珍之故以蠻茶對老酒一南人以蚺蛇皮作腰鼓交趾以象革為兜鍪又以蚺鼓對象鍪皆風土語也石湖帥廣之明年乙未年五十矣是年正月二十八日自廣易蜀五月二十六至遂寧紀行詩百三十五首嚴關者桂之守險處至是出嶺矣鏵觜者在桂之興安縣五里秦史祿疊石壇前鋭如鏵迎海陽水分為南北即湘灕二水南流為灕北流為湘言二水相合離羅江者嶺北初程北流入湘江趨清湘縣全州界也入零陵縣永州界也去零陵十里為湘口有滎水來自道州營道縣湘水來自桂之海陽至此合為一江按瀟水出九疑山至永興湘水合豈即營水耶湖嶺之間湘水貫之凡水皆會之以瀟水合者曰瀟湘以蒸水合者曰蒸湘以沅水合者曰沅湘浯溪在析陽縣南五里自永州界入衡州過潭州為洞庭其南曰青草湖是為重湖由是而至湖北之澧之江陵入蜀江泝峽州道始艱有一百八盤有鑽天三里有蛇倒退有麻線堆有胡孫愁有判命坡峽為蜀外第一州湖北之極處由是入歸州為夔路矣長石截入歸州郭下三分之二水極險為人鮓甕至巴東為峽口入巫山峽其盤渦之大者名濆淖其地刀耕火種斫山木盡蹶候雨前一夕火之藉其灰以糞有物名笮音作竹索渡水者自巫山還陸避黑石諸灘過鬼門關入瞿唐厯灔澦為夔州萬州合州皆山也至遂寧府始見平川遂寧則潼川路矣達成都淳熙四年丁酉公出蜀將至公安詩云我馬虺隤我僕痡豈不懷歸畏簡書愚前年上孫江隂大閲詩有云悠悠斾旌馬蕭蕭有同官云詩無用經句者今石湖集中此類甚多豈近世晚唐詩始不用經語耶蜀音難曉反以京洛音為虜語或是僣偽時以中國自居也既又諱之改曰魯語見安福寺禮塔詩注老宅即老人村也舊名獠澤石湖更今名索橋以繩架空萬州杏剔核方賣以核為杏仁狠石二字三見此册湘口夜泊詩云狠石蹲清漲土門詩云狠石卧中路並十六卷離􅕞行云殘山狠石雙虎鎖十九卷北秦太守金龍云地水涸致祭即壅都江永名溺水又後册二十卷瞿唐行云鑿峽疏川狠石破是石湖行川湘間皆以狠名石愚按皇甫湜狠石銘謂秦皇發石驪山為墳礎有石屹立人力莫施故老相傳遂以狠名此語雖不經而狠石之名已有自來京口甘露寺亦有狠石乃傳為三國孫劉事豈又展轉附會耶二十卷公出蜀時詩也江安近瀘州有張旗三灘言湍急過之速也有渡瀘亭有韋臯紀功碑瞿唐行注云灔澦撒髮不可犯一夕水漲沒之名青草濟遂略其頂而過白鹽赤甲峽口大山黃嵌黑石皆峽中至險入峽西岸有聖泉舟人向之疾呼曰人渴也泉即迸下一杯許復乾黃魔灘下連人鮓甕秭歸縣治世傳宋玉宅旗亭題宋玉東家巫山不止十二峯其大者十二峯東西各一峯最奇黃牛峽廟為黃牛神之居門有石馬即歐公所夢者亦有虛髙峯上有黃牛迹此山名假十二峯扇子峽兩岸山尤奇至荆渚回望山無一點矣南樓在鄂州江州庾樓後人以亮嘗刺江故假鄂之名大孤山澎浪磯皆在湖口馬當伏即小説載神助王勃一席清風處二十一卷還直玉堂與還吳所作太湖靈祐觀有垂絲檜林屋洞左又二門曰雨㿩谷洞毛公壇劉根也身生緑毛故云銷夏灣吳王避暑處華山寺在西山盡處多泉泓嘲蛟四十韻極工層層而起如昌黎詠雪詩二十二之二十六多帥鄞所作自鄞移金陵將行遍遊諸山至金陵而詩少其所遊鍾山半山耳歸吳有上元節物三子二韻工緻釋氏謂常行為般舟行步之行馬齒莧中付水銀雞頭芡也名水琉黃為對白髭行載四十四嵗出疆四十九使廣復使蜀又十年垂雪毿毿作此所藏小峩眉靈壁石也煙江疊嶂太湖石也天柱峯英石也皆歸休時間玩甲辰除夜呤多及間適之意請息齋屢有作則絶交之語當有激也夜坐有感詩説賣卜丙午新正詩石湖年六十一矣有云人情舊雨非今雨老境增年是減年口不兩匙休盡穀生能幾屐莫言錢自此皆退間消遣之作矣吳燈詩等間三夕看消費一年忙初夏詩雪白荼䕷紅費相尚擕春色見薰風田圓雜興內槐樹云三公只得三株看間客清隂滿北忩雪下菘云朱門肉食無風味只作尋常菜把供其間居動息皆以牆外人物聲為節重陽後菊世情兒女無髙韻只看重陽二日花送炭龔養正煩君笑領婆歡喜靈岩雪浪長風三萬頃蒼煙古本二千秋圍田歎四首言大家之妨細民素羮詩新法儂家骨董羮元日立春併煩傳菜手同捧頌椒盤吳農忌五月甲申乙酉雨尤忌乙酉二十七卷梅雨注又忌立秋雷二十九卷秋雷歎臘月村田樂府十首冬舂行冬舂不炷燈市行祭竈詞口數粥行爆竹行燒火盆行照田蠶詞分嵗詞賣癡呆詞打灰堆詞梧子能墮髮三十三卷霜後十二絶虎丘石井在張又新東南水品第三久廢不知其處石湖以大方井語壁老復之白玉樓步虛詞序甚工類韓文畫記愛雪歌棹夫披簔舞白鳯灘子挽繂拖素虬末句云須臾未遽妨性命呼童盡捲風簾鈎龔養正元日六言流年五十踰二明日半百過三石湖次韻嵗踰耳順俄七年去古稀只三龔五十三范六十七奏狀繳偽會齊仲斷案為中書時所奏初乾道六年七月四日指揮限三日毁印湖州齊仲以八月十七日有犯斷以死罪謂在三日外也石湖謂七月七日降指揮十一日方關户部檢法案金部之與法案同一曹局頃步之間八日方能關行而況傳至外州合更審會湖州出榜的日仍豁限三日勑限外照本人所犯日子然後處斷愚謂此仁人之舉也記之主管殿前司公事王友直奏男娶左翼軍統制趙渥女以渥分戍泉南免避親嫌石湖謂如渥比者始可權免爾劉錡之於劉汜不避子姪之嫌吳璘之於姚仲不避姻家之嫌皆至敗事蓋兵家利害動關生殺非若州縣官止於舉劾而已令諸軍不得因今來指揮輒容合避親充將佐節使知宗士銖乞照嗣王例全支米麥等恩數石湖奏立愛惟親固聖人之用心法行自近始亦聖治之先務貴近無尺寸者相習如此異時勳臣戰士若復越制請求則如之何而拒之論宋貺召命貺蓋秦檜親昵者以上皆中書所奏廣西無酒稅商舶所入祖宗撥諸路錢物助之湖北軍衣絹四萬二千匹湖南絁一萬五千匹綿一萬兩廣東米一萬二千石提鹽司鹽一千五百萬斤韶州岑水場銅五十二萬斤付本路鑄錢一十五萬貫總計一百一十餘萬貫並充廣西支遣建炎兵興諸路不復撥到所籍者官賣鹽耳廣西漕司嵗發鄂州大軍經略司買為靖州共二十一萬貫嵗撥諸經費及諸司循例支遣共五十二萬二千八百貫通計七十三萬一百貫均撥鹽數諸州出賣除收息充嵗計外又别支鹽附賣以六分為大軍買馬及靖州嵗計四分助諸州又計一十九萬四千一百貫有畸紹興八年六月改官賣鹽行客鈔利歸鹽司分𨽻起發時漕臣髙繹止具舊來經費已失四分所管十九萬四千一百餘貫之利又便擬鈔法必及嵗額以太半不可指凖之錢為一路嵗計以致諸州困乏軍無贍養後因鈔鹽不行乾道四年六月四日復令官賣遇東鹽廢弛以不得過西路為説乾道七年六月二十八日復通行客鈔石湖入蜀值宜州對境南丹州莫延椹入省地作過謂皆因雍宜融邊郡無錢糧軍政廢弛所致力請於朝以復行官賣鹽為第一事繼又條四事一乞招填諸州將兵二乞以前提刑滕㢗效用軍發赴行在逃亡者招充本路效用小弱者斷給據自便三以廣西人少一保動隔山川改户長法止以三十户為一料四以簿尉規避上司别差無藉者攝之乞禁止又劾宜州兵官不之任及冒極逐賞又轄鈐將副老者與祠乞改四月十五科舉為三月十五以免冒暑乞以銓試三場分日凡皆帥廣時奏奏西蜀酒課重上為出上供錢四十七萬對減折估成州東柯鎮太平監之間去邊境三十里有銀坑恐啓戎心棧塞之論安撫司不當辟城寨官事屬制司凡皆帥蜀時奏也薦知繁昌縣鮑信叔詣州抱酒稅額而減酤價罷市征商旅悅集縣計以充補解前官欠三年減饒民户猶有餘積愚謂以信叔為能吏則可耳後不可繼必有受其弊者然楊萬里尤袤皆薦之知處州上殿陳日力國力人力之説謂稽古禮文之事太繁承平虛費之習未盡又陳録問事謂法云人吏依句宣讀無得隱漏令囚自通情以合其欵詳此法意不止讀成案而已今離絶其文嘈噆其語造次而畢欲委長吏點無干礙吏人先附囚口責狀覆案無差然後亦點無千礙吏人依句宣讀又陳閲軍事按令惟郡守兵官得破不堪披帶人當直其餘専用廂軍今憚肄習而戀司局降就廂軍或徑降剩貪是簡閲未精也舊制營房損漏兵官不得替移霖雨經時有司先葺營寨今有營無屋雜處閭井是營伍未立也召對劄乞招閲弓手其後為右史又直前奏之論不舉子凖紹興八年指揮貧乏妊娠支常平米四斗十五年改支一石又令殺子之家父母鄰保收生人皆徒罪先是蘇軾知密州盤量寬剩得數百石専儲以養棄兒乞議減浙東丁錢松陽縣創義役囑交代樓璩行之餘五縣其後上殿取湖沂繕寫規約頒之天下後又以此義舉乞免處州丁鹽絹乞除歸明歸正字以示一家乞避兄成象立班照慶厯八年李端懿復防禦使與弟沂州防禦使端願同班端願乞下之例從之又元豐六年亦有兄任起居郎弟中書舍人班兄之下成象工部石湖禮部論重征莫甚於沿江如蘄之江口池之鴈汊號大小法場上而至荆峽往往有是名虛舟往來為力勝本無奇貨而妄呼名件為虛喝宜征百金先拋千金之數為花數客費日多則物日湧錢日輕乞禁沿江置場繁併并州縣於支港小路私置處省之內殿論奏讞嚴限剋期報應論凖令給因之物許支錢凖格在禁之囚許支米錢許於贓罰等支米無名色乞令運司下州縣苗米截撥闕米則合支錢收糴應詔編進勤政故實首一條謂乾之所以為天者自強不息而已愚按本文自強不息乃主人事言之非乾也法乾者也內殿論左右史郎左舍人右侍立典故唐制凡御殿二史立左右紫宸閣臨軒即立螭頭皆得密聞王言國朝淳化二年始置直崇政殿慶厯二年歐陽修同修起居注移立御前曰起居注非殿中秪候人不當立座後隆興元年胡銓乞復侍立故事御史臺會到經筵例宰執臺諌奏事權立朵殿臣僚奏事時立御座前閣門契勘垂拱殿常朝自來二史無侍立指揮今請比附後殿輪立旨從之餘依舊承平絹價不滿一貫而二貫滿匹定贓罪寬之也其後兵興物貴紹興三年詔匹凖三貫石湖以時價已至六七千合更量增一貫和買取民財隨時增價定民罪則減之聖政所大不忍也論銅錢入北乞聚茶榷場専以見錢出賣而輕其價則錢之在北者必來以管仲藏石壁來天下貨財為證又論蕃貨皆非吾中國不可無之物而誘吾泉寶以去欲權住明州蕃舶及北使回又奏四明溫陵商舶糴買出東麻豆彼減價而須見錢錢過界者不勝計使回奏諜者詭姓遁迹冒九死而圖萬全索隱察微問一二而知十百此非妄男子所能非其人不可泛遣用晉遣人覘宋事內殿論獻説迎合布衣補官之弊論知人不知其人而使之不集事則均受不才之名各以其長易地使之皆以才稱將帥為其下告贓乞此外一切原之賑濟須分就逺鄉論修史須立程限奏交州進奉政和五年指揮經過州軍更不復禮紹興二十六年施巨帥廣報謁移庖遂為例至是絶之論馬政四弊雍州買馬大弊二蠻人先驅一二百瘦病者為馬樣邀以買此而後大隊至暨至亦雜以半買馬司典吏與招馬人嵗久為弊一也橫山寨無草場支錢悉為官吏乾沒不以時得草二也沿路損馬大弊二所至無橋道涉水貪程一也州縣不與草料但計囑押人而去二也買之弊乞擇官損之弊乞馬病隨寓留醫又奏靜江府興安縣客旅私販水銀入建陽邵武賣異色錦私涉宜用蠻界至雍州溪洞邀蠻人教止易銀而以私錦售易之官價錦當銀三十五兩私錦只十五兩致官錦無用獨一色銀易馬不足且誘省地民負荷而縛賣之或夾帶姦細乞禁約於建陽邵武出錦之源淳熙元年指揮戰馬買四尺四寸以上石湖乞四尺三寸以上帶分亦選貴蓋自紹興六年指揮買四尺二寸以上也廣中元無戰馬羅殿自杞諸蠻以錦綵博之大理大理即南詔也諸蠻驅至橫山場互市每低一寸減銀十兩如四尺四寸者銀四十一兩三寸即三十一兩自橫山至雍州七程至經略司又十八程其道自雍賓象靜江出湖南紹興十年三月指揮經由州縣於經制錢立料應副湖南自全州至行在並遵依而廣西科稅户稅户陪些小錢物折與管押兵校而馬斃於飢渴矣石湖奏乞一體行又買馬久弊銀則雜銅名四六銀鹽則減斤百得七十皆為邊吏乾沒石湖以乾道九年到任措置銀不夾帶鹽足斤兩又印給支買慿由每量到馬匹即批上尺寸斤兩蠻人感悅得馬最多出嶺又奏乞常切檢察凖格買馬不及千五百匹展磨勘一年多二百匹減磨勘千匹轉官淳熙六年多千二百五匹廣西管州二十五四在海之南二十一在海之北在海北者外邊諸蠻內雜洞猺而雍宜為最要害雍州管東南第十三一將五千一百人淳熙初僅存七百七十餘人宜州管第十二副將淳熙初存五百三十餘人又多差押馬催綱接送雜役在營者皆老病與無兵同雍州馬元額一千六百匹至是亦僅二十七匹而已石湖申乞復行官賣鹽以其事力招填雍州買馬銀鹽繒錦數十百萬皆在橫山庫無城護藏無兵鎮壓乞將雍州守臣常擇折衝禦侮之材經司駐靜江是時見兵亦不滿二千人石湖搜強壯一千人并駐泊下揀百八十四人與摧鋒軍本司效用軍結隊上教旬兩披蓋自何佾為帥隆興間申㨂得五百人教閲今方再教之使郡將常以此存心太祖養兵之法何至反成蠧國哉近世見在軍不搜而反添刺孱弱以益其蠧可怪也石湖練兵之外又團結猺人作三節措置先結邊洞省民授器教陳次諭稍近猺人團結立誓然後許通博易最後又遣勇敢以近猺為鄉導深入不賓處如前諭之他日逺猺有犯須先破近猺近徭有犯先及邊團則官兵固已至矣是年靜江管下溪洞猺人結成五十五團置桑江寨以統屬之其義寧臨桂古縣一帶深山團結不盡者二十四聚落亦緣此不敢犯邊又置博易兩場以防其窮迫山之北置義寧縣西山之南置瀯溪隘下皆具圖册奏聞摧鋒軍本東路駐劄分二百人於西路靜江東路尚二千六百人又欲抽回靜江者石湖屢申不發謂固西路所以固東路也東路管十四州軍駐韶州非邊面故云昭賀二州旱既賑之又乞減四等以下户田租之半官賣鹽既行關防三事一慮漕司撥與諸郡抑配二慮取贏檯價民食貴鹽三慮倉吏減斤多裝籠葉自廣易蜀申八劄而後行皆在任措置軍民馬政實事俾後來者接續五十一卷以後皆帥蜀時奏劄一初邛部川首領蒙備歿弟崖襪繼蠻俗襲兄者妻其嫂蒙備妻嗚呼殿悅其幼弟部義而歸烏蒙部義從之結鳥蒙兩抹又旁近蠻謀取崖襪而代之相攻未決乾道九年春冬吐蕃青羌兩冦黎州崖襪部義皆常助我有功至是荆南府探聞其略謂賞不均而邛部擾乞賞部義石湖得其實申嚴斥堠而已具言蜀西皆與諸蕃接為唐邊害本朝經撫之且吐蕃南詔瓜分西南無警二百餘年嵗嵗備弛近嵗忽有雅州碉門之冦乾道吐蕃復冦黎州遂併嘉雅威茂四州永康石泉二軍凡七郡一體措置教將兵修堡寨并講明寨户土丁團結各自為戰以省戍役乞給度牒五百道濟其用又旌黎州死事者五人推官黎商老巡檢王勝監稅杜立指使崔俊楊滌并乞除放黎州欠負其説曰乾道冦入致欠錢引一萬五百四十道而總領司置獄雅州抑吏均陪錢引萬餘必非出自吏胥之家掊領居民漁奪商賈何所不至民困誅求反思有冦之嵗無此追擾望聖慈計其大者指此錢引下總司特免催理又以鳯州迫大散關乞下興元都統補其軍以階成西和鳯四州關外為北界首乞從諸司共選辟守臣凡其措畫西蜀邊防大略如此蜀自失陜竭其力養關外軍而折估最病民折佑者蜀酒課名也公契勘成都一郡元額四萬八千四百八十貫見收四十萬八千六百四十貫縣額十五萬六千四百四十貫見收三十九萬二百七十貫遂并核實四路共六十二州內十三州元無折估五州不申敗缺餘四十四州各有重額共奏減四十七萬二千五百四十三道錢引計十分內減八釐三毫有奇以總領司經費外事故僧道度牒截撥對減奏凡三四上其要有曰去四川數十年之害培其本根徐用其力國家長計也又曰逺方州縣吏為入朝廷根本憂者幾人折估不辨上司怪怒百方貼補上場陛下赤子而不恤後日意外之患其間貪墨又或並緣此所以實聞於朝廷者寡也又曰出納之司徒見枝葉粗存不知本根將撥又曰望陛下斷自宸衷與帷幄大臣決之不須更付有司彼有司者但知出納之吝安知根本之憂及得旨蠲放又奏舊以增額補敗闕有司以增數為不係帳錢而敗闕不問有司今後不得掠取係帳錢已而四路州縣節次申七月十五日以後百姓各啓建感恩祝聖道場五日或七日乞照前仁宗免𣙜河北鹽故事宣付史館時淳熙三年也公之拳拳根本者如此劄子薦樊漢廣除知雅州謝迓吏而挂冠官已至朝請郎咫尺奏薦而不問時年五十六孫松夀告老年六十六開外階成西和鳯四州嵗苦和糴而鳯州在魚開前百九十里係嘉陵江源灘石水澀階成西和去江愈逺無由漕運和糴莫免公契勘川秦軍糧減到利閬興州大興軍等處官糴買瀘敘客米多支錢并利州酒息共百萬以增添四州及金洋州興元府糴本使官自糴買通利路諸州並不科糴奏關外四州災傷準令安撫司體量措置轉運司檢放展閣常平司糶給借貸提刑司覺察妄濫茶馬司嵗起川秦兩司馬百五十一綱差成都潼川利路兵三千六百餘人管押馬斃大半逃亡不返又於內解雇夫錢一半每名二十八道尅衆兵月糧充之公申乞掯約蠲免先是以宣撫司權重罷之復制置司而關外都統不開報事宜公申審乞提刑依限決獄檢凖乾道令限五月下旬起離雖未被旨亦行興元洋州等處建炎依陜西法抽結義士在關外四州則名忠勇軍與免科率大散關之戰能為官軍先鋒後因差役規法浸壞乾道三年虞雍公宣撫得旨增結梁洋一帶計二萬六千餘人立為専法大要一語非因調發不許差使蓋朝廷無毫釐養兵之費而實寓正軍數萬於民間所當愛護至是都統郭鈞議差守關隘公以雍公専法爭之四川城寨兵官八十六闕舊制司差辟公至是申明且乞所給付身勿付幹事人並從吏部皮筒遞付黎州青羌失互市冦邊公乞未可許且謂蠻夷最畏西兵號喫人肉乞增西兵蓋黎州蜀門户也白水寨將王文才叛歸羌公募致斬之紹興二十七年指揮罷衙兵司提轄官公至是再凖指揮論邦本劄子得民有道仁之而已省繇役薄賦斂蠲其疾苦而便安之使民力有餘而其心油然知后德之撫我則雖天不能使之變而況蠻夷盜賊水旱之作安能搖其本而輕動哉乃者西蜀酒估之患捐錢五十萬代之償令一下歡呼祝聖者沸天隱地關外和糴之困免糴令下邊氓或至感涕於是知民之易德有如此者更願益加聖心深詔內外執事凡民疾苦悉以上聞茍可惠利勿率故常使光天之下至於海隅蒼生罔不被堯舜之澤則衆心成城天下可運諸掌矣論支錢劄子內郡拖欠因循弗償邊守望輕莫能理索擁其空城坐受艱窘羣蠻習見意輕中國如眉州旱敘州米萬石止與百石五十石或全不應副乞責四路漕臣參酌别立中制論兵貧軍中貿遷不無搔擾將兵幹當亦廢教習論吏廩俸給不以時得當専責之漕司不應廩稍息絶坐視不顧並蜀事論朝市儀注一乞令編攔人寬出班路使縉紳次序安行此朝廷之儀二乞俟屬車禁衛盡絶方許民庶通行此扈從之儀三乞有當避道分道斂馬側立之類一如儀制此街道之儀以下還朝奏事論二廣獄事憲司吏指摘片言以控抳邀求不滿所欲則追逮送勘故酷吏寧殺囚於獄以免後災深慮有數十年無詳覆事至憲司者豈真無死囚哉貢院添卷首長條背印知明州奏事皇子魏王鎮明七年而公承之奏倚閣諸司錢十五萬貫住罷不合幫錢米十之二三罷供進局還行鋪錢此於救弊為有大造又奏減免舶船抽解又奏將舶船客貨抄數估直若干候回舶亦將博買中國貨物估直與來貨價同方令登舟使别無餘力可換銅錢以絶舊來輕舠載錢潛行數程以俟大舟泄錢莫道之弊愚恐徒擾而無補如不科其抽解竟禁其貿易足矣又奏揀汰水軍立每年條制又奏配軍分送屯駐軍暨歸朝進海界圖本諸盜發各責地分官員及將海船五千八百八十七隻結申遇獲賊根治同甲愚恐巡尉非弭海盜之官海船不能止他船為盜滄溟浩渺責人以所難能或未可耳又乞截上供錢萬貫糴米定海縣倉以給出海兵船口食此恐官司未必可行乞配軍役滿十年不逃亡而本州此恐人情不能遵守殆紙上語也謂原道論一出則儒術益明二氏不廢此殆公佛學中自有所見然史越王亦學佛者嘗以此諌夀皇何石湖之異耶奏住催江東軍器免催殘稅借廣惠倉陳米以備賑糶此皆公自鄞移建康遇淳熙庚子嵗歉後初政也又奏沿江全藉上遊江西湖北客米兩得旨稅場不得邀欄乞申嚴行下鉛山膽水洪水後盡涸公時帥江東當淳熙辛丑仍歉乞借朝廷見樁建康等處米三十萬石穀二十萬石不候檢到損數通融兊便恐冬深民流救之無及也又謂廣濟倉等陳米儲之不過為塵土散之可以易民命沿江渡口流民過淮處如建康之靖安東陽下蜀大城􅓾馬家等渡太平州采石大信荻港三山上灣等處池州銅陵東流池口等渡皆差官給糧津發其回不願回者存養之近渡路口如建康界湖熟金陵鎮路口桐井四處復為之邀接津遣其自兩浙來者多自饒州石門取路亦置場給論其還勸分賞格減半細數用淳熙元年三月二十四日指揮被荒殘稅申乞蠲閣流移歸業收贖不候生滿行李牛畜並與收免渡錢凡荒政之大略具是一一皆可法者顧恐近世無復乾淳可貸之粟雖有力莫施耳委自兩字今官文書當語或謂自字當寫名今石湖荒政貼黃有委自守令一語然則自字作從字解也趂熟字浙人鄉談今再奏荒政亦有此字蓋謂荒處之人於熟處趂求也應詔三劄一刑獄舊制翻異不問次數今限五勘文具而已準令州縣禁囚而監司今具情節及候指揮者不得承受仍不得於未勘結之先改送他郡獲囚不得過百里見同照大軍倉轉船倉舊皆屬總所淳熙九年七月九日奉旨應有朝廷米斛總司不許干預時公任建康盤量大軍倉欠八萬六千餘斛奏以創倉已三十六年支過無慮二千餘萬斛不曽除豁亦不到底縱有情弊恐非合出於目即合千人延和奏事大欲未濟風俗偷安甚者遂稱行在為都下浙右為畿甸中原為北地歸正遺民為邊人専募屯田兵曹操作沙城孫權作疑城唐楊朝晟築水波三城三旬而畢裴行儉築碎葉城亦五旬而畢務神速也謝賜御書謂古人書法字中有筆筆中無鋒乃為極致所謂錐畫沙屋漏雨之法蓋自鍾王之後未有得其全者惟我髙考獨傳此妙而陛下親授家學曲盡聖能意象自然筆迹俱泯而萬鈞之筆潛寓其間譬猶宇宙闔闢不見斧鑿之痕雲霞卷舒殊非繪畫之力此非聖性天髙學力海富道腴德輝被於心畫則何以深造自得集其大成全美如此臣又嘗論李唐名家猶得楷法本朝作者但工行書如米芾所作飄逸超妙可喜可愕責以楷法殆無一字此事寂寥久矣夀櫟堂取散材獲夀之義光宗在東宫時與之書扁外制從官用偶句餘多散文偶句亦不雕斫如宫室花囿無所益朕雖是敦朴之先巧技工匠精其能爾尚禆總核之治如間暇而明政刑會通而行典禮大臣慮四方對皇極錫五福五禮教萬民之中三嵗計郡吏之治夙夜浚明入則宣其三德文武是憲出則柔此萬邦沈介師潭疏傅之歸鄉里雖祖道於都門子牟之在江湖諒存心於魏闕黃中宫祠問錢穀出入之幾能析秋毫報簿書期會之間殆窮日力曽懷户書事親盡道孝固可以移忠體國忘私恩或不能掩義葉衡起復太子正而天下定方妙簡於宫僚有進德而朝廷尊喜來趨於驛召陳良翰詹事建太子而尊宗廟對鄉儒術而招賢良王十朋詹事仗漢使之節旄有安社稷利國家之志得月氐之要領乃履山川犯霜露而歸趙雄使回示朴以先天下朕靡煩侈服之共首善之自京師爾其贊重暉之德沈夏工侍兼京少尹五材並用誰能去兵對六卿分職各率其屬天申命以用休對臣歸美而報上祗承於帝方圖百志之咸熙清問下民惟恐一夫之失所聖主獨觀於萬化對微臣莫望於清光夙夜浚明有家對左右祗事厥辟表北使回除中書舍人謝表使四方不辱君命既莫效於捐軀俾萬姓咸大王言復何資於潤色自中書帥廣紫微鳯閣曽莫代於堯言桂海水天但欲窮於禹迹帥蜀去國八千里憾青天蜀道之難提封六十州豈白面書生之事帥蜀即真俎豆則嘗聞之何以折衝於疆場期月而已可也豈宜久假於事權不泄邇不忘逺均萬里於户庭在知人在安民揭九霄之日月賀髙宗天申節上天申命用休對大德必得其夀呼神山之萬嵗夢逺鈞天開夀域於八荒歡同率土賀孝宗會慶節四七際而火為主親協帝以重華五百年而王者興儼恭已以南面謝瞻爾庭而有待人謂何功以公服而衣租臣猶知懼貪天之功以為已力固何異竊財之譏如川之至以莫不增尚能歌歸美之報郊祀美盛多而告神明對觀會通而行典禮太上皇三十六年之在宥與物為春萬八千嵗之升恆自今以始為天子父尊之至密藏廣運之聖神在太極先不為髙坐閲無疆之厯服夀皇保國家如金甌治定中興之後輕天下如敝屣神凝太極之先致二十七年之太平功已成而與子綏萬有千嵗之眉夀福方永於後天蕩蕩民無能名曷詠歌於太極蒼蒼天其正色惟想像於層霄加光堯尊號賀夀皇重堯帝之華稽古亦咨而命禹以王季為父無憂允賴於繼文光宗重明節兊報矩以司秋對離重明而麗正本乎天本乎地咸歸覆幬之中得其夀得其名方啓熾昌之運謝轉官繼明而照四方仰重光於日月勞賜而加一級覃大賚於江湖舜帝重華授受光於三聖周邦大賚寵綏遍於四方改元春秋謂一以為元日月重明而麗正雜對受祉施於孫子對立愛始於家邦睦族以和萬邦對明倫而察庶物誕皇孫賀皇太后王假有家克開厥後孫又生子俾熾而昌館職䇿議兵莫若留營屯蓋度支月給諸軍居十之九三嵗大禮犒軍居十之八一有軍興大費突出雖積金齊於箕斗發粟浩如江河終亦屈竭宜留營屯以更戍轉輸之費供鋤耰墾鑿之須漸開屯田以時閲習又謂漢髙帝一天下者也家室狼狽而不顧越句踐復讎者也非報吳之事則不言東晉保境土者也稽古禮文之事畢興而北嚮爭天下之事不問焉今終日所從事者保境土之規模而已又兼欲為越王漢帝之所為宜其財散力分坐糜嵗月云云末議文氣極好應詔京局應詔言弊謂通國之弊蔽以一言曰文具後列十事論廣西鹽法奏狀中已抄見前應詔上皇帝書光宗即位户部督州郡不問額之虛實州郡督縣道不問力之有無縣道無所分責凡可鑿空掠剩賊民而害農無所不用偶有所增永不可減其他巧作名色核其支用皆非入已亦不得而盡禁此非超覽九天之上作新一王之法曠然大變其制未見裕民之術西南保障自嶺南左右二江沿邊西北轉而西行略牂牁夜郎黔中而極於西南越巂之塞又西北至劒外河西之境無慮萬里祖宗築城寨置兵今名存而實廢乞行下蜀廣巡修又黎州専控青羌吐蕃等蠻雅州専控碉門等蠻嘉州専控夜郎等蠻各於對壘今聞畨部結親相通書初公任徽州户曹以書謁其守洪公適秩滿謁內翰禮部於朝由和劑局兼編修召試入祕省公固一世文豪而儒先汲引亦非默默而人忽自知其書詞多起人意者今略抄上李徽州謂學優則仕仕優則學是終身之間有時而仕無時而不學也又書薦士而束以文法王公大人可以少愧而草茅抱負挾持之才亦可流涕太息無復當世之望矣又況法已大弊捩鼻上洪內翰不龜手之藥一也或以封或不免於洴澼絖方其洴澼絖也不自知其可以封也及其封也天下不以其止於洴澼絖而已也水之於井也日汲則洌不汲則竭其行於地上也隨所遇而變生焉上陳魯公治莫大乎常天地為大矣飄風則不終朝驟雨則不終日方其飄且驟也人孰不畏亦孰不知其不能終朝夕何者非天下之常故也前日如舒申諸公忽天下之常一命之曰流俗再命之曰異議三命之曰姦黨自今觀之其天定矣俗也異也姦也皆天下之常而已上汪侍郎應辰漢武帝踞見大將軍不冠不見汲長孺淮南王視平津侯以下如發蒙獨憚長孺不敢奮姦謀長孺在朝官不過內史而係天下輕重如此今士大夫以顧忌為俗久矣其原始於愛重其身者太過位尊而名益衰祿厚而利實薄上不足以取信於君下無以慰其人彼之愛重其身者乃所以暴棄而甚輕之也啓賀劉太尉如蒼生何人喜謝安之起果吾父也寇驚郭令之來賀陳察院雖志髙鴻鵠慚燕雀之安知然路有豺狼諒狐狸之不問禮侍美盛德以告神明對觀會通而行典禮户侍貨財本末源流對朝夕論思獻納與嚴教授清襟凝逺卷松江萬頃之秋妙筆縱橫挽崑崙一峯之秀謝薦舉古者薦才而未始有法今則立法而不勝其私軒眉席次者非勢則利縮手袖間者惟孤與寒一言而期鬷蔑對歷盼而識孟嘉前以三鼎後以五鼎對人有一天我有二天與州郡五日一風十日一雨貫神明指顧之間千夫有澮萬夫有川興廢壞笑談之頃其浸五湖去天一握朝夕論思皆堯舜禹湯文武之道雷霆號令有典謨訓誥誓命之文天子畿方千里對刺史入為三公將如蒼生何對無踰老臣者回樓大防末甲頭名取放瓊杯偶缺初驚一字之難金薤昭垂果下六丁之敕第百四卷諸啓多可讀者第十七册兩卷亦啓皆賀政府者文尤雄雅賀張魏公負三紀倚重之望節彼南山明一生忠義之心有如皎日到蜀謝啓既來萬里敢計一身雜文乾道九年桂林大雪盈尺公作重貂館謂杜子美謂宜人白樂天謂無瘴然皆聞而知戎昱實從事幕府有重著貂裘之句故掇以名被爐銘序具其制合考上梁文數語多雄壯百九卷聖節疏亦多好百十卷燕安南使自敘云妙千八百國諸侯之選獨分正於南邦聳二十五城督府之尊特序賓於東道跋跋婺源研譜謂龍尾刷絲秀潤玉質天下研石第一今其穴塞已數十年大木生之不復可取近以端岩為貴端石絶品猶不能大勝刷絲東坡銘鳯咮研謂坐令龍尾羞牛後此乃武夷山石謔語非確也跋加味平胃散方本法專辟不正之氣夷堅志言孫九鼎遇故人鬼云遇我當小疾服平胃散即無苦則其辟不正可知晉有南陽宗定伯夜逢鬼鬼問誰誑曰我亦鬼且新死未知何所惡曰不喜唾因負鬼急持之化為羊恐其變化大唾之賣得千錢鬼猶畏唾況平胃散乎世傳字書多似其人亦不皆然杜正獻嚴整而作草聖王文公沉毅而筆欹側惟溫公則幾耳石耳生岩石面目處性溫有補石曼卿真書大字妙天下跋語多簡峭可愛惟漁社圖有韻梅林集有情皆長而佳碑石未泐者具在好奇之士乃專倣刻文刓剝之處以握筆滯思作羸尫頽靡之體僅成字形以為古意愚謂石湖此語為漢𨽻也今之學古文者亦然蘭亭石本惟定武者筆意倣佛士大夫皆欲以所藏者當之而未必皆然愚謂此語雖為帖字發足以警省士大夫處甚多謂楚文當惠文王之世則小篆非出李斯東坡切韻詩寄作詩孫符集中不載符字仲虎位至尚書其子名山字夀甫石湖時夀甫以祕閣將潼川漕東坡船上曲江遇灘瀨欹側士無人色坡獨作字不少衰曰吾更變多矣置筆而起終不能一事孰與且作字乎石湖注云事勢迫切不若付死生禍福於無何有之鄉雖至大故不亂雖非得道去道不逺愚謂坡公定力如山石湖發明盡之惜雖非得道之語溺異端耳平生所行者道道豈别有一物而得之空虛耶余先君子嘗言無事時小心有事時大膽可以受用天聖五年王堯臣榜小録石湖見之崑山龔氏載異於近制者甚多書新安事汪姓鼻祖名華隋末據歙宣杭睦婺饒之地以歸唐今廟封顯靈英濟王又俗傳廣巢以汪王同臭味下令毋犯汪氏歙人爭冒汪姓俚云四門三面水十姓九家汪百姓油糍鬼官人豆腐王譏俗陋也豆腐舊傳劉安戲術又俚語徽人三日飽兩社一年朝不重冬節也獨孤及論季札潔已之禍公謂秉節之士各有所安歐陽詹自明誠論謂尹喜自明誠而長生公孫洪自明誠而公卿張子房自明誠而輔劉公孫鞅自明誠而佐嬴不知詹所謂誠者何物書舒蘄二事皆以持心之厚惡人報德而獲生沈德和尚書祖輝仲勘江賊活七人同官死嫁其二女病中見黃衣使召為仙官且延夀三紀常明叔父死神降其家云為人奪胎記拂日山繇臨平而西有佳趣新安江帶城右旋淙潺亂石間不能一長亭辟小溪大會歙浦貫萬山以出又合始新大末之水行三百六十里與海潮會為浙江其間稠灘如其里之數每灘率減數丈大或十倍世傳天目山巔與歙之柱礎平為李結記濬塘浦浦五曰新洋江曰小虞曰茜涇曰下張曰顧浦塘三曰郭澤曰七了曰至和三髙祠記極佳三髙范蠡張翰陸龜蒙也其略曰不有君子其能國乎今乃自放寂寞之濱人又從而以為髙此豈盛際之所願哉後之人髙三君之風而迹其所以去為世道計者可以懼夫又各為之歌宛轉感慨千古可作也范村記杜光庭神仙感遇傳載唐乾符中吳氏胡六子泛海失道至一山曰范村一叟坐堂曰吾越相也以回飈相送俄頃達故石湖名舍南浦為范村雷孝子天錫十一嵗剔股救父董國度陷冦得婦人力歸而負之奇禍死公疑其為劒俠朱俠脫屈容叔之子於悍婦長而還之王列女不事二主崑山水利序大概二曰作堤曰疏水小概一曰種茭其説的實可行與余平日審訂之説同可以參考梅菊譜菊譜種菊之法春苗尺許時掇去其顚數日則岐出兩枝又掇之每掇益岐至秋則一幹出數百千朵菊之種七十范村所植三十六梅譜梅以韻勝以格髙以橫斜疏瘦老枝奇怪為貴入譜者十二種紅梅預焉梅聖俞詩認桃無緑葉辨杏有青枝東坡云詩老不知梅格在更看緑葉與青枝惟吳下方子通有紫府有丹來換骨春風喚酒上凝脂為絶唱攬轡録北使時所見也泗州三十里至臨淮縣百六十里至汴虹縣計自泗州河口至此皆枯轉而行道右三十里至靈壁縣民始扃户窺觀三十里至宿州塗有數父老見使車潸然百五里至永城縣三十里過鄼陽鎮有蕭相國廟自此枯汴中百十里至穀熟縣十八里至南京寇改名歸德府過雷萬春墓過雙廟三十里過睢口河已塞八十里至拱州冦改為睢州六十里至雍丘縣二十里過空桑有伊尹墓三十里至陳留縣有留侯廟二十七里至東京冦改為南京四十五里至封丘縣二十五里至胙城縣去河尚五六十里而漸水已侵過胙城十里矣自縣四十五里至黃河李固渡渡浮橋用船百八十艘半閣沙上河最狹處也四十五里至滑州二十五里至濬州舊治已淪水中對城即黎陽山古大伾也三十里過子河有山東販麥舟四十五里至湯隂縣自黃河西望即見大行西北去不知極至燕始北轉自湯隂三十里至相州過湯河羑河有羑里城文王廟相州觀者甚盛遺黎往往垂泣指使人云我家好官又云此中華佛國人老嫗跪拜者尤多過安陽河漳河凡六十里至磁州州南淦陽河水急西有雀府君廟四十里至臺城過趙故城延袤數十里傍有廉頗藺相如墓三十里至邯鄲縣邯鄲人健武逆亮死時遮殺其歸卒以待王師四十里至臨洛鎮過洛河三十里至沙河縣十八里過七里河七里至言德府邢州也四十里過冷水河二十五里至內丘縣縣有鵝梨云其木尚聖宋太平時所接過沙河禮儀河大寧河凡六十里至柏鄉縣其東有堯山堯所葬自柏鄉行十三里有光武廟二十里有王郎城凡六十三里而過洨河石橋所謂趙州橋也五里至趙州冦改為沃州三十里至欒城縣五十五里過滹沱河五里至真定三十里過磁河四十里過沙河為新樂縣北嶽在其西北之曲陽縣界四十五里至中山府冦依舊名曰定州有東坡祠五十里山水河七十里至保州十里過徐河十里過曹河俗傳王祥卧氷處二十里至安肅軍故時塘濼今悉淤塞門外大道古出塞路也夾道古栁參天至白溝始絶十五里過白溝河又過曹河徐河暴河三十五里至大口河二十里至馬村五十里行灰洞至涿州灰洞者兩邊不通風塵埃濛洪其間也三十里過琉璃河為良鄉縣三十里過盧溝河三十五里至燕山城逆亮始營都於此自泗州至東京七百七十里自東京至黃河百十五里自泗州至燕山總二千五十八里燕山以南石晉以來失之安肅軍以南我朝南渡失之河朔之水皆出太行公所渡者二十五河睢漳與滹沱最大滹沱闊不減黃河俗名小黃河驂鸞録公赴廣帥時筆也昌黎詠桂林有逺勝登仙去飛鸞不暇驂之句故以名録公以乾道壬辰十二月發吳郡過湖州遊石林是為大玲瓏荒寂難居時已蕪矣又有小玲瓏在長興路口過德清有左顧亭孔愈放龜處也厯餘杭富陽癸巳正旦登桐廬之釣臺至嚴州有浮橋重征非杉處也至蘭溪避泥潦登陸取婺州至衢州過常山縣至信之玉山縣泊信州再登舟過弋陽貴溪綿延皆低石山入饒之安仁縣至餘干縣有琵琶洲以形似名自鄥子口渡鄱陽湖尾泛江至隆興府膝王閣故基甚侈今但城上作堂耳東湖秀而野許真君觀鐵柱在東廡小枯池中出地三尺許過豐城縣艤寶氣亭有張雷廟云掘劒處至臨江軍登陸遊薌林盤園由新喻縣至袁之分宜縣至袁州遊仰山嶺阪皆由名梯田滿山皆方竹過萍鄉縣入湖南界潭州之醴陵縣江西道中林薄逼塞至是平蕪豁然松柏皆峭直如杉至櫧洲市為舟車更易之衝人捨輿泝湘江六日而至衡山縣湘山皆迤邐南嶽忽雄特夾路三十里古松至嶽市嶽市者環廟皆墟市江浙川廣衆貨所聚公至謁南嶽廟遊衡嶽寺勝業寺南臺寺風雨不可登山復舟行湘中至衡州謁石鼓書院實州學也始諸郡未分教時天下有書院四徂徠金山嶽麓石鼓石鼓山名也行岡將盡忽石峯特起浸江中蒸水自邵陽來繞其左瀟湘自桂林零陵來繞其右石鼓雄踞其會公自衡登陸過黃罷嶺入永州之祁陽縣始有坦途新出石板為山水雲氣之屏遊浯溪作詩言中興頌含譏諷為非譬父母有過非捧觴稱頌時可及至永州訪愚溪至全州入桂林界傍闊各數里石峯森峭羅列左右入嚴關兩山間僅容車馬所以限嶺南北二十三里過秦城秦築五嶺之戍疑此地是二十二里至靈川縣秦史祿所穿靈渠在焉縣今桂林所治乃零陵地舊屬荆州桂嶺本在賀州今於入桂未二三里立碑名桂嶺者前帥欲得過嶺任子賞耳故桂獨無瘴云桂林虞衡志公出嶺帥蜀後所作也志山謂余南西北三方皆走萬里太行常山衡嶽廬阜皆魁然大山其最秀如池之九華歙之黃山括之仙都溫之鴈蕩夔之巫峽皆數峯爾又在荒絶僻逺惟桂之繞城玉筍搖篸森列無際其怪且多誠當天下第一山皆中空故峰下又多生岩洞公紀其可名者三十餘洞備述奇怪如見志金石生金出溪洞沙土中丹竈家所須大如雞子者為金母丹砂以辰砂為上山南為宜州與辰州同此山故宜砂老者鐵色有牆壁如鏡生白石床上可入煉勢敵辰砂雍州砂大而多黕暗少牆壁惟以燒取水銀水銀燒法以鐵為上下釡上釡貯砂隔以細眼鐵板覆之下釡之上下釡盛水埋地中仰合上釡之唇固濟周密熾火灼之砂化為霏霧下墜水中聚為水銀雍州取丹砂盛處錐鑿有水銀自然流出客販皆燒取而成者百兩為一銚銚以紙糊豬胞不漏鍾乳桂林接宜融山洞冗中出逺勝連州所産者凡石脈湧處為乳床融結下垂其端輕薄中空如鵝管水乳且滴且凝以竹管仰承折取此最精者又煉治家文以鵝管之端輕明如雲母爪甲紋如蟬翼者為勝廣東以鵝管石遺人率粗黃蜀中所出益枯澀其鵝管窒塞及粗瓃近床處通謂之孽銅雍州右江洞所出掘地數尺即有礦緑銅之苗也生石中質如石者淘其英華供繪畫次飾棟宇泥緑最下滑石桂林屬雍及徭洞中皆有初出如爛泥見風則堅土人灰壁未乾時以滑石末拂之如玉鉛粉以黑鉛著糟甕罨化之乾道初始官造粉嵗得錢二萬緡無名異小黑石子價極賤石梅石柑生海中未詳可入藥志香沉香出海外黎洞香木既枿其節目久墊土中數百年不腐益精堅滋液下垂結而為香面多在下如山峰怪石怪獸龜蛇次如繭栗角附子芝菌茅竹葉者皆佳至輕薄如紙者入水亦沉盡觀諸蕃所出尤以萬安為最勝在島正東鍾朝陽之氣也海南香氣皆清淑燒之氛翳彌室翻之四面悉香至煤燼氣不焦價與白金等中州但用廣州舶上占城真臘登樓眉等香腥烈味短帶木香尾煙必焦其出海北者生交趾及交人得之蕃落來欽州者為欽香尤酷烈惟可入藥蓬萊香沉之結未成者去其帶木處亦能沉鷓鴣斑香亦出海南沉水蓬萊及絶好斑香中槎牙輕鬆者木性未盡以色似名箋香出海南者如蝟毛栗蓬漁蓑狀修治去木留香香之精鍾於刺端芳氣與他處箋香敻别香木葉如冬青而圓皮似楮皮而厚花黃類萊花子青黃類羊矢海南人以斧斫砍使膏液凝沍徐於斧䀶中採以為香如箋香之類多出人為又有黃沉生結等皆下色光香與箋香同品出海北及交趾蟹殼香出髙化州沉香出交趾以諸草香蜜調香珠以泥香捏成思勞香出日南如乳香瀝青交之以合香排香出日南如白茅香亦以合香香草無及之者檳榔答生檳榔木上單爇極臭以合泥香檔香橄欖木脂清烈零陵香宜融等州有之以編席薦坐褥性暖宜人零陵今永州無此香古零陵界甚逺志酒八桂有端露石湖用其法釀於成都名萬里春今法具存志器所志皆蠻人軍器也又牛角硯雞毛筆羽扇竹釡志禽孔雀山鳯凰鸚鵡有紅白又烏鳯秦吉了錦雞翡翠又靈鵲為人突巢穴能禹步作法以去之翻毛雞長鳴雞皆雞之異者志獸象出交趾象山一軀之力皆在鼻二廣亦有野象盜酒害稼目細畏火欽州人以機捕之皮可為甲或條截為杖甚堅馬自杞國以錦一匹博大理三馬金鐲一兩博二馬行十三程至四城州又六程至雍州又有羅殿國及謝蕃羅孔諸部落馬尤壯行二十二程至四城州與自杞等馬會皆以十月來經略司嵗市千五百匹尤駿者博金數十兩官價有定數不能致大理去雍州橫山寨才四十餘程自杞人爭利不敢度自杞而東别有一路自菩府經特磨道來甚捷特磨人亦貪悍不得達土産出德慶之瀧水者名果下馬高不踰三尺而駿健能辛苦以嵗七月十五日會江上交易湖南邵陽營道等處亦出一種低馬志蟲魚珠有地在合浦海中孤島下名斷望池去岸數十里望島如一拳池深可十丈四周如城郭蚌細零溢生城郭外者乃可採嵗有豐耗多得謂之珠熟蛋人沒水採蚌每以長繩繫竹籃擕之以沒或遇惡魚海怪則死硨磲大蚌之屬殼可為荷葉杯玳瑁背甲十三片無足而有四鬛皆花紋飼以小鮮甲子庚申輒不食俗謂之玳瑁齋蚺蛇大如柱逐麞鹿田中南人插花呼音大姊也或呼紅娘子以誘之以花置蛇首蛇俯不動則殺之鸚鵡螺青螺亦可琢為酒杯貝子大者如拳紫斑小者脂面大白如玉世既不尚人亦稀採石蟹石蝦云海沫所化嘉魚出梧州火山下丙穴如小鰣魚多脂煎不假油蜀中丙穴亦出肥美相似蝦魚竹魚皆出灕水南方所珍志花上元紅元夕開泡花採以蒸香法以佳沉香薄劈著淨器中鋪半開花與香層層相間蜜封之日一易不待花蔫花過香成畨禺人吳興作心字香瓊香用素馨末利法亦然大抵泡取其氣未嘗炊掀江浙作木犀降真香蒸湯上非法也末利以米漿日溉之則花可耐一夏六月六日以治魚腥水一溉益佳石榴既實復花併花實折飣盤曼陀羅花漫生原野大葉白花實如茄遍生小刺盜採花末之置人飲食中即昏醉土人又以為小兒去積藥昭州公庫取一枝挂庫中飲者易醉志果荔枝不及閩中所産妍紅渥丹畫工百端模寫不能殆世間紅色第一龍眼極大如當二錢龍荔枝身葉似荔枝肉味如龍眼故兼二名人面子核如人面椰子葉類棕櫚子上其間如五升器皮中殼可為器殼中瓤如牛乳瓤中酒新極清芳久則濁鸚哥舌即紅鹽草果之珍者八角茴香惟以薦酒餘甘子風味過橄欖雖腐爛猶堅脆波羅蜜大如冬瓜削其膚食之極甘子練悉如冬瓜生木上秋熟柚子大如瓜打碑者捲皮蘸墨代氈刷地蠶生土中似甘露子而不尖以薦酒志草木桂南方奇木上藥出賓宜州花如海棠淡而葩小實如小橡子取花未放者乾之五年可剝以桂枝肉桂桂心為三等桂枝質薄而味輕肉桂質厚而味重桂心則剝厚桂以利竹捲曲取貼木多液處如經帶味尤烈凡木葉心背一縱理獨桂有兩紋製字者意或出此葉味辛甘人喜咀嚼桂之所草木不蕃榕易髙大葉如槐蔭樾可數畝根生半身附幹而下壟壟抱持以入土故有倒生根之説禽鳥銜其子寄生他木根鬚沿木自垂下得土氣則過所寄桫木杉類尤髙大葉尖成叢穗小與杉異徭洞劈板博易舟下廣東修仁茶修仁靜江府縣名製片二寸許上有供神仙三字者上也大片粗淡檳榔生黎洞上春取為軟檳榔夏秋採乾為米檳榔小而尖為雞心檳榔匾者為大腹子悉能下氣鹽漬為鹽檳榔瓊管取其征居嵗計之半廣州亦數萬緡自閩至廣以蜆灰蔞葉嚼之先吐赤水如血而後咽其餘汁廣州加丁香桂花三賴子為香藥檳榔桄榔虛心刳以承漏外堅可為弩箭烏婪木宜柂第一出欽州吉貝如小桑花似芙蓉葺為席澀竹可磨以為甲人面竹可為柱杖斑竹有疊暈本出全州之清湘桂林亦有之都管草辟蜈蚣蛇蛆草辟蚊蠅志雜雪獨桂林有之自桂林而南至海北人不識雪或言數十年前嘗雪嵗乃大災蓋地氣常燠植物柔脆忽得雪悉僵死風桂林獨多去海餘千里非颶也湘灕二水皆出靈川之海陽行百里分南北而下北曰湘下二千里至長沙水始緩南曰灕過三百六十灘又千二百里至番禺入海桂林獨當湘灕之脊在長沙番禺千丈之上雲物之表髙而多風理固然也秦城始皇發戍五嶺之地靈渠在桂州興安縣湘水北下湖南又融江牂牁下流也南下廣西二水逺不相謀史祿於沙磕中壘石作鏵觜派湘之流而注之瀜激行六十里置斗門三十六舟入一斗則復閘一斗使水積漸進故能循崖而上建瓴而下治水巧妙無如靈渠者朝宗渠浚之則有人登科銅柱馬伏波立交趾國中人過柱下輒培石遂積成邱陵馬總為安南都護夷獠為建二銅柱又唐何履光定南詔復立伏波銅柱則在大理瘴乃炎方之地脈疏而氣泄人為常燠所暵膚理脈絡嘽舒不密又數十百里無木隂井泉逆旅醫藥其病又不必皆瘴之為也石湖正夏堂記極論之僧道無度牒而有妻子者皆是月禾無月不種土丁制如禁軍保丁𨽻保正平儂賊後所結今困私役寨丁沿溪洞所結洞丁溪洞之民也鼻飲但可飲水捲伴嫁娶不由禮竊誘之名桃生妖術以魚肉害人在胸鬲則服升麻吐之在腹服鬱金下之李夀翁侍郎為雷州推官鞠獄得此方蠱毒人家無纎埃者是志蠻之目五曰羈縻州洞曰徭曰蠻曰黎曰蛋羈縻州洞有黃儂韋周四姓黃儂𨽻雍川韋周𨽻宜州國朝平儂智髙析其種落為州縣小者為洞凡五十餘所即其雄長為首領籍其丁壯號田子甲者為洞丁而總𨽻於提舉左江四寨二提舉右江四寨一提舉左江屯永平太平右江屯橫山寨官則民官也比年諸洞不供財賦無糧以養提舉之兵寨官亦與洞官為伍而雍之邊備弛矣宜州之安化州最悍鷙建炎有凌羅二將率洞兵勤王敗曹成廣西宴然南丹州尤羈縻之甚其酋莫延椹乾淳間擾邊公劾邊將交通者當參置之法南丹稍讋猺本盤瓠之後綿亘巴蜀湖廣間數千里名為猺實不供征役數數侵軼州縣覺知則已趂入巢穴官軍徒勞費公於屬桂林者悉罷官軍専用邊民得七千餘人分五十團次諭近猺亦團結乃許通博易次復以近猺頭首深入諭之天子誕節首領得赴宴遂各以誓狀來蠻自羈縻州洞之外皆蠻也其區連亘湖南接於西戎種類不可勝計溪洞外依山林而居荒忽無常者為獠無酋長版籍無年甲姓名惟有事力者曰郎火餘但稱火此不在蠻類蠻則前世嘗建黔南帥府於融州以統之融在猺洞之南蕃蠻之東蕃蠻與牂牁地接人皆椎髻跣足而峩州以西又繫白紙於椎髻云尚與諸葛武侯制服又有漢蠻能華言自云本諸葛武侯戍兵蓋唐史西屠夷馬留之類也其南連雍州南江之外者皆成聚落羅殿自杞以國名羅孔特磨勺衣九道等以道名此諸蠻之外又有大蠻落西曰大理東曰交趾大理即南詔也亦曰雲南其人皆有禮儀地極西南尤近蜀交趾古交州厯代為郡縣國朝遂在化外熙寧八年入冦詔趙尚燕達討降之乾道九年進象賀登極朝廷賜名安南國自交趾渡一水即占城國漢林邑也其南浦有馬援銅柱山東西皆大海占城隔一水為真臘又一水曰登樓眉此數國之西有大海名細闌為交趾大理吐蕃之西境南接大洋海海口有細闌國其西有五天竺極南有故臨國又西則東大食海海西則大食國又西則西大食海蕃商不通南大洋海中諸國以三佛齊為大諸蕃寶貨之都會三佛齊之東則闍婆國稍東北則新羅國髙麗國諸蕃之去中國惟占城最近大食最逺至大食必舟行一年凡諸國皆蠻而遞及者也黎則海南四郡塢上蠻由雷州徐聞渡半日而至塢之中為黎母山山極髙常在霧靄中雖黎人鮮識之四郡各占塢之一陲其中黎地不可入亦無路通朱崖在南陲復桴海乃至所謂再涉鯨波也最外耕作省地供賦役者名熟黎內為生黎生黎之巢外人不復迹黎母之巔則雖生黎亦不能至相傳其上有人夀考逸樂不與世接虎豹守險無路可攀但覺水泉甘美絶異爾蛋乃海上水居之蠻其種有三漁蛋取魚蠔蛋取蠔木蛋伐山皆坐死短篷間生食海物其生如浮而各以疆界役於官吳船録出蜀時筆也當淳熙丁酉嵗録江行所見今併考江流併合處抄下方江源自西戎來由岷山澗壑出世云江出岷山自中國所見言之耳岷在今永康軍岷山之最近者曰青城山其尤大者曰大面山大面山之後皆西戎山西戎之雪山三峯銀爛玉琢闖出大面後凡皆江源之所自來也秦太守李氷於今永康之離􅕞鑿崖中斷分岷江一派入永康以至彭蜀支流自郫縣以至成都二水合於成都之東郭有合江亭西取萬里橋公自東郭東下五里至板橋灘皆自蜀下峽灘之始也過犀浦過郫縣凡百十里至永康之離􅕞四十五里至青城山有縣七十五里至蜀州有西湖三十里至江源縣四十里至新津縣成都萬里橋下之江與岷江正派合於此自此順流半日至眉州城下玻璃江自眉至嘉百二十里半途有中岩西州林泉最佳處嘉州凌雲舊名青衣山蠶叢氏之神也凌雲寺有天寧閣即大佛像所在髙三百六十尺頂圍十丈目廣二丈為樓下三層觀之嘉為衆水之會導江沫水與岷江皆合其下沫水自巂州邛部合大渡河穿夷界千山由雅州來渡雅州江為大峨山佛書謂普賢示現處去平地百里盛夏擁重裘大峨峯頂天下絶觀龍門峽又勝絶山間自嘉州百六十里至犍為縣又二百四十里至敘州古戎州也有馬湖江自夷中出合大江又十五里有南廣江亦來合大江自敘州二百八十里至瀘州有內江又自資簡州來合大江瀘敘江北岸皆夷界自瀘州百二十里至合江縣對江安樂山出天符木葉紋有符篆自合江三百二十里至恭州自此入峽路大抵自西川至東川風土已不同至峽益陋恭州乃在一大磐石上水毒生癭自此至柿歸皆然恭有嘉陵江自利閬果合等州來合大江自恭二百一十里至涪州黔江又自黔州來合大江皆石底清如玻璃自成都至此始見清江涪雖不與蕃部雜舊亦夷俗號四人謂華人巴人廩君與槃瓠種也自眉嘉至涪皆産荔枝涪有妃子園江自涪之羣豬灘水始險二百餘里至忠州忠州百八十里至萬州比涪恭尤蕭條泝江入蜀者率至萬州捨舟陵行不兩旬可至成都舟行須十旬萬州有西山山半有湖湖上有煙霏閣自萬州六十里至開江口水自開達州來合大江又八十里至雲安軍百四十里至夔州魚復八陳圖在焉水至夔州尤毒飲輒生癭自夔十五里至瞿唐口過灔澦入峽舊圖云灔澦大如朴瞿唐不可觸灔澦大如馬瞿唐不可下而尤以如撒髮為惡蓋必水漲沒之方可拂過其上也峽中兩岸髙岩峻壁斧鑿䀶皴皴然而黑石灘取險兩山東江驟起邊髙中窪名茶糟齊則萬萬不可行漲盡淹草木名青草齊則可行或未能盡淹名草根齊深亦不可涉十五里至大溪口水稍闊夔峽之險紓矣七十里至巫山縣巫峽與夔異夔峽須水漲巫峽惟水退乃可自縣行半里即入峽峽間陡暗舉頭僅有天數尺兩壁皆奇峰如是者百餘里十二峰皆在北岸神女廟在峽之三十五里石刻稱雲華夫人助禹驅鬼神斬石疏瀹有功今封妙用真人廟有神鴉送迎客舟出峽二十里至東奔灘大渦掀舞二十里過歸州之巴東縣萊公祠與桓在焉九十里至歸州未至州數里有吒灘尤險於東奔連接城下大灘名人鮓甕狠石橫卧據江十七八歸為夔路荒涼之極楚熊繹啓山林於此屈宋昭君皆生此地舊𨽻湖北近屬夔而財賦仍歸湖北一州二屬疲於奔命歸州五里至白狗峽岸皆大石峽山奇峭三十里至新灘漢晉山再崩塞江故尤險八十里至黃牛峽接扇子峽蝦蟇培在南壁半山過此則峽灘盡矣三十里至平善壩出峽舟相賀處三十里至峽州古夷陵三國時吳蜀界也自漢嘉以來東西三千里南北綿亘入蕃夷界不知幾十萬峯出夷陵西望杳然無復一點自峽州四百七十里至江陵有沙市渚宫章華臺龍山息壤七十里至公安縣有二聖寺金剛神也百二十五里至石首縣百七十里至魯家洑自此下嶽陽則洞庭出大江處波浪連天客舟多避之由魯家洑入沌行百里荒復出大江至鄂州泊鸚鵡洲沿江數萬家川廣荆襄淮浙貿遷之地名南市南樓在黃鶴山上甲於湖外稍東為漢口漢水自北岸出合大江百八十里至三江口三江之名凡水參會處皆稱之過黃州赤壁四十里至巴河自北岸入大江如漢口自黃州四百七十五里至江州登庾樓遊廬山復至江州東下過湖口蓋彭蠡湖入大江處九十里至交石夾經澎浪磯凡八十里至燩背洲又經皖口牛磯雁汊凡三百里至長風沙上口百里至池州池口十里至池州又經清溪口長風沙凡五百七十餘里至太平州登凌歊臺宋武帝作也至建康登伏龜樓基一城地勢最髙處相傳曹彬取李煜自此入又百八十里至京口為浙矣謹按江出岷山其源實自西戎萬山來至嘉州而沫水自巂州邛部合大渡河穿夷界十山以會之至敘州而馬湖江出自夷中以會之又十五里而南廣江會之至瀘州而內江又自資簡等州會之至恭州而嘉陵江自利閬果合等州會之至涪州而黔江又自黔州合南夷諸水會之至萬州而開江水自開達等州會之夫然後總而入于峽是江自峽而西受大水凡八及出峽而下嶽陽則會之者洞庭湖所受湖南北諸郡水也又自是而下鄂渚則會之者漢口所受興元諸郡水也又自是而下黃州東四十里則會之者巴河也又自是而下江州則會之者彭蠡今名鄱陽湖所受江東西諸郡水也又自是而下則會之者皖水所受淮西諸水也夫然後總而入於海是以自峽而東又受大水凡五略計天下之水會於江者居天地間之半其名稱之大而可考者凡十有三故曰江源其出如甕而能滔滔萬里以達海所受者衆也嗚呼問學者可以觀矣公喜佛老善文章蹤迹遍天下審知四方風俗所至登覽嘯詠為世歆慕往往似東坡東坡當世道紛更屢爭天下大事其文既開闢痛暢而又放浪嶺海四方人士為之扼腕故身益困而名益彰公遭值夀皇清明之朝言無不合凡所奏對其文皆簡朴無華而又致位兩府福祿過之流風遺韻亦易消歇耳若公之言治主貴實而將久其帥蜀帥廣皆能寬民力練軍實出使萬里外如言治堂上時討論申明纎悉具備可謂刻志當世者矣然公亦嘗帥沿海討論申明無異在蜀廣而沿海吾居也考之事實率不可行今無聞焉或者蜀廣去天萬里其弊誠有如公所言者而沿海於行都為切近無事之地公鋭意事功不能不姑為是條畫而已耶嗚呼自昔士大夫建明多爛然於髙文大册之間而至今小民疾苦終蹙然於窮簷敗壁之下豈非人存則政舉而有國有家者常宜以得人為急務哉黃氏日抄卷六十七
