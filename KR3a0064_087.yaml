body:
  text: 黃氏日抄卷八十七宋黃震撰記廣德軍添差通判廳記咸淳四年冬余自史館出為桐川貟外丞至則棟宇一新青紅猶濕問之歡謂國録吳君力也桐川斗大其官之有員外置雖郡志莫能詳其初是豈有豪舉壯觀足以垂賁方來者哉嘉泰省官屋且改為軍事判官之居嘉熙二年官雖復舊屋則愈陋十閲嵗而當淳祐戊申三山陳君應龍始撤而改為之曾未二十年又將老且壓良以疣贅浮立之司寂無資藉可禆營葺勢固應爾吳君獨説以自任力請于郡太守吳公公賢而可之捐之金繼之粟通守史君見而恱之首有助留守馬公總餉陳公聞而悅之又皆有助起三年八月汔今年三月地之窊者增之髙戺之逼者禆之廣庭宇壯而觀瞻聳窗楹潔而神思清崇軒後壓通衢而民聽達堂奧增窈庖湢亦新倏於空虛成此突兀君材過人何啻一等而後之人繼自今皆得承厦屋渠渠之庥酌水知源詎容不書而法亦有當牽連書者聽事之東曰觀物堂即淳祐間陳君名以自省書扁者信安徐君霖篆敬齋針于其屛者滄洲程侯公許也聽事之西曰誠求齋則嘉熙庚子金華康君植名以志親民書其扁與書其志而刻之柱者皆山陰施君德懋也方陳君以名流此來撤舊而新一時文人灑墨交映施君以四考縣最趣召經從聲動東南康君執維終夕俾寫心期乃行緬想髙風皆足興起于今幾何時非老吏故民已無能知而屏針柱記類亦漫滅斷缺矣失今不記嵗久愈湮安知不如此廳之置之始雖志郡者莫之詳耶此余不特為吳君書且為前之人併書也然不特此也凡司存必有所與立而後可以久顧此司之公費舊皆出縣胥聞前之人皆不以為安而吳君欲去之尤力余既至而知之即曰此去之易耳寧郡無員外丞毋寧吏挾員外丞以重擾吾百姓亟盡蠲其錢而請郡太守聞于朝乞從省罷如嘉泰間故事吳公曰然苐廢置不敢輕願以郡城小户賃地錢取五十家及張恩一鄉役錢代之余曰得無妨郡計乎公曰賃地錢於綱解無關而役錢正我朝所用募衙前役者也舊已皆分畀正倅廳矣倅與正奚擇其勿辭余辭至再不獲乃就屬牙契庫官司户參軍司其出入而為之倅者身勿預以成公仁且廉遜之美嘻設不遇公余方拔本塞源力請併司存廢不置所以上續吳君以凡前人者將不忘其經營締建之心而于其思去舊比供億之費殆懸其半而奚恤乃今泛百年之弊例開後世來者之模倣俾獲豐積以永存是尤吳公賜也視前宦於此肆其貪暴而掊取縣胥錢欺誤後來者吳公之罪人也朝廷任賢以教授出守吳君名元真苕溪人也咸淳乙丑宣教郎添差通判廣德軍黃震記廣德軍通判廳佐清堂記桐川舊稱江東道院其扁正偈通判廳燕息之堂前植古梅嵗久益清郡太守而下往往婆娑其間用為清賞寶慶三年𡊮侯君孺為守始移取江東道院之名以名郡齋之燕室通判趙君善璙思所以遜避之因附築小亭於舊堂之旁以自易名其堂曰嵗寒清節庸紀美於一時冀遺躅於千載矣曾未四十年已為陳故今造其下撫景而思之果難乎其續哉史君景臯以英傑明敏之才通守是邦始中興其堂三楹堂成而落之乃徵記於余欲取李白送其弟倅宣城之句再易其扁曰佐清以桐川舊宣治不敢隳益堅前人所以名而佐者其職也余謂吾子能卓然有立豈惟清意之復續斯真足以言清矣特未知向之所指者果何所取為清爾夫自混沌既剖輕清為天老聃氏謂天得一以清以氣言也毛萇公謂天德清明以理言也天以是命為性人物亦莫不各具天之清以全其生其本也真而靜但隨其所感而不同如近世士者莫不欲原夫天豈昧其理耶凡此堂前此之所以得於心者自有無窮之清然使一有玩物之心則清香翠陰風雪霜月者適足為流連光景怠人幼孩之具如是而為清民何賴焉今景臯父幸以其職言因請得以明職之所謂清者唐虞命官直哉惟清是豈蕭然自潔若託物寄興之謂修巳治人必有當知其源之所自出者矣伯夷之清風漢人之清節是皆所遇之不同其進其退全一已之清下得與斯世同其所尚故自然不同也然於此者奈何世變益下此意竟莫能繼至於江左尚清談以成俗適意外物放曠不檢出於禮度之外士者謬相標榜以為清古人之理身則異得其所養故嘗謂神氣風霆風霆流形此天以一而悠久其清者也清明在躬志氣如神此古人所能恆服其清者也士自一命以上皆分有代天理物之責必欲真得天清之所在以無負天之所以卑我望我者亦唯於天命之所當為推之以用於世夫有純於一德而不自已使在躬之志氣不澄而能清施於人也亦惟舉此而措之善惡自分無所撓而清可矣人將不知其所以然則曰政清在斯辨蓋莫究其原之所自出也惟人之心不牽溺於人欲而可以自存其天理之正則我之用雖上佐天子躋世清靜比美太古要在為上以廣其德意為下以達其疾苦凡可佐其治化者必無一毫壅塞淤滯之慮否則我方岸幘嘯詠之時未必非吾民愁苦無訴之日郡亦奚以佐為哉景臯韙其言而説焉豫復進之曰然願益自勉幸書之於堂以警通守史君景臯鄉世鄞人云咸淳四年戊辰十月望黃震記廣德軍滄河浮橋記天地位而水實為之脈絡川澤阻而人復為之貫通五湖之口襟江萬安之渡支海宜皆望洋而不可向者亦無不心慕橇木梁空以行斯亦竒矣至若山川之回欎波濤之洶湧懍乎哉不可以步有淵也不可以濟厥桴也必獲久計然後可以措則又鱗比航次板檻鈎接東西兩岸貫以鐵綆引以鐵牛橫水傳陸隨其往來如履平坦其制不愈竒矣然石梁既成一勞可以永賴嵗久不免微圯不可以不葺抑何故舟雖具水潦時集而鼓風兩氻竹雖韌鐵雖固魚龍百怪惡其梗己也常伺隙此所以雖杜武庫之智不能使可橋之久雖張燕公之大手筆亦無以夀蒲津橋之傳也然則浮梁其可一日忘葺哉桐川郡北踰十里有渡曰滄河南受天目宣歙諸水衝潰奔駛然後演迤以入於海風濤每壯猿狖亦驚故其渡為最險郡有祠山每嵗十二月江浙荆淮之民奔走徼福者數千里間關不辭較諸他濟人之渡此為最衆以此滄河為斯郡之要津病阻舟楫往嵗郡氏因議建石梁以通其利計其始終之費為錢二萬緡再建水汜爭之又不克成終靡定議今陳令君應元時方為進士悉家資修葺一新之浮梁名以登津費以緡計者凡十有六萬為舟十巨艘為鐡纜四百尺為石垜兩岸岸之隈餘波沮洳又各續之松堤三百尺夫然後樵夫販婦童稚老叟昔犯靈鰲巨鯨以行者今如行袵席上前歌後和靡不欣喜曰此陳君之賜也今而後傾覆叫號於洪濤巨浪者恬然而不之聞矣惆悵溪山含悲於髙險深廣者坦然而釋之心矣將江浙荆淮數十萬衆咸獲其惠時有懷逺慮者有憂色曰孰維持是而繼其後也君又發其帑得天荒田百六十四畝有竒山天寺僧司其事嵗收其利以備營葺復屋其為浮屠氏者曰思濟院仍處其嘗為舟子者曰水手以日視舟若棧之所當葺委焉陳君方喜俄有擁麾而來者忍于奪其利去復撓其措置之規曩之浮梁於是日且就壞矣及是嵗郡父老遮公言狀切切歎不已余曰是必更有説也夫避冦者必於元戎之車卻其患而後趨廣德文學之郡獨無吾夫子之學宫陳公慨然兼許無難色則復為之請於郡太守具公之志在於崇教濟衆復告於郡博士謝君夢祥君亦贊其美遂差擇穀旦鳩材命役斧聲丁丁幾壞者復一新之有加於舊焉近橋南垜有阜巋然正𨽻學宫謝君復作頌庋其間用便檢視陳君乃大喜屬余記其詳余謂記所以詔方來今吾夫子之教與天無極浮梁附之以葺亦將與吾夫子之教無極何用記為雖然天下事創之固難守之尤難必無日不葺而後守之不廢必本今日之政而後日可葺豈惟浮梁之一事為然乎殆不可視為泛説他日正當相與獻吾所藴而擴充之豈無補於世哉於是拜手以書凡可以垂範於斯者敢謂後之記者不再書咸淳五年己巳冬十有一月至日宣教郎添差通判廣德軍兼管內勸農諸軍事慈溪黃震記廣德軍重建藏書閣記書果何從而始者哉其殆造化自然之文有不能不為文者乎夫自兩儀既判一氣交錯在天成象則日月星辰文于天在地成形則山川草木文於地此猶其文之章於人者凡有血氣舉能飛揚晶粲於拱挹之不可具述故林林總總充塞乎天地之間何莫非造化自然之文乎民之生也惟聖人之獨得其全者夫孰能與於斯故其日用必以文為言動而言之獨造其妙以教於世人文之文是也天之所以髙地之所以逺日月星辰山川草木之所以昭布森列而人之所以中立其間以明理以修身以能全君臣父子之天以能為夷狄禽獸之主使天地以之位萬物以之育日月星辰以之無變蝕山川草木以之無災毁而造化以之運行於無窮無一不會萃昭發於聖人之經以開示天下後世之人皆吾夫子之易春秋詩書執禮雅素之言誠可以常行者也大哉聖人乎其行可為天下法其言可為天下道其又造化之所託以語諸後覺之民乎天假之以諄諄然面命者乎然造化自然之文賦與萬物又皆紛然雜揉天不惟有日月星辰之文也有蝕霣則文之變焉地不惟有山川草木之文也有榛莾則文之反焉人不惟有六經之文也有異端邪説稗官野史哇聲曼曲則文之賊適以惑亂生民使不得知我之本無異於天地者焉嗚呼不有聖人復生其誰與覺此天開我宋五星聚奎列聖相承崇尚斯文徵儒積年校讎祕閣而朝廷藏書亦已勤矣而又勑白鹿洞等四書院藏書天聖元年王宫國都莫不有學又聚監書及紹興二十一年設官分署六經子史舉令通疏義而天下郡縣學無不盡其力通解其義聖教旁洽書固家藏而人誦猶必切切焉從而藏書於官何哉藏於官者聖人之書外是而私藏者非聖之書書之出於聖人者造化之至文天地所以奠人極所以立聖朝所以頒教於天下非聖而言書者紛糾之惡氣天地所以不寧三綱五常所以淪斁聖朝所昭示天下以勿習然則藏書之關繫果何如而職教州縣之官宜何如其示人哉廣德軍舊有藏書閣重建於慶元戊午陳公眩修政之初嘗謀構材命工治之顧惟書亦散失天台謝君夷甫與公為同志以慶元己未秋來為郡博士闕盡撤書閣之書而新之始於明年正月癸卯成於是年三月癸巳棟之髙於舊者五尺宇之廣於舊者四尋闕屹若天成焕如日星上崇聖經次下乃列子史其旁乃置朱文公及古今名儒注解著述能行吾聖經者以增比而附益之道德性命無所遺可謂盛哉君之舉也皆非庸常可以比擬又豈但藏書於閣而已乎口誦心維犁鋤經訓其修已治人之心躬行踐履毫髮不背則此書當藏之身待時行道躋世太平則此書當散而藏於天下文明之治矣然後無愧於藏書之義否則藏而不知讀愚也讀而不知用癖也官所不藏而私讀邪也造化自然之文鬱聖人造化之理乖則聖朝所命藏書之意孤矣可不懼哉可不勉哉抑此志不可以強揠而君之勤於士又非特於書閣為然也厯觀被葺之新彛教有堂沂詠有亭浩觀有閣以及戟門廊廡齋序垣墻皆葺之新庖舍則又增大而更之新來南山之水而三其門髙水中之堤而來之栁東引之而橋數十尺以達梯雲之門西引之而大路千五百尺以通明倫之坊凡所以為遊藏地者悉矣天光人境表回互發耳濡目染灑落脫俗士於斯乎觀藏書於以其舒徐正大之心體吾列聖右文頒教之心聖人雖逺天地雖大造化雖不可測文不在兹乎咸淳五年三月丙午朔謹記廣德軍重建録參廳記夫政有以迹而推者非官舍乎官舍修政之修可知矣廣德軍事為繁劇始余來二桐川首被檄問軍院獄見其獄中器械凡汛掃滌治之具畢潔退而顧其聽事亦更新焉余心異之徐而察其政關職者無繫繫者必其不得已而皆自謂無寃嘻是其所以能更新者也世豈有政之張而屋之壓者哉越明年其録事參軍李君世弼俄屬余記嵗月余曰豈惟嵗月子之政正自足記顧子之職尚不止此焉耳夫郡之有録參所以綱紀一郡事無巨細皆得預事有是非皆得爭譬之天朝殆御史執法之比焉先是三十年故大丞相董公槐嘗為子之官釐一郡經界盡明豪民縮頸所怨內逆有證應全者衆公獨為白之朝直聲一旦聞天下録參果當如是乎如必械繫吾前者斯為之求其直則民之得直于我者亦寡矣職掌如舊芳躅尚新作而行之特存乎人敢為子勉且為後來者勉若夫建鼛於咸淳四年八月落成於是年九月增髙廣視舊皆三尺費皆已出惟太守吳公洸通守史君舜卿嘗有助而易扁其東偏之宏毅曰平軒蓋自淳祐初楮君坦之嘗葺理遂至於今此皆節目云咸淳五年三月謹記先賢祠記大禹無祠洛以為祠召伯無祠甘棠以為祠叔子無祠峴山以為祠祠果廟貌云乎哉人心感慕之所在祠之所在也然好惡必合於天下之公而議論當定於百年之久吳人憐其忠而祠之者君子謂在建不當施而濡沫市恩繪像祠列者先儒亦嘗檄去之雖其有祠惟其祠歟維廣德為郡垂三百年名宦流芳者踵相接而市巷僧廬之所祠反或非四方士大夫之所識咸淳三年今户部侍郎檢正常公懋為之守始擇其功德著在民心名節焜耀史册參之天下而合要之百年而定者自范文正公而下得十人若龍圗孫公覺崇禧朱公夀昌諌院錢公公輔司諫孫公諤待制陳公次升敏節常公安民駕部洪公興祖丞相董公槐兵部康公植各以其治行刻之后而系之贊用代肖像合而祠之郡西橫山之東西山真公德秀嘗以部使者駐節此邦賑恤懇惻民到於今思之亦引而祠之十人之列堂宇沈沈門廡翼翼山明水冽松竹如雲先賢之清風遺韻如將挹而見焉豈惟揭虔妥靈永慰邦人之思崇德尚賢足示方來之勸庭隂也知日月之行巖花也占天地之春一斗大壘得賢之多尚如此我國家所以涵養成就用敷遺四方休者又何如哉常公屬震為記震故不敢終辭而竊附其欣幸之意如此公節敏曾孫遺愛方新功名鼎盛所以增光前文人者未央也尚俟後之人續書咸淳五年六月五日記萬山樓記愛山必山居乎晴嵐暖翠坐卧常對矣然層巒疉嶂際天無極者或隔於近而反不見也愛山不山居乎遙岑寸碧極目如畫矣然巖花澗草與時俱芳者或阻於逺而邈不接也然則二者宜何如而可兼哉桐川趙君平叔居郡西二十里之琴山山勢周摺如盤谷一步一形一曲一竒君為之出其心匠助成天巧紆餘為徑參錯為亭崖石斫而泉溜清松竹茂而煙雲鬱竒花異卉與山低昻清香翠陰隨地拍塞山居之樂君既飫之而猶以為未愜也又復作危樓百尺於翠微之上欄檻一成山外之山羣入或飛如龍或踞如虎或連如城或斷如壁或獨立如天柱平者如案坳者如鞍齊而展者如屏幛如千兵萬馬倒仗伏謁如翠浪碧濤排空層起嶙峋崒嵂宛轉相因無一不為此樓之有而今殿院章公為大書其扁曰萬山樓夫然後起居習服在山周覽縱觀亦在山近之既得其趣味之真逺之復不失其意象之大愛山至此始兼得其全焉抑君亦何為愛之不已若是哉夫山於天地間為物最厖碩草木之所生禽獸之所蕃寶藏之所興古稱出雲風通氣於天地之間而國家以成是仁者所以樂山是固非局於遊觀之娛而昧於造化之仁者所能體認而興起也君於庚子嵗首助賢太守發廩振飢繼是郡凡有事將利於民君必協助唯謹恩信洽於閭里聲名動於縉紳而君之子亦妙年掇髙科此其於仁幾於種而穫矣然則登斯樓也林壑彌望生意濈濈雲出於山又從而雨澤之得無當思仁增而益厚者乎必如是然後萬山與吾一心矣咸淳五年五月日四明山黃震記山陰縣重建主簿廳記越為浙以東最大郡山隂為越之附城最近邑簿領為最卑官郡大則事繁邑近則事先及官卑則事於是乎委况今之越漢之南陽乎事抑可知矣習菴先生之弟之子陳君若余倩也為簿此邑始頗難之余亦頗意其弱不勝獨其兄今總餉淮西户部公曰可也是弟足與為善往踰年士民果安之明年長吏果交薦之又明年書來則請記官舍之成其説尤有足誦味者説謂簿僦屋而居已四十年咸淳二年春蜀人迦君應起始訪舊基營一堂二內前植之門後綴之庖湢邑大夫王君宗洙嘉其能有立助之錢七百緡又助之建廳事三楹煙蕪久穢之區氣象方駸駸日以闢不幸皆未及落成迦君以憂去若以蕞爾者驟承之凜乎慮垂成之易壞前人之志不克終而邑大夫之賜孤也攻苦輟俸分毫以葺乃户乃牖乃塗塈茨區區此心不過除風雨以庇朝夕保棟甍以授方來爾豈更夢及增飾哉邑士劉鵬飛見若屋漸以就而民不知役似有以察其區區者治材斫石俄輦以來如世俗施浮屠氏之為己而聞風相助者踵至若乃以之甃中唐以免泥潦新吏舍以肅文書立神祠以妥靈佑而來助者猶未央也又以之作虛當廳事之東取明道先生為上元簿日存心愛物之語扁曰存心以朝夕景仰其間丹雘一新花竹交映朝暉夕霽相與發揮若雖不敏顧之猶欣然有契向非越之人情風俗之厚其誰與成此愧若之本不足以致此於人爾余讀之驚且喜曰然則孰謂郡大邑近者之卑官不可為耶孰謂南陽帝鄉之不可問耶又孰謂世降俗漓人心之不可以旦夕感耶然余每觀世之征需於民文移如火箠楚紛塵猶或未之應君何以獨能不求而得也豈天下事果存乎其人而已耶豈人心不可強其應惟其不求此所以得耶豈豪舉大言之士未必有實而弱不勝衣者固自月計之有餘耶是則余之始意其弱者正其足與為善之資户部公謂其足與為善者蓋其有得於家庭講習之素而君名堂以存心或者此其得人心之本也敬誦存心之義以相發可乎夫心之説有二古人之所謂存心者專此心於當用之地也後世之所謂存心者攝此心於空寂之境也造化流行無一息不運人得之以為心心即造化也亦不容一息不運心豈空寂無用之物哉心之德為仁仁之施為愛以之親親而親以睦以之仁民而民以化以之愛物而物以育感無不應理有固然如君所得於越之人士亦明效之芽甲矣世乃有遊手浮食之徒株坐攝念亦日存心而外照其所以親親仁民愛物者是既失心之良固無足責奈何士大夫習溺於見聞之久歆動於空虛之文亦將遺落世事而獨求其所謂心逮其心迹冰炭物我參商作之不應刑罰滋章所謂老子之弊流為申韓者一人之身已兼備如是尤人之不我應得乎二説交馳幾微一髮近世慈湖先生楊元公教學者專指心之精神是謂聖或者亦不無疑焉然此語於傳謂吾夫子所以教子思也使之推數究理周其所察則精神云者正其心之用與世之攝置此心於無用者正相南北與程子所謂存心愛物者正自符契故慈湖為郡教化興行習菴學於慈湖愛人利物之政至今在人耳目要其行事則可以推其所以言心者矣而君今日知所存心以得越之人士之心亦豈無所自來哉故併發之願益懋之以昌君之家學使後之來者皆知以心感心則越之人士豈特報施於君者為然君又豈特得於越之人士為然咸淳五年己巳嵗五月日記居易俟命之奧記士有韋編夜燈吾伊自適視富貴為儻來物者有征帽黃埃驅馳不憚謂功名在萬里行者譬之求玉者登山採珠者入淵所嚮各不同未聞其兼得江西宋達甫年少氣鋭方挾其囂囂者遊天下一日邂逅余金陵乃屬余記其居曰居易俟命之奧是結駟之子貢自稱陋巷之顔淵也其情耶其名耶其倦逰而悔取佩韋之義自矯耶余既辭再三不獲則疏其義以告曰易者日用常行安於我而本無事者也命者得喪窮通制於天而不可必者也自昔士君子子弟吾職詩書吾業耕桑隴畝吾養外是庸何知故居易者君子之事也俟命者非君子之心也自或者徼幸之念生子思子始不得不為俟命之説以形之俟之為言若曰聽其自然云爾豈居是易將以俟是命也哉子思之學傳之孟子觀其發揮槩可互見如曰得之有命也曰君子不謂命也曰居之安則資之深而經德非以干祿也然則君子知有居易而已命亦何以俟為况居易而俟又君子成德之事用之則行舍之則藏在我者沛其有餘在天者斯隨其所遇吾儕小人學之未講所謂如或知爾則何以哉方其居易之時正懼無以副天之命具雖其有命尚當審之茍不以其道而得之寧辭富貴而就貧賤又非可槩曰俟之而已也余方為是凛凜達甫其然之否耶咸淳己巳九月五日慈溪黃震記臨安府昌化縣重建平糴倉記國家六飛南來控浙右沃壤稻粱之富甲天下足厚養吾元元為異日恢中原基本列聖相承加惠賙恤如家人父子視其飢渴而飲食之恩意每每先四方矣昌化正行都支邑乃逺介徽嚴萬山間猶獨苦糴價湧此非分牧者責而誰責然士大夫孰不知推廣聖天子德意而猶若此者非他邑小力凋雖欲預糴而時出以抑價不能也非然則餫道由浙江慮泄外境例有禁雖請糴不許也非然則經畫甫成去即乾沒於胥吏人之手雖欲久其惠不獲也淳祐壬子嵗黎君宣昭為宰嘗節縣用積楮幣五萬計白大尹通治餫築倉縣西門曰平糴闔邑方嘉賴君既去倉不幸回祿及之吏因併碎記石滅其蹤糴本無一錢存嗚呼力之凋者蓄之裕矣糴之遏者謁之通矣行之未幾尼之已至三嵗輒易之官果無以勝世世長子孫之吏則山居谷汲而草木食者何時得與都人士比耶必有視飢由己切切然為無窮思者乃可爾後十有四年衛君植來日攢眉民食曰吾民獨非畿內赤子乎前令尹豈無以聖朝加惠畿內根本之心為心者乎訪之果得黎君記墨本即按之以責償乾沒之吏復痛節縣用之尚可節者以附之視黎君更多其半以乞糴大尹不可則轉糴之鄰邑陸行而擔負謀什一積者重立倉貯之春而夏市而鄉計户出糶價用復平民雖以為感君猶以為傔曰糴之鄰邑孰若徑糴之浙右之為價廉也民雖以為喜君方以為憂曰觀之黎君又孰知吾今日之事為必可久也戊辰嵗九月秩滿如京遂靣白之今大尹侍郎潛公説友曰某不敢以己去忘百姓潛公感其言慨許之通糴如君請繼君者方將藉以施無窮明年冬君與余同僚桐川尚屬余記其事信乎君之視飢由已切切然為斯民思者滋無窮也余惟三代無平糴法非不平糴也井田家私百畝民固無俟於糴糴又何俟於平井田漸壞民不免糴平糴自管夷吾始矣然為強國計也未必為仁民計也為仁民計而平糴者我朝也平糴以仁民冀復承平之舊者我朝南渡也昌化去天咫尺獨若盛夏之有靡草然至黎君而後能平其糴至衛君而後能久其平使分牧者人人衛君其心也吾國基本日以厚聖朝之仁天下者無或壅而不通恢復中原有日矣豈久於東南哉君吳門人大參文節公猶子有家學熟典刑故其設施關大體如此咸淳五年十一月朔奉議郎添差通判廣德軍兼管內勸農營田事黃震記止庵記咸淳庚午秋余護試紹興府初識校文官天台舒君漢章明爽好修之士也屬余作止庵記謂將朝夕助觀省余謝再三不獲則告之曰知止不殆此老氏之所謂止退全一己之言也大學之道在明明德在新民在止於至善此孔門之所謂止兼善天下之義也漢章方以孔門之學發身豈有取於老子者哉亦相與講明至善之所在耳大學自為人君止於仁至與朋友交止於信雖所止之目凡五要不過舉其大以槩其餘實則一事一物之微一舉一動之暫無非天理之流行則亦無非至善之所在皆不容不求其所當止之地也雖然人必有所不止也然後能得其所止一或自止則志念頽惰工夫不續人者一雜天者已擾而何止之有故夫子曰吾見其進也未見其止也漢章試深思而實體之當有不容自止者毋但曰止而已云紹興府添差通判廳龍山堂記越自秦望山擁千巖萬壑之秀奔駛莫遏每偃輒發極而融結城雉萬堞中昻昻乎若踞世以其形似名卧龍山龍之首距水水之外再起小圎峰名火珠則繡衣使使節駐之龍之尾天矯出水上林麓特秀則西園臺池之勝叢之龍之右脅南嚮為府治而其左則貟外丞之聽事亦南嚮挹之且因其稍逺而卻視也又反得盡見其全朝霏暮靄出沒萬變觀者眩轉狀疑飛動至或風起雲湧急雨隨至則變化奮迅勢幾逼軒窗故古人復作堂勝處而扁之曰龍山咸淳六年夏五豫易地此來與余侯交杯洗爵其上時侯方葺治一新風景益勝然堂扁則侯已取别駕宜英儒之句改曰宜英矣豫問故侯慷慨言曰子獨不聞五乳峯下卧龍石乎晦翁先生為繪諸葛公像而記之曰來者尚有以識豫之意知晦翁之所以繪諸葛則知吾之所以名宜英子但為我記之斯意也豈無來者識豫竒其言因記之以俟人中龍侯名垓字元暢三衢人丞相忠肅公曽孫豫則慈溪黃震東發紹興府萬栁塘記錢塘江濤之壯名天下其東自海門分而入長山龕山兩崖之間者實趨越之新林其地窊以曲長風巨浪日夕舂撞其下豈惟居民凛凜動與天吳海若爭疆界越東南大都會為畿內輔藩今又為帝鄉往來行都者總總無不由此途出其所關係又豈偏州下邑利害止於一方者比哉咸淳六年庚午秋海溢浙東新林被虐為甚岸址蕩無存矣太守劉公具以其狀聞朝廷亟為遣吏經度議改築新塘計費用石當緡錢三百萬用士費十之一公以力未及石請用土而故地莽為一壑潮汛欱忽土立輒衝去公親臨按視禱之神曰此朝廷所加念者願有以相之未幾沙果驟漲始得立巨松數萬如櫛為外捍吏民歡噪畚鍤雲興四閲月而工役就其髙踰丈其廣六丈其長千九十丈橫亘彌望屹若天成公率僚吏行塘上釃酒相賀曰非朝廷之賜不及此而川后效靈其忠亦不可忘也命立之祠且植栁萬株大書其扁曰萬栁塘以冀嵗久根蟠塘以益固既而念不可忘日葺也復請之朝籍新林寨兵屬之西興都巡檢使任責焉蓋公雖力未及石而塘之堅緻殆不減石矣然聞自昔帝王之建都定邑未有不因長江大河之勝而自昔水勢之衝橫侵軼反多見於盛帝興王之時是豈有他哉水之東西靡定本其常性世治日久則濵涯皆生聚故水至輒易為患如河決不聞於他時而獨聞於商周西漢及我朝之隆是其證已我朝自駐蹕錢塘距水彌切樓臺百萬多疇昔海變桑田之地凡司為隄障者蓋無所不用其極越去行都咫尺實共此江濤洶湧之險水性匪西即東利害每相關又宜何如其為隄障哉頃嵗庚子潮齧錢塘輦石而後奏全功今嵗在庚午適三十年是為天道一小變今日之東齧新林即前日之西齧錢塘者也雖賴餘福之所覃魚龍百怪已帖息必欲為久安計尚惟後之人因公之志續公之功輦石如錢塘爾公名良貴東嘉人時以太府卿直華文閣出守董其役者參議官金華鞏公名桂明年辛未二月十日記長興縣主學廳題名記縣之有學於教養為最切蓋士方少長閭里聞見未雜父詔其子兄率其弟必先使挾策遊縣學於斯時也蚤正而素定之是水方出而澄其源木初生而培其本關係異日之成就夫豈小小我朝深察其所以然故凡縣無不置之學士大夫亦深體其所以然故凡有位於縣者無不振職於學如明道之宰扶溝如晦翁之仕同安休風善教至今聞者興起曽謂今人而遽不之若乎夫何風俗事勢之日變簿書期會之日繁乃或視學校為具文否亦因俗塵而靡暇我先皇帝善通其變始詔天下縣學各置官主之與州郡置教授等聖慮深逺所以為人才計者可謂悉矣然方草創官多僦屋而居市巷猥褻師道不嚴或猶病為縣者奉詔之未虔長興號畿內最大邑亦一再更官無所乎寓咸淳六年嘉興陳君壧來始即叢桂堂增飭為廳廨規模宏敞觀聽一新考德問業之士至者無不為之竦動灑淅此正於師道有關而非徒為一已便安計也乃礱石壁間昉為至是官者刋列姓氏因三山葉君龍從求余記其説使來者皆無愧於其職焉余聞司馬公記諌院題名謂某也忠某也邪讀者為之凜然今縣學官題名忠邪固未易見惟曰某善教養某不善教養亦懼觀者之指摘爾然諫官雖尊風采止於一時縣學官雖卑教養垂乎長久是尤不可不深究其心者也夫教非課試之謂而導迪之使一於善爾養非飲食之謂而涵養之使汔於成爾不教之義而教之利不養其大而養其小其弊之來非一日而士習間有難言者今幸聖朝深究源本創官設教使絃歌盈耳在在皆武城之邑况長興去行都咫尺山水秀拔士多穎特擢髙科登顯仕者項背相望非學校之力而誰力是可不益於其教養之實而求之乎陳君忠肅公五世孫斥姦誣以尊堯黜新經而崇理剛正篤實必有得於家傳之素者師道立則善人多惟君勉之後來者將於此乎取法咸淳七年二月望日奉議郎新差知撫州軍州事黃震謹記紹興府重修圓通寺記古者有功於民則祀之而後世佛氏之祠遍天下古者水旱禱於山川後世則捨而禱於佛氏之祠夫雲出於山龍翔於淵斂散翕忽生意勃焉此百穀以之生萬民以之育造化之最顯見而人人之所共目故曰鬼神者造化之迹也其禱之也則宜若佛氏自謂出造化外其於造化果何關且曰雨曰霽果其職乎否耶余為此疑久矣及來紹興府見圓通寺祠觀音稱禱雨㿩應輒如響因嘗思而得其説蓋聞四明大海中有山曰補陀世稱為觀音之居凡焚香而往航海而求者率見紫竹旃檀見淨瓶巖石見真珠瓔珞往往與世之祠其像者巧相合是大海為百川之宗觀音為大海神異之宗宜雨歟翻溟渤雨下土冝暘歟捲浮雲歸太虛靈變應禱理勢則然誰謂雨㿩非山川之事而鬼神非造化之迹乎誰謂佛氏之有觀音為出造化外又誰謂觀音非有功於民而祠者乎太師判宗福王嘉其然為民請於朝得度僧牒一十道再修圓通寺屬有德之僧曰如聞師者主之於是寺之講堂若齋廬若廊廡若庫厨以至蓮之亭栁之堤一一增新光耀奪目恍若補陀山神現之境移置人間世繼自今越之民水旱必禱者其心愈有繫屬是皆聖天子加惠帝鄉之賜而太師判宗福王申請之力也詎容不書若夫寺之創於吳越王錢氏增大於郡太守清獻趙公諸公貴人次苐修葺則各有古記石在咸淳七年二月吉日奉議郎添差通判紹興軍府事新差知撫州軍州事黃震記撫州崇仁縣黃洲橋記水包絡天地間流行運轉無一息停財而成之則存乎人茫然而際天也或航之浩然而赴壑也或梁之隨其宜而各制其用資其利而不攖其害兹人之所能與天地並立而稱三才者哉撫州之西南萬山崒嵂水如天落衮衮東流餘百里穿度崇仁南北兩市間每風雨晦冥洪流驟漲輒咫尺如千里隔往往濟以舟而舟所以駕渺茫非所以凌湍急也維楫一失舟人已葬魚腹中淳祐八年邑之寓公若人士共議創石梁越十五年至四明史君百之為宰始汔於成居無何燬於火邑人嗟痛不自勝咸淳庚午嵗建安趙君若濐以丞攝邑事屬好誼之士陳君純中合衆力更新之為費一萬一千緡有竒為層級以升崇四十尺為屋其上四十楹南北為之門而中為之祠氣勢突兀凌轢空碧金朱璀璨浮動溪山不惟貫徹南北市謳歌雜遝晝夜聲相聞湖廣數十郡道此以趨赴京者亦皆繩繩乎載歡聲以東無復需於沙矣邑人復矜喜不自勝以讖有黃州髙丈崇仁出相之語請大魁文公大書其扁曰黃洲橋而屬余為之記余謂橋為濟人設也橋成而宰相出所濟又豈惟此橋之功而已哉惟邑之人士益自勉咸淳七年九月十三日承議郎權發遣撫州軍州兼管內勸農營田事節制軍馬黃震記臨川圖畫記衡嶽之秀疏而入湖南江西數十郡凡融結而停峙者往往為州其再發麻源勃鬱百里或起或伏然後徐而盤據於臨川之上者是為撫州獨立物表俯瞰闤闠見林阜層突煙霏暗靄日橫陳於几席之下者是為撫州之州宅欄檻倚空一目無際見濃緑成堆愈逺愈竒雖圖畫有不如者是為州宅登覽之亭亭不知始何時亦不知其初何名嘉定三年林公岊再建自謂從祕省出守因名瀛洲氣勢恢宏視昔尤勝然祕省之佳稱施之偏州疑未安而瀛洲又列子寓言耳烏有所謂瀛洲者哉咸淳七年秋余既葺之新客請易名臨川圖畫庶於景物為稱余惟自衡嶽疏演而為撫自撫州環擁而為宅自州宅卜最勝而為此亭蓋東南扶輿清淑之氣至此獨積之厚而發之宏造化融液生意浮溢此正宅生千里者所當體認而興起名瀛洲固非所安名圖畫又何足以盡姑惟易之以狀髣佛云是嵗辛未十月朔承議郎權發遣撫州軍州兼管內勸農營田事節制軍馬黃震記撫州重建鼓角樓記鼓聲壯角聲悲悲則感慨壯則激烈所以肅邦侯之號令而作三軍之忠勇故凡郡治必崇鼓角於麗譙撫州獨不於麗譙而别為樓於其左之髙阜或曰昔危侯治州宅讖謂水侵鼓角故徙此或曰阜之下有竒石昔或穴之噫氣如湧名羊角山羊陽也鼓角聲亦陽也故置此以豫觀之他州惟麗譙為髙此州則惟此阜為髙乘髙申警聲發天半誠莫此地為宜豈必如或者之言哉然惟其左雖郡將莫之登臺輿汙踐樓且就圯咸淳七年冬余始新其陳陋疏以櫺檻山川城市盡在一目登覽者欣然歡謂此一州之勝昔湮今顯宜於威崇乎有助余則念根本尚有在爾夫肅號令作忠勇鼓角也寓之鼓角者政也政平賦理軍民兼足士飽馬騰歡聲浮藹則鼓角歡亮皆政之發否而徒恃鼓角為雄有是乎幸今朝廷清明根本所在士大夫正宜汲汲若夫萬籟俱寂之頃夜氣方清之初耳靈鼉之逢逢聆梅引之嗚嗚清吾政本所自出又在此心也哉承議郎權發遣撫州軍州事節制軍馬黃震記撫州金溪縣李氏社倉記咸淳七年余承乏撫州適嵗大飢賴撫之賢士大夫相與講求賑貸因多有以社倉事來諗臨川縣李君德傑首以書來曰鄉有李令君捐粟六百石為倡將成社倉幸因以風厲其餘余報曰甚矣社倉之法之良之可慕也亦甚矣社倉之弊之苦之可慮也余前嵗負丞廣德見社倉元息二分而倉官至取倍稱之息州縣展轉侵漁而社倉或無甔石之儲其法以十户為甲一户逃亡九户賠補逃者愈衆賠者愈苦久則防其逃也或坐倉展息而竟不貸本或臨秋貸錢而白取其息民不堪命或至自經僉謂此文公法也無敢議變余謂非變其法也救其弊耳乃為之請於朝曰法出於黃帝堯舜尚當變通法立於三代盛王尚須損益安有法本先儒而不可為之救弊使法本於儒先坐視其弊而不救豈儒先所望於後之人哉朝廷可之既又念臨以官司之煩不若聽從民間之便也又為之請於朝曰朱文公社倉法主於減息以濟民王荆公青苗法亦主於減息以濟民而利害相反者青苗行之以官司社倉主之以鄉曲耳故我孝宗皇帝頒文公法於天下令民間願從者聽官司不得與廣德社倉創於官故其弊不一請照本法一切歸之民朝廷又可之余遂得窮年餘之力經理更革以其收息買田六百畝永代人户納息且使常年不貸惟荒年則貸之而不復收息凡費皆取辦於六百畝官田之租事甫集而余去官未知近何如至今猶念念不能忘此余親厯於廣德者如此若凡他州各縣之有社倉者聞其備往往而然殆不勝述及來撫州社倉幸皆鄉曲之自置有如文公初立之本法然亦間有名雖文公而人不文公其初雖文公而其後不文公倚美名以侔厚利者亦已不少余方為之悚然以懼何敢更以官司預社倉之事哉大抵小民假貸皆起於貧貸時則易還時則難貸時雖以為恩索時或以為怨倘稍從而變通之鳩錢買田豐年聚租荒年賑散不惟不取其息併亦不取其本庶乎有利而無害凡皆余答李君之説如此而未敢以為信也未幾金溪李君沂復以社倉法來俾余為記及閲實其始末蓋一家自為之計而依法惟取二分之息不借勢於官不鳩粟於衆故能至今無弊利民為博今嵗之歉一邑賴之置倉如此信能以文公之濟人者濟人矣然有治人無治法良法易泯流弊難防君能如文公更望君之子孫世世如君也因録所報李君之説以遺之先是郡之新豐饒君景淵亦嘗以社倉求余為説其法取息視文公尤輕貸而負者去其籍而不責其償事益省而民益安并書以遺之咸淳七年冬至日承議郎權發遣撫州軍州事節制軍馬黃震記邵武軍建寧縣綏城驛記咸淳七年秋知邵武建寧縣程侯作綏城驛新成走書屬余為記余謂此固天理之當然而仁者之事顧非克去己私者不能為之爾夫仁者以天地民物為心故必欲無一之不得其所不特施於吾國者為然雖其施於四方賓旅者亦莫不然如成周之有候人有野廬氏皆發於一念自然之仁而後世則不可以例論晉以隸人之垣贏諸侯而人譏之及髙大諸侯之館則衆附之此其崇飾勢不得不為漢以乘傳達命令於天下唐以館驛使輸貢賦於中都此其程督亦勢不得不為而又皆以國家之力而為之雖未必果為仁者之事亦何俟士大夫克己之私而後能為之耶我朝自朝廷而監司而州而縣脈絡相通臂指相使不事驛傳之督促無待使指之旁午惟在京置都亭驛置班荆館以待四夷來王之人州縣則一切惟其自置晏然與天下相安此非迫於勢之不得不為也承平日久財用日繁而縣令受煎熬之極治事之廳燕寢之室風雨不蔽十或二三而况賔旅者此又窘於力之不暇為也勢非不得不為力又不暇有為而猶汲汲為之非仁者之事乎非克己之私以成其仁者能之乎蓋程侯之事是已侯稽舊驛之不存閔至者之無歸而新其驛九十楹計縣帑之垂罄核浮鹽之有贏一毫不以自利而用以建驛者錢踰萬緡此三代設候人設野廬氏之盛心而我朝分牧以仁民之心也侯之仁其民於是他可類推而他日贊我朝之仁以仁天下亦從可預推矣豈特一驛之新云乎哉余故悅而為之書若夫存縣名之舊扁曰綏城廳曰濉城苐一東曰必葺西曰欲留又中為告新之亭而名其左為願豐右為所憩且為一堂二內以附其後名見思巨麗翬飛甲於逺近此又特其驛之細侯名夢桂字月卿世居建安云承議郎權發遣撫州軍州事節制軍馬黃震記撫州新建增差教授廳記仁義禮智之性具在人心所以開而明之者則存乎教詩書禮樂之教具在方册所以講而行之者則繫乎師故師必明聖經而後可以淑人心必淑人心而後可以轉移風俗上為聖天子躋世太平之助自詞章之學興而士未必知經我神宗是以創經學士猶多以詞章發身而職教者又未必皆經我之理考是以創增教增教云者必使一州各備一經師于以上續三代聖王化民成俗之初意其責豈不甚重乎哉方是時撫之郡博士業詞章於是增教用經為師必舍選名流則居之其事又豈不甚盛乎哉然事以創見為駭官以後至為客今且十祀無所乎寓僦屋而居聮甍編伍師道之尊如何而可以聳觀聽新士習耶上饒程君紹開來謂道必依形而立理必與勢而行始慨然以創聽事為己任前太守繆侯嘉其志首助之余繼至聞其事又助之然坐郡凋愧未能盡任其責君乃捐俸傾槖日積月纍逮垂滿秩事始獲就髙其門閭揭之題扁宏敞明潔過者神悚猶無不知增教之所由始而况士乎其必肅然仰灑然異矣然則乘此作新之機可不益求經學之實者乎夫所貴乎經學以其明義理也今之業經程文而已耳或謂科舉纍人弊遂至此余竊以為不然自昔人主不能自治其民必求天下之秀異以與共治自昔人士亦無以自達於上必吐胸中之抱負始克上達故今之試士以文即古之敷納以言科舉豈纍人之具哉天下之事理無不在聖人之教事必踐實士能行矣而著習矣而察雖起居服食之細皆足以驗天理人事之則而况大之為科舉其或行矣而不著習矣而不察則雖仰天俯地尚不思覆載之恩瞻日顧月猶不知照臨之賜又何有於科舉粵自世教不明經術道微上之試於我者本以性命道德本以古今治亂而我之應於上者自以其穿鑿自以其浮靡今日之試於上者尚能言及天理尚能言及仁政他日之施於民者自或流於人欲自或流於貪刻言行相違窮達異趨國負士乎士負國乎法弊人乎人弊法乎程君之教人以經也固不離乎文也而文即理之寓言即行之副窮即達之占也君之教人豈必他求亦惟因其文使各踐其實而已君始薦於鄉即上先皇帝書萬言先皇帝為之嗟賞不已其在太學以行誼稱權姦誤國退不就試今橫經于撫適嵗飢厄無預於政而散財賑民君固實踐其實矣身教者從吾道何幸余故恱而為之記咸淳七年辛未嵗七月草六日承議郎權發遣撫州軍州兼管內勸農屯田事節制軍馬黃震記江堂賓得齋記盱江江仁甫嘗求陽山吳君名其所居曰得齋已幾年矣求大參包公宏齋為得齋銘又幾年矣今既老尚求余為記亦足見好學之不厭矣然余何人而敢僣且仁甫本宗象山之學領袖臨汝書堂餘二十年又日講晦翁之學朱陸之學皆世所宗而其説不同或非排抵仁甫能兼取而參酌之此其所得又豈晚末敢輕贊一辭辭不獲命姑誦所聞蓋聞有得於天者有得諸己者己之所得正以全其天之所賦豈又外於天者哉仁義禮智之性人莫不有得於天而人之賢不肖乃人人殊正以能得諸己者寡耳故孟子曰君子深造之以道欲其自得之夫曰深造又曰以道則其於義理之間果宜何如其用力而後可以言深其造既深猶以為欲其自得而不敢必以為得意者功深力到久乃自得而自以為得者則理未必然而言不可以若是其幾乎孟子又曰求則得之求之云者誦詩讀書隆師尚友精思力踐孜孜汲汲皆求之謂求則將有時而自得矣安有不求而可以言得者乎抑愚又聞之孔子之教人多以孝弟忠信而未嘗言及性與天道孟子生人欲橫流之時始出而言心與性周子生傳注訓詁之後始出而言陰陽性命之源皆發明其所自來使人歸宿於所實用人知此身之所主者心此心之所具者性此性之所本者天造化流行純一不雜此身雖小造化雖大而此身實與造化參則超然獨立於萬物之表利欲不得而昏卑陋不得而溺凡吾孝弟忠信之行自然無玷無缺故凡孟子周子之説無非隨時救弊警醒人心以翊吾孔子之教非固外立一説而求為過髙也譬之挽水於淵正將歸以濟烹飪之實非曰姑挹其清冷而已也譬之植木於山正將積以成棟梁之用非曰遙挹其風露而已也今世之士置孝弟忠信於不言而想造化陰陽之莫測躬行講説判為二途茍如是而自以為得焉殆蘇明允所謂誰不曰道不在我者也果實得乎否耶仁甫孜孜問學老而益堅其有得於此也必審故誦所聞以求教焉非敢言記黃氏日抄卷八十七
