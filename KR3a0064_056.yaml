body:
  text: 黃氏日抄卷五十六宋黃震撰讀諸子二吕氏春秋吕氏春秋者秦相吕不韋耻以貴顯而不及荀卿子之徒著書布天下使其賔客共著八覽六論十二紀竊名春秋髙誘為之訓解淳熙五年冬尚書韓彥直為之序謂士之傳於天下後世者非徒以其書夫子之聖則書宜傳孟子之亞聖則書宜傳過是而以書傳者老聃以虛無傳莊周以假寓傳屈原以騷傳荀卿以刑名傳司馬遷以史傳揚雄以法言傳班孟堅以續史遷傳然槩之孔孟宜無傳而皆得並傳者其人足與也吕氏春秋言天地萬物之故其書最為近古今獨無傳焉豈不以吕不韋而因廢其書耶愈久無傳恐天下無有識此書者於是序而傳之栝蒼蔡伯尹又跋其書之後曰漢興髙堂生后倉二戴之徒取此書之十二紀為月令河間獻王與其客取其大樂適音為樂記司馬遷多取其說為世家律厯書孝武藏書以預九家之學劉向集書以繫七略之數今其書不得與諸子爭衡者徒以不韋病也然不知不韋固無與焉者也十二紀孟春紀與月令孟春同字語則微有異如月令鴻鴈來此則云候鴈北服蒼玉則云服青玉草木萌動則云草繁動草木蚤落則云草木早槁焱風暴雨總至則云疾風暴雨數至孟春紀之次曰本生言生之者天地養成之者人立官者所以全生多官而反害生則失所為立意謂孟春為生之始因欲為人上者保其人之生也次曰重己言以頥養性而保長生又欲人之各自保其生也次曰貴公言處大官者不欲小察次曰去私以去私而後能公也凡皆演所以生之之道也此卷載荆人遺弓而不索曰荆人遺之荆人得之孔子聞之曰去其荆而可矣老聃聞之曰去其人而可矣故老聃則至公矣愚謂亡弓而索之者人情也事理也亡而不索己非矣謂孔子為欲去其荆已度越而為好髙之說孔子必無此言謂老聃欲去其人又過髙而為蕩空之說老聃亦未必有此言然層進一層覽者脫然此後世曠逹之所從始以為至公之證誤矣元日注元善也日從甲至癸也元辰注元善也辰從子至亥也近世以正旦為元日三命家又有元辰與此不同輦人引車曰輦出門乘車入用輦聾者之養嬰兒也方雷而窺之於堂烏獲疾引牛尾尾絶力勯音單盡也而牛不可行逆也五尺孺子引其捲而牛恣所以之順也注之誤命之曰招蹶之機注云蹙機門內之位也遊翔至於蹙機愚按此章以車輦為招蹶之機以酒肉為爛腸之食以聲色為伐性之斧三條並列㫖義甚明蹙者蹙蹶顛踣之意若曰自佚太過乃招致蹙蹶之機耳若以蹙機為門內之位則下文以腸食為一味以性斧為一物可乎聲禁重色禁重禁聲色太過耳注誤以聲為聲譽之聲不欲虛名過實此說亦非仲春紀次曰貴生言耳目鼻口必有所制然謂不以天下國家害其生則老莊之說耳次曰情欲以早嗇精神為說以春多雨則夏必為旱為喻此亦道家養生之說次曰當染因墨子歎染絲之說謂國亦有染學亦有染欲所染者得當次曰功名謂善釣者出魚乎十仞之下餌香也善弋者下鳥乎百仞之上弓良也聖王不務歸之者而務其所以歸凡又因貴生而展轉其說者也彭祖注七百嵗缶醯黃蚋聚之徒水則必不可以冰致蠅雖工不能以茹臭去蠅蠅愈至茹臭也讀如茹漏般之茹舍采舍猶置也初入學宫必禮先師置米帛於前以贄神也季春紀次曰盡數謂當察隂陽之宜辨萬物之利以便生而年壽得長焉今世尚卜筮禱祠故疾病愈來次曰先已謂為天下者不於天下於身故詩曰執轡如組孔子曰審此言也可以為天下謂其為之於此而成文於彼也次曰論人謂無以害其天則知精次曰圜道謂精氣一上一下無所稽留為天道圜聖王法之而令圜則無所壅矣凡又因貴生盡數而展轉其說者也此月薦鞠衣注云春皆尚青薦鞠衣未通按月令注黃桑之服將蠶祈福也雍齆鼻窒鼻不通孟夏紀次曰勸學謂先王之教莫榮於孝莫顯於忠而始於尊師次曰尊師謂顔涿聚梁父之大盜也學於孔子假干木晉國之大駔也學於子夏髙何縣子石齊國之著者也學於墨子次曰誣徒謂人之情不能樂其所不安不能得於其所不樂反諸人情則得所以勸學矣次曰用衆謂善學者假人之長以補其短天下無粹白之狐而有粹白之裘取之衆白也凡皆以學為說魁士名人魁大也紂作胡粉出用衆篇注仲夏紀次曰大樂謂音樂本於太一太一出兩儀道也者至精也不可為形不可為名彊謂之太一次曰侈樂謂亂世之樂愈侈而民愈欎宋之衰也作為千鍾律名齊之衰也作為大吕楚之衰也作為巫音次曰適音謂欲之者耳目鼻口也樂之弗樂者心也太巨太小太清太濁皆非適也次曰古樂謂古朱襄氏炎帝别號多風而陽氣畜積故士逹作五絃瑟以來隂氣隂康氏隂多滯伏作為舞以宣道之黃帝命伶倫作律帝堯立瞽叟乃拌分也五絃之瑟作十五絃之瑟命曰大章舜立又益之為二十三絃凡皆以樂為說長至日注云夏至之日晝漏刻六十五故日長至愚按月令稱日長至此云長至日恐字誤倒耳此書仲冬亦曰日短至可參證也長至者日長之極世俗多誤冬至為長至不知乃短至也含桃桃也鶯鳥所含食太一勿躬篇又曰神合乎太一見上文此時未為神名也溪虛也見適音篇云以危聽清其耳溪極闋終也見古樂篇歌八闋注注之誤齊之衰作大吕注云隂律十二愚按樂毅伐齊遷其大吕蓋齊初為樂器之大者非十二月之律名季夏紀次曰音律言十二律相生三分所生益之一分以上生三分所生去其一分以下生黃鍾大吕太簇夾鍾姑洗仲吕蕤賓為上林鍾夷則南吕無射應鍾為下而分之十二月又極之十二月之人事殆月令要語也注云律吕相生上者上生下者下生次曰音初謂禹行功塗山氏女作歌為南音周公召公取風焉為周南召南昭王征荆涉漢梁敗辛餘靡振王北濟殷整甲徙宅西河猶思故處實始作為西音秦繆公取風焉實始作為秦音有娀氏飲九成之臺二女爭摶燕覆以玉筐少選發燕遺二卵北飛不返二女作歌始為北音孔甲取民室之子以歸斧斫其足曰命矣夫作破斧之歌始為北音凡皆載音之初也恐未必然耳次曰制樂言周文王地動而享國五十一年宋景公熒惑守心而星退三舍次曰明理言天變妖孽亦皆以樂為說蚈馬蚿也音如蹊一曰螢火少選須臾也盲風盲暝也榖生此書為湯孟秋紀次曰蕩兵謂未有蚩尤之前民固剝林木以戰勝者為長猶不足治故立君君又不足治故立天子天子之立也出於君君之立也出於長長之立也出於爭愚謂此栁子厚封建論之所祖也次曰振亂謂世濁已極兵當為義次曰禁塞謂救守之兵皆不義次曰懷寵謂先發聲兵以救民以家聽者祿之家以鄉聽者祿之鄉以邑聽者祿之邑凡以秋故言兵仲秋紀次曰論威謂必反於已則三軍可使一心次曰簡選以湯武齊桓晉文吳闔閭為證次曰决勝以必義必智必勇為本次曰愛士謂秦繆公飲盜駿馬者以酒而脫韓原之急趙簡子以白騾救其臣陽城胥渠之疾而獲翟人之首凡以秋故言兵季秋紀次曰順民謂湯禱桑林以身為犧牲文王辭千里地為民請炮烙之刑句踐有酒流之江與民共之然愚恐皆未必有此事耳次曰知士謂靖郭君善劑貌辨劑貌辨以死而回齊宣王之怒得再相齊恐亦戰國䇿士之夸辭爾次曰審已謂湣王越授皆不知其所以亡次精通謂兔絲無根非無根也茯苓是已磁石召鐵或引之也月望則蚌蛤實月晦則蚌蛤虛月形乎天而羣隂化乎淵養由基射光中石矢乃飲羽誠乎光也伯樂相馬所見無非馬誠乎馬也庖丁解牛所見無非牛誠乎牛也鍾子期夜聞擊磬而知其悲申喜聞乞人歌於門而乃其母而精相得此豈待言哉凡又因兵而及感動之道也射石沒羽此以為養由基此事每載不同要皆野人相承之妄言耳此類甚衆孟冬紀次曰節喪戒侈葬也謂葬必於髙陵以避狐狸之患水泉之濕而忘盜賊冦亂之難豈不惑哉侈葬非為死者慮也生者以相矜尚也次曰安死謂天葬無不相也而世皆爭為之豈不悲哉季孫有喪以璵璠收夫子曰以寶玉收譬猶暴骸中原也次曰異賢今以百金與摶黍示兒子兒子必取摶黍矣以和氏之璧與百金示鄙人鄙人必取百金矣以和氏之璧道德之至言示賢者賢者必取至言矣次曰異用謂湯祝網文王葬枯骨孔子荷杖問人之公搏杖問其父母置杖問其兄弟皆得人心按冬藏也故言葬餘皆衍此仲冬紀次曰至忠謂子培射隨兕文摰怒齊王怒音弩激之怒也皆代其君死次曰忠廉謂要離殺慶忌𢎞演報命於衛懿公之肝凡皆戰國之言次曰當務謂齊人好勇者相飲相啖其肉至盡愚恐無此事次曰長見謂周公太王預知後世吳起知去魏而魏失西河之外公叔痤知衛出境而魏不安凡以附仲冬之後不曉所謂季冬紀次曰士節謂北郭騷謁晏子辭金而受粟後以死報晏子愚恐士節不如是次曰介立以介子推逃去爰旌目吐盜之食而死為介次曰誠廉謂夷齊如周至岐陽而文王殁矣武王使周公盟膠鬲使召公盟微子開夷齊去之至首陽餓焉與正史絶不同次曰不侵謂公孫𢎞為孟嘗君說秦昭王凡亦於季冬事無預右十二紀終而綴之以序意主豫讓云八覽有始覽謂天地有始天微以成地塞以形天地合和生之大經也注天虛而能施地實而能化天有九野中央曰鈞天東曰蒼天東北變天北方𤣥天西北幽天西方皓天西南朱天南方炎天東南陽天各以二十八宿分屬之自鈞天星角亢氐至陽天星張翼軫地有九州豫州周也冀晋也兖衛也青齊也徐魯也揚越也荆楚也雍秦也幽燕也九山則會稽泰山王屋首山太華岐山太行羊腸孟門九塞則大汾冥厄荆阮方城殽井陘令疵句注居庸九藪則越之具區楚之雲夢秦之華陽晋之大陸梁之圃田宋之孟諸齊之海隅趙之巨鹿燕之大昭六川則河水赤水河出崑崙東北赤水出東南遼水出砥石山自東北北東流黑水崑崙西北江水淮水凡四海之內東西二萬八千里南北二萬六千里次曰名類言帝王禎祥以及周尚火代火者必水水氣至而不知數備將徒是為秦設也次曰去尤謂亡鐵者意其鄰之子動見其竊鐵此尤也邾為甲裳以帛公息忌勸用組因令其家為組人有傷之者邾君復下令為甲毋以組此亦尤也愚謂邾君固惑矣公息忌豈可身自建議而身自利之亦何怪人之傷而君之惑耶次曰聽言謂攻無罪之國以索地誅不辜之民以求利而欲宗廟之安社稷之不危不亦難乎愚謂此語足盡戰國之情次曰謹聽謂天子已絶以兵相殘今世當之矣次曰務本謂民之治亂在於有司次曰諭大謂山大則有虎豹水大則有蛟龍此篇載禹一沐而三捉髮一食而三起以禮有道之士愚意此形容之語本無其事而世又以言周公孝行覽謂治必務本務本莫大於孝而載曽子言孝及樂正子春下堂傷足之事理正而文顯可讀也次曰本味載伊尹說湯以至味備物産之美皆傅會之言且曰非先為天子不可得而具是湯為口腹之故伐夏也次曰首時載墨者田鳩欲見秦惠王三年不得見往見楚王楚與將軍之節以如秦因見惠王告人曰之秦之道乃之楚乎物固有近之而逺逺之而近者時亦然次曰義賞載晉文公城濮之戰用舅犯之言而賞先雍季以雍季不肯用詐百世之利也趙襄子晉陽之圍用張孟談之謀而賞先髙赦以髙赦危殆中獨不失君臣之禮賞一人而為人臣者莫敢失禮也次曰長攻載越滅吳楚紿蔡滅息趙襄子以姊嫁代君飲酒而以大金斗擊滅之然愚謂楚趙之事盜賊之事也次曰慎人謂功名大立天也為是故因不慎其人不可次曰遇合載客善吹籟見越王越王不善為野音而反善之人有大臭者親戚兄弟妻妾知識無能與居自苦而居海上海上人有說其臭者晝夜隨之而弗能去陳有惡人曰敦治讎糜陳侯甚恱之使之楚楚王怒興師伐陳次曰必已載單豹好術離俗棄塵不食榖實不衣芮溫芮絮也身處山林岩窟以全其生不盡其年而虎食之此篇載伊尹生於空桑謂其母居伊水之上孕夢有神告之曰臼出水而東走母明日視臼水出告其鄰東走十里而顧其邑盡為水身因化為空桑故命之曰空桑愚意空桑地名好事者因為之說耳此書第五紀云顓頊生自若水實處空桑則前乎伊尹之未生已有空桑之地矣何一書而自相背馳耶此篇載郢人以兩阪垣也吳起變之教之用四而見惡氐羌之民其虜也不憂繫纍而憂死不得焚凡言風俗之難變又載趙襄子擊智伯斷其頭以為觴愚按正史云漆為飲器非酒具也此恐弗考又載舜自為詩曰普天之下莫非王土云云不知何故慎大覽載湯令伊尹往視夏恐其不信湯親自射伊尹愚恐未必然又載趙襄子攻翟一朝而兩城下有憂色孔子賢之愚恐襄子之詐術孔子未必為其所欺也次曰權勳以豎陽榖進子反以酒為小忠大忠之賊虞受晋賂而假道為小利大利之殘又智伯欲伐中山鑄大鐘以遺之次曰下賢載周公齊桓子産魏文侯為證次曰報更載翳桑餓人之言曰臣宦於絳歸而絶糧羞行乞而憎自取故至於此又載淳于髠為孟嘗君說齊救薛云薛不量力為先王立清廟故善說者陳其勢言其方豈用強力哉次曰順說云順風而呼聲不加疾也際髙而望目不加明也所因便也次曰不廣載北方有獸曰蹶鼠前而兔後趨則跲走則顛常為蛩蛩距虛取甘草蹶有患也蛩蛩距虛必負而走此以其所能託其所不能又載鮑叔管仲召忽三人謀獨管仲謂小白無母國人憐之事未可知故使鮑叔傅小白次曰貴因云如秦者立而至有車也適越者坐而至有舟也秦越逺塗也竫立安坐而至者因其械也審天者察列星而知四時因也推厯者視月行而知晦朔因也次曰察今云有道之士以近知逺審堂下之隂而知日月之行隂陽之變見瓶水之冰而知天下之寒魚鱉之藏也嘗一肘肉而知一鑊之味一鼎之調楚人有涉江者劒自舟墜水遽刻其舟從其刻者入水求之舟已行矣而劒不行求劒若此不亦惑乎有過江上者見人方引嬰兒欲投之江嬰兒啼人問其故曰此其父善遊其父善遊其子豈遽善遊哉此篇載孔子之徑舉國門之關而不肯以力聞墨子為宋攻公輸般服而不肯以兵知愚按此言孔子雖未詳而其說可以訓齊王知顔色注知猶發也出報更篇又此書不茍論云文侯不說知於顔色愚謂此見於顔面之意左傳喜可知也之證車依輔輔亦依車注車牙也輔頰也先識覽載夏將亡也太史令終古執圖法奔商殷將亡也內史向摯載圗法亡周晋太史屠黍見晋亂以圖法歸周周威公問孰先亡曰晋先亡居二年晉果亡又問孰次之曰中山居二年中山果亡又問孰次之不對固問焉曰君次之威公懼求諫臣去苛令以告屠黍對曰其尚終君之身乎威公薨周分為子白圭之中山辭去之齊又辭曰之二國皆將亡次曰觀世云登山者處已髙矣左右視尚巍巍然山在其上賢者之所與處有似於此身已賢矣行已髙矣左右視尚盡賢於已因載晏子禮越石父為客列子辭鄭子陽之粟次曰知接載桓公問疾管仲言豎刁易牙開方不可用之詳其文可誦次曰悔過秦繆公違蹇叔敗殽之諫其文亦可誦次曰樂成載孔子用魯子産治鄭民皆始毁而終譽魏文侯匿謗書樂羊得成中山之功魏襄王信史起鄴令得成決鄣水之功故哅哅之中不可不味也次曰察微載子貢贖魯人於諸侯而讓不取其金孔子曰賜失之矣自今魯人不贖人矣子路拯溺者其人拜之以牛子路受之孔子曰魯人必拯溺者矣愚謂此可與論語所記辭粟請益事參看又載女子爭桑而吳楚連兵羊斟爭羊而敗宋之師郈氏介雞而召季氏之亂次曰去宥載鄰父有言鄰之梧樹不善者鄰人伐之鄰父因續以為薪其人不說曰鄰者若此其險也齊人有清旦衣冠往鬻金之所攫之者吏縳之問曰人皆在子攫人之金何故對曰殊不見人徒見金耳次曰正名謂齊者太公之所宅也桓公嘗以此霸矣湣王知說士而不知其所謂士國殘身危先識覽載武王言紂辟逺其子爰近姑與息然則姑息二字也此篇又載孝經曰髙而不危之和其民人然則孝經固古書也審分覽謂人與驥俱走則人不勝驥居於車上而任驥則驥不勝人人主好治人臣之事是與驥俱走也次曰君守以靜而無知為君道次曰任數以耳目心智為不足時次曰勿躬謂聖人之所不能所以能之也管仲人臣也不任己之能以盡五子之能况人主乎次曰知度言去想去意靜虛以待愚按此虛無之說而近世張橫浦諸人主之者也次曰慎勢言吞舟之魚陸處則不勝螻蟻又載慎子之言曰一兔走百人逐之非一兔足為百人分也未定也積兔滿市過者不顧非不欲兔也分已定矣故治在乎定分次曰不二謂聽羣衆議以治國國危愚按此近世國是說所由出也次曰報一謂一則治兩則亂此篇載顔回攫食事謂孔子望見與家語所載不同選間選間須臾也意與少選同二十官自大撓以下皆作始之人象譯狄鞮東方曰羈南曰象西曰狄鞮北曰譯皆傳通其言也神農十七世有天下審應覽謂人主言不欲先所執要矣次曰重言謂人主言不可不慎次曰精諭載齊桓公欲伐衛而衛姬先知晋襄公欲襲周而萇𢎞先知與前篇所載管仲欲伐莒東郭先知同次曰離謂載鄭之富人有溺者人得之富人請贖之其人求金甚多以告鄧析析曰安之人必莫之買矣其人又患之以告鄧析析曰安之此必無所更買矣析之反覆一事而兩為之謀如此子産治鄭鄧析務難之與民之有獄者約大獄一衣小獄𥜗袴民之獻衣𥜗袴而舉訟者不可勝數以非為是以是為非是非無度而可與不可日變鄭國大亂民口歡譁子産患之於是殺鄧析而戮之然則析蓋世所謂教唆者之祖矣次曰淫辭載孔穿析公孫龍之辨唐鞅勸宋王不辨善惡皆罪之而宋君殺唐鞅舉大木者前呼輿䛣輿䛣歌聲也後亦應之此其於舉大木者善矣豈無鄭衛之音哉然不若其宜也夫國亦木之大者也次曰不屈載魏惠王欲傳國惠子是欲惠子之為舜也是惠王欲為堯也堯舜之作他行稱此今無其他而欲為堯舜次曰應言載魏敬諫魏王入秦及凡辨說之事次曰具備載宓子賤治單父請吏二人書而動掣其肘魯君使其自為之三年而漁人不敢欺於暗行此篇載海上之人有好蜻者每朝居海上蜻之至者百數而不止其父告之取而來明日之海上蜻無至者矣愚謂此即海鷗之說移用未必有其事也呿而不吟呿開吟閉煙視媚行言新婦離俗覽載舜讓石戶之農又讓北人無擇湯讓卞隨又讓務光愚謂因莊子寓言堯讓許由而世因增衍至此又載齊平阿之餘子亡載得矛不自快戰而死令此將衆必不北矣齊之賔畢聚夢有唾其面不自快索其形不得死之謂此當務則未也其心之不辱有以加乎次曰髙義載子囊石渚之死然愚以為義則未也次曰上德載墨者孟勝為楚之陽城君而死弟子死之者百八十三人次曰用民載闔閭試其民於五湖地流血幾不可止句踐試其民於寢官民爭入水火次曰逼威言桀紂之禁不可勝數言令煩也次曰為欲謂羣狗相與居投以炙雞則爭矣次曰貴信以齊桓不背曹劌之盟為證次曰舉難以齊桓舉寧戚為證此篇載曺共公欲觀重耳駢脅使袒而捕池魚與左傳不同然恐無此理當從左氏禹時萬國湯三千餘國侍君覽謂人之所以羣者以君道立也次曰長利謂利雖倍於今而不便於後弗為也次曰知分載次飛刺蛟禹濟江黃龍負舟之事次曰召類宋司城子罕南家之墻犨於前而不直西家之潦徑其宫而不止而弗徙也次曰逹鬱謂人皆說鏡之明己也次曰行論謂人主不得以快志為事次曰驕恣載魏武侯矜謀事之當李悝諫之齊宣為太室春居諫之次曰觀表載郈成子受右宰榖臣之璧榖臣死於寧喜之難使人迎其妻子隔宅而異之分祿而食之其子長而返其璧此篇載列精子髙顙推之履注弊履也祛步堂下注祛步舉衣而行也六論開春論以春始雷而蟄蟲動為善說者之諭惠施說魏太子緩葬期封人子髙說假喬緩城築祈奚說范宣子釋叔向皆善說者次曰察賢言魏文侯禮賢國治身逸宓子賤鳴琴不下堂巫馬期以星出入巫馬期問故宓子曰我任人子任力次曰期賢謂爚蟬者務明其火振其樹人主有能明其德者天下之士歸之若蟬之走明火也次曰審為載子華子諫韓昭釐愁身傷生以憂爭地中山公子牟謂詹子曰身在江海之上心居乎魏闕之下奈何詹子曰重生次曰愛類載公輸般設攻宋之機墨子設守宋之備九攻之不入楚輟不攻宋次曰貴卒謂所為貴驥者為其一日千里也旬月取之與駑駘同荆王死貴人相與射吳起起伏尸插矢而疾言曰羣臣亂王吳起死矣公子糾與小白爭先入管仲射小白中鉤鮑叔御小白僵管仲以為小白死矣鮑叔因疾驅先入鮑叔之智應射而令凡所載皆捷於應變者然則貴卒之卒音猝此篇魏闕注巍巍髙大故曰魏闕又載禹疏河決江為彭蠡之障愚按於地理不合慎行論載費無極讒太子建慶封與崔杼弒君而又殺崔杼之惡後皆族滅次曰無義載公孫鞅詐其友公子卭而擒之鄭平欺其交應侯去秦而莫之與續經欺公孫與仕趙而人莫與同朝次曰疑似載黎邱丈人遇竒鬼似其子而至殺真子次曰一行謂行人見大樹必解衣懸冠倚劒而寢其下大樹非人之情親知交也而安之若此者信也陵上巨木人以為期易知故也而况士乎次曰求人載堯讓天下於許由由曰鷦鷯巢林不過一枝鼠飲於河不過滿腹歸已君乎惡用天下此雖寓言然已卑矣不過匹夫知足耳次曰察傳載舜稱夔者一而足矣而世因謂夔一足宋丁氏穿井免人外汲如得一人之使而世因謂穿井得一人衛有讀晋師三豕渡河子夏證其為己亥愚謂此則有合於察傳之義此篇載舜為御堯為左禹為右入於澤而問牧童入於水而問漁師奚故也其知之審也愚謂此即管仲知路不如老馬之喻也銘乎金石注金鐘鼎也石豐碑也貴直論謂所以貴士為其直言也載能意於齊宣狐援於齊湣燭過於趙簡子皆直言然亦粗厲矣次曰直諫載鮑叔奉杯為壽勸桓公無忘在莒管仲無忘在魯寧戚無忘在車下此可言直諌若葆申謂楚文王罪當笞愚恐曉人不當如是也次曰知化載子胥諫夫差不從次曰過理載齊湣王亡國居衛帶益三圍次曰壅塞載亡國之主不可有言之事次曰原亂載驪姬之禍不茍論公孫枝請秦繆公見齊晉之使以非其事而擅請也罪之趙衰辭伐鄴之賞曰賞其本乎賞其末乎賞其末則騎從者存賞其本則臣聞之郤子虎文公召子虎將賞之曰言之易行之難次曰贊能謂得十良馬不若得一伯樂得十良劒不如得一歐冶鮑叔薦管仲而齊霸沈尹莖薦孫叔敖而楚霸次曰自知謂敗莫大於不自知有得鐘者欲負而走不可以椎毁之鐘鏜然有聲恐人之奪已也遽掩其耳惡人聞之可也惡已自聞之悖矣次曰當賞民無道知天民以四時寒暑日月星辰之行知天四時寒暑日月星辰之行當則諸生有血氣之類皆得其處而安其産人臣亦無道知主人臣以賞罰爵祿之所加知主主之賞罰爵祿之所加者宜則親疏逺近賢不肖皆盡其力而以為用次曰博志謂精而熟之鬼將告之寧越之學人休吾不敢休人卧吾不敢卧步之速也而不過二里止也步之遲也而百舍不止也次曰貴當載荆有善相者謂非能相人也能觀人之友也齊人有好獵者不得獸則狗惡也欲得良馬則家貧無以於是還疾耕疾耕則家富家富則有以求良狗狗良則數得獸矣似順論事多似倒而順如尹鐸為晉陽簡子曰往夷而壘鐸往增之卒以免難之賞賞尹鐸次曰别類草有萃有藟獨食之則殺人合而食之則益壽髙陽應將為室匠對曰未可也木尚生加塗其上必將橈以生為室今雖善後必敗髙陽應曰緣子之言則室不敗也木益枯則徑塗益乾則輕以益徑任益輕則不敗匠人無辭以對而為之室之始成也善其後果敗驥驁緑耳背日而西走至乎夕則日在其前矣次曰有度言賢主有度而聽故不過次曰分職夫馬者伯樂相之造父御之賢主乘之一日千里無御相之勞而有其功則知所乘矣次曰處方章子為齊將攻荆六月而不戰齊使周最趣之章子對曰殺之免之殘其家王能得此於臣不可以戰而戰可以戰而不戰王不能得此於臣次曰慎小巨防容蟻而漂邑殺人突泄一熛而焚宫燒積人之情不蹙於山而蹙於垤士容論謂士之柔而堅虛而實者其狀㫰然不儇次曰務大燕爵爭善處於一屋之下突決棟焚而不知變為人臣而免於燕爵之智者寡矣次曰士農男女貿功以長生敬時愛日非老不休非疾不息次曰任地冬至後五旬七日菖始生菖者百草之先生者也於是始耕菖蒲水草也冬至後五十七日始生則土發故耕次曰辨土謂地竊苖相竊草竊為三盜去三盜而後粟可多次曰審時謂禾麻菽麥各欲得時此篇載唐尚敵年為史敵年者年相若之名也肥者欲棘注棘羸瘠也詩云棘人欒欒六盡耜所以成畝其博八寸所以成甽注耜六尺其刃廣八寸古者以耜耕廣六尺為畝三尺為甽愚意耜者今之犂廣六尺旋轉以耕土其塊彼此相向亦廣六尺而成一疄此之為步而百步為畝總畝之四圍總名其博八寸所以成甽者犂頭之刃逐塊隨刃而起其長竟畝云起而空之處與刃同其闊此之謂甽注以三尺為甽恐於正文不合又云耨柄尺其耨六寸注耘器也愚按今浙西耘尚用苖間之器黃石公素書素書六篇曰原始曰正道曰求人之志曰本德宗道曰遵義曰安禮其說以道德仁義禮五者為一體雖於指要無所取而其間言語雜出多生於卑謙損節背理者寡特非圯上老人授子房手亂世之書耳張商英乃妄為訓釋取老子失道而後德失德而後仁失仁而後義失義而後禮之說以言之與本書五者一體之說正相反甚至為之後序謂晋亂有盜發子房塜於玉枕中獲此書何其鄙歟幸此言出於商英識者固所不屑觀爾陸賈新語新語十二篇漢太中大夫陸賈所撰一曰道基言天地既位而列聖制作之功次曰術事言帝王之功當思之於身舜棄黃金禹捐珠玉道取其至要三曰輔政言用賢四曰無為言舜周五曰辨惑言不茍合六曰慎微言謹內行七曰資質言質美者在遇合八曰至德言善治者不尚刑九曰懷慮言立功當專一十曰本行言立行本仁義十一曰明試言君臣當謹言行十二曰思務言聞見當務執守此其大略也往往多合於理而又黜神仙之妄言墨子之非則亦有識之言矣然其文煩細不類陸賈豪傑士所言賈本以詩書革漢髙帝馬上之習每陳前代行事帝輒稱善恐不如此書組織以為文又第五篇云今上無明正聖主下無貞正諸侯鉏奸臣賊子之黨考其上文雖為魯定公而發豈所宜言於大漢方隆之日乎若賈本㫖謂天下可以馬上得不可以馬上治之意十二篇咸無焉則此書似非陸賈之本真也賈誼新書過秦上論秦興亡始末而歸之仁義不施攻守之勢異論正而語卓過秦下謂天下向秦冀得安其性命使秦並殷周之迹以制御其政猶未傾危使二世有庸主之行而任忠賢即海內歡然各自安其處使子嬰有庸行之材而僅得中佐山東雖亂三秦之地可全愚謂秦以威并天下非天下向風子嬰之世大勢已去三秦無可全之理惟二世能反秦政天下或可未亂然千百年戰爭勢至此極秦亦不容不亡秦之事非可以古帝王常道論也宗首係治安䇿今或親弟謀為東帝一假文有略增處數寧係治安䇿竊惟事勢可為痛哭流涕太息至射獵之娛一假而其文有增又痛哭作痛惜藩傷係治安䇿分建一假而文不同藩彊係治安䇿彊者最先反一假大都係治安䇿尾大不掉一假而先引楚靈王大城陳蔡葉與不羮四邑後遂作亂之事為證終之曰可痛哭者此病是也等齊言漢天子與諸侯無别天子列卿秩二千石諸侯列卿秩二千石則臣已同天子之御號太僕銀印秩二千石諸侯之御號太僕銀印二千石則御已齊天子親云太后諸侯親云太后天子妃曰后諸侯妃曰后宫門皆曰司馬䦨入者皆為城旦殿門俱為殿門䦨入之罪俱棄市曰今曰陛下曰乘輿皆同可謂長太息者此也服疑言天子之於其下也加五等已往則為臣例臣之於下也加五等以往則為僕僕亦臣禮也然稱僕而不敢稱臣者尊天子避嫌疑也是以髙下異則名號異則權力異則事勢異則旗章異則符瑞異則禮寵異則秩祿異則冠履異則衣帶異則環珮異則車馬異則妻妾異則澤厚異則宫室異則牀席異則器皿異則食飲異則祭祀異則死喪異益壤請割淮陽北邉二三列城與東郡以益梁梁足以捍齊趙淮陽足以禁吳楚則陛下無山東之憂權重諸侯勢足以專制力足以行逆雖令冠處女勿謂無敢勢不足以専制力不足以行逆雖生夏育有仇讎之怨猶之無傷也五美係治安䇿分王子弟使天下咸知陛下之明之亷之仁之義而誦聖一假制不定係治安策髖髀之喻一假先引黃帝誅同父母親弟炎帝以定天下為證審微引孔子謂不如多豫邑及宓子寧使齊冦得麥母使不耕者得穫為證階級係治安䇿體貌大臣一假俗激係治安䇿定經制一段時變係治安䇿家貧子壯出贅一假文稍增瑰瑋謂瑰政豫民而民愈貧瑋術奪民而民益富蓋以抑末趨本為說孽産子係治安策牆屋被文繡一假而此尤詳結云可為長太息者此也銅布係議鑄錢禁之文亦結之曰可為長大息者此其一也一通謂建武開函谷臨晉關為備山東諸侯豈若定地勢屬逺謂逺徭之弊親疏危亂係治安䇿言諸侯王二假憂民係蓄積疏言三年耕餘一年食解懸係治安策天下之勢方倒懸一假結云可為流涕者此也胸奴謂胸奴不過漢一大縣建三表設五餌以此與單于爭其民則下胸奴猶振槁也一表諭陛下之愛一表諭陛下之好一表愛人之狀好人之技此謂三表錦繡車騎以壞其目一餌飲食醯醢以壞其口一餌婦人樂舞以壞其耳一餌堂宇囷蓄以壞其腹一餌佐酒戲弄以壞其心一餌凡以施之降者以誘其衆來下此謂五餌三表已諭五餌既明南鄉歸漢猶水流下單于無臣之使無民之守逺期五嵗近期三年胸奴亡矣勢卑嵗致金繒是入貢職於蠻夷也勢既卑辱禍且不息以臣為屬國行臣之計休屠繫頸以草膝行頓顙請歸陛下之義臣歸田廬不復汙末庭忠臣之志快矣淮難恐接王淮南王子以白公勝報父仇為戒無蓄係積貯疏亦終之曰可為流涕者又是也鑄錢欲使天下公得顧租鑄錢傅職保傅皆言教太子而保傅之文則治安䇿之文也連證說主從諫以紂死左右弗助為戒以陶朱公決梁疑獄上璧異價厚者價貴為勸輔佐有上執政中執政下執政之分禮首載周文王使太公望傅太子發嗜鮑魚而公弗與曰禮鮑魚不登於爼又曲禮道德仁義非禮不成至恭敬撙節退讓以明禮一章在焉又訓釋詩一發五豝于嗟乎騶虞騶者天子之囿也虞者囿之司獸者也天子佐輿十乘以明貴也二牲而食以優飽也虞人翼五豝以待一發所以復中也人臣於是所尊敬不敢以節待敬之至也甚尊其主敬慎其所掌職而志厚盡矣故其嘆之也長曰于嗟乎古之善為臣者亦若此而已容經志有四興容有四志言有四術朝廷祭祀軍旅喪紀四者也端股整足體不搖肘曰經立因以聲曰共立因以罄折曰肅立因以垂佩曰早立言立容胻不差而足不跌視平衡曰經坐微俯視尊者之膝曰共坐仰首視不坐尋常之內曰肅坐廢首低肘曰早坐言坐容行以微磬之容臂不搖掉肩不下上身似不則從之而任言行容趨以微磬之容飄然翼然肩狀若不足如射箭言趨容旋以微磬之容其始動也穆如驚倐其固復也旄如濯絲跘旋之容跘蒲官切跪以微磬之容揄右而下進左而起手有抑揚各尊其紀言跪容拜以磬折之容吉事尚左凶事尚右隨前以舉項衡以下寧逺無遲背項之狀如屋之𤣥言拜容拜而未起言伏容佩玉上有雙珩下有雙璜衝耳捍珠以細其間琚瑀以悴之蓋圜以象天二十八撩以象列星軫方以象地三十輻以象月春秋楚惠王食寒菹得蛭而吞之鄒穆公食鳬鴈必以粃寧二石粟以易一石粃晉文公見大蛇橫道不忍攻之三日夢天誅蛇視之蛇魚爛矣胡亥為公子饗群臣視其履狀善者因行殘敗及即位皆知天下之棄也先醒懷王問賈君曰人謂知道者先生何也對曰為先醒也世主未學忳忳然猶醉也學問不倦昭然先寤故曰先醒故世主有先醒者有後醒者有不醒者耳痺載子胥吳越事諭誡文王晝卧夢人登城而呼已曰我東北陬之槁骨也速以王禮葬我文王曰諾召吏視之信有之文王曰速以人君禮葬之吏曰此無主矣請以五大夫文王曰吾夢中已許之矣奈何其倍民也士民聞之曰我君不以夢之故不背槁骨况生人乎退讓梁大夫宋就為邊縣令與楚鄰界梁楚之邊亭皆種瓜梁數灌瓜美楚希灌瓜惡亭惡梁亭之賢已夜竊梁亭之瓜有死焦者梁亭請其尉亦欲竊往敖搔楚亭之瓜宋就教令人往為楚亭夜善灌瓜楚亭旦而往瓜已灌矣瓜日以美察之乃梁亭也楚王聞之乃謝重幣以交於梁梁楚之歡由宋就始勸學以南榮千里重繭以問老聃為證道術謂其本謂之虛其末謂之術六術謂道德性神明命六者德之理也他事亦皆以六為度六親始于父父有二父之昆弟以至從父兄弟從祖兄弟曽祖兄弟曽祖兄弟又有子為族兄弟凡六故六為制而止矣愚按此說則六親者諸父也諸父兄弟也從父兄弟也從祖兄弟也曽祖兄弟也族兄弟也大政修政叙黃帝至成王之言皆諸子之說禮容語載魯晉禮容之事多左傳所載者胎教言教子立後義言立子右賈誼新書十卷淳熙辛丑嵗湖南漕使程公以家藏本刋于長沙所論漢事皆於治安䇿及論積貯諫禁鑄錢者殆平日雜著所見而他日總之以告君歟三表五餌之說詳見此書謂可坐威胸奴至今疑其大言然不過欲誘致降者使其衆漸空非謂必以兵勝以誼竒才得為典屬國以試之胸奴雖無可滅之理勢須漸弱未可以大言而少之若其分王諸侯施行漢事後多卒如其說真洞識天下之勢者也然要其本說以道為虛以術為用則無得於孔子之學蓋不過以智略之資戰國之習欲措置漢天下爾文王葬槁骨之言世多以為鑿靈沼得之此以為夢意古有此說而傳者不同未必有其實若于事情則此事為近之新序新序十卷漢劉向之所集本朝曽鞏之所校者也周秦至漢君臣言行茍足為世教者類在焉其前五卷皆曰雜事警戒居多惟江乙謂昭奚恤為狐假虎威此乃小臣離間之言恐不當録使昭奚恤非其人而楚用之併楚君亦且與之俱輕矣北方豈其以君之故而畏之哉樂毅挾四國之兵屠齊七十餘城掠重器貨寶而去之此盜也縱惠王不信讒而易將毅亦必無以勝二城必死之守世乃以毅與管仲同稱何哉次六曰刺奢自桀紂以來戒之詳矣惟孟獻子誇得顔回兹無虛二生為富則未必然蓋顔子未嘗仕於大夫之家也次七次八曰節士曹子臧致國於殺奪之成公亦異於太伯伯夷之讓矣季札乃慕而效之寧滅其宗國若魯公子肸不義宣公之殺奪而終身不食其食此為能審所處爾晉太子避蛇祥而伏劒石奢以不私其父而刎頸李離多殺不辜而自戕介之推怨懟而就焚申徒狄嫉世而沉河果其輕生如此此皆死非其所不可言節齊太史死於職此真足言守節之士屈平不忍宗國之將亡而自殞其志為可悲而餓者不食嗟來之食袁族自欲嘔出其盜之食書之亦可厲天下後世之無耻者矣程嬰既立趙後自殺以下報杵臼劉向以為過然使果有此事而事定嬰不死是紿杵臼使之先死也於義亦合有所處次八曰義勇晏子獨免崔杼之盟王子閭不受白公之立最為得義如𢎞演輩死非其所當死矣次九次十曰善謀戰國謀臣皆茍焉一時耳至漢張良始多善謀然封信越以分地所能助帝滅楚者此謀而殺信越者亦此謀召四皓以輔太子所能護惠帝者此謀而殺戚夫人者亦此謀以偶語沙上者為謀反所能封雍齒安一時者此謀而啓帝疑心叛者九起致帝卒斃於行者亦此謀大抵機動於此功成於彼成其一必不能保其二未嘗明白一言以義理而折𠂻之俾相安無後患焉殆亦權謀耳亦未得為盡善也偏袒一卷趙臣推車隴種隴種而退第三卷二子乘舟詩黍離以為壽閔其兄而作皆第七卷說苑說苑者劉向之所校讎去其復重與凡己見新序者而定為二十卷名說苑然自今觀之其間煩重與新序混淆者尚亦多有且亦多傅㑹如唐虞三代孔門問答其詞㫖議論殊非聖賢氣象楚莊王賢君而謂其築臺殺諫者七十二人秦皇嚴誹謗之誅而反謂其能受茅焦鮑白令與侯生三人之極諫凡欲言其臣之節必先甚其君之惡形容文致殆非人情曽晳大賢謂其因耘瓜而擊其子幾死子路髙弟謂其欲釋古學揆之事理皆未必然又桑榖之祥既以為太戊又以為武丁於書則武丁乃鼎雉之事耳龍蛇之章既以為介之推又以為舟之僑於傳則僑乃戮於城濮之役耳鴻鵠六翮之喻新序以為因桑告晉平公說苑以為古乘告趙簡子不屑扶君之事新序以為虎㑹事趙簡子說苑以為隋㑹事晉文侯君不能致士之說新序以為大夫對衛相說苑以為田饒對齊相宗衛解衣就鼎以諫佛肸之說新序以為田單說苑以為田基是二書定於一人而自為異同若嚴則音聾之訟一以為公叔文子告楚說苑以為晏子告齊是一書重出而亦自異同劉向自以為去其復重而尚若是何哉方南豐編集時官書僅有五卷後於士大夫間得十五卷以足之則後世之殘斷錯誤非必皆劉向本文耳然其指歸皆出於勸善懲惡冀扶世教雖不盡純而最多精語過於諸子之雜書橫議逺矣君子亦不可以不觀也而南豐乃譏其徇物者多自為者少一枝梅越使送梁王子半棄酒管仲十卷免相謂舊相也見十一卷蟨與蛩蛩巨虛二者相假相愛龍化為魚被射天帝不罪射者九卷梟不更鳴東徙亦惡子之聲十五卷御呼驂亦呼同憂也十一卷承明承明堂之後率禮不越今詩禮作履太公望老婦之棄夫八卷長年尊上之稱第四卷孔子譽趙襄子管仲哭鮑叔此二事嵗月先後皆合考三歸之臺管仲以避得民而作祠田之祝禮少求多淳于髠云春秋繁露楚莊王楚莊王殺陳夏徴舒不豫專討也靈王殺齊慶封而直稱楚子何也曰齊桓不豫專地而封晉文不豫致王而朝楚莊弗豫専殺而討此楚靈所以稱子而討也愚謂諸侯專殺直書而罪自見子者楚之爵非稱子以討其罪也凡例之陋說耳此篇又載春秋分十二世為三等哀定昭三世君子之所見也襄成宣文四世君子之所聞也僖閔莊桓隱五世君子之所傳聞又援詩率由仇匹今詩作羣匹竹林謂邲之戰楚莊舍鄭美矣而晉欲擊之故晉變為夷狄楚變為君子謂司馬子反為其君使廢君命與宋平是內專政而外擅名謂鞍之戰齊頃公被獲自是恐懼不聼聲樂不食酒肉內愛百姓外敬諸侯終其身安寧是福生於憂謂鄭伐許伐喪叛盟故夷狄之玉杯謂譏文公以喪娶公乃四十一月方娶納幣之月在喪之分也謂趙盾殺君四年而後别牘復見在不討賊而已猶子不嘗藥加之弒父玉英謂為善不法不可取亦不可棄如公子目夷之類精華謂小夷言伐而不得言戰大夷言戰而不得言獲中國言獲而不得言執謂大旱者陽滅隂也拜請之而已大水者隂滅陽也故鳴鼓攻之謂齊桓五年不能致一諸侯柯之盟見大信一年而近國之君畢至鄄幽之㑹是也後二十年尚未能大合諸侯救衛邢見存亡繼絶之義明年而逺國之君畢至貫澤陽榖之㑹是也其後矜功而不修德楚人滅弦而不憂江黃伐陳而不救不救陳而責陳不離不安鄭而必之以兵自是日衰九國叛矣謂晉僖以亂即位親任季子而二十年安寧王道歷言五帝三王之治桀紂之暴以及周衰而舉春秋災異為言又歷舉春秋君臣行事而總以觀乎二字條舉而斷之凡連用二十三觀乎字此篇粗有文法滅國言春秋失國之君三十一亡國之君五十二主天地之間根本微者不可遭大風疾雨服制象劒在左青龍之象刀在右白虎之象軷在前赤鳥之象冠在首後𤣥武之象考功名聖人之為天下興利也其猶春氣之生草也各因其生之小大其為天下除害也若川瀆瀉之於海也各隨其勢之傾側官制象天天之大經三起而成三日而成規三旬而成月三月而成時三時而成功寒暑與和三而成物日月與星三而成光天地與人三而成德人之身有四肢每肢有三節十二節相持而形體立矣天有四時每時有三月十二月相受而嵗數終矣官有四選每選有三人十二臣相參而事治行矣四選者公卿大夫士調均凡衣裳為蓋形暖身也然而染五采飾文章者非以為有益於飬肌膚血氣也將以貴貴尊賢而明别上下之倫為治也爵國謂天子千里公侯百伯七十子男五十附庸字者三十名者二十氏者十五里萬人曰英千人曰俊百人曰傑十人曰豪仁義法以仁安人以義正我仁之為言人也義之為言我也我無之而求諸人我有之而非之人人所不能受也目弗視不見心弗慮不得雖有天下之至味弗嚼弗知其㫖也雖有聖人之至道弗論弗知其義也身之飬莫重於義體莫貴於心飬莫重於義有義者雖貧能自樂無義者雖富其能自存忘義而狥利以賤其身而禍其家此非其自為計不忠也知之不能明也今握棗與錯金示嬰兒嬰兒必取棗而不取金也握一斤金與千萬之珠以示野人野人必取金而不取珠也故物之於人小者易知也其於大者難知也今利之於人小而義之於人大無怪民之皆趨利而不趨義也固其所暗也對膠西王越大夫不得為仁正其誼不謀其利明其道不計其功詐其人而勝之雖有功君子弗為實性謂性已善不幾於無教性有善姿惟待漸於教訓而後能為善聖人言善人吾不得見使民性皆善何為不見也深察名號隂之行不得于春夏而月之常厭於日光乍傷乍全天之禁隂如此五行地出雲為雨氣為風地不敢有其功一歸于天為人者天云天亦人之曽祖父也五行為木五行之始水五行之終以相生而言陽尊隂卑謂天之大數畢於十旬陽氣以正月始出於地至其功必成也積於十月人亦十月而生王道通三謂古之造文者三畫而連其中謂之王三畫者天地人而連其中者通其道天容謂聖人祖天而行天辨在人謂隂陽之㑹遇於南方以中夏遇於北方以中冬者金木水火各奉所主以從隂陽相與一力而并功故少陽因木而起助春之生也太陽因火而起助夏之養也少隂因金而起助秋之成也太隂因水而起助冬之藏也隂陽位陽以南方為位北方為休隂以北方為位南方為休隂陽終始北方者天之所終始也隂陽義陽者天之德隂者天之刑隂陽出入上下春出陽而入隂秋出隂而入陽夏右陽而左隂冬右隂而左陽天道無二一而不二者天之行也暖燠天之道出陽為暖以生之出隂為清以成之基義謂凡物必有合四時之副謂暖暑清寒異氣而同功人副天數謂天德施地德生人德義同類相勤平地注水去燥就濕均薪施火去濕就燥五行相勝五行相生五行逆順水治五行並言隨時施政治亂五行言相干則災五行變救云木氷春多雨之類皆以人事救之五行五事言證應郊語言事天子之義有缺文郊義言王者嵗一祭天必於正月上辛郊祭言喪不廢郊祭四祭四時祭先祖父母此篇云已受命而王必先祭天乃行王事文王之伐崇是也詩曰濟濟辟王左右奉璋此文王之郊也周王于邁六師及之此文王之伐崇也郊祀言文王受命伐崇又證以文王受命有此武功順命言天子之義畏天之說郊事對載漢遣廷尉湯問仲舒郊事問答執贄謂鴈有行列之治羔有角而不任類仁殺之不諦類死義者跪乳類知禮者羊之言猶祥王有似乎君子山川頌山則巃嵸􅐑嵬㠑巍久不崩㢮似仁人志士水則源泉混混沄沄晝夜不竭或養萬里而必至求雨四時各以其日與其方隨其色為土龍闔南門置水其外而開北門又止雨反北祭義五榖天所以賜人受賜而薦之宗廟循天之道天有兩和謂中春中秋天地之行言服食當順時威德所生春者天之和夏者天之德秋者天之平冬者天之威為政不可不察如天之為隂陽之氣在上天亦在人在天者未嘗滯鬱在人亦冝行而無留若四時之條條者也天地隂陽謂天地隂陽木火土金水與人而十人超然萬物之上最為天下貴天道施聖人見端而知本得一而應萬董仲舒傳說春秋事得失聞舉玉杯繁露清明竹林之屬數十篇十餘萬言顔師古注皆其所著書名本朝崇文總目繁露七十卷八十二篇與隋唐志卷目同目謂其義引宏博非出近世然總以繁露為名又即用玉杯竹林題篇已疑後人附著矣及中興館閣書目止存十卷三十七篇新安程大昌讀太平寰宇記及杜佑通典見所引繁露語言今書皆無之因知今書之非本真又讀太平御覽古繁露語特多御覽太平興國間編葺此時繁露尚存今遂逸不傳合此三說觀之是隋唐國初繁露已未必皆董仲舒之舊中興後繁露又非隋唐國初之繁露矣近世胡尚書矩為萍鄉宰日刋之縣齊僅此三十七篇而已其後得攻愧樓參政校定本十七卷八十二篇之舊復全其兄胡槻既刋之江東漕司其後嶽尚書珂復刋之嘉禾郡齊世遂以為定本攻愧謂為仲舒所著無疑而取楚莊篇第一謂為潘氏本有之至於調均一篇萍鄉本列置第二十五及攻愧再定本乃不及此篇則不知何說也又程氏謂通典載劒在左青龍象刀在右白虎象軷在前朱雀象冠在首𤣥武象謂此數語今書所無而今書服制象篇此語實具存程氏以為無之不知又何也愚按今書惟對膠西王越大夫之問辭約義精而具在本傳餘多煩猥甚至於理不馴者有之如云宋襄公由其道而敗春秋責之襄公豈由其道者耶如云周無道而秦伐之以與殷周之伐並言秦果伐無道者耶如云志如死灰以不問問以不對對恐非儒者之言如以王正月之王為文王恐春秋無此意如謂黃帝之先諡四帝之後恐隆古未有諡如謂舜主天法商禹主地法夏湯主天法質文王主地法文於理皆未見其有當如謂楚莊王以天不見災而禱之于山川不見災而懼可矣禱于山川以求天災豈人情乎若其謂性有善姿而未能為善惟待教訓而後能為善謂性已善幾於無教孔子言善人吾不得而見之而孟子言人性皆善過矣是又未明乎本然之性也漢世之儒惟仲舒仁義三䇿炳炳萬世曽謂仲舒之繁露而有是乎歐陽公讀繁露不言其非真而譏其不能髙其論以明聖人之道且有惜哉惜哉之歎夫仲舒純儒歐公文人此又學者所宜審也黃氏日抄卷五十六
