body:
  text: 黃氏日抄卷三十七宋黃震撰讀本朝諸儒理學書五晦庵語類一語類李心傳初稡三十三家為語録刻本池州史公說得黃士毅語類增多池本三十八家刻之蜀蜀兵火史之弟敏叔護其本置鄂州洪平齊首得之其子勳倅徽乃刻之紫陽書院竹坡吕午序云太極太極是天地萬物之理有理便有氣流行發育及氣之聚理亦在焉理未嘗離乎氣太極解先動而後靜是就起處言之天地天地未分時想只有水火水之極成地火之極成風電日星天周匝無空缺晝夜輥轉地𣙜在中間氣都從地中迸出日入地下東升西沒通監說有人適外國夜熟一羊脾而天明此地角尖處所經遮蔽處不多故常光明極星天形如雞子旋轉極如一物橫亘其中兩頭抨定一頭在北上為北極出地三十六度一頭在南下為南極入地三十六度圓徑七十二度極正居其中北辰無星取北極五星之旁一小星謂之極星辰非星是星間界分也四面旋轉此獨為樞紐以星神位言之謂之太一五峯說極星有三箇若三箇不動則不可轉矣日月天氣上動只中間空為日月往來月常圓如毬只一面受日光初二三日只照得那一邉過幾日漸漸移得正到十五日月與日正相望到得月中天時日光在地下迸從四邉出與月相照今月中有影是地形未可知望以後相去漸逺其受光面不正至晦則復合故暗至朔又遇月常在日下日為月掩則食然聖人不言月食日而以有食為文者缺所不見厯家則謂日以望時遙奪月光故月蝕又謂之暗虛蓋火日外影其中實暗望時恰當其暗處故月蝕黃赤道天如圓匣赤道是匣縫處在天之中黃道一半在赤道之內一半在赤道之外東西兩處與赤道相交度是將天橫分為許多度數㑹時是日月在黃赤道十字路相交處撞著望時是日月正相向如一在子一在午而皆同一度却南北相向上弦下弦時日月相看皆四分天之一地天地四游升降不過三萬里土圭之影尺五寸折萬五千里以其在地之中故南北東西相去各三萬里此主黃道相去逺近而言天之髙則未可知也土圭以玉為之量表影底天地中與古不同周公定豫州為天地之中漢時陽城是中本朝嶽臺是中想天運有差地隨天轉而差天運之差如古今昏旦中星不同是也霜露雪霜是露結雪是雨結髙山無霜露者上面風漸清氣漸緊吹散不結雪是雨遇寒而凝故髙寒處先結雪花必六出者霰被風拍開六者隂數太隂𤣥精石亦六稜雪為豐年之兆者凝結得陽氣在地來年發逹生長萬物風雷風隨陽氣生近東之地多風風與天相似不住旋轉雷如爆仗鬱積極而迸發雷只是氣有氣便有形如蝃蝀只是薄雨日照成影尚有形能吸水吸酒山山西北最高自關中一支生下函谷至嵩少東盡泰山此是一支又自嶓冢生下一支至揚州而盡江南則自岷山分一支為湖南又一支為建康又一支為兩浙而餘氣為福建二廣水地之下與地之四邉皆海水周流至海無底處地形方盡月如子午則潮長謂月在地子午之方初一邜十五酉鬼神鬼神者造化之迹風雨霜露四時代謝物之生成非鬼神而何但人所常見不以為怪忽聞鬼嘯鬼火之屬則便以為怪不知此亦造化之迹但非正理耳那箇無形影未消理㑹且就日用處做工夫性理孔子曰性相近也兼氣質而言孟子指性之本而言却似論性不論氣有些不備得程氏說氣質來接便有首尾若荀揚則是論氣而不論性故不明退之說性只將仁義禮智來說便是識見髙處性情心意等名義在天為命稟於人為性既發為情主於身者為心志是心之所之意又是志之往來經營底力是㑹恁地去做底口鼻之呼吸是氣魂是氣之神耳目之聰明是精魄是精之神心是管攝主宰者此心之所以為大也論語不曽說心只說事實孟子說心後來遂有求心之病仁義禮智等名義道訓路說人所共由之路理各有條理如竹木之文理百行萬善總於五常又總於仁當來得於天者只是箇仁以生字說仁生自是上一節事以覺訓仁覺自是智之用無私是仁之前事與天地萬物為一體是仁之後事做一方便事也是仁不殺一蟲也是仁三月不違也是仁要識仁之意思是一箇渾然溫和之氣則天地陽春之氣其理則天地生物之心仁者仁之本體禮者仁之節文義者仁之斷制智者仁之分别仁為四端之首而智則能成終仁智交際之間乃萬化之機軸欲真見得仁須從克己復禮做工夫聖人都不說破在學者以身體之而已恕則仁之施愛則仁之用小學小學是教之以事如事君事父事兄處友等大學是發眀此事理總論為學聖人教人只說孝弟忠信日用常行如心性等字到子思孟子方說得詳學者須是立志如論語說學而時習之且自看是曽去學不曽去學曽去習不曽去習學是學箇甚麼習是習箇甚麼曽有說意思是無說意思人多言為事所奪此不能使船嫌溪曲者也遇富貴就富貴上做工夫遇貧賤就貧賤上做工夫今人不肯做工夫如退産相似甘伏批退人須是剛方做得事斷以不疑鬼神避之按此類說田單减竈乃孫臏事誤也合改論知行聖賢說知便說行知行常相須如目無足不行足無目不見論先後知為先論輕重行為重知有此病必去此病覺言語多便簡默意思踈闊便加細密輕浮淺易便須深沉重厚如孟子之求放心已說緩了心不待求警省便見孔子曰我欲仁斯仁至矣為仁由已而由人乎哉其快如此按此類有辨田子方不明樂者一假竊意先生天姿髙無所不知故云耳田子方自是告君之正論讀書法何必讀書然後為學子曰是故惡夫佞者古人亦復讀書始得書也只是熟讀雖孔子教人只是學而時習之聖賢說話各有指歸如揚子於仁也柔於義也剛到易中又將剛來配仁柔來配義如論語學不厭智也教不倦仁也到中庸又謂成巳仁也成物智也此等各隨本文意自不相礙持守此心本自光明廣大只提省便了不要苦著力今說求放心說來說去却似釋老說入定一般莊子亦云用力不分乃凝於神他都無義理只是箇空寂按此類别有降伏字亦涉異端當以此說為正又此假說察字最輕習字最重恐孟子說習矣不察本意又不如此蓋各一義也力行先就氣禀偏處克治大學主於一身者謂之心有得於天而光明正大者謂之明德明德未嘗息時時發見於日用之間當因其所發而推廣之一念竦然自覺其非便是明之之端物莫不有理人莫不有知不說窮理却言格物理無捉摸言物則理自在如讀書而求其義處事而求其當接物存心察其是非邪正皆是也理有正有權如娶妻必告父母不告自是不是如君匡救其惡是正理伊川說納約自牖又自一等如孔子說危行言孫春秋時如此今見聖人有此語便守定不移人所以能視聼言動非天而何陸子靜從初亦學佛佛說萬理俱空吾儒說萬理俱實今學佛者云識心見性不知識是何心見是何性謝氏常惺惺之說佛氏亦有此語論語孔子教人只言居處恭執事敬與人忠含蓄意思在使人自求之孟子便指出了性善早不似聖人了近日學者好髙讀論語未問學而時習便說一貫孟子道理須是剛硬方能有成孔子晚年得曽子曽子得子思子思得孟子其工夫只在自反常直仰不愧天俯不怍人中庸中庸說下學處少說上逹處多初學者未當理㑹易易本卜筮之書聖人因之以明教想當初伏羲畫卦之時只是陽為吉隂為凶如今環珓相似使人趨利避害以成天下之務未有文字可傳至文王周公方作彖爻之辭使人得此爻者觀此辭之吉凶至孔子又恐人不知其所以然又逐爻解之謂此爻所以吉者以中正也所以凶者不當位也明明言之使人易曉至如文言之類是就發明道理非作易專為說道理以教人也今學者諱言易為卜筮作須要說為義理作殊不知其吉凶悔吝皆有理而其教人之意無不在也聖人不曽教學者看易如先王順詩書禮樂以造士不及於易孔子教人只說詩書執禮不教人去讀易但有一處說五十以學易可以無大過是孔子自說卜五即龜也雨即水霽即火蒙即土驛即木克即金占用二即蓍也曰貞曰悔即內外卦卜法今無傳人有五兆卦將五莖茅自竹筒寫出直向上為木橫為土向下為水斜向外為火斜向內為金如文帝大橫庚庚是得土之象庚庚是庚庚然豹起左傳載卜筮有能知數世後事只子孫欲僣竊為此欺上罔下爾京房卦氣用六日七分太𤣥紀日而不紀月天地間只有隂陽二者太𤣥有天元地元人元以三數乘之算不著潛虛只是吉凶臧否平王相休囚死尚書書有兩體伏生書多艱澀難曉今文孔安國壁中書却平易易曉古文東晋方出先將文義分曉者讀之堯之所以為君舜之所以為臣臯陶稷契伊傅輩所言所行綢繆玩味體貼向自家身上來其味自别毛詩國風是民庶所作雅是朝廷之詩頌是宗廟之詩王風是他風如此不必說是雅之降為風二南亦是採民言而被樂章爾六義風雅頌乃樂章之腔調至比興賦又别如直指其名直叙其事者賦也本要言其事而虛用兩句釣起因而接續去者興也以物為况者比也詩只熟讀涵泳自然和氣從胸中流出其妙處不可得而言今人不以詩說詩却以序解詩大率古人作詩與今人作詩一般亦自有感物道情吟咏情性幾時盡是譏刺他人只緣序者立例篇篇要作美刺將詩人意思盡穿鑿壞了鄭衛詩正是淫昏相戲之辭豈有刺人之惡而反自陷於流蕩子襟詞意輕儇亦豈刺學校之辭有女同車等作皆以剌忽考之於忽所謂淫昏暴惡皆無其實至目為狡童豈詩人愛君之義唐自是晋未改號晋時國名便牽合謂此晋也而謂之唐乃有堯之遺風行葦之序但見牛羊勿踐履便謂仁及草木但見戚戚兄弟便謂親睦九族見黃耉台背便謂養老見以祈黃耉便謂乞言見介爾景福便謂成其福祿甫田諸詩無詆譏之意皆以為傷今思古昊天有成命幾曽是郊祀天地被序者如此說後來遂生出一場事端有南北郊之事序出於漢儒古本自别作一處向見鄭漁仲有詩辨妄力詆詩序某作詩傳去小序自作一處盡滌舊說詩意方活孝經孝經只有前一假後云廣至德要道都是湊合演說汪端眀嘗疑此書是後人僞為如禮記有好處可附於孝經春秋春秋大㫖誅亂臣討賊子內中國外夷狄貴王賤伯而已聖人光明正大不應以一二字加褒貶於人當初只直寫那事是非使人自見如何却說聖人豫其爵削其爵賞其功罰其罪是甚說話荆楚初稱國後進稱人稱爵乃是初間不敢驟交故從卑稱後漸大吳楚盟㑹不書王恐是自稱王於國與諸侯盟㑹則未必稱衛侯燬滅邢說者以為滅同姓之故今經文只隔夏四月癸酉一句便書衛侯燬卒恐傳寫之誤亦未可知今只眼前朝報尚未知朝廷意如何况百千載下而欲逆推百千載上聖人之心知命格則知春秋之例矣春秋十二公時各不同如隱桓時王室新東遷號令不行天下都星散無主莊僖時伯政自諸侯出天下始有統一宣公時楚莊盛強夷狄主盟成公時晋悼公出楚始退去繼而吳楚又入爭伯定哀時正自大夫出終春秋之世更沒奈何春秋之末與初年大不同然無甚大殺戮及戰國爭雄便多胡殺三傳惟左氏近之是秦時文字分明曽見國史考事頗精只是不知大義好以成敗論人文章浮艷更無事實駒支之辨既曰言語衣服不與華同又能賦青蠅何也申生伐臯落氏諸公議論如此獻公更舉事不得季札觀樂是左氏粧㸃出齊一再傳而為田氏烏在其為未可量也公羊榖梁考事甚踈然義理却精吕居仁春秋甚明白劉原父春秋亦好沙隨只有說滕子來朝一處最好滕子以侯禮見則所供者多故自貶以子禮胡文定大義正有牽強處知得聖人意是如此否然議論有開合精神說元年不要年號若無號契劵能無欺弊乎薛常州解如何說諸侯無史內則尚有閭史東萊有左氏說亦好是人記録胡安定孫泰山石徂徠說雖有疏略推明治道直凛凛可畏聖人是要率天下諸侯尊齊晋自秦檜和戎諱言內外而春秋大義晦矣楚在春秋時非威文遏之則周室為其所并春秋劈頭一箇王正月便說不去六經無建子月惟禮記雜記有正月日至可以有事於上帝最是孟子七八月之間旱乃今五六月十一月徒杠成十二月輿梁成乃今之九十月見國語夏令若以為改月則與孟子春秋合而與詩書不相合詩一之日書元祀十有二月若以為不改月則與詩書相合而與孟子春秋不相合如秦元年以十月為首末又有正月又似不改月此假用詩語類併抄禮古禮難行且是要理㑹大本大原禮時為大亦且得隨時裁損爾孔子從先進恐已有此意河間始得禮五十八篇至唐尚在唐有開元顯慶二禮顯慶已亡本朝修開寶禮多本開元而加詳備政和修五禮又不如開元儀禮舊與六經並行王介甫始罷去祖宗有開寶通禮科禮官用此等人為之介甫一切罷去古人無受拜禮雖兄亦答拜君亦然但諸侯見君則兩拜還一拜朝禮每日拜跪乃秦法妾母只得稱母五峰稱妾母為少母南軒亦然姪字本非兄弟之子所當稱當稱從子為是自曽祖而下三代稱從子髙祖四世而上稱族子周禮先生曰不敢教人學而今且把來說看還有一句干涉吾人身上事否胡氏父子以為王莾令劉歆撰此恐不然恐是周公立下此法不曽行得盡陳君舉進制度說道井田是周禮王制孟子三處皆通他說千里不平直量四邉有突出圓算則是有千二百五十里方五百里是周圍五百里徑只百二十五里然職方氏本文方千里之地以封公則四侯則六伯則七子則二十五男則百已有定數此說如何可通鄉遂用貢法縱橫為溝洫川澮寓設險之意限車馬之衝則以五為數家出一人為兵以衛王畿役次必簡如周禮挽匶則用之都鄙用助法八家同溝共井以四為數四井為邑四邑為丘四丘為甸五百一十二家共只出七十五人可謂甚少然有征行則發鄉遂是長連排去井田是方底如曰周制皆井者此欺人之說六軍只是六鄉之衆侯國三軍亦是三郊之衆蔡季通說車一乘不止士卒七十五人更有二十五人將重車在後黨正一命齒于鄉里再命齒于父族三命不齒古人貴貴長長並行而不相悖自别設一位如今之掛位然載師云宅不毛者有里布為其為亭臺也田不耕者出屋粟為其為池沼也凡民無職事者出夫家之征所養浮泛之人也此以待士大夫之有土者閭師又云凡民無職者出夫布此方是待庶民前重後輕古者教法樂尤親切蓋樂有節奏學他底急也不得慢也不得久之都換了他一副常情性祀樂無商音謂之殺聲鬼神畏小戴禮若欲觀禮須將禮記節出曲禮首三句是從源頭說來人身大節目只是箇容貌言語又以毋不敬為本如樂記謂天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉必是古本流傳得此箇文字大戴禮大戴禮冗雜其好處小戴採做禮記了武王盥槃銘似船銘想因水起意保傅篇冠昏喪采賈誼䇿為之亦有孝昭冠辭冠昏喪隨家豐儉簡則易從冠禮三加之辭易以今俗語易曉乃佳昏禮事屬兩家恐難行亦須第二日見姑舅第三日廟見乃安喪禮墨衰能不出則不服之亦好有出入治事只得服墓壙切不可太大墎內實以和沙石灰墎外四圍上下實以炭末厚七八寸雜儀今之朝服乃戎服隋煬帝數游幸令百官以戎服從皂鞋乃上馬鞋唐人謂之便服然嘗見唐人畫十八學士裹幞頭公服極窄畫裴晉公諸人則稍闊及畫晚唐王鐸輩則又闊唐人有官者公服幞頭不離身以為常服朝服猶著禮服唐人幞頭初止以紗為之後以其軟作木山子襯起名軍容頭其說以為起於魚朝恩其先四角有腳兩腳繫向前兩腳繫向後後來遂橫兩腳以鐡線張之然惟人主得褁世所畫明皇者比今甚短後來藩鎮僣用想士大夫因此亦用本朝以藤織者易木山子近方易以紗宣和末京師士人行道間猶著衫帽渡江戎馬中變為白凉衫至後來軍興又變為紫古時隔品則拜今著令從事郎以下庭參不拜則以上者不庭參可知豈有京朝官復降階之禮今朝士見宰相只是客禮見監司郡守如何却降階漢初右丞相居左丞相之上史中有言無出其右是右為尊也後又却以左為尊老子曰有上將軍處右而偏將軍處左喪事尚右兵凶器也故以喪禮處之如此則吉事尚左矣漢初豈習於戰國與暴秦之所為乎伯玉之使孔子與之坐陶淵明籃輿用其子與門人子路之負米子貢之埋馬夫子之釣弋有若之三踊於魯大夫之庭而同三百人中當國士也冉有用矛却齊以入其軍而樊須雖少能用命也古人執干戈衛社稷躬耕稼與陶漁之事皆是也後世驕侈日甚反以臣子之職為耻太祖問范杲古者女子拜他舉古樂府長跪問故夫以為伏拜然只說長跪不曽說伏拜古人坐也是跪拜亦容易婦人首飾盛多自難俯伏地上周天元令命婦為男子拜史官書之表其異古者婦人拜不至地可知也祭釋奠有伯魚而無子思舊看古禮注春用二月上丁秋用八月下丁先生新書院成釋菜宣聖居中顔氏曽氏孔氏孟氏西向配北上並紙牌子無後祔食之位古人祭於東西廂某家只位於堂之兩邉正位三獻畢然後使人分獻一酌如學中從祀然上谷郡君謂伊川曰今日為我祀父母明日不復祠矣是亦祀其外家降神亦以僣禮大夫無灌獻樂劉歆為王莾造樂樂成而莾死荀朂造於晋即有五胡之亂和峴造於周世宗時世宗亦死太祖神聖令降一分其聲遂和黃鍾九寸最濁清聲則四寸半黃鍾君象非諸宫之所能役故虛其正而不用所用祗其再生之半者就再生之變又缺其半宫聲筵席不敢用用則賔主失歡樂忌臣民陵君故商聲不得過宫聲啞鍾不擊以避宫聲雅樂中絶隋文帝時鄭譯得之於蘇秪婆乃自西域傳來古聲只是和後來多以悲恨為佳溫公與范蜀公胡安定與阮逸李照爭辨其實都自理㑹不得不曽去看通典通典說得極分明古樂在唐猶有存者故他取而載之書唐末黃巢亂後遂失其傳蔡京主張喻世清作樂作中聲正聲如正聲九寸中聲只八寸七分只是杜撰至今用之孔孟周程孔子只說忠信篤敬孟子又䟎進一著如惻隱求放心之類至周子說太極大假分明指出矣若看得太極分明則盡見天下道理皆自此出若能得聖人之心則言語各别不害其為同如曽子說話比孔子自不同子思比曽子亦不同孟子比子思又不同然自孔子以後得孔子之心者惟曽子子思孟子而已如揚子雲法言倣論語王仲淹中說亦倣論語言愈似而去道愈逺直至程子方略明得四五十年為得聖人之心一傳之門人則已皆失其真矣聞伯夷栁下惠之風者頑廉薄敦皆有興起此孟子之善想像者也孔子元氣也顔子和風慶雲也孟子泰山岩岩之氣象也此程夫子之善想像者也今之想像大程夫子者當識其明粹中和處小程夫子者當識其初年嚴毅晚年又濟以寬平處豈徒想像而已必還以驗之吾身者如何將併與其風範氣象皆得之矣周子書太極圖無極而太極無中自有此理而字輕無次序故也動而生陽元未有物靜而生隂然後萬物各正性命則有漸次分隂分陽兩儀立焉方渾淪未判隂陽之氣混合幽暗及其既分中間放得寬闊光朗而兩儀始立邵康節以十二萬九千六百年為一元則是十二萬九千六百年之前又是一箇大闢闔小者大之影只晝夜便可見五峯謂一氣太息震蕩無垠海宇變動山勃川湮人物消盡舊迹大滅是謂洪荒之世常見有髙山有螺蚌殼或生石中此石即舊時之土螺蚌即水中之物下者變而為高柔者變而為剛此事思之至深有可驗者陽變隂合初生水火次生木金水火自生木金則資於土聖人立人極不說仁義禮智即說仁義中正者中正尤親切中是理之得宜處正是智之正當處通書太極圖得通書而始明拙賦天下拙刑政撤其言似莊老程書係依近思録次第張子之書橫渠謂天體物而不遺猶仁體事而無不在此數句是從赤心片片說出來如說心統性情說得的當如伊川謂鬼神者造化之迹却不如橫渠所謂二氣之良能良能之義是二氣之自然者耳云天左旋處其中者順之少遲則反右矣此說好清虛一大却是偏獨於西銘見得好大底即事親以明事天謂井田期以十數年不刑一人而可復且恁講若平世誠為難行邵子之書康節嘗於百原深山中闢書齊獨處王勝之常乘月訪之必見其燈下正襟危坐養得至靜之極能包括宇宙終始古今故明道謂其觀天地之運化然後頽乎其順浩乎其歸若曰渠能知未來事則去道逺矣其知康節者末矣康節之學其骨髓在皇極經世其花草是詩看他詩只說樂有自私自利意思所以明道有要之不可治天下之說皇極經世一元統一十二㑹十二㑹統三十運三十運統十二世一世統三十年一年統十二月一月統三十日是十二與三十迭為用是他見得一箇盛衰消長之理謂如今日戍時從此推上去至未有天地之始從此推下去至人物消盡之時程子門人吕與叔深潜縝密資質好又能涵養文字極是實上蔡高邁卓絶有過當處自禪門來龜山朴實簡易文字却弱先看莊老熟了游定夫學無人傳晚年嗜佛張思叔敏似和靖持守不及和靖和靖不觀他書只是持守得好郭仲晦西北人重厚淳固但見識不及侯師聖粗踈羅氏門人李願中謂常存此心勿為事物所勝終日危坐而神彩精明却不曽著書胡氏門人張敬夫見識極高却不耐事說性善者歎美之辭楊氏門人羅仲素嚴毅清苦蕭顗字子莊浦城人朴實廖剛字用中南劍人助和議幸不為檜鷹犬胡珵字德輝為李伯紀宣撫幕客能詩文墨𨽻胡文定為荆門教授龜山為代文定為湖北提舉上蔡為本路一邑文定從龜山求書見上蔡文定之學得於上蔡者為多其子五峯胡仁仲又從侯師聖作知言謂天理人欲同體異用如此却是性可為善可為惡作皇王大紀說北極如帝星紫微等皆不動說宫聲屬仁不知却屬信致堂說求仁多好處自論為學工夫初師屏山籍溪屏山見了老歸讀儒書以為與佛合作聖傳論籍溪學於文定又好佛老某年十五六時亦嘗留心於此二十四五始見李先生極言其不是只教看聖賢言語日復一日覺得聖賢言語漸漸有味回頭看釋氏之說漸漸破綻某當初講學也豈意到這裏某於大學用工甚多論語孟子中庸却不費力得力則未若論孟之多易與詩中所得似雞肋焉論自注書修身大略小學備矣義理精微近思録詳之某許多說話是太極中說已盡外任為同安簿賦稅出入之簿逐日㸃對簽押每㸃追必先期遍貼云本㕔於幾日㸃追甚鄉分稅限日近時納者紛然為南康舊有千人禁軍額到之日才有二百人嵗有租米四萬六千石以三萬九千石上供餘止七千石僅能贍三月之糧如斛面加量之屬又盡則預於民間借支壽皇行下招填終無錢糧只得挨過上供外七千石轉運使每嵗行下樁留某報去云纍政即無顆粒見在不若與之豁除若守此虛名而無實徒為吏輩賄賂之地不聽某不管公庫送遺立為定例人將書來須留喫湯當面拆書無他方令其去有躍馬者踏了小兒以屬知録云已拷治回至軍院則某人冠履儼然遂將吏并犯者訊次日吏杖脊勒罷為浙東倉有繼母接腳夫破蕩其家業其子來訴其情甚切遂委楊敬仲敬仲深以子告母不便某告之曰父死妻輒弃背與人私通而敗其家不與根治其父得不銜寃乎浙東旱有徐木者獻䇿逐鄉推排有米者不曽行若行之一縣甚易賑濟無竒䇿不如講水利為漳州禁民禮佛朝嶽教軍以戢盜分三畨每月輪畨入教挽弓及等有賞不及等留射及等而止終不及則罷之兩月間翕然都㑹射每聽詞狀集屬官列㕔上均分判去若易事便集衆較量斷去擬判為畫一樣子休日刷起一旬事都要了支官俸示期日防邀索之弊漳州舊與信處二州抱上供錢易衣絹何不令兩州以上供錢輸絹左藏只令漳州以錢散軍本州鬻鹽最為橫賦至即先罷瀕海十一鋪至鹽錢充塞見得與郡計無預前後官巧作支破欲盡罷而行迫無及矣知潭州州中僚屬易知只縣官無由得知每月版帳錢令縣官輪押來試以公事能否皆不得而隱內孝廟朝言置將之權旁落閹寺寧廟朝爭不當祧僖祖及實録院無統紀欲以事目分之葉正則不從及言山陵事雜記言行親戚托人求舉曰薦人於人亦須薦賢始得於墳墓所托之鄉人必加禮論治道今法極繁若欲盡除徒有煩擾要之因祖宗之法而精擇其人亦足以治如薦舉科場銓試廂禁屯戍軍亦只是就其法整理至於大家甘假借之取士吕氏家孰記云未立三舍前太學只是一大書㑹今士人所聚多處風俗便不好太學真箇無益於國家只均太學解額於諸路便無事今日上之人分明以盜賊遇士士亦分明以盜賊自處動不動便鼓噪作閙以相迫脅非盜賊而何只是嚴挾書傳義之禁不許繼燭自汰了一半只上之人主張分别善惡擢用正人使士子少知趨向人心自變亦有可觀須是罷了堂除及注授教官請本州鄉先生為之非四十以上不得任教官學法始於熙寧之李定成於崇觀之蔡京論兵宜散京師之兵却練諸郡之兵依太祖法更戍衛邉今日患在主兵之員多但當責之郡守練習論刑酒稅僞㑹飢荒竊盜之類以情原輕重民浙中全是白撰戒飭州縣不過虛文財今財賦分三項凡諸路之入總領者戶部不得預凡好名色易取者皆歸內藏庫封樁庫故戶部所得皆是枷棒箠楚得來愈見匱乏某人曽記得在朝文臣每月共支幾萬貫武臣每月共支幾萬貫武臣及內侍五六十萬貫宗室俸給一年多一年在法止為孤遺論官宰相擇長官長官擇其寮監司每路只置一人太守自治州事而刺史得舉刺一路樞密可罷訓門人上上古無閒民學者須是有業次間散是虛樂不是實樂佛氏要空此心道家要守此氣聖門無此法只是常要提撕令胸次湛然分明魂與魄交而成寐心在其間依舊能思慮所以成夢只日間做事亦形於夢訓門人二同周舜弼遊屏山曰園雖佳而人之志則荒矣處鄉黨宗族見其有礙理處只得無忿嫉之心訓門人三古人詠歌舞蹈動蕩血脉流通精神今既無之專靠義理須是豁開胸次令磊落明快日間看有甚事便做工夫著些精彩便聳拔淳問與㸃一假曰某平生便是不愛人說此話論語一部自學而時習之至堯曰都是做工夫處訓門人四近世儒者不將聖賢言語為切巳可行之事必於上面求新竒可喜之論比見浙間朋友或自謂能通左傳或自謂能通史記將孔子置在一壁仁義禮智這是源頭如拽轉亦快訓門人五深長意味涵泳自見熟後更讀方滋味出做得一事便是一事工夫時文中亦自有工夫自有天地便只是這物事在這裏流轉聖人定之以中正仁義便是主張這箇物事而今自家喫他著他受用他起居食息都在這裏離他不得人生與天地一般無些缺缺處書只貴讀自然心與氣合舒暢發越曉不得底自然曉得曉得者越有滋味荀子云誦數即今人讀書記遍數也讀書須立下硬寨誓以必曉徹為期訓門人六人役役於不可必之名利故本原固有者日加昏蔽士不幸遇亂世不必仕見理分曉自無雜慮順理而行雖動亦靜動靜如船之在水訓門人七有事時敬便在事上若自朝至暮客來不已不誠不接他人在世上無無事時節有事無事自家敬元未嘗斷訓門人八陸子靜正是不要許多王道夫乞朝廷以一監書賜象山此正恐其所忌伯恭却以語孟為虛教人看史君舉要理㑹經世之學某不是要人步步相循只要教人分别是非較明白朝以道在經筵不要講孟子由此遭論去國孔子直曽去以道家做先生因此與孟子不足論四端說得未是諸葛誠之常言說性善緩不如說惡底較好李泰伯也要罵孟子不知只管要與孟子做頭抵做甚你且揀箇小底來罵也得訓門人九浙間一般學問又是得江西之緒餘只教人合眼端坐要見一箇物事如日頭便謂之悟才說一悟字便不可窮詰不可研究不可與論是非一味說入虛談最為惑人夫子所以不大敢說心只說實事便自無病為學當如救火追亡猶恐不及如何說出去一日便不做得工夫正是出路上好做工夫便不記得細注字也須時時捉起經正文在心須是得這道理入心不忘而今這種子只在地面上不曽入那地裏去不曽與那土氣相接著黃氏日抄卷三十七
