body:
  text: 黄氏日抄卷五十九宋黄震撰讀文集一韓文古賦感二鳥賦豈真有羨於白鳥鸜鵒特因物託興使賤人貴物者知警爾復志賦退而守其志也歳行未復云者歳星十二年一周復公自述幼孤時未及十歳閔已賦自傷不得其志欲静以俟之别知賦傷知心之難得不忍楊儀之之去已也詩元和聖德詩典麗雄富前輩或謂揮刀紛紛争刌膾脯等語異於文王是致是附氣象愚謂亦各言其實但恐於頌德之名不類或云公之意欲使藩鎮知懼琴操大抵意味悠長拱挹不盡將古聖賢之作而述之耶抑述古聖賢之意而作之耶猗蘭操有云薺麥之茂薺麥之有君子之傷君子之守辭約義精尤當佩服盖能全其所自得者投之患難而不變志士仁人平居無異儔伍惟歴變而後可知薺麥處雪霜而茂者由薺麥之性自有陽和惟因君子之傷乃足見君子之守也拘幽之亂曰臣罪當誅兮天王聖明至哉言乎昔師席王宗諭教授於鄞縣學官余實從之㳺聞其講詩至衛莊姜慨然舉此章而言曰反己之切者惟見己之不然不見人之有不然衛莊姜惟知爲婦之當順而不見其夫之不義惟知爲母之當慈而不見其子之不孝此心也何心也充其類而廣之大舜所謂父母之不我愛於我何哉之心也文王所謂臣罪當誅兮天王聖明之心也凱風孝子謂母氏聖善我無令人亦此心也羅仲素謂天下無不是底父母卽所以指明此心也南山詩險語層出合看其布置處謝自然詩指其輕舉之事爲幽明雜亂人鬼相殘不知人生常理而棄其身卓哉正大之見乎秋懐詩寄興悠逺多感歎自歛退之意赴江陵途中詩次叙明宻是記事之體内有云早知大理官不列三后儔何况親犴獄敲搒發姦偷此語可警世俗盖比肩唐虞之朝者大禹臯陶稷契也禹平水土稷教播種而契教以人倫是爲三后獨臯陶不預焉三后子孫爲三代享國長久雖益之後爲秦亦綿延千百祀獨臯陶之後無聞焉或謂臯陶之所司者刑也漢高祖再整宇宙一時際㑹如蕭曹韓信張良蕭之後爲蕭梁曹之後爲曹魏張良好道家學至今名天師者亦其後獨韓信夷族以其所用者兵而刑之大者也臯陶明刑所以輔唐虞之仁雖不當以漢事比然且不得列三后之儔則刑之不可易言昭昭也司刑君子其可不盡心歟醉贈張祕書謂座客能文性情浩浩爲得酒意而富兒紅裙之醉如聚飛蚊可謂逸興卒章有云至寳不雕琢神功謝鋤耘此謂文字混然天成之妙也公之自得盖如此送惠師靈師皆叙其㳺歴勝槩終律之以正道縣齋有懐自叙平生甚詳岳陽樓叙洞庭之勝薦士詩叙六朝之陋爲搜春摘花卉叙國朝之盛爲奮猛卷海潦論文者可以觀矣駑驥詩高自稱譽陋視凡子也山石詩清峻汴泗交流詩叙教戰雉帶箭峻特有變態條山蒼簡淡有餘興贈鄭兵􅈠詩慷慨桃源圗前立兩柱一叙圖一叙詩方雙合叙事中間云大蛇中斷䘮前王五馬南渡開新主只提秦晉包盡六百年結云世俗寧知僞與真至今傳者武陵人與神仙有無何渺茫桃源之說誠荒唐相應皆明之以正理贈侯喜以釣魚况人事捨小求大八月十五夜贈張功曹感慨多興内云判司卑官不堪說未免捶楚塵埃間然則唐之判司簿尉類然歟然唐人之待卑官雖嚴而卑官之行法於人猶得以伸其嚴如劉仁軌爲陳倉尉搒殺中貴人折衝都尉魯寧是也我朝判司簿尉以待新進士而筦庫監當不以辱之其於判司簿尉視唐重矣奈何朝廷視之雖重世俗待之益卑苦役苛責甚於奴僕官之辱法之屈也此事關繋世道謁衡嶽祠惻怛之忱正直之操坡老所謂能開衡山之雲者也杏花詩釣鈎輈字釋云鷓鴣聲感春謂春風漫誕之可悲甚於秋霜摧落之不足惜此意亦竒東坡謂春蟾投醪光陸離不比秋光只爲離人照斷腸皆是此意翻出孟東野失子詩云蝮蛇生子時坼裂腸與肝愚徃年見臨安無夢和尚說蠏􅄆子後即枯死云出佛經落齒詩結以語訛黙固好嚼廢軟還美翻說最佳赤藤杖歌赤龍抜鬚羲和遺鞭等語形容竒恠韓詩多類此然此類皆從莊生寓言来送石處士赴河陽幕風雲入壯懐泉石别幽耳最工辛卯雪萬玉妃之句李花萬堆雪之句寄盧仝猶上虗空跨騄駬之句醉留東野爲雲爲龍之句皆立恠以驚人者招楊之罘栢馬之喻愛之使進而誰氏子之作謂稱道士爲癡狂尤正論也石鼓歌雙鳥詩尤恠特䨇鳥必有所指豈異端歟贈劉師服詩可與落齒詩參看聽頴師琴有曰喧啾百鳥羣忽見孤鳯凰贈張十八詩有曰龍文百斛鼎筆力可獨扛皆工於形容調張籍形容李杜文章尤極竒妙寄崔立之狀世俗羡科第之榮月蝕詩律玉川子之豪歸之雅正尤切諷諌結句仁厚有味短檠歌有感慨意符讀書城南世多議其以富貴誘子是固然矣然亦人情誘小兒讀書之常愈於後世之飾僞者病鴟詩有不絶小人戒誘使善之意華山詩形容女冠之易動俗書皇甫湜詩謂留意園池猶爾雅注蟲魚枉思掎摭捨業孔顔愚謂此可鍼世俗之失盖園池之適無非玩物仲舒潜心大業三年不窺園知汲汲於所當務者外誘不期而絶也路傍堠以下皆公南遷時詩乍食鱟魚章舉歎驚靣汗惟蛇舊所識開籠縱之蛤卽蝦蟇亦初不下喉也寄李大夫以年過半百来日無多有少年樂新知衰暮思故友之句南山有高樹行猛虎行皆贈李宗閔巧喻而力詆文之鋪叙頓挫甚佳送澄觀詩我欲收歛加冠巾其於送虗師亦嘗云方將歛之道且欲冠其顛是其人之心在在不放獨惜其論太顛語少斟酌耳山南鄭相公酬答詩烹斡力健倔斡當作鮮茫漫華墨間華當作筆音釋序李少卿云耵聹耳垢也上都挺切下乃挺切讀東方朔雜事譴瘧鬼二詩皆稽滑以諷瘧云顓頊子也示兒詩以有屋自慰與符讀書詩正相終始喜雪春雪詠雪等作皆曲盡形容之妙層出無窮蒲萄詩以馬乳對龍鬚今俗呼蒲萄爲馬乳而竹之有龍鬚亦經見於此作字讀與做同方橋詩作字與過字同押遣興詩斷送一生惟有酒贈鄭兵曹詩破除萬事無過酒山谷詞各於其下去一酒字天然妙對記夢結句安能從汝巢神仙李少卿謂仙當作山此韻與間字連押當作山尤分明詠筍與詠雪詩相類形容層出送張侍郎以下諸詩皆隨裴相公東征時作示姪孫湘以下諸詩皆貶潮州時作雜文原道嗚呼自昔聖帝明王所以措生民於理使其得自别於夷狄禽獸者備於原道之書矣孔孟没異端熾千有餘年而後得原道之書辭而闢之昭如矣奈何溺於異端之士吹毛求釁竊附程録尚欲隂爲異端報仇耶此程門高弟尹和靖力排語録之非歟程録嘗謂愛主情而言盖辨析精微之極也仁者愛人此正吾夫子之言豈可因以博愛爲仁非原道哉彼以煦煦爲仁而此以博愛爲仁正將以吾道之大擴其所見之小也原道不可非也程録雖嘗以虗位之說爲非此决非程氏之言也夫道二仁與不仁而已此正孟子之言豈可反以道德虗位非原道哉仁與義爲道德去仁與義亦自以爲道德故特指其位爲虗而未嘗以道德爲虗也原道不可非也程録又載昌黎言治國平天下止及正心而不及致知格物此殆程子一時偶然之言也孔子言修己以安百姓孟子言篤恭而天下平皆不過舉其要而言豈必盡及致知格物之條目而後可以爲自修而顧乃以此非原道哉異端言心而外其天下國家者故昌黎言治國平天下而特推其本於正心耳原道不可非也非之之說三皆不過爲異端報仇譽之之說一又不過爲異端借影原道曰堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉所謂傳者前後相承之名也所謂道者卽原道之書所謂其位君臣父子其教禮樂刑政其文詩書易春秋以至絲麻宫室粟米蔬果魚肉皆道之實也故曰以是而傳以是者指原道之書所謂道者而言之以明中國聖人皆以此道而爲治也故他日論異端又曰果孰爲而孰傳之耶正言此之所謂道者無非實而其傳具有自来彼之所謂道者無非虗而初無所自傳云爾非他有靣相授受之宻傳也託附程録者乃發爲異說稱譽原道以爲此必有所見若無所見所謂傳者傳人甚麽嗚呼異哉堯舜禹湯文武周公孔孟相傳之道備見於原道一書豈復他有險恠歇後語隂幽不可名言如異端所謂不立文字單傳心印之傳者哉或者此類多出於上蔡謝氏之門歟盖不以愛爲仁而以覺爲仁必欲掃除乍見赤子入井之心者上蔡之言也二程無之也謂有不二法門而言道無精粗彼此之分者上蔡之言也二程無之也載僧人揔老之言謂嘿而識之是識个甚麽無入而不自得是得个甚麽者亦上蔡之言也二程無之也凡今所議原道三說徃徃類此愚故意其爲上蔡謝氏之門依倣而託於程録也學者無以其語出於程録而遽非原道必以孔孟之說而稽之則於讀原道幾矣原性論與生俱生而其所以爲性者五仁義禮智信最爲端的性有三品之說正從孔子上智下愚不移中来於理無毫髪之背至伊洛添氣質說又較精微盖風氣日開議論日精得氣質之性與天地之性對説而後孟子專指性善之說舉以属之天地之性其說方始無偏此於孟子之説有功而於孔子之說無傷實則孔子言性包舉大體孟子之說特指本源而言性無出於孔子者矣奈何三品之說本於上智下愚之說而後進喜聞伊洛近日之說或至攻詆昌黎耶原毁傷後世議論之不公爲國家者不可不察也原人謂命於兩間爲夷狄禽獸之主主而暴之不得爲主之道故聖人一視而同仁篤近而舉逺此說己見仁之全體大用漢唐諸儒不及也本朝西銘又加精宻原鬼謂鬼無形聲而接於民者物之恠說亦工原之爲義皆推明正理以袪世俗之蔽者乎古然而今亦然理然而事亦然則亦何俟乎公之原行難之作嘉陸叅之服善對禹問所以明傳子之義定天下萬世之常也雜説四首龍喻言君不可以無臣醫喻言治不可以恃安鶴喻言人不可以貎取馬喻言世未嘗無逸俗之賢讀荀謂孟尊孔揚尊孟而荀在軻雄之間劑量審矣是亦於其言而定之盖謂荀未嘗知尊孟故爾若不于其言而于其人揚則未必不劣於荀此韓公他日獨以孟荀並言歟雖然荀又豈孟伍哉故又曰軻之死不得其傳嗚呼公之劑量諸儒審矣鶡冠子十六篇韓子悲其人之不遇鶡似雞以死闘楚俗以飾冠示武也至今西班稱鶡弁云讀儀禮以聖人之制度而掇其要讀墨子進而比之曰孔墨夫墨子孟子所深闢韓子尊孟者也何議論之相反至此豈孟防其流弊而韓論其本心歟獲麟解大意謂麟祥物也但出非其時人不謂之祥盖以自况而不直說遂成文法之妙師說前起後收中排三節皆以輕重相形初以聖與愚相形聖且從師况愚乎次以子與身相似子且擇師况身乎次以巫醫樂師百工與士大夫相形巫樂百工且從師况士大夫乎公之提誨後學亦可謂深切著明矣而文法則自然而成者也進學觧類賦體逐叚布置各有韻豨苓之豨音希猪也卽木猪苓本政論謂周以文弊後不知所承而盡窮古始以明民不知古者神而化之不使知之也守戒謂諸侯於君當爲翰蕃譬之宅於山者施䧟穽宅於都者固扄鑰甚切其後譬以賁育之不戒童子之不抗魯雞之不期蜀雞之不支尤語工而意切國不得其人以預備之雖強猶弱歟圬者王承福不敢一日怠其事其得也不肯一以妻子勞其心其過也操鏝入富貴之家至一再過之則爲􅇕可爲世戒也五箴之作年四十八謂聦明不及於前時道德日負於初心而㳺也言也行也好惡與知名也各自爲之箴拳拳進德之心也後漢三賢賛王充作飬性王符著潜夫仲長統著昌言皆傷其不顯於世而賛之諱辯旣舉嫌名二名之不諱復舉周公孔子曾參不諱而宦官宮妾之所諱以相形反覆攻擊燎然明白然䛕暗成俗至今諱者益甚何哉愚嘗考諱之所始乃周制子孫奉祀廟中不敢斥其父祖之名而以諡易之所謂卒哭乃諱也今人少壯無恙而多方回避其名以爲諱是敬之所以瀆之而預死其人於生之日也異哉訟風伯譏小人沮君之澤甚工伯夷頌謂無求而爲之萬世一人反結一語謂微二子亂臣賊子接迹於後世尤竒絶子産不毁鄕校頌戒爲人臣者忌人言而蒙主聼釋言述人有䜛公於鄭相國李舍人者而卒不行也再三宛轉文法極妙愛直一篇謂李君房之從南陽公有所不知知之未嘗不爲之思有所不疑疑之未嘗不爲之言愚謂今之賓僚於所事猶古者卿大夫士於諸侯盖有君道焉自封建廢而爲郡縣之吏自世卿易而爲遞遷之官萍梗相逢休戚無關而治道遂不可以望古若李君房其行古之道者乎張中丞傳後叙閱李翰所爲張廵傳而作也補記載之遺落暴赤心之英烈千載之下凜凜生氣燕喜亭記工於狀物掌書㕔記工於言情畫記工於叙事藍田丞㕔記叙崔斯立盤欎之懐修滕王閣記自叙慨慕遐想之意隨物賦形沛然各縱其所之無拘也近世爲記者僅述歳月工費拘澁不成文理或守格局各成窠叚曰此金石之文與今文異嗚呼異哉猫相乳叙事極簡明論士大夫富貴得之於功或失之於德得之於身或失之於子孫策問十三首只舉一事之可疑者爲問而不設疑辭古人大體盖如此今之問者徒爲疑辭而初無疑事諌臣論以陽城之賢而作也改葬服議改葬服緦惟子於父母爲然省試學生代齋郎議齋郎士大夫子弟習宗廟之事者歲久命之官學生則以經藝試司業將以賛教化者也不可反代小勞之事禘祫議謂獻懿二主宜居東向之位毁瘞始於晋魏不可行顔子不貳過論謂止之於始萌何蕃傳載朱泚之亂蕃一正色而六館無從亂者書啟與李袐書論小功須追服答張籍两書諄諄然自觧未可著書闢佛之意及觧駮雜之議其實張籍益友也愛公之深者也與孟東野書答竇存亮書皆叙交際次第自成文法上李實尚書叙其政賀白兎辭巧上李侍郎書云大之爲河海高之爲山嶽明之爲日月幽之爲鬼神纎之爲珠璣華實變之爲雷霆風雨答尉遲生書云本深而末茂形大而聲宏行峻而言厲心醇而氣和昭晰者無疑優㳺者有餘上于頔相公書云變化若雷霆浩汗若河漢正聲諧韶濩勁氣沮金石凡皆形容文章之妙公實道胷中之自得者上鄭相公两啓皆自訴所欲言上宰相三書昌黎三上光範書世多譏其自鬻然生爲大丈夫正蘄爲天下國家用孔子嘗歴聘列國孟子亦嘗游說諸侯矣如公才氣千古一人亦同流俗困於科舉而不得少見於世故直攄其抱負以自逹於進退人才者雖頗失之少年銳氣而實皆發於直情徑行始則曉以古者成就人才之道次則動以一己飢寒之廹終則警以天下未治反不能如周公禮士之勤光範門雖尊公直與之肝膈無間然則公之抱負者爲何如而可譏其自鬻哉終南㨗徑少室索價陽退隂進不由真情此則不鬻之鬻乃公罪人耳答侯繼書答崔立之書皆試黜時所作雖微有不平而直述其邁徃不羣之氣亦奇矣答李翊書自叙歴學之次第然後及其飬所自出者當熟味如靣承公之教我可也代張籍書就盲字上發明不爲悲苦之辭死中求活法也答李師錫就李元賓說來宛轉𦂳切答陳生書謂事親以誠不待於外而後爲飬汲汲於科名以不得進爲親之羞者惑也此非特可鍼陳生之病萬世而下爲吾徒者皆當拳拳服膺上張僕射書唐制持節某州諸軍事盖以節度使統支郡之權而其属爲两今之職官唐使院也今之曹官唐州院也州院於今爲録事參軍之居使院於今爲僉㕔不以使院稱之唯都吏孔目官所居尚名使院卽其遺稱也故韓公所上張建封書在使院中小吏持院中故事來示之語此唐制稱使院之證也上于㐮陽書言先進後進前後相須之道與崔羣書言交際之情宛轉悠逺與陳京書言於貴官門墻易踈之狀尤明切動人答馮宿書言在京城不一至貴人之門人之所趍僕之所傲其與衞中行書云所入比前百倍視吾飲食衣服亦有異乎其所不忘於仕進者亦將少行乎其志耳由是觀之公之三上宰相書豈階權勢求富貴哉宰相人才所由進磊落明白以告之公之本心如青天白日後世旁蹊曲徑暮夜鑚刺而隂求陽辭心口爲二妄意亷退之名眞墦間乞祭之徒耳諌張僕射撃毬謂馳毬於場蕩揺振撓不三四年無全馬矣而人五藏之繫絡甚微坐立必懸垂於胷臆之間以之顛頓馳騁嗚呼危哉此說富貴少俊者所宜深知與馮宿論文謂稱意者人以爲恠下筆令人慚則人以爲好古文真何用於今以俟知者知耳公殆矯其說以振起一世之庸庸者乎然歴數百年至本朝歐陽公方能得公之文於殘弆而發撝之否者終於湮没自歐陽公以来雖曰家藏而人誦殆不過野人議璧隨和稱好及自執筆爲文鮮有不與之持真知公之文者又幾何人哉愚嘗嘆息而爲之自警曰人誰不講孔孟之學至遇事則徃徃而違其訓人誰不讀韓歐之文至執筆則徃徃而非其體人莫不飲食鮮能知其味不心誠求之是真無益哉與陸員外薦士書公薦侯喜以下九人此唐之公薦進士法也與邢尚書書謂布衣王公事勢相須文極清快爲人求薦書以伯樂一顧價増三倍爲喻盖公薦於司貢士者也應科目時與韋舍人書以恠物困於窮涸自況而望其一舉手一投足轉之清波此又公之自薦者也答劉正夫書論爲文譬之百物朝夕所見者人皆不注視及覩其異者則衆觀之又謂用功深者其收名也逺答陳商書喻以齊王好竽而鼓以瑟所謂工於瑟而不工於求齊合是兩書而觀之庸庸者不足以自見恠恠者非所以諧俗公所告語雖各隨其病而藥之功深一語則均所當務而根本之論乎與孟簡書因觧妄傳奉釋事遂極言釋氏之非張籍嘗勸之著書攻釋則辭之答吕毉山人書自謂世無孔子不當在弟子之列盖山人矜誕人也責公以不能如信陵執轡公故盛其說以折之答元侍御書以甄濟識安禄山必反其子逢刻身立行足下能樂道其善俱宜牽聯得書足下年尚彊嗣德有繼將大書特書屢書不一書文氣横生可愛也與袁相公書薦樊宗師云奇寳横棄道側而閣下篋櫝尚有少缺不滿之處瑰語也與柳公綽書盛言其以書生率先揚兵淮右之壯形容如見次書言逺調軍士浮寄孤懸形勢銷弱若募土人愛䕶鄕里勇於自戰調兵滿萬不如召募數千此則萬世可行之通論也與李尚書書云接過客俗子絶口不挂時事務爲崇深以拒止嫉妬之口此語亦渉世者所當知序送孟東野序自物不得其平則鳴一語由物而至人之所言又至天之於時又至人言之精者爲文歴序唐虞三代秦漢以及於唐節節申以鳴之說然後歸之東野以詩鳴終之曰不知天將和其聲以鳴國家之盛耶抑將窮餓其身思愁其心腸而使自鳴其不幸也歸宿有味而所以勸止東野之不平者有道矣師友之義於斯乎在而世徒以文觀之豈惟不知公抑不知文者耳桴鼓之桴音浮撃鼓柄也與乘桴浮海音夫者不同見與栁公綽書出左傳送許郢州序云爲刺史者常私於其民不以實應乎府爲觀察使者常急於其賦不以情信乎州繇是刺史不安其官觀察使不得其政財已竭而歛不休人己窮而賦愈急愚按刺史漢監司之名在唐則爲州猶今太守之稱盖守郡者也觀察使唐監司之名本朝始去其權僅存虗號在唐則專有一道之兵財權重於今之監司者也觀察使旣專有兵財其征取於支郡之刺史猶今州郡促縣道財賦之類也征取之欲無厭生民之出有限公謂府常急於財可謂州常私於民不可府旣急於財而州又不私於民則竭下奉上患將安極此事豈可使州與府同耶郢爲㐮陽支郡而爲㐮陽者于頔公主人也故勉郢州以應㐮陽之需殆非公論否則公客於于見觀察使督賦支郡之難而未見支郡督賦百姓之難尤可念耶送齊皥序齊皥之兄爲相有司以嫌不取之登第公謂其生於私夫取舍于其人可也于其勢而取之私也于其勢之可嫌而故舍之亦私也公之論精矣然舍之私尚猶愈於取之私李愿盤谷序按李少卿音義序謂得王仲至家善本盤之土土爲下窅而深深爲空今讀盤之土維子之稼韻不叶下與稼則恊矣又下與中字對用有義也窈而深廓其有容韻亦不恊空與容則恊矣又空則有容比深字義尤精也合從李少卿之說而讀之徜徉之徜音常京尹不臺參答友人書云赤令尚與中丞分道而行何况京尹送牛堪登第序唐人登第無進謝有司之門者贈崔復州序謂官至刺史亦榮矣民窮歛愈急而連帥不以信此爲刺史之難也崔君爲復州而連帥則于公崔君之仁足以蘇復人于公之賢足以庸崔君崔君將有其榮而無其難者乎愚謂此書善爲詞於上下之間回視送許郢州序無其立語之弊矣贈張童子序謂明經之得難而童子之得易勉以勤其所未學送文暢師序論民之初生固若禽獸夷狄然今安居暇食優㳺生死與禽獸異者聖人之教之賜也而文暢不知可謂辨之明而諭之切矣扶持正敎開明人心與原道之書相表裏送楊儀之序知其客可信其主之說亦足見唐人之辟官不于人情而于其才也茍于其人情而辟之則亦足以覘其主顧賢否相反爾送廖道士序謂郴當中州清淑之氣蜿蟺扶輿磅礴而鬰積其水土之所生神氣之所感白金水銀丹砂石英鍾乳橘柚之包竹箭之美千尋之名材不能獨當之也意必有魁竒忠信材德之民生其間送王含序悲醉鄕之徒不遇送孟琯序善雖不吾與吾將強而附不善雖不吾惡吾將強而拒送王塤秀才序自孔子沒獨孟軻氏之傳得其宗故求觀聖人之道者必自孟子始譬之沿河而下茍不止雖有疾遲必至於海如不得其道也雖疾不止終莫幸而至焉荆潭唱和序和平之音淡薄而愁思之聲要妙懽愉之辭難工而窮苦之言易好送高閒上人論張旭草書見山水崖谷鳥獸蟲魚草木之花實日月列星風雨水火雷霆霹􅆮歌舞戰闘天地事物之變可喜可愕一寓於書故旭之書變動猶鬼神不可端倪送殷侑使回鶻謂今人適數百里出門惘惘有離别可憐之色持被入直三省丁寧顧婢子語刺刺不能休今子使萬里外國獨無幾微出於言靣豈不真知輕重大丈夫哉以上皆借事形容曲盡文字之妙送石洪序若河決下流而東注若駟馬駕輕車就熟路而王良造父爲之先後也若燭照數計而龜卜也韋侍講序其拒而不受於懐也若築河堤以障屋霤其容而消之也若水之於海冰之於夏日其玩而忘之以文辭也若奏金石以破蟋蟀之鳴蟲飛之聲以上皆雜喻形容亦曲盡文字之妙送温造序伯樂一過冀北馬遂空非無馬也無良馬也東都固士大夫之冀北也以石生爲才以禮為羅羅而致之幕下以温生爲才以禮爲羅又羅而致之幕下朝取一人焉㧞其尤暮取一人焉㧞其尤若是而稱曰大夫烏公一鎮河陽而東都處士之廬無人焉豈不可也愈資二生以待老今皆爲有力者奪之其何能無介然於懐耶生旣至其爲吾以前所穪爲天下賀以後所稱爲吾致私怨於盡取曲盡變態送鄭權尚書序叙事工宻送韓約侍御序明屯田之功石鼎聯句序道家學公所闢侯喜公所敎而愛之者今形容二子屈服彌明之狀如此略不爲喜掩覆公之文不欺盖如此祭文祭田横墓感横義高能得士心歐陽生哀辭閩越之人舉進士繇詹始詹死京師而父母悲之公故爲之辭以爲觧若曰詹在側雖無離憂其志不樂詹在京師雖有離憂其志樂詹所謂以志養志公豈特解其父母心亦善爲詹解者歟然詹固一時不幸而閩越之人違父母雖死不歸今遂成俗彼其父母之志果皆如公所謂否耶祭薛助敎有後三月此用史記後九月文法也雪虐風饕出祭張員外祭裴太常擔石之儲常空於私室方丈之食毎盛於賔筵說貧而好客奇絶潮州祈晴稻旣穗矣而雨不得熟以穫也蠶起且眠矣而雨不得老以簇也語佳甚稻之穗與蠶之眠同時則南方氣候之早歟又祭云糞除天地山川清風時興白日顯行祭柳子厚犧罇青黄乃木之災武侍御畫佛文以妄塞悲祭十二郞文當成誦墓銘崔評事翰茍親矣雖不肖收之如賢苟賢矣雖貧賤待之如貴人考功盧君婆娑嬉遊未有捨所爲爲人意助敎薛君帥武人君爲作書奏讀不識句傳一幕以爲笑益棄竒與人爲同祭封尉盧殷無書不讀然止用以資爲詩竟飢寒死呂氏子炅棄妻謝母學仙王屋山李素爲河南尹使吏卒脫其道士衣押送還其母公所作誰氏子詩豈正此呂歟石洪本姓烏石蘭九代祖猛從拓抜始獨姓石韋丹舉明經授逺安令以譲其兄復通五經登科刺洪州計口受俸敎人爲瓦屋築堤扞江銘有曰慊慊爲人矯矯爲官胡評事銘三字句張法曹吾志非不如古人吾才豈不如今人而至於是而死於是耶苖參軍誌其季生君卒之三月遺腹後夫人繼室也見韋丹誌又楊燕竒誌前夫人從葬舅姑祧次前進士見孔戡墓誌指韋夫人弟路應神道碑逢水旱喜賤出與民歲熟以其得收常有贏利鄭儋神道碑削四鄰之交賄省姱嬉之大燕簾閣據几終日不知有人二夫人各别爲墓不合葬劉統軍魁顔鉅鼻可代隆凖徐偃王廟謂徐與秦俱出伯益秦以强吞諸侯徐當穆王無道諸侯咸賔穆王伐之不忍闘其民走彭城秦鬼久飢徐有廟存仁與暴異也偃王名誕立廟者名放掲䖍妥靈無恠風劇雨並同上陊剥不治陊池耳切聲近耻字俗云耻剥者疑此字也袁氏廟碑袁出陳人房啓銘目濡耳染不學以能材公之爲不相漁刼同上姊壻出太原郡公碑曹成王李臯碑痛自刮磨豪習委已於學耻一不通内外斬斬伐之二年尤張王適墓銘以恠文狀狂士極可觀今間節一二懐竒負氣名節可以戾契致戾練結反契苦結反不喜聞生語一見輙戒門以絶對語驚人蹐門告曰天下奇男子王適奴視法度士妻上谷侯氏處士高女高固竒士曰一女憐之必嫁官人不以與凡子李虗中誌深於五行書好道士說以水銀為黃金服之冀果不死將疾夢大山裂流出赤黄物如金左人曰是所謂大還者卒疽發背死山者艮艮爲背裂而流赤黄疽象也大還者大歸也其告之矣董溪故丞相子賔接門下推舉人士侍側無虗口退而見其人淡若與之無情者銘曰不我者天孟東野爲詩鈎章棘句神施鬼設間見層出人皆刼刼我獨有餘年踰五十始選爲溧陽尉卒於興元軍參謀是曰貞曜先生獨孤郁月開日益卓然早成故相權公德輿登君於門歸以其子此又贅壻之名也張季友自署其末與封謂非親書者劉昌裔與吳少誠交壤曰俱天子人奚爲相傷兩界耕桑交跡爽音霜慶音羗叶韻如此愚按詩有德音不爽壽考不忘又黍稷稻粱農夫之慶又易云積善之家必有餘慶積不善之家必有餘殃詩易皆叶韻者故公於劉昌裔之銘曰維德不爽後人之慶惜二字禮韻未收入平聲也衛之𤣥聞南方多水銀丹砂雜他竒藥爊爲黄金可餌以不死卽去遂踰嶺得藥試如方不效曰方良是我治之未至耳留三年藥終不能爲黄金未幾竟死張署拜京兆府司録諸曹白事不敢平靣視胡珦音向非其身力不以衣食自刻削不干人孤身旅長安致官九卿爲大家七子皆有學守女嫁名人權德輿字載之生三歲知變四聲四歲能爲詩薦士於公者其言可信不以其人布衣不用卽不可信雖大官勢人交言一不以綴意考進士踵相躡爲宰相達官平淮西碑文恬武嬉士飽而歌馬騰於槽今旰而起左餐右粥惟㫁乃成南海廟碑多雋語上雨旁風取具臨時盲風恠雨發作無莭雲隂解駮日光穿漏闔廟旋艫祥飈送颿旗纛旌麾飛揚晻靄鐃鼓嘲轟高管噭譟武夫奮棹工師唱和穹龜長魚踴躍後先乾端坤倪軒豁呈露處州孔子廟碑公以社稷不屋而壇不如夫子巍然當座張文潜稱廟貎起於後世祭天地亦不屋而壇耳羅池廟碑柳子厚旣治栁三年與部將魏忠謝寧歐陽翼飲酒謂曰明年吾死死爲神三年爲廟祀我及期而死三年侯降州之後堂翼等見而拜之其夕夢翼而告曰館我羅池歩有新船鵝之山兮柳之水桂樹團團兮白石齒齒黄陵廟湘出全瀟出道合於永以入洞庭廟在瀟湘尾洞庭口祠舜二妃長娥皇曰君次女英曰夫人王仲舒碑銘讀書著文其譽藹欝與陽城遏延齡不得相德宗初怏怏無柰久嘉之顧列曰第幾人必王某也果然爲蘇州堤松江路賦調自爲書與人期吏無及門而集觀察江西禁浮屠誑誘壊其舍以葺公宇秀出班行簡古而蔚韓𢎞帥汴承五亂之後苖薅而髪櫛之汴之南則蔡吴少誠爲亂北則鄆李師道爲亂𢎞助平二㓂歸京師位中書夀五十八李師古之起事也或曰剪棘夷道兵且至矣公曰兵来不除道也詐窮旋軍其朝京師天子曰大臣不可以暑行其秋之待公曰君爲仁臣爲恭可矣遂行人得一笑語重於金帛之賜柳子厚得柳州劉夢得禹錫亦在遣中當詣播州子厚泣曰播州非人所居而夢得親在堂願以柳易播夢得於是改刺連州嗚呼士窮乃見節義今夫平居里巷相慕恱酒食游戯相徵逐詡詡強笑語以相取下握手出肺肝相示指天日涕泣誓生死不相背負真若可信一旦臨小利害僅如毛髪比反眼若不相識落䧟穽不一引手救反擠之又下石焉者皆是也此宜禽獸夷狄所不忍爲而其人自視以爲得計聞子厚之風亦可少媿矣向使子厚在臺省時自持其身已能如司馬刺史時亦自不斥斥時有人力能舉之且必復用不窮然子厚斥不久窮不極雖有出於人其文學辭章必不能自力以傳於後如今無疑也雖使得所願爲將相於一時以彼易此孰得孰失必有能辨之者並墓誌鄭羣不爲翕翕熱亦不爲崖岸斬絶之行俸禄入門與其所過逢飲酒舞歌費盡不顧問遇其空無時客至清坐相看竟日不能設食孔戣誌古之老於鄕者將自佚非自苦閭井田宅具在親戚之不仕與倦而歸者不在東阡在北陌可杖屨来徃也明州歲貢海蟲淡菜蛤蚶可食之属自海抵京師道路水陸遞夫積功歲爲四十三萬六千人奏䟽罷之蕃舶之至泊歩有下碇之稅始至有閱貨之燕犀珠磊落賄及僕𨽻公皆罷之殿中少監馬君繼祖北平王燧之孫姆抱幼子立側眉眼如畫髪漆黒肌肉玉雪可憐殿中君也當是時見王於北亭猶高山深林龍虎變化不測傑魁人也退見少傅翠竹碧梧鸞鵠停峙能守其業者也幼子姢好静秀瑶環瑜珥蘭茁其牙稱其家兒也樊宗師不襲蹈前人一言一句天得也銘曰惟古於詞必己出降而不能乃剽賊海含地負文從字順李郱銘愈下而微旣極復飛張徹嘗從余學選於諸生而嫁與之世慕顧以行于掲掲也猛厲音烈李楚金爲貝州司法其刺史不恱於民將去官民相率讙譁手瓦石需其出撃之司法君奮曰是何敢爾属小吏百餘人持兵仗以出立木署之曰刺史出民有敢觀者殺之木下民聞皆驚相告散去李干遇方士柳泌從受藥法服之下血病死余不知服食說自何世起殺人不可計而世慕尚之益至今直取親與游而以藥敗者六七公爲世誡工部歸登狂痛號呼唾血以斃殿中李虗中疽發其背死刑部李孫且死謂余曰我爲藥誤其李建一旦無病死孟簡屏人曰我得祕藥不可獨不死今遺子一噐别一年而病病二歲竟卒盧坦死時溺出血肉李道古食泌藥五十死海上蘄不死乃速得死臨死乃悔後之好者又曰彼死者皆不得其道也我則不然始病曰藥動故病病去藥行乃不死矣及且死又悔嗚呼可哀也已可哀也已韓紳卿遷涇陽令破豪家水碾利民田百萬頃韓滂老成之子歸後其祖介盧氏誌外王父雜文送窮事始顓頊高辛時祖揚雄有逐貧賦恠恠奇奇蠅營狗茍延之上座鰐魚文伈伈悉忱反恐貎狀丞相董晉行狀請牒考功并太常議謚牒史館公自稱故吏朱泚之亂說李懐光不與天下安危宰相之能與否可見謀議於上前者不足道未嘗言兵與盧郎中薦侯喜狀身在貧賤爲天下所不知獨見遇於大賢乃可貴耳論權停舉選狀以歲之旱權停舉選省費而足食也竊以十口之家益一二人未有所費今京師人不啻百萬舉者不過五七千人并僮僕不當京師百之一舉選者皆齎持資用以有易無未見其弊天旱人飢乞停稅至来年唐制國子館生三百人大學館生五百人四門館生五百人名三館學生馬府君行狀趙奢號馬服君子孫由是以馬爲氏梁悦報仇殺人公詣請集議奏聞酌宜而處表爲宰相賀雪表春雲始繁時雪遂降是冬雪愆期雖春亦賀進順宗實録表李吉甫以韋處厚所撰令公重修賀白龜狀謂獲蔡之兆進撰淮西碑狀乾坤之容日月之光知其不可繪畫碑夲賜韓𢎞𢎞寄絹五百疋充人事謝云恩由上致利則臣歸論佛骨表之說正矣潮州謝表稱頌功德之不暇直勸東廵泰山而自任鋪張雖古人不多譲甚矣憲宗之不可與忠言而公也汲汲乎茍全性命两可悲矣夫表多近世引用之句如鋪張對天之閎休揚厲無前之偉績編之乎詩書之册而無愧措之天地之間而無􅃜旋乾轉坤關機闔開雷厲風飛日月清照公之貶潮佛者謂此禍福之報然佛骨一入而憲宗已晏駕公卽移袁福未央也禍福誰在耶賀慶雲等表皆文人諛語牽於時俗無足論者請上尊號尤甚賀太陽不􅃜表此皆我朝先正所不爲者辨張平叔奏變塩法利害較然言敷人糴塩之擾也所由外集謂范蠡背君而去又招大夫種使竟承賜劒之詔無事君之義爲人謀而不忠愚謂種方假疾句踐卽賜劔蠡稱不可與共安樂之言驗矣蠡不去與俱死何益句踐豈能𢎞夏禹之烈者哉明哲保身蠡未爲無所見種不去而及豈蠡䧟之使然而曰由㧞句踐之劔其言似微刻也然則事君不可則去之乎曰君臣以義合君辱臣死處變之義也功成身退處常之義也使句踐棲㑹稽時蠡舍而去之又招種欲所去之蠡則爲萬世罪人答劉秀才論史歴叙人禍天刑謂粗知自愛實不敢爲館中非無人必將有作者然則館中人皆不知自愛耶通觧謂堯之前千萬年不知譲許由哀天下之愚以争爲能廼高揖辭堯譲之敎行許由為之師桀之前千萬年不知忠龍逢哀天下之不仁覩君父百姓入水火而不救於是盡言就烹忠之敎行龍逢為之師周之前千萬年不知義之可以換其生伯夷哀天下之偷且以強則服􅅔逃山而死義之敎行伯夷為之師嗚呼以天下譲舜者堯也謂許由辭而不受者莊生之寓言以戯薄天下也無其事也桀之前由禹以逹五帝三皇皆治世未有君父百姓入水火者也桀始暴而龍逢以諌死世道之不幸耳逢非有心哀天下之不仁而特以身立敎也龍逢旣以諌死而謂伯夷之餓死爲前千萬年不知義之可以換生又誣而自背其說也譲也忠也義也皆人心所固有也聖帝明王繼天立極幾年於此不幸遭世之變始有矯矯自見其間者龍逢伯夷是也許由非其比也豈開闢以來所未知而三子者昉之耶鄠人對鄠胡古反京兆縣名剔股以瘳母疾雖非聖賢之中道實孝子一念之誠切也爲對鄠人之說者何忍且薄耶謂希免輸謂不腰於市已黷於政謂以一身爲孝是辨其祖父皆無􅍿嗚呼窮鄕小民藥餌何有父母呼吸死生之際號天叫地救急無門身之不卹而希免輸乎世之剔股以救母者疾未有不瘳而子亦不知其痛未有病創者殆天地神明之哀其誠也救母何罪而可腰於市乎當仁不譲於師而古亦以盖前人之愆爲孝未聞以祖父無􅍿稱而子不可行孝者也况倉卒剔股偶然希有之事不當責其祖父之必有也祖父未有而子孫有之顯其祖父者也且孝猶忠耳顔杲卿罵賊殺身顔之祖父生死於太平無事之世豈嘗有是事乎國史大書杲卿之忠不聞其爲形祖父之不忠豈旌􅍿子之孝爲形祖父之無孝乎嗚呼爲對鄠人之說者何忍且薄耶直諫表證三王已下治亂而謂開闢已来未有如大漢前後已幾於不倫矣謂先朝用幼僧矯堅之言迎佛骨臣上諫投荒州未得一年上天降大禍先朝升遐如彼骨可慿臣家族合至灰滅先朝合享如山之壽矣竊意此非人臣之所宜言公所必不爲也外集五卷大抵文緩而衍不類昌黎天成之筆揆之於理又多可疑如此按李漢叙稱最厚且親收拾遺文無所墜併目録共四十一卷然則外集何從而来哉又孰爲之收拾耶五卷之多惟論史一書柳柳州嘗辨之可審其爲韓餘孰與稽耶趙臺卿於孟子有言又有外書四篇其文不能𢎞深後世依倣而託之者愚於昌黎之外集盖不能盡信云順宗實録五卷順宗自貞元二十一年二月卽位罷宫市禁選宫觀婢禁五坊小兒張雀羅囊蛇之擾停鹽鐵使月進出後宫并敎坊妓女人情大悦然上自二十年九月已得風疾不能言越人王叔文初以碁進東宫杭人王伾侍書寢陋吴語上所䙝狎至是植黨用事韋執誼倚之爲相叔文欲謀兵權逺近大懼未幾叔文執誼交惡心腹内離外有韋臯裴垍嚴綬等箋表而中官劉光竒等屡以啓上八月傳位太子貶王叔文渝州明年殺之伾開州執誼崖州皆死載張萬福陸贄陽城三賢始末極詳見第九卷載伾叔文執誼三不肖情狀亦詳見第十卷唐書不就用之爲傳而更他爲何哉班固之用史記全文於是不可及而李巽巖長編未嘗改歐蘇所紀先正言行於是爲善述矣鹵莾胡古反不用心貌與草莾之莾各音字皆從犬在两廾中載太子名云從水傍享淳字也東坡作韓文公廟碑詞絢雲錦氣矗霄漢振古一竒絶也然一言以蔽之不過謂其間氣所生不爲死生禍福奪此殆坡公胷中所自得因之而發歟若文公之所以爲文者則似未暇盡及也盖自孟子没而異端作中國之不爲夷狄者幾希公始出而排斥之天地之所以位人之所以異於禽獸中國之所以異於夷狄一一條析明盡而世始昭若發蒙孔孟而後所以扶植綱常者公一人而已孟子没而邪說熾性理之不蕩於空虗者尤希公始出而指喜怒哀樂愛惡欲七者以爲情指仁義禮智信五者以爲性人獨於五者之要指仁與義二者謂由是而之焉則爲道且謂舍是而言道者非吾之所謂道孔孟而後所以辨析義理者文公一人而已夫惟綱常非徒禮樂刑政之可扶也我朝是以復極其根於性命之源性非徒三品之可盡也我朝是以復析其微於本然之性氣質之性之别功有相因理日以明譬之事業文公則撥亂世而反之正者也我朝諸儒則於反正之後䆒極治要制禮作樂躋世太平者也文公之所以爲文者其大若此豈曰文起八代之衰止於文字之文而已哉臨川王氏嘗爲詩以譏昌黎曰紛紛易盡百年身舉世無人識道真力去陳言誇末俗可憐無補費精神然世未有以其言爲然者也盖人生一日必盡一日之事此卽造化生生不息之理今謂百年易盡而先自棄不爲者偷也異端之言也人生未有一日不由於斯道此卽盈天地間昭然著見之理今謂道爲有真而人不能識者誕也異端之言也世更八代異端肆行昌黎始出而斥異端明聖道以六經之文爲諸儒之倡其有補斯世論者謂功不在孟子下今臨川譏其無補枉費精神者盖其溺於異端之學所見然也不足疵昌黎也且王氏雖習異端初未嘗槁馘山林恪守朴陋求其所謂道之真者亦不過費竭精神從事文墨正欲學爲昌黎而特未至耳柰何身自爲之而反以譏人邪近世大儒晦庵先生校昌黎文乃取臨川之詩附其後愚觀晦庵平日於昌黎實敬其人實愛其文獨以其未免詩酒浮華志在利禄而微有嘆息之辭瑕瑜不相揜已極議論之公矣今附此詩則所未曉且枉費精神之說陸象山正以此譏晦庵而其說正自臨川王氏来亦豈其然乎又世傳昌黎嘗與大顚書其文陋甚昌黎集無之東坡先生嘗辨其爲僞矣昌黎本以刑部侍郞到潮州還朝久之乃遷吏部歐陽公所得大顛書石本乃稱吏部侍卽此可知其爲僞尤明晦庵亦以其書爲真而録於後亦所未曉併書誌疑以俟来者察焉嘗聞長老言自昔詩文類不免差誤惟昌黎之文少陵之詩獨無之然歐陽公嘗議昌黎羡二鳥之光榮張文潜嘗議其記夫子廟不當以有屋爲勝於社稷陸放翁嘗議其詠石鼓文不當謂删詩時失編入凡此誠亦不免言語之疵至若言及經義而是非不繆於聖人則文人皆無昌黎比者矣黄氏日抄卷五十九
