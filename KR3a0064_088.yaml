body:
  text: 黃氏日抄卷八十八宋黃震撰記撫州重建教授㕔記撫州古名郡至本朝而尤號人物淵藪德業如晏元獻文章如王荆公曾南豐儒學行誼如陸象山兄弟一門之盛其餘彬彬輩出幾不容傴指嘻果孰為之而能爾哉學校漸摩之功於是為大師友淵源之自於是為切凡士大夫為聖天子分任教化之責者於是不容不重加之意矣咸淳七年余叨恩來守是邦始至祗謁先聖仰黌舍之巍如見襟佩之鏘如方為之欣然以慰既而考其實士之得食於學嵗才二十有七日為之師者無所乎寓至僦屋委巷以居師弟子之靣日踈而絃誦之聲以希又為之慨然以思天佑斯文無往不復時則有若吕侯正父以名儒宿望來為通守首籍其核吏卒之蠧以全生員之養士既得日逰於學師豈容不日與之講於學亟訪㕔廨舊地得之學宫東北隅去演道堂不違咫尺於日入而講為尤便蓋前人所以處置之意密矣於是郡博士鄭君初至官即屬其更之新始于十月辛卯成於十二月甲寅數十其楹一旦突兀教養兼備師弟子得以日親君因請為記余曰未也古者飬非飲食之謂在優遊以成其器教非文字之謂在切磨以進其德士今得日遊於學矣茍尚惟飲食以為養師今得日講於學矣茍尚惟文字以為教視前日亦何能大相過且六經之訓具在諸儒之說愈詳夫人能言之而人才反不古若者其故果安在良由利祿之途既開卑陋之習以成有隙必投見利必動其本既非雖學無益或反滋其欺耳夫亦反而求其大者使小者不得而奪乎天生萬物何物非天人為最靈實與天一宇宙吾廣大日月吾精明風雲吾變化飛潜動植吾仁心流動陰陽代謝吾窮達有定士茍以此而為心以此心而為學則亦何卑陋之能溺而實德之不充耶君今棟宇一新幸在此州林巒竒絶處大江橫陳豈無感於夫子所謂不舍晝夜者萬象呈露豈無得於夫子登泰山而小天下者宇宙之廣大在此日月之精明在此風雲之變化在此飛潜動植之自適陰陽代謝之無窮無一不充滿勃鬱於此此其氣象果何如自得當何如君其率先哉士其作興哉先正之彬彬輩出者氣脉其益昌天下國家其有賴而撫之為州其亦永永有光榮哉君名濟字行可金華人司其役者郡之秀士黃中禮咸淳八年壬申正月承議郎權發遣撫州軍州兼管內勸農營田事節制軍馬黃震記撫州金溪縣李氏平糶倉記金溪李君倣朱文公法作社倉咸淳辛未嵗大歉民賴以全活甚衆余嘗為之記使子孫世守李君感其言别捐良田餘二百畝計租凡四百石自壬申嵗為始下時直斗十錢嵗收其直更買田以附益之期至千畝當益下其直永以濟民為平糶倉與社倉對又屬余為記且切切然欲為子孫之戒余高其誼嘉其進善不已而慮民之無窮也觴之酒而為之言曰善乎平之為義乎是豈獨可為君之鄉黨賀正可為君之子孫賀尚何俟訓戒為哉蓋天下之理至於平而不可以有加矣虧盈而益謙者天之平變盈而流謙者地之平害盈而福謙者鬼神之平惡盈而好謙者人道之平裒多益寡稱物平施者君子所以體天地鬼神之心而持其平故賢之於不肖也智之於愚也富之於貧也皆當損有餘以補不足而富之於貧為尤甚故君子順之吉則積而能散滿而不溢不惟我不私其有而人得其平我亦因之得以保其平小人悖之凶則甚愛而大費多藏而厚亡不惟我私其有而人不得其平我亦將由之而失其平故自一時觀之有餘而能損者疑損矣要其久乃所以為益乘其有餘而又求益者疑益矣要其久反所以為損今君有餘粟而能平其糶吾知使鄉之常得其平者君之心也使君之家常得其平者天地鬼神之心也平則無時而不平君之子孫且世享此平矣何俟訓戒為哉因書以遺之使有粟者皆聞風而興起孟子曰人人親其親長其長而天下平余亦曰人人損有餘補不足而天下平咸淳八年壬申正月十八日承議郎權發遣撫州軍州事節制軍馬黃震記撫州靈谷山隱真觀記天開地闢而川流山峙帝興王起而畫野分州各于髙山以定祀典在四方則為嶽在九州則為鎮在諸侯之國則為境內名山是為風氣之聚是為神明之居是為興雲吐霧潤澤萬物民生利賴之所從出故聖人之所事即造化之所在至秦漢始以真仙稱實則不外吾聖人者矣若撫州之髙山其惟靈谷乎靈谷在萬山絶頂隱真觀又在靈谷山絶頂此觀其又祀典之寓者乎咸淳八年秋余勸民種牟麥嘗一到其上道士丘守靜驚喜出迎謂自前太守張于湖後此山猿鶴已百十年間不聞車蓋聲此觀危插半空不堪飄搖摧圮幾盡守靜方一新其居而郡太守適來豈有數耶願為真仙記之也余謂真仙非余所能知然此山為此州之鎮此觀寓此山之祀猶州之祀典也是宜書青冥風露間飛甍縹眇下瞰人寰僅盈一握此絶境也亦宜書世之為琳宫梵宇者依深山密林享安樂爾此獨人跡不到處使世慮毫髮有未除殆不容一朝居而子安之此難能之事也亦宜牽連得書雖然未也頃余此來嗚呼難哉捫蘿踏磴分寸躋攀悔而欲返者數矣俄而登峯造極豁如有得便欲凌風神逰八極士之求道先難而後獲者獨不類此哉守靜大笑曰敢不勉固併請為記守靜能詩好修創此觀者丘佐實其上世其詳見前記云咸淳八年八月朝奉郎知撫州軍州事節制軍馬兼江西提舉黃震記撫州重建擬峴臺記宇宙間奇觀其惟山水之會也哉亦惟水之來者逺而山之截者驟斯為奇也哉江漢東流數千里以相合漢之將合於江而未合尚數百里勢方奔駛豪擊而峴山巋然壓其衝遂為宇宙間一奇觀江漢之南山川磅礴逺自閩廣其來亦數千里乃有盱水北流撫州山城下將數百里以合於江林阜旁簇秀蔚無際而城堞亦巋然壓其衝又為宇宙間一奇觀嘉祐二年太守裴公因作臺其上名之曰擬峴既奇矣又得南豐曾公為之記瑰辭勝概相與發揮模寫形容妙於圖畫其文流布四方人人爭誦如身逰此臺出雲氣而臨風雨凡所謂水之浪波洶湧破山拔木山之蒼顔秀壁巔崖拔出與夫平岡長陸虎豹踞而龍蛇走荒蹊煙樹逰人行旅隱見而斷續者皆可按記坐挹愈奇矣然公惟頌詠此州之樂未嘗有羡于峴山之事也政和元年太守狄公再葺此臺時則有若溪堂謝公又為之記始謂叔子之於峴也悼嵗月之易失憤功烈之未成登山臨水慷慨激昻而鄒湛輩乃進溢美之辭不能贊叔子之决其言憤發抵掌功名期與天壤相敝夫豈與曾公異㫖哉嗚呼是當觀其世也已夫自混沌既判造化融液鍾之則為山川之奇絶孕之則為人物之瑰異登臨嘯詠天者妙合蓋無一非自然而然峴山正不待叔子而後重此臺亦何待擬峴山而後重典午非正南北勢分羊陸區區各私其主此豈盛世事而登山歎息可為佳話耶於皇我宋時至仁祖八荒一域所至皆春遊峴山者自熙然於大江之北逰此臺者自熙然於大江之西裴公之築曽公之記皆不過取形勢相類而言初何羡於彼新法紛更紹述挑釁時至政和何如時也譬之大木枝葉已有害不特本之撥矣謝公以邁往之才處寂寞之濵旁觀默察豈無先見此記特有所託而發固不暇言此州之樂亦豈真有羡於峴山之事哉咸淳七年余承乏此州顧此臺特卑陋不稱其景物屋亦老且壓矣明年乃盡撤而更之高廣皆視昔加倍欄檻一開萬景皆入有無逺弗届之象焉乃方是時襄漢適以捷聞豈有開必先此殆有默為之兆者歟繼自今盡洗楚氛之惡重逰峴首之勝熙然一家吾見復如嘉祐時磨崖頌功朝夕泚筆豈特記此臺之重新而已乎是年九月朔朝奉郎知撫州軍州事節制軍馬兼江西提舉黃震記撫州堰合樓記混沌判而山川列元氣會而魁傑生一太極之妙流行發越於天壤間有此停涵則有此發舒有此山川則有此人物嵩嶽降神生甫及申自昔而然森不容遏逮至我本朝重在科目則又往往應於龍頭之選有開必先形為詩謡者率亦所在而奇驗撫州人物甲天下故老相傳乃亦有謡曰文昌堰合狀元生曰湖衝破狀元生湖在州之南城縣縣今别為建昌軍嵗在丁未湖水果衝破是年張君淵微廷試果第一湖驗則文昌堰之驗必矣堰在城東揚家聶家兩洲間其地正與郡學龍首相宜邇年以來堰忽驟合應如湖豈伊人力也哉時雨將興山川出雲鴈塔先題斷於斯兆余故作危樓百尺於郡學之龍首俯瞰文昌名之曰堰合以應佳兆以作士氣以預為此州曲江宴集之所雖然造化幾年融結國家幾年涵養祖父師友幾年積纍教訓而後得以一介士上膺聖天子親擢鴻臚首唱繞殿雷歡四方人士想望風采下至兒童走卒亦無不駢肩纍足曕望咨嗟金榜一開即指為當世第一流人物於戲宜必有以稱此矣王沂公何人哉豫何人哉咸淳八年太嵗壬申十月丙戌朔朝奉郎知撫州軍州事節制軍馬兼江西提舉四明黃震記趙提幹寶善堂記始余與趙君元父同官行都嘗屬余作梅溪記余固嘉其生長富貴而翛然有出塵之韻矣越五年余官江西元父復自行都走書千里屬余記所謂寶善堂者余又有以占其學之益進為之敬歎不已不止如前日所見而已也蓋嚮以梅溪自名猶不過悅於風月之清今以寶善自名則必能造於義理之粹非篤信好學日盛月新誰能至此余則謂元父此心實已發於自名梅溪之初有因此心之發而又加勉焉則元父之志向尤過人逺矣天下之理無獨必有對有善必有利人性無有不善而夫子猶歎善人吾不得而見者利奪之耳元父以王孫公子之貴處紛華盛麗之地凡世俗之所謂寶粲然其前者何限而獨拳拳以善為寶豈非風月論交一塵不入素有以洗去富貴之習而能爾哉然使終於風月之清而已則拈花弄蘂飲酒賦詩殆亦不過流連光景之樂視沈酣富貴者雖有等差視潜心義理者尚猶有間也乃今真見天下之至貴至寶者皆無以加於吾心之善而寶之殆濂溪周子所謂塵視軒冕芥視珠玉超然獨立物表之意較之東平王為善最樂又將兢兢保守焉則元父進學之功為何如哉詩曰價人維藩大宗維翰而釋者以價為善蓋國之所能强者以大宗而大宗所能為國之強者以有此善元父大宗也以善為寶矣豈惟元父之慶實我宋無疆之慶故恱而為之記咸淳八年冬朝奉郎知撫州軍州事節制軍馬兼江西提舉黃震記繆存齊朝陽書院記東嘉繆侯存齊作室舊廬之東室之東為沼沼之東為江每一晨興日光滉漾因名之曰朝陽書院而千里走價屬余記之且曰吾將終樂于此爾余謂盡乎侯之為學乎夫人心與造化而流通尤於其始初而興起一候蟲時鳥之應一春花秋月之新猶使人之意也消況日為太陽之精而朝為日出之初劃如天開萬象昭蘇人於斯時以旦氣之方清對大明之東生天光內發靈臺虛明陰濁有不期而自清善念有不期而自興儻能由此念念而續日日而新人亦何天之間哉侯之用工于此深矣富貴儻來榮華飄風宜無以易此心之樂者矣然日君象也大昕視朝吾君方將以其明明者照天下精白承休净除陰曀侯獨忘朝陽之鳴乎既承命為記復書此為勉庶幾以其昭昭使人昭昭而朝陽書院之名亦流光無窮也咸淳八年嘉平月朝奉郎知撫州軍州事節制軍馬兼江西提舉黃震記撫州放生亭記我宋之得天下也以仁而維持天下於不壞不泯也亦以仁凡前代嚴刑重斂征行適戍若土木逰幸科取無藝之擾盡絶民心咸洽無所於報每嵗流虹之旦必相率北向縱羽毛鱗介祝聖人夀蓋發於人心之天非有取於異端之說也撫州自天聖二年築放生亭於南湖已三百年頃嵗聚士子讀書湖西山上因或易亭扁曰風雩使得遊息而放生以異端事不得復至余曰若知風雩之說乎雩者禱雨之地非士之居也風乎舞雩者曾㸃想像之言非真有其事也縱㸃嘗風於斯固不以是而廢禱雨奈何今借用其名而遂以廢祝夀乎若放生而命佛者執役此即舞雩巫覡之類且使夷狄亦知尊君云爾衆乃歡請復舊余謂放生於湖可也亭於湖之北南面不可也因别創亭湖之南北面以便北向再拜稽首焉若夫先仁民而後及物無徒以一時羽毛鱗介飛躍為仁而必以平日耕桑隴畝無愁歎為仁是又在任宅生之寄者求其本咸淳九年正月朝奉郎知撫州軍州事節制軍馬兼江西提舉黃震記萬載縣尉衙清心堂記萬載縣尉婁君撫人也余來守撫君已官萬載未有半面雅而書郵絡繹過於平生歡豈臭味之同以余為可語者歟余既叨恩司臬將行君又貽書謂尉廨久摧前尉皆莫之居今始葺之一新扁其堂曰清心願為記余於是益有以覘君之所存凡前此之書郵絡繹非世俗翕翕熱矣然六經無清心之說謂心當養之以清其說方自荀卿始其後荀朂謂省事不如清心宋璟謂清心則庶務可簡是皆惡天下事繁多欲澄其源之所自出直指政本而言之尉居百僚底自朝廷諸司若州縣凡事無不於是乎委事之繁簡夫豈由我而欲清心以省之乎余初筮亦尉吳門事之以非理而來者紛乎如麻余雖不能清心以省之亦嘗清心以應之上惟知有皇天下惟知有百姓惟勢惟貨惟來一非所知此心既清事亦徐就條理由是知清心以省事者制命於上者也清心以應事者承命於下者也尉最卑官法當如是不知余之心亦有合於君之心否姑書所身試者以遺之君名南良戊辰進士云咸淳九年癸酉二月十五日朝奉郎知撫州軍州事節制軍馬新除江西提刑鄞人黃震記建昌軍溢溪橋記盱江為閩廣數十州往來要衝而山水峻急類多川流之阻如湖渡則閩廣所道以至盱者也如溢溪渡則又由旴所道以至行郡者也湖舊無梁以舟為梁每風水驟至輒飄忽摧敗錐舟且不自保至若溢溪則併造舟之梁亦無之自昔州縣長吏思所以利此者已幾年而未之能豈數亦有待歟咸淳七年武學諭涂侯為員外丞始捐俸為倡四方臺郡助者交至甫逾年遂成湖石梁三百尺湖之舊為梁者舟二十有二侯又益之三十有二移置溢溪為浮梁夫然後閩廣之道於盱與夫盱之道而之行都者無一不如履平地古人輔相財成平險阻而濟不通所能配天地稱三才者侯殆庶幾焉非特徒杠輿梁嵗舉政事之常者比也然自昔州縣長吏歷千百年未能舉其一而侯兼備於期月之間豈果數云哉為民一念足以感動雷動響應逺近翕然則雖難而亦易天下事每如此于侯之津梁可類推己夫侯本貟外丞濟民于津梁尚如此推此心也以往他日得其位以道濟斯民其功用又當何如哉石梁已屬省身先生雷公二卿為記又屬余記浮梁姑述其槩如此侯名演撫州宜黃人咸淳九年二月二十四日朝奉郎知撫州軍州事新除江西提刑鄞人黃震記撫州仁夀堂續種梅龍記紹興十九年顯謨李侯為撫州種古梅仁夀堂偃蹇橫出世稱梅龍四方至圖其狀以百越百二十有三年而余來則梅已為閣松蔽日者所萎僅餘根幹在余惜之因擇所云夭矯非閣松可萎者再植之一嵗開秀發穎出駸駸將克肖侯之四世孫南雄使君適僑居於撫喜前人之迹有繼也屬余記之余謂是有可記者存其僅有謹終追逺之義續之新有存亡繼絶之義偃蹇者名揚夭矯者氣伸凡皆於人事有關至若風雨霜露不可一日與地之神氣隔此又足以觀造化然又豈惟此哉造化之妙不驗於假大之日而驗於絶續之幾窮冬沍寒生意幾息一花初白萬宇皆春是梅為天地之仁之發見而仁為造化生生不息之機國家體天地之仁而躋民夀域凡任宅生之寄皆宜知所觀省然則縱目今仁夀之堂此梅實一鑑之存毋但效流連詩酒巡簷索笑咸淳九年癸酉嵗四月四眀黃震記江西提舉司撫州臨汝書院山長㕔記道原於天闡於伏羲傳於堯舜禹湯文武周公而集大成於孔子茍有異於孔子者皆非吾之所謂道矣戰國時楊墨嘗害此道孟子闢之而道以明漢魏以降佛老嘗亂此道韓文公闢之而道又明唐中世以後佛氏始改說心學以蕩此道濂洛諸儒講性理之學以闢之而道益明伊川既沒講濓洛性理之學者反又浸淫於佛氏心學之說晦庵先生復出而加之是正歸之平實而道大明其說雖根柢於無極太極實則歸宿於仁義中正雖探原於陰陽性命實則體驗於躬行踐履雖亦未嘗不主於心實則欲正此心以達之天下國家之用非其他所謂即心是道絶物而立於獨棄實而流於虛也我理宗皇帝是以躋之從祀以表章其學天下學士大夫是以立之書院以誦習其說斯道所係天實為之夫豈人力之所能與於此哉臨汝之有書院創於淳祐九年實江西提舉馮公去疾為之倡書院之有敕額賜於咸淳七年實吏部侍郎曽公淵子為之請是年敕額既頒始創山長實提舉今殿講李公雷奮為之選辟四明黃君翔龍實始膺是選震時為撫州實始建之聽事君因屬余為之記震謂聽事之始末不足記之君之所職為甚重則有不容不記者故書晦庵之所以是正理考之所以表章今皇上之所以賜額建官者使君盡心焉斯道之第第相續以明端於此乎有賴罔俾多士復流於虛以自異吾孔子云咸淳九年癸酉嵗正月吉日朝奉郎知撫州軍州事節制軍馬兼江西提舉黃震謹記撫州臨川縣主學㕔記國有學州有學縣亦莫不有學朝廷之所以教育多士者備矣國學有司成博士官州有教授又有增教縣各創之主學朝廷之所以作成多士者愈詳矣然天下之事莫不以久而盛亦莫不以盛而壞國學自積分出官而士以爭名壞州縣學自職事給俸而士以爭利壞縣學之嵗入能幾自添主學官又與職事爭利租方入廩已空弟子員終嵗無養絃誦之聲遂絶而縣學為尤壞士往往以此竊歎余所至亦往往實見其然及來撫州始見臨川主學鄱陽胡君繼張獨能絶其所謂利者而惟職之振旬有課月有試講明義理躬行身率逺近莫不聞風而至絃誦之聲琅然嗚呼為主學官者不當如是乎朝廷所以創主學者意不在是乎余敬而愛之故為置聽事君命為記余故為書其事使世之為主學者皆知所效法且明天下無不弊之法而興之者存乎人咸淳九年癸酉嵗六月吉日朝奉郎知撫州江南西路提㸃刑獄公事節制軍馬黃震記撫州修造總記開闢至於今日鴻荒化而文明夫豈一日一人之力而能爾哉仰經始之艱難慨繼承之不易茍有一日之責宜何如其盡心矣余來撫州幸承繆侯修城郭一新因續修子城三門再建鼓角樓自是於學校則再建櫺星門修四齊修講堂若門廡創堰合樓置兩教授㕔山長㕔於貢院則再建東廊九間增東北廊十五間堂後過廊三間後堂之後新軒亦三間於公宇則再建放生亭縣丞㕔修尉衙給材石創主學㕔增和糴倉於軍營則建廂禁軍屋五百三間馬步軍三千二間修小教場射亭於亭觀則重建擬峴臺春草亭修愛梅亭拙齊臨川圖畫金玉臺凡南湖亭館於橋道則修崇仁石橋二臨川木橋二十三創黃塘渡東西亭修東路欹傾者於水利則修臨川南湖述陂復宜黃假樂陂復崇仁永豐陂萬金陂浚縣市四十年已堙之圳通二陂咽喉凡豪黠侵陂者復其舊其餘工役尚多力凋未能及已叨除司臬姑志端緒俟來者繼若夫事會無窮根本當護又有大於一日必葺者噫嘻念之咸淳九年春朝奉郎知撫州新除江西提刑黃震記李氏天理堂記撫州李君朋作别墅鳯池之上謂其閣曰人閣謂其堂曰天理堂始余聞而疑焉蓋撫有先儒陸象山嘗言人生堂堂天地間不待他求此人之說所從來也至于天理之說則象山以為非謂理不專屬于天人與天一也君今以人名閣而復以天理名堂若幾於取其一而違其一何耶及君既求上饒徐侯作人閣記貽書復求余記其堂則謂人事之盡即天理所存世亦有人事既盡而天理之感應不可曉如顏跖之夭夀如原憲慶封之貧富雖聖賢莫知其所以然故理窮而後可以歸之數人力盡而後可以責之天終不可以其或然之數而不盡吾當然之理此則名堂之意而願有以發之余讀其來書然後知合人與天理而言皆君自得之說而本非有關於象山之說也然聞人之所得於天以為人者理也人事之既盡而感應之不可必者數也理者君子之所安行數者非君子之所與知古之君子修其在我本非責報於天顔子雖夭原憲雖貧從容乎天理之常去之萬世有餘榮盜跖雖夀慶封雖富顛倒於物欲之私在當時已狗彘不啻如以數言孰得孰失是天下亦無理外之數故君子之學惟知有理而已是理也惟孟子見之明而守之剛故曰人之所以異於禽獸者以其有仁義也又曰仁者人也又曰仁之於父子也義之於君臣也有性焉君子不謂命也孟子之所以卓然為大丈夫富貴不能淫貧賤不能移亦惟知有天之理而數非其所問焉爾而今而後燕居乎天理之堂而深味乎孟子之言則君此心豈不休哉咸淳九年癸酉六月吉日鄞人黃震記清源隱居記金溪何君力學而未遇於世恥沒世而名不稱築室清源內為十景以讀書其間曰志堂期隱居以求其志也曰敬室期以敬為入德之門而暗室屋漏不欺也曰玉淵期修身見於世如玉之潤于淵也曰玲瓏窗期通徹義理曰自在天期不作聰明凡所以寓其警戒自立者已無不備乃為梅邊為竹外以寓目品物之生為默寮為達觀以潜心造化之妙又為清隱吟所于以寄興於吟風弄月之清十景之勝扁題賦咏既盡偉人鴻筆復總名其外曰清源隱居而囑余記其詳余聞士之隱顯無異道而行藏安於所遇故不當必於顯亦不當必於隱世固有無其隙而鑽非其途而趨炙手權門之無益回首田園之己蕪此必於顯者之事固君之所不屑也亦有泉石膏肓煙霞痼疾極意園林以自快忍置閭閻於不恤此必於隱者之事亦豈君之所肯為也惟夫修其在我聽其在天譬之蛟龍蟄藏于淵一旦風雷變化潤澤天下有不知其然而然此則君之事而斯隱也乃所以為顯凡所以寓其警戒自立者既得之矣若夫花竹蕭踈亭院紆餘把酒賦詩聊以自娛此不過夷猶目前爾今君之所吟乃至二千首豈真甘於隱者哉余故願君之反其本也咸淳九年癸酉六月鄞人黃震記饒州重修城記設險所以固國重門所以待暴設為城郭之守蓋自昔有邦有土者急先務況邊庭未寧之日乎然城圮不修所在相望何也事固莫城郭之為急費亦莫城郭之為大自端平開邊調度日煩州郡往往多煎熬雖一公宇之微有力不能葺者而暇城郭之及哉鄱陽古名城其南枕江而波濤日嚙之其北依山而樵牧日踐之嘉定七年史侯定之始修築一新是時邊釁未開郡有餘力其修築見謂堅緻去之三十年猶不免圯闕而故丞相徽國程公為郡時再修則力又有弗前日若者矣況又去之三十年其壞豈不益甚其修豈不益難耶咸淳辛未余友孫侯自吏部出為守以實心行實政凡事靡不從厚獨念城之不容不修而費之無所從出也於是明其賦役而財之隱落者出節其用度而財之滲漏者窒銖積寸纍踰嵗乃就鳩工於壬申臘月之某日竣事於癸酉閏月之某日所修凡十二里計二千三百餘丈內已圮而新築者四百七十五丈女臺再築者二百四十二丈役工三萬一千九百八十有七用錢五十萬用楮幣八萬七千五百有奇繡衣使中齊孟侯助之者一萬二千用米七百五十六石有奇孟侯助之者四十石俄而湖水驟漲如東塔寺之閘口如東邊之閘口如滙澤門之閘口如英烈廟側之暗溝皆苦侵淫侯又為之結洞門增女臺再築以捍水患者凡六十丈其工費又不預焉嗚呼人方困於力之不足而侯獨為之有餘裕世方患於文之相欺而侯獨為之皆確實豈特其才其志為不可及其賢於人又何如哉然侯之賢於人不惟此也易六畫而為乾一陰生其下即為剝畫六斷而為坤一陽生其下即為復天下事皆當於其下焉加意爾始史侯之為是城也為趾用磚才兩其幅今侯之再為此城也其趾用磚至八其幅侯之政先厚下推此可以類見余於侯之為城得為政法併書與世之分牧者共之他如甃石為學堤餘一百丈設舟為浮梁又四十艘工役尚多此不勝書侯名兩炎紹興人功成適以侍左召咸淳九年閠六月吉日朝奉郎北南西路提㸃刑獄公事黃震記奉真道院記松陽縣東可三十里有勝境焉前酉山後龜阜左象湖右卯岡林泉深窈殆不類人間世建炎間有留心寧者居之樂山水之可人而嫌心迹之未稱也捐其居為道寮生子僅一人曰巨濟就令為道士改道寮為奉真道院去之五世有留仁卿者生子亦僅一人曰嗣興又今為道士再生所謂奉真道院相望百五十年異世而相符逺近歡謂此留心寧父子後身也施財而樂助者紛至租之始以石計者增而至百屋之始於因舊者飾而大備月櫺風檻秀出雲霄晨鐘夕磬響振山谷凡所以奉真之具已無不備乃介鄉貢進士葉君從龍走價數百里屬余為之記余惟父子人所親也而舍之田廬人所愛也而捐之凡以闕奉真故也留氏世世於奉真也切矣然則可不考其所謂真者乎蓋古無真之稱至莊列始創真人之名列之於聖人之上而實未始有其人也秦至祖龍始自號真人人固不謂其然唐謂孫思邈為真人要不過以方術稱亦未悉其於聖人何如也人世未見其所謂真而相與指天人以為真曰真仙曰真君曰真宰總而言之曰上真凡今之所奉者此真也然則可不思其真之為義乎真者無妄之名而誠之謂也誠者天之道而至誠者謂之如神此真之名所從得而天神森列通得以真稱也然則奉之者其容有不真乎一言必信一行必謹一念慮必實上真昭昭對越無愧斯其為奉真要不出吾之天真而已必如是而後可以稱山水之清奇可以答逺近之響應可以綿香火於千萬年而無窮余言皆真山靈川后必有聞吾言而感動者咸淳九年癸酉十一月鄞人黃震記怡如堂記余友吳子雲處其弟甚和作一堂日相團欒其間名之曰怡如而俾余志其意蓋欲朝夕觀省使怡怡之樂久而弗失也余謂此以聖人之訓維持本心之良目擊斯存無動弗契尚何余言之待哉然余與子雲友也講明聖訓以相切磋正友朋之責其敢無說以告蓋聞怡如之愛原於父母之天而鮮不移於妻妾外人之惑怡之為言恱樂也人生而幼稚父母並列之膝下均氣同體歡然為一故善事父母者其色謂之怡愈其聲謂之怡聲由其父母之愛而流行於兄弟之間則怡怡其如自然而然所謂原於父母之天者也茍其天也孰得而渝自妻子之言日入則非天矣自日與少年者詡詡笑語遊戲徵逐則非天矣一間言之行一異好之奪天者或不免有時而渝矣然則可不反觀而痛省之乎詩曰妻子好合如鼓瑟琴兄弟既翕和樂且湛此言兄弟之天不渝而後妻子之樂愈怡或人雖密而天者反踈良心一動將蹙然而不自安矣奈何以妻子之私言而渝吾之天耶又曰脊鴒在原兄弟急難每有良朋況也永歎此言其平居相恱似不如交遊之親急難相救終不如兄弟之切反覆觀省良心將有不期而自復矣奈何以少年徵逐而渝吾之天耶子雲兄弟誠能三復於此詩天者安得而渝而其樂豈可量耶雖然未也詩曰此令兄弟綽綽有裕不令兄弟交相為愈此言各盡其在我而無責其在彼也兄或不友弟自不可以不恭弟或不恭兄自不可以不友茍能此道矣雖暌必合雖失必還此則全其天之要者昔橫渠先生嘗釋斯干之詩以式相好矣無相猶矣為但知相愛母相效尤其㫖深矣子雲兄弟怡怡之好方都而余友朋切切偲偲之義不敢不盡且子雲嘗從余讀詩故書以遺之且使世之為兄弟者共聞之咸淳九年癸酉臘月鄞人黃震記餘姚縣重修學記咸淳九年冬金華趙侯為餘姚宰修泮宫成明年春走書屬震曰教化治道之大原庠序教化之先務故董仲舒謂守令為民師帥我朝立法守令亦無不以學事繫銜學校非守令之責而誰責世降以來為令者苦財賦學事往往不暇省朝廷為别設官以主之令益得以諉其責學事反益日以壞如吾邑學廩嵗收五百石有奇公廚至不舉煙學宮至老且壓吾為此懼亟起而身任其事窒蠧節費捐俸以倡學宮前序諸生繼捐廩給以助乃新禮殿增之欄楯乃改兩序以便出入而繪從祀於夾廊使免喧䙝若儀門若講堂若齊廡下至庖湢垣墉一是咸新先賢祠昔之散處者今亦創一堂於東序而合之規模顯設氣象宏大匪惟修舊殆且增飭今而後將與二三子日講習於斯願子有以發其意震惟邑之以餘姚名以其為帝舜舊地也設學校以教人自帝舜命契為司徒始也舜之教人也使父子有親君臣有義夫婦有别長幼有序朋友有信人之所以異於禽獸中國之所以異於夷狄家之所以和國之所以治皆不越此五者今之學古之學也今之教即古之教也今之不古若者何也古無利祿之誘今利祿誘之也然利祿何足以誘我也人之窮達制於天而利祿之有無繫於命不以求而得不以不求而喪吾惟即父子而父子在所親即君臣而君臣在所敬即夫婦即長幼即朋友而各盡其所當然者于以從容乎義理之常而安行吾平生之素茍能此道而大者立矣則課試可也科舉可也亦帝舜敷納以言之遺意未害其為教也雖今猶古也否而真謂利祿可以求而得真謂讀書可為鈎致利祿之具疲其神於破碎之學窮其力於聲韻之文父子君臣夫婦長幼朋友五者之大倫反不知實踐而無愧則雖游於斯息於斯弦誦於斯口談義理皆非其實亦胡取乎學校之教舜之所以始為虞庠者豈若是其然也侯今興學於舜之鄉亦惟以舜命司徒之教人者教人人各以舜之所以教人者自勉曰舜何人哉豫何人哉則旗鸞戾止于魯僖有光矣侯再書來曰是也願因以為記遂書以遺之侯名崇其政稱是邑人併祠之學必有紀其詳者云是年三月十日朝奉郎主管華州雲臺觀黃震記相山㑹靈四仙祠記咸淳七年辛未嵗余方救荒撫州適嵗又旱吏以舊所禱者告則皆淫祀也余曰有是哉改而禱於社稷若境內名山大川之神雨幸輒應然猶未洽惟郡之西南山余望之雲日日興雨氣常暗一方僉謂此相山四仙之靈也旱劇則迎以至余用其言雨均千里明年旱又明年旱禱而雨亦如之每念一履巖巉之上為吾民謝神休未能也一日住山道士羅端英謁余為四仙祠記余惟四仙之靈昭昭也余在撫三年實身被其靈應何幸託名以寄謝忱然聞世之稱仙者謂乘彼白雲至於帝鄉蓋超然於清都紫府鈞天廣樂之居豈常常於此山哉將遺迹固山靈之所呵護耶否則神靈將無往而不在耶又否則今所謂四仙者即山川造化之神耶粵自天開地闢而山川疏列雲興霧吐而民物阜生凡皆山川之神之為傳所謂鬼神者造化之迹也禮所謂有功於民則祀之者也相山在撫州其髙二十有六其周三百有八十里秀矗半天巍絶四望於境內為最巨鎮真神明之所居真造化之所寓今所謂四仙者即造化之神之憑歟我先皇帝理宗詔封四仙真人有曰爾雖超世絶俗而未嘗無愛人利物之心嘻其有見於山川之神之合者矣四仙梅仙福欒仙巴皆漢人鄧仙思瓘葉仙法善皆唐人其始封以紹定四年之九月其加封以端平元年之二月凡皆見於前人之述備矣惟四仙竊意非有外于山川之神靈異竊意非有外於造化之迹此則余所願言使撫之人士繼自今常一其心之所嚮者也初祠在山半禱輒風雷守祠者恐而遷之山絶頂晨香夕燈登陟亦良苦世猶以其有百姓秋報之微利動思奪而取之星冠鶴氅之流常不得寧厥居余觀古者典祠山川世世不易如姜氏之於四嶽自五帝至三代猶存此無他誠積之久則神應之速也敢併書之以告後之長民者庶幾為吾民常主張是謹記虛白觀記咸淳十年甲戌嵗乃九月甲戌朔奉化縣虛白觀住山道士吳葆真介禮部正奏名林君心源父屬余記修繕云觀始於唐葉天師天師日講度人經有龎眉藜校者日至聽講察之鎮亭山龍王也因告以境內民渴水盍救諸是夕平地忽清渠開民用均濟至今號仙師渠此觀所不容不修而葆真所盡心者宜書余曰審如是固宜書雖然未也若知觀所以名虛白歟乃祖有言虛室生白此言虛扄內融一塵不染固道家清净之初說也法術靈驗近昉漢唐與其于靈異孰若于虛白為宜書雖然猶未也虛白于心言也心具衆理理貫萬事古之正其心者正將明其理推以濟人利物若徒虛白自潔世將安仰亦必講經果可度人得水果可濟衆以虛白為本以惠利為用合二者始宜書林石曰然其書之哉乃歌以書之曰觀始開元唐末中廢元祐復興紹興善繼景定庚申吳師葆真撤而老屋一是又新中崇三清旁祠東嶽外及三門如天花落其何能然刻苦公勤資財悉捐細大必親然所謂道匪徒輪奐虛白昭揭仙渠輸灌亂曰逺蹤爾祖虛而白兮近則仙師濟而博兮於萬斯年是即觀之丹雘兮寶慶院新建觀音殿記青林山寶慶院創自開禧丙寅詎今德祐改元已七十年中更大參攻愧樓公題其額中書厚齊王公記其事凡所以恢張藻飾之者已極名勝之選他不俟贅辭矣主僧曇華新造觀音殿成介進士虞君亨父復請余為之記是豈可已而不已者哉蓋聞佛氏以寂滅為教凡吾耳目口鼻四肢百骸之身與吾父母妻子君臣上下之倫及吾耕食鑿飲生産作業凡所藉以資生之具盡欲屏絶之故樹下不敢三宿恐成恩愛惟行道乞食以畢餘生一般涅槃了無所有此寂滅之說也後之為佛者不能盡然仍奉飬以愛色身仍眷聚以代骨肉仍頭首綱維以效君臣上下仍田以食仍室以居視世俗殆無以異甚者視世俗反加侈大往往與寂滅之說正相背馳故人或得而議其後惟觀音之在佛氏號稱大慈大悲水旱必於此禱疾痛必於此告凡有求而不獲者必於此依歸名以靈感人不敢議故僧廬佛屋千窗萬宇必待觀音殿成然後稱大備蓋今佛氏之號召人心莫切於觀音矣然感人必以其身修身必以其實其或迹自迹心自心崇飾自崇飾作為自作為觀音自觀音而我自我則觀音於我何有哉是必真不殺真不貪真不嗔真不作諸惡真能大慈大悲如觀音以勸里之人皆不殺皆不貪皆不嗔皆不作諸惡皆能大慈大悲如觀音則觀音不在觀音而在我不在我而在衆善人之心譬之一水一眼一日一月千水千眼千日千月處處應現無非觀音豈必真珠纓絡像設於净瓶岩石之間者為觀音夫然後水旱禱必應痛苦祝必瘳凡有求者求必獲是信乎其靈感是信乎足為佛氏解後議是信乎可無負今日建觀音殿之初意雖然亦豈待他求而可哉慈悲即吾心一念之仁在反求而廣充之爾德祐改元年正月十三日潺浦廟記古者之制尊天而親地夫惟尊天故惟天子得以祀之夫惟親地故自天子至諸侯至卿大夫之有采邑至民庶之為閭里者無不得祀之地者生財土者吐萬物民人朝夕之所親見終身之所賴以生活故春祈秋報惟社為親古者祠以壇則謂之里社今者祠以屋則謂之社廟其為社一也且豈惟一里之中有社雖一家之中亦有社古祭中霤今祭土地是也是以凡荒蹊野町之中古木樛枝之下雖獨屋蕞然香爐冷絶而其制則源於先王本於典禮關於民命大矣後世淫祠崛興威福恐動凡兒女其識而公侯其躬者往往代之張皇為之陳請封典朝下儀物夕備廟貌赫奕金碧交輝世俗以此而下視社廟不啻樓臺將相家之於窮簷處士其勢之相絶亦甚矣然自有識者觀之果孰是孰非耶一佛法入中國民俗之所傾信社廟多借重而附入之崇飾張大各極其力之所至理之正雖無外假而勢之弱賴以少支慈溪縣潺浦廟里社也里人徐氏世好善世主張此廟從而增之佛屋因民心之所傾信而順導之棟宇翬飛閭巷輻湊幾與世之所謂寺院埓而淫祠不敢爭衡焉顧不壯哉而世未有發其義者余友虞君亨父屬余為記因書其說以授之繼自今里之人以里社為親其正而主之歟余罔敢知以佛氏為尊其盛而主之歟余罔敢知以佛說之絶惡修善滋里社之祐民育物而合之一歟余亦罔敢知徐氏主張是必有見於是者幸以告里之人而懌焉若徐氏之捐財助建代不乏人請各刻之碑之陰庶幾與之無窮亦庶幾繼之者亦與之無窮德祐改元正月十三日黃氏日抄卷八十八
