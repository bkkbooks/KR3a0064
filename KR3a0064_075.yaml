body:
  text: 黃氏日抄卷七十五宋黃震撰申明六第八任知撫州咸淳七年四月十三日到任乞借舊和糴賑糴并寬减將來和糴申省狀照對撫州去歲大荒本州失於申聞以致綱解無措民食愈難近荷公朝特發義米本州又係常平置司之地歲歲先已承其撥糶盡絶目今餓莩滿野救濟無方若不據實哀鳴豈不上孤聖朝牧養之寄契勘本州見今並無粒米獨有咸淳五年分和糴米三萬石樁貯未運區區欲望鈞慈借撥一萬石發糶救荒即容少俟七月早禾才熟作急糴還庶幾義米雖已無而他米尚有繼飢民不失望而軍餉亦無妨又本州和糴𣲖數不滿五萬石本州近有談胡三鄒及阿鄭沒官田租共三萬二千石見充軍餉與浙西公租等已足當和糴數之大半區區併望鈞慈權將見今六年分和糴難催一萬七千石寬期兩月候秋成催足劄江西轉運司照應仍將今後七年分糴數痛減一年以蘇大歉後民力其於根本實非小補乞照應咸淳六年和糴申省狀照對七月初九日準江西運司牒備繳尚書省劄子謂本州乞將咸淳六年和糴未足米一萬七千石寬限秋成而運司申諸郡並已糴足入敖分曉則撫州亦已糴足不必候秋成某契勘本州和糴例是前後拖壓從來不曾有當年糴足之米如咸淳三年催未足尚有四百單七石二斗二升四年催未足尚有八百四十六石二斗一升五年催未足尚有一千二百三十二石二斗二升去年即係咸淳六年適當大旱早禾晚禾並無顆粒收成本州不曽申荒以致例派和糴其已前糴到三萬餘石或是上户有積年之米或是中下户轉糴他處之米無中求有怨聲徹天其為難催不言可想安有預先糴足反攙過已前年分之理及某四月十三日到郡此時事已築底徒有行移更無納數所以仰體公朝救荒寬民之意據實哀籲蒙賜寬恩容俟秋成當來若不乞待秋成則青黃不交之月亦决無顆粒可催徒重民怨今來運司總申以諸郡糴足例亦以為本州亦已糴足及行挨究乃知今春權郡曽繳申諸縣抱足之數遂致誤以抱足為糴足耳痛念本州已連歉三歲至去秋而劇人民餓死不可勝計六月以來又值亢陽雖賴公朝如天之福七月初二初三兩日得雨而得雨已遲早禾多損晚稻未保所有前件乞候秋成糴足之米尚凜乎未知所措又安得有不必候秋成之事所合􅅹忱控申區區欲望鈞慈矜察本州權郡元申運司止是繳諸縣抱足之數即不曽有本州糴足之實特賜寬假行下去後如有毫髮異同甘伏欺罔朝廷之罪乞照户部元行折絹錢抱解申省狀照對某四月十三日到郡倉庫並空餓莩無數方極痛惻倣徨無措乃有户部專人守催增解折絹錢未幾又有户部别項專人於多催折價未打算之間再改催本色竊照户部宣限之急人誰不知敬體要皆自有元額今額外驟增於荒歲而改催又行於已折正緣撫州去天稍逺户部不見撫州苦惱耳除已􅅹忱哀告為百姓請命於户部外謹具州民之急上瀆公朝之聽契勘本州歲解絹三萬二千二百八匹例解本色二萬一千匹自餘一萬一千二百八匹多是畸零凑納折解價錢近金部朱郎中為撫州之日每匹折解十八界官會二十四貫故籍猶在今年荒歲民不聊生忽準户部行下驟增作四十二貫一匹前知郡繆監丞力為百姓申控户部尚欲作三十七貫一匹遂至人户不納州郡無解坐成擔閣徒見稽違此驟增之事甚難又契勘本州見行折解每匹三十貫已解二十七萬貫所缺六萬六千二百貫有竒繆知郡以户部命嚴曽增作三十二貫紐計增數亦止缺八萬八千六百貫有竒今户部已收二十七萬折價之數又改催本色見今本州餓死者十七八蠶桑之事盡絶惟有空屋荒野見之心酸淚墮更於何處催絹此改催之事又難某承乏支郡於户部有命何敢不拜承唯謹實緣郡凋歲歉公私皆可哀痛幸而撫州實金部棠陰舊地又金部先文公所至州郡無不控申朝廷蠲減財賦舊額必蒙矜軫區區欲望鈞慈劄户部照應劄本州遵守許從繆知郡已申係每匹作三十二貫容某作急促辦零缺錢八萬八十餘貫抱認解足庶幾上下明白綱解早辦下情不勝激切俯伏俟命之至乞指揮提舉司令本州糴還已糴義米申省照對本州近蒙朝㫖將景定五年至咸淳三年義米一萬一千四百五石二斗八升賑糴飢民契勘本州先已節次承提舉司前官行下發糴及賑散並無顆粒見在今具支糴年月數目繳申見到外自某到任忽承主管官備提舉司行下令本州將有管米對易發糶蓋欲應朝廷前項賑糶之命也某契勘除前項咸淳三年以前米無見管外其四年五年米五千七百單二石六斗四升亦曽承提舉司行下支過米三百六十一石二斗七升半充賑糶民户及又支米三十四石六斗五升半支散乞丐見存止管五千三百單六石七斗一升已於咸淳六年八月十五日承提舉司備奉省劄撥充荆湖軍餉比科降一萬石數除崇仁宜黃兩縣共起四千石本州合起六千石若將見樁管五千三百單六石七斗一升半尚少起運米六百九十三石二斗九升未有可湊此外止有六年見管米二千八百五十一石三斗二升提舉司所謂對易撥糶者恐指此米然朝㫖令糶咸淳三年以前之米而提舉司令對易咸淳六年之米既未明準省劄指揮某固决不敢輕易奉行但一項據州司呈今年二月二十九日係某未到任之前承提舉司前任常平幹官行下令將元糶米錢收糴米斛湊元數樁管拖照提舉司元行下糶米係每升收八錢其提舉司令賑散乞丐不收分文者不預焉算自景定五年至咸淳三年見管糶義米錢止實計四千九百九十三貫六百五十七文省今本州自去年八月米貴至今春價已十倍於八錢之數近方荷富室出糶每升亦不下五十餘錢其减至四十錢者乃富室從勸情願賑糶之數非市價可官糴者今本州若依時價收糴則昔賤今貴義米元額頓虧誰任其咎若依提舉司元糶八錢一升收糴則决無就糶之人荒歲恐徒成煩擾此項本州未知所以上應提舉司之命所合具申公朝乞明賜指揮行下以慿遵守施行乞將提舉司借事軍人自今輪替申省狀照對本州今年五月初二日夜有本州軍人在街市作過先將某人打碎其家尋又捉縛遍處迎拽討閙街市夜深方定繼即詢問係是借事在常平提幹㕔充散畨之人從來本州破落買刺軍糧即計會提舉司竄身挾勢作過不一酒醉輒炒日久漸滋本州不得而問故其弊如此某驚怪以為此豈細事而可滋長即牒提幹㕔乞行替換否者申朝廷矣隨荷提幹賢明發回替換某遂將犯人勒管營契勘將為首人黃宣决交脊一百押下本營著役餘黨並免根治已相安訖然事因其萌當絶其根患因其微當思其大本州軍人之借事提舉司者以數百計非獨今此提幹㕔作過之數輩而已也此曹本皆無賴惡少一從刺軍即計會牒取而去終其身不復回本州惟頡頑恣睢以虐百姓以擾城市以陵駕州縣投鼠忌器叱犬妨主監司在上人無敢吐氣惡習已熟長此安窮某區區鄙見竊謂州郡之差軍人祗役於監司者分也軍人之服役歲有差替自漢唐及今雖邊防皆然者法也本州前此失於舉行遂致此曹名挂軍籍身倚監司社鼠城狐永無忌憚且不惟擾街市為然也提舉司例差本州兩獄推司一任一修衙宇敲撲罪囚塗染窗户事已不忍言矣本司借事軍人日日視推吏到司修衙比同押下罪人羅織萬狀此正惟不曽輪畨而然也若輪畨則軍人視州吏為家人矣且亦不惟於本州為然也建昌軍黎通判近準帥司備奉省札到本州揀軍數內惟借事提舉司之軍無一肯赴㸃云我監司人也不屬州郡因無州郡併忽朝㫖是又惟不曽輪畨而然也若輪畨則軍人視此身為在尺籍矣區區欲望鈞慈許容本州每年輪差軍人到提舉司祗直仍從提舉司發下一名換一名以變前此久據監司倚勢莫懲之患不惟消弭亂萌永安州境此曹皆惡少有才若輪歸本州教習武藝移其為冦之習以為禦冦之備其於整軍閒暇亦非小補如䝉矜允乞札本州遵守併札提舉司照應乞照應本州已監勒饒縣尉貸社倉申省狀照對本州今嵗米貴民多餓死極救無具言之痛心所藉者惟勸糶耳而勸糶亦有難行者寄居前榖城縣尉饒立積米纍巨萬而性吝嗇其餘中户尚從勸糶惟此第一出等戶獨不從勸糶凡其回報皆是相欺某自揣人微固難以必巨室之聽最是饒縣尉遍撫州諸邑鄉落積租皆有社倉豐年樂歲多取貸息及今荒年算計目今米貴將來得息而或價傾恐反失利遂一粒不貸惟深其扄鐍以待客販以此民怨入骨哀訴滿庭某謂社倉正為荒年設也今乃豐年民不願貸反抑貸以取其息荒年民正仰貸忍負賴以視其死此於救荒關係最大且社倉本以春貸今已中夏又豈容少緩者但勸之雖切藐無報應縣尉若儘雄據則社倉終於不貸遂不免請上饒縣尉留之倉㕔分項差官四出監貸而所差同官以及州縣吏卒乃蹙頞相弔謂饒宅威制一州今若行此禍且立至或叩頭乞免至於垂泣某竊念此事某實自為之萬一果纍同官於心何忍所合先次申聞乞賜照應或將來饒縣尉果有詞訴及或買人游說中傷某願身坐其罪無以及同官不勝願幸某此止為救荒一事而發其饒縣尉居鄉過惡亦不敢併及以孤初到官安富恤貧之約五月十五日雨暘申省狀照對本州自五月初二日以後無雨初九日某出視東門歸自南門周行田間十餘里田多龜坼又所差勸糶官歸自外邑面問亦云田水多乾蓋本州半月之間僅得片時之雨其乾涸可知某見今救荒凜乎不勝將來之懼於五月十五日先此申聞七月初九日雨暘申省狀照對本州五月六月雨暘細大已節次具申外至七月初一日天陰初二日方得雨初三日又雨繼此雖即復晴而兩日雨勢頗覺雱霈早禾賴此多有得熟者仰藉聖朝盛德格天之賜逺民或可更生感荷無極但六月內旱乾日久㬠損處多得雨既遲不為全熟若晚禾乃是頑苗被㬠得雨再蘇尚須將來之雨方可望熟見今不敢一日忘憂所合先將七月上旬兩日內得雨之實申聞者七月二十一日雨暘申省狀照對本州七月上旬雨暘已具接續申聞外再自十一日至二十一日一旬並不得雨蓋自六月初三日有雨亢旱一月至七月初二初三而後得雨早禾雖賴以有收自七月初三以後又復兼旬無雨晚禾凜乎可慮本州早禾少而晚禾多關係非小省某不德疪政所致不敢隱蔽所合據實申聞者七月十五日荒政結局申省自劾狀照對某一介晚出資望俱淺忽叨誤渥俾以權發遣撫州控避無門黽勉祗懼亦願俯竭駑駘之力以兾仰答乾坤之造其奈力小任重運掉不行年饑郡凋措置無䇿最是到郡出榜誓欲安富恤貧今乃勸糶未孚之先深村餓死者衆是貧者既不能盡恤差官發廩者數家申省䝉施行者一家是富者亦不能盡安下負初心上孤隆委兹當七月十五日荒政結局謹自列罪狀申聞欲望鈞慈特賜敷奏將某速行罷斥以謝一州之民下情不勝惶恐俯伏俟命之至八月初一日以運司牒派和糴申省狀照對本州連歉三歲至去秋而劇人民餓死甚衆某今夏到官屢次親行阡陌見田之不耕與耕而不種種而不耘往往至於荒棄者甚多又自六月初三日以後至七月初二日整整一月無雨早禾晒損尤多再自七月初三日以後至當月二十三日整整二十日無雨晚禾晒損亦多凡其飢荒之狀雨暘之實並已節次申聞公朝照應分明八月初一日忽準江西轉運司牒報派本州和糴米七萬二千五百石命出公朝事關軍餉凡在州縣所當竭力遵體但念江西十一州去歲惟本州之旱為最甚已空無蓋藏今歲惟本州之雨為最遲又獨無全熟今夏仰荷鈞慈矜念民瘼將去嵗和糴米一萬七千餘石留在今秋糴還此又本州所獨有而他州所無之舊債今若更與其他全熟無舊缺州郡一體和糴將何從來兼念本州有沒官三鄒莊談胡莊阿鄭莊米三萬餘石見充軍餉與浙西公租代和糴充軍餉事體正同更加以今秋糴還去年和糴一萬七千餘石是本州今秋已共成五萬餘石上應軍餉比之常年派糴實數已自滿足無虧所合據實控申欲望鈞慈特賜劄下江西轉運司徑於其他得熟十州均派本州百姓實拜更生之造所有某試政多疲禱雨不應以致年榖不全熟無以盡應運司派糴之罪乞賜鈞判檢照屢申闕雨待罪之狀早賜罷斥施行八月二十八日再申省狀照對本州近因大荒今年四月內具申公朝乞將去年和糴米一萬七千餘石留待今年秋熟并將今年和糴痛减已恭準省劄照應訖近承江西轉運司敷派本州今年和糴米七萬二千五百石事關軍餉所願一一遵體但本州去歲之旱比江西諸郡最甚今歲之雨比江西諸郡最遲早禾晚禾並被曬損節節具申公朝有案今既有去年留下未糴米一萬七千餘石及合糴還嘗撥借和糴充賑糶米一萬石若比其他無宿逋而得全熟之郡又不分高下一體分派使糴七萬二千五百石則是本州管糴十萬餘石不惟不减於他州反多於他州矣州縣雖竭力奉行人户何緣應命恐催不及數徒誤指揮欲望鈞慈拖照元申劄下江西轉運司特賜通融那减容本州據實督糴公私兩便乞推賞賑糶上户申省狀照對某今年四月十三日方到任倉猝勸分罕有應令亟謀之寓公故老皆謂宜申朝省許以賞格緣某偏州望行在路逺往回動跨兩月難救一時之急只得權宜且申且榜稅家信服聖朝恩意之素遂得即時濟糶民獲更生皆賴朝廷之賜今荒政久已結局某自懼先來擅便未敢再狀申明而被濟户之陳詞提督官之申述皆求踐約以信方來事關民命理難抑遏今除謀登仕世濟慈惠賑糶數多未肯自言總數容續申外謹先將糶濟過一萬石以上人户曽經本縣再三勘會保明得實者開列後項端拜申聞區區欲望鈞慈赦某路逺不及先申待報之罪録人户確信公朝出粟救民之功特賜敷奏等第推賞庶幾好誼之家聞風知勸小民將來永永有賴某與州民實拜隆天厚地之造須至申聞者宜黃縣談都倉户待補國學生談槐縣糶鄉糶城糶并近城上下糶過米共三萬四千六百一十七石又談巡轄户待補國學生談縣糶鄉糶城糶并近城上下糶過米共三萬一千二百一十七石樂安縣學生黃與孫以平甫為户本户并諸莊共糶過米一萬三千石金溪縣危運幹本户自糶米八千四百餘石并勸諭諸鄉上户糶過米一萬七千餘石未據本縣保明申到臨川縣甲晏登仕時可糶過穀八千九百餘石米三千八十石咸淳八年六月十六日乞减和糴申省狀照對三邊未撤戍和糴不可免歲敷七萬石本州不敢辭但有民情合行申控本州有沒官田號三鄒莊談胡莊比同浙西官田歲收官租三萬一千八百石有竒見充湖廣軍餉又有阿鄭莊三千一百石有竒見準安邊所樁管候充軍餉以上共計三萬五千來石不煩和糴之費足代和糴之實分明今又仍敷七萬二千五百石則合此兩者是本州於上供外又歲辦邊餉近十一萬石矣官租既增和糴不减四邑山田何從取足譬之舟之載物非力勝矣以故自咸淳三年四年以後至今零缺尚難催理州境無所從出可以槩見若不改圖後必築底不惟無補糴數亦且有費糴本今來秋成在望和糴又近所合預期申聞欲望公朝特賜矜察劄下江西轉運使司將本州官租見今充餉之數準入和糴準備充餉之數却將本州派外畸零之數均之無官租而多富室之各州庶幾朝廷之元糴無虧而本州之實糴可辦闔郡生靈實拜隆天厚地公平無極之造特薦撫州州學教授程紹開奏狀照對薦賢助國臣子報上之至忠舉爾所知聖門引類之要說臣非才試郡蔑補分毫惟有薦員必先焚香告天然後望闕拜發不敢一毫茍徇人情庶幾報稱之萬一今有舉員已足於日前而滿替適當於今日其人表表知其真足有用者不敢不特以名聞竊見從事郎撫州州學教授程紹開天資端恪學力深醇初為太學諸生值故丞相丁大全之私人沈翥為學官欲招致之紹開却其聘幣不就月試終丁大全當國之日退而閉户家居此足以占其操守及其以舍法出身又試中龍飛乙科法合注授職官差遣紹開獨退就冷官怡然以讀書講誦為樂此足以占其恬退及其在任三年率以躬行勤於講授政教兼舉士人無不悅服此足以占其處事之才家本儒酸且無關郡政而去年撫州飢歉能捐俸傾囊以賑其民此足以占其及物之志夫其操守有素恬退不求而又有才有志使其獲用必能有益用敢具以實聞伏望聖慈特賜録用將來或有不稱臣甘伏誣罔之罪乞省罷曽田寨申省狀照對本州害民之事莫甚於寨兵蓋其一得文移即三五十人羅列兵器劫掠村保久成風俗雖痛治而莫之懲某自到任以來雖力節妄詞不敢授此曹以毒民之柄而在外邑者終不能盡禁最是樂安縣去州極逺尤照料之所不及事無大小寨兵必囑縣吏脫差入鄉一畨搶劫之餘即三分其利寨兵縣吏與寨官各分其一既有定例無事不然今除一面委官行縣訪民疾苦謀所以禁絶外然禁其弊不若絶其根契勘樂安一縣而有三寨其一在縣名縣寨其一在吉州永豐縣界首名招攜寨其一在近縣十五里名曽田寨某竊詳永豐多盜前人立招攜寨所以禦盜有害有利不可輕去若縣郭既有尉司而又有縣寨已自不必然無寨官而主以知縣則尚可檢防獨曽田寨置立於民社煙火相安之地而肆於州縣耳目不及之鄉委有十分之害初無一毫之益合行省罷分明不免詳具申聞欲望公朝特賜敷奏將曽田寨省罷將寨兵少壯者入充本縣弓手手力將見任曽田寨官保義郎解順改填本州兵馬都監見闕蓋都監已十餘年無正官前此皆是寅緣權攝某不差權攝而以正任稅官兼之終是事難兼辦又解保義到官方新擾民弊端不在其手小官逺役一旦省罷情亦可念庶幾兩便仍下吏部照應施行某僣躐控申不勝皇懼俯伏俟命之至乞省罷宜黃縣監酒申省狀此狀七年六月初二日照對某近因民詞訴寄居饒縣尉不貸社倉遂分州縣見任同官到處索薄監貸人人皆能盡心數內巡轄遞鋪官宜天麒斥去饒縣尉暮夜之金尤為振職獨添差宜黃縣不釐務監酒權北廂監押趙與埛私受饒縣尉計置官會一千八百貫將所分航步等三倉不盡行監貸縱容倉幹搬販出界又敢詐取貸户每名三十七文此項計贓尤多契勘趙與埛寅緣權攝已三更郡守而不去聞前後私受白狀擾人不一近者寄居樂縣尉運米入城應糶本州方令趙與埛監視頃刻之間即詐取樂縣尉幹人官會四十八貫又欺詐㪷子酒食鞭之五十下於此而猶忍為此則他可知矣前項贓數並係將廂吏親隨根究引對趙與埛供認入已實數分明本州除已將廂吏親隨斷訖編管外所有趙與埛因監貸監糶非法取受情罪所合具申公朝取自指揮施行仍乞鈞慈將宜黃縣添差無用監酒一員省罷下部照應永不作闕須至申聞者申湖廣總所暫借樁撥義米狀照對某偶叨誤渥救荒撫州已於四月十三日到州領事見得餓莩滿野而富室閉糶綱解積缺而倉庫並空兩皆無可措手之地他州猶有義米獨撫州在倉司臺治之下歲歲係倉司糶盡不留顆粒他州猶有麥熟獨撫州風土應大麥小麥並不曾種顆粒他州猶可申撥上供獨撫州盡發荆湖軍餉又無顆粒可以申乞叩地呼天某與一州百姓並無求生之路尋契勘得本州曽準朝㫖樁撥義倉米一萬石充荆湖總所糧運係未曽裝打之數軍餉之急固尤急於民飢而軍餉之多非獨藉於此數凡本州綱運上屬使所者次第積壓率是今年運去之綱如前件萬石綱運之發勢亦在六月早禾已熟之後與其樁貯而待未發之軍儲孰若暫借以救垂絶之民命容照使所見行綱缺每石折錢一十五貫例目今糶錢申納如䝉矜念曲賜允從則本州得此萬石官米為倡而富室之閉糶者無敢不出是一州數十萬生靈皆拜使所再生之造且此米元以義名亦得允蹈其實而於使所軍餉亦初無妨也某亦事急僣越冒死為百姓一言下情不勝皇懼拱俟威命之至回申總領所照應那撥義米狀六月十三日準湖廣總所牒州照應令本州徑自申提舉司令那撥所起運義米一萬石應副本州救荒却提倉司别撥一項窠名填還本所差人取運事州司仰感存恤本州人命之意但提舉司止有此項義米别無他項窠名米斛可以移兊本州已與拜賜一般不敢别有紊煩所合具申欲乞鈞判照應申諸監司乞給照由付詞人赴所屬官司投到理對公事理對狀照對某自四月十三日到任日夕救荒未暇他及自五月初一日方那暇隙㸃對前政元行公事數內多有本州人户越經諸司而詞主經年不到徒勞上司檢舉元詞督責違慢者匣牒居半某竊以為此皆本州官吏之罪耳某每見朝省臺部以及所在諸司凡送下州縣詞訴必待詞主出官而後施行門示三日詞主不到則繳回元牒此定格也州郡之事監司如子孫之事祖父每事當以情告奈何本州受上司委送有其狀而無其人不即申州輕與施行此等豈惟根括無地不勝鄉井之隳突亦恐行遣落空徒損上臺之威重謂非本州官吏不以情告之罪而誰罪哉某除截自今始每項不曾有詞主者並與住行據實回申外區區欲望台慈察民俗珥筆之多虛念今歲飢荒之良苦凡遇詞訴即給照由除程寬限五日令赴所送官司投到理對出五日而不到者並許所委官司繳回元詞蓋公牒之自遞鋪來者其到遲詞主之徑自回來者其到速若公牒詞狀先到而詞人反遲五日不到若非理虛不可到官即是詭名規害所怨此等若與遏而不行豈惟田里獲安豈惟上臺得體竊意民俗亦將自此歸厚矣某支壘屬吏冒犯威嚴下情不勝皇恐俯伏俟命之至申轉運司乞免派和糴狀照對本州近準使牒分派和糴米七萬二千五百石若以本路分州而論派數已極均平况命出公朝事關軍餉本州即當趣糴唯謹但有民情不容不亟亟申籲於二天明照之下首乞垂察本州頃三歲連旱至去秋而劇今春貴糴米升百錢人多餓死田多荒白此某親行阡陌得之目見分明又今年六月初三日以後至七月初二日方得雨中間整整一月枯旱早禾之晒損甚多再自七月初四日以後至二十三日方得雨中間復整整二十日枯旱晚禾之晒損又多凡皆某不德致旱有罪不敢自蔽已按旬據實節節申尚書省乞行罷斥分明夫以去年之旱江西十一州既惟本州獨甚今年之雨江西十一州又惟本州獨遲見今民命未蘇生意如髮乃有省劄寬限未催去年和糴米一萬七千餘石有合催三鄒莊談胡莊阿鄭莊代和糴見充軍餉米三萬餘石有合糴還撥借賑糶五年分和糶米一萬石略計今年本州取於百姓以充軍餉者已當六萬餘石是通成十四萬石矣此本州自古豐年所無之數况今年飢困之餘乎用敢詳述民情以聞區區欲望台慈矜本州之禾獨損念糴還元數已多將前項敷糴本州之米分派於其他有全熟無宿缺之州此衆擎易舉之事而稱物平施之道也下情不勝為州民激切皇懼拱俟恩命之至回申轉運司訪求凋邑利病狀四月二十一日未時伏準使牒備坐吏部符行下各州講求凋邑利病某照得邑之所以凋者財賦折陷也財賦所以折陷者大家飛走苗額雖其見管者亦不納也選材為令使其起此凋弊必自理財正辭始此事一行輕則縣吏必被大家以催苗為詐贓而脫訴於監司重則縣令必被大家以催苗為虐政而飛語於中朝凡縣令之以才選者率墮陷穽無救於凋邑之弊而適足以催折方進之人才耳惟有一等庸人姑息架漏求滿歲月每一綱解之急不過重催抑納預借白撰以救目前以故小民日以困根本日以壞而大農日以告匱州縣日以煎熬言之令人於邑蓋困百小民以重催小民力不能訴而上不知催一大家以正賦大家力足撼搖而禍立至人多愛身勢必至此某人微位下不問不敢對狂妄之罪惟上臺矜赦申提刑司乞免黃勇死罪狀照對本州五月初六日恭準使牒結斷陳王孫被死將黃勇重杖處死事此事元係衆手行打致死今按法以致命痕定償命罪於法固無不合然使牒尚許今聚㕔引上罪囚審問人情來厯如無異同方可施行有以仰見使臺欽恤之仁欲於定法之後更詳酌其情以參之也於此若不盡心則是有負使令某竊照陳王孫元係為首結聚四十四名擾害傷人之凶賊也其徒四十三名皆已就罪陳王孫正係賊首已經結定捶折手足之罪反以死申而逃連纍官司都保鄰里苦不可言甚至承捕弓卒决脊者三其居鄉也既傷人其逃走也又纍人故其一旦復歸皆有為衆除害之心黃勇者乃承官差隨衆追捕之人為之首者則是到官已死人楊十其驗腦邊一㾗為要害處今詳元體究官與上臺擬筆皆稱月色朦朧中羣然重壘亂打不獨黃勇一人然則黃勇之情尚可有審議者陳王孫雖被死係是傷人犯罪逋逃申稱已死之人曲在死者一也黃勇係官兵隨衆承捕非私鬭故殺者比二也元體究官謂亂傷致死合與分罪三也在法捕罪人內已傷若已殺為從各罪致死者减等四也陳王孫害人者也其死衆皆恱之黃勇隨衆除害者也若死衆必憐之古者刑人於市與衆共棄衆情所在不可不察五也因陳王孫之事瘐死者已兩人若又償命者一人黥配者二人决脊者四人則已死之凶徒反為幸而州縣官司若遣追捕恐無敢向前事有關係六也今謹仰體上臺詳刑之意遵照申聞如沐台慈再賜詳議行下不勝幸甚申提刑司平反王定寃獄狀使判王定之為重囚一郡稱寃非特王定稱屈其妻訴寃而已也司户平反胡百二招供此衆囚之所同一郡稱快之事也當職人微望輕致臺幕之疑逺追二十一人一千里就道此皆當職之罪然前輩小官抱案與長官爭獄者甚多若當職避嫌不為一言是上負提刑使臺之仁明下負此二十一人之青望矣其言到人已供證者除奉臺幕疏駁之外其方準上臺添追續到之人請本州僉㕔衆官喚上各令面供一次任其一出本情或同或異並行備申上臺以備采擇申安撫司乞撥白蓮堂田産充和糴莊照對本州苦和糴為諸郡之最甚達尊開鄉閫實千載之竒逢幸有救助之機敢申衆籲之請大江以西隆興吉州等處皆平原大野産米居多惟本州與建昌為山郡又本州除樂安在萬山上不預和糴外其實系和糴者惟四縣建昌之係和糴者亦四縣建昌和糴不滿一萬石本州之和糴乃至十萬石本州又有三鄒莊阿鄭莊談湖莊等沒官田皆不待給本而輸軍餉如和糴者三萬五千來石和糴之數比諸郡獨多逺至敷及苗米一石之家小户無所從出自三年四年五年六年七年以來歲歲積缺既苦人户亦虧官糴方自去年偶有樂縣尉户絶除立繼外有沒官米租補助招糴免行敷派人户既寬官糴亦足今歲樂宅元積之米已盡而田畝新租之數無多區區本心欲漸積添永為今後補助和糴之資而未有其繼也屬者天幸恭值安撫判府集撰侍郎授鉞鄉部大庇枌榆希冀異恩合郡引領近因除去妖邪毁撤巢穴估到東館白蓮堂田業衆情歡然皆謂侍郎必將以此田撥入和糴之莊更為錦繡鄉邦寬民之賜雖估籍之帳未了而歡誦之口已騰蓋自先太師南豐先生開鄉閫直至今日侍郎方再開鄉閫喬木故家久屬人望休聲善政增光先烈不惟本州之所未有殆亦天下之所未必有有如和糴之最重久為鄉邦之重困幸遇侍郎晝錦照臨其望救援夫豈小小特以三邊未撤戍和糴未可免雖望申减之甚切而未敢責人情之所難兹因沒官之田謂必為和糴之助此事理之所必可行而仁慈之所必垂念宜衆情之預以為喜也某幸登龍門假守珂里代申衆請仰副仁心下情不勝皇懼俯伏俟命之至須至具申黃氏日抄卷七十五
