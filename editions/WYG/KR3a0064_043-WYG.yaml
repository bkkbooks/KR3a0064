body:
  text: 黃氏日抄卷四十三宋黃震撰讀本朝諸儒書延平李先生師弟答問承喻涵養用力處但常存此心勿為他事所勝即欲惡非僻之念自不作矣父母惟其疾之憂舊説孝子不妄為非惟疾病然後使父母憂恐熹言父母慈愛其子無所不至疾病人所不免猶恐其有之以為憂則餘可知也為人子者知此而以父母之心為心則奉承遺體求免於虧辱者豈一端而已此曾子戰戰兢兢唘手足而後知免焉者也不逺遊遊必有方不登髙不臨深皆是此意先生曰所説得之至於犬馬皆能有養不敬何以别乎熹謂犬馬不能自食待人而食故畜犬馬者必有以養之但不敬爾然則養其親而敬有所不至不㡬於以犬馬視其親乎敬者尊敬而不敢忽怠之謂非特恭謹而已也人雖至愚孰忍以犬馬視其親者然㡬微之間尊敬之心一有不至則是所以視其親者實無以異於犬馬而不自知也聖人之言警乎人子未有若是之切者然諸家之説多不出此先生曰此恐當時只以能養為孝故夫子警切以告之使反諸心也苟推測至此孝敬之心一不存焉即䧟於犬馬之養矣孟子又有養口體養志之説似亦説破學者之未察處問子張學干祿先生曰古人干祿之意非後世之干祿也蓋胷中有所藴亦欲發泄而見諸事爾此為已之學也然求之有道苟未見所以求之之道一萌意焉則外馳矣故夫子以多聞見而闕疑殆告之又使之愼其餘則反求諸已也切矣問亦足以發之義先生曰顔子深潜淳粹聞夫子之言即黙識心融觸處洞然自有條理故終日言但見其不違如愚而已退省其私則於語黙日用動容之間皆足以發明夫子之道坦然由之而無疑也問子曰參乎吾道一以貫之曾子曰唯子出門人問曰何謂也曾子曰夫子之道忠恕而已矣蓋夫子之道不離乎日用之間自其盡已而言則謂之忠及其及物而言則謂之恕莫非大道之全體雖變化萬殊於事為之末而所以貫之者未嘗不一也然則夫子所以告曾子曾子所以告其門人豈有異㫖哉而或者以為忠恕未足以盡一貫之道曾子姑以違道不逺者告其門人使知人道之端恐未曽盡曾子之意也先生曰伊川先生有言維天之命於穆不已忠也乾道變化各正性命恕也體㑹於一人之身不過只是盡已及物之心而已曽子於日用處夫子自有以見之恐其未必覺此亦是一貫之理故率然問曰參乎吾道一以貫之曾子於是領㑹而有得焉輙應之曰唯忘其所以言也至於答門人之問止是發其心爾豈有二耶若以謂聖人一以貫之之道甚精微非門人之問所可告姑以忠恕答之恐聖人之心不如是之支也如孟子稱堯舜之道孝弟而已人皆足以知之但合内外之道使之體用一源顯微無間精粗不二渾同盡是此理則非聖人不能是也中庸曰忠恕違道不逺提起此以示人相近處然不能貫之則忠恕自是一忠恕爾大凢人理義之心何嘗無唯持守之即在爾若於旦晝間不至梏亡則夜氣存矣夜氣存則平旦之氣未與物接之時湛然虛明氣象自可見此孟子發此夜氣之説於學者極有力大率吾輩立志已定若看文字心慮一澄然之時略綽一見與心㑹處便是正理若更生疑即心滯礙某曩時從羅先生學問終日相對靜坐只説文字未嘗及一雜語先生極好靜坐某時未有知退入室中亦只靜坐而已先生令靜中看喜怒哀樂未發之謂中未發時作何氣象此意不惟於進學有力兼亦是養心之要嘗愛黃魯直作濂溪詩序云舂陵周荗叔人品甚髙胸中洒落如光風霽月此句形容有道者氣象絶佳胸中洒落即作為盡洒落矣某嘗以謂遇事若能無毫髪固滯即此心廓然大公無彼已之偏倚庶㡬於理道一貫仁即是理當理而無私心即仁矣又曰仁字極難講説只看天理統體處便是心字亦難指説惟認取發用處是心又曰仁者人也人之一體便是天理無所不備具吾儕在今日止可於僻寂處草衣木食苟度嵗月又曰處此時唯儉德避難更加韜晦為得所又曰當今之時茍有修飭之士須大叚涵養韜晦始得愚按程門髙弟如謝上蔡楊龜山末流皆不免略染禪學惟尹和靖堅守不變其後龜山幸三傳而得朱文公始裒萃諸家而辨析之程門之學因以大明故愚所讀先儒諸書始於濓溪終於文公所傳之勉齊以究正學之終始焉次以龜山上蔡以見其流雖異而源則同焉又次以和靖以見源雖異而其流有不變者焉次以橫浦三陸以見其源流之益别焉然上蔡龜山雖均為畧染禪學而龜山傳之羅仲素羅仲素傳之李延平延平亦主澄心靜坐乃反能救文公之㡬䧟禪學一轉為大中至正之歸致知之學毫釐之辨不可不精蓋如此故又次延平於此以明心學雖易流於禪而自有心學之正者焉此書文公所親集延平之學以涵養為工夫以常在心目之間為效驗以脱然洒落處為超詣之地文公之問多本論語多先孝弟此皆學者所當熟味序此書者廖德明載文公之言謂先生隱居不仕燕閒體察黙而成之非他人能及若夫經綸天下之大經措諸事業時有勞逸之殊遇故二程因發明敬字合内外貫動靜敬附錄云延平李先生行狀先生諱侗字愿中南劔州劔浦人曾祖幹屯田郎中祖纁朝散大夫父渙朝奉郎先生聞郡人羅仲素先生得河洛之學於龜山楊文靖公之門遂往學焉從容潜玩有㑹于心盡得其所傳之奥退而屏居山田結廬水竹之間謝絶世故餘四十年簞瓢屢空怡然自適既以二子舉進士試吏旁郡車請迎養先生不得已為一行㑹閩帥玉山汪公以書禮車乗來迎將講所疑至之日疾作卒于府治之館舎年七十一隆興元年十月十有五日也初龜山先生唱道東南士之遊其門者甚衆然語其潜思力行任重詣極如羅公蓋一人而已先生既從之學講論之餘兀坐終日以驗夫喜怒哀樂未發之前氣象為何如而求其所謂中者若是者既久之而知天下之大本者端有在乎是也蓋天下之理無不由是而出既得其本則凡出於此者雖品節萬殊曲折萬變莫不該攝洞貫以次融釋而各有條理如川流脉絡而不可亂大而天地之所以髙厚細而品彚之所以化育以至經訓之微言日用之小物折之於此無有不得其衷者焉由是操存益固涵養益熟精明純一觸處洞然泛應曲酬發必中節故其言曰學問之道不在於多言但黙坐澄心體認天理若見雖一毫私欲之發亦退聽矣又其言曰讀書知其所言莫非吾事而即吾身以求之則凡聖賢之所至而吾所未至者皆可勉而進之以故未嘗為講解文書沙縣鄧廸語及先生曰愿中如氷壺秋月瑩徹無瑕非吾曹所及也嗚呼先生之道德純備學術通明求之當世殆絶倫比然不求知於世而亦未嘗輕於語人蓋所謂遯世不見知而不悔者先生庶㡬焉門人具位朱熹狀右錄其要也始文公之父吏部公與延平先生俱事羅先生故文公於延平為通家子文公幼孤從屏山劉公問學及壯以父執事延平而已至於論學蓋未之契而文公每誦其所聞延平亦莫之許也文公簿領同安反復延平之言若有所得者於是盡棄其學而師事焉此嘉定甲戍黃巖趙師夏題卷末之畧云延平先生語録羅先生少從審律先生吳國華學從見龜山乃知舊學之差三日驚汗浹背曰㡬枉過了一生於是謹守龜山之學數年後方心廣體胖以踐履為聞知人之持身當以孔子為法孔子相去千餘載既不可得而親之所可見者獨論語耳右延平語錄羅仲素先生之從孫羅慱文所編本名欽佩錄然其所載多髙深間又造語如諸子之立論者視朱文公所編答問似不同姑錄其便初學者一二黃氏日抄卷四十三
