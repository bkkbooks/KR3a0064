body:
  text: 黃氏日抄卷四十一宋黃震撰讀本朝諸儒理學書九龜山先生文集詩此日不再得頽波注扶桑蹮蹮黃小羣毛髮忽已蒼願言媚學子共惜此日光術業貴及時勉之在青陽此示同學首章也足以警惰題釣臺詩謂東漢不任三公故子陵不就其招恐未必然若子陵意果出此合為光武一言題吳國華釣臺以璜溪嚴瀨對起而總之云聖賢遇合自有時潔身亂倫非所知以國華自作記不取子陵也又恐貶子陵太過江上夜行詩氷壺瀲灔接天浮月色雲光寸寸秋不用乘槎厲東海一江星漢擁行舟望湖樓晚眺詩斜日侵簾上玉鈎簷花飛動錦紋浮湖光寫出千峰秀天影融成十里秋翠鷸翻風窺淺水片雲隨意入滄洲留連更待東窗月注目晴雲獨倚樓書上淵聖皇帝略云自崇寧迄宣和寬恤之詔嵗一舉之宣之通衢而人不聽挂之牆壁而人不視以其文具而實不至故也祖宗時荆湖南北江東西漕米至真揚下卸即載鹽而歸自胡師文以糴本獻羡餘而糴本乃取之諸路昔每路鹽課無慮數十萬緡自鈔法行鹽課悉歸𣙜貨務諸路一無所得太宗嘗謂幸門如鼠穴不可塞篙工柂師有少販鬻但無妨公不必究問自直逹鈔鹽之法行而回綱無所得願捐數百萬以為糴本棄回運以養舟人臣嘗任蕭山縣令有錢清鹽場亭户多逃亡至追捕拘繫之蓋鹽之入官一斤不過四五錢計其工力之費十不償其二三愚按龜山當時事之艱難而陳民情之纎悉如此救時者可觀矣奏狀靖康元年正月淵聖召先生置諫垣七月乞致仕得祠時年七十四明年髙宗即位召赴行在除工部侍郎侍講建炎庚戍致仕凡奏狀皆其辭免狀奏議謂童貫為三路總帥棄軍而歸朝廷不問梁方平何灌相繼而遁又置不問使敵人善覘國則勝負已決矣又謂宰執首為竄逸自全之計亦宜稍正典刑比聞士民伏闕詬詈大臣無所不至蓋國人之所共棄也姚平仲殺略相當未為大衄寧忍坐視而不救姚古种師平劉光世皆一時名將乞召至榻前問以方略李邦彥李鄴皆國人所共棄今以平賊和議之功歸此二人士庶讀者皆銜恨乞收還榜示乞罷茶鹽云仁祖曾𣙜茶淨利均為茶租使自興販今茶租如故而𣙜法愈密是𣙜之又𣙜也周世宗以河朔鹽息均之人户熙寧中有議再𣙜者朝廷不行今鹽息如故而又設官置司與他路等江浙有蠶鹽今蠶鹽不支而償絹不免宜一遵祖宗之法罷提舉茶鹽司乞出師云金人駐兵磁相攻劫無有紀極吾雖欲專守和議不可得也彼見吾髙城深池未易凌犯勤王之師四面而至姚平仲與之交兵忍而不敢怒朝廷割三鎮二十州之地與之是助冦而自攻也乞罷趙野云今自李邦彥而下廢罷殆盡獨野居職如故乃建請士庶名字有犯天王君聖及以主字為稱謂者悉禁上皇廢格不行而野泰然自如乞黜責王雲等云童貫梁師成李彥皆天下所共嫉宇文虛中王雲皆童貫腹心韓駒諂附李玨獻賦入仕寅緣師成躐典誥命王子獻在京東與彥為姻好依勢裒刻近見除向子韶為京東漕其人操守堅正凡李彥黨與宜委之究治乞罷孫覿和州乞用朱震充博士乞追還元祐黨人舊職乞誅姚古正其逗留不赴太原之罪以肅軍政謂王安石言陛下若以堯舜之道治天下雖竭天下以自奉不為過守財之言非正理其後王黼應奉花石竭天下自奉之説倡之也安石釋鳬鷖守成之詩謂以道守成者役使羣衆泰而不為驕宰制萬物費而不為侈其後蔡京輩輕費妄用專以侈靡為事蓋祖此説則安石邪説之害豈不甚哉望追奪王爵毁去配享之像王黼伏誅而蔡京父子止竄湖外望取京父子與邦彥大正典刑投之嶺海其間為蔡氏邦彥所用之人當一視之察其賢而用不賢而去茍無事實概以黨附為言者是欲中傷不可不察夫以二十餘年之間是數人者實秉國柄天下之士不仕則已其仕於朝者皆其薦引也非蔡則王非王則李若盡指以為黨而逐之是將空國無人矣與宰執劄子愼令當於其始諸犯𣙜貨不得根究來歷違者以故入人罪論自祖宗至熙豐未之有改今茶法獨許根究書答吳國華王氏奉佛至舍其居以為佛寺其徒有為僧者則作詩以奬就其志若有羡而不及者寄俞仲寬建劔汀邵之民多計産育子吾郡吾邑惟順昌獨甚富家不過二男一女中下一男而已答吳仲敢韓子曰仁與義為定名道與德為虛位道固有仁義而仁義不足以盡道則以道德為虛位者亦非也愚按吾儒言仁義道德異端捶提仁義而專稱道德故韓子之闢異端專於此辨之天下無不善之仁義故曰定名道有君子之道有小人之道德有吉德有凶德故曰虛位虛位云者如一空椅子好人也可坐不好人也可坐吾儒由仁義而為道德則實此虛位道為君子之道德為吉德異端棄仁義而居之則反是矣其説可謂工甚而程門或以為非今龜山之説專卑仁義而尊道是正溺於老子之學耳答練子安書古之為貧者豈特耕稼陶漁而已今使吾徒耕稼能之乎不能也使之陶漁能之乎不能也今是數者不能將坐待為溝中瘠而可乎不然則未免有求於人如墦間之為也與其屈己以求人孰若以義受祿於吾君為安乎先生語録其間頗有失真者與遊定夫伊川語録舊惟羅仲素編今行李已遭賊火與胡康侯與陸恩仲聞吾友欲削髮為僧甚乖所期中夜思之寐不交睫世之為佛之徒者將以為道邪則廢人倫逆天理將以求福田利益則與世之行謁公門以邀名逐利者無以異也上提舉元祐差役自二百五十畝以上充弓手大抵十年兩役與劉器之夫物我異觀不能通天下為一正今日學者之失與翁子靜書云會佛於一蓋心傳自到之學愚按龜山之學專欲物我為一此溺於佛氏無人相我相之説耳答陳瑩中康節先天之學不傳於世八卦有定位而先天以乾巽居南坤震居北離兊居東坎艮居西又以十數分配八卦獨艮坎同為三數此必有説也以爻當期其原出於繫辭而以星日氣候分布諸爻易未有也其流詳於緯書世傳稽覽圖是也揚子草玄蓋用此耳卦氣起於中孚冬至卦也太玄以中凖之其次復卦太玄以周凖之升大寒卦也太玄以千凖之今之厯書亦然則自漢迄今同用此説也而先天以復為冬至噬嗑為大寒又謂八卦與文王異若此類皆莫能曉也又書云太玄之書子雲覃思渾元三摹而四分之極於八十一首旁則三摹九據極之七百二十九贊當期之日又為畸贏二贊以盡餘分之數其用自天元推一晝一夜隂陽數度星日之紀與泰初厯相應其為書蓋欲自成一家初無意於贊易也恐其書特易中之一事與易經不盡相涉也又云溫公自孔子而下獨謂揚雄為知道雄之論孟子曰知言之要知德之奧又曰諸子者以其異於孔子也孟子異乎不異夫雄以孟子不異於孔子溫公於孟子乃疑之則雖以雄為知道而於雄書亦未盡信也與李泰發車駕駐永嘉若入閩中則是舉中原棄之近虔州又大擾焚毁廬舍十八九不知隆祐可以安居彼否與廖用中上四州軍殘破特甚亦不免科敷每一錢産科借三文福州為不經殘破每一錢産科借百文與吳守書雖有船由海道去不知領之者為誰一非其人則有害無補與胡康侯斗綱之瑞連貫營室織女之紀指牽牛之初以紀日月故曰星紀五星起其初日月起其中其時為冬至其辰為丑三代各據一統明三統常合而迭為首而還五行之道也周據天統以時言也商據地統以辰言也夏據人統以人事言也又云若謂以夏時冠月如定公元年冬十月隕霜殺菽若以夏時言之則十月隕霜乃其時也不足為災異愚意災在殺菽不在隕霜也朝廷著令收稅不許過三分是預為罔民之具以資裒刻之吏耳非令之善也答練質夫向在諫垣嘗論王氏之失太學諸生安於所習閧然羣起而非之記序陳諫議祠堂記初蔡京為翰林學士承旨潛姦隱慝未形於事雖位通顯世人莫知其非也陳公瑩中力言京不可用用之必為腹心患鄧文伯自序文伯初名平夢神人曰子之名平其字倒土使子之困窮也乃以洵武易之而先生字之文伯送吳子正序云古之時六籍未具不害其善學後世文籍雖多無益於得此篇序述極贍應用兩字見吾田曹文集序論語序以伯樂論馬為證謂道不可以言傳愚恐以禪學隂移正論也子夏之後有田子方子方之後為莊周見中庸義序策問一鄉二千五百家而卿大夫士列於其間無慮數千人不冗且多乎答問原壤蓋莊生所謂遊方之外者故敢以夷俟孔子然謂之為賊而叩其脛不已甚乎而彼皆受之而不辭非不以毁譽動其心孰能至是愚按孔子告以幼不遜悌至老而不死是為賊訓之也非詈之為賊也以杖叩其脛者蹙其夷踞彼之起也非杖之也原壤放肆而孔子愛之以德非毁譽也龜山之尊原壤如此蓋溺於方外之説然方豈有外耶日録論辨王安石上問張端河北鹽議對曰今且以變通財利為先凡利者隂也隂當隱伏義者陽也陽當宣著論曰取其所當取則利即義矣何宣著隱伏之有若宣著為善之名而隱收為利之實此五伯假仁義之術王者不為也故青苖意在取息而以補助為名市易欲盡籠商賈之利而以均濟貧苦為説正此意若不循理之人敢為妄言以阻亂政事誠宜示之以好惡陛下救今日之弊誠恐不可以不勇論曰立法造事不為衆論所與以力勝之而欲成天下之務未之有也上問程皓言不可賣祠部添常平本錢事如何余曰皓所言未逹王道之權賣祠部所剃三千人頭而活十五萬人性命論曰鬻祠部取之力本之民其徒益繁其蠧益甚未及賑飢先困吾民上問誠明余曰能不以外物纍其心者誠也論曰誠者天之道非外物不以纍其心者所能盡也陳升之不肯簽條例司余曰於文反后為司后者君道也司者臣道也人臣稱司何害於理論曰口給禦人興事造業不顧流俗周公彰善疸惡柴世宗斬大將二十七人論曰一有異已則指為流俗而妄引周公世宗以惑聖聽朱越知建州上曰若在京好一見之余曰建州知州自來中書差遣不足挂聖慮若臣不足信便改命忠信之人論曰於君臣之間很愎如此永叔以韓琦為社稷臣不免附麗邪人如吕公著象恭滔天又云陳襄附下罔上雖放流竄殛自其常分又謂永叔與一州即壞一州留在朝廷則專主流俗又云鯀以方命殛共工以象恭流富弼兼此二罪止奪使相誠未盡法論曰自韓富而下皆元勳世臣名儒碩德天下仰之如泰山北斗一有異己則指為姦邪待以四凶詆誣大臣顚倒邪正蓋自此始保甲論曰井田法廢民無常産今欲什伍其民以代募兵則富者驕脆而不可用貧者更畨月閲轉為溝中瘠惰遊姦凶散而為盜皆理之必至也人主若能以堯舜之政澤天下之民雖竭天下之力以奉乘輿不為過當論曰雖庸人知其不可天地之大德曰生然河決以壞民屋而天不恤任理而無情故也堯使鯀治水汨陳其五行九載而堯晏然不以為慮此能為天之所為任理而無情故也論曰不知何所據也以陛下憂恤百姓為不知天所為則文王視民如傷其不知天甚矣愚按安石勸人主以誅殛賢人罔取民財竭天下之力以為奉蓋備極自古小人之凶德矣世猶以其詩文而列之士人謂其清苦而目以賢者不知正其濟姦之具也中原傾覆實由於此何忍言之字説論蟋蟀字隂陽帥萬物以出入蟋蟀能帥隂陽之悉者也論曰隂陽非蟋蟀所能帥也紅紫字紅以白入赤火革金從工凡色以系染也夫有彼也乃有此也道所貴故在系上論曰不知此者何義愚按字法不一大要以音義合而成之從悉從率者音也以其為蟲故從蟲者義也工與紅聲近此與紫聲近從工從此者音也從系者義也何有他説而安石紛紛如此如籠字從竹從龍亦以音義共成之安石謂若龍者亦可籠焉而龜山辨云龍非可籠之物愚其聞真龍友對上以聾字為龍重聽事出山海經不知作山海經者人也未嘗與龍接談何以知其重聽如丘隴之隴從阜龍豈在阜朦朧之朧從月龍豈近月耶觀此可以類推跋賀仙翁親筆詩詩即有客來相問四句身教者從言教者訟了翁訓諸子語行狀先君行狀南劔州將樂縣人世為農家至先君始勵其子以學葬石龜山李子均為餘姚縣主簿有茶商夜遇海船鉦鼓皆鳴更相疑為盜格鬭殺傷十餘人繫蕭山獄吏求主名不得連年不決趙清獻檄公治之公曰犯時不知在律勿問具聞於州杖遣之李資政黃履之甥丞相李綱之父爵至隴西開國有政績御史遊定夫名酢與兄醇俱以文行知名歷守四郡從二程有中庸義二南義語孟雜解文集藏于家忠定公錢即吳越之宗屬毗陵宜興人守西邊有功詆童貫均糴法永州安置上思其忠起知青州太原府量敵慮勝動中機會蓋邊將材陸少卿愷既第薦試學官公曰吾困科舉二十餘年晚得一官朝廷不吾知欲使之裹飯復入場屋吾不能也士不之教官之廬而公之户外屨常滿向子韶文簡曾孫以相門后族富貴聞天下二郡王日奉朝請公幼遊賢關苦學不少懈曰家門衰替敢自惰乎知蘇州吳江縣太守孫公傑欲一大保置一鼓樓保丁五人以備巡警盜發則鳴鼓相聞公執不可曰鬭爭自此始矣除開封右曹簿李彪欲論蔡京之罰除夔路運判力止開溪州及止移築瞿關其後守陳州巷戰罵賊死諡忠毅周憲之力疏童貫蔡攸之罪忤王黼不交梁師成樞密曹輔初為正字言時政王黼詰之編管郴州淵聖召為御史六遷至樞密每爭和議及請決水灌敵營唐恪不可何栗信妖人郭京用六甲兵公力爭不從敵以康王在外令還京師公密啓上止之張邦昌脅公不從扈駕至南京薨按先生為志銘多渾雄平實往往類歐曾獨其載人學佛許以善知識不可曉耳經解易自升卦以後闕餘皆全書蓋先生平生最用工於易於程門理義之學多有發明惟其以潛龍為顔子事見龍為孔子事九三為周公居攝事九四為顔淵未見其止飛龍為孔子猶天之不可階而升似頗拘又以天行健君子以自強不息謂乾象非聖人不足以盡故取其行健而已似不必於本意上更探髙一等耳聖經何以求加為哉詩春秋孟子略説數章論語則經筵講義每章歸君道言之世多疑龜山晚年一出無益於事甚至謂其不必出者不知我宋之所以中興多龜山之出之力也方宣靖間羣小滿朝橫政四出夷狄乘隙反欲以問罪借名龜山一出而盡逐小人盡革弊政夷狄所欲以問罪借名者至則盡無之矣故雖無救一時已成之禍而開明正論慰懌人心已足以肇異日中天之業國於天地必有與立不有君子其能國乎於斯信矣蔡京小人誤國大罪尚能因張觷譏切之語起龜山於羈困之極蓋京之進身本以士人天理之在其心尚有豪髮不可泯沒者近世誤國者至狼狽而闕者讀龜闕龜山先生語録學以聖人為師猶學射而立的為仁必自孝弟推之六經不言無心管仲之功子路未必能之然子路範我馳驅者也管仲詭遇耳愚按此論甚正莊子逍遙遊一篇子思所謂無入不自得養生主一篇孟子所謂行其所無事按莊子寓言蕩空世事與思孟正相反不知龜山何見言此古人寧道不行不輕去就茍害於義一介與萬鍾皆不可諸葛亮李靖之兵不務僥幸陸宣公當擾攘之際説君未嘗用數馬周言事每開人主一線路終不如魏徵之正右皆正論可振流俗常平法寺舍嵗用有餘以歸官賑民按此法可救民命之萬一今士大夫不惟不能行反務黨僧寺以奪民産先生不敢解經曰有勸正叔出易傳者正叔曰獨不望某之進乎按此説則近世紛紛解經者可戒矣試教授宏詞科是以文字自售既得官矣又幸求榮進按此可警流俗象殺舜事是萬章所傳之謬據書但云象傲而已太公進退隱顯各得其當黃叔度學充其德雖顔子可至按此皆審理不以經史為輕重聰明憲天任理而已揣知情狀失君之道謂之不聰明可也按此論人主可以深省謝安折屐安知非偶然乎人當無利心以此自為可也以此責人恐不勝責君子以天地為量按此皆厚德之語維摩經云真心是道場儒佛至此實無二理按龜山以伊川為師學孔子者也其説如此何哉然世之不為龜山者寡矣右荆州所聞論語言仁處皆仁之方孟子言仁人心也最親切按此提掇最得要豐尚書稷言雪竇教人惜福云人無壽天祿盡則止元厚之一飯亦先減而後食壽逾七十以為雪竇之言之驗龜山曰此猶以利言也按龜山之言善矣然人以氣之聚散為死生修短有數已一定於此氣稟賦之初非奉養之厚薄能為伸縮而所養之厚薄亦自有定分人不過順受其正但奉養菲薄自是有德之事豈緣是而身可久存乎元厚之減飯壽亦不過七十世享期頥之壽者未聞皆因減飯而致然則豐尚書不惟不當言利初亦無利之可言特信異端致泥耳易難解聖人嘗釋其義即解易之法按易即是解矣伊川附以義理晦庵原其本始易大彰明矣今之解易者滿天下是皆未知先生所謂難者耳堯夫言畫前有易龜山以十三卦為證言此時十三卦未畫也按繫辭作於十三卦已具之後所云蓋取諸乾坤云者殆謂其義合於此耳蓋者非定辭也堯舜雖聖豈能未有此卦而預指定名以取象之乎且堯舜之時八卦已畫亦不可言畫前之易而十三卦乃演卦非畫卦也畫前有易堯夫不過言此理素具耳何以證為魯桓公六年生莊公十八年始書夫人薑氏如齊與詩序人以為齊侯之子不合按詩序乃後漢衛宏所作不可據縱當時魯有此言亦因而指斥以譏之耳豈真以為齊侯之子哉今日學法荆公之法由今之道雖賢者為教官亦不能善人心按學法始於李定荆公所任也再增於蔡京久而弊益甚豈但不能善人心而已哉宰我問三年之喪此其所以為宰我按龜山嘗稱齊宣王自言好貨好色故孟子言足用為善古人朴實不欺如此後世飾偽耳顔子屢空聖人則一物不留於胸次億則屢中非至誠前知故不取按一物不留恐類禪學億則屢中孔子亦取其中非不取也至誠可以前知其義又别孔子亦必不盡以此律人易言利見利用終不言所以利故孔子罕言利按利見利用止言卦爻宜如此耳恐與罕言利之利不同右京師所聞王氏修身宜足化民然卒不逮王文正吕晦叔司馬君實諸人者以其無誠意也先王經綸本之誠意今鹿鳴四牡諸詩皆在若徒取而歌之其有效乎按論治如此得其本矣平勃兩人俯首以事吕后其在平則或有謀在勃驅之為亂亦固從之矣此何可保按龜山極守正此論乃黜周勃之守正容陳平之詭隨恐亦一時偶然之言否則録者誤耳章郇公中書坐處地陷徐起使人填之還家亦不言按此真有大臣器度聞風者亦可黽勉要在有定見權柄在手不是使性氣處何嘗見百姓不畏官人但見官人多虐百姓耳伯淳作縣常於坐右書視民如傷四字每曰常有愧於此觀其用心應是不錯決撻了人按此最為士大夫從政之要中書偶倒用印萊公勾吏人行遣密院亦偶倒用印王文正公不勾吏人云不可學他不是按此平心處事一惟其理不特善處同官窒嫌隙也東坡影答形詩云君如煙上火火盡君乃别此説本佛夢幻之説九層臺銘以衆竅呼吸為天籟此説本莊周地籟之説按東坡才髙而熟於釋老遂成左右逢原如赤壁賦逝者如斯而未嘗往也亦本於佛氏之言性居養安濟良民而養遊手按近世真有此弊士大夫好名者多為之往往流患但名曰惠政革之亦難今法太嚴密如何行得按此語極中時弊故愚從政以來惟有酌情而已有僧入僧堂不言而出或曰莫道不言其聲如雷按龜山以此證知微之顯却恐未然近世徐霖以不語為傳道未必非此等語誤之蘇明允權書衡論意欲掃蕩二敵然後致太平龜山謂用兵只見搔擾天下何時息肩秦少遊進卷欲以五路嵗出一路擾夏人龜山謂五路合攻尚有不支嵗出一路其可當之乎神考問朱公掞欲再舉安南之師公掞對願陛下禽獸畜之按載此三事言兵者可以觀矣荆公以賜金付蔣山寺龜山謂其賤君之賜按龜山事佛者也其言猶若此可謂公論矣然亦豈惟賤君之賜而已哉厚夷狄以禍中國自古惟武夫多殺與權臣多私自視慊然妄意福田為可免罪而為之如兩浙田莊多歸僧寺吾民無所謀衣食又反為其所殘其禍始於吳越王盛於張俊楊沂中及韓蘄王而增壯於嘉定之權相未有清修士人而為之者也荆公士人而亦為之豈不悲哉雖然彼方以為善用其君之賜本非有賤之之心也但蔣山興而王氏滅福田其安在世俗終不反思此為可憐耳正叔云古者四十而仕今十四五便學綴文覔官豈嘗有意為己之學夫以不學之人一旦授之官使之事君長民治事故多凡下不足道按此極中時病士大夫宜反求其所謂學作文字要只説目前説話令自分明孟子謂言近非聖賢不能按此亦切中時病要以明理為主天下之習不能蔽程正叔一人而已只一箇是自然不墮流俗按此提要處指示人極明切右餘杭所聞圓覺經言作止任滅是四病作即所謂助長止即所謂不藝苖任滅即是無事謂形色為天性亦猶所謂色即是空揔老言經中説十識第八庵摩羅識唐言白淨無垢第九阿賴耶識唐言善惡種子白淨無垢即孟子之言性善是也毗陵所聞龎居士云神通并妙用運水與般柴如許堯舜之道只於行止疾徐之間教人做了蕭山所聞按附會至此可怪可駭人心一至陷溺是非即成顚倒前輩尚不能免後學可不自懼乎夫龜山本程門之髙弟也龜山氣象和平議論醇正説經旨極切論人物極嚴事必于其正理而凡挾數用術茍就功名者決不許之可以垂訓萬世使不間流於異端豈不誠醇儒哉橫渠思索髙深往往莊後學之所宜先似不若龜山之平直動可人意然其精到之語必前此聖賢之所未發斥絶異端一語不流髙明者多自立渾厚者易遷變此任道之有貴於剛大哉上蔡語録問學佛者欲免輪回超三界於意云何按此上蔡語録第一條首句也異哉曰孟子沒天下學者不識自家寶藏彼佛氏窺見一斑半點遂將擎拳竪拂底事把持在手敢自尊大輕視中國學士大夫而世人莫敢與爭又信向歸依之按此何等法語而發於程門弟子之口乎捨曰尊佛闢儒而姑歸罪於天下學者其亦本心之理義有終不可磨滅而婉其辭者乎孔子事君盡禮當時諸國怎心當得聖人恁地禮數按此人道之常孔子安行何張皇為橫渠教人以禮為先然其門人下梢頭溺於刑名度數之間明道則不然却從敬入按教人以禮非誤人之事溺於刑名度數門人過耳程門教人以敬而上蔡談禪又將誰咎且刑名度數特不可專於此而流於刻耳要亦天下治具所不可廢之事豈不尚愈於談禪乎所謂有知識須是窮物理莊子曰去智與故循天之理天者理而已諸子百家人人生出一般見解欺誑衆生佛氏却不敢恁地做大按知識亦佛説與致知之知似是而非去智乃異端黜聰明之説與天理人欲之分亦似是而非欺誑衆生非士人語佛氏不敢做大與前條稱佛氏敢自尊大之説又自相反溫公欲變法伊川使人語之曰切未可未幾變之果紛紛不能定按溫公若不變新法恐天下遂亂其後紛紛却是溫公不久而薨然雖紛紛終賴元祐收回天下戴宋之心迄濟中興伊川若用事勢須别有斟酌以此少溫公則未可王荆公作宰相只喫魚羮飯擬除人不允下殿便乞去按一語不合即乞去伊川以山林士召入則可荆公大臣也除擬未合宜如趙韓王事太祖再三以進可也魚羮飯自是儒生之常非要君之具如荆公下殿便乞去此無禮耳執拗耳上蔡謂其養得氣完也竒特血氣何足尚而竒之耶吕晉伯與上蔡言仁晉伯因悟曰公説這仁字正與尊宿門説禪一般按上蔡之門儒其衣冠而講説如此堯夫詩天向一中分體用此句有病按今本作分造化堯夫見得天地進退萬物消長之理便敢做大於下學上逹底事更不施工堯夫精易然二程不貴其術堯夫問今年雷從甚處起伊川曰起處起如堯夫必用推算某更無許多事邵即默然明道云要傳與某兄弟某兄弟那得工夫明道聞説甚熟一日因監試無事以其説推算之皆合出謂堯夫曰堯夫之數只是加一倍法堯夫驚他日伊川問明道曰加倍之數如何曰都忘之矣按上蔡論堯夫極公所載二程語極有益學者明道善言詩但優遊玩味吟哦上下便使人有得處瞻彼日月云云思之切矣終曰百爾君子云云歸于正也詩云鳶飛戾天魚躍于淵猶韓愈謂魚水泳而鳥雲飛上下自然各得其所也按此最得詩人之趣但上蔡以上下察為察見天理不用私意恐察非察見之察察乃昭著之義耳孝經曰天地明察只如喜怒逐日消磨任意喜怒都是人欲按此上蔡自言用工處極切子路冉子被曽子將冷眼看他只管獨對春風吟詠肚皮裏渾沒些能解豈不快活按孔子本以行道濟世為心故使二三子言志子路冉子之對皆正也曾點孔門之狂者也無心於仕而自言中心之樂其説雖瀟灑出塵然非當時問答之正也孔子當道不行私相講明而忽聞其言獨異故一時歎賞之已即歷舉子路冉有之説皆足為邦孔子之本心終在此而不在彼學者必盡取一章玩味始末然後孔子之本心可得而見自禪學既興黜實崇虛盡論語二十篇皆無可為禪學之證獨曾子浴沂詠歸數語迹類脫去世俗者遂除去一章之始末獨摘數語牽合影傍好異慕髙之士翕然附和之上蔡又演為獨對春風沒些能解之言且曾點此時時自言意欲如此而已何嘗果對春風曾點又豈沒些能解者耶善乎近世南軒先生作風雩亭之詞曰希蹤兮奈何盍務勉乎敬恭必若此斯可明孔門之本旨絶異端之影借佛家説大乘頓教一聞便悟將乍見孺子底心一切掃除須是他顔雍已上底資質始得按此謂天資如孔子方可學禪余不知禪不曉其然否然乍見孺子之心若何而可掃除耶上蔡他日嘗告吕晉叔世人説仁只管説愛上怎生得仁是則佛學欲割愛故不欲以愛言仁奈何孔子對問仁亦曰愛人即程子以愛為情可也情非心之發而性非心之所具者乎自程子一語學者閧然謂博愛非仁恐亦為緇徒報仇昌黎耳惻隱之心與生俱生恐無可掃除之日如可掃除是無人心也與伊川别一年只去箇矜字伊川謂此切問近思者也按於進學為切出辭氣猶佛所謂從此心中流出釋氏以性為日以念為雲去念見性猶披雲見日儒之仁佛之覺佛家有小歇場大歇場到孟子處更一作便是好歇釋與吾儒有非同非不同處曾點有甚事列子御風事近之儒異於禪正在下學處按凡皆以禪説儒默而識之與書紳者異矣按書紳是學者力行之事不可以默識為賢而少此又默識是常在心亦與禪學廢言語者不同學者宜辨之四十萬人死於長平皆命乎曰可知皆是命只被人眼孔小按此語亦忍矣上蔡本儒者而其言若此正因禪以覺為仁而盡掃除乍見孺子惻隱之心故不自知其言之至此殺人之事豈宜眼孔大耶荆公勝流俗之説人能用此以行其所學為補不細按天下之理一也荆公勝流俗之説既不可施之政豈可施之學耶其弊蓋自告子不動心來矣揔老嘗問一官貟云默而識之是識箇甚無入而不自得是得箇甚按識是志其所學而不忘非識箇禪也自得是中心義理不為富貴貧賤所移非得箇禪也聖賢之言明白如日月揔老欲移就隂暗處變為歇後險語作禪家影子耶龜山再見明道而歸揔老曰必曾遇異人來更不敢與爭辨不知上蔡竟何如耶上蔡語録始於於意云何一條終於此一條録者何人注意如此上蔡信得命及養得氣完力去矜誇名利不得而動殆為百世師可也苐因天資之髙必欲不用其心遂為禪學所入雖自謂得伊川一語之救不入禪學而終身常以禪之説證儒未見其不入也然上蔡以禪證儒是非判然後世學者尚能辨之上蔡既歿往往羞於言禪隂移禪學之説託名儒學之説其説愈髙其術愈精人見其儒也習之不知已陷於禪此其弊則又甚矣上蔡語録雖多異於程門而程門兄弟之格言多載焉朱吕二先生已取之入近思録矣尹和靖文集和靖諱焞河南人尹師魯之從孫也八嵗而孤年十七蘇昞告以科舉外更有學遂往從伊川先生十九應舉䇿問誅元祐黨籍不答而出即棄科舉大觀元年年三十七諫官范致虛攻其為程頥羽翼靖康元年年五十五种師道薦置經筵辭賜和靖處士明年金人陷洛陽其家殱焉先生死而復蘇匿山谷間建炎二年劉豫劫之不屈匿黑水谷中紹興二年隨楊彥中入蜀五年范沖再薦除崇政殿説書屢詔津發至七年入見行在所時年六十七屢遷至權禮部侍郎兼侍講屢辭得差提舉太平觀寓平江虎丘西庵明年七十致仕子壻程暐為桐廬令往依之是年冬子壻邢純為浙東撫屬又往依之竟殁于會稽寓舍年七十三凡先生之始末如此文集不過辭免狀與嘗手書聖賢之訓于壁者其所謂文不過詩六首書簡跋語數首耳蓋先生平生未嘗為文此外僅嘗承詔解語孟其進論語序有曰先聖遺書雖以講誦而傳或以解説而陋况其所論所趨不無差誤豈惟無益害又益焉蓋和靖恪守師訓惟事躬行程門之傳最得其正其餘論説盛行者率染異端先生此語蓋有為而發然天生人才分量各殊如先生者實德有餘歷死生患難不變惟兢兢然保其身於無過使當承平羽儀天朝表厲風俗可矣南渡何時忠臣勇將廢置不用坐觀中原之傾覆而不救一時大臣方且連年趣迫強致先生以文太平建武投戈講藝之實恐不其然是豈先生之所樂聞哉故其第十五辭免狀有曰方今國步尚艱中原未復進退人才當明緩急今日之務無非繁劇宜先俊傑以濟艱難白首書闕生何益事功嗚呼此先生痛心之言豈尋常辭免之云讀之令人太息然先生去國賴有爭和議一書嘗與秦檜忤本朝理學發於周子盛於程子程子之門人以其學傳世者龜山楊氏上蔡謝氏和靖尹氏為最顯龜山不免雜於佛幸而傳之羅仲素羅仲素傳之李願中李願中傳之朱晦翁晦翁遂能大明程子之學故以晦翁繼程子而次龜山於此以明其自來焉上蔡才尤髙而弊尤甚其於佛學殆不止雜而已蓋其所資者僧揔老其後橫浦張氏又復資僧杲老一脈相承非復程學矣故以上蔡次龜山以明源流益别之自始焉和靖雖亦以母命誦佛書而未嘗談禪能恪守其師説而不變且髙宗中興崇尚儒學之初程門弟子惟和靖在故以和靖次上蔡以明斯道之碩果不食而程門之學固有不流於佛者焉和靖力辨程門之語録為非其後晦翁追編語録又力辨和靖之説為非然晦翁搜拾於散亡其功固大和靖親得於見聞其説尤的今觀程録凡禪學之所有而孔門之所無者往往竄入其間安知非程氏既殁楊謝諸人附益耶是雖晦翁不敢自保其於編録猶深致其意謂失之毫釐其弊將有不可勝言者然則和靖力辨語録之説其可廢也哉黃氏日抄卷四十一
