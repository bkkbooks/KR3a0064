body:
  text: 黄氏日抄卷九十宋黄震撰序潤泮講義序夫子之言渾涵不露至孟子而後發為雄辯為楊墨也濂洛諸儒文亦甚簡至朱子而後辯折無遺為禪學也不然聖賢之學修身行己推以仁民愛物而止耳果言語文字云乎哉而學者不察也或襲而演焉或起而角焉或竊取以鉤名利焉三者之趣雖不同大要皆不過汨於言語文字之弊而吾朱子之望後世者孤矣余友潘君叔良分教京口講説其職也學本朱子時出新意葢於體認有自得者今而後踐之身施之人吾徒尚皆勉之哉三省齋序學之不講久矣非不講也講之過也髙談性命揣摩圖象而孔門切己之實用則弗思焉曽是謂善學者乎牟氏子徳範年少而識老學博而文粹家藏書二萬卷日孜孜其間而獨取曾子之説以日三省名其齋既得之矣又俾余為之説余謂此義曉然何説之持顧力行何如耳然天運不息人心易怠力行亦豈易能者哉曾子曰籩豆之事則有司存謂專心於所當務也又曰士不可以不𢎞毅謂自任之勇也夫其以𢎞毅為之本而不以籩豆之類分其志此殆曾子所能日三省而吾徒當勉之姜山族譜序千枝一本耳萬𣲖一源耳林林總總者偏天下其初皆一人之身耳然木有榦水有脉次第之來可尋也人之序烏乎尋曰在古有小宗大宗在後世以名字為行耳余宗人秀發一日謂余曰我祖太傅公唐末持節鄉郡聚族姜山世以一字加名之上若下以志别無紊者自從祖徳器甫初以父命後其兄已而兄有子復還其初族或謂其嘗穆也不以與昭齒自是名字錯出不復各於其行雖欲如程氏春祭祖先之禮自始祖而下髙祖而上合祭之昭穆尊卑其將焉考乃圖為譜使名雖不以行别而行則可以圖别焉余謂此篤倫理之大者敬述其語序其所圖之意云贈台州薛大丞序天下之伎術皆為民生蠧惟醫為有益故世或以儒醫並稱尊之也然使一堕於伎術之習則儒亦羞學余於淳祐丁未來天台明年識其名醫薛君見其持心厚處事詳於鄉黨稱善不稱惡術雖醫而習則儒矣諸子之彬彬而儒也亦宜哉余故喜而為之祝曰君善醫人君之子且持君之心以醫國矣拙逸軒序濂溪先生作拙賦慨然有使天下還淳返朴之意金壇劉君直儒特摭其一語自名其軒曰拙逸愚謂此潜藏所以為發達蛟龍在淵象也一旦雷雨作解如周子以洗寃澤物為己任雖僻逺無所憚勞矣直儒終得逸乎哉袁餉管坊雅序爾雅注蟲魚識者嘗卑之象澦袁君子龍取凡蟲魚有得於五常之性者類之為書使人隨物自省用以防範人心名之曰坊雅嗚呼世乃有若是之類蟲魚書者耶世之為類書者鮮不以玩物蠱人心今乃一變之為人心計耶化沙礫為南金即稊稗示道妙卓乎哉袁君坊雅之作也雖然天生萬物人為最靈範圍天地曲成萬物皆人心之為也反貿物以防歟人惟其靈思慮易擾而物引之五性之能存者葢寡物惟不靈其性顓一茍有得焉終其身由之而不變人之或反愧扵物者特繫於此人之所當因以自省者宜亦莫切於此人心虛靈一念内覺萬物皆備於我矣詩不云乎天生烝民有物有則民之秉彛好是懿徳坊雅庶㡬乎大雅之一助餘姚縣鄉飲序孔子稱吾觀於鄉而知王道之易易葢自古者井田以養之庠序以教之衣食既足漸摩有素一旦示之以齒序揖遜故孝弟之心有不期而自生後世言政而不及禮者固無望或好禮矣儻不自政始則亦類堕於空文餘姚固名邑然已積二十年令無得善解則其施於民者可知矣雖有古人之禮在庸得而講諸三山陳侯維嘉者始剔舊蠧而一新之休聲善聞日新月盛三年政成乃行鄉飲禮少長雍雍觀者悦服葢必如陳侯之政而後禮可行焉耳推此也以往所謂王道之易易者其將庶㡬乎送陳山長赴紫陽書院序古之所謂治者導廸天理民彛使各歸於理而已自後世以簿書期㑹為治典教之責獨歸學校之官至三舍法行學校又一變為程文利禄之地雖職教者亦言不暇及於理所謂天理民彛如一髮引千鈞之寄獨賴諸儒之書院在耳桐川陳君粹徳篤行君子也出而長紫陽書院合因書中心之隠惻以告之然紫陽夫子之言發諸生多自剛毅入願君之益勉之也咸淳五年四月十二日後學黄震約梅衆妙集序山陰蔚上人好彈琴賦詩自扁其居曰約梅一時士大夫多題詠之上人又摭其膾炙人口者為衆妙集以求序於余余謂㫖哉約梅之稱乎一太極之流行無往不復方冬之窮生意㡬絶一花初白天地皆春此生生不息之呈露而梅之謂也上人顧與之何約乎夫上人佛者也佛不言生生而言往生上人宜念念西方與蓮為約者而暇與梅約乎豈往生者未可知而生生者不可欺乎上人能與梅約必其有得於此者故為之序咸淳庚午立冬日慈谿黄震訓族編序蕭山邑之不可為㡬年矣番陽胡君文伯為之未數月名實已孚於上下豈無以為之本而能爾哉君本姓朱嘗歸而喪其生母廬墓三年因日聚朱之子弟訓飭之久而成編其目凡三由父母而兄弟而宗族各先之以聖人之明訓次之以古人之懿行而復終之以有司不可犯之成法讀者竦然或疑其太嚴不知君由朱而後於胡既不得終其所性之天廬墓而訓其族又適處號痛㒺極之地故其言哀苦懇切不極不止此正其本心之發見而誠之謂也夫惟其誠也則以其修之身者行之家以其行之家者施之政君未數月名實已孚非有本而能爾耶縣佐三山李君吉徳參㑹復請君此編將鋟之梓以惠邑之人而囑余言為序余謂此君以身教者也顧何言之待而亦竊有願言者孔門之教人諄諄然惟以孝弟為本自利欲之侵蝕天理之易昬孟子不得已始出而言性言天周子又極而言陰陽造化之原皆掲之以正性之所從來使人超然獨立於萬物之表利欲不得昬以充擴此性之孝弟達之天下為仁爾近世士大夫乃非性命不言甚至疾有子言孝弟為支離嘻亦甚矣乃今以孝弟訓人復昉見於胡君豈惟民俗賴之士大夫之風俗其亦將庶矣乎咸淳六年十月望贈張帥幹序咸淳庚午秋余䕶試紹興府與番昜張若鳯首入院虛堂夜永相與劇談見其講學必主於明理論政必先扵澤物知其有得於是者相好也及其將行也求贈言余謂余所欲言者子既盡言之矣余又何言然士大夫非平居講求之難而處窮通臨利害之為難若鳯妙年掇髙科今垂二十年猶闕不以嬰其心而守是益確進是益勇養闕宏於古人乎何遜送撫州新參太學生序子入太學何如哉朋四海之英近天子之光相與㳺泳感發其間蘄異日為天下國家用士之入太學其不甚盛乎哉顧太學一也而古今之變則不同葢闕家有塾黨有庠積而至㳺天子之學㴠養益至闕徳業之大成此三代之太學也承秦絶學之後闕晚出無所取正立之學而置之師此西漢之太學也闕尼以匹夫養二千士始設飲食為養闕考徳問業之實漸以衰此東漢以後之太學也謂保桑梓者舉於鄉㳺庠序者舉扵學而併指㳺學為闕進之路此唐之太學也盡復古道取湖學之法闕使士各務實用一毫利禄不以雜之此闕本朝闕太學也立學規以禁切其公議設舍法而誘啖以闕此蔡京當國時太學也破舎法之委折以開捷徑闕姓名之虛偽以示寛恩此鄭清之當國時太學也闕學一也古今之變乃如此然士之自立者詎容闕今而異哉咸淳七年撫州之士入太學者士闕行也酌之酒而贈之言其必毅然以古闕負聖天子教養之意焉是年十月二日陳藏一後集序陳藏一撫人也以詩文遭際先皇帝獲事闕令東宫闕今上踐祚一日遷藏一四官執法者持不歸老故鄉忽朝攜詩文過余謂前集已得西山闕二大老為序此後集也幸續序之余謂序何待闕藏一之出處二大老所不及見者恐不容不一言闕昔司馬相如以文得幸漢天子今之藏一昔之相如闕相如作大人等賦徒侈上心藏一之在上前則闕惴小心相如誇耀其鄉至使縣令負弩前驅藏一闕余撫州退然一布衣口不復道前日事其賢扵闕又何如哉然相如富貴窮當時聲名昭後世藏一闕今日㡬類流落不偶者此足以彰今聖天子盛徳闕公法掩私恩也藏一怡然自得其亦有見扵是闕雖然視孟浩然亦未為不遇矣咸淳七年十一隨隠詩集序陳藏一以詩文際遇先皇帝事闕寵燁然及歸老故鄉依然一布衣余嘗闕其人之賢過相如逺矣藏一有子克紹闕隠亦以詩來求余為序余謂此騷壇世將也搴旗助噪余何敢後特未知隨隠之號何如耳夫詩固隠者事也然昔魏閑之繼魏野父子皆以清吟名世其視權勢若将浼焉謂之曰隠可也隨隠君方以父任禄仕宫庭間柰何遽號隨隠豈風月正其素習禄仕非其得已姑託此以自明其心耶余觀寶晉米氏亦父子世承異恩而片言隻字流布人間至今如九鼎大吕愈久愈珍世未嘗以其非郊島之寒落而少之也然則詩固隠者事也亦非必其身隠而後其詩顯也米氏髙風逸韻必有出於際遇之外者矣隨隠於米氏則元暉之比也黄山谷嘗得元暉印贈之元暉竟以為序竟以字行隨隠詩集改號次暉如何媿余非山谷耳晦庵與江玉汝往復帖序閒居言學在官言政自吾夫子與門弟子答問已然矣乾淳之盛晦庵先生與南軒東萊書問往復固亦無不然凡門人事先生於武夷山中者片言隻字一皆講學而不及政所居之勢然也自是裒集類聚積而汗牛充棟至今流布於天下者無非言理之書不善學者遂或流而為空言矣不知古之正心誠意者正將推之治國平天下言語文字云乎哉玉汝江公宰永興時先生方守南康郵筒絡繹往往講政必欲相與救民疾苦而躋之蘇息之域然則江公之所與往復者在官之書而學之見於用者也其於門人之與往復者閒居之書講求為可用之學者也南軒東萊之與往復者居官居閒之書兼有之居則言學出則言政者也先生以千載之道統為任不以一時之遇合為意出仕五十年居官纔五考世不患不見其明理之書患不見其論政之書耳江公之殁先生誌之故嘗深嗟痛惜恨公之學不得盡見於用而凡所用之見於書者世猶未之見也公之孫某咸淳七年治克類先生與公一往一復之書聚為巨編知前人之心補學者之缺公之家可謂世有人矣書成明年因鄱陽胡繼張以其書來屬余紀其篇首僭為言其所見如此韓載叔障東集序余戊辰省闈得今潮陽尉韓君聞佳士而未識也任牢官江汪又獲與茶鹽司幹辦公事韓君同官即潮陽尉之親兄一門之秀如此豈無所自來哉一日君出示所謂障東集實迺翁載叔甫建䇿于邑決水勢於巽流一邑利之其為利者害之㡬陷虎口而載叔奮不顧曰吾以利衆也而載叔終其身不遇然自今觀之韓君兄弟聲名學問如春方達果孰為之本而能爾哉乃知用心於利衆者天之所報必豐此非可以旦夕觀也天下事大於一邑之水者多矣君之兄弟他日持迺翁之心以争之所利當益多而障東集斯有光文鑑注釋序文辭不待注釋也所待注釋者人名地理若草木蟲魚非所通識者耳世之注文選注杜詩注蘇黄其片言隻字偶與古合率穿鑿傅㑹若謂古人必餖飣然後為文何哉楚詞舊注或未免此一經朱文公疏其字義之難通而𤼵其㫖意之攸歸至今讀者如掲日月我朝五星聚奎諸儒輩出文章雄視千古東萊吕公承詔裒選為文鑑浩如淵海未有為之注釋惠陽史君師公始昉為之一用文公楚詞之法凡國朝之典故諸賢之出處世道之升降亦無不瞭然於其間遂輔成我宋一代全書嗚呼其傳之不朽矣咸淳九年正月讀詩私記序詩自衞宏作小序諸儒往往憑之以說詩隨其所發理趣雖精而詩之所以作則世逺未必知其果然否也王雪山鄭夾漈始各捨序而言詩朱晦庵因夾漈而酌以人情天理之自然而折衷之所以開示後學者已明且要東萊吕氏讀詩時嘗雜記諸儒之舊説未及成書公已下世學者以其與晦庵之說異而與舊傳之諸説同也或莫適從臨川章君叔平因兩家之異參諸説之詳㫁以己見各以私記無一語隨人之後其用功之精勤與謙虛不敢自信之意果何如哉余得而讀之三嘆不忍去手方欲從之靣請則已拜予祠之命東歸矣姑志篇末而歸之尚俟後㑹云咸淳癸酉閏六月欽徳載閑道集序佛老之害極矣余戊辰輪對嘗力以告於上退而欲集一書以諗之同志者未能也若溪欽君徳載忽寄示余閑道集正余所欲集讀之三太息因附致其區區焉夫人莫大於天地父母之恩乃忍於一切讐絶之而反信邪説之無以為有豈無人心哉特怵於死生之變耳彼知人之所畏者死也故預為無常之説以撼搖之謂天地為幻化謂父母為寃債謂凡所生生無非火宅甚至疾視其身為仇讐而愚者既信之矣彼又知其説之繆於理也又肆為反常之説以掃除之謂善惡為無二謂修學為不可謂即心是佛萬法皆空甚至疾視天下之正理為障礙而髙虛者反復信之於是胥天下皆邪説士大夫係民觀瞻者無不助其虐而甚其禍雖講眀儒學者亦或陰移於其説而不自知如飲狂泉之國矣然原其邪説之得行皆始於人心之畏死不知有生而有死所以生生而不窮此即寒暑陰陽之代謝此即草木榮華之開落何怪之有而欲求免何法可免而為其所愚世豈有信其説而果不生不死者哉區區之見欲諗於同志者如此未知果然否若夫為其徒者本皆吾赤子凡其居處衣食無非吾聖人者徒以口舌自異吾聖人正如不沾聖化弄兵潢池耳死生之理明邪說不得行世豈復有從叛者哉咸淳癸酉十二月黄震序送道士宋茗舎歸江西序道士宗從璟生江西山水窟復東游㑹稽羅取四眀天台之勝盡以彈琴賦詩而歸隠所謂茗舎者乎問天下名山大川皆君之居何必茗舎哉答謂茗舎實從璟所生去臨川城北六十里其山奇以矗其水清以泚其地幽絶闃寂不惟富貴者足跡所不到凡奇花異卉可悦富貴人耳目者一不生之惟茗生焉不待蒔植此扶輿清淑之所鍾葢天産也而俗又莫之識徃往與凡草俱老於春風曉露間及過時而或取之尚為絶品苦過而微甘其味悠然以長與世之所修事而品題者夐異使其得如建溪殘春先發攙取造化其遇於世當何如哉從璟為之惜故願歸修茗事以成其清耳子聞而異之夫苦者求道之切甘者得道之趣也其味悠然以長者樂道之深也於君修茗事得君修道法君真奇士哉然謹勿破茗之天真如建溪俗子攙取造化萬一香味落富貴人齒牙即與奇花異卉悦富貴人者同一俗況予嘗持節江西官之征茗殊急予切切愛䕶之不敢行此語又可使趙賛王涯輩得剽聞哉玉川子於此最得趣乗兩腋清風之生尚欲問巔崖蒼生之苦江西吾赤子今皆無恙否他時有便幸報平安咸淳十年正月十二日雲臺散吏黄震序劉養晦孝經解序人生而知愛其親是良心莫先扵孝也親親而後能仁民仁民而後能愛物是百行莫先於孝也孩提之童即授之以孝經之書是講學莫先於孝也孝無一日而可忘則孝經亦豈容一日忘然今之世諸子百家訓釋演説者汗牛充棟甚至淫詞曼曲亦然獨孝經自司馬公指解朱文公刋誤之外未有繼焉何哉非新之求而舊之忘歟句讀之習而義理之弗考歟借之為啟䝉之筌蹄未嘗體之為躬行之根底歟嗚呼年至慮易境變心移髫齓之所咿啞而習讀祖父之所保抱而教誨棄若土梗漫不復省於孝其親之書若此於其親為何如尚何望其孝悌興行而民用和睦如吾聖人之云耶余友劉君養晦粹徳之士也博取諸書之嘗及於孝者萃而為孝經解寧多而毋敢畧寧淺而無敢深雖為童子設而闗其終身也雖為家庭設而闗乎天下也繼自今人皆以養晦之心為心而愓然自反無一日而忘孝經亦將無一日而忘孝世道其庶矣乎咸淳十年九月二十日黄震拜手謹書玉笥山道士徐師澹詩集序玉笥山道士徐清夫訪余月湖精舍出示余圖一軸曰雪溪詩一編曰和蛬雪溪其自號和蛬其自吟也披其圖萬山玉削漁樵跡滅吟肩短蓬殆於愁絶一何其清也閲其編粉澤浄除陳言一掃妙語泠然殆扵天造又何其清也然則詩之清即圖之清也詩不併以雪溪名而又以和蛬名清豈有二也耶霜露既降秋蛬夜鳴造化之清之始也淺碧流澌岸雪深尺造化之清之極也人心與造化相流通必銷落世慮氷雪吾心斯可言清之極否則心聲之發必有不能掩焉者反異於秋蛬之天籟自鳴矣故必有雪溪之胷襟而後有和蛬之聲韻圖之清詩之寄詩之清心之寫心之清造化之合也後必有合而題之曰雪溪先生和蛬吟則知清夫之清源於老聃氏所謂天得一之清矣咸淳十年九月一十一日雲臺散吏黄震書贈薛留耕淳祐丁未戊申嵗余客於台州使君時為客者紛然惟余與留耕薛君安其素及余西上薛君送余蓼溪余臨别贈之言曰舉世滔滔病一貪君攻醫學獨曽參十年州館無私謁萬里交情只雅談殿上呼盧終喝六嵗寒論友更無三天公有意君知否歸看青䆫四五男時薛君讀書者四男未有五也牽於字句及之耳去之二十四年余倅紹興捧檄台州慮囚薛君過余愀然言曰兩子能文者蚤世兩子存者不甚愜吾之心幸已生第五子未知方來果何如也又六年余持節鄉部薛君復携其第五子過余而言曰此子今已讀書肄業鄉校君父得異人丹竈之術此子亦能世之矣余笑曰然則前三十年蓼溪之請不其驗於此乎且進其子而勉之曰而父號留耕而子其勉之耕而穫當在子徳祐元年六月二十五日慈谿黄震書于鄞之月湖之涵虚館黄氏日抄卷九十
