body:
  text: 黃氏日抄卷五十二宋黃震撰讀雜史二汲冢周書汲冢周書七十篇自度訓至小開解凡二十三篇皆載文王遇紂事多類兵書而文澀難曉自文警至五權二十三篇載文王薨武王繼之伐商事其文問有明白者或類周誥自成開解至王㑹解十三篇載武王崩周公相成王事問亦有明白者多類周誥自是有祭公解史記解穆王警戒之書也職方氏繼之與今周禮之職方氏相類芮良夫解訓王暨政臣之書也王佩解亦相類自周祝解至銓法解不知其所指終之以器服解而器服之名多不可句水旱飢荒其至無時非務積聚何以備之夏針曰小人無兼年之食遇天飢妻子非其有也大夫無兼年之食遇天飢臣妾輿馬非其有也國君無兼年之食遇天飢百姓非其有也戒之哉弗思弗行至無日矣諸橫生盡以養從生盡生盡以養一丈夫橫生萬物從生人也一丈夫天子言非民所奉者天子也文傳解若農之服田務耕而不耨維草其宅之既秋而不穫維禽其饗之人而獲飢云誰哀之大武解天道尚右日月西移地道尚左水道東流人道尚中耳目役心吉禮左還順地以利本武禮右還順天以利兵將居中軍順人以利陳武順解水泉深而魚鱉歸之草木茂而禽獸歸之稱賢使能官有材而賢歸之若冬日之陽夏日之隂不召而民自來此謂歸德大聚解周公正三統之義作周月惟一月斗柄建子日月俱起于牽牛之初右回而行月周天起一次而與日合宿日行月一次而周天厯舍于十有二辰凡四時成歲春夏秋冬各有中氣以著時應春三月中氣雨水春分榖雨夏三月中氣小滿夏至大暑秋三月中氣處暑秋分霜降冬三月中氣小雪冬至大寒閏無中氣斗指兩辰之問夏數得天百王所同商以建丑為正亦越我周改正以垂三統至於敬授民時巡狩蒸享猶自夏焉是謂周月周月解諡法經緯天地曰文道德博厚曰文學勤好問曰文慈惠愛民曰文愍民惠禮曰文錫民爵位曰文諡一而義不同如此曰武者五恭者九其他類此時訓解民至億兆后一而已寡不敵衆后其殆哉禍發於人之攸忽咎起於人之攸輕心不存焉變之攸伏以言取人人飾言無庸飾言事王王貌受之面相誣䝉難至而悔將安及芮良夫解不幸在不聞過福在受諌尊在慎威王佩解國所以為國者以有家家所以為家者以有人天下非一家之有也有道者之有也右明白有理可讀者謂惡率諸侯以朝賢人而已獨不往謂五年之積者霸愚恐周初興時無此說謂武王既勝殷庶方不服者分師俘之凡憝國九十有九服國五百六十有二愚按此與一戎衣而天下大定之說相反然孟子亦自言滅國者五十又謂殷之五子亡伯禹之命用胥興化亂是與五子之歌相反謂湯將放桀先居中野民皆歸之桀乃致國於湯湯不受桀南徙千里民復奔歸湯桀又徙魯民歸湯如初桀復去湯乃放桀而復薄又以國讓三千諸侯而後即位是夏商乃禪也非伐也恐亦未必然右可疑者如此謂文王受命九年謂文王忌商謂文王在酆聞密命密人將為紂謀周謂武王將起師伐商召周公曰嗚呼謀泄哉今朕寤有商驚豫夢為商所伐右可參訂按周自太王肇基王迹實始剪商商周勢不兩立勢或有之謂周無心得天下而非漢人受命之說自歐陽公始耳子母幣相輕乃作子以行其母大廷解少庭昧爽立于少庭酆保輕吕劔名武王伐紂擊之以輕吕反坫乃立五宫咸有回阿反坫注反坫外向室也作雒解王㑹主王城既成大㑹諸侯及四夷繁露注冕之所垂也王㑹解爻閭王㑹張赤帟於四隅諸侯欲息者息焉命之曰爻閭桴苡其實如李食之宜子同上胄子胄子成人能治上官謂之士注𦙍也此書出汲冡多類兵書後多類周誥然伐商遷雒之事多與今尚書合而文無一語相合將戰國之士倣而為之歟然不可曉也國語國語起穆王伐犬戎訖越句踐滅吳分國以紀謀議凡隂陽律吕天時人事逆順之類焉其文宏衍精潔韋昭注文亦簡切稱之昭謂左邱明作迹其事事必要禍福為驗固與左傳類然考其歲月春秋傳以諡載趙襄子已非出於孔子所稱之邱明今國語避漢諱謂魯莊嚴公又果左邱明之作否耶惟事必稽典刑言必主恭敬周衰之崇虗邪說一語無之是足詔萬世也召穆公謂民當道之使言而不可防芮良夫謂利當布之上下而不可専此萬世不刋之明訓足以進之六經正不俟厲流彘而後知其言之足信也萇𢎞之見殺特坐右劉文公以預晉范氏亂耳若曰天之所壞不可支而罪其城成國則凡國家中微皆當棄之不為而為之輒為逆天乎且天亦何嘗不欲支人之國耶賔服者享荒服者王逺夷世一見王也農祥房星也立春農祥正一墢一耜之墢也王耕一墢班三之料民料數也三川涇渭洛按戰國䇿注謂羲陽邑地震陽伏而不能出隂迫而不能蒸杜伯射宣王于郭注謂殺杜伯非辜明年伯射殺王穆王丹朱馮房后生穆王全蒸全體升之蒸升也房蒸半體殽蒸解體而折之爼謂折爼舌人導四方之志天根亢氐之間也天根見而水涸謂寒露後五日吕吕姓吕齊也夏大也成王不敢康云道成王之德也成王能明文昭能定武烈也泉右曰泉轉曰錢母子相權物輕而作重幣行之為母權子物重而以輕幣權之為子權母榛楛濟濟作盛世氣象不作比興曹好曹惡注曹羣也立飫謂禮之立成不坐也右周語魯臣謀議雖必于典禮抑亦其文耳三家日強公室日卑禮於何在惟李治為季武子紿使迎襄公而璽書繆以取卞為卞人叛既而知其使豫欺君也致祿不出此為知禮右魯語管仲為游士八十人奉以車馬使說諸侯異日卒以捭闔亂天下者此殆其作俑歟右齊語晉文公讀書三日曰行未能咫聞則多矣其臣趙衰行年五十守學彌惇悼公之幼事單襄公也立無跛視無還言敬必及天嗚呼世豈有不學而可以為國又豈有空文無實而可以言學者哉女戎史蘇謂戎必以女戎報晉豕牢太姒少溲于豕牢而得文王注溲便也豕牢厠也逆旅旅客也逆客而舍之也跗注兵服也自要以下注於跗無德而隆猶無基而厚墉春秋司馬侯謂悼公曰羊舌肹習於春秋注云紀人事之善惡而目之以天時謂之春秋之法也時孔子未作春秋又楚語莊王使士亶傳大子申叔時告之曰教之春秋以成勸其心九京趙文子與叔向游于九京注京當為原晉墓也忨日㵣歲秦后子言趙孟也注忨偷也㵣遲也壘培茍寅所作壁壘雀入海化為蛤雉入淮為蜃蛇成鱉黿石首成􅝶小曰蛤大曰蜃右晉語方幽王時史蘇謂鄭桓公曰成天地之大功者其子孫未嘗不章虞夏商周是也周衰晉楚齊秦必將代興謂楚之祖祝融司天齊之祖伯夷典禮嬴之祖伯翳能議萬物以佐舜晉則武王之後惟晉在也已而皆然然其所由興者非其道矣其子孫之責歟抑世變耶祝融祝始也融明也九藏胃旁光腸膽并正藏五為九數極於姟萬萬曰姟檿弧箕服實亡周國宣王時有童謡云有夫婦鬻是器者王戮之於路哀弃路之女夜收之長為褒姒右鄭語觀射父對昭王重黎之問稱古者民神不雜自少皥衰九黎亂夫人作享民匱于祀顓頊受之乃命南正重司天以屬神命北正黎司地以屬民使復舊常是為絶地天通其後三苗九黎之亂德堯乃育重黎之後以至夏商故重黎世叙天地而别其分主愚謂楚俗尚鬼淫祀至今觀射父之論極其本本源源矣芰菱也見嗜芰注三拜楸舉降三拜於蔡聲子右楚語古之邇讎人而見殺者齊騶馬繻以胡公入於具水邴歜閻職戕懿公於囿竹晉長魚蟜殺三郤於榭魯圉人犖殺子般於次闔閭親見殺於越夫差忘不共戴天之讎而甘其子女土木之啖此豈足與謀國而子胥依之不去復強諌取禍意者進専諸以弒君僚進要離以戕慶忌進孫武教兵禍楚以鞭親嘗北面平王之尸胥之禍結在吳有不容逭者歟天王越之行成於吳曰昔者越國得罪於天王注云尊之㢋旁擊曰㢋越五大夫舌庸苦成范蠡臯如大夫種右吳語春秋戰國近五百年以功名始終者惟范蠡一人且其言曰君辱臣死昔者君王辱於㑹稽所以不死者為此事也今事已濟請從㑹稽之罰陳誼堅謙而不可破吳滅即行曽不留刻蠡真烈丈夫哉子胥曰三江環之民無所移注松江錢塘浦陽也言二國之民三江繞之遷徙非吳則越也及越欲釋吳范蠡諌曰與我爭三江五湖之利者非吳邪又戰於五湖注云五湖太湖也五湖蓋即今太湖內分五名則三江必非書解所逺引之三江又越絶書出三江之口入五湖之中越伐吳路也按五湖即今太湖則三江似指今吳松江口書注逺引他水者非又秦語越王禽之於三江之浦囷鹿空虗圓曰囷方曰鹿浹日從甲至甲為浹浹匝也周語注自今至于初吉上文先生春六日告稷則初吉者孟春之初注引詩為二月初吉合考右越語戰國䇿甚矣三代既降人才隨世以就功名尚皆依倣先王之餘至戰國而後肆無忌憚也管仲之所營者功利也然必假大義而後能致諸侯之服從子産叔向之所優者詞辨也亦必昭舊典而後能却強國之侵暴更春秋入戰國七雄爭強風俗益變雖使管仲復生盟誓已無所施雖使子産叔向可作辭命非已所恤惟日夜鰓鰓然謀所以侵人之國亦日夜惴惴然懼人之侵其國利害交戰志念搖蕩士生其間始習為揣摩之術以軒輊之朝秦暮楚倐寒忽暑舉四海生靈之命盡簸弄於游士三寸之舌諸侯明知為其所詐而不敢問明知為其所敗而不敢殺何也忤於此必逸於彼毒於我將滋甚也殺其一必杜其餘我將無與共國也嘻其無忌憚也固宜然今考其所謂揣摩大要不過合從離橫之兩端要其節目又不過獻地於彼取償於此或隂合以緩兵或中立以乘弊之數說展轉相因無非故智投機輒用有同套括如馮章之獻漢中以給楚即張儀之獻商於給齊如陳翠之說燕太后以質子即左師讋之說趙太后以質子獻珥立后昭惠所用伺楚即薛公所嘗伺齊夜行自喻假産所用說新城君即白圭所嘗說新城君忠妾進酒之喻蘇秦既嘗用之以鉗燕蘇代又復用之以鉗燕王斗說齊宣王為冠必使工為國不使工而使便僻愧牟說趙為冠必待工為天下不待工而使幼艾他日客有謂買馬必待工者亦此類也淳于髠謂兔犬俱斃而田父取之蘇代謂蚌鷸相持而漁人得之他日陳軫謂兩虎既斃一舉盡得者皆此類也甚至道聞土梗之鄙語蘇秦既施於孟嘗再施於李兊脅以他有美女之細術張儀先用於鄭褒以取金後用於鄭褒以脫身儀秦之於戰國所謂傑然其間為游說宗師者且一說而一身襲用之况於其餘固可槩見特以天下分裂辨說交馳此之不容彼之必售一時諸侯不得不屈以聼之其所以稔生民之禍蓄時人之怒者蓋非一日之積七雄既并而為秦士之見賤也亦勢矣嗚呼士所以措天下於治者也而反以助天下之亂尚得謂之士乎愚嘗謂戰國二百餘年間惟魯仲連正名義止帝秦為天下士惟孟荀明王道宗孔氏為萬世士彼紛紛者不足言士前輩謂蘇秦約從秦兵十五年不敢窺山東乃游士誇談本無是事今觀戰國䇿謂齊之君王后事秦謹王建四十餘年不受兵謂孟嘗君用馮諼之言相齊數十年無纎毫之禍實則齊建日為秦侵削至亡孟嘗亦亡滅無噍類戰國䇿出於其徒自為之故類張皇欺世如此世之罪秦者謂其廢封建也壞井田也然封建非秦所除井田非秦所壞也春秋戰國以來諸侯之得地者皆縣之則久矣其封建之除也自作丘甲田賦以來諸侯之豫人田者或萬畝亦久矣其井田之壞也以德相服諸侯無敢變法易令計不過五帝三代始興之時為然人亡政息各逞其私自炎帝政衰以相侵伐自此暫定復擾極而至於七雄如蠻徭蠱毒聚衆毒於一器不併滅於一則不止秦特蟲毒之最後死者耳蓋自生民以來相生相養相保相聚之天下其弊於此乎極澒洞瀾倒彼自莫知其所以然秦何能除封建壞井田而秦亦烏能久存於六國既滅之後哉魏惠王問公叔痤病痤薦其子公孫鞅且曰弗能聼勿使出竟惠王謂其言悖鞅果之秦而魏日削䇿曰此非公叔之悖惠王之悖悖者固以不悖者為悖愚謂戰國亦何事而非悖哉惠王不能信痤之言固悖矣痤為人父而屬其君殺其子非悖乎鞅為人子而削其父所事之國族非悖乎且史記載鞅為痤之中庶子中庶者官稱非嫡庶之庶也䇿之所載亦自悖矣戰國之臣惟簸弄其君以竊富貴甚者倚勢於國而取重於人之國又甚者給取其祿而反禍其國或竊祿其鄰以自禍其宗國忠於所事者惟虞卿國語之文出一手戰國䇿多脫誤不可曉韋昭注國語簡明髙誘注戰國䇿不全而存者亦未必盡然如天下隂燕陽魏直以燕北魏南南北勢相表裏耳注乃云隂小而陽大誤矣如薛公入魏而出齊女韓春勸秦取之以齊秦劫魏此謂魏出齊女而秦取之耳注乃云婦人大歸曰出誤矣如吕不韋謀立秦之質子異人而說太后弟陽泉君曰子異人賢才也注云子異人名語若以子異二字為人之名而不以子字為公子之子又不以異人二字為公子之名語亦不白矣柱國見東周第一卷府聚也見秦一注旗以青與赤為文赤與白為章見秦一注孝已商髙宗之子見秦一注三川義陽州見秦二注耨暴背而耨見秦四注末路行百里者必於九十此言末路之難見秦五注忤古伍字見秦五注上舍靖郭君善齊兒辨君之上舍見齊一猖虗唱之唱作猖見齊一注與國相為黨與也見齊二注曲逆今濟隂縣見齊二注荼與欎雷鬼門二人見齊二注五大夫杜赫說楚取趙楚子之五大夫又魏信陵君使人謂安陵君曰其遣環髙吾將仕之以五大夫又秦使五校大夫王陵伐趙見中山安語助秦禍安移見趙一注埊本武后地字而戰國䇿與鶡冠子亢倉子皆有之見趙四注接手意猶拱也見趙四注忌下旴夷姓名也魏作于夷見魏一注欒音鵉漏流水也見魏二注前和和謂棺之前也見魏二注孿子雙生也見韓三摩箕山趙以姊為代王妻因飯以食斗尾擊殺代王其姊摩箕自刺白璧玉環也見衛注吳越春秋太伯三讓而周興季札三讓而吳亡以季札為賢王季其不賢者乎札周之後也不慕其前文人而區區慕一曹子臧且闔閭為亂札反為之使晉以觀諸侯之變曽不聞一語諌止何耶吳之有季札猶宋之有公子目夷也目夷既遜位襄公襄公用鄫子諌圍曹諌求諸侯諌楚半濟而不擊又諌襄公雖不用而目夷於宗國之義盡矣札遍憂他國之存亡於宗國獨忘言焉又何耶然則札未得與目夷比其聞於後世者博學耳子胥之所當讎者費無忌也楚既為之殺無忌滅其家昭王又使人謝先王之過而勉之歸則子胥亦可已矣而至鞭平王尸世豈有不忠而可言孝者哉夫差不可與言功成不去而強諌取死且屬其子於齊鮑氏以開讒間者之口又幾於暗者之為何也吳越春秋紀越王出師次第令人興起於千載之下然多誣誕全類野史如謂湛盧之劒水行入楚如謂公孫聖既死三呼三應如謂天美禹德使百鳥還為民田如謂越絶無祀有人生而言語自稱無余君之苗裔如謂越之怪山自琅琊一夕自來如謂天生神木一夜而大二十圍如謂越女教劒見袁公飛上樹化為白猿如謂子胥之靈能拒越兵以鬚髮射人誣誕至此豈作史垂世之義乎作膾自闔閭燕功臣始氷厨越王食處越絶書越絶之義取句踐功成能絶人之惡於理既無當矣謂子貢所作又疑子胥所作而所載乃及建武二十八年何其自為矛盾耶其書大扺祖襲吳越春秋而文則雜而不倫矣史記載楚滅越殺無疆諸侯子爭立於江南而吳越春秋載無疆卒子玉立玉卒子尊立子親始失衆自句踐後立八王皆稱霸徙琅琊者二百二十四年而徙於吳越絶則謂無疆名之侯之侯子尊尊子親親失衆楚伐之走南止此為不同檇李即史記稱雋李越五劒勝邪純鈎巨門湛盧魚腸吳三劒龍淵工布泰阿又干將莫耶以鑄劒夫婦姓名稱金穰出越絶書計倪云太隂三年處金則穰三歲處水則毁三歲處木則康三歲處火則旱凡十二歲一飢黃氏日抄卷五十二
