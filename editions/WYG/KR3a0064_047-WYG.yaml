body:
  text: 黃氏日抄卷四十七宋黃震撰讀史二漢書董仲舒自孟子没後學聖人之學者惟仲舒其天資粹美用意純篤漢唐諸儒鮮其比者使幸而及門於孔氏親承聖訓庶幾四科之流亞矣若其謂正其誼不謀其利明其道不計其功如許正論前無古人其後能見之發揮者惟伊洛諸儒嘗見之行事者惟諸葛孔明所謂漢賊不兩立成敗利鈍不暇計者也嗚呼至矣賈誼天資甚高議論甚偉惜不聞孔孟之學然一時無與比者其後經畫漢世變故皆誼遺䇿汲黯黯以純剛至正之氣卓出漢庭之右自天子以下皆嚴憚之黯言雖不用漢鼎之增重亦多矣子曰棖也慾焉得剛黯庶幾無慾者與後世士大夫一為利祿所汨雖飾以仁義累千萬言豈復有是痛快令人心開目明者哉嗚呼黯所謂人中龍也陸賈賈以詩書說高帝一時群臣無有也賈以吕氏欲王諸吕而病免豈忍一日茍祿於君側既病免復傅㑹將相以誅諸吕又豈忍一日茍忘其君此亦一時羣臣無有也嗚呼賈庶幾以道事君者與史以酈陸朱劉叔孫同傳朱建叔孫通不足道也食其庶幾知擇君婁敬庶幾能自奮然豈賈儔伍哉蒯伍江息夫蒯通口給不在儀秦下㑹真主出興故無所售其姦伍被歴歴與淮王辨初若通於漢者故史氏謂忠不終而詐讎然伍被豈能忠者哉凢傳中所述皆漢庭對吏之言歸過於君以冀免死被豈能忠者哉江充以巫蠱危太子息夫躬以巫蠱危東平以疎䧟親固之論當矣愚謂邪說之䧟人皆由乘間而入故君人者不可不以明理為務禍福各以其類至天下安有巫蠱之理萬石衛直周張石慶衛綰皆所謂忠信之人特未學耳以之為三老助教化厲薄俗可也宰相非其任矣直不疑之償金周仁之尿袴類不近於人情而仁以密見狎出入宫禁殆閹官之靡又非不疑比也若張歐雖刑名學而有仁心其庶乎文三王三王者梁孝王代孝王梁懐王也大扺漢於諸王不教以禮義而乃大其封邑適所以禍之袁盎諫趙談驂乘正論也實則恐其害已戒申屠嘉禮士善言也實則媿其輕已盎平生挾詐率此類也晁錯孟子所謂盆成括之流且其言兵事徙民實塞等議蔚有文華至賢良䇿則絶無義理葢君子喻於義小人喻於利言小小計數則可奉大對非所長也文帝賜民田租却自入粟一事始不為無補於漢張釋之釋之守法識大體為漢廷尉第一于定國非其比也馮唐鄭當時馮唐論將數語我朝藝祖嘗用之西北諸將可為萬世法鄭莊推轂本立朝第一事然四郊置馹則戰國四豪之餘風非孔子舉爾所知之意矣莊事君無所臧否而所引又皆興利之人故莊盜名者也非為國者也不足以玷張馮汲黯諸賢之後竇嬰田蚡灌夫竇嬰田蚡灌夫三人班贊所謂凶德參㑹者也愚按嬰為將賜金不入門蚡為相驕橫占田宅嬰以景帝欲傳梁王犯顔力爭蚡迎淮南王霸上私納交以成其惡嬰雖他未見過人者其賢於蚡則萬萬矣蚡驕傲以召禍夫狠恣以成釁嬰不幸與夫交亦淪胥以敗耳初嬰以栗太子之廢屏居南山下一聞高遂之說幡然而改使嬰失勢之後早得賢士大夫交聞知幾逺害之論其庶乎賈山山以文帝賢君不免田獵之娛故勸以親賢講學為務所以致君之意極善傳言不能為醇儒葢謂其不專守一經耳非以其行己不醇也鄒陽枚乘本未免戰國游士之餘習能持正論可嘉乘諫吳王書尤明切路温舒温舒一疏切中時弊葢自武帝後法益煩苛宣帝初即位温舒兾一掃除之論者謂其切中宣帝病則非也時帝未有施行温舒以言尚德緩刑見喜不責以獄事而遷為廣陽私府長正猶仲舒以言修德更化見喜不使之立朝而逺為江都易王相敷奏以言明試以功循名責實之意果如是乎要之武帝夲心實不在修德宣帝本心實不在尚德雖曰喜之非能心誠好之也二帝終身之所行已占於此時矣建明宣帝之世王吉之外惟温舒耳其說皆萬世君臣當服膺者王吉所言者大體温舒所言者一事王吉儒者温舒忠信之人韓安國安國長厚好靖武帝好大喜功故帝雖器之而卒困焉景十三王景十三王惟河間王最賢其學甚正雖當時士大夫亦鮮及之餘率驕恣自滅大率漢之封建非特城邑過制亦失雖有周親不如仁人之意故適足以禍之耳李廣廣之材盡出一時之上廣之功盡出一時之下或者謂其有悔而廣亦自悔其殺降廣之不遇其以是與若我朝曹武惠提兵百萬不妄殺一人富貴與宋無極嗚呼盛哉廣邊將材於守右北平見之使武帝志在息民專任李廣足矣李陵武帝區區欲侯一貳師故借陵以成其功陵不屑卒以無救而敗悲夫有天下之大者柰何以人材之良民命之重為迎恱嬖妾計哉蘇建蘇武子卿之節千古一人衛青霍去病衛霍皆以戚畹用霍能大言阿意故尤見寵任要之武帝之兵從欲之兵也則亦何往而非私哉二人皆孟子所謂民賊班氏之傳每一出兵即繼以匈奴冦邊殺略多以明二人非能禦冦乃冦之招非徒無益而又害之二人之罪尤著看衛霍傳須合李廣傳衛霍深入二千里聲震夷夏今看其傳不直一錢李廣每戰輒北困躓終身今看其傳英風如在史氏抑揚予奪之妙豈常手闕陳勝吳廣秦之煩勞天下可監也已項籍項王非特暴虐人心不歸亦從來無統一天下之心既滅咸陽而都彭城既復彭城而割滎陽既割鴻溝而東歸皆是羽按甲稱伯之秋不知高祖志不在小天下不歸於一不止也張耳陳餘耳餘號刎頸交其為交可知矣後卒如其說云魏豹田儋韓王信以故國之後乍起乍滅無足多論者韓彭英盧吳班史以此同傳者謂韓彭英以大功盧以舊恩皆不克終惟吳芮傳國五世者得人心有道也垂訓之意深矣荆燕吳賈以燒楚積聚有功封澤以田生權激吕氏封濞以近親藉其鎮撫封濞獨以叛誅者以有山海之利班贊謂山海不以封是矣楚元王交交以好學禮賢開國故戍雖以叛誅而辟疆德向皆世濟其美漢之宗英於斯為盛歆不念厥紹而附賊莽以自覆其宗豈復有人心也哉傳中山陵一事可為萬世戒季布欒布田叔季布俠士欒布田叔義士叔尤長者高五王趙隠王以鴆死趙幽王以幽死趙共王以憤死燕王建有子亦見殺惟齊王肥獻城吕氏之女幸脫虎口甚矣吕氏之不仁也肥子朱虚侯竟能手誅諸吕復安社稷嗚呼真高皇帝子孫哉曹參曹參天下甫定逺相侯國此所以獨不見疑於高帝也然又安知非帝有心於逺之耶張陳王周良善謀漢亦善自謀陳平詐謀功不補過王陵守正周勃則重厚盡之亞夫重厚而守正惜景帝之不知也樊酈滕灌傅靳周噲勇士商亦戰功居多世謂况賣友非也古者大義滅親况吕氏依憑城社小人耳無事與之相接義當去則去之何友之足云耳夏侯嬰四朝驂乘忠信可知灌嬰為吕氏將兵而與絳侯謀可謂知義傅寛靳歙皆戰士周緤才不逮之而有忠君愛上之心以功名自終宜矣張周趙任申屠張蒼福人周昌直諒趙堯以術傾周昌之任任敖特以舊恩用申屠所謂好剛不好學者乎然亦賢於人多矣司馬相如相如素行不謹立朝專是逢君之惡或者猶以其文墨取之不知大人等賦封禪等書正其逢君之具也吁尚足置齒頰間哉公孫𢎞言西南夷事不聽自是不復廷爭難以置朔方之便即謝以不知其便若是𢎞之曲學阿世大率類是其徙董仲舒膠西遷汲長孺内史皆欲置之死地此後世權姦薦顔真卿使李希烈之陰謀也㓙慘若此又不止阿世而已秦誓曰人之有技媢嫉以惡之人之彦聖而違之俾不通寔不能容以不能保我子孫黎民亦曰殆哉大學曰唯仁人能放流之迸諸四夷不與同中國嗚呼非斯人之謂而誰謂與買臣難以置朔方之便發十䇿𢎞不得一𢎞非不能得也希㫖而偽屈耳𢎞亦姦哉卜式式輸財以逢君而富民莫應於是乎有告緍之令式願父子死邊以逢君而諸侯莫應於是乎坐酧金失侯者百餘人牧豎無知禍人乃爾吁兒寛寛為内史勸農桑緩刑罰殆循吏也而曲說傅㑹以贊封禪之决卒與相如同科惜夫張湯杜周張湯杜周皆以人主意為獄而湯子安世匿名迹逺權勢周之子延年輔霍光以寛厚復孝文之舊政皆能擁昭立宣功在社稷子孫世守與漢無窮賢者葢前人之愆其效乃如此張騫行險僥倖為國生事李廣利武帝以聲色故欲侯廣利以犬馬故欲兵貳師而廣利為貳師將軍焉嗚呼其失德之參㑹與司馬遷遷以邁往不群之氣無辜受辱激為文章雄視千古嗚呼亦壯矣惜乎其未聞道也葢吾夫子病紛紛者之誣民也討論墳典斷自唐虞以下訖于周周衰不足以訓復約史記以修春秋百王之大法盡在是矣今遷之所取皆吾夫子之所已棄而遷文足以詔世遂使里巷不經之說間亦得為萬世不刋之信史斯說也聞之故師席王宗諭文貫武五子觀戾太子事益知教太子不可不謹嚴助守㑹稽數年不聞問其才可知徒以捭闔取寵亦以捭闔誅朱買臣吾丘夀王皆武帝私人折難大臣者壽王難禁弓矢視難築朔方者優焉然寶鼎非周鼎之說則俳優取寵爾主父偃反覆傾危之士徐樂土傾瓦解一書大要可觀惜其駁處多嚴安嚴安一書言武帝靡敝中國結怨夷狄而其後則謂郡守之權非特六卿豈慮根本既耗或有乘時而起者耶終軍終軍少年能文章一不幸白麟竒木之對又不幸言而中皆所以盛其氣而趣其顛也嗚呼安得以白露蒹葭之詩而告之王褒帝所幸宫館褒輒為歌頌太子體不安褒以誦讀虞侍然則褒以文為優戱者與賈捐之罷珠崖一議豈特有益當時亦可垂詔萬世惜其交楊興以躁進自罹石顯之䜛鋒也然君子不以人廢言東方朔朔固滑稽之雄也然未嘗有一語導人主於非至其却董偃諫起上林對化民有道三事忠言讜論如矢斯直一時文墨議論之士孰有髣髴其萬一者乎公孫賀賀以戚畹父子並位公卿無德而祿殃及固宜若其悲泣不受宰相印綬則漢事從可知矣劉屈􅈊戾太子之變使宰相得人明太子之無他察江充之傾危抗章武帝身任安危之託猶庶幾也而使屈􅈊當之悲夫車千秋王訢二人為相於慱陸侯輔㓜主之日尸位而已無足論者世率以是議光不選任賢能而徒取其易制不知漢自武帝來宰相之具位久矣受遺詔者大司馬則宰相之實葢在此而不在彼也張安世杜延年皆一時之選而光皆以之自副光豈棄賢者哉特其不學不知宰相為重終以具位者充之耳楊敞敞具臣耳惲有行能而以自伐取禍惜乎蔡義王訢之徒也陳萬年萬年以善柔取顯達其子咸以絞訐取憂患皆非中道鄭𢎞𢎞昌兄弟皆能吏而宏為優楊王孫王孫平生厚自奉養死遂羸葬非矯世也矯過以自文也何傳為胡建建小有才斬御史以立名自作不靖之一端圍捕葢主之廬以取死非大節所繋死傷勇矣朱雲雲狂直未得進退之中道願斬張禹一語萬世而下讀元成史書悶悶者至此未嘗不心開目明若執熱之濯清風也嗚呼雲亦一時英傑也哉梅福福畎畝不忘君賊莽僭竊則一旦飄然逺去賢於揚子雲諸人逺矣云敞敞奮不顧身以収其師而為賊莽用胡不充其所以事師者事君耶霍光金日磾霍光不學無術三尺孺子亦習聞其說而忽之愚觀漢自武帝五十餘年騷動疲極之餘海内蕭然幾無所措手足光以宏毅開濟之資託六尺之孤身四海之寄訖十三年百姓充實四夷賔服復廢昏立明舉金甌無缺之天下以畀之是中興漢室者非宣帝實霍光也彼其出入禁闥二十餘年小心畏謹未嘗有過每出入下殿門進止不失尺寸屹然天人也故成就之大若此雖曰未學吾必謂之學矣豈後世泛泛文墨議論若私意小智以為術者能與於此哉故嘗謂三代以後身係安危若愽陸侯若諸葛武侯若郭汾陽人品雖各不同皆百世不可及若霍氏所少獨盛滿之戒耳不然以功論之雖伊周亦何以尚兹日磾自在左右目不忤視者數十年天資篤謹與博陸侯相上下而又不敢以夷人先中國以帝少不敢受遺詔之封其器識皆逺過於光使日磾為光當其歸政宣帝謙譲不受時必能奉身而去之矣日磾之後世名忠孝七世内侍亦宜哉趙充國趙充國老成持重為國家計為民生計而功名之念不入其心漢世諸將孰能與比其謂明主可與忠言謂老臣不以餘命壹為陛下明言誰當復言之者篤信力行不遷就不回撓凛然古大臣之風烈又非特才智而已也嗚呼使充國得任天下當如此兵矣柰何獨使之參兵謀而已耶辛慶忌慶忌為吏所在著名而居處恭儉可謂賢矣王莽秉政辛氏遂廢其子孫又皆無負於漢云傅介子介子賫金帛誘樓蘭而刺之使堂堂大漢無故行盜賊之行於夷狄惜哉彼小人兮又何翅蝶蝥之靡而已常惠漢兼制西域以力不以德古帝王不為也故奉使西域者類無足道彼善於此則常惠優焉葢其合諸國兵攻龜兹尚能聲罪致討王歸罪姑翼即斬姑翼一人而還庶幾王師之體不生事夷狄也况惠與蘇武使匈奴俱有不降之節耶鄭吉攻破車師遂䕶鄯善以西南道迎日逐王并䕶車師以西北道西域都䕶之置自吉始甘延夀陳湯郅支叛漢斬其使驕慢而暴湯發諸國兵與延壽伐之未為生事但矯制成功不可以訓段會宗會宗之為都䕶生而西域敬其威信死而諸國為之立祠孰謂夷狄不可化誨懷服也哉雋不疑不疑剛而能斷其引蒯瞶以折戾太子特一時應卒之機耳於經義則未合葢昭帝親受先帝天下太子久廢君臣之分久定使戾園在亦不過退就藩邸奉朝請耳與衛輒不受命而自立以子拒父者非類也疏廣二疏知足千古清風不欲以多財益子孫過尤人當服膺者于定國定國身為九卿猶迎師身執弟子禮今無是矣為廷尉十八歲不遷今亦無是矣薛廣徳廣德見小而沽激平當彭宣當辭封宣乞骸皆小廉自矯非大臣進退之義王貢兩龔鮑四皓自潔之士鄭子真狷介之士不為王鳳詘知人嚴君平僻學其不忘與人為善之意則美王吉事昌邑甚得輔弼之義上宣帝一疏可謂通達世務不合即歸不為祿仕漢儒學識正大出處無媿董生而下子陽一人而已班孟堅以次逸民之後未為知吉四皓鄭嚴誠逸矣王陽逸乎哉貢禹所告元帝皆太上質素之說亦萬世人君所當知但當時政在恭顯不言而言此所謂放飯流歠而問無齒决此其為腐儒龔勝言董賢忤哀帝意莽秉政乞骸骨莽僭竊不以一身事二姓清矣舍每拜輙病免亦知大勢所趨而不辱其身者乎哀帝時丁傅並進董賢貴幸鮑宣反覆切諫雖昏如哀帝亦為感動不誠而能若是乎莽雖以其不附已誅之宣葢死有餘榮矣郭欽蔣詡栗融禽慶蘇章曹竟皆不仕莽世薛方僅以智免郇越亦病去官郇相紀逡唐林唐尊皆仕於莽大節已虧清於何有韋𤣥成𤣥成失爵作詩自劾復爵作詩自著葢知有富貴而已耳魏相奉行便宜白四方盜賊水旱等事皆有益國家獨其持刑太嚴復霍氏之怨太過未可謂其賢相丙吉相有纎怨於霍氏必報吉有大恩於宣帝不言相以嚴毅稱意吉以寛大輔政丙魏之不可同日而語明矣眭宏孟言災異至使漢帝䄠天下其以妖言死宜矣夏侯勝勝樸直無他腸若下人謀上之告亦幸中耳京房宴見元帝指謂石顯一事自足傳世餘說未然翼奉李尋皆夫子所謂小道可觀君子不為者也趙廣漢守潁川郡中震栗守京兆發姦如神非不一時大快人意而元氣索然矣况其善用鈎距率先以詐令相怨咎告訐成風若繩以古聖王之法其在所賞乎抑在所誅乎此猶其操切之過耳光在事光光死迎伺微指斬其闗謂非傾危徼利可乎疑蘇賢託其客罪賢疑榮畜教賢父上書殺畜事下丞相案驗復上書告丞相謂非姦私縱横可乎然則殊死之刑雖漢法太慘非廣漢自取之而誰哉尹翁歸守東海東海大治守扶風扶風大治温良謙退家無餘財翁歸其能吏之賢者乎韓延夀延壽為吏上禮義好古教化所至聘賢以禮待用廣謀議納諫爭表孝弟有行修治學宫春秋鄉射陳鐘鼓管絃之盛升降揖譲煥然三代之遺風其守馮翊也傷昆弟之訟田移病自責訟者悔謝轉相勅厲周徧二十四縣莫敢以辭訟言者孔子所謂為政以德有恥且格非與而以僭上不道竟坐棄市斯人也而有斯罪也是耶非耶或有之議賢議能議功猶有可言者而卒不得免焉望之傷善忌能之罪於是大矣其後望之亦身以無罪誅君子謂出乎爾者反乎爾張敞敞能吏也而以經術自輔不純用刑罰其守京兆也惟廣漢與敞為久任職班氏稱其治畧循廣漢而發姦擿伏不如嗚呼愚竊以為此其所以勝於廣漢與王尊尊能吏所至卓有可觀王章章直臣雖王鳳所舉而不附鳳葢寛饒寛饒訐以為直不孫以為勇無忠言讜論可益人國者而以不得遷失意不快至發為憤激之論稱五帝官天下三王家天下若四時之運功成者去嗚呼是何言與闕下之誅非不幸也諸葛豐易曰君子見幾而作不俟終日豊以司隸収許章而去節豊於是乎可以去矣何待詔御史之及哉劉輔鄭崇輔以諫立飛燕罪崇以諫寵董賢誅漢事去矣孫寳孫寶能吏大節不撓當孔光等誣誦賊莽功德時從容折難可謂歲寒之松栢毋将隆隆劾董賢奏傅太后賤買官婢不附王莽何並並為吏尚嚴而清潔無私蕭望之班孟堅稱望之堂堂折而不撓近古社稷之臣愚謂以望之視恭顯邪正判然以忠受誅誠可悲矣迹其平日天資忌刻亦有取禍之道也丙吉賢相也而輕之得無代之為御史大夫而見其寛大勝已乎不然吉為三公望之何以過之而輕之耶韓延壽良二千石也而劾之得無以其代為馮翊而見其聲名軋已乎不然延壽在東郡時事巳更大赦於望之何與而劾之耶論霍氏一姓擅勢實本於獨不除用之私沮張敞不可為三公實原於入粟爭論之私古者乘田委吏為之而望之不屑郡國古者上大夫下大夫一毫不相越而望之與宰相鈞禮古者祿以養亷周急不繼富而望之使守史賣買私所附益凢十萬三千曾是而可謂社稷臣乎當宣帝時吏治雖明而高帝立國之意已失恭顯用事而元帝蠧壊之萌已形使望之為社稷臣正當愛䕶善類同心輔佐以絶小人之根否則亦有王子陽之去而已夫何排賢去智共為操切坐視小人之横而不問俟其羽翼既成處優游不斷之世方與分朋植黨以爭勝負嗚呼事勢至此雖伊吕末如之何矣况望之乎馮奉世莎車叛漢奉世矯制攻之大率與陳湯事相似而無其跌蕩之過宣元六王元帝賜東平思王璽書及賜王太后璽書義理精純文辭惻怛殊有益風教匡衡史高方與望之有隙而衡為史高用巳失進身之道矣及身為大臣坐視石顯之横而不敢言則將焉用彼相哉張禹禹貪汚淫黨賣國為姦漢氏之亡於斯决矣孔光光不至如禹之賣國觀其忤傅太后事其心亦尚知有是非鄙夫患失噤無一語遂成王氏之羽翼與張禹同罪嗚呼甚矣患失之為禍慘也馬宫鄙夫王商史丹傅喜王商剛毅不平王鳳史丹忠懇卒全太子傅喜嗛虚有識不順傅太后皆戚畹之瑞也啇遭難而納女丹功成而燕樂惟喜也守正不阿至再益堅不肯一日茍安其富貴嗚呼喜其尤賢者乎薛宣宣吏才有餘而仁恕多愛可謂賢矣為相雖屬吏譏其無大體終亦無罪可言朱博博游俠耳平生為吏所到輙出竒譎以逆折其人以操持其下真小人之才也傅太后非禮求稱尊號攬權縱横傅喜以骨肉之親猶不肯茍順而去之博乃投機貢謟竊取相權仰藥宜哉翟方進方進為司直旬歲而免兩司隸為相九歲中傷尤多葢無益而非私意為之大抵志於嗜殺者未有不還以自殺也方進之死何必賁麗言星而後見哉谷永託儒為姦為王氏羽翼罪不勝誅杜鄴為王氏腹心可罪言丁傅於哀帝之世却是正論何武持心仁厚立朝正直賊莾惡其害巳而殺之哀哉王嘉嘉之事哀帝也剛方不撓開陳婉切可謂大臣矣方帝欲侯董賢嘉上封事為止數月既而下詔封賢詔語侵及股肱嘉如是可以去矣失此不為後數月因日食又言其後益封賢二千户又言彼漢何等法彼哀帝何等主而嘉可免乎哉武嘉師丹班氏稱武嘉區區以一簣障江河丹與董宏更受賞罸愚未敢以為信然也武嘉本以剛正之資居大臣之位茍得中主而事之去董賢者流如殺狐兎耳何江河之足云而武嘉豈一簣之賢而巳哉適不幸遇哀帝武嘉所當明行藏之幾爾丹以師傅居三公官封帝舊諫封后父諫傅太后求尊號又諫傅引經義開陳婉切惟不敢言乞骸骨一語未免失言彼董宏何人斯而以之參較勝負立賞罸又何足計哉士君子惟論是非耳揚雄雄淡泊而柔弱富貴既非所好節義又非所能故惟欲以文字名世方其年少氣銳識意未定歆艶相如之為又賦甘泉賦河東賦較獵賦長楊哆然不啻便足及乎年至慮易昭若發蒙幡然自悔前日之為也復擬論語擬易竟以預諸儒之列矣嗚呼雄為淫辭曼語中其殆抜足風埃脫身塵涴者乎不然西蜀又一相如矣然儒非徒文之可名也必道德深醇而後可以言儒必出處無媿而後可以言儒漢世之儒惟董生其次王陽可耳雄美新投閤大節已虧儒於何有按傳中皆雄自序類多文飾之辭非信史也循吏文翁之在蜀庶幾為生民立極之類矣黃霸之教化朱邑之慈祥龔遂召信臣之感厲勸率民心服從捷於影響非所謂至誠而動者乎後世從事於一切以御其民而曰古今異時教化不可復行於今也嗚呼亦弗思甚哉酷吏郅都公廉而敢諫守北邊匈奴逺却為治雖尚嚴首惡之外未嘗濫誅班史顧以之首酷吏何哉愚嘗反覆之終篇而後知古人用意之深未可輕議也大抵刑法之酷未必足以禁姦而適足以激民之姦漢自高皇帝以寛大立國其將相大臣又相繼以清淨為治涵養休息至於文景其民無不樸畏自重而都乃獨先之以嚴行法不避貴戚其意若曰不畏强禦而已而斬斬無餘味風俗遂為一變未幾寗成以陰刻之資而効之自寗成趙由之後乘多事之衝而甚之於是張湯之徒定律令王温舒尹齊之屬復以事湯得志一時相師皆務於酷而吏民益輕犯法盜賊滋起繡衣直指斷斬郡國亦且無可柰何推所自來誰實昉之夫貴戚犯法而避之固不可然天下獨無中道乎凡治道去泰甚者且矯枉一過其正其流弊乃爾愚故謂郅都非酷吏也而酷吏實自郅都始也傳之酷吏之首庸何辭古人所謂作俑之戒於斯信矣後世有天資剛正而疾惡太甚者盍亦少思哉貨殖傳首所叙備極古今之變可謂本本原原之論矣讀之令人三歎所傳自計然以來固以紀事變之始而以子贛參其間則不可之大者也夫子所稱貨殖云者若曰富貴在天有志於道者所不必問而賜乃未能忘情焉則於進學有妨未至於顔子之庶焉耳豈若後世生産作業孜孜於利者哉且以子贛孔門高弟而下與區區頫拾卭取者同科以纎瑕而汚拱璧又豈所以為賢者諱耶雖然以贛之賢而微有貨殖之心巳為班氏所辱如此為吾徒者亦可以戒矣㳺俠此傳議論極正大可垂訓萬世佞幸此傳立名極佳謂佞而見幸也賛稱愛之適足以害之一語尤切萬世而下幸之與見幸者皆足以戒矣匈奴五帝三王無富天下之心己所自治者不過千里以待諸侯而又卿大夫食采在焉自侯服以至要荒以至要荒之外皆使各臣其民各賦其土而巳不過以德為天下之共主何四夷之足患哉書所稱猾夏云者謂古苗頑不即功故思所以治之使無一夫不被其澤焉耳自秦去封建而郡縣之必使尺地寸天悉為己私以一人之智力而欲兼制四海九州之廣雖使五帝三王復生於封建既壞之後亦未知所以為計矣愚嘗因是而論漢世綏御之方惟文帝為得而仲舒之論未可謂其迂闊也帝初即位使告諸侯四夷從代來意量時度宜與匈奴和親尉佗自帝亦温辭以感服之匈奴或背約入冦逐之出塞即止使終漢之世待四夷皆如帝何不可者武帝一信聶翁狙詐之説兵連禍結海内蕭然董生之論似過於弱而實足以藥武帝之膏肓固乃厯厯排闢之何歟或謂宣帝以後欵塞入朝皆武帝所致不一勞者不永佚帝之功居多此又不思之甚也五單于爭立癰自内作不得已而求救漢何力之有而勞師費財賞賜鉅萬視文帝之費幾倍焉是亦不得而巳乎南夷兩粤朝鮮班史之論贊善矣文帝賜尉佗書惻怛懇到情見乎辭有人心者孰不為之感動乎西域班氏之論贊是也武帝通西域其說謂絶匈奴之援西域諸國皆小小邑聚或不滿百户實不能與匈奴相進退外戚班氏以外戚列匈奴之後非以漢世外戚之禍慘於匈奴與既復以孝元王后别為之傳即繼之以王莽而漢事終焉吁亦可悲矣孝元王后吕氏則天皆身為禍首王后則愚弱為賊莽所誑耳事情雖有不同要亦同歸於覆其族吁可懼哉王莽莽初折節為恭儉人未知其偽也哀帝立丁傅用事莽罷就國人多寃之南陽太守以莽貴重選門下掾孔休為新都相莽進其玉具寶劔為好休不受莽因曰誠見君面有瘢美玉可滅瘢欲獻其瑑耳即解其瑑休復辭讓莽曰君嫌其賈耶遂椎碎之自裹以進休休乃受元壽元年賢良以日食對䇿深訟莽功德莽徵還京師欲見休休稱疾不見愚謂休可謂見於衆人之所未見者矣惜班氏不以之冠清節之士也莽平生影借五帝三王之陳迹及六經孔孟之言隨聲遷就飾詐自欺一舉一動無非兒戱至死亦然可怪也夫可嘆也夫叙傳班彪王命論所以破姦雄覬倖之心深切著明猶不見聽則納履而去之當天下靡沸之時從容無媿可謂賢矣固之賦幽通將以致命遂志也然氣懾而辭戚固之不得其死已占於此經曰禍福將至有開必先又曰善不善必先知之其類此乎雖曰致命吾不信也東漢書東漢人才類過西漢西漢如董生王陽以道出處者不過一二人其他類皆才智之士東漢則忠信篤厚之士十居八九自光武初興一時驅馳介胄者已莫不然才智者可與集當世之功忠信者可與語古人之道然東漢卒不古若者世祖鑒新莽之弊終東漢之世士大夫未嘗得一日之權也以是事歸臺閣又歸外戚又歸宦官而道義之士卒殱於黨錮嗚呼悲夫天子之職在論一相而可因噎廢食也哉黄氏日抄卷四十七
