body:
  text: 黄氏日抄卷九十三宋黄震撰啓台州郡齋永沈寺丞印四書戊申冬伏以施藥不如施方曩已叨於一卷醫心猶甚醫病兹願見於四書然亦聊以自陳豈敢期於必得蓋聞自唐虞三代之立極至夫子集其大成迨周張二程之談經得文公更為精宻謂中庸為造道之奥謂大學為入徳之門論語皆答問之微言孟子盡義利之大訓既為提其綱要又復次其簡編支分節解而脉絡之相通辭約義精而毫髪之無限乾坤廣大因曉日愈見其光明海岱髙深賴春風更加其秀麗嗚呼盛矣蔑以尚之某賦性下愚得師最晩加以科舉之累豈知道義之方邇年以來榮望既絶収身心而伏讀覺氣味之愈長兹備門墻之貟遂免江湖之習但惟草本常疑字畫之訛况是蠅書難備頭顱之老在昔涪翁之後嗣受業晦庵之門人來此分符曽為鋟梓源流甚的製作尤工幸其可以校讎然奈難於摹印兹蓋恭遇某官斯文柱石後進梯航作師帥於名邦全任胷中之義理進儒酸於右塾同看架上之文章顧此盛心何嫌明告敬攄懇欵仰凟清崇庶於天台太守之門獲證考亭先生之學且所求者書耳可知下士之無他儻果得而寳諸何啻貧兒之暴富過此以外非所敢云通浙西常平朱提幹己未讀考亭書思親諗家庭之訓試吳門尉幸獲事子孫之賢他不足言此最可賀某官稟天間氣承道嫡傳蓋自堯舜三代以來惟孔聖稱大成之集迨至伊洛諸儒而後到君家會眞是之歸覺天地若為之重開雖蠻貊悉為之歸敬胡為吾黨反惑異聞髙者流於虚無既已牢不可解卑者溺於功利又復陋矣難言太陽雖赫赫以當空爝火亦時時而自耀賴聖上特為之崇奬故斯文尚賴以維持然非親得之見聞其將孰從而訂正夫子沒而㣲言絶幸有子思正途闢則羣枉消兹屬執事至若推行先志輔佐明時使凡華夏之民均被仁義之澤是又待皇天之祐宋何敢以俗語而諛君某粗知嚮方全欠刻苦饑寒之迫曩既奪於科舉遲暮之近今復溷於仕途毎顧初心不勝慚汗幸得近先生書冊之側無異遊武夷山水之間塵埃楚箠之餘尚當受業雲天帡幪之賜不復贅言依嚮最深編摩罔既謝洪發運特薦庚申春易節日畿不改照臨之舊飛章天陛俄驚褒拂之新何物么㣲䝉此特逹聞朝廷之開薦舉本為孤寒自有司之限定貟飜成紛奪必欲脱去尋常之累于以大開衆正之門下以非法之所急而不求上以惟意之所予而不泛是名陞擢以待英賢如某者技極五窮官卑一尉惟有忠赤可酬上蒼人方笑其草茅公乃儕之桃李天姿甚陋飾以清苦之名吏事非長文以謹細之説凡其廉隅之自守正以分量之素㣲乃四海茍取之心誤以期逺大之事良由厚徳久憐卑退之深設遇他人誰復品題之及故於匆匆趣裝之際遂為汲汲推轂之謀為寒末以破荒作後來之張本仁哉此舉允也無私兹蓋恭遇某官天地奇人聖賢正學父子兄弟前無景盧諸公道徳文章的是明堂一柱凡有可器靡不兼収遂於猥𤨏之踪曲賜奬提之造某敢不益堅素守仰答鴻私不負所學即不負所知决無愧怍雖其在逺猶如其在近一聽驅馳謝孫提刑舉職狀庚申冬易節星臺疊預依紅之選騰章天陛首叨破白之榮不知何以得斯竊亦自有感者大抵人生之變化誰非先逹之提撕然區區權勢之干求既無足道彼泛泛江湖之遇合寧保將來雖是素交猶多中變縱平日操修之足恃又自天機會之難逢故上雖采菲采葑未必及平生之故舊下徒為桃為李何由出知己之門墻有如自昔相親於今益信品題數語流從肺腑之深知祗拜一忱對越乾坤而無愧允為盛舉宜屬真才如某者技極五窮官卑一尉惟有衷赤可酬上蒼人徒見麞頭䑕目之可憎誰則諒鐡心石腸之有在正切窮途之嘆俄逢洪造之來脱略繁文矜存故我檄召於軺車入境之始弓招於宸綸改鎭之餘隨逐旗旄出入帷幄考功初載尚遲下下之書露剡九重已濕班班之墨飾立身之迂為清勁蓋為政之拙以通明開寒末之天荒拓終身之官轍雖有嚮來之雅若堪今此之恩兹蓋恭遇某官天地奇人聖賢正學妙齡掇巍第已浄除萎薾之風壯歳讀古書竟深造精㣲之域凡其出處之盛無非講貫之功空臆危言發於金部登對之日隨機活著施於部曹涉筆之秋至憸壬辱廟堂而奪之權舉學校排閶闔而聲其罪此言路通塞之判實皇家否泰之分合朝何為萬口皆噤獨賴先生之正色預令一脉之潛囘拔去㐫邪竟致天驕之屏息澄清畿甸盡令民瘼之重蘇迹其切中事機終當阜安宗社固宜廣東閣招倈之路況䝉動綈袍惻怛之思遂令么𤨏之踪亦玷鈞陶之造某敢不益加學力誓荅恩私方當終始相依何忍自同於流俗要使鄉閭皆曰此眞不負於師門激烈良深編摩曷既謝麋總領職狀庚申冬自平江徼入淮東總所面付職狀麋居平江仕錦繡鄉適際晝行之耀來麾節地就叨春剡之華雖夙荷於眷私何巧逢於夤會不勝其幸倍以為榮盖人之至難得者知心而事之至易失者交臂英雄非不磊落或吐胷臆而終身不偶骨肉非不勤劬或隨官牒而各天一方况生是地未必為是官則仕其邦安得䝉其舉至若天從人欲事與願諧收置門墻既辱品題之舊照臨卿部又厪褒拂之新允謂良機宜屬佳士如某者一愚自守五技俱窮人皆鄙之公獨察此游揚借助使聲聞梁楚之間教誨作成己身預游夏之列但念初官之擬注正司仁里之警巡雖便摳趨恐難薦舉豈期大造自有殊恩提福筆於都曹首頒科目建餉臺於三道復畀關陞偶然竊第而過以秀稱甚欠讀書而誤以文譽事且未嘗任其易謂不辭難才且不能守其常謂堪應變何物么𤨏沐此揄揚兹蓋恭遇某官直大疏通廉謹細宻凡其出藩入從無非憂國愛君天下未嘗無公是非誰能捨我朝廷倘有大任使必以屬公故當局面之方更共喜除目之益峻託以諸軍之餽餉寵之本路之皇華遂令親宻之踪又在吹嘘之選某敢不念三生之縁結感不世之遭逢物不答施於乾坤固難圖報人匪自同於木石宜若為情敢媿使天有如皎日謝程丞相舉職狀庚申冬泰階近照陪都行播大鈞之再洪造不遺㣲物為圓小剡之三條除箠楚之塵埃煥發詩書之光粲慶遭逢之千載叙激烈之萬分盖古今之官尊莫尊於宰相而郡縣之吏卑莫卑於尉曹鷦鷯之仰大鵬瞻望靡及溝澮之宗滄海匯迤何時至若事有希其勢忽偶合如廷祐之邏畿内面承李勣如盧坦之立堂下身祭黄裳特見賞於片言尚流芳於信史况以腰弓之下走特䝉夾袋之先收所未前聞允為盛事如某者𦕈𦕈百僚之底落落寸心之孤饑寒不以告人自諉窮逹死生之有命問學但知窮理不求詞章記誦以爭名人徒見梔言蠟貌之可憎誰則諒鉄心石腸之有在敢意世俗之共棄反叨先哲之灼知由諸監司延譽之公言致大丞相特逹之偉舉草木名未能多識敢謂明經松栢操須待歳寒預云砥節何物么𤨏辱此品題兹盖恭遇某官氣脉晦翁之後身家學明道之嫡嗣合二儒未及竟之志撫千載大有為之機聲色不動於廟堂肝膽具孚於海宇小人道消而君子長嘗隂移宻運於當年夷狄賔服而中國安收明效大驗於今日天下倚為更生之父母聖主信其識治之蓍龜迺疏昕陛之恩乃起午橋之逸暫駐北門而䕶治别開東閣以招賢遂令絲粟之材早入乾坤之造某敢不益勤素學益勵孤忠讀緇衣好賢之詩感恩已劇詠繡裳歸公之句寄興尤長謝王尚書舉著述科壬戌名文章典麗科朱轓捲斾方心乎岩壑之清墨表薦賢尚齒及塵埃之賤見惓惓不忘之意開源源未巳之機第慚末學之荒疎曷稱殊科之奬拂然聞命矣敢僣言之日月星辰文乎天風雨晦𡨕則文之反山川草木文乎地荑稗瓦礫則文之汙儻知造化之全功即悟文章之正氣明白洞逹是曰大廷之陳謨佶屈聱牙特順方言而作誥下至班馬之擅漢以及韓柳之鳴唐皆𤼵越不遺乎片辭故流傳可􅂱於百世嗟哉末俗昧厥本原妄意古初强為苦澁或掇用古文之怪字或援引非聖之僻書或痛節助語以為工或雜飣陳言以為巧豈知青天白日萬古常新長江大河千里一寫茍非辭逹何以文稱故我聖朝嚴著述之科論文章以典麗為貴麗則𤼵萬古之光粲實理融明典則續二帝之彛常浮詞淨翦于以挽囘薄俗于以潤色皇猷使非其人寧在兹選如某者㓜已佔畢老方得官中更歳月之悠長率困科塲之淹苦食雞肋無所得又不忍棄之欲熊掌不可兼遂無縁取此迨至時文凱奏之日已當古學荒落之秋空誤餘生竟成凡子獨因愚直素厭浮華毎執望以為文率盡言而無忌因與世俗頗不相侔間遇老成或云可教實則不學尚何博學之可言甚愧非才寧有敏才之足取云胡幸㑹有此過褒蓋遇某官光明碩大之資清修雅特之操持衡旌别衆弊氷消簮筆論思孤忠日皎適開中興躋太平之會孰不謂安懷憂治世危明主之心我獨入告偉矣講明之素炳然議論之丹此眞文章之正宗益信國家之巨擘本諸身而若是施於人而可知宜此狂愚特䝉題品某敢不因兹善誘勉所不能更讀平生未見之書用兹義理儻遇天下當言之事誓竭忠忱窮逹以之報稱在是謝余提刑再招入幕風動帝畿方攬澄清之轡光生孫禄又新以禮之羅人方以愚直而疎之公獨超尋常而取此知己恩同於父母陳情聽徹於神明伏念某孤苦餘生辛勤末學僅有衷赤冀酬上蒼念晩生而得一官若何行志試初吏而近諸老或可効忠故於臺府鼎立之衝甘此塵埃最賤之役凡涉閭閻之苦必空胷臆以爭昔艱難拯救之秋雖一一曽䝉信用今太平燕樂之地已往往而見嫉憎遂退而讀古人之書何俄又下使天之檄兹蓋恭遇某官傑特應半千之運歛藏歸主一之功方其築室於場已惓惓三年之久及乎得詔赴闕猶遲遲半載而行龍潛淵而雲興陽歸根而春布强自深山宻林之下進諸明廷大衆之間朝除主爵之官夕拜祥刑之使爰咨爰度豈徒彰禮樂之光華某廉某貪正須動山岳之風采不有苦澁酸辛之士曷清甜軟汙陋之風遂令匪石之心特與入幙者齒某敢不雖當垂滿益奮孤危涉筆不問豪强唯知正理遇事無非補報寧有諛辭通交代徐尉漕棘掄材猶記問君水利齊𤓰縮戍行將綰我銅章諒有宿縁當作佳話某官苕霅間氣湖海奇人才名二十年特借除於右選禮樂三千字竟䇿雋於乙科縱未給札玉堂亦盍畫諾蓮幕胡乃廉取肯為此行然子眞隱吳市門清風如在而姑蘇視漢輔郡茂實易騰即聽詔温何待席暖某材慚樗散迹忝糠前甚欲求卑里之艱難無禁困臺府之奔走規模未遂歳月已踰望望前茅豈計釋一身之負依依巨庇正期遺百姓之安勉哉後圖副此䖍禱謝王倉使破白改官狀華甫六絲霜凜方新以禮之羅一紙春囘又濕薦賢之墨何斯疎賤辱此奬提盖古者所用必其所知而前輩所薦即其所用三代精選舉之法皆命于朝兩漢重辟任之官類敡于上故士大夫心腹為一而天下事脉絡貫通自三互之制既興致兩者之權俱廢長或不識其屬泛然江湖萍梗之逢薦則多奪於私陋矣門墻桃李之説迨我本朝之盛復還古道之隆薦孫之翰之杜祁公即辟孫之翰之杜祁公舉司馬公之龐丞相即用司馬公之龐丞相非固偏於所好蓋其信之也堅始焉為官擇人之心既暴之天地而無愧終焉為國求賢之念自確如金石而不移然皆磊落不世之英宜有特達再三之遇如某者㓜而魯鈍晩偶僥踰濟時行道之心已蹉歳月安貧守分之迹如在山林特於事上之間常軫救民之念庻於竊稍或免厚顔若凡世俗之求實無毫髪之望但期異日可見禄不及養之親豈料于今亦有天忽聞機之造未嘗通問而已沭辟剡略可力疾而又騰薦章行愧拙方飾以介而通之譽事多疎繆借以敏而慤之褒既成始而又成終不求上而反求下允為盛舉足配前脩兹蓋恭遇某官學探道原才周世用云為百措無非天理之流行惻怛一忱洞見民情之㣲隱來攬澄清之轡首除奔競之風遂令孤特之踪疊預非常之選某敢不因兹奬借益厲操修一毫儻可及民誓當竭力萬事無非有命决不容心窮達以之報稱在是通包發運癸亥時為提刑司分司轉般倉擁節陪都總三道轉輸之寄承庥支郡分一倉委積之司提綱雖暫屬於鄰臺揆事則正闗於華使請言本末以慶遭逢盖國家積貯之權莫尊發運而糧道流通之要又在轉般東都時敖眼甞分置於泗真南渡後京口獨兼控於淮浙夀皇擇地就新板築之興聖上纂圖專屬葺牙之照有重臣以總提於内地有僚寀以分幹於通津脉絡相闗呼吸立應源流一致隔截則非中更倉氏之瘝官間有吏奸之弄法州伯犂上下獄情之手借施於百籍之損増田釐子大小租斗之心倒用於有司之出納上意期清於宿弊此倉方撥於他司然白粲連檣在彼者仍即在此之物况繡衣持斧問獄者若兼問榖之權向使挈要得人一一皆如我公何煩革弊易令紛紛至若今日是必有大公至正之見則自無此疆爾界之分新渙號何幸自天喜嫌疑之凈洗舊屬官初不易地宜眷愛之如初兹盖恭遇某官稟氣純剛為今大老鴻臚卿後漢包咸几杖以朝而講經傳自宜從容燕間孝肅公闗節不行而稱神明尚賴剸裁劇務借曵履星辰之宿望俾撫疆水陸之要衝狐䑕一清豈特曩時之威在貔貅盡飽正期今此之令行定推八荒在闥之心亟為數路䝉福之計某絶迹世俗刻志儒宗髪未燥願摳趨無千里裹粮之力顔已蒼忽際遇快一生求道之心昨被幞以西來値旌麾之東下川魚雲鳥雖甚忻一見之奇社燕秋鴻頗私訝相避之巧敢期幸會終遂趨承頃辭監筴之官已分山林之隱俄有聞而知者薦之廟堂於是易以授之俾提廩粟感其高誼勉為此行睠言轉給兩淮之初本為尅復中原之計慨仰淳熈天子之志疇敢不䖍幸登宏齋先生之門願安承教其為懇懇莫究云云謝包發運有結局時改官狀納廟堂忽見予江城轉粟乆依玉節之光台衮騰章正藉冰䘖之重何一旦無心之獲慰半生有道之思喜不可言敬以為謝竊惟世事無往而不復之理人心有感而遂通之機方發運使之置司即轉般倉之為屬歳有専舉首償分幹之勞路可旁通更集他司之薦故僚宷朝馳於鐵甕即姓名夕上於金閨雖朝廷更革之令方新豈司存春愛之情忘舊賔筵將徹合觴婪尾之盃山勢欲窮全看囘龍之脉推論至此甄收已宜况凡大儒之作興實為後學之宗仰或夢想千載之上或神交四海之間安有足躡於門庭反不面承於衣鉢燥不與火期而火至濕不與水約而水從桃李不言自有成蹊之理菲葑可采詎因下體而遺理有必然勢無但已如某者㓜而戅直晚偶僥踰得時行道之心已蹉歳月安貧守分之跡如在山林特於事上之間常軫救民之念庻幾消受寸禄藉以仰酬上蒼若凡世俗之求實無毫髪之望頃辟書之交上譽有不虞致夾袋之誤收恩叨非分方淮浙虚進賢之剡聽廟堂公造命之權一相二三公無限受知之士諸臺數十郡幾多可得之官吕希哲未嘗萌求舉之心王文正亦不識所薦之面自惟何者反獨得之某官國之蓍龜學者泰北黄河比笑已驚包孝肅神明晚節尤香行展韓魏公事業故其精神心術之感不間毛髪絲粟之微記某之伏謁崇臺曽寫中心之欣慕念某之分司儲廩正屬疇昔之照臨宜露章雖出上相之播鈞而褒語黙契先生之初意某敢不因遭逢之特異慶造就之適同望夫子之門猶光範門恩無二致由尚書之位躋面槐位機有重來謝松江汪制置應詔薦繡衣持斧曽備前驅玉壘騰章尚叨末薦見惓惓不忘之意開源源未己之機激烈一忱飛馳千里甚矣國家薦舉之弊幾於市井交易之為聖天子破去尋常博詔公卿而特選士大夫拘攣染習尚諛親故以相私然則其將孰從亦曰觀其所主公論必如富彦國則所進十餘皆顯士髙識必若陳古靈則所藳三十俱名臣不遇大賢又成文具如某者僅性樸直偶幸遭逢曩仕吳門本眇眇百僚之底毎爭民瘼輙嘵嘵累牘之言苦不自量幾於掇禍適鈇鉞下青𡨕之表脱塵埃為緑水之游慿藉威靈展布心膂洗寃犴獄悉依定力之如山賑阨鶴亭實體仁心之由已顧末屬何力之有况使華易節之餘迺因天筆之敷求逺自江閫而剡上孜孜救過而誤指為敏區區補拙而強名曰勤忽朝邸報之喧傳無地措躬而辟易兹盖恭遇某官八公間氣一代奇人開口見心萬丈虹霓之直寫吐哺握髪一介蟣虱之不遺必欲羅四海有用之材相與赴千載難逢之會端倪軒豁天日照臨况當新詔之鴉飛忍使舊知之虫蟄遂令𤨏末亦預褒揚某敢不露香彼蒼鏤銘衷赤萬事無非有命窮達聽之一念但切盡忠報稱在此除史館撿閲謝廟堂薦墨攅花已拜連年之造汗青閲籍俄叨至日之除曾未瞻赤舄之光乃先下白屋之士如斯異數可謂奇逢盖國史將以示萬世之公則寮宷所當極一時之選司馬康追隨元老方拜此官劉道原博極羣書始躋斯列若兹清品寧及凡流如某者貧至無家老方竊第某丘某水我遊我釣未能償甘遯之思爾俸爾禄民膏民脂常恐抱素餐之愧自作尉於臺府鼎立之郡即究心於閭閻𤨏屑之情痛豪強因升斗之租因饑餓付荼毗之炬亟為懇禱使數十年之䧟穽平夷自此確持任二三載之風波搖蕩繼備諸司之屬率依三尺之平恤惸獨遑恤髙明法當如此論是非不論利害心豈知他况皆職分之尋常何有事功之尺寸詎意公車之交辟致䝉台衮之誤知班之湧醴之司進之近天之地不由蟻援徑入鴻鈞奏牘重來㸃畫睛而既就除音狎至蜕凡骨以將輕初無為文之三長俾預作經之一職云胡幸會有此僥踰兹盖恭遇某官徳大能容功髙不伐再安八極光趙韓王萬年永賴之殊勲並佑兩宫踵文潞公五日一朝之故事方且以囘乾轉坤之手舒吟風弄月之懷談笑而清襄漢之塵又新全績廊廟而兼山林之樂眞得半閒是宜大度包荒羣材翕受弓旌四出尚旁招岩宂之遺溲渤兼搜亦猥及塵埃之賤遂令庸陋躐被寵光某敢不仰佩洪恩益堅素守幸熊與魚之兼得期蛇作龍之不羞庫言庫官言官昔體大造醖和之妙筆則筆削則削今師重臣提要之公隨事竭忠誓天報徳賀葉丞相丁卯恭審渙號宸庭晉儀揆路位加特進開端周漢之三公權秉洪樞總職東西之二柄華夷俱聳宗社具依恭惟某官望重倫魁才髙王佐嘗共山河社稷之寄中外晏然乃尋園林鐘鼓之游心迹清甚已無餘念若將終身適際聖主之龍飛正當大人之虎變風雲慶㑹固宜大老之來歸霖雨渴思尤望我公之入相帝乃因民之欲親札以催虚席而待者半年遣使而趣者數輩紛其愈至喧塡山谷之間見所未曾驚噪兒童之口於是迫斯可見時然後行出處一心雖未妨名教之樂安危反掌已預深天下之憂然事未有歸固可聽其自附信其自去若權既我屬惟當推其所為行其所知况材鍾千載之英而位冠百僚之表天實為此誰能已之必欲全天下後世之名惟在辨君子小人之實所云作相之非易正坐知人之甚難厥有前聞可備觀省道學能使人重而不能使人愛功利能使人嫌而不能使人忘面色嚴冷語言苦澁者勢不期疎而自疎舉止輕便議論尖新者分不期宻而自宻巧於鑚刺者雖佞反暱於情顔之漸親安於寂寥者雖賢反遺於念慮之不及或奪於權勢之赫奕或悦於詩文之浮華能言者未必能行而能行者未必能言所養者多非所用而所用者多非所養凡皆人才之累易為相業之虧仰惟儒宗夙主善類虚明天皎固宜萬萬其無差情偽雲紛安得人人而盡識兹當大任愈宜小心某舊辱殊恩新逢盛事所憂過所喜此天可知以頌不以規則吾豈敢惟有甄别羣才之説冀禆陶成萬物之功撾布鼓而過雷門雖知犯分滴㳙流而助滄海殆不勝情罔不在初孰此為急謝黄提舉陞陟己巳廣徳倅石室東僚曾侍汗青之筆庾臺薦士首叨剡翠之章一朝來自於郵筒百陪光生於泥軾何斯幸㑹有此奇逢伏念某貧至無家老方竊第某丘某水我游我釣未能償甘遯之思爾俸爾禄民膏民脂惟恐負素餐之愧但念服勞州縣庻幾消受斗升忽䝉宸陛之誤恩俾綴史筵之末屬學値荒落毎懷非據之慙聲利侵尋易失平生之守亟合奉身而退遂乞親民以行載念荒壘之治中無出桐川之員外擇而取此雖云窮陋之郡丞俛以思之亦免煎熬之邑債覺便私之已甚將及物之幾何幸而職守之間皆屬照臨之事津梁之孰修孰壞託故老以旁詢社廩之或存或亡賴同寅而再葺盡心三月未覩成功昂首二天誓期後效自謂我心之匪石方虞衆口之鑠金有如義取文子之同升法曰虞廷之明陟此聖朝所以選京秩之彦惟監司得以舉屬部之賢列城之英俊如林一代之龍門似海敢期塵迹反辱露牋氣本偏頗乃曰直而方徳愧不修乃曰清而粹何能逺大直云進未可量如許揄揚可謂愛忘其醜兹蓋恭遇某官稟天間氣為世奇人太學舉幡已驗烏臺之風采清朝累疏更占黄閣之經綸歛其廣忠集益之規試此激濁揚清之寄欲厲部内之新進必先館中之舊知豈謂秦無姑從隗始某敢不即薦牘語作座右銘明月清風洗半刺史浮華之習皇天后土知老門生堅苦之心誓效驅馳以圖報稱改添差通判紹興府謝廟堂庚午佐郡踰年蔑報如天之造杜門幾日遽叨易地之恩方大鈞一轉之間即小物再生之候塡膺銘感拜手縷陳伏念某學不通今志徒慕古六旬冉冉分宜歸老於山林百指嗷嗷暫亦服勞於州縣乃因幸會獲際明時拔從塵埃疵賤之中寘彼館閣俊游之後金閨通籍曲埀雨露之仁玉陛輪班力免雷霆之怒亟俞卑悃躐畀贅丞徳厚乾坤人非木石陳力就列正圖報效之方同寅協恭寧有背違之理實縁頭方命薄志廣材踈弗獲于上而遽欲革風俗之迷所行雖公而動輒匪吏胥之便郡有滛祀名曰方山連三數郡凡江湖出没之徒率千百人結鎗刄嘯呼之社闗係非小禁防宜先妄意遏之謗言由此上孤鴻造方逃空谷以省愆倏拜龍光俾改名藩而參貳是為兩朝虹電之地且亦三台衮繡之鄉短棹孤舟望家山而益近千巖萬壑分風月以最清面目依然精神逾好兹盖恭遇某官功髙莫比徳大能容三十年持將相之權纔過浮雲之一㸃億萬載同宗社之福方挾泰山而四維盡收林林總總之羣皆入化化生生之造遂令么麽亦拜保全某敢不猛省昨非益求今是出必赴湯蹈火共趨盛世之勲否亦擊缶歌詩永頌太平之樂其為激烈罔究編摩差知撫州謝廟堂辛未二月易地贅丞未能朞月自天疏渥忽畀專城方申控免之辭已拜趣行之命䝉恩過厚撫已奚堪伏念某人品最卑資格尤淺嘗窺史籍曽無披閲之勞甫載倅車已有迂疎之誚正令終棄夫亦何言乃亦轉於洪鈞俾再承於㑹府頗驚往事浸失初心進不能追曽南豐賑恤田里之風退不敢效白樂天從容山水之興懲羮太甚正愧吹齏得隴已多何敢望蜀况聞臨汝夙號名藩右軍康樂之舊遊風流尚在元獻荆公之故里人物尤繁倘匪名流豈堪隆使兼自連歳空虚之後加以去秋旱歉之餘必欲稍振於疲民亦當妙選於良牧曽謂疎庸之晚出可叨超躐之殊恩兹盖恭遇某官輔世以仁得人為急敬億萬年之休命務安天下之元元選二千石之惟良更欲後來之鼎鼎其於寮宷如長子孫既恩斯勤斯漸使之成人必教之誨之各從而幹蠱謀國若此振古無之某敢不祗體盛心勉殚㣲力入境問俗當徐察於事情求牧與芻願深培於根本其為激烈罔既敷宣撫州到任謝廟堂辛未四月十三日晨謁六符速令祗戍暮馳單傳亟幸到州㳙剛已合於右符箋謝敢稽於上衮然皆情愫實類家書伏念某學不如人分惟守己半世授書餬口若將終身忽朝應舉得官已踰初望誰曽一念夢及三刀乃挈提於分甘沉陸之中復保全於自取疎虞之後忽超常調躐畀專城顧如許之誤恩宜若何而報徳民有菜色固難畫餅以充飢土無麥秋詎可徐行而拯溺於是未及州境先馳尺書預期閉糴之家羣集領事之日布宣徳意吐露肺肝多荷披襟許為發廩此固旦夕攙先之著茍救目前然賴朝廷莫大之仁㑹須心動此盖恭遇某官量等乾坤之大身為宗社之安任三十年將相之權功烈幾同於再造活億萬計生靈之命民心嘗拜其更生惟其感著之已深是以施行之甚易人見官僚之轉論視猶公相之親臨故雖以一介之㣲亦将冀千里之應某敢不因其已感更切用忱自此撫摩倘復豐登之觀庻幾遐逺均䝉泰治之休特轉朝奉郎謝廟堂壬申六月試部罔功方瀝丐祠之悃自天疏渥忽叨増秩之華宜黜而升以榮為懼盖漢世璽書勉勵之寵必皆二千石之惟良而我朝職事修舉之褒亦云七十年之曠典凡此殊特之舉實為風勵之機茍非其人寧在兹選如某者僅有一朴初無寸長惟某生長田閭身經艱苦所以叨塵仕版心念困窮頃濫守於專城乃適小於歉歳郡無先備措置良難俗非素諳訪求已晩獨賴朝廷之恩信亟敷心腹以布宣富强即聞風而傾囷盜賊亦畏威而釋梃皆上之賜豈某所能至於不揣非才妄思變俗再三申論雖珥筆之頓消一二陸梁或謗書之間出恐上費乾坤之造因力祈香火之縁敢期尚閟於俞音反又先䝉於異數員郎進秩章服増榮千里旄倪驚皇恩之創見闔門㓜稚占世禄之將延何物疎庸有兹忝竊此盖恭遇某官為民立命與天同公净掃倖門䕶國家仁厚之脉分布諸郡皆山林疎逺之踪猶慮孤寒之難扶故雖小善而必録遂使承流之𤨏末亦叨不世之遭逢某敢不仰體鴻私俯殫駑力一忱對越廣推生意之無邉四境歡呼咸慶恩波之有自其為激烈罔既編摩黄氏日抄卷九十三
