body:
  text: 黄氏日抄卷八十三宋黃震撰䇿問吳縣擬試䇿問三道辛酉科問諸君子以七尺男子軀禀天地純剛至正之氣嶄然露頭角出應聖天子眀詔將眀目張膽進天子殿階間奮筆直言天下事邑大夫舉彜典先朞月覘虹霓欲吐之萬分一而顧使塵埃底吏立簾燭焉雖諸君子屑就之試賤有司如愧何雖然蛙餌足以得大魚砥石足以發硎刄雲色映日之祥雷聲繞殿之歡吾知斷斷為諸君子出敢以天下事與諸君子言之方今天下事可喜可賀者最為不一姑舉其大者㡬年姦贓之禁未嚴而申儆自今㡬年鬻舉之風莫戢而訓飭自今㡬年邊塵之驚未定而肅清自今㡬年御莊之謗未解而撥𨽻自今㡬年造楮之多無以處而住造之令昉於今㡬年和糴之擾無以革而敷糴之令創於今此休運之一開而元氣之胥㑹也此天地之交泰而千一之遭逢也囊封露剡無非保泰之辭投匭獻書莫匪中興之頌宜無復以議為可也抑虞廷賡歌不以眀良之慶而忘隳惰之憂成周儆戒不以無疆之休而廢無疆之恤後世以來見一事之可憂則譁然以為憂見一時之可喜則泰然以為喜朝廷之局面一轉則人心之議論一移見寒曰寒見熱曰熱面之安危莫察焉有天下者將何頼諸君子方欲以天下事言豈肯令倚柱漆室者反笑人耶知其必有成吐不能自遏者古有時狩以簿諸侯今之監司即天子寄之耳目以代親行者也簿書獄訟云乎哉乃歳之初奎書昭垂以按劾之多寡為監司之殿最自是諸路之刺交上矣然蟣虱之小吏雖誅豺狼之當道曾問否也不知遴選監司之奏由嚴按劾之奏嚴州縣三等攷劾之奏孰為可禆聖政一汛天下之濁而清之耶古有疇咨以熙帝載今之薦舉即天子託之腹心以代親擇者也資格文具云乎哉乃歳之初天禮洊頒嚴繆舉之有罰斷自今以必行自是薦舉之官聳聽矣然泉壤之恩數雖奪津要之請覔曾戢否也不知覔舉鬻舉之説繆舉貪舉之説所舉犯贓舉主連坐之説孰為可禆聖政一掃天下之私而公之耶敵馬箠竊投鄂渚蹙額相告者謂江南已無今日矣江面肅清宇宙再寧非轉危而安今日一大決勝之機歟然一軍𢷬邳州響震山東矣而漣水北門之守方堅若何而為後圖一軍至光化聲撼荆襄矣而浮光窺伺之謀方宻若何而可預絶必欲如淮淝風鶴之捷穴壯吾軍則根本未立奈何内轄司盧喝右浙私憂竊議者疑内蔵真有私財矣撥賜方新天地劃開非洗謗為譽今日一大清眀之機歟然奉宸庫撥助縣官驩騰萬口矣前日之久於斂藏者固可羣疑之浄洗御前莊撥𨽻總餉昭蘇民瘼矣前日或涉於並緣者寧無虛數之難催必欲如内府山澤之禁盡弛與民則軍餉未給奈何楮以太多而輕則住造固宜也然事變方殷供億尚繁亦住之得乎或欲以措辦軍食為先或欲以通行破㑹為助博採羣議卒成悠悠其果無䇿以處此耶閭閻竊議又或謂稱提㑹價適所以稱提物價民情未憂楮之換易而憂楮之稱提姑徐徐焉斯可矣然輕重之權不由上出可乎否也糴以不均而擾則敷糴固宜也然數畝之家斗升之租亦敷之可乎或欲錄姦贓之田産以補糴或欲括僧寺之剩田以給餉博求公議卒無成説其果無䇿以易此耶草茅隠憂又或謂計畝而和糴迹類計户而和買是雖足以寛今日大家之憂未必不貽他日小家之苦加㕘酌焉斯可矣然便今之䇿預深後憂可乎否也於戲噫嘻朝廷設科正欲觀有用之學進士發䇿正欲伸敢言之氣獨前此詔歳斯道厄運夙姦辱國羣有司望風疑畏相戒不敢問天下事而繆掇陳言自詭考古識者至今羞之幸今聖賢相逢英俊朋興而中吳又今陪都公衮為之臨照倫魁坊扁増創一新休符呈露聞見俱聳諸君子繼黄衞之芳躅必矣一吐昌言中吳壯甚問日者東宫聿建儲位鼎新三靈慶社稷之無疆四海戴吾君之有子皇乎休哉吾生何幸拭目盛事願從諸君討論以備採擇欵謁先聖升祀名儒示敬之先預也然古者天子之元子十五即入大學而春官釋奠于先師秋冬亦如之見於文王世子者甚悉則釋奠固太子常禮爾至晉眀宋文之世太子行釋奠禮則始臨學燕㑹侈為希闊何古者之常而後世以為盛歟北齊僣偽禮典非所責也而太子釋奠先聖先師每春秋二仲常行之何正統以為盛事而僣偽者乃能常行歟然則今皇太子之欵謁繼此亦常盡復先王之制否歟尊尚師傅遴選宫僚輔徳之要道也然聞成王之為太子也太公為師周公為傅召公為保則以大臣為師傅宜亦其常爾何賈誼止欲選左右早諭教而宣帝太傅少傅之托亦僅以屬二疏豈東宫自有師傅官於天子之三公本無預而論成王者特後世之言歟唐世東宫官制儒先嘗稱美其詳置詹事則猶朝廷之有中書門下省置贊善大夫則猶朝廷之有諌議大夫我朝嘗盡復唐制而此獨未備何歟今皇太子之官自宫師而下已一一極天下選不知總統衆職與夫視職諌議者亦當使盡正其職否歟講讀有程侍立有制學為王者事之急先務也然古者春誦夏弦秋學禮冬讀書世子之講習固無虚日至于漢世雖曰受春秋某人受尚書某人而卒不言其講習之詳豈漢溺於専門陋習不能復三代之制歟三代惟欲輔其徳性晁錯始欲教以政術豈三代之制不存而漢之所教者始雜歟然我孝宗既有先讀經之説又有參決未久已諳物情之説豈帝王之學體用兼貫本不容偏廢歟今皇太子早晩有講宫中有課矣法從之請欲詔師賔使講官任責而廷紳之奏又欲常侍立使眀習兵則二者宜何先抑並行歟幸懋眀之毋畧問鍾天地之英者皆人才也佩社稷安危者㡬人佩社稷之寄者皆大臣也以功名始終者又㡬人吾於漢唐僅一二傴指其留侯汾陽乎信赤族何械繫龍顔大度之君㡬與長頸鳥喙等侯也太子既定翩然去之如時雨霑足雲歸太空可望而不可親侯真人傑哉雖然兵甲既洗之餘帝之施行少差叛者已為九起而漢祚之危一髪使侯不早從赤松㳺漢寧至是吾於此不能不為留侯疑漁陽之鼙鼓既動屢挈宗社於盗賊夷狄之手以還其君名一聞項黨夜遁胄一免回紇羅拜忠信行蠻貊庶㡬聖門事業渭水鷹揚以來善用兵者無之也汾陽王尤人傑哉雖然魚朝恩輩讒沮百端我固朝聞而夕引彼且朝用而夕罷中書令二十四僅前後足虚考未嘗得一日安其身於朝廷之上其終得以自全者幸耳吾於此不能不為汾陽懼夫子房之去得矣而漢室其疇依子儀之為唐計忠矣求如子房一日之樂不可得二子之去留其孰是孰非耶然去留雖不同而皆能以功名終始何耶身任天下國家重者當為留侯耶為汾陽耶敢問此年御製留大臣詩云直湏歴遍汾陽考方可閒逰伴赤松浙漕宗子場䇿問一道辛酉問長庚毓秀青藜照讀盛哉宗英之文獲助於天象亦竒矣秋風棘綠挑戰文闈何於此時月有食之豈所以照銀潢一派之清助虹蜺萬丈之吐者乎有司惑焉因得以諗月星之異月為太陰視日為太陽匹也日食三十六春秋書之月食畧不一書何歟月食修刑與日食修徳類也此日而食于何不臧詩人傷之月食直以為常何歟將月以日而食此其以為常則星以月而掩何反以為變歟抑星分日之光此月不可以干陽則月亦借日之餘光何獨謂之陰歟自古皆稱日月望而食而鎮星食月獨載之唐志豈月非日所食而食之者星歟若然則大狼呀啄蚩尤欺旗或者之説有之矣陰風贔屭萬木僵立此何等景象顧不謂之災歟日者清䑓有占不特謂月見食且謂月犯南斗魁月與星又豈更相侵軼者歟斗為吳分為天廣為爵祿之柄犯之皆不可犯其魁又獨别有其占何歟魁之言首也南斗乃以南二星為魁魁之義果安在而犯之尤不可歟歴考紀災之書有曰月犯魁者有曰月掩魁者有曰月入魁者犯也掩也入也義豈各有在而災孰甚歟然乾元元年月嘗入南斗魁矣是年逆鶵叛將首以淄青降未㡬汾陽王復建大將旗鼓以征之安見其為災歟大歴十二年月亦入南斗魁矣是年張獻恭首破吐蕃於岷州未㡬崔寧復戰於西山敗之何傷其為兵歟猶未也元和之四年月以六月犯南斗魁吐蕃以七月請降轉災為祥若反掌然又何如是其速歟豈星翁厯史之占不足盡慿歟或人事不可盡以天論歟敢問月之見食為日為星月與星變孰重孰輕變不虛生其證果何所縁而起徳能勝妖其道當何所修而弭二變之相仍而至也何故古人之當災而不也何以諸君子神眀華胄天人奥學于于然提一筆以來豈徒為祿仕計為宗社計也果能以理而析數以古而証今灼然有足禆聖政劉更生災異疏當在下風浙漕進納軍功䇿問一道辛酉問功名萬里途男兒四方志而鄉闈解額苦二綫窄於是乎計其貲為釋之之郎於是乎投筆從班超之戎嘻果溢而他出者𠂻甲浙漕之場與貴介公子鎻㕔等庶㡬拾青紫易易爾何斯苦雨汨其陵谷擔簦投牒褰裳濡足曽布衣韋帶舒徐桑梓者不若也諸君子得無觸景興感因思以浙之被水之利害禆吾計使者乎浙今畿甸地而水利計使職也澇傷朝聞符移夕遣冠盖相望毫髪得實往者檢視失時之患一洗之計使之於水也亦良苦然此一時事方圖久大計夫水雖天災治之在人世固有因水而講荒政以救之者此特閔百姓之苦於水非治水也因水之溢而導之歸使後雖霖潦不為災此聖人作事為萬世功而禹治水法也若今浙右之水獨非禹所嘗親治者歟曰三江既入震澤底定其説甚眀可舉而行乃寥寥數千載莫之續豈去古逾逺三江漫不可考耶世之説三江甚衆率於地理不合至禹貢圖説一出指豫章九水出彭蠡者為南江以足經文中江北江之數其論始定然審如其説於震澤何闗耶説亦有闗於震澤者曰歴丹陽毗陵入今大江者為北江首受蕪湖東至陽羡者為中江分於石城過宛陵入具區者為南江三江在震澤上下而皆入海其説似矣然丹陽毗陵之入江者特港脉一二詎應影附大江而謂之江而首蕪湖分石城之二水皆在震澤上流又可以江之入海言耶以今所見受震澤水東入于海者惟吳松一江不見其三也舊有安亭一江由青龍鎮入海罔利者慮其走商税塞之又有白蜆一江以通青龍今亦塞而耕稼之豈禹三江之舊迹在是有可訪而復之者耶抑水之為水有源有委舊説具區三萬六千頃積之既多泄之已難矣熙寧八年旱太湖淺露見丘墓街井是昔為髙原今為汙澤也湖之浸淫又不知其比舊増多㡬千頃非原委之不究而致然耶溧陽之上有五堰以節宣歙金陵九陽江之水宜興之下有百瀆以疏荆溪所受諸水皆源也而久不治江陰而東置運河一十四瀆泄水以入江宜興而西置夾苧于與塘口大吳等瀆泄西水以入運河皆委也亦久不治震澤固吐納衆水者也源之不治既無以殺其來之勢委之不治又無以導其去之方是納而不吐也水如之何不為患而可諉之天災耶昔蘇公軾進單鍔之説于朝謂慶歴間欲便粮運築吳江岸介於吳松江震澤之間水去始澁而歳為災請置千橋以易之可謂得其襟要者然嘗考之海濵髙仰江尾茭淤使震澤之水驟入江而松江之水未能驟入海正恐併吳江岸以東茫然皆一震澤也而何以制之耶鍔則謂茭淤之漸生皆原於江流之不迅茍東下之勢峻急則漲塞之患立空此説可保其不害民田否且地勢中低而外仰何以遽得其峻急耶禹之治水也決九川距四海濬畎澮距川其法於其下導之也吳江岸茍未易輕議盍自其當先者耶王公覿之在浙也奏開海口諸浦范公仲淹之在浙也獨開茜涇等浦而劉慤之按行海口也又謂開之則有風濤駕入之憂其説果孰緩孰急孰是孰非又無積中見涇函於運河底是亦古人泄水一法不知視浦口又孰為要耶夫三江入則震澤定震澤定則浙右無水災浙右無水災則行都之根本固民生不匱而軍餉足事孰大於此者夫何一雨為虐水今三月猶未退望有秋者號天於野而議勸糴者齗舌於庭是束手無䇿而坐視公私之交病也不亟是圖患將安極耶伊欲禹迹之三江皆入與今吳松一江之七十二浦皆泄水快運河所置泄水之一十四瀆皆復十江而五堰以西諸水不復入震澤以重其泛濫之勢源委悉治圩塘復舊天雨雖甚水不為災是神禹之功復續而我朝萬世永頼也幸參以安定水利之學指次第的實可行之説以告豈惟計使之所欲亟聞亦聖君賢相之所樂聞省試䇿問一道戊辰問洪惟聖天子龍飛御極治象咸新以言乎天命則年榖屢豐以言乎人心則中外帖息以言乎邊事則襄漢之逰騎肅清而巴蜀之要郡新復天下恢恢乎無事若此宜吾民欣若更生扶杖願觀徳化之成矣而州縣之煎熬閭閻之愁嘆猶或間聞於囊封剡奏間果孰病之而然耶自昔固有君臣交飭於其上而時亦自有私竊病民於下者曰外戚也而今斂手矣曰閹宦也而今屏氣矣曰疵賤之官若兼并之豪也而今監司郡守皆出精選必各知所以戢而防之矣然則病吾民者尚誰耶夫人主不能自治其天下作而行之有士大夫士大夫不能盡親乎細故奉行文書則又有所謂吏胥世久俗漓士大夫尚不能盡以人主之心為心而況吏胥或者此亦足為吾民之病耶古者唐虞官百夏商官倍吏則無聞將俗淳事簡雖有吏不為姦未可知周官三百六十畧計天府之府史胥徒尚三千六百有竒以一例六數溢二萬庶民在官之禄既與下士等不知千里之入何以贍之而能使其不至於病民秦漢之間紛乎不足道韓信尚以家貧無存不得推擇為吏漢興事定疾吏之貪謂衣食足知榮辱貲十筭乃得為吏十筭乃十萬也防其源若此猶不免於刻木期不對之諺不知漢世擇吏至審何乃猶不免於病民世更八代王通氏嘗深歎吏仕之非古唐太宗首務省官而臺省寺監軍衞坊府之胥吏許其入仕者猶六千人其後甚至牛仙客以縣小吏致位通顯夫唐豈不思吏仕之當革而顧優之亦望其知自愛也溉其本若此猶不免於隳突乎南北之煩不知唐人待吏至優何反重至於病其民我宋受命務革前弊掌後宫參用士人而州縣吏給以重禄其為吾民慮也悉矣彼亦人耳寧不知奉吾法景祐初嘗汰三司老疾之吏老疾當汰者也乃喧譁四言何其敢無忌憚元祐初嘗損吏員泛冗之額泛冗當損者也乃紛紜交詆何其難於變通日積月深弊滋以衍或一事而遞符諸司以互督之州州之吏則合此以轉督之縣縣之吏則挾此以轉督之民至於民則獨受督促之極無復可轉而之他非家之破即身之殞歳遷時易之官往往攅眉着筆其間而不能救而吏奸一脉則次苐上下貫徹流通天下遂名胥吏之天下矣他若㳺手末作之子身未離襁褓名已寄省部歳糜廪粟而吏禄十倍於官以重耗國用者猶未論也於赫皇宋以仁立國凡所防患之道亦措置畧盡誰料戕我邦本一切與仁相反之術乃陰陽出於雁鶩行此何異堂堂大厦風雨震凌一無所撓而蟻蠧已羣穴其間耶嘻亦可危也已疏而通之豈無其説嘗觀真宗朝謂吏人不可委信欲參用登進士第者王沂公乃謂此號將相科不可屈以胥吏而止夫吏之參用士此正國初之法而沂公亦名臣之言於斯二者宜何從哲宗朝患衙前募役多浮浪之人恣為姦欺嘗復差役矣蘇文忠公則謂募役為萬世之利與温公力争而尋亦止夫役之必用民此亦國初之法而文忠公則又通達世務之論於斯二者宜何擇一諸君皆六館之英志存當世宻察事機必有説以處此此事雖小所闗甚大幸詳以告謹毋不屑黄氏日抄卷八十三
