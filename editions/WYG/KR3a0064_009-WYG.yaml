body:
  text: 黄氏日抄卷九宋黄震撰讀春秋三僖公名申莊公子母成風閔公之庶兄諡法小心忌畏曰僖元年春王正月岷隱曰不書即位者魯方有亂僖公入自外不行即位禮愚按此本左氏說諸家近多異說岷隱平心觀理始復其舊爾齊師宋師曹師次于聶北救邢夏六月邢遷于夷儀齊師宋師曹師城邢左氏曰諸侯救邢邢潰出奔師師逐狄人具邢器用而遷之師無私焉遷之夷儀而城之救患禮也張氏曰次于聶北者屯兵便利以援邢而懼狄桓公用兵主扵持重崔氏曰古之用兵觀勢而後動次于聶北為之聲援盖救邢也威公攘夷狄而安中國卒復衛邢𫝊言次非救似誤矣愚按經曰救邢說者安得他為之辭夷儀公羊作陳儀秋七月戊辰夫人姜氏薨于夷齊人以歸姜氏齊威之女在魯滛逆殺二子幾亡國故威公召而縊殺之于夷以其尸歸魯楚人伐鄭八月公㑹齊侯宋公鄭伯曹伯邾人于檉勑呈反楚伐鄭𫝊謂鄭即齊故也㑹于檉𫝊謂齊謀救鄭也楚荆也今始稱楚者先儒謂楚至成王令尹子文得政國益強改稱楚以交于中國從其自稱非春秋改之也謀救鄭而先會諸侯者先儒謂楚方強威公重於抗楚而謀之審也木訥曰鄭今在會何救之有盖謀伐楚也楚成仇鄭至再不可不伐齊威以近諸侯雖從而江黄未至謀有未周則楚未可伐故眀年先城楚邱岷隱謂三年後方有次陘之師檉公羊作朾九月公敗邾師于偃𫝊謂姜氏孫于邾齊人取而殺之魯怨其以姜氏與齊故敗之于偃木訥曰非也齊欲姜氏邾能抗而不與乎此雖魯有所不敢尚何責邾藉令責之何不責之未會檉之前而乃責之扵既㑹檉之後盖邾本附庸於魯不敢外交諸侯雖邾子𤨏受王命其幽之再盟亦不敢與盖猶附扵魯也今檉之㑹邾人始預其列故八月同㑹而九月伐之責其從齊而不復附魯爾愚按世逺莫知其詳此說雖異而頗近理姑錄之冬十月壬午公子友帥師敗莒師于酈獲莒拏酈力知反拏女居反又女加反慶父弑逆而奔莒莒人逐之慶父縊于汶上莒人以為得賊而求賂扵魯魯弗與邾師来伐公子友敗之于酈獲莒子之弟拏木訥曰酈魯地也兵端在莒公子友敗之正也非詐也特未陳而敗之耳酈公羊作犂穀梁作麗十有二月丁巳夫人氏之喪至自齊齊殺之魯請之也不書姜闕文也木訥云二年春正月城楚丘楚丘衛邑狄㓕衛諸侯城之將以遷衛張氏謂齊威分役而魯往城之也夏五月辛巳葬我小君哀姜春秋書哀姜終之以禮如此則上文姜氏偶闕姜字而指以為貶者亦過矣虞師晉師滅下陽晉欲取虞虢先假道於虞以伐虢虞受其賂而導之以伐下陽虞虢之塞邑而晉師所入之路也下陽滅則虢亡而虞隨之矣虞受晉賂故先虞師下陽公穀作夏陽秋九月齊侯宋公江人黄人盟于貫江黄近扵楚楚與國也齊威將伐楚故先逺交以孤楚之勢木訥曰威公之謀可謂逺矣北杏之㑹至是二十有四年諸侯已無二心伐楚何患不克必待江黄之来而謀始定盖師出萬全覇王之舉不勝則禍及扵天下故不可不謹也江黄之心服而伐楚之功成矣貫公羊作貫澤冬十月不雨記異也夾漈扵眀年春夏不雨注之曰前冬十月不雨不應書其書為此始也楚人侵鄭張氏曰莊三十二年楚成王殺子元用子文子文毁家紓國兵勢浸強故比年侵伐鄭若非齊威兩年間専以圖楚為事必未能制之扵召陵而執宋公盟諸侯之事亦不在僖公十九年之後矣三年春王正月不雨夏四月不雨自穀梁謂因僖公閔雨而書諸儒遂多以為公能憂民之憂徐人取舒崔氏曰舒盖楚屬邑徐人恃齊而取之其後楚亟伐徐先師謂威公倡覇徐亦取舒以叛楚使齊有以保全之逺近懐服楚何能為惜乎婁林之不救六月雨杜氏注示旱不竟夏愚謂該上文春正月夏四月不雨一語而盡之矣自穀梁謂因僖公喜雨而書諸儒遂多以公為能樂民之樂或者因詩頌僖公謂僖公為賢而然也然詩特頌禱之辭初無其實扵春秋則未嘗見其賢也竊意雨不雨闗民命故因其實而書幸六月之雨足以救四月之不雨耳豈為僖公而書哉四月不雨六月雨為雨不竟夏是四月六月皆夏正也秋齊侯宋公江人黄人㑹于陽穀張氏曰去年盟江黄定其交矣今嵗再㑹申伐楚之約也冬公子友如齊涖盟木訥曰聽伐楚之期也楚人伐鄭自僖元年至今楚兵三加扵鄭矣鄭伯欲成孔叔不可曰齊方勤我棄徳不祥四年春王正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘音刑岷隱曰齊威圖伯二十餘年至是始有事扵楚猶未敢聲言伐之也以侵蔡召諸侯借侵蔡以出楚不意此威公之謀也木訥曰蔡自莊十四年荆入蔡蔡哀侯折而事楚已易世不通中國今二十有四年矣蔡已入楚則次及于鄭蔡鄭當楚之衝華夷之門户也故齊侯不得蔡無以及楚侵蔡伐楚勢當然矣諸侯之兵安能飛越蔡城而伐楚哉公娶蔡姬公怒歸之未絶也而蔡嫁之說者遂謂齊侯以私憾加蔡不知蔡以中國陷扵楚得蔡而後楚之户門啓矣嗚呼一問而楚詞屈兵不血刃堂堂之楚攝如鳥鼠而中國不為左衽者威公之力也孔子稱其一匡天下遂以仁許之正陘之師也陘楚地先師亦嘗言威公怒蔡因以為名爾且蔡不與中國盟㑹已二十餘年亦罪矣因諸侯之師震而潰之遂事伐楚如破竹然不與楚角力而示之以形勢以全取勝桓之功偉矣夏許男新臣卒說者謂病扵師歸卒於其國楚屈完來盟于師盟于召陵木訥曰楚知齊兵不可抗於是遣屈完下齊而乞盟焉故來盟于師楚子意也盟于召陵齊侯意也屈完至師而言乞盟齊侯知楚子之服無用戰矣扵是退召陵而與之盟禮也嗚呼一鏃不遺而服方張之楚八國之師櫜槖而歸威公之績大矣先師亦言来盟于師楚有盟心退盟召陵齊有盟禮從容不迫春秋之盟未有懿於此者齊人執陳轅濤塗秋及江人黄人伐陳轅濤塗慮齊師歸自陳有供億也誤之東歸陷沛澤中故怒其不忠而執之及江黄伐陳者魯受齊命也轅公穀作袁八月公至自伐楚木訥曰䇿勲扵廟為得其實此因其實而書之然則與其他至者名同而實不同矣服楚而歸中國同慶也葬許穆公即新臣也穆公羊作繆冬十有二月公孫兹帥師㑹齊人宋人衛人鄭人許人曹人侵陳張氏曰再侵者陳近於楚伐而未得其成則陳必不服故侵以列國之師待其服而後已兹公羊作慈五年春晉侯殺其世子申生晉獻公嬖驪姬欲立其子奚齊驪姬譛申生而殺之其後奚齊亦見殺晉亂者二十年故穀梁謂斥其殺者惡晉侯董仲舒謂為人父而䝉首惡之名杞伯姬來朝其子相朝諸侯禮也時杞伯在而杞伯姬乃攜其㓜弱以來朝魯岷隱謂伯姬庸視其夫越禮違制會莊公於洮朝其子扵僖失為婦之道矣夏公孫兹如牟左氏謂娶扵牟木訥謂兹公子牙之子牟微國兹前年伐陳已専兵今如牟疑私交公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王世子于首止秋八月諸侯盟于首止鄭伯逃歸不盟周惠王愛其子叔帶將易其世子鄭故齊侯合八國之君㑹王世子以繫天下之望又諸侯自盟而王世子與以表其尊不動辭色而世子之位以定其後世子立是為襄王而雒邑之鼎恃以不移威之力也時惠王欲易世子故不恱威公此舉使周公謂鄭伯曰吾撫汝以從楚輔之以晉可以少安鄭伯志在從楚而喜扵王命故逃歸不盟張氏曰威公之舉天下之公義也惠王之命一人之私心也逃者匹夫之事也鄭伯徇私違衆行同匹夫故書逃歸不盟木訥曰世子之位已定鄭固無關輕重然威公二十餘年輯寧中國僅能服楚扵召陵鄭伯一逃楚即滅弦鄭文豈特威公之罪人天下之罪人也及諸侯討治之至九年王人齊侯等㑹于洮鄭伯乃乞盟春秋於其叛書逃扵其来書乞賤之極矣先師甞言首止之盟齊侯從義不從令也逃歸鄭伯從令不從義也此殆要語楚人滅弦弦子奔黄左氏曰於是江黄道栢方睦於齊皆弦姻也弦子恃之而不事楚又不修備故亡張氏曰弦黄同壤而黄受弦子之奔楚之滅黄亦自此始矣木訥曰楚滅弦自鄭伯逃盟始鄭不逃楚未敢窺中國楚之貪婪在所不治而鄭文深可誅也愚按諸家多罪齊不救弦然齊處北海楚在南海齊積二十年間之力僅能盟楚于召陵弦近楚滅之旦夕耳豈齊救之所能及而楚豈易伐哉書生以口代兵言之易易耳使為齊桓而處此未必不重禍生民一敗塗地也夫弦非黄比也弦誤黄受伐厯三時而不救此則齊之罪爾九月戊申朔日有食之書災冬晉人執虞公虞貪賂同晉滅虢晉師還館扵虞襲滅之岷隱曰虞公貪賂自取滅亡書執如執一夫然言其易也六年春王正月夏公㑹齊侯宋公陳侯衛侯曹伯伐鄭圍新城秋楚人圍許諸侯遂救許冬公至自伐鄭齊以諸侯伐鄭討其逃首止之盟也伐而不服故圍新城以待其服楚欲救鄭故圍許以攻其所必救諸侯即釋鄭以救許而楚退先儒謂抑暴救患此齊威之義也伐鄭遂救許而獨書公至自伐鄭者伐鄭其本謀也左氏載許男靣縛降楚木訥曰許不旋踵與洮之㑹豈有服楚之理愚聞先師王宗諭貫道曰遂救許則許圍解安得靣縛見楚之事哉左史楚人辭多右楚失之誣爾愚按左氏𫝊秋救許而楚子已還至冬而乃靣縛見楚夫靣縛者圍急而出降之事也安得圍解數月之後無故而行此左氏雖欲誣而其言無理恐識者亦不信也七年春齊人伐鄭以其逃首止之盟嘗伐之而猶未服也木訥曰鄭不服則諸侯之心揺首止之盟寒而楚人亦有以議中國也故急於服鄭夏小邾子來朝即郳犂來也齊威請扵王命為小邾子故來朝鄭殺其大夫申侯申侯本自楚來鄭故導鄭背齊從楚鄭將復歸齊故殺申侯以恱齊左氏謂陳濤塗怨申侯反己扵齊譛而殺之木訥謂若然則申侯盖忠於齊者殺之是怒齊也何名為恱秋七月公㑹齊侯宋公陳世子欵鄭世子華盟于寗毋寗毋之盟謀鄭也鄭先以世子聽命以下齊之意世子乃反欲背鄭管仲以其不義勸齊桓拒之眀年齊為之請王人而講洮之盟木訥曰齊之於鄭期於服之而已曹伯班卒昭公也立九年卒班公穀作般公子友如齊木訥曰僖三年公子友如齊聘聽伐楚之期而涖盟焉其後凡三年公不朝則季友聘終齊威之世不怠也惟六年伐鄭自春徂冬不暇朝聘故七年公子友如齊自是十年公如齊十三年公子友如齊十五年公如齊十六年公子友卒十七年而齊威即世當齊之覇公與公子友同心事齊五年一聘之節未嘗廢愚謂木訥之考訂詳矣然事覇主而不事王公與大夫更迭皆春秋之習而魯不能自拔也冬葬曹昭公七月卒冬而葬時也八年春王正月公㑹王人齊侯宋公衛侯許男曹伯陳世子欵盟于洮鄭伯乞盟洮他刀反此所謂王人雖微序扵諸侯之上者也左氏謂盟于洮謀王室也惠王崩襄王立慮叔帶不敢發喪而告於齊也然按經今年十二月丁未方書天王崩㑹洮乃在今年之正月於謀王室之說不合左氏則謂王崩在去年冬閏月至今年十二月方發喪而告未知然否恐祕喪不發難於經年而叔帶乃襄王親弟非外國逺人亦難以祕喪為欺爾葉石林曰鄭殺申侯以謝首止之逃則服罪矣然寗毋之盟以世子来而鄭伯不至則諸侯猶未信也故洮之役以王人㑹而鄭伯始乞盟木訥曰甯毋及洮兩合諸侯皆為鄭也鄭塞華夷之衝其地虎牢盖天下之險武姜為大叔請制制即虎牢在漢為成臯在今為汜水天下之形勢繫焉楚得之則倚以抗中國中國得之則恃以扞楚鄭即楚則虎牢在楚故必得鄭然後收天下之險其後十有五年鄭不叛而楚不窺中國者虎牢之險在中夏也愚聞之先師謂前所圍鄭新城即齊賜申侯之虎牢夏狄伐晉襄陵許氏曰晉恃強不與齊合是以狄得侮之木訥趙氏曰狄之為諸侯患乆矣前日狄伐邢齊救而城之狄入衛齊徙而封之今狄伐晉齊威如不聞盖自齊之覇晉厯三世未嘗一窺齊侯之壇坫齊不伐晉幸也何狄之問秋七月禘于太廟用致夫人左氏謂致哀姜也凡夫人不薨于寢不殯于廟不赴于同盟不祔于姑則弗致也盖僖公以姜氏之惡不敢致其主於廟遲遲八年大舉禘祭從而致焉本朝胡氏孫氏劉氏張氏崔氏皆祖董仲舒劉向之言以夫人為成風而致夫人者立妾之辭也盖成風僖公之母莊公之妾也木訥謂二說皆非也十一年公及夫人姜氏㑹齊侯于陽穀則夫人為姜氏而僖娶于齊審矣夫人者時君之夫人也未知孰是然以禘而致恐非夫人廟見之義合從左氏為哀姜耳先師亦謂哀姜之惡僖公不敢致其主於廟遲之八年大舉禘祭因而致焉冬十有二月丁未天王崩惠王也立二十五年崩而襄王立九年春王三月丁丑宋公御說卒桓公也立三十一年卒而襄公兹父立御公穀皆作禦夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘宰周公者天子之三公宰孔也宋子者桓公未葬而襄公出㑹禮未葬稱子繼父之義也張氏曰宰周公天子之為政者不殊會之宰權雖尊非世子貴有常尊之比也陳止齋曰桓之㑹有天子之事三扵洮序王人於諸侯之上而同盟焉於葵丘亦序周公於諸侯之上而不敢同盟焉盟于首止不但不同盟而帥諸侯以㑹世子桓知節矣春秋是以予桓也愚謂此春秋書法之精也先師謂宰孔先歸諸侯自盟尊冡宰也秋七月乙酉伯姬卒說者謂内女許嫁而卒以成人之喪治之所以篤兄弟之義此僖公女兄也九月戊辰諸侯盟于葵丘孟子曰五覇桓公為盛葵丘之㑹諸侯束牲載書而不歃血初命曰誅不孝毋易樹子毋以妾為妻再命曰尊賢育材以彰有徳三命曰敬老慈㓜毋忘賔旅四命曰仕毋世官官事無攝取士必得毋専殺大夫五命曰毋曲防毋遏糴毋有封而不告曰凡我同盟之人既盟之后言歸于好近世張氏洽曰一命之詞三綱所繋盖修身正家之要自此以下尊賢敬臣子庶民柔逺人懐諸侯之意略備故穀梁氏謂陳牲而不歃血讀書加于牲上壹明天子之禁其提綱挈領以正率人盖春秋之所未有木訥趙氏鵬飛曰襄王即位適丁齊威之方覇威公於是率東諸侯㑹宰周公于葵丘宣天子五禁以令諸侯是㑹實為春秋之冠王室賴之多矣石林葉氏夢得則曰襄王之立非惠王意而惠后猶存襄王未知得終安其位此覇主之所當憂王亦出内臣以臨之無易樹子載之初命如是而僅終喪猶有子帯之難則齊侯之慮不得不預也武夷胡氏安國亦曰觀孟子所載初命之詞則知桓公翼戴王室之事信矣愚按孔子稱威公一匡天下民到于今受其賜孟子說諸侯以行王始力貶齊桓於葵丘之㑹猶力稱之如此則葵丘之㑹之盛可知至公羊氏乃謂葵丘之㑹桓公震而矜之叛者九國左氏亦載晉侯將如㑹宰孔言齊侯不務徳而勤逺略以止其行反皆於葵丘之㑹有疵焉何耶盖盛之極衰之始而覇者本源非正吝驕易生誠亦有如二氏之譏云爾然叛者九國不見其實而宰孔之言亦過矣春秋生民之免左衽正以桓公伐戎伐楚之功而宰孔反以為非齊之不能大戢楚人而滅弦滅黄力不能討者正以晉大國之獨不協力也奈何晉方欲如㑹而反止其行或者襄王雖立而子帶傍睨宰孔雖身預其㑹隂有貳心者耶然則九國之叛無實而宰孔之言非公也甲子晉侯佹諸卒佹九委反獻公也立二十一年卒而惠公夷吾入立甲子公羊作甲戌張氏曰前已書戊辰不應甲子在戊辰後合從公羊佹公穀皆作詭冬晉里克殺其君之子奚齊晉獻公殺世子申生逐公子夷吾重耳而寵嬖孽奚齊使荀息輔之獻公荀息皆非也故獻公卒而里克殺夷齊里克雖不應殺而奚齊不應立里克心在立正故不書弑君而書殺其君之子十年春王正月公如齊左氏曰始朝齊也狄滅温温子奔衛温畿内邑司冦蘇忿生之後居之故稱温子左氏曰蘇子叛王即狄又不能於狄狄伐之王不救故滅晉里克弑其君卓及其大夫荀息里克既殺奚齊晉國無君荀息與國人立奚齊之弟卓卓立踰年已為君矣克又殺之故書弑其君髙氏閌集注曰殺奚齊不恕則後世忠臣無以行其志弑卓不正其罪則後世亂臣得以肆其姦愚按荀息為獻公傅奚齊與卓而許獻公以死者也公羊嘉其不食言然先儒謂其從君於昏又罪其無益於君而自取勦滅是自經於溝瀆者愚謂驪姬亂其國神人共憤奚齊與卓豈有可輔立之理荀息受其託孤盖愚人耳既誤其君又累其君之子而又自禍其身也夏齊侯許男伐北戎岷隱曰威公既覇諸戎恐懼至是獨與許男伐北戎意者其為許伐乎晉殺其大夫里克里克殺奚齊與卓夷吾賂秦竊入而立左氏謂殺里克以說眀已非篡也然里克本重耳之傅故穀梁曰里克所為弑者為重耳也夷吾曰是又將殺我也是以殺里克先儒多謂克當獻公廢立之初不能廷争而中立以及異日之禍此至論也秋七月冬大雨雪岷隱曰書冬而不書月其為深冬未可知雨雪而至於大其寒極矣民物必有凍死者故春秋謹而書之愚謂雨雪常也書者書異也十有一年春晉殺其大夫㔻鄭父程氏曰是里克之黨欲立重耳而以三公子之徒作亂者也夏公及夫人姜氏㑹齊侯于陽穀杜氏注婦人送迎不出門見兄弟不踰閾與公俱㑹齊侯非禮岷隱曰魯桓與夫人姜氏如齊遂有彭生之禍魯之子孫當世為永戒今僖公不特偕如齊也又同㑹齊侯于陽穀此何禮也夫婦失道甚矣張氏曰諸侯㑹覇主而婦人與焉威公覇業遂衰而僖公怠棄國政亦自此始秋八月大雩旱也大雩僣也冬楚人伐黄黄恃齊不事楚楚伐之齊亦力不能救矣十有二年春王三月庚午日有食之杜氏注不書朔官失之夏楚人滅黄左氏曰黄人恃諸侯之睦於齊也不共楚職曰自郢及我九百里焉能害我夏楚滅黄穀梁曰貫之盟管仲曰江黄逺齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣桓公不聴遂與之盟管仲死楚伐江滅黄桓公不能救故君子閔之也木訥趙氏曰冬伐黄夏始滅黄黄待齊救也三時而齊救不至黄尚何以存齊之覇業於是乎不克終矣伐楚之謀黄實濟之楚將滅黄而齊不救盖畏楚爾愚謂威公結黄伐楚不過假以濟事然使管仲尚在必勸其救之今伐而不救無以宗諸侯悉如仲之言是覇業之成在伐楚之役而覇業之隳亦根於伐楚之役也茍濟一時弊固應爾黄若有逺慮附齊之後亦當修楚貢乃曰焉能害我此固有取禍之道然滅而不曰奔必其上下一心以死社稷豈不悲夫秋七月冬十有二月丁丑陳侯杵臼卒宣公也立四十五年卒而穆公疑立杵公羊作處十有三年春狄侵衛岷隱曰自楚丘既城之後狄人不敢侵衛者十有餘年至是復侵衛其後衛數有狄患齊威於是不能及逺矣許氏曰桓政始衰自楚伐黄不救則狄有以量中國矣木訥曰前年狄滅温温子奔衛今狄侵衛以衛納温子也既滅其國其君逋竄尚欲得之以甘心焉狄之横甚矣夏四月葬陳宣公五月而葬公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹左氏𫝊曰淮夷病杞故且謀王室也孫覺經解曰王室之事不載於經而眀年經書城縁陵則謀杞之說與經合矣木訥趙鵬飛曰鹹之㑹謀城杞也說者疑其夏㑹而眀年春始城之謂城縁陵非㑹鹹之諸侯不知預戒事乃所以為得時也鹹衛地秋九月大雩胡安定前年秋八月大雩之解曰春秋書大雩者二十有一非秋則冬無有在夏者左氏謂龍見而雩過則書之然知其一未知其二凡言大者皆僣天子之禮冬公子友如齊岷隱曰自季友來歸之後如齊者三所以親齊也張氏曰陽穀寗母及鹹之㑹凡既㑹後公子友皆如齊盖伐楚服鄭城縁陵之事魯皆同之足以見友専魯政也十有四年春諸侯城縁陵諸侯即㑹于鹹之諸侯再言諸侯者中隔秋大雩及公子友如齊之文也不再叙者前目而後凡也縁陵杞邑也左氏載淮夷病杞將遷杞於縁陵以避之也木訥謂淮去杞踰千里無病杞之理惟莒與杞鄰公羊言徐莒脅之當是避莒爾然公羊以此罪齊桓之専封諸家多從其說愚竊以為此非専封也夫昔未有國今始有國者封也自古及今之故國惟興王革命之初取亂侮亡以其故地分建親賢如周公之封於魯太公之封於齊始可謂之封否則如宣王封母弟于鄭亦一二間見耳若邢若衛若杞皆古諸侯皆以王室衰微為夷狄所侵而莫之救桓公出而率諸侯為之改營他邑使避患耳何嘗封邢封衛封杞而以專封為罪也哉夏六月季姬及鄫子遇于防使鄫子來朝左氏以季姬為鄫夫人歸寧而公怒鄫子不朝故季姬使之來朝公穀謂季姬先遇鄫子而使之來朝以請已按季姬前此未嘗歸鄫眀年乃始歸鄫左氏之說扵經不合西疇崔氏曰後書季姬歸於鄫是始嫁之文則此時季姬猶未嫁也乃與鄫子遇又終歸之於鄫此何義哉張氏曰季姬不繋國是未適人也而與鄫子遇于防盖僖公鍾愛其女使自擇配其失父道而不謹於男女之别甚矣岷隱戴氏曰季姬驕蹇縱恣欲自擇其對故與鄫子遇于防既當其意使來請已而眀年歸于鄫木訥趙氏曰季姬不繋之國内女之未嫁者也盖期鄫子扵防而鄫子遇之也使鄫子來朝以請昏于已故眀年而季姬歸于鄫如其意也始遇于防而公不制中使鄫子來而公不恥終歸于鄫而公不拒嗚呼淫風流行桑中大車之詩不作於魯而駉與有駜之篇猶以頌僖何哉盖夫子於魯詩存頌而略風為魯諱也春秋天下之大法豈容盡諱哉文姜哀姜鄫季姬之事備著於經雖無魯風可也鄫穀梁作繒秋八月辛卯沙鹿崩沙鹿晉山名晉卜偃曰期年將有大變幾亡國木訥曰不書國係天下也夾漈曰沙鹿不盡晉地也通衛狄狄侵鄭石氏曰滅温侵衛又侵鄭狄強甚矣木訥趙鵬飛曰赤狄白狄皆在西北今侵衛而至於鄭則與楚合矣諸儒皆以是罪齊桓是也然愚按地醜徳齊而相侵并勢則然也商周初興嘗一正之隨復侵并故禹之萬國至周興纔千八百周之千八百國至春秋纔七十餘其間侵并誰以罪商周之君哉方春秋之初夷狄交侵諸侯亦紛紛如鬭獸齊桓公積二十餘年盡心力經營輯睦諸侯盟楚伐戎以少殺其侵并之勢年至氣衰鼓舞既倦戎狄荆楚之間作亦勢然矣豈皆齊侯之身事而責之備也哉嗚呼世亂而賴王者興王迹熄而賴覇者興今覇者又衰矣是可重為世道嘆於何乎歸罪冬蔡侯肹卒穆公也立二十九年卒而莊公甲午立十有五年春王正月公如齊崔氏曰至是始純用五年一朝之制同於事天子之禮矣楚人伐徐三月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘遂次于匡公孫敖帥師及諸侯之大夫救徐左氏曰徐即諸夏也岷隱曰徐前此取舒舒楚屬也故楚伐徐按徐逺楚而近齊齊不得不救盟于牡丘謀救徐也次于匡畏楚而不敢救也使諸大夫往救姑為救徐之名也徐卒為楚所敗公孫敖慶父之子夏五月日有食之日與朔史皆失之故止書五月秋七月齊師曹師伐厲厲楚與國也力不能伐楚而伐厲又非攻其所必救八月螽災也螽公羊作􅏑九月公至自㑹至自㑹欲救徐不能楚師未退而先返已厯三時矣季姬歸于鄫至是而始嫁也不言来逆已成於防之遇也己夘晦震夷伯之廟晦者晦朔之晦夷伯者公子展伯其字也無駭之祖季氏之陪臣公羊以為季氏之孚盖所信任者也震者雷撃之左氏以為有隱惡冬宋人伐曹左氏以為討舊怨盖莊十四年曹嘗從諸侯伐宋然已易世矣岷隱曰牡丘之盟宋齊皆在伐厲之師宋與齊俱宋襄公不以救徐為念不以盟㑹為信退而伐曹以尋舊怨持此圖覇不亦難乎薛氏曰諸侯伐厲而宋人内叛陳止齋曰諸侯相加兵自莊公十九年未之有也於是再見宋襄為之也木訥曰齊威之覇至是三十年諸侯無有擅相侵伐者宋人加兵於曹而諸侯攜貳威不能制矣愚謂此宋襄公已有圖覇之心也然欲繼覇而首壊齊威之所以伯者伐諸夏而恣楚之横此其所為楚執楚人敗徐于婁林諸侯救之不能而徐終為楚所敗左氏曰牡丘之盟為無益伐厲之師為徒往矣十有一月壬戌晉侯及秦伯戰于韓獲晉侯左氏載晉侯之於秦也出因其資入用其寵饑食其粟三施而不報秦故伐晉晉不知遜乃逆而請戰一戰而敗是以見獲十有六年春王正月戊申朔隕石于宋五是月六鷁退飛過宋都木訥曰異在石隕鷁退五與六先後之辭史之舊文聖人無損益焉髙郵孫氏曰書是月者别非戊申同日三月壬申公子季友卒季友立僖生而賜氏至其孫曰季孫行父行父之後世以季為氏至意如而出昭立定專擅魯國而有其二其強盖原扵季友夏四月丙申鄫季姬卒髙郵孫氏曰春秋内女適諸侯者書卒秋七月甲子公孫兹卒髙氏閌曰公子牙之孫叔孫戴伯也兹公羊作慈冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮左氏曰謀鄫且東略也將城鄫役病不果而還所云謀鄫者岷隱曰鄫未嘗與㑹盟且未聞有他難獨以魯昏姻之故至勞諸侯其㑹亦不足觀已齊威衣裳兵車之㑹盖終於此所謂東略者木訥曰淮夷今臨淮也東鄰魯西逼宋與徐有疆場之交前日徐為楚所敗齊救不及齊懼淮夷誘徐為魯宋之患故為兵車之㑹合諸侯以觀兵於淮亦未嘗有伐功然則此齊威垂末之舉事已可憐僖公不過嘗預㑹而魯人至借以頌僖公何哉十有七年春齊人徐人伐英氏夏滅項英氏皋陶之後楚與國也齊與徐伐之左氏謂楚前年敗徐而報之英氏也崔氏曰敗徐豈英氏有力乎滅項不書誰之師左氏以為魯公穀以為齊胡安定以為上言齊人徐人伐英氏下言滅項齊徐可知盖謂既伐英氏因師以滅項春秋承上文而書之也木訥亦謂項亦楚屬伐英氏不克移兵滅項二說未知孰是按春秋不稱國者多魯之事也秋夫人姜氏㑹齊侯于卞九月公至自㑹夫人聲姜齊桓女也左氏謂齊以滅項故止公聲姜㑹齊公得反國岷隱謂去冬㑹淮今年夏始滅項㑹淮之後公曷為留齊必有以也經年於外國事廢矣冬十有二月乙亥齊侯小白卒木訥趙氏曰齊威五覇之盛其初㑹北杏以求諸侯諸侯未和伐宋而為鄄之㑹伐鄭而為幽之盟諸侯無二矣而後伐戎伐徐徐戎卒服則救鄭以示威於南伐山戎以示威扵北定魯之難救邢之危衛滅而齊還之杞滅而齊城之内之諸侯一徳事齊可以南征楚也則㑹江黄以掎楚之後取舒庸以折楚之臂然後興次陘之師成召陵之功則攘夷狄之功成矣外雖定而王室未寧扵是為首止之㑹定世子之位以示諸侯尊王之心襄王踐阼又為之合葵丘之㑹率諸侯以聽扵冡宰興曠世不行之大禮以令天下而王室亦定矣内和諸侯外攘強楚上定王室威公盖以三王之功不我過也則怠心生狄滅温齊不問楚滅黄齊不救狄侵衛齊不知既而楚諜知其怠而易與也於是深履東夏而伐徐威公合八國諸侯於牡丘顧望不進乃命大夫救之而徐卒底扵敗伐厲伐英氏威公皆不親也卒之内寵如林閨門無法一身未暝六子為仇歛不以禮葬不以時一威公耳而前日之威公非今日之威公何也勤怠之殊也勤怠之意何從生修外而不修内也穀梁氏曰衣裳之㑹十有一未嘗有歃血之盟也信厚也兵車之㑹四未嘗有大戰也愛民也注云會北杏會鄄又會鄄㑹幽又㑹幽會檉會貫會陽穀㑹首止會寗毋㑹葵丘凡十一㑹洮㑹鹹㑹牡丘㑹淮凡四西疇崔氏曰齊威之覇自莊十六年盟于幽至僖十六年㑹于淮凡十有二㑹而孔子稱威公九合諸侯者舉其不以兵車者而已莊十六年九國盟于幽二十七年五國又盟于幽僖元年六國㑹于檉二年四國盟于貫五年八國㑹王世子于首止七年五國盟于寗毋八年王人與七國㑹于洮九年宰周公與七國㑹于葵丘十三年七國㑹于鹹凡九合諸侯不以兵車十有八年春王正月宋公曹伯衛人邾人伐齊夏師救齊五月戊寅宋師及齊師戰于甗齊師敗績狄救齊秋八月丁亥葬齊桓公冬邢人狄人伐衛甗魚免反齊威屬孝公於宋襄易牙亂齊立無虧而孝公奔宋故率諸侯伐齊以納孝公盖亦乗齊之亂欲繼齊之伯也魯雖救齊而不力齊卒敗績狄救齊意亦思齊威之徳也邢人狄人伐衛伐衛亦所以救齊也凡救齊者亦以宋襄之故非盡忠扵齊也齊以亂故威公九月方葬齊威立凡四十三年國亂而宋納孝公繼立名昭十有九年春王三月宋人執滕子嬰齊夏六月宋公曹人邾人盟于曹南鄫子㑹盟于邾己酉邾人執鄫子用之秋宋人圍曹劉氏曰宋襄公欲合諸侯而執滕宣公又使邾文公用鄫子一㑹而虐二國之君岷隱曰首執滕子已駭觀聽㑹盟曹南鄫子後至未足深罪也遽使邾人執而用之㑹盟曹南曹不致餼亦微罪也口血未乾繼復圍曹以此求覇豈不繆哉衛人伐邢報邢之伐衛也冬㑹陳人蔡人楚人鄭人盟于齊左氏曰陳穆公請修好於諸侯以無忘齊桓之徳冬盟于齊修桓公之好也注曰宋襄暴虐故思齊桓愚按諸侯不肯從宋而楚與中國之盟始此此宋襄異日之所以見執於楚歟梁亡梁亡梁自亡也左氏謂好土功而民潰何休以為峻刑穀梁以為淫湎要皆以失民而亡梁亡而秦取其地二十年春新作南門僖公改而大之也閔子騫扵長府云何必改作則書此可知夏郜子來朝公羊以為失地之君木訥曰隱十年公敗宋師取郜取防桓三年取郜大鼎于宋則郜為宋滅乆矣今而來朝必魯别封之以為附庸五月乙巳西宫災公羊以為魯小寢盖諸侯三宫天火曰災鄭人入滑滑小國鄰扵鄭服衛鄭故伐而入之秋齊人狄人盟于邢左曰為邢謀衛難也冬楚人伐隨漢東之國隨為大隨以漢東諸侯叛楚故楚伐之𫝊謂隨不量力二十有一年春狄侵衛前年衛伐邢去年齊人狄人盟于邢以謀衛難故今年狄侵衛者為邢故也往者邢與衛皆嘗有狄患齊威皆却狄而封之今孝公反與狄盟而致狄侵衛故襄陵許氏曰中國無覇則諸侯力攻四夷衡決民被其災此書伐衛伐邢入滑伐隨侵衛者著無覇之患也宋人齊人楚人盟于鹿上宋為鹿上之盟以求諸侯於楚楚人許之公子目夷曰小國争盟禍也宋其亡乎幸而後敗初宋欲合諸侯臧文仲聞之曰以人從欲鮮濟木訥曰鹿上宋地也召楚人於境内而盟之引虎入閨闥其脫搏噬幸矣而秋又㑹之虎口其可屢逃哉宜其見執也愚謂秋之見執已萌於春之見許宋襄愚而妄作楚特以戱視之耳夏大旱記災之甚也秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂執宋公以伐宋冬公伐邾楚人使宜申来獻捷十有二月癸丑公㑹諸侯盟于薄釋宋公盂之盟楚嘗許宋以諸侯而今盟之也楚稱子而序於陳蔡鄭許曹之上者止齋謂宋楚初争長也此行實楚執宋公而序諸侯以執之者蘇氏謂宋不度徳量力而争諸侯諸侯之所不予也公伐邾者邾嘗從宋伐齊魯救之不克又鄫魯之親也而邾執鄫子用之故怨邾特邾與宋盟未敢伐今宋為楚所伐故乗間而伐邾左傳謂邾滅須句故伐之或言其非是也楚人來獻捷者魯不與盂之盟楚故假宋捷以威魯魯懼而赴薄之盟故楚為之釋宋公公羊謂目夷歸宋修繕而釋宋公理亦兼有之也獻捷不言宋之捷者杜注謂秋伐宋冬來獻捷事不異年而從可知諸家或以為諱或以為貶或以為存中國而抑夷狄各以意度之也木訥曰鹿上之盟宋幸脫虎口者以齊在也今齊懼楚而不至陳蔡鄭許皆楚之黨而曹又宋之讎也見執固無疑矣楚之執宋公所以求諸侯魯獨不至獻捷以威之魯懼而後從之魯至而宋公釋使魯不從楚未必釋宋公岷隱曰齊威公覇業已成猶不敢輕視楚宋襄公一旦圖覇輕扵挑楚於是楚人有狎侮之心宋人曰盟則與之盟宋人曰㑹則與之㑹誤而致之至則執之執其君以伐其國如玩嬰兒扵掌股之上宋人俯首聽命罔敢或違不言戰不言敗拱而勝之爾楚人使宜申獻捷于魯盖是㑹也魯君不與獻捷之意將以風魯魯侯懼而往㑹與諸侯盟于薄既盟之後宋公僅免而歸盖在㑹之諸侯惟楚命是聽或執或伐或盟或釋一無所與焉愚按岷隱之論精矣然春秋書諸侯者亦以宋襄一㑹而虐二國之君先為中國諸侯之所共嫉楚故因得以乗間凡執之釋之亦楚與諸侯之所同不可謂諸侯一無所與也合依經文列叙諸侯為正盂公羊作霍穀梁作雩二十有二年春公伐邾取須句其俱反左氏謂須句國也邾滅之公伐邾而取之反其君焉禮也木訥曰若是則魯之美事春秋當書邾滅須句須句子來奔公伐邾歸須句子于須句如書歸邾子益之文然後眀白今直書公伐邾取須句如莒人伐杞取牟婁之類則須句乃邾之邑魯伐邾而取其邑安可以須句為國且今既取之則滅矣至文七年安得公又伐邾取須句耶則知須句邾邑今伐而取之以責其不服其服則又反之至文公之世又伐而取之也愚按胡安定扵此後升陘之戰亦曰魯伐邾之國又取其邑致此之戰其惡可知則安定已指須句為邾之邑而魯取之矣夏宋公衞侯許男滕子伐鄭左氏曰三月鄭伯如楚夏宋公伐鄭子魚曰所謂禍在此矣孫氏曰齊桓之世莊十六年荆伐鄭二十八年荆伐鄭僖元年楚人伐鄭二年楚人侵鄭三年楚人伐鄭鄭不即楚此而即者宋襄不能與楚抗也木訥曰鄭人從楚力不支也宋襄公已不能抗楚甘就執辱何責鄭之弱而附楚岷隱曰宋襄被執之後歸反其國當痛自循省為卧薪嘗膽之計乃以鄭之朝楚起而伐鄭楚師救鄭卒敗于泓崔氏曰宋公釋乎執而遽伐鄭所以怒楚而致戰也秋八月丁未及邾人戰于升陘木訥曰升陘魯地也邾伐我也公二年之間再伐邾一取其地宜邾必有以報魯左氏載我師敗績邾人獲公胄縣諸魚門冬十有一月己巳朔宋公及楚人戰于泓宋師敗績楚伐宋以救鄭宋與之戰敗而傷股七月而卒狂愚取禍尚自稱仁義之師劉氏意林以為無異盜蹠以分均為仁以後出為義也劉氏𫝊以為宋公之愛人也無異扵殺之也師氏謂其敗齊師執滕子圍曹伐鄭其扵仁義逺矣及戰于泓乃以不擒二毛不阻隘為辭適所以敗其衆也木訥謂彼方脫釁鼓之餘以歸不能責躬自咎内輯其國外和四鄰修徳養威待時而動而招楚兵自取敗亡乃假區區婦人之仁以要大義之名公羊遂以為文王之戰吾不咎其與宋襄之過而切憤其待文王之薄也二十有三年春齊侯伐宋圍緡左氏曰討其不與盟于齊也注謂十九年盟齊以無忘桓公之徳而宋獨不㑹故今討之岷隱曰宋襄雖失道然納齊孝公實有徳於齊今敗于泓而死諸侯之所同念也而孝公首伐之既伐其國又圍其邑是以知孝公之背徳也夏五月庚寅宋公兹父卒左氏曰傷扵泓故也不書葬者諸侯畏楚且疾之無㑹葬者也秋楚人伐陳左氏曰討其貳於宋也冬十有一月杞子卒杞稱子者左氏謂其用夷禮公羊謂貶其為徐莒所脅穀梁謂其為時王所黜未知孰是嘗聞先師王貫道云杞病於夷雖頼齊威城之僅安然幾扵非國故降伯而以子自貶然則亦從其赴而書之歟二十有四年春王正月夏狄伐鄭鄭入滑王請於鄭鄭反執其使故王使狄伐鄭秋七月冬天王出居于鄭天王襄王也左氏載王子帶之事言避母弟之難也木訥曰叔帶者惠王陳媯之所愛也若殺父母之所愛則與鄭莊公何異故寧避之而出居于鄭文武之靈未泯天下必有勤王者若不得巳而遜于叔帶是亦文武之子孫耳此襄王之心也盖帶之亂衛士將禦之王曰先后其謂我何故出居鄭其書天王出居于鄭志出入之實爾三𫝊鑿為異論曰天子無出且出入人之常豈天子獨能入而不能出耶又曰王者無外故不言出出失天下也夫一視同仁王者之心此所謂無外也豈謂王者一出而遂有外乎一舉足而出天下遂非其有乎書曰王出郊康王之誥曰王出在應門之外易曰王用出征夫聖人書天王出居于鄭志天王出而天下無勤王者非謂王不可出而出也曲禮有天子不言出之文盖生於三傳晉侯夷吾卒惠公也子圉嗣立為懐公秦納文公入而殺圉二十有五年春王正月衛侯燬滅邢夏四月癸酉衛侯燬卒諸家皆謂衛滅同姓故罪而生名之書衛侯燬滅邢朱文公曰經文只隔夏四月癸酉一句便書衛侯燬卒恐是因而𫝊寫之誤木訥趙氏曰下有衛侯燬卒之文後世𫝊授以類誤耳春秋書滅同姓者有矣而未嘗名虞滅下陽楚滅夔皆同姓也何以不名楚子䖍誘蔡侯殺之此非同姓也何以反名之且書滅國則其惡自著同姓非同姓後世自辨不在書名而後知其滅同姓也曲禮遂曰諸侯失地名滅同姓名吾嘗考小戴禮多漢儒雜說援春秋三傳以立文也且衛之滅邢固甚矣而邢之滅實有以自致之邢衛均有狄患均受齊威之徳遷而城之二國既安則比以抗狄可也邢乃叛衛從狄又脅狄以伐衛衛抗狄猶懼不支邢狄合而攻衛衛盖危矣衛固無以制狄故衛滅邢所以奪狄之援紓國之病也然謀則善矣如滅國之罪何聖人自十八年以至扵今書邢衛之事甚詳所以著邢不當附狄伐衛衛亦豈當從而遂滅之二者均有罪也愚謂書滅則衛罪為重宋蕩伯姬來逆婦伯姬魯女嫁宋蕩氏来為其子逆婦以姪從姑也先儒謂娶妻必親迎而伯姬為子逆婦非也諸侯嫁女於大夫以大夫同姓為主今公以愛其女而自主之亦非也宋殺其大夫杜氏注曰其事則未聞胡安定曰以泓之戰不死難也崔氏曰豈嗣君三年喪畢既臨事而治泓戰之罪諸大夫有以衆死者乎木訥曰宋為楚所敗宋襄自取之也安可以責其臣今襄公死成公立晉文即位二年方圖伯宋將託於晉乃歸罪於其臣以滅先君之恥而殺其大夫愚按此皆以宋之事而意度之若闕所不知當從杜注秋楚人圍陳納頓子于頓頓迫於陳頓子奔楚楚圍陳而納之中國虐小夷狄反借為義舉葬衛文公立二十五年卒而成公立冬十有二月癸亥公㑹衛子莒慶盟于洮他刀反木訥曰莒自僖元年魯獲拏之後未嘗通魯怨亦深矣衛成公斬然衰絰中為洮之㑹以平之盖有比小事大之義然莒子不至以慶如㑹何益扵平盖平之意出扵衛莒疑魯之未肯平故以大夫聴命焉眀年向之盟而後成矣岷隱曰衛文公新卒嗣子未踰年非有甚不得已之事也何至匆匆亟為此盟范寗曰衛稱子在喪洮魯地二十有六年春王正月己未公㑹莒子衛寗速盟于向木訥謂莒今知魯肯平故莒子親來衛知魯莒已可平故在喪不再行而使大夫岷隱曰左氏以為尋洮之盟也洮之盟纔一月何盟之尋僖公謂前日之盟莒子不親至不足以為平故復㑹于向不知洮之盟莒子不至公與大夫盟已失體矣今衛又效尤使大夫來公自輕亦甚矣平莒非大事何汲汲若此乎向莒地速公羊作遫齊人侵我西鄙公追齊師至酅弗及夏齊人伐我北鄙衛人伐齊公子遂如楚乞師齊初怨魯救無虧至齊之盟宜釋然矣魯齊甥舅之邦乃乗其不備潜師侵之怨其來追夏又伐之衛之伐齊為魯伐也魯之乞師扵楚將伐齊也公子遂者東門襄仲也酅公穀作嶲秋楚人滅夔以夔子歸䕫楚同姓國楚虐其小而滅之𫝊謂夔不祀而見滅故楚雖滅同姓而不名劉氏意林曰楚祖鬻熊夔祖熊摯諸侯祀不過其祖夔不祀祝鬻與鬻熊非其罪夔公羊作隗冬楚人伐宋圍緡𫝊謂宋恃善於晉而背楚故楚伐之岷隱曰前者齊伐宋嘗圍緡今者楚伐宋又圍緡緡之百姓何以堪命此皆宋襄之餘孽也緡穀梁作閔公以楚師伐齊取穀公至自伐齊齊雖首兵魯乃以夷狄攻中國其失多矣僖公負齊威一至於此二十有七年春杞子來朝岷隱曰杞或稱侯或稱伯至于稱子極矣故春秋因其自貶而書之僻陋用夷庭實有闕魯人重物而不重禮公子遂所以入杞也責其不共杞何敢爾欲加之罪其無辭乎夏六月庚寅齊侯昭卒秋八月乙未葬齊孝公孝公立十年卒杜注曰三月而葬速襄陵許氏曰齊桓既没諸侯思之如周人之思召伯也孝公不能藉之以興觀其間楚人之勝以圍宋襄又侵伐魯僖不已與桓公下宋桓魯莊之意正相反覇業所以隳矣愚按桓公務却狄摧楚孝公首盟狄盟楚不克紹如此無足責也乙巳公子遂帥師入杞崔氏曰春接其君秋入其國以内為過扵杞無譏木訥曰魯怯於齊而虐於杞怯者吾則乞師必取其邑虐者吾以偏師直入其郛僖公自公子友死而用公子遂善惡判矣冬楚人陳侯蔡侯鄭伯許男圍宋十有二月甲戌公㑹諸侯盟于宋崔氏曰是時齊威既没楚人肆横執宋公伐宋國敗宋師獻宋捷圍宋邑不道於宋已甚今又圍宋宋之盟猶薄之盟爾泰山孫氏曰四國雜然從夷以圍中國其惡自見先儒亦謂楚序扵諸侯之上而獨稱人者嫌其予楚以覇也木訥曰楚之虐宋亦甚矣宋成以父之讎義不屈扵楚亦可謂賢子歟于時晉文興覇盖已四年宋亦有足恃者而楚虐宋不已楚則然爾諸侯之不知變一至此哉有晉可從而不從反比楚以戕中國其罪盖重於楚晉文扵此不得不興也或者疑晉文興覇之暴盖不速則無及於天下之患而諸侯皆楚矣眀年敗楚於城濮豈獨宋賴之天下賴之也二十有八年春晉侯侵曹晉侯伐衛公子買戍衛不卒戍刺之楚人救衛三月丙午晉侯入曹執曹伯畀宋人夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績楚殺其大夫得臣衛侯出奔楚五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土陳侯如㑹公朝于王所六月衛侯鄭自楚復歸于衛衛元咺出奔晉此楚圍宋之乆宋告急於晉晉文公因為圖覇攘夷之舉也書晉侯侵曹晉侯伐衛者曹衛皆楚之黨而晉之怨故侵之伐之以誘致楚也書公子買戍衛不卒戍刺之者魯先使買戍衛今因晉伐衛故託名不卒戍而殺之以恱晉也書楚人救衛者楚為晉所誘致也書晉侯入曹執曹伯畀宋人者執楚之黨畀楚之仇以怒楚使戰也書晉侯齊師宋師秦師及楚人戰于城濮楚殺其大夫得臣者得臣強愎取敗而楚子歸罪於得臣也書衛侯出奔楚者楚救之不克欲與楚而國人不可故奔楚也書公㑹晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土陳侯如㑹者功成定覇以盟諸侯陳後至而不及盟也書公朝于王所者王在踐土而朝之也書衛侯鄭自楚復歸于衛衛元咺出奔晉者衛之出奔元咺奉其弟叔武以守今晉赦衛侯得歸反殺叔武故元咺訴於晉也木訥趙氏曰晉文之覇功與齊威同而勢與齊威異齊威之興天下習衰周之弊而莫識所謂覇者故齊威求諸侯為難必屢㑹屢盟訓諭告戒而後諸侯服從然欲制楚則楚方張其侵犯不過蔡而已故諸侯既合則一問而楚服晉文之興則諸侯盖習於從覇惟時無其人則無所適從晉文起而號召之一揮而至矣然楚之強則非齊威之時也齊威之時楚不出蔡鄭而今直蹈齊魯之郊魯宋曹衛陳鄭蔡許自東以南皆楚矣晉文將起而收之不其艱哉故齊威伐楚至扵召陵楚地也晉文敗楚止於城濮衛地也自楚及衛盖千里却楚千里之外以收魯宋曹衛陳鄭許蔡半天下之諸侯其用力為如何論者不察而妄疵晉文以為不及齊威此不識天下之勢書生語也齊威制楚以三十年之乆故合諸侯以正問罪之名期其服而而已晉文則解倒垂之急於旦暮之間故務以謀必於勝之而後已是二者又勢之不同也踐土之盟于温之㑹天王皆在天王下居成周而出次于外踐土之盟聖人惟書公朝于王所不書所以出之故不若温之㑹書狩而後朝之有序也三𫝊遂有天王下勞晉侯之說此不可信𫝊而不稽諸經也經於僖二十四年書天王出居于鄭自後未甞書歸于成周踐土即鄭地也則天王盖居扵是乆矣何下勞之有或者棄經任傳謂左氏有晉侯納王之事遂以為實春秋以周為重安有晉侯納王而不書者哉天王之歸盖因今踐土之盟也前此鄭陷于楚天下無勤王者今晉侯克楚于城濮以敵王愾奏凱于王㑹諸侯以盟于鄭以諸侯朝焉天王因是復歸于成周冬書河陽之狩則天王既歸而出狩也文公非緩於納王也盖先勝楚而後納王也伐楚者納王之資也然則踐土之盟厥勲茂哉小人不樂成人之美取三𫝊掇蜂之說以疵吾晉文君子所不甘焉故愚稽於經以正之非私晉文白聖人之筆法而已陳侯欵卒陳侯立十八年㑹于踐土以病歸卒是為穆公子共公立秋杞伯姬來莊公之女此私來也公子遂如齊魯嘗以楚師伐齊取其邑齊怨深矣今齊既易世已同踐土之盟魯故修齊好亦以晉既勝楚而畏晉故也冬公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾人秦人于温天王狩于河陽壬申公朝于王所左𫝊謂晉文召王者也木訥曰温之㑹天王時已婦成周晉文扵是合諸侯而朝之然不朝諸京師而朝諸河陽何也盖昔襄王在鄭鄭實陷於楚晉侯勝楚得鄭而取日扵虞淵前日踐土之朝是也今天王復辟所以徳晉者甚重而晉將朝焉於是襄王出狩而就見之所以勞晉文之來也然則禮乎曰非禮甚矣諸侯朝王禮之常天王受朝亦禮之常自入春秋百年之間無復修朝見之禮晉之朝王曠世盛典也於是屈而出見之託狩為辭焉盖下堂而見諸侯自夷王迄今又百年則循而至此亦勢之必至說者不知踐土之盟襄王尚在鄭既以為天王出勞則疑河陽之狩不容再出故以晉侯召王為言且晉侯方以尊王市名於天下今反召之以買抗君之罪必不然矣又嘗以地考之而知河陽之狩非晉文召王也河陽今之孟州河陽與温皆孟屬邑孟距王城纔七十里而不舉趾如王城哉然則孔子稱晉文譎而不正何也夫譎以謀言也如侵曹伐衛執曹畀宋執衛侯歸京師皆譎也晉文果召王則天下之逆節聖人將不齒之矣豈特曰譎而不正哉愚按岷隱嘗云使宋人賂齊以告楚分曹衛之田以畀宋私許復曹衛以攜楚人之黨顯執宛春以激子玉之怒凡此皆譎也然則舊說指召君為譎者召君之有無雖未可質言而果召君則不止於譎誠有如木訥之所言也譎固自有在也崔氏曰河陽之狩三家皆謂再致天王似誤矣温之㑹天王未嘗與自為河陽之狩耳何以言之彼踐土之盟加朝之日於盟之上知既盟而朝同在癸丑之日則王在踐土明矣此則先書温之㑹又書狩扵河陽然後書壬申朝于王所三者似異日則温之㑹天王不在温亦明矣然河陽逺矣王適以諸侯㑹温之時而逺為河陽之狩是王實欲㑹諸侯假狩之名以行爾温者河陽之地也於諸侯㑹以其邑言於天子狩以其地言晉文行覇帥諸侯朝王以尊周室春秋予之此所以志公之朝也愚按召王者左氏之言而下勞者後世之說木訥破召王之說而猶以王之狩為下勞若以經文為正則諸侯之㑹在温天王之狩在河陽諸侯既㑹而復以壬申日朝于王所其事不過如此若王室㣲諸侯強天王因出狩而就見其迹亦曉然可知也晉人執衛侯歸之扵京師衛元咺自晉復歸于衛以元咺之訴而執之也元咺訴得直故復歸于衛然為臣而執君君執而臣反皆背理甚矣諸侯遂圍許曹伯襄復歸于曹遂㑹諸侯圍許許自二十七年從楚圍宋踐土之盟于温之㑹許又獨不與故晉以諸侯圍之曹伯乆居于晉晉文感侯獳之言使之復國曹伯未至扵國遂即来同圍許二十有九年春介葛盧來介東夷國葛盧國君之名書來不書朝公羊謂不能乎朝也公至自圍許木訥曰公㑹于温朝于王所而後遂圍許今獨以圍許至則凡例謂後事小則以前事致者扵是不通矣愚意承上文言之無他義也說者鑿爾夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉翟直厯反左氏曰公㑹王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟于翟泉尋踐土之盟且謀伐鄭也木訥曰翟泉周地以大夫而盟王臣扵天王之側抗可知也岷隱曰春秋之諸侯不知有王室如晉文之尊王自謂不可及矣狃扵習俗闇於典禮若此等類皆不知其非愚按諸家皆痛詆此盟謂書及而不書公及者為魯諱書人者貶諸侯也按公穀二𫝊所載經文皆作公及而左氏扵𫝊亦作公及獨左氏所傳之正經無公字其闕文未可知㑹者既非諸侯不書人而何書聖人實書其事善惡昭然未必隂為譏詆如凡例之云也翟公穀作狄秋大雨雹陽氣方盛而隂脅之為雹大者過甚之名春秋書大雨雹者二冬介葛盧来春之来公圍許未至未見公也故冬再来三十年春王正月夏狄侵齊左氏謂狄間晉之侵鄭也故侵齊岷隱曰按僖公十八年狄救齊二十年齊狄盟于邢三十年三十三年狄皆侵齊侵起扵盟盟起於救也夷狄豈可使有功於中國而與之盟㑹哉木訥曰齊威之覇狄伐晉而齊不救者憾晉之不從今晉文之覇狄侵齊齊已從晉晉何辭而不救此晉文之老而懈也一伐楚再朝王至翟泉之盟已不親矣晉文剛毅果敢過於齊威惜其老而力有所不逮也秋衛侯殺其大夫元咺及公子瑕衛侯鄭歸于衛衛成之奔元咺奉其弟叔武守衛衛成歸反殺叔武元咺訴於晉晉執衛成歸京師元咺復歸衛立公子瑕故衛成再入而殺之元咺許君而専立有罪矣衛侯鄭亦書名者先儒謂殺叔武公子瑕皆非其罪而戕天倫也或曰魯請於天子而天子使之歸故名也竊意瑕亦嘗立故各書名為别如突忽歟晉人秦人圍鄭崔氏曰鄭不㑹翟泉之盟時秦晉方睦故相與圍之愚按諸家多據左𫝊謂晉文舊嘗過鄭鄭無禮而報怨木訥曰踐土于温之㑹鄭伯皆在越五年同兩盟豈至是而始責舊怨哉盖安定亦云討翟泉之不㑹此說是也介人侵蕭張氏曰介再來魯求援而後舉兵也木訥曰蕭附於宋介附於魯石氏曰蕭姬姓宋附庸後楚滅之冬天王使宰周公来聘公子遂如京師遂如晉岷隱曰宰周公王朝之貴豈得下聘列國胡安定曰公子遂如京師報周公之聘也然王者至尊非諸侯可抗也木訥曰子遂如京師而遂如晉則是魯以事鄰國之禮事周也魯盖以宰周公之來本乎晉侯以我朝王而致故既已聘周不可不如晉以報其私焉是聘使之勤出扵周而勞問之恩歸扵晉也然自隱至莊天王聘魯者五卒無一介之使如周則今日公子遂之行已為非常之禮尚何責其遂如晉耶三十有一年春取濟西田公子遂如晉左氏謂晉分曹田取之也如晉者拜曹田也公羊謂晉取曹所侵而班之諸侯也任氏黎氏諸家皆以為曹田曰非其有故書取也石氏劉氏諸家皆以為魯田曰不繋國則我之有也趙木訥又曰魯兵嘗追齊正濟西我之地也宣十年又書齊人歸我濟西田歸我則本魯田也惟黎氏以為非曹非魯不可追治其田之自來盖自周衰相吞滅而致魯本封百里耳至鄭夾漈則曰魯之濟西比曹北比齊晉文討曹而分其地魯得濟西之田此語覺深徑矣夏四月四卜郊不從乃免牲猶三望木訥曰郊之制自惠公請之周雖有其制而未敢用僖公首舉之故卜之卜之至四而不從天豈容僣哉而猶三望是犯天威而必扵僣也其可乎三望之說諸儒紛紛惟岱濟淮者是也石林曰吕不韋之書曰此平王之末造惠公請於周而假寵於周公是平王為之也然猶有降殺焉故郊不以日至而以上辛禘不以祖之所自出而以文王望不通方望之祀而以三望門不兼五門之制而以天子􅆏門為庫門應門為雉門雖為之别而孔子不與曰魯之郊禘非禮也周公其衰矣止齋曰諸侯之有郊禘東遷之僣禮也故曰秦襄公始列扵諸侯作西畤祠白帝魯之郊禘惠公請之據邵氏經世書惠公實立於秦襄公祠白帝之年然始欲用之者僖公也向者莊公觀齊社曹劌諫曰天子祀上帝諸侯㑹之受命焉諸侯祀先王先公卿大夫佐之受事焉見惠公雖請之而魯未嘗行也記禮者以為魯用天子禮樂皆成王賜之按衛祝鮀之言分魯以大輅大旂夏后氏之璜封父之繁弱土田陪敦祝宗卜史備物典冊官司彛器成王命伯禽者不過如此無所謂天子禮樂也隱公考仲子之宫而始問羽數周公閱来聘饗有昌歜形鹽而辭不敢受寗武子来聘饗之賦湛露彤弓而曰其敢干大禮于以見魯之僣尚未乆故上自天子之宰下至鄰國之卿茍有識者皆疑怪遜謝而魯人並無一語及於成王之賜以自解愚按破明堂位成王賜魯以天子禮樂之說自劉敞始以史角之事為據至木訥述用之甚眀石林與止齋參考之甚備故悉錄於此眀堂位之說出於漢儒在秦書吕覽之後其不足據亦眀矣但木訥三望之說主岱濟淮以魯言也恐不若戴岷隱謂魯僣用天子禮國居東方親祭泰山濟水而望祭西南北三方之山川其理尤白繁弱弓名繁音槃秋七月冬杞伯姬來求婦木訥曰五年杞伯姬來朝其子今又来求婦杞亦有君乎何朝覲婚姻皆出扵婦人也伯姬亦悍哉秋圍衛十有二月衛遷于帝丘齊侯城楚丘以遷衛盖三十年矣齊威未没狄已侵衛僖十三年之役是也至十八年二十一年又侵伐之今又整兵而圍之衛不得已遷帝丘以避晉文不救盖已衰矣眀年而即世愚聞之先師曰衛益遷而西也帝丘顓頊之故地去楚丘又二百里三十有二年春王正月夏四月己丑鄭伯捷卒文公也立四十五年卒捷公羊作接衛人侵狄秋衛人及狄盟狄有亂衛侵之狄請平焉眀年晉又敗狄于箕自是衛無狄患者十餘年冬十有二月己卯晉侯重耳卒文公生十有七年而出奔在外十有九年而入國入國五年而覇一戰勝楚再朝王所𫝊之襄公悼公平公定公皆能嗣其業以宗諸侯天下賴晉垂二百年使齊威既没而不有晉天下胥而為夷矣故覇業惟齊為盛惟晉為乆惟齊威晉文為可以言覇世稱五覇者非也覇之為言王室既衰方伯出而攘夷狄以安中國齊威晉文是也宋襄狂愚戕中國而結夷狄覇之反也秦穆楚莊以夷狄而脅中國覇之變也皆不可言覇也覇惟齊晉安有五哉故孔子扵春秋言其事則齊桓晉文盖春秋之世主之者齊威晉文耳孟子勸時君行王道其力詆桓文者有為之言也後之讀春秋者弗察也凡威文之功皆指以為威文之罪嗚呼獨不觀威公未覇天下之亂為如何威公覇而天下定矣威公甫没天下之亂又如何文公覇而天下又定矣此春秋之世生民倚之為司命周之宗社所恃以不泯不滅而顧以為罪可乎特其行事皆出智力茍焉隨世以就功名而世習既漓諸侯卿大夫之殺奪僣竊者終不可盡禁故孔子作春秋筆削以裁之曰其義則某竊取之爾三十有三年春王二月秦人入滑秦穆公千里襲鄭事不成而中道滅滑齊侯使國歸父來聘魯自僖公二十六年伐齊取穀至二十八年公子遂始如齊越今五年齊始聘魯或謂此報聘也或謂晉文方没諸侯無所適從而締交也或謂晉文既没齊恃強欲主盟而修舊好也皆未知然否夏四月辛巳晉人及姜戎敗秦師于殽初秦晉同圍鄭秦私及鄭盟為置戍扵鄭反又私約其戍為内應而千里潜師以襲鄭知鄭有備滅滑而還滑北鄰扵晉者也原軫於是勸晉襄公邀于殽敗之匹馬隻輪無返孫氏曰晉文卒未逾年秦由僻陋乗中國之無伯越數千里以伐鄭其無晉也甚矣書曰敗秦師所以甚秦之惡而與晉之勝也髙氏曰秦輙興兵以加中國既入滑又伐鄭秦亦張矣楚患未已而加之秦中國則殆矣書曰敗秦所以惡秦而予晉之勝也夾漈鄭氏曰襄公之不替霸自殽之役始晉之終於伯亦自殽之役始愚按諸家多罪晉襄負秦納晉文之恩及罪其居憂而興戎先師王貫道嘗言釁自秦啓曲不在晉使襄公懐先世之恩及拘尋常則晉不可繼霸而秦横矣癸巳葬晉文公勝秦而歸乃葬猶不失五月而葬之禮狄侵齊左氏曰因晉喪也東萊曰文公一死便來侵撓春秋時若非覇主時復整頓如何成中國公伐邾取訾婁秋公子遂帥師伐邾杜氏曰魯亦因晉喪以陵小國髙氏曰升陘之敗十餘年此年因晉喪而報之岷隱曰升陘之敗魯固怨邾然君取其邑臣伐其國報亦甚矣木訥曰僖公在位三十有三年敗邾者三親伐邾取邾邑者二又以公子遂帥師伐之邾本魯附庸自列五等為諸侯不屈扵魯故必欲服邾邾終不服也晉人敗狄于箕左氏謂狄伐晉及箕晉敗之于箕然則此亦乘晉之喪而晉襄再勝外侮也岷隱曰狄為中國患至甚前此未有敗狄者晉實始敗狄于箕獲白狄子此郤缺之雋功也木訥曰狄自伐邢之後至是垂四十年矣諸侯無小大皆受其毒不敢以一矢加之前年衛不忍其虐而侵之狄屈而求盟焉今又侵齊齊不能討伐晉晉敗之故其後屢侵齊而不敢犯晉則知制夷狄果不可以示怯也冬十月公如齊十有二月公至自齊今年春齊使國歸父来聘臧文仲勸公朝齊謂親有禮社稷之衛也故今公如齊然報聘而親之似過矣乙巳公薨于小寢小寢燕寢也路寢為正寢隕霜不殺草李梅實岷隱曰皆時燠之災也晉人陳人鄭人伐許左氏曰討其貳於楚也木訥曰晉文之覇獨許不至温之㑹以諸侯圍之然卒不至故翟泉之盟許亦不與今襄公以三國伐之而許終不服盖恃楚也僖公扵十二公之中見稱賢君者也然世之稱其賢者以詩有僖公之頌而穀梁釋春秋書不雨為公之閔雨書雨為公之喜雨也然頌乃臣子頌禱之辭皆無其實春秋書雨書不雨者特以其閔民事而書後之讀春秋者因詩有頌以賢待公而意其為閔雨喜雨爾亦豈有其實也哉若其滅項伐邾取須句取訾婁取濟西田以楚伐齊及夫人姜氏㑹齊侯于陽穀皆其不賢之實而始僣禮卜郊則春秋所書尤不賢之大者也詩人反以郊為誇尚可以詩頌為據而意度春秋之書雨書不雨為褒也耶木訥趙氏以詩頌其美而春秋載其失也折衷而為之說曰僖公中材庸主也其先任公子友則賢其後任公子遂則否天下有覇主則僖有以自固中國無覇主則僖無以自立方齊威之覇也服強楚定王室僖嘗與其功及宋襄之敗也楚人盟于齊盟于薄公亦與其辱方晉文之未興也僖以楚師伐齊為楚人戍衛實䝉惡名及晉文之既興也兩㑹諸侯兩朝王所亦獲善譽初任公子友也敗莒于酈以責保慶父之罪如齊涖盟以來與伐楚之功友之如齊以修事覇主之禮此雖出於友而僖實享其榮終之任公子遂也乞師于楚以伐鄰國帥師入杞以虐小邦如京師而遂如晉則不忠扵周既取邑而又伐鄰則納君于惡此雖出扵遂而公亦䝉其罪因是知僖公為中人也其他閨門不肅而夫人㑹齊侯于卞季姬遇鄫子于防典禮不經而用禘致夫人免牲猶三望此又中人之徳性有所不至智有所不及者也愚謂木訥折衷之論也録之以俟來者考焉黄氏日抄卷九
