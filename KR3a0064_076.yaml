  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0064_WYG_076-1a, image: WYG0708/WYG0708-0770c.png}
body:
  text: 黃氏日抄卷七十六宋黃震撰申明七撫州兼江西提舉咸淳八年八月十一日交印申御史臺斷吉州郭劉吉妄欣陳成狀照對郭劉吉經御史臺訴陳層五名成三經刺配故正事雖止作閙致奉臺判決脊刺旗押充邉軍今靣審乃不曽配一且不曽三於何有然事準臺判得實方可回申勒詞幹郭劉吉將陳成當廳對衆視驗靣上有無字迹背上有無杖痕責狀明説有無分曉訖却施行尋勒郭劉吉當廳對衆視驗陳層五有無字迹杖痕責據郭劉吉供析奉書判更供背上有杖痕只一句尋再責郭劉吉供述奉書判若用藥脫了須有痕迹皮不全仰再供只今不伏送勘續又據郭劉吉供及針筆匠鄧喜雜職黃亮供陳層五即無字迹杖痕奉書判郭劉吉經御史臺訴陳成三經刺配今當廳將陳成眷視靣上無字迹有針筆匠責驗狀訖脊上無杖痕有杖直責驗狀訖郭劉吉已責狀説靣上無字却又説背上曽受杖被其用藥脫去世有用藥脫靣上之字者矣未有用藥脫背上之痕者也字本無痕因用藥尚且有痕杖本有痕安得因用藥反更無痕郭劉吉不由次第官司敢經御史臺脫訴以不曽受杖之百姓為三經刺配之吏人一黥未足以盡其欺罔之罪姑與從輕勘杖一百陳成是百姓放令自便回申御史臺照會須至具申申臺并戶部戴槐妄欣狀照對陳定甫有田二十六契典在戴槐家咸淳四年以後經官取贖初詞在縣止乞勒戴槐照契領錢放贖其後有馬仲者教以官會紐錢前政方運判以前後所立之契並寫典錢即無以會紐錢之説且謂楮幣之行朝廷之法其他入納斷斷乎皆不可違獨民間自行交易一項參之人情元是見錢典者以見錢贖元是官會典者以官會贖錢會中半者以錢會中半贖正恐姦民借此為昏賴之計官慿文書陳定甫豈應以虛詞求勝其後陳定甫無錢取贖徒以會價之説劫持官司方運使遂將教唆人馬仲斷配訖陳定甫再經部脫詞今任鍾運使施詳元案再行審訂所斷與方運使元斷一同陳定甫又復經御史臺送本司贖田且經刑部送本司訴本府及漕司元承行人吏云有乞取吏人乞取固是常情然本司前政已曽追到吏卒金仁傑鄒俊并詞人所指見證過付人胡清宋子武秦百六今來勒與詞人供對不惟吏人不認而所謂見證人並稱無之要之贖田小事又陳定甫訟而失理未必有大錢行賂不過因本府運司皆以其詞為非故借訴吏人以泄忿耳此事之枝莭也正事只在贖田贖田合照元約元約是錢只合還錢何必經臺經部訴帥府訴運司空為多事如此哉訴吏之事見證人以為無官司不可強以為有已追到人并牒還各司聽候示詞人陳定甫且理正事且照元約齎見錢到本司當與取贖陳定甫之錢朝以到則戴槐之典業夕當還陳定甫之錢夕以到則戴槐之典業朝當還對衆當廳兩相分付甚徑事也陳定甫若不肯行正路必欲以竒計設疑兵打空陳子嬉不過又經臺經部添訴提舉司如前日訴運司而已本司却亦換爾心腸不得惟有聽之而已陳定甫戴槐並照元監齎錢贖田先回申御史臺及刑部照應仍牒報運司次據陳定甫入到事狀呈奉書判元詞欲贖田者陳定甫也陳定甫既於久訟之後自悔無益欲與元典業主戴槐戴仁傑父子自行議贖不敢再有紊煩官司亦何幸如之大凡贖田本是親舊鄰里暫且交易之事不得已而後有爭今爭既無益徒然彼此淘汰而欲仍舊在私自為區處則他人不必再追問矣聽從其便回申御史臺照應須至具申按新城縣令蹇雄申省狀照對八月十一日交領提舉司職事據欄轎狀訴建昌軍新城縣官吏料抑義米乞取不法事本司繼即追到縣吏饒恭陳興據供去年六月十一日知縣將米一千石市斗付船戶趙生等裝載出縣界外發糶得官會一萬五千貫裝發綱解及施照本軍徐通判元申本司去年六月黎中言等正訴上件事則指為移糶義米且謂以官價平糶於本縣者止三十餘斛以時價私糶於境外者乃八百餘斛此事縱如縣吏之供錢充綱解是亦荒年奪民之食於理已甚不可矣又據饒恭陳興供知縣每遇人戶納義米除正數外每石再收一斗作知縣食利米納宅庫支用是既有官收之義倉又有私收之義倉於法又大不可矣其他據供繳由錢録牌錢銷號錢以應副知縣科買及日逐納宅市買及供曽買綿三十把鄉民支錢反以綿租為名禁之於獄終不還分文者皆其細也不敢一一縷瀆公朝之聽竊見從事郎特差充建昌軍新城縣令蹇雄雖小有才既貪且暴去歲當飢荒之時敷抑鄉落大興花園青册催科每取十貫巡卒四擾於鄉落民不堪命至有橫村等處哨聚抗拒雄捕獲數內曽四三一名先用火炮繼浸渠塘人既困頓乃脫申本軍乞差劊子下邑斬首郡守謹審不從適迹決官至釋之出獄即死此人既死鄰黨澒洞雄又飛申本軍請兵勦殺牌遞旁午張皇萬狀反欲覬覦收捕之功以為欺罔免削之舉郡守遣人體實知其不然鎮以安靜徐為榜諭民始釋疑若郡守不善處之一邑生靈之命當何如哉然亦自此官民相疑上三鄉至今關結不受官司約束貪暴之弊關係如此及某今次發覺追吏之後乃有本縣饒倫等三十七人到司舉留知縣某喚之近案問以誰實使來衆皆語塞即令當廳實供乃稱知縣使宅庫丁定脅使縣市諸行每家出錢一貫每行遣人二名又買使久居縣前打話公事人饒倫為引領投狀以冀解釋雄之作偽心勞有如此者某除已將縣吏饒恭陳興等斷遣外惟是鄉民尚有未安之心則縣令無復可留之理所合托實具申欲望公朝特賜敷奏將雄放罷施行咸淳八年嵗終特薦州縣官申省狀某須叨誤渥暫攝常平當歲終有會之時莫切於考實人牧之事深惟人才生生不息無不自小官而獲進用亦無不自長吏而獲轉聞某自領事以來早夜詢訪合江西一路先得六十人其間固亦有科甲前名已經録用者今此分倅諸郡果有政績雖知僣越理不敢不并以名聞通判如隆興府熊震龍之通暢精明羅大椿之老成純厚滕岩瞻之開爽溫雅吉州余東之清介練歷何夢桂之明暢廉靜撫州黃與仁之端重明練吕圻之學行端方贑州曽大發之操修嚴正有守建昌軍塗演之勤敏多惠皆二郡而有其實者也教授如袁州李漸之士論歸重吉州程申之之操修端謹瑞州林永年之端凝和粹南安軍黃明豐之素行純實臨江軍余世昌之醇茂有文建昌軍周三異之端重粹明章又新之簡重朴實皆分教而有其實者也判官如瑞州丘富國之詳明正直臨江軍陳琥之明練勤敏撫州李龍金之端靖詳明江州陶應元之端方公正皆贊畫而有其實者也録參如瑞州邢桐孫之明練有才如隆興熊應申之詳明得譽江州張杲之惻怛詳審瑞州楊承翁之通暢辦事臨江軍張自之敏捷文華皆治獄而有其實者也司戶如瑞州劉應桂之勤敏適用司法如南安黃塈之公廉有守皆為郡僚而有其實者也至若親民尤莫急於縣而試吏尤莫難於縣豐城凋邑也黃吳老為之踰年賦役俱平紀綱大振吉水劇邑也鄭聞孫為之踰年政役備修精采頓異興國荒邑也窮鄉頑拒不受政役何時為之數月聲聞立起於素不率化之鄉立之師以教其子弟民知向化瑞金窮邑也流民搶掠謂之出甲田子鎮為之數月勸誘有方有罪以種桑聽贖爭役以種桑多寡為先後民知務本南豐頑民嘗殘燬之邑也楊休撫定其亂再造此邑四年之久一方懾服如楊眉孫宰髙安公介清勤徐思諶宰上髙廉勤平易翁仲德宰永新不畏疆禦黃桂宰南康才略優裕張鈜宰靖安廉整有條汪孰宰萬安和平安靖胡岩如宰進賢正直安詳陳自然宰奉新嚴肅整齊黃公立之宰雩都詳明振職洪汸之宰安逺詳重得體凡皆作邑有聲尤不容不薦縣丞則進賢有吳君召分寧有郭巨用皆究心水利措置有方樂安有黃申明潔無私廬陵有羅鈞端實有才主簿則危順吉在豐城以材華稱董殊在吉水以賢廉稱趙崇訋在崇仁以和平稱趙崇在宜黃以廉謹稱趙畤夫在南城以廉靖歷練稱縣尉則王應龍在進賢以才幹稱趙必在大治以廉明稱羅可權在寧都以才美稱羅應新在清江以俊拔稱袁端祥在湖口以才廉稱陳子升在南城以清俊稱喻元在髙安以才諝稱何晉在上髙以廉能稱婁南良在萬載莫雷顯在通山皆以廉謹有志稱凡皆筮仕有立亦不容於不薦某智識不明聞見不廣獨以平生鄙見謂天下事非得人才不可人才非自小官時察之不可偶因兼權常平司職事適當歲終謹以采之衆論者申聞如右欲望公朝特賜敷奏以備他日選用之數又嵗終劾官狀照對某暫攝常平毫髮無補僣以嵗終有會之法類申本路同官之賢間有不才亦宜汰去姑先最者以警其餘袁州萬載縣丞石應雷貪暴非一嘗檢校彭祥甫家卑幼業勒取錢三千貫勒賣卑幼業人每田百把取錢百貫為廳子袁晉等過付反違法自擅沒田入縣學以掩衆議卑幼者其何辜吉州安福縣主簿權縣事趙必㒡亦貪非一嘗與寄居揚州趙司户及前撫州趙司户相朋為姦每斷鎖一人取錢五十貫僉狀一紙每收錢一貫其茍賤如此及多差吏卒入鄉行劫民不聊生吉州廬陵縣尉趙必濘每一下鄉擾民無藝嘗以其親戚姓江人同行公事諧價必以姓江人任責凡此三人皆無顧藉如蒙公朝特賜敷奏將各官放罷庶幾民怨稍伸內石應雷趙必㒡遇赦未許放行參注伏候指揮黃氏日抄卷七十六
