body:
  text: 黃氏日抄卷二十三宋黃震撰讀禮記十祭法第二十三祭法有虞氏禘黃帝而郊嚳祖顓頊而宗堯夏后氏亦禘黃帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王帝嚳堯父顓頊舜祖冥契六世孫禘者禘其祖之所自出郊者郊天以其太祖配祖者祖有功宗者宗有德然周之文王本以德武王本以功又孝經云宗祀文王與此不同江陵項氏曰此經生用其師說推次而上非必有明文可據禮記文體如此者多如有虞氏官五十夏百殷二百周三百亦是以數相推考實難矣天台賈氏曰堯禪舜舜禪禹其禪一也虞既宗堯夏乃不宗舜舜生於瞽瞍禹生於鯀其生一也夏既郊鯀虞乃不郊瞽瞍虞夏商所祖者廟之太祖周所祖者乃不以廟之太祖后稷而以文王意各以義起集燔柴於泰壇祭天也瘞埋於泰折祭地也用騂犢折之設反泰壇南郊之壇也泰折北郊之坎也壇以圓而髙為言折以方而深為言燔柴升而明天道也瘞埋藏而幽地道也牲則用騂犢陳氏方氏埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宫祭日也夜明祭月也幽宗祭星也雩宗祭水旱也四坎壇祭四方也山林川谷丘陵能出雲為風雨見怪物皆曰神有天下者祭百神諸侯在其地則祭之亡其地則不祭相近鄭音禳祈橫渠如字見賢遍反亡音無昭明也泰昭者祭四時之壇名相近鄭氏改為禳祈方氏謂孔叢子作祖迎橫渠讀如字王宫夜明以下皆所祭壇名眉山孫氏曰四時也寒暑也日也月也星辰也水旱也孔安國指為書之禋于六宗孔子嘗以此答宰我事見孔叢子橫渠張氏曰日月星辰風雨寒暑無特祭皆從祀於郊所謂日於壇月於坎日於東月於西皆不出祀之兆言王宫夜明幽宗之類皆指其祭位爾寒暑無定暑近日壇寒近月坎故曰相近於坎壇祭寒暑也注謂相近為禳祈者非方氏曰四方者四方萬物之神故有坎有壇而合以四焉集大凡生於天地之間者皆曰命其萬物死皆曰折人死曰鬼此五代之所不變也七代之所更立者禘郊祖宗其餘不變也五代謂黃帝虞夏商周七代通數顓頊及嚳鄭氏天下有王分地建國置都立邑設廟祧壇墠而祭之乃為親疏多少之數是故王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止去祧為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠曰鬼諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠為鬼大夫立三廟一壇曰考廟曰王考廟曰皇考廟享嘗乃止顯考祖考無廟有禱焉為壇祭之去壇為鬼適士二廟一壇曰考廟曰王考廟享嘗乃止顯考無廟有禱焉為壇祭之去壇為鬼官師一廟曰考廟王考無廟而祭之去王考為鬼庶士庶人無廟死曰鬼適丁厯反建國封諸侯也置都立邑為卿大夫采地及賜士有功者之地也廟貌也象先祖之貌也祧超也超出廟貌之上也封土曰壇除地曰墠考成也謂有成德之美也父廟曰考王君也尊於父者也祖廟曰王考皇大也尤尊者也曾祖廟曰皇考顯者髙而在上之義也髙祖廟曰顯考祖始也始祖廟曰祖考廟皆月祭之既祧則時祭之去祧而為壇為墠惟有禱而後祭之去墠為鬼鬼則歸於無迹矣薦而不祭自天子降殺以兩至庶人無廟死惟曰鬼則饗於寢凡皆注疏依本文之說如此長樂陳氏曰祭法言天子至士立廟之制多與禮異其言壇墠等威之辨理或有之秦溪楊氏曰祭法與王制不同王制天子三昭三穆與太祖為七廟祭法則序四親二祧王制諸侯二昭二穆為五廟祭法則序三親月祭其髙太二廟特時祭之王制大夫三廟有太祖祭法無太祖王制士一廟祭法分適士二廟官師一廟祭法有壇有墠王制無之祭法有王考皇考顯考祖考之稱王制無之又按三壇同墠出於金縢乃因有禱而為之非宗廟之外預為壇墠以待他日之禱孝經為之宗廟以鬼享之亦非去墠始為鬼晉張融謂祭法去祧為壇去壇為墠去墠為鬼皆衰世之法則所言難以盡信集王為羣姓立社曰大社王自為立社曰王社諸侯為百姓立社曰國社諸侯自為立社曰侯社大夫以下成羣立社曰置社大夫以下謂下至庶人共立社今里社是鄭氏王為羣姓立七祀曰司命曰中霤曰國門曰國行曰泰厲曰户曰竈王自為立七祀諸侯為國立五祀曰司命曰中霤曰國門曰國行曰公厲諸侯自為立五祀大夫立三祀曰族厲曰門曰行適士立二祀曰門曰行庶士庶人立一祀或立户或立竈司命主督察中霤主堂室厲主殺罰儀禮士禱五祀與此亦不同鄭氏輔氏王下祭殤五適子適孫適曽孫適𤣥孫適來孫諸侯下祭三大夫下祭二適士及庶人祭子而止適丁厯反𤣥孫之子為來孫方來未已也祭殤止適方氏應氏夫聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大菑則祀之能捍大患則祀之是故厲山氏之有天下也其子曰農能殖百穀夏之衰也周棄繼之故祀以為稷共工氏之霸九州也其子曰后士能平九州故祀以為社帝嚳能序星辰以著衆堯能賞均刑法以義終舜勤衆事而野死鯀鄣鴻水而殛死禹能修鯀之功黃帝正名百物以明民共財顓頊能修之契為司徒而民成冥勤其官而水死湯以寬治民而除其虐文王以文治武王以武功去民之菑此皆有功烈於民者也及夫日月星辰民所瞻仰也山林川谷丘陵民所取財用也非此族也不在祀典厲山氏炎帝也即神農起烈山或曰烈山氏夏末湯大旱七年變置社稷始廢農祀棄棄后稷名也共工在太昊炎帝之間共財謂散民取百物以自贍族猶類也鄭氏孔氏祭義第二十四祭不欲數數則煩煩則不敬祭不欲疏疏則怠怠則忘是故君子合諸天道春禘秋嘗霜露既降君子履之必有悽愴之心非其寒之謂也春雨露既濡君子履之必有怵惕之心如將見之樂以迎來哀以送往故禘有樂而嘗無樂數色角反愴初亮反合天道謂不數不疏春秋祭祀以時思之也履霜露而有悽愴之心此秋所以有嘗履雨露而有怵惕之心此春所以有禘禘者陽之盛其祭主飲以求諸陽故以迎來為主而有樂以迎來嘗者隂之盛其祭主食以求諸隂故以送往為主而不用樂樂以迎來樂其親之將來也哀以送往哀其享否不可知也集孔氏慕容氏晦庵及鄭氏說致齊於內散齊於外齊之日思其居處思其笑語思其志意思其所樂思其所耆齊三日乃見其所為齊者耆音嗜程氏謂此平日思親之心非齊也齊不容有思愚意齊之言齊也齊者致一也齊而一於思親則外事絶矣此其祭親而可與親之神靈接也思親不害於為齊也若謂齊不可有思其論雖精然恐鄰於莊子心齊之說後世竊之為禪學者也程氏講明正學而門人多流於禪往往多附益之學者宜謹孔子云祭思敬補祭之日入室僾然必有見乎其位周還出户肅然必有聞乎其容聲出户而聼愾然必有聞乎其嘆息之聲僾音愛愾開代反周還出户謂薦設時出户而聼謂闔户時僾然肅然愾然蓋誠之不可掩所謂如在其上如在其左右鄭氏輔氏是故先王之孝也色不忘乎目聲不絶乎耳心志嗜欲不忘乎心致愛則存致慤則著著存不忘乎心夫安得不敬乎色不忘乎目常若承顔聲不絶乎耳常若聼命心志嗜欲不忘乎心事死如事生事亡如事存也著存則洋洋乎如在其上如在其左右安得不敬乎用方氏修君子生則敬養死則敬享思終身弗辱也君子有終身之喪忌日之謂也忌日不用非不祥也言夫日志有所至而不敢盡其私也此言忌日以喪禮處之不用不舉事也非以其日之不祥而不用也極思念親不敢盡其私情以營他事也本孔氏說唯聖人為能饗帝孝子為能饗親饗者鄉也鄉之然後能饗焉是故孝子臨尸而不怍君牽牲夫人奠盎君獻尸夫人薦豆卿大夫相君命婦相夫人齊齊乎其敬也愈愈乎其忠也勿勿諸其欲其饗之也鄉許亮反相息亮反齊如字又子禮反尸謂祭祀之尸怍愧色也牽牲將薦血毛盎者盎齊謂酒也薦豆以豆實韭菹醢而薦之也齊齊整齊貌愈愈和恱貌勿勿慤愛貌其皆語助此章援聖人之饗帝以重孝子之饗親因明饗之言鄉中心鄉之乃能致其來饗唯聖人為能饗帝仁人之心與天地一也唯孝子為能饗親孝子之心與父母一也皆以其心饗之也君牽牲而夫人奠盎以副之君獻尸而夫人薦豆以助之此見夫婦相須以成而婦人唯酒食是議共祭祀其職也卿大夫則相其君命婦則相夫人內外協心又各盡其誠敬焉補文王之祭也事死者如事生思死者如不欲生忌日必哀稱諱如見親祀之忠也如見親之所愛如欲色然其文王與詩云明發不寐有懷二人文王之詩也祭之明日明發不寐饗而致之又從而思之祭之日樂與哀半饗之必樂已至必哀如不欲生思親之深如欲隨之而死也忌日必哀所謂終身之喪也稱諱如見親所謂聞名心瞿也如見親之所愛如見親之有愛於己如欲色然如欲承順父母之顔色也明發不寐謂夜而至旦有懷二人謂思父母此小雅幽王之詩今指為文王者斷章取義詩人陳文王之德以刺幽王是亦可名文王之詩也饗而致之臨祭也又從而思之既祭也饗之必樂者久慕而幸得其來已至必哀者感慨而且思其去鄭氏孔氏方氏輔氏仲尼嘗奉薦而進其親也慤其行也趨趨以數已祭子贛問曰子之言祭濟濟漆漆然今子之祭無濟濟漆漆何也子曰濟濟者容也逺也漆漆者容也自反也容以逺若容以自反也夫何神明之及交夫何濟濟漆漆之有乎反饋樂成薦其薦爼序其禮樂備其百官君子致其濟濟漆漆夫何慌惚之有乎夫言豈一端而已夫各有所當也趨音促數色角反漆音切慌况往反一音荒惚音忽當丁浪反嘗秋祭也親謂身親執事慤與趨趨言少威儀數之言速也濟濟漆漆者威儀之多與慤與趨趨相反者也反饋謂進熟樂成謂合樂薦爼謂薦牲體之爼君子謂助祭之人慤與趨趨孝子奉祭之誠其儀少濟濟漆漆賔客助祭之容其儀多子貢誤認夫子平日之言以濟濟漆漆為奉祭者故夫子析以告之如此補孝子將祭慮事不可以不豫比時具物不可以不備虛中以治之宫室既修牆屋既設百物既備夫婦齊戒沐浴盛服奉承而進之洞洞乎屬屬乎如弗勝如將失之其孝敬之心至也與薦其薦爼序其禮樂備其百官奉承而進之於是諭其志意以其慌惚以與神明交庶或饗之庶或饗之孝子之志也比必利反洞音動勝音升也與音餘比時及時也洞洞幽深屬屬連續皆言孝敬不忘之意諭其志意謂祝以孝告庶或謂不敢必補孝子之祭也盡其慤而慤焉盡其信而信焉盡其敬而敬焉盡其禮而不過失焉進退必敬如親聼命則或使之也或使之謂如親聼父母之命而父母或使之也孔氏孝子之祭可知也其立之也敬以詘其進之也敬以愈其薦之也敬以欲退而立如將受命已徹而退敬齊之色不絶於面孝子之祭也立而不詘固也進而不愈疏也薦而不欲不愛也退立而不如受命敖也已徹而退無敬齊之色而忘本也如是而祭失之矣詘求勿反敬齊如字立之者方待事而立進之者既從事而進薦之者言奉物而薦詘形容喜貌愈顔色和貌欲婉順貌立而不詘以其恃親故謂之固進而不愈以其憚親故謂之疏薦而不欲若不得已而薦者是謂不愛其親立也進也薦也皆當有恱慕意而皆以敬為本雖既祭而退猶不忘用鄭氏孔氏陸氏修孝子之有深愛者必有和氣有和氣者必有愈色有愈色者必有婉容孝子如執玉如奉盈洞洞屬屬然如弗勝如將失之嚴威儼恪非所以事親也成人之道也奉芳勇反自有深愛以下皆言愛自如執玉以下皆言敬所謂愛敬盡於事親愛敬者常不失孺子之心嚴威儼恪者乃成人之道故非所以事親用方氏吕氏補先王之所以治天下者五貴有德貴貴貴老敬長慈幼此五者先王之所以定天下也貴有德何為也為其近於道也貴貴為其近於君也貴老為其近於親也敬長為其近於兄也慈幼為其近於子也是故至孝近乎王至弟近乎霸至孝近乎王雖天子必有父至弟近乎霸雖諸侯必有兄先王之教因而弗改所以領天下國家也王古注于况反鄭氏曰言治國有家道項氏曰近王近霸禮記此類雖似可疑然皆古之遺言先儒口相授其中多義訓不可忽集子曰立愛自親始教民睦也立敬自長始教民順也教以慈睦而民貴有親教以敬長而民貴用命孝以事親順以聼命錯諸天下無所不行親其親長其長而天下平補郊之祭也喪者不敢哭凶服者不敢入國門敬之至也祭吉禮不欲聞見凶人鄭氏祭之日君牽牲穆答君卿大夫序從既入廟門麗于碑卿大夫袒而毛牛尚耳鸞刀以刲取膟膋乃退爓祭祭腥而退敬之至也袒徒旦反膟音律膋力雕反爓音燖穆子姓也答對也君牽牲子姓對君共牽牲以示父子合敬而致其力也麗繫也繫牲中庭之碑將殺牲也毛牛尚耳者耳主聼故尚耳毛欲使神聼之也膟膋血與腸間脂也湯肉曰爓爓祭祭腥者祭爓肉腥肉也鄭氏方氏孔氏郊之祭大報天而主日配以月夏后氏祭其暗殷人祭其陽周人祭日以朝及暗主日者以其光明天之神可見者莫著焉也祭其暗昏時祭隂祭其陽日中祭也祭日日間祭也朝及暗者終日行事用鄭氏方氏修祭日於壇祭月於坎以别幽明以制上下祭日於東祭月於西以别內外以端其位日出於東月生於西隂陽長短終始相巡以致天下之和别彼列反巡古讀為㳂然如字亦通日為明月為幽壇在上坎在下日為陽在外月為隂在內屬乎陽者皆長屬乎隂者皆短一長一短終則有始相巡而未始相絶故足以致天下之和方氏天下之禮致反始也致鬼神也致和用也致義也致讓也致反始以厚其本也致鬼神以尊上也致物用以立民紀也致義則上下不悖逆矣致讓以去爭也合此五者以治天下之禮也雖有竒邪而不治者則微矣去起吕反竒紀宜反致之言至使人勤行至於極也致反始奉郊社致鬼神祭宗廟致和用足衣食致義制事之宜致讓教民之遜五者立雖有竒異邪僻不治者亦少矣鄭氏孔氏方氏宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也衆生必死死必歸土此之謂鬼骨肉斃于下隂為野土其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也因物之精制為之極明命鬼神以為黔首則百衆以畏萬民以服隂古音蔭鬼歸也隂之為神伸也陽之為氣謂呼吸出入者魄謂耳目形體者神形相合人所以生今雖人死故必聚合鬼神以制祭祀之禮而事之其為教也至矣死而骨肉䕃為野土者即其生時之魄而鬼之謂也死而其氣發揚為昭明者即其生時之氣而神之謂也此蓋因上文之鬼神而申明之焄香臭也蒿氣蒸出貌也百物之氣蒸而上出焄蒿者其狀悽愴者其情也人氣之發揚於上為昭明百物之精氣為焄蒿悽愴是神之至著者也聖人因人與物死之精靈制為尊極之名稱謂之鬼神為民作法使民亦事其祖禰鬼神無不畏服也然黔首者秦所以名其民此云宰我之言當考用鄭氏孔氏修聖人以是為未足也築為宫室設為宗祧以别親疏逺邇教民反古復始不忘其所由生也衆之服自此故聼且速也宫室謂廟之宫室宗親而邇者祧疏而逺者方氏二端既立報以二禮建設朝事燔燎羶薌見以蕭光以報氣也此教衆反始也薦黍稷羞肺肝首心見間以俠甒加以鬱鬯以報魄也教民相愛上下用情禮之至也見以之見見間之見古注作覸今並如字俠古洽反甒音武二端氣為神魄為鬼也二禮朝事報氣薦黍稷報魄也朝事謂朝而事之羶天産之臭薌地産之臭染蕭以膟膋故有羶合蕭以黍稷故有薌蕭與膟膋黍稷并合而見故曰見以蕭光光猶氣也凡此皆以臭為主而臭為陽故曰報氣氣以陽生而有所始故曰教衆反始也黍稷以器盛而進故曰薦肺肝首心又各致其美故曰羞甒有兩故曰俠諸物見於俠甒之間故曰見間而又加之以鬱鬯之彛凡此皆以味為主而味為隂故曰報魄魄以隂聚而有所愛故曰教民相愛也報氣求陽是用情於上報魄求隂是用情於下二禮之報至此無以復加故曰上下用情禮之至也方氏君子反古復始不忘其所由生也是以致其敬發其情竭力從事以報其親不敢弗盡也如上報氣報魄皆報親之事方氏是故昔者天子為藉千畝冕而朱紘躬秉耒諸侯為藉百畝冕而青紘躬秉耒以事天地山川社稷先古以為醴酪齊盛於是乎取之敬之至也藉藉田先古謂先祖若先聖先師醴甘酪酸方氏古者天子諸侯必有養獸之官及歲時齊戒沐浴而躬朝之犧牷祭牲必於是取之敬之至也君召牛納而視之擇其毛而卜之吉然後養之君皮辨素積朔月月半君巡牲所以致力孝之至也始養言獸召而視之言牛巡言牲犧言色之純牷言體之完躬朝之者謂人君齊戒沐浴躬受養獸官之朝山隂陸氏古者天子諸侯必有公桑蠶室近川而為之築宫仞有三尺棘墻而外閉之及大昕之朝君皮辨素積卜三宫之夫人世婦之吉者使入蠶于蠶室奉種浴于川桑于公桑風戾以食之歲既單矣世婦卒蠶奉繭以示于君遂獻繭于夫人夫人曰此所以為君服與遂副禕而受之因少牢以禮之古之獻繭者其率用此與及良日夫人繅三盆手遂布于三宫夫人世婦之吉者使繅遂朱緑之𤣥黃之以為黼黻文章服既成君服以祀先王先公敬之至也禕音暉近川取浴蠶之便仞七尺又三尺髙一丈也大昕朔日之朝風戾風燥之也食謂飼蠶歲單謂三月月盡之後副首飾禕禕衣三盆手者親繅三盆以手振出其緒鄭氏孔氏君子曰禮樂不可斯須去身致樂以治心則易直子諒之心油然生矣易直子諒之心生則樂樂則安安則久久則天天則神天則不言而信神則不怒而威致樂以治心者也致禮以治躬則莊敬莊敬則嚴威心中斯須不和不樂而鄙詐之心入之矣外貌斯須不莊不敬而慢易之心入之矣故樂也者動於內者也禮也者動於外者也樂極和禮極順內和而外順則民瞻其顔色而不與爭也望其容貌而衆不生慢易焉故德輝動乎內而民莫不承聼理發乎外而衆莫不承順故曰致禮樂之道而天下塞焉舉而錯之無難矣樂也者動於內者也禮也者動於外者也故禮主其减樂主其盈禮减而進以進為文樂盈而反以反為文禮减而不進則銷樂盈而不反則放故禮有報而樂有反禮得其報則樂樂得其反則安禮之報樂之反其義一也塞充滿也此一節樂記文重出曽子曰孝有三大孝尊親其次弗辱其下能養公明儀問於曽子曰夫子可以為孝乎曽子曰是何言與是何言與君子之所謂孝者先意承志諭父母於道參直養者也安能為孝乎曽子曰身也者父母之遺體也行父母之遺體敢不敬乎居處不莊非孝也事君不忠非孝也涖官不敬非孝也朋交不信非孝也戰陳無勇非孝也五者不遂烖及於親敢不敬乎亨孰羶薌嘗而薦之非孝也養也君子之所謂孝也者國人稱願然曰幸哉有子如此所謂孝也已衆之本教曰孝其行曰養養可能也敬為難敬可能也安為難安可能也卒為難父母既沒慎行其身不遺父母惡名可謂能終矣仁者仁此者也禮者履此者也義者宜此者也信者信此者也强者强此者也樂自順此生刑自反此作此章明孝與養之别也衆之本教曰孝者孝為衆行之根本以此根本而教於下名之曰孝鄭氏曽子曰夫孝置之而塞乎天地溥之而橫乎四海施諸後世而無朝夕推而放諸東海而凖推而放諸西海而凖推而放諸南海而凖推而放諸北海而凖詩云自西自東自南自北無思不服此之謂也溥古音敷放甫往反無朝夕言常行無輟時也凖猶齊也言無不同也鄭氏晦庵曽子曰樹木以時伐焉禽獸以時殺焉夫子曰斷一樹殺一獸不以其時非孝也孝有三小孝用力中孝用勞大孝不匱思慈愛忘勞可謂用力矣尊仁安義可謂用勞矣博施備物可謂不匱矣父母愛之喜而弗忘父母惡之懼而無怨父母有過諫而不逆父母既沒必求仁者之粟以祀之此之謂禮終斷丁管反施始豉反惡烏略反庶人思父母慈愛忘己躬耕之勞可謂用力矣諸侯卿大夫士尊重於仁安行於義心無勞倦可謂用勞矣博施謂德教加於百姓刑于四海備物謂四海之內各以其職來祭此孔氏之說孝之小大各以其分言也於親生育之恩則思之而不忘於己奉養之力則忘之而不思故曰用力仁所以愛親義所以敬親愛敬盡於事親故曰用勞此方氏之說而說不及於不匱也博施則聖矣孝至於此則逹於天下四海九州之美味莫不備至故為大孝此葉氏之說而可以足方氏之說者也愚按孟子嘗謂舜為大孝未嘗有待於外者今此漢儒傳聞曽子之言以博施備物為大孝則有待於在外者而後為大非其餘人子所可預故孔氏以分之小大言之姑録其說俟來者擇焉鄭氏謂必求仁者之粟喻貧困猶不敢取惡人物以事亡親則其說精矣集樂正子春下堂而傷其足數月不出猶有憂色門弟子曰夫子之足瘳矣數月不出猶有憂色何也樂正子春曰善如爾之問也善如爾之問也吾聞諸曽子曽子聞諸夫子曰天之所生地之所養無人為大父母全而生之子全而歸之可謂孝矣不虧其體不辱其身可謂全矣故君子頃步而弗敢忘孝也今豫忘孝之道豫是以有憂色也一舉足而不敢忘父母一出言而不敢忘父母一舉足而不敢忘父母是故道而不徑舟而不游不敢以先父母之遺體行殆一出言而不敢忘父母是故惡言不出於口忿言不反於身不辱其身不羞其親可謂孝矣頃缺婢反方如字古注頃跬也一舉足為跬再舉足為步蓋改頃為跬方氏據荀子云行而俯頃非懾怯也因以頃為俯首一頃之間如其說則不必改字道大路徑邪徑游者浮水而渡忿言指在人之言也惟己之惡言不出於口故人之忿言亦不反於身也方氏昔者有虞氏貴德而尚齒夏后氏貴爵而尚齒殷人貴富而尚齒周人貴親而尚齒虞夏商周天下之盛王也未有遺年者年之貴乎天下久矣次乎事親也臣能世祿曰富未有遺年者言皆尚齒次乎事親者言事親之次尚齒為重補是故朝廷同爵則尚齒七十杖於朝君問則席八十不俟朝君問則就之而弟逹乎朝廷矣行肩而不併不錯則隨見老者則車徒辟斑白者不以其任行乎道路而弟逹乎道路矣居鄉以齒而老窮不遺强不犯弱衆不暴寡而弟逹乎州巷矣古之道五十不為甸徒頒禽隆諸長者而弟逹乎獀狩矣軍旅什伍同爵則尚齒而弟逹乎軍旅矣孝弟發諸朝廷行乎道路至乎州巷放乎獀狩修乎軍旅衆以義死之而弗敢犯也辟音避獀音搜君問則席命之坐也不俟朝君揖之即退不俟朝事畢也就之就其家也行肩而不併言肩隨而不併行也不錯則隨者錯鴈行參錯也父黨隨行兄黨鴈行不為鴈行之參錯則為隨行之陪從也車徒辟者乘車步行皆避老人也斑白者不以其任行乎道路謂少者為老者代其任也州巷者一鄉五州巷猶閭也甸徒者六十四井為甸軍田出役之法五十始衰不從力役之政也春獵為獀冬獵為狩此章因孝言弟孝弟之道無處不行故衆行孝弟雖死不敢犯之犯謂犯不孝不弟也用孔氏方氏祀乎明堂所以教諸侯之孝也食三老五更於大學所以教諸侯之弟也祀先賢於西學所以教諸侯之德也耕藉所以教諸侯之養也朝覲所以教諸侯之臣也五者天下之大教也食音嗣西學者西郊之學春朝秋覲禮行於此人得於彼而不知者乃教之至詳言教萬民而後及諸侯者化賤者易化貴者難也周氏馬氏食三老五更於大學天子袒而割牲執醬而饋執爵而酳冕而揔干所以教諸侯之弟也是故鄉里有齒而老窮不遺强不犯弱衆不暴寡此由大學來者也天子設四學當入學而大子齒執醬而饋進食也執爵而酳食後以酒滌口也冕而揔干親在舞位有樂侑食也四學者四郊之學也鄭氏天子巡守諸侯待于竟天子先見百年者八十九十者東行西行者弗敢過西行東行者弗敢過欲言政者君就之可也不敢過即上文所謂車徒辟陸氏一命齒于鄉里再命齒于族三命不齒族有七十者弗敢先七十者不有大故不入朝若有大故而入君必與之揖讓而后及爵者齒謂以年次立若坐也一命天子之國則下士諸侯之國則士也再命天子之國則中士諸侯之國則大夫也三命天子之國則上士諸侯之國則卿也一命與鄉人齒再命與族人齒三命雖族人不敢與之齒特坐賔東然亦不敢先族之七十者族有七十者先入此三命者後入年七十者入朝君先與之為禮而后揖卿大夫士鄭氏孔氏天子有善讓德於天諸侯有善歸諸天子卿大夫有善薦於諸侯士庶人有善本諸父母存諸長老祿爵慶賞成諸宗廟所以示順也薦進也成諸宗廟謂於宗廟命之鄭氏昔者聖人建隂陽天地之情立以為易易抱龜南面天子卷冕北面雖有明知之心必進斷其志焉示不敢專以尊天也善則稱人過則稱已教不伐以尊賢也卷音衮知音智立以為易作易也易抱龜者易官名也占易之官抱龜南面而立也天子雖有明智之心亦進而聼斷於龜示不敢專以尊敬上天也有善稱人又教在下不自伐其善以尊敬賢人也鄭氏孔氏孝子將祭祀必有齊莊之心以慮事以具服物以修宫室以治百事及祭之日顔色必溫行必恐如懼不及愛然其奠之也容貌必溫身必詘如語焉而未之然宿者皆出其立卑靜以正如將弗見然及祭之後陶陶遂遂如將復入然是故慤善不違身耳目不違心思慮不違親結諸心形諸色而術省之孝子之志也陶音遙如懼不及愛然若恐失愛於親也如語焉而未之然若有所以語諸親而未見答也如將弗見然祭事畢而退立如恐不得再見其親也如將復入然已祭而思慕之心少殺陶陶遂遂而自釋如親將復入也術述也省視也循述而省視之反覆不忘此孝子思念之志也凡此四段皆以父母平生言之所謂事亡如事存也用鄭氏孔氏修建國之神位右社稷而左宗廟社稷隂也故居右宗廟陽也故居左陳氏祭統第二十五凡治人之道莫急於禮禮有五經莫重於祭夫祭者非物自外至者也自中出生於心也心怵而奉之以禮是故唯賢者能盡祭之義賢者之祭也必受其福非世所謂福也福者備也備者百順之名也無所不順者之謂備言內盡於己而外順於道也忠臣以事其君孝子以事其親其本一也上則順於鬼神外則順於君長內則以孝於親如此之謂備唯賢者能備能備然後能祭是故賢者之祭也致其誠信與其忠敬奉之以物道之以禮安之以樂參之以時明薦之而已矣不求其為此孝子之心也祭者所以追養繼孝也孝者畜也順於道不逆於倫是之謂畜禮有五經謂吉凶賔軍嘉莫重於祭謂五禮以吉為首而祭者吉禮也非物自外至言非假他物實出於孝子之心也本於心之怵惕而後奉之以禮文此所以能盡祭之義而祭則受福也世所謂福者謂鬼神之祐賢者之所謂福者謂受大順之實其義一者言忠孝俱由順出也參之以時謂以時而祭明薦之而已矣不求其為者謂惟明潔以薦而不求其報為者謂福祐之報已也畜謂孝子順於德教不逆倫理可以畜養其親故釋孝為畜畜固有畜養之義亦有止而畜聚之義焉集鄭氏孔氏譙氏是故孝子之事親也有三道生則養沒則喪喪畢則祭養則觀其順也喪則觀其哀也祭則觀其敬而時也盡此三道者孝子之行也既內自盡又外求助昏禮是也故國君取夫人之辭曰請君之玉女與寡人共有敝邑事宗廟社稷此求助之本也夫祭也者必夫婦親之所以備外內之官也官備則具備水草之菹陸産之醢小物備矣三牲之爼八簋之實美物備矣昆蟲之異草木之實隂陽之物備矣凡天之所生地之所長茍可薦者莫不咸在示盡物也外則盡物內則盡志此祭之心也是故天子親耕於南郊以共齊盛王后蠶於北郊以共純服諸侯耕於東郊以共齊盛夫人蠶於北郊以共冕服天子諸侯非莫耕也王后夫人非莫蠶也身致其誠信誠信之謂盡盡之謂敬敬盡然後可以事神明此祭之道也純側其反緇衣也方氏下文注以為純儉之純玉女美言之也水草之菹芹茆之屬陸産之醢蚔蝝恱專反之屬三牲牛羊豕八簋五穀之屬昆蟲之異蜩范蜂也之屬草木之實榛栗之屬純以衣言冕以冠言非莫耕非莫蠶言天子有天下諸侯有一國非莫之為耕也非莫之為蠶也而夫婦自耕蠶者以共祭祀而自致其誠信也自生而養沒而喪至思慕而為祭是為內盡其心自昏禮而至夫婦親祭是為又求其助自水草之菹而至茍可薦者莫不咸在是為外盡其物故親耕親蠶以共祭祀皆發於此心之敬補及時將祭君子乃齊齊之為言齊也齊不齊以致齊者也是故君子非有大事也非有恭敬也則不齊不齊則於物無防也嗜欲無止也及其將齊也防其邪物訖其嗜欲耳不聼樂故記曰齊者不樂言不敢散其志也心不茍慮必依於道手足不茍動必依於禮是故君子之齊也專致其精明之德也故散齊七日以定之致齊三日以齊之定之之謂齊齊者精明之至也然後可以交於神明也大事謂祭恭敬謂將祭故齊未齊之時心意散亂心所嗜欲有不齊者及其齊也止此不齊之事以致極齊戒之道以承祭祀可交神明本孔氏說是故先期旬有一日宫宰宿夫人夫人亦散齊七日致齊三日君致齊於外夫人致齊於內然後㑹於大廟君純冕立於阼夫人副禕立於東房君執圭瓉祼尸大宗執璋瓚亞祼及迎牲君執紖卿大夫從士執芻宗婦執盎從夫人薦涗水君執鸞刀羞嚌夫人薦豆此之謂夫婦親之先悉薦反紖直忍反禕音暉從才用反涗音嵗嚌才細反先期旬有一日者散齊致齊凡十日先一日而宿戒故距祭之期先十有一日也宫宰守宫官宿猶戒也以經宿而後齊故以宿戒為宿內謂正寢外謂路寢大廟始祖廟也純緇也純冕謂緇冕方氏謂六冕皆用麻而曰純者孔子稱純儉則純用絲不必改純為緇矣副首飾禕衣也圭瓉祼器以圭為柄祼者酌鬱鬯大宗大宗伯璋者半圭紖牽牛鼻繩芻藁也殺牲時用以薦藉宗婦宗子之婦盎盎齊之尊涗者涗酌也盎齊者清和以清酒泲之謂之涗酌水明水也就盎齊之尊酌此涗齊而薦之更言水者以盎齊加明水也嚌者尸所嚌之肺嘗之至齒謂之嚌以尸之所嚌故君執鸞刀而羞之羞進也鄭氏孔氏方氏及入舞君執干戚就舞位君為東上冕而揔干率其羣臣以樂皇尸是故天子之祭也與天下樂之諸侯之祭也與竟內樂之冕而揔干率其羣臣以樂皇尸此與竟內樂之之義也舞位綴兆也東上近生位也皇尸尊稱也方氏鄭氏夫祭有三重焉獻之屬莫重於祼聲莫重於升歌舞莫重於武宿夜此周道也凡三道者所以假於外而以增君子之志也故與志進退志輕則亦輕志重則亦重輕其志而求外之重也雖聖人弗能得也是故君子之祭也必身自盡也所以明重也道之以禮以奉三重而薦諸皇尸此聖人之道也祼謂祼以鬱鬯升歌謂工歌清廟於堂上武宿夜武曲名即大武之樂武王伐紂至於商郊停止宿夜士卒皆歡樂歌舞以待旦因名焉詩曰㑹朝清明所謂宿夜前此一夕也祼假鬱鬯歌假聲音舞假干戚三者所重皆外也必內志重而後與之俱重孔氏說夫祭有餕餕者祭之末也不可不知也是故古之人有言曰善終者如始餕其是已是故古之君子曰尸亦餕鬼神之餘也惠術也可以觀政矣餕食神之餘也祭畢既餕而徹之故為祭之末以明受神之惠而善祭之終者也故援古語以明餕義以為不特人餕鬼神之餘雖尸亦餕鬼神之餘蓋牲既殺則薦血腥於鬼神及熟之於爼而尸始食之是尸亦餕鬼神之餘也必言此者尸猶受惠於鬼神人固當受惠於其君夫養民以惠而政在養民故曰惠術也可以觀政惠術猶言仁術也孔氏方氏是故尸謖君與卿四人餕君起大夫六人餕臣餕君之餘也大夫起士八人餕賤餕貴之餘也士起各執其具以出陳于堂下百官進徹之下餕上之餘也凡餕之道每變以衆所以别貴賤之等而興施惠之象也是故以四簋黍見其修於廟中也廟中者竟內之象也祭者澤之大者也是故上有大澤則惠必及下顧上先下後耳非上積重而下有凍餒之民也是故上有大澤則民夫人待于下流知惠之必將至也由餕見之矣故曰可以觀政矣謖所六反重直龍反夫音扶謖起也修遍也積重言所積重疊夫人猶言人人鬼神之惠遍廟中如國君之惠遍竟內鬼神之祭不獨饗之使人餕之恩澤之大者也國君有蓄積不獨食之亦以施惠於竟內也由餕而具惠故曰可以觀政鄭氏方氏夫祭之為物大矣其興物備矣順以備者也其教之本與是故君子之教也外則教之以尊其君長內則教之以孝於其親是故明君在上則諸臣服從崇事宗廟社稷則子孫順孝盡其道端其義而教生焉是故君子之事君也必身行之所不安於上則不以使下所惡於下則不以事上非諸人行諸己非教之道也是故君子之教也必由其本順之至也祭其是與故曰祭者教之本也已為物指禮而言興物謂薦百品鄭氏說夫祭有十倫焉見事鬼神之道焉見君臣之義焉見父子之倫焉見貴賤之等焉見親疏之殺焉見爵賞之施焉見夫婦之别焉見政事之均焉見長幼之序焉見上下之際焉此之謂十倫先後有序故謂之倫十倫各見下文用方氏補鋪筵設同几為依神也詔祝於室而出于祊此交神明之道也祊伯更反同几者以其妃配而不特几也詔祝謂告事於尸出于祊謂索祭詔祝在廟中祊在門外此第一倫見鬼神之道用鄭氏補君迎牲而不迎尸别嫌也尸在廟門外則疑於臣在廟中則全於君君在廟門外則疑於君入廟門則全於臣全於子是故不出者明君臣之義也别彼列反尸在廟門外未全為神尚猶臣也故不迎尸以全君之尊此第二倫見君臣之義補夫祭之道孫為王父尸所使為尸者於祭者子行也父北面而事之所以明子事父之道也此父子之倫也孫為王父尸即主祭者之子父反北面而事之非事子也以子為己之父尸乃所以事父也此第三倫明父子之倫補尸飲五君洗玉爵獻卿尸飲七以瑶爵獻大夫尸飲九以散爵獻士及羣有司皆以齒明尊卑之等也尸飲五者凡祭二獻祼用鬱鬯凡祭奠而不飲不在飲之數至朝踐二獻饋食二獻及食畢主人酳尸凡飲五也於是時君乃洗玉爵獻卿獻畢乃主婦酳尸為一飲酳畢賔長乃獻尸為一飲通前凡飲七也於是時又以瑶爵獻大夫自此長賔加爵為一飲長兄弟加爵為一飲通前凡飲九也於是時則又以散爵獻士及羣有司矣凡以卿大夫士為等本以貴賤言於其等又各以齒故以尊卑言卿之德降而貴故獻以玉爵大夫之德殺而賤故獻以瑶爵至於士德卑尤賤故獻以散爵此第四倫見貴賤之等用陳氏說夫祭有昭穆昭穆者所以别父子逺近長幼親疏之序而無亂也是故有事於大廟則羣昭羣穆咸在而不失其倫此之謂親疏之殺也昭穆謂羣廟父南面為昭子北面為穆親者近疏者逺祭大廟則羣廟尸主及助祭同宗之父子皆來各以昭穆而列不失倫類此第五倫見親踈之殺用孔氏補古者明君爵有德而祿有功必賜爵祿於大廟示不敢專也故祭之日一獻君降立于阼階之南南鄉所命北面史由君右執策命之再拜稽首受書以歸而舍奠于其廟此爵賞之施也一獻一酳尸也若有所爵命則於此時君南鄉立所受命者使北鄉立掌書之史由君右策命之此第六倫見爵賞之施用鄭氏孔氏補君卷冕立于阼夫人副禕立于東房夫人薦豆執校執醴授之執鐙尸酢夫人執柄夫人受尸執足夫婦相授受不相襲處酢必易爵明夫婦之别也卷音衮禕音暉校户教反鐙音登校豆中央直者也鐙豆下跗也夫人薦豆之時則執豆之校執醴者授夫人之豆則執鐙尸酌夫人之爵則執柄夫人受尸之酌則執足夫婦相授受不相襲處者婦人貴於從夫又貴於辨位從夫則立之東所以待其將有事辨位則即於西所以動而行事也酢必易爵者男人不承婦人爵也此第七倫見夫婦之别用孔氏陳氏注凡為爼者以骨為主骨有貴賤殷人貴髀周人貴肩凡前貴於後爼者所以明祭之必有惠也是故貴者取貴骨賤者取賤骨貴者不重賤者不虛示均也惠均則政行政行則事成事成則功立功之所以立者不可不知也爼者所以明惠之必均也善為政者如此故曰見政事之均焉髀必氏反貴髀為其厚也貴肩為其顯也前貴於後亦指骨而言前體臂臑為貴後體膊胳為賤也貴者不重雖取貴者亦不重取也賤者不虛雖取賤者亦不至無可取也故其惠均此第八倫見政事之均用鄭氏補凡賜爵昭為一穆為一昭與昭齒穆與穆齒凡羣有司皆以齒此之謂長幼有序爵酒爵也賜爵謂旅酬時此第九倫見長幼之序孔氏補夫祭有畀輝胞翟閽者惠下之道也唯有德之君為能行此明足以見之仁足以與之畀之為言與也能以其餘畀其下者也輝者甲吏之賤者也胞者肉吏之賤者也翟者樂吏之賤者也閽者守門之賤者也古者不使刑人守門此四守者吏之至賤者也尸又至尊以至尊既祭之末而不忘至賤而以其餘畀之是故明君在上則竟內之民無凍餒者矣此之謂上下之際畀與也輝䩵磔皮革之官胞即庖人翟教羽舞者閽主昏閉者此第十倫見上下之際用方氏補凡祭有四時春祭曰礿夏祭曰禘秋祭曰嘗冬祭曰蒸礿禘陽義也嘗蒸隂義也禘者陽之盛也嘗者隂之盛也故曰莫重於禘嘗古者於禘也發爵賜服順陽義也於嘗也出田邑發秋政順隂義也故記曰嘗之日發公室示賞也草艾則墨未發秋政則民弗敢草也艾音刈田邑土地之事秋政刑政也發公室出賞物也艾草因枯槁之時以給爨也墨墨刑也因其時殺而順以行刑也孔氏方氏故曰禘嘗之義大矣治國之本也不可不知也明其義者君也能其事者臣也不明其義君人不全不能其事為臣不全夫義者所以濟志也諸德之發也是故其德盛者其志厚其志厚者其義章其義章者其祭也敬祭敬則竟內之子孫莫敢不敬矣是故君子之祭也必身親涖之有故則使人可也雖使人也君不失其義者君明其義故也其德薄者其志輕疑於其義而求祭使之必敬也弗可得已祭而不敬何以為民父母矣君不失其義者言君雖不及親祭祭禮無缺於君德不損也疑於其義者謂疑惑於祭祀之義也鄭氏孔氏夫鼎有銘銘者自名也自名以稱揚其先祖之美而明著之後世者也為先祖者莫不有美焉莫不有惡焉銘之義稱美而不稱惡此孝子孝孫之心也唯賢者能之銘者論撰其先祖之有德善功烈勳勞慶賞聲名列於天下而酌之祭器自成其名焉以祀其先祖者也顯揚先祖所以崇孝也身比焉順也明示後世教也烈業也王功曰勳事功曰勞酌之祭器言斟酌其美傳著於鍾鼎也身比焉謂自著名於下也鄭氏夫銘者一稱而上下皆得焉耳矣是故君子之觀於銘也既美其所稱又美其所為為之者明足以見之仁足以與之知足以利之可謂賢矣賢而勿伐可謂恭矣造銘惟一稱先祖之善上下皆得謂上光揚先祖下成已順行也美其所稱美其所銘之人也美其所為美其造銘之人也為銘之人惟明故足以見先祖之美惟仁故許與之以先祖之銘知足以利之者謂利己名得比於先祖也一為銘而三者皆得可不謂賢乎然必賢而不伐斯足為恭矣孔氏方氏故衛孔悝之鼎銘曰六月丁亥公假于大廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難于漢陽即宫于宗周奔走無射啓右獻公獻公乃命成叔纂乃祖服乃考文叔興舊嗜欲作率慶士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叔舅豫女銘若纂乃考服悝拜稽首曰對揚以辟之勤大命施于蒸彛鼎此衛孔悝之鼎銘也古之君子論撰其先祖之美而明著之後世者也以比其身以重其國家如此子孫之守宗廟社稷者其先祖無美而稱之是誣也有善而弗知不明也知而弗傳不仁也此三者君子之所恥也悝口回反假公百反孔悝衛大夫也公謂衛莊公蒯瞶也莊叔者悝七世祖衛大夫孔逹也隨難謂衛成公嘗為晋文公所伐失國而奔齊莊叔從之而出也事見僖公二十八年即宫于宗周謂為晋所伐而奔周得歸也獻公者衛侯衎成公曽孫也啓右獻公者獻公亦失國得反言莊叔之功流于後世啓右獻公亦得反國也成叔者莊叔之孫成子蒸鉏也乃命成叔纂乃祖服者獻公既反國又命成子繼莊叔也文叔者成叔之曽孫文子圉即孔悝之父也興舊嗜欲者能興行先祖舊德所欲為也作率慶士者慶善也士事也作而率循其善事也一說以慶為卿云率作卿士未知孰是今且如字讀對揚以辟之勤大命施于蒸彛鼎者辟君也對揚以君之勤大命猶言對揚天子之休命以君之命而銘諸蒸祭之彛鼎也舊注以對揚以辟之為句訓辟為明至方馬氏解方改今讀晦庵嘗稱其極是此章自公曰休哉皆孔悝父祖鼎銘之辭此下則因而言銘鼎之義以比其身謂自著其名於下是以身比先祖魯哀公十五年衛莊公蒯瞶與其子輒爭國舍孔氏之外圃適伯姬氏迫孔悝於厠強盟之遂劫以登臺於是得國十六年六月衛侯飲孔悝酒逐之此云六月命之命後即逐之也銘出於孔悝之意而以為公所豫者示不敢專孔悝之立莊公特迫於母與渾良夫之劫莊公又非令德之君而記禮者引其銘特以見所以為銘者大體如此孔氏應氏講義昔者周公旦有勳勞於天下周公既沒成王康王追念周公之所以勳勞者而欲尊魯故賜之以重祭外祭則郊社是也內祭則大嘗禘是也夫大嘗禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之樂也康周公故以賜魯也子孫纂之至于今不廢所以明周公之德而又以重其國也大嘗禘者夏祭也天子內祭之重者也管象謂吹管而舞象舞之樂也朱干以赤飾其盾玉戚以玉飾其斧皆武象所執者大夏禹樂文舞也康猶褒大也魯惠公始請於周平王而僣禮魯人飾以為成王所賜漢人記傳聞之言爾辨已見明堂位黃氏日抄卷二十三
