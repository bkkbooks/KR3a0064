body:
  text: 黄氏日抄卷九十五宋黄震撰祭文祭叔祖機察壺隠先生墓諱得一字仲清在昔先人來從東嘉富而好德樸不務華迨我叔祖始以文振幼未得師起而自奮熟誦古書達旦無眠天資超詣竟探本原其在初年學老子說一登講席聽者千百既而幡然復歸于儒銳意斯世勇爵假途南北講解公亦歸老築臺白沙放懷詩酒有祠為妖一􅋹徑除烈烈英風雖老不渝齎志莫售爰俟來者篤教猶子彬彬儒雅始余周晬公賜之詩匪徒言賀以逺大期既而稍長受書吾父俾繼先志必稱叔祖歲在丙辰竊第奉常皆公之賜感極涕滂惟公松楸頑民竊據垂四十年乃獲天佑俄歸侵疆得拜墓傍公靈猶存酹此一觴祭林啟源上舍嗚呼先生而止於斯嗚呼痛哉尚忍言之先生邁往不羣洞達無疑笑語掀天醉墨淋漓蟠虹霓而駕風霆斯其為先生之氣命胡為而止於斯先生才藻天至直大瓌竒流從肺腑掃盡糠粃揭日月而㵼江漢斯其為先生之文命胡為而止於斯先生篤叙婣黨周急扶危人飽厚賜家無留貲激清風而振頽波斯其為先生之德命胡為而止於斯年十五魁鄉校年二十魁太學昭昭乎英特之聞灼灼然逺大之期以先生之氣之文之德固宜一魁天下大展宏規何五上南宫雖畫圖之青衫不可得嗚呼痛哉尚忍言之不知命果何為而止於斯乗白雲而至帝鄉超鴻䝉而契希夷意生氣至今猶凜凜斗牛間雖死猶不死耳不然其又何忍而言之某晚學無聞獨䝉異知保䕶於風波嶮峨之地而奬掖於萍蓬困苦之時蓋將終身所恃以増壯今一旦舍我其何之古人有言生我者父母知我者鮑叔先生吾鮑叔也今日之慟幾無異終天之戚風木之悲祭浙西提舉實齋王先生某等哀哀門人之誄昨已隨班於僚屬今兹追送於逺郊又不覺重為蒼生哭蓋世之欲為善者多計較世之號治辦者類局促根一念之誠達之事事物物間惟先生獨至誠未有不動故雖易簀之際光明俊偉之舉尚足以震動乎流俗方權貴之分布嘅公論之隠伏先生方為民而有請聖朝即盡為之斥逐此數十年來之所未有真世道一開泰之㑹四海正顒顒而屬目使先生而尚秉使節豈不足以掃吏姦而澄肅使先生而進立朝端豈不足以格君心而啓沃何雷霆僅匉訇乎晴空而霖雨已無望其霑足此先正因程伯淳之云亡謂天下之無福嗚呼先生之死亦榮矣當萬世不磨某等之事先生猶生亦誓不為師門辱又學造本原志存經濟動與道俱未嘗禄仕故有不為為必大治莫難岩邑公為之宰振其疾苦釐其經界化行俗易厥聲四沛後復守台益廣慈惠迺立社倉俾無飢毁迺興學校躬講義理有鬱必伸讙其吐氣有强不率鋤而弗貸米踴倏平十僅三四郡枵倐盈貸民租稅幾於太平一郡三代政成趣召翩翩四輩公辭弗行悠然餘味風雨夜牀山林雅致易俾乗軺强斯攬轡蠲缺役錢八十萬計雪鹽民苦纎悉備至裁折苗價諸郡風靡興利除害夙興夜寐决計行部俄苦勞瘁力疾草劾獨先豪貴如雷忽奮驚動一出世方歡傳詫其盛事公已肅然衣冠而逝平生學力益信此際死有餘榮可賁千載某所哀痛獨有疑者謂治為難何公之易由縣而郡至常平使投之所嚮無不如意呼吸變化等於逰戯豈真易耶人則多礙畏首畏尾莫或行志有巧其間益重嗤鄙罔之生者滔滔皆是難耶易耶其果安在或謂一私充塞天地交互屬託彼此内外滅没其間無復知恥公獨以公是能大快或謂流俗展轉百偽飾以欺人如見肝肺不誠而動自古所未公獨以誠所至興起又謂人情纒染勢利縦欲有為膠固凝滯公獨自如蓋由恬退又或以為世途嶮􅇖勢或振之是非易位公無不可蓋逺權勢果其然敵盍昌厥施厯厯明效皆其已試達之天下豈有二義天豈不仁奪之中止嗚呼痛哉其果何謂於公則輕關繫甚大堂堂天下他無足慮紫雲有誓深根固蔕民心戴宋有死無二剥而離之能幾何輩遏使無為獨公能此公今已矣猝其誰繼某也失學惟戅莫比公何所見以國士待庶幾尺寸自同附驥否亦林下為供薪水而今而往其將疇倚最苦葬日逺莫知細或指霞城葬以春季天必以台皆公遺愛埋玉棠隂保千萬禩欲執之紼官縛無奈千里馳奠滂然涕泗公其監兹特釂此酹祭江西提舉省齋麋先生嗚呼痛哉尚忍哭吾先生也耶去嵗方哭吾實齋王先生今又哭吾先生耶方今風俗瀾倒士大夫真有心於民命國脈者幾人而造物忍其然耶先生操履足以範世識見足以超俗智慮足以周變文采足以華國議論足以使人意消而恩信足以得人心腹先生一不以之自居方且切切然憂其所獨攅眉乎民生之休戚熏心乎國脈之繫屬徧交當世之士以共濟振收方來之彦以陸續有强弗率而撓此奮不顧以横觸内之以司機政外之以作民牧寢食為之俱廢疾疢至於相屬詩酒浮華之語未嘗一出於口聲色玩好之具未嘗一接於目蓋平生不知有官遊之樂而此身率代乎閭閻之哭嗚呼若然其何以敵流俗富貴者之福耶某最失學乃辱異知諸司之誤薦無一非先生延譽之賜薄官之免戾無一非先生教詔之為兩入鈴閣而無一致分毫之補報三䝉剡辟而末繇效一日之驅馳實三生宿所結習將終身恃為依皈何郵音之倏到驚泰山之已頽嗚呼已矣夫嗚呼已矣夫其何異終天之戚風木之悲嗚呼痛哉祭月山庵再從兄七解元汝霖始兄之生家道方興兄弟錚錚爭以文鳴謂宜此時可立門户俾我晚末仰成餘緒何命之乖皆無一成堂堂大家翻成凋零豈有數歟天髙難問感今念昔徒劇悵恨雖足得壽惟兄可憐寂寂月山竟此終焉非子為僧幾莫葬骨幸而得葬尚復何說白沙之原爾弟之墳佳城相依以永萬年祭鎮江薛節幹安泰寮永嘉人名據惟靈徧印諸老博極羣書文追古作聲滿江湖先生蓋嘗以年少而預當代之名儒徧謁公卿銳志當世屢排閶闔厯陳利害先生蓋嘗以韋布而聞天下之大訃徧交名勝盃酒淋浪凡有寸善靡不推揚先生蓋嘗以羇困而任人才之主張嗚呼世變之下如江河人才之稀如晨星士有一介之特起莫不與時以崢嶸何先生之卓犖反遏鬱而不光久京華之逐逐虚嵗月之堂堂甫白頭之趨幙俄丹旐之還鄉慨兒女之未了嗟田園之已荒雖生前之數非短而身後之憂尚長惟平生之著述紛積案而盈箱嗚呼天乎何才之豐而命之涼耶某也失學亦蒙誤知目此大故方莫助之含哀再拜奠此一巵嗚呼先生尚其酹而祭浙西孫安撫元實餘姚四明人嗚呼先生國之所望於先生者未央也乃一旦乗雲為帝鄉客耶嗚呼先生吾國之所以立不在公論一脈耶方寶祐之末禩有當國者病風極千古之怪事萃一時之狂兇震六合以供噱哭萬姓於途窮敵南下而已迫猶忍從乎蔽蒙冒萬死而上聞有衆藩之羣公森虎豹於九關嗟一字之莫通由都曹而丞奏悉危急於宸聰嗚呼此時非先生誰與活公論之一脈耶嗚呼先生於此時非所謂轉危枰於一著耶洪惟先生稟天間氣妙齡英𤼵摘髭巍第通達世務志存經濟論及邊陲擊節慷慨傾如許之襟期豈無逺者大者在顧前此之一著亦豈不足以覘其平生之梗槩而豈徒極郡縣之精明而豈徒詳金穀之心計而豈徒為都曹之識大體而豈徒為監司之整風哉奈何乎已試者人所知未試者人所不知追風逐電之步往往徒索於委巷厯塊此横議之所以輒發而有識者或代為之竊嘅方將拭目乎桑榆之收詎意遽失聲於梁木之壞嗚呼先生而至此固不為不遇矣其猶有未盡遇者然則非天嗇其壽耶嗚呼先生而止此必當有鳴其不盡遇者矣其能發明所未遇昭其如盡遇者又未知天屬誰手耶某貧至無家老方竊第介不下人莫或眄睞先生獨許我以驅馳常拯我於危殆亦曰相期於嵗寒或者能効尺寸於昭代何某甫選坑之欲脫先生已先朝露而溘逝嗚呼已而尚忍言之臨風大慟寄此一巵祭稅院田公竹軒名穆嗚呼靈乎以靈之堂堂遽一疾而即㝠㝠乎靈也風月吟懷江湖雅量咳唾珠璣騷壇之将不幸而列西班世蓋莫知宗仰也名將聞孫潭槐宅相有翁冰清亦世師匠不幸而列西班世又末繇提奬也嗚呼此皆靈可悲之大者而猶有大可悲者在也嘗薦漕闈退鷁南宫嘗官筦庫輒窘窮途歸側屋需逺禄鬼初祝飯不足莫我知抱幽獨惟有風流醖藉浩然不以窮達死生而變者與晉宋曠千載而一續嗚呼悲夫能信余言之不妄者又誰歟此某所以重為賢者哭祭羅季清氣姿磊落材諝英特生甫二十七年即身擢上第仕又二十七年尚家徒四壁此其挾以游於天下者落魄任情故天下識與不識皆知有季清奈何乎人間之選渦未脫而天上之玉樓已成嗚呼惜夫使季清幸而壽天下事方將賴之今不幸而不壽家之事尚無與支鄉之事尚無與為而况乎逺思此又使人不能不重為之悲某與季清屋角相並長而同學于邑于郡君方弱冠嘗約余鄉㑹而未果入君既擢第亦徑過門而不我問音信之隔踰二十年癸亥之春始㑹臨安某時既仕喜蒙握手是冬之夜訪某京口時某為君作制幙書祝君身事粗極勤劬榮滿來歸舉員亦足再㑹臨安舉酒相屬誰或尼之通籍尚遲君識既老以悠逺期且言近履自號恥獨屬某為記悉君心腹切未半年倐以訃傳嗚呼惜夫其尚何言祭知興化軍宫講宗博汪公景新惟公資稟純乎天地之剛發施出於義理之淵至誠未有不動所至卓有可傳嘗宰赤縣矣若惟平易爾乃能爭人之所不能爭嘗位朝列矣若惟靖共爾乃能言人之所不敢言方今郡國之難治者莫甚莆俗而士大夫之治莆者十難一全公之治之不過扶病兩月莆之愛之過於為邦百年聞甫至而為政惟教化之是先俄風俗之丕變致人心之翕然愚弱嗟父母之來晩豪猾凜神明之在前人方爪掌以交頌公忽騎鯨而遽仙罄千里以奔哭徧閭巷之喧填不崇朝而立廟紛血祭之腥羶合多士以頌德刻遺愛之成編此不惟莆俗之所未有亦亘古窮今之所未有嗚呼盛哉是豈不足以見人心之天某科級既忝傳衣陪侍屢從執鞭聞遺風之凜凜愈涕泗之漣漣奈微官之如縛苦奔奠之無縁臨風一巵逺致九筵祭倪師幹庚午十二月十八日紹興師幹三山人名洪惟公稟姿之淳賦性之仁謂宜逺到可福斯民何一第十五年之淹回而五剡千萬狀之艱迍金閨之籍甫通繐闈之奠已陳嗚呼惜哉天豈不祐善人某幸託年盟之舊又聨寮寀之新忍見一朝之先露蔑資千里之問津臨風巵酒聊寄酸辛祭添差通判呂寺簿圻南康人嗚呼自晦翁之學盛行而義理之說大明天下雖翕然而向方流弊亦隨之而漸生蓋論說之求多恐躬行之或缺茍誠用力於躬行何暇往事乎口說某行天下今踰半生凡見言晦翁之學者幾人往往不知其躬行辛未之夏試郡臨汝公亦來止歡若雅故但見公之氣貌則端粹性行則淑均議論則不事乎枝葉設施則必由於本根某始心悅而誠服亟訪求其梗槩知我公之嚴君實晦翁之髙弟方理皇之表章正學聘晦翁之高弟來歸即我公之嚴君坐白鹿而為師惟公鍾康廬清淑之氣得家庭正大之學惟真實之是務掃世俗之漓薄少年嘗從學於浦城閉户不出夜不就寢者踰年晚年猶五鼓而夙興紬繹沉思熟誦先聖之遺編世所謂中庸大學者身未必行惟見筆舌華靡公所謂中庸大學者口未嘗言見之躬行踐履膏沃者光焰􅂱内實者膚革充公之形於身措於事業者故宜與世夐然而不同夫知與行所當並進而言與行本無偏廢自流弊失於空談幸實學賴有公在達而在上所宜巍冠廣厦以格君心窮而在下亦宜正席虎皮師表士林奈何兩登朝列横經僅止於璧水再駕貳車恩意僅孚於千里常抱道而不屈每難進而委蛇近攝郡乎臨江方厥聞之四馳及𤓰而代有詔伊邇云胡一疾居然不起嗚呼天乎晦翁之學終不究真儒之實用乎嗚呼天乎晦翁之說終於資或者之談柄乎因公一旦之云亡不覺百感之交集于嗟今日之奠豈但為公而泣祭國史吳校勘正子惟靈得象山端方之學膺伊川殊特之召金匱賴之以紬繹士林仰之為師表嘗得一日之言責亦既空臆而入告誰歟促蓬萊之仙舟天亦不憗遺於一老惟有義理之微言炳炳尚存乎遺藳嗚呼傷哉祭通判陸太傅鵬升某少習科舉之業日誦先生之文觀其理致之明白如日昭而月揭迹其氣勢之變動如電掣而雷奔此求之古文中猶傑出而何程文之敢云然先生此時已掇仲舒晁錯之科而致身青雲某每齚齚而自歎曰此非天之所間生者乎安得而見其人頃試臨汝之郡獲登先生之門聞其記誦之習熟如懸流而㵼瀑聽其議論之精切如條析而縷分此求之古人中猶間見而可今人之擬倫然先生此時已嬰子夏丘明之疾而絶意世坌某又齚齚而竊歎曰天既間生之若此又何忍而虐斯人蓋自昔抱非常之才者决不困於區區今先生文章蓋天下聲名塞寰區而官不過太博位不過貳車何疾疚之遽侵漁也然自古遭無妄之災者類不免於戚戚今先生自一眚之為災已十年而不出付災祥於定分常笑談而自得又何得喪之能惑也抑有才而不顯於今者必以文鳴後世先生攜平生之著述以校文因閩士之鬨場而散敗頃借春秋之筆削請以圖經而刪改方擇日以開局已翛然而長逝於此小者且然而况乎其大然抱抑鬱而頻於危者必不免於怨悲惟先生超然立於萬物之表而浩然與造物者同歸開局之報墨猶濕仙去之驚傳已隨開懷一醉而奄化兩忘身世之是非於其大者且然而何問小者為然則先生其天人哉翩然而來也略出緒餘雷霆一世倏然而歸也乗雲帝鄉了無滯累嗚呼先生其天人哉黄氏日抄卷九十五
