body:
  text: 黃氏日抄卷三十宋黃震撰讀周禮孟子生於周末周室班爵祿之制已不可得而聞劉歆生於漢末乃反得今所謂周禮六官之書故後世疑信相半如張橫渠則最尊敬之如胡五峰則最擯抑之至晦庵朱先生折衷其説則意周公曾立下規模而未及用近世趙汝騰按惟王建國以為民極數語意周公作洛後所為然亦不可考矣惟程氏謂有關雎麟趾之意然後可以行周官之法度此為于其本而言之學者明乎此則不必泥其紛紛者然竊意周官法度在尚書周官一篇而未必在此書六典爾今以先儒考訂聊筆其一二云設官之多陳及之云或謂鄉遂設官最冗六鄉之民不過七萬五千家今設官至萬八千九百三十人為大夫者百八十人六遂之民亦不過七萬五千家而設官乃三千九百九十八人為大夫者四十人鄉遂共十五萬家官吏乃至二萬三千人十五萬家之所入能幾何而足以養二萬三千官吏愚按吕氏總計地官公卿大夫士通用三十萬夫府史胥徒又不預焉則又不止陳氏所計二萬三千之數而已使此書果出於周尚不過尚書周官一篇之疏况又説之不通如此官之交互陳君舉曰如大史內史掌六典八法八則八柄之二宜屬天官乃屬春官大小行人司儀掌客宜屬春官乃屬秋官宰夫掌臣民之復逆矣則大僕小臣御僕之掌復逆宜屬天官乃屬夏官宰夫掌治朝之位矣則司士正朝儀之位宜屬天官乃屬夏官地官掌邦畿之事凡造都邑建社稷設封疆既悉掌之矣而掌固司險掌疆候人又見於夏官天官掌財賦之事自天府至掌皮既悉領之矣而泉廩人倉人又見於地官自膳夫至臘人不過充君之庖者悉領於天官至外朝百官之廩祿府史胥徒之稍食畨上宿衛之給乃見於地官自內司服至屨人凡王宮服飾之用悉領於天官而司服司常典瑞巾車之屬乃見春官此其分職皆有不可曉者愚按書作於周而定於孔子大如三宅三俊書所載也周官無之小如三亳阪尹書所載也周官無之而此乃至於交互重復何哉天官冡宰惟王建國辨方正位體國經野設官分職以為民極此祖商邑翼翼四方之極之義而説者以為主周公作洛邑而發周禮一書關涉義理者在民極一句故每官必以此為篇首乃立天官冡宰使帥其屬而掌邦治以佐王均邦國此本書冡宰掌邦治統百官均四海之説治官之屬此句總下六十官今併太宰小宰凡六十三官太宰掌六典一治典二教典三禮典四政典五刑典六事典愚按書六卿分職此以太宰掌六典六典即六卿之職雖曰冡宰無所不統此下自分六官然與書不同小宰掌宫中之刑凡太宰之職皆掌其事宰夫掌治朝之法宫正掌王宫之戒令糾禁宫伯掌王宫之士庶子凡在版者士謂適子庶子謂支庶在版謂子弟名籍膳夫掌王之食飲膳羞庖人掌共六畜獸禽內饔掌割烹外饔掌祭祀之割烹烹人掌共鼎􅀈愚按膳夫以下五官凡五百三十一人均為飲食設亦豈無可併省者耶甸師掌耕藉田愚按藉者借民之力也今官與其徒凡三百三十有五人豈千畝之田王自置人耕之耶似當考也獸人掌罟田獸愚按此以共膳也然古者自有田狩共君之庖漁人掌取魚愚按此官除士府史胥之外其徒三百人今世取魚於市不養一人亦足供膳鱉人雖不設官亦可臘人庖人一小事耳醫師食醫疾醫瘍醫獸醫此通古今決不可廢者古人世其官則精矣酒正酒人漿人此亦古今不可闕者今世有酒而已漿以水為主以米汁將之所以止渴稍厚則為醴甜酒也又醲則為酒辛辣矣凌人掌氷籩人奄與奚掌之醢人醯人鹽人皆奄與女奚幂人掌巾幂宫人掌寢皆女也掌舍掌出入幕人掌幕帟掌次掌王次皆侍御之細事太府王府內府外府皆掌守藏財賦太府總收王府掌玉內府掌良貨外府掌帛布司會司書職內職嵗皆掌會財賦職歲者歲杪計其數也世稱六典之書大半理財然尚書周官一書不及此也職幣掌用幣司裘掌共裘掌皮掌斂皮革內宰掌隂禮而首均其稍食分其人民以居之內小臣掌王后服位閽人寺人內豎皆奄官豎則未冠者之名九嬪世婦女御女祝女史皆婦人為之典婦功典絲典枲外官為之內司服縫人皆婦人為之五峰疑官吏與妃嬪雜處染人追師屨人夏采皆男子為之夏采者夏翟羽色與染人固異官然皆瑣瑣甚矣陳君舉曰冡宰一職惟宰制天子左右之人一則環衛之人二則供奉飲膳酒漿之人三則出納財賄之人四則宫中使令之人又曰自玉府內府而下今皆入內藏庫自宫人掌舍而下今皆入修內司自醫師食醫而下今皆入御藥院自膳人庖人而下今皆屬御前供奉官愚按本朝之制為簡但權不屬宰相宫府不一體耳地官司徒此本尚書周官司徒掌邦教敷五典擾兆民為義自大司徒而下凡七十八官天地之所合也四時之所交也風雨之所會也隂陽之所和也然則百物阜安乃建王國焉按此周禮中精語形容卜洛之美也然此書首言惟王建國以為民極乃立地官是卜洛而後設司徒之官豈先有司徒而後卜洛耶若以此為司徒之職掌則卜宅洛中無再卜再宅之事繼此云諸公地方五百里則漢人之言異乎孟子儉於百里之説矣説者以為周官兼山川附庸而言則依附魯頌形容之説而曲為之回護也百里指土地而言豈包山川之虛數附庸各自為國何關諸公之封域耶小司徒掌建邦之教法鄉師掌其所治鄉之教而聽其政鄉老鄉大夫各掌其鄉之政教禁令州長掌其州之教治政令之法黨正各掌其黨之政令教治族師掌其族之戒令政事閭胥各掌其閭比長掌其比之治鄉一萬二千五百家州二千五百家黨五百家族百家閭二十五家比五家自鄉至比次第聮絡俱鄉師鄉大夫州長黨正皆於五歲教民以法斯民若奔走四處恐力不及各教於州黨則受教於鄉者誰歟同教於鄉則受教於州黨者誰歟歲時人民杯酒奉親一時和悅人情然也而奔走於有司不暇亦未知如何耳封人掌設社壝士府史胥二十四人徒六十人按設社壝有時常養此衆何為鼓人掌教金鼓舞師掌教舞牧人掌牧祭祀之牲牛人掌養公牛充人掌繫祭祀之牲竊意充人之職牧人可兼充可免四十八人之廩祿載師掌任土閭師掌任民縣師掌地域田萊三職相類凡二百二人愚按禹嘗任土作貢不過區畫而止不聞常設官遺人掌委積均人掌力政師氏掌以媺詔王與教國子保氏掌諫王而教國子似今師儒之官而吏胥之外其徒共百八十人豈無煩冗之職歟司諫正民之行司救防民之非不知如何巡察孔子曰其身正不令而行調人掌平民之爭然則不剖其是非歟媒氏掌萬人之判司市凡百七十四人雖曰必立之乎多亦恐擾夫人世子過市有罰亦可疑夫人世子無遊觀市井之理若出而經從何罪罰之質人掌市貨㕓人掌市布胥師賈師司暴司稽肆長泉府司門司關通司市凡士一司無不為市而設得無煩苛否易惟曰日中為市交易而退掌節守邦節而辨其用遂人掌邦之野遂師掌遂之政令遂大夫各掌其遂之政令縣正鄙師鄼長里宰又各掌其政令又有鄰長何掌政令者之多不其煩歟旅師掌野之粟恐粟各有主野安得粟而旅師掌之稍人掌合丘乘之政令委人掌斂薪芻土均掌平土地草人掌土化之法蓋除草者恐民各自除之不待官稻人掌稼下地蓋種稻者恐民各自為之亦不待官土訓掌詔地事誦訓掌道方志山虞掌山林林衡掌林麓川衡掌川澤澤虞掌澤藪山者豈不可以兼林澤者豈不可以兼藪與迹人掌邦田之地政草人掌金玉錫石之地角人掌徴齒角羽人掌徴羽翮掌葛徴絺綌之材掌染草徴染草之物掌炭徴炭灰之物掌荼以時聚荼掌蜃斂互物蜃物凡皆瑣屑甚矣似不必立之官囿人掌囿場人掌築場囿人掌囿可言也場人掌築場恐亦農人自為之不待官廩人凡三百八十四人舍人掌用榖倉人掌藏粟司祿司稼掌巡邦野之稼舍人倉人似可併於廩人若司稼之巡稼雖不必可也舂人饎人稿人皆主食稿者冗食之名陳君舉曰地官掌教難曉以屬官考之自鄉老至比長自遂人至鄰長皆鄉遂之官自封人至充人皆疆場畜牧之官自載師至均人皆掌財賦征役之官自司市至泉府皆掌市井自司門至掌節皆掌門關自旅師草人稻人虞衡以至掌染草炭荼蜃極於場人囿人無非山林川澤田疇之官幾近六十官所謂教官者師氏保氏司諫調人司救鼓人不過六七而已其他則整頓田疇分擘郊里征斂財賦掌管山澤紀綱市井管鑰門關而已當時謂之教典何也王次點曰司徒所掌大抵田賦等事似與天官大宰九貢九賦大府以下等官相類黃氏曰地官卿一人中大夫五人下大夫十五人上士四十八人中士一百三十人下士二百八十八人王之門關十二下士各二人則又四十八人府一百三十人史二百十九人賈八人胥二百二人徒二千四百五十六人又舞徒四十人奄十二人女舂抌二人女饎八人女稿十六人奚八十五人是皆著於數者也山虞林衡澤虞場人皆中下士又其府史胥徒又司市立胥徒賈師司暴司稽肆長皆不能計其數者也鄉老皆公即三公鄉大夫皆卿即六卿六卿三十州州長皆中大夫州五黨黨正皆下大夫黨五族為七百五十族族師皆上士族四閭為三千閭閭胥皆中士閭五比為萬五千比比長皆下士六遂大夫皆中大夫六遂之縣視州鄙視黨鄼視族里視閭其餘各下於六鄉之一等六鄉之餘民居四郊其官為四郊之吏稍不為邑縣都不為都有吏主之皆不可以數計也吕氏曰總計地官公卿大夫士通用三十萬夫有竒府史胥徒不在數虞衡迹人等亦不在數據畿內之地似難容許多官畿內户口亦難供許多官愚謂盡畿內之人不為民而盡為官亦無此數春官宗伯乃立春官宗伯使帥其屬而掌邦禮以佐王和邦國此本尚書周官宗伯掌邦禮治神人和上下之説自宗伯至家宗人及凡以神仕者凡七十官大宗伯掌天神人鬼地示之禮小宗伯掌神位名物肆師掌祀禮肆言陳也欎人掌祼器鬯人掌釀秬然此豈不可併之酒人耶雞人掌共雞牲亦豈不可併之牧人之末耶司尊彜自下士至其徒凡三十人司几筵凡十三人天府掌祖廟之守藏典瑞掌玉瑞玉器之藏典命掌諸侯之五儀與諸臣五等之命司服掌王吉凶之服然既曰祀昊天上帝又曰祀五帝亦如之五帝漢人之言恐周無之也夫帝一而已典祀掌外祀之兆守凡五十四人竊意偶有葺理募用民力可也常廩其徒恐虛費守祧掌廟祧世婦每宮卿二人下大夫四人中士八人既曰世婦而以卿大夫士為之何也周禮六官每官不過一卿而世婦每宫乃卿二人何也天官既有世婦矣此春官又有世婦何也説者以春官者為外命婦然外命婦各于其夫之家而云每宫何也若內命婦二十七世婦每宫二卿是為五十四卿何卿之多也既命卿大夫士矣又有女府史奚凡二十人又若何而共事也皆未可曉內宗凡內女之有爵者外宗凡外女之有爵者是特泛言內外命婦何以宗言而指為官守亦合考冢人掌墓地凡死於兵者不入兆域注云戰敗無勇而罰之然豈有無勇而戰死者耶是死守封疆者皆罪人也豈義各有在歟墓大夫掌邦墓之地域凡二百三十六人冡人共百四十四人已繁矣似合併省以合聖人節用愛人之義官事不攝非儉之訓也職喪掌諸侯之喪然治喪已見天官宰夫之職恐此亦可省大司樂樂師大胥小胥大師小師瞽矇視瞭典同磬師鐘師笙師鏄師韎師旄人籥師籥章鞮鞻氏典庸器司干凡二十官皆掌樂雖曰各類其能豈不可總為一官而各列其屬以稍減其人耶太卜卜師卜人龜人菙氏占人筮人凡七官皆掌卜筮實則卜筮列兩官亦可矣占夢似不必置官視祲似宜屬保章氏大祝小祝喪祝甸祝詛祝司巫男巫女巫八官皆掌祝似可併省若詛祝則春秋以後之事恐非盛世所宜有太史掌邦之六典小史掌邦國之志然大宰亦掌建邦之六典矣外史亦掌四方之志矣且二史列於巫祝馮相氏之間亦不知何義馮相氏掌歲月辰日馮音憑乘也憑髙而相視之保章氏掌天星以志星辰日月之變保安也章明也云保安時變章明天意內史外史御史內史掌八枋詔王然此太宰之職也特彼作柄此作枋耳外史掌四方之志然此小史之職也特彼言諸侯此言四方耳御史則進書於王者其史百有二十人似多耳巾車掌公車之政令典路掌王及后之五路車僕掌車之萃副也與倅同凡三官皆主車者司常掌九旗之名物主車之旗都宗人掌都祭祀之禮家宗人掌家祭祀之禮凡以神仕者無數陳及之曰六官中惟春官典禮職事無可疑者然司服掌外朝之服當與內司服並在天官典瑞掌玉器之藏當與掌節並在地官司常巾車典路亦當在夏官今列春官者以禮儀所係黃氏曰春官之屬七十自大宗伯至職喪為一節自大司樂至司干為一節自太卜至御史為一節自巾車至凡以神仕者為一節卿大夫士總五百九十有四人府史胥徒工又總二千五百十四人女奚百有二十人男巫為數女巫為數凡以神仕者無數夏官司馬乃立夏官司馬使帥其屬而掌邦政以佐王平邦國本尚書周官司馬掌邦政統六師平邦國之説自大司馬而下凡六十九官軍將皆命卿此語見文武不分最切薛平仲乃謂六官中特司馬掌兵餘卿無與竊恐不然六鄉之民皆以什伍為軍則六鄉之卿皆為軍將若獨司馬一卿為軍將豈他鄉之民不為兵耶豈司馬兼將他鄉之兵耶必不然也大司馬掌建邦國之九法以平邦國以九伐之法正邦國小司馬掌小祭祀會同饗射師田喪紀之事軍司馬輿司馬行司馬皆缺司勳掌六鄉賞地之法陳君舉謂獨屬之司馬者以軍賞不踰時免司存散隔回復壅底之患馬質掌質馬質平也主買馬平其賈直量人掌建國之法小子掌羞羊羊人掌羊牲職似可併司爟掌火政掌固主修城郭司險掌九州圖掌疆主疆界候人迎賔客環人掌政師挈壺氏不詳刻漏之制而挈壺以令軍井挈轡以令舍挈畚以令糧射人掌射位服不氏掌養猛獸射鳥氏掌射鳥羅氏掌羅烏鳥掌畜掌養鳥凡四官似皆不見為民設官之意司士掌羣臣之版諸子掌國子之倅司右掌羣右之政令謂凡車右之長也虎資氏掌先後王而趨旅賁氏掌執戈盾夾王車而趨節服氏掌祭祀朝覲衮冕似於司馬無關方相氏掌儺以相視而攻疫者非一方故名方相太僕掌正王之服位出入王之大命小臣掌王之小命相王之小法儀祭僕掌受命于王以眂祭祀御僕掌羣吏之逆及庶民之復𨽻僕掌五寢之掃除糞灑之事似皆於夏官司馬無關於天官冡宰之屬則近之辨師掌王之五冕似宜屬春官司甲司兵司戈盾司弓矢繕人稿人戎右皆司馬之屬宜也齊右為祭祀陪乘道右掌前道車大馭掌馭玉路戎僕掌馭戎車齊僕掌馭金路道僕掌馭象路田僕掌馭田路馭夫掌馭二車校人掌王馬之政趣馬贊正良馬巫馬掌養疾馬牧師掌牧馬廋人掌十有二間之政圉師掌教圉人養馬圉人掌養馬芻牧之事右十五官似不必盡屬夏官恐亦有可併省者職方氏掌天下之地土方氏掌土圭之法懷方氏掌遠方之民合方氏掌逹天下之道路訓方氏掌道四方之政事形方氏掌制邦國之地域山師掌山林之名川師掌川澤之名邍師掌四方之地名凡九官於夏官司馬亦迂雖以之屬地官可也且亦多可併省以寬民力匡人掌法匡邦國撢人掌王志以語之天下邦國撢與探同言探王之志此二官似不宜屬司馬都司馬掌都之車馬兵甲戒令以聽於國司馬家司馬各使其臣以正於公司馬公司馬即國司馬陳及之曰司馬一官與軍政者半不與者半自大司馬至行司馬自諸子至旅賁氏自司甲至稿人自校人至圉師其他則環人戎右戎僕都家司馬皆與戎事者也自掌固至掌疆則司疆界者也自服不氏至掌畜則掌鳥獸者也自太僕至𨽻僕則左右侍御僕從者也自職方氏至撢人則掌輿地及四方諸侯外夷者也小子掌祭祀則係焉司爟掌行火則係焉候人掌賔客則係焉挈壺氏掌司夜則係焉司士掌朝儀則係焉辨師掌冠辨則係焉與夫齊右之屬射人之屬則又係焉夫既曰典軍政而官府錯居互相關係右夏官卿大夫士六百九十有一人府史胥徒工賈醫四千一百五十有二人不命之官凡四方相氏狂夫四人圉師乘一人圉人良馬匹一人駑馬麗一人家司馬各使其臣以正於公司馬秋官司寇乃立秋官司寇使帥其屬而掌邦禁以佐王刑邦國此本尚書周官司寇掌邦禁詰姦慝刑暴亂之説凡六十七官然書曰刑暴亂可也此曰刑邦國則非辭矣大司寇掌建邦之三典以佐王刑邦國詰四方小司寇掌外朝之政以致萬民而詢焉一曰詢國危二曰詢國遷三曰詢立君按此官亦可疑萬民豈可致之外朝耶如盤庚登進民于庭止於國中之民猶可也國危國遷與立君皆外諸侯之事其民豈得而致之耶國之危與遷及立君詢之卿大夫可也而詢之民何耶士師掌五禁之法宫禁官禁國禁野禁軍禁也鄉士掌國中各掌其鄉之民數而糾戒之遂士掌四郊各掌其遂之民數而糾其戒令縣士掌野各掌其縣之民數方士掌都家之獄訟訝士掌四方之獄訟凡六官次第甚明但胥徒太多耳朝士掌建邦外朝之法其曰凡報仇讎者書於士殺之無罪既書於士矣士何不正其罪殺之而縱其人自相仇殺耶司民掌登萬民之數司刑掌五刑之法以麗萬民之罪司刺掌三刺三宥三赦之法司約掌邦國及萬民之約劑司盟掌盟載之法凡五官亦有次第但盟恐非盛世事耳職金掌凡金玉錫石丹青之戒令其徒八十人似多亦不宜屬刑官司厲掌盜賊之任器貨賄此屬刑官可也犬人掌犬牲宜屬獸人雞人之列然犬亦豈所以名官耶司圜掌囚司圜掌收教罷民然徒百有六十人何多耶掌囚掌守盜賊凡囚者徒百有二十人亦多今世守囚未有滿數人者其害已甚若周盛時囹圄空虛而繁雜如此歟掌戮掌斬殺司𨽻掌五𨽻之法其徒至三百人五𨽻者罪閩蠻夷貉也罪𨽻蠻𨽻閩𨽻夷𨽻貉𨽻又各百有二十人盛時蠻夷於中國之王都何關而收𨽻如此之多不可曉也布憲掌刑禁禁殺戮掌司斬殺戮禁暴氏掌禁亂野廬氏掌逹國道路至于西畿蠟氏掌除胔蠟音措雍氏掌溝瀆萍氏掌水禁司寤氏掌夜時司烜氏掌取火於日取水於月烜音毁條狼氏掌執鞭修閭氏掌互柝互者今行馬柝即擊柝冥氏掌設弧張庶氏掌除毒蟲冗氏掌攻蟄獸翨音翅氏掌攻猛鳥柞氏掌攻草木剃他計反氏掌殺草硩他折反蔟倉獨反氏掌覆夭鳥之巢翦氏掌除蠧物赤叐氏音跋掌除墻屋蟈氏掌去蛙黽蛙即蟈黽者耿黽也黽莫幸反壷涿氏掌除水蟲庭氏掌射夭鳥按自野廬氏至𡨕氏凡九官宜分屬天官地官自庶氏至庭氏凡十一官皆主殺害禽蟲恐無此理銜枚氏掌司嚻伊耆氏掌杖咸大行人掌賔客小行人掌賔客之禮籍司儀掌擯相之禮行夫掌傳遽之小事環人掌送逆象胥掌夷國掌客掌禮牢掌訝掌等籍掌交掌節幣掌察掌貨賄凡十一官皆為賔禮設豈無可併省者且於義合屬春官夏官朝大夫掌都家之國治都則都士家士凡四官一律易氏曰秋官刑官也司寇掌刑而士師則掌禁自鄉士以至司𨽻用刑者也自布憲至銜枚氏用禁者也若大行人掌客之類疑於春官之掌禮者朝士掌交之類疑於夏官之掌政者右卿大夫士百三十有五人府史胥徒賈庶子二千七百三十有六人冬官考工記此本尚書周官司空掌邦土居四民時地利之説而名冬官鄭注云司空篇亡漢興購求千金弗得先儒據所聞記之王次點曰以周官司空之掌放之司空未可以為亡也夫周官言司空掌邦土居四民時地利凡經言田萊溝洫都邑塗巷者非邦土而何農工商賈市井里室廬者非居民而何桑麻榖粟之所出山澤林麓之所生非地利而何及考小宰言六官設屬各有六十今治官之屬六十有三教官之屬七十有八禮官之屬七十政官之屬六十有九刑官之屬六十有七意者簡編錯雜先儒莫之能辨遂以考工記補之其實司空一官未嘗亡也愚按周禮出於漢末鄭氏謂漢興購求司空篇不得恐未可信今以五官所餘之數合考工三十之數自可足本篇六十而謂先儒莫之能辨此豈難見之事而先儒莫之能哉或疑此書正因晚出故為錯脫以示其為古未知然否然五官之屬皆差互不倫非特司空一官而已也輪人為輪輪人為蓋輿人為車輈人為輈築氏為削冶氏為殺桃氏為劍鳧氏為鍾栗氏為量假氏闕函人為甲鮑人之事治革之工也字本作鞄韗人為臯陶字本作􅕦韋氏闕裘氏闕畫繢之事鍾氏染羽鍾聚也取其色之聚也筐人闕㡆氏練絲㡆言治之使熟也玉人櫛人闕雕人闕磬人矢人陶人旊人為簋椊人三為筍虡為飲器為侯廬人為廬器廬者總合衆體而成積竹為之取其堅固匠人三建國營國為溝洫車人為耒為車弓人弓有六材獨言角幹飭者膠漆絲為之輔而已也孔子刪詩定書繫周易作春秋此四書正經也禮記雖漢儒所集而孔門之中庸大學在焉樂記等篇亦多格言若周禮未知其何如夾漈鄭氏嘗謂周禮一書詳周之制度而不及道化嚴於職守而闊略人主之身後來求其説而不得或謂文王治岐之制或謂成周理財之書或謂戰國隂謀之書何休云或謂漢儒傅會之説乃劉歆作或謂末世瀆亂不驗之書林孝存作十論七難以排之至孫處又獨為之説曰周禮之作周公居攝之後書成歸豐而實未嘗行惟其未行故建都之制不與召誥洛誥合封國之制不與武成孟子合設官之制不與周官合九畿之制不與禹貢合凡此皆預為之而未嘗行也愚恐亦意之之言按周禮實漢成帝時劉歆始列之七略王莾時劉歆始奏置博士爾周禮始用於王莾大敗再用於王安石又大敗夾漈以為用周禮者之過非周禮之過是固然矣然未有用而效者恐亦未可再以天下輕試黃氏日抄卷三十
