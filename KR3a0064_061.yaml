body:
  text: 黃氏日抄卷六十一宋黃震撰讀文集三歐陽文詩顔跖總說處提顔子云豈減跖所榮跖本無榮顔本不當與跖較榮辱而歐公云爾全用所字斡意蓋跖自以為榮者若說跖之榮則非矣初讀疑之三味乃見黃牛峽詩不是黃牛滯客舟謂江惡舟遲常見此石在山也憶山詩說三峽江如自天傾岸立兩崖鬭哭曼卿謂才髙不少下闊若與世疏送惠勤詩敘東南宫居飲食山水之勝捨之而從我求仁義水谷夜行詩微風動涼襟曉氣清餘睡見平旦氣象極工此詩說蘇子美詩雄梅聖俞詩清班班林間鳩寄其夫人之詩也云易安由寡求此其為家之法暮春詩遊絲最無事百尺拖晴光有太平氣象牡丹圖有元化朴散之語然洛陽以此成俗而歐公初譜之亦助其瀾者也憎蚊詩始以乾坤廣大之語終以麟鳯不見之語詠微物而先以大者言之文法也掃庭露青天坐月䕃嘉木汝寧無他時忍此見迫促語意清絶矣寄題滄浪亭風髙月白最宜夜極切末借鴟夷言之﨑嶇世路欲脫去反以身試蛟龍淵豈如扁舟任飄兀紅蕖渌浪搖醉眠翻得絶佳菱溪大石一詩形容布置可觀文法紫石屏歌文之竒者也廬山髙詩文之豪者也橄㰖詩言忠愛答子華安無詩指陳治道之要者也橄㰖詩曰餳飴兒女甜遺味久則那奉答子華詩曰蠧弊革僥幸濫官絶貪昏牧羊而去狼未為不仁人梅聖俞寄銀杏詩鵝毛贈千里所重以其人鴨腳雖百箇得之誠可珍又七卷李侯家鴨腳云鴨腳生江南自注云京師無鴨腳李駙馬自南方移植蓋銀杏名鴨腳中原所無也今江南有草名鴨腳而此果則自名銀杏車螯一名車娥歐詩有泥居殼屋之語蚓無心八卷怪竹辨贈沈博士遵歌言琴調醉翁吟也云我昔被謫居滁上名雖為翁實少年前詩又云我時四十猶彊力自號醉翁聊戲客送吳生論改過甚暢樂哉襄陽人送劉從廣先序襄陽之勝而勉以德化其文騷以婉洗兒歌為聖俞作簡而徑夜聞風聲苦暑君勿厭初涼君勿歡暑在物猶盛涼歸嵗將寒云云不獨草木爾君形安得完此等善觀時變感慨有味白鸚鵡詩先將白兔說擺兩陳方合說又三節而終焉文法最可觀乾蝦字宇出清明前詩又酬聖俞韻歡情雖漸鮮老意益相親形容晚年交游之意最工頭魚海魚之大而謫死者歸田春夏詩有味殆田園雜興之祖歟明妃曲推手為琵却手琶是琵琶兩字也鬼車一首先序其聲之怪次述老婢撲燈之說以言其所以為怪終之不足怪而呼婢炷燈焉且亂之曰須臾雲散衆星出夜靜皎月流清光曲盡文章之妙矣讀書一首始言讀書之樂中言仕宦不暇讀而終之以乃知讀書之樂無限前後照映文亦甚妙鵯鵊者催明之鳥京師謂之夏雞贈李士寧一首文宏放感事四首闢學仙者之妄甚精切如曰一旦隨物化反言仙已成如曰等為不在世與鬼亦何殊升天檜一首其說謂老子自此乘白鹿升天如上虞劉樊升仙木之類也歐詩曰惟能乘變化所以為神仙驅鸞駕鶴須臾間飄忽不見如雲煙奈何此鹿起平地更假草木相攀緣乃知神仙事茫昧真僞莫究徒相傳齊州有舜泉四字丹書萬仭崖四句見戲石唐山隱者末章古賦蟬聲賦秋聲賦之脫灑病暑賦憎蒼蠅賦之布置皆當成誦山中之樂一首贈慧勤者摹寫變化亦一大竒論正統論費辭數千言不過進秦於三代秦果三代哉其說謂周之君臣稽首自歸於秦周果誠心授有德者哉謂桀紂不廢夏商之說則始皇未可廢秦始皇豈亦承祖宗深仁厚澤數百年素定之天下如桀紂雖不肖亦不得不以其祖宗之故俾襲世次者哉且其欲尊秦也則咎論者之私東晉私元魏然東晉豈不正於秦元魏豈不賢於秦而公切切然抑彼揚此者豈私秦哉秦何人而公私之哉豈難纍萬言世豈有以公故而謂秦三代者哉本論謂堯舜三代時禮義明佛不能入善矣復使當時其人已入其法不行則為確論今按佛生方當周之衰去中國極逺不相通至漢開西域而佛說久益盛至後漢以漸入中國者時勢則然非昔不能入而今可入也謂禮義者勝佛之本當修其本以勝之善矣然人不為佛之徒屋不為佛之居徒有其虛文浮傳於世如異說妖術之類則可使人講明禮義此之信不彼之信是為勝之今按齊梁元魏以來自萬乘以下尊事之人民歸其陷誘石祖夷狄以攻吾中國之仁義山川為其吞併立寨中國以朘吾民生之膏血雖有禮義已無所施顧反日講而修之則佛無所施奚必火其書廬其居又果何見也且公之為此說特譬之善醫者不攻其疾務養其氣耳獨不聞若藥不瞑眩厥疾不瘳乎客邪外毒深入心腹而不攻之去且立而視其死矣何氣之可養養氣之說特可施之攻疾已去之後疾已危劇氣僅一縷捨疾不攻而徒曰養氣亦何氣之可養乎甚矣攻佛法之害政昌黎之說盡之攻佛教之害人心晦菴之說盡之不能明言其所以害而徒疾聲大呼以泄其憤石徂徠之怪說盡之歐陽公所謂上續昌黎斯文之傳者正以闢佛一事然本論不過就昌黎改易新說而適以消剛為柔如閉關息兵惟敵之縱而曰我修政事者爾嗚呼殆所謂能言距楊墨者皆聖人之徒歟朋黨論謂君子有真朋足以解萬世人主之疑為君難論謂用人聽言專決之失在於違衆足以指萬世人主之迷易或問謂大衍筮占之一法繫辭非聖人之作穆姜道乾卦文言乃先夫子之生十五年筮占之法雖是而言則非蓍數無所配合隂陽無老少乾坤無定䇿乾用九坤用六皆謂以其所用者名爻春秋論謂學者不信經而信傳不信孔子而信三子隱公非攝趙盾非弒許世子止非不嘗藥亂之者三子也起隱公止獲麟皆因舊史而修之義不在此也卓哉之見讀春秋者可以三隅反矣泰誓論謂十一年伐紂即武王即位之十一年無文王稱王改元之說一惟取信於經縱囚論上下相賊字恐太甚要是三代後盛事若夫聖人不立異以為高不逆情以干譽則至論也神道碑墓志丞相文惠公陳堯佐神道碑潮州戮鱷魚壽州活饑民自出米為倡而浙堤錢塘薪土易竹籠石滑州築陳公堤治開封一以誠諭少年無犯法者凡公外庸之略如此為太常丞十三年不遷為起居郎七年不遷而十典大藩六為轉運使位極人臣壽八十二與伯仲堯叟咨己貴而諫議公省華尚無恙天下以陳氏世家為榮范文正公神道碑幼孤刻苦慨然有志於天下為諫官以爭廢郭后貶制西賊參大政碑中所著皆繫天下國家之大者王質神道碑盜殺其徒而自首原之所以疑壞其黨而開其自新若殺而不首既獲而亦原非法意文簡公程琳治益州燈夕火起預戒人救止不以白有言軍謀變者笑曰吾自知之卒無事治開封數嵗治益精明為三司禁中有所取未嘗豫為參政每宰相欲有所私輒衆折之西北宿重兵嘗任河北陜西之重威惠信著王文正神道碑槩言其為賢宰相而徐述其寡言笑善處大事數項終以不求恩澤晏元獻為相當元昊反請監罷軍無以陳圖授諸將此最革弊之大者余靖居四諫官之一使敵得其要領破儂智高經制五管十年移檄而交趾平張谷羸而能久冀褒贈以榮其親周太傅行三年喪歐公發越甚至唐介之父之墓發明有子之榮瀧岡阡表述其母記父之言謂祭而豐不如養之薄謂治死獄嘗求其生丁寶臣喪其兄三年薛奎舉進士為州第一以讓王嚴析富人資為三以嫁其三女治蜀尹京寬猛異施參大政慚不及古人而懼後世譏歐公與王拱辰皆其壻也王拱辰之父為潁州司法有朱氏殺盜當死公曰為法所以輔善而禁惡也今殺良民為惡盜報仇豈法意耶蔡君謨之弟君山志自無狀有一節深一節文法極可觀志黃夢升文法亦類之志薛簡肅之子質夫死而無後論自古賢人君子未必有後其功德名譽垂世而不朽者非皆因其子孫而傳為善者可以不懈為簡肅公者可以無憾發明精切志尹師魯天下未必盡知其材其言哀痛歐陽載誅浮圖誘民投水者杜杞平蠻殺降公於程文簡既為神道碑又志其墓杜祁公墓志公越人葬應天府三代皆顯官家故饒財然愚按邵氏聞見録謂其貧依濟隂宰蓋初年流落事也尹源師魯之兄梅讓者詢之兄堯臣字聖俞之父蘇舜欽字子美祁公之壻以祠神㑹廢居滄浪今蘇州韓園也鎖聽事載其志云鎖其聽去舉進士王堯臣體量西事薦用韓范安撫涇原言將不中御權三司使去蠧弊積錢數千萬為樞密副使裁損濫恩吳育治開封京師肅清元昊反獨言其不足責李端懿大長公主之子每曰士起寒苦以學行自名至牽利欲遂亡其所守况驕佚易習而生長富貴間耶許元長於治財先是錢不足償賈人入粟塞下者少公請髙塞粟之價下南鹽以償之使東南去滯積而西北之粟盈曰此輕重之術也嵗漕不給治千艘浮江而上所過州縣留三月食其餘悉發而州縣之廪逺近以次相補由是不數月京師足食而為司十三年餘粟百萬不獻羡餘孫甫字之翰在諫院多直言雖為杜祁公所薦尹洙所善言之不避梅聖俞窮而工詩江鄰幾亦長於詩薛長孺良孺墓志皆簡肅公奎之猶子徂徠先生墓志葬五世未葬者七十喪作慶厯詩褒貶大臣太學之興自先生始樞副胡宿墓志興湖學築塘封還揚懷敏詞頭清儉謹重發不可回而其要歸於忠厚少嘗善一浮圖謂有祕術能化瓦石為黃金公曰非吾欲也蔡君謨志諱襄四諫官之一救唐介知泉福有惠政興學校經術定表制禁蠱毒教醫藥治京談笑無留事治財纎悉皆可法不書溫成皇后碑劉敞仲原志知制誥封還石全彬詞頭奉使知敵山川諫仁宗受尊號治揚鄆永興皆有惠政博學無不通一揮九制三十七卷皆宗室墓志無一壽者狀蔡齊行狀倅濰州有刻稅印者緩其獄丁謂欲邀致相拒不受不為太后記景德寺知密州除公稅弛鹽禁沮惕太妃垂簾辨荆王獄勸納叛蠻不聽後為亂契丹兵屯幽州公料其必不動狀之終曰按兵部尚書於今為三品其法當諡敢告有司然則行狀為諡議設也不著三代姓氏許逖行狀諭邊事趙普稱之知興元修蕭何山河堰諭京湖蠻知揚州笞子弟不法者曰此非吏法乃代汝父兄教也記泗州先春亭記先敘其修堤次餞勞之亭次通漕之亭然後歸先春亭而證以單子過陳見其川澤不陂梁客至不授館羈旅無所寓之說謂皆三代為政之法而張侯之善為政也夷陵縣至喜堂先敘其儉陋次敘朱侯能變其俗次自敘得善地而忘其憂峽州至喜亭記敘岷江之險舟人至此而喜御書閣記為登真宫作也善回護而不主佛老之說畫舫齊記始言為燕居而作次反言舟之履險而終歸舟行之樂三節照應王彥章畫像記述其以竒取勝以嘆時事文字展轉不窮榖城縣夫子廟記釋奠有樂無尸而釋菜無樂皆禮之略者今於其略者又不備焉吉州學記思見道化之成豐樂亭記叙滁於五代被兵而今無事以歸德於上醉翁亭記以文為戲者也滁州菱溪石記僞吳時貴將劉金園石六公取其二尚存者置郡治因以劉氏興衰為戒使後來者不復取而去海陵許氏南園記許子春以發運使治七十六州之材治數畝地以為園不足施其智亦不足書而紀其三世孝悌之迹庶幾園有連理駢枝之木不爭巢不擇子而哺之禽鳥焉真州東園記為發運使施正君許子春判官馬仲塗三人相得而作記園池之勝皆疇昔榛莽浮槎山記取陸羽茶經善論水以山水為上江次之井為下浮槎乃山水之亂泉漫流者張又新載劉伯芻李季卿列水次第不次浮槎而次龍池為非有美堂記天下之兼得其至美與其樂者惟錢塘而錢塘之兼美惟有美堂盡得之相州晝錦堂記載韓公大節出晝錦之榮之外仁宗御飛白記因子履得御賜而及朝廷一時之盛峴山亭記記羊叔子遺風序章望之字表民序列一鄉一國以至天下萬世之望祕演詩集序惟儼文集序二僧皆石曼卿故交因曼卿而序之詩譜後序載慶厯四年始得詩譜於絳州而補正之謂先儒之論非悖理害經悖理害經者不必相詆訾盡其說而不通然後得以論正集古録目序論犀象珠玉皆難得之物而好之者無不至古刻字書非難得而不至者好之不力也自序好之專一終不以彼易此蘇氏文集序為子美作傷其不遇鄭荀改名序論諸子獨荀卿好聖人學荀卿而又進焉則孰能禦韻總五篇僧鑒聿所類序其用心之專送楊置序言學琴於孫道滋其樂可以忘疾送曽鞏試黜而歸不非同進不罪有司思廣其學而堅其守田畫之祖為將平蜀江南有功天下既定而畫以白衣試有司因與之登夷陵慨然覽王師嚮所用武之山川謝氏詩序謝景山母好學通經女弟希孟能詩送張唐民歸青州序三代王道備士生其間故多賢後世士有賢者尤可貴於三代之士送王陶序君子之用剛審力視時而又深戒於其初孫子後序注孫子者三家曹公杜牧陳皥而梅聖俞復為之注梅氏詩集謂非詩之能窮人殆窮者而後工也惜聖俞幸生盛世老不得志而為窮者之詩宋祕丞宣獻公之子不以門地驕人學問好古常若不足送徐無黨死而不朽者惟修於身其次施於事勤一世盡心於文字間者可悲也廖倚謂無龜書出洛之事外制集序仁宗用韓富范鋭意太平公知制誥禮部唱和序從王著考貢士六千五百絶不通人者五十日因相為歌詩以宣其底滯內制集序論青詞齊文用釋老之說祈禳祕祝近里巷之事而制誥拘於四六果可謂之文章歟帝王世次圖闢太史公本紀之失凡帝王事可法於後世者孔子蓋論著之矣久逺難明不知不害為君子者不道也思頴序歸田録序皆志求閒之意但歸田序有不能依阿取容一語雖反說以譏世理恐未安六一居士傳記藏書一萬卷集録金石遺文一千卷琴一張棊一局酒一壺與己為六一以軒裳圭組為纍而以老於五物之間為適書通進司上書言治西賊三事其一曰通漕運乞浚治汴渠求裴耀卿所開陸運十八里泝河而入渭以通水運又自武昌漢陽襄郢沿漢十一二州漕物頓之南陽為輕車置十五六鋪以入關以通陸運其二曰盡地利乞驅游手及鄉兵以耕閒田其三曰權商賈謂大商不妬販夫之分其利今國家反妬大商之分其利欲專而反損準詔言事上書謂非無兵無將無財無禦戎之䇿無可任之臣而患不謹號令不明賞罰不責功實答陜西安撫范龍圖辭辟命謂非惟在上者以知人為難士雖貧賤以身許人固亦不易答李詡書言性非學者所急且釋中庸率性謂性無常必有以率之亦異乎諸儒之為訓矣上杜中丞論舉石介為主簿尋被罷而不爭議論婉切極可觀與曽鞏論氏族謂考於史記皆不合䇿問周禮六官之屬五萬餘人如其不耕而賦何以給之疑中庸誠明之說恐未安又疑大傳生卦之說周禮詢事讀法一嵗凡幾疑官不得安其府民不得安其居祭文祈晴雨祭文外集詩多與尹師魯梅聖俞作云師魯天下才又詩云聖俞翹楚才嘗答聖俞詩云文㑹沗余盟詩壇推子將公以文自任謂詩不及聖俞也捕蝗詩言蝗當早捕或以踐苗為戒而不捕者非落頭鮮均州俗好腐魚落頭鮮見第六卷送黃通之詩贈王介甫詩翰林風月三千首吏部文章二百年老去自憐心尚在後來誰與子爭先見第七卷凡八句致仕後詩尤灑落見第七卷賦螟蛉賦謂儒家之子卒為商世家之子卒為皂𨽻是螟蛉之不若也此為感慨餘不及此州名急就章以州名叶韻自一字至二十四字惟髙富瀧當四州偶遺論時論三篇原弊言農兵儲言屯耕塞垣言邊界石鷁論謂左氏以石隕為星鷁退為風公羊言視石數鷁而次其言榖梁言微物而謹紀其數皆非也三年無改問謂蹈道則未愚按夫子之言甚明無可辨者今以其喪服言恐非本旨易或問謂繫辭非聖人之言詩解自是一家墓志銘祁公碑銘云負材與畜德者所享不同楊公志始分𢎞農之籍籍錢塘先君墓表母述其言謂祭必泣曰祭而豐不如養之薄也御酒食又泣曰昔不足而今有餘其何及也為吏夜燭治官書曰求其生猶失之死而況世常求其死也記樊侯廟災記盜有刳神像之腹者既而大雨雹人咸駭謂神怒公謂侯不能保其心腹腎腸而反貽怒於無罪之民風霆雨雹天所以震耀威罰有司者侯又得以濫用之耶豈適會民之自災也邪愚謂公正論也不必更設疑辭耳東齊記為河南主簿張應之作也謂閒居平心以養思慮故曰齊每體之不康則取六經百氏若古人述作之文章誦之愛其深博閎達雄富偉麗之說則必茫乎以思暢乎以平釋然不知疾之在體愚謂此公自得之趣託之以發者也偃虹堤記洞庭天下之險而嶽陽荆潭黔蜀四會之衝也以百步之隄禦天下至險不測之虞惠其民而及於荆潭黔蜀凡往來湖中無逺邇之人皆蒙其利焉則滕侯之惠利可以數計哉夫事不患於不成而患於易壞自古賢智之士為其民捍患興利其遺跡往往而在使其繼者皆如已往之心則民到于今受其賜天下豈有遺利乎大明水記陸羽茶經論山水上江水次井水下未嘗品第天下之水味至張又新為煎茶水記始云劉伯芻謂水七等又載羽為李秀卿論水有二十種水味有美惡而已欲求天下之水一一而次第之者妄說也羽論水惡渟浸而喜泉源故井取汲者江雖長然衆水雜聚故次山水惟此說近物理云三琴記吾家三琴其一金暉一石暉一玉暉金暉聲暢而逺石暉清實而緩玉暉和而有餘然惟石暉無光置之燭下黑白分明老人之所宜也琴曲不必多學要於自適琴亦不必多藏然已有之不必棄序送方希則序希則茂才入官三舉進士不利昔公孫嘗退歸鄉人再推射䇿遂第一更生書數十上每聞報罷而終為漢名臣以希則之資材識業而沈冥鬱堙者豈非天將張之而固翕之耶夫良工晚成者器之大後發先至者驥之良異日垂光虹霓濯髮雲漢使諸儒後生企仰而不暇此固希則禇囊中所畜爾送陳經秀才序隋煬帝初營宫洛陽望邙山南望曰此豈非龍門耶世因謂之龍門非禹貢所謂龍門者也然山形中斷巖崖缺呀若斷若鑱山兩麓浸流中可以登髙顧望自長夏而往才十八里然洛陽多達官不可輒輕出幸時一往則騶奴從騎吏屬遮道唱呵後先前儐旁扶登覽未周意已怠矣故非有激流上下與魚鳥相遨遊徙倚之適也然能得此者惟卑且閒者能之送楊子聰序河南大府也參軍欲進自達不可得其間能以頭角頎然而出者鮮矣其才能之美非有異乎衆莫能也其能出其頭角矣若去而之他州郡不特頎然而出矣送廖倚序元氣之融結為山川山川之秀麗稱衡湘其蒸為雲霓其生為杞梓人居其間得之為俊傑秀才生衡山之陽而秀麗之精英者得之猶多故其文則雲霓其材則杞梓送梅聖俞序至寶潛乎山川之幽而能先羣物以貴於世者負其有異而已士固有潛乎卑位而與夫庸庸之流俯仰上下然卒不混者其文章才美之光氣亦有輝然而特見者矣梅君聖俞其所謂輝然特見而精者耶余嘗與之徜徉於嵩洛之下每得絶崖倒壑深林古宇則必相與吟哦其間始而歡然以相得終則暢然覺乎薰蒸浸漬之為益也刪正黃庭經序無仙子自號無仙以警世人之學仙者也禹走天下乘四載治百川可謂勞其形矣而壽百年顔子蕭然卧於陋巷簞食瓢飲外不誘於物內不動於心可謂至樂矣而年不及三十蓋命有短長禀之於天非人力之所能為也惟不自戕賊而各盡其天年則二人之所同黃庭經者魏晉間道士養生之書也世人執竒怪訛舛之書欲求生而反害其生者可不哀哉若大雅君子則豈取於此傳易圖序謂今周易所載非孔子文言之全皆出乎講師臨時之說且謂今行世者惟有王弼易其源出於費氏孔子之古經亡矣愚謂此公一人之言爾月石硯屏歌序張景山虢州治石橋一石中有月形石色紫而月白月中有樹森森然其文黑而枝葉老徑雖工畫者不能為傳桑懌傳懌開封雍邱人舉進士再不中耕汝頴間歲凶汝旁諸縣多盜懌白令召少年戒盜不可為少年皆諾有老父死未斂盜脫其衣懌疑少年王生者夜入其家探其篋不使知覺明日縳之詰共盜者送縣皆伏法又嘗之郟城遇盜獨格殺數人又聞襄城有盜十許人獨提一劔以往殺數人縳其餘汝旁縣為之無盜京城轉運司奏其事授郟城尉俘惡盜王伯明道景祐之交有惡盜二十三人不能捕樞密院召懌至京使名捕懌變為盜服入一媪家饋之如盜媪以為真盜稍就語及羣盜曰彼聞桑懌來皆遁矣又聞懌閉營不出今皆還某在某處懌盡鉤得之部分軍士凡二十三人一日皆獲交趾獠叛殺海上巡檢往者數輩不能定因命懌往盡手殺還授閣門祗候讓不受豫謂曰讓必不聽徒以好名取譏懌歎曰譏何纍若欲避名則善皆不可為已卒讓之書上范司諫書謂天下事惟宰相可行惟臺諫可言然臺諫失職取譏百世所繫尤重司諫之赴召人已期其必為諫官為諫官矣乃久不言士平居患不得言得言矣乃有待是終無一人言也鋪叙有法與昌黎諫臣論相表裏與張秀才書謂市之門旦而啓商者趨焉賈者坐焉持寶而欲價者之焉賫金而求寶者亦之焉閒民無資攘臂以游者亦之焉洛陽天下之大市也來而欲價者有矣坐而為之輕重者有矣子居其間其官位學行無動人也是非可否不足取信也其亦無資而攘臂以游者也又書云生於孔子之絶後而反欲求堯舜之已前所謂務髙言而鮮事實者也夫二典之文豈不為文孟軻之言道豈不為道而其事乃世人之甚易知而近者蓋切於事實而已與石推官攻其書法之怪與髙司諫書攻其不救范希文也云希文平生剛正今以言事觸宰相足下不能為辨其非辜不過作一不才諫官爾乃反昻然自得毁其賢以為當黜夫力所不能為乃愚者之不逮以智文其過此君子之賊也且希文果不賢耶當其驟用時何不一為天子辨其不賢待其自敗然後隨而非之若果賢耶則今日天子與宰相以忤意逐賢人足下不得不言是則足下以希文為賢亦不免責以為不賢亦不免責前日又聞御史臺榜朝堂戒百官不得越職言事是可言者惟諫官爾若足下又遂不言是天下無得言者也昨日安石貶官師魯待罪足下猶能以面目見士大夫出入朝中稱諫官是不復知人間有羞恥事若猶以希文為不賢而當逐則豫所言乃是朋邪願足下直攜此書於朝使正豫罪而誅之使天下釋然知希文之當逐亦諫臣之一效也此書既上髙若訥果以聞於朝而公貶夷陵令與尹師魯書公貶後作也云五六十年來天生此輩沈默異怪布在世間相帥成風忽見吾輩作此事下至竈間老婢亦相驚怪交口議之不知此事古人日日有也每見前世有名人當論事時感激不避誅死及到貶所則戚戚怨嗟有不堪雖韓文公不免此纍用此戒安道慎勿作戚戚之文師魯無修此語則處之之心又可知矣爭氣與謝景山書荀子曰有爭氣者不可與辨答孫正之書三十年前尚好文華嗜酒歌呼聖人為樂而不知其非也及後少識聖人之道而博其經咎則已布出而不可追矣與王源叔問古碑字縣有古碑圖經以為儒翟先生碑其題額乃云喜儒學先生碑學字疑非翟字莫有識者說文亦不載與陳員外書言狀牒之原古惟鉛刀竹木而削札為刺止達姓名寓書於簡止為問好官府公事上而下者曰符曰檄下而上者曰狀位等相往來曰移曰牒非公事以意曉下曰教下以私自達其長候問請謝曰箋記書啓唐世稍增始於刺謁有參候起因為狀五代始復以候問請謝加狀牒之儀如公事肩從齒序答宋咸書聖人之言在人情不逺答陳知明書士之相知不必接其迹也問王深甫唐時有五月一日會朝之禮祝文祈雨旱非人力之能為雨者神龍之所作譜歐陽譜圖序少康封庶子守禹祀是為越至句踐五世孫無疆為楚所滅楚封其子蹄於烏程歐餘山之陽為歐陽亭侯子孫遂以為氏其後居千乘者所謂歐陽生居渤海者所謂渤海赫赫歐陽堅石堅石名建趙王倫之亂見殺其族南奔長沙至歐陽琮為吉州刺史因家吉州琮八世生萬又為吉州安福令而歐陽公之祖始居沙溪沙溪分屬永豐公初孤母攜居隨州老居潁州惟葬母嘗一歸吉州時年四十七硯譜端石出端溪本以子石為上俗訛以紫石為上然十無一二發墨者歙石出龍尾溪以金星為貴有鋒鋩者尤佳大抵多發墨端又以北嵓為上龍尾又以深溪為上較其優劣龍尾逺出端溪上相州古瓦朽腐不可用今人澄泥作瓦埋土中久乃用為硯凡瓦皆發墨優於石記跋洛陽牡丹記洛陽於牡丹不名而直曰花以名之著不假曰牡丹而可知也其品曰姚黃曰魏紫曰細葉壽安曰鞓紅曰牛家黃曰潛溪緋曰左紫曰獻來紅曰葉底紫曰鶴翎紅曰添色紅曰倒暈檀心曰朱砂紅曰九蘂真珠曰延州紅曰多葉紫曰粗葉壽安曰丹州紅曰蓮花蕚曰百兩金曰鹿胎花曰甘草黃曰一㩎紅曰玉板白洛陽至東京六驛舊不進花其進自留守李迪始花不接不佳其接以社後重陽前花木去地五七寸截之乃接封以堆蒻葉作菴罩之南向留小户達氣至春乃去此接花法也種花盡去舊土以細土用白斂末一片和之以殺蟲之食根者此種花法也澆花用日未出或日西時九月旬一澆十月十一月三二日一澆正月隔日一澆二月一日一澆此澆花法也花每生每去其小者止留一二朵花落即剪其枝勿容結子春初去蒻菴即護以棘使氣暖此養花法也讀李翺文謂韓愈嘗有賦不過羡二鳥之光榮歎一飽之無時爾翺為幽懷賦慮行道之猶非又怪神堯以一旅取天下後世子孫不能以天下取河北為憂然公蓋有感之言也論尹師魯墓志謂述其文曰簡而有法惟春秋可當述其學曰通知古今惟孔孟可當愚意文簡有法各隨其宜豈必春秋通知古今各隨其分豈必孔孟未聞文王諡文而孔文子不可謂之文也公與師魯平生交而故為譏貶何哉俄又云然在師魯猶為末事若果末事何必春秋然後可當孔孟然後可當愚恐其首尾又自背馳也書荔枝譜後牡丹花之絶而無甘實荔枝果之絶而非名花二者不兼萬物之美故各得極其精跋學士院題名云宰輔有任責之憂神仙無爵祿之寵既都榮顯又享清閒惟學士也頃俾參政却思玉堂如在天上題青州山齊不意平生想見而不能道以言者乃為己有程文斫雕為朴賦第四韻結聨云圭磨嶽鎮歸璞玉以全真罍去山雲表瓦鐏而務德愚恐無此理鎮圭雲罍古人制度非漢人之所斫雕且斫雕者史臣形容反朴之意然爾三皇設言民不違論破題即云夫至治之極也塗耳目以愚民之識暢希夷以合道之極然則歐公初年其學亦自黃老來也易童子問不赦者良醫之針石赦者奔馬之委轡出䇿問公自述其見也然世有伊川傳矣至繫辭則謂與文言說卦皆非聖人內制自序近體不可言文章其論髙矣繼言集録以備退閒檢視嘆士大夫之盛衰幾於世俗之論殊無謂也表狀啓謝宣召入翰林狀使車入里君命在門閭巷驚傳豈識朝廷之故事搢紳竦歎以為儒者之至榮恩既異於常倫人愈難於稱職乞出表狀多怨蔣之竒彭永思之攻己詆斥語多不平繼乞根究飛語之所從來事卒得直二人貶而公亦出乞出表退止一辭今臣三請云云老將疾以偕來形與神而俱瘁昔而少健黔驢之伎已窮今也病衰駑馬之疲難强始露肺肝之懇乞收骸骨歸又忠信所以事上理無弗踐之空言進退各有其宜力或不能而當止雖禮者引年之制必待及時而身有負薪之憂亦容辭仕又口誦退休之言身貪榮進之寵既自違於言行豈不愧於心顔雖聖度之兼容必公議之難遏必也處之無愧然後得以為榮上胥學士意啓等皆少年之作一句一故事非晚年明白言意者比回李舍人惟帝制之坦明必訓辭之深厚金相玉振煥三代之文章雷動風行警四方之耳目遂歸鴻筆增重本朝奏議論麟州事宜謂有之則困河東棄之則失河外莫若擇一土豪委之自守非王吉不可茍善守則世任之愚謂此古要荒之法而我太祖禦西北邊之故智也安邊之䇿莫此為上河東一路實收錢自足支遣乞罷鑄鐵錢毋誘民犯死河東緣邊地禁不耕而仰糴北界陳四害乞耕禁地契丹劉三掇自向化南歸陳可納者五上時宰書論河北地産謂東負大海鹽稅弛以利民西有髙山産寶又官禁不取惟有平地可耕者又少所助不過酒稅而用度無常及用不足則不過上干朝廷乞銀絹而配疲民號為變轉爾惟官減費移有無尚可禆萬一論韓范杜富相繼罷黜小人必讒為朋黨專權者論兩制以上罷舉轉運使副省府推判官皆因仲淹等出外欺妄攻擊論契丹侵銀坊冶谷地界乃為元昊所敗慮我乘虛必解仇復合此將來之患不可不憂薦王安石吕公著充諫官論罷修奉先寺等謂紀綱隳頽未能整緝而務修祠廟託名祖宗張大事體要所歸止為小人圖利睦親宅神御殿於禮不宜乞寢罷慶基殿只令三司整補不理勞績奉先寺乞勒寺家自修乞不幸溫成廟論陳執中不學無識乞罷相論狄青得軍情有訛言乞罷樞使皆極言無隱如指斥己死之姦此時公為法從非居言職也而言若此可謂無負論思之選矣嗚呼執中不以官職為房奩物狄青不以智髙難辨之骸欺朝廷自今觀之皆庶幾大臣之事者而公與同朝略不少恕後世具位之臣豈復有執中狄青之比而稱功頌德者同然一辭亦果何哉第四卷三狀並論修河謂故道淤髙水不然行故決惟當順導防捍之李仲昌小人主修六塔河之說不可用水災疏乞立皇嗣去狄青用五行傳簡宗廟則水為災及水隂類武臣亦隂類為說再論水災乞用包拯張瓌吕公著王安石并乞安撫京東西及住上供米救兩浙旱論賈昌朝除樞密劄子謂聽言在先察毁譽之人陛下用昌朝雖斷自聖心亦左右積漸稱譽之力此語極道得婉而切第六卷乞編學士院制詔須朝廷降指揮所貴久逺遵行論郭皇后影殿說內臣監修利於偷竊官物僥求恩賞故多起事端務廣興作論選皇子說兗國公主既出降今誰與語言可承顔色此善於乘機之論也封回梁舉直內降論舉直不欲受過於其身寧彰陛下之過於中外此罪重於元犯乞刪去九經正義中䜟緯議學狀云人之材行若不因臨事而見則守常循理無異衆人茍欲異衆則必為迃僻竒怪以取德行之名愚謂此天下名言也觀近世徐霖輩可見論日厯狀元修撰之官惟據諸司供報而不敢書所見聞又撰述既成必録本進呈今乞並考驗事實及乞更不進本許懷德不進第二讓官表歐公再論之不恕乞定兩制員數謂官以難得為貴人以得職為榮論包拯連逐三司使張方平宋祈代其位蹊田奪牛豈得無過整冠納履當避可疑拯雖本無心而今後言事者不為人信諫諍之效因拯而壞為朝廷惜論舊納茶稅今變租錢其害五論均稅希旨額外生數乞罷均論臺諫官唐介等早牽復謂方今諫人主易論大臣難介等因言大臣得罪不悔王陶因韓絳薦舉與絳爭議徇公滅私乞召還介等薦布衣劉羲叟蘇洵陳烈舉胡瑗居太學梅堯臣充直講蘇軾應制科章望之曽鞏王回充館職劉攽吕惠卿充館職乞與尹洙孤子構一官皆汲汲人材忠厚盛心也蘇洵舉詞謂履行淳固淳字似未切或者學雖縱橫而操履自正謂惠卿端雅豈其初年心術未露亦飭躬盜名者耶辭侍讀謂學士相承多兼此職云學士俸薄朝恩添請官以人輕一至於此其再辭謂既已陳述若不踐言則貪榮冒寵不止尋常之責而虛辭飾讓又為矯僞之人辭給事中謂自以疾病求罷豈可又轉一官乞洪州凡上七劄拳拳以乞便營緝墳墓為言論權貴子弟衝移選人聖躬康裕乞許臣寮上殿水入大社乞專大臣充修大社大稷使契丹求御容既已許之不可中止祀儀十七祭並乞據開寶通禮自外而內乞禁舉人懷挾論西班之濫干求內降人乞加本罪二等乞相度權住所開孟陽新河謂所掘墳墓骨殖子孫環守號慟其甚貧者用火燒焚是中原風俗皆以焚骨為痛今鎮江一帶望近淮鄉已無火化者以火化其親惟浙間數郡愚民耳又云所開新河入白溝河下源髙仰水勢難行保舉人行止乞指定乞館職官用崇文總目將見缺書於三館取索校定乞罷放燈禁雕文字學士院舉臺官只獨員不肯隨衆同舉舉丁寶臣因遭儂賊事停官也馬政劄子云唐世牧地西起隴右金城平涼天水外暨河曲內則岐豳涇寧東接銀夏又東至樓煩皆唐養馬之地今河東嵐石間及汾河之側乃唐樓煩監地又狀只據見在草地打量已為民間侵耕地上更不根究論逐路取人劄子謂王者無外天下一家盡聚諸路貢士混合為一而惟材是擇若逐路分取則東南之人合格而落者多矣西北之人不合格而得者多矣乞奬用孫沔謂慶厯罷兵二十餘年經用舊人惟孫沔在言西邊事宜謂祚諒必叛今人謀武備非慶厯時恬不知兵之比當以五路之兵畨休出入移前日所擾我者擾之論館職兩劄謂取士之失在先材能而後儒學先吏事而後文章愚謂儒學非止館職文章之謂或者公之門庭然歟翰林學士為內制中書舍人知制誥為外制并雜學士待制通為兩制館職三路進士髙科大臣薦舉嵗月疇勞論青苗兩劄有曰田野之民不知周官泉府為何物但見官中放債每錢一百文要二十文利爾又曰夏料錢春中俵散青黃不接以為濟惠尚有說焉秋料於五月俵散正是蠶麥登熟何名濟闕直放債取利爾乞散錢不取息乞秋料罷而不散此簡切語也辭吏侍三劄英宗踐祚恩也乞出共七劄主濮議為吕誨諸人所攻也謝手詔兩劄䝉宣諭復留也乞出劄辨臺官所論隂醜事也乞致仕劄既得請守亳因以疾辭也上殿劄明司馬公乞立英宗不自言功也辭青州劄自亳州得除也辭兵部尚書劄領青州而辭其所除官也乞青州劄既到青州一年後也辭太原府劄自青州易鎮時也乞致仕劄到太原申前請也次劄援太宗時太常少卿孔承恭年六十一致仕自是歸老潁上而奏議終矣奏事録記仁宗四十年不御爐不揮扇至嘉祐八年設爐火而上益不豫濮議歐陽晚年之鬱鬱者被隂私之謗也時議之謗及隂私者激於公主濮議之力也而公之主濮議深苦至集為濮議者四卷録其次第又設為或問以發明之然滔滔數萬言皆以禮記為所生父母降服一語為未嘗因降服而不稱父母耳然既明言所後者三年而於所生者降服則尊無二上明矣謂所生父母者蓋本其初而名之非有兩父母也未為人之後以生我者為父母已為人之後以命我者為父母立言者於既命之後而指本生之稱自宜因其舊以父母稱未必其人同此一時並稱兩父母也公亦何苦力辨而至於困辱危身哉况帝王正統相傳有自又非可常人比耶崇文總目易類易三家田何焦贑費直也田何傳施孟梁丘最盛至後漢陳元鄭衆康成傳費易而田易亡及王弼為注亦用卦象相離之經其傳至今書類伏生所傳為今文尚書孔惠所藏屋壁安國所定者號古文尚書陳隋間孔傳獨行晉梅賾以伏生舜典足其篇唐孝明不喜𨽻古更今文行於世詩類魯申公齊轅固燕韓嬰與河間毛公號四詩平帝時毛始列於學其後馬融賈逵鄭衆康成皆毛學禮類漢興禮出淹中后戴諸儒補綴得百餘篇三鄭王肅之徒皆精其學樂類樂之沿革惟見史志春秋類公羊髙榖梁赤左丘明鄒氏夾氏自漢惟三家盛行于役志貶夷陵時行程也歸田録太祖初幸相國寺僧録贊寧奏見在佛不拜過去佛故至今焚香不拜李庶幾在餅肆中一餅熟成一韻太宗聞之大怒故孫何為第一馮道和凝同在中書和問馮新靴價馮舉左足曰九百和詬小吏吾靴何用一千八百馮徐舉右足曰此亦九百於是烘堂大笑舊制侍衛親軍與殿前分兩司自侍衛司不置馬步軍都指揮使而馬與步自分為二故與殿前司為三衙仁宗至和二年不豫兩府至寢閣問聖體見用漆唾盂素瓷盞藥衾褥皆黃紽色皆故暗宫人遽取新衾覆其上內中舊有玉石三清像在真遊殿而大內火遷玉清玉清火遷洞真洞真火遷上清上清火遷景靈景靈懼亟遷迎祥池水心殿都人謂之行火真君觀文殿是隋煬帝殿名張齊賢體肥大飲食至一大桶晏元獻清瘦如削筯卷半餅食之元獻幕客王琪骨立張亢肥大琪謂亢牛亢謂琪猴琪嘲亢曰張亢觸牆成八字亢應聲曰王琪望月呌三聲湯餅唐謂之不托晉束晢餅賦已有饅頭之稱淮南糟蟹一器數十蟹以皂策半挺置其中則經嵗不沙愚頃見吳司户良弼云蟹掩入椒一粒不沙樓稅院瑛云蟹以夜糟不沙併記於此歐公又載翡翠盞屑金又犀解為小塊紙褁置懷中待熱急搗應手如粉澎浪磯訛為彭郎小孤山訛為小姑而謂彭郎為小姑之壻小姑立廟封聖母愚往嵗聞平江村落有伍子胥廟訛為姊夫杜拾遺訛為十姨亦塑女形而村民為併廟云嫁姊夫世所謂神類此者衆詩話國朝詩僧九人進士許洞會之分題出一紙約曰不得犯此一字其字乃山水風雲竹石花草雪霜星月禽鳥之類於是諸僧皆閣筆筆說老氏說謂老氏比諸子為簡要愚觀老氏首言道可道非常道又曰可道非道是首破天下萬世常行之理而後來之蕩空者皆從而衍之也又謂其核見人情尤精愚觀其翕張豫奪皆揣摩之術也又謂其治人之術為至愚觀其卑退不爭又鉤致之術也公之譽老氏者三說似皆可疑富貴貧賤說貧賤常思富貴富貴必履危機惟不思而得既得而不患失者其庶幾乎愚謂此公涉世之言鐘說聲在木乎在銅乎果在空器之中乎愚謂此禪家風幡之說也兩物相應造化自然初無可議學書靜中至樂說不寓心於物者真所謂至人也寓於有益者君子也愚按寓於有益主學書也君子則自謂也而又有羡於至人則老莊之說先入為主也夫至人者莊子創為戲言以薄聖人非果有其人也至人之次為真人其後有秦始皇魏大武嘗實其名而至人則至今未聞也何羡之有菊說家菊性涼味甘野菊性熱味苦道無常名說謂道無常名所以尊於萬物此不可曉愚恐道流行於萬物間非别為一物在萬物之上也試筆琴枕說老莊之徒多萬物以盡人情信有心也哉愚不知何說王文康公戒子弟吾平生不以全幅紙作封皮佛書數十萬言可數談而盡愚謂此名言也佛書初無可言多作提頭敷衍耳樂府皆艷詞也集古録多收墟墓碑間有事迹與史不同者以證史之訛缺自後漢以來公卿之門生故吏始立碑頌德以伸感慕至唐而子孫立碑茍有可以用於世不必皆聖賢之作蚩尤作五兵紂作漆器不以二人之惡而廢萬世之利也篆字出於李斯亦然梁書言武帝得王羲之所書千字命周興嗣以韻次之今法帖有漢章帝百餘字有海鹹河淡之類吳季子墓銘世傳孔子書按孔子未嘗至吳開元殷仲容摸搨以傳大厯中蕭定又刻於石碑者石柱耳古者刻石為碑謂之碑銘後世伐石刻文既非同柱石不宜謂之碑文元稹稱修桐柏宫碑甚無謂也漢有銀青金紫之號青紫者綬也金銀乃其印章綬所以繫印後世官不佩印此名虛設矣隋唐有隨身魚袋而青紫為服色所謂金紫者服紫衣而佩金魚耳李德裕立茅山三像老君孔子尹真人而自號上清𤣥都大洞三景弟子今之使額皆唐宦者之職社稷壇制見唐遷新禮記何仙姑衡州人晚年黑瘦一衰媪佛之徒曰無生者畏死也老之徒曰不死者貪生也死生天地之常理畏者不可茍免貪者不可茍得附録祭歐公文荆公東坡者極可觀吳充為行狀韓魏公為志銘皆與實蘇轍為神道碑不及也諭孔子文不在兹乎而敘及漢唐文字殊未安語亦有未安處如云秦人雖以塗炭遇之不能廢也又云嘉祐之政世多以為得不明言得者何事云厯七郡守厯七郡可矣既曰厯又曰守似贅豈刋本誤耶史傳凡四後二傳文方簡明事迹公之子發等所述公平生之行事備焉凡傳志皆取此其載唐書成公不肯看詳列傳宋公歎曰自古文人好相凌掩此事前未有也愚謂宋公文澀語苦歐公不欲分受後世之譏耳宋公感之益自知其文之不合於歐公也神清洞謝絳遊嵩山見峭壁有若四字云神清之洞疑古苔蘚自成文公之子棐知襄州曽布執政其婦兄魏泰來居襄占公私田園棐抑之坐貶後入黨籍歐公年譜公吉州永豐人綿州推官名觀之子四嵗而孤隨母鄭依其舅家於隨年十嵗借書李氏得昌黎文於敝簏中乞得之力學焉二十嵗自隨州薦名禮部二十四嵗當天聖八年以再薦魁禮部三十嵗責司諫髙若訥不救范文正坐貶夷陵令年三十四范公起為陜西經略辟公掌書記不就三十七知諫院三十八使河東四言麟州不可廢又使河北救降卒幾被殺者二千人三十九坐孤甥張氏置産事出知滁州四十二知揚州四十三移潁州樂西湖之勝將卜居四十四知應天州四十六丁母憂歸潁州明年歸葬母吉州冬復還居潁四十八為翰林學士兼史館明年上書論宰相陳執中出使契丹五十一知貢舉五十二知開封府五十三充御試詳定官五十四拜樞密副使又明年參知政事五十七輔英宗即位年六十爭濮議明年去國六十二知青州始令長子發築室於潁六十四乞知壽州更號六一居士明年致仕年六十六薨唐文三變至韓文公方能盡掃八代之衰追配六經之作嗚呼亦難哉文公沒未幾俳語之習已復如舊天下事創之難而傳之尤不易故治日常少而亂日常多蓋往往而然矣歐陽公起十嵗孤童得文公遺文六卷於李氏敝簏酷好而疾趨之能使古文粲然復興今垂三百年如公尚存時非有卓絶之資超絶前古疇克至此迹其文詞盎溫而自然暢達夫豈人力之所可强宋興百年元氣胥會鍾之異人固應然爾蘇文忠公繼生是時公實奬掖而與之俱歐陽公之摸寫事情使人宛然如見蘇公之開陳治道使人惻然動心皆前無古人矣然蘇公以公繼韓文公上達孔孟謂即孔子之所謂斯文此則其一門之授受所見然耳公雖亦闢異端而不免歸尊老氏思慕至人辨繫辭非聖人之言謂嬴秦當繼三代之統視韓文公原道原性等作已恐不同況孔子之所謂斯文者又非言語文字之云乎故求義理者必於伊洛言文章者必於歐蘇盛哉我朝諸儒輩出學者惟其所之焉特不必指此為彼爾黃氏日抄卷六十一
