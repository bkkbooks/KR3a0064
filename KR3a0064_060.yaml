body:
  text: 黃氏日抄卷六十宋黃震撰讀文集二栁文詩歌曲平淮夷雅天造神斷鏗鍧炳耀蕩人耳目威命是荷之荷音何注左昭七年弗克負荷平聲唐鐃歌鼓吹曲十二篇晉陽武獸之窮李密戰武牢王充建德涇水黃薛仁杲怒飛飢嘯奔鯨沛輔氏苞枿梁河右平李軌鐵山碎突厥突厥之厥九勿切靖本邦劉武周吐谷渾平聲李靖滅吐谷渾髙昌李靖滅髙昌東蠻既克東蠻謝氏圖蠻夷如王㑹咿嗢下乙骨切視民詩房杜貞符謂漢儒以瑞物為受命之符者非也惟人之初總總而生林林而羣交焉而爭暌焉而鬭力大者摶齒利者齧爪剛者决羣衆者軋兵良者殺然後强有力者出而治之而君臣什伍之法立於是有聖人曰黃帝堯舜禹湯武德實受命之符是故受命不于天于其人休符不于祥于其仁縱臾上子勇切下音勇出漢書衡山王傳賦佩韋賦謂讀古書覩直道守節者則壯之常懼過失中庸故作愚謂子厚所守者何節而懼其過耶韋注皮繩瓶賦謂鴟夷敗衆不如瓶之挹潔東坡注謂補揚子雲酒針之答居井之眉眉井邊也牛賦謂利滿天下肩尻莫保解祟賦豁天淵而覆原燎懲咎賦念往吝作閔生賦重華幽而野死兮世莫得其僞真豈本汲冢書之說歟夢歸賦惟夢之為歸佁擬上勑吏反下音毅反囚山賦曽不畝平而又髙側耕危穫井眢鳥丸切見宣十三年愈膏肓疾賦晏相謂不類柳文愚前年到浦東場有澶所作憚字讀今觀柳文鐃歌苞枿篇澶漫萬里宣唐風杜詩亦云澶漫山東二百州皆音憚散遠也音義與浦東所見並同論封建論生人之初羣聚而求治聖人因而撫之而賞罰廢置之遂因之為封建聖人不世出諸侯相吞而併于秦秦懲其弊而郡縣之世變使然也子厚之論是也其說固具於吕覽矣然因而撫之者與天下為公吞而併之者以天下為私瞭然可知也向使不從而撫之先其未一而併之則三代為私勢既併于一復分而豫諸人則秦為公矣今子厚乃謂因之者不得已而公天下自秦始非也不然則激也柳子厚之激以唐之嘗議封建將以明理道也其言曰繼世而理者上果賢乎下果不肖乎及夫郡邑朝拜而不道夕斥之矣夕受之而不法朝斥之矣誠哉是言也抑愚又有感焉耳唐之欲仕其人也有公薦既仕其人也有考功故賢者可使其在上而不道不法者可以朝夕斥今也場屋之士資格之官無復問其賢否賢者必不肯枉道干人而不賢者遂得志然則今之郡邑者上果賢乎下果不肖乎不道不法者果朝斥之夕斥之乎嗚呼悲夫尚忍言之然則如之何曰公薦未可復擇名臣以嚴考功而用西漢久任之法則庶幾四維論天爵論子厚謂廉與恥義之小節而病管子四維之言又謂天之貴斯人在剛健純粹而病孟子天爵之言夫廉與恥豈特小節廉縱可屬於義恥則當屬於禮又不當盡指為義之小節也管子之以維言者蓋指為治之範防耳又非如子厚之所謂子厚何乃不知廉恥之為大節耶夫仁義忠信得之於天昭昭也子厚乃謂此存乎人者而獨指剛健純粹之氣為得於天至論剛健則又指為孜孜之志論純粹則又指為爽達之明且證之曰敏以求之明之謂也為之不倦志之謂也自今觀之求之為之信皆人爾何乃反謂之天其理果安在而子厚至以此易彼耶夫以廉恥為小節而又强明自貴如之何不陷叔文之黨執迷終身乎吾今而後知子厚之所以為子厚矣守道論以守道不如守官非聖人之言且謂官所以行道未有守官而失道守道而失官之事者其論正矣然愚猶謂守道我之事也守官非我之所可必也若董狐為史官以死是官與道俱守也舍是而必曰守官吾恐官之守道之離也盍亦反其言而言曰守官不如守道庶幾官可守則守不可則去之而道未嘗不守也時令論二篇專病月令謂聖人不窮異以為神不引天以為髙凡政令有俟時而行之者有不俟時而行之者又反時令之變特瞽史之語非出於聖人者也或曰所以防昏亂之術也然聖人立中道以示後未聞威之以怪而使之時而為善愚謂此正論也斷刑論下謂賞務速不必春夏罰務速不必秋冬是矣而謂蒼蒼者焉能與吾事古之言天愚蚩蚩者耳何言之無忌憚若是哉辨侵伐論罪大而師有鐘鼓曰伐罪小而無曰侵六逆論謂少陵長小加大淫破義三者誠為亂矣賤妨貴言擇嗣也貴而愚賤而聖且賢貴不足尚也逺間親新間舊言任用也親而舊者愚逺而新者聖且賢不足與也舊不足恃也辨之良是議守原議守原雖得人不當謀之寺人駁復讎議武后時徐元慶手刃父讎陳子昻建議誅之而旌其閭著為令駁謂旌與誅莫得而並當考正其曲直所論甚精合與昌黎復讎議參看辨封弟辨謂不當因其戲而成之甚當辨列子論劉向稱列子鄭穆公時人非也實與魯穆公同時其文類莊子而尤質厚好文者可廢耶謹取之而已矣辨文子文子十二篇本老子然駁書也不知人之增益之歟或者衆為聚斂以成其書歟今刋去謬亂取其近似者論語辨曽參少孔子四十六歲曽子老而死是書記曽子之死吾意曽子弟子為之也或曰孔子弟子嘗雜記其言然而卒成其書者曽氏之徒也謂堯曰記唐虞禹湯有天下之事為孔子常諷道之辭辨鬼谷子謂劉向班固録書無鬼谷子蓋晚出晚又益出七術言益竒而道益狹今元冀又文之以指要嗚呼其為好術也過矣辨晏子春秋謂墨好儉晏子以儉名於世疑墨之徒為之宜列之墨家非晏子為墨也為是書者墨之道也辨亢倉子謂亢桑子取莊周語而益之其為空言尤也録書無亢倉子辨鶡冠子謂盡鄙淺語也惟賈誼鵩賦所引用為美意好事者僞為其書反取鵩賦以文飾之非誼有所取之太史公伯夷傳稱賈子曰貪夫殉財云云不稱鶡冠子愚按所辨皆當碑箕子碑進死以併命誠仁矣無益吾祀故不為委身以存祀誠仁矣與亡吾國故不忍及天命既改生人以正乃出大法用為聖師天地變化我得其正其大人歟於戲向使桀惡未稔而自斃武庚念亂以圖存國無其人誰與興理是固人事之或然者也然則先生隱忍而為此其有志於斯乎愚謂子厚發明箕子之道善矣但恐不當於三人分重輕道州文宣王廟碑夫子之道閎肆尊顯二帝三王其無以侔大也然其堂庭卑陋椽棟毁墜曽不及浮屠外說克壯厥居柳州碑仲尼之道與王化遠邇二妃碑二妃為子而父堯為婦而夫舜饒娥碑饒娥父溺死娥走哭水上三日不食耳鼻流血氣盡伏死明日尸出黿魚鼉蛟浮死萬數南睢陽廟碑記南霽雲也然一句一事始終屬對全似韓柳未出時文體與子厚他文不類當是少年作按柳碑多排句非韓比近世晦翁嘗以年考之乃子厚晚年作殆自隳以從俗耶六卷七卷皆浮屠家碑銘其理蕩而不可究詰其辭遁而不可明喻惟南嶽大明二碑僅明白可曉姑録之南嶽之碑曰有來受律者吾師示之以尊嚴整齊明列義類而人知其所不為有來求道者吾師示之以髙廣通達一空其有而人知其所必至大明之碑曰儒以禮立仁義無之則壞佛以律持定慧去之則喪愚謂此二者立語未為盡瑩而理則近是蓋二碑所主者律而餘多言禪也律者嚴潔其身佛所教人之本㫖而禪之說創於達磨自稱教外别傳佛書初無此說也律以斷惡修善而禪者謂惡不必斷善不必修惟問心之有無如何茍無心殺人而殺人即殺人為無罪至罵其師瞿曇為乾矢橛為一棒打殺作死狗煮喫亦為無心故無罪者也律出於佛其徒憚而小之禪不出於佛其徒張而大之使人不得而詰其罪者也然則世之言佛者將安從乎狀段太尉逸事凡三其一斷汾陽王子晞軍擾市者十七人頭其二賣馬代償大將焦令諶所取旱歲農人穀其三朱泚致其壻韋晤綾三百匹棲之司農治事堂梁上文髙事核曲盡其妙柳渾行狀渾年十餘歲有稱神巫告曰若相法當夭且賤幸而為釋可以緩而死耳位祿非若事也公學益篤舉進士仕至宰相李元平有名公曰喋喋衒玉而賈石者也貞元初上親擇郎吏分宰京師外部公曰陛下當擇臣輩以輔聖德臣當選京兆以承大化京兆當求令長以親細事夫然後宜榜音彭所以輔弓弩其音去聲者笞也音謗者進船也葬令五品以上為碑龜趺螭首降五等為碣方趺圓首見楊凝碣不知二者之於君其未也萬不試而一出焉吕君誄海禍謂溺死也出崔君權墓志表銘碣誄志馬君孟君凌君志銘皆貶後作與昌黎相上下餘或多俳語番禺音潘愚二山名在南海今廣州見四卷氣乘肺溢為水浮膚孟常謙李中丞服紫丹暴下赤黑薨卷十一志碣誄皆老作狀姜崿戚里之態獨孤申叔之文而夭趙𢎞之孤來章哀而得其父之葬張因去印綬為黃老而哭猶子以死虞鳴鶴從鄉賦而終逆旅吊慶交戶覃赤子愛書而貧不仕皆事核文古傑然者也世相重侯浩浩呻呼革為和聲柳評事銘以生富貴畜妓能傳宫中聲賢豪大夫多與連歡後加老風病有載酒來則出妓摶髀笑戲觀者尚識承平王孫故態姜崿如遭孔子是有兩顔氏也獨孤申叔誗直廉切言利美也二百舉武趙𢎞百郡之選叢于京師虞鳴鶴誄卷十二皆志其族之葬惟其父諱鎮及從父弟宗直者柳州時作無兄弟移其睦於朋友叔父墓跋子厚自謂志父所友六十七人於碑隂卷十三自母夫人以下終於雷五皆志婦人雷五之姨母為子厚妓妾故亦得志子厚女和娘得病更名佛婢既病去髮為尼號初心然不免死年十歲其母微也故為父子河間劉氏志劉者王叔文母也所志盛稱叔文文武功業且謂知道之士為蒼生惜焉宗元其自謂知道乎吁一畝之宅言笑不聞于鄰崔氏志對設漁者對喻智伯以貪敗愚溪對設溪神援惡溪弱水濁涇黑水皆有其實而豫不愚柳子用貪泉對泉不貪飲而南者貪也汝獨招愚者居焉則汝之實也因自陳其愚文極精妙此雖子厚自戲之辭然愚謂溪之愚可辭而子厚傑然文人也乃終身賢叔文而不知悟其身之愚可得辭耶對賀者之末曰嘻笑之怒甚乎裂眥長歌之哀過乎慟哭庸詎知吾之浩浩非戚戚之尤者乎愚謂子厚此言大痛無聲者也雖悔可追天對不可曉問答晉問以地儉也兵革也馬之良木之大鹽之富也文公之霸也皆不如堯之遺風焉理正而文工答問及起廢答自傷不復用起廢謂躄浮圖病顙駒皆廢十年而有遭子厚之廢亦十年舒翹揚英答問抗首出臆起廢答謂駒也說天說以天地為無知喻諸果蓏怨天甚矣其果何哉鶻說鶻以鳥之盈握者燠爪掌旦則縱之望其往茍東矣是日不東逐南北亦然朝日說旦見曰朝暮見曰夕詩曰莫肯朝夕朝音潮漢儀夕則兩郎向瑣闈拜謂之夕郎捕蛇說有益於世䄍音乍說水旱蟲癘之方則黜其神不祭然則事之不治亦當黜其人乘桴說真妄說也子厚妙於文耳敢議經乎說車亦有益處世謫龍說扶風馬孺子見竒女墜地謫龍也化為白龍登天文極佳復吾子松說謂壽夭貴賤皆寓也非造物亦怨辭歟羆說楚有獵能吹竹為百獸之音致鹿而恐則致貙而鹿去致貙而恐則致虎而貙去虎致愈恐則致羆以去虎虎去而羆食之不善內而恃外者未有不為羆之食也八駿圖說駿馬馬之類聖人人之類求以異形者非蝎音曷木中蟲非螫毒音歇者見天說注白羲之羲音蟻八驥馬名傳宋清傳清市藥燒劵不責報報者益厚非市道交而士大夫反爭為不已郭槖駝傳戒煩苛之擾章區寄傳區寄十一歲賊豪掠賣之討殺二豪梓人傳喻為相者之道也文字宏闊李赤傳感於厠鬼而死反以世為溷以溷為帝居清都世皆笑赤之惑也及至是非取與决不為赤者幾人耶蝜蝂傳譏貪者騷乞巧文今聞天孫不樂其獨將蹈石梁欵天津儷于神夫抽黃對白駢四儷六錦心繡口罵尸蟲文道士言人有尸蟲處腹中伺人隱微日庚申讒于帝栁子特不信為文罵之斬曲几文謂物貴乎直末代淫巧揉木為几愚恐几乃古之年髙者席地時所憑手其形抱身不容不曲几非後世所用也宥蝮蛇文彼居榛中不汝賊而殺之暴矣憎王孫文王孫者湘山間獸名與猿異性擾人者逐畢方文畢方如鶴一足赤文白喙火妖也出山海經辨伏神文買伏神得老芋而病加甚訴螭文零陵有螭室于江唐登浴其涯螭牽以入一夕浮水上哀溺文零陵善游者腰千錢遂溺死招海賈文戒其貪利犯危也弔贊針戒弔萇𢎞弔屈原弔樂毅伊尹五就桀贊不夏商其心心乎生民而已湯誠仁其功遲桀誠不仁朝吾從而暮及於天下可也於是就桀卒不可梁丘據贊齊景有嬖曰梁丘子晏子躬相梁丘不毁愛其不飽告君使賜嗚呼豈惟賢不逮古嬖亦莫類梁丘可思又况晏氏霹靂琴焦桐明皇得異馬於河帝西幸馬入渭水化為龍敵戒皆知敵之仇而不知為益之尤皆知敵之害而不知為利之大敵存而懼敵去而舞臨江之麋畋得麋麑日抱就犬習示之忘己之麋也與犬狎三年麋出門見外犬走欲與為戲外犬殺食之麋至死不悟黔之驢驢一鳴虎大駭然視之覺無異能者稍近益狎驢不勝怒蹄之虎因喜計之曰技止此耳因跳踉大口闞斷其喉盡其肉乃去永某氏之鼠永有某氏者以生歲直子鼠子神也因愛鼠倉廪庖厨悉以恣鼠不問飲食大率鼠之餘也數歲某氏徙居他州後人來居假五六猫撤瓦灌冗羅捕之殺鼠如邱嗚呼彼以其飽食無禍為可常也哉銘雜題漢原廟銘登布衣於萬乘化環堵為四海基岱嶽之髙源洪河之長安豐縣孝門銘李興刃股肉救父疾又廬墓晝夜哭廬上産紫芝白芝廬中醴泉涌出舜禹之事使堯一日得舜而與天下吾見小爭於朝大爭於野至堯已忘於人舜已繫於人天下曰久矣舜之君成也夫然後能揖讓受終咸宜興王之臣多起汙賤彼固公侯卿相器也獨其始之不幸其進晚耳而人猶幸之亡王之臣多死冦盜彼固劫戮困餓器也獨其始之幸其死後耳而人猶禍之余是以咸宜之鞭賈鞭賈宜五十必曰五萬有富者子愛其黃而澤酬五萬濯之黃者梔澤者蠟也出郊馬踶因大擊鞭析為五六墜地傷焉今之梔其言蠟其貌賈於朝者驅之陳力之列以禦乎物以責其大擊之效烏有不折其用而獲墜傷之患者乎吏商汙吏之為商不若廉吏之利博東海若二瓠喻學佛者題序題毛頴傳讀之若捕龍蛇搏虎豹急與之角而力不敢暇信韓子之怪於文也世之模擬竄竊取青嫓白肥皮厚肉柔筋脆骨而以為辭者之讀之也其大笑固宜西漢文類序文之近古而尤壯麗莫若漢之西京若開羣玉之府漢氏之東則既衰矣王氏詩序紛綸華耀繼武而起士大夫掉鞅於文囿者咸不得攀而倫之操斧於班郢之門斯强顔耳送獨孤書記序曳裾戎幕之下專弄文墨為壯夫捧腹甚未可也聯句序琅琅清響交動左右送蕭鍊序先禮而冠賀聲盈耳送薛存義序謂吏蓋民之役今我受其直怠其事豈惟怠之又從而盜之送辛生序士叢于京師京兆尹歲貢秀才常與百郡相抗闔户塞竇而得榮名者連畛而起宴南池序連山倒垂萬象在下南池蓬屋序棟宇簡易僅除風雨蓬屋送婁圖南序今將以呼噓為食咀嚼為神無事為間不死為生則深山之木石大澤之龜蛇皆老而久其於道何如也送婁圖南元山人南游序黃鵠一去青冥無極送僧浩初序專闢退之之闢佛愚謂退之言仁義而子厚異端退之行忠直而子厚邪黨尚不知愧而反操戈焉子厚自以為智不遂當矯名曰愚吾見其真愚耳記監祭使壁記周禮有祭僕誅其不敬者漢以侍御史監祠唐開元禮以御史監祠曰監祭使四門助教㕔壁記周置虞庠於四郊後魏立學於四門置助教二十人唐始合于大學省助教至三人盩厔縣新食堂記合羣吏食于堂謂禮食之來古也今京師百官咸有斯制諸使古者交政於四方謂之使今受命臨戎職無所統屬者亦謂之使凡使之號專焉而行其道者也嶺南饗軍堂記文佳邠寧進奏院記周有邑具湯沐漢有邸奉朝請唐有院備進奏全義縣城北門或曰不利於吏塞之百年盧遵始復其舊雍州茅亭記以白雲為藩籬碧山為屏風零陵永州復乳穴記石鍾乳必在深山窮林連之人告盡者五載矣崔公至逾月穴人以乳復告以其不貪故以誠告也道州鼻亭神象祠也河東薛公刺是州毁之永州龍興寺息壤記寺東北陬堂之地隆然負磚甓而起者廣四步髙一尺五寸夷之而又髙凡持鍤者盡死由是人莫敢夷史記及漢志有地長之占甘茂盟息壤異書有記鮌竊帝之息壤以堙洪水永州鐵爐步志永州北郭有步蓋嘗有煆鐵者居之人去而爐毁者不知年矣獨有其號冒而存今世有負其姓而立於天下者曰吾門大他不我敵也問其位與德曰久矣其先也其冒於號有異於兹步者乎大者桀冒禹紂冒湯幽厲冒文武以傲天下而姑大其故號以至於敗為世笑僇游黃溪記名山水而州者以百數永最善其間名山水而村者以百數黃溪最善黃神王姓莽之世也莾既死黃與王聲相邇神更號黃氏逃來擇其深峭者潛焉西山鈷鉧潭鈷公魯反袁家渴音褐水反流以其境過清不可久居紛紅駭緑民橋其上書寄許孟容與楊慿裴塤蕭俯李建顧十郎諸書皆貶所悲苦之詞其可憐者與楊慿之書曰有之而恥言者上也有之而言之者次也無之而工言者賊也無之而不言者土木類也又曰公卿之大任莫若索士子厚初貶時年三十三重膇馳僞切並蕭俯書與李建書悶即出游游復多恐暫得一笑已復不樂如囚拘圜土一遇和景負牆搔摩伸展支體當此之時亦以為適然顧地窺天不過尋丈終不得出豈復能久為舒暢哉與顧十郎書自稱門生而以郎稱其人豈郎者所以稱其主之名歟與韓愈論史官書蓋正論也與吕恭書辨石書之僞老陽九老隂六在易正義乾篇中非一行為之見與劉禹錫書僕之為文久矣然心少之不務也以為是博奕之雄耳務富文采不顧事實以炳然誘後生是猶用文錦覆陷穽也若蚓蛭然雖鳴其音聲誰為聽之答吳武陵論非國語書子厚作孟子評非國語二書今非國語見集中而孟子評無之豈子厚能悔之而不以傳歟將劉禹錫恐其重得罪名教為掩其惡歟與友人論文書有曰漁獵前作戕賊文史甚矣文之不可不已出也答元饒州書弊政之大莫若賄賂行而征賦亂貧者無資以求於吏有貧之實不得貧之名富者操其贏以市於吏無富之名而有富之實夫如是不一定經界核名實而姑重改作其可理乎與崔饒州論石鍾乳草木之生也依於土然有居山之隂陽或近水或附石其性移焉况鍾乳直産於石依而産者固不一性故君子慎焉取其色之美而不必惟其土之信愚按此書復喻以方物喻以人復證之他藥文最可觀答周君巢書丈人盛譽山澤之臞以為壽且神今夫山澤之臞掘草烹石以私其筋骨而日以益愚他人莫利己獨以愈若是者愈千百年滋所謂夭也不為方士所惑仕雖未達無忘生人之患則聖人之道幸甚與李睦州服氣書兄由服氣以來貌加老而心少歡愈吳武陵先作書道黃帝及列仙方士皆死狀兄陽德其言而隂黜其忠是不可變之尤者也令吳子之師已遭諾而退矣愚敢厲鋭擐堅鳴鐘鼓以進決於城下愚幼嘗嗜音不得碩師卒大慚及長嗜書亦不得碩師又大慚今兄之服氣果誰師耶去味以即淡去樂以即愁悴悴焉膚日皺肌日虛守無所師之術尊不可傳之書徒曰我能堅壁拒境以為強大是豈所謂強而大也哉愚按此子厚達理之言也文又精妙故節録稍詳與楊誨之第二書云傅說曰惟狂克念作聖按今書非傅說之言賀進士王參元失火書足下讀古人書為文章而進不能取顯貴者足下家有積貨士之好廉名者皆畏忌不敢道足下之善以公道之難明而世之多嫌也乃今幸為天火之所滌蕩凡衆之疑慮舉為灰埃黔其廬赭其垣以示其無有而足下之才能乃可以顯白而不汚是祝融回祿之相吾子僕與幾道十年之相知不若兹火一夕之為足下譽也滫息有切息委切見賀王參元書覼縷好視也一曰委曲見三十卷許京兆書答韋中立論師道書魏晉以下不事師獨韓愈奮不顧流俗抗顔而為師世果羣怪聚罵愈以是得狂名蜀之南犬吠日嶺之南犬吠雪吠所怪也孫昌𦙍薦笏言於卿士曰某子冠畢咸憮然京兆尹鄭叔則怫然曵笏却立曰何預我耶廷中皆大笑天下不以非鄭尹而以快孫子何哉獨為所不為也此書後段說為文之法極詳穀梁子曰心志既通而名譽不聞友之過也見答元公瑾書退之所敬者司馬遷揚雄遷於退之固相上下若雄者如太𤣥法言及四愁賦退之獨未作耳决作之加恢竒至他文過揚雄遠甚雄文遣言措意頗短局滯澀不若退之猖狂恣睢肆意有所作答韋珩書潔然盛服而與負塗者處答廖有方鼓行於秀造之列此其戈矛矣答蕭纂書觀文章宜若懸衡然增之銖兩則俯反是則仰無可私者答吳秀才來栁州見一刺史即周孔之京師顯人以千數又宜得周孔千百何吾生胸中擾擾焉多周孔哉復杜溫夫曹沫之沫莫具切見武相公啓求珠於海而徑寸先得則衆皆快然罷去知竒寶之有歸也賀趙江陵宗儒辟武都符載為記室啓表奏議狀啓皆獻文求哀之辭表多世俗稱頌之語氣索理短未見栁之能過人者賀破東平蓋李師道所據淄青也櫻桃即含桃廣南鄭相公奏百姓産三男台州奏五色雲名例律官與父祖諱同者不居子厚以祖名察躬辭監察御史奉勑二名不偏諱不合辭讓訴苗損狀恤人則深減數非廣二月一日為中和節進農書賀破東平罪止一夫恩加百姓祭文祭楊憑詹事稱丈人自稱子壻然則謂外舅丈人其來久矣狼荒祭穆質文濛汜音蒙似日次處見祭崔少卿文祭張後餘辭引莊周之說以為人之君子天之小人子厚怨天隨寓而發也祭纛澧有大特化為巨梓秦人憑神乃建茸頭漢宗蚩尤亦作靈旗祭六伯母自稱姪男祭丈母祭弟自稱八哥而不具銜詩吳歈工折栁歈音俞巴歈歌也鑿池曰汚尊汚烏瓜切齊諧笑拍塗音荼東方朔詩老拍塗饒醉鼻成皻切意此世俗所謂酒皻鼻傖父吳人謂中國人為傖以上並見同劉院長酬韶州拾其餘韻蓋不用其韻也奉和楊尚書依本詩韻此用其韻也古者和詩不用韻韋道安遇故刺史被盜女為所掠道安縳致之刺史歸賄納女以報道安辭焉楊白花欵音襖乃音靄一聲山水渌漁翁竫人長九寸蹩􅍷非國語子厚以國語文深閎傑異而說多誣淫作非國語愚觀所作非獨駁難多造理文亦竒峭今節録下方三女奔密母曰必致之王康公不獻一年王滅密非曰勿受之則可矣教子而媚王以女非正也宣王不藉千畝虢公諫三十九年戰于千畝敗績非曰古之必藉千畝者禮之飾也然而存其禮為勸乎農也未若時使而不奪其力節用而不殫其財則食固人之大急不勸而勸矣三推之道存乎亡乎皆可以為國矣敗于戎而引是以合焉夫何怪而不屬也愚謂子厚論勸農之本善矣謂勸農之禮可亡則過矣是禮也古人體夫愛民一念真誠之發豈姑以是飾乎三川震伯陽父曰周將亡矣非曰山川者特天地之物也隂與陽者氣而遊乎其間者也或㑹或離其孰能知之愚謂人者天地之心天地不得其寧而曰惡與乎我此子厚怨天之論所發也宣王料民及幽王乃廢滅非曰是幽之悖亂不足以取滅而料民以禍之也劉康公聘魯叔孫宣子東門子家皆侈歸告王曰其亡乎東門不可以事二君叔孫不可以事三君非曰泰侈之德惡矣其死亡也有之矣而孰能必其時之蚤暮耶設令時之可必又孰能必其君之壽夭耶郤至告捷于周單襄公曰兵在其頸者其郤至之謂乎明年死難非曰執筆者以其及也而必求其惡以播於後世然則有大惡幸而得終者則固掩矣穀洛鬭將毁王宫王壅之亂於是乎始生非曰天將毁王宫而勿壅則王罪大矣奚以守先王之國壅之誠是也王室之亂且卑在德而又奚穀洛之鬭而懲之也將鑄無射單襄公曰不可非曰是何取於鐘之備也聖人既理定作樂以象之非樂能移風易俗也愚謂子厚之論是矣而立語易也禮樂皆由人心生聖人因而文之還以導人心者也人生而有舉動聖人因其舉動而約之禮否則肆矣人生而有謳吟聖人因其謳吟而和之樂否則蕩矣約之禮而和之樂隨其事而施之用上自朝廷下達閭巷使人日習而悠然契焉非心邪念淫聲慢色不得以干其間此古人禮樂之用而治定作樂則又子孫象祖宗之功德以薦之郊廟所謂隨其事而施之用之大者也單子伶州鳩論樂之成政殖財誠誕而無理子厚獨指其象治而謂不能移風易俗又矯之太過故曰立語易也長勺之役公曰小大之獄必以情斷劌曰可以一戰非曰徒以斷獄為戰之具則吾未之信也季桓子穿井得土缶中有羊焉使人問仲尼曰吾穿井獲狗何也仲尼曰以某所聞者羊也非曰孔氏惡能窮物怪之形是必誣聖人矣史之記地坼犬出者有之矣近世京兆杜濟穿井獲土缶中有狗焉投之於河化為龍吳伐越隳㑹稽獲骨節專車非曰辨大骨石弩以為異其知聖人也亦外矣桓公輕幣諸侯垂槖而入捆載而歸非曰又奚控焉悉國之貨以利交天下耶申生敗狄讒言將起狐突杜門不出君子曰善深謀非曰覩其將敗而杜其門則奸矣里克殺奚齊荀息死之非曰間君之惑排長嗣而擁非正其於中正也遠矣不得中正而復其言亂也里克既殺卓子使告重耳曰盍入乎舅犯曰不可秦穆公使弔曰時不可失舅犯曰不可非曰狐偃之為重耳謀者亦迂矣重耳兄也夷吾弟也重耳賢也夷吾昧也若重耳早從里克秦伯之言而入則國可以無嚮者之禍而兄弟之愛可全而有秦穆公獲晉侯公子縶曰殺之利公孫枝曰不可非曰向使穆公告于王以王命黜夷吾而立重耳則誰敢不服秦伯歸女五人懷嬴與焉非曰重耳之受懷嬴不得已也秦伯乃行非禮以强乎人愚謂秦之歸固非矣重耳之受亦非也不得已而受亦終始禮待之可也鉏麑非曰麑之死固善矣然宣子為政之良麑胡不聞之乃以假寐為賢耶愚謂麑之心特生於政之良怵惕於將朝盛服之寐耳麑而賢必能諫其君必不受君之命以賊宣子今為之賊而不忍害可言宣子之賢麑不足問也公子楊干亂行魏絳斬其僕非曰公子貴不能討而禀命者死非能刑也然則絳宜奈何止公子以請君之命逐欒盈非曰當其時不能討後之人何罪黃熊非曰鮌之為夏郊也禹之父也非為熊也熊之說好事者為之圍鼓非曰城之畔而歸己者有三逃暴而附德者庥之力屈而愛死者與之以不死反常以求利者君子不受也嗜芰非曰屈子以禮之末忍絶其父將死之言吾未敢賢乎爾也禮曰思其所嗜屈建曽無思乎外集披沙揀金賦迎長日賦記里鼓賦劉叟傳叟以御龍術進魯公內龍先備明年果大旱命劉叟出龍果大雨河間傳志貞婦一敗於强暴以計殺其夫卒狂亂以死子厚借以明恩之難恃愚以為士之砥節礪行終不免移於富貴利欲者多矣正當引以自戒而不必計其恩之可恃否也太府李卿外婦馬淑志本南康謳者善瑟葬湘水以嗣靈音云請復尊號表皆諛辭也子厚內集已多有之為京兆時事業止此而已乎與衛淮南石琴薦出當州龍壁灘下蓋石可薦琴者以上外集上下卷栁以文與韓並稱焉韓文論事說理一一明白透徹無可指擇者所謂貫道之器非歟栁之達於上聽者皆諛辭致於公卿大臣者皆罪謫後羞縮無聊之語碑碣等作亦老筆與俳語相半間及經㫖義理則是非多謬於聖人凡皆不根於道故也惟紀志人物以寄其嘲罵模寫山水以舒其抑欎則峻潔精竒如明珠夜光見輒奪目此蓋子厚放浪之久自寫胸臆不事諛不求哀不關經義又皆晚年之作所謂大肆其力於文章者也故愚於韓文無擇於栁不能無擇焉而非徒曰並稱然此猶以文論也若以人品論則歐陽子謂如夷夏之不同矣歐陽子論文亦不屑稱韓栁而稱韓李李指李翺云黃氏日抄卷六十
