body:
  text: 黄氏日抄卷五十宋黄震撰讀史名臣言行錄趙忠獻普啓太祖釋藩鎮兵殘唐五代之患遂絶庻幾為萬世開太平者與人所當用雖萬乗之怒不移焚利害文字於通衢使小人生事之徒不得逞可謂得大臣體或猶議其嘗封趙保吉生邊患嗚呼獨不觀其留太原置幽燕於太祖時者耶獨未知太祖若尚在混一天下後所以謀除邊患者安出耳曹武惠彬下江南蜀廣湖南四國未嘗殺一不辜天生藝祖以仁濟世吉德參㑹武惠之助多焉平生惴惴亷謹接小吏未嘗以名呼雖蟄蟲不忍傷其生而能奬率三軍令行禁止仁者之勇夫范魯公質竇内翰儀李文正昉范質李昉皆先朝舊臣王師入京質頗誚讓昉獨不朝葢賢於一時其後質相太祖昉相太宗質以兢謹昉以寛恕皆為名臣亦盛矣昉能預知王旦為太平宰相而不能救東封西祀尤絶識者乎然面取進止命坐之禮廢自質始時政記進御自昉始竇儀有識操多知故事不肯短趙普既全國體亦以自全吕文穆䝉正太宗初臨軒首擢公冠甲科其後三入中書以功名終始國朝科目得人之效公昉焉嘗觀其對治道寛猛之論則欲漸行清淨之化對輦卒私市之說則謂正合黄老之道不納照二百里鏡懇辭子弟起家員外郎不欲聞指嘲參政時朝士姓名自其修身推之治道徃徃清心省事似從道家來惟其遇事敢言夾袋儲材識夷簡富韓公為宰相器所以異於飲醇不事事之曹參而卓然以儒術著與然東封西祀之不諫豈亦以其道家事耶嗚呼干戈方息休養以成太平則公之力為多也張文定齊賢公以布衣干太祖卒相太宗以致君之術自負徃徃渉踈闊然大中祥符間請罷土木則其論切矣戚里爭財甲乙相易此特公處事之細者吕正惠端公清靜簡易持重得大臣體定議立真宗上殿審視然後拜奏事賞之不喜折之不懼屹然社稷之鎮也請善視繼遷母於延州此謀雖萊公不及糊塗讀作鶻突太宗謂公大事不糊塗錢宣清若水公自為同州推官活寃獄二歲中擢置樞府先朝不次用人如此哉廷爭李繼遷之誣奏面折趙鎔之迎合風節矯矯善謀能斷真足當大用而年不待惜夫李文靖沆真宗初公首勸抑浮薄喜事之人涵養成就以至仁宗久享太平者諸臣重厚力也公之為國家計顧不久大深長矣乎眞宗欲以某氏為貴妃手焚其詔仁宗欲以駙馬石保吉為使相三問不從國有社稷臣行法自貴近始天下事尚何不可為者劉元城有言本朝名相惟李沆最得大臣體以不行利害文字專奏水旱盗賊為證愚亦妄謂本朝名相度量無如王公旦膽畧無如冦公凖公預憂禱祠土木之事作則王公旦所不及預知丁謂不可在人上則冦公凖所不及王文正公旦公靜宻有謀遭值眞宗厭兵國家無事為相十年一意休息納萬物於大度包荒之内天下陰受其賜多矣使不作天書使豈不誠大臣與向文簡敏中呂䝉正罷相上意其目穿望復位劉昌言稱無之劉昌言罷上意其涕泣錢若水稱無之向敏中除僕射上意其甚喜又意其賀客必多李昌武徃視皆無之士大夫茍賤取輕人主既久雖眞宗不免於疑公清節重德黙動上心大耐官職之褒豈特公一身之榮一時之譽而巳哉陳晉公恕世言三司使以公為稱首此以才言耳慮生人主侈心不肯進錢榖大數此為賢於人然當時東封西祀皆公應辦力也張忠定詠公剛大多智數方面材無比者李順王均亂後前後兩鎮蜀易嚴為寛蜀人畏愛入骨髓使還謂王旦太平宰相卒以此不遇豈命也夫然乞斬丁謂王欽若一疏至今光熖燁燁斗牛間天書迎合事千萬世頼之雪耻矣馬正惠知節公智勇兼濟平蜀守邉多雋功廷叱丁謂王欽若輩欺罔幾欲以笏擊死之祥符景德間全人也曹武穆瑋公為將四十年無敗衂招攜戰守曲盡其智求之古邉將殆頗牧李廣流亞與其言臨敵斬不用命者非治内郡法可覘公本心丁謂指以萊公黨斥之可覘公素守特視其父武惠王寛仁之味差薄耳畢文簡士安眞宗以契丹故謀相文簡薦萊公遂共議幸澶淵事定擇邊守定法制致太平公有力焉身沒家貧帝聞之賜其妻子白金云萊公冦凖澶淵非萊公不待靖康而後南渡靖康有萊公中原至今我有也功孰與儔而欽若輩欲以矯天誣人事掩之耶欽若無責也王旦平生愛助公為何如一旦乃與欽若比反䧟公使與朱能同詐故愚嘗謂王旦改節不在晚年買沈倫銀花籃萊公受辱不在晩年丁謂遂為海康行京兆府獻天書一署字可使志士淚落也噫高烈武瓊髙烈武恊賛北伐遂可與萊公同傳亦盛矣然猶武臣職也衛士訴米腐禁切甚嚴一旦中貴人以聞人賜精米一斛公即歎而辭典軍嗚呼使將相人人如公又安有隳法市恩下陵上替使天下胥為人情世界敗壞而不可容聲也哉愚於是尤三歎三詠於烈武楊文公億公一代文豪性剛寡合素薄王欽若丁謂聖眷雖渥卒以譛行然玉皇加尊號亦求陪預何耶萊公被誣卒頼公封留事迹仁宗用以昭雪公議遂明此功亦大王文康晦叔公治蜀尚嚴守洛陽御史如束濕雖歐陽公猶不免怨之决非茍循人情者玉清昭應之災復能抗疏乞罷禱祠其正直如何哉而乃誘其婦翁萊公獻天書何與所未諭也王沂公曽公重厚守正不動如山方仁宗㓜冲能正劉太后不稱制黜逐丁謂曹利用辨絶王欽若宮觀欽奉之說可謂社稷臣矣乃力薦呂夷簡卒為其操入室之戈知人之難如此哉李文定廸諫立劉后保全東宮公盖素以直著調陜西兵出内藏金攪墨熟水使八大王元儼者不敢留禁内公亦處事從容者而兩相人主始為丁謂遂後為呂夷簡去人情之難防賢者之不可自信如此魯肅簡宗道飲酒肆以實告不欺君若此故能諫止太后不立劉氏七廟獨不任子弟於舘閣不自私如此故能在政府七年務抑僥倖貴戚畏憚至以魚頭參政見稱嗚呼士大夫欲行道於天下亦行諸身而已薛簡肅奎公以嚴治京師以寛治蜀皆以最稱此猶吏能也力止太后冕服廷論大臣被酒欲繩天下事無細大一入規矩不可其意輙憂愧卧家後世有此參政否耶蔡文忠齊丁謂許以知制誥不徃見羅崇勲諭以參政事不作記止楊太后稱制止陳氏女為后寛京師飛語之獄磨萊公被謗之碑兩居憲臺彈劾不避及在政府浩然以天下為憂公真偉人哉公平生嗜飲初筮仕得賈同一詩即戒之終其身用心之剛若此易所謂風雷益也將何嚮不濟吕文靖夷簡公用事動必以術雖當時大賢如韓如富如范如王皆為公所忌其薦也或間之終身進退幾顛倒於其手三入中書皆善候主意預求去以得之仁皇帝亦終身恱其有餘不盡之意而不暇省然其間諸賢也亦以成國家之事而不䧟之罪如以韓范西富公北其後使范公折而請守邊富公亦使河北竟守邊之類是也其結主知也如早䇿曹后以制中宮為說如請刋章獻遺詔而止尊楊太后於禁中如臨終又能薦韓范文潞公之類是也方章獻臨朝仁宗尚㓜防微杜漸有社稷功乞厚葬章懿聞促召徐行請都知押班保舉同罪而宦者之監軍遂絶皆術之用於正者雖罵希文以賣宋庠易詔㫖以誑王洙賢者所必不為尺玉未可以微瑕指也公文穆猶子也公之用文穆内舉也家學源流有自來矣豈變而不失其正者乎然刺市井軍創南班官至今國用為屈可惜也必為後訓其文穆乎陳文惠堯佐公為太常丞十三年起居郎七年為丁謂所絀在外十五年其不茍進若此十典大州六為轉運戮鱷魚食饑民减課賦鑿太行之險䕶滑州之堤縱惡人而京師無犯所至以善政顯及為相以老成鎮撫其不負進用又如此秦國公省華三子長堯叟次堯咨皆進士第一人位至將相而公之德業尤著云晏元獻殊公為相務進賢與范仲淹韓琦富弼同任而面斥張耆平生嚴謹未嘗為子弟求恩澤可謂賢矣宋元憲庠奏罷寺觀祈福奏絶内降私恩奏西師置大將内地他帥各當一道自為言官參大政遇事多明白可否及既登庸天下無事惟務清淨再用頗事浮沉矣然公之言曰殘人逞才逆詐恃明吾終身不為也㫖哉言乎豈老成渉歴葢自有見而然耶初公解省試皆第一及廷對太后又易其弟祈居第十而擢公第一自布衣時二宋已名動天下而公為謹飭云韓忠憲億公治郡多善政為御史權勢畏之以范文正薦參大政不喜捃官吏過失欲天下皆得其所惟治家以嚴初與李參政若谷力貧致成立清苦終其身程文簡琳公治蜀治開封有聲為三司不肯併民稅名目不肯募商賈漕米皆為久逺慮守延州不受元昊之誘元昊死諫上分攜三將之議以昭大信其參大政亦幸㑹矣柰何請建劉氏七廟耶然仁宗卒相之可謂聖度如天也杜正獻衍公治京師權要不敢干居審官銓吏不得與為宰相封還内降至人主籍以杜私謁而戒門生小吏乃使無露圭角惟黙而行之無愧於心此意豈淺丈夫可識哉方議大舉伐夏雖韓公亦不疑獨公以為必不可契丹與夏戰河外雖范公亦以兵從獨公以為必不來可謂有大過人之識公清苦自律而均給下僚歴知州提轉安撫未嘗劾一官此又大臣之德量然也然公越人也自十五六詣河陽七十而致仕寓居南京十年薨豈未嘗歸越與公嘗言天下惟浙人褊急易動柔懦少立某至監司人尚不信越殆無以繫公之思與為浙人者可勉也范文正公仲淹本朝最多名臣然未有過於范文正者也而本朝名臣之不遇亦未有甚於范文正者也然則豈無任其咎者耶公為言官以諫廢郭后罷為開封推官以進百官圖又罷人皆知呂許公之為而不知其後薦之者亦罷之也公任西事許公薦也外得長者名而實則陰間之幸公全材投之危地而名愈顯居二歲恩信大治方將决䇿取横山靈武遽以召囘功業已不及竟公悲之為作閱古詩公參大政又許公薦也外得進賢求致太平之美名而實促之更張弊政使衆不恱而謗興纔一歲罷凡所施行事皆罷公雖參預與未嘗參預等猶未也遣公使河北尚猶許公既老之宻謀將行復佯問之若不知者諭以去則不復還而公卒老於行矣嗚呼公以命世之才事仁宗不世出求治之主使許公不先有以結主知而仁宗得以任許公者任公天章閣雖不必開太平自可以徐徐致柰何君臣離合之數終身陰制於許公操縱之手耶太平果可期月致驟革弊果不犯衆怒許公自為之矣何公之薦雲上天而離之此昌黎公所以訟風伯也歐陽作墓誌稱二公釋憾交驩范氏子弟削其語不刋种染院世衡城清澗守環州羗戎皆恱服士人皆精射又行間殺野利天都二大將而元昊服矣西師惟公之勞第一龎莊敏籍公初為御史沮章惠臨朝諫仁宗奢靡為開封判官拒尚美人稱教㫖奏范諷不遵禮法為國家慮已深長矣其帥延安每不奉詔必欲屈元昊稱臣措置城築運聚糧芻無一事煩民可為萬世法其為樞宻使賛韓公汰冗兵六萬餘人陜西民力為蘇其為相力主狄武襄平儂智髙南方以寧出將入相功效卓然而成就司馬公之益尤大云狄武襄青帯銅面具大小二十五戰勝元昊易虎翼旗勝党項禆將事也立軍制明賞罰以翦平儂智髙大將事也公兩得之其為大將曰寧失智髙不敢欺朝廷此非將之大有識者不可及至若過故鄉下車趨謁縣令容狂生劉易叫怒不祖狄梁公而拜韓魏公廟庭下終身執門人禮雖古名將不及矣吳正肅育公為政嚴簡審而後發行相矣以心疾不果方元昊欲叛獨公謂不若因之賜國號後卒如其議云王文忠堯臣體量西事凡山川要害人物臧否後率如其言為三司推見本末一為條目轉耗弊成厚積為樞副六年恩倖悉從裁抑頼上深知免禍云包孝肅拯公一笑比黄河清關節不到惟閻羅包老而能恕人以情王武恭德用太后補軍吏公不奉行軍吏訴黑米公呼專副與軍士對剛執而善處事者至律己尤清謹惟名動天下故人或忌之云諫議公田錫内翰王公禹偁侍講孫宣公奭三君子皆太宗眞宗時從班名臣也錫質重禹偁明峭奭剛正皆以直言聞當時然當是時太平日久所最防者禱祠邪說也錫請封禪奭力諫禹偁不諫亦不請風節雖相上下學識有不同者矣李恭惠及王文正公以公代曹瑋守秦謂重厚能守瑋規模也守亦難哉有曹參然後能守蕭何之清淨有萊公然後能守陳恕之條式能守必重厚之士哉公守杭中貴人過之雖勢傾天下不為動林處士怡然清談者竟日嘗置白集一部猶自以為恨以其守杭者觀守秦重厚謹守可知矣豈在戮一攫金之卒云乎哉王文正公任人如此眞足以相天下士也孔中丞道輔公自在寧州嘗笏斷妖蛇正直聞天下他日廷列曹利用羅崇勲罪狀大呼諫廢郭后至切責宰相呂夷簡視猶前日妖蛇耳治馮士元獄以張士遜故畧全程琳一綫情即坐黜感憤死矣故夫君子與小人殊途小人行私無所不至君子必盡純乎公而後可尹師魯洙公論郭后事四賢之一也其後始終西師五六歲效謀居多議訓土兵代戍卒以减邉費此國家至計豈特西師宜然然而從事西師者屈欝莫公為甚涇原宜援也夏竦以專罪之洛水城不當築也鄭戬以沮格罪之孫用借俸錢已還無欠也劉湜承時宰意鞫置獄以盜贓幾殺之嗚呼豈特公之不幸人各為說賞罰不明此西師所以久無功而狄武襄目擊其弊反其政以用之故能一舉平嶺南也若公文行節義則自有韓范歐陽公公論在紛紛者何能疵余襄公靖諫貶范文正公諫修開寶寺舍利塔諫用張堯佐提㸃開封府事皆犯人所難出使契丹折其助討夏人之請西北二邉以寧始經制儂賊事賊平撫綏嶺海肅然其後交趾冦邕州公復移檄而定南方之寧又多其力論諫如此其凛凜也功烈如此其彰彰也布衣時不幸辱於忍忌者之手不得已易名取解以仕可以此疵公萬一耶公韶州人元名希古待制王公質訟婚無貲者與之俸為盜廹寒者與之衣以術鈎私盜鑄者譏之使緩其獄凡犯法非害於物者皆矜恕之轉運荆湖當用兵急財賦時使一路獨蒙福公寛仁人也從文正公家法來扶病獨送被謫范希文願預黨人為幸斬斬出鋒稜此又文正公家所未有適不幸小人連興大獄坐廢羣賢公竟憤痛劇飲卒悲夫豈量之不文正若耶侍讀孫公甫公之用以祁公薦也保州兵變祁公不時發公乞罪祁公論晏殊懷安罷之薦富公相不用而相陳執中公諫不聽遂行與凡所論宮禁事皆盡言無隠公眞諫臣也滕宗諒坐法杜公欲重其罪范公欲輕之富公兩不敢决公竊歎謂當自人主一斷之法既即憂慶厯諸臣致太平事已無望嗚呼此其識慮精深又豈直堪諫臣而已耶不受硯希夷陳先生穆脩种放李之才魏野林逋附周世宗問黄白不對而對以蒼生為念宋琪等問脩養道不對而對以合德為治歴五季聞革命輙顰蹙太祖登極則驚喜大笑曰天下自此定矣嗚呼先生雖隱豈忘世獨善者哉數學傳之穆伯長伯長豪士不禮丁謂雖登第老益貧以古文為天下倡又傳至李挺之挺之亦登第倜儻坦率不視勢輕重取重范忠獻挺之傳之康節而學益顯象學傳之种放放隱者也以骨相當貴致顯官晩節驕侈已不謹希夷之戒放傳許堅堅傳范諤昌學益微矣魏野隱陜之東郊林逋隱杭之西湖皆於希夷學無預而以詩名世野之贄王旦詩譏以封祀禮畢逋之臨終詩自喜無封禪書愚謂野與逋非詩人也超然髙識之士也可以一洗种放終南之羞矣胡安定先生翼之先生明體用之學因范文正公薦白衣召對教授湖學又主太學師道之立自先生始然其始讀書泰山十年不歸及既教授猶夙夜勤瘁二十餘年人始信服立已立人之難如此非篤實力行何以哉泰山孫先生明復先生力貧養親讀書泰山之陽魯之名士石介以下皆師事之丞相李迪以弟之女妻之給事中孔道輔聞其風就見之范公富公薦之天子為直講行無隱而不彰真積力久效固應爾此猶豈弟之士能之也張貴妃㓜隨其父堯封常執事先生左右既貴數遣使致禮先生先生閉門拒之終其身修於家而不壞於天子之庭無侵尋富貴心所謂豈弟君子求福不囬非與嗚呼不可及也已徂徠石先生介先生竒士也折節師事泰山孫先生拜起必扶持嘗躬耕徂徠山下葬不葬者七十䘮髙風篤行有益世教為多惟其志存憂國作為文章極陳古今指切當世自謂吾言不用雖獲禍死不悔致夏竦輩深恨之幾不免身後剖棺之禍悲夫此孔子所以拳拳於中行之士也張安道直指先生為姦邪過矣老蘇先生洵雷霆久蟄一旦迅烈天地為之震動起視草木皆甲拆矣先生特起之學有焉然先生之學不及用於世張安道表而出之明其灼然可用於世者以其能辨王安石之姦也安石之禍誠大矣然温公目擊其弊身與之伍終不以為姦但言不曉事又執拗耳豈固各自有見耶先生權書衡論等作若施之用亦必有雷霆迅烈之勢特未知果能速致陽和否耶故士必用而後知韓魏公琦國朝盛時偉人輩出卓然為之冠冕者韓公范公也二公共西事功烈相上下元昊既請和並召為兩府責以期月致太平革弊衆不恱而范公卒老於邊守矣公獨入相十年定策立英宗神宗當危疑艱難他人無所措手足時處之安若泰山國以乂寧功成身退三判鄉邦及王安石行新法棄地契丹貽禍無窮之初尚能極口論列感悟上聽雖卒為小人沮抑不行小人終亦莫之能害公德業爛然照耀無極嗚呼盛哉古無有也古無有也富韓公弼本朝以仁立國藝祖世乂天下未畫一其後邊酋久任之法壞河東既下不思固圉反輕取幽燕以挑之故我朝所最患者在夷狄善論人臣之功者亦於此乎覘焉耳冦公首决䇿親征國家獲安靜者三十九年富公以片言繼折服其狂謀不煩一鏃前好益堅使王安石不生事擾之塞上之安猶可保二公之功不其大矣乎而王欽若乃謂冦公以陛下為孤注王拱辰亦謂富公但能増金帛厚夷狄二公之功髙見嫉大略亦相似然眞宗之疾冦公欲身任社稷安危不幸中小人丁謂之禍富公當英宗被疾與韓公歐陽公議不合翩然絶去之至終其身不通問頼韓公歐陽之賢待公加厚既相神宗雖不幸值王安石得君公又能見幾而作卒以功名始終云歐陽文忠公修公貽書責司諫髙若訥力辨范文正非辜坐貶夷陵令地逺無書可讀翻閱架閣陳年公案見枉屈不可勝數仰天誓心遇事不敢忽其後為數郡皆寛簡不擾使河東則議麟州不可廢使河北則謂脅從不可殺議河决則謂横隴工大難開六塔河狹小不能受大河惟當増堤浚淤以免民患在兵府考兵屯地理更為圖籍在政府考官兵吏財集為總目皆一仰天自誓之心推之與故公於後學從游多談吏事且曰文學止於潤身政事可以及物嗚呼公一代文章宗師東坡先生所尊事昌黎公以來一人而已所言猶若是後之欲為文者可以觀矣文潞公彥博公為成都不抑市價而十八處减價糶賣為永興民疑鐡錢不用則私出縑帛召絲絹行人収鐡錢凡處小事類此為參政請徃貝州督戰潛穴城以擒王則為宰相值仁宗感疾託名設醮宿殿廡使中貴人悚息聽命以至疾瘳凡處大事類此皆不動聲色隨事宻制於無形者也故能為四朝元老位將相五十餘年壽九十有二名動四夷方初進用呂許公歎其為大有福人自今觀之宗廟社稷之福也豈公一身福哉一安石得君文富韓歐諸老雖具在而力不及救悲夫趙清康公槩歐陽公於公為後進同在館意輕公躐知制誥歐陽公被謗獨奮身爭之重厚寡言盛德人也冷清詐稱皇子考得其實而誅之庶幾仁者之勇云吳文肅奎公為諫官褫奪僥倖舊㤙如郭承佑戚屬如張堯佐皆彈劾不避神宗時為參政地震之災獨公言小人黨盛退考其私則族有義荘子無居宅可謂正直無私者矣方天下盛推王安石可致太平公謂安石心强性狠不可大用雖韓魏公亦難其有識云張文定方平初元昊欲叛獨公與吳育勸順適之以其暇除器不聽兵既用公勸屯河東示形勢入冦則自麟府不十日擣其穴不聽已而禁兵皆西諸路兵㨂赴闕刺陜西河東京東西弓箭手充宣毅保提軍公爭之又不聽四路連敗始聽公罷夏竦用兵六年上厭之始聽公因赦招元昊降公雖不預西事始終謀議居多愚嘗考其故兵久不用驟用之必敗西事之始當從公言歴戰既久智勇方奮元昊困不支决䇿取橫山靈武西事之終當從韓范言公之謀始不用而終用兩失之矣徒弊中國惜夫免摧河北之塩畫浚汴漕之䇿料南詔必不與儂賊至斬妄言者而蜀晏然公之為國家謀類有大過人者辟王安石於貢院見其紛更輙斥之尤明而果然公尊嚴者也務欲天下士視朝廷如雷霆鬼神不敢議故斥石守道激烈為姦邪而温公亦以姦邪論公必如公所見恐頗類秦漢無復三代氣象爾蘇氏父子之顯公薦之也公之墓東坡蘇公誌之也以雄文善論飾竒才壯志世莫得其間云胡文恭宿公篤孝謹黙人也論致仕當使人自言論樂當用舊律論貢舉當用舊制方群臣議更法開邊公一一力爭議論率歸於忠厚而必不肯草楊懷敏之制必欲加包拯三司吏之罪則其發也不可回尤精陰陽之學云蔡端明襄作四賢一不肖詩作三諫官詩才名表表亦因以預增置四諫之一權倖畏斂禆益為多唐介論文潞公罷公獨論其忠呂景初等論梁丞相罷公不草其制其升也或推之其墜也或援之公又諫官之都䕶與一不勝於陳執中執中既相公遂斂惠福州興經術禁浮圗巫妖蠱毒之患為絶其後治開封治三司皆號精明惟知泉州罪章拱之卒為士論所少豈朝端風采施之外服或過耶然公能文章尤工於書不肯為仁宗寫温成碑此其介然於中者何如也王懿敏素公文正公子起少年慷慨論天下事號獨擊鶻帥西邊吏士驩呼冦不敢犯公固偉人也然公平生淫侈蓄聲妓誇客乃必欲其君逐女口古稱無諸已而後非諸人况於君耶劉集賢敞公仁宗信倚之臣也吳充以罰禮生罷救之馮京以言事奪職救之蔡襄歐陽修乞外又救之諫温成之立忌辨郭后之祔廟奪夏竦之美諡宦者石全彬除觀察使則直封還其詞頭富丞相欲加上尊號既抗疏力爭文潞公欲加龍昌期五品服則又力爭言無不從皆犯人所難治楊治鄆治長安所至寛簡而肅清考公平生治行毫髪無媿焉公博學無不通仰觀天文可知人事不溺偏曲而挺然以直大稱可為後學師表矣不譲官唐質肅介公論張堯佐并論文彦愽嘗濱於死再召居言路無所避如前時兖國公主夜開皇城門樞宻陳升之連姻内侍公皆抗言之可謂剛也已或謂公居政府少建明聲名减臺諫時不然也王安石得君元老大臣如韓富諸公無所致其力於公何有公與安石屢爭上前不能勝疽發背死不獨可為公痛惜可為世道痛惜耳趙清獻抃公治䖍州成都杭越為政愷悌不嚴而肅雖古循吏無以過之其在言路彈劾不避權貴號鐡面御史論陳執中陳升之章至二十餘上及參大政會王安石行新法極言其不可而去之平生出處之大要如此公日所為事夜必衣冠焚香九拜手告於天一生之間常以天自律此其所以終始無愧與吕中丞海當英宗被疾公委曲開陳兩宮劾䜛人任守忠竄之當神宗倚王安石求治方新法猶未行諸賢交薦四海延佇公獨首論其必誤蒼生言雖不用而去其後猶忍死囑温公再致元祐之盛公雖不及坐廊廟隱然有社稷之功矣劾公主夜開門劾歐公濮王議未足盡公萬一也彭中丞思永帥成都盗賊為絶帥河朔驕兵大戢為御史痛抑張堯佐王守忠不得封卒以諫濮議攻歐陽公罷凛然大丈夫也公自童㓜能還吏所失金釵冬處被則思天下寒宜其成就之大若此范蜀公鎮請約官吏兵財以賦入十七為經費而儲其三請中書樞宻通知兵民財利而宰相制國用請免百官郊迎宰相而除其謁禁凡所陳關渉甚大首乞仁廟擇宗室為皇儲章十九上待罪百餘日鬚髪為白此為天下孤忠極論王安石新法不便六十三致仕而去迄不為元祐一出此為天下髙節温公謂公異姓兄弟且作傳稱其大勇云曽魯公公亮公自嘉祐秉政至熈寧熟朝廷事嘗與韓魏公共政務去民疾苦處西北邊事亦善謀畫年髙而力不衰臺諫無非之者其後李復圭有老鳯之譏乃致仕去然公嘗薦安石或云以間魏公云王荆公安石王安石以文行稱天下歴事三朝仁宗惡其詐不用英宗建立時有異議自慊不求用愈不用名愈顯神宗立遂驟用之天下方翹首望太平乃盡壞祖宗法度聚歛毒民生事開邊卒亂天下何哉正坐博學自矜視天下無人而行其獨耳愚謂此其為安石之不學與夫學者將以明理而施之用六經治道之根源諸史行事之龜鑑固非山經海志野史小說神仙傳天竺書索隱務竒之為博也國朝開國元勲無如趙韓王守成賢相無如李文靖韓王每斷大事惟讀論語曰佐藝祖定天下纔用得半部文靖作相亦甞讀論語曰節用愛人使民以時兩句尚未能行嗚呼必若是斯可言大臣之讀書矣張乖崖譏萊公不學無術彼所謂學雖獨指區區之智術而言然語已怪而不倫安石又面罵諸公不讀書此正安石自道耳孟子何必曰利一語三尺童子所知安石尚不能行又烏得誇讀書故愚嘗謂安石本效商鞅而才不及鞅雖負小人不世出之才亦藉秦積威人心素脅息凛凛而後令必行使鞅生我仁厚之世人心素恃上恩雖鞅之才尚不能行况安石乎猶頼我朝仁厚根本深固國以再延安石亦頼以免不然其弟安國盖預嘗憂其滅門矣嘻若安石果讀書何至是耶安石字介甫平生執拗稱其名字惜不曾思及下文見幾而作一句耳温公光漢武帝好大喜功海内虚弊晩年託孤博陸侯漢以再安我朝神宗銳意太平王安石誤以生財用兵幾亂天下晚年議建儲亦指司馬公為師保太后承其意相之再致元祐之盛事有適相似者三代後功業類豪傑士智力所就耳至誠動物真儒顯效獨温公一人固不當以博陸侯同日語然博陸死丙魏繼之漢遂稱中興温公為相數月薨繼之者反丙魏不如天下事遂不忍言日將暝也大明元祐之盛類焉嗚呼惜夫王安石引進小人之罪於是又有甚於變法者矣雖然微温公人心我怨禍不止夷狄中興事未可知晦菴次公言行於安石後其剝之復與公之子諌議大夫康三代後功名士未必知道德道德士未必就功名功名從道德中來者温公也顧猶不喜孟子識者疑焉愚嘗求其故孟子勸時君行王道以救世隨其資禀如誘小兒多方順適使之恱聽如色可使好如勇可使好明堂可使無毁其要皆歸於誘之及民此孔子之所謂可與權者而公也平生誠實一語不妄視議論之出於權者宜非其所樂與諫議孝友篤實本無異於公而獨喜孟子稱其醇正其殆有見於孟子之心者乎可以補温公之闕矣善繼善述諫議有焉吕獻公公著公初與温公薦進王安石安石行新法二公皆以爭論去元祐初二公復並相共除安石新法温公薨元祐之政尚頼公扶持如不肯與西夏地賜詔乾德而夏人服大臣韓維諫臣王覿之罷皆爭之然公慈恕多務包容進退廢置無復温公剛大之氣公薨邦國悴矣吕滎陽公希哲字原明公遍師當世諸儒篤實踐履王安石謂有官而事科舉為僥倖利逹公遂棄不為自小官不干薦舉進退必視其時公文穆之從曾孫文靖之孫正獻之子生三世相門而衣食或不給豈獨公之賢亦可觀公之家學公自㓜其母申國夫人篤教甚嚴動必循規矩正獻公作相遺公書曰善士無不用獨爾以吾故不及夫人張氏笑曰是亦未知其子豈獨公之賢亦可觀公之家化晩年名益重逺近師尊之陳忠肅至拜公堂下豈獨公之家可敬可慕亦可想見政和間前賢流風遺澤猶有存者使人歎息不已然公習静至轎卒溺死不為動夫子廐焚傷人之問恐不其然又直截㨗徑以造聖人近世超悟之學亦豈聞其風而效之者乎曾中書鞏弟翰林學士文昭公肇曾氏兄弟以文鳴世兄文尤著世所號南豐先生也今觀南豐挺立無所附在朝之日淺而居外庸之日多治齊治越治閩皆有顯績寛期守信委任責成徃徃不勞而治可以為世法文昭歴十一州惠利亦多而立朝之績尤顯方徽廟初切劘上聽保䕶善類辨大中至正之論隱然有社稷功元祐士大夫再謫而公乞與之俱矣然則曾氏兄弟豈徒以文鳴者哉不徒以文鳴而今徒以文鳴可為世變長太息也已南豐好憑勢陵民嘗為人所訟似猶不䕶細行文昭則端嚴可畏有大臣風歿之日闔門貧無所歸此又豈以文為髙下哉東坡潁濵新法之行東坡力爭不勝擾擾垂二十年天下幾危温公革弊一新五年而呂大防劉摯調停之說起潁濵爭之又四年李清臣用而紹述之說起新法復行潁濵爭不勝天下事去矣二公議論關係之大若此若其文章聲望兒童所共知此不暇復論云韓獻肅絳弟門下侍郎維子華渾厚為郡多善政嘗出將以慶州兵亂罷嘗入相以繼安石後言不盡用求罷最精役法仁宗神宗哲宗朝皆力言之持國神宗潛藩宮僚也自英宗時力排濮議救呂誨范鎮諸賢議論凛凛事神宗爭新法因亢旱謂詔求直言上嘗感悟人情大恱矣卒以議不合罪去二聖臨朝忠言讜論禆元祐之政尤多視子華風采過之傅獻簡堯俞公在仁宗朝斥離間主婿之内臣窮誣告富人之皇城卒劾妄舉内臣之都水監英宗時黜䜛間兩宮之任守忠神宗時罷鈐轄陜西之李若愚彼皆城狐社䑕公皆奮擊不顧若建儲君濮議若新法凡國有大事公又一一力爭可謂骨鯁臣矣哲宗登極拾遺補過而不捃摘人細故蔡確既貶乞置其餘議論和平又視時而不同以法從名流貶黎陽倉草場迎拜州掾甚恭寒暑坐倉不少懈傳曰君子時中又曰君子無入而不自得焉吾於傅公見之彭尚書汝礪状元公孝謹人也而諫中人主兵論元豐將順言詩賦曰河事尤力風節表表其仁者之勇與嘗論呂嘉問治其獄則不阿執政嘗忤蔡確論安州詩所以為羅織公眞中立不倚者哉范忠宣純仁公文正子也世濟清賢為孝子事君爭新法爭紹述以罪去為忠臣然公平恕人也温公改新法公謂非所先章子厚鄧綰得罪公力為救解宣仁后上仙又首用李清臣鄧温伯名調停原其用意慮反覆耳及其後終不免反覆公雖平恕亦身不免大抵上智下愚不移鴟鴞未嘗可化為鸞鳯向使四㐫不去堯之後豈有舜之治嗚呼元祐微温公新法至冺冺胥敗無復為我朝立赤幟者萬世羞也反復之禍繼温公者弱耳豈温公誤與向使文正在吾知未必為忠宣之為也孝耶忠耶豈易盡者耶王左丞存公平恕人也官制行多収㧞熈寧後言事得罪者在政府遇事多爭温公稱並馳萬馬中能駐足者其王存乎蘇丞相頌公為政平恕論事謹審輔相多奉行故事使吏各守其職粹然君子人也以佐守成則有餘大略與范忠宣諸賢相類柰何以處元祐之後耶劉忠肅摯公自熈寧論新法去國踰十六年當元祐初復任言責知無不言未幾大用呂大防以減吏額事忌公引楊畏論公交通邢恕及章子厚公遂罷相謫死新州然公實首論蔡確章子厚而邢書又以文及甫私書示蔡謂感其稱父蔡確寃以訟公者也王樞宻岩叟公元祐初諫臣也論君子小人不可參用最關世道劉元城安世公師温公温公當元祐初去新法公當紹聖初諫紹述温公為相於人情久欎之後得行其道公為諫官於小人報復之時不得行其言效騐雖異直大則同所謂元祐全人也范内翰祖禹本朝侍講無出於伊川者矣伊川自謂乏公温潤之氣論事無出於東坡者矣東坡見公之奏至於不肯自出其藁當元祐時已預言范純仁以兼容小人為寛天下事豈堪小人再壞公言不用元祐一變為紹聖天下事遂不忍言公之關係世道者又如此鄒侍郎浩公諌立昭懷劉后得罪貶去田畫戒其無以此舉自滿此又增人忠壯一等矣陳忠肅公瓘紹聖革元祐之政公力陳其不可建中革紹聖之弊公又戒其欲速嘗主别試前名盡取王氏之學曰順時所以救時不必求快目前也其從容逺慮若此首辨蔡京姦邪蔡氏黨欲殺公者百計公終不懾非剛柔適中者能爾乎大厦之顛雖非一木能夫而著日錄辨著尊堯集又著四明尊堯集章蔡誣謗卒頼以一洗之有功我宋多矣邵康節雍先生洞觀天地萬物之變超然獨樂於其間然其言曰新法固嚴能寛一分則民受一分之賜投劾而去何益此可為憂世者明訓也郭林宗生亂世而皇皇先生生治世而熈熈其為超然之趣則同陳宻學㐮公平生歴州縣孜孜以教育人材講求萬民利害為念失官錢不辨而出已俸償之固篤厚人也爭新法不聽遂辭知制誥不就盖與温公辭樞宻副使同此一心又守道不回者也執法不行權貴人寺觀名額似雖小事所議尤髙劉祕丞恕公該洽剛毅温公平生所信倚王介甫深愛之爭新法遂絶介甫嘗笑公耽史而不窮經然介甫窮經之效視公耽史竟何如耶徐孝節積先生篤孝至行以正治心以直養氣者其學也嘗謂兵者實大賢盛德之事非小才小智所能用而酷慕諸葛武侯陳后山師道先生居都下逾年未嘗一至貴人之門章子厚欲見之終不可得傅欽之薦公者也以其貧懐金欲餽之竟不敢出口先生之髙行若此而世獨稱其詩何耶豈世之知公者淺耶抑詩亦賢者之累耶此錄名臣之言行偹焉近思錄諸儒之講明詳焉彼此參驗環循閱習以其行稽其所言以其言進其所行晦菴之望後學者其庶乎此錄雖雜取傳記之言然諸賢出處之本末備矣豈獨諸賢凡國朝盛衰之故亦莫不隱然備見其間矣如釋藩鎮兵權而天下定取幽燕納李繼捧而狄患啓李文靖鎮以清靜而民生安冦萊公决䇿親徃而邊好久王文正茍且順從天書禱祠之妄作而國力幾弊王沂公相仁宗初年韓魏公保佑英宗神宗初年而主少國危之日安若㤗山王安石行新法開邊隙而天下幾危宣仁聖烈太后相司馬公而天下再安范純仁兼用小人致章子厚蔡京輩紹述安石而國家遂有南遷之禍盛衰大要不出此數者皆可考見然則此錄豈特記諸賢之言行而已哉愚嘗謂史無定體書隨事為篇春秋紀年以書班馬以來分紀傳而此錄亦朱文公陰寓本朝之史黄氏日抄卷五十
