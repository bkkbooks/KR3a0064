body:
  text: 黄氏日抄卷三十一宋黄震撰讀春秋左氏傳君子曰周鄭交質周鄭交惡君子曰信不由中質無益也君子結二國之信行之以禮又焉用質隠三年周天子鄭諸侯也何物君子以二國結信為言及我伐宋以郜防歸我君子謂鄭荘公於是乎正又其伐許而處許西偏君子謂鄭荘公於是乎有禮豈盜亦有道者耶王取鄔劉蔿邘之田于鄭而與鄭人蘇忿生之田君子謂是以知桓王之失鄭至是則寜罪王而不罪鄭矣鄭荘公伐周射王中肩春秋初第一罪人而左氏反第一以為賢可怪也衛人旱寗荘子曰天其或者欲使衛討邢乎從之師興而雨雨乃偶然天豈助虐甚矣寗荘子之逢君而左氏之好誣也晉狼瞫能斬秦囚遂以為右箕之役先軫黜之狼瞫怒其友曰盍死之瞫曰吾未獲死所及彭衙馳秦師死焉君子謂狼瞫於是乎君子狼而輕生果君子乎秦伯伐晉濟河焚舟晉人不出封殽尸而還遂覇西戎用孟明也君子是以知秦穆之為君也舉人之周也與人之壹也孟明之臣也其不解也能懼思哉孟明違父誤君無故行盗賊之行掩鄭取敗自是秦晉交兵四十餘年使生靈肝腦塗地孟明之罪大矣秦穆公口一時悔過而心終身遂非偏聽專任之禍亦烈矣焚舟之役晉特不出秦未嘗勝晉也封尸而還何救肝腦塗地之靈秦素強西戎素服於秦秦豈因是而覇是時秦未嘗擾中國舍孟明召禍一事之外餘亦未嘗與中國一矢相加使當是時信用蹇叔而不誤用孟明嘗與晉婚姻而不自殘其百姓則其覇於西戎又豈止如今日所見而已哉趙穿攻靈公於桃園宣子未出山而復太史書曰趙盾弑其君以示其朝宣子曰不然對曰子為正卿亡不越竟反不討賊非子而誰宣子曰嗚呼我之懷矣自詒伊戚其我之謂矣孔子曰董狐古之良史也書法不隠趙宣子古之良大夫也為法受惡惜也越竟乃免弑君之罪無所逃於天地之間而曰越竟乃免左氏每借君子妄為之辭今又誣吾孔子不其甚乎襄二十有七年十一月乙亥朔日有食之辰在申司厯過也再失閏矣閏不可失也閏再失則差兩月寒暑易矣繼此當益差可也然而四時未嘗易其序則於何年増為十有四月而追正之耶子產謂子太叔曰惟有徳者能以寛服民其次莫如猛太叔不忍猛而寛鄭國多盗太叔悔之攻萑苻澤之盗盡殺之盗少止仲尼曰善哉政寛則民慢慢則糾之以猛孔子曰子為政焉用殺又曰居上不寛吾何以觀之哉又曰君子威而不猛今左氏謂太叔盡殺而孔子歎以善哉又謂政寛則民慢慢則糾之以猛是寛不可臨民而猛焉是主而殺之為快也異乎吾所聞賢君衛文公大布之衣大帛之冠務材訓農通商惠工敬教勸學任方授能元年革車三十乗季年乃三百乗閔二年晉悼公晉人弑厲公迎悼公于京師而立之生十四年矣曰孤始願不及此抑人之求君使出命也立而不從將安用我二三子用我今日否亦今日盟而入逐不臣者七人始命百官施舍己責逮鰥寡振廢滯匡乏困救灾患禁淫慝薄賦斂宥罪戾節器用時用民凡六官之長皆民譽舉不失職官不易方爵不踰德師不陵正旅不偪師民無謗言國以復覇晉侯之弟揚干亂行於曲梁魏絳戮其僕晉侯怒曰必殺魏絳羊舌赤曰絳無貳志其將來辭言終魏絳至請居死公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟不能教訓使干大命寡人之過也子無重寡人之過與之禮食使佐新軍使盟諸戎修民事田以時楚子囊伐鄭鄭将從楚子展曰晉君方明四軍無缺八卿和睦必不棄鄭秦景公乞師于楚將伐晉子囊曰晉君類能而使之其卿讓於善其大夫不失守其士競於教其庶人力於農穡商工皂𨽻不知遷業晉不可敵事之而後可晉侯歸謀所以息民三駕而楚不能争成十八年以後楚臣令尹子文鬭穀於菟為令尹自毁其家以紓楚國之難齊大史崔杼弑齊君太史書曰崔杼弑其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞太史盡死執簡以往聞既書矣乃還襄二十五年子産子産從政一年輿人誦之曰取我衣冠而褚之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子產而死誰其嗣之信行臧僖伯諫觀魚不聽公往觀魚僖伯稱疾不從隠五年晉使解揚如宋使無降楚鄭人囚而獻諸楚楚子厚賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子将殺之對曰受命以出有死無霣楚子舍之以行晉祁奚請老晉侯問嗣焉稱解狐其讎也将立之而卒又問焉對曰午也可於是羊舌職死矣晉侯曰孰可以代之對曰赤也可於是使祁午為中軍尉羊舌赤佐之君子謂祁奚於是能舉善矣稱其讎不為謟立其子不為比舉其偏不為黨襄三年韓宣子殺羊舌虎囚叔向樂王鮒見叔向曰吾為子請叔向弗應人皆咎叔向叔向曰必祁大夫樂王鮒從君者也何能行祁大夫外舉不棄讎内舉不失親其獨遺我乎於是祁奚老矣乗驛而見宣子曰謀而鮮過惠訓不倦者叔向有焉社稷之固也若之何其以虎也棄社稷宣子說與之乗以言諸公而免之不見叔向而歸叔向亦不告免焉而朝襄二十一年公冶公在楚季武子取卞使公冶問璽書追而與之曰聞守卞者將叛臣帥徒以討之既得之矣敢告公冶致使而退及舍而後聞取卞公曰欲之而言叛祗見疏也公至自楚公冶致其邑於季氏而終不入焉曰欺其君何必使余杜洩季氏舍中軍四分公室擇其二以書使杜洩告叔孫於殯曰子固欲毁中軍既毁之矣敢告杜洩曰夫子惟不欲毁也故盟諸僖閎詛諸五父之衢受其書而投之既𦵏而行子家子昭公伐季氏季氏請以五乗亡弗許子家子曰君其許之弗聽公孫于齊曰不如早之晉弗從公薨于乾侯季孫曰吾欲與之從政子家子不見季孫申包胥初伍員與申包胥友其亡也謂申包胥曰我必復楚國申包胥曰子能復之我必能興之及昭王在隨申包胥如秦乞師立依於庭墻而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出申包胥以秦師敗吳師於軍祥又戰于公壻之谿吳師大敗吳子乃歸楚子入于郢王賞申包胥申包胥曰吾為君也非為身也君既定矣又何求遂逃賞季路小邾射以句繹來奔曰使季路要我吾無盟矣使子路子路辤季康子使冉有謂之曰千乗之國不信其盟而信子之言子何辱焉對曰魯有事于小邾不敢問故死其城下可也彼不臣而濟其言是義之也由弗能哀十四年在獲麟絶筆之後名言兵猶火也弗戢将自焚隠四年衆仲云為國家者見惡如農夫之務去草焉隠六年載周任之言夫民神之主也是以聖王先成民而後致力於神桓六年匹夫無罪懷璧其罪桓十年師克在和不在衆桓十一年卜以決疑不疑何卜同上並后匹嫡兩政耦國亂之本也桓十八年天下之惡一也荘十二年妖由人興荘十四年儉徳之共也侈惡之大也荘二十四年國将興聽於民將亡聽於神宴安酖毒閔元年無徳而禄殃也閔二年以人從欲鮮濟僖二十年敬徳之聚也僖三十三年出門如賔承事如祭仁之則也同上人誰無過過而能改善莫大焉宣二年國饒則民驕佚近寶公室乃貧成六年劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也能者養之以福不能者敗之以取禍成十二年宋人或得玉獻諸子罕子罕弗受曰我以不貪為寶子以玉為寶若以與我皆䘮寶也不若人有其寶襄十五年上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又可禁乎襄二十一年生於亂世貴而能貧民無求焉可以後亡襄二十二年辭命隨季梁對隨侯莊六年夫民神之主也是以聖王先成民而後致力於神故奉牲以告曰愽碩肥腯謂民力之普存也謂其畜之碩大蕃滋也謂其不疾瘯蠡也謂其備腯咸有也奉盛以告曰潔粢豐盛謂其三時不害而民和年豐也奉酒醴以告曰嘉栗㫖酒謂其上下皆有嘉德而無違心也所謂馨香無䜛慝也於是乎民和而神降之福曹劌敗齊于長勺莊十年齊師伐我公將戰曹劌請見其鄉人曰肉食者謀之又何間焉劌曰肉食者鄙未能逺謀乃入見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未徧民弗從也公曰犧牲玉帛弗敢加也必以信對曰小信未孚神弗福也公曰小大之獄雖不能察必以情對曰忠之属也可以一戰戰則請從公與之乗戰于長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂馳齊師既克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之秦獲晉侯僖十五年秦獲晉侯以歸晉大夫三拜稽首曰君履后土而戴皇天皇天后土實聞君之言羣臣敢在下風穆姬聞晉侯將至逆且告曰上天降災使我兩君匪以玉帛相見而以興戎若晉君朝以入則婢子夕以死夕以入則朝以死乃舍諸靈臺晉隂飴甥㑹秦伯盟于王城秦伯曰晉國和乎對曰不和小人耻失其君而悼䘮其親曰必報讎君子愛其君而知其罪曰必報徳以此不和秦伯曰國謂君何對曰小人慼謂之不免君子恕以為必歸小人曰我毒秦秦豈歸君君子曰我知罪矣秦必歸君秦伯曰是吾心也改館晉侯晉侯歸公子重耳及楚僖二十三年及楚楚子饗之曰公子若反晉國則何以報不榖對曰子女玉帛則君有之羽毛齒革則君地生焉其波及晉國者君之餘也其何以報君曰雖然何以報我對曰若以君之靈得反晉國晉楚治兵遇於中原其辟君三舍若不獲命其左執鞭弭右属櫜鞬以與君周旋展喜犒師僖二十六年齊孝公伐我北鄙公使展喜犒師使受命于展禽齊侯未入竟展喜從之曰寡君聞君親舉玉趾將辱於敝邑使下臣犒執事齊侯曰魯人恐乎對曰小人恐矣君子則否齊侯曰室如懸罄野無青草何恃而不恐對曰恃先王之命昔周公太公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也桓公是以紏合諸侯而謀其不協彌縫其闕而匡救其災昭舊職也及君即位諸侯之望曰其率桓之功我敝邑用不敢保聚曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐齊侯乃還鄭伯服楚宣十二年楚子圍鄭克之入自皇門鄭伯肉袒牽羊以逆曰孤不天不能事君使君懷怒以及敝邑孤之罪也敢不唯命是聽其俘諸江南以實海濵亦唯命其翦以賜諸侯使臣妾之亦惟命若惠顧前好徼福於厲宣桓武不冺其社稷使改事君夷於九縣君之惠也孤之願也敢布腹心君實圖之左右曰不可許也得國無赦王曰其君能下人必能信用其民矣庸可幾乎退三十里乃許之平楚訓國人宣十二年欒武子曰楚自克庸以來其君無日不討國人而訓之于民生之不易禍至之無日戒懼之不可以怠在軍無日不討軍實而申儆之于勝之不可保紂之百克而卒無後訓之以若敖蚡冒篳路藍縷以啟山林箴之曰民生在勤勤則不匱鞌之戰成二年晉師歸郤伯見公曰子之力也夫對曰君之訓也二三子之力也臣何力之有焉范叔見勞之如郤伯對曰庚所命也克之制也爕何力之有焉欒伯見公亦如之對曰爕之詔也士用命也書何力之有焉吕相絶秦成十三年晉侯使吕相絶秦曰昔逮我獻公及穆公相好戮力同心申之以盟誓重之以昏姻天禍晉國文公如齊惠公如秦無禄獻公即世穆公不忘舊徳俾我惠公用能奉祀于晉又不能成大勲而為韓之師亦悔于厥心用集我文公是穆之成也文公躬擐甲胄跋履山川踰越險阻征東之諸侯虞夏殷周之𦙍而朝諸秦則亦既報舊徳矣鄭人怒君之疆場我文公帥諸侯及秦圍鄭秦大夫不詢于我寡君擅及鄭盟諸侯疾之將致命于秦文公恐懼綏靖諸侯秦師克還無害則是我有大造于西也無禄文公即世穆為不弔蔑死我君寡我襄公迭我殽地奸絶我好伐我保城殄滅我費滑散離我兄弟撓亂我同盟傾覆我國家我襄公未忘君之舊勲而懼社稷之隕是以有殽之師猶願赦罪于穆公穆公弗聽而即楚謀我天誘其衷成王隕命穆公是以不克逞志于我穆襄即世康靈即位康公我之自出又欲闕翦我公室傾覆我社稷帥我蝥賊以來蕩揺我邊疆我是以有令狐之役康猶不悛入我河曲伐我涑川俘我王官翦我覊馬我是以有河曲之戰東道之不通則是康公絶我好也及君之嗣也我君景公引領西望曰庶撫我乎君亦不惠稱盟利吾有狄難入我河縣焚我箕郜芟夷我農功䖍劉我邊垂我是以有輔氏之聚君亦悔禍之延而欲徼福于先君獻穆使伯車來命我景公曰吾與女同好棄惡復修舊徳以追念前勲言誓未就景公即世我寡君是以有令狐之㑹君又不祥背棄盟誓白狄及君同州君之仇讎而我昏姻也君來賜命曰吾與女伐狄寡君不敢顧昏姻畏君之威而受命于吏君有二心於狄曰晉將伐女狄應且憎是用告我楚人惡君之二三其徳也亦來告我曰秦背令狐之盟而來求盟于我昭告昊天上帝秦三公楚三王曰余雖與晉出入余唯利是視不榖惡其無成徳是用宣之以懲不壹諸侯備聞此言斯是用痛心疾首暱就寡人寡人帥以聽命唯好是求君若惠顧諸侯矜哀寡人而賜之盟則寡人之願也其承寧諸侯以退豈敢徼亂君若不施大惠寡人不佞其不能以諸侯退矣敢盡布之執事俾執事實圖利之晉伯州犂在楚望晉軍成十六年楚子登巢車以望晉軍子重使太宰伯州犂侍于王後王曰騁而左右何也曰召軍吏也皆聚於中軍矣曰合謀也張幕矣曰䖍卜於先君也徹幕矣曰將發命也甚囂且塵上矣曰將塞井夷竈而為行也皆乗矣左右執兵而下矣曰聽誓也戰乎曰未可知也乗而左右皆下矣曰戰禱也齊師夜遁襄十八年齊師夜遁師曠告晉侯曰鳥烏之聲樂齊師其遁邢伯告中行伯曰有班馬之聲齊師其遁叔向告晉侯曰城上有烏齊師其遁晉大夫與楚孰賢襄二十六年楚伍舉與聲子相善也伍舉奔鄭将遂奔晉聲子將如晉遇之於鄭郊班荆相與食而言曰吾必復子聲子還如楚令尹子木問晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如杞梓皮革自楚往也維楚有材晉實用之子儀之亂析公奔晉晉人置諸戎車之殿以為謀主繞角之役楚失華夏則析公之為也雍子之父兄譖雍子雍子奔晉晉人與之鄐以為謀主彭城之役楚失東夷則雍子之為也子反與子靈争夏姬子靈奔晉晉人與之邢以為謀主通呉於晉敎呉叛楚楚罷於奔命至今為患則子靈之為也若敖之亂賁皇奔晉晉人與之苗以為謀主鄢陵之役楚師大敗楚失諸侯則苗賁皇之為也子木曰是皆然矣聲子曰今又有甚於此椒舉娶於申公子牟子牟得戾而亡君大夫謂椒舉女實遣之懼而奔鄭引領南望曰庶㡬赦余亦弗圖也今在晉矣晉人將與之縣以比叔向彼若謀害楚國豈不為患子木懼言諸王益其爵禄而復之聲子使椒鳴逆之正考父鼎銘昭七年一命而僂再命而傴三命而俯循墻而走亦莫余敢侮饘於是鬻於是以餬余口晉齊投壺昭十二年晉侯以齊侯宴中行穆子相投壺晉侯先穆子曰有酒如淮有肉如坻寡君中此為諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡君中此與君代興亦中之南蒯同前南蒯將叛季氏其鄉人或知之過之而嘆且言曰恤恤乎湫乎攸乎將適費飲鄉人酒鄉人或歌之曰我有圃生之杞乎從我者子乎去我者鄙乎倍其鄰者耻乎己乎己乎非吾黨之士乎梁丘據昭三十年齊景公曰唯據與我和夫晏子對曰據亦同也焉得為和君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否今據不然君所謂可據亦曰可君所謂否據亦曰否梗陽之獄昭二十八年梗陽人有獄魏戊不能斷以獄上其大宗賂以女樂魏子將受之魏戊謂閻没女寛曰主以不賄聞於諸侯若受梗陽人賄莫甚焉吾子必諌皆許諾退朝待於庭饋入召之比置三嘆既食使坐魏子曰吾聞惟食忘憂吾子置食之間三嘆何也同辭而對曰或賜二小人酒不夕食饋之始至恐其不足是以嘆中置自咎曰豈將軍食之而有不足是以再嘆及饋之畢願以小人之腹為君子之心屬厭而已獻子辭梗陽人伍貟肄楚昭三十年若為三師以肄焉一師至彼必皆出彼出則歸彼歸則出楚必道敝亟肄以罷之多方以誤之既罷而後以三軍繼之必大克之闔廬從之楚於是乎始病夾谷之㑹定公十年公㑹齊侯于夾谷孔子相犂彌言於齊侯曰孔子知禮而無勇若使萊人以兵劫魯侯必得志焉齊侯從之孔子以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不偪好於神為不祥於徳為愆義於人為失禮君必不然齊侯聞之遽辟之季孫問田賦使哀公十一年季孫欲以田賦使冉有訪諸仲尼仲尼曰某不識也三發卒曰子為國老待子而行若之何子之不言也仲尼不對而私於冉有曰君子之行也度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣若不度於禮而貪冒無厭則以田賦將又不足且子季孫若欲行而法則周公之典在若欲茍而行又何訪焉傳文元有弗聽二字然以為冉有弗聽則非義以為季孫弗聽合言冉有復命而後可葉公定白公勝之亂哀十六年楚太子建在鄭暴虐於其私邑又適晉與晉謀襲鄭鄭人殺之其子勝在呉子西欲召之葉公曰吾聞勝也詐而亂無乃害乎子西曰吾聞勝也信而勇葉公曰吾聞勝也好復言而求死士殆有私乎復言非信也期死非勇也弗從召之使處吳竟為白公請伐鄭未起師晉人伐鄭楚救之勝怒遂作亂殺子西子期於朝葉公在蔡至及北門或遇之曰君胡不胄國人望君如望慈父母焉賊之矢若傷君是絶民望也乃胄而進又遇一人曰君胡胄國人望君如望嵗焉日日以㡬若見君面是得艾也而又掩面以絶民望不亦甚乎乃免胄而進遇箴尹固帥其屬使與國人攻白公白公奔山而縊國寧乃使寧為令尹使寛為司馬而老於葉文句公入而賦大隧之中其樂也融融姜出而賦大隧之外其樂也洩洩隠元年山有木工則度之賔有禮主則擇之隠十一年楚之羸其誘我也桓六年民餒而君逞欲同上一鼓作氣再而衰三而竭荘十一年禹湯罪已其興也勃焉桀紂罪人其亡也忽焉並同上物莫能兩大莊二十二年非此其身在其子孫同上本必先顛而後枝葉從之閔元年心茍無瑕何恤乎無家同上是天奪之鍳而益其疾也僖二年君處北海寡人處南海唯是風馬牛不相及也不虞君之涉吾地也僖四年君其問諸水濵同上一薫一蕕十年尚猶有臭僖四年一之謂甚其可再乎僖五年神其吐之乎同上既不能強又不能弱僖七年知臣莫若君同上天威不違顔咫尺僖九年欲加之罪其無辭乎僖十年神不歆非類民不祀非族同上幣重而言甘誘我也同上天災流行國家代有救災䘏鄰道也僖十三年皮之不存毛將安傅僖十四年君其悔是哉同上歳云秋矣我落其實而取其材僖十五年蠭蠆有毒而况國乎僖二十二年所不與舅氏同心者有如白水僖二十四年况貪天之功以為己力乎同上宋先代之後也於周為客天子有事膰焉有䘮拜焉同上師直為壯僖二十七年一日縱敵數世之患僖三十二年武夫力而拘諸原婦人暫而免諸國僖三十三年臯陶庭堅不祀忽諸文五年敵惠敵怨不在後嗣此止可言敵怨葛藟猶能庇其本根文七年庇焉而縱尋斧焉者同上言猶在耳而棄之若何同上同官為僚吾嘗同僚敢不盡心子同上趙衰冬日之日也趙盾夏日之日也同上不有君子其能國乎文十四年履士㑹之足于朝文十三年子無謂秦無人同上已則無禮而討於有禮者曰女何故行禮文十五年我能往冦亦能往文十六年畏首畏尾身其餘㡬文十七年鋌而走險急何能擇同上見無禮於君者誅之如鷹鸇之逐鳥雀也文十八年口衆我寡宣二年卜世三十卜年七百宣三年若敖氏之鬼不其餒而宣四年牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣吾儕小人所謂取諸其懷而與之也宣十一年見可而進知難而退宣十二年參之肉其足食乎同上舟中之指可掬也宵濟亦終夜有聲文止戈為武三軍之士皆如挾纊河魚腹疾並宣十二年復室其子以女妻之宣十四年雖鞭之長不及馬腹宣十二年敝邑易子而食析骸以爨雖然城下之盟有以國斃不能從也宣十五年我無爾詐爾無我虞同上所不此報無能涉河宣十七年當其時不能治也後之人何罪宣十八年唯器與名不可以假人成二年克於先大夫無能為役同上欲勇者賈余餘勇成二年齊髙固滅此而朝食同上齊侯請收合餘燼背城借一成二年非我族類其心必異成四年人各有能有不能又定五年成六年聲伯之母不聘穆姜曰吾不以妾為姒成十二年争尋常以盡其民成十二年善人天地之紀成十五年盗憎主人同上不可以當吾世而失諸侯成十六年欒武子云惟聖人能内外無患自非聖人外寧必有内憂成十六年用我今日否亦今日成十八年晉悼公云不能辨菽麥同上所獲不如所亡哀三年楚子重惟善故能舉其類哀三年公登亦登襄七年吾子其少安同上俟河之清人夀㡬何襄八年誰敢㡬譬於草木寡君在君君之臭味也襄八年衆怒難犯專欲難成襄十年篳門圭竇之人而皆陵其上其難為上矣同上政以賄成同上譬如捕鹿晉人角之諸戎掎之襄十四年惟余馬首是瞻同上無神何告若有不可誣也同上或推之或輓之同上盖之如天容之如地同上天之愛民甚矣豈其使一人肆於民上同上子有令聞而美其室非所望也襄十五年朝不及夕引領西望曰庶㡬乎比執事之間恐無及也哀十六年澤門之晳實興我役邑中之黔實慰我心襄十七年吾儕小人皆有闔廬以辟燥濕寒暑同上吾淺之為丈夫也襄十九年小國之仰大國也如百榖之仰甘雨焉同上深山大澤實生龍蛇襄二十一年先二子鳴同上二子者譬於禽獸臣食其肉而寢其皮矣晉州綽言齊殖綽許郭最並襄二十一年雨過御叔襄二十二年譬諸草木吾臭味也而何敢差池同上所謂生死而肉骨也同上美疢不如藥石夫石猶生我疢之美其毒滋多襄二十三年夫䑕晝伏夜動同上死而不朽襄二十四年何沒沒也將焉用賄象有齒以焚其身賄也襄二十四年部婁無松柏同上今大國多數圻矣若無侵小何以至焉襄二十五年言之無文行而不逺同上政如農功同上他日吾見蔑之面而已今吾見其心矣同上頷之而已襄二十六年上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戍方城外之縣尹也誰獲子襄二十六年天生五材民並用之廢一不可誰能去兵襄二十七年崔之薄慶之厚也同上日其過此也襄二十八年數日國遷朝焉同上齊慶封遷于盧蒲嫳氏車甚澤人必瘁同上非惡富也恐失富也同上松柏之下其草不殖襄二十九年何必瘠魯以肥杞同上猶未能操刀而使割也其傷實多子有美錦不使人學製焉人心不同如其靣焉有威而可畏謂之威有儀而可象謂之儀並襄三十一年譬諸農夫是穮是蓘雖有饑饉必有豐年昭元年人之有牆以蔽惡也牆之隙壞誰之咎也微禹吾其魚乎賈而欲贏而惡嚻乎並昭元年國於天地有與立焉翫歳而愒日翫愒皆貪也並昭元年周禮盡在魯矣昭二年以家量貸而以公量收之昭二年於臣侈矣同上仁人之言其利溥哉非宅是卜唯鄰是卜在楚猶在晉也並同上余髪如此種種彼其髮短而心甚長其或寢處我矣同上又弱一个焉同上無瑕者可以戮人昭四年作法於凉其敝猶貪昭四年是儀也不可謂禮昭五年其父析薪其子弗克負荷昭七年可弔也而又賀之昭八年我在伯父猶衣服之有冠冕木水之有本原民人之有謀主也伯父若裂冠毁冕拔本塞原專棄謀主雖夷狄其何有余一人昭九年五大不在邊五細不在庭末大必折尾大不掉昭十一年左史倚相能讀三墳五典八索九丘昭十二年祈招之詩同上斬之蓬蒿藜藋而共處之昭十六年天道逺人道邇昭十八年夫學殖也不學將落同上室於怒市於色昭十九年祝有益也詛亦有損雖其善祝豈能勝億兆人之詛昭二十年先人有奪人之心文七年叔孫所館者雖一日必葺其牆屋去之如始至婺不恤其緯而憂周室之隕為將及焉昭二十四年幾如是而不及郢同上防山以水之昭三十年閔閔焉如農夫之望歲昭三十二年三后之姓於今為庶將室之定九年三折肱知其為良醫定十三年富而不驕者鮮吾惟子之見同上越十年生聚而十年教訓二十年之外吳其為沼乎哀元年民保於城城保於徳哀七年鳥則擇木木豈能擇鳥哀十二年天或者以陳氏為斧斤既斵䘮公室而他人有之不可知也哀十五年子路菟裘邑名隠公曰吾將老焉蝥弧旗名隠十一年越席注結草桓元年魚麗之陣注司馬法車戰二十五乗為偏以車居前以伍次之承偏之隙而彌縫闕漏此盖魚麗陣桓五年日官日御天子有日官諸侯有日御皆典厯數者桓十七年噬臍莊六年後君噬臍若齧腹臍喻不及也𤓰時𤓰時而往及𤓰而代莊八年肉食者鄙莊十年臯比荘十年䝉臯比而先犯之注虎皮音毘絰皇冡前闕莊十九年卜夜臣卜其晝未卜其夜莊二十二年于飛鳯凰于飛和鳴鏘鏘注雌雄俱飛同上未亡人寡婦自稱莊二十八年兩社周社亳社兩社之間朝廷執政所在閔二年魚軒夫人車以魚皮為飾閔二年扉屨扉草屨傳四年書雲物僖五年唇亡齒寒僖五年均服僖五年均服振振注戎事上下同服内子以叔隗為内子注卿之嫡妻僖二十四年效尤尤而效之罪乂甚焉同上效尤禍也文元年隧闕地通路曰隧王之塟禮也諸侯皆年懸柩而下僖二十四詰朝平旦僖二十七年三舍同上館穀晉師三日館穀同上昌歜昌蒲葅歜在感反僖三十年形鹽形象虎同上墨衰絰僖三十二年取節采葑采菲無以下體君取節焉可也僖三十二年焚舟文三年瑞節節信也文十一年八元八愷文十八年于思于思于思多鬚之貌二宣年食指食指第二指宣三年染指同上狼子野心同上丁寧著於丁寧註鉦也同上於菟楚人謂乳穀謂虎於菟同上治命宣十五年魏顆折俎宣十六年繁纓馬飾年成二摩筓山名成二年承乏攝官承乏成二年五伯成二年浹辰十二日也成九年肓之上膏之下肓鬲也心下為膏成十年外弟成十一年外妹同上三肅三肅使者而退成十六年拜嘉哀三年始髽哀四年狐駘之戰羣不逞哀十年若而人哀十二年勇爵襄二十一年齊莊公班荆布荆坐地襄二十六年桃茢茢黍􅓙巫以拔殯襄二十九年委禽别委禽焉昭元年亢宗昭元年大叔曰吉不能亢身焉能亢宗亢蔽也三老杜云八十以上上中下夀也服云工老商老農老也昭三年不相能昭元年參商閼伯主辰為商星實沈主參六氣隂陽風雨晦明同上爽塏昭二年敖王欲敖叔向以其所不知而不能昭五年六物歲時日月星辰昭九年弁髦豈如弁髦而因以敝之注童子垂髦三加冠而棄其始冠昭八年疾日疾惡也紂以甲子䘮桀以乙夘亡故國君以為忌日供養供養三徳為善昭十二年受羮反錦昭十二年叔向末减同上利市爾有利市寶賄我勿與知昭十六年尤物尤物是以移人尤暴也昭二十八年不颺公子少不颺同上豢龍昭二十九年執紼三十年飲酒私出避酒定二年旋夷射姑旋馬注小便也定三年共二共二職定四年繁弱大弓名同上燧象定四年九頓九頓首而坐定四年客氣定八年陽厯云執牛耳同上竹刑鄭駟歂殺鄧折而用其竹刑鬱攸火氣哀三年石田得志於晉猶獲石田也哀十一年庚癸之呼呉申叔儀乞糧於公孫有山氏對曰若登首山以呼曰庚癸乎則諾注軍中不得出糧故為私隠庚西方主穀癸北方主水桐汭哀十五年注在宣城廣德縣西南虎幄衛侯為虎幄于藉圃哀十六年始食幄城而饗之也同上紫衣注紫衣君服同上魯臯歌曰魯人之臯數年注臯綏也哀二十一年甬東注句章縣東海中洲之一哀二十二年彌甥彌逺也康子父之舅氏故稱彌甥哀十三年乞靈哀二十四年解韈褚師聲子韈而登席公怒注古者見君解韈二十五年㦸手公㦸其手注徒手屈用如㦸形同上從孫甥姊妹之孫為從孫甥同上衣製製雨衣也哀二十七年左氏雖依經作傳實則自為一書甚至全年不及經文一字者有之焉在其為釋經哉經與傳等夷相錯經所不書者傳亦竊效書法以附見其間其僭而不知自量亦甚矣若夫浮誇而雜品藻不公又在所不論也然因其舍經而别載行事可以騐其曽見當時國史故讀春秋者不可以廢左氏左氏杜預以為左丘明啖助始考其不然或曰左丘複姓非此左氏又或以為楚左史之後云讀春秋公羊傳何春者何歳之始也王者孰謂謂文王也謂春為歳始是也謂王為文王非也文王未嘗稱王也未嘗班正朔於天下也王時王也隠之立為桓立也桓何以貴母貴也隠與桓皆庶也隠長當立而欲遜桓者過乎厚也隠實魯君非為桓攝也桓之母繼室非貴也鄭伯克段于鄢克之者何殺之也克力勝之也非殺也後此十餘年段尚餬其口於四方公子益師卒何以不日逺也所見異辭所聞異辭所傳聞異辭何休注所見者昭定哀已與父時事也所聞者文宣成襄王父時事所傳聞者隠桓莊閔僖髙祖曾祖時事也愚按此說是也逺則或不盡知也以不日起凡例者鑿也君子大居正大居正三語春秋要㫖也有年何以書以喜書也以有年為喜者是也謂不當有而書異者非人情也祭仲者何鄭相也何以不名賢也何賢乎祭仲以為知權也以上桓公祭仲擅鄭賣其君以利其身公羊氏反賢其知權故誤謂權者反於經夫人孫于齊其言孫于齊何念母也夫人親預弑其君而不敢歸未見荘姜念母之事紀侯大去其國滅也不言齊滅之為襄公諱也春秋為賢者諱何賢乎襄公復讎也人殺其父子不與共戴天此復讎之說也設如公羊言襄公九世祖見烹乎周是天王殺之也非紀之鼻祖殺之也謂譖言無形也非殺者比也九世矣無滅國以報言語之怨者也古者報怨不在其後後之人何罪公羊又曰雖百世可也此謬論也齊無此心不過吞滅小國耳桓公之信著乎天下自柯之盟始以上荘公公羊謂不背曹沬之盟者也然此戰國之說也齊威方以禮合諸侯寧有是事春秋之所不書不可信也城楚丘桓公城之曷為不言桓公城之不與諸侯專封也始封衛者周也周衰狄侵衛齊合諸侯為城楚丘以遷之使避狄耳非封也葵丘之㑹桓公震而矜之叛者九國震而矜之有矣叛者九國未見其事據左氏則逃者鄭伯爾荀息可謂不食其言矣荀息從君於昏而陷其二子於死地所謂好信而不好學者也何賢之有襄公不鼓不成列雖文王之戰亦不過此也以上莊公宋襄狂愚殺鄰國之君代牲而反欲以不鼓不成列為仁文王曽有是否乎而誣之也呉楚之君不書𦵏辟其號也宣十八年釋經如此義曉然矣非凡例比舍中軍者何復古也昭五年魯作三軍三家三分公室也作中軍季氏以公室為名於三軍之外立中軍也今其舍中軍是四分公室季氏兼有其二舍中軍之軍亦為季氏之有也作中軍正為今舍中軍設借公室之名以立中軍既而舍之則幷為己有也公羊以為復古何也辭命楚宋之平楚莊王圍宋軍有七日之糧盡此不勝將去而歸於是使司馬子反乗堙而窺宋城宋華元亦乗堙而出見之司馬子反曰子之國何如華元曰憊矣曰何如曰易子而食之析骸而㸑之司馬子反曰甚矣憊雖然吾聞之也圍者柑馬而秣之使肥者應客是何子之情也華元曰吾聞之君子見人之厄則矜之小人見人之厄則幸之吾見子之君子也是以告情于子也司馬子反曰諾勉之矣吾軍亦有七日之糧爾盡此不勝將去而歸爾揖而去之反于荘王荘王曰何如司馬子反曰憊矣曰何如曰易子而食之析骸而炊之荘王曰嘻甚矣憊雖然吾今取此然後歸爾司馬子反曰不可臣已告之矣軍有七日之糧爾荘王怒曰吾使子往視之子曷為告之司馬子反曰以區區之宋猶有不欺人之臣可以楚而無之乎是以告之也荘王曰諾舍而止雖然吾猶取此然後歸爾司馬子反曰然則君請處于此臣請歸爾莊王曰子去我而歸吾孰與處于此吾亦從子而歸爾引師而去故君子大其平乎已也宣十五年季札讓國襄二十九年謁也餘祭也夷昧也與季子同母者四季子弱而才兄弟皆愛之同欲立之以為君謁曰今若是迮而與季子國季子猶不受也請無與子而與弟弟兄迭為君而致國乎季子皆曰諾故諸為君者皆輕死為勇飲食必祝故謁也死餘祭也立餘祭也死夷昧者立夷昧者死則國宜之季子者也季子使而亡焉僚者長庶也即之季子使而反至而君之闔廬曰先君之所以不與子國而與弟者凡為季子故也僚惡得為君於是使專諸刺僚而致國乎季子季子不受曰爾弑吾君吾受爾國是吾與爾為篡也爾殺吾兄吾又殺爾是父子兄弟相殺終身無己也去之延陵終身不入呉國愚按公羊形容札之讓甚理而文然爾殺吾兄之語非也夷昧者兄則僚乃札兄之子光殺僚非殺札之兄也光之弑立札為之使東諸侯又後此四十餘年當哀公十一年札尚能為呉帥師救陳則札終身不入呉國之語亦非也公羊此論為哀二十九年季札來聘而發也然去之十八年當昭公十五年夷昧方卒又去十二年當昭公二十七年呉光方弑其君僚則此言僚立而闔廬刺之以致國乎季子者皆非也公羊徒聞季札讓國之賢而粉藻之然言而不實自有不掩焉者可戒也今姑以其文録文句王人者何微者也曷為序乎諸侯之上先王命也山川有能潤千百里者天子秩而祭之觸石而出膚寸而合不崇朝而徧雨乎天下者唯泰山耳河海潤乎千里僖三十一年匹馬隻輪無返者同上縁民臣之心不可一日無君縁始終之義一年不二君成九年周公拜乎前魯公拜于後文十三年君子之善善也長惡惡也短惡惡止其身善善及其子孫昭二十年獻公曰吾欲攻虢則虞救之攻虞則虢救之荀息曰用臣之謀今日取虢明日取虞爾請以屈産之乘垂棘之白璧往必可得也寶出之内藏藏之外府馬出之内廐繫之外廐爾僖二年壹戰不勝請再再戰不勝請三成二年宰木僖三十三年若爾之年者宰上之木拱矣諼成三年為諼也注諼詐也河曲文二十年河千里而一曲筍文十五筍將而來也注名編輿齊魯以此名之曰筍䘮娶宣元年今將昭元年陳侯之弟招殺世子偃師大夫相殺稱人此其稱名氏以殺何言將自是試君也今將爾曷為與親弑者同人臣無將將則必誅焉此傳公羊髙作也髙齊人世稱其授經于子夏分春秋為三世以所見所聞傳聞為别宜不茍者而所載事跡人名地里間與左氏不同左氏及見國史故依之以釋經公羊不知何所主而然意亦别有紀載之書而集之歟世逺不知孰是若以次而言且當據左氏爾然諸儒之主公穀者不于其事而于其義也公羊大居正之語固可謂能執其義之要者至謂權為反經謂百世可以復讎則非義已甚而亂之萌也迹其所釋皆經未嘗舍經而為之文此視左氏之僭為賢文雖不及左氏之核而明白則過之注者何休詳於制度讀春秋穀梁傳何鄭伯克段于鄢克者何能也何能也能殺也穀梁謂克為能是春秋書鄭伯能段于鄢也文乎否耶既又繼之曰能殺也是克為歇後是殺為言外意也然乎否耶文句禮送女父不下堂母不出祭門諸母兄弟不出闕門父戒之曰謹慎從爾舅之言母戒之曰謹慎從爾姑之言諸母般申之曰謹慎爾從父母之言桓二年孔子曰聽逺者聞其疾而不聞其舒望逺者察其貌而不察其形立乎定哀以指隠桓隠桓之日逺矣夏五傳疑也桓十四年泓之戰復雩之耻也雩之耻宋襄公有以自取之伐齊之䘮執滕子圍曹為雩之㑹不顧其力之不足而致楚成王成王怒而執之故曰禮人而不答則反其敬愛人而不親則反其仁治人而不治則反其知過而不改文之是之謂過襄公之謂也古者被甲嬰胄非以興國也則以征無道也宋公與楚戰于泓水之上衆敗身傷七月而死僖二十二年季孫行父秃晉郤克𦕈衞孫良夫跛曹公子手僂同時而聘於齊齊使秃者御秃者使𦕈者御𦕈者使跛者御跛者使僂者御僂者蕭同姪子處臺上而笑之聞於客客不悅而去相與立胥閭而語移日不解齊人有知之者曰齊之患必自此始矣成元年天有山天崩之天有河天壅之雖召伯尊如之何成五年誥誓不及五帝盟詛不及三王交質子不及二伯隠八年德厚者流光僖十五年二伯桓文佚宕長狄佚宕中國注佚猶更也文十一年身橫九畝叔孫得臣敗狄于鹹射其目身横九畝斷其首而載之眉見干軾文十一年緩帶一人有孑三人緩帶文十八年粲笑軍人粲然皆笑昭四年天疾有天疾者兩足不能相過齊謂之綦楚謂之跛衛謂之䡊昭二十年祝髪祝髪文身哀十三年此傳穀梁赤作也赤魯人云亦授經於子夏故其言經略與公羊同其云立乎定哀以指隱桓隠桓之日逺矣者亦公羊分世言經之意也公羊以妾母夫人為禮而穀梁黜之公羊以宋襄之師文王不是過而穀梁非之所見似又過於公羊然舉大體言則視公羊又寂寥矣注者范寗亦頗簡明杜預注左氏獨主左氏何休注公羊獨主公羊惟范寗不私於穀梁而公言三家焉如曰左氏以鬻拳兵諫為愛君文公納幣為用禮是人上可得而脅居䘮可得而婚也穀梁以衛輙拒父為尊祖不納子糾為内惡是為子可得而叛仇讐可得而容也公羊以祭仲廢君為行權妾母稱夫人為合正是神器可得而闚嫡庶可得而齊也又曰左氏豔而富其失也誣穀梁清而婉其失也短公羊辨而裁其失也俗凡皆確論云黄氏日抄卷三十一
