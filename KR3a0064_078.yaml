body:
  text: 黃氏日抄卷七十八宋黃震撰公移一紹興府試院曉諭榜咸淳六年庚午監試竊惟靈於萬物而為人秀於萬民而為士綱常所賴以扶持國家所資以共治自昔莫不皆然我朝尤所加重三年頒詔與郊祀天地之禮均萬乘臨軒視册拜公孤之儀等士生斯時而應斯詔亦宜何如其自重哉峩峩其冠褎然舉首默默就列各奏所長以側耳鹿鳴之三章而安意丹墀之獨對士之自重固莫不然奈何士之貴重歆艷者衆及其既久遂成雜糅市井遊手敢乘時混入以撓羣村鄙富民敢妄意乞餘而濫吹使刻苦平生待聘一朝之士長廊寸晷既苦於橫目無籍之喧拏西風走鈴復扼於銅臭小夫之攘竊有識慨歎幾年於兹乃者恭遇公朝力革斯弊盡復祖宗三日連試之舊制痛懲市井一時溷擾之囂風披沙石所以揀金去鴟梟所以來鳯凡我士類孰不欣欣况越為帝鄉恩數獨殊於儔等士多魁傑文聲赫奕於方今其能率先四方倍加自重以無負聖天子所以崇重作新之意必矣何俟某贅禱况某見申防嫌俟候出院亦何敢贅禱然有舊遊場居之鄙見或可愛助冒昧稟聞某嘗謂我輩赴解試便當視如赴省試省試拂明待門寂然無譁解試或夜半喧呼先索其氣此以解省二其心而未能如省試自重也今即請自重如省試省試入門徐行彼此禮遜解試或排門填擁相蹴至顛此以解省二其心而未能如省試自重也今即請自重如省試省試見題就位即刻操筆往往未午了卷解試或雜聚簾前或紛走廊廡不覺日西至夜方窘此亦以解省二其心而未能如省試自重也今即請自重如省試赴解試如赴省試則赴解試即赴省試氣象雍裕有開必先萬里修程於兹發軔其謹之哉其念之哉他或市井遊手村鄙富民尚敢不悛自有法在其為士者謹勿預併乞台照某申稟又曉諭假手代筆榜竊照士君子鍾扶輿清淑之氣為天下第一流品平生讀書三年待試近之榮親在此舉逺之致君在此舉上之報答造物下之利澤生民在此舉此一字千金不換之時也此足穀多財之家平日驕我侮我者一旦望我青雲之上羞愧俯伏之時也近世乃有為微利所動者反為富民代筆攙取本身元有之祿料而暗虧平生逺大之前程不曉何見真可痛惜世有富商大賈一旦失其本心者得乞丐人一二糖飴反盡棄平生所有珍寶財産以豫之攛掇乞丐為富人而自身情願受飢寒讀書人為村人發解及第而身甘淹賤者何以異此越為帝鄉士風素厚學識素髙固萬萬無此近世既多此風不容不僣及之某申稟士農工商各有一業元不相干為士者多貧雖至仕官尚苦困乏惟為農工商賈而富者最為可慶最當知足蓋人若不曽讀書雖田連阡陌家資巨萬亦只與耕種負販者同是一等齊民而乃得髙堂大厦華衣美食百人作勞一身安享不惟一等齊民不能及之雖貴而為士至於仕宦祿賜有限憂責無窮亦豈能及之富室若不知足又當何人知足近來風俗不美富室間不安分更欲揮金捐財假手代筆攘竊士人科第盜取朝廷官爵敗亂官針賺誤百姓試且思量老天肯否故人衆勝天之時雖得熱閙粗瞞婢僕及至天定勝人之後終納敗缺喪敗户門有因一時僥幸之後狂圖交結至重費而敗者有因狃於為富之故習貪黷犯贓而敗者有臨官不能處事書判不能動筆受成他人為其所纍而敗者比比皆然人苦不察耳然此猶以近世之通弊言也今朝廷清明痛懲弊幸以清入仕之源前舉省試前名覆試不中尚不沾祿徒然破家求榮得辱可為明戒今舉又備奉朝省指揮應代筆僥幸者根究決配本州以人情給解帖者將來覆試不行知通教官一體坐罰號令方新斷在必行預告富家勿討煩惱若知讀書之好若慕及第之榮但請福上增修力行好事子孫必有讀書起家親擢科第者古人有言臨淵羡魚不如退而結網某奉勸撫州咸淳七年三月二十八日中途先發上户勸糶公劄某濫叨牧養適值艱食對越一忱惟欲安富恤貧使彼此相安而共濟決不敢從事一切抑價勸分置場拘數使富室或至規避而吏胥得以夤緣也然撫州米貴於斯為極乘時急糶足以接濟鄉曲而利亦在其中否則價平復舊雖欲售不能而鄉曲之怨亦歸之兩失之矣髙明當不待多祝職守所係自有不容已於言者謹兹稟控伏乞台照四月初一日中途預發勸糶榜撫之風俗素以好誼聞天下近如饒止翁平價濟鄉曲諸孫皆擢髙科登顯仕天下無不歆慕之况鄉之人乎撫去嵗偶歉糴價浸踴貴官大室固多出糶乃聞間有利在增價密售客販反不恤鄰人之告急者又有尚欲待價未肯出糶忍不思取數之已多者然則好誼之風何在豈偶為利心所汨人苦不自覺耶天生五穀正救百姓飢厄天福富家正欲貧富相資米貴不糶人飢不恤天其謂何况凡仰糴之人非其宗族則其親戚非其親戚則其故舊非其故舊則其奴佃非其奴佃則其鄉鄰彼其平日敬我仰我者果為何賴今一旦遇歉竭彼苦惱無所措辦之錢博我從容儘可通融之粟此之糶與否彼之死與生君子以仁存心寧不重為矜惻切幾孚體四月初五日中途預納上户四月十三日到州面議劄某近二十八日嚴州道上預與専劄懇請發糶蓋民食到此急矣當沐孚允四月十三日度可到郡至日首屈車從面敘殷勤切幾垂訪顒俟顒俟伏希台照四月初十日入撫州界再發曉諭貧富升降榜照對本職被命此來専以救荒為第一事對越一念凛凛栗栗固甚欲恤貧亦甚欲安富昨到建德路上已作劄勸諭上户出榜曉諭細民預行發去外繼此沿途探問乃聞閉糶自若米價日增不知稅戶何以為心甚至聞金溪管下嘗有飢民羣擾富室此固小民之罪獨非富室閉糶之罪乎本職聞閉糶者籍搶掠者斬此辛稼軒之所禁戒而朱晦菴之所稱述兩下平斷千載不易萬一事有不獲已當職安得尚從姑息而已乎今來姑以富室之閉糶飢民之搔擾皆本職前項約束未到之先特於本職入境之初再此開諭併布心腹願與一州之人共集和平之福一今與富室約不敷數不抑價不置場並不留片紙在官以貽將來吏胥按籍搔擾之患右請富室念上天之福祐而富我者果何為官司之委曲而勸我者果何在乘此價踴頓數急糶種德無限得利亦多本職此來専一為百姓立而請命於富室富室不聽即以一身歸而請罪於朝廷無緣敢一日強顔獨飽於飢民之上惟富室思之一今與小民約官司既以禮勸富室富室必能以義救爾民爾民只得小心聽候告糴右仰爾民當知貧富不同各有天命荒年方仰富室為衣食父母不可苟生怨望富室之心安分忍耐度此艱厄凶荒之後必有豐年他日尚要做人今日不可胡亂做事有犯到官決不輕恕未能救命反先得罪惟爾民戒之一急糶者富室也待糴者飢民也官司既不以文移滋吏姦則通此脈絡於公私上下之間者鄉曲好誼之士也右請貴寓之賢學校之英鄉閭岩穴抱道未仕之彥各以天地民物為心各以父母鄉邦為念以義理感動鄉之富者以恩威開諭鄉之貪者以施行之未當事宜之未悉告為州縣之耳目不接者其所𢎞濟何可諭云蓋聞天之生人惟有愛人人衆不能盡皆契天天定則又時加汰治凡其飢厄之嵗皆其升降之機富室在豐年賢否未知也及至荒年或惻怛而濟惠或頑忍而不恤富室之賢否分矣小民在豐年善惡未白也及至荒年或堅忍而守分或無賴而妄作小民之善惡見矣賢否既分善惡既見天之升降生人於斯乎決於是富者或自此而貴顯或自此而禍敗此升降也貧者或飢過而溫厚或官刑而滅亡此升降也天道循轉自昔皆然但人生只見目前往往顛倒其中而不自知若瞻之百年之前要之再世之後髙岸為谷深谷為陵貧富易位升降曉然是可以觀天矣是當思所以契天矣此皆吾州賢人君子之所素知更請推廣其説遍諭此意人心不甚相逺必有惻然動心者須至曉諭四月十三日到州請上户後再諭上户榜照對救荒之法惟有勸分勸分者勸富室以惠小民損有餘而補不足天道也國法也富者種德貧者感恩鄉井盛事也今我撫州不勸分而勸糶者曲體富室之情也急謀貧民之食也然於富者貧者太守兩有愧色也於富者何愧愧不能勉其種德冥冥而徒徇其踴價繼富之私也於貧者何愧愧無以使之感恩富室而反為此虐惸獨畏髙明之舉也太守有人心者也事與心違而不布其失於境內是內欺其心外欺其民愧益愧也興言至此涕泗交橫其將何以雪此愧也必欲雪之小民固不能太守亦不能而能之者獨富室也富室其何以雪之也米價低昂今權在富室也富室若曰不抑價者太守待我厚也官不我抑而我自抑之者我自待厚也均此人也小民終嵗勤動以有此粟我何修何為乃安坐而奄有此粟靜言思之愧也平時而奄有此粟已不免愧今勤動而有此粟者反不得食此粟而死矣我安坐而奄有此粟者猶忍靳此粟而不之發又宜何如其愧也蠶方浴而桑生兒方産而乳生人民遍育於天下而五穀生五穀為民設也民生飢死矣而五穀尚忍為我私是猶奪之桑而不以飼蠶奪之乳而不以哺兒其有愧於天何如也生吾鄉而長於我者吾父吾兄行也生吾鄉而幼於我者吾子吾孫比也雞犬相聞守望相助疾病相扶持少長聚嬉戲平居詡詡笑語一家均也一旦艱食不思分己以豫之而反騰價以困之平日之情何在鄉黨之義何取其有愧於人何如也自古治日常少亂日常多生於亂者性命之不保又何富之可安自我藝祖以仁立國吾儕小人世世得生長於春風和氣中己未之變亦幾岌岌賴我先皇帝及元老大臣再安宇宙我亦遂得再土此土宅此宅田此田日積月纍以有此富是我性命朝廷所生也土田朝廷所保也而富亦拜朝廷賜也生殺豫奪皆在朝廷雖貸我粟賦我財或甚而奪我富其何不可今朝廷遣官厚以待我而我猶忍於自私其有愧於朝廷又何如也愧於天愧於人愧於朝廷富室而興言及此恐亦涕泗交橫如太守之愧發於中心而不能自己也然則富室而必欲為太守雪此愧不過自出仁心自抑米價自惠鄉井則可愧者立變而為可榮可賀之盛事也官雖勸糶而我自勸分也富室而果有能此者糶二千石以上太守自旌賞糶一萬石以上太守申朝廷補官已有官者升擢此太守所以報德決不食言也其不聽者亦不敢強也其州郡前此勸富室移粟入城數多者亦斷斷議賞如前説也四月十四日再諭元約不到上户書判官司既不抑價上戶自宜糶米其或未受劄未赴請者恐是一位牽於衆位耳儘自不妨但朝廷遣官急救飢民未入境時先具請劄及既入境又自見餓莩滿野却欲早知各宅何日發糶案備帖再差元投劄虞候稟聞各宅取發糶日分狀回報以慰拳拳顒俟之心數目借貫却一切不敢問四月十四日再曉諭發誓榜昨當職在紹興府被命之初聞本州大飢而富室閉糶不勝駭懼即採訪於相隔千二百里之外發劄於未到二十餘日之先預期十三日到州交事即於當日禮勸上户昨日十三已荷上戶如期到州面行勸諭訖但元請只是在逺約莫非見在州縣按籍點請者比不過略請幾人面見一畨囑其歸而次第轉諭耳安得人人遍及竊慮深村逺地未悉此意所合於禮勸次日再行榜諭通知米貴至此自當乘時發糶官司既不抑價又何待勸其間好誼之家請自行分潤以惠鄉曲須仰處處發糶庶幾飢民各有依靠不至逺出流散致荒田作若十日之內不糶者輕則差官發廪重則估籍黥配三辰在上一語必酬四月十四日委官核實諸坊廂人户糶户歷當職入境近城以來多有坊廂人户陳乞給歷若果係坊廂不容不給其人或自可過活亦不容不審聞本州元行勸糶均及鋪家亦非易事也當職每見所在給歷有錢者計置廂分而多得無錢計置者合當得歷而反不得歷亦有固當得歷而父子兄弟一家正為團結亭户各為保守以濟時艱團結之法合先有以養之司只今契勘各場未散本錢急先措置俵散不可拘守舊來弊例又訪聞亭户本錢官吏不獨欺取於既散之後又且摟借於未散之先上下蒙蔽弊幸非一當職既以鄉人暫持鄉節共救艱難但欲力行好事不忍掩人不備陷之於罪若倉庫有欠速行補足先與明告却當差官點數文字才足即欲散錢臨期或有疏失法所不恕行移團結亭丁本司備凖省劄指揮専一團結亭丁訪聞舊例上戶不屑入甲止將中下户入册又是具文不曽從實結定遞相覺察以致近日一畨擾亂今仰不問上中下戶比同編戶一體置牌結罪保明十家結為一甲輪月遞充甲首應充甲首之戶常切告報同甲之戶各各安心著業保身惜命度此艱厄再見太平如有生事之人即時同共禁絶如其不伏即時申聞本場具解本司重作施行一人身做身當一場無災無難如不申聞同甲坐罪上戶本不與下戶同列聽令備丁私僕充之總統之權只在場官一人每十日一次喚上甲首點名告戒若呼喚統率則在場官各自審擇又安有勸而不糶者乎委曲一言會須響應專請樂安縣十提督牒本職超資叨郡専為救荒人微寄重凛莫知措所望惟本州賢人君子自相與出力為鄉曲計耳諸縣除各一面次第詢訪寄寓委其任責轉勸外惟是樂安一邑去州獨逺報應不易倍切苦心訪聞樂安介萬山間每當歉嵗卒至乏食所幸不通舟楫境內之米少得淺糶外處尚可自救鄉里但常年官司排糶止及在縣市戶其在縣郭外以及四鄉實係辛苦農種根本之民官司反不暇及蓄米之家遂得公然閉糶邀價吾民無所赴訴使人惻然今嵗艱糴最甚而本職又到官最遲惟有曲盡人情期於貧富相安不勸分而勸糶不以官司提督而以寓貴轉懇不經吏手而本職親手接受文書之往來以此作急救民尚可庶幾萬一今除縣內排糶知縣照舊例勸分不必更改外其今來本州行下勸糶正為郭外及四鄉五十四都飢民而設非得士友之賢而有心力者相與維持家至戶勸則新官一旦之言衆聽無從遽孚今採輿論分地禮請四月十九日勸樂安縣稅户發糶榜當職被本此來専以救荒為第一事管下五邑已一體榜諭施行大約外數內樂安一邑又與他邑不同此邑僻在萬山不通舟楫富家蓄米素無和糶獨有苗斛儘可以濟鄉曲在五邑中最為樂土邑內風俗當職雖未能周知如出等稅家彰彰在人耳目者已略得其槩如詹良卿登仕則甲於一邑四鄉者也曽料院許道州詹季宏官人曽正則官人曽季同官人詹明伯官人皆邑內蓄米之多者而中戶又不與焉如康元甫官人周叔可官人則甲於天授樂安兩鄉者如永豐湖西羅袁教羅連幹之寄莊則甲於雲蓋一鄉者也他如黃景武官人暨景文景憲景雲等官人四兄弟黃子光官人暨子大子忠鳳孫等官人四兄弟及黃漢舉官人陳季升官人陳子清官人黃晉甫官人黃信甫官人丘子忠官人鄧子清官人張彛仲官人張普卿官人曽季毅官人曽季常官人鄭榮甫官人鄭憲甫官人與鄢甲頭此四鄉蓄米之多者其餘當職未能盡知除一面陸續採訪及懇鄉官次第轉懇今來不以公移勸分而禮請名士宋節幹等十貟分鄉提督勸糶不以官司督促而以本心之所同然者往來於文書之間不立官價不立官斗而一聽蓄米之家隨時低昂接濟糴戶凡此豈但為飢民之計正深所為富室計否則鄰里憔悴啼號其門雖有粟又烏得而食或甚而飢民懷不肖心羣聚澒洞富家又能晏然而已乎樂安文風最盛富貴者多賢此理曉然正不俟當職察察言也且隨價糶米本未得為濟民事也賤極必貴貴極必賤人棄我取人取我豫此自昔謀利之要術而富室正不當坐失機會之秋豈待官司勸而後糶如前所舉三十餘家官民戶之蓄米者特舉所已知而言之其餘或止能糶數百石或數十石隨其多寡皆合發糶出等戶不必糾把中等戶中等戶不必推托出等戶米貴急糶各宜爭先可也然此特取人情之常簡而易行者言之非敢以薄待吾樂安賢士大夫也其有能於官司不敢相強之外自發仁心自行好事自減時價真濟實惠活其鄉井者糶及二千石以上本州並量其資品隨其志願特加旌賞或徑從本州借補充節制司凖遣糶及一萬石以上本州保明具申朝省未有官者補官已有官者升擢此項已牒委提督官保明申矣其或吝藏如故長價不已亦請提督密具姓名申及密差人探報當重作施行矣各請孚體毋忽然此為糶於本邑者言也又訪聞雲蓋一鄉田産當本邑三分之一而半歸於永豐湖四羅宅之寄莊羅大族也視利甚輕本亦未嘗不肯平糶而其遠在樂安之莊幹瞞其主人乘時射利本邑雖不通舟楫而有牛田一小溪直透吉之永豐一棹扁舟即泄界外實為尾閭雲鄉艱食則一邑俱艱食矣此項除帖本縣請急移文羅宅覺察莊幹并請其行下牛田隅保出榜賞一千貫米給捕人籍莊黥幹嚴禁戢矣併合榜示四月二十五日委臨川周知縣滂出郊發廩榜南塘饒宅位衆米多向來不早糶論訴者不一當職到任之初欲先以禮勸未敢輕易遽見施行今當職到已過十日開諭再三明言十日內不糶輕者發廩重者佑籍矣饒宅乃方行抄劄所居七十七都人户而延壽之七十六都七十八都長壽鄉之六十三都皆是饒宅寄産去處到處人煙皆是饒宅佃戶又忍於置之不恤反倡為胡説惑亂民情妄稱一都自了一都何饒宅後生如林無一知畏天地知畏朝廷耶六十四年前戊辰嵗撫州亦曽大歉時朱晦庵之壻勉齋黃先生為臨川知縣奮然言曰勸糶適足以閉糶惟發廩尚可以活民即日親出城至河東謝氏莊問其因何未糶守莊者曰元糶價五百今欲增價也勉齋即立價一百甫半日發盡謝氏至前待罪勉齋曰汝不發糶至勞知縣為汝作幹甲汝亟交錢去若别有倉廩仰以實告我更親往價又減矣謝氏自此盡糶鄰邑聞風相應嵗以無飢今日南塘之饒即前日河東之謝知縣仁者之勇又豈減於勉齋哉請即驅車親詣南塘將被訴最多之人英一官人英三官人兩位照黃勉齋例減價發廩不問鄰里之遠近一切普糶諸位請自次第出糶不伏者亦如之縣事請縣丞暫權回日仍舊饒宅有拒命者徑與封籍解州委周知縣發廩第二榜南塘饒宅米多糶少又不恤寄産之鄰都坐視租佃之飢餓已請委知縣躬親發廩矣昨本縣申到陳孟八官楊茂五官陳茂三官三家不糶本州除已差巡檢躬親前去封倉外今併請知縣就路與開倉平糶兼訪聞長壽鄉六十三都地名源頭焦陂陳孟八官人米穀在門首之左右廣西鄉六十九都地名竹山口張曽十翁米穀在舊屋其男張紹一郎米穀在閔源新屋廣東鄉七十一都地名上嵩余靖一官人男及同鄉余七三官人各有米在本宅廣西鄉五十六都地名楓塘楊茂五官人亦各有米在本宅皆未肯糶數內張曽十翁至為人鏤榜呪罵落地獄擔鐵枷可想民怨矣此項并請知縣就行核實一體令其照查監稅陳省元李省元等價每貫會糶米三升穀則倍之不情願者發廩拒命者封籍追解當職本心只欲安富恤貧彼此相安元約十日不糶者發廩或封籍今已過十日之限矣富而恃頑不恤飢民不從禮勸者若不嚴行是富者愈橫貧者愈困何以上應公朝差委之命近來吉州太和縣人姓章名庚因長米價為雷所擊見立碑太和廟前本州因崇仁饒縣尉為富不仁屢勸不率亦已差旗軍統領追請矣况無官等戶凡爾富室各請自愛知縣為民父母只得就此一畨出郊賞罰兼行鄉落遍勸務使不拘現錢不限鄉都處處如此近一貫三升之價方可為民奏凱回縣鼓琴詩不云乎蔽芾甘棠勿剪勿伐召伯所茇勞己以就民也他日將有指知縣之旅寓賡甘棠之歌詩者勉之勉之委周知縣發廪第三榜知縣親行發廩一出經旬徒御亦良苦然吾民則樂矣遐想所至黃童白叟日滿車下伸眉爪掌以伸得食之謝知縣亦必欣然內愜忘其為勞苦也去嵗撫州之旱臨川為甚臨川之旱北路為甚東路林麓皆已成知縣蔽芾之陰矣甘路二都如前坪之王宅庫僧米斗二百足梁岡之鄒郎吳郎郭頭之王秀店邊之諸陳米斗二百四十足四都如羅湖之吳乙官人許百三承事米斗又皆二百四十足雖曰出糶飢民何處得許多錢以糴之然則得食者能幾人歟五十八都如管頭之何和尚古樓岡下之梁八秀才每斗一百八十雖曰差減而碣頭之孟宅庫則二百二十矣六十都如黃墓岡庫之黃秀才雖減十錢如新陂之劉千二郎樟橋之陳千十公則又二百二十矣五十九都如葉慶二官人出榜每升三十固為知義而葉十九官人為奴僕夾雜鹿穀每斗糶百單五何不察也如城塘之吳承事出榜每斗減錢十五固亦為知義而前坊之劉礦坑之胡㩂山院前之吳皆百八十何不相效也五十五都如冷水坑之危官人固為略減而大橋之李亦尚一百九十也東路北路之飢一也東路荷知縣一行皆已一貫三升聞風競糶北路如就蒙枉駕所向榜諭有不率者亦發糶一二庶幾北路飢民無奚獨遺我之怨而百里同風矣旅泊日久天暑向炎某懷不能已僭以所間告豈弟君子民之父母庶幾均愛焉齋釀二掇遙寓舉杯相屬之意領略感荷歡聲凱還嫓美勉齋尚當迎馬首稱賀也五月二十五日委樂安梁縣丞發糶周宅康宅米樂安荒政賴局官提督官盡心已見端緒聞數內愧仁周九十官人龍義康十六官人尚未從勸甚至中內餓死之人鄰都謂責有所歸非我之咎惟歎息而不及救此等吝執既非鄉曲之所能勸若不以官司行之將立而視吾民之死乎本縣梁縣丞廉介自持士民信服帖委前往各家監令照本縣見行市升平糶價出糶價將愈平富室反失機會矣如尚吝執不伏監糴即請飛申本州别作施行朝廷差官救民他皆非所暇恤案只令備榜隨行仍差虞候一名前到丞廳隨直催守六月初一日勸稅户陸續賑糶榜照對荒年勸糶不獨為貧民求飽亦正是為富室求安本州今春飢民嗷嗷勢亦可慮近荷寄居稅家減價出糶遂得帖然闔郡上下皆當知感為寄居稅家者近想得知遠處間或不得自安而此幸得安亦必內愜於心而私自慶矣但六月一月是為青黃不交每常大熟年分到此六月亦自艱難何况今年古人有言人情一日不再食則飢萬一救不到頭何濟於事自今官司州縣局官提督職事與夫發糶之家到此尤當極力接濟以全人和以迓豐年切不可有一毫玩弛之心行路百里者半九十為山九仞者虧一簣當職不勝過計之憂除已具申朝省推行糶米上戶賞格及體訪逺鄉間有閉糶中止之家節節不住發廩施行外所合備榜州前併榜帖諸縣再行勸勉六月二十日委樂安施知縣亨祖發糶周宅康宅米本州飢民已荷上寓富室次第發糶小民賴以全活今新稻亦將熟矣獨樂安縣康十六官人周九十官人兩宅米最多而獨不糶為其鄰甲火佃者多餓死就兩宅中又獨周宅為尤不可勸勸糶提督黃省元代之哀痛至誓天食素者兩月而周宅不恤也至反申縣誣其搔擾本州遂差本縣清官梁縣丞前去監糶令又訪聞縣丞極廉而兩耳目之聰明一旦無以勝吏卒之姦縣丞初欲先到周宅其見已定廳司乃硬押轎畨先至康家遂致周官人先期搬藏米穀欲以空倉虛歷欺瞞縣丞稱為巳糶本縣契勘此事非知縣親行不可近臨川管下亦多不糶周知縣照黃勉齋為宰日親行出鄉發廪故事周行一月到處發廩小民方家家得食目今青黃不接民命死活只在此數日間帖請樂安施知縣痛省騶從即日單車躬親前去周九十官人藏米處坪上莊凹背莊竹園裏莊上巴莊東坑莊陳城渡黃細乙家莊饒辰家莊南莊焦坑莊丁陂莊康材莊等處根括斛米疾速應糶仍請提督黃省元為民命忍耐莫避仇怨同行指引以救此一方民命如違即追周官人赴州其樂安縣事帖委鄰縣廉明之官崇仁縣丞趙兼僉即日前去暫權候施知縣監糴了日回任即請趙縣丞回本州僉廳分帖仍各差虞候催行又再委施知縣榜撫州稅家無不乘貴糶米樂安周宅乃獨深藏到今豈其雅意正為青黃不接救民之地耶今施知縣領九天之命為百里之君乃觸暑入鄉為周官人代行幹甲之職親行糶米實前此所無之事在周宅亦不勝其榮矣乃聞一境小民過疑周宅他日相害寧忍飢餓不敢糴其米又聞所委梁縣丞不甚振職日飲周家之醇酎晝卧周宅之涼床若果如所聞民將何賴本州吕府判専為救荒而來甚欲一到樂安近以知縣自行任責故遲其行今為何時尚可擔閣帖催知縣行司如本州近委同糶之官不能任事及一境小民疑畏周宅而不敢糴米請即飛報知縣朝有報則府判夕起程當日周宅將見封之米並行普散與逺近之民周家他日安得人人而治之鄰近小民今日若與速糶尚可使周宅得錢是亦為周宅之計周宅不應反怨糴米之鄰也榜知縣行司仍帖權縣速遞往一日申六月三十日在城粥飯局結局榜本州當倉庫赤立餓莩滿野之時荷謝衆力造飯救民此是逐日挨排約至六月盡結局凜乎常恐不繼今六月已盡錢米亦盡恰亦荷謝天地早禾已熟米價頓平百姓小民到處可以趂飯此時真可結局矣但恐窮民每日喫見成飯一旦失望今於結局日喫飯了更與各給路糧使之回家趂熟一年壯人不問丈夫婦女每名並支付米二升官會一貫一孤老殘患之人每名支米四升官會兩貫一孤幼小口比大口例是減半每名支米二升官會一貫右各局委官躬親到寺待各人坐地喫飯勿令起身先次面問審實帶廳從抄劄訖然後逐名就坐處分俵前項錢米仍仰監局兵彈壓不許喧譁受領訖人次第發過出寺其監局造飯將官兵士與各寺同共造飯僮行火頭别行支犒七月初一日勸勉宜黃樂安兩縣賑糶未可結局榜照對本州勸糶實取怒富家巨室之事應干勸糶官吏及提督寄居士友人人危懼當職為遍申諸司及申朝省遂各得展布自盡一州賴以存活惟是倉司向猶虛席未曽申明遂致攛布袋無詞主狀果有訴及在巡轄等當職己申乞追上詞人審實甘與同罪矣今來契勘樂安宜黃兩縣管下多不種早禾率待九十月間方始得熟見今勸糶猶是青黃不接之時未可便行結局訪聞大姓上戶買遊士以假大義分譁幹以訴膚受伺候倉臺乘機投訴必欲橈敗見行荒政除已具申提舉使臺乞賜照應外所合備榜各縣通知六月二十八日禁造紅麯榜米所以救命酒止於行禮一日無食則死百日無酒不妨故古先聖人拳拳於民食至重酒則除祭祀奉親外餘皆禁而不飲後世官司以酒為利縱民飲酒糜壞米谷此已大關世道然所壞者猶止秫米耳撫州風俗多飲紅酒不獨醖釀秫米又盫壞食米為紅麯此事最害民食然間猶境內之用耳臨川崇仁接境一帶如白虎窐如上城如馬嶺如航步如衆湖等處専有一等麯戶壞食米為紅麯公然發販與四方民旅如衢州龍遊遍賣鄰路之狀是絶本州百姓之性命以資四逺無賴之狂昏其為不仁莫此為甚然在常年喫了飽飯不知天地不顧罪福猶可諉為習俗之常今經大荒餓死無數今獲存者皆是更生此時而不痛革又待何時備榜五處仰麯戶上畏天誅下畏官法日下速行改業别去營生仍仰都官保正鄰甲各行嚴戒覺察如有故違定行徒斷革沒坼屋移徙立賞錢一千貫十八界許諸色人捉造麯器具併見造新麯到州告首即時支賞後於犯人名下追解其餘諸縣分帖請行禁戢第二榜到處州郡皆靠酒息又比元額遞年增添獨撫州制於抱息酒戶總一箇大州府只納得百來貫錢無他郡十分之一又是二十年前之額今時酒價比舊增多少而納官獨無分文之增是撫州一郡利源全歸酒戶縱不得此百來貫亦初不計利害今酒戶反敢頡頑驕傲恃此身為官司趂辦之人動輒羣到官司喧閧本州近以大荒之後米穀可惜自於城外六七十里航步等五處禁遞年販泄外州麯戶壞米為麯於在城初無榜文於酒戶初無妨礙乃亦與麯戶平日人情稔熟之故成羣到官橫身攔截欲借酒戶官錢之名求免麯戶私麯之禁酒戶自擅州郡之利州郡未嘗仰酒戶之息果何所恃而自認為驕子耶罰不及衆蕭必達為倡首之人疏長枷鎖錮身引押下盫麯壞米地頭白虎窑上城馬嶺航步衆湖五處各示衆一日取各處鄰保及兩都都官已號令訖狀申如酒戶向後再有紊煩定取會鄰州二十年前酒額比對見今酒額照例增錢第三榜紅麯壞食米撫州經此飢荒人得更生之時合盡照金溪縣例以麴麯為白酒昨緣請教於寄居尊上程帥參故於在城酒戶略開一路而特禁村市造紅麯之家今在外者未必皆盡依官司之禁而在城者反先犯官司之禁自早米新熟盫造已及一月酒戶若了自店之用儘已有餘却又代為村市多造公然販出城外如此則是本州之禁村市盫麴専為在城酒戶等一網兜盡利源之地而於愛惜食米初未有益也截自八月初一日為始並不許酒户市戶等私盫紅麴如有已盫造者須於三五日辟邏了當莫留遺蹤初一日以後有造者並照村市已行約束賞錢一千貫許諸色人告首犯人重斷移徙仍榜九門自草五日為始並不許人搬販紅麴出城有犯並根究盫造之家照前項約束施行門頭守把軍人隱蔽縱容重斷開落名糧七月初一日勸上戶放債減息榜近據晏府新恩劄狀稱本州上戶放債取息有至合倍以上者乞行禁戢當職讀之駭然最是去秋大歉小民必是無可還債今年春夏飢餓必是債上添債今秋若因稍熟上戶便欲一頓對合取償則小民今嵗之苦更甚於去嵗之荒矣是雖盡與蠲閣可也但念其貧富相資世代相聚不敢行官司一旦直截之令反絶小民他日求債之門先布腹心曉諭上戶上戶若非讀書興家亦是積德致富義理所在其誰不知請自今脫去凡近致身廣大念性命本同一源知人我本同一體財貨不過外物貧富久必易位將利債痛減分數許鄰佃量力漸還種德無窮永保富厚如或故違則有法在詞訴約束照會當職已入州治合受民詞今預期開列約束下項一詞訴總説訟乃破家滅身之本骨肉變為寃讎鄰里化為仇敵貽禍無窮雖勝亦負不祥莫大焉但世俗惑於一時血氣之忿苦不自覺耳撫州禮義之鄉何有於訟近亦間負珥筆之謗識者固羞之况當飢歉之餘正宜省事之日譬如病後將息為上又豈人戶爭訟之時惟是當職德薄不足以任教化之責恐或者未能忘訟勉為依例開放以通民情一詞訴條畫不經書鋪不受狀無保識不受狀過二百字不受一狀訴兩事不受事不干己不受告訐不受經縣未及月不受年月姓名不的實不受披紙枷布枷自毁咆哮故為張皇不受非單獨無子孫孤孀輒以婦女出名不受應受者隔夜拋箱當日五更聽狀並先立廳前西邊點名聽狀了則過東邊之下一詞訴次第國家四民士農工商應有詞訴今分四項先點喚士人聽狀吏人不得單呼士人姓名須稱某人省元其為士而已貴與蔭及子孫有官用幹僕聽狀者隨附士人之後幹僕却呼姓名然須有本宅保明方受士人狀了方點喚農人須是村鄉種田務本百姓方是農人農者國家之本居士人之次者也餘人不許冒此吉善之稱農人狀了方點喚工匠應干手作匠人能為器具有資民生日用者皆是工匠狀了方點喚商賈行者為商坐者為賈凡開店鋪及販賣者皆是四民聽狀之後除軍人日夕在州有事隨説不須聽狀外次第方及雜人如伎術師巫遊手末作末作謂非造有用之器者牙儈船稍妓樂岐路幹人僮僕等皆是雜人此外又僧道亦吾民為之然據稱超出世俗不拜君王恐於官司無關官司不欲預設此門一詞訟日分自六月為始每月初三日受在城坊廂狀六月初三日私忌改用初四日初八日受臨川縣管下鄉都狀十三日受崇仁縣郭及鄉都狀十八日受金溪縣狀二十三日受宜黃縣狀二十八日受樂安縣狀自後月分周而復始其有不測緊急事自不拘此限但常事不許挾緊急為名樂縣尉絶户業助和糶榜故南城縣尉樂迪功名誼初在南城曽求錢氏嬰兒為子兩嵗而夭又嘗求幹人徐順十嵗女聖姑為養女改名妙聖今亦已嫁人縣尉嘗娶妻而中休已改嫁江東饒運幹縣尉孑然一身身死即為戶絶死後其族姪文郁嘗自立其子惠孫欲追繼錢氏兩嵗之子其養女妙聖亦嘗冒稱縣尉親女兩嵗未成殤既無立後之法幹人所生女難名本官之親於是其家蕩無主者外親內族下至幹僕紛然搶攫數世之積一旦而空其族初以聞之縣縣不敢問本縣繼以申之州州亦不欲問及衆忿不可遏羣訴於州本州委司戶吳兼僉檢校徒有屋柱存焉耳雖司戶曉事逐漸挨索所謂存十一於千百竟何補哉此樂縣尉戶絶之大略也在法戶絶惟當沒官本州念樂氏乃侍郎名史之後侍郎為撫州在國朝破荒登科之人亦江西歐曽諸老未出時先以文學顯名本朝之人侍郎之後雖不止縣尉而有官有生計尚惟縣尉若盡沒官亦何忍哉今為繼絶以其餘者沒官以其沒官者為鄉曲誼事庶幾兩全耳繼絶之法當以親論拖詳樂宅宗支自五世祖名友諒之下凡三位樂十官人一位也樂十一官人一位也樂小主簿與縣尉共一位也主簿先絶今可為縣尉之後者惟十官人十一官人兩位耳十一官人生兩子長文郁長者法不出繼次囦已繼主簿所可為縣尉之後者又惟十官人一位耳十官人生三子長文煥長者法不出繼其第三人不學而開染店就此位可立者又惟中子名文炳耳文炳現年已二十五嵗雖亦失學而粗能書寫略通文理不獨於本位為親亦視諸族為優今立文炳以繼縣尉之絶照條三分給一至二萬貫而止以田産屋宇山林房廊雜産牛畜通計價直而給之此外有公奭者比文炳多開一世服屬已盡又年已三十八書寫不成字當來族長保明與文炳同到官今既不在合立之數量撥一千貫以給之喪葬於條撥五百貫今時異事殊物價工作皆貴兼樂縣尉身後可念與增給至一千貫凡此於户絶均給之法多給二萬貫內妙聖既為養女縣尉别無親而鍾愛之順其生前之心給一萬貫本人已曽占田産據銀器却與比折通算內樂囦省元與縣尉同戶而元亦係繼絶法無平分除縣尉在日已給外特與給五千貫文郁曽以其子惠孫為縣尉之孫知其不可先自引退此有識者也謀繼不遂特給三千貫囦與文郁既給則十一官人位下均及之矣文炳既立紹家業二萬貫其親兄文煥親弟文明本不可再望然均於縣尉為四從姪縣尉絶而戶産分寧無獨遺之憾文煥文明亦各給一千貫如此則十官人位下亦均及之矣既用繼絶之法又用均給之法侍郎有靈亦知官司於樂氏無負况縣尉乎此外沒官夫復何説然官司非利之也三邊未撤戍和糴不可免本州和糴者四縣與建昌軍以四縣應和糴土産人戶大略相當前官失於申明糴數乃數倍於建昌譬之舟載非力勝矣民之困苦亦難言矣本州近雖以阿鄭三鄒談胡等莊沒官充軍餉未蒙比折減糴申請於上而愚言未必盡效目擊民瘼朝夕痛心今姑以樂宅沒官之物少寬之內樁到元米二萬一千有零鄉石禾一萬一千有零稱及今年新租及索到被搶銀器二千二百餘兩金器三十二兩并見錢會子並責付引監本宅幹人糴米以充和糴候見數目却以將來拋降糴本計算若可招糴湊足則竟與免敷派或尚有欠少則作劄分致上戶以盡免中下戶價既比常年特增數又比常年特減亦是寬民此係寬今年和糴者如此其沒官田畝雜産就將樂縣尉水次一莊立為和糴莊自咸淳九年以後嵗收所入除合苗稅外並補助和糴派數以寬衆力此莊既立將來豈無興念遇機會撥添者此係寬將來之和糴者如此此外尚有玉帶一條恐是樂氏先世舊物兼幹人亦難責其倉猝變賣特給還繼絶之文炳其喪葬錢一項恐物業難於一旦變錢又新租已充和糴猝急無可支用亦合將錢會金銀紐計付之但須喪葬有期責付最親位樂囦省元主張文炳同領辦事方可今即付之恐或他用耳樂宅四幹人計置獄吏會子李宅幹人計置獄吏銀器並勒具引監并充招糴助入和糴山林房廊雜産勒四幹具數引官牙點踏估價通計貫數以慿撥付立繼者均給者沒官者各置干照收執備榜州衙及市曹通知候見數目撥定申諸監司照應其各幹侵盜主財情罪别呈斷招糴免和糴榜照對本州稅戶之困於和糴久矣然三邊未撤戍和糴無可免之理且朝廷初立官價何嘗虧民特以時異事殊鄉價每增而官價如舊又湖廣綱運路逺押官必多求加耗遂致人戶不能無重費爾當職猥以非才竊食此邦日夜思所以救此嘗力申裁減不從遂以樂縣尉戶絶見管米并索到各幹侵盜金銀器等責令變賣湊添糴本自為民戶招糴一年全不敷派方措置間又再凖運司於元派七萬二千五百石之外增派通作一十萬石糴數既增難盡招糴今除元派下七萬二千五百石自照本州已行將樂宅錢米照鄉價湊補及多方回糴以寬民力外所有運司續添和糴二萬七千五百石本州既無力可併招糴只得照官價派糴然今年既增糴數比去年三停加一則人戶去年糴二百石者今年合糴三百石今來本州既將元數招糴外則續派之數不惟比去年不增又更於去年元派之數再減十分之四以寬上中戶其常年所派下戶則並與免派庶上下皆寬本州稅戶須仰體朝廷和糴餉邊正為內地安靜之計家國一體痛癢相關正是為民非是厲民見今科撥已下取運將到數目既輕速了為上官司既不比常年多糴則稅戶亦不可比常年遲誤切宜孚體起營寨榜營房損漏兵官不得替移霖雨經時有司先葺營寨此國法也本州軍人無屋可住者十居八九稅賃居止既費房錢軍民雜處動或喧閧當職心甚念之近行下諸營計料本案中以一家有三四名軍請者可以併住其説良是以本司費用不敷也然恐家口既衆苦於窄狹今有一家三名者可起屋兩間父子一家兩名及一名者却各照舊止起一間春雨方興宜急為計案即喚各營軍頭算計定數定限來日吉日責錢付工匠作頭交領責限分頭早辦仍榜諭通知咸淳八年正旦曉諭敬天説照對本職非才承乏不能一毫有補於民每五鼓行轎率見街市挂天燈供天香輒為欣喜蓋人知敬天何事不善此本州風俗最好處今當嵗事更新敢演敬天之説為告一日月星辰風雷雨露皆是天凡皆顯然在目名曰造化以長我育我又生五穀蔬果以活我性命若使有一欠闕我便無以為生於此無一不敬方為敬天若拜祭塔廟迎引社會枉費財物等事皆是信邪造罪即非敬天一朝廷是天天生太祖皇帝以仁立國今我皇上恭儉厚下凡前代嚴刑重斂逰幸土木調遣征行干戈爭戰擾民之事一毫無之上自堯舜方見本朝我生何幸得在今日此等恩德將何以報又其行事皆是代天如立條法是禁姦戢暴使我歸善如取官賦是養軍衛邊使我安樂於此知慚知愧依公服理以上體朝廷使天下長長如此太平方為敬天若自逞雄豪不有官法皆非敬天一父母是天天生萬民生生不息故父母之氣便是天之氣父母生我父母便是天自父母又分為兄弟宗族內外姻眷無非此一氣於此能備盡恩愛方為敬天若為財物所昏為血氣所使一有違忤皆非敬天一自身亦是天人身四肢百骸皆從鼻息取天之清氣以能生活如魚在水以水而活其理一般故凡我之舉動言語非我自能之也皆天也至於人之一心又為一身之主虛明知覺名曰天君我舉一念人雖未知此心先知即是天知人必先使此心端正方為敬天若起念害物或欺心瞞人皆非敬天右請因平日敬天之心新年更推廣敬天之實風俗日美長享太平不勝幸甚咸淳九年正旦再諭敬天説照對本職每見吾民五更早起點天燈燒天香不勝贊喜去年正月初一日因作敬天説就行奉勸近來風俗尤好詞訟頓稀年穀豐登疾病不作此皆吾民敬天之效可賀可賀今年又見新正新者作新之時正者正始之日天燈熒煌天香紛郁神明在上此心肅然邪念盡消耳目聰明四肢百骸亦皆輕爽此時此心直與天一豈不樂哉吾願吾民而今而後自正月初一日至一年三百六十日自天燈天香至事父母友兄弟處宗族接鄰里應千交財買賣諸事百為此心常新此心常正此心常敬天明明上天隨處照臨則吾民自作多福長享太平其樂亦無窮矣謹因新正再此奉勸蓋當職不憂吾民敬天之心不常只憂吾民敬神之心不的神者日月星辰風雷雨露顯然在眼變化莫測故名曰神若與人相似可與人接則非神矣今世俗不以天神為神反裝塑泥像有手有腳不能舉動亦名曰神此尚不得與人為比豈得謂之神哉且神者生我者也養我者也此真神也我賴其造化者也有恩當報故宜敬之泥神者待我揑成者也待我供養者也此泥塊也非神也反出於我者也何恩可報乃反敬之楚國語云民匱於祀此言楚俗淫祀因此匱乏吾州舊亦楚地其以泥塊為神至於罄竭家財作會祭賽蓋積弊然也兩年以來已荷吾民信行當職之説専一敬天不祭邪神災害不生闔境平安深恐當職去後把捉不牢自信不過又祭邪神則所謂敬天者有名無實有始無終不免諄諄預此再勸當職春夏官滿即歸明年正月一日不及勸吾民矣故不勝拳拳無窮之祝謹聽毋忽燒划船公帖傅九二故違約束鼓集惡少划船迎神為生事害民之端從輕勘杖一百編管鄰州詞人自便仍帖三廂索上神廟僧寺人戶划船並赴教場十六日焚毁帖諸縣一體施行逐婺源注疏人出界榜當職昨日出迎詔書見文昌橋上帖婺源廟注疏印榜此必有師巫廟祝之徒來此騙脅吾民帖三廂官遍在城內外揭毁其榜搜逐其人限一日取肅靜狀申外四縣帖請一體行若客店停著者杖一百或本州有為之道地幹緣行疏者徒斷移徙榜示州前仰吾民各自敬畏天地孝養父母遵守國法世界道理不過如此若捨此不顧反信邪費財奉事泥塊必罰無恕咸淳七年中秋勸種麥文二月十五日勸農勸種稻也此州縣自古之所同也八月十五日再勸農勸種麥也此本州今日之所獨也何天下州縣皆不勸種麥而本州獨勸以天下百姓皆種麥而本州獨不種也本州百姓何以不種麥以不曽知種麥之利不曽受不種麥之害也去嵗大旱今嵗米糶百錢一升餓死者無數其幸而不死者亦曽吞飢忍餓或典田賣地或生錢做債或乞歷告糴皆是寒寒泠泠拖兒帶子奔走道路立在稅家門口含淚哀告喫盡萬千苦惱方才救得殘命當年若曽種大麥望著四月便飽喫麥飯何至受許多苦惱是我本州百姓今年曽親受不種麥之害矣既曽親受不種麥之害便當急圖種麥之利種麥之利爾民未知今太守為爾言之每年春夏之間舊穀既盡新穀未種天特生麥以濟缺乏使爾人民喫此麥飯種此禾稻循環接續常得飽足故農為國之本麥又為農之本是麥之功甚大也大凡種稻須用凍耕熱耘須用霑體塗足惟麥則不然及秋而種天氣未寒初夏即收天氣未熱種於乾地手腳不沾泥水鋤塊而作孔亦可種犂地而撒子亦可種是麥之事甚易也近世有田者不種種田者無田爾民終嵗辛苦田主坐享花利惟是種麥不用還租種得一石是一石種得十石是十石又有麥稈當初夏無人入山樵採之時可代柴薪是麥之所收甚多也其功既大其事甚易其所得又多麥之利如此不知爾民何故不種或謂本州不宜種麥太守竊謂不然一般天時一般地利未説天下世界且説江西其地十州皆種麥何故撫州獨不可種撫州外縣間亦種小麥何故臨川界併小麥不可種或謂撫州近城多是沙地故不可種太守亦竊謂不然麥宜髙燥山地皆種山地何嘗無沙且沙地只是滲水易得水乾今繞城既已盛水種稻何為不可乘髙種麥太守為爾再三思量只是撫州田土好出米多常年喫白米飯慣了厭賤麥飯以為粗糲既不肯喫遂不肯種祖父既不曽種子孫遂不曽識聞有碎米尚付豬狗况麥飯乎然此不可之大者也天生二麥以為農種之本而爾農棄之乎麥跨四時最得中和之氣而爾農棄之乎自古聖賢皆勸種麥而爾農棄之乎貴為天子尚且嘗麥而爾農棄之乎尊如宗廟亦必薦麥而爾農棄之乎貧者尚飱糟粳而爾農棄麥不食乎荒嵗尚食草根而爾民棄麥不種乎今夏艱食固是受不曽種麥之害去年大荒亦未必非不肯種麥之報常年享了快活故不肯種今年新經苦惱何可不種今告爾農連羣合本早糴麥種及時多種無力出境糴種者田主助之既得稻熟又得麥熟貧者可以飽足富者可以免擾田里相安即是太平太守不勝苦切勸諭之至咸淳八年春勸農文每嵗二月朝廷命郡太守勸農於郊以民生性命在農國家根本在農天下事莫重於農故切切然以此為第一事近來反因嵗嵗講行上下習熟視為文具今太守是浙間貧士人生長田里親曽種田備知艱苦見撫州農民與浙間多有不同為之驚怪真誠痛告實非文具願爾農今年亦莫作文具看也浙間無寸土不耕田壠之上又種桑種菜今撫州多有荒野不耕桑麻菜蔬之屬皆少不知何故浙間才無雨便車水全家大小日夜不歇去年太守到郊外看水見百姓有水處亦不車各人在門前間坐甚至到九井祈雨行大溪邊見溪水拍岸岸上田皆焦枯坼裂更無人車水不知何故浙間三遍耘田次第轉摺不曽停歇撫州勤力者耘得一兩遍懶者全不耘太守曽親行田間見苗間野草反多於苗不知何故浙間終年備辦糞土春間夏間常常澆壅撫州勤力者斫得些少柴草在田懶者全然不管不知何故浙間秋收後便耕田春二月又再耕名曰耕田撫州收稻了田便荒版去年見五月間方有人耕荒田盡被荒草抽了地力不知何故雖曰千里不同風撫州不可以浙間為比畢竟農種以勤為本古人有云人生在勤勤則不匱又曰農夫鹵莽而種之天亦鹵莽而報之此理安得不同想爾撫州穀米價平不知艱苦不將為事去年春夏間農種百姓也喫了些苦今年若不省懼何以契天太守自知德薄言輕勸人不行去年特地勸種麥爾農尚不肻聽今春是常例勸農爾農又何緣肯聽但上下一體休戚相關爾農若欠飯喫憂責盡在太守是不容不痛告幸爾農思量去年分外爭氣自今勤謹上契天心迓續豐年大家安樂不勝幸甚咸淳八年中秋勸種麥文太守去嵗特特勸爾農種麥爾農何故尚多不種或謂田主以種麥乃佃戶之利恐遲了種禾非主家之利所以不容爾種不知主佃相依當養根本佃戶夏間先收得麥則秋間有本不至欠租亦是主家之利况收麥在四月種禾在五月初不因麥遲了種禾縱使田主不欲多種撫州無限山坡髙地又因何不種今年本州禁盫紅麴既無紅麴須用䴮麴明年麥必直錢此正是爾農種麥之一機太守故不敢憚煩特特再勸明年太守官滿不復在此勸爾種麥矣若又不種將來萬一天時不測肚飢無可接濟莫教思量太守之言太守勸爾至再其情切矣幸爾速種毋或失時咸淳九年春勸農文朝廷第一重農特令州縣長官親自出郊勸農然農是百姓本業初何待勸若論撫州風俗却有不容不勸者農以麥為本撫州獨不種麥遂致中夏無力發本布種昔潭州亦不種麥自真相公做安撫勸令種麥百姓遂享其利今太守甚愧德薄勸爾農不行近金溪知縣新到嘗面議外州糴麥種發下各都諸縣必能一體施行爾農今後切須種麥此不容不勸者也農以桑為助撫州獨不種桑養蠶遂致中夏無錢解債納官昔襄城縣亦不種桑自范丞相做知縣令犯罪者種桑聽贖百姓無不競勸今太守雖愧昏庸勸爾農不早近金溪知縣新到亦嘗面言本州最多荒山野地才種便成諸縣必能次第講行爾農今後切須種桑此不容不勸者也田須秋耕土脈虛鬆免得間草抽了地力今撫州多是荒土臨種方耕地力減耗矣爾農如何不秋耕田須熟耙牛牽耙索人立耙上一耙便平今撫州牛牽空耙耙輕無力泥土不熟矣爾農如何不立耙田近溪水須逐段作埧捺水田不近水須各自鑿井貯水今撫州一切靠天五月不雨立見狼狽十日連雨亦無停留爾農如何不自做箇意智此皆不容不勸者也太守兩年在此雖無力及民然與爾農曽共荒年今次勸農又當官滿將去言語不覺苦切爾農可自思量黃氏日抄卷七十八
