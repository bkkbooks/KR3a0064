body:
  text: 黃氏日抄卷十八宋黃震撰讀禮記五文王世子第八文王之為世子朝於王季日三雞初鳴而衣服至于寢門外問內豎之御者曰今日安否何如內豎曰安文王乃喜及日中又至亦如之及莫又至亦如之其有不安節則內豎以告文王文王色憂行不能正履王季復膳然後亦復初食上必在視寒暖之節食下問所膳命膳宰曰末有原應曰諾然後退武王帥而行之不敢有加焉文王有疾武王不説冠帶而養文王一飯亦一飯文王再飯亦再飯旬有二日乃間豎上注反莫音墓食上之上時掌反説音脫養羊尚反間去聲讀內豎小臣掌通內外者御如今小史直日御于君所者不安節謂失常而疾生食上謂進食食下謂徹食在謂察末猶勿也原再也如原蠶之原末有原戒勿以其餘再進也間猶瘳也疾痛在身無少間隙疾寬減為間此言文王孝養王季武王復孝養文王補文王謂武王曰女何夢矣武王對曰夢帝與我九齡文王曰女以為何也武王曰西方有九國焉君王其終撫諸文王曰非也古者謂年齡齒亦齡也我百爾九十吾與爾三焉文王九十七乃終武王九十三而終齒人夀之數也男八月生齒八嵗而齓年老而齒落齒亦謂之齡謂年齡者謂年為齡也年齡無可移之理君王乃戰國之稱其傳之妄歟用胡氏葉氏補成王幼不能涖阼周公相踐阼而治抗世子法于伯禽欲令成王知父子君臣長幼之道也成王有過則撻伯禽所以示成王世子之道也文王之為世子也涖阼臨朝也阼謂主位阼階武王崩時成王方十嵗故云幼不能涖阼周公相之而踐阼方氏謂涖以位言踐以足履言此輕重之别然恐此欲合王介甫字説耳踐阼亦指成王非指周公涖與踐未必有異義此承上文言文王行世子之禮武王帥而行之至成王幼而為君不可以教世子者教之故假伯禽以抗舉世子之法使成王習見之蓋必能為世子而後能為人君也武王成王之為世子皆法文王故以文王之為世子結之補凡學世子及學士必時春夏學干戈秋冬學羽籥皆于東序小學正學干大胥贊之籥師學戈籥師丞贊之胥鼓南春誦夏弦大師詔之瞽宗秋學禮執禮者詔之冬讀書典書者詔之禮在瞽宗書在上庠學户教反凡學干戈之類並同學士之學如字學古讀如斆謂教之使效世子君之適子學士司徒所選升于學者凡教世子學士必時謂四時各有宜干盾戈句戟武舞所執羽翟羽籥笛文舞所執小樂正大胥籥師籥師丞皆樂官之屬南雅樂名先王之樂以中聲為節溫和而明達故名南詩云以雅以南九夏樂章名夏夏與南同義上庠虞學東序夏學瞽宗商學周兼立三代學也干戈武舞以動作時學羽籥文舞以安靜時學弦誦聲屬陽故于春夏禮由隂作書以言事故于秋冬然此言春誦夏弦秋讀禮冬讀書王制言春秋教以禮樂冬夏教以詩書其時其法皆不同恐皆漢人誦聞古昔之言未知孰是要之學無時而不習難各以時為拘也用方氏陳氏補凡祭與養老乞言合語之禮皆小樂正詔之于東序祭謂饗天地社稷宗廟養老乞言謂養三老于學而乞其誨言合語據鄭氏謂鄉飲鄉射之屬孔氏謂養老乞言自然合語則又綴于乞言之下劉氏謂合語禮在後此君臣所以和同而誠意所以浹洽然則合語殆親密欵語之意集補大樂正學舞干戚語説命乞言皆大樂正授數學戶教反戚斧也語説合語之説也乞言云命者乞言王事也數篇數也干戚語説乞言三者皆大樂正授世子及學士以篇章之數為之講説使知義理也鄒孔陸氏大司成論説在東序大司成即大司樂論説若後世講説王氏陸氏凡侍坐于大司成者逺近間三席可以問終則負牆列事未盡不問間如字又古辨反席三尺三寸三分三席之間共留一丈所謂席間函丈可以問者以聲足相聞又不至大逼也負牆卻就後致竦敬列事未盡不問不敢錯雜長者之語所謂毋勦説也用鄭氏陸氏補凡學春官釋奠于其先師秋冬亦如之官謂禮樂詩書之官鄭氏凡始立學者必釋奠于先聖先師及行事必以幣凡釋奠者必有合也國有故則否合謂合樂國有故謂喪紀凶札之類晦庵凡大合樂必遂養老遂者因而行之也補凡語于郊者必取賢斂才焉或以德進或以事舉或以言揚曲藝皆誓之以待又語三而一有焉乃進其等以其序謂之郊人逺之于成均以及取爵于上尊也語于郊謂論説于在郊之學取賢斂才謂于此辨論官材德進事舉言揚三者之外雖曲藝之士亦誓戒之以待又語于郊而再考之若于德進事舉言揚三者而有其一則為之進其等使出于曲藝之流而升于三者之列謂之郊人逺之者名之為郊學之人而尚逺之言未入天子之學也于成均以及者成均者天子之學天子飲酒于成均禮亦及郊人使得取堂上之尊以相旅所以榮之也上尊者堂上之尊凡飲酒則尊者酌堂上之尊卑者酌堂下之尊用鄭注補始立學者既興器用幣然後釋菜不舞不授器乃退儐于東序一獻無介語可也前章言始立學者釋奠于先聖先師比四時常禮之釋奠為盛事此章則謂始立學而告祭器之成也興器古注改作釁器近世謂新置器恐亦整起而將用之之意耳用幣則用采帛贄神如生者初相見之禮然據本文既興器用幣然後釋菜是用幣與釋菜是兩節不可曉若按諸經多言舍采采即幣今説者謂用幣禮重釋菜禮輕恐無輕重一時兼行之理亦無先行重禮方正行輕禮之理陳氏禮書又以釋菜為弟子見師之贄以婦人用棗栗贄舅姑為比不思男女異贄男子見師豈同婦人而事師之禮至微者猶以束修束修亦乾肉而非菜也弟子事師貧而不能備禮者猶用束修國家立學以禮先師無貧而不能備禮之患也何至反用菜哉且世之言菜者以蘋蘩蕰藻為説也按采蘋備爼此言婦人助祭之末非言君大夫祭禮之正左氏言盟在誠信而不在物故借以明誠信非以言祭禮也豈有事神而以菜為重者自昔事神必于其所重而不敢于其薄牲牷必侈言其肥腯酒肴必侈言其嘉美恱神之理當然也禮雖一獻亦未嘗不用牲脯何至反于其薄者而獨以菜為名故事神必先奠幣而祭以釋奠為名禮也菜菹最為事神之末而祭反以釋菜為名于禮未見其當也此章然後釋菜之語恐漢人誤以采為菜而失之耳不舞不授器謂不舞而不授以舞者所執之器如羽籥之類也退儐于東序謂禮畢而退接賔于東序也一獻無介語者謂禮惟一獻而止無介助無祝語凡皆謂告祭器之成而其禮略也然以理揆之亦未必其然也補凡三王教世子必以禮樂樂所以修內也禮所以修外也禮樂交錯於中發形於外是故其形也懌恭敬而溫文凡學立于禮成于樂故教世子必以禮樂樂由中出故以修內禮由外作故以修外然樂雖修內未嘗不發形于外禮雖修外未嘗不交錯于中故樂之成也恱懌禮之成也恭敬而溫文方氏陳氏立太傅少傅以養之欲其知父子君臣之道也太傅審父子君臣之道以示之少傅奉世子以觀太傅之德行而審喻之太傅在前少傅在後入則有保出則有師是以教喻而德成也師也者教之以事而喻諸德者也保也者慎其身以輔翼之而歸諸道者也記曰虞夏商周有師保有疑丞設四輔及三公不必備唯其人語使能也傅者傅之德義保者保其身體師者道之教訓疑擬其前丞承其後比我而相之謂之輔拂我而相之謂之弼養者從容以養其本然之善教喻者于教訓能曉喻也德成者其德業有成就也記曰以下述古記之言語使能一句作記者解之也語猶言也鄭氏隂氏真氏君子曰德德成而教尊教尊而官正官正而國治君之謂也君子成德之名故謂君子曰德德成而至官正國治然後能為君故曰君之謂也用陸氏方氏補仲尼曰昔者周公攝政踐阼而治抗世子法于伯禽所以善成王也聞之曰為人臣者殺其身有益于君則為之况于其身以善其君乎周公優為之是故知為人子然後可以為人父知為人臣然後可以為人君知事人然後能使人成王幼不能涖阼以為世子則無為也是故抗世子法于伯禽使之與成王居欲令成王知父子君臣長幼之義也君之于世子也親則父也尊則君也有父之親有君之尊然後兼天下而有之是故養世子不可不慎也于其身古注以于為迂胡氏又以于為廣大蓋欲以于其身與殺其身對言也然只如本音義亦通以為世子則無為也言成王已為君不可為世子也自仲尼曰以下言假伯禽教成王以世子事自君于世子以下言人君不可不謹教世子事補行一物而三善皆得者唯世子而已其齒于學之謂也故世子齒于學國人觀之曰將君我而與我齒讓何也曰有父在則禮然然而衆知父子之道矣其二曰將君我而與我齒讓何也曰有君在則禮然然而衆著于君臣之義也其三曰將君我而與我齒讓何也曰長長也然而衆知長幼之節矣故父在斯為子君在斯謂之臣居子與臣之節所以尊君親親也故學之為父子焉學之為君臣焉學之為長幼焉父子君臣長幼之道得而國治語曰樂正司業父師司成一有元良萬國以貞世子之謂也周公踐阼學之之學音效物事也行一物謂世子齒于學三善得謂知父子君臣長幼父子天性故言道君臣義合故言義長幼有等故言節三者得而國治故世子之教為急結以周公踐阼謂周公踐阼時之教如此然周公未嘗踐阼冢宰總政乃古禮云踐阼亦漢人誦聞之言用方氏補庶子之正于公族者教之以孝弟睦友子愛明父子之義長幼之序庶子掌公族者周官謂之諸子教行于上以孝弟教交于旁以睦友教恤于下以子愛鄭氏陳氏其朝于公內朝則東靣北上臣有貴者以齒其在外朝則以官司士為之內朝路寢之庭外朝路寢門之外庭北上尊在內也司士掌班朝之位內朝以齒公族有所伸外朝以官公族有所屈馬氏其在宗廟之中則如外朝之位宗人授事以爵以官其登餕獻受爵則以上嗣宗人掌禮及宗廟蓋有族則有祀有祀則有宗虞曰秩宗殷曰大宗周曰宗伯其義一也登謂登堂餕謂尸起而嗣子食其餘獻謂嗣子酌奠而反受受爵謂尸執奠而嗣子受方無事時嗣子在堂下餕則登獻則登受爵則登上嗣則君之適長子也宗廟如外朝之位則以官也故宗人受百官以事以爵之尊卑與官之職位其登堂餕獻受爵則以君之適長子此皆宗廟之行事以官不以齒如外朝也補庶子治之雖有三命不踰父兄庶子即前章掌公族之官治謂治內朝之禮凡古禮一命官卑與鄉里序齒再命官髙鄉里不得與序齒惟與父族序齒官至三命則父族亦不得與序齒别席而獨坐在賔之東今此內朝則雖三命亦不踰父兄用孔氏補其公大事則以其喪服之精粗為序雖于公族之喪亦如之以次主人公大事謂公喪此謂君喪而庶子官掌其事服輕者疏服重者親故以精粗為序雖有庶長父兄次主人之下用孔説補若公與族燕則異姓為賔膳宰為主人公與父兄齒族食世降一等異姓為賔族不自為賔主也膳宰為主人君尊不獻酬也公與父兄齒親親也族食世降一等敘族而食親者稠而疏者希以世次為差也本鄭氏其在軍則守于公禰公若有出疆之政庶子以公族之無事者守于公宫正室守大廟諸父守貴宫貴室諸子諸孫守下宫下室公禰謂行主出疆之政謂朝覲會同公族無事謂不從行及無職事者正室謂適子宫謂所居室謂廟室貴宫下宫正寢燕寢也貴室下室皆親廟髙祖以下也公行軍則庶子守行主公出疆而庶子留守則掌以公族無事者守公宫以適子守大廟以諸父分守貴宫貴室以諸子諸孫分守下宫下室用鄭氏胡氏説五廟之孫祖廟未毁雖為庶人冠取妻必告死必赴練祥則告族之相為也冝弔不弔宜免不免有司罰之至于賵賻承含皆有正焉免音問賵芳鳳反賻音附承讀作贈五廟二昭二穆與大祖弔謂六世以後無服者免謂五世親盡而袒免者車馬曰賵布帛曰賻珠玉曰含總謂之贈承讀作贈長樂陳氏從本音謂承于身者謂之承凡玉可為渠眉疏璧者皆承也正謂正禮此論族人雖或至賤吉凶必須相告弔賵含贈皆當有正禮庶子掌焉孔氏公族其有死罪則磬于甸人其刑罪則纎剸亦告于甸人公族無宫刑纎音針之林反剸之免反甸者王所自治之地甸人則掌其地之官也磬者縊殺之其縣如磬以公族不忍刑于市朝故縊于甸人也纎針刺也剸割也謂非死罪而止于刑罪者其針刺剸割亦告于甸人而行之惟無宫刑不敢絶公族之世也用鄭氏説獄成有司讞于公其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟公曰宥之有司又曰在辟公又曰宥之有司又曰在辟及三宥不對走出致刑于甸人公又使人追之曰雖然必赦之有司對曰無及也反命于公公素服不舉為之變如其倫之喪無服親哭之讞魚列反辟婢亦反為干偽反讞言也不舉不舉樂也倫謂親疏之比如其倫之喪而無服謂公族之在罪者或親為功緦則公素服不舉為之變動亦一如功緦之喪但以其有罪而不為服功緦之服耳此謂臣執法宜堅君用刑宜寬也然三宥不對而走公又使人追之對以無及此事使人君偶有哀矜不忍而救之無及可也若立為此法示欲宥之而不能是虛文相欺不可也且臣有罪而君必赦君有命而臣不受于理皆未安恐亦漢人誦聞古昔之傳或如此耳補公族朝于內朝內親也雖有貴者以齒眀父子也外朝以官體異姓也此釋前章其朝于公一假體謂以心體之也補宗廟之中以爵為位崇德也宗人授事以官尊賢也登餕受爵以上嗣尊祖之道也此釋前章其在宗廟之中一段補喪紀以服之輕重為序不奪人親也公與族燕則以齒而孝弟之道達矣其族食世降一等親親之殺也殺色戒反此釋前章其公大事至公與族燕一段戰則守于公禰孝愛之深也正室守大廟尊宗室而君臣之道著矣諸父諸兄守貴室子弟守下室而讓道逹矣此釋前章其在軍則守于公禰一段補五廟之孫祖廟未毁雖及庶人冠取妻必告死必赴不忘親也親未絶而列于庶人賤無能也敬弔臨賻賵睦友之道也古者庶子之官治而邦國有倫邦國有倫而衆鄉方矣鄉許亮反此釋前章五廟之孫至皆有正焉一假補公族之罪雖親不以犯有司正術也所以體百姓也刑于隱者不與國人慮兄弟也弗弔弗為服哭于異姓之廟為忝祖逺之也素服居外不聽樂私喪之也骨肉之親無絶也公族無宫刑不翦其類也逺于萬反此釋前章公族有死罪至親哭之一段術法也體百姓言不以親而私之必體百姓之心行法同也慮謀也刑人于市與衆棄之是與國人共慮之也補天子視學大昕鼓徵所以警衆也衆至然後天子至乃命有司行事興秩節祭先師先聖焉有司卒事反命昕音欣大昕日初眀鼓徵鳴鼓徵召興秩節猶言舉常禮天子晨視學觀有司行禮非為學士報先聖先師必視學者學所以教養人才不可不身親之也孔氏陳氏始之養也適東序釋奠于先老遂設三老五更羣老之席位焉適饌省醴養老之珍具遂發咏焉退修之以孝養也之往也始之養也猶言始至養老之處謂既視學畢而始至東序養老也東序即學宫之東序地道尊右神祀尚隂故西為廟宫所以尊先聖先師東為黌舍所以處國子俊造而其地謂之東序也三老五更鄭康成謂各一人蔡雍謂三老三人五更五人按秦漢置三老鄉一人則非必三人而後為三老也其義則鄭康成謂知三德五事者宋均謂三老知天地人事五更知五行更代似皆意之耳惟左傳昭三年杜預注以三老為八十以上上中下三夀此于三老為近之若更之為義不過謂其老而更事耳然詩書未嘗言三老至漢此説方出至後漢元魏此禮方行後漢竟以三公為三老大夫為五更矣發咏謂以樂納之適饌省醴蓋互言之皆適其所而省之也退修之以孝養者三老五更即位于西階下天子乃退酌醴獻之以修孝養之禮執醬而饋執爵而酳也用鄭氏應氏方氏説補反登歌清廟既歌而語以成之也言父子君臣長幼之道合德音之致禮之大者也下管象舞大武大合衆以事達有神興有德也正君臣之位貴賤之等焉而上下之義行矣有司告以樂闋反謂反席語謂談説獻羣老畢而反席然後工登歌既登歌清廟又談説父子君臣長幼之道以成之此所謂合德音之極致而禮之大者也下謂堂下之樂與登歌堂上之登對言也下而立于堂下以管奏象武之曲而庭中舞此大武之舞于是大合衆以歌舞其樂以眀天授命周家之有神以興起武王受命之有德使衆前歌後舞也正君臣貴賤而上下之義行皆于大合衆而言之也闋終也告君以歌舞之樂至此而既終也德莫盛于文王功莫大于武王登歌清廟所以著文王之德下管象而舞大武所以著武王之功補王乃命公侯伯子男及羣吏曰反養老幼于東序終之以仁也羣吏鄉遂之官也王自養老又命諸侯州里皆行之是終之以仁也廣其施之謂也補是故聖人之記事也慮之以大愛之以敬行之以禮修之以孝養紀之以義終之以仁慮之以大謂先本于孝弟之道紀之以義謂君臣之位貴賤之等終之以仁即上文命諸侯歸養老鄭氏陸氏是故古之人一舉事而衆皆知其德之備也古之君子舉大事必慎其終始而衆安得不喻焉兊命曰念終始典于學兊音恱喻猶曉兊當為説典常也鄭氏世子之記曰朝夕至于大寢之門外問于內豎曰今日安否何如內豎曰今日安世子乃有喜色其有不安節則內豎以告世子世子色憂不滿容內豎言復初然後亦復初朝夕之食上世子必在視寒暖之節食下問所膳羞必知所進以命膳宰然後退若內豎言疾則世子親齊玄而養膳宰之饌必敬視之疾之藥必親嘗之嘗饌善則世子亦能食嘗饌寡世子亦不能飽以至于復初然後亦復初齊玄謂必致齊而身服玄也此章約篇首文王為世子之法量損之而為尋常世子之禮然所謂有喜色所謂色不滿容此出于人情之自然安得立法以使之聖人人倫之至聖人之所行即天下之所法人之氣稟不同而不能如聖人者固多矣薄待天下而下聖人一等以立之法是聖人為有異于人而人不可以望聖人也寧有是理哉且內豎言復初然後亦復初是子竟不得親侍其父之疾始終但得之于內豎之口亦非人情矣嗚呼是真漢人之言也補禮運第九禮運記五帝三王相變易陰陽轉移之道故以運名雖思太古而悲後世其主意微近於老子而終篇混混為一極多精語如論造化謂天秉陽垂日星地秉陰竅於山川如論治謂聖人耐以天下為一家中國為一人如論人則謂人者天地之心謂天地之德隂陽之交鬼神之會五行之秀氣如論禮則謂禮者固人肌膚之會筋骸之束皆千萬世名言昔者仲尼與于蠟賔事畢出逰于觀之上喟然而嘆仲尼之嘆蓋嘆魯也言偃在側曰君子何嘆孔子曰大道之行也與三代之英丘未之逮也而有志焉蠟仕嫁反蠟索也嵗十二月之祭名言遍索鬼神之有功于民者祭之以報也賔者助祭之臣助祭者必有飲食以勞之故謂之賔也觀者闕門英謂俊選之尤者此記為夫子與言偃問答謂聖人思欲還上古之風不可得而猶思其次也下文蓋詳此用蔣氏補大道之行也天下為公選賢與能講信修睦故人不獨親其親不獨子其子使老有所終壯有所用幼有所長矜寡孤獨廢疾者皆有所養男有分女有歸貨惡其棄于地也不必藏于已力惡其不出于身也不必為已是故謀閉而不興盜竊亂賊而不作故外户而不閉是謂大同今大道既隱天下為家各親其親各子其子貨力為己大人世及以為禮城郭溝池以為固禮義以為紀以正君臣以篤父子以睦兄弟以和夫婦以設制度以立田里以賢勇知以功為己故謀用是作而兵由此起禹湯文武成王周公由此其選也此六君子者未有不謹于禮者也以著其義以考其信著有過刑仁講讓示民有常如有不由此者在勢者去衆以為殃是謂小康分扶問反知音智大道之行指五帝時男有分謂各安其分貨不藏于己力不必為己謂無吝驕之私謀閉謂謀之祕密是謂大同總結大道之行尊五帝也大道之隱指三代時大人諸侯也父子相傳曰世兄弟相繼曰及以賢勇知以勇智為賢也以功為己者為有功也著有過謂用禮以眀民之罪刑則也刑仁謂仁者以禮賞之以為則講讓謂爭奪者以禮講説之使推讓在勢謂在位者去謂罪退之衆以為殃言衆人皆以為罪此主不由于禮者言之也是謂小康總結大道之隱卑三代也大道之行為大同大道之隱為小康以道之隆汚升降係乎時之不同而已天下為公天下為家傳于賢傳于子皆天之所與非人力之所能為也五帝三王何與焉不獨親其親不獨子其子則近于墨矣各親其親各子其子則近于楊矣聖人豈楊墨之道乎老有所終至廢疾有所養三王未始不同也豈獨五帝以正君臣至以功為己五帝之時莫不行也豈獨三王謀閉而不興盜竊亂賊而不作三王之盛時莫不胥然謀用是作則兵由此起五帝以來亦未始不如此而以彼為五帝之大同以此為三代之小康皆記者立論然爾且稽之論語吾夫子固未嘗若是其費辭也用陳氏馬氏補言偃復問曰如此乎禮之急也孔子曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相鼠有體人而無禮人而無禮胡不遄死是故夫禮必本于天殽于地列于鬼神達于喪祭射御冠昏朝聘故聖人以禮示之故天下國家可得而正也復扶又反下同殽户教反又平聲殽效也方氏讀如字殽猶肉之有殽以其物之相雜天以一在上故曰本地以二在下故曰殽上數語言禮之功用以明夫人生死之所由係下四語總禮之體用以明天下國家治亂之所由別也大原出于天故推其所自出而本之效法之謂地故因其成法而效之列于鬼神者充塞乾坤之間昭布森列而不可紊也達于喪祭至朝聘者人道交際之用周流上下而無不通也應氏言偃復問曰夫子之極言禮也可得而聞與孔子曰我欲觀夏道是故之杞而不足徵也吾得夏時焉我欲觀殷道是故之宋而不足徵也吾得坤乾焉坤乾之義夏時之等吾以是觀之杞夏後宋殷後夏時夏四時書名坤乾殷隂陽書名以坤為首周官太卜掌三易二曰歸藏者指此先坤後乾有交泰之義夏時坤乾二書皆不行于世所當闕疑而以今夏正建寅與周易乾坤為正耳用馬氏補夫禮之初始諸飲食其燔黍捭豚汙尊而抔飲蕢桴而土鼓猶若可以致其敬于鬼神及其死也升屋而號告曰臯某復然後飯腥而苴孰故天望而地藏也體魄則降知氣在上故死者北首生者南鄉皆從其初捭卜麥反汙烏華反杯步侯反蕢苦對反又苦怪反桴音浮知音智首手又反鄉許亮反捭劈也燔黍捭豚者古未有釡甑釋米捭肉加于燒石之上而食之汙尊鑿地為尊杯飲手掬而飲桴鼓槌也蕢草也蕢桴謂以草為桴土鼓謂築土為鼓升屋而號招魂也臯緩其辭而引聲某稱死者名復使死者之魂復歸其身飯腥謂舍用生米象上古未有火化之法苴孰謂遣奠包熟肉象中古火化之利天望謂望天招魂以和氣在上也地藏謂葬地藏户以體魄則降也上古鼎飪未具而燔捭以為食罍酌未設而汙杯以為飲聲樂未備而蕢土以為歡以此而接乎鬼神自其一念之誠而施之有餘也乃若升屋之號臯復之告飯腥苴孰以繼其孝養之事天望地藏以發其悽愴之思則雖禮教未備而天理之發露于人心者亦自然如此此其為禮之初也蔣氏昔者先王未有宫室冬則居營窟夏則居橧巢未有火化食草木之實鳥獸之肉飲其血茹其毛未有絲麻衣其羽皮後聖有作然後修火之利范金合土以為臺榭宫室牖户以炮以燔以亨以炙以為醴酪治其絲麻以為布帛以養生送死以事鬼神上帝皆從其朔橧音曾又作增范金謂鑄合土謂陶炮褁燒燔加火上亨煮炙貫之火上醴酪蒸釀之也朔者創始為初終而有始為朔此原古始以眀聖人制作之功蓋取十三卦之義補故玄酒在室醴盞在户粢醍在堂澄酒在下陳其犧牲備其鼎爼列其琴瑟管磬鐘鼓修其祝嘏以降上神與其先祖以正君臣以篤父子以睦兄弟以齊上下夫婦有所是謂承天之祜盞側眼反粢古才細反方讀如字醍音體玄酒水也色黑為玄太古無酒此水當酒在室者貴重古物設之于最內也醴謂醴齊盞謂盎齊醴言甘盎言翁翁然蔥白色在户則稍南而近户粢醍即醍齊為齊不止于粢舉粢以該之粢即稷也澄酒謂清酒祝者代人之辭以致告于神嘏者代神之辭以致福于人上神天神也此承上文事鬼神上帝而言備禮之用補作其祝號玄酒以祭薦其血毛腥其俎孰其殽與其越席疏布以羃衣其浣帛醴盞以獻薦其燔炙君與夫人交獻以嘉魂魄是謂合莫越音活祝號謂祝于神祇牲幣各有嘉號以尊神顯物腥其爼謂豚解而腥之以法上古孰其殽謂體解而爓之以法中古越席蒲席疏布粗布羃覆浣帛練染以為祭服嘉樂也合莫謂以此精誠而求神于冥漠之間也前章言備祭之物此章言致祭之用然後退而合亨體其犬豕牛羊實其簠簋籩豆鉶羮祝以孝告嘏以慈告是謂大祥此禮之大成也合亨合衆物而亨之鉶盛和羮器形如小鼎此章謂祭今世之食人神交告而禮成通結上二章用鄭氏補孔子曰嗚呼哀哉我觀周道幽厲傷之吾舍魯何適矣魯之郊禘非禮也周公其衰矣杞之郊也禹也宋之郊也契也是天子之事守也故天子祭天地諸侯祭社稷祝嘏莫敢易其常古是為大假大假者天子祭天地諸侯祭社稷各有分守今乃以諸侯用天子禮而祝嘏皆莫敢易其辭竟以天子之辭而用之諸侯之國假竊莫大于是是為大假此章本嘆非禮而先儒誤以大假為正説前章既詳五帝三代之禮至此更端而明夫子嘆魯之意謂魯之郊禘非禮也而未嘗言魯郊禘之所始至明堂位謂周公有大勳勞成王賜以重祭説者遂以為據然按吕覽載魯惠公使宰請郊廟之禮于天子天子使史角往止之使成王之世而魯已郊則惠公奚請惠公之請殆由平王以下考之春秋則僖公始用郊是成王未嘗賜周公未嘗受也補祝嘏辭説藏于宗祝巫史非禮也是謂幽國盞斚及尸君非禮也是謂僣君冕辨兵革藏于私家非禮也是謂脅君大夫具官祭器不假聲樂皆具非禮也是謂亂國祝嘏皆有辭説藏于宗祝巫史而君不知有故為幽暗之國盞夏爵斚殷爵皆先王之爵而諸侯有用之者君以獻尸尸以酢君故曰僣君冕辨君之尊服兵革君之武衛私家藏之故曰脅君官事不攝聲樂皆具非禮明矣并以祭器不假為非禮未安此承上章析言禮之失補故仕于公曰臣仕于家曰僕三年之喪與新有昏者期不使以衰裳入朝與家僕雜居齊齒非禮也是謂君與臣同國期居其切臣對君之稱僕對主之稱喪者所宜哀其凶昏者所宜慶其嘉故皆期年不使以優之今反以衰裳入朝或與家僕雜處夫國之臣與家之僕雜處故曰君與臣同國方氏故天子有田以處其子孫諸侯有國以處其子孫大夫有采以處其子孫是謂制度采食采之邑人莫不有子孫而自天子以下處之則異是之謂制度故天子適諸侯必舍其祖廟而不以禮籍入是謂天子壞法亂紀諸侯非問疾弔喪而入諸臣之家是謂君臣為謔舍其祖廟謂舍于諸侯之祖廟也以禮籍入謂大史典禮執簡記奉諱惡也天子雖尊舍于人之宗廟猶有敬焉若諸侯無故而入諸臣之家是為謔也鄭氏是故禮者君之大柄也所以别嫌明微儐鬼神考制度别仁義所以治政安君也儐謂接以賔禮禮惟為大柄則能别嫌于難辨眀微于未彰幽可以儐鬼神明可以考制度别仁義以至于治政安君也禮以節文仁義各使中禮故曰别陳氏鄭氏故政不正則君位危君位危則大臣倍小臣竊刑肅而俗敝則法無常法無常而禮無列禮無列則士不事也刑肅而俗敝則民弗歸也是謂疵國上下乖離俗敝刑肅皆國之病故云疵國鄭氏故政者君之所以藏身也是故夫政必本于天殽以降命命降于社之謂殽地降于祖廟之謂仁義降于山川之謂興作降于五祀之謂制度此聖人所以藏身之固也殽效也效法于天以降命令而隨所取法地生物君養物故命令由社而下者謂之效地父親仁也祖尊義也故命令由祖廟而下者謂之仁義山川有草木鳥獸可作器物人君法山川以興作其物故命令由山川而下者謂之興作五祀中霤門户竈行也小大形制各有法度故命令由五祀而下者謂之制度政之大理本之天地及宗廟山川與五祀故人君得藏身安固也孔氏故聖人參于天地並于鬼神以治政也處其所存禮之序也玩其所樂民之治也故天生時而地生財人其父生而師教之四者君以正用之故君者立于無過之地也以政本天而殽地故聖人參于天地以降于祖廟山川五祀故聖人並于鬼神天地祖廟山川五祀皆禮之至理所存聖人因其所存而處之以定體是即為禮之序道德仁義興作制度皆民之良心所樂聖人因其所樂而玩之且不紊其條理是即為民之治天生時地生財人則父生而師教人君位天地之中居父師之上夫何為哉以正用之而已以正用其時奉之而不違以正用其財理之而不傷以正用其生厚之而不夭以正用其教立之而不廢正用者順其自然之理而不過所以立于無過之地方氏故君者所明也非眀人者也君者所養也非養人者也君者所事也非事人者也故君眀人則有過養人則不足事人則失位故百姓則君以自治也養君以自安也事君以自顯也故禮達而分定故人皆愛其死而患其生指人之失謂之明人君納天下之諫則人之所明而非明人者也豫人以食謂之養人君享天下之奉則人之所養而非養人者也奉人以力謂之事人君役天下之羣動則人之所事而非事人者也故禮行分定則人皆見危致命愛死節而耻偷生用陸氏馬氏胡氏説補故用人之知去其詐用人之勇去其怒用人之仁去其貪故國有患君死社稷謂之義大夫死宗廟謂之變知音智變音辨此章大意不過謂人才難責其全取其所長棄其所短自説者必欲于其義理之精嫌于仁者之有貪也各自為説而去本旨逾逺惟晦庵云人之性易得偏仁善底人便有好便冝底意思此通論也蓋仁不必皆指其極致者然後為仁貪亦非必殖貨而後為貪也變古音辨謂辨猶正也方博士從本音而訓權亦通然死于宗廟難以權言死必以正豈有以權宜而死者哉若從本音而以變為變故之變亦何不可補故聖人耐以天下為一家以中國為一人者非意之也必知其情辟于其義明于其利達于其患然後能為之耐音能辟婢亦反耐古能字意心所思慮辟開也天下非一家而能以為一家中國非一人而能以為一人在知其情情之所合則措天下之異而歸于同情之所離則天下不可得而強一辟于其義而教之明于其利而興之達于其患而去之此皆知其情之謂而能以天下為一家中國為一人者也周氏陸氏陳氏補何謂人情喜怒哀懼愛惡欲七者弗學而能何謂人義父慈子孝兄良弟弟夫義婦聽長惠幼順君仁臣忠十者謂之人義講信修睦謂之人利爭奪相殺謂之人患故聖人之所以治人七情修十義講信修睦尚辭讓去爭奪舍禮何以治之七者感物而動無非自然十者人之大倫故謂人義此義既形此情遂定于是講信修睦而人利興此義不立此情日亂于是爭奪相殺而人患起制情立義興利去患納天下于相安相養之域惟禮可耳集馬氏蔣氏飲食男女人之大欲存焉死亡貧苦人之大惡存焉故欲惡者心之大端也人藏其心不可測度也美惡皆在其心不見其色也欲一以窮之舍禮何以哉愛惡之惡烏路反美惡之惡如字莫非欲也飲食男女為大莫非惡也死亡貧苦為大心隱于內而不可知也聖人揆之以禮而制之飲食我所欲也觴酒豆肉遜而受惡男女人所欲也非受幣不交不親死亡貧苦人所惡也而國君死社稷大夫死宗廟君子仕而不稼田而不漁食時不力珍馬氏方氏蔣氏故人者其天地之德隂陽之交鬼神之會五行之秀氣也天以覆為德地以載為德人生于覆載中則其形之所自生固天地之德獨隂不生獨陽不成人因其交會而生始具則其形之所自生固隂陽之交氣者神之盛魄者鬼之盛氣與魄聚則生散則死人因其會聚而生始全則其形之所自生固鬼神之會五行之氣散布于萬物而人得其最靈故其生為五行之秀氣德言其無間交言其混會言其合秀言其特異德以理言交會與秀皆以氣言理與氣合而為人人所以為人者蓋天地隂陽鬼神五行交相參而成者也人其可不自貴哉然五行即隂陽鬼神即隂陽二氣之屈伸而天地即隂陽之成形于上下者也故理與氣未嘗不俱而人與天地並立為三用孔氏王氏説補故天秉陽垂日星地秉隂竅于山川播五行于四時和而后月生也是以三五而盈三五而闕天者陽氣之所積故曰秉陽地者隂氣之所積故曰秉隂隂氣合陽于天上則為日星是以其光下垂陽氣合隂于地下則為山川是以其竅上通山川者五行之本也故天之氣出入于地中則升為四時地之氣凝結于天上則降于五行播者分布之稱也天一生水而播于冬天三生木而播于春地二生火而播于夏地四生金而播于秋天五生土而播于四時之間自天一至于天五竒偶合而成十五十五之數成其所播者既和然後月生而如其數數之至于三五則為五行生數之極而月所以盈又積之至于三五則為五行成數之極而月所以闕也長樂劉氏長樂陳氏五行之動迭相竭也五行四時十二月還相為本也五聲六律十二管還相為宫也五味六和十二食還相為質也五色六章十二衣還相為質也還音旋和户卧反相竭相克而成如水王則金竭木王則水竭五聲宫商角徵羽六律謂陽律十二管謂陽律六隂吕六各一管還相為宫者始于黃鍾管長九寸下生者三分去一上生者三分益一終于南吕更相為宫五味酸苦辛鹹甘六和者四時四味各有滑有甘為六五色青赤黃白黑六章者兼天玄十二食即周官鼎十有二十二衣即舜之十二章鄭氏孔氏周氏故人者天地之心也五行之端也食味别聲被色而生者也天地有人如人有心以其居天地之中而生意之所鍾聚凡果實之心皆名曰人字亦作仁故天地之心亦名曰人曰仁者人也又曰仁人心也人之名蓋出于此萬物莫不鍾五行之氣以生而人受其氣之秀故曰五行之端所食者五味所别者五聲所被者五色此人之所以生也項氏陳氏馬氏故聖人作則必以天地為本以隂陽為端以四時為柄以日星為紀月以為量鬼神以為徒五行以為質禮義以為器人情以為田四靈以為畜以天地為本故物可舉也以隂陽為端故情可睹也以四時為柄故事可勸也以日星為紀故事可列也月以為量故功有藝也鬼神以為徒故事有守也五行以為質故事可復也禮義以為器故事行有考也人情以為田故人以為奧也四靈以為畜故飲食有由也畜許六反天地以至五行其制作所取象也禮義人情其政治也四靈其徴報也以天地為本則萬物皆末本得則末斯從之故物可舉隂陽者萬物之情以隂陽為端則情可探而見故情可睹以四時為柄則人順時之後先因時之動靜不敢辭焉故事可勸以日星為紀則晝之所參夜之所考各得其序故事可列月以為量則興事造業各有數以致其能故功有藝五行以為質則代廢代興皆周而復始故事可復四靈以為畜則人之日用者皆易致焉故飲食有由也鄭氏方氏何謂四靈麟鳯龜龍謂之四靈故龍以為畜故魚鮪不淰鳯以為畜故鳥不獝麟以為畜故獸不狘龜以為畜故人情不失淰音審獝况必反狘况越反淰魚驚而水動獝驚飛貌狘驚走貌麟體信厚鳯知治亂龜兆吉凶龍能變化故謂四靈魚從龍鳥從鳯獸從麟龍鳯麟既來為人之畜其屬見人自不驚逝飛走龜知人情既來應人故于吉凶善惡皆不失方氏馬氏故先王秉蓍龜列祭祀瘞繒宣祝嘏辭説設制度故國有禮官有御事有職禮有序埋牲曰瘞幣帛曰繒宣猶揚也祝者主所致禱于神嘏者神所致福于主辭説者祝嘏皆有其辭説也設制度者辨上下定民志也故國必其有禮官各御其事事各有其職禮各有其序不相奪倫鄭氏劉氏補故先王患禮之不達于下也故祭帝于郊所以定天位也祀社于國所以列地利也祖廟所以本仁也山川所以儐鬼神也五祀所以本事也故宗祀在廟三公在朝三老在學王前巫而後史卜筮瞽侑皆在左右王中心無為也以守至正位欲其安故言定物欲其陳故言列儐賔而敬之也宗宗人祝大祝瞽樂人侑謂侑食故禮行于郊而百神受職焉禮行于社而百貨可極焉禮行于祖廟而孝慈服焉禮行于五祀而正法則焉故自郊社祖廟山川五祀義之修而禮之藏也修猶飾藏謂禮在其中此申言上章之義補是故夫禮必本于大一分而為天地轉而為隂陽變而為四時列而為鬼神其降曰命其官于天也大一謂天地未分混沌之元氣以形之始而言謂之太始以其數之始而言謂之大一大一天地之始凡有數者莫不出于其間故分而為天地之位轉而為隂陽之道變而為四時之代謝列而為鬼神之魂魄莫非此禮發露于自然聖人本其自然發露者制禮以命天下故曰其降曰命亦未嘗不本之于自然故曰其官于天孔氏陳氏周氏蔣氏方氏夫禮必本于天動而之地列而之事變而從時協于分藝其居人也曰養其行之以貨力辭讓飲食冠昏喪祭射御朝聘列而之事事詳則禮詳變而從時時異則禮異協于藝不強其所不能虙氏故禮義也者人之大端也所以講信修睦而固人之肌膚之會筋骸之束也所以養生送死事鬼神之大端也所以達天道順人情之大竇也故唯聖人為知禮之不可以已也故壞國喪家亡人必先去其禮壞音怪喪息浪反禮義內可治心外可修身可養生送死于其明可事鬼神于其幽聖人所能保其國家與人民知禮之不可已爾衆人反此而禍患隨至陳氏方氏故禮之于人也猶酒之有糵也君子以厚小人以薄糵魚列反善為酒者戒其為醨務其為醇善為人者戒其為小人務其為君子長樂陳氏故聖王修義之柄禮之序以治人情故人情者聖王之田也修禮以耕之陳義以種之講學以耨之本仁以聚之播樂以安之此以農喻聖人之治人情也人情感物而動必有梗吾和平之化者故修禮以治之謂之耕禮由義起其初未有淺深厚薄之宜故陳義以治之謂之種學足以辨其是非謂之耨仁足以滋其盛大謂之聚樂足以樂其成功謂之安蔣氏故禮也者義之實也協諸義而協則禮雖先王未之有可以義起也義者藝之分仁之節也協于藝講于仁得之者強仁者義之本也順之體也得之者尊謂禮者義之實又曰義者藝之分仁之節是禮之資于義者多也謂藝之分仁之節矣又曰義之本順之體是禮之資于仁者重也禮出于義則在我有自然之強禮出于仁則在我有自然之尊蔣氏故治國不以禮猶無耜而耕也為禮不本于義猶耕而弗種也為義而不講之以學猶種而弗耨也講之以學而不合之以仁猶耨而弗穫也合之以仁而不安之以樂猶穫而弗食也安之以樂而不達于順猶食而弗肥也此承前章以人情為田之喻而每節反眀之以見缺一不可補四體既正膚革充盈人之肥也父子篤兄弟睦夫婦和家之肥也大臣法小臣廉官職相序君臣相正國之肥也天子以德為車以樂為御諸侯以禮相與大夫以法相序士以信相考百姓以睦相守天下之肥也是謂大順大順者所以養生送死事鬼神之常也此承上章食而弗肥之喻因以身之肥充廣至天下之肥是為大順以發眀上章所謂達于順之順補故事大積焉而不苑並行而不繆細行而不失深而通茂而有間連而不相及也動而不相害也此順之至也故眀于順然後能守危也苑于粉反苑積而至鬱滯之意也事大積纍亦一一處置有條理于小事亦不失凡皆言其順之實而治之形也守危謂能居安如危守而不失如易所謂危者安其位用鄭氏葉氏補故禮之不同也不豐也不殺也所以持情而合危也故聖王所以順山者不使居川不使渚者居中原而弗敝也用水火金木飲食必時合男女頒爵位必當年德用民必順故無水旱昆蟲之災民無凶飢夭孽之疾殺所戒反當丁狼反禮隨貴賤不同而各得其豐殺之中于以持情而使之正合危而使之安居山居川居渚居原各順而安之所各保其葉不至困敝合男女必當其年頒爵位必當其德致順如此故國無災民無疾用孔氏陳氏補故天不愛其道地不愛其寶人不愛其情故天降甘露地出醴泉山出器車河出馬圖鳯凰麒麟皆在郊棷龜龍在宫沼其餘鳥獸之卵胎皆可俯而窺也則是無故先王能修禮以達義體信以達順故此順之實也棷音藪器車鄭氏以器為銀甕丹甑孔氏謂不揉治而自圓曲為器車按器車與馬圖對言豈古嘗出此物如河圖之類歟郊棷在郊之棷宫沼在宫之沼卵胎可俯見謂不驚避無故謂非有他事使然天不愛道以其道與我地不愛寶以其寶與我人不愛情以其情與我此豈有私與哉亦以積纍之厚如上所云也甘露醴泉而下皆言其證應陸氏禮器第十禮器是故大備大備盛德也禮釋回增美質措則正施則行其在人也如竹箭之有筠也如松柏之有心也二者居天下之大端矣故貫四時而不改柯易葉故君子有禮則外諧而內無怨故物無不懷仁鬼神饗德禮器謂禮之用成也是故者承前篇禮運而言自前篇禮運所陳至是禮之大體全備若成器然故曰禮器大備其動容周旋中禮非盛德者不能為故又釋之曰大備盛德也回邪筠謂竹之青皮私欲頗僻所謂回也禮能使之隂自消弭如水之于氷春風之被物所謂釋回也天賦善端所謂美質也禮之所加猶玉而山龍其文猶素而藻繢其章所謂增美質也故措諸事則正施諸用則行如竹箭之有筠其外澤如松柏之有心其內堅故以之接人則外諧和以之處已則內無怨懟物懷其仁而鬼神饗其德用葉氏馬氏補先王之立禮也有本有文忠信禮之本也義理禮之文也無本不立無文不行盡已之謂忠以實之謂信處之有經之謂理施之有權之謂義根于忠信為禮之本各辨于義理為禮之文用黃氏陳氏補禮也者合于天時設于地財順于鬼神合于人心理萬物者也是故天時有生也地理有宜也人官有能也物曲有利也故天不生地不養君子不以為禮鬼神弗饗也居山以魚鱉為禮居澤以鹿豕為禮君子謂之不知禮天之四時各有所生地之分理各有所宜人居其官各有所能萬物委曲各有所利天不生謂非其時物也地不養謂非此地所生也不順其鄉之所有謂之不知禮也鄭氏孔氏故必舉其定國之數以為禮之大經禮之大倫以地廣狹禮之薄厚與年之上下是故年雖大殺衆不匡懼則上之制禮也節矣殺色戒反定國猶立國也經經常也倫倫理也殺穀不熟也匡猶恐也舉國內生物多少之數以為禮之經費其制禮之倫理又隨地廣狹逐年豐歉常量入以為出故年雖大荒衆無恐懼則上之制禮于是為有節補禮時為大順次之體次之宜次之稱次之堯授舜舜授禹湯放桀武王伐紂時也詩云匪革其猶聿追來孝天地之祭宗廟之事父子之道君臣之義倫也社稷山川之事鬼神之祭體也喪祭之用賔客之交義也羔豚而祭百官皆足大牢而祭不必有餘此之謂稱也稱尺證反革紀力反革急也猶道也倫即順義即宜羔豚而祭謂小祭祀大牢而祭謂大祭祀時者天地之大運順者人道之大倫形各有辨謂之體事各有常謂之宜物各隨其分量謂之稱五者雖不同同歸乎理此章蓋先舉其凡而隨條釋之用江氏方氏補諸侯以龜為寶以圭為瑞家不寶龜不藏圭不臺門言有稱也龜卜龜古者貨貝寶龜諸侯保土占詳吉凶故得以龜為寶圭謂五等玉諸侯之于天子猶天子之于天天子得天之物謂之瑞故諸侯受封于天子天子與之玉亦謂之瑞家謂大夫大夫不得寶龜故臧文仲居蔡為僣卿大夫不執玉故不藏圭兩邊築土為基基上起屋曰臺門門之有臺所以壯國體故家不臺門凡其得與不得各有所稱也鄭氏孔氏方氏禮有以多為貴者天子七廟諸侯五大夫三士一天子之豆二十有六諸公十有六諸侯十有二上大夫八下大夫六諸侯七介七牢大夫五介五牢天子之席五重諸侯之席三重大夫再重天子崩七月而葬五重八翣諸侯五月而葬三重六翣大夫三月而葬再重四翣此以多為貴也介副也謂介僎之介五重三重古注謂葬時抗木抗席加茵葬宜堅固故多重陸氏謂重棺凡此尊者多而卑者少故曰以多為貴方氏有以少為貴者天子無介祭天特牲天子適諸侯諸侯膳以犢諸侯相朝灌用鬱鬯無籩豆之薦大夫聘禮以脯醢天子一食諸侯再大夫士三食力無數大路繁纓一就次路繁纓七就圭璋特琥璜爵鬼神之祭單席諸侯視朝大夫特士旅之此以少為貴也介者為賔則用介天子無客禮故無有灌獻也一食再食三食謂告飽也食力謂庶人自食其力者也大路祭天之木路也繁馬腹帶也纓鞅也就者五色絲一匝也鄭氏以繁為鞶帶之鞶山隂陸氏讀繁如字謂繁纓言其文之繁也巾車曰玉路樊纓十有再就謂之繁纓冕之玉名繁露與此同義士喪禮曰馬纓三就所謂就者其纓而已愚按鄭氏之説其行已久人多從之難改耳圭璋特者圭璋玉之寶而獨用之不用他物為嫓也琥璜爵者琥璜之玉劣于圭璋禮行酬爵則以琥璜之玉將幣不獨用也天子無介祭天用特天子之膳諸侯非不能備多品也而用止一犢諸侯相朝主國非不能備豆籩也而灌止用鬯繁纓美于多就而大路一就琥璜用于爵幣而圭璋則特凡皆以少為貴許氏有以大為貴者宫室之量器皿之度棺槨之厚丘封之大此以大為貴也有以小為貴者宗廟之祭貴者獻以爵賤者獻以散尊者舉觶卑者舉角五獻之尊門外缶門內壺君尊瓦甒此以小為貴也散悉旦反觶支豉反甒音武皿器之蓋也觴容一升曰爵二升曰觚三升曰觶四升曰角五升曰散五獻子男之饗禮尊酒尊缶以算法推之掬四為豆積而至缶二為鍾缶蓋四石之名壺大一石瓦甒五斗獻謂獻之于尸舉謂舉以自飲宫室以至丘封貴者皆大此以大為貴獻爵貴者以其小獻尊小者居其內此以小為貴補有以髙為貴者天子之堂九尺諸侯七尺大夫五尺士三尺天子諸侯臺門此以髙為貴也有以下為貴者至敬不壇掃地而祭天子諸侯之尊廢禁大夫士棜禁此以下為貴也棜於處反禁承酒尊使不動者也棜禁承酒尊之無足者也廢禁去其禁使就地也棜禁無足雖用禁而近地者也此謂以下為貴補禮有以文為貴者天子龍衮諸侯黼大夫黻士玄衣纁裳天子之冕朱緑藻十有二旒諸侯九上大夫七下大夫五士三此以文為貴也有以素為貴者至敬無文父黨無容大圭不琢大羮不和大路素而越席犧尊疏布冪樿杓此以素為貴也琢古作琢文轉反越音活犧鄭素何反王如字樿章善反越席蒲席犧尊畫犧牛于尊疏布冪以粗布覆酒尊樿白理木樿杓以白木為酒杓而不加飾集孔子曰禮不可不省也禮不同不豐不殺此之謂也蓋言稱也禮之以多為貴者以其外心者也德發揚詡萬物大理物博如此則得不以多為貴乎故君子樂其發也禮之以少為貴者以其內心者也德産之致也精微觀天下之物無可以稱其德者如此則得不以少為貴乎是故君子慎其獨也省察也詡猶普也遍也德産精微謂天德之生物其致精微而無遺也德之發揚普遍萬物大得其理于物甚博此禮有以多為貴樂其發謂樂其發見于外也天德産物精微無遺萬物皆其所生無物可以報稱其德故禮有以少為貴慎其獨慎其所以感之者也此通結前章之意言貴多則曰大曰髙曰文在其中言貴少則曰小曰下曰素在其中鄭氏孔氏馬氏古之聖人內之為尊外之為樂少之為貴多之為美是故先王之制禮也不可多也不可寡也唯其稱也內外以心言多少以物言內心之所尊則以少為貴而不可多外心之所樂則以多為美而不可寡此承前章覆説制禮惟其稱也用孔氏方氏説是故君子大牢而祭謂之禮匹士大牢而祭謂之攘管仲鏤簋朱紘山節藻梲君子以為濫矣晏平仲祀其先人豚肩不掩豆浣衣濯冠以朝君子以為隘矣攘非其有而取之也簋承黍稷器鏤刻而飾之朱紘冕之飾用組為之從下屈而上屬之兩旁垂餘為纓朱紘則天子冕之紘也節柱頭斗栱山節刻為山形梲梁上侏儒柱藻梲畫為藻文濫謂溢而無所制隘謂陋而無所容中則得禮僣則盜竊管仲過奢晏子過儉用鄭氏補是故君子之行禮也不可不慎也衆之紀也紀散而衆亂孔子曰我戰則克祭則受福蓋得其道矣紀者衆目之總禮亦百行之總戰克祭受福本郊特牲記春搜之禮搜田習戰而以其禽祭故載此為孔子之言此因言祭而并引之馬氏葉氏孔氏君子曰祭祀不祈不麾蚤不樂葆大不善嘉事牲不及肥大薦不美多品麾快也蚤先時也葆之言褒葆大指器物言也嘉事冠昏也祭以思親不祈福報祭感霜露之變不先時蚤設為快必求其稱故不樂器幣之葆大不忍其代親故不善冠昏之嘉事禮有以大為貴而牲不及肥大禮有以多為貴而薦不美多品修其在中之誠而已孔氏陳氏馬氏孔子曰臧文仲安知禮夏父弗綦逆祀而弗止也燔柴于奧夫奧者老婦之祭也盛于盆尊于瓶綦音忌奧古音爨方氏應氏胡氏並如字盛音成臧文仲魯大夫臧孫辰也夏父弗綦魯文公時典祀者也逆祀謂魯閔公幼而適先立魯僖公長而庶後立僖公嘗臣事閔公矣僖公之子文公乃躋祀僖公于閔公之上是為逆祀而臧文仲為大夫不能諫止也奧者西南隅致養之地竈能化飲食以養人故祀竈於奧而以婦人之為先炊者配之不過盛飲于盆尊酒以瓶禮無燔柴也而臧文仲燔柴皆為不知禮也補禮也者猶體也體不備君子謂之不成人設之不當猶不備也禮有大有小有顯有微大者不可損小者不可益顯者不可掩微者不可大也故經禮三百曲禮三千其致一也未有入室而不由户者人備衆體各當其用斯為成人禮有大小顯微之不同茍設之而不當是亦不得為備禮故經禮三百曲禮三千之多其致一者謂用各當于理也是即入室之有户也補君子之于禮也有所竭情盡慎致其敬而誠若有美而文而誠若誠若即誠意而發為禮文表裏相稱內外相似也竭情盡慎致敬而誠若者主內心而言謂禮有以少小下素為貴者也文而美而誠若者主外心而言謂禮有以多大髙文為貴者也貫通乎內外皆誠也用鄭説補君子之于禮也有直而行也有曲而殺也有經而等也有順而討也有摲而播也有推而進也有放而文也有放而不致也有順而托也摲所監反放方往反托之石反討求也摲芟也放效法也托拾取也直而行謂行吾誠而無所屈若凶事不詔至敬無文曲而殺謂有所壓而不得伸若父在為母期君燕不以卿為賔經而等謂理之大者不可易若三年之喪自天子達順而討謂序之細者不可紊若天子而下轉相降差摲而播謂芟于此以播于彼若旅酬之逮賤餕餘之逮下推而進謂推于此以進于彼若兄弟之子而謂之猶子王者之後而得用天子之禮放而文若天子之服象日月以至黼黻放而不致若諸侯自山龍以下順而托若君沐梁大夫沐稷士亦沐梁士卑不嫌拾君之禮而用之也集陳氏孔氏方氏三代之禮一也民共由之或素或青夏造殷因或素或青言質文之相變夏造殷因言前後之相承用方氏補周坐尸詔侑武方其禮亦然其道一也夏立尸而卒祭殷坐尸周旅酬六尸曾子曰周禮其猶醵與武音無醵其約反與音餘武讀為無無方與就養無方之義同也合錢飲酒曰醵旅酬六尸謂太祖尊不與子孫酬酢三昭三穆更相次序以酬凡六尸也夏禮質謂尸是人人不可久坐神位故惟飲食時暫坐非飲食則尸倚立以至卒祭殷因夏禮損其不坐之禮益為常坐之法周又因殷而益之詔告勸侑其尸如生時就養無方又旅酬遍于六尸如合錢飲酒皆令周遍故曽子謂其猶醵歟孔氏君子曰禮之近人情者非其至者也郊血大饗腥三獻爓一獻孰爓似廉反郊祭天也大饗祫祭先王也三獻祭社稷五祀也一獻祭羣小祀也用血非人情用腥去人情稍近爓謂沈肉于湯為近人情用熟肉于人情最近獻以血非近人情者也而反以事天獻以肉乃近人情者也而反以事羣小祀故曰禮之近人情者非禮之至也周氏是故君子之于禮也非作而致其情也此有由始也是故七介以相見也不然則已慤三辭三讓而至不然則已蹙故魯人將有事于上帝必先有事于頖宫晉人將有事于河必先有事于惡池齊人將有事于泰山必先有事于配林三月繫七日戒三日宿慎之至也故禮有擯詔樂有相步溫之至也惡好胡反池大河反介副也賔相見必有介以通情慤謂太質蹙謂太遽惡讀為呼呼池并州川延平周氏以為惡沱蓋呼沱也配林林名繫謂繫牲戒謂散齊宿謂致齊擯詔謂擯相而告詔之也相步謂相瞽目者之行步也溫和也禮非直情而徑行必有為之先先如有事上帝而先頖宫河之先惡池泰山之先配林皆其所由始因而肄習之也用方氏陸氏補禮也者反本修古不忘其初者也故凶事不詔朝事以樂醴酒之用玄酒之尚割刀之用鸞刀之貴莞簟之安而稿鞂之設是故先王之制禮也必有主也故可述而多學也莞音官又音丸鞂江八反主謂本與古也可述而多學謂于其本與古而求之也凶事出于哀戚之真情而不用擯詔朝事出于君臣之燕饗而必用音樂醴酒所用也而反玄酒之尚割刀所用也而反鸞刀之尚莞簟所安也而反藁鞂之尚凡皆反本修古之事而禮之所主也故可述而學焉補君子曰無節于內者觀物弗之察矣欲察物而不由禮弗之得矣故作事不以禮弗之敬矣出言不以禮弗之信矣故曰禮也者物之致也致至也禮者萬物之極致馬氏是故昔先王之制禮也因其財物而致其義焉爾故作大事必順天時為朝夕必放于日月為髙必因丘陵為下必因川澤是故天時雨澤君子達亹亹焉舍物而論義則流于虛若逼逼于形名度數而不眀聖人為禮之義又祝史之事而已故曰因其財物而致其義天時雨澤蓋陽和融液仁德流行出于天運之自然而不容止君子于此而達其亹又不息之忱蓋與天合德用周氏應氏補是故昔先王尚有德尊有道任有能舉賢而置之聚衆而誓之此謂將祭而擇士又聚集其衆而誓戒之本鄭氏説是故因天事天因地事地因名山升中于天因吉土以饗帝于郊升中于天而鳯凰降龜龍假饗帝于郊而風雨節寒暑時是故聖人南靣而立而天下大治因天事天謂于丘而祭因地事地謂于澤而祭因名山升中于天謂于髙處升中心之誠于天因吉土而饗帝謂如周公卜洛得吉而于其地饗然各要之祥瑞應驗則漢人之言也補天道至教聖人至德廟堂之上罍尊在阼犧尊在西廟堂之下縣鼓在西應鼓在東君在阼夫人在房大明生于東月生于西此隂陽之定分夫婦之位也君西酌犧象夫人東酌罍尊禮交動乎上樂交應乎下和之至也罍尊畫雲雷于尊如屋梁所畫曲水雲雷相間也犧尊畫犧牛于尊楊慈湖嘗官楚東見其俗呼牛之大者為沙孔疏不知牛之為沙改沙為娑謂為羽飾陸氏又并改犧為娑縣鼓大鼓應鼓小鼓犧象之象尊為象形也犧牛重遲象重厚故為其形以取義焉廟堂宗廟之堂人君所居亦稱廟堂傳所謂君人不下廟堂而知四海之外是也天垂象以示人故為教之至聖人體天之所示以成德故為德之至君立于阼以象日夫人在西方以象月此即天道至教而聖人體于至德之一也禮動乎上樂應乎下隂陽交通天人和同故曰和之至用馬氏孔氏補禮也者反其所自生樂也者樂其所自成是故先王之制禮也以節事修樂以道志故觀其禮樂而治亂可知也蘧伯玉曰君子之人達故觀其器而知其工之巧觀其發而知其人之知故曰君子慎其所以與人者禮以報本故反其所自生樂以彰德故樂其所自成禮惟其反本故制之以節萬事樂惟其彰德故修之以道己志觀禮樂之得則知其治觀禮樂之失則知其亂發者見之于其事觀其器而知其巧所以喻觀其發而知其智我之所發即其所以與人而人得觀之者故君子慎其所以與人用馬氏孔氏補太廟之內敬矣君親牽牲大夫贊幣而從君親制祭夫人薦盎君親割牲夫人薦酒卿大夫從君命婦從夫人洞洞乎其敬也屬屬乎其忠也勿勿乎其欲其饗之也納牲詔于庭血毛詔于室羮定詔于堂三詔皆不同位蓋道求而未之得也設祭于堂為祊乎外故曰于彼乎于此乎定丁磬反祊百彭反血以告幽毛以告全羮肉湆定熟肉或曰羮和而後定道猶言也祊門外牽牲謂納牲于庭時告神當用幣而大夫以幣從也制祭謂朝事用血骨時祭神當用盎齊而夫人薦盎以獻也割牲謂進牲熟體時薦熟當用酒而夫人以酒薦也卿大夫從君謂從其制祭割牲命婦從夫人謂從其薦盎薦酒洞洞質慤貌屬屬専一貌勿勿勉焉以望其神之歆饗貌納牲詔于庭即申言牽牲贊幣之禮血毛詔于室即申言制祭薦盎之事羮定詔于堂即申言割牲薦酒之事設祭于堂正祭于廟之內也為祊乎外索祭于廟之外也于彼乎于此乎不知神之所在也用孔氏方氏馬氏補一獻質三獻文五獻察七獻神一獻祭羣小祀三獻祭社稷五祀五獻祭四望山川七獻祭先公質言簡文言詳山川地道故言祭祭致其審也先公人道故言神神惡其褻也鄭氏方氏大饗其王事與三牲魚臘四海九州之美味也籩豆之薦四時之和氣也內金示和也束帛加璧尊德也龜為前列先知也金次之見情也丹漆絲纊竹箭與衆共財也其餘無常貨各以其國之所有則致逺物也其出也肆夏而送之蓋重禮也內音納見賢遍反肆古注作陔大饗謂盛其饌與貢祫祭先王承上文七獻而言則大饗者九獻也九獻山隂陸氏嘗考其詳三牲牛羊豕魚臘薧魚籩豆之實水草之品內金納之庭實先設金也金照物故云見情其餘謂九州外蕃國天子大饗諸侯各以其方物助祭三牲魚臘天産也天産作隂德故以味為主而曰四海九州之美味籩豆之薦地産也故以氣為主而曰四時之和氣備四海九州之美味者示其得四海九州之歡心薦四時之和氣者示其能贊于天地金從革從革則和故內之以示其和璧象天德故加之束帛之上所以尊其德龜能知來物故列之前以先其知金能照物露見其情故次于龜以見其情納金示和是其入在先以金次龜是其設在後同此一金而兩義也龜金之後布陳丹漆絲纊竹箭與天下衆人共有此財故諸侯來朝而貢之陳列在下其餘外國無常貢各以其所有貴寶為贄示其致逺物也其畢而出也王奏肆夏之樂而送之諸侯之饗王以財而王之送諸侯以樂非為財也蓋重禮也方氏周氏孔氏陳氏祀帝于郊敬之至也宗廟之祭仁之至也喪禮忠之至也備服器仁之至也賔客之用幣義之至也故君子欲觀仁義之道禮其本也郊廟喪賔仁義忠敬所發而禮為之本補君子曰甘受和白受采忠信之人可以學禮茍無忠信之人則禮不虛道是以得其人之為貴也和户卧反質不先立于內則禮不可行于外道之為言行也方氏孔子曰誦詩三百不足以一獻一獻之禮不足以大饗大饗之禮不足以大旅大旅具矣不足以饗帝毋輕議禮一獻祭羣小祀也大饗祭先王之九獻也大旅非常祭國有大故旅羣神而祭之也饗帝祀昊天上帝也此假詩而遞尊之以眀禮之重用孔氏方氏補子路為季氏宰季氏祭逮暗而祭日不足繼之以燭雖有強力之容肅敬之心皆倦怠矣有司跛倚以臨祭其為不敬大矣他日祭子路與室事交乎户堂事交乎階質眀而始行事晏朝而退孔子聞之曰誰謂由也而不知禮乎跛彼義反與音預宰治邑吏偏倚為跛依物為倚室事正祭堂事侑尸室事交于戶堂事交于階亦通達連續之義質正也質眀者正眀朝食前也晏朝者于朝為晚禮寧略而敬不可煩而怠孔氏黃氏日抄卷十八
