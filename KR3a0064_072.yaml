body:
  text: 黃氏日抄卷七十二宋黃震撰申明三第三任分司鎮江條陳轉般倉事上申提刑司乞申朝省修倉並乞免江西米入倉狀癸亥五月孫提刑任內照對某近者祇領職事即嘗申禁絶濕米等條畫然皆不過小節兹得本倉關繫稍大二事勢尤不容不早早申明一曰倉敖多壞綱米將無所容二曰轉般良難隨時當有活法本倉創於淳熙增於開禧又增於嘉定以敖眼計前後共七十有六今頽毁不存者十有四損而未修者三十有八見樁米二十敖見空可備收米才四敖耳四敖所容約不過四萬石有竒見樁未滿之敖約可共附五萬石有竒而總所鎮江取運江西米旋到旋交若在道及未到尚約四十萬石有竒將何以容之耶且今本倉所收皆江西米也江西經四十餘處沙磧行千五百餘里大江然後得達京口日久費重綱吏多雜濕惡則是交收為難淮鄉支米將官自來多凌轢本倉官吏今又間見米色或稍異向來浙米尤易於暄炒則是支發為難嘗考轉般倉之名本為關津處停米易舟而設國朝以淮浙直達京師非便置轉般於真州泗州南渡後以浙米直達兩淮非便又置轉般於京口朝省近因發運司與此倉子母相私方改本司提領而轉收江西之綱革弊已精權宜甚善然頗迂路亦費水腳今既倉敖不足以容亦豈無變通之活法耶方今國家間暇正欲廣積貯垂久逺孰若以江西未到米本倉所不能容者就截撥付兩淮比近州軍却乘此倉之餘間選一精力將校亟修此倉垂壞尚存之敖以待今秋就交浙右官米豈不兩便此事本非某所敢僭及然使倉壞而不申舉米到而無安頓果誰之責職守所在不敢不言事若可行乞賜備申朝省申提刑司乞浚甘露港狀照對國事以軍餉為急軍餉以漕運為急古人欲貫串河渠至有鑿平地三百餘里我藝祖最愛惜民力猶首置斗門於五丈河良以大計所關雖勞費有不憚爾今京口轉般倉實依大江而立一水環其前後前引上河頭以南致浙右之米後出甘露港以北餽兩淮之軍通徹無礙措置曲盡養兵百萬不費一夫擔夯力也近年來甘露港日就乾澀一月間惟兩大迅潮僅及之舟楫不通糧運中痞問其弊源皆曰自往嵗郡將拆去甘露閘板始夫智者謀餉變陸為水今反堙之寸步千里何哉或者弗之思耶某嘗妄謂此港之不可不浚其事有十轉般倉今所交者自江西米每米一擔自港外步般至倉雇錢五百是一綱所費白增數千貫綱梢如之何不愈侵盜是此港之不可不浚者一也無港泊舟往往退藏焦山之阿候潮旋艤艱難萬狀港若開通則舳艫相卸徑入城市其至如歸是此港之不可不浚者二也候潮艤舟既待風色隔沙步卸能復幾何若徑近倉朝交卸而夕絶矣是此港之不可不浚者三也退泊不暨舟閣硬沙或近斗岸為風濤所撞若纜為他舟所絶往往損破失米皆由無所稍泊之故是此港之不可不浚者四也米舟急於稍泊每大迅輒數舟占港共作一埧截水旋雇小舟剝淺作埧之費三千貫剝淺之費不預焉舟之急欲得港若此是此港之不可不浚者五也兩淮諸司支請軍食其步卸出江而去重費久淹與綱户之來入倉者同是此港之不可不浚者六也米船近倉檢柅亦易今在僻逺恣雜濕惡是此港之不可不浚者七也南北之舟皆泊倉岸或遇對剝徑可就舟是此港之不可不浚者八也脫有緩急軍糧豈宜少滯國朝間暇此事正當講明是此港之不可不浚者九也不獨轉般倉為然大軍北倉正與轉般倉夾河而立南倉亦由此河而北此河通則凡裝運皆便是此港之不可不浚者十也至若京口為淮浙之要衝舟楫茍便百貨可以駢集甘露實京口之主山港脈茍通臺郡皆有關繫兼此邦地仰易盈易涸苟有閘以時其啓閉農田之利益尤多此又軍餉外無窮之便也某人微位下凡事何敢僭越實以目擊本倉交缷支運兩極其難到任數日即親厯其地見大江之入京口者其道有四最西曰京口閘總領所見於此支運河流亦淺頗費搬夯其二曰海鮮河甚淺見係江西綱作埧截大迅潮以剝米其三曰鱔魚港尤淺亦江西綱乘大迅潮隱舟此地隔塘搬米以上詢之故老皆吳尚書任內所嘗開浚日久漸湮其四則今來所指之甘露港實居四港之最東在北固山甘露寺下北固山純土如粉獨其北峭石壁立竒拔竦人蓋遊觀者所不見豈北固之所以得名歟石之下為田田之外為港自利涉門外繞土城而西入倉約二里可容米舟二十萬石最外為舊石閘之基風濤所不及令居民橋其上稍深折而西為舊木閘之基今綱户乘大迅用樁蘆截水其地又漸入則港漸狹蓋若民時采其傍然古岸尤存甚濶也自嘉定間史待制名彌堅嘗浚治今五十年初本不至堙塞自廢閘十年渾水漸入舟始澀而不通某竊意他港必未暇浚莫若先浚甘露港石閘亦未易復莫若且改置外閘為木閘如此則易害為利當盡如前項所陳不然堙且日甚害亦不止如目前所見而已也區區欲望台慈詳酌其可特賜申明朝省乞從行下所屬作急開浚修復國事幸甚再申提刑司乞移還甘露閘狀照對京口居淮浙之衝故轉般倉非京口不可立甘露港又居京口貫通淮浙之衝故轉般軍糧非甘露港不能快而此港淺澀不通止因廢閘近已親行相視條具事宜乞申明行下浚港復閘外今再尋訪到舊閘石村係發運司昨因此閘之廢移置栲栳上閘見存此可謂廢有益事無益矣今謹詳具兩閘廢置緩急對列下項一此閘石村舊為甘露港外閘甘露港者甘露寺下引注大江貫注鎮江府城中直達上河南至今行在所者也江水長潮衮動渾濁退則靜緩澄而成淤每一潮入上河積淤率一葉之厚不數年河湮矣故須外閘閉住不容長潮之入必上河旱涸不得已方開板入之江皆淡水儘可溉田若綱運出入則隨開隨閉曾不移刻由此而論甘露港口不可無閘閘不可不用石使之堅壯可以捍潮昭然甚明一此閘石村近嵗移作栲栳上閘栲栳云者義取灣曲耳於水利軍餉兩皆無關蓋鎮江城外可五六里有閘名京口閘鎮江城內轉般倉東北隅又有閘為則水閘京口閘在外以限江水之入則水閘在內以制河水之出彼此相胥二閘已備前人之措置密矣今發運司又於元置則水閘之東稍折而南約百步外作閘名栲栳上閘此既不預州縣水利事及訪問無端添閘之因則發運司每發米到倉恐其出缷不盡到即關置上閘之內候差人檢空方開閘放行若意果出此不幾甚愚而多事也哉綱梢若欲偷米當在中塗米既到倉交量豈復載去必欲檢空誰敢先走縱防其走置柵已足漢人橫木渡水曰𣙜至今場務纂節無不用之革亭大邑四絶水中惟恃八柵作水上城郭盜賊之強梁商販之狡黠未聞有不待啓鑰而越禁者折栁樊圃狂夫瞿瞿豈官船載官米而獨須石閘以防之乎敷天之下自古及今聞置閘以防水矣未聞置閘以防人也由此而論則此閘之不必置雖置閘不必石亦昭然甚明右某元申未見甘露港廢閘石村去著乞且權置木閘蓋慮石閘費大難猝成也今既考見有用之閘見移置無用之地乞賜更加裁酌或與並申朝省行下所屬除開浚外仍速移甘露閘舊石復還甘露港舊閘其於軍餉大事實非小補申提刑司乞免専人並豁耗狀照對本倉今非昔比本司既凖朝旨提領必興其利而除其害然後可無負提領之名興利之事二如修敖如開港昨已申明除害之事今再開申下項一竊照天下事官與民以利交則弱之肉強之食其弊無窮官司自與官司以官司之利交則齒利者齧爪剛者決兩強徒自戛摩耳何弊之可慮本倉昨𨽻發運司每日交發運司運到和糴人户米一萬石子母一家利源滚滚自景定二年十一月內朝省革弊改屬本司提領所收乃江西綱運欠折之米今嵗取運又是鎮江府節制司淮東總領使所兩大司存差向上官下視倉場如臨部曲況綱户自行蕩槩東量必有西折而制司支米將官反又自齎大斛脅欲多取官司自與官司交其事如此以故倉場日壞吏卒日少氣象蕭索窮促萬狀而本司不知也每見前政文移到倉殆無虛日每一牌匣差人齎抱費從何來某竊嘗譬之少壯時有飲食嗜欲之過而無病病反作於晚嵗衰淡之日祖父時有富貴驕奢之失而無禍禍反作於子孫困苦之世發運司提領本倉有市利食利而無督責督責反出於本司革弊之後此乘除自然之理本無足怪然渾揚濁務數有推移吏卒小人彼亦罔覺或前日所得之錢已盡而今正貧窮或前日得錢之吏已亡而今無干預彼固不能自言而識者何忍彼雖不足多恤而司存奈何某到任來於本倉即無一毫干預並已凖使牒從申於本倉收支亦無干預訖天日在上實非黨私但念轉般倉亦朝廷一緊要司存若坐視其日壞而避嫌不為一言於心何安區區欲望台慈自建臺更新應干文移無輕遣専人齎匣庶使倉場不至重困為朝廷扶持保愛一司存是亦忠厚之至一倉米豁耗自有成法聞本倉近來獨不舉行竊嘗思之必謂轉般倉朝交而夕支非積貯者有經久盫折之比意果出此未為不當但兩載以來所收江西米多是經梅過夏或因敖少米多宿米之支未盡而新米之收已附遞遞積盫經及三嵗者有之此等耗折若不早與申明使得依條理豁一旦清徹見底誰與陪補所謂専攢不過破皂衫窮漢所謂斗級不過青布衫小民彼亦烏能自言萬一禍責及身惟有自經溝瀆官物之追理無地而本司之應酬方多欲望台慈早賜詳酌申明施行申提刑司乞造循環匣狀癸亥冬權憲趙菊坡任內照對本倉乃軍餉緊要之司期限既不可稽違本司非刑獄追會之事筒匣又不可輕遣某檢照近凖使臺發下文字動踰旬日方到緣是散遞鋪兵類聚方傳以致停滯今欲權造循環匣兩隻責令遞兵専一傳報轉般倉分司常行文字庶可報應及時未敢擅事若可行乞賜台判送案刋造遞發施行申提刑司辨總所欲追治本倉狀伏凖使牒備凖省劄備據淮東總領所申稱本所先曾取運江西米到轉般倉交收被倉斗以乾為濕以淨為雜百端掯勒及倉官不肯任責監欠今來取運公田米許從本所覺察追人根究等因依某照得倉斗綱梢皆非善良禁戢倉斗本司之事禁戢綱梢總所之事彼此交盡其責正士大夫相與體國之心合考其次第而通言之大率米出民户無不乾淨米經綱梢無不濕雜此三尺孺子所知者今欲運米果無濕雜請先自取運官司始萬一關防不周濕雜難免則罪在綱梢其或果無濕雜尚敢掯勒則罪在倉斗若不早與兩下明白則綱梢恃總所之申而愈增濕雜倉斗乘總所之申而私受濕雜綱梢有減尅盜糶之利倉斗有交通取受之利而米一經水盫爛成塵軍餉獨受莫大之害矣若夫監欠末節自有成例所不待言所合具申乞賜詳酌施行申提刑司辨總所再欲追人狀凖使牒備凖尚書省劄子施行淮東總領所再申朝廷乞明賜劄下鎮江轉般倉如遇本所取運公田租米到來即仰從公速與交量仍從般户自行斛槩並照京倉交受運司公田米例每綱定要三日交收斗級或有欠折即從本倉徑行拘收押綱船梢任責隨即監納了足毋致抵牾如或本倉官吏専斗生事即照已凖指揮追人究實具申朝廷施行都省照得省倉下界交納兩郡公田米每日不下一萬餘石兼有出剩米反責還綱吏轉般倉當體此奉行合議行下除已劄付鎮江府轉般倉遵照今來劄下事理施行或稍有阻滯乞覓等事斷是追究外劄本司密切關防具申今承本司牒其嚴切關防如運到租米即令本倉從公速與交量某竊詳交量之遲速全係米色之好惡米若乾淨隨到隨收日交萬石儘可遵守萬一關防不周綱梢作弊米一有濕則決不容不曬米一有雜則決不容不篩自然擔閣工夫豈可槩言掯勒今來總所申明固是仰體朝廷之意期於速辦公米但恐綱吏船户不能仰體總所之意反借此脅持倉官兼官司各有部屬轉般倉自係提刑司提領今詳牒內備坐總所申請稱如或本倉官吏生事即照已凖指揮追人則是取運官司徑可追治交量官吏米有濕惡誰復敢爭況轉般倉係朝廷之倉本司不過同提領同之一字言尊無二上權在朝廷也故本司自提領以來非凖省劄米嘗自有施行今若他司徑追本倉官吏則於事理亦恐更合斟酌未委此項指揮元係如何行下所合具申使臺乞賜詳酌或與申審的實以慿遵守回申提刑司備總所委監倉衆事例錢狀伏凖使牒委令總使綱吏周嵩等供攤轉般倉衆取受交米事例錢一十萬六千餘貫十七界官會事某拖照此事係屬前政不知首尾遂牒本倉及據回申認數不對深疑倉衆猶有隱情繼即喚上元兜綱過付人劉七胡七楊六徐百一等與倉衆對證據供除綱吏自雇市户般擔入倉雜費外於元攤十萬六千餘貫之數諸項實付節次共計一萬九千七百八十六貫一照得此錢若一旦驟總成數槩舉本倉而言之止如所供數已非少若以人情之實事勢之漸而言之則經三年之久踰一二百家之衆小人隨得隨用當時不過以了口食今去之年嵗乃欲追理還官恐非簡徑易行之事縱使一一可追亦何能少裨綱吏元欠之多豈綱吏姑借此以少延監督耶若謂今來所認未必盡實則供攤詞主本司見凖朝廷追呼候其出官並就使臺取問未晚回申再據總所欲監錢狀凖本司牒備凖省劄施行總所申備各綱船户通攤轉般倉専斗等取受錢事牒某速與區處某照得近凖使牒令契勘總所綱梢通攤倉衆取受市例錢已即契勘回申訖今凖使牒備省劄坐總所元申行下與先來已契勘事理一同再奉台判令某區處速申區處二字在某何敢僣越使某謂此錢不當監理歟則幾於效凡護局行道之人亦知鄙笑某方念本司提領以來失於立定程式以致今日船梢倉斗相與紛紛已連具申明及嚴行禁戢期絶方來之弊豈敢今日反先自取縱容之嫌使某謂此錢可以監理歟則倉衆皆是百姓執役正圖口食掇斛者得掇斛之錢用杴者得用杴之錢數籌抄轉者得數籌抄轉之錢情願交加事固雇募若以為贓則奔牛吕城腳船腳夫平生靠運米以謀食者比屋可誅矣況數踰百家事經年嵗當時未必能了口食今日豈復可以追理若以抵欠是徒誤官某切詳此事三歎聖朝立法忠厚纎悉備具在士大夫奉行如何爾綱梢將運米先支水腳綱梢已運米又與豁耗米設不幸風水損壞船隻亦與從公理豁當此朝廷清明從公行此三者綱欠之事思過半矣今來運米者總所之吏欠米者總所之吏利害怵惕莫知措手徒幸官員之更易匿其首尾而不言不陳理豁之事反為攤賴之詞徒冀遷延少寬追逮此亦何足與區處者區區之見如此所合回申取自使臺裁酌施行回申提刑司備省劄令為總所監錢狀甲子春李提刑凖使牒備凖省劄行下據總領所申乞監轉般倉衆納還元受過綱梢交米錢事某屬在使令所合遵稟惟謹但官司監錢須得詞主出官指定過付人與受財人三面對定責伏方可監理今攤錢之人見係本司凖朝省追解想已到司乞賜就問的實却與從公區處在某無緣可以慿空監錢須至供申者申乞給散倉衆事例錢狀照會某近凖使牒契勘總所綱吏攤賴倉衆受過交米事例錢某因念今後總所取到公田米在本司有當預為區處者蓋倉衆無非百姓執役正圖口食必有以裕其贍養之方然後可以絶其乞取之弊近聞倉官已曾申明未凖行下所合申審取自指揮施行再申事例錢狀照對轉般倉莫善於本司之提領亦莫難於本司之提領此倉元屬總所然總所支米者也久而不能無移兊之弊繼屬發運司然發運司糴米者也久而不能無通融之弊本司所持者三尺法米之收不自我米之支亦不自我一以至公撿柅弊幸提領轉般倉誠莫善於本司矣然弊幸豈易撿柅者哉運米者船梢交米者倉斗皆遊手謀食世所指為無賴之人有以贍養之尚不能防其私自乞取無厭之弊況贍養之未必能給者乎倉之屬總領所其事已久不可復知契勘發運司提領之時每日運米一綱計一萬石每綱給錢七百五十貫船梢又以水腳錢雇其般量亦同官錢之數兩項共計一千五百貫以俵倉衆交量掃掇抄轉數籌者凡數百人自屬本司此錢無所從來本司祇領之初又失於講求子細倉衆無以贍養遂沿前日發運司之例私自受錢於江西吏之手未幾總領所鎮江節制司各取運江西米倉衆又仰給於兩司押綱綱頭之手衣食消於當年禍患發於今日總所吏人恐欠折之及身則責船户攤賴之詞致申朝省以擬綱欠鎮江節制司止督綱户納欠則前日以錢交米者間有凶暴計出無聊私自取償甚至攔截倉斗行凶搶取家計食鑊紛紛若此提領謂何豈非甚難之事哉往事姑未暇言新米若何處分今省劄催督已經三月總所取運須有到倉將使倉衆家食而官幹不受分文雇倩歟不獨世無此理彼皆嗷嗷待哺之窮民何辭以禁之將使船户出錢以交米歟不獨彼無此錢是又開其計囑容私之門何策以防之拖照本倉所凖行下明該每石帶米二升五合為運米到倉折費朝省洞燭幽隱贍養倉衆必於此在條具纎悉區處明白使下之人有所遵守實受委官司之事船梢之水腳若干各量地里倉衆之分俵若干各隨局分不獨小人各得其養實仁人之用心而程式既定弊幸可革以善軍餉以省刑罰亦智者之事也不然則運米將到明文未下倉衆或仍前接雇倩事例而綱梢指為乞取以論訴或綱梢白令交量倉衆無以贍養各自逃散致擔閣官米皆不免為本司之纍所合乘其米之未至速賜區處施行申乞支舊米見底並巡倉照對某去年十二月二十六日曾申本司大略謂轉般倉新修公田租米新創以新倉收新米凡倉之事並合一新乞賜備申朝省施行聞至今未蒙從申今幸建臺方新所合再申開具下項一修倉必須先定其敖去年元申時尚有二十一敖宿米自後節次支撥督其興工外見今尚有一十四敖有米樁積未可修動乞速賜盡數科撥令敖眼空淨一體及時修整一契勘本司自景定二年十一月內凖省劄同提領此倉元登承發運司見管在倉米六百四十五石七斗九升九合八勺八抄四撮自當時本司提領以來截止今年景定五年三月二十四日終節次共收江西帥漕兩司並和糴鎮江府諸項舊米一百一十一萬八千一百五十一石二斗一升三合五勺八抄四撮共支過九十七萬九百一十三石四斗三升二合二勺八抄四撮內除淮東總所認樁米四千五百八十七石八斗七升五合外合見管一十四萬二千六百四十九石九斗六合三勺竊照在法倉米樁積經月以上每石許豁耗米三釐但倉場積弊利於糊塗不曾逐敖支絶隨時申數其在發運司提領之日既以手糴手運子母一家間有耗折不及三釐者例欲援豁以為贏餘不與討見分曉及自本司同提領以來又不知倉場首尾鞭長不及馬腹不過就用倉場申上之數亦無從計見分曉今幸修倉之便舊米一顆一粒須用支絶合與逐敖討見耗折實數隨多逐少依實理豁其勢度不至耗及三釐自此一畨清徹之後公田米入倉重新起頭候遂敖支絶即時申有無耗折多少實數永免倉場前後衮雜之弊一本倉天地字兩厫見有地板亦漸損壞蓋元初諸敖無不以板鋪地今亦間有閣櫺地板之木及零碎爛版在地者照得倉敖若有地板既可免地氣蒸壞米粒又可免逐時收買襯磹此事於倉敖最為急務鎮江府江下多有客船折船板出賣若就買鋪磹亦儘省事但慮當初計料官此項不入料賑元科之錢恐買辦不敷乞速申明此係元申如此近又收拾得本倉拆下舊敖木植雖已不可為柱若棄短取長解開為板亦足添用並乞申明行下元委官鎮江府斟酌措置施行一本倉正坐鎮江府西北隅瀕於大江人煙絶少去夏曾有盜入倉幸而警覺免致疏虞訪問老吏舊來亦屢曾被盜除本倉人衆守宿外元蒙朝省劄鎮江府都統司於諸軍輪差撥兵士二十名防護巡綽以壯聲勢近年以來因循不差乞申朝廷仍舊劄下差撥而本司乃止牒鎮江府照得都統司之兵既非鎮江府可差而本司之牒又未嘗據鎮江府承凖竟成具文擔閣數月今年三月初七夜又有盜跨牆而入是守宿斗級等警覺發喊趕去夫官倉而有竊盜數數窺之此豈細事今來欲望速申乞從久例仍劄都統司差撥巡警庶絶後慮一倉後三面皆甘露港繞之舊來糧運自浙達淮通徹無礙自十餘年前拆去閘板潮水積淤遂成膠舟官司不知復還閘板反並去其閘移置上河內閘裏無用之地名曰栲栳閘自此甘露港愈塞制司運米盡須步擔出數里外久淹重費又船隻無所梢泊屢為風濤損壞某去夏到官首陳十説曽蒙本司申省劄下所屬開浚而本府舊官拖擦不行某又陳兩閘利害緩急對列申明而前政提刑去官今年二月十五日風雨曾壞江隂軍公田米三船此皆無港泊船之故兼盜賊跨越窺覦亦正因港塞無水合不檢照某前此兩申並為申明施行兩里之港工費不多朝廷為軍餉大事必不較此小費若許科撥則所屬官司決無不鋭於任責之理並乞詳酌施行申乞支米須給省劄狀照對本倉久例必有省劄方可支米近來間有只據總所轉劄雖是所付本倉省劄偶然未到但恐因循不到將來本倉無慿出豁或倉官未見省劄不敢擅支有妨軍餉或總所他時急欲得米因而遂作轉劄名色倉官不敢申索真本三者皆屬利害乞賜申明應干科撥應副制總兩司等處糧米並將本倉照劄與科劄同時發下或總所轉劄徑可理為執照亦須明降指揮以慿遵守黃氏日抄卷七十二
