body:
  text: 黃氏日抄卷六十八宋黃震撰讀文集十葉水心文集奏議淳熙上殿劄子大略云恢復一大事而言者皆曰敵難攻當乘機不可動當待時夫機自我發非彼之乘時自我為何彼之待敵之難攻者豈真難而不可動者豈真不可正以我自有所難我自有所不可蓋其難有四國是一也議論二也人才三也法度四也其不可有五兵以多而遂至於弱財以多而遂至於乏不信官而信吏不任人而任法不用賢能而用資格凡五也若置而不論因而不改則我之難者真難矣敵豈復有易攻之機我之不可者真不可矣敵豈復有可動之時應詔條奏六事謂六事未善皆治國之意未明之故國勢也士也民也兵也財也紀綱法度也愚謹按上殿當孝宗臨御二十六年應詔當光宗受禪初年又上執政薦士辨兵部郎官朱元晦劄子此晦翁為林栗所劾而水心辨之者按栗時為法從水心非言官又所學與晦翁不相下非平昔相黨友者一旦不忍其誣出位抗言廷斥不少恕此當與汲長孺面責公孫𢎞張湯者同科嗚呼壯哉然晦翁初不以此重輕而水心則由此與之重矣淮西論鐵錢五事甚悉嘉泰上殿三劄一言人材當和平二論湖南每小歉不自給漕司宜擇利源為水旱急難百姓指凖之地三論泉南南外宗子請受準元指揮轉運司應副一半本州代宣信建昌邵武上供銀一萬五千六百餘兩四郡應副本州絹今轉運司不支錢宣與建昌邵武不還絹開禧上殿劄大略謂恢復危事先定其論而後修實政行實德何名之賦害民最甚何等橫費裁節宜先減所入之額定所出之費不須對補便可蠲除東南歲賦八千萬緡安集兩淮申省狀因民之欲令其依山阻水屯田畫一申請狀真州於瓜步滁州於定山和州於楊林石跋三處並量築堡塢此外深入第二層差續陳堡塢利害狀募勇士渡江北劫敵營凡十數往返取其俘馘以報江南人心始安敵亦由此卷甲遁矣三國孫氏常以江北守江不以江南守江見團結山水為寨者四十七處謹按水心淳熙上殿以復讎為第一大事至開禧用兵又指以為至險至危事宜識事機者然猶為韓托胄用金陵之行一語不踐夫兵固非為士者所宜輕言非言之難而為之難也大學講義前後接續皆講禮器公蓋欲以禮為治者所講率明白而釋回增美質一語講之尤粹若曰私欲頗僻所謂回也禮與之周旋而同其作止使之陰自消弭如冰之於水春風之被物所謂釋回也禮之所加猶玉之山龍其文猶素之藻繢其章也豈不煥乎其愈明哉所謂增美質也辭雖不免於文而理則善矣至講下文如竹箭之有筠也如松柏之有心也則謂禮之於人可學而至非如竹箭松柏之本有而無待乎人愚意此公自有所見而經意未必然也松竹之有筠有心正以比君子之有禮豈顧二之而反謂其非如也哉然公之所以通連其講者實歸宿於末章欲稱財而為禮不雜於人欲之流放以禮從天下而帝王之統緒接也嗚呼後世之取財於民視古百十倍而用益不足民窮到骨朘削愈甚此禮之不立而財愈多愈乏使然也公尚禮學而尤精究財賦本末欲起而救之至切也講義其微意所在乎第恐講道天子之學猶有本領在而此又其節焉爾表啓文平意順水心大手筆也四六語如此近世雕鏤自以為工者何如也卷六卷七皆古詩如超然北齋虎丘皆水心為浙西憲司幹官時作也記漢王新修學記厯敘江漢古今材質文有節奏可觀煙霏樓記公守蘄時所作寫景狀物佳溫公祠堂記公生光州因以為名王聞詩守光改祠之而水心為記謂公猶常人爾充實積久為宋元臣此最善言公者樂清三賢祠王龜齡與錢堯卿賈如規也醉樂亭記永嘉俗尚西山之遊吏因邏酒𣙜利數倍宣城孫公為郡始縱民自飲作新亭以休遨者名醉樂記未及古今政教尤佳石洞書院記東陽郭欽止得石洞作室儲書禮名士以教鄉里之秀者千佛閣記因人情施舍而及治道之中白石經藏記記少年遊厯可觀末以其成先志而記之亦得體龜山祠堂記楊氏子孫賣宅太守余景瞻贖還之又修補其漏闕因以祠龜山記文優緩而理趣髙平陽縣代納坊場錢記知縣汪季良以所沒造偽會田及廢寺田求提舉孟植上之朝求就賜縣用禾利補青册錢許之記文載敗闕坊名錢之擾甚切敬亭後記謂程氏誨學者先以敬為非當先復禮蓋水心之學然也愚按乾淳間正國家一昌明之會諸儒彬彬輩出而説各不同晦翁本大學致知格物以極於治國平天下工夫細密而象山斥其支離直謂即心是道陳同甫修皇帝王霸之學欲前承後續力拄乾坤成事業而不問純駁至陳傅良則又精史學欲專修漢唐制度吏治之功其餘亦各紛紛而大要不出此四者不歸朱則歸陸不陸則又二陳之歸雖精粗髙下難一律齊而皆能自白其説皆足以使人易知獨水心混然於四者之間總言統緒病學者之言心而不及性則似不滿於陸又以功利之説為卑則似不滿於二陳至於朱則忘言焉水心豈欲集諸儒之大成者乎然未嘗明言統緒果為何物令人曉然易知如諸儒者嘗略窺其所指為統緒者似以禮為主故其言曰學必始於復禮禮復而敬立矣安上治民莫善於禮若然則又似專言推行於文物制度之禮以防民之非者也非吾夫子所指根本於吾內心之禮使克去巳私而復之者也禮不先於克己禮將何自而復學不先於敬巳私又何自而克己且未知所以復禮又何以使民俗之復禮而公之言統緒又將何所從始耶且功利之學不必問也義理之學不容不辨也公於義理獨不滿於陸而不及朱似於朱無忤者然朱之學正主程而程之學專主敬乃反以程子之言敬為非又何耶且敬也者堯舜禹湯文武周公孔子以來相傳之説非程子自為之説也蘇子瞻千古竒材獨以輕薄讎程子終身思所以破其敬之説尚終其身不能而水心欲破之宜其説之不能自白也上蔡祠堂記謝顯道獨一子克念流落台州尋亦死克念有子偕偕三子無衣食替人承符引黃畇為郡訪得之請見抗賔主禮給冠帶錢米置田宅祠顯道於學瑞安修學記若但豎數十屋而宫羣數十士而飯而曰教養盡是矣何易也愚謂此痛快語北村記為尚書吳興沈公作也文有雅韻讀之如閲山水畫一竒也王文正祠堂記文有餘韻亦一竒也葉嶺書房記為蔡任作亦佳風雩堂李伯珍築之豫章之囿而水心為記風雩今為聖門一大議論善形容者往往極於髙明水心謂舞雩魯之禊事點不敢必放用井服閭里耳説極平實而文采燁然可讀也溫州修學記以周恭叔鄭景望薛士龍陳君舉四人為永嘉相承之儒宗紹興諸暨二莊一備修海堤一備鹿鳴舉送嘉定七年太守趙彥倓所建記末尤拳拳於鑑湖之未復郭氏種德庵記為磊卿兄弟作也其略曰家非德不興德非種不成雖一人之家未嘗不與天地同其長久所以不能者人毁之也謙者種之盈者毁讓者種之爭者毁廉者種之貪者毁退者種之進者毁種不求獲不敢毁不敢成聖人之德也溫州社稷記以社稷神明之正與世俗淫誣對形文極華贍季子廟記戒晉陵之俗多訟文字好南安三先生祠堂記謂周子二程當著令通禮台州三先生祠堂記提刑羅適侍郎陳公輔詹事陳良翰也宜興修學記謂荆溪禹貢中江愚按禹貢明指岷山江為中江公何忽有此言也寶婺觀即八詠樓也唐為觀太守洪邁請令名連州開楞伽峽記嘉泰二年崖墜壅水李華疏之小石繂運大石鑱落上以火攻下以堰取餘隱石平流中創巨靈鑿貫木百鈞搗之糜碎湖州勝賞樓自柳惲江南曲始序石庵蔡瑞藏書教族人於墓側者陰陽精義序朱伯起師鄭景望與景元友嗜地理學著書二十篇公謂蘇子瞻居陽羡而葬嵩山朱公元晦聽蔡季通預卜藏穴好竒者固通人大儒常患也余特載其師友源流紀年備遺平陽朱黼作也黼字文昭師陳君舉徐致中論書法如匠造屋木之分寸必應繩墨故分為點畫合而為字無妄施者巽巖集序略曰自有文字以來名世數十大抵以筆勢縱放凌厲馳騁為極功風霆怒而江河流六驥調而八音和春輝秋明而海澄嶽靜也公未嘗藻黻琢鏤以媚俗為意曽點之瑟方希化人之酒欲清又非以聲色臭味自怡悅也愚謂水心此言亦寫胸中之所自得者歟巽巖蜀人李燾也著通鑑長編二子壁􅐉皆名世周會卿詩序一幹之蘭芳香出林豈紛然桃李能限斷哉松廬集序杜甫送楊六判官使西蕃詩直下無冒子始末只一意令翁常之作頗似之歸愚翁文集序為鄭伯英作即景望弟景元者也景元及第第四人既任秀州判官終其身二十餘年不復仕諸公貴人知其才大氣剛中心畏之故也孔翠鸞鳯矜其華采顧影自耀為世珍惜是固然也若夫蛟龍之興雲雨則雷電皆至霮䨴百里豈區區然露小技衒細巧而足哉翁靈舒詩集序云起魏晉厯齊梁士之通塞無不以詩而唐尤甚彼區區一生窮其術而不悔者固將以求達也如必待達而後工工而無益於用捨之數則奚賴焉君頭髮大半白旁縣田一頃蛙鳴聒他姓城隅之館水石粗足而不能居也愚觀靈舒四靈之一也水心所以斥罵者如此而世以晚唐詩名者尚遙拜之為宗師可嘆也已周南仲後序譏其求異而無成黃文叔周禮序略曰周禮晚出而劉歆遽行大壞矣蘇綽又壞矣王安石又壞矣孔子未嘗言周官孟子亦以為不可得聞一旦驟至如竒方大藥非黃帝神農所名無制使服食之法而庸夫鄙人妄咀吞之不眩亂顛錯幾希法明寺教藏記為僧師昶作也終之曰夫浮屠以身為旅泊而嚴其宫室不已以言為贅疣而傳於文字愈多固余所不解嘗以問昶昶亦不能言也宗紀序謂佛學入中國其書具在有胡僧教以盡棄舊書不用畔佛之學而自為學倒佛之言而自為言皆自以為已即佛而甚者至以為過於佛也吕子陽老子説序謂每嘆六經孔孟舉世共習其魁俊偉特者乃或去為佛老莊列之説怪神靈霍相與眩亂甚至山棲絶俗木食澗飲以守其言異哉愚按此兩序識到理明尤水心文之絶特者可以成誦故表出之胡尚書序尚書名沂餘姚人富貴有節無侵尋之求嘗喻國體猶半存之身題跋題畫婆須密女載程正叔斥秦少遊詞語褻天事河豚雖毒而人能啖之毒又甚矣石月硯屏中涵樹影戴肖望病詣王大受曰無苦久客心動耳留薦燠館食軟膩把酒談笑肖望欣然忘還題拙齋詩後潘彥庶輕鄙舉子學出經入史於衆人思慮不到處下議論空寫卷子上竟莫遇精識題劉潛夫南嶽詩建大將旗鼓非子孰當何必四靈哉題周簡之文云外學乃致窮之道題義役保正長法不承引帖催二稅今州縣以例相驅士民同苦至預醵錢給費名曰義役然則有司失義甚矣祭父澗底之松山上之苗言崇髙者易慿也祭韓子師尚書佛髣祭王才叔倒壓韻墓志銘徐誼待制提舉浙西言水不可疏謂舊田溝澮當濬圍田下腳無輒開已開未填當捺合行是三説農不病矣似於今不合其責趙丞相為忠則忠為姦則姦非言也然薦蔡必勝終定䇿蔡必勝武舉第一人不見曾覿光宗疾與趙丞相定議用韓托胄白太皇立寧考時趙彥逾戒郭杲飭宿衛陳傳良墓志以水心為之宜有大可觀如昌黎志子厚然而寂寞反尋常者不及可嘆也著作正字二劉公墓志銘著作諱夙字賔之莆人試館職言薦舉之弊此執政大臣為惠而不為政致之也陳執中章子厚人知其小人也然能不以官私其親今將告執政大臣曰子為子厚乎子為執中乎則艴然怒矣至其行事則有為子厚執中所不為者矣上封事論覿大淵尤切知衢州郡人祠之徙溫州禱雨全家淡食八十餘日以疾還莆率鄉人救荒訴莆之剩米斛於朝盡蠲之弟正字諱朔字復之紹興庚辰省試第一調溫州户曹計口受祿以其餘救飢疫飼棄兒召對奏曰陛下何不延納憤激敢言之士而聽訐直難堪之言因以自考察成敗得失知福清縣聽訟使兩詞自詣市食挂錢於門然嘗諌止雍公所主恢復議雖晦翁辨之不從將自有所見歟嘗行秦溪有道殣者久駐棺瘞乃去過劔津見覆舟者號呼解鄭夫人髻金救之二公皆樂朋友死日家無留資著作子彌正正字子起晦起世皆登科彌正至侍郎子克莊今為法從號後村以文顯愚觀水心志陳君舉墓寂寥慊然今二劉官不為顯文無行於世者而所載言行曄然耀人蓋所志諸公貴人皆無此及者故節録特備寶謨劉公頴字公實衢人特立有治行以壽終曽侍郎漸建昌南城人辨其非托胄黨正以其為托胄黨諱之故耳如曰托胄死素抑者多用趙彥逾亦在中公爭之不容可槩見也頴茂頴秀其子云薛待制弼政和進士宣靖間間關共難南渡後守閩楚平賊百七十部然本嶽飛參謀而為秦檜用永嘉人黃尚書度字文叔越人注詩書周禮著史編年考天文理井田兵法病養兵欲屯田陰復府衛吳挺死請合興利合東西川論韓托胄御筆事制置江淮降鹽城賊嘗言紹興至今三罷兵所增之賦皆當斥以還民陳謙永嘉人為京西運判時襄陽師李奕後帥皇甫斌皆密受托胄意擾邊起事公謂復讎大義乃倚羣盜剽奪之豈得以敗亡為戲乎遂以公總領湖廣斌師遂大出初敗支河池再敗方城郭倬至宿李爽至壽皆潰金州秦世輔未及行而潰蓋開禧所謂用兵如此公在襄陽陂北城貯水三百尺既至鄂米悉運赴襄又念安州亦兵衝募守三關言雖不用亦完二城祭酒李祥無錫人趙丞相免公爭曰頃夀皇崩兩宫隔絶留正棄印亡汝愚不畏族誅決策社稷臣也陳同甫王道甫墓志銘同甫婺州以解頭薦著中興五論不報後十年在太學上書至再復不報又十年親至金陵視形勢復上書終不報在廷皆怒以為狂鄉人為燕會同坐者歸暴死疑有毒入大理獄民吕興何草四毆吕天濟且死恨曰陳上舍使殺我復入大理獄少卿鄭汝諧直之未幾策進士第一未至官病一夕卒道甫名自中平陽人登第仕不顯多竒節同甫稱之水心曰鮑叔管仲友也鮑卑而管貴美在叔也王猛薛強友也王顯而薛晦過在強也同甫得以死後餘力引而齊之使道甫亦得而傳是以併志趙彥橚無錫人禱雨請罷催止合衣稅朝士無不造托胄門公歎曰諸人今枉此是易後直之甚難知汀州捕葉八子知平江置嘉定縣鑿錦帆涇為總領籍軍額之亡減錢百萬緡王柟木叔永嘉人知績溪修陂塘知江陰開渠五百餘里壞瘟神像不見蘇師旦止鄧友龍北伐托胄死竄流不絶公謂非朝廷福江陰渠無百里蔡行之凝重竟日或不通一語陳龍川與辨抵日接夜若懸江河同甫謝不能乃已雖幼以文顯無浮巧輕艷之作官至兵部尚書四子籥節䇿範趙師􅋷吳人有吏材十餘年中四知臨安府志中多載其與托胄異然愚聞之長老言最佞托胄者也施師點信州人事孝宗知樞密院六年而退所陳多寬恤之事嘗言治盜當委牧守但責巡尉何以禁暴樞密汪勃徽州人紹興二年登第十三年和親擇不與趙張同好惡者佐佑執政勃遂為監察御史其賢不肖可知也乃云為檜所忌欲蓋而彰矣然檜於一時同惡既借官爵啖之以盡其力位逼則斥去如奴𨽻勃之見忌亦非公曲筆蓋紀實而是非自見者也汪綱汪統皆孫綱始求志於公云劉彌正劉夙子也幼率諸弟勤苦緝故業貧不能得膏火鄰嫗夜績者光射公牖輒擕書就之後皆中第其在朝丞相陳自強惡其不附已開禧敵入寇遂用公提淮鹽蓋以陷之危地自兵起鹽商不行公盡通鹽利就為運判後為浙漕敵使自淮至浙凡送迎之事皆公裁定為成式其為浙漕也不與內臣相見官至吏部侍郎子克莊周淳中瑞安人及第嘗改官為宰為帥機輒乞祠至老死初買廢山鑿平為宅大竹長松回合蔽虧緝嵐紺池煥霍房户常終歲閉户花香鳥鳴暢然怡適不問外事詹體仁浦江人師晦翁篤厚君子也為浮梁尉不受資當入朝定髙宗諡提舉浙西開漕渠浚練湖置斗門總領湖廣放諸州積欠百餘萬築武昌萬金堤除靜江閣稅錢萬四千除雜稅朱膠八千或疑公空有司之藏為百姓地而財常源源暴暴如泉湧山聚自趙丞相去士多失職賴公收擢初嘗後其舅張氏既復為詹經營兩家如一日狀元姚頴官終平江倅年三十四丘文定之父仁不忍校費幾盡産母臧氏既寡力貧教子池州貴池縣葉氏三世二百餘人四十餘室不别盤案而飯百年醫痊王大受饒州人住烏鎮死因葬湖州內袐腹脹痛以半硫圓碾生薑調乳香下之立愈東陽郭氏墓志載其富盛自立徐定字德操泉州晉江人其父少孤隨母歸吕氏因以為姓五十年公不知其徐氏子也父且死以告公憤泣與二弟來行在皆擢進士第復姓徐氏至朝散大夫知潮州有治行云載陳傅良妻張令人甚賢不信方術不崇釋老不畏巫鬼鮑潚清卿病足水心志其循行園林住磐石上數花鬚嗅松葉出指水心狀清卿為猴者也餘姚孫椿年字永叔之宏之父也永嘉林正仲名頥叔為羅源主簿舊俗死喪者焚尸糜其骨衆薰合和凌風飄揚命曰升天以尤細為孝正仲雕文禁止治塜甓藏之始變其俗王聞詩龜齡之子也聞詩之子夔王聞禮亦龜齡之子仕至運使而聞詩至提刑徐道暉志專評詩邵叔豹墓志載岱山事鄭耕老莆人也兵火後更營四明學錢之望晉陵人少以策贊虞雍公捷瓜洲符離之役謁張忠獻既第守楚四年揚三年前後反復為上言大抵以屯田民兵萬弩手山水寨為進戰退守之要大奚山盜起知廣州滅之移廬州皆有政績省元錢易直樂清人十歲工文稍長知古學雲蒸川流筆態橫生劉起晦字建翁正字名朔之子也能繼其父而官亦止正字子希醇希深知處州蔣行簡治郡以愛惜知縣為本數為上言民困具載志中可觀也侍郎陳景思故相康伯之孫信州人奏言欲裕民力當寬州縣偽學禁嚴獨與晦翁往來不廢吳興李浹故參政孫不見蘇師旦與開禧異議有識士也臨海周子及名泊除大學正一見上即盡言天下事有王抃起吏胥預密議宰相御史相與依慿上以泊之言而去之處州陳葵字叔向魏益之教以盡棄所懷獨立於物之初忽大悟遂以師道歸益之反陋朱吕之學水心辨以一造而盡獲莊佛氏之妄也語簡而精然猶委曲其文曰昔孔子稱憤啓悱發舉一而返三而孟子亦言充其四端至於能保四海往往牽借而所指亦近於今世之所謂悟者愚謂待其憤而後啓之待其悱而後發之舉一返三使以類推此孔子欲學者自盡其力而不徒師之恃耳非悟也充其四端至於能保四海此修身以至平天下堯舜三代已試之效具在皆實理也非悟也黃畇字子耕魯直之從孫其先自金華徙分寧子耕師晦翁治台州多政績水心載之甚詳然子耕亦嘗宰華亭縣今製錦堂所創也政績亦不少今闕不載而獨言其知盧陽縣當考劉子怡居鄉救三大荒龐藴夫婦破家從禪至賣漉籬自給男女不婚嫁爭相為死水心載其事於鮑潚妻劉夫人之志况潚夫婦也愚謂此皆全家病風耳周南仲對策言今所謂道學朋黨正皇極所用之人也召試館職言今廟堂無能盡出胥吏蒼頭盧兒干政接踵漿酒粱肉瀾翻其家根本大壞矣南仲從水心苦學之士也子深源乙丑進士胡崇禮名樽餘姚人尚書名沂之子拱之弟衛衍其二子也志云先世故書緹囊珍篋重封之屏凡遺字籠玩往復或移日蓋譏之也又云初朱元晦吕伯恭以道學教閩浙士有陸子靜後出號稱徑要簡捷諸生或立語已感動悟入以故越人為其學尤衆兩併笠夜續燈聚崇禮之家皆澄坐內觀蓋譏之尤深也然亦工矣虞夫人父事北辰求九天女而生詩書若素習教其子莫子純及第第一人愚甲辰客於越施氏聞老石先生之言曰莫魁既第母嘆曰朵花既開只看花無澆者矣石故莫之同經友也觀此則母之賢為益信徐文淵名璣與徐照翁卷趙師秀四人共趣唐詩平陽林善補及弟葬其母陳氏鹽亭山為光孝寺冒爭踰二年乃克葬水心志云嗚呼有是哉夫資不足以買山而葬於官荒之山此譽士之窮王政所必矜也遁耕織之勞而欲擅山海之富此異端之橫王法所必黜也銘曰徂徠躬耕葬百喪使皆如此訟何當虆梩而掩孰在亡夫人之歸天與岡愚按水心此筆氣直語壯愧死當時符移紛紛之有司矣楊願以秦檜用嘗參政葬越鄭景元名伯英景望弟也擢髙第以祠祿終水心謂志士陳表民常警戒其子曰薦送由州縣比鄉舉里選猶近也今縻歲月捐父母棄室家以爭優校可乎得喪命也若謹無然其子遵行之必鄉貢不太學三子增埴止善皆登進士第孟猷良甫孟導達甫皆從水心良甫生繼華達甫生繼勤繼勳繼勇隆祐姪曾孫今居吳唐氏王棐生母史漸進翁八行詔之孫父木再薦漸入學五子登第彌忠彌恕彌愈彌鞏彌忞也嵩之兄弟其孫宣繒其甥長潭王公志夢龍侍郎父也陳少南名鵬飛永嘉人有詩書傳嘗教秦熺以貶死崇國趙公不息行狀載善政最多汝談汝譡其孫張李樗狀載光州可移治處名沙窩亦多載淮事水心能力排老莊正矣乃併譏程伊川則異論也能力主恢復正矣乃反斥張魏公則大言也能力詆本朝兵財靡弊天下而至於弱正矣乃欲割兩淮江南荆湖棄諸人以免養兵獨以兩浙為守又欲抑三等户代兵兹又靡弊削弱之尤者也水心之見稱於世者獨其銘志序跋筆力橫肆爾近世自號得水心文法者乃以陰寓譏罵為能愚觀水心文雖間譏罵實皆顯白如曰旁縣田一頃蛙鳴聒他姓此顯斥翁靈舒廢家業而工晚唐詩直以為世戒非陰寓也如曰蛛絲委架詩書愠鷺羽空陂菡萏愁此明言陳益謙不讀書而冒儒衣冠不得已為作詩非陰寓也如曰丁村未嘗有此其村民不學而崛起未可知惟數花鬚嗅松葉世傳狀鮑清卿為猴精此為譏諷然他日志其妻劉氏直舉龎藴夫婦棄家學佛至賣漉籬此其偏好自有取輕者終篇述其治行甚褒瑕瑜不相掩也借曰水心時一以文為戲可盡以例其餘耶學之者不于其橫肆而獨于其戲者耶嗚呼水心之傳世者僅此而學之者又辱之且關學者心術故為之辨水心外集序發大意謂制科許極言天下事而治道本不如是之易言後進之士耳剽目習運竒於異説之餘求夸於陳言之外足以敗天下之定勢而何以為守宜特發其大意而無至於盡言君德二篇謂人君以道服天下非以名位臨天下而世之言君道者或以令或以權或以法其君之德固削矣而以智巧從事是未得服天下之道徒恃名位以臨之其有大度不疑以深結其民臣之心者亦不過留名位之術惟古之聖人真見其當然而事事以實行之此則人君實德而服天下之道也愚按前之一説正不得攻而三者亦有天下者所不得而廢後之言真見者其君果何從而能見其真所謂真者果何指夫亦開闔馳騁以極文字之變態是豈果君德之的論耶治勢三篇謂人主當以身為天下之勢而後世之勢在外戚在權臣在宦官或匹夫士卒其勢無所不在若西晉傾覆特起於公卿子弟里巷書生遊談聚話沉湎淫佚而已我祖宗之為天下其要在使無女寵無宦官無外戚無權臣無姦臣隨其萌蘖尋即除治所以致靖康之變者五患有其四焉耳非前日所憂之西北二冦蓋天下之勢在內而不在外也今天下之勢因治久忘戰而女真自恣天子方御征伐又十餘年天下始習兵革散戰而天子已厭武紹興之末青鄆亳宋之間豪傑響應或號三十萬而天下終以不振習安難變乃其勢然今天下之士惟嗜利桀行者乃或叩閽言邊而明見利害之人則皆深念根本然則天下之勢固不可使之盡變也愚按此論平實而意若陰不滿於陳同甫諸人國本三篇國本者祖宗所以立國之意也我朝大意有二曰隆禮以御其臣恤刑以愛其民也真宗仁宗以來大臣將去為之遷官加賜神宗嘗欲汰其臣而不忍始益宫觀廩粟章子厚嘗欲興劉摯之獄而哲宗不從蔡京又欲殺天下士而徽宗不聽紹興初誤聽宰相誅諌官二人尋下詔謝天下故姦臣不得借殺士以為資今世之用刑比漢唐為輕今世之民自得罪者無幾而坐茶鹽𣙜酤田役稅賦者十六七比三代則為重然三代肉刑殘壞至於終身亦已甚矣後世制刑雖三代不能及此二事天下安之久矣不顧而變安危必自此始愚按此深識我朝立國之意者也我朝立國以仁盡去秦漢後不道之事而此二事為著民事三篇謂今授田之制亡而猶嵗以具文勤農何也有民必使之闢地今吳越民多而地不足相搏取為衣食荆楚古繁實孫劉所資以爭天下更唐五代不復振今荒墟無聚落分吳越以實荆楚當今急務也儒者欲復井田既時異不可行而俗吏抑兼并之説則人主既未能自養小民富人者小民所賴不可豫置疾惡破壞之也隨時立制使無甚富甚貧其庶乎愚按此諳練之説也特未知所以立制者何如而可無甚富甚貧耳或者董仲舒限田之説乎財計三篇謂理財與聚斂異今言理財者聚斂而已故君子避理財之名而小人執理財之權自古聖賢無不理財必也如父共子之財而權天下之有餘不足可也奈何君子不理而諉之小人哉自楮幣行而錢隱物穹設法以消天下之利莫甚於此官兵吏之冗食者多而不知退考其原如富人用侈而賣田疇鬻寶器以充之不竭盡不止愚按此天下之名言而冗費則不止官兵吏三者而已也所謂泉府必周公法恐又信周禮太過官法三篇謂漢宣帝號責實而徒課細碎為失實今治不過若漢宣帝且舉以羣臣百僚為不足用而上自用也謂冗官始魏晉自文武分而昔之侍衛用文者今武士宦官專之自官吏分而昔之所辟曹掾今吏胥專之此選舉甚狹而官猥多也謂患其冗者抑之以法此當甄别使賢者能者堪之奈何操利天下之權而反以抑也愚按三説皆考訂之言但力辨古人非事簡而力言古人之事為多亦似信周禮太過竊意古人不過教民自為生養若盡如周禮期會恐奔走無虛日民不聊生爾士學二篇謂孔孟守三代之説於春秋戰國之世迂濶之名自此始今必得真迂濶者而用之其庶乎古者養士而後取今不養而取之當因今之學以取士而務養其心愚按此乾淳間議論也然不知養其心者當何如耶若近年以來士習實壞於學縣有學則無恥者分其糧公厨終歲無炊煙郡有學則強俠者多取市井子之資聚食其中以庇門户七箸聲歇輒雲散無蹤國有學則爭圖分數乞免解免省者千岐萬轍上亦屈法從之甚至受金叩閽助權勢去異已者士習之壞反皆學校之為鬭之於勝負之場而誘之於利祿之區曰可以養其心有是理否乎果欲養其心必也因今之學而用古之道州縣學盡除職俸太學盡除校分無勝負之爭無利祿之誘而後士得自有其冗而自養之水心雖乾淳之論而其時學法已行不明言其非疑有遺論且天下何嘗無賢士之自養者何世無有學校科舉之較程文如博奕偶勝於士之賢否何預要在謹簡於入仕之後幸而得賢者能者則必用之不幸而得愚不肖者雖自學校科舉中來必終斥之用舍不于學校不于科舉而于其人庶幾士習稍知趨向若夫轉移變化又自在本原之地若曰因今之學以取士而欲養其心愚未之能信兵權二篇謂兵必用詐自孫武始武事闔閭嘗入楚暴師不返嘗言越不足畏卒敗欈李武之術無救人國家今其氣焰興起若將與聖賢並稱而右科武學又使之讀誦其書是徒以不仁之心相授况今淮以北皆吾之民方當流涕以對之尚安用武之術數十年來天下士好竒言而言兵者尤竒皆中一時之欲而不顧天下之利害必也實言乎不多殺邦本不搖無暴征橫斂而將得人則兵可用愚謂言兵若此斯儒者矣視老泉輩平生師孫子之學霄壤矣外論四篇謂中國之待夷狄有義有名有權契丹更六聖百二十年無敗盟而約女真共滅其國在前日為失義女真吾仇也今日請和尤為無名視其所以來而權之必有先勝之形變困重難舉而使輕利易為此在朝廷大政紀綱憲度之際而乃略淮以守江守江以安閩浙此其去中原也逺矣其言慷慨激發讀之使人痛憤愚謂果守江果安閩浙機至事成中原亦非逺正恐江自為守而人未嘗守江閩浙百需所仰又未必其能安而人自安於閩浙耳總義一篇論聖經之題辭也謂古之治足以為經聖人載之以詔後世至于今而經始明世之君子可即其故而深思矣易謂易非道所以用道聖人以道易天下後世聽其自易而世始亂文王孔子於是作易易之書備而易之道始窮曲學小數出入鬼神而無以為用於天下莫若反其本而求之象爻愚按此論未之前聞也以愚所聞則正以理無定形亦無終窮故以變易之謂道而謂易非道何耶變易者正道之用而反謂所以用道何耶事萬變而不齊而理無不在故此道謂之易初非先天而開物逆料治亂之變而立之防亦非世有已亂事有已失出而移風易俗之類以救其弊而謂聖人以道易天下何耶易者道之形於事事物物順之則吉逆之則悔吝凶吉者治之事悔吝凶者亂之事後世不知易也故亂日多耳乃謂聽其自易而世始亂何耶文王孔子之作易正欲使人人知道如是則吉如是則悔吝凶傳之萬世而道之用無窮也顧謂易之書備而道始窮何耶易備天人之道微之而為陰陽變化顯之而為日用常行理本無所不包故曰易有聖人之道四焉以卜筮者尚其占而象爻者正以占其變也謂出入鬼神為無用必反而求之象爻又何耶此固愚未之前聞必水心自有所見者雖然未諭也書謂書為帝王之常心周穆王秦穆公既悔過而復得其常心此亦一説然周穆王秦穆公恐於堯舜不若是班而常心亦非所以論聖人也常心者不以飢寒而變之名也詩謂言周人之最詳者莫如詩聖人養天下以中發人心以和蓋詩之道至周而後備雖其怨刺猶深原憤發而不忍愚按此亦言詩者之常談特水心長於文其形容有過人者春秋謂治人之道人能自正於心者雖聖人不能加也行之事矣折而從仁義禮樂者則治之也佚是其次也聞人之是己非己為喜懼因其喜懼而治之是又其次不以是非為喜懼而必待賞罰聖人之治人至是止矣春秋之作又所以治夫仁義禮樂是非賞罰之所不能治者也然其用之之法有三原其情察其勢使人心厭然我服然後斷之理舜能事瞽瞍而天下不能為子箕子能事紂而天下不能為臣湯事葛文王事昆夷而天下不能為國是何耶是未之思是之謂理故春秋者道之極而聖人之終事也愚按世謂春秋為賞罰之書而賞罰必斷之理此不過兩言己足然人人能言之今其模寫次第多為曲折則水心之文法然爾周禮謂周禮之書一用而反至於亂者古者天子自治止一國又有聖賢為之臣久於官而不去其為地狹為民寡治之者衆行之以誠故米鹽靡密無不盡今也包夷貊之外以為域事雖毫髮一自上出法嚴令具不得搖手無聖賢為之臣不久於其官而又有茍簡詐偽之心乃欲靡密無不盡以求合周禮此人情不安而至於亂也愚按周之建官偹於尚書周官一篇各率其屬聽之六卿而為君之要在六卿得人而止其詳則自孟子時巳不得聞矣必如今周禮所載六鄉六遂之地能幾何而可養官司胥徒二三萬東西胥會朝夕讀法民且奔走不暇而何所措手足此書出於王莽用於王安石皆亂天下恐不可以其名列於經而盡信其書必古書也亦不過周官一篇注疏耳大訓何在而名經耶雖然歸之世變不同而謂周禮不可行於後世此則善為周禮解嘲蓋未有過水心者也管子謂王政之壞始於管仲而成於鞅斯若桑𢎞羊之於漢又管仲商鞅所不忍為至唐之衰取民無所不盡又有𢎞羊所不屑為壞之也非一人之力則復之也必非一人之功聖人不千歲而一起聖人不繼世而皆遇故夫陋俗之與論王政終不合矣其言哀痛切至嗚呼悲夫老子謂老聃厭聖人之仁義禮樂而欲一切返太朴之初不知聖人之為此仁義禮樂者正以消伏天下之機巧詐偽也今欲盡廢是與天下以機相示微相使也聃自變於俗而謂聖人變之乎愚謂聖人不過行其所當然老子乃欲去其所當然者耳此則昌黎原道之説盡之無為則天下決不能自治勢必出於慘刻以勝其不治者此則太史公老子之傳盡之若謂聃自變於俗則聃且有辭孔子家語謂家語左傳禮記皆近聖人之世而所載皆不能知其言後世若荀卿司馬遷揚雄亦皆不足以知聖賢之言今世之知言者談性命而聖賢之實猶未著愚謂此借家語以排世之談性命者謂均之不知聖言爾然豈其倫耶且不明斥性命之説為不知聖言者果何在豈亦如論治特發其大意而不盡言必待佐天子得行其道然後自以己之説而易天下耶雖然濂洛性命之説大明於天下有日矣水心思以易之也難哉莊子謂莊周知聖人最深而玩聖人最甚不得志於當世而放意狂言其怨憤之切異於屈原者鮮矣然而人道之倫顛錯而不敘事物之情遺落而不理以養生送死飢食渴飲之大節而付之儻蕩不羈之人小足以亡身大足以亡天下流患蓋未巳也愚謂此論理義之精到文辭之警切前無古人後無作者自古明天下之正道無出於晦翁大學中庸章句序斥天下之非道無出於韓文公原道今有此論又足為原道之配但謂其知聖人及以屈原為比未然爾揚雄太玄謂玄以準易而不得聖人之意者三易以明天下而雄名玄一也卦以八數而玄之八十一首雜取文字之餘二也易更三聖玄以一人之思備羣聖人之力三也左氏春秋謂左氏去孔子既逺而能録古者典刑十數以扶翼春秋戰國策謂成周論士用於天子周襄取士之法壞士猶各自貴於其國侯國取士之法亦廢士去為家臣獨公哲衮季項未嘗仕於大夫未幾兼并禍興故家亡失士始恣睢四出奮口舌以要其君固流靡使然也始皇李斯遷怒而擒滅之豈為天下之道哉史記謂孔子時上世圖籍具在多放棄而不録史遷不能知其意紛然記之以夸竒使後世溺於見聞蕩於未流又戕民害政之術盡出其中而戰國秦楚事皆天下人資取為不肖者於是異端之學復肆與聖人之道相亂矣三國志謂春秋三國之世號為多才非世道之幸也尚忍言之愚謂人才用而後見世方多事而後人才出其勢則然漢唐之興何嘗無人才有英雄之君以主之天下賴以定于一不見其紛紛之迹耳以罪人才可耶五代史謂唐非天亡而自亡盜賊不肖皆足得國人主所當惕然自懼愚謂五代朝榮暮瘁亦自取滅亡耳然掃除亂略以開聖世太平之基亦周世宗總述謂唐虞三代上之治為皇極下之教為大學行之天下為中庸漢以來無能明之者今世之學始於心而三者始明然唐虞三代由外無不合故心不勞而道自存今之為道者務出內以治外常患不合故具列其義天下得詳焉其論甚異意其真有可得而詳者及詳皇極大學中庸三論則與今世所讀洪範大學中庸三書本旨不見其有一語類者玩索再三如適異國見蠻夷君臣問答議論曲折次第非無可聞之聲終無可曉之説嗚呼噫嘻何為而至是耶夫水心一水心也其論兵財民俗明白貫徹筆端有口一何竒也其論皇極大學中庸但見其班班有字而玩索莫曉一何甚也豈世自有能詳之者耶抑姑俟千百歲後又出一水心而後能詳水心之説耶不然水心所論皇極大學中庸恐别自有其書非世所通讀之三書也耶傅説謂髙宗注想傾信為以其心而通物愚謂傅説事本無可論而論三代事本不必若是其文深山之舜莘野之伊傅岩之説皆當世偉人特未加之位耳傅説固非泛然胥靡也一念之切精誠交通夢亦其理之常而非異也水心之為此者特望人君之深信其臣歟崔實謂實勸其君以嚴刑為無術此長者之言也諸葛亮謂亮借興漢之名以見於世今世有昭然不可掩之名義而非必借於外愚謂借亮以警當世可也謂亮為外借不可也蘇綽謂商鞅以後皆謂古治為不可復行綽佐宇文泰方高氏扼關而攻西人凜不自保乃猶用古人治國之常道卒并齊滅梁益無敵於天下愚謂唐太宗之治多宇文之遺而水心之論即魏徵所以斥封德彛者也王通謂聖人未嘗絶後世而王通續經獨得孔子之意以道觀世則世無適而非道愚恐漢晉元魏未必真得唐虞三代之道王通續經亦未必真得孔子之意水心若曠然大觀混精粗誠偽而不問固無不可者若以道觀世則道固未嘗無劑量其間也廷對主説謂以庸君行善政天下未亂以聖君行弊政天下不可治矣答前代道仁禮樂皆雅淡不事華藻答當時事多明勿謂宰相失職專限資格助吏部行有司之事謂諌官不諫諍反侵御史之事兩制侍從不講大政而弊精神於微文責儒臣太備而獨當前世養兵之患不能寬橫斂而裕民力及復讎在堅決信任其人大抵純淨非近世排仗語為多者比也始議其一謂國朝不務平西北小人因間復燕而國之守以離其論偉矣愚意竊謂尚有當講求者耳唐虞三代所自有惟千里若侯服以至要荒則聽其人之自守不過懷以德接以禮故事少而國易治秦漢盡併天下制於一人甚至反為夷狄於夷狄殺無辜之民以貪非其有之地鞭長不及馬腹而國無寧日矣我太祖內收藩鎮兵使無諸侯強大如封建末流之弊外因邊酋各為守無直鄰強敵如秦漢守塞轉粟戍兵之擾處混一之勢而能周盡天下之慮孰有加於我太祖者哉大計未集而後之謀國者輕挑強敵豈惟非太祖之心亦異於古人所以御天下之道矣必欲勤逺略定西北為盡天下之慮談何容易耶其謂建炎嗣統獨失河東二年始失河南北紹興元年始失京東西三年又失五路粘罕死嘗舉數千里地以還我兀术背盟分畫才淮以南顔亮屠殞歸義之民處處屯聚京東西秦鳯熙河州縣相次而服宰輔繼舊盟反割四要郡畀之其言備盡南渡曲折愚嘗謂中原不失於南渡之前因南渡而後中原失意正謂此然念靖康而後中原尚有可復之機者三宗忠簡肅清宫禁結山東河北義勇以請聖駕還京此一機也中原可不煩兵而復嶽鄂王收復兩京所向無前此一機也中原可乘勝而復逆亮速禍京東西等處響應思歸此一機也中原可乘機而復逮我孝宗已非南渡初憤痛方新機會鼎來之比況湯思退史浩諸人遇中原思歸者則還之金使甘心焉儒生尚何以空談為哉雖然中原遺黎已厯祖孫三數世惓惓吾宋者猶新其二謂國朝皆人主自為之遂廢人而用法廢官而用吏故人才衰乏外削中弱以天下之大而畏人又自熙豐以來世變紛更紹興以來小人挾制隆興以來取民已困猶以為仁俗衰時迫誰與謀長此所以不能盡天下之慮取燕三篇中原在望百年未復而首謀取燕已幾於不切事情矣又以髙祖滅項為比豈類也哉高祖能滅項羽而不能不困於白登故夫事定之後不可以比方爭之初而與夷狄爭區區不可以比撫定中夏之事今必曰得燕薊關隘而後吾國可以立秦築長城矣果帝萬世乎然則讀水心取燕三篇不若誦吳起在德不在險一語息虛論二篇其一論親征斥萊公為無識之甚嘻甚矣其二論待時謂越二十年之內日夜所為皆報吳然後可言待則正論也實謀一篇謂四總領為户部之害經總制折帛錢為諸州之害版帳月樁為諸縣之害此財以多為纍也四屯駐大軍耗總領之財廂禁土兵耗州縣之財是兵以多為纍也法度以密為纍而治道不舉紀綱以專為患而國威不立皆熟於治體之言也財總論二篇謂邊一有警賦斂輒增既增後不可復減祖宗盛時所入比漢唐一再倍熙寧元豐以後隨處之封樁役錢之寬剩青苗之結息比治平以前數倍蔡京變鈔法以後比熙寧又再倍渡江以至於今視宣和又再倍此精於財用本末之言也經總制錢李憲經始熙河始有所謂經制財用童貫繼之亦曰經制蓋措畫以足一方之用方臘殘破東南陳亨伯以大漕兼經制使減役錢除頭子賣糟酵以相補靖康召募翁彥國以知江寧兼總制強括民財數百萬維揚駐蹕吕熙浩葉夢得總財事議用陳亨伯所收經制錢者酒稅頭子所取猶止一二百萬其後户部轉運使動添窠名黃子遊柳約之徒或以造船或以供軍遞添酒稅隨刻頭子孟庾以執政為總制耆户長壯丁雇始行起發二制並出色額數十酒有栁運副王祠部都督府二分本柄虧折官本茶有稱頭篰息油單靨面商稅有增添七分免役有一分寬剩得産有勘合典賣有牙契僧道有免丁截撥有縻費所收之多至千七百萬截取以畀總領所之外户部經用十八出於經制於是州縣之誅求者江湖為月樁兩浙福建為版帳向之士大夫猶有知其不善今新進者矜奮視兩稅為何物而況逺及貢賦之法乎蓋王安石之法桑𢎞羊劉晏所不道蔡京之法又王安石所不道而經總制之為錢也雖吳居厚蔡京亦羞為之故經總制錢不除則縣以版帳月樁無失乎郡之經常為無罪郡以經總制錢無失乎户部之經費為有能而人才日衰昔之號為壯縣富州者今所在皆不可舉手齊民中産僅足者今轉徙為盜賊凍餓而生民日困左右望而羅其細碎而國用日乏愚按水心之言懇切哀痛經總制錢誠所當除也而錢之未易除者兵之未省也水心此言為兵張本也和買折帛二篇謂和買惟軍衣未可裁損其他宫禁官吏時節支賜一切不行可也謂既有夏稅折帛又有和買折帛且本以有所不足於夏稅而和買以足之今二者均折於義何取必鈎考其凡目而後可有所是正也茶鹽謂茶鹽𣙜之太甚利之太深刑之太重兵總論二謂邊兵當因其地練其民不待內地之兵食宿衛兵當因都邑近民教成畨上與募士雜用廩其半而不全養大將屯兵悉募教精鋭全養之州郡守兵以州郡之人守之不以州郡之力養之今四者皆募而竭國力以供其衣食力則已困用則不可太祖收藩鎮權汰兵使極少治兵使極嚴正非恃兵以為固數不滿二十萬自恃兵為國之説熾慶厯至有百萬兵盡用衰世刻剝之術取於民以啖之及不可用則又俯首事仇使之自安營伍中王安石知兵之不勝食而猶悟籍兵之不必多教保甲至四五十萬陰欲代正兵正兵不可代而天下之勢愈弱紹聖以後保甲復治正兵自若大觀政和中保甲至六七十萬平民相挺化為盜賊斡離不挾兵才萬餘莫有敵者倉卒召勤王而冦掠遍天下矣四屯駐大兵謂秦檜約諸軍支遣之數分天下之財命朝臣總領之疲盡南方之財力以養此四大兵惴惴常不足昔祖宗竭天下財以養天下兵固前世所無而今日竭南方以養四屯又祖宗所無地則北為重財則南為多運吾多財取地於北則可奈何盡耗於三十萬之瘁卒襲五六十年之積弊以為庸將腐閹賣鬻富貴之地乎廂禁軍弓手土兵謂廂軍供雜役禁軍教戰守弓手為縣之巡徼土兵為鄉之控扼今州郡二稅及酒稅窠名盡以上供者朝廷既以養大兵而州郡以其自當用度者盡以養廂禁土兵故不減宿衛屯駐兵國力不寬不減廂禁弓手土兵州郡力不寬法度總論謂唐虞三代國自行其政家自專其業秦漢晉隋唐一郡行其一郡一縣行其一縣本朝懲創五季細者愈細密者愈密搖手舉足輒有法禁故君子不可用而用小人官不可任而任吏人情事理不可信而信法用人以資格為利而資格為用人之害銓選以考任為利而考任為銓選之害薦舉以關升改官為利而關升改官為薦舉之害至於任子則有數害員郎即得蔭補為一害太中大夫待制以上蔭京官為一害一人入仕世爵無窮為一害科舉亦有數害取以藝既薄於古今併藝失之為一害古者化天下為士使知義今化以入官為一害解額一定為一害一預鄉貢老不成名錫以官為一害以利誘天下為學校之害責以記誦為制科之害進人於應用之文為宏詞之害保正長通天下患之而役法為害定為新書以一條貫而新書為害禁切監司反甚州縣而監司之法為害府史胥徒植根固本而胥吏為害行經界則經界為害行保甲則保甲為害行方田則方田為害行青苗市易則青苗市易為害舉事立法無非所以求利而事立法行則無非為害賢者以為是必不可去之害愚者則恃其有是害小人則或求甚於所害願揭其條目而治之去害而就利使天下曠然一日得行於昭昭之塗資格資格者生於世之不治賢否混并而無所别故以此限之非善法明矣而李沆十數人以守資格得名而其時亦以致治蓋能先别其流品其人有自小官其望已足以為卿相特欲其揚厯以實之而已若此者可謂得資格之利今也無有流品資深者敘進格到者次遷侍從不薦士執政不舉賢執資格以進曰此足以任此矣此所謂受資格之害也銓選吏部者朝廷喉舌之處尚書侍郎者天子貴近之臣與之以天下士大夫甄别黜陟之柄乃曰一切有法蓋大臣不知職任止以堂除為大權無怪銓選奉行文書若堂除盡歸銓部然後大臣知職任而銓選亦能少助朝廷用人尚書侍郎不虛設矣薦舉謂使天下之大吏得舉天下之卑官冝若為善法矣今乃為大害盍多其考纍其任使其積日計月無過者循至京官則士之稍自重者知有常途不汲汲焉卑身卑體以求舉而舉人者亦不困於求者之多真能舉賢以報上愚謂此今世第一當務之急也夫人主所與共治天下者人才耳今顧困於三薦關升五薦改官之弊例中朝士大夫弊於為人求監司太守弊於無以應中朝之求下之小官弊於宛轉中朝以代已之求甚至交易成市以求充所謂三者五者弊例之數而人才淪胥以敗矣所與共治天下者將誰屬邪水心積日計月循至京官之説雖猶不免於賢愚同滯然猶愈於今之賢者以不求而困不肖者反以肆求而達也嗚呼悲夫奈何亦未之能行耶任子謂員郎非甚重之官常調至此者可勿復與若從官宰執子弟則以今所與員郎者與之可也愚謂水心之議是矣然行之一家必自出於賢士大夫之意行之天下必自出於人主之意必建議者行之則韓范嘗朝奏而夕斥矣烏乎行科舉謂一預鄉貢錫之官蓋藝祖閔天下士有更五代困場屋者因為之賜愚按邵氏聞見録載富鄭公以私故交段希元等耳今謂藝祖當考學校謂大學以利誘天下獻頌拜表希望恩澤一有不及謗議喧然謂州縣學徒以聚食而俊秀者不願今冝稍重大學擇大儒相與講習而州縣學冝考察以上聞愚謂士風之壞極矣王者必世而後仁非一旦法度之所能為也因今之俗而欲變今之法欲講習之彼且潰而四出欲考察之是太學之利誘又遍誘天下州縣學矣制科謂制舉之法反密於科舉徒立法以困天下泛然能記誦者豪傑不屑也故哲宗以為今進士䇿有過此者而制科再廢其幸而取者往往不逮科舉之俊且其為急官爵計耳宏詞謂朝廷詔告典册之文當使簡直宏大敷暢義理以風曉天下典謨訓誥諸書是也四六對偶銘檄贊頌循沿漢末以及宋齊此真兩漢刀筆吏能之而不作者而今世謂之竒文絶技以此取天下士而用之於朝廷何哉且又有甚悖戾者熙寧既禁士之求仕者為詞賦而反以美官誘巳仕者使為宏詞既以為宏詞則其人已自絶於道德性命且昔因罷詞賦而置詞科今詞賦經義並行則宏詞直當罷之而已役法昔者保伍其民有保正副户長則催科耆長則追胥皆有雇直其後以起發上供而耆户長之役盡歸保正副新書謂本朝以之為經而勑令格式隨時修立自嘉祐熙寧元豐元祐紹聖大觀政和紹興皆自為書乾道淳熙已再成書不任人而任法姑任人以行法可矣吏胥謂今世號公人世界官無封建而吏有封建天下事立成書而付之吏得知而官不得知胡不使新進士及任子之應仕者更迭為之受財鬻獄必大減且因以習士大夫使有材一利也無根固窟穴二利也稍去冗官爭奪伺候之風漸息三利也愚謂水心此義固善更合考漢世辟掾事其長之禮何若必拜立左右恐今世習驕成俗為新進士任子者不屑爾監司謂操制監司非時不得巡厯或巡厯不得過三日吏卒批劵所受禮饋皆有禁一失也運司剗刷州郡財賦提舉司督責茶鹽提刑司催趣經總制錢印給僧道免丁由子下法不義反甚州郡二失也紀綱一謂紀綱法度一事也法度其細紀綱其大本朝細大俱失愚聞先儒謂本朝大綱亡萬目亦不甚舉蓋指三綱關天理人心者也水心有取於秦漢之強而不滿於本朝之弱蓋他有所謂紀綱矣豈有激之言乎紀綱二謂唐失其道捐內地為藩鎮內外皆堅而人主不能自安本朝反其弊內外皆柔有大不可安者紀綱三謂富弼韓琦不能以歲月成天下事王安石欲反之而不知其紀綱內外之間紀綱四謂李綱議分京東河北用唐藩鎮法措置已陋括馬斂財搔動天下張浚趙鼎泛然於事機之會終論一二請分兩淮江南荆湖為四鎮以今駐劄兵各委之財賦皆得自用朝廷無復與則經總制鎮可罷而朝廷寬愚謂水心欲寬朝廷者欲寬民也然四鎮何以養兵將不各竭其民乎且不特此也本朝以仁立國柔弱之弊大略似周而夷狄之禍亦略似周周東遷不復振我南渡能復振者封建之勢分諸人州縣之權握於我耳既南渡矣可更盡舉州縣棄之四鎮乎且水心獨不聞唐之藩鎮乎太祖正懲其弊而盡收諸道兵財之權今若復棄之四鎮四鎮將各竭民力以自固我亦將何所取以制四鎮若四鎮之説行天下事去久矣豈特不能寬朝廷而已哉水心既欲分四鎮以寬朝廷又欲籍三等以上户為兵罷廂禁軍弓手以寬州縣州縣縱寬民不愈擾乎且兩淮江南荆湖儻屬四鎮朝廷所自有不過兩浙兩浙將何以制四鎮州縣又烏乎寬終論三四謂阿骨打初豪其部中不堪契丹主延禧之煩擾囚執而叛延禧政亂不交鋒而得國阿骨打死吳乞買不能主令而斡離不黏罕分之其後兀术來江南空千里無當之者未嘗與之戰敗則黏罕兀木何能獨過古之夷狄而遂取中原哉且彼所欲得河北河東且山東河南之地先以與張邦昌後以與劉豫後又以歸我我不能守彼方據之彼其生長極北一朝起於不顧死命之中楊朴者因教以稱帝郭藥師又導以犯闕黏罕兀木本無其志也自紹興十一年之後不惟我之所欲在和其女真亦以和為利其事在一大戰而勝之耳愚觀水心議論邊情甚悉然欲一大戰必有勾踐苦心實政乃可非可以議論為也終論五謂趙鼎泛然於事機之間張浚任疏尤為無統紀又無倚仗而秦檜之論入且謂中原響應張浚而來皆為不義之人志念不靖何哉立論之太無忌憚終論六謂不當進而置兵者四襄陽出宛洛興元出秦鳯必入勢也合淝出亳宋沿海取齊不必進者也當守置兵者二建康鄂州也不二十萬足以滿之終論七雖以取秦荆襄取韓魏淮取梁汴沿海雖不當齊可取齊不知水心此言果能如韓信於髙祖孔明昭烈言之必能行耶亦姑言之者耶然韓信孔明次第而舉未嘗分兵四出且荆襄於韓魏沿海於齊皆非所取恐亦自敗之道果善用兵自淮鼓行四逹矣上殿劄子論乘機待時四難五不可已見正集淳熙十四年孝宗之二十六年也應詔條奏六事光宗初即位時所上也六事謂國勢也士也民也兵也財也紀綱法度也六事未善以微弱分裂讎恥弊壞之時而處以中國全盛夷狄賔服之勢不能先明所以治其國之意也大槩欲寬賦省兵振弱為強此水心平生憂國愛君之志其謂國家有休兵之實過於文景而天下被用兵之害甚於武帝此言頗切事情亦已見正集後總水心别集水心論治之書也别集後總又其救世之䇿也極論本朝兵以多而弱財以多而乏任法而不任人一事以上盡出專制而天下之勢至攣縮而不可為為之激烈憤痛開闔數萬言蓋能言之士莫之能尚也然論治猶醫然論已壞之證易而求必效之方難水心始論厯詆本朝先正大臣無一知治體而要其究極乃謂不能如秦之強始論必欲取幽燕守關塞然後可以立國而要其究極乃欲於東南一隅更裂兩淮江南荆湖而授之人始論欲盡省養兵之費以寬民而要其究極乃欲買官田召民租佃如私家以贍兵食夫其欲取幽燕者欲強其國如秦也欲省養兵以寬民者欲厚其力取幽燕也欲買官田者欲省以民養兵之擾也千條萬緒宛轉鋪張而卒歸宿於買官田買官田果必效之方否耶世降俗漓法密文弊民之不可一日與官接猶羊之不可與虎羣也且豈獨官於民為然衣食稍裕之家以其田使鄰之人佃之所經由不過一二顔情稔熟之奴𨽻而鄰之人已不勝其田主之苛取奴𨽻之姦欺矣又稍稍積而至於富貴之家以其田使鄉之人佃之其苛取其姦欺甚至虐不可支有舉室而逃或捐性命以相嚮者矣顧欲官買田而民佃之耶今觀水心先以水心溫州一郡為準欲繞城三十里內買其田一半計穀九萬八千一百二十五扛以養兵二千七百二十二人官吏卒掌之者七十六人鄉官及保甲頭催之者七十人作米者百二十人出納期會下至箕苕菷之費無不會計曲盡水心自謂可以永免擾民矣然必為監官為鄉官為吏卒甲頭者人人水心也世世水心其人也則量租可無斛面納租可無費錢催租可無椎剝其或我水心而人不水心也此一時之人水心而後之人不水心也則今世官取斛面往往倍正斛是溫州盡三十里所出不足以供租入之半也其奈何今世納官租之費石不下三數貫是既盡三十里所出又須别營錢以資納也其奈何今世吏卒催租雞犬為盡徒虧官額以飽私囊是三十里倍錢納租之外又將不勝其橫擾且虧官也其奈何且其立法之細亦多難久者如監官廳子月支錢二貫二貫果足以贍其養者乎催租甲頭歲支穀一扛一扛果足以償其勞者乎腳子三十名無請給無請給而有家食官作者乎大抵人情之於剝民如蚊蚊吮血茍有其隙不約胥會所謂監官一員必且增監門必且增斛面必且以機察提督江湖乞丐之靡必且干勢要挾闊書求為司門求為敖口求為催租官况於吏卒何可預防數之一者必且增而十數之十者必且增而百况其私取何可預限官租之贏既倍而吏卒之擾又煩正恐佃户逃而追業主業主逃而追親丁不特繞城三十里地荒民散四境亦蕭然矣水心乃曰所行止傅城而數百千里不預聞焉豈但思其利而不暇思其害者乎且水心遍舉本朝法度凡其為利無一非害祖宗之思慮亦深於水心矣久且不能無害豈水心之官田獨能保其無害者乎嗚呼必水心之言用也天下之擾久矣景定三年甲子春後學黃震謹書黃氏日抄卷六十八
