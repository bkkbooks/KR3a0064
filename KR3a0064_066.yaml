body:
  text: 黃氏日抄卷六十六宋黃震撰讀文集八汪浮溪文詩石舟歎以宣和五年常州苦旱乃竭支港之水通載石之舟而作也桃源行似亦因當時求仙而作清溪行作紀方臘之變竹枯菌見十月食笋詩注班春古岩寺班春謂勸農也二卷有客來相問詩謂五代時賀水部所作三卷賦翁養源瑞松詩云絶勝分封五大夫愚按五大夫者秦爵名非五人也用分封字未安紙絞紙撚也見五卷外制錢汝士換武制謂雖唐近世二選亦迭為之十卷李綱落職制用歡兜少正卯為比得無已甚乎大抵誣賢之言多援此洪皓鐫二官以出使未還而辭難合考顔岐贈三代制初謂孔氏少衰而顔興既非所宜言矣繼用陳太丘事而謂顔庶幾焉得無少貶顔氏耶建炎紹興艱難之詔見十四卷令人痛心猶賴代王言者有若而人也韓世忠以妻梁氏私求恩澤而自劾降詔奬論奏議繳孟忠厚文資援漢章帝欲封外家而馬后不從奏論諸將無功謂獨張俊明州僅能少抗不增兵益戍反旋軍空城以挑之未幾果殘明州無噍類是殺明州一城生靈而陛下再有館頭之行者張俊實使之也杜充守建康韓世忠守京口劉光世守九江而以王􅊅𨽻杜充其措置非不善也而世忠八九月間已掃鎮江所儲之資盡裝海舶焚其城郭為遁計洎杜充力戰于前世忠王􅊅卒不為用劉光世亦不出一兵方與韓相朝夕飲宴則朝廷失建康虜犯兩浙乘輿震驚者韓世忠王􅊅使之也失豫章太母播遷六宫流離者劉光世使之也而張俊方且以萬人殺獲數十人之功冒朝廷不資之賞自明引軍至溫道路雞犬為之一空韓世忠逗遛秀州放軍四掠至執縛縣宰以取軍糧王􅊅自信八閩所過州縣邀索動以千計此事人皆知之而不敢言者以天步艱難正藉此曹為重而不敢言耳今日諸將在古法皆當誅然不可盡誅也惟王􅊅本𨽻杜充充敗于前而􅊅不救當先斬􅊅其他以次貶降使以功贖過如張俊之軍獨可賞其有功將士耳所以移軍輒遁者俊也罪亦安逃乞修日厯狀云漢法太史公位丞相上天下計書先上太史公副上丞相唐及本朝宰相皆兼史官其重如此撫州乞罷造戰船狀云威命臨之上下便文遞相逃責至縣而極矣推移不行則浚民脂膏以應期會且以臣所領一州言之嵗得酒稅錢不過六萬緍而月樁大軍起綱水腳官吏軍兵請給衣賜打箭頭鐵葉等錢嵗當用六十餘萬緍以為不取之於民是欺陛下耳行在越州條具時政書大要謂必陛下能使諸將諸將能使士卒其言懇切又欲精擇偏禆十餘人人付兵數千直𨽻御前而不𨽻諸將以漸銷諸將之權進書劄子設四類求之一年表二官閥三政迹四凡例論僑寓州郡劄子東晉治金陵於江南北僑立州郡納流亡之人故江都謂之南兖州則兖州之人所歸也京口謂之南徐州則徐州之人所歸也以至南豫州南司州亦然臣愚以為莫若因此時用六朝僑寓法分浙西諸縣悉以兩河州郡名之多印榜文先行散布候其入冦徐以旗幟招之彼既知所居各有定處與鄉居無異亦何為而不歸我哉論淮南屯田劄子虜師既退國家非暫都金陵不可而都金陵非盡得淮南不可欲保淮南勢須屯田表行在百官謝許乘轎云方披棘以立朝適雨霜之在候慮乘欵段或至顛隮乃曲軫於睿慈俾獲安於徐步愚按此亦南渡後百官乘轎之事原也皇子賀北郊禮成六表蓋北郊之禮惟徽廟嘗行之啓到徽州鄉郡謝啓城郭重來疑千載去家之鶴交遊半在或一時同隊之魚此瀟灑出塵之語也答道七梁舟林得請歸里丁令重來嘆遼海千年之别知章得請分鑑湖一曲之秋記洪州石頭驛記天下事壞於以為不足為故陳以道茀不治單襄公知其必亡晉以𨽻人之垣羸諸侯而子産知其不能道路次舍亦豈政之細者耶洪州右獄盡心堂記今吾與子一杯相屬於此亦思有向隅悲泣滿堂為之不樂者乎亦思有捶楚之下何求而不得者乎亦思有禁切寒不得衣飢不得食者乎輕用民死幾何其不挽弓自射也虔州神惠廟記以神之受職為言得體鎮江府月觀記劉岑季髙之所更新也謂形勢之雄足控制南北豈直騷人羈客區區登覽之勝東曰海門鴟夷子皮之所從逝也西曰瓜步魏佛貍之所嘗至也其北廣陵則謝太傅之所築埭而居而江之中流則祖豫州之所擊楫而逝也今攬而納諸數楹之地使千載之事了然在吾目中則季髙之志可知矣嚴州髙風堂記始謂帝王功成志得必有輕天下之心於是岩穴間有不得而用者出而百年之風俗係焉漢之二祖皆以布衣取天下髙祖時有四皓莫能致逮光武立嚴子陵亦不為帝留是五人者出處相類然四皓晚從太子之招而風節減於功名子陵終髙卧故東漢之士尚風節而以功名為不足道鋪敘既足又接以四皓學伊尹子陵學伯夷然後獨歸之本題之子陵而收焉其文字布置極佳可為作文者之法但以四皓比伊尹子陵比伯夷皆不同耳廣德軍范文正公祠堂記以浩然之氣為主謂公立朝如史魚汲直憂國如賈誼劉向守邊如馬伏波羊叔子雖庸人孺子知之獨筮仕之初有卓然大過人者史失其傳不得不紀乃敘其事而終以柳宗元上段太尉遺事抑揚而收之鎮江府大成殿記謂道宫佛剎之立其徒志堅而材足有立既非事情矣又謂吾夫子息爭己亂之道有功於世何其卑邪大抵道佛之盛由世俗信邪為禍福傾動所致而其徒又無家可歸相與丐乞經營為終身屯聚衣食之地故成之易夫子之道乃民生日用常安習而與之相忘既無異端之張皇誘脅其學官乃朝廷所設以教育人士必待上之人甚崇重然後為士者肯於違父母辭室家以從之遊屋之成否蓋在朝廷非士之事也故成之難是豈為士者之才志皆不異端若哉夫子如天覆地載民無能名而又止以息爭已亂為功此何等議論甚矣文墨之士於儒道未嘗知味而語言妄發之可羞也鄭固道寓室記自淵明寓形宇內一語宛轉發意文勢極可法永州玩鷗亭記此浮溪貶所作也如曰使吾心有以勝物則李廣之石可使為虎使吾為物所勝則樂令之弓亦能為蛇茍吾心如木石而無所示則鷗莫得而窺矣何為而不可玩哉語意極工飬浩齋記貧富貴賤死生禍福皆足以入吾胸中為浩然之冦何山書堂記謂楷以其居為寺者非也殖齋記以苗喻德文極委蛇愚按此説本劉向説苑翠微堂記凡煙霏空翠之過乎目泉聲鳥哢之屬乎耳風雲霧雨從橫合散於沖融杳靄之間而有感於吾心者皆取之以為詩酒之用古人有貴於山水之樂者如此豈與夫稿項黃馘欺世眩俗者同年而語哉種德堂記謂君子非屑屑然置盛衰興廢於胸中知修身以待其定而已未援王祥王覽隱居三十餘年以孝悌著聞及晉而子孫蕃大更六朝隋唐至譜牒不能傳文意髙爽可觀近世水心亦作種德菴記取而並觀則知浮溪之過人逺矣靖州營造記叔孫昭子所館雖一日必葺其牆屋薛惠為彭城令橋梁郵亭不修兄宣知其不能序蘇魏公文集序文雖同乎人而其所以為文有非人之所得而同者吳園先生張公春秋指南序孟子去孔子百餘年於書武成詩雲漢皆疑至春秋則曰孔子成春秋而亂臣賊子懼未嘗片言置疑其間其懼非懼聖人之書也懼天下是非之公也自三傳興而聖人之經始不勝其煩好異者𡨕思力探無所不至乃至子以父學為非弟子以師説為愚况其他哉愚按此説為有理至其序洪興祖春秋本旨直謂仲尼復生不能易而未乃歸之興祖可草辟雍封禪之儀則文人之妄意談經其舛甚矣雜著與吳知録書所重在文而排王氏之經伊川之學郭永傳永大名人建炎初車駕幸維揚宗澤守京師永為河北東路提點刑獄澤檄永為大名帥杜充相掎角永得檄大喜即朝夕謀戰守且因結東平權邦彥為援不數日聲震河朔已沒州縣皆叛冦應官軍宗澤死杜充移守京師而以張益謙代會范瓊亦脅邦彥南去劉豫舉濟南入冦大名孤處其間力屈城陷冦欲啖降之永怒罵不絶冦令斷所舉手并其家害之時死節若劉鞈李若氷向子韶霍安國張克戩楊邦乂皆章章尤著然詈賊不屈無如永王氏贊王氏屬時艱難菆金陵正覽寺十八年而啓之棺衾皆腐敗獨夫人面如生自肩有蔓覆之遂以為奉佛之報而為之贊愚謂棺衾之易腐者艱難時菆殯器物不堅也面目如生者死而不化世俗往往有之皆不祥之事也蔓延其上棺壞而蔓及之可哀之甚也何贊為跋上舍題名我神宗始以經術造士欲遂頒三舍天下未暇也至徽宗益新月書季考之法崇寧三年首命上舍生賜第者十六人愚按學校講明義理於鄉舉里選仕進之路無關也變學法以啖士子捨義理而爭利祿壞前此千萬年之學校禍後此千萬年之士習蔡京平生之罪此為第一而世乃習以為當然悲哉陳文惠公遺事公相仁祖忽夜分有御封至私第公不啓封來日奏曰今中宫虛位張貴妃有寵恐姦人傅會請正母儀若誠此事臣不敢啓封仁祖首肯曰姑置之兹舉蓋開悟轉移於談笑之頃一言興邦矣墓志汪伯彥丞相志謂伯彥和相州頃髙宗以康王使窩離不軍至磁而伯彥亟以帛書請王還相躬服槖鞬以兵二千逆王河上王開大元帥府以伯彥為副欲引兵渡河謀所向伯彥獨決䇿出北門濟子城於是由大名厯鄆濟二州達于宋覆勸進即位南京未幾伯彥有疾乘輿南渡咎不由之愚按黃汪誤國三尺孺子能言之而浮溪反許以中興功臣此雖阿其所好之言然自昔大臣得罪萬世者當時何嘗無可書之事大節一虧衆美俱失不可不戒也自昔名人才士一失足於富貴之門唯見其是而不悟其非卒與之俱辱而不自知亦不可不戒也汪澥開府澥預王安石釋經之議又首傳其説愚按浮溪愛澥者而首譽及此殆不辨是非矣滕康樞密志建炎三年宰相吕頥浩建幸武昌為趨陜之計既還建康又建欲盡棄中原焚室廬徙居民於東南公力持不可李成力求淮南吕頥浩欲從之公命趣知徐州公扈太后奉神主至洪州劉光世不能守金人渡江退保處州御史張延夀論之謫永州薨蔣猷閣學志猷宜興人政和宣和間直言人也謂今羣臣無它能唯以善候伺人主承望大臣為向背者謂之才又言內侍省不𨽻六祭又言三省吏官至四品又言近幸建塔寺論趙良嗣獻平燕書為狂妄論范之才謂滁水有鼎可出為狂妄論徐惕等進奉後苑建炎三年避寇明州卒於昌國縣蓬萊鄉葬鄞縣學旁傅揖待制志揖定北郊之議方建中靖國秋見時事更張曰禍其始此乎首引去賈讜閣學志張邦昌偽赦至揚州公適在焉師臣國視莫敢發公遽取書焚之北向長號待制張擴志公字彥實嘗為中書舍人吳璘入覲乞用團練承宣使恩為其子換文資公持不可劉光世疾革援例乞免其家差役科敷又持不可曾衢州紆志布第四子也為兩浙轉運矯制招盜孫誠等隆祐皇后葬公為修舉議者欲稱園陵公曰此特􅑼宫耳朝廷用其言徽猷陳兖志金陵失守陳興宗以金一篋委君已而興宗陷邉君展轉賊間寧舍己槖而保興宗之金訪其子歸之中大夫陳彥恭志蔡京之黨王相欲增鼓鑄君曰山澤之利不可竭祖宗之額不可踰徐師仁當前徽宗修道史時充潤文官凡四人董晞淵尤長釋氏書為章句流布四方愚每謂異端之書皆中國士人撰成此亦其一證也龍圖張根狀公二十一登第四親在堂以大父母年髙致其仕則恩及之遂以通直郎致仕年三十一是年大父母恩及其祖妣以妻封及其母未幾復以己得之服為祖榮及卧山林久而朝廷落致仕起之晚復以子之官官其叔父皆非故事特旨從之其既起也提舉常平田疇之墾桑柘之植溝防之修者以千萬計嘗極論和買之弊以為本路嵗租百四十萬斛給中都百三十萬而官度五十萬使嵗入如數猶缺四十萬舊以鹽利三十萬緍和糴故雖凶嵗不乏自更法以來州縣重取民耗米以給民既不堪其苛而和買四十萬緍復以無所從出之錢給之又言祖宗立國東南上供額六百萬斛賜發運司本錢數百萬緍使嵗廣糴以備非常隨補徐取此萬世良法也自希恩者以為羡餘獻之故朝廷不足則下諸路補發勢必敷於民為無窮之害臣以為補發不當復催盡以鹽額還漕司糴本錢還發運司為便遷轉運使會嵗飢疫朝廷責補發不已又促輸納紬絹之期追逺年無名之鬻官田者大虧上供之數公厯陳利害奏罷之且乞以封樁鹽盡給和買還之民徙兩浙又言東南諸路闕乏之由除贍學宗室添置官兵及非泛拋買外茶鹽錢盡入𣙜貨務耳若止分其半以豫漕司諸路當亦少寬又乞罷土木及人臣則節賜田産房廊賜金帛賜帶疏奏大臣權幸皆怨又因親書奏花綱事字誤遂坐以不恭之罪謫栁州卒張夀其子李綱其壻愚按浮溪所撰諸賢志狀行事之可法未有如公者也故録之詳如此浮溪之文明徹髙爽歐蘇之外邈焉寡儔艱難扈從之際敷陳指斥尤多痛快殆有烈丈夫之氣至其行責詞則痛詆李綱草麻制則力褒秦檜平居議論則鄙經學而尊詞章詞章陋習滅沒人才一至此甚不然公之成就豈止如今日所見而巳哉黃氏日抄卷六十六
