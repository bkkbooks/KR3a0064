body:
  text: 黃氏日抄卷二宋黃震撰讀論語聖人言語簡易而義理涵蓄無窮凡人自通文義以上讀之無不犂然有當於心者讀之愈久則其味愈深程子所謂有不知手舞足蹈但以言語解著意便不足此說盡之矣故漢唐諸儒不過詁訓以釋文義而未嘗敢贊一辭自本朝講明理學脫去詁訓其說雖遠過漢唐而不善學者求之過髙從而增衍新說不特意味反淺而失之遠者或有矣至晦庵為集注復祖詁訓先明字義使本文坦然易知而後擇先儒議論之精者一二語附之以發其指要諸說不同恐疑誤後學者又為或問以辨之我輩何幸乃獲䝉成敬受熟誦體之躬行庶不負先儒拳拳之意耳近世闢晦庵字義者固不屑事此其尊而慕之者又爭欲以注解名家浩浩長篇多自為之辭於經漸相遠甚者或鑿為新竒反欲求勝豈理固無窮耶震自幼䝉先父之教常讀晦庵論語長師宗諭王貫道先生見其朝夕議論常不出晦庵論語謂晦庵讀盡古今注解自音而訓自訓而義自一字而一句自一句而一章以至言外之意透徹無礙瑩然在心如琉璃然方敢下筆一字未透即云未詳震自此益信受誦讀但知喜悅而不能宣諸口今年踰六十遺忘是懼官所竊暇復讀而間記集注或問偶合參考及他說不同者一二以求長者之教餘則盡在集注矣學而篇學而時習章近世有石賡學於晦庵門人李閎祖作四書疑義謂晦庵注此章學之為言效也人性皆善而覺有先後為有病必言氣稟有清濁故質有昏明而覺有先後愚謂此於文字上生枝節實則覺有先後則清濁昏明者已在其中矣晦庵折衷諸家而歸之簡淨讀集注者何必更以求多為哉若陸象山嘗謂論語有無頭柄底說話如學而時習之不知時習者何事及其門人楊慈湖又改時習為不習其說不知何如要之學者且當尊信吾聖人之訓有子孝弟章按論語首章言學次章即言孝弟聖門之教人莫切於孝弟矣此章象山斥其為支離固不可知程子言為仁以孝弟為本論性則以仁為孝弟之本性中只有仁義禮智曷嘗有孝弟來其說性尤精而性中曷嘗有孝弟之語後覺乍見亦或以為疑蓋實則父子之道天性而其說微覺求多於本文之外也晦庵或問中云孝弟則固仁之發而最親者此語為婉而切似當收置集注使學者知孝即仁之事而仁即性之有可也因嘗思理一而已聖賢發明則愈久愈備大舜時止說克諧以孝未曾說仁湯時方說仁乃與寬對說孔子說仁又多與智對說至孟子方說仁義禮智四者而理益大備程子謂曷嘗有孝弟蓋以孟子之說釋有子之說爾要之有子時未有四者之說亦未專主於說性孝弟為仁之本理脈固自渾融且孟子雖分仁義禮智為四端他日又嘗謂仁之實事親是也聖賢立論惟理是務亦未嘗拘一端其言仁義亦未嘗不根於孝弟故孔子嘗曰夫言豈一端而已夫各有所當也曾子三省章集注首載尹氏曰曾子守約故動必求諸身語意已足矣次載謝氏曰諸子之學皆出於聖人其後愈逺而愈失其真獨曾子之學專用心於內惜其嘉言善行不盡傳竊意用心於內者無形動求諸身躬行也其所指之一虛一實已不同蓋心所以具萬理而應萬事正其心者正欲施之治國平天下孔門未有專用心於內之說也用心於內近世禪學之說耳後有象山因謂曾子之學是裏面出來其學不傳諸子是外面入去今傳於世皆外入之學非孔子之真遂於論語之外自稱得不傳之學凡皆源於謝氏之說此說今視晦庵殊不侔使晦庵集注於今日謝氏之說不知亦收載否二說雖集注所並收然不可不考其異入孝出弟章晦庵於或問載蘇氏之說云今之教人者引之極髙示之極深教者未必能學者未必信務以誕相勝風俗之壞必自此始夫晦庵豈不悟蘇氏此語之為譏伊川哉而載之或問其懲伊川門人之弊歟三年無改章晦庵於集注取尹氏之說曰如其道終身無改可也如其非道何待三年三年無改者孝子之心有所不忍故也次取游氏之說曰三年無改亦在所當改而可以未改耳其於或問則斷以尹氏得用心之本游氏得制事之宜又設或問曰必若尹游之說則夫子之言得無有所不盡者乎蓋不可改則終身不改固不待言其不可以待三年又非常之事不可以預言矣此又晦庵足尹游之說而完其義者也愚按尹游二說皆因禮有三年之喪而釋三年為親喪之三年因孟莊子不改父之臣與父之政而釋不改為親沒三年之間不改其行事竊意此章本意本不為親沒而發特三年字與不改字與它處說人子居喪事偶同耳夫人子於其父之道誰不知體之而持久為難父在之時隱於志者三年無改其道父殁之後見於行者三年無改其道則其拳拳於親而不敢違始為可知耳三年者槩言其久似與顔子三月不違仁語脈相近且夫子既明舉父在與父殁兩事而言則非獨指居喪而言也明言於父之道又非獨指其居喪行事而言也必如古者之說徒主其三年之文而不暇顧其父在之文矣三年有成三年大比三年成都三年視敬業樂羣皆要久而言豈徒三年之喪稱三年哉而必以三年為居喪耶知和而和章本意不過禮以和為貴和又當以禮節之耳范氏以知和而和屬之樂而晦庵取焉禮樂雖相關但恐於本文有添因不失其親章集注以為所依者不失其可親之人則亦可宗而主之矣是一章三節各自為義也或問以為因上二者而不失其所親則為可宗則下一節承上二節而言也恐不若集注為徑然此一節終覺未易曉先師王宗諭貫道嘗講此章云宗者人所取為宗師宜超然卓立之人也因者因仍於古而非自立者也惟因而不失其可親之人則源流既正亦可宗之也此語似於集注有發為政篇民免無恥章集注謂茍免刑罰而無所羞恥或問謂范吕謝尹氏皆以茍免為言殊失文意蓋所謂免正以其革面而不敢為非真有免為罪戾耳豈冒犯不義以至於犯上作亂而脫漏憲網以幸免於刑誅之謂哉愚按二說似微不同實則經文惟言免字晦庵言茍免字以發之恐後學看茍字粗淺故於或問再發以足之此等似當入集注十五志學章程子謂孔子自言進德之序如此此語盡之矣諸儒議論疊出皆因待聖人過髙謂聖人不待學故也然聖人亦與人同耳晦庵斷以非心實自聖而姑為是退託此語尤有味而學者宜知所勉矣攻乎異端章孔子本意似不過戒學者它用其心耳後有孟子闢楊墨為異端而近世佛氏之害尤甚世亦以異端目之凡程門之為佛學者遂隂諱其說而曲為回護至以攻為攻擊而以孔子為不攻異端然孔子時未有此議論說者自不必以後世之事反上釋古人之言諸君子又何必因異端之字與今偶同而回護至此耶舉直錯枉章舉直錯枉而民服詞義曉然自不待注所不可曉者諸字耳兩語交互歸宿正在諸字若單云舉直錯枉舍諸字不言則不可耳今集注以諸字作衆字說如諸侯之諸是云衆枉衆直也然晚學亦未易曉或疑諸者助辭即之於二字之連聲錯者置也如賈誼置諸安處則安之類錯諸者猶云舉而加之也舉直者而置之於枉者之上是君子在位小人在野此民所以服或舉枉者而置之於直者之上是小人得志君子失位此民所以不服庶幾此章兩下相形之意方明未知然否若如舊說則舉者用也錯者不用也二字相背若如今說則舉者舉斯加彼之舉也錯者置之於此之名也二字相因其義訓皆不同矣八佾篇君子無爭章辭義曉然本無可注近世立髙論者回護爭字其說雜然晦庵本注疏舊說射禮為證其說始平於是知好議論而忽注疏者可戒也使民戰栗章蘇氏謂公與宰我謀誅三桓而為隱辭以相語有以問尹氏者尹氏艴然曰說經而欲新竒何所不至矣此論最於說經有益聞者當戒胡氏因郊社之文以社為祭地之禮晦庵曰未可知也然其言有據存而考之可也愚謂社固祭地也然所祭指吐生百穀之土與稷為比則舉地之一而言之自王社以下皆然故春祈秋報皆于社焉若王者父天母地之大祭全舉地而言恐又不止此社而已三歸集注云三歸臺名事見說苑而或問載舊說婦人謂嫁曰歸三歸云者一娶三姓而備九女如諸侯之制也愚按說苑謂管氏避得民而作三歸殆如蕭何田宅自汙之類想大為之臺故言非儉而臺以處三歸之婦人故以為名歟反坫鄭注謂坫在兩楹之間反爵其上按今世釋奠反爵乃以四方板而圓坎其中或云此反坫之餘制然坫字從土而云在兩楹間豈常設之者歟按郊特牲臺門而旅樹反坫雜記旅樹而反坫鄭氏亦以樹為屛以反坫為反爵之地然內則載閣食之制云士於坫明堂位載朝㑹之制云反坫出尊崇坫康圭士虞禮載苴茅之制云僎于西坫上是則纍土而為之者皆可名坫而坫亦有髙卑東西之不同非必反爵之處也如臺門而旅樹反坫當是立反坫於臺門之內如今行在所之騏驥院牛羊司與凡營壘多於臺門內立土牆之類歟鄭氏之釋反坫皆本論語其指坫為反爵皆本好之一字意兩君之好為飲酒故云耳然以坫之反為爵之反似異於經文又按汲冢周書云乃立五宫咸有四阿反坫注云反坫外向室也則反坫又非反爵之地反主坫言非主爵言也反殆向外之名坫殆别設大門屛之名豈兩君之好必欲容其儀衛之衆而為此外向之室歟世逺不可知若據郊特牲以反坫與臺門相聯汲冢書以反坫與四阿相聯則論語以反坫與樹塞門相聯恐均為宫室僭侈之事里仁篇里仁為美章注以焉得知為失其是非之本心理固如此但本文自明白此語恐覺微重耳安仁利仁章謝氏謂仁者心無內外逺近精粗之間非有所存而自不亡竊疑此佛氏心學之說若夫子本旨不過謂仁者安仁與仁為一耳又謂知者未能無意竊疑此亦佛氏絶意念之說若夫子本意不過謂知者知仁之為美慕而行之耳異端之說皆從莊子寓言死灰其心一語來近世諸儒或慕其髙而言之然人决不能無心心决不能無意心是活物凡動處皆是意特意有美惡耳雖仁者安仁此心亦何嘗不流行哉於吾夫子七十而從心所欲不踰矩可知矣無適無莫章君子於天下無必欲為之心亦無必不為之心惟義是從而已此本旨也無此兩者惟有義耳謝氏謂於無可無不可之間有義存焉則於兩者之間參酌其義又是一意與經旨微不同吾道一以貫章聖人之道泛應曲當無非此理故曰一以貫之忠以盡已恕以及人則此道之所以泛應曲當而能一以貫之者也異端借一貫之字以證不二之說近或推之愈髙謂道本自一不必言貫此固非後學所敢言諸儒疑一貫之道大而忠恕不足以當之至有天人體用等辨恐亦不若平心只味本文也公治長篇乘桴浮海章程子謂浮海之歎傷天下之無賢君晦庵於集注録之於或問言其未盡善因知經旨之本明白者不必贅辭也當從或問非爾所及章諸說以仁字總罩一章之意因而說仁恕不同於本文似不曾解竊意理雖一定而人情不齊在已者可勉在人者不可强我欲無加諸人可能也欲人之無加諸我不可必也故以為非爾所及耳故夫子言已所不欲勿施於人盡其在已而已大學言所惡於上勿施於下以至左右前後皆然亦盡其在已而已必欲强人之我若而彼此皆平則豈可得哉姑志所疑以俟請問性與天道章子貢明言不可得而聞諸儒反謂其得聞而歎美豈本朝專言性與天道故自主其說如此耶要之子貢之言正今日學者所當退而自省也令尹子文注云鬭穀於菟石賡云穀本作乳也借作穀雍也篇居敬行簡章集注云伯子蓋太簡者而仲弓疑夫子之過許蓋未喻夫子可字之意而其所言之理有默契焉者故夫子然之或問云夫子雖不正言其居簡之失而所謂可者固有未盡善之意矣仲弓乃能默契聖人之微旨而分别夫居敬居簡之不同夫子所以深許之也愚按二說皆出晦庵而不同恐當從或問之說孟之反不伐章集注載謝氏稱孟之反無欲上人之心及孟之反可法之語或問以謝氏為過且云恐非夫子之意夫釋經亦順其本旨而已合參或問之說祝鮀宋朝章范氏說無鮀之佞而獨有朝之美協於不有至而有之文晦庵以巧言令色不得分輕重而去其說且以無虐惸獨而畏髙明比此句之句法然書云無者總為禁止之辭虐惸獨而畏髙明是一句而平下兩事兩事相比也此句不有祝鮀之佞而有宋朝之美相反者是一句而兼下兩事兩事相反也句法似亦不類如以辨佞為尤足以茍免亂世而宋朝自然之美色與人為之令色亦不同則范氏分輕重之說恐亦自通學者更詳之何莫由斯道章洪氏將何字少歇而以人莫能由斯道晦庵獨取之蓋云世之不由於道者不少也程氏等說謂人何能不由斯道若曰日用常行者皆道也蓋衆說說得道字輕指天下之道也故以為莫不由之洪說說得道字重指道之踐履於身者也故以為莫能由之恐合參考人之生也直章集注獨取明道云生理本直罔不直也而亦生者幸而免爾或問則盡辨伊川以下諸說為未然愚意罔對人而言蓋罔罔然不知所以為人者也幸而免對生也直而言蓋僥幸茍免不能直者也人之生也直而已罔之生也不能直幸免而已幸而免者低回委曲茍全其生者也述而篇子所雅言章程曰若性與天道則有不可得而聞者要在默而識之也愚按本文未嘗及此怪力亂神章以怪力亂非理之正而别指鬼神為造化之迹非不正是一律而分輕重然載謝氏之說謂語常不語怪語德不語力語治不語亂語人不語神一體平說尤於經文協也泰伯篇泰伯至德章觀三以天下讓之說則商德日衰周德日興太王父子兄弟曉然知天命人心之有歸預視天下為周之將有矣書稱太王肇基王迹詩稱至于太王實始剪商與夫子之言皆合至歐陽公作泰誓論始為周人追諱其事竊意聖人明白洞達初無可諱者故晦庵集注惟直述其事或問於三讓亦姑舉禮辭固辭終辭而不敢質其說蓋三辭乃飲食賜豫之事故晦庵不敢確言以為三讓天下之說三讓事見下或問有疑泰伯父死不赴傷毁髮膚皆非賢者之事晦庵辨以太王之欲立賢子聖孫為其道足以濟天下而非有憎愛之間利欲之私也是以泰伯去之而不為狷王季受之而不為貪父死不赴傷毁髮膚而不為不孝使泰伯而不有以深自絶焉則亦何以必致國於王季而安其位哉愚按王充論衡謂泰伯知太王欲立王季入吳采藥斷髮文身以隨吳俗太王薨泰伯還王季再讓泰伯不聽三讓曰吾之吳越吳越之俗斷髮文身吾刑餘之人不可以為宗廟社稷主王季始知其不可而受之此其所載頗詳且與吾夫子三以天下讓之說合可以破或者信史書言泰伯父死不赴之疑或問又載蘇黃門謂子夏言泰伯端委以治吳則未嘗斷髮文身愚按黃門作古史專據左傳以闢史記然世逺安知此是而彼非耶今其主左傳謂至仲雍而後斷髮文身則惑矣泰伯仲雍始入吳而斷髮文身者隨其俗也泰伯果端委於其先矣仲雍繼之為君而方斷髮文身豈人情耶且斷髮文身者始入吳之事也端委而治者吳人尊信之後泰伯君吳之事也髮雖嘗斷何妨復長身雖嘗文何妨被衣兩義固不相害也其始隨俗及得位則臨之以禮理固然也若謂泰伯端委至仲雍繼位而後斷髮文身是謂仲雍不肖也為君而不肖者有矣未有下同庶民者也且時仲雍已老矣髮星星何可斷身黑者何可文耶子罕篇子罕言利章集注惟載程氏之言曰計利則害義命之理微仁之道大故皆罕言愚按自孟子不言利世以利為不美字而此章以利與命仁並言故世疑之惟或問中晦庵言利者義之和全於義則利自至若多言利則人不知義而反害於利矣命者天之令修已以俟然後可以立命若多言命則人事不修而反害於命矣仁者性之德必忠信篤敬克己復禮然後能至若多言仁則學者憑虛躐等而反害於仁矣三者皆理之正不可以不言而憂深慮逺又不可以多言也此言似合入集注可免世俗分輕重美惡之疑鄙夫空空章或問謂空空指鄙夫而言此語合入集注蓋集注未嘗明言空空指誰先進篇先進於禮樂章晦庵以先進為前輩野人為郊外之民後進為後輩君子為士大夫此甚平實引程子曰先進於禮樂文質得宜今反謂之質朴而以為野人愚謂若以先進為朝廷邦國行禮樂之人則宜如程子宛轉其說若泛言前一輩人而於禮樂亦止泛言於禮樂之事則程子之說視本文為有添矣或止云先輩質朴故於禮樂之事猶野人也則與晦庵叶子路曾晳冉有公西華侍坐章四子侍坐而夫子啓以如或知爾則何以哉蓋試言其用於世當何如也三子皆言為國之事皆答問之正也曾晳孔門之狂者也無意於世者也故自言其瀟灑之趣此非答問之正也夫子以行道救世為心而時不我豫方與二三子私相講明於寂寞之濵乃忽聞曾晳浴沂詠而歸之言若有觸其浮海居夷之云者故不覺喟然而歎蓋其意之所感者深矣所與雖㸃而所以嘆者豈惟與㸃哉繼答曾晳之問則力道三子之美夫子豈以忘世自樂為賢獨與㸃而不與三子者哉後世談虛好髙之習勝不原夫子喟嘆之本旨不詳本章所載之始末單托與㸃數語而張皇之遺落世事指為道妙甚至謝上蔡以曾晳想像之言為實有暮春浴沂之事云三子為曾晳獨對春風冷眼看破但欲推之使髙而不知陷於談禪是蓋學於程子而失之者也程子曰子路冉有公西華言志自是實事此正論也又曰孔子與㸃蓋與聖人之志同便是堯舜氣象此語微過於形容上蔡因之而遂失也曾晳豈能與堯舜易地皆然哉至若謂曾晳狂者也未必能為聖人之事而能知夫子之志遂以浴沂詠歸之樂指為老安少懷之志曾晳與夫子又豈若是其班哉竊意他日使二三子盍各言爾志此泛言所志非指出仕之事也今此四子侍坐而告以如或知爾則何以哉此專指出仕之事而非泛使之言志也老安少懷之志天覆地載之心也適人之適者也浴沂詠歸之樂吟風弄月之趣也自適其適者也曾晳固未得與堯舜比豈得與夫子比而形容之過如此亦合於其分量而審之矣顔淵篇顔淵問仁章注云為仁者所以全其心之德也愚按此章前曰克己復禮為仁後曰為仁由已此注恐指為仁由已之為仁耳蓋以語脈而詳之克己復禮為仁云克己復禮即所為仁為非用力之字若為仁由已則為乃用力之字語雖相似而脈則不同也要之為仁之工夫即是上文克己復禮盍更詳之惜乎夫子之說君子章注云謂棘子成之言乃君子之意愚按上文棘子成曰君子質而已矣故子貢指其說君子恐非其所言別有君子之意也合審子路篇仲弓問政章程子謂仲弓問焉知賢才而舉之子曰舉爾所知爾所不知人其舍諸便見仲弓與聖人用心之小大推此義則一心可以興邦一心可以喪邦只在公私之間耳愚按仲弓正問舉才之方而孔子教之耳程子豈意其不欲舉才而推其弊至此歟范氏曰失此三者不可以為季氏宰况天下乎恐亦衍文憲問篇霸諸侯注云霸與伯同長也愚意天下之主謂之王諸侯之長謂之伯此指其定位而名也以德方興而為天下所歸則王平聲聲轉而為王去聲王政不綱而諸侯之長自整齊其諸侯則伯聲轉而為霸皆有為之稱也正音為靜字轉聲為動字商周之初諸侯猶未强大故有德易以興周衰諸侯强大地醜德齊莫能相一管仲輔齊僅能以智力總率之使之尊周攘夷其濟世之功亦不少故夫子稱之若孟子之言則又存萬世之常道孔子沐浴而朝章胡氏曰仲尼此舉先發後聞可也愚謂孔子於義盡矣此事果可先發後聞則夫子亦為之矣不待胡氏發其所不及也此言似不必附集注衛靈公篇有教無類章注專主變化氣類愚恐夫子與進互童孟子來者不拒之意皆在其中也季氏篇季氏將伐顓臾章集注云逺人謂顓臾分崩離析謂四分公室家臣屢叛或問載蘇氏考究定公十年子路為季氏宰哀公十一年冉求為季氏宰則伐顓臾在季康子之世哀公七年季康子伐邾以召吳冦故曰逺人不服而不能來也十五年公孫宿以成叛故曰邦分崩離析而不能守也恐當以或問所載為正蓋顓臾在邦域之中難指其為逺人而夫子此語正因季氏將伐顓臾而槩及當時之國事謂他有當理者尚多也所謂逺人非正指將伐之顓臾也陽貨篇性相近章性者此理素具於此心人得之於天以生者也自一隂一陽之謂道而繼之者善于以賦豫於萬物人為萬物之靈其性之所自來固無有不善而既屬於人則不能以盡同故夫子一言以蔽之曰性相近也至孟子當人欲橫流之時特推其所本然者以曉當世故專以性善為說自此言性者紛紛矣由今觀之謂性為相近則驗之身稽之人參之往古考之當今上探之聖賢下察之衆庶無一不合信乎其為相近也謂性為皆善則自己而人自古而今自聖賢而衆庶皆不能不少殊推禹湯文武之聖亦未見其盡與堯舜為一孟子蓋獨推其所本然者以曉人也言性之說至本朝而精以善者為天地之性以不能盡善者為氣質之性此說既出始足以完孟子性善之說世之學者乃因此隂陋吾夫子之說而不敢明言其為非則曰性相近是指氣質而言若曲為之回護者然則孟子之言性何其精而夫子之言性何其粗耶竊意天命之謂性所謂天地之性是推天命流行之初而言也推性之所從來也所謂氣質之性是指既屬諸人而言也斯其謂之性者也夫子之言性亦指此而已耳本朝之言性特因孟子性善之說揆之人而不能盡合故推測其已上者以完其義耳言性豈有加於夫子之一語哉且天下之生凡同類者無有不同而纎悉則不能盡同此其所以為造化之妙如桐梓之生一也而枝條花葉之橫斜疏密則無一同然要其所以為桐梓者終相若也此相近之說也而可以知人矣人之形體一也而耳目口鼻之位置美惡則無一同然要其所以為人者終相若也此相近之說也而可以知其無形者矣人之能言一也而其聲音之清濁髙下則無一同然要其所以為人聲者終相若也此相近之說也而可以推人之性矣其賦自天何有不善自隂陽雜揉屬之人而謂之性宜不能粹然而皆善此相近之說也奈何獨主性善之說而遂廢性相近之說耶故嘗謂夫子言性相近惟指其實然者故他日言中人以上中人以下生而知學而知人品節節不同皆與相近之言無戾孟子專言性善惟推其本然者故他日言二之中四之下性之反之先覺後覺人品亦各各不同終歸於夫子相近之說學者亦學夫子而已夫子未嘗言性言性止此一語何今世學者言性之多也無亦知其性之相近而戒其習之相逺可乎孟子言忍性是性不能皆善而忍亦習之義也匏瓜黃勉齊宰臨川刋臨川人應抑之天文圖有匏瓜星其下注云論語吾豈匏瓜也哉焉能繫而不食正指星而言蓋星有匏瓜之名徒繫於天而不可食正與維南有箕不可簸揚維北有斗不可挹酒漿同義又建昌吳觀附此於四書疑義未知然否微子篇虞仲注云虞仲即仲雍與泰伯同竄荆蠻者愚按仲雍嘗治吳為君恐不可言逸民亦無隱居放言之事兼仲雍生伯夷叔齊之前使虞仲果仲雍也亦何為反序次於夷齊之後恐先儒自有所據耳堯曰篇雖有周親不如仁人集注載孔氏曰周至也言紂至親雖多不如周家之多仁人或問則曰范氏之說因上文而以周親為周室之親亦善但於書文不協愚意於書文雖不協於本文則協且免得添紂字與多字又免得改周字為至字似當兩存耳又按古注孔曰親而不賢不忠則誅之管蔡是也仁人謂箕子微子來則用之此說雖大賚之初未有管蔡之事而狀不如意甚明黃氏日抄卷二
