front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0064_WYG_003-1a, image: WYG0707/WYG0707-0019c.png}
body:
  text: 黄氏日抄卷三宋黄震撰讀孟子梁惠王上梁惠王問利國孟子言利之害而進以仁義之效梁惠王問沼上之樂孟子言獨樂之患而進以與民同樂之效齊宣王問威文則黜威文之無足道而進以行王道齊宣王有不忍一牛之心則反覆言之而使推此心保四海及教齊梁以王道又皆歸之耕桑孝弟之實無非因其機而誘進之晦庵集註已各發其㫖趣之歸辭意瞭然熟誦足矣梁惠王下齊宣王好世俗之樂非也而孟子不之非廣四十里之囿非也而孟子不之非不毁明堂非也而孟子不之非好貨好色皆非也而孟子不之非惟一切因其機而順導之使無不與民同之以歸於行王之道焉盖齊大國也可以有為於天下故誘進之如此此孔門之所謂權者也滕小國惴惴自保而其君又賢則惟以正對而不為誘進之辭凡其㫖義則皆集註備之矣按史記載梁惠王三十五年孟子始至梁後二十三年當齊湣王十年齊伐燕孟子在齊古史乃謂孟子先事齊宣王後見梁惠梁襄及齊湣王晦庵序孟子謂未知孰是晦庵又謂孟子以伐燕為宣王時事與史記荀卿等書皆不合通鑑以伐燕為宣王十九年則是孟子先游梁而後見齊宣王亦未知孰是按史記齊伐燕有二事齊宣王先嘗伐燕燕文公卒易王初立齊宣王因燕䘮伐之取十城是即孟子梁惠王篇所載問答稱齊宣王者也此一事也稱宣王者孟子作於宣王已没之後故以謚稱而趙歧註亦稱齊宣王也齊湣王後又伐燕燕王噲以燕與子之齊伐燕下燕七十城是即孟子公孫丑篇所載沈同問燕可伐歟者也此又一事也止稱齊王者作孟子時湣王尚在未有謚之可稱趙歧註亦止稱王也燕噲遜國在齊宣卒後九年湣王伐燕在齊宣卒後十年以此見伐燕噲非齊宣甚明孟子以周顯王三十三年見梁惠王齊宣王以周顯王四十五年卒其子湣王立在位四十年孟子初見梁惠王已稱為叟姑以五十嵗約之又後之二十三年齊湣方伐燕孟子當年七十四五嵗距湣王之卒孟子約一百餘嵗孟子當不及見湣王卒故孟子書自公孫丑篇後凡渉齊事皆止稱王陳賈作周公未盡仁智論終篇止說齊王盖嘗考究古史通鑑少誤近世師儒援為王留行事有謂區區齊宣不足為聖世道說者遂亦誤指伐噲為齊宣王事故私記之以俟考古者質焉右係鄉人蔣監簿曉之說公孫丑上前二篇皆載㳺說齊梁之說此篇因公孫丑預設當路於齊動心否乎之問遂明不動心以及知言養氣之說繼以王霸之說繼以仁不仁之說又繼以不忍之心而發明四端之說凡皆多前聖所未發有益萬世者其指要已備於晦庵之集註讀之瞭然後學不待贅一辭矣公孫丑下孟子游說齊梁備於前篇否亦多因言齊事而發之此篇惟首章言多助寡助之分豈亦為齊而發者歟餘則載游說齊王始終進退之節盖孟子拳拳救世之心雖齊宣不足以共此而其因以垂訓萬世皆因齊王發之也滕文公上齊梁既不偶始邂逅滕文公以世子過宋因與之交際其始末皆備此篇然告齊梁皆以權宜告滕文公皆以正對文公天資甚美而國小力弱故教以太王治歧之政而不及湯武救民之事矣然其告齊梁亦未嘗不歸宿於王政之本如治歧之云也有王者起必来取法是為王者師註以此為言滕然上文以三代教養之法而言恐此所謂是為師云者指三代而言盖以三代敎養可為王者師使滕君行王政而師之未必遽期滕之為王者師也後有王者亦未必捨三代不法而必待滕之所行為師也有若似聖人一章門人以有若言行氣象類孔子而欲以所事孔子事之有若之所學何如也曾子以孔子非有若可繼而止之孔子自生民以来未之有宜非有若之所可繼而非故貶有若也有若雖不足以比孔子而孔門之所推尚一時皆無有若比可知咸淳三年升從祀以補十哲衆議必有若也祭酒為書力詆有若不當升而升子張不知論語一書孔子未嘗深許子張據此章則子張正欲事有若者也子張之未能為有若昭昭也陸象山天資髙明指心頓悟不欲人從事學問故嘗斥有子孝弟之說為支離奈何習其說者不察因剏攻之於千載之下耶子張有靈回顧有子恐不自安其位次可江漢秋陽之喻曽子盖甚言夫子道徳盛大彰著灼然非他人可擬之状而講象山之學者又徃徃襲取以證精神之説恐本㫖亦不如此在學者詳之離婁上一章言為政必因先王之道而先王之道仁政也二章言為君盡君道為臣盡臣道而在仁與不仁也三章言三代之得天下失天下而其得失在仁不仁之分也四章言天下之本在身五章言徳教之行先巨室六章言諸侯耻受命於大國惟好仁則無敵於天下七章言不仁者樂其所以亡八章言桀紂敺民歸於仁君九章歎自棄自暴者之可哀也孟子此篇反覆救世之說無一不歸於仁十章言親其親長其長而天下平發明仁之足以救世至此而徑易昭白極矣繼此言誠身之道言誠思誠之道皆受業子思之言也又繼此言二老来歸則欲諸侯之師文王言冉求聚歛則痛當世率土地而食人肉餘言事親善親之事一一明白熟誦而已巨室古者卿大夫皆世其官所與共社稷者故曰巨室人君當以至公率先之否則卿大夫世家皆以為不可矣故曰為政不得罪於巨室後世誤以兼并之豪為巨室以屈法縱惡為不得罪盖後世惟見兼并之豪為巨室無復見卿大夫之世家也惟見豪民謗訴驅逐長吏之為罪而無復見士大夫執古誼爭時政之事也眩流俗而釋古書陷於非義者多類此學者謹之無責耳矣註謂人之輕易其言以未嘗遭失言之責故耳或疑無責只是不足責之意所以甚鄙而警之也耳矣云者輕收之語辭離婁下此篇多平居講貫之言而欲其自得一章工夫次第為尤詳盖云功深力到自然而得故言欲其自得晦庵於或問發明已備而世乃有以自得為己之獨得至或傲然特立異論而不顧者可深省矣十九章言舜由仁義二十章言禹湯文武周公二十一章言孔子作春秋二十二章自謂未得為孔子之徒而私淑諸人盖厯舉列聖相傳之事而企焉自任與承三聖意相近特每更端而言之耳當通為一章而誦味之也餘皆叙孟子之言行以繼之末章乞墦之喻警士大夫求富貴掩其茍求之迹而反敢以富貴驕人者最為切至施施從外来施施二字注以為喜恱自得之貌造語精矣或疑施是施之於人不反顧收歛施施正是驕其妻妾之状未知然否惠而不知為政或問云子産相鄭能使都鄙有章上下有服田有封洫廬井有伍非不知為政者也晦庵舉其師之言謂子産於橋梁之修盖有餘力而惠之及人亦有大於乘輿之濟者矣意此時偶有故而未就又不忍乎冬渉而為耳然暴其小惠以恱於人其流弊必至廢公道而市私恩故深譏之愚意子産君子人也未必暴私惠以悦於人其濟處亦未必真有深淵須橋梁之地其時亦未必冬寒之時而相國之乘輿又豈有常出於外捐以濟人之理或者子産乘輿偶出乘輿已濟而小民有渉水者因就以其乘輿濟之小民感恱世傳為美談孟子因而廣之言此不過一時之惠自有嵗時常行之政耳若夫徒杠成輿梁成恐亦農隙嵗一修之若謂他時無之而此時始成又豈政也哉凡此類皆不當以文害辭舜明於庶物章註謂物者事也人倫指君臣父子以下五者言之也以物為事盖謂於事上明理其說甚當或疑上文云人之所以異於禽獸者幾希庶民去之君子存之而繼以舜言之明於庶物似即承上文人異禽獸幾希之言察於人倫似即承上文庻民去之君子存之之言人物皆天之賦明於庶物則知自異於物矣應上文人異禽獸幾希之言也人皆為物之靈察於人倫則又知自異於衆人矣應上文庶民去之君子存之之言也既明於庶物又察於人倫此其所以能由仁義行也未知然否三自反楊氏謂孟子三自反不若顔子一不校晦庵言自反之説正學者所當用力若反之未至而遽欲以不校為髙恐䧟於茍且頽墮愚恐亦流於釋氏忍辱晦庵此説極救近世談髙就簡之弊須深味之萬章上此篇言舜之孝親以及舜禹之有天下以及伊尹之相湯以及孔子之進退而終於辯百里奚之自鬻皆發明聖賢之心迹以釋世俗之疑議至若以瞽瞍亦允若就指為舜之父不得而子以堯舜其君民就指為伊尹之要湯皆即世俗之說而精其義以堯之授舜為天以禹之相益為薦於天皆推義理之極而髙其説此則孟子因機誘說之辭也使舜浚井之事晦庵以為不必問其有無益避啓之事蘇黄門極言其妄晦庵謂三年䘮畢還政嗣君而告歸之時也於是去而避之亦禮之常而事之宜可盖求仁得仁又何恥之有哉萬章下此篇因三子之偏而論始終條理所以示學者作聖之功精矣自孟獻子有友五人以至交際以至仕非為貧以至士不託於諸侯皆士之所以自守者周室班爵禄集註謂與王制周禮不同而不敢質其說此謹之至也然孟子生周之末其詳已不聞漢文帝時作王制果何為而反得其詳漢衰而周禮出於王莽家之劉歆恐尤難與孟子較異同也當以孟子之説為正而闕孟子之所未詳告子上言性莫善於孟子孟子言性莫詳於此篇然為辯告子發也非無故而言也已而繼之以人心得養失養之分齊王一暴十寒之喻究詰於舎生取義本心之真反覆乎宫室妻妾外誘之惑辯析乎養其小體養其大體之孰重孰輕無非歸之實踐履以全其在我者也性學之説至本朝愈詳而晦庵集其成今觀孟子之言性如此晦庵之發其指趣又如此學者宜熟誦而深思矣尚滕口說者何也乃若其情則可以為善情指惻隠之類才者能為之名可以為善故又以為才告子下此篇五霸三王之罪人一章以至今之所謂良臣古之所謂民賊警切世變極為痛快自戰國風俗一變之後行於世者滔滔皆若人徒飾以三王以上之議論耳盡心上行不著習不察此章似承上章而言反身而誠上也强恕而行次也行不著習不察由之而不知者衆也舉一廢百集註云為我兼愛執中皆舉一而廢百愚按文勢似止言子莫執中讀者更審之棄井集註云猶為自棄其井盖指掘井者言之以勉人也若味本文恐只是廢棄無用之義盖鑿雖深而不及泉猶為無用之井故井必以及泉為期孟子勉人之意已在其中盡心下篇末叙自昔聖賢相承有功萬世孟子平生衛道之切自任之勇皆自此来韓昌黎得此而作原道程伊川明此而作明道序中行之道惟聖者能之故顔子具體而㣲其學猶無傳傳者必其剛毅有立如曽子子思皆然三傳而至孟子遂能尊孔氏而闢楊墨明王道而黜霸功卓然有功萬世焉嗚呼盛矣而世猶或譏之然李泰伯以富國强兵為學其譏孟子宜也如司馬公大儒亦譏之豈非孟子説誘時君變化百出温公守樸意見所不合歟吁此可與權之難也黄氏日抄卷三
