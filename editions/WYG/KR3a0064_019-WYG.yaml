body:
  text: 黄氏日抄卷十九宋黄震撰讀禮記六郊特牲第七郊特牲而社稷大牢天子適諸侯諸侯膳用犢諸侯適天子天子賜之禮大牢貴誠之義也故天子牲孕弗食也祭帝弗用也祭天一牲祭社稷反三牲諸侯膳天子一牲天子禮諸侯亦反三牲是所貴不在物而在誠也夫誠者純一而未㪚者也牲孕則散矣故天子弗食而祭帝弗用也用周氏補大路繁纓一就先路三就次路五就郊血大饗腥三獻爓一獻孰至敬不饗味而貴氣臭也諸侯為賔灌用鬱鬯灌用臭也大饗尚腵脩而已矣繁步千反爓夕廉反腵丁喚反大路祭天之木路繁馬腰帶纓其鞅也就者五色絲一匝也先路者殷三路猶質以對次路故稱先路三就者每加以兩也次路則五就矣禮器言次路七就此云五就長樂陳氏謂次路有五就七就者次路盖兼革木二路五就七就庸豈一車耶灌猶獻也腵脩者加薑桂曰腵脩謂棰肉如腵以薑桂脩之此承上文明以少為貴鄭氏大饗君三重席而酢焉三獻之介君專席而酢焉此降尊以就卑也諸侯之席三重諸侯相饗獻酢禮敵至於他國之卿來聘大夫為之介而卿禮行三獻則主君去重席之尊就單席而受是為降尊就卑饗禘有樂而食嘗無樂隂陽之義也凡飲養陽氣也凡食養隂氣也故春禘而秋嘗春饗孤子秋食耆老其義一也而食嘗無樂飲養陽氣也故有樂食養隂氣也故無聲凡聲陽也此明飲屬陽作樂食屬隂不作樂然考於商頌周官則食嘗未有不用樂説者遂以為夏之制然此禮文之末漢人記舊聞耳不必泥也補鼎爼竒而籩豆偶隂陽之義也籩豆之實水土之品也不敢用䙝味而貴多品所以交於旦明之義也旦音神陸氏如字籩實若菱芡豆實若芹蒲皆水品籩實若棗栗豆實若菁韭皆土品水土之品非人所常食故曰不敢用䙝味或土或水所取不一故曰貴多品旦明古注以為神明山隂陸氏曰旦明指祼獻之時至朝而踐則象朝時事親所進則旦當如字不必改為神也鼎爼之實以天産為主而天産陽屬故其數竒籩豆之實以地産為主而地産隂屬故其數偶不敢用䙝味所以内盡志而貴多品所以外盡物陳氏賔入大門而奏肆夏示易以敬也卒爵而樂闋孔子屢歎之奠酬而工升歌發德也歌者在上匏竹在下貴人聲也樂由陽來者也禮由隂作者也隂陽和而萬物得賔指朝聘而來者易言和悦卒爵酬酢禮畢也闋終也屢數也歎美也奠酬謂主獻賔賔酢主主又酬賔爵已三行賔奠置其爵而不再舉也饗始於入門而奏肆夏終於卒爵而樂闋孔子屢屢歎美之盖奠酬則禮成賔主之徳可知工升堂上而歌清廟所以發其徳也在上者以歌為主在下者以匏竹為主而歌在上則以人聲為貴也樂由陽來禮由隂作獨隂不生獨陽不成生成相濟其氣乃和和則萬物不失其性矣陸氏方氏旅幣無方所以别土地之宜而節逺邇之期也龜為前列先知也以鍾次之以和居參之也虎豹之皮示服猛也束帛加璧往徳也旅衆也馬氏曰陳也衆之所陳也幣庭實也鍾即金貢金鑄器為鍾也龜也鍾也虎豹之皮也束帛也皆幣也衆陳之而無方以土地各有宜不求於不産逺邇各有節不責之非時龜能前知陳之最前金為鍾性和厠居龜帛之間故云以和居參之幣以虎豹之皮者示王者之威足以服猛幣以璧者君子以玉比徳加璧於束帛之上者示主有徳為人所歸往也孔氏馬氏庭燎之百由齊桓公始也大夫之奏肆夏也由趙文子始也天子庭燎百齊桓公以諸侯始僭之諸侯納賔奏肆夏趙文子以晉大夫始僭之用孔氏補朝覲大夫之私覿非禮也大夫執圭而使所以申信也不敢私覿所以致敬也而庭實私覿何為乎諸侯之庭為人臣者無外交不敢貳君也諸侯相朝覲大夫從行不當行私覿惟大夫受命出使於諸侯則行私覿所以申信也從諸侯行而不敢私覿者所以致敬也補大夫而饗君非禮也大夫强而君殺之義也由三桓始也天子無客禮莫敢為主焉君適其臣升自阼階不敢有其室也覲禮天子不下堂而見諸侯下堂而見諸侯天子之失禮也由夷王以下大夫强而君殺之如齊殺無知衛殺州吁宋殺長萬陳殺三良大夫强君由是弱有殺之者更以為義其强則三家有以啟之故曰自三桓始也黄氏曰魯豈能殺强臣哉殺者降殺之義也謂大夫無饗君之禮三桓勢强而君政㣲故降殺之而為大夫所饗此章夲記大夫饗君失禮之由非言殺臣之事黄説為勝集陳氏黄氏諸侯之宫縣而祭以白牡擊玉磬朱干設錫冕而舞大武乗大路諸侯之僣禮也䑓門而旅樹反坫繡黼丹朱中衣大夫之僣禮也故天子㣲諸侯僣大夫强諸侯脅於此相貴以等相覿以貨相賂以利而天下之禮亂矣諸侯不敢祖天子大夫不敢祖諸侯而公廟之設於私家非禮也由三桓始也宫縣者鍾磬之屬縣於簨簴謂之縣天子之制四面皆縣如宫室之有牆故謂之宫縣諸侯則去其一面猶軒車之有藩謂之軒縣白牡殷牲殷尚白也大路殷路殷乗木路也凡皆天子乃得兼用之天子擊玉磬諸侯石磬朱干設錫者朱色為盾用金琢傅於盾背大武諸侯雖亦得舞武惟天子則冕而舞臺門者築土為臺其上立門旅道也樹立也樹立於旅道而立屏反坫據周書注向外室也鄭氏云反爵之坫五色偹曰繡白與黒曰黼丹朱中衣者以丹朱為中衣之縁飾正服在外其中為中衣諸侯僭天子大夫僣諸侯相貴以等夷相覿相賂以貨利而天下之禮亂補天子存二代之後猶尊賢也尊賢不過二代尊往者之賢而封其後太逺則不相及補諸侯不臣寓公故古者寓公不繼世寓公失地之君寄寓於他國者也以其當南靣故不臣之以其失地則不能自紹其先故不使繼世用方氏補君之南鄉答陽之義也臣之北靣答君也大夫之臣不稽首非尊家臣以辟君也君南鄉對天臣北靣對君大夫不使其家臣稽首嫌於以君自處所以辟國君也用孔氏補大夫有獻弗親君有賜不靣拜為君之答已也諸侯雖有君道然亦天子之臣故於大夫有相答之禮凡大夫有獻於君及君有賜於大夫皆託於小臣以出入而不敢親靣慮煩君之答已也用方氏補鄉人禓孔子朝服而立于阼存室神也禓鄭讀如傷近音陽禓鄭氏謂强鬼名陸氏葉氏讀楊如陽謂儺有二名曰儺猶禳也以禦隂為義曰禓猶禬也以抗陽為義孔子曰射之以樂也何以聽何以射孔子曰士使之射不能則辭以疾縣弧之義也射以樂為節善其兩事相應故曰何以聽何以射言其聽於彼而射於此聽以耳而射以手妙合為難也射者男子之事始生縣弧門左示有射道而未能今既長不能射而辭以疾故云縣弧之義用孔氏補孔子曰三日齊一日用之猶恐不敬二日伐鼓何居音姬齊者不樂專一其心也三日齊而二日伐鼓祭者情散意逸故譏而問之家語載季桓子将祭齊三日而二日鍾鼓音不絶盖其事孔子曰繹之於庫門内祊之於東方朝市之於西方失之矣祊當在廟門外之西室繹又於其堂神位在西也此二者同時而大名曰繹其祭禮簡而事尸禮大朝市當在市東偏周禮市有三期大市日側而市朝市朝時而市夕市夕時而市社祭土而主隂氣也君南鄉於北墉下答隂之義也日用甲用日之始也天子大社必受霜露風雨以逹天地之氣也是故䘮國之社屋之不受天陽也薄社北牖使隂明也䘮息浪反北墉社内北墻也䘮國之社存亡國之社為戒也主於此而言則曰勝社夲其地而言則曰薄社薄即亳古者東有亳社西有國社故以朝廷執政之地為間于兩社社祭土主隂氣故祭社時社在南設主壇上而北靣君立北墻下而南鄉祭之是答隂之義也日用甲者陽始於甲而物生故社用甲隂極於辛而物成故郊用辛風雨至則萬物生霜露降則萬物成故社不為屋以受風雨霜露使天地之氣通薄社即殷䘮國之社故屋之不使通惟開北牖示絶陽而通隂孔氏方氏社所以神地之道也地載萬物天垂象取財於地取法於天是以尊天而親地也故教民美報焉家主中霤而國主社示夲也唯為社事單出里唯為社田國人畢作唯社丘乗共粢盛所以報夲反始也社國所祀中霤家所祀皆土神社事祭社事單盡出里謂離所居社田為社而田獵取獸供社祭畢亦盡作起行丘乗十六井為丘出車一乗丘言地乗言賦粢稷也在器曰盛地有其物天垂其象所謂在天成象在地成形載物以利民用故言取財於地垂象以示民則故言取法於天尊天故惟天子祭天親地故教民莫不祭地家祭地於中霤國祭地於社皆示生養之夲在地也唯社祭傾里而出唯社田舉國而行唯盡丘乗皆共粢盛唯社為然而他事則不然報夲反始之禮重也用鄭氏方氏補季春出火為焚也然後簡其車賦而歴其卒伍而君親誓社以習軍旅左之右之坐之起之以觀其習變也而流示之禽而鹽諸利以觀其不犯命也求服其志不貪其得故以戰則克以祭則受福鹽去聲火星以春見木氣終於辰而火生繼之也故以季春出火焚為燒除宿草簡擇也歴有試之意車賦即司馬法自六尺為歩積而至通十為乗出革車一乗卒伍者五人為伍五伍為兩四兩為卒軍法立於伍成於卒流示之禽者驅其禽而示之絡繹迅速如流鹽讀為艶驅禽而示之是歆艶之以利也不犯命者謂範我馳驅而不茍於得禽也失伍得禽則為犯命矣社必先之以焚者焚其宿草而後可田以田而所得之禽因以祭社故君親自誓社教陣訖而行田禮驅禽於陣前以流示之使之艶歆於其艶動之際而觀其恪守誓命不敢違犯誓命以詭遇獲禽是求以服士卒之心使進退如命而非貪其所得之禽也故以此衆戰則克勝以此獸祭則受福夫兵者不祥之器若無故而習是習殺人也故因田而教焉鳥獸魚鱉皆函血氣若無故而殺是暴天物也故因祭而田焉明非好兵也為田獵也非好田獵也為祭祀也外彰事神之禮而内寓不虞之備聖人以順動如此用孔氏方氏李氏補天子適四方先柴所至告天補郊之祭也迎長日之至也大報天而主日也兆於南郊就陽位也埽地而祭於其質也器用陶匏以象天地之性也於郊故謂之郊牲用騂尚赤也用犢貴誠也郊祭在建子之月陽初生而日浸長故曰迎長日之至月令仲夏日長至者至極也言日長至此而極此云迎長日之至者至來也言日長自此而始大報天而以日為主者於天神無所不報以迎長日之至故以日為主日衆陽之宗也兆謂為之區域如龜兆也匏以氣生陶以土成故謂象天地之性騂色赤赤者盛陽之色犢者小牛誠未散故曰貴誠用張氏方氏補郊之用辛也周之始郊日以至用辛者以冬至陽氣新用事人君當齋戒自新然冬至不常在辛用辛則似不用冬至之日而用冬至之月横渠謂自冬至日以樂降神為郊之始而未祀既降神乃用辛日而祀故曰迎長日之至又曰郊之用辛也周之始郊日以至集卜郊受命于祖廟作龜於禰宫尊祖親考之義也卜之日王立于澤親聽誓命受教諫之義也獻命庫門之内戒百官也太廟之命戒百姓也卜日者崔氏謂卜日以至日為主不吉乃用他日方氏謂卜上辛中辛下辛作龜即灼龜澤者澤宫将祭以射擇士之地庫門在雉門外入庫門則至廟門外獻命庫門之内者謂王自澤宫而還有司獻王所以命百官之事郊事既尊不敢專輙故先告祖謂之受命尊祖也既告而後卜龜於禰宫以質其可否親考也卜之日王既先受誓戒于澤宫退而復誓戒其臣百官盖授之以官者䟽也故于庫門百姓盖賜之以姓者親也故于太廟皆使一心以恭承祭祀鄭氏孔氏方氏祭之日王皮弁以聽祭報示民嚴上也䘮者不哭不敢凶服汜埽反道鄉為田燭弗命而民聽上汜亦作汎埽素報反聽祭報聽有司報白行事之期如逆粢省鑊書典于王告備于王皆祭報也汜埽謂郊祭所經之地皆汎埽也反道謂剗令新土反在上也田燭田首為燭以照道皆謂郊道之民為之也王皮弁以待宗伯報曰祭期然後服祭服而行祭事以天子之尊而嚴於事上帝如此則民莫不從而傚之故是日有䘮者不敢哭不敢凶服皆汜埽反道鄉為田燭弗命而民聽上以上有以先之也用鄭氏馬氏補祭之日王被衮以象天戴冕璪十有二旒則天數也乗素車貴其質也旂十有二旒龍章而設日月以象天也天垂象聖人則之郊所以明天道也衮象天畫日月星辰之章璪者聚采以貫玉而有華藻故謂之璪素車木路也龍章而設日月者大旂也凡祭天有兩旂兩車其乗玉路建大常旂者即道之車祭之日馭之以適郊者也其乗素車建大旂者即事之車祭之時馭之以赴壇者也方氏陳氏帝牛不吉以為稷牛帝牛必在滌三月稷牛唯具所以别事天神與人鬼也滌牢中所搜除處養牲必養二牲先卜以為帝牛不吉則以為稷牛帝牛在滌以精潔為義稷牛唯具則取足而已郊天以后稷配帝為天神稷為人鬼故其别如此用陸氏方氏補萬物夲乎天人夲乎祖此所以配上帝也郊之祭也大報夲反始也此承上文釋以稷配天之義補天子大蜡八伊耆氏始為蜡蜡也者索也嵗十二月合聚萬物而索饗之也蜡之祭也主先嗇而祭司嗇也祭百種以報嗇也饗農及郵表畷禽獸仁之至義之盡也古之君子使之必報之迎貓為其食田䑕也迎虎為其食田豕也迎而祭之也祭坊與水庸事也曰土反其宅水歸其壑昆蟲毋作草木歸其澤皮弁素服而祭素服以送終也葛帶榛杖䘮殺也蜡之祭仁之至義之盡也黄衣黄冠而祭息田夫也野夫黄冠黄冠草服也蜡仕詐反畷丁劣反為于偽反殺所界反蜡祭名八蜡先嗇也司嗇也農也郵表畷也貓也虎也坊也水庸也先嗇始治稼穡者司嗇修此嗇事者農田畯也郵若郵亭屋宇處表田畔畷謂井畔相連畷郵表畷謂於井畔連畷處造此郵舍使田畯處焉者也禽獸即下文貓虎之屬坊所以畜水水庸溝也山隂陸氏讀為祭坊及水而以庸事相連以庸為民功曰庸之庸此説得之若如古説以水庸為句既未妥下文以事也為句亦不成語矣伊耆氏始為蜡祭之人或指為神農然周官有伊耆氏以供杖咸盖以其始為蜡祭以息老也既以其民名官則未必古帝者之號十二月建丑之月祭百種盡百穀之種祭之以報先嗇或以祭百種為八蜡之一者非也曰土反其宅以下蜡祭之祝辭皮弁色白素服衣裳皆素素者送終之服而蜡亦送終之事故曰以送終也帶不以麻而以葛杖不以竹而以榛若䘮也而實非䘮故曰䘮殺言其比䘮禮降殺也蜡之為祭所以報夲反始息老送終也合聚萬物而饗之非特八神而所重者八以其尤有功於田也皮弁素服而祭者蜡祭四方百物也黄衣黄冠而祭者臘祭先祖五祀也蜡以息老物故服送終之服而以皮弁素服臘以息民故服田夫之服而以黄衣黄冠二祭葢相連而蜡其總名長樂陳氏大羅氏天子之掌鳥獸者也諸侯貢屬焉草笠而至尊野服也羅氏致鹿與女而詔客告也以戒諸侯曰好田好女者亡其國天子樹𤓰華不歛藏之種也客謂貢鳥獸之使者詔客告者使者臨去詔使歸告其君也華果蓏也諸侯於蜡使使者戴草笠貢鳥獸大羅氏掌其入於使者之歸則致鹿與女於庭使歸戒其君使毋好田好女周禮於羅氏謂蜡則作羅襦盖羅則鹿之所以獲襦則女之所以衣故致此物以戒之非實致鹿與女與諸侯也𤓰華特供斯湏之求非収歛乆藏之種故天子樹此無與民争利之嫌言此亦戒諸侯之辭也孔氏方氏周氏八蜡以記四方四方年不順成八蜡不通以謹民財也順成之方其蜡乃通以移民也既蜡而收民息已故既蜡君子不興功移以豉反移者勸民以移動之使歆羡也蜡以記四方之豐凶年凶之方八蜡之神不得與諸方通祭以謹節民財使之簡儉也年豐之方八蜡之神使得與諸方通祭以歆動民心使之效慕也既蜡則與民休息不復興功嵗終故也補恒豆之菹水草之和氣也其醢陸産之物也加豆陸産也其醢水物也籩豆之薦水土之品也不敢用常䙝味而貴多品所以交於神明之義也非食味之道也菹争居反恒豆謂朝事及饋食常用之豆加豆謂祭末酳尸之後不貴美䙝味而貴多品以交神明與人食味不同孔氏先王之薦可食也而不可耆也卷冕路車可陳也而不可好也武壮而不可樂也宗廟之威而不可安也宗廟之器可用也而不可便其利也所以交於神明者不可以同於所安樂之義也耆市志反卷音衮卷冕龍衮路車大路武執干戚而舞此總明祭祀之物宗廟之居不同於尋常安樂之義孔氏酒醴之美𤣥酒明水之尚貴五味之夲也黼黻文繡之美䟽布之尚反女功之始也莞簟之安而蒲越槀鞂之尚明之也大􅃵不和貴其質也大圭不琢美其質也丹漆雕㡬之美素車之乗尊其樸也貴其質而已矣所以交於神明者不可同於所安䙝之甚也如是而後宜越音活明水隂鑑以取於月之水𤣥酒黑黍和於水之酒蒲越槀鞂藉神之席琢讀如篆雕謂刻鏤幾謂漆飾此明祭祀器物皆不尚美而尚質補鼎爼竒而籩豆偶隂陽之義也黄目欎氣之上尊也黄者中也目者氣之清明者也言酌於中而清明於外也竒居宜反黄目黄彛也以黄金鏤其外為龜目鼎爼實牲天産也故其數竒者陽之義籩豆實庶物地産也故其數偶者隂之義黄目以實鬱鬯而上臭故祭時列於諸尊之上目之精水也其光火也以水為體故其氣清以火為用故其氣明用孔氏方氏補祭天埽地而祭焉於其質而已矣醯醢之美而煎鹽之尚貴天産也割刀之用而鸞刀之貴貴其義也聲和而後斷也斷丁亂反鹽以鍊治而成故曰煎鹽鸞者刀之鈴在環曰和在鋒曰鸞鸞鈴之聲宫商調和而後斷割其肉孔氏鄭氏陳氏冠義始冠之緇布之冠也大古冠布齊則緇之其緌也孔子曰吾未之聞也冠而敝之可也冠古亂反齊側皆反緌耳佳反緌者冠之飾敝棄也冠禮初加緇布冠者太古以白布為冠至齊則緇之以鬼神尚幽闇之義始冠而初加此者特重古耳後世乃於緇布冠加以緌之飾故孔子以為未聞而謂此乃初加時暫用既冠則敝棄之可也鄭氏孔氏周氏適子冠於阼以著代也醮於客位加有成也三加彌尊喻其志也冠而字之敬其名也適丁歴反適子者適長子著明也醮用酒每一加一醮適子冠於阼以主道期之也父以是傳之子故曰以著代也醮於客位以賓禮崇之也以其有成人之道故以是禮加之故曰加有成也三加者初加緇布冠欲其尚質重古次加皮弁欲其行三王之徳復加爵弁欲其敬事神明緇布之粗不若皮弁之精皮弁之質不若爵弁之文故曰三加彌尊服彌尊則志彌大故曰喻其志既冠賓東面而字之以成人不敢復呼其名也孔氏方氏委貌周道也章甫殷道也母追夏后氏之道也周弁殷冔夏収三王共皮弁素積母音牟追多雷反冔况甫反委安也委貌言以安正容貌章明也章甫言以表明丈夫母發聲追猶椎以其形名之也弁名出於槃槃大也言所以自光大冔名出於幠幠覆也言所以自覆飾収則言所以収斂髮也皮弁以白鹿皮為之素積以素為裳裳必疊幅故謂之積委貌章甫母追三代常服之冠即初加之緇布冠也弁冔収三代齊祭之冠即三加之爵弁也皮弁素積上古之服三代共之而不敢易即再加之皮弁也合鄭氏方氏説無大夫冠禮而有其昏禮古者五十而後爵何大夫冠禮之有諸侯之有冠禮夏之末造也禮二十而冠五十始為大夫未有既為大夫而始冠者故無冠禮禮三十而娶容有不得已而改娶者故有其昏禮天子之元子諸侯之世子古皆用士冠禮後有年未及冠而君薨即嗣位者故夏之末造始有諸侯冠禮用方氏補天子之元子士也天下無生而貴者也繼世以立諸侯象賢也以官爵人徳之殺也殺音試今讀為隆殺之殺此所以釋上文諸侯有冠禮而大夫無之也諸侯必繼世而立所以象賢也大夫不繼世為其徳之殺也方氏死而諡今也古者生無爵死無諡此言士禮檀弓云士之有誄自魯荘公始孔氏陸氏禮之所尊尊其義也失其義陳其數祝史之事也故其數可陳也其義難知也知其義而敬守之天子之所以治天下也尊猶重也禮之所重者在義而不在度數之末能敬守其義可以治天下補天地合而後萬物興焉夫昏禮萬世之始也取於異姓所以附逺厚别也幣必誠辭無不腆告之以直信信事人也信婦徳也壹與之齊終身不改故夫死不嫁逺于萬反别兵列反幣以将意故無不誠辭以導情故無不腆直信者正直誠信婦人事人者也事人必以信故信為婦徳馬氏男子親迎男先於女剛柔之義也天先乎地君先乎臣其義一也執摯以相見敬章别也男女有别然後父子親父子親然後義生義生然後禮作禮作然後萬物安無别無義禽獸之道也迎魚敬反摰音至摰奠雁也壻親迎入門先奠雁然後與婦相見所以敬章其有别之道而禮義生焉孔氏方氏壻親御授綏親之也親之也者親之也敬而親之先王之所以得天下也出乎大門而先男帥女女從男夫婦之義由此始也婦人從人者也幼從父兄嫁從夫夫死從子夫也者夫也夫也者以知帥人者也知音智親御授綏謂壻御婦車而授綏使婦登車親之也者親之也言已親之所以使之親己孔氏鄭氏𤣥冕齊戒鬼神隂陽也将以為社稷主為先祖後而可以不致敬乎共牢而食同尊卑也故婦人無爵從夫之爵坐以夫之齒𤣥冕祭服齊戒将事鬼神昏禮而用𤣥冕齊戒是敬此夫婦之道同於鬼神隂陽而神明之也牢謂牲牢牲牢異等而夫婦共牢而食示同尊卑也周氏陸氏方氏器用陶匏尚禮然也三王作牢用陶匏厥明婦盥饋舅姑卒食婦餕餘私之也舅姑降自西階婦降自阼階授之室也陶匏太古之禮器三王始作共牢之禮而用上古之器重夫婦之始也婦饋舅姑舅姑食畢而以其餕餘賜婦私之以恩也舅姑尊反降自西階以婦之卑反降自主人之阼階示授之室而使為之主也鄭氏孔氏方氏昏禮不用樂幽隂之義也樂陽氣也昏禮不賀人之序也昏有幽隂之義其用晦時以此樂陽也故不用樂代猶序也子代父之序婦代姑之序故不忍賀陳氏方氏有虞氏之祭也尚用氣血腥爓祭用氣也殷人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲聲音之號所以詔告於天地之間也尚謂先薦之也血謂祭初以血詔神於室腥謂朝踐薦腥肉於堂爓謂沈肉於湯三者並未熟而祭是用氣也此有虞氏之祭然也殷不尚氣而尚聲先搖動樂聲以求神奏樂三遍而止乃迎牲入殺鬼神在天地間故用樂之音聲號呼告於天地間庶神明聞之而至是求陽之義也鄭氏孔氏周人尚臭灌用鬯臭鬱合鬯臭隂達於淵泉灌以圭璋用玉氣也既灌然後迎牲致隂氣也蕭合黍稷臭陽達於牆屋故既奠然後焫蕭合羶薌焫如悦反合如字又音閤羶音馨薌音香灌謂以圭瓚酌鬯始獻神鬯謂以秬黍合鬱金草為酒而其氣調鬯臭謂鬯之氣鬱合鬯者又以鬱金草𢷬汁和合已成之鬯酒使香氣滋甚臭隂達於淵泉者用鬱鬯灌地是用臭氣求隂達於淵泉也灌以圭璋者瓚以􅆽鬯圭璋以為瓚之柄君灌圭瓚后灌以璋瓚璋者圭之半用圭璋者玉氣潔潤也焫燒也羶鄭讀為馨薌猶香也染蕭以膟膋為羶合蕭以黍稷為薌鬱合鬯臭隂達於淵泉以形魄歸於地而求諸隂也蕭合黍稷臭陽達於牆屋以魂氣歸於天而求諸陽也淵泉以言其幽牆屋以言其顯求諸隂以為未又求諸陽而致曲焉陳氏方氏凡祭慎諸此魂氣歸於天形魄歸於地故祭求諸隂陽之義也殷人先求諸陽周人先求諸隂此承上文釋求諸隂陽之義先求陽者尚聲先求隂者尚臭方氏詔祝於室坐尸於堂用牲於庭升首於室直祭祝于主索祭祝於祊不知神之所在於彼乎於此乎或諸逺人乎祭於祊尚曰求諸逺者與逺于萬反與音餘升首謂升牲首於北牖下直祭正祭也詔祝於室即毛血詔於室坐尸於堂即􅃵定詔於堂用牲於庭即納牲詔於庭升首於室即升首以報陽不知神之所在故於庭於堂於室以求之猶以為未也故直祭祝於主索祭祝於祊求於此則疑於彼求於近則疑於逺而庶幾神之饗也方氏吕氏陳氏祊之為言倞也肵之為言敬也富也者福也首也者直也相饗之也嘏長也大也尸陳也倞音亮肵音祈相息亮反倞猶索也肵者肵俎尸每食牲體反置於肵俎首謂升首而祭首犆而直支偶而曲故首云直也相謂詔侑祝設辭使尸饗此奠是相饗之也尸嘏主人欲使長乆廣大尸象神而陳者也鄭氏孔氏毛血告幽全之物也告幽全之物者貴純之道也血祭盛氣也祭肺肝心貴氣主也血告幽毛告全告幽所以告内之純告全所以告外之純氣行而血從之薦血所以盛其氣周祭肺殷祭肝夏祭心三者並為氣之宅故云貴氣主鄭氏孔氏方氏祭黍稷加肺祭齊加明水報隂也取膟膋燔燎升首報陽也齊才細反黍稷地産肺金藏齊五齊事神之酒明水以鑑取於月者皆隂類故報隂膟膋腸間脂燔燎之火司烜所取於日者首者陽之體升者陽之事皆陽類故報陽報隂者形魄歸地為隂而以隂物祭之也報陽者䰟氣在天為陽而以陽物祭之也鄭氏孔氏方氏明水涗齊貴新也凡涗新之也其謂之明水也由主人之絜著此水也涗始銳反涗猶清也五齊濁故泲之使清謂之涗齊盖以水解之和之也又取明水皆貴新也明水由主人之絜著於此水非徒以其取於月為明也用鄭氏周氏補君再拜稽首肉袒親割敬之至也敬之至也服也拜服也稽首服之甚也肉袒服之盡也服屈服也拜取屈服之義也以天子不可屈之勢而為之稽首肉袒則天下莫不知有尊也周氏祭稱孝孫孝子以其義稱也稱曾孫某謂國家也祭祀之相主人自致其敬盡其嘉而無與讓也稱孝祭祖禰稱孝明奉先不敢忘也稱曾祭神祗稱曾明傳國有所自也凡賓主之禮相者告以揖讓之節若祭祀之禮則主人自致其敬而盡其善故詔侑尸者不告尸以讓以事神無所與揖讓也用陸氏説及庾氏補腥肆爓腍祭豈知神之所饗也主人自盡其敬而已矣腍而審反凡牲生為腥陳為肆爚而未腍為爓熟而為殽為腍四者之薦豈知神之所饗自盡其敬心求之不一耳舉斚角詔妥尸古者尸無事則立有事而後坐也尸神象也祝将命也斚角皆爵名天子奠斚諸侯奠角古指夏時夏立尸飲食乃坐鄭氏孔氏縮酌用茅明酌也醆酒涗于清汁獻涗于醆酒猶明清與醆酒于舊澤之酒也澤作醳音亦醆創産反縮謂泲去其滓酌謂斟酒以獻用茅所以縮也縮之則清而明故曰明酌醆酒為盎齊在所造之器曰盎在所酌之器曰醆涗于清者和之以清酒也汁獻謂煑鬱金汁和酒名鬱齊直獻之而不待縮故曰汁獻也涗于醆酒者和醆酒於汁獻凡涗皆以酒之清者和酒之濁者使酒之新也澤讀為醳舊醳之酒謂昔酒也記禮者釋上文所陳云皆古禮亦猶後世以舊澤之酒涗清酒醆酒而明之盖以近今證昔也明清與醆三者皆指上文三者申言之也用鄭氏孔氏方氏補祭有祈焉有報焉有由辟焉辟古讀如弭方氏作辟去之辟以當如辟邪辟惡之辟由用也祈若祈榖之類報若秋報之類辟若磔禳及辟去不祥之類集齊之𤣥也以隂幽思也故君子三日齊必見其所祭者𤣥謂𤣥衣𤣥冠見所祭謂若見所祭之祖考神祗内則第十二后王命冡宰降徳于衆兆民后王謂天子徳謂徳教教民雖司徒分職冢宰實無所不統故以其重者言之王氏晦菴子事父母雞初鳴咸盥潄櫛縰笄總拂髦冠緌纓端韠紳縉笏左右佩用左佩紛帨刀礪小觽金燧右佩玦捍管遰大觽木燧偪屨著綦縱所買反又所綺反觽許規反遰時世反綦其記反盥洗手潄潄口櫛以梳理髮縰以繒韜髪以作髻笄横貫以固髻總者裂練繒束髪本垂其餘於髻後為飾拂者振去其塵髦以髪為之象幼時所為之鬌多果反拂髦者拂其髦以加於冠冠緌纓者結纓頷下以固冠結之餘者㪚而下垂謂之緌端𤣥端士服韠蔽膝也以韋為之與裳同色上繫於革帶紳者大帶搢扱也亦作揷笏所以記事而偹忽忘也搢笏者扱笏於紳也紛帨試物之巾刀礪小刀與礪礱小觽所以解結以象骨為之如錐金燧以取火於日玦者䕶巨指以開弦捍者著左臂以遂矢管筆彄苦侯反遰刀韠必頂反木燧以鑽火偪以邪幅纒足今之行縢綦屨繫也屨著綦者屨頭施綦夙興盥訖潄潄訖櫛櫛訖加縰縰訖加總總訖然後加髦著冠而緌纓從之然後服𤣥端著韠垂紳而搢笏然後佩用以備尊者使令凡屬陽者左佩屬隂者右佩佩然後下及行縢屨綦其序如此用方氏補婦事舅姑如事父母雞初鳴咸盥潄櫛縰笄總衣紳左佩紛帨刀礪小觽金燧右佩箴管線纊施縏袠大觽木燧衿纓綦屨縏音槃袠音帙衿其鴆反笄簮也與男子笄異衣紳衣而著紳箴管線纊鄭氏謂於箴管線纊之下言施縏袠明縏袠四物而施方氏謂針貯以管線貯以纊二説未知孰是竊意箴用以縫刺者管用以套物者線即絲纊即綿鄭氏指為四物者近之縏袠以針刺袠而為縏囊衿纓以衿結纓綦屨以綦約屨衿結也婦人有纓示繫屬也集以適父母舅姑之所及所下氣怡聲問衣燠寒疾痛苛癢而敬抑搔之出入則或先或後而敬扶持之進盥少者奉槃長者奉水請沃盥盥卒授巾問所欲而敬進之柔色以温之饘酏酒醴芼􅃵菽麥蕡稻黍粱秫唯所欲棗栗飴蜜以甘之堇荁枌榆免薧滫瀡以滑之脂膏以膏之父母舅姑必嘗之而後退酏羊支反蕡扶云反荁音丸免音問滫思酒反瀡音髓膏之之膏去聲苛疥也體煩而為苛氣虚而生癢抑按摩搔爬抓饘厚粥酏薄粥酒以麯為者其味嚴醴以蘖為者其味甘芼謂入􅃵之菜􅃵謂肉􅃵蕡熬枲實枲實者大麻子也堇菜也荁似堇而葉大冬用堇夏用荁枌白榆也免新生者薧乾者溲為滫滑為瀡凝者為脂釋者為膏及所下氣怡聲先之以和也問衣燠寒恐其冷煖失節也疾痛苛癢省其體氣弗寧也皆所以撫䘏其衰病而一出於敬非故以是為儀也父母出入則或先以引之或後以隨之或左右以扶持之相其所宜而助其力也又從而問其意之所欲食者則敬順其心以進之和柔其色以温之芬芳其味以奉之父母舅姑必嘗之而後退則以知其得所欲而後孝子之心安也馬氏方氏男女未冠笄者雞初鳴咸盥漱櫛縰拂髦總角衿纓皆佩容臭昧爽而朝問何食飲矣若已食則退若未食則佐長者視具總角總髪分而為二以其兩相對故謂之角容臭者容謂容受臭謂香物若今香囊恐身有穢物觸尊者故佩之昧爽将明未明之時具膳具昧爽而朝後成人也幼者於視膳之事未能專之惟候問之若未則佐長者鄭氏方氏凡内外雞初鳴咸盥漱衣服斂枕簟灑埽室堂及庭布席各從其事孺子蚤寢晏起唯所欲食無時此總論子婦之外凡卑賤僕𨽻等由命士以上父子皆異宮昧爽而朝慈以㫖甘日出而退各從其事日入而夕慈以㫖甘異宫猶今有逐位非如異居也朝晨省禮也夕昏定禮也慈者愛養惻怛之誠用伊川方氏補父母舅姑将坐奉席請何鄉将衽長者奉席請何趾少者執床與坐御者舉几斂席與簟縣衾篋枕斂簟而襡之奉芳勇反鄉許亮反衽而鴆反縣音𤣥襡音獨衽卧席也将衽古謂更卧處竊意将坐指日間言将衽指夜間言請者順尊者意所安也至早旦親起侍御之人舉几以進使慿之斂此所卧在下之席與在上襯身之簟又其所卧之衾枕則以篋貯之簟則以襡韜之須卧乃更鋪之鄭氏孔氏父母舅姑之衣衾簟席枕几不傳杖屨祗敬之勿敢近敦牟巵匜非餕莫敢用與恒食飲非餕莫之敢飲食傳文専反近音附近之近敦音對牟木侯反匜羊支反傳移也敦今杯盂牟土釡今以木為器象土釡之形巵酒器匜盛酒漿之器餕謂食尊者之餘也與及也恒常也旦夕之常食也父母舅姑所服御子婦不得輒傳移他處杖屨是服御之重彌須恭敬勿敢偪近飲食器非餕其餘不敢用與其常所飲食非餕其餘不敢食本鄭氏孔氏説父母在朝夕恒食子婦佐餕既食恒餕父没母存冢子御食羣子婦佐餕如初㫖甘柔滑孺子餕子婦者長子及長子之婦佐餕者父母食不能盡子婦佐助餕食之使盡勿使有餘而再進也恒餕每食常餕而盡之也父没母存食則獨矣恐母心之傷故冢子侍食而羣子婦佐餕不言冢婦者舅没則姑老冢婦已代政也甘美者則孺子餕之鄭氏孔氏輔氏陸氏在父母舅姑之所有命之應唯敬對進退周旋慎齊升降出入揖遊不敢噦噫􅅉咳欠伸跛倚睇視不敢唾洟寒不敢襲癢不敢搔不有敬事不敢袒裼不涉不撅䙝衣衾不見裏父母垂洟不見冠帶垢和灰請漱衣裳垢和灰請澣衣裳綻裂紉箴請補綴五日則燂湯請浴三日具沐其間面垢燂潘請靧足垢燂湯請洗少事長賤事貴共帥時唯于癸反齊側皆反噦於月反噫於戒反􅅉音帝咳苦愛反欠立劍反伸音申跛彼義反倚於義反睇大計反洟吐細反裼思歴反撅居衛反見賢遍反紉女陳反綴子劣反又丁衛反燂許廉反潘芳煩反靧音悔齊莊也揖抑也遊揚也方氏謂揖讓而遊息也胃受疾則噦心受疾則噫肺受疾則咳鼻出聲為􅅉志疲則欠體疲則伸偏立為跛依物為倚傾視為睇唾口津洟鼻液撅掲衣也䙝衣衾不見裏為其可穢父母唾洟不見即刷去之也手洗曰漱足洗曰澣和漬也燂温也潘米瀾也瀾力旱反靧洗面也帥循也時是也噦噫􅅉咳則聲不恭欠伸跛倚睇視則貌不恭唾咦則聲貌皆不恭故每不敢為也不有敬事如射之類則不敢袒裼不因涉水則不敢掲衣皆惡其䙝也且子之於親也衣而寒燠則問之體之苛癢則搔之而於已則寒不敢襲癢不敢搔以至父母之唾洟不見而已則唾洟不敢請漱澣請補綴請靧請浴之類無所不用其孝謹之至用方氏補男不言内女不言外非祭非喪不相授器其相授則女授以篚其無篚則皆坐奠之而后取之外内不共井不共湢浴不通寢席不通乞假男女不通衣裳内言不出外言不入男子入内不嘯不指夜行以燭無燭則止女子出門必擁蔽其面夜行以燭無燭則止道路男子由右女子由左湢彼力反嘯古作叱今如字為嘯歌之嘯湢浴室男子由右地道尊右也此言男女逺嫌防㣲之禮劉氏子婦孝者敬者父母舅姑之命勿逆勿怠若飲食之雖不耆音嗜必嘗而待加之衣服雖不欲必服而待加之事人代之己雖弗欲姑與之而姑使之而后復之尊者加己以飲食衣服己雖不欲必且順而受之以待其命若加己以事又使人代之己雖不欲人之代己亦且順而使之代待夫人之果不勝任然後復以身親之凡皆明勿逆勿怠之意方氏輔氏子婦有勤勞之事雖甚愛之姑縱之而寧數休之子婦未孝未敬勿庸疾怨姑教之若不可教而後怒之不可怒子放婦出而不表禮焉數色角反表明也子婦有勤勞之事已雖甚愛念之姑且縱其為之而寧數休之以彼共為子婦之職吾不可以姑息之愛而奪其當為之事也子婦未孝未敬亦勿庸怒之姑惟教之待其子不可教雖子放婦出猶為之隠不明其犯禮之過也用方氏補父母有過下氣怡色柔聲以諫諌若不入起敬起孝説則復諫不説與其得罪於鄉黨州閭寧孰諫父母怒不説而撻之流血不敢疾怨起敬起孝説音悦二十五家為閭四閭為族五族為黨五黨為州五州為鄉諌而父母不説其罪輕不諌而使父母得罪於鄉黨州閭其罪重故寧反覆熟諫雖撻之流血不怨本孔氏説父母有婢子若庶子庶孫甚愛之雖父母没没身敬之不衰子有二妾父母愛一人焉子愛一人焉由衣服飲食由執事毋敢視父母所愛雖父母没不衰子甚宜其妻父母不説出子不宜其妻父母曰是善事我子行夫婦之禮焉没身不衰説音悦婢子古説謂婢之子然則與下文庶子意重矣合如曲禮之婢子直言婢耳婢子父母之所使令庶孽父母之所愛育是固所當聽命至於妻妾之切近吾身者亦不敢不聽焉妾雖吾所甚愛不敢與父母之所愛者敵妻雖吾所甚宜不敢以父母不悦而畱茍父母以為善子之情雖替而夫婦之禮不可以不行吾親有存没吾心無遷改知有親而不知有巳也金華應氏慶源輔氏父母雖没将為善思貽父母令名必果将為不善思貽父母羞辱必不果決於為善決於絶其不善皆主於孝其親而發補舅没則姑老冢婦所祭祀賓客每事必請於姑介婦請於冢婦舅姑使冢婦毋怠不友無禮於介婦舅姑若使介婦毋敢敵耦於冢婦不敢並行不敢並命不敢並坐冢婦適長子之婦也介婦衆婦也不友無禮於介婦古説謂衆婦無禮冢婦不友之晦庵云未詳或謂友當作敢理或然也然不免改本文江陵項氏以使冢婦無怠不友無禮於介婦通為一句怠也不友也無禮也皆以毋字統之若曰使冢婦毋恃其長而怠忽以不友無禮於介婦於義亦通此言姑雖傳家政於冢婦冢婦當友愛介婦介婦當敬事冢婦以相和協蓋冢婦之統介婦又與姑之統子婦不同尤當曲盡也補凡婦不命適私室不敢退婦将有事大小必請於舅姑子婦無私貨無私畜無私器不敢私假不敢私與婦或賜之飲食衣服布帛佩帨茝蘭則受而獻諸舅姑舅姑受之則喜如新受賜若反賜之則辭不得命如更受賜藏以待乏婦若有私親兄弟将與之則必復請其故賜而後與之畜許六反茝昌改反婦侍舅姑者也故不命適私室不敢退不敢專行故大小必請於舅姑家事統於尊故無私貨私畜私器私假私與不敢私受人故或賜之則獻諸舅姑不敢私與人故請其故賜而後與其心終始一於舅姑也鄭氏孔氏適子庶子祗事宗子宗婦雖貴富不敢以貴富入宗子之家雖衆車徒舍於外以寡約入子弟猶歸器衣服裘衾車馬則必獻其上而後敢服用其次也若非所獻則不敢以入於宗子之門不敢以貴富加於父兄宗族若富則具二牲獻其賢者於宗子夫婦皆齊而宗敬焉終事而后敢私祭齊側皆反猶若也歸古云歸遺之歸也謂子弟若貴彼尊上歸遺器服則獻其上者於宗子山隂陸氏以子弟猶歸絶句云不敢以貴富入宗子之家以寡約入雖子弟猶歸其家也其器服雖吾貴富所有亦必獻其上者於宗子陸説尤徑在學者擇焉獻其賢者謂獻其牲之善者不敢以貴富入宗子之家不以支臨宗也終事而後敢私祭宗之親為正統己之親為旁出也凡以尊正統而一人心方氏飯黍稷稻粱白黍黃粱稰穛膳膷臐膮醢牛炙醢牛胾醢牛膾羊炙羊胾醢豕炙醢豕胾芥醤魚膾雉兔鶉鷃稰思吕反穛則角反膷音香臐許云反膮許堯反炙章夜反胾側吏反膾古外反鶉順倫反鷃音晏飯者總目諸飯而列之下文也熟穫曰稰今晩稻也生穫曰穛今早稻也膳者總目諸膳而又列之下文也膷牛􅌜臐羊􅌜膮豕􅌜也醢鄭云衍文牛炙炙牛肉也膷一臐二膮三牛炙四此四物共一行最在北從西為始醢肉醤也牛胾切牛肉也醢五牛胾六醢七牛膾八此四物為第二行陳之從東為始羊炙九羊胾十醢十一豕炙十二此四物為第三行陳之從西為始醢十三豕胾十四芥醤十五魚膾十六此四物為四行陳之從東為始以上十六豆是下大夫禮雉十七兔十八鶉十九鷃二十此四物為第五行陳之從西為始通上為二十豆此是上大夫所加禮孔氏飲重醴稻醴清糟黍醴清糟粱醴清糟或以酏為醴黍酏漿水醷濫酒清白羞糗餌粉酏重平聲醷於紀反又於力反糗起九反餌音二酏以酏黍酏當音􅊡粥之􅊡之然反粉酏之酏音餈自私反飲者總目諸飲而列之下文也重醴者謂稻黍粱三醴皆有清有糟醴之泲子禮反者為清未泲而雜者為糟以清糟二者相配而重設故謂之重醴也酏粥也以酏為醴者釀粥為醴也黍酏謂以黍米為釀粥此即上文為醴之酏也漿酢七故反酨才載反以汁滓相将者也水則清新之水也醷梅漿醯類濫凉也以諸乾桃乾梅皆曰諸和水以上皆飲之目也酒者總目諸酒而又列之下文也清謂清酒若金煑酒白謂事酒省事而即為者昔酒二酒皆白若今生酒以上皆酒之目也羞者總目諸羞而再列之下文也合蒸曰餌餅之曰餈自私反此二物皆粉稻米黍米為之糗者𢷬粉熬大豆為餌餈之黏者故以粉餌摶之酏之然反當為餰之然反以稻米與狼臅昌六反膏為之亦粥之類以上皆羞之目也集補食蝸醢而苽食雉􅃵麥食脯􅃵雞􅃵折稌犬􅃵兔􅃵和糝不蓼濡豚包苦實蓼濡雞醢醬實蓼濡魚卵醬實蓼濡鼈醢醬實蓼腵脩蚳醢脯􅃵兔醢麋膚魚醢魚膾芥醬麋腥醢醤桃諸梅諸卵鹽食音嗣蝸力戈反苽音菰夲作菰折之列反稌音杜濡音而卵醤之卵音鯤腵丁亂反蚔直其反食者總舉其目也蝸蝸牛也苽雕胡字亦作菰即周官六穀之一也以蝸為醢以苽米為飯以雉為􅃵三者之味相宜也下皆倣此以麥為飯析脯為􅃵稌稻也細折之列反稻米為飯以犬與兔為􅃵此等􅃵宜五味之和米屑之糝不必加蓼蓼味辛用否各以其宜濡豚包苦者濡謂烹煮豚肉以苦菜包裹濡雞醢醤者加以醢及醤濡魚卵醤者加以魚子為醤濡鼈醢醤亦謂加以醢及醤四者皆破開其腹實蓼其中則皆宜於用蓼者也腵脩謂捶脯而施薑桂者也食之配以蚳醢蚳蟻子也析脯為􅃵則配以兔醢食麋之外膚配以魚醢食麋之生肉配以醢醤諸菹也桃菹梅菹即今之藏桃藏梅夘鹽大塊鹽自蝸醢而下二十六物皆人君燕食所用孔氏方氏凡食齊視春時􅃵齊視夏時醤齊視秋時飲齊視冬時凡和春多酸夏多苦秋多辛冬多鹹調以滑甘牛宜稌羊宜黍豕宜稷犬宜粱鴈宜麥魚宜苽飯齊黍稷稻粱視春宜温也􅃵齊雉兔雞犬視夏宜熱也醤齊醯醢韲菹視秋宜凉也飲齊水漿凉醴視冬宜寒也春屬木故味多酸夏屬火故味多苦秋屬金故味多辛冬屬水故味多鹹各因其時味以養氣調以滑甘則四時之所同以土王四時土味作甘也牛宜稌以下各以其氣味相宜用鄭氏方氏補春宜羔豚膳膏薌夏宜腒鱐膳膏臊秋宜犢麛膳膏腥冬宜鮮羽膳膏羶薌音香腒其居反鱐所求反臊素刀反麛音迷腥音星羶音埏薌牛膏腒鳥腊鱐魚乾臊犬膏麛鹿子腥雞膏羶羊膏春陽方長羔豚羊豕之小者将盛而壮食之於助新陽為宜膳以牛膏薌則以春木克脾土以牛薌之土氣助養脾也夏陽極盛腒鱐雉魚之乾者皆斂而堅食之於抑盛陽為宜膳以犬膏臊則以夏火克肺金以大臊之金氣助養肺也秋隂方長牛犢鹿麛皆可補陽氣食之為宜秋金克肝木膳用雞腥之木氣以助養肝冬隂極盛魚鮮鴈羽皆善處隂食之為宜冬水克心火膳用羊羶之火氣以助養心用劉氏方氏補牛脩鹿脯田豕脯麋脯麕脯麋鹿田豕麕皆有軒雉兔皆有芼爵鷃蜩范芝栭蔆椇棗栗榛柿𤓰桃李梅杏椇棃薑桂軒音憲栭音而椇音矩柤側加反脯謂析乾其肉軒謂切其肉如藿葉芼謂以菜雜􅃵蜩蟬也范蜂也芝木芝也無華而實者名栭亦芝屬也蔆芰也椇枳梖也椇梨之不臧者自牛脩而下三十一品皆人君燕食所加庶羞羞百二十品記者不能次録鄭氏大夫燕食有膾無脯有脯無膾士不貳􅃵胾庶人耆老不徒食尊卑差也鄭氏膾春用葱秋用芥豚春用韭秋用蓼脂用葱膏用薤三牲用藙和用醯獸用梅鶉􅃵雞􅃵鴽釀之蓼魴鱮烝雛燒雉薌無蓼藙魚氣反和戸卧反鴽音如藙似茱萸醯人為之酸梅自然之酸釀雜切而和之鶉􅃵雞􅃵鴽在􅃵下烝之而不􅃵三者皆釀之以蓼鴽按上文鷃注云又以鷃為鴽盖兩物也魴鱮魚弱烹之易爛故烝之雛小鳥燒之雉或烝或燒無定凡三者調和皆以香草蘇荏之屬而不用蓼鄭氏劉氏方氏不食雛鼈狼去腸狗去腎狸去正脊兔去尻狐去首豚去腦魚去乙鼈去醜去起吕反尻苦刀反雛鼈鼈之小者狼能害人腸則傳道其所害之物狗陽畜腎又其陽精之舍狸善搏兔善走狸脊上一道如界兔尻有九孔豕俯聚精在腦醫方云食之昏人精神鰫魚有骨状如篆乙在目旁食之鯁人不可出陸氏云魚腸謂之乙魚敗自腸始醜者鼈之竅凡皆不食為不利人也方氏陸氏肉曰脱之魚曰作之棗曰新之栗曰撰之桃曰膽之柤棃曰攢之脱之除其筋膜作之刷其鱗新之拭其垢撰之省視其蟲蠧膽之去其毛使青瑩如膽攢之環看其蟲孔皆治擇之名也皇氏牛夜鳴則庮羊泠毛而毳羶狗赤股而躁臊鳥皫色而沙鳴鬱豕望視而交睫腥馬黒脊而般臂漏雛尾不盈握弗食舒鴈翠鵠鴞胖舒鳬翠雞肝鴈腎鴞奥鹿胃庮音由泠音零毳昌鋭反皫普保反般音班胖音判奥於六反牛晝勞夜息若夜鳴則有疾庮惡臭泠謂毛本稀泠毳謂毛頭毳結羶謂羶臭赤股股裏無毛躁謂急躁臊謂其肉臊惡皫色其色變無潤澤鬱腐臭豕俯首而食望視則首昂交睫謂瘦而目毛長腥謂氣腥而不可食黑脊言衆體皆異而脊獨黑般臂言疾在前脛般般然漏言氣如螻蛄臭雛小鳥尾不盈握言尾尚短舒鴈鵞翠尾肉鵠鳥鴞鳥胖脅側薄肉舒鳬鴨奥脾肶謂藏之深奥處凡皆不利於人不可食鄭氏肉腥細者為膾大者為軒或曰麋鹿魚為菹麕為辟雞野豕為軒兔為宛脾切葱若薤實諸醯以柔之辟必益反宛于晚反膾聶而切之軒大切而不聶辟雞與宛脾皆聶而切軒辟雞宛脾謂切麋鹿麕肉和葱薤於醯為菹鄭氏􅃵食自諸侯以下至於庶人無等大夫無秩膳大夫七十而有閣天子之閣左達五右達五公侯伯於房中五大夫於閣三士於坫一秩常也閣以板庋食物坫土坫庋食􅃵食日用惟稱有無不預為之等五十為大夫未甚老未有常膳至七十而有閣以庋食有常膳矣閣食以貴賤為豐殺五者三牲及魚腊天子倍之餘以次殺用鄭氏補凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人脩而兼用之凡五十養於鄉六十養於國七十養於學達於諸侯八十拜君命一坐再至瞽亦如之九十者使人受五十異粻六十宿肉七十貳膳八十常珍九十飲食不違寝膳飲從於遊可也六十歲制七十時制八十月制九十日脩唯絞紟衾冒死而後制五十始衰六十非肉不飽七十非帛不煖八十非人不煖九十雖得人不煖矣五十杖於家六十杖於鄉七十杖於國八十杖於朝九十者天子欲有問焉則就其室以珍從七十不俟朝八十月告存九十日有秩五十不從力政六十不與服戎七十不與賔客之事八十齊喪之事弗及也五十而爵六十不親學七十致政凡自七十以上唯衰麻為喪凡三王養老皆引年八十者一子不從政九十者其家不從政瞽亦如之凡父母在子雖老不坐有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊有虞氏皇而祭深衣而養老夏后氏収而祭燕衣而養老殷人冔而祭縞衣而養老周人冕而祭𤣥衣而養老冔况甫反記王制有此此與王制文略異凡自七十以上與凡父母在子雖老不坐是也賈蒙曾子曰孝子之養老也樂其心不違其志樂其耳目安其寢處以其飲食忠養之孝子之身終終身也者非終父母之身終其身也是故父母之所愛亦愛之父母之所敬亦敬之至於犬馬盡然而况於人乎養老如此為其近於親也言忠養嫌或偽也上言其近親者下言親之所敬愛者言犬馬以賤喻貴陸氏鄭氏凡養老五帝憲三王有乞言五帝憲養氣體而不乞言有善則記之為惇史三王亦憲既養老而后乞言亦微其禮皆有惇史有古音又今讀如字憲法也惇厚也五帝憲謂朝夕與老者親炙其仁義之容道徳之光自得於觀感不言之際至三王始有乞言之禮然五帝雖止從容養其氣體未嘗乞言偶有善言亦記之於惇史三王雖乞言亦憲法其動容之間至於乞言亦不敢以迫切耗其氣須從容款曲伺閒乗暇開端發問而微其禮焉所得之言亦皆有惇史以記之焉古者之史不一閫内者曰女史朝廷者曰國史若惇史則記載養老之史取惇厚之義為名東萊淳熬煎醢加于陸稻上沃之以膏曰淳熬淳母煎醢加于黍食上沃之以膏曰淳母母音模淳即沃熬即煎醢陸稻謂陸地之稻以陸地稻米為飯煎醢使熬加於飯上恐其味薄更沃以膏使味相湛漬名曰淳熬其八珍之一也加於黍食者盖模象淳熬而為之故名淳母母讀為模孔氏炮取豚若将刲之刳之實棗於其腹中編萑以苴之塗之以謹塗炮之塗皆乾擘之濯手以摩之去其皽為稻粉糔溲之以為酏以付豚煎諸膏膏必滅之鉅鑊湯以小鼎薌脯於其中使其湯毋滅鼎三日三夜毋絶火而后調之以醯醢将作牂山隂陸氏讀如字今從之萑音丸謹作螼徐讀如字皽章善反糔息酒反溲所九反炮塗燒之名萑蘆苴褁謹塗以穰草和泥皽皮肉上魄莫糔溲謂勻和薌脯謂煮豚小鼎中使香美謂之脯者解拆其肉薄如為脯然為炮者取豚若将刲刳之則實棗腹中編蘆包褁塗以和草之泥而以火炮之既炮則所塗之泥皆乾而擘之手既擘泥不净其肉又熱故濯手摩之去其皽莫以稻米溲和為酏付全豚之外而煎諸膏膏必没此炮豚又以大鑊湯盛此煎豚之小鼎煮三日夜而后調以醢醤此言為炮之法鄭氏孔氏陸氏𢷬珍取牛羊麋鹿麕之肉必脄每物與牛若一捶反側之去其餌孰出之去其皽柔其肉脄音毎捶之麋反餌音二脄脊側肉取其脄𢷬以為珍每物𢷬之法皆與牛一捶即𢷬之也餌古云筋腱也山隂陸氏謂餌為煎餌之餌言嘗以物為餌既熟則去其餌而出之又去其魄莫而柔和其肉遂為珍矣此言𢷬珍之法集漬取牛肉必新殺者薄切之必絶其理湛諸美酒期朝而食之以醢若醯醷湛子潜反又直䕃反期音幾醷於紀反湛浸也期朝謂周一朝醷醯之類此言為漬之法補為熬捶之去其皽編萑布牛肉焉屑桂與薑以灑諸上而鹽之乾而食之施羊亦如之施麋施鹿施麕皆如牛羊欲濡肉則釋而煎之以醢欲乾肉則捶而食之鹽音豔熬於火上為之言也此言為熬之法本鄭氏糝取牛羊豕之肉三如一小切之與稻米稻米二肉一合以為餌煎之三如一謂取牛羊豕三者之肉等分如一稻米二肉一者謂二分稻米一分肉也此言為糝之法補肝膋取狗肝一幪之以其膋濡炙之舉燋其膋不蓼取稻米舉糔溲之小切狼臅膏以與稻米為酏幪音䝉酏之然反膋腸間脂舉皆也狼臅膏者臆音意中膏也酏作餰三相參為糝兩相差池為酏謂小切狼臅膏與稻米為酏也此言為肝膋之法補禮始於謹夫婦為宫室辨外内男子居外女子居内深宫固門閽寺守之男不入女不出閽掌中門之禁寺掌内人之禁令鄭氏男女不同椸枷不敢縣於夫之楎椸不敢藏於夫之篋笥不敢共湢浴夫不在斂枕篋簟席襡器而藏之少事長賤事貴咸如之夫婦之禮唯及七十同藏無間椸以支反枷音嫁縣音𤣥楎音揮笥息吏反植曰楎横曰椸挂衣者也枕藏以篋簟席韜以襡用鄭氏補故妾雖老年未滿五十必與五日之御将御者齊漱澣慎衣服櫛縰笄總角拂髦衿纓綦屨雖婢妾衣服飲食必後長者妻不在妾御莫敢當夕齊争皆反将御必齊漱澣所以致潔敬婢妾衣服飲食必後長者不以賤廢上下之分妾御不當夕避上僭之嫌方氏妻将生子及月辰居側室夫使人日再問之作而自問之妻不敢見使姆衣服而對至於子生夫復使人日再問之夫齊則不入側室之門子生男子設弧於門左女子設帨於門右三日始負子男射女否姆音茂月辰生月之辰初朔之日也側室在燕寢之旁弧示有事於武帨事人之佩巾鄭氏孔氏國君世子生告於君接以大牢宰掌具三日卜士負之吉者宿齊朝服寢門外詩負之射人以桑弧蓬矢六射天地四方保受乃負之宰醴負子賜之束帛卜士之妻大夫之妾使食子接古音捷方氏如字接以大牢接見其子也卜士卜求其士以負之卜得吉者則齊宿盛服於寢門之外詩負之古注以詩為承方氏謂能詩者負之期其能言也宰既掌具故以醴禮其負子之士仍賜束帛以酬之也既又卜士之妻或大夫之妾使食其子食之者乳之也鄭氏方氏凡接子擇日冢子則大牢庶人特豚士特豕大夫少牢國君世子大牢其非冢子則皆降一等擇日卜日也此論國君至庶人接子牲牢之等并適庶不同孔氏異為孺子室於宫中擇於諸母與可者必求其寬裕慈惠温良恭敬慎而寡言者使為子師其次為慈母其次為保母皆居子室他人無事不往可者謂雖非諸母而其徳可為師者特埽一室以處孺子擇子師教示善道慈母知其嗜欲保母安其居處鄭氏三月之末擇日剪髪為鬌男角女羈否則男左女右是日也妻以子見於父貴人則為衣服由命士以下皆潄澣男女夙興沐浴衣服具視朔食夫入門升自阼階立于阼西鄉妻抱子出自房當􅎝立東面鬌下果反子生三月剪髪所畱不剪者謂之鬌夾囟相對為角縱横各一在頂上為羈男耦女竒取隂陽相須孔氏方氏姆先相曰母某敢用時日祗見孺子夫對曰欽有帥父執子之右手咳而名之妻對曰記有成遂左還授師子師辯告諸婦諸母名妻遂適寢相息亮反咳戸才反還音旋辯音遍欽有帥欲有師教而不敢怠記有成欲其成身而不敢忘執右手明将授之事左還授師順陽道孩子咳之則笑故謂之孩咳而名之示若笑而受其名方氏夫告宰名宰辯告諸男名書曰某年某月某日某生而藏之宰告閭史閭史書為二其一藏諸閭府其一獻諸州史州史獻諸州伯州伯命藏諸州府夫入食如養禮宰謂屬吏二十五家為閭二千五百家為州閭胥中士一人州長中大夫一人史則其屬吏府其藏書之室也夫入食如養禮者其與妻食如妻始養舅姑禮鄭氏世子生則君沐浴朝服夫人亦如之皆立于阼階西鄉世婦抱子升自西階君名之乃降適子庶子見於外寢撫其首咳而名之禮帥初無辭世子適長子適子世子之弟庶子妾之子此明見世子及適庶禮孔氏凡名子不以日月不以國不以隠疾大夫士之子不敢與世子同名為諱辟難也補妾将生子及月辰夫使人日一問之子生三月之末潄澣夙齊見於内寢禮之如始入室君已食徹焉使之特餕遂入御齊側皆反内寢適妻寢也初來之妾特餕其餘今妾已見子夫婦共食令生子之妾特餕其餘亦如始來時孔氏特餕所以寵之然亦使知大分已定於其初終不可得而易也孔氏輔氏公庶子生就側室三月之末其母沐浴朝服見於君擯者以其子見君有所賜君名之衆子則使有司名之擯傅姆之屬有賜謂於君有恩惠也此特所愛幸則君親自名之衆子謂衆妾之子非特愛幸者則命有司名之鄭氏孔氏庶人無側室者及月辰夫出居羣室其問之也與子見父之禮無以異也無側室故夫出避之至問妻及見子則其禮同鄭氏凡父在孫見於祖祖亦名之禮如子見父無辭家統於尊也鄭氏食子者三年而出見於公宫則劬大夫之子有食母士之妻自養其子食音嗣食子者前所謂卜使乳其子者劬勞也勞賜之也惟大夫則然士妻賤不敢使人用鄭氏補由命士以上及大夫之子旬而見冢子未食而見必執其右手適子庶子食而見必循其首旬古作均晦庵曰旬如字十日也言子既見之後凡旬一見冢子則未食時先見適子庶子則食已乃見急於正而緩於庶也循其首者撫之以示愛山隂陸氏子能食食教以右手能言男唯女俞男鞶革女鞶絲下食音嗣鞶古謂小囊盛帨巾長樂陳氏謂鞶帶也春秋傳鞶厲大帶易鞶帶許慎服䖍皆以鞶為帶其帶男用韋女用繒集六年教之數與方名七年男女不同席不共食八年出入門户及即席飲食必後長者始教之讓九年教之數日十年出就外傅居宿於外學書計衣不帛襦袴禮帥初朝夕學幼儀請肄簡諒肄以二反數一十百千萬方名東西南北不同席共食蚤其别也教之讓示以廉恥也出入欲其行之讓即席欲其坐之讓飲食欲其食之讓也數日朔朢與六甲也外傅教學之師也書謂六書計謂九數襦今之襖也不用帛為襦袴為其太温傷隂氣也帥循也行禮動作皆遵習先日所為也朝夕學幼儀者從朝至夕學幼小奉事長者之儀也簡書篇數也諒言語信實也請肄者請於長者而肄習之也鄭氏晦庵十有三年學樂誦詩舞勺成童舞象學射御二十而冠始學禮可以衣裘帛舞大夏惇行孝弟博學不教内而不出衣於既反樂謂六樂之器勺成王樂籥也舞籥文舞也成童謂十五以上象文王樂舞象武舞也謂用干戈之小舞也射謂五射御謂五御二十成人而氣强盛無慮損傷可以衣裘帛大夏禹樂樂之文武備者也博學不教者廣博學問未可為師以教人内而不出者藴徳在内不可出言為人謀慮鄭氏孔庵三十而有室始理男事博學無方孫友視志四十始仕方物出謀發慮道合則服從不可則去五十命為大夫服官政七十致事孫音遜有室聚也男事受田給政役也孫友視志孫順朋友視其志意所尚也仕官也方比也物事也方物出謀則謀不過物方物發慮則慮不過物孟子曰位卑而言髙罪也此士之事也服官政統一官之政為之長也致事則致其事於君而告老鄭氏晦庵凡男拜尚左手左陽也鄭氏女子十年不出姆教婉娩聽從執麻枲治絲繭織紝組紃學女事以共衣服觀於祭祀納酒漿籩豆菹醢禮相助奠婉紆晚反娩音晚枲思里反紝女金反組音祖紃音巡共音恭相息亮反十年不出年及十歲即常居内也婉有委曲意娩有遲緩意皆婦容之柔順也聽則有所受從則無所違執麻枲則績事治絲繭則蠶事織以機紝以箴組綬屬闊薄者為組組似繩者為紃觀於祭祀欲其習熟又納酒漿籩豆菹醢以致其禮相助長者而奠之於神焉鄭氏晦庵方氏十有五年而笄二十而嫁有故二十三年而嫁聘則為妻奔則為妾凡女拜尚右手聘者由彼而問此奔者自此而趨彼妻之言齊與之敵體妾之言接使得接近尚右隂也鄭氏方氏又江陵項氏曰鄭氏注周禮肅拜云若今婦人撎盖古之拜如今之揖折腰而已介胄之士不拜故以肅為禮以其不可以折腰也然則其儀特斂手向身微作曲勢耳鄭氏所謂撎者葢如此此正今時婦人揖禮也據鄭氏説則漢時婦人之拜不過如此或者乃謂唐武氏始尊婦人不令拜伏則妄矣周天元令婦人拜天臺作男子拜則雖外國婦人舊亦不作男子拜也况古者男子之拜但如今人之揖則婦人之拜安得已如今之伏大抵今之男子以古男子之拜為揖故其拜也加以跪伏為稽顙之容今之婦人亦以古婦人之拜為揖故其拜也加以拳曲作虛坐之勢此經言尚右手者特言斂手右向如孔子拱而尚右之尚非若今人用手按膝作跪也男之尚左亦然古跪自是一禮與拜與伏不相干凡皆項氏説也晦庵周禮九􅉔辨惟稽首頓首為手引頭至地三曰空首則頭至手不至地矣九曰肅拜最輕但俯下手軍中拜及婦人拜也愚按古者席地而坐以手引頭屈服向地即為拜故拜字從兩手百拜而酒三行者因坐俯地其勢易也是古之拜與今之拜不同軍中有介胄婦人有首飾皆不可俯伏故但俯手謂之肅拜是女之拜與男之拜不同又明矣世俗多疑婦人拜因併附之黃氏日抄卷十九
