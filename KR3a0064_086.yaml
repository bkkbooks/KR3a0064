body:
  text: 黃氏日抄卷八十六宋黃震撰記修吳縣尉衙紀事吳縣尉衙改創於開禧乙丑察院羅公相爲尉之日距震之官五十有五年間無與葺一椽瓦者而屋頽矣豈前此爲尉者皆以傳舍視哉尉古司冦官至秦漢改今名義取除奸尉安良民也世乃以其去民最近凢逮捕必由之奸豪反得借以毒吾民如震此邑所見私家升斗之租閭閻睚眦之爭𣙜酒官私受誣告若其他紛紛事無一不倚尉爲毒豈惟田里騷動民怨入骨而期限交迫吏亦不得寧厥居又奚暇居之葺開慶己未冬敵馬飲鄂渚天子赫然震怒斥去凶邪妙柬材德擁麾若節以急護畿甸根本而震適幸遭其逢因得請於部使者左司孫公曰索私租非尉職也其害有十且不仁者託名監租而繫其人死之以懼來者不知村民惟計目前名藩大閫刑人於市或梟首以徇犯者尚且接踵安有隂謀瘐死其人而人不再犯者以故死者之肉未寒而筒者之項相屬村民骨肉類不忍其親以屍檢即付之浮屠家荼毗一聚烟而寃魂終萬古莫雪矣豈不哀哉使者覧之惻然爲徧戢一路又得請於郡太守發運洪公曰甚哉俗之降也血氣誰獨無之小爭宜易化者今率張皇其辭囑郡縣吏差尉羅弓矢手捕所怨之家曰躬親自郡縣吏若尉吏卒無一不利尉躬親其至爲尉亦有自利射規者獨耆保日以擾民生日以困國家元氣坐是日以耗利在彼則害在此竊嘗譬之奸民黠吏漁獵者也視尉爲鷹犬以魚兔其民而山澤焚竭矣可不惜哉太守讀之慨然訟牒自是無躬親獨𣙜酒官上屬戸部轉運使震官小路逺不得陳一日期限迫因白之主管官陳公曰民果私酟自有酒庫卒邏之凡脱差尉司者皆私讐誣告以快私忿實無私酤也陳公悟且以非司存亦免差時則敵已遁中國已再安大丞相程公繼鎮是邦爲聖天子重布宣德意民欣若更生凡前日之紛紛者盡絶官府益以無事尉亦頼以免譴訶震廼得竊用其暇積入幕之俸并請益於邑大夫李君共爲費五千六百緡有奇自景定辛酉三月十八日役工迄五月二十八日凡聽事門廡堂寢皆新之復還疇曩之盛可以觀時政焉非特志嵗月叙興修而已也始范文正公石曼卿皆嘗書昌黎伯夷頌於聽之壁羅公謂伯夷聖之清者也聖人百世之師也作師清堂今不知其址何在因改作聽事之西偏模舊扁於碑隂而揭之庶幾無忘前人之舊有興起者又其西築臺臨道而屋其上列柏森森扁曰平逺柏羅公手植臺則前尉唐公璘增高羅公舊基改爲之唐公亦相望入臺察豈有開必先如古鸂鶒灘之類與遂併葺之易扁曰柏臺以彰二公風憲先兆既即請記其事於今吏部尚書西澗葉公乆未暇作震且滿替先條其事紀之尚俟記文屬後來者勒石景定三年壬戌嵗後九月甲申朔鄮山黃震謹書重修轉般倉記景定元年春聖天子奮張天威再安區夏四閲祀而當癸亥嵗於是邉烽之熄浸乆矣方且兢兢軍國事凡切於邉者日益蒐講謂京口轉般倉尤兩淮軍饟襟喉賜緡錢五十萬米以石計者千有三百用鳩工新其舊嵗十一月建鼛鼓明年春告成董役官劉安輦石請記工緻余曰是奚足哉盍記其大者乎或曰倉舊八十厫今修六十有一已仆不存者十有八行且併新之盍記諸余曰是亦奚足哉盍記其大者乎紹興七年我高宗用向子諲之請始以昔之置於泗真者置京口當是時諸將方會師江上勃勃乎爭驅而進指日恢中原轉般之事如之何可一日緩未幾柄國者摧一世之豪傑而奪之兵託名四大屯廩之不容出尚安以轉般爲哉倉於是易名曰大軍君子觀薛雄飛書倉氏聽壁謂今大軍倉尚榜稱轉般使人於邑不自勝淳熙初我孝宗復度地舊倉之西爲今倉方是時上親閲精鋭日夜感厲雖一飯未嘗忘中原如之何不於轉般重留意嘉定更化增飭唯謹雲屯百萬今猶頼之奈何法乆而弊至有張大糶事者嘗倚轉般爲子母相私之地雖營葺之費一毫不以請於朝識者終不以爲然於戲噫嘻然則轉般之關繫不其大矣乎葢倉之興也未嘗不出於朝廷而其弊也未有不因於有司出於朝廷也未嘗不爲經乆博大之規而其屬於有司也未有不流於侵尋便私之失倉之更革乎軍實所繫軍之弛張乎國勢所關惟我祖功宗德格於皇天聖子神孫繩繩克肖由紹興而有淳熙由淳熙而有今日復覈其事而一新其修其費胥朝廷出無異疇曩建立之初意除有司之蠧宂昌三軍之司命此其規模功用當如何而獨記工役哉言未既衆慷慨動容於是知大義之在人心其不可磨滅如此乃拜手稽首歌以颺之曰轉般之新兮紹興嘗饟軍兮三京誰與易之兮猶名大軍轉般之再兮淳熙將何爲兮規恢誰與專之兮轉而自私轉般之修兮吾皇士飽馬騰兮行恢故疆增光二宗兮世世其毋忘景定五年甲子六月吉日記立雪亭記何君茂逺橫經吳泮着亭梅間扁曰立雪取㳺楊侍伊川暝坐事也風韻灑然如見矣茂逺其望學者之自得乎一太極之妙流行天地間茍有見焉觸事而存隨地而足吾夫子川上之嘆與㸃之意固亦時見一二然大要歸於循循善誘與教不倦而已伊川暝目而坐安知非適然二子侍立雖雪不敢去葢其敬師之意反之復之使自得之自有平時之講貫在豈在一立雪間耶吾願茂逺與二三子㳺斯亭視斯扁推廣義類尚友古人映雪讀書先自孫康刻苦入推之於事窮則爲袁安門外雪深丈僵卧不干人達則思趙韓王迎拜太祖風雪中共圖安天下事循是而進立已立人念念真切工夫接續天理流動則孔門之學可幾而四時之景無非道妙雖不立雪吾知自與程子教人意脗合不然機觸神悟㳺心寂滅彼禪學者亦嘗立雪景定三年十二月日記崇壽宫記四明固山水奇絶處也慈溪之西踰二十里其地薄海氣勢益磅礴有峯特起爲五磊山突兀撑天猶若奮乎其不可遏則又岐而對發各奔駛數十里以入海東之復出於海者爲伏龍西之復出於海者爲向頭遂爲今行都國戸門皆斷崖萬仞屹立雲濤浩渺間衘地軸以浮天挹仙山之如見故其中沃野曼衍特氣扶踈人生其間往往多秀特而崇壽宫又適居其水脉之會故其烟林蓊鬰羽衣瀟灑時亦多聞人如往嵗吾叔祖黃仲清以詩聞今住持之祖張安國以草聖聞皆嘗名動一時夫豈偶然之故哉然其雲屋踈踈埀三百年莫之整以僻故也安國之法嗣曰張希聲神采精悍文而有綜理材始慨然以興起爲己任余與别二十年意其已老雖有志未必酬俄一日書來述其居已大備屬余記之且曰吾非求以記吾勤也記吾居之所自始也吾之居日廣而吾之所自始日冺非所以篤既往昭方來也吾師老子之入西域也嘗化爲摩尼佛其法於戒行尤嚴日惟一食齋居不出戸不但如今世清净之云吾所居初名道院正以奉摩尼香火以其本老子也紹興元年十一月冲素太師陳立正始請今勅賜額嘉定四年九月住持道士張悟真始建今三清殿嶽祠建於端平之乙未法堂建於淳祐之壬子藏殿建於寳祐之乙卯而山門建於景定之癸亥與夫建丈室以集簪佩建舫齋以列琴書下至庖湢色色粗備則又皆吾銖積以成未嘗以千人故雖工役之繁貲費之多皆所不必記獨念新之增者舊之忘身之舒者心之肆摩尼之法之嚴雖乆已莫能行而其法尚存庶幾記之以自警且以警後之人也余讀之曰嘻此有識之言亦無窮之思也然吾儒與佛老固冰炭佛與老又自冰炭今謂老爲佛而又屬記於學儒者將何辭以合之且何據耶因書詰之則報曰吾説豈無據者老子化胡經明言我乘自然光明道氣飛入西那玉界降爲太子捨家入道號末摩尼説戒律定惠等法則道經之據如此釋氏古法華經卷之八九正與化胡經所載合佛法廣大何所不通而限於町畦者始或秘之不以出白樂天晚年酷嗜内典至其題摩尼經亦有五佛繼光明之句是必有得於貫通之素者矣則釋氏之據如此唐憲宗元和元年十一月回鶻入貢始以摩尼偕來置寺處之其事載於温公之通鑑述於晦翁之綱目則儒書之據又如此余既審之果然希聲復緘示所謂衡鑑集載我宋大中祥符九年天禧三年兩嘗勅福州政和七年及宣和二年兩嘗自禮部牒温州皆宣取摩尼經頒入道藏其文尤悉余始復書謂之曰信矣是可記也夫天下事不過是與非善與惡兩端而止自古立言埀訓者莫不使人明是而别非絶惡而修善故能輔人心而禆世教説乆而弊始或紛之老子寳慈儉而後世事清談釋氏恃戒定而後世譏執着是豈其初然哉老子再化爲摩尼而説法獨嚴於自律如師所云殆其初之未變者師而念之而傳之則道之初在是釋之初亦在是且有近於吾儒之所謂敬於以發山川之靈異恢道俗之見聞所琳宫仙館千萬年慿藉無窮豈徒在今輪奐間師曰諾哉因録其往復之詳如此是爲記景定五年五月記霽忩記客有問霽忩於余者曰孫常州天下士以霽忩自名何居余曰子獨不觀造化之妙者乎日以烜之矣然常暘也物或瘁焉雨以潤之矣然常隂也物或慘焉惟夫雨之餘日之初綺櫺暈紅山黛眉舒於斯時也起而視萬物甲者坼者勾者達者蠕動而鳴躍者無不充滿勃鬰於天地間是霽爲天地之仁之發見而忩則霽之先見者也故由是而推之人一念内覺善念油然而生者吾心之霽也革弊而新使百姓鼓舞於快活條貫者天下之霽也霽忩方將以吾心之霽霽天下吾知其讀易餘閒釣簾倚徙六合吾戸牖氣象同此一清明也客聞而悟仰視天宇余以告霽忩霽忩笑不語但令適花露以濡毫書而掲之軒豁處景定五年七月日記湖山一覧記西湖佳麗甲天下富貴家樓臺百萬爭奇築勝莫不得所欲然湖本出南北兩山間山各繞湖蜿蜒對發以趨王城千怪萬狀彼此互挹猶莫能得其全況山盡水止城居而面墻者乎余友子陶子居此乆時援梯升簷以望僅僅見髣髴則又愈不愜乃一旦傾囊舉貸抜屋爲樓三其層巋然出墻上題曰湖山一覧不特南北山盡擁西湖以獻而凡他人之樓臺上下包絡山川與夫出城而㳺畫船金馬駢闐四時者殆無一不爲此樓設至若夜静月明水天一色凭欄俯瞰如身在太虛此時此樂與我共之者又獨造物耳然則登覧茍得其要雖富貴有力者莫能勝況脫去凡近而㳺高明以超覧萬里之會者哉景定五年九月記林水會心記行都間北可十里有瓜涇焉苕溪之沈氏居之園池静深可樂也一日復築室其勝處曰林水會心屬余記之余曰會心處不在逺翳然林水便有濠濮間想此晉人之言莊子之學也子之名室得無有取於是乎夫人一心物物可以坐照然使一有所奪雖泰山頺乎其前而不覺惟凝神息念脱去世慮則雖草木榮華之飄風鳥獸好音之過耳一一皆吾真樂也晉人夷曠宅心事外盼庭柯以怡顏枕清流而自潔脱然瀟洒之趣固宜往往如此然此特晉人之所謂會心者爾天高地下萬物散殊皆造化生息之入而至理流行之寓人爲萬物之最靈而此心又人之所以爲靈天包宇宙細入無倫何莫非此心之所會豈徒㑹之要當實以體之真見天地萬物之與我爲一又當仁以行之使天地萬物皆由我而各得其所此則有貴於吾心而人之所當盡其心者也聖賢之功雖未易一蹴到亦豈容自娛於林水之近者而已耶吾夫子川上之歎周茂叔忩前之草生意流動近而有逺者存必如是斯可言會心矣沈子曰然是吾心也幸書之以代座右銘咸淳元年慈溪黃震謹書高宗賜宗忠簡公親札碑隂記臣震洪惟高宗皇帝受命中興一時風雲際遇之臣相與驅馳艱難之會凡其羽書來上纎悉洞達無不親灑奎畫推置赤心與之斟酌可否如家人父子面謀熟議於几席間故能動中事機而其臣亦感激思奮中興之本特繫於此非尋常從容燕閒留情翰墨比也故其事定功成或勲臣角巾私第或後嗣追榮先烈莫不珍其所賜勒之堅珉崇之傑閣以誇示無窮嗚呼盛矣然此猶南渡後事爾方翠華之未南渡中原尚皆我有時則有若故贈觀文殿學士忠簡宗公實爲佐命元勲當高宗以康王出使獨公請無勤北行金兵既退獨公請即位南京位號既定又獨公結忠義兵百八十萬旁招四夷諸國約尅日滅金前後二十五表疏力請車駕還京師使當是時無從中沮撓之者則金甌無闕之天下正自無所謂南渡又安有南渡後事可誇其爲盛如今日所見者哉然則以公視諸臣際遇之先後其謀謨關繫之大又何如而雲漢昭回之章最初光粲於公之家者反猶散逸而未之顯豈混一偏安之數不同故臣子家所遇盛衰之相反亦勢然與景定五年冬臣震官京口識公之五世孫忠翊郎前知光山縣臣有大一日捧黃袱焚香脫封出龍章玉軸者二書相與肅拜敬觀則我高宗戒公速生還金使及宣諭差舟事且曰先忠簡䝉被之真蹟存者僅此爾先父提舉朝奉公遺命俾有大模而刻之力不迨者今又二十年而有大亦老矣所當遵先戒惟謹幸子有以發其意臣震謹按公以不共戴天之讎械繫其使乞斬之此爲事君盡忠高宗以二聖未還投鼠有忌戒勿殺此爲事父盡孝向若公親在君側斬使釁鼓以出兵公固身任之有餘奈何鑾輿未歸大計未决公即奉詔釋其使八人使采葛之讒無由興此爲處君臣之際盡義一舉而關繋之大者有三越今百三十有九年而五世孫始得壽之石是又忠之意孝之事且義之乆而不忘者也即此而觀推此而往又安知非天運循環無往不復而混一之占此其碩果不食者耶於是不勝悲喜之交集而記其碑之陰是冬十月二十四日從事郎冝差充兩浙西路提㸃刑獄司同提領鎮江府轉般倉分司幹辦公事臣黃震百拜謹書普寧寺修造記我高宗再造之明年翠華南渡道由丹陽嘗幸普寧寺之醫藥院宿焉方是時千麾萬騎濟濟騑騑其至如歸邑之寺葢莫大於普寧而寺又倚藥院爲重乆矣居無何當建炎庚戌嵗寺俄燬於兵存者十不能一二遺基敗屋往往紛而爲西北流寓子孫之居踰百年莫之復亦正以其規模之大故興復之難也初寺之藥院有工主之者曰慈濟師曰神濟師嵗月推遷慈濟者乆絶院今暫爲主簿㕔惟神濟之院在寳祐四年釐經界寺之侵疆稍歸神濟之法嗣曰普清又其傳曰福山起丁巳訖甲子經營再世首尾十年悉醫藥之贏之藏盡以葺寺之舊殿堂門廡佛像輪藏乃皆粲然復新房院星處兩廊外者舊十有六福山亦漸以貲復之大聖院既復即以還其徒不責償焉華嚴院雖復訪其徒無之則建屋七楹將以待四方雲水僧此其宏規義概幾與世俗霄壤隔而福山未嘗自言獨貽書屬余記寺之修曰皆吾先師之功吁亦賢矣然聞古者工役必書重民力爾方今佛屋僧廬突兀撑天者羅天下而吾民或不得徧茅以居彼之日豐此之日窮正未知其所終雖其人之賢尚亦何記之暇顧余於福山之事獨自有感焉者爾天地之造化何嘗有停息而人事不能體之以有成者自私心始人心之天理亦何嘗有間斷而私心或得雜之爲累者自其不知所當務始世利薫染良心易汨人而知所當務亦豈易能者哉頃余捧檄慮囚固嘗過所謂神濟院借爲蘧廬一宿察其事頗審夫寺以院而興意其院必加潔入其寺山門佛殿輪奐翬飛而院則反惟塵舊之仍師非一於公者與院以藥而名意於佛不暇省宿其地晨香夕燈虔誦精修而藥則特其餘力之及師非一於所當務者與帥自祝髪力守佛所謂三净戒食枯淡衣粗惡平生併卧具不置身之有皆院之有院之有皆寺之有而未嘗以一毫世利汨其心師之能一於所當務者葢以此故其寓於醫藥者皆慈悲之爲而非利之規非利之規而惟慈悲之爲此其所以能曠然大公以百年廢壞之常住爲己任恢其佛之居以為其徒之居而退視一室爲不足灑掃且不自為功也天理之未始間斷於人心者豈不於此猶見髣髴造化之未始停息於天地間者豈不於此尚足以覘其萬分之一而世因一私之膠固遂諉天下事於不可爲者豈不厚誣也耶士大夫果能出入兵刑錢穀間一切無忘乎聖人之訓而公爾忘私國爾忘家如師以一房院之力而興一寺其功用所到又當何如哉此則余所深感願從有志當世者學之也若夫工費之若干樂助之誰人師自修其細於碑之陰云咸淳元年乙丑四月庚子朔記玉皇殿記禮惟天子祭天南郊壇而不屋道家者流謂天玉皇屋而祠之徧州縣禮乎否耶人也没而神事之則有廟貌然後世不於其主於土木偶已惑矣今其祠天者例亦設之像天乎乃人待耶凡皆余所未喻也平江府城南可二里有觀曰修和舊亦祠玉皇一日道士張一雷謁余記其殿之修余因詰所未喻者則答曰子謂一元之運渾淪磅礴自呼吸頃積而晝夜而寒暑而往古來今萬物無一息不生生化化於天地間果孰主宰之而然哉天也上古神聖代天理物報本有祭厯代增飾乃郊乃明堂乃雍五畤積而迨我祥符天禧間宫觀遂參錯天下殆皆陶匏秸席之推爾豈吾道家者敢僭子又豈謂蒼𤣥冥間而天之所以爲天者止此哉天亦氣之爲爾自天而萬類皆氣聚則成形明之爲人而幽之爲鬼神夫豈有二理昔温太真然犀照牛渚見朱衣車馬一一如人間世道書所稱水府官之證如此則其所稱天府官者亦從可知且自昔夢訴於帝夢得請於帝夢至鈞天帝所或登天門八重者彼皆何所指而言故主宰之謂帝其來尚矣又豈吾道家者敢誣余聞之曰辨哉今也而泝之古幽也而證之明雖然果若而言亦何以記余聞世有冒佛之稱者朝祝髪則夕不復禮天曰神天聽法吾講下者吾今超出造化外人也嗚呼使造化果有外瞿曇氏當乘雲往來天表不假父母血氣以生且老於隂陽爐炭以病死矣何誣天至此故佛老之説雖並行余寧取老子説之本乎天老之説本天而凢鬼神事借之甚者淫祠附庸林立廊廡春秋之簫鼓駢闐往往不之正而之他是又何爲者故叢於老子之祠者雖不一余又獨取玉皇殿之尊上帝儼上帝之如在肅人心之正敬使天下崇飭香火者皆如玉皇殿之爲則亦庶乎足以禆世教是可記也已乃爲輯其事而系之銘曰昔皇祐嵗癸巳殿丞公姓李氏名龜齡實肇始肖像貌極崇美十一曜旁列祀楊勝者居同里再感夢倏驚起築槖槖新殿戺奉以遷尊莫比成公瑨記如此靖康火獨不燬於休哉亦神矣然歴乆殆於圯嵗癸丑寳祐中剥斯復棟窿穹革塵蝕華聖容主者誰鳩此工道都轄沈大灴助者誰貲用豐懷寧令金起宗有餘力振元雷增重樓撞鴻鐘來衆敬綿無窮偉初昔記斯宫王禹偁文章公彼所載此不重大禹寺記淳祐初越有清修高識之士施侯商輔忤時相去國放浪山水一日與余扁舟過鏡湖上禹宂肅拜敬觀惟窆石尚存可驗其爲古者碑繂之制石有篆文則已不可復辨退而酌水飲泉遊所謂大禹寺亦復弊陋將就圯於是相與徘徊者乆之顧山川之寂寥感古今之異變爲之喟然太息曰大哉禹也而衣冠所藏之地乃亦莫之省與夫禹宂之名天下已幾千年於蕭梁以後晚立之佛寺我固無待於彼也然自昔聖賢有功於一方則一方之人心不能忘有功於天下萬世則天下萬世之心不能忘事以時殊制隨事立則守墳域禁樵牧時汜掃寄一寺以代古人萬家之守亦有不容盡廢者吳越王錢氏嘗脱兩浙於五季干戈糜爛之際以歸有德我宋忠厚尚詔立寺冢旁以慰浙人之思況水自鴻荒無歸而極於堯四海一壑矣禹也脫生民於魚鼈開萬世以康莊大功既成執玉帛朝會此山之下者萬國遐想此時輪蹄雜遝鬰鬰葱葱聲教之精明薄日月而埀宇宙者端於此乎煌煌起也此其陵冢之繫屬人心過錢氏幾萬萬今其守視者顧反出錢氏下乎方今聖世清明慨思禹績方將規恢萬里而會稽率在帝鄉必有出而爲之經理者越二十年余官中都越人前歸安令黃君岳卿俄以寺主僧惟則之工役始末來曰寺之昔弊者今新矣余問昔何以弊今何以新岳卿曰弊之者禪也寺始於梁大同十一年時未有所謂禪也雖或昉以禪之萌蘖來梁未之納也且禪自稱教外别傳是於佛書無證其果爲佛與否莫知也頃自禪日盛而其徒嘗攘此寺以居之禪蕩無檢律佛其祖也佛且爲其所呵於寺何有於禹之宂又何有其寺之日以弊者勢也惟則吾弟也闕其出家守佛教慈悲不殺而律已嚴今太師判宗福王聞其賢强起之屬使守禹陵郡以是聞之朝而朝以是奏之皇帝戒禪學者勿復預惟則始得一意經營起寳祐丙辰迄咸淳戊辰而寺之廬壹是更新且視昔加宏大寺之田凢侵疆盡歸且謀增闢故惟則願有記余曰可也禹之功終天地不可磨則寺亦將與之俱不磨況余與施侯疇昔之言驗乎且此不特爲寺而記爲禹記也不特爲禹而記爲今日之纘復禹績有開必先記也然安知不復有太史公不逺江淮數千里走而探禹穴者胡不少需以使之記而顧以屬宵人耶雖然姑草以俟咸淳四年五月吉日慈溪黃震記龍山壽聖寺記自有天地以至於今其始無一日一事不趍於實而天下之所資以爲天下者漸以備矣則反又無一日不轉而趍於虛嗚呼異哉其殆始於周之衰乎人之初生也惟憂飢無以充爾寒無以禦爾震風霖雨無以庇而疾痛無以治療爾人生而漸衆則又憂相爭相奪之無以禁相親相接之無以叙遺忘之無以記而交易之無以志要約爾他豈其所預知縱他有新奇詭異非常可喜之説亦何救吾實利害也哉天生時地生財凡可救吾實利害者幸己無不有而非聖人則不能致其用聖人者作乃教之食教之衣教之宫室以興其利教之醫藥以去其害而又教之書契從而明三綱五常以經紀人極凡皆人生斷斷不可一日無者也皆實者也自羲黃堯舜積而至成周然後漸以大備嘻亦勞矣亦至盛矣不可復加毫末於此矣奈之何風氣日開人僞日滋而議論日以勝實之極虛之始時則有若莊周列禦冦之徒食享吾之成而不憂飢也衣因吾之有而不憂寒也宫居矣不憂風雨而疾痛有藥不待甞試百草之辛毒也生長於君臣父子之常習熟於禮樂文物之懿而不復知其得自别於禽獸者皆聖人之繼天立極開太平力也於是倨傲鮮腆付天地萬物於一噱而戲言之盡反天下之常以爲怪盡嗤鄙人生之斷斷不可無者以爲不必有竊嘗譬之家之方興祖父銖積以有田廬以知詩書以明訓其子孫爲子若孫者不知稼穡之艱難乃諺既誕反笑祖父之無聞知起而馳馬試劍一切從事無成妄意神仙黃白之術飄飄乎自謂當乘雲帝鄉而不知家則索矣談虛者之關世變何以異此後數百年而有西域佛氏之説來其初本以慈悲不殺戒人斷惡修善而止未幾世降而晉又降而元魏莊列之説益以泛濫則又溢而勦入佛氏中以其前日紛亂吾聖人之常者而紛之謂善惡爲無二謂有心而修善爲不可謂無心而殺人爲無傷以一切掃除佛氏之初説世既日趨於虛不惟佛之徒習之不悟士大夫類亦浸淫其説以爲高而世變如江河益滔滔下矣明溥師大成本佛者也一日介余同年進士徐君德玊託余記龍山壽聖寺之成乃曰此吾以醫藥之贏爲之也闕自吾祖保和師闕至大成闕三世皆益以醫藥濟人而人信之故雖不求贏而贏反多闕乃相地往來之衝負山揖江起寳祐甲寅經營十年以成今之屋數百楹既又以闕至者無以飯與居而守者無以衣闕乃買田吳門千畆買山朱橋數百畆闕葢無一非醫藥之贏之爲亦無一非醫藥濟人之心之推也余聞之曰然師之事善矣是足恢佛氏之初説矣然則實理之在天下亦豈容一日泯者哉置之屋附之田園而醫藥肆之列通衢如舊是飢必不可以無食寒必不可以無衣庇風雨必不可無其居而療疾痛必不可以無藥食也子孫三世恪守而汔於成祖屬子孫世守之而名之曰祝聖人壽殿閣翬飛齋廬冰净粥魚飯鼓濟濟就列而又託文墨以誦述之是君臣父子之常必不可廢禮樂文物之懿必不可缺皆是也自莊列而下日趨日盛之虛徒口説耳如以其説也雖士大夫亦不免淪於虛如以其事也雖佛氏亦終不容不歸於實是尚不足以自反乎抑師之得以成此者醫也余聞佛之稱醫王稱藥師者非必如今神聖工巧之謂而救人心之病之謂也若今人心之病孰大於談虛試以此語療之可乎咸淳四年四月二十八日黃震謹記梅溪記自栁下惠樗里子以其所居稱而後世多効之近王龜齡稱梅溪効之者益衆然必各有其實也趙君元父生王侯家於山林本無雅故亦扁其居爲梅溪於是或疑而求其説曰豈高山景行之意豈清標逸韻之寄豈舊家苕霅多幽趣而此乎誌君皆不謂然獨問余動静無端陰陽無始有諸余謂氣一耳由動静始有隂陽之名交迭相摩固不見其端與始然造化無形惟物有稽往則必復動者其候草木黃落而萌動霜降水涸而泉動至於一花初白疎影浸流生意胥動孰此爲昭著他日春徧宇宙芳潤拍塞皆由此擴充爾此非動之端陽之始乎君笑謂此正吾名梅溪者也然則君於生意之妙得矣尚於擴充者勉之哉咸淳二年臘月十日鄞黃震記平山記凡地皆欲其平陸不平車轂摧水不平舟檣危土田不平禾稼萎惟山則不然山高者也高者平之反也維石巖巖峻極于天何平之有嚴陵洪君國梁乃獨以平山名葢天下事惟高者最宜平此義於山可知孤峯絶岸壁立萬仞雖有攔蘿踏石而登者亦風急寒峭凛不可留殆絶物矣惟夫振履陂陁升高自下登峯造極恬不爲訝去天尺五四海一顧身安步舒如遵大路則山雖高而愈宜故自昔言山者不特平山欄檻爲世歆慕磐石坐千人則吳山之平也潭毒築營壘則蜀山之平也上有瑤池醴泉則高莫高於崑崙山亦未嘗不平也開闢至今理已如此達人大觀皆可意會傳不云乎極高明而道中庸吾謂此洪君國梁之謂咸淳丙寅冬黃震記恥獨記羅君季清與余幼同里閈且同舍先余十五年登科從官四方契闊浸乆然每見則議論輙益新知其不以仕廢學咸淳丁卯春再會余行都忽屬余記其居曰恥獨余於是歎季清之學其成矣葢蘧伯玉欲寡其過而未能此恥之始事也切己者也至其後恥獨爲君子此恥之終事也推己者也伊尹恥一夫之不獲自其禄以天下弗顧來吾夫子已欲立而立人已欲達而達人其用心可謂廣大至自言其所恥亦退託於巧言令色足恭之類僅僅與左丘明等爾聖賢爲學次第由己及人每如此今吾季清本物我同得之理興與人爲善之念所謂自明明德而新民夫豈一日之積覩陽春之播物遡沍寒之歸根余於是竊有感焉者夫余雖不肖亦人耳豈獨無天理萌動人欲銷沮之時而志不勝氣率落頽惰嘗讀書見古人心與天地同固慨然恥其不及矣未幾掩卷而倏忘之依然故吾無恥也嘗筮仕見州縣或以非道加其民固勃然恥於力不能救矣未幾因循茍禄非甚不可者亦或奉行之依然故吾無恥也已之未能自恥而暇爲人恥乎季清能恥衆人之不爲君子何余之未能自恥其身之不爲君子也孟子曰恥之於人大矣周子曰人大不幸無恥余本非無恥者而今若是殆於無恥之恥無恥矣倘於是而一有觸焉其爲動可恥也當若何而今而後痛切自恥庶幾獲爲君子之歸是又再新於吾今日季清之賜故爲記之因以自警是年之五月丁酉日記積慶庵記混沌剖而山川疏列太和暢而人物挺秀扶輿清淑其爲呈露則均爾然而人傑地靈相與發揮往往又必有所待而後顯豈非其所重尤係乎其人也哉會稽之東將百里有山高出曰皇會乃聳而爲烟翠之奇峯凡七復聚而東奔曹娥大江之上勃鬰未既蟠踞復起世以其形似名獅山獅山之下有鍾氏而居之至余友君遇益以文行稱所謂人傑地靈相與發揮者其不遂顯於今耶君遇既窆其父止善居士於山之阿復架屋其間題其顏曰積慶而屬余爲之記余因得以明山之所由積而其在人者則有不待言也夫山天下幽僻之地也若獅山去城郭爲尤逺然其山脈膏以起其植物也兌以澤濬流下注演而爲篤孝之江流光馳景却顧於斷蹊絶壑之下蘭蕙之芳從風逺暢而慶雲亦時乎出焉是果孰爲之而然者一陰一陽造化樞紐繼之者善而山得之以爲山山之性亦無不善善之積也厚則善之發也宏獅山雖崖石皴栗或性類剛惡要亦萬不能一二是山之所由積而善之爲慶者然也而況於人乎故大學之論明德曰在止於至善大易論積漸之由來曰積善之家必有餘慶夫止於至善而不遷則謂之積積於其家而不已則謂之慶自昔德厚流光蟬聨赫奕者何可勝計此亦不待余言而知者也況有如君遇家之素積者乎方今聖世急賢燁燁乎起自帝鄉與獅山相發揮者必吾君遇矣又何待余之言而亦竊有請也夫善非積於家而已也非徒善之爲而已也士君子出而兼善天下必去其不善者而後善斯漙也昔晦庵文公言所畫獅子必曰使百獸腦裂夫公善類之宗也而其言若是可以想真善之所在矣仰止獅山君遇勉之君家之慶尚當廣而爲世道之慶景定三年十一月十六日鄞黃震謹記省齋記此心齊一之謂齋士大夫謂所居曰齋葢不待盤盂几杖之徧銘所以維持此心者已一字該之矣世乃復他有所取以名其齋如舫齋之類何哉俞侯立父大參文惠公之聞孫行已治民動有法度余固乆知其必有得於此者俄一日貽書謂余嘗得滄洲程公篆題省齋之扁其爲記之將日三省焉余於此益信侯之有得於此葢深而名齋未有切於省者也夫齋於其心言也心者吾身之主宰靈明廣大與造化相流通所以治事而非治於事惟隨事謹省則心自存正不待治之而後齊一也危微精一之語萬世道學之源要不過求所謂中者而執之故自數聖人而傳之孔子惟曰居處恭執事敬與人忠則心不待言而自貫通於動静之間曾子親得孔子之傳亦惟曰謀不忠乎交不信乎傳不習乎將心不待言而自昭徹於流行之際孟子不幸當人欲橫流之時始單出而爲求放心之説然嘗言曰君子以仁存心則心有所主非虛空以治心爲可知至於齋心服形之老莊一漲而爲坐脱立忘之禪學始瞑目株坐日夜仇視其心而禁治之及治之愈急而心愈亂則曰易伏猛獸難降寸心嗚呼人之有心猶家之有主也家有主反禁切之使一不得有爲其擾者勢也而訝心之難降與故世有竭平生之力以從事於禪適足以槁馘其無用之身他尚何望奈何世習纒染似是易惑雖明闢坐忘之爲坐馳者亦或諭學者之静坐震不自意滔滔流俗承虛接渺談空演妙之極乃有踏實聖門以省名齋如吾俞侯者然嘗聞之曾子日省之三特自指工夫之闕處爲言侯而善學雖不一一襲步邯鄲可也由太極流行而有此身則當省其所自來人與天地並列而爲三則當省其所自立自君臣父子之大倫至服食起居之委細天者無不在焉則當省其所自行且學者之用工亦各有自得俞侯之内省既非他人之所得盡知異日俞侯之有進又非今日之所能前知顧其所以自省者進進何如耳顏子有不善未嘗不知知之未嘗復行非無時無事不省而能爾乎咸淳三年三月既望鄞黃震謹記水竹村記易曰天地變化草木蕃果孰爲之流通而成變化也哉葢嘗乘旦氣之方清對晨光之熹微顧瞻庭竹露葉珠埀下視其本微濕環之狀若連筒灌畦之爲因而潛心探賾有以窺天地相與流通之機矣向若地不闕亦如天之圓地惟隤然塊處非有廣川大谷以脉絡其間則流通之無所造化亦幾乎息萬物將安從生今其周匝於地勢之四埀既無非海朝夕吐納無一息停長江大河復統衆流以相與渾浩流轉其内雖鑿地得泉爲沼爲井氣亦蒸蒸上騰與海之茫茫江河之浩浩升而爲雲浮而爲漢者同一暢以達惟平陸之亢仰土膏之易燥則時又振山川以出雲騰百川而作雨風雷一晻靄布迅之餘彌六合皆水氣而生生化化者林林濈濈矣嗚呼此乾畫連三之爲天此坤畫斷六之爲地而乾連突出於坤斷之中爲坎者與然則天一生水地六成之坎爲水位於子造化之機始於子天道循此以南轉嵗一周回而造化成茍凡得此以生孰能自外於天地之所以流通者虛其中竅於關節脉理而水氣滋之物皆然竹惟甚其心爲最虛其水之由地而升爲最易貫四時而不改歴千嵗以長青夫豈偶然之故而能爾哉故君子於竹也有以知水之流通於萬物於水也有以知造化之流通於天地而舉一以概其餘且知伏羲氏之仰觀俯察逺取近取以畫八卦其義於是爲精而造化之勞乎坎亦明矣豈必乾南坤北而曰先天也哉余同館潘君約之超特之士也家三山之勝處其地曰三溪俯一曲之清流植臨流之萬竿蕭然讀易其間浩然與造物者同游求東澗湯先生題其居曰水竹村而屬余爲之記余聞之欣然有契因書其所見以遺之然君之居正余之志也君方年壯氣鋭進進德業異日同贊造化之妙以潤澤天下則君之事也詩不云乎瞻彼淇奥緑竹猗猗説者謂其興問學自修之益如此惟君其勉之咸淳四年三月十一日慈溪黃震謹記寳善堂記楊寳仁心愛物發於天性之真而子孫之興勃然其所由興者非善而何至關西夫子乃能以其身繋國安危身雖去國凛凛大節常能屹漢鼎而增之重一何壯哉顏魯公以鴻毛芥草視禄山希烈猝然之橫逆英風偉概去今千載之下猶若其在斗牛間竊意其慷慨自將不拘拘小善之爲者及觀其自叙家世乃自顏延之諄諄訓戒惟善是務世守惟謹以歴隋唐葢自昔士君子開公侯衮衮之源固未有不自積善始亦必其後之人愈擇而愈精故能愈乆而愈盛如其不然陳太丘四世之名非不重蕭瑀八葉之傳非不貴然以陳羣之材猶不過隨世就功名蕭鈞而後亦未見其能增光前文人而況其餘冉冉紈袴之習侵尋至於盛衰易位高岸爲谷適重有識之歎者嘻試起其初之積善而興果有異乎哉嘗觀夫子繋易謂一陰一陽之謂道而繼之者善是雖天地之所以孕化人物亦不過惟其善及其次第人品乃曰聖人不可得而見得見君子斯可君子不可得而見得見善人斯可若以善爲僅僅者孟子道性善直謂人皆可爲堯舜及其次第人品亦以可欲之爲善爲二中四下之始基是非自相背馳其説也天地初賦之善雖聖神何能加毫末而此善一入於氣質之禀往往易溺而流於柔變化氣質以盡復其天地本然之善是又存乎其人焉故人而用心不剛則見善雖明與無識同安爲人子孫而繼志不力則襲其爲善之慶鮮亦不淫於富貴爲善之不可一日不勇固如此余友史猷夫以忠定越王諸孫幼孤寓京而能不豢於膏粱不眩於繁華刻苦自立閉戸讀書雖仕進不暇問非剛有力者疇克爾一日俄訪余俾記其所居寳善之堂余曰美哉子之所寳也我朝蟬聨赫奕鐘鼎相輝孰有如君家之盛世或以其太盛也而掩其善不知其所以能盛者正以其善爾是豈容於不寳哉夫自而祖越王習於八行公世積之善爲寒士時已作夜香文祝幽明萬類欲無一不被其福爲尉時家未有立錐地已能辭醋息錢月二萬不受辭捕盜賞不受而爲橋黄山以濟自古莫救之覆溺及達而爲帝者師則一念惟欲與天下相安出而帥越亦必築月河二斗門以爲百姓無窮之利移而帥福建則又括廢寺田四十五頃立義莊以育上四州不舉之子尋甃棲霞嶺至水口凡七百八十里民到於今頼之此其爲政之善固不暇悉舉迹其平生官至太師壽登九袠朝夕會賔朋而未嘗殺一生物此何止黃花飼雀之心作童丱須知切切然訓迪其子若孫飲食衣服莫不有戒殆亦無媿顏氏家訓之意然則君家之蟬聨赫奕鐘鼎相輝夫豈偶然之故正惟爲之後者當知所自出而常寳此善耳正惟寳此善者常以剛而防其柔耳剛則利害不足以動必無計較心以揺此善剛則權位不足以滯必無持固心以違此善剛則財貨不足以汙必無封殖心而戕此善窮則以其善而獨善其身達則以其善而兼善天下卓然天地間常爲大丈夫雖蟬聨赫奕鐘鼎相輝視之直不過大空一浮雲而何至寳非其所當寳哉猷夫其勉之積善餘慶豈特將永爲君家之寳故家喬木吾國亦將永得善人以爲寳矣猷夫其勉之咸淳四年戊辰嵗重陽日慈溪黃震記高郵軍社壇記天豈徒高高在上者之爲天也哉地塊然其下也而有燥濕温冷天之爲也人藐然其中也而有呼吸運用天之爲也天包乎地而人生乎天地之中故分而言之雖曰三才實則地之所以爲地人之所以爲人亦無往而非天也夫惟無往而非天也天心之仁於是乎有妙合於此者焉天之仁寓於地謂之土以生黍稷稻粱以養萬民而主宰乎是者爲社禝天之仁寓於人謂之心以明仁義禮樂以治萬民而主宰乎是者爲王侯故凡位王侯撫社稷者是即天心之仁之妙合也然天心之仁無非爲民計爾神固無異於天人則未必能盡純乎天社稷固無愧於王侯王侯則未必能盡無愧於社稷孟子稱水旱變置社稷者直指人嘗有功於民而配饗社稷如句龍后稷之類爾若天之所寓以生物曰社稷云者容得而變置之也哉是以自昔聖賢不惟貴爲天子以天自處雖分命諸侯如曰助王宅天命作新民亦未嘗不命之以天及諸侯受命而復於君如曰勿予禍適稼穡匪觧天命降監亦未嘗不自任以天念念以天視民惟恐或愧至於雨暘豐耗非人力之所能預又舉而屬之社稷之神以全天之所爲民者天心之仁之妙合者於是乎在世變不古此意不明今之太守古之諸侯謾不知我之所以有此人民社稷者皆天之所在也乃或慢神虐民大者離絶嵗時牲酒勉焉具文凶荒札瘥伊誰之咎余同年進士錢侯淳父得郡高郵以保民命爲根本以葺保障治器械爲翼衞德禮風化凡有關民彝者尤無所不致其勉人士來京稱之不容口余既喜其知天之所在矣一日書來自謂抵郡百廢不敢不興然皆常事惟州社墻傾屋頽壇壝榛圮民居僧廬交侵其疆雞犬又從而汙之聖天子之所付我者謂何而乃若是爲之驚惕亟具屋五楹再新壇壝四匝垣墻而大書其扁以揭之過者爲悚工役最小關繋最大此則不可不書使後來者共守余曰侯之於民若此而後以之從事社稷天心之仁之合者不其慰乎因書所見使併刻之石庶後之爲邦者皆知天不在天而在民社之寄以續續盡心焉則侯之施德是邦將永無窮侯名真孫桐城人咸淳四年戊辰八月日宣教郎史館檢閲黃震謹記台州黃巖縣太平鄉義役記景定初余官吳門先是有常平使者阿時相意嘗括浙西闕役義米獻羨餘至是因循不革催甚急民甚苦會新使者訪民疾苦余因列其事且曰百姓雖闕役義役在官司括役米義役亡爲民父母奈何不補助其闕反利其闕忍奪而遂亡之亦不報越三年兵部郎中會稽王公華甫來爲使者辟余從事余欲以告未及公已一旦首蠲闕役米錢八十萬貫趣盡役義役如初一道驩呼皆言公昔治台結義役有成法方相與翹首拭目以俟不幸役未及成公先病卒而闕役米之催如舊余每歎公浙西之義役不及成安得取成法之在台者書之以勸將來耶又六年當咸淳戊辰秋司封郎官月湖先生陳公栩俄屬余記台之黃巖之義役則正成於公治台之日者葢黃巖自嘉定五年太平鄉林君從周白其宰陳君汶邑始有義役然法猶未備嵗乆弊生田連阡陌者捐助或不毫毛僅僅及等者反困抑切至淳祐九年王公來爲宰始因舊法更新之約計產百貫乃鳩田一畝且約能節貯其餘以别置田大都及三百畝中二百畝下百五十畝其入足以當元鳩之數即還所鳩衆悦從之埀二十年無敢變而公來守台復申前約時太平鄉則從周之子大學進士宋卿司其事最以整比稱公嗟賞公既去林君益整比惟謹元鳩田二百有五畝及今遂能積其餘置良田一百七十餘畝畝租二石視元鳩之畝數雖未盡及租入反已過之遂盡以元鳩之田還其人如公約宋卿家元助田十畝獨不取與其弟齊卿謀曰吾家主此義者也可亦利之乎併以附新置田一都之經費益沛然有餘矣余惟官不容不役民役不能不擾民自昔聖賢皆以爲病至熙豐間思所以變通之䇿使民出庸錢僅能免衙前雜役而役於鄉落便逓文移督租税曰都副保正者終無䇿以救迨乾道間松陽縣產戸始出田穀其創義役以免爭糾而應役者有所取費不復至廢家風氣日開講究日精已出於熙豐諸賢思慮所未及他州旁縣往往從而效法之已可謂至矣然上戸雖以爲便中下戸終未之便尚不免如黃巖嘉定以後之爲者迺今公之爲法也量戸產以鳩田姑籍爲一時之開端積餘利以置田永以爲無窮之至計置者既可永乆鳩者盡可復還使昔富而今貧者無愬貧歸田之訟昔貧而今富者無隨時再鳩之擾如太平鄉新置良田二百畝官不得預民不得取殆類天造地設别有一種閒田以應辦公私百費使官無闕事而民不知役者此仁之至智之極放之千萬世不復可毫末加實自王公發之而林君父子兄弟皆能世濟其義公雖去而不忍忘公雖死而不忍欺成公之志如公之存公之德義在人爲何如而死生不背負惟公之義是成黃巖之始有義役與既有義役以其餘利别置田皆昉於太平鄉林氏非君與公同此一義亦疇克至是哉然義利不兩立此役以義結者也而所結之田若穀與續置田皆利屬也義利之相去其間不能以寸況身於利之間而欲主以義非繼此主之者皆剛腸卓識界限截然人人如林君則錢穀出入之際一有不愜於衆心即蟻穴可潰金堤矣義將安在余故不暇復辭而詳爲之書庶幾後之君子皆以林君之心爲心因其成規增增不已復積新置田之餘展轉又爲鄉曲無窮之義舉雖他之主役如林君者亦聞風興起無不銖積因其端以迄於成且使爲邑爲郡爲常平使如王公者尚皆以是而率其人役無煩擾民樂息肩太平之期當自兹始淳祐四年九月記黃氏日抄卷八十六
