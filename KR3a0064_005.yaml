body:
  text: 黃氏日抄卷五宋黃震撰讀尚書經解惟書最多至蔡九峯參合諸儒要說嘗經朱文公訂正其釋文義既視漢唐為精其發指趣又視諸家為的書經至是而大明如揭日月矣今惟略記一二堯典欽明按堯典始終皆主欽字東作說云春月嵗功方興所當作起之事然以南訛西成朔易類之疑平秩主人事而言東作主時至氣應物類興起而言作如土膏墳起之類朞三百六旬有六日三百六十日一嵗之常數也周天三百六十五度四分度之一天行速常一日一周而過一度日行遲不及一度積三百六十五日有竒而與天會視三百六十日多五日有竒名氣盈月行尤遲一日常不及天十三度有竒行一月始與日會十二會得全日三百四十八有竒視三百六十日虧四日有竒名朔虛合氣盈朔虛而生閏蔡解極精舜典人心惟危一章此章即堯嘗授舜之辭舜申之以授禹而加詳焉耳堯之授舜曰允執厥中今舜加危微精一之語於允執厥中之上蓋所以使之審擇而能執中者也此訓之之辭也皆主於堯之執中一語而發也堯之授舜曰四海困窮天祿永終今舜加無稽之言勿聼以至敬修其可願於天祿永終之上又所以防警之使勿至於困窮而永終者也此戒之之辭也皆主於帝堯永終數語而發也執中之訓正說也永終之戒反說也正反相因章㫖該貫蓋舜以始初所得於堯之訓戒併平日所嘗用力於堯之訓戒而自得之者盡以授禹使知所以執中而不至於永終耳豈為言心設哉近世喜言心學捨全章本㫖而獨論人心道心甚者單托道心二字而直謂即心是道蓋陷於禪學而不自知其去堯舜禹授受天下之本㫖逺矣蔡九峯之作書傳嘗述朱文公之言曰古之聖人將以天下與人未嘗不以治之之法而併傳之可謂深得此章之本㫖者九峯雖亦以是明帝王之心而心者治國平天下之本其說固理之正也其後進此書傳於朝者乃因以三聖傳心為說世之學者遂指此書十六字為傳心之要而禪學者借以為據依矣愚按心不待傳也流行天地間貫徹古今而無不同者理也理具於吾心而驗於事物心者所以統宗此理而别白其是非人之賢否事之得失天下之治亂皆於此乎判此聖人所以致察於危微精一之間而相傳以執中之道使無一事之不合乎理而皆無過不及之偏者也禪學源於莊列滑稽戲劇肆無忌憚之語懼理之形彼醜謬而凡聖賢經傳之言理者皆害己之具也故以理為障而獨指其心曰不立文字單傳心印此蓋不欲言理為此遁辭付之不可究詰云耳聖賢之學由一心而逹之天下國家之用無非至理之流行明白洞逹人人所同厯千載越宇宙有不期而同何傳之云縱以舜之授禹有人心道心之說可曰傳心若堯之授舜止云執中未嘗言及於心也又安得以傳心言哉俗說浸淫雖賢者或不能不襲用其語故僣書其所見如此臯陶謨無教逸欲有邦漢王嘉奏封事引書云無敖逸欲有國劉元城疑敖字轉寫作教字禹貢海濵廣斥古說以斥為斥鹵蔡解引許慎云東方謂之斥西方謂之鹵而云斥鹵鹹地愚按管子斥者薪芻所生之地鹵乃鹹地於斥不相干今嘉興府瀕海人呼産蘆之地為斥塹三江既入三江之說極衆程尚書盡闢其說主蘇氏指豫章江為南江以足經文中江北江之數愚按豫章江於經未嘗稱江審如其說則三江皆在上流於揚州何預焉蔡氏闢其說而主庾仲初吳都賦注松江下七十里分流東北入海者為婁江東南流者為東江并松江為三江其地名曰三江口吳越春秋所謂范蠡乘舟出三江之口者是也蔡之說的矣愚按越絶書云出三江之口入五湖之中為越伐吳之路五湖既共今之太湖則三江豈外於今之松江又秦語云越王擒之於三江之浦越語載子胥曰三江環之民無所移及越欲釋吳范蠡諫曰與我爭三江五湖之利者非吳耶則三江與五湖相連又可知矣然愚嘗泛舟松江至海口不見吳都賦注之婁江東江也吳志載青龍江白蜆江今皆塞姑録之以翼蔡氏之說涇屬渭汭古注謂水內為汭諸儒皆從之蔡解獨以涇渭汭三者皆水名而汭入於涇愚按若如古說涇入於渭水之內而漆沮既從灃水攸同皆主渭言之文意俱協若以汭為一水而入涇則涇屬渭汭者是涇既入渭汭又入涇下文漆沮之從灃水之同孰從孰同耶兼經云涇屬于渭而乃云汭入于涇文恐相反又下文㑹于渭汭若二水則不以㑹言矣恐渭汭合依古說也職方氏其川涇汭易氏解云汭非禹貢之汭禹貢言汭皆水內此川名東為北江蔡云北江未詳愚恐漢江自北而入大江故云耳非他有北江也朔南暨聲教古注以聲教斷句諸家皆從之余友蔣榮甫云昔徐履赴試道渴求水村舍有老士人教四五童䝉以朔南暨為句徐言其誤老士人者怒曰獨朔南暨聲教而東西無預耶東西皆有所止之地故以海與流沙言朔南地廣故以暨言而下文總以聲教訖于四海耳使如衆說當云聲教暨朔南何云暨聲教耶徐用其說魁南省𦙍征惟仲康肇位四海林氏謂羿廢太康而立仲康而仲康即位之始即能命𦙍侯徂征掌六師以振其兵權使仲康盡失其權則羿之篡夏豈待相而後敢耶愚按史記載太康失國太康崩弟仲康立若果廢太康而立其弟豈待太康之崩耶近世燭湖孫季和主薛常州士龍之說謂常州考以地理羿拒太康據其都太康不知所終仲康乃之洛地自立今拱州太康縣是也仲康既在五弟之數徯于洛汭不在舊邦不為羿所立明矣是太康失邦自在河北仲康别立自在河南仲康沒而相繼之羿使其子澆侵相於河南相遷于帝邱後竟滅之相后方身逃歸有仍生少康夏乃中興此說與經文距于河五弟御其母以從之說合林說雖免羿假王命攻異己之嫌又不若薛說之為辨臣扈蔣榮甫謂其伯父尚書嘗聞前輩言扈者啓同姓之國見堯舜皆與賢而啓乃繼禹扈不服大戰于井自是終夏之四百年不臣夏至湯伐夏而後扈來臣於商故作臣扈之書成湯放桀于南巢巢國不義之終商六百年不來朝至武王伐商而後巢伯來朝於周故作旅巢命之書是說也嘗於經筵奏先皇帝理宗云仲虺之誥惟有慙德曰豫恐來世以台為口實湯不得已而伐夏自以為慙此心如青天白日兹慙德也乃所為實德歟纘禹舊服古注云繼禹之功統其故服蓋指弼成五服之服以繼有天下言也蔡解以為繼禹舊所服行恐亦寄搭義理耳本文未必其然合從古注式商受命用爽厥師簡賢附勢實繁有徒吳氏以用爽厥師簡賢附勢意不貫疑有脫誤愚按上言天命湯伐夏下言與夏桀同惡者不樂之也若止據兩句似乎不貫若合上下文未嘗不貫何脫誤之有小大戰戰罔不懼于非辜愚按湯誓言今汝其曰夏罪其如台是湯之衆安於湯之德謂桀之暴無如我何也此云小大戰戰罔不懼于非辜是桀之衆皆疾湯而湯之衆皆震恐也二義正相反蓋湯誓者誓衆之辭當時必衆言猶有未同者故湯諭之如此仲虺乃寬釋湯慙德之辭謂夏商已勢不相容伐之非湯得已也義各有在不當以文害辭盤庚汝何生在上古注以上為人上蓋指在位言也諸家從之蔡解以上為天愚恐生在天三字為文意未安若主民庶言之以上為指耿邑猶可耳若曰汝今不遷邑且圯矣何能生育於其上耶說命下台小子舊學于井盤既乃遁于荒野入宅于河自河徂毫暨厥終罔顯古注謂髙宗自言既學而中廢業遁居田野河洲其父使居民間知民事故也蘇氏始謂井盤遁于荒野而諸家多從之蔡氏謂無逸言髙宗舊勞于外爰暨小人國語亦言武丁入于河自河徂亳與此皆合若以台小子語脉推之蘇氏之說非是此論精矣世猶有不喜其說者以暨厥終罔顯非所以言髙宗也愚按蔡云髙宗厯叙廢學之因而嘆其學終於無所顯明其說亦本古注初非蔡氏自為之說且自言學罔顯而下文求傅說爾惟訓于朕志文義極順無可疑者若以為甘盤遁去而罔顯則上文既言宅于河又言自河徂亳踪跡厯厯甚明豈得言罔顯耶且蘇氏雖以遁野為井盤而小蘇氏作古史亦以遁野為高宗也髙宗肜日天既孚命正厥德髙宗肜祭而有雊雉之異祖已遂訓以天之於民降年永不永惟其義如何天既信其命令賞罰無差而民猶以為無如我何此民之愚也王之事天正此而已豐祀何益此肜日一篇之大㫖而古注得之矣蔡氏疑髙宗之祀如漢武五畤祀祈年請命之事謂孚命者天以妖孽而譴告之謂言民者不敢指斥髙宗而托民為言恐皆意之耳此書明言典祀無豐于昵蔡氏亦明言昵為禰廟豈有若漢武五畤祀之類哉近世忽漢唐古注而欲自生義理故或思索之過如此微子我舊云刻子王充論衡作我舊云孩子謂識紂惡於孩子之時泰誓觀政于商古注與諸家皆謂觀商政之善惡或以為觀兵者非矣蔡氏以商書萬夫之長可以觀政為據謂以諸侯之向背觀商政之得失恐亦不若古注為徑商罪貫盈貫者串物之名即今錢貫之貫貫盈者積而至盈也古注謂惡貫已滿是矣蔡解以貫為通恐貫通與貫滿各是一義百姓有過在豫一人古注云民之有過在我教不至蔡解云過者責也百姓責我不正商罪此說雖於伐商為順而在字無歸著以語脉當從古注大意不過自任以天下於伐商意亦不背王乃大巡六師蔡氏云天子六師是時武王未備六軍於牧誓叙三卿可見此曰六師者史臣之辭也愚按牧誓所叙三卿乃指友邦冢君之三卿安得以為證若武王止三軍史臣安得增飾為六師而周王于邁六師及之詩人又何所指而言耶竊意厯數有歸天人胥應武王既可於伐紂何獨不可於六師然世逺莫可考且依經文讀之洪範王省惟嵗止月之從星一章或云此四五紀之文錯簡在八庶徴之後蓋九疇皆有演辭而四五紀獨無之王省惟嵗以下正叙四五紀之說而於庶徴無關移此置彼文義方順二曰富五福不言貴而言富蓋三代之法貴者始富言富則知其貴所謂祿以馭其富也貧富貴賤離而為四起於後世不能制爵祿之失游氏禮記解云五曰惡六曰弱古注謂惡醜陋謂弱尫劣蔡以惡為剛之過弱為柔之過恐合從古注金縢我之弗辟古注辟法也蔡氏本鄭康成音辟為避謂管叔流言周公避居東都及成王迎公西歸管蔡懼而反成王始命公出東征所以明周公之心善矣但世逺恐難質言爾書云周公居東二年則罪人斯得未見有歸後再出東征之次第若居東止是避流言則罪人斯得亦不當即繼於居東二年之下鄭氏於七月詩序周公遭變亦注云管蔡流言辟居東都正義云周公避居東都史傳更無其事愚按管蔡流言之時未有東都也不知鄭氏何據而有此說若依古注以辟為法辟之辟則蔡仲之命云乃致辟管叔于商正與此辟字同康誥周公初基止乃洪大誥治諸家皆以為成王命康叔以篇首有周公之語也然成王而謂叔為小子封謂乃祖文王為文考且稱其父為寡兄皆不通今蔡氏以篇首為洛誥錯簡王若曰以下為武王命叔文意方合非巨識不及此又謂梓材非命康叔之書蓋錯簡亦良是蓋惟篇首王曰封數語為命康叔今王惟曰至子子孫孫永保民皆臣告君之辭甚明酒誥爾大克羞耉惟君古說養老君之事蔡云惟君未詳且合從古說召誥王敬作所不可不敬德古注云敬為所不可不敬之德蔡云所處所也猶所其無逸之所王能以敬為所則無往而不居敬矣古說作一句讀所作虛字說蔡說作兩句讀所作實字說然古注不費力洛誥朕復子明辟古說成王幼周公代為君辟至是復還於王蔡氏以康誥篇首周公作新大邑於東國洛一章為洛誥之篇首而以此章為公遣使告於成王復乃復命之復明辟乃稱成王之辭成王未嘗一日不居君位何待於復王莾居攝潜移漢鼎皆儒者誤言復辟有以啓之愚謂此說不獨考正文義其有功於天下後世名義大矣命公後舊說以洛誥命公後之語為公欲明農而成王為公立後於魯以留公蔡氏謂成王回鎬京而留周公於洛若封魯則已久方周公東征之初已有魯見費誓矣舊說多士本書序以為成周既成遷頑民蔡氏謂其遷已久此乃周公治洛而告諭之辭愚按成周即今洛陽是為洛邑之下都保釐大臣如君陳畢公皆居之畢命之書曰今豫祗命公以周公之事又曰周公克慎厥始君陳克和厥中惟公克成厥終則周公治洛無疑凡皆合從蔡說蓋朱文公師友之考訂者精矣無逸君子所其無逸近世諸儒皆以所為處所謂君子以無逸為所說理雖精愚恐讀得太重於本文似立說生意蓋無逸之書最為明白終篇無一語埋意用字如後世苦於作文者之為此語若曰君子所能無逸者以先知稼穡之艱難乃逸則知小人之依故雖身居安逸而此心終不敢自逸耳所字疑只是虛字平平說過如繼自今嗣王則其無淫于觀及時人丕則有愆先儒多以則字訓法則之則疑亦皆虛字平心讀之自見其無他也又書中誕字肆字惟字多是古語助辭今誕必訓大惟必訓思多有不通而自為之說以形容之惟肆字訓故字處多協惠鮮鰥寡古注云加惠鮮於鰥寡之人是鮮訓少鮮為鮮民之鮮合作上聲是鮮與鰥寡三字相連恐於文未順諸家泛言惠及鰥寡皆置鮮字於不說惟蔡氏云惠鮮者鰥寡之人垂首而喪氣賚豫賙給之使之有生意是鮮為鮮活之鮮合作平聲是鮮與惠二字相連於文方順然蔡說微近於巧愚按詩云鮮我方將鮮亦上聲訓善今仍以惠鮮二字相連不必改為鮮活之鮮文義自協君奭故殷禮陟配天古說升配天蔡說以陟為升遐恐未安升遐主人而言升配主禮而言則商實百姓古以商實百姓為句云使商家百姓豐實蔡氏以商實絶句云國有人則實而以百姓屬之下文王人罔不秉德通為一句遂指百官為著姓王人為微臣愚按王人本言王者正人求多聞是也謂王人雖微序於諸侯之上者後世之說書中無此謂百姓為百官者亦後世注堯典之說晦菴已指平章百姓為畿內之民而蔡氏用之矣顧命顧命諸說顧回首也回顧而發命愚恐若言回顧即為回首而顧凡單言顧者正是目在之耳若顧諟明命顧畏民碞之顧亦豈回首者哉成王慿玉几命羣臣羣臣在其前成王無回顧之事畢命旌别淑慝殷人心不服周周公征伐定之又分治成周以慰安之繼以君陳更三十六年而畢公繼之尚以旌别淑慝為政是殷民猶未盡服必俟生長於殷世者老死至盡而後人心定耳東坡於多方之解謂殷湯以下七王之德深矣其論極正我朝兵不血刃以無心得天下而一切以恩撫之嗚呼聖哉藝祖待八國降王以禮而武王親斬紂使藝祖為周意殷民未必若是之久擾也君牙夏暑雨小民惟曰怨咨一章古說多謂民情難得使人主思其艱而圖其易務恤民情耳蔡氏以怨寒暑為小民自傷其生以圖其易為衣食之恐局於一端而為君之大德亦非以衣食與人也在學者詳之疑合從古說為平易秦誓番番良士一章蔡氏云良士謂蹇叔勇士謂三帥諞言謂杞子先儒皆謂穆公悔用孟明詳其誓意蓋深悔用杞子之言愚按於良士云我尚有於勇夫云我尚不欲於諞言云我皇多有蔡釋云我皇暇多有之哉以上文二尚字觀之語脉専歸重於諞言則蔡氏之說精矣蓋穆公殽之師實杞子啓之也然殽之始禍雖在杞子而成之者實在孟明孟明違父誤君再敗秦師焚舟之役亦終無寸功自此秦晉連兵數十年不止殽師之一役其罪又重於杞子亦不當以三帥並言蔡氏特以釋誓文之意論者不可以是薄孟明之罪其心好之不啻如自其口出蔡氏云心之所好甚於口之所言愚意若以上文若已有之之例似不過謂好人之彥聖如出於我耳冝從古說為平黃氏日抄卷五
