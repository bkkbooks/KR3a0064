body:
  text: 黃氏日抄卷八十四宋黃震撰書通新知平江府修齋王尚書初任吳縣尉十一月吉日具位謹裁書百拜獻某官閣下近據衙探遞示批帖特免屬吏無益之通啓俾具賑荒便民之事宜略虛務實意嚮昭白有如此者某老矣方作尉自念無繇身救其民凡見民瘼必以告上之人求其矜念而速救之兩年于兹無事不然雖誅斥不敢計况首蒙詢訪之及乎然某竊謂賑荒雖吳門今日第一事然吳門之弊極矣拔本塞源事尚有大於此者先生清修執法之名聞天下一旦輟班法從出代舊輔救吳門已極之弊九重之付託至重三吳之責望至切內而百僚外而四海觀聽攸屬也先生計將安出而可稱塞乎以某愚見其䇿有三一祖宗舊制盡去茍徇人情晚創無用之官使事簡刑清上下晏然如祖宗盛時此上䇿也甄别廉貪稍革泛冗科别其蠧弊之源講究而疏剔之壁立萬仞以示更新使挾貴謀富之徒望風不敢嚮此中䇿也隨事樽節痛察吏姦謹倉庫出內之司牽補過日使軍民粗安此下䇿也舍此三䇿而因循徇俗坐視流弊之日極正恐先生重望未必不因此少損吳門豈可復以前日之吳門視也哉至若賑荒事吳門既官無粒米可濟鄉落不過空言以為勸惟安富恤貧兩審其宜而無使吏得因緣取賕此為要領其間纎悉非靣莫陳先生儻以為可教而辱進之尚當陸續以告不備回王尚書某塵埃至賤吏也倐拜公劄例辱咨詢謙恭下士一至此極其何以稱然昨因衙探傳示批帖之初首見先生意嚮即嘗裁書百拜附東閣知丞新班以進未知已徹台聽否今兹短見豈復異辭亦惟申述前書大意一言以蔽之曰汰冗官而已蓋今所謂發運一幕不過向者一曹官所兼百萬倉之職耳今所謂莭制司不過向者一職官所治兵案之事耳今之兵將官錯雜民居不可勝計者又不過向者一鈐轄之司耳而好名侈大之人多創茍徇人情之闕僥幸之門既啓員外之增日衆至於白帖西班之流他州待闕之吏因三幕之宏開挾權勢以雜進茍賤椎剝者又不預焉以故官多吏冗輿臺雜遝生事謀食而民不聊生矣不汰冗官而曰蘇民瘼者妄也以故嵗收不滿二十萬石今支倍其數而郡政者困矣不汰冗官而曰裕郡政者妄也以故斛靣贏餘額外多取為郡者明資以濟用監臨者並緣以為姦而和糴亦成強取矣不汰冗官而曰善糴事者亦妄也先生之問有曰田里愁歎郡政原委糴事利疚爬剔拯療豈無良方某謂三者之病皆冗官病之知其病之原則知其治之方矣位卑言髙僣越萬罪代平江府回裕齋馬相公催泄水書洊蒙鈞劄申論泄水至許以不待陳請仰見付託責效之切為之悚息不皇然嘗求之粗見顚末有不容不急急馳報以求教誨者所在水利皆源髙而流下故泄之易惟本郡西南受荆溪以上江東數郡水既髙若建瓴東北自崑山之太倉連亘常熟其勢又亢若仰盂水亦反流而趨內四靣皆源獨其中受水之流水反蓄而不泄故近郭之田雖茫為一壑而濵海之田則枯涸自如特近郭之地舟楫所經人所共見濵海之地耳目不及人所不知耳然古人隨地形而為之計則亦曲盡其妙第廢壞已久有非一旦可復古人於冝興以西金陵管下設為伍堰使西南水不入荆溪而由分水銀林二堰入伍子胥伐楚之運河以入大江東北則於崑山常熟以東之橫塘設􅓾門斗門閉髙地之水以自溉髙地之田使水不得反而趨內然此特措置四境之髙仰如此若中間地卑水聚不能以時入海則又設為塘浦焉蓋吳地中間不特太湖三萬六千頃長洲有沙湖尹山湖常熟有昆承湖崑山有陽城湖他如邪塘等諸壤黃天等諸蕩市宅等諸村皆蓄水深處脈絡無不與太湖貫通水靣闊逺止籍吳松一江通注入海水去不速而所籍者又在塘浦浦者導諸處之水皆自趨吳松江以入海塘者防水不得入民田必使由浦以入於江塘浦元計一百三十二條浦之闊率三二十丈塘之髙率二丈大要使浦高於江江高於海水駕行高處而吳中可以無水災古人之為此夫豈一日一人之力而今無存者嘗考李氏有江南五堰以西之運河尚通錢氏有兩淅其治塘浦尚有撩清指揮之號彼固非真能上緝古人之功而偏方小國封疆不廣猶農夫之有籬落下田歲歲保治惟謹國朝幅員萬里觀聽不接南渡生聚益繁各便已私上焉之五堰既以不便木􅑉往來而壞江東數郡水盡入太湖矣下焉之堽門斗門又為側近勤耕而壞崑山常熟二縣水反入內地矣中間之塘浦則或因行舟及安舟之便而破其墟或因人戶請射下腳而廢其堤或因耕墾增闢而攘斥其舊來之浦凡今所謂某家洪某家涇者皆古塘浦舊地於是蕩無堤障水勢散漫與江之入海處適平退潮之減未幾長湖之增已至小迅之隨去未盡大迅之擁回反多往復洄洑水去遲緩而一雨即成久浸矣古人合江浙數郡之規模而成之慮及萬世後人求一已田宅之利便而壞之見止一時壞之既久則復之甚難自景祐以來嵗歲講求迄無成功蓋但知泄水而海口既高水非塘浦不可泄故東坡嘗請去吳江石塘王覿嘗奏開海口諸浦朝廷皆疑不敢行范文正公守吳嘗開茜涇亦止一時一方之利而劉慤按行直謂開海口則反有風濤駕入之憂唯熙寧初郟亶力請於朝嘗起六郡三十四縣之人以修塘吏民喧訴擊墜幞頭卒鳴鐃散衆而止政和六年御筆修平江諸浦三十六閘差趙霖措置通設六十四萬餘工宣和初再措置支見錢四十一萬貫有竒卒又勾收人吏送獄根磨而止今浦閘盡廢尤甚前日而海沙壅漲又前日之所無地之高下非人力可移沙之壅漲非人力可遏惟復古人之塘浦駕水歸海可冀成功然所費當幾錢所役當幾人大農州縣既無此事力荒歲餓莩又無此人力縱有之又當歷幾時幾日而成乃欲其救目前之急此泄水一説未可倉卒議也若止從人户就近泄放則彼此皆水雖欲以鄰田為壑不可得議者多謂圍田增多水無歸宿然亦只見得近來之弊古者治水有方之時汙下皆成良田其後隄防既壞之後平陸亦成川澤熙寧八年旱太湖露丘墓街井今瀼蕩等處尚有古岸隱見水中以此知近來圍田不過因旱嵗水減將舊來平地被水處間行築耳就使圍田盡去水之未能速入海自若也何能遽益於事况圍田未易去者乎為今救急省事之䇿惟有告諭田主多發夫工就塍岸漸露處次第修築各於水中自為隄障即車水出隄障之外而耕種之此事昨已施行鏤榜曉諭近承専官之來又嚴加督催併已差官隨之行縣矣某非不願大發工力為久逺計而量時度力實所未能未知鈞意以為如何更望熟議再賜指授以憑遵行不勝願幸通新憲翁丹山書某日者恭審皇皇者華出自都門某職當腰弓矢郊迓偶捧檄留江隂不獲遂以書代又不過簡略數語直述真情如子弟之於父兄然聞者或為縮頸曰繡斧新臨威嚴若神子無平生之素而若此恐以簡得罪也未幾聞下令約束所部吏不許通四六啓俾各以政言某因私竊自喜夫破去尋常略虛文而訪實政此真大丈夫所為某之愚直務簡得無有默契盛心者乎用自矜奮謹照約束一言一某聞古者之慮民隱視四海若一席之上既擇其人為之守又歲自巡狩以察其所守時異不可行乃遣部使者亷察之則今之監司代古巡狩天子所寄耳目者豈他官比哉旌别淑慝惠民者扶植之權豪貪墨鋤去不旋踵斯民自然欣若更生閭閻細故非所宜煩也書云刑期于無刑孔子曰聽訟吾猶人也必也使無訟乎謂宜有以變化人心也後世嚚訟成風訟而至監司極矣正宜有以審處之乃又不捐細大而兼受之文案山積紛不暇決堂堂監司反為諸郡縣詞訴之委姦豪得竊借以為脅民之地幾何不率訟者而路今若擇其事關大體斷所當受者而後受受之必從而究極之罰一人使千萬人懼庶幾監司之體得事簡刑清而險健者望風避也古稱殺人者死律亦有虛告者坐之今小民或殺其兒女若自經溝瀆及巨室借病死之鄰人或其客户以誣害所怨之家州縣例以為重辟淹延追證瘐死率不下十數人至正事結絶無坐者本輕末重枉及無辜俗謂之喬大辟某連年入幕見此類甚衆退而體驗所管除劫殺故殺鬭殺外餘率申明不行一邑粗寧此事若自監司行之一道豈惟免無辜干連之死亦決無復自殘其骨肉自賊其性命若以病死人誣告者風俗可變而厚也傳曰君子以人治人言人情本不相遠責人當以其情之所可能也江湖剽掠誠所當禁要亦在初發覺時其人自能迹其盜之所往則地里有定捕逐不難今或茫乎無影而期限之急與指捕陸居知姓名者同如之何其可故有一家被掠而數家坐干繫死於非命者夫財與命孰重少與衆孰多彼獨非天地之生民乎哀哉何辜此逐盜之形有異不可不隨事而酌緩急也廣川大谷異制民生其間異俗明於治者不容不詳知浙右水國人無徒行者有異盜曰猊猖率三二十輩為一舟羅軍器以載走卒公然剽掠久已成俗無事不然無人不然小民亦習見以為常雖被其禍不訴若當然者惟強者相拒至殺死則訴于官浙右沃壤富貴人多置莊産強幹例囑巡尉司以捕盜者捕租户既而又以監租為名不取其餘租而隂謀囚死之以立威鄉落嵗不知幾人為其骨肉者亦習見之久謂非殺死例哭泣責狀焚其骸而去故死者雖多亦未嘗有訴于官鄉落因其然懲見捕者之無生還也或舉族連村盡死以拒捕往往至殺傷強幹又挾富貴家之勢指陳其拒捕以甚其罪雖死不得直於官凡皆浙右之俗之弊之大者茍有以革之寃枉可省十七八全活民命為多他若攔船之泛狀非見名不可判前政之熟事非再詞不可行此又關係新政之切者然其事至淺當不待察察言也伏惟先生文章㵼河漢聲名動山嶽道德天下之儒宗政事當今之吏師一慨然登車攬轡間八郡三十九縣之廣目中已無留塵矣何物涓埃可禆海岱然某之職於民最親某之前此綴幕底於時日最久亦粗聞一二者用敢以承大賢君子勞謙諏咨之意通新憲使余主一書鰲某聞君子居其官必思行其道又聞古之仕者去之時猶如至之日蓋一日居其官必使一日無愧於其官可也安有低回竊祿茍偷歲月而可以言人者哉某之官尉也尉者慰安其民之名也世乃以其去民最近悉委之文牒豪民黠吏因得借以為嗾使毒民之具豈惟尉失其職其為世之非道事也大矣某之來正當己未冬敵馬飲江時方是時朝廷方大懲創人心方大改觀監司帥守方極一時選以大更革某因得盡為百姓大鳴其不平閭里睚眥之爭舊必囑州縣吏差尉躬親私家升斗之租舊必囑州縣吏改尉理索此毒民也非慰民也某既代之鳴矣自爾辭理索小人黠而奴於人者欲花破主家財物舊必面謾其主謂村民頑不可化率用隂謀囚死其人於尉司弓手家此亦毒民也非慰民也某既代之鳴矣自爾亦無復囚繫人其餘告訐虛偽以勢強弱為事曲直者一掃盡之二三年間尉之足迹不及鄉豪民黠吏非道之事亦不復撓乎尉仰天俯地悠然泰然頗類太平官府頃自某捧檄督糴江隂一留三月而歸州縣官吏往往非舊尉司毒民之事又紛然如昨能幾何時已遽若此事變如此其難防人心如此其可畏也使某以滿替在近而不言則於心何忍使不遇有志於民者而輕言之雖言何濟用敢於攬轡諏咨之始首條一二以聞伏荷仁慈立賜山判或者繼此仰藉上臺之威使百姓復得按堵某得始終無愧以至滿替可勝願幸感激鼓舞兹因輒復吐露中心萬分之一某老矣甘分填壑非一毫有求於世平生所為文蓋無非本心所形未嘗為世俗無益語然已往往散落近留江隂嘗逺拜前憲使翁丹山一書及上孫史君大閲詩六十韻江隂先生寓里而憲堂先生新治也併録以獻先生儻以為可教而辱教之尚當俯伏師門以俟附通新漕季厚齋書某慈溪諸生自先生政成以至將指本部以至今易節日畿雖未繇瞻履舄實甚喜善政之日廣輒以浙右風俗某所親見雖若細事而最切民瘼者百拜為先生告某惟州縣自十月止正月皆受理人户索租之日獨浙右多不經縣而徑以占田為名越經轉運使臺行下主管官似不過尋常耳自主管官行下巡尉司輒捕若強盜豪民猾幹又囑以隂謀囚殺之以故村民盡死拒捕非佃傷官兵則官兵傷佃否則佃自縊自溺而西闎人命事因索租者十八九又酒庫本使臺趂國課之地而村民多誣告私酤以害人庫吏之墮欠官錢者復妄指有衣飯無干預之家混為欠錢之户差巡尉捕抑填納寃無所訴凡皆民瘼之關使臺者方仁人建臺之初望矜察而拯救之某一介小官力不能救民凡有見到惟以轉告長上之力可救者曩歲捧檄華亭見船場虛名之兩官為逋逃淵藪殃及一方歸而告前漕使雲岩洪先生即荷省去民至今受其賜今所稟陳或蒙介注受賜者又非特華亭一邑之民而止不備謝王提舉辟充帳幹書第二任某嘗觀人之一身心有欲為四肢百骸無不順應以氣體一故也有為天下國家雖得心同志合之士猶恐一膜之隔不能盡如人意而况泛不相知偶然相合者乎是以古者命委論官自少至長灼知其德行道藝然後命之官命之官又初不出其鄉長之於其屬屬之於其民無不相信相稔如家人父子此所以政化易行而後世莫及漢雖不古郡國自置相外皆得辟用其所知故治亦差近古自三互之法興延綿以至今日士一命以上無不命諸朝而易其地監司帥守之於其屬皆萍梗相逢如江湖逆旅情素不孚上下暌離上雖有能為之才而下未必知奉行下雖有欲為之志而上未必知信倚就一道所部千百吏僅一二辟屬為親奈何權勢請託之私又得行其間有求而辟反又不若無求而適相合者天下事至是愈不可為矣豈不悲夫某窮鄉鄙朴人也平生閉户無求併漫刺亦無之偶忽入任未嘗少變其志骨相寒薄豈有他想庶幾他日可見先父師於地下耳先生清直之名滿天下吾君吾相強而起之使攬畿甸澄清之轡某何者乃首辱辟用蓋無求於世而獲為之長者天下未必多先生無求於其長而獲為之屬者小吏中亦未必多某也先生豈姑取其節焉耶雖然其何以報先生嘗謂事之不可為者以人各有心人各有心者皆私心也若人之公心本於天者安有不同某於先生之賢雖天地遼隔若此心之本於天者固自保其必無不同也親炙薰染變化其氣質之異以求復其本心之同然者庶其有合乎心合則事可次第行矣惟先生進而教之與謝右司寒陋謹守中朝貴人獨閣下有一面之雅且蒙特逹許可無謂亦不敢輒拜狀惟切依依兹以王使長令行鹽司户案正屬大造化僣躐陳情鹽之登耗在天時人力兩者湊合天時若晴工作者衆鹽雖不待趣而登此固亭户衣食之所係何待趣耶天若隂雨人又逃亡鹽雖愈趣而愈耗蓋飢寒切身雖慈母不能保其子况迫以官司之勢乎近年監司多不知天涯海角細民疾苦一切以吏文趣辦既無人力鹽課自耗今某所以奉行使長之意者惟欲急救根本不敢求辦目前根本之説有五一曰不受出剩二曰精擇場官三曰盡還本錢四曰初集流亡五曰拘贖産業人心已欣若更生雖不求目前之效而效亦在其中所未知者天時之晴否及王使長病未必速愈耳謹有腹心以告有力所不及者惟閣下曲賜保全無任干冒回王府僉山甫辭季運使辟充鹽事司官府僉即余取發解而今在翹館蒙回翰慰勉甚感但人各有見不可強同如某作尉方滿而得辟帳司帳司未三月而改辟幹辦公事方司存更革百指窮途見無飯喫有此遭逢誰不樂就然此為身計則得矣如誤使令何試問祖額何道而可足亭户何䇿而可恤支發何由而可均廟朝主意在此三項諸公果曽是究是圖否乎果能革弊為利易愁嘆而為歡欣否乎若漕司只承受省所吏文一付之僉廳行事恐厚齋先生盛美未必不因此少損廟朝他日亦且悔此舉也某潦倒無成授書糊口晚年偶竊一官自愧無以消受朝廷廪稍作尉三年凡力到可以救民者無不為之矣今乃因幹辦公事之可慕羈旅飢餓之可畏便為利害所動明知故犯錯了路頭説一般話行一般事幕中寫了一兩句瞞心趣辦之語下靣苦多少人以此只得引退某有舊學生在謝右司書院即施憲次子新任當塗尉者昨日已作簡祝其懇告右司當筆為某擬開此辟萬一不遂所圖辟命果下亦只力辭禍福不計也孟子有言志士不忘在溝壑又曰舍生而取義者也此語要人牢守某只有印紙未批書未忍自絶於明時故此低回以俟事到極處亦當棄之而歸某見病在假不進飲食推枕不成字恕之諒之發孫提刑書癸亥五月到鎮江分司昨蒙指揮契勘俞楊之爭緣無實迹又吏人先已解司無從契勘若據公論萬口一詞皆稱俞分司亷謹若以鄙見俞分司昨為司門與今楊司門為交承怨惡已深吳檢法又再令為分司以臨之交收和糴米本係倉官吳檢法又絶不容楊司門等干預反專委分司倉官無俸向也所仰此少事例俞分司之再來有親戚章總領僉廳俸可仰又因而痛革之是尤楊司門受困之一端此楊司門所以愈怨間隙既開或者妄傳俞分司先己申省楊司門所以冒昧一申驚天動地其實無甚利害見任如霍府教超龍寄居孫制參吳會皆持公論者一見皆極口言俞司門之好初不知某承凖契勘事蓋出無心也二丈之爭猶可事最是此倉自改𨽻後廢壞日甚而廟堂知其前日之弊苦疑此倉今又本倉官自張皇如此此倉將何以自立耶此倉之不能自立猶可也本司持三尺法斷一道曲直者非受督責之地也自提領此倉之後某昨在幕中見打罵之劄無虛日此為誰家事耶某嘗體此倉終始之變往嵗發運司自差官收發運司之米有出納贏餘無文移督責時則此倉如人家房下子弟享見成衣祿一從改𨽻本司此倉如赤子乍離慈母凛然而立乎嚴師之側况所交江西米綱吏困苦之餘交收艱難萬狀今嵗又是總領所鎮江節制司差路將取運恃勢相凌艱難尤甚而朝省尚以前日之弊追吏索印紙常常不已此如子弟家前日享衣祿太過積釁方作既出身自當窮家火又遭官司其情可想而知故此倉視本司之官至如今敵讎其勢不得不屈而心實不附此非鎮以清靜旋與疏剔利害其可乎哉某此來栖然窮途本廳除舊乘車一副水缸一口之外莖草隻筯無之自帶些少動用及自帶前政轎傘交椅出入糴米買菜支撑度日訪來事體之大者陸續申聞以報知己却别乞提挈而去今日分司非先生疇昔所見之分司也餘事别見公狀不贅及與葉相公西澗頃來京口嘗專詣肅拜稟辭恭領鈞旨而退次日出目關此沿途所見田畝往往插種漸遍但覺欠水車戽費力此惟全望造物者早賜雨澤耳農疇宿習不覺輒發諒亦先生愛民之心所欲亟聞然尚有切於此者近者朝廷痛懲和糴擾民不已勢不得不買官田且亦水心先生永嘉郡舊説也而人心過慮官司收租將來不能無弊乃間有私議其下某謂此大丞相赤心體國久入思慮欲一勞永逸為萬世建飬軍便民之䇿豈他人所可易言抑晦翁有言天下事本不難為但恐人心不如我心做時不比説時此事若以某此行所見則各縣奉行節目却有與元行大意未合處所當早正於作法之初只如元行一石止收八斗此預防他日交收之弊先為減除元數惠至渥慮至悉也然必各州縣皆體此意買田不以畝為價而隨租以為價則隨其租入率減其二元租一石者今八斗元租八斗者今六斗四升自此遞遞以減庶幾為惠均而防患密矣今或不問田土之肥瘠與夫元租之多寡類曰畝收八斗則與元行石收八斗之説名雖相近而實相反夫物之不齊物之情也茫茫原隰豈能畝皆八斗耶頗聞湖秀等田元租畝收一石者已十不能五六如常潤漸北則地漸高而土漸磽所收畝多止五六斗或四三斗今乃例拘八斗豈朝廷意耶朝廷隨石數為減數其法活正欲抑多而就寡永利佃田之户今縣家整畝數為石數其法拘反或擡少而就多先抑賣田之主差之毫釐繆以千里錯認題目有如此者或言縣胥責田主賣狀有並係一色好田將來如有欠租即甘陪補等語則捻合一時預為他日抑取賣主張本其情可知斯言也某甚欲進之廟堂而無階可進先生與大丞相同坐廟堂政柄雖有東西國之大事當無有不同盡其心者故敢冒昧輒進之先生事若可行乞賜轉稟大丞相作勘會行下各隨元租以酬買價毋令畝拘八斗之租則弊源窒而成謀立國與民其永賴矣某僣越萬罪無任惶懼俯伏俟命之至與葉中嶽頃者稟辭重荷撥冗豫潔繼沭越關遣贐某登門最晚且最不肖辱此誤恩感愧到骨某初七日早登舟十四日夜抵京口沿途竊芘無他但此倉自𨽻憲司百不如昔窮人所嚮但有艱苦此分也復何言惟是倉敖十壞八九綱米將無所容甘露港日就湮淺糧運極為費力事關軍國職所當言到即巡視講求力申憲司乞申朝省未知曽轉以上聞否今秋本倉所收聞是新買官租而買田事州縣奉行茍且將來不能無弊亦預切動心輒冒昧稟聞尊翁宫賓樞使端明相公先生子細看其書中皆是平心實言初無草茅觸忤敢望過庭從臾一言國之利民之幸某亦拜賜昔東坡上文潞公求免𣙜鹽有曰某一郡守也猶以為職之所當憂而冒進於左右名公其得已乎某逺外一分司小官尚不敢避斧誅惟師門留意臨别蒙靣諭當賜吹送宏齋處此意古甚某非矯激者實以骨相甚寒頭顱如許回視平生閉户世人不知姓名今玷仕塗已踰宿望若更因此動癡心一點駸駸求榮圖進則是求無益於得徒虧雅道故所不敢若當世大賢主張公道肯自提挈某寧不感恩西倉吳魁處某未曽離任先勾俸給視古之去則收其田里者殆有甚焉此畨過吳懇其批書則笑語可人如將縶維此雖一時嬴得説然向非尊翁鈞翰曽賜奬借正恐一見良艱况於笑語太史公有言非附青雲之士惡能施於後世哉信口至此不覺使人太息某自春多災到此又間日一發熱醫書謂之疸瘧言積勞所發也偶熱劇口授兒子代書不敢不情告幸恕之與汪武諭元春頃既稟辭即於次早登舟十四夜入京口分司廳領事訖藉尊庇沿途無它但此缺既𨽻憲司百不如昔昨聞全然無俸今知前官曽支得平江府本身官序俸錢不足以了柴菜米却僅可喫然尚在四月後方支憲司以舊係發運司官不曽幫給某曽作繡使劄狀未見回報炎暑如許他貴人涼簟上擁氷猶以為熱聞繡使行部剖決無虛日不忍以此等私計瑣末撓之一任如何自北關此來但易地讀堯舜書耳然豈可久也哉天下無步行之官倉埸官例只得受倉場供堂從物於人情既通則亦於法理可恕若監司屬官例是監司公支造辦今以新撥亦無之既忝監司分司官檢柅倉場弊幸豈可首與分贓此却斷不可受幸有前任帳幹廳傘轎諸色動用尚在不妨用之均官司物也近况如此敢告某别時先生尊體猶未十分好殊使人不能去心使眷想已到侍邉庶便湯藥某今春之災多矣來此又間日一熱醫書謂之疸瘧言積勞所發也法用小柴胡始亦未敢用今熱漸劇不得已方服之更看一兩日如何亦緣此拜書草草伏乞恕察與葉中嶽昨具謝幅併别申尊翁樞使相公先生起居狀欲僣為百姓轉求一分之寬不訝太草茅否天下事如其分則出位一毫不當言如其理則天地萬物皆吾一體委曲宛轉可救救之可言言之亦盡吾心焉耳師門天寬願勿以為罪也某乍到索然蓋此職自𨽻憲司無俸無舉混混粳粃中謀衣食人亦莫之親某既到申憲司謂收支者倉官事分司止任檢柅之責力辭不預必欲得俸已蒙繡使允可鎮江見任官獨一薛節幹老儒也亦相往來門庭襟懷灑然敻别獨無舉耳舉非某所求也前倉使實齋王先生獨舉不求之人而某獨得之此特幸耳天下豈有第二王實齋也哉然於世俗不無感焉士大夫居上位必待下之求而後舉將何以息天下奔競而下之忍其羞而求舉者將何為耶某嘗妄謂學校本以飬士今士習反壞於學校選舉本以銓士大夫今士大夫心術反壞於選舉立法之弊一至此甚必置此事於勿問乃可自立耳與唐仲華忽領誨墨愧感俱深教誨諄諄謹思明辨為著緊工夫有以見執事識正而心堅孜孜以聖賢事業為己任使人降嘆不已某自幼失學長困場屋今墮俗吏以是並不曽讀書惟是天姿粗幸謹撰不敢為惡晦翁四書雖頗習誦但有敬信不敢輒發一語世之讀是書者多有辨説以為自得且謂若無自得之功而徒信紙上語非學也某愚意妄謂若止挑剔一兩語為新意便謂自得則世之自得者多矣講説已備於前人體行正屬於我輩且不論自做人如何而尚滕口説今世所少者正不在言語間但得不雜禪學便得未知尊意以為如何與王修齋自去夏蒙賜損答一向災滯相仍朅來京口望師門益逺嗣音無從愧極仰極正旦欣審一札親除四輩趣覲凡我善類歡賀如雷仰惟先生泰宇山定必視之如無必於出處正加斟酌某昨送訥齋先生吳門時嘗僣白之曰某在門墻豈不願座主重歸廊廟以今事勢莫如緑野堂之為樂訥齋頷之曰此愛我深者某今日於先生則謂皆可也如其處也山林已熟聲望益髙如其出也救之一分民亦被澤前輩有言惟出處不可謀之人譬如冷暖自知先生必有以處此矣某三生緣厚獨受先生難兄難弟之異知每探實齋先生葬日欲寓瓣香之敬往往無報節前亦嘗附某人未知浮沉忽得倉司蔣宅庫隱約之傳謂卜地赤城葬以三月謹急急遣人相望迢遞懼後時也已别拜令姪書與李憲使公田省劄紛至沓來令人心煩友朋多勸以此正力行好事之秋寬之一分則民受一分之賜某謂此堯夫之説也天下道理須自去斟酌如何只信人説此事譬如救人落水自家立在乾岸上撩得他起來方才好若遂下水救人自家性命尚保未得如何救人此箇道理亦非深逺只是論語井有仁焉一段可以推廣且當以孔子之説為正某今日決不為此官頭可斷匹夫之志不可奪但欲乘機納忠或可救萬分之一草九日一狀初二日一狀只得漸漸著緊期於感悟不敢矯激踈逺小吏漸漸進言體當如此或人微言輕不能感動罪固甘之矣與葉制使西澗日者齋沐裁書恭申均逸名藩需榮並相之賀伏審已徹鈞覽某少長居鄉時區區見聞仰恃眷知輒用併申海嶽涓埃庶幾萬一某每觀先朝大臣出判藩府必有興利除害卓卓顯效可耀青史非尋常二千石僅能行其力之所至者比也逺事不敢泛引如鄉邦之事所謂父老共望者蓋可一二數方皇子魏王之判是邦也進奉兩宫用家人禮率異疇曩惟正之供綱解上供縣官不敢過而問亦率殫於邸第騶從之費未幾進奉之創例者難絶而綱解之積壓者頓催明之事力幾於一困時則有若石湖先生范大參為之代一一剖析本末為百姓祈命于朝明以復蘇更六十年而吳履齋亦以舊輔出守履齋固亦近世人豪也惜不以細心情寬恤民力乃以大力量整齊郡計六縣自一孔以上皆歸之制司而責經總司如初縣若不生事取之民世豈有鬻田宅賣妻子毁家助國之官吏乎求贏之弊甚至深山僻嶠盆盎旗簾冀毫髮之息以活其父母妻子者亦無不增賦雖使盡其本息不足以了納官監繫死亡禍及鄰族呌號愁嘆殆不忍聞明之為郡幾年矣不知一旦何苦而行此哉向若早得一知人痛癢者繼其後尚可急救奈何一山去一山來暴病新創徑成痼疾耶天矜斯民無往不復膏雨陽春漙其來施竊聆教條始布旄倪鼓舞識者所望於先生固有度越尋常之萬萬者矣不知先生其何以副此望近世財賦一收則必有一支既增則不可復減創例則易除弊則難明昔號富邦聞今大空虛先生適承其弊亦難乎其為矣如使伸一寃剖一獄以此號為清明官府不獨世之所望於先生者不止此先生亦寧以此自愜如使剔蠧源除苛賦再為百姓培埴命脈不獨先生以為難而世亦未知先生之果安出也然嘗譬之家有常産量入為出未見其病不足者適不幸有善營財者為之入雖日以多而費亦隨以廣久反愈見其不足是可不求其初者乎今姑舉一郡而計昔也未收諸縣縣用職租未增諸縣稅額酒課嵗入幾何歲出幾何果何道而不必增今也縣用若干之贏歸之郡酒利若干之增歸之郡嵗入幾何嵗出幾何果何因而不可減以新較舊計其已增其在本郡者痛為裁節其屬朝廷者力為申減磨以嵗月恐亦可漸還舊觀郡計非某所曽知此以作家之贏縮譬之也抑小之固可譬之家大之亦可譬之國國初賦入少而用度足其後入幾數倍人反以匱告先正范蜀公曽南豐諸人固嘗件列條數以冀參酌顧朝廷事大牽制處多有非一人臣之言可專者先生以國之大臣出專方靣伸縮宰制無不自我入相事業於此乎基又豈止石湖僅一二疏剔救急之政而已哉某嘗觀易之為卦六畫皆連而為乾陽之盛極矣一畫甫缺其下即為剝六畫皆缺而為坤隂之盛極矣一畫甫連其下即為復世之為政者類不於其下留意殆掘牆腳法也使人寒心顧天下事類此甚多而欲言無路明吾父母邦亦先生蔭樾相連舊所視為一家之地斧鉞下臨榮踰晝錦此真千一難逢之機會如前所陳昔豈無欲為之者而力不逮亦豈無力可為之者而志不在先生力足行此志實務此自念時哉不可失故敢冒昧及此先生斷然而力行之使明之人士世世子孫家家户户祝曰革積年之弊垂無窮之利自某年熟於此邦之西澗相公始豈不韙歟某非不知善政不如善教高談大言足以恱人觀聽而區區必先以財賦為言者誠以政立而後教可行不務實而務空言非所以事先生之道也伏惟諒其狂愚而卒赦之少留鈞意千萬幸甚伏乞鈞照與江西陳運使咸淳七年撫州某平生景慕今獲照臨依戀此心豈忘食息救荒無䇿禱雨不應狼狽病瘁久缺嗣音惟有私切愧恨而已明公能亮之否某鄙人也自為初官即以率直事其長每荷聽從朅來撫州不免故態而諸司之相亮者殊少自是消剛為柔往往效尤吏文相與為故紙世界然中心之負愧多矣獨荷明公矜其區區無言不酬應輒如響故每於回申直率如故不敢為吏文應故事古人有言士伸於知己者屈於不知己者明公知我者其感宜如何古又言士有白頭如新亦有傾蓋如舊明公不待傾蓋而知我者所謂未靣而先心其感又宜如何此感也非為吏事往復而感也中心之景景者賴明公未至盡消而為柔如碩果獨不食如一軍獨不敗旦夕去撫州對山林不至皆愧色實明公賜也惟其見知於明公如此感明公之賜又如此因得為州民代申心腹之苦三邉未撤戍和糴不可缺者也撫亦江西一中郡和糴不可辭者也然去嵗撫州之極旱江西諸郡所無也今嵗撫州之缺雨亦江西諸郡所無也撫州有準省劄糴還去嵗和糴之米萬七千餘石糴還曽借充賑糶五年分和糴米一萬石及催三鄒莊談胡莊阿鄭莊如浙西公租代和糴充軍餉者三萬餘石又皆江西諸郡之所無者也嵗當極歉之餘田無全熟之望已有合糴合催充軍餉者六萬餘石尚未知所措若比他州有全熟而無宿欠者又一體均糴民將何以堪命得無徒費使命之煩督乎得無適誤軍餉之指擬乎用敢百拜具公申以聞復此私於明公乞垂憐而改命焉若道路傳聞謂本州粗得熟者謹不可信某初夏方缺雨問田尚有水乎衆曰有及親視之龜拆矣及缺雨久又問曰苗得無稿乎衆曰無傷及親視之焦如矣人情好諛多作媚語又攢眉溝壑之瘠而動心䆉稏之香驚喜張皇言多失實亦人情然也其謹勿信某以直率事明公故敢盡吐其實併乞台照答撫州程教授請冬至講書劄紹聞某疊勤惠顧許借之講席俾誦所聞以求教誨自惟庸陋失學何幸獲預切磋一人之末苐某區區鄙見每竊謂今日吾儕之所少者非講説也躬行也向也六經之旨未大彰明我朝諸儒所以極力辨説至文公而精切的當矣吾儕何幸獲享其成入耳著心以正躬行此正今日緊事又暇於文公腳下添注腳乎來謂言為州郡者職兼政教誠是也某竊意教不止講説而已也風雨霜露者天之教無行而不與二三子者吾夫子之教下至嚴君平賣卜成都不足道也己猶能於卜之中教人孝教人悌天子付人以千里之寄其所得行者亦異於賣卜之人不能隨事寓教以正人心是於騰口瀾倒之中又推其波耳某嘗思之方為此恐竊所不敢也來謂又言文公在南康救荒後每入學校與朋友講説誠是也然使某襲其迹而竊效之是自比文公也某其敢乎哉且文公之書某固伏讀之久矣其書浩博古所未有而講義僅有玉山一篇耳大意蓋以古者疑而後問問而後答故於講習有益後世之講有不待問而學者之所聽亦非其所疑故五十年為天下儒宗而未嘗登講席其任玉山亦因程君琪再問而再答故述以成之耳南康之講説必亦與友朋隨時疑難問答之實工夫非海説也未知尊意以為如何因文以施教願執事任其責因事以寓教某願學焉前廡諸賢幸道此意鄭廣文則别書謝之矣併乞台照與鍾運使季玉某日者不揆犯分僣為一道生靈代申迎拜之請即荷台慈於郵筒填咽例末豫入之先首賜親染速於響答且凡詞藻之潤無非心腹之真自惟何人辱此隆遇榮感不知喻云也自爾望望前茅以刻為嵗一兩日來吏民欣欣相告謂福星之臨照有日矣某均一欣抃某於使臺為支郡例有四六啓以代參謁某何敢後然念明公今之古君子某亦素以愚直事其長者儻不以民生疾苦時事得失上備咨詢之萬一而例以無用之諛辭是豈明公所望於後學之為僚屬者哉惟是某識淺才踈又於江鄉風俗素未之諳無可上禆末議某初官作吳縣尉自此竊預浙西三監司之幕者凡六年粗有見聞敢以為告惟明公擇焉其一曰初建臺之攔狀浙人好譁每監司入境爭以詭名狀攛入布袋規壞所怨之家其後某審知無辜者之被禍也告其長以候建臺後點名方判自此惟實有欲訴者方來餘成故紙而獲安者衆矣其二曰建臺後之匣限大凡士大夫持麾節誰不欲恤下緣初帖不應不得不改匣改匣不應不得不專人其過誠不在上而在下然下亦誰不欲奉上唯謹哉繳匣必有費故縣官回匣多差元承引之弓手寨兵而州官回匣例是差兩獄之獄級獄卒近年諸司事無大小皆是遣匣一日之間駢至者以十數此曹椎人骨髓以活家口所餘能幾而可了諸司繳匣奔走之費一一如期哉故勢亦不得不違限特上之人弗察耳某嘗告其長一州一縣各委一官為承受官司總收又移於一匣從鋪兵循環往來當使廳面投所費既無而限無復違者矣其三曰建臺後之舊事近年官司七五年前公案吏人往往檢詞訟者已息而呼之訟者反不已某嘗告其長建臺方新盡刷舊案甚不得已者乃行餘從倚閣而政簡刑清矣其四曰建臺後之受詞在法縣斷不平而後經州州斷不平而後經監司近年以來浙西有一匣無賴凶徒名百家幹人摟攬越訴以威奪小民或止因私租而誣以奪田或本訴户婚而借名被知難明監司亦或為其所動某每事其長多為考核擬退而訟少民安矣凡皆往年幕中之事在人之下而聞見易逹故可每事效其區區今來試郡勢便隔驀回思往昔不覺汗顔聊以前日之告其長者告明公少見僚屬效忠之毫末耳至若近年通天下之弊欲默不忍敢併及之方今大農告匱於其上州縣焦􅘮於其下者賦財折陷也有土此有財而折陷至此者大家不肯輸官也大家不肯輸而綱解不可違於是乎出下俚窘急之䇿為白撰為預借為重催抑納而小民愈不聊生是大家之幸免者小民之重不幸也士大夫之稍有材志者或班改作宰或朝省特差或監司辟置必正户籍必督逋租大家必羣起而攻之臺評之及縣令者必言催科殆無虛月詞訴之訴縣吏者必以催欠之數就為欺詐之贓於是諸縣官吏惴惴度日而小民日苦根本日壞矣小民因大家不納而代受重催白納之苦至於家破身滅而不能訴大家既身不納官而纍小户矣縣道偶一及之即遍訴於諸司且飛語立聞於臺諌某謂官有貪墨雖竄之可也吏有枉法雖殺之可也若催納王賦上供朝廷此堯舜三代以至今日天地間公當道理而今世在上之士大夫必以此罪縣令曰吾為小民也不知此為大家之役而重小民之禍者也長此不已縣壞則無以為州州壞又將何以為國某念此甚苦未知明公以為如何伏乞台照與鍾運使某昨為一道生靈代申迎拜福星之請洊辱寵答伏讀欽荷日者欣審風采一新逺近交慶某以鄙懷仰體賢部使者建臺之始酬應方殷不敢修世俗長語為賀四月二十日恭準行下民詞三數頃除已即刻供申外别有使牒催排事此事關繫甚大敢先具劄情稟先乞教誨蓋天下事莫切於推排亦莫難於推排今大家肆兼并隱落之姦小民被重催白納之苦大農匱乏州縣煎熬皆失推排之弊也故曰莫切於推排然李椿年侍郎與秦會之丞相兩才相遇上下堅守當亂離之後吏民未能朋姦為弊之初尚行之不盡其次以壽皇之英明朱晦庵之才望千載一時力行之漳州卒為土豪誣訴而罷又其次如近世趙節齋以間出之吏才收拾一時之少俊生長浙西三典吳門而一經推排之後苗稅飛走反以羡聞至程訥齋丞相出鎮無以填納虛增之額先皇帝始太息而詔減之其餘凡經推排之處坐此弊者十嘗七八故曰莫難於推排某此事痛心疾首為國家思之久矣惟得明敏公正精力未衰首為知縣而知縣自行之決可革弊或知縣不得人而上自朝命海行催趣不過擾民一畨而財賦愈失陷弊且益甚近有浙士自吉州永豐官滿見訪云本縣元額苗三萬六千今自推排盡為大家隱落僅存零數推排之不可輕易如此某年今六十百病滿身五邑之宰惟崇仁周宰汝同辦事餘皆姑息架漏求滿嵗月而已以此年來雖每奉使臺行下不過申展每僉申展必為太息蓋不思為文具之事又勢不得以倩言耳今者新約束以公信兩字立程限限才至滿事必責實將來必無以應命若不先此控申豈支郡上奉監司脈絡相通之實意哉必欲行之止可約以今秋收刈之后責半年限帖各縣任責如以某所言非妄灼知某之老病各縣之非才不若止擇知縣之可托者次第圖之而元行下推排公字之牒且與暫收可也牒限十日候限到方由此時却乞台判此狀乃先説本情預求斟酌也伏乞台照與鍾運使某不避斧鉞僣干崇聽某照對三邊猶未撤戍和糴不可免嵗𣲖七萬餘石本州不可辭但有民情職當稟逹本州歲糴七萬二千五百石此斟酌出産以行均𣲖此他州之所同也本州有沒官田號三鄒莊談胡莊三萬一千八百餘石比同浙西官田見充湖廣軍餉又有阿鄭莊三千一百餘石承準安邉所樁管指擬撥充軍餉凡此共三萬五千來石均是本土出産不煩和糴之費已充和糴之實此本州之所獨也若官租已增和糴不減是本州於上供外又每嵗共辦邉餉近于一萬石四邑山田何所取辦譬之舟載非力勝矣况前項三萬五千來石之租既已入官無復苗稅而嵗解上供十萬八千一百二十五石元數不曽減豁民已不堪若於和糴七萬二千五百石元數義不量減是本州之民重困雖嚴督無所從出矣以故屢任和糴至今皆有見欠日逐程督有不忍言豈非事有曲折前此未遇良機不曽申明致準上司一例均𣲖力不能勝弊遂至此兹者恭遇都運編修更部以惻隱不忍之心行公明必察之政前嵗荒年和糴賴在建昌一申江西十一州例蒙寬減况今正位崇臺均施支郡造化在手伸縮自我此而不以告是某不知恤民上負仁造矣用敢僣越具申區區欲望台慈特賜矜察將本州官租見充軍糧之數凖入和糴撥充軍餉之數却將本州𣲖外畸零之數均入各州有富室無官租可以挨那之數庶諸州各隨其力而本州不偏受其重諸州均以零數衆輕易舉而本州免此多數積弊漸蘇於上臺之總數無虧於諸州之𣲖數無偏於本州之實數可辦闔郡生靈永拜上臺大公至正無窮無極之造下情不勝僣越干冒俯伏俟命之至與鍾運使某竊庇崇臺無謂不敢犯分瀆尊兹因民情僣有申稟昨以民産之籍充軍餉者已三萬石有餘苗稅不除而𣲖糴仍舊乞賜將諸州無沒官充餉處通融移那減除本郡多敷之額已蒙台慈許賜斟酌今𣲖糴行有日矣又前狀係公申凡糴事曲折恐反致紊煩者不敢縷舉今用親劄情告撫州自割置建昌軍之後除樂安一縣在萬山間從來不預和糴之外其係和糴者四縣建昌之係和糴者亦四縣土地人户大略相當而撫州之和糴乃幾三倍於建昌前使者不量力而授任前郡守不據實而陳情官敷數目之虛民受病弊之實官吏茍且便文相欺本州迫於期限以縣吏抱足之數而申使臺朝省據使臺申足之數而劄總所若謂撫州真堪此數而實有此米及某到州契勘自三年四年五年六年皆是架漏移偃以逃罪責人户多以𣲖數太多而元不領本吏卒因以人户不領而侵盜落空或黥或死或户眼元不著腳或鄉司抱認誤𣲖自朝至暮鞭撻無算欠以千以萬納以石以斗某不忍見屢欲明申衆謂才經上司徒添追治無補救弊以故屢作而屢止今以都運誠實而可忠告明恕而體人情敢盡以聞望哀之念之特照前申展減元數使人户可納官司可催免從來積弊免無數敲朴千里之人實拜二天之造都運王官也某雖不肖亦王官也為朝廷謀事非私於一州而言也某試郡已年半行為去客江浙相望千五百里一去無再來之期非要譽於撫州之民而然也非有親戚故舊住撫州而言之也公天下之言也人户之事而州郡代之言非有一人錢料理呈稟以期事之必行所恃以都運有公天下之心而恤民之切也敢九頓首以俟特筆伏乞台照此請不行本州因自措置招糴回趙知縣伏蒙寵賜龍川巨編所以品題之者劑量曲當非素有所主於中者能爾乎某嘗謂本朝理學大明而戰國縱橫之學如三條四列隱見起伏錚錚於本朝者尚四人蘇老泉其巨擘其次為李泰伯其次為王雪山其後為陳龍川獨龍川登晦翁之門日就斂挫縱橫之餘氣到此遂收此理學大明之功之驗也執事以為如何敢因求教回靖安張知縣某雖不肖粗有愛賢之心每訪人物於往來者多談執事才美思所以推挽而未能正魏仰間忽辱惠書欣浣可知苐蒙以慈溪為説而賜之褒拂則某區區之愚未有以見知於執事而流俗之以告者過也夫慈溪者某所居之邑名非某所以自名也朝廷以慈溪而名其邑非某以慈而名其溪也宰是邑則可以居是名如陶彭澤是也執事宰靖安名靖安則可某居慈溪而名慈溪則慈溪生齒何啻十萬計爭此名者當幾人豈因流俗之言誤認以為道號之類歟則尤非所敢與聞也前輩道尊德盛為世所宗仰恬於仕進者則有道號如濓溪則追記其舊地也如明道則其身後門人所以尊其師也如伊川則門人不敢指稱其師而以其地稱之也如六一居士則致仕後自戲之言也如東坡涪翁則罪謫中自託名於蕭散者也如南渡後三先生道號最為顯著近世始多慕用之然南軒先生但稱廣漢張某未嘗稱南軒也晦庵先生但稱新安朱某未嘗稱晦庵也東萊則又追用上世衣冠鼎盛不可復見之舊地哀惻之念所寄焉者也若夫伊洛同時諸賢之仕進者皆惟稱其官南渡後三先生先世皆顯宦亦皆惟稱其官何嘗有所謂道號者哉近自史衛王之子年少冨貴時與其親戚趙制置諸子徜徉東閣無可作做始倡為雲麓一岩十洲等號波流風靡直至今日前二十年識者猶或非之今則識者猶或為之嘗觀三代盛時士大夫止有姓名官稱至戰國亂世遂有雲陽君等之號遊士東西奔走不復稱人之官不料我今聖世亦復有此怪事甚至丐徒賤𨽻倡優技藝莫不標榜自謂道號此又戰國亂世之所未聞者也此事亦奚為而至我哉因慈溪之名而言仁因仁之説而講泰卦旨義𢎞深則不敢不佩服以拜教也伏乞台照黃氏日抄卷八十四
