body:
  text: 黄氏日抄卷八十宋黃震撰公移三浙東提舉到任榜照對㳂海亭民被前此監官上户及本司人吏盡奪本錢白納鹽課雖本司差官監散所差官吏反又尅取事例添魚喫水間或差得人從公俵散待其轉背監官上户仍復拘收此弊盖所在而然十年前當職為浙西提舉司幕官曽行區處盡其曲折浙西之民一時再蘇今叨鄉部去民情隔驀又所部廣闊深恐有辜小民不能急救除一面具劄禀問官員及曉諭小民自陳利害外所合先次開列曉諭下項一革監官掩取鹽本之弊上户掩奪本錢起於場官場官監主自盜起於泥鹽泥鹽者舊有鄙夫厠迹場監掃掠着地之鹽掩為食利之私其後流弊遂於亭户所納官鹽眀收十分之二名曰泥鹽附打官袋分受本錢其事已可駭其後益弊又將所收泥鹽自行私賣待散本錢仍照舊例再取十分之二名曰泥鹽本錢既以官鹽盜賣又將官錢盜取進退無據而展轉皆利其事尤可駭此外貪刻千條萬緒各場異俗各人異心一靣差人遍處訪求姑先舉其彰彰在人逺近通知者言之耳此事若局外之人驟然聞知誰不汗下而儒其衣冠官其靴笏者安於流俗狃於積弊汨於微利視為當然恬不為恠甚而近者又創為倒竈之説如亭户納鹽兩限則場官虛申三限本錢一到則拘收虚申之錢數名曰倒竈此即竊用納苖虛鈔之故智又有舊來文慿錢之説先鹽課之未有先本錢之未支預作亭户名目濳借鹽倉本錢名曰文慿計置上司或作宅庫應支反稱亭户先欠我錢本錢未到已皆兠收弊倖之生日新日恠自非將場官洗濯一新本司何處下手然監官皆經前政選擇當職既不應副人情泛差權攝一切且當仍舊俾安職守但須痛念時艱之非昔仰畏神監之孔昭自此悚息更祈力行好事前此之弊例必思痛絶之前此之民瘼必思力救之庶㡬皇天悔禍庶㡬性命之可保其間好同官能體此意不特存留更當薦揚其間偶有不好同官或以愚言為迂不知相體不特汰斥更當重行按劾其或無官權攝又非其人仰各揣心自為去就如有違犯追勘決配三辰在上一語必醻一革上户掩取鹽本之弊舊來上户為下户發本此不可無者也中間上户為官司催鹽亦尚可留者也近來上户與監官結扇騙取小户本錢此豈可有者哉且説民生苦惱無如亭户日受鞭撻無如亭户鈔客所還本錢分文皆是賣肉上户亦只一户下户各自户眼本不相干今乃身為上户不自煎鹽反以都長統催為名奪取小户勤身苦體賣肉所得之錢世俗所謂赤脚人打麂着靴人喫肉未足喻其不平也農夫深耕淺種尚有天灾上户何忍乃於同場鄰里血肉身上白奪衣食天網恢恢疎而不漏所以小户受罪不過鹽場之鞭撻上户受罪動是本司之黥配小户人家雖窮困而長在上户人家不再世而淪亡今來當職並與除去前項都長統催名色各仰改過安分莫更覬望衆錢自此上户陽免本司之督責陰免神眀之打筭正為上户做好非絶上户利源截自榜諭之後如有再犯定行追上搥折右手估籍決配一革本司人吏陰取本錢之弊前項場官上户之掩取皆弊之末流也如本司人吏諸色之欺取則弊之本源也場官之掩取分以充本司人吏之苞苴上户之掩取聚以充本司人吏之計置是亭户白納鹽而人吏乃反白得錢静定思量蒼天謂何今又何時可不痛改往歳王寶章除浙西提舉先聲入境吏如氷立此時當職為浙西帳幹親見都吏韓振宗以下四鼓先入司存土地堂燒香拜告發大誓願不敢接受分之願賜保全一日日日如此終任乃已當職庸晚既無先聲又官學外方三十年近方得祠歸里雖有區區赤心亦未必本司人吏之曾知今令責罰罪狀其素有良心及能改而為善者情願留則留其有舊習難化不能改惡為善情願去則去截自責狀之後如有再犯定行黜籍重者照條計贓寘之死地念哉戒哉毋貽後悔但聞諸場固是計置本司本司人吏亦用計置以上官司遞相吞噉弊至此極今幸朝廷清眀務除宿弊自當一一討論具實申眀以免故紙不切之督責一仰亭户更自陳被擾之弊前此三弊已見榜諭然恐人心不同仍前違犯當闕恠然今日非前日比也時變孔艱性命未保正是平日官吏積惡造孽到此打筭若官若吏若上户須截自今日别換一副心腸重新起生做人性命既未可保財物欲將何用血忱對天祈哀乞命㸃檢從來之罪過洗濯今日之身心舊取泥鹽錢者今誓天斷不敢受舊受倒竈錢者今誓天㫁不敢受舊取文憑錢者今誓天斷不敢受如此則上天有悔禍之期性命有可保之理人人各識世界人人各知時變人人各用敬畏神眀於急難中思所以救其身命骨肉待時艱過了國家再安所謂身在則有餘矣其有頑不曉事不知時識變之人本司只得重作施行命官犯者按劾其以前權攝白帖見在人犯者決配吏人犯者照條計贓寘之極刑本司吏人先責罪狀附案度不能痛改者與其自陷重罪仍情願先次退役備牓司前併榜各場約束因捕鹽欺詐榜訪聞舊因巡鹽厯官司作弊勒犯鹽人通注欺詐平民以致在鄉私販人亦預先挾此讐記通注脅詐平民深屬不便今本司已除去巡鹽厯一切與民相安其或鄉下尚敢借此欺騙仰所在都隅官及圑結保長等擒捕解司切待重作施行須至鏤榜曉示收巡鹽厯當職初筮浙西親見巡鹽厯於官畧無所補於民未有所害徒為弓卒取過水常例錢為吏人取批厯常例錢即曾禀白浙西提舉盡除一路鹽厯近如此間分司㕔又不獨取常例而已往往捕窮民升斗之鹽以鹽倉私置牢獄敎其妄通騙脅民財不可勝計又有一等㳺手與分司人吏通同設局做鬼採訪稍有衣飯之家脅詐殆徧其害盖有大於前日浙西所見者案牒帖免一路巡鹽厯并茶厯並免如有違戾去處官劾吏黥仍榜司前曉示截自當職交事以後如有再犯者許人陳告約束亭户妄採他人柴笋從來編民亭户雜處海鄉婚姻交闗彼此相濟近因飢荒亭户作過編民懐怨本司已行禁戢亭户及將日前為首人節次牒制府聽從施行其隨從及不曾同共作過之人已各着業自今入山買柴仰編民亭户相安無事訪聞去夏亦曾入山擔柴不曾還錢反因而㧞笋自今如有此等再犯定行追斷約束瑞安倅㕔差鹽場機察訪聞瑞安府管下五場因本司隔驀多有江湖乞丐之流媚取貴人書劄脅持主管官求為機察提督之類場之官吏亭户皆苦之官鹽為其分取及多取盗賣以實歸橐者多矣或有挾書而求者請徑解本司當根究重作施行牒取遵禀一日申仍帖五場照應遇有到場稱機察提督之類者即時申來如礙情隠庇本司覺察得知一體議罰近過青田縣聞亦有之併帖並一日遵禀申仍榜約束諸場折納鹽照得諸場官吏掊尅亭户欺取本錢等弊本司已行約束痛革外又有折納一項尤為公私之害盖場官但欲得錢髙價抑納虛銷簿書殊不知亭丁日貧鹽額日減為自計得矣其如國課何帖諸場戒約取官吏秤子遵禀知委罪狀申如有仍前折納去處許人陳告或本司覺察得實定行追究官司將錢問亭户買鹽場監反抑亭户折錢代鹽違理非法莫此為甚近年場監多將倍秤入敖官鹽賣而歸私若此項折錢不待變賣尤為奸利鏤榜曉諭許諸色人告蠲免滷折鹽近榜諭革弊當自上始滷折鹽一項候契勘曾不由省所契勘元不曾申省正是本司之私然則何恠本司人吏與場官上户之侵奪哉案只今榜帖諸場截自四月初一日交事之後先住收滷折鹽其日前已解到倉者並理充正鹽其理充正鹽一袋合有一袋本錢候筭計分曉日又當分曉為利民之事仍申省申御史䑓照㑹庶後來無敢再取者曉諭亭户安業照對今月十七日凖省劄指揮専一措置圑結亭丁當職近聞鳴鶴東西場亭丁借粮作過本縣見行追捕㳂途間有殺傷其餘或逃竄山谷一鄉驚擾㡬不聊生切恐各人未知當職新凖省劄圑結因依今急遣職吏范榮祖星馳前往本場撫定兩場亭户作過者只今帖息逃走者只今歸還本司見行攅帳選官前來散還本錢各各仍前着業截自此榜曉諭既到之後如有再犯本司自當重治施行其日前縣道已追到人帖縣竟將為首人速行斷治所差追捕人日下權與抽回具遵禀申曉示亭編詞訴各有所𨽻照對禁暴事屬制府鹽課事屬本司一心體公各盡其職初無彼此之分今春飢荒小民羣擾㳂海亭户往往相挺制府已逐項施行鎮定外當職自交領鹽事以來有編户訴日前為亭户刼奪者有亭户訴日前為編户殺死者當職以其犯在日前事屬制府或判示或移牒一切請制府竟自施行制府委曲或間有移牒本司相闗者本司亦已眀白回牒並無一毫黨私之意今來積欠本錢並已散還二麥登熟旺月在近切仰諸場亭户各各改過安心着業截自四月當職交事以後如有再犯輕者本司自行追治重者仍與追解制府切恐亭户不曉事者恃本司為父母官司自陷罪辟後悔莫追所合眀白預先曉諭自交事以後凡涉借粮詞訴開列下項取㑹須知事宜鹽場抄具須知册皆是謄冩古本事體日變區處日别場監風俗在在不同須是場官知時識變契合天理别具今日見行拘催之法起運之詳取於亭户之出剩者何項分𨽻付於綱稍之増打者㡬何數自裁酌區處公私兩便庶㡬無負於今日朝廷通寛䘏之意本司虛心顒俟以慿公行戒諭倉庫欺弊本司久不専除正官今當職濫叨鄉部凖省劄指揮詐稱合住而多得厯者又有府第宅舍幹人轎番月請主家俸給而亦以無産業求厯者厯頭糴米比無厯者稍有一兩錢之争人情便多生姦計實恵難及窮民往往坐此案帖委僉㕔衆官分廂家到人問誰是合得而未得誰是不合得而反得誰是元不合得而今來陳乞欲得給厯之要鰥寡孤獨為先貧無道業及不充公私役使者次之着實保眀覈定一番庶得均平仍揭示行衙前仰人户通知不必再來本衙入詞本衙難知虚實狀不再判矣四月十六日委請諸縣諸鄉都勸糶官牒照對本州勸糶而不勸分正欲安全税家彼此相安不敷數不減價不置場移粟然若以官司行之恐終亦不免文移之擾今於各縣禮請寓貴士大夫各充局官請自於其鄉提綱勸諭應有報應文字並請只遣私僕前來投放本職終日坐㕔守待到即親手接受親手付回並不經吏手以致停隔其差來投放文字人自當量支路費萬一有執吝不糶之家事不獲已官司自作施行亦決不致使寓貴取怨富家然貴極必賤人取我予此正是從古陶朱猗頓諸公謀富之要䇿米貴出糶又何待勸勸而後糶已使人汗顔合千人得力者為之自場官至上户以至中下户雖貴賤不同願同心併力此各是自家切己之事朝廷施行正是為吾民計切須日下結定申來以慿回申朝省照應日前亭户擾亂多因官吏貪刻今次團結亭户全在場官任責截自圑結榜諭之後亭户如有再犯重寘典刑場官先從按劾場吏并寘重典今當時艱各宜對天發誓改心擇行悔過修善祈免患難非復比舊時事可肆胸臆矣又團結亭丁係省劄見今専委緊要事近令不問上中下户一體排結十户為甲輪月為甲首者盖以上户從來與下户勢分相隔不屑與之為伍故須先令逐户排起其間上户聽令用當直備丁等當官使場監可以一體㸃名也實則圑結自是上户合行自為保䕶鄉井之計只係上户切身之事今於排定之後仍從逐甲使上户主之但不親身到場與下户一體㸃名耳其逐甲十户之内或無上户亦須上户通管大抵圑結編民亭户皆合鄉曲自做而官司總其綱近如大嵩傅監場東江楊監場圑結各有法編民亦倚頼之所在風俗不同更帖諸場於十甲排定之後禮諭上户相與主維而場官仍照元行自總其權本司於散錢不許上户干預者為上户絶後患免官司督責也於圑結再勉上户主維者為上户防近患免盗賊窺伺也兩者並行而不相悖請場官眀諭知本司斟酌之意呈行官員便宜藥須對病方能作效大凡官員多是不知風俗利病只慿案牘施行皆不對病之藥也若鹽場利病民困愈極則官課愈虧是為公私交受其病官司一味頑法督責徒重其病耳當職初官在浙西曾為孫提舉徧行諸場訪求仔細孫提舉盡行寛政鹽課反大増盖藥對病耳當職自為提舉官民情隔驀無由得知被命以來訪求兼旬雖荷官員士庶有以利病告者尚未能盡悉除前此已置册分類抄要及將續收文僉㕔官抄類畢日逐項書擬合如何施行庶於民瘼日瘳且不孤諸賢見敎之美意禁約謁士干求舊來以鹽場為非理取錢之地所在江湖之人挾書干撓今欲更弊一新牒帖本司所屬官截自今不可為人發書仍帖場有挾書到場者勿受其無禮者解來又間省部人吏送㳺謁術人與本司人吏本司人吏轉而達之場監者尤多於官員之書訪聞諸場公吏亭户艚舡之家皆用湊錢應副仰本司人吏責狀自今不得發㳺謁書與諸場若上司有送到者但據實回答今時艱如此聖治更新不可再發書矣禁約欺詐照對本司今免専人免牌匣免巡尉司巡鹽厯免主管司茶厯止有場監青册當職終日坐㕔聽從當㕔投下以免日前文慿重費應日前分司㕔害民事件盡行掃除以奉行聖朝新政一切與民更始如有仍前在私欺詐及窠頭門房或私於客店闗鎻平民並許被擾人陳告曉諭亭户納鹽亭户前趁有利本在諸色業藝之上官司白令納鹽而又日日鞭撻之遂反在諸色品目之下今本司奉行聖朝新政盡禁文慿泥鹽倒竈髙額等弊盡散亭户日前未還之錢當此艱荒百姓一錢無討處亭户動成百數請錢此時若不作急趁辦是自絶衣食道路也是不顧父母妻子也官有定額只得懲治矣備榜仍請場官善督之差場脚走遞文字諸場統催都催都長等掩取衆户本錢雖是其利常受本司督責極是其害其實於官無補不過本司人吏下連各場監官使官錢轉為文慿錢下户不可赴愬久之上户亦自敗亡耳今雖一切省免切恐上户知利而不知害尚有陰執其柄所合申儆又有都竈首之役向來多差上户今轉而歸之中户一番充應家破人亡盖編户充保正間或接官亭户充都竈首常用接官縣道公人下鄉尚有時節場監脚甲催鹽並無虛日名為脚子一歩不行而抑都竈首還雇船之費身為公人不繳青册而强都竈首受繳册之苦如此淪洗中户日衰而本司根本之地空矣自今並不許諸場差都竈首就將今來圑結十户為甲每月輪甲户催鹽周而復始脚子不許討茶飯應干申狀月册並仰諸場輪差脚甲走遞如縣道差手力充直州之例榜帖行禁約綱梢運鹽積弊綱梢盗賣官鹽反虧官袋運數固是綱梢積弊亦緣本司不依時俵還水脚錢及鹽場鹽倉兩處官吏皆有常例錢本源不正難以律下今本司一一盡還今得水脚錢鹽倉鹽場並不許循習舊例取受多搭以其所得兼其所有綱梢亦可少寬從此一新矣牒主管司照已判先將欠少免監者先差載鹽以示旌别如運二百袋者先支水脚錢一百袋候運到支湊足二百袋責罪狀既免舊欠又支官錢自今以後不許少欠升合仍帖倉場取各官朝典狀専秤決配狀並不許乞取綱梢分文仍榜倉前見運到鹽催交足委官定秤二十七日吉辰請程提幹同所委官各場定秤官楊兼僉陳兼僉早到支鹽倉先定本倉交入秤則以示綱梢使之通知却到各場喚亭户靣審裁減向來多受之弊量與斟酌以補綱梢在路耗折使可經久通行向來綱梢多取鹽場之鹽亦緣支鹽倉交收綱梢官袋鹽一如鹽場交收亭户入納鹽掃掠拏取用大筲大杴可容三四斗者白奪其鹽每一綱船到倉聞用七五袋鹽狼藉又聞一船到岸用縻費錢一百六十貫専秤所取最多監官以至門子轎番皆有常例梢工若不多取亭户鹽㳂路盗賣錢從何來今來欲革鹽場多取合先革鹽倉多取然一倉吏卒衣食於此譬如鼠穴此處塞了他處穿矣今除前項積弊嚴行禁絶及分司㕔已罷不許乞覔及監官必能作新屏絶弊例外其見在倉衆請提幹同所委兩官同支鹽斟酌眀破些少食利聞向來王敬岩為提舉日諸場亦曽行此當職昨為浙西轉般倉分司亦為倉衆申聞朝省眀給食利此亦參酌人情同期於經久可行者也所委官回申定秤裁食例等向來鹽倉取綱梢錢數太多以有分司㕔百色陪費也今奉朝㫖省免分司其他舊弊本司又一切禁絶吏卒苛取更復何名事神喫神各有家火姑從衆官斟酌減定之數過此更有乞覔被綱梢衝㕔陳告犯人定行追勘決配然事例既減倉衆亦何能盡給牒主管司喚上倉衆擇其强壯有用及稍知畏謹者存留其老弱已不任事并平日害人者汰之使各别求藝業以趁口食仍帖倉照應其錢數已從裁減若零鹽食例却非本司之所當言仰本倉自為斟酌但得不苛取綱梢足矣帖各場筭納鹽數今次散錢亭戸各賫手厯㸃對已有慿據但諸場體例不同有筭斤者斤有大小有筭斗者斗亦有大小有筭籮者籮又有大小各帳申到總單問亭户手厯不對臨時審問打筭未免費力今截自六月以後諸場遣發亭户前來請本可於各户手厯上眀批本户納㡬籮㡬斤紐計㡬袋零若干又於所申總單中開列逐户數目一同庶㡬本司筭袋數還錢一見便了上下簡便亦免致擔閣亭户預帖諸場取遵禀申一日引放詞狀榜當職近因時艱未寧不敢輕受詞狀嘗出曉諭誓與吾民且皆以息心省事祈天乞命為急吾民未甚相信多攛狀入司前收受人户訴命官犯贓録櫃内今自六月内為始眀出受詞日分須至約束下項一有承平之事有艱難之事承平時節别無憂慮畧有睚眦便討分曉人情然也多訟宜矣若艱難時節且叩天地神眀保全自家性命其他些小何足計較而暇於訟也哉今時節艱難矣敢瀝心腹腎腸以與吾民言之自昔治日常少亂日常多人民苦惱何可勝説自太祖皇帝深仁厚徳保養天下三百餘年前古無比古者士大夫多被誅夷小亦鞭笞太祖皇帝以來始禮待士大夫終始有恩矣古者百姓常被調遣多死邊疆太祖皇帝以來始専置軍人容養百姓終身田里安樂矣古者因各争戰取税繁重太祖皇帝混一天下而税賦薄矣古者行杖民多致死太祖皇帝折刑一百止斷二十而刑罰輕矣古者不問貧富皆用當官司差使自我宋均出役錢雇衙前雜直而民不知徭役矣古者多巡狩逰幸浚築土木或萬里起夫自我宋一切事安靖而民得保室家矣太祖皇帝如天恩徳已不可悉數況自南渡至今世世聖君並無失徳自宜配天萬年永享太平今遇厄運㳂邊諸郡生靈肝腦塗地甚至浙西亦被其擾試言此禍誰實致之皆是我輩生長太平不識好惡獲罪多耳士大夫不救民而反害民偷官錢打闗節借周公孔子之言文盗賊小人之行天如之何而不怒富家大室不恵鄉井而反禍鄉井閉糴長價放債吞併田連阡陌不納官司升斗之租州縣舉催反訴官黥吏為永障户門之計天如之何而不怒小民之為農者多無藉頼租為工者多苦窳欺罔為商者多假偽虚擡為公吏走卒者毒害無厭為船梢秤斗者欺騙太甚為販海者多刼盗其詞訴之智共為保衞之謀移其計置之費共為保衞之用是千萬人之心皆以太皇之心為心是即上天之心是即太祖皇帝之心外寇必清時節必寧他有小事自然得平一除前項勸諭息訟外有不能小忍而必欲訟者亦擇而後受非經州縣次第官司不受非已斷不平不受非户絶孤孀而以婦人出名不受自刑自害狀不受着布枷紙枷狀不受投自紙狀不受事不干已不受事不屬本司不受一狀訴兩事不受不眀該年月姓名實迹不受匿名狀不受狀過二百字不受不經書鋪不受一六月十八日受常平司狀六月二十八日受鹽司狀自此每十日一輪流五更一㸃受狀當日聽判還外扛雇募錢立法之初每鹽一袋用官錢三十五文足雇募百姓扛袋鹽下船名曰外扛今三四十年不支反將舊日用錢和雇之家籍為定額白令扛鹽場脚一番追呼外扛反用一番陪錢陪酒天下豈有陪錢自為官司客作之人哉彼豈不喫煙火之人乎流弊成習既白令亭户納鹽又白令外扛扛鹽今本司既還亭户鹽江西歸來年餘但聞萬春莊害人又自今年交割提舉職事以來但見人户間訴萬春莊之害丁向理㑹鹽事利病未曽考究萬春莊因何而置以何項物業置到其置之米欲何管計多少收支如何請僉㕔者究劉提舉無端置莊害民始末當此時艱茍可少救民瘼者亟議區處僉㕔書擬呈當職再照得官司拘沒田産官租未嘗不害百姓劉提舉因估朱思恭田業七十畝遂違法堙塞水利白奪民産湊附虚數創名萬春莊皆是有名無實今行之日久逃亡日衆拘催無䇿徒然帖牒専人搔擾一路無歳收米僅二百石不過分助小兒米與府學而止府學自有學粮小兒自有慈幼院正不待此白奪之米斂怨為徳其亦甚矣方今時艱聖朝寛大寛恤便民之事已無不行本司職號常平救民其本職況堙塞水利尤本司所當禁戢豈可身自犯之亭户墜丁産業尤本司所當主張豈可身自奪之何人從㬰作此怪事以貽無窮之害截自今歳徳祐元年秋收為始並行住罷水利者放還水利亭户者放還亭户其吏人元沒官些少收充常平司官吏見文廪祿仍減元祖十分之三以寛佃户其已逃亡者住催以仰稱聖朝寛大恤民之意榜帖所屬州縣場監并榜行司前及紹興府市曹通知仍牒住司照應茶鹽司元撥到亭户等田石堰東場吕元應田一十五畝一角石堰西場張秀發田五十畝二十二步半周之澤田四十三畝二角五十二步半楊觀國田二十一畝二角五十一步半髙田一百三十四畝三角五十九步半又地三十二畝一十九步半鳴鶴東場陳夢令等田九十一畝一角十三步鳴鶴西場張辛三等田三十畝二角穿山場顧添十七田四畝二角三步大嵩場舒元乙娘等田三十五畝一角一十步又地四十畝三角山六十八畝二步周之士栁再五等佃大嵩碶官塘一所甄彌之屋地一所餘姚紹興停門罰買到田李秀田三十畝五十八步四赤二寸五分葛王秀田六十畝二角五十九步五赤五寸徐秀田二十畝二角四十九步四寸上虞縣皁李白馬上妃夏盖四湖共計田蕩池地一千八百四十五畝三十九步半奉台判並照放户絶沒官及争訴請佃并獻到官慈溪縣永夀寺田一十二畝一角二十二步何侍郎田鳴鶴寨争佃塗地一百二十八畝一角一十六步定海縣塗地史趙兩府互争佃請分佃史府確院佃二百二十五畝一角五十六步趙府沂王園令位佃九十五畝二十步奉台判照減額吏沒田及本司回買田畝黄氏日抄卷八十
