body:
  text: 黃氏日抄卷八十五宋黃震撰書回董瑞州伏䝉寵致春秋集注集傳等書拜賜甚侈凡尊年丈在郡云為舉措皆是正路上用實工夫令人敬服不已講義發明精當尤見所學孔夫子只是平正道理漢唐溺於卑陋濂洛發其精微後來遂有因精微而遁入空虛者如張橫浦如陸象山如楊慈湖一節透過一節適又其人皆有踐履後學皆翕然而歸之若夫子平正道理萬世常行安有此等過高出奇之說蓋嘗深究三人之說無一不出於上蔡不欲以愛為仁而欲以覺為仁至欲掃除乍見孺子惻隱之心則橫浦借儒談禪一則曰覺一則曰覺者皆不過敷衍上蔡之言也上蔡謂王介甫勝流俗兩字極好若用此以講學為補不細則象山借儒談禪斥千五百年儒學皆為流俗更不可與辨論是非者皆不過受用上蔡之說也上蔡稱釋氏以性為日以念為雲去念見性猶披雲見日則慈湖借儒談禪謂意起如雲霧之興人心不可有意因而改論語毋意之毋為無字又因大學有誠意一章而詆斥為非聖之書亦皆襲取上蔡之說也上蔡於程門才最高而不幸與總老交故其弊如此東坡謂其父殺人報仇其子因以行劫原上蔡本心不過欲不用其心禪學遂得而入之吾儒之禍莫烈於此矣明與台一家慈湖之說盛行獨君家昆季講究精切某雖愚陋生長慈溪幸而先讀論語凡慈湖之改論語而就已說者皆不敢信昨覩邸報台州守申乞令兄右司充上蔡山長嘗恃其平昔知愛稟問此事為何如繼得回報令兄未免有怒意蓋某不善申稟之過也今讀講義乃知君家之學其精切如此某近在臨川曾於晦翁書院有議義一篇辨慈湖一貫之說謹用拜納郡獄將空䝉感何幸伏乞台照回陳總領昨拜狀僭及學問事荷賜教甚感濂洛亦初未嘗守定一說象山慈湖之說亦未嘗不自此來却從上蔡分𣲖上蔡謂王荆公勝流俗之說極好若用之講學為補不細象山於是謂千五百年間學者盡是流俗然象山讀書講學或至終夜不寐亦未嘗不與人同也上蔡謂佛言性如日念如雲去念見性如披雲見日慈湖於是謂人心自光明不可有意遂改論語毋意作無意為證又斥大學說誠意為非聖之書然有心必有意心是活物意是動處慈湖寒未嘗不思衣飢未嘗不思食做士人未嘗不思量破題出仕宦未嘗不思量處事慈湖此心此意亦未嘗不與人同也自古惟孔子為大中至正之極據實平說參之愚夫愚婦亦無有不合者自孟子出來便是立議論但其所以立論之心無非欲教人為善爾只如孔子言性相近習相逺此六個字參之聖人稽之衆庶求之往古驗之當今無人不然無往不合此平實語也孟子道性善人皆可為堯舜人性固本善而不能人人皆善人固可為堯舜而未嘗見有能為堯舜者此立為議論以誘人為善而非復孔子平實之比也自此衆論並興皆不能出孔子六字之外雖伊洛說出天地之性氣質之性亦不過為孟子解性善之說人生而有性已是氣質之性天地之性已自付與在其中所謂天地之性既非未生以前虛空中别可言性則亦不逃乎性相近之說也自此以後諸儒翻倒得一新說一方便歸之為宗師孔夫子論語反成堂前太公說古老言語無復顧之者矣若各師其師而不以孔子為師流弊安有窮已哉袁䝉齊出來說道理稍能放平兩邉參合今學者或守其家學反加勇猛更欲為背城借一之戰不知軍帳外四面皆已楚歌矣今承來教乃知先太師議論不曾如此倒邉為之豁然因僭及其略高明必能赦其狂僭也史傳前兩卷係杜立齊唐伯玉直待行在印到方得拜納伏乞台照回贑州曾通判一節冗甚久踈教誨忽辱台翰喜慰兩劇埀教回司之事已於四月十三日此間書滿兩考之後作公申并作廟堂劄懇之正如來㫖但恐事由朝廷非吾輩便可必爾贓錢不可盡放之說仰見逺慮但司存自有諸郡些小窠名錢譬如做人家量入為出得過且過士窮乃見節義縱是窘迫亦豈可輕易擾人穆王贖刑之事乃取其金而釋其罪今世乃入其罪而又取其金事理不同況古之所謂罰乃其情不當罪遂令其贖吕刑乃衰世所行也已非古人之義今世所行又非吕刑之義吕刑隳國典而取其金今世官司之貪暴者既申國法以行其威又取其金以自利吾輩寧過於寬無過於刻且朝廷為民而立州縣為防察州縣而立監司今監司先自不法以擾州縣又何以禁州縣之不法而擾民耶契勘本司從來病根只在一利字上祖宗立法事各有司存本司因其借贓錢二字為名盡從而攬之此以利而始也祖宗之法三年一赦赦前事不復理獨本司因夾帶贓錢二字合行住催頑忍不捨此以利而終也為監司者始終一利則𨽻監司之下者其害可知矣尊執丈以上庠名流一番橫經分教之餘便翺翔華貫以至風月平分州縣之苦尚未必徹於視聽況閭閻乎本司官吏沉酣於利一旦掃除盡失其職宜訛言之易興而崇聽之亦惑也先儒有言剛則伸於萬物之上欲則屈於萬物之下又有言天若祚宋必無此事某知救吾民而已司存若窮不暇計也伏乞台察回太和余知縣某吳門同官獨荷知心越山辱書又䝉念舊通籍金閨屈試花縣幸又重逢於大江之西自浙來江又是鄉人相依有不啻千里似人之喜者滿望經從慰我契濶可人眉宇僅見於十部從事之間喜慰之餘不勝餘藴埀諭行囊非便遽取便道而西此見真情亦吾輩氣味之所同也某一介晚末誤叨司臬凡本司前此之擾州縣者皆已與除之蓋朝廷設官本以為民今監司擾州縣州縣擾百姓吏奸一脉貫徹流通於上下之間而監司州縣之官皆其嗾使毒民之具故區區此心思所以截住分毫正惟寅恭相與協濟執事視篆之初試取某前此公移而觀之賜以扶持不勝願幸若曰公庇則某贓錢盡放專匣盡除不屬本司之雜事並住行初無可庇之事也啓劄過禮非所宜䝉某素不講此況於平生之交乎歸璧勿罪伏乞台照回信豐鄧知縣頃自交訊倏已三月自領臬事一向多冗近於公移中得見施行為慰兹被親染實認勤篤第來諭過情非所敢當耳某愚無官長每謂惟有省事即是便民除此以外更無他法近世以來監司擾州縣州縣擾百姓反以多事為勤民往往與鄙見相反初官為縣尉每事執申不與泛行嘗得境內安靜三年今僥幸自為監司豈敢泛擾縣道哉但恐一路同官未必盡皆相體此意如使縣得執事則某可放心矣畢竟今來世事艱難尤非前比省事安民以救根本事無急於此者得盡如執事同心而共圖之慿楮拳拳回樓新恩頃令兄臨江府判㕔發至尊翰欣荷如對第講義一時辭不獲命於吏塵中勉强塞白不料轉塵台覽也來辭過褒雖是賢者誘進之意然豈敢當若夫潔齊謂吾以一道貫之却後學未能曉孔子云吾道一以貫之此句先挈道字在上為一句之主則下面云一以貫之者指道而言也貫此道也今若移道字在一字之下則將此一道欲貫何物此語既出於府第之傳望賜見教恐孔子之言未可輕改大率鄉曲固甚願有先達亦甚難於有先達蓋孔子平日只是平說實理若有先達特立於鄉曲必有新奇之說自立門庭學者方翕然響應因此一番前輩出一番議論改孔夫子遂變成堂前放世老說古老闕話名雖尊之實則違之檢㸃起來全不相似天下到處皆有此弊其人愈賢則其說愈行因其人而信其說先入為主自少已熟人苦不自覺耳近嘗回衡州教令姪書僭云吾鄉有三弊知有權利而已者此一弊顯然之弊也近已漸變矣作文必求奇此一弊說理必求高此一弊皆隱然之弊也豈亦有自悟者耶惟宣獻之門無此弊故敢私以為請耳且如慈湖之實行徑節某豈不朝夕師尊之若人必有心心動處便是意孔子故教人正心誠意此天下萬世學士大夫之所同者也慈湖獨說心不必正意不可有因闢大學為非聖之書一時學者同聲附和更不回頭看孔夫子面最是面前去愚弄此老先生出門便反誇得此道於老先生不學他做人好處却學他說話偏處自說一邉話不知天下以為非至誤繳慈湖佛頂心經贊乞朝廷官其後嗣反為都曹一庸妄者所辱令人拂膺凡此等亦可為自悟之機矣僭越勿罪伏乞台照回制參黃通判蜀人名有大埀諭考亭於介甫愛而不知其惡於東坡憎而不知其善迹則誠有之然特激於汪玉山一時往復之書然爾考亭平日亦未嘗不罵介甫未嘗不敬東坡雖論語集注亦取東坡之說又不特歎服其文章而已玉山極口稱譽東坡考亭方辨之玉山再護東坡則考亭遂一向發東坡短處遂有寧可是介甫之說介甫因此得考亭救起數語考亭有性氣此一時有激之言非平日議論之正也介甫亦可謂僥幸甚矣然其苗脉亦從為伊川護法中來甚至介甫作詩罵昌黎而考亭亦以其詩為是平生克治其身如考亭因為門庭此等偏處亦不自覺則後學可不深自警也哉還戴縣丞景魏中庸大學要義書昨䝉謙訪侍教半日無非聞所未聞大學中庸要義嘗偷忙伏讀仰見家學淵源之深逺平生用工之切至為之降嘆不已前日尊諭茍有所見則以相告此正聖賢與人為善之盛心不恥下問之至意退惟庸陋不學何足與聞然既伏而讀之矣不敢不據所見以求教焉大率二書發明先儒未及處極多真是有功後學知仁勇三節經㫖本自分曉文公獨以三近者勇之次正未曉何謂執事與之條列剖析却一一與經文正合君子誠之為貴誠之正是用工處前輩止以之字作助語執事改其說而以孟子思誠為證至如既禀之如字親新之通用索隱之作素本因古字之從宜此雖字學中來亦皆足為前輩之拾遺其他大義不暇遍舉惟以蒲蘆為蜾螺雖本爾雅然蜾螺蟲類恐於地道繁樹不相應以周公追王二祖為改葬雖以下文葬祭為證然二祖之葬既久恐改葬亦是重事如謂葬時以諸侯之禮則改時以天子之禮若棺外之物猶可改也棺內切身之冠冕亦可褫之而易七章為九章之類乎切身者不可改改外物孰重輕況下文明言父為士子為大夫葬以士祭以大夫則葬禮合因在日之舊祭方用今日之新二祖之生為諸侯葬以諸侯為已合禮周公祭以天子之禮足矣正亦不必改葬也然此特其小節耳細看要義之所作全以常道為主且謂大道既隱之後不得不以常道為教此等根源所在却非後學之所敢與成書既行之後未必無詰難者蓋恐常道之說本於孔安國大道既隱之說亦出於漢儒吾儒精粗一致下學上達世有先後道無古今今一旦截為界限如此好議論者未必不疑其潛移於老子之說而適以小吾中庸大學也仰恃賢明故敢語及防後之策如此尚望以其自得者更埀不倦之教使來者無得而疑焉與葉丞相咸淳丁卯恭審勉從趣召入副倚毗指刻宣麻滿朝舉笏伏計賀幅何止盈箱然區區忠愛之心則有在矣天下事非權之歸一不可為或事之築底雖得權亦未易為方今朝廷之所以待先生者雖非某之所知而天下事未易為雖朝廷亦有未必盡知者然先生今日事勢已不容於不為萬一有不得而自為所願推誠感動務濟國事必不得已則明白而勇去庶幾進不孤四海之望下不貽百世之譏惟先生其念之黃氏日抄卷八十五
