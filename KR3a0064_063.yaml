body:
  text: 黃氏日抄卷六十三宋黃震撰讀文集五曾南豐文詩星宿之宿作入聲押韻見第四卷山水屏詩云爭險挂星宿麻姑山送南城羅尉詩可與歐公廬山髙為對霿凇音夢送齊地寒霧凝木上如雪之名見第七卷冬日詩論議傳叙唐論厯數三代以後惟太宗有天下之志有天下之材有治天下之效而不得與先王並者法度未備也斂多就寡文極有法然太宗之未得與先王並者亦恐實德之有愧耳實德如先王法度則古今異宜豈必一一先王耶為人後議謂不當絶本生父母之名豈為濮議發耶然亦正論也要必存本生之名可也濮邸入繼大統又别公族議謂袒免以外盡當衣食於縣官意則厚矣恐禮法不無等殺而先王未嘗以天下私其族耳吁如民生何講官議謂古禮於朝則王及羣臣皆立無獨坐者於燕則皆坐無獨立者坐云者師所以命弟子而譏當時請坐講者為非是欲以古制律今而講官以弟子禮命其君耶救灾議以頓豫民不朝夕食之其說佳洪範傳布置大抵與荆公相類太祖皇帝總叙謂漢髙不及者十事自三代以來撥亂之主未有及太祖也元年户九十六萬末年三百九萬至元豐年一千三百九十一萬於是覆露生民之澤深矣序新序目録序謂劉向所序三十篇隋唐猶存今所見者十篇最為近古而不能無失梁書目録序梁六紀五十傳史官姚察之子姚思廉所成南豐之為此序辨佛患梁為甚而佛不能覩聖人之內列女傳目録序劉向以成帝後宫趙衛之屬多自放作列女傳篇曹大家為注離其七篇為十四與頌義為十五嘉祐中蘇頌復定為八篇南豐疑此傳稱芣苡柏舟大車之類與今詩序不合蓋不思今序衛宏所作出向之後也禮閣新儀目録序新儀三十篇韋公肅記開元至元和變禮南豐謂人之所未疾者不必改也人之所既病者不可因也何必一一以追先王之迹能合乎先王之意而已余謂此名言也戰國策目録序舊缺十一篇南豐訪得之而三十三篇者復完且謂此書論詐之便而蔽其患言戰之善而諱其敗有利焉而不勝其害有得焉而不勝其失亦名言也陳書目録序陳書六紀三十傳亦姚察姚思廉父子所成南豐謂兼權計明任使恭儉愛人則其始之所以興惑邪臣溺嬖妾忘患縱欲則其終之所以亡莫非自己致者而士之安貧樂義亦不絶於其間南齊書目録序江淹嘗為十志沈約又為齊紀梁蕭子顯别為此書凡五十九篇南豐謂其改折雕刻而文益下唐令目録序凡三十篇以常員定職官以府衛設師徒以口分永業授田以租庸調賦役南豐謂庶幾乎先王之意徐幹中論目録序幹字偉長北海人生漢魏之間魏太祖旌命之不就獨考六藝推孔孟之㫖為中論二十餘篇唐太宗嘗稱其復三年喪一篇而今無之則所存二十篇非全書也南豐謂其不合於道者少說苑目録序劉向所序凡二十篇南豐謂所取往往不當於理鮑溶詩集目録序溶唐人也南豐稱其清約謹嚴而違理者少李白詩集後序白蜀郡人遊江淮娶雲夢許氏去之齊魯入吳至長安明皇召為翰林供奉不合去北抵趙魏燕晉西涉岐邠厯商於至洛陽遊梁最久復之齊魯南遊淮泗再入吳轉金陵上秋浦潯陽卧廬山永王璘以僞命逼致之璘敗白奔宿松坐繫潯陽獄宣撫崔渙與御史宋若思驗治謂罪薄薦其才不報流夜郎遂泛洞庭上峽江至巫山以赦得釋復如潯陽族人陽氷為當塗令白過之以病卒年六十四舊史稱白有逸才志氣宏放飄然有超世之心南豐稱其實録詩舊七百餘篇宋敏求廣至九百餘篇南豐乃考其先後而次第之宋大夫集後序南豐之祖也事太宗真宗王深甫文集序深甫王回也福州侯官人家於潁嘗登第為主簿即棄官弟向字子直冏字容季兄弟皆以文學名皆南豐序其文荆公稱許之亦然范貫之奏議集序貫之名師道曽事仁宗為言官其子世京集其奏議十卷南豐發明其遭遇之盛云所以明先帝之盛德於無窮也墓則清獻趙公為志王平甫文集序平甫文百卷南豐許其兼文與詩之工可比漢唐之盛不得志於時而求於內張幾聖文集序幾聖名至錢塘人最為韓魏公所知其子浚明集其文二十卷屬南豐為序思軒詩序撫州通判林君當旱蝗作軒而能詩者賦之序越州鑑湖圖湖周三百五十八里漢順帝永和五年馬臻所創南並山北屬漕渠東西距江溉山隂㑹稽兩縣十四鄉田九千頃宋興民始有盜湖為田者祥符間二十七户慶厯間二户為田四頃時三司轉運司猶切責州縣復田為湖治平間盜者八十餘户田七百餘頃而湖幾盡矣自此蔣堂杜杞吳奎張次山刁約范師道張元長張伯玉陳宗喜趙諴等各為之計而廢日甚蓋法令不行而茍且之俗勝也昔謝靈運從宋文帝求㑹稽回踵湖為田太守孟顗不聽又求休蝗湖為田顗又不聽此湖繇漢接錢氏不廢而今日乃廢豈非茍且之俗勝哉今謂湖不必復者曰湖田之入已饒不知湖盡廢則湖之田亦旱矣謂湖不必濬者曰益堤壅水而已不知㑹稽得尺山隂半之必也禁民為田而歲以農隙濬湖則蔣堂以後諸公成說具在故南豐具載之以待來者其事可載國史而其文可成誦云類要序晏元獻起童子至宰相在朝廷餘五十年常以文學謀議為己任其子知止集其書名類要云相國寺維摩院聽琴記說謂古之養其外者畢備琴棊未嘗去右左者也而又內當得之心蓋南豐之學如此琴者洪規字方叔張文叔文集序文叔名彥博常從南豐游其文未嘗輕出其後其子仲偉始求公之序館閣送錢純老知婺州詩序謂此館閣之禮而他司所無齊州雜詩序此公為齊州時詩也愚按公詩多齊州所作有欣焉安之之意徙為他州詩不多作雖作不樂之矣豈齊其壯年試郡而後則久困於外不滿其當世之志耶順濟王敕書祝文刻石序謂龍也叙盜說凶年人食不足之意贈黎安二生序二生蓋東坡薦於公者說迂濶之弊宛轉可佳送周屯田序言古之致事而歸者有養然今之士不必以動其意送江任序說仕於近土知風俗之意甚悉送劉希聲序言至道當不息送李材叔知柳州序解仕南土者不安之心送趙宏序謂平冦在太守而不在兵前輩謂此文峻潔送王希序叙江西游覽之勝謂見西山最正且盡者大梵寺之秋屏閣王無咎字序謂人欲善其名字而未嘗善其行送蔡元振序謂古之從事皆自辟而今命於朝然惟其守之同者多矣為從事乃爾於朝不爾者其幾耶書上歐陽學士書謂韓文公以來一人而已又書謂食民之食者兵佛老也兵擇曠土而使之耕佛老止今之為者舊徒之盡也不日矣上蔡學士書又薦王安石謂文甚古行稱其文知安石者尚少公亦以此薦之歐公又進其文上杜丞相書勸以天下之材為天下用上齊工部書部使者數十萬家之命也豈輕也哉與撫州知州書言心之獨得與孫司封書孔宗旦策儂智髙必反及反乃死之請白其事寄歐陽舍人書公謝其為先祖銘墓也理密文暢可觀與王介甫第一書報以歐公賞其文也云歐公更欲足下少開廓其文勿用造語及模擬前人孟韓文雖髙不必似之也取其自然耳與介甫第二書云謗議之來誠有以召之又比聞有相曉者足下皆不受之余謂此乃謂公忠於介甫之言也謝章學士書自謂不能收身於世俗之外力耕於大山長谷之中以共饘粥之養魚菽之祭以其餘日考先王之遺文竊六藝之微㫖以求其志意之所存而足其自樂於己者顧反去士君子之林而夷於皂𨽻之間捨自肆之安而踐乎迫制之地欲比於古之為貧而仕者可謂妄矣愚謂此公道其中心所存者令人慨然又其答袁陟書云有可仕之道而仕不仕固自有時某之家茍能自足便可以處而一意於學久與王深甫書叙情尤悉雖然力踐固存乎人答王深甫論揚雄書公謂揚雄處王莽之際合於箕子之明夷常夷甫以謂紂為繼世箕子乃同姓之臣事與雄不同又美新之文恐箕子不為也公辨之曰雄之辱於仕莽非無恥也在我者亦彼之所不能易也愚按雄本漢臣既身受賊莽之僞命而又稱頌其功德則為雄者皆易於莾矣南豐所謂莽所不能易者指何物耶又王介甫謂雄之仕合於孔子無不可之義夷甫謂雄德不逮聖人於仕莽之際不能無差公復辨之曰孔子之無不可孟子所謂聖之時也雄亦為太𤣥賦稱蕩然肆志不拘攣兮愚按孔子無可無不可恐不可獨指其無不可况蕩然肆志是直小人之無忌憚而可謂其似聖人耶南豐大賢而議論若此所未諭也福州上執政書援詩以述養親之意文甚贍記仙都觀三門記此記與鵝湖院佛殿記略同皆以正義斥異端有益世教秃秃記記孫齊溺嬖寵殺子之事文老事核尤卓然為諸記之冠視班馬史筆殆未知其何如耳醒心亭記為歐陽公守滁作灑然使人醒者也繁昌縣興造記太宗取宣之三邑為太平州而繁昌在焉繁昌自唐昭宗為邑百四十年當慶厯間夏希道邑治始大備云墨池記池在臨川城東之新城池之上今為州學記曰夫人之有一能而後人尚之如此况仁人莊士之遺風餘思被於來世者何如哉宜黃縣學記記有云務使人人學其性此語似當審也南軒記說隨所處而樂之意淡靜有味兜率院記說異端無常業所享已封君不如而或反傾府空藏而棄與之擬峴臺記模寫甚工前輩取以為文法者也撫州顔魯公祠堂記發明魯公切實無餘藴歸老橋記為武陵柳侯作說人情之歸休甚佳尹公亭記尹洙嘗謫隨州結茅為亭其後知州李禹卿增大之廣德湖記湖舊名鶯脰源出四明山引北為漕渠東北入江鄞西七鄉之田仰溉焉大厯八年縣令儲仙舟更今名貞元元年刺史任侗治而大之大中之後有請為田者御史李後素驗視得不廢刺史李敬方與後素刻石見其事謂湖成已三百年則湖之興在梁齊之際歟淳化二年民盜湖為田至道二年知州丘崇元復之自太平興國以後民冒取之天僖二年李夷庚又復之天聖景祐間民又請李昭為郡言其事請者始息康定間張峋為令築隄九千一百三十四丈為碶九埭二十亭二植柳三萬一百愚按陂湖水利長吏急務公通判越州記鑑湖及守明州記廣德湖皆根極始末其一念在民為何如秦檜當國時樓异守鄉郡乃廢廣德湖至今反不若鑑湖猶有遺迹惜哉齊州二堂記厯山堂以舜所耕之地濼源堂以春秋桓十八年所書之濼在焉考地里甚精襄州宜城縣長渠記春秋之世曰􅋣水其後曰夷水又曰蠻水白起壅水攻楚遂為渠本朝孫永復之民賴其利徐孺子祠堂記詳孺子處亂世之義道山亭記備述七閩之險而閩中獨夷曠城中之三山西曰閩山東曰九仙山北曰粵王山而道山亭者閩山登覽之地也作於程師孟越州趙公救災記救荒之委折備焉制誥制誥多平易特散文之逐句相類者耳擬制誥則遍言新更官制之意此為王介甫代發明者也表表多平淡說意疏熙寧轉運對疏勸講學而得之於心劄子移滄州過闕上殿謂自民生以來未有如大宋之隆且引詩而言之曰歌其善者所以啓其嚮慕興起之意防其怠廢難久之請愚於是知公愛君之意深矣然與警切規諌者恐又别是一體請令長二自舉屬官引書冏命及陸贄之說為證且曰非惟搜揚下位亦以閲試大官請令州縣特舉士引厯代為證甚悉令通一藝以上充都事主事掌故之屬以士易吏也謂之特舉之士愚恐風俗未易革弊或益甚耳請西北擇將東南益兵愚謂西北擇將如太祖法可也東南益兵恐未易言也兵豈在多也哉議浮費謂景德官一萬餘員皇祐二萬餘員治平總二萬四千員則官倍於景德景德郊費六百萬皇祐一千二百萬治平一千三十萬則郊費亦倍於景德使歲入如皇祐治平而費如景德則省半矣請减五路城堡謂將之於兵猶奕之於棊所保者必其地所應者又合其變故用力少而得算多昔張仁願度河築三受降城相去各四百餘里首尾相應减鎮兵數萬所保者必其地也仁願之建三城皆不為守備曰冦至則併力出戰回顧猶須斬之自是突厥不敢度山所應者合其變也愚按此說精於益兵之說而讀可續誦再議經費謂臣待罪三班按國初承舊以供奉官左右班殿直為三班員止三百至天禧乃總四千二百有餘至于今乃總一萬一千六百九十宗室又八百七十蓋景德員數已十倍於初而今殆三倍於景德吏部東西審官與天下他費尚必有近於此者浮者必求其自而杜之約者必本其由而從之請改官制前預習行事務此從更新制之一端也劄中舉吏部言之以槩其餘此外又有請整齊版籍之劄又請以新制如周官六典為書然恐泥於文為矣六典果皆周公之書乎史館申請三道别有英宗實録院申請搜訪條例皆為史者當知訪髙麗世次夫餘王得河伯女生朱䝉居紇升骨城號髙句麗以髙為氏傳子如栗至孫莫來當漢武元封四年為縣光武建武八年朝貢莫來裔孫宫復為王十七傳而至德武為安東都督至後唐同光王成問屢入貢明宗長興三年再復拜其主建為王建生武武生昭當建隆開寶來貢昭生伸生治生誦生詢遞立詢當真宗時入貢凡蓋公參之國使如此論中書舍人録黃畫黃不書檢中書舍人稱臣書名於檢而侍郎押字自後舍人遂不書竊尋故事未有可據而然也議邊防給賜士卒只支頭子真宗東封三司使丁謂奏令殿前都指揮使曹璨各與頭子使兵士骨肉於各州請領任明州日有髙麗界託羅國人失風奉㫖安泊照管奏狀奏乞推恩狀潘興嗣五歲以父任得官二十二歲授德化尉不行時朝廷察其髙以為筠州推官不就今年五十六欲照徐復王回孫侔李覯例官其子又吳中復間逸陳樞不磨勘皆公為州時薦之朝者乞賜唐六典狀唐初以尚書中書門下三省預天下事至六官所主則一本於尚書開元十四年張說罷中書令為尚書右丞相不知政事自此政歸中書而尚書但受成神廟印六典賜近臣其書稱中書令張說撰疑張九齡所為不過述先代遺法時尚書已不得其職矣福州擬貢荔枝狀興化陳紫福州江緑興化方紅又陳家紫小陳紫宋公荔枝周家紅泉之藍家紅漳之何家紅泉之法石白福之緑核圓丁香皆以次第著録其外有虎皮牛心玳瑁硫黃朱柿蒲桃蚶殼龍牙皆以形名之出福州氷荔枝蜜荔枝丁香荔枝雙髻小荔枝真珠荔枝無核荔枝所出不一十八娘或謂閩王女好食而得名將軍荔枝五代時有此官種之叉頭荔枝以其小粉紅荔枝以其淡中元紅以其晚右二十品無次第一品紅言極品也在福州宅堂狀元紅言第一也出福州報國院明州擬辭髙麗饋送狀欲示小國以廉且寬其力辭修五朝國史以非一人所能辦啓平易不華文章之正也祭文祝文哀詞祭歐公與王平甫二篇極注意祭黃君者歎其不遇有味也三十九卷之四十皆居官時祈晴謝雨等作蘇明允哀詞二蘇請公為之銘則請之歐公墓銘虞部戚公志銘公舜臣也綸之子知太湖縣言賦茶之苛歲用萬數願棄勿採知撫州有祠號大帝者百餘悉除之南豐言其世德以比唐柳氏舜臣之子師道亦公為銘都官陳樞志銘令旌德州有所賦調獨曰非吾土所有也爭或至十反州聽然後止南豐曰令所試者大則其事可勝傳耶翰林學士錢藻志銘公錢王後自和徙蘇清約終其身刑部王逵志銘里胥捕罪人殺之君求其情為奏讞得不死府史馮士元家富啖諸貴人君治之竟其事李京為諌官劾君及京罪斥監鄂州稅君為湖北轉運曰前事君職也於吾何負哉與之歡其京死又力賙京家奏官其子司封孔延之志銘廣西歲糴六百萬石實不過能致數十萬石君計歲糴二十萬而足髙其估以募商販不糴於民儂賊平南方補虛名官者八百人皆弛役而役歸窮下君復其故君孔子四十七世孫三子文仲武仲平仲都官曾誼志銘建昌南城人其家學者自君始其家故貧罷吏歸常闔門居或日昃不得食同職欲增賦役錢爭不得自請罷去王容季志銘容季名冏與兄回向皆以文名當世南豐為之序曰此三人者皆世不常有藉令有之或出於燕或出於越又不可以得之一鄉一國也未有同時並出出於一家如此之盛若將使之有為也而不幸輒死皆不得至於壽考以盡其材是有命矣而命之至於如此何也愚謂此文之宛轉妙處故特録之都官舒元衡志銘此篇說甚衰之際文字可法比部李丕志銘叙契舊與其起家處可法職方蘇序志銘君東坡之祖也東坡請公為銘初蘇祐生唐季至成都遇道士屏人謂吾術能變化百物辭不顧祐生杲以好施顯名杲生序好讀書歲凶賣田賑鄉里慶厯初立州縣學士爭欲執事學中君獨戒子孫退避序生渙洵後渙以進士起家仕至都官洵即老泉云庫部范端志銘為江都令㑹歲旱知揚州張若谷遣吏視民田他吏還者白歲善君還獨白田實旱若谷不是之君持旱苖力爭乃卒是君所白監雲安軍鹽井議蠲鹽課以數萬張允中志銘允中名待所與遊喜窮盡其是非得失非其遊遇之溫溫惟謹殿中丞徐元榆志銘唐之亡楊行密有淮南稱吳海州人徐溫為吳將有功溫死其養子知誥遂代楊氏有江淮之地稱唐復姓李氏名忭溫已子知諌生遜遜生元榆世事李氏宋受命俘李氏元榆亦隨之歸京師棄官死公既序其次第而復為之言曰盛衰之變何其速也然自前世無不若此富貴之不可以久恃亦何必異也而世之不安其命者方枉義挈挈以覬幸而偶得之者又惴惴恐失之是豈可以常處也哉都官王益志銘益即荆公父也督稅未嘗急貧笞罰惟豪劇吏子七人安仁安道安石安國安世安禮安上衛尉金君志銘君兄弟皆舉進士諸子又皆舉進士而已獨放山谷間以恩受封述其次第處文字起伏可讀府率沈君志銘以親戚恩得官叙述佳寶月塔銘醫僧也剔脫處可法曾氏銘回向同之母公亮妹也述其自處通塞之際無不當理錢氏銘劉凝之妻也述其夫婦相成之賢所謂筆端有畫可以讀也三代自叔叙上黃氏銘述其事夫教子教孫三節有味吳氏銘荆公母也愛前母子曰甚於愛吾子然後家人愛之能不異於吾子也其子有歸志以不足於養為憂曰安於命者非有待於命也許氏銘沈括之母謝氏銘荆公祖母祕書李迂志銘有田百餘頃皆以與族人獨留五頃曰無令子孫以財自纍也志序李氏自臯陶以下甚詳多其妻王氏所為言常博吳詳志銘衣食常不自足以家之有無葬故葬不緩或欲出錢曰貧吾素也喪乃欲為利乎光祿朝宗恪志銘公之妻父也妻名文柔别有銘太子賔客陳巽神道碑少客京師有欲教公以化黃金者公辭不受祕監陳世卿神道碑知廣州罷計口鬻鹽人以休息刑部張保雍神道碑李丞相迪用公通判永興萊公代鎮因奏留之知漢州夜四卒告兵變械以徇安之至明鞫得卒實與謀併棄之市為湖北漕活鄂州漢陽應死者三十八人漢州民趙昌以畫名公迄代不問行狀傳刑部孫甫之翰行狀為華州推官倉粟惡吏當負錢數百萬公取舂之可棄者十才一二吏遂得弛負錢數十萬巳而知諌院言益兵之弊曰天下所以大困者兵為甚又可益之耶徙晉州近臣夜半叩城終不為開門論保州之變指杜公論益兵詆二三大臣至於洛水又絀尹洙而伸劉滬皆平生所友善者不偏所好如此徐復傳復精星厯仁宗召見官其子賜復號冲晦處士人或勸著書復曰古聖賢書已具顧學者不能求吾復何為以僥名後世哉復莆田人後家杭洪渥傳渥得官時兄老不可俱行至官量口用俸掇其餘以歸買田百畝居其兄傳末論豪傑士多過中庸如渥所存人所易到故載之云本朝政要策考課建隆初以户口增耗為吏升降興國初定三等之法以核能否雍熙間閲班簿始詔雷德驤以群臣功過俱對淳化中分京朝等考課為三久之廢京朝官考課而置審官院以錢若水主之廢州縣官考課歸流內銓以蘇易簡主之惟三班無改易訓兵周世髙平之役命太祖取其驍勇為禁衛宋興益修其法興國有楊村之閲咸平有東武之閲自此兵益廣簡練遂疏而黜廢之法恕矣添兵唐罷府兵置神武神策為禁兵不過三數萬人甲兵皆散在郡國自河朔三鎮不統於京師餘可舉者太原青杜各十萬人邠寧宣武各六萬人潞滁荆揚各五萬人襄宣壽鎮海各二萬人而觀察團練據要害者亦各不下萬人五代分裂區區中州地嘗至數十萬人養之既費教與用又不得其理至周世宗始修兵制我太祖舉中國之兵才十六萬人太宗伐劉繼元駕前兵蓋十餘萬自是兵益廣其後曹彬敗於祈溝關在行者二十萬楊業敗於陳家谷口劉廷讓敗於君子館全軍沒焉㳂邊瘡痍兵不滿萬計河朔悉科鄉民守城咸平間又集近京諸州丁壯為兵而西北邊請益兵不已張齊賢謂調江淮八萬以益西師劉承圭又取環慶諸州役兵升為禁兵號振武李元昊反河西契丹謀棄約西方遂益禁兵二十萬北方益土兵二十萬又益禁兵四萬指揮及羣盜張海郭邈山等劫京西江淮皆警大臣又令天下益兵知課院孫甫言天下所以大困者兵為甚又可益之耶兵器太祖命魏丕主作每十日一進有南北作坊歲造甲鎧具裝鎗劒刀鋸械器葫蘆弩凡三萬二千又有弓弩院歲造弓弩等千六百五十餘萬諸州歲造六百二十餘萬置五庫貯之景德中已可支三十年權宜罷焉城壘周世宗時韓通築李晏口立十二縣又葺祈州及築游口三十六遂通􅘵莫宋興王全斌葺鎮州西山堡劉遇築保州等五城太宗命潘美移并州於榆次又移於三交得戎人之咽喉佛教建隆初詔佛寺已廢於顯德不復興開寶令僧尼百人許歲度一人至道又令三百人度一人以誦經五百紙為合格任將李漢超馬仁瑀韓令坤賀惟忠何繼筠等防北虜郭進武守琪季謙溥李繼勳等禦太原趙贊姚內斌董遵誨王彥升馮繼業等備西戎此篇發明太祖用將之術甚備可讀水災竇儼論水沴所興有數有政汴水論厯代浚導刑法淳化置審刑院防大理刑部二司之失事從中覆下宰相再以聞始行管榷言礬課則劉熙古嚴茶禁則樊若水峻酒𣙜則程能變鹽令則楊允恭古禁之尚疏者皆密焉錢幣江東鑄銅錢自樊若水始鉛錫雜鑄自張齊賢始淳化鑄大錢於蜀自趙安易始然不便即罷之南蠻有用兵伐而克之興國初翟守素平梅峒是也有已克赦而納之咸平間曹克明收撫水是也有納以恩信章聖時謝德權之靖宜州是也契丹騎卒六萬太祖命田欽祚以三千人破之其後天子伐晉敵始復為中國患至真宗親征講和之策遂定折中倉折中之法聽商人入粟而趨江淮受茶鹽之給公私便之端拱淳化皆曾復行屯田自漢昭始田張掖趙充國耕金城曹操力農許下晉用鄧艾田壽春羊祜田襄陽杜預田荆州荀羡田東陽隋耕朔方唐屯振武皆能服夷兼敵宋興雍熙間始議屯田是後開易水疏雞距修鮑河之利邊屯以次立矣神宗遣議臣東出宿亳至壽春西出許潁至襄鄧得田二十二萬頃任事者難之功不立水利厯述史起以後興水利之臣至本朝不果行茶正元初趙贊興茶稅張滂繼之十取其一王播又增其數裴休立十二條我朝議以見緡折帛入中天聖設三稅法景祐增鹽利為四稅皇祐又用見緡之法金石録跋尾茅君碑三茅名盈次固次衷云漢景時人梁普通中張繹建碑孫文韜書韓公井者襄州南楚故城有昭王井傳言汲者死不敢視開元中韓朝宗為採訪使移書諭神飲者無恙更今名故城今謂之故墻即鄢也由梁太祖父名誠避之今猶然桂陽周府君碑并碑隂歐公按韶州圖經君以開武溪有功立廟碑名訛缺而圖經不著其名碑首題云神漢者猶言聖唐也南豐從知韶州王之才所得此本之詳按曲江縣圖經名昕歐公蓋未之得也其碑隂曲江字皆作曲紅而蒼陸字江夏亦作紅蓋古字通用也永叔又記劉原父所得商洛之鼎銘云惟十有亖月旁死魄蔡君謨問十四月者何謂原父不能言南豐謂古字如亦字作人字作仌皆字之重出則此作亖者特二字耳永叔原父君謨皆博識而亦有所未達故并見於此凡皆南豐之說也愚觀此說莫之曉長兒在側忽云籀史載古者人君繼世踰年行即位之禮然後改元此類疑嗣王繼世雖踰年未及改元但以月數稱故曰十有四月不可以一歲不過十二月而疑也如南宫鼎文有十有二月之文周牧敦銘有為王十年十三月之文凡癸酉卣銘有十九月之文商己酉尊銘亦有十九月之文又姬鼎銘有十一月又三之文凡皆以月起數之例愚因思之亦作非重寫亦字人之作亦非重寫人字恐亦不可為例如曰商王即位之十有四月恐亦有此理而四字古作亖字凡古銘皆然以二字為重寫二字亦安姑記以候知者唐開宗元寺卧禪師碑銘自河隴沒於羌夷惟寺多在南豐謂虞夏之世東漸西被朔南暨聲教則能令其信慕者亦非特有佛而已也彼以罪福報應之說動之未若不動之以利害而使之心化此先王之德所以為盛也余按此論甚髙前未之發辱井銘銘十六字可見者八字曰辱井在期可不戒乎又有陳後主辱井記大略以其與張孔二妃同投井也愚按辱井可對貪泉漢武郡太守阿陽李翕西狹頌郡有間道通梁益而臨溪危峻李㑹與功曹李旻等鐉燒火石改髙即平人得夷塗作頌刻石歐公集古録以為李㑹熙寧十年馬城出成州所得此頌以視南豐始知其為李翕漢元鼎以汧隴西南接巴蜀為武都郡後分為興州成州云南豐與荆公俱以文學名當世最相好且相延譽其論學皆主考古其師尊皆主揚雄其言治皆纎悉於制度而主周禮荆公更官制南豐多為擬制誥以發之豈公與荆公抱負亦略相似特遇於世者不同耶抑聞古人有言有治人無治法三代之治忽各係其君之賢否法之詳未聞焉三代君臣之謀猷亦未嘗有一語及於法者詳於法必略於人秦法之密漢網之疏其效亦可覩矣周之所以為治者盡見於尚書周官之篇後千餘年至王莽時倐有所謂周禮六典者出曰此周公之法也使果出於周亦不過周官一篇注疏耳然其煩苛若此果可見之施行否耶設果嘗行於周時異事殊亦可行於後世否耶我朝廷以仁立國一切掃除煩苛承平日久或者反以寬弛為厭荆公遂勇為新法嗚呼不忍言矣南豐比荆公則能多論及本朝政要又責誚荆公不能受人之言使南豐得政當有可觀者乎南豐之文多精核而荆公之文多淡靖荆公之文多佛語而南豐之文多闢佛此又二公之不同者而王震序曾南豐文乃特誇其為制誥大手筆真所謂知其一者耶黃氏日抄卷六十三
