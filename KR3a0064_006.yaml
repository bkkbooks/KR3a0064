body:
  text: 黄氏日抄卷六宋黄震撰讀易易聖人之書也所以明斯道之變易無徃不在也王弼間以老莊虛無之說參之誤矣我朝理學大明伊川程先生始作易傳以明聖人之道謂易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占吉㐫消長之理進退存亡之道備於辭推辭考卦可以知變而象與占在其中故其為傳専主於辭發理精明如揭日月矣時則有若康節邵先生才竒學博探賾造化又别求易於辭之外謂今之易後天之易也而有先天之易焉用以推占事物無不可以前知自是二說並興言理學者宗伊川言數學者宗康節同名為易而莫能相一至晦庵朱先生作易本義作易啓䝉乃兼二說窮極古始謂易本為卜筮而作謂康節先天圖得作易之原謂伊川言理甚備於象數猶有闕學之未至於此者遂亦翕然向徃之揣摩圖象日演日髙以先天為先以後天為次而易經之上晩添祖父矣愚按易誠為卜筮而作也考之經傳無有不合者也爻者誠為卦之占吉㐫悔吝者誠為占之辭考之本文亦無有不合者也且其義精辭覈多足以發伊川之所未及易至晦庵信乎其復舊而明且備也然吉者必其合乎理㐫悔吝者必其違乎理因理為訓使各知所趍避自文王孔子已然不特伊川也伊川奮自千餘載之後易之以卜者今無其法以制器者今無其事以動者尚變今具存乎卦之爻遂於四者之中專主於辭以明理亦豈非時之宜而易之要也哉若康節所謂先天之說則易之書本無有也雖據其援易為證者凡二章亦未見其確然有合者也其一章援易有太極是生兩儀兩儀生四象四象生八卦曰此先天之卦畫於是盡改易中伏羲始作八卦之說與文王演易重為六十四卦之說而以六十四卦皆為伏羲先天之卦畫其法自一畫而二二而四四而八八而十六十六而三十二三十二而六十四然生兩生四生八易有之矣生十六生三十二易此章有之否耶其一章援易言天地定位山澤通氣風雷相薄水火不相射曰此先天之卦位也於是盡變易中離南坎北之說與凡震東方卦兊西方卦之說以乾南坤北為伏羲先天之卦位其說以離為東以坎為西以兊巽為東南西南以震艮為東北西北然天地定位安知非指天位乎上地位乎下而言南方炎為火北方寒為水亦未見離與坎之果屬東與西而可移離坎之位以位乾坤也易之此章果有此位置之意否耶且易之此二章果誰為之也謂出於孔子孔子無先天之說也謂出於伏羲伏羲未有易之書也何從而知此二章為先天者耶圖方畫於康節何以明其為伏羲者耶然聞先天為演數設也夫易於理與數固無所不包伊川康節皆本朝大儒晦庵集諸儒之大成其同其異豈後學所能知顧伊川與康節生同時居同洛相與二十年天下事無不言伊川獨不與言易之數康節每欲以數學傳伊川而伊川終不欲康節既殁數學無傳今所存之空圖殆不能調絃者之琴譜晦庵雖為之訓釋他日晦庵答王子合書亦自有康節說伏羲八卦近於附㑹穿鑿之疑則學者亦當兩酌其說而審所當務矣伊川言理而理者人心之所同今讀其傳犂然即與妙合康節言數而數者康節之所獨今得其圖若何而可推驗此宜審所當務者也明理者雖不知數自能避凶而從吉學數者儻不明理必至舍人而言天此宜審所當務者也伊川之言理本之文王孔子康節之言數得之李挺之穆伯長陳希夷此宜審所當務者也窮理而精則可修已治人有補當世言數而精不過尋流逐末流為技術此宜審所當務者也故學必如康節而後可創言先天之易學必如晦庵而後可兼釋先天之圖易雖古以卜筮而未嘗聞以推歩漢世納甲飛伏卦氣凡推歩之術無一不倚易為說而易皆實無之康節大儒以易言數雖超出漢人之上然學者亦未易躐等若以易言理則日用常行無徃非易此宜審所當務者也乾卦六畫即正經彖辭文王作爻辭周公作文言繫辭孔子作皆所以解此六畫餘倣此用九見羣龍无首吉伊川云用九者處陽剛之道見羣龍謂觀諸陽之義无為首則吉也晦庵本歐公說以用九為陽爻之占法云六陽已盛如羣龍之剛猛在首故見其无首則吉是欲剛而能柔也諸家或異或同皆自用九以下取義愚按伊川之說盖本經文用九天徳不可為首為言晦庵之說盖主卜筮為言然六爻可以言占若用九於六爻之外以緫明六爻之九則不屬爻位不係占卜恐無羣龍无首之象亦未必有所謂吉之占也臨川鄒氏以用九見羣龍无首吉緫為上九之爻辭屬於亢龍有悔之下云上九之亢雖有悔矣而猶有善用之道焉自初至五潜見飛躍謂之羣龍皆以无首而吉至上九則為首矣能見羣龍之无首而亦不敢為首焉則悔可亡而反吉也愚按古註云九天之徳也能用天徳乃見羣龍之義夫以剛健居人之首物所不與也故乾吉在无首鄒氏盖本古註此說於程傳所主經文不可為首之義既合於晦庵卜筮取象之義亦合重剛九三重剛以陽爻居陽位也九四亦曰重剛晦庵疑重字為衍鄒氏云九四非以陽居陽而在三五重剛之間故亦曰重剛愚按恐乾之内外卦皆陽剛而三居内卦之極四居外卦之始實處兩陽剛交際之地故皆為重剛而皆不中歟坤卦直方大伊川以至大至剛以直為說晦庵止云其徳内直外方而又盛大其說徑净莭齋蔡氏直者發於内而無私曲之謂方者止於外而有定則之謂内直外方其徳乃大於釋字尤切實亦釋晦庵者也黄裳元吉六五於坤為最吉之爻伊川言外生意乃謂婦人居尊位之戒女媧則天是也晦庵非之云黄中色裳下飾六五以隂居尊其象如此其占為大吉於經文為順矣鄒氏云天𤣥地黄衣上裳下君臣之辨也臣當守中處下六五居人臣極位故必黄裳而後元吉此亦體伊川言外之意而不外經文必有餘慶慶當作平聲與下文殃字協韻上文乃終有慶亦與應地無疆平聲相協暌卦志行也徃有慶也亦協韻益卦其道大光中正有慶亦協韻他如井困豐兊凡易中慶字無不與平聲協韻者又如詩云孝孫有慶萬夀無疆我田既臧農夫之慶黍稷稻梁農夫之慶維其有章是以有慶萬舞洋洋孝孫有慶則篤其慶載錫之光皆以平聲協韻詩與易皆以韻為句也韓昌黎銘劉昌裔之墓云維徳不爽後人之慶爽音霜慶音羌亦平聲協今江西人皆呼慶字作羌音今慶與爽二字禮部韻平聲十陽皆有之屯卦利建侯程謂屯難之世當建侯以自輔蔡本朱說謂建己為侯盖主初九以貴下賤之得民初九為卦之主而建侯者又初九之爻辭也然屯難之世自立為君似難形於言朱之易本義惟曰立君而已語録方有立己之說而蔡說宗之鄒氏謂初九能得民建以為侯分民而治庶幾人得其主而有所統一則屯難亨矣龜山亦曰使人各有主而天下定愚按此說於朱說立君者可相通而無自立之嫌姑録之以俟知者求而徃諸說皆謂四以隂輔五之君位才不足濟屯故下求正應初九之陽與之俱徃以輔五節齋蔡氏云待初之求而後徃似又簡净可於正應上無添說蒙卦利用刑人用說桎梏程謂去昏蒙之桎梏固似未安龜山以說桎梏連下文云脫桎梏而縱之徃則吝矣是欲囚之終身乎蔡節齋云刑人治之也說桎梏改而止也覺明切需卦六四需于血出自宂上六入于宂龜山曰血隂傷也出自宂不安其所也上六處一卦之外逺於陽故入于宂宂隂所安也鄒氏曰宂以况隂之所居六四不足以遏三陽之進雖見傷而未甚故出自宂以避之三陽既克六四以進九五與三陽同類無所復事矣故上六因得以自安是謂入于宂三陽來則敬之終吉愚按二說相備視諸家似稳鄒之說實本古註其說尤明故摭而録之師卦師或輿尸諸家皆謂師不可以衆主晦庵獨本古註以為兵敗輿尸而歸未知孰是然蔡節齋本出朱說凡晦庵與伊川不同者多從朱獨此依伊川必嘗審思者也按六三師或輿尸猶可言兵敗若六五弟子輿尸言兵敗於文義未協合詳之丈人程云尊嚴之稱朱云長老之稱揚云丈者黍龠尺引之積愚按王充論衡云人形以一丈為正故名男子為丈夫尊翁嫗為丈人此說亦可輔諸說若淮南子謂老者杖於人為丈人恐未然比卦後夫程謂來比而後雖夫亦㐫朱謂不必如程說但指居後者愚按彖文曰後夫㐫其道窮也此只是本文之觧恐朱說為平易古註與蔡莭齋云後夫指上六按六隂也陽為夫恐非指六小畜卦西郊程以西為隂方雲自西而東不能成雨朱以西郊為文王自指岐周蔡莭齋朱學也亦以西為隂方而近世徐古為作易傳附說明言岐周之說為非學者恐且合從程說然在學者更詳之牽復程以九二與九五為牽朱以九二與初九為牽按下卦乾陽為上卦巽柔所畜而陽有復之義若以初九復自道與九三輿說輻觀之則當從朱說盖初復之最善者也二牽挽於初而得復者也三不中而邇隂不能復者也似皆主三陽之進而言之履卦履虎尾蔡云兊有虎象三為兊終故曰虎尾徐云虎屬金之一隂故有虎象不咥人亨主九四言之此說視諸家為詳然晦庵云以隂躡陽所以曰履虎尾是虎又指外卦之乾陽而下卦之兊履之也若據六三九四皆言履虎尾則合從晦庵盖六三若自為虎之尾不應虎自履其尾也其旋元吉旋字上連視履恐是旋踵之旋泰卦㧞茅茹以其彚彚字絶句與茹協韻而以征吉為占辭晦庵本郭璞易林之說辭義甚明勿恤其孚程朱皆以孚為所期之信龜山主人臣食禄而言以勿恤其孚為不阿意以取信於上惟徐云勿憂而孚矣以下爻不戒以孚例之又覺簡易用馮河蔡云勇者亦用也與程說不同大有卦初九无交害程朱皆謂處卑而未渉乎害楊龜山出於程蔡節齋出於朱乃皆謂因无交而有害愚按象曰大有初九无交害也此即是釋上文初不見有害之意合從程朱元說謙卦地中有山鄒氏云此亦實象如深谷為陵是地中有山而深者可以獲益故為謙之象亦有理然天在山中豈必實有其事此特就卦取象耳豫卦盱豫悔遲有悔程曰盱上視也三不中正上視四不為所取故有悔然四為豫之主遲而不前亦有悔此說諸家從之朱以盱豫為句悔遲有悔為句蔡節齋從之未知孰是然象曰盱豫有悔位不當也則盱豫悔宜為句程之說經之文也又徐云六三不中正故有悔又解之曰以其遲而有悔盱豫者介于石之反遲者見幾而作不俟終日之反此説從六二爻起義説來而合兩悔為一亦有理但不曾及盱之義併録之以俟知者由豫大有得程曰九四為豫之主得大行其志以致天下之豫朱以占為大有得未知孰是然象曰由豫大有得志大行也則大有得為得行其志隨卦大亨貞无咎而天下隨時隨時之義大矣哉晦庵云王肅本作天下隨之隨之時義大矣哉今當從之盖以隨時為誤也然象曰君子以嚮晦入宴息自有隨時之義晦庵觧此語亦曰隨時休息澤中有雷晦庵云震下兊上乃雷入地中之象隨時藏伏故君子亦嚮晦入宴息不知舊人曽如此看否愚按龜山曰雷在澤中其動息矣故君子以是嚮晦入宴息亦此意也臨川鄒氏曰澤中有雷此収聲於兊之時也覺尤切臨卦九二象曰咸臨吉無不利未順命也程云至誠相感非由順上之命也朱云未詳蔡云二以剛中得時行道有從道不從君之事鄒云九二之應六五非専以順命為感其間容有未順者而無害其為咸也未者特未定之辭觀卦盥而不薦有孚顒若程謂居上者當莊嚴如始盥求神之初不可使誠意少散如既薦之後則天下孚誠顒然瞻仰朱謂聖人出治天下自化如盥滌而不待薦亨有孚已自顒若視程之說精矣蔡節齋因其說併主在下之人言之謂天下潔手起敬正如承祭之時但不薦耳恐下之人非無因而孚耳彖曰下觀而化愚意此其所以孚者也又按古註本論語既灌而徃吾不欲觀之意故以此盥作灌說然盥與灌字義各不同又既灌而徃吾不欲觀者夫子特主魯之失禮而言所謂有為而言之者也若薦者亦豈皆誠意盡散而可盡少之耶恐程因古注而不暇改耳噬嗑卦雷電噬嗑程朱諸家皆言於卦合云電雷今云雷電者字相類而誤惟鄒氏謂彖亦云雷電合而章不必以是疑經文愚按此卦雖離上震下然陽氣将震發乃閃然成火故雷與電止一氣而雷為主電者雷之精光如爆竹火一出而聲即透亦主在聲雷電非其他判然二象之比彖言雷電合而章語意絶好經文未必誤也滅趾傳云滅傷也愚恐止是滅没如過渉滅頂之滅加校於趾滅没其趾而不見與滅鼻滅耳同與傷字盖異義也九四得金矢六五得黄金傳云金取剛矢取直以九四陽徳而言也黄中色金剛物以六五居中處剛而言也諸家皆從其說惟晦庵主周禮獄訟入鈞金束矢而後聽之之說以經說經固尤有據但恐周禮出於王莾之世未必盡皆周公之真若先要取其金而後與之聽訟雖昏亂之世不為况成周之治哉或者劉歆輩欲假此為惟貨張本已而即激天下之亂不及施行也耶金矢黄金皆象也非真也合且從程說賁卦六五賁于丘園束帛戔戔吝終吉古說以為聘賢固於卦外立說程傳以丘園為上九以束帛戔戔為受其裁制亦未見其確然有合者晦庵謂務農尚儉按龜山已㣲有此意鄒氏則與晦庵暗合冝詳其說剥卦山附於地剥程傳云山髙起於地而反附着於地圯剥之象也諸家似疑山附地有安之象與剥義正相反故各又自為之說朱云如山附於地惟其地厚所以山安其居而不揺此說可釋厚下安宅恐亦未及剥之名義愚意山特出而逺於地者山之常也此不以附言也而曰附於地此山之變也如梁山崩之類是也故經言山附於地剥而伊川釋為圮剥之象也君子以厚下安宅者觀圯剥之象而厚其基本使不至於剥也剥之名卦未嘗與山附於地相反君子以厚下安宅亦未嘗與剥之名義相反復卦出入无疾程傳云復生於内入也長進於外出也㣲陽生長無害之者也蔡節齋曰出由剥上出而為坤也入由坤下入而為復也鄒氏曰出入云者昔之出而今入也其說可以相備但蔡與鄒皆以无疾為不求速與程相反耳无疾合依程說若以无疾為不求速則下文朋來无咎豈以无怨咎之者耶先王以至日閉關商旅不行后不省方蔡云商旅至賤也后至貴也上自后下至商旅皆以安静為事愚按此說諸家未之及也盖若不如此兩下緫提則先王與后分為兩主人矣无妄卦物與无妄程云雷行於天下發生萬物其所賦與各正性命無有差妄物與无妄也朱云震動發生萬物各正其性命是物物與之无妄也二說皆以與為賦與之與近世有作物與之以无妄者恐非盖天下雷行物與无妄主造化而言對時育物主先王而言不當以中間物與自生物而言也此句差難曉故録之不耕穫不菑畬程謂不耕而穫不菑而畬為不首造其事以首造為妄朱云不耕不穫不菑不畬無所為於首無所覬於後未嘗起私意以作為以文脉言之合從朱說若如程說各句須添而字方通也无妄之災或繫之牛行人之得邑人之災程言有得則有失朱云行人牽牛以去而居者反遭詰捕之擾視程說為明矣鄒云或者繫牛於此自以為固矣繫脫而不知牛之所之以出意外牛為行人所得而乃責得於邑人豈邑人之罪哉此為无妄之災也覺於經文尤切大畜卦天在山中程止言所畜之大朱云止以象言不必實有其事合從其說他說有謂芥子納湏彌者此異端誕語有謂草木皆天者又是生說皆不必惑若居四山之中而仰視天亦可言天在山中然象意不指此也曰閑輿衛曰陸音越諸家從之鄭作日程與朱從之合作日月之日讀何天之衢亨程以何字為誤加諸家遂生别說朱云何其通達之甚也此說極明白只依經文讀之坎卦樽酒簋貳程傳曰一樽之酒二簋之食復以瓦缶為器質之至也朱本義乃用晁以道之說以樽酒簋為句貳用缶為句其說曰既曰樽酒簋貳又曰用缶亦不成文理又曰其實無貳簋之實陸德明自註斷愚按貳用缶恐亦不成文理徐云權輿以四簋為盛損以二簋為約鄒云樽酒者一樽之酒簋貳者以簋食副之其說尤精天下義理無窮未必陸氏可以註斷象曰樽酒簋貳剛柔際也此本經正文初未嘗以樽酒簋斷句也合且依此經文以樽酒簋貳為句離卦離麗也古說皆以麗為附愚恐亦兼文明之意如日月麗乎天百穀草木麗乎土重明以麗乎正皆有華麗氣象不特言附着而已明兩作離程與諸家皆以明兩為讀晦庵用水洊至句法以明兩作為讀愚按明兩作之句出釋文兼觧卦亦云雷雨作句法相似尤為切證合從晦庵六五之吉離王公也程以離為麗云六五之吉者所麗得王公之正位也蔡云柔居尊位故為離之王公然則不必改離為麗文理自通獲匪其醜古註云除其非類此語盡之程云所執者非其醜類則無殘暴是欲增說義理也然欲言無暴當曰非執其類可也今曰所執者非其醜類則語意未明反若禍及無辜豈得云無殘暴耶蔡云獲非其類者而已此語視古註尤明咸卦咸其脢古註云脢者心之上口之下進不能大感退亦不為無志其志淺末故無悔而已按此說自咸其拇次第而上說已明白近世程朱諸家皆云脢背肉也與心相背然朱與諸家以為與心相背為無思無為之地無係累故無悔而程又以為背其私心私心二字似又添一層說於經文非順竊意當以諸家與古註相參而義備遯卦莫之勝說說王肅如字徐吐活反程從王音云不可勝言於勢順易朱與諸家從徐音作脫字說恐不若從程也大壯卦六五䘮羊于易程曰羊象羣陽並進六五以和易待之使無所用其剛是䘮之于易也朱曰六五以柔居中不能抵觸雖失其壯亦無所悔易者忽然不覺其亡也蔡曰羊自謂也易者寛閑無拒之謂為剛所决故曰䘮羊愚按程說以六五能䘮羣陽並進之壯朱蔡以六五為羣陽並進而自䘮其壯二說未知孰是然象曰䘮羊于易位不當也言位不當則居羣陽並進之衝為其所决者似矣若能以柔勝剛宜曰位當豈得言位不當耶兼旅卦䘮牛于易與此義例一同程觧亦云以忽易自失其順未嘗以為䘮失他人之順晉卦維用伐邑程傳凡伐邑皆釋為自治晦庵謂伐邑如墮費堕郈之類易中言伐邑皆是用之於小愚按世無稱兵自伐其邑之理釋為自治恐未安古者諸侯各自為國其大夫則有采邑采邑容有不順者則伐之故為伐邑鄰國相侵則為伐國古有此事故有此語合從朱說明夷卦明夷于飛垂其翼君子于行三日不食有攸徃主人有言初九居陽之始飛者去之也垂其翼行不敢顯也三日不食不暇食也此古注大意如此與象曰義不食也意相合近世以垂翼不食皆為傷困之極恐初九未至此亦與義不食之意殊矣大率爻象正是孔子觧經之語不當背之今以經文之象曰為正入于左腹獲明夷之心于出門庭程謂言姦邪得君之深朱云未詳疑六四居暗地尚淺猶可以得意而去愚按朱說於象曰獲心意也一語意義相協當從之但程說窮極小人之情状自足為世戒不可不熟玩爾上六不明晦初登于天後入于地愚意明夷之極是日入于地故曰不明則晦矣日之初登于天後乃入于地日大明也一失其中則尚如此人宜何如其自畏矣睽卦其人天且劓六三居二陽之間而上應上九故古注與晦庵諸家皆以見輿曵為二牽於後以其牛掣為四阻於前以其人天且劓為上九猜狠而重加之刑惟程傳併天且劓歸之九四而不及上之正應按晦庵依古註恐合從其說觧卦觧利西南古注西南衆也程朱皆以西南為坤體廣大安静然象之釋此句元云徃得衆也程朱之說乃是所以得衆之道合兼詳之無所徃其來復吉有攸徃夙吉古注云無難可觧則來復有難而徃則以夙為吉蓋兩開其端也程傳乃云其始未暇有為既安定則為可久之治晦庵非之盖或為或不為惟其當而已合從古注六五君子維有觧吉有孚于小人古注云以君子之道觧難小人猶知服而無怨程朱皆以君子之觧信驗於小人然按象曰君子有觧小人退也則古註為平順盖易之有象曰是即所以解易者也損卦初九已事遄徃无咎古註云事已則徃不敢宴安乃獲无咎程傳云事既已則速去之不居其功乃无咎也朱本義云上應六四之隂輟所為之事而速徃以益之无咎之道也按三說雖不同而皆主於初九自損以上應六四為說諸家乃以已事為止其事恐未安合詳之六五或益之十朋之龜弗克違元吉自古註以至本義皆云獲益而得十朋之龜若本義則又明以或益之十朋之龜為句盖謂兩龜為朋也惟程傳以朋為助以十為衆云衆助之公雖龜卜不能違是或益之為句十朋之為句龜弗克違又自為句未知孰是然若如本義分句則弗克違一句主何而言似欠歸着若如程傳分句則龜弗克違即書云龜從之意主龜而言庻有歸着在學者詳之要之程以理言朱以象言也得臣无家諸家皆謂得臣无間逺近惟蔡氏鄒氏謂得臣之國爾忘家者姑録之益卦六三益之用㐫事无咎古註以隂居陽而求益物所不與救㓙則免愚按文義已順特語未瑩耳程傳云三當禀承於上安得自擅為益唯於患難可以應卒遂以守令救荒㐫為言晦庵非之謂六三不當得益有益之以㓙事者盖警戒震動乃所以益之也蔡氏宗之然恐警戒未可據言㓙事耳龜山謂用㐫事者亡所以保其存㐫所以有其吉故曰固有之也亦是一說要之古註為易見莫益之偏辭也程云非有偏已之辭也恐上添非有字未知如何朱曰莫益之者猶從其求益之偏辭也上添求益亦未知其如何意若戒之曰莫益之凡求益者皆偏辭耳夬卦告自邑程朱皆以為先自治理固然矣然恐自乃自從之自非自已之自如云告戒自其居邑始欲人人知謹也居徳則忌此句頗難曉程傳云居徳謂安處其徳也則者約也忌者禁也約立防禁而無潰散是以則字為法則之則然未能使人曉然也朱云未詳龜山云以徳厚自居則忌之所集鄒氏曰澤上於天勢必将决於下流君子觀此象以之施禄則可以之居徳則不可愚按此二說近之故録九二惕號莫夜有戎勿恤程朱皆以惕號為句愚按象曰有戎勿恤得中道也則分句合依諸家有戎勿恤為句正在本經非諸家自為之說也獨行遇雨若濡有愠遇雨九三獨應上六也然若将為雨所濡而有愠色則九三雖與上六應實與諸陽並進而羞與隂比所以無咎則雖應亦不與之應矣姤卦初六繫于金柅古註以金柅指九四謂初六遽遇之始以一柔而承五剛散而無主自縱者也臣妾之道不可以不貞故必繋于九四之正應乃得貞吉金者至堅之物柅者制動之主也廣雅柅止也說文作檷絡絲趺也按此說以一隂遇五陽而欲其専於九四正應之陽其義甚明金柅雖古今異俗不知其何物而指為堅物以此繫於彼意亦曉然矣程傳不以九四正應取義但欲戒隂之進謂柅為止車之物止之以金柅而又繋之又是一義然恐又繫之之語與經文繫于之意不同耳九五以杞包𤓰含章有隕自天程傳以為求賢而天降之賢於爻象未見其的然者朱本義以杞為五之陽而包下初生之𤓰以防其潰含章以俟可囘造化亦未知其於爻象果何如縁此爻辭乃懸空設象人各以意求之耳其餘紛紛尤更各出惟蔡節齋謂五與初無相遇之道猶以髙大之杞包在地之𤓰惟當自蓄其徳以待之其有隕墜乃出於天非人所能為也雖未必然於爻義差近姑録之以俟知者萃卦萃亨程朱皆以亨為衍字盖以彖文不及亨字而下文又有利見大人亨也鄒氏曰萃者聚也民富物阜財力有餘之時也萃則亨矣然則依經文於萃之下有亨字亦未嘗不可也孚乃利用禴程傳發至誠不事外飾之義甚備然此句語脉自有兩節蔡云未孚而用禴有簡薄之嫌必待其交孚而後用鄒云用禴在既孚之後愚按二說於經文為順盖九二剛明之臣應六五柔順之君當升之時理當然也困卦初六臀困于株木程傳謂無所芘而不得安其居朱云臀在株木上不安可知視程尤徑九二困于酒食古註云以陽居隂謙以待物物莫不至不勝豐衍故曰困于酒食是言困于酒食之多也程傳謂酒食所以施惠二以剛處困未得施其惠是言困于酒食之少也愚按象曰困于酒食中有慶也是九二乃好爻初無困吝不足之意古註之說為順若程說則又成一義矣朱以困于酒食為厭飫之意此足以發古註之未及也朱紱赤紱程以朱紱君之服九二上承九五之君故云朱紱方来赤紱臣之服九五下應九二之臣而上下皆為柔所揜故曰困于赤紱晦庵非其說然蔡出於朱亦祖程說盖晦庵亦未有他說以過之而二爻相形程說已明也合且從程井卦木上有水井程傳謂木承水而上之乃器汲水而出井之象晦庵謂其象只取巽入之義若如汲水器之說則與後面羸其瓶之義不合木上有水者津潤上行露水直至樹末此即木上有水之義却汲上供人食用愚按此義當從晦庵盖古以瓶汲程傳出近世見近世以木桶汲泉而云木爾徃嵗有沈計議雄飛說井底湏置木板以隔泥汚而木板終不朽今作井者皆然自謂此可明木上有水為井之說愚恐亦據目今所見言之未必古人皆然亦未必作易者以此取義也君子以勞民勸相程傳云勞徠其民法井之用也勸民使相助法井之施也愚按相字合作去聲其義為助若如程傳勸之使相助則是相字合作平聲而其下又添助字以足其義而相乃歇後字耳且於木上有水之義似無相關竊意上下之情本以勢隔君子觀井之象勞徠其民而勸勉之相助之使得上通有如汲引盖取井之義云爾九三井渫不食為我心惻可用汲王明並受其福象曰井渫不食行惻也求王明受福也程傳云有才未得用如井潔不見食既以不得食為惻豈免有求故求王明而受福晦庵云井渫不食而使人心惻可用汲矣王明則汲井以及物而並受其福也行惻者行道之人皆以為惻愚按朱說於為我心惻之義甚明盖為我者指他人言之也合從朱說臨川鄒氏釋行惻之義亦與朱說暗合古為徐氏云求王明者豈九三自求上哉惻之者為之求矣此義亦足以發六四井甃无咎程朱皆謂六四以柔居大臣之位才弱不能濟物故取修井為象是矣鄒氏曰甃所以禦惡而潔井徐氏曰此在井壁恐有井谷之處因勉以井甃无咎愚按二說可禆程朱之細故録之上六井収勿幕自古註以及程朱諸家皆以上六處井之極水已出井故曰井収収者汲取也収亦作去聲臨川王氏専主収作去聲云古者以収名冠以収髪為義井収者井口之臼亦一井之體収於此也掘井及泉渫之使清甃之使固自下而上至於井収則井之功畢矣井甃者所以禦惡於内井収者所以禦惡於外収以禦惡而非杜人之汲也故禁之使勿幕按此說異衆雖未必然而於事情為切故録之以俟後來者詳焉審如其說則幕者即以井収而覆井之名非幕帟之幕世亦未有以幕施於井者也革卦水火相息馬云息滅也程朱皆從之蔡節齋本王弼注以為生息之息不知水火不能相生也程云物止而後有生朱云滅息而後生息其推演已明盖生息又自息滅而始也此章本㫖正為滅息之息鼎卦正位凝命伊川以命為命令之命晦庵以命為天命之命合從晦庵震卦出可以守宗廟社稷以為祭主也程傳主長子言之云君出而可以守宗廟社稷為祭主也臨川鄒氏曰天子廵狩親征諸侯朝覲會同皆世子主祭震為長子故此卦以君出子在為言不雜君父共國時也愚按此說釋程傳之意為明晦庵云出謂繼世而主祭也六五震徃來厲億无䘮有事古註徃則无應來則乗剛皆危也處震之時而得尊位乃有事之機也而懼徃來将䘮其事故曰億无䘮有事也程云徃來皆危隨宜應變在中而已故當億度无䘮失其所有之事所有之事謂中徳朱云以六居五而處震時无時而不危故无所䘮而能有事愚按三說相近至朱而愈精鄒氏云剛動二隂之下欲以威加者也初九一震六二䘮貝勢則然也九四之震泥矣五自億度知其无能為也吾之所有事者可无䘮焉故曰億无䘮有事五之柔中能勝天下之剛其事在此象曰其事在中大无䘮也謂之大見其必无䘮也此說似足以輔前說以无䘮關二之䘮貝而言故録之艮卦艮其背不獲其身行其庭不見其人兩艮各止其所諸爻皆無相應晦庵語云這箇卦各是一箇物不相秋采内不見已是内卦外不見人是外卦兩卦各自去愚按艮卦本㫖恐不過如此所謂艮其背不獲其身背後自不見其身也行其庭不見其人者相背亦不見人也静止之義理無窮固皆在其中矣漸卦山上有木漸程以山上有木其髙有因為漸晦庵謂木漸長則山漸髙似勝有因之說矣鄒云山上有木止於下而漸於上者也其日夜之所息雨露之所潤豈一朝一夕而遽致其髙大哉似於文義尤切鴻漸于逵其羽可用為儀程以儀為儀法恐儀法非可于鴻而言朱以儀為羽旄之飾或疑亦未當于其飛翔而言古註云峨峨清逺儀可貴也似得飛翔雲路之意然朱之說於可用字為切合古註與朱說參之氣象斯可見巽卦九二巽在牀下用史巫紛若吉无咎程朱皆以牀為人之所安巽在牀下為過所安有不安之意程以史巫為通其誠意誠則吉朱以為竭誠於祭祀之占鄒氏云牀尊者之所據也巽在牀下則其屈已已甚屈於人者非怯則謟皆不免有咎惟用之於史巫則吉而无咎盖祝史通人意於鬼神巫以鬼神之意告于人皆交於神者交神豈容詐哉是以雖尚口而巽紛然其多不過通其誠意故得無咎蔡云史巫皆善口舌紛若丁寜煩悉之意巽過乎實惟用於史巫則吉徐古為云史巫達其卑下之忱不厭其忉怛之意其說亦與鄒氏合此可貫通一爻之意合從鄒說六四悔亡田獲三品程傳謂六四乗承皆剛宜有悔而悔亡者如田獲三品遍及上下也晦庵謂此說牽强且當闕疑臨川鄒氏曰惟悔亡然後田獲三品也巽若無能為者易於有悔六四得巽之正非巽懦無立者故悔亡田以講武且除苗害興事之大者田而有獲則為有功故象曰田獲三品有功也愚按此說與象辭相應故録之以俟知者先庚三日後庚三日蔡氏曰十干自甲至已為陽陽主生甲於時為春自庚至癸為隂隂主成庚於時為秋先庚三日丁也丁者丁寕之義後庚三日癸也癸者揆度之義鄒氏曰蠱卦先甲後甲此創始之事也記曰日用甲用日之始也故甲以創始為義巽卦先庚後庚此變更之事也漢志曰歛更於庚悉新於辛故庚以變更為義愚按晦庵已發此義而二家可輔其說故録之渙卦六三渙其躬无悔六四渙其羣元吉程云六三止於其身可以无悔朱云六三隂柔而不中正有私於己之象能散其私以得无悔程云六四天下渙散而能使羣聚可謂元吉朱云如程說是羣其渙非渙其羣也祖老蘇之說謂羣者聖人所欲渙以混一天下者也盖渙散之時各相朋黨惟六四能渙小人之私羣下文渙有邱則混而為一之義也愚按文義皆似朱說為順又六三象曰渙其躬志在外也與朱氏散其私相合若如程說則於志在外之語不協矣渙王居无咎程以九五能渙汗大號居王位為稱而无咎朱以為散其積聚愚按六三六四曰渙其躬渙其羣其者有所指而散之故朱說為順此爻乃渙汗大號之下獨言王居不成文故再提卦名渙字曰渙王居者言九五渙之君位也故象曰王居无咎正位也似無散積聚之意且合從程說節卦苦節貞㐫程云固守則㐫朱云雖得正而不免於㐫愚按卦辭云苦節不可貞則程說本經意也未濟卦上九有孚于飲酒无咎濡其首有孚失是程傳謂上九剛明之極居未濟之極當樂天順命飲酒自樂若耽樂過禮至濡其首如是則於孚為有失也朱本義云剛明居未濟之極時未可有為而自信自飬以俟命无咎之道也若縱而不反如狐之渉水而濡其首則過於自信而失其義矣臨川鄒氏曰既濟之極入於未濟未濟之極反於既濟上九以剛明處之天下之事可以濟矣雖飲酒宴樂信乎其无復灾咎也故曰有孚于飲酒无咎若懐其宴安沈湎无度則又將入於未濟而飲酒之樂信乎其失之也故曰濡其首有孚失是易六十四卦以未濟終之未濟六爻又以飲酒濡首終之此易之為道懼以終始歟愚按此章雖晦庵亦疑其難說今鄒說於經文似明須謹録之以俟知者問焉濡其首冒上文飲酒繋辭上天尊地卑之變化見矣晦庵云天尊地卑一截是說造化實體乾坤定矣一截是說易書臨川王氏曰此言易書未作以前之易雖未有乾坤之卦自天尊地卑而乾坤已定此言自然之易剛柔相摩以下晦庵謂此言易卦之變化南軒謂易所以斡旋造化之間者王氏謂言自然之八卦乾知大始云云王氏謂此言乾坤以造化之用付之六子而其所自處者甚易簡也易則易知云云晦庵謂此言人法乾坤之道聖人設卦觀象以下王氏云前言易書之未作此言易書之既作也晦庵云此言聖人作易是故君子所居而安云云此言君子學易是故君子居則觀其象云云此言君子用易彖者言乎象者也之各指其所之晦庵云此章釋爻辭之通例王氏云此因前之義而言聖人設卦繫辭學者觀變玩占之要也易與天地準之神無方而易無體王氏云前言易之書此言易之道晦庵曰此章言易道之大聖人用之如此仰觀以下窮理之事與天地相似以下盡性之事範圍天地以下至命之事範圍天地之化而不過所謂裁成之也一隂一陽之謂道之君子之道鮮矣愚意此言道原於天而賦於人顯諸仁之隂陽不測之謂神愚意此言造化寓之易顯仁藏用盛徳大業皆指造化而言造化之生生不窮者即是易易之成象者即是乾效法於乾者即是坤自此言易之卜筮妙用處夫易廣矣大矣之易簡之善配至徳此賛易道之廣大至徳晦庵指為在人之至徳楊氏鄒氏皆云中庸之至徳惟伊川云乾坤易簡之功乃至善之徳子曰易其至矣乎之道義之門鄒氏云此章言聖人體易之道而與天地相似易與天地同出而聖人獨得其要成性存存南軒云因其存而存之晦庵云成性本成之性存存謂存而又存不已之意聖人有以見天下之賾之盜之招也王氏云此言聖人推其所獨見者立象生爻使天下皆有所見而得以善其言動也舉鶴鳴在隂以下七爻晦庵曰此下七爻則其例也賾幽深也諸家皆然晦庵獨以為雜亂盖以下文云言天下之至賾而不可惡也故以為雜亂然云聖人有以見天下之至賾而擬諸其形容則是幽深之理難見而聖人獨能見之也擬諸形容使幽深者可見而人皆得見之也若曰雜亂則人皆得見何必聖人凢雜亂者具有形質何得擬諸形容如以惡字非所以言幽深則凡易象所以形容其幽深者若載鬼一車之類甚多聖人假象以明理自不見其可惡耳合從伊川及諸家之說以賾為幽深且與經文探賾索隠之意合大衍之數五十之可與祐神矣晦庵移天一地二五句加其前而下粘其闕所為乎合為一章云此章言天地大衍之數揲蓍求卦之法蔡節齋亦移天一地二為章首於理甚順子曰知變化之道者之易有聖人之道四焉者此之謂也此章言易之神主蓍龜而言所云無思而為者亦言蓍龜無心而能應或者因以為人不可有思者誤也子曰夫易何為者也之定之以吉㐫所以斷也此章言易之用亦主蓍龜而言易曰自天祐之之無不利也此釋大有上九之爻古以屬之前章本義屬之後章云恐是錯簡王氏曰疑在下繫諸爻之後子曰書不盡言之鼓之舞之以盡神此言聖人作易乾坤其易之藴耶之或幾乎息矣晦庵言是隂陽卦畫王氏云此言自有天地已有易易與天地相無窮是故形而上者謂之道之事業王云此言聖人用易致治是故夫象聖人有以見天下之賾之存乎徳行晦庵此言卦爻所以變通者在人人之所以能神而明之者在徳繫辭下八卦成列之禁民為非曰義晦庵曰此章言卦爻吉凶造化功業又云天地之大徳以下乃各自說去王氏云此言聖人以仁義參天地而全其生生之用也古者包犧氏之盖取諸夬晦庵曰此章言聖人制器尚象之事王氏曰言聖人居大寶之位然後能用易以致利於天下盖取諸益晦庵云盖字乃模様是恁地又云亦曰其大意云讀漢書所謂獲一角獸盖麟云皆疑辭也王氏曰取諸益之類當時未有是卦盖八卦成列象在其中矣且以益言之雖未有益卦而已有巽與震矣合震巽則為益盖取云者夫子知前聖之心而言之也愚恐夫子言於己有六十四卦之後若曰古人制某器合於今日某卦之理盖取者推其理云耳是故易者象也之立心勿恒㐫此章言爻象之動而舉爻以明之子曰乾坤其易之門耶之以明失得之報晦庵曰繋辭自此以下皆難說本義亦畧矣愚按自此以下張南軒蔡節齋之觧多分曉王氏之觧亦足以輔之然終當以晦庵闕疑之義為主難質言也開而當名辨物正言斷辭則備矣此晦庵疑其有誤者也南軒曰行健為乾之類當其名也名既當則剛柔之物辨矣言天下至賾之類正其言也言既正則辭之所指者可斷矣蔡曰開為事物萬殊開而當名也乾馬坤牛之類辨物也利貞之類正言也吉㐫之類斷辭也易書備於此也王曰聖人作易所以開明未悟者名舉其當言舉其正所以開明之也未形之物不可辨必以名之已立者辨之是謂當名未然之辭不可斷必以言之已驗者斷之是謂正言愚按南軒以兩項各相因蔡說以當名辨物正言斷辭作四項王作兩項未知孰是姑以晦庵所未觧而録之因貳以濟民行以明失得之報此亦晦庵所不觧者也蔡曰因民疑貳未决而易入之時以濟其善行明著其失得之報失得謂吉㐫也王曰吉㐫者失得之象民行之所以不能自濟者以其不知吉㐫之所在而疑貳之心交戰也聖人作易使知所為之失者其報必㐫所為之得者其報必吉懲其失而矯之者雖㐫亦吉恃其得而忽之者雖吉亦㐫以此濟民行也易之興也之巽以行權晦庵曰此章三陳九卦以明處憂患之道易之為書也不可逺之道不虛行王言此章言易書所以載道非其人則不自行也其出入以度外内使知懼晦庵曰此句未詳疑有脫誤蔡曰出謂爻自内而徃入謂爻自外而來以度謂出入皆有節度外内使知懼如夬之變乾出外而知懼也如剥之變復入内而知懼也王曰下卦為内上卦為外自内之外為出自外之内為入卦示人以出入之道使人知所懼也不可為典要既有典常晦庵曰上文既云不可為典要下文又云既有典常都不可曉愚恐上文言易道之變遷故曰不可為典要下文言人能率其卦爻之辭而揆度其事情所向之方則既有典常矣上主在易而言未定者也下主在人而言得占而已定者也未知然否易之為書也原始要終之其剛勝耶此章言六爻之不同若夫雜物撰徳辨是與非則非其中爻不備噫亦要存亡吉㐫則居可知矣晦庵云曉不得說一箇噫字都不成文章蔡曰雜物撰徳雜隂陽二物以為徳也辨是與非辨其徳之是非也得位則吉失位則㐫要之以此則可知其是與非也王曰合於理者為是是之應為存為吉乖於理者為非非之應為亡為㐫不必至於存亡吉㐫而後知辨是與非則居可知矣居可知者若曰可坐而知也聖人所以歎之曰噫易之書也廣大悉備之吉㐫生焉此言六爻之道易之興也其當殷之末之易之道也言文王繫易多述憂危之事夫乾天下之至健也之其辭屈此章皆從乾坤簡易發意王氏逐節觧之能說諸心能研諸侯之慮朱曰侯之二字衍文蔡本徑去侯之二字而以說諸心研諸慮並言愚按王弼畧例亦曰說諸心研諸慮則侯之二字為衍文明矣但當仍古本而讀者自以義理省此二字而讀之可也古本元有此二字而去之不可也說卦昔者聖人之作易也之至於命此章言蓍卦爻義幽賛於神明而生蓍晦庵觧能賛化育天下和平而蓍生蔡氏曰神明盖渾然未形者聖人幽而贊之則知有粲然之理故大衍之蓍所由以生王氏曰蓍神物也天地生其形聖人生其法方其蓍法之未生則蓍之為物特庶草之一耳豈知其為神明也哉天地神明不能與人接聖人幽有以賛之而傳其命於是起大衍之數愚按晦庵說極簡明但此章正言聖人用蓍恐未必說到蓍未生前聖人賛化而致蓍生之事故又録蔡王二說以參之倚數晦庵以為揲蓍時依倚在這裏蔡云依也數依乎天地王云數無常用人倚之而有所託焉愚按若如蔡說既參之兩之而又倚之恐於天地上意重合從晦庵和順於道徳而理於義窮理盡性以至於命晦庵謂此聖人作易之極功止就易上說凢就人上說者借之也諸家多同盖經㫖如此聖人之作易也將以順性命之理之六位而成章此章言易之六爻盖兼三才而皆所以順性命之理天地定位山澤通氣雷風相薄水火不相射之兊說也天地定位者天尊而上地卑而下其位一定而不可易易取其象於卦為乾坤凡二者為天地之氣之統宗譬之父母雖若無所施為實主宰乎一家而居其尊者也山澤通氣者山澤一髙一下水脉灌輸而其氣實相通通之為言貫也易取其象於卦為艮兊雷風相薄者雷風一迅一烈氣勢翕合而其形實相薄薄之為言逼也易取其象於卦為震巽水火不相射者水火一寒一熱宜若相息滅而下然上沸以成既濟之功乃不相射不相射者言不如射者之相射音石害也易取其象於卦為坎離凡六者皆天地之氣之為譬如六子迭相運用而悉出於父母者也聖人設此章以釋八卦之義似不過如此而已厯漢唐以至本朝伊洛諸儒未有外此而他為之說者惟邵康節得陳希夷數學創為先天之圖移易卦之離南坎北為乾南坤北曰此取易之天地定位也然易曰離也者明也南方之卦也坎者水也正北方之卦也則離南坎北經有明文矣天地定位於經未嘗明言其為南北也何以知其此為先天之卦位言徒以卦言位或彼或此猶固未可知今以事理之實可見者考之則風一從南即盎然以温風一從北即冷然以寒南方屬夏其熱如此北方屬冬其凍如此離南坎北信乎其如今易經之言矣康莭移之以位乾坤将何所驗以為信耶康節既移乾坤以南北又移艮以居西北移兊以居東南曰此取易之山澤通氣也然易曰艮東北之卦也又曰兊正秋也則艮居東北兊居正西經有明文矣若山澤通氣特言其通氣而己於經未嘗明言艮為西北兊為東南也康節何所考而指此為先天之卦位若以事理之實而考之山必資乎澤澤必出於山其氣相通無徃不然豈必卦位與之相對而後氣可相通耶康節既移東北之艮於西北遂移震於東北而移巽於西南曰取易之雷風相薄也然易曰震東方也又曰巽東南也則震居東方巽居東南經有明文矣若雷風相薄特言其相薄而己於經未嘗明言震為東北巽為西南也康節何所考而指此為先天之卦位若以事理之實考之震惟居正東巽惟居東南逼近而合故言相薄若逺而相對安得相薄而東北為寅時方正月又豈雷發之時耶康節既移離坎之位以位乾坤乃移離於正東移坎於正西曰取易之水火不相射也然南方為離北方為坎經文萬世不磨若水火不相射特言其性相反而用則相資耳於經未嘗明言離為東方之卦坎為西方之卦也康節又何所考而指此為先天之卦位說者雖指火為日遂以離為東指水為月遂以坎為西然按說卦先言離為火然後言離為日獨言坎為水而未嘗言坎為月盖日乃太陽之精非特可以離言月乃太隂之精非特可以坎言月雖隂而其出必於東日雖陽而其没必於西周流運轉晝夜不停非若水火之定位於一方者比也又可借日月以代水火為言耶易畫於伏羲演於文王繫於孔子傳之天下萬世惟此一易而己未聞有先天後天之分也雖曰未有天地已有此理然而作易始於伏羲不言先天康節特托易以言數諸儒未有以此而言易者也晦庵以理學集諸儒之大成原聖人因卜筮而作易始兼以康莭之說而詳之若據門人所録語類乃因康節之先天而反有疑於文王孔子之易及有疑於伊川之易傳且有疑於易經此章八卦之位然按晦庵先生答王子合書明言康莭言伏羲卦位近於穿鑿附㑹且當闕之以此槩彼門人所録其一時之言耶抑録之者未必盡當時之真耶盖易所言者道而康節所言先天者數也康節雖賢不先於文王孔子也康節欲傳伊川以數學伊川堅不從則不可以其數學而反疑伊川之易學又可知也學者且當以晦庵親荅王子合之言為正毋以門人記録晦庵之言為疑語録云文王八卦不可曉處多文王八卦有些京房卦氣不取卦畫只取卦名或者謂此因康節先天而不能無疑於文王者也又曰潜龍勿用何謂也以下大㮣各就他要說處便說或者謂此因康節先天而不能無疑於孔子者也又曰程子之意八卦上疊成六十四卦與邵子說誠異盖康節此意不曽說與程子程子亦不及問之或者謂此因康節先天而不能無疑於伊川者也又曰易言齊乎巽不可曉曰坤在西南不成東北方無地曰乾西北亦不可曉如何隂陽來此相薄曰西方肅殺之氣如何言萬物之所說或者謂此因康節先天而不能無疑於易繫所言之八卦也凡皆門人之所録非出於晦庵之成書未知然否乾為馬之兊為羊南軒節齋說甚詳明晦庵云此章廣八卦之象其間多不可曉者求之於經亦不盡合愚恐此是古者占卜之雜象如今卦影然每卦各有不一之象占得某象者即知為某卦故於每卦總言之未知然否序卦此言易之序不待注釋本文已明雜卦王氏曰序卦先後有倫雜卦則揉雜衆卦以暢無窮之用愚按序卦之後有雜卦猶既濟之後有未濟所以昭易之無窮歟黄氏日抄卷六
