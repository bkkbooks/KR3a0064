body:
  text: 黄氏日抄卷五十三宋黄震撰讀雜史三春秋世紀用竹湖李參政韶所編抄其要王世紀自平王迄敬十三王書於經者凡十二事前此未言天王法天之號自春秋始前此未書京師衆大之名自春秋始凡皆致意於本原欲因其不正以反其正齊威公黜其義而録其功王禁明而王臣不下聘者六十年盟㑹同而諸侯無私争者三十年序績召陵而荆帖陳旅聶北而狄退獻捷過魯而戎弭貫澤而下葵丘以前衣裳不㰱血兵車無大戰仲尼稱其一匡孟子與其為盛此凡威公定覇之目九國叛而萌振矜管仲死而放繩墨城杞貶於城邢救徐怠於救許伐黄則外憂啟滅項則衆志離㑹下則家法隳覇功亦以不終矣宋襄公宋襄伐䘮以立威則非仁致夷以謀闕無功而又階亂晉文公晉自武公并吞専立春秋黜晉不書文公復國無所禀承勤王特為求諸侯之計春秋亦没其行事為國五年當僖公二十八年晉楚之争乃闗夷夏之盛衰非止一國之得失方六挈晉侯以書之抑楚之深故與晉之亟也然以晉視齊城濮之功雖多於召陵温之事雖敏於葵丘三㑹諸侯莫有不至雖盛於威公而威公得江黄不同於伐楚而文公則譎非致秦不可與楚争楚抑而秦興矣威公㑹不邇三州盟不加王人文公㑹畿内盟子虎矣威公寜不得鄭不納子華懼其奬臣抑君文公則為元咺執衞侯矣此夫子所以有正譎之辨晉襄公襄之繼伯由殽之功而春秋不書君將獨言晉人以䘮不興戎義不可也方文公之没敵國並興襄公夏戰殽以却秦秋敗箕以剪狄冬伐許而離楚一年之間三敵悉退可謂有覇者之略外患既息舉動即異伐衞則損威㑹公孫敖則毁烈士縠主盟則權散陽處父救江則謀怠其規模又淺於文公甚矣晉靈成景厲悼公晉靈公政堕柄分楚人之言曰晉君少不在諸侯比方可圖也成公黒壤與扈二㑹僅能合列國而楚人三歳三伐鄭不能興攘却之師景公蟲牢馬陵及蒲之盟雖得諸侯竟莫駕楚屬公交剛敗狄㑹京師伐秦戰鄢陵勝楚㑹鍾離成吳四鄰而釁而諸侯反貳蕭牆反危惟悼公年十四即位入國之明日逐不臣者七人即位之一月取六官於民譽能服諸侯得鄭而駕楚然能駕楚而不能蓋誘吳之非平公繼之五盟六㑹而溴梁之㑹授權於大夫宋之盟授權於夷狄昭公一㑹一盟坐視諸侯之去而不之顧晉日卑矣頃定之世私門強諸侯貳吳楚強然終乎黄池聖人猶以覇繫晉晉文未覇以前别紀晉自鄂侯後入春秋皆為曲沃殺奪武公始并晉國春秋皆削而不書魯謂春秋多内魯之文尊魯之至者責魯以備也家法不設君柄不收故多變故蔡蔡自宣訖成十二君以宗盟之長汙於事楚而不知變惟文公嘗謀事晉畏楚而不得行昭公遭拘郢之辱絶楚事晉晉人求貨而辭蔡蔡乃假手於吳雖釋憾一時終為楚所并曹曹在春秋十五君事夏盟最謹與諸侯敢睦惟偪而無禮不能自立病於戎困於晉亡於宋當哀八年衛衞在春秋十一君兵争最少人才特多與魯俱稱望國而適庶亂兄弟乖父子暌變故繁興云鄭鄭近王畿而介齊晉楚之間盖春秋要領之國其初周鄭交惡為王室之罪人其中堅於從楚為覇者之罪人其後輙隳於七穆之手有罪不討又為諸侯之罪人滕滕之可考者纔五君其與諸侯睦其事覇主謹惟偪而無禮故逼於宋畏於齊楚無以自立邢邢滅於衞衞文之罪著矣而邢不度徳不量力不親親與狄伐衞以速其亡其罪尤大郕郕之書於經者四既降齊七十一年而奔魯是其不得免焉必未有罪聖人以伯書明周公大封同姓之意左氏以為太子朱儒必不然矣凡皆姚姓微國世紀虞虢焦滑之屬皆同姓自尋斧於本支陳陳舜之後國於荆河邇強楚而逺齊晉堅於事楚非得已故聖人不忍貶絶而十二公悉著册杞杞夏之後而用夷禮聖人不忍絶也故書子二侯三人五百二十八因其善惡而著之宋宋湯之後春秋二百四十二年常書公以列於諸侯之上反覆十三君行事非有可稱而聖人拳拳焉特以著三統之相承明王澤之當續爾庶爵世紀齊齊自僖公入春秋參盟胥命諸侯以稍稍宗嚮之矣威公覇業雖隳乎孝公猶世為諸侯之雄景公授政強家陳氏得售燠休之恵於民而齊國微矣許許初從齊猶未病也齊覇既衰一意從楚而終為鄭所併莒莒近齊偪於齊最甚而又怙其強暴首入人之國取人之地春秋夷之略見於經薛薛諸任之國自奚仲為夏車正而遷于邳仲虺為湯左相而居於薛然自入春秋以來役於宋偪於齊臨之以齊晉微弱無以為國矣邾邾小國也交鄰睦事覇謹君臣多賢庶幾守禮義者故能介數大國之間與春秋始終迄戰國而未亡小邾小邾亦曹姓之國介在海濵畏齊事魯而偪於宋乃能以禮通諸侯與春秋始終焉叔孫昭子於其賦菁莪有曰不有禮國其能乆乎鄫鄫微乎微者也立所出以為後春秋書曰莒人滅鄫紀紀齊同姓紀為齊弱而挾魯鄭以戰齊三邑既遷于紀季入齊紀侯去國矣微國微國如魯入極鄭取戴齊人降鄣之類聚以紀之以見周禮之衰夷國世紀楚楚在春秋始曰荆繼曰楚始曰人繼曰子盖當時夷狄之為中國患未有若楚人之暴且乆有方城以為城有漢水以為池有申吕之田以禦外有申息之門以備内有成莊其平康昭為之君有子文孫叔子庚子木子蕩為之臣所能世抗齊晉與春秋始終至靈康以後雖専令諸侯䘮敗相尋矣然春秋書法之嚴則又以其私竊名號而夷之爾吳吳姬姓之長春秋以其假竊名號而夷之其始也晉方患楚未暇憂吳其後吳甚有意於駕晉又其後吳所争不在晉而在楚又其最後楚亦不能強而吳之所患者在越矣秦秦自穆公以貪伐䘮為殽之戰遂有彭衙之戰令狐之戰河曲之戰暴兩國之衆興數十年報復之師更四君而未已秦之為狄其始於殽之戰歟越越少康之後入春秋百九十餘年始見經常不過以國稱僻陋甚矣獨句踐與吳之事可以勵臣子之節盖越自楚靈之強嘗從之伐吳而闔廬之立遂因以仇越是以夫差敗於檇李而懐必報之忿及句踐困於夫椒而遂成不釋之讎仇吳之念隐於柔服之初豢吳之計蓄於卧薪嘗膽之時而沼吳之志卒逞於生聚教訓之後二十年間所欲盡從興事造業者可以略觀之矣戎戎之類有六曰山戎北戎姜戎雒戎茅戎陸渾之戎東遷以來恣㫿莫甚齊威大振治戎之旅而戎始戢及晉恵之反誘戎遷於伊晉襄之覇挾戎戰於殽其勢不得不至於陸梁異時徐吾之役既平茅戎於周而復敗王師是齊有攘戎之功晉有致戎之罪狄狄比戎患尤甚春秋書狄者三十六有長狄赤狄白狄而潞氏甲氏留吁又赤狄之種惟獨名者最強齊威畢力治楚置狄不問無損覇業之盛晉自景公諸侯盡離而閉南闗以北尋治狄之忿雖剪除之功居多捨内事外覇業衰矣夷夷之微國如介如徐如舒如庸莊僖以後累累而書巴以人稱甲潞以氏稱鮮虞廧咎如以號稱皆聖人預為中國慮齊威之覇能帖荆於召陵而不能止江黄之伐晉文之覇能致秦敗楚於城濮而不能保鄀六之不亡小國尚安所恃而不奔走於夷狄故崇屬於秦郯屬於吳沈徐胡頓屬於楚勢不免焉爾春秋臣傳因蜀人王常元編而以所見為評魯臧氏盛哉臧氏之代不乏人也僖伯諌觀魚哀伯諌取郜鼎至臧孫辰復能以言立後之卿大夫皆宗之方東門襄仲之子歸父欲去三桓季孫行父欲追怨迨其後獨臧宣能斥以後之人何罪皆可謂賢也已臧武仲以智稱乃阿季武子之私廢長立庶卒見惡孟氏而奔齊臧氏遂衰豈所惡於智者為其鑿之類耶季孫魯桓公生莊公復生慶父叔牙季友莊公薨叔牙欲立慶父季友殺叔牙而立閔公及慶父弑閔公季友復殺慶父而立僖公季友雖於次最㓜而殺二兄立二君勢最強叔牙之後為叔孫氏慶父之後為孟氏與季氏為三桓而季孫遂為稱首季孫行父相二君妾不衣帛馬不食粟最號賢者然強私家弱公室小廉適足為濟私之具東門歸父謀去三桓及宣公之死行父宣言於朝欲修怨焉曽謂賢者而有是乎莒僕弑逆以寳來奔公命與之邑曰今日必授行父命出諸境曰今日必逹公固失之矣然行父人臣盍以逆順造諸君以君命出諸境乃可耳君命而已反之何其自専且自謂有舜大功二十之一亦豈臣子之所宜言乎一傳而季武子遂四分公室而専其二再傳而平子遂逐其君使死於乾侯習於惡既熟不復知惡之為惡而勢亦駸駸難返矣故至季桓子之世雖以夫子子路不能盡堕三都桓子生不用孔子而死囑康子康子舍孔子而召冉子是皆習於惡之既熟膠於勢之難返雖有良心亦陽為空言而止爾叔孫莊公薨無適嗣叔孫欲以次立其兄慶父不果為弟季友為酖莊叔嗣封傳子穆叔視三桓子孫為最賢季氏三分公室穆叔獨不可固請而後盟之猶使其乘之人獨盡為臣季氏瀆盟伐莒穆叔使晉被執臨危守節不以貨免既歸出見季氏指楹曰雖惡是其可去乎是亦異於季孟之心矣雖以妖夢溺於竪此二子殱焉此私門之禍不足以掩其公室之義昭子以庶獲繼不以竪牛立己為勞而殺之日食不伐鼓知季平子有異志平子出昭公昭子實從于齊謀納公不果而祈死其志為可哀亦足匹穆叔之賢矣叔孫雖不賢子路之謀堕三都也尚能順之堕郈孟孫慶父以逆誅公孫敖以滛逐而子孫乃多賢敖之二子文伯恵叔兄弟相及其奔於莒己氏所生之二子亦恥以惡聲聞文伯之子蔑是為孟獻子孔子稱其加人一等孟子稱其有友五人其後僖子亦恥不閑於禮聞正考甫鼎銘而囑懿子學禮於孔子斯皆可謂賢矣然郈氏伐季氏而共執郈昭伯殺之使季氏得逐公於齊者正懿子也仲由謀堕三都叔孫氏已堕郈季氏已堕費而孟氏獨不堕成使孔子不得成相魯之功者亦懿子也豈僖子囑使之學禮者特威儀之為禮而已耶端木賜子貢欲免齊伐魯耳乃一出而亂齊破吳強晉覇越率天下而兵其禍豈止壑鄰國哉且田常欲為亂而反教之以孤主制齊可乎謂賜而為之何足為賜謂非賜所為其辨説之辭雖儀秦不之及何物史臣能偽為此是當闕疑子家羈子家覊聞昭公將伐季子之謀而不洩既伐季氏季氏請以五乘亡勸公許之不聼公孫于外子家覊從亡偹嘗艱難公薨于乾侯季氏欲仕之而逃持心堅正義不忘君進退審處動與理合魯之羣臣未有賢於子家覊者也齊管仲商周之初伊吕皆得聖君而輔之而又諸侯皆未強大故有徳易以興其後諸侯争強其勢不歸於并滅不止而生民之禍烈矣管仲起其間先以法制富國強兵為威制張本然後教其君不背曹沫之盟以示信命燕君復納貢於周以示義伐楚不服則責以包茅不貢而楚服鄭伯逃歸不盟則亦却其太子華之䜛而鄭伯請盟力既足以勝然後假仁義以行之故能不以兵革而一匡天下其有功生民豈細哉然自開闢以來功利實自此始後世皆隂用其術而陽諱其名功不及之而禍反滋焉此君子所以不貴倖成之功雖當世賴之而識者譏之歟晉六卿范氏韓氏中行氏趙氏智氏魏氏晉稱六卿雖下陵上替之積子孫至於分晉名教誅之然其初興皆才智有過人者君子取節焉未可盡以下體廢也抑亦以才智而能守正者其范氏之士夑中行氏之荀吳知氏之荀罃趙氏之趙衰趙武魏氏之魏絳乎士蒍教獻公盡殺㳺氏之族又以術驕虢而滅之此小人之才耳士㑹得政晉盗奔秦其才為可知將老而戒其子爕以從二三子惟敬庶知本原者然㑹晉人也在秦即侵晉仁者為之乎惟爕也不矜功不受賂謂外寧必有内憂而不事争強視其時為獨能守正若匄也以愛其子鞅之故盡殺欒氏召亂以覆宗雖才何稱焉此范氏惟爕為可稱也荀林父將伐晉伐齊而皆取其賂先縠違節制敗於楚僅以滅潞為功抑末矣如庚如偃才皆碌碌惟吳也不受鼓之叛者鼔力竭而後取鼓再叛猶予之田而使其忠臣相之視其時亦為守正至寅即與范吉射攻趙氏而覆宗矣此中行氏惟吳為可稱也知氏之有荀罃迎立悼公修政施徳再避楚師兩聼鄭平皆不責人而求之已功烈於晉為中興而未嘗有一毫茍以成之之意非守正而能爾乎趙衰審所可從而獨從重耳視荀息里克等溝瀆愚見天壤不侔勤王定覇未嘗不告君以正趙武承其餘烈幾漸復興薄幣諸侯歸邑齊魯以信自將不虞楚之詐厥功茂焉趙簡子殺趙午納陽虎慙徳非少獨以受周舍之直諌晉人懐之子孫勃興殆亦趙衰趙武之遺休爾魏犫尚力不足以訓而絳事悼公戮公弟楊干之僕遭值明主超將新軍三駕而諸侯平九合諸侯而尚勉君以思其終殆皆於其正焉基之此趙之趙欒趙武魏之魏絳皆可以守正稱也若魏舒舉十縣大夫謂非賢於人不可也然滅公族而縣之舒實預焉縣大夫得人正其植私之計左氏以為孔子賢之吾斯之未能信韓氏之可稱者韓宣子也然反戚田於衞致閻田於周正矣易縣於宋求玉於鄭何不能推其類乎善乎蜀人王當之言曰豈禮義可為於顯而弃於幽耶否則國可弱而家不可以強也狐偃諸臣附狐偃重耳外祖而傅申生驪姬之難教申生逃不果卒杜門不仕其子舅犯從重耳於秦偃雖死不敢教之貳犯遂佐晉安天下功光前人其積有自來矣狐夜姑乃不量己怨陽處父之易其位擅殺以逃復返於狄豈夷之不可華也哉荀息從君於惡強立非所當立之奚齊卓子皆陷之死里克傅當立之申生顧受驪姬之間持兩可不救迨禍成事極奚齊卓子已立為君乃犯大不韙以殺之之二人者之死曽自經溝瀆者不若也好忠而不好學其弊乃爾亦可悲矣慶成一諌恵公之背秦而不聼卒誤其君而陷之敗此凶人耳瑕吕飴甥辨於秦以歸恵公其辭粲然足全國體於晉亦有一時之功冀芮教夷吾賂秦求入視舅犯之教重耳天淵不足以喻髙卑矣文公既立尚執迷不悟而謀作亂宜一絶矣冀缺乃以敬得嗣興執晉國柄郤克不忍一婦人之笑而伐齊修怨郤至本無大過反以才辨自務與錡犫同稱三惡竟覆其宗禍福無不自己豈繫其世也哉先軫以晩出之英超將中軍城濮之戰䇿勲第一乃以忠憤不顧而唾卒於自討識者悲之使其幸遇明君豈至是哉伯宗事君以忠用兵以義卒為三郤所害豈亦不能善用其剛者歟州犂奔楚曲為逆圍之謀忝厥父矣司馬女齊不瘠魯肥杞而能勸晉逰楚言必本理叔向所相與始焉終焉者可謂賢矣祈奚外舉不避讎内舉不避親至公一忱可詔千載士伯瑕多知天道其子彌牟常勸王而責宋之不共亦足名家陽處父輕易夜姑之位而見殺幾於自取苖賁皇雖有功於晉終不免楚人狙詐之習此無足云惟叔向淹博多文能以禮信為國超然一時乃違母命以女禍覆宗悲夫介推有功名之士有澹泊之士介推雖從亡特澹泊而沽激之人耳出無共濟艱難之謀甫入而文公遭變禄未暇及推即憤怨而去雖推不去亦豈若趙衰舅犯輩能佐其君以興晉哉推反譏二三子為貪天功過矣宋公子目夷向戍樂喜華元公子目夷不受襄公之讓國賢以襄公失徳而屢諌不足以遏之其所能者在己其所不能者在人目夷亦柰何哉向戍辭偪陽之邑以歸諸公乃自詭弭兵而求公賞邑為善不根於實心有時而必敗耳樂喜責向戍之弭兵謂無威則驕亂生則滅凛然憂國之盛心雖一介夫之死猶哭之哀良以不貪為寳力辭獻玉其心純乎公故也華元殺楚使而致兵未為善量勢者蕩澤之亂國頼以安衛石碏祁子孔逹悝孫良夫林父寗莊子武子殖喜北宫文子蘧伯玉石碏大義滅親此不幸處人道之變非所忍言石祁子執親䘮不忍以嗣位故佩玉卜兆是不足以見人心本然之天乎孔逹不量強弱挑晉取禍自經溝瀆曰利社稷恐善謀國者不為也孔悝以舅甥之親出輙而立蒯聵自衛而言父子之名雖順自悝而言君臣之分則乖夫亦當感輙以人心天理之正不可則去之耳孫良夫違衆犯齊既敗則又依晉以敗齊専而生事國何頼焉其子林父逐其君獻公以戚叛歸晉晉反為臣而執其君何哉其為盟主也寗莊子扶立文公衛以再造寗武子輔成公雖再出而不至失國調護於艱危之中庶幾世濟忠力者柰何寗殖既逐獻公寗喜欲納獻公反弑殤公為惡滋甚善惡固不繋其世耶北宫文子善覘人之國蘧伯玉於獻公之去國復國也皆避而不與善處亂世殆東漢郭有道之徒歟然有道未嘗居其位鄭七穆穆公之子十一人子然士子孔先卒子孔専而見殺子羽不為卿存而顯者稱七穆子罕子駟子良子國子㳺子卭子豐是也然多骨肉相殘惟子國之子子産賢又惟子罕之孫子皮知其賢而授之政子産没後賢而有禮者子太叔吳季札季札生蠻夷中以禮義智識聞天下聞樂而知古人之治亂歴聘而知列國之興衰燭照龜卜莫喻其明矣然吳至其父夀夢始大夀夢賢而欲立之不可其兄諸樊讓之不可其兄餘祭餘昩以次相傳必欲致位於季又不可餘昩之子王僚嗣立而諸樊之子闔閭弑之曰致季可也否則我當立吳之暴亂遂自此始楚令尹子文孫叔敖沈諸梁楚介在逺夷而雄於中國夫豈偶然之故哉令尹子文為相四十年家無一日之積孫叔敖身已貴而意益下位已髙而心益㳟國有人焉若此國欲無興得乎沈諸梁當白公勝之亂國人望之如父母一舉而定之功成不居亦賢矣哉秦孟明百里奚蹇叔孟明不知鄭之不當襲又師出而輕雖王孫滿尚㓜猶知其必敗雖再敗之餘鼔勇焚舟不過晉不與争而已豈嘗有功於秦者哉秦之能覇穆公之賢而秦固強耳世乃以其焚舟之勇傳誦為美談不知秦晉報復暴兵千里更四君而不休皆孟明啓之外誤其君内違其父不才孰甚耶其父百里奚間闗險阻浮沉亂世一為穆公所禮致即薦蹇叔二老隨事畧言應輙如響惜穆公用不盡其才而反用其子爾黄氏日抄卷五十三
