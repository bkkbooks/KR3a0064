body:
  text: 黃氏日抄卷四十五宋黃震撰讀諸儒書十二石徂徠文集頌宋頌九首序略云奮為宏休摛為英聲昭為烈光暐暐曄曄如日之華鏗鏗訇訇如雷之行暢於無窮揚於無上江浸海流天髙地厚不有窮盡若我太祖一駕而下潞再矢而定揚三揖而納荆潭四指而收蜀廣五征而平江南太宗南致淮海數十州之地北縳并元四十五年之㓂眞宗暫臨澶淵匈奴䘮威墮膽迨今四十年不敢箠馬而南今皇帝明道之初獨臨軒墀神謀睿斷如雷之動六合莫不震焉發施號令如風之行萬民莫不見焉登任哲乂翦鋤姦惡天清地明日燭月霽乃作為宋頌九篇皇祖太祖殺李筠滅李重進也湯湯取孟昶也莫醜取廣州也金陵取李煜也聖文吳越歸也六合雷聲太宗取劉繼元也聖武戎犯澶淵眞宗親臨六師也明道今皇帝獨臨軒墀聖政赫然日新也慶厯聖德頌序畧云古者一雲氣之祥一草木之異一蹄角之怪一羽毛之瑞當時羣臣猶且濃墨大字金頭鈿軸以稱述頌美時君功德以為無前之休丕天之績如仲淹弼實為不世出之賢求之于古堯則䕫龍舜則稷契周則閎散漢則蕭曹唐則房魏陛下有之諸臣亦皆今天下之人望為宰相諫官者陛下盡用之此比雲氣草木蹄角羽毛之異萬萬不侔豈可飜無歌詩雅頌以播吾君之休聲烈光神功聖德刻于琬琰流於金石告於天地奏于宗廟存于千萬年而無窮盡哉頌畧云大聲渢渢震摇六合如乾之動如雷之發惟仲淹弼一䕫一契衆賢之進如茅斯㧞大姦之去如距斯脫皇帝一舉羣臣懾焉諸侯畏焉四夷服焉臣願陛下壽萬千年古詩嘉陵江泛舟孤棹已夷猶數峰更清尚危影倒波底凝嵐浮水上逺與城市絶深將泉石向水鳥忽東西溪雲時下上三豪詩以曼卿永叔期杜黙師雄師䧺二十二筆距獰如鷹才格自天來詞華非學能贈張績禹功先叙唐文人云卒能覇斯文昌黎韓夫闕軻揚雄臯陶伊尹不修乎德與行特屑屑然致意於數寸枯竹半握秃毫間將以取髙乎又何其淺也且夫書乃六藝之一耳善如鍾王妙如虞柳在人君左右供奉圖寫而已近乎執伎以事上者與夫臯陶前而伯禹後周公左而召公右謨明弼諧坐而論道者豈不逺哉愚按歐陽公乃徂徠同年進士後誌其墓蓋知徂徠之深者上范青州書為其父赴脂胊縣令而作又上徐州張刑部書及上徐州扈諫議書亦皆為其父作縣而發若今世公書者子為父謀言詞切至亦工於求人者矣與祖擇之書薦孫明復也云自周以上觀之聖人之窮者唯孔子自周以下觀之賢人之窮者唯泰山明復先生與狀元君貺書嘱其救文弊上孫先生書云辱惠長謌褒借過實且曰攘臂欲操萬丈戈力與熈道攻浮譌此得介之心與范奉禮書闢其天自天人自人無感應之説上韓經畧書謂有非常之事然後有非常之人有非常之人然後有非常之功今元昊猖狂亦非常也民所瞻仰也山林川谷丘陵民所取財用也非此族也不在祀典而老觀佛寺徧滿天下可恠也恠説中畧云楊億窮妍極能綴風月弄花草滛巧侈麗浮慕纂組刓鎪聖人之經破碎聖人之言離析聖人之意蠧傷聖人之道其為怪大矣妖説下畧云堯舜禹湯文王武王周孔之道萬世常行不可易之道也佛老以妖妄恠誕之教壊亂之楊億以滛巧浮偽之言破碎之愚按徂徠先生學正識卓闢邪説衛正道上繼韓子以逹於孟子眞百世之師也楊億不過文詞浮靡其害本不至與佛老等而亦闢之峻如此盖宋興八十年浮靡之習方開闢所恠也恠所作也使先生生乎今之世見託儒者之名進佛老之説者闢之又當如何哉亂原謂夷王下堂亂是以作宣公税畆亂是以作秦開阡陌亂是以作秦襄王太后臨軒亂是以作秦始皇罷封建置郡縣亂是以作秦漢美人之號凡四十等亂是以作漢武帝數宴後宫奏請多以宦官主之亂是以作不反其始其亂不止明禁謂國家之禁疎宻不得中山澤江海皆有禁鹽闕董史筆在漢武朝為東方朔㦸在成帝朝為朱雲劔在東漢為張綱輪在唐為韓愈論佛骨表逐鱷魚文為叚太尉擊朱泚笏今為公擊蛇笏噫天地鍾純綱至正之氣在公之笏豈徒斃一蛇而已軒陛之下有㒺上欺民先意順㫖者曰公以此笏指之廟堂之上有蔽賢蒙惡違法亂紀者曰公以此笏麾之朝廷之内有諛容佞色附邪背正者曰公以此笏擊之則笏之功也豈止在一蛇畫箴貽君豫畧云吾家君豫才敏而少學為丹青形物微妙吁與其丹青木草豈若丹青乃身􅂱有文藻與其丹青馬牛豈若丹青爾德倬為騫由汝聽吾言馨如芝蘭擲膠折筆無汚輕紈尊韓畧云孔子為聖人之至吏部為賢人之卓孔子之易春秋自聖人來未有也吏部原道原人原毁行難禹問佛骨表諍臣論自諸子以來未有也嗚呼至矣蠧書魚辭蠧書魚曰夫書豈吾之蠧耶云云聲律對偶之言斯文其蠧也愚意此亦為楊億發歸魯名張生宗儒名孟生二生皆脱道士服故名貴謀云䘮身敗家亡國傾天下由聖賢之謀不用救説謂道大壊由一人存之天下國家大亂由一人扶之古言大厦將顚非一木所支是弃道而忘天下國家也顚而不支坐而視其顚斯亦為不智者矣曰見可而進量力而動其全身茍生者歟責素飱狗當吾户猫捕吾䑕雞知天時有功於人食人之食可矣彼素飱尸祿者將狗猫雞之不若乎辨惑天地間必然無者有三無神仙無黃金術無佛大凡窮天下而奉之者一人也莫貴於一人天地兩間茍所有者索之莫不獲也秦始皇求為仙漢武帝求為黃金蕭武帝求為佛勤亦至矣而秦始皇逺遊死蕭武帝餓死漢武帝鑄黃金不成吾知必無神仙也必無佛也必無黃金術也明隱謂孫明復先生四舉進士不得乃退居泰山聚徒著書蓋有待也古之賢人有隱者皆避亂世而隱者也彼所謂隱者有匹夫之志守硜硜之節者之所為也聖人之所不與也先生非隱者也賢李謂李相國廸能妻孫先生以女兵制謂國家之制失在兵驕自太祖太宗亟用兵故賞賚厚天下既平兵革不用或老臥京師或飽食塞上或逸處郡邑或散居亭鄣未嘗荷一戈也而賞賚不削於太祖太宗亟用兵時且有加焉於是日益驕而不可少下兹非兵之罪也失在謀國家者也記永康軍老人説劉公隨祥符中為永康軍判官奪還先聖廟侵地止灌口祠滛祀導山泉入永康城闢西山峻路數事趙延嗣傳趙延嗣者趙鄰幾舎人僕也舎人死遺三孤女一老乳母無一區宅一㕓田延嗣為營衣食之資身為負擔不避寒暑數十年如一日三孤女自幼至長延嗣終不識其面既長延嗣西走京師見宋翰林白楊侍郎徽之發聲哭哭止具道趙氏之孤且言長將嫁二公驚媿為迎入京師相與求良士為婿三女皆歸延嗣始去趙氏門延嗣可謂僕名而儒行者矣吁僕名儒行見之延嗣夫儒名而僕行者或有其人焉得不愧於延嗣哉漢論三篇論漢不能盡循周之道皆曹參陸賈叔孫通之罪中國論闢佛老也云有巨人名曰佛自西來入我中國有龎眉名曰聃自胡來入我中國然愚按自西方來者佛之徒非佛之身為巨人者也佛亦人耳曰巨人者其徒之誕非果巨人也老氏於傳則自中國西入胡今云自胡入中國亦未知何據也其治之之法欲四夷近四夷中國處中國亦未知其可行否也季札論以季札比伯夷恐太過伊吕論謂伊吕功同其心則異伊有存夏之心吕無存商之心憂勤非損壽論辨鄭康成注文王世子云文王以憂勤損壽之説非且文王享年九十有七豈為損壽乎夫憂勤天下者聖人之心也安樂一身者匹夫之情也後世人君皆耽於逸樂壽命不長康成之罪也牛僧孺論謂唐文宗問天下何由太平僧孺自謂小康面欺其君且怨其責成旬日三上章求退其悖亦甚王爵論謂三代天子稱王自周衰諸侯稱王漢因封子弟為王於是僣奪之心生隂德論畧云天地之治曰禍福君之治曰刑賞皆隨其善惡而散布之夫人不逹天地君之治硜硜焉守小慈蹈小仁不肯去一奸人刑一有罪皆曰存隂德其大㫖謂不殺一人不傷一物則天地神明之所佑也且天地能覆載而不能明示禍福於人樹之以君修其刑賞人君能刑賞而不能親行黜陟於下任之以臣收其威權違天地君而曰存隂德禍斯及矣水旱責三公論謂責三公則君怠責君則相怠若時水旱君則罪已三公則免書上范中丞書慶仁宗用賢勉其與丞相李公竭王佐之才罄忠臣之節上趙先生書謂昌黎述作有三代制度兩漢遺風今之為文不過句讀妍巧對偶的當而已非今之人盡不賢於唐之人盡不能為唐之文也蓋其弊自於朝廷敦好時俗習尚漬染積漸非一朝一夕也上蔡副樞書薦鄆州鄉貢進士士建中之文言文之所自始甚宏濶可觀上孔中丞書云有某官為某官時忠鯁讜直聳動朝野不四五年取顯仕今為某官位彌髙身彌貴朝廷有闕政不復言則向之忠鯁讜直乃沽名以為速進之媒乎愚謂向非沽名後滛於富貴耳人若不自覺此情於將軍黃金橫帶事可驗此士大夫得志於當世者常常當痛省上范思逺書亦盛揚士建中謂天下之賢上劉工部書斥其以佛為聖人上杜副樞書薦泰山孫先生上李雜端書謂日月天之目御史天子之目與士建中書謂方今滛文繁聲放於天下佛老妖恠誕妄之教肆行於天地間周公孔子之道危若綴旒之㡬絶先生不救吾徒豈得而安居乎與張洞進士書謂明逺纔三十二嵗已能斬稂莠而搴菁英出紅塵而磨蒼蒼上王沂公書責其避嫌不用鄉人趙師民畧云合天下之公也雖其親昵人不謂之私用一人之私也雖其踈逺人不謂之公師民五十嵗矣有萬卷書腐於腹中若非相公洪鑪鉅鎚莫能成就上王狀元書乞助改葬石氏七十䘮云昔郭代公為太學生家信至寄錢四十萬為學粮有縗服呌門云五代未葬代公即命以車一時載去畧無留者亦不問姓氏代公其年絶粮不能成舉柳河東布衣時坐酒肆中有書生在其側言貧無以葬柳即搜於其家得白金百餘兩錢數萬遺之故代公富貴功業光隆於唐河東文章聲名照映本朝上孫少傅書云生幸而値如孔子孟軻者同其時居幸而遭如孔子孟軻者同其里則是坐遇孔孟親見聖賢不隔數千百年得其人而師之不走萬數千里獲其師而學之也凡皆歸慕孫公之説如此答歐陽永叔書畧云書中且曰頻見僕所為文僕文字實不足動人然僕之心能專正道不敢跬歩叛去聖人其文則無悖理害教者斯亦鄙夫硜硜然有一節之長也書中又言僕書字恠且異古亦無今亦無為天下非之此誠僕之病也此為之不能也然永叔謂我特異於人似不知我也僕誠亦有負異於衆者則非永叔之所謂也今天下為佛老其徒嚚嚚乎聲附合響應僕獨挺然自持吾聖人之道今天下為楊億其衆嘵嘵乎口一倡百和僕獨確然自守吾聖人之經兹是僕有異乎衆者然亦非特為取髙於人道適當然也茍必欲取髙於人古之聖人莫如周公孔子古之大儒莫如孟軻揚雄古之賢聖莫如臯陶伊尹天下之所尊莫如德天下之所貴者莫如行今不學乎周公孔子孟軻闕入者娶仇而貶也書夫人氏之䘮至自齊者殺子而貶也書逆婦姜於齊者夫人之位不明也書遂以夫人婦姜氏至自齊者譏䘮娶也書僑以夫人婦姜氏至自齊者刺不親迎也謹政謂以諸侯而主天下盟㑹之政由莊十三年北杏之㑹始以大夫而主盟㑹之政由文七年扈之盟始後序云其於褒為仁為惠為澤於天時為春其於貶為義為誅為戮於天時為秋故謂之春秋賢惠録覊游四方錄婦人女子賢取其介潔惠取其聰敏徐鉉母貧無宿儲中庭地䧟見金銀一缶遽令覆之祝曰天其或者憫我之貧願二子有位請奉給養不願金銀也二子鉉鍇後皆至逹官郭氏酸棗人割股肉愈姑之疾君子曰割股之孝非聖人之説李唐明州俚人陳藏噐撰本草拾遺言人肉可治羸疾是後孝子多行之郭氏能行於姑難矣哉趙定母金陵人多通詩書常聚生徒數十人張帷講説儒碩登門質疑必引與之坐開發奥義咸出意表景德二年子定登第授海陵從事訓曰無飾虛以沽名無事佞以奉上處内在盡禮居外在活民定遵奉無失李氏揚州人夫以貿易為事常戒其夫曰無易良雜苦取不義之富快一時之意撫其子曰宜以此為心無令流餘殃也劉工部妻陳氏世居袁州新淦嫁劉式俸薄家貧陳氏曰但奉清白吾身執㸑毋為身累也夫死聚書千餘卷示諸子曰此汝父嘗謂此為墨莊今貽汝曹為植學之具不數年立言立之立德立禮相繼登進士科岑頔母盧氏江寧人酷好篇什教子頔以詩書淳化三年登進士第曹修古女建安人修古博學以直氣聞明道初言事觸罪自御史知雜降工部員外郎知興化軍卒妻孥窮空無以歸吏民思之稡錢三十萬拜酹堂下家人未及言女哭曰我先君處朝為聞人以清節自立不幸天不與年終于貶所今臨財茍得尚何面目哭泣幃中幸持歸無為先君累也吏民聞之慚罷孝行録余為旅人者三十年聞孝子之事必錄之蓋倣歐陽詹南陽孝子傳之類也上助史官採摭下勸逺近風俗易延慶筠州上髙人父䘮棄官廬墓旦出守墳暮歸侍母開寳四年二月丙子墓西北産紫芝一本至九年春三月丁亥復有玉芝十八莖生墓側延慶後以慶恩出知端州子綸大中祥符元年及第陳宗道江隂軍村人以孝悌聞買物不酬價隨言予之人未嘗多取之服其德也郭琮台州黃岩人絶飲酒茹葷者三十年以祈母之壽母年一百四嵗旌表門閭顧忻泰州泰興縣人以母多病葷辛不入口者十載鷄初鳴具冠帶率妻子問所欲如此五十年未嘗一日或改朱虎殘湖州武康縣人家貧事母孝一日入山虎負之去因厲聲曰虎為暴食我所恨母無託爾天道可無祐乎虎忽弃之於地而走如有疾驅之者許愈宣城人家世儒學父養髙不仕愈事父以孝謹聞供給甘㫖晝夜不怠父之所欲雖千里必致之或隨計偕安輿扶侍與妻子共食麤糲晨夕事父必盡珍異父年垂八十謂曰視汝登科足矣祥符七年果登進士第成象渠州流江縣人母疾割股肉食之母卒廬墓一日三時培土虎豹環其廬而臥象無懼色商人張氏居越州郭内余與同過姑蘇盤有鮦羮不食吳人謂之黒鯉魚問之曰適禹祠逢事鬼者言食鮦與鼈當祭之日祖先不能享懼其猒氣也聆其言遂絶口妻子亦不許食之王礪南京人䇿名起家歴典八郡為性至孝五子登科二十孫自狀元堯臣而下及第務學者相繼論語説無友不如己者友者輔人之仁不可以非其人故仲尼嘗曰吾死商也日進賜也日退商好與勝己者處賜好與不如己者處也子路惟恐有聞非止聞夫子之道凢聞人之善言善行皆如是愚魯辟喭命者禀之於天性者命之在我在我者修之禀於天者順之愚魯辟喭皆道其所短而使修之者也臧文仲竊位公叔文子與大夫僎同升諸公孔子曰可以為文臧文仲知柳下惠之賢而不舉孔子謂之竊位由此觀之君子以薦賢為己任子貢言夫子不可及子貢之言甚而言之也孔子固學於人而後為孔子愚按子貢闢毁孔子者故極言之安定恐後學待孔子太髙而自絶於不可學故又為之説如此孔子稱冉求可使為宰又鄙為小子冉求有為政之材故曰可使為宰及其聚斂不合正道故曰小子鳴鼓而攻之可也如美管仲之功則曰如其仁如其仁至於鄙管仲之僣則曰管氏而知禮孰不知禮有德者必有言有言者不必有德古之取人以德不取其有言言與德兩得之今之人兩失之孔子見互鄉童子取以一時之能而不責以平生之行墓誌石待舉字寳臣新昌人曾祖祖皆仕錢氏父渥有賢行君幼而竒俊灑落天聖五年登進士第慶厯四年通判保州有武臣韋貴者本侯家奴以主恩得官至保州管雲翼軍激變石君死之子衍之世祿延之東之皆進士將仕郎湖州長史李君諱軻四預鄉舉慶厯六年釋褐授湖州長史銘歎其仕晚位卑先生胡氏名瑗字翼之泰州人累舉不第景祐中以白衣召論樂仕至太子中允為天章閣侍講嘉祐元年卒年六十七葬湖州何山先生寳元初始以一命主學東南訓誨諸生過於父兄之訓子弟諸生有善若己有之諸生有過若已蹈之東南之人知以經行為先道德為本實先生始之也皇祐初來主太學四方之士趨之唯恐其後其説謂古者先王養而後任後世任而不養况自孔孟殁師道不振故憤然獨立不顧毁譽勤勞三十年以教育天下之才為己任其學以體用為先在湖學有經義齋治事齋治事者人各治一事如邊防水利之類其在太學有好尚經術者好談兵戰者好文藝者好節義者使各以類羣居講習其從游前後二千人其髙弟則錢藻之孫覺范純仁錢公輔顧臨吳孜徐積滕甫其著書則有易書中庸義洪範義景祐樂議紹興九年錢塘闗注又録先生言行二帙師道之廢正學之不明久矣宋興八十年安定胡先生泰山孫先生徂徠石先生始以其學教授而安定之徒最盛繼而伊洛之學興矣故本朝理學雖至伊洛而精實自三先生而始故晦菴有伊川不敢忘三先生之語震既讀伊洛書抄其要繼及其流之或同或異而終之以徂徠安定篤實之學以推發源之自以示歸根復命之意使為吾子孫毋蹈或者末流談虚之失而反之篤行之實泰山書世少其傳其畧見徂徠作泰山書院記云黄氏日抄卷四十五
