body:
  text: 黃氏日抄卷八宋黃震撰讀春秋二莊公名同桓公子母文姜諡法勝敵克亂曰莊元年春王正月先儒多謂君弒子不書即位愚恐國亂不行即位之禮耳父見殺於齊母預殺而留齊未返即位何忍故左氏曰不書即位文姜出故也三月夫人孫于齊孫亦作遜奔也諱之曰孫孫遁也以預弒君故奔左氏謂不稱姜氏絶之也然明年仍書姜氏此恐承上文省之耳夏單伯送王姬秋築王姬之館于外單音善單伯周大夫也王將嫁女于齊命魯為主然君方見弒於齊故築館于外穀梁曰仇讎之人非所以接昏姻也衰麻之服非所以接辨冕也孫氏曰不若辭而勿主單伯公穀皆以為魯大夫送公穀皆作逆諸家多從之岷隱曰魯無單伯其為周之卿明矣然諸家既多從公穀似難質言也冬十月乙亥陳侯林卒莊公也立七年嘗兩㑹諸侯伐鄭納突既卒而宣公杵臼立王使榮叔來錫桓公命穀梁曰禮有受命無來錫命止齊曰桓篡立終其身不請命而追錫命故王不書天孫氏曰不書天者脫之愚謂孫說是也豈有貶天王之理王姬歸于齊魯主之故書齊師遷紀郱鄑郚郱普丁反鄑子斯反郚音吾杜氏注齊欲滅紀故徙其三邑之民而取其地二年春王二月葬陳莊公㑹之故書夏公子慶父帥師伐於餘丘慶父莊公庶兄也莊公時年十五於餘丘邾邑也胡氏曰莊公幼年即位慶父首主兵卒致子般之禍許氏曰堂堂之讎國弗圖而伐於餘丘木訥曰孟氏之孽基於此秋七月齊王姬卒公羊曰曷為録我主之也檀弓曰莊公為之大功此則知有齊而不知有父矣冬十有二月夫人姜氏會齊侯于禚諸若切左氏曰書姦也禚齊地公羊作郜乙酉宋公馮卒馮皮冰反莊公也立十九年卒而閔公捷立馮得位於弒君之華督黨鄭突以傾忽責突賂而伐鄭魯桓凡六請平而不許蓋亂而貪者也三年春王正月溺㑹齊師伐衛溺魯公子衛侯朔在齊會齊伐衛謀納朔也朔不正之種得罪於王豈宜納之榖梁曰惡其㑹仇讎伐同姓夏四月葬宋莊公五月乃葬子捷繼立而葬之也五月葬桓王左氏曰緩也蓋七年矣周之事勢可想秋紀季以酅入于齊酅户圭反季紀侯弟也酅紀邑也自齊遷其三邑紀已不可為國紀侯將去其國先使弟季以酅入齊為附庸以存宗祀知必不得免擇禍而取其輕寧身無國無寧前人無祀也春秋蓋悲其意而書之冬公次于滑公將救紀而鄭辭難故次于滑而止滑鄭地公穀作郎四年春王二月夫人姜氏享齊侯于祝丘杜氏曰享食也兩君相見之禮非夫人所用或曰享必于廟此亦為之名耳岷隱曰甚矣文姜之惡也始焉孫于齊猶有所愧中焉會齊侯已無所懼今焉享齊侯于祝丘其無忌憚也甚矣祝丘魯地三月紀伯姬卒泰山孫氏曰紀伯姬隱二年紀裂繻所逆內女也書其卒為紀侯大去其國而齊侯葬紀伯姬起夏齊侯陳侯鄭伯遇于垂紀侯大去其國岷隱曰齊欲滅紀幾二十年至是與陳侯鄭伯遇于垂意將以入紀也紀侯度不能自全故一旦大去其國大去者棄其國之所有盡室而逃焉按左氏謂紀侯不能下齊分國與季使入齊而後大去其國故先儒多謂存祀故不書滅公羊乃謂此為齊能復九世之讎昔哀公烹乎周紀侯譖之也然譖非手刃之也何名讎况九世乎齊侯未嘗有是心春秋未嘗有是言凡言春秋復九世之讎者誤也傳有之敵惠敵怨不在後嗣齊襄公殺魯桓公桓襄死而莊公與齊桓盟春秋已不非之易世故也况九世而言語無跡不可名讎者乎誤漢武之虛耗天下者此語也六月乙丑齊侯葬紀伯姬陸氏微㫖曰齊人并人之國而禮葬其妻是豺狼之行而為婦人之仁也秋七月冬公及齊人狩于禚諸若反王氏曰始與讎接也禚公穀並作郜五年春王正月夏夫人姜氏如齊師岷隱曰齊侯出師在外姜氏往會之故書曰如齊師婦人在兵間施面目於三軍中豈容以人道責哉木訥曰前日會于禚享于祝丘猶曰託會享之禮也今三軍之衆而掩然無忸怩之心無恥極矣秋郳犂來來朝郳微國或曰附庸犂來其名書朝能以朝禮見也其後卒能從齊桓尊周室王命為小邾子郳公羊作倪犂公穀皆作黎冬公會齊人宋人陳人蔡人伐衛伐衛所立之黔牟以納惠公朔也天子惡朔不使朔後衛明年春王人子突救衛則諸侯之納逆矣六年春王正月王人子突救衛夏六月衛侯朔入于衛秋公至自伐衛安定曰諸侯伐衛以納朔天子不克救朔卒為諸侯所納天子威命盡矣先師謂猶愈乎不救書王人子突之救以王法尚行於此也勢既已去烏能必勝哉正月公羊作三月螟書災冬齊人來歸衛俘齊人主兵伐衛故分俘獲於諸侯俘三傳皆作寶諸儒多從之胡氏援俘厥寶玉為說合以經文為正然皆不過以俘獲為賂也七年春夫人姜氏會齊侯于防左氏曰齊志也蓋齊入魯之地齊襄之惡尤甚矣夏四月辛卯夜恆星不見夜中星隕如雨恆星常見之星恆星不見左氏謂夜明也星隕如雨奔流如雨之多也岷隱曰天者積氣所為日月星辰麗焉故常與是氣流轉於其間今星隕之多如雨則氣之消散可知春秋書此比他異尤重夜穀梁作昔隕公羊作霣秋大水無麥苗岷隱曰大水者隂氣盛也木訥曰無麥苖說者以麥苗為二物麥且未刈安得復有苗愚謂木訥以麥苗為一物是也謂麥且未刈則非也若春秋之秋果為今之五六月則麥已熟於四月其刈之久矣固不應與稻禾之苗同時為二物然五六月之間苗方向茂又豈可謂麥且未刈安得復有苗耶愚按經文本明白天時無可改之理周雖建子無改夏為秋之事春秋之所謂秋即今日之秋麥種於秋始種為苗秋有大水故無麥苗耳苗凡植物始生曰苗藥亦曰藥苖麥苗即麥之苗也冬夫人姜氏會齊侯于穀岷隱曰春會于防猶魯地也冬會于穀則齊地也一歲再會稔惡已極無知之禍行且及矣八年春王正月師次于郎以俟陳人蔡人甲午治兵夏師及齊師圍郕郕降于齊師秋師還吕氏曰師次于郎以俟陳人蔡人陳人蔡人卒不至故甲午復治兵至夏而後師及齊師圍郕也木訥曰魯之與郕未嘗有一日之憾莊公無故出師而次于郎此何名哉故陳蔡有所不從故郕雖不支寧降於齊而不降於魯夫郕介齊魯之間魯疑與齊伐郕郕將服齊而不服我故先逺求陳蔡及二國不至不得已而求齊齊至則郕固非我有矣岷隱曰兩國之師圍郕郕降齊而不降魯魯人之愧不亦甚乎齊師方鋭魯師已老遷延日久不還何待崔氏曰厯三時而師還春秋所以始終其事而見其惡傳謂師還而君子善之者誤矣治公羊作祠郕作成冬十有一月癸未齊無知弒其君諸兒無知者僖公母弟年之子有寵於僖公禮秩如適襄公絀之連稱管至父戍葵丘請代弗許遂因之作亂九年春齊人殺無知初無知虐雍廪至是遂殺無知書齊人者先儒謂討賊之辭夫人而得討也公及齊大夫盟于蔇其器反謀納公子糾也蔇公穀皆作暨夏公伐齊納子糾齊小白入于齊魯方納子糾小白自莒已先入秋七月丁酉葬齊襄公九月方葬齊亂故也八月庚申及齊師戰于乾時我師敗績乾音干乾時齊地小白已入公不知退以自取敗公羊反謂伐齊為復讎木訥曰為齊主昏矣從齊伐衛矣受齊送俘矣及齊圍郕矣豈今一旦背好而復讎且莊公所納者正讎之子而名復讎可乎愚意惜不能以此師復讎而以納糾爾吕氏曰書我師敗績則凡例謂內不書敗者謬矣九月齊人取子糾殺之岷隱曰言魯人拱手就命齊人取之猶一夫耳木訥謂縱之可也殺之已甚威公但欲絶亂原而不顧冬浚洙洙魯城北水浚之深備齊十年春王正月公敗齊師于長勺上酌反說者謂報乾時之役也然長勺魯地也齊兵先涉吾地魯潛知逆而敗之耳據傳皆曹劌之為然惜其不用於齊襄之世以復父之讎也二月公侵宋長勺之勝蓋亦偶然莊公遂因之侵宋三月宋人遷宿宿微國木訥曰宿宋之附庸介於魯宋魯侵宋宋疑宿之微為魯所逼遂遷其國使內近於宋夏六月齊師宋師次于郎公敗宋師于乘丘乘繩證反魯方敗齊侵宋故齊宋次師于魯之郎次者齊方謀伯念不得魯無以合諸侯故宿師于郎將以絀魯爾魯用公子偃之謀乘宋師不整先敗之齊師乃還秋九月荆敗蔡師于莘以蔡侯獻舞歸荆楚也吞噬中國始此於傳則息媯過蔡蔡侯曰吾姨也止而見之不賓息怒請於楚而伐之舞穀梁作武冬十月齊師滅談談子奔莒桓公之出也過談談不禮歸也諸侯皆賀談又不至故首伐之然伐其失事大之禮可也滅之何耶岷隱曰齊威反國以無禮滅談晉文反國以無禮侵曹伐衛伯者用心類如此況望其以公滅私乎十有一年春王正月夏五月戊寅公敗宋師于鄑鄑魯地也宋報乘丘之役來侵魯乘其未陳再敗之秋宋大水杜曰公使弔之故書魯雖再敗宋而猶不幸其災也冬王姬歸于齊歸齊桓公也書我主之也二王姬皆莊王女其一既歸齊襄其一又歸齊桓姊妹為婦姑非順也十有二年春王三月紀叔姫歸于酅音擕紀侯既大去其國而紀季先以酅入齊宗廟在酅故叔姬歸奉其祀岷隱曰紀侯去其國至今七八年叔姬之隨其去與其所寓皆不可知惟書其歸又書其卒又書其葬勤勤􅈤􅈤若有哀於叔姬者君子是以知叔姬之賢也夏四月秋八月甲午宋萬弒其君捷及其大夫仇牧萬者南宫長萬多力之士也乘丘之敗嘗獲於魯閔公不復敬之及是與閔公搏遂弒之仇牧聞而往萬又批殺之左氏譏仇牧不知警公羊賢其不畏强禦穀梁嘉其衛君諸家或以書宋萬為國氏或以書及為壯其節又或以為纍議論紛紛愚謂聖人不過書其實何有義例若書萬而不書宋則為何國之事既弒其君又殺其大夫不書及則將何以為文弒逆如此尚待義例而後見其罪也哉捷公羊作接冬十月宋萬出奔陳安定曰八月弒君十月出奔臣子不討賊可知按傳桓公立請萬於陳醢之十有三年春齊侯宋人陳人蔡人邾人會于北杏户孟反北杏之會齊威圖霸之始也左氏以為平宋亂或者因之以起事歟衣裳之會十有一北杏實為之首故書爵列於諸侯之上自周東遷諸侯紛紛若鬭獸今而後知尊周室以信義相維矣孔子曰九合諸侯一匡天下民到于今受其賜朱文公曰楚在春秋非威公遏之周室必為其所并夏六月齊人滅遂北杏之會遂人不至齊遂滅而戍之蓋借以恐動諸侯然滅之何甚也此其所以為霸歟秋七月冬公會齊侯盟于柯安定曰公不及北杏之會齊既滅遂公懼其見討故為此盟岷隱曰齊威圖霸其先結宋其次結魯宋魯從而小國皆從之矣故為此盟說者或以為譏魯忘父之讎再通于齊武夷胡氏辨之曰敵惠敵怨不在後嗣今易世矣威公始合諸侯安中國攘夷狄尊天子若修怨怒鄰而危其宗社可謂孝乎故柯之盟公與齊侯皆書爵以為釋憾而平可也公羊載曹子于盟齊為歸汶陽之田謂齊威信於諸侯自柯之盟始木訥趙氏辨之曰經不書歸田況汶陽之田至鞍之戰而後能取此無足據者蓋蘇氏亦嘗謂此春秋之後好事者之說也然公伐齊納公子糾正齊威所讎魯又敗齊于長勺郎之次齊又不得志而還齊宜怨魯者今釋前憾而為是盟宜諸侯之心服謂齊威信於諸侯自柯之盟始其說是也其事非也十有四年春齊人陳人曹人伐宋夏單伯會伐宋左氏曰宋背北杏之盟也齊請師于周故單伯會之取成于宋而還木訥曰宋背北杏之盟齊若釋而不伐宋則諸侯攜矣岷隱曰會以結之伐以威之而後宋之從齊益固挾天子以令諸侯則威公之本謀也單伯周大夫或曰魯大夫未知孰是然左氏見國史若魯大夫也恐不應春伐宋而夏方會伐胡氏曰稱人者將卑師少也齊自管仲得政滅談之後二十年間未嘗遣大夫為主將亦未嘗動大衆出侵伐蓋以節制用兵而賦於民薄矣故能南摧强楚西抑秦晉莫能與之爭也或以為貶齊稱人誤矣秋七月荆入蔡左氏載蔡嘗請楚滅息楚子以息媯歸生堵敖及成王而猶未言楚故伐蔡以悅之泰山孫氏曰荆入蔡齊威猶未能救中國也木訥曰先治內而後治外霸之序也齊威圖霸三年得魯而失宋諸侯蓋未協也而荆又入蔡齊威蓋患之而未有以制也其後凡十二年諸侯協從中國無釁而後伐之亦足見楚之强不可俄而服之而齊威之持重有謀不為不審之計以敗中國也或者於此責威公不能服楚蓋書生之論非燭理者也冬單伯會齊侯宋公衛侯鄭伯于鄄音絹左氏曰蓋衛朔自違王命入國不通諸侯者九年鄭突自遇垂以來不通諸侯者十一年今亦不敢不至矣宋服故也十有五年春齊侯宋公陳侯衛侯鄭伯會于鄄音絹左氏曰齊始霸也木訥曰未也踰年再會于鄄懼諸侯之離也霸當在十六年幽之盟爾夏夫人姜氏如齊石氏曰襄公既死又如齊失禮甚矣許氏曰禮防一弛復起越竟之恣而遂成如莒之姦張氏曰文姜播惡於齊襄之時齊威圖霸絶之義也以欲求魯定霸而不之拒秋宋人齊人邾人伐郳鄭人侵宋郳宋之附庸而叛宋故齊為宋伐郳宋主兵故序宋在齊上鄭以宋舊怨間之故反侵宋是背齊盟也故明年宋齊衛伐鄭鄭突處櫟者二十年一旦得鄭遽興修怨之師猶未知世有伯主也郳公羊作兒冬十月書以備四時十有六年春王正月夏宋人齊人衛人伐鄭鄭嘗侵宋故齊率諸侯為宋伐之而宋主兵許氏曰中國諸侯宋為大既為之服郳又為之報鄭宋自是與齊為一宋親而中國諸侯定矣秋荆伐鄭鄭伯突自櫟入而緩告于楚楚故伐之木訥曰楚將憑陵中國蔡鄭當其衝首罹其害自鄭從幽之盟楚不敢窺鄭者十有餘年齊桓霸之力也冬十有二月會齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽齊始霸也前此未有書同盟者至此始書同盟公羊曰同欲也穀梁曰同尊周也止齊曰舉天下而聽于一邦也春秋諸侯紛爭至此始合一生民之幸孔子稱其功者也說者乃謂天子巡狩諸侯因同盟於方嶽之下今書同盟為僣其亦不量春秋之時之苦而忍於毁者矣又或謂書會而不書公會為魯諱也魯遣大夫也魯背盟也按公羊本書公會崔氏張氏謂當從公羊邾子克卒杜注曰克儀父名稱子者齊桓請王命為諸侯十有七年春齊人執鄭詹鄭既侵宋又不朝齊詹為執政故見執管仲嘗言叔詹為政鄭之良也諸儒皆謂齊之執詹非霸討也然公穀皆曰詹鄭之佞人也穀又曰以其逃來而志之也按下文詹自齊逃魯則公穀之說有證夏齊人殱于遂左氏曰齊滅遂而戍之遂因氏頜氏工婁氏須遂氏饗齊戍醉而殺之張氏曰聖人伸遂人以死復讎之志而著桓公不仁至於自殱其衆也殱盡也公羊作瀐秋鄭詹自齊逃來木訥曰詹不逃歸鄭而逃來則知其為鄭之罪人也審矣惡於鄭執於齊逃而奔魯而魯受之任氏謂魯不當受何休謂魯信其計取齊淫女丹楹刻桷卒為後患然未見所據冬多麋麋鹿之大者安定曰麋魯常有但以多為異耳十有八年春王三月日有食之泰山孫氏曰不言朔不言日日朔俱失之也夏公追戎于濟西杜氏注戎來侵魯公逐之於濟水之西岷隱曰自是而後魯伐戎戎終不能為魯患豺狼之性畏威則遁豈盟誓可結哉秋有􅈮音或左氏曰為災也張氏曰􅈮名短狐含沙以射水中人影中輒病或至死江淮以南水濱有之魯所無也愚意此其所以書有也冬十月書以備四時之終十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟鄄音絹媵送女也鄄衛地也以魯女媵陳侯之婦也結出竟遭齊宋謀伐魯遂便宜而與為盟然二國有謀非媵臣所能釋故書媵為遂事起也書遂事又為今冬齊宋陳伐我起也于鄄頗難曉伊川曰鄄之巨室嫁女於陳人結以其庶女媵之未知然否夫人姜氏如莒杜氏注非父母國而往書姦冬齊人宋人陳人伐我西鄙襄陵許氏曰公之事齊後於諸侯又受鄭詹未討齊宋在鄄將以陳人伐我而結知之故權國重而與之盟示先下之以禮齊宋以公子之盟未足以結成也故卒來伐而取服焉愚按此說寬平而近事情諸家多謂齊宋怒結抗君而來伐若止怒結之抗不受其預盟足矣伐我者必其素謀爾二十年春王二月夫人姜氏如莒姜氏至是亦老矣連年如莒何甚也夏齊大災天火曰災大災者宗廟廏庫皆盡之辭也公羊注以為疫秋七月冬齊人伐戎襄陵許氏曰戎自春秋之初即見荆乃後起故攘中國之患宜莫先戎齊桓既霸七年諸侯略定自是始伐戎愚謂荆大戎小量力亦當自戎始也張氏又曰戎在徐州之域最近齊魯故先治之二十有一年春王正月夏五月辛酉鄭伯突卒鄭夾漈曰厲公也立四年奔而昭公忽入立立二年遇弒而子亹立立一年齊人殺之而子儀立立十四年傅瑕殺之而納厲公厲公復入七年卒而文公捷立張氏曰突鄭莊公之孽子莊公既卒即奪忽之位而篡之中間雖為祭仲所逐旋入于櫟卒取鄭國春秋不復書忽亹儀之在位秋七月戊戌夫人姜氏薨文姜之惡極矣春秋終始以夫人之禮書之然則孰謂春秋奪人之爵或至貶及天王哉亦實書其事而善惡自見耳冬十有二月葬鄭厲公八月乃葬緩也二十有二年春王正月肆大眚崔氏曰書稱眚災肆赦又稱宥過無大則肆大眚之義可知矣岷隱曰春秋二百四十年獨莊公書肆大眚蓋春秋豫之木訥曰罪有過有故過者當宥十二公獨此一書則他公未嘗宥過而過與故盡殺之莊公鞠其過者而肆之也是亦春秋美事聖人安得而不書夾祭曰眚災也大眚者大災也凶荒札瘥之謂乃釋繫囚存長幼恤貧窮使之復其居不常令也春秋肆大眚者一而已奈何欲治之君而屢赦愚謂夾漈之說是也肆大眚也非大肆眚也凡謂公大姦巨惡俱赦之而廢天討者誤矣眚公羊作省癸丑葬我小君文姜書文姜之葬如此然則孰謂不書葬者為貶哉常山劉氏曰婦人從夫者也不尸善名不當别諡如宋共姜者為得禮如文姜者私諡也陳人殺其公子禦寇何休曰書者殺其君之子重也禦公穀皆作御夏五月春秋未有以五月首時者先儒以為下脫文或五字誤秋七月丙申及齊高徯盟于防冬公如齊納幣木訥曰盟于防謀昏也父仇不報母喪未除而求昏於齊非孝也納采不以大夫而親行非禮也張氏曰莊公生至是三十六年制於文姜必齊女而後娶至於失時今喪未畢即納幣求昏二十有三年春公至自齊如齊納幣而歸也祭叔來聘岷隱曰祭叔畿內之大夫也親來聘魯祭叔之私交也非有王命故不稱使夏公如齊觀社公至自齊張氏謂齊自襄公二十四年因社搜軍使客觀之故今公往觀之伊川曰昏議尚疑故以觀社為名再往請議穀梁以為尸女注尸主也主為女往爾愚意公欲求昏每事媚齊而親之也荆人來聘荆入春秋三以兵加中國今來聘稱人說者以為進之也木訥曰說者以為進之聖人豈樂其僣聘問之禮哉憂之益甚也若直書荆來聘則若舉國皆來於文不順故書人字以成文耳不然二十八年荆伐鄭何以復書荆僖十八年邢人狄人伐衛書人亦豈進之而書人耶是年楚成王即位公及齊侯遇于穀蕭叔朝公張氏曰為昏姻而齊難之數為之會然後與之蓋遇者禮之簡公亦自知數會之煩擾而簡其禮以遇于穀亦為姻好也木訥曰莊公既求昏於齊則六禮之行有大夫存焉而公皆親之往返如織非禮甚矣蕭蕞爾附庸因公在穀而逆朝之蓋亦失禮之招也秋丹桓宫楹楹柱也穀梁𫝊曰天子諸侯黝堊丹楹非禮也或曰將以誇示齊女也冬十有一月曹伯射姑卒莊公立三十一年卒而僖公赤立十有二月甲寅公會齊侯盟于扈伊川謂要姻好也張氏謂至此又盟以結其信而後許之也岷隱謂莊之媚齊不遺餘力一年之間親如齊者再遇齊者一盟齊者一其切於昏姻之好若此二十有四年春王三月刻桓宫桷桷椽也諸侯之桷斫之礱之刻桷非禮也義與丹楹同葬曹莊公五月而葬夏公如齊逆女張氏曰諸侯無越竟逆女之禮秋公至自齊八月丁丑夫人姜氏入戊寅大夫宗婦覿用幣夫人哀姜也安定曰婦人從夫者也公親迎于齊夫人不從公而至失婦道也大夫宗婦者同宗大夫之婦非謂大夫與宗婦也覿者見夫人也用幣者女贄不過榛栗棗修今婦人而用男子之贄莊公以誇侈失禮也岷隱曰莊公生於威六年至是年三十有七矣求昏於齊如恐失之親如齊納幣再歲而後逆親如齊逆女既歸而後至又使其大夫之妻執幣帛以行私覿之禮違越禮制以為媚悅無所不至甚矣莊公之庸謬也向也威公娶于齊致文姜之淫亂威公不免其身今也莊公娶于齊致哀姜之逆亂魯又幾亡其國春秋備書于册辭煩而不殺為萬世永戒也大水岷隱曰莊公即位三十餘年書大水者三於羣公為最甚大水隂氣之盛也冬戎侵曹曹羈出奔陳赤歸于曹杜注羈曹世子也赤曹僖公也羈之立踰年矣戎人侵曹羈倉卒無備懼而出奔赤遂以歸于曹故說者以為戎納曹郭公杜注闕誤也岷隱謂說者以為郭亡有二證齊桓公嘗問管仲郭何故亡一也春秋嘗書梁亡此正其類二也二十有五年春陳侯使女叔來聘女音汝左氏曰始結陳好也注曰季友相魯原仲相陳二人舊有好故女叔來聘冬季友報聘女叔陳卿女氏叔字夏五月癸丑衛侯朔卒惠公也立三年為二公子逐之而立黔牟黔牟立八年諸侯納惠公公復立二十年卒明年懿公赤立六月辛未朔日有食之鼓用牲于社岷隱曰日食奏鼓以充陽也用牲于社則非禮矣崔氏曰社隂也而用牲焉是求於隂非勝隂之道矣張氏曰莊公於充陽之本藐然矣雖鼓何益乎安定曰日食三十六書鼓用幣者三伯姬歸于杞伯姬莊公女也集注曰若時君之女則加子字以别之此桓公末歲所生女公之姊也秋大水鼓用牲于社于門傳曰非禮也凡天災有幣無牲非日月之眚不鼓木訥曰古者救日月無救水之理張氏曰大水九此特書鼓用牲冬公子友如陳季友莊公母弟如陳報女叔之聘也內大夫出聘自友始二十有六年春公伐戎夏公至自伐戎襄陵許氏曰隱桓以來世有戎盟至於莊公戎始變渝是以有濟西之役於此伐戎義已勝矣木訥趙氏曰戎為魯患舊矣而今日之兵實為曹伐之何以知其然前年冬戎侵曹曹羈出奔陳及陳女叔來聘言必有及於羈也故冬公子友如陳報聘而春遂伐戎為曹可知矣愚按許正說也趙雖臆度然以經之次第考之勢或然也曹殺其大夫岷隱曰曹自莊公既沒羈出而赤歸曹之大夫必有不與赤同心者故至是而殺之孫泰山曰不書名氏者脫之木訥曰公才至自伐戎而曹遂殺其大夫是魯為曹伐戎戎有辭於曹曹殺其大夫以悅戎也愚謂果如其說是魯為曹羈伐戎曹大夫之不與赤者預聞其謀故赤殺之耳秋公會宋人齊人伐徐胡氏曰伯禽嘗征徐戎徐為魯患舊矣是年春公伐戎秋又伐徐必徐與戎表裏為魯患也木訥曰徐偃王僣稱王穆王滅之别封其系以祀伯繄其地今之臨淮是也蓋介於魯宋之間為二國患故今宋主兵而公會之冬十有二月癸亥朔日有食之記災二十有七年春公會杞伯姬于洮他刀反岷隱曰夫人會諸侯古無是事也文姜數㑹齊侯不以為異杞伯姬踵而行之莊公亦安而受之先儒謂伯姬莊公女恐非也崔氏曰伯姬公之姊妹夏六月公會齊侯宋公陳侯鄭伯同盟于幽左氏曰陳鄭服也注曰陳亂而齊納敬仲鄭文公又獲成于楚二國皆二於齊今始服也木訥曰同盟于幽至是十年矣威公懼諸侯久不合則離於是復講同盟之禮焉然前日同盟者九國今四國不至用是知諸侯不可不屢合也秋公子友如陳葬原仲原仲陳大夫也季友越國而送陳大夫葬非禮也胡氏以為私行冬杞伯姬來孫氏曰歸寧常事不書此直曰來無事而來也胡氏曰春㑹于洮矣冬又來故知其不當來也劉氏曰伯姬之來已亟非禮也莒慶來逆叔姬慶莒大夫也劉氏曰莒慶非有君命叔姬非適諸侯范寧曰大夫越竟逆女非禮也杞伯來朝張氏曰杞侯也國小力弱降爵自儕於小國自侯而伯自伯而子蓋浸以微弱也公㑹齊侯于城濮岷隱曰城濮衛地也幽之盟衛侯不至㑹于城濮謀伐衛也二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績幽之盟衛不至故伐之衛人不服罪故戰力不敵故敗夏四月丁未邾子瑣卒瑣者邾子克之子也秋荆伐鄭公㑹齊人宋人救鄭按左傳楚令尹子元因文王夫人之言無故以六百乘伐鄭鄭示以閒暇諸侯救鄭楚師夜遁書救者善之也楚與中國爭鄭自此始冬築郿郿魯下邑築者新創大曰城小曰築郿公穀作微大無麥禾說者皆謂麥熟於夏禾熟於秋而書無於冬者歲抄計食不足方書蓋以麥禾為二物而曲加之辭耳麥者稻梁之助若果二物並書不應麥先於禾也若麥與禾並無當曰年饑不應舉二物而書也竊意麥禾猶麥苗麥苗者麥之苗則麥禾者即麥之禾也麥種於秋故無麥苗書於秋麥茂於冬故無麥禾書於冬耳臧孫辰告糴于齊臧孫辰魯大夫臧文仲也左氏謂饑而告糴禮也公羊謂不稱使私行也穀梁謂責其無九年之蓄則不量時之高論也二十有九年春新延廏延廏馬間也穀梁以為法廏木訥以為古無此名也木訥謂或以延為廣然既曰新之又曰廣之非文也或曰天子廏未知果然否豈延者固魯廏之名耶新者有故而新之也說者多謂用民力於麥禾大無之後故書之恐亦因經文而意之爾夏鄭人侵許許氏曰許以近楚自齊之霸未會諸侯故鄭侵之蓋自是後許從中國矣木訥曰許介楚鄭之間鄭逼於楚每以許為藩蔽鄭不達權虐許不已許一入楚則楚之入鄭如襲無人之墟矣今楚方仇鄭而鄭侵許其後八年之間楚伐鄭者三失許援也秋有蜚扶味反劉氏曰蜚狀若牛而白首一目而蛇尾行水則竭行草則死見則國大疫公羊注曰臭惡之蟲南越盛暑所生非中國之所有書有者記異也冬十有二月紀叔姬卒蘇氏曰紀雖滅而叔姬守義於酅故繫之紀賢而録其卒葬城諸及防諸防皆魯邑及者先諸後防三十年春王正月夏次于成秋七月齊人降鄣音章辨疑趙氏曰魯蓋欲會齊圍鄣至成待命聞鄣已降故不行然疑事無質但當存而勿解岷隱曰穀梁謂欲救鄣而不能夫魯之事齊不遺餘力齊欲降鄣魯欲效其力者安敢言救不然次師為齊聲援爾次公穀並作師次鄣小國八月癸亥葬紀叔姬以賢録也九月庚午朔日有食之鼓用牲于社孫氏曰救日食鼓禮也用牲非禮也冬公及齊侯遇于魯濟齊人伐山戎濟水名也厯齊魯界在齊界為齊濟在魯界為魯濟蓋魯地也遇于魯濟左氏謂謀山戎也以其病燕故也木訥曰山戎去中國逺在舜之營州古孤竹國之地東距遼北距燕夾漈曰北燕之不通於上國山戎蔽之也桓公為之伐而燕始達許氏曰齊桓伐郳伐鄭伐徐皆以宋主兵先與公會城濮而後伐衛又與公遇于魯濟而後伐山戎其用兵資武於宋桓而取䇿於魯莊其治國一則仲父二則仲父遂能力正天下澤濟生民三十有一年春築臺于郎何氏注天子有靈臺以候天地諸侯有時臺以候四時登高望逺人情所樂動而無益于民者雖樂弗為劉氏傳去國而築臺是樂而已矣夏四月薛伯卒張氏曰薛始稱伯降班以告終也築臺于薛杜氏注薛魯地六月齊侯來獻戎捷公羊曰威我也岷隱曰非威我也魯濟之謀莊公與焉捷獲而過我因歸功於魯云爾敵愾獻功諸侯事天子之禮也齊與魯皆失之秋築臺于秦孫氏曰一歲而三築臺妨農莫甚愚謂荒於政而惟事遊觀矣冬不雨崔氏曰志災也三十有二年春城小穀范寧曰小穀魯地春秋發微曰曲阜西北有小穀城孫泰山之說同胡氏曰孫魯人也考此詳矣惟左氏以為齊地魯為管仲而城之杜預指為穀城木訥辨之曰昭十一年楚申無宇言齊威公城穀而置管仲故左氏因莊公偶有城小穀之事而附之然此城小穀安得改為穀城且魯何與於管仲而為管仲城邑耶孫氏曰去年三築臺冬不雨今春又城小穀荐饑而輕用民力此其所以書也夏宋公齊侯遇于梁丘左氏曰齊侯為楚伐鄭之故請會于諸侯宋公請先見於齊侯故遇于梁丘張氏謂齊侯不以霸自居以梁丘近宋而先之也木訥曰春秋之世諸侯强大者齊晉宋也晉怙其强終齊威之霸未嘗一同其會盟宋於晉亞也故威公賴宋為多北杏之會宋人一判則諸侯首鼠齊兵再伐而後得之既得之則再會于鄄以堅其心又為之伐鄭以悅其意自非大盟㑹大征伐齊不敢先之必推之以為主所以為諸侯之倡而就霸功也幽之再盟於是又五年矣齊侯懼諸侯之離故逺遇宋公於梁丘梁丘宋地去齊八百里齊侯不逺八百里而遇之者蓋求宋以卜諸侯之從違宋無二心則不必㑹諸侯也梁丘杜云在高平昌邑穀梁傳以為在曹邾之間此以為宋地秋七月癸巳公子牙卒牙慶父同母弟僖叔也公疾問後於牙對曰慶父材問季友對曰以死奉般季友莊公同母而般莊公子也於是季友以君命使針季鴆牙曰飲此則有後於魯國不然死且無後飲之而卒立其後為叔孫氏張氏曰叔牙黨慶父而萌篡弒之心故季友正其罪以君命討而誅之又以親親之義不彰其惡唐陸氏謂恩義俱立權而得中故夫子書其自卒示無譏也八月癸亥公薨于路寢穀梁曰正也冬十月己未子般卒般音班般莊公子季友所奉而立者慶父初欲篡之不果般嘗鞭圉人犖故慶父使犖賊般季友奔陳立閔公般見殺而書卒說者以為諱也己未公穀作乙未公子慶父如齊慶父自莊公即位已專兵柄今弒般而如齊杜注以為求援諸儒以為公然而行無敢討之也後再入又弒閔公狄伐邢狄北狄邢周公之𦙍許氏曰春秋戎先見荆次之狄又次之而荆暴於戎狄又暴於荆當惠王世戎狄荆楚交伐諸夏使無齊桓攘服定之豈復有中國哉閔公名啓方莊公之子母叔姜諡法在國遭難曰閔元年春王正月左氏曰不書即位亂故也蓋莊公卒子般弒閔公生方八年弒君之慶父立之岷隱亦謂魯國有亂閔公尚幼不行即位之禮故春秋不書即位齊人救邢據傳管仲言於威公謂戎狄不可縱諸夏不可棄燕安不可懷援詩簡書之義請救邢故先儒謂書救者善之而張氏謂孔子以民免左衽之功歸管仲蓋救諸夏攘夷狄皆仲發之也先師謂威公重於治楚若狄患止於河北不過應之未嘗動大衆此管仲所以請之而後救夏六月辛酉葬我君莊公張曰國亂子弒嗣君幼弱十一月乃葬秋八月公及齊侯盟于落姑季子來歸左氏謂落姑之盟請復季子故季子來歸季子者公子友之字慶父弒般而季子出奔陳閔公初立國家多難以季子忠賢故請霸主而復之木訥謂慶父歸自齊而立閔公故奉閔公以盟齊侯結齊好閔公才八歲安知季子之賢忠而能出盟齊侯以復之且慶父逆賊豈肯復季子之賢蓋主少國疑季子自來歸季子歸而慶父弒君以逃矣左氏但見落姑之盟與季子來歸文相連蓋以為慶父請之歸非也落公穀作洛冬齊仲孫來傳所謂仲孫湫來省難歸告威公魯猶秉周禮而使親之者也其來名曰省難實則覘魯故但曰來按公穀皆指仲孫為慶父按慶父後為孟孫而此乃仲孫慶父公之子未應言孫慶父魯公子不應繫之齊然諸儒亦多從其說莫曉也湫子小反二年春王正月齊人遷陽陽小國逼齊而遷之使近於國為附庸夏五月乙酉吉禘于莊公天子禘諸侯祫魯僣天子禮故禘夾漈謂禘者三年喪畢初見新廟之主于太祖之廟今喪未畢而禘又禘不于祖廟而于莊公皆非禮也杜氏謂致新主遷逺主至是大祭以審昭穆謂之禘安定云審諦秋八月辛丑公薨九月夫人姜氏孫于邾公子慶父出奔莒左傳載公之傅奪卜齮田公不禁慶父使齮賊公于武闈今書薨者劉氏謂史䇿諱之仲尼因之也左傳載慶父通于哀姜哀姜欲立之慶父之弒閔公哀姜與知之故哀姜孫于邾而慶父奔莒岷隱謂閔公書薨而繼以夫人之孫慶父之奔則罪之在哀姜慶父昭昭矣冬齊高子來盟高子者齊大夫高徯也魯比三君死曠年無君威公使高子將高陽之甲立僖公而城魯諸儒多謂威公使來謀魯高子至而後結盟以歸美高子十有二月狄人入衛衛懿公好鶴而棄其民狄人滅之止書入者齊威救之而衛復興也鄭棄其師文公惡高克使陳師河上而散先儒謂書棄其師者聖人特筆莊公不能防間其母播其惡於衆又忘父事讎求昏於齊致哀姜通于慶父叔牙公沒而謀篡弒二世殱焉雖賴季友柄國再安而慶父之後為孟孫叔牙之後為叔孫季友之後為季孫三桓擅政祿去公室魯之衰自莊公始矣閔公生八歲而慶父立之立二年而慶父弒之使內無季友外無仲孫湫言於齊魯且為慶父所篡閔公蓋可閔而未有是非之可議也黃氏日抄卷八
