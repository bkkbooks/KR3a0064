body:
  text: 黃氏日抄卷十宋黃震撰讀春秋四文公名興僖公子母聲薑諡法慈惠愛民曰文忠信按禮曰文元年春王正月公即位行即位之禮也二月癸亥日有食之不書朔失之也公羊本有朔字天王使叔服來會葬公羊謂會葬禮也先儒多謂弔賻可也會葬非禮也未知孰是要之王室微諸侯強每事反下之耳或又謂五月而葬今三月而來會亦早夏四月丁巳葬我君僖公五月而葬天王使毛伯來錫公命穀梁曰禮有受命無來錫命或謂知公之不請命而反先焉蓋事勢陵夷上之每每屈以就下如此晉侯伐衛晉文公季年衛背晉而侵鄭襄公告於諸侯而伐之先且居勸以先朝王故襄公朝天王於溫而使先且居胥臣伐衛此左氏説也石林讞曰經言晉侯伐衛則非先且居胥臣矣或曰因討衛而後朝王非朝王而後伐衛故著其伐而沒其朝愚按此亦據左氏而評之合且以經文為正叔孫得臣如京師得臣叔牙之孫如周拜錫命也先儒謂公不親往拜而遣得臣非也然於經亦無遣使之文衛人伐晉衛孔達也不知自反而反伐霸主為報木訥謂是亦犯上蓋既無王復無霸則天下胥為夷矣秋公孫敖會晉侯于戚敖慶父之子穆伯也晉伐衛取戚田而疆之敖往會焉禮樂自大夫出始此木訥曰孟氏自敖而專叔孫氏自得臣彭生而橫季孫氏自行父而侈前乎此大夫出會者皆君命至此而始專冬十月丁未楚世子商臣弒其君頵憂倫反商臣後為楚穆王頵則楚成王也書商臣稱世子以見其有父之親書頵稱君以見其有君之尊商臣無父無君大逆無道禽獸不若也唐太子洪授左氏春秋廢書而嘆曰聖人何書此耶率更令郭瑜對曰春秋以善惡為勸戒故商臣千載惡名不滅洪曰實不願聞願受他書瑜遂讀禮張氏洽曰頵在位四十六年更齊桓晉文之時僣王猾夏力爭諸侯齊桓既沒益肆慿陵執宋戍齊毒被中國及晉文敗之城濮聲勢消沮欲易世子謀及婦人自取篡逆蓋夷狄積惡之應如此後世如胸奴曼頭魏拓拔圭唐安祿山史思明朱全忠本朝西夏曩霄皆受禍於其子頵公穀皆作髠公孫敖如齊注云始聘通嗣君也木訥謂諸侯世相朝必三年喪畢今敖如齊非禮也專也文公即位一嵗之間朝會皆出於得臣與敖何以為國乎二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績秦報殽之役也丁丑作僖公主先儒謂練而作主十三月也今十七月後時三月乙巳及晉陽處父盟左氏謂晉以公不朝來討公如晉晉使陽處父盟以恥之夏六月公孫敖會宋公陳侯鄭伯晉士縠盟于埀隴晉討衛故也石曰內大夫專盟自敖始外大夫列諸侯會自士縠始隴公穀作斂自十有二月不雨至于秋七月記災異也八月丁卯大事于太廟躋僖公僖公閔公之庶兄而閔公先立僖嘗臣之今文公欲尊其父故躋僖公於閔公之上傳以為逆祀冬晉人宋人陳人鄭人伐秦報彭衙之役也公子遂如齊納幣先儒謂未終喪納幣非禮三年春王正月叔孫得臣會晉人宋人陳人衛人鄭人伐沈沈潰左氏曰莊叔會諸侯之師伐沈以其服於楚也沈潰凡民逃其上曰潰夏五月王子虎卒翟泉之盟王人王子虎也是為王叔文公來赴弔如同盟夾漈曰文公於襄王猶周公於成王也成王弱有管蔡之變襄王微有叔帶之難輯諸侯寧王室文公之略也秦人伐晉秦再敗於晉今此焚舟之戰也晉師不出秦封殽尸而還秋楚人圍江江近楚自齊桓貫澤之盟江從中國今楚有窺中國之心故先圍江雨螽于宋記異冬公如晉十有二月己巳公及晉侯盟岷隱曰晉侯使陽處父盟公已而自知其非禮復請改盟然召而盟之魯之弱可見矣晉陽處父帥師伐楚以救江胡氏曰是時楚有覆載不容之罪晉宜大合諸侯聲罪致討庶幾震恐而江圍可解乃遣一軍豈能濟乎四年春公至自晉往盟於晉而歸也夏逆婦薑于齊左氏謂卿不行非禮也貴聘而賤逆之知出薑之不允於魯也穀梁謂其曰婦薑已成婚於齊也或曰有姑之辭也木訥謂不稱夫人以微者逆不以夫人之禮待之也狄侵齊許氏曰狄自箕之敗至是始復侵齊間晉有秦楚之難也秋楚人滅江陽處父以偏師救之又不直救江而逺伐楚故江卒滅晉侯伐秦報焚舟之役也衛侯使寧俞來聘俞即寧武子衛之賢者也當衛侯出奔復歸之時納槖饘以從君於囚貨醫衍以免君於死俞有勞焉至是晉以孔達歸衛故衛侯使來修舊好魯侯享之歌彤弓及湛露俞不辭又不答賦魯秉周禮有愧於俞多矣冬十有一月壬寅夫人風氏薨啖子曰自成風之後妾母皆僣用夫人禮伊川曰仲子始僣猶不敢同嫡蓋風氏即成風僖公之母莊公之妾也木訥辨以為僖之妾以秦人來歸僖公成風之禭為證謂成風繫之僖公猶以仲子繫之惠公也未知然否後書葬我小君似亦主僖言之也五年春王正月王使榮叔歸含且賵三月辛亥葬我小君成風王使召伯來會葬賵芳鳳反珠玉曰含車馬曰賵含贈死賵贈生既歸含賵又使會葬是天子成其妾母為夫人非禮也禮庶子為父後者為母緦不書天王止書王者諸家以為貶木訥以為闕文召伯穀梁作毛伯夏公孫敖如晉公方歸自晉敖即如晉或疑其諂事晉以內固其權秦人入鄀音若鄀楚屬也叛楚即秦又二于秦故秦入鄀秋楚人滅六六臯陶後今屬安豐軍冬十月甲申許男業卒僖公也立三十三年卒終身事楚晉文公圍之而不服晉襄公伐之而不率者也六年春葬許僖公自十月至今計亦五月而葬夏季孫行父如陳秋季孫行父如晉左氏謂臧文仲使其睦陳行父因娶焉是意在求昏而託聘以往木訥曰陳未有聘於魯魯豈先聘小國如陳者行父之私也敖嘗如晉行父與敖一體之人故亦如晉仲氏季孫爭交於晉三家之張自文公始八月乙亥晉侯歡卒冬十月公子遂如晉葬晉襄公三月而葬速晉殺其大夫陽處父晉狐射姑出奔狄射音亦一音夜於傳則狐射姑怨處父以趙盾易已之班使續鞠居殺處父而奔狄崔氏曰從三家之論則處父之選任而告於君者忠矣未可以為罪也稱國以殺知處父有他罪明矣而傳或失之晉殺處父而射姑出奔豈處父之罪有纍於射姑故耶射姑穀梁作夜姑狐偃之子也閏月不告月猶朝于廟陸氏纂例曰文公以閏非正不行告朔之禮而以其朔日至廟拜謁而已木訥曰常月曰告朔閏月曰告月文公不達此以為天無是月而弗告焉猶幸其朝于廟岷隱曰禮天子頒正朔諸侯受而藏之禰廟每朔以特羊告宗廟謂之告朔既告然後出而視政謂之視朔文公末年四不視朔則荒怠於政雖非閏月亦不告矣子貢欲去告朔之餼羊當自文公之後魯公不親告朔矣七年春公伐邾三月甲戌取須句遂城郚句其俱反郚音吾僖公嘗伐邾取須句其後歸之今文公間晉之難復伐而取之郚魯下邑因伐邾之師而遂城之以備邾其陵虐小國不恤民力直書自見夏四月宋公王臣卒宋人殺其大夫宋成公立十七年而卒昭公未即位先欲去羣公子故國人攻昭公殺及二大夫傳謂公孫固公孫鄭也崔氏曰嗣君未立而國內亂大夫有以衆死者知非公命故曰宋人殺木訥曰凡君卒而大夫殺非廢置有不順必不能於嗣君者戊子晉人及秦人戰于令狐晉先蔑奔秦令力呈反左氏載晉襄卒靈公幼謀立長君趙盾使先蔑迎公子雍於秦穆嬴抱太子日啼於朝盾乃拒秦而先蔑奔木訥曰晉襄之卒於是期年襄公之葬久矣豈晉至是始謀立君左氏之説必不然也且左氏初言先蔑如秦則蔑在秦次言先蔑將下軍則蔑在晉蔑既逆雍於秦則必不肯將兵以拒秦茍已將兵拒秦豈容復奔秦耶理無可通者皆失之誣也秦晉自殽凡五戰今晉襄秦穆皆即世晉靈秦康之立可以一洗舊憾趙盾乃修先君之怨以為是戰晉辭為曲蔑不用命而奔敵矣愚按據經文之次第則傳文誠不足慿蓋全與經相背也狄侵我西鄙間秦晉之爭也木訥曰魯有戎患未嘗有狄患狄蓋逺於魯今狄越齊衛而侵魯其患深矣岷隱曰戎嘗為魯患至莊公伐戎之後戎患少息至是狄患方興侵我西鄙其後魯獲長狄僑如狄遂少戢治夷狄固不可以無威也秋八月公會諸侯晉大夫盟于扈許氏曰諸侯何以不序大夫何以不名大夫而主諸侯盟自扈之盟始也君子惡之崔氏曰是時晉侯新立諸侯相與會於晉地而聽事焉晉侯不能降禮乃使大夫抗禮而盟諸侯此諸侯之恥而晉之罪也故不罪諸侯不名晉大夫以略之愚按比前後凡書盟會此誠夫子之特筆諸家皆祖左氏以為公後至而諱之殊不可曉且夫子明書公會後世安得自以為公後至耶惟許氏崔氏據經為説故特録之然此時靈公尚幼事皆趙盾之為二氏以責靈公未審耳是嵗中國始無霸主冬徐伐莒公孫敖如莒涖盟木訥曰魯有徐患舊矣入春秋服齊桓之令不敢仇諸侯霸主不作徐將為魯患今其伐莒公孫敖於是往盟於莒修僖公洮向之好協謀以備徐八年春王正月夏四月秋八月戊申天王崩襄王立三十三年崩冬十月壬午公子遂會晉趙盾盟于衡雍乙酉公子遂會雒戎盟于暴雍於用反趙盾專有晉大國雒戎與魯有疆場之交公子遂當國而專故往與之盟衡雍與暴皆鄭地故越晉而可兼盟公孫敖如京師不至而復丙戌奔莒公孫敖穆伯也如京師者將弔天王之喪不至而復丙戌奔莒者穆伯嘗為襄仲娶莒巳氏美而自娶之仲欲攻之惠伯平之穆伯已還己氏至是逃奔己氏也其惡可知螽書災宋人殺其大夫司馬宋司城來奔大夫孔叔公孫鍾離也司馬公子卭也司城蕩意諸也初宋昭公未立先欲去羣公子嘗致亂今既立不禮其祖母襄夫人又致亂故大夫司馬死之而司城來奔黎氏曰司馬典兵之官而被殺則威柄奪矣司城扞禦之任而來奔則主勢孤矣宜昭公卒死於弒九年春毛伯來求金岷隱曰襄王在殯猶未葬也從魯求金亦可念矣木訥曰諸侯不貢而致天王下求雖金非所以責魯然王有闕則諸侯均所當供夫人薑氏如齊此出薑也杜注以為歸寧木訥曰文公並妃匹嫡嬖於敬嬴生倭嬴寵而倭將貴夫人如齊謀於父母其歸寧蓋有故存焉聖人書之為十八年歸齊張本二月叔孫得臣如京師辛丑葬襄王得臣莊叔也如京會葬也岷隱曰魯成風之喪王使榮叔歸含賵叔服會葬今襄王之喪公孫敖如京不至而復魯亟遣大夫往繼可也遷延不行而毛伯求金已而得臣方會葬亦晚矣崔氏曰天子之葬魯侯親之者也乃遣大夫木訥曰猶愈於不會葬者愚謂周衰諸侯強禮之倒置甚矣魯僅儕周於諸侯而周之下禮於魯反過於交鄰國晉人殺其大夫先都左氏載先都怨先克沮已不獲登上軍殺先克晉人遂殺先都胡氏謂晉政在趙盾先克者盾之黨是則討先都之亂者盾必主之也國亂非君命故曰晉人三月夫人薑氏至自齊崔氏曰夫人不寧於魯故終以見出是行也夫人其幾於出乎故殆其往而喜其反晉人殺其大夫士縠及箕鄭父士縠箕鄭與先都同亂者也故併殺之木訥謂先都既殺其黨責其自新可也盾必誅之亦知己之專而懼士縠之伍不屈於己也楚人伐鄭公子遂會晉人宋人衛人許人救鄭范山言於楚子曰晉君少不在諸侯北方可圖也楚於是伐鄭孫氏曰楚自城濮之役不敢加兵於鄭今伐鄭者晉文既沒中國不振故也張氏曰趙盾為晉當力懲其始以振中國之威乃緩不及事諸侯之師及鄭楚已囚鄭公子去矣木訥曰晉靈少且不君權專於盾楚商臣大逆之罪晉不能問至是復窺中國兵行鄭郊楚之進退視中國強弱中國無霸何以安之夏狄侵齊張氏曰楚得志去而狄交侵矣秋八月曹伯襄卒共公也立三十五年卒九月癸酉地震地道靜動為異冬楚子使椒來聘張氏曰伐鄭而聘魯亦逺交近攻之意愚按此事諸家皆謂書楚子書椒以其以禮交中國而進之也木訥辨之曰楚執宋公以伐宋春秋亦書曰楚子豈進其虐中國耶宜申謀為不道而見殺春秋亦書曰宜申豈進其謀逆耶書楚子書椒從其國之稱書其實而已秦人來歸僖公成風之襚音遂衣服曰襚以贈死者成風之卒今五年矣張氏曰是時秦楚交病中國秦欲伐晉而襚魯猶楚欲圖北方而聘魯也啖子曰僖公成風與惠公仲子何殊傳謂兩人誤矣木訥曰此特歸成風之襚爾不曰僖公無以别其為僖公之妾成風為僖公之妾於是明矣非謂兼襚二人也葬曹共公共音恭八月卒冬而葬計亦五月十年春王三月辛卯臧孫辰卒臧文仲夏秦伐晉傳載晉伐秦取少梁秦伐晉取北徵是交怨不已經止書秦豈以兵端在秦耶楚殺其大夫宜申傳載宜申謀弒穆王而見殺經但書殺其大夫木訥謂穆王弒君父故宜申之謀弒以無罪書之自正月不雨至于秋七月旱可知及蘇子盟于女栗女音汝又如字諸家多祖左氏説謂頃王新立而盟以盟天子之大夫與周下盟諸侯為非惟戴岷隱曰僖公十年狄嘗滅溫溫子奔衛溫即蘇子也今與魯盟豈非既復其國而求與魯盟耶冬狄侵宋高氏集注曰狄侵諸大國獨宋未耳自宋亂之後狄始侵之楚子蔡侯次于厥貉左氏載其將伐宋先儒謂睥睨中國耳厥貉公穀作屈貂十有一年春楚子伐麇九倫反杜注討前年逃厥貉會夏叔仲彭生會晉郤缺于承筐郤去逆反左氏曰謀諸侯之從於楚者杜氏注九年陳鄭及楚平十年宋聽命於厥貉也先師謂此亦霸者事大夫豈得而專之木訥曰魯獨會之者蓋大夫之專自魯始霸主之令亦出於大夫此魯所以悅從者與彭生叔仲惠伯也公子牙之孫秋曹伯來朝左氏謂始即位而來也公子遂如宋左氏謂襄仲聘於宋且言司城蕩意諸而復之因賀楚師之不害也木訥曰彭生會晉公子遂如宋魯君安在哉大夫專恣各事大國以固私黨狄侵齊冬十月甲午叔孫得臣敗狄于鹹左氏曰鄋瞞侵齊遂伐我公卜使得臣追之吉敗狄于鹹獲長狄僑如木訥曰狄八年之間三侵齊而侵魯宋者一得臣出其不虞而敗之自是有懼心惟十三年一侵衛不敢窺齊魯之藩籬則鹹之役不惟有功於魯且有功於天下也得臣莊叔也最善射十有二年春王正月郕伯來奔公羊曰失地之君也岷隱曰按左氏郕太子以地來奔魯以諸侯逆之故書曰郕伯誠如所言郕太子未嘗為君春秋豈得以郕伯書蓋必嘗為君迫於不得已而出奔非其罪也孫氏曰按莊八年師及齊師圍郕郕降於齊師自是入齊為附庸此而來奔齊所逼爾郕公羊作盛杞伯來朝始朝公也二月庚子子叔姬卒左氏謂嫁杞而杞絶之公穀謂嘗許嫁杞而卒今皆不可知趙子曰時君之女故曰子以别非先君之女也愚按以此釋經文足矣夏楚人圍巢岷隱曰前日楚伐麇中國不能救於是又圍巢中國無霸主諸侯何恃哉秋滕子來朝滕昭公也亦始來朝秦伯使術來聘將伐晉也木訥曰九年秦將伐晉則來歸僖公成風之襚今將為河曲之戰則有術之聘冬十有二月戊午晉人秦人戰于河曲自殽至此凡六交兵季孫行父帥師城諸及鄆音運諸與鄆二邑名木訥曰諸鄆莒魯之衝也七年徐伐莒公孫敖如莒涖盟莒魯蓋締交也八年公孫敖如京師不至奔莒敖之奔蓋不能於魯而莒容之行父疑敖之在莒為疆場患故帥師以城焉張氏曰前此莒未嘗與魯有爭今行父首帥師城二邑以啓爭端魯自此與莒為仇而爭由鄆始先師嘗言二邑近費而介於莒他年宿伐莒取鄆叔弓疆其田費於是始大然則此行父自為封殖之計也鄆公羊作運十有三年春王正月夏五月壬午陳侯朔卒陳共公立十八年而卒背夏從夷者終其身其子平國立始自拔於夷狄以從新城之盟是為靈公邾子籧蒢卒籧其居反蒢丈居反邾文公立五十年卒子玃且立左氏載文公卜遷絳利民不利君公遷而卒自正月不雨至于秋七月旱可知太室屋壞太室魯公伯禽之廟不修故壞書不共也冬公如晉衛侯會公于沓狄侵衛十有二月己丑公及晉侯盟公還自晉鄭伯會公于棐劉氏曰前此鄭衛背晉而與楚今公之往也衛侯會于沓請平于晉其還也鄭伯會公于棐亦請平于晉公皆成之木訥曰狄復侵衛者衛侯出會乘虛而侵之也又曰晉之不能宗諸侯者權在趙盾也諸侯之不肯從晉者不屈於盾也中國無霸主而楚人伐麇圍巢無復顧忌寖寖然兵及衛鄭故衛因公之如晉而會公于沓鄭因公之還自晉而會公于棐蓋謀晉之霸也然衛鄭不敢直附晉而問交於魯者以魯深睦於晉而知晉強弱從違之計卜於魯焉故明年遂為新城之盟公之一出晉實因之而復霸諸侯楚實懼之而終文公之世不侵中國則亦不為無益於天下愚謂此適投諸侯求晉之機也十有四年春王正月公至自晉去冬十二月與晉盟而今歸魯也邾人伐我南鄙叔孫彭生帥師伐邾左氏載邾文公卒公使弔焉不敬邾人來討故惠伯伐邾余氏曰居喪而伐人與伐人之喪罪一也夏五月乙亥齊侯潘卒昭公也立二十年卒孝公名昭而潘又諡昭非禮六月公會宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城左氏曰從於楚者服也伊川曰同懼楚也愚按從楚者宋陳鄭許也自楚荐食中國諸侯無所依去年冬衛鄭會魯皇皇然求晉晉趙盾又方有求諸侯之心交相求而適相濟是以同盟新城宋地今應天府也七年扈之盟止書公會諸侯晉大夫今年新城之盟列敘諸侯明書晉趙盾者西疇崔氏謂新城之盟出於諸侯而扈之盟晉大夫主會也不言癸酉會諸侯先言會諸侯然後書癸酉同盟者夾漈鄭氏謂諸侯之會非一日而皆集必待其集然後同日而盟也秋七月有星孛入于北斗孛者星之沴氣也光芒直上而如篲則曰彗光芒四出而勃勃然則曰孛入于北斗者斗有環域故曰入也左氏載周內史叔服曰不出七年宋齊晉之君皆將死亂後三年宋弒昭公五年齊弒懿公七年晉弒靈公唐李淳風始算孛星行度謂此星在角由杓入斗是月自北而入晉居北齊宋居晉之東故晉齊宋當之斗數七故云不及七年胡氏曰此三君皆違道失德而死於亂符叔服之言公至自會新城之會方告至晉人納捷災于邾弗克納邾文公長子玃且齊出也次捷災晉出也玃且已立晉又納捷災見辭而還納者左氏稱趙盾公羊稱郤缺穀梁稱郤克捷災公羊作接災九月甲申公孫敖卒于齊初敖如京師棄君命而奔莒以從己氏魯立其子穀是為文伯敖生二子於莒而求復文伯以為請襄仲使無聽朝命復而不出三年又盡室適莒文伯卒立其弟難是為惠叔敖又重賂以求復惠叔以為請許之將來而卒於齊敖者慶父之子孟氏也諡穆伯適莒而卒于齊者又奔齊以求歸也高氏謂書此以著典刑之壞且為明年齊人歸喪起齊公子商人弒其君舍左氏載魯叔姬妃齊昭公生舍叔姬無寵舍無威公子商人驟施於國以傾之昭公卒舍立商人弒舍而讓元元曰爾求之久矣宋子哀來奔左氏曰宋高自蕭封人升為卿不義宋公而來奔公羊曰子哀者何無聞焉爾穀梁曰其曰子哀失之也左氏居諸傳之先宋昭又不道之君且當從左氏耳但子哀一以為字一以為名不可考孫氏曰宋公族子姓哀名也黎氏曰子哀必宋公之子經有子同子糾未知孰是冬單伯如齊齊人執單伯齊人執子叔姬左氏謂單伯周大夫也子叔姬者文公之女嫁齊生舍舍立見弒叔姬不安於齊魯請於周使單伯使齊歸之齊不道而皆執之也公穀謂單伯魯大夫其并見執者淫也愚按書齊人執單伯書齊人執子叔姬兩書齊人者正不欲以姬繫於單伯而嫌於淫也此當從左氏而公穀所傳殆齊人誣而執之之詞與若單伯之為周大夫或魯大夫則不可知也莊元年單伯逆王姬去此已七十餘年若以為魯大夫不應父子祖孫皆以名氏稱單伯伯以爵而周畿內諸侯也若以為周大夫則此不明書請于周而明年書單伯至自齊於周無關也世逺不可質言十有五年春季孫行父如晉為單伯與子叔姬執於齊故也三月宋司馬華孫來盟木訥曰宋昭不君惟前年同新城之盟未嘗聘魯前日子哀以不義昭公來奔疑子哀間宋魯而魯有以議宋故來修好而又盟以質之神不書使非君命也已專盟也夏曹伯來朝曹伯十一年來朝今再至齊人歸公孫敖之喪敖以奔死於外魯不許其歸齊人飾棺置堂阜其子難請于魯故歸六月辛丑朔日有食之鼓用牲于社非禮也説見莊二十五年單伯至自齊齊釋其執也或謂行父如晉晉詰齊而齊歸之晉郤缺帥師伐蔡戊申入蔡新城之盟蔡獨不與故討之蔡自獻舞入楚至晉文敗楚而後來歸踐土溫翟泉皆與會晉文沒復從楚者十五年然蔡無以自立故也今安能得蔡秋齊人侵我西鄙季孫行父如晉傳齊人侵我故行父告于晉冬十有一月諸侯盟于扈尋新城之盟謀齊難也以無能為故略之十有二月齊人來歸子叔姬或疑亦行父請晉而得釋齊侯侵我西鄙遂伐曹入其郛齊侯再侵者謂諸侯不能也伐曹者以曹兩朝魯也十有六年春季孫行父會齊侯于陽穀齊侯弗及盟魯以齊兩見侵而求盟齊以行父兩謀齊於晉而不肯與盟夏五月公四不視朔自二月至五月也穀梁謂厭政甚矣六月戊辰公子遂及齊侯盟于郪丘郪音西又七西反行父不得盟公使遂納賂于齊乃得盟齊強魯弱也郪丘公羊作犀丘穀梁作師丘秋八月辛未夫人薑氏薨聲薑僖公夫人文公母毁泉臺公羊謂泉臺即築于郎之臺也先祖為之已毁之不如勿居而已矣左氏謂有蛇自泉宫出入于國如先君之數秋聲薑薨故毁泉臺劉氏曰以為祥而毁之非明民之道楚人秦人巴人滅庸左氏載楚大飢戎與麋交伐之庸帥羣蠻叛楚楚議徙都阪高蒍賈曰我能往冦亦能往不如伐庸遂滅庸岷隱曰秦楚相逺其所以得伐庸者由巴蜀以通道木訥曰楚成王穆王求諸侯直與中國爭鋒今莊王之興西連巴秦繞出周晉之後西南既合而北趍晉則中國諸侯在其掌握矣然則蒍賈之謀乃轉敗為成而飢饉兵革之來適為莊王強楚之資也冬十有一月宋人弒其君杵臼襄公夫人王姬欲通公子鮑使甸弒昭公書曰宋人弒其君者先儒謂昭公無道國人所共棄若衆殺之然也杵公羊作處十有七年春晉人衛人陳人鄭人伐宋左氏曰晉荀林父衛孔達陳公孫寧鄭石楚伐宋討曰何故弒君猶立文公而還文公蓋即公子鮑也木訥曰宋之弒君以公子鮑之厚施得民奉以為逆也今諸大夫伐宋卒立鮑而還則安在其為討罪哉成宋之亂而已夏四月癸亥葬我小君聲薑九月而葬左氏謂齊難故緩劉氏曰聲薑既葬而後有齊師耳高氏曰九月而葬慢也聲公羊作聖齊侯伐我西鄙六月癸未公及齊侯盟于穀諸侯會于扈秋公至自穀齊伐魯魯公子遂以賂得盟于郪丘齊猶以公不親盟復來討焉公子遂請盟公乃親盟于穀諸侯之會于扈平宋也公以齊難不及與胡銓集善曰文公立十有八年大夫盟會十八九獨此書公盟亦見大夫之張也高閌集注曰穀本齊地僖二十六年公以楚師伐齊齊以是憾魯今公不與扈之會而強盟齊于穀茍免齊難而已岷隱曰文十五年書諸侯盟于扈至是書諸侯會于扈其事正同始也魯文公後至晉侯取賂於齊無功而還故春秋略之不列序諸侯今扈之會文公不與諸侯成宋之亂而不能討其罪故春秋復得而略之冬公子遂如齊拜穀之盟十有八年春王二月丁丑公薨于臺下崔氏曰臺下者泉臺之下也其臺毁矣而下屋存焉薨于臺下非正也秦伯罃卒秦康公立十二年卒夏五月戊戌齊人弒其君商人商人者懿公也弒君篡立四年刖邴歜之父而使歜僕納閻職之妻而使職驂乘故二人共弒之齊人迎立其兄公子元是為惠公止齋曰職歜微不稱盜而稱齊人所以罪商人也六月癸酉葬我君文公五月而葬秋公子遂叔孫得臣如齊冬十月子卒夫人薑氏歸于齊季孫行父如齊公子遂襄仲也叔孫得臣莊叔也子者立未踰年之稱子之名左氏以為惡公羊以為赤蓋夫人薑氏所生也初文公之妃敬嬴生倭是為宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲欲立之仲請于齊齊許之故襄仲殺惡及其弟視而立宣公夫人薑氏遂歸齊將行哭而過市曰天乎仲為不道殺適立庶市人皆哭魯人謂之哀薑所謂出薑不允於魯者也書曰子卒左氏以為諱之也木訥曰遂及得臣如齊而子卒子卒而夫人薑氏歸于齊其義隱而彰矣行父之如齊張氏以為告宣公之立也沙隨程氏曰遂得臣行父三人皆與謀以其前後如齊而知之也蓋是舉也惟叔仲惠伯名彭生者不可公子遂矯太子惡之命召而殺之莒弒其君庶其莒子生僕又生季他愛季他而黜僕故僕弒逆而以其寶玉來奔傳載行父逐而出諸竟曰如鷹鸇之逐鳥雀者也木訥趙氏鵬飛曰三家之強雖自僖公而僖公之世未嘗敢專也至文公之世孟氏則公孫敖為戚之會埀隴之盟叔孫氏則得臣會晉伐沈敗狄于鹹季氏則行父如陳如晉帥師城邑至東門氏則襄仲見於經者凡九非會則盟非盟則如非如則伐其橫尤甚於三家然極其源皆由文公怠懦不君也即位之初霸主之會鄰國之好未嘗親之率以大夫往閏月不告月常月不視朔怠惰庸昏不出寢門何以為國宜諸大夫互結私援外事大國內懷國人而自封植公室寖弱而權移於人也一身未瞑二子為戮妃妾不能相保終春秋之世權不能復收而魯遂以微文公不能逭其責也宣公名倭或作接文公庶子襄仲為其妾母敬嬴殺嫡而立之諡法善問周道曰宣元年春王正月公即位岷隱曰魯之威宣皆繼故而立無所畏懼偃然行即位之禮春秋即其實而書之公子遂如齊逆女三月遂以夫人婦薑至自齊岷隱曰宣公執親之喪未一年遽遣人逆女人道廢矣木訥曰諸侯娶元妃以奉宗廟非茍結私黨以濟其惡也弒太子立宣公絶薑氏皆仲遂與敬嬴之謀今謀既濟矣獨虞薑氏在齊有以謀魯也故宣公即位坐席未溫而公子遂如齊逆女三月遂以夫人婦薑至自齊其為謀豈不迫哉蓋齊惠亦負篡弒之惡故不暇責魯特患薑氏有言於惠公也今既逆齊女而歸則惠益親魯薑氏有言惠有所不信爾故得歸薑則宣公之位定敬嬴公子遂可以無虞故書曰公子遂如齊逆女遂以夫人婦薑至自齊書公子遂者娶齊之謀本於遂也書婦薑者婦有姑之稱敬嬴以妾母專政娶齊之謀遂與敬嬴同之也夏季孫行父如齊左氏傳曰季文子如齊納賂以請會胡銓集善曰宣篡立未列於會故如齊納賂以請會其下書齊人取田則納賂明矣行父之惡如此而室無私積近於公孫之布被木訥趙氏曰拜成婚也前年夫人薑氏歸于齊季孫行父如齊今夫人婦薑至自齊季孫行父復如齊前日絶其姑今日賀其婦婦姑均齊女也姑惡視之母則絶之婦倭之夫人則賀之倭諸大夫立之也惡及視諸大夫殺之也殺者絶而立者賀其謀皆出於大夫大夫之橫一至是耶愚按行父今此如齊古説皆以為請會木訥獨以為拜婚二説皆通而拜婚之説則於經文之比事尤切然其為行父之邪謀則一也晉放其大夫胥甲父于衛甲父之見放左氏以為河曲之戰不用命然今已七年矣胡氏曰放猶羈置毋去其所木訥曰天子四海為家大臣有罪而法不至死則放之于荒裔舜放歡兜于崇山是也晉諸侯爾越晉境則為他國安得荒裔而放之今放之于衛衛鄰國也使甲父而賢則是借賢與人若其不賢則衛豈肯容之晉放之衛釋之晉何以責衛衛豈晉之荒服乎師氏曰春秋之時列國相與藏姦匿怨負罪於此而見用於彼孰能必其禁錮哉公會齊侯于平州公子遂如齊六月齊人取濟西田左氏謂會于平州定公位也公子遂如齊拜成也取濟西田者魯以賂齊也春秋之世弒君篡國者已列于會則諸侯不得致討故公子遂為宣公賂齊以求會既會而齊取其賂也胡氏曰篡弒之賊無所容於天地之間身無存沒時無古今其罪不得赦也以列於會而不復討是率中國為戎夷棄人類為禽獸此春秋所以作也戴氏曰威公之立也不義以許田賂鄭宣公之立也不義以濟西田賂齊懷慚抱愧制命於人亦可哀矣趙氏曰魯致賂而書齊取齊欲之也既為平州之會而取濟西田則出薑之恨無所伸惡視之寃無所訴矣秋邾子來朝木訥曰邾自僖文之世屢為魯所虐至是因宣公之立而求成焉故來朝然十年而公孫歸父伐邾取繹愚聞邾舊雖附庸於魯自升為子常屬于齊每視齊為向背今魯與齊好所以來朝相安十年恐亦來朝之力楚子鄭人侵陳遂侵宋晉趙盾帥師救陳宋公陳侯衛侯曹伯會晉師于棐林伐鄭岷隱曰晉楚二國不務德而力爭陳鄭一彼一此皆不足以得二國之心鄭伯以晉人受賂之故而受盟於楚陳人以楚人無禮之故而受盟於晉故楚鄭侵陳及宋而晉亦救陳陳宋怨鄭者也故復與衛曹會晉伐鄭木訥曰楚莊天下姦雄也前日滅庸首結秦巴以侵中國之西今日侵陳侵宋又結鄭以侵中國之東未得秦巴則不及庸未得鄭則不及陳宋必秦鄭既復東西之勢合羽翼之謀成而後趨中國時霸者不作楚方跋扈盾不救則陳宋為楚矣然經書救陳而左氏以為救陳宋蓋意之耳楚之伐宋必越陳而後及宋故救陳則宋自解趙盾救陳未返而次于棐林四國之君會之伐鄭盾以大夫尸諸侯之事必責正義而誅之則諸侯何所宗中國何所恃故春秋不得已而豫之止齋曰南北之勢於是始也後十五年而宋楚平後五十年而晉趙武楚屈建同盟于宋諸夏之君分為晉楚之從矣南北之勢於是始故謹書之也冬晉趙穿帥師侵崇岷隱曰穿言我急崇秦必救之吾以求成焉侵崇之役最為無名木訥曰穿盾之黨也崇秦之與國也穿見盾主諸侯而已無寸功以為秦於晉世仇也於是帥師侵崇蓋無事生釁以立己功媚盾而固其寵焉公羊以侵崇為侵柳云柳者天子之邑劉氏嘗辨其非晉人宋人伐鄭高氏集注曰宋怨鄭與楚侵我復請晉伐鄭晉亦以前救之無功遂連兵伐之木訥曰趙盾何德服人而力又不足伐之卒不能得鄭而為宋生敵故明年有大棘之戰而華元被獲於鄭二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元左氏載鄭受命于楚伐宋宋敗贖華元于鄭而華元逃歸木訥曰大棘宋地鄭伐宋也楚未嘗伐鄭鄭穆無勞而從楚晉再伐之而不反今又為楚伐宋附夷狄而戕中國可勝責乎歸生雖勝卒為弒逆之階華元雖敗不失為賢大夫信乎聖門不道戰功也石林曰華元盡力於戰不以獲恥華元善之也秦師伐晉左氏謂報崇之役也張氏謂穿欲求成而反召兵趙氏謂秦晉自河曲之戰于今七年無疆場之虞蓋亦厭戰爾趙穿無釁而侵崇秦於是有報怨之師穿之罪不勝誅矣夏晉人宋人衛人陳人侵鄭左氏載秦圍焦趙盾救之遂自陰地侵鄭鬭椒救鄭而盾去之胡氏謂盾之去理曲去也趙氏謂塞宋之請姑為黽勉之行侵鄭而已秋九月乙丑晉趙盾弒其君夷臯傳載晉靈不君趙盾驟諫晉靈先使鋤麑賊之麑不忍又飲盾酒伏甲將攻之盾逃而穿弒靈公盾未出境而復位又不討賊故董狐歸獄於盾而書盾弒君程伊川曰聖人不言趙穿何也曰趙穿手弒其君人誰不知若盾之罪非春秋書之更無人知也胡康侯曰盾偽出境而實聞乎故高貴鄉公之事抽戈者成濟倡謀者賈充當國者司馬昭也陳泰議刑直欲指昭則盾為首惡明矣愚按凡皆據傳而釋經者也劉侍讀曰左氏敘孔子之言曰惜也越境乃免非也安在越境則君臣之義絶乎吾以為此非仲尼之言胡侍郎銓曰盾弒逆之迹見於不討賊所以正其罪不得言為法受惡葉石林曰左氏載孔子之言稱盾能為法受惡為良大夫而許之以越境乃免此非孔子之言也弒君天下之大惡使其與聞乎弒雖在四海之外無所逃安取於越境使不與聞雖在朝如晏子誰敢責之趙木訥曰弒君者趙穿而春秋書曰趙盾弒君者穿之手而盾之心爾裴度當國蘇佐明弒敬宗度亦不討賊誰以罪裴度趙盾弒君之事既白學者胡為廢經任傳妄以賊為賢耶愚按凡皆據經而折傳者也胡安定曰三傳皆謂趙盾不弒今經書盾弒若言非盾是慿傳也歐陽公曰趙穿弒君大惡也盾不討賊不能為君復讎而失刑二者輕重不較可知今免首罪為善人使無辜者受大惡此決知其不然也然則夷臯孰弒曰孔子所書是矣趙盾弒之也西疇崔氏曰春秋謹名分别嫌疑今加弒君之罪於人不為異辭以見之恐非聖人之意傳或失之愚按凡皆離傳而言經者也此大事也故兼録使來者考焉冬十月乙亥天王崩匡王在位六年崩弟瑜立三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望張氏曰此又因事之變以明魯郊之非禮也趙氏曰魯之僭郊天不從而魯必為之郊牛之變皆天示之譴也卜而不從者四鼷鼠食牛者三牛口傷者一魯不自咎其僭必將用之凡郊之不從牲之變故皆非人力所能為也愚按魯僖始欲僭郊而天不從今魯宣再欲僭郊而天又不從魯惠雖請僭郊於平王至今不可得而僭天道之可畏如此不郊而猶三望趙氏謂不得僭於天而僭於地天地豈有異理天所不享地安得享之葬匡王四月而葬速楚子伐陸渾之戎岷隱曰陸渾之戎近在伊雒中國不能問而楚人伐之然楚意不在戎也觀兵天子之疆而問鼎之大小輕重其僭亂若此木訥曰楚莊於此蓋未離乎夷也霸業以尊周為義舍尊周無以令諸侯而莊王首犯天下之忌其不能霸諸侯而徒為戎首無足怪者陸公羊作賁公穀無之字夏楚人侵鄭傳載春晉伐鄭鄭及晉平夏楚侵鄭鄭即晉故也胡氏曰不書晉之伐楚之平者仲尼削之也晉成新立鄭背僭歸霸反之正也故獨著楚人侵掠之罪書侵鄭則鄭及晉平可知矣趙氏曰楚莊之興兵未嘗及鄭而鄭歸之今楚觀兵于周而鄭叛楚歸晉信乎德義者霸主之基也既以不義而失鄭乃區區以兵侵鄭是侵掠中夏而已秋赤狄侵齊赤狄狄之别種孔氏疏云謂之赤狄白狄者俗尚赤衣白衣也地譜洛州春秋赤狄之地木訥曰僖文之世嵗有狄患至文十一年叔孫得臣敗之于鹹狄患頓息狄衰而赤狄興焉赤狄隗姓潞甲及留吁皆赤狄也今其侵齊始見于經許氏曰楚侵其南狄侵其北此中國大過棟橈之時戴氏曰他日晉人滅潞氏甲氏則赤狄之存無幾矣宋師圍曹傳載宋公即位盡逐武穆之族武穆之族以曹師伐宋今宋師圍曹者報之也胡氏集善曰宋文弒立已為亂階而欲治人之亂故春秋不書曹師而特書宋師冬十月丙戌鄭伯蘭卒葬鄭穆公鄭穆公名蘭左氏所載夢蘭而生刈蘭而卒者也立二十二年卒木訥曰葬不月闕文也四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向胡銓集善曰邾莒有怨公黨於郯而偏於莒此莒人所以不肯平又伐莒而取其邑左氏謂之以亂平亂也岷隱曰莒大而郯小故平莒為難平郯為易郯之於魯有伯姬之親故宣公主乎是平莒不肯之辭傲然而不顧也故宣公不勝其忿伐莒而取向昔魯威公欲平宋鄭宋辭平而威公至於伐宋其事正與宣公類夫二公皆以不義得國諸侯誰其信之不能省躬而逞怒於人滋益罪矣崔氏曰向吾故邑桓十六年城向是也豈魯與莒有好故向在莒至是莒不肯平然後公復取向與張氏曰若出於公不必假齊一語而服今挾齊為重莒尚不肯秦伯稻卒秦共公立四年卒夏六月乙酉鄭公子歸生弒其君夷歸生者子家也左氏載公子宋以染指黿鼎之故鄭伯將殺之宋與子家謀先子家懼其譖而從之書歸生弒其君者權不足也胡氏曰歸生為正卿嘗統大兵聞宋逆謀登時而覺先事誅之猶反手耳石氏曰歸生不從則子公不弒靈公不死凡鄭之亂歸生為之也木訥曰左氏載食黿之事其迹甚誣世豈有一饌之隙而弒君哉赤狄侵齊以齊之強連年為狄所侵齊不能報狄故再至秋公如齊公至自齊木訥曰公七年之間五如齊蓋齊取濟西田屢屈而朝齊者請是田也十年濟西之田歸而齊侯元卒公復如齊拜田且弔焉頃公在位則不復如齊矣愚謂此亦臆度以其事之前後恐然爾冬楚子伐鄭左氏曰鄭未服也趙氏曰鄭弒其君諸侯不問楚伐為有辭張氏曰楚自去年至十年侵伐鄭者凡五至十一年盟鄭于辰陵而鄭又徼事晉於是十二年圍鄭入之遂敗晉于邲而後鄭服楚晉人之不振有自來矣然則鄭之從楚豈得已哉五年春公如齊夏公至自齊秋九月齊高固來逆叔姬叔孫得臣卒冬齊高固及子叔姬來高固齊大夫也叔姬宣公之女也公穀皆作子叔姬别其非先君之女也左氏傳因公如齊高固使齊止公以求婚也叔孫得臣者公子牙之後莊叔也其卒不書日諸家皆生義例未必其然或云闕文者恐近之也岷隱曰宣公連年如齊卑辱已甚今因如齊高固使齊侯止公以求叔姬無乃太甚乎前此魯女多為諸侯夫人今下嫁於大夫固已少屈矣宣公又自主昏是以大夫自處也高固之逆與子叔姬之偕來具書於春秋益可恥矣向者莊公之時莒慶來逆叔姬其後僖公及莒慶盟于洮皆魯之恥也胡康侯曰禮嫁女留其送馬及廟見成婦遣使反馬則高固親來非禮也又禮女子有行嵗一歸寧今見逆未易嵗叔姬亟來亦非禮也楚人伐鄭鄭三年三被兵不為楚屈而晉不能芘之東萊曰楚伐鄭而陳服楚矣六年春晉趙盾衛孫免侵陳鄭從晉三年三被楚兵故陳畏而從楚晉時有難趙盾僅與孫免侵陳岷隱謂示諸侯以為名而已非能回陳人從楚之心也木訥曰晉楚爭陳自此始夏四月秋八月螽書災也冬十月書備四時也七年春衛侯使孫良夫來盟左氏謂良夫者孫桓子來盟者謀通晉也木訥曰魯宣以援立之賜事齊而外晉晉成將求諸侯以興霸業惟衛久睦於晉凡伐宋鄭侵鄭侵陳無役不從而魯宣未嘗與今晉將為黑壤之盟故俾衛求魯結盟以示信夏公會齊侯伐萊秋公至自伐萊萊東夷之國近於齊齊故伐之魯為齊役故助其虐大旱書災也冬公會晉侯宋公衛侯鄭伯曹伯于黑壤胡銓集善曰自文公以來中國無盟主終晉靈之世未嘗一合諸侯至此成公立五年始有黑壤之會而大夫不與焉聖人皆書其爵庶幾諸侯復桓文之業攘夷楚而尊中國也愚按此會左氏謂魯公見止於晉以賂免而不得盟故止書曰會木訥趙氏辨之曰陽穀之會齊不肯盟季孫行父則書齊侯弗及盟平丘之會公不得同歃則書公不與盟今經無其文左氏妄生此説當以經為正岷隱戴氏亦曰誠如左氏所言則春秋當以公不與盟書豈得闕而不録八年春公至自會去年冬會黑壤今春來歸也夏六月公子遂如齊至黃乃復下書遂卒于埀此蓋以疾而返也禮聘未至不幸而卒則以尸造于朝介將事無反也今以疾遂反是廢君命故不書疾惟書至黃乃復辛巳有事于太廟仲遂卒于乖壬午猶繹萬入去籥人臣之卒當祭則不告終祭則不繹繹者明日又祭也今仲遂卒與祭同日則明日之繹不必講也猶繹可已而不已也萬舞名也入則用之籥管也有聲故去之魯人知卿佐之喪不宜作樂而不知廢繹上書公子遂此云仲遂者承上文也仲字也戊子夫人嬴氏薨嬴氏宣公之妾母也稱夫人自成風始嬴公穀作熊晉帥白狄伐秦木訥曰秦晉自河曲戰後久已厭兵至晉趙穿生事侵崇秦嘗報晉今秦共晉靈皆沒怨已易世而晉復修怨伐秦岷隱曰昔襄公與薑戎敗秦師于殽今成公又與白狄伐秦內外親踈皆倒置矣張氏曰白狄秦同壤之國今銀夏之地楚人滅舒蓼杜氏注舒蓼二國名木訥曰舒蓼一國也舒同宗而異國曰舒蓼曰舒庸曰舒鳩皆舒也所謂羣舒亦猶狄均曰狄而異種也舒蓋楚之黨而舒逼近中國舒滅則中國失南門矣胡氏曰是時楚人滅舒蓼及滑汭盟吳越勢益強大將為中國憂矣蓼穀梁作戮秋七月甲子日有食之既食之既則為變大矣冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬葉石林曰諸侯之葬為雨止禮與禮也古者庶人縣窆不封不樹不為雨止潦車載蓑笠蓋士之禮然言不為雨止豈固有為雨止者乎諸侯旅見天子雨霑服失容雖入門猶廢而況送死之大乎鄭夾漈曰雨不克葬雨已乃葬葬必以禮雨不成禮且以孝子之心雨且葬是欲葬其親也胡康侯曰送終大事人情所不忍遽者可冒雨不待成禮而葬乎崔西疇曰禮既葬日中而虞葬日虞弗忍一日離也今日中而克葬則僅及乎是日虞也若日下昃克葬則不能乎是日虞矣其克葬所以志日之蚤暮木訥曰或謂嬴氏殺嫡立庶天譴故雨不克葬此附會之説爾葬定公亦雨不克葬豈亦天譴耶嬴氏之惡不重於文薑而文薑之葬不雨豈天亦私文薑耶其説不根甚矣嬴氏書葬譏妾母奪嫡為小君而雨不克葬譏無備耳愚按春秋惟書事實而善惡自見讀春秋者自多意度之耳譏且未必而況可指雨為天譴耶敬嬴公穀作頃熊城平陽高閌集注曰懼晉故也方舉大喪又城平陽重困民力楚師伐陳左氏載陳及晉平楚師伐陳取成而還木訥曰舒蓼楚之與國也無罪而見滅宜陳之懼而叛楚也然晉成亦無足依者故楚師伐陳而陳復為楚九年春王正月公如齊公至自齊夏仲孫蔑如京師左氏曰公於齊則冒母喪而往於天王則待召聘而往胡氏曰嵗首月公朝齊夏使大夫聘京師戴氏曰公自即位己親如齊者三天子召聘則仲孫蔑一至京師而已愚按比事而觀則輕重先後之倒置可知召聘事見左傳蔑即孟獻子也齊侯伐萊高氏曰狄比侵齊齊不敢報萊不犯齊齊亟伐之畏強凌弱可觀齊惠矣戴氏曰萊於齊為近故齊侵必欲服之觀夾谷之會萊人以兵劫魯侯則萊之屬齊有自來矣秋取根牟杜預曰根牟東夷之國公羊曰根牟邾婁之邑戴岷隱斷之曰書根牟而不繫於邾知其為國明矣此一説也崔氏曰根牟萊邑齊取之也趙氏曰以職方考之東萊有牟平又有東牟則根牟即東牟耳經書牟人葛人來朝公孫兹如牟皆曰牟不曰根牟豈可以根牟為牟國耶根牟萊邑也萊逼於齊齊伐之而取其邑至襄六年齊卒滅萊萊之弱而亡自取根牟始此一説也高氏集注曰根牟蓋萊邑也七年公會齊侯伐萊此齊侯再伐萊公雖不與伐而乘危取之昭八年傳秋大搜于紅自根牟至于商衛或又曰齊念魯之勤已伐萊割根牟以與之也此又一説也愚按世逺皆不可考所可考者昭八年根牟屬於魯則謂魯取根牟者近之也八月滕子卒滕昭公九月晉侯宋公衛侯鄭伯曹伯會于扈晉荀林父帥師伐陳辛酉晉侯黑臀卒于扈左氏曰會于扈討不睦也陳侯不會晉荀林父以諸侯之師伐陳晉侯卒于扈乃還胡氏曰會于扈以待陳陳侯不會然後伐之幾於自反而有禮矣在會諸侯皆以師聽命而荀林父兼將之則其師輯矣晉主夏盟又嘗救陳所宜與也而陳惟楚之即夫豈義乎趙氏曰陳蓋以晉不足依而從楚然鄭尤逼於楚而一心事晉亦足以安陳歸中國豈不得為鄭乎高氏曰齊與諸侯不睦而魯獨事齊故公不與會晉侯之卒亦不會葬愚按晉侯者成公也立七年晉自靈公不能繼文襄之業中國無與主盟會皆出大夫至成公方會諸侯于黑壤又會于扈中國賴之冬十月癸酉衛侯鄭卒成公立三十五年卒而穆公立方魯僖二十八年成公嘗執于晉故平生事晉甚謹宋人圍滕伐喪楚子伐鄭晉郤缺帥師救鄭晉成方卒楚乘隙而伐鄭晉景方立而未能霸雖郤缺救之不能得鄭是以十一年辰陵之盟鄭子良曰晉楚不務德而兵爭與其來者可也乃從楚今此郤缺救鄭鄭伯敗楚師於栁棼國人皆喜惟子良獨憂愚按楚莊之立加兵於鄭者凡四而兩書楚子説凡例者紛然愚意書楚子者君為將也書楚人者大夫為將也夷狄猾夏何可褒而以書楚子曲生意義耶陳殺其大夫泄冶陳靈公淫乎夏姬泄冶以諫死泄冶公穀皆作泄冶張氏治曰泄左氏本作泄因唐人諱世字雖偏傍亦然故改泄為泄十年春公如齊公至自齊齊人歸我濟西田魯君臣交至於齊殆無寧嵗故齊懷其媚悅之意而還其所賂之田夏四月丙辰日有食之杜曰不書朔官失之己巳齊侯元卒齊崔氏出奔衛齊惠公立十年卒而頃公立木訥曰惠公卒而崔氏奔則崔氏寵於惠而不容於國人久矣左氏乃謂崔杼有寵而高國畏其逼且自是至崔杼之逆凡五十有一年古者四十而仕五十而爵則崔杼之弒蓋百嵗矣何杼如是之壽耶蓋附會也公如齊五月公至自齊左氏謂奔喪也蓋魯宣之事齊如此癸巳陳夏徵舒弒其君平國左氏載徵舒者夏姬之子陳靈公與孔寧儀行父淫於夏氏公謂行父曰徵舒似女對曰亦似君徵舒病之故射公殺之靈公立十五年見弒而成公立六月宋師伐滕木訥曰前年宋圍滕滕不服今又伐之以滕之小安能事二國事魯則宋伐之事宋則魯伐之宋成才免晉楚之虐曷不以己處晉楚間之心為心乎左氏謂滕恃晉而不事宋以職方考滕越齊衛而後至晉安能越二國事晉哉蓋事魯而不事宋晉魯有亥豕之似左氏誤附會矣公孫歸父如齊葬齊惠公歸父公子遂之子所謂東門氏者也晉人宋人衛人曹人伐鄭前日楚子伐鄭郤缺之救不能得鄭故鄭服于楚而晉又伐之秋天王使王季子來聘報仲孫蔑之聘也任氏曰宣公即位十年未嘗一覲天子而於齊五朝未嘗一問京師而於齊六聘及天王召聘仲孫僅往而王季子已來戴氏曰自是周室日衰天子之使亦不復至魯矣公孫歸父帥師伐邾取繹歸父蓋自廣其邑也東門氏之強豈減季氏哉夾漈曰邾魯之間繹山多矣邾文公遷于繹是邾都也非此繹也繹公羊作蘱大水災季孫行父如齊冬公孫歸父如齊齊侯使國佐來聘左氏傳季文子初聘于齊謂頃公初立也子家如齊伐邾故也謂取繹而往謝也國武子來報聘謂報季文子也岷隱曰齊侯之喪宣公既親如齊矣公孫歸父繼往會葬而行父歸父又皆如齊一年之間魯之君大夫接踵在齊齊不得已僅一報聘厯觀魯十二公其求媚大國未有如宣公之甚者也愚意不特宣公若行父歸父之往亦各自結於齊耳飢岷隱曰宣公即位十八年春秋兩書其飢始以大水而飢繼以蝝生而飢楚子伐鄭左氏載楚子伐鄭晉士會救鄭逐楚師于潁北諸侯之師戍鄭吕東萊曰自宣四年以後鄭遂南北兩屬子良曰與其來者可也鄭終始謀䇿只出於此子産所謂玉帛以待于二竟惟其強者從之與此説一般趙木訥曰鄭一失身餌楚五受楚兵從楚者六歸晉者五乍晉乍楚不幸而處晉楚之間不能自立也十有一年春王正月夏楚子陳侯鄭伯盟于辰陵左氏載楚又伐鄭鄭用子良之言而從楚向惟陳服楚今鄭與陳同服楚辰陵之盟蓋楚得中國二諸侯矣辰陵穀梁作夷陵公孫歸父會齊人伐莒齊魯嘗平莒郯之怨莒不肯而魯伐之取其向矣今復挾齊伐之此又見歸父之橫而附齊之固也秋晉侯會狄于攢函木訥曰楚子盟陳鄭于辰陵而晉侯會狄于攢函強弱判矣內失陳鄭而外求狄得狄何益中國哉張氏曰晉侯為盟主而往與狄會舍夏徵舒之罪以遺楚討冬十月楚人殺陳夏徵舒丁亥楚子入陳納公孫寧儀行父于陳諸家多以討賊譽楚愚按楚子初謂陳人無動將討於少西氏少西氏者夏徵舒之祖子夏之名也已乃入陳而縣之是以盜賊之行紿而取之也討賊者如是乎徵舒弒陳靈者也公孫寧儀行父與陳靈昏淫致陳靈之弒者也以法則徵舒之罪重以情則公孫寧儀行父之罪尤重今殺徵舒而納公孫寧儀行父討賊者如是乎善乎張氏洽之言曰孔寧儀行父必因奔楚誘楚子以利故楚子殺徵舒而縣陳微申叔時之言則陳遂亡矣愚因張氏之説而推之則楚子受孔寧儀行父之奔故殺徵舒為二子報私忿欲因而利之耳諸家與楚以討賊何過耶十有二年春葬陳靈公靈公淫昏見弒今二十有二月而葬蓋其同為淫亂之臣孔寧儀行父方歸自奔楚而葬之前此國之人不葬也楚子圍鄭夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績邲夫必反左氏以此譽楚滔滔數千言竊意此楚人之言也陳與鄭皆服楚盟于辰陵矣未幾楚先判盟入陳而欲滅之若以為討徵舒之罪則徵舒之弒在宣十年之夏辰陵之盟在宣十有一年之夏弒已及年此時何不討若果討賊何為因欲滅人之國楚自叛盟而行無道於陳如此陳鄭一體鄭尤新盟則鄭亦如之何不背楚而歸晉是楚之伐鄭者非也鄭伯肉袒以逆楚既舍之晉欲退師獨以先縠違衆取敗晉師雖敗中國救鄭之義豈與之俱敗是晉之敗於楚不足為辱也世多以成敗論人故譽楚而貶晉爾春秋但書楚伐鄭而以晉主戰秋七月冬十有二月戊寅楚子滅蕭楚莊入陳伐鄭敗晉滅蕭慿陵中國甚矣左氏於滅蕭尚歸曲於蕭之殺二囚而歸美乎楚之拊三軍大扺左史楚人而左傳多楚人之言也木訥曰觀今日滅蕭之舉則前日之復陳復鄭果真情乎知陳鄭之祀未易絶爾晉人宋人衛人曹人同盟于清丘此以邲之敗而諸國同盟以相保然先縠正致敗者也主盟則非其人矣清丘衛地宋師伐陳衛人救陳陳方復國宋遽伐之故衛渝盟而救之十有三年春齊師伐莒岷隱曰向也魯會齊伐莒今焉齊自伐莒蓋莒去齊為近齊人志在吞併始猶資助於人終則自專於已木訥曰齊魯嘗同平郯莒莒不肯而伐之魯有向之獲而齊未有所獲也故齊又再伐之伐莒公羊作伐衛夏楚子伐宋陳叛中國而從楚清丘之盟陳不至而宋伐之故楚子伐宋蓋為陳伐之也秋螽書災冬晉殺其大夫先縠左氏載赤狄伐晉及清先縠召之也冬晉人計邲之敗與清之師歸罪於先縠而殺之盡滅其族蘇氏曰殺之宜也然先縠先軫之後晉之舊勳盡滅其族過也十有四年春衛殺其大夫孔達左氏載清丘之盟晉以衛之救陳也討焉孔達曰苟利社稷請以我説乃縊而死衛人以説于晉而免夏五月壬申曹伯壽卒曹文公立二十三年卒晉侯伐鄭十二年晉救鄭不及鄭已從楚而晉徒敗于邲今敗未兩年復興爭鄭之師秋九月楚子圍宋左氏載楚使申舟聘齊而不假道於宋宋殺其使楚遂圍宋愚按楚滅蕭宋救蕭故楚已伐宋又以不假道挑釁以殺其使為名而圍之木訥曰伐宋而宋不屈繼之以圍其必宋之服也審矣楚將橫行中夏許蔡已從陳鄭已服則次及於宋宋中國之門戶也得宋則齊魯以之此楚所以必於服宋厯三時而圍不解卒得宋平而後已葬曹文公五月而葬冬公孫歸父會齊侯于穀木訥曰歸父父子事齊倚齊以專魯于時宋入楚則齊魯以楚為鄙穀之會謀楚也故明年歸父會楚子于宋夾漈曰公孫遂雖卒而魯國之政猶在其子故歸父今年會齊侯明年會楚子十有五年春公孫歸父會楚子于宋左氏傳孟獻子言於公曰小國之免於大國也聘而獻物若誅而薦賄則無及也今楚在宋君其圖之公説春歸父會楚子于宋木訥曰歸父會楚子于宋謀自安之計耳説者徒見繼書宋及楚平遂以為歸父平二國之憾蓋不稽其實也歸父春會楚夏五月宋楚始平豈緩頰數月而後能平之魯與楚無一日之好安能犯其怨而為宋謀蓋宋與魯為鄰宋去則楚兵至魯矣魯見宋之危而諸侯畏楚無敢救也故懼而求服迎楚子之意而預弭其兵也夏五月宋人及楚人平左氏載晉欲救宋以伯宗之議而不敢乃使解揚如宋揚言晉師悉起矣解揚為鄭囚而獻於楚脅使反其言不可楚已欲歸申叔時教以築室反耕宋人懼使華元夜入楚師登子反之牀而起之曰敝邑易子而食析骸而炊雖然城下之盟有以國斃不能從也子反與之盟而告王退三十里乃平公羊氏載華元告子反以易子析骸之急子反亦告華元以僅有七日之糧莊王怒子反曰以區區之宋猶有不欺人之臣可以楚而無乎乃引師而去之岷隱曰宋華元楚子反親自結盟兩國息爭春秋之所豫也木訥曰楚之圍宋九月於此矣不惟宋告憊楚之兵力亦疲矣今宋能以情而告楚楚亦能以情而復之不盟不誓釋然而平是誠春秋之齊韶也六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸左氏載潞子之夫人晉景公之姊也酆舒為政而殺之故晉滅潞酆舒奔衛衛歸諸晉而殺之岷隱曰向者狄為中國患其後赤狄繼之今晉能滅潞氏執其君長而歸亦可以為功矣木訥曰晉景之立適當楚莊之霸無所施其謀外不能制楚而內滅狄焉雖若緦小功之察然猶愈乎緦小功之俱廢也而或者以滅其國虜其君為甚且虜一戎酋脫一方之民於左衽以中國滅夷狄庸得為過乎終春秋之世諸侯不復有狄患者晉之賜也秦人伐晉木訥曰晉自八年以白狄伐秦今厯八年秦桓乃修舊怨君子不尚也王札子殺召伯毛伯傳謂爭政而交相殺也杜氏注曰王札子王子札也蓋經文倒札字木訥曰王氏也札子字也與王季子同皆食采於王城而因地為氏者也未知孰是秋螽書災仲孫蔑會齊高固于無婁岷隱曰高固娶子叔姬嘗與叔姬來魯未知是會高固借公事為私行與其繼公孫歸父會穀之好與斷道之會高固逃歸意其人必專輒而不用命者自是而後齊魯之好踈矣無婁公羊作牟婁初稅畝公羊曰稅畝者履畝而稅也古者什一而藉岷隱曰八家共耕公田得其地利以共公上此之謂什一而藉今宣公復於私田之中履畝而稅之其取於民也比舊增倍至於後世遵用之哀公所謂二吾猶不足是也按此謂於公田之外復稅私田也胡氏曰初稅畝者譏宣公廢助法而用稅也初者志變法之始也木訥曰耕者助而不稅今宣公廢助法而用稅稅者責其粟而已不計公田私田之出豐凶肥埆之異也嵗不幸而凶必責豐嵗之入地不幸而埆必用私田之貢雖其法未離乎什一而民苦於凶嵗之苦輸墝田之重征此初稅畝之弊也宣公既稅畝至哀公又用田賦稅出穀粟賦出車乘始為兼取而有二吾猶不足之説愚按木訥之説雖覺寬平但賦出車乘乃自昔寓兵於農之法恐於稅民不相干難以此方為什二耳晦菴先生注二吾猶不足云周制井田大率民得其九公取其一魯自宣公稅畝又逐畝十取其一則為什而取二矣此説簡明當從之也冬蝝生蝝悅全反蝝螽子也秋螽矣冬又生子冬非蝝生之時所以為異飢秋螽冬蝝嵗所以飢十有六年春王正月晉人滅赤狄甲氏及留吁注曰甲氏留吁赤狄别種岷隱曰去年滅潞氏猶曰治酆舒之罪今又滅甲氏及留吁則太甚矣夏成周宣榭火成周者洛之東都也宣榭先儒謂宣王講武之屋也人火曰火秋郯伯姬來歸見出於郯也冬大有年穀梁曰五穀大熟為大有年岷隱曰春秋書飢書大飢一飢猶足以病民而況於大飢乎其書大者憂之甚也春秋書有年書大有年有年已足為斯民喜而況大有年乎其書大者喜之甚也愚按宣公六年螽七年旱十年水十三年螽十五年螽連年凶荒今忽大有年聖人云胡不為之喜世儒反以為譏貶者何忍也十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏葬許昭公葬蔡文公許昭公立三十年卒蔡文公立二十年卒許蔡二公皆背中國而從楚者也六月癸卯日有食之不書朔官失之己未公會晉侯衛侯曹伯邾子同盟于斷道秋公至自會時宋為楚得中國危甚幸而衛復反為中國使晉不為是盟恐曹衛復背而南嚮故晉侯為是盟以固魯衛曹邾之心胡康侯乃因郤克徵會于齊齊婦人笑其跛齊大夫赴盟而見執遂以此盟為謀齊不思徵會乃在未見笑之先豈預知其見笑故為之會以謀之耶冬十有一月壬午公弟叔盻卒穀梁傳載叔盻不義其兄以弒子赤而立織屨而食終身不食宣公之食木訥謂書公弟而且字之者春秋惟此而已十有八年春晉侯衛世子臧伐齊齊自恃霸國未嘗服晉惟晉文公之霸齊嘗懼而從之晉越四世嗣霸齊未嘗從也諸侯之強齊之次宋而已今宋與楚平故晉欲得齊以壯中國之勢及徵會而齊婦人笑其使者又不預會而使大夫來故今郤克得政怨其我笑而伐之公伐杞木訥曰杞世婚於魯杞桓公魯出而且娶魯僖文之世各一來朝宣公殺惡及視以自立杞伯未嘗來朝宣公憾之故躬自伐之夏四月秋七月邾人戕鄫子于鄫岷隱曰邾人嘗用鄫子于次睢之社此人理之所無者今復戕鄫子于鄫親至人國賊其君而殺之春秋以來亦無是事也木訥曰鄫未嘗有一日之隙於邾徒以邾鄫為鄰邾欲滅之以自廣爾以邾之小而肆毒于鄫曾無一人詆訶之信乎其為春秋之世也甲戌楚子旅卒楚莊立二十二年卒公羊曰吳楚之君不書葬辟其號也旅穀梁作吕木訥曰世之稱五霸者其論出於荀孟聖人初無是言也孔子曰齊威公正而不譎晉文公譎而不正言威文而已初不及宋襄秦穆楚莊吳闔閭越句踐也而荀孟之所謂五霸者亦所取不同各循戰國一時之稱慕而主論爾孟子之所謂五霸則威文與宋襄秦穆楚莊為五荀子之所謂五霸則威文與楚莊闔閭句踐為五如前七君者皆見乎春秋而聖人獨於威文有實豫之辭首止葵丘之盟踐土于溫之會召陵城濮之役王室賴之諸侯賴之兆民賴之聖人所以豫之者幸天下有威文而不遂為夷也若宋襄固無成功而秦穆楚莊闔閭句踐皆為中國患聖人何忍長其冦哉闔閭句踐皆逞兵以鬬其私君子不道也秦穆三敗而不退孟明其悔過之誓得列於書楚莊得陳得鄭而不有哀宋之危而隨許其平二君者以為夷狄之賢君則固也遂與威文同列則雕鸞無别矣秦穆之誓特其詞有足觀聖人取其詞而已悔其敗而益阻兵是豈聖人所望故書於春秋皆擠之九泉之下無一字之褒若楚莊者尤為中國之害又非秦穆之比秦穆鬭私怨於晉而已實不敢陵諸侯也楚莊之興直犯中國滅庸滅舒蓼滅蕭宋陳鄭聖賢之後皆被其毒假伐戎之行以觀兵于周仗討罪之名以肆虐于陳圍鄭圍宋皆必其面縛請降登牀告病而後已賢者固如是乎嘗怪後世不審孟荀之論概以五霸為賢吾故辨之暴秦楚之惡以存中國非私意也春秋意也愚按孟子所言五霸亦注者疏列之耳又成二年左傳注云夏伯昆吾商伯大彭豕韋周伯齊桓晉文此亦五霸之一説與前説不同公孫歸父如晉冬十月壬戌公薨于路寢歸父還自晉至笙遂奔齊左氏載公孫歸父以其父襄仲之立公也有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之公薨季文子言於朝曰使我殺嫡立庶以失大援者仲也夫臧文仲之子臧宣叔名許者怒曰當其時不能治後之人何罪子欲去之許請去之遂逐東門氏歸父還及笙壇帷復命於介既復命袒括髮即位哭三踊而出遂奔齊鄭夾漈曰奔齊者患三桓之討也愚按僖文之世三桓擅政東門氏亦強至宣公之立出於東門氏公孫遂東門氏益專魯政公孫歸父以子繼父而三桓反不若東門氏矣至是東門氏與宣公謀欲假晉以去三桓未及復命而公薨故三桓首逐東門氏季孫行父者三桓之尤黠者也故主其謀事勢翻覆固有必然者然三桓若出則東門氏專今東門氏逐則三桓專皆非魯之利而歸父也季孫行父也皆私心也笙公穀皆作柳公孫遂賂齊殺嫡而立宣公故宣公平生內倚公孫遂及歸父父子而外事齊絶不與諸侯交晉之所以主夏盟不能堅楚所能奪陳衛鄭宋而有之由齊魯私自相親未嘗預中國之公也齊惠公卒魯宣公方事晉欲倚之以去三桓則宣公薨而歸父之族亦逐矣然則魯宣之徇私不特魯之所以衰亦中國之所以衰也黃氏日抄卷十
