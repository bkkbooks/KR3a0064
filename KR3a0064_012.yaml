body:
  text: 黄氏日抄卷十二宋黄震撰讀春秋六昭公名裯襄公之子母齊歸諡法威儀恭明曰昭元年春王正月公即位行即位禮也叔孫豹㑹晉趙武楚公子圍齊國弱宋向戍衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢左氏載楚公子圍昏于鄭因㑹虢以尋宋之盟昔宋之盟楚已先晉今懼晉之先也讀舊書加于牲上而已木訥謂趙文自為宋之盟以弭天下之兵于今六年内外無干戈之役今又盟于虢以申前好此雖出於大夫而為天下之利大矣岷隱則謂楚公子以僭侈無君之心偃然欲專中國之盟㑹尋宋之盟復居晉上趙武無以辭雖偷安數年亦可謂無䇿者矣王氏又謂虢之㑹次楚而先書晉者趙武專尚實德不事虚爭損諸侯之幣受子産之責九年之中再合諸侯三合大夫師徒不頓民無怨讟皆武子之力而聖人善之也愚謂晉不得已而與楚共盟誠為無䇿一時天下賴之以安則不可少之也尚論其世則諒之可也然楚自此專中國流弊實始此也三月取鄆傳載季武子伐莒取鄆蓋取以附益其私莒愬於楚叔孫豹代之被執以辨得歸怨季武子久而後出見也夏秦伯之弟鍼出奔晉鍼有寵於桓如二君於景公故母使之出奔有車千乘六月丁巳邾子華卒邾悼公立十五年卒晉荀吳帥師敗狄于大鹵夾漈曰晉既盡赤狄之餘復有事乎羣狄大鹵即太原也華曰太原夷曰太鹵胡康侯曰太原在禹服之内攘斥宜矣其過在毁車崇卒詐誘而敗之襄陵許氏曰亂世逐爭竒變滋起兵車重遲寢廢兆此秋莒去疾自齊入于莒莒展輿出奔吳前歲莒子宻州見弑其二子長曰去疾次曰展輿展輿立去疾奔齊至是展輿奪羣公子秩公子召去疾入莒而展輿乃奔叔弓帥師疆鄆田叔弓叔老之子季氏私黨也乘莒之亂春取鄆而秋疆之必用師者鄆民不順也叔弓為季氏植私也葬邾悼公僅四月而葬冬十有一月己酉楚子麇卒楚公子比出奔晉經書卒而左傳稱公子圍縊殺之經傳不同當以經為正木訥曰楚麇卒而比出奔則比者必麇之子有所不容於嗣君耳二年春晉侯使韓起來聘夏叔弓如晉起韓宣子也新得政其來聘以昭公初立也觀易象與魯春秋之時也叔弓如晉報聘也秋鄭殺其大夫公孫黑黑即子晳也傳載其將作亂而疾子産數其伐伯有兄弟爭室薰隧之盟矯君位凡三罪不速死大刑將至乃縊冬公如晉至河乃復季孫宿如晉左氏載晉少姜卒公弔之晉辭以非伉儷乃還季孫宿致禭焉泰山孫氏曰公不能以禮自重取困辱也穀梁則謂公如晉不得入而季孫得入書惡季孫也孫氏又謂待昭公反季孫之不若亦晉侯之惡也三年春王正月滕子原卒夏叔弓如滕五月葬滕成公左氏曰叔弓如滕葬成公杜氏曰魯葬襄公滕子來㑹故魯厚報之秋小邾子來朝邾穆公來朝以公即位故也季武子欲卑之穆叔不可乃止八月大雩旱祭也雩以大則僭也冬大雨雹書災北燕伯款出奔齊傳載燕簡公欲去諸大夫而立其嬖寵故燕大夫比而殺其外嬖公懼奔齊四年春王正月大雨雹雹戾氣也陰脅陽臣脅君之象也去冬大雨雹今又大雨雹災之甚也夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申楚人執徐子秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳執齊慶封殺之遂滅賴傳載楚使椒舉求諸侯於晉晉不敢爭而許之遂主諸侯之㑹愚按晉主夏盟正以抗楚也楚日以强而晉通吳於㑹正結之以掎楚也自宋向戌謀弭兵合晉楚之成宋之盟楚已先晉虢之盟楚用舊書至今申之㑹晉遂不敢復出而盡遜之楚矣皆宋之盟啓之也楚昔之所仇者在晉今晉既遜之為盟主則所仇者吳耳故一出而執徐子者以徐子為吳之出也伐吳而殺慶封以慶封吳所封也而又滅賴亦以示威於吳也春秋之有霸主正以楚之害中國今反遜楚為中國霸主此莫大之變也九月取鄫岷隱曰魯常屬鄫未幾而莒滅鄫今者莒人有亂魯遂乘勢而取之冬十有二月乙卯叔孫豹卒傳載豹遇庚宗之婦生子長而歸之曰豎牛豎牛䜛殺其二子孟與仲亦絶豹之食豹以餒死豎牛乃立昭子昭子朝其家臣曰豎牛殺嫡立庶必速殺之豎牛奔孟仲之子殺之王氏曰穆子見微知幾厯事二公執政三十二年出入晉楚間常觀國之盛衰人之情偽而預為之備其識固逺矣然不能早救豎牛之禍豈非天與五年春王正月舍中軍魯初二軍襄十一年季氏始作中軍為三軍與孟孫叔孫三分公室今又舍中軍分公室為四而季氏取其二蓋乘叔孫穆子之死也反以書使杜洩告叔孫之殯杜洩投其書既葬而行張氏洽曰季孫自行父為政即城費以保障私室為竊兵權之計自作三軍叔孫豹已知其必改而以盟詛要之今豹卒而更改前制蔑公室歸私家矣岷隱曰名雖為舍實增之也公羊以為復古穀梁以為復正惑其名不察其實也楚殺其大夫屈申傳謂疑其貳於吳也然此楚之無䇿也時吳方張公如晉傳載其自郊勞至贈賄無失禮女叔齊言是儀也不可謂禮夏莒牟夷以牟婁及防兹來奔魯三歲之間取莒之鄆取莒之鄫今又納其叛臣之二邑莒日削而季氏日强矣秋七月公至自晉傳載晉侯以莒之愬欲止公范獻子不可乃歸之是幾為季孫所累也戊辰叔弓帥師敗莒師于蚡泉蚡扶粉反傳載莒人來討而敗之蚡泉蚡泉魯地也秦伯卒秦景公立四十年卒高氏集註曰史失其名冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳髙氏曰楚再合諸侯伐吳也越始見於經趙氏曰吳自襄十四年至是凡四受楚兵吳養鋒戢銳栢舉之役一戰及郢愚按自合晉楚之成諸侯雖不為晉伐楚而常為楚伐吳未見兵之可弭徒為夷狄役耳六年春王正月杞伯益姑卒此杞文公蓋晉平公母之兄弟也葬秦景公秦入春秋至此始書葬蓋往㑹葬也夏季孫宿如晉傳謂拜莒田也高氏集註謂謝前年取莒牟夷叛邑也然則宿之營私無禮甚矣左氏以其辭加籩為知禮何哉葬杞文公往會葬也宋華合比出奔衛傳載太子佐惡寺人柳華合比曰我殺之柳乃坎用牲埋書誣合比將納亡人之族既盟矣公使視之有焉乃逐華合比按宋平信寺人伊戾之譖殺太子而亨伊戾矣今不知戒復信寺人柳之䜛秋九月大雩旱祭而僭楚薳罷帥師伐吳楚於是伐吳者凡五傳載其敗于房鍾冬叔弓如楚木訥曰諸侯兩事晉楚季孫宿如晉則不得不以叔弓如楚愚按弓即宿私人兩事晉楚皆季孫專之此時公已無預乎魯政矣齊侯伐北燕將納北燕伯然取賂而還七年春王正月暨齊平左氏謂燕與齊平承上文也自榖梁以後諸家皆謂魯與齊平岷隱以定十年及齊平為比木訥以下文叔孫婼如齊涖盟為證高郵孫氏謂襄二十四年我侵齊二十五年齊伐我齊魯之好遂絶至是和平之後叔孫婼如齊涖盟足明齊魯為此平也武夷胡氏謂是時昭公結婚强吳外附荆楚其與齊平葢齊求之而許之平也說皆有理惟陳止齋說同左氏姑兩存之三月公如楚傳載楚子欲諸侯落成章華臺薳啓疆召公而往叔孫婼如齊涖盟集註謂以暨齊平故往涖盟夏四月甲辰朔日有食之陰干陽也記災秋八月戊辰衛侯惡卒衛襄公立九年卒衛孫林父以戚叛歸晉晉嘗為林父執襄公今襄公卒晉恐失諸侯乃還其田九月公至自楚三月而往九月方歸此行也傳載孟僖子不能相禮冬十有一月癸未季孫宿卒宿者季友之孫季孫行父之子友以賢稱行父以儉稱至宿橫矣自友受費而始封及行父城莒之諸鄆二邑而費始大至宿四分公室取其二傳其子意如逐昭公廢國儲而魯幾皆為季孫之有矣十有二月癸亥葬衛襄公五月而葬八年春陳侯之弟招殺陳世子偃師夏四月辛丑陳侯溺卒左氏載陳哀公元妃生偃師二妃生公子留下妃生公子勝哀公疾二妃屬司徒招與公子過殺偃師而立留公憂恚而縊叔弓如晉左氏稱賀晉成虒祈之宫也史趙曰可弔也而又賀之岷隱云時楚師滅陳晉不復問乃成虒祈之宫而魯復遣賀甚矣中國之不競也楚人執陳行人干徵師殺之陳公子留出奔鄭干氏也徴師名也陳使以哀公之死赴于楚陳公子勝愬于楚楚詰哀公死之故而殺之然於行人無預楚殺之將求釁以滅陳爾公子留越次而立懼討故奔秋蒐于紅左氏載秋大蒐于紅自牟根至于商衛革車千乘諸儒多言春蒐也而秋興之非時也木訥曰此三家既分公室故藉蒐田之禮以數軍實也春蒐者獵之淺秋獮者獵之深姑淺獵而寡獲以示不貪於弋獵其實則數軍而已陳人殺其大夫公子過招與過同殺太子偃師今歸罪於過而殺之招自洗也大雩旱祭之僭者冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐葬陳哀公楚乘陳之亂而滅之公子招殺偃師致亂者也反放之陳孔奐不聞其罪也反殺之既滅其國而又葬其君是其君無罪也楚之不道甚矣皆始於向戍謀弭兵中國不得復問而恣夷狄之為也九年春叔弓會楚子于陳左氏載叔弓宋華亥鄭游吉衛趙黶會楚子于陳許氏曰楚既滅陳威震諸夏故無所號召而諸國之大夫自往會之許遷于夷傳稱楚遷之也葢避鄭也自葉又遷夏四月陳災陳既亡矣火作其國陳雖滅而名存故曰陳災左氏載鄭禆竈謂此陳復興之祥也秋仲孫貜如齊俱縛反木訥曰貜蔑之子速之弟速無適子以弟貜後貜幼速庶子羯攝之襄三十一年羯卒貜乃嗣爵今始見經齊既平魯故貜修聘杜氏註自叔老聘齊至今二十年始修聘冬築郎囿桓四年狩于郎莊三十一年築臺于郎今又築為囿許氏謂危辱已兆而築囿非時見公之志荒張氏謂季孫意如逢君以耳目之娛而日竊其權也郎在魯南門十年春王正月夏齊欒施來奔傳稱欒高陳鮑皆齊大族至是欒高二氏以嗜酒信内取敗為陳鮑所逐欒施高彊來奔陳鮑二氏分其室陳氏始大註云高彊不書非卿也秋七月季孫意如叔弓仲孫貜帥師伐莒此季孫欲自封殖也諸家以三卿並出多謂魯舍中軍止存三軍惟陳止齋曰此四分公室叔弓為意如貳也木訥亦謂叔弓别族乃叔老之子叔肹之孫不在三家之數伐莒之師季孫將上軍叔弓佐之貜為戎右爾魯乘莒亂取鄆田納牟夷而得牟婁及防兹無怪莒有蚡泉之師也叔弓且乘其不備而敗之矣今又三大夫並出此固皆意如之為也戊子晉侯彪卒九月叔孫婼如晉葬晉平公晉平公立二十六年卒十有二月甲子宋公成卒宋平公立四十四年卒十有一年春王二月叔弓如宋葬宋平公集註謂卿會諸侯之葬為過禮禮惟使大夫夏四月丁巳楚子䖍誘蔡侯般殺之于申楚公子棄疾帥師圍蔡按傳蔡般雖弑立而楚䖍在申誘至般醉而殺之刑其士七十人卒圍之滅其國夷狄行無道已甚先儒謂春秋所以各斥其名此理曉然不待言凡例也五月甲申夫人歸氏薨註昭公母胡女歸姓大蒐于此蒲比音毗諸家皆以大蒐為越禮木訥曰非也天子六軍魯安得六軍以僭天子哉大閲大蒐皆田獵教兵之名天子諸侯所同特論其所以蒐之故葢三家數軍實以傾民心非為田獵以共宗廟賓客充君之庖也愚按説者譏昭公居母喪而蒐亦非也兵已不屬昭公矣仲孫貜會邾子盟于祲祥祲子鴆反初邾悼公屢困於魯不得已而襄二十八年來朝昭元年悼公卒莊公立未通於魯故貜與之修好秋季孫意如會晉韓起齊國弱宋華亥衛北宫佗鄭罕虎曹人杞人于厥憗魚靳反傳謂謀救蔡也晉使狐父請蔡于楚弗許許氏曰遣使請命示之不能使楚益驕此韓起之罪也趙氏曰于時楚實暴橫晉久不振聖人不責其不能救譏其無實而取名也愚謂晉一切遜楚楚屢滅國而晉不問此平公之為也今昭公初立猶知蔡之當救而力未能其志可念未必以此取救之名其弊葢自盟宋弭兵來矣惜哉九月己亥葬我小君齊歸齊諡也冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之傳載楚子滅蔡用隱太子于岡山師氏曰春秋書滅國多矣未有如此其暴者愚謂滅人之國執其人以代牲豈有人道而可責也哉十有二年春齊高偃帥師納北燕伯于陽高偃高傒之孫也陽燕邑也齊桓公昔嘗為燕闢地燕伯今失國謂齊為大國故來奔也石氏曰以三年奔齊六年納之弗克受燕賂也至此又六年矣再納之不曰于燕未能得燕也然則燕伯十年于外不知其所終也三月壬申鄭伯嘉卒鄭簡公背楚歸晉子産相之弭兵之後兩事晉楚在位三十六年民不被兵春秋之賢諸侯也夏宋公使華定來聘通嗣君也亦報叔弓之會葬也公如晉至河乃復榖梁曰季孫氏不使遂乎晉也木訥曰昭公如晉者七至河而復者五說者皆謂得罪於晉葢昭公之世政出季氏季氏疑公如晉有以議已故以公待命于河晉辭公而已如晉此季氏之奸也至五年公如晉公必有以言其故自五年之後季氏亦不敢如晉疑晉聽公以治已也然晉實不治季氏以魯貢出於季氏也故其後公如晉晉皆却之及公末年迫於季氏則寧奔齊而不敢奔晉五月葬鄭簡公三月而葬速子産知禮而若此不知何也楚殺其大夫成熊傳謂其為若敖之後而殺之以宣四年鬭椒之亂也然成熊於得臣為四世孫雖與鬭氏同出若敖已遥遥矣楚之淫刑乃如此秋七月冬十月公子憗出奔齊憗魚靳反憗與南蒯謀出季氏而歸其室於公憗告公而遂從公如晉南蒯懼不克以費叛如齊憗還及衛聞亂遂奔齊劉氏權衡曰此則季氏之仇而魯忠臣矣止齋曰然則季氏之出其君有以也憗惟有奔焉耳楚子伐徐楚謂徐吳姻也怨吳之深故既執徐子今又伐之晉伐鮮虞傳載荀吳偽會齊師假道於鮮虞遂入昔陽木訥曰晉昭嗣伯楚滅蔡不救鮮虞未嘗犯晉而懐詐伐之何為者哉十有三年春叔弓帥師圍費音祕費季氏邑也南蒯欲去季氏以强公室以其費歸晉叔弓季氏之黨故為季氏圍取之據傳費人皆叛季氏季氏欲見費人皆殺之冶區夫教季氏懷費人以德三年然後復得費以知南蒯之謀雖疎而欲去季氏雖季氏之邑人亦同此心也岷隱曰公山弗擾以費叛召子欲往葢弗擾叛季氏非叛魯也凡叛季氏者皆以張公室為名其意雖未必然其辭則正夫子之告子路曰夫召我者而豈徒哉是葢春秋書圍費墮費之意也愚又按南蒯之初奔晉也子韓晳曰家臣而欲張公室罪莫大焉竊意此時大夫皆執國命晉大夫亦惡南蒯之言害己故非之爾夏四月楚公子比自晉歸于楚弑其君䖍于乾谿楚公子棄疾殺公子比傳載楚靈王䖍初弑君自立其弟公子比出奔晉公子黑肱出奔鄭公子棄疾亦其弟也䖍滅蔡以棄疾為蔡公䖍無道棄疾因觀從召公子比歸立黑肱為令尹使觀從師于乾谿曰君立矣先歸者復其田里後者罪故衆潰而䖍自殺棄疾乃又殺比而自立是為平王按靈王䖍立十二年嘗欲得天下卜天不吉而詬天滅陳滅蔡遷六小國於荆山無歲不兵天若不假手以除之中國之患未央也秋公會劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘八月甲戌同盟于平丘公不與盟晉人執季孫意如以歸公至自會傳載晉成虒祈而諸侯貳叔向謂不可以不示威乃治革車四干乘以徵會諸侯齊不服脅而盟之魯以邾莒訴其侵伐則辭公而執意如皆示威也木訥曰晉平公不出楚用橫行天下今天勦其惡内自魚肉晉昭公乘其機以復収諸侯會十三國之君于平丘而以劉子令之夾漈曰晉以城杞之役于今十六年不得齊自雞澤之盟于今四十二年不勤王是盟也晉昭公欲修文襄之業帥諸侯以承天且服齊也止齋曰晉之合諸侯止此鄟陵之後參盟復作晉非盟主矣愚按晉久替之餘猶幸有此然叔向始謀不過欲威諸侯烏能復霸其辭魯昭而執意如不過因邾莒缺貢由魯之故初非以公義治意如之罪故岷隱謂威文之霸先屈意交魯今平公欲復霸最先治魯為非晉之主盟止於此亦理勢然也蔡侯廬歸于蔡陳侯吳歸于陳楚滅蔡在十一年今蔡侯廬即太子有之子楚滅陳在八年今陳侯吳即世子偃師之子左氏以楚平王復陳蔡為有禮榖梁以晉會平丘復陳蔡為有功木訥曰陳蔡之復雖楚復之實晉之力晉乘楚亂而合諸侯于平丘故懼而復陳蔡陳蔡之廟復血食者晉也然愚按聖人但書曰歸葢國本其國失而復得曰歸盡之矣冬十月葬蔡靈公蔡滅五年今廬復國故靈公始得葬廬者靈公般之孫公如晉至河乃復高氏集註曰晉不與公盟又執其卿公復朝之無恥甚矣豈欲因晉之執而請季氏之罪乎然季氏在晉宜其不見納也木訥曰公將請意如乎抑將除意如也晉將釋意如所以卻公也愚按先是公之憗欲去季氏以告公而從公如晉事雖不遂公之欲除季氏明矣季氏見執而公復如晉者非無恥也謂此除季氏之機也然晉之執季氏特以邾莒告缺貢之故志在利而已耳晉之大夫亦魯之季氏同惡相芘豈有為魯除季氏之事哉吳滅州來注州來楚邑也劉氏權衡曰非也滅之名施於國非縣邑所得亢也州來小國世服於楚趙氏曰州來近楚吳乘楚亂平王新立而滅之耳傳載平王謂未撫民人不敢爭其後吳以州來封季札十有四年春意如至自晉傳載子服惠伯私於中行穆子而得歸胡氏曰其始執之為乏邾莒之供其終歸之為土地猶大所命能具晉惟以利故平丘之後諸侯不合二十餘年至于召陵又以賄敗愚按平丘之會叔向主之也乃以威始之以利終之惜夫三月曹伯滕卒夏四月秋葬曹武公曹武公立二十七年卒八月莒子去疾卒冬莒殺其公子意恢傳載莒著丘公卒其子郊公不慼國人欲立著丘公之弟庚輿以意恢為郊公所善先殺之故郊公奔齊庚輿既立虐而好劒立十年國人逐之齊人納郊公十有五年春王正月吳子夷末卒夷末立十七年卒欲授其弟札札逃去乃立其子僚吳以兄弟相及正欲致國於札札當君矣而逃故僚立而夷末之子弑之吳遂以亂札之為也二月癸酉有事于武宫籥入叔弓卒去樂卒事高郵孫氏曰武宫者廢廟也成六年立之於是有事焉而大夫卒去樂卒事則合禮矣然武宫之事則不當有者春秋因變禮而推言之岷隱曰禮有出於變者可以義起若此去樂卒事是也故三傳皆以為得禮然公榖皆以為叔弓卒在外當祭而告則君有祭祀大夫之喪不以告禮也左氏以為叔弓涖事籥入而卒是也夏蔡朝吳出奔鄭朝吳蔡大夫也費無極䜛於楚而逐之六月丁巳朔日有食之記災秋晉荀吳帥師伐鮮虞傳載晉伐鮮虞圍鼓鼓人或欲以城叛荀吳使鼓人殺叛人而繕守備圍之三月鼓人請降亦不許必待其食竭力盡而後取之胡氏謂以殄滅為期而無惻隱之心愚意不納叛可也不許其降必勦之至盡者忍也且其不納叛亦知鼓可必得既欲得鼔之利又欲得不納叛之名也荀吳偽會齊假道鮮虞而就伐之此盜賊之行而又欲竊君子之稱荀吳真小人之尤者也冬公如晉木訥曰公屢如晉晉却之以季氏故也今晉方執季氏而釋之公無所憚晉無所芘故許公一朝焉十有六年春齊侯伐徐傳載齊師取甲父鼎之賂而還孫昭子歎諸侯無霸而齊君無道張氏曰齊景公立二十餘年矣崔慶相殘欒高復敗不能自强其國而爭霸圖宜國為陳氏之有也晏子雖隨事諷諫所謂以其君顯者抑末矣趙氏曰徐自齊威之霸内從中國宣成襄之世不見於經葢從楚爾昭四年申之會為楚所執為其貳於吳也自是比於楚今齊乘楚亂而伐之僥倖其或從不自量爾楚子誘戎蠻子殺之楚子號賢而誘殺蠻戎此其為夷狄也夏公至自晉踰年而返左氏謂其為晉所止秋八月己亥晉侯夷卒晉昭公立六年卒九月大雩左氏曰旱也季孫意如如晉冬十月葬晉昭公三月而葬速葢六卿不忌其君也十有七年春小邾子來朝傳載小邾穆公來朝公與之宴夏六月甲戌朔日有食之書記災秋郯子來朝傳載公與宴而昭子問其以鳥名官八月晉荀吳帥師滅陸渾之戎傳載晉請於周偽稱祭雒與三塗而潛師襲陸渾滅之幸萇宏覺而使劉子為備不然周室亦危也木訥曰辛有見伊川被髪之祭曰不百年此其戎乎其後為陸渾之戎逼近成周然俘而投之海外可也滅之亦酷矣夾漈曰陸渾本惠公自西裔遷之周世世事晉今貳於楚故滅之先師謂陸渾本𤓰洲之戎秦晉遷之伊川世為周患愚謂晉非為周除害葢討其貳已而反驚周也冬有星孛于大辰左氏謂彗除舊布新大辰火星宋衛陳鄭皆火公羊謂大火為大辰伐為大辰北辰亦為大辰先師謂孛非星名沴氣所發孛孛然大辰非火葢角宿正屬辰天道起東方角宿尊故曰大辰辰為鄭旁及卯卯為宋餘氣及漢為陳衛故四國當之楚人及吳戰于長岸傳載楚大敗吳師獲其乘舟餘皇吳公子光又大敗楚人取餘皇以歸木訥曰長岸楚地此吳伐楚也吳屢受楚兵襄二十五年吳雖伐楚門于巢卒兵亦未及楚也今王僚始為長岸之戰其後楚日削而吳日張矣十有八年春王三月曹伯須卒曹平公立四年卒夏五月壬午宋衛陳鄭災同日災記異也六月邾人入鄅音與鄅妘姓小國傳載鄅人藉稻邾人襲鄅木訥謂邾失鄆失鄫失漷東田而僥倖於鄅以此償彼蜂蠆毒也愚按左氏稱六月藉稻則春秋用夏正也若改四月稱六月則四月安有稻之可藉乎秋葬曹平公五月而葬冬許遷于白羽避鄭也白羽一名析楚邑也傳謂楚遷之也許遷葉遷夷今又遷白羽是楚不足芘之楚亦忌鄭也十有九年春宋公伐邾傳載邾入鄅鄅夫人宋向戍之女也故向戍請於宋伐之而返其俘夏五月戊辰許世子止弑其君買經書弑三傳皆謂世子非弑趙木訥曰學者不信經而信傳反從為之辭若果傳實是春秋誣人以大逆矣歐陽子固嘗攻之西疇崔氏曰不嘗藥之過小而加弑君之罪大豈先王法哉且春秋所以為法也向使聖王在上豈遂以弑君之罪殺止耶其不然明矣夾漈鄭氏曰是何言哉臣弑君子弑父何容易加人乎止齋陳氏曰世子誠不嘗藥爾何罪而奔晉愚按三傳雖皆以為非弑而其說亦不同左氏曰飲太子之藥卒太子奔晉公羊曰止進藥而藥殺也榖梁曰世子不知嘗藥君卒而哭泣歠粥未踰年死竊意左氏公羊之說皆是也世子藥殺其君春秋故書弑榖梁晚出因二氏有藥之語增附不嘗藥之説凡後來為之辭者又皆惑於榖梁故因鑿之以飾義例耳本無可疑也春秋書弑而左氏公羊稱藥殺亦弑也己卯地震地道安靜震乃其異秋齊高發帥師伐莒齊景乘晉楚之弱侵欺小國志在代興冬葬許悼公木訥曰書葬初不計討賊不討賊及實弑與否二十年春王正月夏曹公孫會自鄸出奔宋鄸莫公反會子臧之後也鄸會之邑也舍邑而出奔劉氏謂其待放賢於臧武仲之據防逺也秋盜殺衛侯之兄縶張立反縶以廢疾不立葢衛靈公之兄也盜指齊豹傳稱縶奪豹之司徒與鄄而豹殺縶也任公輔曰齊豹非卿故曰盜春秋於非卿者皆書盜尉止也齊豹也公孫翩也陽虎也皆大夫也張洽曰靈公受國於有疾之兄而盜殺其兄書盜殺衛侯之兄深罪之也趙鵬飛曰責在衛侯而不在盜則盜在不必名左氏謂求名而不得未聞殺人犯上以求名者冬十月宋華亥向寧華定出奔陳傳載宋元無信多私而惡華向華向殺公之黨八人而刼公交質公殺華向之質而攻之故三子奔十有一月辛卯蔡侯廬卒鄭夾漈曰蔡平公歸立八年卒明年費無極取貨於公之弟東國逐公之子朱而立東國是為悼公二十有一年春王三月葬蔡平公五月而葬夏晉侯使士鞅來聘註晉頃公即位通嗣君木訥曰即位今五年霸業既隳無求於諸侯聘好所不急也宋華亥向寧華定自陳入于宋南里以叛註南里宋城内里名傳載華登以吳師至頼齊戍烏枝鳴與厨邑大夫濮力戰及晉以諸侯兵至始大敗華氏葢三叛入宋之都期於得宋非以邑叛者比也王霸兩微叛臣橫行如此秋七月壬午朔日有食之記災也傳載梓慎言日食分至非災者星翁語爾八月乙亥叔輒卒注叔弓之子伯張冬蔡侯宋出奔楚傳載費無極取貨於東國謂蔡人曰楚將立東國蔡人懼出宋公如晉至河乃復傳載晉有鮮虞之役故辭公岷隱曰晉豈無以待賓乎季氏之强昭公之弱晉助其臣而不有其君久矣二十有二年春齊侯伐莒齊再伐莒莒子行成宋華亥向寧華定自宋南里出奔楚傳載楚助叛諸侯之戍怠於守而懼楚故逸之使得奔大蒐于昌間如音許氏曰凡書蒐刺大夫强而公失其政木訥之説見十一年比蒲之蒐夏四月乙丑天王崩六月叔鞅如京師葬景王景王立二十五年崩叔鞅者叔弓之子輒之弟也葬景王以卿行木訥謂猶愈乎不會者三月而葬速杜氏謂亂故王室亂劉子單子以王猛居于皇秋劉子單子以王猛入于王城冬十月王子猛卒木訥曰周景王太子壽早夭壽之母弟曰猛次嫡也王寵長庶子朝而立之景王崩二子角立劉子單子挾猛尹氏召氏立朝參商交抗迄五年而後定實景王為之也岷隱曰自入春秋以來周室蓋三亂矣其禍皆生於父子兄弟嫡庶不明惠王寵子帶幾危世子齊威公盟世子于首止而位定襄王復寵帶出居于鄭晉文公納王王室遂定向微二霸周室之亂豈減敬王之時然則春秋書王室亂者憫周室之微弱嘆威文之不復有也悲夫十有二月癸酉朔日有食之書災二十有三年春王正月叔孫婼如晉癸丑叔鞅卒晉人執我行人叔孫婼勑畧反傳載武城人斷木不殊推而蹙之取邾師邾愬于晉故婼如晉見執然取邾者武城人於婼何罪故書曰執我行人鞅則叔弓之次子也晉人圍郊王子朝在郊晉為敬王圍之也郊周邑也夏六月蔡侯東國卒于楚東國賂費無極而得立今卒于楚或役於楚而卒秋七月莒子庚輿來奔庚輿好劒劒成試之人故烏存帥國人逐之戊辰吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧父音甫楚帥六國之師救州來為吳所敗見滅者二國而陳大夫見獲夏齧者徵舒𤣥孫天王居于狄泉尹氏立王子朝天王者王猛之弟名匄敬王也亦次嫡也當立其居狄泉避子朝也天王立矣尹氏又立庶長之子朝亂也八月乙未地震地再震冬公如晉至河有疾乃復將請叔孫婼以疾不果二十有四年春王二月丙戌仲孫貜卒貜俱縛反孟獻子之曾孫孟僖子也嘗屬二子事夫子學禮婼至自晉婼見執婼不受辱不以貨免晉不能屈禮而歸之也公羊作叔孫舍胡氏從之嫌其以罪去氏也吕氏曰婼不言叔孫前見也此說得之不惑於凡例去氏之說矣夏五月乙未朔日有食之記災秋八月大雩旱祭之僭者丁酉杞伯郁釐卒力之反又音來杞平公立十八年卒自城杞以來倚晉獲安者也冬吳滅巢傳載楚為舟師畧吳吳踵之滅巢及鍾離沈尹戍曰幾如是而不及郢註巢楚邑劉氏謂書云巢伯來朝則國也愚意古雖國而今屬楚爾又按吳子遏伐楚門于巢卒則巢乃吳之讎也見滅亦勢矣木訥曰吾將謀楚先滅其與國滅州來滅巢滅徐滅沈滅頓皆楚之與也葬杞平公雖不書月自八月至冬計亦五月而葬二十有五年春叔孫婼如宋傳言往聘且為季氏逆女也然婼為正卿而為季氏逆女非禮夏叔詣會晉趙鞅宋樂大心衛北宫喜鄭游吉曹人邾人滕人薛人小邾人于黃父謀王室也然王室之亂已四年趙鞅感鄭子太叔婺不恤緯之言始為此會又約明年將納王卒墮空言後二年敬王始入成周王自入也劉單之功也時列國諸大夫各謀弱公室以為己私姑為草次之會息人言爾有鸜鵒來巢周官鸜鵒不踰濟魯未嘗有來巢為異說者謂飛鳥得氣之先世將亂氣自北而南秋七月上辛大雩季辛又雩左氏曰再雩旱甚也九月己亥公孫于齊次于陽州齊侯唁公于野井冬十月戊辰叔孫婼卒十有一月己亥宋公佐卒于曲棘十二月齊侯取鄆孫音遜凡皆昭公謀去季氏不克而棄國之事也時魯兵已屬三家鬷戾謂去季氏亦非叔孫氏之利叔孟二氏皆釋甲公遂孫于齊次于陽州待齊命也唁于野井齊返之境上而後逆之也叔孫婼之卒方公與季氏戰叔孫婼在闞歸而責季孫季孫有異志媿不能返公而祈死也宋公佐之卒如晉謀納公而辛于行也齊侯取鄆鄆者魯邑齊取之以處公葢無心納公而然也春秋先五書公如晉至河乃復葢晉以政不在公不若厚季氏之為利其後兩書公如齊三書公如晉三書齊晉唁公五書居鄆四書在乾侯以至于薨嗚呼悲夫二十有六年春王正月葬宋元公元公立十五年卒三月公至自齊居于鄆夏公圍成秋公會齊侯莒子邾子杞伯盟于鄟陵公至自會居于鄆鄟音專齊取鄆以處公故至齊不可而居焉成者孟氏私邑與季氏為黨公圍之者以齊師圍之也盟于鄟陵齊謀納昭公也傳稱季氏使申豐賂齊之子猶沮齊侯不行公至自會居于鄆者謀之不遂復退處鄆邑也九月庚申楚子居卒平王立十三年卒信費無極殺伍奢父子而逐太子亂萌兆矣冬十月天王入于成周尹氏召伯毛伯以王子朝奔楚天王敬王也成周王城之下邑今洛陽也子朝之亂王居狄泉今以劉單之力借晉師得入而王朝奔楚矣亂葢五年乃定二十七年春公如齊公至自齊居于鄆自鄆求齊不遂而復歸于鄆夏四月吳弑其君僚吳壽夢諸子長諸樊次餘祭次夷末次札札賢欲立之不肯自諸樊餘祭夷末以次相授必欲致國于札札終不肯而夷末傳之子僚諸樊之子光曰札不立則我也使鱄設諸殺僚而自立楚殺其大夫郤宛於阮反傳載宛直而和國人說之費無極辭令飲令尹子常酒且辭之出甲因譖于子常使殺之而滅其族國人不和亦滅無極而後定秋晉士鞅宋樂祈犂北宫喜曹人邾人滕人會于扈傳載令戍周且謀納公也宋衛皆固請納之士鞅取貨於季氏辭小國而還岷隱謂樂祈犂北宫喜其在宋衛非華向孫寗比也故猶欲納公士鞅專晉同惡相濟宜乎不肯木訥謂鞅方有分晉之心特未得其間其會諸侯姑以是感季氏而結死黨爾愚按鞅之譽季氏以辭小國者甚悉則木訥之論非刻也得其情也冬十月曹伯午卒曹悼公立九年卒邾快來奔木訥曰邾來奔者四竊邑來者二季氏實利之為逋逃主也公如齊公至自齊居于鄆傳載齊飲公酒以宰獻而卑公明年遂如晉二十有八年春王三月葬曹悼公註六月而葬緩公如晉次于乾侯乾侯晉邑子家子勸公待于竟不從晉使還竟上而後逆之次于乾侯不得入也岷隱曰公之在國也屢如晉猶不得入今出亡欲至晉其可得乎木訥曰晉之六卿即魯之三家也前日扈之盟既乞貨于季氏今其忍背賂以傷其類哉故徒次于乾侯而不得入夏四月丙戌鄭伯寧卒六月葬鄭定公鄭定公立十五年卒註三月而葬速秋七月癸巳滕子寧卒冬葬滕悼公滕悼公立二十五年卒二十有九年春公至自乾侯居于鄆求晉不得入又退而歸魯之邑齊侯使高張來唁公公如晉次于乾侯不納公而來唁公已非矣况又稱之以主君是辱之也非唁之也豈以其舍齊求晉晉不偶而復歸故憾之耶然使齊能納公公何辱於晉夏四月庚子叔詣卒高氏集註曰叔詣欲納公而卒季孫意如曰叔詣無病而死此無公也非我罪也觀意如此言逆節甚矣宜公之不能忍也先師席亦嘗謂昭子之卒則曰天之棄魯叔詣之卒又曰無公天命也季氏之無君無天於斯為甚秋七月冬十月鄆潰岷隱曰昭公棄一國而居其邑猶不能容相率而叛之豈非畏季氏之暴而不顧乎西疇曰公適去鄆而鄆潰見魯之民皆畏季氏而不敢寧公也先師謂齊取鄆居公鄆畏齊不敢叛既舍齊而之晉故鄆亦叛之自此一邑亦無有而終于乾侯矣悲夫三十年春王正月公在乾侯向於鄆書居以鄆猶魯邑也今於乾侯書在以鄆潰而適晉之乾侯則公已無魯特於歲首書其所在以存公實悲之也岷隱曰坤上六嫌於無陽故稱龍焉公在乾侯固嫌於無耶夏六月庚辰晉侯去疾卒秋八月葬晉頃公晉頃公立十四年卒未嘗親盟會會黃父謀周會扈謀魯皆大夫具文為之晉以是衰三月而葬亦大夫之簡其君也冬十有二月吳滅徐徐子章羽奔楚傳載楚受吳掩餘燭庸二公子之奔吳故怒而滅徐徐楚之出也伍貟教吳三師更迭肄楚以罷之楚遂病三十一年春王正月公在乾侯季孫意如會晉荀躒于適厯躒力狄反適丁厯反公在乾侯晉地也季氏會晉恐晉之納公也季氏與晉大夫同惡相濟蔑公而植私傳載晉侯欲納公范獻子召季氏如晉使納公然經書會于適厯則非晉都謂季氏請罪於晉侯恐未可信果如所載亦晉定公初立有意納公而士鞅荀躒輩姑為和君臣之說以款之耳夏四月丁巳薛伯榖卒高氏集註曰入春秋以來惟莊三十一年書薛伯及此始書名晉侯使荀躒唁公于乾侯榖梁曰唁公不得入於魯也曰既為君言之矣不可者意如也秋葬薛獻公亦始書葬冬黑肱以濫來奔黑肱邾之别子也濫邾之别封也以濫來奔竊其邑以叛也邾庶其莒牟夷與今黑肱為三叛臣十有二月辛亥朔日有食之書災三十有二年春王正月公在乾侯存公所以誅季氏取闞口暫反註謂公取之公羊謂魯取之則季氏也葢如取鄟取邿之比二說未知孰是夾漈曰魯羣公之墓在闞公將見先君取之木訥曰闞魯羣公墓隧之所在公在乾侯不得祭于廟姑取墓隧之地以寓孝思定元年葬昭公季氏使役如闞將溝焉則昭公亦葬於闞昭公無乃知其將終於乾侯取闞以為死所乎愚按此說考究為精夏吳伐越木訥謂吳將報楚越楚之與也故先伐越然不若姑結其心以離楚黨今先伐越故入郢未反而越亦入吳矣其結怨連禍始此秋七月冬仲孫何忌會晉韓不信齊高張宋仲幾衛世叔申鄭國參曹人莒人薛人杞人小邾人城成周岷隱曰周營洛邑其居九鼎者曰王城其遷頑民者曰成周平王遷于王城至敬王入于成周晉率諸侯之大夫以城之葢於是周再遷矣既而為東周西周則又遷矣十有二月己未公薨于乾侯昭公立三十二年攻季氏不克而在外者八年卒客死乾侯葢季氏之專政四世矣民知有季氏而不知有君矣事至此極豈不悲夫然史墨對趙簡子反譽季氏而謂君臣無常位此非君子之言葢借季氏以逢趙氏之惡爾昭公十九歲猶有童心既立事晉晉以政不在公寧失公而不可失其大夫七如晉而五不得入及不勝其憤而攻季氏寧如齊而不如晉卒之齊晉皆莫救而客死乾侯嗚呼悲夫黃氏日抄卷十二
