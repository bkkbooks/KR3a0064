body:
  text: 黃氏日抄卷二十四宋黃震撰讀禮記十一經解第二十六孔子曰入其國其教可知也其為人也溫柔敦厚詩教也疏通知逺書教也廣博易良樂教也潔靜精微易教也恭儉莊敬禮教也屬辭比事春秋教也故詩之失愚書之失誣樂之失奢易之失賊禮之失煩春秋之失亂其為人也溫柔敦厚而不愚則深於詩者也疏通知逺而不誣則深於書者也廣博易良而不奢則深於樂者也潔靜精微而不賊則深於易者也恭儉莊敬而不煩則深於禮者也屬辭比事而不亂則深於春秋者也此言入國知教而其所以為教者皆不外乎六經之理詩依違諷諌是溫柔不指切事情是敦厚有能然者知其為詩教然惟敦厚故近愚愚之言可欺也書舉其大綱是疏通上及帝王之世是知逺有能然者知其為書教然惟知逺故近誣誣之言失實也樂無所不通是廣博能使人從化是易良有能然者知其為樂教然惟廣博故近奢奢言過此則流於侈也易極深研幾是潔靜能窮理盡性是精微有能然者知其為易教然惟精深故近賊賊言過此則害於理也禮以恭遜節儉齊莊敬謹為本過則煩矣春秋以聚合會同之辭比次褒貶之事戰爭則亂矣有其得而無其失則知其各深於其經者集周氏鄭氏孔氏説補修天子者與天地參故德配天地兼利萬物與日月並明明照四海而不遺微小其在朝廷則道仁聖禮義之序燕處則聽雅頌之音行步則有環佩之聲升車則有鸞和之音居處有禮進退有度百官得其宜萬事得其序詩云淑人君子其儀不忒其儀不忒正是四國此之謂也盛德同於天地日月猶無所在而不謹自治之道補發號出令而民説謂之和上下相親謂之仁民不求其所欲而得之謂之信除去天地之害謂之義義與信和與仁霸王之器也有治民之意而無其器則不成鬻子之書曰發號出令為天下福者謂之道上下相親謂之和民不求而得所欲謂之信除去天地之害謂之仁仁與信和與道帝王之器也與此略同但霸王之器作帝王之器旨意宏矣天台陳氏禮之於正國也猶衡之於輕重也繩墨之於曲直也規矩之於方圜也故衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圜君子審禮不可欺以姦詐是故隆禮由禮謂之有方之士不隆禮不由禮謂之無方之民敬讓之道也故以奉宗廟則敬以入朝廷則貴賤有位以處室家則父子親兄弟和以處鄉里則長幼有序孔子曰安上治民莫善於禮此之謂也縣平聲方猶道也鄭氏故朝覲之禮所以明君臣之義也聘問之禮所以使諸侯相尊敬也喪祭之禮所以明臣子之恩也鄉飲酒之禮所以明長幼之序也昏姻之禮所以明男女之别也夫禮禁亂之所由生猶坊止水之所自來也故以舊坊為無所用而壞之者必有水敗以舊禮為無所用而去之者必有亂患春見曰朝秋見曰覲大曰聘小曰問壻曰昏以昏時迎婦也妻曰姻因而隨之也坊謂隄坊禮之所從來者已久故曰舊五者之禮皆坊民之目葉氏故昏姻之禮廢則夫婦之道苦而淫辟之罪多矣鄉飲酒之禮廢則長幼之序失而爭鬭之獄繁矣喪祭之禮廢則臣子之恩薄而倍死忘生者衆矣聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣苦謂不至不答之屬此覆説五者之禮廢則闕故禮之教化也微其止邪也於未形使人日徙善逺罪而不自知也是以先王隆之也易曰君子慎始差若毫釐繆以千里此之謂也隆謂尊盛之也始謂其微時也此言禮教人之善於其微而止人之邪於其未形故人日遷善逺罪而不自知又引易以證謹始之意補哀公問第二十七哀公問於孔子曰大禮何如君子之言禮何其尊也孔子曰丘也小人不足以知禮君曰否吾子言之也孔子曰丘聞之民之所由生禮為大非禮無以節事天地之神也非禮無以辨君臣上下長幼之位也非禮無以别男女父子兄弟之親昏姻疏數之交也君子以此之為尊敬然問言禮何其尊答謂以此故尊禮鄭氏然後以其所能教百姓不廢其會節有成事然後治其雕鏤文章黼黻以嗣其順之然後言其喪算備其鼎爼設其豕臘修其宗廟歲時以敬祭祀以序宗族即安其居節醜其衣服卑其宫室車不雕幾器不刻鏤食不二味以與民同利昔之君子之行禮者如此幾音祈所謂能能於禮也會猶期也不廢其會節謂上文天地君臣男女三事不廢其會期不廢其節文也有成事言教之有成效也以嗣其順之謂治其文飾嗣續其所以順之使之欣然安行也喪算謂喪服親疏逺近哭踊卒哭祥練月日之數也安其居節者安守其常也醜其衣服者醜惡也惡衣服也與下文卑其宫室意聨車不雕幾者雕雕刻幾附纒之也用鄭氏孔氏陸氏補公曰今之君子胡莫之行也孔子曰今之君子好實無厭淫德不倦荒怠敖慢固民是盡午其衆以伐有道求得當欲不以其所昔之用民者由前今之用民者由後今之君子莫為禮也午五故反實謂富貴固民是盡謂竭盡其財力午猶忤謂逆也午其衆以伐有道謂逆衆人之心以伐有道之人也所者理之所在也求得當欲不以其所者謂求其所得必須稱己所欲而不以其理也由前用上文所言之禮由後用下文所言之非禮鄭氏孔氏周氏孔子侍坐於哀公哀公曰敢問人道誰為大孔子愀然作色而對曰君之及此言也百姓之德也固臣敢無辭而對人道政為大公曰敢問何謂為政孔子對曰政者正也君為正則百姓從政矣君之所為百姓之所從也君所不為百姓何從愀七小反又音秋愀然變動貌德猶福也此章止用政者正也一語而演為問答之煩如此漢世諸子之文多類此而此得列於經耳補公曰敢問為政如之何孔子對曰夫婦别父子親君臣嚴三者正則庶物從之矣公曰寡人雖無似也願聞所以行三言之道可得聞乎孔子對曰古之為政愛人為大所以治愛人禮為大所以治禮敬為大敬之至矣大昏為大大昏至矣大昏既至冕而親迎親之也親之也者親之也是故君子興敬為親舍敬是遺親也弗愛不親弗敬不正愛與敬其政之本與迎逆敬反舍音捨庶物猶言庶事也無似謂無能肖似於人也親之也者親之也謂親其人乃所以致人之親己鄭氏方氏公曰寡人願有言然冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎願有言然者疑似之意不敢以為是也已重謂太重怪其以祭服親迎也繼先聖為天地之主蓋通天子言之鄭氏晦菴公曰寡人固不固焉得聞此言也寡人欲問不得其辭請少進孔子曰天地不和萬物不生大昏萬世之嗣也君何謂已重焉孔子遂言曰內以治宗廟之禮足以配天地之神明出以治直言之禮足以立上下之敬物恥足以振之國恥足以興之為政先禮禮其政之本與固固陋也言寡人固陋若不因固陋而廢問焉得聞此言也陸氏以寡人固為句心有欲問之意而口無能問之辭故曰欲問不得辭請少進猶言請益也直言之禮指朝廷言也直言則上無慢下之令下無慢上之心故足以立上下之敬物恥謂事物之汙陋國恥謂國體之卑辱二者之恥惟禮能振之興之以免於恥集皇氏方氏應氏説孔子遂言曰昔三代明王之政必敬其妻子也有道妻也者親之主也敢不敬與子也者親之後也敢不敬與君子無不敬也敬身為大身也者親之枝也敢不敬與不能敬其身是傷其親傷其親是傷其本傷其本枝從而亡三者百姓之象也身以及身子以及子妃以及妃君行此三者則愾乎天下矣大王之道也如此國家順矣妃方非反愾許乞反又許氣反冕而親迎所以敬其妻冠於阼階所以敬其子百姓之象言為百姓之所效象身以及身謂敬其身以及百姓之敬其身子與妃皆然妃即妻也愾乎天下言天下嗟嘆之不足大王之道如此指其遷豳愛厥妃而當時內無怨女外無曠夫之事言之方氏陸氏周氏公曰敢問何謂敬身孔子對曰君子過言則民作辭過動則民作則君子言不過辭動不過則百姓不命而敬恭如是則能敬其身能敬其身則能成其親矣君言動有過民將效之故不可不謹補公曰敢問何謂成親孔子對曰君子也者人之成名也百姓歸之名謂之君子之子是使其親為君子也是為成其親之名也已孔子遂言曰古之為政愛人為大不能愛人不能有其身不能安土不能安土不能樂天不能樂天不能成其身公曰敢問何謂成身孔子對曰不過乎物謂之君子之子者言百姓歸己善名指為君子所生之子是因己修身使其親亦得君子之稱此修身能成其親也有猶保也不能保其身謂陷於非僻安土謂安其所處之位樂天謂樂循天理物猶事也不過乎物謂事皆得中無過差用晦菴孔氏補公曰敢問君子何貴乎天道也孔子對曰貴其不己如日月東西相從而不已也是天道也不閉其久是天道也無為而物成是天道也已成而明是天道也不閉其久者天有常久不已之道不閉塞之而通其久謂變通無窮也已成而明謂生物既成而其功名著也用孔氏補公曰寡人憃愚冥煩子志之心也孔子蹴然辟席而對曰仁人不過乎物孝子不過乎物是故仁人之事親也如事天事天如事親是故孝子成身公曰寡人既聞此言也無如後罪何孔子對曰君之及此言也是臣之福也憃始容反志音識蹴子六反張子西銘即事親以明事天之道説蓋本此無如後罪何慮其不能行而詒罪也志之心謂記於心真西山方氏補仲尼燕居第二十八仲尼燕居子張子貢言遊侍縱言至於禮子曰居女三人者吾語女禮使女以禮周流無不遍也子貢越席而對曰敢問何如子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆子曰給奪慈仁周流謂不滯於一方一曲故其用無所不遍鄙野辨給逆亂皆滯於一而不能周流者也再言給奪慈仁者以子貢越席而對近於給也給者巧言令色似慈仁而實鮮仁故曰奪奪者亂之也用鄭氏補子曰師爾過而商也不及子産猶衆人之母也能食之不能教也子貢越席而對曰敢問將何以為此中者也子曰禮乎禮夫禮所以制中也子貢退言遊進曰敢問禮也者領惡而全好者與子曰然然則何如子曰郊社之義所以仁鬼神也嘗禘之禮所以仁昭穆也饋奠之禮所以仁死喪也射鄉之禮所以仁鄉黨也食饗之禮所以仁賔客也領惡而全好者領謂總攬收拾之好惡對立一長一消惡者收斂而無餘則好者渾全而無虧矣上言師商子産皆領惡之事下言郊社食饗賔客皆全好之事應氏馬氏子曰明乎郊社之義嘗禘之禮治國其如指諸掌而已乎是故以之居處有禮故長幼辨也以之閨門之內有禮故三族和也以之朝廷有禮故官爵序也以之田獵有禮故戎事間也以之軍旅有禮故武功成也是故宫室得其度量鼎得其象味得其時樂得其節車得其式鬼神得其饗喪紀得其哀辨説得其黨官得其體政事得其施加於身而錯於前凡衆之動得其宜視諸掌言易見三族父子孫量斗斛之量鼎三牲之鼎象法象易曰制器者尚其象式謂車有六等之數尊卑之辨也辨説得其黨謂分辨論説詩書禮樂之等各得其黨類不乖義理也前者據其身之前而言錯於前者皆以禮而措之故總結以凡衆之動得其宜用孔氏方氏補子曰禮者何也即事之治也君子有其事必有其治治國而無禮譬猶瞽之無相與倀倀乎其何之譬如終夜有求於幽室之中非燭何見若無禮則手足無所措耳目無所加進退揖讓無所制是故以之居處長幼失其别閨門三族失其和朝廷官爵失其序田獵戎事失其䇿軍旅武功失其制宫室失其度量鼎失其象味失其時樂失其節車失其式鬼神失其饗喪紀失其哀辨説失其黨官失其體政事失其施加於身而錯於前凡衆之動失其宜如此則無以祖洽於衆也倀勑良反此覆説上文以有禮者其得如彼無禮者其失如此祖始也洽合也言失禮則無以為衆倡始無以和洽其衆本鄭氏説子曰慎聽之女三人者吾語女禮猶有九焉大饗有四焉苟知此矣雖在畎畝之中事之聖人已兩君相見揖讓而入門入門而縣興揖讓而升堂而樂闋下管象武夏籥序興陳其薦爼序其禮樂備其百官如此而后君子知仁焉行中規還中矩和鸞中采齊客出以雍徹以振羽是故君子無物而不在禮矣入門而金作示情也升歌清廟示德也下而管象示事也是故古之君子不必親相與言也以禮樂相示而已縣音玄闋苦冗反中丁仲反還音旋齊才細反大饗饗諸侯來朝者兩君相見之盛禮也九禮有其四者一揖遜入門入門縣興二揖遜升堂升堂樂闋三下管象武夏籥序興四陳其薦爼序其禮樂備其百官凡四也五行中規六還中矩七和鸞中采齊八客出以雍九徹以振羽通前四者凡九也九者皆大饗之所兼有而四者惟大饗得有之耳縣者鐘磬縣興謂金作也樂闋者樂之一曲奏終也下堂下管吹管象武武舞也夏者夏翟蓋羽也夏籥文舞也序興謂文武之樂更起也采齊雍振羽皆樂章振羽即今振鷺之詩也入門金作覆説上之入門縣興升歌清廟覆説上之升堂樂闋下而管象覆説上之下管象武始相見而金作乃賔主相敬故言示情清廟頌文王之德者故言示德象武頌武王之功者故言示事此不待親相與言但以禮樂相示而意已傳此其為古者之盛論語以雍徹而此徹以振羽者論語言天子之祭禮此言諸侯之饗禮也用天台賈氏及孔氏補子曰禮也者理也樂也者節也君子無理不動無節不作不能詩於禮謬不能樂於禮素薄於德於禮虛歌詩所以通禮之意作樂所以成禮之文崇德所以實禮之行鄭氏子曰制度在禮文為在禮行之其在人乎禮待其人然後行孔氏子貢越席而對曰敢問夔其窮與子曰古之人與古之人也達於禮而不達於樂謂之素達於樂而不達於禮謂之偏夫夔達於樂而不達於禮是以傳於此名也古之人也問夔其窮與疑其不達於禮也答以達於樂不達於禮謂之偏夔以樂傳後世故不及乎職外之所能是偏主於樂耳其可謂之窮乎既又美夔為古之人是與今之人不同兼虞書舜命伯夷典朕三禮伯夷讓夔是夔亦非不知而偏者此漢人傳聞之言特主於禮而言耳用馬氏孔氏補子張問政子曰師乎前吾語女乎君子明於禮樂舉而錯之而已子張復問子曰師爾以為必鋪几筵升降酌獻酬酢然後謂之禮乎爾以為必行綴兆興羽籥作鐘鼓然後謂之樂乎言而履之禮也行而樂之樂也君子力此二者以南靣而立夫是以天下太平也諸侯朝萬物服體而百官莫敢不承事矣禮之所興衆之所治也禮之所廢衆之所亂也目巧之室則有奧阼席則有上下車則有左右行則有隨立則有序古之義也室而無奧阼則亂於堂室也席而無上下則亂於席上也車而無左右則亂於車也行而無隨則亂於塗也立而無序則亂於位也昔聖帝明王諸侯辨貴賤長幼逺近男女外內莫敢相踰越皆由此塗出也三子者既得聞此言也於夫子昭然若發矇矣目巧之室謂匠者以目巧而作室也西南隅謂之奧奧之外有賔位東階謂之阼奧阼言賔主之位也若發矇者若目不明得人開發有所見也孔氏方氏孔子間居第二十九孔子間居子夏侍子夏曰敢問詩云凱弟君子民之父母何如斯可謂民之父母矣孔子曰夫民之父母乎必達於禮樂之原以致五至而行三無以橫於天下四方有敗必先知之此之謂民之父母矣間音間弟徒禮反凱弟樂易也原本也五至三無見下文橫廣被也四方有敗必先知之心乎為民務去其不善故先知之所謂心誠求之也方氏馬氏子夏曰民之父母既得而聞之矣敢問何謂五至孔子曰志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至哀亦至焉哀樂相生是故正明目而視之不可得而見也傾耳而聽之不可得而聞也志氣塞乎天地此之謂五至詩者志之所之也故志之所至詩亦至焉興於詩必立於禮故詩之所至禮亦至焉立於禮必成於樂故禮之所至樂亦至焉樂極則哀生故樂之所至哀亦至焉五者相因而生相尋而至視之而不得見聽之而不得聞蓋本於內心之所發充之則塞乎天地是為禮樂之原用橫渠説補子夏曰五至既得而聞之矣敢問何謂三無孔子曰無聲之樂無體之禮無服之喪此之謂三無子夏曰三無既得略而聞之矣敢問何詩近之孔子曰夙夜其命宥密無聲之樂也威儀逮逮不可選也無體之禮也凡民有喪匐匐救之無服之喪也其詩作基基始也逮詩作棣逮逮安和之貌無聲之樂無體之禮無服之喪皆言禮樂之原發於心者補子貢曰言則大矣美矣盛矣言盡於此而已乎孔子曰何為其然也君子之服之也猶有五起焉子夏曰何如孔子曰無聲之樂氣志不違無體之禮威儀遲遲無服之喪內恕孔悲無聲之樂氣志既得無體之禮威儀翼翼無服之喪施及四國無聲之樂氣志既從無體之禮上下和同無服之喪以畜萬邦無聲之樂日聞四方無體之禮日就月將無服之喪純德孔明無聲之樂氣志既起無體之禮施及四方無服之喪施及孫子承上文五起以推衍三無之義補子夏曰三王之德參於天地敢問何如斯可謂參天地矣孔子曰奉三無私以勞天下子夏曰敢問何謂三無私孔子曰天無私覆地無私載日月無私照奉斯三者以勞天下此之謂三無私其在詩曰帝命不違至于湯齊湯降不遲聖敬日齊昭假遲遲上帝是祇帝命式于九圍是湯之德也勞謂勤勞降謙降也齊詩作躋集天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也神氣散而為風薄而為霆皆從地起故屬之地蓋聞有天雨有雷雨天雨逺雷雨近此章以風雨屬天以風霆屬地其審之矣世有風雷大作而高山絶頂晴皎自如者非風霆即地之神氣之為耶天主施而春秋冬夏風雨霜露所以施者也地主生而神氣風霆風霆流形品物露生所以生者也顯然在目足以使人開動感悟所以為教者各在其中而無一毫之私參其間三王所奉者此而已用馬氏橫渠補清明在躬氣志如神耆欲將至有開必先天降時雨山川出雲其在詩曰嵩高維嶽峻極于天惟嶽降神生甫及申惟申及甫惟周之翰四國于蕃四方于宣此文武之德也耆市志反耆欲謂所可願之事祭統載衛悝鼎銘亦曰乃考文叔興舊嗜欲晦菴據家語云有物將至其兆必先疑有物訛為耆欲其兆訛為有開生甫及申鄭氏注謂仲山甫申伯其後詩箋又依毛氏以甫為穆王時甫侯然此宣王時詩注為仲山甫申伯者近之今依本文之注此宣王詩而稱文武之德者先儒謂推本其所自由文武積德感召而生賢也清明在躬志氣如神養於中者也同於天者也耆欲將至有開必先徵於外者也應於天者也天降時雨山川出雲指其顯然為驗謂國家將興天必為之生賢佐時雨將至山川必為之出雲時至氣應其理則一因引嵩嶽降神之詩以證之用馬氏補三代之王也必先其令聞詩云明明天子令聞不已三代之德也弛其文德協此四國大王之德也子夏蹶然而起負牆而立曰弟子敢不承乎蹶居衛反弛詩作矢協詩作洽宣王詩云大王者斷章取類補坊記第三十子言之君子之道辟則坊與坊民之所不足者也大為之坊民猶踰之故君子禮以坊德刑以坊淫命以坊欲辟讀如譬坊音防辟則坊與謂君子坊民之道如隄坊之礙水也民之所不足謂於理有闕失也坊德坊其逸德命謂教令用孔氏補子云小人貧斯約富斯驕約斯盜驕斯亂禮者因人之情而為之節文以為民坊者也故聖人之制富貴也使民富不足以驕貧不至於約貴不慊於上故亂益亡約謂氣歉驕謂氣盈慊不滿也亡無也人情或貧或富皆易於踰越失道故聖人制為節文以坊之使農有田里之差士有爵命之級各得其分無甚富甚貴雖貴臣亦無慊於爵祿之薄故亂所以亡也子云貧而好樂富而好禮衆而以寧者天下其幾矣詩云民之貪亂寧為荼毒故制國不過千乘都城不過百雉家富不過百乘以此坊民諸侯猶有畔者幾居豈反貧者易濫富者易驕衆者易亂故曰貧而好樂富而好禮衆而以寧者天下其幾矣其幾矣云者言如此者寡也城高一丈長三丈為雉雉凡五堵鄭氏方氏子云夫禮者所以章疑别微以為民坊者也故貴賤有等衣服有别朝廷有位則民有所讓子云天無二日土無二王家無二主尊無二上示民有君臣之别也春秋不稱楚越之王喪禮君不稱天大夫不稱君恐民之惑也詩云相彼盍旦尚猶患之子云君不與同姓同車與異姓同車不同服示民不嫌也以此坊民民猶得同姓以弒其君相息亮反盍音渴今如字章明也春秋不書楚越之葬楚越僣王書則當稱葬某王故不書也君諸侯也諸侯稱天子為天王諸侯之臣則不稱諸侯以天大夫之臣亦不稱大夫以君尊無二上也盍旦夜鳴求旦之鳥也即月令所謂鶡旦盍何不也鳥欲反夜為旦人情猶患惡之以其反常也况臣之僣君欲反下為上者乎鄭氏孔氏方氏子云君子辭貴不辭賤辭富不辭貧則亂益亡故君子與其使食浮於人也寧使人浮於食子云觴酒豆肉讓而受惡民猶犯齒衽席之上讓而坐下民猶犯貴朝廷之位讓而就賤民猶犯君詩云民之無良相怨一方受爵不讓至于己斯亡子云君子貴人而賤己先人而後己則民作讓故稱人之君曰君自稱其君曰寡君子云利祿先死者而後生者則民不偝先亡者而後存者則民可以託詩云先君之思以畜寡人以此坊民民猶偝死而號無告偝音佩畜許六反號平聲食浮於人謂祿過其功其人不足以稱也受惡謂辭其美者與人而自受其不美者犯猶僣齒年也利祿先死而後生者謂如死之與生皆合與祿必先與死者而後及生者則民皆不偝於死者也亡謂奔亡在他國者存謂在國者為國事而亡者君心念之而不忍絶則民勉於忠義而可託偝死而號無告言死者見偝而家之老弱號呼無所告訴也鄭氏孔氏子云有國家者貴人而賤祿則民興讓尚技而賤車則民興藝故君子約言小人先言人謂賢者技謂能者以賢者為貴而不吝爵祿以尊之則人皆興讓而勉於德矣以能者為貴而不吝車服以貴之則人皆興藝而勉於能矣約言謂寡言先言謂尚口鄭氏及方氏説子云上酌民言則下天上施上不酌民言則犯也下不天上施則亂也故君子信讓以涖百姓則民之報禮重詩云先民有言詢于芻堯施始豉反酌取也酌取民言而施之於民則下民悅之如受天上之施蓋為政合天下之公願民被其澤戴之如天也上不酌民則事或妄行非義故曰犯也下不敬之如天上之施則民或肆慢侵擾故曰亂也引詩大雅以證古者酌取民言方氏胡氏子云善則稱人過則稱己則民不爭善則稱人過則稱己則怨益亡詩云爾卜爾筮履無咎言子云善則稱人過則稱己則民讓善詩云考卜惟王度是鎬京惟龜正之武王成之子云善則稱君過則稱己則民作忠君陳曰爾有嘉謀嘉猷入告爾君于內女乃順之于外曰此謀此猷惟我君之德於乎是惟良顯哉子云善則稱親過則稱己則民作孝大誓曰豫克紂非豫武惟朕文考無罪紂克豫非朕文考有罪惟豫小子無良女音汝大音泰履詩作體度詩作宅君書作后文之煩簡亦不同君陳周公子伯禽弟書取以為篇名爾卜爾筮履無咎言與考卜惟王皆斷章取義以證凡人之歸美而無爭也援君陳以證臣之歸美於君援大誓以證子之歸美於父補子云君子弛其親之過而敬其美論語曰三年無改於父之道可謂孝矣高宗云三年其惟不言言乃歡子云從命不忿微諌不倦勞而不怨可謂孝矣詩云孝子不匱弛式氏反歡音歡弛猶棄忘也高宗三年不言居父小乙之喪也故其既言天下皆喜從命不忿愛也微諌不倦敬也不匱無乏止之時也鄭氏馬氏子云睦於父母之黨可謂孝矣故君子因睦以合族詩云此令兄弟綽綽有裕不令兄弟交相為愈子云於父之執可以乘其車不可以衣其衣君子以廣孝也愈羊主反愈病也可以乘其車車於身差逺不可以衣其衣衣於身最親父執之衣尚不可衣則於父可知此自敬父之心而推之也故曰廣孝前書言君與異姓同車不同服意亦類此用孔氏方氏補子云小人皆能養其親君子不敬何以辨子云父子不同位以厚敬也書云厥辟不辟忝厥祖不同位恐相褻也引書伊尹戒太甲言為人君不自尊嚴與卑下相瀆亦辱其先祖因君見父以足上意孔氏子云父母在不稱老言孝不言慈閨門之內戲而不歎君子以此坊民民猶有薄於孝而厚於慈孝愛親慈愛子言孝不言慈者慮其厚於子而薄於親也戲謂孺子言笑歎謂憂戚聲方氏鄭氏子云長民者朝廷敬老則民作孝子云祭祀之有尸也宗廟之有主也示民有事也修宗廟敬祀事教民追孝也以此坊民民猶忘其親示民有事謂示民有所尊事孔氏子云敬則用祭器故君子不以菲廢禮不以美沒禮故食禮主人親饋則客祭主人不親饋則客不祭故君子苟無禮雖美不食焉易曰東鄰殺牛不如西鄰之禴祭實受其福詩云既醉以酒既飽以德以此示民民猶爭利而忘義祭器籩豆簋鉶之屬有敬事於賔客則用之謂饗食也若燕器不過盤杅之屬菲謂過儉美謂過奢引易引詩明在德而不在物鄭氏方氏子云七日戒三日齋承一人焉以為尸過之者趨走以教敬也醴酒在室醍酒在堂澄酒在下示民不淫也尸飲三衆賔飲一示民有上下也因其酒肉聚其宗族以教民睦也故堂上觀乎室堂下觀乎上詩云禮儀卒度笑語卒獲醍音體度如字又徒洛反醴齊甘酒也醍齊粢醍也味厚於醴澄酒清酒也味又厚於醍味薄者在上味厚者在下示民不貪淫於味堂上觀室堂下觀上言祭時肅敬之威儀內外遞相效法也用鄭氏孔氏方氏補子云賔禮每進以讓喪禮每加以逺浴於中霤飯於牖下小斂於戶內大斂於阼殯於客位祖於庭葬於墓所以示逺也殷人弔於壙周人弔於家示民不偝也子云死民之卒事也吾從周以此坊民諸侯猶有薨而不葬者殷弔於壙即壙上弔而别太簡周弔於家待反哭於家而後弔殷勤故曰吾從周孔氏子云升自客階受弔於賔位教民追孝也未沒喪不稱君示民不爭也故魯春秋記晉喪曰殺其君之子奚齊及其君卓以此坊民子猶有弒其父者升自客階受弔賔位謂反哭時既葬矣猶不忍即父位也未沒喪未終喪也諸侯親死未踰年稱子踰年然後稱君以春秋所書為證鄭氏子云孝以事君弟以事長示民不二也故君子有君不謀仕惟卜之日稱二君喪父三年喪君三年示民不疑也父母在不敢有其身不敢私其財示民有上下也故天子四海之內無客禮莫敢為主焉故君適其臣升自阼階即位於堂示民不敢有其室也父母在饋獻不及車馬示民不敢專也以此坊民民猶忘其親而二其君孝以事君推事父之道以事君也不二謂使一其心也君子有君不謀仕者有君矣則專於所事不更謀仕於他國也卜仕之日謂謀仕之初未有所事故稱二君以卜若云仕秦乎仕晉乎之類蓋記禮乃漢儒傳聞多春秋戰國時舊説故有此事爾自此遺彼曰饋自下奉上曰獻事親孝故忠可移於君事兄弟故順可移於長忠孝弟順其本一也以其本一故有君不謀仕而其喪君亦如父為三年也君統臣者也故天子無客禮君適於臣則君為主父統子者也故父在子不敢有其身不敢私其財不敢以車馬之重為饋獻石林子云禮之先幣帛也欲民之先事而後祿也先財而後禮則民利無辭而行情則民爭故君子於有饋者弗能見則不視其饋易曰不耕穫不災畬凶以此坊民民猶貴祿而賤行下孟反相見之禮先於幣帛相見之禮既講而後以幣帛修好此謂禮之先於幣帛也事指相見之禮而言祿指幣帛而言故曰欲民之先事而後祿否而以財貨為先反以禮為後則民趨利矣無相見之禮辭而直行其情則民相爭矣故君子於有饋之者弗及見之則不視其饋惡無其禮而徒以貨取也民春耕而後有秋穫田有一歲之災而後有三歲之畬若不耕而穫不災而畬世安有無事而可得利者乎故引易以證之以為凶也然在易無妄六二爻惟曰則利有攸往不言凶也與此文義亦略不同補子云君子不盡利以遺民詩云彼有遺秉此有不斂穧伊寡婦之利故君子仕則不稼田則不漁食時不力珍大夫不坐羊士不坐犬詩云采葑采菲無以下體德音莫違及爾同死以此坊民民猶忘義而爭利以亡其身以遺民以餘利遺其民而不與民爭利也田仕者田獵漁小民漁網故田則不漁食時者食四時之常膳不力珍者不務非時之珍味不坐羊坐犬古謂不殺陸氏云大夫苟坐熊之皮矣不坐羊士苟坐羊之皮矣不坐犬采葑采菲無以下體亦斷章取義言不兼取與詩本義不同用孔氏陸氏補子云夫禮坊民所淫章民之别使民無嫌以為民紀者也故男女無媒不交無幣不相見恐男女之無别也以此坊民民猶有自獻其身詩云伐柯如之何匪斧不克取妻如之何匪媒不得藝麻如之何橫從其畝取妻如之何必告父母從子容反淫過也章明也嫌嫌疑紀綱紀柯斧柄藝種也輔氏孔氏子云取妻不取同姓以厚别也故買妾不知其姓則卜之以此坊民魯春秋猶去夫人之姓曰吳其死曰孟子卒魯姬姓吳亦姬姓魯昭公取吳為同姓謂之吳孟子不敢言姬姓而詭言子姓也補子云禮非祭男女不交爵以此坊民陽侯猶殺繆侯而竊其夫人故大饗廢夫人之禮交爵謂相獻酬陽侯殺繆侯事未聞何國鄭氏孔氏子云寡婦之子不有見焉則弗友也君子以辟逺也故朋友之交主人不在不有大故則不入其門以此坊民民猶以色厚於德見賢遍反辟音避遠于萬反見謂有才德著見於外子云好德如好色諸侯不下漁色故君子逺色以為民紀故男女授受不親御婦人則進左手姑姊妹女子子已嫁而反男子不與同席而坐寡婦不夜哭婦人疾問之不問其疾以此坊民民猶淫泆而亂於族不下漁色取象漁網而雜取之於下也御婦人為婦人御車也御者在乘車者之右前左手則身微背之不問其疾者略問其安否不問其疾之所在皆逺嫌也孔氏方氏子云昏禮壻親迎見於舅姑舅姑承子以授壻恐事之違也以此坊民婦猶有不至者舅姑妻之父母也妻之父為外舅妻之母為外姑妻之父母承奉女子以付授於壻而戒之恐女子之乖違也不至謂期而不至鄭氏黃氏日抄卷二十四
