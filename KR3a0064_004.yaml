body:
  text: 黃氏日抄卷四宋黃震撰讀毛詩毛詩注釋簡古鄭氏雖以禮說詩於人情或不通及多改字之弊然亦多有足以裨毛氏之未及者至孔氏疏義出而二家之說遂明本朝伊川與歐蘇諸公又為發其理趣詩益煥然矣南渡後李迂仲集諸家為之辨而去取之南軒東萊止集諸家可取者視李氏為徑而東萊之詩記獨行岷隱戴氏遂為續詩記建昌段氏又用詩記之法為集解華谷嚴氏又用其法為詩緝諸家之要者多在焉此讀詩之夲說也雪山王公質夾漈鄭公樵始皆去序而言詩與諸家之說不同晦庵先生因鄭公之說盡去美刺探求古始其說頗驚俗雖東萊不能無疑焉夫詩非序莫知其所自作去之千載之下欲一旦盡去自昔相傳之說別求其說於茫冥之中誠亦難事然其指桑中溱洧為鄭衛之音則其辭曉然諸儒安得回護而謂之雅音若謂甫田大田諸篇皆非刺詩自今讀之皆藹然治世之音若謂成王不敢康之成王為周成王則其說實出於國語亦文義之曉然者其餘改易固不可一一盡知若其發理之精到措辭之簡潔讀之使人瞭然亦孰有加於晦庵之詩傳者哉學者當以晦庵詩傳為主至其改易古說間有於意未能遽曉者則以諸家參之庶乎得之矣二南晦庵謂文王治豐以岐周舊地分周召周召者采邑之名周公掌內治召公掌諸侯之治化皆南被故曰二南王雪山謂周召官也自二公為之後世相承不改此詩當是此地所採南樂歌名南大夏也取純陽愚按雪山以樂言而晦庵言其所以被於樂者大序此本關雎之序而併序三百篇大㫖以故語或不倫晦庵易置其次以詩者志之所之居篇首為大序而别取其言關雎者居後為關雎之序於義正矣而非復古人之夲文嚴華谷依本文而逐章各疏其所以然讀者且合從嚴氏國史掌書而不掌詩大序乃謂詩作於國史孔子言關雎樂而不淫哀而不傷蓋淫者樂之過傷者哀之過惟此詩得性情之正大序乃謂不淫其色無傷善之心此大序之失也晦庵闢之當從晦庵周南關雎關雎荇菜皆因興而寓比之意寤寐展轉即所謂哀而不傷也琴瑟鐘鼓即所謂樂而不淫也樂得淑女古以為后妃思得嬪御之賢晦庵以淑女為正指后妃太姒后妃為文王之配而自求之者蓋設言愚意若如晦庵之說則詩人詠之之辭也卷耳王雪山去序言詩至以為后妃勞媵妾之歸寧晦庵詩傳以為后妃懷文王皆以婦人不預外事也然詩人特詠其情如此耳豈預外事哉書坊詩傳折衷有晦庵新說亦從衆說合從衆說以為后妃之志螽斯戴岷隱云螽斯喻子孫非喻后妃愚按螽斯羽振振兮是咏子孫宜爾字方是指后妃芣苡芣苡諸家皆以為治妊蓋因詩序樂有子之言也王雪山云芣苡車前子婦人服之下血非可治妊蓋采取以療疾耳晦庵曰未知采何用得之矣戴氏謂此詩見一時同輩相與之樂此語蓋得其氣象翹翹錯薪晦庵云以錯薪起興而欲秣其馬則悅之至以江漢為比而歎其終不可求則敬之深此已盡一詩之意箋謂喻女之尤髙潔者嚴氏詩緝取之恐求之過于嗟麟兮晦庵謂嘆美公子是乃麟也嚴曰麟之趾指麟言也于嗟麟兮指公子言也猶楚狂接輿稱孔子為鳳兮也召南鵲巢鳩居雪山云詩人偶見鵲有空巢而鳩來居後人必以為常此談詩之病也采蘋諸家謂蘋為萍萍薸也嚴華谷考本草水萍有三種大者為蘋毛氏以為大萍是也郭璞以為即薸誤也雪山謂祭之菹皆取水産取其潔也故菹字從草從水有齊季女諸家以季女為指大夫妻蓋已嫁者也古注以為古者先嫁三月教于公宫教成祭之戴岷隱取其說云與昏義合甘棠古說謂召伯聽訟不欲勞民而就之也岷隱謂召伯行省風俗偶憩棠下非必受民訟亦非有意於不擾晦庵雪山華谷並合行露岷隱謂男有强委聘者女不從而訟引列女傳為證雪山曰暴男侵貞女女固可尚男為何人豈文王之化獨及女而不及男邪合此二說則詩序侵陵之說殆非也特不成㛰而訟耳德如羔羊晦庵詩傳云德如羔羊一句衍說耳折衷新說曰大夫羔裘而居德稱其服亦如羔羊爾恐當以詩傳為正吕氏則以為如羔羊之詩華谷主之取好賢如緇衣為證然愚恐語脉不同摽有梅諸家皆以為女子之情岷隱云求我庶士擇壻之詞父母之心也合從之三五在東晦庵云星小而稀不我以其後也悔岷隱云不我以正是置之於無所與事之地非遇勤勞也已乃寬釋曰久當自悔且有以處我嘯歌以俟時不必過為戚戚也無所怨尤此為媵之美愚按此說得之諸家皆泥序文野有死麕雪山云媒妁之來尚欲使舒徐無喧動貞女可知當是在野而貧者取獸於野包物以茅護門有犬皆鄉落氣象平王之孫齊侯之子古說謂平王為武王平者正也或曰即平王宜臼魯莊元年王姬歸于齊蓋平王之孫嫁齊襄公晦庵並存其說騶虞毛氏以騶虞為義獸諸家並同晦庵詩傳亦從之此一說也晦庵又於詩序載歐陽公曰賈誼新書騶者文王之囿名虞者囿之司獸陳氏曰禮記射義云天子以騶虞為節樂官備也則騶虞為虞官明矣獵以虞為主其實歎文王之仁而不斥言也此又一說也凡皆晦庵兼存之嚴華谷乃取月令七騶咸駕及孟子虞人之說以為騶御與虞人而謂爾雅無騶虞之名騶虞非獸也愚按歐公之說甚眀而晦庵特於詩序兼存之者以騶虞詩與麟趾相應麟為獸則騶虞亦當為獸故詩傳以毛說為主可華谷析騶虞為二恐未安雖以禮記天子以騶虞為節樂官備也為據以騶與虞兩者為備然云樂官備者以有騶有虞為官備也邶柏舟晦庵主列女傳以此為婦人之詩以柏舟之堅自比華谷援孔叢子載孔子讀柏舟見匹夫執志之不可易謂非婦人之詩晦庵據列女傳以變毛氏華谷又據孔叢子以變晦庵愚按泛彼柏舟古注謂泛泛然流水中似與經文合初不見所謂堅守之意且合依毛氏古說以仁人不遇為主日居月諸胡迭而微諸家日月虧盈之說費力雪山云日月愈久愈微所謂但見有不如也似平易于嗟洵兮不我信兮古說多未明惟岷隱云自憐其誠切而意不得伸也愚按詩云洵美且異則洵為誠信之意岷隱近之百爾君子四句東萊說極徑淨習習谷風以隂以雨嚴華谷云谷風來自大谷之風怒風也又習習然連續不斷所謂終風也又隂又雨所謂曀曀其隂也皆喻其夫暴怒無息且云舊說以谷風為生長之風習習為和小雅谷風二章維風及頽非和也三章言草木萎死非生長也愚按毛氏以谷風為東風本不可曉特言之熟而不覺耳今嚴氏以谷字尋意又以小雅之谷風為證似覺明白故録之以俟知者然習習終是和意恐不過感興未必以風之暴比夫之怒也胡為乎泥中中露泥中諸家皆以為辱在塗泥是也古注以為二邑名李迂仲以為無所據愚恐亦無一身處二邑之理合從諸家旄丘雪山云丘之多草木者也星名旄頭言光芒多冠名旄頭言羽毛多不瑕有害鄭曰瑕過也嚴曰歸衛未過有害也何為而不可乎張曰不大有害愚按此說近人情北門雪山云隨其所出之方不必言背明向隂敦我箋云敦猶投擲也晦庵取之蓋與王事適我相協若以為厚則難說矣釋文訓迫義亦相近北風程氏謂非百姓擕持而去乃君子見幾而作詩記詩緝皆取之然既亟只且則事勢已迫非見幾者也見幾必於其初者也恐合且依舊說靜女本刺詩也毛鄭因靜之名轉而指為賢女李迂仲本歐陽公始以為男女相贈遺如溱洧宛丘之類但云惟彤管難通以左傳歌此詩取彤管焉又似美事耳晦庵詩傳華谷詩緝亦皆以為男女相贈遺之詩貽我彤管女贈男之物也自牧歸荑男贈女之物報彤管之贈也晦庵則於彤管云未詳何物李氏謂古者針有管樂亦有管詩緝又據解頥新語曰古者后夫人固必有女史彤管之法古以刀筆未有用毫毛者安得有管故書謂之畫蓋以刀筆刻畫於簡至秦䝉氏始以毫毛製筆故自漢以來始有簡寫之之說左氏所稱取彤管止取贈物之意非有取於女史也凡皆詩緝所援之說如此亦足解李迂仲之疑矣至於靜之為義詩緝又援曹氏謂靜女仕族處幽閒者今亦相約於城隅隱僻之地似亦有此理愚意靜女其姝乃奔者自為相稱美之辭豈必泥此而謂其真有貞靜之德哉籧除戚施雪山云籧除今龜胸戚施今駝背伋夀折衷新說與李氏云夀無救於兄而重父之過此固至論也然愚意夀竊節先往真欲代兄之死卒之兄亦往死者非初料所及也以是罪夀夀重不幸所謂求全之毁歟鄘髧彼兩髦自古皆謂指共伯共伯為衛武公所殺而共姜不嫁也折𠂻疑武公賢君未必有弒奪之事史記未可據東萊辨此事計武公立時已四十餘則共伯兄也年又加長兩髦者子事父母之飾小斂則脫之史謂釐侯已葬而共伯自殺安得猶謂髧彼兩髦以是知武公未嘗有弒奪之事華谷謂兩髦之制男角女羈今共姜守志不嫁不事膏沐髧然垂其兩髦如幼時之狀實我嫠居之容儀至死誓無他心以此告於母耳紲袢諸家皆以紲為去袢為暑氣謂皺絺能去暑氣也惟晦庵詩傳以紲袢為縛束之意謂以展衣䝉皺絺而為之紲袢所以自斂飭也愚意皺絺何嘗能去暑特以暑熱宜此輕踈之衣耳紲字從糸非從水之泄也何所見而訓紲為去袢字從衣非煩暑之煩也何所見而訓袢為暑夫子當暑袗絺綌必表而出之尚不欲其露肌膚况婦人乎晦庵以紲袢為斂飭其得之矣桑中自詩序至毛鄭至禮記以桑間濮上為亡國之音皆以此詩為淫奔者之詩故近世晦庵詩傳岷隱續詩記華谷詩緝言人人同獨東萊吕氏力辨此為雅音謂寧有編鄭衛樂曲之理其意以為雅樂祭祀朝聘之所用而夫子自衛反魯雅頌各得其所也然風之用於燕饗者惟二南而列國變風未嘗被之樂也夫子所謂正者雅頌而未嘗言及變風也此詩明為衛之詩詩之名明以為桑中詩之辭明言淫奔後世安得反為之諱而指以為雅音也古人採民風傷世變故録之云爾景山與京古注謂景大也諸家皆從之晦庵傳以景為日影以既景乃岡為證然恐語法不類也合從衆匪直也人此語難曉惟晦庵云非獨此人所以操其心者誠實而淵深所蓄馬亦已至於三千矣文義方通華谷云說于桑田是文公能務農重本以蓄育其人也非特人也文公操心塞實淵深故能致國富强至於騋牝三千覺於上下文尤協衛重較車中俯而憑處為式式上平立而憑處為較故曰重較吕和叔云永矢弗諼程以為弗忘君但後章弗過弗告處難通今詩傳詩緝與岷隱皆謂不與世接弗諼者不忘此樂也碩人只是形容而意自見詩緝以為比喻恐拘此詩當從朱傳氓此序云華落色衰復相棄背蓋據此詩有及爾偕老老使我怨之語也華谷言詩云三歲為婦是三歲而即相棄所云老使我怨者言始也將與汝偕老今我未老而已見棄若我從爾至老暴戾必有甚者愈使我怨也其說似得詩人之意愚按以我賄遷則女有資財三嵗食貧則男反無以養之此婦人一時為其所誘已即不堪遂反目而相棄合不以正婦遂復還非獨氓之逐此婦也竹竿此篇亦詩緝得之但駕言出遊之駕當從衆說為乘舟詩緝以為駕車則與上文不協能不我甲毛曰甲狎也釋文曰韓詩作狎東菜曰但能不我親狎妄自尊大而已似得詩意程朱諸家以甲為君長雖就甲字起義而須展轉恐且合從毛吕之說為徑諸家諱言狎者以狎為不美字然此非䙝狎之狎乃親狎之狎正謂惠公驕傲而言不當以文害辭有狐綏綏毛以為匹行貌朱反之以為獨行求匹貌李迂仲祖毛說云狐尚匹行而女乃無夫家戴岷隱以綏綏為安間不迫似皆得詩意諸家祖朱說而反古說者特以狐非美物不欲以綏綏為安間言其善狀耳然恐詩人托物起興不以此拘也心之憂矣之子無裳諸家主古說以為婦人欲嫁之辭岷隱謂國人作也云未有妃耦猶之可也衣帶之屬無與治之此可念爾亦覺優游得詩人之意在彼淇厲傳謂深可厲之厲恐不若王氏謂岸近危曰厲木瓜議者律齊威以專封之罪李迂仲載劉內翰之言曰專封者天子黜之諸侯封之則為専封若戎人滅衛威公救之亦霸者之所當為也謂之小惠亦不可也愚按管仲處世變之極而能一正天下功莫大焉故夫子許之其後孟子闢之者蓋勸時君以行王為萬世立訓耳自春秋而降惟漢髙祖功在管仲之上惟諸葛公義在管仲之上惟周世宗行事在管仲之上餘皆在其下至我藝祖雖湯武未可比矣若管仲之可議者聖賢寧不為而仲則茍於為之耳管仲救世之功何可當也而世以其救衛為小惠且罪其專封耶王彼其之子不與我戍申古注云是子獨處鄉里不與我來守申是思之言也疏云政教頗僻彼子在家不與我戍申是怨不均平也至歐陽程蘇則以為國人怨諸侯不戍申言周人不當逺戍也詩記詩緝皆從之晦庵傳獨從古注云彼其之子戌人指室家而言夫室家豈有同戍之理而詩人云爾者思之情然也故曰懷哉懷哉曷月豫還歸哉蓋若如衆說以為怨諸侯不戍申即與下文懷哉不貫晦庵其亦味之矣尚寐無吪古注吪動也蓋寤則憂寐則不知故欲無吪無覺無聰付世亂於不知耳近世釋以為欲死者過也葛藟晦庵謂此去其鄉里家族流離失所者自嘆之辭雪山謂棄與他人或出繼其旁族者華谷云舊說平王以他人之父為父者非也采葛古以為采葛去君側故懼讒特采葛非人臣之事於事情未通惟歐陽氏以積少成多為聽讒之喻而李氏取之晦庵傳以為淫奔者托以行然亦意之之辭至詩傳折衷載晦庵新說仍以采葛比聽讒愚按晉風采苓之詩亦以比聽讒則此說近人情而不反古說大車穀則異室一章晦庵傳以為畏其大夫之辭於義為正詩記詩緝假氏集解皆從古說以為能使男女有别者恐迂蓋與前章畏子不奔之意不類彼留子嗟古以留為氏或以為滯留之留合兩存之以俟知者鄭善善黃云父子相繼積善有素朱云武公有善而天子善之二說不同學者更詳然竊意序謂明善善之功本不成文二說亦就其文而意之可獻于公所晦庵以公為莊公華谷遂以為叔假在鄭從莊公出田暴虎以獻氣陵其兄愚恐叔段强恣於外未必入鄭肯從莊公田叔假君臨大邑未必可身自袒裼若假果從莊公之狩而獻于公所正是退守人臣之分安得言相陵耶岷隱曰言勇力之士暴虎以獻於叔也此詩御中節射中度既事而退意甚閒暇知暴虎者非指叔言也愚按公所之公非公侯之公也段為京城之主其所寓即公所也此句恐合依岷隱說此乃言叔假在京城田狩之事故詩曰叔于田安得改釋為莊公之田而叔從之以暴虎耶狡童王雪山曰鄭忽言行蓋亦近賢不可以成敗論人所謂狡童當有他人當之非謂忽也嚴華谷曰忽以世子為鄭君不得目以狡童正指忽所用之人耳晦庵則謂忽之辭昏未為不正有女同車山有扶蘇蘀兮狡童四詩皆非剌忽凡皆公議不惑於繼序講師之說者也齊匪雞則鳴蒼蠅之聲古說皆謂賢妃欲其夫之早起誤以蠅聲為雞聲晦庵云心常恐晚聞其似者而以為真至曹氏始謂哀公以雞聲為蠅聲嚴氏宗之云蠅以天將明乃飛而有聲雞未鳴之前無蠅聲也戴氏曰哀公荒淫雞鳴矣乃托辭曰此蒼蠅之聲爾東方明矣乃託辭曰此月出之光爾一以為賢妃之言一以為哀公之言未知孰是然讀者且當從古說庶三章之意聨貫東方之日諸家皆以日為喻君然詩中似無此意惟戴岷隱云男女相奔不夙則莫日出早也月出莫也此為近事情魏摻摻女手可以縫裳古說謂女嫁三月廟見方執婦功女者未見廟之稱而使之縫裳是為儉急晦庵亦從之特好人提提古說亦以為新昏之婦晦庵則以為大人云大人之儀容如此若無可刺惟褊心為可刺耳至雪山岷隱華谷三家則以古說為未然雪山云今細民草屨不問寒雪安有葛屨不可履霜又安得廟見三月方可執婦功女子亦有下衣安得女子不可縫下裳此詩言㛰嫁太速使夫力婦功以濟其家而不虛度所以為𥚹而可刺也岷隱云謂葛屨可以履霜不計其厚薄謂女手可以縫裳不擇其能否纎夫細兒矜情衣服顧影自喜時亦有之彼非不楚楚然可愛惟是褊心是以為刺也華谷云男子葛屨履霜祈寒奔走而不休未嫁女出為人縫裳而利其傭資皆急於趨利也愚按詩本文但言女手而毛鄭指為已嫁未廟見之女若以為富貴家之女三月而後反馬者則必無縫裳之事必不與葛屨並言若以為民間之女亦安得盡拘三月而後廟見廟見而後縫裳揆之人情似未允合今三家之說如此故録之以俟來者園有桃其實之肴毛以為喻國有民得其力是特釋序文不能用其民之語詩中未見此意鄭以為不取於民食園桃而已則天下無此理也惟晦菴不以為比喻而以為托興詩意不過如此而已碩鼠鄭箋以碩鼠為斥其君非矣華谷以為指聚斂之臣又不若晦庵謂托言大鼠害人而去之尤平易也唐我聞有命不敢以告人說謂桓叔將傾晉而民為之隱蓋欲其成嚴華谷云自桓叔至武公屢得志矣而晉人終不服相與攻而去之其後更六世逾六七十載迫於王命而後不敢不聽在昭公之初晉人之心豈從沃哉蓋反辭以見意故泄其謀欲昭公知之忠之至也言有命者迫切之辭言不敢告人乃所以深告昭公也如此良人何詩傳云如此良人何哉喜之甚而自慶之至也張橫渠曰言國亂不得見也二說相反蓋詩傳去序而言也要之既曰變風合從張說東萊亦曰有感於男女失時故歎息而言王事靡盬盬字諸家皆訓不攻緻以盬與蠱字異義同但於靡字不曽總說惟李迂仲云王事靡盬者勤於王事而無不攻緻也意方全無衣無衣之詩晉武公篡逆而賂周釐王以成其奸者也詩序以為美晉武公俗儒遂因為之曲說其所以黨惡右奸開後世亂臣賊子之門甚矣惟朱文公之辨曰序以為美失其㫖矣且武公弒君篡國大逆不道乃王法之所必誅而不赦者雖曰尚知王命之重而能請之以自安是亦禦人於白晝大都之中而自知其罪之甚重則分薄贓餌貪吏以求私有其重寶而免於刑戮是乃猾賊之尤耳以是為美吾恐其奬奸誨盜而非所以為教也嗚呼文公之辨足以植萬世之綱常矣世有為朱文公詩傳折𠂻者乃黜前說而載其新說曰武公篡逆之人徼求命服要君無上王法所當誅然此詩美之而孔子録焉何也曰當是時天下無主僭竊禮樂何所不至非復知有王命也請命之大夫獨能推明諸侯之命服出於上則安是不以小善為無益而不為亦所以見王命之尊嚴為天下後世法也嗚呼使此言果出於文公則亦恕矣然前說何可廢也今不惟集折衷者獨載新說凡集詩解者亦無不獨載新說而盡黜前說正論湮微世俗驚憚乃如此至嚴華谷則併新舊說不載而自為之辨曰潘父弒昭侯迎桓叔晉兵攻桓叔而立孝侯是桓叔初舉而國人不與也曲沃莊伯弒孝侯晉人又攻莊伯立孝侯之子鄂侯此莊伯再舉而國人又不與也及鄂侯卒莊伯伐晉晉人共立鄂侯之子哀侯此莊伯三舉而國人又不與也至武公虜哀侯晉人復立哀侯之子為小子侯此武公四舉而國人又不與也及武公誘殺小子侯晉復立哀侯之弟緡此武公五舉而國人終不與也最後武公滅晉盡以其寶器賂周僖王王命武公為諸侯晉人特迫於王命不得已而從之豈以武公為可美哉且武公有無王之心而後動於惡篡弒大惡也王法之所不容誅也彼其請於天子之使豈真知有王哉正以人心所不與非假王靈則終不能定晉也夫王不命焉而請之非禮也不聞請於王而請命於其使尤非禮也此正與唐藩鎮戕其主帥而代之以坐邀旌節者無以異又以賂王而得之烏取其為美也聖人致嚴於名分之際陳成子之事至沐浴而請討無衣之詩不刪者所以著世變之窮而傷周之衰也武公之事國人所不與序言美之者特其大夫之意耳愚按華谷之辨論雖不若文公之激烈而事情則悉矣大夫為之謀而大夫自以為美此黨賊者奸謀也彼自以為美天下萬世不當以為美也至若詩中之詞則戴岷隱得之曰己不請命於天子其大夫乃為之請命乎天子之使蓋武公自嫌强大不肯少屈使其大夫風天子之使而取之觀其詩辭傲然可憤豈曰無衣自詭强盛也不如子之衣以敵體相輕也衣者天子之衣豈使臣之衣當是時晉猶未强非得天子之命服誠不可以久安非武公謙辭也外示强大中實歉然真情所見不可掩也三味此說則晉不容不假重於周又不肯甘心輸情於周周王之受賂正墮其奸謀無衣之詩尚足為美也哉嗚呼以天子禮樂征伐之權而反為亂臣賊子弒君篡國之地使當時人心鬱悶而不可爭後世議論淪染而不知非是則重可痛也已秦載獫歇驕諸家皆以為田犬名長喙曰獫短喙曰歇驕王雪山嚴華谷戴岷隱三家以為田畢而遊園載獫於輶車以歇其驕逸王曰字不從犬也嚴曰田犬無短喙者也未知然否矜其車甲晦庵曰西戎者秦不共戴天之讎也秦人所以樂為之用戴岷隱曰襄公志在復讎婦人閔其君子無怨詞焉假氏昌武曰孔曰襄公以義興師雖婦人亦知勇於赴敵而無怨龍盾之合傳曰合而載之必載二者備破毁也愚按盾者今遮箭牌也盾狹而車廣一盾不足為衛必以二盾比而合之乃足為衛非防其破毁也與二矛重弓意不同權輿權輿釋文曰始也詩緝載陳氏曰造衡自權始造車自輿始陳宛丘古說四方髙中央下曰宛丘郭氏謂中央隆起與古說背馳王雪山云如此恐是宛轉之狀補傳以為地名愚按旁髙中下則於登遊眺望非便今陳國於此聚遊恐郭說為是而俗因其宛轉之狀以名其地也歟子之湯兮湯他浪反為是蓋堂字去聲至今俗亦有浪湯之說與下文上字望字叶韻子字舊云斥幽公晦庵止以為指游蕩者得之市井一井之地以二十畝為廬舍因為市以交易故稱市井穀旦于差古說穀吉也差擇也言擇吉日也竊意其未然蓋此詩指婆娑市井而言世未有擇吉日而遊市井者也果擇吉日當曰差于穀旦今曰穀旦于差語倒不成文矣謹按差字有數義易差之毫釐差之言舛也孟子愛無差等差之言等也詩既差我馬差之言擇也莊子自差觀之又曰差數覩矣差之言觀也此詩刺游蕩者也與下章穀旦于逝詞義一同穀旦者如後世言良辰美景之良辰也穀旦于差穀旦于逝約以良辰而往逰觀也疏以穀旦謂無隂雲風雨蓋近之也必如此說然後穀旦于差南方之原兩句意聨檜樂子之無知晦庵詩傳以子指萇楚言草木無知也然下章樂子之無室無家恐難指萇楚東菜曰所謂赤子之心也未有知識未有室家之時也此意得之以此知詩不可盡去序說也匪風發兮一章古說謂匪風非有道之風匪車非有道之車周道指周之政令王雪山謂風中車上最不安西北人畏之此言非風之飄忽非車之疾驅而使我心不安但顧趨周之路而傷心爾晦庵詩傳之說同曹蜉蝣蜉蝣朝生而暮死岷隱謂非朝生暮死乃生於土中朝出而暮死喻微有浮驕鮮不速亡者掘閲說謂掘地而出升騰游翔王雪山云管子曰掘閲得玉恐當時常談如此掘閲挑撥貌不遂其媾張橫渠以遂為稱以媾為寵不稱其恩寵也晦庵同合從此說與上章不稱其服相應下泉古說皆謂寒泉而浸稂蕭蓍為喻今隂雨而膏黍苗為喻古嚴華谷曰田野荒蕪所見惟稂莠蕭蓍之類因思周之盛時五穀熟而風雨時芃芃然盛之黍苗得隂雨以膏澤之四國既有明王又得郇侯為伯以勞來之傷今不復見也其說不必比喻而氣象寬平矣然未及冽彼下泉之義也王雪山曰稂蕭蓍皆陸草陸草畏水田禾喜水必是當時水漲因思盛時上有明王下有郇伯氣候皆正雨澤皆調蓋君臣皆良故天人相應也愚按雪山去序言詩多無歸宿而此說頗近人情故録之以輔前說豳周公遭變鄭氏謂管蔡流言周公避居東都愚按注傳周公無避去之事而此時周家亦未有東都己於金縢書附其說矣晦庵詩傳載黃氏曰先儒以七月為周公居東而作考其詩則陳后稷公劉所以治國者方風諭而成其德是未居東也此亦足證鄭說之非一之日二之日岷隱曰一日二日說者以為周正豳風先公之事周未建正也夫數窮於十自正月至十月數之窮也故詩人以十有一月謂之一日自一而數之避月而言日者懼其與月相亂也愚按晦翁云一之日謂斗建子一陽之月變月言日言是月之日也二說相參方備蓋主於陽復而再起數雪山亦云一之日至四之日皆以陽長而言之女心傷悲殆及公子同歸岷隱曰此詩三言公子獨以同歸為女公子亦恐不然癡女子覩公子之貴庶幾與之同歸亦人情之想念也雪山曰公子適野隨其後而還也凡皆嫌於以公子為女耳晦庵曰公子豳公之子也蓋是時公子猶娶於國中而連姻公室者亦無不力於蠶桑之務故其許嫁之女預以將及公子同歸而逺其父母為悲也此說不以公子為女公子矣然於同字之意差緩程子曰庶幾得如富貴之子及時而行此說最平易近人情似不必過求猗彼女桑毛云角而束之曰猗孔以左傳晉人角之諸戎猗之為證愚按掎角之掎從才猗彼女桑之猗從犬字義皆不同猗倚也就桑而取其葉不斬其條朱說為精女桑朱云小桑嚴云小者曰女如小墻亦曰女墻然則前云柔桑指桑葉之小者此云女桑指桑樹之小者隕蘀注蘀落也然則與隕字之義何别當采說文之意乾葉為蘀改歲東萊曰十月而曰改歲三正之通于民俗尚矣岷隱曰十一月謂之改嵗者蓋十二辰至於亥而止復起於子故謂之改歲非三正之謂也孔氏曰改歲者以仲冬陽氣始萌可以為年之始愚恐詩意不過以年窮歲極大寒之將至故預為塞墐之計非必謂塞墐之時為改歲之時也納禾稼雪山併納之凌隂皆以為納之公家云豳人遇事先公後私愚按此說不與衆同姑録之晝爾于茅宵爾索綯程曰綯所用蓋屋諸家並同惟嚴華谷謂茅不可索綯晝取茅草將以蓋屋宵作索綯將以縛屋蓋指田廬言之為明年又播百穀之地豳風豳雅豳頌鄭氏以殆及公子同歸以上為豳風以介眉夀以上為豳雅萬夀無疆以上為豳頌周禮籥章逆暑迎寒吹豳詩祈年于田祖吹豳雅祭蠟則吹豳頌故鄭氏之分如此王雪山謂一詩如何分為三籥章所謂豳詩以鼓鐘琴瑟四器之聲合籥也禮笙師吹竽笙塤籥簫箎笛管㫪牘應雅凡十二器以雅器之聲合籥也禮視瞭播鼗擊頌聲笙磬凡四器以頌器之聲合籥也凡為樂器以十有二律為之數度以十有二聲為之齊量凡和樂亦如之故逆暑迎寒祈年祭蠟皆全用七月之詩特以器和聲有不同爾至晦庵則有三說一說豳詩吹之其調可風可雅可頌一說楚茨諸詩是豳之雅噫嘻諸詩是豳之頌一說王介甫謂豳自有雅頌今皆亡矣愚按楚茨諸詩於今為刺幽王之詩噫嘻諸詩於今為成周郊社之詩未易遽指以為豳若如介甫謂豳詩别自有雅頌則豳乃先公方自奮於戎狄之地此時安得有所謂天子之雅頌耶惟前一說謂吹豳之聲可雅可頌為得之而其詳則雪山之考訂精矣東山金縢云周公居東二年則罪人斯得東山云周公東征三年而歸勞歸士諸儒以為居東二年暨歸則三年矣鄭氏獨以為其初居東二年避流言於東都也其後東征三年定三監淮夷之亂也愚按居東二年而罪人斯得是即東征之役也若止避地何云罪人斯得耶必如鄭說居東避地者二年其往來已及三年既歸而後三監叛既叛而後出東征又復三年如此則周公攝政七年之間無非奔走道塗之日更於何時輔成王致太平而制禮作樂耶伐柯九罭晦庵以伐柯為東人喜見周公之辭九罭為東人願留周公之辭東人終始之情如此而朝廷之不知在其中矣諸家因朝廷不知之語謂伐柯之籩豆為朝廷當待公以此禮謂九罭之衮衣朝廷當被公以此服然迎公之禮豈在籩豆而衮衣固周公之所素被者也前未嘗有褫今安用以為迎耶鹿鳴之什燕羣臣嘉賔嚴曰儀禮注云鹿鳴君與臣下及四方賔燕之樂歌也故序以羣臣嘉賔兼言之朱曰於朝曰君臣焉於燕曰賔主焉先王以禮使臣之厚於此見矣視民不恌諸家本鄭氏皆以視為示曹氏曰視民與視民如傷同義嚴曰其視民則不薄之此說免改視為示而理自明周道倭遲不遑將父當如毛氏云岐周之道不遑將父諸家皆以將為飬戴氏曰將非養也扶持奉侍之謂靡盬戴云苦而易敗謂之盬茍成必易敗故出使之不可亟歸者謂王事之不可使易敗也皇皇者華華合從孔疏為草木之華蓋起興也周爰咨諏歐陽曰周遍也雪山晦庵華谷並同釃酒毛氏云以筐曰釃以藪曰湑皆去其糟之具可近世引春秋傳無以縮酒恐祭祀用茅與此釀酒用茅者不同宜詳小人所腓朱傳云腓猶芘也又云隨動吳伯豐嘗舉以問先生曰腓為先足而動不當引以解此詩之義不若猶芘之云得之生民詩牛羊腓字之傳亦訓腓為芘先生答曰兩說誠不合當刪去愚按朱傳固不當兼收二說伯豐尤不當去隨動之說而存猶芘之說也毛氏初釋腓字為避字正義又演其說曰避患也李迂仲云以腓為避患不知何據諸家固無有從其說者也鄭氏知毛氏避之說難通也遂云腓當作芘當作者蓋改腓為芘非訓腓為芘也改字乃鄭氏箋詩之大弊又豈可因其改字遂訛以為字訓耶若以腓為隨動雖祖程說而程非自為之言也字書腓者脛腨易之咸艮皆取象於腓以著其隨物而動伯豐何乃以先動為疑世豈有足不動而足肚自先動者乎足者人人之所有豈必稽之古書而後信若生民詩牛羊腓字之正以牛羊足不踐棄路之嬰兒以足肚回護而過之若字愛然爾亦不當援為芘義之證故此詩腓字朱傳止當獨留程說雖非大義所係姑因伯豐之辨記之王命南仲王與天子諸家皆以為指殷惟李迂仲云以王為殷王則與序不合以王為文王則文王未嘗生時稱王此詩序為可疑者也至晦庵去序說則意指為周王而未嘗明言所以非殷王者今若以為文王時詩恐且當以王命之王為殷王耳胡不斾斾自東萊主建而不斾之說學者多從之晦庵不以為然嘗答東萊書云向見所集說解說戒嚴之日建而不斾不知此有何證蓋左傳建而不斾蓋言治兵而東萊引以言受命出軍之初也然兩說猶未定近世嚴華谷主晦庵之說而辨之甚明謂繼旐曰斾旐以全帛為之續旐末為燕尾者名之為斾言言斾之本體也左傳建而不斾言張斾也此胡不斾斾乃飛揚之貌生民荏菽斾斾亦揚起也魚麗王雪山謂後有魚麗之陳陳凡五每陳又各有五敵入其中者無有不著然則罶者曲薄也雖不盡與陳法相似而曲薄周匝魚之入其中者亦無得而脫也為魚麗之陳其殆取魚麗之詩之義乎華黍六詩自劉原父按儀禮鄉飲與燕禮皆以笙入與歌相間以為笙者有聲無詞詩非亡失乃本無其詩黃氏因之雪山亦云唐有上柱鳳雛平調清調瑟調平折命喙七曲有聲無詞至晦庵云六詩曰笙曰樂曰奏而不言歌則有聲而無詞明矣其說尤著今詩記詩緝世所共用者乃皆不從其說蓋以亡其辭之亡非有無之無也愚按古者亡即無字如夷狄之有君不如諸夏之亡是亡即無字也亡其辭之說云出於毛公毛公漢人漢世以亡為無王雪山云西漢亡一人之獄是也若詩記之辨則曰國語叔孫穆子聘晉伶簫詠歌鹿鳴之三鹿鳴三篇既可與簫相和而歌則南陔以下豈不可與笙相和而歌乎故亡為失亡之亡愚謂國語言歌則鹿鳴三篇有辭之可歌也儀禮不言歌則南陔六詩無辭之可歌也此不足疑也又詩緝之辨則曰本無其辭則無由有其義序夲因其詞而知其義後亡其辭則惟有序所言之義存可愚謂古之樂章今之琴譜類也琴譜有操辭具存者鹿鳴之詩之歌也有徒存其譜而無辭曲之可歌者如長清短清與長側短側之類雖無其辭未嘗無其義也此亦不足疑也南有嘉魚之什之谷風之什南有嘉魚古說以嘉為魚名出丙冗王雪山曰出漢中沔南今辰州鄂州皆有鄂州取以名縣然不必泥其名但取其美恐或是因詩取號也嚴曰下文樛木非木名則此嘉魚亦非魚名愚意周都西北以南方之魚為美故曰南有嘉魚未必獨指丙穴之魚也丙穴之魚飲乳泉而美亦未必元名嘉魚也自詩傳引丙冗之魚以釋嘉魚之詩世遂名其魚為嘉魚好事者遂又名其縣為嘉魚縣皆以其有經目託之為美談耳王曰或是因詩取號此說得之也罩罩汕汕諸家皆以為取魚之器雪山云罩胡郭反魚回幹水聲汕魚上水貌皆羣行自得之意未知然否按說文亦以汕為魚游水貌雪山博學必有據也南山有臺雪山云占國占家多即草木而觀周之草木氣象如此則人君聲華福祿豈有窮也在宗載考朱傳謂宗室為路寢之屬是也世或以為同姓之宗者因宗字而誤爾載沉載浮載沉載浮者特言舟泛泛水中或上或下不定之貌鄭乃以為載物之浮者沉者蓋以舟不可言沉故曲為之辭戴云泛然不繫未有定止此說得之采芑毛以芑為菜朱以為即苦蕒菜而詩緝力主芑穀之說按李氏云既謂之采則不宜謂之穀愚意其不以為菜而以為穀者蓋疑行軍所仰不徒在芑菜而芑菜亦不應如是之多可然詩人不過因采芑而起興鉦人伐鼓伊川云鉦人擊鉦者伐鼓擊鼓者以一句說兩事其義自明近世混為一事遂多疑議庭燎夜如何其古說皆謂宣王夜興而問早晚王雪山曰人君數問夜亦非體恐是殿陛之間宫掖之內執事者相為問答之辭禮雞人夜呼旦以警百官漢儀中黃門持五夜甲乙丙丁戊相傳未明衛士起唱所謂雞鳴歌或是此曹戴岷隱曰夜如何其非宣王之問也詩人見庭燎之光聞鸞和之聲知天子之視朝問夜何時乎夜猶未央也董氏曰傳曰百官官針王缺此詩其司烜之屬所為乎嚴氏曰宣王中夜而起失於太早詩人設為問答之辭今夜已何如乎乃夜未半也庭燎已設而有光諸侯已皆來朝鸞聲將將然是太早也所以針之愚按王朝之報早晚自有司存不待人主親問而後知也縱夜未央為人主所問則其後浸怠浸晚至於鄉晨是正人主不問所致亦安得指為人主親問若人主每每親問如初則不至於嚮晨矣始勤不流為終怠矣此詩人自設為問答以形其漸不如初可知也針針針同見內則與荀子針賦義取針砭鶴鳴此詩不明言所主毛鄭以為喻求賢且合從之雪山以為魚鶴園木皆賢者所退處而自樂者說亦有理若主誨之一字而隨事以明理則晦庵之說精矣爾公爾侯逸豫無期此二句古無成說東萊以為責在位之公侯曰賢者去朝時事可知爾公侯猶逸豫而不知懼乎其說己為明白戴岷隱亦云公侯不以賢才為念逸豫無度賢者不肯留至嚴氏以其與下文謹爾優遊之爾字不歸一而不從其說今以爾為指白駒去國之賢則其說有三晦庵曰此乘白駒者若其肯來則以爾為公為侯而逸樂無期矣猶言橫來大者王小者侯也豈可以過於優游决於遁思而終不我顧哉雪山曰此必舊為公侯而今遁山林者也度斯人浪適其來無期少致丁寧頌禱之辭愛賢之深也華谷曰已去而被留於是羡賢者退居之樂謂爾賢者若為公為侯則將勤勞國事無有逸豫之期今爾肥遁優哉游哉足以自樂願加保重耳愚按三說後來者最近之而雪山為徑蓋謂今日去國之賢即前日之嘗為公侯者故皆以爾而指之庶與上下文相協但雪山謂斯人浪適其來無期則來字為添似改逸豫無期為其來無期恐微有未安耳宜曰爾公也爾侯也今乃逸豫自適而無期乎謹哉爾之優遊勉哉爾之遁思惜賢者之去而又體賢者之不容不去寄興悠逺矣秩秩斯干幽幽南山如竹苞矣如松茂矣王雪山云言靣勢物色皆嘉也蓋如非比喻之如乃枚舉之辭耳乃占我夢嚴氏謂皆頌禱設為之言非真有是夢載弄之瓦古說瓦紡磚也今所見紡無用磚者而瓦亦與磚為二物恐風俗古今不同爾嘗見湖州風俗婦人皆以麻線為業人各一瓦覆膝而索麻線於其上歲久瓦率成坎古亦豈有此事而詩人因指之歟考牧嚴云作牧飬之牢而落成之螟蛉有子蜾螺負之螟蛉青蟲蜾螺蠮螉古說皆謂蜾螺負螟蛉之子為子置空桑中七日而化如揚子雲所謂類我類我者嚴華谷載解頥新語曰近世詩人取蜾螺之巢毁而視之乃自有細卵如粟寄螟蛉之身以育之其螟蛉不生不死蠢然在穴中久則螟蛉盡枮其卵日益長大自為蜾螺之形冗竅而出非蜾螺以螟蛉之子為子也愚戊辰考試省闈聞同官宫教台州董華翁云蜾螺負螟蛉埋土中而寄子其身如雞抱子暖之而使生然其子即蜾螺之子非以螟蛉之子為子詩之說得之揚子雲則失之耳時有監簿永嘉戴侗聞其說亦云嘗親見蠮螉負螟蛉入筆管有兩蠮螉互飛而共營之初非獨陽無子而外取螟蛉之子為子也如腐草化螢亦螢宿其子於腐草既成形則自腐草而出杜詩云幸因腐草出最精於物理谷風古說以谷風為東風嚴氏方以為大谷之風後章言無草不死無木不萎則非東風矣嚴說良是蓼蓼者莪匪莪伊蒿古說皆於序文不得終養父母上立意恐不過睹蓼莪之生意而興感耳小東大東古說謂小大皆取之於東晦庵獨以為東方小大之國華谷從之於文義為長山有嘉卉侯栗侯梅廢為殘賊莫知其尤山有嘉卉為栗為梅我反廢為殘賊莫知其罪感卉木之得所而已不如也㴞滔江漢㴞滔江漢尚足為南國之綱紀盡瘁以仕而上之人曾莫我有是上之人不能宗主綱紀乎我而興感也我從事獨賢賢猶多也雪山曰言其勞獨過於人也無將大車戴云詩意未嘗及小人非悔將小人也世既亂矣力微而挽重無益於事與無田甫田之意同朱云此亦行役勞苦而憂思者愚按序言悔將小人本不成文蓋世有將三軍之說矣安有將小人者哉况詩亦初無悔用小人之意合以上二說詳之楚楚者茨言抽其棘自昔何為我藝黍稷諸家多謂今日楚茨抽棘之場即自昔我藝黍稷之地蓋主序文傷今思古之說也然此詩與信南山等篇始終皆稱美豐登祭祀之盛無一毫幾微不滿之意不應篇首二語獨歎田萊之荒而其後無一語相應也治世之音亂世之音豈能掩於言辭之間哉毛曰抽除也鄭曰伐除茨棘以樹黍稷也雪山曰拔除茨棘而藝黍稷岷隱曰去茨棘而藝黍稷合此五家之說觀之抽乃抽去之抽非抽出之抽篇首二語非傷今矣愚按若如諸家以抽為枝條抽發則抽字當在棘字之下如其葉湑兮之類棘自抽耳非以人而抽其棘也今曰言抽其棘與言刈其楚語意正同是以人力而抽之刈之也非物之自抽也毛鄭五家之說為優疆埸有瓜是剝是菹獻之皇祖華谷曰郊特牲天子植瓜華不斂藏之種是不稅瓜於民也此言民喜時物之新不忘君上思欲獻之愚意古者公私之田一井天子植瓜亦必借民之力亦必於疆埸而植之作詩者但序其瓜之所從出不必以稅民為疑也甫田之什歲取十千毛曰十千言多也鄭氏謂一成之田十萬畝公田十一之法十萬取十千晦庵從之雪山謂孔氏言凡詩之作非如紀事之書必詳度量之數甫田言歲取十千亦猶頌言萬億及秭皆舉盈數且叶韻耳愚謂鄭以制度言詩不若王以人情言詩也至嚴華谷一變其說以為百取十焉萬取千焉則分十千為二事而各為之說幾於臆度又不若鄭氏言制度之有據矣晦庵又以此詩為士大夫食祿采邑者之數未知采邑可有萬畝之收否晦庵又以篇末萬夀無疆為上祝下恐合且依古注以為民祝君也然自楚茨至甫田大田諸詩古說皆以為刺晦庵皆不以為刺三味經文實無感傷之意晦庵之說為長也髙山仰止景行行止按詩此本迎新昏之辭而詩序以為思得賢女以配君子者也景者大也行者路也髙山與大路類也此言親迎者之迎新昏也髙山在望則仰之大路在前則行之于以駕四牡之騑騑振六轡之如琴由斯塗用斯禮以親迎云耳特述行道之所見而非有他義也表記曰小雅曰髙山仰止景行行止子曰詩之好仁如此鄉道而行中道而廢忘身之老也不知年數之不足也俯焉日有孳孳斃而後已表記之言蓋斷章取義以為嚮往而興起氣象廣大使人拱挹不盡固所謂善言詩者也唐明皇因表記嚮往興起之義其序孝經遂有景行先哲之語似以景行二實字為人心嚮往之虛字表記善於言詩而明皇不善於讀表記矣後世緣此遂有景慕之說是不以景為大也音釋者又或以行作去聲是不以行為路也皆始於明皇之誤非經㫖矣魚藻之什魚在在藻有頒其首王在在鎬豈樂飲酒此詩與王在靈囿於牣魚躍氣象一同因詩序以為刺幽王將不能以自樂諸家遂强以愁歎之辭釋之然本文之和樂氣象終不可改但外添一語云傷今之不然爾至嚴華谷方就本文造意生說謂在藻為淺水而魚失其所依蒲為近岸而愈失其所三味此詩初無此意說者自為巧語而文致之讀者謹勿悅其新竒也雪山曰治世亂世辭意氣象自可見如下篇采菽詩亦初不見其為刺采菽詩多託物起興如采菽則以筐莒承之君子來朝則將何以豫之蓋物必各有以處之故因以起興云爾說者乃謂采菽以待燕賜曲生枝節意味愈短此最讀詩之病姑舉其槩云民之無良相怨一方受爵不讓至於己斯亡古說以爵為爵祿或以下民無爵祿之可爭也又以民為人之通稱華谷主錢氏之說以爵為酒爵云民之相怨各執一偏或因杯酒失歡至亡其身詩蓋為持平之說以解之也愚按此說稍平易黍苗詩中明言美召公而詩序乃以為刺幽王此類亦何訝晦庵之去序耶若下篇隰桑則詩中真有思見君子之意序非自為之言也英英白雲露彼菅茅詩傳謂白雲水土輕清之氣當夜而上騰露即其散而降下者其說甚工然有雲之夜必無露有露之夜必無雲蓋露乃天地清氣之合倘無翳隔即草木上自然凝結非待自上而降如雨雪之比也今所謂英英白雲露彼菅茅當是覆露之露非雨露之露綿蠻黃鳥止于丘隅詩傳謂綿蠻之黃鳥自言止于邱隅而不能前恐不若諸家謂役人見黃鳥得所止而感歎也有豕白蹢蒸涉波矣古說皆以為將雨之證而未有明言其所以為雨之證者王雪山云豕江豚也猪首魚尾有兩細足微白湖湘間多有之出則雨兆月近畢亦雨兆此說蓋考將雨之證也嚴華谷祖張子之說以為豕性負塗雖有白蹢而不見今見豕白蹢羣然涉水是久雨而停潦多故豕蹢濯其塗而見白停潦尚多雨歇未久而月離于畢天又將雨矣其說甚工然非以為將雨之候也文王之什假哉天命有商孫子晦庵詩傳曰文王不已其敬如此是以大命集焉以有商孫子觀之則可見矣愚按文王詩惟晦庵傳最為理精語潔獨此二句之說於上下文語脉微有未順蓋穆穆文王於緝熙敬止此二句一意言文王之德也假哉天命有商孫子此二句一意言天命初本商之有也下文再言商之子孫其麗不億上帝既命侯于周服此四句一意言商之孫子雖多今天既命周德殷之後反皆臣于周也一章八句語脉相生而其間條流次第絲毫不紊今若曰文王之敬如此而天命集焉是上之第二句與中之第一句跨涉而取義也又曰以商之孫子觀之可見是中之第二句與下之四句亦跨涉取義也且云觀之則可見又似添語補足而本文未必有此意也更在學者詳之若華谷以有商孫子臣有商家之孫子則鑿耳永言配命傳云配合也命天理也使其所行無不合於天理嚴云配命謂王者與天為配天之賦豫萬物謂之命王者宰制天下亦謂之命按嚴說於經文為近上天之載新定邵氏禮記解曰載字訓詁不同說詩者曰載事也釋中庸者音栽謂天之造生萬物也俱所未安載猶地載神氣之載言上天所載之道無聲無臭也明明在下赫赫在上毛傳謂文王之德明明於下故赫赫然著見於天晦庵傳謂明明德之著赫赫命之著愚按此詩至中間方說文王耳嚴氏云首章専述天命喪殷之事故首二句且先泛言天人相與可畏之理味其次序當從嚴說造舟為梁造七報反言造詣以舟代梁之地也晦庵以造訓作徐氏元有此音謂作舟為梁也文王之親迎其造詣已成之舟其造作新舟固不可考毛氏因謂親迎之禮天子造舟諸侯維舟大夫方舟士特舟則曲說也舟所以濟險無時不設豈特為親迎設也地險不同舟隨宜而為之制豈為尊卑而立等差也親迎而涉津渡特偶然耳豈必一一親迎於津渡而立為舟梁之定制也陶復陶穴古謂陶為窑復為重復之窑穴為陶其壤而穴之言土室也蓋謂古公亶父居於窑竈土室之中如此愚按窑竈者陶瓦之地非人生所居之地也王雪山曰陶今之土墼也以陶為蓋於其上謂之復以陶為基於其下謂之穴此言以土墼為居也戴岷隱曰先陶於復穴將以營室家此言以未有室家而陶瓦也二者視古說不同而稍近人情覺岷隱之說為尤近榛楛濟濟國語引此詩止言盛世氣象求福不回古說回者邪也愚謂回非邪也回乃入於邪之所自始也人生平居何嘗不正不直一旦禍福在前計較之心一萌即為回轉若自謂枉尺直尋以茍濟目前者不知正直之操一有回轉即入於邪不可復返自昔喪名敗節之士如此類多矣學者讀求福不回之詩可以銘心而誓之終身也生民之什履帝武敏歆鄭氏謂姜嫄履巨人跡歆動而生后稷近世大儒如晦庵東萊皆從之惟歐陽公嘗斥其誕至華谷復力主歐陽之說然如諸儒之說姜嫄正因履巨跡而生子而驚異之也是以棄之隘巷棄之平林棄之氷是以名之曰棄是以曰上帝豈不寧乎豈不康我之禋祀乎何乃居然而生子也則其訓釋於上下經文皆協今華谷力排履武之說止以不難産為神異而亦襲用諸儒之語曰上帝豈不寧乎豈不康我之禋祀乎使之安然而生子也則其說不通矣蓋不難産正可言獲神之祐豈反以此疑天之不康禋祀耶不難産正人情之所喜豈反以為怪而棄其子耶難産者偶然不難産者皆是也豈獨后稷而異之耶且無災無害特詩人形容后稷始生之一事此詩豈專為不難産而作耶有相之道鄭曰若有神助此語未為怪也諸家乃多不從之不知詩人形容鋪張設為之辭如降神降種之類多矣此乃詩人之體雖今時亦然今恐其涉怪止以去草為相助此乃農人之常耳豈所以誇后稷實發實秀發者苖之長盛秀者苖之吐華即有邰家室古注謂邰為稷之母家先儒疑邰必自有其君或絶亡或他徙李迂仲曰此皆臆說無所考據今據此詩后稷封於邰其事甚明若以邰為稷之母家則未之敢信愚按李之說是矣然意先儒之為此說者以詩有即之語即者就也故以為就封為母家不知即乃遽然驟得之義稷乃始封故云爾以祈黃耉晦庵以為祝夀的矣諸家尚因繼序以為乞言俗見傳染之難回如此令終言善終如始者是言考終命者非公尸天子必取孫列之諸侯入為卿大夫者為尸故云公尸見孔氏禮記疏假樂諸家以六句為章岷隱華谷四句為章文義甚順泂酌晦庵云行潦尚可餴饎豈弟君子豈不為民之父母乎此起興也詩之本㫖也凡謂薄物可以格神由厚德可以厚民者本繼序之說也卷阿豈弟君子晦庵諸家皆以君子為指王嚴氏破其說謂若以指王則於來游來歌說不通然晦庵意召公從成王游歌而叙其事則亦未嘗不通也此詩第五章有憑有翼方引入用賢之意第七章藹藹王多吉士方明叙用賢之事古人作文次叙不可誣也戎雖小子晦庵以戎為指同列雪山以小子為名少年合二說方備蕩之什鬼方古說鬼方逺夷也不知何方雪山謂楚俗多鬼指楚也愚按易言髙宗伐鬼方詩言髙宗伐荆楚則鬼方即荆楚可知矣維德之隅毛曰隅亷也蓋矜持修飭即此德之方正形見者自鄭氏取譬於宮室有由外知內之說諸家始多費辭晦庵止云隅亷角也視毛說尤精明寧為荼毒諸說皆云安為荼毒惟詩緝云民苦於虐政欲其亂亡故寧為荼毒而不之恤愚按經文自明白因訓寧為安而多事今詩緝得之征以中垢此句本難曉詩緝云良人本為善彼不順者攻以內行汚垢之事於文義亦通靡有孑遺諸家皆泥說文以孑為無右臂之兒恐不若徑以孑訓獨蓋經文但云無復孑然而獨遺者耳無不能止此句極難曉毛曰言無止不能也李曰未嘗以不能之故而不敬也戴曰靡有不能而止者朱曰無有自言不能而遂止不為也嚴曰言毋謂不能而止不能也然於本文終未曉然或疑此言厯章羣臣盡力救旱故於章末結之云靡人之不周盡矣以其用力言之無不能止遏其旱勢者不知上天云何而不感格也未知然否維嶽降神生甫及申舊說皆謂姜氏之先主四嶽之祀故嶽神祐之既生穆王時之甫侯又生今日之申伯以申甫皆姜姓也詩緝非其說謂時不過設為神異之辭以形容仲山甫申伯之生此詩本為申伯作而借山甫以大申伯也豈有逺取周室始衰之甫侯以匹中興之申伯耶此說覺於詩意寬平往近王舅近鄭音記諸家從之王雪山獨云王舅非獨申伯一人故云往近王舅當是諸舅先有在謝者今與相近審如此說則近當如字讀不必改音記矣昭假于下朱云昭假于上天而監在下嚴云有周之德昭明假至於下愚按在天監而言則周德之昭假在下似不必增字為說本文極明白矣衮職有缺方博士解王制三公一命衮若有加則賜也云衮雖三公可服非有加則不賜詩言衮職有缺惟仲山甫補之蓋謂是也此言衮者人臣之極常缺之而不服惟仲山甫加賜而得之是常時所缺而今則補之也此說有據而理通說詩者未有此故録之潰潰回遹實靖夷我邦諸家皆謂刺其以小人而任安邦之寄獨雪山云靖夷寂寞也以為佳語者非周頌維天之命維天之命於穆不已於乎不顯三句言天文王之德之純以下始言文王中庸以於乎不顯屬之文王蓋亦斷章取義彼徂矣詩意似不過謂太王文王雖已往而流風善政猶存耳鄭氏以彼為指萬民已覺多事晦庵又以下句之岐字綴彼徂矣共四字為句而云彼徂矣岐恐無關大義但上云彼作矣下云彼徂矣自相對今以岐字綴徂矣之下恐驚俗也成王不敢康古注以成王為成此王功蘇氏謂若以成王為成王誦之成王則下文云基命成王非基命之君李氏謂書云成王畏相亦非言周之成王然國語載叔向引此詩云道成王之德也成王能明文昭能定武烈也此在古注未作之先晦庵力主國語之說歐陽公亦云以為成王誦則文理易通凡二說在學者詳之維天其右之晦庵云神坐東向在饌之右然諸家皆本古說以為右助此亦非大義所係且合從衆雍序以為禘太祖於詩文無之於禮於論語則徹祭之樂歌詩中烈考皇考或以為文王或以為武王華谷考以祭法考乃祖父之通稱右烈考之右晦庵亦以為左右之右云尊也按古注亦以為右助之右未知孰是若雪山則曰右非尊也蓋先也左靜右動動者於用為先故漢右丞相先左丞相然非古義也陟降庭止古以庭訓直晦庵以為若見其陟降在庭義極明白戴說同酌晦庵與諸家多謂酌即舞勺之勺也嚴華谷破其說謂勺者成王之樂若酌頌果為勺舞之勺當述成王繼承之事今此詩言告成大武非舞勺之樂章矣愚甲午嵗游學姚江試時純煕矣至載用有嗣五句題以載用有嗣為成王主司湛太博得之大喜以冠諸經此時愚方弱冠未考經書但據尚書成王四征弗庭與方行天下等語因謂成王初年天下猶未定未嘗不繼武王之武以定天下故創為此說耳乃今考閲諸家經解如晦庵則曰後人寵受此王者矯矯之造亦惟武王之事是師如雪山則曰遵飬時晦謂文王也我龍受之謂武王也載用有嗣謂成王也當時偶然之鄙說乃與暗合竊意此詩正為成王作也我亦主成王而言之也上文養時晦用大介皆推其本始以起之也文王之時如此武王之時如此今日所以嗣之者又如此此其所以為酌而序所謂酌先祖之道者也華谷謂非成王之勺豈未細考歟讀者更詳之魯頌季孫行父請命於周而史克作是頌愚按行父文公六年如陳如晉至襄公五年卒其見於經者凡五十四年使行父夀踰七十計其在文公時年方弱冠僖公者文公之父也行父安得逮事僖公而為之請命于周若史克又後行父十年方見於經恐亦未必逮事僖公也且序之為此說者以魯有頌為僭而行父魯名臣也謂其嘗請命于周則魯非僭耳然魯之僭莫大於郊矣明堂位言成王賜伯禽以天子禮樂使世世以祀周公審如此說亦未必使之郊天行天子之事也况吕覽明言魯惠公請郊禮於平王而史角往魯吕覽作於秦明堂位作於漢是成王賜天子禮樂之事未必有之故自伯禽至莊公十七世未聞有郊天者僖公三十一年始卜郊而卜不從繼此若宣若成若定欲郊則牛輒傷禮之不可僭神之不歆其祀如此魯人曽不知愧反以郊為盛事而張皇之序者尚欲避頌之為僭何異放飯流啜而問無齒決耶且魯頌非商周郊廟之頌也臣子祈其君而後世序詩者加頌之名以代列國之所謂美耳郊僭也不以為僭詩非用之郊者反以為僭而請之乎且此詩作於誰而請之也謂作於僖公僖公不應自頌其美謂作於臣子臣子不應専達於朝然則序詩者之言特未可知也劉元城嘗言我藝祖不事虛文至太宗朝方用兵河東羣臣已作詩歌淮夷固魯積患也僖公僅嘗從齊威公會諸侯于淮反因此見止于齊明年乃得歸可羞之甚者也魯臣反作詩歌以誇大其功雖曰祈願之辭然此亦魯之所以不競歟商頌湯孫諸儒皆以湯孫為指時王之主祭者岷隱始謂詩曰於赫湯孫則湯孫不應自誇遂指為商世之先王然下文云湯孫之將則先王豈自奉祭祀耶樂以恱神故曰於赫湯孫穆穆厥聲以侈言其樂之美如飲食云苾苾芬芬以侈言其飲食之美凡以恱神非自誇也武王之祀山川也自稱有道曽孫古人初無後世之嫌直以契合神心而已駿厖古說駿大也厖厚也是曰為下國大厚於文義既不通於前章為下國綴旒語例亦不叶董氏謂齊詩作駿􅀈謂馬也晦庵取其說蓋上章云為下國綴旒喻也為其係屬下國之心也此章云為下國駿厖亦喻也為其負載下國之任也若曰馬非所以為喻則旗旒亦何足為喻螽斯可以喻后妃鴻飛可以喻周公詩人託物取義固不嫌其微也黃氏日抄卷四
