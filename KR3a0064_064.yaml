body:
  text: 黃氏日抄卷六十四宋黃震撰讀文集六王荆公古詩詠陶縝畫菜其後歸之老圃而結云陶生養目渠養腹各以所能為物役愚謂荆公失言矣畫菜可言物役種菜豈可言物役耶四皓詩采芝商山中一視漢與秦一視之語似欠斟酌戲贈葉致逺詩極言奕棊之弊可為世訓桃源行云兒童生長與世隔考究得是不為世俗誕語酬王詹叔訪茶利害豈當𣙜其子而為民父母愚謂此二句語意精到惜其臨事之弗思送裴如晦宰吳江當知耕牧地往往茭蒲青三江斷其二洚水何由寧此四句説盡浙西水利之綱領孔子詩孔子豈是文人詩料且自古未有如孔子之語此本發於孔門髙弟而孟子申述之者也荆公乃謂其蠛蠓何足知天髙雖欲尊先聖豈所以待先師母乃自道耶揚雄二首其一以孟子勸伐燕伊尹干説亳為雄美新之比何哉其黨姦至辱聖賢耶其一謂聖賢樹立自有師此荆公師心自用發見之語也漢文帝輕刑以全人之形體短喪恐妨人於身後荆公譏之已不知文帝之心矣惜露臺之費薄霸陵之葬亦痛罵之何耶秦皇天方獵中原恐非仁人之言也東方朔何如夷與惠空復忤時人是以朔之直諌為非耶杜甫畫像説得公當農具詩襏襫云勿妬市門人綺紈被奴僮當慙邊城戍擐甲徂春冬就農人言之善用其心者也答陳正叔天馬志萬里駕鹽不如間雖非中道却是大氣收鹽詩與訪茶利害同皆能言不能行律詩題雱祠堂一日鳳鳥去千秋梁木摧溺愛不明如此孰謂知子莫若父耶詳定試卷詩二首有云文章直使看無纇勳業安能保不磨疑有髙鴻在寥廓未應回首顧張羅言科舉不足以得士也又云當時賜帛倡優等今日論才將相中細甚客鄉因筆墨卑於爾雅注魚蟲言詞賦非所以取士也然皆不可雪詩平治險穢非無德潤澤焦枯是有才説得意思佳但上一句正可言才下一句正可言德布置似顛倒耳雨過詩誰似浮雲知進退才成霖雨便歸山寄育王詩入夜天寒最靜便士大夫或自號靜便若其取此果何等氣象耶詠竹人憐直節生來瘦自許髙材老更剛曾與蒿藜同雨露終隨松柏到冰霜見其自少抱負不凡嚴陵祠堂迹似磻溪應有待世無西伯可能留荆公此言過矣古今隱士人品各自不同有抱天下之志而隱者有無志於斯世而隱者有志念淡薄本無操守而終變者抱天下之志如伊尹孔明是也本無操守如盧藏用种放之流是也如嚴子陵特無志於世者使其才足有為光武縱德薄於湯武獨不名正於湯武乎孔明尚輔一隅之先主奈何子陵不輔中興之光武耶士必待西伯而後出孔子厯聘之志荒矣絶句謝公墩我名公字偶相同我屋公墩在眼中公去我來墩屬我不應墩姓尚隨公劇戲之巧如此繅成白雪桑重緑割盡黃雲稻正青一聯甚工詩中重見殺風景三字見戲蔣頴叔詩云但怪傳呼殺風景豈知禪客夜相投讀漢書詩畢竟論心異恭顯不妨迷國略相同此語為京房劉向發不曉荆公何見也緇郎字見三十二卷詠淵師詩揚子詩千秋止有一揚雄荆公每尊之以比孔子而略孟子此其為荆公之見識也商鞅詩自古驅民在信誠一言為重百金輕今人未可非商鞅商鞅能令政必行荆公平生心事盡見此詩矣然荆公雖博學而不明理誠之一字固未易言信之為義必有其實徙木三丈而酬金百斤天下寧有此理此正商鞅矯情以行詐耳顧謂之信誠可乎果誠信民將不令而從謂誠信為驅民之具何耶讀後漢書云可憐竇武陳蕃輩欲與天爭漢鼎歸如公之言則曹瞞輩盜竊神器皆順天者耶集句諸作雖似劇戲其巧其博皆不可及賦銘等皆淡古書疏上仁宗皇帝言事書謂方今患在不知法度陛下雖欲更革而方今天下之人才不足須復古者教之養之取之任之之道而後得其人古之人欲有所為未嘗不先之以征誅文王先征誅而後得意於天下孔子所至使君臣捐所習雖排逐而終不變在上之聖人莫如文王在下之聖人莫如孔子欲有變革則其事如此愚讀之駭然蓋公之昏愎妄作盡見此書使吾君仁宗而少售其言豈待熙豐而後天下騷動哉愚聞之有治人無治法而公首言不知法度何也何世不生材何材不足用於世而公首言人才不足何也文王不長夏以革孔子非甚不得已之事亦惟從衆魯人為長府則曰何必改作而公誣文王以征誅得志誣孔子雖排逐而不變何也昔賈誼嘗言治安於漢文之世矣事理精確議論偉然文帝尚不為之動况乎我仁祖重厚之德又過文帝而荆公陋弱之論逺慚賈生薄而棄之正不待食釣餌而後知其詐也奈何公清苦之行該博之學納交韓吕徉退求進言不用而名益顯及神宗以鋭意斯世之心而卒聽之公遂得以鄙夷當世之人才效尤王莽之法度朝廷竟以征誅為威公亦卒為排逐而不變悉如前日所言悲夫辭集賢校理者四辭同修起居注者前七後五以後不復辭擬上殿劄子與前上仁宗書一同獨於人才教養等説差略耳公平生所見想不出此上五事劄子自言和戎青苗免役保甲市易之利議入廟劄子蓋以帝居諒隂臣僚言郊祀不當入廟也公非其説以為陛下尚在諒隂之中非可以制禮之時愚謂吉凶不相參郊廟之禮皆吉禮也臣僚言不當入廟而不能并者郊禮已有遺恨公又併以入廟為無傷豈以道事君學古入官之義哉且古禮久廢不過舉行而曰非可以制禮何耶論館職劄子謂當試問日親近之説已當審本朝百年無事劄子言我仁宗之為君得之歸之天助而勸其君以大有為則非矣言郊無二主及祭地無燎燔之禮皆是進字説劄子改三經義誤字劄子皆無義理公自沉溺罔覺耳捨宅為寺捨田為供村夫野姥之事亦動煩聖聽公之不學無識如此乞解機務等劄子往往皆狠愎不悛之言內制簡淡有古意惟敕榜交趾一篇考其時熙寧八年交趾入冦以公新法擾民為説則公已不當內制之職矣敕榜乃其所自為蓋公侵官以行私且其時彗星示變而敕榜有云天示助順已兆布新之祥果天意否耶外制召試三道其二以散文為之以此知祖宗盛時制誥尚存古意自宏詞之名立而朝廷訓誥之文遂同場屋聲病之習矣表百寮賀復熙河此率其徒以欺上者也進洪範表謂陛下足以黜天下之嵬瑣而紀綱憲令尚或紛如當考箕子所述以獨發深省此誤上之言也除平章等謝表動斥人以姦回以讒誣此狠愎之言也而乞退之表曰任怨特多於前輩曰智或不足以勝姦而人人與之為敵此執迷終身之言也議論郊宗議辨其不同之義甚悉答聖問賡歌事釋尚書慎乃憲一句稱為法以示人此正與經意相反蓋公紛更一念之私所在而見也看詳雜議凡十四條惟議不當廢發運及都水監為正當餘皆特變他人之説議廢宫觀使副都監此神宗偉舉也惜公不能贊決之世豈有國家大臣而為左道異端看管祠廟之理亦豈有未嘗識其祠廟而繫空銜以素餐及一祠廟而數人重疊繫銜之理世俗習慣恬不為怪公好紛更而此獨不能贊決何耶祿以酬勞者也不釐務於義何取而公乃曰等之無功罪釐務則計日得遷不釐務則不得計日而遷為不均此尤謬論也漢以丞相史刺察州郡謂之刺史及本朝許元為轉運使諸路有米貴則全輸錢以當年額而為之就米賤路分糴之年額易辦而所收錢米常以有餘詳定十二事議溫公請舊官九品之外别分職任差遣為十二等王圭以為難行而荆公併非之易泛論釋易中字義甚詳卦名解始於剛柔始交之屯輾轉次第用序卦之法而論其次頗有牽強處內云中孚者至誠之卦無妄則不妄而已此恐未安無字與不字自是兩義也河圖洛書義謂圖以示天道河通天而龍尚變天道也書以示人道洛中地而龜尚占人道也義亦通但未常不相關而河通天之説恐難考諌官論謂諌官之置為非諌官士耳而責以三公之事主聽之而改則是上制命而君聽此公強狠自任不恤人言之心所發也狂夫之言聖人擇焉而可曰君聽命於士乎伯夷論謂伯夷未嘗有叩馬諌伐之事而韓子之頌為大不然疑伯夷不過老死道路耳果如公言則孔子求仁得仁又何怨之説及餓死首陽之下民到于今稱之之説果何為而發哉甚矣公之好異論疾正人而不顧經訓也三聖人指伊尹夷惠言之謂各隨時制行以矯其弊至孔子時三聖人之弊各極於天下乃出於聖之時四人相為終始而集成非孔子一人之力使三人者當孔子時皆足為孔子何哉公之舛談也周公論謂荀子所載周公禮士之事無之不過修養賢教士之法愚謂荀卿所載固不免後世增飾之説然養賢教士乃公治定後旋為之制方其驅馳艱難時安得而不下禮於士荆公之論適足以啓後世富貴者簡賢之心非有識之言也子貢論闢史記所載説齊伐吳救魯之説理有文暢可以成誦揚孟論言性蓋公尊揚故牽合其説材論謂天下未嘗無才與前所上仁宗書正相反而此論為正命解謂孔子不得行道孟子不得行禮此不過嫉世之言對疑釋供奉官以下不得行親喪之意洪範傳其字義多足取者易象論解倣序卦言次第之義周南詩次解亦倣序卦為之禮論謂荀卿不知禮自是曉然之理禮樂論以道家修養法釋先王立禮樂之意則公溺於異端之見也大人論亦涉異端致一論言安身崇德九卦論言處困之道皆於理無背九變而賞罰可言論蓋釋莊周之言所未曉也然其言曰莊周古之荒唐人也聖人者與之遇約之不聽殆將擯之海外不使疑中國此其言當書夫子賢於堯舜論孟子此言不過以其集大成功施萬世耳而公以制法為言蓋借以發一己之私見又以伊尹伯夷柳下惠孔子四人相因而備殊覺多事且謂道發乎伏羲而成乎堯舜昔揚雄以法為言則可耳道豈有待而成耶且又謂繼而大之於禹堯舜之道豈待禹而後大者耶三不欺論古人之言自各有攸當於理未礙恐不必各指一事之偶不合者以難之也王霸論明白可讀性情論雖間於理未合而謂情本非惡之説正勇惠論孟子之説已明不待言者也仁智論按里仁一篇已明白中述之説平行述謂孔子非求行道恐是矯世愚按孔子嘗曰吾豈匏瓜也哉安能繫而弗食夔説謂集禹稷等衆臣成功夔所以稱其樂之和美非以為伐以美舜也季子謂其葬子三號遂行既聘而反不盡哀為非禮孔子稱之蓋稱其葬之合於禮爾荀卿辨其仁智之説為失次楊墨謂楊子為己近於儒墨子為人逺於道公蓋有疑於孔子為己為人之分也不知義理各有攸當孔子之為已是務實楊朱之為我是自私兩不相干此説只合以孟子之説為正老子辨其三十輻共一轂當其無有車之用謂無之所以為用者以有轂輻也無之所以為天下用者以有禮樂刑政也如其廢轂輻於車廢禮樂刑政於天下而坐求其無之為用也則亦近於愚矣愚按此論甚工當寫出熟讀莊周謂其矯枉過正原性性説二篇闢韓文公對難説命祿隱一篇專為揚雄飾事莽之非然皆泛辭無説可解太古謂太古之不可行原教謂善教者正已而不強民原過謂改過則復得其性進説謂楊叔明以父任得京官不必自枉為進士然謂進士者皆枉已則恐太過取材欲策進士以經學愚謂人才皆可用顧人主用之如何必欲求多於藝文間抑末耳興賢一篇亦可讀謂商之興有仲虺伊尹其衰也亦有三人周之興同心者十人其衰也亦有祭公謀父內史過兩漢之興也有蕭曹冦鄧之徒其衰也亦有王嘉傅喜陳蕃李固之衆亦有之説極精神委任云不疑於物物亦誠焉此名言也然愚謂行之以明然後無弊若公於吕惠卿輩何嘗疑之彼果以誠報公耶知人一篇明潔可讀謂貪人廉淫人潔佞人直風俗言京師奢侈之弊閔習言父母死則燔而捐之水中復讎解謂復讎之義為亂世之子弟言之推命對言貴賤天之所為但當力於仁義文極工當寫讀使醫以喻專任愚謂有專任而治者有專任而亂者言不可若是其幾也汴説詆富貴人寵術士者文甚工可讀議茶法謂鞭撲流徒之罪未嘗少弛而私販私市者亦未嘗絶於道路昔𢎞羊榷酤霍光罷其法蓋義之勝利久矣嗚呼方公為此議是非曉然何他日之弗思耶乞制置三司條例謂省勞費去重斂寬民力然則公之行此自以為可利天下也相鶴經謂作於浮丘伯而淮南公得之嵩山恐未必然策問十一道皆簡易許氏世譜許規嘗羈旅宣歙間旁舍有呻吟且死指槖中有黃金十斤屬以骸骨者規負其骨千里并黃金致死者家規蓋國初人生三子遂逖逈遂起家云傷仲永金溪農家子方仲永五歲能詩父日携之環丐於邑人不使讀書十二三歲而詩不及前年二十而泯然衆人矣教之不可已如此書答韓求仁書前一段説詩後説論語皆有可觀答龔深父書謂揚雄之仕合於孔子無不可之義吾斯之未能信也公山弗擾以費叛召子欲往欲往非真往也向使其真往必有救正之矣豈至如揚雄從叛又復而歌頌之耶答韶州張殿丞書文字宛轉可觀答司馬公書執迷之説也答曾公立書狠愎尤甚答吕吉甫王子醇書又相從於惡者也與陳和叔內翰書謂其以劵致饋喻令來取為非交際之道而不受陳誼甚正可以廉頑答曾子固書謂小説無所不讀然後能知大體嗚呼此公之所以不能知大體歟又謂方今亂俗不在於佛嗚呼此公之所以自誤而亂俗者歟上相府執政等書皆公初年以私計擇官其上相府有云牛羊之踐不忍不仁於草木按行葦詩乃牧人禁止牛羊之辭故曰牛羊勿踐履或詩人感興之言未必出於牧人也况可謂出於牛羊耶與劉原父書昔梁王墮馬賈生悲哀泔魚傷人曾子涕泣今勞人費財於前而利不遂於後此某所以愧恨無窮也按公此言其良心之一復歟答吳孝宗書孝宗謂詩禮不可以相解公謂惟詩禮足以相解愚按詩言人情未必真有其事禮則制度確然皆有其實鄭康成以禮解詩或多拘泥動以託興之言求之制度至其解禮則的當精潔後世雖有解者不過衍之耳吳孝宗之言恐不為無見也答錢公輔書公輔以先人屬公為銘欲有所增損而公斥之至謂其甲科通判市井小人皆可得之何足道蓋公之執拗暴厲多類此與王逢原書謂窮而憂世近於救鄉鄰之鬪上杜學士言開河書此公宰鄞時勤民之事也當録出與李參書云闔門與其子市雖盡得子之財猶不富也其後公雖不能行亦可謂善喻然公本心常以榷民之利為非所行新法皆求所以利民而不知適以擾之故公終其身不悟答段縫書為曾子固辨謗上運使孫司諌書諌其令吏民出錢募人捕盜謂海旁之人雖日殺人而禁之勢不止也今重誘之使相捕告則州縣之獄必蕃而民之陷刑者將衆此仁人之言也公時為令而敢以此諌切其部使者仁者之勇也上人書云文者務為有補於世而已又與祖擇之書謂二帝三王引而被之天下之民孔子孟子書之策皆聖人之所謂文也愚謂論文至此不其盛矣乎答王該書云不幸而無以養故自縻於此此公作邑時言也讀之於我心有戚戚焉他日公亦云居非其好任非其事又云茍居竊食動輒愧心答蔣頴叔書説佛家無性之義然不可曉啓賀韓魏公啓言衆人之所未嘗任大臣之所不敢此確論也公之啓皆平易如散文但逐句字數相對以便讀耳自宏詞之科既設啓表遂為程文各以格名無復氣象記君子齋記大略云天子諸侯謂之君卿大夫謂之子古之為此名也所以命天下之有德故天下之有德通謂之君子有其位無其德謂之君子稱其位也有其德無其位謂之君子稱其德也位在外也遇而有之則人以其名豫之而以貌事之德在我也求而有之則人以其實豫之而心服之終篇反覆歸重於德可録出讀誦桂州新城記謂城郭非先王所恃以為存又不當以為後而歸重於得人理正文婉繁昌縣學記謂奠先聖先師於學而無廟古也聖人與天地同其德天地之大萬物無可稱德故其祀質而已無文也皆説得正大芝閣記實貶題而寄興以及其大者意味無窮猶為諸記中第一鄞縣經遊記為浚渠作也當考慈溪縣學記起頭謂天下不可一日而無政教故學不可一日而亡於天下此兩句關涉大揚州龍興講院記結句云嗚呼失之此而彼得焉其有以也夫此文法之妙世所共稱道者也然邪説誣民故浮屠之寺廟被四海此何足以稱其賢而反借之以貶吾儒哉石門亭記文之變體也撫州見山閣記謂富工豪賈往往能廣宫室吏亦當因其餘力以自娛樂於理已短又貶召伯甘棠之事為非尤未安九曜閣記揚州新園亭記撫州三清殿記皆隨事立文法精確老蒼序周禮詩書三經義序皆公自主其説字説序謂知此則於道德之意已十九何過耶老杜詩後集序云嗚呼詩其難惟有甫哉石仲卿字序謂成人則貴而字之春秋二百四十二年間字而不名者十二人而已不失其所以貴乃爾少也唐百家詩選序云廢日力於此良可悔也可謂髙論已嗚呼公才髙千古無書不讀於詩特遊戲且悔之如此况庸衆人平生矻矻於詩者乎雖然惟其不如公所以不知悔送孫正之序以不以時勝道為説以孟子韓文公為證此正論也胡叔才序以無祿位為親榮而指示其在我之榮祭文祭范文正始贊其力行終惜其不盡試祭歐陽公謂其積於中者浩如江河之停蓄其發於外者爛如日星之光輝其清音幽韻凄如飄風急雨之驟至其雄辭閎辨快如輕車駿馬之奔馳世之學者無問乎識與不識而讀其文則其人可知凡皆二公實録也祭束向稱霜落之林豪鷹雋鸇萬鳥逃避直摩蒼天又稱如羈駿馬以駕柴車側身墮首與蹇同芻此言其才而不遇文皆精妙行狀曹瑋行狀載邊功詳可為後世法墓志銘孔道輔銘志以擊蛇為小事而附其後得體曾致堯志為其孫南豐作也末論遇合處宛轉可法蘇安世志載其辨歐九見誣於首節推陳之元志無實事以虛文反覆可觀贈光祿趙師旦儂賊時死節士也李餘慶作華亭海鹽二監為石堤自平望至吳江五十里皆其倅秀州時也仲訥權明州推官辨海賊數十臨川吳子善為家有篤行發明處極可觀比部陳君銘工傅立遺戒以質田劵還田主郭維知南豐治豪猾觀政者奉化王文亮導之後也嘗渡浙江有忘白金百斤者留守三日以歸之海陵簿許平志亦以虛文發明知興元王公為通判真定時能化誘其帥王嗣宗之暴載其他事皆可法劉牧均稅江西期年而後反曰是役也朝廷豈以為他亦曰愛人而已今不深知其利害而茍簡以成之君雖以吾為敏而人必有不勝其弊者陳夫人生子余翼三歲而遊學四方不相聞在外十二年以進士起家為吏始歸見夫人於鄉世豈有三歲而遊學四方者耶恐傳本訛耳文人不護細行世有是言矣亦孰知博學能文其清修苦節有如荆公者乎然公之文有論理者必欲兼仁與智而又通乎命有論治者必欲養士教士取士然後以更天下之法度其文率曖昧而不彰迂弱而不振未見其有犂然當人心使人心開目明誦詠不忘者或者辨析義理之精微經綸治道之大要固有待於致知之真儒耶惟律詩出於自然追蹤老杜記志極其精彩髣佛昌黎雖有作者莫之能及公其文人之護細行者乎嗚呼文亦何補於世乃因細行而致大用以其論理論治之差者而施之天下則所傷多矣蜀人黃制參有大年且九十作書撫州求荆公集云人雖誤國文則傳世此確論也因附此然公論治講理之文與題詠記偈之文如出兩手又不當例觀也咸淳八年十月再書黃氏日抄卷六十四
