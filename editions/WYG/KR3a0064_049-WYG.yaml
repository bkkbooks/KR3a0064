front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0064_WYG_049-1a, image: WYG0708/WYG0708-0316c.png}
body:
  text: 黃氏日抄卷四十九宋黄震撰讀史四唐書太宗造唐者太宗也天下既定雖高祖且當退為天子之父柰何又欲授無頼之建成乎使開創之初人彛泯絶終唐之世亂臣賊子接踵而不可救者雖太宗慚德居多在高祖亦有當審處者蕭銑蕭銑之起兵最正獨天命在唐耳史臣謂斬銑為聖不亦異乎温造温造勁烈士也然定興元之亂斬人八百淫刑甚矣姜確姜確磨班超碑而自刻其功有德者不為也姜皎殆漢所謂佞幸之流與李嗣真李嗣真以程嬰杵臼對武氏之女可以言社稷功矣杜伏威一降盜耳高祖位之元吉之上何哉唐之所謂禮法也李靖李靖為將材氣逺過衛霍而志識則無以異也其孟子所謂我能為君戰必克者與李勣陳平王諸吕李勣册武氏其罪則均而陛下家事一語遂為後世佞臣之口實為庸君肆無忌憚之故智罪尤不勝誅嗚呼太宗平生之治功盡壞於託李勣李勣平生之戰功盡壞於立武氏惜哉侯君集侯君集張亮薛萬均兄弟盛彦師盧師尚劉世讓李君羨皆乘時奮起無一令終葢行軍用兵而不知有仁義之說以將之未有不適以自禍者也房𤣥齡房𤣥齡謀臣而守正死不忘忠諫然所以為社稷長計者未聞也封倫裴矩世稱封倫裴矩詐足以亡隋而智足以興唐愚謂裴矩入唐粗知革面倫長惡不悛於興唐何功觀其於太宗父子兄弟之間可見矣向使其言一售又安知其不又亡唐耶李義琰李義琰既諫高宗以武氏攝國旋又慕疏廣之為當諫而諫之知其終不可救而去之非賢智而能之乎裴行儉裴行儉才敏之士知武氏之立為憂之始乃不諫不去而生事夷狄以為功陋矣婁師德婁師德立賊后之朝而能以功名始終後世稱其賢夫子所謂其愚不可及矣徐有功徐有功志士仁人何施不可世每以張釋之較優劣徒見其司刑故耳狄仁傑狄仁傑社稷臣裴炎裴炎受高宗顧命而以一語之失廢中宗自李勣至炎有唐再失託孤之任矣國欲治得乎嗚呼甚矣伊霍孔明之不世出而事莫難於託孤也哉王慶之王慶之請立武承嗣為後李昭德立笞殺之凛凛乎古大臣也哉張柬之張柬之言諸葛亮御逺夷法三代遺意也姚崇宋璟盧懐慎姚崇之才宋璟之賢人孰不知其為有唐之名相若盧懷慎獨非名相乎而以伴食稱此當時奴僕小人論公之語而史載之過矣夫姚崇機智足以應變而懷慎盛德足以成人休休有容不啻已出而崇之才即懷慎之才矣此固人情之所甚難古人之所最貴大臣之道莫賢於此而謂之伴食何哉夫謂之伴食必其依阿無恥懷禄茍安則可爾懷慎身位上相家無儋石孜孜體國至死益堅屬疾則念明皇倦勤將有憸人乘間之患遺言則薦宋璟諸賢以為社稷無窮之謀豈區區材智之士平日私意雜擾矜炫目前功必巳出者能爾耶然則懷慎之為唐計真當於古人中求之而姚崇亦後世之才耳柰何反譏其伴食哉嚴挺之嚴挺之寧不作相不見李林甫崔隠甫寧不作相不見牛仙客天理人慾之辨昭然如此豈不誠大丈夫哉裴諝裴諝不對𣙜酤之問懐利以事君者能之乎李林甫唐世宗室相者九人惟失之林甫耳劉知幾吳競號唐史之巨擘然後世無述焉豈文承八代之陋與王忠嗣王忠嗣名將然石堡城之不可取又强勉以助其役唐監公論之精矣史臣謂其拙於謀身何等法語耶宇文融宇文融以材智之士而為聚歛之首甚矣材智之足以誤身而擇術之不可以不謹也李光弼李光弼古今名將而魚朝㤙程元振忌媢之史臣不恨時君偏聽之過而亦責其拙於謀身何哉李晟李晟之収京師李愬之平淮蔡皆兵不血刄而成功三代仁義之將寥寥千百載無聞矣而西平王之父子有焉嗚呼是豈特戡定禍難而已哉其為唐室祈天永命固結人心之助於斯為大矣陸宣公陸宣公王佐才也東坡之説盡之李德裕至韓偓傳德裕以其君中興天下而鄭肅與之同心輔佐牛李之黨翻覆如輪而肅又不與焉以肅視德裕才雖不逮而德似過之矣豈不誠賢宰相哉鄭綮不特自知之明不敢忝相位迹其平日守廬州而盜不入境留緡錢而盜不敢犯亦自有大過人者不謂之賢相不可也論大臣未觀其事業先觀其進退未有進退之迹不明而可以成事業者也唐末諸相率賂權宦以求之綮之初相獨驚怪而固辭其進甚明也唐末諸相率植黨與以持之綮之既相獨致仕而速去其退甚明也進退之迹如此不賢而能之乎此愚讀史至綮傳未嘗不遐想而三歎也馬植至王潮傳列傳終鄭畋出將有破賊之功入相有運籌之益功成身退始終俊偉唐末諸相惟畋優焉葢自餘慶以下鄭氏之相唐者八人闕嗚呼不其盛與我思古人烏得不為之三歎忠義傳張睢陽提疲卒數千抗强虜十萬四百餘戰無挫衂天下竒才也保睢陽以保江淮保江淮以保四海有唐藉以中興焉天下竒功也一死睢陽餘事耳不當徒以其死節言許敬宗之祖而有許逺之孫人可以門户論哉隠逸傳唐史以隠逸先循吏是何重介僻之士而輕為民父母者哉天地生才國家養士正為何事孔子歴聘孟子游説果為何説而惑於莊生寓言之許由哉且隠逸者獨善其身之名也唐隠逸惟孫思邈志行修潔言論可法無媿於隠逸之名其餘不為清談則為沈湎又否則為道士異端之學敗禮傷教於斯為甚使唐之大體不正又一西晉矣曾是而謂之獨善可乎就使其能獨善是其志不伸於時澤不加於民德雖未必與達者異而功則不得與達者伍隠逸之不先循吏亦昭昭矣况其不能獨善而可先之乎不可先而先之得無傷政教之實而長行怪之風乎愚故疑而識之以諗同志者儒學傳元澹至許康佐終焉排二氏以續孔孟之絶約六經以起八代之衰唐之儒學孰有加於文公乎若訓詁之學則陸德明顔師古孔穎達用意亦良苦如漢馬鄭之流矣今唐史凢議一制度之㳂革一俎豆之隆殺者皆謂之儒甚至修姓氏之學者亦預焉嗚呼是何儒學之䙝哉文藝傳論者謂李杜氣節高偉其自負不止文辭間不當與沈宋謟諛者伍愚亦謂李翰表上張廵之功狀使廵大節白於世邪説不得行而朝廷之賞當其功葢義士也有闗於風教者也當傳之廵逺之後而不當傳之文藝之列若駱賓王從徐敬業亂而亦不失文藝之名或者以其一抷之土未乾六尺之孤安託此二語有足以聲賊后之罪與烈女傳房𤣥齡妻止楊烈婦楊烈婦厲其夫以死守陳州而身執㸑以享士士大夫為王官而佐其長者當何如也鄒保英妻奚氏率家僮女丁乗平州不下賊然則謂士卒罷脆不足用者天下安有此理也唐史自高叡妻秦氏以下七人或死不降賊或嬰城死守或㰱血赴難磊磊落落與海岱爭雄與雪霜爭嚴與日月爭明何物女子廼爾壯健人生七尺男子軀盍自激昻哉外戚宦者傳酷吏傳按三者之名雖為唐之姦則一然亦無一獲自全者彼小人兮何利為此漢世酷吏徃徃多黠特之才足以使盜賊屏息夷狄畏憚其後有以慘虐助椎剥濟武帝之私欲者葢流弊耳若唐之酷吏則不然一時奴隸小人竟據風憲要地為賊后除唐之宗室大臣以滅唐之宗廟社稷使天不生張柬之唐且一絶而不復續故愚嘗妄論來俊臣之流當稱賊臣傳不止酷吏而巳李昭德搒殺侯思立與笞殺王慶之皆發於一念忠憤其事之難其功之大視漢申屠嘉百倍仇士良戒其徒毋令天子暇暇則觀書親儒生莫若殖財貨盛鷹馬日以毬獵聲色蠱其心嗚呼是誠何心哉然愚嘗謂士良陰用其術雖有損於一時史臣明記其言實有益於萬世使有天下者常書士良傳一通揭之座隅朝夕觀省焉彼挾士良之術者又安得而售乎五代史一行傳歐陽公之為五代史既分國為之傳又傳死節又傳死事又傳一行其汲汲於賢人君子如淘金於沙搜擇無所不至其存心亦甚厚其用意亦甚勤矣然觀一行傳惟石昻之去就李自倫之孝友足以當之若鄭遨張薦明一道士耳謂其過於石門荷篠殆未知其所安程福贇以忠被罪至死不言可以為難矣今以為古之義士則恐其未免䧟君於過舉於義尚有當審處者唐六臣傳著唐臣於五代以見空國無君子而後國隨之欲空人之國者必先為朋黨之說以空其君子也其垂戒之意深矣嗚呼其亦有感之言與義兒傳伶官傳宦者傳按張承業大唐之忠臣非五代臣也雜傳按王師範飾治以儒謀殺朱全忠雖不遂其忠於唐可知至全忠既帝天下而族之則置酒行禮少長以次就戮其與結纓之勇何異惟其力屈降梁歐公併亦辱之雜傳惜哉何不以其死於臨刑者為唐守節而死耶李愚至趙延義雜傳按李愚為相誠非經濟材廢帝謂之粥飯僧亦宜矣然貧至無屋以居又欲依古以創理則其清儉好古何如哉後世欺君誤國惟知土木兼并之是務者滔滔又皆粥飯僧罪人也吁十國世家按十國除劉旻為漢氏子孫餘多僭亂以有其國吳趙獨平亂而有之餘或拒命以有其國吳越獨奉命而有之安静百年以歸真主三世四王靡聞失德故方是時天下皆糜爛於争戰惟兩浙不知為五代可不謂有大功於民也哉然則牛斗之祥夫豈偶然而歐公於十國乃獨譏吳越之虐嗚呼不猶愈於吳蜀荆閩日夜驅臣於鋒鏑者乎黃氏日抄卷四十九
