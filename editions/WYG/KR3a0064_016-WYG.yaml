body:
  text: 黄氏日抄卷十六宋黄震撰讀禮記王制第五漢郊祀志文帝使博士諸生刺六經中作王制謀議廵守封禪事江陵項氏安世曰王制之言爵禄取於孟子其言廵守取於虞書其言歳三田及大司徒大司馬大司空三官則皆取於公羊氏其言諸侯朝聘之節則取於左氏其餘必皆有所授石林葉氏夢得曰九州之地近於誣誕朝聘之禮疑於晉文所制愚按西漢惟有五經博士未嘗有六經之名郊祀志言刺六經盖班固生於後漢追為此論而不計其實况孟子公羊左氏皆不在六經之列惟廵守見於虞書為列於五經然其書昭白正不待别集為王制而後可知其實周室班爵之制孟子生於周末其詳已不復可聞况漢人耶王制既與孟子不同周禮出於漢末之劉歆又與王制不同今諸儒之說禮者乃欲强三者之不同以為同囘護條析動累萬言今皆不録而惟以先出之孟子為正餘則取其折𠂻而不曲說者附之王者之制禄爵公侯伯子男凢五等諸侯之上大夫卿下大夫上士中士下士凡五等天子之田方千里公侯田方百里伯七十里子男五十里不能五十里者不合於天子附於諸侯曰附庸天子之三公之田視公侯天子之卿視伯天子之大夫視子男天子之元士視附庸上大夫卿謂上大夫即卿也不合謂不朝㑹也此書先言王者制禄爵之事公侯伯子男以下爵也天子之田以下禄也然與孟子不同孟子曰天子一位公一位侯一位伯一位子男同一位則其爵不同又曰天子之卿受地視侯大夫受地視伯元士受地視子男則其禄亦不同補制農田百畆百畆之分上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庶人在官者其禄以是為差也分夫問反食音嗣差初佳反此言授田之法庻人在官者其受禄不同亦有此五等按孟子上農夫食九人上次食八人中次食六人下食五人補諸侯之下士視上農夫禄足以代其耕也中士倍下士上士倍中士下大夫倍上士卿四大夫禄君十卿禄次國之卿三大夫禄君十卿禄小國之卿倍大夫禄君十卿禄此班禄尊卑之差也必本於上農夫者示禄出於農等而上之皆以代耕者也按孟子大國地方百里君十卿禄卿禄四大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同禄禄足以代其耕也次國地方七十里君十卿禄卿禄三大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同禄禄足以代其耕也小國地方五十里君十卿禄卿禄二大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同禄禄足以代其耕也次國之上卿位當大國之中中當其下下當其上大夫小國之上卿位當大國之下卿中當其上大夫下當其下大夫其有中士下士者數各居其上之三分次國之上卿至下當其下大夫此臧宣叔之言見左氏傳成公三年永嘉徐氏謂春秋時士大夫以為周制列國之卿當小國之君持是藉口故每以臣而敵君偃然主盟㑹而不辭於是垂隴之盟三國之君在焉而士縠專之新城之盟七國之君在焉而趙盾專之未㡬而樂林之師以四國之君㑹晉大夫而不以為歉鞍之戰以大夫而敵齊侯溴梁之盟以大夫而傲其君皆始於列國之卿當小國之君之說也而君臣之分紊矣要之國雖有小大君臣之分安可紊也哉其有者不常有之辭中士下士或有之則制禄之數當居上士三分之一用徐氏及卲氏説補凡四海之内九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國名山大澤不以封其餘以為附庸閒田八州州二百一十國天子之縣内方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國名山大澤不以朌其餘以禄士以為閒田凡九州千七百七十三國天子之元士諸侯之附庸不與朌音班與音預晦菴曰封國之制漢儒止是立下一箇筭法非惟施之當今不可行雖求之昔時亦難曉設如夏時封建之國至商革命若地多者削其國以予少者彼未必服或以生亂延平周氏曰州二百一十國與内縣九十三國非實有其國特計其地之所能容慈湖楊氏曰九州合為千七百七十三國以應周千八百諸侯之數牽合可笑人羣生天地間皆有血氣心知不能以無欲欲則爭則闘則傷則殺其天性之美稍公且正者則足以服其比鄰比鄰歸之凡百取平焉則五有長十有長百有長千有長其徳愈大所服愈廣是故有小國之君又有大國之君其為君為長者地醜德齊莫能相尚其間有聖人出焉舉天下咸歸服之是為帝為王夫所謂為君為長者皆諸侯也大小之數多寡之數豈得而預定又豈能立新法更易之増損之以合王制所言之數耶武王克商㓕國五十爾餘率因其舊漢儒乃為是等等差差不可少有増損之制亦不思甚矣集天子百里之内以共官千里之内以共御共音恭百里謂近王城五十里合四面相距為百里千里謂去王城各五百里合四面為千里官謂官府所須御謂進御所須此言以田稅共給其用也然豈以近者供官逺者供御乎豈官府之供止百里服膳之供必千里乎似當合王府之財而通其調度乃可也馬氏陳氏王氏千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下以為左右曰二伯屬聨連比卒伍州聚也正帥長八伯之屬八伯又二伯之屬千里之外設方伯連帥故宜有之五國十國三十國亦宜或然但州必二百一十國恐不必然也臨川王氏千里之内曰甸千里之外曰采曰流甸則禹貢所謂甸服也采則禹貢侯服之百里采流則禹貢荒服之二百里流也甸者天子所自治采主侯服之近者言流主荒服之逺者言采者食采流者流放罪人之地也陳氏李氏說天子三公九卿二十七大夫八十一元士自三公至元士皆以三數逓増之義取陽數窮於九九也陳祥道講義曰孔子聞郯子之言謂天子失官學在四夷猶信孟子答北宫錡之問謂其詳不可得聞諸侯已皆去其籍此書所載與書之周官及明堂位所載建官之數各不同不必切切求合愚按此書與明堂位皆漢人之文但當以書之周官為正補大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君下大夫五人上士二十七人小國二卿皆命於其君下大夫五人上士二十七人三卿司徒司馬司空大國欲其權不侔上故三卿皆命於天子小國欲其權足以制下故二卿皆命於其君次國處大國小國之間故二卿命於天子一卿命於其君大夫言下不言上以上大夫即卿士言上不言中下以中下士有時而缺邵氏天子使其大夫為三監監於方伯之國國三人方伯專征權重故每國立三人為之監先儒以三公之孤當之孤亦一人耳大國三卿既皆命於天子夫孤者王朝之所遣三卿者王命之所置本共為三人歟方氏與應氏補天子之縣内諸侯禄也外諸侯嗣也内諸侯必禄者不棄賢者之後外諸侯必嗣者不絶功臣之世若内諸侯使有其地則權移於下而人主孤立矣外諸侯不使之專其國則藩屏無助而人主亦孤立矣陳氏制三公一命卷若有加則賜也不過九命次國之君不過七命小國之君不過五命大國之卿不過三命下卿再命小國之卿與下大夫一命卷音衮制特為之制也三公一命卷者三公八命服鷩冕加一命則服衮冕也卷即衮畫龍於衮也龍能躍能飛或屈或伸故曰卷猶雲門謂之大卷也天子畵升龍三公有降龍而無升龍若有加則賜者三公在内八命出封則加一等從九章而衮冕也不過九命者八命加一命為九也若七命則自鷩冕以下五命則自毳衣以下三命則希之衣一章裳二章為三再命則𤣥衣黼裳一命則𤣥衣纁裳也按虞書作服自日月星辰以下凡十二章鄭氏謂周升日月星辰於旗其衣服止自龍以下凡九章林少頴謂周亦十二章也鄭據左氏三辰旂旗為言然左氏謂旗有三辰何嘗謂衣無三辰耶郊特牲王被衮以象天則十二章皆備鄭氏乃指為魯禮豈周止九章而魯反十二乎秦溪楊氏謂公既九章推而上之則天子十二章可知若君臣同服必無此理賈公彦云鄭氏九章此無正文乃以意解之前乎鄭氏漢明帝用歐陽說義天子備十二章猶用周制自鄭氏說行古制始失集凡官民材必先論之論辨然後使之任事然後爵之位定然後禄之此言官使民之有材者論擇辨定任以爵禄也其後則言進士之賢者焉孔氏方氏說爵人於朝與士共之刑人於市與衆棄之是故公家不畜刑人大夫弗養士遇之塗弗與言也屏之四方唯其所之不及以政示弗故生也弗故生未詳方氏曰使然為故弗故生不使之生也胡氏曰困苦之示若弗故生欲其改過未知孰是然恐欲字誤作故字不可知爵人所以勸君子君子聚於朝故爵人於朝刑人所以懲小人小人㑹於市故刑人於市既刑而棄之公家不畜之矣大夫弗養之矣士弗與之言矣屏之四方雖政賦亦不及之矣用劉氏說補其餘諸侯之於天子也比年一小聘三年一大聘五年一朝案昭三年左𫝊鄭子大叔曰文襄之霸也其務不煩諸侯令三嵗而聘五歳而朝今漢儒乃移以言諸侯於天子刺經顧如此耶聘者相徃來之名非諸侯於天子之禮也補天子五年一廵守歳二月東廵守至於岱宗柴而望祀山川覲諸侯問百年者就見之命大師陳詩以觀民風命市納賈以觀民之所好惡志滛好辟命典禮考時月定日同律禮樂制度衣服正之大音㤗賈音嫁辟匹亦反大師掌樂之官市典市者賈謂物貴賤之數典禮之官於周則太史志滛言所志之滛好辟言所好之辟同律律者度量權衡之所自出欲其有同而無異古注隂管曰同陽管曰律以周官大師執同律以聽軍聲為證亦通天子五年一廵守至覲諸侯出於虞書可言刺經而作餘於漢文時五經未知何據然問髙年陳詩可也求市賈恐䙝而擾耳縱因市賈而知民好之滛辟可於一時革之否耶廵守者廵諸侯之無變法易令茍諸侯無變法易令則其餘皆諸侯能舉之矣似不必屑屑也補山川神祇有不舉者為不敬不敬者君削以地宗廟有不順者為不孝不孝者君絀以爵變禮易樂者為不從不從者君流革制度衣服者為畔畔者君討有功徳於民者加地進律律古注法也謂命服等皆法葉石林以律為樂樂以彰德未知孰是凡言廵守時賞罰之事補五月南廵守至于南嶽如東廵守之禮八月西廵守至于西嶽如南廵守之禮十有一月北廵守至於北嶽如西廵守之禮歸假於祖禰用特此刺虞書而為之父廟曰禰特者一牛晦菴曰廵守亦是立法如此若一歳間行不遍則去一方近處㑹一方諸侯集天子將出類乎上帝宜乎社造乎禰諸侯將出宜乎社造乎禰造七報反類宜造皆祭名類者非郊而祭天故曰類與郊相類也或曰類其神而祭之宜者告以其事之所宜行造者至也即而告之鄭氏陳氏馬氏天子無事與諸侯相見曰朝考禮正刑一德以尊於天子天子賜諸侯樂則以柷將之賜伯子男樂則以鼗將之諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓉然後為鬯未賜圭瓉則資鬯於天子柷昌六反鼗音桃鈇方于反柷鼗皆所以節樂柷狀如漆桶中有椎將作樂先擊之鼗如小鼓長柄旁有耳揺之還自擊圭瓉瓉者鬯之爵以圭為柄鬰者釀秬黍為酒和以鬰金之草謂之鬰鬯言馨香暢逹也宫縣之樂備其作也以柷先之故賜諸侯軒縣之樂不備其作也以鼗先之故賜伯子男將者持其所先以致天子之命而衆器從焉八命作伯賜弓矢乃得征上公九命賜鈇鉞乃得殺賜圭瓉亦上公九命未賜者則資鬯於天子而用璋瓉孔氏劉氏天子命之教然後為學小學在公宫南之左大學在郊天子曰辟雝諸侯曰頖宫命之教然後為學主諸侯言之也小學八歳所入之學教以洒掃應對進退者也大學十五歳所入之學教以格物致知至治國平天下者也辟雝者注云辟明雝和頖宫頖班也班政教也詩傳雝水之外圓如璧頖者半之補天子將出征類乎上帝宜乎社造乎禰禡於所征之地受命於祖受成於學出征執有罪反釋奠於學以訊馘告造乎禰以上凡出皆然故前於天子將出言之自禡於所征之地以下則惟征之時為然於其所征罵焉謂之禡若武成告皇天后土所過名山大川謂殷王受無道是也受成受成謀也馘斷其耳以其無聞也訊者生致之問其罪釋奠於學禮先師也鄭康成始分釋奠為二說謂釋為釋菜謂奠為奠幣後世因其說又分釋奠釋菜為二禮謂釋奠之禮三獻謂釋菜之禮一獻是鄭說既異於王制之本文後世行禮者又異於鄭氏之本說矣然釋奠一事分為二說而乃輕重不同王制之言釋奠豈輕重異禮一時兼行者耶愚按釋奠即舍采盖天子諸侯視學及始立學天子出征反告於學其所行之禮凡三皆言以采而非言以菜皆獻以三而非獻以一與士之始入學而止以菜為祭者其禮全不相干鄭氏因月令誤以采字為菜遂亦誤以士始入學之禮釋王制天子反告於學之禮耳文王世子曰凡學春官釋奠於先師秋冬亦如之周禮曰春入學舍采合舞月令出於吕氏之月紀月紀之元書曰仲春之月上丁命樂正入舞舍采凡此三者皆天子諸侯視學之禮髙誘注云舍猶置也置采帛於先師之前以贄神也是釋奠即舍采而非釋菜也此釋奠之禮一也文王世子又曰凡始立學者必釋奠於先聖先師行事必以幣此始立學之禮是釋奠亦即舍采而非釋菜也此釋奠之禮二也今此王制謂天子出征反釋奠於學此即天子反告於學之禮盖釋奠之禮三也與前所釋奠無以異也奈何鄭氏既註以為奠幣又註以為釋菜耶鄭氏之誤盖自月令之誤始也月紀本云入舞舍采月令訛為習舞釋菜天子諸侯祭先師豈但用菜祭祀合樂侑食豈方習舞入舞之入與習聲相近而訛以入為習舍采之采與菜字相近而訛以采為菜漢儒傳冩月紀既誤鄭氏因而分注釋奠之釋為釋菜則誤益甚矣且釋奠非特於先聖先師然也山川廟社皆用之養老之禮於先老亦用之檀弓之載葬禮亦曰有司以几筵釋奠於墓左彼其祀山川廟社與先老與墓地亦豈用菜者耶贄見必先用幣故事神亦先奠幣名曰釋奠釋奠云者釋置采帛而奠安於神位之前此盖取交神之始禮之最重者言也若菜則菹也物之薄而禮之末也後世雖因鄭氏之說間行釋菜之禮亦未嘗不用腥牲脯脩而獨用菹也豈有捨禮之重者不以名反以禮之末陳為名耶若祭獨以菜則有之盖士始入學見先師之禮學記曰大學始教皮弁祭菜是也人無生而貴者世子之始入學亦然文王世子曰既興器用幣然後釋菜是也言立學之後既已興器用幣然後世子祭菜故繼之云教世子也喪禮載君弔大夫亦釋菜以禮其門神盖禮之至輕者也若王制乃天子告先聖先師之禮鄭氏不當例注釋奠之釋為釋菜天子諸侯未嘗獨以菜祭先聖先師也補天子諸侯無事則歳三田一為乾豆二為賔客三為充君之庖無事而不田曰不敬田不以禮曰暴天物乾音干無事謂無兵䘮之事三田公羊氏謂三時有田惟夏不田方氏謂即乾豆賔客君庖三事與易田獲三品同乾豆謂上殺而中心者腊之為祭祀豆實次殺死差遲以供賔客下殺死最遲以供君庖不敬謂簡祭祀略賔客先神而後人先人而後己其序如此方氏天子不合圍諸侯不掩羣天子殺則下大綏諸侯殺則下小綏大夫殺則止佐車佐車止則百姓田獵綏古作緌今如字田車有綏田者所執以升降田車有佐田者所用以驅馳於大夫言佐則天子諸侯用正車可知殺則不復驅車故下之止之不合圍不掩羣已殺而下其綏止其佐車皆不忍多殺也以大綏言天子小綏言諸侯佐車言大夫重輕之别佐車止而後百姓獵尊卑先後之序用方氏馬氏說獺祭魚然後虞人入澤梁豺祭獸然後田獵鳩化為鷹然後設罻羅草木零落然後入山林昆蟲未蟄不以火田不麛不卵不殺胎不殀夭不覆巢罻音尉麛音迷殀於表切夭烏老切獺祭魚十月月令在正月豺祭獸九月鳩化鷹八月草木零落十月蟲蟄九月虞人掌山澤之官梁絶水取魚者祭魚祭獸謂豺獺聚魚獸以祭其先罻小網火田以火焚之而田獵麛卵胎夭四者皆未成物重傷之巢仰上覆則毁天生萬物以時聖人賛之以徳地生萬物以氣聖人賛之以禮所以輔相天地而交萬物有道也劉氏周氏冡宰制國用必於歳之杪五榖皆入然後制國用用地小大視年之豐耗以三十年之通制國用量入以為出祭用數之仂冡宰者冡以位言其高宰以職言其主也制國用者如今支度制其多少之用也杪者木之末以喻歳之終也必於歳杪者待五榖皆入五榖黍稷菽麥稻也三十年之通者每年所入分為四分一分擬為儲積三分為當年所用則所留已一分二年又留一分三年又留一分是三年總得三分可為一年之蓄通三十之率當有十年之蓄也仂者古注以為十之一方氏謂仂謂卦之仂則四之一然恐概以餘數言之耳集喪三年不祭唯祭天地社稷為越紼而行事䘮用三年之仂䘮祭用不足曰暴有餘曰浩祭豐年不奢㐫年不儉國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通雖有㐫旱水溢民無菜色然後天子食日舉以樂仂音勒䘮不祭不以吉事干㐫事也唯祭天地社稷不以所親廢所尊也越躐也紼輴車索也未葬前常屬紼於輴以備火災今祭天地社稷故越躐此紼而徃祭所也暴猶耗浩猶饒不奢不儉常用數之仂也國有常蓄民無饑民天子乃日舉樂以食程氏謂古人居䘮百事如禮廢祭可也今人百事皆如常獨廢祭不若無廢為愈晦菴謂卒哭之前不得已而廢卒哭之後以衰服特祀於几筵之前以墨衰常祀於家廟不讀祝不受胙補天子七日而殯七月而𦵏諸侯五日而殯五月而𦵏大夫士庻人三日而殯三月而𦵏三年之喪自天子逹尊者舒卑者速父母之喪無不同用鄭氏說庶人縣封𦵏不為雨止不封不樹䘮不貳事自天子逹於庶人䘮從死者祭從生者支子不祭縣封之封為􅉎喪不貳事謂哀不暇他及䘮從死祭從生即中庸𦵏以士祭以大夫之類補天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五大夫三廟一昭一穆與太祖之廟而三士一廟庶人祭於寢昭如字太祖之廟西方東向子孫之廟南北相向而對列於太祖之廟前太祖之子北方南向取其向明故曰昭太祖之孫南方北向取其深逺故曰穆曽孫則復為昭𤣥孫則復為穆昭常為昭穆常為穆但以左右為昭穆而不以昭穆為尊卑故五廟同為都宫則昭常在左穆常在右而外有以不失其序一世自為一廟則昭不見穆穆不見昭而内有以各全其尊故昭與昭為列而無嫌乎子加於父穆與穆為列而無嫌乎父屈於子天子七廟者四世服已窮矣然猶緦也五世同姓已殺矣然猶免也至於六世然後親屬絶故止於三昭三穆與太祖之廟而七其餘降殺以兩集何氏晦菴方氏補天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰烝礿余若反礿薄也春物尚鮮薄也禘次第也物雖未成依次第而祭之也嘗者新榖熟而嘗之烝者衆也冬時物成者衆也或以礿言酌禘言審禘集孔氏方氏天子祭天地諸侯祭社稷大夫祭五祀天子祭天下名山大川五嶽視三公四瀆視諸侯諸侯祭名山大川之在其地者五祀古註司命中霤門行厲按下曲禮戸竈中霤門行也五嶽岱華衡恒嵩四瀆江河淮濟視者視其禮儀之數與相等孔氏方氏天子諸侯祭因國之在其地而無主後者所居因先王先公舊地今無子孫者天子諸侯祭之孔氏天子犆礿祫禘祫嘗祫烝諸侯礿則不禘禘則不嘗嘗則不烝烝則不礿諸侯礿犆禘一犆一祫嘗祫烝祫犆音特犆特也特祭太祖祫合也合祭羣祖於太祖之廟春物少故特祭餘則合也諸侯禮殺於天子四時祭不備礿犆者春礿亦特祭太祖也禘一犆一祫者夏禘則一年特一年祫嘗祫烝祫者秋嘗冬烝皆合祭羣廟也此皆時祭之名非䘮畢之祫及不王不禘之大禘取其序昭穆謂之禘取其集羣祖謂之祫集諸說補天子社稷皆太牢諸侯社稷皆少牢大夫士宗廟之祭有田則祭無田則薦庶人春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以鴈牢圏也畜牲之所太牢具牛羊豕以其大曰太牢少牢羊豚而已以其小曰少牢祭備庶物薦以時物庶人之薦取其易得者而已方氏陳氏祭天地之牛角繭栗宗廟之牛角握賔客之牛角尺諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕庶人無故不食珍庶羞不踰牲燕衣不踰祭服寢不踰廟繭栗牛角方生其形似之也角握者手可握角尺者長及尺凡用牛不同以純而未散者為上無故謂不祭饗祭饗而後殺凢言不踰者皆奉己不敢過奉先之禮用鄭氏周氏補古者公田藉而不稅市㕓而不稅關譏而不征林麓川澤以時入而不禁夫圭田無征藉在亦反麓音鹿藉借也借民力以治公田而不稅民所自治之私田㕓市宅也賦其市地之㕓而不稅其交易之物關者境上門也譏察異言異服之人而不征取商賈之人麓山足水流者曰川鍾者曰澤以時入如獺祭魚然後入澤梁之類而無禁也圭㓗也卿以下必有圭田以奉祭祀圭田無力役布帛之征夫發語辭古注訓治字非集用民之力歳不過三日田里不粥墓地不請粥音育粥賣也役不過三日所以寛其力田里不粥所以定其居墓地有常不請求餘處所以寕其親方氏司空執度度地居民山川沮澤時四時量地逺近興事任力凡民任老者之事食壯者之食上度如字下大洛反沮將慮反上食字音嗣司空冬官掌民事者執度之度丈尺也度地之度量廣狹也沮澤浸潤之處山川沮澤時四時者隨地有氣候之不同也山川沮澤所以辨地宜時四時所以候天氣量地逺近興事任力所以均人力任老者之事食壯者之食寛其力而饒其食也陳氏鄭氏凡居民材必因天地寒煖燥濕廣谷大川異制民生其間者異俗剛柔重輕遲速異齊五味異和器械異制衣服異宜修其教不異其俗齊其政不異其宜齊才細反和胡臥反民材謂其氣性材藝異制謂川谷之形勢異齊讀如五齊之齊謂其性情緩急不同異和謂其嗜好不同天地之氣所至不同民生其間與之不同故其處民材亦隨其所不同惟各因之而修其教齊其政而已齊亦修之義非强其下使齊一也故曰不易其宜補中國戎夷五方之民皆有性也不可推移東方曰夷被髮文身有不火食者矣南方曰蠻雕題交趾有不火食者矣西方曰戎被髪衣皮有不粒食者矣北方曰狄衣羽毛穴居有不粒食者矣中國夷蠻戎狄皆有安居和味宜服利用備器五方之民言語不通嗜欲不同逹其志通其欲東方曰寄南方曰象西方曰狄鞮北方曰譯鞮于兮反雕題者雕刻也題額也謂雕刻其額以丹青湼之交趾者趾足也南蠻臥時頭並向外足在内而相交夷易也蠻慢也戎好兵狄善守或曰狄辟也同穴無别行邪辟也寄象鞮譯者皆轉通言語使與中國相領解寄者寄傳内外之言象者倣象内外之言鞮之言知譯之言陳也五方之民性不可推移地氣使之然也東南之地卑而蛟龍鍾焉故俗之所尚者文身雕題西北之地髙而鳥獸羣焉故俗之所尚衣皮羽毛不特其俗尚亦寒燠之勢異也曰有不火食有不粒食言僻逺之地間有之而皆有安居和味宜服利用備器其事雖異無不自足其足聖人欲達其志通其欲故又各為之置通言語之官孔氏陳氏馬氏凡居民量地以制邑度地以居民地邑民居必參相得也無曠土無游民食節事時民咸安其居樂事勸功尊君親上然後興學度大洛反參七南反樂音洛参相得者以地邑民居相参使無曠土游民樂事勸功尊君親上然後興學者民富而後可教也馬氏孔氏司徒修六禮以節民性明七教以興民徳齊八政以防滛一道徳以同俗養耆老以致孝恤孤獨以逮不足上賢以崇徳簡不肖以絀惡司徒地官掌邦教者六禮冠昏䘮祭鄉與相見凡六七教者父子兄弟夫婦君臣長幼朋友賔客凡七八政者一飲食二衣服三事為四異别五度六量七數八制六十曰耆七十曰老無父曰孤無子曰獨滛過侈也逮及也簡差擇也命鄉簡不帥教者以告耆老皆朝於庠元日習射上功習鄉上齒大司徒帥國之俊士與執事焉不變命國之右鄉簡不帥教者移之左命國之左鄉簡不帥教者移之右如初禮不變移之郊如初禮不變移之遂如初禮不變屏之逺方終身不齒與音預鄉者六鄉之老也以告者告於司徒也庠鄉學也習鄉謂鄉飲也郊者鄉之外遂者郊之外有司空以富之矣有司徒以教之矣而獨不帥則鄉老以告於司徒㑹耆老習射習鄉習射上功以示之行能習鄉尚齒以道之孝悌有不變移之左移之右又移之郊又移之遂四變然後屏之逺方重絶人以惡也周氏陳氏葉氏命鄉論秀士升之司徒曰選士司徒論選士之秀者而升之學曰俊士升於司徒者不征於鄉升於學者不征於司徒曰造士選宣戀反鄉即鄉老也學大學也征徭役也秀於一鄉謂之秀士中於所選謂之選士其俊徳謂之俊士其成德謂之造士將升於司徒者不征於鄉升於天子之學者不征於司徒次第優賢也陳氏李氏樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書王太子王子羣后之太子卿大夫元士之適子國之俊選皆造焉凡入學以齒適丁歴反造七到反樂正樂官之長掌國子之教者也四術詩書禮樂也四教春秋教禮樂冬夏教詩書也然四教不可一日缺豈分四時凡入學必以齒序者王太子至俊選不以貴賤而以長幼也鄭氏陸氏胡氏將出學小胥大胥小樂正簡不帥教者以告於大樂正大樂正以告於王王命三公九卿大夫元士皆入學不變王親視學不變王三日不舉屏之逺方西方曰棘東方曰寄終身不齒將出學注謂九年大成之時也小胥大胥小樂正皆樂官之屬也不舉者食不舉樂也棘者欲其悔過之速寄者示其有復之理於東西不於南北者南北太逺也前章言士之不帥教學屏之逺方終身不齒夫屏之逺方極惡之人罪必不可赦者也人之資禀有髙下而偶不可教則亦出之於學聽其為庶民而已既出而有犯於有司然後加之罪未晩也何至屏之逺方夫既疑已甚矣此章又謂屏逐之罪雖王子不免焉不其又甚也耶且德行在平日豈一視學之頃所能變而於此乎决為已甚之罪耶王制漢人之文不知於古何據屏之而曰寄亦與終身不齒之義似相反王制必刺經而作也當曰扑作教刑奈何舉四㐫之罪以為不帥教之罪耶凡王制多漢人傳聞之言而未必古有其事也補大樂正論造士之秀者以告於王而升諸司馬曰進士司馬辨論官材論進士之賢者以告於王而定其論論定然後官之任官然後爵之位定然後祿之司馬夏官掌邦政凡入仕者皆司馬主之進士者將進而用之之名故自掌教之樂正移名於掌政之司馬自秀士選士俊士造士凡四等自論定而官官而爵爵而祿之凡四等其謹如此補大夫廢其事終身不仕死以士禮𦵏之以其不能任大夫之事不惟貶之於其生而又貶之於其死鄭氏方氏有發則命大司徒教士以車甲有發謂有軍旅事而發士卒也以司徒教之者以司徒主衆又主教故與司馬相参鄭氏孔氏凡執技論力適四方臝股肱决射御凡執技以事上者祝史射御醫卜及百工凡執技以事上者不貳事不移官出鄉不與士齒仕於家者出鄉不與士齒執技論力適四方言執技藝論勇力而適四方者臝股肱謂臝露以宣乎己之力决射御謂决勝負於射御此以力言也技不惟射御而止凡祝也史也醫也卜也及百工之人以技事上者皆技也不貳事不移官皆使專於所業也然藝成而下惟鄉黨則與序齒出鄉則不得與士齒仕於家者僕之類也亦然集司冦正刑明辟以聽獄訟必三刺有㫖無簡不聽附從輕赦從重司冦秋官掌刑者辟法也必三刺者一訊之羣臣二訊之羣吏三訊之萬民刺本訓殺必三訊而後定其可殺與否故曰三刺事見周禮三刺之宜有㫖無簡不聽者宣意也簡所書獄辭也雖求得其㫖意而無誠實之狀亦不敢論定其罪比附於法者從輕法若赦之則從重集凡制五刑必即天論郵罰麗於事制制而用之也五刑墨刖劓宫大辟也必即天論者刑本天討有罪故以天意論罪不敢容己私也郵過也郵吕刑所謂五過罰吕刑所謂五罰皆罪輕而在五刑之用者麗於事謂各附麗於本事不假别事為喜怒而遷其罪也補凡聽五刑之訟必原父子之親立君臣之義以權之意論輕重之序慎測淺深之量以别之悉其聪明致其忠愛以盡之疑獄汜與衆共之衆疑赦之必察小大之比以成之汜莩劒反比必利反汜廣也與汎愛之汎同比附也原父子之情以㤙掩義立君臣之義以義掩恩輕重言其罪淺深言其情大小言其辟悉其聦明則得其情致其忠愛則哀矜而勿喜獄疑與衆廣謀之衆以為疑則赦之小大之比即吕刑所謂上下比罪權之别之盡之矣然後成之而决焉陳氏方氏成獄辭史以獄成告于正正聽之正以獄成告于大司冦大司冦聽之棘木之下大司冦以獄之成告於王王命三公参聽之三公以獄之成告於王王三又然後制刑成獄辭訊獄之辭已成也史司冦之吏掌官書者周禮鄉士史十有二人之類是也正長也此書既言大司冦又言正則正謂小司冦也棘木之下外朝之地也左九棘孤卿大夫位焉右九棘公侯伯子男位焉周禮注謂棘者取其赤心而外刺也三又者審之又三也古注以又作宥亦通獄辭既成史以告於正正告大司㓂大司㓂聽之而後告於王王命三公参聽之而後再告於王王又親自審之者三然後制刑謹之至也補凡作刑罰輕無赦刑者侀也侀者成也一成而不可變故君子盡心焉侀音刑凡作刑罰者雖輕無赦所謂刑故無小懼赦之則犯者衆也上刑是刑罰之刑下侀是侀體之侀刑之已成而不可變猶侀之已成而不可變死者不可復生斷者不可復續故君子最盡心焉用孔氏補析言破律亂名改作執左道以亂政殺作滛聲異服竒技竒器以疑衆殺行偽而堅言偽而辨學非而博順非而澤以疑衆殺假於鬼神時日卜筮以疑衆殺此四誅者不以聽左道謂邪道地道尊右故正道為右不正之道為左析言則離於理破律則壊於法亂名則失其實改作則反其常執左道則背正理而為巫蠱妖術之事凡皆亂政故殺滛聲惑民聽異服惑民視竒技竒器惑民心凡皆疑衆故殺言行偽而不由於誠學順非而不由於是與夫假鬼神以禍福惑人假時日以災祥惑人假卜筮以吉㐫惑人凡亦皆疑衆故殺此四誅者不以聽以其非過誤而情不待於聽也合方氏馬氏周氏凡執禁以齊衆不赦過有圭璧金璋不粥於市命服命車不粥於市宗廟之器不粥於市犧牲不粥於市戎器不粥於市用器不中度不粥於市兵車不中度不粥於市布帛精麤不中數幅廣狹不中量不粥於市姦色亂正色不粥於市錦文珠玉成器不粥於市衣服飲食不粥於市五榖不時果實未孰不粥於市木不中伐不粥於市禽獸魚鼈不中殺不粥於市闗執禁以譏禁異服識異言粥音育中音衆量音亮識音志禁以法示衆使之避者也姦色亂正色如紅紫亂朱之類闗闗門之吏譏呵察也禁以齊衆犯而赦之則犯者多故雖過亦不赦圭璧至戎器上所用在私者粥則慢禮用器至正色上所制違制者粥則亂政錦文至飲食粥則靡俗五榖不時至禽魚不中殺粥則傷物故治市之法皆禁之闗者市物所由入之門故先譏呵之并出入之異言異服者用李氏補太史典禮執簡記奉諱惡烏路反太史之官典掌禮事執簡册所記之言奉進先王之諱及所惡忌之日若子卯日不用者用鄭氏方氏說天子齊戒受諫司㑹以歳之成質於天子冡宰齊戒受質大樂正大司㓂市三官以其成從質於天子大司徒大司馬大司空齊戒受質百官各以其成質於三官大司徒大司馬大司空以百官之成質於天子百官齊戒受質然後休老勞農成歳事制國用齊側皆反㑹古外反勞力報反齊以齊其内心之動戒以防其外物之侵謹之至而神明其身者也司㑹者冡宰之屬掌計要之官也成者計要也質之言平平其計要也市司市也百官司徒司馬司空三官之屬也歳終羣臣奏歳事諫其王以一歳中所當改為之事天子齊戒而受之司㑹以一歳之計要質於天子冡宰亦齊戒而受其質大樂正人材之所主大司㓂民命之所繫司市國貨之所出三者皆要而重亦以其成從司㑹而併質於天子大司徒大司馬大司空又齊戒而受其質司徒司馬司空之屬緫曰百官者又各以其成質於長其長各轉以質於天子百官齊戒受質者古說謂天子平斷畢報百官復齊戒而受之山隂陸氏謂百官各又自受其質也然則歳終以其一歳之成質於天子者凡三司㑹一也樂正司冦司市之三官從司㑹以質二也司徒司馬司空受百官之質以質於天子三也若百官則各又受其在下之質自上逹下各見其成然後蜡祭飲酒以休老勞農成歳事以計今歳之所入制國用以待來歳之所出按冡宰司徒司馬司冦司空五官皆齊戒受質惟宗伯不與以典禮有常無可損益也参泉說補凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人脩而兼用之食音嗣燕禮殽烝於爼行一獻之禮坐而飲酒以至於醉饗禮體薦而不食爵盈而不飲依尊卑為獻取數而已食禮不飲酒享太牢以禮食之其禮以飯為主孔氏五十養於鄉六十養於國七十養於學逹於諸侯八十拜君命一坐再至瞽亦如之九十使人受年彌髙養彌厚八十者使人致其養九十者使人代受集五十異粻六十宿肉七十貳膳八十常珍九十飲食不離寢膳飲從於遊可也粻陟良反粻糧也膳善食也珍竒羙食也隨年為品愈老愈備然豈必人人及於是哉孔氏方氏六十歳制七十時制八十月制九十日脩唯絞紟衾冒死而后制絞户交反紟其鴆反凡皆謂送死之具年愈髙則備之愈宜數歳制謂棺也不易可成故歳制時制謂一時乃辦衣物之難得者月制謂一月可辦衣物之易得者日脩謂棺衣已辦但日日脩九十日修不保月也八十月制不保時也七十時制不保歳也若絞紟衾冒一日二日可成必死而後制君子弗忍預為之也凡預為之者皆非倉猝可辦不得已而為之者也創其始曰制治其壊曰修合方氏孔氏陸氏說五十始衰六十非肉不飽七十非帛不煖八十非人不煖九十雖得人不煖矣五十始衰自此食肉衣帛皆所以扶其衰九十衰之極養之尤宜無所不至方氏五十杖於家六十杖於鄉七十杖於國八十杖於朝九十者天子欲有問焉則就其室以珍從杖者所以扶其力而優其禮也九十就其室問之又以珍羞從而就養之謂非復杖之可扶難使之造朝也用方氏補七十不俟朝八十月告存九十日有秩不俟朝謂揖君即退不立以俟朝禮之畢也月告存謂君使人每月問存否而老者告云存也秩常也日有秩日有常膳之賜也用鄭氏胡氏說五十不從力政六十不與服戎七十不與賔客之事八十齊䘮之事弗及也力政力役之政也服戎兵戎之事也賔客擯相之事齊䘮齊戒與䘮紀之事也力政服戎此免於公者也賔客齊䘮此免於私者也葢代之以子孫矣方氏馬氏五十而爵六十不親學七十致政唯衰麻為䘮爵謂賢者命為大夫不親學不能備弟子禮致政還其職事於君衰麻為䘮與曲禮七十惟衰麻在身同義鄭氏方氏有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊國老卿大夫致仕者庶老士及庶人在官致仕者諸儒皆以養國老者為大學養庶老者為小學盖因王制之言而意之皆無所考然上與下東與西右與左自有差次已明不必更添大小為說用馬氏晦菴說補有虞氏皇而祭深衣而養老夏后氏收而祭燕衣而養老殷人冔而祭縞衣而養老周人冕而祭𤣥衣而養老冔况甫反皇冕屬畵羽飾焉鳯皇之羽五采也夏收殷冔皆冠名收言收歛髮也冔之言幠所以覆飾也深衣上衣下裳相聨深䆳也夏尚黑燕衣黑衣也殷尚白縞衣白衣也𤣥亦黑也祭言冠冠在首尊之也養老言衣衣在體親之也孔氏方氏凡三王養老皆引年引其年之髙下以為養禮之隆殺方氏八十者一子不從政九十者其家不從政廢疾非人不養者一人不從政父母之䘮三年不從政齊衰大功之喪三月不從政將徙於諸侯三月不從政自諸侯來徙家期不從政期音基一子一人若不從政則老者廢疾者有所養居䘮不從政則生者得以盡其哀戚將徙者不從政所以寛之也始來者不從政所以安之也周氏少而無父者謂之孤老而無子者謂之獨老而無妻者謂之矜老而無夫者謂之寡此四者天民之窮而無告者也皆有常餼餼廪也鄭氏瘖聾跛躃斷者侏儒百工各以其器食之跛彼我反躃必亦反瘖不能言聾不能聽跛躃不能行斷者支節斷絶侏儒短人先王之時瘖者以之實土聾者以之司火刖者以之守囿刖則跛躃斷者之類也侏儒以之扶廬扶謂扶持廬謂㦸柄也所以使在下者無廢才而人人各得其養在上者無虚用而事事各極其精故曰百工各以其器食之器者隨材之義也孔氏方氏道路男子由右婦人由左車從中央地道尊右故男右女左車患阽危故從中央父之齒隨行兄之齒鴈行朋友不相踰輕任并重任分班白者不提挈君子耆老不徒行庶人耆老不徒食行戸剛反父之齒年長以倍者兄之齒十年以長者行行列也任指擔負言也并者少壮代老人并擔之重則分擔之也不徒行必以車不徒食必以肉陸氏孔氏大夫祭器不假祭器未成不造燕器大夫有田祿祭器當自具祭器未成不造燕器者當先神而後人方氏方一里者為田九百畝方十里者為方一里者百為田九萬畝方百里者為方十里者百為田九十億畝方千里者為方百里者百為田九萬億畝此自方里為井井九百畝積而至天子之地方千里以開方法筭千里内畝數補自恒山至於南河千里而近自南河至於江千里而近自江至於衡山千里而遥自東河至於東海千里而遥自東河至於西河千里而近自西河至於流沙千里而遥西不盡流沙南不盡衡山東不盡東海北不盡恒山凡四海之内斷長補短方三千里為田八十萬億一萬億畝此因王畿千里開方畝數又縂計天下開方畝數然亦以數約之耳補方百里者為田九十億畝山陵林麓川澤溝瀆城郭宫室塗巷三分去一其餘六十億畝此又以諸侯百里之地而計之然地勢不齊未必如是之斬斬也亦言筭法云耳古者以周尺八尺為歩今以周尺六尺四寸為歩古者百畝當今東田百四十六畝三十歩古者百里當今百二十一里六十歩四尺二寸二分此以周八寸為尺與漢十寸之尺展計補方千里者為方百里者百封方百里者三十國其餘方百里者七十又封方七十里者六十為方百里者二十九方十里者四十其餘方百里者四十方十里者六十又封方五十里者百二十為方百里者三十其餘方百里者十方十里者六十名山大澤不以封其餘以為附庸閒田諸侯之有功者取於閒田以祿之其有削地者歸之閒田此因三代封建之法而推衍筭法如此補天子之縣内方千里者為方百里者百封方百里者九其餘方百里者九十一又封方七十里者二十一為方百里者十方十里者二十九其餘方百里者八十方十里者七十一又封方五十里者六十三為方百里者十五方十里者七十五其餘方百里者六十四方十里者九十六此以天子縣内千里筭開方法亦非實有此國也用周氏補諸侯之下士祿食九人中士食十八人上士食三十六人下大夫食七十二人卿食二百八十八人君食二千八百八十人次國之卿食二百一十六人君食二千一百六十人小國之卿食百四十四人君食千四百四十人次國之卿命於其君者如小國之卿食音嗣此用孟子君十卿祿章筭數補天子之大夫為三監監於諸侯之國者其祿視諸侯之卿其爵視次國之君其祿取之於方伯之地方伯為朝天子皆有湯沐之邑於天子之縣内視元士三監即篇首言監於方伯之國國三人者也湯沐邑惟方伯得視元士元士五十里若諸侯皆有之盡王畿其足以容之乎方氏陳氏諸侯世子世國大夫不世爵使以德爵以功未賜爵視天子之元士以君其國諸侯之大夫不世爵祿未賜爵視天子之元士以君其國者謂世子世國之功也諸侯之大夫不世爵禄者懼其專也用方氏補六禮冠昏䘮祭鄉相見七教父子兄弟夫婦君臣長幼朋友賔客八政飲食衣服事為異别度量數制鄉鄉飲鄉射也相見賔禮也事為百工技藝也異别五方用器不同也度丈尺也量斗斛也數百十也制布帛幅廣狹也鄭氏月令第六秦相吕不韋集儒士使著所聞為十二月紀名吕氏春秋毎篇首皆有月令此書即其文也其衣服器皿官名雖多雜秦制然能仰觀日月星辰霜露之變俯察虫魚草木鳥獸之化以修人事以授民時庶幾虞書厯象之遺意故君子有取焉至其以五行分配五帝盖本鄒衍五運相生之說從而推衍一一分配天子南嚮所居自有定位乃每月而各異其處天子五輅所用自有異宜乃每月而各拘其色犧牲一也時各變其所先器服一也時各變其所尚五榖六畜日用飲食之常也亦隨時而變翦翦焉若不可以相通則未免於拘矣且五氣布而四時行盈天地間無乎不在若四時各得其一機緘不運塊然窮獨何名造化何分配若是其拘而冬行春令之應亦豈能一一盡合耶大抵秦漢之書多以先王遺說為本而雜以後世煩碎為博王制一篇不過因孟子數語周禮六典不過因周官一書從而増益以廣舊聞一列於經無敢輕議徃徃而然不獨月令也故月令固非盡述三代之制亦非立為秦人一代之制吕不韋姑集衆聞而人時行事若可垂訓記禮者又從而取之顧其文辭間有差誤多吕氏之本文為是而月令之傳冩為訛月令孟春書鴻鴈來方春非鴈來之時吕氏云候鴈北則吕氏為是而月令訛也月令迎夏還反行賞既還則不必言反吕氏云還乃行賞則吕氏為是而月令訛也月令上丁習舞釋菜臨祭豈方習舞釋奠豈獨用菜吕氏云入舞舍采注謂奠采帛以贄神則吕氏為是而月令訛也胎夭之夭吕氏作夭注云麛子為夭月令乃作夭折之夭夫曰毋殺孩蟲胎夭飛鳥則夭亦一物甚明此亦吕氏是而月令訛也燒炭之炭吕氏作炭注云不欲夭物月令乃作死灰之灰夫仲夏物長故戒伐木燒炭若灰則何以燒為此亦吕氏是而月令訛也月令曰毋舉大事以揺養氣吕氏元文作蕩揺於氣月令曰毋發令而待以妨神農之事吕氏元文作毋發令而干時月令曰神農將持功夫神農田官之稱而持功則幾於不文吕氏元文曰神農將廵功謂將廵視之是亦皆吕氏是而月令訛也吕氏云土潤溽暑月令訛以溽為辱吕氏云羙士疆月令訛以疆為疆吕氏云廵逺方月令訛以廵為順吕氏云蟄蟲咸俯在穴皆墐其户月令訛以穴為内吕氏云審棺槨之厚薄營丘壠之小大月令訛以營為塋吕氏云地氣且泄是謂發天地之藏月令訛以且為沮吕氏云山林藪澤有能取䟽食田獵禽獸者野虞教導之注云草實曰䟽此言山林藪澤之物也月令乃以䟽為蔬夫蔬者植之畦圃豈取之山林藪澤此訛也吕氏云乃畢行山川之祀及帝之大臣天地之神祗注云天曰神地曰祗此言天地各有其屬也月令乃獨言天地之祗夫上既言天下安得不言神此訛也求已入作氷以入亦訛也夫漢人取吕氏之月紀為月令己亥之為三豕亦勢然也而諸家乃各於月令曲為之說無有取吕氏而證之者豈真以月令之書同於夫子六經而吕氏春秋在所不道邪然此實出於彼遡流而不知源奚可也盖亦有吕氏本誤而月令為是者孟夏王𤓰生而吕氏作王善生當從月令季夏温風至而吕氏作凉風至當從月令月令季冬雉雊雞乳今厯家以雉始雊雞始乳分而為二以足七十二候之數而吕氏正緫云乳雉雊亦當從月令故併考之云補孟春之月日在營室昏參中旦尾中參所林反中如字孟春斗建寅之月夏正之正月營室二十八宿之室星正月中日在營室十四度參西方宿尾東方宿是月昏旦居中中指正南而言補其日甲乙春屬木甲乙木日也言萬物孚甲乙軋乙而生注其帝太皡其神句芒太皡伏犧氏以木德王天下故祀為帝句芒少皡氏啇子名重為木官故祀以配皡廣大句芒物初生句屈有芒角注其蟲鱗其音角蒼龍木屬也其類為鱗故於春則其蟲鱗樂三分羽益一以生角角數六十四屬木故其音角角觸也觸地而出戴芒角也註䟽律中太蔟中竹仲反蔟七豆反律候氣之管以銅為之中猶應也候氣之法作十二管於宻室各月於其方埋之取葭灰實律管中氣至則灰動太蔟者正月之律長八寸此言正月之時候氣飛灰應於太蔟太蔟之義謂萬物出逹而蔟聚於上凡皆注䟽之本說如此蔡邕謂太蔟鍾名正月之律清濁與太蔟鍾聲相應故曰律中太蔟孔氏嘗辨其非而新安王氏主之按髙誘吕氏春秋註亦曰竹管與太蔟音和集其數八天三生木地八成之言八者舉成數本鄭氏說其味酸其臭羶適於口為味通於鼻為臭酸木實之味也羶草木之氣也此主木之臭味言而凡酸羶者皆屬焉用古註補其祀户祭先脾户竒而在内陽自内出之象故祀於春脾土藏也方春木盛尅之故祭先脾以土養木方氏東風解凍蟄蟲始振魚上氷獺祭魚鴻鴈來魚上氷者冬寒魚伏春陽魚游水上而近氷獺祭魚者獺聚魚祭其先鴻鴈來吕氏春秋作候鴈北此五者皆立春後氣候也五日一候一月六候一歳七十二候皆於蟲魚草木占其時至而氣應補天子居青陽左个乗鸞路駕蒼龍載青旂衣青衣服倉玉食麥與羊其器䟽以逹載音戴青陽左个明堂之東向堂北頭室也鸞路以鸞鈴在衡馬八尺以上曰龍蒼則春時之飾也食麥與羊是時之所生也器則疏鏤通逹以象陽氣之射出用方氏及髙誘注補是月也以立春先立春三日太史謁之天子曰某日立春盛徳在木天子乃齊立春之日天子親帥三公九卿諸侯大夫以迎春於東郊還反賞公卿諸侯大夫於朝命相布德和令行慶施惠下及兆民慶賜遂行毋有不當乃命太史守典奉法司天日月星辰之行宿離不貸毋失經紀以初為常還音旋相息亮反貸吐得反太史禮官之屬掌國之六典正歳時以序事相三公也典六典法八法也宿言宿於此離言離於彼日月星辰之行或宿或離有定數焉太史掌之不可差忒貸忒也經紀謂天文進退度數毋失者戒使推筭明也初謂舊法常湏遵奉故曰以初為常還反按吕氏春秋作還乃本經釋文亦作還乃貸吕氏春秋作忒本經古註亦音忒皆當從之月令即吕氏春秋之文盖傳冩誤耳補是月也天子乃以元日祈榖於上帝乃擇元辰天子親載耒耜措之於参保介之御間帥三公九卿諸侯大夫躬耕帝籍天子三推三公五推卿諸侯九推反執爵於太寢三公九卿諸侯大夫皆御命曰勞酒勞力報反元善也日主甲至癸十干為言辰主子至亥十二支為言干屬天故祀帝擇日之善郊用辛也支屬地故躬耕擇辰之善耕用亥也載耒耜措之参於保介之御間者乗車三人天子在左執御者在中保衛而服介胄為車右者在其右其載耒耜而措之車上也必参錯於御與車右兩人所立之間不敢近左邉天子所立之處以車上地狹置耒耜則妨至尊之立非便也躬耕而反公卿以下皆侍而勞之以酒補是月也天氣下降地氣上騰天地和同草木萌動王命布農事命田舍東郊皆修封疆審端徑術善相丘陵阪險原隰土地所宜五穀所殖以教道民必躬親之田事旣飭先定凖直農乃不惑上時掌反術音遂道音導相去聲田謂田畯主農之官舍東郊舍止東郊監治農事術周禮作遂遂小溝也夫間有遂遂上有徑端其徑路不得邪行以敗稼穡相視也阪險傾危也廣平曰原下濕曰隰凖平也直正也此因陽氣蒸逹可耕之候命飭農事先均地域補是月也命樂正入學習舞乃脩祭典命祀山林川澤犧牲毋用牝禁止伐木毋覆巢毋殺孩蟲胎夭飛鳥毋麛毋卵毋聚大衆毋置城郭掩骼埋胔才賜反毋用牝為傷妊也孩蟲蟲未成如孩者胎謂未生夭謂生而已出者然按月紀夭與夭字義並不同麛子曰夭鹿子曰麛胎夭指麛子為言非夭折之夭當從月紀又按王制不殺胎不殀夭則胎與天皆物名亦與月紀合骨朽曰骼肉腐曰胔此月因仲春將釋奠而先習舞并命脩凡祀典命祀山林川澤百物之所生也毋用牝至禁伐木胎夭以下懼傷生也毋聚衆置城郭懼妨農也掩骼埋胔推其所愛於生者以及其死者也凡皆體春生之徳也用鄭氏孔氏馬氏說是月也不可以稱兵稱兵必天殃兵戎不起不可從我始毋變天之道毋絶地之理毋亂人之紀謂不可逆生氣也天地人於春皆生之始也兵其反也補孟春行夏令則雨水不時草木蚤落國時有恐行秋令則其民大疫焱風暴雨總至藜莠蓬蒿並興行冬令則水潦為敗雪霜大摯首種不入莠音酉摯音至種章勇反摯至也蔡邕云折傷首種古說稷蔡邕云宿麥髙誘月紀注春為歳始稼穡應之不成故曰首種不入此章自鄭氏以來皆以天之時令錯行為說至晦菴先生始云人行此令則召天之災今考髙誘吕氏春秋註云春木也夏火也木徳用事法當寛仁而行火性炎上故使草木槁落不待秋冬天氣不和而國人惶恐也木生也金殺也而行其令春陽也冬隂也而行其令故皆致災變此可輔晦菴之說補仲春之月日在奎昏弧中旦建星中仲春夏之二月是月日在奎五度弧星在輿鬼南建星在斗上是月昏旦是星中於南方餘月昏旦星皆舉二十八宿此獨舉弧與建星非二十八宿者由弧星近井建星近斗井凡三十三度斗凡二十六度其度最寛若舉井斗不知何日的至井斗之中故舉弧與建星弧在井十六度建星在斗十度用孔氏疏及髙誘月紀註其日甲乙其帝太皡其神句芒其蟲鱗其音角律中夾鍾其數八其味酸其臭羶其祀户祭先脾始雨水桃始華倉庚鳴鷹化為鳩仲春始至則夾鍾之律應夾鍾隂律也夾助也始雨水以下皆記時候鷹好殺而擊以秋隂類也化為鳩使鷙者能仁隂為陽所化物理如此用孔氏陸氏補天子居青陽太廟乗鸞路駕蒼龍載青旂衣青衣服倉玉食麥與羊其器疏以逹青陽太廟明堂東向之中也補是月也安萌芽養幼少存諸孤擇元日命民社命有司省囹圄去桎梏毋肆掠止獄訟掠音諒囹圄獄也桎梏械也在手曰梏在足曰桎肆掠者肆意拷掠省者察也將赦其輕微凡皆助生氣禁其逆生氣者補是月也𤣥鳥至至之日以太牢祠於髙禖天子親徃后妃帥九嬪御乃禮天子所御帶以弓韣授以弓矢於髙禖之前禖音梅韣大木反𤣥鳥燕也髙禖所求嗣之神也御侍也韣弓衣也弓矢者男子之祥也春分祀髙禖祈嗣后妃以下皆從乃禮后妃之侍見於天子者於髙禖祠之前示以得男之象補是月也日夜分雷乃發聲始電蟄蟲咸動啓户始出先雷三日奮木鐸以令兆民曰雷將發聲有不戒其容止者生子不備必有㐫災日夜分則同度量鈞衡石角斗甬正權槪户蟲蟄之宂也生子不備謂骸竅有虧同鈞角正皆謂平之也鈞如四鍭既鈞之鈞度丈尺也量斗桶也稱上曰衡百二十斤曰石甬今斛權今稱錘概平斗斛者日夜分以下皆記時候因雷發示警戒因日夜分施均平是月也耕者少舍乃脩闔扇寢廟畢備毋作大事以妨農之事諸家以舍為止謂耕者至此少息然仲春農耕方殷豈有止息之理髙誘吕氏春秋註謂皆耕於野少有在都邑之舍者於理近之諸家以用木為闔用竹葦為扇髙誘謂闔扇門也葢門户成扇所以闔也極簡明諸家皆考寢廟之制髙誘謂寢以安身廟以事祖亦簡明毋作大事竊意因出耕於野遂脩都邑居舍事之大如此者則妨農而不為補是月也無竭川澤無漉陂池無焚山林竭川澤漉陂池主漁者言焚山林主獵者言皆為春時遂生物之理無盡類夭物也用方氏及髙誘註天子乃鮮羔開氷先薦寢廟鮮鄭氏云當作獻獻羔祭司塞也開氷二月四陽大壯抑其太過也上丁命樂正習舞釋菜天子乃帥三公九卿諸侯大夫親徃視之仲丁又命樂正入習樂上丁上旬丁日也仲丁中旬丁日也用丁者馬氏謂文明故也葢丁屬南方火故馬氏云爾樂正樂官之長也習舞釋菜按吕氏月紀元文作入舞舍采注云入學官也舍置也置采帛於先師之前以贄神也月令皆用月紀之文而此乃以入為習采為菜恐傳冩誤爾上丁巳舍采而仲丁再習樂者鄭氏謂季春將合樂也是月也祀不用犧牲用圭璧更皮幣不用犧牲是月尚生育而不殺也更易也皮者鹿皮幣者𤣥纁束帛用圭璧更皮幣者圭璧陽精之所生皮幣隂功之所成以陽易隂順陽義也髙誘注及方氏仲春行秋令則其國大水寒氣總至㓂戎來征行冬令則陽氣不勝麥乃不熟民多相掠行夏令則國乃大旱煖氣早來蟲螟為害人行此令則召天災各以其類至補季春之月日在胃昏七星中旦牽牛中三月節日在胃星七度七星南方宿牽牛北方宿皆以是月中於南方用髙誘吕氏春秋注其日甲乙其帝太皡其神句芒其蟲鱗其音角律中姑洗素典反姑洗陽律姑洗也洗新也謂陽氣養生去故就新髙誘吕氏春秋注其數八其味酸其臭羶其祀户祭先脾桐始華田䑕化為鴽虹始見萍始生鴽音如桐始華以下皆三月之氣候鴽鵲也田䑕化為鴽隂類之慝者遷乎陽而其性和也虹隂陽交㑹之氣雲薄漏日日照雨滴則虹生雄曰虹雌曰蜺明盛者為雄闇微者為雌髙誘注并孔氏馬氏說天子居青陽右个乗鸞路駕蒼龍載青旂衣青衣服倉玉食麥與羊其器疏以逹青陽右个明堂東向之南隅是月也天子乃薦鞠衣于先帝命舟牧覆舟五覆五反乃告舟備具于天子焉天子始乗舟薦鮪于寢廟乃為麥祈實鞠衣說者謂后服色如鞠薦此為蠶祈助然本文未嘗明言薦之者乃天子非后妃也髙誘吕氏春秋注春皆尚青此薦鞠衣未逹舟牧主舟之官五覆反者以舟渉險故謹之至必乗舟而後薦鮪者示親漁也因而祈麥實於寢廟焉是月也生氣方盛陽氣發泄句者畢出萌者盡逹不可以内天子布徳行惠命有司發倉廪賜貧窮振乏絶開府庫出幣帛周天下勉諸侯聘名士禮賢者以物宣散之時當順天散物不可積聚納之於内故自布徳行惠以下皆所以出淹滯而助陽宣物也孔氏馬氏是月也命司空曰時雨將降下水上騰循行國邑周視原野修利隄防道逹溝瀆開通道路毋有障塞田獵罝罘羅㒺畢翳餧獸之藥毋出九門道音導罝子斜反罘音浮餧於魏反司空掌土之官獸罟曰罝罘鳥罟曰羅網畢所以掩兎以其似天上畢星故謂之畢翳射者所以自隠餧則委之以食而毒焉故曰藥九門吕氏春秋作國門預除水潦便民事鳥獸方乳禁傷生用鄭氏說是月也命野虞無伐桑柘鳴鳩拂其羽戴勝降于桑具曲植籧筐后妃齊戒親東鄉躬桑禁婦女毋觀省婦使以勸蠶事蠶事既登分繭稱絲效功以共郊廟之服無有敢惰籧居吕反鄉許亮反觀古喚反省所景反髙誘吕氏春秋注如字野虞主田及山林之官無伐桑柘愛蠶食也鳴鳩拂羽戴勝降桑蠶生之候也致曲而織曰曲取直而立曰植席之粗者曰籧筥之方者曰筐皆蠶具也禁婦女無觀者戒其遊觀省婦使者省其他役使勧其一於趨蠶事此章言親蠶以供祭服鄭氏方氏及髙誘注是月也命工師令百工審五庫之量金鐵皮革筋角齒羽箭幹脂膠丹漆毋或不良百工咸理監工日號毋悖於時毋或作為滛巧以蕩上心工師百工之師五庫各以類相從金鐵為一庫皮革筋為一庫角齒為一庫羽箭幹為一庫脂膠丹漆為一庫審量者度其庫之所容也工師日監之使守時制用孔氏補是月之末擇吉日大合樂天子乃率三公九卿諸侯大夫親徃視之樂陽聲也春陽中也大合樂必待陽中之末中聲之所正也馬氏是月也乃合累牛騰馬游牝於牧犧牲駒犢舉書其數累牛者累繫之牛騰馬者騰躍之馬游牝於牧者使之生育所有犧牲及小馬之駒小牛之犢皆書其見在之數至秋畜産之時知其舊數欠少與否及生息多少方氏孔氏命國難九門磔攘以畢春氣難乃多反命國難吕氏春秋作國人儺驅除不祥也又磔牲於門以攘於四方之神而春氣盡矣吕氏春秋此下有行之是令而甘雨至三旬十字用鄭氏補季春行冬令則寒氣時發草木皆肅國有大恐行夏令則民多疾疫時雨不降山陵不收行秋令則天多沈隂滛雨蚤降兵革並起人行此令則召天災本晦菴說補孟夏之月日在畢昏翼中旦婺女中四月節日在畢十二度翼南方宿婺北方宿是月昏旦時各中於南方其日丙丁其帝炎帝其神祝融夏屬火丙丁火日也丙丁言文明炎帝神農也以火徳王天下祝融顓頊氏之子曰黎為火官其蟲羽其音徴律中中吕朱鳥火屬也其類為羽故其蟲羽徴音屬火位南方故其音徴仲吕隂律孟夏氣至則仲吕之律應馬氏髙誘注并鄭氏其數七其味苦其臭焦地二生火天七成之故其數七火味苦火臭焦用鄭氏説其祀竈祭先肺火王故祀竈肺金藏也夏火盛克金故先祭肺以金養之鄭氏方氏螻蟈鳴蚯蚓出王𤓰生苦菜秀螻蟈蛙也凡皆言氣候五日一候補天子居明堂左个乗朱路駕赤駵載赤旂衣朱衣服赤玉食菽與雞其噐髙以粗明堂左个者南堂之東偏以春言之曰青陽以夏言之曰明堂其實一也夏屬火故色尚朱色深曰朱色淺曰赤菽水穀雞水畜夏食之以减熱氣器髙以粗者象火炎上補是月也以立夏先立夏三日太史謁之天子曰某日立夏盛徳在火天子乃齊立夏之日天子親帥三公九卿大夫以迎夏於南郊還反行賞封諸侯慶賜遂行無不欣說音恱還反行賞按吕氏春秋作還乃行賞封諸侯慶賜遂行作封侯慶賜然封侯非常典亦恐姑言之耳補乃命樂師習合禮樂命太尉贊桀俊遂賢良舉長大行爵出禄必當其位太尉秦官贊贊白之也遂逹也舉用長大之人謂秀出於衆者補是月也繼長増髙毋有壊堕毋起土功毋發大衆毋伐大樹皆所以順陽氣也長而髙者陽上逹也勿壊勿堕即所以繼之増之也用髙誘及馬氏說是月也天子始絺初服暑服命野虞出行田原為天子勞農勸民毋或失時命司徒循行縣鄙命農勉作毋休于都夏則農居田間之廬舍冬則歸都邑之居今當農作故使毋休於都補是月也驅獸毋害五榖毋大田獵夏田曰苗驅獸使勿害苗而已不大獵取之也補農乃登麥天子乃以彘嘗麥先薦寢廟彘水畜以嘗麥者水勝火先薦寢廟者一食不敢忘親鄭氏方氏吴氏是月也聚畜百藥靡草死麥秋至斷薄刑决小罪出輕繫聚畜百藥蕃蕪之時毒氣盛也靡草薺葶藶之屬以其枝葉靡細故曰靡草靡草至隂之所生故不勝至陽而死麥秋至者物成於秋而麥獨成於夏於時雖夏於麥則為秋靡草死麥秋至而斷决薄刑小罪盖亦因時順氣秋月用刑之漸也古注方氏陸氏補蠶事畢后妃獻繭乃收繭税以桑為均貴賤長幼如一以給郊廟之服收繭稅者命婦就公桑而蠶以繭為稅桑多稅多桑少稅少稅皆十一鄭氏孔氏是月也天子飲酎用禮樂酎直又反酎春醖之釀酒也髙氏鄭氏孟夏行秋令則苦雨數來五榖不滋四鄙入保行冬令則草木蚤枯後乃大水敗其城郭行春令則蝗蟲為災暴風來格秀草不實數所角反人行此令則天災各以其類至用晦菴說仲夏之月日在東井昏亢中旦危中五月節日在井十六度亢東方宿危北方宿是月昏旦時皆中於南方孔氏及髙誘注其日丙丁其帝炎帝其神祝融其蟲羽其音徴律中蕤賔蕤人誰反蕤賔陽律仲夏氣至則蕤賔之律應隂始生為主而陽為賔陽至午向衰草木蕤矣故名蕤賔髙誘鄭氏其數七其味苦其臭焦其祀竈祭先肺小暑至螳螂生鵙始鳴反舌無聲小暑夏至後六月節暑極於季夏進未極尚為小鵙搏勞反舌百舌鳥以能反覆其舌為百鳥語故謂之反舌一隂生而慝作螳螂鵙皆隂類或感微隂而生或感微隂而鳴詩七月鳴鵙者豳地寒氣晚也反舌感陽中而發故感㣲隂而無聲凡皆記五日一候高誘吕氏春秋注及鄭氏馬氏方氏說天子居眀堂太廟乗朱路駕赤駵載赤旂衣朱衣服赤玉食菽與雞其器高以粗養壯佼古邜反眀堂太廟南向堂之居中者也壯言形之大佼言色之好夏養壯佼冬養耆老可知方氏陸氏是月也命樂師脩鞀鞞鼔均琴瑟管簫執干戚戈羽調笙竽竾簧飭鐘磬柷敔鞀大刀反亦作鞉鞞歩西反竾音池亦作箎柷昌六反敔魚吕反樂師樂官之長脩均執調飭五者皆治其器物習其事之言鞀即鞉如鼔而小持其柄揺之旁耳還自撃鞞裨也以裨助鼓節奏鼓者鞀也應聲者鼙也皆所以節樂也故脩之琴長三尺六寸六分五絃瑟長八尺一寸二十七絃管長尺圍寸如篴而小併兩而吹之簫編二十二管長尺四寸凡所以宣音也故均之干盾也戚斧也戈㦸長六尺六寸羽以翿舞者凡所以舞者也故執之竽十六簧笙十七簧古皆以匏為之竾即箎長尺二寸圍三寸一孔上出寸三分横吹者以竹為之簧者笙竽之名氣鼓之而成聲凡吹竹者故調之鍾金磬石柷如漆桶方二尺四寸深一尺八寸中有木椎左右擊以節樂敔木虎背上刻七十二鉏鋙以長尺之木櫟之而成聲凡皆金石木之器故飭之髙誘注及孔氏命有司為民祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益於民者以祈榖實名山大川百源所出能興雲雨者故為民祈之雩者吁嗟以求雨之祭也天子大雩帝故用盛樂百縣謂畿内之邑百辟卿士謂生有益於民者死亦能有益於民故命之雩祀以祈榖實天子之雩及於上帝百縣之雩及於百辟卿士此重輕之别也鄭氏方氏農乃登黍是月也天子乃以雛嘗黍羞以含桃先薦寢廟雛雞也含桃櫻桃鸎鳥所含食故曰含桃果之先成者也羞者以羙物進之曰羞孔氏方氏令民毋艾藍以染毋燒灰毋暴布門閭毋閉闗市毋索挺重囚益其食暴歩卜反無刈藍以染為青藍未成無燒灰吕氏春秋作毋燒炭注云為草木未成不欲夭物毋暴布謂是月炎氣盛猛暴則脆傷門閭毋閉陽氣散也闗市不索順陽敷縱不搜索民之隠物也挺寛也寛重囚而又益其囚之飲食也髙誘注及鄭氏游牝别羣則縶騰駒班馬政游牝别羣以隂生不欲耗陽也縶騰駒者防其相蹄齧也馬政謂養馬之政是月也日長至隂陽爭死生分君子齊戒處必掩身毋躁止聲色毋或進薄滋味毋致和節耆欲定心氣百官静事無刑以定晏隂之所成和户卧反晏伊見反日長至者日長之至極死生分者陽主生隂主死進謂進御也和謂致五味調和之也靜事毋刑者不欲動而有為也晏安也隂静安靜孔氏方氏鹿角解蟬始鳴半夏生木董榮皆候也鹿陽類感隂生而角解半夏藥名夏半而生故名半夏是月也毋用火南方可以居髙明可以逺眺望可以升山陵可以處臺榭夏火陽之時南火王之方用方則火大盛傷微隂之生也居髙明以下皆順陽在上方氏鄭氏仲夏行冬令則雹凍傷榖道路不通暴兵來至行春令則五榖晩熟百螣時起其國乃饑行秋令則草木零落果實早成民殃於疫人行此令則召天災晦菴說季夏之月日在桞昏火中旦奎中六月節日在桞九度火大火即心星也心東方宿奎西方宿是月分旦時皆中於南方其日丙丁其帝炎帝其神祝融其蟲羽其音徴律中林鍾林鍾隂律季夏氣至則林鍾之律應林衆也鍾聚也萬物之蕃茂止於此矣其數七其味苦其臭焦其祀竈祭先肺温風始至蟋蟀居壁鷹乃學習腐草為螢温風始至而下皆候也天子居明堂右个乗朱路駕赤駵載赤旂衣朱衣服赤玉食菽與雞其器髙以粗明堂右个南向之西偏鄭氏命漁師伐蛟取鼉登龜取黿命澤人納材葦漁師掌魚官四者皆水族必於季夏取者欲以盛暑之氣燥其皮甲利其耐乆故也葦謂荻之小者可緯為薄必擇其材者故名材葦命澤人納之生於澤也髙氏方氏是月也命四監大合百縣之秩芻以養犧牲令民無不咸出其力以共皇天上帝名山大川四方之神以祠宗廟社稷之靈以為民祈福四監者天子畿内分百縣縣有四郡各置大夫為監秩常也百縣供芻有常數是月也命婦官染采黼黻文章必以法故無或差貸黒黄倉赤莫不質良毋敢詐偽以給郊廟祭祀之服以為旗章以别貴賤等給之度貸音二又他得反婦官者婦人善别五色故命其官使染采白與黒謂之黼黒與青謂之黻青與赤謂之文赤與白謂之章法故法者常法故者舊比也質正也良善也非其質為詐非其良為偽旗章即詩織文鳥章之章貸吕氏春秋作忒髙誘注方氏馬氏是月也樹木方盛乃命虞人入山行木毋有斬伐不可以興土功不可以合諸侯不可以起兵動衆毋舉大事以揺養氣毋發令而待以妨神農之事也水潦盛昌神農將持功舉大事則有天殃養氣說者謂萬物生於夏而氣主養故不欲揺動之按吕氏春秋作揺蕩于氣毋發令而待以妨神農之事說者謂預出徭役之令以驚民按吕氏春秋作無發令而干時以妨神農之事神農將持功說者謂持有守意將持功謂秋成在後按吕氏春秋作命神農將廵功髙誘注昔神農能殖嘉榖後世因名其官為神農此因水潦盛昌而命其廵行隴畝修治之功補是月也土潤辱暑大雨時行燒薙行水利以殺草如以熱湯可以糞田疇可以羙土彊土潤辱暑說者謂土為火所蒸故潤既潤則水勝火火反辱焉按吕氏春秋作土潤辱暑是水氣當暑蒸潤而然耳燒薙其草以水浸之可羙土疆謂者謂疆如强梁之强土疆謂土之不可化者以燒草而化之使羙也按吕氏春秋可以化土疆是疆即疆界之疆非强梁之強也月令即吕氏春秋之文而字偶訛誤說者即曲為之辭凡當以吕氏春秋元文為正補季夏行春令則榖實鮮落國多風欬民乃遷徙行秋令則丘隰水潦禾稼不熟乃多女災行冬令則風寒不時鷹隼蚤鷙四鄙入保鮮音仙欬苦伐反鮮落不待黄而落也多女災以純隂之氣過盛而反傷之也方氏中央土其日戊巳戊言茂已言起萬物至此茂盛其含秀者抑屈而起因為日名五氣順布而四時行木火金水分主四時而土氣則無徃不在故四時之間戊巳日各有九先儒謂之寄王焉火生土土生金季夏之末在火金之間故於此言中央土此即坤在西南致養之地間於離兊離火也兊金也坤在其間中央土也用横渠說補其帝黄帝其神后土黄帝軒轅氏以土徳王天下后土共工氏之子句龍其蟲倮倮者六月土王之時物轉壮大露見不隠藏也孔氏其音宫律中黄鍾之宫聲始於宫宫數八十一屬土凡聲數多者濁數少者清黄鍾數最多季夏主土聲最重故黄鍾於律位雖屬子而季夏之氣至則黄鍾之宫應鄭氏陳氏其數五天五生土地十成之但言五者五中數也吕氏說其味甘其臭香鄭氏謂土之臭味也然土安得有臭味竊意土爰稼穡稼穡作甘而其氣則香爾補其祀中霤祭先心霤者古人穴地而居開其上取明故雨霤之後世開牖象中霤之取明其地不當棟而在室之中央因名室為中霤祀中霤祭先心皆中也補天子居太廟太室乗大路駕黄駵載黄旂衣黄衣服黄玉食稷與牛其器圜以閎太廟太室南向之中央黄土色稷牛皆土屬圜象土周布於四時閎象土含物吕氏春秋閎作揜集補孟秋之月日在翼昏建星中旦畢中七月中日在翼十五度建星在斗牛之中北方星畢西方宿是時昏旦中於南方補其日庚辛秋屬金庚辛金日也庚言更辛言新萬物至秋更改新成因為日名本鄭氏說其帝少皡其神蓐收少皡帝嚳之子以金德王天下號金天氏蓐收少皡氏之子名該為金官髙誘注并鄭氏其蟲毛其音商律中夷則凉氣至物備寒生旃毛商屬金夷則陽律孟秋氣至則夷則之律應夷言平則言法也鄭氏孔氏其數九其味辛其臭腥其祀門祭先肝地四生金天九成之故九金數金味辛金臭腥孟秋始内由門入故祀門肝屬木金克木故祭先肝以養金鄭氏及髙誘注凉風至白露降寒蟬鳴鷹乃祭鳥用始行戮凉風至至鷹祭鳥皆記候鷹撃鳥於大澤中先四面陳之而未食世謂其祭先是時始行刑戮順時氣髙誘吕氏春秋注天子居緫章左个乗戎路駕白駱載白旂衣白衣服白玉食麻與犬其器廉以深總章即明堂之西向秋則居之名總章者西方總成萬物章明之也左个盖其南偏戎屬秋白金色麻實有文理屬金犬金畜器亷深象隂閉藏髙誘注并鄭氏是月也以立秋先立秋三日太史謁之天子曰某日立秋盛徳在金天子乃齊立秋之日天子親帥三公九卿諸侯大夫以迎秋於西郊還反賞軍帥武人於朝天子乃命將帥選士厲兵簡練桀俊專任有功以征不義詰誅暴慢以明好惡順彼逺方還反吕氏春秋元本作還乃順彼逺方元本作廵彼逺方廵行也凡皆順肅殺之氣言之非必誅伐誅伐因事不得已而行豈因時舉行之常典哉補是月也命有司脩法制繕囹圄具桎梏禁止姦愼罪邪務摶執命理瞻傷察創視折審斷决獄訟必端平戮有罪嚴斷刑天地始肅不可以贏音盈此順秋氣而修刑也理者獄官皮曰傷肉曰創骨曰折骨肉皆絶曰斷傷者瞻之而已創則察折則視斷則審此蔡邕髙誘之說或以審斷屬下文以審斷决為句亦通但下文獄訟必端平於上下文不類若以審斷屬上句則决獄訟必端平文稍恊耳贏解也贏者縮之反盖有餘之名天地始肅故當以戢斂為務補是月也農乃登榖天子嘗新先薦寢廟命百官始收歛完隄防謹壅塞以備水潦脩宫室坏墻垣補城郭坏歩回反坏土塊以土塊増塞其穴秋榖既登而修水潦隄防之事補是月也毋以封諸侯立大官毋以割地行大使出大幣凡非收歛之事皆所不宜行方氏髙誘注孟秋行冬令則隂氣大勝介蟲敗榖戎兵乃來行春令則其國乃旱陽氣復還五榖無實行夏令則國多火災寒熱不節民多瘧疾瘧魚畧反介蟲敗榖謂蟹食稻越語云令呉稻蟹無遺種孔氏仲秋之月日在角昏牽牛中旦觜觹中觜子斯反觹户圭反八月中日在角十度牽牛北方宿觜觹西方宿是月昏旦皆中於南方鄭氏補其日庚辛其帝少皡其神蓐收其蟲毛其音商律中南吕南吕隂律仲秋氣至則南吕之律應吕助也南吕者贊陽秀物鄭氏其數九其味辛其臭腥其祀門祭先肝盲風至鴻鴈來𤣥鳥歸羣鳥養羞盲閉暗之稱𤣥鳥燕也羞謂所食養之所以備冬藏自盲風以下皆記候天子居總章太廟乗戎路駕白駱載白旂衣白衣服白玉食麻與犬其器廉以深總章太廟明堂西向之中補是月也養衰老授几杖行糜粥飲食隂氣發老年衰故共養之髙誘注乃命司服具飭衣裳文繡有恒制有小大度有長短衣服有量必循其故冠帶有常司服主衣服之官上曰衣下曰裳衣畵文裳刺繡以至小大之制長短之度皆主衣裳言之禮服也衣服有量言所受各有量各循其故法此主燕服及他服言之也冠帶有常無茍變於昔示民有常也凡皆因寒氣將至而備衣服及之乃命有司申嚴百刑斬殺必當毋或枉橈枉撓不當反受其殃有司理官也申重也孟秋既命之今又命之也以直為曲曰枉以是為非曰撓撓亂之也補是月也乃命宰祝循行犧牲視全具按芻豢瞻肥瘠察物色必比類量小大視長短皆中度五者備當上帝其饗宰宰牲者祝祝神者純色曰犧未殺曰牲食草曰芻食榖曰豢物色騂黝之别凡皆言祭祀之牲天子乃難以逹秋氣難乃多反難即儺逐不祥也逹秋氣使不壅閉補以犬嘗麻先薦寢廟犬金畜也麻始熟故嘗之髙誘吕氏注是月也可以築城郭建都邑穿竇窖修囷倉窖古孝反藏而留穴曰竇盡藏之曰窖圓曰囷方曰倉方氏髙氏乃命有司趨民收歛務畜菜多積聚乃勸種麥無或失時其有失時行罪無疑畜菜所以禦冬種麥又以續食補是月也日夜分雷始收聲蟄蟲坏户殺氣浸盛陽氣日衰水始涸日夜分則同度量平權衡正鈞石角斗甬坏音陪坏以土増益穴之四旁使通明處稍小十月寒甚乃閉之三十斤為鈞四鈞為石以其尤重而内實故謂之石角吕氏春秋作齊用孔氏方氏補是月也易闗市來商旅納貨賄以便民事四方來集逺鄉皆至則財不匱上無乏用百事乃遂凡舉大事毋逆大數必順其時愼因其類易以豉反易闗市謂輕其稅大數謂隂陽凡舉事必順天道謹因其事類毋干於逆補仲秋行春令則秋雨不降草木生榮國乃有恐行夏令則其國乃旱蟄蟲不藏五榖復生行冬令則風災數起收雷先行草木蚤死數所角反收雷先行雷已收聲又先時而行也補季秋之月日在房昏虚中旦桞中九月節日在房五度虚北方宿桞南方宿是月昏旦中於南方鄭氏髙誘注其日庚辛其帝少皡其神蓐收其蟲毛其音商律中無射音亦無射陽律季秋氣至則無射之律應萬物無射也鄭氏其數九其味辛其臭腥其祀門祭先肝鴻鴈來賔爵入大水為蛤鞠有黄華豺乃祭獸戮禽皆記時候天子居總章右个乗戎路駕白駱載白旂衣白衣服白玉食麻與犬其器廉以深右个北偏是月也申嚴號令命百官貴賤無不務内以㑹天地之藏無有宣出内謂收歛入之也無有宣布而出見於外乃命冡宰農事備收舉五榖之要藏帝耤之收於神倉祇敬必飭要謂多少之總數耤田所耕千畝供上帝之耤田也神倉以其供神故曰神孔氏方氏是月也霜始降則百工休乃命有司曰寒氣總至民力不堪其皆入室百工休寒而膠漆不堅也入室冬之事此預戒也鄭氏方氏上丁命樂正入學習吹是月也大饗帝嘗犧牲告備於天子合諸侯制百縣為來歳受朔日與諸侯所稅於民輕重之法貢職之數以逺近土地所宜為度以給郊廟之事無有所私吹去聲習吹秋冬重吹也嘗者宗廟之秋祭以其犧牲告備於天子秦以建亥月為嵗首故於季秋預備來歳之事方氏鄭氏是月也天子乃教於田獵以習五戎班馬政命僕及七騶咸駕載旌旐授車以級整設於屏外司徒搢扑北面誓之天子乃厲飾執弓挾矢以獵命主祠祭禽於四方扑普北反五戎謂五兵刀劍矛㦸矢也馬政謂齊其色度其力使堪同乗也僕謂田僕掌御七騶謂趣馬也夫天子之馬六種則六騶又有總主之人并六騶為七析羽為旌龜蛇為旐級謂正車副車之等整設謂整列而陳設之屏謂田所門外之蔽搢挿也扑夏楚也厲飾謂嚴厲其容飾主祠典祭祀者也祭禽謂以所獲禽祀四方此因田獵教兵命僕騶咸駕車各以等級整設於天子之屏外司徒臨誓之天子乃親射命主祠者祭神以報獲功而終焉補是月也草木黄落乃伐薪為炭蟄蟲咸俯在内皆墐其户乃趣獄刑毋留有罪收祿秩之不當供養之不冝者在内吕氏春秋作在穴墐謂以土塞之祿秩不當謂私恩所増加供養不宜謂非常之膳求不可得者草木黄落與蟄蟲咸俯候也因草木黄落而伐薪為炭斧斤以時入山林也因蟄蟲咸俯而趣刑殺氣已至不敢留獄也收祿秩之不當謹於養人收供養之不宜節於奉已凡所以順斂藏之義也補是月也天子乃以犬嘗稻先薦寢廟稻始熟也鄭氏季秋行夏令則其國大水冬藏殃敗民多鼽􅅉行冬令則國多盗賊邉竟不寜土地分裂行春令則煖風來至民氣解惰師興不居鼽音求􅅉丁訃反竟音境解古買反鼽鼻窒不通師興不居不得居止也吕氏春秋作師旅必興孟冬之月日在尾昏危中旦七星中十月節日在尾十度危北方宿七星南方宿是月昏旦中於南方鄭氏髙注其日壬癸冬屬水壬癸水日也壬言任癸揆也時萬物懐任於下揆然萌牙因為日名髙注鄭氏其帝顓頊其神𤣥㝠顓頊髙陽氏黄帝之孫昌意之子以水徳王天下𤣥㝠少皡氏之子曰脩曰熈相代為水官髙誘吕氏春秋注云少皡氏之子曰循未知孰是集其蟲介介甲也象物閉藏地中龜鱉之屬鄭氏其音羽律中應鍾羽數四十八屬水數最少聲最清應鍾隂律孟冬氣至則應鍾之律應應者其種類鄭氏其數六天一生水地六成之六舉其成數用鄭說其味鹹其臭朽水曰潤下潤下作鹹氣若有若無曰朽用尚書及鄭氏其祀行祭先腎行門内地各守在内故祀之鄭氏據檀弓躐行之說謂行在廟門外之西為軷壤厚二寸廣五尺輪四尺腎屬水自用其藏不以所克者為養意一歳終於此也集補水始冰地始凍雉入大水為蜃虹藏不見蜃大蛤晉語曰雉入於淮為蜃雉火屬蜃水屬冰隂凝也凍隂氣閉而陽不能融也雉為蜃陽不勝隂而為其遷也虹以隂於陽而見是月隂收故藏不見凡皆記候也鄭氏馬氏髙注天子居𤣥堂左个乗𤣥路駕鐵驪載𤣥旂衣黒衣服𤣥玉食黍與彘其器閎以奄𤣥堂左个即明堂北向之西偏鐵驪黒馬色如鐵𤣥淺黒深黍屬火彘水畜相資也器閎以奄象閉藏用鄭說是月也以立冬先立冬三日太史謁之天子曰某日立冬盛徳在水天子乃齊立冬之日天子親帥三公九卿大夫以迎冬於北郊還反賞死事恤孤寡先人有以國事死者賞之恤其孤寡鄭氏是月也命太史釁龜筴占兆審卦吉凶是察阿黨則罪無有掩蔽釁者殺牲以血塗其隙物有釁隙則妖作以牲血厭其變焉盖除釁之謂也周禮龜人上春釁龜秦以十月為歳首故於此言之筴者筮之􅆱理不待釁連言之耳兆者龜之繇文是察者是正而審察之獄吏阿黨者罪用鄭氏孔氏補是月也天子始裘命有司曰天氣上騰地氣下降天地不通閉塞而成冬命百官謹葢藏命司徒循行積聚無有不斂坏城郭戒門閭脩鍵閉慎管籥固封疆備邉竟完要塞謹闗梁塞徯徑飭喪紀辨衣裳審棺椁之厚薄塋丘壟之小大髙卑薄厚之度貴賤之等級塞先伐反下塞字悉則反徯音奚葢藏謂倉囷藏其中而葢其上鍵者門扇之後樹兩木穿上端為孔閉者謂將扄闗門以内孔中要塞者邉城要處喪紀者以禮數紀之塋吕氏春秋作營謹葢藏以下奉時之閉塞也飭喪紀以下喪者人之終冬者嵗之終亦順天時也方氏馬氏是月也命工師效功陳祭器按度程毋或作為滛巧以蕩上心必功致為上物勒工名以考其誠功有不當必行其罪以窮其情工師工官之長效功錄見百工所作器物功致者功力極其至每物之上刻勒所造工匠之名以考其誠誠即功致者也功有不當即不功致者也用鄭氏方氏補是月也大飲烝天子乃祈來年於天宗大割祠於公社及門閭臘先祖五祀勞農以休息之天子乃命將帥講武習射御角力大飲烝與羣臣飲烝謂物之可薦者衆也天宗謂日月星辰公社謂以上公配社祭然愚意公社别民社耳臘謂以獵所得肉而祭之五祀門户中霤竈行也角者力相抵鄭氏方氏是月也乃命水虞漁師收水泉池澤之賦毋或敢侵削衆庶兆民以為天子取怨於下其有若此者行罪無赦水虞澤虞也漁師􅈄人也此謂收水澤之賦而又禁其擾然恐不若澤梁無禁之相安也孟冬行春令則凍閉不宻地氣上泄民多流亡行夏令則國多暴風方冬不寒蟄蟲復出行秋令則雪霜不時小兵時起土地侵削災各以其類至補仲冬之月日在斗昏東辟中旦軫中十一月節日在斗十二度東辟北方宿軫南方宿是月昏旦皆中於南方鄭氏及髙誘注其日壬癸其帝顓頊其神𤣥冥其蟲介其音羽律中黄鍾黄鍾律之始仲冬氣至則黄鍾之律應黄者中之色天子之徳也萬物黄萌聚於黄泉之下故曰黄鍾鄭氏及髙誘注其數六其味鹹其臭朽其祀行祭先腎氷益壯地始坼鶡旦不鳴虎始交鶡旦求明之鳥陽物是月隂盛故不鳴虎隂物感陽生而交氷益壯以下皆記時候鄭氏天子居𤣥堂太廟乗𤣥路駕鐵驪載𤣥旂衣黒衣服𤣥玉食黍與彘其器閎以奄𤣥堂太廟北向之中飭死事古注謂飭軍士必有死志皇氏謂死為逃亡未知孰是按吕氏春秋無此句而此句亦無所屬補命有司曰土事毋作慎無發盖毋發室屋及起大衆以固而閉地氣沮泄是謂發天地之房諸蟄則死民必疾疫又随以喪命之曰暢月暢勑亮反氣自内而外為沮自下而上為逹天地壅蔽萬物不使宣露與房舍相似氣沮泄是謂發其房暢充也謂萬物充實不發動按吕氏春秋沮泄作且泄是月也命奄尹申宫令審門閭謹房室必重閉省婦事毋得滛雖有貴戚近習毋有不禁省所景反孔作减省奄尹主領奄竪之官奄謂精氣閉藏尹其正長也凡因閉藏申嚴宫禁之事補乃命大酋秫稻必齊麴糵必時湛熾必絜水泉必香陶器必良火齊必得兼用六物大酋監之毋有差貸秫音述湛子廉反貸他得反大酋主酒官用麥曰麴用米曰糵湛漬也熾炊也火齊生熟之中也六物秫稻至火齊凡六貸吕氏春秋作忒用孔氏補天子命有司祈祀四海大川名源淵澤井泉盛德在水故偏祀之用馬氏說是月也農有不收藏積聚者馬牛畜獸有放佚者取之不詰山林藪澤有能取蔬食田獵禽獸者野虞教道之其有相侵奪者罪之不赦不自歛藏者聽人之取以警之能取食林澤者教之侵奪者罪之補是月也日短至隂陽爭諸生蕩君子齊戒處必掩身身欲寜去聲色禁嗜欲安形性事欲靜以待隂陽之所定去起吕反日短至短之至極也諸生萬物之生蕩者生意之動事欲靜者凡事靜以待定補芸始生荔挺出蚯蚓結麋角觧水泉動芸與荔皆香草荔馬荔挺生出也結者蟄初向下今宛而上故屈結也麋澤獸得陽氣之初而角解凡皆記仲冬之候補日短至則伐木取竹箭隂盛而堅也是月也可以罷官之無事去器之無用者凡以應天地之實方氏塗闕廷門閭築囹圄此所以助天地之閉藏也順時氣鄭氏仲冬行夏令則其國乃旱氛霧㝠㝠雷乃發聲行秋令則天時雨汁𤓰瓠不成國有大兵行春令則蝗蟲為敗水泉咸竭民多疥癘而于付反雨汁雨雪雜下如物有汁季冬之月日在婺女昏婁中旦氐中十二月節日在婺女八度婁西方宿氐東方宿是月昏旦皆中於南方其日壬癸其帝顓頊其神𤣥㝠其蟲介其音羽律中大吕大吕隂律季冬氣至則大吕之律應大吕助陽宣物鄭氏其數六其味鹹其臭朽其祀行祭先腎鴈北鄉鵲始巢雉雊雞乳雊古豆反鴈北鄉順陽而復也此月方鄉北後月建寅云候鴈北則歸矣孔氏云此據早者恐非也鵲知避歳所在於是來歳之氣兆矣故始巢雉火畜感於陽而後有聲雞木畜麗於陽而後有形皆季冬每五日之候雉雊雞乳吕氏春秋作乳雉雊補并集方氏馬氏說天子居𤣥堂右个乗𤣥路駕鐵驪載𤣥旂衣黒衣服𤣥玉食黍與彘其器閎以奄𤣥堂右个北向之東偏命有司大難旁磔出上牛以送寒氣難乃多反磔竹百反難儺也大儺盡逐隂慝為陽導也旁磔者披磔其牲禳除隂氣於四方之門也出土牛者牛屬丑土勝水故出是以送寒氣此驅除之終事又農耕之始事也後世土牛之法以嵗之幹為首之色甲乙青丙丁赤戊巳黄庚辛白壬癸黒以歳之支為身之色寅卯青己午赤申酉白亥子黒辰戍丑未黄以立春日之幹為角耳尾之色支色為脛納音色為蹄以立春為䇿牛人前後立春在十二月望即䇿牛人在牛前示農早立春在十二月晦或正月朔即當中立春在正月望即近後孔氏方氏陳氏丘氏征鳥厲疾乃畢山川之祀及帝之大臣天之神祗征鳥鷹屬厲疾者殺氣之極㨗疾嚴猛物不極不反鷹將復為鳩也此候也帝之大臣謂句芒之屬天之神祗謂司中司命風師雨師之屬天神地祗而此言天之神祗者總言之皆統於天也然吕氏春秋作天地之神祗殺氣候畢故徧祭以報而各及其佐補是月也命漁師始漁天子親徃乃嘗魚先薦寝廟此潜詩所謂季冬薦魚也此時魚性定而羙氷方盛水澤腹堅命取氷寒極而氷盛腹堅則其堅逹於内非特形於水面而已命取氷者非特將以備暑亦以逹陽氣用方氏說氷以入令告民出五種命農計耦耕事脩耒耜具田器種章勇反氷以入吕氏春秋作氷已入五種五榖之種耦耕古者多以人耦耕詩稱十千為耦論語長沮桀溺耦而耕蜡祭之報迎猫迎虎而獨不及牛占未以牛耕也至冉伯牛名耕則此時必有以牛耕而字之歟耒以木為之長六尺六寸底長一尺一寸中央直者二尺三寸句者三尺二寸底謂耒下向前曲而接耜者耜以鐵為之廣五寸耒耕者所推耜以入土大寒氣過農事將起終則有始也鄭氏方氏命樂師大合吹而罷合占答反吹昌睡反吹者人氣故用以迎陽氣大合吹即罷可以知其無燕矣王氏乃命四監收秩薪柴以供郊廟及百祀之薪燎四監主山林川澤之官鄭氏是月也日窮於次月窮於紀星回於天數將幾終嵗且更始專而農民毋有所使日所舍為次一月一移次去年季冬次𤣥枵今年季冬復次於𤣥枵故曰窮於次月遇日相合為紀紀謂月繋於日也亦去冬㑹𤣥枵而嵗一周故曰窮於紀二十八宿更見於南方而歳一周故曰星回於天幾終者近於終更始謂來年正月農事將起預戒專一無他役使孔氏方氏及髙誘注天子乃與公卿大夫共飭國典論時令以待來歳之冝乃命太史次諸侯之列賦之犧牲以共皇天上帝社稷之饗乃命同姓之邦共寝廟之芻豢命宰歴卿大夫至于庶民土田之數而賦犧牲以共山林名川之祀凡在天下九州之民者無不咸獻其力以共皇天上帝社稷寝廟山林名川之祀次次第之也厯猶次也歳終預議來歳之事次諸侯之犧牲以事上帝同姓之芻豢以奉寝廟卿大夫庶民以事山川又總以民咸獻其力示民力之普存也然犧牲之用幾何要各有司存所謂民力之普存謂民皆得盡其力然後舉以事神無愧耳如必盡天下之供輸以為祭不幾於擾也哉此皆後世推測之言耳補季冬行秋令則白露蚤降介蟲為妖四鄙入保行春令則胎夭多傷國多固疾命之曰逆行夏令則水潦敗國時雪不降氷凍消釋疾乆而不瘥曰固方氏黄氏日抄卷十六
