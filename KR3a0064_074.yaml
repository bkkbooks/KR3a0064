body:
  text: 黄氏日抄卷七十四宋黄震撰申明五第五任史館檢閲繳申慈湖壽張行實狀咸淳四年五月一日照對某近因分修附傳竊聞先皇帝朝羣臣法合立傳者三百餘家今其行實銘記已到史館可慿修附者纔數十家縁州縣間從來視此等為閑慢收索不應事勢則然某妄意若在局官冬於鄉里自行訪求先賢事迹繳赴史館庶幾徑而易集亦足少禆今日史事之成某鄉之先賢有慈湖先生閣學楊公諱蕳壽張先生侍郎張公諱虙慈湖為時儒宗夀張亦文行表表皆先皇帝朝名法從皆足垂示將來法合立傳及有吳公從龍紹定四年逆全之變提孤軍為先鋒策應轉戰無前賊益兵圍之數重不幸所乘馬中流矢遂為賊擒賊載其名旗為偽稱援兵紿泰州開城從龍至城下大呼曰建康右軍統制吳從龍馬傷被執非降賊者揚州初不破泰州可死守賊不勝忿怒刃交下猶罵賊不絶口竟寸臠以死先皇帝矜之詔為立廟官其後方逆全猖獗時維揚閑守未知為計但始得泰州城一開即賊之窟穴多而揚州之事未可知從龍從容就義以一死為國忠謀視解揚事殆過之又非尋常死節比若不為之立傳何以勵臣子之節某生晩雖不及登三君子之門而聞風興起公議所在有不容遏謹於鄉里訪先求到慈湖封志一軸壽張行狀一册吳統制子孫未知所在先録到淳祐十年應參政陳請褒寵劄子一本見到又聞有觀文趙公彦逾之子䈣夫世傳清徳先皇帝初年西山真公德秀嘗薦其為廉吏第一亦未知曾不附傳所合具申乞賜台判送館先將見到志狀委官修成附傳附入理宗實録其䈣夫事併下契勘以慿搜訪湏至申者第六任添差通判廣德軍榜放縣吏日納白撰錢申乞省罷添倅㕔状照對官事不攝聖人以為非儉設官分職朝廷無非為民若員外置官無補民事而又害之為之官者因循苟禄不自申明以求省罷則朝廷隔逺而不及知州郡避嫌而不欲言其為民害何時而已廣德一軍舊止一縣與浙西之江陰事同一體江陰有守無倅本軍有守有倅矣而又晩剏添倅某初受此闕亦竊意江東一路之極處必有事會須分勞者及某到官止有舊來正倅㕔牙契一司因晩剏添倅㕔而分以属之是既異於聖人官事不攝之戒矣若止優游竊禄所媿猶不過素餐亦未至於甚病民也惟是置一司存不惟添一行官吏廩禄亦且増無限日生費用窮夫小民畧有蘧廬托處猶且百費隨生况以倅㕔為名者乎本㕔費用如綱解遣人如諸司繳匣如迎新送使地里口劵國忌行香之有五更燈燭院子茶酒司之有逐日油炭與夫筆墨紙扎邸報承受茶湯厨傳過客須索凡費不可悉數而考其費用之所仰僅有契紙分數紙每紙五十文月可積三五貫官會其餘取給乃分引日監縣吏使之以白撰公事錢供給名曰辦什物錢竊謂此雖名不及民而害民莫此為甚矣葢凡官司之錢無一不出於民明取於民者是為科敷其害猶小不明取於民而取之吏者是為椎剥其害極大每見縣吏之錢全出於推獄之手拷掠人肌膚破壞人家業然後僅得之分文以上皆是寃痛此正官司所當時時禁戢安有為官反與日日分贓豈惟分之是又倡之使之藉為話柄肆行無忌此何䓁弊例而可襲之况此廣德斗壘地瘠民貧豈堪添此無端椎剥是雖事有至急官不可廢以此供億猶當改圖况可藉以扶立晩創無用之貟外官乎某自到官以來吏日呈例望輒汗下此事既决不可行凡費又他無可出拔本塞源永絶後災惟有申明徑行省罷将牙契一司併歸正倅則官省事省其為利益不但免取縣吏供億一事而已欲望台慈察贅貟之無益有損防奸吏之挟官害民備申朝省乞撿照嘉泰間已經省罷指揮将添差通判㕔仍前省罷永不再置不勝本軍公私之幸須至申者囘申本軍撥𨽻窠名状今月十九日伏凖使牒備奉台判以某牓放舊例日監縣吏應辦錢知本㕔已絶無公支之費特撥在城地錢張恩鄉役錢兩項以充本㕔公用仰感矜存之盛心所合拜命唯謹但某區區本心正以廣德支壘無煩添倅縣吏供億適成擾民故欲㧞本塞源徑從申明省罷庶亦併可上寛使軍之冗費耳今若撥下窠名是又重為使軍之費也郡計乆凋正圖少寛而反増重焉某将何安兼恐一窠名必有一支用孔孔着實必無空閒未知前項所收在使軍元凖何用今将何以充之而可移撥事同一家痾痒相關上既恤下下不可以不體上所有前件撥𨽻未敢祗受須至申者更革社倉事宜申省状照對本軍昨因嘉熙庚子之歉康知軍初俲朱文公法剏置社倉春貸秋歛以惠百姓景定二年曽凖户部樁留不貸不斂者五十至咸淳二年常知軍慮歲乆穀壞始申朝省再行貸斂且與免息一年咸淳三年陳提舉行部知社倉法壞日乆專委兩通判任責而知軍時提其綱本軍方當討理未定之初又與免息一年夫社倉之設正以為民當五年不貸之時宜人情之乆欝及兩年免息之日宜人情之甚慰及今驗之人情乃有大不然者凡兩縣十四鄉之民無不相率赴愬乞免貸斂至謂雖不取息亦須増納必罷社倉方獲無事某等不勝驚怪極意考覈乃知借貸之息輕而水旱之備豫法固未有善於文公之社倉者也職掌之人非而變通之法踈弊亦未有甚於本軍之社倉者也葢康知軍救民之心雖即朱文公救民之心而窘於力之不迨局於勢之難行未得盡如文公善後之計者其要有二變而通之正在後之人耳文公以五夫一區之地而得建寧大府六百斛之粟故不必取息増多但使願貸者出息十二備耗而已康知軍以小壘荒歲一時之力而欲廣為千里将來無窮之惠故志在日乆増多必使盡數均貸且令計息未足縣官不許批書於是奉行者不待其願貸類追迫而使之貸矣是窘於力之不迨未能盡如文公善後之計者一也文公與劉君如愚自相率而救其鄉之人初不係官府倡率使然之事故不至於出納輕重康知軍正因巨室倍稱取息之虐遂易以社倉十分取二之廉及其所使主倉之上户即前日倍稱取息之舊人為善不出於本心臨財寜免於故態於是陽借貸斂濟人之權陰肆為富不仁之術矣是局於勢之難行不得盡如文公善後之計者二也惟其力之不迨而志在増數故借貸多不出於小民之情願惟其勢之不行而權寄非人故操制反折而歸巨室之不仁以巨室之不仁迫小民之不願又壓以官司之勢而塞其赴愬之門此初意雖本於文公之社倉而流弊幾類於荆公之青苗勢有必然事無足怪雖康知軍申明之初朝省回降指揮已預憂異日反為閭閻之害雖康知軍規約之序各已預言法乆且弊他日人存政舉之難乎其人况今日乎故曰變而通之是在後之人耳今即衆籲之詞而摭其當革之弊如貸首抱催足則有旌孝一都沈子亨等稱逃亡五十三户積欠榖五千八百四十斤盡抑令代納之訴葛下三都潘四五等稱祖父充貸首子孫不得脱免甚至孤寡亦不得免焉之訴此弊之不可不革者也如同甲抱逃亡則有永岳十八都倪五四䓁稱逃亡並要甲内填還鄉民枉被逼勒之訴桐汭一都曽千七等稱逃户貸穀穀不出倉只就倉展息息上又生息展轉抑陪之訴此弊之不可不革者也如縣官自十月至二月逐月照約下鄉到倉縣官規避干繫而轉改武官則有清壇社吳百七等稱供需官員之訴延德都高大發等稱被取轎畨穀之訴又有武上都張公是等稱見任官急欲囘司只取倉職虛申一状故倉職有折錢入已及穀不入倉之訴此弊之不可不革者也始慮官司之難於徧察於是各鄉止置一倉今則地里迢遥資次積壓其拘之使貸也守候輒數日而斂也亦如之故有訴貸本僅了搬擔裹足而所納乃白陪者始慮倉職之為奸欺於是諸倉各定一秤今則出入各秤高下異守其貸而給穀也十僅得七八而斂也反倍之故有訴所出不足以了陪納又復取之私債者始慮舊穀之易没東作之無助於是方春即貸而斂以秋今則逃亡既衆隄防過宻其貸多待秋熟特一時藉以規取贏餘甚至榖貴糶錢待秋熟而後低價折付反隨即取其陪稱之穀故有訴破家蕩産子孫受害只得逃移以避社倉之苦者其始穀本毎鄉僅五百擔今積其利息間已近六七倍而支費耗折之數不預焉窮鄉何以堪此歲増之數其始出貸每户不過四五十斤今强其必貸率不下六七倍而倉職苛取地盤穀之數不豫焉窮民何以出此歲増之息於是訴社倉一年富於一年鄉民一年窮於一年者有之訴社倉本欲利民今反至於害民者有之訴社倉皆是鄉民運聚之息顆粒不曾散還鄉民而聲寃者有之且聞此等欲愬之情其來已非一日之積凡在州縣提督之職前此亦多親聞其言惟是法源於文公而事本以救民恐更革之未成已謗議之先受人莫敢嚮弊以日深某等相與竊伏思念至於積月累日竊謂雖自昔聖賢未有乆而不弊之法法至於弊亦未有不可起而救之之理法出於黄帝堯舜尚須通變法出於三代盛時猶必損益安有謂法出於儒先忍於坐視其弊而不救者是亦豈儒先立法之本心哉顧惟此事百姓請罷社倉之說雖不可行若倉職漁奪百姓之害豈容不革但剏法固難更革尤難法愈更而愈宻則弊愈乆而愈深正如朱文公有言天下事本不難為但恐做時不比説時人心不比我心今若更革望其能乆正恐後之負今亦猶今之負昔兩縣四十鄉之間安得人人常如康知軍之用心哉惟有簡便或可少紓葢榖已多矣不必更求増息弊已極矣不容盡倚倉官凢遇成熟並與在貸于以從人户闔詞之請偶遇水旱减息出貸于以永存康知軍救民之法舊倉職並與改替舊來州縣官吏有闗倉事者並免干預别請近城寄居充局官成熟年分彼此相忘惟遇水旱則從本軍徑請局官及時下鄉監倉職照官秤公平出貸並聽人戸情願不必盡數均敷少需秋成斂穀仍即封閉如故此其更革之大綱也舊規取息并支遣耗折共收二分二釐今共止量收一分謂如斂穀本一百斤舊年年收二十二斤今止出貸之年收一十斤内以三釐充局官到倉轎夫及貸斂職掌諸色雜費内七釐以備坐倉耗折毎一年許豁耗一釐豁至五釐而止謂如穀坐倉一百斤一年計豁耗一斤其出貸年分不在豁耗之數舊規倉之副職經兩貸兩斂而升正又經兩貸兩斂而替今既不每年常貸更不拘貸斂次數仍以二年為例二年升正曽經斂散即與改替新舊交承周而復始以防日乆生弊且得更休舊規官差兵士在鄉名坐倉節級歲乆擾人倉職間亦藉以立威鄉落今並免差遇貸斂年分聽於支遣穀内續行從便短雇使喚舊規倉職有事並申官司今止許申寄居局官聽從便宜區處有合從官司施行者須寄居局官申明此其更革之節目也本軍除已逐一施行外所合照康知軍剏立舊例備申朝省并提舉常平司照應併録人户今來詞訴繳申照應須至申聞者更革社倉公移照對本軍昨經嘉熈庚子大歉賴康知軍賑救民獲更生康知軍荒政結局又極力措置毎鄉榖本五百擔倣朱文公社倉法歲貸收息以漸増添為将來萬一水旱之備慮及無窮恩同父母世世吏民宜共扶植奈何創始之艱難繼者易怠凶荒之苦惱樂歲易忘以至日乆弊生利反成害官司督促倉職但欲取足本息而不知倉職之並縁擾民倉職陰剥小民但期倍稱取息而不恤小民之痛苦無告甲内逃亡隣保均陪逃亡穀本坐倉展息於是小民畏貸穀甚於畏科敷而貧者竟貸之而流亡上户避倉職甚於避差役而黠者反攘之以侵蠧其他枝節不可勝言去歲之冬方當檢照規約預行覈實合貸人户忽據鄉民羣訴並乞免行貸斂甚至以為社倉不除皆當逃避他郡此雖鄉民被擾一時忿激之言然其情亦可知矣聞之使人驚惻即已斟酌事冝量為通變常年並免貸斂以順鄉民哀訴之情荒年减息出貸以存康知軍仁民之政舊規息穀支遣穀耗穀共收二分二釐今權收一分充耗折支遣将來免收併與住免向來官司吏卒之擾而請委賢寄居為局官以鄉官自救鄉民如朱文公創立社倉本法通變大要不出此三者除已備申尚書省及提舉常平使司照會去訖其餘合行事件分牒關報合屬去處外所合備榜曉諭今開具下項一社倉之不免於弊者正因取息而倉職得以並縁耳契勘倉職先來有解到人户折納穀錢見寄留常平庫今将上項寄庫錢就近城置買水田委局官歲收租利為扶助九鄉社倉之基本應社倉規約内元收耗穀支遣榖向後並将所收田租代充使人户貸一斤只斂一斤更不増收顆粒所有近者申省權收一分之説縁此時未議置田不得不開此項今出貸未有年分未須支遣筭計将來出貸年分支遣及在倉每年合豁耗折數亦非多買田纔成併可住免續申照應一社倉之不免於取息者又因欲積漸使多以備水旱耳今除前項近城置田貸息外更将各鄉元得康知軍穀本五百擔陸續出糶隨鄉置田常年積租荒年賑濟則自不必取息求多矣一社倉所以因取息而壊者亦因積數愈多則取息亦多民户之歲收有限力不能堪耳今諸倉見在穀除五百擔置田歲取天地無窮之利免取人户有限之利以推廣康知軍美意外更與樁留一千擔準備出貸以存康知軍舊規視元數亦已倍之矣一諸倉間有見管數多除五百擔買田一千擔留貸而尚有餘剰者皆是倉職得人鄉民淳良所致並與另項樁留準備水旱年分盡數散還鄉民此時亦可少寛官司擘劃上户敷糶等事一諸倉間有見管數少不了樁留去處專局日下嚴監倉職欠數補足一貸穀雖留千擔仍取人户情願不以貸盡為拘一前件監倉職侵欠皆是覈實倉職已收人户之數其元係人户拖欠者權與倚閣不許倉職私自催理為人户不已之擾一社倉是鄉曲之事今請委寄居充局官之後凡事並聽局官區處但寄居行鄉曲事亦須藉官司之力而官司為民父母尤不可一日少忘吾民之事顧纔經官司輒不免吏卒之擾此所當防耳契勘本軍嘉定年間真西山将漕救荒專委本軍軍學林教授賑給書之史冊千載盛事而向來嬰兒局近改義田局及滄河渡浮橋局其田租亦皆借重教官煩其提綱葢學校公議所自出鄉曲館事可賴以維持不朽今來社倉置田關係尤大亦照例附庸軍學凡田租簿籍並係局官與教官同僉盖教官㕔雖官司而無吏卒之擾者也兼或遇有緊事合經本軍行移教官以見任官與之同共禀議事亦易達其餘些少文移局中竟牒縣官等處施行一局官文書照紹興府例就本軍置社倉局仍照本軍舊例以書局人充之遇有公申徑從書局呈押又恐書局近上人無專工到社倉局更差一貼司到局書寫兩紙並於田租内支行月給一倉職舊規兩年為副兩年升正而替凡職皆經四貸四斂今既常年不貸不可專拘四年之限必在四年之内曽經一次貸斂俟四年限滿亦許替換或雖經四年遭值連熟未經貸斂者未許替職一倉職向以為難者與官司共事耳今官本置田之後倉穀皆是民穀貸數止管千擔有事直達鄉局並無向來繁難應有倉職改替請機察保明申局官備申本軍照應但取物力髙强衆所推服不可以前來已充為拘盖庚子至今已三二十年縱曾充應亦當再充貸首亦如之一貸榖止用大秤昨因别用小秤收息訪聞倉職多在小秤作弊今既免收息之後不許更用小秤一舊來鄉民納榖等待資次多至旬日小民四散搬擔或至貸本僅了費用訪聞體例倉職交榖機察搬穀必待數多然後入倉以致鄉民等待不便今既不常貸常斂穀遇貸斂又是水旱年分患難相䘏之時况所貸止千擔請機察先次下倉㸃數分撥不可為倉官過數秤出既不出息恐衷私作弊尤當防閑貸則隨到隨給斂則隨到隨交三日一次申斂數六日一次請機察交盤入厫不可俟斂足而後盤入以檐閣人户一諸倉多損舊或無地板處以致穀易損耗今既有樁留數目尤當増置地板諸倉應有合修去處並請日下申明及時修置一康知軍立社倉初係本官自䟎到酒息及李盈家業并荒政局剰米即不曽将窠名官物創置况今日更革之後諸倉所存全是息穀又皆係百姓巳物於官司尤無相干不獨官司無干将來水旱有備官司又将賴之訪聞舊来官司或遇窘迫之時曽有欲議移兊者好官員自是决不肯行或向後人吏有以此說鼓惑官司之聽者請局官以鄉曲大義白之當職仍先與一面申省照會一社倉置田候見數目亦與申省蠲免苗税一修倉照康知軍元約於倉穀支遣數内公支分明出豁一以上並係廣德縣諸倉施行其建平社倉自康知軍創置以來即專委本縣見今牒催差職搬穀未辦候到陸續施行申諸司乞禁社會状照得本軍有祠山春會四方畢集市井雖賴之稍康風俗實由之積壞凡合釐正僣具列申其一謂埋藏祭以太牢夫太牢者天子所用饗帝豈臣子所冝祀神惟此祠山之會敢為不法遂使民俗亦多殺牛坐坊賣肉略不知忌良由習之慣爾昨孫公諤洪公興祖為守嘗申公朝易以素饌况祠山近改真君之號而廟貌已復素饌之羞不知埋藏猶用太牢者果為誰設耶其二謂傷神迎以兵器夫兵器者國家所用禦敵豈民庶所宜賽神惟此祠山之會敢為不法遂使民俗亦多帶刀狠鬭殺人略不知忌良由習之慣爾昨曽公㮚為守常準朝㫖毁撤傷神况祠山見無傷神附庸之祠而傷神必皆罪死不靈之鬼不知迎引猶用兵器者尚為誰設耶其三謂罪案迎以囚帽枷索夫囚帽枷索者獄户所以械繫辟囚豈市井所宜翫恱士女惟此祠山之會敢為不法遂使民俗視獄具為戱弄之物謂罪惡有厭勝之方作姦犯科略不知忌良由習之慣爾昨康公植為守嘗明國法嚴行禁止况祠山本號水旱祈求之地於封爵素無刑獄職掌相關不知迎引盛用囚帽枷索者又為誰設耶其四謂差會首夫自狄梁公不世出世之滛祠固多矣然其社首之輪流皆出民情之願欲未聞有迫於官差者也今此祠山歲差㑹首同於差役雁鶩成行誅責已徧抽籖方行民一充應率至破産夫差役猶曰不可廢也此亦不可廢乎差役既擾之差會首又擾之不知為民父母者何心况祠山自有租入廟祠自能設供初無以會首為也其五謂差機察夫自嚴子陵不常有世之求用者多矣然必有坊場河渡之汙故易以集江湖乞丐之靡未聞有擾及史祝者也今此祠山歲差機察同於征商狐䑕輩屈體而得攘臂以臨逺至商賈無一獲免夫征商尚曰不獲已也此亦不獲已乎肥一二之不肖毒四方之民旅不知為民父母者何忍况郡官元係提督祠廟本無他事初無以機察為也凡此祠山五事無不關係風俗而又有並縁祠山關係尤大者焉其名曰方山聞其臣事祠山列在廊廡曽藉餘休亦霑封爵近祠山改封真君而世俗指為冷職遂創今祠别為香火逺近響應反過祠山起四月止八月盡用鎗刀為社自安吉暨冝興率聚千百為羣能幾何時勢已至此前年此曹已曽殺人於郡東二十里地名王婆坊矣某竊謂此祠若果出於神之心此祠山之叛臣也若立出於人之心此愚俗之妖祠也義皆無取而害則甚多盖千百其人者擾之端鎗刀其器者凶之事宜興安吉相連而至者又皆江湖出没之徒蔓則難圗漸不可長區區所憂又不止敗壞風俗而已併敢瀝忱而索言之如前五事則乞徑自使司隨事禁戢如後一事則乞移文浙西憲司預嚴戒所部夫民心無常惟上所嚮禁民為非絶惡之萌竊意莫此為急出位之罪伏兾裁赦須至申者提舉司僉㕔書擬照得執左道以亂政假鬼神以惑衆者殺賽祠社會執引兵仗者隨重輕論罪經典法條炳如星日據廣德軍黄通判申明傷神五事方山一事祠山廣徳之土神血食加封經數百年固為水旱祈求之地傷神方山不知何神皆一種姦黨鴟義矯䖍設此以欺誑世俗漁獵民財故於春會之時團結社火張皇威勢持鎗執刀以祓攘凶祥為名囚㡌枷索以厭勝罪惡為戯始行於一州今遍於四方其弊由來乆矣州郡民之師帥合行禁戢今埋藏太牢而行饗天之禮公差會首而滋擾民之端剏置機察而開征利之門士庶無别男女夾雜商旅乘是販賣動違國禁惡少乘時殺牛不顧公法彊悍不逞之羣乘是千百為黨習以殺人為常此其罪非特執左道以亂政假鬼神以惑衆者也致風俗敗壞果誰責耶今若懲治不力則人莫知懼防制不嚴則蔓將難圖欲行下廣德軍除埋藏太牢照孫公諤洪公興祖改用素饌之例不許用太牢傷神照曽公槃嘗準朝㫖毁撤所有會首被差破産機察取乞事許人告其方山祠起四月止八月盡用鎗刀為社欲照所申移文浙西憲司早行戒約仍牒黄通判㕔照應併備榜戒約提舉黄右史鏞書判昔人有言曰明天地之性不可惑以神恠知萬物之情不可罔以非顧夫好滛祠尚巫鬼楚越之俗然也而江東為尤甚然為之守倅令佐也茍能明天地萬物之理以迪其善而祛其惑則人心自正邪説自息廣德軍黄通判所申祠山五事及方山一事明理息邪甚有關於風教照所申祠山祭食只用素饌不許僣用太牢傷神既嘗準朝㫖毁撤不許迎以兵器罪案之設尤為誑脅愚今後不許以囚㡌枷索獄具免㑹首不許官差罷機察仍用郡官提督有已差者日下抽回所有方山事尤駭見聞不惟冐法越禮慢神虐民以為風俗之蠧又且執兵持仗召釁稔祸以貽州縣之害况前年已有社火殺人於王婆坊之事乎豈可不行禁戢準淳祐勑諸因祠賽社會執引兵仗旗熾者造意及首領人徒二年餘各杖一百滿一百人者造意及首領人仍不刺面配本城並許人告官司不切禁止杖八十國法昭然愚俗特不知而冐為之耳牒本軍帖廣德建平縣及帖兩縣尉司嚴行禁戢違照條法施行仍榜本軍本縣本廟及界首併牒浙西提刑司安吉州一體禁約餘照擬行提刑司僉㕔書擬明則有禮樂幽則有鬼神道理一也事神以不正之禮豈惟王制之所不容亦神心之所不樂祠山有功於民封爵廟食亦既乆矣神有常尊祀有常典奚以立異鬭竒為哉本軍黄通判條具申來前五事指為壞風俗後一事指為生亂階切中時弊夫聰明正直謂之神黄通判建明真正論也亦必有得於神之心者本司見此救風俗遏亂萌之事安得不與主張欲備榜行下禁戢牒本軍如遇犯到照條施行併移牒浙西憲司嚴戒所部其於維持世敎防範民情實非小補提刑林司業應炎書判偹榜移牒安撫司僉㕔書擬祠山之神覃福江左朝廷錫嘉名曰真君以所奉列星天神者奉之嚴且不凟如此蠢爾愚民好勇鬭狠烏足以知靈德哉廣德軍黄通判申以春會伊邇開申五事一乞照洪知軍巳申朝廷止用素饌杜絶日殺耕牛之弊照得神受天子之封亦當奉天子之法小民借神以殺牛侮法是侮神也欲劄本軍行下巡尉嚴榜禁戢敢仍殺牛者繩以本罪巡尉不許容庇其二乞照曽知軍任内曽準朝㫖毁撤傷神不許用刀鎗兵器迎引傷神果何為者以刄指人法尚不恕持兵械而跳踉於神之前豈惟不敬傷人及盜鮮不由此欲劄本軍速牒諸縣引示隅保今後不許以刀鎗兵具迎神違者罪坐會首其三乞照康知軍禁止迎賽用囚帽枷鎻夫神賛於幽人治於明囚帽枷鎻天子之吏治人之事也匹夫而擅為此具其可乎以斯須之懼逭滔天之誅理所必無神亦不赦欲劄本軍備榜道途此等私造獄具即時毁去不悛重斷其四乞官司不必差會首其五乞官司不必差機察照得差役法也差會首非法也差機察愈非法也使會首有餘財何不移其事神者事父母有餘力何不移其習末技者以學為孝悌忠信人能如此雖不為會首神亦相之况於差會首差機察皆為胥吏乞取計非為神計也欲劄本軍不許差會首吏胥抑配定行决配其民間情願獻香者聽本軍元有郡官提督就兼機察之任得一清強者自足辦此不必别差機察頃李提刑嘗禁止婺源雪順廟香會近方提刑亦禁止信州嶽廟聚集皆江東屬郡祀典顯著去處民既靡爭神亦用妥聰明正直豈非法之謟是福哉欲劄本軍并報黄通判仍榜祠山廟門其方山别祠本軍自當一體禁戢安吉宜興不逞之聚前年既有殺人之事本軍自合詳委具申浙西提刑司乞與禁戢施行安撫制使裕齋馬相公光祖書判神以聪明正直廟食一方福善禍滛體天行化其載在祀典者歲時致敬自有常彛若夫刲羊搥彘以傷物命張旗伐鼓以事迎拽群聚惡少以起爭端車服僣上而越禮制決非神所樂亦非神所安軍縣長官以宣明教化為己任今一切聽其所為每歲必有鬭傷專為造偽淵藪官司宜禁而不禁方此差提督選機察若助之為妖者豈假神幻以行賈耶今黄通判所申五項委為要切劄軍並逐項照行仍委黄通判覺察備榜以申尚書省乞禁本軍再行牛祭事照得本軍有祠山張王廟民俗嘗祭以牛前太守孫公諤洪公興祖皆謂禮不可僣易以素饌連歲獲稔事載本軍書籍庫張王事迹昭然甚明後來官司失於撿舉民間又復私用牛祭縣吏不法反攬以擾民科祭牛甚於科軍需差會首甚於差户役其弊已不止如孫洪二公所謂僣禮而已續又有棄城之将謫居本軍祈哀非鬼遷祠山廊下别一鬼神卜地方山大興廟宇自此祠山漸衰而方山驟興祠山歲用一牛方山則廣德縣管下七百二十餘保各用一牛歲用七百二十餘牛方山既每保用牛而每保之社廟又各用牛并其餘非法乞福因亦用牛一斗大壘遂至歲殺二千餘牛若常時屠販小人因而宰殺者又不預焉以故耕牛耗及鄰郡户産朘於數祭風俗大壞良可痛傷近年幸奉朝㫖張王改封真君法用素祭此風冝可革矣而習俗既成自祠山之一牛及方山各保之一二千牛殺祭如故盖廣德軍之殺牛如他郡之殺雞安若故常全無忌憚然而殺牛邀福終亦無福如近歲丁未之旱本軍未嘗不殺牛其旱自若甚至如咸淳二年他郡不遭旱本軍反以山田易涸旱獨偏聚一方未見殺牛之能救旱也如近歲辛酉之水本軍未嘗不殺牛水亦自若甚至如咸淳四年他郡不遭水本軍獨以山溪易漲水嘗三入城市未見殺牛之能救水也以是知天時自有定數地勢又各不同神之依人豈不陰相事之在天終難盡斡曾謂正直如祠山靈祐如祠山累受朝廷封爵如祠山而肯視牛之殺不殺為禍福哉某一介非才叨恩佐郡既傷殺牛滛祀之非禮又訝多殺耕牛之非法遂於今春僣申諸司繼荷諸司各榜禁戢風俗為之一變闔郡無復殺牛雖冝興安吉溧陽羣不逞之徒刀鎗千百習亂方山者亦為屏息無敢入境千里士民方相稱賀至今年六月初五日某偶被檄録囚寧國聞新知軍下車之初首索某申檢拖詳已不謂然至七月十七日聞本軍盡收諸司之榜許追賽歲例五月初殺一牛説謂闕雨須還十祭七月二十日又聞抛珓卜用八月初二初六初八日殺牛皆不從牛牲既設将以初八日强致之某因切伏思念前日某之申明為百姓耳今日本軍之更革亦為百姓耳事不同而心則同若未甚害所慮官所開禁雖止殺祠山一牛民所倣傚又將殺方山各保一二千牛冝興安吉溧陽凶徒刀鎗習亂者亦必聞風踵至此則不可不防兼念近者闕雨正亦未必因牛盖某之申明在三月常年之牛今年不賽者在五月祠山若以不殺牛而不雨當自三月或五月即不雨矣不應至七月初而後闕雨也又七月初之闕雨鄰郡如寧國安吉等處皆然七月十一日至十五日一連五日四郊雷雨亦鄰郡如寧國安吉等處皆然及十七日收榜許牛不復雷雨二十日抛珓殺牛不從雲氣自此反絶祠山若以不殺牛而不雨罪當首及某一身矣不應併累隣郡闕雨未幾復賜之雨既許殺牛反又不雨也神不能語某亦何證但本軍既謂因不殺牛而闕雨則某前此之申明禁殺實此邦致災之罪魁何可更一朝强顔此邦士民之上用敢􅅹忱露罪并録元申及諸司備榜書判繳連在前控申公朝乞賜敷奏速将某解官離任或予祠禄以全小臣去就之誼仍乞詳酌前件祠祭合不用牛事理劄下本軍照應永逺遵守併将李士達晩剏方山淫祠毁拆以絶羣小亂萌實非小補須至申者第七任添差通判紹興府申提舉司水利某聞自昔賢師帥必有乆長之利以大庇吾民自昔僚屬亦必有見聞之益以禆助其長某近者扁舟過越聞大府百廢具興心為歆羨未幾俄得備數員外丞自謂此殫見聞效㳙埃之日也敢以沿途所見水利先條列以告其一曰石堰其地在餘姚縣東二十里鳴鶴東西及石堰東場鹽運胥此焉達舊無堰兵惟近居小民間執車䌫以乘時射利公私已不便之右近自邸第營墳左近幹僕虛喝此曹避去鹽運非官備車纜不得通民旅則倚髙大息其傍某妄意法已置堰兵二人主之然月粮無所出契勘眉山寨兵多闕額兼訪聞石堰西場趙監場頗曉事謂冝帖趙監場踏逐堪為堰兵者二名帖餘姚縣将眉山寨闕額兩名刺幇月粮仍專委西塲提督堰事庶幾鹽運無滯民旅亦賴之邸苐幹僕亦無敢虚喝其間此某自明抵越第一節所見也其二曰通明堰其地在上虞縣東十里西壅本縣諸處山水以溉民田東通慶元府界三百里江潮以便舟楫古人於山水江潮交會兩極之處相天地自然之炁勢而立之堰居明越之要會紛舟車之雜遝其利又過於石堰者百倍建炎車駕幸海道實經從其間聞非潮時灘浦淺落我光堯皇帝面江嘿禱潮忽驟漲至今父老相傳以為此中興官家借潮之地又足以見地靈之呵護如此近忽有邑人移堰近西五里者山水未於此止故新移堰常受衝决之害江水不於此乎達故新移堰無復通行之利今此過之堰已乆壞惟有舊樁樅樅散立於數丈深坑之底農田泄灌溉之源行旅嗟般剥之苦利害萬状不可具陳此堰之西五十里㑹稽縣界百丈塘有頭陁聚兒童十數分頭覔錢於行舟過客曰我将以復通明堰也聞者雖至貧亦無不愀然傾囊以予此堰非頭陁之所能辦行人多知頭陁借此謀食而此聲一聞愀然爭施亦足占此堰之關係者大而民情之所望此堰者切矣某路由上虞因訪之縣令陳迪切謂嘗畧計非得二萬芝楮不可縣無此力惟有痛心某因採訪得權丞張兼僉詳練有才嘗築新林塘奏功之人堰所當興官有可委幸今大府一意為民而常平使者又并屬大府此千一難逢之會未必非造物者注意謂冝於大府及常平司挨那支撥縱兩司未有此一頓事力賢師帥創之必将有聞風而樂助者亦無非賢師帥之賜此某自明抵越第二節所見也其三曰通明堰之上正港髙閣而兩傍低下舊築髙塘以達縣治間者移堰就西之議謂可縮塘使短免水衝突迺自移堰以來塘愈促則水愈暴水愈暴則决愈甚目今髙塘傾倒水多走泄某之過此晴方一日河舟已膠農務方興其将安仰前所謂堰之當復不過趂今收買木石以備秋後興工若失塘倒之患正切目前謂冝急下丞㕔委請上户關會隅保先将塘闕速行築捺此某自明抵越第三節所見也然此塘非不毎毎築捺也二河並行中髙傍下水衝易决勢既必然加以般渡之船梢夯擔之脚家惟利塘摧水竭以邀客旅不願塘堅水溢以妨私計毎乘昏黒潜行掘壞一線有隙十里為枯使農夫常失灌溉之利使都保常受敷捺之害使往來民旅常被搬剥勞費之苦此曹方欣欣自以為得策今欲痛革久弊以垂長利謂宜於中河兩髙塘之外将兩低河盡築為髙田用附益髙塘不至單薄使水勢不得而衝人力不得而掘却於髙田之外即於掘泥築田之地復還舊日之兩傍低河以便他處水脉仍以中塘新築之髙田補還兩傍掘田移河之業主庶幾有益無損轉害為利以緝古人思慮之所未及之功使世世永賴此又某第三所見預為日後之謀者也某材識凡陋官為贅員何敢僣越出位實念為民長乆之利者賢師帥之事以所見聞裨其長者僚屬之事大府為民興利既無所不用其力某謂得之見聞如此而不以詳聞則為有負其長用敢逐項申聞言若可采欲望更加詳訪而力行之公私幸甚伏乞台㫖回申紹興府人户訴旱状伏準台判送下山陰會稽諸鄉人户訴旱一百五十六状令某看詳若疑其為妄者某竊見今歲入夏以來繞城委是得雨使車登城所見委是有收若二三十里之外委是缺雨某今夏承提刑司檄差往新昌嵊縣及台州一帶决遣凡所厯本府管下無不焦枯古人謂州縣字民之官不損猶當言損恐不可以目睫所不親見而例疑人户之訴為虛欲望台慈特賜減分以慰鄉民嗸嗸之望須至具申黄氏日抄卷七十四
