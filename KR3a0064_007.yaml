body:
  text: 黄氏日抄卷七宋黄震撰讀春秋一孔子曰吾志在春秋孟子曰春秋天子之事孔子作春秋而亂臣賊子懼葢方是時王綱解紐簒奪相尋孔子不得其位以行其權於是約史記而修春秋隨事直書亂臣賊子無所逃其罪而一王之法以明所謂撥亂世而反之正此其為志此其為天子之事故春秋無出於夫子之所自道及孟子所以論春秋者矣自褒貶凡例之説興讀春秋者往往穿鑿聖經以求合其所謂凡例又變移凡例以遷就其所謂褒貶如國各有稱號書之所以别也今必曰以某事也故國以罪之及有不合則又遁其辭人必有姓氏書之所以别也今必曰以某事也故名以誅之及有不合則又遁其辭事必有月日至必有地所此記事之常否則闕文也今必曰以某事也故致以危之故不月以外之故不日以畧之及有不合則又為之遁其辭是則非以義理求聖經反以聖經釋凡例也聖人豈先有凡例而後作經乎何乃一一以經而求合凡例耶春秋正次王王次春以天子上承天而下統諸侯弑君弑父者書殺世子殺大夫者書以其邑叛以其邑來奔者書明白洞達一一皆天子之事而天之為也今必謂其陰寓褒貶使人測度而自知如優戲之所謂隱者已大不可况又於褒貶生凡例耶理無定形隨萬變而不齊後世法吏深刻始於勅律之外立所謂例士君子尚羞用之果誰為春秋先立例而聖人必以是書之而後世以是求之耶以例求春秋動皆逆詐億不信之心愚故私摭先儒凡外褒貶凡例而説春秋者集録之使子孫考焉非敢為他人發也褒貶夾漈鄭氏漁仲曰以春秋為褒貶者亂春秋者也晦菴先生曰春秋大旨誅亂臣討賊子内中國外夷狄貴王賤霸而已聖人光明正大不應以一二字加褒貶於人不過直書其事善者惡者了然自見又曰目前朝報尚不知朝廷之意况千百載之下而遂逆推千百載上聖人之意凡例徂徠石氏曰稱人者貶也而人不必皆貶微者亦稱人稱爵者褒也而爵未必純褒譏者亦稱爵繼故不書即位而桓宣則書即位妾母不稱夫人而成風則稱夫人失地之君名而衛侯奔楚則不名未踰年之君稱子而鄭伯伐許則不稱子㑹盟先主㑹者而瓦屋之盟則先宋征伐首主兵者而甗之師則後齊母弟一也而或稱之以見其惡或没之以著其罪天王一也或稱天以著其失或去天以示其非愚按晦菴先生嘗云聖人欲率天下以尊齊晉且謂楚在春秋時非桓文遏之則周室為其所并此蓋尚論其世者也聖人能與世推移世變無窮聖人之救其變者亦無窮春秋之世王室微諸侯强其始故抑諸侯以尊王室及諸侯又微而夷狄强則又抑夷狄而扶諸侯尊王室固所以尊王也扶諸侯亦所以為尊王地也聖人隨時救世之心如此而世儒乃動以五帝三王之事律之此議論所以繁多聖人書法甚簡隨字可以生説此議論所以愈見其繁多宜褒貶凡例之説得以肆行其間也今惟以春秋之世而求聖人之心則思過半矣孔子曰其事則齊桓晉文其義則某竊取之隱公名息姑惠公子母聲子諡法不尸其位曰隱始隱伊川先生曰平王東遷在位五十一年卒不能復興先王之業王道絶矣王者之迹熄而詩亡詩亡然後春秋作適當隱公之初泰山孫氏復曰平王迨隱而死夫生猶可待也死何所為春秋始隱者天下無復有王也木訥趙氏鵬飛曰非始乎隱也始乎平王之末也凡諸儒欲以一事而當春秋之始者皆妄也徂徠石氏介曰春秋以無王而作孰謂隱為賢且讓而始之哉愚意春秋特因魯史而修之非為魯作也為天下萬世之王道作也故謹録諸儒之説如后凡他有所指者不復録元年元年者魯隱公之始年也夾漈謂諸侯舊用天子之年至平王失政諸侯並稱元年陳止齋傅良亦同其説謂古諸侯止稱世愚意諸侯所謂奉天子正朔者謂以子丑寅為歲首講朝聘耳未必使諸侯皆以天子之元年為元年蓋封建之法肇自黄帝諸侯之世守其國固有出於三代興王之前者有王者興特以禮相與諸侯各自有其國各自即位則亦各自有始年安得一律以天子之年為年其曰古諸侯以世計者恐世遠難考姑舉其世次歟或謂書元為春秋大法者亦未必然自唐虞三代皆以始即位為元年矣春王正月自杜氏注左氏傳有周正月今十一月之語先儒遂多指春秋之春為冬建子之月至文定公胡康侯講春秋始謂前乎周以丑為正書元祀十有二月知月不易也後乎周以亥為正書元年冬十月知時不易也建子之月非春明矣聖人語顔回以為邦則曰行夏之時作春秋以經世則曰春王正月蓋以夏時冠月垂法萬世以周正紀事示無其位不敢自專也然文定以春為夏正之春建寅而非建子可也以月為周之月則時與月異又存疑而未决也故晦菴先生以為若如胡氏學則月與時事常差兩月恐聖人作經又不若是之紛更也此事晦菴考之詳矣尚未嘗質言之豈後學敢知近世惟岷隱戴氏溪在東宫講春秋常以夏正為説於時事亦未見其甚背竊意三代雖有改正朔之事而天時恐無可改遷之理今所抄集姑依戴氏在來者擇焉不書即位左氏謂隱攝公羊謂隱為桓立穀梁謂隱讓然謂其讓為成先君之邪則似求之過也或謂其禀命為正而正者不必書或謂不禀命而即位聖人故絀奪之而不書皆無所考戴岷隱以經之所無而付之不言惟劉恕謂惠公愛少子立為太子國人不與而立隱隱曰吾將讓焉太子桓公徯望十年不獲而羽父弑隱於是桓曰隱攝也吾取之左氏信桓之欺故曰攝公穀信隱之詐故曰讓俱失之三月公及邾儀父盟于蔑邾者魯附庸之國儀父其字左氏曰名克書月不書日者先儒以為遠也盟非美事而春秋亂世相與結好之常聖人不過因事而書諸家或以為褒或以為貶皆不可知然既盟而又伐之則非耳夏五月鄭伯克段于鄢於晚反鄭伯莊公也段其母弟莊公迫於母命封於京而反莊公以兵勝之克者戰勝之名也穀梁曰賤段而甚鄭也謂不書弟而書克也胡安定曰兄不兄弟不弟交譏之也左氏曰如二君故曰克胡文定曰克者力勝之辭愚意大㫖不過如此或文致鄭伯以滔天之罪者似恐求之過蓋鄭伯不幸處母子兄弟之變而不學無識不善處之其初黽勉以從其母其後妨其母不敢遽制其弟後遂至難制而伐之耳左氏罪鄭伯失教段果可教者否耶鄭莊之大惡在伐周未必在克段也秋七月天王使宰咺來歸惠公仲子之賵咺吁阮反賵芳鳳反仲子者魯惠公再娶之夫人也伊川謂不曰夫人曰惠公仲子者妾稱也榖梁謂禮賵人之妾不可凡皆正論也木訥謂魯以夫人赴故王來賵云九月及宋人盟于宿内稱及外稱人皆微者也或曰不書公諱與大夫盟也岷隱曰宿者國名意其為宿而盟也冬十有二月祭伯來祭側界反左氏曰非王命也祭伯畿内諸侯為周大夫公子益師卒益師者孝公之子貴戚之卿卒故書二年春公㑹戎于潜説者多謂譏公不當與戎㑹是責人於難也岷隱謂周衰戎狄雜居中夏魯有疆場之交不得不㑹之也愚謂亦公不能自强也夏五月莒人入向莒與向皆小國左氏謂莒娶於向向姜不安於莒而歸故莒人入向以姜氏還公羊謂入者得其國而不居按左氏據史為傳當是事實公羊則據文立論耳然言入則以兵可知宣四年公伐莒取向則向後為莒所并可知無駭帥師入極無駭者展無駭也極小國也木訥曰莒入向向近魯魯人疑莒為東鄙之侵故以此示威其後因紀子帛為密之盟遂與莒結浮來之好愚按入向入極二事聫書木訥之説似得之秋八月庚辰公及戎盟于唐説者亦多以此貶公惟木訥曰以文王之聖而事昆夷以太王之賢而事獯鬻隱公何疵焉唐之盟非得已也愚謂不得已而與盟可也終不能自强則非矣九月紀裂繻來逆女冬十月伯姬歸于紀此紀求昏於魯也説者皆謂譏不親迎伊川曰諸侯親迎迎於所館豈有委宗廟社稷遠適他國以逆婦者乎戴岷隱亦謂文王親迎時為世子韓侯親迎亦因入覲然則凡皆因事實書非有譏貶也紀子帛莒子盟于密左氏謂子帛者紀裂繻之字公穀二傳皆以帛作伯左氏見國史當從左氏木訥曰莒自入向有窺魯之心紀子帛往來莒魯之間於是道與莒子盟于密為魯謀也卒之八年為浮來之盟莒魯交好子帛之功也愚按紀新昏於魯為魯謀有之也十有二月乙卯夫人子氏薨公羊謂隱公之母穀梁謂隱公之妻伊川安定劉氏權衡皆以為妻蓋隱公自有妾母明年書君氏卒此言夫人薨則其妻明也或又以為桓公之母仲子蓋以子氏而言之後書考仲子之宫故也然元年已書來歸惠公仲子之賵則仲子之卒在前此言夫人薨則其妻可知鄭人伐衛初鄭伯克段于鄢段之子公孫滑奔衛衛為伐鄭取廪延至是鄭遂伐衛木訥曰管蔡之亂周公誅其父而録其子今鄭莊克其弟而不字其子又加兵於衛三年春王二月已巳日有食之伊川曰月王月也事在二月則書王二月木訥曰春秋書日食災變凡以垂人君畏天之戒三月庚戌天王崩平王也立五十一年崩父為申侯引犬戎殺之不討父讎而反屯戍申侯以報私恩周之所以不復西也胡曰崩者上墜之形木訥曰書崩不書𦵏者周赴而魯不㑹葬夏四月辛卯君氏卒左氏謂君氏者隱公母聲子也為公故曰君氏若曰君母氏云爾公穀皆作尹氏諸家多從公穀然以君為尹不免改經文恐且當從左氏秋武氏子來求賻音附諸家多謂譏周王失道穀梁曰歸生者曰賻歸之者正也求之者非正也周雖不求魯不可以不歸魯雖不歸周不可以求之求之為言得不得未可知之辭也交譏之木訥曰諸侯有貢天子無求禮也平王崩魯不會𦵏至來求賻而卒不㑹焉則賻之得否又未可知也魯在春秋未為强暴之國以魯觀之諸侯又可知矣書生之論乃以不書天王為天王諱惡至桓十五年天王求車又曰書天王以示貶噫周之微甚矣不容負天下之罪如此此豈仁人之言哉凡書求賻求車求金皆誅諸侯不貢而天下無王也尚何責天王哉先師宗諭王貫道嘗言周凡三求求賻以平王崩求車以桓王將崩求金以襄王崩皆以喪事之有闕賻賵之不供也魯不盡臣子之職致周王下求謂魯秉周禮可乎武氏世卿也武氏子未為命卿也八月庚辰宋公和卒穆公也説者多以書卒為略外諸侯甚者至以為諸侯專恣聖人於其死奉天討而貶黜之特書曰卒惟木訥謂外諸侯書卒從赴也赴曰卒謙也魯史因其赴而書孔子因魯史而書説者以為夫子黜外而尊内非也冬十有二月齊侯鄭伯盟于石門石門齊地也齊僖與鄭莊相盟結也木訥曰春秋之初宋鄭為仇而宋與衞為西黨鄭與齊為東黨魯則徘徊於二黨之間初嘗比於宋及六年艾之盟則從齊而附鄭書此者為艾之盟張本癸未葬宋穆公初宋宣公舍其子與夷而立穆公穆公亦舍其子馮而立與夷其後馮遂弑與夷左氏美宣公知人公羊則謂宋之禍宣公之為也木訥曰分義天下之大閑也故非朱均雖堯舜不茍遜益非不賢而禹傳啓杜亂原也隱公欲遜允而亂呉王將遜札而亂宋宣穆再遜而再亂簒奪二世迄襄公始定襄公不悛又欲遜目夷幸目夷不受否者又亂愚按公羊木訥之説為萬世垂戒也而左氏之説亦不可全廢也蓋宣公遜穆公穆公終以遜宣公之子是穆公不可謂非賢宣公不可謂不知賢其後馮之弑逆罪在馮耳雖春秋責賢者備豈可盡没其賢而反加以始禍之惡名哉且謂宣穆再遜而再亂亦未當其實宣之遜穆初未嘗亂穆遜殤公而馮始為亂耳四年春王二月莒人伐杞取牟婁杞夏之後在周為三恪牟婁杞邑木訥曰莒蕞爾東夷自入春秋首加兵於向今又扼杞之弱稱兵而攘其封邑至桓十二年公㑹杞莒于曲池而後釋今日之憾莒之横甚矣然至昭五年莒牟夷卒以牟婁來奔岷隱曰以不義得之以不義失之徒為叛人之資爾戊申衞州吁弑其君完夏公及宋公遇于清宋公陳侯蔡人衞人伐鄭秋翬帥師㑹宋公陳侯蔡人衞人伐鄭九月衞人殺州吁于濮冬十有二月衞人立晉州吁者衞莊公嬖人之子有寵而好兵公弗禁石碏諌公弗聽至是弑桓公自立欲求寵於諸侯以鄭欲納公子馮於宋遂告宋伐鄭魯及宋遇于清為衛謀也宋與陳蔡衞伐鄭翬又率之伐鄭皆為衞也先書宋與翬而後衞説者謂罪其黨惡率兵也翬即公子翬其後弑隱公者也州吁如陳衞以石碏之謀始克殺之於濮説者謂稱人衆詞也稱于濮譏失賊也州吁殺而衞人立晉説者謂書立譏不當立也晉即滛亂之宣公愚按隱四年全記州吁之亂故併叙於此凡謂譏者亦書法之當然而其惡自見非特設辭以譏之也五年春公矢魚于棠公穀皆作觀魚矢亦陳而觀之也穀梁曰魚卑者之事也伊川曰諸侯非王事民事不遠出夏四月葬衞桓公左氏曰衞亂是以緩蓋諸侯五月而葬此十四月秋衞師入郕音成左氏曰衞之亂郕侵衞今故衛入郕木訥曰郕被鄰國之兵自衞始至隱十年齊鄭連兵入郕莊八年公又及齊師圍郕而郕降於齊文十二年郕伯東奔自此不復見於經計失地而奔國遂滅矣愚謂衞入郕固非郕小國也先侵衞挑釁尤非九月考仲子之宫初獻六羽仲子者惠公元妃孟子禮諸侯無再娶則仲子不得為夫人故别立宫考者宫始成而祀也書初獻六羽者先儒言魯僣天子禮樂用八佾此别立宫初殺其數不言六佾者婦人但用羽不用干邾人鄭人伐宋宋取邾田鄭與宋惡故邾人請鄭伐之而邾為兵主螟蟲食苗心曰螟災故書冬十有二月辛巳公子彄卒彄苦侯反臧僖伯也魯孝公之子隱公之叔父嘗諫觀魚貴戚之賢者也公不能聽其言而葬之加一等宋人伐鄭圍長葛木訥曰四年宋兩伐鄭五年邾請鄭伐宋勝負已相當今宋又伐鄭圍其邑憾何時釋耶六年春鄭人來渝平左氏作渝平渝變也渝前日之平猶絶交也公穀皆作輸平公羊曰輸平猶墮成也敗其成也穀梁曰輸者墮也不果成也是公穀雖作輸義亦與左氏之渝一也然諸儒多從公穀作輸而不從其訓曰輸納也輸誠於我以求平也蓋以經考之前年公子翬伐鄭是嘗有憾而未嘗有平初無平之可渝言渝平者非也鄭與齊黨魯與宋黨今宋伐鄭圍長葛懼魯從宋而鄭益殆偶鄭嘗伐宋宋求救於魯使者失詞魯怒不出兵鄭乗此隙致平於魯以離宋之黨故今年春鄭來輸平今年夏公即與齊盟已而公與齊鄭又㑹于中丘以謀伐宋是前乎此魯與宋後乎此魯背宋而與齊鄭皆鄭輸平所致言輸平者是也木訥則曰輸平者致平之意而已蓋許八年所歸之祊田也輸之意若曰魯能不從宋而反兵救我當以祊田饋魯也然鄭徒言之而祊未入魯故魯雖不從宋亦未救鄭有所要也愚按此論尤精但輸平在六年歸祊在八年謂輸平為預許祊乃意之之辭但鄭急於求魯而魯緩於許鄭至歸祊而後魯鄭合則明甚夏五月辛酉公㑹齊侯盟于艾左氏曰始平于齊也木訥曰艾之盟鄭故也自石門之盟而知齊鄭為與國宋伐鄭齊將救鄭則地隔於魯不求魯無以救鄭春鄭來輸平鄭使反命而齊即為艾之盟為鄭求魯也魯終未救鄭者祊未入也秋七月無事亦書首月備四時也木訥曰或不書者傳授脱之冬宋人取長葛長葛鄭邑去年冬圍之今年冬取之直書而宋之罪自見然亦以鄭求魯而魯不救故卒為所取七年春王三月叔姬歸于紀杜預曰叔姬伯姬之娣待年於父母國至是始歸木訥曰其後紀之滅宗廟在酅歸奉其祀不以存亡虧婦道叔姬之賢也故此首録之愚按莊二十九年書叔姬卒八月己亥書葬叔姬聖人拳拳於其終始如此滕侯卒左氏曰不書名未同盟也陸氏纂例曰春秋諸侯卒不同盟者五十二人不書名者九人餘皆書名然則凡例之説其可信也哉伊川曰卒不名史缺也夏城中丘左氏曰書不時也高氏閌集注曰鄭既輸平魯未之許故城中丘以備之十年而㑹齊鄭於此蓋中丘近宋齊侯使其弟年來聘木訥曰齊侯前年為艾之盟為鄭求魯也宋取鄭長葛而魯不救故齊復使弟年來聘卜進退焉年歸反命而鄭賂卒不至是年秋公故為宋伐邾以動鄭鄭知魯兵不空出明年春遂以祊來歸年之來豈為聘問哉為鄭求魯爾又曰稱弟親之也弟之書於經十有二不奔則叛不叛則殺惟齊之弟年不叛不奔而年之子無知亦弑僖公而亂齊寵而私之果有益乎秋公伐邾木訥曰邾嘗從宋伐鄭鄭輸平於魯以離宋而鄭賂不至魯故為宋伐邾以要之既得鄭賂即從鄭伐宋今日為宋伐邾明日為鄭伐宋特以賂故而邾橫罹其毒故終隱之世邾不復通於魯冬天王使凡伯來聘木訥曰春秋書天王下聘者凡八責諸侯不朝而坐受天子之聘也隱在位十一年而天王聘魯者二亦何有一介之使如京師以答天王之勤哉愚按諸家多責天王反聘諸侯為非禮然是時王室微弱諸侯强大孔子作春秋正以扶王室豈有反責天王之理天王亦豈得已而下聘哉若木訥之説亮人情矣戎伐凡伯于楚丘以歸左氏曰初戎朝于周發幣于公卿凡伯不賔然則凡伯亦有以致之矣木訥曰古者王臣涖事事畢衞以出竟單襄公適陳以聘楚候不在疆宰不致膳單子知陳之將亡今凡伯來聘而魯不加衛過衞而衞不加禮戎得伐之以歸所謂司冦詰姦之法安在乎穀梁曰國曰伐此一人亦曰伐大天子之命也胡安定曰楚丘衞地書于楚丘者衞不能救書以歸者凡伯辱命愚謂凡皆直書而意自明八年春宋公衞侯遇于垂左氏曰齊侯將平宋衞宋以幣請衞先相見故遇于犬丘注犬丘即垂地有兩名在衞任氏曰齊侯將平宋衞於鄭衞侯既不敢違齊侯之命又不能釋鄭國之怨有異志焉故先遇於垂三月鄭伯使宛來歸祊庚寅我入祊宛於阮反祊必彭反宛鄭大夫也祊鄭從天子祀泰山時湯沐之邑也祊公穀皆作邴木訥曰魯初睦於宋宋伐鄭齊恐魯助宋故為鄭求魯魯不應之反為宋伐邾故鄭使宛歸魯祊魯得祊始奉社稷以從鄭岷隱曰祊者鄭湯沐之邑許田者魯朝宿之邑周衰不巡狩朝宿湯沐邑皆無用祊近於魯許田鄰於鄭鄭伯利在得許田未敢直取之於魯故先使人歸祊為異日取許田之地魯隱不悟其計受而有之故春秋書曰我入祊大抵鄭詐而魯愚自鄭人輸平之後魯多墮鄭計而不自知愚按若如木訥是魯要鄭而得祊也若如岷隱是鄭詐魯而歸祊也二説不同而皆精於考究竊意二説皆是也木訥主前此而言也以魯不救鄭也岷隱主後此而言也以鄭假許田也要之魯鄭皆懷利以相接者也夏六月己亥蔡侯考父卒辛亥宿男卒書卒從赴也不名者史失之也吕氏云秋七月庚午宋公齊侯衞侯盟于瓦屋瓦屋周地齊侯為鄭平宋衞故盟諸侯參盟始此有參盟則有盟主而伯之漸萌矣八月葬蔡宣公杜預隱二年注云魯使大夫㑹葬故書九月辛卯公及莒人盟于浮來浮來公榖皆作包來紀邑也初紀子帛為魯故嘗盟莒于密左氏故以此盟為成紀之好木訥曰前日莒嘗窺魯子帛盟之莒卒不敢加於魯今魯既受鄭賂將空國以赴鄭之求恐莒人之議其後故成紀好而盟之此盟公在焉而莒以㣲者涖執牛耳豈莒人敢抗公哉公自辱也愚按魯大莒小隱公屈已而甘心與其微者盟必有以也此論得之螟災故書冬十有二月無駭卒無駭即違其君而帥師入極者也公孫之子未賜族卒書名或曰貶故去其族然按左傳無駭卒後羽父始為請諡與族是凡例褒貶之説蓋意之也九年春天王使南季來聘南季周大夫南氏季字也諸儒多謂諸侯一不朝則貶其爵再不朝則削其地今刑則不舉而反遣聘王之不王如此禮樂征伐安得不自諸侯出乎然不思時至春秋周之衰果何如哉此何異祖父衰病垂絶不責不孝子孫之不養而反責祖父之祈哀耶木訥曰諸侯之抗周室之微極矣聖人著天王再遣使之節所以誅魯不再朝之罪也愚謂隨事實書而魯之罪自見諸儒反以罪周者過耳夫春秋固尊王之書也三月癸酉大雨震電庚辰大雨雪左氏曰大雨雷震書始也大雨雪書時失也於雷震言始於雪言時失夫三月而有大雪又見於大雷之後八日之間陰陽錯繆如此書之記異也穀梁曰震雷也電霆也夾漈曰霆曜光也胡安定曰震霹靂也電者陰繫陽為雷之光也挾卒挾音協挾魯大夫也未賜族止書名公穀皆作俠穀又以為所俠注云所其氏也夏城郎木訥曰郎逼宋魯將北㑹齊鄭伐宋恐宋擣虚故城以備之不暇顧天時民力秋七月書備時冬公㑹齊侯于防左氏曰謀伐宋也防公羊作邴十年春王二月公㑹齊侯鄭伯于中丘夏翬帥師㑹齊人鄭人伐宋六月壬戌公敗宋師于菅辛未取郜辛巳取防郜古報反㑹中丘謀伐宋也翬先合諸侯以攻之公即乗虚以襲之不淹旬而取二邑既取祊於未伐宋之前又取郜防於既伐宋之後鄭宋兩失其邑魯隱兩獲其利矣然何以逃君子之譏木訥曰隱公其先蓋賢君也得位之初慨然視千乘如鴻毛將舉而遜其弟締交四鄰息民和衆自鄭莊以利導之割祊來歸即君臣掃境以從鄭伐宋擒縱擊搏惟鄭所使由祊田之賂也視祊為利則視千乘之魯果能脱然歸其弟乎宜菟裘之老不見信於桓而公子翬得以行其譛也利之溺人如此秋宋人衞人入鄭宋人蔡人衞人伐戴鄭伯伐取之戴公穀並作載左氏稱宋衞既入鄭而以伐戴召蔡人蔡人怒故不和而敗鄭伯圍戴克之取三師焉伊川曰戴鄭所與也故三國伐之鄭戴合攻故盡取三國之衆諸家多從其説安定曰鄭伯無仁心乘戴之弊而伐取之與前説不同未知孰是惟劉氏則斷謂三國之師衆矣鄭何以能悉取之且三國伐戴爾不入戴也何以能取三師假曰三國已居戴鄭來圍戴則各自去何為共守此地而為其所取耶或又云鄭伯伐三師取戴而歸復為附庸非滅也戴今之外黄居鄭北鄙冬十月壬午齊人鄭人入郕木訥曰郕當齊宋之境上計郕必附于宋而不事齊故齊脅鄭伐之左氏以為討違王命於經無所考不足據十一年春滕侯薛侯來朝泰山孫氏曰滕薛陋弱不能與魯抗也木訥曰非天子不旅見諸侯今滕薛旅至魯庭魯侯亦旅見之聖人書曰滕侯薛侯來朝而魯侯之罪著矣夏五月公㑹鄭伯于時來秋七月壬午公及齊侯鄭伯入許時來公穀作祈黎左於傳又作郲㑹時來謀入許也木訥曰時來之㑹鄭志也至入許則以魯主兵蓋成鄭志者魯也岷隱曰鄭處許叔于許西偏後十五年許復國故書入不書滅冬十有一月壬辰公薨翬請公誅桓公公弗許翬懼反使賊弑公而立桓杜預曰弑而書薨史䇿所諱隱與桓皆惠公之庶子也隱長當立而欲遜桓欲遜即予之矣而至十一年不予方欲窮兵貪地古謂不斷者來䜛賊之口若隱公者亦可戒也隱公春秋之初也春秋之初未有伯也而伯之漸已萌蓋是時惟齊為大國惟魯為望國齊以黨鄭伐宋而求魯魯以受鄭祊田忘鄭狐壤見止之讎而從齊故前乎此惟兩君相㑹至此而諸侯參㑹矣前乎此惟敵國相攻至此而連諸侯伐宋矣自參盟而有主盟自連諸侯而摟諸侯以伐諸侯故曰伯之漸已萌也向使齊不私於宋而務使宋鄭相安魯不貪鄭之賂而不遽從齊則天下其庶矣乎然則伯之萌齊釐之為而魯隱助之也其初盟邾而後伐邾初盟宋而後伐宋皆利於鄭之入祊而反覆若此尚何以名秉禮之國而遏多事之萌耶桓公名軌史記亦名允惠公子隱公弟母仲子諡法辟土服逺曰桓元年春王正月公即位杜氏曰桓公簒立而用常禮欲自同於遭喪繼位者岷隱曰桓公志在得國諱其故而偃然行即位之禮春秋即其實而書之三月公㑹鄭伯于垂鄭伯以璧假許田夏四月丁未公及鄭伯盟于越木訥曰桓公賊隱而立懷危懼心故鄭欲㑹而允無不從鄭欲田而允不敢拒伊川曰公欲結鄭好以自堅故既予許田又為盟胡氏曰垂之㑹鄭欲得田鄭志也故稱㑹越之盟魯欲結好魯志也故稱及木訥又曰謂假田因入祊則有之謂易祊則非也鄭有宋兵不得已而歸魯以祊既得魯援則勢不可以責償故以璧假為名而實責償祊也胡氏曰既歸祊矣又加璧者祊薄於許也先師嘗言許田魯朝宿之邑近許而鄰於鄭有營洛汝潁浸灌之利鄭莊久欲得之故以祊歸之取宋之郜防以予之得許而讓凡皆以投隱公之欲而兾許田之得也隱公雖受祊取防郜而辭許鄭無得而强之隱没而桓以簒立急於結援自固故許田卒為鄭所得秋大水志災也大者非常之辭春秋書大水凡九魯居其八其一言宋冬十月書以備四時二年春王正月戊申宋督弑其君與夷及其大夫孔父左氏謂華督將弑殤公先宣言謂十年十一戰皆孔父之為先殺之公穀皆謂孔父賢而不名木訥則謂孔父孔子六世祖故不名胡氏曰孔父事殤公無能改於其德然終能死於其難亦可謂賢父者正其名也劉侍讀謂賢而名之者名其君於前不得不名其臣於後滕子來朝滕侯爵而稱子或以為貶或以為謙岷隱曰小國爵尊而貢重者多自貶以從其卑春秋從而書之不没其實也愚按自貶之説晦菴主之以子産之爭為證三月公㑹齊侯陳侯鄭伯于稷以成宋亂夏四月取郜大鼎于宋戊申納于大廟伊川曰宋弑其君而四國共成之天下大惡也岷隱曰書成亂於前書取鼎於後不待貶絶而惡自見先師謂郜鼎郜以祭其祖之器也宋不可取之郜魯不可取之宋左氏曰齊陳鄭皆有賂督遂相宋公秋七月杞侯來朝岷隱曰杞公爵弱而以侯禮至杞公穀皆作紀蔡侯鄭伯㑹于鄧左氏曰始懼楚也木訥曰鄧在南陽逼於楚鄧侯曼姓實女於楚今蔡鄭必有畏於楚而託於鄧也然鄧且不能自保庸能芘蔡鄭乎卒之蔡鄭常當其衝無歲無楚師岷隱曰楚滅鄧復滅蔡鄭亦幾亡然鄭伯牽羊以逆而鄭復存子産執玉帛以抗楚楚亦不能加小國能自强也九月入杞左氏謂杞朝魯不敬此討不敬也木訥曰朝未旋踵兵已入境難哉小之事大也公及戎盟于唐冬公至自唐左氏曰修舊好也然隱嘗與戎盟戎伐凡伯矣今桓公再與戎盟戎何信之有而可云修舊好耶三年春正月自桓三年至九年皆不書王説者謂桓簒弑無王公㑹齊侯于嬴音盈左氏曰成昏于齊也木訥曰桓之娶齊急於得齊以固齊援也夏齊侯衞侯胥命于蒲春秋二百四十二年書胥命者此而已或以為褒則舉之三王之上謂不盟不誓結言而退為近乎古或以為貶則擠之匹夫之下謂不盟不㑹草次以見為近於鄙又有求於褒貶之外者謂齊方伯謂衞連帥兩不相下而胥命或又以為交相推長而胥命然此時齊猶未伯衞又非能連帥之職者木訥謂隱八年齊欲平宋鄭故先與宋衞盟而鄭不從十年齊從鄭伐宋而衞亦從宋入鄭齊衞不過各附其所與實未嘗有怨至桓二年遭華督之禍而衞其所附齊鄭㑹于稷以成宋之亂而宋已附于齊是時衞既願和於齊齊亦欲成好於衞無仇可解何俟乎盟故以交相見而書之曰胥命爾六月公㑹杞侯于郕郕魯地公羊作盛杞侯公穀作紀伯岷隱曰魯嘗入杞杞來求成故㑹于郕甚哉杞之可念也威公之時杞侯來朝歸而見入左氏曰杞不敬也僖公之時杞子來朝歸而見入左氏曰杞不共也杞小來朝豈不敬共良由微弱不能備禮故身雖行禮而不免見伐於人尤可念也秋七月壬辰朔日有食之既杜氏曰厯家謂日光以望時遥奪月光故月食日月同㑹月掩日故日食然聖人不言月食日闕所不見公羊曰既盡也伊川曰食盡為大異公子翬如齊逆女九月齊侯送姜氏于讙公㑹齊侯于讙夫人姜氏至自齊冬齊侯使其弟年來聘㑹于嬴求婚于齊不當親而親非禮也公子翬如齊以逆女當親而不親非禮也齊侯送姜氏于讙越竟送女非禮也公㑹齊侯于讙夫人姜氏至自齊是齊侯送姜氏公受之于讙亦非禮也使其弟年來聘致夫人也由齊侯寵愛之太過亦非禮也卒之二國之亂皆基於此故春秋備書其事有年穀梁曰五穀皆熟為有年公羊曰以喜書也或曰記異愚恐求之過也謂桓不當有年為異而書則螽與大水無氷皆當為桓之常又何為書春秋豈専記人之凶荒而不幸人之豐熟哉各書其實爾四年春正月公狩于郎穀梁曰逺也張氏曰魯之大野乃田狩之地而遠涉郎見桓公心不在民而志於行樂木訥曰郎今之單父魯臺也地近宋昭公九年築郎囿其後遂為田獵苑囿之地盖基於今日之狩天王使宰渠伯糾來聘左氏注謂宰官渠氏伯糾名也公榖謂伯糾字也木訥謂太宰字而不名渠伯糾是也劉氏胡氏張氏皆曰伯爵也糾名也宰天下者不名今名貶也未知孰是木訥又謂王臣下聘者八聘允者獨三允之罪尤著而周之聘尤亟以是知周之自取微弱也杜預曰不書秋冬史闕文五年春正月甲戌己丑陳侯鮑卒左氏曰陳亂再赴也陸淳曰甲戌下脱文木訥曰先儒疑甲戌下有陳佗殺太子免一事蓋明年直書殺陳佗若無張本夏齊侯鄭伯如紀左氏曰欲以襲之紀人知之紀以微國一旦二大國之君無故來朝能無疑乎疑而備之齊侯不得志而歸聖人書之為紀侯大去其國張本天王使仍叔之子來聘仍叔周大夫也仍叔之子父老子代從政也不官未命者也實書而世官若任子弟與輕王命皆可意見仍叔穀梁作任叔木訥謂來聘徴兵也鄭伯不庭王將伐之徴兵諸侯鄭芘於齊魯蒙齊之芘故魯不從而仍叔之子為虚行愚按事勢則有之然亦意之爾𦵏陳桓公使㑹葬故書城祝丘書不時也集注曰莊四年姜氏享齊侯于祝丘是齊魯兩境上之邑也時齊將襲紀魯嘗謀紀之難畏齊之來討城此以備之也秋蔡人衛人陳人從王伐鄭鄭伯不朝天子率諸侯親征從之者三弱國而已又不能無畏齊比鄭之心故不能躬擐甲胄而以微者行胡氏謂戰于繻葛而不書戰王卒大敗而不書敗又以存天下之防也大雩旱祭也書記災也天子雩帝用盛樂謂之大雩魯僣用天子禮樂故大雩春秋書大雩者二十一侍讀劉敞曰説者皆曰成王康周公故賜魯以天子禮樂吾未知其然昔者魯惠公使宰讓請郊廟之禮於天子天子使史角往惠公止之其後在魯實始為墨翟之學由是觀之使成王之世而魯已郊矣則惠公奚請惠公之請也殆由平王以下乎螽書災也夾漈曰古曰螽今曰蝗冬州公如曹張曰州河内地邑名也戴曰州公畿内諸侯嘗為三公伊川曰不能保其國如曹遂不復戴又曰畿内諸侯不能自存此春秋大事故書六年春正月寔來寔州公名來者自曹來魯承上文故簡或曰闕文夏四月公㑹紀侯于成謀齊難也齊欲圖紀紀魯甥也以魯婚於齊故求魯而公㑹之成穀梁作郕秋八月壬午大閲左氏曰簡車馬也注謂備鄭戴氏曰仲冬教兵名曰大閲大閲非諸侯所得為也况以秋八月行之蔡人殺陳佗伊川曰陳佗弑世子而竊位故書曰陳佗陳厲公蔡出也故蔡桓公殺陳佗而立之佗天下之惡人皆得而誅之蔡侯殺之實以私也書曰蔡人見殺賊者衆人之公也九月丁卯子同生同莊公也伊川曰冢嫡生故書岷隱曰春秋十二公惟莊公為嫡長以太子生之禮舉之故得書於春秋冬紀侯來朝左氏曰請王命以求成於齊公告不能七年春二月己亥焚咸丘岷隱曰焚林而田也古者昆蟲未蟄不以火田仲春之月蟄蟲已啓萬物孳生豈容以火田耶劉氏曰咸丘邑也火田而咸丘焚也杜氏以為火田非也禮有火田豈得譏其盡物哉今云焚咸丘豈止火田而已乎公穀皆謂火攻謂咸丘為邾之邑劉氏辨之曰若誠火攻當曰伐咸丘焚之今止曰焚咸丘無兵意木訥亦曰豈有邾邑而不書邾咸丘耶然則因火田而焚咸丘者近之集注曰咸丘魯之近齊者孟子以咸丘䝉所問為齊東野人之語先師謂咸丘即鉅野郎之近地夏穀伯綏來朝鄧侯吾離來朝葉石林曰穀伯鄧侯失地之君也諸侯失地以奔來者書以奔以朝來者書以朝木訥曰穀鄧皆在南陽逼於楚距京師八百里京師至魯又六百里合千四百里之遥其間越蔡越許越陳越曹越宿及邾而朝於魯蓋為楚所逼失地而奔越大小七國而不見容者懼楚也至魯逺於楚而容之故朝於魯以朝禮見故書朝以失地故書名終春秋不復見於經意其滅於此也八年春正月己卯烝穀梁曰烝冬事也春興之志不時也陸氏纂例曰趙子曰周雖以建子為正至於祭祀則用夏時本月以行四時之祭胡氏曰夏數得天百王所同其在商周革命改正示不相沿至於敬授民時巡狩承享猶自夏焉愚意天時無可改易之理聖人無謂冬為春之事商之建丑以異於夏周之建子以異於商皆以革命欲整一人心故以此月為歲首受朝饗耳其建丑之為十二月建子之為十一月固自若也建丑建子之為冬建寅而後為春固自若也聖人作春秋書春正月夏四月秋七月冬十月正以順天時正人事所謂行夏之時見之行事者也周實未嘗改天時孔子亦初非改周制也自漢儒有三正之説杜氏有周正月今十一月之説諸儒遂以春秋之春為今日之冬每於繫時繫月之事隨事生説以為非時而譏之今以夏時參之未見其有非時者若此所書正月烝正以烝乃冬祭春正月行之非禮耳春秋非夏正而何哉杜氏得汲冢書亦皆夏正天王使家父來聘岷隱曰桓公即位八年矣天子之使三至於魯周之無政魯之不臣不亦甚乎木訥則謂家父此來謀紀之婚也愚謂王室弱諸侯强禮之倒置固甚矣然其來聘亦必各以其事魯强無求於周而周弱反有求於魯此其所以下聘之頻歟或譏天子反下謟不臣之諸侯然周之君臣亦何故無為而行此此亦當論其世諒其情也夏五月丁丑烝公羊曰亟也穀梁曰烝冬事也春夏興之黷禮也岷隱曰春正月烝已非時况五月而又烝乎秋伐邾泰山孫氏曰不出主名微者也東萊吕氏曰微者也其事不可得而詳也天子在上諸侯擅相侵伐君子以為無王此春秋所以作也岷隱戴氏曰隱公嘗親伐邾今雖大夫亦不行益卑邾矣其後僖公卑邾而不設備是以有井陘之敗愚按吕之説正論也總論也而戴之説亦其一事之戒冬十月雨雪岷隱曰孟冬之月陰氣始凝驟有雨雪陰氣盛也愚按諸家多以冬十月為今之八月雨雪非時今岷隱以夏正冬十月言之理亦未嘗不明嘻果八月也聖人恐未必誣天而書秋為冬也祭公來遂逆王后于紀劉氏權衡曰天子娶后當使同姓諸侯主其辭命祭公逆后于紀使我主其禮也岷隱曰祭公至魯遂往逆后此天王之命非祭公自為之紀魯甥也咨謀於魯而行木訥曰齊將滅紀紀託於魯魯勢不能芘紀於是為之謀俾納女於王託王為重焉蓋自五年齊欲襲紀紀懼求魯六年㑹于郕秋又來朝今春家父來聘則謀婚也今祭公來因不反命而遂逆王后齊侯繼此不復犯紀僖公没襄公始滅紀納女亦延紀數年愚按劉以禮言戴以情言趙以事勢言可以參考過於諸家之專主譏詆者九年春紀季姜歸于京師此祭公所逆王后也岷隱曰方其逆也稱曰王后自王命言之也及其歸也謂之季姜由父母家言之也夏四月秋七月書以備四時冬曹伯使其世子射姑來朝杜氏注曹伯有疾故使其子來攝胡氏曰曹何急於朝魯而使世子攝哉木訥曰使不幸未還而曹伯卒則國非其國也十年春王正月曹伯終生卒夏五月葬曹桓公泰山孫氏曰此年復書王者王無十年不書也夾漈鄭氏曰桓公立五十五年卒而莊公射姑立五月而葬得葬也秋公㑹衛侯于桃丘弗遇衛自宣公即位未嘗與魯通至是為㑹期而終背公更與齊鄭故弗遇桃丘衞地愚意郎之戰兆此冬十有二月丙午齊侯衞侯鄭伯來戰于郎鄭忽有功於齊而魯為班後鄭鄭怒請師于齊齊以衞師助之安定曰言來戰者不予三國加兵於我也戴曰主兵者鄭也而首齊齊以鄭故忘婚姻之好合師來伐也十有一年春正月齊人衞人鄭人盟于惡曹三國既來戰又為此盟以謀魯木訥曰其後齊僖鄭莊衞宣皆至死不復通於魯則斯盟固矣夏五月癸未鄭伯寤生卒七月葬鄭莊公九月宋人執鄭祭仲突歸于鄭鄭忽出奔衞鄭莊公立四十二年卒初娶鄧曼生世子忽又納宋雍氏女生庶子突莊公卒忽嗣立是為昭公宋莊誘鄭權臣祭仲執之使廢嫡立庶於是突入而忽出奔伊川曰忽國氏正也不能有其位故不爵突不稱公子不可以有國也愚按鄭莊伐王大逆不道身死國亂者二十五年柔㑹宋公陳侯蔡叔盟于折柔大夫之未命者蔡叔蔡侯弟也岷隱曰桓公方與齊衞鄭為仇遂求宋陳蔡為好而使大夫盟其君可乎木訥曰内大夫專伐自無駭始内大夫專盟自柔始公㑹宋公于夫鍾冬十有二月公㑹宋公于闞木訥曰突以不義而簒其兄宋以不義而責其賂魯桓屢為㑹欲平之而宋不從宋莊固小人允亦不自量矣允嘗賂鄭許田以求定位又嘗受簒逆之賂器於宋安能使宋不求賂於鄭耶石氏曰此年至明年公凡五㑹宋欲平宋鄭而宋卒不從故明年與鄭盟武父而冬與鄭伐宋愚謂鄭忽嘗求齊伐魯今突入鄭而忽出奔故魯桓拳拳黨鄭者欲固突而拒忽爾夫鍾郕城公羊作夫童十有二年春正月書春正月以存四時之始夏六月壬寅公㑹杞侯莒子盟于曲池隱公四年莒伐杞取牟婁自是遂不平莒杞皆魯東鄰故為盟以平之曲池魯地公羊作毆蛇杞公穀皆作紀秋七月丁亥公㑹宋公燕人盟于穀丘宋既執鄭祭仲使立突責鄭賂不已魯又為此盟欲平之燕南燕穀丘左氏於傳又作句瀆之丘乃鄭所取故戴之國㑹于此蓋俟鄭而鄭不果來也先師嘗言宋鄭無可平之理魯桓非能平之人八月壬辰陳侯躍卒躍厲公也蓋佗之子立七年卒初桓公死子免不得立而弟佗簒之今厲公死子完又不得立而弟林代之公㑹宋公于虚冬十有一月公㑹宋公于龜丙戌公㑹鄭伯盟于武父于穀丘于虚于龜公皆就宋地㑹之宋猶不從故與鄭盟謀伐之丙戌衛侯晉卒再書丙戌杜曰國史成文也孫泰山胡安定皆曰羨文也鄭夾漈曰丙戌一日也不應再書丙戌非後申則前子衞侯晉者衞宣公也立十九年卒晉殺伋壽而立朔國人出朔而立黔牟十有二月及鄭師伐宋丁未戰于宋魯五為㑹欲為鄭平宋而宋不從魯鄭所以不平而連師伐之戰于宋者魯鄭深入伐之而宋應之故戰耳諸家以既書伐又書戰言褒貶者不一愚恐聖人亦書其實爾十有三年春二月公㑹紀侯鄭伯己巳及齊侯宋公衞侯燕人戰齊師宋師衞師燕師敗績左氏以為鄭與宋戰公羊以為宋與魯戰穀梁以為紀與齊戰胡公安國以為齊合三國以攻紀魯鄭援紀而與之戰劉侍讀以為前年我師及鄭伐宋故宋今歲來報怨蓋以經文先止書㑹鄭紀次書及之戰者四國而不書戰之地故諸説各得為之辭孫泰山胡安定則皆謂齊以郎之戰未得志于魯今因宋鄭之仇故帥衞燕與宋來伐魯魯親紀而比鄭故㑹紀侯鄭伯以敗四國之師不書地戰于魯也此説視衆説尤明白愚按此役用師者凡七國魯紀鄭為一黨而魯為之首若紀則懼齊欲滅紀者也若鄭則怨宋責賂於鄭者也魯則紀其自出鄭其所黨故書曰公㑹紀鄭此魯為首也齊宋衛燕為一黨而齊為之首若齊衞於魯則有戰于郎之怨若宋於魯則有戰于宋之怨若燕則比宋興兵謂魯穀丘之盟為不信而齊則欲滅紀又德鄭忽而助忽攻突且怒魯之屢盟以平突是齊於魯紀鄭皆有憾故書齊為主兵此齊為首也三月葬衞宣公衞惠公先從齊伐魯而後葬宣公夏大水書災秋七月冬十月書備四時十有四年春正月公㑹鄭伯于曹岷隱曰魯隱與宋為怨故一意與鄭為好木訥曰鄭突之立雖以宋宋責賂不已而憾之所與者魯而已前年因魯敗宋德魯益深故今春㑹公夏又來聘同惡相濟舍魯無可求援也㑹于曹杜氏謂曹預㑹集注謂鄭伯欲結曹好故公往㑹之也無氷諸家皆以周之正月為今之十一月十一月無氷為災故書然使果十一月無氷則尚有十二月尤寒氷之有無方於此决未可遽以十一月無氷為災而先書之也蓋至十二月無氷及春正月東風解凍終於無氷則無氷决矣始以災而書爾杜氏曰無氷書時失也岷隱曰詩曰二之日鑿氷冲冲三之日納于凌陰二之日今十二月三之日今正月也十二月取氷正月藏之今桓公春書無氷無藏氷也去年十二月時燠無氷今年之春無氷可出春秋於是時而書之以此考之則春秋之正月殆即今之正月歟夏五穀梁謂夏五傳疑也胡氏謂疑而不益見聖人之謹也孫泰山胡安定皆曰聖人専筆削豈不能刋正後人傳之脱漏耳胡又曰或言夏鄭伯使其弟語來盟其五之一字為羡亦通愚按合從傳冩脱漏之説鄭伯使其弟語來盟木訥曰鄭突之立内恃祭仲而已國人不與也外恃魯而已鄰國不與也使其弟來盟或者諸大夫不心乎突也語穀梁作禦秋八月壬申御廪災乙亥嘗御廪藏粢盛者也嘗秋祭也御廪災三日而嘗左氏謂書不害也公羊乃謂遇災不如勿嘗劉氏辨曰見災而懼可矣豈可廢宗廟之祭穀梁又謂以災餘者祭為不共夾漈辨之曰廟祀必十日戒享越三日而嘗則粢盛已出廪乙亥嘗非災之餘也嘗常事不書為御廪災而嘗故書諸家乃以八月為六月謂夏不當行秋嘗而譏之不知嘗以秋八月此正可為春秋用夏正之驗何紛紛為冬十有二月齊侯禄父卒禄父僖公也立三十三年入春秋者二十五年子襄公諸兒嗣立按僖公倡參㑹為胥命黨鄭以叛王陵紀以讎王稔宋鄭之爭囂然有圖大之心而才不及適為擾而已宋人以齊人蔡人衞人陳人伐鄭左氏曰宋以諸侯伐鄭報宋之戰也木訥曰勢不敵者資於人宋於鄭非不敵也乃連五國之兵以伐之且出忽立突者誰歟已立之而已疾之不仁哉宋莊也十有五年春二月天王使家父來求車左氏曰非禮也諸侯不貢車服泰山孫氏曰諸侯貢賦不入周室財用不足也愚謂天子錫諸侯以車今至無車而反求之諸侯可悲矣三月乙未天王崩桓王也入春秋三年而立立二十三年崩嘗因鄭莊無禮而伐之繻葛一敗周益以衰既崩而喪禮不備七年乃葬可悲矣太子佗立是為莊王夏四月己巳葬齊僖公自十二月卒至今五月而葬五月鄭伯突出奔蔡祭仲專突使其壻雍糾殺之泄突乃出奔書伯後得鄭也書名公羊謂奪正也愚謂突忽並爭不書名何以别鄭世子忽復歸于鄭書世子書復歸正也然始見逐終見殺故不成其為君許叔入于許隱十一年鄭分許使許叔處東偏今鄭莊没而鄭亂故許叔得入許蓋許之失國者十有五年公㑹齊侯于艾左氏曰謀定許也先師嘗言初與鄭入許者齊魯以許與鄭者亦齊魯今謀定許者又齊魯齊魯二君非能蓋前人之愆魯本與突許實怨鄭定許所以撓忽也木訥曰自郎之戰齊不通魯齊僖卒魯㑹𦵏襄公立㑹于艾齊復通彭生之禍始此艾穀梁作蒿公羊作鄗邾人牟人葛人來朝皆附庸也旅朝諸侯事天子之禮魯不當受旅朝秋九月鄭伯突入于櫟音厯夾漈曰櫟鄭别都左氏載突因櫟人殺檀伯遂居櫟二年而昭公弑又一年而子亹殺至莊十四年使人説傅瑕殺子儀而自櫟入鄭是為厲公冬十有一月公㑹宋公衞侯陳侯于袲伐鄭袲昌氏反袲宋地公羊作侈左氏曰將納突弗克而還十有六年春正月公㑹宋公蔡侯衞侯于曹夏四月公㑹宋公衞侯陳侯蔡侯伐鄭秋七月公至自伐鄭去年冬伐鄭納突未克今再納突也納突非正也伊川謂突善結諸侯故皆為之致力王氏曰突之未出也宋欲有所責故嘗伐之突之既出也宋懼無所得又欲納之始鄭不和魯嘗以鄭伐宋及突既出魯又與宋伐鄭反復皆私也左氏曰書至自伐鄭行飲至之禮也伊川謂以見勤勞於鄭突冬城向失亮反左氏曰書時也謂城以冬也自漢儒言三正而公羊杜預謂周之冬今之秋諸家遂一變其説反以為譏非時不知周之改正不過以建子之月行朝饗之禮以示不沿商耳天之四時豈可改也哉天豈以周建子而改冬為春也哉向木訥謂隱二年莒所入之向也計其後為莒所滅地在魯莒境上故城之魯莒之爭自城向始十有一月衞侯朔出奔齊朔立四年左右公子惡其嘗䜛伋壽殺之故逐之而立黔牟立八年而齊襄納朔衞凡亂十有五年乃定公羊謂朔得罪於天子張氏疑公子因而逐之十有七年春正月丙辰公㑹齊侯紀侯盟于黄黄齊地盟者為紀平齊也齊之圖紀於是十有二年矣魯為紀納后於王故紀雖從魯鄭敗齊而齊僖不敢報怨齊僖猶畏義也僖公卒而襄公立春與魯盟于黄夏與魯戰于奚齊且無魯豈為魯存紀故紀卒為齊所滅二月丙午公㑹邾儀父盟于趡翠軌反趡魯地左氏曰尋蔑之盟也岷隱曰隱公初與邾盟于蔑其後躬自伐邾桓公今與邾盟于趡未數月即與宋衞伐邾木訥曰儀父必有不心服乎桓者故秋有及宋衞之伐愚按邾本魯附庸魯不能撫服之故終春秋列於邾諸侯與魯迭勝負五月丙午及齊師戰于奚不書夏闕文也穀梁有夏字奚魯地穀梁作郎左氏謂戰者疆事也六月丁丑蔡侯封人卒秋八月蔡季自陳歸于蔡夾漈曰蔡桓侯立二十年卒無嗣國人召其弟于陳而立之是為哀侯獻舞杜預曰獻舞即蔡季也惟何休稱蔡侯欲立獻舞而疾季季避之陳蔡侯卒季歸奔喪無爭心好事者遂比之季札形容備至謂字之者賢之也是季與獻舞為二人胡安定曰蔡季者蔡桓侯之弟弟季當立歸者善辭也時多弑奪明季無惡字者諸侯之弟例書字然則季即獻舞而安定之説為平癸巳葬蔡桓侯春秋葬而書侯者惟蔡桓故多異説或曰獨請諡於天子故以本爵也或曰葬皆稱公此獨稱侯文之誤也惟安定曰爵稱侯正也及宋人衞人伐邾左氏曰宋志也注曰邾宋爭疆魯從宋志背趡之盟冬十月朔日有食之不日缺文十有八年春王正月公㑹齊侯于濼公與夫人姜氏遂如齊夏四月丙子公薨于齊丁酉公之喪至自齊秋七月冬十有二月己丑葬我君桓公濼盧篤反又音洛左氏載公將與姜氏如齊申繻諫不聽如齊齊侯通焉公謫之以告齊侯誘殺公春秋此年始終惟詳書此事戚之也辭雖婉而跡自著姜氏蓋預弑傳稱桓公預弑隱公而立其既立也成宋之簒亂而納郜鼎因杞之來朝而入杞國天王之來聘者再而未嘗遣一介之使如京大雩大閲僣也焚咸丘伐邾不仁也不及隱公之賢多矣三年娶于齊十年因為班後鄭鄭忽有功于齊請齊伐魯與齊戰于郎婚姻之誼幾絶自齊僖公卒而襄公立十五年魯復㑹齊于艾十七年雖有奚之戰十八年再㑹于濼姜氏與齊襄有禽獸之行桓公竟見殺于齊此桓公始終之大槩也其間㑹宋公陳蔡以圖糾合乎其大盟杞侯莒子以圖糾合乎其小右不正之鄭突平宋鄭之交兵六求宋而不得一轉而與宋仇雖志在諸侯而發不以正徒擾擾爾黄氏日抄卷七
