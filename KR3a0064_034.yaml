body:
  text: 黄氏日抄卷三十四宋黄震撰讀本朝諸儒理學書二晦庵先生文集一詩賦桂林虞帝廟樂歌迎之章三一章思其所安在而後迎送之章三一章極其所徃而猶思文法髙妙語意無窮其曰𣺌冀州兮何有而應之曰暢威靈兮無外慨然斯世之意所寄焉者也白鹿洞賦一章言唐李渤讀書舊地而南唐因創書院二章言自太宗真宗増闢而廢於熈寧三章言今日之再造四章言講學之要領而亂之以徳業無窮之思感春賦空洞賦皆用騷體而無其愁思寄興悠逺矣招隠操葢謂淮南小山初作本招隠者而使之仕後世皆失此意故再為申其㫖又為反招隠言道誼自得之樂時止時行無入而不自得也逺㳺篇指要在願子馳堅車之句誦佛經詩云聊披釋氏書結之曰了此無為法身心同晏如又讀道書詩終朝觀道書繼之曰於道雖未庶已超名跡拘先生之博覽旁通盖如此然有先生之識則可無先生之識則惑也且此皆初卷詩多少年時所作晚嵗論語集序自悔昔者吾㡬䧟焉豈謂此時此類與不然先生他日謂昌黎自說與大顛交此是昌黎平生死案何嚴也近世流弊浸滛凡言吾儒者多隂用異端之說甚者昌言異端之不可廢而自貶吾儒之不及恐又誤指先生初年之詩為證故書至日詩自叙頃以多言害道絶不作詩而詩末句云行迷亦已逺及此旋吾輈此悔心也然以先生晚年之學謂漫辭為虚費工夫則可若言以明道雖多何害耶仁術與文善决江河詩全用進士省詩軆西林再題謂向来妙處今遺恨萬古長空一片心此亦非先生晚年之學汲泉漬竒石詩末句云慨然思古人尺璧寸隂重觀詩至此唤醒多處梨名快果注云出本草黄雀鮓詩坐以食稻果之罪盖戯為口腹觧嘲耳豈亦有所指而言之耶感興詩二十首轉陳子昂自託仙佛之髙調而為切於日用之實一章言伏羲肇人文皆造化自然之理二章言隂陽無始謂鑿死混沌者為妄三章言人心與造化通惟至人能軆之四章言不能軆造化者為形役五章言周衰已乆孔子作春秋而司馬公乃責後世封大夫為諸侯非先見六章言漢衰獨孔明伸大義而帝魏之失當革七章言唐啓土不以正而致賊后之簒賴范太史聲其罪八章言隂陽常倚伏當軆陽復之端九章言北辰居其所當軆為人心之要十章言聖人刪詩定書皆以敬為傳心之本十一章言伏羲仰觀俯察以立象十二章言六經無傳而程氏作十三章言顔曽子思孟子傳有要領十四章言元亨利貞之動静以誠為主十五章言學仙者逆天偷生十六章言佛論緣業而繼之者談空虚十七章言育材失其道十八章言作聖當自早十九章言仁義之心當守二十章言文辭之弊當除卜居喜雲谷之成六經說命篇始有學字見奉答景仁詩注拜張魏公墓下自此皆訪南軒登南嶽之詩凡五十三首既别而歸沿途凡九十四首既歸懐南軒者復數詩觀洪遵雙陸譜詩云近從新譜識梟廬擬唤安陽舊慱徒只恐分隂閒裏過更教人誚牧猪奴盖用陶侃樗蒲者牧猪奴戯之語譏之深矣頃余㑹京口有蜀人袁象澦舉林和靖語云平生所不能檐矢與圍棊余因謂博之與弈其廢時亂日一也吾夫子云為之猶賢乎已者正借無益之事以甚言無所用心之為害非真謂愽弈之猶可為也陶威公與林和靖之説殆天生自然之對因合之為四句曰雙陸牧猪比圍棊擔矢同二公皆妙語千載仰髙風繼又反之為四句曰牧猪滋畜飬擔矢溉禾蔬博弈何為者猶疑反不如公濟勉以教外之樂先生答詩云如云教外傳真的却是瞿曇有兩心就渠所嗜處唤醒此納約自牖之義也愚平生謂禅學為異端之異端鑿空無據自號教外正其自納敗缺處然未有可余之說者今見先生詩庶以自信雲谷諸詩先生寫幽居自得之樂其云天道固如此吾生安得寧自言不息之功如此幽居云乎哉聞雷詩誰将神斧破頑隂地裂山開鬼失林我願君王法天造早施雄斷答羣心讀之令人感動豈為龍大淵軰𤼵耶南康徃囬詩其出㳺南康之陽白鹿洞折桂院李逄吉讀書處李氏山房李公擇讀書處棲賢院西澗臥龍庵武侯祠萬杉寺天聖㫖禁剪伐開先寺簡寂觀歸宗寺陶公醉石温湯康王谷水簾落星寺其歸㳺山之北圎通寺石門寺天池院佛手岩天池院有清燈處先生親見光景明滅隨刻異状東林西林白蓮池在東林太平興國宫慧逺取孔老言著沙門不敬王者論明皇謂見九天使者降因立此宫訪濓溪宅講太極圗而别同游者㳺白鹿洞詩云不及揚李覇謂南唐興書院事武夷精舍詩武夷溪九曲多湍激獨第五曲平廣而最深大隐屏臨其上屏下兩麓相抱先生淳熈癸卯卜築其間堂曰仁智堂左曰隐求右曰止宿左麓之外復引而右抱為塢曰石門别爲屋其中曰觀善齋以居學者石門之西少南曰寒棲館以延道流觀善前山之顛為亭囬望大隐屏曰晚對東出臨溪為亭曰鐡笛而緫扁麓之口曰武夷精舍釣磯茶竈皆在大隐屏西溪左右皆石壁無側足之徑又為漁艇以濟出入各賦一詩凡十二篇又别為櫂歌十章詠九曲云古之蕙即今所謂零陵香出秋華詩注第十卷詩多致仕後作樂府附焉封事奏劄講議壬午應詔封事孝宗初即位詔云朕躬有過失朝政有闕遺斯民有戚休四海有利病並許直言先生謂聖躬雖未有過失而帝王之學不可以不熟講盖言御簡策不過諷誦文辭求大道不過留意老釋也謂朝政雖未有闕遺而修攘之計不可以不早定盖言金人乃不共戴天之讎而講和則無一可成之事也謂四海之利病繫於民生之戚休民生之戚休繫於守令之賢否而本原之地在乎朝廷言不自朝廷擇監司以察州縣雖今日降一詔明日行一事欲以恵民而適増擾欲以興利而適重害也末復獻說以為此正所以仰承太上皇付託之意願緫紛更之疑庚子應詔封事謂國之大務在恤民恤民在省賦省賦在治軍其本又在人主正心術以立紀綱而歸極於一二近習得以賣債帥之弊其言哀痛切至貼黄乞至御前開拆戊申封事退朝後屢詔不起而以書對也謂大本在陛下之心急務在輔太子選大臣振紀綱變風俗愛民力脩軍政六者而六者之未理皆原於此心一念之私隨事注釋以期於必感悟且闢老釋管商之說終之曰嵗月逾邁如川不返不惟臣之蒼顔白髪已廹遲莫而竊仰天顔亦覺非昔矣讀之令人揮涕按先生上續孔孟講明帝王之學遭值夀皇英明不世出之主而三上封事皆堕空言其言婉切明盡盖自漢至今能言治道之士莫之能尚而當時曽不聞有賞異之者扵是異端浸滛之患為可畏而先入之說為主有非可旦夕觧㦯者潜藩輔徳之舊必有任其責者矣己酉擬上封事此光宗受禪之初也講學以正心修身以齊家逺便嬖以近忠直抑私恩以抗公道明義理以絶神姦擇師傅以輔皇儲精選任以明體統振綱紀以厲風俗莭財用以固邦本修政事以攘夷狄凡十事各盡一陳而緫序其意甲寅擬上封事此光宗違和之後専指乆不過宫之事明以父子天性之說癸未奏劄其一勸講大學其二勸絶和議其三勸以修徳業正朝廷立綱紀辛丑奏劄其一勸以災異求言其二勸以正心任賢其三勸以浙東救荒乞撥錢米住催官物等數事其四乞五斗以下小户免撿放塲著為令及行建寧社倉之法其五乞寛紹興府和買其六乞減星子縣稅錢其七乞給白鹿洞勅額戊申奏劄其一論刑以弼教乞獄訟先論尊卑其二論清庶獄任選官乞州獄専注關陞人其三論經緫制錢乞先将災傷年分盡依分數豁除其四論江西科罰乞令帥臣措畫其五論二十七年未有寸效以天理有未純人欲有未盡甲寅行宫奏君臣父子經權之誼以勸寧宗委曲感悟光宗其二論讀書窮理其三論湖南重賦其四論邵州寨栅其五論潭州城壁乞進徳劄勸以湯武反之之功乞進講劄勸不間寒暑假故日分乞㸔詳封事乞瑞慶莭不受賀經筵留身四事其一勿葺東宫其二盡禮過宫其三不聼左右其四山陵改卜論災異劄因都城黒煙乞修徳論喪服劄因太上違豫乞承徳乞修三禮劄欲關借祕省禮樂諸書經筵進講大學止誠意章大略與章句或問同惟關繫人主身上處更覆懇切至如惡惡臭如好好色直以為好善惡惡之真恐只是𤼵於必然之實意無自欺耳如乍見赤子将入井皆是舉一以槩真心之發見當以後来者為正祧廟議異於禮官之議者三禮官欲以太祖居第一室今議以僖祖擬周后稷居第一室用順太祖尊祖之心禮官欲以僖祖以下者居夾室今議以宣祖以下者居夾室謂以子孫祔於僖祖則爲順不可轉以僖祖反祔於子孫禮官欲一世為一室兄弟代立者同一世今議以一帝為一室以太祖太宗仁宗髙宗為世世不祧在七廟數外而祧真宗英宗又謂以僖祖為始祖之廟議雖出於王安石為司馬公所非而程頥實主安石之說山陵議謂納音坐丙向壬之說非禮經𦵏北方北首之義而紹興地淺氣洩當尋富陽臨安等縣南康諸狀乞減星子縣稅及因旱乞截留綱解倚閣官物奏補賑濟人户告身及乞賜白鹿洞書院勑額及頒降九經浙東諸狀乞撥㑹子度牒救荒給降賑濟告身減丁錢住催官物捕蝗大者每斗百文小者每升五十文廵歴諸州每州復奏事宜次年洊饑乞悔過謝天責躬求言盡出内庫助費詔户部催理舊欠乞住催云輸納而後賑恤猶割肉㗖口謂蘇軾言熈寧荒政費多無益以救之遲故也謂修水利費短利長到嵊縣用錢三十文糴稗一升繳進乞修黄岩堰閘謂水利修則黄岩可無水旱之災黄岩熟則台州可無飢饉之苦乞減紹興和買謂浙東惟温州無和買餘六州共二十八萬一千六百疋有竒而紹興獨當十四萬六千九百有竒而㑹稽縣元科納一疋者今二疋半縁立法之初先支見錢漕臣私扵越而又復私扵㑹稽故所抛獨多而貽害如此今欲去紹興和買之弊而不先減當日請本之額如負千鈞膂背不堪不減所負之物但移而寘之懐䄂必無益矣乞減塩酒義役欲行二稅塩萬户酒皆福建法也義役則謂處州預排者有害欲依山隂置田助當役者而不預排按唐仲友六状始行以丞相王淮之庇也道誼之不敵勢利如此守漳州奏減折茶錢龍眼荔枝乾錢豐國監鑄不足鉛本錢趙不敵所増無額錢大略謂官吏無状避罪希賞不能仰體聖朝愛民厚下之本意不顧郡計之盈虚民情之苦樂既已増立虚額扵前而又強為登足扵後不過因民之訴訟而科罰之甚則誘人以告訐而脅取之條奏經界先乞擇官次乞户部給紹興打量攅筭印本次乞圗帳書筭官為出費次乞通縣均紐次乞官田槩量而辰戍丑未年更簿次乞召買廢寺田産乞褒錄髙登其人嘗同陳東上書後為静江古縣令不肯為秦檜父立祠為潮州試官論直言不聞之可畏策閩浙水沴之所由檜益怒削官貶死容州申請自為同安簿即申學校及昬禮等事為南康申造甲不可為例増種麥徒相為欺新寨合廢石堤合脩軍治不可移湖口縣而建昌星子縣不可改𨽻江州木炭乞免折價謂農桑家有木無錢而畸零絹不可折錢反重及乞定五禮乞祀泗水侯孔鯉乞加封陶威公侃且述劉羲仲吳澥論賛辨夢登天折翼之誣論督責稅賦狀督責二字考之前史則韓非李斯惨刻無恩詿誤人主之術非仁人之所忍言也慮傷治體不敢奉行差役利害狀朝廷罷支耆户長錢以充經緫制而此等重役遂一切歸保正長經界申状鄭昭叔知僊遊縣丞經界行移覃思數日洞曉以告同官使洞曉又使保正長無不曉然後打量兩月而辦湖南飛虎軍辛弃疾剏置後改𨽻襄陽相去千二百餘里非便二十二二十三卷皆辭免状自初乞嶽祠至乞致仕書與鍾户部論經緫制欠錢謂民所不當輸官所不當得制之無藝而取之無名自户部四折而至扵縣不過巧為科目而取之民是時先生方為同安簿領而憂天下如此與李教授及陳宰書皆言贍學錢州縣得通用與黄樞宻書謂逆亮之死正當以為憂與陳漕論塩法謂福建上四州嵗運一千萬斤而漏落者何啻數百萬斤欲罷海倉及下四州諸縣之買納使客人請引南自漳泉北至長溪從便徑就埠户買販可増至千五百萬斤愚恐此事不可盡利以遺後害也豈先生偶未之思耶他日與趙子直書云欲明申恐増賦當以此說為正與陳侍郎書謂主講和而有獨斷而有國是二者大患之本賀陳丞相書謂一日立乎其位則一日業乎其官一日不得乎其官則不敢一日立乎其位繼此所與書皆責之之語矣與汪尚書書謂省闈主蘇氏貢舉議為未知講求他日不可施於天下又書謂吕申公家一二議論悖理而明公篤信之繼此所予書亦皆責之矣答張敬夫書論復讎之名義又書論将帥屯田及帥司團教為勞費強盗枉法殺傷犯奸從人皆死為太過又書請力為君相言問學又書言孟子一書最切今日而以財用之柄屯田之議今日養成無出此二者與胡守等書論荒政與吕伯恭書謂向見吾兄扵儒釋之辨不甚痛說又書論出處謂欲葺文字以待後世與韓尚書龔叅政陳丞相等書皆論出處痛快語也與史丞相等書皆力求歸與皇甫帥書言湖廣之㓂當募土人討之與丞相書乞為白鹿洞宫云與其崇奉異教香火為名而無事以坐食不若修祖宗令典使以文學禮義為官而食其食之為羙與南康諸縣議荒政書謂由軍而縣方能推以及民上宰相書謂以荒政之急為緩自古國家傾覆之由何嘗不起於盗賊盗賊竊發之端何嘗不生於飢餓今朝廷愛民不如惜費之甚明公憂國不如愛身之切其言苦至所當成誦與趙帥子直書論舉子元令兩鄰附籍未為便當今有孕五月即四鄰先取本家乞附籍状又書乞免起精舍又書言福建賣塩事欲申明則恐増賦答林澤之書論汀寇事當奏劾官吏致變者以謝其人倚閣錢物以慰人心不致響應即募土人捕之而禁軍决是無用與陳福公書謂憂在天變地動而境外事不預焉與陳丞相書謂易不易讀且讀詩書論孟與史太保書責以變異重仍而不發一言又書勉以勸主上求言答詹帥書戒以勿刋諸經說又言先儒經觧不以已姓名加經上又書謂浙中恠論百出頗自附於伯㳟又謂科舉業伎俩愈精心術愈壊答陳同父書奉告老兄且莫相攛掇留取閒漢在山裏咬菜根了却㡬卷殘書又書云世間事思之非不爛熟只恐做時不似說時人心不似我心孔子豈不是至公血誠孟子豈不是麤拳大踼到底無著手處愚竊意麤拳大踼必就用陳同父来書中語然以此形容孟子亦不害其為救世之精采也與張元善書自言平生辭官只是兩事一則分不當得二則私計不便若是本等差遣力之所能堪豈有不受之理又載虞丞相除蕭果卿御史蕭曰彼見吾憒憒謂我不能言而以是處我也其輕我甚矣首論其黨遂併攻之論者服其勇云與黄仁卿書請祠事云亦似不必如此隨分仕宦不起患得患失之心何處不是安地與趙帥書言招填禁軍緩急何足恃賴正當别作措置以漸消除又書言拘集海舡事差官㸃視即時放𣪚令於界内漁業不得拘留與留丞相諸書極言漳州失經界及朋黨事又云朝士有不願為忠臣之說恐不得為興邦之言也愚謂魏徴忠臣也故可自言不願若他人不願是甘為佞臣非欲尭舜其君直諛其君為尭舜而已此說真不可不以為戒又按晦翁漳州經界為吳禹主一人之訴而罷與趙帥書極言之與趙尚書書謂無可用之才出門墻又書謂改更學校之政為閒慢及趙為丞相又責以祧廟非禮於答黄仁卿書稱趙乃謂韓是好人今日弄得朝廷郎當自家亦立不住盖時趙已罷相矣初先生貽趙書謂任天下事當自格君心之非始而格君心又當自身始最後謂今而後知丞相大不相知然則趙雖賢相先生後亦因國論而踈他何望焉若其與留丞相書直責其聼邪言罷經界决不復為之用與楊子直書謂喻於義為君子喻於利為小人而近年一種議論乃欲周旋於二者之間回互委曲費盡心機答汪尚書諸書論前軰於釋氏未能忘懐則以身譬之而誘以求所安之是非其辭婉甚及論兩蘇與王氏異同則以孟子天討明之謂王氏僅足為申韓儀衍蘇氏學不正而文成理其弊又不止楊墨其辭甚嚴盖釋氏人皆知其為異端心自習熟而嚮之故使人心反思其是者之是安蘇氏聲名文學震動一世未嘗有以為非故非峻辭以闢之則人莫悟也程子謂髙祖有服不可不祭雖七廟五廟亦止扵髙祖雖三廟一廟亦必及扵髙祖但䟽數不同耳宋公以外祖無後而嵗時祭之先生謂不若為之置後與張南軒諸書謂胡氏改姪字稱猶子未安謂節祠當隨俗但不當用此廢四時之正禮謂伯恭漸釋舊疑盖佛學也又謂其日前只向駮雜處用功又出入蘇氏新巧壊心謂明道之言通透灑落渾然天成伊川之言質慤精深可奪天巧謂以敬為主則内外肅然不忘不助而心自存不知以敬為主而欲存心則不免将一箇心把捉一箇心外面未有一事裏面已不勝其擾擾儒釋之學只於此分如云常見此心光爍爍地便是有兩箇主宰不知光者是真心乎見者是真心乎他日先生與汪尚書又謂不學不思而坐待忽然有見就便僥倖於恍惚之間亦與天理人心叙秩命討之實了無干渉自謂有得適足為自私自利之資此則釋氏之禍横流稽天而不可遏有志之士隐憂浩嘆而欲火其書也愚按論佛教之害政古惟一昌黎論佛教之害人心今惟一晦翁害政之迹顯而易見害人心之實隠而難言故闢佛者至晦翁而極論春秋正朔謂加春扵建子之月愚謂此說尚當考訂古今三統各以其時受朝貢可也四時有定春實在寅而移加扵建子之月於義何居且豈所謂行夏之時者耶答張南軒云漢儒可謂善說經者不過只說訓詁又云觧經但可畧釋文義名物而使學者自求之又自云傷急不容耐之病苦未能除若得伯㳟朝夕相處當得減損又云子夀兄弟氣象甚好盡廢講學而専務踐履於踐履中要人悟得本心此為病之大者夜氣不足以存不是存夜氣是存心與南軒論癸巳論語說一一䟽駁其未然愚按南軒多是統說大體又多扵本意上生新意晦庵則分文釋句只依本意而使學者自得之以南軒髙明若此今為晦庵所䟽駁猶未可安况新學晚生不經師匠而可自是其說者乎晦翁之盡言南軒之受益皆後學所當自反而以兩說叅訂可使人長一格尤宜詳味也答南軒論良心𤼵見處謂即日用之間渾然全體如川流之不息天運之不窮而鳶飛魚躍觸象朗然論心性情之别謂情根乎性而宰乎心中節不中節之分特在乎心之宰不宰而非情能病之又謂盡心知性知天孔子謂天下歸仁者也存心養性以事天顔冉請事斯語之意也又謂有天地後此氣常運有此身後此心常發要於常運中見太極常發中見本性又謂理之至當不容有二若以必自巳出而不蹈前人為髙則是私意而已又論仁謂仁者生之性愛其情孝弟其用公者所以軆仁上蔡所謂知覺只是智之𤼵用處謂仁者心有知覺則可謂心有知覺為仁則不可又論未𤼵之㫖謂思慮未萌而知覺不昧是静中動事物紛糾而中莭不差是動中静答東莱書来教謂吾道無對不必較勝負恐吾道中着不得許多異端邪説學校之政名存實亡徒以䧟溺人心敗壊人心不若無之為愈論說左氏亦頗傷巧恐後生傳習重為心術之害精騎恐誤後生讀書愈不成片叚人心至靈只自家不稳處便湏有人㸃檢外事十損四五矣但恐宻切處不似外事易謝絶清議二字記是劉元城語答東莱書謂佛老文字賛邪害正者雖工不可取文海廬阜竒處盡在山南南康作劉凝之庵以俸給不應得者為之凡此隨俗漸乖宿心子静近却說人湏讀書講論但不肯翻然説破今是昨非之意子静約秋凉来逰廬阜渠兄弟豈易得但子静似猶有些舊来意思囬思鵝湖講論時是甚氣勢今何止十去八耶子夀之亡極可痛惜近得子静書云已求銘扵門下属某書之此不敢辭子静到此數日講論比舊亦不同又云子静舊日規模終在熹因與説渠雖唯唯終未窮竟答東莱書謂學者推求言句工夫常多㸃檢日用工夫常少明道箴上蔡慱記為玩物渠一向掃蕩明道言當與元豐大臣共政此非權譎茍以濟事然亦湏有明道廣大規模和平氣象誠心感人然後盡其用耳范公雖不純師程氏觀其辨理伊川之奏豈盡以東坡為是横渠墓表出扵吕汲公溺扵釋氏非深知横渠者為學之序為已而後可以及人逹理然後可以制事答劉子澄書聖賢立言本自平易今推之使髙鑿之使深明道嘗為條例司官而伊川作行状不載明道謂青苗可且放過而伊川扵西監一状計較如此明道乃孔子之獵較伊川乃孟子之不見諸侯也學者只當以伊川為法愚謂此魯人善學柳下恵之意也合以答東莱説明道欲與熈豐大臣共政一叚参㸔温公論東漢黨錮為光武明章之烈而不知建安以後士大夫不知有漢室却是黨錮之禍毆之如荀淑正言扵梁氏用事之日其孫爽已濡迹扵董卓専命之朝及其孫彧遂為曺操之臣想當時自有一種議論文飾荆州地平守當在外趙子直只要尋箇不説話底人宜乎作貴人也更進一歩参到周子充地位矣居官只押文字便是進徳修業地頭答陸子夀諸書反覆論䘮祭之禮答陸子羙書辨詰太極西銘至再而止答陸子静書辨詰尤切條其理有未明而不能盡人言者凡七終又隨條注釋斥其空踈杜譔謂如曰未然各尊所聞各行所知亦可矣書亦扵此而止愚按先生平生拳拳諸陸之意不少衰相約来㳺廬阜幸其議論稍囬子夀之死子静亦求銘扵東莱而求書扵晦庵道誼之交自若也答陳同甫諸書大闢其尊漢唐之説意氣軒騰辭鋒峻厲有出師一掃之象同甫終信服亦嵗修晦庵始生之禮云與范直閣書論忠恕一貫謂曽子於一貫之語黙有所契指此二事日用最切者以明道之無所不在與黄端明書謂其有徳請納再拜之禮與王龜齡書謂其有莭行聲名而勉之以學與陳丞相書謂求賢将使正巳毋取之投書獻啟之流以對偶評天下士與劉共父書謂有志天下者求士必扵無事之時答鄭景望論舜非輕刑訓釋虞書甚備但欲復肉刑愚恐此事當更審若按吕刑則肉刑亦非聖人所制答尤延之書論揚雄臣賊莾但畏死貪生而有其迹亦不免誅絶愚按雄之劇秦羙新似不止畏死貪生而已莾亦何嘗殺不頌功徳者耶然雄後世尊之比孟子甚至本朝名儒或抑孟而尊揚先生獨奮春秋之筆與孔子誅少正卯異事同科亦竒矣哉答林黄中謂其論室户及闢邵氏先天之説皆非與郭中晦論揲蓍且論易有太極一段以卦畫言之太極者象数未形之全體兩儀者一為陽而一為隂四象者陽之上生陽為太陽生隂為少隂隂之上生陽為少陽生隂為太隂八卦者太陽上又生陽為乾生一隂為兊少隂上生陽為離生隂為震少陽上生陽為巽生隂為坎太隂上生陽為艮生隂為坤又書論西銘理一分殊答程可乆黍尺及先天圖又云不湏别立門庭答程泰之揲蓍之法及論焦延夀以震離兊坎直四時十二辟卦直十二月分四十八卦為公侯卿大夫而六日七分之説生焉初無法象本無可據不待論其減去四卦二十四爻而後見其失揚雄太𤣥次第乃全用焦法其八十一首亦去震離兊坎而但擬六十卦又書疑東陽陵即今巴陵敷淺原即今廬阜敷陽山正在廬山西南老子儼若容一本容作客字恊韻答李夀翁謂麻衣易説收拾佛老術數緒餘戴主簿名師俞者所造答袁機仲諸書袁謂河圗洛書不足信先生謂無柰顧命繫辭論語皆有是言袁謂卲子先天之說不足信先生謂自初未有畫說六畫滿䖏為先天伏羲所畫及卦成後各因一義推說則後天之學而文王所演其餘答卦位納甲等説纎悉具備且寄以詩曰忽然半夜一聲雷萬户千門次第開若識無心涵有象許君親見伏羲来其意象殆有不知手舞足蹈者袁終不従先生嘆曰信乎其道之窮矣謂参同書本不為明易乃姑借此納甲之法以寓其行持進退之候異時每欲學之而不得其傳無下手處不敢輕議先生盖自貶以譏袁之輕議也愚按近世趙一岩編易序業書乃直指此為先生欲學参同而不能先生豈欲學参同者哉燭破如此明白又豈不能者哉與周益公諸書謂先君子喜學荆公書愚按荆公書正蘇公所譏笑者所好不同每如此然荆公書恐亦終非可訓者又議論吕許公范文正相與其後歐公載同心國事而忠宣削之曲盡其情愚謂忠宣削之誠是也文正平生為吕公所賣晚不得已卒為國家強起耳歐公他人也不知其細可為兩家調停之語忠宣為人之子家庭之所聞見悉矣豈可厚誣乃翁心事哉答耿秉謂入淅従士大夫逰所聞無非枉尺直尋茍容偷合之論心竊鄙之答薛士龍謂自熈寧立教官學者不得自擇師是以學政名存實亡答林謙之謂自昔聖賢教人莫不以孝弟忠信荘敬持養為下學之本今之學者例以為鈍根小子之學無足留意其平居道說無非子貢所謂不可得而聞者答柯國林謂自得是自然而得豈可强求今人多作獨自之自故不安扵他人之説而必巳出耳答許順之謂子韶説得儘髙儘妙處病痛愈深又一書近聞越州洪适欲刋張子韶經觧為之憂歎不能去懐半畆方塘一鑑開天光雲影共徘徊問渠那得清如許為有源頭活水来此詩亦見答許順之書中答范伯崇謂在䘮廢祭古人居䘮皆與平日絶異故宗廟之祭雖廢而幽明之間兩無憾焉今人居䘮平日之所為皆不廢而獨廢此一事恐亦有未安卒哭𦵏後用墨衰常祀於家廟可也按禮外祀雖䘮不廢内禮純吉左傳僖公三十二年卒哭特祀於文烝嘗禘於廟者春秋時禮之變力學之說見與魏應仲書居官之説見與范伯崇書皆當寫出服行者也影堂奉主之説見答劉平甫書答何叔京猛省提掇僅免憒憒一少懈則復惘然此正天理人欲消長之機不敢不着力孔明出祁山略數千户而歸盖所以全之孟子艾讀為乂有斬絶自新之意狼疾古字通用不必言誤墨氏以儒者親親之分仁民而親親反有不厚釋氏以儒者仁民之分愛物而仁民反有未至又謂馮道許以具臣已過答吴叔京書謂存者道心亡者人心愚意理雖相近語各有為人心道心是状體叚之隨異操存舍亡是指效驗之相反今以存者為道心一念之復本體固由是而全若以亡者徑為人心則恐亡是放而不求之謂於人心何有㦯者人心止是飲食飢渴之類晦翁自謂雖上智不能無人心則人心非亡之謂也又書謂仁是用功親切之效一見疑之徐讀至盡䖏晦翁自注云此句有病以此知後學讀前賢之書何可執一言為據且如連日㸃校亦粗知其方惜未能閒居静觀也又書謂所學繫於所禀愚按此語類程先生稱徃雖學作兮所貴者資但繫之一字更合斟酌盖學本期以變化其氣禀之偏但人自各隨其禀以有成就而能自變者惟其人耳又書説體用顯微以理象而言極分曉答馮作肅書謂性死而不亡若以天地為主則非有我之所得私若以我為主是乃私意之尤者釋氏正如此答連嵩卿天下歸仁只以仁歸之如宗族稱孝之類答程允夫謂蘇黄門早拾蘇張之緒餘晚醉佛老之糟粕古史皆不中理又書謂其隂險元祐末年規取相位力引小人楊畏使傾范忠宣又謂蘇氏嗾孔文仲去程子文仲後悟嘔血至死事見吕正獻遺書答胡廣仲論性謂真是指本體而言静則只是情之未發非以静状性又書辨太極七疑與吕晦叔論祭儀廟皆南嚮主東嚮廟在所居之東南又書辨周正又一書答林擇之說三代正朔尤詳然皆疑辭與石子重書聞洪适在㑹稽開張子韶經觧此禍不在洪水夷狄猛獸之下館職又與學官不同者神宗嘗許其論事曽晳舍瑟見従容不廹灑落自在之意亦見狂處答陳明仲書多辨佛學又書言别廟者凡五等答李伯諫書謂以釋氏為主然敢詆伊洛而不敢非孔孟者直以身為儒者耳豈真知孔孟之可信而信之哉又書云却是從儒向佛故猶以先王之言為重若真胡種族不招認此語矣所以煆煉之如此又云便欲立地成佛正如將小樹来噴一口水便欲他立地干雲蔽月豈有此理所以開曉之又如此伯諫終以此囬心云答吴公濟諸書亦辯佛答林釋之謂古人自小學中涵養成就今人無此工夫但見大學以格物為先便欲以思慮求之又書云日用間常切㸃檢氣習偏處意欲萌處與平日所講相似不相似答蔡季通書託以教子令韓歐曽蘇之文滂沛明白者揀數十篇令成誦所論及鍾律星經易圗陣法琴說卦氣等而譏林黄中袁機中妄非邵氏盖季通實先生慱古之友也與方伯謨書多論易語孟又云禱雨到天師前焼香便記着後漢書何緣有效答梁文叔書論制度謂求義理論㸔史謂且當治經與吳茂實書謂陸子夀近講學其徒有曺立之萬正淳極佳與任伯起書謂今士大夫能言真如鸚鵡答江徳功多論經書謂近世溺於佛學而辨其易說之非與黄真翁論經答曺子野論史答虞士明論易論語答㳺誠之謂功夫用力處在敬而不在覺答丘子野辨筮短龜長之說及老子等說答李深卿辨儒釋及吕氏之學甚詳答楊子直論太極極詳盖出所讀者答廖子晦及鬼神之說又舉陳了翁事警其處變𦵏法沙灰隔螻蟻炭屑隔木根十二律各以本律為宫而生四律每間一律中間者間二律為二均之聲變宫變徵者自宫而下六變七變而得之乃十二律之本聲問日之所由謂之黄道而月有九行黒道二出黄道北赤道二出黄道南白道二出黄道西青道二出黄道東并黄道為九日月之行不同如此何以同度而食答謂日之南北雖不同然皆循黄道而行日月道雖不同亦常隨黄道而出其旁朔則同在一度望則逺而相對弦則近一而逺三其交蝕如一人秉扇一人執燭而過說在詩十月之交孔䟽甚詳答曽致虚云誠字在道則為實有之理在人則為實然之心而其維持主宰全在敬字白鹿只作禮殿不為象設依開元禮臨祭設席答黄商伯及䘮服制度位牌法只卧之於地答詹元善攻其治詞業之失甚至答潘叔度云整齊嚴肅則中有主而心自存又云江南之業恐自是慶厯元祐之功答潘叔昌謂建州有徐柟者常言始皇賢於湯武管仲賢於夫子荀彧未見其有扶漢之心其死何足悲四十七卷皆答吕子約書所問似覺纒繞細膩費先生之說甚多使人厭倦答吕子約書四十八卷多不切之問纒繞不了先生謂伏羲神農見扵易大傳八卦列扵六經史遷獨遺而不錄六國表所謂世易變成功大議卑易行不必上古貨殖傳譏長貧賤而好語仁義為可羞伯夷傳辨許由事固善然其論伯夷之心正與求仁得仁者相反答王子合云送伯恭至鵝湖陸子夀兄弟来㑹講論之間深覺有益先生與一時諸儒切磋者如此近世乃誤以為朱陸㑹争之地甚者至立學以主陸可歎也已令聞改曰宗文先生居䘮時家祭不行及至時節略具飯食墨衰入廟酌酒瞻拜愚謂此以義起禮孝子慈孫之志盡矣應世接物隨分應副子合問孟子道性善伊川以為本明道言其繼何也先生謂明道就𤼵明處説伊川是對氣質而言問八卦之位如何答謂康節說伏羲八卦乾南坤北文王重易更定此位大槩近扵傅㑹穿鑿且置之愚按先生専主邵氏之易而今其說又如此然則後生且讀文王易足矣他将焉考心經界事先生自謂少時見所在立土封牌皆為人題作李椿年墓答滕徳粹云四明多賢士所識者楊敬仲吕子約監倉所聞者沈國正煥袁和叔到彼皆可從游也答楊元範謂元亨利貞文王只是大亨而利於正至彖傳文言乃有四徳之說愚謂此平實語又謂隂陽只是一人隂氣流行即為陽陽氣凝聚即為隂愚謂此通透語潘㳟叔問答謂桓公非殺兄管仲非事讎荀卿謂糾為兄薄昭謂糾為弟謂鄭氏不曉周禮籥章之文以七月一詩分三體籥章之豳雅豳頌以大田良耜諸篇當之不然即别有詩若如鄭說以四章半為豳雅三章半為豳頌成何曲拍耶風皆自然如風動物而成聲若謂關睢周公所作只與後世撰樂書相似卷耳是欲酌酒以觧其憂傷答鄭仲禮若無存養實踐而但欲曉觧文義雖盡通諸經不錯一字亦何所益髙氏遣奠祝詞形神不畱者非是據開元禮作靈辰不留吉凶祭以讀祝居主人左右為别答程正思說訟𦵏地與其得直於有司不若兩平於鄉曲之為愈也致知力行論先後致知為先論輕重力行為重異論紛紜不必深辨切不可於稠人廣坐論說是非著書立説肆意排擊愚按先生平日衛道之嚴迹多類此豈非有先生之學則可耶然吾徒真不可以不戒也浙學尤更醜陋如潘叔昌吕子約皆深䧟答周舜弼行篤敬執事敬敬字本不為黙然無為時設湏向難處力加持守訓釋致中和之注頗詳答董叔重書叔重論殷之三仁有云當與社稷俱存亡不可復顧明哲保身之義愚按明哲保身但存進退之節非謂貪生畏死若死得其所是於明哲保身非相反也論河圖洛書天地之数皆五論禹貢稱漢水入江匯為彭蠡恐當時地入三苗禹亦不能細考江流甚大漢水入之未必能有増益今人不敢說經文有誤多囬互耳愚謂彭蠡自受江東西之水以入於江亦猶漢水受荆襄等之水而附入江也若謂彭蠡因漢水入江之勢相衝洄洑不能射注直下而名之為匯則可若謂漢水之盛江不足以容而匯入為彭蠡則不可凡言五世祖者自本身通数艮其背不獲其身只見道理當止處不見己身之有利害禍福也行其庭不見其人只見道理當行處不見在人之有強弱貴賤也為銘墓云因得好行狀故不費力答黄子耕祭禮神主惟長子奉之支子居官或旋設位以祭仕宦既未免出來只得忍耐更㸔自家分内許多道理甚底是欠缺底隨處操存隨處玩索不妨自有餘樂何至如此焦躁耶調逺邑而歸既無冐進之嫌又絶矯亢之累經界打重法人於田叚中間先取正方歩数却計其外尖斜屈曲處約湊成方却自省事答曺立之陳太丘亦是不當權位故可逶迤亂世若以其道用之朝廷而無所變通亦何望其有益人國哉答萬正淳正淳論舍生取義謂義當生則生豈謂義與生相對為輕重謝氏乃謂生秉於義則舍義取生且義而可舍雖生無益矣王淳引張子謂君子之道天地不能覆載恐失之太髙子思雖云天下莫能載復云天下莫能破大小兼該可也愚竊意莫能載者喻其大之極謂君子語道之廣大也莫能破者喻其小之極謂君子語道之精㣲也破之一字注觧未甚訓釋愚竊意粟粒之小針可破之若愈小則雖針亦無所用其巧故曰莫能破焉春秋滕杞諸國書伯書子不常正淳謂當時以爵之大小為貢之多少故有職貢不共而自貶其爵者如子産争於平丘之㑹及吳晋黄池之㑹可見先生云沙隨說正如此游楊為老荘之說䧟溺得深横渠說乾卦恐皆過論易有伊川傳只看此尤妙答吴伯豐書多論讀大學詩論語西銘所言多與先生契合先生託以詩傳補脫及編祭禮答葉永卿先天圗具推行之法答劉公度書譏臨川荆舒祠記譏陳君舉只要雜慱包衆說不相傷葉正則亦是如此聖門敎學循循有序無有合下先求頓悟之理答劉季章謂今人讀書背却經文横生他說又說古聖賢只見義理都不見有利害可計較應事接物直是判斷分明推以及人吐心露膽亦無囬互孟子說未有義而後其君雖是理之自然到直截剖判處却不若董生之有力謂善類消磨得盡之說若消磨得去此人便不濟事答胡季隨南軒文最好是奏議異時自作一書又書論戒懼謹獨兩節文義極分曉可以細讀為學不厭卑近愈卑近則工夫愈實而所得愈髙逺其直為髙逺者反是自謂灑落者乃是踈略放肆之異名兩字本是黄太史語延平先生拈出是要學者識深造自得氣象不謂不一再傳其弊至此古之聖賢只是敎人於下學處用力至此等處未甞言也答髙應朝講義若不敎人以日用工夫只學得一塲大話答沈叔晦書謂刻東萊文真偽相半惟大事記有益答所問兩塗之疑謂聞道讀書湏告以所謂道何道所謂書何書聞之讀之又如何用其力更願審叩以決其是非愚謂先生以其受象山之學故其說如此所謂引而不發者耶再答讀書數條先令虚心熟讀本文若便雜諸說下稍只得周全人情恐亦闢其先入為主者答孫季和書季和自謂病在輕弱先生令痛下功夫知行並進又與論中庸太極等說且云浙間學問一向外馳百怪俱在亦頗覺有弊否答石應之書云富貴易得名節難保答諸葛誠之書皆言與子静辨只是尋箇是處答項平父亦以其習子静議論而告以講學工夫答應仁仲論易本義不自意推尋至此答王季和謂孔門之教不過孝弟忠信持守誦習之間答時子雲謂向編近思錄欲人說科舉壊人心術處而伯恭不肯答王伯豐說參伍字義及畫卦法答趙幾道謂蘇子古史序於義理綱領見得極分明惜其從初為學功本無次序答楊簡卿書却其求趙帥書云向使前舉未登科不成如今亦要舉状關陞答吳宜之却其求館求試答趙昌甫云只固窮兩字是着力處不然即堕坑落塹無有是處又士巧言語為人所說易入邪徑如近世陳無已不見章雷州吕居仁不答梁師成盖絶無而僅有答徐彦章論動静及經疑答潘謙之伊川亦有時敎人静坐然孔孟以上却無此說要湏見得静坐與觀理兩不相妨乃為的當答李守約持敬工夫只大綱收領勿令放逸亦何必兀然静坐然後為持敬哉又答李守約庶母謂父妾生子者士服緦麻若生巳者則儀禮有公子為其母之文因人說琴謾為考之然不能琴答李時可說誠者物之終始云人心不誠則雖有所為皆如無有若自始至終皆無誠心則徹頭徹尾皆為虚偽又書云王氏書義序明言是雱說荆公奏議却云一一皆經臣手又書此書說條例答包詳道古人為學只是升髙自下曾子工夫只是戰兢臨履是終身事中間一唯盖不期而㑹答顔子堅云不念身體髪膚之重天叙天秩之隆方将毁冠裂冕以從夷狄之敎顯道不能諫止已失友朋之職節夫更有助緣尤非君子愛人之意聞已得祠曺牒髠㔆有斯急作此奉報且更與子静謀之答安仁吾生極罵其狂妄将答趙然道書生之兩書合看極有益答范叔義謂絜矩之義少日聞之范公如圭字伯逹答趙子欽以其欲凑補易傳七分先生云其曰只說得七分者亦曰沉酣浸漬自信自得之功更在學者自着力耳豈是更要添外科釀𤣥酒而和大羮也耶答徐叔載云放翁詩近代惟見此人為有詩人風致答葉正則責其所著書多籠罩含糊又自謂在荆州看得佛書若見得道理分明便無事殺決不暇看佛書欲得面㑹相見彼此劇談不須得如此遮前掩後欲說不說做三日新婦模様答徐居厚今人但見孔子問禮問官無所不學便道學只是如此却不知得他合下次第大底本領方有功夫到此答方賔王多論語疑答陳師徳言讀書之法鄭子上論愛物謂有知之物乃是血氣所生與無知之物異恐聖人於此亦有差等先生云此說得之答林一之文字只就一段㸔不湏引證旁通又論三代什一之法甚詳合細考答李尭卿多論經疑答陳安卿亦然安卿尤善推廣詰難答張仁叔云什一之法湏以周禮為正而参取孟子班固何休諸說愚恐且當以孟子為正若周禮雖名為周公之書而實出於王莽之世不先於孟子也説律吕正聲是全律之聲子聲是半律之聲其説甚詳令作圖子輪轉㸔答謝成之云詩枉費工夫不切自巳淵明所以為髙正在不費安排處東坡凡篇篇句句依韻而和之雖其髙才似不費力然已失其自然之趣矣太極説各一其性者云五行各専其一而人則兼備答陳㢘夫云為學工夫不在日用之外檢身則動静語黙居家則事親事長窮理則讀書講義大扺只要分箇是非而去彼取此耳答胡平一云周首十一月而春秋書春正月若其下書建子月事則改月號而以冬為春若書建寅月事則用夏正月而亂周典為胡氏學者乃謂夫子欲行夏之時以寅月為嵗首所書事則建子月之事無其位不敢自専也然月與事常差兩月恐聖人作經又不若是之紛更也不若缺疑之為愈答徐子融有性無性之説甚悉云氣質之性只是本然之性堕在氣質中答宋深之謂子莫執中與三聖執中文同意異及孔孟言性之異答陳器之公之為仁猶言去其壅塞則水自流通然便謂無壅塞者為水則不可又書云性之綱理有四曰仁義禮智四者之中仁義又是對立關鍵仁義雖對立而仁實貫乎四者之中智又能成始能成終者也答葉味道既祔後主復於寢陸子静不能行而子夀敬伏答徐志伯四壁環列前軰之象而遊燕寢卧其中非便横渠言得夫子象無設處為此耳答鄭衛老問近思錄云王介甫説律是八分書言律之長處又云封建郡縣互有得失理則封建為公答張敬之云以善服人者惟恐人之進於善愚恐服人不過欲人之服己未必忌他人之為善若以晦翁他處議論槩之恐此亦於本意上略侵過界分更當俟長者而請焉答林正卿論蔡季通被謫云陳子翁曽作諫官及被謫猶着白布衫繫麻鞋赴旬呈朝廷行遣罪人正欲以此困辱之若必求免是不受君命也正卿謂伏羲易如隂陽代謝若有推排而莫知其然文王周公易則六十四卦之名乃十八變後之私記三百八十四爻乃三變竒偶之私記潜龍牝馬等物如今卦影勿用利有攸徃等語如今斷卦之文孔子易則卦名者時也事也物也初二三四五上者位也九六者人之才也處某事居某時用某物才位適所當則吉否則凶先生批云近之十三卦㦯云葢取者疑辭未必見此卦而制此物答龔惟微春秋經文太略諸說太煩且其前後牴牾非一不若即他書之易知者求之汪叔耕以太極圖有單傳宻付之三昧先生答謂聖賢言語惟恐人之不觧豈有故為不盡之言而单傳宻付也哉此篇甚詳答方若水不求只是本分求着便是罪過不惟不可有求之之迹亦不可萌求之之心不惟不得說着求字亦不可說着不求字方是真能自守不求人知也答方子實主一無適之謂敬只是展轉相觧非無適之外别有主一主一之外又别有敬也答何巨元云先天圖自復之乾為陽自姤之坤為隂賛康莭手探足躡者以遇在上而復在下故以手足言答吴玭謂道不難於求而難於養康莭之告章子厚云以君之才於吾之學頃刻可盡但湏林下一二十年使塵慮消𣪚胸中豁豁無一事乃可相授答吴斗南說聞道及廟制等兩書其詳可讀答陳衛道論性理與釋氏兩書皆當讀答余方叔物性甚詳趙恭父書奔喪投壺兩篇曲禮之正篇儀禮亦名曲禮答趙恭父不得已而從宦惟有韜静晦黙勿太近前為可免於斯世耳一㦯不幸為人所知便不是好消息也趙致道謂程子言仕宦奪人志葢於窒礙處侵侵入於隨時狥俗先生云當事事省察而審其輕重答許生近年有假佛釋之似以亂孔孟之實者其法首以讀書窮理為大禁常欲學者注其心於茫昧不可知之地以僥倖一旦恍然獨見答汪易直管仲不死子糾而從桓公乃是先迷後得答潘子善欲専務静坐又恐堕落那一邉去只隨動隨静無時無處不自省覺又云揚敬仲其人簡淡誠慤自可愛敬而其議論見識自是一般又自信已篤不可復與辨論正不必徒為嘵嘵也答余彛孫不耕穫不菑畬此爻乃自始至終都不營為而偶然有得之意聖人之無為而治學者之不要人爵而人爵從之皆是也答林徳乆韓子說所以為性者五而今之言性者皆雜佛老而言之所以不能不異在諸子中最為近理又書盡其心者知其性也言人之所以能盡其心者以知其性故也愚按先生以此說性理儘長若以文勢觀之恐合且依諸儒之說順下說去葢下文有知性則知天一句影帶分曉盡心則知性知性則知天皆是一串順去道理今若以盡心本於知性則下文知天又本於知性恐文理未必然况人豈有不先盡其心而一切以性為先者然先生說則以知性為明理固宜以明理為先也又書云仕宦只合從選郡注擬是家常茶飯今人於堂慣了不覺其非故有志之士亦不免俯首其間為人所前却答歐陽希遜孔子只是說箇為仁工夫至孟子方觧仁字之義理希遜疑明道言性以為水初出無濁或泥沙外物汨之此孟子所謂䧟溺其心者也豈得以惡亦不可不謂之性嚴時亨又疑才說性時便已不是性深恐啟人致思於杳𡨕不可䆒詰之地答嚴時亨郷黨雖上齒有爵者席於尊東使自為一列不為衆所壓亦不厭却他人即所謂遵也遵亦作僎張元徳謂許世子止之事左傳云許悼公瘧飲世子止之藥卒公羊云止進藥而藥殺也可見悼公之死於藥矣若當時止偶不甞世子何為遽棄國而出奔先生謂於經不見說止出奔事答甘吉甫云舜居深山尹耕莘野豈不是樂以終身後來事業亦偶然耳答黎忱易經未易讀葢易本卜筮之書故先王設官掌於大卜而不列於學校學校所敎詩書禮樂而已至孔子乃於其中推出所以設卦觀象繫辭之㫖而因以識夫吉㐫進退存亡之道在今已不得其法又不曉其詞而暗中摸索妄起私意不若且㸔詩書禮樂之為明白而易知也答李晦叔問程氏祭儀謂凡配止以正妻一人㦯奉祠之人是再娶所生即以所生母配先生答云程先生此說恐誤唐㑹要中有論凡是嫡母無先後皆當合祔並祭又書云方其生存夫得有妻有妾而配祔又非生存之比兄家設主弟不立主只於祭時旋設位以信榜標記祭畢焚之未分五行時只謂之隂陽未分五性時只謂之徤順答李敬子天之外無窮而中央空處有限天左旋而星拱北仰觀可見四遊之說則未可知然厯家乃以筭數而得之非鑿空而言亦與左旋拱北說不相妨如虛空中一圎毬自内而觀坐向不動而常左旋自外而觀又一面四遊以薄四表而止又云厯說如月令䟽及晋天文志皆不可不讀答胡伯量𦵏地湏擇稍有形勢環抱處廬墓則不必又答李繼善誌石湏在墓上二三尺許答郭子從據周禮賈公彦周人少稱伯某甫至五十乃去伯某甫而専稱伯仲古用小皮帶束衣而外加大帶故謂之紳申重也江都集禮祭版皆長尺二寸慱四寸五分厚五分下文云八分大書後人以八分連五分難讀至改為五寸八分答葉仁父身外之事當一切聼天其自至者亦擇其可而受之其不至者則無求之之理也答孫敬甫說禪學云少曽見某老與張侍郎書云左右既得此禪柄便可改頭换面用儒家語說向士大夫答吴元士論律及琴甚詳與鞏仲至論詩謂古今詩有三變虞夏以及魏晋為一等自晋宋間顔謝以及唐初為一等自沈宋以後著律詩下及今日為一等荆公詩選乃就宋次道所有序引有費日力於此良可惜也之歎然使老夫筆削更當去其半放翁筆力愈健簡齋詩有合改定處龜背文正脊甲五應五行次甲八應八卦又次甲二十四應莭氣答卓周佐拒其求薦甚詳與湖南諸公論中和書言性情甚詳答㦯人謂經傳之言誠有指實理而言有指人之實有此理而言有指人之實其心不自欺者而言又答㦯人知得如此是病即便不如此是藥若更問何由得如此則是騎驢尋馬只成閒話矣黄氏日抄卷三十四
