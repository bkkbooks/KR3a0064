body:
  text: 黃氏日抄卷七十九宋黃震撰公移江西提舉司咸淳八年八月十一日交割免一路同官通啓劄公文當職偶叨誤渥兼權倉司又以小官不容辭免今既兩月深恐稽違將以八月十一日黽勉拜受權行管幹退惟才疏資淺何修而可逃責尚惟十一州五十六縣同官悉心見教别具單劄禀求外仰本司預期關報所屬照應凡舊例啓劄一切蠲免但各以職事及人才之賢否民生之休戚親書徑說毋事文談客位榜天下之治在人才人才之進在薦舉當職平生不求人今亦不受人之求自到撫州應大小舉狀並先奏告上天然後望闕拜發今此兼提舉司職事竊恐外州同官未知或循習舊比偶有干請仰書表司先責罪狀應遇投下書劄並須先問來歷是求舉不是求舉方可拆呈如挾書求舉而誤拆呈書表司斷杖八十其干請之官平日雖賢坐此一失亦斷斷不舉備榜客位仍轉牒所屬通知庶免違誤免専人匣子公文州縣之不可為専人害之也専人之不容不遣匣帖之違限激之也匣帖之不能不違限匣帖到司之繳費阻之也今請諸州主管官及五十六縣知縣各造自承往回盝四箇盝面刻某州某縣遞文字盝於其傍刻題某月某日發某月某日到主管官則總在州諸㕔申狀入盝知縣則總一縣諸㕔申狀入盝縣道之不近驛路者則遣人就驛或就州附遞鎮寨之不近縣道者則遣人送至各縣附盝撫州諸縣則附本州之直州人當職每日坐㕔盝到當面投下即時當面遣報以期彼此相安無事若夫體此區區毋自違誤以取多事則在州縣之同官本司將於報應之遲速占人才焉今次第一盝請主管官取在州官腳色狀知縣取在縣官腳色狀先次入盡以應頭限本司惟務省事國家之法人心之理即是本司之約束此外别無預祝請各㕔徑將此批榜諭通知抽回専人牒帖請州縣各官任責自置認册自立信限某限解若干某限解若干本司以厚待士大夫諸州縣同官一洗舊弊毋落吏手自誤取擾而一切以至誠與本司相守應于日前専人並引抽回除程一日定到後至者斷逐各處義倉米牒帖各官依實具見管責限補舊缺自行置册供申一日先具遵禀入新置自承盝子附遞到或有差吏在外者準此不問此單所具諸縣一體牒榜各縣分帖使各備榜縣前通知詞訴約束漢置十三部刺史以六條按察専為郡國不能奉法養民者設國朝之置監司即漢人之置刺史其職固自有在非使代州縣受詞訴為一道聚訟之委也法曰縣斷不平許經州州斷不平許經監司蓋亦防州縣長吏萬一受賕曲斷而然其曰許云者又必察其所斷真有不平而後受非以次第而至必指為受訟之地與州縣等也近世承平日久風俗日變豪家蠶併小民必反其鋒以越訴侵占富家不納王賦必匿其形以越訴欺詐如此等類不一而足閭里坐此蕭條縣道坐此敗壞根本所繫令人痛心本司今亦遇三受詞但非事屬本司已經州縣而所斷不平者決不受理其有事雖屬本司而不經州縣并不經本司乃越經朝省臺部脫狀送下者並具狀繳申不敢施行仍先申照㑹備榜司前使衆通知其餘條畫自有法在義役差役榜吉水鄭知縣排結義役又排差役隨宜區處各有條流良可嘉嘆役者自下而上第一重官司蓋基本之地也知縣於此盡心能知先務他復何憂然天下風俗不同人心私意各出義役若成固是勝於差役而近來義役亦多有弊結義役者或出於物力髙强身充主役之家則中户以下舊來不係充役者皆拘入義役此等事力不及之戶向來既苦妄糾今來幸有定論亦只得俯首從之中户以下排結既衆則上等户反寬而身充主役者坐制其權役使羣動自家户産陰已免役此一弊也中戶以下既入義役差排輪充或十日五日宜不為重而不幸都保有重難事偶在此十日五日之內此等人户縣道生疏支吾不行權歸主役間有主役而不仁者反為打話賣弄之人充役之家一舉遂空主役之家兼并得便此二弊也大凡鄉保有大役有小役大役者保正也小役者大小保長也所在保正有事多是裒率大小保長之錢以應縣吏之誅求則雖名小役亦重役也向也上户充大役小户充小役家有一二十畝之田輪充一次尚可支當今中户以下盡入義役則小役之為大小保長者降而差及一兩畝田及無田而有屋基有墳山挂名縣道略有稅産者皆須充大小保長一次輪充其家遂索而貧苦益衆此三弊也甚矣役法之難也國朝仁厚先賢輩出極力思所以免之僅免得衙前之役而在鄉落充保正副及大小保者無䇿可免乾淳間處州松陽方創義役而他州效之人户無爭糾廢家之患官司免每歲排結之擾可謂良法矣日久弊生又復有如前三者之弊常平司以役事為職合先主張此事然此事必知縣得人皆如吉水則可不擾而辦若自監司遙度而制之事益擾而未必辦矣備帖一路五十六縣各隨宜處置面核鄉司底籍知人户虛實無以其詭挾為擾而且以併聚見數凡見成鼠尾單不可為準此一事也禮請上户自與面議毋以文引而以劄目毋入吏手而自與面言毋拘緊限而屬其便宜公議或結義役或從排役各從其便此二事也充役自役首為倡而存留一等小户略有産稅者别充小役毋容盡入大役以革前所說三者之弊此三事也吉水縣區處已備併請用今日本司之說而參訂焉使役法既成而上下户皆便方為全美仍榜各州主管官衙前使衆通知此通行之說也又近年王寶章知台州勸諭上户各出田供長役之費每都不過二百畝而其費有餘即以花利餘錢衆買役田衆置之田既及初約之數即以元助之田撥還元助之户今已成就處名矣遂得役户不失元田不費分文而役事自有義役莊田雇募長役人户並不知有役事之擾此是王寶章創行若本路有鄉貴人士上户能自募效及作宰好官員能行勸募尤為無窮之利并與帖榜本路通判水利公劄某猥以晚末兼二常平常平者民生根本所係若何而可稱塞是惟各郡寅恭之賢是仰是賴竊惟常平之要有三曰義米曰役事曰水利也義米本百姓自備凶荒而有司者奪之此何忍言役事惟知縣可與上户面議而上司乃公移掣其肘某不敢效凡皆略以鄙見達之所屬同官矣然此目前吏文之事也惟水利真足利民無窮所關尤大而為常平之官者乃以非省所吏文之所促迫往往亦念不及此今歲部內天幸小稔農隙在望又久雨之後必可冬晴殆天賜之暇也若不亟圖何以為吾民久長之計哉撫州最近已選委吳司户訪求修築以禮勸而不事文移隨事宜而不立定說次第漸有端緒惟是各州去司存隔逺某徒有拳拳而不敢踰度恐事未必成而徒擾也區區欲望府判多方體訪管下有無廢壞合修去處及為豪家所占合修復去處或選委同官單車親行相度或分劄縣官請寄居上户與之面議次第往復一惟以書如議家事然不勝願幸之至放結關久禁人公牒我朝以仁立國事非惡逆無不赦放此事元因朱隅官余隅官兩家有隙率衆相鬬名曰結關已經二十八年朱隅官余隅官皆久已死亡而被喚結關之人老於獄户死無日矣奈何八該眀禋郊祀儲君及星變以至聖上登極大赦官司皆不與呈放豈所以布宣朝廷寬大之恩哉今日眀禋禮成恩霈將到所有元寄州院杜一周茄四元寄司理院余六乙周四二元寄臨川縣張二余宜生三獄共六名係元解十一名囚死僅存衰老待盡之人並牒押回本貫州縣著家聽候六七十歲衰老二十八年坐獄一旦再見天日復還故鄉得以老死於田廬中皆聖恩之及也外有曾嫩曾四乙元因何十章五脅令隨從燒毁談宅屋宇正犯人何十章五已斷而曾嫩曾四乙因循禁獄自戊午至今壬申亦已十五年此又何為者耶併與牒押回本軍著家取交管申母令曖昧不決老死獄中而後已也曉諭遺棄榜本司元有慈幼局見今所養不過四五名各已長成之人蓋撫州風俗素美無甚遺棄慈幼徒有虛名當職愧焉因念人家生男育女誰忍遺棄間或有之苦於貧耳官司收哺於已棄之後孰若保全於未棄之先西漢盛時有胎養殺我髙宗紹興八年指揮貧乏妊婦支常平米四斗紹興十五年改支一石今常平米上屬省所本司不可擅支合體此良法美意變通慈幼元規應諸坊廂委係貧乏妊婦無力養育之家訴於臨産之時經坊長保眀申上支保産米一石㑹子五貫其見在本局四五人既已長成每日坐守兩餐自少不學事藝將來有何歸著為民父母豈可賺他一生今仰店鋪人有欲收為使喚或買賣人有欲收為過賣及恐有宗族親舊自欲收録或民間欲收養為子並仰經坊長求四鄰保眀申上本司當併此兒一年合支錢米作一頓給付收録之家使之早有歸著各自習學道業求長久活路榜諭司前局前市曹使衆通知曉諭新城縣免讎殺榜建昌軍新城縣管下德安鄉諸都昨因蹇知縣創青册擾民致鄉民結關拒違本司以罪在官吏已行劾官配吏訖鄉民此時便合放散各務本業乃因鄉民自有私怨又相讎殺或東耆去劫西耆或上保去趁下保彼此報復何有了期又聞張材與大坪兩處因爭漁利日夜相攻甚至殺人放火前日結關拒追猶可說官司不是今日結關相殺又是誰不是耶本司比諸監司去新城最近前日官司不是既已治官司之人今日是百姓自做不是又安得坐視但念百姓皆吾赤子元非作亂只是報寃未欲遽見施行且先給榜曉諭大凡寃家只可解不可鬭才解便休才鬭轉深若去鬭時俗諺云贏他一萬自損三千本要殺他反被他殺了濟得甚事又俗諺云人頑似鐵官法如爐德安往年幾箇倡亂何曾一人得保首領此皆爾百姓眼見者若能解時只在一念將前日報寃之心回轉思量畢竟他也是我鄉鄰或是我親舊有事只可忍耐豈可相殺只可讓他做得不是豈可和我做得不是畢竟我箇性命亦自重大上有父母要我供養下有妻子要我撫育若有病痛尚且醫救欲得延生豈可拚命讎殺或有死亡尚且哭泣恨不再生豈可平白討死人身難得中土難生自小出世以來只願百年在世豈可等天立地做大丈夫有些氣子忍不住輕易壞了一生仰榜到之日更相解勸父勸其子妻勸其夫田主勸其佃户稅家勸其小民都副隅保勸其鄉社以保身命以全鄉井轉禍為福永享太平豈不樂哉備榜縣前仍帖權縣請更轉榜各都村墟要鬧等處使之通知自然無事或有鄉曲向上之人合禮請任責徑自隨宜區處施行江西提刑司咸淳九年三月初六日交割交割到任日鏤榜約束照對當職近以撫州兼權提舉曾牒報本路同官大略謂人心之理國家之法即是本司約束别無預條件蓋此時以提舉司事少而兼權非専司比也今叨誤渥擢司刑憲關繫既重事緒尤繁合先開具大要下項一刑獄獄司事莫重於人命一一自有眀條惟縣吏反監體驗下下鄉賣弄盡出其手一下便非本情及追捕一行人回縣詐錢不即時於地頭書填格目及茶食引保人掯定保正通同打話將干繫人視貨輕重為操縱出入及取入門欵官不即時到獄停朝隔宿又不親靣審供㸃對元情及尉司獄司皆以已配老吏穿欵變亂本情及保正闕役處隅官坐視不即時收捕凶身以致淹延凡此六項自今部內並請一切更新有犯斷斷不恕此外又有譁徒専將身死不眀四字把持村民作血屬經官官司便作致死事行移三年五載後雖終成白休而干連人已皆瘐死一方生聚為之蕭然賊害吾民莫此為毒兼鄉民畏此無端之擾無人肯充保正違誤公私事務不可勝述皆此曹禍之也今當職第一以理雪民命為重亦第一以痛革誣訴為急仰縣道發覺官司遇此詞訴必審問的是被死人親父母或無父母身未曾娶的是被死人親兄弟或無父母兄弟的是被死人妻子必單身人被死方許次第有服紀止一人出名作血屬須說被死來歷證見痕傷分曉責反坐狀體驗得實即依條不移時填入格目捨此泛稱血屬云有某親身死不眀或不知人命著落之類皆是譁徒教唆雷同舌本並不許縣道輕受其自縊自溺自刑自害掐死攧死小兒女與將久病死人稱被嚇殺諸般抵賴既非被殺皆不應作大辟事施行為吏人通同脅詐之計昨見官司受此詞訴則小人反因之而輕生或不受此詞訴則小人自因之而惜命若不受理救人無限諸縣皆膺百里民社之寄謹之謹之違定按劾一泛追人命事未能伸一人之寃已先添數十人之寃其弊皆因公人世界遞相吞啖節節計置非錢不行縣獄若不遍追一鄉無辜之人則結解時無以充計置本州公人之費州獄若不再追本縣已放之人則圓結時無以充提刑司計置公人之費積弊已深有力莫救故百姓無非公人几上之肉而官員徒為公人趁錢之奴耳一件人命事在官無限公人張頥待哺提刑司公人則獨據要㑹坐收全利者也今當職雖不才焚香告天誓革此弊若非的係被殺決不容縣道輕受若非真的同共行凶及親切證見決不容縣道輕追若非委有出入異同決不容州獄再追本縣已放干連人及追縣吏詐錢當職自當不憚辛勤親自巡歷靣問部決如披閲案牘考究首尾縣獄追不當追之人州獄追不當再追之人並將犯人決配本官按劾其有圓結到司亦親自當時當㕔區處仰州縣官吏毋猶豫事落公人手恐其枝節生事預苦吾民辦計置錢也一贓錢本司號正監司第一首當奉法守公之地獨因司存赤立例以贓錢為支遣遂致引惹一等凶徒欲害人而無其說者輒不逺千百里妄稱被某人拐脫錢若干或被脅取錢若干或被奪去錢若干本司誤認為利源所在或不顧虛實而行之牌匣専人布滿州縣大半為追贓錢而發所解能有幾何而搔擾則不可勝述弱妻幼子監繫纍纍家無噍類則又案吏代納案吏之陪償是亦生民之膏血興言及此令人汗顔今當職與州縣約應元有窠名合解本司吏祿贓罰錢請各自置册分限自承依時抱解此外應有積年非法監贓截自榜牒到日一切住行見因贓錢監繫人並放已配見監贓吏人並免監日下押發一専人大凡監司州郡非不知専人之害良由散帖不應故入牌箇牌箇不應故入匣子黑匣不應緑匣又不應方怒而遣専人不知其不應者正由繳納有重費罪本不在下也當職頃兼倉司盡抽回専人具劄懇諭一路同官請各自置往回盝子四箇州則通判總一州之回報縣則知縣總一縣之回報循環附遞當㕔而坼當㕔而還繳費盡免已荷一路同官相應訖今在憲司請各依前一體相守憲司多人命重事仍請各官更置册案頭每日㸃檢督促吏人事到即時回報事了亦即時回報事未了則即時照限申展以信相守堅如金石如或違誤官罰吏黥一詞訴詞訴惟命官犯贓者受吏犯枉法贓已經州縣者受事屬本司曾經州縣所斷委未平當者受其餘小事各有司存或不經次第官司直經朝省臺部脫送本司者當㸃對據實回申決不輕行白帖權攝人仰日下去官其或惹詞追勘黥配一巡厯本職當單車巡厯訪求民瘼理決滯獄求以仰稱聖朝欽恤民命之萬一所到州縣官員並免迎送但以職事簡徑見教其有寄居士友生長本路目覩民生疾苦熟知本司闕失事件者併乞省文直書賜教不勝願幸詞訴約束古者帝王親行巡狩以察四方諸侯至漢遣六百石吏察郡國二千石長吏以代親行謂之刺史至本朝謂之監司故世稱外臺為天子耳目之官但擇州縣官不奉法為民者去之則百姓自然安迹非代州縣受詞訴為一路聚訟之委也近來此意不眀部內之官或橫縱害民而不問反不捐細大務以聽訟為盡職遂使豪右譁健之徒紛然競集隔千里遼邈不接之地信一時張皇無實之說牌匣絡繹専卒旁午驅迫州縣騷動閭里雖雞犬亦不得其寧是豈朝廷設監司之本意哉當職交印後二十日之間閲過舊案千餘件率多煩碎虛誕不當受理之事前此幕官徒以司存所仰贓錢默有拘礙往往經隔三年五載不決以俟監贓耳今當職贓錢先已榜放舊事逐日疏決以冀司存一清上下相安司案乃呈舊例求托詞訴約束當職每日五鼓出㕔非避懶之人也詞訴亦須受理但擇其關係之大者方受且分次第先後耳一第一次先理命官犯贓狀右除日前舊事免問外截自今年三月初六日當職交割以後如有州縣官下至巡尉監當取受民財仰被詐人指陳的實證佐先責反坐狀留身訖經追被訴之官赴司究對依條施行更不行尋常帖問具㭊追吏根究等虛文故事此項候聖節後四月十三日受詞一第二次理豪家把持公事狀右亦截自當職交割後有寄居富室敢預公事自殘其鄉里者仰被害人指實陳告施行一切如前此項候五月十三日受詞此日有别項緊切事併附受詞一第三方理其他本司合受事右舊事逐日剖決不待催詞新事自有次第官司不當越訴自此一月一放狀亦以命官犯贓豪家把持事為先其狀先呇先判榜諭諸州住行不切詞訴大江以西山水秀拔最號人物淵藪間有所禀之偏者流於俠而好勝遂招珥筆之譏議者惜焉今當職交事之初披閲訟牒多非緊要此等縱欲規害所怨其自身亦豈能晏然而坐勝乎不知亦何苦而為此哉時事尚艱神眀甚近聖君大臣方憂勞於其內邊臣戰士誓奮死於其外我輩官吏士民皆當竦然自立改心擇行且相與保全自家一段元氣以契天地以體朝廷奈何於宗族鄰里之間忍於相讎甚至士大夫不能自免何其溺於舊習尚不知變乎仰案呈連日已斷不切舊事備榜各郡市曹請從今自悔為忠厚之歸毋犯有司也又再榜諭吉州詞訴當職自交割後四五十日之間已判過吉州不切公事七八百件今住司人來尚復有之豈真吉州人之健訟亦本司舊弊輕易泛受誤人於多訟之地耳今并住行使吾吉州之人各知好惡守分相安一變前日之為以洗健訟之謗也禁划船迎㑹榜吉州倉斗陳重三不伏本州禁約至因划船迎神驅鬭繫獄身死其母阿劉經前政妄詞以人命事為訴當職三月二十二日已行斷遣并將一行干連人疏放未據本州回報牒催申照得小人迎神名曰求福今反死於非命干擾無限平人福安在哉當職前任廣德軍通判禁絶本軍罪願傷神并張王迎祭等㑹近在撫州燒毁划船千三百餘隻坼毁邪廟禁絶瘟神等㑹廣德撫州連年皆得大熟人民安樂並無災癘福不在此乎本司所領是刑獄殺傷之事愚民迎㑹乃刑獄殺傷之端併榜一路州縣預行禁戢仍連粘當職在撫州曉諭敬天說兩紙使其知天地神眀是神泥胚塑像不是神各歸正道以致自求之福母更信邪以速自取之禍如有違犯定將社首決配籍沒併火其廟為灰掘其地為瀦永絶禍根仍牒帖諸州縣常切覺察有犯即時申來內贑州乾地划船之風尤盛正與撫州之事一同牒請兵鈐司一體行客位榜官員見訪仰客將預先覆知若通寒溫只可三進說三數句告莫多事孔子惡便佞便者巧趨蹌佞者有口才今人誤以為好事更欲以此求知於人豈世間自有好之者耶今後如州縣同官辦一副當應用家見成頌德言語來靣前誦讀一遍者則其人可知矣將客將從杖六十科斷以懲其不曾覆知之罪備榜客位通知庶同官各務誠實黃氏日抄卷七十九
