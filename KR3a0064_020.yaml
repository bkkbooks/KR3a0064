body:
  text: 黄氏日抄卷二十宋黄震撰讀禮記七玉藻第十三天子玉藻十有二旒前後邃延龍卷以祭䆳雖醉反卷音衮玉藻冕之飾也冕以板為頂藻以五采絲垂於板之前後為十有二旒旒各十有二就毎一就貫以玉就間相去毎一寸旒長尺二寸垂至齊肩為其以藻貫玉故名玉藻十有二則法天數也延者用三十升布染黄覆於冕上前後垂而延長深䆳故曰前後邃延龍卷之卷字本作衮畫龍於衮衣其形卷曲衮冕所以祭先王之服先儒相傳謂前旒蔽明亦習之誤此獨祭祀之衮冕為然欲其專精神以饗神也若視朝則皮弁服何蔽塞之有哉集孔氏周氏程氏説𤣥端而朝日於東門之外聽朔於南門之外𤣥端者端衣名而色𤣥古者端衣或施於冕或施於冠樂記曰魏文侯端冕而聽古樂此施於冕者冠禮曰冠者𤣥端緇布冠内則曰子事父母冠緌端韠紳公西華曰端章甫晋侯端委以入武宫晏平仲端委以立于虎門此施於冠者東門南門皆謂國門諸侯告朔於廟明其受之於祖也天子聽朔於南門之外明其受之於天也聽者受之義集陸氏及論語注及方氏閏月則闔門左扉立于其中扉門扇左陽也闔其左而由右者閏非正也用方氏補皮弁以日視朝遂以食日中而餕奏而食日少牢朔月太牢五飲上水漿酒醴酏以支反弁用皮體自然也以視朝之服而食敬也日中而餕不改造以厚養也奏樂而食和以養其心志也日少牢崇其儉也朔月太牢敬其始也五飲上水味以淡為夲也漿以汁滓相將其味酢七故反者也酒清酒醴甘酒酏以粥釀醴漿厚於水醴厚於酒酏厚於醴凡五飲皆以淡為本而漸及於醲厚也用應氏方氏補卒食𤣥端而居動則左史書之言則右史書之御瞽幾聲之上下御瞽當御之樂官㡬察也樂以中聲為本聲之上下皆非中故幾之魏文侯云鐘聲不比乎左髙晦菴云和峴造樂於周我太祖神聖令降一分其聲遂和用陳氏補年不順成則天子素服乗素車食無樂自貶損也鄭氏諸侯𤣥端以祭禆冕以朝皮弁以聽朔於大廟朝服以日視朝於内朝禆埤也天子六服大裘為上其餘為禆内朝路寢門外之正朝也孔氏鄭氏朝辨色始入君日出而視之退適路寢聽政使人視大夫大夫退然後適小寢釋服辨色始入所以防微日出而視所以優尊朝而臣先於君所以明分守退而君後於臣所以防怠荒視大夫退然後敢退所以體羣臣而均勞逸陳氏方氏又朝服以食特牲三爼祭肺夕深衣祭牢肉朔月少牢五爼四簋子卯稷食菜羹夫人與君同庖稷食之食音嗣三俎豕魚腊五俎加羊與其腸胃四簋黍稷稻梁子日紂死卯日桀亡後王以為忌祭肺祭先食周人尚肺也祭牢肉夕食非始殺止於肉而不必肺也朝服以食享一國之奉不可忽也朔月豐於朝夕敬始也稷食菜羮忌日貶也夫人同庖不特殺也用鄭氏補君無故不殺牛大夫無故不殺羊士無故不殺犬豕君子逺庖厨凡有血氣之類弗身踐也踐古音翦今如字讀故謂因祭祀無故不殺仁也庖宰殺之所厨烹飪之所凡有血氣之屬弗身踐謂雖若螻蟻之微猶弗忍踐之此以小明大血氣之屬弗身踐况忍無故而殺乎用應氏陸氏補至于八月不雨君不舉年不順成君衣布搢本關梁不租山澤列而不賦土功不興大夫不得造車馬衣布謂若衛文公大布之衣搢本謂天子之笏名珽諸侯之笏名荼士竹笏其本飾之以象今以㓙年自貶去珽荼佩士笏而但搢揷其竹本無象飾也列言遮列但遮列使不得非時而取而不取其賦也春秋書正月至于七月不雨見咎徵也三傳不達聖人之意乃曰不為災故不書旱豈有不雨者七月而不為災此曰至于八月不雨君不舉者後儒惑於三傳也不然則誤且謬矣長樂劉氏卜人定龜史定墨君定體定龜者天龜𤣥地龜黄東青西白南赤北黒俯者靈仰者繹前弇果後弇獵左倪靁右倪若其屬不一定之者定其所當用卜祭天用靈卜祭地用繹春用靁秋用若之類也定墨者卜必以墨畫龜而灼之大坼從墨為兆廣小坼旁出為兆舋定之者土兆横木兆直金兆從右邪上火兆從左邪上水兆曲以大小長短明暗為吉㓙或卜㓙事又以短小為吉又有旋者吉大横吉大横庚庚庚庚是豹地庚庚然定體者體如體王其罔害體無咎言定之者既得五行之兆體君定其體之吉㓙占人云君占體是也卜人定龜先視龜之上下左右隂陽大史定墨以視其兆坼人君定體視兆所得而斷其吉㓙卑者視小尊者視大也馬氏孔氏君羔幦虎犆大夫齊車鹿幦豹犆朝車士齊車鹿幦豹犆幦音覔犆音直齊側皆反軾之制有衡以横其上有犆以直乎下幦若席然施諸軾上註謂之覆苓詩韓奕謂之幭周禮巾車謂之䄙羔幦虎犆此君齊車之飾臣之朝車與齊車同飾言朝車於大夫士之間知兼大夫士言之也鄭氏方氏君子之居恒當戸寢恒東首若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐首手又反當戸嚮明東首順生氣變而衣服冠起坐敬天怒鄭氏日五盥沐稷而靧粱櫛用樿櫛髪晞用象櫛進禨進羞工乃升歌浴用二巾上絺下綌出杅履蒯席連用湯履蒲席衣布晞身乃屨進飲盥音管靧音悔櫛則乙反樿章善反禨其既反杅音雩連力旦反盥洗手沐沐髪靧洗靣浴洗身稷與梁用其瀋汁也櫛梳樿白理木晞乾象櫛象齒為梳禨沐而進飲以祝福進羞以庶羞薦之工升歌謂以樂侑絺精綌粗杅浴盆蒯澁蒲軟連用湯者初出浴履蒯繼以湯去足垢而履蒲乃用布晞其身納履而進飲進飲不進羞工亦不升歌浴殺於沐也日必五盥於其間而沐浴焉所以滌其垢致其樂而養其和者亦無所不至沐之瀋則先稷而後粱既沐之櫛則先樿而後象浴之巾則上絺而下綌既浴之席則先蒯而後蒲大抵初則先其粗者用刷湯之力後則用其精者盡潤養之功既沐而升歌所以作其陽既浴而進飲所以養其陽而浴之禮殺於沐又以首為尊也用應氏周氏補將適公所宿齊戒居外寢沐浴史進象笏書思對命既服習容觀玉聲乃出揖私朝煇如也登車則有光矣史謂大夫亦有史官也笏者忽也書事以備忽忘者也漢初亦有秉笏奏事盖手執眼觀口誦於君前也書思對命言書所思念欲以對君之命孔氏謂書此思對命三事亦通既著朝服私習儀容又觀容以聽佩玉之聲使與行歩相中行出至於己之私朝揖其屬臣而行煇如可觀登車則有光儀拱挹之不盡形容之莫措矣用孔氏晦庵補天子搢珽方正於天下也諸侯荼前詘後直讓於天子也大夫前詘後詘無所不讓也珽他頂反荼音舒延平周氏如字讀搢謂扱與挿同笏於紳天子之笏曰珽珽直也故其制直云方正於天下釋其以直臨下之義也諸侯之笏曰荼荼舒也舒緩也進則屈於天子退則伸於國人故其制前屈而後直讓於天子者釋前詘之義也大夫進詘於天子退詘於諸侯故其制前後皆詘無所不讓釋前後皆詘之義也周氏以荼為茅之秀云笏飾以荼猶玉飾以蒲姑兼存之以俟来者考焉用周氏方氏補侍坐則必退席不退則必引而去君之黨登席不由前為躐席徒坐不盡席尺讀書食則齊豆去席尺侍坐必退席不敢與尊者並也不退亦須去就君之親黨以避之不敢近尊也登席不敢由前恐躐踐其席也無所事而徒坐則不盡席之前有餘一尺至讀書與食則近前而與席齊讀書欲聲聞長者食恐汙席也設豆去席一尺食坐盡前則豆當又在其前也用鄭氏方氏補若賜之食而君客之則命之祭然後祭先飯辯甞羞飲而俟若有嘗羞者則俟君之食然後食飯飲而俟飯上聲辯音遍祭祭先也禮敵者共食則先祭臣侍君而賜之食不祭君以客禮待之則得祭又湏君命之祭乃敢祭君未食而臣先食徧甞羞膳示行臣禮為君先甞食之義也甞羞畢歠飲而俟君食臣乃敢食飲者飯之湆禮食先啜飲以滑喉也孔氏君命之羞羞近者命之品甞之然後唯所欲凡嘗逺食必順近食君未覆手不敢飱君既食又飯飱飯飱者三飯也君既徹執飯與醬乃出授從者羞近者避貪味也順近食從近始也覆手謂己食而釋其挾覆手不用也飱夕食也先儒以為勸食者朝食為一夕食為再以勸之使食因謂之飱為其再食也君未覆手弗敢飱者待君一食之竟然後敢勸之使再也如是者三故曰飯飱者三飯也執飯與醬授從者食於尊者之前當親徹也鄭氏方氏凢侑食不盡食食於人不飽唯水漿不祭若祭為己偞卑偞虛渉反不盡食不飽謙也水漿不祭非盛饌也已謂已甚也偞卑薄也言水漿若祭則太卑薄也鄭氏方氏君若賜之爵則越席再拜稽首受登席祭之飲卒爵而俟君卒爵然後授虛爵君子之飲酒也受一爵而色洒如也二爵而言言斯禮已三爵而油油以退退則坐取屨隠辟而后屨坐左納右坐右納左洒先典反言魚斤反辟匹亦反洒如明皃言言和皃油油恱敬皃古以言言斯為句今以斯禮已為句謂二爵而言言然和敬斯已為禮至三爵則油油然恱敬而退不敢過三爵也退則取屨隠辟而納之不敢當長者而屨也坐左納右坐右納左凡以順手足之便用説文孔氏陸氏方氏補凢尊必上𤣥酒唯君靣尊唯饗野人皆酒大夫側尊用棜士側尊用禁棜於據反上𤣥酒不忘古也君靣尊專其惠也饗野人謂蜡祭時唯用酒而不用水賤者用恩而已不備古禮也側尊在賔主兩楹之旁避君之嫌也棜今木轝上有四周下無足禁有足皆所以頓酒尊使不動者也鄭氏孔氏方氏始冠緇布冠自諸侯下逹冠而敝之可也緇布冠存古耳始冠暫用即敝棄之鄭氏周氏𤣥冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也𤣥冠丹組纓諸侯之齊冠也𤣥冠綦組纓士之齊冠也繢戸内反緌耳佳反綦音其又其記反繢備五采綦蒼艾雜色纓所以結冠緌所垂之飾𤣥冠朱組纓緇布冠繢緌皆始冠之冠下皆齊冠鄭氏縞冠𤣥武子姓之冠也縞冠素紕既祥之冠也垂緌五寸惰游之士也𤣥冠縞武不齒之服也紕音埤武冠卷音權也紕縁邊也子姓適孫也孫是子之所生故曰子姓祖亡故冠用縞父在故武用𤣥此孫為祖既祥之冠冠用縞帛以兆吉縁以素紕以示㓙此子為父既祥之冠垂緌五寸游惰之象黝冠縞武以罰之者不齒之服方氏陸氏居冠屬武自天子下逹有事然後緌燕居之冠冠武相連率略也古者施冠於首然後加武以約之有事然後緌燕居無事者去飾也五十不散送親没不髦大帛不緌𤣥冠紫緌自魯桓公始也散昔旦反五十送䘮不服散麻絰始衰不備禮也親没不髦去為子之飾也大帛䟽帛不緌者凶服去飾也𤣥冠而用不正之紫色為緌其失禮自魯桓公始也鄭氏朝𤣥端夕深衣深衣三祛縫齊倍要祍當旁𬒮可以回肘朝直遥反祛起魚反要一遥反縫音逢齊音咨祍而審反袪袂末袂者䄂也三袪者言深衣之廣三倍於袂之末也縫齊者衣下之裾也要者衣之中齊者衣之裾縫齊倍要者其裾之廣倍於要也祛尺二寸圍之為二尺四寸三其袪為七尺二寸今其下倍之則丈四尺四寸也衽襟也當旁在其側也袂之廣取其可以回肘鄭氏長中繼揜尺袷二寸袪尺二寸縁廣寸半以帛裏布非禮也袷音劫長者長衣垂之於外者也中者中衣服之於内者也長中二衣與深衣大同小異繼者接袖也繼揜尺者繼袂口而揜餘一尺謂幅廣二尺二寸以半幅繼續袂口比深衣袖多長一尺以揜覆於外也袷領也以交而合故名曰袷二寸者言其廣也袪𬒮口也尺二寸言袂口之廣也縁廣寸半言領袖之縁也裏者裌也凡衣用帛則裏亦帛用布則裏亦布若以帛裏布則是以細而副麤故非禮用鄭氏陳氏方氏補士不衣織無君者不貳采衣正色裳間色衣音意織音志間去聲織者先染絲然後織若錦之屬功多色重士賤不得衣之無君則弔故服素而不二之以采衣在上故用青黄赤白黒五方之正色裳在下故用緑紅碧紫駵黄五方之間色用孔氏補非列采不入公門振絺綌不入公門表裘不入公門襲裘不入公門振讀如袗山隂陸氏如字訓舉列采謂正服文采成列也振絺綌謂襌音丹著絺綌而無表衣以蔽衣則䙝表裘謂服裘於外而無正服以被之則簡襲裘謂裘必當裼反而襲之不見美則疑於弔故皆不當入公門凡裘上必有裼衣裼衣上又有襲衣裼者所以露其文采用方氏補纊為繭緼為袍襌為絅帛為褶襌音丹褶音牒纊新綿緼舊絮絅禪衣褶裌衣朝服之以縞也自季康子始也孔子曰朝服而朝卒朔然後服之曰國家未道則不充其服焉卒朔謂卒告朔之時告朔服皮弁告朔畢脫去皮弁而後服朝服也朝服以布不以純以緇不以縞後世反之者始乎季康子之失禮也朝服緇衣素裳待皮弁告朔訖然後服之盛服非有道者不能充其服謂若彼其之子不稱其服之類用方氏補唯君有黼裘以誓省大裘非古也黼裘以黒羊皮雜狐白為黼文以作裘誓謂前祭十日誓戒省謂前祭三日省牲大裘天子郊天之服惟君黼裘以誓省後世有用大裘故記者譏之曰非古君衣狐白裘錦衣以裼之君之右虎裘厥左狼裘士不衣狐白裼思歴反狐白裘以狐腋之白毛為之裼者袒而有衣曰裼露肉曰袒裼天下無粹白之狐而有粹白之裘則狐白裘天下之尤難得者紂以狐白免西伯田子方以狐白禮子思田文以狐白脫秦患狐白之貴可知故惟君衣之而以素錦為衣覆之使可裼右虎裘左狼裘衛尊者冝武猛也陳氏鄭氏君子狐青裘豹褎𤣥綃衣以裼之麛裘青豻褎絞衣以裼之羔裘豹飾緇衣以裼之狐裘黄衣以裼之錦衣狐裘諸侯之服也褎音袖綃音消麛音迷豻音岸絞戸交反褎䄂綃綺屬犴胡犬絞蒼黄色麛鹿子羔羊子裘必有衣各隨其色之相稱補犬羊之裘不裼不文飾也不裼裘之裼也見羙也弔則襲不盡飾也君在則裼盡飾也服之襲也充羙也是故尸襲執玉龜襲無事則裼弗敢充也見賢遍反袒而見裘曰裼揜而充裘曰襲見言見於外充言實於内裘之上有裼衣裼衣之上有襲衣襲衣之上有正服裘之必裼以見美為敬故君在則裼惟尸居尊位無所敬於下故不裼而襲執玉執龜敬在寳瑞故不裼而襲茍無事則必裼葢臣之於君不敢自充其羙必以著見其羙為事上之敬也用鄭氏方氏補笏天子以球玉諸侯以象大夫以魚湏文竹士竹本象可也球羙玉魚湏文竹者以鮫魚之湏文飾其竹竹本象者用竹本而象飾之孔氏見於天子與射無說笏入太廟說笏非古也小功不說笏當事免則說之既搢必盥雖有執於朝弗有盥矣凡有指畫於君前用笏造受命於君前則書於笏笏畢用也因飾焉說他活反免音問造七報反說脱去也吉事無所說笏免者䘮事以布繞頭交額前而哭惟當執事與免之時則說笏造君所而受命則書於笏事事畢用笏以笏為重故因而加飾焉鄭氏方氏笏度二尺有六寸其中博三寸其殺六分而去一其中博三寸明上下二首不博三寸也君殺其上大夫士又殺其殺之而其首廣二寸半以便於搢與指畫鄭氏王氏而素帶終辟大夫素帶辟垂士練帶率下辟居士錦帶弟子縞帶并紐約用組辟婢支反讀如裨率音律并必政反紐女久反組音祖辟讀如禆冕之禆謂以繒采飾帶之側也終辟者盡其帶皆飾辟垂者止於帶之紐及末垂處有飾率謂緶緝率下辟者止於其末下有飾居士不仕者用錦帶尚文弟子承學者用縞帶尚質并並也紐帶之交結處也以物穿紐約結其帶並用組為之也鄭氏孔氏韠君朱大夫素士爵韋圜殺直天子直公侯前後方大夫前方後挫角士前後正韠音必韠蔽膝也亦名芾名韍名韎韐爵韋者凡韠皆以韋為之士之韠色如爵於士言韋緫上文也圜殺直三等之制天子直無圜殺也公侯前後方殺四角使之方變於天子也大夫前方後挫角挫角則圜也士前後正者正方直之間或曰前亦挫角於是為正也韠以下為前以上為後用孔氏陸氏補韠下廣二尺上廣一尺長三尺其頸五寸肩革帶博二寸頸中央也以上下皆大而中特小如人之頸肩兩角也以其在兩旁如人之肩兩角皆上接革帶以繫之故肩與革帶其廣同并言博二寸大帶用組約不堪縣繋故繋於革帶方氏孔氏大夫大帶四寸雜帶君朱緑大夫𤣥華士緇辟二寸再繚四寸凡帶有率無箴功繚音了箴音針雜猶飾雜帶即上之帶辟音婢也𤣥華緇辟皆帶飾以等而殺耳二寸而再繚之亦四寸也率繂也凡帶謂有司之帶亦繂之如士帶無箴功謂不禆之也鄭氏一命緼韍幽衡再命赤韍幽衡三命赤韍葱衡天子素帶朱裏終辟緼音温韍音弗幽讀如黝緼赤黄之間色衡佩玉之衡葢瑀也幽黒色葱青色王后褘衣夫人揄狄禕音翬揄音揺狄讀如翟禕為翬揄為揺皆翟也伊雒而南素質五色皆備成章曰翬江淮而南青質五色皆備成章曰摇王后之褘衣畫翬夫人之揄狄畫揺孔氏三寸長齊于帶紳長制士三尺有司二尺有五寸子游曰參分帶下紳居二焉紳韠結三齊三寸謂約帶紐組之廣也長齊于帶與紳齊也紳帶之垂者也士之紳其制長三尺有司謂府史之屬長止二尺五寸便於趨走承事也帶通四尺五寸尺五寸繞腰三尺垂前於紳故曰三分帶下紳居二焉帶之垂紳蔽膝之韠承約組帶之結三者齊長用鄭氏孔氏補君命屈狄再命褘衣一命襢衣士褖衣屈音闕褘音鞠山隂陸氏如翬音䄠張戰反褖吐亂反屈周禮作闕狄翟也翟即雉畫雉於衣命婦之服故曰君命屈狄褘翬也畫翬於衣上文云王后褘衣其制必在屈狄之上故曰再命褘衣然褘衣既為王后之服卿大夫妻亦再命得之其制必有少異猶天子諸侯之同其衮冕也一命䄠衣䄠展也士未命其妻褖衣褖或作税展衣白褖衣黒集陸氏孔氏唯世婦命於奠繭其他則皆從男子奠音獻孔如字世婦謂天子二十七世婦以下也世婦及命婦入助蠶畢獻繭凡獻物必先奠於地故曰奠繭奠繭者有功於祭服而命之不専為夫其餘非助蠶者不湏奠繭之命惟從夫之爵故云皆從男子夲孔氏説凡侍於君紳垂足如履齊頥霤垂拱視下而聽上視帶以及袷聽鄉任左齊音咨霤力救反祫音刼鄉許亮反紳垂則身磬折也齊者裳之下緝如履齊者謹於移歩也霤者屋簷身俯則垂其頥如屋霤也拱沓手也身俯則宜手沓而下垂也視下者視髙則傲故下矚聽上者侍尊宜諦聽故聽上視帶及袷者視尊者之身下不過帶髙不過袷袷衣領也聽鄉任左者聽之所鄉以左為任左近君也孔氏凡君召以三節二節以走一節以趨在官不俟屨在外不俟車節以玉為之君召臣有一節時有二節時故合云三節急則二節臣故走緩則一節臣故趨在官不俟屨者古者官府近列君側席地而坐登席解屨聞召即往故不俟屨在外不俟車者退食於外徒馭皆散倉卒未易遽集故或不容於俟車孔氏應氏士於大夫不敢拜迎而拜送士於尊者先拜進靣荅之拜則走凡皆不敢以主禮自居也先拜進靣謂拜竟乃進靣親相見夲孔氏士於君所言大夫没矣則稱諡若字名士與大夫言名士字大夫字名謂字其名即稱字也隠其名而稱其諡與字所以謹分守存謙退亦體其君尊賢悼往之心應氏於大夫所有公諱無私諱凡祭不諱廟中不諱教學臨文不諱此明有不得而諱者義各有在也補古之君子必佩玉右徵角左宮羽趨以采齊行以肆夏周還中規折旋中矩進則揖之退則揚之然後玉鏘鳴也故君子在車則聞鸞和之聲行則聞佩玉是以非辟之心無自入也齊讀作薺還音旋右徵角左宮羽玉聲之所中也徵為事角為民可以勞故在右宫為君羽為物宜逸故在左采齊路門外之樂節逸詩肆夏路門外之樂節九夏之一也周旋是直去却回来其回轉處欲其圓而中規折旋是直去復横去其横轉處欲其方而中矩鸞在衡和在式集鄭氏及晦庵君在不佩玉左結佩右設佩居則設佩朝則結佩齊則綪結佩而爵韠綪側耕反不佩玉非盡去之也特結其玉不使鳴以收歛為敬耳左佩徳佩玉也故結之右佩事佩木燧大觹之屬以備使令故設之綪則結其佩又屈上之以齊而思神明心不在事也爵韠祭服應氏鄭氏凡帶必有佩玉唯䘮否佩玉有衝牙君子無故玉不去身君子於玉比徳焉佩玉以聲而節行衝牙者佩之所以成聲者也凡佩上繫於衝下垂三道穿以蠙珠下端之前後縣以璜其中央下端縣以衝牙動則衝牙前後觸璜而為聲所觸之玉其形似牙故曰衝牙孔氏天子佩白玉而𤣥組綬公侯佩山𤣥玉而朱組綬大夫佩水蒼玉而純組綬世子佩瑜玉而綦組綬士佩瓀玟而緼組綬孔子佩象環五寸而綦組綬綬音受純為緇側其反瑜羊朱反綦音其瓀而兖反緼音温玟武中反山𤣥水蒼色所似也綬者所以貫佩玉相承受者也純當為緇古文作絲綦青黒色瑜美玉瓀玟石次玉者緼赤黄間色山隂陸氏純與緼皆如字純以絲為之緼以纊為之免改本文而義亦明徑合從之也孔子象環豈自為之制歟記者傳聞而說者曲為之議似意之耳童子之節也緇布衣錦縁錦紳并紐錦束髪皆朱錦也用錦為緇布衣之縁又紳帶及約帶之紐皆用錦并以錦為緫而束髪其錦皆用朱色之錦此童子之飾其以父母存而尚采歟用孔氏補肆束及帶勤者有事則收之走則擁之肆古音肄今讀如字肆伸之也束所以約帶之組紐也勤謂執勤勞之事也伸束及帶所以為容有事則收之身湏趨走則擁抱之於懷或云此承上文言童子以朱錦束髪肆之使至帶陳氏陸氏此篇自而素帶終辟以後至走則擁之鄭氏謂多錯簡天台賈蒙依其説改次前後今録下方天子素帶朱裏終辟而素帶終辟而衍字元夲無諸侯字疑脱大夫素帶辟垂士練帶率下辟居士錦帶弟子縞帶并紐約用組三寸長齊于帶紳長制士三尺有司二尺有五寸子游曰三分帶下紳居二焉紳韠結三齊大夫大帶四寸雜帶君朱緑大夫𤣥華士緇辟二寸再繚四寸凡帶有率無箴功肆束及帶勤者有事則收之走則擁之童子不裘不帛不屨絇無緦服聽事不麻無事則立主人之北南靣見先生從人而入絇其俱反絇屨頭飾不裘帛恐太温也不屨絇未成禮也不服緦惟聽給事而不服麻無事則旁立為其㓜也從人而入不敢獨勞長者與為禮也用孔氏陸氏補侍食於先生異爵者後祭先飯客祭主人辭曰不足祭客飱主人辭以䟽主人自置其醬則客自徹之一室之人非賔客一人徹壹食之人一人徹凡燕食婦人不徹飯扶晚反飱音孫先生尊者也異爵貴者也饌不為己設故後人而祭示為尊者嘗食故先人而飯也客祭盛主人之饌客飱美主人之食故主人皆辭之䟽言麤也主人自置醬者敬客客自徹者敬主一室之人自食非有賔客惟使少者一人徹壹食謂若同盤而食亦惟一人徹不以無賔主而廢禮也婦人不徹弱不備禮也鄭氏孔氏方氏輔氏食棗桃李弗致于核𤓰祭上環食中棄所操凡食果實者後君子火孰者先君子有慶非君賜不賀有憂者勤者有事則收之走則擁之操七刀反先後並去聲環謂𤓰外圓中虛横斷之形如環操謂手所持者弗致于核謂懷核不置於地也食𤓰亦祭先祭以其上環食其中棄其手之所操果實隂陽所成産之味以先食為新故後於君子而食火孰謂和所成之味以後食為謹故先於君子而食有慶非君賜不賀陸氏并下文有憂者釋之云有憂者有慶唯君賜然後賀勤者有事則收之走則擁之前章之文重出鄭氏孔氏方氏孔子食於季氏不辭不食肉而飱凡客將食興辭而孔子不辭凡禮食先胾次殽至肩則飽乃飱孔子又不食而飱是季氏失禮而孔子以微意警之是亦教誨之也孔氏輔氏應氏君賜車馬乗以拜賜衣服服以拜賜君未有命弗敢即乗服也君賜稽首據掌致諸地酒肉之賜弗再拜凡賜君子與小人不同日乗服以拜敬君惠也非經君命雖有車馬衣服不敢輙乗服也據掌以左手覆按右手之上致諸地者致首於地㳟之至也酒肉之賜弗再拜輕也賜君子小人不同日謹尊卑也鄭氏孔氏陸氏凡獻於君大夫使宰士親皆再拜稽首送之膳於君有葷桃茢於大夫去茢於士去葷皆造於膳宰大夫不親拜為君之荅己也造七報反為于偽反宰謂善宰主飲食官葷辛莱桃桃枝茢菼帚皆熏祓不祥者大夫使宰獻士親獻皆拜送膳於君所熏祓其不祥造詣膳宰而進之大夫不敢親拜進君者恐煩君之答己鄭氏孔氏大夫拜賜而退士待諾而退又拜弗答拜大夫親賜士士拜受又拜於其室衣服弗服以拜敵者不在拜於其室大夫拜竟即退不待報恐君召進而答己也士賤君無答拜之禮又待小臣傳君之報諾而後退又拜者又拜君之諾報也弗答拜者君不答士拜也大夫賜士士既拜受又往拜謝於大夫之室所謂再拜也衣服弗服以拜者君之賜則服以拜大夫輕於君故不服其所賜而拜也敵己者有賜而不在家不及拜受則往拜謝於賜者之室也本孔氏説凡於尊者有獻而弗敢以聞士於大夫不承賀下大夫於上大夫承賀親在行禮於人則稱父人或賜之則稱父拜之弗敢以聞恐其凟也如少儀云致馬資於有司及所謂贈從者之屬皆弗敢以聞也士卑於大夫不敢受其賀下大夫於上大夫尊近故受賀父在行禮與受賜皆稱父事統於尊也鄭氏孔氏方氏禮不盛服不充故大裘不裼乗路車不式服襲為充羙於内惟盛禮乃然大裘不裼是以祀天禮盛也乗路不式路車亦以祀天禮盛無他敬也父命呼唯而不諾手執業則投之食在口則吐之走而不趨親老出不易方復不過時唯速於諾走速於趨方氏親癠色容不盛此孝子之䟽節也父没而不能讀父之書手澤存焉爾母没而杯圏不能飲焉口澤之氣存焉爾癠才細反圏起權反疏粗圏屈木所為巵匜之屬手澤汗之所漬津之所漬親病而憂未為至孝親没而觸痛不忍可以觀其孝矣補君入門介拂闑大夫中棖與闑之間士介拂棖賔入不中門不履閾公事自闑西私事自闑東闑魚列反棖直衡反闑門中央所豎短木棖門兩旁長木介副也賔之拂謂衣拂之也上介近君稍中故衣拂闑大夫之介㣲逺於闑故中於棖與闑之兩間士介卑去闑逺故拂棖不中門者嫌於自尊不履閾者嫌於自髙公事謂聘享為國而與主君敵故自闑西客禮也私事謂私覿為己則從主君而已故自闑東不敢以客禮自居也集鄭氏孔氏方氏説君與尸行接武大夫繼武士中武徐趨皆用是疾趨則欲發而手足毋移圏豚行不舉足齊如流席上亦然端行頥霤如矢弁行剡剡起屨執龜玉舉前曵踵蹜蹜如也圏舉逺反豚大本反齊音咨君天子諸侯也尸祭祀象神之尸也武迹也接武蹈半迹繼武迹相及中武迹間容迹凡徐趨皆用與尸行之節疾趨屨常欲起手足猶冝直正不得邪低揺動圏轉豚循也轉足循地而行不舉足謂足不離地也齊裳下緝也足既不動則裳下曵地如水流於地之狀也端行謂直行或謂端冕之行頥如屋霤之垂行如矢之直也弁行謂急行或謂戴弁之行剡剡銳利屨頭起發之状也執龜玉則舉前而曵其後踵足蹜蹜如有循鄭氏孔氏方氏凡行容惕惕廟中齊齊朝廷濟濟翔翔齊才兮切翔音洋惕惕直疾貌齊齊㳟慤貌濟濟有威儀矜莊翔翔行而張拱君子之容舒遲見所尊者齊遬足容重手容㳟目容端口容止聲容靜頭容直氣容肅立容德色容莊坐如尸燕居告温温齊音咨遫音速舒遲徳性自然也齊遫則見所尊又警而變遫猶蹙也足容重舉欲遲手容恭拱而正目容端毋滛視口容止無妄言聲容靜不噦咳頭容直不傾顧氣容肅似不息立容徳中立不倚儼然有德之氣象色容莊勃如戰色坐如尸不動也告謂教使燕居時告教人温温然匪怒伊教也鄭氏孔氏應氏凡祭容貌顔色如見所祭者如覩其人在此鄭氏䘮容纍纍色容顚顚視容瞿瞿梅梅言容繭繭顚音田又丁年切瞿紀具反䘮容緫言之其下分言之皆䘮容也纍纍羸憊貌顚顚摧落貌瞿瞿驚遽貌梅梅瞹眛貌繭繭聲氣卑微也鄭氏孔氏補戎容暨暨言容詻詻色容厲肅視容清明立容辨卑毋讇頭頸必中山立時行盛氣顚實楊休玉色詻五恪反辨古音貶今讀如字顚音田戎容緫言之其下分言之皆戎容也曁曁果毅貌詻詻教令嚴立容辨卑毋讇古通為一句謂雖自貶卑而無謟媚山隂黄氏各三字為句立容明辨雖卑遜而毋失之謟媚也山立如山不動也時行時而即行也盛氣顛實戰勇之氣顛實於中也揚休揚其休羙玉色粹美瑩徹也用鄭氏孔氏補凡自稱天子曰予一人伯曰天子之力臣諸侯之於天子曰某土之守臣某其在邊邑曰某屛之臣某其於敵以下曰寡人小國之君曰孤擯者亦曰孤上大夫曰下臣擯者曰寡君之老下大夫自名擯者曰寡大夫世子自名擯者曰寡君之適公子曰臣孽士曰傳遽之臣於大夫曰外私大夫私事使私人擯則稱名公士擯則曰寡大夫寡君之老大夫有所往必與公事為賔也適音的使色吏反賔必刃反屛謂屛衛中國擯相也公子庶子也故自稱孽傳遽以車馬給使士自稱職之卑也士臣於大夫曰私人此士既不與大夫為臣故對大夫稱曰外私公士擯者謂正聘用公家之士賔介也鄭氏孔氏明堂位第十四昔者周公朝諸侯於明堂之位天子負斧依南鄉而立三公中階之前北靣東上諸侯之位阼階之東西靣北上諸伯之國西階之西東靣北上諸子之國門東北靣東上諸男之國門西北靣東上九夷之國東門之外西靣北上八蠻之國南門之外北靣東上六戎之國西門之外東靣南上五狄之國北門之外南靣東上九采之國應門之外北靣西上四塞世告至此周公明堂之位也塞先代反斧即黼依即扆為屛風畫斧形在戸牖間負者背之而立也九采九州之牧四塞謂夷服在四方為蔽塞者周公相成王漢儒以為代之朝諸侯傳聞既不審矣鄭康成又竟指天子為周公何過耶有周朝諸侯之位見於康王之誥亦不過東西二伯帥之此書五等諸侯與四夷各班又以九州之牧次於四夷之外皆未安補明堂也者明諸侯之尊卑也昔殷紂亂天下脯鬼侯以饗諸侯是以周公相武王以伐紂武王崩成王㓜弱周公踐天子之位以治天下六年朝諸侯於明堂制禮作樂頒度量而天下大服七年致政於成王成王以周公為有勲勞於天下是以封周公於曲阜地方七百里革車千乗命魯公世世祀周公以天子之禮樂是以魯君孟春乗大路載弧韣旂十有二旒日月之章祀帝于郊配以后稷天子之禮也弧音胡韣音獨弧旌旗所以張幅者韣則韜弧之衣明堂布政之堂明取嚮明之義今曰明諸侯之尊卑是特釋位之為義耳然諸侯之班爵素定其尊卑不待此而後明也成王㓜周公以冡宰聽其政今曰踐天子之位周公無此事也周室班爵之制諸侯不過百里今曰地方七百里周室無此制也魯惠公始請郊於東周至僖公然後用郊春秋書之以著其非今曰成王命魯公祀帝于郊成王亦未嘗有此舉也封爵當以孟子為正魯郊當以吕覽為正葢皆周末先秦之書也明堂位作於漢儒漢儒多出於魯魯之僣大始於春秋遂有矯飾之說傳流至漢漢儒因而述之弗考爾補季夏六月以禘禮祀周公於太廟牲用白牡尊用犧象山罍鬱尊用黄目灌用玉瓚大圭薦用玉豆雕篹爵用玉琖仍雕加以璧散璧角爼用梡嶡升歌清廟下管象朱干玉戚冕而舞大武皮弁素積裼而舞大夏昧東夷之樂也任南蠻之樂也納夷蠻之樂於太廟言廣魯於天下也犧古素何反今如字篹息緩又袒管反琖側眼反散先旦反嶡居衞反梡苦管反任而林反禘大祭白牡殷牲犧尊畫犧象尊畫象罍貯酒而給於尊者為之雷文以示戒故曰罍山謂刻山雲為罍也鬱尊者盛鬱鬯之尊黄目黄彛也鏤金為龜目故曰黄目灌謂酌鬱尊以獻瓚形如槃容五升以大圭為柄是謂圭瓚玉豆以玉飾豆篹籩屬以竹為之雕者刻飾其柄爵者酌酒獻尸之杯琖夏后氏爵名飾之以玉仍雕者因爵之形而為之飾也加者加爵琖則爵而已一升曰爵四升曰角五升曰散皆爵之大者璧者以璧飾其口俎盛肉者虞爼名梡直而有脚夏爼名嶡脚中央添横木下管象者堂下吹管以播象武之詩朱干干盾也以朱飾其背玉戚戚斧也以玉飾其柄大武周舞大夏夏舞素積者素衣其衣積疊昧東夷樂名任南蠻樂名凡皆侈言魯用天子禮樂且自釋其義以為廣魯於天下然天下周之有而云欲廣魯於天下將何為耶補君卷冕立于阼夫人副褘立于房中君肉袒迎牲于門夫人薦豆籩卿大夫賛君命婦賛夫人各揚其職百官廢職服大刑而天下大服是故夏礿秋嘗冬烝春社秋省而遂大蜡天子之祭也卷音衮褘音輝卷冕龍衮而冕副首飾褘翬也衣之所畫凡亦侈言魯用天子禮樂然於祭祀而云百官廢職服大刑則三代之王未聞有承祀者不職而加之極刑者也若云姑為是法而已則天下何從而大服夫四罪而天下服舜實見之行事然後天下服爾若為之法而天下服何速耶補太廟天子明堂庫門天子臯門雉門天子應門振木鐸於朝天子之政也魯之太廟即天子之明堂也魯之庫門即天子之臯門也魯之雉門即天子之應門也魯以木鐸振於朝是亦天子之布政也每事以天子誇魯之盛而不知此魯之失也補山節藻棁復廟重檐刮楹達鄉反坫出尊崇坫康圭䟽屛天子之廟飾也棁專悦反鄉許亮反康苦浪反舉也馬氏讀如字安也節今屋梁之斗栱山節刻山為文也梲今梁上之短柱藻棁畵藻為飾也復廟重屋也凡前殿曰廟後殿曰寢揔而名之皆曰廟也重檐者就外簷下壁復安板檐以避風與雨之灑壁也刮楹者刮之使浄楹者柱也達鄉者達之使明鄉者牖屬反坫者嚮外之坫出尊者謂置酒尊而出於坫之上也崇坫者崇髙之坫康圭者謂受賔圭而安於坫之上也凡坫皆以土築之屛者今桴思謂城隅缺上為屋以覆屏墻之小樓䟽者刻為雲氣蟲獸凡亦侈言魯之用於廟皆天子之廟飾也補鸞車有虞氏之路也鉤車夏后氏之路也大路殷路也乗路周路也有虞氏之旂夏后氏之綏殷之大白周之大赤夏后氏駱馬黒鬛殷人白馬黒首周人黄馬蕃夏后氏牲尚黒殷白牡周騂剛泰有虞氏之尊也山罍夏后氏之尊也著殷尊也犧象周尊也爵夏后氏以琖殷以斚周以爵灌尊夏后氏以雞夷殷以斚周以黄目其勺夏后氏以龍勺殷以䟽勺周以蒲勺土鼓蕢桴葦籥伊耆氏之樂也拊摶玉磬揩擊大琴大瑟中琴小瑟四代之樂器也鬛力輒反蕃音煩著直略反斚音嫁勺布灼反蕢讀為凷苦對反與塊同桴音浮葦于鬼反揩居八反鸞車車有鸞和為行節也鉤車鉤曲也謂車有曲輿葢曲其前䦨也大路木路乗路玉路此四代車路之别旂之制始於舜子華子云舜建太常綏者旂旒之係於繩而垂者也殷尚白周尚赤此四代旂常之别白馬黒鬛曰駱馬以毛物為主而鬛又毛之長者故以鬛言夏尚黒故用黒鬛駱白黒相間也蕃赤也凡言馬夏黒殷白周騂剛赤色此三代牛牲之别泰瓦尊山罍畫為山雲之形著者尊無足而底着地犧象者畫犧與象為尊之飾此四代尊之别琖鍾之小者謂卑淺若琖然故名琖斚稼也畫為禾稼爵象雀有足而尾此三代爵之别灌尊灌鬯之尊也雞夷即雞彛刻木為雞形而畫雞於彛斚畫禾稼黄目鏤目而飾以金勺灌尊所用以酌酒者也龍勺勺為龍頭䟽勺謂通刻勺頭為雉頭也蒲勺謂刻勺為鳬頭其口㣲開如蒲草本合而末㣲開此三代灌尊及勺之别土鼓築土為鼔蕢桴以凷塊同為桴葦籥截葦為籥籥者如笛而三孔伊耆氏古之本始禮樂者拊取聲淺搏取聲深揩猶戛謂戛柷擊謂擊敔皆所以莭樂者此四代之樂之别又推其始於伊耆氏者也車也旂也牲也尊也爵也勺也樂也皆前代帝王之制魯兼用之記者侈言之施之周公之廟猶曰報功施之魯國難乎免於僣矣用陳氏補魯公之廟文世室也武公之廟武世室也米廩有虞氏之庠也序夏后氏之序也瞽宗殷學也頖宫周學也崇鼎貫鼎大璜封父龜天子之器也越棘大弓天子之戎器也夏后氏之鼓足殷楹鼓周縣鼓垂之和鍾叔之離磬女媧之笙簧夏后氏之龍簨虡殷之崇牙周之璧翣有虞氏之兩敦夏后氏之四璉殷之六瑚周之八簋爼有虞氏以梡夏后氏以嶡殷以椇周以房爼夏后氏以楬豆殷玉豆周獻豆有虞氏服韍夏后氏山殷火周龍章有虞氏祭首夏后氏祭心殷祭肝周祭肺夏后氏尚明水殷尚醴周尚酒有虞氏官五十夏后氏官百殷二百周三百有虞氏之綏夏后氏之綢練殷之崇牙周之璧翣凡四代之服器官魯兼用之是故魯王禮也天下傳之乆矣君臣未甞相弑也禮樂刑法政俗未甞相變也天下以為有道之國是故天下資禮樂焉敦音對又都雷切椇俱甫切楬苦瞎切綢叨刀切魯公伯禽武公伯禽之𤣥孫名敖以魯此二廟比周文武之廟世室言不毁也米廩魯學謂即虞之庠皆言養也與序瞽宗頖宫緫言魯兼四代之學也崇貫封父越皆國名棘即㦸大弓武王之弓此言魯有天子之器也鼓足鼓有四足也楹鼓以柱貫中縣則在上垂叔女媧皆古人名和鍾編鍾離磬特磬笙簧笙中作簧簨虡所以縣鍾磬横曰簨植曰虡龍其飾也崇牙謂於簨之上刻木為崇牙之形以挂鍾磬璧翣者畫繒為扇戴小璧於其上此言魯前代之樂器也敦璉瑚簋皆黍稷器梡斷木為四足嶡添横距椇曲橈之如枳椇樹枝房爼下横闊如房楬豆以木為柄獻謂䟽刻之此言魯兼前代之禮器也韍即蔽膝之韠山火龍章所畫之文此言魯兼前代之祭服也祭首心肝此言魯兼前代之祭禮也尚明水醴酒此言魯兼前代之獻酒也官五十至三百此言魯兼前代之官制也綏謂旌旗之緌綢練謂綢杠以練杠旂竿崇牙刻繒為崇牙之形以飾旌旗之側翣如扇形以障柩車戴之以璧此言魯兼前代之葬儀也凢四代帝王之服器官魯果兼用之非特分之所不當亦恐力之所不及春秋時魯弑三君又公廟立於私家自三桓始夫人之不命於天子自魯昭公始士之有誄由魯莊公始婦人之髽而弔自臺駘始𤣥冠紫綏自魯桓公始朝服之以縞自季康子始今云君臣未嘗相弑政俗未嘗相變亦近誣矣雖曰隠惡不若不言之愈也用鄭氏及慶源輔氏補喪服小記第十五斬衰括髪以麻為母括髪以麻免而以布齊衰惡笄以終喪衰七雷反為于為反免音汶斬衰父服始死括髪以麻若為母始雖亦以麻至侇尸出堂後又哭則改而免以布免者以布為卷幘以約四垂短髪自項而前交於額也齊衰惡笄以終䘮者婦人質於䘮有除無變鄭氏男子冠而婦人笄男子免而婦人髽其義為男子則免為婦人則髽免音汶男子吉有冠䘮則𤣥冠而免婦人吉有笄䘮則去笄而髽補苴杖竹也削杖桐也杖之别祖父卒而后為祖母後者三年承重為父母長子稽顙大夫弔之雖緦必稽顙婦人為夫與長子稽顙其餘則否婦人既嫁則所重在夫補男主必使同姓婦主必使異姓異姓謂同宗之婦鄭氏為父後者為出母無服重在父親親以三為五以五為九上殺下殺旁殺而親畢矣殺邑界反三者已與父及子三世也以三為五者上因父而及祖下因子而及孫則為五以五為九者上因祖而又及髙祖下因孫而又及𤣥孫為九也上殺者祖以上服漸輕下殺者孫以下服漸輕旁殺者髙祖以下之旁從服亦漸輕而至於盡矣用鄭氏補王者禘其祖之所自出以其祖配之而立四廟庶子王亦如之庶子立為王與適子為王者其奉先廟制同補别子為祖繼别為宗繼禰者為小宗有五世而遷之宗其繼髙祖者也别子者諸侯之庶子别為後世之始祖繼别者别子之世長子為其族之宗所謂百世不遷之大宗也繼禰者别子庶子之長子為其昆弟之宗所謂五世則遷之小宗也小宗有四或繼髙祖或繼曾祖或繼禰皆至五世而遷特舉繼髙祖者言之耳鄭氏是故祖遷於上宗易於下尊祖故敬宗所以尊祖禰也祖遷於上謂髙祖之父以次而祧也宗易於下謂繼髙祖而下三從族父以次而踈也因尊祖故敬宗宗者祖禰之正體故敬宗所以尊己之祖禰也孔氏庶子不祭祖者明其宗也庶子不為長子斬不繼祖與禰故也斬謂斬衰庶子不祭殤與無後者殤與無後者從祖祔食庶子不祭禰者明其宗也殤與無後者皆祔於祖祖與禰皆宗子祭補親親尊尊長長男女之有别人道之大者也言服之所以降殺鄭氏從服者所從亡則已屬從者所從雖没也服妾從女君而出則不為女君之子服從服謂於己無服於己所從之人有服己所從之人既没則已謂若君母之父母昆弟若妾為女君之黨君母與女君既没不必為之服也屬者骨血連屬以為親屬從則非於己非親而徒從人為服者比如子從母而服母之黨夫從妻而服妻之黨母與妻雖沒猶為其黨服也妾為女君之黨服故為女君之子服若妾與女君俱出女君雖猶為其子服朞而妾則義絶無服矣用鄭氏説補禮不王不禘禘者禘其祖之所自出惟王為然諸侯以下及始祖耳補世子不降妻之父母其為妻也與大夫之適子同為于偽反適丁歴反妻父母不降服為妻故親之也為妻齊衰而不杖父為主子不得伸也鄭氏孔氏父為士子為天子諸侯則祭以天子諸侯其尸服以士服父為天子諸侯子為士祭以士其尸服以士服尸服以父之爵祭食以子之爵然父為士而子為天子與父為天子而子為士乃後世事人情所不忍言而漢人言之若以義例明禮似不若父為大夫子為士之説安也補婦當䘮而出則除之為父母䘮未練而出則三年既練而出則己未練而反則期既練而反則遂之當䘮當舅姑䘮女嫁則恩隆於夫家被出則恩復隆於父母得反則恩復隆於夫家方氏再期之䘮三年也期之䘮二年也九月七月之䘮三時也五月之䘮二時也三月之䘮一時也故期而祭禮也期而除䘮道也祭不為除䘮也三年而后塟者必再祭其祭之間不同時而除䘮再期云三年期云二年皆占禫言之也言䘮莭應嵗時之氣䘮祭與除䘮不同時再祭謂祥與練鄭氏大功者主人之䘮有三年者則必為之再祭朋友虞祔而已身有大功九月䘮而主同姓三年之䘮則必為之再祭以盡三年䘮之禮若為朋友主則既塟後虞祭祔廟而止補士妾有子而為之緦無子則已妾以有子為恩補生不及祖父母諸父昆弟而父税䘮已則否税他活反又他外反税者日月已過始聞䘮而追服此謂父在他邦生己己不及識祖父祖母諸父昆弟聞其死已過時而父追服己無追服本鄭氏説為君之父母妻長子君已除䘮而后聞䘮則不稅降而在緦小功者則稅之卿大夫出聘君諸親之䘮已除則不必追服葢從服者其情輕也緦小功不稅則是逺兄弟終無服故必追服之葢屬從者其情重也逺兄弟輕服皆自父祖之親降殺而及之故云降而在緦小功補近臣君服斯服矣其餘從而服不從而税君雖未知䘮臣服已此言君出朝聘未反而君之諸親有䘮者從行卑近之臣則随君而服不問服限之已除未除也其餘為臣之貴者君親服限未除則從之服若已除不從之追服若在國之臣君雖在外未知諸親之䘮其臣先已䘮服矣用孔氏補虞杖不入於室祔杖不升於堂此論哀殺去杖之莭孔氏為君母後者君母卒則不為君母之黨服為君母後謂無適立庶為後也君母卒則不為君母之黨服異於適也適為後從母没亦服母之黨用孔氏補絰殺五分而去一杖大如絰殺色界反首絰大一搤搤謂拇指與第二指一圍也要絰較小杖大如要絰晦庵及鄭氏説妾為君之長子與女君同重正統也鄭氏説除䘮者先重者易服者易輕者除䘮謂練男子除乎首婦人除乎帶易服謂先遭重䘮後遭輕䘮男子易乎帶婦人易乎首男重首絰女重要絰也鄭氏孔氏無事不辟廟門哭皆於其次辟婢亦反廟殯宫辟開也次謂倚廬鬼神尚幽廟冝閉鄭氏説補復與書銘自天子逹於士其辭一也男子稱名婦人書姓與伯仲如不知姓則書氏復招魂銘明旌周禮天子復曰臯天子復則不稱名取妻亦無不知姓者先儒遂以此為殷禮集鄭氏孔氏斬衰之葛與齊衰之麻同齊衰之葛與大功之麻同麻同皆兼服之初服麻既虞變葛斬衰之葛齊衰之麻絰皆五寸七分之一帶五寸二十五分寸之十九齊衰之葛大功之麻絰皆五寸二十五分寸之十九帶四寸百二十五分寸之七十六兼服之者謂若斬衰卒哭男子變要絰以葛若又遭齊衰之麻易葛帶其首絰猶是斬衰之麻是兼之也下放此鄭氏及山隂陸氏報葬者報虞三月而后卒哭報鄭音赴陸氏如字報鄭讀為赴疾之赴云不及期而葬訓急疾也山隂陸氏謂不及期而葬者報而後知之故云報葬即及期則有會而無報急葬者急虞祭安神宜急也凡虞祭畢即卒哭今卒哭必待三月巳之䘮痛則奪之不忍急也合孔氏陸氏説父母之䘮偕先葬者不虞祔待後事其葬服斬衰偕俱也謂父母同月若同日死先葬者母也先輕葬服斬衰從重雖葬母亦以父之服父未葬不得變服也鄭氏孔氏大夫降其庶子其孫不降其父大夫不主士之䘮大夫降其庶子者父於子本期服今大夫尊而庶子賤故降服大功也其孫不降其父者孫謂庶子之子大夫於庶子之服雖降於庶子之子不降重繼世也不降其父謂亦服大功如於庶子也孔氏方氏皆謂庶子之子不降其父猶為三年卑不可以降尊也亦通恐子無降父服之理不必立此言耳大夫不主士之䘮謂不以尊攝卑補為慈母之父母無服慈母撫己者也父雖命為母子本非骨肉故止為慈母服不為慈母之父母服異於生己之母也用孔氏補夫為人後者其妻為舅姑大功夫為本生父母期其妻降一䓁不貳降也合熊氏鄭氏説士祔於大夫則易牲祖為大夫孫為士孫死祔祖用大夫牲少牢不敢以卑牲祭尊也鄭氏孔氏繼父不同居也者必嘗同居皆無主後同財而祭其祖禰為同居有主後者為異居繼父謂母後嫁之夫母嫁子不隨固無繼父之名自無服此言夫死妻稚子幼無大功之親隨母嫁後夫後夫亦無大功之親彼此同財而祭其祖禰是為同居其服期有主後而異財為異居其服三月鄭氏孔氏哭朋友者於門外之右南靣變於有親者也門外寢門外右西邊賔也南靣嚮南以荅弔客鄭氏孔氏祔葬者不筮宅士大夫不得祔於諸侯祔於諸祖父之為士大夫者其妻祔於諸祖姑妾祔於妾祖姑亡則中一以上而祔祔必以其昭穆諸侯不得祔於天子天子諸侯大夫可以祔於士宅葬地中一以上謂超越一位各隨昭穆前人已葬者不再筮祔則隨其爵卑不得祔尊尊得祔卑孔氏為母之君母母卒則不服母之君母外祖適母也母在而為之服已則從之服母若亡則不復為之服所謂從服者所從亡則已用鄭氏孔氏補宗子母在為妻禫父在適子為妻不杖不杖則不禫父没母存則為妻得杖且禫矣此嫌宗子尊疑厭其妻故特言之謂雖宗子母在亦為妻禫葢宗子尊則其妻亦尊不得以母在為厭也本賀氏説為慈母後者為庶母可也為祖庶母可也妾子無母者父命他妾養之名慈母有服記因觸類既為慈母服亦可為庶母庶祖母服庶母父妾嘗生子者祖庶母祖之妾嘗生子者為父母妻長子禫四者皆重故為之禫補慈母與妾母不世祭也以其非正於子祭於孫止鄭氏丈夫冠而不為殤婦人笄而不為殤為殤後者以其服服之冠笄則成人矣凡殤皆未成人而死者也未成人無為父之道茍為其後惟以本親之服服之本鄭氏説乆而不葬者唯主䘮者不除其餘以麻終月數者除䘮則已未葬不除䘮其餘旁親大功以下以麻終月數者䘮限既滿則除之不待主人之既葬也用鄭氏補箭笄終䘮三年箭笄以箭為笄此言女為父服齊衰三月與大功同者繩屨齊衰三月為尊者服大功九月為卑者服故雖月數不同而同以繩為屨用孔氏補練筮日筮尸視濯皆要絰杖繩屨有司告具而后去杖筮日筮尸有司告事畢而后杖拜送賔大祥吉服而筮尸練期年之祭大祥再期之祭濯謂溉祭器臨事去杖事畢而杖以拜送賔皆敬也大祥吉服不以㓙臨吉也鄭氏庶子在父之室則為其母不禫庶子不以杖即位父不主庶子之䘮則孫以杖即位可也父在庶子為妻以杖即位可也庶子為母不禫為父在厭也不以杖即位下適子也位朝夕哭位也孫以杖即位祖不厭孫孫得伸也父在庶子為妻以杖即位父不主妾䘮故亦不主庶婦而子得伸也鄭氏孔氏諸侯弔於異國之臣則其君為主諸侯弔必皮弁錫衰所弔雖已葬主人必免主人未䘮服則君亦不錫衰免音問錫麻之滑易者諸侯弔其臣其君代之主禮敵也必皮弁錫衰諸侯之弔服也雖已葬必免後時而主從其客也未服䘮亦不錫衰先時而客從其主也補養有疾者不䘮服遂以主其䘮非養者入主人之䘮則不易已之䘮服養尊者必易服養卑者否養有疾者不䘮服求生主吉惡其㓙也遂以主其䘮謂疾者死無主後此養者為之主養時既去其服及為主時還與素無服同也非養者入主人之䘮則不易己之䘮服謂疾時既不去服為之養死後亦不必易服而為之䘮惟服其服而來也養尊者必易服養卑者否謂養尊者疾有忌卑於我者無忌也合鄭氏孔氏妾無妾祖姑者易牲而祔於女君可也女君適祖姑也易牲而祔若女君少牢妾則特豚下一等也鄭氏孔氏婦之䘮虞卒哭其夫若子主之祔則舅主之士不攝大夫士攝大夫唯宗子主人未除䘮有兄弟自他國至則主人不免而為主免音問虞卒哭私室之哀自主之若祔於祖廟則尊者宜主之也惟宗子可以士攝大夫宗子尊也不免而為主親質不崇敬也本鄭氏説陳器之道多陳之而省納之可也省陳之而盡納之可也省所領反陳器之道如其陳之數而納之正也即雖多陳之而少納之省陳之而盡納之禮亦不禁是之謂可山隂陸氏奔兄弟之䘮先之墓而後之家為位而哭所知之䘮則哭於宫而后之墓骨肉自然之親不特由主人故先之墓若所知由主人而後致哀故先哭於其宫然皆為己葬者言也孔氏父不為衆子次於外於庶子略故惟居寢孔氏與諸侯為兄弟者服斬兄弟期䘮而服斬衰者以其為君也方氏下殤小功帶澡麻不絶本詘而反以報之謂本期親在下殤降為小功者澡治其麻使白以為帶不斷絶其麻之根屈而上至要中合而糾之明親重也報猶合凡殤之帶散垂鄭氏孔氏方氏婦祔於祖姑祖姑有三人則祔於親者其妻為大夫而卒而后其夫不為大夫而祔為其妻則不易牲妻卒而后夫為大夫而祔於其妻則以大夫牲親祖姑謂舅所生不易牲以士牲為父後者為出母無服無服也者䘮者不祭故也適子當祭不敢為私䘮廢祖父之祭故不為出母服應氏婦人不為主而杖者姑在為夫杖母為長子削杖女子子在室為父母其主䘮者不杖則子一人杖姑在為夫杖姑不厭婦也母為長子削杖不可重於子之為己也女子子在室無男昆弟使同姓為攝主不杖則子一人杖謂長女也鄭氏緦小功虞卒哭則免既葬而不報虞則雖主人皆冠及虞則皆免為兄弟既除䘮已及其葬也反服其服報虞卒哭則免如不報虞則除之逺葬者比反哭者皆冠及郊而后免反哭免音問報音赴陸如字讀報古注以為急疾山隂陸氏以為告報之報免者以布繞項交前額而哭也禮葬曰即虞虞則免既葬而未虞則雖主人且皆冠及虞則皆免兄弟既除䘮而後葬報虞則免否則除之夫虞者虞度之義既葬而反祭於室虞度其神之所在而安之故以是日葬即以是日虞今乃有既葬而不報祭者豈葬之地去其室逺非於同日可虞者耶山隂陸氏謂過時而葬者禮使後其虞以責子道未知然否補君弔雖不當免時也主人必免不散麻雖異國之君免也親者皆免君過時而弔亦免為君變也本鄭氏説除殤之䘮者其祭也必𤣥除成䘮者其祭也朝服縞冠除殤之䘮異成人成人除䘮後禫祭方𤣥端奔父之䘮括髪於堂上袒降踊襲絰于東方奔母之䘮不括髪袒於堂上降踊襲免于東方絰即位成踊出門哭止三日而五哭三袒堂上殯宫堂上出門哭止者出殯宫門就於廬哭者止聞䘮已乆異於初死時在家者哭踊無莭也三日五哭者始至訖夕哭明日與又明日之朝夕哭凡五也三袒者始至袒明日又明日之朝袒凡三也然哀痛之情恐不若是拘鄭氏孔氏補適婦不為舅後者則姑為之小功謂夫有廢疾他故若死而無子不受重者故不為舅後適婦大功以不為後降小功小功庶婦服也本鄭氏説大𫝊第十六禮不王不禘王者禘其祖之所自出以其祖配之諸侯及其太祖大夫士有大事省於其君干祫及其髙祖王者禘其祖之自出而以其祖配如周禘帝嚳而以后稷配諸侯祫祭則及其始封之祖大夫士必有大事勲勞見省録於其君而後得及其髙祖謂之干祫干上達也用王氏葉氏説牧之野武王之大事也既事而退柴於上帝祈於社設奠於牧室遂率天下諸侯執籩豆逡奔走追王大王亶父王季歴文王昌不以卑臨尊也逡息俊反追王之王去聲牧室牧野之室逡疾也不以卑臨尊此漢儒之説而非追王之本意大王王季文王乃武王之祖父豈待追王而後尊雖未追王而以祖父下臨其子孫亦豈得謂之卑臨尊葢三王皆肇基之主而追王之且尊歸於祖父亦理當然耳用東萊補上治祖禰尊尊也下治子孫親親也旁治昆弟合族以食序以昭繆别之以禮義人道竭矣繆音穆治正也繆與穆同竭盡也鄭氏聖人南靣而聽天下所且先者五民不與焉一曰治親二曰報功三曰舉賢四曰使能五曰存愛五者一得於天下民無不足無不贍者五者一物紕繆民莫得其死聖人南靣而治天下必自人道始矣繆音謬紕猶錯也李氏云物被飾而不周曰紕物被飾而過實曰謬五事得則民足一事失則民不得其死故治民莫先於人道人道謂此五事鄭氏立權度量考文章改正朔易服色殊徽號異器械别衣服此其所得與民變革者也其不可得變革者則有矣親親也尊尊也長長也男女有别此其不可得與民變革者也權稱錘度丈尺量斗斛文章禮法服色車馬徽號旌旗之名器械禮樂器及兵甲衣服吉凶之制此借制度之可變以形人道之不可變主人道言也補同姓從宗合族屬異姓主名治際㑹名著而男女有别同姓父族從宗謂從大小宗合族屬謂合之於宗子之家序昭穆也異姓謂來嫁者主名謂夫為父行則主母名夫為子行則主婦名治際㑹謂治其昏禮交接之㑹各有分别不亂也鄭氏孔氏其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也謂弟之妻婦者是嫂亦可謂之母乎名者人治之大者也可無慎乎昭穆各係其夫兄弟之妻止同一行補四世而緦服之窮也五世祖免殺同姓也六世親屬竭矣免音問四世共髙祖而緦麻服盡五世共髙祖之父服袒免而無正服殺同姓也六世共髙祖之祖不復袒免止同姓而已故親屬竭鄭氏孔氏其庶姓别於上而戚單於下昬姻可以通乎繫之以姓而弗别綴之以食而弗殊雖百世而昬姻不通者周道然也庶衆也始祖為正姓髙祖為庶姓戚親也單盡也庶姓别於上謂自髙祖各為氏族矣戚單於下謂至四從兄弟而親屬盡矣問可以通昏姻否乎荅謂連繫之以本出之姓而不分别綴屬以飲食之禮而不殊異族人雖相去百世不通㛰姻周道然也此記者自為問荅以明其義用孔氏説服術有六一曰親親二曰尊尊三曰名四曰出入五曰幼六曰從服術猶道也親親之服父母為首尊尊君為首名謂世母叔母之屬出入謂女子子嫁者及在室者或謂出妻之子為母朞為人後者為其父母朞婦當䘮而出則除之未練而反則朞之類也長幼謂成人及殤從服若夫為妻之父母妻為夫黨本鄭氏説從服有六有屬從有徒從有從有服而無服有從無服而有服有從重而輕有從輕而重屬從如子於母之黨以親而從服為屬從徒從如臣為君之黨本非親而從服為徒從從有服而無服如公子為其妻之父母從無服而有服如公子之妻為公子之外兄弟從重而輕夫為妻之父母從輕而重公子妻為其皇姑鄭氏自仁率親等而上之至於祖名曰輕自義率祖順而下之至于禰名曰重一輕一重其義然也用恩則父母重而祖輕用義則祖重而父母輕鄭氏君有合族之道族人不得以其戚戚君位也君當親其族族不當自以為親而䙝君補庶子不祭明其宗也庶子不得為長子三年不繼祖也庶子上不敢凟其祖下不敢重其嗣尊歸於宗也陳氏别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼髙祖者五世則遷者也尊祖故敬宗敬宗尊祖之義也别子謂諸侯第二子以下悉不得禰先君别自為後世之始祖繼别謂别子之世適族人皆宗之是為大宗百世不遷繼禰則父之適子兄弟宗之是為小宗傳至五世服盡則遞遷用孔氏説有小宗而無大宗者有大宗而無小宗者有無宗亦莫之宗者公子是也别子之諸子祭别子别子雖是祖於諸子實則禰也繼禰者為小宗是為有小宗而無大宗别子之適子即繼父為大宗是為有大宗而無小宗别子為祖上不敢宗諸侯下亦無他公子來宗已是為有無宗亦莫之宗此三者唯公子有故結曰公子是也孔氏伊川公子有宗道公子之公為其士大夫之庶者宗其士大夫之適者公子之宗道也公子之公者公君也公子非宗而有宗道焉謂君復命其次庶代已為宗以宗主士大夫羣庶之在位者此公子之宗道也通典絶族無移服親者屬也移以豉反絶族無移服謂四從兄弟無服在旁而及曰移言不遷移及之也有親者各以其屬為服故曰親者屬也合東萊孔氏説自仁率親等而上之至於祖自義率祖順而下之至於禰是故人道親親也親親故尊祖尊祖故敬宗敬宗故收族收族故宗廟嚴宗廟嚴故重社稷重社稷故愛百姓愛百姓故刑罰中刑罰中故庶民安庶民安故財用足財用足故百志成百志成故禮俗刑禮俗刑然後樂詩云不顯不承無斁於人斯此之謂也斁音亦刑猶成也斁厭也率親而上至於祖則始乎親親率祖而下至於禰則終乎親親故人道親親而己推親親之極至於禮俗成而人樂之不厭合方氏孔氏少儀第十七聞始見君子者辭曰某固願聞名於將命者不得階主敵者曰某固願見罕見曰聞名亟見曰朝夕瞽曰聞名始見之見賢𥚹反亟去兾反不得階者自謙不得其階而進也古注乃以不得階主為句諸家費辭不可曉主敵謂主人敵體者也亟謂數見補適有䘮者曰比童子曰聼事適公卿之䘮則曰聼役於司徒比方氏去聲讀願比於執事者俱執事也凢適於有䘮者之家以助事為主補君將適他臣如致金玉貨貝於君則曰致馬資於有司敵者曰贈從者適他謂出朝㑹臣致貨以助謙曰馬資謂芻秣補臣致襚於君則曰致廢衣於賈人敵者曰襚親者兄弟不以襚進以衣遺死者曰襚襚君謙曰廢衣不敢必其以歛也於賈人以其知物善惡也周禮玉府有賈人掌受獻敵體則直曰襚若親者相襚則直陳之不執以將命曰進也本鄭氏説臣為君䘮納貨貝於君則曰納甸於有司甸謂田野之物此臣為君䘮進物之辭賵馬入廟門賻馬與其弊大白兵車不入廟門賵芳仲反以馬送死曰賵大白兵車革路之旗為送䘮之從車贈馬送死故入廟門賻馬弊以下助主人䘮用故不入廟門孔氏賻者既致命坐委之擯者舉之主人無親受也凡饋者拜受有䘮者不得拜受故賻者委之地擯者舉而取之孔氏説受立授立不坐性之直者則有之矣受授皆立則不坐人性有不能委曲如禮者雖坐君子不責也性之直猶所謂直情徑行者歟本山隂陸氏及晦菴説始入而辭曰辭矣即席曰可矣排闔説屨於戸内者一人而已矣有尊長在則否説吐活反闔謂門扉排謂推之使開在在内也始入門主人辭謝於賔擯者告主人曰辭謝賔矣謂辭謝賔今先入至賔主升堂各就席擯者恐賔主辭讓即席故云曰可矣言止不須辭也賔主登席衆入戸内雖尊卑相敵猶推一人為尊得脱屨於戸内餘皆於戸外然其内若先有尊者在則亦不敢於户内脱屨本孔氏説問品味曰子亟食於某乎問道藝曰子習於某乎子善於某乎問於人各婉其辭補不疑在躬不度民械不願於大家不訾重噐訾計度也重寳也械古作兵械慶源輔氏作機械不疑在躬者有諸己之謂信不度民械者不逆詐居室以茍完為善用噐以粗足為給故不願慕人之大家不訾計人之寳器也集補汜埽曰埽埽席前曰拚拚席不用鬛執箕膺擖汜芳劒反埽悉報反拚弗運反擖音葉汜廣也鬛帚之末如鬛也膺胷前擖箕之舌也内外俱滌蕩曰汜埽埽除席前之穢曰拚席上不用鬛以其常用埽地而不㓗也持箕舌自嚮胷前不敢嚮尊者孔氏説不貳問問卜筮曰義與志與義則可問志則否不貳問謂卜筮當正心義公理志私意義志為貳用孔氏補尊長於己踰等不敢問其年燕見不將命遇於道見則靣不請所之䘮俟事不犆弔侍坐弗使不執琴瑟不畫地手無容不翣也寢則坐而將命燕見之見賢遍反畫胡麥反踰等父兄黨也燕見不將命者就其燕居而見若子弟然不敢用賔主禮也遇於道可避則避不敢煩動也不請其所徃恐或有私便也事謂朝夕哭奠之時弔䘮必俟其行事不敢非時獨坐弔亦不敢故煩動之也侍坐非使之不敢執琴瑟不因畫地指説歛手不為容雖暑不揮扇尊長寢則坐而將命不敢下臨之也合鄭氏孔氏説侍射則約矢侍投則擁矢勝則洗而以請客亦如之不角不擢馬矢箭也射者先設箭中庭上耦下耦更進取箭各得四箭而升堂若侍尊長則不敢與更迭一時并取四矢為約矢投者投壺其矢則投壺之箭以柘與棘為之非竹箭之箭投壺則委矢於地坐而一一取之侍則不敢委之地而以手并抱為擁矢勝則洗爵而以請謂不敢使他子弟酌酒以罰尊者必自洗爵而請行觴客若勝亦洗爵而請自飲角謂罰爵之觥馬者投壺立筭為馬馬有威武射者所尚每一勝立一馬至三馬而成勝不角者不敢用巨觥為罰不擢馬者不敢㧞擢我馬在他馬之上皆敬讓尊上也集孔氏晦菴補執君之乗車則坐僕者右帶劒負良綏申之靣拖諸幦以散綏升執轡然後步拖徒可反幦音覔執執轡也良綏君所執以登車之緌散綏御者所執以登車之綏也幦軾上之覆苓也執君之乗車則坐謂守君之車者君不在車故坐以示不行也僕者御車之臣時君未登車御者帶劒於腰之右邊負君之良綏於背申之於靣前拖於式上之幦已則别執散綏以升車執六轡在手然後試車行五步而立此言為君駕車君猶未登車也用晦菴説請見不請退朝廷曰退燕游曰歸師役曰罷見賢遍反罷音皮請見者慕徳不請退者嫌於簡賢朝廷曰退嫌於貪進燕游曰歸嫌於忘返罷者休止之名易曰或鼔或罷師役既事則休息之也用東氏補侍坐於君子君子欠伸運笏澤劒首還屨問日之蚤莫雖請退可也欠起劒反還音旋蚤音早莫音幕志倦則欠體疲則伸運以手動澤以手摩還以手轉之凡皆倦怠之状長者如此侍者請退可矣鄭氏孔氏事君者量而后入不入而后量凡乞假於人為人從事者亦然然故上無怨而下逺罪也乞如字又音氣量謂度己之才與君之徳乞假從事皆量其可劉氏説不窺宻不旁狎不道舊故不戱色不窺宻嫌伺人私不旁狎不泛與人狎習不道舊故恐揚人宿過取怨不戱色當莊重鄭氏晦菴為人臣下者有諌而無訕有亡而無疾頌而無讇諌而無驕怠則張而相之廢則埽而更之謂之社稷之役亡去也疾怨也驕恃諌行而慢也怠與廢皆指政言鄭氏禮氏毋㧞來毋報徃毋瀆神毋循枉毋測未至士依於徳游於藝工依於法游於説毋訾衣服成器毋身質言語㧞蒲末反報古音赴今如字説如字又始鋭反毋抜來者事來則應毋抜而致之毋報往者事往則已毋追而報毋瀆神當敬毋循枉當改毋測未至當聴其自然藝射御之屬也説時變之制也衣服成器毋訾毁其不然疑事則毋質講義及孔氏方氏言語之美穆穆皇皇朝廷之美濟濟翔翔祭祀之美齊齊皇皇車馬之美匪匪翼翼鸞和之美肅肅雍雍齊如字齊皇之皇音往匪音騑與賔客言語形状穆穆皇皇然或曰言行相顧齊齊皇皇讀如歸往之往美鄭云當讀作儀問國君之子長幼長則曰能從社稷之事矣幼則曰能御未能御問大夫之子長幼長則曰能從樂人之事矣幼則曰能正於樂人未能正於樂人問士之子長幼長則曰能耕矣幼則曰能負薪未能負薪大夫之子常習學於樂故長則曰能從樂人之事幼則曰己能受政令於樂人執玉執龜筴不趨堂上不趨城上不趨武車不式介者不拜於重器於近尊於廹狹無容兵車不以容禮下人鄭氏婦人吉事雖有君賜肅拜為尸坐則不手拜肅拜為䘮主則不手拜肅拜俯其首而肅之也手拜手至地也為尸為祖姑之尸也婦人以肅拜為正雖君賜及為尸而或答拜皆不手拜而但肅拜為䘮主則不手拜者為夫與長子當稽顙鄭氏陳氏葛絰而麻帶絰首絰婦人所貴在要帶鄭氏取爼進爼不坐以爼有足立而進取便孔氏執虛如執盈入虛如有人重慎鄭氏凡祭於室中堂上無跣燕則有之祭不跣主敬燕有跣為歡鄭氏未嘗不食新人子不忍先食僕於君子君子升下則授綏始乗則式君子下行然後還立乗貳車則式佐車則否貳車者諸侯七乗上大夫五乗下大夫三乗君子升降皆僕授綏君子下車而行然後僕還立其處朝祀之副車曰貳尚敬故式田獵之副車曰佐尚武故不式集鄭氏孔氏説有貳車者之乗馬服車不齒觀君子之衣服服劒乗馬弗賈不齒不敢次論其年弗賈弗敢評議其價孔氏其以乗壺酒束脩一犬賜人若獻人則陳酒執脩以將命亦曰乗壺酒束脩一犬其以鼎肉則執以將命其禽加於一䨇則執一雙以將命委其餘乗壺四壺也於卑者曰賜於尊曰獻加多也多於一雙者止執一雙而委陳其餘孔氏犬則執緤守犬田犬則授擯者既受乃問犬名牛則執紖馬則執靮皆右之臣則左之緤息列反守手又反又如字紖文引反靮丁歴反緤牽犬繩守犬守禦宅舍田犬田獵所用紖牛繩靮馬韁臣所獲臣虜犬牛馬右之惟臣虜則左之者右手防其不測用孔氏説車則説綏執以將命甲若有以前之則執以將命無以前之則袒櫜奉胄器則執葢弓則以左手屈韣執拊劒則啓櫝葢襲之加夫襓與劒焉説吐活反奉芳勇反韣音獨拊芳武反櫝音獨夫音扶襓如遥反綏執以登車者櫜甲衣胄兠鍪韣弓衣拊弓把櫝劒函夫襓劒衣獻車者脫綏而執之以將命曲禮云獻車馬者執策綏甲若他有摯幣則執之無則袒櫜見甲奉其胄以將命曲禮云獻甲者執胄器則執器之葢弓則左手屈卷其弓衣而以弓拊將命曲禮云右手承簫左手承拊劒則先開劒函之葢襲之者以葢卻合於函下加函底於上而重合之故云襲加夫襓與劒者又加劒衣於函中而以劒置劒衣上鄭氏孔氏笏書脩苞苴弓茵席枕几穎杖琴瑟戈有刃者櫝筴籥其執之皆尚左手刀卻刃授穎削授拊凡有刺刃者以授人則辟刃穎京領反削音笑辟音避苞苴編萑葦褁魚肉穎警枕也筴蓍也籥如笛三孔卻刃授穎之穎謂刀柄之末以其有鐶鄭注作鐶笏也書也脩脯也苞苴也弓也茵也席也枕也几也穎也杖也琴也瑟也戈之有刃者櫝也筴也籥也凡十六物其執之皆尚左手刀則卻刃而授穎刀之有削不露刃則亦授以其把凡有刺刃者皆不以正鄉人用孔氏鄭氏補乗兵車出先刃入後刃軍尚左卒尚右出先刃向敵入後刃不以向國軍尚左將主生卒尚右士主殺鄭氏説賔客主恭祭祀主敬䘮事主哀㑹同主詡軍旅思險隱情以虞詡長樂劉氏謂煦也援經云德發揚詡萬物人君法天地作㑹同慶源輔氏曰軍旅思險者臨事而懼隠情以虞者好謀而成集燕侍食於君子則先飯而後已毋放飯毋流歠小飯而亟之數噍毋為口容客自徹辭焉則止飯扶晚反亟紀力反數色角反噍子笑反先飯若嘗食然後已若勸食然小飯小口而飯亟謂疾速而咽數噍謂數數嚼之無得弄口食訖自徹主辭則止孔氏客爵居左其飲居右介爵酢爵僎爵皆居右僎音遵客爵謂主人酬賔之爵賔不舉奠觶于薦東是客爵居左旅酬之時一人舉觶于賔賔奠于薦西至旅酬賔取薦西之觶以酬主人是其飲居右介者賔之輔也酢者賔所以酢主人也僎者鄉人為卿大夫來觀禮者也主人獻介介飲獻賔賔酢主人主人既飲獻僎是介爵酢爵僎爵皆飲爵故並居右孔氏羞濡魚者進尾冬右腴夏右鰭祭膴鰭音祈膴火呉反腴魚腹鰭魚脊膴刳魚腹大臠祭祭先也進尾者擗補麥反之由後鯁肉易離也冬時陽氣下在魚腹夏時陽氣上在魚脊陽氣所在之處肥美右則以右手取食之便也祭先則以大臠之羙本孔氏説凡齊執之以右居之於左齊才細反齊謂食羹醬飲有齊和者賛幣自左詔辭自右為君授幣則由君之左為君傳辭則由君之右酌尸之僕如君之僕其在車則左執轡右受爵祭左右軌范乃飲范音犯范與軌同軌謂轊末范謂軾前僕為尸御車者酌之則尸先祭車之左右軌及前范乃自飲祭者求神助使不欹危也凡羞有爼者則於爼内祭君子不食圂腴小子走而不趨舉爵則坐祭立飲凡洗必盥牛羊之肺離而不提心凡羞有湇者不以齊為君子擇葱薤絶其本末羞首者進喙祭耳圂與豢同音患提丁禮反湆起及反爼内近人之處故祭先食不出於爼外圂大豕之屬腴猪大腸也猪大亦食米糓與人同故君子避其腴不食小子走而不趨卑不得與賔介俱備禮容也舉爵先坐祭而後立飲坐祭為神立飲則已不可不敬也飲訖而洗爵亦先盥手先自潔也祭肺之法刳離而不絶心心謂肺中央少許提猶絶也湇汁也有湇者不再以鹽梅齊和嫌於薄主人之味也葱薤必絶其本末羞牲頭者進口以嚮長者若祭先取耳孔氏尊者以酌者之左為上尊尊壺者靣其鼻飲酒者禨者醮者有折爼不坐未步爵不甞羞禨其記反尊者設尊者也設尊之人預度酌酒人之左尊而實以𤣥酒必以尊之鼻當靣浴而飲曰禨冠而飲曰醮折骨體於爼曰折爼折爼為尊者故禨醮若有折爼者則不坐步爵者行爵不嘗羞晦菴孔氏牛與羊魚之腥聶而切之為膾麋鹿為菹野豕為軒皆聶而不切麕為辟雞兎為宛脾皆聶而切之切葱若薤實之醯以柔之軒音獻辟音壁脾毗攴反牛羊魚聶而切之謂先䐑直輙反為大臠而後報切之為膾菹以采為此云麋鹿為菹者制造之法如之也軒者大切之名辟雞宛脾皆菹之類孔氏方氏其有折爼者取祭反之不坐燔亦如之尸則坐折爼折骨於爼爼有足柄稍髙故取肺以祭既而反之皆可立而不坐燔肉於火亦然惟尸尊則坐孔氏衣服在躬而不知其名為罔衣服皆有名義所以著徳罔猶罔罔無知貌孔氏鄭氏其未有燭而有後至者則以在者告道瞽亦然凡飲酒為獻主者執燭抱燋客作而辭然後以授人軌燭不讓不辭不歌道音導燋惻角又子約反或在遥反以告者以夜暗不見燋謂未然之炬不讓不辭不歌皆為夜飲殺禮孔氏洗盥執食飲者勿氣有問焉則辟咡而對辟匹亦反咡而志反為尊長洗爵盥手執飲食勿以口氣及尊長謂屛氣也辟咡而對者口旁曰咡辟咡者辟之也孔氏方氏為人祭曰致福為己祭而致膳於君子曰膳祔練曰告凡膳告於君子主人展之以授使者于阼階之南南靣再拜稽首送反命主人又再拜稽首其禮大牢則以牛左肩臂臑折九个少牢則以羊左肩七个犆豕則以豕左肩五个臑奴報反曰致福曰膳曰告此皆致祭祀之餘於君子之辭自祭言膳謙辭也祔練言告不敢以為福膳也主人展之展省具也送與反命皆拜敬之至也折斷分之皆用左者右以祭也九个者取肩自上斷折之至蹄為九叚以獻之也鄭氏孔氏方氏國家靡敝則車不雕幾甲不組縢食器不刻鏤君子不履絲屨馬不常秣幾其衣反雕幾雕畫漆飾幾㣲也以㣲為工組縢甲飾縢約也黄氏日抄卷二十
