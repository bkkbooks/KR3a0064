body:
  text: 黄氏日抄卷六十五宋黄震撰讀文集七黄涪翁文賦賦十首對青竹得於嘉州意即吾鄉間碧玉之類也茶賦謂寒中瘠氣莫甚於茶或濟之鹽勾賊破家於是有胡桃松實云云蓋今用茶果云詩濓溪詩序言周茂叔人品甚髙胷中灑落如光風霽月晦庵謂此語最善形容有道者氣象而乃謂濓以志亷豈濓溪二子壽燾亦不詳家世之舊居以告耶木之郴郴詩謂知人之微楊修之取禍不如隰子之止伐木隰子又不如百里矣之去虞也郎罷出三卷送少章詩西風壮士涙多為程顥滴南忩讀書聲吾伊四卷海牛押簾録續見卷六銀茄但觀百世後傳者非公侯東坡移和靖配食水仙見七卷詩註暖足瓶名脚婆唐婆鏡葉底開花號羞天花山谷云此鬼臼也嵗生一臼滿十二嵗可為藥今方家所用乃鬼燈檠草耳書磨崖碑後撫軍監國太子事何乃趣取大物為桃李春風一盃酒江湖夜雨十年燈見九卷寄黄㡬復詩嘲小德詩學語囀春鳥塗窻行莫鴉蓮蓬竹夫人改名青奴匹似無田過一生見十卷今俗云譬似喪家狗喪本平聲山谷詩云顧我今成喪家狗期君早作濟川舟乃作去聲用猫兒頭笋見二卷在官而可行其私惟學而已十三卷壁隂齋銘行菴王良翰剪棕作川䖃䕢見十四卷演禪師賛人得交㳺是風月天開圖畫即江山序胡宗元詩集序王定國文集序小山集序皆山谷文之暢逹變化可壓卷者也若成誦可長一格十六卷伯夷叔齊廟記謂諌武王不用去而餓死則予疑之陽夏謝景平曰二子之事凡孔子之所不言可無信也其初蓋出荘周空無事實其後司馬遷作史記列傳韓愈作頌事傳三人而空言成實楊惠之以塑工妙天下為八萬四千手眼觀音不可措手故作千手眼今之作者皆祖惠之山谷請東坡作文法云但熟讀檀弓雜著以荘周内萹論為第一謂由荘周以來未見賞音者晩得向秀郭象䧟荘周為齊物之書以論語斷論為第二謂義理之會也不能心通性達終無所得以孟子斷篇為第三謂子雲知孟子解疑篇論御奴婢云退自省不肖之状在予躬者甚多墓誌狄遵禮知鄞縣縣無訟築亭觀延閩人章望之講學士子頗歸之呉革為吉州先是蹇周輔增鹽課二百萬民已失生理而魏綸上諸縣增課九十五萬公至則請今後所增鹽勿以為課韓復知五臺山寺務司五臺供施傾天下惡少年多竄僧籍中囊橐為奸君擿其魁宿置于法劉禹為德榮縣鹽井淡而征不除君為特蠲四十萬四會縣民岑探為妖經畧使遣将童政捕斬而政部曲多不法黄㡬復言於經畧謂一童政之禍百岑探不足云山谷貶黔州時李元叔仲良兄弟相繼周之山谷作銘誌簡明有法多佳者晁補之父與劉道原者宛轉尤佳題䟦題自書卷後予所僦舍雖上雨傍風家本農耕使不從進士則田中之廬舍如是又可不堪其憂耶貧士不能相活富子不足與語牧䕶歌是巴中賽神曲又見别集巴蜀自古多竒士獨不聞善書者菴非屋字不當從广三國焦光傳云居蝸牛廬中意是今菴後漢皇甫規持節監闗中兵親入菴廬巡視即用此菴字為有據依列子書有深禪妙句蓋普通中事不自葱嶺傳來信矣荆公勸俞清老脱逢掖著僧伽黎然生龜脱殻亦難堪忍後數年見之儒冠自若也山谷又嘗䟦贈清老謂其忿愠欲祝髪曰免與俗子浮沉予曰去而與祝髪者㳺其中雖有道人亦如沅江九肋龜爾與俗子為伍方自此始男女昏嫁渠儂墮地自有衣食分詩所謂誕置之隘巷牛羊腓字之其不應凍餓溝壑者天不能殺也今蹙眉終日者正為百草憂春雨耳意天字當作人一榦一華而香有餘者蘭一榦五七華而香不足者蕙爾雅山有宂為岫謝𤣥暉詩窻中列逺岫徐季海云孤岫龜形在皆誤用字荆公稱竹樓記勝醉翁亭記山谷主之歐公賞和靖疎影横斜之句山谷謂不如雪後園林纔半樹水邊籬落忽横枝司馬談之子遷劉向之子歆班彪之子固王銓之子隠姚察之子簡李藥師之子延夀劉知㡬之子餗皆繼世汗簡狂僧誓酒文見二十七卷二十八二十九兩卷皆評書法謂二王父子之後惟張長史顔魯公有韻本朝則東坡又論遺教經譯於姚秦𢎞始四年在王右軍沒後數年至貞觀中行遺教經縣印却不祥云昔有道人禁人競渡不行舟人有嘻笑者道人云此有道術夜當報我乃謁縣令置床卧而借縣印閣其上中夜有聲硜然至印而止吾鄉明州州印缺角聞昔有太守李夷庚精道術嘗坐三江亭望舶舟将至戯以荔子殻置酒盃而撥之舟亦與之俱旋俄而舟不旋夷庚驚曰此有報我者矣亟疊卓坐其下而閣州印其上俄有飛劔來缺印一角夷庚起而怒曰我戯爾乃遽耶作法沉荔子殻舟亦沉以今縣印事觀之則有之矣或問不俗之状曰難言也視其平居無以異於俗人臨太節而不可奪此不俗人也山谷欲取所作詩文為内篇其不合周孔者為外篇二十六卷末外集墨竹賦陽虎有若之似夫子市人識之顔回之具體門人不知贈李彦深上丁分膰一飯飽藏神夢訴羊蹴蔬上冢詩云松楸十年拱和云芝菌生畫栱拱與栱各字送曹子方詩子魚通印蠔破山愚聞子魚出興化通應港有通應侯廟故名此魚以小為貴無通印者東坡亦曾誤蓋傳聞以通應為通印泊舟白沙江口詩呼禹濟黄川呼禹字記出栁詩題山谷大石畏畏佳佳石谷水畏音委佳音觜催公靜碾茶雪裏過門多惡客自注云不飲者為惡用之歟觀之為義本自僧人來耳與王子飛書謂作牋古無此禮近世李宗諤始以公状施於私敬如王元之楊大年皆不用故在髙位而不可望以相知者未嘗與書其可望以相知者不修世俗之禮􅁋坊酒肆即是道塲見成都府請六祖禅師文雨晴過石塘詩晴岫挿天如畫屏余按山谷謂岫為山之穴古作山用者非而今云晴岫挿天㡬自背其説矣揶揄作由音押對雨寄趙正夫故人疊疊去宰木上女蘿愚按注内翰作曾紆墓誌云宰上之木拱矣宰字代冢字用也寄扶溝程太丞之扶亭大夫伯淳父平生執鞭所欣慕會稽竹萌詩碩人俁俁舞公庭余友昔或謂余詩不用經句然則亦無此拘也至蹀躞和侍講詩雨甲煙苗菜杞薩跛虀雪中詩次韻子髙緑葉青隂啼鳥下㳺絲飛絮落花餘見晚春意思豫章先生傳先生其先金華人六世祖瞻以䇿干江南用為著作佐郎知分寜縣瞻生玘玘生元吉始小築水上元吉生中理中理生湜湜生庶嘗攝康州實生先生㓜孤從舅李公擇學登治平四年第調汝州葉縣尉除大名府國子監教授留守文潞公留之再任先是眉山蘇公見先生詩於孫莘老家因以詩徃來蘇公以詩抵罪先生亦罰金直差知太和縣移監德平鎮過泗洲僧伽塔作𤼵願文戒酒色肉但朝粥午飯如浮屠法時元豐七年三月也召入館纂修神宗實録丁母憂除同修國史辭疾為請郡奉祠紹聖初謂實録多誣責涪州别駕黔州安置外兄作本路常平官避嫌移戎州徽宗登極叙復又召為吏部員外郎不得拜知太平州九日而罷以嘗作荆州承天院塔記運判陳舉採摘其語以為謗國除名編録宜州卒焉年六十一先生風韻洒落胷中恢疎事母孝有曾閔之行遇郊當任子舍其子而官其兄之子嘗㳺灊皖樂山谷等石牛洞之林泉因自號山谷道人王炎集其文李彤再為外集諸孫㽦近為别集别集毁璧序叙山谷之女兄事姨母之子洪民師年二十五而卒姑惡之不以葬焚而投諸江山谷築亭廬山而妥之通神論序論六經之㫖深矣近世劉敞王安石之書讀之亦思過半矣馬文叔字序元名景純名字加景蓋自漢魏以來失之詩云髙山仰止景行行止景行猶髙山也而曰景仰之者余不知其説也黄彛字説酒善溺人故六彛皆以舟為足有而不規者疎之也無而置戒者親之也轉輪藏始於雙林大士注老子道可道一章先注常字云神鬼神帝先天先地自古以固存所謂常也其注無名云常無欲而生太空太空忽生天地天地以我為始故強名之曰無名愚按老子所言雖非義理之正就其本文意儘明白今山谷之注如此則不曉其何説矣杜詩箋請急請假也晉令如此咳苦革反籠竹之籠音永蜀名大竹為夢籠竹葉出張華輕薄篇云蒼梧竹葉青宜城九醖酒峽中養鴉雛帯銅錫環獻神名烏鬼荅王周彦書有云孔孟之學不及於周公殆不曉其何義戒讀書士大夫家不可令讀書種子絶論作詩文云安樂温飽君子所畏又自謂作詩在東坡下文潜少㳺上雜文與無咎等耳論俗呼字䖃苴泥不熟也橙橘屬也棖兩旁長木也今人書凳為橙非是橙音澂疑今之金橘是也音烈挈務出獨見以乖迕人為賢者也傀儡或作魁礨象古魁壘之士袈裟梵語本云迦羅沙曵此云不正色譯書畧梵語也銃充仲切䨻蒲迸切使令人不便利也論周禮食以酒為餅若今𤼵膠餅蓋餅也旁曰帷上曰幕合曰幄上承塵曰帟下手書蓋不能書者盡指節龍眼惟閩與南越有之左思蜀都賦云旁植龍目亦不自知其失也青陽氏本洛陽唐末有虞部者官於蜀留居井研煑鹽為富人凡巴蜀之青陽皆以井研為宗山谷誌其墓者名希古眉山史氏自李順王均之亂悉散其倉廪而自匿不汙其亂有名褒與襄者始皆登第岣嶁讀如茍塿山顛也牧䕶歌巴峽祭神刳曲木如瓠擊而歌舞蓋木瓠字誤為牧䕶或謂范子政父祖皆名士故宜賢山谷曰文王割烹武王飩鼎叔且舉而薦之管蔡不食誰能強之陳端夫田武成學入仕其意常欲一自洗於爼豆之間題畫菜不可使士大夫不知此味不可使天下之民有此色烈風偃草木客子當藏舟入浦溆中強人力牽挽欲何之耶元符三年十二月甲辰夕雪寒呼酒崇寜四年二月庚戌夜沉醉作草皆在元豐𤼵願不飲酒之後不曉山谷之𤼵願果何如豈輕諾者耶誰實強之而輕諾也䟦章草千字文章草言可以通章奏耳千字乃周興嗣取右軍帖中所有字作韻語章帝時未有也世乃以為漢章帝書謬矣繆篆音綢繆之繆漢以來符璽書也史紹封乞書為它日相見之資山谷曰今日魯直即他日魯直又安用書為質耶晉城劉仲叟多聞強識唐書天文地理律厯五行志皆所更定諸公仰成而已山谷作靜照禪師真賛逺山作眉紅杏腮嫁與春風不用媒阿婆三五少年日也解東塗西抹來書簡極熱物能驅逐藥力隨大府出則十不得四五方隂陽家謂克己者為官既己從仕則受制於官不得悉如意也刲舂鉏之股以㗖於菟豈能久堪耶數十年先生君子但用文章提奨後生故華而不實世間鄙事有甚了期一切放下專意修學渉獵百篇不如深考一卷文章無他但要直道而語不觕俗鐙盞古有短柄沈約四聲云鐙盞柄曲二難前輩用擬魏太子詩序云楚襄時有宋玉唐景梁孝王時有鄒枚某疑滕主閣會集主人有兄弟俱是顯人耳人生須輟生事之半養一佳士教子弟又當尊敬之久而不勌乃可以盡君子之心而其功專涪翁孝友忠信篤行君子人也世但見其嗜佛老工嘲詠善品藻書畫遂以蘇門學士例目之今愚熟考其書其論著雖先荘子而後語孟至晚年自列其文則欲以合於周孔者為内集不合於周孔者為外集其説經雖尊荆公而遺程子至他日議論人物則謂周茂叔人品最髙謂程伯淳為平生所欣慕方蘇門與程子學術不同其徒互相攻詆獨涪翁超然其間無一語黨同方荆公欲挽俞清老削髪半山涪翁亦屢諌不容且識列子為有禅語而謂普通中事本不從葱嶺來此其天資髙明不緇不磷豈蘇門一時諸人可望哉况公雖以流落無聊平生好交僧人㳺戯翰墨要不過消遣世慮之為而究其説能􅂷芳百世者實以天性之忠孝吾儒之論説至若禅家句眼不可究詰其是非者等於戯劇於公豈徒無益而已哉讀涪翁之書而不于其本心之正大不可泯没者求之豈惟不足知涪翁亦恐自誤前輩多以其所居自名東坡涪翁則皆以其謫居之地名稱涪翁亦足配東坡若山谷乃􅈞皖間寺名翁傾其林泉而樂之故亦嘗稱山谷然山谷本唐世蠻獠黄氏洞名翁黄民也誼不當襲用但宜稱涪翁云黄氏日抄卷六十五
