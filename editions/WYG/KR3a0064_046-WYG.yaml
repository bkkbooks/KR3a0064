body:
  text: 黄氏日抄卷四十六宋黄震撰讀史一史記五帝紀遷之紀五帝自謂擇言之尤雅者著于篇其存古之意厚矣然黄帝殺蚩尤與以雲紀官纔一二事若封禪事已不經至顓頊帝嚳紀皆稱頌語非有行事可考唐虞事雖頗詳皆不過二典所已載然則孔子定書斷自唐虞至矣何求加為夏紀夏紀多櫽括禹謨禹貢之書少康中興書所缺者亦缺自仲康帝相少康直以世次相承若守文無事者意者少康之事遷時已無所考歟若禹後於舜者也謂皆黄帝子孫舜去帝七世而禹反四世又舜帝族也而側微至此皆事之不可曉者殷紀殷紀亦依彷書為之具載興衰相乗者數四未嘗不本於賢者之用舍而載紂取亡之事尤詳真可為萬世戒惟湯誥與書本文無一語類及盤庚話民三篇謂為小辛世殷衰百姓思盤庚而後作難考耳周紀公劉遷豳據紀謂其子慶節之事載武王伐紂事其跡頗膠視所謂湯既勝夏諸侯必服乃踐天子位難易輕重不侔矣祭公謀父諌穆王征犬戎書甚悉芮良夫諌厲王好利召穆公諌監謗皆盡言無隱三代之直猶有存者歟宣王為太子時流彘之難穆公匿之家以子代其死忠勞難于丙吉之䕶宣帝矣幽王溺褒氏周之存亡遂決東遷以後無復足云秦紀愚觀秦事不忍言矣然穆公以善用人而始興二世以信䜛䛕而遂亡雖以無道刼天下而國之興亡係乎人亦斷斷乎不可易也太史公援賈誼言責子嬰不能守全秦余始讀之疑焉及觀班固永平之對果闢其為誤然固謂始皇得聖人之威恐亦身不免于誤耳始皇果得聖人之威則何全秦之難守哉項羽紀再見漢抄遷以羽嘗宰制天下而紀之秦漢之間疑已過矣然既君之而又字之抑揚之義豈有在歟世謂羽與漢爭天下非也羽曷嘗有爭天下之志哉羽見秦滅諸侯而兼有之故欲滅秦復立諸侯如曩時而身為盟主爾故既分王即都彭城既和漢即東歸羽皆以為按甲休兵為天下盟主之時不知漢之心不盡得天下不止也身死東城不過欲以善戰白於世略無功業不就之悲而漢之心羽終其身不知羽曷嘗有爭天下之志哉世罪項羽不用范増而謂増人傑増豈人傑也哉増勸項氏第一事惟立楚懐王孫心而冒懐王舊號稱懐王耳然不知此項之所以滅也陳渉當秦方全盛莖草不驚時以適戍亡命一時倉皇舉事慮無以號召人心謂秦欺懐王而滅之人心所共不平故不得已託楚自名若梁籍時豪傑已蝟起要惟有道者是從萬民爭起而捄其命要惟不嗜殺者是歸豈必楚也哉而乃舉牧羊之竪繆謂已死可悲之主設虚偽以愚天下不惟天下不待此而後從項而項氏之滅反由此始矣何則項世楚將也懐王立則項當終其身為驅馳増謂梁與羽能堪之否乎必不能堪則將置懐王何地乎利於今而不便於後智者猶將徐審而不敢為況於今本無賴而於後無以處者乎使増當是時稍知仁義之説隨宜正捄以殺項氏嗜殺之勢則一時畏慴已服之心必將轉而為悦服之心豪傑必不以次引去何以置楚為今乃不然無故以弁髦視楚心而無故遺項氏以弑逆之機使髙帝定三秦則曰如懐王之約三秦既定東嚮百戰爭天下以至垓下之圍則皆曰為義帝復讐漢之滅項終始以懐王為説是増之偽立懐王者不足為楚地適足為漢地葢懐王立則羽不能不弑逆羽弑逆則羽不容不滅自増此誤雖有智者不能為羽計矣至若明知天命在漢而猶日夜勸羽殺漢王則尤愚夫婦人之見尚足與之圖大事乎且増終始項王之側不聞嘗直諌一語而項王嘗違之羽欲坑外黄因十三嵗兒一語即止羽豈不可諌者増不諌其殺而反勸之殺曽外黄小兒不若而謂羽人傑可乎然世謂増人傑者葢由髙帝自謂能用三傑而謂羽有一范増不能用故因亦以人傑歸羽愚謂髙帝此言特指鴻門逃虎口一事増豈人傑也哉湯武身致大業自餘小小成立未有不由已出而可受成於人者身不能有為而他人借之以立名身之見殺必矣嬰母之止嬰豈獨以世未嘗貴以非出于嬰之身致也楚懐之孫曰心者一旦安受義帝之名曽婦人之見不若遣沛公入關以諸老將之言而得之擢宋義為卿子冠軍以髙陵君顯之言而失之隨聲遷就何足論懷王賢否枝梧枝者小柱梧者邪柱轅門古者行軍以車為營兩轅相向為門鯫生之鯫上聲據注當是姓擠音濟未傅之傅音附古者二十三嵗附籍五十六嵗為老老弱未傅者指不應徭役之人高祖紀髙祖初以寛大得遣入關然攻戰始猶齟齬自宛之舍人陳恢説以約降不殺遂引兵而西無不下者及遥定三秦已如懐王約無辭可以復東用董公仁義説為義帝發喪復讐卒併天下隆準之準音拙紿音殆休告之告音嘷求盜者亭卒之稱白帝子注謂指秦畤葉碧菴先生以為西楚跳於滎陽之跳音逃建瓴之瓴盛水瓶也濞音帔吕后紀惠帝立七年名惠帝子者踐阼復二人史遷皆係之吕后意者示女后専制之變也然吕氏盡殺髙帝子孫在内者欲奪天下而歸之吕大逆無道漢之賊也豈止専制而已而可紀之哉遷為漢臣子特微辭見意爾吕后欲王諸吕王陵力爭可謂社稷臣矣平勃阿意王之勃雖卒誅諸吕安劉氏然已功不贖罪若平又何以贖之而反受賞邑三千户金二千斤耶平平生教帝詐無益成敗之數天下既定誤帝偽遊叛者九起卒死於兵今復負帝於身後如此平真漢之罪人哉留侯子張辟疆年十五揣知吕后意勸丞相拜諸吕將南北軍入宫居中用事雖曰早慧實留侯不肖子使非漢方興未艾賣漢天下者爾漢氏已絶而復續分王子弟力也不然而盡聚之京師殱於吕氏婦人之手無噍類矣吕后殺其子孫而欲帝母家使母家無少長皆斬而身亦死于祟禍史遷備著之為萬世女后戒後九月閏九月也掊兵之掊音仆文帝紀景帝紀武帝紀文紀所載皆恭儉愛民之事一制詔必具以其皆由惻怛之言也景帝特載其政事之常災異之變制詔不録之矣至武帝則始終備具著方士之欺謾他不及焉武紀皆取封禪書為之或褚先生所補文帝遺詔短喪議禮者譏焉然觀文帝惻怛為民惟恐妨之至死彌篤在帝不失其為厚為景帝者所宜如禮不可茍狥其言自流于薄爾後世不以為譏而反譏文帝何哉封禪書封禪之書起于求神仙狂侈之心遷作封禪書反覆纎悉皆以著求神仙之妄善矣而猶牽合郊祀巡狩古帝王行事之常以證封禪何耶方士之説惟以黄帝乗龍上天為誇武帝巡行親行黄帝冢而祭之方士尚何辭而從者復遁其説為葬衣冠主暗臣䛕一至此甚悲夫若衣冠不必葬葬衣冠無此理則論衡嘗有辨河渠書河決瓠子而南田蚡食邑鄃居河北利之進說其君不復事塞者二十年其後天子親臨羣臣從官自將軍以下皆負薪寘之而水復禹迹無後災近臣之蔽君與君臣之率作興事成敗之相反類如此豈獨水利哉平凖書平準者桑𢎞羊籠天下貨官自為商賈買賣於京師之名也葢漢更文景恭儉至武帝初公私之富極矣自開西南夷滅朝鮮至置初郡自設謀馬邑挑匈奴至大將軍驃騎將軍連年出塞大農耗竭猶不足以奉戰士乃賣爵乃更錢幣乃算舟車而事益煩財益屈宜天下無可枝梧之術矣未幾孔僅東郭咸陽乗傳行天下鹽鐡楊可告緡徧天下得民財物以億計而縣官之用反以饒而宫室之修於是日麗鑿無為有逄君之惡小人之術何怪也然漢自是連兵三嵗費皆仰給大農宜無復可繼之術矣又未幾桑𢎞羊領大農置平準於是天子北至朔方東至太山巡海上並北邉以歸用帛百餘萬疋錢金以巨萬計皆取足大農又一歳之中太倉甘泉倉皆滿而邊餘榖其始愈取而愈不足於用及今愈用而反愈有餘小人之術展轉無窮又何怪之甚也嗚呼武帝五十年間因兵革而財用耗因財用而刑法酷沸四海而為鼎生民無所措手足迨至末年平準之置則海内蕭然户口減半隂奪于民之禍於斯為極遷備著始終相因之變特以平準名書而終之曰烹𢎞羊天乃雨嗚呼㫖哉齊民者無貴賤之稱樂卿買爵至貴者為從九卿加樂明其與正卿異牢盆牢者與之廪食盆者與之煮鹽器故曰官與牢盆釱左趾之􅎂音弟徒計反鐡為之着左趾代刖也外繇戍邊也赤側錢名以赤銅為郭赤金銅也故居三等金之末吳太伯世家太伯逃吴弟仲雍繼立十九世至壽夢始大通中國㓜子季札賢欲立之不可長諸樊立讓之又不可以次傳餘祭餘昧必欲致國季札終不可餘昧之子僚乃立諸樊子闔廬以其非當立也弑僚自立而吴之禍始萌其後闔廬與越戰死其子夫差報越越又報之卒滅吴皆始於札之終讓也嗚呼太伯以三讓而周興季札以三讓而吴亡讓一也可與權之義亦難哉伍子胥以父見誅於楚而奔吴知闔廬之將弑僚也進専諸成其事以俟闔廬得政既乃自滅其宗國之楚而鞭所事平王之尸是既弑吴之君復弑楚之君於身後報父之讐者如是乎天下豈有無君而有父者哉古人不共戴天之義恐非所施於所天之君父也且胥所當怨者費無極也然楚誅之矣夫何甚越敗吴於檇李今嘉興也吴敗越於夫椒今太湖中椒山也皆云越地然則越之境至浙水以西歟姑蘇䑓闔廬所築三年聚材五年乃成髙見三百里虎丘闔廬所葬卒十餘萬人治之下池廣六十歩深一丈五尺葬之三日白虎居其上故號虎丘在吴縣閶門外太伯冢在吴縣北梅里聚去城十里皆注云齊世家太公之始封威公之霸諸侯天下莫彊焉田氏卒奪而有之悲夫慶封崔杼之禍晏子仰天不肯盟可謂疾風勁草者矣齊太史書崔杼弑莊公兄死弟繼者三至今凛凛生氣猶足以寒亂臣賊子之膽魯世家史載周公作鴟鴞於東土既定已作嘉禾之後載成王泣反周公事以謂人或譛周公周公奔楚成王發府見周公揃蚤禱成王闕病之䇿而然且謂啓金縢書又周公卒後之事皆與詩書不合魯弊於三桓三桓皆桓公子莊公弟也長曰慶父次曰叔牙次曰季友莊公無嗣欲立庶子班叔牙欲立慶父季友鴆叔牙而立班慶父殺班立閔公既又弑之季友殺慶父立僖公而相之故三桓季氏尤強文公薨襄仲又殺適惡及視立庶倭是為宣公魯君由此失國政歴文至襄而三桓分魯為三軍昭公見逐卒于乾侯孔子相定公嘗毁三桓城收其甲兵及季桓子受齊女樂孔子去魯其後哀公立復見逐悼公而後益卑九世至頃公卒為楚所滅季文子相三君宣成襄家無衣帛之妾廐無食粟之馬君子謂其㢘忠然私室日強公室日卑自若也愚謂行父能自毁城郭去兵甲退安臣子之分如孔子之所以謀魯則身為卿相雖妾衣帛馬食粟未害也洙泗之間齗齗相讓夫子嘆魯道之衰葢非安行自然之俗則人心漓矣燕世家文王易王之世蘇秦謀燕蘇代誤子噲讓國子之而燕亂昭王用樂毅中興艱難極矣惠王忌賢不念厥紹王喜方自救不暇反用栗腹敗趙以自敗其從豈必丹軻之謀而後燕滅哉管蔡世家管叔誅死無後蔡叔之子仲率徳改行而復封且為周卿士然其子孫微甚哀侯不敬息夫人而死於楚繆侯怒已嫁齊威之女弟而虜於齊靈侯弑君自立而滅於楚國不競亦凌矣猶未甚害也昭侯耀美裘於楚取禍子常自是讐楚而附吴遷於州來臣下不附閲四世楚滅之矣曹叔鐸之後共公成公虜於晉悼公囚於宋隱靖二公更弑迎立已無以為國矣伯陽復好獵用公孫彊背晉干宋而宋滅之使國人之夢遂符叔鐸無所置力於㝠㝠中矣悲夫陳杞世家陳舜後也國微甚然敬仲奔齊子孫卒代齊有國彊於天下果符周太史之占而晉太史趙亦謂且盛徳之後必百世祀豈不異哉近世朱文公則謂太史之占陳氏子孫設為之辭以欺世葢符命之類也杞微小不足稱述史遷以禹之後特錄之又言楚惠王滅杞而越王句踐興葢越亦禹之苖裔衛康叔世家衛獻公亡在外十二年而入稱後元年出公亡在外四年復入亦稱後元年漢文之稱後元其殆昉於此歟衛君多亂文公處國家覆亡之後獨能輕賦平徭身自勞與百姓同苦卒以治稱一國以一人興信夫衛靈公之生其母夢其為康叔秦置東郡徙衛野王縣二世始廢君角為庶人而衛祀絶然則衛雖微其亡獨後于諸國且子孫保首領愈於戮辱者多矣宋世家世家之首併叙三仁明微子歸周之本心者善矣宣公舍子與夷而立弟穆公穆公不敢忘徳將死復立與夷為殤公殤公立十年十一戰而宋始亂是穆賢而殤不肖甚明宣之讓賢也甚公亂不始于宣之讓也史譏宣公廢太子而立弟國以不寧者十世春秋之世無寧國豈皆譲使之然歟其後襄公讓弟目夷不果襄公卒以不用目夷之言而敗向使目夷為之君宋未可量也讓豈階亂之舉哉當是時人君溺私愛廢嫡立庶或以弟弑兄而攘其國子孫干戈相尋者總總也史不之譏而譏宋宣之讓何也且襄公初欲讓國目夷不果則相之知其賢於已也而卒不用知賢而不能用襄葢妄人耳史反多其禮讓又何歟熒惑守心景公憂之司星子韋勸其移于相不可移于民不可移于嵗又不可子韋稱天髙聽卑君有君人之言三熒惑宜有動候之果徙三度感應之機何速耶王充論衡嘗斥其妄殆正論也太史公稱襄公修仁行義其大夫正考父美之追道契湯髙宗殷所以興作商頌注謂韓詩商頌亦美襄公殆有據之言歟然與今詩序不合而詩序作於衛宏在太史公後葢毛韓之傳不同爾史載宋昭公四年敗長翟縁斯於長邱而魯世家稱當宋武公之世武公實為昭公九世祖是史自為矛盾也今考魯世家文公十一年獲長翟喬如而追載宋武獲長翟縁斯之事縁斯者喬如之祖也宋昭公之四年正當魯文公之十一年是獲喬如之嵗非獲縁斯之嵗也縁斯于喬如為祖則獲縁斯者為宋武公非宋昭公也二事參考則魯世家所載近是宋世家所載非是也注者以為未詳或者世次尚差當缺疑歟長翟之國名鄋瞞喬如敗於魯棼如敗於晉榮如敗於齊簡如敗於魏鄋瞞由是遂亡其敗於齊當惠公二年榖梁稱長翟身横九畆斷其首而載之眉見於軾云􅢿音耆國名疑即西伯戡黎之黎也琴操之操葢取處幽困不改其操之義見箕子操注葢琴音多以寫幽困之懐也晋世家穆侯名太子曰仇少子曰成師仇為文侯傳子昭侯封成師於曲沃沃強大亂晉六世而卒併之為武公生獻公嬖驪姬復亂三世而文公入晉始霸㐮公有殽之師靈公無道趙氏弑之歴成至景作六卿厲公見弑悼公復興昭公以後政歸六卿矣晉文侯當周東遷有功平王錫文侯有文侯之命此一時也其後晉文公入周襄王及獻楚俘天子使王子虎命晉侯為伯賜大路弓矢秬鬯此又一時也史遷乃取文侯命屬之文公之下義和者文侯字也注者又云能以義和我諸侯誤益誤矣漢時恐此書未出黄池之㑹吴晉爭長而史於吴世家曰長晉於晉世家曰長吴自相矛盾未知孰是趙世家亦曰呉長獻公嬖驪姬殺適立庶而荀息乃以身徇之長君之惡以成其亂䧟奚齊卓子於死地皆息之罪也史乃許息不負其言息固不負其言矣如負國何夫等死耳使息能以死諌君豈不忠且偉歟悼公十四嵗得國一旦轉危為安功業赫然漢昭帝流亞也太史公乃言悼公以後日衰語焉不詳悼公稱屈九原矣楚世家楚之先出自顓頊有鬻熊者事周文王成王封其後熊繹於楚至熊通自稱武王子文王自丹陽徙都郢國始強傳成王益彊子商臣弑之商臣自立為穆王及莊王立滛樂三年不聽政且曰諌者死伍舉蘇從冒死以諌幡然而改凛凛如太阿出匣所嚮莫敵而能折節服義嘗問鼎以王孫滿之對而歸嘗縣陳以申叔時之言而復之鄭伯袒以逆則退師華元告以情則釋宋較之荆楚諸君此善於彼多矣共王敗於晉射中目康王没公子圍弑郟敖自立曰靈王盟諸侯囚慶封就章華䑓而國人怨叛卒餓死申亥之家平王以詐弑初王竟續楚祀而乃信費無忌之䜛亡太子殺伍奢昭王之世奢子胥挾吴入郢鞭尸以報國幾亡自是吴日侵徙都鄀至惠王而太子建之子白公勝復為亂賴葉公國再安然是時吴為越所滅楚東廣地至泗上歴五世至威王滅越地益廣矣懷王乃甘受張儀之欺而死於秦五傳至負芻秦卒滅之靈王之族慶封也以封徇曰無効齊慶封弑其君而弱其孤以盟諸大夫封反曰莫如楚共王庶子圍弑其兄之子員而代之立軍人粲然皆笑嗚呼君子無諸已而後非諸人可不謹歟昭王名珎越世家以為名軫楚武王墓注稱秦項赤眉之時欲發之輙頽壊填壓不得發愚往歳聞蜀人趙同年子發謂先主武侯墓不可發近見酉陽雜俎載唐有人發先主墓者遇怪不敢以此證彼皆合勢或有之歟越世家句踐勤苦踰二十年一旦沼吴以雪㑹稽之耻其志何如哉范蠡功成身退徙齊徙楚復皆顯名于天下材識卓卓乎春秋戰國之上矣向使不以致産自見而退逸山林豈不誠有道之士耶鄭世家鄭小國介於晉楚服晉則楚伐服楚則晉伐至簡公世兩親晉楚及子産為卿國安静者數十年賢之有益於人國如此夫此鄭人哭其死如親戚而孔子亦泣其為古之遺愛也趙世家蜚㢘二子長曰惡來其後為秦次曰季勝其後為趙造父封趙城始得氏叔帶當幽王時去周如晉夙事獻公衰事文公盾事靈公至景公世趙朔益専晉滅趙氏孤兒趙武後復為正卿生趙簡子滅范中行氏子無恤為襄子平代地滅智伯趙視韓魏最強六世至武靈王變胡服滅中山攘地北至燕代西至雲中九原欲南襲秦強於天下矣愛吴娃立其子何長子章作亂餓死沙邱自是無能君當孝成王時秦伐韓上黨趙受上黨守馮亭之獻故有長平之禍趙可禦秦者惟頗牧耳樂乗用而頗亡郭開讒而牧誅趙實自趣其滅於秦何尤史載晉滅趙之族朔妻成公姊有遺腹匿公宫生武公孫杵臼與程嬰以死保脱之越十五年因韓厥得復田邑而左傳稱武從姬氏畜于公宫以其田與祈奚韓厥言於晉侯曰成季之勲衰諡宣孟之忠盾諡而無後為善者懼矣乃立武而反其田焉是無程嬰杵臼之事也未知孰是然恐育於公宫者近之若謂賊搜及公宫何甚耶中山者西周桓公之子趙獻侯十年初立魏文侯嘗滅之後滅於趙烈侯好音欲賜歌者田各萬畆得牛畜荀欣徐越三子而止歌者田然則中主寧有常好而賢者之能變化人主氣質功亦大矣顧恐戰國之言多誇爾左師觸龍之説太后俾入長安君質於齊其幾諌之類歟簡子夢至帝所襄子得霍太山朱書將興之禎祥也孝成王夢乗龍上而墜將亡之妖孽也恐隣於怪耳魏世家畢萬本周同姓事晉獻公封魏魏武子從重耳反國絳事悼公九合諸侯戎狄以和獻子身為國政桓子共滅智伯文侯尊賢重士得譽諸侯秦不敢加兵武侯之世國尚強惠王好戰而國危子孫日弊於強秦頼公子無忌合從五國國粗立然不能盡用其説無忌卒國不支以至於亡韓世家韓亦姬姓本無大功於晉厥以鞌之役勝齊得預六卿子孫無聞人惟昭侯相申不害國以治諸侯不侵伐不害死秦㧞宜陽旱作髙門功業不終其後日弊於秦矣田敬仲世家陳佗之子完奔齊為田氏田乞及常皆以大斗予小斗收愚齊民以結其心再世弑逆専其國政而隂奪之葢不待田和遷康公自立而太公之齊已為田氏有久矣然威王烹阿封即墨國治強於天下湣王雖卒破於燕亦伐宋割楚侵三晉泗上諸侯稱臣襄王破燕復齊王建四十餘年不受兵五國既滅秦方一旦談笑而取之考論始終戰國諸君其強皆無齊比彼以區區智數攘竊人國而子孫之盛若此何耶豈有媯盛徳之後宜然耶周太史之占齊懿仲之卜豈或有之耶抑人衆而勝天者耶孔子世家史記世家為有社稷人民者作也孔子布衣史遷以附諸侯王之後且贊之曰天下君王至於賢人衆矣當時則榮殁則已焉孔子布衣至今學者宗之其意尤抑彼而揚此嗚呼吾夫子天而人者也能模寫其盛者惟子思中庸􅂾語及本朝伊洛考亭諸儒若史遷之贊葢世俗之見猶唐人尊以王爵爾豈知夫子者哉然漢世重道家學而輕儒遷之家庭授受本亦知有道家耳而猶知尊慕之若此此孔子之所以為大歟世家載孟釐子期夫子為逹者而述其先世正考甫之鼎銘曰一命而僂再命而傴三命而俯循墻而走亦莫敢余侮饘於是粥於是以餬余口又載老子送夫子之言曰聰明深察而近於死者好議之人者也博辨廣大危其身者發人之惡者也嗚呼然則士君子之渉世當如何其自畏耶陳勝世家再見漢抄勝自王六月而亡然其所置遣侯王將相竟亡秦外戚世家史於吕氏譏以非天命孰能當之於薄氏稱仁善於竇氏稱退讓至王信好酒田蚡勝王后異父弟貪巧則武帝母王太后之戚衛青號大將軍霍去病衛后姊之子號驃騎將軍則武帝妃衛皇后之戚勸戒昭然而外戚之歛肆亦係於時君矣衛青本平陽公主家使令者青一旦富貴振天下卒尚公主然謂非公主失身不可也為武帝生子者其母無不譴死禇先生贊其為聖賢事雖曰有感之言亦豈人情也哉余家素貧厄少時以外侮告先人輙令勤學云丈夫當時富貴百惡滅除葢常常而然言猶在耳也而不知所出今閲禇先生衛皇后贊見其語為之感愴哽噎云楚元王世家再見漢抄楚王戊趙王遂皆以不用諌謀反誅漢復立劉禮王楚元王祀趙以竇太后不許絶巨嫂即丘嫂漢書稱丘羮頡侯母荆燕世家漢分王同姓惟荆王賈以功封其後撃黥布死田生以畫干營陵侯劉澤澤予生二百金生歸齊明年澤使人謂生曰弗與矣生乃如長安不見澤而以計謁髙后之所幸張子卿使王諸吕以張本而王劉澤於燕然則田生所干劉澤之畫即明年所施於張子卿之計曰弗與云者弗與我施行所畫促之之辭爾澤劉氏也而王諸吕乃出其計其罪大矣故太史公之贊曰劉澤之王權激吕氏而釋之者弗察謂畫為計畫謂與為黨與夫於干劉澤不言其所畫而於干張子卿言之文法之相為先後如此而釋之者弗能察故夫史遷之文深逺矣齊悼王世家髙帝長庶男劉肥封齊朱虚侯章誅諸吕者其次子齊最大其後分七國云吴楚反時齊路中大夫既許三國而終逹漢天子命俾齊堅守與解楊之事同主父偃求徐甲欲入其女齊後宫不遂則讒齊王殺之亦卒以此坐誅偃真小人哉蕭相國世家髙帝起布衣得天下非有分義素服人心故所與同起者帝無不疑之至如關中天下根本何每留守而帝自將帝所任者莫如何所疑者亦莫如何也方帝距京索間非用鮑生計遣子孫詣軍何幾族及自將邯鄲非用召平計悉家財佐軍何幾族其後自將撃黥布非用說客計多買田宅自汙何又幾族然則何雖相帝定天下嘗懐救死之不暇縱何非刀筆吏又何暇經綸之事乎其後為民請死稍欲展布而械繋已及帝之赦何也言我不過為桀紂而相國為明相是正怒其掠主譽以得民心也嗚呼其亦異於古人所以推誠共治之道哉曹參世家再見漢抄後多類此參自髙帝起兵無一戰不預雖非赫赫功而未嘗以敗聞天下既平猶從撃陳狶黥布葢參與帝終始兵間而不見疑相齊齊治相漢漢治參有大過人者矣而史論戰功則謂之當信之滅論治功則謂其當秦之後若有抑揚之意焉愚謂參明哲保身雖信不能及而立法易守法難參以人豪一遵何約束除吏皆木訥而深刻者輙斥去所以養成漢家寛厚之風雖何無以尚之參其可少哉書稱斷斷猗無他技參之謂矣傳稱惟仁人能好人能惡人參庶幾焉留侯世家利㗖秦將旋破巉關漢以是先入關勸還霸上固要項伯漢以是脫鴻門燒絶棧道激項攻齊漢以是得還定三秦敗於彭城則勸連布越將立六國則借箸銷印韓信自王則躡足就封此漢所以卒取天下勸封雍齒銷變未形勸都關中垂安後世勸迎四皓卒定太子又所以維持漢室於天下既得之後凡良一謀一畫無不繋漢得失安危良又三傑之冠也哉然董公仁義正大之説則良不及之使以良之智兼董公之識而為漢謀伊周何尚焉陳丞相世家陳平智有餘信矣惜皆流於小人之術耳方楚漢爭雄時平惟有反間楚一事然是時楚勢已促縱増不去亦俱死垓下耳反間何等語而可汙龍興之漢使單于閼氏此張儀愚鄭袖之故智也何竒之云使平早計而帝毋窘平城雖不竒猶竒矣從攻陳狶黥布凡六出竒計然使狶布反者平勸偽遊雲夢之失也平與太尉勃合謀卒誅諸吕然使諸吕逆者平阿意太后之過也縱火人之家而隨以撲滅言功功耶罪耶代右相勃決獄錢榖之對徒以大言勝勃平無其實也董晉有言天下安危宰相之能與否可見謀議於上前者不足道平一時欺君之言後世猶或稱之誤矣始平自以多隂謀懼多隂禍以此足覘其本心云絳侯世家周勃從髙帝終始兵間晚尤多戰功髙后殁手誅諸吕迎立文帝功孰大焉厚徳如文帝疑謗一開微太后幾族甚矣功名之盛難居而嫌隙之微當戒也亞夫尤重厚守正平吴楚有大功其爭廢太子爭侯王信爭侯降匈奴徐盧等五人又皆宰相職也反以怏怏疑之卒置死地景帝尤少恩哉許負相亞夫以從理入口果饑死梁孝王世家孝王既僣侈矣景帝復失言千秋萬歳後傳於王入則同輦出則同車卒之梁王賊殺袁盎等大臣幾至變逆者景帝之失也梁王車服擬天子珠寳踰京師卒以憂死五子分王皆國絶富貴者可以觀矣五宗世家景帝子十三王惟河間王徳被服造次必於儒者餘皆驕庸然吴楚反後亦皆奪之權而國遂貧矣膠西王端賊戾三王世家三王者武帝子齊王閎燕王旦廣陵王胥也太史公備述羣臣奏請皇帝恭讓始終啓復之辭以及三王封䇿之辭爛然可觀也而不載其行事禇先生條釋其後謂齊王之國左右維持以禮義不幸早夭謂廣陵王果作威福謀反自殺謂燕王謀為叛逆亦自殺皆如其䇿指云愚按齊王䇿曰允執其中天祿永終永終者堯戒舜之反辭云四海困窮則天絶其祿不執中者也今乃用為期望之辭屬之執中之下誤矣豈亦王早夭國絶之先兆耶青社字出齊王䇿盖泰社備五色土齊東方封以青土故曰受兹青社列傳伯夷自此後漢抄無之太史公疑許由非夫子所稱不述而首述伯夷且悲其餓死為舉顔子盜跖反覆嗟嘆卒歸之各從其志幸伯夷得夫子而名益彰其趣逺其文逸意在言外詠味無窮然豈知其心之無怨耶堯讓許由葢莊周寓言眇天下為不足道耳太史公疑箕山上有許由冢愚意雖無其事嘗有其人歟載伯夷父死不葬之語與武王十一年伐紂事背馳然漢人舊説以武王上繼文王受命之九年為十一年故云爾管晏世之人見賢而稱其賢見智而稱其智未足言知人惟其人方困窮時其迹有甚於不賢不智者而已獨有以察其心若鮑叔之於管仲千古一人耳然愚謂此管仲之為管仲也君子固窮窮視其所不為貧視其所不取何至䝉不賢不智之迹耶其令論卑而易行其政善因禍而為福太史公此論固切中其相齊之要領實則茍於濟事不暇顧在我之正守已占於貧賤之時矣晏平仲功業不及管氏而相三君妾不衣帛則㢘節過之越石父稱詘於不知己而信於知己葢名言也宜晏子之敬待然景公欲相孔子嬰實沮之石父豈賢於孔子哉老子韓非老子與韓非同傳論者非之然余觀太史公之㫖意豈茍然哉於老子曰無為自化於莊子曰其要本歸於老子之言於申不害曰本於黄老而主刑名於韓非曰喜刑名法術之學而其歸本於黄老夫無為自化去刑名固霄壤也然聖人所以納天下於善者政教也世非太古矣無為安能自化政教不施則其弊不得不出於刑名此太史公自源徂流詳著之為後世戒也老子孔子皆布衣也太史公列孔子世家贊其為至聖至老子則傳之管晏之次而窮其弊於申韓豈不以申韓刑名之學又在管晏功利之下而老子則申韓之發源歟班固謂遷論大道則先黄老而後六經或者未之深察也司馬穰苴田氏孫子武吳起穰苴之斬莊賈孫子之斬二姬葢號令嚴肅雖素卑賤者可將雖素不知兵者可使也太史公譏孫臏䇿龎涓明矣然不能蚤救患於被刑吴起説武侯以形勢不如徳然行於楚卒以刻暴亡其軀嗚呼不仁而善用兵亦烏有自全者哉伍子胥子胥諌吴伐齊而勸伐越吴不用國遂亡然諌至再三弗聽矣䜛人太宰嚭在王側又與之有隙矣不能去而之他反私託其子於齊之鮑牧而歸以取屬鏤之誅何謀吴之明若是而乃謀身之暗耶初子胥鞭平王尸申包胥責其已甚答以日暮途逺故倒行而逆施君子是以知其不終也屬鏤之鏤錄于切鴟夷革者取馬革為鴟夷鴟夷榼形也胥山張晏注在太湖邊仲尼弟子受業身通者七十七人有年名見書傳者三十五人餘四十二人止存名氏子貢一出存魯亂齊破吴彊晉而霸越雖曰存魯不幾已甚歟其機辨儀秦不及也將史之言未必盡然歟結駟連騎謝原憲於藜藿間而終身耻其言之過於是名教之樂為不可尚已公晳哀字季次子曰天下無行多為家臣仕於都惟季次未嘗仕曾㸃之㸃作蒧巫馬期之期作施商君商君之術能彊秦亦秦之所以亡能顯其身亦身之所以滅然則何益矣蘇秦秦約從六國忠於六國者也齊魏首敗從約伐趙秦以利害忠告齊魏不可而去之則身名始終矣乃請使燕以報齊食齊之祿而反誤之不忠孰甚焉又豈約從之初意哉嗚呼兹其所以及歟蘇代私於子之誤燕已甚復欲為燕約諸侯宜其終不逮秦也張儀蘇秦之説六國為六國也張儀之説六國非為六國為秦也欺詐諸侯如侮嬰兒雖均之捭闔而儀又秦之罪人矣然儀之入秦蘇秦實使之雖欲止秦兵於一時而卒以伐從約於異日智者不為也夫儀秦友也儀始謁蘇秦以故人求益也秦不以情告儀使共謀六國以緩秦兵而直以權詭激之入秦自貽後患何耶將儀之多詐不可告以情抑秦自以不及儀與之共謀六國慮軋已耶夫縱横之士固不可以常情槩之也陳軫公孫衍皆惡於儀軫奔楚復從容於秦儀死而衍入相秦嘗佩五國相印為盟約長皆權變無窮之士也樗里子甘茂樗里子秦惠王弟名疾滑稽多智號曰智嚢晁錯之名恐本於此為惠王將多戰功為武王相使周周敬之其後為昭王伐蒲衛邑胡衍受蒲金説之而去豈智有時而窮歟然其言曰後百歳當有天子宫夾我墓至漢興長樂宫在其東未央宫在其西此豈智料之所能及或者攻數學歟否則傳者妄也甘茂相秦拔韓之宜陽其後勸秦予韓茂遂懼向壽公孫奭之䜛奔齊使楚卒於魏其孫甘羅年十二為秦使趙廣河間之地秦封甘羅為上卿復以甘茂田宅賜之穰侯穰侯魏冉者秦昭王舅也立昭王昭王諸兄弟之不善者滅之威震秦國握將相之權三十年歳伐三晉以廣地天下皆西鄊稽首其後越三晉以攻齊范雎譏其非遂以逺交近攻之䇿説昭王奪之位而穰侯斥矣白起王翦白起以穰侯薦為秦將其斬殺之數多而載於史者凡百萬不以數載者不預焉長平之役秦民年十五以上皆詣之而死者過半以此類推秦之死於兵者又不可以數計也蘇代説應侯間之起不復為秦用而賜之死自秦而言雖殺之非其罪自公理而言一死何以盡其罪哉王翦為始皇伐楚靣請美田宅既行使使請美田者五軰後有勸蕭何田宅自汙者其計無乃出於此歟王翦諸人之輔秦葢凶徳之參㑹古今之極變不可復以常事論也太史公譏翦不能輔秦建徳而偷合取容嗚呼是何異責虎狼之不仁耶孟子荀卿太史公之傳孟子首舉不言利之對歎息以先之然後為之傳而傳自受業子思之外復無他語惟詳述一時富國強兵之流與騶衍迂怪不可究詰以取重當世之説形孟子之守道不變與仲尼菜色陳蔡者同科竒哉遷之文卓哉遷之識歟葢傳申韓於老莊之後者所以譏老莊而傳淳于髠諸子於孟荀之間者所以長孟荀也荀卿年五十始自趙學于齊三為齊祭酒後為楚蘭陵令春申君死而卿廢卒死於蘭陵葬焉嫉世之濁而鄙儒小拘如莊周等又滑稽亂俗於是著書數萬言此亦能守道不變者故太史公進之與孟子等堅白異同者注云汝南龍淵水可淬劒故有堅白之論云黄所以為堅白所以為利或辨之曰白所以為不堅黄所以為不利此其為異同嗚呼士論之無稽至此世道如之何而不壊墨翟之智注稱公輸子將為攻具將攻宋墨子至郢設拒攻之具凡九屈之孟嘗君田文謂其父田嬰相齊三王齊不加廣而家富累萬金不見一賢者徒厚積以遺子孫而不謀齊文既得政故招致食客常數千人宜齊之加廣矣然卒以此見忌於其君而不能安其身乃遺秦穰侯書以自伐其齊又相魏西連秦趙與燕合兵而幾至於滅齊卒之齊魏亦共滅文封邑而子孫遂絶豈惟不能廣齊且削齊矣豈惟不以遺子孫亦無子孫之可遺矣豈惟辱國而亡家且聚天下任俠姦人六萬家於薛壊薛之俗為暴桀矣譬之千金之家銖積寸累而致一旦有黠慧者出揮金如土聚鬭雞走狗摴博無頼之人以索其家乃號於人曰吾好客其真好客者耶其不肖者耶周公一飯三吐哺一沐三握髪好客宜無以加之矣不聞其如孟嘗之好也然則孟嘗非能好客也田嬰家不幸生不肖子耳吁平原君好客僅得一毛遂孟嘗君好客僅得一馮驩而二君者其始皆不能知之尚何以好客為哉愚謂二君者不足以知二子而二子歸之者以貧無聊如祿仕於亂世免死而已其後因事而顯殆非二子初心所期也二君其亦幸而得此二子歟平原君虞卿去讒而逺色固尊賢之道也平原君以賔客稍引去乃斬笑躄者美人頭雖曰人情所難然已甚矣邯鄲之急得毛遂以合楚之從得李同募死士以須楚魏之救邯鄲之獲全固平原君力也然向使不受上黨之嫁禍則趙必無長平之敗亦必無邯鄲之圍平原之功於是不足贖誤國之罪矣太史公謂使趙䧟長平兵四十餘萬邯鄲幾亡非歟而譙周乃稱長平之䧟易將之咎何怨平原吁何惑也秦攻長平虞卿勸趙附楚魏以和秦而後秦可和趙不聽故秦卒不和而趙大敗其後趙將割六城事秦虞卿使於齊以謀秦而秦反和趙及魏欲與趙約從則卿亟勸成之卿無言不効無謀不忠大要歸於結和鄰國以自重而使秦反輕此至當不易之説也與一時東西捭闔之士異矣棄趙卿相而與故交魏齊俱困大梁以著虞氏春秋其必有決烈之見而豈其愚也哉為卿而食采於虞史不載其姓氏州里槃散蹩貌意即蹣跚擔簦之簦有柄之笠魏公子無忌無忌用侯嬴朱亥之力竊符矯命以赴平原之急其後在趙用毛公薛公之諌趣駕歸魏以却彊秦之圍此四人者皆隱於屠沽博徒無忌獨能察而用之五國賔從威振天下雖非正道而能為國家之重過平原孟嘗逺矣然侯生朱亥之詐力又非毛公薛公之正論比也安釐王受秦反間用無忌不終十八歳而魏亡悲夫春申君說秦昭王不伐楚而出身脱楚太子於秦可謂智能之士矣一䇿不謹而卒死李園之手與嫪勞毒靉同歸惜夫有朱英之謀而不能用何必珠履其客為也范雎蔡澤范雎辱於魏齊賴鄭安平王稽竊載入秦離昭王母子兄弟舅甥之親而居相位以快一己之恩讐葢亦勞矣然卒以任鄭安平王稽二人敗事而罷夫爵祿非酬恩之具也顧材所堪耳况竊之君以私所恩耶范睢以口舌攘穰侯之位而蔡澤復以口舌攘之睢所謂螳螂捕蟬黄雀在後也然穰侯以君臣骨肉之親則睢攘之也難范睢當君臣疑阻之際則澤攘之也易睢逺交近攻之䇿真有益於秦澤特覊困之餘竊富貴耳澤殆非睢以離間昭王母子兄弟而得之澤勸睢功成身退心雖私而論則正矣鬲者曲脚鼎夏育衛人力舉千鈞此為賁育之育樂毅樂毅為燕報齊誠師出有名矣而盡取寳物祭器輸之燕仁義之師不為也狥齊五嵗下七十餘城而莒即墨猶未下者齊王保於莒有困獸覆車之勢齊方發憤而毅之師已老彊弩之末不能穿魯縞其勢然也夏侯𤣥許以湯武之事何甚耶然毅以讒去適趙趙父母國也報燕惠王書稱忠臣去國不潔其名不効戰國反覆復為趙而讐燕去就無歉傳之子樂閒亦然故髙帝過趙復封其孫樂叔者於樂鄉信義之入於人深矣然則樂毅非戰國之士也汶篁之篁注云竹田為篁㢘頗藺相如藺相如庭辱強秦之君而引車避㢘頗亷頗以勇氣聞諸侯而肉袒謝相如先公後私各棄前憾皆烈丈夫也勇怯各得其所矣然先之者相如也趙奢治賦不少貸平原君之家而平原君因薦之王而用之君子不多奢之行法自近而多平原君之以公滅私也括輕易取敗無足道括母言父子異心之狀可謂得觀人之法李牧養威持重戰無不勝與頗齊名而頗牧皆廢於讒人郭開之口趙之亡忽焉悲夫田單田單守即墨使妻妾編於行伍間此李同教平原君之故智也轊音衛車軸頭畫邑之畫音獲魯仲連鄒陽魯仲連闢新垣衍帝秦之說引鄒魯不肯納齊湣王之事為證可謂深切著明矣然解邯戰之圍者平原君力也非仲連口舌之所能介也射書聊城使其將自殺而城見屠此不過為田單謀耳縱當時無仲連書聊城無救勢亦必亡亦非甚有功於田單也射書何為哉使連能説單無屠聊而射書於城約其將善降或說燕無殺其將而使其將歸燕以救聊城之命皆可也連釋此不為射書何為哉彼不預吾事而預之是為出位惟不以爵賞自累而輕世肆志焉故得優游天下如飛鳥翔空然然直以為天下士則未也鄒陽自䧟縲紲諄諄求哀以此得位不其羞哉屈原張儀既欺楚原勸殺張儀秦昭王欲與懐王㑹原諌無行懐王皆不能用遂至兵挫地削亡其六郡客死於秦為天下笑原之忠謀亦白矣上官大夫令尹子蘭反讒之楚而遷原江南原悲憤作懷沙之賦自投汨羅以死原稱三閭大夫者掌王族三姓曰昭屈景離騷者猶離憂也汨羅者汨水在羅故名賈生年二十餘仕漢諸律令所更定及列侯悉就國其説皆自賈生發之絳灌等短其紛亂出為長沙王太傅意不自得弔湘賦服召見宣室文帝嘗前席焉頃之拜梁懐王太傅數歳懷王墮馬死賈生自傷為傅無狀哭泣歳餘亦死年三十三坱軋音央音乙吕不韋初秦子楚為質於趙不當立吕不韋傾貲説華陽夫人立之是為莊襄王先嘗獻其姬於子楚生子政是為始皇帝遂得相秦専其權而亦卒以此見侵飲酖死刺客太史公傳曹沫専諸豫讓聶政荆軻五人謂介然不欺其志愚謂惟豫讓為君報仇之志為可悲餘皆在愚殺身非人情也荆軻所交田光髙漸離之流多慷慨輕生至今讀易水之歌使人悲惋軻視諸子材氣殆優焉雖然果何哉其所謂志而足稱道哉批逆鱗之批白結反出荆軻傳注李斯斯以無道殺天下趙高亦以無道殺斯此天也而自謂以忠死不已愚乎觳抵即角抵兩兩相當角技用力指鹿而左右皆曰馬因紿二世齊戒尋遷之望夷宫殺之與秦紀所載小異髙引璽上殿殿欲壊者三與桓𤣥地䧟之事同䝉恬恬自䝉驁世為秦將殺天下而并之秦天下既一恬復暴師十餘年城塹萬餘里壍山堙谷以除直道同惡相濟凶徳參㑹死有餘罪矣臨刑不自悟乃歸罪於絶地脈然則凶人吉其凶彼固安行之不知罪之莫大於殺也張耳陳餘再見漢抄耳餘少為刎頸交起從武臣北略趙地武臣敗立趙王歇秦攻趙張耳與歇保鉅鹿陳餘軍其北不救後張耳責讓陳餘陳餘解軍印去張耳從項羽入關羽封耳常山王而封陳餘三縣餘反楚襲常山耳歸漢漢遣耳同韓信下趙斬餘而耳為趙王頭㑹箕歛者以人頭數出榖而以箕斂之倳音胾以物挿之也泜水之泜音遲魏豹彭越彭越有大功無反意既以疑間掩捕論罪遷蜀青衣矣吕氏又詐使人告其反族之何忍哉黥布布起麗山之徒以兵屬項氏嘗為軍鋒得國九江南靣稱孤矣漢使隨何説之歸漢遂滅楚垓下王淮南及信越誅而布大恐幸姬啟釁竟以反誅愚謂布非反漢漢非少恩勢使然耳夫越於漢非蕭曹素臣服者比也羣起逐鹿成者帝敗者族方雌雄未決不得已資之以濟吾事事濟矣同起事者猶在則此心不能一日安故其勢不盡族之不止也故夫乗時徼危者未有不滅其身惟嬰母之賢為不可及也已淮隂侯信虜魏破代夏説平趙下燕定齊南摧楚兵二十萬殺龍且而楚隨滅漢并天下皆信力也武渉蒯通説信背漢而信終不忍自以功多漢終不奪我齊也不知功之多者罪之尤今日破楚明日襲奪齊王軍方信為漢取天下漢之心己未嘗一日不在取信也髙帝平生親信無過蕭何者矣而且疑之況信耶信有必誅之勢而無人教之以蕭何避禍之䇿張良為帝謀臣使其為之畫善後計猶庶幾焉而躡足之諌召信㑹兵垓下之䇿皆所以甚帝之疑而置信於死者也失職怏怏謀反見誅雖信之罪而夷三族嗚呼甚矣韓王信盧綰信以韓王庻孽從漢復封韓既而漢疑之徙王太原數被匈奴兵遣使求和解漢又責讓之遂走匈奴髙帝是以有白登之圍疑之為患如此盧綰與帝居同里生同日學同師平生至相得非有大功而王之燕帝之於綰厚矣亦以貳心自成疑懼而走匈奴此則綰之罪也然信稱旦暮乞貸蠻夷僕之綰亦為蠻夷所侵嘗思復歸二人者皆非有大惡而踈逺取疑失身至此不亦悲夫此信之子頽當信之孫嬰與綰之孫他之皆脱身匈奴而復列侯漢廷也陳豨慕魏公子之為人監趙代邊兵而賔客千餘乗卒於見疑而以反誅此尤庸妄可為戒矣觖望據注是二字觖者決别而望者怨望羽檄者挿羽於檄取其急如飛鳥也田儋田儋自立為齊王秦殺之而儋之弟田榮逐田假立田市怨楚之不殺田假不從入關不得王榮乃并楚所立之王曰田都田安及田市而自王兵敗見殺榮之弟田横又立田廣為王為漢所滅横走保彭越越歸漢横走海島天下既定髙帝召之未至三十里自殺其客二人亦自殺從留海島者五百人聞之皆自殺田氏兄弟之有人及得人如此異哉然死傷勇矣樊酈滕灌樊噲起自屠狗從髙祖多戰功諌正秦官脱難鴻門功尤雋焉然人有惡其黨吕氏髙帝立命斬之軍中斯亦烈矣酈商聚兵四千從髙帝於沛積戰功為曲周侯其子酈寄紿吕祿而太尉遂得入北軍安劉氏預有力焉夏侯嬰脱髙祖於亭長時脱孝惠魯元於彭城大敗時間關兵間已立戰功自髙帝初起歴孝惠髙后文帝常為太僕終其身葢謹信可親之人歟灌嬰起自販繒從髙祖騎射戰功居多其後不為諸吕撃齊而共立文帝遂致位宰相葢武健而有定識云張丞相傳為張蒼作也至漢末位丞相者皆附之葢漢初丞相皆功臣自灌嬰死而張蒼繼始以文學好律吕至丞相申屠嘉又自御史大夫叙遷然能剛毅守正至景帝之世丞相備位僅存名氏太史公不復為傳而褚先生直取韋賢以下繼之於魏相稱好武於邴吉稱有大智於黄霸稱以禮義為治其後韋元成父子相繼匡衡十年至丞相皆歸之命有慨歎不滿之意矣物故注云物無也故事也言無復所能於事然則士馬物故者亦以死則無能於事故以為死之稱而此傳稱冀幸丞相物故者以御史大夫望丞相之死而遞遷言非以材徳選也酈生陸賈酈生為髙帝下陳留髙帝賴其兵食遂以入關所繋大矣然以善其令而夜半賊殺之與之善者不亦難乎此戰國傾危之餘習宜其卒窮於辨也陸賈兩使尉他使漢越無兵爭天下隂受其賜多矣時時稱説詩書一新髙帝馬上之習社稷靈長終必賴之矣其後知太后將王諸吕不可争廼病免家居及諸吕將危劉氏則出為陳平畫䇿誅之動静合時措之宜而功烈冺無形之表漢初儒生未有賈比也而太史公屈與酈生同傳豈以其辨説歟朱建以母死無以為喪而受辟陽侯金所謂行不茍合者安在嗚呼此其所以惡也傅靳蒯成傅寛靳歙從髙帝兵間始終無困辱蒯成侯周緤軍乍利乍不利終無離上心髙帝憐其愛我云劉敬叔孫通婁敬脱輓輅胡格切羊裘見天子曰衣帛衣帛見衣褐衣褐見此其質直不徇流俗已可覘其胷中之所挾持者矣勸都長安逆覘敵情皆磊落出人意表惟結和親約雖能寛一時之急未免遺萬世之弊耳叔孫通所事且十主皆靣䛕取親貴既起朝儀得髙帝心然後出直言諌易太子然向使髙帝未老吕后不彊度如意可攘太子位又安知其不反其説以阿意耶隨時上下委曲取容名雖為儒非婁敬比矣季布欒布季布庭斥樊噲横行之説使髙后不復事兵然則孝惠髙后之世海内無事衣食滋殖季布力也布故勇將不為技癢而有老成安静之言斯可尚矣欒布挺身就烹以雪彭王之寃所以警悟髙帝何如哉嗚呼非烈丈夫其孰能與於此袁盎晁錯絳侯元勲也淮南王帝親弟也盎晚出為郎皆斥其驕既而明絳侯無罪諌止淮南王遷蜀者亦盎也盎以故名重朝廷下趙同之參乗却夫人之同坐申屠相稍不為禮則折脅之盎殆以強直自矜者歟沮梁王之謀雖以忠見賊迹其平昔亦非自全之道矣晁錯峭刻紛更與盎素相疾輕桃六國之禍盎卒得以計誅之死又其分也袁盎不絶劇孟云緩急人所有此言可以處世張釋之馮唐張釋之論長者及其守法不阿馮唐之論將皆質直有古大臣之風焉釋之之結韈王生與張良之納履類也以素昧則張良難以貴重則釋之難主臣陛下萬石張叔萬石君家謹厚而已而父子皆致二千石已過矣慶備位丞相於孝武多事之世何哉衛綰車戱士天資偶亦謹厚而景帝相之且謂其可輔㓜主夫帝謂亞夫非少主臣宜綰之見取歟張叔學刑名而能慈愛君子葢取節焉直不疑償金已非人情之正況周文溺袴行詐彼何為者而皆致位通顯夫萬石家以誠得之而竊慕者亦僥倖殆流弊歟田叔叔以死事趙王敖既仕漢薦孟舒案梁王燒其籍使景帝母子相安相魯能格其君之非叔葢堅忍有用之才非如萬石輩徒曰長者而已褚先生附載田仁任安事衛將軍不見知而趙禹遴選於一臨問之頃兩人皆立名天下夫衛青后戚家徒以衣裝取士而以將百萬衆何哉扁鵲倉公扁鵲姓秦名越人得長桑君禁方能洞視五藏期趙簡子之寤起虢太子之死齊桓侯無疾望而退走果不可藥又能隨俗為變斯亦竒且巧矣乃為李䤈所忌而見殺太倉公淳于意即女子緹縈父也得乗陽慶禁方倉公既以緹縈免刑召問醫治纎悉如款案吁士亦何以術為虢太子事注云時虢已滅百二十餘年其字誤歟抑傳聞誤歟吳王濞封國不過百里名山大川不以封濞王吴五十三城且擅山海之利是置之死地也漢承秦滅六國之後徒見六國之昔為諸侯王者無不地廣民衆而不知古制不其然也宜無以善其後歟魏其武安侯魏其侯竇嬰竇太后從兄子也方景帝酒酣失言千秋萬嵗後傳梁王嬰獨引髙帝約折之太后憎嬰輙病免傳栗太子而太子廢數争不能得復病免嘗為大將賜金千斤金盡予軍吏而首進名將賢士之在家者葢亦賢於人多矣卒以失勢怏怏右使酒不遜之灌夫以觸負貴好權之田蚡淪胥以滅雖死不悔可不悲哉與時消息之機勞謙終吉之義士大夫不可一日不拳拳服膺也朝請注云律諸侯春朝天子曰朝秋曰請辟倪音與脾睨同轅下駒者小馬隨母俛頭於車轅下首䑕兩端首䑕一前一却也齚舌見灌夫傳韓長孺再見漢抄韓安國之仕梁也言於漢雖為梁飾非言於梁亦能為梁免禍賂田蚡得仕漢其進雖不以正其辨王恢諌擊匈奴藥石武帝於尚安顧不偉甚越明年王恢挑禍匈奴安國黙黙為之䕶軍雖以不戰歸而兵端自此大開安國亦卒困兵間死矣志在富貴不知不可則止惜哉李將軍再見漢抄李廣才氣天下無雙死之日天下知與不知皆流涕亦可想見其人矣方武帝有事匈奴諸校尉才能不及中人以功取侯者數十獨廣結髪與匈奴大小七十餘戰卒不得侯且死非其罪廣自恨殺降所致然則豈非為將者明戒耶陵降匈奴隴西之士皆用為耻亦可想見其俗之風節矣昆邪之昆音魂大黄者弩名色黄而體大匈奴傳之叙匈奴詳矣大抵以其視中國為強弱夏道衰而狄始大及周之興惟命之曰荒服周道衰戎狄又世世為患秦并天下築長城頭曼單于遂為之北徙既而中國兵争冒頓復興雖髙帝不免白登之圍非其視中國為強弱哉然嘗論之秦漢之待夷狄不可復以三代比也三代以天下為公諸侯各自為守設不幸有警方伯連帥以諸侯兵驅之而已然不常有也秦漢以天下為私自京師去匈奴塞上皆天子所自制邊塵稍驚勞民萬里雖鞭之長不及馬腹故秦之備邊不得不出於長城然此毒民之事悖謬之舉適以自斃不可為也故漢之求安不得不出於結約雖婁敬遣公主之説不可用若孝文皇帝賜之書有曰天不頗覆地不偏載使兩國之民若一家下及魚鼈上及飛鳥跂行喙息蠕動之類莫不就安利而辟危殆嗚呼大哉言乎文帝之心天地之心也持之堅行之久至孝景世終無大冦武帝即位之初匈奴信漢自單于以下往來長城下無忌矣乃一旦無故自為狙詐於匈奴兵連禍結使天下生靈肝腦塗地然匈奴益驕亦終不我服回視文景之世得失何如哉我太祖時不過因李漢超輩使自為之守而邊烽之警自不接於廟堂愚故嘗謂守在四夷三代公天下之事也兼愛南北文帝得處之之道也内兼制諸夏如漢而外因疆圉之臣以禦邊如三代其待夷狄之得自有天地以來未有如我太祖者也不使守封疆者久任世襲而欲身制萬里如在目睫天下無是理也武帝窮追且不能得其要領夷狄之患如之何不日接於中國耶谷蠡音鹿離匈奴官稱衛將軍驃騎再見漢抄衛青者奴𨽻鄭季之遺孽而霍去病其甥也漢武帝以青之姊曰子夫者為后因生事夷狄而官青曰大將軍官去病曰驃騎將軍公孫敖嘗脱衛青於難亦官之至將軍青之長姊嫁公孫賀賀為將軍且至宰相其餘侯者非兩將軍親戚則其門下人也它日貳師將軍亦以後宫故生事大宛而使之貴帝平生窮兵黷武使海内蕭然觀其所由往往為榮宫妾地爾而曰春秋大復讐之義其誰欺欺天乎且受圍與嫚書未可以讐言也文景和親相安已久否而嚴守備則置一李將軍匈奴不敢入塞矣何紛紛為平津侯主父平津侯公孫𢎞見讀漢書抄主父偃姦險無賴小人其致身青雲特自速族滅之禍耳何足汚齒頰哉惟諌伐匈奴一書不當以人廢言然它日勸築朔方俾襲䝉恬故歩者即今日舉秦事以諌伐匈奴之偃也何耶其勸分王諸侯則掇拾賈生之緒餘也其勸徙豪民實茂陵則剽竊婁敬之陳言也何能為漢庭決一䇿耶而取大臣金取諸侯金自謂日暮途逺自分倒行暴施以生於齊而刼齊王殺之以游於燕而䧟燕王殺之召平日昆弟賔客戒其毋入偃門以一切踈絶之何哉偃之為人也其自取覆滅也固宜為偃之族者可悲耳南越尉佗自此漢抄無之南越稱帝文帝以徳懐之而稱臣南越既稱臣武帝以詐召之而輙反越雖夷狄人情亦槩可知矣用樓船十萬師一旦夷以為郡豈不大快然使五帝三王處此亦有文帝之懐柔而已夷狄在萬里外而必貪之何哉東越漢初稱越者凡三南越今二廣之地尉他居之閩越王名無諸居閩今為福建中越東海王名摇居東甌今為永嘉則皆越句踐後也閩越圍東甌漢救之徙東甌於江淮間而閩越遂為東越東越以反誅漢盡徙其民江淮間而東越之地遂虚又有繇王者亦東越苖裔以斬東越王降漢封東成侯萬户太史公謂禹之餘烈云朝鮮朝鮮王右渠者其祖名滿本燕人出塞居秦故空地本無預中國事也渉何為武帝生事其國漢卒盛兵以滅之為真畨普寒反臨屯樂浪𤣥菟四郡漢固貪矣右渠負固自取滅亡亦何愚也西南夷唐䝉食枸醬於南越知其蜀物道西北牂柯江而來也遂使夜郎以為犍為郡而治道指牂牁江此通南夷也司馬相如又言西夷卭筰音昨可置郡自是通西夷道數嵗道不通西南夷又數反上用公孫𢎞之言罷西夷獨置南夷夜郎兩縣矣張騫見蜀布卭竹杖於大夏知其從東南身毒國來而卭之西二千里可到也自是天子注意誅滅西南夷諸國為七郡惟滇王者楚苖裔也以首善不誅與夜郎皆受王印云七郡者犍為牂牁越嶲益州武都沈犁汶山枸醬者枸音窶枸木似榖樹其葉如桑葉用其葉為醤酢美卭竹杖卭山之竹節髙中實可為杖司馬相如再見漢抄相如文人無行不與吏事以賦得幸與倡優等無足汙簡册者亦無足多責惟封禪書禍漢天下於身後且禍後世罪不勝誅藺相如信威敵國名重泰山犬子何人亦冒其名嗚呼禹聖神也而有張禹之禹湯興王也而有張湯之湯藺相如命世人豪也而有司馬相如之相如故曰人能美名名不能美人彼聖賢之名亦有時不幸而辱於小人也相如之賦果何為者耶景帝之不好此人情之正也而武帝溺焉嗚呼於身則求藥長生於兵則窮威萬里於宫室則千門萬户而於文則好相如之賦飄飄有凌雲之氣皆類也於是武帝之志荒矣讀史記踰月其文往往暢逹隔千嵗如覿靣斯亦竒矣至相如傳游獵賦殆不勝悶悶葢文所以載理安有不關義理而可以言文者哉往嵗嘗過村學堂見為之師者授村童書名小雜字句必四字皆器物名而字多隱僻義理無關余竊鄙之然本其所由作特以識器物之名於世尚為有用今㳺獵所賦草木禽獸句亦四字排比積疊皆世所希有怪誕不切世安用此又不得與小雜字比也世或珍異之何哉此傳去手復讀他傳如脱荆棘而履康莊欣快可知然世之好賦者烏知不笑余不識古文竒字顧余之所言者理爾他非所知鱋比目魚也水玉水精淚莎染紫草盧橘世俗多用以稱枇杷今按游獵賦云盧橘夏熟黄甘橙榛枇杷橪而善反柿夫盧橘與枇杷並列則盧橘非枇杷明矣郭璞注蜀中有給客橙冬夏華實相繼通嵗食之謂即盧橘也意者橙橘惟熟於冬而盧橘夏亦熟故舉之以為重歟后山以為一物二名蒲陶俗今作萄并閭㯶也僰扶逼反屬車古者諸侯副車九重秦滅九國置八十一乗名屬車淮南衡山淮南厲王母本趙王張敖美人事髙祖有娠而留趙貫髙謀反美人逮繋既生厲王恚即自殺其後厲王謀反自殺厲王子安謀反自殺子衡山王賜亦謀反自殺恚氣之所鍾如此然厲王椎辟陽侯殺之辟陽侯死有餘罪非過也晉孫恩以逆死妖黨謂其為水仙淮南王安以逆死方士謂其為仙而上升小人羞諱文飾之言類如此而淮南雞犬之事至今為口實然則黄帝烏嘷鼎湖之事又可信耶自三代選舉之法廢士無教養溢出為縱横之説戰國四豪復淵藪之餘風到漢未泯而天下為一無所復售其姦往往諸侯之好事者若陳豨若梁王若吴楚王若淮南衡山王無不以游士敗者士習之所趨可畏哉學校既興科目繼之士心始有所底然則為人上者其可不以人才為意而輕議學校科舉鄙天下士者葢未之思也循吏孫叔敖使民自髙其車得誘民之術也公儀休不受魚謹律身之常也石奢以父殺人李離以過聽殺人皆自殺皆難能之節也詗空政反輿地圖輿猶盡載之義見淮南傳汲鄭汲黯論帝多欲勸帝無起兵諌帝迎渾邪王切責張湯苛法而拳拳願出入禁闥補過拾遺切直忠盡漢庭第一帝稍聽之何至下輪䑓之詔耶鄭莊委曲禮下雖少鯁諒之風然内行修潔没無餘財與汲黯等此太史公以之同傳歟酷吏自此漢抄無之太史公於武帝征伐事先之以文景和親匈奴信漢然後論兩將軍連年出塞又必隨之以匈奴入塞殺略若干於今酷吏傳先之以吏治烝烝民朴畏罪然後論十酷吏更迭用事又必隨之以民益犯法盜賊滋起然則匈奴盜賊之變皆帝窮兵酷罰致之威刑豈徒無益而已哉至於禱祠百出則各隨之以若有應符之言於求仙無方則各隨之以終不可得之言遷之微文見意往往如此而武帝之無道昭昭矣若其禍殺民命不知幾萬萬桀紂之罪逺不至此葢與秦皇同歸惟其輪䑓有悔顧命得人髙文之澤在人尚新漢之天下賴以不絶耳若夫萬世公議亦終不謂帝無道者秦滅儒術武帝興之天地民生之所恃以立者在是也然則先立乎其大者可不務乎沈命法沈者匿也命者亡命也椎埋者發冡一云椎殺人而埋之大宛甚矣小人逄君之惡何甚也漢欲通西南夷費多道不通嘗罷之矣張騫言可通大夏天子復欣然為之是窮民西南之禍不在漢武而在張騫然騫從月氐至大夏竟不得月氐要領其後復使烏孫亦不得其要領間關萬里困苦終身騫果何利於此自是棄骨肉於萬里外以妻烏孫自是没士馬於萬里外以取宛馬天下騷動耗費鉅萬萬騫又果何利於漢嗚呼甚矣小人逄君之惡者不可曉也太史公曰禹本紀言河出崑崙崑崙其髙二千五百餘里日月所相避隱以為光明其上有醴泉瑶池今自張騫使大夏窮河源惡睹本紀所謂崑崙者乎嗚呼太史公之論善矣然後世展轉沿襲之妄又豈止太史公所闢而已哉葢自是有譯西域書為中國語者又因崑崙之説附㑹之為須彌山亦謂日月相避隱為光明而更加張大謂周須彌之山為世界者凡四日所至為晝而去之則為夜然天下安有是理哉若果如崑崙須彌之説則日月之避隱常相等齊安從而有晝夜長短之分日月之避隱常不相見安從而有晦望交蝕之異日常滿月亦當常滿安從而月有虧盈進退之不同出沿山之東入循山之西其地皆逺當僅見日輪之隱約日之方中居山之腹其地獨近當尤見日輪之顯大今日之出没皆見其紅而大日之方中獨見其淡而小何也豈近反見其小而逺反見其大耶日東循山而天下曉當以地里之逺近漸次而曉日西轉山而天下昬當以地里之逺近漸次而昏營之東日出以寅則豳之西當以午豳之西日没以酉則營之東當在晝今地里不問逺近出没皆以寅酉何也豈避隱不以漸行或晝夜不係日月耶夫日月東浮而西沉日行速而月行遲朔望有定寒暑無差交㑹剥蝕皆可預計吾儒厯法盡之矣易曰明出地上晉又曰明入地中明夷天體包地日月出没其間行黄道赤道而有長至短至此有目者所共覩皆可稽而信故日月之説無出於吾儒所置厯象之法矣彼為崑崙須彌之説者何所稽以為信也運行之遲速交蝕之度數彼亦可得而言之否耶彼亦果見日月之隱隱逺從空中來又隱隱逺從空中滅而於東海西崦果不相着否耶葢異説雖從西域來實皆譯之者附㑹中國非聖之書以張大之而不復計其事之實也禹别九州固非能際天所覆然天地之中氣所聚而人物生焉者大抵亦不出此過此以往則天地四垂之偏荒忽不治聖人所不言也騶衍始謬為大言九之又九九之又九謂禹之九州不過天地間八十一分之一而譯者十萬億國土之説縁之興矣不思周天三百六十五度四分度之一日月星辰之所經紀皆可計見隂山之雪以夏而日南之郡北户天地間豈無紀極哉嗚呼出之譽異端而甘自小者謂吾儒不過知造化内事而彼所言者造化外事也自今觀之彼所言造化内且妄矣況外乎造化果有外瞿曇氏當來往空虚中不假父母陽隂氣以生又老於寒暑而死矣然則佛亦厭世俗煩苦而求所謂寂滅耳説本不若是其誕也説之誕者譯者附㑹之過也皆中國奸人之言也故因太史公斥崑崙之説而併及之游俠朱家周人之急家無餘財而終身不自以為徳太史公慕焉郭解折節振人人為解殺人解不知而公孫𢎞族解太史公尤為之痛惜愚謂朱家誠賢矣為人忘已墨氏之弊而解之見殺則亦其平昔嗜殺所致孔子有言古之學者為己孟子亦謂窮則獨善其身士亦何必務名譽出於尋常之外也哉解之甥彊人酒見殺灌夫亦以彊田蚡酒忿亂族誅夫酒者所以行禮而其弊至此世之好彊人飲者可以監矣佞幸佞幸辱國旋亦誅僇滑稽三年不蜚不鳴之語楚世家以為伍舉説莊王今滑稽傳又以為淳于髠説齊威果孰是孰非耶楚莊王時三晉未分今載優孟諷諌莊王預有齊趙陪位韓魏翼衛之語而扁鵲傳載扁鵲起虢太子於已死考其時虢已亡百二十餘年又其可信耶自古可怪可笑人情樂聞之説往往轉相附㑹未必盡有其實我朝東坡蘇公一世人豪惟其善於笑談喜納浮屠故至今謔浪俚談類必託之東坡佛印且曰東坡之見辱於佛印者如此而本無其實也嗚呼其殆此類歟西門豹為鄴令除河伯娶婦曲盡其術葢愚民久已成俗若徒論之以理制之以威雖暫止必復作殺人將終不已故使巫姥三老先自赴水問河伯為之首者自畏死而不敢為後無為之首自不待禁而絶此仁者之術而智者之事也褚先生以附滑稽何哉金馬門者宫署門門傍有銅馬故以為名日者傳為楚之卜人司馬季主作也謂宋忠賈誼問卜於市而季主歴詆士大夫之為非自陳卜者之為貴殆有取其譏世之言而載之歟然未必皆其實也果其實則亦小道致泥放誕不孫人也士大夫雖未必皆賢然必士大夫布列中外上自朝廷下逹郡縣上綱下紀共為扶植而後庶民得以生息於其下所謂代天工者也若卜之為伎不在農工商賈之列浮浪竊食又不得與庶民之良者比顧乃算計利害自逞得計反譏士大夫之不肖何異衣食於祖父而反笑祖父之無聞知而宋忠賈誼反屈於其説哉愚故曰未必皆其實也而乃傳之者不得志於當世之忿心爾龜策三代之興各以卜筮決疑漢興因秦太卜之官歴孝惠文景未嘗講試武帝延百端之學太卜大集然倚以卜兵事賞賜至或數千萬而誅滅者不可勝數則卜非其卜矣褚先生附載蓍龜之説頗詳若宋元王以神龜强國之事則伎藝之言非有識之論也太史公自序談生遷能以文章世其家揚名後世亦可謂善繼人之志者矣然談垂死涕泣之屬惟以不得從封泰山為恨而遷述之豈遷亦不知封禪之為非耶黄氏日抄卷四十六
