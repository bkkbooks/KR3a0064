body:
  text: 黃氏日抄卷三十八宋黃震撰讀本朝諸儒理學書六晦庵先生語類二東萊伯恭少時多使性氣後讀躬自厚而薄責於人遂不復如此伯恭於經不甚理會繫辭精義編得雜詩記只説得箇可以怨乃主張小序之過嘗戲伯恭為毛鄭之佞臣少儀外傳多瑣碎文鑑編得泛館職䇿不直截大事記多主張史記陳君舉君舉有周禮類數篇又説漢唐好處與三代暗合陳同父才髙氣粗葉正則只杜撰進卷可見戴肖望湖南語説却平正陸象山象山言本立而道生多却而字言顔子克巳於意念起處克去言顔子悟道後於仲弓言易辭決非夫子作言孟子無奈告子何言人不惟不知孟子髙處也不知告子髙處言告子論性強孟子言荀子性惡之論甚好使人警發有縝密之功言自得於巳不為文義牽制是集義若以此義從而行之乃求之於外是義襲而取如孝弟為仁之本一章都不看他只説一箇心上面便著不得一箇字是實見得箇道理恁地所以不怕天不怕地一向呌喊教人合下便是教莫要讀書以為此意見以為此間議論只是不知有氣稟之雜把許多粗惡底氣都做心之妙理合當恁地自然做將去老氏老子只退步柔伏占得十分穩方做莊子事事識得又却蹴踏了以為不足為老子猶要做事在到莊子都不要做了列子平淡疏曠莊子全寫列子又變得峻竒列子語佛氏多用之老子占姦故為其學者多流於術數如申韓之徒是也其後兵家亦祖其説如隂符經之類是也及後米賊張陵海島寇謙之之徒遂為盜賊今世道術用印乃陽平治都功印張魯起兵之所用谷神不死是為玄牝谷之虛也聲逹焉則響應之乃神化之自然也玄妙也牝是有所受而能生物者也至妙之理有生生之意焉楊朱即老子弟子後世佛學亦出於楊神像佛所謂法身者本性也報身者德業也肉身者真身而實有之人也今分為三像而駢列之既失矣道家復倣其所為尊老子為三清而昊天上帝反坐其下玉清元始天尊既非老子之法身上清太上道君又非老子之報身設有二像又非與老子為一而老子又自為太清太上老君况莊子明言老聃之死則聃亦人鬼豈可僣居昊天上帝之上哉釋氏釋書初只有四十二章經其説甚平止説修行到東晉便有談議如逺法師支道林皆義學此是齋戒之學一變遂説道理及逹磨入來又翻窠臼説一切掃除然初間也只是外間粗説士大夫未甚信向及六傳至唐中宗六祖禪師專就身上做工夫直要求心見信士大夫向裏者無不歸他然到其後一向説無頭話如乾矢橛柏樹子之類只是胡鶻突人他最怕人説這理字本言盡去世間萬事到了他做得不徹桀黠底又撰出一話如實際理地不受一塵萬法叢中不捨一法等語所謂遁辭知其所窮絶滅人倫大率是説若父母為人所殺無人一舉心動念方始名為初發心菩薩以父母兄弟相親愛為有緣之慈虎狼與我非類却有愛如以身飼虎却是無緣之慈以此為真慈更不分善惡只尊向他便是好人背他底便入地獄若殺人賊一尊了他便會生天自浮屠氏入中國善之名便錯了渠把奉佛為善齋僧立寺為善善安在前輩説除却浮屠祠廟天下便知向善人既不溺於彼自然孝父母弟長上做好人便是善試將法華經看便見其誕開口便説恆河沙數幾萬幾千幾劫更無近底年代如受記某甲幾劫後却成佛有神通便成就他做佛何故待闕許久又如住世羅漢猶未成佛何故許多時修行無長進釋書日添月益皆是中華文士相助撰集如晉宋間自立講師孰為釋迦孰為阿難孰為迦葉各相問難筆之於書大抵多是竊列子骨骸反其根精神入其門我尚何存語列子説耳目口鼻舌心體處有六件佛家便為六根如楞嚴經前後只是説咒中間皆是唐房融添入許多道理説話如西天二十八祖所作偈皆有韻佛祖皆西域夷狄人如何有此分明是後人增加又如偽作韓歐列傳之類正如盜賊畏捉事人故意難賊耳唐之韓文公本朝之歐陽公以及關洛諸公皆嘗闡明正道以排釋氏而其言之要切如傅奕本傳宋景文李蔚贊東坡儲祥觀碑陳后山西鶴宫記皆足以盡見其失向見人陷於異端每以攻之為樂勝之為喜近惟覺彼之迷昧為可憐而吾道不振之可憂誠實痛傷不能自已祖宗太祖有聖人之材做事先其大綱節目可因則因仁宗朝濮議歐公不是溫公又如禮數太薄先是仁宗有詔云朕皇兄濮安懿王之子猶朕之子也此甚分明後來只以濮國主其祀天理自然不待人安排神宗鋭意於治初用富鄭公甚傾信及鄭公願二十年不道用兵字説不合後傾信王介父終坐此病只好用兵熙河之敗喪師十萬神宗臨朝大慟自此得疾而終後來蔡京又以為不可棄之用兵復不利又事幽燕遂至傾覆使神宗得一真儒用之那得來徽宗朝言林靈素有幻術其實也無所作天人示現記皆集衆人之妄徽宗因星變即令衛士仆姦黨碑云莫待明日引蔡京又來炒明日蔡京以為言又詔云雖仆碑而黨籍仍舊欽宗朝飢荒極了若敵人不來盜亦難禁髙宗朝魏公已勉車駕到建康魏公因吕祉事見黜趙相忽發回蹕臨安之議胡文定被召將至聞還臨安遂稱疾轉去孝宗受人言未嘗有怒色合下若有一人夾持定做多少事祖宗法制唐殿廷種花國朝惟植槐楸唐制坐朝有二宫嬪引敬宗時罷今用小黃門舊日主上每日不御正殿然自升朝以上皆去立朝候宰相奏事畢來押班兩拜舊時閣門引從殿下舞蹈今只殿下兩拜便上殿古有册命禮至漢武封三王始復之宰相用竹册本朝宰相不敢當只命書麻詞于誥以賜之宣麻乃是揚庭問其人可否非宣與宰相也失古意矣給事中蓋在內給事或差除不當要在裏面整頓了今報出方繳駁乃是給事外也節度使俸給優厚者蓋太祖初奪諸鎮兵權故極優厚以收其心後來除授者自可殺減令見任者請俸寡家居守間者請俸却大唐初每事先經由中書門下雖有繳駁依舊又上中書尚書省但主書填奉行而已神宗倣此制事多稽滯故渡江以來執政事皆歸一起居郎居左屬門下省起居舍人居右屬中書省唐制使與州各分曹案本朝併州院使院為一婦人封號有夫為秦國公而妻為魏國夫人者蔡京皆改從夫號後人以其出於京也不問是非一切反之律是歷代相傳勑是太祖時修勑中上刑重而下刑輕如勑中刺面編配律中無之如律中杖一百勑中則折為二十今世斷獄只用勑勑中無妨用律律極好律即刑統勑令格式罪皆太重乾道淳熙新書更是雜亂設於此而逆彼之至謂之格如五服制度之類設於此而使彼效之謂之式如磨勘封贈之類禁於未然謂之令如不得為某事違者有罰之類治於巳然謂之勑如巳結此事依條斷遣之類王介父始拘州郡禁軍缺額錢陳亨伯創經總錢韓球創總制錢紹興十一年經界行印典多倍有得以此年立額國初至慶厯用人祖宗以來名相如李文靖王文正諸公只恁地善至范文正便大厲名節振作士氣吕許公為相張安道為御史王拱辰之徒皆深嫉之罷逐一空立事須是擔當如韓魏公立英廟死生以之本朝道學之盛亦有漸自范文正巳有好議論如山東有孫明復徂徠有石守道湖州有胡安定到後來遂有周子程子張子出故程子不敢忘此數公李仲和之祖與包孝肅同讀書一僧舍出入必經由一富人之門未嘗往見之後招飯李欲往包公正色曰彼富人也吾徒異日或守鄉郡今日妄與交豈不為他日纍乎後十年二人果相繼守鄉郡古謂言行必稽其所終慮其所弊也熙寧至靖康用人本朝廟論主於安靖英宗即位巳要改作神宗繼之性氣越緊却又撞著介甫到元豐間又却不要荆公皆自做溫公當路急欲救世韓師朴曾子宣却要和會後韓欲擠子宣遂引蔡京京既入和二人皆打出京為相如學校法安養院漏澤園凡可要結士譽買覔人情者率皆建明時論往往歸之又增衛士食錢皆是取恱上下為竊權之計四次入相終始只用不患無則患不能理財之説其原自荆公當時執政大臣皆他門下客伯紀亦所不免李泰發甚次第硬亦為京所羅致趙挺之繼京便做不行挺之固庸人張天覺亦無所措手足京在政府問人才於族子蔡子應以張直柔名觷對招以門館教京子弟習走京愀然召與語張遂薦龜山楊公諸人宣政間凡危亡亂字皆不得用不得説只説治安得無後來之禍却有一種妖言如葉夢得宇文虛中每進言必勸正心修身正如鬼念大悲咒所謂妖言也靖康執政徐處仁曾忤蔡京舊做方面有聲後却錯繆孫傳略得又好六甲神兵張孝純守太原被圍遣子激往救却徘徊不進張叔夜首領勤王之師以入亦不合入城至於扈從北狩宗澤在東京收拾豪傑甚衆澤死散為盜後來諸將立功者往往皆此時招降之人南渡至今日用人李公入整頓一畨方略成朝廷李去位恰汪黃用事魏公亦嘗論列李初赴南京亦主汪黃魏公初以何􅙫薦為大常簿趙忠簡時為開封推官相得甚歡魏公先逹力相汲引一向超擢反在魏公上魏公劇談秦會之可用趙云此人得志吾輩安所措秦初與吕安老並相為吕所傾當時秦所引皆是好人而立朝無過人皆不平髙宗欲罷其相行詞者求御批以疏其罪及趙公左張公右忽報兀术深入張出視師下令督戰劉光世屯合肥私請於趙退師已而柘臯大捷趙不安遂去魏公獨相乃力薦會之為樞密使酈瓊叛魏公不安亦求去髙宗問誰可代魏公復薦趙不薦會之及趙再相會之讒魏公於趙久而趙公安之復深信之又薦之並相並相之後復不敢專唯諾而已一日髙宗怒唐暉趙為辨檜云如暉人才不難得又一日趙奏恩平郡王乃建王弟吳乃大都會不宜壓兄檜察上意以慈壽意主恩平遂奏曰也不較此因此髙宗深眷之趙罷遂拜左相力主和議敵以河南歸我未幾敗盟檜大恐用張巨山計召諸將攻戰已而劉錡順昌大捷檜復專其功髙宗遂悉以國柄付之舉朝無非秦之人髙宗更動不得有張扶者請檜乘副車吕願中作秦城王氣圖檜治趙相之子欲加族誅若做到這裏其勢須如曹操去幸文字未上檜死髙宗告楊郡王云朕今日始免得這膝褲中帶匕首乃知髙宗平日常防檜之為逆檜死後用沈該万俟卨魏道弼皆當時説和議者未幾又下詔云和議出於朕意故相秦檜只得贊成後因金亮起方少驚懼用人才孝宗初起魏公用事湯進之居左凡事遂為所沮魏公失利遂用湯建議和親以四州還之而敵復犯淮上怒免官削爵施全刺秦檜先生云舉世無忠義這些正議忽然自他身上發出來夷狄楊割大師生阿骨打吳乞買乞買生完顔亶阿骨打死立吳乞買乞買死欲立阿骨打之子宗盤不可復立乞買之子完顔亶而以宗盤為相宗盤怨望遂殺宗盤盡誅二十七王亶又為弟完顔亮所弒亮敗葛王璟立一向以仁政自居初入中國破京師斡離不粘罕也斡離不早死粘罕勸立劉豫及兀术撻懶廢劉豫粘罕爭之不得悒怏而死兀术大入有淮上二士人説之曰韓世忠渡江遺棄糧草甚多遂急來淮上則空無所有先是己敗於劉錡錡在順昌扼其前進退不可遣使求和此庚申年六月初約女真同滅契丹既女真先滅契丹遂竭府庫換燕山空城又以嵗幣二百萬遂敷民間云免往燕山打料草人三十貫共得六百餘萬貫文契丹相郭樂師以常勝軍來降又有義勝軍來降皆厚稟給時中國已空竭邊兵廪絶飢寒欲死兩邊遂相殺及敵入中國常勝義勝軍先往降之為嚮導又徽宗先與阿骨打盟誓兩邊不得受叛降契丹敗將朝廷又皆失之有張穀者知平州欲降徽宗親詔招之契丹亡國之主天祚在敵中徽宗又親寫招之由是敵人大怒論史越棲會稽本在平江楚破越其種散故後號為百越今浙間是南越閩廣是東越南豐送李柳州誤謂柳為南越楚地最廣今襄漢皆是齊晉若不更伯楚必吞周緣他強大所以威公不將僣王猾夏之事責之恐無收殺至晉文城濮之戰依舊委曲還他許多禮數然此處亦足見先王不忍戕民之意未泯也樂毅伐齊只是戰國之士只是鹵掠只是田單會他不奈他何歷代西漢有質實底意宿衛皆用子弟必亡之勢未有如東漢末年曹操合下便知據河北此著被袁紹先下了尋得箇獻帝為令諸侯之舉學者皆知曹氏為漢賊而不知孫權之為漢賊也若權有意興漢自當與先主協力如何先主才整頓得起便與壞倒平時與先主交通姑為自全計爾晉元帝無意中原王導只周旋人過一生大抵改新法度是世界一齊更新方做得漢衰魏代以至六朝相代亦只遞相祖述弊法直到元魏北齊後周居中原時生靈死於兵寇幾盡所以宇文泰蘇綽做得租庸調隋唐因之周世宗天資髙尋得箇王朴做許多事業大均天下之田如本朝太祖直是明逹創法立度節拍一一都是世宗全是得接續某嘗欲寫出蕭相韓信初見髙帝時一假鄧禹初見光武時一假武侯初見先主時一段及王朴平邊策編為一卷諸子荀子有好處勝似揚子雄之學似出於老子如太玄曰潛心於淵美厥靈根測曰潛心於淵神不昧也漢儒惟董仲舒純粹賈誼雜有戰國縱橫之風王通也有好處只是無本原却要將秦漢以下文飾做三代他便自要比孔子孔子有荷蕢等人他也有許多人便是粧點如説家世數人史中並無名又自敘盡是誇張考其年數與唐煞逺如何唐初諸名卿皆與説話史傳中如何都不見説考其事迹亦多不合劉禹錫作歙池江州觀察王公墓碑乃仲淹四代祖碑中載祖諱多不同及阮逸所注并載關朗等事亦多不實王通大業中死自不同時如推説十七代祖亦不應遼逺如此唐李翊論中説可比太公家教則其書出已久伊川謂文中子有些格言被後人添入壞了究其議論只從莊老來韓文公於仁義道德上看得分明却無近於老子底説話作文六經治世之文國語衰世之文戰國策亂世之文然有英偉氣非國語比楚漢間文字真可竒偉離騷無小窒礙司馬遷相如等只是恁地説出班揚以下皆是做文字漢末以後只做屬對文字直至韓文公出來盡掃去了方做成古文到得陸宣公奏劄只是雙關做去如子厚亦自有雙關之文向來看道是他初年文字後將年譜看乃是晚年文字做世間則劇耳文氣衰弱直至五代無能變到尹師魯歐公出來一向變了其間亦有欲變而不能者然古大自是古文四六自是四六却不滚雜歐公力變舊習老來照管不到為某詩序又四六對偶依舊是五代文習晚年自做六一居士傳宜其所得如何却只説有書一千卷集古録一千卷琴一張酒一壺棊一局與一老人為六更不成説話東坡晚年文雖不衰然亦疏魯如南安軍學記海外歸來作有弟子揚觶而序點者三之語序點是人姓名其疏如此過海做昌化峻靈王廟碑引唐肅宗時一尼恍惚升天上帝以寶三十三枚賜之云國有大災以此鎮之今此山如如意必有寶更不成議論觀於海者難為水逰於聖人之門者難為言貫穿百氏與經史乃所以證驗是非明此義理豈特欲使文詞不陋而已義理既明又能力行不倦則其存諸中者必也光明四逹何施不可發而為言以宣其意志當自發越不凡可愛可傳矣今人只於枝葉上粉澤如舞訝鼓然石林云今世安得文章只有減字換字法爾楚些沈中存以些為咒語如今釋子念娑婆詞三合聲而巫人之禱亦有此聲陶淵明詩平淡自豪放李太白豪放亦有雍容和緩處終始學選詩杜子美詩好者亦多是效選詩漸放手初年甚精細晚年橫逆不可當李賀較怪不如太白自在玉川子雖險怪自有混成氣象作詩先用看李杜如士人治本經蘇黃只是今人詩然蘇才豪一衮説盡黃費安排巧好無餘自成一家後山雅健強似山谷然氣力不似山谷大今人多學山谷詩然又只學得不好底今人不去講義理只去學詩文已落第二義况又不知學好底便學得十分好做甚麼用本朝蔡忠惠以前字皆有典則至米元章黃魯直諸人便不肯恁地便是世態髙下石曼卿書筆真所謂顔筋柳骨曼卿胸次極髙非諸公所及雜類秦焚書只是教天下焚之朝廷依舊留得今一升即古之三升一兩即古之三兩古人作甲用皮每用必漆廬山光怪其下有寶西川便是景朝多風處所謂漏天處恁地便是天地不甚濶山本同而末異水本異而末同冀都是天地中好箇風水山脈從雲中發來山脊以西水西入龍門西河山脊以東水東入海前面黃河環繞右是華山為虎自華來至中為嵩山為前案遂過去為泰山聳於左為龍淮南山第二重案江南山第三重案五嶺第四重案古人營屯如井形十字處置火候漢祭河用御龍御馬皆以木為之此是紙錢之漸紙錢起於玄宗時王嶼蓋古以玉幣後易以錢玄宗惑於王璵鬼神事繁無許多錢埋璵作紙錢易之唐禮書載范傳正言唯顔魯公張司業家不用紙錢不知紙錢衣冠有何間别本朝有南劍太守林積收張天師于獄中而奏云其祖乃漢賊不宜使子孫襲封臨安鐵箭只是錢王將此搖動人心覺範本是醫人府君夫人漢碑巳有只是尊神之辭晦庵先生語類續集太極天地十二萬九千六百年為一元一元有十二會一萬八百年為一會一會有三十運三百六十年為一運一運有十二世第三會謂之開物人物方生此時屬寅到戍時謂之閉物到得一元盡時天地又是一畨開闢終而復始所以無窮日月相會時日在月上不是無光都載在上一邊天地即是包得許多氣在裏衮一畨便生一畨物天地之形如人以兩碗相合貯水於內以手常常掉開則水在內不出稍徐手則漏矣氣積為質而性具焉性巳兼理氣善則專指理動物首向上是親乎上人類是也植物本向下是親乎下草木是也禽獸首多橫所以無智本康節説鬼神耳目之能精明者為魄口鼻之能噓吸者為魂月黑暈是魄其光是魂想人身魂魄也如此老子云載營魄是以魂守魄蓋魂熱而魄冷死謂魂魄生謂精氣性理聖人教人大槩只是孝弟忠信日用常行學開卷便有與聖賢不相似處豈可不自鞭策人若辦得十年來讀書甚書不讀了知行天髙地下萬物散殊流而不息合同而化天地間只是這箇道理流行周遍大學知止是識得理之所在定是有倚靠靜是不動搖安則純熟矣由是發於思慮則無不得大學最是兩章相接處好看論語集注中胡氏是致堂曽氏是文清公黃氏是黃祖舜朝氏是朝以道李氏是光祖論語首云人不知而不愠不亦君子乎終云不知命無以為君子也此深有意若這裏信不及見利便趨見害便避如何得成君子學而篇皆先言自修而後親師友有朋自逺方來在時習之後親仁在入孝出弟之後就有道而正在食無求飽居無求安之後毋友不如己者在不重不威之後孟子孟子説仁字義甚明孔子都不曽分曉説譬如沙糖孟子但説糖味甜耳孔子却將那糖與人肯喫則味之甜自知中庸健順五常之德五常乃五行健順乃隂陽二字楊龜山言飢食渴飲手持足行便是道是認欲為理也易天須包乎地之外而氣則迸出乎地之中地雖一塊在天之中其中實虛容得天中氣迸上來易擲錢以甲子起卦始京房自一畫而二二而四四而八而八卦成八而十六十六而三十二三十二而六十四而重卦備故有八卦則有六十四矣此康節所謂先天者也若震一索而得男以下乃是巳有此卦了就此卦生出彼卦皆所謂後天之學凡今易中所言皆是尚書以百姓為百官程謂古無此説後漢書云部刺史職在辨章百姓宣美風俗辨章即平章也唐虞時以潛山為南嶽五嶽亦近人心如船道心如柁道心用人心方得人心易從惡處去所以下箇危字浙江源疑出今婺源折嶺下惟斆學半蓋初學得者是半推以教人亦因此溫得是教之功亦半也詩溫柔敦厚詩教也使篇篇皆是譏刺人安得溫柔敦厚伯恭欲主張小序煆煉得鄭忽罪不勝誅周禮禮記史不掌詩春秋不過如今之史書直書其事善者惡者了然在目觀之者知所懲勸而今却去一字半字上理會褒貶如何知得他肚裏事禮有二件極大事循襲一是天地同祭南郊一是太祖不立特廟聘是命圭通信享是獻圭璧琮璜庭實是皮幣輿馬陳之於庭覿是聘享禮畢以私禮參見孔孟周程孔子後無聖人只緣氣日薄程門上蔡家極有好玩後來為克巳學盡舍之胡文定少時性最急盡寫經傳中寬字觀玩李願中居處有常不作費力事人性卞急發不中節者當於平日言語動作間以緩持之朱子在南康才見旱便刷庫中得三萬來貫凖擬糴米添支官兵却去上供錢內借三萬貫糴米賑糶旱時糴得却糶錢還官申解發出榜放客船米自便不糴客船米浙東得石天民關集大保長盡在一寺令供出人之貧者量道逺近就僧寺或莊宇置糴米所敵問使人云南朝朱先生出處如何對以本朝見擢用既歸即白堂所以有長沙之命不問官大小每日詞狀須置一簿穿字號録判語到事亦作一簿每日勾號一日事都了做教官沒意思訓門人禪學只是於自己精神魂魄上認取一箇有知覺之物把持玩弄至死不肯放舉子程文此是一厄人過了此一厄當理會學問吕東萊伊川發明道理之後到得今浙中有一般議論只云不要矯激遂至凡事回互揀一般偎風朵箭處立地却笑人慷慨奮發以為必陷矯激之禍如嚴子陵是矯激分明吕伯恭作祠記須要辨其非矯激想見子陵聞之亦一笑陳君舉葉正則永嘉之學又不及金溪戴少望尚有些實説葉正則都是門説陸子靜金溪與胡季隨書説顔子克巳處以忿欲等皆未是己私而思索講貫却是大病乃所當克治者釋氏之學大抵謂若識得透應干罪過即都無了然則此一種學在世上乃亂臣賊子之三窟耳釋老禪如秀才家舉業相似與行巳全不相干近世如宗杲做事全不通點檢本朝河東最難取者本是他家裏底所以太祖以書諭之渠答云不忍劉氏之不血食也吕夷簡最是無能底人弄得天下事日入於昏亂及一旦不奈元昊何遂盡挨與范文正公檜末年皆與光堯爭勝光堯作崔府君廟於玉津路上檜設計移之曹筠言水漲光堯逐之檜除他從官周葵欲言梁汝嘉檜不待光堯應便改除歷代史南北史除通鑑所取餘只小説晉書皆為許敬宗寫入小説溫公無自節通鑑今所有者是偽本歷代諸臣齊魯兩生只是不肯從叔孫通漢之四皓只是智謀之士願為太子死亦脅之之意二踈見元帝不可輔導亦是避禍而已諸子梅聖喻説歐陽永叔他自要做韓退之却將我來比孟郊王通便是如此作文韓不用科假歐曾却各有一箇科假陸教授謂伯恭有箇文字腔子才作文字便將來入箇腔子故文字氣脈不長柳文有許多物事要就些子處安排簡而不古如伐原議極局促不好東萊不知如何喜之歐公文章及三蘇文好處只是平易説道理初不曽使差異字換尋常字曽南豐尚解使一二字歐蘇全不使一箇難字李泰伯文自大處起議論氣象好陳后山文有法度李清臣文飽滿荆公文暗愚苦多忘凡讀書必略記所見至讀朱子語類則如仰觀造化之大莫知所措辭然嘗詳之夫子作六經後來者溺於詁訓未害也濓洛言道學後來者借以談禪則其害深矣此無他凡近者猶可進而至於髙明一流於髙空則恐無復可返之期誤人未央也乃今朱子解剝濓溪之圖象裒列二程之遺書以明道學之正傳者如此窮極釋氏之作用為性辨詰諸老之流入禪學以明其徒之似是而非者如彼使道學之源不差而夫子之道復明此其有功天下萬世較之施於用世者撥亂反正豈足喻勞烈之萬分一哉至若謂易本卜筮謂詩非美刺謂春秋初不以一字為褒貶皆曠世未聞之髙論而實皆追復古始之正説乍見駭然熟輒心靡卓識雄辨萬古莫儔而世俗猶以一時異論之士對言之何耶嗚呼此固難與世俗言也門人所記或主靜坐或以靜坐為非或主博覽或以博覽為雜均一朱子之言而相反類如此蓋隨其人之病而藥之耳要之靜而可施之動博而必求其要此中持其衡之説觀者謹毋執其一為據其間亦有門人記録之太過者又當參以朱子平日自著之言晦庵先生年譜先生自二十四為同安簿聲望已卓出歸而山居講學天下學者翕然師尊之至四十一胡銓始不過以詩人薦越三年雖用丞相梁克家薦改合入官執政巳議其少通又三年雖用參政龔茂良薦除祕書郎內批巳疑引虛名士恐壞朝廷及南康之政赫赫彰彰辛丑過闕始得進對求其遇合之實猶未焉寧廟在東宫黃裳為講讀官所學大進光宗大稱賞裳謝以必欲進德修業追蹤古先哲王當擇天下第一等人上問為誰以先生對自是寧考寤寐思見今日踐阼明日詔自長沙入侍講而丞相趙忠定實先生平生知己方洗日虞淵思佐太平可謂千一之竒逢矣奈何韓托胄以名家子孫自詭太后親屬謂可得教旨以竊弄威福丞相乃信之不疑先生已預憂其將几肉我丞相不寤故先生卒以讒間歸而丞相亦及焉向使忠定能用先生言當主聽未惑疽根未結時談笑而去之雖太平未必不可致亦何至為其桃敵禍民鋤去無策天誅出於權變政柄從而下移積弊既深庸繆踵發靡靡至于今未知振起之日哉此事關世道最大固非獨先生一身之窮逹也然先生自十九嵗登第至七十嵗致仕五十年間僅歷同安簿知南康軍提舉浙東常平茶鹽知漳州潭州凡五任九考及經筵四十餘日而已翺翔未幾垂翅輒歸君恩方隆讒間已至窮固甚矣乃得以其餘間精究孔孟之正傳為千萬世道學之宗主雖使先生出將入相功著一時以彼易此孰得孰失耶故愚嘗妄謂孔子窮而在下者也故能集堯舜以來列聖之大成晦翁鬱而不伸者也故能集伊洛以來諸儒之大成似皆有造物者司其數於間而窮者乃所以為逹嗚呼盛哉黃氏日抄卷三十八
